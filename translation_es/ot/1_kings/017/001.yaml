translation:
  language: es
  text: 'Y Elías el tisbita[a], de entre los habitantes de Galaad, dijo a Acab: «Vive Yahvé, Dios de Israel, delante de quien estoy, que en estos años[b] no habrá rocío ni lluvia, excepto[c] por mi palabra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de entre los habitantes de Galaad»; el hebreo puede señalar residentes o pobladores, no solo procedencia étnica.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebraísmo de juramento: literalmente, «si habrá...», con sentido de negación enfática: «no habrá».'
    reason: cultural_note
  - marker: c
    text: 'O: «según mi palabra» / «a mi palabra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתִּשְׁבִּי
  english_pob_choice: the Tishbite
  chosen_spanish: el tisbita
  alternatives_spanish:
  - el de Tisbé
  - el hombre de Tisbé
  lexicon: HALOT
  rationale: Se conserva el valor gentilicio/titular del hebreo sin convertirlo en una paráfrasis más amplia. «Tisbita» funciona en español como designación propia breve y fiel.
- source_word: מִתֹּשָׁבֵי גִלְעָד
  english_pob_choice: from the inhabitants of Gilead
  chosen_spanish: de entre los habitantes de Galaad
  alternatives_spanish:
  - de los habitantes de Galaad
  - de entre los pobladores de Galaad
  lexicon: HALOT
  rationale: El hebreo puede señalar pertenencia dentro del grupo de residentes, no solo origen étnico. «De entre» preserva mejor ese matiz que un simple «de».},{
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh ... lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Vive Yahvé, Dios de Israel
  - Tan cierto como que Yahvé vive
  lexicon: HALOT
  rationale: Se conserva la fórmula de juramento con el nombre divino en la forma de proyecto, Yahvé, y el valor idiomático de vida/juramento sin explicitarlo en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, manteniendo el nombre propio divino en lugar de una sustitución reverencial.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de forma natural y teológicamente precisa como «Dios de Israel».
- source_word: אֲשֶׁר עָמַדְתִּי לְפָנָיו
  english_pob_choice: before whom I stand
  chosen_spanish: delante de quien estoy
  alternatives_spanish:
  - ante cuya presencia estoy
  - delante de quien me mantengo
  lexicon: HALOT
  rationale: «Estar delante de» reproduce la imagen concreta del hebreo; «estoy» mantiene la fórmula sin introducir el matiz interpretativo de «sirvo».
- source_word: אִם יִהְיֶה
  english_pob_choice: there will be
  chosen_spanish: no habrá
  alternatives_spanish:
  - no existirá
  - no se dará
  lexicon: HALOT
  rationale: En el contexto de juramento, la partícula condicional expresa una negación enfática. El español requiere explicitarla para comunicar correctamente el sentido.
- source_word: טַ֣ל וּ/מָטָ֑ר
  english_pob_choice: neither dew nor rain
  chosen_spanish: rocío ni lluvia
  alternatives_spanish:
  - rocío o lluvia
  - rocío y lluvia
  lexicon: HALOT
  rationale: Se preservan los dos términos meteorológicos por separado. La negación previa permite el español natural «no habrá rocío ni lluvia».
- source_word: הַ/שָּׁנִ֥ים הָ/אֵ֖לֶּה
  english_pob_choice: in these years
  chosen_spanish: en estos años
  alternatives_spanish:
  - durante estos años
  - en estos tiempos
  lexicon: HALOT
  rationale: Se mantiene la referencia temporal prolongada con una expresión española clara y fiel.
- source_word: כִּ֖י אִם
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - más que
  lexicon: HALOT
  rationale: Tras la negación, «sino» es la forma más natural en español para introducir la excepción y mantener el contraste del hebreo.
- source_word: לְפִ֥י דְבָרִי
  english_pob_choice: by my word
  chosen_spanish: por mi palabra
  alternatives_spanish:
  - según mi palabra
  - a mi palabra
  lexicon: HALOT
  rationale: Se conserva la fuerza de autoridad profética con una frase idiomática en español. «Por mi palabra» permite reflejar el valor causal/condicional sin perder naturalidad.
theological_decisions:
- issue: Nombre divino יהוה en juramento profético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto según la política del proyecto. Esto evita ocultar el Tetragrámaton detrás de una sustitución litúrgica y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de juramento y negación implícita en hebreo
  english_pob_reading: there will be neither dew nor rain in these years
  chosen_spanish_reading: no habrá rocío ni lluvia, sino por mi palabra
  alternative_spanish_readings:
  - que no habrá rocío ni lluvia en estos años, excepto por mi palabra
  - no habrá rocío ni lluvia durante estos años, salvo por mi palabra
  rationale: El hebreo usa una construcción juramentaria que en español requiere hacer explícita la negación para comunicar el sentido correcto. Se mantiene además la condición de excepción ligada a la palabra de Elías sin ampliarla doctrinalmente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Autoridad profética en לְפִי דְבָרִי
  english_pob_reading: except by my word
  chosen_spanish_reading: sino por mi palabra
  alternative_spanish_readings:
  - excepto por mi palabra
  - según mi palabra
  rationale: La lectura conserva la fuerza de la palabra profética como condición del cese de la sequía, sin convertirla en una explicación teológica más extensa ni en un lenguaje menos directo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El audit trail inglés retuvo «inhabitants of Gilead» tras revisar una opción previa más literal («settlers»), por considerarla más natural y exacta. En español se preserva esa decisión con «habitantes», pero se explicita el matiz de pertenencia interna mediante «de entre» y una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se mantiene «Dios de Israel» como constructo natural en español.
  - «Delante de quien estoy» conserva la imagen hebrea de servicio/presencia sin convertirla en «sirvo».
  - La negación de la primera cláusula se hace explícita en español para reflejar el hebreo juramentario.
  - «Sino por mi palabra» mantiene la excepción con fluidez castellana y conserva la autoridad profética.
