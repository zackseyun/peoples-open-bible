translation:
  language: es
  text: Antes de hacer un voto, prepara tu voto[a][b], y no seas como quien pone a prueba a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea subyacente es difícil; también puede entenderse más simplemente como «tu voto». El sentido general es que uno debe estar preparado para cumplir lo prometido antes de hacerlo.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego difiere de manera importante en este versículo: «¿No refresca el rocío el calor? Así, una palabra es mejor que un regalo». Esto sugiere una forma textual distinta detrás de la tradición griega.'
    reason: textual_variant
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Antes de que
  - Previo a
  lexicon: HALOT
  rationale: Marca temporal que debe anteceder a la acción de votar; en español, «Antes de» comunica de forma natural y fiel esa prioridad temporal.
- source_word: תִּדּוֹר
  english_pob_choice: you make a vow
  chosen_spanish: hagas un voto
  alternatives_spanish:
  - votos
  - prometas
  lexicon: HALOT
  rationale: El verbo נדר se expresa con claridad en español como «hacer un voto»; se mantiene el valor verbal del acto, no solo el sustantivo.
- source_word: הָכֵן
  english_pob_choice: prepare
  chosen_spanish: prepara
  alternatives_spanish:
  - dispón
  - ten listo
  lexicon: HALOT
  rationale: Imperativo de preparación previa; «prepara» es natural en español y conserva la exigencia de estar listo antes del voto.
- source_word: נִדְרֶךָ
  english_pob_choice: your vow
  chosen_spanish: tu voto
  alternatives_spanish:
  - lo que has votado
  - tu promesa
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el audit trail inglés reconoce la tensión entre «what is vowed» y «your vow». En español, «tu voto» mantiene la lectura más directa y la revisión más reciente del POB, sin perder la idea de responsabilidad previa al cumplimiento.
- source_word: כִּמְנַסָּה
  english_pob_choice: like one who tests
  chosen_spanish: como uno que pone a prueba
  alternatives_spanish:
  - como quien prueba
  - como un tentador
  lexicon: HALOT
  rationale: La participación de נסה es claramente de probar o poner a prueba; «pone a prueba» preserva el matiz activo y evita una expresión más cargada que en español podría sonar menos precisa.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto para el Tetragrámaton, se usa «Yahvé» en el texto principal, en vez de ocultarlo con una sustitución litúrgica.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el nombre divino. La política del proyecto pide conservarlo en español como «Yahvé», evitando la máscara «el SEÑOR» y manteniendo la transparencia del texto base.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Tensión textual entre el hebreo y el paralelo griego
  english_pob_reading: Hebrew primary; Greek parallel differs substantially here, reading, “Will not dew cool the heat? So a word is better than a gift.”
  chosen_spanish_reading: Hebreo primario con reconocimiento de la variante griega
  alternative_spanish_readings:
  - «¿No refresca el rocío el calor? Así, una palabra es mejor que un regalo.»
  - Omitir la referencia al paralelo griego
  rationale: El aparato del POB señala que el griego preserva una forma sustancialmente distinta. La traducción principal sigue el hebreo, pero se conserva la tensión textual en nota para no borrar una variante documentada.
  doctrine_reference: 'DOCTRINE.md: Textual criticism and transparent variants'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del POB, que prefirió «your vow» frente a «what is vowed» por ser más directo y natural. En español, la solución «tu voto» sigue esa revisión reciente, mientras que la nota conserva la ambigüedad léxica señalada en el audit trail. También se integró la decisión doctrinal actual para renderizar el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se usó «voto» para נדר/נדרך porque en español litúrgico y bíblico expresa bien el acto de prometer a Dios, sin perder el carácter vinculante.
  - Se evitó «SEÑOR» para יְהֹוָה conforme a la política del proyecto y a la transparencia del texto fuente.
  - La construcción «uno que pone a prueba» conserva el participio con valor general y mantiene el tono proverbial.
  - El verso se presenta como una oración única, acorde con la brevedad y paralelismo del original.
