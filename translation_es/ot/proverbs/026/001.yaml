translation:
  language: es
  text: Como nieve en verano y como lluvia en tiempo de cosecha[a], así el honor no conviene a un necio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como nieve en verano y lluvia en tiempo de cosecha, así el honor no conviene a un necio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּשֶּׁלֶג
  english_pob_choice: Like snow
  chosen_spanish: Como nieve
  alternatives_spanish:
  - Como la nieve
  lexicon: HALOT
  rationale: El prefijo comparativo כ se refleja naturalmente con «como» en español; «nieve» conserva la imagen proverbial sin sobrecargar el verso.
- source_word: בַּקַּיִץ
  english_pob_choice: in summer
  chosen_spanish: en verano
  alternatives_spanish:
  - en el verano
  lexicon: HALOT
  rationale: «קַיִץ» designa la estación calurosa/seca; «en verano» es la equivalencia más natural y breve en español.
- source_word: וְכַמָּטָר
  english_pob_choice: and like rain
  chosen_spanish: y como lluvia
  alternatives_spanish:
  - y como la lluvia
  lexicon: HALOT
  rationale: Se mantiene el segundo símil paralelo con la primera imagen; «lluvia» conserva el contraste estacional del proverbio.
- source_word: בַּקָּצִיר
  english_pob_choice: at harvest
  chosen_spanish: en la cosecha
  alternatives_spanish:
  - durante la cosecha
  - en tiempo de cosecha
  lexicon: HALOT
  rationale: «קָצִיר» apunta a la época de la recolección; «cosecha» comunica bien el momento agrícola al que alude el proverbio.
- source_word: לֹא נָאוֶה
  english_pob_choice: is not fitting
  chosen_spanish: no es apropiado
  alternatives_spanish:
  - no conviene
  - no es decoroso
  - no es adecuado
  lexicon: HALOT
  rationale: נָאוֶה expresa lo que resulta conveniente o apto; «apropiado» comunica la impropiedad sin sonar arcaico y mantiene el juicio de idoneidad.
- source_word: לִכְסִיל
  english_pob_choice: for a fool
  chosen_spanish: para un necio
  alternatives_spanish:
  - para un fatuo
  - para un insensato
  lexicon: HALOT
  rationale: «כְסִיל» es el término sapiencial clásico para el necio moralmente torpe; «necio» preserva ese valor mejor que un término más débil.
- source_word: כָּבוֹד
  english_pob_choice: honor
  chosen_spanish: el honor
  alternatives_spanish:
  - la honra
  - la gloria
  - el prestigio
  lexicon: HALOT
  rationale: En este contexto sapiencial, כָּבוֹד se refiere al honor social o estima, no a la gloria divina; «el honor» mantiene la fuerza del sustantivo y su peso social.
theological_decisions:
- issue: Valor sapiencial de «honor» como algo inapropiado para el necio
  english_pob_reading: honor is not fitting for a fool
  chosen_spanish_reading: el honor no es apropiado para un necio
  alternative_spanish_readings:
  - el honor no conviene a un necio
  - la honra no es apropiada para un necio
  rationale: El hebreo presenta una sentencia de conveniencia social, no una afirmación teológica directa; por eso se traduce con una formulación que conserva la idea de impropiedad o desajuste moral-social.
  doctrine_reference: Sabiduría bíblica / ética del discurso
- issue: Preservación del término sapiencial «necio»
  english_pob_reading: a fool
  chosen_spanish_reading: un necio
  alternative_spanish_readings:
  - un insensato
  - un fatuo
  rationale: En literatura sapiencial, el término no describe solo falta de inteligencia, sino una postura moral desordenada; «necio» conserva mejor esa carga tradicional y bíblica.
  doctrine_reference: Proverbios / sabiduría
- issue: Simetría de las imágenes agrícolas y estacionales
  english_pob_reading: Like snow in summer and like rain at harvest
  chosen_spanish_reading: Como nieve en verano y como lluvia en la cosecha
  alternative_spanish_readings:
  - Como la nieve en verano y como la lluvia en la cosecha
  - Como nieve en el verano y como lluvia durante la cosecha
  rationale: 'La comparación doble del hebreo debe mantenerse visible para no suavizar la fuerza proverbial: dos imágenes igualmente impropias que introducen la conclusión sobre el honor.'
  doctrine_reference: Poética hebrea / paralelismo
translation_notes:
  revision_awareness: El contexto de auditoría inglesa está en acuerdo alto y no registra revisiones aplicadas; por eso la propuesta española sigue de cerca la estructura del hebreo y del POB inglés, con una sola nota alternativa para reflejar la variación léxica admitida en el propio aparato inglés («is not fitting» / «does not befit»).
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención del proyecto solo cuando aparece el tetragrámaton; en este versículo no aplica.
  - Se mantiene el paralelismo comparativo con «como ... y como ...» para reproducir la estructura sapiencial hebrea.
  - «Neceo» no se usa; se elige «necio» como término sapiencial más asentado en español.
  - «Honor» se deja sin glosa adicional porque aquí no se refiere a gloria divina sino a estima social.
