translation:
  language: es
  text: 'Y con toda mi fuerza he preparado para la casa de mi Dios: el oro para los objetos de oro, y la plata para los objetos de plata, y el bronce para los objetos de bronce, el hierro para los objetos de hierro, y la madera para los objetos de madera; piedras de ónice[a], engastes[b], piedras de antimonio[c], piedras abigarradas[d], toda piedra preciosa, y piedras de mármol en abundancia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Ónice'' sigue la identificación tradicional de שֹׁהַם, aunque la identificación exacta de la piedra sigue siendo incierta.'
    reason: lexical_alternative
  - marker: b
    text: '''Engastes'' traduce מִלּוּאִים como soportes o monturas para piedras; también podría entenderse como ''monturas'' o ''incrustaciones''.'
    reason: lexical_alternative
  - marker: c
    text: La expresión 'piedras de antimonio' conserva la literalidad del hebreo אַבְנֵי פוּךְ, cuyo sentido exacto es difícil y puede aludir a pigmento oscuro, incrustación decorativa u otro material ornamental.
    reason: lexical_alternative
  - marker: d
    text: '''Piedras abigarradas'' refleja el sentido contextual de רִקְמָה como algo variado o multicolor; en otros contextos, el término puede referirse a trabajo bordado o ricamente ornamentado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְכָל כֹּחִי
  english_pob_choice: And with all my strength
  chosen_spanish: Y con toda mi fuerza
  alternatives_spanish:
  - Y con toda mi capacidad
  - Y según toda mi fuerza
  lexicon: HALOT
  rationale: כֹּחַ expresa fuerza, capacidad o poder. 'Con toda mi fuerza' conserva la intensidad personal y suena natural en español sin suavizar el énfasis del hebreo.
- source_word: הֲכִינוֹתִי
  english_pob_choice: I have prepared
  chosen_spanish: he preparado
  alternatives_spanish:
  - preparé
  - he puesto en orden
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción completada con relevancia presente en el discurso de David. 'He preparado' reproduce bien ese valor aspectual.
- source_word: לְבֵית אֱלֹהַי
  english_pob_choice: for the house of my God
  chosen_spanish: para la casa de mi Dios
  alternatives_spanish:
  - para la casa de mi Dios
  - para el templo de mi Dios
  lexicon: HALOT
  rationale: בַּיִת se mantiene como 'casa' para conservar la expresión hebrea y su tono devocional; 'templo' sería más interpretativo.
- source_word: הַזָּהָב לַזָּהָב
  english_pob_choice: the gold for the things of gold
  chosen_spanish: el oro para las cosas de oro
  alternatives_spanish:
  - el oro para objetos de oro
  - el oro para lo de oro
  lexicon: HALOT
  rationale: La construcción material + ל indica material destinado a objetos de ese material. 'Las cosas de oro' sigue de cerca la estructura y permanece inteligible en español.
- source_word: וְהַכֶּסֶף לַכֶּסֶף
  english_pob_choice: and the silver for the things of silver
  chosen_spanish: y la plata para las cosas de plata
  alternatives_spanish:
  - y la plata para objetos de plata
  - y la plata para lo de plata
  lexicon: HALOT
  rationale: Se mantiene el paralelismo del hebreo con una solución simétrica y clara.
- source_word: וְהַנְּחֹשֶׁת לַנְּחֹשֶׁת
  english_pob_choice: and the bronze for the things of bronze
  chosen_spanish: y el bronce para las cosas de bronce
  alternatives_spanish:
  - y el cobre para las cosas de cobre
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede ser 'cobre' o 'bronce'; en un contexto de utensilios y ornamentos del santuario, 'bronce' es la opción más probable y coherente con la tradición de traducción documentada.
- source_word: הַבַּרְזֶל לַבַּרְזֶל
  english_pob_choice: the iron for the things of iron
  chosen_spanish: el hierro para las cosas de hierro
  alternatives_spanish:
  - el hierro para objetos de hierro
  lexicon: HALOT
  rationale: Se conserva el patrón del hebreo con el mismo material repetido para indicar su uso en objetos hechos de ese material.
- source_word: וְהָעֵצִים לָעֵצִים
  english_pob_choice: and the wood for the things of wood
  chosen_spanish: y la madera para las cosas de madera
  alternatives_spanish:
  - y la madera para lo de madera
  - y la madera para maderas
  lexicon: HALOT
  rationale: עֵצִים puede significar madera/timber. 'Madera' mantiene el paralelismo y funciona mejor que restringirlo a 'madera de construcción'.
- source_word: אַבְנֵי שֹׁהַם
  english_pob_choice: onyx stones
  chosen_spanish: piedras de ónice
  alternatives_spanish:
  - ónices
  - piedras de onice
  lexicon: HALOT
  rationale: Se conserva la identificación tradicional documentada por la POB en inglés. 'Piedras de ónice' es el equivalente natural en español.
- source_word: וּמִלּוּאִים
  english_pob_choice: settings
  chosen_spanish: engastes
  alternatives_spanish:
  - monturas
  - incrustaciones
  lexicon: HALOT
  rationale: El término alude a montajes o soportes para piedras en trabajo ornamental. 'Engastes' es preciso y natural en español bíblico contemporáneo.
- source_word: אַבְנֵי פוּךְ
  english_pob_choice: stones of antimony
  chosen_spanish: piedras de antimonio
  alternatives_spanish:
  - piedras de antimonio
  - piedras de mineral oscuro
  lexicon: HALOT
  rationale: La POB revisada optó por una traducción más literal de la construcción hebrea. En español, 'piedras de antimonio' preserva esa literalidad y la dificultad léxica sin resolverla indebidamente.
- source_word: וְרִקְמָה
  english_pob_choice: variegated stones
  chosen_spanish: piedras abigarradas
  alternatives_spanish:
  - piedras variegadas
  - piedras moteadas
  - obra abigarrada
  lexicon: HALOT
  rationale: En este listado de materiales, רִקְמָה probablemente describe piedra o trabajo con variación de color o dibujo. 'Abigarradas' comunica bien esa idea en español sin convertirlo en tejido.
- source_word: וְכֹל אֶבֶן יְקָרָה
  english_pob_choice: every precious stone
  chosen_spanish: toda piedra preciosa
  alternatives_spanish:
  - toda gema preciosa
  - cada piedra preciosa
  lexicon: HALOT
  rationale: Se conserva el valor distributivo de כֹּל con singular colectivo, que en español suena natural como 'toda piedra preciosa'.
- source_word: וְאַבְנֵי שַׁיִשׁ
  english_pob_choice: marble stones
  chosen_spanish: piedras de mármol
  alternatives_spanish:
  - mármol
  - piedras marmóreas
  lexicon: HALOT
  rationale: שַׁיִשׁ suele referirse al mármol o a una piedra pulida similar. 'Piedras de mármol' mantiene la forma nominal y el contexto de materiales constructivos.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - abundantemente
  - en gran cantidad
  lexicon: HALOT
  rationale: La frase expresa gran cantidad; 'en abundancia' es la solución idiomática y fiel en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del audit trail en inglés, que ajustó 'antimony stones' a 'stones of antimony' por mayor literalidad y naturalidad. La versión española adopta esa literalidad con 'piedras de antimonio'.
  spanish_consistency_notes:
  - Se conserva 'Dios' para אֱלֹהִים según el estándar del proyecto.
  - Se usa 'bronce' para נְחֹשֶׁת en coherencia con el contexto de materiales del santuario.
  - Se mantiene la serie paralela 'X para las cosas de X' para reflejar la estructura hebrea repetitiva.
  - Se evita 'SEÑOR' porque el versículo usa אֱלֹהַי ('mi Dios'), no el Tetragrámaton.
