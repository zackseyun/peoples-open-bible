revisions:
- from: 'Y Elí bendeciría a Elcaná y a su esposa y diría: “Que Yahvé te conceda descendencia[a] por esta mujer, en lugar de la petición[b] que fue pedida a Yahvé”. Entonces se irían a su lugar.'
  to: 'Y Elí bendecía a Elcaná y a su esposa, y decía: “Que Yahvé te conceda descendencia de esta mujer, en lugar de la petición[a] que se pidió a Yahvé[b]”. Entonces ellos se iban a su lugar.'
  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad funcional: se usa el imperfecto narrativo habitual (''bendecía ... decía ... se iban''), se mejora ''por esta mujer'' a ''de esta mujer'', y se reemplaza ''fue pedida'' por la impersonal más idiomática ''se pidió''. También se reubica la nota léxica al lugar donde realmente cae el juego de palabras hebreo.'
