id: TIT.2.13
reference: Titus 2:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: προσδεχόμενοι τὴν μακαρίαν ἐλπίδα καὶ ἐπιφάνειαν τῆς δόξης τοῦ μεγάλου θεοῦ καὶ σωτῆρος ἡμῶν ⸂Ἰησοῦ Χριστοῦ⸃,
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/013.yaml
  text: as we await the blessed hope and the appearing of the glory of our great God and Savior[a], Jesus Messiah,
  footnotes:
  - marker: a
    text: Or, less likely, 'the glory of the great God and of our Savior Jesus Messiah,' taking 'God' and 'Savior' as two distinct referents rather than a single title for Jesus.
    reason: alternative_reading
translation:
  language: ko
  text: 우리는 복된 소망과, 우리의 위대하신 하나님이시며 구주이신[a] 예수 메시아의 영광의 나타나심을 기다리고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 가능성은 낮으나, 「위대하신 하나님과 우리 구주 예수 메시아의 영광」으로 옮길 수도 있으며, 이 경우 「하나님」과 「구주」를 예수에 대한 한 칭호가 아니라 두 별개의 지시 대상으로 본다.
    reason: alternative_reading
theological_decisions:
- issue: 그랜빌 샤프 구문(Granville-Sharp construction)에 따라 「위대하신 하나님」과 「구주」를 예수 메시아의 단일 칭호로 옮겨, 예수의 신성과 신적 정체성을 본문에 보존
  chosen_reading: 우리의 위대하신 하나님이시며 구주이신 예수 메시아
  alternative_readings:
  - 위대하신 하나님과 우리 구주 예수 메시아 (둘을 별개 인격으로 봄)
  - 위대하신 하나님의 영광과 우리 구주 예수 메시아의 나타나심
  rationale: 헬라어 구문 τοῦ μεγάλου θεοῦ καὶ σωτῆρος ἡμῶν Ἰησοῦ Χριστοῦ는 단수 한정사(τοῦ) 아래 두 명사(θεοῦ와 σωτῆρος)가 καί로 묶이고 그 뒤에 고유명사 Ἰησοῦ Χριστοῦ가 동격으로 따른다. 이는 그랜빌 샤프 규칙(단수, 비인격명사 아닌, 고유명사 아닌 두 명사가 한 정관사 아래 묶일 때 동일 인격을 가리킴)의 전형적 적용 예이며, 두 칭호 모두 예수 메시아를 가리킨다. 또한 신약 다른 곳(요 1:1, 20:28, 롬 9:5 등)의 예수 신성 본문과 일관되며, 목회서신 다른 본문(딛 1:3-4의 「하나님 구주 / 메시아 구주」 평행, 2:10의 「하나님 구주」, 3:6의 「예수 메시아 구주」)의 σωτήρ 흐름에서도 동일 칭호 적용이 가장 자연스럽다. 따라서 본문은 예수를 「위대하신 하나님이시며 구주」로 단일하게 옮기고, 별개로 보는 해석을 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Christological titles; Granville-Sharp construction'
lexical_decisions:
- source_word: προσδεχόμενοι
  english_pob_choice: as we await
  chosen_korean: 기다리고 있습니다
  alternatives_korean:
  - 고대하면서
  - 기대하면서
  lexicon: BDAG
  rationale: προσδέχομαι는 「열망하며 기다리다·환영하여 받다」. 종말론적 대망의 어감을 살려 「기다리고 있다」. 분사이나 한국어 흐름상 12절을 종결시키고 13절을 자립 문장으로 옮긴다.
- source_word: τὴν μακαρίαν ἐλπίδα
  english_pob_choice: the blessed hope
  chosen_korean: 복된 소망
  alternatives_korean:
  - 행복한 소망
  - 복락의 소망
  lexicon: BDAG
  rationale: μακάριος의 정립된 한국어 등가어 「복된」. 「소망」은 ἐλπίς의 표준.
- source_word: ἐπιφάνειαν τῆς δόξης
  english_pob_choice: the appearing of the glory
  chosen_korean: 영광의 나타나심
  alternatives_korean:
  - 영광의 현현
  - 영광이 드러나심
  lexicon: BDAG
  rationale: ἐπιφάνεια는 그리스도의 강림·현현. 「나타나심」이 자연스럽고 경어가 살아 있다. 「현현」은 학술적 어감.
- source_word: τοῦ μεγάλου θεοῦ καὶ σωτῆρος ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: of our great God and Savior, Jesus Messiah
  chosen_korean: 우리의 위대하신 하나님이시며 구주이신 예수 메시아
  alternatives_korean:
  - 우리의 큰 하나님이시며 구주이신 예수 메시아
  - 위대하신 하나님과 우리 구주 예수 메시아 (둘을 별개로 봄)
  lexicon: BDAG
  rationale: 그랜빌 샤프 구문. theological_decisions 참조. 「위대하신」이 μέγας의 신적 영광에 적절하며 「큰」보다 격이 어울린다.
