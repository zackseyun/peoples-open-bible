translation:
  language: es
  text: Estas cosas hizo Benaía hijo de Joiadá, y tuvo nombre[a] entre los tres valientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «tuvo renombre entre los tres valientes». El hebreo dice literalmente: «tuvo nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Estas
  - Tales cosas
  lexicon: HALOT
  rationale: El demostrativo plural resume los hechos recién narrados. «Estas cosas» conserva la referencia resumitiva y suena natural en español bíblico actual.
- source_word: עָשָׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - realizó
  - llevó a cabo
  lexicon: HALOT
  rationale: El verbo hebreo funciona aquí como resumen de las hazañas previas. «Hizo» mantiene la brevedad y la fuerza directa del original, igual que el inglés POB.
- source_word: בְּנָיָהוּ בֶּן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía hijo de Joiadá
  alternatives_spanish:
  - Benaía, hijo de Joiadá
  - Benaía el hijo de Joiadá
  lexicon: HALOT
  rationale: Los nombres propios se adaptan a la forma hispana corriente y el parentesco se expresa con «hijo de», que es idiomático y fiel al constructo hebreo.
- source_word: וְלוֹ
  english_pob_choice: and he had
  chosen_spanish: y tuvo
  alternatives_spanish:
  - y tenía
  - y le pertenecía
  lexicon: HALOT
  rationale: La construcción con ל + sufijo expresa posesión/atribución. En español, «tuvo» comunica de forma concisa que se le reconocía algo.
- source_word: שֵׁם
  english_pob_choice: a name
  chosen_spanish: nombre
  alternatives_spanish:
  - renombre
  - reputación
  lexicon: HALOT
  rationale: Se conserva el sustantivo «nombre» para reflejar la metáfora hebrea literal. La posible idea de fama queda implícita en el contexto y se explicita en la nota textual.
- source_word: בִּשְׁלוֹשָׁה
  english_pob_choice: among the three
  chosen_spanish: entre los tres
  alternatives_spanish:
  - entre los tres valientes
  - en medio de los tres
  lexicon: HALOT
  rationale: La preposición indica pertenencia o reconocimiento dentro del grupo. «Entre» reproduce bien la relación de estatus con ese conjunto.
- source_word: הַגִּבֹּרִים
  english_pob_choice: mighty men
  chosen_spanish: valientes
  alternatives_spanish:
  - hombres valientes
  - mighty men
  lexicon: HALOT
  rationale: En español «valientes» comunica el título de estos guerreros de élite sin sonar forzado. Se evita «hombres poderosos» por ser menos natural y menos preciso en este contexto.
theological_decisions:
- issue: שֵׁם como metáfora de fama/renombre
  english_pob_reading: The Hebrew literally says 'he had a name.' The English POB preserves the idiom and notes the alternative 'renown'.
  chosen_spanish_reading: «tuvo nombre» conserva la literalidad; la fama implícita se entiende por el contexto.
  alternative_spanish_readings:
  - «tuvo renombre»
  - «gozó de reputación»
  rationale: No conviene borrar la tensión entre la literalidad («nombre») y el sentido idiomático («renombre»). La redacción principal mantiene el hebraísmo y la nota ofrece la equivalencia semántica.
  doctrine_reference: None
- issue: הַגִּבֹּרִים como título militar técnico
  english_pob_reading: '''mighty men'' preserves that established military-title sense.'
  chosen_spanish_reading: «los tres valientes» mantiene la referencia al grupo reconocido de guerreros de élite.
  alternative_spanish_readings:
  - «los tres guerreros valientes»
  - «los tres héroes»
  rationale: En español bíblico, «valientes» comunica bien el título sin sustituirlo por un término más interpretativo. Se conserva el sentido de grupo reconocido, no una descripción genérica.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; la versión española sigue de cerca el audit trail vigente. Se resolvió la tensión de שֵׁם con una forma literal en el texto principal y una alternativa de sentido en nota, manteniendo también el valor titulado de הַגִּבֹּרִים sin diluirlo.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo, por lo que no aplica una decisión sobre יהוה.
  - «Benaía» y «Joiadá» siguen la forma hispana habitual de los nombres propios para lectura eclesial amplia.
  - Se evitó «Cristo» o terminología doctrinal ajena al pasaje.
  - La puntuación reproduce una sola cláusula resumitiva con coordinación simple, como en el hebreo.
