translation:
  language: es
  text: ¡Alaben a Yah![a] Den gracias a Yahvé, porque él es bueno, porque su amor fiel permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo הַלְלוּ־יָהּ, exclamación litúrgica que significa «Alaben a Yah».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alaben!
  alternatives_spanish:
  - ¡Alabad!
  - ¡Alaben a Yah!
  lexicon: HALOT
  rationale: Es un imperativo plural de הלל en contexto litúrgico. En español, «alaben» transmite bien la exhortación poética y mantiene el carácter de convocatoria comunitaria. Se conserva el tono directo sin transliterar el verbo.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Es la forma corta poética del nombre divino y aparece en la exclamación הַלְלוּ־יָהּ. Se conserva como «Yah» para no borrar la distinción con יהוה y para reflejar el valor litúrgico de la expresión.
- source_word: הוֹד֣וּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Agradezcan
  - Confiesen
  lexicon: HALOT
  rationale: En el hifil de ידה, en salmos de acción de gracias, el sentido es expresar gratitud o alabanza agradecida. «Den gracias» es natural en español y conserva la orientación cultual del verbo.
- source_word: לַ/יהוָ֣ה
  english_pob_choice: to Yahweh / to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: La pauta del proyecto pide traducir יהוה como «Yahvé» en el texto principal. La preposición ל indica el destinatario de la acción de gracias, por lo que «a Yahvé» es la forma más directa y consistente.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón para alabar y dar gracias. «Porque» reproduce bien la relación causal y mantiene la cadencia poética del hebreo.
- source_word: טוֹב
  english_pob_choice: he is good
  chosen_spanish: él es bueno
  alternatives_spanish:
  - es bueno
  - su bondad es grande
  lexicon: HALOT
  rationale: Es un predicado con sujeto implícito referido a Yahvé. En español conviene explicitar «él» para claridad, manteniendo el juicio moral/relacional de «bueno».
- source_word: לְ/עוֹלָ֣ם
  english_pob_choice: endures forever / is forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión preposicional לְעוֹלָם comunica duración ilimitada. En español, «para siempre» es la forma más natural y fiel, sin introducir una idea verbal no presente en el hebreo.
- source_word: חַסְדּֽ/וֹ
  english_pob_choice: steadfast love
  chosen_spanish: amor fiel
  alternatives_spanish:
  - misericordia
  - amor leal
  - bondad fiel
  lexicon: HALOT
  rationale: חסד combina amor leal, misericordia y fidelidad de pacto. «Amor fiel» conserva esa tensión semántica sin volver la frase demasiado técnica, y encaja bien con «para siempre».
theological_decisions:
- issue: Nombre divino YHWH en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La norma del proyecto para יהוה es «Yahvé» en el cuerpo principal. Esto preserva el nombre del pacto y evita la sustitución convencional por «SEÑOR» sin una razón textual inmediata.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Tratamiento de la forma corta יָהּ dentro de הַלְלוּ־יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - Yahvé
  - Aleluya
  rationale: La forma corta no se confunde con יהוה y funciona como parte de la exclamación litúrgica. Mantener «Yah» preserva la distinción poética y evita diluir el juego nominal del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Sentido de חֶסֶד / חַסְדּוֹ
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor fiel
  alternative_spanish_readings:
  - misericordia
  - lealtad de pacto
  - amor constante
  rationale: El hebreo indica un amor leal y duradero, con resonancia pactal. «Amor fiel» comunica esa combinación de afecto y constancia sin perder la fuerza relacional del término.
  doctrine_reference: HALOT; uso poético de חסד en los Salmos
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail al expresar la última cláusula como una duración continua: «para siempre es su amor fiel». En español se optó por una formulación más natural —«para siempre es su amor fiel»— sin perder la idea de permanencia que motivó la revisión de «is forever» a una lectura más idiomática.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה en el texto principal, conforme a la terminología del proyecto.
  - Se preserva «Yah» en la exclamación litúrgica para distinguirla del nombre divino completo.
  - «Den gracias» reproduce el matiz cultual de הוֹדוּ sin convertirlo en simple cortesía.
  - «Amor fiel» mantiene la tensión entre amor, lealtad y permanencia de חֶסֶד.
  - La puntuación refleja el paralelismo hebreo con dos cláusulas causales introducidas por «porque».
