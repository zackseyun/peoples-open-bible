base_translation:
  language: en
  yaml_path: translation/ot/psalms/068/028.yaml
  text: There is little Benjamin[a], leading them; the princes of Judah in their throng; the princes of Zebulun[b]; the princes of Naphtali.
  footnotes:
  - marker: a
    text: Or 'ruling them' / 'having dominion over them.' The Hebrew participle may suggest governance or precedence; in this context the main text renders it as procession leadership.
    reason: lexical_alternative
  - marker: b
    text: Or 'their company,' 'their multitude,' or 'their crowd.' The Hebrew term is rare and its precise nuance is uncertain, but it denotes a gathered group accompanying Judah.
    reason: lexical_alternative
