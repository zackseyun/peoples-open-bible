    text: O «tabernáculo de Yahvé». El hebreo dice «tienda de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «Ve, cae sobre él» / «Ve, atácalo». El verbo hebreo puede denotar golpear o arremeter contra; aquí, por el contexto, lleva el sentido de asestar un golpe letal.
    reason: lexical_alternative
  revision_rationale: Se corrige «templo» a «tienda» para alinearlo con אֹהֶל y con la auditoría inglesa. Se ajusta el mandato final a «abátelo», que comunica mejor la fuerza letal contextual de פְּגַע בּוֹ sin sobretraducir como «mátalo». Se limpian las notas para que presenten alternativas genuinas y coherentes con el texto revisado.
