  to: Ciertamente, el bien y el amor constante me perseguirán[a] todos los días de mi vida, y habitaré[b] en la casa de Yahvé por longitud de días[c].
  rationale: 'Se revisa para reflejar mejor las decisiones léxicas y teológicas auditadas: «amor constante» preserva mejor חֶסֶד que «fidelidad» sola; «por longitud de días» conserva el modismo hebreo y la tensión interpretativa mejor que «por largo tiempo»; se recoloca la nota de «volveré» en «habitaré»; y se suaviza el orden sintáctico para un español más natural.'
