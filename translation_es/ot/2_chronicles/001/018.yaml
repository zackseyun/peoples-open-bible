translation:
  language: es
  text: Y Salomón dispuso[a] construir una casa para el nombre de Yahvé, y una casa para su reino.
  philosophy: formal
  footnotes:
  - marker: a
    text: 'O: «Y Salomón dijo construir una casa para el nombre de Yahvé, y una casa para su reino»; es decir, «dijo» en una construcción hebrea que puede implicar que resolvió o mandó hacerlo. El hebreo repite literalmente «casa» en ambas cláusulas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - resolvió
  - mandó
  - determinó
  lexicon: HALOT
  rationale: El hebreo usa el verbo común «decir». En este giro con infinitivo siguiente puede implicar decisión o mandato, pero «dijo» conserva más directamente el verbo de origen sin añadir una interpretación específica.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: que se construyera
  alternatives_spanish:
  - para construir
  - que él edificara
  - para que edificara
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la finalidad de construir. En español, una subordinada final con valor pasivo resulta natural y mantiene la relación sintáctica sin forzar un calco.
- source_word: בַּיִת
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa/templo
  - casa real
  - templo
  lexicon: HALOT
  rationale: El sustantivo básico significa «casa» y se repite dos veces en el versículo. Mantener «casa» conserva la repetición léxica; el primer miembro queda especificado por el contexto cultual y el segundo por «su reino».
- source_word: לְשֵׁם יְהוָה
  english_pob_choice: for the name of Yahweh
  chosen_spanish: para el nombre de Yahvé
  alternatives_spanish:
  - para el nombre de Yahweh
  - para el nombre del Señor
  - en honor del nombre de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es un giro cultual fijo que vincula el templo con el nombre divino. «Para el nombre de Yahvé» reproduce el idioma del original y preserva la referencia al nombre personal de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la convención del proyecto para el Tetragrámaton. «Yahvé» conserva el nombre propio divino sin sustituirlo por un título.
- source_word: וּבַיִת
  english_pob_choice: and a house
  chosen_spanish: y una casa
  alternatives_spanish:
  - y un palacio
  - y una residencia
  - y una casa real
  lexicon: HALOT
  rationale: Se repite el mismo sustantivo que en la primera cláusula. Traducirlo también como «casa» preserva la repetición y evita introducir una especificación interpretativa en el texto principal.
- source_word: לְמַלְכוּתוֹ
  english_pob_choice: for his kingdom
  chosen_spanish: para su reino
  alternatives_spanish:
  - para su realeza
  - para su gobierno
  - para su dominio
  lexicon: HALOT
  rationale: מַלְכוּת significa «reino» o «realeza»; aquí el contexto de la construcción real hace natural «su reino». Conserva la relación con la esfera de gobierno de Salomón.
theological_decisions:
- issue: Nombre divino en la fórmula del templo
  english_pob_reading: for the name of Yahweh
  chosen_spanish_reading: para el nombre de Yahvé
  alternative_spanish_readings:
  - para el nombre del Señor
  rationale: El hebreo presenta explícitamente el Tetragrámaton. La traducción española mantiene el nombre divino «Yahvé» para reflejar la decisión doctrinal del proyecto y preservar la referencia personal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Repetición de בַּיִת en ambas cláusulas
  english_pob_reading: house ... and a house
  chosen_spanish_reading: una casa ... y una casa
  alternative_spanish_readings:
  - un templo ... y un palacio
  rationale: Se conserva la repetición del sustantivo hebreo en ambos miembros. La distinción funcional queda dada por los complementos («para el nombre de Yahvé» / «para su reino») sin reemplazar el término con equivalentes interpretativos.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #5, consistency of key terms, or documented exception'
- issue: Valor de וַיֹּאמֶר con infinitivo siguiente
  english_pob_reading: said
  chosen_spanish_reading: dijo
  alternative_spanish_readings:
  - resolvió
  - determinó
  - mandó
  rationale: Aunque la construcción puede implicar intención o mandato, la opción base del POB en inglés fue volver al verbo simple. «Dijo» conserva esa sobriedad y evita decidir en español más de lo que el texto exige.
  doctrine_reference: 'DOCTRINE.md: source-centered rendering of common verbs'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés que volvió de «resolved» a «said» para reflejar con mayor literalidad וַיֹּאמֶר. A la vez, conserva la equivalencia formal del resto del verso y mantiene la repetición de בַּיִת con «casa» en ambas cláusulas.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la política del proyecto para יְהוָה.
  - Se mantuvo «casa» en ambas apariciones de בַּיִת para preservar la repetición léxica del hebreo.
  - La nota [a] está anclada en el verbo «dijo» y ofrece la alternativa intencional sin alterar el texto principal.
