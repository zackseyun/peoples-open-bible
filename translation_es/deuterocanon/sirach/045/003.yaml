translation:
  language: es
  text: A su palabra, las señales vinieron rápidamente[a], y lo fortaleció delante de un rey[b]. Le ordenó acerca del pueblo, y le mostró su gloria[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «Por sus palabras detuvo las señales», en lugar de «las señales vinieron rápidamente».'
    reason: textual_variant
  - marker: b
    text: 'El griego tiene: «lo glorificó delante de reyes», en vez de «lo fortaleció delante de un rey».'
    reason: textual_variant
  - marker: c
    text: 'El hebreo transmitido aquí es difícil; tal como está, podría sugerir: «y vieron su gloria». El griego apoya la lectura: «y le mostró su gloria», que se sigue en el texto principal.'
    reason: textual_variant
lexical_decisions:
- source_word: בדבריו / ἐν λόγοις αὐτοῦ
  english_pob_choice: At his word
  chosen_spanish: Con su palabra
  alternatives_spanish:
  - Por su palabra
  - A su palabra
  lexicon: HALOT; LSJ
  rationale: La construcción hebrea y la griega centran la agencia en la palabra divina. En español, 'Con su palabra' conserva el valor instrumental de ב/ἐν sin sonar forzado, y mantiene el singular retórico que el inglés POB ya había preferido.
- source_word: האותות / σημεῖα
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - los milagros
  lexicon: HALOT; LSJ
  rationale: '''Señales'' reproduce bien el valor de אותות/σημεῖα sin añadir la carga interpretativa de ''milagros''. En español bíblico moderno es claro y fiel, y evita perder el matiz de señal reveladora o confirmatoria.'
- source_word: מהרו / κατέπαυσεν
  english_pob_choice: came quickly
  chosen_spanish: se realizaron con rapidez
  alternatives_spanish:
  - vinieron rápidamente
  - se apresuraron
  lexicon: HALOT; LSJ
  rationale: El hebreo expresa rapidez; el griego ofrece una lectura divergente. 'Se realizaron con rapidez' conserva la idea de prontitud en un español natural, sin sugerir que las señales 'corrieran' por sí mismas. La divergencia textual se preserva en la nota.
- source_word: ויחזקהו / ἐδόξασεν αὐτὸν
  english_pob_choice: he strengthened him
  chosen_spanish: lo fortaleció
  alternatives_spanish:
  - lo hizo fuerte
  - lo exaltó
  - lo honró
  lexicon: HALOT; LSJ
  rationale: La forma hebrea favorece 'fortalecer'. Se conserva esa línea como texto principal, mientras que la lectura griega de 'glorificó/honró' queda indicada en la nota por ser una diferencia textual importante.
- source_word: לפני מלך / κατὰ πρόσωπον βασιλέων
  english_pob_choice: before a king
  chosen_spanish: delante de un rey
  alternatives_spanish:
  - ante un rey
  - en presencia de un rey
  - delante de reyes
  lexicon: HALOT; LSJ
  rationale: El hebreo no lleva artículo, por lo que 'un rey' es la opción más ajustada. 'Delante de' suena natural y solemne en español; la pluralidad griega ('ante reyes') se conserva en la nota textual.
- source_word: ויצוהו אל העם / ἐνετείλατο αὐτῷ πρὸς λαὸν αὐτοῦ
  english_pob_choice: He commanded him concerning the people
  chosen_spanish: Le dio mandatos respecto del pueblo
  alternatives_spanish:
  - Le mandó acerca del pueblo
  - Le encomendó al pueblo
  - Le dio órdenes para su pueblo
  lexicon: HALOT; LSJ
  rationale: El verbo צוה pide una traducción de mandato/orden. 'Respecto del pueblo' refleja el valor preposicional de אל/πρὸς sin forzar una estructura extraña en español. Se evita introducir 'su' en el texto principal porque la frase de posesión no está explícita de la misma manera en todas las versiones antiguas.
- source_word: ויראו את כבודו / ἔδειξεν αὐτῷ τῆς δόξης αὐτοῦ
  english_pob_choice: and showed him his glory
  chosen_spanish: y le mostró su gloria
  alternatives_spanish:
  - y le hizo ver su gloria
  - y ellos vieron su gloria
  lexicon: HALOT; LSJ
  rationale: La lectura griega respalda claramente un sujeto singular que muestra la gloria a otro. 'Le mostró su gloria' es el español más directo y natural; además evita la ambigüedad del hebreo transmitido, que podría leerse de otro modo.
theological_decisions:
- issue: Manejo de una divergencia textual importante entre el hebreo transmitido y el griego en la primera mitad del verso
  english_pob_reading: The main English text follows the Hebrew, while footnotes preserve the Greek variant for the opening line and the kings/glorify clause.
  chosen_spanish_reading: El texto principal sigue el hebreo donde es claro, pero conserva en notas las variantes griegas relevantes; la última cláusula se traduce con ayuda del griego porque aclara una posible corrupción o ambigüedad del hebreo.
  alternative_spanish_readings:
  - Traducir todo estrictamente según el hebreo transmitido
  - Traducir todo estrictamente según el griego
  - Hacer una armonización libre sin marcar las variantes
  rationale: Dado que el pasaje está marcado como major_mismatch, la fidelidad requiere no ocultar la tensión textual. El texto principal debe ser publicable y fluido, pero las notas deben hacer auditable la elección entre hebreo y griego. Esto sigue la práctica de la POB de preservar variantes significativas.
  doctrine_reference: 'PHILOSOPHY.md: cuando hay testigos textuales divergentes, el texto principal puede seguir el testimonio más claro, pero las variantes significativas deben quedar documentadas.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la segunda línea a 'commanded him concerning the people'. La versión española sigue esa decisión semántica, pero la formula de modo natural como 'Le dio mandatos respecto del pueblo'. También se incorporó la prioridad de documentar la divergencia textual principal entre el hebreo y el griego en las notas.
  spanish_consistency_notes:
  - Se mantuvo 'gloria' para δόξα y 'señales' para אותות/σημεῖα, coherente con el registro bíblico y con el audit trail.
  - Se evitó traducir 'κύριος' o 'Χριστός' porque no aparecen en este versículo.
  - Se usó 'Yahvé' solo cuando el nombre divino esté explícito; aquí el verso habla de 'su' palabra y 'su' gloria, sin necesidad de introducirlo.
  - La sintaxis española busca ser natural sin borrar la tensión entre 'fortaleció' y 'glorificó' documentada en las fuentes.
