translation:
  language: es
  text: 'Cuando un pobre habla, dicen: «¿Quién es este?», y si tropieza[a], lo empujan[b] todavía más.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego difiere considerablemente aquí: «La riqueza es buena cuando no hay pecado en ella, y la pobreza es mala en boca del piadoso». La traducción principal sigue el testimonio hebreo conservado, teniendo en cuenta el griego como tradición paralela.'
    reason: textual_variant
  - marker: b
    text: 'El hebreo dice literalmente: «también ellos lo empujan»; el sentido es que otros agravan su caída en vez de ayudarlo cuando tropieza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּל
  english_pob_choice: a poor man
  chosen_spanish: un pobre
  alternatives_spanish:
  - un hombre pobre
  - una persona pobre
  - el pobre
  lexicon: HALOT
  rationale: דַּל designa a una persona pobre, débil o socialmente baja. En español, «un pobre» conserva el valor proverbial y genérico del singular sin añadir género de manera innecesaria.
- source_word: דּוֹבֵר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - está hablando
  - dice
  lexicon: HALOT
  rationale: El participio expresa una acción general o habitual. «Habla» suena natural en español y conserva ese valor genérico sin recargar la frase.
- source_word: מִי זֶה
  english_pob_choice: Who is this?
  chosen_spanish: ¿Quién es este?
  alternatives_spanish:
  - ¿Quién es aquel?
  - ¿Quién es él?
  lexicon: HALOT
  rationale: La expresión mantiene el tono despectivo y de rechazo hacia quien habla. «¿Quién es este?» reproduce bien la dureza directa del hebreo.
- source_word: נִתְקַל
  english_pob_choice: stumbles
  chosen_spanish: tropieza
  alternatives_spanish:
  - flaquea
  - cae
  - se tambalea
  lexicon: HALOT
  rationale: El verbo puede indicar tropezar o venir a ruina. «Tropieza» conserva la imagen concreta y encaja bien con el dicho sapiencial.
- source_word: יֶהְדֳּפוּהוּ
  english_pob_choice: they push him down even more
  chosen_spanish: lo empujan todavía más
  alternatives_spanish:
  - lo apartan aún más
  - lo derriban todavía más
  - lo empujan más abajo
  lexicon: HALOT
  rationale: הדף significa empujar, arrojar o apartar con fuerza. Aquí el sentido es acumular su caída; «lo empujan todavía más» preserva la violencia y la progresión del daño.
- source_word: גַּם הֵם
  english_pob_choice: even more
  chosen_spanish: todavía más
  alternatives_spanish:
  - aún más
  - incluso más
  lexicon: HALOT
  rationale: La expresión intensifica la acción. «Todavía más» comunica en español esa intensificación de modo natural y claro.
theological_decisions:
- issue: Lectura textual del verso
  english_pob_reading: The main translation follows the extant Hebrew witness, with the Greek kept in view as a parallel tradition.
  chosen_spanish_reading: La traducción sigue el testimonio hebreo conservado, teniendo en cuenta el paralelo griego como tradición alterna.
  alternative_spanish_readings:
  - 'Seguir la lectura griega: «Bueno es la riqueza en la que no hay pecado, y mala la pobreza en la boca del piadoso».'
  - Intentar armonizar hebreo y griego en una sola redacción.
  rationale: El hebreo preservado ofrece una forma muy distinta del griego. Para mantener transparencia textual, la versión principal sigue el hebreo, pero la nota deja constancia del paralelo griego sin ocultar la tensión entre testimonios.
  doctrine_reference: Crítica textual y transmisión de Sirácida
- issue: Tono proverbial y social del dicho
  english_pob_reading: When a poor man speaks, they say, “Who is this?” and if he stumbles, they push him down even more.
  chosen_spanish_reading: El refrán denuncia desprecio social y crueldad acumulada hacia el pobre.
  alternative_spanish_readings:
  - Solo una observación moral general.
  - Una sentencia sobre la humildad del pobre.
  rationale: El dicho no es doctrinal en sentido estricto, pero sí sapiencial y social. Conviene conservar su filo contra la humillación del pobre sin moralizarlo en exceso.
  doctrine_reference: Sabiduría bíblica / justicia social
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó 'all the more' a 'even more' por naturalidad. En español se reflejó esa intensificación con «todavía más». También se respetó la advertencia de que el hebreo y el griego divergen considerablemente en este versículo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y no aplica el tetragrámaton en este verso.
  - Se mantuvo un registro sobrio y publicable, sin calco mecánico del inglés.
  - El marcador [a] aparece explícitamente en el verbo «empujan[a]» para anclar la nota textual/lexical.
