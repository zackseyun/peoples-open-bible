  text: וְ/הָ/אָ֥רֶץ חָנְפָ֖ה תַּ֣חַת יֹשְׁבֶ֑י/הָ כִּֽי עָבְר֤וּ תוֹרֹת֙ חָ֣לְפוּ חֹ֔ק הֵפֵ֖רוּ בְּרִ֥ית עוֹלָֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/024/005.yaml
  text: The earth is defiled under its inhabitants[a], because they have transgressed laws, violated a statute[b], and broken the everlasting covenant.
  footnotes:
  - marker: a
    text: Or 'changed a statute.' The Hebrew verb may carry the sense of altering or overstepping an established ordinance.
    reason: lexical_alternative
  - marker: b
    text: '''The everlasting covenant'' is not identified explicitly here; interpreters variously connect it to the Noahic covenant or to God''s enduring moral order for humanity.'
    reason: alternative_reading
