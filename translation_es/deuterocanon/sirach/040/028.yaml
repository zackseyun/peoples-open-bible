    rationale: Ambas son comprensibles, pero con artículo indefinido la expresión resulta más idiomática en español general sin cambiar el sentido.
  revised_spanish_text: Hijo mío, no vivas la vida de un mendigo[a]; mejor es morir[b] que mendigar.
  revised_footnotes:
