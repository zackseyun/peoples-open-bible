review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura básica del hebreo y conserva «tu nombre» y «Yahvé». Sin embargo, «Con un sacrificio voluntario te ofreceré» desplaza el sentido cultual de בִּנְדָבָה como «ofrenda voluntaria» y hace ambiguo el objeto de «ofreceré», cuando el hebreo dice más directamente «sacrificaré/ofreceré una ofrenda voluntaria para ti».
  spanish_quality_summary: La redacción es comprensible, pero «sacrificio voluntario» suena menos natural y menos preciso que «ofrenda voluntaria». Además, «te ofreceré» sin objeto explícito en español puede sugerir incorrectamente «me ofreceré a ti». Una leve revisión mejora claridad y fidelidad.
  glossary_alignment: Se alinea bien con el proyecto al usar «Yahvé» para יְהוָה. No hay conflicto con otros términos doctrinales principales. La principal desviación léxica es נְדָבָה, donde conviene «ofrenda voluntaria» en vez de «sacrificio voluntario».
  issues:
  - severity: medium
    issue: «sacrificio voluntario» para בִּנְדָבָה
    rationale: La decisión inglesa documentada privilegia el sustantivo cultual «freewill offering». En español, «ofrenda voluntaria» reproduce mejor ese valor técnico que «sacrificio voluntario», que puede sonar como un sacrificio realizado voluntariamente.
  - severity: medium
    issue: «te ofreceré» deja el objeto implícito y puede sonar ambiguo
    rationale: אֶזְבְּחָה significa «sacrificaré/ofreceré sacrificio». En la frase española actual, el lector puede entender «te ofreceré» como ofrecerse uno mismo. Expresar el objeto («te ofreceré una ofrenda voluntaria») evita esa ambigüedad y sigue mejor el hebreo y el audit trail.
  - severity: low
    issue: La nota [a] no coincide del todo con el texto principal
    rationale: La nota explica «ofrenda voluntaria», pero el texto principal dice «sacrificio voluntario». Conviene armonizar ambos para coherencia léxica.
  revised_spanish_text: Te ofreceré una ofrenda voluntaria[a]; daré gracias a tu nombre, Yahvé, porque es bueno[b].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «ofrenda voluntaria»; la frase también puede entenderse más adverbialmente como «ofreceré voluntariamente» o «de buen grado».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque es bueno». Algunos entienden: «porque él es bueno», refiriéndose directamente a Yahvé y no a «tu nombre».'
    reason: alternative_reading
  revision_rationale: Se reemplaza «sacrificio voluntario» por «ofrenda voluntaria» para reflejar mejor נְדָבָה y la decisión léxica documentada. También se hace explícito el objeto de «ofreceré» para evitar ambigüedad en español y acercarse más al sentido de «sacrificar/ofrecer una ofrenda».
