review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura general del hebreo y preserva decisiones importantes como «tus ojos no verán» y «en paz». Sin embargo, contiene un error de régimen/preposición en «serás reunido con tus tumbas», donde el hebreo exige dirección hacia la sepultura («a tus sepulcros/sepulturas»), no compañía «con». También «llevaron al rey la respuesta» suena menos fiel al idiomatismo de reportar de vuelta; conviene «llevaron la respuesta al rey» o «dieron respuesta al rey».
  spanish_quality_summary: El español es generalmente claro, pero «con tus tumbas» es antinatural e incorrecto semánticamente. «Todo el mal» es posible, pero en este contexto judicial «toda la calamidad» o «todo el desastre» comunica mejor רָעָה sin ambigüedad moral. La puntuación funciona, aunque la cadencia mejora manteniendo una sola oración coordinada antes del cierre narrativo.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones sobre «He aquí», «reunir», «padres» y «en paz» son defendibles. La principal corrección es sintáctico-lexical: אֶל קִבְרֹתֶיךָ debe ir como «a tus sepulcros/sepulturas», no «con tus tumbas».'
  issues:
  - severity: high
    issue: «serás reunido con tus tumbas»
    rationale: Distorsiona el sentido de אֶל קִבְרֹתֶיךָ. La preposición hebrea אֶל es direccional («a/hacia»), y «con tus tumbas» en español resulta semánticamente erróneo.
  - severity: medium
    issue: «tumbas» como elección principal
    rationale: Aunque preserva el plural, «a tus tumbas» sigue sonando menos digno y menos eclesial que «a tus sepulcros» o «a tus sepulturas». La nota puede preservar la alternativa si se desea.
  - severity: medium
    issue: «todo el mal» en contexto de juicio
    rationale: Puede leerse como mal moral más que calamidad punitiva. El audit trail favorece el sentido de desastre/calamidad; en español conviene explicitarlo para claridad.
  - severity: low
    issue: «Y ellos llevaron al rey la respuesta»
    rationale: Es entendible, pero menos natural que «llevaron la respuesta al rey» y menos cercano al idiomatismo de traer de vuelta un informe.
  revised_spanish_text: He aquí[a], yo te voy a reunir con tus padres, y serás reunido a tus sepulcros[b] en paz[c], y tus ojos no verán toda la calamidad que yo traigo sobre este lugar y sobre sus habitantes. Y llevaron la respuesta al rey.
  revised_footnotes:
