translation:
  language: es
  text: Y cuando el día ya comenzaba a despuntar[a], esto había sucedido, porque el amparo de Yahvé vino pronto en su ayuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque la ayuda oportuna/protección de Yahvé vino rápidamente en su ayuda». El sustantivo raro ἐπαρήγορασις puede destacar auxilio inmediato o alivio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποφαινούσης ... τῆς ἡμέρας
  english_pob_choice: when day was already beginning to appear
  chosen_spanish: cuando el día ya comenzaba a despuntar
  alternatives_spanish:
  - cuando amanecía
  - cuando ya despuntaba el día
  - cuando el día ya empezaba a aparecer
  lexicon: LSJ
  rationale: El genitivo absoluto con ὑποφαίνω expresa la primera aparición de la luz del día. «Comenzaba a despuntar» conserva el valor inceptivo sin volverlo rígido ni excesivamente literal.
- source_word: τοῦτο ἐγέγονει
  english_pob_choice: this had happened
  chosen_spanish: esto había sucedido
  alternatives_spanish:
  - esto había acontecido
  - esto había ocurrido
  - esto sucedió
  lexicon: BDAG
  rationale: El valor de pluscuamperfecto indica una acción ya completada en relación con la aurora. «Había sucedido» refleja ese tiempo verbal de manera natural en español.
- source_word: διὰ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - debido a que
  - por cuanto
  lexicon: BDAG
  rationale: Aquí la preposición con acusativo tiene fuerza causal. «Porque» es la solución más clara y idiomática en español.
- source_word: ἐπαρήγορασιν
  english_pob_choice: had quickly come to his aid
  chosen_spanish: había acudido pronto en su ayuda
  alternatives_spanish:
  - había llegado pronto para ayudarlo
  - había venido en su socorro rápidamente
  - había prestado ayuda oportuna
  lexicon: LSJ
  rationale: El sustantivo es raro y apunta a auxilio o alivio oportuno más que a simple ánimo verbal. «Acudido pronto en su ayuda» preserva la idea de asistencia rápida y el matiz de prontitud.
- source_word: αὐτῷ
  english_pob_choice: to his aid
  chosen_spanish: en su ayuda
  alternatives_spanish:
  - para ayudarlo
  - a su favor
  - para su auxilio
  lexicon: BDAG
  rationale: El dativo marca al beneficiario de la intervención divina. «En su ayuda» expresa con naturalidad esa relación beneficiaria en español.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, el audit trail griego aquí presenta κύριος con sentido reverente y de uso lxxico. En español, «el Señor» preserva la fórmula narrativa consolidada y la referencia a Dios como agente de liberación.
- source_word: σκέπην
  english_pob_choice: protection
  chosen_spanish: protección
  alternatives_spanish:
  - amparo
  - cobertura
  - refugio
  lexicon: LSJ
  rationale: En este contexto de liberación, σκέπη apunta al amparo protector de Dios. «Protección» comunica ese valor de manera precisa y natural.
theological_decisions:
- issue: Cómo traducir κύριος en un relato deuterocanónico griego cuando remite a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Dueño
  rationale: El texto griego usa κύριος como designación reverente de Dios en una fórmula narrativa de auxilio. Dado el marco lxxico y la cadencia natural del español bíblico, «el Señor» mantiene continuidad teológica sin introducir una forma menos segura en este contexto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y se indicó que no se requerían cambios. Esta versión conserva la lectura de referencia y ajusta solo la formulación española para que sea natural y audit-able, manteniendo el sentido causal, el pluscuamperfecto y la rareza léxica de ἐπαρήγορασις.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος en esta cláusula, en coherencia con el valor reverente del griego y con el uso bíblico consolidado en español.
  - «Protección» traduce σκέπη en sentido de amparo divino, no como simple cobertura física.
  - La nota [a] preserva la alternativa semántica importante de ἐπαρήγορασις sin sobrecargar el texto principal.
