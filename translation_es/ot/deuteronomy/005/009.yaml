translation:
  language: es
  text: No te inclinarás ante ellos ni los servirás[a], porque yo, Yahvé tu Dios, soy un Dios celoso, que pide cuentas[b] por la iniquidad de los padres sobre los hijos, y sobre la tercera y sobre la cuarta generaciones[c] de los que me aborrecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te postrarás ante ellos». El verbo hebreo se refiere al acto físico de doblarse o postrarse en reverencia.
    reason: lexical_alternative
  - marker: b
    text: O «que castiga» o «que visita» la iniquidad. El hebreo usa un término judicial amplio, que puede incluir pedir cuentas o castigar.
    reason: lexical_alternative
  - marker: c
    text: Lit. «sobre la tercera y sobre la cuarta»; «generaciones» se suple en español para expresar el sentido idiomático.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁתַּחֲוֶה
  english_pob_choice: bow down
  chosen_spanish: te inclinarás
  alternatives_spanish:
  - te postrarás
  - te adorarás
  lexicon: HALOT
  rationale: El hebreo designa el gesto físico de postración o inclinación reverente. En español, 'inclinarse' comunica el acto sin convertirlo en un equivalente más interpretativo como 'adorar', y mantiene la distinción frente a 'servirlos'.
- source_word: תָעָבְדֵם
  english_pob_choice: serve them
  chosen_spanish: los servirás
  alternatives_spanish:
  - los adorarás
  - les rendirás culto
  lexicon: HALOT
  rationale: עבד aquí expresa servicio cultual o lealtad de esclavo/rendimiento religioso. 'Servir' conserva esa fuerza y mantiene la distinción lexical con el verbo anterior, como en la auditoría inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la política del POB de transliterar el Nombre divino. 'Yahvé' preserva el nombre propio del hebreo y evita la sustitución por un título, como exige el marco del proyecto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma constructa con sufijo de segunda persona singular se vierte de manera directa y natural como 'tu Dios', manteniendo el registro de pacto personal.
- source_word: אֵל קַנָּא
  english_pob_choice: a jealous God
  chosen_spanish: un Dios celoso
  alternatives_spanish:
  - un Dios celoso de su honra
  - un Dios celoso
  lexicon: HALOT
  rationale: '''Celoso'' es la equivalencia establecida para el matiz de exclusividad de pacto y rechazo de rivales. ''Celoso'' retiene la tensión relacional sin suavizarla hacia ''celoso'' como mero temperamento o hacia ''zeloso'', menos natural en español bíblico.'
- source_word: פֹּקֵד
  english_pob_choice: visiting
  chosen_spanish: que castiga
  alternatives_spanish:
  - que visita
  - que llama a cuenta
  lexicon: HALOT
  rationale: Aunque el participio hebreo es más amplio que 'castigar', en español 'que visita' sonaría opaco. 'Que castiga' expresa la acción judicial implicada, sin perder la nota de intervención activa; la amplitud semántica queda reconocida en la decisión teológica sobre el término.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la culpa
  - el pecado
  lexicon: HALOT
  rationale: '''Iniquidad'' mantiene el peso moral y jurídico del hebreo עון mejor que ''pecado'' en este contexto, y concuerda con el lenguaje forense del versículo.'
- source_word: אָב֧וֹת
  english_pob_choice: fathers
  chosen_spanish: de los padres
  alternatives_spanish:
  - de los antepasados
  - de los padres
  lexicon: HALOT
  rationale: Se conserva el masculino plural específico del hebreo. 'Padres' evita neutralizar a 'antepasados' y corresponde al término auditado en inglés.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: sobre los hijos
  alternatives_spanish:
  - sobre los niños
  - sobre los hijos
  lexicon: HALOT
  rationale: En este marco generacional, בנים puede abarcar descendencia. 'Hijos' es natural en español y reproduce la relación familiar/generacional sin forzar una restricción biológica.
- source_word: שִׁלֵּשִׁים
  english_pob_choice: the third generations
  chosen_spanish: la tercera generación
  alternatives_spanish:
  - las terceras generaciones
  - la tercera
  lexicon: HALOT
  rationale: El hebreo usa plural numeral, pero la expresión idiomática apunta a sucesión generacional. En español, 'la tercera generación' suena más idiomático y no añade información teológica ajena; la nota conserva la literalidad subyacente.
- source_word: רִבֵּעִים
  english_pob_choice: the fourth generations
  chosen_spanish: la cuarta generación
  alternatives_spanish:
  - las cuartas generaciones
  - la cuarta
  lexicon: HALOT
  rationale: Igual que en el miembro paralelo anterior, se prefiere la forma idiomática singular colectiva en español para claridad, sin perder el sentido de continuidad generacional.
- source_word: לְשֹׂנְאָי
  english_pob_choice: of those who hate me
  chosen_spanish: de los que me aborrecen
  alternatives_spanish:
  - de los que me odian
  - de mis enemigos
  lexicon: HALOT
  rationale: '''Aborrecer'' traduce con fidelidad el verbo hebreo en un registro bíblico natural. Mantiene la referencia personal y moral del texto, y evita un tono excesivamente coloquial en ''odiar'' o una especificación más interpretativa como ''enemigos''.'
theological_decisions:
- issue: Cómo traducir la intervención divina sobre la iniquidad
  english_pob_reading: visiting the iniquity ...
  chosen_spanish_reading: que castiga la iniquidad ...
  alternative_spanish_readings:
  - que visita la iniquidad
  - que llama a cuenta la iniquidad
  rationale: 'El hebreo פֹּקֵד admite un rango judicial amplio: intervenir, requerir cuentas, castigar. En español, ''visita la iniquidad'' sería poco transparente; ''que castiga'' expresa el efecto judicial que el contexto exige, sin negar la amplitud semántica documentada por la auditoría inglesa. La decisión se toma como equivalencia óptima, no como reducción del término a mera venganza.'
  doctrine_reference: DOCTRINE.md Translation philosophy; preserve lexical breadth where Spanish requires explicitness
- issue: Si la cláusula final describe castigo automático sobre descendientes o delimita a los que continúan en odio a Yahvé
  english_pob_reading: of those who hate me
  chosen_spanish_reading: de los que me aborrecen
  alternative_spanish_readings:
  - a los que me aborrecen
  - de quienes me aborrecen
  rationale: Se conserva la cláusula final como modificador que delimita el alcance del juicio a quienes persisten en hostilidad hacia Dios, en vez de convertir el texto en una doctrina abstracta de castigo hereditario desligado de la postura moral. Esto preserva la tensión teológica documentada en la auditoría inglesa y evita resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: El alcance de 'la tercera y la cuarta generación'
  english_pob_reading: the third and the fourth generations
  chosen_spanish_reading: la tercera y la cuarta generación
  alternative_spanish_readings:
  - las terceras y cuartas generaciones
  - la tercera y la cuarta
  rationale: El hebreo es sucinto y en paralelo ordinal. En español, la formulación singular colectiva es la más natural y clara. La nota permite recuperar la literalidad del plural hebreo sin sobrecargar el texto principal con una construcción menos idiomática.
  doctrine_reference: DOCTRINE.md Translation philosophy; clarity without erasing source nuance
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios sustantivos. Se respetó el trail inglés y se ajustó la expresión española para mantener transparencia lexical y claridad idiomática sin borrar la tensión teológica sobre פֹּקֵד y sobre el alcance generacional.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme a la política del proyecto.
  - 'Se mantiene la distinción entre el gesto de postración y el servicio cultual: ''inclinarás'' / ''servirás''.'
  - Se preserva 'celoso' como término de pacto, no como mero rasgo emocional.
  - La nota de generación recupera la literalidad hebrea sin recargar el verso principal.
  - No se neutralizó el masculino plural 'padres'; se conservó la referencia específica del hebreo.
