review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura causal y narrativa del griego: guerras repetidas en la tierra, Simón y sus hermanos exponiéndose al peligro, resistencia a los adversarios de su nación, propósito de preservar el santuario y la ley, y honor dado a la nación. Sin embargo, τὰ ἅγια αὐτῶν está mal resuelto en el texto principal como «sus santidades», una forma poco natural y semánticamente inadecuada en español para este contexto. El inglés auditado justificó «their sanctuary» como la mejor resolución contextual del plural colectivo griego, manteniendo las alternativas en nota.'
  spanish_quality_summary: 'El español es en general claro y digno, pero «sus santidades» suena impropio y dificulta la comprensión. «En la tierra» es aceptable, aunque «en la tierra» puede sonar algo más amplio que el territorial «en el país/la tierra»; no obliga cambio. El resto del verso fluye bien: «se expusieron al peligro», «se opusieron a los adversarios», «permanecieran», y la construcción enfática «glorificaron ... con gran gloria» son defendibles y legibles.'
  glossary_alignment: No hay conflictos con la terminología de proyecto mayor. «Nación» para ἔθνος está bien alineado con la decisión auditada. «La ley» también. La principal desalineación es con la decisión léxica documentada para τὰ ἅγια αὐτῶν, donde el español debería seguir la resolución contextual «su santuario» en el texto principal y dejar «cosas santas / lugar santo» como alternativas en nota.
  issues:
  - severity: high
    issue: «sus santidades» para τὰ ἅγια αὐτῶν
    rationale: Aunque el griego es plural, en español «santidades» no comunica naturalmente «cosas santas» ni «santuario» y resulta confuso. El contexto y la auditoría inglesa favorecen «su santuario» como resolución principal, con nota para las alternativas literales.
  - severity: low
    issue: Nota b innecesaria como alternativa principal
    rationale: La nota sobre «se mantuviera firme» no es incorrecta, pero el inglés POB no preserva esa alternativa como nota; el contraste significativo que sí debe conservarse es el de τὰ ἅγια. Puede omitirse para evitar sobreanotación.
