revisions:
- from: y una décima de efa de flor de harina como ofrenda vegetal, amasada con aceite, para cada cordero[a], como holocausto, aroma grato, ofrenda encendida para Yahvé.
  to: y una décima de efa de flor de harina como ofrenda vegetal, mezclada con aceite, para cada cordero[a], como holocausto, aroma grato, ofrenda por fuego para Yahvé.
  rationale: Se ajusta 'amasada' a 'mezclada' para reflejar con más precisión בְּלוּלָה בַשֶּׁמֶן; se reemplaza 'ofrenda encendida' por 'ofrenda por fuego' para representar mejor אִשֶּׁה en español culto y coherente con la nota léxica; y se corrige la forma hebrea de la nota.
