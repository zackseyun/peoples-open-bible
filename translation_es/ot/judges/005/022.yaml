translation:
  language: es
  text: Entonces los cascos de los caballos golpearon con estruendo por el galopar, el galopar de sus corceles poderosos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el galopar de sus sementales» o «el galopar de sus guerreros poderosos». La expresión hebrea puede referirse a caballos fuertes o a los guerreros asociados con ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: HALOT
  rationale: Marca la secuencia temporal del canto; «Entonces» es natural en español y preserva el avance narrativo/poético.
- source_word: הָלְמוּ
  english_pob_choice: pounded
  chosen_spanish: retumbaron
  alternatives_spanish:
  - golpearon con fuerza
  - martillearon
  - resonaron
  lexicon: HALOT
  rationale: El verbo expresa un impacto fuerte y sonoro. «Retumbaron» comunica bien el efecto auditivo y la violencia del golpe en estilo poético español.
- source_word: עִקְּבֵי
  english_pob_choice: hoofs
  chosen_spanish: cascos
  alternatives_spanish:
  - pezuñas
  - talones
  lexicon: HALOT
  rationale: En contexto equino, el término apunta a la parte que golpea el suelo; «cascos» es el equivalente idiomático claro en español.
- source_word: סוּס
  english_pob_choice: horses’
  chosen_spanish: de los caballos
  alternatives_spanish:
  - de los corceles
  - del caballo
  lexicon: HALOT
  rationale: El singular hebreo funciona de modo colectivo; en español, el plural es el equivalente natural para la imagen.
- source_word: מִדַּהֲרוֹת
  english_pob_choice: from the galloping
  chosen_spanish: por el galopar
  alternatives_spanish:
  - a causa del galope
  - por la carrera
  lexicon: HALOT
  rationale: La preposición de מקור/causa se expresa de forma natural con «por»; «galopar» conserva la acción equina específica.
- source_word: דַּהֲרוֹת
  english_pob_choice: the galloping
  chosen_spanish: el galopar
  alternatives_spanish:
  - el galope
  - la carrera
  lexicon: HALOT
  rationale: Se mantiene la repetición poética del sustantivo/infinitivo nominal para reflejar la intensificación hebrea.
- source_word: אַבִּירָיו
  english_pob_choice: his mighty steeds
  chosen_spanish: sus corceles poderosos
  alternatives_spanish:
  - sus fuertes caballos
  - sus corceles
  - sus poderosos guerreros
  lexicon: HALOT
  rationale: El audit trail en inglés dejó abierta una ambigüedad entre caballos y guerreros; el contexto inmediato favorece una lectura equina. «Corceles poderosos» conserva dignidad poética sin cerrar del todo la fuerza del término.
theological_decisions:
- issue: Referente del sufijo posesivo en אַבִּירָיו
  english_pob_reading: his mighty steeds
  chosen_spanish_reading: sus corceles poderosos
  alternative_spanish_readings:
  - sus poderosos guerreros
  - sus caballos poderosos
  rationale: La poesía permite una referencia no totalmente desambiguada, pero el marco inmediato de cascos y galopar favorece la lectura de caballos. Aun así, «corceles poderosos» mantiene la resonancia de fuerza sin anular por completo la posibilidad contextual de los jinetes/guerreros.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Tomé como contexto el ajuste final del inglés POB que privilegia «his mighty steeds» frente a la lectura más ambigua anterior. En español, opté por una solución igualmente equina y poética («corceles poderosos») para reflejar ese cierre contextual sin perder totalmente la posible amplitud del hebreo.
  spanish_consistency_notes:
  - Usé «Entonces» para el adverbio temporal inicial, en línea con el valor secuencial del verso.
  - Mantuve la repetición de «galopar» para reproducir la intensificación poética del hebreo.
  - Evité «Señor» o equivalentes de máscara; no hay un referente divino explícito en este versículo.
  - Elegí vocabulario equino natural en español («cascos», «corceles») para conservar la escena bélica sin calco forzado.
