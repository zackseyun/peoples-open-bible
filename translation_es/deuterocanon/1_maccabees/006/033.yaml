translation:
  language: es
  text: Y el rey se levantó temprano, y puso en marcha el campamento con todo su ímpetu[a] por el camino de Bet-zacarías[b], y las fuerzas se dispusieron para la batalla, y tocaron las trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con todo su empuje / impulso». La frase traducida «con todo su ímpetu» refleja el sentido militar de ὁρμήμα.
    reason: lexical_alternative
  - marker: b
    text: O «por la ruta hacia Bet-zacarías». La expresión griega puede indicar el movimiento por la ruta que lleva allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤρθρισεν
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano por la mañana
  alternatives_spanish:
  - se levantó de madrugada
  - se levantó temprano
  lexicon: LSJ
  rationale: ὤρθρισεν indica levantarse o actuar muy temprano. En español, “se levantó temprano por la mañana” conserva el valor temporal con naturalidad y sin exagerar el matiz de alba que el griego no obliga a explicitar.
- source_word: ἀπῆρεν τὴν παρεμβολὴν
  english_pob_choice: moved the camp out
  chosen_spanish: sacó el campamento
  alternatives_spanish:
  - levantó el campamento
  - desplazó el campamento
  lexicon: LSJ
  rationale: La combinación verbal con παρεμβολή expresa mover o levantar el campamento militar. “Sacó el campamento” es una forma española clara y compacta para el desplazamiento ordenado del campamento, sin perder el sentido militar.
- source_word: ἐν ὁρμήματι αὐτῆς
  english_pob_choice: in full force
  chosen_spanish: con todo su ímpetu
  alternatives_spanish:
  - con todo su empuje
  - con toda su fuerza
  - con todo su impulso
  lexicon: LSJ
  rationale: ὁρμήμα puede denotar impulso, embate o ímpetu. “Con todo su ímpetu” mantiene la tensión de avance militar y conserva la ambigüedad entre fuerza y empuje que el inglés POB señaló con su nota.
- source_word: κατὰ τὴν ὁδὸν Βεθζαχαριά
  english_pob_choice: on the road to Beth-zachariah
  chosen_spanish: por el camino de Bet-zacarías
  alternatives_spanish:
  - hacia Bet-zacarías
  - por la vía de Bet-zacarías
  - en dirección a Bet-zacarías
  lexicon: LSJ
  rationale: κατά con ὁδός puede indicar el trayecto o la ruta seguida. “Por el camino de” preserva esa lectura de movimiento a lo largo de la ruta, mientras que el topónimo se translitera de manera uniforme como Bet-zacarías.
- source_word: διετάξαντο αἱ δυνάμεις εἰς τὸν πόλεμον
  english_pob_choice: the forces drew up for battle
  chosen_spanish: las fuerzas se dispusieron para la batalla
  alternatives_spanish:
  - las fuerzas se ordenaron para la batalla
  - las tropas se alinearon para la guerra
  - las fuerzas se arrayaron para la batalla
  lexicon: LSJ
  rationale: El verbo expresa ordenar o disponer en formación militar. “Se dispusieron para la batalla” comunica la formación táctica con español natural y conserva el sentido de preparación bélica.
- source_word: ἐσάλπισαν ταῖς σάλπιγξιν
  english_pob_choice: they sounded the trumpets
  chosen_spanish: tocaron las trompetas
  alternatives_spanish:
  - sonaron las trompetas
  - dieron toque de trompeta
  - tocaron los cuernos
  lexicon: LSJ
  rationale: El griego presenta el acto de tocar instrumentos de señal. “Tocaron las trompetas” es la equivalencia española más directa y eclesiástica sin añadir matices ajenos al texto.
- source_word: Βεθζαχαριά
  english_pob_choice: Beth-zachariah
  chosen_spanish: Bet-zacarías
  alternatives_spanish:
  - Beth-zacarías
  - Bet-Zacarías
  lexicon: project transliteration policy
  rationale: Se translitera el topónimo siguiendo una forma española legible y consistente. “Bet-zacarías” conserva el componente semítico y evita una adaptación innecesaria al castellano tradicional.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del consenso auditado; se mantiene la lectura militar y la alternativa de ruta señalada en la nota del texto inglés.'
  spanish_consistency_notes:
  - 'Se mantiene el topónimo con transliteración uniforme: Bet-zacarías.'
  - Se preserva la tensión léxica de ὁρμήμα con una nota alternativa, sin reducirlo sin más a “fuerza”.
  - El registro es bíblico pero en español moderno, evitando arcaísmos no necesarios.
