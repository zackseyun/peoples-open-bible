  rationale: Se ajustó «planes» a «tramas» para preservar el matiz hostil de βουλάς conforme al análisis fuente/POB. También se reubicaron y simplificaron las notas para conservar la alternativa temporal documentada en el POB inglés y la alternativa de lectura de la cláusula final, evitando notas léxicas innecesarias.
