translation:
  language: es
  text: Mi ojo[a] corre y no cesa, sin interrupción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mis ojos corren y no están quietos, sin pausa»; el hebreo usa singular («mi ojo»). El verbo también puede expresar «estar quieto», y la última expresión puede traducirse «sin pausa», «sin respiro» o «sin alivio».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינִי
  english_pob_choice: My eye
  chosen_spanish: Mis ojos
  alternatives_spanish:
  - Mi ojo
  lexicon: HALOT
  rationale: El hebreo lleva sustantivo singular con sufijo de 1ª persona singular, pero en español poético y natural el plural «mis ojos» expresa mejor la imagen del llanto continuo sin sonar extraño. Se mantiene el valor corporal concreto del texto.
- source_word: נִגְּרָה
  english_pob_choice: runs down
  chosen_spanish: se derraman
  alternatives_spanish:
  - corren вниз?
  - fluyen
  - se deslizan
  lexicon: HALOT
  rationale: El verbo hebreo describe un fluir o correr hacia abajo. En español, «se derraman» conserva la imagen de líquido que cae y resulta idiomático para lágrimas, sin añadir explícitamente «lágrimas» al texto.
- source_word: וְלֹא תִדְמֶה
  english_pob_choice: and does not cease
  chosen_spanish: y no cesan
  alternatives_spanish:
  - y no se detienen
  - y no se callan
  - y no están quietos
  lexicon: HALOT
  rationale: דמה puede significar cesar, callarse o estar quieto. En contexto de llanto continuo, «no cesan» reproduce bien la idea de que el fluir no se interrumpe.
- source_word: מֵאֵין הֲפֻגוֹת
  english_pob_choice: without interruption
  chosen_spanish: sin interrupción
  alternatives_spanish:
  - sin pausa
  - sin alivio
  - sin respiro
  lexicon: HALOT
  rationale: La combinación preposicional con negación expresa ausencia de pausas o alivio. «Sin interrupción» comunica con claridad la ausencia de descanso en el llanto y encaja con el valor del sustantivo plural.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés están en alto acuerdo; la única decisión principal es de naturalidad poética en español: conservar la imagen de un llanto continuo con un verbo que sugiera derramarse y una clausula final que exprese ausencia de pausa.'
  spanish_consistency_notes:
  - Se mantiene un tono poético sobrio y contemporáneo.
  - No se introduce explícitamente «lágrimas» para no añadir un elemento no dicho en el hebreo.
  - 'Se conserva la progresión semántica: flujo continuo + negación de cese + ausencia de pausa.'
