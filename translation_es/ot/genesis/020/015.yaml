  glossary_alignment: 'No hay términos del glosario principal en juego. «Abimelec» es aceptable en español. «Mira» para הִנֵּה y «mi tierra» para אַרְצִי están bien. La decisión clave es בַּטּוֹב בְּעֵינֶיךָ: el borrador lo interpreta idiomáticamente como «te parezca bueno», pero, dado que el POB inglés revisado volvió a una forma más cercana, el español debe retener más explícitamente la referencia perceptiva («a tus ojos») o al menos reflejarla en nota.'
