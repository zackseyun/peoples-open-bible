translation:
  language: es
  text: Por tanto, comprarás diligentemente[a] con esta plata[b] toros, carneros, corderos, junto con sus ofrendas de cereal y sus libaciones, y los ofrecerás sobre el altar de la casa de tu Dios[c] que está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuidadosamente» o «exactamente»; el adverbio arameo enfatiza la ejecución precisa de la orden.
    reason: lexical_alternative
  - marker: b
    text: «Plata» puede funcionar aquí como dinero o fondos, pero el texto literalmente dice «plata».
    reason: lexical_alternative
  - marker: c
    text: O «el templo de tu Dios»; literalmente, «la casa de tu Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  - En consecuencia
  lexicon: HALOT
  rationale: La expresión aramea es una fórmula inferencial; en español bíblico actual, «Por tanto» conserva la relación lógica sin sonar pesada.
- source_word: אָסְפַּרְנָא
  english_pob_choice: diligently
  chosen_spanish: diligentemente
  alternatives_spanish:
  - con diligencia
  - cuidadosamente
  - exactamente
  lexicon: HALOT
  rationale: El adverbio intensifica la ejecución precisa del mandato. «Diligentemente» mantiene esa fuerza adverbial con naturalidad en español.
- source_word: תִקְנֵא
  english_pob_choice: you shall buy
  chosen_spanish: comprarás
  alternatives_spanish:
  - adquirirás
  - comprarás para ti
  lexicon: HALOT
  rationale: El verbo básico es comprar. El futuro de mandato comunica bien la instrucción directa del texto.
- source_word: בְּכַסְפָּא דְנָה
  english_pob_choice: with this silver
  chosen_spanish: con este dinero
  alternatives_spanish:
  - con esta plata
  - con este plata/metal precioso
  lexicon: HALOT
  rationale: Aunque el hebreo/aram. dice literalmente «plata», en este contexto administrativo esa plata funciona como fondos; «dinero» evita una literalidad engañosa sin perder la referencia al pago. Se mantiene en nota la posibilidad literal de «plata».
- source_word: תּוֹרִין
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: En un listado sacrificial, «toros» es una equivalencia clara y digna para el gran animal macho de sacrificio; «bueyes» o «novillos» introducirían matices menos seguros aquí.
- source_word: דִּכְרִין
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - ramos
  - machos ovejos
  lexicon: HALOT
  rationale: «Carneros» es el equivalente español natural para male sheep en contexto sacrificial.
- source_word: אִמְּרִין
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas jóvenes
  - borregos
  lexicon: HALOT
  rationale: Para español bíblico actual, «corderos» comunica bien la cría ovina destinada al sacrificio y es más natural que una glosa zoológica.
- source_word: וּמִנְחָתְהוֹן
  english_pob_choice: their grain offerings
  chosen_spanish: sus ofrendas de cereal
  alternatives_spanish:
  - sus ofrendas de grano
  - sus oblaciones
  lexicon: HALOT
  rationale: «מִנְחָה» en contexto cultual es la ofrenda de cereal/grano. Se prefiere «cereal» para acercarse a la forma más técnica y evitar confundirlo con una ofrenda genérica.
- source_word: וְנִסְכֵּיהוֹן
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas de bebida
  - sus derramamientos
  lexicon: HALOT
  rationale: «Libaciones» es el término cultual preciso y mantiene el carácter ritual del líquido derramado; en español eclesial es comprensible y fiel.
- source_word: וּתְקָרֵב הִמּוֹ
  english_pob_choice: and you shall offer them
  chosen_spanish: y los ofrecerás
  alternatives_spanish:
  - y los presentarás
  - y los acercarás
  lexicon: HALOT
  rationale: En el contexto del altar, «ofrecer» es la manera más natural de expresar el acto sacrificial de traer/presentar ante Dios.
- source_word: עַל מַדְבְּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: «Sobre el altar» reproduce bien la locución espacial y el gesto sacrificial asociado.
- source_word: בֵּית אֱלָהֲכֹם
  english_pob_choice: the house of your God
  chosen_spanish: la casa de tu Dios
  alternatives_spanish:
  - el templo de tu Dios
  - la casa de tu Dios
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar la expresión fuente y la idiomática bíblica; «templo» explicita el referente pero suaviza la literalidad.
- source_word: דִּי בִירוּשְׁלֶם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que se halla en Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa localiza la casa/altar de forma natural en español y mantiene el referente geográfico explícito.
translation_notes:
  revision_awareness: Alineado con el texto arameo de base y con la decisión inglesa de preservar la referencia literal a «silver/house», pero adaptando el primer sustantivo a un español natural cuando el contexto administrativo indica fondos. No se detectaron cambios de revisión en el audit trail inglés; se mantiene la estructura sintáctica y el orden cultual del versículo.
  spanish_consistency_notes:
  - Se preserva el registro bíblico formal y la secuencia de sacrificios del original.
  - «Casa de tu Dios» se mantiene de forma consistente con el idiomatismo bíblico, aunque se ofrece la alternativa «templo» en nota.
  - 'Los términos sacrificiales se traducen de manera estable: toros, carneros, corderos, ofrendas de cereal y libaciones.'
