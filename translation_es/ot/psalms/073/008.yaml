translation:
  language: es
  text: Se burlan y hablan con malicia[a]; desde lo alto profieren opresión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se mofan y hablan maldad; hablan opresión altivamente». El hebreo del verbo inicial es difícil, y «desde lo alto» también puede expresar una manera arrogante («altivamente») más que una posición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִיקוּ
  english_pob_choice: They scoff
  chosen_spanish: Se burlan
  alternatives_spanish:
  - Se mofan
  - Se ríen con desprecio
  - Se escarnecen
  lexicon: HALOT
  rationale: El verbo hebreo es difícil; en el contexto de habla arrogante, la idea de desprecio burlón encaja mejor que una traducción demasiado literal o especulativa. 'Se burlan' comunica bien el tono hostil y despectivo sin afirmar más de lo que el hebreo permite.
- source_word: וִידַבְּרוּ
  english_pob_choice: and speak
  chosen_spanish: hablan
  alternatives_spanish:
  - y hablan
  - y dicen
  lexicon: HALOT
  rationale: El verbo de habla se conserva de manera directa. En español, la repetición de sujeto no es necesaria, y 'hablan' mantiene el paralelismo con el segundo miembro.
- source_word: בְרָע
  english_pob_choice: with malice
  chosen_spanish: con malicia
  alternatives_spanish:
  - malamente
  - con maldad
  - en mal
  - con maldad y malicia
  lexicon: HALOT
  rationale: La preposición con ב y el sustantivo/adjetivo רַע funcionan adverbialmente. 'Con malicia' expresa de forma natural en español la intención malévola o dañina de su habla, conservando el matiz moral del hebreo.
- source_word: עֹשֶׁק
  english_pob_choice: oppression
  chosen_spanish: opresión
  alternatives_spanish:
  - extorsión
  - abuso
  - injusticia
  lexicon: HALOT
  rationale: El sustantivo designa opresión o explotación. 'Opresión' es la opción más amplia y fiel, y no restringe indebidamente el sentido a un ámbito económico o jurídico más estrecho.
- source_word: מִמָּרוֹם
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde una altura
  - altivamente
  - desde el cielo
  lexicon: HALOT
  rationale: El hebreo puede describir tanto posición elevada como actitud arrogante. 'Desde lo alto' conserva esa ambigüedad útil en español y permite leer tanto la ubicación como el porte altanero.
- source_word: יְדַבֵּרוּ
  english_pob_choice: they speak
  chosen_spanish: hablan
  alternatives_spanish:
  - hablan
  - dicen
  - pronuncian
  lexicon: HALOT
  rationale: Se mantiene el verbo repetido para respetar el paralelismo hebreo y el énfasis retórico del verso.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de WLC y el audit trail en inglés, preservando la dificultad léxica del verbo inicial y la posible ambigüedad de מִמָּרוֹם entre ubicación elevada y actitud altiva.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino.
  - '''Opresión'' se mantuvo para עֹשֶׁק conforme al valor semántico amplio del sustantivo.'
  - '''Desde lo alto'' conserva la metáfora espacial y deja abierta la lectura de arrogancia, como en la nota del POB en inglés.'
