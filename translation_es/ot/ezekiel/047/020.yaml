  yaml_path: translation/ot/ezekiel/047/020.yaml
  text: And the west side shall be the Great Sea[a], from the border up to opposite Lebo-hamath[b]. This is the west side.
  footnotes:
  - marker: a
    text: Hebrew Lebo-hamath, traditionally understood as 'the entrance of Hamath,' likely functioning here as a place-name in the northern extent of the land.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sea side'; in Israel's geography this denotes the west side, facing the Mediterranean ('the Great Sea').
    reason: cultural_note
