    issue: Uso de futuro interrogativo («¿Contarás... y sabrás...?»)
    rationale: Aunque posible en español, aquí desplaza la pregunta retórica hacia un matiz futurista menos alineado con la decisión inglesa «Do you count ... do you know» y con la vivacidad del interrogatorio divino.
  - severity: medium
    issue: «de su parto» no refleja tan bien el valor temporal de לִדְתָּנָה
    rationale: El infinitivo constructo con sufijo se expresa de forma más natural y fiel en español como «cuando dan a luz» o equivalente temporal, no como un sintagma nominal posesivo.
  - severity: low
    issue: «los meses que cumplen» suena algo poco idiomático sin apoyo de la nota
    rationale: La nota ya justifica la forma activa; mantenerla en el texto es defendible, pero conviene una sintaxis global más natural para que el lector no tropiece innecesariamente.
