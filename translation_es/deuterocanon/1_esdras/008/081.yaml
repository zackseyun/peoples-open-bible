lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora pues
  - Y ahora, pues
  lexicon: LSJ
  rationale: Conserva la transición temporal y conectiva del griego sin cargarla innecesariamente con una inferencia fuerte; en español, 'Y ahora' reproduce bien el arranque del enunciado.
- source_word: τὰς θυγατέρας ὑμῶν
  english_pob_choice: your daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - vuestras hijas
  - las hijas de ustedes
  lexicon: LSJ
  rationale: El posesivo de segunda persona plural se expresa de forma natural y pública como 'sus hijas' en español neutral latinoamericano; mantiene el referente familiar directo.
- source_word: μὴ συνοικίσητε
  english_pob_choice: do not give in marriage
  chosen_spanish: no unan ... con
  alternatives_spanish:
  - no den en matrimonio
  - no casen ... con
  - no junten ... en matrimonio
  lexicon: LSJ
  rationale: El verbo griego puede apuntar a hacer vivir juntos como marido y mujer; en español, 'unir ... con' permite conservar ese sentido sin forzar una fórmula más interpretativa. El marco matrimonial se entiende por el contexto y se explicita en nota.
- source_word: τοῖς υἱοῖς αὐτῶν
  english_pob_choice: to their sons
  chosen_spanish: con los hijos de ellos
  alternatives_spanish:
  - a sus hijos
  - con sus hijos
  lexicon: LSJ
  rationale: La construcción griega con dativo admite la idea relacional de matrimonio; en español, 'con los hijos de ellos' mantiene la referencia a las otras naciones/personas del contexto y evita introducir un giro demasiado idiomático que oculte la relación directa.
theological_decisions:
- issue: Prohibición de matrimonios mixtos
  english_pob_reading: do not give your daughters in marriage to their sons
  chosen_spanish_reading: no unan a sus hijas con los hijos de ellos
  alternative_spanish_readings:
  - no den a sus hijas en matrimonio a sus hijos
  - no casen a sus hijas con los hijos de ellos
  rationale: La frase pertenece a una prohibición de alianzas matrimoniales con el grupo en cuestión. Se prefirió una versión que conserve la fuerza relacional del griego y la tensión legal/covenantal del pasaje sin añadir glosas intrusivas en el cuerpo principal.
  doctrine_reference: Translation philosophy §§1, 4, 6
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando la nota [a] en el texto principal. La redacción fue ajustada para que la nota corresponda explícitamente a la ambigüedad léxica del griego συνοικίσητε y no quede suelta.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u այլ sustitución teológica porque no aparece el tetragrámaton en este versículo.
  - Se mantuvo un registro sobrio y publicable, sin calcos excesivamente rígidos.
  - '''Hijos de ellos'' conserva el referente contextual sin sobreinterpretar la identidad del grupo en el texto breve.'
