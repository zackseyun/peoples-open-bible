    text: Or 'twelve yokes of oxen'; the Hebrew refers to twelve paired teams for plowing.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''and threw his mantle over him.'' The garment signifies Elijah''s prophetic office in the surrounding context.'
    reason: lexical_alternative
