    text: 'O: «hizo de ella vasijas»; el verbo hebreo está en singular con un sufijo singular que se refiere a la plata restante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de servicio». El término hebreo puede entenderse como servicio cultual o ministerial.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para la ofrenda» o «para ofrecer». El hebreo no explicita aquí el objeto del ofrecer.'
    reason: alternative_reading
  revision_rationale: Se reubicó la nota [a] para reflejar la alternativa documentada del hebreo וַיַּעֲשֵׂהוּ. Se mejoró la naturalidad de «trajeron delante de» a «llevaron ante». Se cambió «tazones» por «cuencos» por mejor registro cultual en español general. Se usó «ofrecían» para expresar mejor el valor habitual/durativo de la cláusula final reforzada por תָּמִיד, sin introducir una paráfrasis extensa. Las notas [b] y [c] se conservaron por utilidad y fidelidad a las alternativas léxicas.
