    issue: «hasta la parte delantera de la llanura» es un calco poco natural
    rationale: Aunque intenta preservar ἐπὶ πρόσωπον, en español suena forzado. «Hasta el frente de la llanura» o «frente a la llanura» preserva mejor la imagen espacial con legibilidad.
  - severity: medium
    issue: «acamparon desde Baikteileth» suena antinatural en español
    rationale: El griego ἀπὸ debe respetarse, pero «desde» tras «acamparon» crea una construcción extraña. Una formulación como «acamparon partiendo de Baikteileth» mantiene la procedencia sin perder claridad.
  - severity: low
    issue: «un camino de tres días» es menos idiomático que «tres días de camino»
    rationale: Ambas opciones son entendibles, pero la segunda suena más natural en español general y sigue expresando una distancia medida por tiempo de viaje.
