translation:
  language: es
  text: Por esta razón hizo dos sorteos[a], uno para el pueblo de Dios y uno para todas las naciones;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, “todos los gentiles”. El griego puede designar a las naciones en general, especialmente en contraste con el pueblo de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Mantiene la relación causal-explícita del griego con un español natural y digno, sin endurecer el tono con una fórmula demasiado literal.
- source_word: ἐποίησεν
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - preparó
  lexicon: BDAG
  rationale: El verbo griego es general ('hizo'). En español, 'hizo' conserva esa amplitud mejor que introducir 'echó' o 'tiró' sin base explícita en el verbo.
- source_word: κλήρους
  english_pob_choice: lots
  chosen_spanish: suertes
  alternatives_spanish:
  - lotes
  - sortes
  lexicon: BDAG
  rationale: '''Suertes'' es el equivalente tradicional y claro en español bíblico para κλήρος en sentido de sorteo/decisión por sorteo. Conserva la fuerza técnica sin sonar extraño.'
- source_word: δύο
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos
  lexicon: BDAG
  rationale: Numeral directo, necesario para mantener el paralelismo contrastivo del versículo.
- source_word: λαῷ τοῦ θεοῦ
  english_pob_choice: the people of God
  chosen_spanish: el pueblo de Dios
  alternatives_spanish:
  - el pueblo de Dios
  - los de Dios
  lexicon: BDAG
  rationale: '''Pueblo de Dios'' refleja con naturalidad la construcción griega y conserva el carácter colectivo del referente.'
- source_word: πᾶσι τοῖς ἔθνεσιν
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los gentiles
  - todos los pueblos
  lexicon: BDAG
  rationale: Se mantiene el sentido amplio de ἔθνη como 'naciones', tal como la auditoría inglesa prefirió. 'Gentiles' queda como alternativa contextual, pero en el texto principal 'naciones' evita restringir indebidamente el alcance.
theological_decisions:
- issue: Contraste entre 'el pueblo de Dios' y 'todas las naciones'
  english_pob_reading: all the nations
  chosen_spanish_reading: todas las naciones
  alternative_spanish_readings:
  - todos los gentiles
  - todos los pueblos
  rationale: La oposición del griego es entre el pueblo de Dios y el conjunto de las naciones. 'Naciones' preserva el contraste sin imponer una etiqueta etnorreligiosa más estrecha de lo que exige el texto. La alternativa 'gentiles' se reserva para nota por su valor contextual en contraste bíblico.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto inglés POB y la revisión más reciente muestran alta concordancia y no presentan cambios pendientes; la formulación española sigue esa lectura estable, con ajuste idiomático natural en 'hizo dos suertes'.
  spanish_consistency_notes:
  - Se conserva el contraste inclusivo entre el pueblo de Dios y el ámbito más amplio de las naciones.
  - '''Suertes'' funciona aquí como término bíblico tradicional y comprensible para el sorteo o decisión por lotes.'
  - No se sustituye 'naciones' por 'gentiles' en el texto principal para no estrechar el alcance semántico del griego.
