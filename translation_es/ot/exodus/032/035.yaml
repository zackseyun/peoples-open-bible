translation:
  language: es
  text: Entonces Yahvé hirió al pueblo, porque hicieron el becerro que Aarón hizo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces Yahvé golpeó al pueblo porque hicieron el becerro que Aarón hizo». El verbo hebreo también puede entenderse en un sentido más general como «hirió», «golpeó» o «castigó»; aquí se evita añadir «plaga», porque no está expresada en el texto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגֹּף
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hirió con un castigo
  - castigó
  lexicon: HALOT
  rationale: El verbo hebreo נָגַף en este contexto expresa un golpe o aflicción de juicio; en español, «hirió» conserva la fuerza verbal sin introducir un objeto no expresado en el texto. Evita la especificación de «plaga» que la revisión inglesa descartó por no estar explícita aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton según la política del proyecto. «Yahvé» preserva el nombre propio y evita la sustitución por un título.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: «Pueblo» reproduce bien el sentido colectivo y de comunidad pactal de עָם en este pasaje.
- source_word: עַל אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - por cuanto
  lexicon: HALOT
  rationale: La construcción causal se expresa naturalmente con «porque» en español. Mantiene la relación de motivo sin recargar el verso.
- source_word: עָשׂוּ
  english_pob_choice: they made
  chosen_spanish: hicieron
  alternatives_spanish:
  - fabricaron
  - produjeron
  lexicon: HALOT
  rationale: Aunque עָשָׂה puede ser «hacer» o «fabricar», el texto ya identifica el objeto como el becerro. «Hicieron» refleja la acción culpable del pueblo de manera natural y evita repetir «hacer» de forma pesada.
- source_word: הָעֵגֶל
  english_pob_choice: the calf
  chosen_spanish: el becerro
  alternatives_spanish:
  - el ternero
  - el novillo
  lexicon: HALOT
  rationale: En español bíblico, «becerro» comunica el ídolo de Éxodo 32 de forma reconocible y digna. Aunque «calf» sería más literal, «becerro» es la forma asentada y clara en este contexto.
- source_word: אֲשֶׁר עָשָׂה אַהֲרֹן
  english_pob_choice: that Aaron made
  chosen_spanish: que Aarón había hecho
  alternatives_spanish:
  - que Aarón hizo
  - el cual Aarón hizo
  lexicon: HALOT
  rationale: La relativa identifica el becerro específico, el que Aarón hizo. El pluscuamperfecto en español («había hecho») ayuda a marcar la referencia retrospectiva y evita ambigüedad temporal en una oración ya cargada de juicio.
theological_decisions:
- issue: Naturaleza del juicio expresado por וַיִּגֹּף
  english_pob_reading: The LORD struck the people; the Hebrew verb can be rendered more generally as 'struck' or 'plagued.'
  chosen_spanish_reading: Yahvé hirió al pueblo; el verbo se entiende como un golpe o castigo divino sin añadir explícitamente «plaga».
  alternative_spanish_readings:
  - Yahvé golpeó al pueblo
  - Yahvé castigó al pueblo
  rationale: La revisión inglesa retiró «with a plague» por no estar explícito en el verbo. En español, «hirió» conserva la ambigüedad y la gravedad del juicio sin precisar el modo. Así se mantiene la tensión lexical del hebreo entre golpe/aflicción/jucio.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text sense without over-specifying the mode of judgment.'
- issue: Relación causal de la culpa del pueblo y el becerro hecho por Aarón
  english_pob_reading: because they made the calf that Aaron made
  chosen_spanish_reading: porque hicieron el becerro que Aarón había hecho
  alternative_spanish_readings:
  - porque hicieron el becerro que Aarón hizo
  - por lo que hicieron con el becerro que Aarón hizo
  rationale: El hebreo atribuye culpa al pueblo por el acto asociado al becerro y luego identifica el becerro como el hecho por Aarón. La redacción española conserva ambas capas sin diluir la responsabilidad colectiva ni borrar la referencia al acto de Aarón.
  doctrine_reference: Source-anchored rendering of the Hebrew causal clause and relative clause; no doctrinal expansion beyond the verse.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó la explicitación de «plague» y reformuló la causalidad para acercarse más al hebreo; la presente traducción sigue esa línea, manteniendo solo el verbo de juicio y la relación causal directa, sin introducir una plaga no expresada en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se usa «pueblo» para הָעָם como colectividad pactal.
  - Se conserva «becerro» por claridad bíblica en español; no se añade «de oro» porque el verso no lo dice explícitamente.
  - 'La alternancia entre «hicieron» y «había hecho» refleja las dos acciones del hebreo: la del pueblo y la de Aarón.'
