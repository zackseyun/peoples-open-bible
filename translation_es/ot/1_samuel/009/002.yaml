translation:
  language: es
  text: Y tenía un hijo cuyo nombre era Saúl, joven y hermoso. No había hombre entre los hijos de Israel más hermoso que él[a]; de los hombros para arriba era más alto que todo el pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No había hombre entre los israelitas más hermoso que él».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entre los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo varón
  - descendiente
  lexicon: HALOT
  rationale: 'El contexto inmediato es familiar y genealógico: Kish tenía un descendiente masculino. En español, «hijo» es la equivalencia natural y precisa; «hijo varón» resultaría pesado sin añadir sentido relevante aquí.'
- source_word: וּשְׁמוֹ
  english_pob_choice: whose name was
  chosen_spanish: cuyo nombre era
  alternatives_spanish:
  - y su nombre era
  lexicon: HALOT
  rationale: «Cuyo nombre era» reproduce con naturalidad en español la relación posesiva del hebreo y mantiene fluida la unión con «hijo».
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: convención onomástica
  rationale: Se usa la forma castellana establecida «Saúl», manteniendo el nombre propio transliterado según uso bíblico en español.
- source_word: בָּחוּר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - joven varón
  - mozo
  lexicon: HALOT
  rationale: El término describe a un varón en la flor de la vida. En español, «joven» comunica bien la cualidad etaria sin introducir un matiz vocacional que el hebreo no requiere aquí.
- source_word: טוֹב / וָטוֹב
  english_pob_choice: handsome
  chosen_spanish: hermoso
  alternatives_spanish:
  - apuesto
  - de buen parecer
  - bueno
  lexicon: HALOT
  rationale: Aquí טוֹב se usa para atractivo físico, como confirma la comparación posterior. «Hermoso» preserva ese valor estético en un registro digno y natural en español.
- source_word: וְאֵין אִישׁ מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: There was not a man among the sons of Israel
  chosen_spanish: No había hombre entre los hijos de Israel
  alternatives_spanish:
  - No había hombre entre los israelitas
  - Ningún hombre de Israel
  lexicon: HALOT
  rationale: Se conserva la construcción existencial y el giro específico «hijos de Israel», que refleja de cerca el hebreo. «Hombre» mantiene el singular אישי́, y evita neutralizar la frase en exceso.
- source_word: טוֹב מִמֶּנּוּ
  english_pob_choice: more handsome than he
  chosen_spanish: más hermoso que él
  alternatives_spanish:
  - más bueno que él
  - más apuesto que él
  lexicon: HALOT
  rationale: El comparativo continúa el sentido físico de טוֹב ya introducido. En español, «más hermoso que él» expresa con claridad la comparación estética sin depender de un «bueno» ambiguo.
- source_word: מִשִּׁכְמוֹ וָמַעְלָה
  english_pob_choice: from his shoulders upward
  chosen_spanish: desde los hombros para arriba
  alternatives_spanish:
  - desde los hombros hacia arriba
  - de los hombros para arriba
  lexicon: HALOT
  rationale: Se conserva el modismo corporal del hebreo y se lo vierte en una forma idiomática y comprensible en español. El plural «hombros» es la manera natural de expresar el punto de referencia anatómico.
- source_word: גָּבֹהַּ
  english_pob_choice: taller
  chosen_spanish: más alto
  alternatives_spanish:
  - más alto de estatura
  - tallado
  lexicon: HALOT
  rationale: En comparación con todo el pueblo, el adjetivo se refiere a estatura. «Más alto» es la forma más directa y natural en español para expresar esa comparación.
- source_word: מִכָּל הָעָם
  english_pob_choice: than all the people
  chosen_spanish: que todo el pueblo
  alternatives_spanish:
  - que toda la gente
  - que todos
  lexicon: HALOT
  rationale: La comparación colectiva del hebreo se mantiene con «todo el pueblo», que es fiel y natural. En este contexto, «pueblo» conserva mejor el tono bíblico que «gente».
theological_decisions:
- issue: Comparativo de טוֹב aplicado a la apariencia física de Saúl
  english_pob_reading: handsome / more handsome than he
  chosen_spanish_reading: hermoso / más hermoso que él
  alternative_spanish_readings:
  - apuesto / más apuesto que él
  - de buen parecer / de mejor parecer
  rationale: El hebreo repite טוֹב en un contexto de descripción corporal, y el contexto inmediato de estatura confirma que el rasgo es físico. «Hermoso» sostiene esa lectura sin suavizarla a un genérico «bueno».
  doctrine_reference: lexicografía hebrea y contexto narrativo inmediato
- issue: Conservación de la frase «hijos de Israel»
  english_pob_reading: among the sons of Israel
  chosen_spanish_reading: entre los hijos de Israel
  alternative_spanish_readings:
  - entre los israelitas
  - entre el pueblo de Israel
  rationale: La elección preserva el eco semítico del original sin perder inteligibilidad. No se convierte automáticamente en una expresión eclesiástica más tradicional, porque aquí la forma del hebreo aporta precisión textual.
  doctrine_reference: fidelidad formal al sintagma hebreo
- issue: Criterio para la medida de altura
  english_pob_reading: from his shoulders upward he was taller than all the people
  chosen_spanish_reading: desde los hombros para arriba era más alto que todo el pueblo
  alternative_spanish_readings:
  - desde los hombros hacia arriba era más alto que todos
  - de los hombros para arriba era más alto que todo el pueblo
  rationale: La expresión es un modismo de estatura, no una afirmación teológica. Se conserva como imagen corporal concreta para no borrar el colorido del hebreo.
  doctrine_reference: descripción narrativa literal
translation_notes:
  revision_awareness: El texto base y el control cruzado posterior muestran alta concordancia y no requerían cambios sustantivos; la presente redacción sigue la lectura ya estabilizada, manteniendo las mismas decisiones semánticas principales con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene «Saúl» con tilde, conforme al uso bíblico en español.
  - «Hermoso» se usa de manera consistente para el valor físico de טוֹב en este versículo.
  - «Hijos de Israel» se conserva en la nota para reflejar el hebreo sin desplazar el texto principal.
  - La comparación de estatura se expresa con «más alto», evitando una paráfrasis excesiva.
