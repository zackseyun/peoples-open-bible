translation:
  language: es
  text: Y escribió estas cosas a Demetrio el rey[a], y a Átalo, y a Ariarates, y a Arsaces,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego Ἀράθῃ probablemente se refiere a Ariarates; una transliteración más mecánica sería «Arates».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Además
  lexicon: LSJ
  rationale: La conjunción coordinante conserva la parataxis del griego y funciona naturalmente en español al encadenar los destinatarios de la carta.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - las siguientes cosas
  lexicon: LSJ
  rationale: El demostrativo neutro plural se expresa de forma directa como ‘estas cosas’, manteniendo el referente indefinido pero concreto al contenido ya mencionado.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - mandó por escrito
  - envió por escrito
  lexicon: LSJ
  rationale: ‘Escribió’ es el equivalente natural y fiel para el aoristo de γράφω en este contexto de comunicación escrita.
- source_word: Δημητρίῳ
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  alternatives_spanish:
  - Demetrio
  lexicon: Onomastic transliteration
  rationale: Se conserva la forma española usual del nombre propio en dativo, adecuada para lectores hispanohablantes.
- source_word: τῷ βασιλεῖ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: LSJ
  rationale: El artículo con sustantivo funciona como aposición a Demetrio; en español ‘el rey’ reproduce bien esa cualidad descriptiva sin forzar una traducción de título en mayúscula.
- source_word: Ἀττάλῳ
  english_pob_choice: Attalus
  chosen_spanish: Atalo
  alternatives_spanish:
  - Átalo
  lexicon: Onomastic transliteration
  rationale: Se usa la forma castellanizada del nombre histórico, más natural en español y reconocible en contexto helenístico.
- source_word: Ἀράθῃ
  english_pob_choice: Ariarathes
  chosen_spanish: Ariarates
  alternatives_spanish:
  - Arates
  - Arates
  lexicon: Historical name convention
  rationale: Aunque el griego de Swete presenta Ἀράθῃ, la identificación histórica habitual es Ariarathes; en español, ‘Ariarates’ preserva esa referencia mejor que una transliteración más mecánica.
- source_word: Ἀρσάκῃ
  english_pob_choice: Arsaces
  chosen_spanish: Arsaces
  alternatives_spanish:
  - Arsakes
  lexicon: Historical name convention
  rationale: Se mantiene la forma histórica convencional en español para este nombre real partio, coherente con el uso académico y bíblico tradicional.
translation_notes:
  revision_awareness: 'Sin cambios respecto del testimonio griego y el control de revisión: el texto griego, la traducción inglesa auditada y la identificación onomástica de Ἀράθῃ/Αriarathes coinciden con alta concordancia.'
  spanish_consistency_notes:
