translation:
  language: es
  text: Y que los devotos[a] vindiquen el juicio de su Dios, cuando los pecadores[b] sean quitados de delante del justo[c], uno que habla para agradar a los hombres, solo con engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piadosos».
    reason: lexical_alternative
  - marker: b
    text: O «impíos».
    reason: lexical_alternative
  - marker: c
    text: O «de la presencia del justo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσιοι
  english_pob_choice: the devout
  chosen_spanish: los devotos
  alternatives_spanish:
  - los santos
  - los piadosos
  lexicon: LSJ
  rationale: En este contexto poético, ὅσιοι describe personas piadosas o devotas, no seres consagrados en sentido técnico. «Devotos» conserva el valor humano y moral sin cargar el término con un matiz eclesiástico más fuerte del que el griego exige.
- source_word: δικαιώσαισαν
  english_pob_choice: vindicate
  chosen_spanish: vindiquen
  alternatives_spanish:
  - justifiquen
  - declaren justo
  - reconozcan como justo
  lexicon: LSJ
  rationale: 'Con κρίμα como objeto, el sentido es afirmar la justicia del juicio de Dios, no «hacer justo» a alguien. «Vindiquen» conserva bien el matiz forense y encaja con el optativo exhortativo: «y que ... vindiquen».'
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - veredicto
  - sentencia
  lexicon: LSJ
  rationale: «Juicio» es la equivalencia más natural en español para el campo judicial de κρίμα y funciona bien con «vindiquen». Mantiene la referencia al acto/decisión judicial de Dios.
- source_word: ἐν τῷ ἐξαίρεσθαι
  english_pob_choice: when ... are removed
  chosen_spanish: cuando ... sean retirados
  alternatives_spanish:
  - cuando ... sean quitados
  - al ser apartados
  lexicon: LSJ
  rationale: La construcción temporal se vierte de manera idiomática en español con «cuando ... sean retirados». «Retirados» preserva la idea de sacar o apartar a los malvados de esa presencia.
- source_word: ἁμαρτωλοὺς
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: LSJ
  rationale: «Pecadores» reproduce de modo directo el sentido moral básico del término y coincide con el registro bíblico español sin suavizar la acusación ética.
- source_word: ἀπὸ προσώπου δικαίου
  english_pob_choice: from before the righteous one / the righteous man
  chosen_spanish: de delante del justo
  alternatives_spanish:
  - de la presencia del justo
  - de ante el justo
  lexicon: LSJ
  rationale: Se conserva el giro idiomático con «de delante de», que refleja bien ἀπὸ προσώπου. Se opta por «el justo» para mantener la singularidad del griego y evitar introducir «hombre» donde el texto no lo exige.
- source_word: ἀνθρώπῳ ἀρέσκον
  english_pob_choice: one who speaks only to please men
  chosen_spanish: el que habla solo para agradar a los hombres
  alternatives_spanish:
  - el que busca agradar a los hombres
  - el hombre complaciente
  lexicon: LSJ
  rationale: La revisión inglesa entendió ἀρέσκον como participio sustantivado vinculado a lo que agrada al hombre. En español, «habla solo para agradar a los hombres» transmite con naturalidad la idea de discurso orientado a agradar humanamente.
- source_word: λαλοῦντα μόνον μετὰ δόλου
  english_pob_choice: speaking ... with deceit / one who speaks only ... with deceit
  chosen_spanish: habla ... con engaño
  alternatives_spanish:
  - habla solamente con engaño
  - habla solo con engaño
  lexicon: LSJ
  rationale: La secuencia griega es sintácticamente áspera en la transmisión; la revisión del POB destaca que μόνον modifica μετὰ δόλου. En español, «solo ... con engaño» queda integrado en la cláusula principal sin perder la idea de exclusividad y fraude. «Engaño» es una equivalencia transparente de δόλος.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que entiende el cierre como una descripción del que habla para agradar a los hombres y lo hace con engaño, sin convertir el participio en infinitivo de propósito. También conserva el singular de δικαίου y el valor temporal de ἐν τῷ ἐξαίρεσθαι. La nota textual inglesa sobre la irregularidad de número en el griego transmitido se refleja sin forzar una normalización.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino יהוה, sino «Dios».
  - Se mantuvo un registro bíblico sobrio y readable, evitando calcos excesivos como «faz» o «presencia» salvo en nota alternativa.
  - «Justo» se dejó en singular para respetar el griego y la auditoría inglesa; no se expandió a plural ni a una construcción interpretativa más amplia.
  - La clausula final se formuló de modo que «solo» modifique el acto de hablar para agradar y el engaño final, sin borrar la tensión sintáctica de la línea griega.
