translation:
  language: es
  text: Tras ello[a], una voz ruge; truena con su voz majestuosa, y no los retiene[b] cuando se oye su voz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Después, una voz ruge». El hebreo puede leerse adverbialmente, aunque el contexto probablemente remite al relámpago del versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no los demora», con «los» probablemente referido a los relámpagos o efectos de la tormenta liberados con el trueno.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «porque se oye su voz». La conjunción hebrea puede leerse también en sentido causal.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַחֲרָיו
  english_pob_choice: After it
  chosen_spanish: Después de ello
  alternatives_spanish:
  - Después
  - Luego de ello
  - Tras ello
  lexicon: HALOT
  rationale: La forma con sufijo retoma anafóricamente el fenómeno del versículo anterior; en español, «después de ello» conserva mejor ese enlace que una simple marca adverbial suelta.
- source_word: יִשְׁאַג קוֹל
  english_pob_choice: a voice roars
  chosen_spanish: una voz ruge
  alternatives_spanish:
  - su voz ruge
  - un sonido ruge
  lexicon: HALOT
  rationale: שׁאג transmite el rugido de un animal aplicado metafóricamente al trueno. «Una voz ruge» mantiene la imagen vívida sin introducir demasiado pronto el posesivo.
- source_word: יַרְעֵם
  english_pob_choice: he thunders
  chosen_spanish: truena
  alternatives_spanish:
  - él truena
  - produce truenos
  - retumba
  lexicon: HALOT
  rationale: El hifil de רעם expresa que Dios produce trueno; «truena» es natural en español y conserva la agencia divina con fluidez.
- source_word: בְּקוֹל גְּאוֹנוֹ
  english_pob_choice: with his majestic voice
  chosen_spanish: con la voz de su majestad
  alternatives_spanish:
  - con su voz majestuosa
  - con su voz exaltada
  lexicon: HALOT
  rationale: גָּאוֹן puede ser majestad, grandeza o exaltación. «La voz de su majestad» refleja el giro más formal y mantiene el matiz de grandeza divina; la construcción posesiva evita diluir el sustantivo abstracto.
- source_word: וְלֹא יְעַקְּבֵם
  english_pob_choice: and he does not hold them back
  chosen_spanish: y no los retiene
  alternatives_spanish:
  - y no los detiene
  - y no los demora
  - y no los frena
  lexicon: HALOT
  rationale: עכב en piel puede significar retener, impedir o demorar. «Retiene» es la opción más sobria y natural para la liberación de los efectos de la tormenta implícitos en el contexto.
- source_word: כִּי יִשָּׁמַע קוֹלוֹ
  english_pob_choice: when his voice is heard
  chosen_spanish: cuando se oye su voz
  alternatives_spanish:
  - porque se oye su voz
  - pues se oye su voz
  lexicon: HALOT
  rationale: כִּי admite valor temporal o causal. Aquí el flujo de la escena favorece el temporal; «cuando se oye su voz» comunica mejor la secuencia sin forzar una causalidad explícita.
theological_decisions:
- issue: Referente del sujeto que ruge y truena
  english_pob_reading: The subject is God, whose voice is manifested in thunder.
  chosen_spanish_reading: El sujeto implícito se entiende como Dios, cuya voz se manifiesta en el trueno.
  alternative_spanish_readings:
  - El sujeto podría ser una tormenta personificada.
  - La voz podría describirse de manera impersonal.
  rationale: El contexto inmediato de Elihú presenta a Dios actuando en la tormenta; el posesivo de «su voz» apoya un referente personal divino. La traducción mantiene la referencia implícita sin añadir «Dios» al texto principal.
  doctrine_reference: Teología del discurso divino en la tormenta; providencia y manifestación de Dios en Job 37.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre el texto hebreo, la traducción inglesa auditable y la revisión posterior; no se registraron revisiones aplicadas ni cambios pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino explícito; aquí el versículo no lo contiene.
  - Se conserva la metáfora acústica («voz», «ruge», «truena») sin sustituirla por una explicación interpretativa.
  - «Retiene» se usa para evitar una paraphrasis excesiva y mantener la ambigüedad controlada del antecedente de «los».
  - La nota a conserva la posible lectura adverbial sin borrar la referencia contextual al versículo anterior.
