translation:
  language: es
  text: Los sacerdotes los degollaron y aplicaron su sangre al altar[a] para hacer expiación por todo Israel, porque el rey había dicho que el holocausto y la ofrenda por el pecado[b] eran para todo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aplicaron su sangre al altar para purificarlo'; el verbo hebreo también puede expresar la realización de un rito de purificación o de ofrenda por el pecado.
    reason: lexical_alternative
  - marker: b
    text: O 'la ofrenda de purificación'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁחָטוּם
  english_pob_choice: slaughtered them
  chosen_spanish: los degollaron
  alternatives_spanish:
  - los sacrificaron
  - los mataron
  lexicon: HALOT
  rationale: En contexto sacrificial, שָׁחַט se refiere a degollar o sacrificar por degüello. 'Degollaron' conserva la acción ritual concreta mejor que 'mataron', y evita añadir explicaciones no dichas por el hebreo.
- source_word: וַיְחַטְּאוּ אֶת־דָּמָם הַמִּזְבֵּחָה
  english_pob_choice: applied their blood to the altar
  chosen_spanish: aplicaron su sangre al altar
  alternatives_spanish:
  - pusieron su sangre sobre el altar
  - purificaron el altar con su sangre
  lexicon: HALOT
  rationale: El hebreo describe la aplicación ritual de la sangre al altar. 'Aplicaron su sangre al altar' mantiene el acto visible sin adelantar en la frase la interpretación purificadora; esa matización queda implícita en el uso cultual y se preserva en la nota textual del inglés auditado.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para expiar
  - para realizar expiación
  lexicon: HALOT
  rationale: כפר en contexto sacrificial se traduce con naturalidad como 'hacer expiación' en español bíblico y moderno. 'Expiación' conserva el valor ritual y teológico sin forzar un lenguaje más técnico que el verso no exige.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: for all Israel
  chosen_spanish: por todo Israel
  alternatives_spanish:
  - en favor de todo Israel
  - por la totalidad de Israel
  lexicon: HALOT
  rationale: '''Por todo Israel'' comunica la cobertura representativa del acto expiatorio de manera natural en español. Mantiene el alcance comunitario del hebreo sin sobreexplicarlo.'
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: '''Holocausto'' es el término español tradicional y comprensible para עֹלָה en contexto sacrificial. Aunque ''ofrenda quemada'' es posible, ''holocausto'' corresponde mejor al registro bíblico usual y al paralelo cultual del pasaje.'
- source_word: וְהַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda de purificación
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: '''Ofrenda por el pecado'' mantiene la lectura sacrificial convencional de חַטָּאת y sigue siendo clara para lectores de español. Se evita ''purificación'' en el texto principal porque el hebreo aquí nombra la categoría sacrificial, aunque la dimensión purificadora siga siendo legítima.'
theological_decisions:
- issue: Sentido sacrificial de חטא / חטאת en un rito de expiación
  english_pob_reading: Use 'sin offering' in the main text while preserving 'purification offering' as an alternative in a footnote.
  chosen_spanish_reading: Usar 'ofrenda por el pecado' en el texto principal, preservando la posibilidad de entenderla como ofrenda de purificación en la tradición de lectura sacrificial.
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: El verso está en un procedimiento del templo, y la categoría sacrificial debe leerse de modo inteligible sin borrar su tensión semántica. 'Ofrenda por el pecado' conserva la nomenclatura tradicional; la alternativa 'ofrenda de purificación' sigue siendo teológicamente válida para el trasfondo del hebreo, pero no se impone como única lectura.
  doctrine_reference: Translation philosophy §3; §5
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la expresión 'as a sin offering' porque el hebreo dice que aplicaron la sangre al altar, no que la sangre misma fuera la ofrenda. Esta redacción española sigue esa revisión y mantiene la distinción entre la aplicación de la sangre y la mención posterior del holocausto y la ofrenda por el pecado.
  spanish_consistency_notes:
  - Se conservó el orden causal natural en español con 'porque'.
  - '''Todo Israel'' reproduce el alcance colectivo del hebreo sin singularizarlo.'
  - No se introdujeron marcadores de nota porque la versión final no necesita variantes ancladas en el texto.
  - 'La terminología sacrificial se mantuvo consistente: ''holocausto'' para עֹלָה y ''ofrenda por el pecado'' para חַטָּאת.'
