  to: 'Y dijo el filisteo a David: «¿Acaso soy yo un perro, para que vengas a mí con palos[a]?». Y el filisteo maldijo a David por sus dioses[b].'
  rationale: Se conserva el texto español principal casi intacto porque es fiel y natural, pero se corrigen las notas para que reflejen de manera exacta el aparato del POB inglés y se anclen en las palabras pertinentes del texto. Así se preservan tanto la fidelidad al hebreo como la trazabilidad lexical/theológica documentada.
