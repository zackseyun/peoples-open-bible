translation:
  language: es
  text: Los hombres jóvenes me vieron y se retiraron[a], y los de edad avanzada se levantaron y permanecieron de pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se escondieron»; el verbo hebreo también puede significar «ocultarse», pero aquí probablemente expresa una retirada deferente ante la presencia de Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּנִי
  english_pob_choice: saw me
  chosen_spanish: me vieron
  alternatives_spanish:
  - me miraron
  - me echaron una mirada
  lexicon: HALOT
  rationale: ראה expresa percepción visual directa; el español natural y fiel es «me vieron», sin añadir matices interpretativos.
- source_word: נְעָרִים
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los mozos
  lexicon: HALOT
  rationale: El plural masculino refiere a varones jóvenes. «Los jóvenes» mantiene el valor etario y funciona con naturalidad en español bíblico contemporáneo.
- source_word: וְנֶחְבָּאוּ
  english_pob_choice: withdrew
  chosen_spanish: se retiraron
  alternatives_spanish:
  - se ocultaron
  - se escondieron
  lexicon: HALOT
  rationale: El nifal de חבא puede significar «esconderse», pero aquí el contexto de honor sugiere una retirada deferente. «Se retiraron» conserva esa fuerza social sin perder la conexión lexical con el ocultarse.
- source_word: וִישִׁישִׁים
  english_pob_choice: the aged
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los de edad avanzada
  - los viejos
  lexicon: HALOT
  rationale: ישישים apunta a personas de edad avanzada, normalmente varones. «Los ancianos» es digno y breve, y no introduce necesariamente un cargo eclesiástico en este contexto poético.
- source_word: קָמוּ
  english_pob_choice: rose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: HALOT
  rationale: קום aquí describe el acto inicial de incorporarse en señal de respeto. «Se levantaron» es la equivalencia española más natural y mantiene la imagen de honor.
- source_word: עָמָדוּ
  english_pob_choice: stood
  chosen_spanish: permanecieron de pie
  alternatives_spanish:
  - quedaron de pie
  - se mantuvieron en pie
  lexicon: HALOT
  rationale: 'עמד completa el cuadro: no solo se incorporaron, sino que quedaron en postura respetuosa. «Permanecieron de pie» conserva la duplicación enfática del hebreo.'
translation_notes:
  revision_awareness: El texto sigue de cerca el WLC y coincide con el juicio de alta concordancia del audit trail inglés; se mantuvo la distinción hebrea entre קום y עמד mediante dos verbos españoles, sin colapsarlos en una sola acción. No hubo revisiones aplicadas en el contexto inglés, por lo que no se introducen cambios por armonización.
  spanish_consistency_notes:
  - Se prefirió «los jóvenes» y «los ancianos» por ser fórmulas claras, dignas y compatibles con el registro poético.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el verso no contiene el tetragrámaton ni léxico teológico sensible.
  - La duplicación verbal «se levantaron y permanecieron de pie» refleja el paralelismo hebreo y la intensificación de respeto ante Job.
