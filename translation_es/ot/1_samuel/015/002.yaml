    reason: lexical_alternative
  - marker: b
    text: 'O: «se puso contra él en el camino»; posiblemente, «le tendió una emboscada en el camino». La expresión hebrea se refiere a la acción hostil de Amalec contra Israel durante el éxodo.'
    reason: lexical_alternative
