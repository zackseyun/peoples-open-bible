base_translation:
  language: en
  yaml_path: translation/ot/zechariah/011/007.yaml
  text: So I shepherded the flock doomed to slaughter[a], therefore the afflicted of the flock. Then I took for myself two staffs; one I named Favor, and the other I named Union[c][b], and I shepherded the flock.
  footnotes:
  - marker: a
    text: Or 'the poor of the flock.' The Hebrew can denote those who are poor, afflicted, or humbled.
    reason: lexical_alternative
  - marker: b
    text: 'Favor: alternatively ''Beauty,'' ''Pleasantness,'' or ''Grace.'''
    reason: lexical_alternative
  - marker: c
    text: 'Union: alternatively ''Bonds'' or ''Bands,'' reflecting the idea of things bound together.'
    reason: lexical_alternative
