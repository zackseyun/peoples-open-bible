review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la línea del POB inglés: «su ofrenda», los dos recipientes de plata, sus pesos, el estándar «del santuario», y el contenido de harina fina mezclada con aceite para una מִנְחָה. Sin embargo, hay dos desajustes importantes con el expediente inglés: la nota [b] está anclada al sintagma del siclo del santuario, pero en el POB inglés la nota b documenta la alternativa léxica de מִזְרָק (''basin'' / ''sprinkling bowl''); además, el español omite por completo esa alternativa ritual del segundo recipiente. También «de peso de ciento treinta siclos» resulta poco natural frente al hebreo explícito sobre el peso.'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere pulido idiomático. «De peso de ciento treinta siclos» suena torpe; «que pesaba ciento treinta siclos» o «su peso era...» es más natural. «Plato de plata» es defendible para קַעֲרָה, aunque en contexto cultual «fuente» suele sonar más bíblico y menos doméstico; no obstante, puede mantenerse por fidelidad al expediente. «Ofrenda vegetal» es comprensible, pero en este contexto «ofrenda de grano» o «ofrenda de cereal» comunica mejor la categoría sacrificial que el inglés auditado preservó.
  glossary_alignment: No hay conflicto con términos del glosario principal como Yahvé/Mesías. Sí conviene alinear mejor מִנְחָה con la decisión inglesa «grain offering»; «ofrenda vegetal» es posible, pero se aparta innecesariamente del racional documentado. La nota léxica de מִזְרָק debe conservarse en español. El uso de «siclo del santuario» está bien alineado con la fórmula técnica.
  issues:
  - severity: high
    issue: La nota [b] está asignada al lugar equivocado.
    rationale: En el POB inglés, la nota b corresponde a מִזְרָק ('one silver basin' / 'one silver sprinkling bowl'), no a «según el siclo del santuario». El borrador altera el rastro de auditoría léxica.
  - severity: high
    issue: Falta en español la alternativa léxica del segundo recipiente מִזְרָק.
    rationale: El expediente inglés preserva una alternativa significativa de función ritual ('sprinkling bowl'). Debe mantenerse en nota española para fidelidad documental.
  - severity: medium
    issue: «De peso de ciento treinta siclos» es poco idiomático.
    rationale: Aunque intenta reflejar literalmente מִשְׁקָלָהּ, la frase suena forzada en español. «que pesaba ciento treinta siclos» preserva el sentido con mejor legibilidad.
  - severity: medium
    issue: «Ofrenda vegetal» se aparta de la decisión inglesa «grain offering».
    rationale: מִנְחָה en este contexto sacerdotal apunta específicamente a una ofrenda de cereal/grano. «Vegetal» es más amplio y menos preciso que la categoría sacrificatoria documentada.
  revised_spanish_text: Su ofrenda fue un plato de plata[a], que pesaba ciento treinta siclos, y un cuenco de plata[b] de setenta siclos, según el siclo del santuario; ambos llenos de flor de harina mezclada con aceite, para una ofrenda de grano.
