review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: mantiene la fórmula profética, el nombre divino «Yahvé», la imaginería corporal de «voz» y «ojos», la promesa de «recompensa» y el sujeto implícito plural de «volverán». Sin embargo, dos giros preposicionales en español no preservan con suficiente naturalidad la fuerza exhortativa del original: «Contén tu voz del llanto» y especialmente «tus ojos de las lágrimas» suenan poco idiomáticos. El hebreo expresa apartar o retener la voz del llanto y los ojos de las lágrimas; en español conviene explicitar mejor esa relación sin perder la imagen.'
  spanish_quality_summary: La base es clara y fiel, pero necesita un ajuste menor de naturalidad y fluidez. «Refrena tu voz del llanto» y «tus ojos de las lágrimas» resultan algo forzados; una formulación como «Refrena tu voz para que no llore[a] y tus ojos de derramar lágrimas» conserva el paralelismo y suena más natural en español eclesial contemporáneo. El resto del versículo es sólido y legible.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה -> «Yahvé» correctamente; שָׂכָר -> «recompensa» apropiado; פְעֻלָּה -> «trabajo» aceptable; no hay conflictos terminológicos mayores. La revisión propuesta no altera decisiones doctrinales ni léxicas centrales, solo mejora la expresión española de las frases con מִן.'
  issues:
  - severity: medium
    issue: «Contén tu voz del llanto» es comprensible pero poco idiomático en español.
    rationale: Aunque reproduce literalmente la estructura hebrea, en español suena duro y ambiguo. Conviene una formulación que mantenga «voz» pero exprese con más claridad la acción de dejar de llorar.
  - severity: high
    issue: «y tus ojos de las lágrimas» es un giro antinatural en español.
    rationale: La frase no suena propia del español y puede distraer al lector. El hebreo pide apartar o contener los ojos respecto a las lágrimas; «de derramar lágrimas» comunica el sentido de forma clara sin perder la imagen concreta.
  - severity: low
    issue: La nota alternativa «Detén tu voz del llanto» hereda el mismo problema de naturalidad.
    rationale: Debe ajustarse para ofrecer una alternativa española realmente útil y fiel, no solo un calco del inglés/hebreo.
