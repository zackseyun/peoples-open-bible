    text: O 'defiende su causa'. El hebreo dice literalmente 'haz su juicio/caso'.
    reason: lexical_alternative
  revision_rationale: Se revisa para lograr un español más natural y fiel al valor judicial de מִשְׁפָּטָם. 'Hazles justicia' comunica bien la idea de actuar judicialmente a favor de ellos, y la nota conserva el matiz literal y una alternativa cercana. También se mejora el modismo locativo a 'desde el cielo'. La concordancia final se ajusta hacia el plural semántico del hebreo, aunque el revisor reconoce que esta construcción española sigue siendo algo tensa; aun así no requiere adjudicación compleja.
