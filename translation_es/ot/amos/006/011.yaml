  - severity: medium
    issue: Los equivalentes de רְסִיסִים y בְּקִעִים quedaron desalineados con el audit trail.
    rationale: El inglés distingue «fragments» para רְסִיסִים y «pieces» para בְּקִעִים. El borrador principal usa «pedazos» para la primera y «fragmentos» para la segunda, borrando la distinción documentada.
  - severity: low
    issue: La nota al pie necesita ajustarse al texto revisado y a una redacción más natural en español.
    rationale: Debe reflejar con exactitud la alternativa más literal y mantener los matices «fisuras/pedazos» sin una puntuación innecesariamente rígida.
