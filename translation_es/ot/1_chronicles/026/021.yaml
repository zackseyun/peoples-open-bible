translation:
  language: es
  text: 'Los hijos de Ladan[a], los hijos del gersonita perteneciente a Ladan: los jefes[b] de las casas paternas pertenecientes a Ladan el gersonita fueron Jehieli.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «descendientes de Ladan». En contextos genealógicos, «hijos» puede designar una línea más amplia de descendencia.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «jefes de las casas paternas», es decir, líderes de unidades familiares ancestrales o clanes.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  lexicon: HALOT
  rationale: En registros genealógicos, "בְּנֵי" puede referirse a descendencia amplia. "Hijos de" conserva el paralelismo genealógico del texto y es natural en español bíblico; "descendientes de" explicita el sentido, pero suaviza la forma heredada de Crónicas.
- source_word: לַעְדָּן
  english_pob_choice: Ladan
  chosen_spanish: Ladan
  alternatives_spanish:
  - Laadán
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en transliteración. La forma "Ladan" coincide con el uso establecido en la tradición inglesa del POB y es publicable en español sin forzar una adaptación innecesaria.
- source_word: הַגֵּרְשֻׁנִּי
  english_pob_choice: the Gershonite
  chosen_spanish: el gersonita
  alternatives_spanish:
  - el descendiente de Gersón
  - el clan gersonita
  lexicon: HALOT
  rationale: El gentilicio expresa pertenencia tribal/clánica. "Gersonita" es la forma española transparente y fiel al valor adjetival; evita el nombre eclesiástico tradicional y mantiene la relación con Gersón.
- source_word: לְלַעְדָּן
  english_pob_choice: belonging to Ladan
  chosen_spanish: perteneciente a Ladan
  alternatives_spanish:
  - de Ladan
  - para Ladan
  lexicon: HALOT
  rationale: La lamed prefijada aquí marca relación/adscripción dentro de la genealogía. "Perteneciente a" explicita esa relación sin convertirla en una dirección espacial o finalidad.
- source_word: רָאשֵׁי
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  lexicon: HALOT
  rationale: En la expresión administrativa-genealógica, "רָאשֵׁי" designa dirigentes de unidades familiares. "Jefes" comunica bien la función sin perder el tono formal del hebreo; "cabezas" sería más literal pero menos idiomático en español.
- source_word: הָאָבוֹת
  english_pob_choice: fathers’ houses
  chosen_spanish: casas paternas
  alternatives_spanish:
  - casas de los padres
  - familias patriarcales
  lexicon: HALOT
  rationale: La locución hebrea es un término técnico para unidades familiares/clanes. "Casas paternas" conserva la estructura terminológica y la textura genealógica del original mejor que una simplificación a "familias".
- source_word: יְחִיאֵלִי
  english_pob_choice: Jehieli
  chosen_spanish: Jehieli
  alternatives_spanish:
  - Jehielí
  lexicon: HALOT
  rationale: Se translitera el nombre propio según su forma en el texto. "Jehieli" mantiene la convención ya reflejada en la audit trail inglesa y evita confundirlo con Jehiel.
theological_decisions:
- issue: Sentido genealógico de "hijos" en un listado tribal
  english_pob_reading: '''sons of'' can denote a broader line of descent.'
  chosen_spanish_reading: '"hijos de" puede denotar una línea más amplia de descendencia en un contexto genealógico.'
  alternative_spanish_readings:
  - '"descendientes de"'
  rationale: No se debe restringir el hebreo a filiación biológica inmediata. En Crónicas, la fórmula genealógica enumera linajes/clanes; por eso se conserva la ambigüedad controlada de descendencia amplia.
  doctrine_reference: 1 Crónicas 26:21; uso genealógico de בני en registros tribales
- issue: Alcance de "casas paternas" como unidad social
  english_pob_reading: '''heads of the fathers’ houses,'' that is, leaders of ancestral family units or clans.'
  chosen_spanish_reading: '"casas paternas" señala unidades familiares ancestrales o clanes, no edificios literales.'
  alternative_spanish_readings:
  - '"familias"'
  - '"casas de los padres"'
  rationale: La expresión hebrea es un tecnicismo social. Mantenerla ayuda a preservar la organización interna del texto y evita aplanarla a un sentido moderno de vivienda.
  doctrine_reference: Números 1:2; 1 Crónicas 24–27
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se mantuvo la lectura genealógica estándar y se resolvieron las relaciones sintácticas comprimidas del hebreo con español explícito, sin introducir cambios doctrinales ni variantes textuales.
  spanish_consistency_notes:
  - Se usa "hijos de" para בני en estilo genealógico, con nota que preserva la alternativa de descendientes.
  - Se mantiene "Ladan" como transliteración consistente con el registro auditado.
  - '"Gersonita" traduce el gentilicio sin sustituirlo por terminología eclesiástica.'
  - '"Casas paternas" conserva el tecnicismo genealógico y armoniza con otros pasajes de Crónicas.'
  - Los nombres propios se dejan sin hispanización adicional para evitar ambigüedad.
