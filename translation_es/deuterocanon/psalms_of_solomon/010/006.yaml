revisions:
- from: Recto y santo es Yahvé nuestro en sus juicios para siempre[a], y Israel alabará el nombre de Yahvé con alegría.
  to: Justo y santo es Yahvé en sus juicios para siempre[a], e Israel alabará el nombre de Yahvé con alegría.
  rationale: Se corrige la construcción antinatural «Yahvé nuestro», se ajusta δίκαιος a «justo» por mejor legibilidad y registro bíblico en español, se mantiene el orden enfático del griego, y se reemplaza la nota por una alternativa sintáctica que sí corresponde al historial de auditoría inglesa. También se usa «e Israel» por eufonía ante palabra que inicia con sonido /i/.
  reviewer_model: gpt-5.4
