source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν· Κορνήλιος ἑκατοντάρχης, ἀνὴρ δίκαιος καὶ φοβούμενος τὸν θεὸν μαρτυρούμενός τε ὑπὸ ὅλου τοῦ ἔθνους τῶν Ἰουδαίων, ἐχρηματίσθη ὑπὸ ἀγγέλου ἁγίου μεταπέμψασθαί σε εἰς τὸν οἶκον αὐτοῦ καὶ ἀκοῦσαι ῥήματα παρὰ σοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/010/022.yaml
  text: They said[a], “Cornelius, a centurion, a righteous man and one who fears God, and who is well spoken of by the whole nation of the Jews[e][d][c][b], was divinely instructed by a holy angel to summon you to his house and to hear words from you.”
  footnotes:
  - marker: a
    text: Or “by all the Jewish people.” The Greek says “by the whole nation of the Jews,” where “nation” refers to a people-group, not necessarily a modern political state.
    reason: lexical_alternative
  - marker: b
    text: Or “was warned” or “received a divine message.” The Greek verb indicates a divine communication.
    reason: lexical_alternative
  - marker: c
    text: Or “to summon you.”
    reason: lexical_alternative
  - marker: d
    text: Or “to hear a message from you.” Literally, “to hear words from you.”
    reason: lexical_alternative
  - marker: e
    text: Or 'to send for you to come to his house'.
    reason: previous_rendering
translation:
  language: ko
  text: 그들이 말하였습니다. 「백부장 고넬료라는 의롭고 하나님을 경외하는 분이, 유대 온 민족에게 좋게 평이 난 분인데, 거룩한 천사로부터 신적인 지시를 받아, 당신을 자기 집으로 청하여 당신의 말을 들으려 합니다.」
  philosophy: optimal-equivalence
