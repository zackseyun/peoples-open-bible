revisions:
- from: hasta que una flecha le atraviese el hígado, como un ave que se apresura hacia una trampa, y no sabe que le costará la vida[a].
  to: hasta que una flecha le atraviese el hígado, como un ave que se precipita a la trampa, y no sabe que le costará la vida[a].
  rationale: Se ajusta 'hacia una trampa' a 'a la trampa' para reflejar mejor la imagen hebrea y la decisión auditada en inglés de entrada al lazo, no mera dirección. También se pule la nota para un español más natural sin alterar su contenido. No se requieren cambios doctrinales ni de terminología del proyecto.
