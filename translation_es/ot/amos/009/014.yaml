translation:
  language: es
  text: Restauraré la prosperidad[a] de mi pueblo Israel, y ellos reedificarán las ciudades asoladas y habitarán en ellas; plantarán viñas y beberán su vino; harán huertos y comerán su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «restauraré el cautiverio de mi pueblo Israel» / «haré volver a los cautivos de mi pueblo Israel». La fórmula hebrea de restauración puede denotar tanto retorno del cautiverio como una reversión más amplia de la aflicción.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשַׁבְתִּי / שְׁבוּת
  english_pob_choice: I will restore the fortunes
  chosen_spanish: Restauraré la fortuna
  alternatives_spanish:
  - Restauraré el cautiverio
  - Haré volver a los cautivos
  lexicon: HALOT
  rationale: La fórmula hebrea שׁוּב שְׁבוּת admite tanto la idea de retorno del cautiverio como una reversión más amplia de la desgracia. Como en el contexto inmediato siguen reconstrucción, vivienda y abundancia agrícola, el sentido restaurativo global queda mejor expresado en español con «restauraré la fortuna». Mantuve el singular abstracto para reflejar el giro idiomático, aunque la nota conserva la alternativa más literal.
- source_word: עַמִּי יִשְׂרָאֵל
  english_pob_choice: my people Israel
  chosen_spanish: mi pueblo Israel
  alternatives_spanish:
  - mi pueblo, Israel
  lexicon: HALOT
  rationale: Se conserva la relación de pertenencia del pacto y la aposición entre «mi pueblo» e «Israel». En español, sin coma, la frase fluye con naturalidad y mantiene la fuerza del hebreo.
- source_word: וּבָנוּ
  english_pob_choice: they will rebuild
  chosen_spanish: reedificarán
  alternatives_spanish:
  - construirán
  lexicon: HALOT
  rationale: Aunque el verbo básico es «construir», el contexto de ciudades devastadas exige una solución que exprese restauración. «Reedificarán» comunica mejor ese valor sin añadir contenido ajeno.
- source_word: עָרִים נְשַׁמּוֹת
  english_pob_choice: ruined cities
  chosen_spanish: las ciudades asoladas
  alternatives_spanish:
  - las ciudades arruinadas
  - las ciudades devastadas
  lexicon: HALOT
  rationale: נְשַׁמּוֹת describe ciudades reducidas a ruina o desolación. «Asoladas» es un término bíblico y transparente en español, y conserva el matiz de devastación.
- source_word: וְיָשָׁבוּ
  english_pob_choice: inhabit them
  chosen_spanish: habitarán en ellas
  alternatives_spanish:
  - vivirán en ellas
  - se establecerán en ellas
  lexicon: HALOT
  rationale: «Habitar» reproduce bien el valor de ישׁב en este contexto de ocupación estable de las ciudades restauradas. Es más formal que «vivir» y encaja con el registro de la sección.
- source_word: וְנָטְעוּ כְרָמִים
  english_pob_choice: they will plant vineyards
  chosen_spanish: plantarán viñas
  alternatives_spanish:
  - plantarán viñedos
  lexicon: HALOT
  rationale: כְרָמִים puede expresarse naturalmente como «viñas» o «viñedos». Elegí «viñas» por su brevedad y por mantener el paralelismo con la imagen agrícola del versículo.
- source_word: וְשָׁתוּ אֶת יֵינָם
  english_pob_choice: drink their wine
  chosen_spanish: beberán su vino
  alternatives_spanish:
  - beberán el vino de ellas
  - beberán el vino suyo
  lexicon: HALOT
  rationale: El sufijo posesivo puede referirse a las viñas plantadas y al fruto de su labor. «Su vino» preserva la referencia posesiva sin forzar una explicación explícita.
- source_word: וְעָשׂוּ גַנּוֹת
  english_pob_choice: they will make gardens
  chosen_spanish: harán huertos
  alternatives_spanish:
  - harán jardines
  - cultivarán huertos
  lexicon: HALOT
  rationale: עָשׂוּ con גַנּוֹת es literalmente «harán». En español, «huertos» comunica mejor el campo semántico agrícola de גַנּוֹת que «jardines», que puede sonar más ornamental.
- source_word: וְאָכְל֖וּ אֶת פְּרִי/הֶם
  english_pob_choice: eat their fruit
  chosen_spanish: comerán su fruto
  alternatives_spanish:
  - comerán su producción
  - comerán el fruto de ellos
  lexicon: HALOT
  rationale: פְּרִי es «fruto» de manera directa, y en este contexto incluye la producción comestible de los huertos. «Su fruto» conserva la relación posesiva y el paralelismo con el verso.
theological_decisions:
- issue: La fórmula de restauración שׁוּב שְׁבוּת
  english_pob_reading: restore the fortunes
  chosen_spanish_reading: restauraré la fortuna
  alternative_spanish_readings:
  - restauraré el cautiverio
  - haré volver a los cautivos
  rationale: La lectura inglesa evita reducir la expresión a un regreso literal del exilio y la entiende como una reversión amplia del estado de aflicción. En Amos 9:14, los elementos de reconstrucción urbana y abundancia agrícola confirman esa amplitud; por eso el español principal refleja restauración integral, mientras que las alternativas literales quedan preservadas en la nota.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y conserva la decisión revisada del POB inglés de usar una formulación más formal que simple «vivirán» para וְיָשָׁבוּ; aquí se expresó como «habitarán en ellas». También se mantuvo el alcance amplio de la fórmula de restauración, como en la última revisión inglesa y en el consenso de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la terminología POB cuando el Tetragrámaton aparece explícitamente; aquí no aparece, por lo que no se introdujo.
  - Se prefirió el registro bíblico-formal «reedificarán» y «habitarán» para conservar la solemnidad del pasaje sin arcaísmos innecesarios.
  - «Huertos» se eligió por claridad agrícola en español; la alternativa «jardines» queda implícitamente descartada por el campo semántico del hebreo en este contexto.
  - La puntuación con punto y coma preserva el paralelismo de las acciones sucesivas del hebreo.
