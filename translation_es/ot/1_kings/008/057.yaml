translation:
  language: es
  text: Que Yahvé nuestro Dios esté con nosotros[a], como estuvo con nuestros padres. Que no nos deje ni nos abandone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El hebreo dice «nuestros padres», refiriéndose a los antepasados de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: Que ... esté
  alternatives_spanish:
  - Que ... sea
  - Ojalá ... esté
  lexicon: HALOT
  rationale: El jussivo expresa una petición o deseo; en español, «Que ... esté» comunica con naturalidad ese valor volitivo en forma de oración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton, siguiendo la convención española del proyecto de usar «Yahvé» y no una sustitución por título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: La construcción con sufijo posesivo de primera persona plural se expresa de manera directa y natural como «nuestro Dios».
- source_word: עִמָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - entre nosotros
  - junto a nosotros
  lexicon: HALOT
  rationale: Aquí עם con sufijo señala compañía/presencia; «con nosotros» es la opción más precisa y natural en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce la comparación con la presencia previa de Dios; «como» conserva la relación comparativa sin recargar la frase.
- source_word: הָיָה עִם אֲבֹתֵינוּ
  english_pob_choice: he was with our fathers
  chosen_spanish: estuvo con nuestros padres
  alternatives_spanish:
  - estuvo con nuestros antepasados
  - estuvo con nuestros antecesores
  lexicon: HALOT
  rationale: Se mantiene el término filial-ancestral del hebreo אבותינו como «padres», ya documentado en el auditable inglés; «estuvo» expresa el perfecto narrativo de manera fluida.
- source_word: אַל יַעַזְבֵנוּ
  english_pob_choice: May he not forsake us
  chosen_spanish: Que no nos abandone
  alternatives_spanish:
  - Que no nos deje
  - Que no nos desampare
  lexicon: HALOT
  rationale: עזב puede implicar dejar o abandonar; «abandonar» preserva la carga relacional/covenantal de «forsake» sin sonar arcaico.
- source_word: וְאַל יִטְּשֵׁנוּ
  english_pob_choice: or abandon us
  chosen_spanish: ni nos deje
  alternatives_spanish:
  - ni nos abandone
  - ni nos rechace
  - ni nos deseche
  lexicon: HALOT
  rationale: נטש añade un matiz cercano pero no idéntico a עזב; en español, «deje» evita una repetición total y conserva la tensión paralela del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente; el proyecto español usa «Yahvé» para preservar el nombre personal de Dios y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Término אֲבֹתֵינוּ
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  - nuestros ancestros
  rationale: El hebreo es masculino plural y alude a los antepasados de Israel; se conserva la forma masculina y el vínculo con la formulación tradicional del texto, sin neutralizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El pasaje coincide con el control auditado y no requiere cambios de sentido respecto del texto base inglés; se mantuvieron el nombre divino, la comparación temporal y el paralelismo negativo de los dos verbos finales. La única decisión que abre una alternativa explícita en español es el valor de אֲבֹתֵינוּ, donde «padres» es la forma principal y «antepasados» queda como nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español del proyecto.
  - Se conserva la distinción entre «abandonar» y «dejar» para reflejar la pareja verbal hebrea עזב / נטש.
  - «Nuestros padres» se usa en sentido genealógico-covenantal, no como referencia exclusiva a progenitores inmediatos.
