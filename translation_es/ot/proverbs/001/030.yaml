    issue: Las notas al pie no corresponden a los mismos puntos significativos preservados en la auditoría inglesa.
    rationale: El inglés conserva una alternativa para «They would not accept my counsel» y otra para «my reproof / correction / rebuke». En el borrador, ambas notas están ancladas a «mi consejo», dejando sin nota el segundo hemistiquio.
  - severity: low
    issue: La nota sobre «consejo» es más interpretativa que necesaria en este versículo.
    rationale: Puede ser útil en abstracto, pero aquí no responde a una ambigüedad relevante del texto fuente ni a una necesidad creada por el español. Conviene priorizar las alternativas léxicas documentadas por el POB.
