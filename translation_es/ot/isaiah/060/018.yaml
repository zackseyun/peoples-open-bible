translation:
  language: es
  text: Ya no se oirá violencia en tu tierra, ni devastación o destrucción[a] dentro de tus fronteras; y llamarás a tus muros Salvación, y a tus puertas Alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'despojo y ruina' para 'devastación o destrucción'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׁמַע
  english_pob_choice: will ... be heard
  chosen_spanish: se oirá
  alternatives_spanish:
  - será oído
  - se escuchará
  lexicon: WLC / HALOT
  rationale: El nifal futuro comunica recepción pasiva del sonido o del rumor. En español, 'se oirá' reproduce de forma natural la idea de que ya no llegará a oídos de nadie la violencia, sin volverlo demasiado literal o pesado.
- source_word: חָמָס
  english_pob_choice: Violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - maldad violenta
  lexicon: WLC / HALOT
  rationale: '''Violencia'' es el equivalente directo y mantiene el peso social y moral del término hebreo, en línea con la decisión inglesa de no suavizarlo.'
- source_word: בְּאַרְצֵךְ
  english_pob_choice: in your land
  chosen_spanish: en tu tierra
  alternatives_spanish:
  - en tu país
  - en tu tierra/país
  lexicon: WLC / HALOT
  rationale: '''Tierra'' conserva el sentido bíblico-geográfico de אֶרֶץ y su resonancia de territorio prometido o habitado, más natural que ''país'' en este contexto profético.'
- source_word: שֹׁד
  english_pob_choice: devastation
  chosen_spanish: devastación
  alternatives_spanish:
  - despojo
  - saqueo
  - ruina
  lexicon: WLC / HALOT
  rationale: '''Devastación'' comunica el efecto destructivo del término y armoniza con la pareja paralela del versículo, sin reducirlo solo a la idea de pillaje.'
- source_word: שֶׁבֶר
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - quebrantamiento
  - quiebra
  lexicon: WLC / HALOT
  rationale: El hebreo puede abarcar 'quebranto' o 'ruina', pero 'destrucción' encaja bien en la serie y evita una expresión extraña en español.
- source_word: בִּגְבוּלָיִךְ
  english_pob_choice: within your borders
  chosen_spanish: dentro de tus fronteras
  alternatives_spanish:
  - dentro de tus límites
  - en tus fronteras
  - dentro de tu territorio
  lexicon: WLC / HALOT
  rationale: '''Fronteras'' expresa de modo claro y idiomático el campo semántico de גבול. ''Dentro de'' preserva la localización interior del mal ausente.'
- source_word: וְקָרָאת
  english_pob_choice: and you will call
  chosen_spanish: y llamarás
  alternatives_spanish:
  - y pondrás por nombre
  - y nombrarás
  lexicon: WLC / HALOT
  rationale: La forma verbal se mantiene en futuro consecutivo de sentido profético. 'Llamarás' respeta el hebreo directo sin introducir un contraste no presente en el texto.
- source_word: יְשׁוּעָה
  english_pob_choice: Salvation
  chosen_spanish: Salvación
  alternatives_spanish:
  - liberación
  - socorro
  - victoria
  lexicon: WLC / HALOT
  rationale: Como nombre dado a los muros, el sustantivo debe conservar su fuerza nominal y teológica. 'Salvación' es la opción más transparente y alineada con el valor del término en contexto profético.
- source_word: חוֹמֹתַיִךְ
  english_pob_choice: your walls
  chosen_spanish: tus muros
  alternatives_spanish:
  - tus murallas
  - tus paredes
  lexicon: WLC / HALOT
  rationale: '''Muros'' mantiene la idea de fortificación urbana y resulta más directo que ''murallas'' en español general, sin perder la imagen defensiva.'
- source_word: שְׁעָרַיִךְ
  english_pob_choice: your gates
  chosen_spanish: tus puertas
  alternatives_spanish:
  - tus portones
  - tus accesos
  lexicon: WLC / HALOT
  rationale: '''Puertas'' es la equivalencia más natural y bíblicamente reconocible para שערים; conserva el paralelismo con los muros.'
- source_word: תְּהִלָּה
  english_pob_choice: Praise
  chosen_spanish: Alabanza
  alternatives_spanish:
  - praise/loor
  - gloria
  - renombre
  lexicon: WLC / HALOT
  rationale: Como nombre otorgado a las puertas, 'Alabanza' mantiene el valor nominal y de culto del hebreo. 'Loor' sería más arcaico y menos transparente para lectores actuales.
theological_decisions:
- issue: Si יְשׁוּעָה y תְּהִלָּה deben mantenerse como nombres/títulos o solo como sustantivos descriptivos
  english_pob_reading: Walls Salvation, and your gates Praise
  chosen_spanish_reading: muros Salvación, y tus puertas, Alabanza
  alternative_spanish_readings:
  - muros de salvación, y puertas de alabanza
  - muros llamados salvación, y puertas llamadas alabanza
  rationale: 'La sintaxis hebrea presenta una designación nominal: la ciudad será tan segura y restaurada que sus elementos reciben nombres programáticos. En español, las mayúsculas en ''Salvación'' y ''Alabanza'' ayudan a comunicar ese carácter de nombre sin añadir palabras que no están en el texto.'
  doctrine_reference: Isaías 60:18; naming/title function in prophetic Hebrew
translation_notes:
  revision_awareness: 'El texto sigue la revisión auditada del inglés POB: se evita introducir contraste adversativo donde el hebreo solo usa coordinación con וְ. También se conserva el paralelismo nominal de los nombres dados a muros y puertas, como en la última revisión aprobada.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - '''Tierra'' y ''fronteras'' reflejan el registro profético-geográfico del hebreo, evitando modernizaciones innecesarias.'
  - La alternancia entre sustantivos comunes y nombres titulativos se marca con mayúscula solo en 'Salvación' y 'Alabanza' para preservar la función nominativa observada en el audit trail.
