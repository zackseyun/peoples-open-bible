translation:
  language: es
  text: ¡Pues no nos has llevado a una tierra que mana leche y miel, ni nos has dado heredad de campos y viñas. ¿Vas a sacarles[a] los ojos a estos hombres? No subiremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Vas a cegarlos?» El hebreo dice literalmente: «¿Vas a sacarles los ojos?», y también puede implicar tratarlos como si fueran ciegos a la verdad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף לֹא
  english_pob_choice: Indeed, ... not
  chosen_spanish: ¡Pues no...!
  alternatives_spanish:
  - Ciertamente, no...
  - Además, no...
  lexicon: HALOT
  rationale: אַף intensifica la queja. En español, «¡Pues no...!» comunica bien el tono enfático y acusatorio sin perder la negación.
- source_word: אֶל אֶרֶץ זָבַת חָלָב וּדְבַשׁ
  english_pob_choice: into a land flowing with milk and honey
  chosen_spanish: a una tierra que fluye leche y miel
  alternatives_spanish:
  - a una tierra que mana leche y miel
  - a una tierra que fluye con leche y miel
  lexicon: HALOT
  rationale: La imagen idiomática debe conservarse. «Que fluye leche y miel» sigue el valor metafórico del hebreo y resulta natural en español bíblico contemporáneo.
- source_word: הֲבִיאֹתָנוּ
  english_pob_choice: you have not brought us
  chosen_spanish: no nos has llevado
  alternatives_spanish:
  - no nos has traído
  - no nos has conducido
  lexicon: HALOT
  rationale: El hebreo acusa a Moisés por no haberlos introducido en la tierra prometida; «llevar» reproduce bien la idea de conducir a un destino en español, con tono más natural que una mera calca.
- source_word: וַתִּתֶּן לָנוּ נַחֲלַת שָׂדֶה וָכָרֶם
  english_pob_choice: nor have you given us an inheritance of fields and vineyards
  chosen_spanish: ni nos has dado heredad de campos y viñas
  alternatives_spanish:
  - ni nos has dado una heredad de campos y viñedos
  - ni nos has concedido posesión de campos y viñas
  lexicon: HALOT
  rationale: נַחֲלָה es «heredad»/«herencia» en sentido de posesión asignada. «Campos y viñas» conserva el plural colectivo que la revisión inglesa confirmó como más natural.
- source_word: הַעֵינֵי הָאֲנָשִׁים הָהֵם תְּנַקֵּר
  english_pob_choice: Will you gouge out the eyes of these men?
  chosen_spanish: ¿Vas a sacar[a] los ojos de estos hombres?
  alternatives_spanish:
  - ¿Vas a arrancarles los ojos a estos hombres?
  - ¿Vas a cegarlos?
  lexicon: HALOT
  rationale: נקר en piel expresa el acto violento de sacar/gouge out. «Sacar los ojos» mantiene la imagen concreta; el español permite el objeto directo sin añadir más explicación al cuerpo del versículo.
- source_word: לֹא נַעֲלֶה
  english_pob_choice: We will not come up
  chosen_spanish: No subiremos
  alternatives_spanish:
  - No iremos allá arriba
  - No ascenderemos
  lexicon: HALOT
  rationale: עלה es «subir». Aquí responde al llamado de Moisés; «No subiremos» conserva el movimiento direccional y la brevedad del hebreo.
theological_decisions:
- issue: Tierra prometida como provisión de Yahvé
  english_pob_reading: land flowing with milk and honey; inheritance of fields and vineyards
  chosen_spanish_reading: una tierra que fluye leche y miel; heredad de campos y viñas
  alternative_spanish_readings:
  - una tierra de abundancia; posesión de campos y viñas
  - una tierra prometida de fertilidad; herencia agrícola
  rationale: No se suaviza la imagen de abundancia ni la idea de reparto heredado. La queja israelita acusa la falta de cumplimiento de la promesa histórica, por lo que conviene mantener tanto la metáfora como el lenguaje de heredad.
  doctrine_reference: Promesa pactal de la tierra en la Torá
- issue: Idiom of blinding as violent contempt
  english_pob_reading: Will you gouge out the eyes... / Or, 'Will you blind these men?'
  chosen_spanish_reading: ¿Vas a sacar los ojos de estos hombres?
  alternative_spanish_readings:
  - ¿Vas a cegarlos?
  - ¿Vas a sacarles la vista a estos hombres?
  rationale: El hebreo conserva una imagen corporal fuerte; no debe reducirse en el texto principal a una abstracción. La nota permite la lectura idiomática de «cegar», pero el versículo debe mantener la crudeza del gesto.
  doctrine_reference: Uso bíblico de la metáfora corporal para violencia y desprecio
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «field and vineyard» a «fields and vineyards». La versión española sigue ese ajuste con el plural colectivo «campos y viñas». También se preservó la fuerza idiomática de la amenaza ocular, anclándola con una nota alternativa solo donde aparece en el texto.
  spanish_consistency_notes:
  - Se usa «heredad» para נַחֲלָה, coherente con el valor de posesión asignada.
  - Se prefiere «subiremos» para לֹא נַעֲלֶה por la perspectiva direccional del hebreo.
  - El plural colectivo «campos y viñas» refleja la revisión inglesa y evita una singularidad artificial en español.
  - La nota [a] está anclada exactamente en «sacar[a]» para cumplir la correspondencia texto-nota.
