review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido básico del hebreo: datación regnal, identificación de Sisac/Sisaq como rey de Egipto, y avance militar contra Jerusalén. Sin embargo, la nota al pie no preserva correctamente la alternativa del POB inglés, porque repite la lectura principal (''subió contra Jerusalén'') como si fuera alternativa y omite la opción más cercana a ''went up against''.'
  spanish_quality_summary: El español es claro y natural. 'En el quinto año del rey Roboam... subió contra Jerusalén' suena idiomático y digno. La principal mejora necesaria es la nota al pie. Además, 'Sisaq' es comprensible pero menos reconocible en español bíblico general que 'Sisac'; dado que el propio borrador justifica apartarse de la forma tradicional, no es un error grave, pero sí una decisión menos legible para el público meta.
  glossary_alignment: No hay términos del glosario principal directamente implicados salvo la consistencia de nombres propios. El borrador no contradice ninguna política mayor del proyecto. La elección 'Sisaq' es defendible como transliteración más transparente del hebreo, aunque en español eclesial suele preferirse 'Sisac'. 'Subió contra' preserva adecuadamente el valor de עָלָה ... עַל.
  issues:
  - severity: medium
    issue: La nota al pie lexical_alternative es defectuosa.
    rationale: 'La nota dice que también podría traducirse ''subió contra Jerusalén'' o ''vino contra Jerusalén'', pero la primera no es alternativa: es exactamente el texto principal. Además, el inglés auditado preserva explícitamente la alternativa ''went up against'', cuya mejor correspondencia española sería ''subió contra'' / ''ascendió contra'', y también explica el modismo militar. La nota debe ofrecer una alternativa real, por ejemplo ''vino contra Jerusalén'' o ''marchó contra Jerusalén'', sin duplicar la lectura principal.'
  - severity: low
    issue: La forma del nombre propio 'Sisaq' reduce la reconocibilidad para lectores hispanos.
    rationale: No es infiel al hebreo, pero en español bíblico la forma más conocida es 'Sisac'. Dado que no hay una política de nombres propios aquí que obligue a una transliteración no tradicional, conviene preferir la forma más legible salvo que el proyecto haya fijado 'Sisaq' de modo global. Como la evidencia suministrada no demuestra tal fijación, se recomienda ajustar para legibilidad.
  revised_spanish_text: En el quinto año del rey Roboam, Sisac[a], rey de Egipto, subió contra Jerusalén.
  revised_footnotes:
  - marker: a
    text: El hebreo usa el verbo de “subir” para un avance militar; también podría traducirse “vino contra Jerusalén” o “marchó contra Jerusalén”.
    reason: lexical_alternative
