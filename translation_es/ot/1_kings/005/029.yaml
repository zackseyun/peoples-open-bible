translation:
  language: es
  text: Y Salomón tenía setenta mil cargadores[a] y ochenta mil cortadores de piedra en las montañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «canteros en las montañas». El hebreo dice literalmente «cortadores/los que labran en la montaña», probablemente refiriéndose a trabajadores de cantera en la región montañosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לִשְׁלֹמֹה
  english_pob_choice: And Solomon had
  chosen_spanish: Y Salomón tenía
  alternatives_spanish:
  - Y hubo para Salomón
  - Y Salomón tuvo
  lexicon: HALOT
  rationale: La construcción hebrea con היה + ל expresa posesión o existencia asignada. En español, 'tenía' comunica de forma natural esa relación de pertenencia/adscripción sin perder el sentido narrativo del hebreo.
- source_word: שִׁבְעִים אֶלֶף
  english_pob_choice: seventy thousand
  chosen_spanish: setenta mil
  alternatives_spanish:
  - setenta mil
  lexicon: HALOT
  rationale: Correspondencia numérica directa y sin ambigüedad; no requiere adaptación idiomática.
- source_word: נֹשֵׂא סַבָּל
  english_pob_choice: burden-bearers
  chosen_spanish: cargadores
  alternatives_spanish:
  - portadores de cargas
  - acarreadores
  - porteros
  lexicon: HALOT
  rationale: El participio con סַבָּל señala trabajadores encargados de llevar cargas pesadas. 'Cargadores' es natural en español y conserva el sentido laboral específico, aunque menos marcado que una calca más pesada.
- source_word: וּשְׁמֹנִים אֶלֶף
  english_pob_choice: and eighty thousand
  chosen_spanish: y ochenta mil
  alternatives_spanish:
  - y ochenta mil
  lexicon: HALOT
  rationale: Correspondencia numérica directa.
- source_word: חֹצֵב
  english_pob_choice: stonecutters
  chosen_spanish: cortadores de piedra
  alternatives_spanish:
  - canteros
  - picapedreros
  - hewers
  lexicon: HALOT
  rationale: חצב significa cortar/horadar/extraer, especialmente en contextos de construcción o cantera. 'Cortadores de piedra' mantiene la imagen verbal del hebreo y explicita el objeto implícito sin añadir interpretación excesiva.
- source_word: בָּהָר
  english_pob_choice: in the mountains
  chosen_spanish: en las montañas
  alternatives_spanish:
  - en el monte
  - en la montaña
  - en la región montañosa
  lexicon: HALOT
  rationale: El singular hebreo puede funcionar colectivamente/topográficamente. Dado el contexto de cantería, 'en las montañas' reproduce bien la referencia al terreno montañoso de extracción y sigue de cerca la lectura inglesa auditada.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo WLC y toma como contexto auditado la versión inglesa revisada, que optó por 'in the mountains' para reflejar con más literalidad בָהָר. Se preserva la misma decisión topográfica en español y se evita suavizar la imagen laboral del original.
  spanish_consistency_notes:
  - Se mantiene 'Y' al inicio para reflejar la secuencia narrativa del hebreo.
  - '''cargadores'' y ''cortadores de piedra'' conservan la distinción entre portación de cargas y trabajo de cantería.'
  - '''en las montañas'' evita neutralizar בָּהָר como una expresión genérica sin base textual.'
  - La nota al pie conserva la alternativa lexical principal del audit trail y aclara el posible sentido de cantería.
