translation:
  language: es
  text: El que muestra misericordia presta a su prójimo[a], y el que lo fortalece con su mano guarda los mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que lo apoya con su mano». La expresión griega presenta una ayuda concreta y práctica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ποιῶν ἔλεος
  english_pob_choice: He who shows mercy
  chosen_spanish: El que muestra misericordia
  alternatives_spanish:
  - El que hace misericordia
  - Quien actúa misericordiosamente
  lexicon: BDAG
  rationale: La construcción semítica con ποιῶν + ἔλεος expresa practicar o mostrar misericordia; en español, «muestra misericordia» comunica bien esa acción concreta sin volverla abstracta ni demasiado literal.
- source_word: δανιεῖ
  english_pob_choice: lends
  chosen_spanish: presta
  alternatives_spanish:
  - dará en préstamo
  - hará un préstamo
  lexicon: LSJ
  rationale: El verbo apunta al acto de prestar en sentido financiero o práctico. «Presta» es natural en español y refleja el presente gnómico que la revisión inglesa prefirió conservar.
- source_word: τῷ πλησίον
  english_pob_choice: to his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - al que está cerca de él
  lexicon: BDAG
  rationale: En contextos éticos, πλησίον equivale a «prójimo» más que a un simple vecino geográfico. «Prójimo» conserva la carga moral reconocible en español.
- source_word: ὁ ἐπισχύων
  english_pob_choice: he who strengthens him
  chosen_spanish: el que lo fortalece
  alternatives_spanish:
  - el que lo apoya
  - el que lo sostiene
  lexicon: LSJ
  rationale: ἐπισχύω tiene el sentido de fortalecer o dar apoyo efectivo. «Lo fortalece» mantiene la fuerza verbal y se adapta bien al paralelismo del verso.
- source_word: τῇ χειρὶ αὐτοῦ
  english_pob_choice: with his hand
  chosen_spanish: con su mano
  alternatives_spanish:
  - por su mano
  - con sus medios
  lexicon: BDAG
  rationale: La expresión es instrumental y visualmente concreta. «Con su mano» conserva la imagen de ayuda tangible que el audit trail inglés destacó.
- source_word: τηρεῖ ἐντολάς
  english_pob_choice: keeps the commandments
  chosen_spanish: guarda los mandamientos
  alternatives_spanish:
  - observa los mandamientos
  - cumple los mandamientos
  lexicon: BDAG
  rationale: τηρέω con ἐντολή expresa guardar u observar mandamientos. «Guarda los mandamientos» es la fórmula española más fiel y suficientemente formal, y conserva la referencia religiosa que el inglés explicitó.
theological_decisions:
- issue: 'Cómo verter ἐντολάς: fuerza religiosa o simple instrucción'
  english_pob_reading: the commandments
  chosen_spanish_reading: los mandamientos
  alternative_spanish_readings:
  - los mandatos
  - las instrucciones
  rationale: En Sirácida, ἐντολαί normalmente remite al marco moral-religioso de Dios, no solo a órdenes genéricas. «Mandamientos» preserva esa densidad sin sobrecargar el verso.
  doctrine_reference: 'Translation philosophy: readable modern Spanish without flattening theological weight'
translation_notes:
  revision_awareness: El texto base inglés fue revisado de «will lend» a «lends» para reflejar mejor el presente griego; la versión española sigue ese valor gnómico con «presta» y mantiene la imagen concreta de ayuda con la mano.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece aquí el Tetragrámaton ni una cita directa de κύριος.
  - Se prefirió «prójimo» por la fuerza ética establecida en el contexto sapiencial.
  - Se mantuvo la equivalencia de mandato religioso con «mandamientos», en continuidad con la lectura inglesa auditada.
