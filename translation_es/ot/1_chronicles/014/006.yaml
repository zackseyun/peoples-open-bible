lexical_decisions:
- source_word: נֹגַהּ
  english_pob_choice: Nogah
  chosen_spanish: Nogah
  alternatives_spanish:
  - Noga
  lexicon: HALOT
  rationale: Es un nombre propio en una lista genealógica, por lo que se translitera. Conservo «Nogah» para reflejar mejor la forma hebrea con final gutural, siguiendo la decisión inglesa auditada; «Noga» es una alternativa fonética posible, pero menos cercana a la forma fuente.
- source_word: נֶפֶג
  english_pob_choice: Nepheg
  chosen_spanish: Nepheg
  alternatives_spanish:
  - Nefeg
  lexicon: HALOT
  rationale: Nombre propio de una lista de nombres. Mantengo la transliteración tradicional «Nepheg» porque corresponde bien al uso bíblico en inglés auditado y a la forma consonántica hebrea; «Nefeg» es una variante fonética posible.
- source_word: יָפִיעַ
  english_pob_choice: Japhia
  chosen_spanish: Jafía
  alternatives_spanish:
  - Yafía
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español bíblico, «Jafía» conserva la forma establecida y la adaptación ortográfica natural del nombre; «Yafía» sería una opción más fonética, pero menos asentada en español.
translation_notes:
  revision_awareness: El pasaje es una lista breve de nombres propios sin cambios textuales o revisiones relevantes en el paquete fuente. La versión inglesa auditada permanece sin cambios, y la propuesta española sigue esa misma lectura con transliteración consistente.
  spanish_consistency_notes:
  - Se mantuvo la serie de nombres propios sin añadir conectores interpretativos innecesarios.
  - Se usó «y» antes del último nombre por norma del español.
  - Se conservó la transliteración de nombres propios en vez de traducirlos, conforme al género del pasaje.
  - Las notas reproducen las alternativas fonéticas documentadas en el audit trail inglés, adaptadas al español.
