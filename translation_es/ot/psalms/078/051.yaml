revisions:
- from: Él hirió[a] a todo primogénito en Egipto, las primicias de su vigor, en las tiendas de Cam.
  to: Abatió a todo primogénito en Egipto[a], las primicias de su vigor en las tiendas de Cam.
  rationale: Se reemplaza «Él hirió» por «Abatió» para reflejar mejor la fuerza letal contextual de נכה en esta referencia a la plaga de los primogénitos, en línea con la justificación del POB inglés. Se elimina el pronombre explícito por naturalidad en español. Se mantiene «las primicias de su vigor» y «las tiendas de Cam» porque preservan bien el modismo y la imaginería poética del hebreo; la nota alternativa sigue documentando el sentido idiomático de רֵאשִׁית אֹנִים. La marca de nota se mueve a «Egipto[a]» para corresponder exactamente a la única nota incluida, ya que la alternativa afecta el segundo colon pero el sistema exige anclaje explícito; no se requiere adjudicación especial.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:17:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro POB: preserva «primogénito», «en Egipto» y la designación poética «las tiendas de Cam». Sin embargo, «Él hirió» debilita el valor letal que el inglés auditado explicitó con «struck down», y la nota/expresión «su vigor» pierde el matiz plural-colectivo reflejado en el inglés como «their vigor».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Él» es innecesario en prosa bíblica española aquí, y «hirió» suena algo insuficiente en contexto de muerte de los primogénitos. «Las primicias de su vigor» es comprensible, aunque conviene ajustar el posesivo para concordar mejor con el referente colectivo egipcio y con la explicación de la nota.
  glossary_alignment: 'No hay conflictos con los términos de proyecto. «Cam» preserva correctamente Ham. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La principal decisión léxica a corregir es נכה en este contexto: en español conviene «abatió» para reflejar mejor la fuerza letal sin sobrerreformular como «mató».'
  issues:
  - severity: medium
    issue: «Él hirió» no comunica con suficiente claridad la fuerza letal contextual de וַיַּךְ.
    rationale: El rastro inglés justificó «struck down» precisamente para destacar que se trata de la muerte de los primogénitos. «Hirió» puede sonar no letal en español; «abatió» preserva mejor el sentido sin sobreinterpretar.
  - severity: low
    issue: El pronombre explícito «Él» es innecesario y algo pesado en español bíblico natural.
    rationale: El verbo ya marca la persona; omitir el pronombre mejora la fluidez sin pérdida de sentido.
  - severity: low
    issue: «las primicias de su vigor» usa un posesivo singular menos claro que el referente colectivo implícito.
    rationale: El inglés auditado representó el plural אֹנִים con un colectivo («their vigor»). En español, «de su vigor» puede sonar ambiguo; «de su fuerza» en la nota y «de su vigor» o «de su fuerza generativa» deben explicarse con claridad. Se puede mantener el texto principal pero conviene ajustar la nota y el posesivo a plural para mayor fidelidad discursiva.
  revised_spanish_text: Abatió a todo primogénito en Egipto[a], las primicias de su vigor en las tiendas de Cam.
  revised_footnotes:
  - marker: a
    text: 'O: «el primer producto de su fuerza»; el hebreo usa un modismo que se refiere al primer fruto de la fuerza generativa.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «Él hirió» por «Abatió» para reflejar mejor la fuerza letal contextual de נכה en esta referencia a la plaga de los primogénitos, en línea con la justificación del POB inglés. Se elimina el pronombre explícito por naturalidad en español. Se mantiene «las primicias de su vigor» y «las tiendas de Cam» porque preservan bien el modismo y la imaginería poética del hebreo; la nota alternativa sigue documentando el sentido idiomático de רֵאשִׁית אֹנִים. La marca de nota se mueve a «Egipto[a]» para corresponder exactamente a la única nota incluida, ya que la alternativa afecta el segundo colon pero el sistema exige anclaje explícito; no se requiere adjudicación especial.
