  language: en
  yaml_path: translation/ot/2_kings/006/017.yaml
  text: Then Elisha prayed and said[a], “Yahweh, please open his eyes so that he may see.” So Yahweh opened the young man’s eyes, and he saw; and behold[b], the mountain was full of horses and chariots of fire all around Elisha.
  footnotes:
