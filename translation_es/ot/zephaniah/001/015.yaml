translation:
  language: es
  text: Aquel día es un día de ira[a], un día de angustia y aflicción, un día de ruina y devastación[b], un día de oscuridad y lobreguez, un día de nubes y espesa oscuridad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un día de furor» para «un día de ira».
    reason: lexical_alternative
  - marker: b
    text: «Ruina y devastación» también puede traducirse «desolación y destrucción».
    reason: lexical_alternative
  - marker: c
    text: O «un día de nube y espesa oscuridad»; el hebreo usa sustantivos en singular dentro de una secuencia poética.
    reason: lexical_alternative
lexical_decisions:
- source_word: י֥וֹם עֶבְרָ֖ה
  english_pob_choice: a day of wrath
  chosen_spanish: un día de ira
  alternatives_spanish:
  - un día de furor
  - un día de indignación
  lexicon: HALOT
  rationale: עֶבְרָה expresa ira desbordada o indignación intensa. «Ira» es el equivalente natural y solemne en español para este contexto profético, y conserva la fuerza judicial del término.
- source_word: הַ/יּ֣וֹם הַ/ה֑וּא
  english_pob_choice: That day
  chosen_spanish: Aquel día
  alternatives_spanish:
  - ese día
  - aquel mismo día
  lexicon: HALOT
  rationale: La frase demostrativa señala un día específico ya introducido. «Aquel día» reproduce bien la deíxis y el tono profético sin sobrecargar la frase.
- source_word: צָרָ֣ה
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - apuro
  - tribulación
  lexicon: HALOT
  rationale: צָרָה denota presión o aflicción apremiante. «Angustia» mantiene el registro solemne y hace pareja natural con el segundo término del paralelismo.
- source_word: וּ/מְצוּקָ֗ה
  english_pob_choice: anguish
  chosen_spanish: aprieto
  alternatives_spanish:
  - estrechez
  - angustia
  - penuria
  lexicon: HALOT
  rationale: מְצוּקָה comunica estrechez, presión o severidad de la adversidad. «Aprieto» conserva la idea de constricción y evita repetir «angustia» de forma innecesaria, respetando el paralelismo hebreo.
- source_word: שֹׁאָה֙
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - desolación
  - desastre
  - destrucción
  lexicon: HALOT
  rationale: שֹׁאָה apunta a devastación o ruina destructiva. «Ruina» es breve, clara y apropiada para la acumulación poética.
- source_word: וּ/מְשׁוֹאָ֔ה
  english_pob_choice: devastation
  chosen_spanish: devastación
  alternatives_spanish:
  - desolación
  - destrucción
  - asolamiento
  lexicon: HALOT
  rationale: מְשׁוֹאָה intensifica el cuadro de destrucción catastrófica. «Devastación» conserva el segundo término distinto en la serie y mantiene la progresión poética.
- source_word: חֹ֨שֶׁךְ֙
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - oscuridad densa
  lexicon: HALOT
  rationale: חֹשֶׁךְ significa literalmente oscuridad. «Oscuridad» es directo y natural en español contemporáneo, manteniendo el sentido básico del hebreo.
- source_word: וַ/אֲפֵלָ֔ה
  english_pob_choice: gloom
  chosen_spanish: lobreguez
  alternatives_spanish:
  - tiniebla
  - sombría oscuridad
  - penumbra
  lexicon: HALOT
  rationale: אֲפֵלָה designa oscuridad espesa o tenebrosa. «Lobreguez» distingue este segundo término del anterior y refleja la intensificación poética sin perder dignidad literaria.
- source_word: עָנָ֖ן
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nube
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, el español idiomático en esta serie suele expresar el conjunto con plural. «Nubes» suena natural y mantiene el valor imagístico.
- source_word: וַ/עֲרָפֶֽל
  english_pob_choice: thick darkness
  chosen_spanish: espesa oscuridad
  alternatives_spanish:
  - tinieblas espesas
  - oscuridad densa
  - nube espesa y oscura
  lexicon: HALOT
  rationale: עֲרָפֶל suele indicar oscuridad densa o nube espesa, especialmente en contextos teofánicos. «Espesa oscuridad» conserva la culminación solemne de la serie y evita una expresión demasiado técnica.
theological_decisions:
- issue: Naturaleza del «día» de juicio en la profecía
  english_pob_reading: Retain the repeated 'day of ...' structure as a description of the day of the LORD's judgment without specifying a single historical or exclusively eschatological referent.
  chosen_spanish_reading: Mantener la estructura repetida de «un día de ...» como descripción del día del juicio de Yahvé, sin cerrar el referente a un único cumplimiento histórico o exclusivamente escatológico.
  alternative_spanish_readings:
  - leerlo solo como juicio histórico sobre Judá
  - leerlo solo como juicio final y escatológico
  rationale: El hebreo acumula descriptores en forma poética y no resuelve por sí mismo si el referente es inmediato, tipológico o final. La traducción española conserva esa tensión teológica en lugar de restringirla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se detectaron cambios necesarios; el borrador mantiene el acuerdo alto con el audit trail inglés y preserva las tensiones léxicas y teológicas documentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino del marco POB, aunque en este versículo no aparece explícito en el hebreo citado.
  - Se distingue «oscuridad» de «espesa oscuridad» para reflejar la intensificación del paralelismo hebreo.
  - Se evita homogeneizar los dos pares finales en una sola idea para conservar la acumulación poética del original.
  - Se usa puntuación española con comas para reproducir la serie enumerativa del hebreo.
