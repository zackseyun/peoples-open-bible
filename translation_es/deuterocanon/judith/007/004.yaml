    text: O, de forma más interpretativa, «devorarán» o «consumirán»; el verbo griego significa literalmente «lamer», preservando la imagen de devorar extendiéndose sobre la tierra.
    reason: lexical_alternative
  - marker: b
    text: «La faz de la tierra» es un modismo literal para la superficie o extensión de la tierra.
    reason: cultural_note
  revision_rationale: La revisión corrige la nota léxica para que no contradiga el texto principal y restituye en español la imaginería del modismo «faz de la tierra», en línea con la decisión documentada del POB de conservar tanto «lick up» como «face of the land» en el texto principal y explicar su sentido en notas.
