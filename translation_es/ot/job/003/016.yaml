base_translation:
  language: en
  yaml_path: translation/ot/job/003/016.yaml
  text: Or like a hidden miscarriage[a], I would not be[b], like infants who never saw light.
  footnotes:
  - marker: a
    text: Or 'like a stillborn child.' The Hebrew noun can refer to a miscarriage or stillbirth; both convey the idea of one who never comes to live in the world.
    reason: lexical_alternative
  - marker: b
    text: Literally 'did not see light,' a Hebrew expression for not entering or experiencing earthly life.
    reason: cultural_note
