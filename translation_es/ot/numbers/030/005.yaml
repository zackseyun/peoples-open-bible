translation:
  language: es
  text: Y si su padre oye su voto, o su compromiso vinculante[a] con el cual se ha atado, y su padre no le dice nada, entonces todos sus votos permanecerán[b], y todo compromiso vinculante con el cual se ha atado permanecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vínculo' o 'promesa vinculante' para la expresión traducida aquí como 'compromiso vinculante'; el hebreo אִסָּר es distinto de 'voto', aunque está estrechamente relacionado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'y su padre guarda silencio ante ella'. El silencio implica no objeción, de modo que los votos quedan válidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵדֶר / נִדְרָהּ
  english_pob_choice: vow
  chosen_spanish: voto
  alternatives_spanish:
  - promesa
  - voto hecho a Dios
  lexicon: HALOT
  rationale: En contexto legal-cultual, נדר expresa un compromiso formal ante Dios. 'Voto' es el equivalente natural y tradicional en español bíblico, sin añadir explicación interpretativa indebida.
- source_word: אִסָּר / וֶאֱסָרָהּ
  english_pob_choice: binding obligation
  chosen_spanish: obligación de vínculo
  alternatives_spanish:
  - vínculo
  - obligación vinculante
  - lazo
  lexicon: HALOT
  rationale: La POB inglesa preserva la distinción entre נדר y אִסָּר. 'Obligación de vínculo' intenta mantener esa distinción en español y reflejar el carácter autoimpuesto y vinculante del término, aunque suene un poco más técnico que 'voto'.
- source_word: אָסְרָה עַל־נַפְשָׁהּ
  english_pob_choice: she has bound herself
  chosen_spanish: se ha atado
  alternatives_spanish:
  - se ha obligado
  - se ha ligado a sí misma
  - se ha impuesto sobre sí
  lexicon: HALOT
  rationale: El hebreo dice literalmente que ella 'ató' algo sobre su vida/persona. 'Se ha atado' conserva la imagen verbal y la fuerza reflexiva sin perder legibilidad en español.
- source_word: וְהֶחֱרִישׁ לָהּ
  english_pob_choice: her father says nothing to her
  chosen_spanish: su padre no le dice nada
  alternatives_spanish:
  - su padre guarda silencio ante ella
  - su padre permanece callado
  - su padre no responde
  lexicon: HALOT
  rationale: La idea legal es silencio como no objeción. 'No le dice nada' comunica ese efecto jurídico con naturalidad en español moderno, como lo hace la traducción inglesa auditada.
- source_word: וְקָמוּ ... יָקוּם
  english_pob_choice: shall stand
  chosen_spanish: permanecerán
  alternatives_spanish:
  - se mantendrán
  - quedarán en vigor
  - serán válidos
  lexicon: HALOT
  rationale: En este contexto jurídico, קום significa que los votos siguen vigentes. 'Permanecerán' expresa bien la permanencia/validez legal sin sonar demasiado arcaico.
- source_word: כָּל
  english_pob_choice: all / every
  chosen_spanish: todos / toda
  alternatives_spanish:
  - cada
  - todos los
  - toda clase de
  lexicon: HALOT
  rationale: 'Se conserva la distribución entre plural y singular colectivo: ''todos sus votos'' y ''toda obligación de vínculo''.'
- source_word: וְ
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Y
  lexicon: Hebrew conjunction usage
  rationale: El hebreo continúa una casuística legal. 'Y si' reproduce el enlace discursivo y hace explícita la condición en español natural, siguiendo la decisión auditada en inglés.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios sustantivos; esta propuesta sigue la lectura auditada de la POB inglesa y mantiene la distinción léxica entre נדר y אִסָּר sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene 'voto' para נדר y una expresión distinta para אִסָּר, siguiendo la distinción léxica documentada.
  - Se conserva la imagen de 'atarse' para la idiomática עַל נַפְשָׁהּ.
  - '''No le dice nada'' refleja silencio legal, no indiferencia emocional.'
  - El registro es formal y bíblico, pero con sintaxis española natural.
