translation:
  language: es
  text: Porque tu amor leal[a] está delante de mis ojos, y he andado en tu verdad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu lealtad del pacto» para «tu amor leal».
    reason: lexical_alternative
  - marker: b
    text: O «en tu fidelidad» para «en tu verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, ya que
  - En efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación previa. «Porque» conserva con naturalidad ese valor explicativo en español y mantiene la relación lógica del hebreo.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu amor constante
  - tu lealtad del pacto
  - tu misericordia
  lexicon: HALOT
  rationale: חֶסֶד combina afecto fiel, lealtad y constancia de pacto. «Amor leal» conserva la dimensión afectiva y la de fidelidad sin reducir el término a mera emoción o a una sola categoría técnica.
- source_word: לְנֶגֶד עֵינַי
  english_pob_choice: before my eyes
  chosen_spanish: delante de mis ojos
  alternatives_spanish:
  - ante mis ojos
  - siempre a la vista
  - constantemente en mi vista
  lexicon: HALOT
  rationale: La expresión es idiomática para algo mantenido conscientemente en la vista. «Delante de mis ojos» es una equivalencia natural y suficientemente literal en español.
- source_word: וְהִתְהַלַּכְתִּי
  english_pob_choice: and I have walked
  chosen_spanish: y he andado
  alternatives_spanish:
  - y he caminado
  - y me he conducido
  - y he vivido
  lexicon: HALOT
  rationale: El hitpael de הלך puede expresar el modo de vida o conducta. «He andado» conserva la metáfora bíblica y refleja bien el valor de experiencia pasada con relevancia presente.
- source_word: בַּאֲמִתֶּךָ
  english_pob_choice: in your truth
  chosen_spanish: en tu verdad
  alternatives_spanish:
  - en tu fidelidad
  - conforme a tu verdad
  - en tu confiabilidad
  lexicon: HALOT
  rationale: אֱמֶת puede abarcar verdad, fidelidad y confiabilidad. «Tu verdad» preserva la amplitud del término y sigue de cerca la decisión del POB inglés de no cerrarlo demasiado.
theological_decisions:
- issue: Alcance semántico de חֶסֶד y אֱמֶת como rasgos del carácter de Yahvé
  english_pob_reading: Render חֶסֶד as 'steadfast love' and אֱמֶת as 'truth' without narrowing either to a single doctrinal nuance.
  chosen_spanish_reading: Traducir חֶסֶד como «amor leal» y אֱמֶת como «verdad», sin reducir ninguno de los dos a una sola categoría teológica.
  alternative_spanish_readings:
  - «lealtad del pacto» para חֶסֶד
  - «fidelidad» para אֱמֶת
  - «misericordia» para חֶסֶד
  rationale: El versículo presenta ambos términos como base del andar del salmista. La redacción española conserva su riqueza semántica sin convertirla prematuramente en una formulación sistemática que el hebreo no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador español sigue de cerca el consenso alto del audit trail inglés y mantiene sin suavizar la tensión semántica entre חֶסֶד y אֱמֶת.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene «verdad» para אֱמֶת siguiendo la decisión inglesa, pero se documenta la alternativa «fidelidad» por el rango semántico del término.
  - No se reemplaza «amor leal» por terminología eclesiástica tradicional más opaca; la prioridad es la transparencia léxica con español natural.
