review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue la fuente prioritaria ni la decisión auditada del POB. En vez de traducir el hebreo difícil con apoyo contextual y del paralelo griego, reemplaza el versículo entero por la línea griega paralela, perdiendo la estructura retórica de dos preguntas, la idea de ser probado y hallado íntegro, y la segunda pregunta sobre poder pecar y no hacerlo.
  spanish_quality_summary: La frase española aislada es gramatical, pero no corresponde al contenido del versículo auditado. Como traducción de este registro es inadecuada por omisión masiva. Se requiere una reescritura completa, con notas que preserven la incertidumbre textual y la alternativa léxica de 'apartarse'.
  glossary_alignment: 'No hay choques con términos teológicos de proyecto mayores, pero sí una desviación metodológica grave: se abandonó indebidamente la base hebrea conservada y la racionalidad léxica documentada en inglés. Debe mantenerse la lectura contextual del hebreo con nota sobre la dificultad textual.'
  issues:
  - severity: high
    issue: Se tradujo el paralelo griego en lugar del texto hebreo auditado
    rationale: La política del proyecto para Sirácida da primacía al hebreo donde sobrevive; el inglés POB ya resolvió la inestabilidad con una traducción contextual y notas. El borrador ignora esa decisión y produce otro versículo.
  - severity: high
    issue: Omisión de la mayor parte del contenido del versículo
    rationale: Faltan la primera pregunta retórica, la idea de ser probado y hallado íntegro, la cláusula de honra/gloria, y la segunda pregunta completa sobre abstenerse del mal pese a poder hacerlo.
  - severity: medium
    issue: Falta de notas textuales necesarias
    rationale: El inglés POB conserva explícitamente la dificultad textual de la primera línea y una alternativa léxica para 'turn aside / do harm / consent'. En español deben conservarse mediante notas ancladas.
  revised_spanish_text: ¿Quién fue probado por ello[a] y fue hallado íntegro? Sea esto para él motivo de honra. ¿Quién pudo transgredir y no transgredió[b], y hacer el mal y no lo quiso?
  revised_footnotes:
  - marker: a
    text: 'El hebreo de la primera línea es textualmente difícil. La redacción transmitida también puede entenderse más literalmente como: «¿Quién lo bendijo, y fue íntegro en su vida?», pero el contexto y la tradición paralela apoyan el sentido de ser probado y hallado íntegro.'
    reason: textual_variant
  - marker: b
    text: 'O: «¿Quién pudo apartarse y no se apartó, y hacer daño y no consintió?»'
    reason: lexical_alternative
  revision_rationale: 'Se restituye la traducción del versículo conforme a la fuente hebrea prioritaria, usando el paralelo griego solo como apoyo contextual en la línea difícil, tal como documenta el POB inglés. Se preservan las dos preguntas retóricas, el elogio de la integridad probada y la alternativa léxica en nota. El español busca claridad natural y tono digno: ''íntegro'' refleja שלם en sentido moral; ''motivo de honra'' comunica la fuerza encomiástica de לתפארת sin fijar demasiado un pronombre inestable; ''transgredir'' explicita el valor ético de לסור en contexto.'
