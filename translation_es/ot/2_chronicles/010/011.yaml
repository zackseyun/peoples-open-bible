translation:
  language: es
  text: Y ahora, mi padre hizo pesado su yugo, pero yo añadiré a su yugo. Mi padre los disciplinó con látigos, pero yo con escorpiones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente 'con látigos de escorpiones', es decir, látigos provistos de puntas o púas; el hebreo dice literalmente 'con escorpiones'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Ahora
  lexicon: WLC / contexto narrativo
  rationale: Conserva la transición temporal y la fuerza discursiva de la respuesta de Roboam sin añadir matiz no presente.
- source_word: הֶעְמִיס
  english_pob_choice: made your yoke heavy
  chosen_spanish: hizo pesado vuestro yugo
  alternatives_spanish:
  - cargó vuestro yugo
  - pusó un yugo pesado sobre vosotros
  lexicon: HALOT
  rationale: Mantiene la imagen del yugo y el verbo causativo de hacer pesado, evitando una paráfrasis más libre que diluya la metáfora.
- source_word: עֹל כָּבֵד
  english_pob_choice: a heavy yoke
  chosen_spanish: vuestro yugo
  alternatives_spanish:
  - un yugo pesado
  - un yugo duro
  lexicon: HALOT
  rationale: El adjetivo 'pesado' ya está expresado en el verbo precedente; en español puede sonar redundante repetirlo en el sintagma nominal. Aun así, la imagen del yugo se conserva plenamente.
- source_word: אֹסִיף עַל עֻלְּכֶם
  english_pob_choice: I will add to your yoke
  chosen_spanish: añadiré a vuestro yugo
  alternatives_spanish:
  - aumentaré vuestro yugo
  - haré más pesado vuestro yugo
  lexicon: HALOT
  rationale: Sigue de cerca la construcción hebrea literal 'añadir sobre vuestro yugo', preservando el paralelismo con la primera cláusula.
- source_word: יִסַּר
  english_pob_choice: disciplined
  chosen_spanish: disciplinó
  alternatives_spanish:
  - castigó
  - corrigió
  lexicon: HALOT
  rationale: '''Disciplinó'' reproduce bien el sentido de corrección punitiva sin forzar un castellano arcaico.'
- source_word: בַּשּׁוֹטִים
  english_pob_choice: with whips
  chosen_spanish: con látigos
  alternatives_spanish:
  - con azotes
  - con chicotes
  lexicon: HALOT
  rationale: '''Látigos'' es un equivalente claro y moderno para שׁוֹט, y mantiene la imagen de castigo corporal.'
- source_word: בָּעֲקְרַבִּים
  english_pob_choice: with scorpions
  chosen_spanish: con escorpiones
  alternatives_spanish:
  - con azotes de escorpiones
  - con látigos de escorpiones
  lexicon: HALOT
  rationale: La forma literal hebrea dice 'escorpiones'. El texto español conserva esa lectura, mientras que la nota explica la posible referencia a látigos con púas o barbas.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo de 2 Crónicas 10:11 y el auditorio inglés de POB, preservando el paralelismo entre yugo pesado / añadir al yugo y el contraste látigos / escorpiones. Se mantiene la nota alternativa sobre 'escorpiones' porque el hebreo es literal y la ambigüedad léxica fue documentada en el archivo inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - '''Yugo'' se conserva como metáfora política y de carga, coherente con el registro POB.'
  - Se evita sustituir 'escorpiones' por una paráfrasis en el texto principal para no borrar la tensión léxica documentada.
