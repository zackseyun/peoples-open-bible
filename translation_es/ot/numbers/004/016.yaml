translation:
  language: es
  text: 'Y Eleazar, hijo de Aarón el sacerdote, estará a cargo[a] del aceite para la luz, del incienso aromático, de la ofrenda vegetal regular[b], y del aceite de la unción: del cargo de todo el tabernáculo y de todo lo que hay en él, el santuario[c] y sus utensilios[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «supervisión» o «responsabilidad»; el hebreo פְקֻדַּת denota una supervisión o encargo asignado.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «la ofrenda vegetal continua».
    reason: lexical_alternative
  - marker: c
    text: También puede traducirse «el lugar santo», aunque aquí probablemente se refiere más ampliamente al santuario o área sagrada.
    reason: lexical_alternative
  - marker: d
    text: O «vasos» o «implementos»; el hebreo puede abarcar los objetos sagrados del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדַּת
  english_pob_choice: oversight
  chosen_spanish: responsabilidad
  alternatives_spanish:
  - encargo
  - supervisión
  - cargo
  lexicon: HALOT
  rationale: El término denota una tarea o custodia asignada. «Responsabilidad» comunica bien la idea de una función confiada y de administración, sin perder el matiz de encargo oficial propio del contexto sacerdotal.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el sacerdote oficial
  lexicon: HALOT
  rationale: Es el título directo y natural en español para el oficio de Aarón. «Sacerdote» evita sobrecargar el texto y corresponde al valor definido del hebreo.
- source_word: שֶׁמֶן הַמָּאוֹר
  english_pob_choice: the oil for the light
  chosen_spanish: el aceite para la lámpara
  alternatives_spanish:
  - el aceite para la luz
  - el aceite de la luz
  lexicon: HALOT
  rationale: En español «lámpara» expresa con claridad el uso cultual del aceite y evita la dureza de una construcción demasiado literal. Mantiene el sentido de aceite destinado a la iluminación sin forzar un calco.
- source_word: קְטֹרֶת הַסַּמִּים
  english_pob_choice: the fragrant incense
  chosen_spanish: el incienso aromático
  alternatives_spanish:
  - el incienso fragante
  - el incienso de especias
  lexicon: HALOT
  rationale: «Aromático» transmite el carácter de una mezcla perfumada de especias de forma natural en español, preservando el valor sensorial y cultual del hebreo.
- source_word: מִנְחַת הַתָּמִיד
  english_pob_choice: the regular grain offering
  chosen_spanish: la ofrenda vegetal continua
  alternatives_spanish:
  - la ofrenda de cereal continua
  - la ofrenda vegetal regular
  - la ofrenda vegetal perpetua
  lexicon: HALOT
  rationale: Se conserva מִנְחָה como ofrenda sacrificial y se vierte תָּמִיד como «continua», porque el rasgo principal es su recurrencia. Se usa «vegetal» como término POB para esta ofrenda, con una nota alternativa para quienes prefieran «de cereal».
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite para la unción
  - el aceite ungüentario
  lexicon: HALOT
  rationale: Es la expresión cultual estándar en español y reproduce bien la construcción del hebreo sin cambiar el sentido.
- source_word: כָּל הַמִּשְׁכָּן
  english_pob_choice: the whole tabernacle
  chosen_spanish: todo el tabernáculo
  alternatives_spanish:
  - la totalidad del tabernáculo
  - el tabernáculo entero
  lexicon: HALOT
  rationale: «Todo el tabernáculo» conserva la fuerza totalizadora de כָּל con una construcción natural y transparente en español.
- source_word: וְכָל אֲשֶׁר בּוֹ
  english_pob_choice: and all that is in it
  chosen_spanish: y todo lo que hay en él
  alternatives_spanish:
  - y todo cuanto hay en él
  - y todo lo que está en él
  lexicon: HALOT
  rationale: Es una equivalencia directa y clara del relativo hebreo, manteniendo el alcance inclusivo de la frase.
- source_word: בְּקֹדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - en el santuario
  - en el lugar santo
  - en santidad
  lexicon: HALOT
  rationale: Aquí el hebreo funciona en aposición con el conjunto del tabernáculo y sus objetos. Por eso se traduce como «el santuario» dentro de la enumeración final, siguiendo la revisión inglesa que evita tomarlo sólo como localización.
- source_word: וּבְכֵלָיו
  english_pob_choice: and its furnishings
  chosen_spanish: y sus utensilios
  alternatives_spanish:
  - y sus vasos
  - y sus implementos
  - y su mobiliario
  lexicon: HALOT
  rationale: כֵּלִים puede referirse a objetos rituales, recipientes o utensilios. «Utensilios» es suficientemente amplio y más cercano al conjunto de implementos sagrados que al mobiliario doméstico.
theological_decisions:
- issue: Estructura nominal de פְקֻדַּת y valor de la serie listada
  english_pob_reading: Eleazar is assigned supervisory responsibility over both the listed sacred substances and, more broadly, the whole tabernacle and its contents.
  chosen_spanish_reading: Se presenta a Eleazar como depositario de la responsabilidad sobre los elementos sagrados mencionados y, en forma más amplia, sobre todo el tabernáculo y su contenido.
  alternative_spanish_readings:
  - La responsabilidad de Eleazar será...
  - El encargo de Eleazar será...
  rationale: El hebreo es nominal y algo apposicional. En español se requiere una formulación verbal implícita o explícita para que la frase sea legible, pero sin añadir contenido doctrinal. «Será» expresa con naturalidad que esos elementos constituyen su responsabilidad asignada.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Lectura de בְּקֹדֶשׁ וּבְכֵלָיו como aposición final
  english_pob_reading: ‘the sanctuary and its furnishings’ rather than strictly ‘in the sanctuary and in its furnishings.’
  chosen_spanish_reading: «el santuario y sus utensilios» como remate apposicional del ámbito bajo su custodia.
  alternative_spanish_readings:
  - «en el santuario y en sus utensilios»
  - «en el lugar santo y en sus utensilios»
  rationale: La revisión inglesa señala que la construcción final refleja mejor una aposición que una localización estricta. La traducción española sigue esa decisión para no introducir una relación espacial que el hebreo aquí no exige.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Traducción de מִנְחַת הַתָּמִיד
  english_pob_reading: ‘the regular grain offering’ with note that it may also be ‘the continual grain offering.’
  chosen_spanish_reading: «la ofrenda vegetal continua», con posibilidad de entenderla también como continua/perpetua.
  alternative_spanish_readings:
  - «la ofrenda de cereal continua»
  - «la ofrenda vegetal perpetua»
  rationale: La secuencia apunta a una ofrenda de repetición habitual. «Continua» conserva el valor de תָּמִיד y evita concretar indebidamente el ritmo. Se mantiene la terminología sacrificial POB de «ofrenda vegetal» como estándar del proyecto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al tratar la frase final como una aposición ('el santuario y sus utensilios') y no como una localización estricta. También conserva la repetición conceptual de פְקֻדַּת mediante «responsabilidad» para no borrar el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «ofrenda vegetal» como término POB para מִנְחָה, con nota alternativa para lectores que prefieran «de cereal».
  - Se evita traducir כֹּהֵן por «sacerdote» en un sentido tradicionalizante distinto; aquí corresponde al oficio levítico-aronita explícito del texto.
  - 'La frase final adopta la lectura apposicional respaldada por el audit trail inglés: «el santuario y sus utensilios».'
