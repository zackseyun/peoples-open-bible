  text: Then the officials said to the king[a], “Please let this man be put to death, for in this way he is weakening the hands of the men of war who remain in this city, and the hands of all the people, by speaking to them words like these. For this man is not seeking the welfare of this people[c][b], but their harm.”
  footnotes:
