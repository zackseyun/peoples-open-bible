translation:
  language: es
  text: Como una brecha amplia vienen[a]; en medio del estrépito ruedan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como por una brecha amplia vienen; bajo el estrépito se lanzan rodando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/פֶרֶץ
  english_pob_choice: Like a ... breach
  chosen_spanish: Como una brecha ancha
  alternatives_spanish:
  - Como una rotura amplia
  - Como una abertura grande
  lexicon: HALOT
  rationale: כְ introduce comparación, y פֶרֶץ designa una brecha, rotura o abertura violenta. «Brecha» conserva la imagen destructiva y militar mejor que opciones más genéricas; «ancha» refleja רָחָב sin perder naturalidad en español.
- source_word: רָחָב
  english_pob_choice: wide
  chosen_spanish: ancha
  alternatives_spanish:
  - amplia
  - grande
  lexicon: HALOT
  rationale: El adjetivo intensifica la abertura de la brecha. «Ancha» es breve, natural y mantiene el matiz concreto de amplitud física.
- source_word: יֶאֱתָיוּ
  english_pob_choice: they come
  chosen_spanish: vienen
  alternatives_spanish:
  - avanzan
  - llegan
  lexicon: HALOT
  rationale: El verbo comunica venir o avanzar con fuerza. «Vienen» preserva el movimiento vívido del poema sin añadir demasiada interpretación; «avanzan» sería algo más explicativo.
- source_word: תַּחַת
  english_pob_choice: amid
  chosen_spanish: en medio de
  alternatives_spanish:
  - bajo
  - debajo de
  - en
  lexicon: HALOT
  rationale: Aunque el valor básico es «bajo/debajo de», aquí el paralelismo poético permite un marco circunstancial. «En medio de» expresa mejor en español la situación envolvente del estruendo, como hizo el inglés POB con «amid».
- source_word: שֹׁאָה
  english_pob_choice: the crash
  chosen_spanish: el estruendo
  alternatives_spanish:
  - el crash
  - la devastación
  - el estrépito
  lexicon: HALOT
  rationale: שֹׁאָה puede expresar ruina, devastación, desolación o un golpe/estruendo súbito. «Estruendo» capta la cualidad sonora y violenta que el inglés fijó con «crash», sin convertirlo en un estado estático de ruina.
- source_word: הִתְגַּלְגָּלוּ
  english_pob_choice: they roll on
  chosen_spanish: ruedan
  alternatives_spanish:
  - se derrumban rodando
  - siguen rodando
  - ruedan sobre sí
  lexicon: HALOT
  rationale: El hitpael de גלל sugiere rodar/tumbarse con movimiento reflexivo o continuo. «Ruedan» mantiene la imagen dinámica y compacta; añadir «sobre sí» o «siguen» sería más explicativo que el hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último ajuste del POB inglés, que pasó de «ruin» a «crash» para reflejar mejor שֹׁאָה como un choque/estruendo destructivo súbito. En español se evitó «ruina» por ser más estado resultante que impacto sonoro y violento.
  spanish_consistency_notes:
  - Se mantuvo «brecha» para פֶרֶץ, en línea con la terminología POB y con el sentido de apertura violenta.
  - Se eligió «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el Tetragrámaton.
  - No se introdujeron términos eclesiásticos tradicionales ajenos al hebreo; la imagen sigue siendo poética y concreta.
  - La nota alternativa preserva la posibilidad de entender תַּחַת en sentido más literal («bajo») y el hitpael de גלל como reflexivo («sobre sí») sin imponerlo en el texto principal.
