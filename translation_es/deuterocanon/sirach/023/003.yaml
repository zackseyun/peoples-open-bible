translation:
  language: es
  text: para que mis ignorancias no se multipliquen[a], y mis pecados no aumenten, y yo caiga delante de mis adversarios, y mi enemigo se alegre de mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "mis errores" o "mis actos de ignorancia". El griego distingue este término de "mis pecados" en la cláusula siguiente.'
    reason: lexical_alternative
  - marker: b
    text: '"Se alegre de mí" también puede traducirse "se regocije por mi desgracia" o "se goce de mi caída", destacando su triunfo malicioso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: Introduce la relación de finalidad de la cláusula de manera natural en español, conservando el valor purposivo del griego sin volverlo demasiado arcaico.
- source_word: μὴ πληθύνωσιν
  english_pob_choice: may not multiply
  chosen_spanish: no se multipliquen
  alternatives_spanish:
  - no aumenten en número
  - no se hagan muchas
  lexicon: LSJ
  rationale: El verbo expresa hacerse muchos o multiplicarse; 'multipliquen' preserva el sentido verbal y el sujeto plural de 'ignorancias'.
- source_word: αἱ ἄγνοιαι μου
  english_pob_choice: my ignorances
  chosen_spanish: mis ignorancias
  alternatives_spanish:
  - mis errores
  - mis actos de ignorancia
  - mis faltas por ignorancia
  lexicon: LSJ
  rationale: Se conserva el plural poco común para mantener la distinción que el griego hace con 'mis pecados' en la cláusula siguiente. 'Errores' sería más natural, pero suaviza la diferencia semántica.
- source_word: αἱ ἁμαρτίαι μου
  english_pob_choice: my sins
  chosen_spanish: mis pecados
  alternatives_spanish:
  - mis faltas
  - mis ofensas
  lexicon: LSJ
  rationale: '''Pecados'' comunica con claridad el peso moral de ἁμαρτία y mantiene el contraste con ''ignorancias''.'
- source_word: πλεονάσωσιν
  english_pob_choice: may not increase
  chosen_spanish: no aumenten
  alternatives_spanish:
  - no se multipliquen
  - no crezcan
  lexicon: LSJ
  rationale: '''Aumenten'' es una forma natural en español para el incremento de faltas o pecados y evita repetir el mismo verbo de la cláusula anterior.'
- source_word: πεσοῦμαι
  english_pob_choice: I may fall
  chosen_spanish: yo no caiga
  alternatives_spanish:
  - yo no caiga en la desgracia
  - yo no tropiece
  - yo no sea derribado
  lexicon: LSJ
  rationale: Se conserva la imagen de caída; se añade la negación en español por el encadenamiento con 'para que... no...' del griego, manteniendo el valor de consecuencia temida.
- source_word: ἔναντι τῶν ὑπεναντίων
  english_pob_choice: before my adversaries
  chosen_spanish: delante de mis adversarios
  alternatives_spanish:
  - ante mis adversarios
  - en presencia de mis adversarios
  - frente a mis adversarios
  lexicon: LSJ
  rationale: '''Delante de'' reproduce bien ἔναντι y sugiere la exposición pública de la caída; ''adversarios'' mantiene el valor de oponentes.'
- source_word: ἐπιχαρεῖταί μοι
  english_pob_choice: may rejoice over me
  chosen_spanish: se alegre de mí
  alternatives_spanish:
  - se goce sobre mí
  - se regocije por mí
  - se burle de mí
  lexicon: LSJ
  rationale: '''Alegre de mí'' conserva la idea de regocijo sobre la desgracia ajena. No se explicita ''burlarse'' en el texto principal para no añadir una interpretación más fuerte que el verbo permite.'
- source_word: ὁ ἐχθρός μου
  english_pob_choice: my enemy
  chosen_spanish: mi enemigo
  alternatives_spanish:
  - el que me odia
  - mi adversario
  lexicon: LSJ
  rationale: La traducción directa 'mi enemigo' es idiomática y conserva la singularidad del griego, que pasa de 'adversarios' en plural a un 'enemigo' singular.
theological_decisions:
- issue: Distinction between ἄγνοιαι and ἁμαρτίαι
  english_pob_reading: Render the two terms distinctly as 'ignorances' and 'sins'
  chosen_spanish_reading: Renderizarlos distintamente como 'ignorancias' y 'pecados'
  alternative_spanish_readings:
  - '''errores'' y ''pecados'''
  - '''faltas por ignorancia'' y ''pecados'''
  rationale: El griego distingue entre faltas derivadas de la ignorancia y pecados en sentido más general. Mantener 'ignorancias' preserva esa tensión textual aunque el plural resulte poco común en español.
  doctrine_reference: Translation philosophy §3, §5
- issue: Hostile nuance of ἐπιχαρεῖταί μοι
  english_pob_reading: Use 'rejoice over me' in the main text
  chosen_spanish_reading: Usar 'se alegre de mí' en el texto principal
  alternative_spanish_readings:
  - '''se goce sobre mí'''
  - '''se regocije por mí'''
  - '''se burle de mí'''
  rationale: El verbo puede indicar regocijo ante la desgracia del otro, pero el griego no obliga a una palabra más interpretativa como 'burlarse'. La formulación principal conserva transparencia y deja que el contexto hostil aporte la carga semántica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Sirácides 23:3 y la auditoría inglesa. Se preserva la distinción entre ἄγνοιαι y ἁμαρτίαι, así como el paso de plural ('adversarios') a singular ('enemigo'). No se introdujeron cambios de revisión posteriores al último pase auditado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - '''pecados'' se reserva para ἁμαρτίαι; ''ignorancias'' traduce ἄγνοιαι sin sustituirlo por un genérico.'
  - Se mantiene un tono bíblico moderno, claro y no arcaizante.
  - La puntuación respeta la secuencia coordinada del griego con comas y 'y' final.
