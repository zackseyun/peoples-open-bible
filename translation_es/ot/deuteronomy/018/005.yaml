translation:
  language: es
  text: Porque Yahvé tu Dios lo ha escogido de entre todas tus tribus para que esté de pie y ministre en el nombre de Yahvé, él y sus hijos todos los días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los días». La expresión hebrea puede traducirse de manera más literal, pero aquí se refiere al servicio sacerdotal continuo y duradero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la disposición anterior; en español, ‘porque’ conserva la fuerza explicativa de כִּי sin sonar forzado.
- source_word: בּוֹ בָּחַר
  english_pob_choice: has chosen him
  chosen_spanish: lo ha escogido
  alternatives_spanish:
  - lo escogió
  - lo ha elegido
  lexicon: HALOT
  rationale: El hebreo expresa una elección ya realizada con vigencia actual; el perfecto compuesto español comunica bien ese valor continuo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para el nombre divino, manteniendo el Tetragrámaton como nombre propio y no como ‘SEÑOR’.
- source_word: מִכָּל שְׁבָטֶיךָ
  english_pob_choice: from all your tribes
  chosen_spanish: de entre todas tus tribus
  alternatives_spanish:
  - de todas tus tribus
  - entre todas tus tribus
  lexicon: HALOT
  rationale: La preposición hebrea de selección señala escogencia desde un conjunto; ‘de entre’ expresa mejor la idea distributiva que un simple ‘de’.
- source_word: לַעֲמֹד
  english_pob_choice: to stand
  chosen_spanish: para que esté de pie
  alternatives_spanish:
  - para estar de pie
  - para que permanezca
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la postura sacerdotal. ‘Esté de pie’ evita diluir el verbo en una paráfrasis funcional.
- source_word: לְשָׁרֵת
  english_pob_choice: and minister
  chosen_spanish: y ministre
  alternatives_spanish:
  - y sirva
  - y haga servicio
  lexicon: HALOT
  rationale: En contexto cultual, ‘ministrar’ comunica servicio sagrado de manera más precisa que el genérico ‘servir’.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en el nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - bajo el nombre de Yahvé
  lexicon: HALOT
  rationale: ‘En el nombre de’ preserva la expresión fija y su sentido de representación/autoridad cultual sin sobreinterpretar la preposición.
- source_word: הוּא וּבָנָיו
  english_pob_choice: he and his sons
  chosen_spanish: él y sus hijos
  alternatives_spanish:
  - él y sus hijos varones
  - él y sus descendientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘sus hijos’; en español ‘hijos’ mantiene la relación filial. En contexto sacerdotal puede inferirse la línea masculina sin añadir una glosa innecesaria al texto principal.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - permanentemente
  - para siempre
  lexicon: HALOT
  rationale: Se conserva la literalidad relevante de la secuencia hebrea y su valor de duración continua, dejando que el lector perciba el matiz sin una reformulación excesiva.
theological_decisions:
- issue: Nombre divino YHWH en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo tiene el Tetragrámaton directamente; conforme a la política del proyecto, se traslada como nombre propio ‘Yahvé’, no como sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Descendencia sacerdotal masculina
  english_pob_reading: he and his sons
  chosen_spanish_reading: él y sus hijos
  alternative_spanish_readings:
  - él y sus hijos varones
  - él y sus descendientes
  rationale: El hebreo usa בָּנָיו, ‘sus hijos’; el contexto cultual apunta a sucesión sacerdotal familiar. Se conserva el término básico del texto y se deja la especificación de género al contexto inmediato, sin neutralizar ni expandir.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción revisa el cierre a una fórmula más literal y natural: se prefirió «todos los días» para reflejar con mayor fidelidad כָּל הַיָּמִים, en línea con la revisión auditada del inglés POB que sustituyó una paráfrasis más interpretativa por una formulación más cercana al hebreo.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה, coherente con la terminología del proyecto.
  - 'Se conservó una dicción cultual sobria: ‘ministrar’ para לְשָׁרֵת y ‘en el nombre de’ para בְּשֵׁם.'
  - La frase final ‘todos los días’ respeta el plural hebreo sin forzar ‘para siempre’, aunque el contexto implica duración continua.
  - No se introdujo ‘Cristo’, ‘Señor’ ni glosas doctrinales ajenas al verso.
  - El sujeto plural final se expresó como ‘él y sus hijos’ para reflejar la descendencia sacerdotal sin cambiar el sentido del hebreo.
