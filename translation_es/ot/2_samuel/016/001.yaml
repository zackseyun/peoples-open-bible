    rationale: La amplitud semántica documentada en el POB («puede referirse más específicamente a higos, pero el término hebreo es más amplio») corresponde a קַיִץ. En el borrador, esa nota se reasignó indebidamente a צִמּוּקִים, alterando la justificación léxica.
  - severity: medium
    issue: La nota [b] justifica «esclavo» con una rationale contraria a la auditoría inglesa
    rationale: Afirma que «esclavo» mantiene la fuerza del hebreo y que «siervo» suaviza demasiado, pero el expediente inglés justamente prefirió «servant» por contexto. La nota debe corregirse para reflejar la razón auditada.
  - severity: low
