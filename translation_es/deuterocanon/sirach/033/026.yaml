translation:
  language: es
  text: Pon a trabajar[a] a tu esclavo, y hallarás descanso; déjale las manos ociosas, y buscará libertad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego παιδί puede significar literalmente «niño» o «muchacho», pero aquí el contexto de trabajo impuesto y de búsqueda de libertad favorece «esclavo»; «siervo» sería una alternativa más suave.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔργασαι
  english_pob_choice: Put ... to work
  chosen_spanish: Pon a trabajar
  alternatives_spanish:
  - Haz trabajar
  - Emplea
  lexicon: LSJ
  rationale: El imperativo exhorta a poner a alguien en labor; en español, «poner a trabajar» conserva la fuerza directiva sin sonar forzado.
- source_word: ἐν παιδί
  english_pob_choice: your slave
  chosen_spanish: a tu esclavo
  alternatives_spanish:
  - a tu siervo
  - a tu muchacho
  - a tu criado
  lexicon: LSJ
  rationale: Aunque παιδί puede significar literalmente «niño» o «muchacho», el contexto de trabajo compulsivo y la búsqueda de libertad apuntan a una relación de sujeción. «Esclavo» preserva mejor esa realidad social que una atenuación como «siervo».
- source_word: εὑρήσεις ἀνάπαυσιν
  english_pob_choice: you will find rest
  chosen_spanish: hallarás descanso
  alternatives_spanish:
  - encontrarás descanso
  - tendrás descanso
  lexicon: LSJ
  rationale: «Hallarás» reproduce bien el futuro de εὑρήσεις y «descanso» expresa ἀνάπαυσιν de manera natural en español bíblico contemporáneo.
- source_word: ἄνες
  english_pob_choice: let ... be idle
  chosen_spanish: deja ... ociosas
  alternatives_spanish:
  - suéltale las manos
  - afloja sus manos
  - déjalo inactivo
  lexicon: LSJ
  rationale: ἄνες aquí tiene la idea de aflojar o dejar en reposo. En español, «deja sus manos ociosas» conserva la imagen concreta y el resultado de cesar el trabajo.
- source_word: χεῖρας αὐτῷ
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus manos
  - sus brazos
  - su labor
  lexicon: LSJ
  rationale: Se mantiene la imagen literal de las «manos», porque el texto la usa como metonimia del trabajo manual.
- source_word: ζητήσει ἐλευθερίαν
  english_pob_choice: he will seek freedom
  chosen_spanish: buscará libertad
  alternatives_spanish:
  - pedirá libertad
  - procurará libertad
  - buscará la libertad
  lexicon: LSJ
  rationale: «Buscará» sigue de cerca ζητήσει, y «libertad» traduce ἐλευθερίαν con claridad. Se evita sobrerinterpretar como una demanda formal.
theological_decisions:
- issue: Cómo traducir παιδί en un contexto de dependencia doméstica y trabajo forzado
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - muchacho
  - criado
  rationale: El verso enlaza labor obligada con el deseo de libertad; por eso conviene conservar la dureza del vínculo de dependencia. «Esclavo» comunica mejor esa tensión que «siervo», que en español puede sonar más suave o devocional.
  doctrine_reference: 'DOCTRINE.md: bonded-status terms; primacía del sentido original sobre la atenuación tradicional'
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura inglesa auditada «Put your slave to work ... let his hands be idle ... he will seek freedom», pero ajusta la sintaxis al español natural sin perder la imagen concreta de las manos y la fuerza social de παιδί. Se mantiene la decisión revisada de expresar ἄνες con una fórmula de permiso/relajación, no con una simple orden de abandono.
  spanish_consistency_notes:
  - Se mantiene «esclavo» para reflejar bonded-status con la misma fuerza semántica que la decisión inglesa.
  - Se usa «libertad» para ἐλευθερίαν, evitando «libertad» como abstracción doctrinal ajena al contexto inmediato.
  - 'El orden de ideas sigue el paralelismo del griego: labor → descanso; ociosidad de las manos → búsqueda de libertad.'
