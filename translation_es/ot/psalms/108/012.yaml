  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים = «Dios» está bien; no aparecen términos sensibles como Yahvé/Mesías. La elección «rechazado» concuerda con la decisión léxica del POB y la alternativa «desechado» puede conservarse en nota.'
