source:
  edition: SBLGNT
  text: ⸀καίτοι οὐκ ἀμάρτυρον ⸀αὑτὸν ἀφῆκεν ⸀ἀγαθουργῶν, οὐρανόθεν ὑμῖν ὑετοὺς διδοὺς καὶ καιροὺς καρποφόρους, ἐμπιπλῶν τροφῆς καὶ εὐφροσύνης τὰς καρδίας ⸀ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/014/017.yaml
  text: Yet he did not leave himself without witness[a], doing good by giving you rains from heaven and fruitful seasons[c][b], filling your hearts with food and gladness.
  footnotes:
  - marker: a
    text: Or 'without testimony.' The Greek emphasizes that God did not leave himself lacking witness about who he is.
    reason: lexical_alternative
  - marker: b
    text: Or 'fruit-bearing seasons.'
    reason: lexical_alternative
  - marker: c
    text: Some translations render 'filling our hearts' instead of 'your hearts' because of a textual variant in the pronoun; the SBLGNT reads 'your hearts.'
    reason: textual_variant
translation:
  language: ko
  text: 그러나 자신을 증언 없이 두지는 아니하셨으니, 선을 행하시어 여러분에게 하늘로부터 비를 주시고 결실의 절기를 주시며, 여러분의 마음을 양식과 즐거움으로 채워 주셨습니다.」
  philosophy: optimal-equivalence
