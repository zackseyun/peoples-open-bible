translation:
  language: es
  text: 'Pregunta y averigua quién soy yo y quiénes son los demás que nos ayudan; y dicen[a]: «No tienen dónde mantenerse en pie delante de nosotros, porque dos veces tus padres fueron derrotados en su propia tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no hay para ustedes estar de pie del pie delante de nuestro rostro». El griego es un modismo que expresa que no pueden mantenerse en pie ni sostenerse frente a nosotros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρώτησον
  english_pob_choice: Ask
  chosen_spanish: Pregunta
  alternatives_spanish:
  - Pregunta
  - Consulta
  - Inquiere
  lexicon: LSJ
  rationale: Imperativo de ἐρωτάω; «Pregunta» conserva el tono directo y desafiante sin sonar forzado en español.
- source_word: μάθε
  english_pob_choice: learn
  chosen_spanish: averigua
  alternatives_spanish:
  - averigua
  - aprende
  - entérate
  lexicon: LSJ
  rationale: μανθάνω aquí tiene sentido de obtener información. «Averigua» funciona bien junto con «pregunta» y evita un calco demasiado literal de «aprende».
- source_word: οἱ λοιποὶ οἱ βοηθοῦντές ἡμῖν
  english_pob_choice: the rest are who are helping us
  chosen_spanish: quiénes son los demás que nos ayudan
  alternatives_spanish:
  - quiénes son los otros que nos ayudan
  - quiénes son los restantes que nos ayudan
  - quiénes son los demás que nos asisten
  lexicon: LSJ
  rationale: λοιποί significa «los demás / el resto» y βοηθοῦντες expresa ayuda activa. «Nos ayudan» es natural y suficientemente cercano al contexto militar sin sobrecargarlo.
- source_word: λέγουσιν
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - dicen
  - están diciendo
  - se dice
  lexicon: LSJ
  rationale: El plural presente se vierte de manera natural como «dicen». Mantiene vividez y evita un giro impersonal innecesario.
- source_word: Οὐκ ἔστιν ὑμῖν στάσις ποδὸς
  english_pob_choice: You have no place to stand
  chosen_spanish: No tienen lugar donde afirmarse
  alternatives_spanish:
  - No tienen lugar donde ponerse en pie
  - No tienen firmeza para mantenerse
  - No tienen pie donde estar
  lexicon: LSJ
  rationale: La expresión es idiomática; literalmente dice algo como «no hay para ustedes una postura de pie». «Lugar donde afirmarse» conserva la imagen de sostenerse/plantarse sin sonar antinatural.
- source_word: κατὰ πρόσωπον ἡμῶν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - frente a nosotros
  - en nuestra presencia
  - contra nosotros
  lexicon: LSJ
  rationale: La frase literalmente es «según delante de nuestro rostro»; en contexto de desafío militar, «delante de nosotros» comunica la oposición frontal con fidelidad y claridad.
- source_word: δὶς
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - dos veces
  - en dos ocasiones
  lexicon: LSJ
  rationale: Adverbio simple; «dos veces» es exacto y transparente.
- source_word: ἐτροπώθησαν
  english_pob_choice: were routed
  chosen_spanish: fueron derrotados
  alternatives_spanish:
  - fueron derrotados
  - fueron puestos en fuga
  - fueron desbaratados
  lexicon: LSJ
  rationale: En contexto militar, el pasivo sugiere ser vencidos o puestos en fuga. «Fueron derrotados» es claro y conserva la vergüenza del fracaso bélico.
- source_word: οἱ πατέρες σου
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus padres
  - tus antepasados
  lexicon: LSJ
  rationale: Aunque puede implicar ancestros, la forma literal «padres» preserva mejor la reprobación ancestral del pasaje.
- source_word: ἐν τῇ γῇ αὐτῶν
  english_pob_choice: in their own land
  chosen_spanish: en su propia tierra
  alternatives_spanish:
  - en su propia tierra
  - en su tierra
  lexicon: LSJ
  rationale: αὐτῶν refuerza la posesión; «su propia tierra» comunica bien esa intensificación en español.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó una formulación más metafórica por una más formal y natural para στάσις ποδὸς κατὰ πρόσωπον. En español se siguió esa línea, evitando un calco como «no tienen pie donde estar» y preservando la imagen de no poder mantenerse en posición de combate.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto cuando corresponda; aquí no aplica.
  - Se optó por un español neutral y bíblico, evitando arcaísmos innecesarios.
  - La nota al pie [a] queda anclada exactamente en «dicen[a]» para que la equivalencia idiomática sea auditable.
