    reason: lexical_alternative
  - marker: b
    text: 'O: ''los cielos se oscurecieron''.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: ''una gran lluvia''.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el modismo temporal para reflejar mejor un breve lapso, se cambia 'los cielos' por 'el cielo' por naturalidad contextual en español, y se sustituye 'gran lluvia' por 'fuerte lluvia' en el texto principal, preservando las alternativas literales en notas.
