base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/022.yaml
  text: Then the prophet came near to the king of Israel and said to him[a], “Go, strengthen yourself, and know and see what you should do[c][b], because at the turn of the year the king of Aram will come up against you.”
  footnotes:
  - marker: a
    text: Hebrew 'at the turn/return of the year,' an idiom often referring to the season when military campaigns resumed; some translations render this more interpretively as 'next spring.'
    reason: cultural_note
  - marker: b
    text: Or 'what you will do.' The Hebrew form is literally future, but here likely carries the practical sense of what the king ought to do in preparation.
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'the king of Syria'; Hebrew has 'Aram.'
    reason: alternative_reading
