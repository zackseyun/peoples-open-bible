  to: No mantendrá con vida al malvado[a], pero dará justicia a los afligidos[b].
  rationale: Se cambia el texto principal para reflejar mejor el valor de preservación de יְחַיֶּה según la auditoría inglesa y el contexto poético, evitando un matiz demasiado permisivo en español. Se conserva «no dejará vivir» como alternativa léxica válida en nota. No se requieren cambios en «justicia» ni en «afligidos».
