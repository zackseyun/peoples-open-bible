translation:
  language: es
  text: Maldito será tu canasta y tu artesa de amasar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recipiente para amasar». El hebreo se refiere a un recipiente usado para amasar la masa.
