review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general y las decisiones fuente: mandato a Gad, fórmula profética, uso de «Yahvé», objeto implícito conservado como «tres cosas», e imperativo de elección. Sin embargo, el cierre «yo te la haré» no preserva con suficiente claridad la fuerza de וְאֶעֱשֶׂה לָּךְ, que en contexto significa hacer caer esa opción sobre David; en español suena algo extraño y puede sugerir beneficio o acción indefinida.'
  spanish_quality_summary: El español es mayormente natural y digno. «Ve y habla a David» y «Así dice Yahvé» funcionan bien. La frase «Elige una de ellas para ti» es entendible, aunque ligeramente literal. El principal problema de legibilidad y fidelidad está en «yo te la haré», que no es idiomático ni suficientemente claro en español bíblico actual.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה = «Yahvé» correctamente; no se sobreinterpreta el objeto implícito con «juicios» o «plagas»; se mantiene la nota sobre el hebreo literal. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: «y yo te la haré» es una formulación poco idiomática y semánticamente imprecisa
    rationale: Aunque intenta reflejar «I will do it to you», en español «hacerla a alguien» suena marcado y puede no comunicar con claridad que la opción elegida recaerá sobre David. «Y la haré venir sobre ti» o «y te la aplicaré» serían más claros, pero el primero conserva mejor la fuerza judicial sin alejarse demasiado del contexto.
  - severity: low
    issue: «para ti» en «Elige una de ellas para ti» es algo rígido
    rationale: Es fiel al dativo לְךָ, pero en español puede sonar más natural «Escoge una de ellas» o mantener «para ti» si se desea mayor literalidad. No exige cambio por sí solo.
