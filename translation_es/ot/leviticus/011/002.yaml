  glossary_alignment: No hay conflictos con los términos teológicos principales del proyecto. «Hijos de Israel» está bien alineado con la preferencia por preservar בְּנֵי יִשְׂרָאֵל. La revisión propuesta también mantiene el singular de זֹאת הַחַיָּה conforme a la auditoría inglesa revisada.
