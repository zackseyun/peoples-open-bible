review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: causalidad con «Porque», falta de discernimiento respecto a las obras de Yahvé, y juicio expresado con la antítesis derribar/no edificar. «Yahvé» sigue correctamente la política del proyecto. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en el rastro inglés: allí la alternativa afecta principalmente a «no entienden/regardan» y al alcance de la frase, mientras que la nota española actual introduce una disyunción extraña entre «las obras de Yahvé» y «la obra de sus manos», como si fueran lecturas alternativas del texto.'
  spanish_quality_summary: El español principal es claro y digno. «Él los derribará y no los edificará» es comprensible y conserva la imagen estructural del hebreo, aunque «edificará» suena algo más elevado; sigue siendo aceptable en registro bíblico. El problema principal de calidad está en la nota, que resulta confusa y poco natural. Conviene reemplazarla por una alternativa léxica clara y anclada en la expresión verbal pertinente.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé»; פְּעֻלֹּת/מַעֲשֵׂה -> «obras/obra»; הרס/בנה -> «derribará/edificará». No hay conflictos teológicos relevantes. La única desalineación es la gestión de la nota alternativa, que no sigue la decisión léxica inglesa sobre יָבִינוּ + אֶל.'
  issues:
  - severity: medium
    issue: La nota al pie [a] no corresponde a la alternativa preservada en el audit trail inglés.
    rationale: 'La nota inglesa dice: «Or ''For they do not regard the works of the LORD.''». La nota española actual («las obras de Yahvé, o la obra de sus manos») altera el tipo de alternativa y genera ambigüedad artificial sobre dos sintagmas que en el texto base van coordinados, no como opciones mutuamente excluyentes.'
  - severity: low
    issue: El anclaje de la nota en «Yahvé[a]» no es el lugar más natural para una alternativa que afecta sobre todo al verbo de percepción/atención y a la cláusula completa.
    rationale: Aunque no es incorrecto anclar una nota cerca del segmento, una alternativa como «no toman en cuenta...» se entiende mejor si el marcador aparece sobre la frase verbal relevante.
  revised_spanish_text: Porque no entienden[a] las obras de Yahvé ni la obra de sus manos, él los derribará y no los edificará.
  revised_footnotes:
  - marker: a
    text: 'O: «Porque no toman en cuenta las obras de Yahvé»'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y natural, pero se corrige la nota al pie para que refleje la alternativa léxica documentada en el POB inglés («regard/pay attention to») en vez de introducir una falsa alternativa entre dos complementos nominales. También se reubica el marcador a «no entienden» para anclar la variante donde realmente recae la diferencia.
