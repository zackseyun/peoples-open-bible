translation:
  language: es
  text: Sin embargo, estas cosas las escondiste en tu corazón[b][a]; supe que esto estaba contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las atesoraste». El verbo hebreo puede significar «esconder», «guardar» o «reservar».
    reason: lexical_alternative
  - marker: b
    text: La frase «esto estaba contigo» puede entenderse como «esto estaba en tu mente» o como «esto formaba parte de tu propósito oculto».
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Yet these things
  chosen_spanish: Sin embargo, estas cosas
  alternatives_spanish:
  - Y estas cosas
  - Pero estas cosas
  lexicon: HALOT
  rationale: El וְ inicial puede ser simplemente coordinante, pero en el contexto funciona con matiz adversativo frente al v. anterior. «Sin embargo» comunica bien ese giro sin añadir contenido nuevo, y «estas cosas» conserva el demostrativo plural.
- source_word: צָפַנְתָּ
  english_pob_choice: you hid
  chosen_spanish: las escondiste
  alternatives_spanish:
  - las ocultaste
  - las guardaste
  - las reservaste
  lexicon: HALOT
  rationale: El verbo צפן abarca ‘ocultar’, ‘guardar’ y ‘reservar’. En español, «escondiste» expresa de forma natural la idea de mantener algo secreto, acorde con la intención del pasaje de un propósito divino no revelado. Se evita «guardaste» por sonar menos explícitamente secreto en este contexto.
- source_word: בִלְבָבֶךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - en tu mente
  - dentro de ti
  lexicon: HALOT
  rationale: «Corazón» preserva el valor hebreo de לֵבָב como centro interior de pensamiento, voluntad y designio. «Mente» estrecharía indebidamente el campo semántico; «corazón» mantiene la metáfora bíblica reconocible en español.
- source_word: יָדַעְתִּי
  english_pob_choice: I knew
  chosen_spanish: sabía
  alternatives_spanish:
  - conocía
  - he sabido
  lexicon: HALOT
  rationale: 'El qatal de primera persona se vierte naturalmente con imperfecto narrativo en español según el contexto discursivo: «sabía». Mantiene la afirmación de Job sin forzar un matiz perfectivo que aquí no es necesario.'
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo sabido, por lo que «que» es la solución más natural y fiel en español.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esa cosa
  - esa intención
  - esto
  lexicon: HALOT
  rationale: El demonstrativo femenino singular apunta de manera compacta al contenido anterior sin especificarlo. «Esto» conserva esa ambigüedad referencial y no resuelve el alcance del ocultamiento.
- source_word: עִמָּךְ
  english_pob_choice: was with you
  chosen_spanish: estaba contigo
  alternatives_spanish:
  - estaba en ti
  - estaba en tu mente
  - estaba con respecto a ti
  lexicon: HALOT
  rationale: «Contigo» reproduce de forma natural el valor de עִם + sufijo y mantiene la ambigüedad del POB inglés entre presencia relacional y pertenencia a un propósito oculto.
theological_decisions:
- issue: Ambigüedad sobre qué representa «esto» y qué implica de Dios
  english_pob_reading: Retain the text's ambiguity about what 'this' refers to and present Job's statement as an accusation of concealed divine purpose.
  chosen_spanish_reading: Conservar la ambigüedad sobre el referente de «esto» y leer la frase como una acusación de un propósito divino oculto, sin especificarlo más allá del texto.
  alternative_spanish_readings:
  - Interpretar «esto» como el plan secreto de Dios para afligir a Job
  - Entender «esto» como las bendiciones del versículo anterior
  rationale: El hebreo no define el referente de manera explícita. La traducción española debe mantener esa tensión teológica y retórica, evitando resolverla con una precisión que el texto no ofrece. Así se preserva la queja de Job y el carácter deliberadamente velado del enunciado.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no introdujo cambios; se mantiene la lectura base con ajuste español de naturalidad («escondiste», «sabía», «estaba contigo») sin alterar la ambigüedad auditada del original.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵבָב conforme al estándar POB en español.
  - Se evita sustituir la ambigüedad de עִמָּךְ por una glosa interpretativa en el texto principal; esa posibilidad queda en nota.
  - Se conserva el tono de acusación implícita del contexto mediante «Sin embargo» y la estructura completa de la oración.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto principal según el formato requerido.
