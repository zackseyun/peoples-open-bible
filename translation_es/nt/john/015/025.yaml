translation:
  language: es
  text: 'Pero esto sucedió para que se cumpliera la palabra escrita en su Ley: «Me aborrecieron sin causa».[a][b][c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Pero para que se cumpliera la palabra escrita en su Ley». El griego deja el enunciado principal elíptico, y en español a menudo se suple a partir del contexto.'
    reason: alternative_reading
  - marker: b
    text: «Su Ley» usa «Ley» en el sentido amplio judío de las Escrituras; la cita procede de los Salmos (cf. Sal 35:19; 69:4).
    reason: cross_reference
  - marker: c
    text: 'O: «sin motivo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Pero esto sucedió
  lexicon: BDAG
  rationale: Conserva el contraste adversativo con el contexto inmediato. 'Pero' es natural en español y mantiene la brevedad del griego.
- source_word: ἵνα πληρωθῇ
  english_pob_choice: so that ... might be fulfilled
  chosen_spanish: para que se cumpliera
  alternatives_spanish:
  - para que fuera cumplida
  - a fin de que se cumpliera
  lexicon: BDAG
  rationale: ἵνα con aoristo pasivo subjuntivo expresa propósito/resulta­do. 'Para que se cumpliera' suena idiomático en español y preserva el matiz de cumplimiento sin introducir más contenido que el texto.
- source_word: ὁ λόγος
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el dicho
  - la declaración
  lexicon: BDAG
  rationale: Aquí λόγος se refiere a una cita escritural concreta, no al Logos joánico de Juan 1. 'La palabra' mantiene la referencia a un enunciado citado.
- source_word: ἐν τῷ νόμῳ αὐτῶν γεγραμμένος
  english_pob_choice: written in their Law
  chosen_spanish: escrita en su Ley
  alternatives_spanish:
  - escrita en su Ley
  - escrita en su ley
  - registrada en su Ley
  lexicon: BDAG
  rationale: '''Escrita'' concuerda con ''palabra'' y reproduce el participio perfecto pasivo. ''Ley'' conserva el término νόμος; el posesivo ''su'' refleja el genitivo αὐτῶν y el tono retórico del pasaje.'
- source_word: νόμῳ
  english_pob_choice: Law
  chosen_spanish: Ley
  alternatives_spanish:
  - ley
  - Escritura
  lexicon: BDAG
  rationale: Aunque la cita procede de los Salmos, Juan usa νόμος para un sentido amplio de las Escrituras judías. Se conserva 'Ley' para respetar la forma del texto, dejando que el contexto aclare el alcance.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - su
  - de ellos
  lexicon: BDAG
  rationale: En español, 'su' es la forma más natural y mantiene el distanciamiento retórico que el pronombre transmite en el griego.
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: ':'
  alternatives_spanish:
  - que
  - —
  lexicon: BDAG
  rationale: Los dos puntos introducen con claridad el contenido de la cita y cumplen la función de ὅτι en este contexto.
- source_word: Ἐμίσησάν με
  english_pob_choice: They hated me
  chosen_spanish: Me aborrecieron
  alternatives_spanish:
  - Me odiaron
  - Me detestaron
  lexicon: BDAG
  rationale: '''Aborrecer'' comunica bien el peso de μισέω en un contexto bíblico y evita que ''odiar'' suene demasiado coloquial o emocionalmente reducido; conserva la fuerza de la hostilidad injusta.'
- source_word: δωρεάν
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - sin motivo
  - gratuitamente
  - por nada
  lexicon: BDAG
  rationale: '''Sin causa'' reproduce la fórmula bíblica estable y mantiene el matiz de injusticia/ausencia de fundamento que tiene δωρεάν en la cita.'
theological_decisions:
- issue: Alcance de 'su Ley' en una cita tomada de los Salmos
  english_pob_reading: Render νόμος as 'Law' while understanding it as a broader reference to the Jewish Scriptures, here including the Psalms.
  chosen_spanish_reading: Traducir νόμος como 'Ley' y entenderlo en sentido amplio como referencia a las Escrituras judías, incluida aquí la cita del Salmo.
  alternative_spanish_readings:
  - '''Escritura'' para explicitar el alcance canónico'
  - '''ley'' en minúscula como término genérico'
  rationale: El texto griego dice 'Ley', por lo que conviene conservar esa forma en el cuerpo principal. A la vez, la nota puede aclarar que Juan usa el término con amplitud canónica y que la cita proviene de los Salmos, sin sustituir el término del original.
  doctrine_reference: Primacía del original y preservación de la tensión textual; no resolver interpretativamente lo que el griego deja abierto.
- issue: Supresión o suministro del sujeto implícito tras ἀλλ’
  english_pob_reading: 'Add ''this happened'' for natural English: ''But this happened so that...'''
  chosen_spanish_reading: 'Suministrar ''esto sucedió'' para que la oración sea natural en español: ''Pero esto sucedió para que...'''
  alternative_spanish_readings:
  - '''Pero para que se cumpliera...'''
  - '''Pero esto ocurrió para que...'''
  rationale: El griego es elíptico y depende del contexto previo. En español, añadir 'esto sucedió' hace inteligible la frase sin alterar el contenido teológico ni introducir una interpretación nueva.
  doctrine_reference: 'Equivalencia óptima: claridad moderna sin sobreexplicar el texto.'
translation_notes:
  revision_awareness: Se revisó el pasaje sin cambios sustantivos respecto del contexto auditado en inglés; la solución mantiene el sujeto implícito suplido, preserva 'Ley' para νόμος y conserva la cita final como fórmula breve y reconocible.
  spanish_consistency_notes:
  - Se mantiene 'Ley' con mayúscula para νόμος en sentido amplio, coherente con la terminología POB en inglés.
  - '''Sin causa'' se conserva como equivalente bíblico directo de δωρεάν, evitando una paráfrasis interpretativa.'
  - '''Me aborrecieron'' preserva la fuerza del verbo griego y encaja con el registro escritural del español.'
  - La puntuación con dos puntos refleja la introducción de la cita y corresponde al valor de ὅτι en este contexto.
