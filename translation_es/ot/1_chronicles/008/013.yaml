  text: וּ/בְרִעָ֣ה וָ/שֶׁ֔מַע הֵ֚מָּה רָאשֵׁ֣י הָ/אָב֔וֹת לְ/יוֹשְׁבֵ֖י אַיָּל֑וֹן הֵ֥מָּה הִבְרִ֖יחוּ אֶת י֥וֹשְׁבֵי גַֽת־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/008/013.yaml
  text: And Beriah and Shema—they were heads of fathers’ houses among the inhabitants of Aijalon[b][a]; they were the ones who drove out the inhabitants of Gath.
  footnotes:
  - marker: a
    text: Or 'put to flight' / 'caused to flee.' The Hebrew verb emphasizes causing the inhabitants of Gath to flee; 'drove out' renders the likely result in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'heads of fathers’ houses,' a clan-based family leadership expression.
    reason: cultural_note
