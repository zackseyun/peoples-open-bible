  rationale: Se reemplaza «diciendo» por una puntuación que introduce naturalmente el contenido de la noticia en español, preservando la función de לֵאמֹר. También se ajusta «fue agradable» a «pareció bien» para reflejar mejor el modismo וַיִּיטַב בְּעֵינֵי en un español más idiomático y digno.
