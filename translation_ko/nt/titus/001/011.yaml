id: TIT.1.11
reference: Titus 1:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὓς δεῖ ἐπιστομίζειν, οἵτινες ὅλους οἴκους ἀνατρέπουσιν διδάσκοντες ἃ μὴ δεῖ αἰσχροῦ κέρδους χάριν.
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/011.yaml
  text: They must be silenced[c][b][a], since they are upsetting whole households by teaching what they ought not for the sake of shameful gain.
  footnotes:
  - marker: a
    text: Or, more literally, 'have their mouths stopped.'
    reason: lexical_alternative
  - marker: b
    text: '''Whole households'' likely refers to family units and dependents within a home, not merely physical houses.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for sordid gain.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이런 자들의 입을 막아야 합니다[a]. 그들은 부끄러운 이득[c]을 위하여 가르치지 말아야 할 것을 가르쳐서, 온 가정들[b]을 무너뜨리고 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐπιστομίζω는 문자적으로 「입을 막다」이다. 영어 POB의 「silenced」를 본문에 살린 직역.
    reason: lexical_alternative
  - marker: b
    text: 「온 가정들」은 집안의 식구와 권속을 가리키며, 단순한 건물로서의 집이 아니다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「추한 이득」. 도덕적 수치를 동반한 이득.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστομίζειν
  english_pob_choice: be silenced
  chosen_korean: 입을 막아야
  alternatives_korean:
  - 침묵시켜야
  - 잠잠하게 해야
  lexicon: BDAG
  rationale: ἐπί + στόμα(입)의 동사형. 문자적 「입을 막다」가 1:12의 거짓 예언자 인용과 1:13의 「엄히 책망」으로 이어지는 논쟁적 흐름을 잘 살린다. 영어 POB가 부드러운 「silenced」를 택한 것보다 한국어는 직역의 강도를 보존한다.
- source_word: ὅλους οἴκους ἀνατρέπουσιν
  english_pob_choice: upsetting whole households
  chosen_korean: 온 가정들을 무너뜨리고 있기
  alternatives_korean:
  - 온 집안들을 뒤집어 놓고 있기
  - 가정 전체를 흔들고 있기
  lexicon: BDAG
  rationale: ἀνατρέπω는 「뒤집어 무너뜨리다」. 단순한 「혼란」을 넘어 가정 전체가 무너지는 강한 어감. 「무너뜨리다」가 그 무게를 살린다.
- source_word: διδάσκοντες ἃ μὴ δεῖ
  english_pob_choice: teaching what they ought not
  chosen_korean: 가르치지 말아야 할 것을 가르쳐서
  alternatives_korean:
  - 마땅하지 않은 것을 가르쳐서
  - 가르쳐선 안 되는 것을 가르쳐서
  lexicon: BDAG
  rationale: δεῖ의 의무·당위를 부정으로 살린다.
- source_word: αἰσχροῦ κέρδους χάριν
  english_pob_choice: for the sake of shameful gain
  chosen_korean: 부끄러운 이득을 위하여
  alternatives_korean:
  - 추한 이득을 위하여
  - 더러운 이득을 위하여
  lexicon: BDAG
  rationale: 1:7의 αἰσχροκερδῆ와 일관되게 「부끄러운 이득」으로 옮긴다.
