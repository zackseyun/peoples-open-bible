translation:
  language: es
  text: 'anteriormente[a], mientras dictabas juicios injustos y condenabas a los inocentes, pero dejabas libres a los culpables, aunque el Señor dice[b]: «No darás muerte al inocente y al justo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «mientras juzgabas juicios injustos». El griego usa una expresión de raíz cognada para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'La cita final evoca el lenguaje legal de Éxodo 23:7 en la tradición griega: no darás muerte al inocente y al justo.'
    reason: cross_reference
lexical_decisions:
- source_word: πρότερον
  english_pob_choice: formerly
  chosen_spanish: anteriormente
  alternatives_spanish:
  - antes
  - previamente
  lexicon: LSJ
  rationale: Adverbio temporal que mira a la conducta anterior del juez; «anteriormente» conserva el valor retrospectivo con registro digno y natural en español.
- source_word: κρίνων κρίσεις ἀδίκους
  english_pob_choice: while you were rendering unjust judgments
  chosen_spanish: mientras dictabas juicios injustos
  alternatives_spanish:
  - mientras juzgabas juicios injustos
  - mientras emitías sentencias injustas
  lexicon: LSJ
  rationale: Se mantiene la fuerza judicial y el paralelismo cognado de κρίνων/κρίσεις. «Dictabas juicios» suena natural en español jurídico sin borrar la repetición enfática del griego.
- source_word: ἀδίκους
  english_pob_choice: unjust
  chosen_spanish: injustos
  alternatives_spanish:
  - inicuos
  - erróneos
  lexicon: LSJ
  rationale: En contexto judicial, «injustos» expresa con claridad la falta moral y legal sin desplazar el sentido hacia un matiz demasiado técnico o teológico.
- source_word: τοὺς μὲν ἀθῴους κατακρίνων
  english_pob_choice: condemning the innocent
  chosen_spanish: condenabas a los inocentes
  alternatives_spanish:
  - sentenciabas a los inocentes
  - condenabas a los libres de culpa
  lexicon: LSJ
  rationale: ἀθῷος indica ausencia de culpa; «inocentes» es la equivalencia más clara y bíblicamente inteligible. κατακρίνω se refleja bien con «condenar» en un marco judicial.
- source_word: ἀπολύων δὲ τοὺς αἰτίους
  english_pob_choice: but releasing the guilty
  chosen_spanish: pero dejabas libres a los culpables
  alternatives_spanish:
  - pero absolvías a los culpables
  - pero ponías en libertad a los culpables
  lexicon: LSJ
  rationale: ἀπολύω puede ser «liberar» o «soltar»; «dejar libres» preserva el contraste verbal con «condenar» sin forzar un tecnicismo de absolución formal. αἴτιος aquí es «culpable».
- source_word: λέγοντος τοῦ κυρίου
  english_pob_choice: though the Lord says
  chosen_spanish: aunque el Señor dice
  alternatives_spanish:
  - mientras el Señor dice
  - como dice el Señor
  lexicon: LSJ
  rationale: 'Se conserva la fuerza concesiva del contexto: la conducta denunciada contrasta con la norma divina. «Señor» sigue la convención del griego κύριος en cita escritural.'
- source_word: Ἀθῷον καὶ δίκαιον
  english_pob_choice: the innocent and righteous
  chosen_spanish: al inocente y al justo
  alternatives_spanish:
  - al inocente y al recto
  - al inocente y al justo hombre
  lexicon: LSJ
  rationale: Se preservan dos términos distintos. «Inocente» traduce Ἀθῷον; «justo» traduce δίκαιον. El artículo singular refleja el mandato legal en forma general.
- source_word: οὐκ ἀποκτενεῖς
  english_pob_choice: you shall not put to death
  chosen_spanish: no matarás
  alternatives_spanish:
  - no darás muerte
  - no harás morir
  lexicon: LSJ
  rationale: En español bíblico, «no matarás» comunica con mayor naturalidad el mandamiento legal y la prohibición de ejecución injusta. El contexto ya precisa que el objeto es el inocente y el justo.
theological_decisions:
- issue: Renderización de κύριος en una cita escritural griega
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: La fuente inmediata es griega y cita lenguaje legal bíblico tradicional; por eso se conserva «el Señor» para κύριος. No se usa «Yahvé» en la cita directa porque no hay una forma hebrea explícita en este pasaje, y la convención POB reserva ese uso para contextos donde el nombre divino está directamente detrás del texto fuente.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord/Señor en fuente griega; preservar transparencia textual'
- issue: Fuerza concesiva de λέγοντος τοῦ κυρίου
  english_pob_reading: though the Lord says
  chosen_spanish_reading: aunque el Señor dice
  alternative_spanish_readings:
  - mientras dice el Señor
  - como dice el Señor
  rationale: La frase introduce un contraste moral entre la práctica corrupta y la norma divina. «Aunque» comunica bien esa oposición sin añadir contenido ajeno al griego.
  doctrine_reference: 'DOCTRINE.md: preservar tensión semántica y retórica del original'
- issue: οὐκ ἀποκτενεῖς en contexto jurídico
  english_pob_reading: you shall not put to death
  chosen_spanish_reading: no matarás
  alternative_spanish_readings:
  - no darás muerte
  - no ejecutarás
  rationale: El griego implica muerte jurídica o ejecución; en español, «no matarás» es la formulación más reconocible y natural para un precepto general. El contexto inmediato restringe adecuadamente la referencia a la muerte del inocente y del justo.
  doctrine_reference: Ex 23:7 en la tradición griega; principio legal de no matar al inocente
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del audit trail inglés, que opta por una formulación más natural manteniendo la repetición cognada de κρίνων/κρίσεις. En español se preservó ese énfasis con «dictabas juicios injustos», evitando una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantuvo la distinción inocente/justo, sin fusionarla en una sola idea.
  - Se tradujo κύριος como «el Señor» por transparencia respecto del griego.
  - Se eligió un registro jurídico bíblico claro y moderno, evitando arcaísmos innecesarios.
  - La negación final se adaptó a una fórmula idiomática española sin perder el contenido legal del mandato.
