translation:
  language: es
  text: Y puso las piedras sobre las hombreras del efod, como piedras de memorial[a] para los hijos de Israel[b], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘piedras de recuerdo’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘hijos de Israel’, expresión estándar que se refiere al pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: And he set
  chosen_spanish: Y puso
  alternatives_spanish:
  - Y colocó
  - Y asentó
  lexicon: HALOT
  rationale: El verbo שׂוּם admite ‘poner/colocar’. ‘Puso’ es natural en español y conserva la acción concreta sin añadir interpretación.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: las piedras
  alternatives_spanish:
  - ellos
  - las
  lexicon: HALOT
  rationale: El pronombre retoma las dos piedras preciosas del versículo anterior; en español conviene expresar el antecedente de modo claro para evitar ambigüedad.
- source_word: עַל כִּתְפֹת הָאֵפֹד
  english_pob_choice: on the shoulder pieces of the ephod
  chosen_spanish: sobre los hombrales del efod
  alternatives_spanish:
  - sobre los hombros del efod
  - sobre las piezas de hombro del efod
  lexicon: HALOT
  rationale: כִּתְפֹת se refiere aquí a las piezas de hombro del vestuario sacerdotal. ‘Hombrales’ comunica esa función técnica de forma más natural que una paráfrasis extensa.
- source_word: אַבְנֵי זִכָּרוֹן
  english_pob_choice: as memorial stones
  chosen_spanish: como piedras de memorial
  alternatives_spanish:
  - como piedras de recuerdo
  - como piedras de rememoración
  lexicon: HALOT
  rationale: La construcción hebrea literalmente es ‘piedras de memorial/recuerdo’. ‘Piedras de memorial’ preserva el valor conmemorativo y mantiene la tensión entre memorial y recuerdo. Se deja la alternativa en nota.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: for the sons of Israel
  chosen_spanish: para los hijos de Israel
  alternatives_spanish:
  - para los hijos varones de Israel
  - para los israelitas
  - para los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión formal ‘hijos de Israel’ por su correspondencia con el hebreo fijo בְּנֵי יִשְׂרָאֵל. ‘Israelitas’ es posible, pero reduce la transparencia formal del original.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - tal como Yahvé ordenó a Moisés
  lexicon: HALOT
  rationale: 'כַּאֲשֶׁר expresa conformidad: ‘tal como’. ‘Había mandado’ respeta la anterioridad de la orden respecto de la acción narrada. ‘Mando’ comunica la fuerza normativa de צִוָּה mejor que ‘decir’.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo emplea directamente el Tetragrámaton. En español POB se adopta ‘Yahvé’ para preservar el nombre de pacto sin sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gender-accurate rendering of בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - hijos varones de Israel
  - israelitas
  - niños de Israel
  rationale: La expresión hebrea es un giro fijo masculino plural. Se conserva la forma transparente ‘hijos de Israel’ sin neutralizarla, siguiendo la política de precisión formal del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia con el texto fuente y sin cambios necesarios; por eso la propuesta mantiene la estructura semántica del hebreo y conserva las decisiones auditadas del inglés POB, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente con la terminología del proyecto para יְהוָה.
  - ‘Efod’ se mantiene como transliteración estable del término técnico.
  - ‘Hijos de Israel’ conserva la expresión bíblica fija y su transparencia formal.
  - ‘Piedras de memorial’ mantiene la ambigüedad productiva entre memorial y recuerdo sin sobreexplicar en el cuerpo del texto.
