translation:
  language: es
  text: Inclina tu oído[a], Yahvé, a mi oración, y escucha la voz de mis ruegos por misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mis súplicas»; es decir, ruegos fervientes por misericordia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינָה
  english_pob_choice: Give ear
  chosen_spanish: Inclina tu oído
  alternatives_spanish:
  - Escucha
  - Oye
  lexicon: HALOT
  rationale: El hebreo es un imperativo idiomático de atención intensa al oído. «Inclina tu oído» conserva mejor la imagen corporal y el tono de súplica que un simple «escucha», y evita el calco demasiado plano de «oye».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre propio del Dios del pacto y no sustituyéndolo por un título.'
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi ruego
  lexicon: HALOT
  rationale: תְּפִלָּה corresponde de manera directa a «oración»; es la opción más clara y natural en español sin perder el sentido devocional.
- source_word: וְהַקְשִׁיבָה
  english_pob_choice: and listen
  chosen_spanish: y escucha
  alternatives_spanish:
  - y presta atención
  - y atiende
  lexicon: HALOT
  rationale: קשב en este contexto intensifica la petición de atención. «Escucha» mantiene la paralelidad con «inclina tu oído» y suena natural en español, aunque con un matiz algo más general que «presta atención».
- source_word: בְּקוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - el clamor de
  lexicon: HALOT
  rationale: קוֹל puede significar «voz» o «sonido». Aquí «la voz de» refleja bien la construcción hebrea y fue preferida también en la revisión inglesa por su correspondencia más directa y natural.
- source_word: תַּחֲנוּנוֹתָי
  english_pob_choice: my pleas for mercy
  chosen_spanish: mis súplicas por misericordia
  alternatives_spanish:
  - mis súplicas
  - mis ruegos por gracia
  lexicon: HALOT
  rationale: תַּחֲנוּנִים son ruegos insistentes que buscan favor o misericordia. «Súplicas por misericordia» conserva el peso semántico de la palabra hebrea y explica mejor su intensidad que un simple «súplicas».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo dirige una oración directamente al Dios del pacto por su nombre propio. En español, «Yahvé» mantiene esa decisión teológica y textual del proyecto, evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «the sound of» por «the voice of» para reflejar más directamente בְּקוֹל. La propuesta española sigue ese ajuste con «la voz de», manteniendo la correspondencia semántica y el paralelismo poético.
  spanish_consistency_notes:
  - Se mantiene el tratamiento del nombre divino como «Yahvé», conforme al estándar del proyecto para יְהוָה.
  - «Inclina tu oído» conserva la imagen hebrea de atención inclinada y combina bien con «escucha» en el segundo hemistiquio.
  - «Súplicas por misericordia» recoge el matiz de תַּחֲנוּנוֹת como ruegos urgentes, sin reducirlos a una fórmula devocional genérica.
