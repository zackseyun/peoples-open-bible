    issue: «hacer que estos hombres cesen» suena poco natural en español
    rationale: Aunque transmite la causatividad de לְבַטָּלָא, en español la construcción verbal resulta rígida. «hagan cesar a estos hombres» conserva mejor el sentido causativo y el registro formal.
  - severity: low
    issue: «hasta que por mí se emita un decreto» es menos idiomático en el cuerpo del texto
    rationale: La pasiva con agente explícito es posible, pero suena pesada en español corriente. «hasta que yo emita un decreto» comunica el mismo sentido con mayor naturalidad, mientras la literalidad puede quedar en la nota, como ya documenta el inglés.
  revised_spanish_text: Ahora emitan un decreto para hacer cesar[a] a estos hombres, y esta ciudad no será reedificada hasta que yo emita un decreto[b].
