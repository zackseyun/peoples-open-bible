translation:
  language: es
  text: Así que, ya que los acontecimientos relativos a Nicanor resultaron de esta manera, y desde aquellos tiempos la ciudad permaneció en poder de los Hebreos[a], yo también pondré fin aquí a mi relato[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «la ciudad había sido retenida por los Hebreos».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el narrador señala explícitamente el cierre de su relato escrito en este punto.
    reason: cross_reference
lexical_decisions:
- source_word: Τῶν οὖν κατὰ Νικάνορα
  english_pob_choice: the events concerning Nicanor
  chosen_spanish: los acontecimientos relativos a Nicanor
  alternatives_spanish:
  - los sucesos sobre Nicanor
  - los hechos concernientes a Nicanor
  - los asuntos relativos a Nicanor
  lexicon: LSJ
  rationale: La construcción κατὰ + acusativo con nombre propio resume el conjunto de hechos vinculados con Nicanor. «Relativos a Nicanor» mantiene ese valor amplio y evita una lectura demasiado local o polémica de «contra Nicanor».
- source_word: χωρησάντων
  english_pob_choice: had turned out
  chosen_spanish: resultaron
  alternatives_spanish:
  - habían sucedido
  - habían ocurrido
  - habían ido
  lexicon: LSJ
  rationale: En este contexto, el participio aoristo comunica el desenlace de los hechos más que un movimiento físico. «Resultaron» conserva el sentido de resultado global de manera natural en español.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de este modo
  - de esa manera
  lexicon: LSJ
  rationale: El adverbio retoma el resultado narrado inmediatamente antes. «De esta manera» preserva la referencia retrospectiva y el tono resumidor.
- source_word: κρατηθείσης τῆς πόλεως ὑπὸ τῶν Ἐβραίων
  english_pob_choice: the city had remained in the possession of the Hebrews
  chosen_spanish: la ciudad quedó en poder de los hebreos
  alternatives_spanish:
  - la ciudad había sido retenida por los hebreos
  - la ciudad permaneció en poder de los hebreos
  - la ciudad había sido mantenida por los hebreos
  lexicon: LSJ
  rationale: κρατέω en pasiva expresa posesión o control continuado. «Quedó en poder de» conserva el estado resultante desde aquel tiempo, con un español sobrio y fiel al matiz de permanencia.
- source_word: τῆς πόλεως
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - Jerusalén
  - la ciudad de Jerusalén
  lexicon: LSJ
  rationale: El griego no nombra Jerusalén aquí; mantiene simplemente «la ciudad». La traducción conserva esa referencia anafórica sin explicitar más de lo que el texto dice.
- source_word: ἀπ᾿ ἐκείνων τῶν καιρῶν
  english_pob_choice: from those times
  chosen_spanish: desde aquellos tiempos
  alternatives_spanish:
  - desde aquellos días
  - desde ese tiempo
  - desde entonces
  lexicon: LSJ
  rationale: El plural καιρῶν se refleja con «tiempos». «Desde aquellos tiempos» mantiene la forma plural y el sentido de continuidad temporal.
- source_word: καὶ αὐτὸς
  english_pob_choice: I too
  chosen_spanish: yo también
  alternatives_spanish:
  - y yo mismo
  - y yo también
  - yo asimismo
  lexicon: LSJ
  rationale: La combinación enfática con καί + αὐτός introduce la autorreferencia del narrador. «Yo también» reproduce la función discursiva de manera natural.
- source_word: αὐτόθι
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este punto
  - en este mismo lugar
  - allí mismo
  lexicon: LSJ
  rationale: El adverbio marca el punto de cierre del escrito. «Aquí» es la equivalencia más directa y fluida en español.
- source_word: τὸν λόγον καταπαύσω
  english_pob_choice: will bring my account to a close
  chosen_spanish: pondré fin aquí a mi relato
  alternatives_spanish:
  - terminaré mi relato aquí
  - cesaré aquí mi discurso
  - daré fin aquí a mi relato
  lexicon: LSJ
  rationale: λόγος aquí designa el relato escrito; καταπαύω significa detener o poner fin. «Pondré fin... a mi relato» conserva el tono literario de clausura sin sobrerrevestirlo teológicamente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete 1909 y el cierre narrativo reflejado en el audit trail en inglés. Se conserva la referencia general a «la ciudad» sin identificarla por nombre, y se evita sustituir el valor de κράτεω pasivo por una paráfrasis excesiva. La cláusula final se formula como una clausura autorreferencial del narrador, en paralelo al English POB.
  spanish_consistency_notes:
  - Se usa «hebreos» para Ἐβραίων, conforme al contexto histórico del libro y al audit trail inglés.
  - Se mantiene «la ciudad» sin añadir «Jerusalén», porque el griego no lo explicita aquí.
  - «Relato» se elige para λόγος en el cierre narrativo, evitando tecnicismos innecesarios.
