translation:
  language: es
  text: Cuando Onías vio la severidad de la rivalidad[a], y que Apolonio hijo de Menesteo, el gobernador de Celesiria y Fenicia, estaba aumentando la maldad de Simón[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la contienda» o «la disputa» para φιλονεικίας.
    reason: lexical_alternative
  - marker: b
    text: El griego στρατηγόν puede significar «general» o «comandante»; aquí se traduce «gobernador» porque el contexto describe la autoridad administrativa de Apolonio sobre Celesiria y Fenicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνορῶν
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - al percibir
  - al observar
  lexicon: LSJ
  rationale: El participio introduce la circunstancia de la reacción de Onías. «Cuando ... vio» conserva la percepción directa y suena natural en español narrativo.
- source_word: τὸ χαλεπὸν
  english_pob_choice: the severity
  chosen_spanish: la severidad
  alternatives_spanish:
  - la dureza
  - la gravedad
  lexicon: LSJ
  rationale: El sustantivo neutro con artículo describe el carácter serio del conflicto. «Severidad» mantiene el peso semántico y es fiel al registro formal del pasaje.
- source_word: φιλονεικίας
  english_pob_choice: the rivalry
  chosen_spanish: la rivalidad
  alternatives_spanish:
  - la contienda
  - la disputa
  - la querella
  lexicon: LSJ
  rationale: El término puede expresar rivalidad contenciosa o disputa. «Rivalidad» sigue de cerca la decisión inglesa y encaja con el conflicto político/personal sin estrecharlo demasiado.
- source_word: Ἀπολλώνιον Μενεσθέως
  english_pob_choice: Apollonius son of Menestheus
  chosen_spanish: Apolonio, hijo de Menesteo
  alternatives_spanish:
  - Apolonio, de Menesteo
  lexicon: LSJ
  rationale: El genitivo patronímico se expresa con claridad en español mediante «hijo de», reproduciendo la identificación genealógica del oficial.
- source_word: στρατηγόν
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el general
  - el comandante
  lexicon: LSJ
  rationale: Aunque στρατηγός puede significar «general», aquí el contexto administrativo sobre Celesiria y Fenicia favorece «gobernador», siguiendo la lectura contextual del POB inglés.
- source_word: συναύξοντα
  english_pob_choice: was increasing
  chosen_spanish: estaba aumentando
  alternatives_spanish:
  - estaba fomentando
  - estaba agravando
  - estaba ayudando a aumentar
  lexicon: LSJ
  rationale: El participio expresa que Apolonio contribuía al incremento de la maldad de Simón. «Estaba aumentando» conserva la fuerza causal de manera directa y transparente.
- source_word: κακίαν
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la perversidad
  - la malicia
  - el mal
  lexicon: LSJ
  rationale: «Maldad» transmite el peso moral general del término sin reducirlo a mera actitud interior ni exagerarlo con un matiz más técnico.
translation_notes:
  revision_awareness: 'La redacción inglesa revisada simplificó «how severe the rivalry was» a «the severity of the rivalry». La versión española sigue esa decisión revisada con una estructura nominal equivalente («la severidad de la rivalidad») y mantiene el resto de los rasgos contextuales: patronímico, cargo administrativo y el participio causativo de συναύξοντα.'
  spanish_consistency_notes:
  - Se mantiene «Onías» y no se sustituye por una forma más helenizada o latinizada, por consistencia con nombres bíblicos en español.
  - Se usa «Celesiria» como forma histórica habitual en español para Κοίλης Φοινίκης καὶ Συρίας, coherente con el contexto geográfico-administrativo.
  - No se traduce la frase de modo más libre; se conserva la secuencia sintáctica principal del griego, adecuada para un texto de lectura bíblica pública.
