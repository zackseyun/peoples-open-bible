    changes_summary: Changed 'he comes' to 'it comes' to better reflect the singular subject implied by the summoned force/army in context, while preserving the Hebrew's concise wording. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Él levantará una señal para las naciones desde lejos[a], y silbará para convocarlas[b] desde el extremo de la tierra; y he aquí, rápidamente, velozmente[c], viene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una bandera» o «un estandarte» para נֵס.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo puede significar «silbar» o, en traducciones inglesas antiguas, «sisear»; es decir, emitir un sonido agudo de convocatoria.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo singular: «viene». El singular probablemente representa de modo colectivo a la fuerza invasora.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשָׂא
  english_pob_choice: He will raise
  chosen_spanish: levantará
  alternatives_spanish:
  - alzará
  - levantará en alto
  lexicon: HALOT
  rationale: En el contexto de נֵס, el verbo describe elevar una señal. «Levantará» conserva el movimiento ascendente y funciona con naturalidad en español profético.
- source_word: נֵס
  english_pob_choice: a signal
  chosen_spanish: una señal
  alternatives_spanish:
  - un estandarte
  - una bandera
  lexicon: HALOT
  rationale: «Señal» comunica la función convocante del término sin cargarlo de un matiz demasiado ceremonial. «Estandarte» y «bandera» son posibles, pero aquí la imagen principal es de convocatoria militar o pública.
- source_word: לַגּוֹיִם
  english_pob_choice: for the nations
  chosen_spanish: para las naciones
  alternatives_spanish:
  - a las naciones
  - para los pueblos
  lexicon: HALOT
  rationale: «Para» preserva la orientación de la señal hacia las naciones como destinatarias de la convocatoria. «Naciones» mantiene el valor habitual de גּוֹיִם.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - desde muy lejos
  - de lejos
  lexicon: HALOT
  rationale: La expresión indica distancia real u origen distante. «Desde lejos» es natural y fiel en español.
- source_word: וְשָׁרַק
  english_pob_choice: and whistle
  chosen_spanish: y les silbará
  alternatives_spanish:
  - y les silbará para llamarlos
  - y les hará un silbido
  lexicon: HALOT
  rationale: El verbo describe un sonido agudo de convocatoria. «Silbará» evita el posible malentendido de «sisear» o de un gesto hostil, y conserva la idea de llamar.
- source_word: לוֹ
  english_pob_choice: for them
  chosen_spanish: les
  alternatives_spanish:
  - a él
  - para ellos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el referente colectivo en contexto permite un pronombre plural en español para la claridad sintáctica. La decisión sigue la lectura colectiva del ejército convocado.
- source_word: מִקְצֵה הָאָרֶץ
  english_pob_choice: from the end of the earth
  chosen_spanish: desde el extremo de la tierra
  alternatives_spanish:
  - desde lo último de la tierra
  - desde el confín de la tierra
  lexicon: HALOT
  rationale: La frase idiomática señala el punto más remoto. «Extremo de la tierra» conserva la amplitud cósmica e internacional de la expresión.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y ved
  lexicon: HALOT
  rationale: «Y he aquí» reproduce el giro profético de sorpresa e inmediatez con registro bíblico claro en español.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de prisa
  - velozmente
  lexicon: HALOT
  rationale: El término marca rapidez. «Rápidamente» es transparente y de uso amplio.
- source_word: קַל
  english_pob_choice: swiftly
  chosen_spanish: velozmente
  alternatives_spanish:
  - ligeramente
  - ligero
  lexicon: HALOT
  rationale: Aquí קַל intensifica la velocidad del arribo junto con מְהֵרָה. «Velozmente» permite conservar ese segundo matiz sin perder naturalidad en español.
- source_word: יָבֹוא
  english_pob_choice: it comes
  chosen_spanish: viene
  alternatives_spanish:
  - vendrá
  - llega
  lexicon: HALOT
  rationale: La forma singular se conserva sin forzar el referente a una persona masculina. «Viene» transmite inmediatez profética y respeta la fuerza del hebreo.
theological_decisions:
- issue: Referencia singular del sujeto final frente al colectivo convocado
  english_pob_reading: Retain singular verbal/pronominal imagery in the final clause ('it comes') while allowing an English plural object earlier ('for them').
  chosen_spanish_reading: Mantener un objeto plural en la convocatoria («les») y un verbo singular en la llegada («viene»).
  alternative_spanish_readings:
  - Mantener todo en singular («a él ... viene»).
  - Hacer todo plural («les ... vienen»).
  rationale: 'El hebreo combina un llamado colectivo a las naciones con una llegada expresada en singular. El español puede preservar esa tensión sin resolverla en exceso: plural en la convocatoria, singular en el arribo.'
  doctrine_reference: Preservar la tensión gramatical-literaria del texto cuando el original la presenta; no es una afirmación doctrinal, sino una decisión de traducción.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audio-taje inglés: se preserva la convocatoria colectiva con un referente plural en la llamada y un sujeto singular en la llegada. Se evita mecanizar desde el inglés, pero se aprovechan sus decisiones léxicas y su nota sobre la tensión singular/colectiva.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; en este versículo no aparece el nombre divino.
  - «Señal» se prefirió a «estandarte» para mantener la función convocante sin sobre-ceremonializar el término.
  - Se mantuvo la tensión singular/colectiva del final del versículo.
  - El registro es bíblico pero no arcaizante; busca ser comprensible en lectura pública.
