  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐν τῇ πρώτῃ μου ἀπολογίᾳ οὐδείς μοι ⸀παρεγένετο, ἀλλὰ πάντες με ⸀ἐγκατέλιπον— μὴ αὐτοῖς λογισθείη—
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/016.yaml
  text: At my first defense no one stood with me, but all deserted me. May it not be counted against them.
translation:
  language: ko
  text: 나의 첫 번째 변호[a] 때에 아무도 내 곁에 서 주지 않았고, 모두가 나를 버렸습니다. 그것이 그들에게 책임으로 돌아가지 않기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「첫 번째 심리」, 「첫 번째 법정 변론」. 헬라어 ἀπολογία는 법정에서의 자기 변론을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ πρώτῃ μου ἀπολογίᾳ
  english_pob_choice: my first defense
  chosen_korean: 나의 첫 번째 변호
  alternatives_korean:
  - 나의 첫 변론
  - 나의 첫 심리
  lexicon: BDAG
  rationale: ἀπολογία는 법정 변론. 「변호」가 한국어로 자연스럽다.
- source_word: οὐδείς μοι παρεγένετο
  english_pob_choice: no one stood with me
  chosen_korean: 아무도 내 곁에 서 주지 않았고
  alternatives_korean:
  - 아무도 나와 함께 나서 주지 않았고
  - 아무도 내 편에서 변호해 주지 않았고
  lexicon: BDAG
  rationale: παραγίνομαι는 「곁에 와서 함께함」. 「곁에 서 주다」가 그 후원의 의미를 자연스럽게 담는다.
- source_word: πάντες με ἐγκατέλιπον
  english_pob_choice: all deserted me
  chosen_korean: 모두가 나를 버렸습니다
  alternatives_korean:
  - 모두가 나를 떠났습니다
  - 모두가 나를 저버렸습니다
  lexicon: BDAG
  rationale: 4:10의 「데마가 나를 버리고」(ἐγκατέλιπεν)와 어휘 통일.
- source_word: μὴ αὐτοῖς λογισθείη
  english_pob_choice: May it not be counted against them
  chosen_korean: 그것이 그들에게 책임으로 돌아가지 않기를 빕니다
  alternatives_korean:
  - 그들에게 책임이 돌려지지 않기를 빕니다
  - 그것이 그들의 잘못으로 헤아려지지 않기를 빕니다
  lexicon: BDAG
  rationale: λογίζομαι는 「셈에 넣음·책임으로 돌림」. 가정법 부정의 소망 「~기를 빕니다」로 옮긴다. 사도행전 7:60(스데반의 임종 기도)과 호응하는 용서의 음조.
