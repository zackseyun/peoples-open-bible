id: 2CO.4.5
reference: 2 Corinthians 4:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐ γὰρ ἑαυτοὺς κηρύσσομεν ἀλλὰ ⸂Χριστὸν Ἰησοῦν⸃ κύριον, ἑαυτοὺς δὲ δούλους ὑμῶν διὰ Ἰησοῦν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/004/005.yaml
  text: For we do not proclaim ourselves, but Messiah Jesus as Lord, and ourselves as your slaves for Jesus' sake.
  footnotes:
  - marker: a
    text: Or 'Christ Jesus the Lord.' The Greek Χριστός may be rendered 'Christ' where it functions more like a name; here it is taken as the title 'Messiah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your servants' or 'your bondservants.' The Greek δοῦλοι can mean servants or slaves; 'slaves' is used here to preserve the stronger sense of subordination in contrast with Jesus as Lord.
    reason: lexical_alternative
  - marker: c
    text: Or 'because of Jesus.'
    reason: alternative_reading
translation:
  language: ko
  text: 우리는 우리 자신을 전파하지 않고, 메시아 예수를 주로 전파하며, 우리 자신은 예수 때문에 여러분의 종이 됨을 전파합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Χριστὸν Ἰησοῦν κύριον
  english_pob_choice: Messiah Jesus as Lord
  chosen_korean: 메시아 예수를 주로
  alternatives_korean:
  - 그리스도 예수가 주이심을
  lexicon: BDAG
  rationale: 초대교회의 신앙 고백 정형 (κύριος Ἰησοῦς)을 메시아 칭호와 함께 보존.
- source_word: δούλους ὑμῶν
  english_pob_choice: your slaves
  chosen_korean: 여러분의 종
  alternatives_korean:
  - 여러분의 노예
  lexicon: BDAG
  rationale: 바울이 자신을 신자들의 「종」으로 표현. 본 절은 빌립보서 1:1과 달리 매임의 신학적 무게보다 봉사적 종속을 강조하므로 「종」으로 옮긴다. (빌립보서 1:1의 「노예」와 구별)
