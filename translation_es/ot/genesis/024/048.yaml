translation:
  language: es
  text: Entonces me incliné y me postré ante Yahvé[a], y bendije a Yahvé, Dios de mi amo Abraham, que me condujo por el camino recto para tomar a la hija del hermano de mi amo para su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en el camino de verdad». La frase también puede entenderse como «en un camino fiel o confiable», subrayando la guía digna de confianza de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקֹּד
  english_pob_choice: I bowed down
  chosen_spanish: me incliné
  alternatives_spanish:
  - me postré
  - me doblegué
  lexicon: HALOT
  rationale: El verbo expresa un gesto físico de inclinación o abatimiento. «Me incliné» conserva el acto corporal sin implicar por sí solo una postración completa, que queda expresada por el segundo verbo.
- source_word: וָאֶשְׁתַּחֲוֶה לַ/יהוָה
  english_pob_choice: and worshiped Yahweh
  chosen_spanish: me postré ante Yahvé
  alternatives_spanish:
  - adoré a Yahvé
  - me prosterné ante Yahvé
  lexicon: HALOT
  rationale: El hebreo describe reverencia corporal ante Dios. En español, «me postré ante Yahvé» preserva la fuerza física y cultual mejor que un «adoré» más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: transliteración del Tetragrámaton como «Yahvé», no la sustitución por un título.'
- source_word: וָאֲבָרֵךְ אֶת יְהוָה
  english_pob_choice: and I blessed Yahweh
  chosen_spanish: y bendije a Yahvé
  alternatives_spanish:
  - y alabé a Yahvé
  - y bendije a Yahvé diciendo bien de él
  lexicon: HALOT
  rationale: ברך con objeto divino puede significar bendecir en el sentido de hablar bien de Dios. «Bendije a Yahvé» conserva el eco bíblico y la relación léxica.
- source_word: אֱלֹהֵי אֲדֹנִי אַבְרָהָם
  english_pob_choice: the God of my master Abraham
  chosen_spanish: Dios de mi señor Abraham
  alternatives_spanish:
  - Dios de mi amo Abraham
  - Dios de mi maestro Abraham
  lexicon: HALOT
  rationale: Aquí אֲדֹנִי se refiere a Abraham como superior humano del siervo. «Señor» mantiene el valor relacional más cercano al hebreo, aunque «maestro» también sería posible en español.
- source_word: הִנְחַנִי
  english_pob_choice: led me
  chosen_spanish: me condujo
  alternatives_spanish:
  - me guió
  - me llevó
  lexicon: HALOT
  rationale: El hifil de נחה expresa guiar o conducir. «Me condujo» es natural en español y conserva la idea de dirección providencial.
- source_word: בְּדֶרֶךְ אֱמֶת
  english_pob_choice: the right way
  chosen_spanish: por el camino recto
  alternatives_spanish:
  - en el camino de verdad
  - por un camino fiel
  lexicon: HALOT
  rationale: La expresión hebrea puede entenderse como «camino de verdad» o como ruta fiel/confiable. «Camino recto» comunica bien la orientación correcta y mantiene la lectura aprobada por la revisión inglesa como una formulación más natural.
- source_word: לָקַחַת
  english_pob_choice: to take
  chosen_spanish: para tomar
  alternatives_spanish:
  - para llevar
  - para obtener
  lexicon: HALOT
  rationale: El infinitivo indica propósito. «Tomar» conserva la correspondencia léxica sin desplazar el sentido matrimonial del contexto.
- source_word: בַּת אֲחִי אֲדֹנִי
  english_pob_choice: the daughter of my master's brother
  chosen_spanish: a la hija del hermano de mi señor
  alternatives_spanish:
  - a la hija del hermano de mi amo
  - a la hija del hermano de mi maestro
  lexicon: HALOT
  rationale: La cadena constructa identifica a Rebeca por su parentesco con Abraham. Se mantiene la relación familiar de modo claro y directo en español.
- source_word: לִבְנוֹ
  english_pob_choice: for his son
  chosen_spanish: para su hijo
  alternatives_spanish:
  - para el hijo de él
  - para su propio hijo
  lexicon: HALOT
  rationale: El sufijo remite a Abraham, mencionado inmediatamente antes. «Su hijo» es conciso y desambigua naturalmente en contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el Nombre propio como «Yahvé» para no ocultarlo tras un sustituto y mantener la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Respuesta de reverencia ante Dios
  english_pob_reading: I bowed down and worshiped
  chosen_spanish_reading: me incliné y me postré ante Yahvé
  alternative_spanish_readings:
  - me arrodillé y adoré a Yahvé
  - me incliné y adoré a Yahvé
  rationale: El hebreo combina dos gestos de humillación/reverencia. La doble formulación en español conserva esa intensificación sin reducirla solo a un acto interior de adoración.
  doctrine_reference: HALOT; uso contextual de וַיִּשְׁתַּחוּ
- issue: בדרך אמת
  english_pob_reading: the right way
  chosen_spanish_reading: por el camino recto
  alternative_spanish_readings:
  - en el camino de verdad
  - por el camino fiel
  rationale: La expresión admite una lectura de verdad/confiabilidad. «Camino recto» refleja la orientación correcta en una forma natural para el español y sigue la revisión inglesa que priorizó fluidez sin perder la idea de guía confiable.
  doctrine_reference: Genesis 24:48; footnote tradition on way of truth
translation_notes:
  revision_awareness: La revisión inglesa más reciente simplificó la expresión de בְּדֶרֶךְ אֱמֶת de «the true way» a «the right way» para un español igualmente natural. Esta versión sigue esa línea con «por el camino recto», conservando la nota alternativa sobre «camino de verdad» / «camino fiel».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «señor» en minúscula para Abraham como superior humano, distinguiéndolo del Nombre divino.
  - «Camino recto» refleja la decisión inglesa revisada, mientras la nota preserva la tensión lexical de אמת.
  - La estructura verbal doble («me incliné y me postré») intenta reproducir el paralelismo de dos acciones reverenciales del hebreo.
