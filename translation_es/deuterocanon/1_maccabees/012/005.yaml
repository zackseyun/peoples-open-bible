translation:
  language: es
  text: Y esta es una copia de las cartas que Jonatán escribió a los espartanos:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente 'las cartas' (plural). En español se conserva el plural, a diferencia de la versión inglesa previa que usó el singular por el contexto documental inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ τοῦτο
  english_pob_choice: And this
  chosen_spanish: Y esta
  alternatives_spanish:
  - Y esto
  - Y esto es
  lexicon: uso coordinado demostrativo
  rationale: El griego introduce el contenido documental con un demostrativo neutro. En español, 'Y esta' mantiene la referencia a la copia que sigue y suena natural al presentar un documento.
- source_word: ἀντίγραφον
  english_pob_choice: a copy
  chosen_spanish: una copia
  alternatives_spanish:
  - un trasunto
  - una transcripción
  - un duplicado
  lexicon: LSJ
  rationale: El sustantivo indica una reproducción escrita o copia documental. 'Una copia' comunica bien el valor sin tecnicismo excesivo.
- source_word: τῶν ἐπιστολῶν
  english_pob_choice: the letters
  chosen_spanish: de las cartas
  alternatives_spanish:
  - de la carta
  - de las epístolas
  lexicon: LSJ
  rationale: El griego está en plural, y el audit trail inglés preserva ese plural tras la revisión. 'Cartas' refleja la morfología griega y es más natural que 'epístolas' en español moderno.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - escribió y envió
  lexicon: LSJ
  rationale: El verbo significa simplemente 'escribió'. 'Escribió' es el equivalente directo y no añade la idea de envío.
- source_word: Ἰωνάθαν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transliteración bíblica
  rationale: Se usa la transliteración bíblica estándar en español 'Jonatán', más reconocible para lectores hispanos y fiel al nombre propio.
- source_word: τοῖς Σπαρτιάταις
  english_pob_choice: to the Spartans
  chosen_spanish: a los espartanos
  alternatives_spanish:
  - a los espartiatas
  - para los espartanos
  lexicon: LSJ
  rationale: El dativo marca destinatarios. 'A los espartanos' es idiomático y conserva el referente histórico sin forzar un cultismo.
translation_notes:
  revision_awareness: El contexto auditado muestra que el inglés POB revisó su redacción para reflejar el plural griego ἐπιστολῶν. La versión española conserva ese plural de manera explícita y mantiene la estructura documental breve del original sin ampliar el contenido.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera de este versículo porque no aparece ningún nombre divino en el texto fuente.
  - Se prefirió 'Jonatán' como forma española estándar del nombre propio, en coherencia con la política de transliteración adaptada al uso bíblico hispano.
  - '''Cartas'' conserva el plural griego ἐπιστολῶν y evita nivelar la forma a singular.'
  - La puntuación con dos puntos al final introduce correctamente la cita/documento anunciado por 'esta es una copia'.
