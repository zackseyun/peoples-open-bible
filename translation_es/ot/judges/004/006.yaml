revisions:
- from: 'Ella envió y mandó llamar a Barac, hijo de Abinoam, desde Quedes de Neftalí[a], y le dijo: «¿No ha mandado Yahvé, el Dios de Israel: “Ve, marcha al monte Tabor[b], y lleva contigo diez mil hombres de entre los hijos de Neftalí y de entre los hijos de Zabulón”?»'
  to: 'Ella envió y mandó llamar a Barac, hijo de Abinoam, desde Quedes de Neftalí[a], y le dijo: «¿No ha mandado Yahvé, el Dios de Israel, “Ve, marcha al monte Tabor[b], y lleva contigo diez mil hombres de entre los hijos de Neftalí y de entre los hijos de Zabulón[c]”?»'
  rationale: Se corrige la puntuación para introducir la cita directa de manera natural en español, se conserva la terminología del proyecto, y se añade la nota faltante sobre «hijos de» para reflejar fielmente el rastro de auditoría inglés y evitar ambigüedad genealógica en español. También se ajusta la nota del monte Tabor para que ofrezca alternativas reales en vez de repetir la lectura principal.
