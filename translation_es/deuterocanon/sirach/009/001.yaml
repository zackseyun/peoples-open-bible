translation:
  language: es
  text: No tengas celos de la esposa que está en tu seno[a][b], no sea que te enseñes a ti mismo el mal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''No envidies''. El verbo hebreo puede abarcar celos y envidia; aquí el contexto matrimonial favorece ''tener celos''.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la esposa en tu seno', un modismo para la esposa íntima o propia.
    reason: cultural_note
  - marker: c
    text: El hebreo dice simplemente 'mal', mientras que el paralelo griego tiene 'mala instrucción/disciplina'. El texto principal conserva 'el mal', pero la construcción también puede implicar aprender o inculcarse una mala lección.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּקַנֵּא
  english_pob_choice: Do not be jealous
  chosen_spanish: No tengas celos
  alternatives_spanish:
  - No envidies
  - No seas celoso
  lexicon: HALOT
  rationale: El verbo קנא puede abarcar celos o envidia. En este contexto matrimonial, el sentido natural en español es 'tener celos'; 'no envidies' sigue siendo posible, pero pierde el matiz relacional. 'No seas celoso' funciona, aunque suena algo más interpretativo que el imperativo directo.
- source_word: אֵשֶׁת חֵיקֶךָ
  english_pob_choice: the wife in your bosom
  chosen_spanish: la esposa de tu seno
  alternatives_spanish:
  - tu esposa
  - la esposa de tu abrazo
  lexicon: HALOT
  rationale: '''חֵיק'' designa literalmente el pecho/seno y expresa cercanía íntima. ''De tu seno'' conserva la imagen y corresponde al paralelo griego ''τοῦ κόλπου σου''. ''Tu esposa'' sería más claro, pero perdería la metáfora.'
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o de lo contrario
  lexicon: HALOT
  rationale: '''פֶּן'' introduce una advertencia de consecuencia indeseable. En español bíblico actual, ''no sea que'' comunica bien ese valor de prevención sin sonar arcaico.'
- source_word: תִּלְמַד עָלֶיךָ
  english_pob_choice: you teach yourself evil
  chosen_spanish: te enseñes a ti mismo el mal
  alternatives_spanish:
  - te enseñes mal
  - te atraigas el mal sobre ti
  lexicon: HALOT
  rationale: El hebreo admite una lectura de 'enseñar' reforzada por el paralelo griego δίδαξῃς. La construcción 'a ti mismo' conserva el matiz reflexivo y adversativo de עָלֶיךָ. Se evita 'te atraigas el mal sobre ti' porque debilita el enlace con el verbo de enseñanza del testimonio griego.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - maldad
  - algo malo
  - una lección mala
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'mal'; el griego amplía a 'mala instrucción/disciplina'. En español, 'el mal' es suficientemente amplio y fiel, sin introducir de forma excesiva la paráfrasis 'lección' que no está explícita en el hebreo.
theological_decisions:
- issue: Relación entre el hebreo breve 'mal' y el griego ampliado 'mala instrucción/disciplina'
  english_pob_reading: The translation makes that sense explicit as 'an evil lesson.'
  chosen_spanish_reading: Se mantiene 'el mal' en el texto principal, sin convertirlo en 'lección mala'.
  alternative_spanish_readings:
  - una mala instrucción
  - una mala disciplina
  - un mal aprendizaje
  rationale: El hebreo base es más sobrio y no exige incorporar un sustantivo de enseñanza. Dado que el griego paralelo amplía la idea, se preserva la tensión en una nota en lugar de fijarla en el texto principal.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente que simplificó la idea a 'teach yourself evil', pero en español se evitó una estructura demasiado literal o forzada. Se conservó el contraste entre el hebreo breve y el griego expansivo mediante una nota textual, y se mantuvo la metáfora familiar de 'tu seno' por su respaldo en ambos testigos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Nombre divino cuando aparezca, conforme al estándar del proyecto.
  - Se mantiene 'mal' en el cuerpo del texto para respetar la sobriedad del hebreo y no sobreexplicar la frase.
  - Se conserva el registro bíblico moderno y digno, evitando tanto arcaísmos excesivos como paráfrasis libres.
