review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: Dios declara el cambio de nombre de Jacob a Israel y luego se repite la fórmula de nombramiento. Conserva bien אֱלֹהִים como «Dios», la repetición de «tu nombre», el contraste de לֹא ... עוֹד / כִּי אִם, y la tensión teológica de la declaración de renombramiento. Sin embargo, dos formulaciones españolas no son plenamente idiomáticas ni fieles al registro deseado: «Y dijo Dios a él» debe ser «Y Dios le dijo», y «Y llamó su nombre Israel» resulta demasiado calcada en español bíblico moderno; conviene una forma natural que todavía preserve la literalidad mediante nota.'
  spanish_quality_summary: 'La calidad del español es comprensible, pero hay calcos que suenan poco naturales: «a él» tras «dijo» y especialmente «llamó su nombre Israel». «No se llamará más tu nombre Jacob» es entendible, pero una reordenación mejora mucho la fluidez sin perder transparencia. El registro puede mantenerse digno y moderno con «Y Dios le dijo» y «tu nombre ya no será llamado Jacob».'
  glossary_alignment: 'La terminología clave está alineada: «Dios» para אֱלֹהִים, «Jacob», «Israel». No hay conflicto con los defaults del proyecto. La decisión sobre la cláusula final debe equilibrar transparencia de audit trail con español natural: en el texto principal es mejor «lo llamó Israel», preservando la alternativa más literal en nota.'
  issues:
  - severity: medium
    issue: Orden poco natural en «Y dijo Dios[a] a él»
    rationale: Aunque semánticamente correcto, en español natural y digno la colocación preferible es «Y Dios le dijo». Refleja bien el hebreo sin calco innecesario.
  - severity: high
    issue: «Y llamó su nombre Israel» es un calco hebraizante poco natural en español
    rationale: La fórmula literal hebrea debe constar en la nota, como ya hace la POB inglesa, pero en el texto principal español suena antinatural y difícil. «Y lo llamó Israel» o «Y le puso por nombre Israel» comunica fielmente el acto de nombrar y mantiene legibilidad.
  - severity: medium
    issue: La nota [a] está anclada en «Dios» pero explica la cláusula final
    rationale: El marcador debe aparecer en la frase relevante del texto, no junto a «Dios». La instrucción del proyecto exige anclar cada nota en el punto correspondiente.
  - severity: low
    issue: La secuencia «No se llamará más tu nombre Jacob» puede mejorarse
    rationale: Es entendible, pero «tu nombre ya no será llamado Jacob» o «tu nombre ya no se llamará Jacob» suena más natural y conserva el valor pasivo/naming del nifal con עוֹד.
