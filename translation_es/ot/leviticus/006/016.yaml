translation:
  language: es
  text: Y toda ofrenda de cereal[a] de un sacerdote será completamente quemada; no se comerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda vegetal». El hebreo מִנְחָה es el término técnico para esta ofrenda no animal; aquí «ofrenda de cereal» expresa mejor el sentido cultual específico del contexto levítico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And every
  chosen_spanish: Y toda
  alternatives_spanish:
  - Y cada
  - Y toda una
  lexicon: HALOT
  rationale: כָּל con un sustantivo singular en este contexto legal tiene fuerza distributiva. «Toda» conserva esa distribución de modo natural en español y mantiene el enlace de continuidad de la norma.
- source_word: מִנְחַת
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda
  - oblación
  lexicon: HALOT
  rationale: En Levítico, מִנְחָה es el término técnico para la ofrenda no animal. «Ofrenda vegetal» es una opción clara y cultual en español, y evita la ambigüedad de «ofrenda» sola. «De cereal» también es posible, pero puede sonar más estrecho o menos natural según el registro.
- source_word: כֹהֵן
  english_pob_choice: of a priest
  chosen_spanish: del sacerdote
  alternatives_spanish:
  - de un sacerdote
  - del sacerdote
  lexicon: HALOT
  rationale: 'La cadena constructa expresa pertenencia o vinculación cultual: la ofrenda correspondiente al sacerdote. «Del sacerdote» refleja el vínculo de manera idiomática en español.'
- source_word: כָּלִיל
  english_pob_choice: shall be wholly burned
  chosen_spanish: será completamente quemada
  alternatives_spanish:
  - será totalmente quemada
  - será quemada por completo
  - será enteramente consumida
  lexicon: HALOT
  rationale: El adjetivo כָּלִיל puede indicar algo íntegro o completo; en este contexto el sentido práctico es que la ofrenda se entrega enteramente al fuego y no se reserva para comer. «Completamente quemada» comunica bien esa fuerza sin añadir demasiada interpretación.
- source_word: לֹא תֵאָכֵל
  english_pob_choice: it shall not be eaten
  chosen_spanish: no se comerá
  alternatives_spanish:
  - no será comida
  - no deberá comerse
  lexicon: HALOT
  rationale: La pasiva hebrea se refleja de forma natural con una construcción impersonal en español. «No se comerá» conserva la prohibición jurídica con sencillez y fidelidad.
translation_notes:
  revision_awareness: Se siguió el ajuste auditado del inglés POB que pasa de una formulación más abstracta («whole offering») a una más explícita sobre la acción implícita («wholly burned»), manteniendo el registro legal. En español se reflejó ese mismo avance con «será completamente quemada».
  spanish_consistency_notes:
  - Se preserva el tono legal de mandato con futuro simple.
  - «Ofrenda vegetal» mantiene coherencia con el término técnico מִנְחָה en contextos levíticos.
  - La negación pasiva «no se comerá» reproduce el valor impersonal del hebreo sin introducir un sujeto inexistente.
