translation:
  language: es
  text: 'Y Tobías le dijo[a]: «Espérame, y le diré a mi padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego es breve: «Y Tobías le dijo: “Espérame, y le diré a mi padre”». Un testimonio semítico paralelo amplía la escena diciendo que Tobías fue e informó a su padre acerca del hombre que había encontrado, y luego salió a llamarlo. El texto principal sigue al griego, mientras que el contexto más amplio se conserva aquí en la nota.'
    reason: textual_variant
lexical_decisions:
- source_word: Ὑπόμεινόν με
  english_pob_choice: Wait for me
  chosen_spanish: Espera[?]me
  alternatives_spanish:
  - Quédate aquí mientras tanto
  - Espérame
  - Permanece aquí
  lexicon: BDAG
  rationale: El imperativo aoristo de ὑπομένω aquí pide que el hombre aguarde mientras Tobías va a hablar con su padre. En español, «espérame» comunica de manera natural esa espera personal y conserva la relación directa del original. Se evita una formulación demasiado interpretativa como «quédate aquí mientras tanto» porque el griego solo expresa la espera, no necesariamente el matiz locativo explícito.
- source_word: ἐρῶ
  english_pob_choice: I will tell
  chosen_spanish: hablaré
  alternatives_spanish:
  - le diré
  - le contaré
  - le informaré
  lexicon: BDAG
  rationale: El futuro de λέγω en este contexto puede reflejar el acto de comunicar algo a su padre. Dado que el griego es breve y la escena sugiere que Tobías va a exponer la situación, «hablaré a mi padre» mantiene la simplicidad del original sin imponer el contenido específico de «decirle» o «contarle».
- source_word: τῷ πατρί
  english_pob_choice: my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - al padre
  - a mi propio padre
  lexicon: BDAG
  rationale: 'Aunque el griego usa el artículo, el sentido contextual es posesivo: se refiere al padre de Tobías, Tobit. En español, «a mi padre» es la forma natural y fiel para expresar ese referente implícito sin añadir énfasis innecesario.'
- source_word: Τωβίας
  english_pob_choice: Tobiah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobiah
  - Tobías
  lexicon: Greek proper name tradition
  rationale: Se conserva la forma castellana tradicional y reconocible del nombre propio. Dado que el proyecto busca legibilidad en español bíblico y el nombre es plenamente identificable en esta forma, «Tobías» es preferible a una transliteración más cercana al inglés.
translation_notes:
  revision_awareness: 'El inglés POB sigue el griego breve y anota que un testimonio semítico paralelo amplía la escena. Esta versión española mantiene esa misma línea: texto principal conciso, con nota sobre la variante ampliada, sin importar la expansión al cuerpo del versículo.'
  spanish_consistency_notes:
  - Se usa «Tobías» para el nombre propio, siguiendo una forma española estándar y coherente con el contexto bíblico.
  - Se evita «SEÑOR» u otra convención de sustitución porque aquí no aparece el nombre divino ni κύριος en sentido de cita del nombre divino.
  - La frase verbal «hablaré a mi padre» conserva la sencillez del griego y la fluidez natural del español.
  - El marcador de nota a debe leerse unido a «Espera»; la forma final pretendida es «Espera[a]me».
