  language: en
  yaml_path: translation/ot/judges/018/001.yaml
  text: In those days there was no king in Israel[a]. And in those days the tribe of the Danites was seeking for itself an inheritance to dwell in[b], because up to that day no inheritance had fallen to it among the tribes of Israel.
