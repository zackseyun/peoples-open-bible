translation:
  language: es
  text: Me ceñiste de fuerza para la batalla; pusiste debajo de mí a los que se levantaron contra mí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתְּאַזְּרֵנִי
  english_pob_choice: you equipped me
  chosen_spanish: Me ceñiste
  alternatives_spanish:
  - Me equipaste
  - Me armaste
  lexicon: HALOT
  rationale: אזר expresa la idea de ceñir/equipar para una tarea. «Me ceñiste» conserva la imagen corporal y militar del hebreo con una forma natural en español. «Me equipaste» sería más explicativo; «Me armaste» estrecha demasiado el sentido hacia armas concretas.
- source_word: חַיִל
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - vigor
  - valor
  - poder
  lexicon: HALOT
  rationale: En este contexto חַיִל califica la capacidad para el combate. «Fuerza» comunica bien la capacidad bélica sin introducir la connotación colectiva de «ejército» ni una valoración moral excesiva como «valor».
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  lexicon: HALOT
  rationale: מִלְחָמָה puede significar guerra o batalla; aquí el contexto inmediato favorece la imagen concreta del combate. «Para la batalla» es natural y precisa en español.
- source_word: תַּכְרִיעַ
  english_pob_choice: you subdued
  chosen_spanish: hiciste caer
  alternatives_spanish:
  - hiciste doblar
  - causaste que se inclinaran
  - subyugaste
  lexicon: HALOT
  rationale: La forma causativa de כרע expresa hacer doblar o inclinar. «Hiciste caer» transmite la derrota y el derribo con fluidez en español, sin perder la violencia de la imagen. «Subyugaste» sería más interpretativo; «hiciste doblar» suena más literal pero menos idiomático.
- source_word: קָמַי
  english_pob_choice: those who rose against me
  chosen_spanish: a los que se levantan contra mí
  alternatives_spanish:
  - a mis adversarios
  - a los que se alzan contra mí
  lexicon: HALOT
  rationale: El participio conserva la imagen de hostilidad activa. «Los que se levantan contra mí» mantiene el valor verbal y la dirección adversativa mejor que una equivalencia más abstracta como «mis adversarios».
- source_word: תַּחְתָּי
  english_pob_choice: beneath me
  chosen_spanish: debajo de mí
  alternatives_spanish:
  - bajo mí
  - bajo mi poder
  lexicon: HALOT
  rationale: La preposición espacial expresa sometimiento. «Debajo de mí» es claro y mantiene la metáfora espacial del texto hebreo; «bajo mi poder» explicita más de lo que el verso dice.
translation_notes:
  revision_awareness: La redacción sigue el hebreo de forma directa y refleja la decisión inglesa de mantener la imaginería militar y la subida/bajada de poder con un español natural. No se añadieron notas porque la versión española puede incorporar las alternativas sin crear ambigüedad textual que requiera marcadores.
  spanish_consistency_notes:
  - Se conservó la secuencia imagen-ceñir/fuerza/batalla como en el hebreo.
  - Se prefirió un verbo de derrota concreto («hiciste caer») para תַּכְרִיעַ, coherente con la lectura auditada de derrota militar.
  - Se mantuvo el paralelismo espacial con «debajo de mí» para תַּחְתָּי.
  - No se usó «SEÑOR» ni terminología litúrgica ajena al verso.
