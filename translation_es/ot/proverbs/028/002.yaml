    rationale: Aunque busca reflejar el sujeto implícito del hebreo, en español la construcción deja ambiguo qué es lo que se prolonga. El POB inglés revisó precisamente para mantener un referente implícito pero entendible; «esta perdura» comunica mejor esa intención.
  - severity: low
    issue: La nota b no coincide óptimamente con la redacción principal
    rationale: Si se ajusta el texto principal, la nota alternativa debe actualizarse para conservar coherencia entre la traducción y la explicación del hebreo difícil.
