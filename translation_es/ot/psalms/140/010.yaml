translation:
  language: es
  text: En cuanto a la cabeza de los que me rodean[a], que el daño de sus labios los cubra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cabeza» conserva el singular del hebreo, aunque puede funcionar colectivamente por el conjunto de los que rodean al salmista.
    reason: alternative_reading
  - marker: b
    text: «Daño» traduce el término hebreo de manera amplia; también podría entenderse como «maldad» o «perjuicio», según el énfasis contextual.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - cabezas
  - principal
  - jefe
  lexicon: HALOT
  rationale: Mantengo el sustantivo concreto «cabeza» para conservar la imagen corporal del hebreo y su posible valor colectivo en esta sintaxis comprimida. En español suena natural y permite el giro imprecatorio del verbo «cubra».
- source_word: מְסִבָּי
  english_pob_choice: those who surround me
  chosen_spanish: los que me rodean
  alternatives_spanish:
  - los que me cercan
  - mis rodeadores
  - mis enemigos alrededor de mí
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona plural/encuadre indica a los que están alrededor del salmista. «Los que me rodean» conserva la idea de cerco sin añadir más hostilidad de la que el contexto ya aporta.
- source_word: עֲמַל
  english_pob_choice: trouble
  chosen_spanish: mal
  alternatives_spanish:
  - trouble
  - miseria
  - daño
  - maldad
  lexicon: HALOT
  rationale: Aquí el término se relaciona con «sus labios» y expresa el efecto dañino o perverso de su խոսar. «Mal» es breve, natural en español y suficientemente amplio para no cerrar el rango semántico que el inglés POB dejó abierto con su nota sobre posibles matices.
- source_word: שְׂפָתֵימוֹ
  english_pob_choice: their lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su habla
  - su boca
  lexicon: HALOT
  rationale: Conservo la parte del cuerpo, no la generalizo a «habla», porque el hebreo es literal y poético. En español mantiene la concreción de la imagen y la relación estrecha entre palabra y consecuencia.
- source_word: יכסומו
  english_pob_choice: let ... cover them
  chosen_spanish: que ... los cubra
  alternatives_spanish:
  - que ... los cubran
  - los cubrirá
  - que ... los oculte
  lexicon: HALOT
  rationale: El verbo כסה significa «cubrir». En este contexto conviene un subjuntivo exhortativo/imprecatorio («que ... los cubra») para reflejar el tono de deseo/júbilo judicial del salmo, en vez de convertirlo en simple futuro.
theological_decisions:
- issue: Estructura del versículo y sentido imprecatorio
  english_pob_reading: 'Treat the verse as an imprecatory wish: ''As for the head of those who surround me, let the trouble of their lips cover them.'''
  chosen_spanish_reading: 'Tomar el versículo como un deseo imprecatorio: «En cuanto a la cabeza de los que me rodean[a], que el mal de sus labios los cubra[b]».'
  alternative_spanish_readings:
  - «La cabeza de los que me rodean será cubierta por el mal de sus labios»
  - «Que las cabezas de los que me rodean sean cubiertas con el mal de sus labios»
  rationale: El hebreo es muy compacto y admite cierta elipsis. La lectura optativa encaja con el contexto de súplica/imprecación del salmo y conserva la tensión entre un singular («cabeza») y un referente colectivo («los que me rodean»).
  doctrine_reference: Salmos imprecatorios; justicia retributiva en la oración bíblica
translation_notes:
  revision_awareness: 'Ajusté el español para que cada nota tenga su ancla visible en el texto. También mantuve el valor compacto del hebreo: singular «cabeza», grupo plural implícito, y un verbo en subjuntivo para el matiz imprecatorio. Evité traducir mecánicamente desde el inglés cuando el español podía reflejar mejor la elipsis hebrea.'
  spanish_consistency_notes:
  - Usé «Yahvé» en otros contextos de la obra según el criterio del proyecto; este versículo no lo requiere.
  - Conservé el singular «cabeza» para no borrar la tensión textual observada en la nota del inglés POB.
  - Elegí «mal» como equivalente amplio de עֲמַל, coherente con la nota inglesa sobre posibles alternativas semánticas.
