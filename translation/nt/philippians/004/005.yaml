theological_decisions:
- issue: Sense of ὁ κύριος ἐγγύς
  chosen_reading: The Lord is near
  alternative_readings:
  - The Lord is close at hand
  - The Lord is coming soon
  rationale: The Greek expression naturally allows both spatial/presential and temporal/eschatological nuance. The main text preserves that tension rather than narrowing it to only one interpretive option.
  doctrine_reference: Preserve theological tension rather than resolve it.
