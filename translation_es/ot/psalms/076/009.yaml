revisions:
- from: Desde los cielos hiciste[oír] el juicio[a]; la tierra[b] tuvo temor y guardó silencio[c].
  to: Desde el cielo hiciste oír el juicio[a][b]; la tierra[c] temió y quedó quieta[d].
  rationale: La revisión corrige el formato obligatorio de notas, ajusta מִשָּׁמַיִם a la elección principal documentada ('cielo' como forma idiomática principal), conserva el causativo de הִשְׁמַעְתָּ con una expresión natural en español, mejora la nota de אֶרֶץ para reflejar la alternativa real documentada, y sustituye 'guardó silencio' por 'quedó quieta' para representar con más precisión שׁקט como quietud/calma y no simplemente silencio verbal. También se simplifica 'tuvo temor' a 'temió' para acercarse a la tersura poética del hebreo.
