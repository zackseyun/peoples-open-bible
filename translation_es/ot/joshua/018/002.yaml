translation:
  language: es
  text: Pero entre los hijos de Israel quedaban siete tribus que no habían repartido su herencia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entre los israelitas'. El hebreo dice más literalmente 'entre los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'que no habían dividido su herencia' o 'que todavía no habían recibido su herencia por sorteo'. El verbo hebreo puede rendirse de distintas maneras según se enfatice la participación de las tribus en el reparto o el hecho de que la herencia aún no les había sido asignada.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּוָּתְרוּ
  english_pob_choice: there remained
  chosen_spanish: quedaban
  alternatives_spanish:
  - quedaron
  - permanecían
  lexicon: HALOT
  rationale: El hebreo expresa que todavía había un remanente. En español, 'quedaban' conserva bien la idea de existencia restante sin sonar forzado en el contexto narrativo.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea familiar 'hijos de Israel', que el inglés POB retuvo por transparencia. 'Entre' comunica correctamente el valor locativo de בְּ.
- source_word: אֲשֶׁר לֹא חָלְקוּ
  english_pob_choice: that had not apportioned
  chosen_spanish: que no habían repartido
  alternatives_spanish:
  - que no habían dividido
  - que no habían asignado
  lexicon: HALOT
  rationale: En el contexto de la distribución territorial, חָלַק admite la idea de repartir o asignar por sorteo. 'Repartido' es natural en español y mantiene la noción de distribución del territorio sin perder el matiz de participación del sujeto.
- source_word: אֶת נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su herencia asignada
  lexicon: HALOT
  rationale: נַחֲלָה en este pasaje alude al lote territorial recibido como posesión heredada. 'Herencia' es la opción más clara y sobria en español bíblico moderno, y preserva el sentido de posesión asignada.
- source_word: שִׁבְעָה שְׁבָטִים
  english_pob_choice: seven tribes
  chosen_spanish: siete tribus
  alternatives_spanish:
  - siete clanes
  - siete grupos tribales
  lexicon: HALOT
  rationale: La traducción directa 'siete tribus' es la natural y exacta para שְׁבָטִים en el marco de Israel.
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con el trazado de revisión más reciente: no se registran cambios posteriores que alteren el sentido, y la solución española sigue de cerca el audit trail inglés sin mecanicismo.'
  spanish_consistency_notes:
  - Se mantiene 'hijos de Israel' para preservar la transparencia del hebreo.
  - Se usa 'herencia' para נַחֲלָה, en línea con el valor de posesión territorial heredada en Josué.
  - '''Repartido'' recoge el campo semántico de distribución territorial sin introducir una lectura doctrinal adicional.'
