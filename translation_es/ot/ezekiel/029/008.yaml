translation:
  language: es
  text: 'Por tanto, así dice el Señor, Yahvé: He aquí, voy a traer una espada[a] contra ti, y eliminaré de ti a hombre y bestia[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «voy a traer la espada contra ti». En hebreo, «espada» puede funcionar como imagen colectiva de guerra y juicio.'
    reason: lexical_alternative
  - marker: b
    text: «Hombre y bestia» es una fórmula fija de juicio que significa tanto seres humanos como animales.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce la consecuencia del juicio precedente; «Por tanto» conserva el enlace formal y suena natural en español bíblico sin perder la lógica profética.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Así dice» mantiene el tono solemne y el carácter de mensaje directo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se conserva el valor del título compuesto. Siguiendo la convención del proyecto para יְהוָה, se traduce el Nombre divino como «Yahvé» en el texto principal; «Señor» refleja אֲדֹנָי sin recurrir al reemplazo por mayúsculas de máscara.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Aquí estoy
  lexicon: HALOT
  rationale: Marca una introducción solemne y deíctica. «He aquí» es idiomático en registro bíblico español y conserva la fuerza anunciativa.
- source_word: מֵבִיא
  english_pob_choice: I am bringing
  chosen_spanish: voy a traer
  alternatives_spanish:
  - estoy trayendo
  - traigo
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa inmediatez e intención de acción. En español, «voy a traer» comunica mejor la inminencia que un presente simple, sin volverlo demasiado interpretativo.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: En lenguaje de juicio hostil, «contra ti» expresa la dirección adversativa de forma clara y natural.
- source_word: חָרֶב
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - la espada
  - guerra
  lexicon: HALOT
  rationale: El sustantivo singular anarthrous puede funcionar como imagen colectiva de guerra/jucio. «Una espada» preserva la metáfora concreta y admite el sentido más amplio documentado por la nota inglesa.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - eliminaré
  - exterminaré
  lexicon: HALOT
  rationale: El verbo כרת conserva la imagen de cortar/arrancar. En contexto de juicio, «cortaré» mantiene la fuerza verbal y evita perder la metáfora original.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de en medio de ti
  - de entre ti
  lexicon: HALOT
  rationale: La forma pronominal femenina singular corresponde a Egipto personificado; «de ti» es literal, claro y suficiente en español.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - a las personas
  lexicon: HALOT
  rationale: En la fórmula fija «hombre y bestia», «hombre» conserva el paralelismo tradicional con «bestia» y la amplitud colectiva del sustantivo.
- source_word: וּבְהֵמָה
  english_pob_choice: and beast
  chosen_spanish: y la bestia
  alternatives_spanish:
  - y los animales
  - y el ganado
  lexicon: HALOT
  rationale: «Bestia» mantiene el contrapunto lexical con «hombre» y refleja el valor formular del binomio de juicio.
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: La evidencia del texto fuente contiene explícitamente el Tetragrama. Conforme a la política del proyecto, se preserva el Nombre propio en español como «Yahvé», evitando la convención de máscara «SEÑOR»; al mismo tiempo, «Señor» traduce adecuadamente אֲדֹנָי.
  doctrine_reference: 'DOCTRINE.md: contested terms for YHWH; Spanish project terminology defaults'
- issue: La fórmula judicial «hombre y bestia»
  english_pob_reading: man and beast
  chosen_spanish_reading: al hombre y a la bestia
  alternative_spanish_readings:
  - a las personas y a los animales
  - a la humanidad y a la bestia
  rationale: Se conserva la fórmula estereotipada de juicio, que en el contexto bíblico abarca tanto humanos como animales. «Hombre y bestia» retiene la tensión formulística y el paralelismo del hebreo.
  doctrine_reference: Géneros literarios proféticos; fórmula de juicio stock
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la elección «the Lord GOD» allí responde a la convención editorial en inglés para אֲדֹנָי יְהוִה, mientras que el proyecto español requiere «Yahvé» en el texto principal. También se preservó la nota sobre «espada» como imagen colectiva y la fórmula stock «hombre y bestia».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrama, conforme al estándar español del proyecto.
  - Se usó «Señor» para אֲדֹנָי sin convertir el Nombre divino en mayúsculas de sustitución.
  - Se prefirió «bestia» a «animal» para conservar el paralelismo formular con «hombre».
  - Se evitó una paráfrasis explicativa dentro del texto principal, dejando la expansión semántica en nota.
