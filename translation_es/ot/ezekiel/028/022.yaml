    reason: lexical_alternative
  - marker: b
    text: O «seré santificado en ella» o «manifestaré mi santidad en ella». La expresión indica que la santidad de Yahvé queda públicamente vindicada mediante sus actos de juicio.
    reason: lexical_alternative
