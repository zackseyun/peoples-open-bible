base_translation:
  language: en
  yaml_path: translation/ot/1_kings/019/013.yaml
  text: And when Elijah heard it[a], he wrapped his face in his cloak, and went out and stood at the entrance of the cave. And behold, a voice came to him and said, “What are you doing here[b], Elijah?”
  footnotes:
  - marker: a
    text: Or, 'What is it to you here, Elijah?' The Hebrew idiom asks Elijah's business or purpose in this place.
    reason: lexical_alternative
  - marker: b
    text: The object of 'heard' is implicit in Hebrew; contextually it refers to what immediately preceded, often understood as the sound/voice from the prior verse.
    reason: alternative_reading
