translation:
  language: es
  text: Trae para mí caza y hazme comida sabrosa[a], para que yo coma y te bendiga delante de Yahvé antes de que yo muera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «manjares sabrosos». El hebreo se refiere a platillos preparados especialmente para ser agradables al gusto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִיאָה
  english_pob_choice: Bring
  chosen_spanish: Trae
  alternatives_spanish:
  - Trae aquí
  - Tráeme
  lexicon: HALOT
  rationale: El imperativo causativo de בוא expresa la idea de hacer venir o traer algo al hablante. En español, «Trae» es natural y directo; «tráeme» sería equivalente, pero aquí se mantiene el objeto implícito por la estructura del mandato, como en el hebreo.
- source_word: צַיִד
  english_pob_choice: game
  chosen_spanish: caza
  alternatives_spanish:
  - presa
  - animal cazado
  - venado
  lexicon: HALOT
  rationale: El término refiere a lo obtenido por la caza. «Caza» comunica bien el campo semántico sin restringirlo indebidamente a un animal específico como «venado»; «presa» también es posible, pero suena menos natural en este contexto.
- source_word: וַעֲשֵׂה
  english_pob_choice: make
  chosen_spanish: hazme
  alternatives_spanish:
  - prepárame
  - haz
  lexicon: HALOT
  rationale: El verbo עשה es amplio («hacer»/«preparar»). En contexto culinario, «hazme» conserva la literalidad básica y permite que el complemento «comida sabrosa» exprese la preparación exigida. «Prepárame» es una alternativa más interpretativa.
- source_word: מַטְעַמִּים
  english_pob_choice: tasty food
  chosen_spanish: comida sabrosa
  alternatives_spanish:
  - manjares
  - delicias
  - comida sazonada
  lexicon: HALOT
  rationale: El sustantivo se refiere a platos especialmente agradables o sabrosos. «Comida sabrosa» comunica el sentido de manera clara y moderna; «manjares» es posible, pero más literario y menos transparente.
- source_word: וְאֹכֵלָה
  english_pob_choice: so that I may eat
  chosen_spanish: para que yo coma
  alternatives_spanish:
  - y comeré
  - para comer
  lexicon: HALOT
  rationale: La forma cohortativa expresa finalidad o intención. «Para que yo coma» preserva esa fuerza final y mantiene el flujo natural del español.
- source_word: וַאֲבָרֶכְכָה
  english_pob_choice: and bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - te bendeciré
  - para bendecirte
  - y te bendiga
  lexicon: HALOT
  rationale: 'El cohortativo verbal muestra intención: después de comer, Isaac pretende bendecir a su hijo. En español, «te bendiga» conserva esa tonalidad volitiva mejor que un simple futuro; se integra con la cláusula final «para que yo coma y te bendiga».'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según la política del proyecto: יְהוָה se vierte «Yahvé», no una sustitución por título. «Delante de» reproduce לִפְנֵי con fidelidad espacial/relacional; «ante» también sería posible.'
- source_word: לִפְנֵי מוֹתִי
  english_pob_choice: before I die
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de mi muerte
  - antes de que yo muera
  lexicon: HALOT
  rationale: La construcción se expresa naturalmente en español como «antes de morir», que conserva el sentido temporal y evita una formulación nominal más pesada.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se mantiene como nombre propio transliterado en español («Yahvé»), en lugar de sustituirlo por un título como «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto fuente y con el expediente inglés. No se introdujeron cambios de sentido; la única decisión teológica explícita es mantener el nombre divino como «Yahvé».
  spanish_consistency_notes:
  - Se preservó el paralelismo de imperativos y cohortativos del hebreo mediante «Trae... y hazme..., para que yo coma y te bendiga...».
  - Se evitó el calco «antes de la muerte de mí» y se usó una construcción natural en español.
  - La nota [a] marca la presencia del nombre divino en el hebreo; la nota [b] preserva la alternativa léxica documentada para מַטְעַמִּים.
