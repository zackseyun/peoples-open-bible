translation:
  language: es
  text: Y se reunieron para construir, y cayó el muro del wadi del lado oriental[a], y reparó lo que se llama Jafenatá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el muro del torrente o barranca del lado oriental». La frase griega es comprimida, y χείμαρρος puede denotar un cauce estacional o su barranca.
    reason: lexical_alternative
  - marker: b
    text: Jafenatá es un topónimo transliterado; el griego no especifica con más precisión qué clase de sitio o estructura era.
    reason: cultural_note
lexical_decisions:
- source_word: συνήχθησαν
  english_pob_choice: they gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: LSJ
  rationale: El aoristo pasivo/medio funciona de manera intransitiva con sentido de reunión para un propósito. «Se reunieron» comunica bien la acción conjunta en español sin perder la proximidad al griego.
- source_word: τοῦ οἰκοδομεῖν
  english_pob_choice: to build
  chosen_spanish: para construir
  alternatives_spanish:
  - para edificar
  - para edificar de nuevo
  lexicon: LSJ
  rationale: El infinitivo articular con τοῦ expresa finalidad. «Para construir» es natural en español. No se añade «de nuevo» porque el griego no lo especifica.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se derrumbó
  - colapsó
  lexicon: LSJ
  rationale: El verbo significa literalmente «cayó». En el contexto de un muro, «cayó» conserva la transparencia del original; «se derrumbó» sería una expansión interpretativa.
- source_word: τοῦ τείχους
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la muralla
  - la fortificación
  lexicon: LSJ
  rationale: Τεῖχος puede ser «muro» o «muralla». Aquí «muro» mantiene una equivalencia sencilla y evita sobredeterminar si se trata de una muralla defensiva específica.
- source_word: τοῦ χειμάρρου
  english_pob_choice: of the wadi
  chosen_spanish: del wadi
  alternatives_spanish:
  - del torrente
  - del cauce seco
  lexicon: LSJ
  rationale: Χείμαρρος puede designar un torrente estacional o su cauce/ravina. Se conserva «wadi» porque en español bíblico contemporáneo transmite bien el sentido geográfico levantino sin forzar una imagen de agua permanente.
- source_word: τοῦ ἐξ ἀπηλιώτου
  english_pob_choice: on the east side
  chosen_spanish: del lado oriental
  alternatives_spanish:
  - del lado este
  - oriental
  lexicon: LSJ
  rationale: La construcción señala orientación lateral. «Del lado oriental» expresa con claridad la ubicación espacial y mantiene la cautela del texto griego.
- source_word: ἐπεσκεύασεν
  english_pob_choice: he repaired
  chosen_spanish: reparó
  alternatives_spanish:
  - restauró
  - reconstruyó
  lexicon: LSJ
  rationale: El verbo significa reparar o restaurar. «Reparó» es preciso y no exagera el alcance de la acción.
- source_word: τὸ καλούμενον Χαφεναθά
  english_pob_choice: what is called Chaphenatha
  chosen_spanish: lo que se llama Jafenatá
  alternatives_spanish:
  - el lugar llamado Jafenatá
  - la llamada Jafenatá
  lexicon: LSJ
  rationale: El griego usa una forma neutra indefinida que no precisa si se trata de lugar o estructura. «Lo que se llama» preserva esa cautela, y «Jafenatá» translitera el topónimo de manera legible en español.
translation_notes:
  revision_awareness: 'Se siguió el texto griego de Swete y el auditor inglés: se mantuvo la estructura de tres miembros, la cautela de χείμαρρος/ἀπηλιώτου y la transliteración del topónimo sin añadir precisiones no presentes en la fuente.'
  spanish_consistency_notes:
  - Se usó una transliteración española estable de Χαφεναθά como «Jafenatá».
  - Se prefirió «muro» frente a «muralla» para no cargar el verso con un matiz defensivo que el griego no explicita.
  - Se mantuvo «wadi» como préstamo técnico comprensible en contexto bíblico para respetar la decisión lexical del audit trail inglés.
