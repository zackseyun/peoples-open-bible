base_translation:
  language: en
  yaml_path: translation/ot/micah/004/007.yaml
  text: And I will make the lame a remnant[a], and the outcast a strong nation[b]; and Yahweh will reign over them on Mount Zion from now on and forever.
  footnotes:
  - marker: a
    text: Or 'the outcast.' The Hebrew term can denote one who has been removed or banished; 'driven away' highlights the exile context.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''from now on and forever.'''
    reason: lexical_alternative
