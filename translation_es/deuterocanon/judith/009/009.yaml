translation:
  language: es
  text: Mira su arrogancia; envía tu ira sobre sus cabezas; da poder[a] a lo que he planeado por mi mano, yo que soy viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dame poder en mi mano, yo que soy viuda, para lo que he planeado». El final griego es sintácticamente condensado y puede entenderse de más de una manera estrechamente relacionada.'
    reason: alternative_reading
lexical_decisions:
- source_word: βλέψον
  english_pob_choice: Look upon
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira fijamente
  - Mira sobre
  lexicon: LSJ
  rationale: El imperativo pide que Dios preste atención al orgullo enemigo. «Mira» mantiene la sencillez del ruego; el valor reverente de «Look upon» se conserva en el contexto oracional sin forzar una perífrasis poco natural en español.
- source_word: ὑπερηφανίαν
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - soberbia
  - altivez
  lexicon: LSJ
  rationale: «Arrogancia» expresa bien el orgullo insolente o desmedido del término griego en español moderno, y evita una carga eclesiástica más marcada que «soberbia».
- source_word: ἀπόστειλον
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - despacha
  lexicon: LSJ
  rationale: Imperativo aoristo con sentido directo de enviar. «Envía» es natural y fiel en un ruego dirigido a Dios.
- source_word: ὀργήν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  lexicon: LSJ
  rationale: En español bíblico «ira» comunica con claridad la respuesta judicial de Dios; «furor» o «cólera» serían más marcados o menos naturales aquí. No se pierde la fuerza retributiva del contexto.
- source_word: εἰς κεφαλὰς αὐτῶν
  english_pob_choice: upon their heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - en sus cabezas
  - contra sus cabezas
  lexicon: LSJ
  rationale: La imagen idiomática del juicio que cae sobre ellos se conserva con una construcción idiomática española natural. «Sobre» reproduce mejor la caída del castigo que una traducción más literal pero menos fluida.
- source_word: δὸς
  english_pob_choice: give
  chosen_spanish: da
  alternatives_spanish:
  - concede
  - otorga
  lexicon: LSJ
  rationale: «Da» sigue de cerca el imperativo simple griego y funciona bien en la oración. «Concede» o «otorga» sonarían más interpretativos o elevados sin necesidad.
- source_word: ἐν χειρί μου τῆς χήρας
  english_pob_choice: by the hand of me, a widow
  chosen_spanish: por la mano de mí, una viuda
  alternatives_spanish:
  - por mi mano, yo que soy viuda
  - en mi mano, la viuda
  lexicon: LSJ
  rationale: La frase griega es comprimida y deja abierta la relación exacta entre agencia e instrumento. «Por la mano de mí, una viuda» preserva la imagen concreta y la autoidentificación enfática con la viudez, sin resolver en exceso la sintaxis.
- source_word: ὃ διενοήθην
  english_pob_choice: what I have planned
  chosen_spanish: lo que he planeado
  alternatives_spanish:
  - lo que he pensado
  - lo que me he propuesto
  lexicon: LSJ
  rationale: «He planeado» refleja bien la idea de formar una intención o plan. Es más preciso que «he pensado» y menos interpretativo que «me he propuesto».
- source_word: κράτος
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - mando
  lexicon: LSJ
  rationale: Dado el ajuste revisado del inglés POB hacia «power», «poder» conserva la noción de capacidad efectiva/energía para obrar. «Fuerza» podría sonar más física; «mando» introduciría una idea ajena.
theological_decisions:
- issue: Cómo reflejar la petición final con κράτος y la construcción ἐν χειρί μου τῆς χήρας
  english_pob_reading: A request that God empower Judith's intended act through her own hand as a widow
  chosen_spanish_reading: Una petición para que Dios otorgue poder al acto que Judith ha planeado, realizado por su mano como viuda
  alternative_spanish_readings:
  - Dame poder en mi mano, yo que soy viuda, para lo que he planeado
  - Otorga poder por mi mano, la viuda, para lo que he planeado
  rationale: 'La sintaxis griega es condensada y admite más de una lectura cercana. La redacción española intenta mantener esa tensión: no resuelve del todo si la frase se orienta a la mano como instrumento, al poder dado para obrar, o a ambas cosas. Así se preserva el carácter auditable del original sin sobreexplicar la relación gramatical.'
  doctrine_reference: Preservar la tensión teológica y sintáctica del original
translation_notes:
  revision_awareness: El griego de Judith 9:9 presenta una cláusula final condensada. El inglés POB revisó su formulación desde «strength» a «power» para κράτος y desde una relación más literal con la mano a una formulación más natural («by the hand»). La versión española sigue esa línea, pero conserva la ambigüedad estructural con una nota, porque el original permite al menos dos construals próximos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo donde el texto fuente lo exige; aquí no aplica, pues el versículo es una súplica a Dios sin el tetragrámaton explícito.
  - Se usa «ira» para ὀργήν en un contexto judicial.
  - Se evita «sierva» para δοῦλος porque no aparece el término en este versículo.
  - «Viuda» se conserva como autodesignación explícita y no se suaviza.
  - La puntuación con punto y coma reproduce la progresión triple del ruego.
