translation:
  language: es
  text: Cuando hombres riñan y golpeen a una mujer embarazada, y sus hijos salgan[a], pero no haya daño[b], será multado sin falta, conforme a lo que el marido de la mujer le imponga, y pagará según los jueces[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «y sus hijos salgan». La expresión hebrea puede referirse a un parto prematuro; algunas traducciones la entienden como expulsión del embarazo o como aborto espontáneo.
    reason: lexical_alternative
  - marker: b
    text: O «ningún daño». El hebreo no aclara en este versículo por sí solo si el daño afecta a la madre, al niño o a cualquiera de los dos.
    reason: alternative_reading
  - marker: c
    text: O «por decisión judicial» o «ante el tribunal».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Y si
  lexicon: HALOT
  rationale: En una disposición casuística, «cuando» presenta naturalmente el caso legal en español y evita sonar demasiado hipotético o repetitivo.
- source_word: יִנָּצוּ אֲנָשִׁים
  english_pob_choice: men struggle together
  chosen_spanish: los hombres se peleen entre sí
  alternatives_spanish:
  - los hombres riñan entre sí
  - los hombres se enfrenten
  - los hombres luchen entre sí
  lexicon: HALOT
  rationale: «Se peleen entre sí» comunica una contienda física entre varios hombres sin endurecer indebidamente el sentido ni hacerlo demasiado coloquial.
- source_word: וְנָגְפוּ
  english_pob_choice: strike
  chosen_spanish: golpeen
  alternatives_spanish:
  - hieran
  - den un golpe a
  - choquen contra
  lexicon: HALOT
  rationale: «Golpeen» preserva la acción concreta de un impacto físico y evita interpretarla de antemano como lesión legalmente relevante.
- source_word: אִשָּׁה הָרָה
  english_pob_choice: a pregnant woman
  chosen_spanish: una mujer embarazada
  alternatives_spanish:
  - una mujer preñada
  - una mujer en cinta
  lexicon: HALOT
  rationale: Es la equivalencia española natural y precisa para la mujer en estado de embarazo.
- source_word: וְיָצְאוּ יְלָדֶיהָ
  english_pob_choice: so that her children come out
  chosen_spanish: y sus hijos salgan
  alternatives_spanish:
  - y se le salgan los hijos
  - y nazcan sus hijos
  - y ella dé a luz prematuramente
  lexicon: HALOT
  rationale: «Sus hijos salgan» sigue de cerca la imagen hebrea de salir/expulsarse, sin decidir si se trata de parto prematuro, aborto espontáneo o expulsión general. Se conserva la tensión interpretativa del hebreo.
- source_word: אָסוֹן
  english_pob_choice: no harm
  chosen_spanish: no haya daño
  alternatives_spanish:
  - no haya mal
  - no haya desgracia
  - no haya lesión grave
  lexicon: HALOT
  rationale: «Daño» reproduce de manera amplia y sobria אָסוֹן sin restringirlo a lesión física grave ni a muerte; mantiene abierta la amplitud semántica del término.
- source_word: עָנ֣וֹשׁ יֵעָנֵ֗שׁ
  english_pob_choice: he shall surely be fined
  chosen_spanish: será multado sin falta
  alternatives_spanish:
  - será castigado sin falta
  - pagará una multa
  - será condenado a multa
  lexicon: HALOT
  rationale: La intensidad del infinitivo absoluto más verbo finito se expresa con «sin falta», y el contexto legal favorece «multado» sobre un genérico «castigado».
- source_word: כַּאֲשֶׁר יָשִׁית עָלָיו
  english_pob_choice: as ... imposes on him
  chosen_spanish: conforme a lo que ... imponga sobre él
  alternatives_spanish:
  - según lo que ... le imponga
  - como ... ponga sobre él
  - de acuerdo con lo que ... determine contra él
  lexicon: HALOT
  rationale: La fórmula conserva el valor legal de imponer una suma o pena; «conforme a lo que» suena natural y jurídico en español.
- source_word: בַּעַל הָאִשָּׁה
  english_pob_choice: the woman's husband
  chosen_spanish: el marido de la mujer
  alternatives_spanish:
  - el esposo de la mujer
  - el dueño de la mujer
  lexicon: HALOT
  rationale: En este contexto בַּעַל significa marido, no propietario. «Marido» es claro y no introduce un matiz más afectivo o eclesiástico de «esposo».
- source_word: וְנָתַן
  english_pob_choice: and he shall pay
  chosen_spanish: y pagará
  alternatives_spanish:
  - y dará
  - y entregará
  lexicon: HALOT
  rationale: En un contexto jurídico-financiero, «pagar» expresa con naturalidad el cumplimiento monetario implicado por el hebreo.
- source_word: בִּפְלִלִים
  english_pob_choice: according to the judges
  chosen_spanish: según los jueces
  alternatives_spanish:
  - por decisión judicial
  - ante los jueces
  - de acuerdo con la sentencia
  lexicon: HALOT
  rationale: La referencia es al arbitraje o evaluación judicial; «según los jueces» conserva el papel de la autoridad legal sin sobreespecificar el procedimiento.
theological_decisions:
- issue: Alcance de אָסוֹן y de «daño» en el versículo
  english_pob_reading: The Hebrew does not specify in this verse alone whether the serious injury concerns the mother, the child, or either one.
  chosen_spanish_reading: El texto español no especifica si el daño se refiere a la madre, al niño o a cualquiera de los dos.
  alternative_spanish_readings:
  - Interpretar que el daño solo se refiere a la madre
  - Interpretar que el daño solo se refiere al niño
  - Entender que implica una lesión grave definida
  rationale: La formulación mantiene abierta la ambigüedad del hebreo y evita resolver una cuestión jurídica y ética que el verso, por sí solo, no decide.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y jurídica en lugar de resolverla'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail en inglés: se evitó una restricción interpretativa como «lesión grave» para אָסוֹן y se prefirió una formulación amplia de «daño». También se preservó la decisión de no resolver si «sus hijos salgan» implica aborto, parto prematuro o expulsión general.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva un registro jurídico sobrio y no eclesiástico, acorde con el género casuístico del pasaje.
  - «Marido» se usa por precisión legal y no se sustituye por un término más devocional.
