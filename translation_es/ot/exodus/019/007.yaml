translation:
  language: es
  text: Entonces Moisés vino y llamó[a] a los ancianos del pueblo, y puso delante de ellos todas estas palabras[b] que Yahvé le había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'convocó a los ancianos del pueblo'.
    reason: lexical_alternative
  - marker: b
    text: O 'todas estas cosas' o 'todos estos asuntos'. El hebreo puede referirse tanto a palabras dichas como a asuntos tratados; aquí se eligió 'palabras' porque Moisés está transmitiendo el mensaje de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: El verbo בוא puede expresarse como 'venir' o 'ir' según el punto de referencia. En este contexto narrativo, 'vino' conserva el movimiento de Moisés de regreso desde la presencia de Yahvé hacia el pueblo y suena natural en español.
- source_word: וַיִּקְרָא לְזִקְנֵי הָעָם
  english_pob_choice: called for the elders of the people
  chosen_spanish: llamó a los ancianos del pueblo
  alternatives_spanish:
  - llamó a los líderes del pueblo
  - convocó a los ancianos del pueblo
  lexicon: HALOT
  rationale: קרא con ל puede significar llamar a o llamar para. 'Llamó a' refleja bien la acción de reunir a los representantes; 'convocó' sería posible, pero suena algo más fuerte que el hebreo y más institucional que el contexto exige.
- source_word: זִקְנֵי הָעָם
  english_pob_choice: the elders of the people
  chosen_spanish: los ancianos del pueblo
  alternatives_spanish:
  - los líderes del pueblo
  lexicon: HALOT
  rationale: '''Ancianos'' mantiene el sentido literal de זקנים y conserva la referencia a representantes reconocidos del pueblo, no solo a autoridades en sentido genérico.'
- source_word: וַיָּשֶׂם לִפְנֵיהֶם
  english_pob_choice: set before them
  chosen_spanish: puso delante de ellos
  alternatives_spanish:
  - presentó ante ellos
  - colocó delante de ellos
  lexicon: HALOT
  rationale: שׂים con לפני significa literalmente 'poner/colocar delante'. 'Puso delante de ellos' preserva la imagen concreta y funciona de manera natural para introducir el mensaje.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todos estos asuntos
  - todas estas cosas
  lexicon: HALOT
  rationale: דברים puede significar 'palabras', 'asuntos' o 'cosas'. Como Moisés está transmitiendo el mensaje de Yahvé, 'palabras' es la mejor opción para conservar el carácter verbal de la comunicación.
- source_word: אֲשֶׁר צִוָּהוּ יְהוָה
  english_pob_choice: that Yahweh had commanded him
  chosen_spanish: que Yahvé le había mandado
  alternatives_spanish:
  - que Yahvé le había ordenado
  - que Yahvé le había encomendado
  lexicon: HALOT
  rationale: צוה expresa mandar/ordenar. 'Había mandado' mantiene la relación de autoridad divina y el orden temporal previo al discurso de Moisés. Se usa 'Yahvé' según el estándar del proyecto para el Tetragrama.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme al estándar del proyecto en español, se traduce como 'Yahvé' para preservar el nombre de pacto, en lugar de enmascararlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés revisado mantiene alta concordancia y no requiere cambios sustanciales; se conserva la misma estructura semántica y la decisión de renderizar el nombre divino como Yahvé en español. No se documentan revisiones aplicadas al versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - '''Ancianos'' conserva la correspondencia con elders sin sustituirla por un término más interpretativo.'
  - '''Palabras'' se usa para דברים en un contexto de discurso revelado, evitando una generalización innecesaria.'
