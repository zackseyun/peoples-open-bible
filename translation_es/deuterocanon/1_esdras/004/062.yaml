translation:
  language: es
  text: Y bendijeron al Dios de sus padres, porque les había dado alivio y remisión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdón»; o «remisión» en el sentido de «liberación» o «soltura» (griego ἄφεσιν).
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγησαν
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - bendijeron a
  lexicon: BDAG
  rationale: En contexto doxológico, εὐλόγησαν expresa una acción de bendecir a Dios; en español, «bendijeron» reproduce mejor el giro bíblico que «alabaron», que desplaza el matiz hacia alabanza explícita.
- source_word: τὸν θεὸν τῶν πατέρων αὐτῶν
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - su Dios ancestral
  - el Dios de sus antepasados
  lexicon: BDAG
  rationale: Se conserva la fórmula covenantal e histórica del texto griego con una expresión natural en español bíblico. «Padres» mantiene la resonancia tradicional sin perder transparencia.
- source_word: ἔδωκεν
  english_pob_choice: had given
  chosen_spanish: les había dado
  alternatives_spanish:
  - les dio
  lexicon: BDAG
  rationale: 'El pluscuamperfecto español refleja bien la secuencia causal: primero Dios les concede la ayuda, y por eso ellos lo bendicen. No añade contenido nuevo, solo orden temporal claro.'
- source_word: ἄνεσιν
  english_pob_choice: relief
  chosen_spanish: alivio
  alternatives_spanish:
  - descanso
  - reposo
  - alivianamiento
  lexicon: BDAG
  rationale: ἄνεσις indica alivio de presión, aflicción o carga. «Alivio» comunica ese sentido con naturalidad y evita restringirlo indebidamente a descanso físico.
- source_word: ἄφεσιν
  english_pob_choice: remission
  chosen_spanish: remisión
  alternatives_spanish:
  - perdón
  - liberación
  - remisión de culpa
  lexicon: BDAG
  rationale: Siguiendo el auditable cambio inglés hacia «remission», «remisión» preserva la amplitud de ἄφεσις sin forzar aquí el sentido específicamente soteriológico de «perdón». En español, «remisión» conserva la apertura semántica de liberación/soltura.
theological_decisions:
- issue: Sentido de ἄφεσις en un contexto de alivio y no necesariamente de pecado
  english_pob_reading: remission
  chosen_spanish_reading: remisión
  alternative_spanish_readings:
  - perdón
  - liberación
  rationale: El paralelismo con ἄνεσις ('alivio') favorece una lectura de liberación o alivio de carga/circunstancia, no una referencia explícita al perdón de pecados. «Remisión» deja abierta esa amplitud sin imponer una interpretación más estrecha.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial inglés: la versión inicial alternó entre «release» y «remission», y la revisión posterior fijó «remission» por conveniencia formal. En español se eligió «remisión» para mantener esa decisión revisada sin perder la amplitud semántica de ἄφεσις.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y la fórmula tradicional «el Dios de sus padres» por su transparencia bíblica.
  - Se evitó «SEÑOR» porque el griego aquí dice θεόν, no κύριος.
  - «Bendijeron» conserva el tono doxológico y es coherente con el uso bíblico en español.
  - «Remisión» se usa aquí en sentido amplio de liberación/soltura, no como tecnicismo doctrinal sobre pecados.
