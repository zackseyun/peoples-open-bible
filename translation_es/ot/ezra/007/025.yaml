base_translation:
  language: en
  yaml_path: translation/ot/ezra/007/025.yaml
  text: And you[a], Ezra, according to the wisdom of your God that is in your hand, appoint magistrates and judges who may judge all the people who are beyond the River—all who know the laws of your God; and those who do not know them[b], you shall teach.
  footnotes:
  - marker: a
    text: Or 'which you possess' for 'that is in your hand'; the Aramaic idiom can denote possession or entrusted authority.
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' is the Persian administrative designation for the territory west of the Euphrates.'
    reason: cultural_note
