- from: Y yo abandonaré el remanente de mi heredad[a] y los entregaré en mano de sus enemigos, y serán botín y despojo para todos sus enemigos.
  to: Y yo abandonaré el remanente de mi herencia[a] y los entregaré en manos de sus enemigos, y llegarán a ser botín y despojo para todos sus enemigos.
  rationale: 'La revisión mantiene el contenido del borrador, pero lo alinea mejor con el expediente POB y mejora la naturalidad del español: ''mi herencia'' corresponde mejor a la elección principal auditada; la nota conserva ''mi heredad'' como alternativa con matiz pactal; ''en manos de'' suena más idiomático; y ''llegarán a ser'' refleja mejor el valor resultativo de וְהָיוּ.'
