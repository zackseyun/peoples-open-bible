translation:
  language: es
  text: y a nuestros reyes y a nuestros gobernantes y a nuestros sacerdotes y a nuestros profetas y a nuestros padres[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antepasados». El griego «padres» puede referirse a los antepasados en sentido nacional o pactual.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεῦσιν
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - reyes y soberanos
  lexicon: BDAG
  rationale: βασιλεύς designa a quienes ejercen realeza o reinaron; en español, "reyes" es el equivalente directo, natural y suficientemente preciso para conservar el rango político del término.
- source_word: ἄρχουσιν
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - dirigentes
  - autoridades
  - jefes
  lexicon: BDAG
  rationale: ἄρχων/ἄρχοντες nombra a quienes tienen autoridad de gobierno. "Gobernantes" conserva el sentido de autoridad pública sin estrecharlo a un cargo específico.
- source_word: ἱερεῦσιν
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes cultuales
  - presbíteros
  lexicon: BDAG
  rationale: ἱερεύς corresponde al término cultual de sacerdote; "sacerdotes" es la equivalencia directa y estable en español bíblico.
- source_word: προφήταις
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - videntes
  - portavoces proféticos
  lexicon: BDAG
  rationale: προφήτης se traduce de forma directa como "profeta". No hay indicio contextual para una glosa distinta.
- source_word: πατράσιν
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - antepasados
  - ancestros
  lexicon: BDAG
  rationale: πατέρες puede significar también antepasados o padres fundacionales. Se conserva "padres" para seguir de cerca la forma del griego y mantener el eco confesional; la nota aclara la posibilidad de "antepasados".
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestros
  lexicon: BDAG
  rationale: El posesivo repetido en griego se mantiene en español para reproducir la identificación comunitaria y el ritmo de la enumeración.
- source_word: καί
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: La conjunción repetida estructura la lista acumulativa; "y" preserva esa cadencia sin simplificarla.
theological_decisions:
- issue: πατράσιν en una confesión nacional/comunitaria
  english_pob_reading: fathers; footnote notes possible 'ancestors'
  chosen_spanish_reading: padres, con nota sobre el sentido posible de antepasados
  alternative_spanish_readings:
  - antepasados
  - ancestros
  rationale: El griego usa un término familiar masculino que, en este contexto, apunta a los antepasados del pueblo. La traducción principal conserva la forma más cercana al texto, y la nota preserva la amplitud semántica sin borrar la resonancia histórica y covenantal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Coincide con el criterio del auditorio inglés: la lista se traduce de forma lineal y repetitiva, sin normalizar las repeticiones de καί ni colapsar el posesivo ἡμῶν. Se mantiene la tensión de πατράσιν con nota explicativa, en paralelo al pie de página inglés.'
  spanish_consistency_notes:
  - Se conservaron repeticiones de «nuestros» y «y» para reflejar la cadencia del griego.
  - «Gobernantes» evita una restricción excesiva a cargos concretos y funciona bien en español bíblico contemporáneo.
  - «Padres» se deja en el texto principal por fidelidad formal, con nota para aclarar el posible sentido de «antepasados».
