translation:
  language: es
  text: No sé cómo aparecieron en mi vientre, ni fui yo quien les concedió espíritu[a] y vida, ni fui yo quien dispuso la formación de cada uno de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aliento y vida». El término griego πνεῦμα puede significar «espíritu», «aliento» o «viento»; aquí se refiere al principio animador de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ οἶδʼ ὅπως
  english_pob_choice: I do not know how
  chosen_spanish: No sé cómo
  alternatives_spanish:
  - No sé de qué manera
  - No sé cómo fue que
  lexicon: BDAG
  rationale: La expresión introduce la confesión de ignorancia de la madre respecto del modo en que sus hijos llegaron a estar en su vientre. «No sé cómo» reproduce con naturalidad esa fuerza sin volver la frase pesada o artificial en español.
- source_word: εἰς τὴν ἐμὴν ἐφάνητε κοιλίαν
  english_pob_choice: you appeared in my womb
  chosen_spanish: apareciste en mi vientre
  alternatives_spanish:
  - llegaste a mi vientre
  - fuiste manifestado en mi vientre
  lexicon: LSJ
  rationale: «ἐφάνητε» conserva la idea de «aparecer»; en español, «apareciste» mantiene esa imagen. «Vientre» es la forma natural y fiel para el contexto materno; evita un calco incómodo como «en mi matriz» o «hacia mi vientre».
- source_word: οὐδὲ ἐγὼ
  english_pob_choice: nor was it I
  chosen_spanish: ni fui yo
  alternatives_spanish:
  - ni tampoco fui yo
  - ni era yo
  lexicon: BDAG
  rationale: La construcción introduce una negación enfática de causalidad materna última. «Ni fui yo» expresa esa negación con sobriedad y naturalidad en español.
- source_word: τὸ πνεῦμα καὶ τὴν ζωὴν ὑμῖν ἐχαρισάμην
  english_pob_choice: who granted you spirit and life
  chosen_spanish: quien les concedió espíritu y vida
  alternatives_spanish:
  - quien les dio aliento y vida
  - quien les otorgó espíritu y vida
  lexicon: BDAG
  rationale: «ἐχαρισάμην» significa dar o conceder; «concedió» conserva ese matiz de don otorgado. «Espíritu» mantiene la amplitud de πνεῦμα, que no debe reducirse sin más a «aliento», aunque esa alternativa sea posible.
- source_word: καὶ τὴν ἑκάστου στοιχείωσιν
  english_pob_choice: and the formation of each one of you
  chosen_spanish: ni fui yo quien dispuso la formación de cada uno de ustedes
  alternatives_spanish:
  - ni fui yo quien compuso la formación de cada uno de ustedes
  - ni fui yo quien estructuró la formación de cada uno de ustedes
  lexicon: LSJ
  rationale: «στοιχείωσις» se refiere a constitución, formación o arreglo de los elementos. «Formación» es claro y fiel en español; «de cada uno de ustedes» conserva el valor distributivo de ἑκάστου.
- source_word: οὐκ ἐγὼ διερρύθμισα
  english_pob_choice: it was not I who arranged
  chosen_spanish: fui yo quien dispuso
  alternatives_spanish:
  - ordené
  - compuse
  lexicon: LSJ
  rationale: «διερρύθμισα» expresa arreglar u ordenar con intención. «Dispuso» comunica ese ordenamiento intencional sin sonar demasiado técnico, y encaja con el paralelo de «formación».
theological_decisions:
- issue: Sentido de πνεῦμα en el discurso materno sobre el origen de la vida
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - aliento
  - viento
  rationale: El griego distingue πνεῦμα de ζωή, por lo que conviene preservar dos términos relacionados pero no idénticos. «Espíritu» mantiene esa amplitud y no estrecha indebidamente el sentido a mera respiración.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Fuerza de la negación de la madre respecto de la autoría de la vida de sus hijos
  english_pob_reading: The mother denies ultimate authorship of her sons' life and bodily formation, not her real maternal role.
  chosen_spanish_reading: La madre niega la autoría última del origen de la vida y la formación corporal de sus hijos, no su papel materno real.
  alternative_spanish_readings:
  - La madre niega cualquier participación causal
  - La madre se desentiende por completo de su maternidad
  rationale: 'La frase debe conservar la tensión teológica: ella no se atribuye el origen último de la vida ni de la formación corporal, pero tampoco se borra su maternidad humana concreta. La traducción evita exagerar la negación más allá de lo que el griego y el auditorio inglés documentan.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado mínimamente para una naturalidad mayor en la referencia distributiva a ἑκάστου; la versión española conserva esa distinción con «cada uno de ustedes» y sigue la misma lectura sin añadir matices no sustentados por el griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general solo cuando aplique; en este versículo no aparece el nombre divino.
  - Se prefirió «espíritu» para πνεῦμα por la amplitud del término y por la distinción con ζωή.
  - «Dispuso» se eligió para reflejar el ordenamiento intencional de διερρύθμισα sin introducir lenguaje litúrgico ajeno al contexto.
  - «Vientre» funciona mejor que «matriz» o una paráfrasis más larga en español contemporáneo y conserva la imagen corporal del texto.
