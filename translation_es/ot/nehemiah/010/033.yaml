review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la idea central: la comunidad se impuso una obligación anual de contribuir para el servicio de la casa de Dios. Refleja bien וְהֶעֱמַדְנוּ ... עָלֵינוּ como autoimposición, מִצְוֺת como obligación vinculante, y לַעֲבֹדַת בֵּית אֱלֹהֵינוּ como servicio de la casa de nuestro Dios. La única desviación relevante está en la nota, que no preserva la alternativa inglesa documentada (''obligations'' / ''one-third of a shekel each year'') sino que repite casi el mismo texto principal con un orden distinto.'
  spanish_quality_summary: El español es claro y natural. 'Nos impusimos la obligación de dar cada año...' suena bien y evita un calco torpe. 'La casa de nuestro Dios' es fiel y legible. Conviene, sin embargo, mejorar 'un tercio de siclo' a 'un tercio de un siclo' para una expresión monetaria más idiomática y precisa en español, y corregir la nota para que realmente aporte una alternativa significativa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios' y 'casa de nuestro Dios' están bien alineados. No aparece ningún término de glosario sensible mal manejado. La decisión de mantener 'casa' en lugar de 'templo' está bien justificada por la evidencia fuente y el rastro de auditoría inglés.
  issues:
  - severity: medium
    issue: La nota al pie no conserva la alternativa léxica documentada en el POB inglés.
    rationale: 'La nota inglesa ofrece una alternativa real: ''We imposed on ourselves obligations to give one-third of a shekel each year.'' La nota española actual solo repite el texto principal con orden apenas distinto, por lo que no cumple la función de preservar la variante significativa.'
  - severity: low
    issue: '''Un tercio de siclo'' suena algo elíptico en español.'
    rationale: Aunque comprensible, en español resulta más natural y exacto decir 'un tercio de un siclo' o 'la tercera parte de un siclo' cuando se expresa una fracción de una moneda.
  revised_spanish_text: Nosotros también nos impusimos la obligación de dar cada año un tercio de un siclo para el servicio de la casa de nuestro Dios[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Nos impusimos también obligaciones de dar un tercio de un siclo cada año».'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la expresión monetaria a un español más idiomático (''un tercio de un siclo'') y se reemplaza la nota por una alternativa genuina que sí preserva la variante lexical/documental del POB inglés: plural ''obligaciones'' y la formulación ''un tercio de un siclo cada año''. No se requiere adjudicación adicional, porque el sentido fuente y la corrección propuesta son claros.'
