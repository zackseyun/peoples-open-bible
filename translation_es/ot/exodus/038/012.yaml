translation:
  language: es
  text: Y para el lado occidental había cortinas de cincuenta codos, sus columnas diez y sus basas diez; los ganchos de las columnas y sus bandas[a] eran de plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus filletes eran de plata’. El término hebreo para estos aditamentos de las columnas es técnico y puede referirse a bandas, varillas o piezas decorativas de conexión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִפְאַת יָם
  english_pob_choice: And for the west side
  chosen_spanish: Y para el lado occidental
  alternatives_spanish:
  - Y en el lado occidental
  - Y para el lado del mar
  lexicon: HALOT
  rationale: פאה expresa lado o costado, e יָם en este contexto tabernacular funciona idiomáticamente como ‘occidente’. ‘Lado occidental’ conserva el sentido direccional sin traducir mecánicamente ‘mar’.
- source_word: קְלָעִים
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - hangings
  - velos
  lexicon: HALOT
  rationale: En el contexto del atrio del tabernáculo, קְלָעִים son paños colgantes que forman el cerramiento. ‘Cortinas’ es más natural en español que ‘colgaduras’, sin perder la referencia material.
- source_word: חֲמִשִּׁים בָּאַמָּה
  english_pob_choice: of fifty cubits
  chosen_spanish: de cincuenta codos
  alternatives_spanish:
  - de cincuenta codos de largo
  lexicon: HALOT
  rationale: אַמָּה es la medida estándar ‘codo’. El hebreo presenta la medida de forma directa, por lo que ‘de cincuenta codos’ reproduce con sobriedad el dato cuantitativo.
- source_word: עַמּוּדֵיהֶם עֲשָׂרָה
  english_pob_choice: their pillars ten
  chosen_spanish: sus columnas diez
  alternatives_spanish:
  - diez de sus columnas
  - diez columnas
  lexicon: HALOT
  rationale: עַמּוּדִים son soportes/columnas. En español, la aposición ‘sus columnas diez’ imita mejor el orden del hebreo que una construcción más interpretativa, y mantiene la lista inventarial.
- source_word: וְאַדְנֵיהֶם עֲשָׂרָה
  english_pob_choice: and their bases ten
  chosen_spanish: y sus basas diez
  alternatives_spanish:
  - y diez basas
  - y sus zócalos diez
  lexicon: HALOT
  rationale: אֲדָנִים en el tabernáculo designa las piezas de apoyo inferiores; ‘basas’ es término técnico tradicional y suficientemente claro para el mobiliario sagrado. Se evita ‘zócalos’ por sonar arquitectónicamente desviado.
- source_word: וָוֵי הָעַמֻּדִים
  english_pob_choice: the hooks of the pillars
  chosen_spanish: los ganchos de las columnas
  alternatives_spanish:
  - los ganchos de los pilares
  - los anillos de las columnas
  lexicon: HALOT
  rationale: וָוִים son ‘ganchos’. ‘Columnas’ funciona como equivalente idiomático de עַמּוּדִים en este contexto y es más natural en español general que ‘pilares’.
- source_word: וַחֲשׁוּקֵיהֶם
  english_pob_choice: and their bands
  chosen_spanish: y sus bandas
  alternatives_spanish:
  - y sus filletes
  - y sus aros de unión
  lexicon: HALOT
  rationale: El término es técnico y su referente exacto puede abarcar bandas, varillas o piezas de conexión/decoración. ‘Bandas’ conserva la vaguedad útil del original sin imponer una precisión no garantizada.
- source_word: כָּסֶף
  english_pob_choice: were silver
  chosen_spanish: eran de plata
  alternatives_spanish:
  - eran plata
  - eran de metal plateado
  lexicon: HALOT
  rationale: כָּסֶף denota el material ‘plata’. En español, ‘eran de plata’ expresa con naturalidad la lectura predicativa del hebreo y mantiene el valor material de las piezas.
theological_decisions:
- issue: Valor contextual de יָם como dirección en vez de ‘mar’
  english_pob_reading: west side
  chosen_spanish_reading: lado occidental
  alternative_spanish_readings:
  - lado del mar
  - lado occidental del atrio
  rationale: 'No hay conflicto doctrinal, pero sí una decisión de sentido: en la descripción del tabernáculo, יָם nombra el oeste por orientación geográfica. Traducirlo como ‘lado occidental’ evita una imagen literal engañosa.'
  doctrine_reference: No aplica; decisión de orientación topográfica en contexto tabernacular.
- issue: Naturaleza técnica de חֲשׁוּקֵיהֶם
  english_pob_reading: their bands
  chosen_spanish_reading: sus bandas
  alternative_spanish_readings:
  - sus filletes
  - sus piezas de unión
  rationale: La POB en inglés conservó la ambigüedad técnica al optar por ‘bands’ y además anotó la posibilidad de ‘fillets’. En español, ‘bandas’ mantiene esa tensión sin forzar una identificación arquitectónica no asegurada.
  doctrine_reference: No aplica; decisión terminológica de construcción del tabernáculo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que ajustó la estructura appositiva para reflejar con mayor literalidad ‘their pillars ten and their bases ten’. En español se preserva esa economía sintáctica mediante ‘sus columnas diez y sus basas diez’, evitando añadir preposiciones innecesarias. También se mantuvo la anotación lexical sobre el término técnico de los aditamentos metálicos, trasladando la alternativa documentada al español.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió ‘cortinas’ para קְלָעִים por claridad natural en español, sin perder el sentido de paños colgantes.
  - Se mantuvo ‘plata’ como material, no como adjetivo suelto, para reflejar el predicado hebreo.
  - ‘Columnas’ y ‘basas’ conservan el inventario del tabernáculo sin sobreexplicar la función arquitectónica.
  - La nota al pie se ancla en ‘bandas’ para preservar la alternativa técnica documentada por la POB inglesa.
