translation:
  language: es
  text: ¿Por qué retraes[a] tu mano, tu mano derecha? Sácala de en medio de tu seno y consúmelos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Por qué haces volver/retiras tu mano y tu derecha?». La traducción sigue la lectura contextual «retraes» para expresar la imagen de una mano contenida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo normal de motivo o causa en un lamento; en español, «¿Por qué» conserva la fuerza directa de la queja.
- source_word: תָשִׁיב
  english_pob_choice: do you hold back
  chosen_spanish: retraes
  alternatives_spanish:
  - detienes
  - retiras
  - haces volver
  lexicon: HALOT
  rationale: El verbo hifil de שוב aquí expresa la idea de apartar o contener la acción de la mano; «retraes» comunica bien la imagen de una mano contenida, sin perder la tensión poética del texto.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu mano
  lexicon: HALOT
  rationale: Se conserva el referente literal de la imagen hebrea.
- source_word: וִימִינֶךָ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu diestra
  lexicon: HALOT
  rationale: «Mano derecha» es claro y natural en español, y mantiene el paralelismo con «tu mano»; «diestra» sería más tradicional, pero menos transparente para el lector moderno.
- source_word: מִקֶּרֶב
  english_pob_choice: from
  chosen_spanish: de en medio de
  alternatives_spanish:
  - desde el interior de
  - de dentro de
  lexicon: HALOT
  rationale: La expresión completa requiere en español explicitar el valor idiomático de «from the midst/interior of»; «de en medio de» reproduce bien la imagen espacial.
- source_word: חֹוקֶךָ
  english_pob_choice: your bosom
  chosen_spanish: tu seno
  alternatives_spanish:
  - tu pecho
  - tu regazo
  - tu costado
  lexicon: HALOT
  rationale: El término hebreo puede referirse al seno, pliegue o interior de la ropa; «seno» conserva la imagen idiomática con dignidad y amplitud semántica en español bíblico.
- source_word: כַלֵּה
  english_pob_choice: consume them
  chosen_spanish: consúmelos
  alternatives_spanish:
  - destrúyelos
  - acaba con ellos
  - consúmelas
  lexicon: HALOT
  rationale: El imperativo piel de כלה puede significar consumir, acabar o destruir; la forma plural española sigue el objeto implícito del contexto, los enemigos, tal como indica el audit trail inglés.
theological_decisions:
- issue: Objeto implícito del imperativo final
  english_pob_reading: 'The imperative is directed to God with an implied object referring to the enemies: ''consume them.'''
  chosen_spanish_reading: Se mantiene el objeto implícito con el pronombre enclítico plural «-los», entendiendo a los enemigos del salmo.
  alternative_spanish_readings:
  - «consúmelo» sin pronombre explícito
  - «acaba con ellos»
  rationale: El hebreo omite el objeto, pero el contexto inmediato del salmo apunta a los enemigos que profanan y devastan; el pronombre plural en español hace explícita esa referencia sin añadir un contenido nuevo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios de revisión; se conserva la lectura óptima ya aprobada, con ajuste natural al español para el valor idiomático de מִקֶּרֶב חֹוקֶךָ.
  spanish_consistency_notes:
  - Se mantiene «mano derecha» en lugar de «diestra» para mayor claridad y consistencia con el paralelismo hebreo.
  - «Seno» se usa como equivalente idiomático de «bosom» sin modernizar en exceso la imagen poética.
  - Se explicita el objeto plural en «consúmelos» siguiendo el contexto del salmo y la nota inglesa sobre el objeto implícito.
