translation:
  language: es
  text: Servirán a Yahvé, su Dios, y a David, su rey[a], a quien yo suscitaré para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "un futuro rey davídico"; muchos intérpretes entienden aquí a "David" como una referencia profética al Mesías, más que a David personalmente.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבְדוּ
  english_pob_choice: They will serve
  chosen_spanish: Servirán
  alternatives_spanish:
  - Y servirán
  - Le adorarán
  lexicon: HALOT
  rationale: עבד expresa servicio, y en contexto de pacto puede incluir servicio reverente; 'Servirán' conserva ese alcance sin reducirlo solo a culto. El sujeto implícito plural se expresa naturalmente en español con la terminación verbal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa la transliteración del Nombre divino, conforme al criterio del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma española estándar de esa transliteración.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de ellos
  - su divinidad
  lexicon: HALOT
  rationale: El sentido posesivo-covenantal se expresa de manera natural en español con 'su Dios', que mantiene la relación de pertenencia sin sonar artificial.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - un David futuro
  - el Mesías
  - un rey davídico futuro
  lexicon: HALOT
  rationale: El nombre propio se conserva literalmente en el texto principal. La posible referencia tipológica o mesiánica se deja para nota, sin resolverla en la traducción base.
- source_word: מַלְכָּם
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - su gobernante
  - su soberano
  lexicon: HALOT
  rationale: מֶלֶךְ corresponde primariamente a 'rey'; en español 'su rey' mantiene la especificidad davídica y la fuerza monárquica del término.
- source_word: אָקִים
  english_pob_choice: I will raise up
  chosen_spanish: yo levantaré
  alternatives_spanish:
  - yo suscitaré
  - yo estableceré
  - yo levantaré en pie
  lexicon: HALOT
  rationale: El Hiphil de קום admite la idea de 'levantar/suscitar/establecer'. 'Yo levantaré' conserva la imagen verbal y es natural en español; el complemento 'para ellos' deja claro el sentido de provisión/apuntamiento para el pueblo.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - en favor de ellos
  - a ellos
  lexicon: HALOT
  rationale: La preposición con sufijo indica beneficio o destinación; 'para ellos' es la forma más directa y clara en español.
theological_decisions:
- issue: Identidad de 'David su rey'
  english_pob_reading: Retain the literal name 'David' in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener 'David, su rey' en el texto principal sin expandirlo interpretativamente.
  alternative_spanish_readings:
  - un rey davídico futuro
  - el Mesías
  - un David futuro
  rationale: 'El hebreo dice literalmente ''David, su rey''. La tensión interpretativa se preserva en una nota: el pasaje puede leerse como referencia profética a un futuro rey davídico y, en lectura cristiana, al Mesías; pero la traducción base no debe resolverlo por anticipado.'
  doctrine_reference: Preservar la tensión exegética; traducir nombres literalmente y dejar la interpretación profética en nota.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios posteriores y el consenso de control cruzado fue alto, con observación menor únicamente sobre la tensión interpretativa de ''David''.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para el Nombre divino, conforme al estándar del proyecto.
  - '''Servirán'' mantiene el valor amplio de עבד sin reducirlo a ''adorarán''.'
  - La nota de 'David' preserva la alternativa mesiánica sin introducirla en la línea principal.
  - No se añade un equivalente explícito para el marcador hebreo de objeto directo, ya que no corresponde en español.
