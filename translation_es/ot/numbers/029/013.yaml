review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: mandato de presentar una ofrenda quemada a Yahvé, con la fórmula idiomática de aceptabilidad, la lista de animales y la exigencia de integridad sacrificial. Sin embargo, hay dos desajustes léxicos relevantes: פָּרִים בְּנֵי בָקָר se acerca mejor a «toros del ganado» o «novillos del ganado» que a «becerros del ganado», y la nota al pie está mal anclada porque comenta רֵיחַ נִיחֹחַ pero el marcador aparece en «holocausto».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en precisión y naturalidad. «Ofrenda encendida» suena menos idiomático en español bíblico que «ofrenda hecha por fuego» o «ofrenda por fuego». «Todos serán sin defecto» añade «todos», ausente en el hebreo, y «serán sin defecto» es menos natural que «serán sin defecto»/«serán sin defecto»? Mejor «serán sin defecto» sigue algo rígido; «serán sin defecto» o «sin defecto» tras punto y coma funciona, pero la formulación más natural y fiel es «serán sin defecto» sin añadir «todos». También conviene mover la nota al sintagma «de aroma agradable[a]».
  glossary_alignment: Se alinea bien con la política del proyecto al usar «Yahvé» para יהוה y «holocausto» para עֹלָה. La principal excepción corregible es אִשֵּׁה, donde «ofrenda encendida» no refleja tan bien la formulación sacrificial establecida como «ofrenda hecha por fuego». Para פָּרִים בְּנֵי בָקָר, «becerros» subinterpreta la clase del animal; «toros del ganado» preserva mejor el valor léxico sin imponer juventud.
  issues:
  - severity: high
    issue: La nota al pie está anclada en «holocausto[a]», pero su contenido explica «de aroma agradable» (רֵיחַ נִיחֹחַ).
    rationale: El marcador debe aparecer en la palabra o frase pertinente. Tal como está, induce a pensar que la nota comenta עֹלָה en vez del modismo sacrificial רֵיחַ נִיחֹחַ.
  - severity: medium
    issue: «Becerros del ganado» para פָּרִים בְּנֵי בָקָר no es la mejor equivalencia.
    rationale: פָּרִים son toros/bovinos machos, no necesariamente «becerros». «Becerros» tiende a sugerir animales más jóvenes de lo que el hebreo exige.
  - severity: medium
    issue: «Ofrenda encendida» para אִשֵּׁה es menos natural y menos preciso que una formulación con «fuego».
    rationale: El término indica una ofrenda hecha por fuego. «Encendida» suena interpretativa y poco estable en el registro cultual bíblico español.
  - severity: low
    issue: «Todos serán sin defecto» añade «todos», que no está explícito en el hebreo.
    rationale: Aunque el sentido distributivo es correcto, conviene evitar añadir material no presente cuando no hace falta para la claridad.
  revised_spanish_text: 'Y presentaréis un holocausto, una ofrenda hecha por fuego, de aroma agradable[a] a Yahvé: trece toros del ganado, dos carneros y catorce corderos machos de un año; serán sin defecto.'
  revised_footnotes:
  - marker: a
    text: O «de aroma suave» o «de aroma dulce». El hebreo רֵיחַ נִיחֹחַ expresa que la ofrenda es aceptable a Yahvé.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que explique el modismo hebreo pertinente; se mejora אִשֵּׁה con «ofrenda hecha por fuego», formulación más natural y exacta en español bíblico; se ajusta פָּרִים בְּנֵי בָקָר a «toros del ganado» para evitar la sobreespecificación de edad en «becerros»; y se elimina «todos» por no estar explícito en el texto fuente.
