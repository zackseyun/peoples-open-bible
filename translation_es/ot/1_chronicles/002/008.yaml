  text: 'Y los hijos de Etán: Azarías[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «los hijos de Etán» y sigue con un solo nombre, «Azarías». Puede tratarse de una fórmula genealógica que introduce la línea de Etán, o «hijos» puede funcionar idiomáticamente por «descendientes».
