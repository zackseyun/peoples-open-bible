  english_pob_choice: and Ithmah
  chosen_spanish: Ithmá
  alternatives_spanish:
  - Jitmá
  lexicon: HALOT
  rationale: Nombre propio transliterado; la acentuación gráfica se añade para respetar la prosodia española y facilitar la lectura pública.
- source_word: הַמּוֹאָבִי
  english_pob_choice: the Moabite
  chosen_spanish: el moabita
  alternatives_spanish:
  - un moabita
