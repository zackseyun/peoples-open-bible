translation:
  language: es
  text: 'Porque así me dijo Yahvé: «Me quedaré en silencio y miraré desde mi morada[a], como el calor claro bajo el sol[b], como una nube de rocío en el calor de la siega».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estaré quieto y observaré desde mi lugar fijo».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «como calor claro sobre la luz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: nombre divino propio
  rationale: Se sigue el criterio del proyecto para el nombre del pacto. En español, ‘Yahvé’ preserva el nombre divino sin enmascararlo como ‘SEÑOR’, y es el equivalente natural del ‘Yahweh’ inglés del POB.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - con respecto a mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa de manera directa el destinatario de la palabra; ‘a mí’ conserva la relación personal del habla profética.
- source_word: אשקוטה
  english_pob_choice: I will remain quiet
  chosen_spanish: me quedaré en silencio
  alternatives_spanish:
  - estaré quieto
  - reposaré
  lexicon: HALOT
  rationale: שׁקט comunica quietud o cese de intervención. ‘Me quedaré en silencio’ transmite mejor en español la decisión deliberada de no actuar, sin reducirlo a descanso físico.
- source_word: וְאַבִּיטָה
  english_pob_choice: and look on
  chosen_spanish: y miraré
  alternatives_spanish:
  - y observaré
  - y miraré desde lejos
  lexicon: HALOT
  rationale: נבט significa mirar, atender, observar. ‘Miraré’ mantiene la simpleza verbal del hebreo; el complemento posterior ya aclara el punto de observación.
- source_word: בִ/מְכוֹנִי
  english_pob_choice: from my dwelling place
  chosen_spanish: desde mi morada
  alternatives_spanish:
  - desde mi lugar fijo
  - desde mi habitación
  lexicon: HALOT
  rationale: מָכוֹן es un lugar establecido o fijo, frecuentemente morada. En español, ‘morada’ comunica bien la idea de un lugar de residencia/vista sin perder la noción de estabilidad. La preposición se vierte como ‘desde’ por el valor de punto de observación implícito en el contexto.
- source_word: כְּ/חֹם צַח
  english_pob_choice: like clear heat
  chosen_spanish: como el calor claro
  alternatives_spanish:
  - como el calor brillante
  - como el calor resplandeciente
  lexicon: HALOT
  rationale: חֹם es ‘calor’ y צַח añade la idea de claridad/brillo. ‘Calor claro’ conserva la imagen inusual sin interpretarla de más, y respeta la tensión poética del hebreo.
- source_word: עֲלֵי א֔וֹר
  english_pob_choice: in sunshine
  chosen_spanish: sobre la luz
  alternatives_spanish:
  - en la luz
  - bajo la luz intensa
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘sobre luz’. Se conserva esa relación espacial en español porque el POB en inglés también preserva la rareza del giro, con una nota explicativa para la lectura idiomática.
- source_word: כְּ/עָ֥ב טַ֖ל
  english_pob_choice: like a cloud of dew
  chosen_spanish: como una nube de rocío
  alternatives_spanish:
  - como una nube de lluvia fina
  - como una nube de humedad
  lexicon: HALOT
  rationale: עָב es ‘nube’ y טַל es ‘rocío’. ‘Nube de rocío’ mantiene el paralelismo concreto y la imagen meteorológica, igual que el inglés del POB.
- source_word: בְּ/חֹ֥ם קָצִיר
  english_pob_choice: in the heat of harvest
  chosen_spanish: en el calor de la siega
  alternatives_spanish:
  - en el calor de la cosecha
  - en el calor de la recolección
  lexicon: HALOT
  rationale: קָצִיר alude a la siega/cosecha; ‘siega’ mantiene el matiz agrícola concreto y suena natural en español bíblico contemporáneo. ‘Calor de la siega’ reproduce el marco temporal y ambiental del hebreo.
theological_decisions:
- issue: Estímulo divino de quietud y observación
  english_pob_reading: Render the verbs straightforwardly as the LORD's deliberate quietness and watching, without importing either indifference or immediate judgment into the wording.
  chosen_spanish_reading: Traducir los verbos como una quietud deliberada y una mirada atenta de Yahvé, sin añadir ni indiferencia ni juicio explícito en la formulación.
  alternative_spanish_readings:
  - me detendré y miraré
  - reposaré y observaré
  rationale: El hebreo presenta a Yahvé en silencio y mirando desde su morada; la traducción debe conservar esa tensión poética sin resolverla en una interpretación doctrinal más amplia que el texto no explicita.
  doctrine_reference: Principio POB de preservar la tensión teológica en vez de resolverla por paráfrasis
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura del audit trail inglés; no se requieren revisiones adicionales. Se conserva la rareza de las imágenes hebreas con una nota para la alternativa lexical en los dos puntos donde el inglés POB también la preserva.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como nombre divino propio, conforme al estándar del proyecto.
  - 'Se conserva el paralelismo poético con verbos breves: ‘me quedaré en silencio’ / ‘miraré’.'
  - Las imágenes de calor, luz y rocío se mantienen concretas, sin explicarlas en el cuerpo del texto.
  - ‘Siega’ se usa por su claridad agrícola y por su ajuste al contexto de cosecha/hervest del hebreo.
  - Las notas usan marcadores únicos y solo donde el texto español necesita anclaje explícito.
