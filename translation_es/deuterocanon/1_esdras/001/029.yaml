base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/029.yaml
  text: And he got onto his second chariot[a]; and after being brought back to Jerusalem[b], he ended his life and was buried in his ancestral tomb.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'he died.' The Greek literally says 'he exchanged/ended his life,' an idiom for death.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in 2 Chronicles 35:24 reads 'the chariot of the second rank' and adds that all Judah and Jerusalem mourned for Josiah; 1 Esdras here is shorter and uses singular 'tomb.'
