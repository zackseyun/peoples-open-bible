theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in wisdom saying
  chosen_reading: reflexive/self-regarding sense ('for himself') rather than a technical 'for his soul'
  alternative_readings:
  - for his own soul
  - for his own life
  rationale: The verse contrasts kinds of wise persons by who benefits from their wisdom. A reflexive rendering communicates the point clearly without importing a more dualistic anthropology than the Hebrew requires.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of גְוִיָּה
  chosen_reading: living 'body' rather than 'corpse'
  alternative_readings:
  - corpse
  rationale: In this context the line speaks of the beneficial result of understanding accruing to the person himself. Rendering it as 'corpse' would create an implausible sense and distort the proverb's practical thrust.
