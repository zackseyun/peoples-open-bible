- source_word: ⲧⲉⲧⲟⲩⲥⲙⲟⲩ
  chosen: your name
  alternatives:
  - their name
  - you (pl.) praise
  lexicon: Crum
  rationale: ⲥⲙⲟⲩ is ‘name’ (also verb ‘praise’). The prefixed sequence is paleographically
    uncertain; “your (pl.) name” fits the second-person address cadence, but other
    parses are possible.
parallelism_check: The block balances “men … with me” with “the women … in the heart,”
  then resolves into a first-person copular claim with a doubled object pair (“my
  form / your name”). The men/women and spirit/heart innerness are kept as distinct
  poles without smoothing, preserving the poem’s antiphonal cadence.
voice_check: First-person epiphanic voice is preserved via the explicit “I am.” The
  addressee remains second-person plural in the final cola, keeping Thunder’s direct,
  unsettling address. No contradictory pair is domesticated.
