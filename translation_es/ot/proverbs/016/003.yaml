translation:
  language: es
  text: Encomienda[a] a Yahvé tus obras, y tus planes[b] quedarán firmes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Rueda tus obras sobre Yahvé»; el modismo significa encomendarlas o ponerlas bajo su cuidado.'
    reason: lexical_alternative
  - marker: b
    text: O «tus pensamientos» o «tus propósitos» para «tus planes».
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּל
  english_pob_choice: Commit
  chosen_spanish: Encomienda
  alternatives_spanish:
  - Confía
  - Entrega
  - Rueda
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la imagen de «rodar» algo sobre otro, pero en este proverbio la fuerza idiomática es la de poner las propias tareas bajo la custodia de Yahvé. «Encomienda» transmite bien esa acción de confiar y poner a cargo, sin perder la dirección hacia Dios.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - hacia
  - encima de
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Yahvé. En español, «encomienda a Yahvé» conserva la relación verbal natural; «encima de» o «sobre» preservarían la imagen física, pero sonarían forzadas en el español de lectura pública.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma de uso del proyecto, «Yahvé», en vez de sustituirlo por un título. Esto preserva la referencia personal al nombre revelado.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus trabajos
  - tus acciones
  - lo que haces
  lexicon: HALOT
  rationale: «Obras» refleja el campo semántico amplio de מעשה y mantiene la forma concisa del proverbio. «Trabajos» estrecha demasiado el sentido; «acciones» y «lo que haces» son más explicativos pero menos densos.
- source_word: וְיִכֹּנוּ
  english_pob_choice: will be established
  chosen_spanish: serán establecidos
  alternatives_spanish:
  - quedarán firmes
  - serán afirmados
  - serán asegurados
  lexicon: HALOT
  rationale: El nifal de כון expresa ser establecido o puesto firme. «Serán establecidos» preserva bien esa pasiva/resultativa; en español bíblico sigue siendo claro y no añade una garantía más fuerte que la del hebreo.
- source_word: מַחְשְׁבֹתֶיךָ
  english_pob_choice: your plans
  chosen_spanish: tus planes
  alternatives_spanish:
  - tus pensamientos
  - tus propósitos
  - tus intenciones
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «pensamientos», en el paralelismo sapiencial con «tus obras» el sentido práctico de «planes» encaja mejor. «Pensamientos» es más literal, pero en español puede sonar menos preciso en este contexto.
theological_decisions:
- issue: Relación entre la acción humana y la acción divina en la promesa
  english_pob_reading: The verse exhorts entrusting one's undertakings to the LORD, with the result that one's plans are established.
  chosen_spanish_reading: El versículo exhorta a encomendar las propias obras a Yahvé, con el resultado de que los planes quedan establecidos.
  alternative_spanish_readings:
  - Dios fija unilateralmente todos los planes sin atender a la respuesta humana
  - La promesa garantiza éxito material en todo emprendimiento
  rationale: La sintaxis hebrea presenta una exhortación seguida de un resultado, no una explicación completa de la providencia. La traducción conserva esa tensión sapiencial sin convertirla en un determinismo fuerte ni en una promesa de prosperidad inevitable.
  doctrine_reference: Conservar la tensión teológica del proverbio sin resolverla de manera denominacional.
translation_notes:
  revision_awareness: 'Coincide con la última revisión del texto fuente inglés: no hubo cambios necesarios y la lectura revisada se mantiene estable. La versión española sigue esa misma decisión, manteniendo el valor exhortativo del proverbio y su tensión sobre la relación entre encomendar y ser establecido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el proyecto para el Tetragrámaton.
  - «Obras» y «planes» preservan el paralelismo práctico del hebreo.
  - Las notas al pie retienen la alternativa literal e interpretativa donde el español podría ocultar la imagen original.
