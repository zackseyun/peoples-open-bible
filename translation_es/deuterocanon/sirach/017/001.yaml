translation:
  language: es
  text: El Señor creó al hombre[a] de la tierra, y lo devolvió a ella otra vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la humanidad” o “un ser humano”; el griego usa el singular ἄνθρωπον de manera representativa para toda la humanidad.
    reason: alternative_reading
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - El Señor
  - Señor
  lexicon: κύριος
  rationale: El contexto del texto sapiencial y la política del proyecto favorecen usar el nombre divino “Yahvé” en español cuando κύριος funciona como título divino. Mantiene la referencia al nombre de Dios sin la convención de enmascaramiento con “SEÑOR”.
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - formó
  - hizo
  lexicon: κτίζω
  rationale: κτίζω expresa crear en un sentido elevado de origen. “Creó” reproduce bien ese valor en español y conserva el tono de acto creador.
- source_word: ἐκ γῆς
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - desde la tierra
  - del suelo
  lexicon: γῆ
  rationale: La preposición y el sustantivo apuntan al origen material. “De la tierra” es natural en español y conserva la imagen de procedencia sin forzar un calco.
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - un ser humano
  lexicon: ἄνθρωπος
  rationale: El singular griego es representativo de la humanidad, pero el audit trail inglés preserva “man” por su fuerza antropológica y adámica. En español, “el hombre” mantiene ese singular representativo y la lectura tradicional sin diluir el referente en una abstracción.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: πάλιν
  rationale: “Otra vez” expresa la repetición indicada por πάλιν con naturalidad en español. Conserva la idea de retorno ya marcada por el verbo siguiente.
- source_word: ἀπέστρεψεν
  english_pob_choice: returned him
  chosen_spanish: lo devolvió
  alternatives_spanish:
  - lo retornó
  - lo volvió
  lexicon: ἀποστρέφω
  rationale: Aquí el verbo indica hacer volver al humano a su origen. “Lo devolvió” sigue bien el movimiento de retorno hacia la tierra y evita una repetición innecesaria de “volver” con πάλιν.
- source_word: εἰς αὐτήν
  english_pob_choice: to it
  chosen_spanish: a ella
  alternatives_spanish:
  - de nuevo a ella
  - a la misma
  lexicon: εἰς + pronombre
  rationale: El pronombre retoma “la tierra”. En español, “a ella” deja claro el referente femenino de “la tierra” y preserva el enlace anafórico del griego.
theological_decisions:
- issue: Alcance representativo de ἄνθρωπον
  english_pob_reading: Render singular as 'man' with representative force.
  chosen_spanish_reading: Renderizar en singular como “el hombre” con fuerza representativa de la humanidad.
  alternative_spanish_readings:
  - la humanidad
  - un ser humano
  rationale: El verso habla del ser humano como criatura de tierra y destinada a volver a la tierra. “El hombre” conserva el singular representativo y la resonancia adámica, en línea con la preferencia del proyecto por una traducción precisa del término humano sin neutralizar innecesariamente el género gramatical.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם / ἄνθρωπος may be rendered ''man'' or ''humankind'' by context.'
- issue: Referencia divina de κύριος
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - El Señor
  - Señor
  rationale: Cuando κύριος refleja el título divino en un contexto de creación, el proyecto prefiere explicitar el nombre divino. En español, “Yahvé” evita ocultar el referente y conserva la decisión teológica de transparencia textual.
  doctrine_reference: Project terminology default for יהוה / YHWH -> 'Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de “turned him back to it again” a “returned him to it again” para mayor naturalidad y precisión formal; la versión española siguió esa intención semántica con “lo devolvió otra vez a ella”, manteniendo el movimiento de regreso y la referencia a la tierra. También se respetó la decisión del audit trail de conservar el singular representativo de ἄνθρωπον, pero adaptándolo al español con “el hombre” por claridad y fuerza antropológica.
  spanish_consistency_notes:
  - Se usó “Yahvé” para κύριος en coherencia con la terminología estándar del proyecto para el nombre divino.
  - “Tierra” traduce γῆ de manera consistente con la imagen de origen y retorno.
  - La anáfora de “ella” remite a “la tierra” y evita ambigüedad.
  - “Creó” mantiene el registro elevado de κτίζω sin introducir una matiz excesivamente técnico.
  - La construcción “lo devolvió otra vez a ella” conserva tanto πάλιν como ἀπέστρεψεν sin duplicar mecánicamente la noción de volver.
