translation:
  language: es
  text: 'Entonces, cuando el centurión vio lo que había sucedido[a], glorificó a Dios, diciendo: «Ciertamente este hombre era justo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que había ocurrido» o «lo que había pasado». El griego se refiere al acontecimiento observado por el centurión.
    reason: lexical_alternative
  - marker: b
    text: O «inocente» o «recto». El griego δίκαιος puede expresar rectitud moral o inocencia legal según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... vio
  alternatives_spanish:
  - al ver
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo de ὁράω expresa una acción previa al verbo principal; en español, 'cuando ... vio' conserva la relación temporal de modo natural sin volverlo rígidamente literal.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - y
  - pero
  lexicon: BDAG
  rationale: δέ funciona como conector narrativo suave; 'Ahora' da continuidad discursiva en español sin imponer contraste fuerte.
- source_word: ἑκατοντάρχης
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial romano
  lexicon: BDAG
  rationale: '''Centurión'' es el equivalente preciso y establecido para el rango militar romano.'
- source_word: τὸ γενόμενον
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - lo que había ocurrido
  - lo que había pasado
  lexicon: BDAG
  rationale: El participio articular de γίνομαι se refiere al acontecimiento recién observado; 'lo que había sucedido' es idiomático y fiel al sentido de evento consumado.
- source_word: ἐδόξαζεν
  english_pob_choice: glorified
  chosen_spanish: glorificaba
  alternatives_spanish:
  - glorificó
  - alababa
  lexicon: BDAG
  rationale: El imperfecto de δοξάζω sugiere acción continua o en desarrollo; 'glorificaba' preserva mejor ese valor aspectual que un pretérito simple.
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: En español, con 'glorificar' es natural el objeto directo con preposición 'a' cuando se trata de una persona divina, y conserva claridad sin alterar el referente.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: '''Diciendo'' reproduce la introducción del discurso de manera directa y fluida, manteniendo la estructura griega.'
- source_word: Ὄντως
  english_pob_choice: Certainly
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - verdaderamente
  - en verdad
  lexicon: BDAG
  rationale: Adverbio de fuerte afirmación; 'Ciertamente' comunica bien la certeza enfática del centurión en español actual.
- source_word: ὁ ἄνθρωπος οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - esta persona
  lexicon: BDAG
  rationale: '''ἄνθρωπος'' aquí apunta a Jesús como varón individual; ''este hombre'' respeta el referente masculino y la naturalidad española.'
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - inocente
  - recto
  lexicon: BDAG
  rationale: '''δίκαιος'' puede significar ''justo'', ''recto'' o, en contexto, ''inocente''. ''Justo'' conserva el peso moral y jurídico sin resolver indebidamente la tensión entre ambas posibilidades.'
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  lexicon: BDAG
  rationale: El imperfecto de εἰμί se traduce naturalmente con 'era' en español narrativo.
theological_decisions:
- issue: Alcance de δίκαιος en la confesión del centurión
  english_pob_reading: righteous
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - inocente
  - recto
  rationale: La frase no añade una confesión cristológica explícita; por eso se preserva un término que puede abarcar tanto rectitud moral como inocencia legal. 'Justo' mantiene la tensión documentada por el inglés POB y evita cerrar el sentido de manera dogmática.
  doctrine_reference: Preservar la tensión léxica y teológica donde el texto lo permite; no resolver de más.
translation_notes:
  revision_awareness: El inglés POB fue revisado desde 'began glorifying' a 'glorified' para evitar una expansión aspectual innecesaria. En español, el imperfecto 'glorificaba' conserva naturalmente la imperfectividad del griego sin requerir ampliación explicativa.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para el nombre divino solo cuando el texto fuente lo requiera; aquí el griego tiene θεός, por lo que se traduce 'Dios'.
  - '''Justo'' se usa como término principal para δίκαιος, manteniendo abierta la alternativa ''inocente'' en nota según el audit trail.'
  - La puntuación española emplea comillas angulares para el discurso directo y la coordinación narrativa con 'Ahora' para δὲ.
