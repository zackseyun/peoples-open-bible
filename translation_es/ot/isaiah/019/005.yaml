translation:
  language: es
  text: Y las aguas del mar se secarán[a], y el río[b] quedará reseco y seco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las aguas serán drenadas del mar». El verbo hebreo también puede expresar que las aguas se agotan o se extraen hasta desaparecer.'
    reason: lexical_alternative
  - marker: b
    text: «El río» probablemente se refiere al Nilo en este contexto, pero el texto hebreo usa el sustantivo común y no el nombre propio.
    reason: cultural_note
lexical_decisions:
- source_word: וְנִשְּׁתוּ / נִשְּׁתוּ
  english_pob_choice: will dry up
  chosen_spanish: se secarán
  alternatives_spanish:
  - se agotarán
  - serán drenadas
  - se vaciarán
  lexicon: HALOT
  rationale: El verbo hebreo expresa agotamiento o secamiento de las aguas. En español, "se secarán" comunica bien el resultado natural y conserva el sentido pasivo/resultativo sin introducir una metáfora ajena.
- source_word: מַיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - las aguas del mar
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con "las aguas". Se mantiene el sustantivo plural para no perder el matiz colectivo del original.
- source_word: מֵהַיָּם
  english_pob_choice: of the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - del mar
  - del océano
  lexicon: HALOT
  rationale: '"Del mar" reproduce de modo natural la relación de procedencia. Aunque el hebreo dice literalmente "de/desde el mar", en español la construcción nominal fluye mejor como complemento del sustantivo.'
- source_word: נָהָר
  english_pob_choice: the river
  chosen_spanish: el río
  alternatives_spanish:
  - el Nilo
  - un río
  lexicon: HALOT
  rationale: Se conserva el sustantivo común del hebreo, sin imponer el nombre propio. "El río" mantiene la referencia contextual probable sin exceder la evidencia del texto.
- source_word: יֶחֱרַב
  english_pob_choice: will be parched
  chosen_spanish: quedará agostado
  alternatives_spanish:
  - se secará
  - quedará seco
  lexicon: HALOT
  rationale: Se busca distinguir este verbo del siguiente יָבֵשׁ. "Quedará agostado" preserva la idea de quedar reseco o marchito y evita repetir exactamente el mismo verbo que en la primera cola.
- source_word: וְיָבֵשׁ
  english_pob_choice: dry
  chosen_spanish: seco
  alternatives_spanish:
  - reseco
  - árido
  lexicon: HALOT
  rationale: El adjetivo final intensifica la imagen. "Seco" es breve y fiel, y funciona bien en español como cierre enfático de la serie verbal.
translation_notes:
  revision_awareness: 'La redacción sigue el juicio revisado del POB inglés que favorece un verbo natural y dinámico para נִשְּׁתוּ, manteniendo el paralelismo de dos miembros: secamiento de las aguas del mar y descrédito/desecación del río. También conserva la decisión auditada de no identificar explícitamente al río como el Nilo dentro del texto principal.'
  spanish_consistency_notes:
  - Se usa "mar" y no "océano" por correspondencia más cercana al hebreo y al registro bíblico.
  - Se evita "SEÑOR" o términos de sustitución porque no aparece el nombre divino en este versículo.
  - '"Agostado" se conserva como opción más expresiva para יֶחֱרַב, diferenciándolo de "seco" para no aplanar el paralelismo hebreo.'
