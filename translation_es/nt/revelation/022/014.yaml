translation:
  language: es
  text: Bienaventurados los que lavan sus vestiduras[a][b], para que tengan derecho al árbol de la vida y entren en la ciudad por las puertas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Bienaventurados los que hacen sus mandamientos» o «los que guardan sus mandamientos», en vez de «los que lavan sus vestiduras».'
    reason: textual_variant
  - marker: b
    text: La imagen de lavar las vestiduras recuerda Apocalipsis 7:14, donde las vestiduras son lavadas y emblanquecidas en la sangre del Cordero.
    reason: cross_reference
  - marker: c
    text: 'O: «a través de las puertas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Afortunados
  lexicon: BDAG
  rationale: «Bienaventurados» conserva el tono de bienaventuranza y la carga escatológica del término mejor que «felices», que suena subjetivo, o «afortunados», que enfatiza solo circunstancia.
- source_word: πλύνοντες
  english_pob_choice: wash
  chosen_spanish: lavan
  alternatives_spanish:
  - están lavando
  - limpian
  lexicon: BDAG
  rationale: El participio presente describe a los que se caracterizan por lavar sus vestiduras. «Lavan» es natural en español y conserva la acción concreta sin volverla abstracta.
- source_word: στολὰς
  english_pob_choice: robes
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropas
  - túnicas
  lexicon: BDAG
  rationale: «Vestiduras» comunica bien la imagen simbólica y bíblica sin sonar tan técnica como «ropas» ni tan específica como «túnicas».
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: «Para que» expresa con claridad la finalidad/resultante del griego ἵνα en un español moderno y digno.
- source_word: ἔσται
  english_pob_choice: may have
  chosen_spanish: tengan derecho
  alternatives_spanish:
  - tengan autoridad
  - posean derecho
  lexicon: BDAG
  rationale: En este contexto, ἐξουσία no apunta a poder de mando sino a derecho de acceso/entitlement. «Tengan derecho» refleja bien esa fuerza jurídica y relacional.
- source_word: ἐπὶ τὸ ξύλον τῆς ζωῆς
  english_pob_choice: to the tree of life
  chosen_spanish: al árbol de la vida
  alternatives_spanish:
  - sobre el árbol de la vida
  - para el árbol de la vida
  lexicon: BDAG
  rationale: Con ἐξουσία, la preposición se entiende idiomáticamente como acceso o relación con el objeto. «Al árbol de la vida» evita la impresión de dominio que daría «sobre».
- source_word: πυλῶσιν
  english_pob_choice: by the gates
  chosen_spanish: por las puertas
  alternatives_spanish:
  - por los portales
  - a través de las puertas
  lexicon: BDAG
  rationale: El dativo plural sin preposición expresa aquí medio o vía de entrada. «Por las puertas» suena natural y puede incluir la idea de paso por ellas.
- source_word: εἰσέλθωσιν εἰς τὴν πόλιν
  english_pob_choice: may enter the city
  chosen_spanish: entren en la ciudad
  alternatives_spanish:
  - entren a la ciudad
  - puedan entrar en la ciudad
  lexicon: BDAG
  rationale: El subjuntivo aoristo tras ἵνα se vierte de forma natural con «entren en». Mantiene el tono solemne y el sentido de entrada consumada o deseada.
theological_decisions:
- issue: Variant reading in the first clause
  english_pob_reading: Those who wash their robes
  chosen_spanish_reading: los que lavan sus vestiduras
  alternative_spanish_readings:
  - los que hacen sus mandamientos
  - los que guardan sus mandamientos
  rationale: El texto crítico dado lee πλύνοντες τὰς στολὰς αὐτῶν, por lo que la traducción principal debe reflejar «lavan sus vestiduras». Se conserva la variante tradicional en nota por su peso textual e histórico.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of ἐξουσία in relation to the tree of life
  english_pob_reading: have the right to the tree of life
  chosen_spanish_reading: tengan derecho al árbol de la vida
  alternative_spanish_readings:
  - tengan autoridad sobre el árbol de la vida
  - tengan poder para el árbol de la vida
  rationale: Aquí ἐξουσία no expresa dominio sino derecho de acceso. «Tengan derecho» preserva esa tensión jurídica sin convertirla en mero permiso abstracto.
  doctrine_reference: Translation philosophy §3
- issue: How to render the gate phrase
  english_pob_reading: by the gates
  chosen_spanish_reading: por las puertas
  alternative_spanish_readings:
  - a través de las puertas
  - por medio de las puertas
  rationale: La frase griega puede entenderse como vía o medio de entrada. «Por las puertas» mantiene la ambigüedad útil entre ubicación y medio, sin forzar una sola lectura.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó la lectura crítica SBLGNT frente a la variante mayoritaria/tradicional y no se alteró el texto principal; se mantuvo la imaginería concreta de vestiduras, derecho de acceso y entrada por las puertas conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Bienaventurados» para armonizar con el registro apocalíptico y la serie de bienaventuranzas.
  - Se evitó «SEÑOR» porque no aparece el Tetragrámaton ni κύριος en este versículo.
  - «Vestiduras» conserva la imagen simbólica sin añadir interpretación doctrinal.
  - «Tengan derecho» sostiene la fuerza de ἐξουσία como acceso legítimo, no como poder de gobierno.
