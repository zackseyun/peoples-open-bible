  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. La decisión de mantener τοῖς κενοῖς como «cosas vacías» concuerda con la racionalidad léxica y teológica documentada, evitando la sobreinterpretación «ídolos» en el texto principal. No hay conflicto con las políticas sobre Yahvé, Mesías/Cristo, esclavo, espíritu, etc.
