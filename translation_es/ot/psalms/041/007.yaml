    issue: «la habla» es antinatural en español
    rationale: Aunque intenta preservar la repetición verbal y el objeto implícito, en español «hablar» normalmente no toma ese objeto directo de esta forma. La frase entorpece la lectura y no comunica con claridad que el visitante divulga lo que ha acumulado.
