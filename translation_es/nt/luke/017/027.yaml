review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la secuencia de imperfectos habituales, el límite temporal hasta la entrada de Noé en el arca, y el juicio total del diluvio. También conserva la distinción entre ἐγάμουν y ἐγαμίζοντο. Sin embargo, la nota al pie actual identifica el verbo activo como «casarse», que en español es formalmente reflexivo y difumina la distinción voz activa/pasiva que la nota pretende explicar desde el griego.
  spanish_quality_summary: El texto es claro, natural y de buen nivel bíblico en español. «Comían, bebían, se casaban y se daban en matrimonio» fluye bien y evita una perífrasis pesada. El único ajuste necesario es de precisión metalingüística en la nota, para que no cree confusión sobre la diferencia entre los dos verbos griegos.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Noé», «el arca» y «el diluvio» son adecuados. La distinción matrimonial se mantiene de forma contextual y legible.
  issues:
  - severity: medium
    issue: La nota al pie describe el primer verbo griego como «casarse» y el segundo como pasivo, pero «casarse» en español no representa bien la voz activa griega que la nota intenta explicar.
    rationale: El texto principal puede quedarse como «se casaban» por naturalidad española, pero la nota debe explicar con mayor precisión que el griego distingue un verbo activo de contraer matrimonio y otro pasivo de ser dado en matrimonio. De lo contrario, la explicación lexical queda internamente imprecisa.
  revised_spanish_text: Comían[a], bebían, se casaban y se daban en matrimonio, hasta el día en que Noé entró en el arca, y vino el diluvio y los destruyó a todos.
  revised_footnotes:
  - marker: a
    text: 'O, de forma más compacta: «se casaban y se daban en matrimonio». El griego distingue dos verbos: uno activo («contraer matrimonio» / «tomar esposa») y otro pasivo («ser dado en matrimonio»).'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural en español. Solo se corrige la nota para que explique con precisión la distinción léxica y de voz presente en el griego, sin crear una falsa equivalencia metalingüística con «casarse».
