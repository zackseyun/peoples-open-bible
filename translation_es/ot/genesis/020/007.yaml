    rationale: El inglés auditado eligió «Now then» por su fuerza transicional e inferencial. En español, «Ahora bien» transmite mejor ese valor que un simple «Ahora», y ya estaba contemplado en la nota.
  - severity: high
    issue: La cláusula final «tú y todo lo que es tuyo» no sigue la decisión contextual del POB inglés
    rationale: Aunque el hebreo es amplio, la decisión documentada del POB favorece en el texto principal una formulación orientada a personas de la casa por el contexto de juicio sobre el hogar. El español debe reflejar eso y reservar la alternativa amplia para nota.
  - severity: low
