translation:
  language: es
  text: 'Los hijos de Coat: Amram, Izhar, Hebrón y Uziel. Y los años de la vida de Coat fueron ciento treinta y tres años.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, בְּנֵי introduce a los descendientes inmediatos nombrados. En español, «los hijos de» reproduce con naturalidad y precisión esa relación genealógica sin ampliar indebidamente a «descendientes». El ו prefijado no necesita expresarse con «y» al inicio, porque el español bíblico-lecturable admite esta apertura nominal.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Kohath
  lexicon: Conventional Spanish biblical transliteration
  rationale: Se usa la forma tradicional española «Coat», que es la transliteración bíblica establecida en español y resulta más reconocible para lectores de iglesia. No se traduce el nombre propio.
- source_word: עַמְרָם וְיִצְהָר וְחֶבְרוֹן וְעֻזִּיאֵל
  english_pob_choice: Amram, Izhar, Hebron, and Uzziel
  chosen_spanish: Amram, Izhar, Hebrón y Uzziel
  alternatives_spanish:
  - Amram, Izhar, Hebrón, e Uzziel
  - Amram, Izhar, Hebrón y Uziel
  lexicon: Conventional Spanish biblical transliteration
  rationale: Los cuatro nombres propios se transliteran; se conserva «Hebrón» con acento español tradicional. La última conjunción se expresa con «y», forma natural en español antes de una palabra que no obliga a «e» por pronunciación inicial en este caso.
- source_word: וּשְׁנֵי חַיֵּי
  english_pob_choice: And the years of ... life were
  chosen_spanish: Y los años de la vida de
  alternatives_spanish:
  - Y la vida de ... duró
  - Y los años de la vida de ... fueron
  lexicon: HALOT
  rationale: La expresión hebrea idiomática שְׁנֵי חַיֵּי se vierte de manera bastante literal como «los años de la vida de», preservando la estructura genealógica del original. Se omite una reformulación más interpretativa como «duró», para no suavizar la fórmula del texto.
- source_word: שָׁלֹשׁ וּשְׁלֹשִׁים וּמְאַת שָׁנָה
  english_pob_choice: one hundred thirty-three years
  chosen_spanish: ciento treinta y tres años
  alternatives_spanish:
  - cien y treinta y tres años
  - ciento treinta y tres año
  lexicon: HALOT
  rationale: El orden numérico hebreo se adapta al uso normal del español con «ciento treinta y tres». Aunque el sustantivo hebreo está en singular, el español requiere el plural «años» para expresar la edad total de forma idiomática y clara.
translation_notes:
  revision_awareness: El inglés POB no añade notas ni variantes y mantiene una equivalencia óptima sobria; el borrador español sigue esa misma línea, conservando la estructura genealógica y la cifra de edad sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantiene el registro genealógico breve y directo, acorde con la serie del capítulo.
  - Se usan transliteraciones bíblicas españolas reconocibles para los nombres propios, sin introducir formas híbridas.
  - Se conserva la fórmula «los años de la vida de» para reflejar el hebreo de modo auditable.
