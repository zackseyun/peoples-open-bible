review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: gesto de oración con «palmas», rechazo divino con lenguaje antropomórfico, concesión con «aunque», contraste entre «palmas» y «manos», y acusación final de sangre/culpa. Sin embargo, dos elecciones no preservan del todo la mejor fuerza del original y del rastro auditado en inglés: «esconderé mis ojos» suena poco natural y algo calcado en español, y el futuro no es necesario; además, «las oraciones» introduce un artículo innecesario donde el español suena más natural sin perder el valor plural/abundante.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «esconderé mis ojos de ustedes» no es idiomático en español bíblico natural; «aparto mis ojos de ustedes» o «oculto mis ojos de ustedes» serían mejores, y «aparto» comunica bien el rechazo sin debilitar la imagen. «No estoy escuchando» es aceptable para el durativo, aunque en español suena un poco marcado; aun así puede mantenerse por fidelidad al matiz continuo documentado. El resto del verso lee bien.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se preserva correctamente «palmas» frente a «manos», y «sangre» con nota de alternativas. No aparecen términos del glosario mayor como Yahvé/Mesías/esclavo, etc.
  issues:
  - severity: medium
    issue: «esconderé mis ojos de ustedes» es poco idiomático y demasiado calcado
    rationale: Aunque intenta conservar la imagen hebrea, en español suena extraño decir que alguien 'esconde sus ojos de' otro. El hebreo expresa rechazo deliberado de la mirada; «aparto mis ojos de ustedes» conserva la antropomorfía y mejora la naturalidad.
  - severity: low
    issue: El futuro «esconderé» no es la mejor opción en este contexto
    rationale: La decisión inglesa auditada prefirió presente («I hide»). En español profético puede usarse futuro, pero aquí el presente intensifica mejor la denuncia vigente y combina bien con «no estoy escuchando».
  - severity: low
    issue: «multipliquen las oraciones» suena menos natural que «multipliquen oraciones»
    rationale: El artículo definido no aporta precisión contextual y vuelve más pesada la frase. Sin artículo, el español conserva bien la idea de abundancia de súplicas.
  revised_spanish_text: Y cuando extiendan sus palmas[a], aparto mis ojos de ustedes; aunque multipliquen oraciones, no estoy escuchando[b]. Sus manos están llenas de sangre[c].
  revised_footnotes:
