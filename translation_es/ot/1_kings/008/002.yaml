translation:
  language: es
  text: Y todos los hombres de Israel se reunieron con el rey Salomón en la fiesta[a], en el mes de Etanim, que es el séptimo mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en la festividad". El hebreo חָג denota una fiesta de peregrinación; aquí no se nombra la fiesta específica, aunque por el contexto se trata de la celebración otoñal asociada con el séptimo mes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  english_pob_choice: assembled
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - se juntó
  - fue reunido
  lexicon: HALOT
  rationale: El verbo indica venir juntos como asamblea. En español, 'se reunió' comunica con naturalidad la acción colectiva sin perder el sentido de congregación.
- source_word: אֶל הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: to King Solomon
  chosen_spanish: ante el rey Salomón
  alternatives_spanish:
  - a el rey Salomón
  - junto al rey Salomón
  - delante del rey Salomón
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente 'a', en este contexto de comparecer ante el rey la frase española más natural es 'ante el rey Salomón', que conserva la relación de presencia sin sonar forzada.
- source_word: כָּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: all the men of Israel
  chosen_spanish: todo el pueblo de Israel
  alternatives_spanish:
  - todos los hombres de Israel
  - todo varón de Israel
  - todo Israel
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo masculino singular colectivo, pero en español 'todo el pueblo de Israel' comunica el alcance colectivo con claridad y evita una lectura demasiado restrictiva o extraña para la publicación, sin negar la forma masculina del original.
- source_word: בְּיֶרַח הָאֵתָנִים
  english_pob_choice: in the month of Ethanim
  chosen_spanish: en el mes de Etanim
  alternatives_spanish:
  - en el mes de Ethanim
  - en el mes lunar de Etanim
  lexicon: HALOT
  rationale: Se translitera el nombre del mes como nombre propio, manteniendo el dato calendárico del texto hebreo.
- source_word: בֶּחָג
  english_pob_choice: at the festival
  chosen_spanish: en la fiesta
  alternatives_spanish:
  - en la festividad
  - en la fiesta solemne
  - en el festival
  lexicon: HALOT
  rationale: חָג designa una fiesta de peregrinación. 'Fiesta' es el equivalente español más natural y suficientemente amplio; se deja abierta la identificación específica, como en el texto fuente.
- source_word: הוּא הַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: which is the seventh month
  chosen_spanish: que es el séptimo mes
  alternatives_spanish:
  - es decir, el séptimo mes
  - que corresponde al séptimo mes
  - o sea, el séptimo mes
  lexicon: HALOT
  rationale: La cláusula es explicativa e identifica Etanim con el séptimo mes; 'que es' reproduce bien esa apposición en español.
theological_decisions:
- issue: Alcance representativo de כָּל אִישׁ יִשְׂרָאֵל
  english_pob_reading: all the men of Israel
  chosen_spanish_reading: todo el pueblo de Israel
  alternative_spanish_readings:
  - todos los hombres de Israel
  - todo Israel
  - todo varón de Israel
  rationale: El POB inglés preserva el masculino representativo. En español, 'todo el pueblo de Israel' mantiene el sentido colectivo y evita que el lector entienda que se trata solo de varones individuales, sin añadir una interpretación doctrinal ajena al texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés revisado cambió de 'before King Solomon' a 'to King Solomon' para reflejar más directamente la preposición hebrea. La versión española sigue esa relación con 'ante el rey Salomón', que expresa presencia y comparecencia sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa 'Salomón' como nombre propio del rey, siguiendo la forma española estándar.
  - Se translitera 'Etanim' como nombre de mes y no se traduce, por tratarse de un calendario propio.
  - Se mantiene 'fiesta' para חָג, de acuerdo con el valor de fiesta de peregrinación y la lectura abierta del contexto.
  - La cláusula final se mantiene explicativa, sin añadir precisión calendárica no explicitada por el hebreo.
