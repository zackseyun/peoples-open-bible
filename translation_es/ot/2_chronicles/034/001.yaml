  chosen_spanish: treinta y un años
  alternatives_spanish:
  - treinta y una años
  lexicon: HALOT
  rationale: La duración del reinado se expresa con el numeral cardinal usual en español. Se adopta la forma concordante más corriente en uso bíblico y general.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  lexicon: HALOT
  rationale: El verbo hebreo indica ejercicio real del gobierno. «Reinó» es la equivalencia directa y estilísticamente adecuada.
- source_word: בִּירוּשָׁלִָם
