translation:
  language: es
  text: y su ofrenda de grano[a] y sus libaciones para el toro, para el carnero y para los corderos, según su número, conforme a la ordenanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda vegetal». El hebreo מִנְחָה en este contexto sacrificial se refiere a la ofrenda de cereal o grano que acompaña los sacrificios.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  english_pob_choice: their grain offering
  chosen_spanish: su ofrenda vegetal
  alternatives_spanish:
  - su ofrenda de grano
  - su ofrenda
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial se refiere a la ofrenda vegetal o de cereal que acompaña los sacrificios; 'ofrenda vegetal' conserva el valor cultual sin sonar tan técnico como una glosa larga. Se evita 'ofrenda' sola por ser demasiado genérica.
- source_word: וְנִסְכֵּיהֶם
  english_pob_choice: and their drink offerings
  chosen_spanish: y sus libaciones
  alternatives_spanish:
  - y sus ofrendas de bebida
  - y sus derramamientos
  lexicon: HALOT
  rationale: נֶסֶךְ designa ofrendas líquidas derramadas; 'libaciones' es el equivalente culto y preciso en español, y comunica mejor el acto ritual que 'ofrendas de bebida'.
- source_word: לַפָּר
  english_pob_choice: for the bull
  chosen_spanish: para el toro
  alternatives_spanish:
  - para el bull
  - para el novillo
  lexicon: HALOT
  rationale: פַּר nombra el bovino del sacrificio. Aunque 'toro' no siempre implica edad, aquí evita la ambigüedad de 'novillo' y mantiene una designación natural en español para el animal sacrificial.
- source_word: לָאַיִל
  english_pob_choice: for the ram
  chosen_spanish: para el carnero
  alternatives_spanish:
  - para el ram
  lexicon: HALOT
  rationale: אַיִל corresponde a 'carnero'; es el término directo y transparente en español bíblico.
- source_word: וְלַכְּבָשִׂים
  english_pob_choice: and for the lambs
  chosen_spanish: y para los corderos
  alternatives_spanish:
  - y para los corderos machos
  - y para los corderos
  lexicon: HALOT
  rationale: כֶּבֶשׂ se traduce de forma natural como 'cordero'. El masculino específico puede estar implícito en uso sacrificial, pero en español 'corderos' es suficiente y más fluido en una lista ritual.
- source_word: בְּמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su número
  alternatives_spanish:
  - conforme a su número
  - de acuerdo con su número
  lexicon: HALOT
  rationale: La frase expresa correspondencia con la cantidad contada; 'según su número' es una equivalencia idiomática breve y fiel al procedimiento ritual.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - según la ordenanza
  - conforme al orden prescrito
  - según el rito establecido
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene fuerza normativa/establecida en el rito. 'Estatuto' preserva el valor legal-cultual que el POB inglés mantiene con 'ordinance', sin reducirlo a 'costumbre'.
translation_notes:
  revision_awareness: El texto base en inglés ya estaba en alto acuerdo con la fuente hebrea y no requería cambios sustanciales; el español sigue esa lectura, ajustando el registro a una formulación natural y cultualmente precisa.
  spanish_consistency_notes:
  - 'Se mantiene la terminología sacrificial de forma consistente: ofrenda vegetal, libaciones, carnero, corderos.'
  - No se usa 'SEÑOR' ni terminología de sustitución, porque este versículo no contiene el nombre divino.
  - '''Estatuto'' conserva el matiz normativo de כַּמִּשְׁפָּט sin sobretraducirlo como mero ''rito''.'
