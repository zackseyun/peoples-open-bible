  text: 이는 메시아께서 손으로 지은 성소들로 들어가신 것이 아니라—그것들은 참된 것들의 모형들입니다—하늘 자체로 들어가셨기 때문입니다. 이제 그분은 우리를 위하여 하나님의 면전에 나타나십니다.
