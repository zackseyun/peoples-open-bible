revisions:
- from: Y sucedió que, cuando Abram entró en Egipto, los egipcios vieron a la mujer, porque era muy hermosa.[a]
  to: Y cuando Abram entró en Egipto, los egipcios vieron que la mujer[a] era muy hermosa.
  rationale: Se ajusta וַיְהִי a un inicio narrativo español más natural ('Y cuando'), se corrige כִּי a 'que' para reflejar contenido percibido en vez de causa, y se reubica la nota en 'mujer' para corresponder exactamente al punto léxico en discusión. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
