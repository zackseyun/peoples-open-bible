review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica y mantiene la metáfora sexual del hebreo: וַתִּזֶן se refleja adecuadamente en «se prostituyó», מְאַהֲבֶיהָ en «sus amantes», y קְרוֹבִים en «que estaban cerca». Sin embargo, «codició» para וַתַּעְגַּב no expresa con suficiente naturalidad en español el matiz de deseo lujurioso/encaprichado que el verbo lleva en Ezequiel; suena más a avidez general o codicia posesiva. Además, «bajo mí» es gramaticalmente posible pero idiomáticamente tosco en español; «bajo mi autoridad» preserva mejor el sentido relacional del hebreo תַּחְתַּי sin perder la metáfora.'
  spanish_quality_summary: 'El texto es generalmente legible y digno, pero dos giros suenan poco naturales para lectura bíblica pública: «mientras estaba bajo mí» y «codició a sus amantes». La primera frase puede entenderse, pero no es español fluido; la segunda no suena idiomática con complemento personal para relaciones sexuales/metafóricas. Una leve revisión mejora fidelidad y naturalidad sin paraprasear.'
  glossary_alignment: No hay conflicto con los términos doctrinales globales. El nombre «Oholá» es aceptable como transliteración adaptada al español. La metáfora de infidelidad del pacto se preserva. La revisión propuesta solo ajusta la expresión de תַּחְתַּי y עגב para mejor correspondencia semántica y mejor español.
  issues:
  - severity: medium
    issue: «codició» no refleja bien el matiz de עגב
    rationale: El verbo hebreo comunica deseo lujurioso, apasionado o infatuado. «Codiciar» en español suele asociarse más con deseo posesivo de bienes o, en registro bíblico, con el décimo mandamiento, y aquí suena menos natural con «a sus amantes».
  - severity: medium
    issue: «mientras estaba bajo mí» suena forzado en español
    rationale: Aunque es cercano al hebreo y al inglés auditado, en español «bajo mí» no es la forma más natural para expresar subordinación relacional en una metáfora matrimonial. «Bajo mi autoridad» hace explícito el valor de pacto/autoridad ya documentado en la nota inglesa.
  - severity: low
    issue: La nota a sobre el nombre propio es redundante
    rationale: No hay ambigüedad textual que requiera nota para explicar que «Oholá» es una transliteración; puede omitirse para evitar aparato innecesario.
  revised_spanish_text: Oholá se prostituyó mientras estaba bajo mi autoridad[a], y se apasionó por sus amantes[b], los asirios que estaban cerca[c].
  revised_footnotes:
