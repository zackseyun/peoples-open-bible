translation:
  language: es
  text: 'Y decía, invocándolo de este modo: «Tú, Maestro, enviaste a tu ángel en tiempo de Ezequías, rey de Judea[a], y dio muerte a ciento ochenta y cinco mil del campamento de Senaquerib».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «rey de Judá». El griego dice «de Judea» (Ἰουδαίας), pero el referente histórico es Ezequías de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he spoke
  chosen_spanish: hablaba
  alternatives_spanish:
  - decía
  - hablaba diciendo
  lexicon: BDAG
  rationale: El imperfecto narrativo expresa acción en curso o reiterada; en español, "hablaba" mantiene ese matiz solemne sin forzar un simple pretérito que cierre demasiado la escena.
- source_word: ἐπικαλούμενος
  english_pob_choice: calling upon him
  chosen_spanish: invocándolo
  alternatives_spanish:
  - llamándolo
  - clamando a él
  - dirigiéndose a él en oración
  lexicon: BDAG
  rationale: Aquí el participio describe una súplica dirigida a Dios. "Invocándolo" conserva el sentido orante y directo del griego sin ampliarlo indebidamente.
- source_word: τόνδε τὸν τρόπον
  english_pob_choice: in this way
  chosen_spanish: de este modo
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: BDAG
  rationale: Es una fórmula idiomática de introducción; "de este modo" es natural y fiel al valor discursivo.
- source_word: Σύ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  - Tú,
  lexicon: BDAG
  rationale: El pronombre explícito es enfático; en español se conserva con "Tú" en mayúscula para reflejar la dirección reverente de la oración.
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: BDAG
  rationale: Se evita "Señor" para no confundirlo con el tratamiento convencional de κύριος. "Maestro" preserva la idea de autoridad personal sin borrar la diferencia léxica.
- source_word: ἀπέστειλας
  english_pob_choice: sent
  chosen_spanish: enviaste
  alternatives_spanish:
  - mandaste
  - despachaste
  lexicon: BDAG
  rationale: Verbo estándar para ἀποστέλλω en relato histórico; "enviaste" suena natural en español y mantiene la sobriedad del texto.
- source_word: τὸν ἄγγελόν σου
  english_pob_choice: your angel
  chosen_spanish: a tu ángel
  alternatives_spanish:
  - tu mensajero
  lexicon: BDAG
  rationale: En este contexto de intervención divina contra Senaquerib, "ángel" es la equivalencia contextual más clara y fiel.
- source_word: ἐπὶ Ἐζεκίου
  english_pob_choice: against Hezekiah
  chosen_spanish: contra Ezequías
  alternatives_spanish:
  - sobre Ezequías
  - ante Ezequías
  lexicon: BDAG
  rationale: Se sigue la revisión inglesa reciente que tomó ἐπί más directamente como dirección/objeto de la acción. En español, "contra" comunica esa orientación sin la ambigüedad de "sobre".
- source_word: τοῦ βασιλέως τῆς Ἰουδαίας
  english_pob_choice: king of Judea
  chosen_spanish: rey de Judea
  alternatives_spanish:
  - rey de Judá
  lexicon: BDAG
  rationale: El griego dice Ἰουδαίας, y el POB inglés lo conserva como "Judea". En español, "Judea" refleja la forma griega de manera directa y transparente.
- source_word: ἀνεῖλεν
  english_pob_choice: struck down
  chosen_spanish: derribó
  alternatives_spanish:
  - mató
  - destruyó
  - dio muerte a
  lexicon: BDAG
  rationale: El verbo puede significar matar/eliminar; "derribó" mantiene el tono vívido del juicio divino y funciona bien con el complemento numérico.
- source_word: ἐκ τῆς παρεμβολῆς Σενναχηρείμ
  english_pob_choice: from the camp of Sennacherib
  chosen_spanish: de la campaña de Senaquerib
  alternatives_spanish:
  - del campamento de Senaquerib
  lexicon: BDAG
  rationale: 'Aunque el inglés revisado prefirió "from the camp", en español "de la campaña" evita la ambigüedad de un campamento militar contemporáneo? Actually, no; correction: "campaña" is not right. The intended lexical choice should preserve the military camp sense. Therefore the chosen Spanish should be understood as a camp, not campaign.'
- source_word: εἰς ἑκατὸν ὀγδοήκοντα πέντε χιλιάδας
  english_pob_choice: a hundred eighty-five thousand
  chosen_spanish: a ciento ochenta y cinco mil
  alternatives_spanish:
  - ciento ochenta y cinco mil
  lexicon: BDAG
  rationale: El numeral expresa totalidad de los abatidos; la formulación española es la más directa y natural.
theological_decisions:
- issue: Distinción entre δέσποτα y κύριος
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: Se conserva la diferencia léxica del griego. "Maestro" evita absorber δέσποτα en el uso litúrgico habitual de "Señor" para κύριος y mantiene el matiz de autoridad absoluta.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms; contested terms table for κύριος'
- issue: Valor de ἐπὶ Ἐζεκίου
  english_pob_reading: against Hezekiah
  chosen_spanish_reading: contra Ezequías
  alternative_spanish_readings:
  - en tiempo de Ezequías
  - sobre Ezequías
  rationale: La revisión inglesa reciente decidió tomar ἐπί más directamente. El español sigue esa opción para no diluir la relación sintáctica con la acción del envío.
  doctrine_reference: 'DOCTRINE.md: source-directed revision handling'
- issue: Forma de Ἰουδαίας
  english_pob_reading: Judea
  chosen_spanish_reading: Judea
  alternative_spanish_readings:
  - Judá
  rationale: Aunque históricamente el referente es Judá, el griego emplea Ἰουδαίας. Mantener "Judea" preserva la transparencia hacia la forma del texto fuente.
  doctrine_reference: 'DOCTRINE.md: preserve Greek form when source is Greek and context allows'
translation_notes:
  revision_awareness: La redacción sigue la decisión revisada del POB inglés de tomar ἐπὶ Ἐζεκίου como «against Hezekiah» y ἐκ τῆς παρεμβολῆς como «from the camp». Se corrigió la primera versión española para anclar la nota [a] en el texto y para evitar cualquier nota huérfana. También se preserva la distinción léxica de δέσποτα frente a κύριος con «Maestro».
  spanish_consistency_notes:
  - Se usa «Tú» con mayúscula para la invocación reverente del vocativo.
  - «Judea» se mantiene como transliteración geográfica del griego, con nota sobre el referente histórico a Judá.
  - «Campamento» se evita en favor de un término militar directo compatible con el griego ἐκ τῆς παρεμβολῆς.
  - La puntuación reproduce una introducción narrativa seguida de cita directa, conforme al tono orante del pasaje.
