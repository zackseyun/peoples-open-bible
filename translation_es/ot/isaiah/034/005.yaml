revisions:
- from: Porque mi espada está empapada en los cielos[a]; he aquí, descenderá sobre Edom, sobre el pueblo de mi herem[b], para juicio.
  to: Porque mi espada está empapada en los cielos[a]; he aquí, descenderá sobre Edom, sobre el pueblo consagrado a la destrucción[b], para juicio.
  rationale: Se conserva casi todo el borrador, pero se reemplaza 'el pueblo de mi herem' por 'el pueblo consagrado a la destrucción' para traducir realmente el sentido de חֶרְמִי en un español claro y eclesialmente legible. La nota retiene el término hebreo técnico y explica su matiz judicial, preservando la evidencia fuente y la justificación léxica.
