translation:
  language: es
  text: 'Y les dijo: «Díganme, pues, hijos de Canaán, quién es este pueblo que habita en la región montañosa, y qué ciudades habitan, y el tamaño de su fuerza militar[a], y en qué consisten su poder y su fuerza, y quién se ha levantado sobre ellos como rey[b], dirigiendo su ejército[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el número de su ejército» o «la magnitud de su fuerza». El griego dice literalmente «la multitud de su fuerza», pero aquí el contexto es militar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «se ha levantado sobre ellos»; se conserva la imagen del griego ἀνέστηκεν ἐπʼ αὐτῶν.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «su fuerza armada» o «sus tropas»; στρατιά aquí se refiere al contingente militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναγγείλατέ
  english_pob_choice: Tell
  chosen_spanish: Notifíquenme
  alternatives_spanish:
  - Díganme
  - Infórmenme
  - Háganme saber
  lexicon: BDAG
  rationale: La forma imperativa pide un informe directo. «Notifiquen» conserva el acto de comunicar información con un tono formal y adecuado al contexto de interrogatorio militar.
- source_word: δή
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - ahora
  - entonces
  - por favor
  lexicon: BDAG
  rationale: δή añade fuerza discursiva. «Pues» funciona en español como partícula de refuerzo sin volver la frase innecesariamente arcaica o cortés.
- source_word: υἱοὶ Χαναάν
  english_pob_choice: sons of Canaan
  chosen_spanish: hijos de Canaán
  alternatives_spanish:
  - canaaneos
  - hijos de Canaan
  lexicon: BDAG
  rationale: Se mantiene la expresión literal y marcada del griego. El texto no dice simplemente la etnia, sino «hijos de Canaán»; eso conserva la forma retórica y evita aplanarla sin necesidad.
- source_word: ὁ λαὸς οὗτος
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: BDAG
  rationale: «Pueblo» reproduce bien el sustantivo colectivo singular del griego y encaja con el registro bíblico del pasaje.
- source_word: ὁ καθήμενος ἐν τῇ ὀρεινῇ
  english_pob_choice: that dwells in the hill country
  chosen_spanish: que habita en la región montañosa
  alternatives_spanish:
  - que se sienta en la serranía
  - que vive en la región montañosa
  lexicon: BDAG
  rationale: καθήμενος se entiende aquí de modo idiomático como residir. «Región montañosa» traduce ὀρεινή de forma natural en español y conserva la localización geográfica.
- source_word: αἱ κατοικοῦσιν πόλεις
  english_pob_choice: which cities they inhabit
  chosen_spanish: qué ciudades habitan
  alternatives_spanish:
  - en qué ciudades viven
  - cuáles son las ciudades que habitan
  lexicon: BDAG
  rationale: La estructura interrogativa griega pide información sobre las ciudades en que viven. «Qué ciudades habitan» es fiel y natural.
- source_word: τὸ πλῆθος τῆς δυνάμεως αὐτῶν
  english_pob_choice: the size of their military force
  chosen_spanish: cuán grande es la multitud de su fuerza
  alternatives_spanish:
  - el tamaño de su fuerza militar
  - la multitud de su ejército
  lexicon: BDAG
  rationale: πλῆθος conserva la idea de multitud, y δύναμις aquí puede aludir a fuerza militar. «Multitud de su fuerza» mantiene la cercanía al griego sin introducir una interpretación más específica de la requerida, aunque la lectura militar queda contextualizada por el pasaje.
- source_word: κράτος
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - dominio
  - fuerza
  lexicon: BDAG
  rationale: κράτος denota poder manifiesto o vigor efectivo. «Poder» es un equivalente claro y mantiene la pareja semántica con ἰσχύς sin fusionarlas.
- source_word: ἰσχύς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: BDAG
  rationale: ἰσχύς se traduce bien como «fuerza». Mantiene la duplicación retórica «poder y fuerza» presente en el griego.
- source_word: ἐν τίνι
  english_pob_choice: in what ... consist
  chosen_spanish: en qué consisten
  alternatives_spanish:
  - en qué radican
  - de qué dependen
  lexicon: BDAG
  rationale: La pregunta busca el fundamento o la composición de su poder. «En qué consisten» expresa con naturalidad la estructura de la frase en español.
- source_word: ἀνέστηκεν ἐπʼ αὐτῶν
  english_pob_choice: has risen over them
  chosen_spanish: se ha levantado sobre ellos
  alternatives_spanish:
  - se ha alzado sobre ellos
  - ha surgido sobre ellos
  - rige sobre ellos
  lexicon: BDAG
  rationale: Se conserva la imagen de levantarse/rise over them, sin sustituirla por un verbo de gobierno más explícito que el griego no exige.
- source_word: ἡγούμενος στρατιᾶς αὐτῶν
  english_pob_choice: leading their army
  chosen_spanish: dirigiendo su ejército
  alternatives_spanish:
  - conduciendo su ejército
  - mandando su ejército
  - guiando su ejército
  lexicon: BDAG
  rationale: ἡγούμενος expresa liderazgo o conducción; στρατιά es «ejército». «Dirigiendo su ejército» comunica bien la función militar del participio.
translation_notes:
  revision_awareness: 'Se corrigió la falta de anclaje de notas: cada marcador aparece ahora exactamente en el texto español. La redacción sigue de cerca el griego y el audit trail inglés, pero usa español natural y evita calcos innecesarios.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto no aplicable aquí, porque el versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» por no ser pertinente al pasaje.
  - Se conservaron la repetición retórica de «poder y fuerza» y la imagen verbal de «levantarse sobre ellos».
