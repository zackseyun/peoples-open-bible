translation:
  text: Jesus said[a], “The Pharisees and the scribes have received the keys of knowledge;
    they have hidden them. They did not enter, and they did not allow those who wished
    to enter[e][d][c][b]. But you—become prudent like serpents and innocent like doves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'POxy 655 reads the similes in the plural (“serpents … doves”), while the
      Coptic has generic singular: “the serpent … the dove.” This draft follows the
      Coptic usage.'
    reason: textual_variant
  - marker: b
    text: Cf. Luke 11:52 (“You have taken away the key of knowledge…”) and Matthew
      23:13 (blocking entry), for thematic parallels.
    reason: cross_reference
  - marker: c
    text: Cf. Matthew 10:16 (“wise as serpents and innocent as doves”) for a related
      formulation.
    reason: cross_reference
  - marker: d
    text: 'Coptic ⲛⲡϩⲉ means “in the manner of,” here introducing comparisons: “like
      the serpent … like the dove.”'
    reason: dialect_note
  - marker: e
    text: Or 'like the serpent and innocent like the dove'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲫⲁⲣⲓⲥⲁⲓⲟⲥ
  chosen: Pharisees
  alternatives:
  - the Pharisee (collective)
  lexicon: Layton; Crum
  rationale: Collective singular in Coptic refers to the group; rendering as plural
    in English conveys the collective sense.
- source_word: ⲅⲣⲁⲙⲙⲁⲧⲉⲩⲥ
  chosen: scribes
  alternatives:
  - scholars
  - legal specialists
  lexicon: Layton; Crum
  rationale: Standard rendering for the Jewish literate elite; keeps the familiar
    socio-religious reference without over-specifying.
- source_word: ⲁⲛⲧⲟⲟⲩϫⲓ
  chosen: have received
  alternatives:
  - have taken
  lexicon: Crum (ϫⲓ)
  rationale: ϫⲓ commonly means ‘take/receive’; perfective aspect here signals completed
    action relevant to present.
- source_word: ϣⲁϣⲧ
  chosen: keys
  alternatives:
  - key
  lexicon: Crum
  rationale: Plural is explicit with ⲛ-; ‘keys’ better reflects Coptic number.
- source_word: ⲅⲛⲱⲥⲓⲥ
  chosen: knowledge
  alternatives:
  - gnosis
  lexicon: Layton
  rationale: While a Greek loan, the context is non-technical; ‘knowledge’ avoids
    importing later technical nuances.
- source_word: ⲟⲩϩⲱⲡ
  chosen: have hidden
  alternatives:
  - have concealed
  - have stashed away
  lexicon: Crum
  rationale: Basic sense ‘hide/conceal’; ‘hidden’ fits terseness and matches the accusative
    pronoun sense implied.
- source_word: ⲙⲡⲉⲛⲧⲟⲟⲩⲃⲱⲕ ⲉϩⲟⲩⲛ
  chosen: did not enter
  alternatives:
  - did not go in
  lexicon: Crum (ⲃⲱⲕ)
  rationale: Negative perfect construction with motion verb plus ⲉϩⲟⲩⲛ ‘in’; ‘enter’
    is concise and accurate.
- source_word: ⲟⲱϣ
  chosen: wish
  alternatives:
  - desire
  - want
  lexicon: Crum
  rationale: Neutral volitional term; ‘wish’ preserves slightly formal tone.
- source_word: ⲕⲱⲛⲧⲟⲟⲩ
  chosen: allow
  alternatives:
  - permit
  lexicon: Crum
  rationale: ‘Allow’ is idiomatic with an infinitive understood (‘to enter’); keeps
    Thomas’ terseness.
- source_word: ϣⲱⲡⲉ
  chosen: become
  alternatives:
  - be
  lexicon: Layton; Crum
  rationale: Primary sense ‘become, come to be’; imperative nuance suits exhortation
    more than simple ‘be’.
- source_word: ⲫⲣⲟⲛⲓⲙⲟⲥ
  chosen: prudent
  alternatives:
  - wise
  - shrewd
  lexicon: Layton
  rationale: Greek loan with sense ‘sensible/prudent’; ‘prudent’ balances between
    ‘wise’ and ‘shrewd’ without importing Matthean cadence.
- source_word: ⲁⲕⲉⲣⲁⲓⲟⲥ
  chosen: innocent
  alternatives:
  - pure
  - guileless
  lexicon: Layton
  rationale: Greek loan ‘unmixed, pure, guileless’; ‘innocent’ reads clearly in English
    and matches the ethical contrast.
- source_word: ⲛⲡϩⲉ (ⲛⲡϩⲉ ⲛⲡⲩ‑)
  chosen: like (in the manner of)
  alternatives:
  - as
  lexicon: Crum (ϩⲉ)
  rationale: Idiomatic formula ‘in the manner of’ introducing a comparison; ‘like’
    captures the construction.
- source_word: ⲡϩⲟϥ
  chosen: the serpent
  alternatives:
  - the snake
  lexicon: Crum
  rationale: ‘Serpent’ preserves biblical register; Coptic uses generic singular with
    article.
- source_word: ⲡϭⲣⲟⲙⲡⲉ
  chosen: the dove
  alternatives:
  - the pigeon
  lexicon: Crum
  rationale: ‘Dove’ is the conventional term and matches the ethical image; again
    generic singular in Coptic.
textual_note: No lacunae are present in NH II for this saying (NHC II, 40:7–13). Orthography
  shows NH dialectal 3pl forms with -ⲧⲟⲟⲩ (e.g., ⲁⲛⲧⲟⲟⲩϫⲓ; ⲙⲡⲉⲛⲧⲟⲟⲩⲃⲱⲕ; ⲙⲡⲉⲛⲧⲟⲟⲩⲕⲱⲛⲧⲟⲟⲩ).
  The comparison ‘like the serpent / like the dove’ uses the formula ⲛⲡϩⲉ ‘in the
  manner of’ with generic singulars introduced by the definite article (ⲡϩⲟϥ, ⲡϭⲣⲟⲙⲡⲉ).
  The negative perfect ⲙⲡⲉⲛⲧⲟⲟⲩⲃⲱⲕ ⲉϩⲟⲩⲛ expresses completed non-entry, followed by
  a coordinated clause denying permission to those wishing to enter. No restorations
  are indicated by Dilley.
