translation:
  language: es
  text: El primer día habrá una santa convocación[a]; no harán ningún trabajo habitual[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una asamblea santa». La frase hebrea מִקְרָא קֹדֶשׁ es un término formal para una reunión santa convocada.
    reason: lexical_alternative
  - marker: b
    text: O «trabajo ordinario» o, más literalmente en español antiguo, «trabajo servil». La expresión alude al trabajo cotidiano asociado con la ocupación o el servicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הָרִאשׁוֹן
  english_pob_choice: On the first day
  chosen_spanish: En el primer día
  alternatives_spanish:
  - El primer día
  - En el día primero
  lexicon: HALOT
  rationale: La frase temporal hebrea se expresa de manera natural en español con una construcción preposicional. «En el primer día» conserva el valor temporal sin forzar un calco innecesario.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una santa convocación
  alternatives_spanish:
  - una asamblea santa
  - una asamblea sagrada
  lexicon: HALOT
  rationale: «Convocación» conserva el matiz de reunión convocada que el término cultual hebreo comunica, y «santa» preserva la cualidad de consagración. Se mantiene el lenguaje formal tradicional que refleja la frase fija sin reemplazarla por una paráfrasis más general.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: laborious work
  chosen_spanish: ningún trabajo laborioso
  alternatives_spanish:
  - ningún trabajo ordinario
  - ningún trabajo servil
  - ninguna labor de servicio
  lexicon: HALOT
  rationale: La expresión hebrea no prohíbe toda actividad, sino el trabajo ordinario/de ocupación asociado con el servicio o el quehacer habitual. «Trabajo laborioso» preserva la carga léxica de מְלָאכָה + עֲבֹדָה y sigue la decisión inglesa de evitar «servil» por su tono arcaico.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: no harán
  alternatives_spanish:
  - no harán ninguno
  - no deberán hacer
  lexicon: HALOT
  rationale: En instrucción legal, el plural imperfectivo hebreo se expresa con futuro o perífrasis normativa en español. «No harán» es claro y solemne, y permite la negación del objeto directo de forma idiomática.
translation_notes:
  revision_awareness: El texto base inglés y la revisión más reciente coinciden plenamente; no hubo cambios aplicados en la pasada de revisión. La redacción española sigue esa lectura estable y conserva las alternativas léxicas relevantes donde el hebreo admite matiz.
  spanish_consistency_notes:
  - Se mantuvo «santa convocación» para reflejar la fórmula cultual fija de Levítico.
  - Se prefirió «trabajo laborioso» frente a «servil» por claridad contemporánea sin perder el contraste cultual.
  - La negación legal se formuló con futuro normativo («no harán») para un español bíblico natural.
