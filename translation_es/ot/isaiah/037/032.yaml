    issue: La nota [a] está anclada en «remanente» pero explica «celo/celos».
    rationale: Las notas deben marcar exactamente la palabra o frase relevante. Tal como está, induce a pensar que la alternativa textual afecta «remanente» en vez de «celo».
  - severity: medium
    issue: «un remanente y sobrevivientes, desde el monte Sion» es torpe en español.
    rationale: El hebreo presenta un paralelismo nominal, pero en español conviene reformular para evitar una secuencia fragmentaria o ambigua. «y sobrevivientes del monte Sion» preserva el sentido con mejor naturalidad.
  - severity: low
    issue: La coma antes de «desde el monte Sion» interrumpe innecesariamente la lectura.
    rationale: No refleja una pausa obligatoria en español y empeora la conexión sintáctica entre «sobrevivientes» y su complemento de origen.
  revised_spanish_text: Porque de Jerusalén saldrá un remanente, y sobrevivientes del monte Sion. El celo[a] de Yahvé de los ejércitos hará esto.
