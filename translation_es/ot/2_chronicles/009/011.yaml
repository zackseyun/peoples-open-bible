base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/009/011.yaml
  text: And the king made from the algum wood stairways for the house of Yahweh and for the king’s house[a], and lyres and harps for the singers[b]. Nothing like them had been seen before in the land of Judah.
  footnotes:
  - marker: a
    text: Or 'stairs' for the house of the LORD and for the king’s house; the Hebrew term may refer to architectural approaches or stairways.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'algum'; in the parallel passage (1 Kgs 10:12) the wood is called 'almug.' The exact species is uncertain.
    reason: cross_reference
