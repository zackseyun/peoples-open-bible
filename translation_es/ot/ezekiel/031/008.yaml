  to: Cedros no lo eclipsaron en el jardín de Dios[a]; cipreses no se compararon con sus ramas, y plátanos[b] no fueron como sus frondas. Ningún árbol en el jardín de Dios se le comparó en su hermosura.
  rationale: Se corrige el matiz excesivo de «ramas nuevas» por «frondas», que distingue naturalmente פֹארֹתָיו de «ramas» sin añadir una idea ausente. Se mantiene el resto de la imaginería arbórea y la literalidad de «el jardín de Dios». La nota [a] necesita reparación editorial porque el borrador repite la misma frase; se conserva su intención explicativa en español.
