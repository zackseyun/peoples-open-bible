translation:
  language: es
  text: Y prepararás una cuarta parte de un hin de vino para la ofrenda de libación, con el holocausto[a] o el sacrificio, para cada cordero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «sobre el holocausto». La preposición hebrea עַל puede traducirse de forma más formal así, pero aquí probablemente indica acompañamiento dentro del rito sacrificial.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para el cordero uno»; la traducción «para cada cordero» hace explícita la fuerza distributiva de la instrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַיִן
  english_pob_choice: And ... wine
  chosen_spanish: Y de vino
  alternatives_spanish:
  - Y vino
  - Y, de vino
  lexicon: WLC/HALOT
  rationale: El hebreo vincula esta cláusula con la instrucción anterior mediante וְ. En español, iniciar con «Y» conserva la continuidad del mandato; «de vino» expresa con naturalidad el complemento de materia requerido por la frase sacrificial.
- source_word: לַ/נֶּסֶךְ
  english_pob_choice: for the drink offering
  chosen_spanish: para la ofrenda de libación
  alternatives_spanish:
  - para la ofrenda derramada
  - como libación
  - para la libación
  lexicon: WLC/HALOT
  rationale: נֶסֶךְ en contexto sacrificial denota la ofrenda de vino derramado. «Ofrenda de libación» conserva el sentido técnico y es más transparente que sustituirlo por una fórmula menos precisa o más explicativa.
- source_word: רְבִיעִית הַ/הִין
  english_pob_choice: a quarter of a hin
  chosen_spanish: una cuarta parte de un hin
  alternatives_spanish:
  - un cuarto de un hin
  - una cuarta de un hin
  lexicon: WLC/HALOT
  rationale: «Una cuarta parte» expresa con claridad la fracción indicada por רְבִיעִית y mantiene la unidad antigua «hin» sin convertirla a medidas modernas.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall prepare
  chosen_spanish: la prepararás
  alternatives_spanish:
  - harás
  - la ofrecerás
  - la dispondrás
  lexicon: WLC/HALOT
  rationale: Aunque עָשָׂה literalmente significa «hacer», en instrucciones rituales puede equivaler a preparar o disponer la ofrenda. Aquí el objeto inmediato es la ofrenda de libación, por lo que «la prepararás» evita una traducción demasiado mecánica.
- source_word: עַל הָ/עֹלָה
  english_pob_choice: with the burnt offering
  chosen_spanish: sobre el holocausto
  alternatives_spanish:
  - con el holocausto
  - encima del holocausto
  - junto al holocausto
  lexicon: WLC/HALOT
  rationale: El inglés POB anotó que עַל puede traducirse literalmente «upon», aunque el sentido ritual probablemente es de acompañamiento. En español, «sobre» conserva la preposición del hebreo y deja visible la tensión interpretativa, sin borrar la posibilidad contextual de asociación litúrgica.
- source_word: א֣וֹ לַ/זָּבַח
  english_pob_choice: or the sacrifice
  chosen_spanish: o el sacrificio
  alternatives_spanish:
  - o para el sacrificio
  - o la víctima
  - o la ofrenda
  lexicon: WLC/HALOT
  rationale: זֶבַח es el término general para sacrificio. Se traduce de manera simple como «el sacrificio» para preservar la amplitud del hebreo sin añadir una precisión no explícita en el texto.
- source_word: לַ/כֶּבֶשׂ הָ/אֶחָד
  english_pob_choice: for each lamb
  chosen_spanish: para cada cordero[c]
  alternatives_spanish:
  - para el cordero único
  - para un solo cordero
  - para cada cordero individual
  lexicon: WLC/HALOT
  rationale: El hebreo dice literalmente «para el cordero uno/único». La versión inglesa hace explícita la fuerza distributiva. En español, «para cada cordero» comunica esa distribución natural en una instrucción sacrificial.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo WLC y toma en cuenta el audit trail inglés, especialmente la decisión de conservar la ambigüedad de עַל/‘upon’ y la fuerza distributiva de לַכֶּבֶשׂ הָאֶחָד. También se mantuvo el término técnico de ofrenda de libación, coherente con el POB inglés.
  spanish_consistency_notes:
  - Se usa «holocausto» para עֹלָה, en continuidad con la terminología bíblica tradicional y con el contraste ritual del versículo.
  - Se evita convertir el hin a una medida moderna, preservando la unidad antigua del texto.
  - Se mantiene «libación» como término técnico, no como simple bebida, por el contexto sacrificial.
