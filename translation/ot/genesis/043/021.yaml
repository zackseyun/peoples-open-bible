id: GEN.43.21
reference: Genesis 43:21
source:
  edition: WLC
  text: וַֽ/יְהִ֞י כִּי בָ֣אנוּ אֶל הַ/מָּל֗וֹן וַֽ/נִּפְתְּחָ/ה֙ אֶת אַמְתְּחֹתֵ֔י/נוּ וְ/הִנֵּ֤ה כֶֽסֶף אִישׁ֙ בְּ/פִ֣י אַמְתַּחְתּ֔/וֹ כַּסְפֵּ֖/נוּ בְּ/מִשְׁקָל֑/וֹ וַ/נָּ֥שֶׁב אֹת֖/וֹ בְּ/יָדֵֽ/נוּ־־־־׃
translation:
  text: And when we came to the lodging place and opened our sacks[a], behold[b], each man's silver was in the mouth of his sack—our silver in its full weight—and we brought it back in our hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the opening of his sack.' Hebrew literally says 'in the mouth of his sack.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our money according to its weight'; the Hebrew refers to the exact weighed amount being returned.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמָּלוֹן
  chosen: the lodging place
  alternatives:
  - the inn
  - the campsite
  - the place where we lodged
  lexicon: HALOT
  rationale: מָלוֹן denotes a place for spending the night on a journey, not necessarily a commercial inn in the modern sense. 'Lodging place' is natural English and avoids over-specifying.
- source_word: וַנִּפְתְּחָה
  chosen: opened
  alternatives:
  - we opened
  lexicon: HALOT
  rationale: The cohortative/paragogic form functions narratively here with first person plural sense. English simply renders the action as 'opened' within the clause 'we ... opened.'
- source_word: אַמְתְּחֹתֵינוּ / אַמְתַּחְתּוֹ
  chosen: sacks / his sack
  alternatives:
  - bags
  - packs
  lexicon: HALOT
  rationale: אַמְתַּחַת refers to a grain or travel sack. 'Sack' fits the Joseph narrative context better than the more generic 'bag.'
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there it was
  lexicon: HALOT
  rationale: The particle marks sudden discovery and vividness. 'Behold' preserves the narrative force without paraphrase.
- source_word: כֶּסֶף אִישׁ
  chosen: each man's silver
  alternatives:
  - the silver of each man
  - each one's money
  lexicon: HALOT
  rationale: The distributive sense of אִישׁ after כֶסֶף is best captured by 'each man's silver.' 'Silver' is retained rather than generalized to 'money' because the Hebrew explicitly says silver.
- source_word: בְּפִי אַמְתַּחְתּוֹ
  chosen: in the mouth of his sack
  alternatives:
  - at the opening of his sack
  - in the opening of his sack
  lexicon: HALOT
  rationale: Hebrew idiom uses 'mouth' for the opening of a container. The literal image is understandable in English and preserves the source texture.
- source_word: כַּסְפֵּנוּ
  chosen: our silver
  alternatives:
  - our money
  lexicon: HALOT
  rationale: Again, the Hebrew specifies silver. Keeping 'silver' maintains lexical consistency within the verse.
- source_word: בְּמִשְׁקָלוֹ
  chosen: in its full weight
  alternatives:
  - by its weight
  - according to its weight
  - at its proper weight
  lexicon: HALOT
  rationale: The phrase indicates the exact amount by weight, i.e., the full measured amount. 'In its full weight' communicates that nothing was missing.
- source_word: וַנָּשֶׁב אֹתוֹ
  chosen: we have brought it back
  alternatives:
  - we returned it
  - we brought it again
  lexicon: HALOT
  rationale: 'Though formally a wayyiqtol, in direct speech it reports the brothers'' present action relative to the discovery: they are explaining that they have now returned the silver. English present perfect fits the discourse context better than a simple past.'
- source_word: בְּיָדֵנוּ
  chosen: in our hand
  alternatives:
  - with us
  - in our possession
  lexicon: HALOT
  rationale: The singular 'hand' after a plural pronoun is a common Hebrew idiom. 'In our hand' preserves the idiom while remaining intelligible in English.
