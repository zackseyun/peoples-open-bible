lexical_decisions:
- source_word: כְּדָרְלָעֹמֶר
  english_pob_choice: Chedorlaomer
  chosen_spanish: Chedorlaomer
  alternatives_spanish:
  - Kedorlaomer
  lexicon: transliteración de nombre propio
  rationale: Se conserva el nombre propio sin traducir, siguiendo el valor del texto fuente y la convención onomástica del proyecto.
- source_word: מֶלֶךְ עֵילָם
  english_pob_choice: king of Elam
  chosen_spanish: rey de Elam
  alternatives_spanish:
  - rey de Elamita
  lexicon: cadena constructa + nombre propio
  rationale: 'La relación posesiva es directa y natural en español: ''rey de Elam''. No se añade interpretación histórica.'
- source_word: תִדְעָל
  english_pob_choice: Tidal
  chosen_spanish: Tidal
  alternatives_spanish:
  - Tídal
  lexicon: transliteración de nombre propio
  rationale: Se mantiene el nombre propio sin traducción.
- source_word: גּוֹיִם
  english_pob_choice: Goiim
  chosen_spanish: Goim
  alternatives_spanish:
  - naciones
  lexicon: HALOT
  rationale: En este contexto puede funcionar como topónimo; por eso se conserva como nombre propio en el texto principal. La alternativa 'naciones' queda reflejada en nota porque el hebreo permite esa lectura.
- source_word: אַמְרָפֶל
  english_pob_choice: Amraphel
  chosen_spanish: Amrafel
  alternatives_spanish:
  - Amrapel
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre propio de forma transparente y reconocible en español.
- source_word: שִׁנְעָר
  english_pob_choice: Shinar
  chosen_spanish: Sinar
  alternatives_spanish:
  - Sinar
  lexicon: nombre propio geográfico
  rationale: Se conserva el nombre geográfico bíblico en una forma española estable y legible.
- source_word: אַרְיֹוךְ
  english_pob_choice: Arioch
  chosen_spanish: Arioc
  alternatives_spanish:
  - Arioch
  lexicon: transliteración de nombre propio
  rationale: Se adapta la transliteración a la ortografía española corriente, manteniendo el nombre propio.
- source_word: אֶלָּסָר
  english_pob_choice: Ellasar
  chosen_spanish: Elasar
  alternatives_spanish:
  - Ellasar
  lexicon: nombre propio geográfico
  rationale: Se conserva el topónimo bíblico con grafía española sencilla y transparente.
- source_word: אַרְבָּעָה מְלָכִים
  english_pob_choice: four kings
  chosen_spanish: cuatro reyes
  alternatives_spanish:
  - cuatro monarcas
  lexicon: numeral + sustantivo
  rationale: La expresión se traduce de manera directa y sobria.
- source_word: אֶת הַחֲמִשָּׁה
  english_pob_choice: the five
  chosen_spanish: los cinco
  alternatives_spanish:
  - cinco
  lexicon: HALOT
  rationale: El hebreo es elíptico y remite a los reyes mencionados antes; en español es natural explicitar el sustantivo implícito con 'los cinco'. La preposición relacional queda vertida por 'contra', como en el contexto de combate.
theological_decisions:
- issue: Valor relacional de אֵת en lista bélica
  english_pob_reading: against
  chosen_spanish_reading: contra
  alternative_spanish_readings:
  - con
  - frente a
  rationale: En esta enumeración de reyes en contexto de guerra, la partícula marca oposición. 'Contra' conserva el sentido relacional de combate sin convertir la partícula en mero marcador no traducido.
  doctrine_reference: Ninguno; decisión semántica contextual.
- issue: Lectura de גּוֹיִם como topónimo o apelativo común
  english_pob_reading: Goiim / nations
  chosen_spanish_reading: Goim
  alternative_spanish_readings:
  - naciones
  rationale: El contexto y la auditoría inglesa dejan abierta la tensión entre topónimo y nombre común. En el texto principal se preserva la forma toponímica; la alternativa semántica se documenta en nota para no borrar la ambigüedad del hebreo.
  doctrine_reference: Ninguno; decisión léxica con ambigüedad textual.
translation_notes:
  revision_awareness: Se siguió la versión inglesa auditada sin cambios recientes, con alta concordancia y sin revisiones aplicadas. La solución española conserva los nombres propios, explicita la oposición bélica con 'contra' y mantiene en nota la ambigüedad de גּוֹיִם.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se prefirió 'reyes' y no 'monarcas' por sobriedad bíblica y claridad.
  - 'Se mantuvo la puntuación en dos miembros: lista nominal y cierre resumido del contraste bélico.'
