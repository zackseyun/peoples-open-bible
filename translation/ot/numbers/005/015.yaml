theological_decisions:
- issue: Meaning of the ritual description in the jealousy offering
  chosen_reading: Render the verse descriptively without importing an interpretation of guilt or innocence beyond the text itself.
  alternative_readings:
  - Treat the offering as presuming the woman's guilt
  - Treat the offering as merely symbolic without judicial force
  rationale: The verse describes the offering's composition and function as bringing iniquity to remembrance, but does not itself resolve the woman's status. The translation preserves that tension rather than reading in a verdict.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
