translation:
  language: es
  text: Cuando Saúl vio el campamento de los filisteos, tuvo temor, y su corazón tembló[a] mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su corazón se estremeció mucho». El hebreo conserva la imagen del corazón como sede del temor interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - divisó
  lexicon: HALOT
  rationale: רא expresa percepción visual directa; «vio» es la forma más natural y fiel en español narrativo, sin añadir matiz interpretativo.
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - ejército
  lexicon: HALOT
  rationale: En español, «campamento» comunica mejor la idea concreta de un asentamiento militar que «ejército», que sería más interpretativo. «Campamento de los filisteos» conserva la imagen del texto hebreo.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Se conserva el nombre étnico estándar en español bíblico; no hay necesidad de transliteración especializada.
- source_word: וַיִּרָא
  english_pob_choice: he was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - estaba asustado
  - temió
  lexicon: HALOT
  rationale: El hebreo expresa miedo de manera directa; «tuvo miedo» es una equivalencia natural y clara en español contemporáneo, manteniendo el sentido narrativo.
- source_word: וַיֶּחֱרַד
  english_pob_choice: trembled
  chosen_spanish: tembló
  alternatives_spanish:
  - se estremeció
  - se conmovió
  lexicon: HALOT
  rationale: חרד puede expresar temblor físico y agitación interior. «Tembló» preserva la fuerza corporal de la imagen; el contexto ya muestra la intensidad del miedo.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - su ser
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea del corazón como sede de la reacción interior, sin sustituirla por una paráfrasis abstracta.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: El intensificador final se vierte de forma natural con «mucho», unido al verbo «tembló»; así se conserva la intensidad sin volver la frase arcaica.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el audit trail inglés: percepción visual, temor directo, temblor corporal del corazón, y el intensificador final. No hubo revisiones aplicadas en el pasaje base.'
  spanish_consistency_notes:
  - Se mantuvo «los filisteos» como nombre de pueblo estándar en español bíblico.
  - Se preservó la imagen del «corazón» como centro de la emoción, acorde con la nota del texto fuente.
  - El verbo final «tembló» conserva el paralelismo entre miedo interno y reacción física sin sobreexplicar el hebreo.
