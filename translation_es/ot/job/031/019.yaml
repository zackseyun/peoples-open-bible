review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura condicional y el sentido general del hebreo: «si he visto… o al necesitado…». También preserva la distinción entre la primera carencia (לְבוּשׁ) y la segunda (כְּסוּת). Sin embargo, «a alguien que perece» suena menos natural y menos claramente participial en español que «a alguien perecer» o «a alguien que está pereciendo», y «cobertura» no representa bien כְּסוּת en español bíblico natural, donde «abrigo» o «prenda para cubrirse» comunica mejor el sentido de vestidura/cobertura.'
  spanish_quality_summary: El texto es mayormente claro, pero «cobertura» resulta poco idiomático y técnico en español general, especialmente aplicado a ropa. Además, las notas están ancladas a «ropa», aunque la nota b corresponde a «necesitado», por lo que la ubicación de marcadores no es ideal. Una leve revisión mejora naturalidad, precisión y anclaje de notas.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Necesitado» para אֶבְיוֹן es aceptable, con «pobre» como alternativa en nota. La distinción léxica entre לְבוּשׁ y כְּסוּת debe mantenerse; por eso conviene evitar repetir «ropa» en ambos miembros y usar «abrigo» en el segundo.
  issues:
  - severity: medium
    issue: «cobertura» para כְּסוּת es poco natural en español
    rationale: Aunque intenta conservar la distinción con לְבוּשׁ, «cobertura» suena técnica o abstracta, no como prenda o abrigo para un necesitado. «Abrigo» comunica mejor una cubierta o prenda exterior y mantiene la distinción poética.
  - severity: low
    issue: «a alguien que perece» suena algo rígido
    rationale: El participio אֹבֵד describe a una persona en proceso de perecer/arruinarse. En español, «a alguien perecer por falta de ropa» suena más natural y mantiene el valor durativo suficiente en este contexto poético.
  - severity: low
    issue: El marcador de nota b está mal ubicado
    rationale: La nota b trata de «el necesitado/el pobre», pero en el borrador ambas notas aparecen tras «ropa». El anclaje debe aparecer junto al término correspondiente para evitar ambigüedad.
  revised_spanish_text: si he visto a alguien perecer por falta de ropa[a], o al necesitado[b] sin abrigo—
