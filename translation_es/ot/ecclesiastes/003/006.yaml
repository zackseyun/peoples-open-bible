  glossary_alignment: No hay términos teológicos de glosario mayor en juego. Las decisiones «buscar», «perder» y «guardar» están bien alineadas con la evidencia y con la racionalidad léxica del POB. Se ajusta לְהַשְׁלִיךְ a «tirar» para reflejar mejor el matiz de deshacerse de algo que motivó «throw away».
