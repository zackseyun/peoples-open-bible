translation:
  language: es
  text: Entonces murió Hazael, rey de Aram[a], y Ben-hadad, su hijo, llegó a ser rey en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rey de Siria». El hebreo dice «Aram», nombre del reino que las versiones antiguas a menudo vertían «Siria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - entonces murió
  - falleció
  lexicon: HALOT
  rationale: El verbo hebreo מות en wayyiqtol narra una muerte simple y secuencial; «murió» conserva la fuerza narrativa sin sobrecargar el texto. Se evita un giro más formal como «falleció» porque no añade precisión semántica.
- source_word: חֲזָאֵל
  english_pob_choice: Hazael
  chosen_spanish: Hazael
  alternatives_spanish:
  - Jazael
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar. «Hazael» es reconocible en español bíblico y mantiene continuidad con el nombre hebreo.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se conserva «Aram» en vez de «Siria» para reflejar con mayor transparencia el nombre histórico del reino en el hebreo. La frase se ajusta naturalmente al español con «rey de Aram».
- source_word: וַיִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: reinó
  alternatives_spanish:
  - se hizo rey
  - llegó a reinar
  - comenzó a reinar
  lexicon: HALOT
  rationale: En una fórmula de sucesión, מלך puede expresar acceso al trono. En español, «reinó» funciona de manera natural y transmite la entronización sin introducir una perífrasis más interpretativa.
- source_word: בֶּן־הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: convención onomástica
  rationale: Se conserva el nombre dinástico, pero en español es preferible «Ben-adad» por fluidez tipográfica y porque el hebreo muestra una secuencia nominal que no exige una transliteración inglesa con h intermedia. No se altera la identificación del personaje.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de Hazael
  lexicon: HALOT
  rationale: El sufijo posesivo remite a Hazael; «su hijo» mantiene la relación filial de forma natural y compacta en español.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de él
  - en vez de él
  lexicon: HALOT
  rationale: La expresión de sucesión תחת con sufijo indica reemplazo en el trono. «En su lugar» es idiomática en español y preserva el valor de sustitución política.
translation_notes:
  revision_awareness: 'La versión inglesa auditada no requirió revisiones: mantiene el sentido narrativo, la relación filial y la fórmula de sucesión. El español sigue esa misma línea, preservando «Aram» como opción transparente frente a la tradición «Siria».'
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo.
  - «Reinó en su lugar» conserva la función de sucesión sin añadir matices temporales no presentes en el hebreo.
  - La nota explica la alternativa tradicional «Siria» sin reemplazar el término base del texto.
