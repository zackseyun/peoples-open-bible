id: 2KI.23.26
reference: 2 Kings 23:26
source:
  edition: WLC
  text: אַ֣ךְ לֹֽא שָׁ֣ב יְהוָ֗ה מֵ/חֲר֤וֹן אַפּ/וֹ֙ הַ/גָּד֔וֹל אֲשֶׁר חָרָ֥ה אַפּ֖/וֹ בִּֽ/יהוּדָ֑ה עַ֚ל כָּל הַ/כְּעָסִ֔ים אֲשֶׁ֥ר הִכְעִיס֖/וֹ מְנַשֶּֽׁה׀־־־׃
translation:
  text: Yet Yahweh did not turn from the fierceness of his great anger[a], with which his anger burned against Judah[b], because of all the provocations with which Manasseh had provoked him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his great burning anger'; the Hebrew literally speaks of the 'burning of his nose/anger,' an idiom for intense anger.
    reason: lexical_alternative
  - marker: b
    text: Or 'in Judah'; English commonly says anger burned 'against' someone, though the Hebrew preposition is literally 'in.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - Nevertheless
  - Surely
  - Only
  lexicon: HALOT
  rationale: Introduces a strong adversative in context after Josiah's reforms; 'Yet' captures the concessive contrast naturally in English.
- source_word: שָׁב
  chosen: did not turn
  alternatives:
  - did not turn back
  - did not relent
  - did not return
  lexicon: HALOT
  rationale: The verb literally means 'turn/return.' Here it governs מֵחֲרוֹן אַפּוֹ ('from the burning of his anger'), so 'did not turn' preserves the metaphor without over-interpreting it as 'relent,' though that is a contextual implication.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH.
- source_word: מֵחֲרוֹן אַפּוֹ
  chosen: from the greatness of his burning anger
  alternatives:
  - from his great burning anger
  - from the fierceness of his great anger
  - from the heat of his great anger
  lexicon: HALOT
  rationale: חֲרוֹן אַף is an idiom for burning anger/wrath, literally 'burning of nose/anger.' Rendering 'burning anger' preserves the Hebrew imagery in readable English. The preposition מִן is carried by 'from.'
- source_word: הַגָּדוֹל
  chosen: the greatness of
  alternatives:
  - great
  - greatness
  lexicon: HALOT
  rationale: Rather than simply attributive 'great,' the English phrase 'the greatness of his burning anger' reflects the marked adjective while reading smoothly with the preceding idiom.
- source_word: אֲשֶׁר חָרָה אַפּוֹ
  chosen: with which his anger burned
  alternatives:
  - which had burned
  - that was kindled
  - which flared up
  lexicon: HALOT
  rationale: Keeps the Hebrew repetition of anger/burning (חָרָה ... אַפּוֹ) rather than collapsing it. 'With which' best connects the relative clause to the antecedent anger.
- source_word: בִּיהוּדָה
  chosen: against Judah
  alternatives:
  - in Judah
  - toward Judah
  lexicon: HALOT
  rationale: Though the preposition is literally 'in,' with verbs of anger English idiom normally uses 'against'; this conveys the target of divine anger clearly.
- source_word: עַל כָּל הַכְּעָסִים
  chosen: because of all the provocations
  alternatives:
  - for all the provocations
  - because of all the offenses
  - because of all the angerings
  lexicon: HALOT
  rationale: The noun כַּעַס/כְּעָסִים in this context denotes acts that provoke anger. 'Provocations' captures the causative sense better than a wooden 'vexations' or 'angerings.'
- source_word: הִכְעִיסוֹ
  chosen: had provoked him
  alternatives:
  - angered him
  - made him angry
  - incensed him
  lexicon: HALOT
  rationale: The Hiphil of כעס is causative, 'to provoke to anger.' 'Had provoked him' matches the causative force and the prior noun 'provocations,' preserving the wordplay.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
