translation:
  language: es
  text: El mensajero[a] malvado cae en desgracia[b], pero el enviado fiel[c] trae sanidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mensajero» traduce מַלְאָךְ; aquí no se refiere a un ángel, sino a un mensajero humano.
    reason: lexical_alternative
  - marker: b
    text: O «cae en el mal / en daño». El hebreo בְּרָע puede expresarse más literalmente, pero aquí probablemente se refiere a la desgracia o al daño que le sobreviene.
    reason: lexical_alternative
  - marker: c
    text: «Enviado» traduce צִיר para distinguirlo de מַלְאָךְ; el proverbio usa dos términos hebreos distintos para mensajero.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָךְ
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - enviado
  - mensajero
  - ángel
  lexicon: HALOT
  rationale: En este proverbio el término designa con naturalidad a un mensajero humano. ‘Mensajero’ preserva el campo semántico general sin introducir la especificidad de ‘ángel’, que no está exigida por el contexto.
- source_word: רָשָׁע
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - impío
  - maligno
  - malvado
  lexicon: HALOT
  rationale: Como adjetivo que califica al mensajero, expresa carácter moral. ‘Malvado’ comunica bien esa carga ética en español actual y conserva el tono proverbial.
- source_word: יִפֹּל
  english_pob_choice: falls
  chosen_spanish: cae
  alternatives_spanish:
  - caerá
  - cae
  - se derrumba
  lexicon: HALOT
  rationale: El imperfecto hebreo en proverbio suele expresar una verdad general. ‘Cae’ mantiene el valor proverbial y la imagen de caída sin forzar un futuro.
- source_word: בְּרָע
  english_pob_choice: into trouble
  chosen_spanish: en el mal
  alternatives_spanish:
  - en el mal
  - en desgracia
  - en calamidad
  - en trouble
  lexicon: HALOT
  rationale: El hebreo puede entenderse de manera idiomática como daño, calamidad o desgracia, y el POB inglés opta por ‘trouble’ para captar el efecto sufrido. En español, ‘en el mal’ conserva la literalidad del giro y deja visible la tensión semántica, que puede implicar mal, daño o desgracia.
- source_word: צִיר
  english_pob_choice: envoy
  chosen_spanish: enviado
  alternatives_spanish:
  - mensajero
  - enviado
  - embajador
  lexicon: HALOT
  rationale: Este término apunta a un mensajero comisionado o representante. ‘Enviado’ diferencia este segundo vocablo del primero y preserva el paralelismo del proverbio.
- source_word: אֱמוּנִים
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fiel
  - confiable
  - leal
  lexicon: HALOT
  rationale: La forma plural intensiva comunica fidelidad o confiabilidad. ‘Fiel’ es la equivalencia más natural y concisa en español bíblico contemporáneo.
- source_word: מַרְפֵּא
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - sanidad
  - curación
  - remedio
  lexicon: HALOT
  rationale: El sustantivo puede abarcar curación o restauración. ‘Sanidad’ funciona bien en español bíblico para la idea de beneficio restaurador producido por el mensajero confiable.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; se conservó su decisión de distinguir dos vocablos hebreos distintos para ‘messenger/envoy’ y su lectura idiomática de בְּרָע como daño o problema, aunque en español se deja visible la literalidad.
  spanish_consistency_notes:
  - Se mantuvo la diferencia entre מַלְאָךְ y צִיר mediante ‘mensajero’ y ‘enviado’.
  - Se evitó ‘SEÑOR’ u otra terminología no pertinente porque no aparece el nombre divino en este versículo.
  - ‘Sanidad’ conserva el valor restaurador de מַרְפֵּא sin sobrerreducirlo a curación física.
