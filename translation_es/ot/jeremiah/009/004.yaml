translation:
  language: es
  text: Y cada hombre engaña a su prójimo[a], y no hablan verdad; han enseñado a su lengua a hablar falsedad; se fatigan cometiendo iniquidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se burla de su prójimo' o 'trata engañosamente a su prójimo' para 'engaña a su prójimo'.
    reason: lexical_alternative
  - marker: b
    text: O 'se fatigan haciendo el mal'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada persona
  - todos
  lexicon: HALOT
  rationale: El singular distributivo hebreo se conserva mejor en español con 'cada hombre', que refleja la forma singular y el alcance general sin convertirlo en plural.
- source_word: בְּרֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su amigo
  - su compañero
  lexicon: HALOT
  rationale: '''Prójimo'' comunica bien la relación interpersonal ético-social del contexto profético y mantiene la idea de alguien cercano frente al cual se actúa con engaño. Aunque ''vecino'' es posible, ''prójimo'' es más natural en español bíblico sin perder precisión.'
- source_word: יְהָתֵלּוּ
  english_pob_choice: deceives
  chosen_spanish: engaña
  alternatives_spanish:
  - se burlan de
  - tratan engañosamente a
  - decepcionan
  lexicon: HALOT
  rationale: '''Engaña'' expresa el sentido de fraude o manipulación que el inglés POB fijó como principal. En español evita una lectura demasiado limitada a ''burlarse'', pero sigue siendo compatible con la nota alternativa documentada.'
- source_word: וֶאֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - lo verdadero
  lexicon: HALOT
  rationale: En paralelo con el habla falsa, 'verdad' es la equivalencia más directa y natural para el contenido veraz del habla.
- source_word: לִמְּדוּ לְשׁוֹנָם
  english_pob_choice: they have taught their tongue
  chosen_spanish: han enseñado a su lengua
  alternatives_spanish:
  - han entrenado su lengua
  - han acostumbrado su lengua
  lexicon: HALOT
  rationale: Se conserva la personificación de la lengua como algo 'enseñado', que el hebreo presenta de forma vívida. La construcción es natural en español y mantiene el matiz de hábito adquirido.
- source_word: דַּבֶּר שֶׁקֶר
  english_pob_choice: to speak falsehood
  chosen_spanish: a hablar mentira
  alternatives_spanish:
  - a hablar falsedad
  - a decir mentiras
  lexicon: HALOT
  rationale: El infinitivo con objeto se vierte de modo directo y fluido. 'Mentira' mantiene el tono concreto de la acusación; 'falsedad' sería más formal, pero menos natural en esta secuencia.
- source_word: הַעֲוֵה
  english_pob_choice: committing iniquity
  chosen_spanish: cometiendo iniquidad
  alternatives_spanish:
  - haciendo el mal
  - obrando perversamente
  lexicon: HALOT
  rationale: '''Iniquidad'' preserva la gravedad moral y el registro profético del hebreo. Se evita suavizarlo con una expresión más genérica como ''haciendo el mal''.'
- source_word: נִלְאוּ
  english_pob_choice: they weary themselves
  chosen_spanish: se fatigan
  alternatives_spanish:
  - se cansan
  - se agotan
  lexicon: HALOT
  rationale: 'El hebreo puede leerse con sentido reflexivo/resultativo: se desgastan con su práctica del mal. ''Se fatigan'' conserva esa idea de esfuerzo penoso y continuo; la nota alternativa deja abierta la posibilidad de ''se agotan haciendo lo malo''.'
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo WLC y el audit trail inglés POB. No hubo revisiones aplicadas en el último pase; la redacción española mantiene la misma lectura léxica y la misma nota de ambigüedad principal que el POB en inglés, adaptándola a un español natural.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de tres miembros: engaño al prójimo, ausencia de verdad, y aprendizaje de la mentira seguido del desgaste en la iniquidad.'
  - '''Prójimo'' se usa aquí como equivalente funcional de ''neighbor'' por su naturalidad en español bíblico y su amplitud semántica.'
  - La puntuación conserva el encadenamiento profético del hebreo sin añadir explicaciones interpretativas.
  - La nota [a] recoge la misma gama de alternativas que el audit trail inglés, ajustada al español.
  - La nota [b] preserva la alternativa sobre el cansancio resultante del mal, en vez de reemplazarla por una paráfrasis doctrinal.
