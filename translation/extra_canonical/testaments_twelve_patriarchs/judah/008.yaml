id: T12P.JUD.08
reference: Testament of Judah 8
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: VIII. *Ἦσαν δέ μοι¹ κτήνη πολλά, καὶ *εἶχον ἀρχιποίμενα² Ἱρὰμ³ τὸν Ὀδολομίτην⁴. 2. Πρὸς ὃν ἐλθὼν⁵ ἤμην, καὶ ἦλθεν Βαρσαβὰ⁶ τὸν⁷ βασιλεὺς⁸ Ὀδολλὰμ⁹, καὶ¹⁰ ἐποίησεν ἡμῖν πότον¹², καὶ †παρακαλέσας¹³ δέδωκέ¹⁴ μοι τὴν θυγατέρα αὐτοῦ¹⁵ *ὀνόματι Σαβά¹⁶ εἰς γυναῖκα. 3. Αὕτη¹⁷ ἔτεκέν μοι τὸν Ἦρ¹⁸ καὶ τὸν¹⁹ Αὐνὰν καὶ τὸν²⁰ Σηλώμ²¹. *Καὶ τοὺς μὲν δύο²² ἀνεῖλεν²³ Κύριος· ὁ γὰρ Σηλὼμ ἔζησεν²⁴.
  language: Greek
