theological_decisions:
- issue: Moral characterization of Antiochus through pride language
  chosen_reading: Retain both 'arrogance' and 'pride' as distinct but related terms
  alternative_readings:
  - Collapse both into a single English term such as 'arrogance' or 'pride'
  rationale: The Greek uses two related but distinct nouns, ἀγερωχία and ὑπερηφανία, to intensify Antiochus's hubris. Preserving both avoids flattening the rhetoric and keeps the narrative's moral escalation visible.
