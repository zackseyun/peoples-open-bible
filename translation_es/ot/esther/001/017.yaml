  yaml_path: translation/ot/esther/001/017.yaml
  text: For the queen’s conduct will go out to all women[a], causing them to despise their husbands in their eyes, when they say, ‘King Ahasuerus commanded that Queen Vashti be brought before him[b], but she did not come.’
  footnotes:
