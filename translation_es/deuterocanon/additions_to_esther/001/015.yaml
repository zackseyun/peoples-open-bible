translation:
  language: es
  text: Y el rey escribió estas palabras como memorial[a], y Mardoqueo escribió acerca de estas palabras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para memorial» o «para recuerdo». El griego εἰς μνημόσυνον puede destacar tanto un memorial conmemorativo como un registro escrito conservado para recordar.
    reason: lexical_alternative
  - marker: b
    text: O «acerca de estos asuntos». El griego λόγοι puede significar «palabras» o, más ampliamente, «asuntos» o «cosas», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - anotó
  - registró
  - inscribió
  lexicon: γράφη / γράφω
  rationale: El aoristo de γράφω pide un verbo directo de escritura. «Escribió» es natural en español y conserva el paralelismo de ambas cláusulas sin añadir matices ajenos.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos asuntos
  - estas cosas
  - este relato
  lexicon: λόγοι
  rationale: λόγοι puede significar «palabras», «asuntos» o «hechos». Aquí, como en el audit trail inglés, conviene mantener la forma léxica visible con «estas palabras», sin diluirla en una paráfrasis más amplia.
- source_word: εἰς μνημόσυνον
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - para memorial
  - para recuerdo
  - como recordatorio
  lexicon: μνημόσυνον
  rationale: μνημόσυνον apunta a algo hecho para recordar o con función conmemorativa. «Como memorial» reproduce bien la función de conmemoración/registro y suena natural en español bíblico moderno.
- source_word: Μαρδοχαῖος
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mardoqeo
  lexicon: nombre propio
  rationale: Se usa la forma española estándar del nombre propio, coherente con la tradición bíblica en español y con la transliteración estable del griego.
- source_word: περὶ τῶν λόγων τούτων
  english_pob_choice: concerning these words
  chosen_spanish: acerca de estas palabras
  alternatives_spanish:
  - sobre estos asuntos
  - respecto de estas palabras
  lexicon: περί + genitivo
  rationale: περί con genitivo significa «acerca de / sobre». Mantener «estas palabras» conserva la repetición de λόγοι y evita convertirlo en una paráfrasis demasiado vaga.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el audit trail inglés, sin cambios de revisión aplicados; se preserva la repetición de λόγοι en ambas cláusulas y la ambigüedad léxica documentada en notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «Mardoqueo» por consistencia con el nombre propio español tradicional en contextos bíblicos.
  - La construcción «como memorial» evita calcar de modo rígido el inglés y sigue siendo fiel a μνημόσυνον.
