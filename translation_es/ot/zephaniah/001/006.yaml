translation:
  language: es
  text: y a los que se vuelven atrás de seguir a Yahvé[a][b], y que no buscan a Yahvé ni lo consultan[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: el nombre divino YHWH se representa aquí como Yahvé.'
    reason: alternative_reading
  - marker: b
    text: 'O: «a los que retroceden de seguir a Yahvé».'
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse: «ni le buscan»; el segundo verbo hebreo puede abarcar buscar o consultar, con un matiz más amplio de acudir a él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּסוֹגִים
  english_pob_choice: those who turn back
  chosen_spanish: los que se apartan
  alternatives_spanish:
  - los que vuelven atrás
  - los retrocedidos
  - los que se desvían
  lexicon: HALOT
  rationale: נסוג/סוג expresa la idea de retroceder, apartarse o volver atrás. En español, 'se apartan' comunica bien la ruptura de lealtad y evita un calco rígido, manteniendo la fuerza de apostasía implícita sin introducir un término eclesiástico no presente en el hebreo.
- source_word: מֵאַחֲרֵי יְהוָה
  english_pob_choice: from following Yahweh
  chosen_spanish: de seguir a Yahvé
  alternatives_spanish:
  - de ir detrás de Yahvé
  - de detrás de Yahvé
  - de seguir al Señor
  lexicon: HALOT
  rationale: La locución hebrea 'de detrás de' funciona idiomáticamente como 'de seguir'. 'De seguir a Yahvé' conserva la imagen de discipulado y el movimiento relacional, con un español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — YHWH'
  rationale: Se usa 'Yahvé' para el tetragrámaton, conforme a la guía doctrinal del proyecto. Se evita 'SEÑOR' porque ocultaría el nombre propio divino que el hebreo presenta aquí.
- source_word: בִקְשׁוּ
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscan
  - buscan a
  - buscan por
  lexicon: HALOT
  rationale: בקש suele significar 'buscar/seek'. En español, 'buscar' es la forma más directa y clara para esta búsqueda covenantal de Dios; 'buscar a Yahvé' conserva el objeto personal sin sonar artificial.
- source_word: דְרָשֻׁהוּ
  english_pob_choice: inquire of him
  chosen_spanish: lo consultan
  alternatives_spanish:
  - lo inquieren
  - consultan de él
  - acuden a él
  lexicon: HALOT
  rationale: דרש abarca consultar, requerir o inquirir. Tras 'buscar', 'consultar' evita la redundancia y refleja bien el matiz de acudir a Dios para orientación. Se mantiene el sufijo pronominal con 'lo', que en español retoma a Yahvé de forma natural.
- source_word: וַאֲשֶׁר לֹא ... וְלֹא
  english_pob_choice: and who do not... or
  chosen_spanish: y que no... ni
  alternatives_spanish:
  - y que no... o
  - y no... ni
  - y quienes no... ni
  lexicon: HALOT
  rationale: 'La coordinación hebrea presenta dos negaciones paralelas. En español, ''ni'' expresa mejor la suma negativa que ''o'' y conserva el paralelismo: ''no buscan ... ni lo consultan''.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: La traducción del nombre propio divino no se masca con un título. 'Yahvé' preserva el carácter personal y pactal del tetragrámaton en una forma ya asentada en español bíblico y coherente con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre 'buscar' y 'consultar'
  english_pob_reading: Render בקש and דרש with distinct but related verbs
  chosen_spanish_reading: Renderizar בקש como 'buscar' y דרש como 'consultar'
  alternative_spanish_readings:
  - Renderizar ambos como 'buscar'
  - Renderizar como 'buscar' y 'acudir a'
  - Renderizar como 'buscar' y 'preguntar a'
  rationale: El hebreo usa dos verbos relacionados para intensificar la omisión del deber de lealtad a Yahvé. Diferenciarlos como 'buscar' y 'consultar' conserva la fuerza retórica y evita perder la segunda idea en una repetición plana.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: La revisión inglesa añadió la segunda conjunción 'and' antes de la cláusula relativa final para reflejar con mayor claridad la coordinación hebrea. En español se refleja esa coordinación con 'y que no... ni...' manteniendo la completitud y el paralelismo del original.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se distingue 'buscar' de 'consultar' para reflejar la diferencia verbal hebrea sin sobreinterpretarla.
  - Se evita 'SEÑOR' en el texto principal por coherencia con la política del proyecto.
  - El ritmo de la frase conserva la enumeración de sujetos bajo juicio con una sintaxis clara y publicable.
