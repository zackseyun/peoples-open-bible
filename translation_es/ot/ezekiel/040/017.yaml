  text: וַ/יְבִיאֵ֗/נִי אֶל הֶֽ/חָצֵר֙ הַ/חִ֣יצוֹנָ֔ה וְ/הִנֵּ֤ה לְשָׁכוֹת֙ וְ/רִֽצְפָ֔ה עָשׂ֥וּי לֶ/חָצֵ֖ר סָבִ֣יב סָבִ֑יב שְׁלֹשִׁ֥ים לְשָׁכ֖וֹת אֶל הָ/רִֽצְפָֽה־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/040/017.yaml
  text: Then he brought me into the outer court[a], and behold, there were chambers and a pavement made for the court all around, all around; thirty chambers were on the pavement.
  footnotes:
