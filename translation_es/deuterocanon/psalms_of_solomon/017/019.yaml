review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido global del griego: vagar por lugares desolados para que sus vidas fueran salvadas del mal, y la valoración de una vida rescatada dentro de la comunidad desplazada. También mantiene correctamente ψυχή como ''vida'' y conserva la fuerza pasiva de σωθῆναι. Sin embargo, hay dos problemas de fidelidad/precisión menores: ''anduvieron'' es menos natural que ''vagaban'' o ''andaban errantes'' para ἐπλανῶντο en este contexto, y ''la comunidad de los forasteros'' suena algo impropio frente al sentido más idiomático de παροικία como comunidad en exilio/diáspora o comunidad forastera.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita pulido para sonar más natural en español bíblico moderno. 'Ante los ojos de' es menos idiomático aquí que 'a los ojos de'. 'Fue preciosa' aplicado a 'vida' suena aceptable, aunque 'era preciosa' encaja mejor con el valor descriptivo del griego. La nota [a] es defectuosa porque ofrece la misma palabra como alternativa ('desiertos' / 'desiertos').
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. Se respetan bien ''vidas/vida'' para ψυχή y ''mal'' para κακοῦ. El punto léxico a mejorar es παροικία: ''comunidad de los forasteros'' no es incorrecto, pero ''comunidad forastera'' refleja mejor el valor comunitario y evita una construcción torpe. También conviene ajustar la nota sobre ἐν ἐρήμοις para ofrecer una alternativa real (''lugares desolados'' o ''soledades'').'
  issues:
  - severity: medium
    issue: Nota al pie [a] inválida
    rationale: Dice 'O desiertos en vez de desiertos', lo cual no aporta alternativa real y contradice el rastro inglés, donde la alternativa es 'deserts' frente a 'wildernesses'.
  - severity: medium
    issue: '''Anduvieron'' debilita el matiz de ἐπλανῶντο'
    rationale: Aunque posible, suena demasiado neutro. El contexto de errancia por parajes desolados pide 'vagaban' o similar para reflejar mejor el verbo.
  - severity: low
    issue: '''Ante los ojos de'' y ''fue preciosa'' son menos idiomáticos aquí'
    rationale: '''A los ojos de'' es la expresión española más natural para ἐν ὀφθαλμοῖς, y ''era preciosa'' fluye mejor como descripción general del valor que tenía esa vida rescatada.'
  - severity: low
    issue: '''Comunidad de los forasteros'' es algo pesada'
    rationale: '''Comunidad forastera'' o ''comunidad del destierro'' expresa mejor en español el sentido colectivo de παροικία sin sonar forzado.'
  revised_spanish_text: Vagaban en lugares desolados[a], para que sus vidas fueran salvadas[b] del mal, y a los ojos de la comunidad forastera[c], una vida salvada de entre ellos era preciosa.
