  text: וְ/אַתֶּ֗ם כֹּהֲנֵ֤י יְהוָה֙ תִּקָּרֵ֔אוּ מְשָׁרְתֵ֣י אֱלֹהֵ֔י/נוּ יֵאָמֵ֖ר לָ/כֶ֑ם חֵ֤יל גּוֹיִם֙ תֹּאכֵ֔לוּ וּ/בִ/כְבוֹדָ֖/ם תִּתְיַמָּֽרוּ׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/061/006.yaml
  text: But you will be called the priests of Yahweh; they will call you the ministers of our God. You will eat the wealth of nations[a], and in their glory you will boast.
  footnotes:
