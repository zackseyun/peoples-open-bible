translation:
  language: es
  text: Sin embargo, yo los nombraré para que estén a cargo de la custodia de la casa[a], para todo su servicio y para todo lo que se haga en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el templo’. El hebreo dice ‘la casa’, expresión común para el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: Yet I will appoint
  chosen_spanish: Sin embargo, yo los nombraré
  alternatives_spanish:
  - Y les daré
  - Y los estableceré
  lexicon: HALOT
  rationale: נתן puede significar ‘dar’, ‘poner’ o ‘asignar’. En este contexto administrativo de designación para una función, ‘nombraré’ comunica mejor la idea de asignación a un cargo. ‘Sin embargo’ conserva el matiz adversativo del contexto, en línea con el ‘Yet’ del POB.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre retoma a los levitas del contexto inmediato. En español, el objeto directo plural ‘los’ es natural y claro.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת
  english_pob_choice: to keep charge
  chosen_spanish: para que guarden la custodia
  alternatives_spanish:
  - para guardar la custodia
  - como guardianes de la custodia
  lexicon: HALOT
  rationale: La construcción participial más sustantivo cognado expresa responsabilidad custodial asignada. ‘Custodia’ permite conservar el valor de deber encargado sin forzar una traducción demasiado técnica o eclesiástica. ‘Guarden’ mantiene el verbo de vigilancia/observancia.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: בית significa literalmente ‘casa’. Aunque el referente es el templo en la visión de Ezequiel, se conserva la forma literal ‘casa’ porque el POB inglés también preserva ese término y porque mantiene la resonancia cultual del hebreo.
- source_word: לְכֹל עֲבֹדָתוֹ
  english_pob_choice: for all its service
  chosen_spanish: para todo su servicio
  alternatives_spanish:
  - para toda su obra
  - para todo su ministerio
  lexicon: HALOT
  rationale: עֲבֹדָה puede referirse a trabajo o servicio cultual. ‘Servicio’ es suficientemente amplio y evita restringir indebidamente el sentido. El posesivo ‘su’ retoma ‘la casa’.
- source_word: וּלְכֹל אֲשֶׁר יֵעָשֶׂה בּוֹ
  english_pob_choice: and for all that is done in it
  chosen_spanish: y para todo lo que se haga en ella
  alternatives_spanish:
  - y para todo cuanto se haga en ella
  - y para todo lo que se haga dentro de ella
  lexicon: HALOT
  rationale: La pasiva/imperfecta hebrea expresa cualquier cosa que se realice allí. ‘Se haga’ conserva esa amplitud sin especificar de más. ‘En ella’ concuerda con ‘la casa’.
theological_decisions:
- issue: Referente de 'la casa'
  english_pob_reading: the temple/house of God in Ezekiel's vision, rendered literally as 'the house'
  chosen_spanish_reading: la casa del templo en la visión de Ezequiel, expresada literalmente como ‘la casa’
  alternative_spanish_readings:
  - el templo
  rationale: No se resuelve un problema doctrinal; se conserva la designación hebrea literal para respetar el texto fuente, mientras el contexto hace claro que se trata del templo visionario.
  doctrine_reference: Ezekiel 40–48; cultic vision context
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: el sentido administrativo de נתן se tradujo como nombramiento, se preservó בית como ‘casa’ por fidelidad literal, y se mantuvo el alcance general de עֲבֹדָה y de la cláusula pasiva final. No se detectaron revisiones posteriores que alteren el criterio.'
  spanish_consistency_notes:
  - Se mantiene la terminología POB ‘casa’ para בית y no se sustituye automáticamente por ‘templo’.
  - ‘Custodia’ se usa aquí para conservar el matiz de deber encargado de שֹׁמְרֵי מִשְׁמֶרֶת sin volverlo una paráfrasis eclesiástica.
  - El referente femenino de ‘ella’ concuerda con ‘la casa’.
