revisions:
- from: Así también yo los he hecho despreciados y abyectos[a] ante todo el pueblo, porque ustedes no guardan mis caminos, sino que muestran parcialidad en la ley[b].
  to: Así también yo los he hecho despreciados y rebajados[a] ante todo el pueblo, porque ustedes no guardan mis caminos, sino que muestran parcialidad en la ley[b].
  rationale: Se reemplaza «abyectos» por «rebajados» porque esta opción conserva el sentido de abatimiento o abajamiento público de וּשְׁפָלִים sin introducir la idea española de vileza moral. Se ajusta la nota correspondiente para reflejar mejor el valor léxico del hebreo y mantener la legibilidad e integridad semántica del texto.
