revisions:
- from: Y algunos de los que tienen entendimiento tropezarán[a], para ser refinados, purificados y emblanquecidos[c], hasta el tiempo del fin; porque aún es para el tiempo señalado[d].
  to: Y algunos de los que tienen entendimiento tropezarán[a], para refinarlos, purificarlos y hacerlos blancos[c], hasta el tiempo del fin; porque aún es para el tiempo señalado[d].
  rationale: Se revisa la cadena verbal para reflejar mejor los infinitivos de finalidad del hebreo y la decisión auditada del POB inglés, evitando el giro pasivo 'para ser refinados'. También se sustituye 'emblanquecidos' por 'hacerlos blancos', que conserva con más claridad la imagen literal hebrea y suena más natural en español general.
