translation:
  language: es
  text: Amínadab engendró a Najsón, y Najsón engendró a Salmá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Salmá. Algunas traducciones usan «Salmón» para armonizar con genealogías paralelas.'
