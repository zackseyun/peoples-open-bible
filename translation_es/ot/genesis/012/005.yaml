  to: Abram tomó a Sarai, su esposa, y a Lot, hijo de su hermano, y todos sus bienes que habían adquirido, y las personas[a] que habían adquirido en Harán; y salieron para ir a la tierra de Canaán, y llegaron a la tierra de Canaán.
