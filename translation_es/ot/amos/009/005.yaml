translation:
  language: es
  text: Y el Señor Yahvé de los ejércitos[a] es el que toca la tierra, y se derrite; y hacen duelo todos los que habitan en ella; y toda ella sube como el Nilo, y se hunde como el Nilo de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Señor YHWH de los ejércitos». Se traduce «el Señor Yahvé» para conservar tanto el título אֲדֹנָי como el nombre divino YHWH, evitando a la vez la convención de enmascararlo como «SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Y Yahvé Dios
  alternatives_spanish:
  - Y el Señor Dios
  - Y el Señor Yahvé
  lexicon: HALOT
  rationale: En español, 'Yahvé' representa directamente el nombre divino YHWH según el criterio doctrinal del proyecto, mientras 'Dios' conserva אֲדֹנָי como título. Evito 'Señor Señor' y también el enmascaramiento convencional 'SEÑOR', porque el texto fuente usa el nombre divino de manera explícita.
- source_word: הַצְּבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los anfitriones
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' comunica bien la imagen de כוח/huestes celestiales y terrenales asociada al título sin sonar arcaico; ''huestes'' sería más tradicional, pero menos transparente para lector moderno.'
- source_word: הַנּוֹגֵעַ
  english_pob_choice: is the one who touches
  chosen_spanish: es el que toca
  alternatives_spanish:
  - es el que toca continuamente
  - es el que golpea
  lexicon: HALOT
  rationale: '''Toca'' mantiene el sentido básico de נגע sin introducir una intensificación que el verbo por sí solo no exige. La acción devastadora queda expresada por ''se derrite'' en la cláusula siguiente.'
- source_word: בָּאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra/la región
  lexicon: HALOT
  rationale: Aquí 'la tierra' es natural en español y preserva la amplitud cósmica o general del hebreo sin decidir innecesariamente entre 'tierra' y 'país'. En este contexto profético, el referente es más amplio que una región local.
- source_word: וַתָּמוֹג
  english_pob_choice: it melts
  chosen_spanish: se derrite
  alternatives_spanish:
  - se derrite
  - se deshace
  - se estremece
  lexicon: HALOT
  rationale: '''Se derrite'' reproduce la metáfora física de מוּג y sugiere desintegración o colapso por la presencia divina. ''Se deshace'' sería posible, pero menos vívido.'
- source_word: וְאָבְלוּ
  english_pob_choice: mourn
  chosen_spanish: hacen duelo
  alternatives_spanish:
  - mourn
  - lamentan
  - se lamentan
  lexicon: HALOT
  rationale: '''Hacen duelo'' refleja el matiz de אבל como luto visible y formal, sin perder naturalidad en español. ''Lamentan'' es más general y ''mourn'' en castellano bíblico sonaría menos idiomático.'
- source_word: יֹשְׁבֵי בָהּ
  english_pob_choice: all who dwell in it
  chosen_spanish: todos los que habitan en ella
  alternatives_spanish:
  - todos los que viven en ella
  - todos sus habitantes
  lexicon: HALOT
  rationale: La expresión conserva el participio verbal de 'los que habitan' y traduce el pronombre femenino como 'ella' concordando con 'la tierra'. 'Sus habitantes' pierde el matiz verbal del hebreo.
- source_word: וְעָלְתָה כַיְאֹר כֻּלָּהּ
  english_pob_choice: and all of it rises like the Nile
  chosen_spanish: y toda ella sube como el Nilo
  alternatives_spanish:
  - y toda ella asciende como el Nilo
  - y todo sube como el Nilo
  lexicon: HALOT
  rationale: '''Toda ella'' mantiene la referencia femenina al sustantivo implícito de ''la tierra''. ''Sube'' conserva la imagen de la crecida del Nilo; ''asciende'' suena más formal pero menos natural.'
- source_word: וְשָׁקְעָה
  english_pob_choice: sinks
  chosen_spanish: se hunde
  alternatives_spanish:
  - se hunde
  - se sumerge
  - desciende
  lexicon: HALOT
  rationale: '''Se hunde'' expresa con fuerza el movimiento descendente o de hundimiento y encaja bien con la imagen del Nilo. ''Desciende'' sería demasiado neutral.'
- source_word: כִּיאֹר מִצְרָיִם
  english_pob_choice: like the Nile of Egypt
  chosen_spanish: como el Nilo de Egipto
  alternatives_spanish:
  - como el río de Egipto
  - como el Nilo egipcio
  lexicon: HALOT
  rationale: '''El Nilo de Egipto'' mantiene explícita la identificación del referente geográfico e hidráulico. ''Río de Egipto'' es más genérico y puede ocultar la alusión concreta al Nilo.'
theological_decisions:
- issue: Rendering of the divine name YHWH and the compounded title with אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: El hebreo combina אֲדֹנָי con YHWH. En el español del proyecto, YHWH se translitera como 'Yahvé', preservando el nombre propio divino, y אֲדֹנָי se rinde como 'Dios' para evitar una repetición artificial ('Señor Señor') y mantener claridad reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo con alta correspondencia: mantiene la cadena de verbos (''toca... se derrite... hacen duelo... sube... se hunde''), conserva el paralelismo de la segunda mitad del versículo y refleja la revisión inglesa que añadió la conjunción antes de ''all of it rises'' con un ''y'' antes de ''toda ella sube''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para YHWH, conforme al estándar del proyecto.
  - '''Dios'' traduce aquí el elemento de título reverencial asociado a אֲדֹנָי, no el nombre propio.'
  - '''La tierra'' se mantiene como opción amplia y compatible con el contexto cósmico del juicio.'
  - '''El Nilo de Egipto'' conserva la referencia concreta del símil hidráulico sin suavizarla.'
