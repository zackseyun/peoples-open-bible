translation:
  language: es
  text: Y las cuatro ruedas estaban debajo de los paneles[a], y los ejes de las ruedas estaban en la base[b]; y la altura de cada rueda era de un codo y medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘marcos’ o ‘bordes’ para ‘paneles’ (heb. מִסְגְּרוֹת).
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente ‘manos de las ruedas’; en contexto, probablemente se refiere a los ejes, varas de sostén o soportes de las ruedas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹפַנִּים / הָאוֹפַן
  english_pob_choice: wheels / wheel
  chosen_spanish: ruedas / rueda
  alternatives_spanish:
  - ruedas
  - llantas
  lexicon: HALOT
  rationale: En esta descripción de un objeto de metal con partes móviles, el sentido literal y funcional de אוֹפַן es ‘rueda’. ‘Ruedas’ conserva la imagen mecánica del texto sin introducir una explicación innecesaria.
- source_word: לְמִתַּחַת
  english_pob_choice: underneath
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - debajo de
  - por debajo de
  lexicon: HALOT
  rationale: La preposición compuesta indica ubicación inferior. ‘Debajo de’ suena natural en español y mantiene la relación espacial precisa.
- source_word: הַמִּסְגְּרוֹת
  english_pob_choice: the panels
  chosen_spanish: los paneles
  alternatives_spanish:
  - los marcos
  - los bordes
  - los encuadres
  lexicon: HALOT
  rationale: POB inglés optó por ‘panels’ como equivalente contextual de מִסְגְּרוֹת en esta artesanía. ‘Paneles’ comunica bien la sección enmarcada o la cara lateral del soporte sin perder la referencia estructural; se conserva la alternativa implícita de ‘marcos’ en la nota.
- source_word: וִידוֹת
  english_pob_choice: the axles
  chosen_spanish: las varas
  alternatives_spanish:
  - los ejes
  - las manceras
  - los soportes
  - los ejes/axles
  lexicon: HALOT
  rationale: El hebreo es literalmente ‘manos’, pero el contexto mecánico pide una pieza proyectada o de sostén. En español, ‘varas’ puede funcionar como término más neutral para las prolongaciones del conjunto, aunque ‘ejes’ sería una posibilidad funcional más explícita; se deja la tensión en nota porque el texto hebreo no nombra directamente un eje técnico moderno.
- source_word: בַּמְּכוֹנָה
  english_pob_choice: on the stand
  chosen_spanish: en el soporte
  alternatives_spanish:
  - sobre el soporte
  - en la base
  - sobre la base
  lexicon: HALOT
  rationale: מְכוֹנָה designa aquí la base/estructura donde se fijan las piezas. ‘Soporte’ es una opción clara y sobria en español; ‘en’ reproduce la relación local del original y evita forzar ‘sobre’ donde el hebreo no lo exige.
- source_word: קוֹמַת
  english_pob_choice: the height of
  chosen_spanish: la altura de
  alternatives_spanish:
  - la elevación de
  - la estatura de
  lexicon: HALOT
  rationale: Se trata de una medida vertical. ‘Altura’ es el equivalente español directo y natural para una especificación arquitectónica.
- source_word: הָאֶחָד
  english_pob_choice: each
  chosen_spanish: cada
  alternatives_spanish:
  - uno
  - el uno
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘el uno’, el valor distributivo en una medida técnica se expresa mejor en español con ‘cada’, preservando el sentido de aplicación individual a cada rueda.
- source_word: אַמָּה וַחֲצִי הָאַמָּה
  english_pob_choice: a cubit and a half
  chosen_spanish: un codo y medio
  alternatives_spanish:
  - un codo y medio
  - codo y medio
  - uno y medio codos
  lexicon: HALOT
  rationale: Se mantiene la medida antigua ‘codo’ para ser fiel al texto y al uso bíblico. ‘Un codo y medio’ es la formulación más natural en español y conserva la concreción del original.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail inglés de POB, manteniendo la misma estructura sintáctica y las mismas dos tensiones léxicas principales: מִסְגְּרוֹת y וִידוֹת. No se aplicaron revisiones posteriores al testimonio base; se preserva la lectura técnica del pasaje sin suavizarla.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se mantiene un registro técnico y descriptivo, apropiado para una lista de componentes de artesanía del templo.
  - ‘Codo’ se conserva como unidad bíblica tradicional sin conversión a medidas modernas.
  - Las dos notas al pie reflejan ambigüedades reales del hebreo y no meras preferencias estilísticas.
