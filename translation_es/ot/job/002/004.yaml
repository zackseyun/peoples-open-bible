translation:
  language: es
  text: 'Entonces el Adversario respondió a Yahvé y dijo[a]: «Piel por piel[b]; todo lo que el hombre tiene lo dará por su vida[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Satanás»; el hebreo tiene la forma con artículo, «el satanás/adversario», de valor titular.
    reason: alternative_reading
  - marker: b
    text: «Piel por piel» es un proverbio, probablemente con el sentido de que una persona entregará una cosa para proteger su propia vida.
    reason: cultural_note
  - marker: c
    text: O «por su alma/ser». Aquí «vida» es la opción que mejor se ajusta al contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂטָן
  english_pob_choice: the Adversary
  chosen_spanish: el Adversario
  alternatives_spanish:
  - Satanás
  - el acusador
  lexicon: HALOT
  rationale: El hebreo lleva artículo y funciona como designación/título, no como nombre propio. «El Adversario» conserva esa función de rol y evita introducir sin justificación el nombre tradicional «Satanás».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término de referencia del proyecto para el nombre divino, preservando la forma del nombre en vez de ocultarlo con una convención tipográfica.
- source_word: עוֹר בְּעַד עוֹר
  english_pob_choice: Skin for skin
  chosen_spanish: Piel por piel
  alternatives_spanish:
  - Piel a cambio de piel
  - Piel en lugar de piel
  lexicon: HALOT
  rationale: La expresión hebrea es proverbial y concisa. «Piel por piel» mantiene la forma sentenciosa y la tensión idiomática sin explicarla de más en el cuerpo del texto.
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a cambio de
  - en lugar de
  lexicon: HALOT
  rationale: «Por» expresa con naturalidad en español la relación de intercambio/substitución en ambos miembros de la frase, manteniendo la brevedad proverbial.
- source_word: וְכֹל אֲשֶׁר לָאִישׁ
  english_pob_choice: all that a man has
  chosen_spanish: todo lo que el hombre tiene
  alternatives_spanish:
  - todo lo que pertenece al hombre
  - todo cuanto tiene un hombre
  lexicon: HALOT
  rationale: La frase explica posesión de manera idiomática en español y conserva el sujeto genérico masculino singular del hebreo, apropiado al estilo proverbial.
- source_word: לָאִישׁ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: HALOT
  rationale: Aunque el hebreo es singular genérico, en español «el hombre» funciona de manera natural y generalizante dentro del proverbio, evitando una construcción pesada.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ se refiere a la vida que se preserva, no principalmente al alma en sentido inmortal. «Vida» expresa mejor el valor del paralelismo y la lógica del proverbio.
- source_word: יִתֵּן
  english_pob_choice: he will give
  chosen_spanish: dará
  alternatives_spanish:
  - daría
  - da
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí tiene valor general/futuro en el proverbio. «Dará» comunica esa disposición general con naturalidad en español.
theological_decisions:
- issue: Título vs. nombre propio para הַשָּׂטָן
  english_pob_reading: the Adversary
  chosen_spanish_reading: el Adversario
  alternative_spanish_readings:
  - Satanás
  - el acusador
  rationale: La forma con artículo en Job presenta una figura funcional y litigiosa. Mantener un título en español preserva la tensión literaria y evita resolver prematuramente la identificación con el nombre propio posterior.
  doctrine_reference: Preservar la tensión léxica y canónica; primacía del hebreo sobre la tradición interpretativa posterior.
- issue: נֶפֶשׁ como vida o alma
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - ser
  rationale: En el dicho proverbial la lógica es de autopreservación y pérdida/defensa de la existencia. «Vida» es la opción más fiel y clara en español, mientras «alma» podría sugerir un matiz más teológico que el contexto no exige.
  doctrine_reference: Distinción semántica de נֶפֶשׁ según contexto; evitar sobrecargar con sentidos no requeridos por el pasaje.
translation_notes:
  revision_awareness: El borrador sigue de cerca el análisis del texto hebreo y la lectura auditada en inglés. Se conserva la elección titulativa para הַשָּׂטָן, el carácter proverbial de «piel por piel» y el valor contextual de נֶפֶשׁ como «vida». No se aplicaron revisiones posteriores en el paquete de origen, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «Adversario» como título, no como nombre propio, para conservar la forma con artículo del hebreo.
  - «Vida» se usa para נֶפֶשׁ porque el contexto habla de preservación de la existencia.
  - La puntuación intenta reflejar el tono proverbial del hebreo con una breve exclamación.
  - Las notas conservan alternativas relevantes sin forzar una interpretación doctrinal única.
