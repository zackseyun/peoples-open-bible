translation:
  language: es
  text: 'La palabra que vino a Jeremías de Yahvé, cuando Nabucodonosor[a], rey de Babilonia, y todo su ejército, y todos los reinos de la tierra bajo el dominio de su mano[b], y todos los pueblos, combatían contra Jerusalén y contra todas sus ciudades, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Nebucadrezar»; la forma española más conocida es «Nabucodonosor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los reinos del país bajo el dominio de su mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - Esta es la palabra
  lexicon: HALOT
  rationale: דָּבָר en fórmulas proféticas introduce la comunicación divina; ‘la palabra’ conserva esa fórmula sin añadir explicación.
- source_word: אֲשֶׁר הָיָה אֶל
  english_pob_choice: that came to
  chosen_spanish: que vino a
  alternatives_spanish:
  - que fue a
  - que aconteció a
  lexicon: HALOT
  rationale: La fórmula profética se expresa naturalmente en español como ‘que vino a [alguien]’; mantiene el valor de llegada/comunicación del hebreo.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from the LORD / Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Yahveh
  - del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma editorial POB ‘Yahvé’, en lugar de enmascararlo como ‘SEÑOR’; ‘de’ expresa el origen de la palabra.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nebucadrezar
  lexicon: HALOT
  rationale: En español bíblico es la forma reconocible y estándar; el hebreo refleja una grafía cercana a ‘Nebucadrezzar’, pero el nombre tradicional español no altera el referente.
- source_word: חֵילוֹ
  english_pob_choice: his army
  chosen_spanish: su ejército
  alternatives_spanish:
  - su fuerza
  - su hueste
  lexicon: HALOT
  rationale: חַיִל aquí designa fuerzas militares; ‘ejército’ es claro y fiel en el contexto de asedio.
- source_word: מַמְלְכוֹת אֶרֶץ
  english_pob_choice: the kingdoms of the earth
  chosen_spanish: los reinos de la tierra
  alternatives_spanish:
  - los reinos del país
  - los reinos de la región
  lexicon: HALOT
  rationale: ‘Tierra’ mantiene el alcance amplio del hebreo אֶרֶץ y el sentido geopolítico general, como en la lectura inglesa auditada.
- source_word: מֶמְשֶׁלֶת יָדוֹ
  english_pob_choice: under the dominion of his hand
  chosen_spanish: bajo el dominio de su mano
  alternatives_spanish:
  - bajo su dominio
  - bajo el poder de su mano
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de ‘mano’ junto con ‘dominio’; evita una paráfrasis que borre la metáfora política del hebreo.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  - los pueblos
  lexicon: HALOT
  rationale: ‘Pueblos’ preserva el plural étnico-político del hebreo; se mantiene ‘todos’ por el alcance acumulativo de la serie.
- source_word: נִלְחָמִים עַל
  english_pob_choice: were fighting against
  chosen_spanish: estaban peleando contra
  alternatives_spanish:
  - estaban guerreando contra
  - estaban combatiendo contra
  lexicon: HALOT
  rationale: El participio indica acción continua; ‘peleando contra’ es natural en español y mantiene la relación hostil de עַל en este contexto bélico.
- source_word: עַל יְרוּשָׁלַם וְעַל כָּל עָרֶיהָ
  english_pob_choice: against Jerusalem and against all its cities
  chosen_spanish: contra Jerusalén y contra todas sus ciudades
  alternatives_spanish:
  - sobre Jerusalén y sobre todas sus ciudades
  - contra Jerusalén y todas sus ciudades
  lexicon: HALOT
  rationale: Se conserva la preposición repetida para reflejar el paralelismo hebreo y la oposición militar directa.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - 'diciendo:'
  lexicon: HALOT
  rationale: La partícula introductoria enlaza con el discurso del versículo siguiente; ‘diciendo’ es fiel y natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El POB inglés actualizado usa ‘Yahweh’; en español la convención editorial del proyecto es ‘Yahvé’. Se evita la sustitución por ‘SEÑOR’ para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: The kingdoms of the earth / de la tierra
  english_pob_reading: the kingdoms of the earth
  chosen_spanish_reading: los reinos de la tierra
  alternative_spanish_readings:
  - los reinos del mundo
  - los reinos de la región
  rationale: Se mantiene el alcance amplio del hebreo אֶרֶץ sin forzar una universalidad moderna absoluta; la expresión sigue el audit trail inglés.
  doctrine_reference: Jeremiah 34:1 English lexical decision on מַמְלְכוֹת אֶרֶץ
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pase más reciente, que no registró cambios necesarios, y conserva las decisiones auditadas del POB inglés: fórmula profética, nombre divino explícito, imagen de la mano en el dominio y el cierre introductorio del discurso.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma principal del Tetragrama, conforme a la terminología del proyecto.
  - ‘Pueblos’ se usa para הָעַמִּים para preservar el matiz plural étnico-político.
  - Se conserva la repetición de ‘contra’ para reflejar el paralelismo y la fuerza militar del hebreo.
  - La puntuación con dos puntos en [b] prepara el discurso del versículo siguiente sin añadir contenido ajeno.
