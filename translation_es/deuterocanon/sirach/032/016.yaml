translation:
  language: es
  text: Quien teme a Yahvé entenderá el juicio[d][c][b][a], y desde el alba[b] sacará dichos sabios[c] de su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los testigos hebreos varían: algunos leen «entenderá el juicio», y otros «entenderá su juicio».'
    reason: alternative_reading
  - marker: b
    text: La frase hebrea traducida «desde el alba» es incierta; también puede significar «temprano» o referirse más generalmente al amanecer o al crepúsculo.
    reason: lexical_alternative
  - marker: c
    text: 'Otra línea hebrea dice: «los que temen a Yahvé entenderán su juicio, y con mucha sabiduría lo sacarán de su corazón».'
    reason: textual_variant
  - marker: d
    text: El paralelo griego conservado para este versículo presenta una redacción sustancialmente distinta, lo que indica una tradición textual divergente aquí.
    reason: textual_variant
lexical_decisions:
- source_word: οὐ λήμψεται πρόσωπον ἐπὶ πτωχοῦ
  english_pob_choice: No hará acepción de persona con el pobre
  chosen_spanish: No hará acepción de persona con el pobre
  alternatives_spanish:
  - No favorecerá al pobre por su condición
  - No tendrá miramiento con el pobre
  lexicon: LSJ
  rationale: La cláusula griega usa la expresión idiomática de 'tomar rostro', es decir, mostrar parcialidad o hacer acepción de persona. En español bíblico actual, 'hacer acepción de persona' comunica bien ese valor sin ocultar el matiz jurídico. 'con el pobre' refleja ἐπὶ πτωχοῦ de forma natural y mantiene la referencia al necesitado/ pobre.
- source_word: δέησιν
  english_pob_choice: súplica
  chosen_spanish: súplica
  alternatives_spanish:
  - petición
  - ruego
  - oración
  lexicon: LSJ
  rationale: δέησις denota petición insistente o ruego. 'Súplica' es una opción digna y precisa en registro bíblico, sin volverla demasiado litúrgica.
- source_word: ἠδικημένου
  english_pob_choice: del agraviado
  chosen_spanish: del agraviado
  alternatives_spanish:
  - del oprimido
  - del injustamente tratado
  - del ofendido
  lexicon: LSJ
  rationale: El participio de ἀδικέω expresa haber sido tratado injustamente o dañado. 'Agraviado' conserva la idea de persona perjudicada por una injusticia y funciona bien en español neutral.
- source_word: εἰσακούσεται
  english_pob_choice: escuchará
  chosen_spanish: escuchará
  alternatives_spanish:
  - oirá
  - atenderá
  - dará oído a
  lexicon: LSJ
  rationale: El verbo puede significar oír favorablemente, prestar atención o atender una petición. 'Escuchará' comunica la atención eficaz sin sobrecargar el verso.
theological_decisions:
- issue: 'Base textual: griego paralelo frente al hebreo divergente'
  english_pob_reading: The extant Greek parallel for this verse reflects a substantially different wording, indicating a divergent textual tradition here.
  chosen_spanish_reading: Se traduce el griego conservado en este expediente, y se deja constancia de que el hebreo transmisional apunta a una tradición diferente.
  alternative_spanish_readings:
  - Harmonizar hebreo y griego en una sola línea
  - Traducir solo el hebreo
  rationale: El packet canónico suministra un griego completo y coherente para Sirácides 32:16, mientras que el hebreo adjunto pertenece a una formulación distinta del entorno textual. Para un verso de la POB, es preferible no mezclar tradiciones divergentes en el texto principal; la nota deja abierta la discrepancia textual.
  doctrine_reference: 'PHILOSOPHY.md: para Sirácides, traducir el texto disponible más estable y señalar variantes divergentes'
- issue: Tratamiento de λήμψεται πρόσωπον como idiomático
  english_pob_reading: The line describes impartiality toward the poor, not a literal physical act.
  chosen_spanish_reading: No hará acepción de persona con el pobre
  alternative_spanish_readings:
  - No tomará el rostro del pobre
  - No mirará al pobre con favoritismo
  rationale: La expresión griega es una idiomática semítica de imparcialidad. 'Hacer acepción de persona' es la forma española más establecida que conserva la fuerza ética y judicial del enunciado.
  doctrine_reference: Uso bíblico del giro de imparcialidad en contextos judiciales y sapienciales
translation_notes:
  revision_awareness: El último repaso de revisión indicó 'unchanged'; aun así, este borrador prioriza el griego paralelo explícito del expediente para Sirácides 32:16 y señala la divergencia textual con el hebreo suministrado. No se incorporan armonizaciones no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se evita 'SEÑOR' porque este verso no contiene el Tetragrámaton en la forma griega suministrada.
  - Se conserva una sintaxis breve y paralela, adecuada para una línea sapiencial.
  - Las notas usan marcadores únicos en orden y cada uno aparece anclado en el texto principal.
