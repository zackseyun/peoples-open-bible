translation:
  language: es
  text: Y también fueron heridos con ceguera[a], como aquellos a las puertas del hombre justo, cuando, envueltos en una oscuridad profunda[b], cada uno seguía buscando la entrada de su propia puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alusión a Génesis 19:11, donde los hombres a la puerta de Lot fueron heridos con ceguera y se cansaron tratando de hallar la entrada.
    reason: cross_reference
  - marker: b
    text: El griego tiene una forma algo enmarañada acerca de «sus propias puertas» y «el camino»; por eso la traducción expresa el sentido probable de una búsqueda insistente de acceso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήγησαν
  english_pob_choice: were struck
  chosen_spanish: fueron heridos
  alternatives_spanish:
  - fueron golpeados
  - fueron castigados
  lexicon: LSJ
  rationale: El pasivo de πλήσσω expresa ser alcanzados por un golpe o aflicción. En español, «fueron heridos» conserva la imagen de impacto y evita una formulación demasiado técnica o arcaica.
- source_word: ἀορασίᾳ
  english_pob_choice: with blindness
  chosen_spanish: con ceguera
  alternatives_spanish:
  - con incapacidad de ver
  - con no-ver
  lexicon: LSJ
  rationale: El sustantivo denota pérdida de la vista; «ceguera» es el equivalente natural y mantiene la alusión narrativa a Génesis 19.
- source_word: ὥσπερ ἐκεῖνοι
  english_pob_choice: like those
  chosen_spanish: como aquellos
  alternatives_spanish:
  - igual que aquellos
  - tal como aquellos
  lexicon: LSJ
  rationale: «Aquellos» mantiene la referencia al episodio previo sin añadir identificación que el griego no explicita en el cuerpo principal.
- source_word: ἐπὶ ταῖς τοῦ δικαίου θύραις
  english_pob_choice: at the doors of the righteous man
  chosen_spanish: a las puertas del hombre justo
  alternatives_spanish:
  - a las puertas del justo
  - en la puerta del hombre justo
  lexicon: LSJ
  rationale: Se conserva el sintagma genérico τοῦ δικαίου como «el hombre justo», sin insertar «Lot» en el texto principal. «Puertas» refleja el plural griego, aunque el contexto final se resuelve en singular en la idea de acceso al umbral.
- source_word: ἀχανεῖ ... σκότει
  english_pob_choice: deep darkness
  chosen_spanish: una oscuridad profunda
  alternatives_spanish:
  - una gran oscuridad
  - una oscuridad inmensa
  lexicon: LSJ
  rationale: ἀχανής expresa una amplitud o vacuidad imponente; «oscuridad profunda» comunica esa intensidad con naturalidad en español.
- source_word: περιβληθέντες
  english_pob_choice: wrapped in
  chosen_spanish: envueltos en
  alternatives_spanish:
  - rodeados de
  - cubiertos de
  lexicon: LSJ
  rationale: El participio sugiere estar rodeado o cubierto por la oscuridad; «envueltos en» es idiomático y mantiene la imagen.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - uno por uno
  lexicon: LSJ
  rationale: El valor distributivo se conserva con «cada uno», mostrando la acción individual de buscar por separado.
- source_word: τῶν αὐτοῦ θυρῶν
  english_pob_choice: through his own door
  chosen_spanish: por su propia puerta
  alternatives_spanish:
  - por su propia entrada
  - a través de su propia puerta
  lexicon: LSJ
  rationale: Aunque el griego tiene una forma plural, el contexto final y la revisión inglesa favorecen el singular contextual de «puerta». «Por su propia puerta» expresa el intento de paso/acceso con claridad.
- source_word: τὴν δίοδον ἐξῄει
  english_pob_choice: kept seeking the way through
  chosen_spanish: seguía buscando el camino
  alternatives_spanish:
  - iba buscando el paso
  - procuraba encontrar la salida
  lexicon: LSJ
  rationale: δίοδος puede ser paso, vía de acceso o camino. En este contexto, con la acción iterativa del imperfecto, «seguía buscando el camino» transmite la búsqueda insistente de entrada o paso.
theological_decisions:
- issue: Identificación del hombre justo en la alusión
  english_pob_reading: Translate generically as 'the righteous man' rather than inserting the name 'Lot' into the main text.
  chosen_spanish_reading: Traducir genéricamente como «el hombre justo» y no insertar «Lot» en el texto principal.
  alternative_spanish_readings:
  - el justo (Lot)
  - Lot
  rationale: El griego dice τοῦ δικαίου, no el nombre propio. Para respetar la primacía del texto fuente, el cuerpo principal mantiene la designación genérica; la nota puede aclarar la alusión bíblica.
  doctrine_reference: Primacía del texto original; no introducir precisiones no explícitas en el versículo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó el final de «doors» a «door» para reflejar con mayor naturalidad el singular contextual de θυρῶν. La versión española adopta ese cierre singular con «su propia puerta», manteniendo a la vez el plural griego inicial «las puertas» en la comparación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «el hombre justo» en lugar de «Lot» para respetar la formulación griega.
  - Se opta por «ceguera» y no por una perífrasis, porque el sustantivo es directo y la alusión a Génesis 19 resulta transparente.
  - «Puerta» se mantiene en singular al final por coherencia con la revisión inglesa y con el sentido contextual de acceso individual.
