translation:
  language: es
  text: '¿Y dónde están sus profetas que les profetizaron, diciendo: «El rey de Babilonia no vendrá contra[a] ustedes ni contra esta tierra»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La preposición hebrea puede traducirse más literalmente como «sobre ustedes» y «sobre esta tierra», pero aquí probablemente expresa avance hostil; por eso se traduce «contra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַיּוֹ
  english_pob_choice: And where are
  chosen_spanish: ¿Y dónde están
  alternatives_spanish:
  - ¿Y dónde está
  - ¿Así que dónde están
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica de reproche. En español, «¿Y dónde están?» conserva bien la fuerza interrogativa y el enlace con el contexto previo, sin sonar forzado.
- source_word: נְבִיאֵיכֶם
  english_pob_choice: your prophets
  chosen_spanish: vuestros profetas
  alternatives_spanish:
  - los profetas de ustedes
  - sus profetas
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural requiere un posesivo plural. «Vuestros» mantiene la relación directa del reproche y es plenamente natural en registro bíblico español.
- source_word: אֲשֶׁר נִבְּאוּ לָכֶם
  english_pob_choice: who prophesied to you
  chosen_spanish: que profetizaron para vosotros
  alternatives_spanish:
  - que profetizaban para vosotros
  - que os profetizaron
  lexicon: HALOT
  rationale: El relativo identifica a los profetas por su actividad previa. «Profetizaron para vosotros» comunica la dirección del acto profético con claridad y evita introducir un matiz excesivo de «contra» o «a favor» que el hebreo no exige aquí.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Es la fórmula quotativa normal. «Diciendo» funciona con naturalidad antes del discurso directo y conserva el nexo explícito con las palabras citadas.
- source_word: לֹא יָבֹא
  english_pob_choice: will not come
  chosen_spanish: no vendrá
  alternatives_spanish:
  - no viene
  - no ha de venir
  lexicon: HALOT
  rationale: El imperfecto en habla reportada expresa predicción futura. «No vendrá» es la manera más directa y fiel de reproducirla en español.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  - el rey de Babel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma transparente. «Babilonia» es la forma histórica y comprensible en español bíblico contemporáneo.
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: contra vosotros
  alternatives_spanish:
  - sobre vosotros
  - sobre ustedes
  lexicon: HALOT
  rationale: El POB inglés opta por el sentido hostil de avance militar. En español, «contra» expresa ese valor adversativo mejor que «sobre», sin perder la referencia personal.
- source_word: וְעַל הָאָרֶץ הַזֹּאת
  english_pob_choice: and against this land
  chosen_spanish: ni contra esta tierra
  alternatives_spanish:
  - y contra esta tierra
  - ni sobre esta tierra
  lexicon: HALOT
  rationale: 'En una frase negativa coordinada, el hebreo puede tener valor disyuntivo/enlazante; por eso el inglés revisado pasó de «and» a «or» en sentido natural. En español, «ni... ni...» reproduce con claridad la negación coordinada y conserva el doble alcance del anuncio: sobre la gente y sobre la tierra.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la segunda coordinación negativa para reflejar mejor el hebreo. En español se expresó esa coordinación con «ni... ni...», manteniendo la fuerza retórica y el paralelismo del original.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural con «vosotros» para conservar la correspondencia con el sufijo hebreo plural.
  - «Babilonia» se usa como nombre histórico del reino, en línea con el español bíblico estándar y sin introducir una explicación no presente en el texto.
  - Se conserva la tensión lexical de עַל mediante una nota, aunque el texto principal prioriza la lectura hostil «contra» por claridad contextual.
