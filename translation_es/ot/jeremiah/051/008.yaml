  to: De repente cayó Babilonia y quedó quebrantada. ¡Giman por ella! Tomen bálsamo[a] para su dolor; quizá sea sanada.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre 'bálsamo', se mejora הֵילִילוּ con 'Giman' para un lamento intenso y natural en español eclesial neutral, se reemplaza 'Tomad' por 'Tomen' para adecuación regional, y se normaliza la nota léxica conforme al audit trail inglés y al español correcto.
