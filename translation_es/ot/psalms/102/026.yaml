    rationale: 'La nota actual "''O: «Desde antiguo tú echaste los cimientos de la tierra»." es comprensible, pero en el formato del proyecto basta una formulación limpia como "O: ''Desde antiguo tú echaste los cimientos de la tierra.''"'
