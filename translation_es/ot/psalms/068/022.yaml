  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: «Dios» es correcto para אֱלֹהִים; no aparecen Yahvé/Mesías/etc. «Aplastará», «cabeza», «anda», y «culpa» concuerdan con las decisiones auditadas. La corrección necesaria es léxica y de anclaje de nota: incorporar שֵׂעָר al texto principal y mover la nota al sintagma correspondiente.'
