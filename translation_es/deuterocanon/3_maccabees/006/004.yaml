translation:
  language: es
  text: Padre, tú que destruíste a Faraón, el antiguo gobernante de este país de Egipto, cuando fue levantado con audacia sin ley y con lengua fanfarrona, aumentando en hechos presuntuosos[a], junto con su orgulloso ejército, al hundirlos en el mar[b], y que hiciste resplandecer la luz de misericordia sobre el pueblo de Israel[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «multiplicando actos de insolencia» para la difícil frase πληθύνoντα θράμασιν.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «destruiste [a ellos], tragados por el mar», imagen de Faraón y su ejército engullidos por el mar.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «hiciste resplandecer la luz de misericordia» sobre Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάτερ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Oh Padre
  - Padre mío
  lexicon: LSJ
  rationale: Vocativo directo de oración. «Padre» conserva la invocación solemne sin añadir elementos no presentes en el griego.
- source_word: Φαραώ
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: LSJ
  rationale: Título/nombre real bíblico estándar. En español, «Faraón» mantiene la referencia histórica y literaria.
- source_word: τὸν πρὶν Αἰγύπτου ταύτης δυνάστην
  english_pob_choice: the former ruler of this Egypt
  chosen_spanish: el antiguo gobernante de este Egipto
  alternatives_spanish:
  - el anterior gobernante de este Egipto
  - el antiguo soberano de este Egipto
  - el antiguo tirano de este Egipto
  lexicon: LSJ
  rationale: πρὶν expresa anterioridad/antigüedad y δυνάστης designa a un gobernante o potentado. «Gobernante» evita cargar el texto con una valoración más fuerte que la del griego, mientras conserva la idea de autoridad.
- source_word: πληθύνoντα θράμασιν
  english_pob_choice: increasing in presumptuous deeds
  chosen_spanish: aumentando en hechos presuntuosos
  alternatives_spanish:
  - multiplicando actos de insolencia
  - abundando en actos temerarios
  - aumentando en actos de insolencia
  lexicon: LSJ
  rationale: La expresión es difícil y el sentido apunta a un crecimiento en conducta atrevida/insolente. «Hechos presuntuosos» conserva el matiz de osadía y evita resolver en exceso la ambigüedad del original.
- source_word: ἐπαρθέντα
  english_pob_choice: was lifted up
  chosen_spanish: fue levantado
  alternatives_spanish:
  - fue alzado
  - se ensoberbeció
  - fue exaltado
  lexicon: LSJ
  rationale: El participio literalmente significa «habiendo sido levantado/alzado». En español, «fue levantado» conserva la metáfora sin convertirla prematuramente en interpretación psicológica.
- source_word: ἀνόμῳ θράσει
  english_pob_choice: with lawless boldness
  chosen_spanish: con audacia sin ley
  alternatives_spanish:
  - con insolencia sin ley
  - con temeridad impía
  - con audacia ilícita
  lexicon: LSJ
  rationale: θράσος expresa audacia insolente; ἀνόμῳ añade la cualificación moral de lo que está fuera de la ley. «Audacia sin ley» reproduce la tensión entre valentía y transgresión.
- source_word: γλώσσῃ μεγαληγόμονι
  english_pob_choice: boastful speech
  chosen_spanish: lengua jactanciosa
  alternatives_spanish:
  - habla jactanciosa
  - lenguaje altanero
  - lengua altisonante
  lexicon: LSJ
  rationale: La imagen concreta de «lengua» debe mantenerse. «Jactanciosa» transmite el orgullo verbal con naturalidad en español bíblico moderno.
- source_word: σὺν τῇ ὑπερηφάνῳ στρατιᾷ
  english_pob_choice: together with his proud army
  chosen_spanish: junto con su orgulloso ejército
  alternatives_spanish:
  - junto con su ejército arrogante
  - con su altivo ejército
  - con su ejército soberbio
  lexicon: LSJ
  rationale: στρατιά es «ejército» o «hueste»; ὑπερήφανος denota orgullo/arrogancia. «Orgulloso» comunica la valoración moral sin sonar excesivamente idiomática.
- source_word: ποντοβρόχους ἀπώλεσας
  english_pob_choice: drowning them in the sea
  chosen_spanish: hundiéndolos en el mar
  alternatives_spanish:
  - sumergiéndolos en el mar
  - tragándolos el mar
  - haciéndolos presa del mar
  lexicon: LSJ
  rationale: El compuesto sugiere ser engullidos por el mar. «Hundiendo» mantiene la imagen acuática sin forzar una perífrasis más explicativa que el texto.
- source_word: φέγγος ἐπιφάνας ἐλέους
  english_pob_choice: shone forth the light of mercy
  chosen_spanish: hiciste resplandecer la luz de tu misericordia
  alternatives_spanish:
  - hiciste brillar la luz de misericordia
  - hiciste aparecer la claridad de tu misericordia
  - hizo resplandecer la luz de la misericordia
  lexicon: LSJ
  rationale: Se preserva la imagen luminosa explícita de φέγγος/ἐπιφαίνω. Añadir «tu» hace explícito el referente implícito de la misericordia en la oración sin alterar el sentido.
- source_word: Ἰσραὴλ γένει
  english_pob_choice: upon the people of Israel
  chosen_spanish: sobre el pueblo de Israel
  alternatives_spanish:
  - sobre la estirpe de Israel
  - sobre la raza de Israel
  - sobre la familia de Israel
  lexicon: LSJ
  rationale: γένος puede ser pueblo, linaje o familia. «Pueblo de Israel» es natural, reverente y evita asociaciones modernas de «raza».
theological_decisions:
- issue: Mantener en una sola súplica tanto el juicio sobre Faraón como la misericordia hacia Israel, con la metáfora de la luz intacta.
  english_pob_reading: Preserve both judgment and mercy imagery in one flowing sentence.
  chosen_spanish_reading: Conservar en una sola oración la destrucción del opresor y el resplandor misericordioso sobre Israel.
  alternative_spanish_readings:
  - Dividir en dos oraciones para facilitar la lectura
  - Reducir «la luz de tu misericordia» a «mostraste misericordia»
  rationale: El griego une juicio y misericordia en una misma estructura retórica. La versión española mantiene ese contraste teológico sin aplanar la imagen luminosa de la misericordia.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y no resolverla por paráfrasis reductiva.'
translation_notes:
  revision_awareness: El pasaje griego presenta una sintaxis densa y varios giros difíciles. La versión inglesa auditada revisó «exalted» a «lifted up», «arrogance» a «boldness» y «reckless acts» a «presumptuous deeds» para acercarse más al griego. La presente versión española sigue esa revisión, pero conserva una dicción bíblica natural y transparente, manteniendo la metáfora de la luz y la imagen del mar sin sobrerresolver la ambigüedad de πληθύνoντα θράμασιν.
  spanish_consistency_notes:
  - Se usa «Padre» como vocativo de oración, no como título doctrinal técnico.
  - Se mantiene «Faraón» como nombre/título bíblico estándar.
  - Se prefiere «pueblo de Israel» frente a «raza/linaje» por claridad y por evitar connotaciones modernas.
  - Se conserva el lenguaje de luz en lugar de convertirlo en mera abstracción de misericordia.
  - Los corchetes de notas aparecen en el texto exactamente donde corresponde cada comentario alternativo.
