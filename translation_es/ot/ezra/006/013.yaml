base_translation:
  language: en
  yaml_path: translation/ot/ezra/006/013.yaml
  text: Then Tattenai[a], the governor of Beyond the River, Shethar-bozenai, and their associates did exactly so[b], in accordance with what King Darius had sent.
  footnotes:
  - marker: a
    text: Or 'did it carefully' or 'carried it out with all exactness.' The Aramaic expression emphasizes precise compliance with the king's directive.
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' was the Persian administrative term for the region west of the Euphrates.'
    reason: cultural_note
