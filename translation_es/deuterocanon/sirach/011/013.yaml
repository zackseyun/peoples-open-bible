translation:
  language: es
  text: Hay quien se afana y se fatiga, y corre de aquí para allá; aun así, queda más rezagado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se retrasa / queda atrás». El paralelo griego de este versículo, en cambio, dice: «levantó su cabeza, y muchos se asombraron de él», reflejando una tradición textual sustancialmente distinta.'
    reason: textual_variant
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is one who
  chosen_spanish: Hay quien
  alternatives_spanish:
  - Hay uno que
  - Hay alguien que
  lexicon: HALOT
  rationale: El hebreo introduce un caso general; en español, «Hay quien» conserva el valor impersonal y proverbial sin añadir más especificación de la que da el texto.
- source_word: עָמֵל
  english_pob_choice: labors
  chosen_spanish: se afana
  alternatives_spanish:
  - labora
  - trabaja arduamente
  - se esfuerza
  lexicon: HALOT
  rationale: El término describe esfuerzo intenso y penoso; «se afana» comunica bien esa labor esforzada en español natural y literario.
- source_word: וְיָגֵעַ
  english_pob_choice: and toils
  chosen_spanish: y se fatiga
  alternatives_spanish:
  - y se cansa
  - y se agota
  - y se esfuerza
  lexicon: HALOT
  rationale: Mantiene la intensificación cercana del hebreo con un verbo de desgaste físico o mental; «se fatiga» conserva el matiz de cansancio producido por el esfuerzo.
- source_word: וָרָץ
  english_pob_choice: and rushes about
  chosen_spanish: y corre de aquí para allá
  alternatives_spanish:
  - y corre
  - y va de un lado a otro
  - y se apresura
  lexicon: HALOT
  rationale: El hebreo dice literalmente «corre»; en español, la imagen de movimiento continuo y agitado se expresa con naturalidad como «corre de aquí para allá».
- source_word: וּכְדֵי כֵן
  english_pob_choice: yet all the more
  chosen_spanish: y, aun así
  alternatives_spanish:
  - y todavía más
  - y más bien
  - y con todo
  lexicon: HALOT
  rationale: La frase introduce una conclusión inesperada o irónica. En español, «aun así» preserva el giro adversativo sin forzar una explicación interpretativa excesiva.
- source_word: הוּא מִתְאַחֵר
  english_pob_choice: he falls behind
  chosen_spanish: se retrasa más
  alternatives_spanish:
  - va quedando atrás
  - llega tarde
  - queda rezagado
  lexicon: HALOT
  rationale: El reflexivo hebreo expresa quedar retrasado o demorarse. «Se retrasa más» comunica la idea de progreso insuficiente y mantiene el contraste sapiencial del verso.
theological_decisions:
- issue: Desajuste textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The English POB follows the Hebrew sense for the main line and notes that the Greek parallel reads, 'and he lifted up his head, and many were astonished at him,' representing a substantially different tradition.
  chosen_spanish_reading: 'La línea principal sigue el hebreo conservado; la nota informa que el griego paralelo ofrece una lectura muy distinta: «levantó su cabeza, y muchos se asombraron de él».'
  alternative_spanish_readings:
  - «levantó su cabeza, y muchos se maravillaron de él»
  - «alzò la cabeza, y muchos quedaron asombrados de él»
  rationale: No se debe ocultar la tensión documental entre tradiciones. La línea principal traduce el hebreo disponible, y la nota conserva la lectura griega como variante textual relevante para el lector.
  doctrine_reference: Crítica textual; fidelidad a testigos múltiples del texto bíblico.
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés: el hebreo es el texto principal para esta línea, pero el griego paralelo se preserva como variante textual importante. No se introdujeron glosas ajenas al sentido requerido por el proverbio.'
  spanish_consistency_notes:
  - Se usó «Hay quien» para el sujeto genérico, coherente con el estilo sapiencial.
  - Se evitó «SEÑOR» u otra terminología no pertinente; no aparece aquí vocabulario divino.
  - La nota de variante textual conserva la tensión entre hebreo y griego sin resolverla artificialmente.
  - «Se retrasa más» mantiene el valor de atraso/rezago del verbo reflexivo hebreo.
