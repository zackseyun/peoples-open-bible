translation:
  language: es
  text: Porque mientras el hijo de Isaí viva sobre la tierra, ni tú ni tu reino quedarán establecidos. Ahora pues, envía y tráelo a mí, porque es un hijo de muerte[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo hebreo: «un hijo de muerte», es decir, alguien merecedor de muerte o destinado a morir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Aquí introduce la explicación causal del enojo y la orden de Saúl; «Porque» expresa con naturalidad esa relación causal en español.
- source_word: כָל הַיָּמִים אֲשֶׁר
  english_pob_choice: as long as
  chosen_spanish: mientras
  alternatives_spanish:
  - todo el tiempo que
  - todos los días que
  - mientras que
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de duración; «mientras» conserva la idea temporal continua sin sonar artificial en español.
- source_word: בֶּן יִשַׁי
  english_pob_choice: the son of Jesse
  chosen_spanish: el hijo de Isaí
  alternatives_spanish:
  - David
  - el hijo de Jesé
  lexicon: HALOT
  rationale: Se preserva el patronímico, como en el POB inglés, para mantener el distanciamiento retórico y despectivo de Saúl. «Isaí» es la forma usual del nombre en español bíblico.
- source_word: חַי עַל הָאֲדָמָה
  english_pob_choice: lives on the earth
  chosen_spanish: viva sobre la tierra
  alternatives_spanish:
  - esté vivo sobre la tierra
  - viva en la tierra
  - permanezca con vida en la tierra
  lexicon: HALOT
  rationale: El hebreo habla de vivir sobre la tierra; «sobre la tierra» conserva el matiz amplio y «viva» expresa la duración dentro de la cláusula temporal.
- source_word: לֹא תִכּוֹן
  english_pob_choice: will be established
  chosen_spanish: serán establecidos
  alternatives_spanish:
  - se afirmarán
  - permanecerán firmes
  - serán firmes
  lexicon: HALOT
  rationale: El nifal de כון tiene sentido de quedar establecido o firme. En español, la pasiva «serán establecidos» preserva ese valor resultativo para Jonathan y su reino.
- source_word: אַתָּה וּמַלְכוּתֶךָ
  english_pob_choice: neither you nor your kingdom
  chosen_spanish: ni tú ni tu reino
  alternatives_spanish:
  - ni tú ni tu realeza
  - ni tú ni tu reinado
  lexicon: HALOT
  rationale: «Reino» es el equivalente natural de מַלְכוּת en contexto dinástico-político y reproduce el paralelismo coordinado con «tú».
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  - Ahora entonces
  lexicon: HALOT
  rationale: Marca la inferencia urgente del argumento previo; «Ahora pues» es una fórmula natural y enfática en español bíblico moderno.
- source_word: שְׁלַח וְקַח אֹת/וֹ אֵלַי
  english_pob_choice: send and bring him to me
  chosen_spanish: envía y tráelo a mí
  alternatives_spanish:
  - manda y tráelo a mí
  - envía y haz que lo traigan a mí
  - manda y hazlo venir a mí
  lexicon: HALOT
  rationale: Los imperativos implican despachar a alguien para que David sea llevado ante Saúl. «Tráelo a mí» transmite el resultado idiomáticamente sin perder la fuerza de la orden.
- source_word: בֶּן מָוֶת הוּא
  english_pob_choice: he is a son of death
  chosen_spanish: es un hombre condenado a muerte
  alternatives_spanish:
  - es un hijo de muerte
  - merece morir
  - está sentenciado a muerte
  lexicon: HALOT
  rationale: El hebreo es un modismo literal, «hijo de muerte», que denota alguien merecedor de muerte. En español, «condenado a muerte» comunica claramente ese valor idiomático sin introducir rareza innecesaria en el texto principal.
theological_decisions:
- issue: Valor del modismo final sobre la pena de muerte o merecimiento de muerte
  english_pob_reading: he is a son of death, that is, one deserving death or doomed to die
  chosen_spanish_reading: es un hombre condenado a muerte
  alternative_spanish_readings:
  - merece morir
  - es un hijo de muerte
  - está destinado a morir
  rationale: La frase hebrea admite una lectura idiomática de culpabilidad o destino mortal. En el texto principal se optó por una formulación española clara que preserva la idea de sentencia/merecimiento sin suavizar la severidad del juicio de Saúl.
  doctrine_reference: Lexical/theological note on idiomatic judicial language; cf. Hebrew idiom בן מות
- issue: Preservación del patronímico en vez del nombre propio
  english_pob_reading: the son of Jesse
  chosen_spanish_reading: el hijo de Isaí
  alternative_spanish_readings:
  - David
  - Jesé
  rationale: Se mantiene la referencia patronímica, como en el texto fuente y en el POB inglés, para conservar el tono despectivo y la distancia discursiva de Saúl respecto de David.
  doctrine_reference: Narrative discourse and referential choice in 1 Samuel 20:31
translation_notes:
  revision_awareness: El texto sigue la lectura estable del POB inglés con acuerdo alto y sin cambios de revisión aplicados. La principal decisión adaptada al español fue resolver el modismo final con una equivalencia idiomática clara, manteniendo en nota su forma literal hebrea y su tensión semántica.
  spanish_consistency_notes:
  - Se conservó «Isaí» para el patronímico, en paralelo con la estrategia del POB inglés.
  - Se usó «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - «Reino» se mantuvo por ser el equivalente natural de מַלְכוּת en contexto real.
  - El texto principal evita una calca demasiado literal de «hijo de muerte», pero la nota preserva la transparencia del modismo hebreo.
