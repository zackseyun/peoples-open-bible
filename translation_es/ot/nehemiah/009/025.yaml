translation:
  language: es
  text: Capturaron ciudades fortificadas y tierra fértil[a], y tomaron posesión de casas llenas de todo bien, cisternas labradas, viñas, olivos y árboles frutales en abundancia. Así comieron y se saciaron, engordaron, y se deleitaron[b] en tu gran bondad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tierra rica’; literalmente, ‘tierra gorda’.
    reason: lexical_alternative
  - marker: b
    text: O ‘vivieron en lujo’.
    reason: lexical_alternative
  - marker: c
    text: O ‘en tu gran abundancia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדוּ
  english_pob_choice: captured
  chosen_spanish: tomaron
  alternatives_spanish:
  - capturaron
  - se apoderaron de
  lexicon: HALOT
  rationale: לכד en contexto militar puede ser ‘capturar’ o ‘tomar’. En español, ‘tomaron’ conserva la acción de conquista sin sonar forzado, y evita duplicar el matiz que ya expresa el siguiente verbo con fuerza posesiva.
- source_word: עָרִים בְּצֻרוֹת
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades fuertes
  - ciudades-fortaleza
  lexicon: HALOT
  rationale: בצר indica fortificación. ‘Ciudades fortificadas’ es la equivalencia natural y transparente en español, con el mismo sentido militar.
- source_word: וַאֲדָמָה שְׁמֵנָה
  english_pob_choice: fertile land
  chosen_spanish: tierra fértil
  alternatives_spanish:
  - tierra rica
  - tierra gorda
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es ‘tierra gorda’; en español, ‘tierra fértil’ comunica bien el idiomático valor productivo sin caer en una literalidad extraña.
- source_word: וַיִּירְשׁוּ
  english_pob_choice: took possession of
  chosen_spanish: se apoderaron de
  alternatives_spanish:
  - tomaron posesión de
  - heredaron
  lexicon: HALOT
  rationale: ירשׁ puede expresar heredar o tomar posesión. Aquí la acción concreta tras la conquista favorece ‘se apoderaron de’, que conserva el carácter de posesión efectiva sin introducir la idea técnica de herencia.
- source_word: בָּתִּים מְלֵאִים כָּל טוּב
  english_pob_choice: houses full of every good thing
  chosen_spanish: casas llenas de todo bien
  alternatives_spanish:
  - casas llenas de todo lo bueno
  - casas llenas de todo buen don
  lexicon: HALOT
  rationale: כָּל טוּב es una fórmula amplia para provisión y prosperidad. ‘Todo bien’ mantiene la amplitud semántica y suena natural en español bíblico contemporáneo.
- source_word: בֹּרוֹת חֲצוּבִים
  english_pob_choice: hewn cisterns
  chosen_spanish: cisternas labradas
  alternatives_spanish:
  - cisternas talladas
  - cisternas excavadas
  lexicon: HALOT
  rationale: חצוב significa ‘hecho por corte/tallado’. ‘Labradas’ comunica bien la manufactura de la cisterna y mantiene una dignidad formal en español.
- source_word: כְּרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñas
  alternatives_spanish:
  - viñedos
  - parras
  lexicon: HALOT
  rationale: Aunque ‘viñedos’ es posible, ‘viñas’ es una equivalencia bíblica natural y concisa para כרמים en una lista de bienes agrícolas.
- source_word: וְזֵיתִים
  english_pob_choice: olive trees
  chosen_spanish: olivos
  alternatives_spanish:
  - árboles de oliva
  - oliveras
  lexicon: HALOT
  rationale: En español, ‘olivos’ es el nombre natural del árbol y encaja bien con la lista de recursos agrícolas.
- source_word: וְעֵץ מַאֲכָל
  english_pob_choice: fruit trees
  chosen_spanish: árboles frutales
  alternatives_spanish:
  - árboles para alimento
  - árboles que dan fruto
  lexicon: HALOT
  rationale: La expresión designa árboles que producen alimento comestible. ‘Árboles frutales’ es la forma más clara y corriente en español.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - abundantemente
  - en gran cantidad
  lexicon: HALOT
  rationale: La expresión adverbial se vierte de forma idiomática como ‘en abundancia’, que preserva el énfasis en la plenitud de la provisión.
- source_word: וַיֹּאכְלוּ וַיִּשְׂבְּעוּ
  english_pob_choice: they ate and were filled
  chosen_spanish: comieron y se saciaron
  alternatives_spanish:
  - comieron y quedaron satisfechos
  - comieron y quedaron llenos
  lexicon: HALOT
  rationale: שבע significa saciarse. ‘Se saciaron’ conserva la imagen concreta de plenitud alimentaria, más cercana al hebreo que una simple ‘satisfacción’ abstracta.
- source_word: וַיַּשְׁמִינוּ
  english_pob_choice: grew fat
  chosen_spanish: engordaron
  alternatives_spanish:
  - se hicieron gordos
  - prosperaron
  lexicon: HALOT
  rationale: El verbo es literalmente ‘engordar’. En este contexto puede incluir prosperidad, pero ‘engordaron’ preserva la imagen corporal fuerte del hebreo sin suavizarla.
- source_word: וַיִּתְעַדְּנוּ
  english_pob_choice: they delighted themselves
  chosen_spanish: se deleitaron
  alternatives_spanish:
  - se regocijaron
  - vivieron con lujo
  lexicon: HALOT
  rationale: El hitpael de עדן expresa gozo refinado o deleite en la abundancia. ‘Se deleitaron’ conserva el matiz reflexivo y evita una paráfrasis excesiva.
- source_word: בְּטוּבְךָ הַגָּדוֹל
  english_pob_choice: in your great goodness
  chosen_spanish: en tu gran bondad
  alternatives_spanish:
  - en tu gran bondad
  - por tu gran bondad
  - en tu gran benevolencia
  lexicon: HALOT
  rationale: טוּב puede ser bondad o bien/bienestar. Dado el contexto de provisión generosa, ‘gran bondad’ expresa adecuadamente la benevolencia divina y mantiene el vínculo entre lo material y lo moral.
theological_decisions:
- issue: Cómo reflejar el matiz de prosperidad sin borrar la imagen corporal de וַיַּשְׁמִינוּ
  english_pob_reading: grew fat
  chosen_spanish_reading: engordaron
  alternative_spanish_readings:
  - prosperaron
  - se hicieron prósperos
  rationale: El texto usa una imagen concreta de abundancia. Aunque puede implicar prosperidad, no conviene reemplazarla por una abstracción que atenúe la fuerza del hebreo. ‘Engordaron’ preserva la tensión entre literalidad e implicación de prosperidad.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de בְּטוּבְךָ הַגָּדוֹל como don divino y no solo ventaja material
  english_pob_reading: in your great goodness
  chosen_spanish_reading: en tu gran bondad
  alternative_spanish_readings:
  - en tu gran benevolencia
  - en tu gran bondad y generosidad
  rationale: La frase final atribuye la experiencia de plenitud a la bondad de Dios. ‘Bondad’ es suficientemente amplio para abarcar tanto benevolencia como generosidad, sin reducir el sentido a mera ventaja material.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La formulación sigue la revisión más reciente del inglés POB, que prefirió ‘hewn cisterns’ sobre ‘cisterns already hewn out’ por mayor naturalidad y precisión formal. En español se reflejó directamente con ‘cisternas labradas’, sin añadir un equivalente de ‘ya’ que el hebreo no exige explícitamente.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto solo cuando el hebreo lo requiere explícitamente; este versículo no contiene el tetragrámaton.
  - Se evitó ‘Cristo’ o terminología litúrgica ajena al pasaje; el verso trata de provisión histórica y no de título mesiánico.
  - ‘Tierra fértil’ y ‘gran bondad’ conservan el campo semántico de prosperidad y beneficencia sin convertir el texto en paráfrasis interpretativa.
