translation:
  language: es
  text: Porque aquellos hombres eran dignos de ser privados de la luz y encarcelados en la oscuridad, los que habían mantenido encerrados a tus hijos, por quienes iba a ser dada al siglo[a] la luz imperecedera de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al mundo» o «para siempre». El griego dice «al siglo» (singular), que puede tener fuerza cósmica o temporal.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄξιοι
  english_pob_choice: were worthy
  chosen_spanish: eran dignos
  alternatives_spanish:
  - merecían
  - eran merecedores
  lexicon: LSJ
  rationale: ἄξιοι expresa mérito o idoneidad en sentido judicial. «Eran dignos» conserva ese juicio de merecimiento sin suavizarlo como una simple conveniencia.
- source_word: στερηθῆναι φωτός
  english_pob_choice: to be deprived of light
  chosen_spanish: ser privados de la luz
  alternatives_spanish:
  - quedar sin luz
  - ser despojados de la luz
  lexicon: LSJ
  rationale: στερέω en pasiva indica privación. «Privados de la luz» mantiene el matiz punitivo y la correspondencia con el contraste luz/oscuridad.
- source_word: φυλακισθῆναι σκότει
  english_pob_choice: imprisoned in darkness
  chosen_spanish: internados en la oscuridad
  alternatives_spanish:
  - encarcelados en la oscuridad
  - prisioneros en la oscuridad
  lexicon: LSJ
  rationale: φυλακίζω tiene fuerza carcelaria. «Internados» comunica la idea de encierro penal en español natural, y «oscuridad» conserva la imagen de σκότος.
- source_word: οἱ κατακλείστους φυλάξαντες
  english_pob_choice: they who had kept ... shut in
  chosen_spanish: ellos que habían mantenido encerrados
  alternatives_spanish:
  - ellos que habían guardado encerrados
  - los que habían tenido encerrados
  lexicon: LSJ
  rationale: La frase describe la reclusión de los hijos de Israel. «Mantenido encerrados» conserva el encierro reforzado por φυλάξαντες sin volverlo excesivamente explicativo.
- source_word: τοὺς υἱούς σου
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «tus hijos/sons», en español «hijos» puede abarcar la referencia colectiva a Israel y su descendencia. Aquí se mantiene una formulación bíblica clara sin perder el vínculo filial.
- source_word: διʼ ὧν
  english_pob_choice: through whom
  chosen_spanish: por quienes
  alternatives_spanish:
  - a través de quienes
  - mediante quienes
  lexicon: LSJ
  rationale: El antecedente es personal. «Por quienes» expresa instrumentalidad en español fluido y mantiene la referencia a Israel como medio de la revelación.
- source_word: ἤμελλεν ... δίδοσθαι
  english_pob_choice: was about to be given
  chosen_spanish: iba a ser dada
  alternatives_spanish:
  - estaba por ser dada
  - estaba destinada a ser dada
  lexicon: LSJ
  rationale: μέλλω con infinitivo indica inminencia o destino. «Iba a ser dada» preserva el sentido prospectivo desde la narración sin forzar una lectura demasiado técnica.
- source_word: τὸ ἄφθαρτον νόμου φῶς
  english_pob_choice: the imperishable light of the law
  chosen_spanish: la luz imperecedera de la ley
  alternatives_spanish:
  - la luz incorruptible de la ley
  - la luz inmortal de la ley
  lexicon: LSJ
  rationale: 'ἄφθαρτον se traduce mejor como «imperecedera» en español bíblico contemporáneo: mantiene la idea de durabilidad sin introducir una connotación moral ajena al contexto.'
- source_word: τῷ αἰῶνι
  english_pob_choice: to the age
  chosen_spanish: al siglo
  alternatives_spanish:
  - al mundo
  - para siempre
  lexicon: LSJ
  rationale: αἰών en singular puede denotar una era o el orden del mundo. «Al siglo» conserva la singularidad y la ambigüedad entre tiempo y mundo-age; se evita resolverlo prematuramente.
theological_decisions:
- issue: Referencia de «tus hijos» y mediación de la ley
  english_pob_reading: '''Your sons'' refers to Israel, through whom God would give the law''s imperishable light.'
  chosen_spanish_reading: «Tus hijos» refiere a Israel, por medio de quienes sería dada la luz imperecedera de la ley.
  alternative_spanish_readings:
  - «Tus hijos» podría entenderse de forma más general como los descendientes del pueblo.
  - «Por quienes» podría leerse de manera menos directa como referencia a los acontecimientos de la historia de Israel.
  rationale: El antecedente gramatical más cercano de διʼ ὧν es τοὺς υἱούς σου, y el versículo contrapone la opresión de Egipto con el papel de Israel como mediador de la revelación divina. La traducción conserva ese enlace personal.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: Valor de αἰών
  english_pob_reading: Rendered 'the age' in the main text, preserving the Greek's singular breadth.
  chosen_spanish_reading: Se mantiene «al siglo» para preservar la amplitud singular del griego.
  alternative_spanish_readings:
  - al mundo
  - para siempre
  rationale: El término puede tener fuerza temporal o cosmológica. La traducción principal conserva la ambigüedad y la nota permite percibir las otras posibilidades sin decidir por una sola.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Se siguió de cerca el control de auditorio inglés: se mantuvo la estructura causal de apertura, la duplicación de privación/encierro, y la clausula relativa final con el futuro perifrástico. Se ajustó el español para naturalidad pública, preservando la ambigüedad de αἰών y la referencia colectiva a Israel.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en coherencia con el proyecto cuando el contexto lo requiera, pero este versículo no contiene el nombre divino explícito.
  - Se prefirió «ley» para νόμου por ser el referente directo del texto; no se expande a «Torá» porque el griego no lo exige aquí.
  - Se mantuvo «luz» / «oscuridad» como contraste literal y teológico sin alegorizarlo.
  - «Hijos» se traduce como «hijos» en la nota teológica, pero el texto principal usa «hijos»/«hijos» en sentido colectivo; no se neutraliza innecesariamente el parentesco.
