translation:
  language: es
  text: Entonces Abraham tomó a Ismael, su hijo, y a todos los nacidos en su casa, y a todos los comprados con su dinero[a], a todo varón entre los hombres de la casa de Abraham[b], y circuncidó la carne de sus prepucios ese mismo día[c], tal como Dios le había hablado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los adquiridos con su plata»; la frase se refiere a personas compradas e incorporadas a la casa de Abraham.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo varón entre los hombres de la casa de Abraham».'
    reason: previous_rendering
  - marker: c
    text: 'Hebreo: «en este mismo día»; un modismo que subraya que Abraham actuó de inmediato ese mismo día.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «tal como Dios le había dicho».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - llevó consigo
  lexicon: HALOT
  rationale: לקח en narrativa normalmente expresa una acción concreta de tomar. ‘Tomó’ mantiene la inmediatez y la sencillez del relato.
- source_word: יִשְׁמָעֵאל בְּנוֹ
  english_pob_choice: Ishmael his son
  chosen_spanish: Ismael, su hijo
  alternatives_spanish:
  - Ismael su hijo
  - Ismael, su propio hijo
  lexicon: HALOT
  rationale: El posesivo se conserva de forma natural en español y muestra la relación familiar explícita del hebreo.
- source_word: יְלִידֵי בֵיתוֹ
  english_pob_choice: those born in his house
  chosen_spanish: los nacidos en su casa
  alternatives_spanish:
  - los nacidos en su hogar
  - los de su casa nacidos allí
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente ‘nacidos de su casa/household’. ‘Los nacidos en su casa’ preserva la imagen sin añadir una categoría social no explicitada en el verso.
- source_word: מִקְנַת כַּסְפּוֹ
  english_pob_choice: those bought with his money
  chosen_spanish: los comprados con su dinero
  alternatives_spanish:
  - los adquiridos con su plata
  - los comprados con su plata
  lexicon: HALOT
  rationale: El sustantivo indica personas adquiridas por compra. ‘Dinero’ es un equivalente claro y natural en español; ‘plata’ sería posible pero menos neutral.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - cada varón
  - todo macho
  lexicon: HALOT
  rationale: ‘Varón’ expresa bien el sentido humano y masculino del hebreo en un registro digno. En español evita la aspereza de ‘macho’ y mantiene el alcance colectivo de ‘every male’.
- source_word: בְּאַנְשֵׁי בֵּית אַבְרָהָם
  english_pob_choice: among the men of Abraham’s household
  chosen_spanish: entre los hombres de la casa de Abraham
  alternatives_spanish:
  - entre los varones de la casa de Abraham
  - entre los miembros de la casa de Abraham
  lexicon: HALOT
  rationale: אַנְשֵׁי literalmente ‘hombres de’. En español, ‘entre los hombres de la casa de Abraham’ conserva la correspondencia de género y el marco doméstico del hebreo.
- source_word: וַיָּמָל
  english_pob_choice: circumcised
  chosen_spanish: circuncidó
  alternatives_spanish:
  - hizo la circuncisión de
  - cortó el prepucio de
  lexicon: HALOT
  rationale: El verbo técnico se traduce con el verbo usual en español bíblico y contemporáneo. Es preciso y no necesita una paráfrasis más larga.
- source_word: בְּשַׂר עָרְלָתָם
  english_pob_choice: the flesh of their foreskin
  chosen_spanish: la carne de su prepucio
  alternatives_spanish:
  - el prepucio de ellos
  - la carne de su incircuncisión
  lexicon: HALOT
  rationale: La expresión hebrea es corporal y concreta. ‘Carne de su prepucio’ mantiene el carácter material y ritual del original, sin suavizarlo.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on that very day
  chosen_spanish: en aquel mismo día
  alternatives_spanish:
  - ese mismo día
  - en ese mismo día
  lexicon: HALOT
  rationale: La locución enfatiza la ejecución inmediata. ‘En aquel mismo día’ suena natural en español bíblico y conserva la fuerza de la expresión idiomática.
- source_word: כַּאֲשֶׁר דִּבֶּר אִתּוֹ אֱלֹהִים
  english_pob_choice: just as God had spoken to him
  chosen_spanish: tal como Dios le había hablado
  alternatives_spanish:
  - tal como Dios le había dicho
  - como Dios le había hablado
  lexicon: HALOT
  rationale: דבר con אִתּוֹ puede significar ‘hablar con/a’. En español, ‘hablado’ es natural y fiel; ‘le había hablado’ mantiene el vínculo personal del mandato divino.
theological_decisions:
- issue: Renderizar אֱלֹהִים en un contexto narrativo-covenantal
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  - el Señor
  rationale: El contexto de Génesis 17 identifica sin ambigüedad al Dios del pacto hablando con Abraham. ‘Dios’ conserva esa referencia directa sin sustituir el nombre divino por una máscara litúrgica.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: 'La amplitud de la obligación: todos los varones del ámbito doméstico de Abraham'
  english_pob_reading: every male among the men of Abraham’s household
  chosen_spanish_reading: todo varón entre los hombres de la casa de Abraham
  alternative_spanish_readings:
  - todo varón de la casa de Abraham
  - todos los varones de la casa de Abraham
  rationale: El hebreo usa tanto זָכָר (‘varón/macho’) como אַנְשֵׁי (‘hombres de’). La traducción mantiene ese doble señalamiento de sexo masculino sin neutralizarlo en ‘miembros’ o ‘personas’.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La base auditada en inglés pasó por revisiones que ajustaron la redacción de la cláusula de los varones del hogar y de la fórmula final (‘spoken to him’). La versión española adopta una formulación cercana al texto hebreo y al estado revisado del inglés, pero conserva el matiz de ‘hombres/varón’ sin neutralización y mantiene la referencia temporal enfática de ‘en aquel mismo día’.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֱלֹהִים en coherencia con el contexto del pacto.
  - Se mantiene ‘circuncidó’ como verbo técnico, con el complemento corporal ‘la carne de su prepucio’ para conservar el tono concreto del hebreo.
  - ‘Dinero’ traduce כֶּסֶף de manera natural en español; se deja nota alternativa por ‘plata’ dada la posibilidad lexical del original.
  - Se conserva la distinción entre ‘nacidos en su casa’ y ‘comprados con su dinero’ para reflejar las dos categorías del texto hebreo.
  - La expresión ‘todo varón entre los hombres de la casa de Abraham’ procura respetar el masculino explícito de זָכָר y אַנְשֵׁי.
