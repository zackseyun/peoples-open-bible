    text: O 'como ovejas en un redil'. El hebreo בָּצְרָה se lee tradicionalmente como el nombre de lugar 'Bosra', pero algunos lo entienden como una palabra relacionada con un recinto o redil.
    reason: lexical_alternative
  - marker: b
    text: O 'harán bullicio por causa de la gente' / 'se agolparán con gente'. La expresión hebrea es difícil.
    reason: alternative_reading
  revision_rationale: Se corrigió el error grave de español 'a todo ti, Jacob' por 'a todo Jacob', que comunica de manera natural el sentido corporativo del hebreo. Se retiró la nota de intensificación por no ser necesaria en el texto final. También se ajustó la cláusula final a 'harán bullicio con gente', más natural en español y más cercana al texto principal inglés, preservando en nota la alternativa causal y la dificultad del hebreo.
