  language: en
  yaml_path: translation/deuterocanon/sirach/051/001.yaml
  text: I will praise you[a], God of my salvation; I will give thanks to you, God of my father. I will declare your name, the stronghold of my life[c][b], for you have redeemed my soul from death.
  footnotes:
  - marker: a
    text: Or, 'I will recount your name as the stronghold of my life.' The Hebrew phrase may be read appositionally ('your name, the stronghold of my life') or with a slightly more explicit verbal link.
    reason: lexical_alternative
  - marker: b
    text: '''My soul'' may also be rendered ''my life'' or ''my self''; the Hebrew nephesh can carry any of these senses depending on context.'
    reason: lexical_alternative
  - marker: c
    text: The Greek parallel begins, 'I will give thanks to you, Lord King, and I will praise you, God my savior,' reflecting a somewhat different opening formulation than the extant Hebrew.
    reason: textual_variant
