  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue la línea del English POB: mantiene «mi alma», translitera «Seol», conserva «tu fiel» con nota para «tu santo», y preserva la alternativa «corrupción». Sin embargo, hay dos ajustes importantes para mayor fidelidad y naturalidad: לִשְׁאוֹל se expresa mejor como «al Seol» que «en el Seol» tras «abandonar», y שָׁחַת en este contexto poético se vierte mejor como «la fosa» que «el pozo».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «mi alma en el Seol» suena menos natural que «mi alma al Seol», y «el pozo» no es la opción más bíblica ni idiomática en este contexto; «la fosa» comunica mejor el campo semántico de muerte/sepulcro. Además, en las decisiones léxicas aparece el error ortográfico «forsacarás», aunque esto no afecta el texto principal.
  glossary_alignment: 'Buena alineación con las pautas del proyecto: «Seol» como transliteración es correcta; no hay conflictos con terminología como Yahvé/Mesías. «Tu fiel» encaja con la decisión documentada para חֲסִידְךָ, con «tu santo» retenido apropiadamente en nota. La nota sobre «corrupción» preserva bien la relevancia de la LXX y del NT.'
  issues:
  - severity: medium
    issue: Preposición en «mi alma en el Seol»
    rationale: El hebreo לִשְׁאוֹל es direccional («a/al Seol»). Después de «abandonar», el español más fiel y natural es «abandonar ... al Seol», no «en el Seol».
  - severity: medium
    issue: «el pozo» para שָׁחַת
    rationale: Aunque léxicamente posible, «pozo» en español evoca antes un hoyo o un pozo de agua que el ámbito funerario. «La fosa» preserva mejor el paralelismo con «Seol» y la imaginería de muerte/corrupción.
  - severity: low
    issue: 'Error léxico en alternativas: «forsacarás»'
    rationale: La forma correcta sería «desampararás» o «abandonarás»; «forsacarás» no es español estándar. No afecta el texto principal, pero convendría corregirlo en metadatos.
  revised_spanish_text: Porque no abandonarás mi alma al Seol[b], ni permitirás que tu fiel[a] vea la fosa.
