translation:
  language: es
  text: Bendecid al Señor[a], hijos de los hombres; cantadle himnos de alabanza y ensalzadlo sobremanera para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos de hombres» o «seres humanos». El griego dice literalmente «hijos de hombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendigan
  lexicon: BDAG
  rationale: El imperativo plural de εὐλογέω conserva aquí una fuerza doxológica y litúrgica. «Bendecid» mantiene esa relación reverente con Dios y sigue de cerca la elección inglesa «Bless», sin reducirla al más general «alabad».
- source_word: οἱ υἱοὶ τῶν ἀνθρώπων
  english_pob_choice: sons of men
  chosen_spanish: hijos de los hombres
  alternatives_spanish:
  - hijos de humanidad
  - seres humanos
  - hijos de los hombres y mujeres
  lexicon: BDAG
  rationale: La expresión griega es marcadamente masculina e idiomática. «Hijos de los hombres» refleja el giro de modo más directo en español y conserva la tensión de género y de fórmula bíblica que el POB inglés preserva con «sons of men».
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - Yahvé
  lexicon: BDAG
  rationale: En este versículo el griego κύριος funciona como designación reverente de Dios. En español, «el Señor» es la equivalencia natural y litúrgica; no se introduce «Yahvé» porque la fuente griega no usa el nombre divino explícito aquí.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantadle alabanza
  alternatives_spanish:
  - cantad alabanza
  - entonadle un himno
  - alabadlo cantando
  lexicon: BDAG
  rationale: ὑμνέω connota alabar en forma cantada o entonada. «Cantadle alabanza» conserva la dimensión musical y la relación directa con el objeto mediante el dativo implícito del sentido, evitando el calco poco natural «hymn».
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo muy por encima
  alternatives_spanish:
  - exaltadlo grandemente
  - levantadlo en extremo
  - ensalzadlo sobremanera
  lexicon: BDAG
  rationale: El compuesto intensifica la elevación/exaltación. «Exaltadlo muy por encima» intenta reproducir esa fuerza superlativa de manera comprensible en español, manteniendo el énfasis del griego y de la versión inglesa.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por los siglos de los siglos
  - eternamente
  lexicon: BDAG
  rationale: La expresión doxológica apunta a permanencia indefinida. «Para siempre» es la forma más clara y natural en español moderno, equivalente al inglés «forever» y suficiente para el sentido litúrgico del pasaje.
theological_decisions:
- issue: Tratamiento del sustantivo κύριος en un contexto doxológico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Aunque el proyecto normalmente usa «Yahvé» para יהוה, aquí el texto fuente es griego y emplea κύριος. Sin una señal textual adicional del nombre divino hebreo, la lectura española más fiel y transparente es «el Señor», que mantiene el registro reverente sin sobreinterpretar el origen del término.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Preservación de la forma masculina idiomática para la antropología colectiva
  english_pob_reading: sons of men
  chosen_spanish_reading: hijos de los hombres
  alternative_spanish_readings:
  - seres humanos
  - humanidad
  rationale: El griego usa una expresión masculina explícita. Se conserva en español para no neutralizar el matiz formal ni borrar la tensión documentada entre literalidad e idiomatismo, en línea con la política de precisión de género del POB inglés.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El contexto de auditoría indica acuerdo alto y sin revisiones aplicadas; esta propuesta sigue la última versión aprobada sin cambios sustantivos.
  spanish_consistency_notes:
  - Se conservó «el Señor» para κύριος, de acuerdo con el valor reverente del griego y con el auditable del inglés POB.
  - Se mantuvo la fórmula masculina «hijos de los hombres» para reflejar el idiomatismo del original.
  - «Cantadle alabanza» y «exaltadlo muy por encima» buscan naturalidad española sin perder la intensidad doxológica del griego.
