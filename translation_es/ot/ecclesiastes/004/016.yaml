translation:
  language: es
  text: No había fin para todo el pueblo[a], para todos los que estaban antes de ellos; aun así, los que vienen después no se alegrarán en él[b]. Porque también esto es vanidad[c] y afán tras el viento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hay fin de todo el pueblo, de todos los que estaban antes de ellos». La sintaxis hebrea de esta cláusula es difícil y puede entenderse de más de una manera.'
    reason: alternative_reading
  - marker: b
    text: 'O: «no se alegrarán por él» o «no se regocijarán a causa de él».'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hebel», término clave en Eclesiastés para lo que es pasajero, insustancial o frustrante.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין קֵץ
  english_pob_choice: there was no end
  chosen_spanish: No había fin
  alternatives_spanish:
  - No hay fin
  - Sin fin
  lexicon: HALOT
  rationale: La construcción negativa expresa ausencia de límite o de número; en español, el imperfecto 'No había fin' reproduce bien el valor retrospectivo del texto inglés de la POB y mantiene la idea de innumerabilidad sin forzar una paráfrasis.
- source_word: לְכָל הָעָם
  english_pob_choice: to all the people
  chosen_spanish: para todo el pueblo
  alternatives_spanish:
  - de todo el pueblo
  - para toda la gente
  lexicon: HALOT
  rationale: El ל introduce relación/referencia. 'Para todo el pueblo' conserva la estructura relacional y es natural en español, además de evitar perder el matiz colectivo.
- source_word: לְכֹל אֲשֶׁר הָיָה לִפְנֵיהֶם
  english_pob_choice: to all who were before them
  chosen_spanish: para todos los que estaban antes de ellos
  alternatives_spanish:
  - para todos los que fueron antes de ellos
  - para todos los que iban delante de ellos
  lexicon: HALOT
  rationale: La sintaxis hebrea es difícil y ambigua. 'Estaban antes de ellos' mantiene la cercanía formal al hebreo y la ambigüedad referencial sin resolverla más de lo que el texto permite.
- source_word: הָאַחֲרוֹנִים
  english_pob_choice: those who come later
  chosen_spanish: los que vienen después
  alternatives_spanish:
  - los posteriores
  - los que llegan después
  - los últimos
  lexicon: HALOT
  rationale: El adjetivo designa a los posteriores o siguientes. 'Los que vienen después' es idiomático en español y conserva el contraste temporal con los que estaban antes.
- source_word: לֹא יִשְׂמְחוּ בּוֹ
  english_pob_choice: will not rejoice in him
  chosen_spanish: no se alegrarán en él
  alternatives_spanish:
  - no se alegrarán por él
  - no se gozarán en él
  - no se alegrarán sobre él
  lexicon: HALOT
  rationale: '''Se alegrarán'' comunica el verbo de regocijo; ''en él'' sigue de cerca la preposición ב con sufijo, preservando la ambigüedad del referente. Se evita resolverlo como ''por él'' salvo en nota alternativa.'
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: hebel
  alternatives_spanish:
  - vanidad
  - vapor
  - aliento
  lexicon: HALOT
  rationale: Se conserva el término técnico de Eclesiastés como transliteración porque la POB lo trata como palabra teológica/temática clave con carga propia, y la traducción directa 'vanidad' puede estrechar indebidamente su campo semántico.
- source_word: וְרַעְי֥וֹן רוּחַ
  english_pob_choice: a chasing after wind
  chosen_spanish: una persecución del viento
  alternatives_spanish:
  - una carrera tras el viento
  - un afán por el viento
  - una caza del viento
  lexicon: HALOT
  rationale: La imagen expresa búsqueda vana o esfuerzo inútil. 'Persecución del viento' conserva el sustantivo de la imagen y el carácter de esfuerzo infructuoso, evitando una lectura demasiado libre.
theological_decisions:
- issue: Ambigüedad sintáctica y referencial del verso
  english_pob_reading: The pronouns are left somewhat ambiguous, with 'them' and 'him' rendered in a way that most naturally points to the ruler/youth and the people in the immediate context without specifying more than the Hebrew does.
  chosen_spanish_reading: Se mantiene la ambigüedad de los referentes con 'ellos' y 'él', sin identificar explícitamente al gobernante o a la gente más allá de lo que exige el hebreo.
  alternative_spanish_readings:
  - Interpretar de manera explícita al segundo joven que llegó a rey
  - 'Especificar más: ''sobre quienes él gobernaba'''
  rationale: Eclesiastés 4:16 es sintácticamente comprimido y discutido. La versión española conserva la tensión y evita una paráfrasis interpretativa, en línea con la filosofía de la POB de no resolver más de lo que el texto permite.
  doctrine_reference: Translation philosophy §3
- issue: Tratamiento de הֶבֶל como término clave de Eclesiastés
  english_pob_reading: Hebrew 'hebel,' a key term in Ecclesiastes for what is fleeting, insubstantial, or frustrating.
  chosen_spanish_reading: Se deja hebel como término transliterado y se explica en nota su valor temático.
  alternative_spanish_readings:
  - vanidad
  - vanidad pasajera
  - vaciedad
  rationale: En español, 'vanidad' es tradicional pero puede restringir demasiado el sentido. La transliteración preserva la categoría temática central de Eclesiastés y permite explicar su alcance semántico sin perder la conexión literaria del libro.
  doctrine_reference: POB lexical policy on key thematic terms
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB en inglés que prefirió 'those who come later' frente a 'came later' para reflejar mejor el imperfecto hebreo y su sentido general de futuro/presente. En español se adoptó un presente prospectivo ('los que vienen después') compatible con esa revisión y con la ambigüedad original.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la ambigüedad de los pronombres como en el texto fuente.
  - '''Hebel'' se translitera para reflejar su peso técnico en Eclesiastés, en vez de sustituirse por un equivalente único que empobrezca el campo semántico.'
