  spanish_quality_summary: El español es claro, digno y natural. La parábola fluye bien con la estructura de discurso directo anidado. Las tres notas cubren la variación singular/plural, el cambio final al plural y la voz activa con sujeto indefinido.
  glossary_alignment: Sin conflictos. «Reino del Padre», «buena semilla», «cizaña», «cosecha» son coherentes con el rastro auditado.
