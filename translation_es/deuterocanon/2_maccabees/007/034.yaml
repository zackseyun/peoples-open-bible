- from: Pero tú, oh impío[a] y el más inmundo de todos los hombres, no te engrías vanamente, encendido en esperanzas inciertas, habiendo levantado tus manos contra los hijos del cielo.
  to: Pero tú, oh, impío[a] y el más inmundo de todos los hombres, no te engrías vanamente, encendido por esperanzas inciertas, habiendo levantado tus manos contra los hijos del cielo.
  rationale: Se mantiene el sentido y la terminología del borrador, pero se ajusta «encendido en» a «encendido por» para un español más natural, y se pule la puntuación del vocativo. No se requiere adjudicación adicional, porque el ajuste es estilístico y no altera ninguna decisión exegética de fondo.
