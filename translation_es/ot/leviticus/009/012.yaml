translation:
  language: es
  text: Entonces degolló el holocausto, y los hijos de Aarón le trajeron la sangre, y la arrojó[a] contra el altar, por todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la estrelló contra el altar, por todo alrededor». El verbo hebreo para aplicar la sangre sugiere un lanzamiento enérgico, no una aspersión suave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחַט
  english_pob_choice: Then he slaughtered
  chosen_spanish: Entonces él degolló
  alternatives_spanish:
  - Y degolló
  - Entonces sacrificó
  lexicon: HALOT
  rationale: En contexto sacrificial, שָׁחַט se refiere al acto ritual de degollar o inmolar, no a matar en sentido genérico. «Degolló» conserva la fuerza concreta del verbo y evita una paráfrasis más amplia como «sacrificó».
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: עֹלָה es el término cultual fijo para la ofrenda totalmente quemada. «Holocausto» es el equivalente tradicional y comprensible en español bíblico; se conserva el término técnico por su valor sacrificial específico.
- source_word: וַיַּמְצִאוּ
  english_pob_choice: brought
  chosen_spanish: le trajeron
  alternatives_spanish:
  - le presentaron
  - se lo llevaron
  lexicon: HALOT
  rationale: En este procedimiento ritual, los hijos de Aarón acercan la sangre a Aarón para su aplicación sacerdotal. «Le trajeron» expresa con naturalidad el movimiento hacia él sin añadir una interpretación excesiva.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: Aaron’s sons
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  - los hijos de Aarón
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente filial y sacerdotal. Se mantiene «los hijos de Aarón» para conservar el vínculo familiar y cultual sin idiomatizarlo como posesivo moderno.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El pronombre dativo se integra naturalmente en español con el clítico «le», que evita redundancia y mantiene la referencia a Aarón.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre
  lexicon: HALOT
  rationale: Es el objeto directo definido del rito; no requiere ampliación. «La sangre» conserva el valor sacrificial central del pasaje.
- source_word: וַיִּזְרְקֵהוּ
  english_pob_choice: he threw it
  chosen_spanish: la lanzó
  alternatives_spanish:
  - la arrojó
  - la echó
  lexicon: HALOT
  rationale: זָרַק en este contexto describe un lanzamiento enérgico de la sangre sobre el altar. «La lanzó» sigue de cerca la decisión revisada del inglés POB («threw it») y evita debilitar la acción a «rociar» o «salpicar».
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: against the altar
  chosen_spanish: contra el altar
  alternatives_spanish:
  - sobre el altar
  - en el altar
  lexicon: HALOT
  rationale: Con sangre ritual, el hebreo sugiere un movimiento dirigido hacia la superficie/los lados del altar. «Contra» preserva la dirección física y la fuerza del gesto mejor que «sobre».
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: por todos sus lados
  alternatives_spanish:
  - alrededor
  - en derredor
  lexicon: HALOT
  rationale: סָבִיב distribuye la acción alrededor del altar. «Por todos sus lados» comunica de manera clara y concreta la extensión completa del gesto ritual.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo masorético de Levítico 9:12 y toma en cuenta la revisión del inglés POB que sustituyó «splashed» por «threw» para reflejar con más exactitud וַיִּזְרְקֵהוּ. Se preserva esa intensidad en español con «la lanzó».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto solo cuando el hebreo lo demande; este versículo no contiene el Tetragrámaton.
  - Se usa «holocausto» como término cultual establecido para עֹלָה, coherente con el registro bíblico en español.
  - Se conserva la secuencia narrativa simple con «Entonces» para reflejar el waw consecutivo sin sobrecargar la sintaxis.
  - «Los hijos de Aarón» se mantiene literal para preservar la designación sacerdotal y familiar.
  - La construcción «la lanzó contra el altar» conserva la imagen física del hebreo y evita suavizar el verbo a una aspersión ligera.
