translation:
  language: es
  text: No volverá a la tierra de Egipto[a], pero Asiria será su rey, porque han rehusado volver[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No volverá a la tierra de Egipto, pero Asiria—él será su rey». El hebreo tiene una construcción comprimida que también puede representarse de manera más formal.'
    reason: lexical_alternative
  - marker: b
    text: «Volver» en la cláusula final también puede tener el sentido de «volverse atrás» o «arrepentirse». El hebreo conserva tanto matices físicos como espirituales.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יָשׁוּב
  english_pob_choice: He will not return
  chosen_spanish: Él no volverá
  alternatives_spanish:
  - Él no regresará
  - No volverá
  lexicon: HALOT
  rationale: El imperfecto con negación se vierte en futuro profético. "Volver" preserva el enlace léxico con el infinitivo final לָשׁוּב y mantiene la tensión entre regreso físico y retorno covenantal sin resolverla.
- source_word: אֶל אֶרֶץ מִצְרַיִם
  english_pob_choice: to the land of Egypt
  chosen_spanish: a la tierra de Egipto
  alternatives_spanish:
  - a Egipto
  lexicon: HALOT
  rationale: Se conserva la preposición y el sustantivo "tierra" para reflejar de forma más completa la construcción hebrea y su resonancia histórica con el éxodo y la esclavitud.
- source_word: וְאַשּׁוּר
  english_pob_choice: but Assyria
  chosen_spanish: pero Asiria
  alternatives_spanish:
  - y Asiria
  - sino Asiria
  lexicon: HALOT
  rationale: El וְ se entiende adversativamente por el contraste del contexto. "Pero" comunica con claridad la oposición entre Egipto y Asiria sin suavizar la estructura del hebreo.
- source_word: הוּא מַלְכּוֹ
  english_pob_choice: will be his king
  chosen_spanish: será su rey
  alternatives_spanish:
  - es su rey
  - él—Asiria—será su rey
  lexicon: HALOT
  rationale: La cláusula nominal se expresa en futuro para el valor profético del pasaje. "Su rey" conserva la metáfora de dominación extranjera sin explicarla en exceso.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introducir la razón con "porque" es natural en español y refleja la función causal del término hebreo.
- source_word: מֵאֲנ֖וּ
  english_pob_choice: they have refused
  chosen_spanish: se han negado
  alternatives_spanish:
  - se negaron
  - han rehusado
  lexicon: HALOT
  rationale: El perfecto plural transmite una negativa persistente con relevancia presente. En español, "se han negado" comunica bien la resistencia obstinada del sujeto implícito sin añadirlo artificialmente.
- source_word: לָשׁוּב
  english_pob_choice: to return
  chosen_spanish: a volver
  alternatives_spanish:
  - a regresar
  - a volver atrás
  - a arrepentirse
  lexicon: HALOT
  rationale: Se mantiene "volver" para conservar la repetición léxica con el verbo inicial y la ambigüedad entre retorno físico y giro interior. "Arrepentirse" explicitaría demasiado el matiz espiritual y no queda exigido por el hebreo.
theological_decisions:
- issue: Ambigüedad de שוב / retorno en ambos miembros de la frase
  english_pob_reading: Maintain 'return' in both clauses, allowing both geographic and covenantal resonance.
  chosen_spanish_reading: Mantener "volver" en ambos miembros, dejando abierta la resonancia geográfica y covenantal.
  alternative_spanish_readings:
  - usar "regresar" en la primera cláusula y "arrepentirse" en la última
  - desambiguar como solo retorno geográfico
  rationale: Hosea explota la repetición de שוב. Conservar el mismo verbo en español preserva la tensión documentada por la POB inglesa entre regreso literal y retorno al pacto, en lugar de resolverla con una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Sujeto plural implícito de "se han negado"
  english_pob_reading: Translate with plural 'they' while leaving the antecedent implicit as Israel/the people.
  chosen_spanish_reading: Traducir en plural sin explicitar el antecedente.
  alternative_spanish_readings:
  - '"mi pueblo se ha negado"'
  - '"Israel se ha negado"'
  rationale: El hebreo tiene verbo plural sin sujeto explícito en esta cláusula. Mantener la impersonalidad relativa evita introducir un sujeto tomado del contexto inmediato y respeta la forma del texto base.
  doctrine_reference: Original-language primacy over translation tradition; never paraphrase beyond what the source warrants.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que sustituyó «instead» por «but» para reflejar con mayor directitud la conjunción hebrea adversativa. También conserva el paralelismo léxico de «return/volver» en ambos miembros, como indicaba el audit trail.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando corresponda; en este versículo no aparece el nombre divino.
  - '"Asiria" se translitera de forma estándar para el topónimo.'
  - Se prefirió "volver" frente a "regresar" para conservar la repetición verbal y la ambigüedad teológica del hebreo.
  - El texto evita añadir un sujeto explícito, en línea con el plural implícito del hebreo.
