review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: «los diez hijos de Amán… mataron; pero no echaron mano al botín». Conserva adecuadamente la apposición «hijo de Hamdatá/Hammedata» y «enemigo de los judíos», y el giro adversativo para el waw coordinante es defendible por contraste discursivo. Sin embargo, la nota al pie está mal anclada y no preserva la alternativa del inglés POB, que contrapone «plunder» con «spoil», no el nombre propio.'
  spanish_quality_summary: El español es natural y legible. «No echaron mano al botín» comunica bien el modismo hebreo. Conviene ajustar la transliteración a «Amán» por uso bíblico estándar en español y corregir la ubicación de la nota al pie para evitar ambigüedad. También es mejor poner la nota sobre «botín», no sobre «Hamdatá».
  glossary_alignment: 'No hay términos del glosario maestro especialmente controvertidos aquí. «Enemigo», «judíos» y el modismo verbal están bien. La principal desalineación está en la nota léxica: debe explicar «botín» / «despojo», no el nombre propio.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «Hamdatá» pero su contenido dice «O «botín».»
    rationale: El marcador debe aparecer exactamente en la palabra o frase a la que corresponde. Tal como está, induce a pensar que la nota comenta el nombre propio, cuando en realidad comenta בִּזָּה.
  - severity: medium
    issue: La nota léxica española no preserva bien la alternativa documentada en el audit trail inglés.
    rationale: El inglés POB ofrece «Or 'spoil.'» como alternativa a «plunder». En español, la equivalencia natural es «O «despojo»», no «O «botín»», porque «botín» ya es la palabra elegida en el texto principal.
  - severity: low
    issue: La forma «Haman» podría adaptarse mejor al uso español como «Amán».
    rationale: Aunque la transliteración no altera el sentido, «Amán» es la forma bíblica asentada y más natural para lectores hispanohablantes. Es una mejora de legibilidad y convenciones ortográficas del español.
  revised_spanish_text: los diez hijos de Amán, hijo de Hamdatá, el enemigo de los judíos, mataron; pero no echaron mano al botín[a].
