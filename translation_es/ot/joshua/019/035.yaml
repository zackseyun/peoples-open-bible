translation:
  language: es
  text: Y las ciudades fortificadas eran Ziddim[a], Zer, Hammath, Rakkath y Kinnereth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciudades fortaleza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עָרֵי
  english_pob_choice: And the ... cities
  chosen_spanish: Y las ciudades
  alternatives_spanish:
  - Ahora las ciudades
  - Y las ... ciudades
  lexicon: HALOT
  rationale: El hebreo continúa una lista territorial; en español, "Y" conserva la coordinación. Como el sustantivo está en constructo, "las ciudades" completa de manera natural la idea sin añadir información no presente en la fuente.
- source_word: מִבְצָר
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - fortaleza
  - de fortaleza
  - fuertes
  lexicon: HALOT
  rationale: 'En la construcción con "ciudades", el sentido es adjetival: ciudades protegidas militarmente. "Fortificadas" mantiene ese valor y es más natural que un calco como "ciudades de fortaleza".'
- source_word: הַ/צִּדִּים
  english_pob_choice: Ziddim
  chosen_spanish: Ziddim
  alternatives_spanish:
  - los Ziddim
  - Zidim
  lexicon: HALOT
  rationale: Es un topónimo. Se translitera en lugar de traducirse; se omite el artículo hebreo porque en español no suele mantenerse en nombres de ciudades dentro de una lista.
- source_word: צֵר
  english_pob_choice: Zer
  chosen_spanish: Zer
  alternatives_spanish:
  - Zeir
  lexicon: HALOT
  rationale: Topónimo transliterado de forma directa y breve, conforme al valor consonántico del hebreo y al uso habitual en español bíblico.
- source_word: וְ/חַמַּת
  english_pob_choice: and Hammath
  chosen_spanish: Hammat
  alternatives_spanish:
  - Hamát
  - Jammat
  lexicon: HALOT
  rationale: Se conserva como nombre propio. "Hammat" refleja la geminación del hebreo y evita confundir esta localidad con otras formas afines en la Biblia.
- source_word: רַקַּת
  english_pob_choice: Rakkath
  chosen_spanish: Rakat
  alternatives_spanish:
  - Rakkat
  lexicon: HALOT
  rationale: Topónimo transliterado con simplificación ortográfica razonable para español. Se preserva la consonante duplicada en la pronunciación sin forzar una grafía ajena al sistema español.
- source_word: וְ/כִנָּֽרֶת
  english_pob_choice: and Kinnereth
  chosen_spanish: Kinéret
  alternatives_spanish:
  - Kinneret
  - Quinéret
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación mínima a la ortografía española para facilitar la lectura, manteniendo la referencia al topónimo bíblico.
theological_decisions:
- issue: Topónimos con artículo hebreo prefijado
  english_pob_reading: The English POB omits the article in the place names and transliterates the towns straightforwardly.
  chosen_spanish_reading: Se omite el artículo en los nombres propios y se conserva la lista de ciudades como topónimos.
  alternative_spanish_readings:
  - los Ziddim
  - la Ziddim
  rationale: En español, el artículo hebreo no aporta una distinción teológica aquí; mantenerlo sonaría artificial. La decisión sigue el tratamiento auditado del POB en inglés y respeta el carácter de lista geográfica.
  doctrine_reference: Toponimia bíblica; no hay afirmación doctrinal en el verso.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo de control muestra alto acuerdo; por tanto, el borrador sigue la solución estable del POB inglés sin introducir ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene la transliteración de los topónimos como nombres propios, sin traducirlos.
  - '"Fortificadas" conserva el matiz militar de מִבְצָר mejor que una equivalencia más literal pero menos natural.'
  - Se usa puntuación española estándar con coma serial antes de "y" solo donde corresponde al ritmo de lista; aquí se conserva una enumeración simple sin comas internas excesivas.
