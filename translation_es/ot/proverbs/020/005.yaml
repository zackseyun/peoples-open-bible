revisions:
- from: Las aguas[a] profundas son el consejo en el corazón de un hombre, pero el hombre de entendimiento lo saca.
  to: El consejo en el corazón de un hombre es como aguas profundas[a], pero un hombre de entendimiento lo extrae.
  rationale: Se reordena la primera cola para reflejar con mayor naturalidad y fidelidad la metáfora hebrea en español. Se conserva «aguas profundas» como texto principal, pero se ajusta la nota para registrar la alternativa singular colectiva en español, en paralelo con la decisión auditada del inglés POB. Se cambia «lo saca» por «lo extrae» para expresar mejor el matiz de sacar algo como de aguas hondas.
