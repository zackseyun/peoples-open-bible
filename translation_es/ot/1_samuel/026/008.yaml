    rationale: La POB inglesa auditada optó por «pin him to the earth». Aunque «atravesarlo» no es imposible, «clavarlo al suelo con la lanza» refleja mejor la construcción hebrea «con la lanza y en la tierra» y la nota explicativa existente.
  revised_spanish_text: 'Entonces Abisay dijo a David[a]: «Dios ha entregado hoy a tu enemigo en tu mano. Así que ahora, por favor, déjame clavarlo al suelo con la lanza de un solo golpe[b], y no le daré un segundo golpe.»'
  revised_footnotes:
