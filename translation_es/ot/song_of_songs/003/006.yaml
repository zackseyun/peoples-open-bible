    text: O «como pilares de humo».
    reason: lexical_alternative
  - marker: b
    text: O «de toda clase de polvos aromáticos del mercader».
    reason: lexical_alternative
  - marker: c
    text: «La soledad» también puede traducirse «el desierto». Además, el hebreo puede expresarse como «¿Quién es ella, la que sube...?» porque usa un demostrativo femenino.
    reason: lexical_alternative
  revision_rationale: Se corrige el texto para reflejar mejor el sentido amplio de מִדְבָּר, mejorar la naturalidad del sintagma final en español, y reparar las notas para que preserven alternativas reales del audit trail con marcadores correctamente anclados. Se mantiene «columnas de humo», «perfumada», «mirra» e «incienso» por fidelidad y buena legibilidad poética.
