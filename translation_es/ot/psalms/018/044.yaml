    issue: «que no conocía» para לֹא יָדַעְתִּי
    rationale: El imperfecto español sugiere más naturalmente una acción pasada en progreso o habitual, mientras que el perfecto hebreo aquí, según el audit trail, expresa mejor una no familiaridad previa con resultado vigente. «Que no he conocido» preserva mejor ese valor y se alinea con la decisión inglesa documentada.
  - severity: low
