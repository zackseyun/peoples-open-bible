    rationale: El proverbio expresa un resultado general; en español, «sale» comunica mejor la verdad proverbial, en línea con el inglés auditado «comes out».
  - severity: medium
    issue: «vaso» para כֶּלִי
    rationale: «Vaso» en español suele referirse a un recipiente para beber y resulta más específico que el hebreo. «Vasija» preserva mejor la amplitud de כֶּלִי sin perder la imagen concreta.
  - severity: medium
