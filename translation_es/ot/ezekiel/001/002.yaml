translation:
  language: es
  text: A los cinco del mes—era el quinto año del exilio del rey Joaquín—[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la deportación». גָּלוּת puede denotar exilio o deportación; aquí se traduce «exilio» por ser la referencia cronológica más amplia e idiomática.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/חֲמִשָּׁה
  english_pob_choice: On the fifth day
  chosen_spanish: A los cinco días
  alternatives_spanish:
  - El quinto día
  - A los cinco del mes
  lexicon: HALOT
  rationale: La fórmula hebrea de fecha usa ב con el cardinal para indicar el día de una fecha. En español, «a los cinco días» transmite de manera natural esa referencia calendárica sin forzar una construcción extraña; «el quinto día» también sería posible, pero «a los cinco días» encaja mejor con el valor adverbial de la fecha.
- source_word: לַ/חֹדֶשׁ
  english_pob_choice: of the month
  chosen_spanish: del mes
  alternatives_spanish:
  - del mes
  - del mes lunar
  lexicon: HALOT
  rationale: חֹדֶשׁ en estas fórmulas cronológicas se refiere al mes calendario. «Del mes» conserva la relación constructa y es idiomático en español.
- source_word: הִיא
  english_pob_choice: it was
  chosen_spanish: era
  alternatives_spanish:
  - era
  - esto era
  lexicon: HALOT
  rationale: El pronombre independiente funciona de forma resumptiva y enfática. En español, «era» reproduce de manera natural esa transición explicativa sin añadir elementos innecesarios.
- source_word: הַ/שָּׁנָה הַ/חֲמִישִׁית
  english_pob_choice: the fifth year
  chosen_spanish: el quinto año
  alternatives_spanish:
  - el quinto año
  lexicon: HALOT
  rationale: La expresión ordinal es directa; «el quinto año» mantiene el sentido cronológico con normalidad en español.
- source_word: לְ/גָל֖וּת
  english_pob_choice: of the exile
  chosen_spanish: del cautiverio
  alternatives_spanish:
  - del exilio
  - de la deportación
  lexicon: HALOT
  rationale: גָּלוּת puede abarcar exilio y deportación. Aquí se opta por «cautiverio» porque en español comunica con claridad el estado de destierro impuesto al rey y evita la posible ambigüedad de «exilio» como experiencia voluntaria o meramente geográfica. Aun así, se preserva el alcance semántico de la cronología ligada a la condición de deportado.
- source_word: הַ/מֶּ֥לֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  - Rey
  lexicon: HALOT
  rationale: El hebreo lleva artículo en la construcción; en español conviene expresar «el rey» dentro del genitivo para conservar la relación sintáctica y la claridad.
- source_word: יוֹיָכִֽין
  english_pob_choice: Jehoiachin
  chosen_spanish: Joaquín
  alternatives_spanish:
  - Jeconías
  - Jehoiaquín
  lexicon: Standard Spanish biblical onomastics
  rationale: En español bíblico, el nombre del rey se conoce normalmente como «Joaquín». Esta forma es reconocible para lectores hispanohablantes y mantiene la identidad del personaje histórico. «Jehoiaquín» sería más transliterado, pero menos idiomático; «Jeconías» es una variante bíblica posible, aunque menos directa para este pasaje.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: la fecha se mantiene con valor cronológico idiomático, la pronombre resumptivo se conserva con un verbo español natural, y la ambigüedad de גָּלוּת se registra en nota para no borrar la alternativa ‘deportación’. No hubo revisiones aplicadas en el contexto inglés, por lo que no se incorporan cambios textuales adicionales.'
  spanish_consistency_notes:
  - Se usa «cautiverio» como equivalente interpretativo de גָּלוּת, con nota alternativa para «deportación».
  - Se mantiene «el rey» con artículo para reflejar la construcción hebrea sin sonar forzado en español.
  - El nombre propio se adapta a la forma bíblica usual en español («Joaquín») para legibilidad e identificación canónica.
