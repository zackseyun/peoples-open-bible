      text: Literally, ‘He said, “The Lord …”’; rendered ‘The Lord said’ to reflect
        the quoted subject and avoid redundancy in English.
      reason: dialect_note
    - marker: b
      text: ⲡⲕⲱⲧⲉ and ⲡϫⲱⲧⲉ are agent nouns meaning ‘seller’ and ‘buyer’ respectively;
        thus ‘sellers and buyers.’
      reason: lexical_alternative
    - marker: c
      text: ⲗⲁⲁⲩ can denote a ‘solitary’ or ‘single one’ (often with ascetic nuance
        in Thomas). The number may be collective; hence ‘the solitary’ is used as
        a technical term.
      reason: cultural_note
    - marker: d
      text: ϣⲱⲛⲉ denotes a ‘storehouse’ or ‘granary’; ‘storehouse’ is chosen to keep
        the sense general.
      reason: lexical_alternative
