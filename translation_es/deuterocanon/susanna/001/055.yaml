translation:
  language: es
  text: 'Entonces Daniel dijo: «Has mentido rectamente[a] contra tu propia cabeza; porque ya un ángel de Dios, después de recibir una sentencia[b] de parte de Dios, te partirá por la mitad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «has mentido bien/correctamente contra tu propia cabeza». El giro es probablemente irónico: la falsa acusación hace que el juicio vuelva sobre quien la pronuncia.'
    reason: lexical_alternative
  - marker: b
    text: O «después de recibir una decisión/orden de parte de Dios». El término griego puede indicar un pronunciamiento o una sentencia judicial; aquí el sentido judicial encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀρθῶς
  english_pob_choice: rightly
  chosen_spanish: justamente
  alternatives_spanish:
  - rectamente
  - bien
  lexicon: LSJ
  rationale: 'Se conserva la ironía del griego: la mentira “acierta” en devolver el juicio sobre el propio culpable. «Justamente» comunica ese sentido con naturalidad en español sin debilitar la carga retórica.'
- source_word: ἔψευσαι
  english_pob_choice: you have lied
  chosen_spanish: has mentido
  alternatives_spanish:
  - mentiste
  - has hablado falsamente
  lexicon: LSJ
  rationale: El aoristo medio de ψεύδομαι se vierte de forma idiomática como «has mentido», manteniendo el tono acusatorio directo del contexto judicial.
- source_word: εἰς τὴν σεαυτοῦ κεφαλήν
  english_pob_choice: against your own head
  chosen_spanish: contra tu propia cabeza
  alternatives_spanish:
  - sobre tu propia cabeza
  - para tu propia ruina
  lexicon: LSJ
  rationale: Se conserva la imagen concreta de la cabeza y la fuerza adversativa de la expresión, en vez de reemplazarla por una paráfrasis más abstracta.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ahora
  lexicon: LSJ
  rationale: «Ya» expresa la inmediatez de la sentencia en español con la misma función temporal y enfática del griego.
- source_word: ἄγγελος τοῦ θεοῦ
  english_pob_choice: an angel of God
  chosen_spanish: un ángel de Dios
  alternatives_spanish:
  - el ángel de Dios
  lexicon: LSJ
  rationale: El griego no lleva artículo ante ἄγγελος; por eso se mantiene «un ángel de Dios», preservando la referencia no articulada del texto fuente.
- source_word: λαβὼν φάσιν
  english_pob_choice: having received a sentence
  chosen_spanish: habiendo recibido una sentencia
  alternatives_spanish:
  - habiendo recibido un mandato
  - habiendo recibido una decisión
  lexicon: LSJ
  rationale: En este contexto de juicio, φάσις se entiende mejor como pronunciamiento judicial. «Sentencia» conserva ese matiz legal y punitivo que el audit trail inglés prioriza.
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - de parte de Dios mismo
  lexicon: LSJ
  rationale: «De parte de Dios» expresa con mayor claridad la procedencia y la autorización de la sentencia que el simple «de Dios».
- source_word: σχίσει σε μέσον
  english_pob_choice: will split you in two
  chosen_spanish: te partirá por la mitad
  alternatives_spanish:
  - te dividirá en dos
  - te cortará por la mitad
  lexicon: LSJ
  rationale: «Partir por la mitad» transmite con fuerza y claridad el valor de σχίζω + μέσον, manteniendo la violencia de la imagen sin sonar artificial en español.
theological_decisions:
- issue: Agencia del juicio divino mediante un ángel
  english_pob_reading: The verse presents an angel of God as the agent of divine judgment, executing a sentence received from God.
  chosen_spanish_reading: El versículo presenta a un ángel de Dios como agente del juicio divino, ejecutando una sentencia recibida de Dios.
  alternative_spanish_readings:
  - El versículo solo anuncia el juicio divino de manera general.
  - La frase puede leerse como una metáfora del juicio inminente, sin describir un agente literal.
  rationale: La traducción conserva la agencia concreta del ángel y el carácter judicial de la frase, en línea con el griego y con la lectura auditada en inglés; no se diluye en una abstracción que el texto no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en inglés, que prefirió «rightly» sobre «correctly» para Ὀρθῶς por ser más natural y formal. También se mantuvo la decisión de conservar la imagen de la cabeza y el lenguaje forense de φάσις como «sentencia», evitando una paráfrasis más general del juicio.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «ángel de Dios» para ἄγγελος τοῦ θεοῦ, sin introducir «SEÑOR» ni una formulación tradicional que oculte la construcción griega.
  - La expresión «contra tu propia cabeza» conserva la metáfora corporal del original; «por la mitad» reproduce la fuerza de σχίσει σε μέσον en un español natural.
  - El tono general es formal y bíblico, pero se evita el arcaísmo innecesario para facilitar lectura pública en español contemporáneo.
