translation:
  language: es
  text: El sonido de una noticia—¡he aquí, viene!—, un gran estruendo[a] desde la tierra del norte, para convertir las ciudades de Judá en una desolación, en morada[b] de chacales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran sacudimiento» o «un gran tumulto». El término hebreo puede denotar sacudimiento, ruido o conmoción.
    reason: lexical_alternative
  - marker: b
    text: O «guarida de chacales». La imagen apunta a un lugar de habitación para animales del desierto en una ciudad desolada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֤וֹל
  english_pob_choice: The sound of
  chosen_spanish: El sonido de
  alternatives_spanish:
  - La voz de
  - El ruido de
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, voz o ruido. En esta construcción con שְׁמוּעָה, ‘el sonido de’ conserva la fórmula idiomática sin personificarla como una voz hablante.
- source_word: שְׁמוּעָה֙
  english_pob_choice: a report
  chosen_spanish: un anuncio
  alternatives_spanish:
  - una noticia
  - un reporte
  - un rumor
  lexicon: HALOT
  rationale: שְׁמוּעָה remite a algo oído, normalmente una noticia o reporte. ‘Anuncio’ funciona en español bíblico con un tono sobrio y comunica el carácter de una comunicación que llega, sin la posible connotación de incertidumbre que tendría ‘rumor’.
- source_word: הִנֵּ֣ה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: HALOT
  rationale: הִנֵּה es una partícula deíctica que llama la atención. ‘He aquí’ conserva el registro formal que el POB inglés también reforzó al revisar ‘look’ por ‘behold’.
- source_word: בָאָ֔ה
  english_pob_choice: it is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - se acerca
  lexicon: HALOT
  rationale: El perfecto con הִנֵּה suele tener fuerza inminente o presente. ‘Viene’ es la forma española más natural y mantiene la inminencia del peligro.
- source_word: וְ/רַ֥עַשׁ גָּד֖וֹל
  english_pob_choice: a great commotion
  chosen_spanish: un gran estruendo
  alternatives_spanish:
  - un gran sacudimiento
  - un gran tumulto
  - un gran ruido
  lexicon: HALOT
  rationale: רַעַשׁ puede designar sacudimiento, ruido o tumulto. ‘Estruendo’ comunica a la vez ruido fuerte y conmoción, y en español suena menos abstracto que ‘comoción’.
- source_word: מֵ/אֶ֣רֶץ צָפ֑וֹן
  english_pob_choice: from the land of the north
  chosen_spanish: desde la tierra del norte
  alternatives_spanish:
  - desde la tierra septentrional
  - desde el país del norte
  lexicon: HALOT
  rationale: La construcción literal es ‘desde la tierra del norte’. ‘Tierra’ es más natural que ‘land’ traducido como ‘país’, y mantiene el motivo profético de invasión desde el norte.
- source_word: לָ/שׂ֞וּם
  english_pob_choice: to make
  chosen_spanish: para convertir
  alternatives_spanish:
  - para hacer
  - para tornar
  lexicon: HALOT
  rationale: שׂוּם, con objeto y complemento predicativo, funciona idiomáticamente como ‘hacer/convertir en’. ‘Convertir en’ expresa bien el cambio de estado de las ciudades sin perder la fuerza del verbo.
- source_word: עָרֵ֧י יְהוּדָ֛ה
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - las ciudades de Judea
  lexicon: HALOT
  rationale: Es un nombre propio territorial/político; se translitera como ‘Judá’ y no se reemplaza por una forma eclesiástica tradicional.
- source_word: שְׁמָמָ֖ה
  english_pob_choice: a desolation
  chosen_spanish: en una desolación
  alternatives_spanish:
  - en desolación
  - en ruina
  lexicon: HALOT
  rationale: שְׁמָמָה es un sustantivo de desolación o devastación. ‘En una desolación’ preserva su fuerza nominal y el registro profético.
- source_word: מְע֥וֹן
  english_pob_choice: a haunt of
  chosen_spanish: morada
  alternatives_spanish:
  - morada de
  - habitación de
  - guarida de
  lexicon: HALOT
  rationale: מָעוֹן denota un lugar de habitación. En español, ‘morada de’ o ‘guarida de’ pueden sonar más marcadas; aquí ‘morada’ sostiene la imagen de un lugar habitado por animales salvajes sin añadir tono extra no exigido por el hebreo.
- source_word: תַּנִּֽים
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - dragones
  - serpientes
  - canes salvajes
  lexicon: HALOT
  rationale: En fórmulas proféticas de desolación, תַּנִּים se entiende normalmente como chacales. ‘Dragones’ refleja tradición antigua, pero no es el sentido zoológico más probable en español moderno.
theological_decisions:
- issue: Forma del nombre divino no presente explícitamente aquí, pero el marco profético usa el motivo del juicio de Yahvé
  english_pob_reading: No explicit divine name in the verse; the verse functions within a YHWH-judgment context elsewhere in Jeremiah.
  chosen_spanish_reading: No se introduce ningún equivalente divino aquí, porque el versículo no contiene יהוה de forma explícita.
  alternative_spanish_readings:
  - insertar ‘Yahvé’ por contexto
  - usar ‘el Señor’ por tradición
  rationale: No hay base textual para añadir el nombre divino en este versículo. Se mantiene estrictamente lo que el hebreo presenta, sin importar una formulación devocional ajena al texto.
  doctrine_reference: 'DOCTRINE.md: no add words absent from the source; preserve textual economy.'
translation_notes:
  revision_awareness: 'Seguí el texto hebreo directamente y tomé en cuenta el audit trail inglés: se mantuvo la estructura poética, la deixis de הִנֵּה con un registro formal (‘he aquí’), la lectura inminente de בָאָה, y la interpretación zoológica de תַּנִּים como ‘chacales’. También se respetó la revisión inglesa que elevó ‘look’ a ‘behold’.'
  spanish_consistency_notes:
  - ‘Judá’ se usa como nombre propio territorial, no como apelativo religioso.
  - ‘he aquí’ conserva el tono solemne y deíctico de הִנֵּה.
  - ‘chacales’ evita el arcaísmo de ‘dragones’ y coincide con el sentido contextual de desolación.
  - Se eligieron equivalentes de registro bíblico pero en español natural, evitando calcos innecesarios.
