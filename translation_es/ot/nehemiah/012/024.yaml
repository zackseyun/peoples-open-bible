translation:
  language: es
  text: Y los jefes de los levitas fueron Hasabías, Serebías y Jesúa hijo de Cadmiel, con sus hermanos frente a ellos[a], para alabar y dar gracias conforme al mandamiento de David, el hombre de Dios[b], turno correspondiente a turno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enfrente de ellos» o «correspondiente a ellos». La frase probablemente describe grupos levíticos dispuestos uno frente a otro o en correspondencia litúrgica.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «turno correspondiente a turno», probablemente una referencia a divisiones de servicio o estaciones litúrgicas alternadas.'
    reason: cultural_note
lexical_decisions:
- source_word: רָאשֵׁי
  english_pob_choice: heads of
  chosen_spanish: jefes de
  alternatives_spanish:
  - cabezas de
  - líderes de
  lexicon: HALOT
  rationale: En español, «jefes de» comunica bien la idea de personas en posición principal dentro del grupo, sin perder la noción de liderazgo que el hebreo expresa con «cabezas de».
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Es el término cultual e identitario normal en español bíblico y resulta claro y natural.
- source_word: וְיֵשׁוּעַ בֶּן קַדְמִיאֵל
  english_pob_choice: Jeshua son of Kadmiel
  chosen_spanish: Jesúa hijo de Cadmiel
  alternatives_spanish:
  - Jesúa, hijo de Cadmiel
  lexicon: HALOT
  rationale: Se conserva el patronímico explícito «hijo de» como en el audit trail inglés, y se translitera el nombre en forma bíblica española usual.
- source_word: וַאֲחֵיהֶם
  english_pob_choice: with their brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - y sus hermanos
  lexicon: HALOT
  rationale: «Con sus hermanos» refleja la relación de acompañamiento del grupo sin convertir la conjunción en una simple suma coordinada.
- source_word: לְנֶגְדָּם
  english_pob_choice: opposite them
  chosen_spanish: frente a ellos
  alternatives_spanish:
  - enfrente de ellos
  - opuestos a ellos
  lexicon: HALOT
  rationale: «Frente a ellos» mantiene la orientación relacional/posicional y permite la posible idea de disposición litúrgica recíproca sin forzarla.
- source_word: לְהַלֵּל לְהוֹדֹות
  english_pob_choice: to praise and to give thanks
  chosen_spanish: para alabar y dar gracias
  alternatives_spanish:
  - para alabar y para dar gracias
  - para alabar y agradecer
  lexicon: HALOT
  rationale: Se conserva el paralelismo verbal. «Dar gracias» traduce con claridad הוֹדֹות sin diluirlo en una sola idea general.
- source_word: בְּמִצְוַת
  english_pob_choice: according to the command of
  chosen_spanish: conforme al mandamiento de
  alternatives_spanish:
  - según el mandamiento de
  - de acuerdo con el mandamiento de
  lexicon: HALOT
  rationale: «Conforme al mandamiento de» expresa adecuadamente la conformidad normativa del hebreo sin sonar rígidamente literal.
- source_word: דָּוִיד אִישׁ הָאֱלֹהִים
  english_pob_choice: David the man of God
  chosen_spanish: David, el hombre de Dios
  alternatives_spanish:
  - David el hombre de Dios
  lexicon: HALOT
  rationale: Se mantiene el título bíblico tradicional con puntuación natural en español y sin expandir su contenido.
- source_word: מִשְׁמָר לְעֻמַּת מִשְׁמָר
  english_pob_choice: watch corresponding to watch
  chosen_spanish: turno correspondiente a turno
  alternatives_spanish:
  - guardia correspondiente a guardia
  - curso correspondiente a curso
  - servicio correspondiente a servicio
  lexicon: HALOT
  rationale: «Turno» comunica de forma natural la idea de una división o rotación de servicio cultual; «correspondiente a» preserva la relación estructural repetida del hebreo sin resolverla de más. Se evita «guardia» porque en español sugiere vigilancia militar y no el contexto levítico.
theological_decisions:
- issue: Término kinship plural masculino אֲחֵיהֶם
  english_pob_reading: brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus compañeros levitas
  rationale: Se conserva el masculino plural explícito del hebreo y la lectura del audit trail inglés, evitando neutralizar el término sin base textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fórmula cultual elíptica מִשְׁמָר לְעֻמַּת מִשְׁמָר
  english_pob_reading: watch corresponding to watch
  chosen_spanish_reading: turno correspondiente a turno
  alternative_spanish_readings:
  - servicio correspondiente a servicio
  - división correspondiente a división
  rationale: La frase se mantiene elíptica y estructural, reflejando una organización levítica coordinada o alternada sin introducir una interpretación más específica que la admitida por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que los marcadores de nota [a] y [b] aparezcan exactamente en el texto español donde corresponden.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología predeterminada del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usó «levitas» para הַלְוִיִּם por claridad y naturalidad en español bíblico.
  - Se preservó el paralelismo verbal y nominal del hebreo sin convertir la frase final en una explicación interpretativa más extensa.
