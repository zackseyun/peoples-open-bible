    issue: «Con los bienes de los pobres» podría, en abstracto, sonar un poco más instrumental que estrictamente de origen.
    rationale: El griego ἐκ marca procedencia/origen, y una alternativa como «de los bienes de los pobres» sería algo más literal. Sin embargo, «con» en español comunica bien el medio culpable y no distorsiona el sentido en este contexto.
