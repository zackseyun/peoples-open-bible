base_translation:
  language: en
  yaml_path: translation/ot/numbers/001/022.yaml
  text: 'For the sons of Simeon[a], by their generations, by their clans, by their fathers’ houses, those numbered of them, by the number of names, head by head, every male from twenty years old and upward[c][b], everyone going out to war:'
  footnotes:
  - marker: a
    text: Or “those mustered from them” for “those numbered of them”; the Hebrew participle from פקד can carry census or muster nuance in this military-count context.
    reason: lexical_alternative
  - marker: b
    text: Literally “by their skulls/heads,” an idiom meaning individual counting, rendered here as “head by head.”
    reason: cultural_note
  - marker: c
    text: Or “everyone fit for military service”; the Hebrew reads more literally, “everyone going out to war.”
    reason: lexical_alternative
