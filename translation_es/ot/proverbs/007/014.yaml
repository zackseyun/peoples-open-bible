translation:
  language: es
  text: Las ofrendas de paz[a] me correspondían; hoy he pagado mis votos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrendas de comunión'. El hebreo se refiere a sacrificios de paz o bienestar, de los cuales podía comerse la carne después del sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִבְחֵי שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - sacrificios de paz
  - ofrendas de bienestar
  - ofrendas de comunión
  lexicon: HALOT
  rationale: La frase hebrea designa ofrendas sacrificiales ligadas a paz/bienestar. "Ofrendas de paz" conserva el valor cultual de manera natural en español y sigue de cerca la decisión inglesa sin sustituirla por una fórmula eclesiástica más interpretativa.
- source_word: עָלַי
  english_pob_choice: due from me
  chosen_spanish: eran debidas de mí
  alternatives_spanish:
  - estaban sobre mí
  - me incumbían
  - eran míos
  lexicon: HALOT
  rationale: El hebreo con עַל + sufijo de 1ª persona expresa que tales ofrendas recaían sobre la hablante / estaban a su cargo. "Eran debidas de mí" intenta conservar esa tensión de obligación/presencia en un español comprensible, sin borrar el matiz del texto fuente.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Adverbio temporal directo. "Hoy" es la opción más natural y fiel en español contemporáneo.
- source_word: שִׁלַּמְתִּי
  english_pob_choice: I have paid
  chosen_spanish: he pagado
  alternatives_spanish:
  - pagué
  - he cumplido
  lexicon: HALOT
  rationale: 'El piel de שׁלם aquí se usa en relación con votos: pagar/abonar lo prometido. "He pagado" reproduce la acción completada con relevancia actual y mantiene el enlace verbal con los votos.'
- source_word: נְדָרַי
  english_pob_choice: my vows
  chosen_spanish: mis votos
  alternatives_spanish:
  - mis promesas votivas
  - mis votos hechos a Dios
  lexicon: HALOT
  rationale: נדר son votos. "Votos" es la forma más precisa y natural en español bíblico; evita añadir especificaciones que el hebreo no explicita, como "hechos a Dios".
theological_decisions:
- issue: Lenguaje sacrificial usado en una escena de seducción
  english_pob_reading: Retain explicit sacrificial/vow language without softening or moralizing.
  chosen_spanish_reading: Mantener el lenguaje sacrificial y de votos sin suavizarlo ni convertirlo en una referencia genérica a comida o a una situación doméstica.
  alternative_spanish_readings:
  - Hice una comida y ya está pagada mi promesa
  - Tenía comida conmigo; hoy cumplí mis promesas
  rationale: El pasaje presenta a la mujer usando lenguaje legítimo de culto para dar respetabilidad a su invitación. La traducción debe conservar esa tensión literaria y moral, sin ocultar el marco sacrificial ni añadir explicación interpretativa en el texto principal.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada desde una formulación más literal de la presencia de las ofrendas hacia "Peace offerings were due from me", para reflejar mejor עָלַי. La redacción española adopta esa misma orientación: no dice simplemente que las tenía consigo, sino que eran debidas/recaían sobre ella, mientras conserva el paralelo con "hoy he pagado mis votos".'
  spanish_consistency_notes:
  - Se ha preferido "ofrendas de paz" para mantener coherencia con la terminología sacrificial estándar del proyecto, sin reemplazarla por "sacrificios de comunión" en el texto principal.
  - '"Votos" se mantiene para נדר, coherente con el uso bíblico común en español y con el paralelismo interno del versículo.'
  - La nota[a] se ancla en "ofrendas de paz" para preservar la alternativa lexical documentada por el auditor inglés.
