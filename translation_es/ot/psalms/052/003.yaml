    issue: Equivalente de חֶסֶד como «fidelidad amorosa»
    rationale: Aunque semánticamente defendible, en español bíblico general resulta poco idiomático y más pesado que «amor fiel» o «amor constante». «Amor fiel» comunica con claridad la lealtad amorosa/covenantal sin sonar forzado.
  - severity: low
    issue: Verbo «dura» en «La fidelidad amorosa de Dios dura todo el día»
    rationale: No es incorrecto, pero «permanece» o «es constante» expresa mejor una cláusula nominal de permanencia/continuidad y suena más natural en registro bíblico moderno.
