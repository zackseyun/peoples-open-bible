lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron
  lexicon: HALOT
  rationale: El verbo ענה en este contexto introduce la réplica en diálogo. «Respondieron» conserva el valor narrativo y suena natural en español; «contestaron» sería posible, pero aquí la formulación más neutra mantiene mejor el tono de la escena.
- source_word: בְנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Heth
  alternatives_spanish:
  - los hititas
  - los descendientes de Heth
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea literal «hijos de Heth», porque el texto nombra al grupo por filiación y no solo por equivalencia étnica. «Hititas» es una alternativa contextual, pero borra la forma de parentesco que el hebreo conserva.
- source_word: אֶת אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - a Abraham
  lexicon: —
  rationale: El marcador de objeto directo אֶת no se traduce; en español la referencia a Abraham queda clara por el verbo de respuesta y el contexto inmediato.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - y le dijeron
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo. «Diciendo» preserva esa estructura de manera natural en español; no se expande a una coordinación que el hebreo no exige.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - le
  lexicon: HALOT
  rationale: El sufijo pronominal con ל indica el destinatario del habla. En español puede expresarse explícitamente como «a él»; en una línea publicada también sería posible omitirlo o naturalizarlo como «le», pero aquí se mantiene la referencia visible en el fluir del verso.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y el hebreo: conserva la expresión genealógica «hijos de Heth», mantiene el encuadre discursivo con «diciendo», y no añade elementos que el texto no incluye. No hay revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «respondieron» como equivalente narrativo estándar para ענה en diálogo.
  - Se preserva la referencia genealógica «Heth» en el cuerpo y se ofrece «los hititas» solo como alternativa en nota.
  - El encuadre de habla directa queda intacto con «diciendo:».
  - No se traduce el objeto directo marcado por אֶת, conforme al uso normal del español.
