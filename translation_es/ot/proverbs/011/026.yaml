base_translation:
  language: en
  yaml_path: translation/ot/proverbs/011/026.yaml
  text: The one who withholds grain—the people curse him[b][a], but blessing is on the head of the one who sells it.
  footnotes:
  - marker: a
    text: Or 'the nation' or 'the populace' curse him; Hebrew לְאֹם can denote a people-group or the public collectively.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who distributes grain'; the Hebrew participle can emphasize supplying grain, though in context it commonly refers to selling/provisioning rather than hoarding.
    reason: lexical_alternative
