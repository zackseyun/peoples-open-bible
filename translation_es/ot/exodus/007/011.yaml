translation:
  language: es
  text: Entonces el faraón también llamó a los sabios y a los hechiceros[a], y ellos también, los magos de Egipto, hicieron lo mismo con sus encantamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con sus encantamientos». El hebreo puede referirse a artes ocultas o a encantamientos; el matiz exacto no es seguro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called for
  chosen_spanish: llamó a
  alternatives_spanish:
  - convocó a
  - mandó llamar a
  lexicon: HALOT
  rationale: En este contexto, קרא expresa una acción de hacer venir ante sí. En español, «llamó a» comunica bien la convocatoria sin volverlo demasiado técnico; «convocó a» y «mandó llamar a» también son posibles, pero la primera suena algo más administrativa y la segunda más expansiva de lo necesario.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - asimismo
  lexicon: HALOT
  rationale: Aquí marca que Faraón responde con una acción paralela. «También» conserva esa relación de continuidad de manera natural en español.
- source_word: חֲכָמִים
  english_pob_choice: wise men
  chosen_spanish: sabios
  alternatives_spanish:
  - hombres sabios
  - sabios de la corte
  lexicon: HALOT
  rationale: El término designa expertos o consejeros entendidos, no simplemente personas moralmente prudentes. «Sabios» es breve y natural en español; «hombres sabios» suena redundante, y «sabios de la corte» añade una precisión que el hebreo no explicita.
- source_word: מְכַשְּׁפִים
  english_pob_choice: sorcerers
  chosen_spanish: hechiceros
  alternatives_spanish:
  - brujos
  - mágicos
  lexicon: HALOT
  rationale: El verbo/participio de כשׁף remite a practicantes de hechicería o encantamiento. «Hechiceros» mantiene ese campo semántico en un registro bíblico inteligible; «brujos» puede sonar más coloquial o peyorativo, y «mágicos» no es suficientemente preciso.
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - realizaron
  - actuaron
  lexicon: HALOT
  rationale: Con כֵּן, la idea es que imitaron la acción precedente. «Hicieron lo mismo» expresa mejor la repetición de la señal que un simple «hicieron» aislado.
- source_word: גַם הֵם
  english_pob_choice: they too
  chosen_spanish: ellos también
  alternatives_spanish:
  - también ellos
  - también
  lexicon: HALOT
  rationale: La combinación refuerza la imitación por parte de los especialistas egipcios. «Ellos también» reproduce ese énfasis de forma natural en español.
- source_word: חַרְטֻמֵּי מִצְרַיִם
  english_pob_choice: the magicians of Egypt
  chosen_spanish: los magos de Egipto
  alternatives_spanish:
  - los magos egipcios
  - los hechiceros de Egipto
  lexicon: HALOT
  rationale: חַרְטֻמִּים es el término característico de Éxodo para los especialistas rituales de Faraón. En español, «magos» es el equivalente narrativo más reconocido para este grupo dentro de este contexto; «hechiceros de Egipto» confundiría con מְכַשְּׁפִים y borraría la distinción del texto.
- source_word: בְּלַהֲטֵיהֶם
  english_pob_choice: by their enchantments
  chosen_spanish: con sus encantamientos
  alternatives_spanish:
  - por sus encantamientos
  - mediante sus encantamientos
  - con sus artes ocultas
  lexicon: HALOT
  rationale: El hebreo permite entender el medio por el cual imitaron la acción. «Con sus encantamientos» sigue de cerca la opción inglesa revisada y suena natural en español; «mediante» es correcto pero más técnico, y «artes ocultas» introduce una interpretación más amplia que el término concreto no obliga a expresar.
- source_word: כֵּן
  english_pob_choice: the same
  chosen_spanish: lo mismo
  alternatives_spanish:
  - así
  - de igual manera
  lexicon: HALOT
  rationale: El adverbio remite a la acción precedente y señala imitación. «Hicieron lo mismo» explicita ese referente en español sin sobreinterpretarlo.
theological_decisions:
- issue: Naturaleza del poder de los especialistas egipcios
  english_pob_reading: Use phenomenological language without specifying whether the act was demonic power, illusion, or trickery.
  chosen_spanish_reading: 'Usar lenguaje fenoménico: «hicieron lo mismo con sus encantamientos», sin precisar si hubo poder demoníaco, ilusión o engaño.'
  alternative_spanish_readings:
  - hicieron un verdadero signo sobrenatural
  - lo hicieron por pura ilusión o engaño
  rationale: El hebreo afirma que replicaron la acción por medio de לַהֲטֵיהֶם, pero no explica el mecanismo metafísico. La traducción debe conservar la afirmación narrativa sin importar una explicación doctrinal que el texto no da.
  doctrine_reference: Principios de traducción §1, §3
- issue: Distinción entre מְכַשְּׁפִים y חַרְטֻמֵּי מִצְרַיִם
  english_pob_reading: 'Render as distinct categories: ''sorcerers'' and ''the magicians of Egypt''.'
  chosen_spanish_reading: Mantener la distinción entre «hechiceros» y «los magos de Egipto».
  alternative_spanish_readings:
  - hechiceros y magos
  - brujos y magos
  rationale: El texto distingue dos grupos relacionados pero no idénticos. En español conviene conservar esa diferencia léxica para no borrar la tensión documental del pasaje.
  doctrine_reference: Principios de traducción §2
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'secret arts' por 'enchantments' para reflejar más directamente el término hebreo y suavizó la puntuación. La versión española sigue ese ajuste con «encantamientos», manteniendo además la distinción entre מְכַשְּׁפִים y חַרְטֻמֵּי מִצְרַיִם.
  spanish_consistency_notes:
  - Se mantuvo «Faraón» en minúscula salvo inicio de oración, conforme al uso español estándar y la práctica del proyecto.
  - Se preservó la diferenciación contextual entre «hechiceros» y «magos de Egipto» para no fusionar dos términos hebreos distintos.
  - «Encantamientos» se usa para לַהֲטֵיהֶם porque conserva la ambigüedad del medio sin imponer una explicación técnica no explícita en el texto.
