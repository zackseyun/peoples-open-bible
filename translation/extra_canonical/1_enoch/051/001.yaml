translation:
  text: And in those days the earth will give back from its womb[c][b][a], and Sheol will give back what it has received,
    .
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will bring forth from her womb.' The Ge'ez verb can be understood as yielding up what has been held within.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the realm of the dead in ancient Jewish usage, not necessarily the later concept of hell.
    reason: cultural_note
  - marker: c
    text: Or 'from her womb'.
    reason: previous_rendering
lexical_decisions:
- source_word: በእማንቱ መዋዕል
  chosen: in those days
  alternatives:
  - in those times
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Standard temporal apocalyptic formula; 'days' preserves the repeated visionary cadence better than the smoother
    'times'.
- source_word: ታገብእ
  chosen: will give back
  alternatives:
  - will return
  - will bring forth
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The verb appears twice and denotes yielding up what was previously contained. 'Give back' preserves the sense
    of restoration/release more clearly than the more generic 'bring forth'.
- source_word: ምድርኒ
  chosen: the earth
  alternatives:
  - the land
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: In this resurrection-judgment context the cosmic scope favors 'earth' rather than the narrower 'land'.
- source_word: ማኅፀንታ
  chosen: from her womb
  alternatives:
  - her belly
  - her inner parts
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The noun evokes a womb or interior cavity. 'Womb' preserves the striking apocalyptic image of the earth as a
    mother-like container of the dead.
- source_word: ሲኦል
  chosen: Sheol
  alternatives:
  - the underworld
  - the grave
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A transliterated rendering best preserves the Jewish apocalyptic term without collapsing it into either a purely
    physical grave or later Christian hell-language.
- source_word: ዘተመጠወት
  chosen: what it has received
  alternatives:
  - what was entrusted to it
  - what had been committed to it
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The passive-derived form suggests what has been deposited or handed over to Sheol. 'Received' is clear English
    and fits the imagery of Sheol as a keeper of the dead.
