translation:
  language: es
  text: Porque muchas son las especulaciones[a] de los hijos del hombre[b], y las imaginaciones malas hacen errar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pensamientos', 'razonamientos' o 'suposiciones'. El hebreo usa un término raro; el paralelo griego favorece el sentido de nociones formadas por uno mismo.
    reason: alternative_reading
  - marker: b
    text: O 'seres humanos' o 'gente'. El hebreo dice literalmente 'los hijos del hombre', una expresión genérica para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶשְׁתּוֹנֵי / ὑπόλημψις
  english_pob_choice: speculations
  chosen_spanish: especulaciones
  alternatives_spanish:
  - pensamientos
  - razonamientos
  - suposiciones
  - opiniones
  lexicon: HALOT; Greek ὑπόλημψις
  rationale: La expresión hebrea es rara y algo incierta; el paralelo griego apunta a ideas formadas por uno mismo, con tono de presunción o conjetura. 'Especulaciones' conserva ese matiz de construcción mental no fiable, y suena natural en español bíblico moderno.
- source_word: בְּנֵי אָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos de hombre
  alternatives_spanish:
  - los seres humanos
  - la gente
  - los hijos del hombre
  lexicon: HALOT
  rationale: Se mantiene la expresión semítica y su valor genérico para la humanidad, en línea con la decisión inglesa de no aplanarla a un genérico abstracto. En español, 'hijos de hombre' es comprensible dentro del registro bíblico y preserva la forma del hebreo.
- source_word: דִמְיוֹנוֹת
  english_pob_choice: imaginings
  chosen_spanish: imaginaciones
  alternatives_spanish:
  - imaginaciones
  - imaginarios
  - nociones
  lexicon: HALOT
  rationale: El sustantivo remite a productos de la mente; 'imaginaciones' refleja bien la carga cognitiva y el matiz negativo del contexto. Se evita 'fantasías' por sonar más libre que el hebreo.
- source_word: רָעוֹת
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - malignas
  - perversas
  lexicon: HALOT
  rationale: En español, 'malas' comunica el valor moral sin endurecer demasiado el tono. 'Evil' en inglés se vierte aquí con un adjetivo sobrio y claro, compatible con la línea poética.
- source_word: מַתְעוֹת
  english_pob_choice: lead astray
  chosen_spanish: desvían
  alternatives_spanish:
  - desvían del camino
  - despistan
  - engañan
  - hacen errar
  lexicon: HALOT
  rationale: 'El verbo hebreo es causativo: estas imaginaciones no solo existen, sino que desorientan activamente. ''Desvían'' reproduce la idea de apartar del camino y concuerda con la imagen de error del griego ἐπλάνησεν/ὠλίσθησεν.'
theological_decisions:
- issue: Expresión antropológica representativa בְּנֵי אָדָם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos de hombre
  alternative_spanish_readings:
  - los seres humanos
  - la gente
  rationale: Se preserva la fórmula masculina representativa del hebreo, sin convertirla en un plural abstracto. No se trata de un título cristológico sino de una referencia genérica a la humanidad.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Relación entre hebreo y paralelo griego en la segunda cola
  english_pob_reading: evil imaginings lead astray
  chosen_spanish_reading: las imaginaciones malas desvían
  alternative_spanish_readings:
  - las imaginaciones malas engañan
  - las malas imaginaciones hacen errar
  rationale: La traducción conserva la fuerza causal del hebreo y deja visible la tensión con el griego, que añade la imagen de 'hacer resbalar' las disposiciones mentales. 'Desvían' resume ambas direcciones sin borrar el matiz de extravío.
  doctrine_reference: Uso de fuentes paralelas en Sirácida; criterio de equivalencia óptima
translation_notes:
  revision_awareness: Se ha seguido el estado de revisión más reciente indicado como sin cambios; no se detectaron ajustes posteriores que alteren el sentido base. La redacción española toma como fuente primaria el hebreo de Kahana y como control el paralelo griego de Swete, manteniendo la tensión lexical señalada por la auditoría inglesa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponde; en este versículo no aparece el nombre divino.
  - '''Especulaciones'' se reservó para la primera cola por la nota auditada sobre עֶשְׁתּוֹנֵי.'
  - Se conservó el registro bíblico sin volver la expresión antropológica a un genérico moderno.
  - '''Desvían'' mantiene la imagen de extravío sin añadir sujetos implícitos inexistentes en el hebreo.'
