revisions:
- from: 'Entonces todo el pueblo que estaba en la puerta[a], y los ancianos, dijeron: «Somos testigos. Yahvé haga a la mujer que entra en tu casa como Raquel y Lea, las cuales juntas edificaron la casa de Israel. Y prospera[b] en Efrata, y proclama un nombre en Belén».'
  to: 'Entonces todo el pueblo que estaba en la puerta y los ancianos dijeron: «Somos testigos. Que Yahvé haga a la mujer que entra en tu casa como Raquel y Lea, que juntas edificaron la casa de Israel. Y que prosperes[a] en Efrata, y te hagas un nombre en Belén».'
  rationale: Se ajustó la bendición al modo natural del español («Que Yahvé...», «que prosperes»), se reemplazó un calco poco idiomático («proclama un nombre») por una expresión española fiel al sentido del modismo («te hagas un nombre»), y se simplificó la sintaxis para mayor claridad y naturalidad sin perder el contenido del hebreo ni la terminología del proyecto.
