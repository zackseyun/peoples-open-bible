- from: 'Abadón y Muerte dicen[a]: «Con nuestros oídos hemos oído un informe de ella».'
  to: 'Abadón y Muerte dicen[a]: «Con nuestros oídos hemos oído noticias de ella».'
  rationale: Se conserva toda la estructura y las decisiones teológicas/poéticas del borrador, pero se reemplaza «un informe de ella» por «noticias de ella» para representar mejor שִׁמְעָהּ en español natural y digno, manteniendo la idea de conocimiento de segunda mano y el referente femenino a la sabiduría. No se requiere una nota nueva; la alternativa ya documentada sigue siendo válida.
