translation:
  language: es
  text: Mi alma anhela—sí, aun desfallece—por los atrios de Yahvé; mi corazón y mi carne claman de gozo[a] al Dios vivo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gritan de júbilo» / «cantan de júbilo». El verbo hebreo puede expresar un clamor jubiloso o un canto resonante; aquí se traduce «claman de gozo» para conservar mejor, en este contexto, la intensidad del anhelo dirigida al Dios vivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְסְפָה
  english_pob_choice: longs
  chosen_spanish: anhela
  alternatives_spanish:
  - suspira por
  - desea intensamente
  lexicon: HALOT
  rationale: El verbo expresa deseo intenso y prolongado. «Anhela» comunica ese impulso con naturalidad en español y mantiene la fuerza afectiva del hebreo.
- source_word: וְגַם
  english_pob_choice: indeed, it even
  chosen_spanish: y aun
  alternatives_spanish:
  - además
  - sí, aun
  lexicon: HALOT
  rationale: La partícula añade intensidad, no solo suma una acción. «Y aun» conserva ese refuerzo climáctico de manera sobria y clara.
- source_word: כָּלְתָה
  english_pob_choice: faints
  chosen_spanish: desfallece
  alternatives_spanish:
  - se consume
  - se agota
  - padece
  lexicon: HALOT
  rationale: En este contexto de deseo por la presencia de Dios, el verbo sugiere agotamiento o consumición por anhelo. «Desfallece» preserva esa intensidad sin exagerar.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: «Alma» es el equivalente más directo y natural aquí para el yo interior que anhela; mantiene la correspondencia tradicional sin perder claridad.
- source_word: לְחַצְרוֹת
  english_pob_choice: for the courts
  chosen_spanish: por los atrios
  alternatives_spanish:
  - para los atrios
  - por los patios del templo
  lexicon: HALOT
  rationale: En español, «atrios» comunica bien el espacio sagrado del templo. «Por» refleja el movimiento de anhelo hacia ese lugar mejor que un mero dativo estático.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, conforme al criterio del proyecto. «Yahvé» es la forma española establecida para la transliteración de יְהוָה, en vez de sustituirla por un título.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser interior
  lexicon: HALOT
  rationale: «Corazón» expresa el centro de la voluntad y el deseo en español bíblico contemporáneo, y reproduce bien el paralelo con «alma» y «carne».
- source_word: וּבְשָׂרִי
  english_pob_choice: and my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: HALOT
  rationale: «Carne» preserva la carga lexical del hebreo y el contraste poético con «corazón». «Cuerpo» suavizaría una tensión que el texto conserva.
- source_word: יְרַנְּנוּ
  english_pob_choice: cry out
  chosen_spanish: cantan de júbilo
  alternatives_spanish:
  - claman con gozo
  - entonan gritos de júbilo
  - se regocijan y cantan
  lexicon: HALOT
  rationale: El verbo puede denotar un clamor jubiloso o canto de alegría. Dado que el contexto está cargado de deseo por Dios, «cantan de júbilo» mantiene la lectura gozosa y sonora sin perder el matiz de exclamación.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: 'La preposición se conserva como dirección objetiva en español: «al Dios vivo». Esto refleja con fidelidad el movimiento del hebreo sin forzar una construcción menos natural.'
- source_word: אֵל חָי
  english_pob_choice: the living God
  chosen_spanish: Dios vivo
  alternatives_spanish:
  - el Dios viviente
  lexicon: HALOT
  rationale: «Dios vivo» es la formulación más idiomática y fiel en español. «Viviente» sería posible, pero «vivo» conserva mejor la naturalidad y la fuerza del epíteto bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragramatón directamente. En la edición española se conserva el nombre propio «Yahvé» para no ocultar el nombre revelado de Dios bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: יְרַנְּנוּ en un contexto de anhelo
  english_pob_reading: cry out
  chosen_spanish_reading: cantan de júbilo
  alternative_spanish_readings:
  - claman
  - gritan de gozo
  - cantan
  rationale: El verbo hebreo puede abarcar un clamor gozoso. En este versículo, el paralelismo con el intenso deseo del primer hemistiquio permite una traducción jubilosa sin perder la idea de vocalización exuberante.
  doctrine_reference: 'Poética hebrea: verbo de júbilo con posible tensión entre ‘clamar’ y ‘cantar’'
translation_notes:
  revision_awareness: El audit trail inglés revisó la preposición final desde ‘for the living God’ a ‘to the living God’ para reflejar con mayor precisión אֶל. En español se preserva esa dirección con «al Dios vivo». También se mantuvo la decisión doctrinal de traducir יְהוָה como «Yahvé» y se optó por una solución poética para יְרַנְּנוּ que reconoce su posible doble valor de gozo y clamor.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Atrios» refleja el espacio cultual del templo y evita una paráfrasis amplia.
  - «Mi alma / mi corazón / mi carne» conserva el paralelismo antropológico del hebreo.
  - El marcador [a] se coloca solo en la frase con la alternativa léxica sobre יְרַנְּנוּ.
  - La preposición «al» conserva la dirección de אֶל sin añadir interpretación teológica indebida.
