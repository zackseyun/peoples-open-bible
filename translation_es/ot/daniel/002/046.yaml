translation:
  language: es
  text: Entonces el rey Nabucodonosor cayó sobre su rostro y rindió homenaje[a] a Daniel, y ordenó[b] que se le ofrecieran una ofrenda y incienso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "se postró ante Daniel" o "lo adoró". El verbo arameo puede denotar postración o reverencia; aquí "rindió homenaje" evita afirmar sin matiz una adoración divina y conserva el gesto cortesano extremo.'
    reason: alternative_reading
  - marker: b
    text: El verbo subyacente sugiere más específicamente derramar una libación para él.
    reason: lexical_alternative
  - marker: c
    text: 'O: "aromas agradables" o "aromas fragantes". El plural puede referirse a fragancias placenteras asociadas a la ofrenda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  - Entonces, en seguida
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la siguiente acción en secuencia; "Entonces" conserva la fluidez narrativa en español sin añadir énfasis innecesario.
- source_word: מַלְכָּא נְבוּכַדְנֶצַּר
  english_pob_choice: King Nebuchadnezzar
  chosen_spanish: el rey Nabucodonosor
  alternatives_spanish:
  - el rey, Nabucodonosor
  - Nabucodonosor, el rey
  lexicon: HALOT
  rationale: La apposición se naturaliza como título más nombre propio en español, manteniendo la identificación real.
- source_word: נְפַל עַל אַנְפּוֹהִי
  english_pob_choice: fell on his face
  chosen_spanish: cayó sobre su rostro
  alternatives_spanish:
  - se postró con el rostro en tierra
  - se echó rostro en tierra
  lexicon: HALOT
  rationale: La imagen física se preserva sin suavizarse; "cayó sobre su rostro" es idiomático en español bíblico y mantiene la vividez del hebreo/arameo.
- source_word: סְגִד
  english_pob_choice: paid homage
  chosen_spanish: rindió homenaje
  alternatives_spanish:
  - se postró ante Daniel
  - adoró a Daniel
  - se inclinó ante Daniel
  lexicon: HALOT
  rationale: El verbo puede abarcar postración y reverencia cortesana. "Rindió homenaje" evita cargar el texto con una lectura de adoración divina que no exige el arameo, preservando la tensión teológica documentada.
- source_word: מִנְחָה
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - un regalo
  - tributo
  - una ofrenda sacrificial
  lexicon: HALOT
  rationale: Término amplio para presente/ofrenda; en este contexto culto-cortesano, "ofrenda" mantiene la resonancia sacrificial sin especificar indebidamente el tipo.
- source_word: נִיחֹחִין
  english_pob_choice: incense
  chosen_spanish: perfumes
  alternatives_spanish:
  - incienso
  - aromas fragantes
  - aromas agradables
  lexicon: HALOT
  rationale: El plural sugiere aromas agradables o fragancias asociadas al acto de ofrecer. "Perfumes" permite una lectura amplia y evita forzar "incienso" si el término apunta más a aromas placenteros que a una sustancia específica.
- source_word: אֲמַר לְנַסָּכָה לֵהּ
  english_pob_choice: he commanded that an offering and incense be offered to him
  chosen_spanish: ordenó que se le ofrecieran una ofrenda y perfumes
  alternatives_spanish:
  - mandó que se le derramara una libación
  - mandó que se le ofreciera una libación
  - ordenó que le presentaran una ofrenda y aromas
  lexicon: HALOT
  rationale: La construcción idiomática de "decir/mandar para derramar" se expresa de forma natural con "ordenó que se le ofrecieran". Se conserva el sentido de ofrenda dirigida a Daniel sin introducir una precisión ritual no asegurada por el contexto inmediato.
theological_decisions:
- issue: Si סְגִד debe traducirse como adoración divina o como reverencia/homenaje humano
  english_pob_reading: paid homage
  chosen_spanish_reading: rindió homenaje
  alternative_spanish_readings:
  - adoró a Daniel
  - se postró ante Daniel
  - le rindió pleitesía
  rationale: El contexto narrativo permite postración reverente ante un agente humano de revelación. "Rindió homenaje" preserva esa ambigüedad sin resolverla en adoración divina, siguiendo la cautela del POB en inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue el pasaje fuente y la auditoría inglesa de POB, incorporando la revisión posterior que hizo más formal el mandato y más directa la relación con la ofrenda. En español se mantiene ese equilibrio entre formalidad y claridad, pero se evita precisar "incienso" donde el plural arameo permite también "perfumes"/"aromas".
  spanish_consistency_notes:
  - Se conserva "Yahvé" solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se evita "adoró" en el texto principal para no resolver la tensión teológica del verbo סְגִד.
  - '"Rostro" reproduce la imagen corporal de la expresión idiomática sin rebajarla a una paráfrasis abstracta.'
  - '"Ofrecieran" mantiene el pasivo de destinatario en español y refleja la orden del rey con registro bíblico actual.'
