    text: Or 'racecourse' for 'hippodrome.' The Greek term refers specifically to a horse-racing venue before the city.
    reason: lexical_alternative
  - marker: b
    text: The final clause likely means they were to be kept from contact with the king's troops and denied even a proper enclosed lodging or protective compound.
    reason: lexical_alternative
