revisions:
- from: Porque no contenderé para siempre[a], ni estaré enojado sin fin; porque el espíritu se desmayaría delante de mí[b], y las respiraciones que yo he hecho.
  to: Porque no contenderé para siempre[a], ni estaré enojado sin fin; porque el espíritu se desmayaría ante mí[b], y los alientos[c] que yo he hecho.
  rationale: Se reemplaza «respiraciones» por «alientos» para mantener la imagen concreta del hebreo נְשָׁמוֹת con un español natural y eclesialmente legible. Se añade una nota para documentar las alternativas interpretativas preservadas en el rastro de auditoría inglés. También se ajusta «delante de mí» a «ante mí» por fluidez poética, sin cambiar el sentido.
