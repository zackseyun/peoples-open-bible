  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la pregunta retórica sobre confiar en un λῃστής equipado y errante, seguida por la comparación con un hombre sin residencia fija. Conserva adecuadamente la metáfora de «nido» para νοσσιάν y el sentido temporal de οὗ ἐὰν ὀψίσῃ. Sin embargo, «ladrón» debilita λῃστῇ, que en este contexto es más bien «salteador/bandido/robador» que un simple thief; además, «¿Pues quién confiará...?» suena menos natural en español bíblico moderno que «Porque ¿quién confiará...?» o simplemente «¿Quién confiará...?» con conservación implícita de γάρ.'
  spanish_quality_summary: 'El español es claro y mayormente natural. «Tambaleándose de ciudad en ciudad» funciona bien, así como «no tiene nido» y «dondequiera que la noche lo sorprenda». El ajuste principal es léxico-estilístico: reemplazar «ladrón» por «salteador» para reflejar mejor λῃστής y mejorar el tono proverbial. También conviene suavizar el arranque interrogativo para evitar la colocación algo forzada de «pues».'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La decisión principal de glosario/lexicografía es λῃστής: el proyecto inglés documenta «robber», no «thief»; en español «salteador» o «bandido» se alinean mejor que «ladrón». La conservación de «nido» para νοσσιάν está bien alineada con la rationale auditada.'
