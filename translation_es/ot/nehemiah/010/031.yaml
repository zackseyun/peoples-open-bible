translation:
  language: es
  text: y que no daremos nuestras hijas a los pueblos de la tierra[a], ni tomaremos sus hijas para nuestros hijos varones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa el plural «pueblos»; algunas traducciones suavizan la expresión al singular «pueblo».
    reason: lexical_alternative
  - marker: b
    text: Aquí «tomar» se refiere a tomar en matrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  english_pob_choice: and that
  chosen_spanish: y que
  alternatives_spanish:
  - y
  - que
  - y que si
  lexicon: HALOT
  rationale: La conjunción relativa introduce otra cláusula comprometida por el juramento previo; en español, «y que» conserva la conexión y el valor subordinante sin endurecer la sintaxis.
- source_word: נִתֵּן
  english_pob_choice: we will not give
  chosen_spanish: no daremos
  alternatives_spanish:
  - no damos
  - no demos
  - no entregaremos
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es imperfectiva, aquí expresa una promesa jurada futura. «No daremos» mantiene ese valor de compromiso sin perder naturalidad.
- source_word: בְּנֹתֵינוּ
  english_pob_choice: our daughters
  chosen_spanish: nuestras hijas
  alternatives_spanish:
  - nuestras дочtras
  - nuestras hijas
  lexicon: HALOT
  rationale: Es una equivalencia directa y transparente del sustantivo posesivo plural; la referencia matrimonial del contexto hace innecesaria una ampliación.
- source_word: לְעַמֵּי הָאָרֶץ
  english_pob_choice: to the peoples of the land
  chosen_spanish: a los pueblos de la tierra
  alternatives_spanish:
  - al pueblo de la tierra
  - a los pueblos de la tierra
  lexicon: HALOT
  rationale: Se conserva el plural hebreo עַמֵּי con «pueblos», no con singular, y se traduce la expresión idiomática con «de la tierra» sin interpretarla en el texto principal.
- source_word: וְאֶת בְּנֹתֵיהֶם
  english_pob_choice: nor take their daughters
  chosen_spanish: ni tomaremos sus hijas
  alternatives_spanish:
  - y no tomaremos sus hijas
  - ni las tomaremos
  lexicon: HALOT
  rationale: «Tomar» reproduce el verbo hebreo en contexto matrimonial y mantiene el paralelismo con «dar»; en español, «ni tomaremos» resulta fluido y fiel.
- source_word: נִקַּח
  english_pob_choice: take
  chosen_spanish: tomaremos
  alternatives_spanish:
  - tomar
  - recibiremos
  - casaremos
  lexicon: HALOT
  rationale: Se conserva el valor léxico de «tomar» sin explicitar «casar», porque el sentido matrimonial ya queda claro por el paralelismo del verso.
- source_word: לְבָנֵינוּ
  english_pob_choice: for our sons
  chosen_spanish: para nuestros hijos
  alternatives_spanish:
  - para nuestros hijos
  - para nuestros hijos varones
  - para nuestros hijos, nuestros varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «nuestros hijos» en este punto; en español, «hijos» comunica de forma natural y genérica la referencia masculina del término en la fórmula matrimonial.
theological_decisions:
- issue: Prohibición matrimonial y su formulación social/covenantal
  english_pob_reading: Retain the covenantal-social wording 'the peoples of the land' and the reciprocal marriage language without explanatory expansion.
  chosen_spanish_reading: Mantener «los pueblos de la tierra» y el lenguaje recíproco del matrimonio sin añadir calificativos interpretativos en el texto principal.
  alternative_spanish_readings:
  - los pueblos paganos de la tierra
  - los extranjeros de la tierra
  - la gente de la tierra
  rationale: El verso formula la prohibición con su propio lenguaje; añadir «paganos» o «extranjeros» impondría una interpretación no explicitada en la frase hebrea. El plural se preserva para no aplanar el sustantivo colectivo.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje auditado en inglés y la revisión más reciente, que no introdujo cambios. No hay pasajes revisados a incorporar; la correspondencia semántica central se mantiene estable: compromiso futuro, plural hebreo en «pueblos», y el valor matrimonial de «tomar».'
  spanish_consistency_notes:
  - Se preservó el paralelismo antitético «dar / tomar» para reflejar el hebreo.
  - Se evitó «SEÑOR» o vocabulario eclesiástico no presente en el verso.
  - Se mantuvo el plural de עַמֵּי con «pueblos», consistente con la nota lexical del audit trail.
  - Se prefirió «hijas / hijos» como equivalencia directa de בְּנֹתֵינוּ / לְבָנֵינוּ, sin ampliar a «descendientes».
