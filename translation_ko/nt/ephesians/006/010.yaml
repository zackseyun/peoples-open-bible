id: EPH.6.10
reference: Ephesians 6:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸂Τοῦ λοιποῦ⸃ ἐνδυναμοῦσθε ἐν κυρίῳ καὶ ἐν τῷ κράτει τῆς ἰσχύος αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/006/010.yaml
  text: Finally, be strengthened in the Lord and in the strength of his might.
translation:
  language: ko
  text: 끝으로 주 안에서, 그리고 그분의 힘 있는 위력 안에서 강건해지십시오[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 6:10–20은 영적 전쟁 단락의 도입이다. 본 단락은 군인의 무장 이미지를 빌려 신자가 어둠의 권세에 맞서 서야 함을 분명히 한다.
    reason: structural_note
lexical_decisions:
- source_word: ἐνδυναμοῦσθε
  english_pob_choice: be strengthened
  chosen_korean: 강건해지십시오
  alternatives_korean:
  - 강해지십시오
  - 능력을 입으십시오
  lexicon: BDAG
  rationale: 수동 명령형의 「강건하게 되어지는」 함의를 「강건해지십시오」로 보존.
theological_decisions:
- issue: 6:10–20 「하나님의 전신갑주」 단락의 신학적 무게
  chosen_reading: 영적 전쟁의 비유적 강도를 약화시키지 않고, 「섬」(στῆναι), 「대적」(ἀντιστῆναι)의 군사 어휘를 보존하며, 「전신갑주」의 항목별 명명을 그대로 유지한다.
  alternative_readings:
  - 전쟁 어휘를 「영적 훈련」 수준으로 부드럽게 풀기
  rationale: 본 단락은 어둠의 권세에 맞서는 신자의 자세를 군사적 비유로 명확히 한다. 한국어 본문이 이 비유를 약화시키면 본문의 도전과 위로(우리의 강건함이 「주 안에서, 그분의 힘 있는 위력 안에서」 온다는 약속)가 함께 약화된다.
  doctrine_reference: 'PHILOSOPHY.md: Preserve true and powerful meaning, not domesticated reading.'
