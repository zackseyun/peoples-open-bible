translation:
  language: es
  text: ¡Cuán abundante es tu bondad, que has guardado para los que te temen, que has obrado para los que se refugian en ti ante los hijos del hombre[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante la humanidad» / «ante la gente». El hebreo dice literalmente «ante los hijos del hombre», una expresión representativa para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה רַב
  english_pob_choice: How abundant
  chosen_spanish: ¡Cuán abundante
  alternatives_spanish:
  - ¡Cuán grande
  - ¡Cuán abundante es
  lexicon: HALOT
  rationale: La exclamación hebrea con רַב expresa magnitud sorprendente. «Cuán abundante» conserva el tono admirativo y la idea de abundancia sin sonar artificial en español.
- source_word: טוּבְךָ
  english_pob_choice: your goodness
  chosen_spanish: tu bondad
  alternatives_spanish:
  - tu goodness
  - tu bondad inmensa
  - tu bien
  lexicon: HALOT
  rationale: טוּב abarca bondad, bien y benevolencia. «Bondad» es la opción más natural en español y mantiene el valor moral y benefactor del término.
- source_word: צָפַנְתָּ
  english_pob_choice: you have stored up
  chosen_spanish: has guardado
  alternatives_spanish:
  - has almacenado
  - has reservado
  - has atesorado
  lexicon: HALOT
  rationale: El verbo significa poner en reserva o guardar para después. «Has guardado» transmite la idea de provisión reservada de manera clara y bíblica, sin reducirla solo a ocultar.
- source_word: לִירֵאֶיךָ
  english_pob_choice: for those who fear you
  chosen_spanish: para los que te temen
  alternatives_spanish:
  - para los que te reverencian
  - para los que temen de ti
  lexicon: HALOT
  rationale: La forma participial describe personas caracterizadas por temer a Dios. «Los que te temen» preserva el lenguaje bíblico de reverencia pactual y sigue de cerca el sentido del original.
- source_word: פָּעַלְתָּ
  english_pob_choice: you have worked
  chosen_spanish: has obrado
  alternatives_spanish:
  - has hecho
  - has realizado
  - has efectuado
  lexicon: HALOT
  rationale: פעל señala hacer, efectuar, obrar. «Has obrado» conserva el paralelismo verbal con el primer miembro y sugiere acción eficaz de Dios.
- source_word: לַחֹסִים בָּךְ
  english_pob_choice: for those who take refuge in you
  chosen_spanish: para los que se refugian en ti
  alternatives_spanish:
  - para los que buscan refugio en ti
  - para los que confían en ti
  - para los que se amparan en ti
  lexicon: HALOT
  rationale: חסה es buscar refugio o abrigo. «Se refugian en ti» retiene la metáfora concreta de protección, más precisa que un mero «confían».
- source_word: נֶגֶד
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - frente a
  lexicon: HALOT
  rationale: Aquí נגד marca visibilidad pública. «Delante de» suena natural y comunica que la bondad de Dios se muestra abiertamente.
- source_word: בְּנֵי אָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos de Adán
  alternatives_spanish:
  - los hijos del hombre
  - la humanidad
  - las personas
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos de אדם». En español, «hijos de Adán» conserva la forma masculina y la fuerza representativa del hebreo, sin ocultar la imagen original.
theological_decisions:
- issue: Expresión antropológica representativa בְּנֵי אָדָם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos de Adán
  alternative_spanish_readings:
  - la humanidad
  - las personas
  - los hijos del hombre
  rationale: La frase funciona como expresión representativa de seres humanos en general. Se mantiene la forma masculina para reflejar el texto fuente, evitando neutralizar la imagen; la aclaración se deja implícita en el contexto y en la nota textual.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El audit trail inglés fue revisado para mantener la puntuación y el flujo sintáctico: la frase final se integra con el verbo anterior sin una pausa innecesaria, siguiendo la decisión revisada de leer «before the sons of man» como cierre del miembro final. La elección española mantiene ese encadenamiento natural con «delante de los hijos de Adán».'
  spanish_consistency_notes:
  - Se mantiene «te temen» como fórmula reverencial estándar, coherente con el valor pactual del hebreo.
  - Se evita «SEÑOR» para reflejar la política del proyecto de no mascarar el nombre divino cuando no aparece aquí.
  - «Has guardado» y «has obrado» preservan el paralelismo verbal del hebreo y de la auditoría inglesa.
  - La nota al pie marca la alternativa semántica principal de טוּב sin introducir lectura doctrinal adicional.
