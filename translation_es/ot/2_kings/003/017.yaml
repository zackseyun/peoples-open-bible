translation:
  language: es
  text: 'Porque así dice Yahvé: No verán viento[a] ni verán lluvia, pero ese wadi[b] se llenará de agua, y beberán ustedes, su ganado y sus animales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu» o «aliento». Aquí רוּחַ se entiende como «viento» por el paralelo con «lluvia» y el contexto meteorológico.
    reason: lexical_alternative
  - marker: b
    text: O «valle» o «lecho de arroyo». נחל suele referirse a un wadi, un curso de agua estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrama. En español bíblico, «Yahvé» comunica ese nombre con claridad y evita la sustitución por un título.
- source_word: כִּי כֹה אָמַר
  english_pob_choice: For thus says
  chosen_spanish: Porque así dice
  alternatives_spanish:
  - Porque esto es lo que dice
  - Pues así dice
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una declaración divina. «Porque así dice» mantiene el valor introductorio de כִּי y la solemnidad idiomática de כֹה אָמַר sin forzar una calca rígida.
- source_word: תִרְאוּ
  english_pob_choice: you will not see
  chosen_spanish: No verán
  alternatives_spanish:
  - No veréis
  - No van a ver
  lexicon: HALOT
  rationale: El imperfecto se entiende con sentido futuro dentro de la promesa. «No verán» es natural en español y conserva el carácter prospectivo de la negación.
- source_word: ר֨וּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: En paralelo con «lluvia» y en un contexto meteorológico, el sentido es claramente «viento», no «espíritu» ni «aliento».
- source_word: גֶשֶׁם
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - aguacero
  - chaparrón
  lexicon: HALOT
  rationale: Término meteorológico común y directo en español, correspondiente al hebreo en este contexto.
- source_word: הַנַּחַל הַהוּא
  english_pob_choice: that wadi
  chosen_spanish: ese wadi
  alternatives_spanish:
  - ese valle
  - ese cauce
  - ese lecho de arroyo
  lexicon: HALOT
  rationale: Se mantiene «wadi» por su precisión geográfica y por la decisión auditada de no diluir נחל en un equivalente demasiado general. En español es comprensible y conserva la referencia a un cauce estacional.
- source_word: יִמָּלֵא מָיִם
  english_pob_choice: will be filled with water
  chosen_spanish: se llenará de agua
  alternatives_spanish:
  - será llenado de agua
  - se colmará de agua
  lexicon: HALOT
  rationale: La pasiva/resultativa del Niphal se expresa de manera natural con «se llenará». Añadir «de agua» conserva el contenido explícito de מָיִם.
- source_word: וּשְׁתִיתֶם
  english_pob_choice: you and your livestock and your animals will drink
  chosen_spanish: beberán ustedes
  alternatives_spanish:
  - ustedes beberán
  - ustedes beberán de él
  lexicon: HALOT
  rationale: El verbo se traduce con futuro simple. «Beberán ustedes» mantiene el orden enfático del hebreo al poner primero la acción y luego el destinatario.
- source_word: מִקְנֵיכֶם
  english_pob_choice: your livestock
  chosen_spanish: sus ganados
  alternatives_spanish:
  - su ganado
  - sus animales de crianza
  lexicon: HALOT
  rationale: Se distingue de בְהֶמְתְּכֶם. «Ganados» funciona en plural colectivo y conserva la idea de animales poseídos/propiedad en el contexto.
- source_word: בְהֶמְתְּכֶם
  english_pob_choice: your animals
  chosen_spanish: sus animales
  alternatives_spanish:
  - sus bestias
  - sus reses
  lexicon: HALOT
  rationale: Se mantiene la amplitud del término. En paralelo con «ganados», «animales» preserva la distinción sin sobreespecificar.
theological_decisions:
- issue: Rendering the divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa el Tetragrama directamente. En coherencia con la política del proyecto, se conserva el nombre divino en español como «Yahvé» y no se lo sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y confirma las revisiones auditadas del inglés: se mantuvo la fórmula profética solemne, la negación paralela con «ni», la precisión geográfica de נחל como «wadi», y la distinción entre מִקְנֵיכֶם y בְהֶמְתְּכֶם. También se conserva el nombre divino como «Yahvé» según la política revisada del proyecto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para el Tetragrama.
  - «Wadi» se mantuvo sin domesticación a «valle» en el texto principal para preservar la especificidad del original.
  - «Ganados» y «animales» se distinguieron para reflejar la duplicación hebrea sin fusionarla.
  - La negación se expresó con «No verán ... ni verán ...» para reproducir el paralelismo negativo con naturalidad en español.
