review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo: transportar el cuerpo de Asahel, sepultarlo en el sepulcro de su padre en Belén, y luego el viaje nocturno de Joab y sus hombres hasta que amaneció en Hebrón. Sin embargo, dos elecciones principales no reflejan con suficiente precisión ni naturalidad el sentido auditado: «caminaron toda la noche» estrecha demasiado el hebreo הלך, que aquí expresa desplazamiento continuado más que el acto físico de caminar; y «al amanecer les llegó el día» suena poco idiomático y duplica innecesariamente la idea del amanecer, cuando el hebreo idiomático se puede verter con naturalidad como «les amaneció».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta una frase final poco natural en español: «al amanecer les llegó el día en Hebrón». También la nota a sobre «tumba» no preserva bien la alternativa inglesa, porque la alternativa propuesta repite «tumba» en vez de ofrecer «sepultura» o «sepulcro». Con ajustes menores, el versículo queda fluido y fiel.'
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. Los nombres propios Belén y Hebrón están bien. «Asahel» es aceptable. «Tumba/sepulcro» para קבר entra dentro de la gama semántica documentada, pero conviene reflejar mejor la alternativa «sepultura».
  issues:
  - severity: medium
    issue: «caminaron toda la noche» restringe demasiado וילכו
    rationale: El hebreo הלך en este contexto narrativo-militar significa que siguieron su camino o viajaron; «caminaron» puede sugerir específicamente andar a pie y suena más estrecho que el auditado inglés «traveled all night».
  - severity: high
    issue: «al amanecer les llegó el día en Hebrón» es poco idiomático y no representa bien ויאר להם
    rationale: La expresión española suena forzada. El hebreo literalmente dice «se hizo luz para ellos»; el inglés auditado preserva el sentido con «daybreak came upon them». En español natural, «les amaneció en Hebrón» comunica bien el modismo y además coincide con la nota existente.
  - severity: low
    issue: La nota [a] no ofrece una verdadera alternativa léxica
    rationale: La nota dice «O ‘en la tumba de su padre’» cuando esa misma expresión ya está en el texto. Debe ofrecer la alternativa real, p. ej. «sepultura» o «sepulcro». También conviene afinar la explicación semántica.
  revised_spanish_text: Se llevaron a Asahel y lo sepultaron en la tumba[a] de su padre, que estaba en Belén. Entonces Joab y sus hombres viajaron toda la noche[b], y les amaneció en Hebrón.
  revised_footnotes:
