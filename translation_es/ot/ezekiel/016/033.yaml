translation:
  language: es
  text: A todas las prostitutas se les da un pago[a]; pero tú diste tus regalos a todos tus amantes, y los sobornaste[b] para que vinieran a ti de todas partes por tus prostituciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo está en plural ('prostitutas'); el español usa una construcción impersonal para reflejar ese valor colectivo sin forzar un sujeto explícito.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse 'los contrataste'. El verbo hebreo comúnmente significa 'sobornar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָל זֹנוֹת יִתְּנוּ נֵדֶה
  english_pob_choice: To all prostitutes men give payment
  chosen_spanish: A todas las prostitutas se les da pago[a]
  alternatives_spanish:
  - A todas las prostitutas se les da una retribución
  - A todas las prostitutas se les da un pago
  lexicon: HALOT
  rationale: El hebreo presenta un plural generalizador con valor impersonal. En español, la pasiva con se conserva ese valor sin introducir sujetos inexistentes. 'Pago' mantiene la idea transaccional del sustantivo, y la nota permite recordar que también puede entenderse como 'retribución' o 'honorario'.
- source_word: נֵדֶה
  english_pob_choice: payment
  chosen_spanish: pago
  alternatives_spanish:
  - retribución
  - honorario
  - salario
  lexicon: HALOT
  rationale: En este contexto el sustantivo nombra lo que se entrega a una prostituta. 'Pago' es claro y natural en español, y conserva el sentido comercial sin precisar más de lo que el hebreo exige.
- source_word: נְדָנַיִךְ
  english_pob_choice: your gifts
  chosen_spanish: tus regalos
  alternatives_spanish:
  - tus dones
  - tus pagos
  - tus presentes
  lexicon: HALOT
  rationale: 'El término destaca el giro irónico: ella no recibe, sino que entrega. ''Regalos'' reproduce bien ese contraste en español y mantiene la relación léxica con lo que normalmente sería recibido por una prostituta.'
- source_word: מְאַהֲבַיִךְ
  english_pob_choice: your lovers
  chosen_spanish: tus amantes
  alternatives_spanish:
  - tus amados
  - tus amantes ilícitos
  - tus amantes/aliados
  lexicon: HALOT
  rationale: En la metáfora profética, el término apunta a relaciones ilícitas y no a amor legítimo. 'Amantes' es la equivalencia más natural en español y conserva el matiz sexual y figurado.
- source_word: וַתִּשְׁחֳדִי
  english_pob_choice: you bribed
  chosen_spanish: los sobornaste[b]
  alternatives_spanish:
  - los sobornaste para que vinieran
  - los pagaste
  - los compraste
  lexicon: HALOT
  rationale: 'El verbo hebreo suele significar ''sobornar'', y la POB inglesa retiene esa dureza moral. ''Sobornaste'' preserva el reverso irónico: en vez de recibir pago, ella paga para atraerlos.'
- source_word: מִסָּבִיב
  english_pob_choice: from all around
  chosen_spanish: de todas partes
  alternatives_spanish:
  - de alrededor
  - de todos lados
  - de cada lado
  lexicon: HALOT
  rationale: La expresión indica procedencia circundante o desde regiones vecinas. 'De todas partes' es idiomática y mantiene la amplitud espacial del hebreo.
- source_word: בְּתַזְנוּתָיִךְ
  english_pob_choice: for your prostitutions
  chosen_spanish: por tus prostituciones
  alternatives_spanish:
  - por tus actos de prostitución
  - en tus prostituciones
  - a causa de tus prostituciones
  lexicon: HALOT
  rationale: El plural abstracto conserva el carácter repetido de la conducta. 'Prostituciones' mantiene esa fuerza y el valor causal o final de la preposición en este contexto, sin suavizar la imagen profética.
theological_decisions:
- issue: Mantener el lenguaje sexual profético sobre la infidelidad de Jerusalén
  english_pob_reading: Retain the prostitution imagery directly
  chosen_spanish_reading: Mantener directamente la imagen de prostitución y soborno
  alternative_spanish_readings:
  - Suavizar a 'infidelidad' o 'idolatría' en el cuerpo principal
  - Reformular para evitar el lenguaje sexual
  rationale: El hebreo usa explícitamente la metáfora de prostitución, y la línea editorial exige no paraphrasear por debajo del texto. Conservarla en español preserva la fuerza profética y la denuncia de la infidelidad del pacto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste revisado del inglés POB que conserva el plural general (''To all prostitutes men give payment''). En español se optó por una pasiva impersonal para mantener el mismo alcance general y la ironía del intercambio: lo que normalmente reciben las prostitutas, aquí es dado por la mujer a sus amantes.'
  spanish_consistency_notes:
  - Se mantiene 'prostitutas/prostituciones' para conservar la repetición léxica del hebreo y la carga profética.
  - Se evita 'SEÑOR' o sustitutos no pertinentes porque el versículo no contiene el nombre divino.
  - '''Sobornaste'' se eligió por la misma razón auditada en inglés: el verbo implica un pago corrupto, no solo una invitación.'
