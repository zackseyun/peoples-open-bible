translation:
  language: es
  text: y toda la casa de José[a], y sus hermanos, y la casa de su padre; solo sus niños pequeños[b], sus rebaños y su ganado los dejaron en la tierra de Gosén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la casa de José ... la casa de su padre'. Aquí 'casa' se refiere a la familia o casa doméstica, no solo a un edificio.
    reason: lexical_alternative
  - marker: b
    text: '''Niños pequeños'' se refiere a los de corta edad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: and all
  chosen_spanish: y toda
  alternatives_spanish:
  - y todo
  - y toda la totalidad de
  lexicon: HALOT
  rationale: כֹּל expresa totalidad; en español, con 'casa' el ajuste natural es 'toda' para concordar con el sustantivo colectivo y conservar el sentido inclusivo de 'and all'.
- source_word: בֵּית יוֹסֵף
  english_pob_choice: the household of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - el hogar de José
  - la familia de José
  lexicon: HALOT
  rationale: בַּיִת en constructo con un nombre personal puede referirse a la casa/familia como unidad doméstica. Se mantiene 'casa' porque preserva la metáfora semítica y el auditable juego lexical que el inglés marcó con nota alternativa.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos varones
  - y sus hermanos/sus parientes
  lexicon: HALOT
  rationale: אָח en plural aquí refiere a los hermanos de José. 'Hermanos' es la equivalencia directa y natural; no hace falta explicitar 'varones' porque el referente es claro en el contexto narrativo.
- source_word: וּבֵית אָבִיו
  english_pob_choice: and his father's household
  chosen_spanish: y la casa de su padre
  alternatives_spanish:
  - y la familia de su padre
  - y el hogar de su padre
  lexicon: HALOT
  rationale: 'Se conserva ''casa'' por la misma razón que en בֵּית יוֹסֵף: el hebreo apunta a la unidad familiar/doméstica, no solo a un edificio. En español ''casa de su padre'' es fiel y legible.'
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solo y
  lexicon: HALOT
  rationale: רַק marca excepción o limitación. 'Solo' comunica la restricción sin añadir interpretación extra y permite reflejar en español el foco sobre lo que quedó atrás.
- source_word: טַפָּם
  english_pob_choice: their little ones
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus niños pequeños
  - sus hijos pequeños
  - sus pequeños hijos
  lexicon: HALOT
  rationale: טַף designa a los niños pequeños, especialmente los de corta edad. 'Sus pequeños' conserva la brevedad del hebreo y evita ampliar innecesariamente a 'dependientes'.
- source_word: וְצֹאנָם
  english_pob_choice: and their flocks
  chosen_spanish: sus rebaños
  alternatives_spanish:
  - sus ovejas y cabras
  - sus ganados menores
  lexicon: HALOT
  rationale: צֹאן es un término colectivo para ganado menor, normalmente ovejas y cabras. 'Rebaños' es una buena equivalencia colectiva en español y mantiene la paralelización con 'vacas'.
- source_word: וּבְקָרָם
  english_pob_choice: and their herds
  chosen_spanish: sus vacas
  alternatives_spanish:
  - su ganado
  - sus reses
  - sus manadas de ganado
  lexicon: HALOT
  rationale: בָּקָר se refiere al ganado mayor, especialmente bovino. 'Vacas' ofrece una lectura concreta y comprensible; aunque 'ganado' es más general, 'vacas' conserva el contraste con 'rebaños'. En notas se podría reconocer que el término abarca bovinos en sentido amplio.
- source_word: עָזְב֖וּ
  english_pob_choice: they left
  chosen_spanish: dejaron
  alternatives_spanish:
  - dejaron atrás
  - lo dejaron
  lexicon: HALOT
  rationale: עָזַב significa dejar, abandonar, dejar atrás según contexto. Aquí el sentido es que los animales y pequeños quedaron en Gosén mientras ellos viajaban, por lo que 'dejaron' transmite el acto sin sobrecargarlo con 'abandonar'.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  english_pob_choice: in the land of Goshen
  chosen_spanish: en la tierra de Gosén
  alternatives_spanish:
  - en la región de Gosén
  - en Gosén
  lexicon: HALOT
  rationale: Se mantiene 'tierra' porque el hebreo incluye אֶרֶץ, y 'Gosén' es la transliteración estándar en español. 'Tierra de Gosén' preserva el alcance geográfico completo del texto.
translation_notes:
  revision_awareness: 'El inglés auditado pasó de una estructura fragmentaria a una sola oración con el énfasis en ''only'' aplicado a lo dejado en Goshen. La redacción española sigue ese estado revisado: una sola oración, con orden natural y con la excepción marcada antes de los elementos retenidos en la tierra de Gosén.'
  spanish_consistency_notes:
  - Se conservó 'casa' para בַּיִת en dos ocurrencias, alineado con la nota lexical del inglés sobre 'household'.
  - '''Gosén'' se mantiene como transliteración bíblica estable en español, con ''tierra de'' para reflejar אֶרֶץ.'
  - Se prefirió 'rebaños' para צֹאן y 'vacas' para בָּקָר, manteniendo la distinción de categorías de ganado del hebreo.
