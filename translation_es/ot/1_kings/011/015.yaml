translation:
  language: es
  text: Y sucedió[a], cuando David estaba en Edom[b], cuando Joab, el comandante del ejército, había subido para sepultar a los caídos, que abatió a todo varón en Edom—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y aconteció». El hebreo usa una fórmula narrativa común para introducir una explicación de fondo.
    reason: lexical_alternative
  - marker: b
    text: Lit. «cuando David estaba [con] Edom». En contexto, se refiere a la campaña o presencia de David en Edom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un trasfondo explicativo; en español, «Y sucedió» conserva el valor formular y la continuidad narrativa sin sonar forzado. Evita también un calco rígido de «And it happened».
- source_word: בִּהְיוֹת דָּוִד אֶת אֱדוֹם
  english_pob_choice: when David was in Edom
  chosen_spanish: cuando David estaba en Edom
  alternatives_spanish:
  - cuando David estaba con Edom
  - cuando David estaba contra Edom
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo de היה pide una cláusula de tiempo. En contexto militar, «estaba en Edom» es la manera más natural de expresar la presencia/acción de David allí sin añadir una interpretación más fuerte que el hebreo.
- source_word: בַּעֲלוֹת יוֹאָב
  english_pob_choice: when Joab ... had gone up
  chosen_spanish: cuando Joab ... había subido
  alternatives_spanish:
  - cuando Joab subió
  - al subir Joab
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa simultaneidad o antecedencia temporal; el pluscuamperfecto español («había subido») refleja bien el trasfondo narrativo dentro del pasado.
- source_word: שַׂר הַצָּבָא
  english_pob_choice: the commander of the army
  chosen_spanish: el comandante del ejército
  alternatives_spanish:
  - el capitán del ejército
  - el comandante de la hueste
  lexicon: HALOT
  rationale: Es un título militar oficial. «Comandante del ejército» comunica con claridad el rango y evita arcaísmo innecesario.
- source_word: לְקַבֵּר
  english_pob_choice: to bury
  chosen_spanish: para sepultar
  alternatives_spanish:
  - para enterrar
  - para dar sepultura a
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa de forma natural con «para sepultar». «Enterrar» también es posible, pero «sepultar» mantiene un registro digno acorde al contexto funerario y narrativo.
- source_word: הַחֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los caídos
  - los muertos en combate
  lexicon: HALOT
  rationale: Aunque «los muertos» es más general que el hebreo militar «los caídos/los muertos en batalla», aquí preserva la referencia funeraria inmediata del contexto («para sepultar»). La POB inglesa subrayó el matiz bélico con «the slain»; en español se mantiene ese trasfondo en la nota para no sobrecargar el texto principal.
- source_word: וַיַּךְ
  english_pob_choice: he struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - mató
  - derribó
  - hirió de muerte
  lexicon: HALOT
  rationale: נכה puede abarcar golpear, herir o abatir; en narrativa militar, aquí implica una acción letal. «Hirió» conserva el verbo básico y la gravedad sin añadir una explicitud interpretativa que el hebreo no formula en esta cláusula.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: a todo varón
  alternatives_spanish:
  - a todo hombre
  - a todos los varones
  lexicon: HALOT
  rationale: זָכָר significa «varón/macho», no el término general para «hombre». «A todo varón» preserva la fuerza taxonómica y totalizante del hebreo; el acusativo con «a» refleja bien el objeto directo personal en español.
- source_word: בֶּאֱדוֹם
  english_pob_choice: in Edom
  chosen_spanish: en Edom
  alternatives_spanish:
  - entre Edom
  - por toda Edom
  lexicon: HALOT
  rationale: La preposición locativa se mantiene de forma directa. «En Edom» no sobreinterpreta el alcance geográfico y deja el texto tan abierto como el hebreo.
theological_decisions:
- issue: Conservar la dureza del enunciado bélico sin suavizarlo ni ampliarlo
  english_pob_reading: Retain the direct statement that every male in Edom was struck down
  chosen_spanish_reading: Mantener que Joab hirió a todo varón en Edom, sin eufemizar ni explicar más de lo que el verso dice
  alternative_spanish_readings:
  - Suavizarlo a «derrotó a los edomitas»
  - Expandirlo en el texto principal como exterminio total
  rationale: El versículo reporta violencia militar severa. La traducción debe conservar esa fuerza sin domesticarla con eufemismos, pero tampoco convertir una cláusula histórica en una interpretación más amplia que el hebreo no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que cambió la apertura de «For it happened» a «And it happened» por ser más natural y más apropiada formalmente; por eso el español usa una fórmula coordinada simple («Y sucedió»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefiere «varón» para זָכָר por precisión léxica frente a «hombre».
  - «Los muertos» se eligió en el texto principal por la naturalidad del español; la nota preserva el matiz militar de הַחֲלָלִים.
  - El guion final reproduce la suspensión del enunciado en la fuente inglesa auditada.
