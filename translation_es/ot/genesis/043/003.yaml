translation:
  language: es
  text: 'Entonces Judá le dijo: «El hombre nos advirtió solemnemente[a]: “No verán mi rostro[b], a menos que su hermano esté con ustedes”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “El hombre nos advirtió estrictamente” o “El hombre nos advirtió claramente”. El hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “No verán mi rostro”. Este modismo también puede significar “No comparecerán ante mí”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... le dijo
  - Entonces ... dijo
  lexicon: WLC/HALOT
  rationale: La secuencia narrativa del waw consecutivo se expresa naturalmente en español con “Entonces”, conservando avance temporal y fluidez.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - le dijo
  lexicon: WLC/HALOT
  rationale: El dativo átono reproduce de forma natural el complemento indirecto de habla, evitando una repetición pesada en español.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: WLC/HALOT
  rationale: Se conserva el nombre propio bíblico en la forma española común “Judá”.
- source_word: הָעֵד הֵעִד
  english_pob_choice: solemnly warned
  chosen_spanish: nos advirtió solemnemente
  alternatives_spanish:
  - nos advirtió con insistencia
  - nos previno solemnemente
  - nos testificó enfáticamente
  lexicon: WLC/HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la acción. En español, “advirtió solemnemente” comunica mejor la fuerza de la advertencia sin perder el matiz enfático.
- source_word: בָּנוּ
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: WLC/HALOT
  rationale: El objeto directo/indirecto pronominal se expresa de forma idiomática con “nos” en español.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el hombre aquel
  - ese hombre
  lexicon: WLC/HALOT
  rationale: Se mantiene la designación ordinaria “el hombre”, tal como el texto hebreo, sin identificarlo más allá de lo que el contexto autoriza.
- source_word: לֹא תִרְאוּ פָנַי
  english_pob_choice: You shall not see my face
  chosen_spanish: No verán mi rostro[a]
  alternatives_spanish:
  - No verán mi cara[a]
  - No comparecerán ante mí
  lexicon: WLC/HALOT
  rationale: Se conserva la imagen hebrea de “ver mi rostro”, que puede sonar más directa que la equivalencia idiomática “comparecer ante mí”. El plural futuro mantiene la fuerza normativa del hebreo.
- source_word: בִּלְתִּי
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - excepto que
  - salvo que
  lexicon: WLC/HALOT
  rationale: En este contexto condicional, “a menos que” expresa con claridad la excepción requerida para ver su rostro.
- source_word: אֲחִיכֶם
  english_pob_choice: your brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - vuestro hermano
  - el hermano de ustedes
  lexicon: WLC/HALOT
  rationale: El hebreo singular con sufijo plural apunta específicamente a Benjamín; en español se mantiene el singular y se ajusta el tratamiento pronominal al registro latinoamericano.
- source_word: אִתְּכֶם
  english_pob_choice: is with you
  chosen_spanish: esté con ustedes
  alternatives_spanish:
  - está con ustedes
  - estuviera con ustedes
  lexicon: WLC/HALOT
  rationale: El hebreo presenta una frase preposicional con valor condicional; en español, el subjuntivo en la prótasis condicional expresa mejor la condición implícita que el inglés resuelve con un verbo explícito.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail en inglés. No se registran revisiones textuales ni cambios de última hora; el sentido y la estructura coinciden con el pasaje base, manteniendo la intensidad del hebreo en la advertencia y la condición.
  spanish_consistency_notes:
  - Se usa “Judá” como nombre propio español estándar.
  - Se mantiene “rostro” para conservar la metáfora hebrea documentada en el texto base.
  - Se traduce el singular hebreo “hermano” en concordancia con la referencia a Benjamín.
  - Se evita “SEÑOR” u otras sustituciones porque este versículo no contiene el Tetragrámaton ni una alusión directa al nombre divino.
