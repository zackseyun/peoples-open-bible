translation:
  language: es
  text: No mirará[a] arroyos, ríos y torrentes de miel y cuajada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No verá los canales, los ríos, los wadis de miel y cuajada»; también, «No verá corrientes, ríos y cauces de miel y cuajada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: will not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No habrá de
  - No podrá
  lexicon: HALOT
  rationale: En el hebreo poético, אַל con el imperfecto expresa una negación orientada al resultado futuro; en español, una negación simple transmite mejor la idea de que no llegará a experimentar esa visión o goce.
- source_word: יֵרֶא
  english_pob_choice: look upon
  chosen_spanish: mirará
  alternatives_spanish:
  - verá
  - contemplará
  lexicon: HALOT
  rationale: ראָה significa literalmente 'ver', pero en este contexto de abundancia la imagen es de percibir o disfrutar. 'Mirará' conserva el matiz visual sin sonar forzado, y permite mantener la relación con el objeto visto.
- source_word: בִּפְלַגּוֹת
  english_pob_choice: the streams
  chosen_spanish: los arroyos
  alternatives_spanish:
  - los canales
  - los cauces
  lexicon: HALOT
  rationale: פְלַגּוֹת designa corrientes o cursos de agua. 'Arroyos' comunica de forma natural en español la imagen de pequeños cursos fluyendo, y funciona bien con el resto de la cadena poética.
- source_word: נַהֲרֵי
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - los ríos caudalosos
  lexicon: HALOT
  rationale: El constructo plural de נָהָר se refleja con 'los ríos'. Mantener 'ríos' conserva la acumulación de imágenes hídricas del hebreo sin sobreexplicar.
- source_word: נַחֲלֵי
  english_pob_choice: the rivers flowing with
  chosen_spanish: que fluyen con
  alternatives_spanish:
  - de
  - rebosando de
  lexicon: HALOT
  rationale: נַחֲלֵי puede aludir a cauces, wadis o torrentes. El inglés POB redujo la repetición y lo integró como el segundo miembro del encadenamiento. En español, 'que fluyen con' mantiene la construcción descriptiva y la imagen de abundancia sin añadir términos no requeridos.
- source_word: דְּבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel silvestre
  lexicon: HALOT
  rationale: דְּבַשׁ se traduce de forma estándar como 'miel'. Es el equivalente natural y transparente en español para la imagen de abundancia.
- source_word: וְחֶמְאָה
  english_pob_choice: and curds
  chosen_spanish: cuajada
  alternatives_spanish:
  - y cuajada
  - y mantequilla
  - y crema
  lexicon: HALOT
  rationale: חֶמְאָה admite varias opciones según contexto. 'Cuajada' expresa mejor en español contemporáneo la imagen pastoral de alimento lácteo abundante, y evita la posible lectura moderna de 'mantequilla' como producto procesado.
translation_notes:
  revision_awareness: Se siguió el ajuste reciente del POB inglés que eliminó la repetición innecesaria de un segundo sinónimo acuático (“brooks”) para evitar sobretraducción; por eso la versión española mantiene una sola cadena de cursos de agua y no añade un equivalente adicional.
  spanish_consistency_notes:
  - Se conservó el tono poético y la acumulación de imágenes de agua y alimento, sin forzar un calco excesivamente literal.
  - Se usó 'miel' y 'cuajada' como equivalentes naturales y transparentes para la imaginería de abundancia.
  - El marcador de nota [a] aparece anclado en 'mirará' para sostener la alternativa lexical en el punto de decisión.
