translation:
  language: es
  text: Y el sacerdote lo examinará al séptimo día, y he aquí, si la mancha[a] se ha mantenido sin cambios[b] a su vista y la mancha no se ha extendido en la piel, entonces el sacerdote lo aislará[c] por siete días una segunda vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la afección' o 'la marca' para el hebreo negaʿ; el término se refiere a la lesión visible bajo examen sacerdotal, no necesariamente a una enfermedad definida médicamente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la mancha ha permanecido en sus ojos'; es decir, parecía sin cambios al sacerdote.
    reason: lexical_alternative
  - marker: c
    text: O 'lo confinará' o, más literalmente, 'lo encerrará'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָהוּ
  english_pob_choice: shall examine him
  chosen_spanish: lo examinará
  alternatives_spanish:
  - lo verá
  - lo observará
  lexicon: HALOT
  rationale: En contexto sacerdotal-ritual, ראה no es solo 'ver', sino inspeccionar para discernimiento diagnóstico. 'Lo examinará' conserva esa función procesal en español.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: en el séptimo día
  alternatives_spanish:
  - al séptimo día
  - en día siete
  lexicon: HALOT
  rationale: Es la formulación temporal natural y fiel al orden secuencial del texto.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y behold
  lexicon: HALOT
  rationale: '''He aquí'' conserva el marcador discursivo de atención/énfasis sin sonar forzado en español bíblico contemporáneo.'
- source_word: הַנֶּגַע
  english_pob_choice: the spot
  chosen_spanish: la mancha
  alternatives_spanish:
  - la lesión
  - la marca
  - la afección
  lexicon: HALOT
  rationale: '''Mancha'' mantiene el carácter visible y concreto del término en Levítico 13, sin medicalizarlo de más. El contexto ritual respalda una designación descriptiva, no clínica.'
- source_word: עָמַד בְּעֵינָיו
  english_pob_choice: has remained unchanged in his sight
  chosen_spanish: ha permanecido sin cambio a su vista
  alternatives_spanish:
  - ha quedado igual a su vista
  - se ha mantenido igual ante sus ojos
  - ha permanecido en su percepción
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; 'a su vista' preserva la perspectiva del sacerdote, y 'sin cambio' comunica el sentido de permanencia/igualdad sin sonar rígidamente literal.
- source_word: לֹא פָשָׂה
  english_pob_choice: has not spread
  chosen_spanish: no se ha extendido
  alternatives_spanish:
  - no ha avanzado
  - no ha crecido
  lexicon: HALOT
  rationale: '''Extenderse'' reproduce bien la idea de propagación de la lesión en español natural.'
- source_word: בָּעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - en la piel
  - sobre la piel
  lexicon: HALOT
  rationale: '''Piel'' es la equivalencia idiomática clara en español moderno para עור en este contexto.'
- source_word: וְהִסְגִּירוֹ
  english_pob_choice: shall isolate him
  chosen_spanish: lo aislará
  alternatives_spanish:
  - lo confinará
  - lo encerrará
  - lo pondrá en aislamiento
  lexicon: HALOT
  rationale: '''Aislar'' comunica con claridad la separación ritual/procedimental. Se evita ''encerrar'' por su carga carcelaria y ''quarantena'' por su tecnicismo moderno.'
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: '''Por siete días'' expresa duración y se ajusta al español bíblico actual.'
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: una segunda vez
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: La repetición del período de aislamiento queda explícita con 'una segunda vez', manteniendo la fuerza adverbial del hebreo.
translation_notes:
  revision_awareness: La revisión más reciente indicó alto grado de acuerdo y no introdujo cambios; este borrador mantiene esa línea, con el ajuste español de 'mancha' y 'a su vista' para reflejar con naturalidad el idioma fuente y el sentido idiomático hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se conserva el registro legal-ritual de Levítico 13 con vocabulario concreto y no clínico.
  - '''Lo examinará'' y ''lo aislará'' siguen la terminología procedimental usada en el pasaje sin añadir interpretaciones.'
  - La nota de 'a su vista' preserva la perspectiva evaluativa del sacerdote, equivalente al idioma hebreo 'en sus ojos'.
