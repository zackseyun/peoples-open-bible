revisions:
- from: 'Pero ustedes hicieron beber vino[a] a los nazareos, y a los profetas les ordenaron[b], diciendo: «No profeticen»[c].'
  to: 'Pero ustedes hicieron beber vino a los nazireos[a], y ordenaron a los profetas: «No profeticen»[b].'
  rationale: Se reemplazó 'nazareos' por 'nazireos' para preservar la categoría técnica de נזירים con una forma española más clara y menos ambigua. Se corrigió la nota léxica para que ofrezca una alternativa real y se simplificaron las notas restantes para alinearlas mejor con la auditoría inglesa y con una presentación más limpia en español. También se suavizó la sintaxis a 'ordenaron a los profetas' y se eliminó 'diciendo' como elemento no necesario en español cuando sigue una cita directa.
