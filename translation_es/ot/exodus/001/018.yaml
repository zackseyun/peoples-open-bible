translation:
  language: es
  text: 'Entonces el rey de Egipto llamó a las parteras y les dijo: «¿Por qué han hecho esto y han dejado vivir a los niños?»'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called for
  chosen_spanish: llamó
  alternatives_spanish:
  - mandó llamar
  - convocó
  - hizo llamar
  lexicon: HALOT
  rationale: El hebreo con ל + personas puede expresar llamar o convocar a alguien. En español, "llamó" mantiene la concisión del relato y permite la acción de hacer venir a las parteras sin añadir matices no necesarios. "Mandó llamar" sería más explicativo, pero algo más interpretativo.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el rey egipcio
  - el rey de Egipto
  lexicon: HALOT
  rationale: Se conserva la relación de constructo de manera natural en español con "de Egipto". Es una fórmula clara y fiel al hebreo.
- source_word: לַמְיַלְּדֹת
  english_pob_choice: the midwives
  chosen_spanish: a las parteras
  alternatives_spanish:
  - a las comadronas
  - a las mujeres que asistían en el parto
  lexicon: HALOT
  rationale: '"Parteras" es el equivalente directo y idiomático en español para מְיַלְּדֹת. Mantiene el oficio específico sin sobreexplicar.'
- source_word: וַיֹּאמֶר לָהֶן
  english_pob_choice: and said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y les habló
  - y les preguntó
  lexicon: HALOT
  rationale: אמר se rinde con el verbo neutral "decir". "Les dijo" preserva la introducción del discurso sin cargarla de interpretaciones.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Con qué motivo
  lexicon: HALOT
  rationale: Es la interrogativa más natural en español y reproduce la pregunta de causa o motivo del hebreo.
- source_word: עֲשִׂיתֶן
  english_pob_choice: have you done
  chosen_spanish: han hecho
  alternatives_spanish:
  - hicieron
  - han hecho ustedes
  lexicon: HALOT
  rationale: El plural femenino del hebreo no se puede marcar en el verbo español, así que se conserva el plural con "han hecho". El presente perfecto resulta natural en una recriminación directa.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  - esta cosa hecha
  lexicon: HALOT
  rationale: En español, "esto" evita la dureza de "esta cosa" y sigue siendo fiel al demostrativo hebreo con דבר. El contexto ya aclara que se refiere al acto concreto.
- source_word: וַתְּחַיֶּיןָ
  english_pob_choice: let ... live
  chosen_spanish: han dejado vivir
  alternatives_spanish:
  - han preservado con vida
  - han hecho vivir
  - han mantenido con vida
  lexicon: HALOT
  rationale: El verbo puede expresar causar/permitir vivir o preservar con vida. Dado el contexto de la acusación de Faraón, "han dejado vivir" refleja bien la idea de no haber ejecutado la orden de matar. Se mantiene la tensión lexical sin elegir una sola explicación demasiado estrecha.
- source_word: הַיְלָדִים
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los niños varones
  - los bebés
  - los hijos
  lexicon: HALOT
  rationale: El inglés POB revisó "boys" a "children" para no imponer un sentido más estrecho que el del término hebreo. En español, "niños" conserva ese alcance general y suena natural; no se especifica "varones" porque el verso no lo dice de forma explícita.
theological_decisions:
- issue: Alcance de הַיְלָדִים en el contexto de la orden de Faraón
  english_pob_reading: the children
  chosen_spanish_reading: los niños
  alternative_spanish_readings:
  - los niños varones
  - los bebés
  rationale: El contexto previo permite inferir que el tema son los varones israelitas, pero este verso usa el término general "children" en la base inglesa y el hebreo literalmente habla de "los niños". Por fidelidad textual, no se estrecha el referente en el cuerpo del versículo.
  doctrine_reference: Exodus 1:16-18 context
- issue: Sentido de וַתְּחַיֶּיןָ entre 'hacer vivir' y 'dejar vivir'
  english_pob_reading: let the children live
  chosen_spanish_reading: han dejado vivir
  alternative_spanish_readings:
  - han hecho vivir
  - han preservado con vida
  rationale: El hebreo permite un rango que incluye causar vida, conservar con vida o permitir que vivan. En la escena, Faraón reprocha que no mataron a los niños; por eso "han dejado vivir" reproduce bien la fuerza acusatoria sin borrar la ambigüedad lexical.
  doctrine_reference: Lexical range of חיה in causative/resultative context
translation_notes:
  revision_awareness: El audio de revisión inglés cambió "boys" a "children" para no importar un sentido más estrecho que el hebreo; la versión española sigue esa corrección con "los niños". También se mantuvo la ambigüedad relevante de וַתְּחַיֶּיןָ mediante "han dejado vivir", evitando una paráfrasis demasiado cerrada.
  spanish_consistency_notes:
  - Se mantiene "rey de Egipto" como fórmula literal y natural en español.
  - '"Parteras" conserva el término profesional específico del hebreo.'
  - '"Niños" refleja el alcance general del hebreo y del POB inglés revisado.'
  - La nota al pie se ancla en "llamó" porque el verbo admite la alternativa "mandó llamar".
