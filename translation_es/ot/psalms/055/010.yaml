base_translation:
  language: en
  yaml_path: translation/ot/psalms/055/010.yaml
  text: Confuse them[a], Lord; divide their speech[b], for I have seen violence and strife in the city.
  footnotes:
  - marker: a
    text: Or 'Swallow them up, Lord' or 'Destroy them, Lord.' The Hebrew verb can carry a more literal destructive sense, though here it may mean to bring their plans to ruin by confusion.
    reason: alternative_reading
  - marker: b
    text: Literally 'divide their tongue'; that is, disrupt their ability to speak together or understand one another.
    reason: lexical_alternative
