  yaml_path: translation/ot/1_chronicles/024/006.yaml
  text: Shemaiah son of Nethanel[a], the scribe from among the Levites, recorded them in the presence of the king, the officials, Zadok the priest, Ahimelech son of Abiathar, and the heads of the fathers’ houses of the priests and of the Levites—one father’s house being taken for Eleazar, and one being taken for Ithamar.
  footnotes:
