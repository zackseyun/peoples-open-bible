base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/012/014.yaml
  text: If you fear Yahweh and serve him and listen to his voice and do not rebel against the command of Yahweh[b][a], then both you and the king who reigns over you will follow Yahweh your God.
  footnotes:
  - marker: a
    text: Hebrew literally, 'and you will be, both you and the king ... after the LORD your God.' The sense is that both the people and their king will continue in allegiance to, or follow, the LORD.
    reason: alternative_reading
  - marker: b
    text: '''Listen to his voice'' can also be understood as ''obey his voice,'' since the Hebrew expression often includes the idea of obedient hearing.'
    reason: lexical_alternative
