translation:
  language: es
  text: ¿Quién alabará[a] al Altísimo en Hades[b], en lugar de los vivos que dan gracias[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente «alabará». El verbo griego significa «alabar»; una traducción como «cantar alabanzas» haría más explícito el tono de adoración del versículo, pero añade la idea de cantar.
    reason: lexical_alternative
  - marker: b
    text: «Hades» aquí designa el ámbito de los muertos, no necesariamente el lugar de juicio final. Una alternativa es «Seol», para reflejar el concepto bíblico más amplio detrás del uso griego.
    reason: alternative_reading
  - marker: c
    text: La frase final también puede traducirse «los vivos que ofrecen acción de gracias».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑψίστῳ
  english_pob_choice: to the Most High
  chosen_spanish: al Altísimo
  alternatives_spanish:
  - al Más Alto
  - al Supremo
  lexicon: LSJ
  rationale: El dativo indica el destinatario de la alabanza. «Altísimo» es el equivalente bíblico natural en español y conserva el valor titulado de Ὕψιστος.
- source_word: τίς
  english_pob_choice: Who will
  chosen_spanish: ¿Quién alabará
  alternatives_spanish:
  - ¿Quién
  - ¿Quién lo alabará
  lexicon: LSJ
  rationale: La pregunta retórica en español fluye mejor con verbo explícito en futuro. «Alabará» mantiene la fuerza interrogativa sin sobreexplicar.
- source_word: αἰνέσει
  english_pob_choice: praise
  chosen_spanish: alabará
  alternatives_spanish:
  - dará alabanza
  - proclamará alabanza
  lexicon: LSJ
  rationale: El verbo griego expresa alabar; en español «alabar» es directo y natural. No se añade la idea de cantar, que el texto no exige.
- source_word: ἐν ᾅδου
  english_pob_choice: in Hades
  chosen_spanish: en Hades
  alternatives_spanish:
  - en el Seol
  - en la morada de los muertos
  - en el reino de los muertos
  lexicon: LSJ
  rationale: Se conserva el término griego en transliteración porque el audit trail privilegia la correspondencia directa con ᾅδης y evita imponer una noción doctrinal más precisa de la que el verso explicita.
- source_word: ἀντὶ
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en vez de aquellos
  lexicon: LSJ
  rationale: «En lugar de» expresa con claridad la sustitución/contraste entre los que están en Hades y los vivos.
- source_word: ζώντων
  english_pob_choice: the living
  chosen_spanish: los vivos
  alternatives_spanish:
  - los que viven
  - los que están vivos
  lexicon: LSJ
  rationale: Como participio sustantivado, «los vivos» es idiomático y conciso en español.
- source_word: διδόντων
  english_pob_choice: who give
  chosen_spanish: que dan
  alternatives_spanish:
  - que ofrecen
  - que rinden
  lexicon: LSJ
  rationale: El participio modifica a «los vivos». «Dan» preserva la relación verbal simple del griego y encaja con la expresión fija siguiente.
- source_word: ἀνθομολόγησιν
  english_pob_choice: thanks
  chosen_spanish: gracias
  alternatives_spanish:
  - acción de gracias
  - agradecimiento
  - confesión de alabanza
  lexicon: LSJ
  rationale: El campo semántico incluye agradecimiento/acción de gracias. En español, «dar gracias» es la collocación más natural y clara; «gracias» mantiene la lectura litúrgica sin forzar un término más técnico.
theological_decisions:
- issue: Sentido de ᾅδης en Sirácida 17:27
  english_pob_reading: Hades as the realm of the dead, without importing later detailed doctrines of hell
  chosen_spanish_reading: Hades como el ámbito de los muertos, sin convertirlo en «infierno» ni en una doctrina de castigo final
  alternative_spanish_readings:
  - el Seol
  - la tumba
  - el reino de los muertos
  rationale: La versión griega habla del lugar de los muertos en contraste con los vivos. Mantener «Hades» conserva la tensión textual y evita una precisión doctrinal que el verso no formula.
  doctrine_reference: Priorización del testimonio original y preservación de la tensión teológica.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: se evita añadir «cantar» a αἰνέσει, se conserva «Hades» para ᾅδης y se traduce ἀνθομολόγησιν con un equivalente natural de agradecimiento en español.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para Ὕψιστος en coherencia con el uso bíblico estándar en español.
  - «Dar gracias»/«gracias» se usa de forma consistente para ἀνθομολόγησις dentro del verso.
  - Se conserva la distinción entre los vivos y el ámbito de los muertos sin añadir expansión interpretativa.
