translation:
  language: es
  text: Pero algunos[a], despreciando superficialmente los fundamentos de la piedad de la ciudad, se entregaban de buena gana, como si fueran a participar de alguna gran fama por el trato con el rey que habrían de tener.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los soportes de la piedad de la ciudad' o 'las bases de la piedad de la ciudad'. El griego usa un término metafórico para fundamentos o apoyos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνιοι
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - algunas personas
  lexicon: LSJ
  rationale: El plural indefinido pide un equivalente natural en español; 'algunos' conserva la referencia parcial sin sobrecargar el estilo.
- source_word: ἐπιπολαίως
  english_pob_choice: lightly
  chosen_spanish: superficialmente
  alternatives_spanish:
  - ligeramente
  - irreflexivamente
  - frívolamente
  lexicon: LSJ
  rationale: Aquí el adverbio describe una actitud carente de profundidad. 'Superficialmente' comunica mejor esa ligereza de juicio que un adverbio físico como 'ligeramente'.
- source_word: στυγοῦντες
  english_pob_choice: despising
  chosen_spanish: despreciando
  alternatives_spanish:
  - detestando
  - aborreciendo
  - odiando
  lexicon: LSJ
  rationale: El contexto suaviza el matiz de aversión intensa y apunta a un rechazo despectivo. 'Despreciando' mantiene la fuerza negativa sin exagerarla.
- source_word: ἐπιβάθρας
  english_pob_choice: foundations
  chosen_spanish: los fundamentos
  alternatives_spanish:
  - los soportes
  - las bases
  - los cimientos
  lexicon: LSJ
  rationale: La revisión inglesa prefirió 'foundations' por naturalidad y precisión. En español, 'fundamentos' conserva la metáfora de base o apoyo subyacente y funciona bien con la frase 'de la piedad de la ciudad'.
- source_word: τὰς τῆς πόλεως εὐσεβείας
  english_pob_choice: the city's piety
  chosen_spanish: la piedad de la ciudad
  alternatives_spanish:
  - la devoción de la ciudad
  - las devociones de la ciudad
  - la religión de la ciudad
  lexicon: LSJ
  rationale: εὐσέβεια aquí designa la piedad/devoción religiosa cívica. 'Piedad' reproduce ese valor sin convertirlo en una etiqueta institucional más moderna como 'religión'.
- source_word: εὐχερῶς
  english_pob_choice: readily
  chosen_spanish: con facilidad
  alternatives_spanish:
  - prontamente
  - voluntariamente
  - sin dificultad
  lexicon: LSJ
  rationale: El adverbio expresa disposición fácil y sin resistencia. 'Con facilidad' en español comunica bien la prontitud de su entrega.
- source_word: ἑαυτοὺς ἐδίδοσαν
  english_pob_choice: gave themselves up
  chosen_spanish: se entregaban
  alternatives_spanish:
  - se rendían
  - se daban a sí mismos
  - se abandonaban
  lexicon: LSJ
  rationale: La forma media/reflexiva implica que se ponían a disposición de otros. 'Se entregaban' conserva la autodedicación y suena natural en español.
- source_word: κοινωνήσοντες
  english_pob_choice: would share in
  chosen_spanish: participar de
  alternatives_spanish:
  - tener parte en
  - compartir
  - gozar de una parte en
  lexicon: LSJ
  rationale: El futuro participial expresa una expectativa de participación futura. 'Participar de' preserva la idea de tener parte en algo y sirve bien con 'gran fama'.
- source_word: εὐκλείας
  english_pob_choice: renown
  chosen_spanish: gran fama
  alternatives_spanish:
  - renombre
  - honra
  - gloria
  lexicon: LSJ
  rationale: En español, 'fama' comunica mejor la dimensión pública de εὐκλεία; se añadió 'gran' para reflejar la intensificación de μεγάλης τινός.
- source_word: ἀπὸ τῆς ἐσομένης τῷ βασιλεῖ συναναστροφῆς
  english_pob_choice: from the association with the king that was to come
  chosen_spanish: por la asociación con el rey que estaba por venir
  alternatives_spanish:
  - por la futura convivencia con el rey
  - por la relación que tendrían con el rey
  - por el trato futuro con el rey
  lexicon: LSJ
  rationale: συναναστροφή denota asociación o trato compartido, y ἐσομένης marca que es futura. 'Asociación' evita una domesticación excesiva y sigue de cerca el valor semántico del original.
theological_decisions:
- issue: εὐσέβεια en un contexto cívico-religioso
  english_pob_reading: the city's piety
  chosen_spanish_reading: la piedad de la ciudad
  alternative_spanish_readings:
  - la devoción de la ciudad
  - la religión de la ciudad
  rationale: Se conserva la noción de piedad/devoción religiosa sin desplazarla hacia un concepto institucional moderno. El texto griego habla de la práctica piadosa compartida por la ciudad, no de una confesión doctrinal formal.
  doctrine_reference: Translation philosophy §§1, 6
- issue: εὐκλεία y la motivación de prestigio
  english_pob_reading: some great renown
  chosen_spanish_reading: alguna gran fama
  alternative_spanish_readings:
  - algún gran renombre
  - alguna gran honra
  - alguna gloria
  rationale: El griego presenta una expectativa de honor público. 'Fama' y 'gran' preservan el matiz de prestigio buscado sin introducir un vocabulario más teológico que el del original.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del audit trail inglés, que cambió 'supports' a 'foundations' para ἐπιβάθρας. La versión española refleja esa preferencia con 'fundamentos', manteniendo además el resto de las decisiones léxicas estables del POB inglés y ajustándolas a un español natural.
  spanish_consistency_notes:
  - Se mantuvo 'piedad' para εὐσέβεια, en línea con el valor religioso cívico del griego.
  - '''Se entregaban'' conserva la reflexividad de ἑαυτοὺς ἐδίδοσαν sin añadir violencia inexistente en el contexto.'
  - '''Con facilidad'' y ''superficialmente'' juntos reproducen el doble matiz de εὐχερῶς y ἐπιπολαίως sin redundancia excesiva.'
  - Se evitó 'Cristo', 'SEÑOR' o terminología eclesial ajena al pasaje, porque el texto no la contiene.
