  text: לֹ֤א יִבְנוּ֙ וְ/אַחֵ֣ר יֵשֵׁ֔ב לֹ֥א יִטְּע֖וּ וְ/אַחֵ֣ר יֹאכֵ֑ל כִּֽי כִ/ימֵ֤י הָ/עֵץ֙ יְמֵ֣י עַמִּ֔/י וּ/מַעֲשֵׂ֥ה יְדֵי/הֶ֖ם יְבַלּ֥וּ בְחִירָֽ/י־׃
