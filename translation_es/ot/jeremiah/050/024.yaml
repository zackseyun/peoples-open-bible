translation:
  language: es
  text: Te tendí una trampa[a], y tú también fuiste atrapada, Babilonia, y no lo supiste; fuiste hallada y también fuiste apresada[b], porque contendiste contra Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te eché una trampa». El verbo hebreo puede traducirse también «tendí un lazo» o «puse una trampa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fuiste descubierta y capturada». Los dos verbos intensifican la caída de Babilonia.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «porque contendiste contra el SEÑOR». Se mantiene «Yahvé» para reflejar el nombre divino del hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָקֹשְׁתִּי
  english_pob_choice: I set a trap
  chosen_spanish: Te tendí una trampa
  alternatives_spanish:
  - Te puse una trampa
  - Te armé una trampa
  - Te tendí un lazo
  lexicon: HALOT
  rationale: El verbo expresa la acción concreta de preparar una trampa o lazo. «Tendí una trampa» conserva la imagen y suena natural en español, sin suavizar la fuerza del verbo.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: te
  alternatives_spanish:
  - para ti
  - contra ti
  lexicon: HALOT
  rationale: En español, el complemento pronominal integrado en «te tendí» comunica de forma natural la dirección personal del acto sin añadir una preposición que suene forzada. Mantiene a Babilonia como destinataria directa.
- source_word: וְגַם
  english_pob_choice: and you also
  chosen_spanish: y tú también
  alternatives_spanish:
  - y además
  - y también
  lexicon: HALOT
  rationale: La partícula añade énfasis acumulativo. «Y tú también» conserva ese valor enfático y la segunda persona explícita del hebreo.
- source_word: נִלְכַּדְתְּ
  english_pob_choice: were caught
  chosen_spanish: fuiste atrapada
  alternatives_spanish:
  - fuiste capturada
  - quedaste atrapada
  lexicon: HALOT
  rationale: El nifal de לכד puede ser «ser capturado/atrapado». «Fuiste atrapada» mantiene la continuidad con la metáfora de la trampa y conserva el matiz pasivo.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilonía
  lexicon: HALOT
  rationale: Nombre propio estándar en español. Se mantiene la personificación de la ciudad.
- source_word: לֹא יָדָעַתְּ
  english_pob_choice: you did not know it
  chosen_spanish: no lo supiste
  alternatives_spanish:
  - no lo sabías
  - no te diste cuenta
  lexicon: HALOT
  rationale: El hebreo omite el objeto explícito; el contexto permite entender la trampa/captura. «No lo supiste» conserva esa elipsis sin volverla explicativa en exceso.
- source_word: נִמְצֵאת
  english_pob_choice: you were found
  chosen_spanish: fuiste hallada
  alternatives_spanish:
  - fuiste encontrada
  - fuiste descubierta
  lexicon: HALOT
  rationale: El nifal de מצא significa «ser hallado/encontrado». «Fuiste hallada» es más formal y mantiene el paralelismo con el siguiente verbo.
- source_word: וְגַם נִתְפַּשְׂתְּ
  english_pob_choice: and also seized
  chosen_spanish: y también apresada
  alternatives_spanish:
  - y también capturada
  - y también tomada
  lexicon: HALOT
  rationale: תפשׂ en nifal expresa ser aprehendida o apresada. «Apresada» conserva la progresión intensiva y se distingue de «atrapada» para no repetir de forma plana el primer hemistiquio.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la captura de Babilonia. «Porque» es la equivalencia directa y clara.
- source_word: בַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra Yahvé
  - con Yahvé
  lexicon: HALOT
  rationale: La preposición con el hitpael de גרה expresa hostilidad o contienda contra Yahvé. Se evita «el SEÑOR» según la pauta del proyecto y se conserva el nombre divino explícito.
- source_word: הִתְגָּרִית
  english_pob_choice: you contended against
  chosen_spanish: contendiste
  alternatives_spanish:
  - te enfrentaste
  - provocaste
  - luchaste contra
  lexicon: HALOT
  rationale: El hitpael de גרה tiene el sentido de provocar, incitarse o contender contra. «Contendiste» sigue de cerca la revisión inglesa más precisa y mantiene el registro formal.
theological_decisions:
- issue: Renderización del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La pauta del proyecto para español pide «Yahvé» como forma principal. Se mantiene el nombre propio divino para reflejar el texto hebreo y no se sustituye por una convención de ocultamiento litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza adversarial de הִתְגָּרִית בַיהוָה
  english_pob_reading: you contended against the LORD
  chosen_spanish_reading: contendiste contra Yahvé
  alternative_spanish_readings:
  - te enfrentaste a Yahvé
  - provocaste a Yahvé
  rationale: El hebreo expresa una actitud hostil/de desafío frente a Yahvé. «Contendiste contra» conserva mejor la relación adversarial que una lectura meramente emocional como «provocaste».
  doctrine_reference: HALOT; revisión inglesa reciente que prefirió 'contended against' por precisión léxica
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente, que ajustó el último miembro de ''challenged the LORD'' a ''contended against the LORD'' por mayor precisión léxica. La versión española adopta esa misma precisión con «contendiste contra Yahvé», y conserva la progresión intensiva: trampa → atrapada → hallada → apresada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular para יהוה conforme a la pauta del proyecto.
  - Se usa «Babilonia» para la ciudad personificada.
  - Se conserva la cadena verbal sin explicaciones añadidas para respetar la intensificación del original.
  - «Hallada» y «apresada» distinguen dos verbos sucesivos sin borrar su paralelismo.
