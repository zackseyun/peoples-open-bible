translation:
  language: es
  text: No hay paz —dice mi Dios[a][b]— para los impíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Isaías 48:22 tiene una redacción muy cercana, pero allí dice «Yahvé» en vez de «mi Dios». Aquí el hebreo conserva el posesivo de primera persona.
    reason: cross_reference
  - marker: b
    text: También puede entenderse «bienestar» o «plenitud» para שָׁלוֹם.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No hay ninguna
  lexicon: HALOT
  rationale: La negación existencial hebrea pide en español una fórmula natural y directa; «No hay» reproduce bien la negación absoluta sin volverla pesada.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: «Paz» es el equivalente más natural y tradicional para שָׁלוֹם en este contexto profético, y puede abarcar bienestar o integridad sin perder claridad.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - ha dicho
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es perfecta, la fórmula profética en español se expresa de manera idiomática con presente: «dice».'
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  - mi Dios
  lexicon: HALOT
  rationale: El sufijo de primera persona singular se conserva con el posesivo «mi»; «mi Dios» refleja con precisión la lectura masorética sin armonizarla con Isaías 48:22.
- source_word: לָרְשָׁעִים
  english_pob_choice: for the wicked
  chosen_spanish: para los impíos
  alternatives_spanish:
  - para los malvados
  - para los culpables
  - para los injustos
  lexicon: HALOT
  rationale: 'ל aquí introduce destino/pertenencia: la paz no les corresponde. «Impíos» es una forma bíblica y clara para רשעים, con fuerza moral adecuada en español.'
theological_decisions:
- issue: Preservación del posesivo en la voz divina
  english_pob_reading: '"my God" retained as the MT first-person possessive'
  chosen_spanish_reading: «mi Dios» preservado tal como está en el hebreo masorético
  alternative_spanish_readings:
  - «Dios» sin posesivo para suavizar
  - «Yahvé» por armonización con Isaías 48:22
  rationale: El texto hebreo dice אֱלֹהַי, «mi Dios», y esa forma debe mantenerse aunque exista un paralelo cercano con «Yahvé» en Isaías 48:22. La traducción no debe nivelar la tensión textual entre ambos pasajes.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje presenta una diferencia textual importante con Isaías 48:22 en la forma de la cita divina: el hebreo recibido aquí dice «mi Dios». La redacción española conserva esa lectura sin armonizarla con el paralelo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el texto hebreo lo exige; aquí el MT no lo da, por lo que se mantiene «mi Dios».
  - «Impíos» comunica bien רשעים en un registro bíblico comprensible y no introduce una reinterpretación doctrinal.
  - La puntuación con raya reproduce naturalmente el marco de cita profética en español.
  - Las notas distinguen entre la alternativa léxica de שָׁלוֹם y la observación de paralelismo textual con Isaías 48:22.
