translation:
  language: es
  text: He pisado el lagar[a] solo, y de los pueblos no hubo hombre conmigo; los pisé en mi ira y los aplasté en mi furor; su sangre[b] salpicó mis vestidos, y manché toda mi ropa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hubo nadie conmigo». El hebreo dice literalmente «no hubo hombre conmigo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su sangre vital». El término hebreo puede evocar el flujo del jugo en la imagen del lagar, aunque aquí se refiere metafóricamente a la sangre de los juzgados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פּוּרָה
  english_pob_choice: the winepress
  chosen_spanish: el lagar
  alternatives_spanish:
  - la prensa
  - el lagar de vino
  lexicon: HALOT
  rationale: En el contexto de pisar uva y de juicio, «lagar» comunica naturalmente la imagen del lugar donde se pisa la uva. Evita una perífrasis innecesaria y mantiene el valor metafórico.
- source_word: דָּרַכְתִּי
  english_pob_choice: I have trodden
  chosen_spanish: He pisado
  alternatives_spanish:
  - He hollado
  - Pisé
  lexicon: HALOT
  rationale: «Pisar» reproduce bien el acto de ejercer presión con los pies en el lagar y suena natural en español. El perfecto compuesto mantiene el tono vívido del hebreo y del inglés POB.
- source_word: לְבַדִּי
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - por mi cuenta
  - solamente
  lexicon: HALOT
  rationale: «Solo» es la forma más directa y clara en español, sin añadir matices ajenos al texto.
- source_word: וּמֵעַמִּים
  english_pob_choice: from the peoples
  chosen_spanish: de entre los pueblos
  alternatives_spanish:
  - de los pueblos
  - entre los pueblos
  - de las naciones
  lexicon: HALOT
  rationale: «De entre los pueblos» preserva el valor de separación implícito en מִן sin perder la referencia colectiva plural. También evita reducir el plural a un singular abstracto.
- source_word: אֵין אִישׁ אִתִּי
  english_pob_choice: no man was with me
  chosen_spanish: no hubo hombre conmigo
  alternatives_spanish:
  - no hubo nadie conmigo
  - no estuvo conmigo ningún hombre
  lexicon: HALOT
  rationale: «No hubo hombre conmigo» conserva el singular masculino אִישׁ y la soledad total. Es más fiel al registro del hebreo que una neutralización completa.
- source_word: וְאֶדְרְכֵם
  english_pob_choice: I trod them
  chosen_spanish: los pisé
  alternatives_spanish:
  - los hollen
  - los aplasté con los pies
  lexicon: HALOT
  rationale: Mantiene el eco del primer verbo con el mismo campo semántico de pisar/trochar, sin perder fluidez en español.
- source_word: בְּאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi enojo
  - en mi furor
  lexicon: HALOT
  rationale: «Ira» refleja bien el sentido idiomático de אַף y conserva el tono judicial elevado.
- source_word: וְאֶרְמְסֵם
  english_pob_choice: and trampled them
  chosen_spanish: y los aplasté
  alternatives_spanish:
  - y los trituré
  - y los hollé
  lexicon: HALOT
  rationale: «Aplastar» intensifica la acción respecto de «pisar» y comunica bien רמס en español, conservando el paralelismo sin repetir exactamente el mismo verbo.
- source_word: בַּחֲמָתִי
  english_pob_choice: in my wrath
  chosen_spanish: en mi furor
  alternatives_spanish:
  - en mi ira ardiente
  - en mi cólera
  lexicon: HALOT
  rationale: «Furor» refleja la intensidad de חֵמָה y permite distinguirlo de בְאַפִּי («en mi ira»).
- source_word: וְיֵז
  english_pob_choice: spattered
  chosen_spanish: salpicó
  alternatives_spanish:
  - roció
  - esparció
  lexicon: HALOT
  rationale: «Salpicar» comunica bien el movimiento líquido violento del verbo en un registro natural y visual.
- source_word: נִצְחָם
  english_pob_choice: their lifeblood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre vital
  - su sangre derramada
  lexicon: HALOT
  rationale: En español, «sangre» mantiene la imagen del juicio sin sobreexplicar. La noción metafórica de jugo/líquido del lagar queda implícita por el contexto, como en el inglés POB con la nota alternativa.
- source_word: בְּגָדַי
  english_pob_choice: my garments
  chosen_spanish: mis vestidos
  alternatives_spanish:
  - mis ropas
  - mis prendas
  lexicon: HALOT
  rationale: «Vestidos» es adecuado al registro poético bíblico y más natural que «prendas» aquí.
- source_word: וְכָל מַלְבּוּשַׁי
  english_pob_choice: all my clothing
  chosen_spanish: toda mi ropa
  alternatives_spanish:
  - todo mi vestido
  - todas mis vestiduras
  lexicon: HALOT
  rationale: Evita una repetición demasiado pesada con «vestidos» y conserva el sentido totalizador de כָל.
- source_word: אֶגְאָֽלְתִּי
  english_pob_choice: I stained
  chosen_spanish: manché
  alternatives_spanish:
  - ensucié
  - contaminé
  - profané
  lexicon: HALOT
  rationale: «Manché» expresa el resultado visible y concreto del líquido sobre la ropa, sin añadir una connotación ritual que el contexto inmediato no exige.
theological_decisions:
- issue: Imagen del lagar como juicio divino violento
  english_pob_reading: Retain the first-person divine speech and violent winepress metaphor without softening it.
  chosen_spanish_reading: Conservar la voz divina en primera persona y la metáfora violenta del lagar sin suavizarla.
  alternative_spanish_readings:
  - Interpretar la imagen de modo más abstracto como mera victoria
  - Reducir el lenguaje de ira a una acción judicial menos personal
  rationale: El hebreo presenta a Yahvé actuando solo en juicio con una imagen intensa y personal. La traducción mantiene esa tensión teológica en vez de desactivarla, para no ocultar el lenguaje profético.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Valor del singular masculino אִישׁ
  english_pob_reading: Render as 'no man was with me' in the main text.
  chosen_spanish_reading: Mantener «hombre» en el texto principal.
  alternative_spanish_readings:
  - no hubo nadie conmigo
  rationale: El hebreo usa un singular masculino explícito; por eso el español principal conserva ese rasgo, aunque una redacción más inclusiva sería posible en otro registro.
  doctrine_reference: Precisión gramatical antes que neutralización del género.
translation_notes:
  revision_awareness: Revisión final sin cambios sustanciales respecto al último pase; el consenso de auditoría es alto y solo quedan observaciones menores sobre matiz lexical en las dos notas alternativas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino en español cuando aparece en contexto profético, de acuerdo con las pautas del proyecto.
  - Se conservó la progresión imagética pisar/aplastar/salpicó/manché para reflejar el paralelismo del hebreo.
  - Se eligió un registro bíblico claro y moderno, evitando arcaísmos innecesarios y sin diluir la violencia retórica del texto.
