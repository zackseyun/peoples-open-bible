translation:
  language: es
  text: La boca de las mujeres ajenas[a] es un hoyo profundo; el que está bajo la ira de Yahvé caerá allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujeres extrañas», «mujeres extranjeras» o «mujeres adúlteras». En Proverbios, el término suele referirse a mujeres fuera de los límites sexuales legítimos o del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּחָה
  english_pob_choice: pit
  chosen_spanish: hoyo
  alternatives_spanish:
  - pozo
  - foso
  lexicon: HALOT
  rationale: El hebreo designa una cavidad o hueco peligroso. «Hoyo» conserva la imagen concreta de caída y trampas en español natural; «pozo» podría sugerir agua, y «foso» suena más técnico o artificial.
- source_word: עֲמֻקָּה
  english_pob_choice: deep
  chosen_spanish: profundo
  alternatives_spanish:
  - hondo
  - muy profundo
  lexicon: HALOT
  rationale: El adjetivo modifica directamente el sustantivo e intensifica la imagen del hueco. «Profundo» es el equivalente más claro y sobrio en español.
- source_word: פִּי
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - labios
  - habla
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. «Boca» es el equivalente directo y permite que la imagen incluya el habla seductora implícita sin explicitarla de más.
- source_word: זָרוֹת
  english_pob_choice: forbidden women
  chosen_spanish: las mujeres prohibidas
  alternatives_spanish:
  - mujeres extrañas
  - mujeres extranjeras
  - mujeres adúlteras
  lexicon: HALOT
  rationale: En Proverbios, el término suele señalar mujeres fuera de límites sexuales o de pacto, no solo extranjeras étnicas. «Prohibidas» conserva ese valor moral sin reducirlo solo a adulterio o extranjería.
- source_word: זְעוּם
  english_pob_choice: is under ... wrath
  chosen_spanish: está bajo la ira de Yahvé
  alternatives_spanish:
  - es maldecido por Yahvé
  - es detestado por Yahvé
  - está bajo el enojo de Yahvé
  lexicon: HALOT
  rationale: El participio pasivo expresa a la persona objeto de indignación divina. «Está bajo la ira de Yahvé» reproduce esa condición en español con claridad y sin suavizar la fuerza del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la convención del proyecto, evitando la sustitución por un título. «Yahvé» es la forma española establecida para el Tetragrámaton en este trabajo.
- source_word: יפול
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - cae
  - será derribado
  lexicon: HALOT
  rationale: El imperfecto proverbial expresa consecuencia cierta o general. «Caerá» suena natural en español y conserva el valor predictivo del texto.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio retoma el hoyo metafórico. «Allí» es breve, idiomático y mantiene la referencia espacial implícita.
theological_decisions:
- issue: Sentido de זָרוֹת en contexto sapiencial
  english_pob_reading: forbidden women
  chosen_spanish_reading: mujeres prohibidas
  alternative_spanish_readings:
  - mujeres extrañas
  - mujeres extranjeras
  - mujeres adúlteras
  rationale: El contexto de Proverbios apunta a mujeres sexual o covenantalmente fuera de límites, no meramente a mujeres de otro pueblo. «Prohibidas» preserva esa amplitud y evita una lectura excesivamente estrecha.
  doctrine_reference: Proverbios 2:16-19; 5:3-6; 7:5-27
- issue: Fuerza de זְעוּם יְהוָה
  english_pob_reading: he who is under Yahweh’s wrath
  chosen_spanish_reading: el que está bajo la ira de Yahvé
  alternative_spanish_readings:
  - el que es maldecido por Yahvé
  - el que es detestado por Yahvé
  rationale: La construcción refleja un estado de juicio o rechazo divino. Se mantiene «ira» para conservar la fuerza judicial y relacional del hebreo, evitando suavizarla a mera desaprobación.
  doctrine_reference: Salmo 7:11; Proverbios 3:33; Romanos 1:18
translation_notes:
  revision_awareness: El presente borrador sigue de cerca el hebreo masorético y conserva la metáfora de la boca y el hoyo. La elección de «mujeres prohibidas» continúa la decisión POB de evitar la traducción tradicional engañosamente literal «mujeres extrañas», pero en español se formula de modo más natural y transparente. No se detectaron revisiones recientes que exigieran cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la imagen corporal «boca» en vez de interpretar directamente como «habla».
  - «Ira de Yahvé» reproduce el matiz judicial sin convertirlo en una mera emoción.
  - El verbo en futuro («caerá») conserva el valor proverbial del imperfecto hebreo.
