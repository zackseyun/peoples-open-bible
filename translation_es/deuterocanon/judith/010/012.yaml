  to: 'Y la tomaron y le preguntaron: «¿Quién eres[a], y de dónde vienes, y adónde vas?». Y ella dijo: «Soy hija de los hebreos[b], y huyo de delante de ellos[c], porque están por ser entregados a ustedes para ser consumidos[d]».'
  rationale: 'Se ajusta la primera pregunta a «¿Quién eres?» para evitar una lectura posesiva extraña en español, pero se conserva la literalidad griega en nota. Se corrige el aparato de notas para que refleje las alternativas auditadas relevantes: la autoidentificación como «hija de los hebreos», la expresión «de delante de ellos», y el sentido vívido de κατάβρωμα. También se cambia «para consumo» por «para ser consumidos» para mayor naturalidad y fidelidad al resultado pasivo implícito en el contexto.'
