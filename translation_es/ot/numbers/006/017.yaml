translation:
  language: es
  text: Y ofrecerá el carnero como sacrificio de ofrendas de paz[a] a Yahvé, con la cesta de panes sin levadura; y el sacerdote ofrecerá la ofrenda de grano correspondiente y la libación correspondiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «sacrificio de ofrendas de comunión». El hebreo שְׁלָמִים admite ambas posibilidades.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho de oveja
  lexicon: HALOT
  rationale: אַיִל designa aquí un animal para sacrificio; en español, 'carnero' es el equivalente natural y específico en este contexto sacrificial.
- source_word: יַעֲשֶׂה
  english_pob_choice: he shall offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará
  - preparará
  lexicon: HALOT
  rationale: Aunque el verbo hebreo literalmente significa 'hacer', en legislación ritual el sentido cultual es 'ofrecer'. 'Ofrecerá' mantiene el valor sacrificial en español.
- source_word: זֶבַח שְׁלָמִים
  english_pob_choice: a sacrifice of peace offerings
  chosen_spanish: sacrificio de ofrendas de paz
  alternatives_spanish:
  - sacrificio de ofrendas de comunión
  - ofrenda de paz
  lexicon: HALOT
  rationale: 'La construcción conserva ambos elementos: el acto sacrificial (זֶבַח) y la clase de ofrenda (שְׁלָמִים). ''Ofrendas de paz'' sigue la terminología preferida del proyecto y evita estrechar indebidamente el sentido a ''comunión''.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino explícito en hebreo, siguiendo la política del proyecto de renderizar יהוה como 'Yahvé' en el texto principal.
- source_word: עַל סַל הַמַּצּוֹת
  english_pob_choice: with the basket of unleavened bread
  chosen_spanish: con la canasta de panes sin levadura
  alternatives_spanish:
  - con el canasto de panes sin levadura
  - junto con la canasta de panes sin levadura
  lexicon: HALOT
  rationale: עַל en este contexto ritual indica acompañamiento. 'Con' reproduce bien la relación de simultaneidad/acompañamiento, y 'panes sin levadura' expresa naturalmente מַצּוֹת.
- source_word: וְעָשָׂה הַכֹּהֵן
  english_pob_choice: and the priest shall offer
  chosen_spanish: y el sacerdote ofrecerá
  alternatives_spanish:
  - y el sacerdote hará
  - y el sacerdote presentará
  lexicon: HALOT
  rationale: El verbo עשה vuelve a tener sentido cultual. 'Ofrecerá' mantiene la coherencia sacrificial y resulta idiomático en español bíblico moderno.
- source_word: מִנְחָתוֹ
  english_pob_choice: its grain offering
  chosen_spanish: su ofrenda de grano
  alternatives_spanish:
  - su oblación de grano
  - su ofrenda vegetal
  lexicon: HALOT
  rationale: מִנְחָה en textos sacerdotales suele ser la ofrenda de grano. 'Ofrenda de grano' es clara y evita el anacronismo de 'vegetal'.
- source_word: נִסְכּוֹ
  english_pob_choice: its drink offering
  chosen_spanish: su libación
  alternatives_spanish:
  - su ofrenda líquida
  - su ofrenda de bebida
  lexicon: HALOT
  rationale: נֶסֶךְ corresponde a la ofrenda líquida vertida sobre el sacrificio. 'Libación' es un término tradicional y preciso en español culto, y aquí comunica el rito sin perder exactitud.
theological_decisions:
- issue: Renderización de יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: El texto hebreo usa el Tetragrama directamente; por la política terminológica del proyecto, se preserva el nombre divino en la forma 'Yahvé' en lugar de enmascararlo como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - sacrificios de paz
  rationale: '''Ofrendas de paz'' mantiene la categoría sacrificial tradicional y conserva la amplitud semántica del hebreo sin imponer una lectura más estrecha como ''comunión''.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés, que consolidó la relación ritual con «with the basket of unleavened bread». La presente redacción española usa «con» para reflejar ese ajuste y mantener la lectura cultual fluida. También se preservó la decisión auditada de traducir שְׁלָמִים con un equivalente que conserve su categoría sacrificial sin reducirlo a una simple interpretación devocional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה, conforme al estándar del proyecto.
  - '''Ofrendas de paz'' se usa de modo consistente para שְׁלָמִים en esta entrada, con nota alternativa por la tensión lexical documentada.'
  - '''Ofrenda de grano'' y ''libación'' reflejan los términos técnicos sacerdotales מִנְחָה y נֶסֶךְ sin suavizarlos.'
  - 'La sintaxis conserva la estructura ritual del hebreo: acción del oferente, acompañamiento de la canasta, y luego acción del sacerdote.'
