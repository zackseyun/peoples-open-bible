  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/u otros términos sensibles. ''Baal'' está bien. La decisión principal a ajustar es onomástica: preferir ''Nebat'' sobre ''Nabat'' por uso bíblico español más asentado y mejor legibilidad intertradicional.'
