translation:
  language: es
  text: Huyan[a], vuélvanse, habiten en lo profundo, habitantes de Dedán, porque he traído sobre él la calamidad de Esaú[b], el tiempo en que lo castigo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escóndanse en lo profundo para habitar»; el hebreo expresa retirarse a lugares remotos o inaccesibles.
    reason: lexical_alternative
  - marker: b
    text: «Esaú» representa a Edom, los descendientes de Esaú.
    reason: cultural_note
  - marker: c
    text: O «el tiempo de mi visitación sobre él».
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻסוּ
  english_pob_choice: Flee
  chosen_spanish: Huyan
  alternatives_spanish:
  - Huyan ustedes
  - Escapen
  - Pónganse a salvo
  lexicon: HALOT
  rationale: El imperativo plural expresa una orden urgente de escape. «Huyan» es natural en español bíblico actual y conserva la fuerza directa del mandato.
- source_word: הָפְנוּ
  english_pob_choice: turn back
  chosen_spanish: vuélvanse
  alternatives_spanish:
  - retrocedan
  - den la vuelta
  - vuelvan atrás
  lexicon: HALOT
  rationale: En secuencia con «Huyan», el verbo comunica retirarse o volverse hacia atrás ante el peligro. «Vuélvanse» mantiene la direccionalidad sin sonar demasiado interpretativo.
- source_word: הֶעְמִיקוּ לָשֶׁבֶת
  english_pob_choice: dwell deep
  chosen_spanish: habiten en lo profundo
  alternatives_spanish:
  - habiten en lo hondo
  - refúgiense en lugares apartados
  - vivan retirados
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a retirarse a lugares remotos o inaccesibles. «Habiten en lo profundo» conserva la imagen compacta del original sin perder inteligibilidad.
- source_word: יֹשְׁבֵי דְּדָן
  english_pob_choice: inhabitants of Dedan
  chosen_spanish: habitantes de Dedán
  alternatives_spanish:
  - los que habitan en Dedán
  - gente de Dedán
  lexicon: HALOT
  rationale: La construcción de estado constructo se rinde de forma literal y natural como «habitantes de Dedán». «Dedán» mantiene el topónimo bíblico usual en español.
- source_word: אֵיד עֵשָׂו
  english_pob_choice: Esau’s calamity
  chosen_spanish: la calamidad de Esaú
  alternatives_spanish:
  - la desgracia de Esaú
  - el desastre de Esaú
  - la ruina de Esaú
  lexicon: HALOT
  rationale: אֵיד denota calamidad, infortunio o desastre; «calamidad» sigue de cerca la revisión inglesa final y mantiene un tono formal. Se conserva «Esaú» porque el hebreo nombra a Esaú, con el valor metonímico explicado en nota.
- source_word: הֵבֵאתִי עָלָיו
  english_pob_choice: I have brought ... upon him
  chosen_spanish: he traído ... sobre él
  alternatives_spanish:
  - he hecho venir ... sobre él
  - he puesto ... sobre él
  - he traído ... contra él
  lexicon: HALOT
  rationale: El perfecto profético se conserva con el perfecto español «he traído», que comunica tanto la certeza del juicio como su formulación ya realizada en el oráculo.
- source_word: עֵת פְּקַדְתִּיו
  english_pob_choice: the time when I punish him
  chosen_spanish: el tiempo de su castigo
  alternatives_spanish:
  - el tiempo en que lo castigo
  - el tiempo de visitarlo con juicio
  - el tiempo de mi visitación sobre él
  lexicon: HALOT
  rationale: פּקד en este contexto es una visita judicial. «Castigo» expresa el sentido punitivo de manera clara y evita una traducción demasiado técnica o ambigua para el lector español.
theological_decisions:
- issue: Esau as a metonym for Edom
  english_pob_reading: '''Esau'' stands for Edom, Esau’s descendants.'
  chosen_spanish_reading: «Esaú» se conserva en el texto, con la referencia a Edom implícita y explicada en nota.
  alternative_spanish_readings:
  - Edom
  - los descendientes de Esaú
  - Esaú/Edom
  rationale: El hebreo dice literalmente «Esaú». Traducirlo por «Edom» borraría la forma del texto base; por eso se conserva el nombre y se aclara su valor colectivo en una nota.
  doctrine_reference: Génesis 25–36; Abdías 1:6–8
- issue: Rendering of פקד in a judgment oracle
  english_pob_reading: the time when I punish him
  chosen_spanish_reading: el tiempo de su castigo
  alternative_spanish_readings:
  - el tiempo en que lo castigo
  - el tiempo de mi visitación sobre él
  - el tiempo de su visita judicial
  rationale: Aquí פקד funciona como visita divina de juicio. «Castigo» comunica ese sentido judicial con claridad en español contemporáneo, mientras la nota preserva la alternativa lexical de «visitación».
  doctrine_reference: Jeremías 49:8; cf. Jeremías 50:25
translation_notes:
  revision_awareness: La versión inglesa auditada terminó con «calamity» en lugar de «disaster», y mantuvo la estructura del verso con «the time when I punish him». La draft española refleja esa revisión al usar «calamidad» y una equivalencia funcional para פּקד como «castigo», sin perder la opción alternativa de «visitación» en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el nombre propio «Esaú» por fidelidad al hebreo, en lugar de sustituirlo por «Edom» en el cuerpo del texto.
  - Se usa «Dedán» para el topónimo, siguiendo la grafía española habitual y el estilo bíblico leído por la comunidad.
  - «Castigo» se emplea aquí en sentido judicial profético, no como disciplina general.
