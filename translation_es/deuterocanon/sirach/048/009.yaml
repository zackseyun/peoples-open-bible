translation:
  language: es
  text: el que fue llevado hacia lo alto en una tormenta[a], y entre bandas de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el que fue llevado en una tormenta de fuego, en un carro de caballos de fuego». Esta redacción más completa hace más explícita la alusión a Elías en 2 Reyes 2:11.'
    reason: alternative_reading
lexical_decisions:
- source_word: הנלקח
  english_pob_choice: who was taken up
  chosen_spanish: el que fue levantado
  alternatives_spanish:
  - el que fue tomado
  - el que fue llevado
  lexicon: HALOT
  rationale: El participio pasivo de לקח, en el contexto de Elías, expresa ser alzado o llevado de manera extraordinaria. «Fue levantado» conserva la dirección ascendente que el audit trail inglés quiso mantener sin imponer una formulación más interpretativa que el hebreo extante.
- source_word: בסערה
  english_pob_choice: in a storm
  chosen_spanish: en una tormenta
  alternatives_spanish:
  - en un torbellino
  - en un vendaval
  lexicon: HALOT
  rationale: סערה puede significar tormenta o tempestad. «Tormenta» sigue de cerca el hebreo sin importar la formulación tradicional de 2 Reyes 2:11, y funciona bien en español moderno y reverente.
- source_word: מעלה
  english_pob_choice: above
  chosen_spanish: levantado
  alternatives_spanish:
  - arriba
  - en alto
  - hacia lo alto
  lexicon: HALOT
  rationale: La forma es difícil aislada; el contexto de ascensión y la decisión inglesa de revisar a «above» apuntan a un movimiento hacia arriba. En español, ese matiz queda mejor integrado en «fue levantado» que con una adición más explicativa.
- source_word: ובגדודי אש
  english_pob_choice: and in chariots of fire
  chosen_spanish: y en carros de fuego
  alternatives_spanish:
  - y en escuadrones de fuego
  - y en bandas de fuego
  - y con carros de fuego
  lexicon: HALOT
  rationale: Aunque el hebreo de Kahana dice literalmente algo como «y en bandas/rangos de fuego», el contexto de Elías y la revisión auditada reconocen que la lectura más acorde al conjunto es «carros de fuego». El español adopta esa solución porque el texto base y el paralelo griego convergen en la imagen del carro, y porque «carros de fuego» es la forma más natural y transparente en español.
- source_word: שמים
  english_pob_choice: the heavens
  chosen_spanish: cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo permite «cielos». Sin embargo, en esta cláusula la imagen se integra mejor con «fue levantado...», sin necesidad de explicitar «cielos» como objeto directo; el español mantiene así la fluidez del verso sin añadir una construcción no atestiguada.
theological_decisions:
- issue: Relación entre el testimonio hebreo de Sirácida y el paralelo griego más explícito sobre Elías
  english_pob_reading: Retain the Hebrew witness's less explicit imagery in the main text; preserve the Greek fuller reading in a footnote.
  chosen_spanish_reading: Mantener en el texto principal la imagen hebrea y consignar la formulación griega más amplia en nota.
  alternative_spanish_readings:
  - el que fue levantado en una tormenta de fuego, en un carro de caballos de fuego
  - el que fue arrebatado en un torbellino, en un carro de caballos de fuego
  rationale: La traducción española sigue la lectura hebrea disponible, pero la nota deja ver la tradición griega, que explicita el carro y los caballos. Así se preserva la tensión textual en vez de resolverla artificialmente.
  doctrine_reference: 'Translation philosophy: original-language primacy and transparent textual notes.'
- issue: Cómo reflejar la alusión a Elías sin armonizar en exceso con 2 Reyes 2:11
  english_pob_reading: The fuller wording makes the allusion to Elijah in 2 Kings 2:11 more explicit.
  chosen_spanish_reading: La nota hace explícita la alusión a Elías en 2 Reyes 2:11 sin desplazar el testimonio propio de Sirácida.
  alternative_spanish_readings:
  - armonizar completamente con 2 Reyes 2:11
  - dejar la alusión implícita
  rationale: Sirácida alude a Elías, pero no debe ser reescrito como si fuera simplemente una repetición del relato de Reyes. La nota preserva la referencia intertextual y evita borrar la diferencia entre testigos.
  doctrine_reference: Preserve documented lexical/theological tension; do not erase source distinction.
translation_notes:
  revision_awareness: 'Se atendió la corrección anterior: el marcador [a] ahora aparece exactamente en el texto español, anclado en la frase «en una tormenta[a]». También se evitó una nota suelta sin anclaje. La redacción principal sigue el hebreo disponible, mientras que la nota preserva la forma griega más desarrollada.'
  spanish_consistency_notes:
  - Se usó «carros de fuego» en consonancia con la revisión auditada y con el paralelo griego, evitando la lectura más débil de «ranks/bands of fire» en el texto principal.
  - Se prefirió «fue levantado» por su naturalidad y por conservar el matiz ascendente del hebreo y del audit trail inglés.
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una sustitución necesaria.
  - No se añadió «cielos» como complemento explícito en la línea principal, porque el hebreo de esta forma es sintácticamente difícil y el español fluye mejor sin sobreexplicar el movimiento ascendente.
