    rationale: La nota [a] española habla de «hijo» y precisión masculina, algo no marcado en las notas inglesas. La nota [b] española ofrece alternativas para «descanso», pero el expediente inglés preserva alternativas para «alma / vida / ser interior», no para «descanso».
  - severity: low
    issue: La decisión «Corrige» frente a «Disciplina» podría perder algo del matiz formativo completo.
    rationale: No es una desviación grave, porque «corrige» sigue dentro del campo semántico de יסר y suena natural en español. Puede mantenerse sin problema en esta revisión mínima.
