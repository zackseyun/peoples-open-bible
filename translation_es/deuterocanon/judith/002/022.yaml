translation:
  language: es
  text: de las fortalezas de la Alta Cilicia[a]. Y tomó todas sus fuerzas, los soldados de a pie, los jinetes y sus carros de guerra, y se fue a la región montañosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sintagma inicial es un fragmento en el griego conservado aquí y parece completar la idea del versículo anterior.
    reason: textual_variant
lexical_decisions:
- source_word: στερᾶς
  english_pob_choice: strongholds
  chosen_spanish: fortalezas
  alternatives_spanish:
  - plazas fuertes
  - baluartes
  - fortificaciones
  lexicon: LSJ
  rationale: En este contexto militar, el griego apunta a lugares fortificados o puntos fuertes. 'Fortalezas' preserva ese sentido y suena natural en español. 'Baluartes' sería demasiado técnico o figurado, y 'fortificaciones' es válido pero más abstracto.
- source_word: ἄνω Κιλικίας
  english_pob_choice: upper Cilicia
  chosen_spanish: la Cilicia alta
  alternatives_spanish:
  - la Cilicia superior
  - la Alta Cilicia
  lexicon: LSJ
  rationale: ἄνω expresa una designación geográfica, no una comparación moral. 'La Cilicia alta' conserva el valor regional y es idiomática en español bíblico; 'superior' suena más administrativo y menos natural.
- source_word: πᾶσαν τὴν δύναμιν αὐτοῦ
  english_pob_choice: all his forces
  chosen_spanish: todas sus fuerzas
  alternatives_spanish:
  - todo su ejército
  - toda su fuerza
  - todo su poder
  lexicon: LSJ
  rationale: En este pasaje δύναμις es fuerza militar. 'Fuerzas' mantiene el sentido colectivo y evita reducirlo solo a 'ejército' o convertirlo en un abstracto como 'poder'.
- source_word: τοὺς πεζοὺς
  english_pob_choice: foot soldiers
  chosen_spanish: los soldados de a pie
  alternatives_spanish:
  - la infantería
  - los infantes
  - los combatientes a pie
  lexicon: LSJ
  rationale: El griego distingue a los combatientes que van a pie. 'Soldados de a pie' es claro y fiel, y conserva el contraste con los jinetes.
- source_word: τοὺς ἱππεῖς
  english_pob_choice: horsemen
  chosen_spanish: los jinetes
  alternatives_spanish:
  - la caballería
  - los caballeros
  - los soldados montados
  lexicon: LSJ
  rationale: '''Jinetes'' reproduce la imagen concreta de combatientes montados. ''Caballería'' es posible, pero más institucional y menos directa.'
- source_word: τὰ ἅρματα
  english_pob_choice: chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - sus carros de guerra
  - los carros de combate
  lexicon: LSJ
  rationale: Aunque 'chariots' suele traducirse 'carros', en español 'carros' puede sonar general. Aquí se mantiene la forma breve y el contexto militar ya está dado por la lista. 'Carros de guerra' explicita demasiado.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se retiró
  - se marchó
  lexicon: LSJ
  rationale: El verbo indica salida o partida desde el lugar anterior. 'Se fue' es sencillo y natural, sin añadir matiz estratégico que no está explícito.
- source_word: ὀρεινήν
  english_pob_choice: the hill country
  chosen_spanish: la región montañosa
  alternatives_spanish:
  - la serranía
  - las montañas
  - la región de las montañas
  lexicon: LSJ
  rationale: Como sustantivo/adjetivo, el término designa una zona montañosa. 'Región montañosa' expresa bien el sentido geográfico en español moderno; 'serranía' sería más regional.
theological_decisions:
- issue: El verso inicia con un sintagma fragmentario que parece continuar la oración anterior.
  english_pob_reading: The opening phrase ... is a sentence fragment in the surviving Greek here and appears to complete the thought of the preceding verse.
  chosen_spanish_reading: 'Se conserva el fragmento como encabezamiento nominal: ''de las fortalezas de la Cilicia alta'', con nota que indica su dependencia del verso anterior.'
  alternative_spanish_readings:
  - Y salió de las fortalezas de la Cilicia alta
  - procedente de las fortalezas de la Cilicia alta
  rationale: El griego conservado no trae aquí un verbo independiente para ese segmento. Mantenerlo como fragmento respeta el estado textual y evita suplir una acción no atestiguada. La nota aclara la relación con el versículo previo.
  doctrine_reference: Crítica textual / sintaxis del texto
translation_notes:
  revision_awareness: Se revisó el pasaje con base en el texto griego de Swete y el audit trail inglés. No se introdujeron cambios interpretativos adicionales; se mantuvo la estructura fragmentaria señalada por el POB en inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - 'Se mantuvo el registro militar concreto del original: fortalezas, fuerzas, soldados de a pie, jinetes y carros.'
  - '''La Cilicia alta'' conserva la designación geográfica sin mayúscula innecesaria en el adjetivo descriptivo.'
  - '''Región montañosa'' evita forzar un equivalente tradicional fijo que no aparece en el texto griego.'
