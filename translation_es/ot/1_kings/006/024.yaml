revisions:
- from: Y cinco codos era una de las alas del querubín[a], y cinco codos la otra ala del querubín; diez codos desde la punta de sus alas hasta la punta de sus alas.
  to: Y cinco codos medía el ala una del querubín[a], y cinco codos el ala segunda del querubín; diez codos desde el extremo de sus alas hasta el extremo de sus alas.
  rationale: 'Se revisa para reflejar con mayor precisión las decisiones fuente y del POB: «ala una ... ala segunda» conserva mejor הָאֶחָת / הַשֵּׁנִית, y «extremo» pasa al texto principal en conformidad con la elección inglesa documentada, mientras «punta» queda como alternativa léxica en la nota. La redacción sigue siendo comprensible en español bíblico moderno y dignificado.'
