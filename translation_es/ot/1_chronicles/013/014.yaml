revisions:
- from: Y el arca de Dios permaneció con la casa de Obed-edom[a], en su casa, durante tres meses. Yahvé bendijo la casa de Obed-edom y todo lo que tenía.
  to: Y el arca de Dios permaneció con la familia de Obed-edom[a], en su casa, durante tres meses. Yahvé bendijo a la familia de Obed-edom y todo lo que le pertenecía.
  rationale: Se revisa 'casa' a 'familia' en las ocurrencias donde el audit trail inglés documenta el sentido de 'household', preservando la distinción con 'en su casa' para el edificio físico. También se ajusta 'todo lo que tenía' a 'todo lo que le pertenecía' para reflejar mejor אֲשֶׁר לוֹ. La nota se rehace para sonar natural en español y explicar con claridad la alternativa literal 'casa'.
