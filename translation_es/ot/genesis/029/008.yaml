translation:
  language: es
  text: 'Ellos dijeron: «No podemos hasta que se reúnan todos los rebaños y rueden la piedra de la boca del pozo[a]; entonces abrevamos a las ovejas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la abertura del pozo»; «la boca del pozo» conserva la imagen concreta del hebreo para la abertura.
    reason: lexical_alternative
  - marker: b
    text: O «al rebaño»; el hebreo צֹאן puede referirse colectivamente al ganado menor, especialmente ovejas y cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא נוּכַל
  english_pob_choice: We cannot
  chosen_spanish: No podemos hacerlo
  alternatives_spanish:
  - No podemos
  - No nos es posible
  lexicon: HALOT
  rationale: El hebreo expresa incapacidad en primera persona plural. «No podemos» es directo y natural; añadí «hacerlo» para dejar explícita la referencia al procedimiento sin introducir contenido nuevo, manteniendo la fluidez en español.
- source_word: יֵאָסְפוּ כָּל הָעֲדָרִים
  english_pob_choice: all the flocks are gathered
  chosen_spanish: se reúnan todos los rebaños
  alternatives_spanish:
  - se junten todos los rebaños
  - se hayan reunido todos los rebaños
  - se reúnan todos los ganados
  lexicon: HALOT
  rationale: עֲדָרִים puede referirse a rebaños o manadas de pequeño ganado; «rebaños» evita sobreespecificar y funciona bien en el contexto pastoril. El subjuntivo español refleja la cláusula temporal hasta que.
- source_word: וְגָלֲלוּ אֶת הָאֶבֶן
  english_pob_choice: they roll the stone away
  chosen_spanish: se ruede la piedra
  alternatives_spanish:
  - rueden la piedra
  - se quite la piedra rodándola
  - rueden la piedra a un lado
  lexicon: HALOT
  rationale: גלל significa «rodar». En español, una pasiva refleja («se ruede la piedra») reproduce la idea de movimiento para quitarla sin forzar un agente explícito que el hebreo tampoco destaca en esta construcción.
- source_word: מֵעַל פִּי הַבְּאֵר
  english_pob_choice: from the mouth of the well
  chosen_spanish: de la boca del pozo
  alternatives_spanish:
  - de encima de la boca del pozo
  - de sobre la boca del pozo
  - de la abertura del pozo
  lexicon: HALOT
  rationale: פִּי es literalmente «boca», la imagen concreta que el hebreo usa para la abertura. La opción «boca del pozo» conserva esa metáfora y es plenamente comprensible en español.
- source_word: וְהִשְׁקִינוּ
  english_pob_choice: then we water
  chosen_spanish: entonces abrevamos
  alternatives_spanish:
  - y abrevamos
  - entonces damos de beber
  - y damos de beber
  lexicon: HALOT
  rationale: El hifil de שקה significa «dar de beber / abrevar». «Abrevamos» es preciso y idiomático en español bíblico actual; el «entonces» refleja la secuencia marcada en el contexto.
- source_word: הַצֹּאן
  english_pob_choice: the sheep
  chosen_spanish: a las ovejas
  alternatives_spanish:
  - al rebaño
  - a la grey
  - a las ovejas y al ganado menor
  lexicon: HALOT
  rationale: צֹאן es ganado menor, a menudo ovejas y cabras. Dado que el contexto inmediato habla de rebaños y del cuidado pastoril, «ovejas» es natural; la nota preserva la posible amplitud colectiva.
translation_notes:
  revision_awareness: La versión inglesa del POB pasó de una puntuación con punto a un punto y coma antes de «then we water the sheep», para reflejar mejor la secuencia hebrea. En español se conserva esa relación temporal con «entonces» y punto y coma, sin alterar el contenido léxico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «rebaños» para עֲדָרִים y «ovejas» para צֹאן, respetando la distinción entre el grupo de llegada y el ganado menor que se abreva.
  - La pasiva refleja «se ruede la piedra» evita imponer agentes no expresados en el hebreo y suena natural en español bíblico contemporáneo.
