translation:
  text: Therefore his friends and bodyguards[a], seeing the acute distress that had come upon him, hurried to set matters straight[b], fearing that even his life might fail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seeing the acute affliction that had seized him.' The Greek describes a sudden severe condition without specifying its exact nature.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'fearing lest even the living/life should fail.' That is, they feared he might die.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - for which reason
  - from which
  lexicon: LSJ
  rationale: Inferential conjunction drawing a conclusion from the preceding scene; 'Therefore' is natural modern English and preserves the causal link.
- source_word: φίλοι
  chosen: friends
  alternatives:
  - courtiers
  - companions
  lexicon: LSJ
  rationale: The basic sense is 'friends.' In royal context it can imply court associates, but the text itself does not require the more interpretive 'courtiers,' so 'friends' stays closer to the Greek.
- source_word: σωματοφύλακες
  chosen: bodyguards
  alternatives:
  - guards
  - personal guards
  lexicon: LSJ
  rationale: Literally 'body-guards'; 'bodyguards' is the clearest idiomatic English equivalent.
- source_word: ὀξεῖαν ... εὔθυναν
  lemma: ὀξεῖαν
  chosen: the sharp distress
  alternatives:
  - the acute agitation
  - the severe upset
  lexicon: LSJ
  rationale: The adjective ὀξεῖαν ('sharp, acute') modifies an implied feminine noun supplied by the participial phrase and context. Rendering the sense as 'sharp distress' communicates the king's sudden severe condition without over-specifying a medical diagnosis.
- source_word: καταλαβοῦσαν αὐτόν
  chosen: that had come upon him
  alternatives:
  - that had seized him
  - that had overtaken him
  lexicon: LSJ
  rationale: The participle indicates something that has overtaken or seized him. 'Had come upon him' is idiomatic and broad enough for the context of sudden affliction.
- source_word: εὔθυναν
  chosen: hurried to set matters straight
  alternatives:
  - took corrective action
  - made things right
  - proceeded to remedy the situation
  lexicon: LSJ
  rationale: The verb can mean to set straight, correct, or regulate. In context the attendants respond urgently to the king's condition; this rendering preserves both the corrective sense and the urgency implied by the situation.
- source_word: φοβούμενοι
  chosen: fearing
  alternatives:
  - being afraid
  - in fear that
  lexicon: LSJ
  rationale: Straightforward participial sense introducing their motive.
- source_word: μὴ καὶ τὸ ζῆν ἐκλείπῃ
  chosen: that even his life might fail him
  alternatives:
  - that he might even die
  - that even his living might cease
  lexicon: LSJ
  rationale: Literally, 'that even the living/life might fail.' 'His life might fail him' preserves the Greek imagery better than the more flattened 'he might die,' while remaining readable.
