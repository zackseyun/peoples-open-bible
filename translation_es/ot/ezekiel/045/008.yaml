translation:
  language: es
  text: Esta tierra le pertenecerá como posesión en Israel. Y mis príncipes ya no oprimirán a mi pueblo[a], sino que darán la tierra a la casa de Israel según sus tribus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y la tierra la darán a la casa de Israel por sus tribus».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאָרֶץ
  english_pob_choice: This land
  chosen_spanish: Esta tierra
  alternatives_spanish:
  - La tierra
  - Esa tierra
  lexicon: HALOT
  rationale: El hebreo antepone el complemento con fuerza topical; en español, «Esta tierra» conserva mejor el valor deíctico y enfático que una simple «la tierra», sin sonar forzado.
- source_word: יִהְיֶה לּוֹ
  english_pob_choice: shall belong to him
  chosen_spanish: le pertenecerá
  alternatives_spanish:
  - será de él
  - será suya
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión; «le pertenecerá» es natural en español y mantiene la idea de pertenencia sin añadir matices ajenos.
- source_word: לַאֲחֻזָּה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como propiedad
  lexicon: HALOT
  rationale: אֲחֻזָּה puede referirse a una tenencia o posesión territorial. «Como posesión» conserva el sentido amplio y evita precisar indebidamente hacia «heredad» o «propiedad».
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - entre Israel
  lexicon: HALOT
  rationale: La preposición es locativa y directa; «en Israel» es la equivalencia más natural y fiel.
- source_word: יוֹנוּ
  english_pob_choice: oppress
  chosen_spanish: oprimirán
  alternatives_spanish:
  - maltratarán
  - explotarán
  lexicon: HALOT
  rationale: El verbo causativo tiene sentido de oprimir o abusar de poder. «Oprimirán» reproduce esa fuerza política y social.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - nunca más
  lexicon: HALOT
  rationale: Con la negación, עוֹד indica cesación de una práctica previa; «ya no» es la forma más natural en español.
- source_word: נְשִׂיאָי
  english_pob_choice: my princes
  chosen_spanish: mis príncipes
  alternatives_spanish:
  - mis jefes
  - mis gobernantes
  lexicon: HALOT
  rationale: נָשִׂיא en Ezequiel suele designar al príncipe o jefe gobernante. «Príncipes» conserva el título político y la relación con el contexto inmediato.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo mío
  lexicon: HALOT
  rationale: La expresión de pacto se puede traducir literalmente; «mi pueblo» es la forma estándar y clara en español.
- source_word: וְהָאָרֶץ יִתְּנוּ
  english_pob_choice: but they shall give the land
  chosen_spanish: sino que darán la tierra
  alternatives_spanish:
  - y darán la tierra
  - pero darán la tierra
  lexicon: HALOT
  rationale: 'El contraste con la opresión previa se expresa con «sino que», que en español marca mejor la corrección del abuso: en lugar de oprimir, deben repartir la tierra correctamente.'
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: a la casa de Israel
  alternatives_spanish:
  - a la casa de Israel
  - al pueblo de Israel
  lexicon: HALOT
  rationale: «Casa de Israel» es una designación profética estable y conviene preservarla por fidelidad literaria.
- source_word: לְשִׁבְטֵיהֶם
  english_pob_choice: according to their tribes
  chosen_spanish: según sus tribus
  alternatives_spanish:
  - por sus tribus
  - de acuerdo con sus tribus
  lexicon: HALOT
  rationale: La frase indica distribución tribal; «según sus tribus» comunica el reparto de modo natural y exacto.
theological_decisions:
- issue: Referente del posesivo «le» en la cláusula de posesión
  english_pob_reading: The pronoun refers to the prince described in the surrounding context.
  chosen_spanish_reading: El pronombre implícito se entiende del príncipe del contexto cercano.
  alternative_spanish_readings:
  - un gobernante genérico
  - el oficio gobernante en conjunto
  rationale: El contexto inmediato de Ezequiel 45 habla de la porción del príncipe; por eso se preserva la referencia sin sobreexplicarla en el texto principal.
  doctrine_reference: Contexto literario de Ezequiel 45; función del príncipe en la organización territorial
- issue: Relación entre la concesión de tierra y el cese de la opresión
  english_pob_reading: '''but they shall give the land'' marks contrast with prior oppression.'
  chosen_spanish_reading: «sino que darán la tierra» mantiene el contraste entre abuso y distribución justa.
  alternative_spanish_readings:
  - y darán la tierra
  - pero darán la tierra
  rationale: El hebreo une la corrección de la opresión con la acción positiva de asignar la tierra; el español con «sino que» conserva ese giro correctivo.
  doctrine_reference: Justicia administrativa y reparto equitativo de la tierra en el marco profético
translation_notes:
  revision_awareness: Se revisó el tramo final para conservar el contraste sintáctico del hebreo y el valor distributivo de לְשִׁבְטֵיהֶם; la formulación actual sigue la lectura de alta concordancia del audit trail inglés sin depender mecánicamente de él.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB cuando aparezca el Nombre divino; en este versículo no figura.
  - Se conserva «casa de Israel» por coherencia profética.
  - Se usa «príncipes» para נְשִׂיאִים, conforme al valor político del término en Ezequiel.
  - «Pueblo» se traduce con un poseedor de primera persona singular, respetando el sufijo hebreo.
