revisions:
- from: Y tú subirás contra mi pueblo Israel como nube para cubrir la tierra. En los postreros días acontecerá que te traeré contra mi tierra[a], para que las naciones me conozcan, cuando yo me santifique en ti delante de sus ojos, Gog.
  to: Y tú vendrás contra mi pueblo Israel como una nube para cubrir la tierra. En los postreros días acontecerá que te traeré contra mi tierra, para que las naciones me conozcan, cuando me mostraré santo por medio de ti[a] delante de sus ojos, Gog.
  rationale: 'Se revisa la cláusula de auto-santificación divina para alinear el texto principal con la decisión lexical-teológica auditada del POB: expresar la manifestación de la santidad de Dios en juicio mediante Gog, y dejar la forma más literal en nota. También se reubica el marcador de nota al lugar pertinente y se suavizan dos giros para mayor naturalidad en español («vendrás contra», «como una nube»).'
  reviewer_model: gpt-5.4
