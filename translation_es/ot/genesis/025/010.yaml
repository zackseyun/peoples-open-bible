translation:
  language: es
  text: el campo que Abraham compró a los hijos de Het[a]—allí fueron sepultados Abraham y Sara su esposa[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hititas» para «los hijos de Het». La expresión hebrea es literalmente familiar/étnica y puede designar al pueblo hitita.
    reason: lexical_alternative
  - marker: b
    text: O «allí fue sepultado Abraham y Sara su esposa».
    reason: alternative_reading
  - marker: c
    text: O «el campo que Abraham compró a los hijos de Het. Allí».
    reason: alternative_reading
lexical_decisions:
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - la tierra
  - la parcela
  lexicon: HALOT
  rationale: El hebreo designa un campo o terreno definido por el contexto funerario y de propiedad; «el campo» es la opción más natural y fiel en español. «La tierra» sería más amplia y menos precisa; «la parcela» suena demasiado moderna o administrativa.
- source_word: קָנָה
  english_pob_choice: bought
  chosen_spanish: compró
  alternatives_spanish:
  - adquirió
  - compró
  lexicon: HALOT
  rationale: En un contexto de compraventa de sepultura, «compró» expresa con claridad el acto concreto de adquisición. «Adquirió» es posible, pero resulta más general y menos vívido.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: a
  alternatives_spanish:
  - de parte de
  - a
  lexicon: HALOT
  rationale: En español, la construcción natural con compra es «compró a» para indicar el vendedor u origen de la transacción. Mantiene el valor de procedencia de מֵאֵת sin sonar forzado.
- source_word: בְּנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Het
  alternatives_spanish:
  - los hititas
  - los hijos de Heth
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de parentesco/etnia, tal como hace la POB inglesa, porque el texto no nombra directamente «los hititas». «Los hititas» es una alternativa válida, pero borra la forma literal del hebreo.
- source_word: שָׁמָּה
  english_pob_choice: There
  chosen_spanish: allí
  alternatives_spanish:
  - allí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo remite al mismo sitio de sepultura. «Allí» es el equivalente más natural y directo en español.
- source_word: קֻבַּר
  english_pob_choice: were buried
  chosen_spanish: fueron sepultados
  alternatives_spanish:
  - fueron enterrados
  - fueron sepultados
  lexicon: HALOT
  rationale: El pasivo hebreo de קבר se expresa bien con «sepultar». Dado que el sujeto compuesto en español requiere plural, «fueron sepultados» resuelve la claridad sin perder la pasiva; «enterrados» también sería posible, pero «sepultados» conserva un registro un poco más bíblico y digno.
- source_word: וְשָׂרָה אִשְׁתּוֹ
  english_pob_choice: and Sarah his wife
  chosen_spanish: y Sara, su esposa
  alternatives_spanish:
  - y Sara, su mujer
  - y Sara, su esposa
  lexicon: HALOT
  rationale: El orden hebreo se reproduce de forma natural como «Sara, su esposa». «Esposa» respeta un tono bíblico y sobrio; la coma ayuda a reflejar la aposición sin ambigüedad.
theological_decisions:
- issue: Relación entre el singular hebreo קֻבַּר y el sujeto compuesto Abraham/Sara
  english_pob_reading: the burial statement applies to both Abraham and Sarah, with English revised to avoid implying only Abraham was buried
  chosen_spanish_reading: se entienden sepultados Abraham y Sara juntos en ese lugar
  alternative_spanish_readings:
  - allí fue sepultado Abraham y Sara, su esposa
  - allí fueron sepultados Abraham y Sara, su esposa
  rationale: El hebreo usa un verbo pasivo singular con sujeto compuesto, una construcción normal que no debe traducirse de manera que sugiera solo a Abraham. El plural español «fueron sepultados» comunica claramente que la acción abarca a ambos, alineándose con la revisión inglesa.
  doctrine_reference: Hebreo bíblico; coherencia sintáctica del sujeto compuesto
- issue: Rendición de בְּנֵי חֵת sin reemplazarlo automáticamente por un término etnogeográfico más interpretativo
  english_pob_reading: the sons of Heth, with a footnote noting 'the Hittites' as an alternative
  chosen_spanish_reading: los hijos de Het
  alternative_spanish_readings:
  - los hititas
  - los descendientes de Het
  rationale: 'La POB inglesa preserva la forma literal del hebreo y añade la alternativa interpretativa. En español se mantiene la misma estrategia: texto principal literal y nota que reconoce la lectura etnográfica.'
  doctrine_reference: Precisión léxica y transparencia textual
translation_notes:
  revision_awareness: 'La POB inglesa revisó dos puntos relevantes: (1) prefirió conectar la frase topical del «campo» con el adverbio locativo «allí» para evitar fragmentación; (2) corrigió la ambigüedad de una redacción que podía insinuar que solo Abraham fue sepultado. La versión española sigue esas decisiones con una sola oración y un verbo plural claro.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros pasajes según la política del proyecto; aquí no aparece el tetragrámaton.
  - «Het» se conserva como transliteración del nombre propio, siguiendo la forma usada en el audit trail inglés.
  - «sepultados» se usa por consistencia reverente y porque el contexto es de tumba funeraria, no de simple entierro casual.
