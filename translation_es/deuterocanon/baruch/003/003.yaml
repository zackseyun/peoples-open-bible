translation:
  language: es
  text: Porque tú permaneces sentado[a] para siempre, y nosotros estamos pereciendo para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entronizado para siempre». El griego dice literalmente «sentado para siempre», lo cual puede implicar entronización en contexto, pero no menciona explícitamente un trono.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón o fundamento de la afirmación anterior; en español, «Porque» expresa bien esa causalidad sin sonar forzado.
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - vosotros
  - usted
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para mantener el contraste enfático con «nosotros».
- source_word: καθήμενος
  english_pob_choice: sit
  chosen_spanish: estás sentado
  alternatives_spanish:
  - estás sentado en trono
  - reinas sentado
  - permanece sentado
  lexicon: BDAG
  rationale: El griego dice literalmente «sentado»; el participio presente se vierte de forma natural en español como estado actual. No se añade «trono» en el texto principal porque el griego no lo menciona explícitamente.
- source_word: τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por la eternidad
  lexicon: BDAG
  rationale: Expresa la duración continua de manera natural y fiel al valor idiomático del acusativo de duración.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: Se mantiene el pronombre explícito para conservar el contraste retórico con la permanencia divina.
- source_word: ἀπολλύμενοι
  english_pob_choice: are perishing
  chosen_spanish: estamos pereciendo
  alternatives_spanish:
  - perecemos
  - estamos siendo destruidos
  - nos estamos perdiendo
  lexicon: BDAG
  rationale: El participio presente comunica un proceso en curso; «estamos pereciendo» preserva ese aspecto durativo sin decidir entre destrucción, ruina o agotamiento.
theological_decisions:
- issue: Si καθήμενος debe explicitarse como entronización real o celestial
  english_pob_reading: Kept the more literal 'sit' in the main text; note allows 'sit enthroned forever' as an alternative
  chosen_spanish_reading: Se mantiene «estás sentado» en el texto principal, con una nota que permite la lectura «sentado en trono»/«entronizado» como implicación contextual
  alternative_spanish_readings:
  - estás entronizado por siempre
  - reinas sentado por siempre
  rationale: La escena se dirige a Dios y sugiere permanencia soberana, pero el griego solo dice «sentado». Para no resolver una tensión interpretativa que el texto no explicita, la versión principal conserva la imagen postural y la nota recoge la posible implicación real.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisó «remain seated» a «sit» para reflejar con más inmediatez καθήμενος; la redacción española sigue esa decisión con «estás sentado», manteniendo la imagen literal y la tensión entre postura y realeza implícita.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el referente divino porque aquí no aparece κύριος; el texto griego se dirige directamente a Dios mediante el pronombre de segunda persona.
  - Se escogió «por siempre» de forma uniforme para τὸν αἰῶνα en ambas mitades del versículo, preservando el paralelismo retórico.
  - «Estamos pereciendo» conserva mejor el aspecto progresivo del participio griego que un simple presente gnómico como «perecemos».
  - La nota de entronización se formula como alternativa, no como sustitución del texto principal, para respetar la evidencia léxica del participio καθήμενος.
