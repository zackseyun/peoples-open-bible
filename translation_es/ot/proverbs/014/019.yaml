    text: Or 'prostrate themselves before the good.' The Hebrew verb can denote a deeper act of bowing low.
    reason: lexical_alternative
  - marker: b
    text: '''At the gates of the righteous'' may imply coming in dependence, supplication, or acknowledgment of the righteous person''s standing.'
