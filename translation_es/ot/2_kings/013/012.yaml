  language: en
  yaml_path: translation/ot/2_kings/013/012.yaml
  text: Now the rest of the acts of Joash[a], and all that he did[b], and his might with which he fought against Amaziah king of Judah—are they not written in the Book of the Chronicles of the Kings of Israel?
  footnotes:
  - marker: a
    text: Or 'how he fought against Amaziah king of Judah.' The Hebrew preposition is literally 'with,' but in this military context it denotes hostile engagement.
    reason: lexical_alternative
  - marker: b
    text: This 'Book of the Chronicles of the Kings of Israel' refers to a royal annalistic source cited in Kings, not the biblical book of Chronicles.
    reason: cross_reference
