  text: כִּֽי הִנֵּ֤ה אָֽנֹכִי֙ מְצַוֶּ֔ה וַ/הֲנִע֥וֹתִי בְ/כָֽל הַ/גּוֹיִ֖ם אֶת בֵּ֣ית יִשְׂרָאֵ֑ל כַּ/אֲשֶׁ֤ר יִנּ֨וֹעַ֙ בַּ/כְּבָרָ֔ה וְ/לֹֽא יִפּ֥וֹל צְר֖וֹר אָֽרֶץ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/amos/009/009.yaml
  text: For behold[a], I am commanding, and I will shake the house of Israel among all the nations, as one shakes with a sieve[b], yet not a pebble will fall to the ground.
  footnotes:
  - marker: a
    text: Or, 'as grain is shaken in a sieve.' The Hebrew comparison is compact and can be expressed in several natural English ways.
    reason: lexical_alternative
  - marker: b
    text: Or, 'not a kernel,' 'not a stone,' or 'not a pebble.' The Hebrew צְרוֹר denotes a small compact object; the exact image is debated.
    reason: lexical_alternative
