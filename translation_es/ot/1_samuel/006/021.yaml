translation:
  language: es
  text: 'Entonces enviaron mensajeros a los habitantes de Kiriat-jearim[a], diciendo: «Los filisteos han devuelto el arca de Yahvé. Bajen; súbanla con ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desciendan; súbanla a donde ustedes están». Los verbos hebreos usan imágenes topográficas («bajar» ... «subir»), probablemente reflejando el terreno entre Bet-semes y Kiriat-jearim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: So they sent
  chosen_spanish: Entonces enviaron
  alternatives_spanish:
  - Y enviaron
  - Así enviaron
  lexicon: HALOT
  rationale: El wayyiqtol hebreo avanza la narración; «entonces» conserva la secuencia narrativa de forma natural en español sin perder el valor consecutivo.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - emisarios
  - ángeles
  lexicon: HALOT
  rationale: En este contexto humano, «mensajeros» evita la ambigüedad de «ángeles» y refleja el sentido comunicativo básico del término.
- source_word: יוֹשְׁבֵי קִרְיַת יְעָרִים
  english_pob_choice: the inhabitants of Kiriath-jearim
  chosen_spanish: los habitantes de Kiriat-jearim
  alternatives_spanish:
  - los residentes de Kiriat-jearim
  - los que habitaban en Kiriat-jearim
  lexicon: HALOT
  rationale: El participio constructo expresa literalmente a los que moraban allí; «habitantes» es idiomático y fiel. Se translitera el topónimo de manera consistente en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: Es la fórmula estándar que introduce discurso directo; «diciendo» es la opción más natural y directa en español.
- source_word: הֵשִׁבוּ
  english_pob_choice: have returned
  chosen_spanish: han devuelto
  alternatives_spanish:
  - han regresado con
  - han traído de vuelta
  - lo han enviado de vuelta
  lexicon: HALOT
  rationale: El hiphil de שוב implica causar que vuelva o devolver. «Han devuelto» conserva el matiz de acción completada con relevancia actual, como en el inglés auditado.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahweh
  - el arca de Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según la política del proyecto: YHWH → «Yahvé». «Arca» reproduce el sustantivo hebreo en su sentido cultual y no requiere adaptación adicional.'
- source_word: רְדוּ
  english_pob_choice: Come down
  chosen_spanish: Bajen
  alternatives_spanish:
  - Desciendan
  - Vayan hacia abajo
  lexicon: HALOT
  rationale: El imperativo de ירד expresa movimiento hacia abajo desde la perspectiva de los hablantes. «Bajen» es natural en español y conserva la dirección topográfica.
- source_word: הַעֲלוּ אֹתוֹ אֲלֵיכֶם
  english_pob_choice: bring it up to yourselves
  chosen_spanish: súbanla hasta ustedes
  alternatives_spanish:
  - llévenla arriba a ustedes
  - háganla subir hasta ustedes
  - súbanla hacia ustedes
  lexicon: HALOT
  rationale: El hiphil de עלה conserva el verbo de ‘subir’ y, por el objeto femenino «el arca», el pronombre debe concordar en español («la»). «Hasta ustedes» preserva el valor de אֲלֵיכֶם sin sonar forzado.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, y la política del proyecto para el español exige «Yahvé» en el texto principal. Esto preserva el nombre propio del pacto en lugar de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido topográfico de los imperativos 'bajen' / 'súbanla'
  english_pob_reading: Go/come down ... bring it up to you
  chosen_spanish_reading: Bajen; súbanla hasta ustedes
  alternative_spanish_readings:
  - Desciendan; llévenla arriba a ustedes
  - Vayan abajo; tráiganla arriba a ustedes
  rationale: La nota inglesa observa que los verbos reflejan la geografía entre Bet-semes y Kiriat-jearim. En español se conserva esa tensión topográfica sin neutralizarla, manteniendo ambos verbos de movimiento.
  doctrine_reference: POB lexical audit trail on topographical verbs
translation_notes:
  revision_awareness: La revisión más reciente del contexto en inglés no introdujo cambios sustantivos y marcó el pasaje como estable. La presente propuesta sigue ese estado de alta concordancia, conservando la nota sobre los verbos topográficos y la decisión auditada sobre el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «Kiriat-jearim» como transliteración uniforme del topónimo.
  - Se conserva la concordancia femenina en «súbanla» por referirse a «el arca».
  - Se evita el calco rígido «a ustedes» en el texto principal, reservándolo para la nota como opción alternativa.
