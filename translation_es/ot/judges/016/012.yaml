  rationale: 'La revisión fortalece la correspondencia con el hebreo y con las decisiones auditadas del POB: «sogas» refleja mejor עֲבֹתִים; «las reventó» representa mejor la ruptura implícita en וַיְנַתְּקֵם; y «están sobre ti» mejora la naturalidad del grito sin perder el modismo. También se aligera la frase del acechador para mejor español leído en voz alta.'
