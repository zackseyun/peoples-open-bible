  text: '그러므로 하나님의 뜻을 따라 고난당하는 자들도 선을 행하면서 신실하신 창조주께 그들의 영혼을 맡기게 하십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρατιθέσθωσαν τὰς ψυχὰς αὐτῶν
  english_pob_choice: entrust their souls
  chosen_korean: 그들의 영혼을 맡기게
  alternatives_korean:
