  text: For the sons of Israel had walked in the wilderness forty years[a], until all the nation—the men of war who came out of Egypt—had come to an end, because they had not listened to the voice of Yahweh. Yahweh had sworn to them that he would not let them see the land that Yahweh had sworn to their fathers to give to us, a land flowing with milk and honey.
