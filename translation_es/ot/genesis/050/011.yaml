    reason: lexical_alternative
  - marker: b
    text: O «más allá del Jordán»; la expresión depende del punto de vista geográfico.
    reason: lexical_alternative
  revision_rationale: Se revisa solo para eliminar la ambigüedad del sujeto en «se llamó», haciendo explícito que el nombre corresponde al lugar, no al duelo. Se conserva el sentido, la estructura y las notas del borrador, con un ajuste menor de fluidez en la cláusula final.
