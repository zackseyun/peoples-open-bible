translation:
  language: es
  text: ¡Quién diera que mis palabras fueran escritas! ¡Quién diera que fueran grabadas en un libro[a][b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un rollo»; hebreo סֵפֶר puede referirse a un libro, rollo o documento escrito.
    reason: alternative_reading
  - marker: b
    text: O «inscritas»; el verbo sugiere una fijación duradera, no solo escritura casual.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֵּן
  english_pob_choice: Oh, that
  chosen_spanish: ¡Oh, quién diera que...!
  alternatives_spanish:
  - ¡Ojalá que...!
  - Si tan solo...
  lexicon: HALOT
  rationale: La idiomática hebrea expresa deseo intenso, no una pregunta literal. En español, «¡quién diera que...!» conserva bien el valor optativo y el tono emotivo del original sin volverlo mecánico.
- source_word: אֵפוֹ
  english_pob_choice: now
  chosen_spanish: aquí expresado por el tono exclamativo y la construcción optativa
  alternatives_spanish:
  - ahora
  - pues
  lexicon: HALOT
  rationale: La partícula intensifica la súplica o deseo. En español no siempre requiere un equivalente léxico explícito; el exclamativo ya transmite la urgencia, evitando sobrecargar el verso con un adverbio artificial.
- source_word: וְיִכָּתְבוּן
  english_pob_choice: were written down
  chosen_spanish: fueran escritas
  alternatives_spanish:
  - fueran puestas por escrito
  - fueran escritas y puestas por escrito
  lexicon: HALOT
  rationale: El hebreo expresa pasivo de escritura. «Fueran escritas» es natural y fiel; «puestas por escrito» también comunica la fijación textual, pero es más perifrástico.
- source_word: מִלָּי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mi discurso
  lexicon: HALOT
  rationale: El plural con sufijo posesivo se refiere de forma directa a las palabras de Job. «Palabras» es la equivalencia más transparente y sobria en español.
- source_word: בַּסֵּפֶר
  english_pob_choice: in a book
  chosen_spanish: en un libro[a]
  alternatives_spanish:
  - en un rollo[a]
  - en un documento
  lexicon: HALOT
  rationale: סֵפֶר puede referirse a libro, rollo o documento escrito. Mantengo «libro» como forma idiomática y añado nota para no perder la amplitud del término hebreo y su posible medio material.
- source_word: וְיֻחָקוּ
  english_pob_choice: were inscribed
  chosen_spanish: fueran grabadas[b]
  alternatives_spanish:
  - fueran inscritas[b]
  - fueran grabadas de manera permanente[b]
  lexicon: HALOT
  rationale: חקק sugiere una inscripción duradera, incluso grabado. «Grabadas» preserva esa fuerza material mejor que un simple «escritas» y deja abierta la imaginería de permanencia.
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés y el texto hebreo: se conservó el carácter optativo de מִי יִתֵּן, se trató אֵפוֹ como intensificador de urgencia más que como contenido semántico independiente, y se reflejó la progresión paralela entre «escritas» y «grabadas» para mantener la fuerza poética de preservación permanente.'
  spanish_consistency_notes:
  - Se emplea «libro» en el texto principal por naturalidad, con nota para la amplitud semántica de סֵפֶר.
  - Se usa «grabadas» para captar la dureza/ permanencia de חקק; en nota se ofrece «inscritas» como alternativa cercana.
  - No se introduce terminología eclesiástica ajena al verso; el registro es poético y sobrio.
  - La puntuación exclamativa doble ayuda a reflejar la intensidad del deseo hebreo sin añadir contenido interpretativo.
