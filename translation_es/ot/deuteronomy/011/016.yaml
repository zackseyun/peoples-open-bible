revisions:
- from: Cuídense, no sea que su corazón sea seducido, y se aparten, y sirvan a otros dioses, y se postren ante ellos[a].
  to: Tengan cuidado, no sea que su corazón sea engañado y ustedes se aparten, sirvan a otros dioses y se postren ante ellos[a].
  rationale: Se ajusta la traducción principal de יִפְתֶּה a «sea engañado» para alinearla con la decisión principal documentada en la POB inglesa, manteniendo «sea seducido» como alternativa en nota. También se suaviza la sintaxis inicial con «Tengan cuidado» y se elimina la repetición innecesaria de conjunciones para lograr un español más natural sin perder la progresión del hebreo.
