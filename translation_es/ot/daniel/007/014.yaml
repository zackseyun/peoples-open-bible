translation:
  language: es
  text: Y a él le fue dado dominio, gloria y un reino[a], para que todos los pueblos, naciones y lenguas le sirvieran. Su dominio es un dominio eterno, que no pasará jamás, y su reino no será destruido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le rindieran culto» o «le rindieran homenaje». El verbo arameo puede denotar servicio, incluido el servicio religioso, de modo que el matiz exacto puede ir más allá de la sumisión política.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִיב
  english_pob_choice: was given
  chosen_spanish: le fue dado
  alternatives_spanish:
  - le dieron
  - se le concedió
  lexicon: HALOT
  rationale: 'El arameo tiene sentido pasivo: el dominio, la gloria y el reino son otorgados a esta figura. «Le fue dado» conserva ese matiz de don recibido sin añadir un sujeto explícito.'
- source_word: שָׁלְטָן
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - autoridad
  - gobierno
  - soberanía
  lexicon: HALOT
  rationale: «Dominio» reproduce bien el campo semántico de poder real y gobierno efectivo en este contexto apocalíptico, y permite mantener la repetición del sustantivo más adelante.
- source_word: וִיקָר
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  - esplendor
  lexicon: HALOT
  rationale: «Gloria» es la forma más natural y fiel en un marco real y teológico, y conserva la elevación del lenguaje del texto.
- source_word: מַלְכוּ
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - un reinado
  - una realeza
  - un poder real
  lexicon: HALOT
  rationale: Aquí el término puede abarcar tanto el ámbito como la realidad del gobierno real. «Un reino» es la opción más clara en español y encaja con la secuencia «dominio... gloria... reino».
- source_word: עַמְמַיָּא
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - gentes
  - naciones
  - etnias
  lexicon: HALOT
  rationale: «Pueblos» conserva la amplitud colectiva y distingue este término del siguiente, evitando fundir la tríada en sinónimos casi idénticos.
- source_word: אֻמַיָּא
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - tribus
  - gentes
  lexicon: HALOT
  rationale: «Naciones» mantiene la fuerza de agrupaciones políticas o étnicas amplias y preserva la progresión de la lista universal.
- source_word: לִשָּׁנַיָּא
  english_pob_choice: languages
  chosen_spanish: lenguas
  alternatives_spanish:
  - idiomas
  - tongues
  lexicon: HALOT
  rationale: «Lenguas» es una traducción bíblica natural en español y conserva la referencia a comunidades lingüísticas distintas.
- source_word: יִפְלְחוּן
  english_pob_choice: should serve him
  chosen_spanish: le sirvieran
  alternatives_spanish:
  - le rindieran culto
  - le rindieran homenaje
  - le sirvieran como esclavos
  lexicon: HALOT
  rationale: El verbo puede abarcar servicio general y también servicio religioso. «Le sirvieran» preserva esa amplitud sin resolver el sentido hacia «adorar» o «rendir culto», manteniendo la tensión lexical y teológica documentada por el POB en inglés.
- source_word: שָׁלְטָנֵהּ שָׁלְטָן עָלַם
  english_pob_choice: His dominion is an everlasting dominion
  chosen_spanish: Su dominio es un dominio eterno
  alternatives_spanish:
  - Su dominio es un dominio perpetuo
  - Su dominio es un dominio para siempre
  lexicon: HALOT
  rationale: La repetición de «dominio» se conserva para reflejar la estructura enfática del arameo. «Eterno» expresa adecuadamente עָלַם en un registro bíblico natural en español.
- source_word: יֶעְדֵּה
  english_pob_choice: will not pass away
  chosen_spanish: no pasará
  alternatives_spanish:
  - no desaparecerá
  - no se apartará
  - no cesará
  lexicon: HALOT
  rationale: «No pasará» sigue de cerca el valor del verbo de pasar/ir y comunica bien la permanencia del dominio.
- source_word: תִתְחַבַּל
  english_pob_choice: will not be destroyed
  chosen_spanish: no será destruido
  alternatives_spanish:
  - no se arruinará
  - no será arruinado
  - no perecerá
  lexicon: HALOT
  rationale: En el contexto de reinos, el sentido apunta a ruina o destrucción. «No será destruido» es claro, sobrio y fiel.
theological_decisions:
- issue: Alcance de יִפְלְחוּן respecto a la figura semejante a un hijo de hombre
  english_pob_reading: serve him
  chosen_spanish_reading: le sirvieran
  alternative_spanish_readings:
  - le rindieran culto
  - le adoraran
  - le rindieran homenaje
  rationale: El arameo admite servicio general y servicio con matiz religioso. Traducirlo solo como «adoraran» cerraría una ambigüedad que el POB inglés preserva deliberadamente; «le sirvieran» mantiene abierta la pregunta sobre el tipo exacto de servicio, sin borrar su posible peso cultual.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla prematuramente'
translation_notes:
  revision_awareness: 'Alineado con la auditoría inglesa más reciente: no hay revisiones aplicadas y el texto base mantiene alta concordancia. La versión española conserva la estructura, la repetición de «dominio» y la ambigüedad de יִפְלְחוּן, sin introducir una resolución interpretativa adicional.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponde; aquí no aparece.
  - Se usa «dominio» de forma consistente para שָׁלְטָן, evitando variar a «autoridad» o «gobierno» sin necesidad.
  - «Lenguas» traduce לִשָּׁנַיָּא en sentido de idiomas/comunidades lingüísticas, no de órganos físicos.
  - La nota al pie está anclada en «sirvieran» para reflejar la alternativa lexical preservada por el POB inglés.
