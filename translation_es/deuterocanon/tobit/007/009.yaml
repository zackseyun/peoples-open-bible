translation:
  language: es
  text: 'Y degollaron un carnero del rebaño y sirvieron muchos platos. Entonces Tobías dijo a Rafael: «Azarías, hermano, habla acerca de los asuntos que venías tratando durante el viaje, y que el asunto sea llevado a término».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔθυσαν
  english_pob_choice: they slaughtered
  chosen_spanish: degollaron
  alternatives_spanish:
  - sacrificaron
  - mataron
  lexicon: BDAG
  rationale: El verbo puede tener matiz sacrificial o simplemente de matanza. Como el contexto inmediato es de comida y hospitalidad, «degollaron» conserva el acto de matar el animal sin imponer de antemano un sentido cultual que el verso no explicita.
- source_word: κριὸν προβάτων
  english_pob_choice: a ram from the flock
  chosen_spanish: un carnero del rebaño
  alternatives_spanish:
  - un carnero de las ovejas
  - un carnero del flock
  lexicon: LSJ
  rationale: «κριός» es «carnero» con precisión. «προβάτων» señala que pertenece al rebaño. «Un carnero del rebaño» es natural en español y mantiene la especificidad del griego.
- source_word: παρέθηκαν
  english_pob_choice: set out
  chosen_spanish: prepararon
  alternatives_spanish:
  - sirvieron
  - pusieron delante
  lexicon: BDAG
  rationale: El verbo expresa colocar o disponer delante. En español, en un contexto de comida, «prepararon» comunica de manera natural la disposición de los platos sin alejarse del acto descrito.
- source_word: ὄψα πλείονα
  english_pob_choice: many dishes
  chosen_spanish: muchos platos
  alternatives_spanish:
  - muchos manjares
  - abundantes platillos
  - varios alimentos preparados
  lexicon: LSJ
  rationale: «ὄψα» alude a alimentos preparados que acompañan el pan; «platos» funciona bien en español moderno y mantiene el sentido general de comida ya dispuesta. «Muchos» refleja πλείονα como abundancia.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - amigo
  - pariente
  lexicon: BDAG
  rationale: La dirección es literalmente «hermano». Aunque pueda usarse como tratamiento respetuoso, se conserva el término por fidelidad al texto.
- source_word: λάλησον ὑπὲρ ὧν ἔλεγες
  english_pob_choice: speak concerning the matters you were speaking about
  chosen_spanish: habla acerca de las cosas que estabas diciendo
  alternatives_spanish:
  - habla concerniente a los asuntos que mencionabas
  - di lo que venías diciendo
  lexicon: BDAG
  rationale: El griego repite la idea de hablar y de decir. En español, «habla acerca de las cosas que estabas diciendo» conserva esa referencia retrospectiva de manera natural. «Cosas» reproduce con flexibilidad el relativo plural ὧν, sin forzar un sustantivo demasiado técnico.
- source_word: ἐν τῇ πορείᾳ
  english_pob_choice: on the journey
  chosen_spanish: durante el viaje
  alternatives_spanish:
  - en el camino
  - en la travesía
  lexicon: BDAG
  rationale: La expresión se refiere al trayecto compartido. «Durante el viaje» es claro y mantiene el sentido narrativo de la caminata o desplazamiento previo.
- source_word: τελεσθήτω τὸ πρᾶγμα
  english_pob_choice: let the matter be brought to completion
  chosen_spanish: que el asunto llegue a su cumplimiento
  alternatives_spanish:
  - que el asunto se complete
  - que la cosa se haga
  lexicon: BDAG
  rationale: «τελεσθήτω» tiene la idea de llegar a término o cumplirse; «τὸ πρᾶγμα» es «el asunto». «Que el asunto llegue a su cumplimiento» preserva el tono formal y la noción de culminación sin sonar artificial en español.
theological_decisions:
- issue: Posible matiz sacrificial de ἔθυσαν
  english_pob_reading: Rendered as a meal-related slaughter rather than a formal sacrifice
  chosen_spanish_reading: Degollaron al animal para la comida, sin convertir el acto en sacrificio cultual explícito
  alternative_spanish_readings:
  - Sacrificaron un carnero del rebaño
  - Ofrecieron en sacrificio un carnero
  rationale: El contexto inmediato es una comida preparada para los invitados. Por eso se evita introducir una lectura cultual no exigida por el verso, aunque se reconoce que el verbo puede tener ese matiz en otros contextos.
  doctrine_reference: 'Principio de primacía del texto original: no importar categorías teológicas que el pasaje no afirma de forma explícita.'
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada del inglés auditado: conserva el plural implícito de ὧν con una formulación plural en español («las cosas»), mantiene un registro más formal con «estabas diciendo», y preserva la clausula final como una petición de cumplimiento («que el asunto llegue a su cumplimiento»).'
  spanish_consistency_notes:
  - Se usa «Tobías» para el nombre propio, de acuerdo con la forma española usual del personaje.
  - Se conserva «Rafael» y «Azarías» como formas españolas de los nombres en el diálogo.
  - Se evita «Señor» u otras sustituciones litúrgicas porque no hay un término divino en este versículo.
  - «Carnero» y «rebaño» mantienen la concreción zoológica del griego.
  - El tono general busca ser bíblico y publicable en español moderno, sin arcaísmos innecesarios.
