translation:
  language: es
  text: Tú destruiste a los de tiempos antiguos que practicaron injusticia—entre los cuales había gigantes, confiados en su fuerza y audacia[a]—al traer sobre ellos agua inconmensurable[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'atrevimiento' o 'insolencia' para θράσει; el contexto puede dar un matiz de valentía temeraria o arrogancia imprudente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'agua inconmensurable'; el sentido es el agua devastadora del juicio, evocando el diluvio.
    reason: cross_reference
lexical_decisions:
- source_word: τοὺς ἔμπροσθεν
  english_pob_choice: those in former times
  chosen_spanish: los de tiempos antiguos
  alternatives_spanish:
  - los de antes
  - los de tiempos anteriores
  - los de antaño
  lexicon: LSJ
  rationale: La frase señala a personas de una época anterior, no solo a las que estaban 'delante'. 'Los de tiempos antiguos' conserva el valor temporal y resulta natural en español bíblico contemporáneo.
- source_word: ἀδικίαν ποιήσαντας
  english_pob_choice: who practiced unrighteousness
  chosen_spanish: que practicaron injusticia
  alternatives_spanish:
  - que hicieron injusticia
  - que cometieron iniquidad
  - que practicaron maldad
  lexicon: BDAG/LSJ
  rationale: El griego expresa haber hecho/realizado injusticia. 'Practicaron injusticia' mantiene el matiz de conducta habitual o caracterizada por injusticia, sin forzar un término demasiado técnico.
- source_word: γίγαντες
  english_pob_choice: giants
  chosen_spanish: gigantes
  alternatives_spanish:
  - hombres poderosos
  - titanes
  lexicon: LSJ
  rationale: Se preserva el término lexical directo. 'Gigantes' conserva la fuerza del griego y el eco del relato del diluvio, sin suavizarlo hacia una expresión más general.
- source_word: ῥώμῃ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - mando
  - fortaleza
  lexicon: LSJ
  rationale: En la pareja 'fuerza y audacia', 'fuerza' es la correspondencia natural y clara para ῥώμῃ.
- source_word: θράσει
  english_pob_choice: boldness
  chosen_spanish: audacia
  alternatives_spanish:
  - atrevimiento
  - insolencia
  - osadía
  lexicon: LSJ
  rationale: El contexto es negativo, de confianza arrogante frente al juicio divino. 'Audacia' conserva el valor de valentía temeraria; se mantiene la tensión que el inglés deja abierta entre 'boldness' y sus matices negativos.
- source_word: πεποιθότες
  english_pob_choice: trusting in
  chosen_spanish: confiados en
  alternatives_spanish:
  - apoyados en
  - fiados en
  - poniendo su confianza en
  lexicon: BDAG/LSJ
  rationale: El participio perfecto denota confianza asentada. 'Confiados en' es idiomático y refleja bien el estado de dependencia/seguridad en su propia fuerza y audacia.
- source_word: διέφθειρας
  english_pob_choice: You destroyed
  chosen_spanish: Tú destruiste
  alternatives_spanish:
  - Tú arruinaste
  - Tú aniquilaste
  - Tú los destruiste
  lexicon: BDAG/LSJ
  rationale: El verbo indica destrucción decisiva bajo juicio divino. 'Tú destruiste' es directo, solemne y fiel al valor aoristo.
- source_word: ἐπαγαγὼν αὐτοῖς ἀμέτρητον ὕδωρ
  english_pob_choice: by bringing immeasurable water upon them
  chosen_spanish: al traer sobre ellos aguas inmensurables
  alternatives_spanish:
  - al traer sobre ellos agua inmensurable
  - al enviar sobre ellos un diluvio inmenso
  - al hacer venir sobre ellos aguas sin medida
  lexicon: LSJ
  rationale: Se conserva la formulación cercana al griego, incluida la literalidad de 'agua(s)' y el adjetivo 'inmensurables'. 'Aguas inmensurables' mantiene la relación con el texto fuente y evita resolver prematuramente la imagen en 'diluvio'.
theological_decisions:
- issue: Identificación de los castigados con la generación del diluvio y el uso explícito de 'gigantes'
  english_pob_reading: Retain the explicit term 'giants' and the flood imagery without harmonizing further to Genesis wording.
  chosen_spanish_reading: Mantener 'gigantes' y 'aguas inmensurables' sin reemplazarlas por una paráfrasis de 'diluvio'.
  alternative_spanish_readings:
  - los poderosos
  - los hombres violentos
  - al traer sobre ellos el diluvio
  rationale: El griego conserva su propio vocabulario y no se debe diluirlo en una armonización interpretativa. La traducción mantiene la tensión entre la referencia narrativa conocida y el lenguaje literal del pasaje.
  doctrine_reference: Primacía del texto fuente; preservar la tensión léxica y narrativa sin resolverla por tradición.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que ajustó el orden a una construcción más natural ('bringing immeasurable water upon them'). En español se optó por una solución igualmente natural ('al traer sobre ellos aguas inmensurables') sin perder la cercanía al griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto base lo requiera; aquí no aparece el tetragrámaton en el versículo.
  - Se mantiene 'gigantes' para γίγαντες conforme al audit trail inglés.
  - '''Injusticia'' refleja ἀδικία sin sobretraducirlo como ''maldad'' o ''iniquidad'' fuera de lo que el texto exige.'
  - '''Aguas inmensurables'' conserva el singular/plural ambiguo del griego y evita interpretar demasiado pronto la imagen.'
