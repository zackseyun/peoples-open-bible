translation:
  language: es
  text: Como un ave que vaga fuera de su nido[a], así es un hombre que vaga fuera de su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "un hombre que vaga fuera de su hogar"; el hebreo dice literalmente "de su lugar", una expresión más amplia que puede referirse no solo a una casa, sino también al lugar o posición propia de alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצִפּוֹר
  english_pob_choice: Like a bird
  chosen_spanish: Como un ave
  alternatives_spanish:
  - Como un pájaro
  - Como un ave pequeña
  lexicon: HALOT
  rationale: צִפּוֹר es un término general para un ave pequeña; en español, 'ave' conserva la generalidad sin forzar una especie concreta. 'Pájaro' también sería posible, pero 'ave' suena un poco más elevado y sigue siendo natural en un proverbio.
- source_word: נוֹדֶדֶת
  english_pob_choice: that wanders
  chosen_spanish: que vaga
  alternatives_spanish:
  - que anda errante
  - que se extravía
  - que vaga sin rumbo
  lexicon: HALOT
  rationale: El participio expresa movimiento errante o alejado de su sitio. 'Vaga' mantiene la imagen de deambular y permite repetir el mismo verbo en ambos miembros del proverbio, como en el hebreo.
- source_word: מִן קִנָּהּ
  english_pob_choice: from its nest
  chosen_spanish: lejos de su nido
  alternatives_spanish:
  - desde su nido
  - fuera de su nido
  - apartada de su nido
  lexicon: HALOT
  rationale: קֵן significa 'nido'. Aunque el hebreo dice literalmente 'de su nido', en español 'lejos de su nido' comunica con mayor naturalidad la idea de apartarse de él, sin perder el sentido básico de separación.
- source_word: כֵּן
  english_pob_choice: so is
  chosen_spanish: así es
  alternatives_spanish:
  - así también es
  - tal es
  - de igual modo es
  lexicon: HALOT
  rationale: כֵּן introduce la comparación entre la imagen y su aplicación humana. 'Así es' reproduce la estructura proverbial de modo claro y conciso.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular masculino representativo. 'El hombre' suena más proverbial y general en español, sin neutralizar indebidamente el género gramatical del original.
- source_word: נוֹדֵד
  english_pob_choice: who wanders
  chosen_spanish: que vaga
  alternatives_spanish:
  - que anda errante
  - que se desplaza
  - que anda de un lado a otro
  lexicon: HALOT
  rationale: Se conserva el mismo verbo que en el primer hemistiquio para mantener el paralelismo léxico. 'Vaga' expresa bien la idea de desplazamiento habitual o errante.
- source_word: מִמְּקוֹמוֹ
  english_pob_choice: from his place
  chosen_spanish: lejos de su lugar
  alternatives_spanish:
  - de su lugar
  - de su sitio
  - de su puesto
  lexicon: HALOT
  rationale: מָקוֹם es 'lugar', pero el contexto proverbial puede abarcar más que una ubicación física. 'Lejos de su lugar' conserva la amplitud del hebreo y evita reducirlo solo a 'casa', como nota el aparato inglés.
theological_decisions:
- issue: Alcance de מְקוֹמוֹ ('su lugar')
  english_pob_reading: Hebrew 'from his place' is broader and may include one's proper location or station, not only a house.
  chosen_spanish_reading: '''su lugar'' se mantiene amplio y no se restringe a ''su casa'' o ''su hogar''.'
  alternative_spanish_readings:
  - '''su casa'''
  - '''su hogar'''
  - '''su puesto'''
  rationale: La nota inglesa advierte que el hebreo es más amplio que un simple domicilio. En español, 'su lugar' conserva esa amplitud y permite abarcar ubicación, situación o estación propia sin añadir un matiz no garantizado por el texto.
  doctrine_reference: DOCTRINE.md §Lexical fidelity; Proverbs genre and imagery
translation_notes:
  revision_awareness: El inglés POB no introdujo cambios posteriores y el control cruzado reporta alta concordancia; por eso no se incorporan revisiones adicionales. La traducción española sigue el mismo paralelismo y la misma restricción semántica del hebreo, especialmente en מִמְּקוֹמוֹ.
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal con 'vaga' en ambos hemistiquios para reflejar la repetición del verbo hebreo.
  - Se conserva el masculino representativo de אִישׁ como 'el hombre', en coherencia con la decisión auditada del POB inglés.
  - No se reduce 'su lugar' a 'su casa', siguiendo la advertencia del aparato inglés sobre la amplitud de מָקוֹם.
  - Se emplea 'ave' como equivalente amplio de צִפּוֹר, evitando especificar una especie concreta.
