translation:
  language: es
  text: Tomarás a los levitas para mí—yo soy Yahvé—en lugar de todo primogénito entre los hijos de Israel[a], y el ganado de los levitas en lugar de todo primogénito entre el ganado de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "entre los israelitas". El hebreo dice "entre los hijos de Israel".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: And you shall take
  chosen_spanish: Tomarás
  alternatives_spanish:
  - Y tomarás
  - Y habrás de tomar
  lexicon: HALOT
  rationale: La forma verbal se usa como mandato dirigido a Moisés; en español, el futuro exhortativo transmite bien el tono directivo y formal sin añadir perífrasis innecesarias.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  - la tribu de Leví
  lexicon: HALOT
  rationale: El nombre del grupo tribal se expresa de manera natural como 'los levitas', manteniendo la referencia colectiva y reconocible.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: En este contexto de dedicación y reemplazo, 'para mí' conserva mejor el matiz de pertenencia/consagración que una traducción más rígida como 'a mí'.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: yo soy Yahvé
  alternatives_spanish:
  - yo, Yahvé
  - yo soy Yahvé
  lexicon: HALOT
  rationale: Se mantiene la autoidentificación enfática con el nombre divino 'Yahvé', conforme al criterio del proyecto para יְהוָה, evitando la sustitución por un título.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en lugar de
  lexicon: HALOT
  rationale: En este contexto de sustitución legal, 'en lugar de' es la opción española más clara y fiel al valor de reemplazo del término.
- source_word: כָּל בְּכֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todo primogénito
  lexicon: HALOT
  rationale: El singular distributivo de כָּל se refleja con 'todo', y 'primogénito' expresa el término técnico de primer nacido.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - entre los israelitas
  lexicon: HALOT
  rationale: Se conserva la estructura semítica 'hijos de Israel' porque el texto hebreo la usa de forma explícita; 'entre' comunica el ámbito al que pertenecen los primogénitos reemplazados.
- source_word: בֶּהֱמַת הַלְוִיִּם
  english_pob_choice: the livestock of the Levites
  chosen_spanish: el ganado de los levitas
  alternatives_spanish:
  - el ganado de los levitas
  - los animales de los levitas
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, 'ganado' comunica de modo natural el conjunto de animales domésticos vinculados a la economía del grupo; evita una expresión más técnica o más vaga.
- source_word: כָּל בְּכוֹר בְּבֶהֱמַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: every firstborn among the livestock of the sons of Israel
  chosen_spanish: todo primogénito del ganado de los hijos de Israel
  alternatives_spanish:
  - todo primogénito del ganado de los hijos de Israel
  - cada primogénito del ganado de los hijos de Israel
  lexicon: HALOT
  rationale: La repetición estructural del hebreo se mantiene con una formulación paralela y clara; 'del ganado de los hijos de Israel' expresa pertenencia sin sobrecargar la frase.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide conservar el nombre divino como 'Yahvé'. Esto preserva el carácter personal y pactual del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación de sustitución entre levitas y primogénitos
  english_pob_reading: in place of every firstborn
  chosen_spanish_reading: en lugar de todo primogénito
  alternative_spanish_readings:
  - en vez de todo primogénito
  - como reemplazo de todo primogénito
  rationale: El hebreo תַּחַת aquí expresa sustitución legal/ritual. 'En lugar de' conserva el sentido de reemplazo sin introducir interpretación adicional.
  doctrine_reference: Contexto de rescate/sustitución en Números 3
- issue: B'nê Yisra'el como fórmula nacional masculina
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - hijos de Israel
  - israelitas
  rationale: Se conserva la fórmula masculina explícita del hebreo, ya que el proyecto privilegia la precisión morfosintáctica cuando no hay necesidad contextual de neutralizar.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El borrador coincide sustancialmente con la revisión más reciente: el texto hebreo directo y la lectura inglesa auditada convergen en una estructura de reemplazo sacrificial/censal sin cambios textuales relevantes; no se documentan revisiones aplicadas en el pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - '''Hijos de Israel'' se conserva como fórmula bíblica explícita y consistente con la política de precisión morfológica.'
  - '''En lugar de'' traduce תַּחַת de manera uniforme en ambos miembros paralelos del verso.'
  - Se usa 'primogénito' en singular distributivo para reflejar כָּל + sustantivo singular.
