translation:
  language: es
  text: 'Y tú[a], hijo de hombre, así dice el Señor Dios Yahvé a la tierra de Israel: «¡Un fin! Ha llegado el fin sobre los cuatro extremos del país[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre mortal». El hebreo בֶן־אָדָם es un vocativo idiomático; «hijo de hombre» mantiene la forma más cercana al original.
    reason: lexical_alternative
  - marker: b
    text: O «de la tierra». El hebreo idiomático puede referirse a los extremos de una tierra o, en contextos más amplios, a la tierra entera.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conserva el giro idiomático hebreo y la forma masculina singular del vocativo de Ezequiel, como hace el POB en inglés con 'son of man'. 'Hijo de hombre' es la equivalencia más transparente y tradicional en español sin perder la referencia formal al original.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor YHWH
  - el Señor Dios
  lexicon: HALOT
  rationale: Se mantiene la distinción del título compuesto y la política del proyecto para יְהוָה como 'Yahvé'. 'Señor Yahvé' evita la ocultación del nombre divino y reproduce el valor reverencial de אֲדֹנָי + YHWH sin recurrir a la convención inglesa 'LORD/GOD'.
- source_word: לְאַדְמַת יִשְׂרָאֵל
  english_pob_choice: to the land of Israel
  chosen_spanish: a la tierra de Israel
  alternatives_spanish:
  - contra la tierra de Israel
  - a la región de Israel
  lexicon: HALOT
  rationale: El dativo con לְ señala al destinatario o ámbito del oráculo. 'Tierra' es la equivalencia natural de אַדְמָה en este contexto profético; se conserva el sentido local del juicio sobre Israel.
- source_word: קֵץ
  english_pob_choice: An end!
  chosen_spanish: ¡Un fin!
  alternatives_spanish:
  - ¡El fin!
  - ¡Fin!
  lexicon: HALOT
  rationale: La forma nominal aislada funciona como exclamación abrupta. '¡Un fin!' reproduce la fuerza retórica y la indefinición enfática del hebreo, manteniendo la distinción con la frase siguiente.
- source_word: בָּא הַקֵּץ
  english_pob_choice: The end has come
  chosen_spanish: Ha llegado el fin
  alternatives_spanish:
  - Viene el fin
  - El fin ha venido
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una llegada consumada o segura en el discurso profético. 'Ha llegado' expresa bien la inmediatez y mantiene el matiz de arribo del verbo בּוֹא.
- source_word: אַרְבַּעַת כַּנְפוֹת הָאָרֶץ
  english_pob_choice: the four corners of the land
  chosen_spanish: los cuatro extremos de la tierra
  alternatives_spanish:
  - los cuatro confines de la tierra
  - los cuatro rincones de la tierra
  lexicon: HALOT
  rationale: כָּנָף puede significar 'ala' y, por extensión, 'extremo/corona/borde'. En español, 'extremos' comunica la idea idiomática de totalidad territorial con naturalidad. Se conserva la posibilidad de leer el sustantivo en sentido más amplio que un simple ángulo geométrico.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: the Lord GOD / divine-name distinction preserved in English convention
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - el SEÑOR
  rationale: El proyecto español debe hacer visible el nombre propio divino según la política establecida. Por eso se evita la convención de máscara 'SEÑOR' y se usa 'Yahvé', manteniendo además el valor de reverencia de אֲדֹנָי mediante 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de הָאָרֶץ en la cláusula final
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - mundo
  - país
  rationale: El contexto inmediato dice 'a la tierra de Israel', por lo que la frase final apunta de manera natural a la extensión completa de esa tierra, no necesariamente al planeta entero. 'Tierra' conserva la ambigüedad útil del hebreo y el foco local del oráculo.
  doctrine_reference: Contexto inmediato de Ezequiel 7:2 y paralelismo con לְאַדְמַת יִשְׂרָאֵל
translation_notes:
  revision_awareness: Coincide con el sentido del borrador inglés auditado y con la lectura revisada sin cambios sustantivos en el resumen más reciente. Se ajusta solo la realización española para hacer visible el nombre divino como 'Yahvé' y para mantener la ambigüedad idiomática de 'ארבעת כנפות הארץ' con 'tierra'.
  spanish_consistency_notes:
  - Se conserva el vocativo directo con coma y segunda persona singular.
  - Se mantiene la duplicación enfática entre '¡Un fin!' y 'Ha llegado el fin'.
  - '''Tierra'' se usa de manera coherente para אַדְמָה / הָאָרֶץ en este contexto local de juicio.'
  - '''Señor Yahvé'' sigue la terminología base del proyecto para יהוה sin ocultación del nombre propio.'
