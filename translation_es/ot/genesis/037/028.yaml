base_translation:
  language: en
  yaml_path: translation/ot/genesis/037/028.yaml
  text: Then Midianite men[a], traders, passed by; and they pulled Joseph up and lifted him out of the pit, and sold Joseph to the Ishmaelites for twenty pieces of silver[c][b]. Then they brought Joseph to Egypt.
  footnotes:
  - marker: a
    text: 'Hebrew: ''for twenty silver''; the unit is not explicitly stated, hence ''pieces of silver.'''
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses plural verbs ('they pulled,' 'they brought up,' 'they sold,' 'they brought') after mentioning both Midianite traders and Ishmaelites, leaving some ambiguity about which group is in view at each step.
    reason: alternative_reading
  - marker: c
    text: Or 'they pulled Joseph up and brought him up out of the pit'.
    reason: previous_rendering
