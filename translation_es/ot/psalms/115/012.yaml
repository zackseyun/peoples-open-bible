lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto y el audit trail inglés ya justifica no ocultarlo con 'SEÑOR'. En español, 'Yahvé' es la forma establecida en este proyecto y resulta natural y reverente.
- source_word: זְכָרָנוּ
  english_pob_choice: has remembered us
  chosen_spanish: nos ha recordado
  alternatives_spanish:
  - se ha acordado de nosotros
  - nos ha tenido presentes
  lexicon: HALOT
  rationale: El hebreo expresa una acción completada de Dios respecto de su pueblo. 'Nos ha recordado' mantiene la relación semántica directa con זכר, aunque en español suene menos idiomático que 'se ha acordado de nosotros'; se conserva por fidelidad léxica y por evitar suavizar la tensión semántica.
- source_word: יְבָרֵךְ
  english_pob_choice: he will bless
  chosen_spanish: bendecirá
  alternatives_spanish:
  - que bendiga
  - bendiga
  lexicon: HALOT
  rationale: 'El imperfecto hebreo funciona aquí como futuro/prospectivo. En español, el futuro simple comunica bien la secuencia lógica: Yahvé nos recordó, por eso bendecirá.'
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - la familia de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la estructura paralela y el valor colectivo/covenantal de בֵּית. 'Casa de Israel' es transparente y reproduce el patrón poético del hebreo.
- source_word: בֵּית אַהֲרֹן
  english_pob_choice: the house of Aaron
  chosen_spanish: la casa de Aarón
  alternatives_spanish:
  - la familia de Aarón
  - el linaje de Aarón
  lexicon: HALOT
  rationale: Se preserva el paralelismo con 'la casa de Israel' y la designación sacerdotal familiar explícita, sin introducir una paráfrasis interpretativa.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se evita 'SEÑOR' porque en este proyecto el nombre del pacto no debe ser enmascarado; 'Yahvé' preserva la referencia teológica y la identidad del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado sin cambios en la última pasada; por eso la traducción española sigue de cerca las decisiones léxicas ya estabilizadas: nombre divino explícito, perfecto verbal para זכר y futuro prospectivo para יברך, con paralelismo conservado en las dos expresiones ''la casa de…''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el paralelismo repetido de 'bendecirá' para reflejar la insistencia poética del hebreo.
  - '''Casa de Israel'' y ''casa de Aarón'' mantienen el valor colectivo y genealógico del מקור hebreo sin ampliar el sentido.'
  - La nota al pie solo ofrece una alternativa lexical real para זכר y no introduce lecturas doctrinales distintas.
