translation:
  language: es
  text: 'Porque el hombre no sabe ni siquiera su tiempo: como los peces que son atrapados en una red funesta[a], y como las aves que son apresadas en un lazo, así quedan atrapados los hijos del hombre[b] en un tiempo malo[c], cuando cae sobre ellos de repente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una red mala». El hebreo dice literalmente «una red mala».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos del hombre», un modismo para los seres humanos.'
    reason: lexical_alternative
  - marker: c
    text: O «en un tiempo de calamidad». El hebreo dice «en un tiempo malo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - una persona
  lexicon: HALOT
  rationale: אָמָד aquí es un singular genérico. En español, «el hombre» conserva ese valor representativo y la relación con «su tiempo», sin diluir la fuerza literaria del hebreo.
- source_word: עִתּוֹ
  english_pob_choice: his time
  chosen_spanish: su tiempo
  alternatives_spanish:
  - su momento
  - su ocasión
  lexicon: HALOT
  rationale: «Su tiempo» reproduce de forma natural y transparente la idea de un momento o plazo que le pertenece o le corresponde, y mantiene la concisión del hebreo.
- source_word: מְצוֹדָה רָעָה
  english_pob_choice: an evil net
  chosen_spanish: una red mala
  alternatives_spanish:
  - una red malvada
  - una red funesta
  - una red de desastre
  lexicon: HALOT
  rationale: El adjetivo רָעָה en este contexto califica la red como dañina o funesta, no como «malvada» en sentido moral fuerte. «Red mala» mantiene cercanía lexical con el hebreo y la repetición temática de רעָה en el versículo.
- source_word: צִפֳּרִים
  english_pob_choice: birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves del cielo
  lexicon: HALOT
  rationale: «Aves» es un equivalente amplio y digno en español, adecuado al paralelismo poético con «peces» y con registro bíblico natural.
- source_word: פָּח
  english_pob_choice: snare
  chosen_spanish: lazo
  alternatives_spanish:
  - trampa
  - red
  lexicon: HALOT
  rationale: פָּח denota una trampa o lazo. «Lazo» conserva la imagen de captura y funciona bien en paralelo con la red del miembro anterior.
- source_word: יֽוּקָשִׁים
  english_pob_choice: are ensnared
  chosen_spanish: son atrapados
  alternatives_spanish:
  - son enredados
  - caen en la trampa
  - son apresados
  lexicon: HALOT
  rationale: El pasivo expresa quedar atrapado o caer en una trampa. «Son atrapados» es claro y natural en español, aunque el campo semántico también admite «son apresados».
- source_word: בְּנֵי הָאָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos del hombre
  alternatives_spanish:
  - los hijos de los hombres
  - los seres humanos
  - la gente
  lexicon: HALOT
  rationale: Se conserva la estructura idiomática del hebreo. «Hijos del hombre» preserva el peso retórico y la correspondencia con el singular genérico anterior, sin reemplazarlo por una abstracción.
- source_word: לְעֵת רָעָה
  english_pob_choice: at an evil time
  chosen_spanish: en un tiempo malo
  alternatives_spanish:
  - en un tiempo de desgracia
  - en un tiempo calamitoso
  - en un tiempo funesto
  lexicon: HALOT
  rationale: La frase apunta a un momento adverso o calamitoso. «En un tiempo malo» mantiene la repetición de רעָה y sigue de cerca la forma hebrea sin sobreinterpretarla.
- source_word: כְּשֶׁתִּפּוֹל עֲלֵיהֶם פִּתְאֹם
  english_pob_choice: when it suddenly falls upon them
  chosen_spanish: cuando cae sobre ellos de repente
  alternatives_spanish:
  - cuando les cae encima de repente
  - cuando les sobreviene de pronto
  lexicon: HALOT
  rationale: El hebreo usa un verbo femenino singular que retoma «tiempo»; «cae» permite mantener esa concordancia implícita en español de manera fluida, y «de repente» traduce פִּתְאֹם con naturalidad.
theological_decisions:
- issue: Valor genérico de אָדָם y la idiomática colectiva de בְּנֵי הָאָדָם
  english_pob_reading: Use 'man' for הָאָדָם and 'the sons of man' for בְּנֵי הָאָדָם
  chosen_spanish_reading: Usar «el hombre» y «los hijos del hombre»
  alternative_spanish_readings:
  - la humanidad
  - las personas
  - los seres humanos
  rationale: La línea hebrea alterna entre singular genérico e idiomática colectiva. Mantener ambas formas en español preserva la textura literaria y la tensión antropológica del versículo, en lugar de neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió «evil net» y «are ensnared» por mayor cercanía al hebreo; en español se reflejan con «red mala» y «son atrapados», manteniendo la red de imágenes de peces/aves/lazo y el contraste con el tiempo adverso. También se conserva el paralelismo entre el singular genérico («el hombre») y la expresión colectiva («los hijos del hombre»).
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton.
  - Se mantiene «el hombre» como singular genérico, en coherencia con la decisión POB sobre אָדָם.
  - «Tiempo malo» reproduce la repetición de רָעָה en ambas cláusulas sin suavizarla.
  - La combinación «red / lazo / atrapados» conserva el campo semántico de captura sin introducir vocabulario ajeno al texto.
