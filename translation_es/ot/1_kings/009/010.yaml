translation:
  language: es
  text: 'Y sucedió al cabo de veinte años[a], en los cuales Salomón había edificado las dos casas[b]: la casa de Yahvé y la casa del rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de veinte años». El hebreo expresa el punto de llegada de un período cumplido.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «las dos casas», es decir, la casa de Yahvé y la casa del rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo tramo del relato. «Y sucedió» conserva ese avance narrativo de modo natural en español, sin depender de una fórmula arcaica.
- source_word: מִקְצֵה עֶשְׂרִים שָׁנָה
  english_pob_choice: at the end of twenty years
  chosen_spanish: al cabo de veinte años
  alternatives_spanish:
  - al final de veinte años
  - después de veinte años
  lexicon: HALOT
  rationale: El hebreo idiomático señala la culminación de un período. «Al cabo de veinte años» comunica bien la idea de término cumplido, sin perder el matiz temporal del original.
- source_word: אֲשֶׁר
  english_pob_choice: in which
  chosen_spanish: en los cuales
  alternatives_spanish:
  - en que
  - durante los cuales
  lexicon: HALOT
  rationale: La relativa se refiere al período de veinte años y, en español, «en los cuales» mantiene la relación temporal de manera formal y clara.
- source_word: בָּנָה
  english_pob_choice: had built
  chosen_spanish: había edificado
  alternatives_spanish:
  - había construido
  - construyó
  lexicon: HALOT
  rationale: El pluscuamperfecto expresa que la construcción estaba completada al término del período. «Edificado» conserva un registro digno y bíblico sin forzar arcaísmo.
- source_word: שְׁנֵי הַבָּתִּים
  english_pob_choice: the two houses
  chosen_spanish: las dos casas
  alternatives_spanish:
  - los dos edificios
  - ambas casas
  lexicon: HALOT
  rationale: Se mantiene la repetición literal de «casa» porque el hebreo usa בַּיִת y luego lo especifica con las dos construcciones. «Casas» preserva la conexión léxica con los sintagmas siguientes.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino según la política del proyecto («Yahvé») y la metáfora literal «casa» para ser transparente respecto del hebreo, en vez de sustituirla por «templo».
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king's house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la casa real
  lexicon: HALOT
  rationale: La expresión literal mantiene el paralelismo con «la casa de Yahvé». «Casa del rey» es la forma más directa y fiel al hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme a la norma del proyecto, se traslada al español como «Yahvé» en vez de ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Literal preservation of בַּיִת in temple/royal-house contexts
  english_pob_reading: the two houses ... the house of Yahweh ... the king's house
  chosen_spanish_reading: las dos casas ... la casa de Yahvé ... la casa del rey
  alternative_spanish_readings:
  - los dos edificios ... el templo de Yahvé ... el palacio del rey
  rationale: Aunque el contexto permite «templo» y «palacio», el hebreo emplea «casa» tres veces y el POB inglés preserva esa repetición. Mantenerla en español deja visible la estructura del original y la conexión entre ambas construcciones.
  doctrine_reference: POB lexical transparency principle for בַּיִת
translation_notes:
  revision_awareness: Seguí la revisión más reciente del POB inglés que prefirió «in which» sobre «during which» para la cláusula relativa temporal. En español opté por «en los cuales», que refleja esa relación temporal directa sin introducir un matiz de duración más fuerte que el del hebreo. También mantuve la transparencia léxica de «the two houses» mediante «las dos casas», con identificación appositiva en el mismo versículo.
  spanish_consistency_notes:
  - Usé «Yahvé» conforme al estándar del proyecto para יְהוָה, no «SEÑOR».
  - Conservé la repetición de «casa» para respetar la terminología hebrea y el paralelismo interno del versículo.
  - Elegí «había edificado» para reflejar el valor completivo del verbo hebreo en relación con el período de veinte años.
  - La puntuación con dos puntos introduce la apposición explicativa sin alterar el contenido del verso.
