  - marker: b
    text: 'O: "me quitaron el velo" o "me quitaron el chal de encima". El hebreo רְדִיד se refiere a una prenda exterior de cobertura.'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación y el contenido de la nota [b] para que documente la prenda רְדִידִי, conforme a la auditoría inglesa y al hebreo fuente. También se mejora la naturalidad de la frase final quitando el posesivo redundante.
