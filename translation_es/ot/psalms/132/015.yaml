translation:
  language: es
  text: Ciertamente bendeciré su sustento[a]; saciaré de pan a sus pobres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su alimento» o «sus provisiones»; el término hebreo puede referirse al abastecimiento de una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֵידָהּ
  english_pob_choice: her provisions
  chosen_spanish: sus provisiones
  alternatives_spanish:
  - su alimento
  - su sustento
  - su provisión
  lexicon: HALOT
  rationale: El sustantivo puede abarcar provisión, abastecimiento o comida preparada. En este contexto de Sion/Jerusalén, «provisiones» conserva la idea de abastecimiento urbano sin introducir el matiz engañoso de caza o presa. El posesivo plural «sus» refleja el sufijo femenino singular del hebreo como referencia personificada a Sion.
- source_word: בָּרֵךְ אֲבָרֵךְ
  english_pob_choice: I will surely bless
  chosen_spanish: Ciertamente bendeciré
  alternatives_spanish:
  - Bendeciré sin falta
  - Yo bendeciré con abundancia
  - Bendeciré, bendeciré
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto con verbo finito intensifica la acción. «Ciertamente bendeciré» transmite esa fuerza enfática de manera natural en español, sin perder el carácter solemne del original.
- source_word: אֶבְיוֹנֶיהָ
  english_pob_choice: her poor
  chosen_spanish: a sus pobres
  alternatives_spanish:
  - a sus necesitados
  - a sus pobres necesitados
  - a sus afligidos pobres
  lexicon: HALOT
  rationale: אֶבְיוֹן designa a los pobres o necesitados. «A sus pobres» mantiene la concisión del hebreo y el paralelismo con el posesivo referido a Sion. Se añade la preposición «a» por exigencia natural del verbo español «saciar» con complemento de persona.
- source_word: אַשְׂבִּיעַ
  english_pob_choice: I will satisfy
  chosen_spanish: saciaré
  alternatives_spanish:
  - satisfaré
  - llenaré
  - satisfaré plenamente
  lexicon: HALOT
  rationale: El hifil de שׂבע expresa causar saciedad o plenitud. «Saciaré» es el equivalente más directo y bíblicamente claro en español para el sentido de llenar de manera plena.
- source_word: לָחֶם
  english_pob_choice: with bread
  chosen_spanish: con pan
  alternatives_spanish:
  - con alimento
  - con comida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pan». «Con pan» preserva la concreción de la imagen y evita generalizar a un término más amplio como «alimento».
theological_decisions:
- issue: Referencia de los sufijos femeninos
  english_pob_reading: The suffixes ('her provisions,' 'her poor') refer to Zion/Jerusalem from the immediate context.
  chosen_spanish_reading: Los sufijos se reflejan como posesivos femeninos referidos a Sion/Jerusalén en el contexto inmediato.
  alternative_spanish_readings:
  - Una referencia más general a la morada del Señor
  - Una personificación menos explícita
  rationale: El contexto inmediato de Salmo 132:13–14 presenta a Sion como referente femenino. Mantener el posesivo en español conserva esa personificación sin añadir una interpretación ajena al texto.
  doctrine_reference: Salmo 132:13–15; personificación poética de Sion/Jerusalén
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés muestran acuerdo alto y no registran revisiones aplicadas; por ello, el borrador español sigue de cerca las decisiones léxicas ya estabilizadas, conservando el paralelismo y la referencia femenina a Sion.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Yahvé/Señor fuera de este versículo, ya que aquí no aparece el tetragrámaton ni κύριος.
  - «Pan» se conserva por concreción semítica; no se sustituye por «alimento» en el texto principal.
  - La nota al pie se limita a la alternativa léxica documentada para צֵידָהּ y no introduce otras variantes no atestiguadas.
