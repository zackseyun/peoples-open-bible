review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la cierva da a luz y abandona a su cría por falta de vegetación. Conserva correctamente el valor discursivo de כִּי inicial como explicación, el énfasis de גַם, la especificidad de אַיֶּלֶת como hembra de ciervo, y la causalidad final.'
  spanish_quality_summary: 'El español es claro y natural, pero «abandona» sin objeto suena algo abrupto y menos idiomático en español que en hebreo o inglés. Dado que el inglés POB explicitó «her young» en el texto principal y dejó la alternativa más literal en nota, el español gana fidelidad y legibilidad si también explicita el objeto: «abandona a su cría».'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «La cierva», «en el campo», «da a luz» y «pasto»/vegetación son adecuados. La principal mejora es alinear la decisión sobre עזב con la rationale auditada del POB: aclarar el objeto implícito en el texto principal y reservar la alternativa más literal para la nota.'
  issues:
  - severity: medium
    issue: El verbo «abandona[a]» deja implícito el objeto en el texto principal.
    rationale: Aunque el hebreo no explicita el objeto, la auditoría inglesa decidió suplirlo en el texto principal para claridad contextual. En español, «abandona» sin complemento resulta más duro y menos natural que «abandona a su cría», y puede sonar incompleto.
  - severity: low
    issue: La nota al pie ya explica correctamente la elipsis, pero queda algo desalineada con el cuerpo actual.
    rationale: Si el cuerpo se corrige a «abandona a su cría», la nota puede mantener la alternativa más literal «y la deja» y explicar que el objeto no se expresa explícitamente en hebreo.
  revised_spanish_text: Porque aun la cierva en el campo da a luz y abandona a su cría[a], porque no hay pasto.
  revised_footnotes:
  - marker: a
    text: O «y la deja»; el hebreo no explicita el objeto, pero el sentido es que la cierva abandona a su cría recién nacida porque no hay pasto.
    reason: lexical_alternative
