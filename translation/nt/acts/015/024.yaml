theological_decisions:
- issue: Whether to make explicit that the troublemakers lacked apostolic authorization
  chosen_reading: to whom we gave no instructions
  alternative_readings:
  - whom we did not command
  - to whom we gave no orders
  rationale: The Greek explicitly denies that these men acted under Jerusalem's directive. The translation preserves that institutional/theological point without adding interpretive material beyond the text.
  doctrine_reference: Translation philosophy §1, §3
