translation:
  language: es
  text: Pues toda la riqueza[a] que Dios ha tomado de nuestro padre es nuestra y de nuestros hijos. Así que ahora, todo lo que Dios te ha dicho, hazlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha rescatado» / «ha librado». El verbo hebreo suele llevar el sentido de liberación, pero aquí se refiere a que Dios apartó la riqueza de Labán y la dio a la casa de Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָל הָעֹשֶׁר
  english_pob_choice: all the wealth
  chosen_spanish: toda la riqueza
  alternatives_spanish:
  - todas las riquezas
  - todo el patrimonio
  lexicon: HALOT
  rationale: עֹשֶׁר designa riqueza/bienes materiales. «Riqueza» suena natural en español moderno y conserva el sentido amplio del conjunto de bienes en juego en la narrativa.
- source_word: הִצִּיל
  english_pob_choice: has taken
  chosen_spanish: ha tomado
  alternatives_spanish:
  - ha rescatado
  - ha librado
  - ha arrebatado
  lexicon: HALOT
  rationale: El valor básico de נצל en este contexto narrativo apunta al traslado efectivo de bienes desde Laban hacia la casa de Jacob. «Ha tomado» sigue la revisión inglesa más reciente y evita sugerir violencia innecesaria; en una nota se preserva la alternativa de rescate/liberación.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Traducción estándar para el Dios verdadero en este pasaje, sin necesidad de marcar aquí una diferencia conceptual especial.
- source_word: מֵאָבִינוּ
  english_pob_choice: from our father
  chosen_spanish: de nuestro padre
  alternatives_spanish:
  - desde nuestro padre
  - de la posesión de nuestro padre
  lexicon: HALOT
  rationale: La preposición expresa origen/separación. En español, «de nuestro padre» comunica claramente que la riqueza provino de la esfera de Labán sin sobrecargar la frase.
- source_word: לָנוּ הוּא וּלְבָנֵינוּ
  english_pob_choice: belongs to us and to our children
  chosen_spanish: es nuestra y de nuestros hijos
  alternatives_spanish:
  - nos pertenece a nosotros y a nuestros hijos
  - es para nosotros y para nuestros hijos
  lexicon: HALOT
  rationale: El hebreo expresa posesión/legitimidad. «Es nuestra y de nuestros hijos» es idiomático en español y conserva la afirmación de pertenencia sin añadir una fórmula más jurídica de lo que exige el texto.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora pues
  lexicon: HALOT
  rationale: Marca transición inferencial desde la razón dada hacia la exhortación. «Así que ahora» refleja bien el matiz conclusivo y fluye naturalmente en español.
- source_word: כֹּל אֲשֶׁר אָמַר אֱלֹהִים אֵלֶיךָ
  english_pob_choice: whatever God has said to you
  chosen_spanish: todo lo que Dios te ha dicho
  alternatives_spanish:
  - todo cuanto Dios te ha dicho
  - lo que Dios te ha dicho
  lexicon: HALOT
  rationale: «Todo lo que» conserva la totalidad de כֹּל אֲשֶׁר y suena claro en una exhortación directa. «Te ha dicho» mantiene el perfecto con valor actual de mandato recibido.
- source_word: עֲשֵׂה
  english_pob_choice: do
  chosen_spanish: hazlo
  alternatives_spanish:
  - haz
  - cúmplelo
  lexicon: HALOT
  rationale: El imperativo hebreo es breve y directo. En español, «hazlo» preserva la fuerza exhortativa y enlaza explícitamente con el contenido anterior sin introducir paráfrasis.
theological_decisions:
- issue: Sentido de הִצִּיל en relación con la riqueza de Labán
  english_pob_reading: Render God's action as 'has taken' rather than 'has rescued/delivered.'
  chosen_spanish_reading: Dios «ha tomado» la riqueza de nuestro padre
  alternative_spanish_readings:
  - Dios «ha rescatado» la riqueza
  - Dios «ha librado» la riqueza
  - Dios «ha arrebatado» la riqueza
  rationale: El contexto no describe principalmente un rescate de la riqueza, sino su traslado providencial desde el control injusto de Labán hacia la casa de Jacob. «Ha tomado» mantiene la decisión revisada en inglés y evita introducir una connotación de robo; la nota conserva la alternativa semántica de rescatar/liberar que el verbo puede tener en otros contextos.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente, que prefirió «has taken» sobre «has taken away» por ser más directo. Por eso se eligió «ha tomado» y no una formulación más enfática. También se mantuvo la estructura de dos movimientos del versículo: afirmación de pertenencia y exhortación final.'
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para אֱלֹהִים.
  - Se eligió «riqueza» para כָל הָעֹשֶׁר, manteniendo un término amplio y natural en español.
  - Se conservó un tono de exhortación directo en la segunda mitad con un imperativo breve.
  - La nota de pie preserva la tensión lexical entre ‘tomar’ y ‘rescatar/liberar’ sin resolverla de manera simplista.
