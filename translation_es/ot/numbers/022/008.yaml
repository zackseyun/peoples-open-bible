base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/008.yaml
  text: And he said to them[a], “Lodge here tonight[c][b], and I will bring back word to you according to what Yahweh speaks to me.” So the princes of Moab stayed with Balaam.
