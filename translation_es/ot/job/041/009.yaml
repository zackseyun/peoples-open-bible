translation:
  language: es
  text: Cada uno se pega a su compañero[a]; quedan trabados entre sí y no se pueden separar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «cada uno con su hermano». «Hermano» es la alternativa más formal al más natural «compañero» en esta descripción poética de las escamas de Leviatán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: Each one
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Un hombre
  - Uno
  lexicon: HALOT
  rationale: Aquí אִישׁ funciona distributivamente, no como referencia a un varón individual. «Cada uno» conserva la idea de cada elemento por separado sin introducir una lectura personal no presente en el contexto de las escamas de Leviatán.
- source_word: בְּאָחִיהוּ
  english_pob_choice: to its fellow
  chosen_spanish: a su compañero
  alternatives_spanish:
  - con su hermano
  - a otro
  lexicon: HALOT
  rationale: El hebreo dice literalmente «con/a su hermano». En este contexto poético no humano, «compañero» comunica bien la cercanía entre elementos adyacentes y evita la frialdad de una traducción excesivamente literal.
- source_word: יְדֻבָּקוּ
  english_pob_choice: sticks
  chosen_spanish: se pega
  alternatives_spanish:
  - se adhiere
  - se une
  - se aferra
  lexicon: HALOT
  rationale: דבק expresa adhesión estrecha. «Se pega» mantiene la imagen concreta y natural en español, con un valor verbal equivalente a la fijación firme de las escamas.
- source_word: יִתְלַכְּדוּ
  english_pob_choice: are clasped together
  chosen_spanish: quedan trabados entre sí
  alternatives_spanish:
  - están engarzados
  - quedan entrelazados
  - están sujetos entre sí
  lexicon: HALOT
  rationale: El verbo sugiere quedar cogidos o encajados con firmeza. «Quedan trabados entre sí» preserva la fuerza de interlock del hebreo sin exagerar el detalle técnico.
- source_word: וְלֹא יִתְפָּרָדוּ
  english_pob_choice: and cannot be separated
  chosen_spanish: y no se pueden separar
  alternatives_spanish:
  - y no se separan
  - y no llegan a apartarse
  - y no pueden apartarse
  lexicon: HALOT
  rationale: La negación expresa el resultado de su unión apretada. «No se pueden separar» comunica con naturalidad la imposibilidad práctica de separarlos, conservando el sentido resultativo del hebreo.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios respecto del acuerdo alto del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene el sujeto distributivo con «Cada uno», acorde con el hebreo singular distributivo.
  - Se conserva la imagen poética de adhesión e interbloqueo sin introducir una paráfrasis doctrinal.
  - «Compañero» en el texto principal y «hermano» en nota preservan la tensión léxica documentada por el POB en inglés.
