translation:
  language: es
  text: Porque la nube de Yahvé estaba sobre el tabernáculo de día, y en él había fuego de noche, a la vista[a] de toda la casa de Israel, durante todas sus jornadas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante los ojos de toda la casa de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «a lo largo de todas sus jornadas» o «en todas sus jornadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la clausula como explicación/resumen narrativo del contexto anterior. «Porque» conserva la función discursiva causal/expositiva de כִּי sin forzar un tono demasiado interpretativo.
- source_word: עֲנַן יְהוָה
  english_pob_choice: the cloud of Yahweh
  chosen_spanish: la nube de Yahvé
  alternatives_spanish:
  - la nube de Yahveh
  - la nube de Jehová
  lexicon: HALOT
  rationale: 'Se mantiene la relación posesiva/relacional del hebreo constructo y el nombre divino se vierte según la norma del proyecto: «Yahvé». La formulación es natural en español y conserva la asociación de la nube con la presencia de Yahvé.'
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del santuario
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente establecido en español bíblico para מִשְׁכָּן y preserva la referencia al santuario portátil sin perder continuidad terminológica.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en el día
  lexicon: HALOT
  rationale: Expresa de forma idiomática el valor temporal adverbial. «De día» funciona bien en paralelo con «de noche».
- source_word: וְאֵשׁ תִּהְיֶה לַיְלָה בּוֹ
  english_pob_choice: and fire was in it by night
  chosen_spanish: y fuego estaba en él de noche
  alternatives_spanish:
  - y fuego habría en él de noche
  - y fuego estaba sobre él de noche
  lexicon: HALOT
  rationale: 'Se conserva la imagen directa del hebreo: el fuego está «en él», remitiendo al conjunto nube/tabernáculo según el contexto y la nota inglesa. Se prefiere «estaba» por el tono narrativo de resumen.'
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: a la vista de
  alternatives_spanish:
  - en presencia de
  - delante de
  lexicon: HALOT
  rationale: Equivale bien al hebraísmo concreto sin sonar forzado en español. Mantiene la idea de visibilidad pública.
- source_word: כָל בֵּית יִשְׂרָאֵל
  english_pob_choice: all the house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - todo Israel
  - toda la familia de Israel
  lexicon: HALOT
  rationale: Conserva la expresión corporativa «casa de Israel», alineada con la lectura inglesa y con el peso covenantal del hebreo.
- source_word: בְּכָל מַסְעֵיהֶם
  english_pob_choice: throughout all their journeys
  chosen_spanish: durante todos sus viajes
  alternatives_spanish:
  - en todos sus viajes
  - a lo largo de todos sus viajes
  - durante todas sus jornadas
  lexicon: HALOT
  rationale: מַסְעֵים alude a las jornadas/etapas de desplazamiento en el desierto. «Viajes» comunica el sentido de recorridos continuados en español moderno; «durante» preserva la idea de extensión a lo largo de todo el trayecto.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Según el estándar del proyecto, se vierte «Yahvé» para no enmascarar el nombre divino y mantener la trazabilidad con la fuente original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Valor de la presencia del fuego «en él»
  english_pob_reading: and fire was in it by night
  chosen_spanish_reading: y fuego estaba en él de noche
  alternative_spanish_readings:
  - y fuego estaba sobre él de noche
  - y fuego había en él de noche
  rationale: Se preserva la ambigüedad controlada del referente de בּוֹ, que en la audit trail inglesa puede referirse al tabernáculo o al complejo nube/tabernáculo. El español mantiene «en él» sin resolver en exceso la imagen.
  doctrine_reference: 'DOCTRINE.md: source transparency / lexical ambiguity'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no requirió cambios y el control cruzado indicó alto acuerdo. En español no se introducen expansiones doctrinales ni ajustes textuales más allá de la adaptación idiomática y la preservación de la ambigüedad de בּוֹ y לְעֵינֵי mediante notas alternativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה según el estándar del proyecto.
  - Se conserva «tabernáculo» para מִשְׁכָּן por continuidad terminológica bíblica.
  - Se mantiene «casa de Israel» como expresión corporativa, no reducida a «Israel».
  - Se elige «de día / de noche» como par temporal natural y paralelamente equilibrado.
  - La nota a cubre la posible equivalencia de לְעֵינֵי con «en la vista de»; la nota b cubre la alternativa en torno a מַסְעֵיהֶם.
