review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: la nube de Yahvé sobre el tabernáculo de día, fuego en él de noche, visible a toda la casa de Israel a lo largo de sus jornadas. Conserva correctamente «Yahvé», «tabernáculo» y «casa de Israel», y mantiene la ambigüedad de בּוֹ con «en él». Sin embargo, la distribución de las notas al pie no sigue la evidencia fuente ni la auditoría inglesa: la nota [a] fue colocada en «de día», pero la alternativa documentada corresponde a לְעֵינֵי («a la vista de / a los ojos de»), mientras que la nota [b] debe anclarse en la frase final sobre las jornadas.'
  spanish_quality_summary: El español es claro y legible, pero «y fuego estaba en él de noche» suena algo rígido; «y en él había fuego de noche» es más natural sin perder el valor de בּוֹ. Además, la nota [a] actual produce incoherencia porque su contenido no corresponde al segmento señalado. «Durante todos sus viajes» es comprensible, aunque «a lo largo de todas sus jornadas» o «durante todas sus jornadas» sería más cercano a מַסְעֵיהֶם; aun así, no es un error grave.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יהוה → «Yahvé»; הַמִּשְׁכָּן → «tabernáculo»; כָל בֵּית יִשְׂרָאֵל → «toda la casa de Israel». No hay conflicto teológico significativo. La principal corrección necesaria es de anclaje y contenido de notas, no de glosario.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «de día», pero su contenido corresponde a לְעֵינֵי.
    rationale: La auditoría inglesa preserva como alternativa «in the sight of all the house of Israel» para la expresión de visibilidad, no para יוֹמָם. Tal como está, la nota española desinforma sobre la evidencia fuente.
  - severity: medium
    issue: La redacción «y fuego estaba en él de noche» es poco idiomática en español.
    rationale: Aunque es formalmente fiel, en español suena forzada. «Y en él había fuego de noche» mantiene la localización «en él» y mejora la naturalidad.
  - severity: low
    issue: «Viajes» es aceptable, pero no ideal para מַסְעֵיהֶם en este contexto del éxodo.
    rationale: «Jornadas» o «etapas de marcha» reflejan mejor los desplazamientos sucesivos del campamento. No obstante, «viajes» sigue comunicando el sentido básico.
  revised_spanish_text: Porque la nube de Yahvé estaba sobre el tabernáculo de día, y en él había fuego de noche, a la vista[a] de toda la casa de Israel, durante todas sus jornadas[b].
  revised_footnotes:
