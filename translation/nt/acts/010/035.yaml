id: ACT.10.35
reference: Acts 10:35
source:
  edition: SBLGNT
  text: ἀλλ’ ἐν παντὶ ἔθνει ὁ φοβούμενος αὐτὸν καὶ ἐργαζόμενος δικαιοσύνην δεκτὸς αὐτῷ ἐστιν.
translation:
  text: but in every nation the one who fears him and does what is righteous is acceptable to him[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and works righteousness' / 'and practices righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Greek δικαιοσύνην, commonly 'righteousness'; in some contexts the term can also be rendered 'justice.'
    reason: lexical_alternative
  - marker: c
    text: Or 'is accepted by him.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks contrast with the preceding realization that God is not one who shows partiality; 'but' is the natural English adversative here.
- source_word: ἐν παντὶ ἔθνει
  chosen: in every nation
  alternatives:
  - among every people
  - in every ethnic group
  lexicon: BDAG
  rationale: A straightforward locative phrase. 'Nation' preserves the common sense of ἔθνος here without over-specifying modern ethnicity; 'every' reflects παντί distributively.
- source_word: ὁ φοβούμενος αὐτὸν
  chosen: the one who fears him
  alternatives:
  - whoever fears him
  - the man who fears him
  lexicon: BDAG
  rationale: The articular present participle functions substantivally. 'The one who' preserves the singular representative force without importing unnecessary gender limitation. 'Fears' retains the biblical sense of reverent fear toward God.
- source_word: καὶ ἐργαζόμενος δικαιοσύνην
  chosen: and does what is righteous
  alternatives:
  - and works righteousness
  - and practices righteousness
  - and does righteousness
  lexicon: BDAG
  rationale: ἐργάζομαι with δικαιοσύνην denotes active conduct. 'Does what is righteous' is idiomatic modern English while preserving the moral sense. 'Works righteousness' is more formal but less natural in contemporary English.
- source_word: δικαιοσύνην
  chosen: what is righteous
  alternatives:
  - righteousness
  - justice
  lexicon: BDAG
  rationale: The project's default for δικαιοσύνη is 'righteousness.' In this verbal collocation, however, idiomatic English prefers an expanded rendering. The sense remains moral uprightness rather than a narrower forensic or social-justice emphasis. The alternative 'justice' is worth preserving in a footnote because the term can overlap semantically, though here 'righteousness' best fits the context.
- source_word: δεκτὸς αὐτῷ ἐστιν
  chosen: is acceptable to him
  alternatives:
  - is accepted by him
  - is pleasing to him
  - is welcome to him
  lexicon: BDAG
  rationale: δεκτός means acceptable or welcomed/favorably received. 'Acceptable to him' closely matches the predicate adjective construction and avoids implying meritorious salvation more strongly than the Greek itself states.
