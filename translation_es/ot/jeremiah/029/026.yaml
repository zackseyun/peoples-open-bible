translation:
  language: es
  text: Yahvé te ha puesto como sacerdote en lugar de Joiada el sacerdote[a], para ser oficiales en la casa de Yahvé sobre todo hombre que esté loco y actúe como profeta[c][b], y lo pondrás en el cepo y en el collar de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para ser oficiales' o 'para ser supervisores'; el hebreo tiene un sustantivo plural ('supervisores/oficiales') aunque el destinatario sea singular.
    reason: lexical_alternative
  - marker: b
    text: O 'profetice'; el participio hebreo puede traducirse de manera más neutra, pero el texto principal refleja el tono hostil del hablante.
    reason: alternative_reading
  - marker: c
    text: El significado exacto del instrumento no es seguro; probablemente se refiere a una restricción de hierro para el cuello usada junto con el cepo.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma de uso habitual del proyecto en español, sin sustituirlo por un título. Esto sigue la pauta POB de transparencia textual.
- source_word: נְתָנְךָ
  english_pob_choice: has made you
  chosen_spanish: te ha puesto
  alternatives_spanish:
  - te ha dado
  - te ha nombrado
  lexicon: HALOT
  rationale: En esta construcción con un cargo, נתן expresa nombramiento o colocación en una función. 'Te ha puesto' comunica bien el resultado del acto divino sin sonar mecánico.
- source_word: כֹהֵן
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - cura
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente normal y fiel en contexto cultual.'
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - bajo
  lexicon: HALOT
  rationale: La preposición indica sucesión o reemplazo respecto de Joiada, no subordinación espacial. 'En lugar de' transmite ese matiz con naturalidad.
- source_word: יְהוֹיָדָע
  english_pob_choice: Jehoiada
  chosen_spanish: Joiada
  alternatives_spanish:
  - Jehoiada
  lexicon: HALOT
  rationale: Se usa la forma española tradicional del nombre, sin alterar la referencia personal.
- source_word: פְּקִדִים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - supervisores
  - inspectores
  - encargados
  lexicon: HALOT
  rationale: El plural hebreo apunta a una función de vigilancia o administración. 'Oficiales' mantiene el valor de cargo sin forzar una equivalencia eclesiástica tradicional.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de 'casa' como en el hebreo, sin reemplazarla por una clarificación interpretativa más explícita.
- source_word: אִישׁ
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda persona
  - cada hombre
  lexicon: HALOT
  rationale: Se mantiene el sustantivo masculino singular del hebreo, conforme a la política del proyecto de reflejar la forma gramatical cuando funciona de manera genérica.
- source_word: מְשֻׁגָּע
  english_pob_choice: is mad
  chosen_spanish: esté loco
  alternatives_spanish:
  - esté loco demente
  - esté insano
  lexicon: HALOT
  rationale: El término es una caracterización hostil y despectiva. 'Esté loco' es natural en español y conserva el tono insultante sin sobretraducir.
- source_word: וּמִתְנַבֵּא
  english_pob_choice: acts as a prophet
  chosen_spanish: profetice
  alternatives_spanish:
  - proclame profecías
  - actúe como profeta
  lexicon: HALOT
  rationale: El participio puede leerse como 'profetizar'. En español, el verbo simple mantiene el valor verbal y deja ver el desprecio del hablante sin resolver la tensión teológica.
- source_word: וְנָתַתָּה אֹתוֹ
  english_pob_choice: and you should put him
  chosen_spanish: y lo pondrás
  alternatives_spanish:
  - y deberás ponerlo
  - y lo colocarás
  lexicon: HALOT
  rationale: La secuencia exhortativa/instructiva del hebreo se vierte con futuro de mandato en español, que suena natural y adecuado al tono de orden.
- source_word: הַמַּהְפֶּכֶת
  english_pob_choice: the stocks
  chosen_spanish: el cepo
  alternatives_spanish:
  - las acciones
  - la cepa
  lexicon: HALOT
  rationale: '''Cepo'' es el término español tradicional y claro para el artefacto de sujeción/punición, y encaja mejor que una glosa más larga.'
- source_word: הַצִּינֹק
  english_pob_choice: the iron collar
  chosen_spanish: el collar de hierro
  alternatives_spanish:
  - el collarín de hierro
  - la argolla de hierro
  lexicon: HALOT
  rationale: La expresión exacta es incierta; 'collar de hierro' conserva la idea de una restricción para el cuello y sigue de cerca la lectura auditada del inglés.
theological_decisions:
- issue: Verbo para וּמִתְנַבֵּא en contexto hostil
  english_pob_reading: acts as a prophet
  chosen_spanish_reading: profetice
  alternative_spanish_readings:
  - proclame profecías
  - actúe como profeta
  rationale: El contexto es una acusación hostil; sin embargo, en español 'profetice' mantiene la ambigüedad entre la acusación del hablante y la posible realidad profética, sin negar ni afirmar teológicamente el contenido.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Valor genérico pero gramaticalmente masculino de אִישׁ
  english_pob_reading: every man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - toda persona
  - cada hombre
  rationale: Se conserva la forma masculina del hebreo por fidelidad formal y por la política del proyecto, aunque el alcance sea genérico.
  doctrine_reference: Precisión gramatical sobre neutralización automática.
- issue: Nombre del Dios de Israel
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la transliteración del nombre divino en español conforme a la práctica POB, evitando la sustitución por un título o una tradición denominacional.
  doctrine_reference: Transparencia del Tetragrámaton.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado auditado del inglés POB: se mantienen ''officers'' y ''iron collar'' como base semántica, pero se ajustan a un español natural y publicable. También se conserva la tensión del hebreo entre el plural פונקcional (''oficiales'') y el destinatario singular, y la ambigüedad del participio וּמִתְנַבֵּא. Se evita resolver de forma excesiva la identificación del aparato de castigo, usando ''cepo'' y ''collar de hierro'' con nota de incertidumbre.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה en coherencia con las pautas del proyecto.
  - Se prefiere 'sacerdote' para כֹהֵן y 'casa de Yahvé' para בֵּית יְהוָה, manteniendo el idiomatismo hebreo.
  - '''Oficiales'' respeta el plural hebreo פְּקִדִים sin crear una glosa eclesiástica no respaldada.'
  - '''Todo hombre'' conserva el masculino singular de אִישׁ conforme a la política de exactitud gramatical.'
  - '''Profetice'' deja abierta la tensión entre la acusación del hablante y la función profética real.'
