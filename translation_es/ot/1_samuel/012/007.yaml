revisions:
- from: Ahora pues[a], pónganse de pie[b], y contenderé con ustedes delante de Yahvé acerca de todas las obras justas de Yahvé, que hizo con ustedes y con sus padres.
  to: Ahora pues, pónganse de pie, y contenderé[a] con ustedes delante de Yahvé acerca de todos los actos justos[b] de Yahvé, que hizo por ustedes y por sus padres.
  rationale: 'Se ajusta la preposición final a «por ustedes y por sus padres» para reflejar el sentido benefactivo contextual documentado por la auditoría POB y evitar una frase española poco natural. Se reubican y corrigen las notas para que preserven los dos elementos significativos del rastro inglés: el matiz forense de שפט y la explicación de צִדְקוֹת יְהוָה. También se mejora la naturalidad con «actos justos», manteniendo la conexión léxica con «justicia».'
