theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Community term עֵדָה
  chosen_reading: congregation
  alternative_readings:
  - assembly
  rationale: This is not a major doctrinal dispute, but 'congregation' preserves the sense of Israel as a gathered covenant community without importing later ecclesial structures. Consistency within the verse is maintained.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
