revisions:
- from: 'Los hijos de Tola: Uzzi[a], Refaías, Jeriel, Jahmai, Ibsam y Samuel, jefes de las casas paternas[b] de Tola, hombres poderosos[c] según sus generaciones[c]. Su número, en los días de David, era veintidós mil seiscientos.'
  to: 'Los hijos de Tola: Uzzi[a], Refaías, Jeriel, Jahmai, Ibsam y Samuel, jefes[b] de sus casas paternas, pertenecientes a Tola, hombres valerosos[c] según sus generaciones[d]. Su número en los días de David era veintidós mil seiscientos.'
  rationale: Se corrigieron los anclajes de notas para que cada marcador sea único y corresponda exactamente a su frase fuente. Se ajustó 'hombres poderosos' a 'hombres valerosos' para preservar mejor גִּבּוֹרֵי חַיִל. Se restituyó el posesivo en 'sus casas paternas' y se explicitó 'pertenecientes a Tola' para reflejar con más claridad la relación clánica que el inglés auditado ya había fijado como 'belonging to Tola'. También se añadió una nota separada para 'según sus generaciones', ya que el inglés POB preserva alternativas para לְתֹלְדוֹתָם.
