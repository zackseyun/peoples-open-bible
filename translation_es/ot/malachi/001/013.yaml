base_translation:
  language: en
  yaml_path: translation/ot/malachi/001/013.yaml
  text: And you say[a], ‘Look, what a weariness this is,’ and you snort at it, says Yahweh of hosts. And you bring what is stolen, and the lame, and the sick; thus you bring the offering[b]. Should I accept it from your hand? says Yahweh.
  footnotes:
  - marker: a
    text: Or 'and you snort at it' or 'and you disdain it.' The Hebrew verb pictures a contemptuous exhalation, expressing scorn.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD of hosts,' that is, the LORD of heavenly armies.
    reason: cultural_note
