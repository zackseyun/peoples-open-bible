translation:
  language: es
  text: Y cuando Mardoqueo despertó, después de haber visto este sueño y lo que Dios había resuelto hacer, lo guardó en su corazón[a], y en cada asunto[b] quiso entenderlo hasta el anochecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto fuente en este punto parece contener un pequeño artefacto de transcripción o impresión ('ἐν Β τῇ καρδίᾳ'); el sentido se lee naturalmente como 'en su corazón'.
    reason: textual_variant
  - marker: b
    text: O 'en todo respecto' / 'en cada palabra'; la frase griega es amplia y puede referirse a todo asunto relacionado con el sueño.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεγερθείς
  english_pob_choice: when ... awoke
  chosen_spanish: cuando ... despertó
  alternatives_spanish:
  - habiendo sido despertado
  - al levantarse
  lexicon: BDAG
  rationale: El participio aoristo pasivo aquí funciona temporalmente; en español, 'cuando despertó' comunica con naturalidad la secuencia narrativa sin introducir una pasividad innecesaria.
- source_word: ἑωρακώς
  english_pob_choice: after seeing
  chosen_spanish: después de haber visto
  alternatives_spanish:
  - habiendo visto
  - después de ver
  lexicon: BDAG
  rationale: El participio perfecto indica una percepción ya completada antes de la acción principal. 'Después de haber visto' preserva esa anterioridad con español claro y fiel.
- source_word: τὸ ἐνύπνιον
  english_pob_choice: this dream
  chosen_spanish: este sueño
  alternatives_spanish:
  - esta visión
  - este sueño-oráculo
  lexicon: BDAG
  rationale: ἐνύπνιον significa ordinariamente 'sueño'. 'Sueño' evita sobreinterpretar el término como 'visión' y sigue el dato del texto.
- source_word: τί ὁ θεὸς βεβούλευται ποιῆσαι
  english_pob_choice: what God had purposed to do
  chosen_spanish: lo que Dios había resuelto hacer
  alternatives_spanish:
  - lo que Dios había planeado hacer
  - lo que Dios había decidido hacer
  lexicon: BDAG
  rationale: βεβούλευται expresa intención deliberada o propósito. 'Había resuelto hacer' conserva ese matiz de decisión firme sin sonar demasiado técnico en español.
- source_word: εἶχεν αὐτὸ ἐν ... τῇ καρδίᾳ
  english_pob_choice: he kept it in his heart
  chosen_spanish: lo guardó en su corazón
  alternatives_spanish:
  - lo tuvo en su corazón
  - lo mantuvo en su corazón
  - lo guardó en la mente
  lexicon: BDAG
  rationale: La imagen idiomática de la καρδία se conserva mejor con 'corazón'. 'Guardó' transmite retención interior y reflexión, y en español suena natural y reverente.
- source_word: ἐν Β τῇ καρδίᾳ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de su corazón
  lexicon: Swete diplomatic text
  rationale: La 'Β' del texto diplomático parece un artefacto editorial o de transcripción; el sentido claro es la expresión común 'en su corazón'. La traducción sigue el griego inteligible.
- source_word: ἐν παντὶ λόγῳ
  english_pob_choice: in every matter
  chosen_spanish: en cada asunto
  alternatives_spanish:
  - en cada palabra
  - en todo respecto
  - en todo asunto
  lexicon: BDAG
  rationale: λόγος puede significar 'palabra', 'asunto' o 'materia'. Aquí la relación con 'entenderlo' favorece un sentido amplio; 'en cada asunto' preserva esa amplitud en español.
- source_word: ἤθελεν ἐπιγνῶναι αὐτό
  english_pob_choice: he wanted to understand it
  chosen_spanish: quiso entenderlo
  alternatives_spanish:
  - quería entenderlo
  - deseaba conocerlo plenamente
  - quiso discernirlo
  lexicon: BDAG
  rationale: ἐπιγινώσκω puede llevar el sentido de conocer o comprender plenamente. 'Quiso entenderlo' capta la búsqueda reflexiva de sentido sin exceder el texto.
- source_word: ἕως τῆς νυκτός
  english_pob_choice: until nightfall
  chosen_spanish: hasta la noche
  alternatives_spanish:
  - hasta anochecer
  - hasta el caer de la noche
  lexicon: BDAG
  rationale: La expresión marca duración hasta la llegada de la noche. 'Hasta la noche' es natural en español; 'hasta anochecer' también sería posible, pero algo más marcado estilísticamente.
theological_decisions:
- issue: Referencia a Dios como sujeto del propósito
  english_pob_reading: what God had purposed to do
  chosen_spanish_reading: lo que Dios había resuelto hacer
  alternative_spanish_readings:
  - lo que Dios había planeado hacer
  - lo que Dios había decidido hacer
  rationale: Se mantiene 'Dios' sin sustituirlo por un título más general. 'Había resuelto' conserva la idea de propósito deliberado sin suavizarla ni hacerla doctrinalmente más pesada de lo que el texto exige.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source-level specificity.'
- issue: Imaginario bíblico del corazón como sede interior
  english_pob_reading: he kept it in his heart
  chosen_spanish_reading: lo guardó en su corazón
  alternative_spanish_readings:
  - lo tuvo en su corazón
  - lo mantuvo en su corazón
  - lo guardó en su mente
  rationale: Se preserva la antropología bíblica del 'corazón' en vez de reducirla a mera memoria o cognición. Esto respeta la tensión del texto entre interioridad, reflexión y retención.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: El pasaje coincide con la lectura auditada en inglés y con el griego de Swete. La única cuestión textual notable es el probable artefacto 'Β' en ἐν Β τῇ καρδίᾳ, ya tratado como 'en su corazón'. No se introdujeron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεός, conforme al estándar del proyecto.
  - Se eligió 'corazón' para καρδία para conservar la imaginería antropológica bíblica.
  - '''Sueño'' se usó para ἐνύπνιον por ser la correspondencia más directa y no interpretativa.'
  - '''Hasta la noche'' reproduce el límite temporal sin sobrerrepresentar la expresión griega.'
