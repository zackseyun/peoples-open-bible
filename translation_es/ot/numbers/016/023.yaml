lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y
  - Y habló
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo; en español, 'Entonces' comunica esa secuencia con naturalidad. 'Habló' preserva mejor el matiz formal de la fórmula de introducción al discurso que 'dijo'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma POB en español, 'Yahvé', evitando la sustitución por un título genérico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición direccional se expresa de manera natural en español con 'a' en esta fórmula de habla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: '''Diciendo'' reproduce la función de apertura del discurso directo y deja la frase en suspensión para la continuación inmediata.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La tradición editorial POB lo vierte como nombre propio divino, no como sustituto reverencial, para preservar la identidad del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios. La puntuación y la elección de ''Entonces'' mantienen el valor secuencial del wayyiqtol sin forzar un calco.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma uniforme para יְהוָה.
  - '''Habló ... diciendo'' conserva la fórmula narrativa hebrea y resulta natural en español.'
  - La nota a pie de página refleja la alternativa de la conjunción inicial documentada en el audit trail inglés.
