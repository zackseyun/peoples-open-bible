lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todo el total de
  - La totalidad de
  lexicon: HALOT
  rationale: En este resumen censal, כָּל introduce la totalidad del grupo contado; en español, 'Todas' concuerda naturalmente con 'las familias' y preserva la idea de suma completa.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: families
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En contexto tribal y censal, מִשְׁפָּחוֹת puede entenderse como 'familias' o 'clanes'. Se mantiene 'familias' como opción estándar y clara en español, dejando abierta la noción genealógica sin forzar un tecnicismo.
- source_word: הַשּׁוּחָמִי
  english_pob_choice: the Shuhamites
  chosen_spanish: los suhamitas
  alternatives_spanish:
  - la familia de Shuham
  - el clan de Shuham
  lexicon: HALOT
  rationale: El gentilicio se conserva como nombre colectivo de descendientes. 'Suhamitas' comunica en español la pertenencia grupal y sigue la estrategia de transliteración usada por la POB en inglés.
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to those numbered among them
  chosen_spanish: según los registrados entre ellos
  alternatives_spanish:
  - según los contados entre ellos
  - conforme a sus inscritos
  lexicon: HALOT
  rationale: La raíz פקד aquí pertenece al campo censal/registral. 'Registrados' expresa el valor de los enumerados o inscritos en el censo sin reducirlo a una mera cifra abstracta, y mantiene la idea de base del recuento.
- source_word: אַרְבָּעָה וְשִׁשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  english_pob_choice: sixty-four thousand four hundred
  chosen_spanish: sesenta y cuatro mil cuatrocientos
  alternatives_spanish:
  - cuatro y sesenta mil y cuatrocientos
  lexicon: HALOT
  rationale: Se emplea la forma numérica corriente en español para un total exacto, preservando el valor aritmético del hebreo sin introducir una formulación artificial.
translation_notes:
  revision_awareness: El texto inglés POB se mantuvo estable en la revisión más reciente y recibió verificación de alta concordancia; no hay revisiones aplicadas que alteren la base léxica o numérica de este versículo.
  spanish_consistency_notes:
  - Se mantiene 'familias' en concordancia con el texto inglés POB, reservando 'clanes' para la nota alternativa.
  - '''Suhamitas'' conserva la transliteración del etnónimo, coherente con el tratamiento de nombres colectivos en esta sección.'
  - La cifra se expresa con el orden normal del español, sin alterar el total exacto del hebreo.
