  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura imperativa del hebreo, pero no preserva de manera adecuada la distinción léxica documentada entre מָגֵן y צִנָּה. Además, «acercaos para la batalla» es menos fiel al matiz de movimiento hacia el combate que una formulación como «avanzad a la batalla».
  spanish_quality_summary: El texto es comprensible, pero «Preparad escudo y broquel» suena invertido respecto de la lógica léxica documentada y «broquel» aplicado a צִנָּה introduce un valor más bien de escudo pequeño, contrario a la nota auditada. También «Preparad» es entendible, pero en español bíblico general «Preparen» encaja mejor con el objetivo de español neutral moderno.
  glossary_alignment: 'No hay términos teológicos mayores en juego. El problema principal es de correspondencia léxica militar: מָגֵן debe quedar como «broquel» o explicitarse como escudo pequeño, mientras que צִנָּה debe quedar como «escudo» o explicitarse como escudo grande. La nota alternativa inglesa debe conservarse en español con esa misma orientación.'
  issues:
  - severity: high
    issue: Inversión de los referentes de מָגֵן y צִנָּה
    rationale: La auditoría inglesa documenta מָגֵן como arma defensiva menor ('buckler') y צִנָּה como escudo mayor. El borrador principal pone «escudo y broquel», y sus decisiones léxicas asignan «broquel» a צִנָּה, lo que contradice la evidencia y la nota.
  - severity: medium
    issue: «Acercaos para la batalla» no reproduce tan bien el matiz marcial de וּגְשׁוּ לַמִּלְחָמָה
    rationale: Aunque נגשׁ puede ser «acercarse», en este contexto militar la auditoría justificó «advance». En español, «avancen a la batalla» o «avanzad a la batalla» comunica mejor el movimiento de ataque.
  - severity: low
    issue: Registro verbal menos neutral-panregional
    rationale: «Preparad / acercaos» es válido, pero el proyecto pide español neutral latinoamericano ampliamente legible. «Preparen / avancen» suena más natural para ese objetivo.
  revised_spanish_text: Preparen broquel[a] y escudo, y avancen a la batalla.
