translation:
  language: es
  text: ¿A quién te parecías[a] así en gloria y grandeza entre los árboles de Edén? Sin embargo, serás derribado con los árboles de Edén a la tierra de abajo[b]; en medio de los incircuncisos yacerás con los muertos por la espada. Este es Faraón y toda su multitud —declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te asemejabas». El hebreo expresa una pregunta retórica de semejanza directa, no una pasiva como «fuiste comparado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la tierra inferior» o «el mundo de abajo». El hebreo se refiere al ámbito de abajo, el lugar de los muertos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל מִי דָמִיתָ כָּכָה
  english_pob_choice: To whom were you thus like
  chosen_spanish: ¿A quién fuiste comparado así?
  alternatives_spanish:
  - ¿Con quién te pareció así?
  - ¿A quién te asemejaste así?
  lexicon: HALOT
  rationale: La pregunta retórica pide semejanza/comparación. En español, '¿a quién fuiste comparado?' conserva el matiz pasivo y la dirección de la comparación; 'así' recoge כָּכָה sin volverlo pesado.
- source_word: בְּכָבוֹד
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - en honor
  - en esplendor
  lexicon: HALOT
  rationale: '''Gloria'' es el equivalente bíblico más natural para כָבוֹד y mantiene el tono real/majestuoso del pasaje.'
- source_word: וּבְגֹדֶל
  english_pob_choice: and greatness
  chosen_spanish: y grandeza
  alternatives_spanish:
  - y tamaño
  - y magnitud
  lexicon: HALOT
  rationale: Aquí גֹדֶל apunta a magnitud y rango, no solo a tamaño físico; 'grandeza' comunica mejor esa amplitud de sentido.
- source_word: בַּעֲצֵי עֵדֶן
  english_pob_choice: among the trees of Eden
  chosen_spanish: entre los árboles de Edén
  alternatives_spanish:
  - entre los árboles del Edén
  - entre los árboles de Eden
  lexicon: HALOT
  rationale: '''Entre'' refleja bien la comparación dentro del conjunto; se mantiene ''Edén'' como nombre propio sin añadir explicaciones.'
- source_word: וְהוּרַדְתָּ
  english_pob_choice: you shall be brought down
  chosen_spanish: serás derribado
  alternatives_spanish:
  - serás abatido
  - serás bajado
  lexicon: HALOT
  rationale: El pasivo profético pide una forma futura en español. 'Derribado' conserva la caída de juicio y su fuerza imagética; 'serás bajado' resultaría menos idiomático.
- source_word: אֶרֶץ תַּחְתִּית
  english_pob_choice: the land below
  chosen_spanish: la tierra de abajo
  alternatives_spanish:
  - la tierra inferior
  - el mundo de abajo
  - el netherworld
  lexicon: HALOT
  rationale: Se preserva la metáfora espacial sin fijar demasiado pronto una geografía doctrinal del más allá. 'La tierra de abajo' suena natural y refleja el sentido descendente del hebreo.
- source_word: בְּתוֹךְ עֲרֵלִים
  english_pob_choice: in the midst of the uncircumcised
  chosen_spanish: en medio de los incircuncisos
  alternatives_spanish:
  - en medio de los no circuncidados
  - entre los incircuncisos
  lexicon: HALOT
  rationale: '''Incircuncisos'' conserva la carga covenantal y de vergüenza del término. ''En medio de'' reproduce בְּתוֹךְ con más precisión que un simple ''entre'' en este contexto.'
- source_word: תִּשְׁכַּב
  english_pob_choice: you shall lie
  chosen_spanish: yacerás
  alternatives_spanish:
  - te acostarás
  - reposarás
  lexicon: HALOT
  rationale: En contexto funerario, 'yacerás' comunica mejor la imagen de muerte que 'te acostarás', sin introducir una suavización ajena al pasaje.
- source_word: חַלְלֵי חֶרֶב
  english_pob_choice: those slain by the sword
  chosen_spanish: con los muertos a espada
  alternatives_spanish:
  - con los caídos a espada
  - con los heridos de espada
  lexicon: HALOT
  rationale: La expresión hebrea se refiere a los caídos violentamente; 'muertos a espada' es una forma natural en español que conserva el sentido de muerte causada por la espada.
- source_word: הוּא פַרְעֹה וְכָל הֲמוֹנוֹ
  english_pob_choice: This is Pharaoh and all his multitude
  chosen_spanish: Este es Faraón y toda su multitud
  alternatives_spanish:
  - Así es Faraón y toda su multitud
  - Este es el Faraón y toda su multitud
  lexicon: HALOT
  rationale: '''Este es'' refleja el cierre sentencioso del oráculo. ''Multitud'' conserva el valor de הֲמוֹן como masa numerosa y resonante, no solo ''riqueza''.'
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - Señor Yahvé
  - el Señor Yavé
  lexicon: DOCTRINE.md contested terms
  rationale: 'Se sigue la norma del proyecto para יְהוָה: ''Yahvé''. En la fórmula אֲדֹנָי יְהוִה, ''el Señor Yahvé'' evita la sustitución tradicional por ''SEÑOR'' y mantiene la referencia explícita al Nombre divino.'
theological_decisions:
- issue: Cómo verter יְהוָה en la fórmula final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - Señor Yahvé
  - el Señor Yavé
  rationale: La política del proyecto exige traducir el Tetragrámaton como 'Yahvé'. En español, la combinación con אֲדֹנָי se resuelve de forma transparente como 'el Señor Yahvé', preservando el Nombre sin enmascararlo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אֶרֶץ תַּחְתִּית
  english_pob_reading: the land below
  chosen_spanish_reading: la tierra de abajo
  alternative_spanish_readings:
  - la tierra inferior
  - el mundo de abajo
  - el netherworld
  rationale: La frase conserva la imagen del descenso al ámbito de los muertos sin imponer una localización doctrinal más específica de la que da el hebreo. Se mantiene la tensión entre metáfora espacial y referencia al reino de los muertos.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión auditada del inglés: la apertura se formula como pregunta retórica directa (''¿A quién fuiste comparado así?''), se conserva el valor espacial de ''en medio de'' para בְּתוֹךְ, y se mantiene la finalización sentenciosa con ''Faraón y toda su multitud''. La traducción española evita tanto la paráfrasis excesiva como la calca rígida.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para יְהוָה.
  - Se conservó 'incircuncisos' por su carga covenantal y no se sustituyó por una expresión más neutral.
  - '''Multitud'' se mantuvo para הֲמוֹן como término de masa numerosa, coherente con el perfil del libro de Ezequiel.'
  - No se introdujo 'Cristo' ni terminología eclesiástica ajena al hebreo.
  - La puntuación reproduce el cierre oracular con una raya antes de la fórmula declarativa final.
