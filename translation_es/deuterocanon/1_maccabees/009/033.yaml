translation:
  language: es
  text: Jonatán y Simón su hermano, y todos los que estaban con él, se enteraron de ello[a], y huyeron al desierto de Tecoa, y acamparon junto al agua de la cisterna de Asfar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «supieron de ello». El griego solo dice que llegaron a saber algo, con el objeto implícito por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: learned of it
  chosen_spanish: se enteraron de ello
  alternatives_spanish:
  - lo supieron
  - llegó a su conocimiento
  - supieron
  lexicon: LSJ
  rationale: El aoristo de γινώσκω aquí expresa la llegada de una información al conocimiento del grupo, no solo un estado mental. «Se enteraron de ello» conserva ese valor ingresivo y suena natural en español.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - se fueron
  lexicon: LSJ
  rationale: El verbo indica retirada urgente ante peligro. «Huyeron» reproduce mejor la fuerza narrativa que «se fueron».
- source_word: ἔρημον Θεκώε
  english_pob_choice: the wilderness of Tekoa
  chosen_spanish: el desierto de Tecoa
  alternatives_spanish:
  - la tierra despoblada de Tecoa
  - la región desértica de Tecoa
  lexicon: LSJ
  rationale: En español bíblico, «desierto» comunica bien ἔρημος en un marco geográfico; «Tecoa» conserva el nombre propio transliterado.
- source_word: παρενέβαλον
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon en
  - hicieron campamento
  lexicon: LSJ
  rationale: El verbo militar/narrativo de establecer campamento puede expresarse de forma natural como «acamparon». Mantiene el sentido sin forzar un tecnicismo.
- source_word: ἐπὶ τὸ ὕδωρ
  english_pob_choice: by the water
  chosen_spanish: junto al agua
  alternatives_spanish:
  - al lado del agua
  - a la orilla del agua
  lexicon: LSJ
  rationale: Con lenguaje de campamento, ἐπί + acusativo funciona locativamente. «Junto al agua» es una equivalencia clara y natural en español.
- source_word: λάκκου
  english_pob_choice: cistern
  chosen_spanish: cisterna
  alternatives_spanish:
  - pozo
  - hoyo
  - reservorio
  lexicon: LSJ
  rationale: Con ὕδωρ, λάκκος apunta a una cavidad/instalación para contener agua. «Cisterna» refleja mejor esa función que «pozo», mientras conserva la ambigüedad del griego en un término usable en español.
- source_word: Ἀσφάρ
  english_pob_choice: Asphar
  chosen_spanish: Asfar
  alternatives_spanish:
  - Asfár
  - Afar
  lexicon: Transliteración del nombre propio griego
  rationale: Se conserva el topónimo según la forma griega transmitida. «Asfar» sigue de cerca la transliteración y es legible en español.
translation_notes:
  revision_awareness: 'La versión griega de Swete concuerda con el expediente inglés auditado y no se requieren ajustes textuales. Se mantuvo el orden narrativo: conocimiento del peligro, huida y establecimiento del campamento. Se preservó la transliteración del topónimo Asfar y la ambigüedad léxica de λάκκος mediante «cisterna».'
  spanish_consistency_notes:
  - Se prefirió «se enteraron de ello» para reflejar el valor ingresivo de ἔγνω, en paralelo con la nota inglesa «learned of it».
  - «Desierto» se usa aquí como término geográfico bíblico, no como especificación climatológica estricta.
  - «Cisterna» mantiene la relación con un depósito de agua sugerida por ὕδωρ λάκκου.
  - Se evitó «SEÑOR» o terminología teológica no presente en el texto.
  - 'Los nombres propios siguen la transliteración del griego: Jonathan/Jonatán -> Jonathan, Simon -> Simón, Tekoa -> Tecoa, Asphar -> Asfar.'
