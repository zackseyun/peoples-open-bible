translation:
  language: es
  text: 'Y Dios le dijo: «Yo soy Dios Todopoderoso[a]. Sé fecundo y multiplícate. De ti saldrán una nación y una asamblea de naciones[b], y de tus lomos[c] saldrán reyes.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «El Shaddai»; tradicionalmente se vierte «Dios Todopoderoso».'
    reason: lexical_alternative
  - marker: b
    text: O «una compañía de naciones». קְהַל puede denotar un grupo reunido, una congregación o una asamblea de naciones.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «de tus lomos», un modismo para descendientes físicos de su propio cuerpo.
    reason: cultural_note
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - dioses
  lexicon: HALOT
  rationale: En el contexto narrativo y con verbo singular, el término funciona como título singular del Dios de Israel; en español, «Dios» expresa ese valor con naturalidad y sin perder la referencia.
- source_word: אֵל שַׁדַּי
  english_pob_choice: God Almighty
  chosen_spanish: Dios Todopoderoso
  alternatives_spanish:
  - El Shaddai
  - Dios Shaddai
  lexicon: HALOT
  rationale: El hebreo presenta un título divino. Siguiendo el criterio de traducir títulos, «Dios Todopoderoso» comunica la solemnidad y el sentido tradicional sin transliterar innecesariamente.
- source_word: פְּרֵה וּרְבֵה
  english_pob_choice: Be fruitful and multiply
  chosen_spanish: Fructifica y multiplícate
  alternatives_spanish:
  - Sé fructífero y multiplícate
  - Fructificad y multiplicaos
  lexicon: HALOT
  rationale: Son imperativos masculinos singulares. «Fructifica» conserva el paralelismo del hebreo y su fuerza verbal; «multiplícate» mantiene el segundo imperativo sin volverlo explicativo.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gentil
  lexicon: HALOT
  rationale: En promesa patriarcal, גּוֹי designa un pueblo constituido como entidad nacional. «Nación» es la equivalencia más directa y transparente.
- source_word: קְהַל גּוֹיִם
  english_pob_choice: an assembly of nations
  chosen_spanish: una asamblea de naciones
  alternatives_spanish:
  - una congregación de naciones
  - una compañía de naciones
  lexicon: HALOT
  rationale: קהל alude a un grupo reunido o congregado. «Asamblea» conserva esa idea de reunión colectiva y evita un giro demasiado interpretativo.
- source_word: יִהְיֶה מִמֶּךָּ
  english_pob_choice: shall come from you
  chosen_spanish: de ti saldrá
  alternatives_spanish:
  - será de ti
  - de ti provendrá
  lexicon: HALOT
  rationale: El hebreo dice literalmente «será de ti», pero en español la imagen genealógica se expresa de forma más natural con «saldrá de ti», manteniendo el sentido de descendencia.
- source_word: מֵחֲלָצֶיךָ
  english_pob_choice: from your loins
  chosen_spanish: de tus lomos
  alternatives_spanish:
  - de tu cuerpo
  - de tu descendencia
  lexicon: HALOT
  rationale: El hebreo usa un modismo corporal para la descendencia física. «Lomos» preserva el color idiomático y la concreción genealógica; en nota se puede aclarar la referencia corporal.
- source_word: יֵצֵאוּ
  english_pob_choice: shall come
  chosen_spanish: saldrán
  alternatives_spanish:
  - saldrán fuera
  - provendrán
  lexicon: HALOT
  rationale: En contexto de descendencia, el verbo de salida funciona como origen genealógico. «Saldrán» mantiene la imagen hebrea y su movimiento de procedencia.
theological_decisions:
- issue: Título divino אֵל שַׁדַּי
  english_pob_reading: God Almighty
  chosen_spanish_reading: Dios Todopoderoso
  alternative_spanish_readings:
  - El Shaddai
  rationale: La lectura elegida traduce el título en vez de transliterarlo, como hace el audit trail en inglés. No añade contenido doctrinal; simplemente comunica el título divino de forma idiomática en español.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2 (Translate titles; transliterate names)'
- issue: Imagen de descendencia física en la promesa
  english_pob_reading: from your loins
  chosen_spanish_reading: de tus lomos
  alternative_spanish_readings:
  - de tu cuerpo
  - de tu descendencia
  rationale: La promesa resalta una descendencia corporal y genealógica. «De tus lomos» conserva la tensión literal del hebreo; la forma «de ti saldrá» se integra de modo natural en español sin perder esa concreción.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 y §5'
translation_notes:
  revision_awareness: El pasaje presenta alto grado de concordancia con la versión inglesa auditada; no se detectaron revisiones sustantivas en el último pase. Se mantuvo la estructura promesa-bendición y la referencia concreta a la descendencia física, con ajustes solo de naturalidad española.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «Dios Todopoderoso» para אֵל שַׁדַּי, en coherencia con la terminología POB.
  - Se conserva el lenguaje genealógico concreto («saldrá», «lomos») para reflejar el hebreo sin suavizarlo a una paráfrasis abstracta.
  - «Asamblea de naciones» sigue el valor de קהל como reunión colectiva, evitando «compañía» salvo nota alternativa.
  - La puntuación y las comillas siguen el uso estándar del español bíblico moderno.
