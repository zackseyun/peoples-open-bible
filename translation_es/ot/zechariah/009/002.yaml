translation:
  language: es
  text: Y también Hamat[a], que limita con ella; Tiro y Sidón, porque son muy sabios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hamat también, que limita con ella; Tiro y Sidón, pues ella es muy sabia». El hebreo pasa de una ciudad singular a un par coordinado, lo que produce una tensión sintáctica en el predicado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/גַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - e incluso
  lexicon: HALOT
  rationale: Conserva el valor conjuntivo y el matiz aditivo/enfático de גַּם en un español natural.
- source_word: חֲמָת
  english_pob_choice: Hamath
  chosen_spanish: Hamat
  alternatives_spanish:
  - Hamát
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se mantiene la transliteración directa al español, adaptando la forma al uso gráfico más natural en la serie.
- source_word: תִּגְבָּל
  english_pob_choice: which borders
  chosen_spanish: que limita
  alternatives_spanish:
  - que bordea
  - que linda con
  lexicon: HALOT
  rationale: El verbo expresa lindero o contigüidad territorial. «Limita con» comunica bien el valor espacial sin mecanizar la sintaxis hebrea.
- source_word: בָּהּ
  english_pob_choice: on it
  chosen_spanish: con ella
  alternatives_spanish:
  - sobre ella
  - en ella
  lexicon: HALOT
  rationale: El sufijo femenino retoma el referente territorial implícito. En español, con «limita con» la relación queda expresada de forma más idiomática que con una preposición literal.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tyr
  - Tira
  lexicon: HALOT
  rationale: Nombre propio habitual en español bíblico para la ciudad fenicia.
- source_word: וְ/צִידוֹן
  english_pob_choice: and Sidon
  chosen_spanish: y Sidón
  alternatives_spanish:
  - y Sidon
  lexicon: HALOT
  rationale: Nombre propio habitual en español bíblico; se conserva la forma tradicional y comprensible.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la cláusula siguiente. «Porque» es claro y directo en español moderno.
- source_word: חָכְמָה
  english_pob_choice: they are wise
  chosen_spanish: son muy sabias
  alternatives_spanish:
  - es muy sabia
  - son muy sabios
  lexicon: HALOT
  rationale: El hebreo tiene forma femenina singular, pero el contexto coordinado abarca Tiro y Sidón. En español, el plural natural evita forzar una sola ciudad y conserva el sentido colectivo; «sabias» refleja el femenino implícito de la forma hebrea.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sumamente
  lexicon: HALOT
  rationale: Intensificador adverbial común; «muy» es la opción más natural y fiel en español contemporáneo.
theological_decisions:
- issue: Concordancia de חָכְמָה con el par Tiro/Sidón
  english_pob_reading: Render the predicate in English plural ('they are very wise')
  chosen_spanish_reading: Traducir en plural («son muy sabias») para reflejar el referente conjunto
  alternative_spanish_readings:
  - «es muy sabia» con concordancia formal al femenino singular
  - «es muy sabia» entendiendo una referencia colectiva
  rationale: La forma hebrea es femenina singular, pero la frase coordina dos ciudades. En español, el plural transmite mejor el sujeto conjunto sin ocultar la tensión gramatical de origen; además, se mantiene la concordancia femenina posible por el género gramatical de los topónimos implícitos.
  doctrine_reference: Translation philosophy §6
- issue: Valor causal de כִּי
  english_pob_reading: because they are very wise
  chosen_spanish_reading: Conservar la relación causal con «porque»
  alternative_spanish_readings:
  - «pues»
  - omitir la causalidad y tomarlo como inciso
  rationale: El hebreo presenta una explicación o fundamento para la mención de Tiro y Sidón. «Porque» deja visible esa relación sin añadir interpretación doctrinal.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tomó como base el testimonio hebreo y el análisis morfológico, usando el audit trail inglés solo como apoyo para identificar el valor de conjunción, la relación territorial y la tensión singular/plural en la predicación. No se detectaron revisiones aplicadas en el registro inglés; por eso la redacción española mantiene la misma lectura de sentido general, con ajuste natural de concordancia.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirieron topónimos bíblicos asentados en español («Tiro», «Sidón») y transliteración simple para «Hamat».
  - La nota al pie marca la tensión gramatical sin resolverla artificialmente.
