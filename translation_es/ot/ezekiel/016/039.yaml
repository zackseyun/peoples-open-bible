translation:
  language: es
  text: Yo te entregaré en manos de ellos[a], y derribarán tu cámara abovedada y destruirán tus lugares altos. Te despojarán de tus vestidos, tomarán tus adornos hermosos[b], y te dejarán desnuda y al descubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su poder». La expresión hebrea «en la mano de» comunica entrega a la autoridad o control de otros.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tus joyas preciosas», «tus adornos espléndidos» o «los objetos de tu esplendor». El hebreo puede referirse a ornamentos o a artículos preciosos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will give
  chosen_spanish: Yo te entregaré
  alternatives_spanish:
  - Yo te daré
  - Yo te pondré
  lexicon: HALOT
  rationale: En este contexto judicial, נתן expresa entregar a alguien en poder de otros. «Entregaré» conserva mejor la fuerza de entrega judicial que un simple «daré», aunque sigue siendo natural en español.
- source_word: בְּיָדָם
  english_pob_choice: into their hand
  chosen_spanish: en manos de ellos
  alternatives_spanish:
  - en su mano
  - en su poder
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» se mantiene con «manos», pero el español suena más natural con plural. Conserva la idea de sometimiento o control sin borrar la metáfora.
- source_word: הָרְסוּ
  english_pob_choice: tear down
  chosen_spanish: derribarán
  alternatives_spanish:
  - tirarán abajo
  - demolerán
  lexicon: HALOT
  rationale: Para una estructura, «derribar» reproduce bien el valor de הרס y es idiomático en español. Evita una abstracción general y mantiene la imagen concreta.
- source_word: גַבֵּךְ
  english_pob_choice: your vaulted chamber
  chosen_spanish: tu cámara abovedada
  alternatives_spanish:
  - tu bóveda
  - tu cámara
  - tu cúpula
  lexicon: HALOT
  rationale: La expresión es rara y probablemente designa una estructura construida asociada al culto ilícito. «Cámara abovedada» conserva el carácter arquitectónico sin fijar demasiado el referente, en línea con la nota inglesa que evita una paráfrasis excesiva.
- source_word: וְנִתְּצוּ
  english_pob_choice: demolish
  chosen_spanish: destruirán
  alternatives_spanish:
  - demolerán
  - romperán
  lexicon: HALOT
  rationale: נתץ intensifica la ruina de una estructura. «Destruirán» comunica con claridad la fuerza del verbo y no duplica exactamente «derribarán», preservando la distinción de matiz.
- source_word: רָמֹתַיִךְ
  english_pob_choice: your high places
  chosen_spanish: tus lugares altos
  alternatives_spanish:
  - tus altos lugares
  - tus santuarios en las alturas
  lexicon: HALOT
  rationale: «Lugares altos» es la forma estándar en español bíblico para los sitios de culto en elevaciones. Conserva la referencia cultual sin sustituirla por una explicación interpretativa más amplia.
- source_word: וְהִפְשִׁיטוּ
  english_pob_choice: strip you of
  chosen_spanish: te despojarán de
  alternatives_spanish:
  - te quitarán
  - te desnudarán de
  lexicon: HALOT
  rationale: El verbo expresa quitar la ropa mediante despojo. «Despojarán de» suena natural y conserva la violencia y humillación públicas del acto.
- source_word: בְּגָדַיִךְ
  english_pob_choice: your clothes
  chosen_spanish: tus vestidos
  alternatives_spanish:
  - tus ropas
  - tus prendas
  lexicon: HALOT
  rationale: «Vestidos» es una forma digna y fiel que encaja bien con el tono bíblico, sin perder claridad. También mantiene el paralelismo con la vergüenza corporal final.
- source_word: כְּלֵי תִפְאַרְתֵּךְ
  english_pob_choice: your beautiful jewelry
  chosen_spanish: tus joyas hermosas
  alternatives_spanish:
  - los objetos de tu esplendor
  - tus adornos hermosos
  - tus preciosas joyas
  lexicon: HALOT
  rationale: כְּלִי puede abarcar objetos o adornos; en este contexto, la idea de despojo de ornamentos es la más probable. «Joyas hermosas» sigue de cerca la lectura inglesa de ornamentos valiosos y es inteligible en español, aunque mantiene la posible amplitud del término.
- source_word: וְהִנִּיחוּךְ
  english_pob_choice: leave you
  chosen_spanish: te dejarán
  alternatives_spanish:
  - te abandonarán
  - te pondrán
  lexicon: HALOT
  rationale: El verbo de «dejar/poner en un estado» se expresa con naturalidad como «dejarán». En el contexto, la idea es quedar expuesta al final de la humillación.
- source_word: עֵירֹם וְעֶרְיָה
  english_pob_choice: naked and bare
  chosen_spanish: desnuda y al descubierto
  alternatives_spanish:
  - desnuda y desnuda
  - desnuda y expuesta
  - desnuda y al aire
  lexicon: HALOT
  rationale: La doble expresión intensifica la desnudez total. «Desnuda y al descubierto» conserva el paralelismo y evita una redundancia poco natural en español, manteniendo la fuerza de la imagen.
theological_decisions:
- issue: Imagen profética concreta de humillación corporal y arquitectónica para Jerusalén
  english_pob_reading: Retain the concrete imagery of architectural and bodily humiliation without softening it into abstract judgment language.
  chosen_spanish_reading: Conservar la imaginería concreta de derribo arquitectónico y despojo corporal, sin convertirla en una abstracción como «será castigada».
  alternative_spanish_readings:
  - Serás castigada y humillada
  - Serás destruida y avergonzada
  rationale: El hebreo presenta un juicio en forma de metáfora extendida, con acciones físicas muy concretas. La traducción española mantiene esa concreción para respetar la retórica profética y no borrar la tensión simbólica del pasaje.
  doctrine_reference: Poética profética; fidelidad al género y a la imaginería del texto
- issue: Referencia cultual ambigua de גַבֵּךְ
  english_pob_reading: '''your vaulted chamber,'' with alternatives ''your mound,'' ''your shrine,'' or ''your arch''; the Hebrew term is rare and likely refers to a built structure associated with Jerusalem''s illicit worship imagery in this chapter.'
  chosen_spanish_reading: «Tu cámara abovedada», manteniendo la ambigüedad arquitectónica sin fijar dogmáticamente un solo referente.
  alternative_spanish_readings:
  - tu montículo
  - tu santuario
  - tu arco
  rationale: La rareza del término exige cautela. «Cámara abovedada» conserva la imagen de una construcción y permite al lector percibir la incertidumbre lexical sin ocultarla.
  doctrine_reference: Lexicografía hebrea; prudencia exegética
translation_notes:
  revision_awareness: He tenido en cuenta la revisión inglesa más reciente, que ajustó «strip off your clothes» a «strip you of your clothes» por naturalidad. En español, ese ajuste se reflejó directamente con «te despojarán de tus vestidos», manteniendo la fuerza verbal y la humillación pública. También se respetó la preferencia auditada por no suavizar la imaginería concreta ni sustituirla por lenguaje abstracto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito solo donde el versículo no lo contiene; no se introduce un equivalente divino innecesario.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino ni una cita directa del tetragrama.
  - Se preservó la distinción entre «derribarán» y «destruirán» para reflejar los dos verbos hebreos distintos.
  - Se optó por «desnuda y al descubierto» para reproducir la intensificación binaria del hebreo sin una repetición antinatural.
