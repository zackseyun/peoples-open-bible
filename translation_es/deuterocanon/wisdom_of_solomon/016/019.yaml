  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: contraste ocasional, paradoja de fuego en medio del agua, exceso sobre la capacidad normal del fuego, y propósito de destruir el producto de la tierra asociado con los injustos. Sin embargo, hay un desajuste importante en las notas: los marcadores [a] y [b] están intercambiados respecto del inglés auditado y respecto de los puntos léxicos que realmente requieren aclaración.'
  spanish_quality_summary: El español es claro y digno. 'Pero a veces... el fuego arde más allá de su poder' es comprensible, aunque algo literal; sigue siendo aceptable. 'Producto injusto de la tierra' conserva bien la tensión del original, aunque su extrañeza exige la nota correcta. La redacción general es natural y eclesialmente legible.
  glossary_alignment: No hay términos de glosario de alto riesgo en este versículo. 'Injusto' para ἄδικον es defendible y está alineado con la decisión auditada de preservar la fuerza moral sin sobreinterpretar. No hay conflicto con los defaults de Yahvé/Mesías/etc.
  issues:
  - severity: high
    issue: Los contenidos de las notas [a] y [b] están invertidos.
    rationale: En el inglés POB, la nota a comenta ποτὲ δὲ / 'But at times', mientras que la nota b comenta la expresión 'unrighteous produce/offspring of the earth'. En el borrador español, [a] está anclada en 'a veces' pero contiene la explicación de 'más allá del poder del fuego'; y [b] está anclada en 'injusto' pero contiene la nota sobre 'producto/descendencia injusto(a)...'. Además, la alternativa 'más allá del poder del fuego' corresponde al segmento ὑπὲρ τὴν πυρὸς δύναμιν, que ni siquiera lleva marcador en el texto actual.
  - severity: medium
    issue: La nota española [a] no corresponde al lugar donde está anclada en el texto.
    rationale: Si se mantiene el marcador [a] sobre 'a veces', la nota debe explicar el valor de ποτὲ δὲ ('o, en cierta ocasión / a veces'), no una alternativa para 'más allá de su poder'.
  revised_spanish_text: Pero a veces[a], aun en medio del agua, el fuego arde más allá de su poder, para destruir el producto injusto[b] de la tierra.
  revised_footnotes:
  - marker: a
    text: O, 'en cierta ocasión'. El griego señala un desarrollo contrastivo en la secuencia de ejemplos y también un sentido adverbial de ocurrencia ocasional.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'el producto/descendencia injusto(a) de la tierra'. La frase probablemente se refiere al rendimiento de la tierra en conexión con los injustos.
    reason: lexical_alternative
  revision_rationale: El texto principal puede conservarse, pero las notas deben corregirse para que coincidan con los marcadores del texto y con la auditoría inglesa. Así se preserva la trazabilidad léxica correcta sin introducir cambios innecesarios en la traducción española.
