lexical_decisions:
- source_word: בֵּהּ בְּלֵילְיָא
  english_pob_choice: In that very night
  chosen_spanish: En aquella misma noche
  alternatives_spanish:
  - Esa misma noche
  - En esa misma noche
  lexicon: HALOT
  rationale: La combinación aramea con prefijo locativo y determinación temporal expresa una referencia enfática a la misma noche; en español, «aquella misma noche» transmite bien la deixis y la fuerza enfática sin sonar artificial.
- source_word: קְטִיל
  english_pob_choice: was killed
  chosen_spanish: fue muerto
  alternatives_spanish:
  - fue asesinado
  - fue matado
  lexicon: HALOT
  rationale: El pasivo arameo exige una voz pasiva en español. «Fue muerto» conserva la forma pasiva y la sobriedad del enunciado histórico; «fue asesinado» introduce una especificación interpretativa que el hebreo/arameo no explicita.
- source_word: בֵּלְאשַׁצַּר
  english_pob_choice: Belshazzar
  chosen_spanish: Belsasar
  alternatives_spanish:
  - Belshasar
  - Belsasar
  lexicon: Conventional Spanish biblical proper-name usage
  rationale: Se usa la forma bíblica española tradicional y reconocible del nombre propio, sin alterar la identidad referida por el texto fuente.
- source_word: מַלְכָּא כשדיא
  english_pob_choice: the Chaldean king
  chosen_spanish: el rey caldeo
  alternatives_spanish:
  - el rey de los caldeos
  - el rey de los caldeos
  lexicon: HALOT
  rationale: La apposición nominal y el gentilicio forman en español una expresión natural equivalente a «the Chaldean king». «Caldeo» conserva el valor étnico-histórico del original y evita una perífrasis más pesada.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del inglés auditado, que recupera el valor temporal inicial («in that night») y mantiene el enunciado pasivo y lacónico del original arameo.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio en forma española bíblica («Belsasar») para coherencia con el uso eclesial en español.
  - «Caldeo» se prefirió por su correspondencia directa con כשדי/א y por ser más idiomático que una traducción analítica más larga.
  - La pasiva («fue muerto») conserva la línea sobria del registro narrativo y evita añadir agente inexistente en el texto.
