base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/027.yaml
  text: Now his acts[a], first and last, behold[c][b], they are written in the Book of the Kings of Israel and Judah.
  footnotes:
  - marker: a
    text: Or 'his words' or 'his deeds'; the Hebrew term can denote words, matters, or acts. In this royal summary context, 'acts' best fits the sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'behold,' an emphatic particle drawing attention to the written source.
    reason: lexical_alternative
  - marker: c
    text: Or 'on the scroll/book of the Kings of Israel and Judah.' The Hebrew preposition is literally 'on/upon,' but English idiom commonly uses 'in' for written records.
    reason: lexical_alternative
