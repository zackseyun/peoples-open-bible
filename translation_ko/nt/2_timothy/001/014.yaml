id: 2TI.1.14
reference: 2 Timothy 1:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὴν καλὴν παραθήκην φύλαξον διὰ πνεύματος ἁγίου τοῦ ἐνοικοῦντος ἐν ἡμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/014.yaml
  text: Guard the good deposit through the Holy Spirit who dwells in us.
translation:
  language: ko
  text: 우리 안에 내주하시는 성령을 통하여 그 선한 맡기신 것[a]을 지키십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 παραθήκη는 안전한 보관을 위해 다른 이에게 맡긴 것을 가리킨다. 12절의 「내가 맡긴 것」과 짝을 이루며, 여기서는 하나님이 디모데에게 맡기신 복음의 가르침을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν καλὴν παραθήκην
  english_pob_choice: the good deposit
  chosen_korean: 그 선한 맡기신 것
  alternatives_korean:
  - 그 아름다운 맡기신 것
  - 그 선한 부탁
  - 그 좋은 맡김
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 παραθήκη는 「맡기신 것」으로 옮긴다. 12절의 「내가 맡긴 것」과 짝을 이루는 위탁의 신학을 보존한다. καλός는 「선한·아름다운」 모두 가능하나, 본문 맥락에서 도덕적·신학적 가치를 가리키므로 「선한」을 택한다.
- source_word: φύλαξον
  english_pob_choice: Guard
  chosen_korean: 지키십시오
  alternatives_korean:
  - 보전하십시오
  - 잘 보호하십시오
  lexicon: BDAG
  rationale: φυλάσσω는 「지키다·보전하다」를 뜻한다. 12절의 「능히 지키실」(φυλάξαι)과 같은 어휘를 사용해 본문의 위탁-수호 짝(하나님이 바울의 위탁을 지키시듯, 디모데가 자신에게 맡겨진 것을 지키라)을 보존한다.
- source_word: διὰ πνεύματος ἁγίου τοῦ ἐνοικοῦντος ἐν ἡμῖν
  english_pob_choice: through the Holy Spirit who dwells in us
  chosen_korean: 우리 안에 내주하시는 성령을 통하여
  alternatives_korean:
  - 우리 안에 거하시는 성령을 통하여
  - 우리 안에 사시는 성령으로
  lexicon: BDAG
  rationale: πνεῦμα ἅγιον는 정관사 없이 쓰였지만 ἐνοικοῦντος ἐν ἡμῖν의 한정으로 명확한 성령 지칭이므로 「성령」으로 옮긴다. 「내주하시다」는 한국 성서 전통의 익숙한 표현이며, ἐνοικέω의 「안에 거하심」을 정확히 담는다.
theological_decisions:
- issue: παραθήκη(맡기신 것)의 위탁 이미지 — 12절과 짝지어 보존
  chosen_reading: 그 선한 맡기신 것을 지키십시오
  alternative_readings:
  - 그 선한 부탁을 지키십시오
  - 부탁받은 그 아름다운 것을 지키십시오
  rationale: 1:12의 「내가 맡긴 것」(τὴν παραθήκην μου)과 1:14의 「선한 맡기신 것」(τὴν καλὴν παραθήκην)은 동일 어휘로 짝을 이룬다. 바울이 자기 영혼·사역을 하나님께 맡기듯, 디모데도 받은 복음을 성령의 도우심으로 지켜야 한다. 한국 전통의 「의탁된 진리」 등의 풀이는 위탁의 구체성을 약화시키므로, 일상적 「맡기신 것」으로 그 위탁의 이미지를 살린다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological force of source images'
