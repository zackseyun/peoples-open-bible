translation:
  language: es
  text: 'A los hijos de Merari que quedaron, de la tribu de Zabulón: Rimono[a] y sus pastizales, Tabor y sus pastizales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «Rimono»; el paralelo en Josué 21:35 tiene «Dimna».
    reason: textual_variant
lexical_decisions:
- source_word: לִבְנֵי
  english_pob_choice: To the sons of
  chosen_spanish: A los hijos de
  alternatives_spanish:
  - Para los hijos de
  lexicon: HALOT
  rationale: El ל prefijado en listas de distribución introduce el destinatario de la asignación; en español, «a los hijos de» comunica mejor el valor dativo sin forzar un calco.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Mearari
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración establecida por el POB en español para mantener transparencia y continuidad.
- source_word: הַנּוֹתָרִים
  english_pob_choice: who remained
  chosen_spanish: que quedaron
  alternatives_spanish:
  - que permanecieron
  - los que quedaron
  - el resto
  lexicon: HALOT
  rationale: El participio expresa a los que quedaron después de las distribuciones anteriores. «Que quedaron» preserva el valor verbal y suena natural en español.
- source_word: מִמַּטֵּה זְבוּלֻן
  english_pob_choice: from the tribe of Zebulun
  chosen_spanish: de la tribu de Zabulón
  alternatives_spanish:
  - de la tribu de Zebulón
  - del bastón de Zabulón
  lexicon: HALOT
  rationale: En contexto tribal, מַטֶּה significa «tribu», no «bastón». «Zabulón» sigue la forma castellana ampliamente reconocible y el sentido contextual.
- source_word: רִמּוֹנ֖וֹ
  english_pob_choice: Rimmono
  chosen_spanish: Rimono
  alternatives_spanish:
  - Rimmono
  - Dimna
  lexicon: HALOT
  rationale: El hebreo masorético apunta a un topónimo con forma asimilada; en español se puede adaptar como «Rimono» para una lectura fluida, sin ocultar la variante textual documentada en la nota.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus dehesas
  alternatives_spanish:
  - sus pastizales
  - sus tierras de pastoreo
  - sus alrededores
  lexicon: HALOT
  rationale: מִגְרָשׁ en listas levíticas designa el terreno abierto alrededor de la ciudad, asociado al pastoreo. «Dehesas» expresa bien esa extensión de uso comunal/pastoril en español, sin perder la función espacial.
- source_word: תָּבוֹר
  english_pob_choice: Tabor
  chosen_spanish: Tabor
  alternatives_spanish:
  - Tabór
  lexicon: HALOT
  rationale: Nombre propio conservado por transliteración.
theological_decisions:
- issue: Tratamiento de la variante textual del topónimo de la primera ciudad
  english_pob_reading: Rimmono; the parallel in Joshua 21:35 has Dimnah.
  chosen_spanish_reading: Rimono; la nota explica que Josué 21:35 tiene «Dimna».
  alternative_spanish_readings:
  - Rimmono; Josué 21:35 tiene «Dimna».
  - Dimna; la nota explicaría la variante masorética.
  rationale: El texto hebreo aquí sostiene la lectura masorética con Rimmono/Rimono, mientras que el paralelo en Josué ofrece la otra forma. La traducción principal debe seguir la evidencia inmediata y mantener la variante en nota.
  doctrine_reference: Crítica textual bíblica; correspondencia entre paralelos canónicos
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético de 1 Crónicas 6:62 y se mantuvo la variante textual documentada por el POB inglés en nota. No hubo revisiones aplicadas en el audit trail; la redacción española busca conservar el mismo valor distributivo y la misma precisión léxico-toponímica.
  spanish_consistency_notes:
  - Se usó «A los hijos de» para reflejar el destinatario de la asignación sin introducir «para» donde el español suena menos natural.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque no aparece el Tetragrámaton en este versículo.
  - «Dehesas» se eligió como equivalente español funcional de las «pasturelands» del POB, manteniendo el sentido de terreno abierto asociado a la ciudad.
  - Se preservó la secuencia de lugares y posesivos para seguir de cerca la estructura del hebreo y del POB inglés.
