translation:
  language: es
  text: hasta que juzgue el caso[a] de su pueblo y los alegre con su misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que decida el caso de su pueblo» o «hasta que haga justicia a su pueblo». La expresión griega es formalmente repetitiva y puede funcionar como un modismo para expresar juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - mientras
  lexicon: LSJ
  rationale: Marca un límite temporal natural en español y conserva el valor de término de la acción anterior.
- source_word: κρίνῃ
  english_pob_choice: he judges
  chosen_spanish: juzgue
  alternatives_spanish:
  - decida
  - dicte juicio
  lexicon: BDAG
  rationale: El subjuntivo después de una subordinada temporal con hasta que es la forma natural en español y mantiene la referencia a la acción judicial.
- source_word: τὴν κρίσιν
  english_pob_choice: the case
  chosen_spanish: el caso
  alternatives_spanish:
  - el juicio
  - la causa
  - la sentencia
  lexicon: LSJ
  rationale: La repetición formal del griego puede sonar dura en español; 'caso' conserva el sentido de asunto litigioso o materia de juicio sin sobrecargar el texto.
- source_word: τοῦ λαοῦ αὐτοῦ
  english_pob_choice: of his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - de su gente
  - para su pueblo
  - concerniente a su pueblo
  lexicon: LSJ
  rationale: El genitivo se expresa de forma directa y natural en español, sin precisar más de lo que el griego exige.
- source_word: εὐφράνει
  english_pob_choice: gladdens
  chosen_spanish: los alegre
  alternatives_spanish:
  - los haga alegrarse
  - los goce
  - les dé alegría
  lexicon: LSJ
  rationale: 'Se conserva la fuerza causativa: no solo ''alegra'' en sentido intransitivo, sino que los hace alegres.'
- source_word: ἐν τῷ ἐλέει αὐτοῦ
  english_pob_choice: with his mercy
  chosen_spanish: con su misericordia
  alternatives_spanish:
  - en su misericordia
  - por su misericordia
  - mediante su misericordia
  lexicon: LSJ
  rationale: La preposición ἐν admite valor instrumental o de esfera; 'con' comunica bien el medio con el que los llena de alegría y mantiene un español natural.
theological_decisions:
- issue: La frase pleonástica κρίνῃ τὴν κρίσιν
  english_pob_reading: until he judges the case of his people
  chosen_spanish_reading: hasta que juzgue el caso de su pueblo
  alternative_spanish_readings:
  - hasta que decida el caso de su pueblo
  - hasta que haga justicia a su pueblo
  - hasta que pronuncie juicio sobre su pueblo
  rationale: El griego es formalmente repetitivo y puede implicar decidir un caso o ejecutar justicia. En español, 'caso' evita la repetición incómoda y conserva abierta la ambigüedad entre adjudicación y vindicación.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que pasó de «judges the judgment» a «judges the case». Por eso se optó por «juzgue el caso» en lugar de una repetición más literal como «juzgue el juicio», manteniendo a la vez la ambigüedad judicial del griego.
  spanish_consistency_notes:
  - Se usa «misericordia» para ἐλεος, en línea con el uso bíblico habitual y con el valor teológico del término.
  - Se conserva un tono formal y bíblico, pero con sintaxis natural para el español contemporáneo.
  - El pronombre átono «los» refleja el objeto directo plural de αὐτούς y evita ambigüedad con «les».
