    issue: '''Cuando andes'' suena menos natural y más subjuntivo de lo necesario'
    rationale: El hebreo expresa un marco temporal general ('when you walk'), no una condición remota o potencial. En español, 'Cuando camines' o 'Al caminar' reproduce mejor esa temporalidad habitual y se lee con más naturalidad.
  - severity: low
    issue: La nota puede expresar mejor la relación entre 'estrechar' y 'restringir'
    rationale: La nota actual es fiel, pero puede pulirse para enlazar más directamente la imagen espacial hebrea con una formulación idiomática en español.
