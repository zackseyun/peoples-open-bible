translation:
  language: es
  text: Si, pues, incluso una mujer—una mujer anciana y madre de hijos—soportó torturas hasta la muerte mientras veía[a] los sufrimientos de sus hijos, el razonamiento piadoso es dueño de las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: “mientras veía a sus hijos clamando o llorando a gritos”. La sintaxis griega de esta cláusula es comprimida y puede acentuar que la madre presenciaba los gritos de sus hijos en medio de su tortura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ δὲ τοίνυν
  english_pob_choice: If, then
  chosen_spanish: Si, pues
  alternatives_spanish:
  - Si, entonces
  - Ahora bien, si
  lexicon: LSJ
  rationale: Conserva la transición inferencial y enfática del griego sin sonar forzado en español.
- source_word: γυνὴ
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  - fémina
  lexicon: LSJ
  rationale: El sentido contextual es simplemente 'mujer'; 'esposa' no está indicado y 'fémina' suena excesivo o biológico.
- source_word: γεραιὰ
  english_pob_choice: an aged woman
  chosen_spanish: una mujer anciana
  alternatives_spanish:
  - una mujer de edad avanzada
  - una anciana
  lexicon: LSJ
  rationale: Mantiene el énfasis en su avanzada edad y su debilidad según el juicio humano, con un español natural.
- source_word: ἐπὶ παιδῶν μήτηρ
  english_pob_choice: a mother of children
  chosen_spanish: madre de hijos
  alternatives_spanish:
  - madre con hijos
  - madre de niños
  lexicon: LSJ
  rationale: Reproduce la relación básica de maternidad respecto de sus hijos sin restringir innecesariamente el término griego.
- source_word: ὑπέμεινεν
  english_pob_choice: endured
  chosen_spanish: soportó
  alternatives_spanish:
  - perseveró bajo
  - resistió
  lexicon: BDAG
  rationale: Expresa la idea de resistencia perseverante ante sufrimiento intenso; 'soportó' es claro y sobrio en español.
- source_word: τὰς μέχρι θανάτου βασάνους
  english_pob_choice: tortures unto death
  chosen_spanish: torturas hasta la muerte
  alternatives_spanish:
  - tormentos hasta la muerte
  - torturas hasta morir
  lexicon: LSJ
  rationale: Preserva el valor de μέχρι θανάτου como límite/resultado del sufrimiento, con una formulación natural en español.
- source_word: ὁρῶσα τῶν τέκνων
  english_pob_choice: while seeing the sufferings of her children
  chosen_spanish: mientras veía los sufrimientos de sus hijos
  alternatives_spanish:
  - mientras veía a sus hijos
  - al ver a sus hijos
  lexicon: LSJ
  rationale: 'Sigue la lectura contextual del POB inglés: la madre contempla lo que padecen sus hijos; el español explicita la relación sin añadir contenido nuevo.'
- source_word: ὁλολυγμένων
  english_pob_choice: while seeing her children wailing/crying aloud
  chosen_spanish: '[a]'
  alternatives_spanish:
  - mientras sus hijos clamaban
  - mientras sus hijos lloraban a gritos
  lexicon: LSJ
  rationale: El participio sugiere llanto o clamor en voz alta; la sintaxis griega es comprimida y se preserva en nota la alternativa literal que el inglés documenta.
- source_word: αὐτοκράτωρ
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - dueño
  - maestro
  lexicon: LSJ
  rationale: En posición predicativa con 'el razonamiento piadoso', expresa dominio o soberanía sobre las pasiones; 'señor' es idiomático y fuerte en español.
- source_word: τῶν παθῶν
  english_pob_choice: of the passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - sobre las pasiones
  - de los impulsos
  lexicon: LSJ
  rationale: Mantiene el vínculo genitivo con αὐτοκράτωρ y conserva el término técnico-filosófico 'pasiones' de 4 Macabeos.
- source_word: ὁ εὐσεβὴς λογισμός
  english_pob_choice: godly reason
  chosen_spanish: el razonamiento piadoso
  alternatives_spanish:
  - la razón piadosa
  - el razonamiento devoto
  lexicon: LSJ
  rationale: λoγισμός tiene fuerza de razonamiento/reflexión; 'razonamiento piadoso' conserva el matiz intelectual y devocional sin reducirlo a una sola palabra.
theological_decisions:
- issue: λoγισμός como término programático en 4 Macabeos
  english_pob_reading: godly reason
  chosen_spanish_reading: el razonamiento piadoso
  alternative_spanish_readings:
  - la razón piadosa
  - el pensamiento piadoso
  rationale: La obra presenta un ideal de razonamiento moldeado por la piedad; en español conviene conservar tanto el aspecto racional como el religioso, sin neutralizar la tensión filosófica del término.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y filosófica sin resolverla artificialmente.'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió 'aged woman' y 'tortures unto death'; el español refleja ese registro formal con 'mujer anciana' y 'torturas hasta la muerte', manteniendo también la cláusula final programática sobre el dominio del razonamiento piadoso.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando no aparece aquí; este versículo no contiene el tetragrámaton.
  - '''Pasiones'' se mantiene como término técnico de 4 Macabeos para πάθη.'
  - '''Razonamiento piadoso'' conserva la densidad filosófica de λογισμός sin traducirlo simplemente como ''razón''.'
