translation:
  language: es
  text: Y en lugar del tercio de la siembra[a], y en lugar de la mitad del fruto de los árboles que me corresponde recibir, lo remito desde este día y en adelante, para que no sea cobrado[b] de la tierra de Judá y de los tres distritos[c] añadidos a ella de Samaria y Galilea, desde este día y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente, “un tercio de los cultivos y la mitad del fruto de los árboles”. El griego es más literal: “el tercio de la siembra” y “la mitad del fruto de los árboles”.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el tributo o ingreso real que de otro modo correspondía al rey.
    reason: cultural_note
  - marker: c
    text: “Distritos” traduce el griego nomoi, regiones administrativas; algunas versiones conservan el tecnicismo “nomos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντὶ
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en cambio de
  lexicon: LSJ
  rationale: Expresa mejor en español la idea de sustitución fiscal del griego y del POB inglés, sin sonar forzado.
- source_word: τρίτου τῆς σπορᾶς
  english_pob_choice: the third of the seed
  chosen_spanish: el tercio de la siembra
  alternatives_spanish:
  - el tercio de la semilla
  - un tercio de la cosecha sembrada
  lexicon: LSJ
  rationale: El griego es más literal que una paráfrasis agrícola amplia; 'siembra' conserva la relación con σπορά y evita imponer una lectura más interpretativa de 'cosecha'.
- source_word: τοῦ ἡμίσους τοῦ καρποῦ τοῦ ξυλίνου
  english_pob_choice: the half of the fruit of the trees
  chosen_spanish: la mitad del fruto de los árboles
  alternatives_spanish:
  - la mitad del fruto arbóreo
  - la mitad del producto de los árboles
  lexicon: LSJ
  rationale: Mantiene la imagen concreta del griego y del POB inglés sin acudir a una expresión más técnica o menos natural en español.
- source_word: τοῦ ἐπιβάλλοντός μοι λαβεῖν
  english_pob_choice: that falls to me to receive
  chosen_spanish: que me corresponde recibir
  alternatives_spanish:
  - que me toca recibir
  - que me incumbe recibir
  lexicon: LSJ
  rationale: En un contexto fiscal, el sentido es de derecho o cuota debida; 'me corresponde' conserva la idea de lo que toca percibir sin exceso de formalismo.
- source_word: ἀφίημι
  english_pob_choice: I remit it
  chosen_spanish: lo remito
  alternatives_spanish:
  - lo eximo
  - lo dejo de cobrar
  lexicon: LSJ
  rationale: '''Remitir'' es el término más cercano al inglés POB y al acto de renunciar a una exacción; ''lo dejo de cobrar'' aclara pero se aleja del paralelo verbal del original.'
- source_word: τοῦ λαβεῖν
  english_pob_choice: from being taken
  chosen_spanish: de modo que no sea tomado
  alternatives_spanish:
  - para que no sea cobrado
  - para que no se recaude
  lexicon: LSJ
  rationale: Convierte la construcción final del griego en español natural, preservando la pasiva sin perder la referencia a la exacción.
- source_word: γῆς Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el territorio de Judá
  - la tierra de Judea
  lexicon: LSJ
  rationale: Sigue de cerca el griego y el inglés POB; 'Judá' refleja el genitivo propio del texto fuente.
- source_word: τῶν τριῶν νομῶν
  english_pob_choice: the three districts
  chosen_spanish: los tres distritos
  alternatives_spanish:
  - los tres nomos
  - las tres regiones administrativas
  lexicon: LSJ
  rationale: '''Distritos'' reproduce la solución del POB inglés para νομοί y es comprensible en español sin perder el matiz administrativo.'
- source_word: τῶν προστιθεμένων αὐτῇ
  english_pob_choice: added to it
  chosen_spanish: añadidos a ella
  alternatives_spanish:
  - anexados a ella
  - incorporados a ella
  lexicon: LSJ
  rationale: Mantiene el participio pasivo en relación con Judá; 'a ella' sigue el referente territorial del griego.
- source_word: ἀπὸ τῆς Σαμαρίτιδος καὶ Γαλιλαίας
  english_pob_choice: from Samaria and Galilee
  chosen_spanish: desde Samaria y Galilea
  alternatives_spanish:
  - de Samaria y Galilea
  - procedentes de Samaria y Galilea
  lexicon: LSJ
  rationale: Conserva la indicación de procedencia regional tal como la presenta el griego y el POB inglés.
- source_word: εἰς τὸν ἅπαντα χρόνον
  english_pob_choice: for all time
  chosen_spanish: para siempre
  alternatives_spanish:
  - por todo tiempo
  - por todos los tiempos
  lexicon: LSJ
  rationale: '''Para siempre'' es la equivalencia española más natural y solemne para una duración perpetua.'
theological_decisions:
- issue: Naturaleza fiscal de la remisión del tributo
  english_pob_reading: The king is waiving a claim to revenue, not granting forgiveness in a moral sense.
  chosen_spanish_reading: lo remito
  alternative_spanish_readings:
  - lo perdono
  - lo condono
  rationale: En español, 'remitir' preserva el acto administrativo de renuncia a un impuesto/tributo y evita una lectura moral o religiosa ajena al contexto.
  doctrine_reference: No aplica; decisión de registro y semántica fiscal del texto histórico.
- issue: Referencia de los tres distritos incorporados a Judá
  english_pob_reading: Districts translates Greek nomoi, administrative regions; some English versions preserve the technical term nomes.
  chosen_spanish_reading: los tres distritos
  alternative_spanish_readings:
  - los tres nomos
  - las tres regiones administrativas
  rationale: '''Distritos'' conserva el sentido administrativo del término griego con claridad para lector español; ''nomos'' se deja fuera del texto principal por ser demasiado técnico.'
  doctrine_reference: No aplica; decisión histórico-administrativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que suavizó expresiones como 'seed-sowing' a 'seed' y 'release it' a 'remit it', además de clarificar la cláusula final con 'so that it is not taken'. La versión española opta por un equivalente natural ('tercio de la siembra', 'lo remito', 'de modo que no sea tomado') sin perder el trasfondo fiscal ni la estructura del original.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera explícitamente; no aplica en este versículo.
  - Se usa 'distritos' para νομοί siguiendo la decisión auditada del POB inglés.
  - Se conserva el tono jurídico-fiscal del pasaje con 'remito' y 'no sea tomado', evitando vocabulario devocional.
