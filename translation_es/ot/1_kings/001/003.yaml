review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa del hebreo: buscaron, encontraron a Abisag la sunamita, y la llevaron al rey. También conserva correctamente el alcance de בְּכֹל גְּבוּל יִשְׂרָאֵל como una búsqueda por toda la tierra/territorio de Israel. Sin embargo, el anclaje de notas no sigue bien la lógica del contenido: la nota cultural sobre «la sunamita» está anclada en «joven hermosa» en vez de en el gentilicio correspondiente.'
  spanish_quality_summary: El español es claro y natural, con registro bíblico moderno y digno. «Así que» funciona, pero no es necesario para un simple wayyiqtol narrativo; «Y» o ningún conector inicial sería más sobrio. «Hallaron» y «la llevaron al rey» son legibles. El único problema real es la colocación de las notas; además, «una joven hermosa» es aceptable, pero «una joven hermosa[a]» con la nota cultural desplazada crea confusión.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto. Los nombres y gentilicios están bien: «Abisag la sunamita». No aparecen términos teológicos sensibles del glosario. La decisión «joven» para נַעֲרָה es admisible, aunque «joven mujer» también sería posible; aquí no exige cambio.'
  issues:
  - severity: medium
    issue: La nota cultural [b] sobre «la sunamita» está colocada en «joven hermosa».
    rationale: La instrucción exige que cada nota aparezca anclada exactamente en la palabra o frase pertinente. La nota explica el gentilicio הַשּׁוּנַמִּית, por lo que debe marcarse junto a «la sunamita», no antes.
  - severity: low
    issue: El conector inicial «Así que» añade un matiz consecutivo algo más fuerte que el hebreo narrativo simple.
    rationale: וַיְבַקְשׁוּ introduce la siguiente acción narrativa. «Y buscaron» o simplemente «Buscaron» conserva mejor el flujo sin sobreinterpretar la relación lógica.
  revised_spanish_text: Y buscaron por todo el territorio de Israel una joven hermosa[a], y hallaron a Abisag la sunamita[b], y la llevaron al rey.
  revised_footnotes:
