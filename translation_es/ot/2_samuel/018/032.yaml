translation:
  language: es
  text: 'Entonces el rey dijo al cusita[a]: «¿Está bien el joven Absalón?» Y el cusita dijo: «Que los enemigos de mi señor el rey y todos los que se levantan contra ti para hacerte mal[b] sean como ese joven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Está a salvo el joven Absalón?» El hebreo pregunta literalmente por su ‘paz/bienestar’ (shalom), un término más amplio que la mera supervivencia.'
    reason: lexical_alternative
  - marker: b
    text: 'La respuesta del cusita es indirecta: sus palabras dan a entender el destino propio de los enemigos del rey, más que declarar la muerte de Absalón de forma explícita.'
    reason: cultural_note
lexical_decisions:
- source_word: הַכּוּשִׁי
  english_pob_choice: the Cushite
  chosen_spanish: el cusita
  alternatives_spanish:
  - el etíope
  - el hombre de Cus
  lexicon: HALOT
  rationale: El hebreo usa un gentilicio ligado a Cush; «cusita» conserva la referencia étnico-geográfica sin introducir una identificación moderna más estrecha o menos precisa. «Etíope» es tradicional, pero en español puede sonar más interpretativo que el término de origen.
- source_word: הֲשָׁלוֹם
  english_pob_choice: Is it well with
  chosen_spanish: ¿Está bien con... ? / ¿Está bien el...?
  alternatives_spanish:
  - ¿Hay paz para... ?
  - ¿Está a salvo el...?
  lexicon: HALOT
  rationale: שָׁלוֹם aquí pregunta por bienestar integral, no solo por supervivencia física. «¿Está bien el...?» transmite ese alcance amplio en un español natural. La formulación con apposición mantiene la referencia a Absalón sin volverla excesivamente explícita.
- source_word: לַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar desde muchacho hasta joven; aquí Absalón es un hombre adulto, pero el término funciona como designación narrativa. «El joven» conserva el valor relacional sin infantilizarlo.
- source_word: יִהְיוּ
  english_pob_choice: May ... be
  chosen_spanish: Que ... sean
  alternatives_spanish:
  - Que ... lleguen a ser
  - Sean
  lexicon: HALOT
  rationale: El imperfecto jussivo expresa deseo o imprecación. «Que ... sean» reproduce bien esa fuerza en español. En la cláusula, el sujeto implícito plural se resuelve naturalmente con «los enemigos» y «todos los que se levantan».
- source_word: כַנַּעַר
  english_pob_choice: like that young man
  chosen_spanish: como ese joven
  alternatives_spanish:
  - como aquel joven
  - igual que ese joven
  lexicon: HALOT
  rationale: El comparativo כ indica semejanza y, en el contexto, alude indirectamente a Absalón ya mencionado. «Ese joven» conserva la deixis cercana del discurso y la alusión sin nombrar de nuevo al referente de modo enfático.
- source_word: אֹיְבֵי אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: the enemies of my lord the king
  chosen_spanish: los enemigos de mi señor el rey
  alternatives_spanish:
  - los enemigos de mi señor, el rey
  - los enemigos de mi señor el rey
  lexicon: HALOT
  rationale: Se conserva el tratamiento cortesano y la relación posesiva del hebreo. «Mi señor el rey» refleja la fórmula de deferencia del original sin recurrir a un registro eclesiástico ajeno.
- source_word: קָמוּ עָלֶיךָ
  english_pob_choice: rise up against you
  chosen_spanish: se levantan contra ti
  alternatives_spanish:
  - se han levantado contra ti
  - se alzan contra ti
  lexicon: HALOT
  rationale: La expresión קום על es un modismo de oposición hostil o rebelión. «Se levantan contra ti» comunica bien el modismo en español y mantiene la carga conflictiva.
- source_word: לְרָעָה
  english_pob_choice: for evil
  chosen_spanish: para mal
  alternatives_spanish:
  - para daño
  - para hacer daño
  lexicon: HALOT
  rationale: El sustantivo רָעָה apunta a maldad/daño/propósito nocivo. «Para mal» preserva la formulación compacta del hebreo y su tono moral y hostil.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said / And ... said
  chosen_spanish: Entonces ... dijo / Y ... dijo
  alternatives_spanish:
  - Luego ... dijo
  - Y respondió
  lexicon: HALOT
  rationale: La narración hebrea repite el verbo de decir; en español, alternar «Entonces» y «Y» conserva la secuencia sin forzar el estilo.
theological_decisions:
- issue: Tratamiento implícito de Absalón en la respuesta del cusita
  english_pob_reading: 'The Cushite answers indirectly: his words imply that Absalom has met the fate appropriate to the king’s enemies, rather than stating the death explicitly.'
  chosen_spanish_reading: 'El cusita responde de forma indirecta: sus palabras implican que Absalón ha corrido la suerte de los enemigos del rey, sin decir explícitamente que ha muerto.'
  alternative_spanish_readings:
  - el cusita afirma abiertamente que Absalón murió
  - el cusita solo habla de una derrota, no de muerte
  rationale: 'El hebreo y la lectura auditada en inglés muestran una respuesta elíptica e indirecta. La versión española debe preservar esa tensión retórica: no explicitar la muerte donde el texto no la expresa, pero tampoco rebajar la implicación del desenlace.'
  doctrine_reference: Principio de suficiencia textual y prudencia exegética; no añadir contenido no dicho por el texto.
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado solo para quitar una coma en la aposición «the young man Absalom». La versión española mantiene esa misma relación appositiva sin coma innecesaria y conserva la naturaleza indirecta de la respuesta del cusita.
  spanish_consistency_notes:
  - Se usa «cusita» para הַכּוּשִׁי, en línea con la preferencia POB por conservar el gentilicio hebreo.
  - Se mantiene «para mal» para לְרָעָה, siguiendo la fuerza moral/hostil del hebreo.
  - Se evita traducir קום על con un término demasiado técnico; «se levantan contra ti» es natural y fiel.
  - Se conserva la fórmula de respeto «mi señor el rey» como reflejo del original y de la lectura auditada en inglés.
