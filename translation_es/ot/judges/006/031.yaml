base_translation:
  language: en
  yaml_path: translation/ot/judges/006/031.yaml
  text: But Joash said to all who stood against him[a], “Will you contend for Baal? Will you save him? Whoever contends for him shall be put to death by morning. If he is a god, let him contend for himself, because his altar has been torn down.”
