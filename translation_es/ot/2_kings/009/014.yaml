translation:
  language: es
  text: Entonces Jehú, hijo de Josafat, hijo de Nimsi, conspiró contra Joram. Y Joram estaba vigilando[a] en Ramot-galaad, él y todo Israel[b][c], a causa de Hazael, rey de Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba guardando» o «estaba defendiendo». El verbo hebreo puede referirse a vigilar, custodiar o mantener una posición militar.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el reino o las fuerzas de Israel; el hebreo dice literalmente «todo Israel».
    reason: cultural_note
  - marker: c
    text: Tradicionalmente, «Siria»; el hebreo dice «Aram».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְקַשֵּׁר
  english_pob_choice: conspired against
  chosen_spanish: conspiró contra
  alternatives_spanish:
  - tramó una conspiración contra
  - se conjuró contra
  lexicon: HALOT
  rationale: El hitpael de קשר en este contexto expresa una acción hostil y política. «Conspiró contra» es natural en español y conserva la dirección adversativa hacia Joram.
- source_word: בֶּן ... בֶּן
  english_pob_choice: son of ... son of
  chosen_spanish: hijo de ... hijo de
  alternatives_spanish:
  - descendiente de ... descendiente de
  lexicon: HALOT
  rationale: La repetición de בן presenta la línea genealógica inmediata y la de su abuelo. «Hijo de ... hijo de» preserva esa especificidad en español.
- source_word: אֶל יוֹרָם
  english_pob_choice: against Joram
  chosen_spanish: contra Joram
  alternatives_spanish:
  - hacia Joram
  - respecto de Joram
  lexicon: HALOT
  rationale: Aunque אֶל suele significar «a / hacia», con el verbo de conspirar marca el blanco del complot. En español se expresa con claridad como «contra».
- source_word: הָיָה שֹׁמֵר
  english_pob_choice: had been keeping watch
  chosen_spanish: estaba vigilando
  alternatives_spanish:
  - estaba guardando
  - estaba defendiendo
  - había estado vigilando
  lexicon: HALOT
  rationale: El participio שֹׁמֵר en contexto militar puede abarcar vigilar, custodiar o defender. «Estaba vigilando» comunica bien la acción de centinela sin forzar un matiz excesivo, y mantiene la idea de presencia militar en curso.
- source_word: בְּרָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot-galaad
  alternatives_spanish:
  - Ramot en Galaad
  - Ramot de Galaad
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicional transliterado al español bíblico. «Ramot-galaad» es claro, reconocible y fiel al nombre propio.
- source_word: הוּא וְכָל יִשְׂרָאֵל
  english_pob_choice: he and all Israel
  chosen_spanish: él y todo Israel
  alternatives_spanish:
  - él y todo el ejército de Israel
  - él y todo Israel con él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «él y todo Israel». En español, «todo Israel» preserva la formulación original; el contexto militar queda implícito sin estrechar indebidamente el referente.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por causa de
  - debido a
  - por temor a
  lexicon: HALOT
  rationale: Aquí introduce el motivo de la vigilancia. «A causa de» es una equivalencia natural y directa para la relación causal del hebreo.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se mantiene «Aram» para reflejar el término hebreo original, conforme a la preferencia del proyecto por la primacía de la fuente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que prefirió «keeping watch» para שֹׁמֵר por ser más natural y ajustarse mejor al sentido militar del pasaje. La versión española refleja esa actualización con «estaba vigilando».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se conservó la transliteración de nombres propios y topónimos bíblicos coherente con una traducción directa desde el hebreo.
  - «Conspiró contra» y «a causa de» buscan conservar la relación sintáctica y la carga narrativa del hebreo sin suavizar el conflicto.
  - «Todo Israel» se mantiene literal en el texto, con nota explicativa para el sentido corporativo/militar del pasaje.
