translation:
  language: es
  text: 'Y Esaú le dijo a Jacob[a]: «Por favor, déjame tragar algo de esa cosa roja, esa cosa roja de ahí, porque estoy agotado». Por eso se le llamó Edom[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite literalmente «el rojo, el rojo» sin nombrar explícitamente el alimento; la redacción probablemente refleja el habla brusca e impulsiva de Esaú. Muchas traducciones añaden «guiso».
    reason: lexical_alternative
  - marker: b
    text: «Edom» suena como la palabra hebrea para «rojo», preservando el juego de palabras del versículo.
    reason: cross_reference
lexical_decisions:
- source_word: הַלְעִיטֵנִי
  english_pob_choice: Please let me gulp down
  chosen_spanish: déjame tragar
  alternatives_spanish:
  - déjame engullir
  - déjame tragar, por favor
  - déjame zampar
  lexicon: HALOT
  rationale: El verbo hebreo expresa una acción brusca y voraz, no simplemente 'alimentar'. 'Tragar' conserva la fuerza corporal e impulsiva sin sonar artificial en español; 'engullir' también sería posible, pero 'tragar' es más natural y claro aquí.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  - por vida tuya
  lexicon: HALOT
  rationale: La partícula de ruego נָא se rinde bien con 'por favor' en español moderno. 'Ahora' sería temporal y menos fiel al valor pragmático de petición.
- source_word: מִן הָאָדֹם הָאָדֹם הַזֶּה
  english_pob_choice: some of that red stuff, that red stuff there
  chosen_spanish: de ese rojo, de ese rojo de ahí
  alternatives_spanish:
  - de ese rojo, de ese rojo allí
  - de ese rojo guiso, de ese rojo de ahí
  - de esa cosa roja, de esa cosa roja de ahí
  lexicon: HALOT
  rationale: El hebreo repite 'el rojo' sin nombrar el alimento, y la repetición parece reflejar el habla impulsiva de Esaú. En español se conserva la repetición y la elipsis con 'de ese rojo'; añadir 'guiso' interpretaría más de lo que el hebreo dice. 'De ahí' refleja el valor deíctico de הַזֶּה.
- source_word: כִּי עָיֵף אָנֹכִי
  english_pob_choice: because I am exhausted
  chosen_spanish: porque estoy agotado
  alternatives_spanish:
  - porque estoy cansado
  - porque me siento desfallecido
  - porque estoy rendido
  lexicon: HALOT
  rationale: עָיֵף expresa cansancio fuerte, agotamiento. 'Estoy agotado' comunica bien ese estado en español actual y mantiene la urgencia de la petición.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por consiguiente
  - Así que
  - De modo que
  lexicon: HALOT
  rationale: La fórmula inferencial introduce la explicación del nombre. 'Por eso' es natural y fiel en español, sin volverla demasiado formal.
- source_word: קָרָא שְׁמוֹ אֱדוֹם
  english_pob_choice: his name was called Edom
  chosen_spanish: llamó su nombre Edom
  alternatives_spanish:
  - fue llamado Edom
  - le pusieron por nombre Edom
  - su nombre fue llamado Edom
  lexicon: HALOT
  rationale: El hebreo usa una fórmula de nombramiento. 'Llamó su nombre Edom' refleja de cerca la construcción y deja visible la relación con el juego de palabras del relato; 'le pusieron por nombre' sería más idiomático, pero menos pegado a la forma hebrea.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Rojo
  lexicon: HALOT
  rationale: Como nombre propio, se translitera. El vínculo con 'rojo' queda sugerido por la frase anterior y por la repetición del color.
translation_notes:
  revision_awareness: La redacción sigue la línea revisada del POB inglés que mantiene 'please' como ruego natural y conserva la repetición de 'red stuff' para respetar el carácter abrupto del hebreo. En español, se ha optado por una formulación igualmente directa y breve, sin suplir 'guiso' en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Dios' y 'Yahvé' según el estándar del proyecto; este versículo no los contiene.
  - Se conserva el estilo directo y oral de Esaú sin suavizarlo en exceso.
  - Se mantiene la repetición léxica de 'rojo' para reflejar el hebreo y el juego onomástico con Edom.
