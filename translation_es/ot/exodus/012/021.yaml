base_translation:
  language: en
  yaml_path: translation/ot/exodus/012/021.yaml
  text: Then Moses called for all the elders of Israel and said to them[a], “Draw out and take for yourselves sheep according to your families[c][b], and slaughter the Passover lamb.”
  footnotes:
  - marker: a
    text: Hebrew 'the Passover'; that is, the Passover sacrifice or victim.
    reason: lexical_alternative
  - marker: b
    text: '''Draw out'' may also be understood as ''select'' or ''pull out'' from the flock.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew word for the animal is broader than 'lamb' and can refer to small livestock from the flock.
    reason: lexical_alternative
