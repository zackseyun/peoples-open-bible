  yaml_path: translation/ot/1_chronicles/017/001.yaml
  text: Now it happened[a], when David was living in his house, that David said to Nathan the prophet, “Look, I am living in a house of cedar, but the ark of the covenant of Yahweh is under curtains.”
  footnotes:
