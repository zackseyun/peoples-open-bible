translation:
  language: es
  text: Antes de la muerte[a], no llames dichoso[b] a un hombre, porque al final se conoce[c] a un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego paralelo dice de modo bastante diferente: «Guárdate del malhechor, porque maquina maldad, para que no te ponga una mancha para siempre». Esto probablemente refleja una forma textual distinta; aquí se sigue el hebreo como testimonio primario.'
    reason: alternative_reading
  - marker: b
    text: 'O: «no pronuncies a un hombre feliz o afortunado»; también puede entenderse con el matiz de «no declares bendecido».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «al final un hombre es reconocido» o «queda de manifiesto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי מָוֶת
  english_pob_choice: Before death
  chosen_spanish: Antes de la muerte
  alternatives_spanish:
  - Antes de morir
  - Previo a la muerte
  lexicon: HALOT
  rationale: La expresión temporal se mantiene de forma directa y natural en español. «Antes de la muerte» conserva el valor proverbial del hebreo sin añadir paráfrasis.
- source_word: אַל תְּאַשֶּׁר
  english_pob_choice: do not call ... blessed
  chosen_spanish: no declares feliz
  alternatives_spanish:
  - no llames bienaventurado
  - no pronuncies feliz
  - no consideres afortunado
  lexicon: HALOT
  rationale: El verbo admite el sentido de declarar a alguien feliz, dichoso o bendecido. En español, «declares feliz» conserva el acto evaluativo y evita forzar una fórmula litúrgica menos directa. Se mantiene la tensión entre dicha/felicidad y bendición en una nota.
- source_word: גָּבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se preserva el singular masculino del hebreo, que en la sabiduría funciona de modo representativo. «Un hombre» reproduce mejor el paralelismo del verso que una neutralización.
- source_word: בְּאַחֲרִיתוֹ
  english_pob_choice: in his end
  chosen_spanish: en su fin
  alternatives_spanish:
  - al final de su vida
  - en su desenlace
  - en su último destino
  lexicon: HALOT
  rationale: «Fin» conserva la concisión del hebreo y deja abierta la mezcla de final temporal y resultado evaluativo presente en אַחֲרִית.
- source_word: יִנָּכֵר
  english_pob_choice: is known
  chosen_spanish: es conocido
  alternatives_spanish:
  - es reconocido
  - se hace evidente
  - queda de manifiesto
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una formulación más directa y natural. «Es conocido» sigue de cerca ese ajuste y mantiene el sentido de que al final se revela/percibe la verdadera realidad del hombre.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el paralelismo del hebreo con el mismo término representativo. En español, repetir «un hombre» evita perder la estructura proverbial.
theological_decisions:
- issue: 'Lectura del final proverbial: reconocimiento del hombre en su desenlace'
  english_pob_reading: for in his end a man is known
  chosen_spanish_reading: porque en su fin un hombre es conocido
  alternative_spanish_readings:
  - porque al final de su vida un hombre queda reconocido
  - porque en su desenlace un hombre se hace evidente
  rationale: La frase mantiene la idea sapiencial de que el carácter o la condición de una persona no debe juzgarse demasiado pronto. No se adopta la lectura del griego en el texto principal porque el expediente hebreo es la base primaria aquí, aunque se documenta como variante sustancial.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives, using Greek in view'
- issue: Lenguaje masculino genérico en sabiduría hebrea
  english_pob_reading: Retain 'man' in both clauses
  chosen_spanish_reading: Retener «hombre» en ambas cláusulas
  alternative_spanish_readings:
  - persona
  - alguien
  - uno
  rationale: El hebreo usa formas masculinas singulares representativas. En español, «hombre» conserva mejor el paralelismo y la forma proverbial sin borrar el matiz del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del expediente inglés, que prefirió una formulación más directa para el verbo final («is known») y mantuvo la lectura hebrea como base principal. La versión española sigue esa dirección con «es conocido», y conserva la decisión lexical sobre תְּאַשֶּׁר como declaración evaluativa.
  spanish_consistency_notes:
  - Se usa «un hombre» de manera consistente para los dos sustantivos masculinos del hebreo, respetando el paralelismo.
  - «Antes de la muerte» reproduce la economía proverbial del original sin añadir explicitación interpretativa.
  - La nota del griego se limita a la diferencia textual documentada y no desplaza el texto principal hebreo.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, ya que el verso no contiene el tetragrámaton ni un equivalente directo.
