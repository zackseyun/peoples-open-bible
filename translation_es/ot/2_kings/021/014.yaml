translation:
  language: es
  text: Y yo abandonaré el remanente de mi herencia[a] y los entregaré en manos de sus enemigos, y llegarán a ser botín y despojo para todos sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Mi herencia'' también puede traducirse ''mi heredad'', preservando el lenguaje de posesión pactal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָטַשְׁתִּי
  english_pob_choice: I will forsake
  chosen_spanish: abandonaré
  alternatives_spanish:
  - desampararé
  - dejaré
  lexicon: HALOT
  rationale: נטשׁ expresa dejar, abandonar o forsake en sentido judicial y relacional. En español, 'abandonaré' comunica con naturalidad la idea de dejar a alguien sin protección, sin perder el peso del juicio divino.
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - lo que queda
  lexicon: HALOT
  rationale: שמֵרִית es un término bíblico cargado de sentido teológico para lo que sobrevive al juicio. 'Remanente' mantiene ese valor técnico y la resonancia bíblica que 'resto' no conserva igual.
- source_word: נַחֲלָתִי
  english_pob_choice: my inheritance
  chosen_spanish: mi heredad
  alternatives_spanish:
  - mi herencia
  - mi posesión
  lexicon: HALOT
  rationale: נחלה puede referirse a heredad o porción asignada; 'heredad' en español bíblico conserva mejor la idea de posesión pactal y territorial que 'herencia', que suele sonar más individual o patrimonial.
- source_word: וּנְתַתִּים
  english_pob_choice: and give them
  chosen_spanish: y los entregaré
  alternatives_spanish:
  - y los pondré
  - y los daré
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'dar', en contexto implica ponerlos en poder enemigo. 'Entregaré' reproduce bien ese matiz de traslado bajo dominio hostil, sin perder la fuerza del hebreo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - a manos de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. 'En mano de' conserva la imagen concreta de dominio y control; por fluidez, se omite el artículo en español.
- source_word: אֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de ellos
  - quienes los odian
  lexicon: HALOT
  rationale: Traducción directa y natural del plural posesivo. Se mantiene la repetición del término en ambas ocurrencias para reflejar el paralelismo del hebreo.
- source_word: וְהָיוּ
  english_pob_choice: and they will become
  chosen_spanish: y serán
  alternatives_spanish:
  - y llegarán a ser
  - y se convertirán en
  lexicon: HALOT
  rationale: En este contexto, הָיָה puede funcionar como simple futuro de estado resultante. 'Serán' es más natural en español que 'se convertirán en' y sigue permitiendo la idea de resultado.
- source_word: לְבַז
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - despojo
  lexicon: HALOT
  rationale: בז designa aquello tomado por saqueo. 'Botín' es un equivalente natural y preciso en español bíblico; comunica el resultado de la conquista sin exagerar el registro.
- source_word: וְלִמְשִׁשָּׂה
  english_pob_choice: and spoil
  chosen_spanish: y despojo
  alternatives_spanish:
  - y saqueo
  - y presa
  lexicon: HALOT
  rationale: משׁסה es paralelo a בז y apunta a lo despojado por saqueo. 'Despojo' preserva la duplicación semántica con 'botín' y suena bíblico y claro en español.
- source_word: לְכָל אֹיְבֵיהֶם
  english_pob_choice: for all their enemies
  chosen_spanish: para todos sus enemigos
  alternatives_spanish:
  - ante todos sus enemigos
  - a merced de todos sus enemigos
  lexicon: HALOT
  rationale: 'El lamed final expresa resultado/relación: quedan expuestos al saqueo respecto de todos sus enemigos. ''Para todos sus enemigos'' es idiomático en español y conserva la amplitud del alcance.'
theological_decisions:
- issue: Lenguaje pactal de 'mi heredad' / 'my inheritance'
  english_pob_reading: Retain 'my inheritance' as referring to the people/portion belonging to God without narrowing it further in translation.
  chosen_spanish_reading: Conservar 'mi heredad' como referencia a la porción/pueblo perteneciente a Dios, sin estrechar el sentido a una sola categoría.
  alternative_spanish_readings:
  - mi herencia
  - mi posesión
  rationale: '''Heredad'' mantiene mejor el campo semántico pactal y territorial del hebreo que ''herencia'' en español corriente. No se añade interpretación extra; solo se preserva la relación de pertenencia expresada por el texto.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta propuesta sigue el acuerdo alto del cotejo y mantiene las decisiones léxicas ya auditadas.
  spanish_consistency_notes:
  - Se conserva la repetición de 'sus enemigos' para reflejar la estructura del hebreo.
  - Se evita 'SEÑOR' porque este versículo no contiene el Tetragrámaton en el texto hebreo provisto.
  - Se mantiene un registro bíblico moderno con 'remanente', 'heredad', 'botín' y 'despojo' para preservar la densidad léxica del original.
