  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Impíos' para ἀσεβέσιν está bien justificado. No aparecen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc. La decisión teológica sobre el sujeto implícito se preserva correctamente.
