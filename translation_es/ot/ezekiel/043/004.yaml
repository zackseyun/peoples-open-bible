translation:
  language: es
  text: Y la gloria de Yahvé[a] entró en la casa por la puerta que mira al oriente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la casa»; en este contexto de visión, se refiere al edificio del templo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a través de la puerta que mira al oriente».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/כְב֥וֹד
  english_pob_choice: And the glory
  chosen_spanish: Y la gloria
  alternatives_spanish:
  - Entonces la gloria
  - y la gloria
  lexicon: HALOT
  rationale: כָּבוֹד aquí expresa la gloria/presencia manifiesta de Dios; en español, «gloria» conserva ese valor. El prefijo conjuntivo se vierte naturalmente como «Y» al inicio del enunciado.
- source_word: יְהוָ֖ה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio POB en español, el Tetragrámaton se translitera como «Yahvé» y no se oculta tras una mayúscula sustitutiva. Esto preserva el nombre propio del pacto en el texto principal.
- source_word: בָּ֣א
  english_pob_choice: came
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: El verbo בוא puede significar venir o entrar. En esta escena espacial, «entró» comunica con claridad el movimiento hacia el interior de la casa/templo sin perder el sentido del hebreo.
- source_word: אֶל הַ/בָּ֑יִת
  english_pob_choice: into the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - al templo
  - en el templo
  - a la casa
  lexicon: HALOT
  rationale: En este contexto visionario, בַּיִת se refiere al edificio del templo, pero la equivalencia directa y auditables es «casa». El español «entró en la casa» suple naturalmente la dirección implícita del verbo de movimiento.
- source_word: דֶּ֣רֶךְ
  english_pob_choice: by way of
  chosen_spanish: por el camino de
  alternatives_spanish:
  - por la puerta de
  - a través de
  lexicon: HALOT
  rationale: דֶּרֶךְ indica ruta o vía. «Por el camino de» conserva la imagen direccional del hebreo y se integra bien con la construcción española.
- source_word: שַׁ֔עַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - el portón
  - la entrada
  lexicon: HALOT
  rationale: En arquitectura del templo, שַׁעַר designa una puerta/portal de acceso. «Puerta» es el equivalente español más claro y sobrio para este contexto.
- source_word: אֲשֶׁ֥ר פָּנָ֖י/ו
  english_pob_choice: that faces
  chosen_spanish: que mira
  alternatives_spanish:
  - que da al
  - cuyo frente mira
  lexicon: HALOT
  rationale: El modismo con פָּנִים expresa orientación frontal. «Que mira» reproduce de manera natural y precisa la orientación hacia el oriente sin forzar una formulación técnica.
- source_word: דֶּ֥רֶךְ הַ/קָּדִֽים
  english_pob_choice: east
  chosen_spanish: al oriente
  alternatives_spanish:
  - hacia el este
  - al este
  lexicon: HALOT
  rationale: קָדִים señala la dirección del este. «Oriente» es una opción digna y bíblicamente natural en español; mantiene el matiz direccional del original.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política POB para el español favorece «Yahvé» como representación del nombre del pacto, coherente con el auditable source trail y con la transparencia del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (adaptado en español como Yahvé)'
- issue: Determinación de «la casa» en un contexto visionario del templo
  english_pob_reading: house = temple building
  chosen_spanish_reading: la casa = el edificio del templo
  alternative_spanish_readings:
  - el templo
  - el santuario
  rationale: Como en el inglés POB, se conserva «casa» en el texto principal para reflejar el léxico hebreo, y se reconoce en la decisión que en la visión se refiere al edificio del templo.
  doctrine_reference: Contexto literario de Ezequiel 40–43; nota lexical auditada en el POB inglés
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo WLC y el audit trail inglés POB. Se mantuvo la equivalencia óptima: conservación de «gloria», «Yahvé» y «casa», con una formulación española natural para el movimiento espacial y la orientación de la puerta. No se requirieron revisiones textuales adicionales frente al paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה según la política española del proyecto.
  - Se conservó «casa» en el texto principal para respetar el léxico del hebreo, y la nota aclara su referencia al templo.
  - «Oriente» se eligió como equivalente sobrio de la dirección este, manteniendo registro bíblico y claridad.
  - La puntuación y el orden responden al español moderno sin desplazar el contenido semántico del hebreo.
