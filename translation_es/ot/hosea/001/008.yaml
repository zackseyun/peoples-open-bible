translation:
  language: es
  text: Después de haber destetado a Lo-ruhamá[a], concibió y dio a luz un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lo-ruhamá significa «No compadecida» o «No tratada con misericordia». El sentido del nombre es importante en el contexto circundante, aunque el nombre mismo se translitera en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְמֹל
  english_pob_choice: After she had weaned
  chosen_spanish: Después de haber destetado
  alternatives_spanish:
  - Y destetó
  - Cuando hubo destetado
  lexicon: HALOT
  rationale: 'En este contexto, גמל en qal describe el destete. El hebreo avanza la narración con una forma wayyiqtol, pero en español la relación temporal se expresa con naturalidad mediante una construcción anterior: ''Después de haber destetado''. Mantiene la secuencia de acciones sin volverla forzada.'
- source_word: אֶת
  english_pob_choice: '[direct object marker, untranslated]'
  chosen_spanish: '[marcador de objeto directo, no traducido]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El אֶת hebreo señala el objeto directo definido y no corresponde a una palabra independiente en español. No se verbaliza en el texto principal.
- source_word: לֹא רֻחָמָה
  english_pob_choice: Lo-ruhamah
  chosen_spanish: Lo-ruhamá
  alternatives_spanish:
  - Lo-Ruhamá
  - No compadecida
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, como en el auditorio inglés. La acentuación en español facilita la lectura. No se traduce el nombre en el texto principal porque el nombre funciona también como designación narrativa fija, aunque su sentido se explica en nota.
- source_word: וַתַּהַר
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - quedó embarazada
  lexicon: HALOT
  rationale: '''Concibió'' es un equivalente natural, formal y preciso para הרה en fórmulas narrativas de nacimiento. Conserva el sentido biológico y la progresión narrativa.'
- source_word: וַתֵּלֶד
  english_pob_choice: gave birth
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - tuvo
  lexicon: HALOT
  rationale: '''Dar a luz'' es la expresión idiomática y clara en español para la acción de ילד en este contexto. Evita un calco arcaizante y mantiene la dignidad del registro.'
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  lexicon: HALOT
  rationale: בֵּן se traduce de manera natural como 'hijo'. El artículo indefinido se conserva porque introduce a un nuevo hijo dentro de la secuencia narrativa.
theological_decisions:
- issue: El sentido del nombre Lo-ruhamah en el contexto profético
  english_pob_reading: Lo-ruhamah means 'Not shown mercy' or 'No mercy.' The name's meaning is important in the surrounding context, though the name itself is transliterated in the main text.
  chosen_spanish_reading: Lo-ruhamá se mantiene transliterado en el texto principal, con su sentido explicado en nota.
  alternative_spanish_readings:
  - No compadecida
  - Sin misericordia
  rationale: El contexto de Oseas carga el nombre con valor teológico y narrativo, pero el propio relato presenta el nombre como designación fija. Por eso se preserva la forma del nombre en el texto, sin reemplazarlo por una traducción que borraría su función onomástica. La explicación de su sentido queda en nota para no perder la tensión entre nombre y significado.
  doctrine_reference: Oseas 1:6–9; relación entre juicio y misericordia en la sección de los nombres simbólicos.
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con el audit trail inglés: se mantiene la secuencia temporal del destete, la transliteración del nombre simbólico y la fórmula narrativa de concepción y parto. No se requieren revisiones textuales adicionales respecto del paquete fuente recibido.'
  spanish_consistency_notes:
  - Se usa 'Lo-ruhamá' con tilde para facilitar la lectura en español, conservando la transliteración del nombre.
  - '''Concibió'' y ''dio a luz'' mantienen un registro bíblico claro sin caer en arcaísmos innecesarios.'
  - La nota explica el sentido del nombre sin sustituirlo en el texto principal, preservando la tensión lexical y teológica del hebreo.
