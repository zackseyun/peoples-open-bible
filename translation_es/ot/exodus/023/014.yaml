translation:
  language: es
  text: Tres veces al año me celebrarás una fiesta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tres pies». Este modismo hebreo se refiere a las tres fiestas de peregrinación del año.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלֹשׁ
  english_pob_choice: Three
  chosen_spanish: Tres
  alternatives_spanish:
  - Tres veces
  lexicon: HALOT
  rationale: El cardinal introduce la frecuencia requerida. En español, «Tres» funciona naturalmente con el sustantivo implícito del modismo y evita una repetición innecesaria.
- source_word: רְגָלִים
  english_pob_choice: times
  chosen_spanish: veces
  alternatives_spanish:
  - pies
  - ocasiones
  - peregrinaciones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «pies», el modismo señala las tres ocasiones festivas anuales. «Veces» conserva el sentido idiomático en español y permite explicar el valor literal en nota.
- source_word: תָּחֹג
  english_pob_choice: you shall keep a feast
  chosen_spanish: celebrarás una fiesta
  alternatives_spanish:
  - guardarás una fiesta
  - celebrarás una festividad
  - harás fiesta
  lexicon: HALOT
  rationale: חגג expresa celebrar una festividad/guardar una fiesta. «Celebrarás una fiesta» comunica el acto cultual con español claro y digno.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: La preposición marca que la fiesta está dirigida a Yahvé. «Para mí» suena natural en español y conserva el destinatario personal.
- source_word: בַּשָּׁנָה
  english_pob_choice: in the year
  chosen_spanish: al año
  alternatives_spanish:
  - en el año
  - cada año
  - anualmente
  lexicon: HALOT
  rationale: 'La idea es distributiva: tres veces dentro del ciclo anual. «Al año» fluye bien con «tres veces» y mantiene la temporalidad anual.'
theological_decisions:
- issue: Identificación del destinatario de la fiesta
  english_pob_reading: to me
  chosen_spanish_reading: para mí
  alternative_spanish_readings:
  - a mí
  - para Yahvé
  rationale: El hebreo presenta dirección personal hacia Dios; el texto español debe conservar esa relación de destino sin sustituir el pronombre por un título litúrgico.
  doctrine_reference: Éxodo 23:14; culto dirigido a Yahvé
- issue: Tratamiento del modismo hebreo 'three feet'
  english_pob_reading: Literally, 'three feet.' This Hebrew idiom refers to the three pilgrimage festival occasions in the year.
  chosen_spanish_reading: Literalmente, «tres pies». Este modismo hebreo se refiere a las tres ocasiones festivas de peregrinación en el año.
  alternative_spanish_readings:
  - tres peregrinaciones
  - tres fiestas de peregrinación
  rationale: La expresión hebrea se mantiene como modismo y no se traduce mecánicamente en el cuerpo principal, pero sí debe explicarse para no borrar su fuerza lexical y cultural.
  doctrine_reference: Exégesis lexical del hebreo חג/רגל; calendario festivo de Israel
translation_notes:
  revision_awareness: El texto inglés auditado está en alta concordancia y no muestra revisiones aplicadas; la versión española sigue esa lectura sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nomenclatura POB cuando el versículo alude al destinatario divino implícito en לִי.
  - «Fiesta» se usa en sentido cultual, no como celebración informal.
  - La nota conserva el modismo hebreo para no perder la referencia a רְגָלִים como 'pies' y a la vez dar el sentido contextual.
