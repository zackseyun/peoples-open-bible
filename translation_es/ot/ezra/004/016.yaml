base_translation:
  language: en
  yaml_path: translation/ot/ezra/004/016.yaml
  text: We make known to the king that if this city is rebuilt and its walls are completed[b][a], then because of this you will have no portion Beyond the River.
  footnotes:
  - marker: a
    text: Aramaic 'portion/share' could also be rendered 'share' or, more specifically in context, 'revenue.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Beyond the River,' the official Persian name for the trans-Euphrates province.
    reason: cultural_note
