base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/051.yaml
  text: 'His disciples said to him[That which], "On what day will the rest of the dead take place, and on what day will the new world come?"

    He said to them, "That which you are expecting has come[you yourselves][expecting], but you yourselves do not know it."'
  footnotes:
  - marker: That which
    text: The Coptic uses the feminine demonstrative pronoun ⲧⲏ (tē), which grammatically refers back to the feminine noun 'rest' (ⲁⲛⲁⲡⲁⲩⲥⲓⲥ, anapausis).
    reason: lexical_alternative
  - marker: expecting
    text: The Coptic idiom ϭⲱϣⲧ ⲉⲃⲟⲗ ϩⲏⲧ- literally means 'to look out before' or 'to look forward to'.
    reason: lexical_alternative
  - marker: you yourselves
    text: The Coptic uses the independent pronoun ⲛ̄ⲧⲱⲧⲛ̄ before the conjugated verb for emphasis.
    reason: register_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Sus discípulos le dijeron: «¿En qué día acontecerá el descanso de los muertos, y en qué día vendrá el mundo nuevo?»


    Él les dijo: «Lo que[a] ustedes están esperando ha venido, pero ustedes mismos[b] no lo conocen».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El copto usa el demostrativo femenino ⲧⲏ, que gramaticalmente remite al sustantivo femenino «descanso» (ⲁⲛⲁⲡⲁⲩⲥⲓⲥ).
    reason: lexical_alternative
  - marker: b
    text: La forma copta usa el pronombre independiente enfático ⲛⲧⲱⲧⲛ antes del verbo; por eso se traduce «ustedes mismos» para conservar el énfasis.
    reason: register_note
lexical_decisions:
- source_word: ⲁϣ ⲛϩⲟⲟⲩ
  english_pob_choice: On what day
  chosen_spanish: ¿En qué día... ?
  alternatives_spanish:
  - ¿Cuándo... ?
  lexicon: Crum 20a
  rationale: La pregunta pide un día concreto; en español «¿en qué día?» conserva mejor la referencia temporal específica que «¿cuándo?», sin perder naturalidad.
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - resto
  lexicon: BDAG 73; Crum 12a
  rationale: El préstamo griego designa aquí el estado final de reposo. «Descanso» comunica bien esa idea en español e introduce menos ambigüedad que «resto»; «reposo» queda como alternativa cercana.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: take place
  chosen_spanish: acontecerá
  alternatives_spanish:
  - tendrá lugar
  - ocurrirá
  lexicon: Crum 585b
  rationale: Para un evento escatológico, «acontecerá» conserva el matiz de suceso que «take place» expresa, con registro digno y natural.
- source_word: ⲃⲃⲣⲣⲉ
  english_pob_choice: new
  chosen_spanish: nuevo
  lexicon: Crum 42b
  rationale: El adjetivo coptico significa «nuevo»; por eso se traduce directamente como «nuevo» en «el mundo nuevo». No hay base para otras lecturas como «niño» o «joven».
- source_word: ϭⲱϣⲧ ⲉⲃⲟⲗ ϩⲏⲧ-
  english_pob_choice: expecting
  chosen_spanish: están esperando
  alternatives_spanish:
  - están aguardando
  - esperan
  lexicon: Crum 834a
  rationale: El modismo significa «esperar/aguardar/anticipar». En español, «están esperando» mantiene la fuerza de expectativa futura o presente sin introducir un matiz más interpretativo como «aguardando».
- source_word: ⲧⲏ
  english_pob_choice: That which
  chosen_spanish: Lo que
  alternatives_spanish:
  - Aquello que
  - Eso que
  lexicon: Crum 385b
  rationale: El demostrativo femenino apunta a «el descanso» mencionado antes, pero en español una equivalencia idiomática y fiel es «lo que». Mantiene la referencia sin forzar una forma extraña como «aquello que».
theological_decisions:
- issue: Eschatology realized vs. future expectation
  english_pob_reading: That which you are expecting has come, but you yourselves do not know it.
  chosen_spanish_reading: Lo que ustedes están esperando ya ha venido, pero ustedes mismos no lo conocen.
  alternative_spanish_readings:
  - Lo que ustedes esperan ha venido, pero ustedes mismos no lo conocen.
  - Lo que ustedes están esperando ha llegado, pero ustedes mismos no lo saben.
  rationale: El coptico perfecto ⲁⲥⲉⲓ afirma una llegada real en el presente/pasado; por eso se traduce «ya ha venido». Se conserva así la tensión teológica de la realización presente, sin convertir el dicho en una expectativa todavía futura.
  doctrine_reference: Thomas 51; lectura de escatología realizada en el texto coptico
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió lecturas erróneas sobre «mundo nuevo» y sobre el valor del perfecto coptico: ⲃⲃⲣⲣⲉ significa «nuevo», y ⲁⲥⲉⲓ significa «ha venido». La redacción española evita las interpretaciones rechazadas por el audit trail.'
  spanish_consistency_notes:
  - Se mantuvo «discípulos» para ⲙⲁⲑⲏⲧⲏⲥ por coherencia con el registro cristiano del texto y con la tradición de traducción del término.
  - Se evitó «SEÑOR» o terminología eclesiástica no respaldada por el original, dado que el dicho no contiene vocabulario divino explícito.
  - Se usó «ustedes» por neutralidad latinoamericana y para reflejar el plural enfático del original.
