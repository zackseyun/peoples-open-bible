  glossary_alignment: No hay términos teológicos sensibles en este versículo. La revisión se centra en fidelidad léxica y claridad idiomática. Se mantiene «Hebrón», «tranca» y el modismo espacial «enfrente de Hebrón» con nota alternativa adecuada.
