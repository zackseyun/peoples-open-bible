translation:
  language: es
  text: hasta que llegó el Anciano de Días, y el juicio fue dado a los santos[a] del Altísimo, y llegó el tiempo[c], y los santos[b] tomaron posesión del reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el juicio fue dado para los santos del Altísimo». El arameo permite entender la preposición tanto en sentido beneficiario («en favor de») como de complemento indirecto («a»).
    reason: alternative_reading
  - marker: b
    text: O «los santos del Altísimo».
    reason: lexical_alternative
  - marker: c
    text: O «los santos poseyeron el reino».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד דִּי
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - hasta el momento en que
  lexicon: HALOT
  rationale: La secuencia marca el límite temporal de la opresión anterior; «hasta que» expresa con naturalidad esa función en español y conserva el valor conjuntivo temporal del arameo.
- source_word: אֲתָה
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - se presentó
  lexicon: HALOT
  rationale: El verbo comunica llegada/arribo. «Llegó» es idiomático en español y mantiene el movimiento narrativo sin añadir interpretación.
- source_word: עַתִּיק יוֹמַיָּא
  english_pob_choice: the Ancient of Days
  chosen_spanish: el Anciano de Días
  alternatives_spanish:
  - el Antiguo de Días
  - el Anciano de los Días
  lexicon: HALOT
  rationale: Es el título tradicional y fiel al arameo en Daniel 7. «Anciano de Días» conserva la imagen de antigüedad venerable sin paráfrasis.
- source_word: וְדִינָא יְהִב
  english_pob_choice: and judgment was given
  chosen_spanish: y el juicio fue dado
  alternatives_spanish:
  - y la sentencia fue dada
  - y se dio juicio
  lexicon: HALOT
  rationale: דִּין puede abarcar juicio/sentencia/decisión judicial. «Juicio» mantiene el sentido forense; la pasiva en español reproduce bien la forma del arameo.
- source_word: לְקַדִּישֵׁי עֶלְיוֹנִין
  english_pob_choice: to the saints of the Most High
  chosen_spanish: a los santos del Altísimo
  alternatives_spanish:
  - para los santos del Altísimo
  - a los santos del Dios Altísimo
  - 'a los santos del Altísimo [o: los santos/los santos del Altísimo]'
  lexicon: HALOT
  rationale: «Santos» sigue la decisión inglesa para קַדִּישִׁין y es un término estable en español bíblico. El dativo «a» refleja de manera directa el complemento del arameo, aunque el contexto también permite matiz benefactivo.
- source_word: וְזִמְנָא מְטָה
  english_pob_choice: and the time arrived
  chosen_spanish: y llegó el tiempo
  alternatives_spanish:
  - y llegó el momento
  - y llegó el tiempo señalado
  lexicon: HALOT
  rationale: La frase señala la llegada del momento decisivo. «Llegó el tiempo» es conciso, natural y suficientemente cercano al arameo; «tiempo señalado» sería una explicitación no obligatoria.
- source_word: וּמַלְכוּתָא
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el dominio real
  - la realeza
  lexicon: HALOT
  rationale: En Daniel 7 el sustantivo se entiende de forma natural como reino; «reino» es la equivalencia más clara y estable en español para este contexto.
- source_word: הֶחֱסִנוּ
  english_pob_choice: took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - poseyeron
  - recibieron posesión de
  lexicon: HALOT
  rationale: El verbo comunica la idea de tomar/poseer. «Tomaron posesión de» hace explícito el cambio efectivo a la posesión del reino, como en la lectura inglesa.
- source_word: קַדִּישִׁין
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos del Altísimo
  - los seres santos
  lexicon: HALOT
  rationale: Se mantiene la designación breve y coherente para el pueblo santo de Dios, sin restringirla más de lo que el texto permite.
theological_decisions:
- issue: Sentido del complemento de לְ en וְדִינָא יְהִב לְקַדִּישֵׁי עֶלְיוֹנִין
  english_pob_reading: judgment was given to the saints of the Most High
  chosen_spanish_reading: el juicio fue dado a los santos del Altísimo
  alternative_spanish_readings:
  - el juicio fue dado para los santos del Altísimo
  - el juicio fue dado en favor de los santos del Altísimo
  rationale: El arameo permite entender el dativo como receptor directo o con matiz benefactivo. La forma elegida conserva la lectura directa de la edición inglesa revisada, sin eliminar la posible idea de vindicación en favor del pueblo santo.
  doctrine_reference: Preservar la tensión exegética sin decidir más de lo que el texto exige
- issue: Referente de קַדִּישִׁין / קַדִּישֵׁי עֶלְיוֹנִין
  english_pob_reading: the saints of the Most High
  chosen_spanish_reading: los santos del Altísimo
  alternative_spanish_readings:
  - los santos
  - los santos del Altísimo
  - los santos del Altísimo / los santos
  rationale: Se conserva el término amplio «santos» para reflejar la designación del pueblo de Dios en Daniel, evitando una paráfrasis doctrinalmente más estrecha. «Del Altísimo» mantiene la conexión explícita con el título divino.
  doctrine_reference: Dentro de la ortodoxia histórica; no importar una identificación denominacional o escatológica no presente en el texto
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: se conserva «to the saints» como dativo directo en la cláusula judicial, mientras que las notas preservan la posibilidad beneficiaria («en favor de»). También se mantiene la equivalencia estable de «Anciano de Días», «santos» y «reino», sin introducir explicaciones ausentes del texto fuente.'
  spanish_consistency_notes:
  - Se mantiene «Altísimo» como traducción del título divino עֶלְיוֹנִין, en coherencia con el registro bíblico español.
  - Se usa «juicio» para דין por su fuerza forense y por su correspondencia con la lectura auditada en inglés.
  - Se conserva «santos» en lugar de «santos / santos del Altísimo» en el texto principal para no sobrecargar la línea, dejando la alternativa en nota.
  - La puntuación sigue el ritmo paratáctico del arameo con comas coordinadas y una secuencia final clara.
