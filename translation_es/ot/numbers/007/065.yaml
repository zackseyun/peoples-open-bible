translation:
  language: es
  text: 'y para el sacrificio de paz[a]: dos cabezas de ganado[b], cinco carneros, cinco machos cabríos y cinco corderos machos de un año. Esta fue la ofrenda de Abidán hijo de Gedeoní.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «sacrificio de comunión» u «ofrenda de bienestar» para «sacrificio de paz».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ganado bovino»; el hebreo usa un término colectivo que no precisa aquí toro u otro animal concreto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y para la ofrenda de
  - y como sacrificio de
  lexicon: HALOT
  rationale: El prefijo conjuntivo y la preposición introducen esta porción de la lista de ofrendas; en español, 'para el sacrificio de' conserva la función introductoria y el valor cultual de זֶבַח sin forzar una paráfrasis.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: '''Ofrendas de paz'' sigue de cerca la decisión inglesa tradicional del POB, pero expresada en español natural. Se conserva el término sacrificial establecido sin sustituirlo por una glosa menos conocida en el texto principal.'
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos cabezas de ganado
  alternatives_spanish:
  - dos reses
  - dos toros
  lexicon: HALOT
  rationale: בָּקָר es un término colectivo para ganado bovino. 'Cabezas de ganado' mantiene el sentido colectivo y evita precisar sexo o función animal que el hebreo no explicita.
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco machos de oveja
  lexicon: HALOT
  rationale: En español, 'carneros' comunica con naturalidad el animal adulto macho que corresponde a אֵילִם. Es más idiomático que una perífrasis y conserva precisión sacrificial.
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabritos machos
  - cinco cabras machos
  lexicon: HALOT
  rationale: עַתּוּדִים designa machos cabríos; 'machos cabríos' es la forma más directa y precisa en español bíblico contemporáneo, preservando el rasgo sexual explícito del hebreo.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five male lambs a year old
  chosen_spanish: cinco corderos macho de un año
  alternatives_spanish:
  - cinco corderos de un año
  - cinco corderos machos de un año
  lexicon: HALOT
  rationale: '''Corderos macho de un año'' conserva tanto la edad ritual como la distinción sexual que el inglés POB explicitó. Se evita una construcción más pesada como ''en su primer año'' porque el hebreo usa la fórmula idiomática de edad.'
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Ésta fue la ofrenda de
  - Esta es la ofrenda de
  lexicon: HALOT
  rationale: La fórmula conclusiva se vierte en pasado, como en la traducción inglesa POB, porque funciona como resumen narrativo del registro de ofrendas. 'Ofrenda' reproduce קָרְבָּן en este contexto sin introducir un término eclesiástico ajeno.
- source_word: אֲבִידָן בֶּן גִּדְעֹנִי
  english_pob_choice: Abidan son of Gideoni
  chosen_spanish: Abidán hijo de Guidoní
  alternatives_spanish:
  - Abidán el hijo de Guidoní
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. 'Hijo de' reproduce la relación patronímica de forma natural en español, y 'Guidoní' conserva la forma del nombre propio sin adaptarlo a una tradición denominacional.
theological_decisions:
- issue: הַשְּׁלָמִים / sacrificial category
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: No se suaviza el término cultual ni se lo reemplaza por una formulación devocional. 'Ofrendas de paz' mantiene la categoría sacrificial heredada por el POB, mientras que las alternativas se reservan como notas por su alcance semántico más amplio.
  doctrine_reference: Levítico 3; Números 7:17, 23, 29, etc.
- issue: Formula of summary offering statement
  english_pob_reading: This was the offering of Abidan son of Gideoni.
  chosen_spanish_reading: Esta fue la ofrenda de Abidán hijo de Guidoní.
  alternative_spanish_readings:
  - Esta es la ofrenda de Abidán hijo de Guidoní.
  rationale: Se conserva el valor de cierre narrativo del registro, sin convertir la frase en una declaración litúrgica o presente atemporal. La lectura refleja la función contable del versículo dentro del capítulo.
  doctrine_reference: Números 7 (registro de ofrendas de los jefes de Israel)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo cruzado marcó alta concordancia; por eso esta propuesta sigue de cerca la estructura y las decisiones léxicas auditadas del POB en inglés, ajustándolas a un español natural y transparente.
  spanish_consistency_notes:
  - Se mantiene «ofrenda» para קָרְבָּן en la fórmula final, coherente con el uso sacrificial del capítulo.
  - Se usa «ofrendas de paz» en el texto principal y se documentan las alternativas semánticas en nota.
  - Se conserva la distinción de sexo y edad de los animales sacrificiales donde el hebreo la explicita.
  - Los nombres propios siguen transliteración consistente y no se traduce el patronímico con otras fórmulas eclesiásticas.
