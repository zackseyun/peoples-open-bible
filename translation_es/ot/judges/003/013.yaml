translation:
  language: es
  text: Él reunió consigo a los amonitas y a Amalec[b], y fue e hirió a Israel, y tomaron posesión de la Ciudad de las Palmeras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, probablemente Jericó; compárese Deuteronomio 34:3 y 2 Crónicas 28:15.
    reason: cross_reference
  - marker: b
    text: O «los amalecitas». El hebreo usa «Amalec» como nombre colectivo del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף אֵלָיו
  english_pob_choice: He gathered to himself
  chosen_spanish: Él reunió a
  alternatives_spanish:
  - Él reunió para sí
  - Él juntó a su lado
  lexicon: HALOT
  rationale: אָסַף con אֵלָיו expresa reunir personas bajo la propia iniciativa o liderazgo. En español, "reunió a" conserva la acción de convocar y juntar sin hacer la frase extraña. El complemento reflexivo implícito queda sobreentendido por el contexto.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - los amonitas
  lexicon: HALOT
  rationale: El etnónimo natural en español es "amonitas". "Hijos de Amón" sería más literal, pero menos idiomático aquí.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - los amalecitas
  - Amalec
  lexicon: HALOT
  rationale: La forma hebrea funciona como nombre colectivo del pueblo. "Amalec" preserva la forma del texto fuente y deja intacta la tensión entre nombre propio y designación grupal; la nota explica la alternativa colectiva.
- source_word: וַיֵּלֶךְ
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - marchó
  - se fue
  lexicon: HALOT
  rationale: הלך es el verbo simple de ir. "Fue" reproduce la secuencia narrativa con naturalidad en español sin añadir matiz militar no explicitado por el verbo.
- source_word: וַיַּךְ אֶת יִשְׂרָאֵל
  english_pob_choice: struck Israel
  chosen_spanish: hirió a Israel
  alternatives_spanish:
  - golpeó a Israel
  - venció a Israel
  lexicon: HALOT
  rationale: נכה suele significar "golpear/herir/smite". "Hirió" mantiene la fuerza violenta del verbo y evita volverlo demasiado interpretativo como "venció".
- source_word: וַיִּירְשׁוּ
  english_pob_choice: they took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - poseyeron
  - ocuparon
  lexicon: HALOT
  rationale: ירשׁ expresa tomar posesión como resultado de conquista o despojo. "Tomaron posesión de" comunica bien ese valor en español y conserva el sujeto plural, tal como en el hebreo.
- source_word: עִיר הַתְּמָרִים
  english_pob_choice: the City of Palms
  chosen_spanish: la Ciudad de las Palmeras
  alternatives_spanish:
  - la ciudad de las palmeras
  - la Ciudad de las Palmeras
  lexicon: HALOT
  rationale: Se conserva el título descriptivo como nombre de lugar. En español, "Palmeras" da una frase más natural y mantiene la imagen botánica del hebreo; la mayúscula señala el topónimo.
theological_decisions:
- issue: Identificación de עִיר הַתְּמָרִים
  english_pob_reading: Render as 'the City of Palms' in the main text without substituting 'Jericho.'
  chosen_spanish_reading: Mantener "la Ciudad de las Palmeras" en el texto principal, sin sustituirlo por "Jericó".
  alternative_spanish_readings:
  - Jericó
  rationale: El hebreo presenta un título descriptivo, no el nombre explícito. Para respetar la primacía del texto fuente, se conserva el título en el cuerpo y se documenta la identificación probable en nota.
  doctrine_reference: Translation philosophy §1 (primacía del texto fuente y transparencia del razonamiento)
- issue: Valor colectivo de עֲמָלֵק
  english_pob_reading: Or 'the Amalekites.' The Hebrew uses 'Amalek' as a collective name for the people group.
  chosen_spanish_reading: Conservar "Amalec" en el texto principal y anotar la alternativa colectiva "los amalecitas".
  alternative_spanish_readings:
  - los amalecitas
  rationale: 'El POB inglés preserva la forma colectiva hebrea y no la sustituye automáticamente por el etnónimo. En español conviene mantener esa misma tensión: el texto principal retiene "Amalec" y la nota ofrece la equivalencia grupal para claridad.'
  doctrine_reference: Translation philosophy §1 (primacía del texto fuente sobre la tradición de traducción)
translation_notes:
  revision_awareness: 'El contexto inglés indica alta concordancia y sin revisiones aplicadas; por tanto, el borrador español sigue de cerca la lectura aprobada y conserva las mismas decisiones clave: nombre colectivo ''Amalec'', verbo narrativo simple para הלך, y el topónimo descriptivo ''Ciudad de las Palmeras'' con nota de identificación probable.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de nombres colectivos y etnónimos de forma coherente con el POB inglés.
  - Se evita sustituir el topónimo descriptivo por un nombre tradicional en el texto principal.
  - '"Hirió" se usa como equivalente narrativo de נכה, preservando el matiz de golpe/ataque sin sobrerinterpretación.'
  - La mayúscula en "Ciudad de las Palmeras" indica topónimo sin alterar el contenido léxico.
