    text: Or 'leader' for 'chief'; Hebrew נָשִׂיא can denote a recognized leader or prince.
    reason: lexical_alternative
  - marker: b
    text: Literally 'father's house,' a kinship term for an ancestral household or clan-unit.
    reason: cultural_note
