translation:
  language: es
  text: 'Y le dijo: «El corazón y el hígado: si un demonio o un espíritu maligno perturba a alguien, haz humear[a] estas cosas delante de un hombre o una mujer, y ya no será perturbado[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “quema estas cosas” — el verbo griego se refiere a hacer que estos órganos produzcan humo mediante el fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - órgano interior
  - mente
  lexicon: BDAG
  rationale: Aquí καρδία se refiere literalmente al órgano del pez, en paralelo con el hígado, no al centro metafórico de emociones o pensamiento. En español, “corazón” conserva la correspondencia anatómica natural.
- source_word: ἧπαρ
  english_pob_choice: liver
  chosen_spanish: hígado
  alternatives_spanish:
  - órgano visceral
  lexicon: BDAG
  rationale: Sentido anatómico literal; el pasaje enumera órganos del pez para un uso ritual concreto.
- source_word: ἐάν τινα ὀχλῇ
  english_pob_choice: if ... troubles anyone
  chosen_spanish: si ... perturba a alguien
  alternatives_spanish:
  - si ... aflige a alguien
  - si ... molesta a alguien
  lexicon: BDAG
  rationale: ὀχλέω expresa causar inquietud, molestia o aflicción. “Perturba” transmite bien el efecto de opresión o alteración sin sobreinterpretar el matiz.
- source_word: δαιμόνιον
  english_pob_choice: demon
  chosen_spanish: demonio
  alternatives_spanish:
  - espíritu maligno
  lexicon: BDAG
  rationale: “Demonio” preserva la distinción que el griego establece entre δαιμόνιον y πνεῦμα πονηρόν.
- source_word: πνεῦμα πονηρόν
  english_pob_choice: evil spirit
  chosen_spanish: espíritu maligno
  alternatives_spanish:
  - espíritu malo
  - espíritu perverso
  lexicon: BDAG
  rationale: La frase griega es una designación distinta del δαιμόνιον anterior; “espíritu maligno” conserva esa diferencia sin suavizarla.
- source_word: ταῦτα δὲ καπνίσαι
  english_pob_choice: burn these as smoke
  chosen_spanish: quemen estos como humo
  alternatives_spanish:
  - hagan humear estos
  - quemen estos
  lexicon: BDAG
  rationale: καπνίζω/καπνίσαι indica producir humo mediante el acto de quemar. “Quemen ... como humo” sigue la acción descrita y su finalidad ritual; la nota explica la posibilidad de entender “hagan humear”.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: “Delante de” es natural en español y mantiene el valor espacial/ritual de la preposición.
- source_word: ἀνθρώπου ἢ γυναικός
  english_pob_choice: a man or a woman
  chosen_spanish: un hombre o de una mujer
  alternatives_spanish:
  - una persona, sea hombre o mujer
  lexicon: BDAG
  rationale: El griego menciona explícitamente ambos sexos; la redacción española conserva esa precisión.
- source_word: οὐ μηκέτι ὀχληθῇ
  english_pob_choice: will no longer be troubled
  chosen_spanish: ya no será perturbado
  alternatives_spanish:
  - no será molestado nunca más
  - ya no será afligido
  lexicon: BDAG
  rationale: La negación fuerte expresa cese completo de la perturbación. “Perturbado” mantiene vínculo verbal con ὀχλῇ y suena natural en español contemporáneo.
theological_decisions:
- issue: Naturaleza sobrenatural de la cura propuesta
  english_pob_reading: Render the instruction straightforwardly as the narrative's remedy for demonic or spirit oppression, without naturalizing it.
  chosen_spanish_reading: Presentar la instrucción como remedio narrativo contra la opresión de un demonio o un espíritu maligno, sin convertirla en símbolo médico o folclórico.
  alternative_spanish_readings:
  - Interpretarla como una receta puramente simbólica o medicinal
  - Suavizar el lenguaje sobrenatural
  rationale: El griego presenta de forma directa tanto la entidad espiritual como el remedio ritual. La traducción debe reflejar el mundo conceptual del texto sin introducir escepticismo moderno.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Distinción entre δαιμόνιον y πνεῦμα πονηρόν
  english_pob_reading: Preserve the distinction between 'demon' and 'evil spirit' in the main text.
  chosen_spanish_reading: Conservar la distinción entre “demonio” y “espíritu maligno” en el texto principal.
  alternative_spanish_readings:
  - Unificar ambos como 'espíritu malo'
  - Unificar ambos como 'demonio'
  rationale: El griego usa dos expresiones distintas; mantenerlas en español evita borrar una tensión o distinción léxica documentada.
  doctrine_reference: Translation philosophy §§2, 6
- issue: Expresión de género en ἀνθρώπου ἢ γυναικός
  english_pob_reading: Preserve the explicit 'man or a woman' wording in the main text.
  chosen_spanish_reading: Conservar “un hombre o de una mujer” en el texto principal.
  alternative_spanish_readings:
  - una persona, sea hombre o mujer
  rationale: El texto fuente distingue explícitamente varón y mujer; la versión española mantiene esa precisión, aunque la construcción requiera leve ajuste preposicional para fluidez.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; el pasaje fue aprobado con alta concordancia y no presenta correcciones pendientes. La presente redacción española sigue ese estado estable, procurando conservar la distinción léxica entre καρδία/ἧπαρ, δαιμόνιον/πνεῦμα πονηρόν y la negación fuerte de οὐ μηκέτι.
  spanish_consistency_notes:
  - Se emplea “demonio” para δαιμόνιον y “espíritu maligno” para πνεῦμα πονηρόν, manteniendo la distinción del griego.
  - Se evita “SEÑOR” u otra terminología de sustitución porque el versículo no contiene el nombre divino.
  - Se traduce καπνίσαι con una fórmula que conserva la imagen de producir humo por quemado; la nota recoge la alternativa literal.
  - La frase final usa voz pasiva impersonal en español (“será perturbado”) para reflejar el pasivo griego con naturalidad.
  - La mención de “un hombre o de una mujer” conserva el binario explícito del original, aunque con ajuste preposicional idiomático en español.
