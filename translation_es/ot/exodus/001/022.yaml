review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Faraón da un mandato a todo su pueblo, ordena arrojar a los varones recién nacidos al Nilo y dejar con vida a las niñas. Sin embargo, no preserva bien la documentación del audit trail en dos puntos: el anclaje de la nota sobre ''el río'' está puesto en ''pueblo'' en vez de en ''Nilo'', y la tercera nota inglesa trata la conjunción ו como contraste (''pero'') mientras el borrador español la usa para repetir la identificación del Nilo. Además, el hebreo singular colectivo כָּל הַבֵּן queda algo menos natural en español con ''Todo hijo'' en este contexto de recién nacidos; ''Todo niño varón'' comunica mejor el referente sin apartarse del sentido documentado, especialmente porque la nota inglesa ya justifica esa opción contextual.'
  spanish_quality_summary: El español es claro y digno, pero hay pequeños problemas de naturalidad y de aparato de notas. 'Todo hijo que nazca' suena menos idiomático en este contexto que 'Todo niño varón que nazca' o 'Todo hijo varón que nazca'. También conviene reflejar el contraste con 'pero' en español principal, ya que el propio POB inglés lo documentó como decisión de sentido contextual; en español eso mejora notablemente la legibilidad. La puntuación y el registro general son adecuados.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los puntos relevantes son léxicos/contextuales: יְאֹר debe ir como ''Nilo'' en el texto con nota sobre el literal ''río''; בֵּן admite nota alternativa si se opta por ''niño varón''; וְ antes de ''toda hija'' conviene representarlo como ''pero'' por contraste contextual, conforme al audit trail.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a 'pueblo', pero su contenido corresponde a 'Nilo'/'el río'.
    rationale: Esto desalinéa el aparato crítico con el texto fuente y puede confundir al lector. La nota debe aparecer junto al término que traduce הַיְאֹרָה.
  - severity: medium
    issue: La nota [c] no preserva la decisión auditada sobre la conjunción contrastiva.
    rationale: El POB inglés documenta que וְכָל הַבַּת es literalmente 'y toda hija', pero se traduce 'but every daughter' para mostrar el contraste. La nota española actual repite la aclaración sobre el Nilo en vez de explicar ese contraste.
  - severity: medium
    issue: '''Todo hijo que nazca'' es menos natural y algo ambiguo en español para referirse a recién nacidos varones en general.'
    rationale: Aunque 'hijo' es formalmente cercano a בֵּן, en español puede sugerir relación filial individual más que categoría de varón recién nacido. Dado que el audit trail ya permite 'boy/male child' como alternativa contextual, 'Todo niño varón' mejora claridad sin pérdida significativa.
  - severity: low
    issue: El uso de 'y toda hija' en el texto principal es defendible, pero menos fiel a la decisión de sentido del POB auditado y menos idiomático en español.
    rationale: El hebreo tiene conjunción simple, pero en contexto funciona contrastivamente. 'Pero toda hija' comunica mejor la oposición del decreto.
  revised_spanish_text: 'Entonces el faraón mandó a todo su pueblo, diciendo: «Todo niño varón[a] que nazca, arrójenlo al Nilo[b]; pero a toda hija déjenla vivir[c]».'
  revised_footnotes:
