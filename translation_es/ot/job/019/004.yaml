translation:
  language: es
  text: Y aun si en verdad me he descarriado[a], mi error se queda conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «mi error pasa la noche conmigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף
  english_pob_choice: And even if
  chosen_spanish: Y aun si
  alternatives_spanish:
  - Y aun cuando
  - Y aun si en verdad
  lexicon: HALOT
  rationale: La combinación hebrea introduce una concesión con énfasis. «Y aun si» reproduce bien ese giro concesivo en español natural, manteniendo el enlace con lo anterior sin sonar forzado.
- source_word: אָמְנָם
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - ciertamente
  - realmente
  - de veras
  lexicon: HALOT
  rationale: El adverbio intensifica la concesión. «En verdad» conserva esa fuerza afirmativa con registro digno y claro en español contemporáneo.
- source_word: שָׁגִיתִי
  english_pob_choice: have gone astray
  chosen_spanish: me he descarriado
  alternatives_spanish:
  - he errado
  - me he equivocado
  - he pecado
  lexicon: HALOT
  rationale: El verbo expresa la idea de desviarse o errar. «Descarriado» conserva la imagen de apartarse del camino, más cercana al matiz del hebreo que un abstracto «he errado». «He pecado» sería demasiado interpretativo para este contexto.
- source_word: אִתִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - en mí
  - a mi lado
  - sobre mí
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal indica posesión o permanencia junto a la persona. «Conmigo» es la forma natural en español y mantiene la idea de que el asunto permanece ligado a Job.
- source_word: תָּלִין
  english_pob_choice: remains
  chosen_spanish: se queda
  alternatives_spanish:
  - permanece
  - se aloja
  - pasa la noche
  lexicon: HALOT
  rationale: Aunque el verbo literalmente puede significar «pasar la noche / alojarse», aquí funciona de modo idiomático como permanencia. «Se queda» comunica con claridad la idea de que el error no se va de él, sin perder el trasfondo lexical.
- source_word: מְשׁוּגָתִי
  english_pob_choice: my error
  chosen_spanish: mi error
  alternatives_spanish:
  - mi extravío
  - mi desviación
  - mi pecado
  lexicon: HALOT
  rationale: El sustantivo designa el extravío o error. «Mi error» es una equivalencia directa, sobria y fiel. «Mi pecado» sobredetermina la culpa moral, y «mi extravío» es posible pero algo más marcado metafóricamente.
translation_notes:
  revision_awareness: Se siguió el sentido concesivo-emphático del hebreo y la decisión auditada del POB inglés de evitar sobreinterpretar שָׁגִיתִי como «pecar». No se detectaron revisiones adicionales en el expediente inglés; el texto fue vertido con equivalencia óptima y sin cambios sustanciales respecto del análisis fuente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este verso no contiene el nombre divino.
  - Se evitó «pecado» para שָׁגִיתִי / מְשׁוּגָתִי, respetando la tensión entre error y culpa moral documentada por el POB inglés.
  - La nota al pie conserva la alternativa lexical del hebreo para תָּלִין sin imponerla en el texto principal.
