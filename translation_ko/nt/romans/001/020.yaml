source:
  edition: SBLGNT
  text: τὰ γὰρ ἀόρατα αὐτοῦ ἀπὸ κτίσεως κόσμου τοῖς ποιήμασιν νοούμενα καθορᾶται, ἥ τε ἀΐδιος αὐτοῦ δύναμις καὶ θειότης, εἰς τὸ εἶναι αὐτοὺς ἀναπολογήτους,
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/020.yaml
  text: For his invisible attributes[a], that is, his eternal power and divinity, have been clearly seen since the creation of the world, being understood through what has been made[b], so that they are without excuse.
  footnotes:
  - marker: a
    text: Or “his invisible qualities.”
    reason: lexical_alternative
  - marker: b
    text: Or “divine nature”; the Greek word here is θειότης, not the stronger term θεότης.
    reason: lexical_alternative
translation:
  language: ko
  text: 그분의 보이지 않는 속성들[a], 곧 그분의 영원한 능력과 신성[b]은 세상 창조 이래로 만들어진 것들을 통하여 깨달아져 분명히 보이게 되었으니, 그리하여 그들은 변명할 수 없게 되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「보이지 않는 자질들」.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 θειότης는 「신적 본성」을 가리키며, 더 강한 어휘인 θεότης와 구별된다.
    reason: lexical_alternative
