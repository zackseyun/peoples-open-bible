lexical_decisions:
- source_word: ⲡⲱϣⲥ
  chosen: sound
  alternatives:
  - voice
  - call
  lexicon: Crum, Coptic Dictionary; Layton, Coptic in 20 Lessons (glosses of ⲡⲱϣⲥ)
  rationale: ⲡⲱϣⲥ commonly denotes sound/voice. “Sound” preserves the poem’s name/sound
    motif; “voice” is a viable alternative.
- source_word: ⲣⲁⲛ / ⲡⲁⲣⲁⲛ
  chosen: my name
  alternatives: []
  lexicon: Crum; general Sahidic possessive morphology
  rationale: ⲣⲁⲛ = name; ⲡⲁ- marks 1sg possessive. Plain sense is “my name.”
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  chosen: it is I
  alternatives:
  - I am indeed
  lexicon: Layton, clause emphasis particles
  rationale: Emphatic copular assertion; “it is I” keeps the punch and cadence.
- source_word: ⲥⲕⲁⲕ ⲉⲃⲟⲗ (as in ⲧⲁϣⲕⲁⲕ ⲉⲃⲟⲗ)
  chosen: undefiled
  alternatives:
  - sinless
  - pure
  - stainless
  lexicon: Crum s.v. ⲥⲕⲁⲕ; Bentley Layton’s glosses “pure, undefiled, free from stain/guilt”
  rationale: Conveys moral/ritual cleanliness without over-specifying doctrinal “sinless.”
- source_word: ⲉⲧⲥⲱⲧⲙ̄
  chosen: the one who is heard
  alternatives:
  - what is heard
  - the one being heard
  lexicon: Crum s.v. ⲥⲱⲧⲙ̄; relative ⲉⲧ- participle
  rationale: Relative participle + verb of hearing; personalizes the voice as subject.
- source_word: ⲧⲉⲧⲛⲥⲱⲧⲙ ⲉⲣⲟⲓ
  chosen: you hear me
  alternatives:
  - you listen to me
  lexicon: Crum; basic transitive use of ⲥⲱⲧⲙ with preposition ⲉⲣⲟ-
  rationale: Direct 2nd-plural address fits the poem’s rhetoric.
- source_word: ⲙⲟⲩⲧⲉ ⲉⲣⲟⲓ
  chosen: call me
  alternatives:
  - name me
  lexicon: Crum s.v. ⲙⲟⲩⲧⲉ
  rationale: Verb means ‘call (by name)’. “Call” reads smoothly with “sound,” while
    “name” is an acceptable alternative.
- source_word: ⲟⲩⲡⲱϣⲥ (reconstructed)
  chosen: a sound
  alternatives:
  - a voice
  lexicon: Crum s.v. ⲡⲱϣⲥ
  rationale: The fragment ⲟⲩⲡ… likely continues ⲟⲩⲡⲱϣⲥ. Chosen for consistency with
    the earlier “sound.”
parallelism_check: 'Maintains the triad of assertions and address: (1) identification
  with the sound/name (“The sound of my name—it is I.”), (2) dual first‑person predicates
  (“I am undefiled, and I am the one who is heard.”), and (3) second‑person parallel
  imperatives/indicatives (“You hear me …; you call me …”). The repeated “I am” structure
  is preserved; no contradictory pair here is smoothed or merged.'
voice_check: The speaker’s self-revelatory, first‑person voice is kept emphatic (“it
  is I … I am … I am …”). The direct address to the audience is preserved with second‑person
  plural (“You hear me … you call me …”). The register remains sharp and oracular,
  avoiding domestication.
