review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: Aarón relata que pidió el oro, se lo dieron, lo arrojó al fuego, y el becerro salió. Se preserva la evasiva sin glosa interpretativa. La nota alternativa también refleja adecuadamente la literalidad de לְמִי זָהָב הִתְפָּרָקוּ.'
  spanish_quality_summary: El texto es claro y natural en español bíblico moderno, pero «quíteselo» no concuerda bien con el plural imperativo hebreo הִתְפָּרָקוּ dirigido a varios oyentes. Debe decir «quítenselo» o equivalente plural. Además, en la nota, «¿a quién le pertenece oro?» suena menos natural que «¿quién tiene oro?» como alternativa literal-explicativa, aunque la nota ya lo incluye.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Becerro» para עגל es adecuado y no añade «de oro», conforme a la evidencia. El registro general encaja con el estilo proyectado.
  issues:
  - severity: medium
    issue: Imperativo singular en «quíteselo» donde el hebreo tiene plural
    rationale: 'הִתְפָּרָקוּ es 2ª persona plural. Como Aarón habla a un grupo, en español debe mantenerse el plural exhortativo: «quítenselo» (o «quítense eso / quítenlo» según formulación). El singular actual puede entenderse distributivamente, pero debilita la concordancia gramatical y suena menos fiel.'
  - severity: low
    issue: La nota puede afinar la literalidad sin sonar extraña
    rationale: La explicación «¿a quién le pertenece oro?» no es incorrecta como apoyo literal, pero en español eclesial resulta algo dura. Conviene mantener la alternativa principal ya dada y dejar la literalidad como «A quien le sea oro / a quien haya oro» sería peor; por eso basta una leve normalización de la nota sin perder el punto léxico.
  revised_spanish_text: 'Y les dije[a]: «El que tenga oro, quítenselo». Ellos me lo dieron, y yo lo arrojé al fuego, y salió este becerro.'
  revised_footnotes:
  - marker: a
    text: 'O: «¿Quién tiene oro? Quítenselo / arránquenselo». El hebreo literalmente dice: «¿A quién le pertenece oro? Despréndanlo / quítenlo».'
    reason: lexical_alternative
  revision_rationale: Se corrige «quíteselo» a «quítenselo» para reflejar la segunda persona plural del hebreo y mejorar la fidelidad gramatical. Se retoca levemente la nota para mantener consistencia con esa forma plural y conservar la alternativa léxica documentada, sin cambiar el sentido general del versículo.
