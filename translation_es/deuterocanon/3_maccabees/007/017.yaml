translation:
  language: es
  text: Cuando llegaron a Ptolemaida[a], que se llama Portadora de rosas por la naturaleza del lugar, donde la flota los esperó durante siete días por decisión común,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que lleva rosas». El epíteto griego ῥοδοφόρον es un título descriptivo para Ptolemaida, vinculado al carácter distintivo del lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραγενηθέντες
  english_pob_choice: When they arrived
  chosen_spanish: Cuando llegaron
  alternatives_spanish:
  - Al llegar
  - Habiendo llegado
  lexicon: BDAG
  rationale: El participio aoristo introduce la siguiente acción en sentido temporal. «Cuando llegaron» conserva esa función y suena natural en español.
- source_word: Πτολεμαΐδα
  english_pob_choice: Ptolemais
  chosen_spanish: Ptolemaida
  alternatives_spanish:
  - Ptolemais
  - Ptolemaide
  lexicon: LSJ
  rationale: Se mantiene el nombre propio transliterado en forma clara para español. «Ptolemaida» es una adaptación legible y evita la rareza de la forma latina/inglesa.
- source_word: τὴν ὀνομαζομένην
  english_pob_choice: which is called
  chosen_spanish: que se llama
  alternatives_spanish:
  - que es llamada
  - llamada
  lexicon: BDAG
  rationale: La relativa expresa de modo directo la designación del lugar. «Que se llama» conserva la voz media/pasiva sin forzar una construcción poco natural.
- source_word: διὰ τὴν τοῦ τόπου ἰδιότητα
  english_pob_choice: because of the nature of the place
  chosen_spanish: por la naturaleza del lugar
  alternatives_spanish:
  - por el carácter del lugar
  - por la peculiaridad del lugar
  lexicon: LSJ
  rationale: ἰδιότης aquí apunta a una cualidad distintiva del lugar. «Naturaleza del lugar» sigue la revisión inglesa más reciente y mantiene la idea de cualidad propia sin sobreexplicar.
- source_word: ῥοδοφόρον
  english_pob_choice: Rose-bearing
  chosen_spanish: Portadora de rosas
  alternatives_spanish:
  - que lleva rosas
  - portadora de rosas
  lexicon: LSJ
  rationale: El adjetivo compuesto se conserva de forma transparente en español. «Portadora de rosas» comunica el valor descriptivo del epíteto y mantiene la tensión entre sentido literal y honorífico.
- source_word: ἐν ᾗ
  english_pob_choice: where
  chosen_spanish: allí
  alternatives_spanish:
  - donde
  - en la cual
  lexicon: BDAG
  rationale: El antecedente es la ciudad; en español, «allí» evita la rigidez de una relativa pesada y mantiene la referencia locativa.
- source_word: προσέμεινεν
  english_pob_choice: waited for
  chosen_spanish: los esperó
  alternatives_spanish:
  - se quedó esperando a
  - esperó a
  lexicon: LSJ
  rationale: Con acusativo de persona, el verbo expresa esperar a alguien, no solo permanecer. «Los esperó» reproduce esa fuerza con naturalidad.
- source_word: ὁ στόλος
  english_pob_choice: the fleet
  chosen_spanish: la flota
  alternatives_spanish:
  - la armada
  - la expedición naval
  lexicon: LSJ
  rationale: «Flota» es el equivalente directo y más natural para στόλος en este contexto marítimo.
- source_word: κατὰ κοινὴν αὐτῶν βουλήν
  english_pob_choice: by their common decision
  chosen_spanish: por decisión común de ellos
  alternatives_spanish:
  - según su decisión común
  - por acuerdo común entre ellos
  lexicon: BDAG
  rationale: La frase indica un acuerdo deliberado compartido. «Por decisión común de ellos» conserva el matiz de resolución conjunta sin añadir contenido no explicitado.
- source_word: ἡμέρας ἑπτά
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: BDAG
  rationale: El acusativo expresa duración. «Durante siete días» lo comunica con claridad en español, manteniendo la duración temporal.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés, que prefirió «nature of the place» sobre «character of the place». En español se reflejó con «naturaleza del lugar» para mantener naturalidad y precisión.
  spanish_consistency_notes:
  - Se mantuvo un estilo sobrio y bíblico sin arcaísmos innecesarios.
  - Se tradujo el nombre propio como topónimo españolizado, pero se dejó la nota para preservar la alternativa más literal del epíteto.
  - Se evitó traducir mecánicamente desde el inglés cuando el español podía expresar mejor el matiz sintáctico del griego.
