translation:
  language: es
  text: 'Al rey Artajerjes, nuestro señor: tus siervos[a], Ratimo, el encargado de los asuntos presentados[b], y Samelio, el escriba, y el resto del consejo de ellos, y los que están en Celesiria y Fenicia[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres griegos Ratimo y Samelio corresponden aproximadamente a Rehum y Shimshai del paralelo masorético.
    reason: alternative_reading
  - marker: b
    text: La expresión griega ὁ τὰ προσπίπτοντα es idiomática y algo incierta; más literalmente, puede entenderse como «el que está sobre los asuntos presentados» o «el que atiende los asuntos llevados ante la autoridad».
    reason: lexical_alternative
  - marker: c
    text: Celesiria es el nombre geográfico histórico presente en el texto griego.
    reason: cultural_note
lexical_decisions:
- source_word: Βασιλεῖ Ἀρταξέρξῃ
  english_pob_choice: To King Artaxerxes
  chosen_spanish: Al rey Artajerjes
  alternatives_spanish:
  - A rey Artajerjes
  - Al rey Artajerjes, el rey
  lexicon: LSJ
  rationale: En español epistolar, la dative opening del griego se expresa de forma natural con una dirección en dativo preposicional. 'Al rey Artajerjes' conserva el orden solemne y la función de encabezado.
- source_word: κυρίῳ
  english_pob_choice: our lord
  chosen_spanish: nuestro señor
  alternatives_spanish:
  - el señor
  - mi señor
  lexicon: LSJ
  rationale: El griego funciona como título cortesano dirigido al monarca. 'Nuestro señor' reproduce el tono deferente del saludo y evita diluirlo en un simple 'señor'.
- source_word: οἱ παῖδές σου
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: BDAG
  rationale: En el registro político-cortesano, παῖς designa subordinados al servicio del rey. 'Siervos' preserva la relación de subordinación sin imponer la fuerza léxica de 'esclavos' en un contexto diplomático.
- source_word: Ῥάθυμος
  english_pob_choice: Rathymus
  chosen_spanish: Ratimo
  alternatives_spanish:
  - Rátimo
  - Rehum
  lexicon: Transliteración del griego
  rationale: Se sigue la forma griega como texto base de 1 Esdras. En español, 'Ratimo' adapta fonéticamente Ῥάθυμος; se mantiene la nota de correspondencia aproximada con el paralelo masorético.
- source_word: ὁ τὰ προσπίπτοντα
  english_pob_choice: the one over records
  chosen_spanish: el encargado de los asuntos presentados
  alternatives_spanish:
  - el encargado de los registros
  - el que recibe los asuntos
  - el secretario de asuntos
  lexicon: LSJ
  rationale: La expresión es idiomática y literalmente alude a 'las cosas que se presentan'. Se evita 'registrador' o 'archivero' por sobreinterpretar; 'asuntos presentados' conserva la idea administrativa y la incertidumbre lexical.
- source_word: Σαμέλλιος
  english_pob_choice: Samellius
  chosen_spanish: Samelio
  alternatives_spanish:
  - Samelio
  - Shimshai
  lexicon: Transliteración del griego
  rationale: Se conserva la forma griega como base textual. En español, 'Samelio' mantiene la correspondencia sonora y la distinción frente al paralelo hebreo.
- source_word: ὁ γραμματεὺς
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: BDAG
  rationale: '''Escriba'' refleja bien la función administrativa del término y mantiene la relación lexical con el griego sin trasladarlo al registro moderno de ''secretario''.'
- source_word: οἱ ἐπίλοιποι τῆς βουλῆς αὐτῶν
  english_pob_choice: the rest of their council
  chosen_spanish: el resto de su consejo
  alternatives_spanish:
  - los demás miembros de su consejo
  - el resto de sus consejeros
  lexicon: LSJ
  rationale: βούλη denota un cuerpo deliberativo. 'Consejo' es el equivalente más natural en español y conserva el sentido colectivo del grupo.
- source_word: οἱ ἐν κοίλῃ Συρίᾳ καὶ Φοινίκῃ
  english_pob_choice: those in Coele-Syria and Phoenicia
  chosen_spanish: los que están en Celesiria y Fenicia
  alternatives_spanish:
  - los que están en Coelesiria y Fenicia
  - los de Siria Hoya y Fenicia
  lexicon: LSJ
  rationale: Se conserva el nombre geográfico histórico del texto griego. 'Celesiria' es una adaptación española de Coele-Syria y evita aplanar el topónimo a 'Siria'.
theological_decisions:
- issue: Tratamiento del título real κυρίῳ en un encabezado diplomático
  english_pob_reading: our lord
  chosen_spanish_reading: nuestro señor
  alternative_spanish_readings:
  - señor
  - mi señor
  rationale: No se trata de un título divino sino cortesano. Se conserva el matiz reverencial propio de la correspondencia oficial sin introducir terminología eclesiástica.
  doctrine_reference: Uso honorífico de κύριος en contexto político; no implica cristología ni identificación divina.
- issue: Correspondencia con el paralelo masorético para los nombres propios
  english_pob_reading: Greek Rathymus and Samellius correspond approximately to the MT parallel's Rehum and Shimshai.
  chosen_spanish_reading: Ratimo y Samelio, con correspondencia aproximada a Rehum y Shimshai en el paralelo hebreo.
  alternative_spanish_readings:
  - Rehum y Shimshai en el texto principal
  - Rátimo y Samelio sin nota paralela
  rationale: Se respeta la base griega del texto principal, pero se documenta la proximidad al testimonio paralelo hebreo para auditar la tradición onomástica.
  doctrine_reference: Prioridad del testimonio fuente primario con control comparativo del paralelo semítico.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete como ancla primaria, pero toma en cuenta el paralelo hebreo para los nombres propios y la auditoría inglesa reciente, que refinó la frase administrativa de Rathymus desde una interpretación demasiado cerrada ('recorder') hacia una formulación más literal y cauta. La versión española refleja esa cautela con 'el encargado de los asuntos presentados'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque aquí no aparece el tetragrámaton.
  - Se conserva 'Celesiria' como topónimo histórico, no como simple 'Siria'.
  - Se usa 'siervos' para παῖδες en correspondencia con el registro cortesano y no 'esclavos', porque el contexto es diplomático y no de servidumbre material.
  - Los nombres propios siguen la forma griega de 1 Esdras en el cuerpo principal; el paralelo hebreo queda documentado en nota.
