  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Siervos' para עַבְדֵי אֲבִימֶלֶךְ es contextualmente defendible según la justificación auditada. No aparecen términos teológicos sensibles del glosario global. 'Abimelec' y 'pozo de agua' están bien.
