translation:
  language: es
  text: 'Dije[a]: «Los días deberían hablar, y muchos años deberían dar a conocer la sabiduría.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pensé: “La gente de edad debería hablar, y la vejez debería dar a conocer la sabiduría.”» El hebreo usa «días» y «muchos años» metonímicamente para la edad avanzada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: Dije
  alternatives_spanish:
  - Pensé
  lexicon: HALOT
  rationale: El perfecto qal de 1ª singular de אמר normalmente se traduce con un verbo de decir. En el contexto, Eliú introduce una suposición previa; por eso «Dije» mantiene la relación formal con el verbo hebreo, mientras que «Pensé» expresa la interpretación contextual pero se aleja más del léxico base.
- source_word: יָמִים
  english_pob_choice: Days
  chosen_spanish: Los días
  alternatives_spanish:
  - La gente de edad
  - Los ancianos
  - La vejez
  lexicon: HALOT
  rationale: El hebreo dice literalmente «días». Aunque funciona metonímicamente por edad avanzada, conservar «Los días» preserva la imagen poética y la personificación del verso. Las opciones explicativas aclaran el sentido pero sustituyen la metáfora original.
- source_word: יְדַבֵּרוּ
  english_pob_choice: should speak
  chosen_spanish: deberían hablar
  alternatives_spanish:
  - hablarían
  - hablan
  lexicon: HALOT
  rationale: El imperfecto piel expresa aquí lo que Eliú consideraba apropiado o esperado; por eso «deberían hablar» reproduce mejor la fuerza normativa/expectativa que un simple futuro o presente.
- source_word: וְרֹב שָׁנִים
  english_pob_choice: many years
  chosen_spanish: muchos años
  alternatives_spanish:
  - una multitud de años
  - la abundancia de años
  lexicon: HALOT
  rationale: La frase constructa significa literalmente una abundancia o multiplicidad de años. «Muchos años» es la equivalencia española natural que conserva el paralelo poético con «los días».
- source_word: יֹדִיעוּ
  english_pob_choice: should make known
  chosen_spanish: deberían dar a conocer
  alternatives_spanish:
  - deberían hacer saber
  - deberían enseñar
  lexicon: HALOT
  rationale: El hiphil de ידע significa ‘hacer saber’ o ‘dar a conocer’. «Dar a conocer» mantiene la causalidad del verbo y suena natural en español; «enseñar» estrecha indebidamente el sentido.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  - lo sabio
  lexicon: HALOT
  rationale: El sustantivo es directo y abstracto. «La sabiduría» conserva el tema sapiencial del libro y el paralelismo con el hebreo sin añadir glosas interpretativas.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó confirmado como estable y en alto acuerdo con la auditoría inglesa y la comparación de revisores.'
  spanish_consistency_notes:
  - Se mantuvo la metáfora hebrea «días» en el texto principal, con nota alternativa para la lectura metonímica de edad avanzada.
  - «Deberían» reproduce la fuerza de expectativa/propriedad indicada en la auditoría inglesa para ambos verbos.
  - Se evitó traducir de forma eclesiástica tradicional; se conservó el paralelismo poético y la sintaxis breve del hebreo.
  - No se empleó «SEÑOR» ni terminología doctrinal ajena al versículo.
