translation:
  language: es
  text: 'Y en los tres días completos, ochenta mil fueron destruidos: cuarenta mil por manos violentas[a], y no menos que los que fueron masacrados fueron vendidos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «en las leyes de las manos», expresión oscura entendida aquí como muerte infligida por violencia o por manos humanas.
    reason: lexical_alternative
  - marker: b
    text: O, «fueron vendidos como esclavos»; el griego dice simplemente «fueron vendidos», con la esclavización implícita por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀκτὼ ... μυριάδες
  english_pob_choice: eighty thousand
  chosen_spanish: ochenta mil
  alternatives_spanish:
  - ocho miríadas
  lexicon: LSJ
  rationale: μυριάς designa diez mil; en español, el equivalente idiomático y natural es «mil» con el numeral correspondiente, por lo que ὀκτὼ μυριάδες se vierte como «ochenta mil».
- source_word: ἐν ταῖς πάσαις ἡμέραις τρισίν
  english_pob_choice: in the three whole days
  chosen_spanish: en los tres días completos
  alternatives_spanish:
  - durante los tres días
  - en todos los tres días
  lexicon: LSJ
  rationale: La frase subraya la totalidad del lapso de tres días. «Tres días completos» conserva esa fuerza de duración total sin sonar artificial en español.
- source_word: κατεφθάρησαν
  english_pob_choice: were destroyed
  chosen_spanish: fueron destruidos
  alternatives_spanish:
  - perecieron
  - fueron arruinados
  lexicon: LSJ
  rationale: En este contexto de matanza, el pasivo «fueron destruidos» comunica la pérdida violenta de vidas sin añadir más precisión que la que ofrece el griego.
- source_word: ἐν χειρῶν νόμοις
  english_pob_choice: by violent hands
  chosen_spanish: por manos violentas
  alternatives_spanish:
  - por la ley de las manos
  - en violencia mano a mano
  - por fuerza de armas
  lexicon: LSJ
  rationale: La expresión griega es oscura y, según el audit trail inglés, se entiende como muerte causada por agentes humanos o violencia de manos humanas. «Por manos violentas» sigue esa decisión y mantiene el matiz de agencia violenta.
- source_word: τῶν ἐσφαγμένων
  english_pob_choice: those who were slaughtered
  chosen_spanish: los asesinados
  alternatives_spanish:
  - los degollados
  - los que fueron sacrificados
  lexicon: LSJ
  rationale: σφάζω es un verbo fuerte de matar con violencia. «Los asesinados» es claro y sobrio en español; aunque pierde algo del matiz gráfico de «slaughtered», conserva el hecho de muerte violenta sin sobrecargar el registro.
- source_word: ἐπράθησαν
  english_pob_choice: were sold
  chosen_spanish: fueron vendidos
  alternatives_spanish:
  - fueron vendidos como esclavos
  - fueron puestos en venta
  lexicon: LSJ
  rationale: El griego dice simplemente «fueron vendidos». La esclavización se infiere del contexto, pero no está explícita en el verbo; por eso el texto principal mantiene la formulación simple.
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa al preferir una formulación más cercana a la agencia violenta implícita en ἐν χειρῶν νόμοις («por manos violentas») y conserva la sobriedad del verbo simple «fueron vendidos» sin explicitar esclavitud en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «ochenta mil» para ὀκτὼ μυριάδες, consistente con el tratamiento inglés de las μυριάδες como unidades de diez mil.
  - Se conserva el pasivo fuerte «fueron destruidos» para κατεφθάρησαν, evitando suavizar el alcance del desastre.
  - La nota[a] se ancla en la frase «tres días completos» porque ahí recae la ambigüedad temporal destacada por el audit trail.
  - La nota[b] se ancla en «fueron vendidos» para preservar la alternativa contextual de esclavización sin introducirla como certeza en el texto principal.
