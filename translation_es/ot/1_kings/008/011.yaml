translation:
  language: es
  text: y los sacerdotes no pudieron estar de pie para ministrar[a] a causa de la nube, porque la gloria de Yahvé llenó la casa de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no pudieron estar de pie para servir».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa de Yahvé»; es decir, el templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָכְלוּ
  english_pob_choice: were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces de
  - no estaban en condiciones de
  lexicon: HALOT
  rationale: El verbo expresa incapacidad o falta de poder para realizar la acción. «No pudieron» preserva esa idea con naturalidad en español, sin exagerar ni atenuar el sentido.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: En este contexto de templo, el referente son los sacerdotes aarónicos; «sacerdotes» es el equivalente directo y claro en español.
- source_word: לַעֲמֹד
  english_pob_choice: to stand
  chosen_spanish: ponerse de pie
  alternatives_spanish:
  - permanecer de pie
  - estar de pie
  lexicon: HALOT
  rationale: El infinitivo literalmente es «estar de pie / ponerse de pie». En español, «ponerse de pie» comunica de forma natural la idea de asumir o mantener la postura requerida para el servicio.
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: ministrar
  alternatives_spanish:
  - servir
  - ejercer su ministerio
  lexicon: HALOT
  rationale: En un marco cultual, «ministrar» conserva mejor el sentido técnico de servicio sacerdotal que el más amplio «servir».
- source_word: מִפְּנֵי הֶעָנָן
  english_pob_choice: because of the cloud
  chosen_spanish: a causa de la nube
  alternatives_spanish:
  - por la nube
  - debido a la nube
  lexicon: HALOT
  rationale: La expresión hebrea funciona idiomáticamente como causal. «A causa de la nube» mantiene la relación causal sin perder el trasfondo de la nube divina.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la incapacidad de los sacerdotes. «Porque» es la forma natural en español para una causal explicativa.
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - había llenado
  - estaba llenando
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada que explica la situación presente. «Llenó» mantiene ese valor narrativo de manera directa.
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahveh
  - la gloria de Yahweh
  lexicon: HALOT
  rationale: «Gloria» conserva כָּבוֹד como manifestación divina visible o palpable, sin reducirla a «presencia». Se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: «Casa» reproduce con fidelidad el hebreo בֵּית. Aunque el referente es el templo, se conserva la formulación literal para respetar la imagen y el paralelismo bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio terminológico del proyecto: el Tetragrámaton se rinde como «Yahvé», no como sustituto reverencial.'
theological_decisions:
- issue: Presencia divina expresada por «gloria» y no por una paráfrasis explicativa
  english_pob_reading: the glory of Yahweh filled the house of Yahweh
  chosen_spanish_reading: la gloria de Yahvé llenó la casa de Yahvé
  alternative_spanish_readings:
  - la presencia de Yahvé llenó la casa de Yahvé
  - la gloria del Señor llenó el templo
  rationale: El texto habla de כְבוֹד יְהוָה, una expresión cargada teológicamente que indica la manifestación gloriosa de Dios. Traducir «gloria» preserva la tensión y evita sustituirla por una interpretación como «presencia».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton: usar la transliteración del nombre divino en español como «Yahvé», manteniendo el nombre personal del pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece estable en la revisión más reciente, sin cambios sustantivos; se conservan sus decisiones léxicas principales: incapacidad de los sacerdotes, sentido cultual de «ministrar», causalidad de la nube, y «gloria de Yahvé» / «casa de Yahvé» para el cierre del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el versículo.
  - «Casa de Yahvé» se conserva literalmente, con nota aclaratoria sobre el referente templiario.
  - «Ministrar» se usa en sentido sacerdotal/cultual, no en el sentido moderno administrativo.
  - «Gloria» se mantiene sin sustituirla por «presencia» para respetar el peso teológico del hebreo.
