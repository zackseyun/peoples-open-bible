review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en los puntos principales: ''madera de almug'', ''soportes'', ''casa de Yahvé'', ''casa del rey'', instrumentos distintos y la afirmación final de excepcionalidad. Sin embargo, omite en español la nota del inglés sobre el término raro מִסְעָד (''supports''), y la cláusula ''Nunca antes había venido madera de almug así'' suena poco natural en español y no comunica con claridad la idea de que no había llegado madera semejante. También conviene explicitar el sujeto implícito en la cláusula final (''ninguna'') para evitar ambigüedad.'
  spanish_quality_summary: 'El texto es legible y digno, pero tiene dos puntos mejorables de naturalidad: ''había venido madera de almug así'' es torpe en español, y ''ni se ha visto hasta hoy'' queda algo elíptico. ''Cítaras'' es defendible, aunque ''liras'' sería más transparente para lectores generales; no es necesario cambiarlo si se mantiene la distinción instrumental. La sintaxis general es buena.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; בֵּית -> ''casa''; almug conservado por transliteración; לַשָּׁרִים -> ''cantores'' aceptable. Falta preservar en nota la incertidumbre léxica de מִסְעָד, que el audit trail inglés sí conserva. No hay conflicto teológico.'
  issues:
  - severity: medium
    issue: Falta la nota lexical sobre 'soportes' (מִסְעָד).
    rationale: El inglés POB conserva explícitamente una alternativa importante ('steps/railings'). La revisión española debe preservar esa incertidumbre mediante nota, ya que es un término raro y fuente-pertinente.
  - severity: medium
    issue: '''Nunca antes había venido madera de almug así'' es poco natural y semánticamente opaco.'
    rationale: Aunque calca el valor de לֹא בָא כֵן, en español no comunica bien la idea de llegada/importación de madera semejante. 'Nunca antes había llegado madera de almug como esa' o equivalente expresa mejor el sentido sin sobreinterpretar.
  - severity: low
    issue: '''ni se ha visto hasta hoy'' deja implícito el referente de modo algo ambiguo.'
    rationale: Añadir 'ninguna' o 'nada igual' aclara el referente retomado por el hebreo y mejora la fluidez española. 'Ninguna' es más cercano al inglés auditado ('nor has any been seen to this day').
  revised_spanish_text: El rey hizo de la madera de almug[a] soportes[b] para la casa de Yahvé y para la casa del rey, y cítaras y arpas para los cantores. Nunca antes había llegado madera de almug como esa, ni se ha visto ninguna hasta hoy.
  revised_footnotes:
