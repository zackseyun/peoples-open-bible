theological_decisions:
- issue: Nature of Paul's use of the Sarah-Hagar narrative
  chosen_reading: Paul says the narrative is being spoken/used allegorically, not that the historical persons are unreal or merely symbolic.
  alternative_readings:
  - Paul denies the historicity of the Genesis account
  - The text should be flattened to 'these are an allegory' without indicating rhetorical usage
  rationale: The passive participle ἀλληγορούμενα suggests a mode of interpretation or rhetorical use. The translation preserves theological tension by reflecting Paul's interpretive method without negating historical referentiality.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering δουλεία
  chosen_reading: slavery
  alternative_readings:
  - bondage
  - servitude
  rationale: In this context the state of constrained subjection is central to Paul's contrast between the two covenants. 'Slavery' best preserves the force of δουλεία and accords with the project's guidance on bonded terminology.
  doctrine_reference: 'Contested terms table: δοῦλος family rendered servant/slave context-dependently; use ''slave/slavery'' where bonded nature is salient.'
