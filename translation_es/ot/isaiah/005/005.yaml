translation:
  language: es
  text: 'Y ahora, permítanme darles a conocer lo que voy a hacer a mi viña: quitaré su cerca, y será consumida[a]; derribaré su muro, y será hollada[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘y será para quemar’ / ‘y será consumida’. La expresión hebrea dice literalmente: ‘y será para quemar’.'
    reason: lexical_alternative
  - marker: b
    text: O ‘y será un lugar de pisoteo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la conexión discursiva de וְ con el adverbio temporal. ‘Y ahora’ es natural en español y mantiene el giro de transición profética.
- source_word: אוֹדִיעָה נָּא
  english_pob_choice: please let me make known to you
  chosen_spanish: déjenme darles a conocer
  alternatives_spanish:
  - permítanme hacerles saber
  - déjenme informarles
  lexicon: HALOT
  rationale: El hifil de ידע expresa ‘hacer saber, informar’; en español, ‘dar a conocer’ comunica bien esa idea. El valor cortés/rogativo de נָא se refleja con el imperativo atenuado ‘déjenme’.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - los
  lexicon: HALOT
  rationale: El objeto directo plural se expresa de forma natural en español con el pronombre clítico correspondiente al destinatario plural del discurso.
- source_word: אֵת אֲשֶׁר אֲנִי עֹשֶׂה
  english_pob_choice: what I will do
  chosen_spanish: lo que voy a hacer
  alternatives_spanish:
  - lo que haré
  - lo que estoy por hacer
  lexicon: HALOT
  rationale: La construcción introduce el contenido de lo que se revelará; aunque el participio apunta a acción inminente, en español ‘voy a hacer’ comunica mejor esa inminencia sin perder naturalidad.
- source_word: לְכַרְמִי
  english_pob_choice: to my vineyard
  chosen_spanish: a mi viña
  alternatives_spanish:
  - para mi viña
  lexicon: HALOT
  rationale: ‘Viña’ es el equivalente español más natural para vineyard y mantiene la imagen agrícola. La preposición ‘a’ expresa adecuadamente el objeto afectado por la acción anunciada.
- source_word: הָסֵר מְשׂוּכָּתוֹ
  english_pob_choice: I will remove its hedge
  chosen_spanish: quitaré su cerca
  alternatives_spanish:
  - removeré su seto
  - quitaré su seto
  lexicon: HALOT
  rationale: Se conserva la idea de la barrera protectora. ‘Cerca’ funciona bien en español para el cerco de una viña; ‘seto’ sería una alternativa más botánica, pero menos común en este contexto.
- source_word: וְהָיָה לְבָעֵר
  english_pob_choice: and it will be consumed
  chosen_spanish: y será consumida
  alternatives_spanish:
  - y será para quemar
  - y quedará para ser quemada
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘y será para quemar’; la revisión inglesa prefirió ‘consumed’ para no limitar el resultado solo al fuego. En español, ‘será consumida’ mantiene la fuerza del resultado/destrucción sin estrechar el sentido.
- source_word: פָּרֹץ גְּדֵרוֹ
  english_pob_choice: I will break down its wall
  chosen_spanish: derribaré su muro
  alternatives_spanish:
  - romperé su cerca
  - abriré una brecha en su muro
  lexicon: HALOT
  rationale: פָּרֹץ expresa romper o abrir paso con violencia; con גְּדֵרוֹ, ‘muro’ o ‘cerca’ son posibles. ‘Muro’ preserva la distinción respecto de la ‘cerca’ anterior y permite el sentido de derribo.
- source_word: וְהָיָה לְמִרְמָס
  english_pob_choice: and it will be trampled down
  chosen_spanish: y será hollada
  alternatives_spanish:
  - y quedará para ser pisoteada
  - y será pisoteada
  lexicon: HALOT
  rationale: El sustantivo indica ‘pisoteo, ser hollado’. ‘Hollada’ conserva el registro bíblico y el valor pasivo del resultado, sin perder claridad en español.
theological_decisions:
- issue: Metáfora de juicio sobre la viña
  english_pob_reading: Preserve the agricultural metaphor without explicating its referent in the verse itself.
  chosen_spanish_reading: Conservar la metáfora agrícola sin identificar explícitamente a quién representa dentro del versículo.
  alternative_spanish_readings:
  - explicar en el texto principal que la viña es Israel/Judá
  rationale: El verso funciona como anuncio figurado de juicio; la identificación del referente pertenece al contexto inmediato, no a este enunciado. Mantener la imagen evita sobreinterpretación y respeta la forma profética.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que afinó ‘make known’ para reflejar mejor אוֹדִיעָה y prefirió ‘consumed’ frente a ‘burned’ para no restringir demasiado לְבָעֵר. En español, se mantuvo esa cautela semántica con ‘será consumida’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto en otros contextos, pero este versículo no contiene el Tetragrámaton.
  - Se preserva la distinción entre ‘cerca’ y ‘muro’ para reflejar la diferencia entre מְשׂוּכָּה y גְּדֵר.
  - ‘Viña’ se usa como equivalente idiomático de כַּרְם en español bíblico contemporáneo.
  - Se conserva el tono profético y judicial sin añadir explicaciones interpretativas al cuerpo del versículo.
