translation:
  language: es
  text: Todo lo que anda sobre su vientre[a], y todo lo que anda sobre cuatro patas, aun toda criatura que tiene muchas patas, entre todos los seres pululantes que pululan sobre la tierra[b], no los comerán, porque son detestables[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "se arrastra sobre su vientre".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "el ser pululante que pulula", una forma repetida que enfatiza esta clase de criaturas.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "son una abominación".'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: anything
  chosen_spanish: todo lo que
  alternatives_spanish:
  - cualquier cosa que
  - todo aquello que
  lexicon: HALOT
  rationale: En español, la construcción distributiva 'todo lo que' introduce naturalmente cada clase de criatura sin perder el alcance total del hebreo. Evita una formulación demasiado abstracta y conserva el valor inclusivo.
- source_word: הוֹלֵךְ עַל גָּח
  english_pob_choice: goes on its belly
  chosen_spanish: anda sobre su vientre
  alternatives_spanish:
  - se arrastra sobre su vientre
  - camina sobre su vientre
  lexicon: HALOT
  rationale: '''Anda sobre su vientre'' refleja de forma directa el modo de desplazamiento del hebreo y suena más natural en español bíblico actual que una repetición mecánica de ''va''. ''Se arrastra'' es posible, pero añade un matiz interpretativo más fuerte.'
- source_word: הוֹלֵךְ עַל אַרְבַּע
  english_pob_choice: goes on four feet
  chosen_spanish: anda sobre cuatro patas
  alternatives_spanish:
  - anda en cuatro patas
  - camina sobre cuatro patas
  lexicon: HALOT
  rationale: '''Cuatro patas'' comunica con claridad la imagen concreta del hebreo. Se prefiere ''patas'' a una traducción más literal de ''pies'' por ser el término español natural para animales en este contexto.'
- source_word: עַד כָּל מַרְבֵּה רַגְלַיִם
  english_pob_choice: even every creature with many feet
  chosen_spanish: aun toda criatura que tiene muchas patas
  alternatives_spanish:
  - incluso toda criatura con muchas patas
  - hasta toda criatura de muchas patas
  lexicon: HALOT
  rationale: El hebreo extiende la prohibición de forma inclusiva. 'Aun' reproduce bien ese carácter aditivo, y 'criatura que tiene muchas patas' mantiene la concreción del original sin tecnicismos innecesarios.
- source_word: לְכָל הַשֶּׁרֶץ הַשֹּׁרֵץ
  english_pob_choice: among all the swarming things that swarm
  chosen_spanish: de entre todos los seres que se arrastran y pululan
  alternatives_spanish:
  - entre todos los seres que pululan y se agitan
  - de entre todos los animales que pululan
  lexicon: HALOT
  rationale: El hebreo conserva una construcción intensiva con la misma raíz. En español, 'seres que se arrastran y pululan' transmite la idea de criaturas pequeñas o escurridizas que se mueven en masa, sin borrar la repetición enfática. Se evita 'animales' porque el término hebreo es más amplio y clasificatorio.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: '''Sobre la tierra'' reproduce de manera natural el marco espacial del hebreo y mantiene la amplitud del término más allá de ''suelo'', que sería más restrictivo.'
- source_word: לֹא תֹאכְלֻם
  english_pob_choice: you shall not eat them
  chosen_spanish: no comerán
  alternatives_spanish:
  - no los comerán
  - no deberán comerlos
  lexicon: HALOT
  rationale: Se conserva el tono legal prohibitivo del hebreo con un futuro de mandato en español. Aunque 'no los comerán' sería más explícito, la omisión del pronombre es estilísticamente posible en español y mantiene el registro solemne.
- source_word: שֶׁקֶץ
  english_pob_choice: detestable
  chosen_spanish: detestables
  alternatives_spanish:
  - abominables
  - repugnantes
  lexicon: HALOT
  rationale: '''Detestables'' conserva la fuerza evaluativa del término sin cargar de más el eco posterior de ''abominación''. El plural concuerda con ''son'' y con la referencia colectiva a estas criaturas.'
theological_decisions:
- issue: Naturaleza del motivo de la prohibición alimentaria
  english_pob_reading: Render the verse as a dietary prohibition without importing later theological interpretation about continuing applicability.
  chosen_spanish_reading: Presentar la prohibición como norma alimentaria dentro de la legislación de santidad, sin resolver aquí su vigencia posterior.
  alternative_spanish_readings:
  - Presentarla como una norma moral universal
  - Suavizarla como simple costumbre cultural
  rationale: El hebreo expresa una prohibición legal directa. La traducción no debe convertirla en una tesis moral atemporal ni reducirla a mera costumbre; debe dejar la tensión canónica abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del audit trail inglés, que prefirió un valor inclusivo y natural para la extensión a 'every creature with many feet'. En español se reflejó con 'aun toda criatura que tiene muchas patas', evitando una expresión rígida como 'hasta' o una paráfrasis demasiado libre. También se conservó el paralelismo intensivo del hebreo en la segunda cláusula con 'se arrastran y pululan'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''vientre'' y ''patas'' se eligieron por claridad idiomática en español, sin perder el contraste físico del texto.'
  - Se mantuvo 'detestables' para guardar la fuerza del término hebreo sin introducir una categoría doctrinal posterior.
  - La sintaxis legal con futuro de mandato ('no comerán') sigue el tono normativo del texto bíblico en español, aunque la referencia sea colectiva.
