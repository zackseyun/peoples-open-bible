- from: 'Entonces vio al ceneo[a], y alzó su dicho y dijo: «Tu morada es firme, y tu nido está en la roca».'
  to: 'Entonces vio al ceneo[a], y alzó su declaración y dijo: «Tu morada es firme, y tu nido está puesto en la roca».'
  rationale: Se ajusta «su dicho» a «su declaración» para dar a מָשָׁל un registro más natural y digno en español bíblico contemporáneo, mientras se mantiene «oráculo» como alternativa en nota. Se cambia «está en la roca» por «está puesto en la roca» para reflejar mejor el valor predicativo de וְשִׂים y la imagen de seguridad establecida que documenta la auditoría inglesa. No se requieren cambios doctrinales ni adjudicación adicional.
