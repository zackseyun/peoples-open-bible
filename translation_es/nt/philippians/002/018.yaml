translation:
  language: es
  text: De la misma manera[a], ustedes también alégrense y alégrense conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Asimismo, ustedes también deberían alegrarse y compartir su alegría conmigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ...αὐτὸ
  english_pob_choice: In the same way
  chosen_spanish: De la misma manera
  alternatives_spanish:
  - Asimismo
  - Igualmente
  - Lo mismo
  lexicon: BDAG
  rationale: La expresión funciona adverbialmente y remite al llamado previo a compartir el gozo; «De la misma manera» comunica con naturalidad esa relación sin volverla mecánica ni oscurecer el enlace discursivo.
- source_word: χαίρετε
  english_pob_choice: rejoice
  chosen_spanish: alégrense
  alternatives_spanish:
  - regocíjense
  - gócense
  lexicon: BDAG
  rationale: El imperativo plural pide una acción exhortativa de alegría compartida; en español, «alégrense» conserva el mandato y suena natural y digno, aunque «regocíjense» también sería posible con un tono más marcado.
- source_word: συγχαίρετέ
  english_pob_choice: rejoice with
  chosen_spanish: alégrense conmigo
  alternatives_spanish:
  - regocíjense conmigo
  - compartan mi alegría
  - alégrense junto conmigo
  lexicon: BDAG
  rationale: El verbo compuesto añade la idea de gozo compartido. En español, repetir «alégrense» mantiene el paralelismo del griego y hace explícito el complemento «conmigo»; «compartan mi alegría» comunica el sentido, pero pierde la repetición verbal del texto.
- source_word: μοι
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  - conmigo en ello
  lexicon: BDAG
  rationale: El dativo indica la persona con la que se comparte el gozo; «conmigo» es la forma idiomática más clara y directa en español.
translation_notes:
  revision_awareness: Se siguió el sentido ya auditado del griego como una exhortación a compartir el gozo; no se introdujeron cambios textuales ni doctrinales respecto del control en inglés. La única variación relevante es de estilo español para conservar naturalidad y la repetición del imperativo en el segundo miembro.
  spanish_consistency_notes:
  - Se mantiene el paralelismo del griego con dos imperativos en plural.
  - Se evita «gocen» por posible arcaísmo y «sean felices» por suavizar indebidamente el imperativo de alegría.
  - «De la misma manera» preserva la relación discursiva con el contexto inmediato mejor que una traducción más literal pero menos idiomática.
