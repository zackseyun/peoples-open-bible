  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Se mantiene 'Sabiduría' personificada, 'espíritu' para πνεῦμα y 'único' para μονογενές con nota. La principal corrección terminológica es preferir una forma femenina para τεχνῖτις y un adjetivo español genuino para εὐεργετικόν.
