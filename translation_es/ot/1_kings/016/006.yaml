translation:
  language: es
  text: Baasa durmió con sus padres y fue sepultado en Tirsa[a], y Ela su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con sus antepasados’. La expresión hebrea ‘durmió con sus padres’ es una fórmula convencional para la muerte de un rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: El hebreo usa la fórmula fija de obituario real, literalmente ‘durmió con sus padres’. En español, ‘durmió’ conserva la imagen idiomática y evita convertirla en una glosa interpretativa como ‘murió’.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres y antepasados
  lexicon: HALOT
  rationale: En español, ‘padres’ comunica mejor la fórmula tradicional de sepultura/sucesión que un calco rígido, y mantiene la relación con la expresión hebrea recurrente; ‘antepasados’ explicita el sentido, pero es menos directo.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - y fue sepultado
  lexicon: HALOT
  rationale: El pasivo hebreo pide una forma pasiva en español. ‘Sepultado’ es más elevado y bíblico que ‘enterrado’, sin perder naturalidad.
- source_word: בְּתִרְצָה
  english_pob_choice: in Tirzah
  chosen_spanish: en Tirsa
  alternatives_spanish:
  - en Tirzah
  - en la ciudad de Tirsa
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado según la convención española del proyecto; ‘en’ reproduce el valor locativo normal del ב con topónimos.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En los avisos regios, ‘reinó’ conserva la fórmula breve y estandarizada del texto fuente, equivalente al inglés POB ‘reigned’.
- source_word: אֵלָה בְנוֹ
  english_pob_choice: Elah his son
  chosen_spanish: Elá, su hijo
  alternatives_spanish:
  - su hijo Elá
  - Elá su hijo
  lexicon: HALOT
  rationale: El orden español puede seguir el hebreo y mantenerse claro. La coma ayuda a evitar ambigüedad sin añadir información.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: En contexto de sucesión, la expresión española más natural y fiel es ‘en su lugar’, que comunica sustitución dinástica sin endurecerse en una paráfrasis.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura revisada de la POB en inglés, que preserva la fórmula idiomática real y la sucesión dinástica sin cambios de sentido. No se reportan revisiones aplicadas en la fuente inglesa y el veredicto de revisión indica alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene ‘Baasá’ y ‘Tirsa’ como formas españolas coherentes con un registro bíblico moderno.
  - Se conserva la fórmula ‘durmió con sus padres’ mediante una nota para resguardar la alternativa lexical documentada.
  - La puntuación separa claramente las cláusulas regias y mantiene el paralelismo del hebreo.
