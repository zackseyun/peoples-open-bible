translation:
  language: es
  text: Tú tramas destrucción[a]; tu lengua es como una navaja afilada[c][b], obrando engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu lengua trama ruina»; el sustantivo hebreo está en plural («destrucciones»), pero funciona idiomáticamente para daño destructivo.'
    reason: lexical_alternative
  - marker: b
    text: «Obrando engaño» puede describir a la lengua misma o a la persona interpelada como alguien que practica el engaño.
    reason: lexical_alternative
  - marker: c
    text: 'O: «tu lengua trama destrucción».'
    reason: previous_rendering
lexical_decisions:
- source_word: הַוּוֹת
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - maldad destructiva
  - daño devastador
  lexicon: HALOT
  rationale: El plural hebreo funciona de modo idiomático como daño ruin o destructivo; en español, «destrucción» transmite mejor la fuerza colectiva y el sentido de devastación que una traducción demasiado literal del plural.
- source_word: תַּחְשֹׁב
  english_pob_choice: devises
  chosen_spanish: diseñas
  alternatives_spanish:
  - planeas
  - maquinas
  - tramas
  lexicon: HALOT
  rationale: El verbo expresa planificación intencional y calculada, no simple pensamiento. «Diseñas» comunica la elaboración deliberada del daño con un tono natural en español; se mantiene el sujeto implícito «tú» conforme al hebreo.
- source_word: לְשׁוֹנֶךָ
  english_pob_choice: your tongue
  chosen_spanish: tu lengua
  alternatives_spanish:
  - tu boca
  - tu habla
  - tu lengua
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo. «Lengua» es la forma bíblica y clara en español para el órgano usado como instrumento de habla engañosa.
- source_word: כְּתַעַר
  english_pob_choice: like a razor
  chosen_spanish: como una navaja
  alternatives_spanish:
  - como una cuchilla
  - como un rastrillo
  - como una rasuradora
  lexicon: HALOT
  rationale: «Navaja» es la opción más natural y elegante en español para el objeto cortante del símil. Mantiene la imagen de un instrumento afilado y peligroso.
- source_word: מְלֻטָּשׁ
  english_pob_choice: sharpened
  chosen_spanish: afilada
  alternatives_spanish:
  - pulida
  - bruñida
  - esmerilada
  lexicon: HALOT
  rationale: El participio pasivo describe una hoja preparada para cortar. «Afilada» transmite la función del objeto mejor que «pulida», que podría suavizar indebidamente la imagen.
- source_word: עֹשֵׂה רְמִיָּה
  english_pob_choice: working deceit
  chosen_spanish: obrando engaño
  alternatives_spanish:
  - practicando fraude
  - haciendo engaño
  - obrando traición
  lexicon: HALOT
  rationale: La construcción participial indica acción habitual o característica. «Obrando engaño» preserva el valor verbal y la brevedad poética; «engaño» comunica היטב רְמִיָּה sin desplazar el sentido hacia un tecnicismo innecesario.
theological_decisions:
- issue: Relación sintáctica entre «tú» y «tu lengua»
  english_pob_reading: You devise destruction; your tongue is like a sharpened razor, working deceit.
  chosen_spanish_reading: Tú diseñas destrucción; tu lengua es como una navaja afilada, obrando engaño.
  alternative_spanish_readings:
  - Tu lengua diseña destrucción
  - Tú diseñas destrucción, y tu lengua es como una navaja afilada, obrando engaño
  rationale: 'Se sigue el ajuste del audit trail: el verbo «diseñas» tiene por sujeto al segundo singular implícito, mientras que «tu lengua» pertenece a la cláusula siguiente. Esto preserva la acusación poética y evita atribuir a la lengua la acción verbal principal.'
  doctrine_reference: Gramática hebrea del versículo; caesura poética marcada por el acento principal; coherencia sintáctica con el texto masorético.
- issue: Sentido de רְמִיָּה
  english_pob_reading: working deceit
  chosen_spanish_reading: obrando engaño
  alternative_spanish_readings:
  - practicando fraude
  - haciendo trampa
  - obrando traición
  rationale: La palabra hebrea abarca engaño, fraude o traición. «Engaño» es la opción más amplia y directa en español, sin fijar el sentido a un tecnicismo legal que el contexto no exige.
  doctrine_reference: Lexicografía hebrea de רְמִיָּה; poesía sapiencial y salmódica.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la corrección auditada del inglés POB: el verbo principal no recae sobre «tu lengua», sino sobre el sujeto implícito «tú». Por eso la traducción separa la acción de planear destrucción de la imagen de la lengua como navaja afilada. También se evitó la puntuación o sintaxis que confunda la relación entre ambas cláusulas.'
  spanish_consistency_notes:
  - Se mantiene «lengua» para לְשׁוֹנֶךָ por consistencia bíblica y por la metáfora corporal del hebreo.
  - Se usó «engaño» para רְמִיָּה por su claridad y amplitud semántica.
  - Se preserva un estilo poético, claro y publicable en español neutral, sin recurrir a arcaísmos innecesarios.
