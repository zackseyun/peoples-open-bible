review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: causativo de רכב, imagen de dominación ‘sobre nuestras cabezas’, tránsito por ‘fuego y agua’ y liberación final. También preserva la alternativa textual sobre אֱנוֹשׁ singular/colectivo. Sin embargo, la frase final ‘a abundancia’ suena poco natural en español y no expresa con claridad el destino/resultante de לָרְוָיָה; conviene ajustarla sin perder la tensión léxica documentada.'
  spanish_quality_summary: El español es mayormente claro y digno, pero ‘montaran sobre nuestras cabezas’ puede sonar algo físico/extraño aunque sigue siendo fiel, y ‘nos sacaste a abundancia’ resulta poco idiomático. Una reparación menor mejora legibilidad y naturalidad sin apartarse del original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Hombres’ para אֱנוֹשׁ concuerda con la revisión inglesa, con nota que preserva el singular hebreo. ‘Abundancia’ sigue siendo la mejor opción principal para לָרְוָיָה, pero en español debe introducirse con una preposición más natural.
  issues:
  - severity: medium
    issue: ‘nos sacaste a abundancia’ es poco natural en español
    rationale: Aunque intenta calcar ‘into abundance’, en español bíblico y general suena forzado. ‘nos sacaste a un lugar de abundancia’ o ‘nos llevaste a abundancia/plenitud’ sería más idiomático; la primera además conserva mejor la idea de destino.
  - severity: low
    issue: La nota [a] empieza con ‘O «hombres»’ cuando el texto principal ya dice ‘hombres’
    rationale: 'La nota debe presentar la alternativa real al texto principal. Si el texto mantiene ‘hombres’, la nota debería comenzar con ‘O «un hombre»’. '
  revised_spanish_text: Hiciste que hombres montaran sobre nuestras cabezas[a]; pasamos por fuego y por agua, y nos sacaste a un lugar de abundancia[b].
  revised_footnotes:
