translation:
  language: es
  text: 'Así lo hicieron, y sacaron de la cueva a estos cinco reyes a él: el rey de Jerusalén, el rey de Hebrón, el rey de Jarmut, el rey de Laquis y el rey de Eglón.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: And they did so
  chosen_spanish: Y lo hicieron así
  alternatives_spanish:
  - Y así lo hicieron
  - Y lo hicieron de esa manera
  lexicon: HALOT
  rationale: La fórmula narrativa expresa cumplimiento de lo ordenado; en español, «lo hicieron así» conserva la idea de conformidad sin sonar arcaico ni forzado.
- source_word: וַיֹּצִיאוּ
  english_pob_choice: brought out
  chosen_spanish: sacaron
  alternatives_spanish:
  - trajeron fuera
  - sacaron de allí
  lexicon: HALOT
  rationale: El causativo de יצא aquí indica extraer de la cueva; «sacaron» es el equivalente natural y fiel en español.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: ante él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a él», el contexto de presentar a los reyes delante de Josué permite explicitar la relación espacial implícita con «ante él»; se mantiene el referente sin añadir una escena nueva.
- source_word: חֲמֵשֶׁת הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: these five kings
  chosen_spanish: a estos cinco reyes
  alternatives_spanish:
  - a estos cinco monarcas
  - a los cinco reyes estos
  lexicon: HALOT
  rationale: Se conserva el demostrativo y el numeral; «reyes» traduce con precisión מְלָכִים en este contexto histórico.
- source_word: מִן הַמְּעָרָה
  english_pob_choice: from the cave
  chosen_spanish: de la cueva
  alternatives_spanish:
  - desde la cueva
  - fuera de la cueva
  lexicon: HALOT
  rationale: «Cueva» es la equivalencia idiomática más natural en español para מְעָרָה en este contexto narrativo; «de la cueva» preserva la relación espacial simple del hebreo.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - soberano
  lexicon: HALOT
  rationale: El término corresponde de manera directa a מֶלֶךְ; «rey» es claro, preciso y estándar.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Nombre propio tradicional y transparente en español.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: יַרְמוּת
  english_pob_choice: Jarmuth
  chosen_spanish: Jarmut
  alternatives_spanish:
  - Yarmut
  lexicon: HALOT
  rationale: Se adapta la transliteración al uso bíblico en español; «Jarmut» es la forma más reconocible y cercana al hebreo.
- source_word: לָכִישׁ
  english_pob_choice: Lachish
  chosen_spanish: Laquis
  alternatives_spanish:
  - Lakis
  lexicon: HALOT
  rationale: Forma tradicional y establecida en español para el topónimo.
- source_word: עֶגְלוֹן
  english_pob_choice: Eglon
  chosen_spanish: Eglón
  alternatives_spanish:
  - Eglon
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma usual española con acento gráfico por adaptación fonética.
theological_decisions:
- issue: Presentación de los reyes ante la autoridad de Josué
  english_pob_reading: to him
  chosen_spanish_reading: ante él
  alternative_spanish_readings:
  - a él
  - para él
  rationale: 'No hay cambio doctrinal, pero sí una decisión de lectura contextual: el hebreo solo indica movimiento hacia Josué; en español, «ante él» hace explícita la presentación pública que el contexto narrativo sugiere sin alterar el contenido.'
  doctrine_reference: No aplica; decisión pragmática de contexto narrativo.
