  yaml_path: translation/ot/judges/019/010.yaml
  text: But the man was not willing to spend the night. He rose and went and came opposite Jebus (that is[a], Jerusalem), and with him were a pair of saddled donkeys and his concubine.
  footnotes:
  - marker: a
    text: Or 'to the vicinity of Jebus' or 'to a point facing Jebus.' The Hebrew expression indicates a location opposite or before the city rather than clearly inside it.
