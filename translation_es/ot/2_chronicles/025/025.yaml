translation:
  language: es
  text: Amasías, hijo de Joás[a], rey de Judá, vivió quince años después de la muerte de Joás, hijo de Jehoacaz, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «vivió ... quince años después de la muerte de Joás». El sentido es que Amasías sobrevivió a Joás de Israel por quince años.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - siguió viviendo
  - permaneció con vida
  lexicon: HALOT
  rationale: El verbo חיה aquí introduce un período de vida posterior a otro evento cronológico. «Vivió» es la forma natural en español para una nota histórica; «siguió viviendo» o «permaneció con vida» sonarían más interpretativos o marcados.
- source_word: אֲמַצְיָהוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  lexicon: Transliteración estándar bíblica en español
  rationale: En español bíblico es más común y reconocible «Amasías». Mantiene la referencia propia del nombre sin depender de la forma inglesa.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo
  lexicon: HALOT
  rationale: En identificación genealógica, «hijo de» reproduce con claridad la relación paterna y suena natural en español.
- source_word: יוֹאָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Joash
  - Jehoás
  lexicon: Transliteración estándar bíblica en español
  rationale: Se usa «Joás», forma habitual en español. Aquí conviene conservar la distinción por contexto histórico y por el patronímico.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa y transparente como «rey de Judá».
- source_word: אַחֲרֵי מוֹת
  english_pob_choice: after the death of
  chosen_spanish: después de la muerte de
  alternatives_spanish:
  - después de que murió
  - tras la muerte de
  lexicon: HALOT
  rationale: Se conserva la construcción nominal del hebreo, como en el texto inglés auditado, sin convertirla en una cláusula verbal.
- source_word: יְהוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Jehoacaz
  alternatives_spanish:
  - Jehóacaz
  - Jehoahaz
  lexicon: Transliteración estándar bíblica en español
  rationale: La forma española corriente es «Jehoacaz». Mantiene la distinción del segundo Joás mediante el nombre patronímico.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula real simple y directa del hebreo.
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: fifteen years
  chosen_spanish: quince años
  alternatives_spanish:
  - por quince años
  lexicon: HALOT
  rationale: La expresión numeral se traduce de forma estándar y concisa, adecuada para una nota cronológica.
theological_decisions:
- issue: Relación temporal entre la vida de Amasías y la muerte de Joás de Israel
  english_pob_reading: Amaziah outlived Joash of Israel by fifteen years.
  chosen_spanish_reading: Amasías sobrevivió a Joás de Israel por quince años.
  alternative_spanish_readings:
  - Amasías vivió quince años después de la muerte de Joás de Israel.
  rationale: 'El hebreo y la nota inglesa aclaran que el sentido es de supervivencia cronológica: Amasías vivió más tiempo que Joás de Israel. Se mantiene esa relación en la nota para no perder la precisión del dato histórico.'
  doctrine_reference: 2 Crónicas 25:25; nota auditada de la POB en inglés
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el acuerdo cruzado fue alto. La redacción española sigue el sentido auditado del inglés y del hebreo, preservando la nota temporal sin añadir interpretación innecesaria.
  spanish_consistency_notes:
  - 'Se conservan nombres propios bíblicos en formas estándar del español: Amasías, Joás y Jehoacaz.'
  - Se mantiene «rey de Judá / rey de Israel» como fórmulas reales directas, sin sustitución por perífrasis.
  - «Vivió» se usa como equivalente natural de la acción cronológica; la nota aclara la fuerza de «sobrevivió» para reflejar el matiz del hebreo.
  - La nota al pie está anclada en «Joás[a]» para señalar la alternativa semántica sin interrumpir la lectura principal.
