translation:
  language: es
  text: Los dientes de las fieras, y escorpiones y víboras[a], y una espada de venganza para destruir a los impíos[b]—todos ellos fueron creados para su propósito[c], y están reservados hasta el tiempo señalado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «áspides» o «serpientes venenosas»; el hebreo nombra una serpiente venenosa, pero la especie exacta no puede determinarse con certeza. El paralelo griego usa un término general para víbora o serpiente.
    reason: lexical_alternative
  - marker: b
    text: O «consagrar a destrucción» o «exterminar»; el verbo puede llevar el sentido más fuerte de poner bajo destrucción total.
    reason: lexical_alternative
  - marker: c
    text: O «están en el depósito, y al tiempo señalado son convocados». El hebreo es compacto; el sentido es que estas fuerzas quedan reservadas hasta su momento de despliegue.
    reason: alternative_reading
lexical_decisions:
- source_word: חית
  english_pob_choice: wild beasts
  chosen_spanish: las fieras
  alternatives_spanish:
  - los animales salvajes
  - las bestias
  lexicon: HALOT
  rationale: En esta enumeración de criaturas peligrosas, "fieras" comunica mejor el valor de animales salvajes o feroces que el genérico "animales". Evita la dureza de un calco y mantiene el paralelo griego θηρίων.
- source_word: שן
  english_pob_choice: teeth
  chosen_spanish: los dientes
  alternatives_spanish:
  - el diente
  - los colmillos
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, funciona de manera colectiva; el plural español es natural y coincide con el griego ὀδόντες. "Colmillos" sería demasiado específico.
- source_word: עקרב
  english_pob_choice: scorpions
  chosen_spanish: escorpiones
  alternatives_spanish:
  - un escorpión
  lexicon: HALOT
  rationale: Se mantiene el valor colectivo de la serie y el paralelo griego σκορπίοι. El singular suena menos idiomático en español en este tipo de catálogo.
- source_word: פתן
  english_pob_choice: vipers
  chosen_spanish: víboras
  alternatives_spanish:
  - víboras venenosas
  - áspides
  - alacranes
  lexicon: HALOT
  rationale: La identificación zoológica exacta es incierta; "víboras" expresa con claridad la idea de serpientes venenosas sin forzar una especie concreta. Es más natural que "áspides" y más amplio que "víboras venenosas".
- source_word: חרב נקמות
  english_pob_choice: a sword of vengeance
  chosen_spanish: una espada de venganza
  alternatives_spanish:
  - una espada vengadora
  - una espada que toma venganza
  lexicon: HALOT
  rationale: Sigue de cerca el sustantivo constructo hebreo y el griego ῥομφαία ἐκδικοῦσα, preservando la fuerza nominal de la expresión. "Vengadora" o una perífrasis verbal suavizarían o alterarían el giro.
- source_word: להחרים
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - exterminar
  - consagrar a destrucción
  lexicon: HALOT
  rationale: En este contexto sapiencial, "destruir" es la opción más clara y directa. Se conserva la tensión del verbo sin introducir un tecnicismo innecesario como "consagrar a destrucción".
- source_word: רשעים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: '"Impíos" es una equivalencia natural para ἀσεβεῖς y mantiene el matiz de irreverencia o falta de piedad más que mero mal comportamiento. En español bíblico es inteligible y no depende de una formulación eclesiástica fija.'
- source_word: לצורכם
  english_pob_choice: for their purpose
  chosen_spanish: para su propósito
  alternatives_spanish:
  - para su uso
  - para su necesidad
  lexicon: HALOT
  rationale: Se conserva el sentido funcional de finalidad o designio. "Propósito" evita precisar indebidamente si la frase apunta a necesidad, uso o finalidad divina.
- source_word: נבראו
  english_pob_choice: were created
  chosen_spanish: fue creado
  alternatives_spanish:
  - han sido creados
  - fueron hechos
  lexicon: HALOT
  rationale: La forma española se ajusta al sujeto colectivo resumido del versículo y conserva la afirmación teológica explícita de creación. "Fueron hechos" debilitaría el énfasis creacional.
- source_word: באוצר
  english_pob_choice: kept in store
  chosen_spanish: está guardado
  alternatives_spanish:
  - están en el depósito
  - están reservados
  lexicon: HALOT
  rationale: La idea del almacén/tesoro se expresa de modo idiomático con "guardado"; el español no requiere repetir literalmente la imagen de "almacén" para ser fiel. Se conserva la noción de reserva para uso posterior.
- source_word: ולעת יפקדו
  english_pob_choice: until the time they are appointed
  chosen_spanish: hasta el tiempo fijado
  alternatives_spanish:
  - hasta el tiempo en que son llamados
  - hasta el tiempo señalado
  lexicon: HALOT
  rationale: פקד admite la idea de ser asignado, convocado o requerido; "tiempo fijado" transmite con sobriedad la temporalidad determinada sin resolver en exceso la imagen. Es compatible con la reserva de agentes para su momento de activación.
theological_decisions:
- issue: Si la traducción debe atenuar o conservar la afirmación de que criaturas dañinas y fuerzas destructivas fueron creadas con propósito
  english_pob_reading: The translation preserves the text's claim that these destructive agents 'were created' and are 'kept in store' for an appointed time, without softening the theological tension.
  chosen_spanish_reading: La traducción conserva que "fue creado" y "está guardado" para un "tiempo fijado", sin suavizar la afirmación de que estos agentes destructivos forman parte del orden creado bajo gobierno divino.
  alternative_spanish_readings:
  - Se podría leer como mera observación sobre la naturaleza y no como afirmación teológica.
  - Se podría suavizar con "llegó a ser" en vez de "fue creado".
  rationale: Tanto el hebreo como el griego atribuyen explícitamente estos agentes a la creación y a una finalidad temporal. La versión española debe mantener esa tensión doctrinal sin resolverla o diluirla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que afinó «a sword that takes vengeance» a «a sword of vengeance». La versión española refleja ese ajuste con «una espada de venganza», conservando el tono más literal y formal. También se respetó la lectura hebrea primaria frente al paralelo griego, sin borrar las oscilaciones léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Impíos» se eligió aquí por el valor de ἀσεβεῖς, aunque en otros contextos del proyecto podrían preferirse otras equivalencias según el matiz.
  - La construcción singular «fue creado» recoge el sujeto resumido del conjunto enumerado y evita una discordancia idiomática en español.
