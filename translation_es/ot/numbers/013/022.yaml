translation:
  language: es
  text: Subieron al Negev[a] y llegaron hasta Hebrón. Allí estaban Ahimán, Sesai y Talmai, descendientes de Anac. Hebrón había sido edificada siete años antes de Zoán de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene el singular «y vino» después del plural «subieron». Esto puede referirse al grupo en conjunto, a un representante de los exploradores, o reflejar una irregularidad textual; muchas traducciones lo suavizan como plural.
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: They went up
  chosen_spanish: Subieron
  alternatives_spanish:
  - Ascendieron
  - Fueron
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba o hacia una región elevada. «Subieron» conserva el sentido idiomático y natural en español sin perder la imagen direccional.
- source_word: בַנֶּגֶב
  english_pob_choice: into the Negev
  chosen_spanish: al Negev
  alternatives_spanish:
  - al sur
  - en el Negev
  - al Néguev
  lexicon: HALOT
  rationale: Aquí נֶגֶב funciona como designación regional. Mantengo el nombre geográfico reconocido «Negev» para reflejar el valor de topónimo que el contexto sugiere.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vino
  - fue
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el contexto inmediato y la revisión del POB inglés favorecen tomar el verbo como un ajuste narrativo al grupo. En español, «llegaron» evita una discordancia que no está sustentada por el sentido final del pasaje.
- source_word: עַד חֶבְרוֹן
  english_pob_choice: as far as Hebron
  chosen_spanish: hasta Hebrón
  alternatives_spanish:
  - a Hebrón
  - al llegar a Hebrón
  lexicon: HALOT
  rationale: עַד marca límite de extensión. «Hasta Hebrón» reproduce con claridad ese alcance espacial.
- source_word: יְלִידֵי הָעֲנָק
  english_pob_choice: the descendants of Anak
  chosen_spanish: descendientes de Anac
  alternatives_spanish:
  - hijos de Anac
  - nacidos de Anac
  - linaje de Anac
  lexicon: HALOT
  rationale: יְלִידֵי se refiere a descendencia o procedencia de nacimiento. «Descendientes de Anac» es la opción más natural y precisa en español para esta designación clanica.
- source_word: וְשָׁם
  english_pob_choice: were there
  chosen_spanish: Allí estaban
  alternatives_spanish:
  - y allí estaban
  - estaban allí
  lexicon: HALOT
  rationale: La partícula locativa requiere una formulación verbal en español. «Allí estaban» expresa la presencia localizada sin añadir contenido ajeno.
- source_word: נִבְנְתָה
  english_pob_choice: had been built
  chosen_spanish: había sido edificada
  alternatives_spanish:
  - había sido construida
  - fue edificada
  lexicon: HALOT
  rationale: El pasivo perfecto hebreo se vierte mejor con pretérito pluscuamperfecto para indicar anterioridad respecto al marco narrativo. «Edificada» conserva el registro solemne y evita una repetición excesiva de «construida».
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes que
  alternatives_spanish:
  - antes de
  - delante de
  lexicon: HALOT
  rationale: Aquí la relación es temporal, no espacial. «Antes que» en español comunica con naturalidad la prioridad temporal.
- source_word: צֹעַן מִצְרָיִם
  english_pob_choice: Zoan of Egypt
  chosen_spanish: Zoán de Egipto
  alternatives_spanish:
  - Zoán en Egipto
  - la Zoán egipcia
  lexicon: HALOT
  rationale: Conservo el nombre propio de lugar y la relación de pertenencia/ubicación con «de Egipto», siguiendo la economía del hebreo constructo y la decisión inglesa de mantener la referencia geográfica.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión aplicada al texto inglés: se evita reproducir una discordancia literal del verbo hebreo y se mantiene la secuencia narrativa plural coherente con el contexto. También se conserva la nota explicativa para la variante gramatical sin convertirla en una lectura doctrinal.'
  spanish_consistency_notes:
  - Se usa «Negev» como topónimo regional, no como «sur», para conservar la referencia geográfica específica.
  - «Anac» se mantiene como forma castellana habitual del nombre propio asociado al clan.
  - «Zoán» lleva tilde por adaptación ortográfica española del topónimo.
  - Se eligió un registro sobrio y publicable, con sintaxis natural en español y sin perder el paralelismo del hebreo.
