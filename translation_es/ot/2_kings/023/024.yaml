translation:
  language: es
  text: Además[a], Josías quitó a los médiums, a los espiritistas, a los dioses domésticos, a los ídolos y a todas las abominaciones que se veían en la tierra de Judá y en Jerusalén, para establecer las palabras de la ley escritas en el libro[b] que el sacerdote Hilcías encontró en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Y también” o “Asimismo”. El hebreo añade una acción más a la reforma de Josías.
    reason: alternative_reading
  - marker: b
    text: O “escritas sobre el rollo”. El hebreo puede referirse a un documento escrito en forma de rollo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Moreover
  chosen_spanish: Además
  alternatives_spanish:
  - Y también
  - Asimismo
  lexicon: HALOT
  rationale: Conserva el valor aditivo de inicio de cláusula sin forzar una construcción más pesada en español.
- source_word: הָאֹבוֹת
  english_pob_choice: the mediums
  chosen_spanish: los médiums
  alternatives_spanish:
  - los evocadores de muertos
  - los nigromantes
  lexicon: HALOT
  rationale: El hebreo designa practicantes de consulta ilícita con los muertos; “médiums” comunica esa función de forma moderna y clara, sin perder el matiz de mediación espiritual.
- source_word: הַיִּדְּעֹנִים
  english_pob_choice: the spiritists
  chosen_spanish: los espiritistas
  alternatives_spanish:
  - los adivinos
  - los que tenían espíritu familiar
  lexicon: HALOT
  rationale: Mantiene el par de practicantes ocultistas del hebreo y sigue la opción inglesa auditada, con una palabra comprensible en español bíblico actual.
- source_word: הַתְּרָפִים
  english_pob_choice: the household gods
  chosen_spanish: los dioses domésticos
  alternatives_spanish:
  - los ídolos del hogar
  - los terafines
  lexicon: HALOT
  rationale: El término probablemente alude a objetos/deidades de culto doméstico; “dioses domésticos” conserva la función cultual mejor que transliterar, y mantiene la tensión teológica de que no son meros adornos.
- source_word: הַגִּלֻּלִים
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las basuras idolátricas
  - los detestables ídolos
  lexicon: HALOT
  rationale: La raíz es despectiva, pero “ídolos” sigue siendo la equivalencia más natural y reconocible en español; el tono peyorativo queda reforzado por el contexto inmediato.
- source_word: כָּל הַשִּׁקֻּצִים
  english_pob_choice: all the abominations
  chosen_spanish: todas las abominaciones
  alternatives_spanish:
  - todas las cosas detestables
  - todos los horrores
  lexicon: HALOT
  rationale: Preserva el campo moral-religioso fuerte del hebreo, sin reducirlo a un listado más estrecho que el texto no impone.
- source_word: נִרְאוּ
  english_pob_choice: were seen
  chosen_spanish: se veían
  alternatives_spanish:
  - aparecían
  - eran visibles
  lexicon: HALOT
  rationale: 'El pasivo/niphal funciona naturalmente en español con una forma impersonal: “se veían” refleja presencia visible/pública en la tierra y en Jerusalén.'
- source_word: בִּעֵר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - eliminó
  - purificó
  - arrancó
  lexicon: HALOT
  rationale: “Quitó” expresa eliminación completa en español sencillo y no obliga a especificar el método físico del verbo hebreo, que puede abarcar purgar/expulsar/quemar fuera.
- source_word: לְמַעַן הָקִים
  english_pob_choice: in order to establish
  chosen_spanish: para establecer
  alternatives_spanish:
  - a fin de afirmar
  - para poner en vigor
  lexicon: HALOT
  rationale: Conserva la relación de propósito y la idea de hacer vigentes/firmes las palabras de la ley, sin introducir una interpretación excesivamente técnica.
- source_word: דִּבְרֵי הַתּוֹרָה
  english_pob_choice: the words of the law
  chosen_spanish: las palabras de la ley
  alternatives_spanish:
  - las palabras de la instrucción
  - los dichos de la ley
  lexicon: HALOT
  rationale: “Ley” es la mejor correspondencia idiomática para תּוֹרָה en este contexto de reforma del pacto; “palabras” conserva el plural concreto del hebreo.
- source_word: הַכְּתֻבִים עַל הַסֵּפֶר
  english_pob_choice: written in the book
  chosen_spanish: escritas en el libro[b]
  alternatives_spanish:
  - escritas en el rollo
  - escritas sobre el rollo
  lexicon: HALOT
  rationale: “Escritas en el libro” sigue la lectura principal del audit trail; la nota conserva la posibilidad de que סֵפֶר aluda a un documento en forma de rollo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - el templo de Yahvé
  lexicon: DOCTRINE.md
  rationale: Sigue el estándar del proyecto para el nombre divino y conserva literalmente “casa” frente a una expansión interpretativa como “templo”.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se sigue el principio del proyecto de no enmascarar el Tetragrámaton; “Yahvé” es la forma española estable y reverente para reproducir el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: כְּתֻבִים עַל הַסֵּפֶר
  english_pob_reading: written in the book
  chosen_spanish_reading: escritas en el libro[b]
  alternative_spanish_readings:
  - escritas sobre el rollo
  - escritas en el rollo
  rationale: La traducción principal se mantiene legible y fiel; la nota preserva la tensión textual entre “libro” como documento y “rollo” como soporte material probable.
  doctrine_reference: 'DOCTRINE.md: source-text transparency / document-form ambiguity'
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alto acuerdo y no requieren revisiones sustantivas; se mantuvieron las decisiones léxicas principales (occult practitioners, household gods, idols, abominations, written in the book) con adaptación natural al español y con nota sobre la posible forma material del documento.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como forma del nombre divino, conforme al estándar del proyecto.
  - Se evitó “SEÑOR” para no ocultar el Tetragrámaton.
  - Se conservó la serie de cuatro grupos de objetos/personas eliminados por Josías, sin fusionarlos ni explicarlos más de lo que permite el hebreo.
  - “Casa de Yahvé” se mantuvo literal para conservar la transparencia del fuente.
  - La nota sobre el libro/rollo preserva la ambigüedad textual documentada por el audit trail.
