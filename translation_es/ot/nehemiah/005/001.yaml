translation:
  language: es
  text: Y hubo un gran clamor del pueblo y de sus esposas contra sus hermanos judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judeanos». El término hebreo puede referirse a judíos/judeanos, según si el énfasis es étnico o regional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: Now there arose
  chosen_spanish: Y hubo
  alternatives_spanish:
  - Entonces hubo
  - Ahora surgió
  lexicon: HALOT
  rationale: El wayyiqtol de היה introduce un nuevo desarrollo narrativo. En español, 'Y hubo' conserva el avance del relato sin sobrecargar la frase; 'hubo' expresa la aparición de una situación, como 'there arose' en inglés.
- source_word: צַעֲקַת
  english_pob_choice: outcry
  chosen_spanish: gran clamor
  alternatives_spanish:
  - clamor
  - grito
  - queja
  lexicon: HALOT
  rationale: El sustantivo denota un grito de angustia o protesta pública. 'Clamor' comunica ese peso social; se añade 'gran' para reflejar גְּדוֹלָה, manteniendo la intensidad del original.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo común
  - la población
  lexicon: HALOT
  rationale: El término se refiere de manera amplia a la comunidad afectada. 'El pueblo' es natural en español bíblico y conserva la referencia colectiva sin especificar más de lo que el hebreo exige.
- source_word: וּנְשֵׁיהֶם
  english_pob_choice: and their wives
  chosen_spanish: y de sus esposas
  alternatives_spanish:
  - y de sus mujeres
  - y de sus mujeres y esposas
  lexicon: HALOT
  rationale: אִשָּׁה en este plural posesivo se entiende aquí como 'esposas'. 'Esposas' preserva la mención explícita de las mujeres que también alzan la protesta.
- source_word: גְּדוֹלָה
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - enorme
  - muy fuerte
  lexicon: HALOT
  rationale: El adjetivo modifica el clamor indicando magnitud e intensidad. 'Gran' es la forma más natural delante de un sustantivo y conserva el énfasis hebreo sin añadir interpretación.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  - hacia
  - en contra de
  lexicon: HALOT
  rationale: Aunque literalmente puede significar 'a/toward', en este contexto de denuncia señala el blanco de la protesta. 'Contra' transmite bien la fuerza adversativa en español.
- source_word: אֲחֵיהֶם
  english_pob_choice: brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  - sus hermanos de clan
  lexicon: HALOT
  rationale: La expresión literal 'hermanos' mantiene la solidaridad interna del grupo y evita diluir la relación comunitaria que el texto presupone.
- source_word: הַיְּהוּדִים
  english_pob_choice: Jewish
  chosen_spanish: judíos[a]
  alternatives_spanish:
  - judeanos
  - de Judá
  lexicon: HALOT
  rationale: El término puede apuntar a identidad étnico-religiosa o regional. 'Judíos' es el equivalente natural en español; se conserva una nota para la alternativa 'judeanos' cuando el énfasis histórico-geográfico sea pertinente.
theological_decisions:
- issue: Alcance de הַיְּהוּדִים
  english_pob_reading: Jewish, with footnoted Judean alternative
  chosen_spanish_reading: judíos, con nota sobre 'judeanos'
  alternative_spanish_readings:
  - judeanos
  - de Judá
  rationale: La comunidad postexílica de Nehemías puede describirse tanto por identidad religiosa/étnica como por procedencia regional. En español, 'judíos' comunica la pertenencia del grupo con claridad; la nota preserva la tensión lexical sin borrarla.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente sin cambios sustantivos, y mantiene la equivalencia funcional del inglés POB al español con atención al valor discursivo de wayyiqtol, צעקה y el término identitario final.
  spanish_consistency_notes:
  - Se mantiene 'Y hubo' para la progresión narrativa, evitando un calco demasiado mecánico de 'Now there arose'.
  - '''Clamor'' conserva el tono público y de angustia del original mejor que ''queja''.'
  - '''Judíos'' se usa como forma principal por naturalidad y legibilidad en español; la alternativa ''judeanos'' queda documentada en nota para no perder la tensión del hebreo.'
