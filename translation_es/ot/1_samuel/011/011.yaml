revisions:
- from: Y sucedió al día siguiente que Saúl puso al pueblo en tres grupos[a], y entraron en medio del campamento, durante la vigilia de la mañana, e hirieron a Amón hasta el calor del día. Y sucedió que los sobrevivientes fueron dispersados[b][c], de modo que no quedaron juntos ni siquiera dos de ellos.
  to: Y sucedió al día siguiente que Saúl puso al pueblo en tres grupos[a], y entraron en medio del campamento durante la guardia de la mañana[b] y derrotaron a Amón hasta el calor del día[c]. Y sucedió que los sobrevivientes se dispersaron, de modo que no quedaron juntos ni siquiera dos de ellos.
  rationale: 'La revisión realinea el español con la evidencia hebrea y con el audit trail inglés: restaura la nota cultural sobre la guardia de la mañana, conserva la imagen ‘calor del día’, elimina una nota innecesaria sobre ‘dispersados’, y mejora la claridad militar de וַיַּכּוּ con ‘derrotaron a Amón’. También hace el español más natural sin apartarse del sentido fuente.'
