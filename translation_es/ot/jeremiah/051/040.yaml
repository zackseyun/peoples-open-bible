translation:
  language: es
  text: Yo los haré bajar como corderos[a] al matadero, como carneros con machos cabríos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como carneros jóvenes» para כָּרִים.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹרִידֵם
  english_pob_choice: I will bring them down
  chosen_spanish: Yo los haré descender
  alternatives_spanish:
  - Yo los llevaré abajo
  - Yo los haré bajar
  lexicon: HALOT
  rationale: 'El hiphil de ירד es causativo: hacer bajar, hacer descender. En español, «haré descender» conserva bien esa fuerza causativa y suena natural en un anuncio de juicio. «Los» mantiene el objeto directo plural explícito del hebreo.'
- source_word: כְּכָרִים
  english_pob_choice: like lambs
  chosen_spanish: como corderos
  alternatives_spanish:
  - como carneros jóvenes
  - como ovejas jóvenes
  lexicon: HALOT
  rationale: כָּרִים puede entenderse como corderos o carneros jóvenes. Se eligió «corderos» porque comunica mejor la vulnerabilidad de la comparación en español y armoniza con «al degolladero». Se preserva la alternativa semántica en nota.
- source_word: לִטְבֹחַ
  english_pob_choice: to the slaughter
  chosen_spanish: al degolladero
  alternatives_spanish:
  - a la matanza
  - para ser degollados
  lexicon: HALOT
  rationale: El infinitivo constructo de טבח expresa la acción de matar por degüello. «Al degolladero» reproduce el campo semántico de sacrificio/muerte violenta con una imagen idiomática en español, sin perder la dirección del movimiento.
- source_word: כְּאֵילִים
  english_pob_choice: like rams
  chosen_spanish: como carneros
  alternatives_spanish:
  - como machos ovinos
  - como carneros fuertes
  lexicon: HALOT
  rationale: אֵילִים significa de manera directa «carneros». Se mantiene el animal imagen principal, sin añadir calificaciones que el hebreo no exige.
- source_word: עִם עַתּוּדִים
  english_pob_choice: with male goats
  chosen_spanish: con machos cabríos
  alternatives_spanish:
  - con cabros
  - con cabrones
  lexicon: HALOT
  rationale: עַתּוּדִים denota machos cabríos, con distinción sexual explícita. «Machos cabríos» es claro, digno y preciso en español bíblico contemporáneo.
theological_decisions:
- issue: Imagen de juicio violento y posible tensión entre «corderos» y «carneros jóvenes»
  english_pob_reading: The verse presents a simile of being brought down for slaughter, with a lexical note preserving the possibility of 'young rams' for כָּרִים.
  chosen_spanish_reading: La comparación principal se traduce con «corderos», pero se conserva en nota la posibilidad de «carneros jóvenes» para כָּרִים.
  alternative_spanish_readings:
  - como carneros jóvenes
  - como ovejas jóvenes
  rationale: La tensión léxica del hebreo no debe borrarse. «Corderos» es la opción más natural en español para el cuadro de vulnerabilidad, pero la nota mantiene abierta la lectura alternativa que el audit trail documenta.
  doctrine_reference: No doctrinal issue; lexical fidelity / simile nuance
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con la traducción inglesa auditada; el control de revisiones indica que no se requieren cambios adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; este versículo no contiene el tetragrámaton.
  - Se mantiene un registro formal y bíblico, evitando la terminología eclesiástica tradicional no requerida por el hebreo.
  - Se conserva la simetría de las dos comparaciones animales y la distinción sexual explícita de עַתּוּדִים.
