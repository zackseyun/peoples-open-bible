    issue: «mi justicia» para כְּצִדְקָתִי
    rationale: Aunque «justicia» es posible, el expediente inglés especifica el sentido de uprightness/right conduct en contexto. En español bíblico contemporáneo, «rectitud» comunica mejor esa integridad moral concreta y evita una lectura más abstracta o judicial.
  - severity: low
    issue: Anclaje de la nota [b]
    rationale: La nota sobre el modismo «la limpieza de mis manos» debería anclarse en esa frase, no después de «mi justicia», para corresponder exactamente al elemento explicado.
