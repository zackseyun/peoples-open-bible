translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé; no hablé[a] en vano cuando dije que traería sobre ellos esta calamidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hablé por nada» o «no hablé sin causa».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «esta maldad» o «este mal»; aquí el término se refiere a una calamidad o desastre de juicio, no a mal moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: En el contexto profético, la forma verbal expresa un resultado futuro de juicio; «Entonces» conserva la fuerza consecutiva, y «sabrán» comunica el reconocimiento covenantal sin sonar artificial.
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy Yahvé
  - que yo soy el SEÑOR
  lexicon: DOCTRINE.md / HALOT
  rationale: 'Se sigue el estándar del proyecto para יְהוָה: «Yahvé». Mantener la primera persona preserva la fórmula de reconocimiento propia de Ezequiel.'
- source_word: לֹא אֶל חִנָּם דִּבַּרְתִּי
  english_pob_choice: I did not speak in vain
  chosen_spanish: no hablé en vano
  alternatives_spanish:
  - no hablé sin causa
  - no hablé sin propósito
  lexicon: HALOT
  rationale: «En vano» reproduce bien el idioma bíblico y transmite la idea de habla no vacía, no inútil ni sin efecto.
- source_word: לַעֲשׂוֹת לָהֶם
  english_pob_choice: when I said I would bring ... upon them
  chosen_spanish: al hacer venir sobre ellos
  alternatives_spanish:
  - al traer sobre ellos
  - para hacerles venir
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hacerles» respecto a la calamidad; en español, «hacer venir sobre ellos» conserva la idea de imponer o traer el juicio sin sonar forzado.
- source_word: הָרָעָה הַזֹּאת
  english_pob_choice: this disaster
  chosen_spanish: esta calamidad
  alternatives_spanish:
  - este mal
  - este desastre
  lexicon: HALOT
  rationale: Aquí רָעָה no denota mal moral en Dios, sino una calamidad de juicio. «Calamidad» comunica ese valor punitivo sin introducir una lectura ética errónea.
theological_decisions:
- issue: Renderización de יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva la transliteración exigida por la pauta del proyecto, manteniendo la transparencia del nombre divino y evitando el sustituto tradicional en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de הָרָעָה en contexto de juicio
  english_pob_reading: disaster
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - mal
  - desastre
  rationale: En este pasaje el término describe una acción judicial de Yahvé; «calamidad» evita sugerir mal moral atribuido a Dios y preserva la severidad del juicio.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el último pase de revisión: no se requieren cambios según el resumen de revisión y la concordancia alta con el control cruzado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - «Calamidad» traduce el valor contextual de רָעָה en juicio; se evitó una lectura moralizante.
  - La puntuación refleja la relación causal/consecutiva del hebreo con una formulación natural en español.
