  to: Y si el hombre con el flujo escupe sobre una persona ritualmente pura[a], lavará sus vestidos y se bañará en agua[b], y quedará impuro hasta la tarde.
  rationale: Se revisa «persona limpia» a «persona ritualmente pura» para expresar en el texto principal el valor técnico de טָהוֹר y evitar una lectura de limpieza física. Se actualiza la nota [a] para mantener coherencia con ese ajuste. El resto del versículo es fiel, claro y natural.
