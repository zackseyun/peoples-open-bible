  to: Y los estatutos y los juicios y la ley y el mandamiento que él escribió para ustedes[a], tendrán cuidado de poner por obra[b] todos los días, y no temerán[c] a otros dioses.
  rationale: Se ajustó la expresión verbal para reflejar mejor תִּשְׁמְרוּן לַעֲשׂוֹת en un español natural y digno («tendrán cuidado de poner por obra»), se eliminó el posesivo no explícito del hebreo en כָּל הַיָּמִים, y se añadió la nota semántica correspondiente a «temerán», ya presente en el rastro de auditoría inglés.
