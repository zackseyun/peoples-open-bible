translation:
  language: es
  text: No estés entre los bebedores empedernidos de vino[a], entre los que se atiborran de carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Posiblemente: «entre los que se atiborran de carne para sí». El hebreo final לָמוֹ es sintácticamente difícil y puede añadir énfasis más que una idea nueva y distinta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל + תְּהִי
  english_pob_choice: Do not be
  chosen_spanish: No estés
  alternatives_spanish:
  - No seas
  - No llegues a ser
  lexicon: HALOT
  rationale: La prohibición hebrea con אַל + imperfecto/jusivo se expresa naturalmente en español con un imperativo negativo. «Estés» conserva el matiz de permanencia/estado o asociación que el contexto pide, sin forzar un cambio de estado inexistente en el hebreo.
- source_word: בְסֹבְאֵי
  english_pob_choice: among heavy drinkers
  chosen_spanish: entre los bebedores empedernidos
  alternatives_spanish:
  - entre los borrachos
  - entre los bebedores excesivos
  - entre los que beben en exceso
  lexicon: HALOT
  rationale: 'El participio plural con ב indica asociación: «entre». סבא apunta a beber en exceso, no solo a beber. «Bebedores empedernidos» comunica el hábito excesivo sin caer en un coloquialismo demasiado fuerte o en una equivalencia vaga.'
- source_word: יָיִן
  english_pob_choice: of wine
  chosen_spanish: de vino
  alternatives_spanish:
  - de vino fermentado
  - de bebida alcohólica
  lexicon: HALOT
  rationale: El sustantivo concreto יַיִן debe mantenerse como «vino»; no hay razón textual para generalizarlo.
- source_word: בְזֹלֲלֵי
  english_pob_choice: among gluttonous eaters
  chosen_spanish: entre los glotones comedores
  alternatives_spanish:
  - entre los glotones
  - entre los que se atiborran
  lexicon: HALOT
  rationale: El participio plural con ב vuelve a marcar asociación. זלל comunica consumo desordenado o voraz. «Glotones comedores» conserva el valor participial y el paralelismo con la primera mitad del versículo.
- source_word: בָשָׂר
  english_pob_choice: of meat
  chosen_spanish: de carne
  alternatives_spanish:
  - de carne para ellos mismos
  - de carne para sí
  lexicon: HALOT
  rationale: בָשָׂר en este contexto se refiere a carne como alimento. «Carne» es el equivalente más directo y mantiene el paralelismo con «vino».
- source_word: לָמוֹ
  english_pob_choice: may add emphasis rather than a distinct new idea
  chosen_spanish: '[a]'
  alternatives_spanish:
  - para ellos
  - para sí
  - a ellos
  lexicon: HALOT
  rationale: El término final es sintácticamente difícil y puede funcionar como énfasis o como complemento idiomático del participio anterior. En español conviene no sobredeterminarlo en el cuerpo del texto; se preserva la incertidumbre en una nota.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la auditoría inglesa: se conservan las dos asociaciones prohibidas (bebida excesiva y voracidad), y se deja sin resolver de forma tajante el final difícil לָמוֹ, manteniendo su ambigüedad en una nota.'
  spanish_consistency_notes:
  - Se mantuvo «vino» y «carne» en sentido alimentario directo, sin ampliar a «bebidas alcohólicas» o «alimentos ricos», porque el paralelo hebreo es concreto.
  - Se eligió «entre» para reflejar correctamente el valor asociativo del prefijo ב en ambos miembros del verso.
  - «Bebedores empedernidos» y «glotones comedores» conservan el matiz habitual/participial del hebreo mejor que etiquetas meramente nominales.
