  yaml_path: translation/ot/2_kings/011/008.yaml
  text: You shall surround the king on every side[a], each man with his weapons in his hand. Whoever comes within the ranks shall be put to death[b]. Stay with the king when he goes out and when he comes in.
  footnotes:
