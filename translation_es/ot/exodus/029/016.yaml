revisions:
- from: Y sacrificarás el carnero[a], y tomarás su sangre y la rociarás sobre el altar, todo alrededor.
  to: Y sacrificarás el carnero, y tomarás su sangre y la salpicarás contra el altar, todo alrededor.[a]
  rationale: Se ajusta el verbo principal a «salpicarás» para reflejar mejor la fuerza ritual de זָרַק, y se cambia «sobre el altar» por «contra el altar» para preservar el matiz espacial documentado en el rastro POB. La alternativa más tradicional se conserva en nota.
