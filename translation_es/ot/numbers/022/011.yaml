translation:
  language: es
  text: ¡Mira[a], el pueblo que salió de Egipto ha cubierto la faz de la tierra! Ahora, ven; maldícelos por mí. Quizá pueda combatir contra ellos y expulsarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «ha cubierto el ojo de la tierra», un modismo para la superficie visible o la faz de la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira aquí!
  - ¡Observa!
  - He aquí
  lexicon: HALOT
  rationale: La interjección hebrea introduce la declaración con urgencia deíctica. «¡Mira!» conserva esa fuerza apelativa en un español natural y digno, sin caer en un arcaísmo innecesario como «He aquí».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: El pueblo
  alternatives_spanish:
  - La gente
  - La nación
  lexicon: HALOT
  rationale: El singular colectivo apunta a Israel como grupo identitario. «El pueblo» mantiene mejor ese valor colectivo que «la gente», y es más preciso que «la nación» en este contexto narrativo.
- source_word: הַיֹּצֵא מִמִּצְרַיִם
  english_pob_choice: who came out of Egypt
  chosen_spanish: que salió de Egipto
  alternatives_spanish:
  - que ha salido de Egipto
  - saliendo de Egipto
  lexicon: HALOT
  rationale: El participio con artículo identifica al pueblo por el éxodo. En español, la cláusula relativa «que salió de Egipto» reproduce bien esa función identificadora y evita una forma más pesada o menos idiomática.
- source_word: וַיְכַס
  english_pob_choice: have covered
  chosen_spanish: ha cubierto
  alternatives_spanish:
  - cubrió
  - cubren
  lexicon: HALOT
  rationale: Aunque el verbo es formalmente singular, el sujeto colectivo permite concordancia natural en español. El pretérito perfecto «ha cubierto» refleja el estado resultante que Balac describe como vigente.
- source_word: עֵין הָאָרֶץ
  english_pob_choice: the face of the land
  chosen_spanish: la faz de la tierra
  alternatives_spanish:
  - la superficie de la tierra
  - el ojo de la tierra
  lexicon: HALOT
  rationale: La imagen hebrea literalmente dice «el ojo de la tierra», pero el uso idiomático apunta a la superficie visible. «La faz de la tierra» preserva la metáfora con una expresión española bíblica y comprensible; «la superficie» sería más explicativa pero menos fiel al color figurado.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Entonces
  lexicon: HALOT
  rationale: Marca el giro urgente hacia la petición. «Ahora» es la equivalencia directa y natural en español.
- source_word: לְכָה
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - vamos
  - ven ahora
  lexicon: HALOT
  rationale: Es una fórmula imperativa de llamado/instancia. «Ven» conserva la urgencia del mandato sin añadir información que el hebreo no exige.
- source_word: קָבָה
  english_pob_choice: curse
  chosen_spanish: maldícemelo
  alternatives_spanish:
  - maldícelo para mí
  - declárale maldición
  lexicon: HALOT
  rationale: El verbo exige el acto de maldecir, y el contexto muestra que Balac pide acción en su favor. La forma enclítica «-melo» condensa «para mí / en mi favor» en español natural, manteniendo el sentido de petición personal del original.
- source_word: לִּי
  english_pob_choice: for me
  chosen_spanish: -melo
  alternatives_spanish:
  - para mí
  - en mi favor
  lexicon: HALOT
  rationale: 'El dativo de ventaja se integra en la forma verbal española para evitar redundancia pesada. Así se conserva la relación pragmática: Balac pide una acción que lo beneficie a él.'
- source_word: אֹתוֹ
  english_pob_choice: them
  chosen_spanish: lo
  alternatives_spanish:
  - los
  - al pueblo
  lexicon: HALOT
  rationale: El pronombre hebreo es singular formal pero remite al colectivo «el pueblo». En español, el clítico singular «lo» conserva la referencia a ese singular colectivo en el marco de una frase resumida y compacta; el contexto de «el pueblo» evita ambigüedad.
- source_word: אוּלַי אוּכַל
  english_pob_choice: Perhaps I will be able
  chosen_spanish: Quizá pueda
  alternatives_spanish:
  - Tal vez pueda
  - Quizá podré
  lexicon: HALOT
  rationale: La combinación expresa posibilidad esperada pero no segura. «Quizá pueda» reproduce bien esa modalidad sin sobrecargar el español.
- source_word: לְהִלָּחֶם בּוֹ
  english_pob_choice: to fight against them
  chosen_spanish: combatir contra él
  alternatives_spanish:
  - luchar contra él
  - hacerle guerra
  lexicon: HALOT
  rationale: El verbo refleja enfrentamiento bélico. Dado que el referente inmediato en español se mantiene como singular colectivo («el pueblo»), «combatir contra él» preserva la cohesión del referente; «luchar contra él» sería igualmente posible, pero «combatir» suena más técnico y militar.
- source_word: וְגֵרַשְׁתִּיו
  english_pob_choice: and drive them out
  chosen_spanish: y expulsarlo
  alternatives_spanish:
  - y echarlo
  - y desterrarlo
  lexicon: HALOT
  rationale: El verbo denota expulsión territorial/política. «Expulsarlo» transmite ese sentido de manera directa y controlada, evitando un matiz de castigo personal que tendría «desterrarlo».
theological_decisions:
- issue: Tratamiento del nombre colectivo Israel frente al singular gramatical
  english_pob_reading: The people / them
  chosen_spanish_reading: El pueblo / lo / él
  alternative_spanish_readings:
  - El pueblo / los / ellos
  - La nación / la
  rationale: El hebreo usa formas singulares para un referente colectivo. En español, mantener «el pueblo» y luego retomar con pronombres singulares ayuda a reflejar esa singularidad colectiva sin forzar plurales que borrarían la textura del hebreo.
  doctrine_reference: Gramática y semántica del singular colectivo en el texto hebreo
- issue: Imagen idiomática de «el ojo de la tierra»
  english_pob_reading: the face of the land
  chosen_spanish_reading: la faz de la tierra
  alternative_spanish_readings:
  - la superficie de la tierra
  - el ojo de la tierra
  rationale: El hebreo literal conserva una metáfora espacial. La elección «faz de la tierra» mantiene el valor figurado en un registro bíblico comprensible y evita una literalidad opaca, sin eliminar la tensión imagística del original.
  doctrine_reference: Poética y metáfora bíblica del hebreo
- issue: Petición de maldición con beneficio personal de Balac
  english_pob_reading: curse them for me
  chosen_spanish_reading: maldícemelo
  alternative_spanish_readings:
  - maldícelo para mí
  - pronuncia una maldición contra él por mí
  rationale: El original combina el imperativo con un dativo de ventaja. Integrar ese dativo en español mantiene el tono directo de la súplica y la intención política/personal del hablante sin introducir explicaciones ajenas al versículo.
  doctrine_reference: Pragmática del dativo de ventaja en narración bíblica
translation_notes:
  revision_awareness: Se siguió el estado más reciente del POB en inglés, con acuerdo alto y sin revisiones aplicadas; la presente propuesta conserva las decisiones léxicas y de sentido auditadas, adaptándolas a una sintaxis española natural y manteniendo el valor figurado clave de עֵין הָאָרֶץ.
  spanish_consistency_notes:
  - Se mantiene «pueblo» como singular colectivo para conservar la referencia gramatical del hebreo.
  - «Faz de la tierra» sigue el registro bíblico sin perder inteligibilidad contemporánea.
  - Se eligió una forma verbal compacta («maldícemelo») para reflejar el dativo de ventaja de לִּי sin añadir sobreexplicación.
