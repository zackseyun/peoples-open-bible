translation:
  language: es
  text: Porque todas las mesas están llenas de vómito e inmundicia[a], sin dejar lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin lugar» o «sin espacio»; el hebreo no dice explícitamente «dejando», pero el sentido es que no queda espacio sin contaminar. «Inmundicia» también puede entenderse, más fuertemente, como suciedad excrementicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduzco una causa o explicación del reproche anterior. «Porque» reproduce bien la función discursiva de כִּי y suena natural en español bíblico moderno sin forzar un énfasis que el hebreo no exige aquí.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - cada una de las
  - todas las
  lexicon: HALOT
  rationale: El hebreo tiene fuerza totalizadora. «Todas las mesas» conserva esa amplitud en español de manera directa y natural.
- source_word: שֻׁלְחָנוֹת
  english_pob_choice: tables
  chosen_spanish: mesas
  alternatives_spanish:
  - tablas
  - mesas de banquete
  lexicon: HALOT
  rationale: El sentido ordinario en este contexto es el de mesas de banquete o de comida. «Mesas» es el equivalente natural y mantiene la imagen concreta sin explicitar más de lo que el texto dice.
- source_word: מָלְאוּ
  english_pob_choice: are full
  chosen_spanish: están llenas
  alternatives_spanish:
  - han sido llenadas
  - están llenas
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un estado resultante. En español, «están llenas» comunica con naturalidad ese estado sin perder la idea de plenitud.
- source_word: קִיא
  english_pob_choice: vomit
  chosen_spanish: vómito
  alternatives_spanish:
  - vomitón
  - vómito
  lexicon: HALOT
  rationale: El sustantivo designa vómito de forma directa. Conservé el término crudo para mantener la fuerza de impureza e impacto del hebreo.
- source_word: צֹאָה
  english_pob_choice: filth
  chosen_spanish: suciedad
  alternatives_spanish:
  - inmundicia
  - excremento
  - heces
  lexicon: HALOT
  rationale: La palabra apunta a suciedad inmunda, incluso con posible matiz excrementicio. «Suciedad» preserva la idea de contaminación ritual y material sin introducir un nivel de crudeza no exigido por el contexto inmediato; en nota puede dejarse abierta la alternativa más fuerte.
- source_word: בְּלִי
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin
  - careciendo de
  lexicon: HALOT
  rationale: La preposición expresa ausencia. «Sin» es la forma más natural y fiel en español.
- source_word: מָקוֹם
  english_pob_choice: place left
  chosen_spanish: lugar
  alternatives_spanish:
  - espacio
  - lugar limpio
  - sitio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «lugar». En español, el contexto sugiere ausencia de espacio limpio o no contaminado; por eso mantengo «lugar» en el texto principal y explico el matiz resultante en nota, en vez de añadir «limpio» al cuerpo del versículo.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «with no place left» a «without a place left» para ajustar con mayor formalidad בְּלִי מָקוֹם. El español mantiene ese mismo valor con «sin lugar», conservando la literalidad del sintagma y el sentido contextual de ausencia total de espacio limpio.
  spanish_consistency_notes:
  - He mantenido «Yahvé» fuera del versículo porque no aparece en este texto.
  - He conservado un registro sobrio y bíblico, evitando paráfrasis explicativas dentro del texto principal.
  - La opción «suciedad» busca equilibrio entre inteligibilidad y la crudeza potencial del hebreo; la nota deja abierta la lectura más fuerte sin imponerla.
