id: COL.1.16
reference: Colossians 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ἐν αὐτῷ ἐκτίσθη τὰ ⸀πάντα ἐν τοῖς οὐρανοῖς ⸀καὶ ἐπὶ τῆς γῆς, τὰ ὁρατὰ καὶ τὰ ἀόρατα, εἴτε θρόνοι εἴτε κυριότητες εἴτε ἀρχαὶ εἴτε ἐξουσίαι· τὰ πάντα δι’ αὐτοῦ καὶ εἰς αὐτὸν ἔκτισται·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/016.yaml
  text: For in him all things were created, in the heavens and on the earth, the visible and the invisible, whether thrones or dominions or rulers or authorities; all things have been created through him and for him.
translation:
  language: ko
  text: 이는 만물이 그분 안에서 창조되었기 때문입니다. 하늘들[a]에 있는 것이나 땅 위에 있는 것이나, 보이는 것이나 보이지 않는 것이나, 보좌든 주권이든 통치자든 권세든, 만물이 그분으로 말미암아, 또 그분을 위하여 창조되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 복수형 「하늘들」(οὐρανοῖς)이다. 원어 형태를 보존하기 위해 복수로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_korean: 이는 ... 때문입니다
  alternatives_korean:
  - 왜냐하면
  - 이는 ~까닭에
  lexicon: BDAG
  rationale: 앞 절(아들의 우위)에 대한 근거를 제시한다. 한국어에서는 「이는 ~ 때문입니다」 구조가 자연스럽다.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_korean: 그분 안에서
  alternatives_korean:
  - 그분 안에
  - 그분으로 인하여
  lexicon: BDAG
  rationale: 처소격 ἐν을 보존하여 「안에서」로 옮긴다. 뒤의 δι’ αὐτοῦ(말미암아)와 εἰς αὐτὸν(위하여)와 구분된다.
- source_word: ἐκτίσθη ... τὰ πάντα
  english_pob_choice: all things were created
  chosen_korean: 만물이 ... 창조되었기
  alternatives_korean:
  - 모든 것이 창조되었기
  lexicon: BDAG
  rationale: 부정과거 수동. 「만물」은 한국 교회의 정립된 표현으로 우주적 범위를 잘 담는다.
- source_word: ἐν τοῖς οὐρανοῖς καὶ ἐπὶ τῆς γῆς
  english_pob_choice: in the heavens and on the earth
  chosen_korean: 하늘들에 있는 것이나 땅 위에 있는 것이나
  alternatives_korean:
  - 하늘과 땅의
  - 천상에 있는 것과 지상에 있는 것
  lexicon: BDAG
  rationale: 복수 「하늘들」을 보존한다. 「있는 것이나」 반복으로 우주적 범위의 균형을 살린다.
- source_word: τὰ ὁρατὰ καὶ τὰ ἀόρατα
  english_pob_choice: the visible and the invisible
  chosen_korean: 보이는 것이나 보이지 않는 것이나
  alternatives_korean:
  - 가시적인 것과 비가시적인 것
  lexicon: BDAG
  rationale: 형용사적 명사화 구조를 자연스러운 한국어로 옮긴다.
- source_word: εἴτε θρόνοι εἴτε κυριότητες εἴτε ἀρχαὶ εἴτε ἐξουσίαι
  english_pob_choice: whether thrones or dominions or rulers or authorities
  chosen_korean: 보좌든 주권이든 통치자든 권세든
  alternatives_korean:
  - 왕좌든 통치권이든 정사든 권능이든
  lexicon: BDAG
  rationale: εἴτε ... εἴτε 구조를 한국어 「~든 ~든」으로 옮긴다. 네 단어는 피조된 권세의 등급들을 가리킨다.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_korean: 그분으로 말미암아
  alternatives_korean:
  - 그분을 통하여
  - 그분에 의해
  lexicon: BDAG
  rationale: διά + 속격은 매개·수단을 가리킨다. ἐν αὐτῷ와 구분하기 위해 「말미암아」로 옮긴다.
- source_word: εἰς αὐτὸν
  english_pob_choice: for him
  chosen_korean: 그분을 위하여
  alternatives_korean:
  - 그분께로
  - 그분을 향하여
  lexicon: BDAG
  rationale: εἰς는 목적·종점을 가리킨다. 「위하여」로 창조의 목적을 표현한다.
- source_word: ἔκτισται
  english_pob_choice: have been created
  chosen_korean: 창조되었습니다
  alternatives_korean:
  - 창조되어 있습니다
  - 이미 창조되었습니다
  lexicon: BDAG
  rationale: 완료 수동. 합쇼체 종결문 「창조되었습니다」로 결과적 상태를 자연스럽게 표현한다.
theological_decisions:
- issue: 세 전치사 구문(ἐν αὐτῷ / δι’ αὐτοῦ / εἰς αὐτόν)의 구분
  chosen_reading: 그분 안에서 / 그분으로 말미암아 / 그분을 위하여
  alternative_readings:
  - 그분에 의해 / 그분을 통하여 / 그분에게로
  rationale: 본 절은 아들을 창조의 「영역·매개·목적」으로 제시한다. 헬라어가 세 전치사를 의도적으로 구분하므로, 한국어 번역도 세 가지 의미를 구분하여 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; thrice-distinct prepositional structure'
- issue: 「보좌·주권·통치자·권세」의 본성
  chosen_reading: 천사적·인간적 권세의 종류를 특정하지 않고 「피조된 권세의 등급」으로 옮김
  alternative_readings:
  - 명시적 천사 계급
  - 인간 정치 구조
  rationale: 본문은 권세의 종류들을 나열하나 그 본성을 좁히지 않는다. 본 번역도 본문이 명시하지 않은 존재론을 들여오지 않는다.
  doctrine_reference: 'DOCTRINE.md: Do not import doctrinal claims the text does not make'
