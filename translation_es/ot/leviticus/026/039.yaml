base_translation:
  language: en
  yaml_path: translation/ot/leviticus/026/039.yaml
  text: And those of you who remain will waste away in the lands of your enemies because of their iniquity[b][a]; and also because of the iniquities of their fathers with them they will waste away.
  footnotes:
