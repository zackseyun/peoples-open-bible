translation:
  language: es
  text: Y aconteció[a], cuando murió Ahab, que el rey de Moab se rebeló contra el rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «después de la muerte de Ahab». La expresión temporal hebrea puede vertirse de ambas maneras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce el siguiente hecho en la secuencia. «Aconteció» conserva ese giro narrativo en español bíblico comprensible sin volverlo torpe.
- source_word: כְּמוֹת אַחְאָב
  english_pob_choice: when Ahab died
  chosen_spanish: cuando murió Ahab
  alternatives_spanish:
  - después de la muerte de Ahab
  - al morir Ahab
  lexicon: HALOT
  rationale: El hebreo puede expresar «cuando murió» o «después de la muerte de». Se eligió la opción más natural y cercana al tiempo narrativo sin añadir más interpretación de la necesaria.
- source_word: אַחְאָב
  english_pob_choice: Ahab
  chosen_spanish: Ahab
  lexicon: standard proper-name transliteration
  rationale: Nombre propio conservado por transliteración estándar; no hay motivo para adaptación o traducción.
- source_word: וַיִּפְשַׁע
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se levantó en rebelión
  - actuó rebelándose
  lexicon: HALOT
  rationale: En este contexto político פשע denota ruptura de sujeción u hostilidad contra un soberano. «Se rebeló» comunica con claridad ese valor y mantiene la fuerza del verbo.
- source_word: מֶלֶךְ מוֹאָב
  english_pob_choice: the king of Moab
  chosen_spanish: el rey de Moab
  alternatives_spanish:
  - Moab, su rey
  - el monarca de Moab
  lexicon: HALOT
  rationale: La cadena constructa se vierte de modo directo y idiomático en español. «El rey de Moab» preserva el título formal del gobernante.
- source_word: בְּמֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: against the king of Israel
  chosen_spanish: contra el rey de Israel
  alternatives_spanish:
  - frente al rey de Israel
  - en contra del rey de Israel
  lexicon: HALOT
  rationale: Con פשע, la preposición señala el blanco de la rebelión; en español se expresa naturalmente con «contra». Esto hace explícita la relación política sin agregar contenido ajeno al hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés de POB. Se mantiene la equivalencia óptima del original: introducción narrativa con valor de secuencia, opción temporal flexible para כְּמוֹת, y «se rebeló contra» para reflejar el uso político de פשע con la preposición ב.'
  spanish_consistency_notes:
  - Se usa «Ahab» conforme al nombre propio usual y al contexto histórico del pasaje.
  - «Rebeló contra» conserva el sentido político de oposición al soberano, alineado con la decisión inglesa de «rebelled against».
  - Se evita «SEÑOR» u otro equivalente de máscara porque no aparece el nombre divino en este versículo.
