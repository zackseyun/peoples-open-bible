base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/015/008.yaml
  text: For your servant made a vow while I was dwelling in Geshur in Aram[a], saying, ‘If Yahweh indeed brings me back to Jerusalem[c][b], then I will serve Yahweh.’
  footnotes:
  - marker: a
    text: Or, more formally, 'For your servant vowed a vow.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression 'if the LORD indeed brings me back' uses an emphatic repetition of the verb 'bring back/return.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will worship the LORD.' The Hebrew verb can denote service rendered to God in worship.
    reason: lexical_alternative
