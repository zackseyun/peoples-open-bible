id: COL.1.1
reference: Colossians 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ διὰ θελήματος θεοῦ καὶ Τιμόθεος ὁ ἀδελφὸς
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/001.yaml
  text: Paul[a], an apostle of Messiah Jesus by the will of God, and Timothy our brother[b],
translation:
  language: ko
  text: 하나님의 뜻으로 말미암아 메시아[a] 예수의 사도가 된 바울과, 형제 디모데[b]는,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 헬라어 Χριστός는 칭호이며, 본 번역은 칭호의 무게를 유지하기 위해 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 본문은 「그 형제」(ὁ ἀδελφός)이나, 한국어 서신 인사 정식의 자연스러움을 위해 「형제 디모데」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_korean: 사도
  alternatives_korean:
  - 사자
  - 보냄받은 자
  lexicon: BDAG
  rationale: 바울의 자기 정체 진술에서 ἀπόστολος는 단순한 「전달자」가 아니라 인지된 직무·칭호이므로, 한국 교회 전통의 「사도」를 유지한다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: of Messiah Jesus
  chosen_korean: 메시아 예수의
  alternatives_korean:
  - 그리스도 예수의
  lexicon: BDAG
  rationale: Χριστός의 칭호성을 보존하기 위해 「메시아」로 옮긴다. 「~의 사도」 구조는 메시아 예수께 속하고 그분께서 보내신 사도임을 분명히 한다.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_korean: 하나님의 뜻으로 말미암아
  alternatives_korean:
  - 하나님의 뜻에 의해
  - 하나님의 뜻을 따라
  lexicon: BDAG
  rationale: διά + 속격은 수단·동인을 나타낸다. 「말미암아」는 사도직의 근원이 하나님의 뜻임을 자연스럽게 한국어로 표현한다.
- source_word: ὁ ἀδελφὸς
  english_pob_choice: our brother
  chosen_korean: 형제
  alternatives_korean:
  - 그 형제
  - 우리 형제
  lexicon: BDAG
  rationale: 헬라어는 정관사이지만 한국어 서신 인사에서는 「형제 디모데」로 옮기는 것이 가장 자연스럽다. 가족적·언약 공동체적 호칭의 무게는 그대로 살아 있다.
theological_decisions:
- issue: Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: DOCTRINE.md는 칭호로 기능하는 Χριστός를 칭호로 번역하도록 지시한다. 본 인사 정식에서도 칭호의 무게가 살아 있으므로 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
