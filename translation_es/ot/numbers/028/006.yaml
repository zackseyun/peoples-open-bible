translation:
  language: es
  text: Es el holocausto regular[a], hecho en el monte Sinaí[b] como olor agradable[c], una ofrenda de alimento[d] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘holocausto continuo’.
    reason: lexical_alternative
  - marker: b
    text: O ‘hecho/ofrecido en el monte Sinaí’. El participio hebreo puede traducirse más literalmente, pero aquí probablemente se refiere a la ofrenda instituida allí.
    reason: alternative_reading
  - marker: c
    text: O ‘aroma agradable’, ‘aroma apacible’ o ‘aroma dulce’.
    reason: lexical_alternative
  - marker: d
    text: 'Tradicionalmente: ‘ofrenda encendida para Yahvé’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלַת
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda ascendiente
  lexicon: HALOT
  rationale: En español bíblico, 'holocausto' comunica con precisión la ofrenda totalmente consumida por el fuego; es el equivalente cultual más asentado para עֹלָה. 'Ofrecimiento ascendiente' sería demasiado etimológico y poco natural.
- source_word: תָּמִיד
  english_pob_choice: regular
  chosen_spanish: regular
  alternatives_spanish:
  - continuo
  - diario
  lexicon: HALOT
  rationale: En contexto sacrificial, indica la ofrenda establecida como parte del ciclo ordinario y repetido. 'Regular' conserva esa idea sin forzar la noción de continuidad ininterrumpida.
- source_word: הָעֲשֻׂיָה
  english_pob_choice: made
  chosen_spanish: hecho
  alternatives_spanish:
  - hecha
  - realizado
  - preparado
  lexicon: HALOT
  rationale: El participio pasivo expresa literalmente 'hecha/hecho'. En español, 'hecho en el monte Sinaí' refleja la forma del texto sin expandirlo a 'establecida', aunque el contexto alude a la institución de la ofrenda allí.
- source_word: בְּהַר סִינַי
  english_pob_choice: at Mount Sinai
  chosen_spanish: en el monte Sinaí
  alternatives_spanish:
  - en el monte Sinaí
  - sobre el monte Sinaí
  lexicon: HALOT
  rationale: La preposición hebrea permite una ubicación asociada con Sinaí; 'en el monte Sinaí' es la forma más natural en español y mantiene la referencia geográfica del texto.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: pleasing aroma
  chosen_spanish: olor agradable
  alternatives_spanish:
  - aroma agradable
  - olor apacible
  - aroma suave
  lexicon: HALOT
  rationale: La expresión es un modismo sacrificial. 'Olor agradable' comunica la aceptación divina sin introducir una metáfora técnica ajena al español común; 'aroma' también sería posible, pero 'olor' es más directo y más cercano al hebreo.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda por fuego
  - ofrenda ígnea
  lexicon: HALOT
  rationale: Para הִשֶּׁה/אִשֶּׁה, el valor cultual remite a una ofrenda consumida por fuego. 'Ofrenda encendida' preserva ese rasgo sin sonar artificial en español; 'ofrenda por fuego' es más literal pero menos idiomática.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: HALOT
  rationale: Se adopta 'Yahvé' como forma española para el nombre divino, conforme a la política del proyecto. La preposición 'a' mantiene el sentido de ofrenda dirigida a Yahvé.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton de forma explícita. Siguiendo la directriz del proyecto, se traduce por 'Yahvé' en vez de enmascararlo como 'SEÑOR', preservando el nombre del pacto y su referencia directa en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Modismo sacrificial רֵיחַ נִיחֹחַ
  english_pob_reading: pleasing aroma
  chosen_spanish_reading: olor agradable
  alternative_spanish_readings:
  - aroma agradable
  - olor apacible
  - aroma suave
  rationale: El modismo comunica aceptación/gratitud cultual, no una descripción materialista. 'Olor agradable' conserva la imagen sensorial sin sobreinterpretarla y sigue siendo comprensible para lectores modernos.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Participio pasivo הָעֲשֻׂיָה
  english_pob_reading: made
  chosen_spanish_reading: hecho
  alternative_spanish_readings:
  - realizado
  - preparado
  - establecido
  rationale: El inglés POB revisó de 'established' a 'made' para mantenerse más cerca del participio. En español, 'hecho' refleja mejor la forma verbal básica, mientras que 'establecido' se reservaría para una interpretación más explícita de la institución en Sinaí.
  doctrine_reference: Applied revision 2026-04-23T11:18:38Z
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'established at Mount Sinai' por 'made at Mount Sinai' para reflejar con más cercanía el participio hebreo הָעֲשֻׂיָה. La redacción española sigue esa decisión al usar 'hecho en el monte Sinaí', sin introducir una expansión interpretativa mayor.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como equivalente del Tetragrámaton en el texto principal, coherente con la política del proyecto.
  - '''Holocausto'' se emplea por su valor técnico cultual; no se sustituye por ''burnt offering'' calco ni por ''sacrificio'' genérico.'
  - '''Olor agradable'' conserva el modismo sacrificial sin convertirlo en una explicación doctrinal.'
  - La frase final 'ofrenda encendida a Yahvé' preserva el valor de אִשֶּׁה y evita la fórmula tradicional 'ofrenda encendida al SEÑOR'.
