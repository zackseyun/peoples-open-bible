translation:
  language: es
  text: Yahvé mira hacia abajo desde los cielos a los hijos del hombre[a], para ver si hay alguien que tiene entendimiento, alguien que busca a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “los hijos de Adán” o “los hijos del hombre”, una expresión representativa que significa los seres humanos en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino, siguiendo la convención del proyecto para preservar la referencia personal del nombre de pacto sin sustituirlo por un título.
- source_word: מִשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  lexicon: HALOT
  rationale: El plural hebreo admite en español tanto singular como plural; aquí se mantiene el plural lexical 'los cielos' para reflejar más de cerca la forma hebrea, con una preposición natural en español.
- source_word: הִשְׁקִיף
  english_pob_choice: looks down
  chosen_spanish: mira desde arriba
  alternatives_spanish:
  - mira
  - observa desde arriba
  - mira desde los cielos
  lexicon: HALOT
  rationale: El verbo expresa mirar desde una altura con vista hacia abajo. En español, 'mira desde los cielos' conserva la imagen sin forzar un calco poco natural.
- source_word: בְּנֵי אָדָם
  english_pob_choice: the children of man
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos del hombre
  - la humanidad
  - los seres humanos
  lexicon: HALOT
  rationale: Se conserva la expresión representativa masculina del hebreo. 'Hijos de los hombres' refleja mejor la estructura idiomática que una neutralización como 'humanidad', que perdería la forma del original.
- source_word: מַשְׂכִּיל
  english_pob_choice: one who has insight
  chosen_spanish: alguien entendido
  alternatives_spanish:
  - uno que tiene entendimiento
  - una persona sabia
  - alguien con discernimiento
  lexicon: HALOT
  rationale: El participio denota una persona con entendimiento/insight. 'Entendido' es natural en español y mantiene el matiz de capacidad de comprender sin convertirlo en un término técnico de sabiduría.
- source_word: דֹּרֵשׁ
  english_pob_choice: one who seeks
  chosen_spanish: alguien que busque
  alternatives_spanish:
  - alguien que busca
  - uno que busca
  - quien busca
  lexicon: HALOT
  rationale: El participio describe a la persona buscada. 'Busque' en la subordinada final reproduce el valor prospectivo de 'to see whether there is' y mantiene el paralelismo con 'alguien entendido'.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - a Dios
  - el Dios verdadero
  lexicon: HALOT
  rationale: El objeto directo es פשוט 'Dios'; no se añade énfasis ni glosa, preservando la sencillez del hebreo.
theological_decisions:
- issue: Expresión representativa masculina בְּנֵי אָדָם
  english_pob_reading: the children of man
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - los hijos del hombre
  rationale: La frase hebrea es un idiomatismo colectivo para la humanidad, pero usa una forma masculina representativa. Se conserva esa forma en el texto principal y se explica el alcance genérico en nota para no borrar la señal lingüística del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea del proyecto pide una transliteración del Nombre divino. 'Yahvé' es la forma española establecida dentro de la política del POB en español y evita la sustitución por un título.
  doctrine_reference: DOCTRINE.md on divine-name rendering
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'sons of man' por 'children of man' para hacer más natural el inglés sin perder el sentido colectivo. En español se optó por conservar la estructura representativa del hebreo con una expresión igualmente transparente, evitando una neutralización que borraría la forma original.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para el Nombre divino.
  - Se preservó el paralelismo participial con 'alguien entendido, alguien que busque a Dios'.
  - '''Desde los cielos'' sigue la imagen hebrea plural sin forzar una singularización.'
  - La nota explica el valor genérico de 'los hijos de los hombres' sin alterar el texto principal.
