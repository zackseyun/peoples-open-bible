translation:
  language: es
  text: De la primera parte[a] de vuestra masa, levantaréis un pan como contribución[b]; como la contribución de la era, así la levantaréis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de lo primero de vuestra masa». El hebreo puede expresar la primera porción; el término relacionado con «masa» también puede referirse, por extensión, al recipiente de amasar.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «ofrenda elevada». El hebreo denota una contribución apartada y presentada.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: from the first of
  chosen_spanish: de las primicias
  alternatives_spanish:
  - de la primera parte
  - de lo primero
  lexicon: HALOT
  rationale: רֵאשִׁית expresa la porción inicial o primera. En español, «primicias» conserva la idea de la primera porción separada y suena bíblico sin volverse arcaico. Se evita una perífrasis demasiado pesada, aunque el sentido partitivo queda claro por el contexto.
- source_word: עֲרִסֹתֵיכֶם
  english_pob_choice: your dough
  chosen_spanish: vuestra masa
  alternatives_spanish:
  - vuestra masa para amasar
  - vuestra masa de amasado
  lexicon: HALOT
  rationale: El término puede referirse a la masa misma o, por metonimia, al recipiente de amasado. Como aquí se toma una porción para ofrendar, «masa» comunica bien el material de partida y mantiene naturalidad en español.
- source_word: חַלָּה
  english_pob_choice: a loaf
  chosen_spanish: una torta
  alternatives_spanish:
  - un pan
  - una torta de pan
  lexicon: HALOT
  rationale: El hebreo puede referirse a un pan/cake formado para ser apartado. «Torta» reproduce mejor la idea de una pieza de masa/pan modelado que «pan» a secas, y evita el posible malentendido de un postre. Se mantiene el sentido material, no culinario moderno.
- source_word: תָּרִימוּ
  english_pob_choice: you shall lift up
  chosen_spanish: levantaréis
  alternatives_spanish:
  - presentaréis
  - ofreceréis
  lexicon: HALOT
  rationale: El verbo en contexto de contribución/ofrenda tiene el valor literal de «levantar». En español, «levantaréis» preserva la conexión léxica con תרומה y evita sustituirla de entrada por un verbo más interpretativo.
- source_word: תְרוּמָה
  english_pob_choice: a contribution
  chosen_spanish: ofrenda
  alternatives_spanish:
  - contribución
  - ofrenda elevada
  lexicon: HALOT
  rationale: «תרומה» es una porción apartada y presentada. «Ofrenda» es transparente para el lector español y comunica la acción cultual sin usar el tecnicismo tradicional «ofrenda mecida/heave offering». Se preserva la tensión con la etimología al conservar «levantaréis» en el verbo.
- source_word: כִּתְרוּמַת גֹּרֶן
  english_pob_choice: like the contribution of the threshing floor
  chosen_spanish: como la ofrenda de la era
  alternatives_spanish:
  - como la contribución de la era
  - como la ofrenda del lugar de trillar
  lexicon: HALOT
  rationale: גֹּרֶן designa la era, el lugar donde se trilla y se separa el grano. «De la era» es más natural y más cercano al sustantivo hebreo que una glosa explicativa; conserva la imagen agrícola y la comparación ritual.
- source_word: גֹּרֶן
  english_pob_choice: threshing floor
  chosen_spanish: era
  alternatives_spanish:
  - era de trilla
  - lugar de trillar
  lexicon: HALOT
  rationale: La equivalencia estable en español bíblico para גֹּרֶן es «era». Es clara y fiel, y evita alargar el verso con una explicación innecesaria.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de igual modo
  lexicon: HALOT
  rationale: Marcador comparativo conclusivo. «Así» es la forma más natural y directa en español.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - esa torta
  - esa ofrenda
  lexicon: HALOT
  rationale: El pronombre femenino retoma la torta/ofrenda. En español, el clítico «la» es natural y conserva la referencia femenina del antecedente.
translation_notes:
  revision_awareness: La base inglesa revisada mantuvo estable el sentido general y afinó μόνο la relación preposicional en «of the threshing floor» para acercarse más al hebreo. La redacción española sigue esa decisión, conservando el paralelismo entre el gesto de «levantar» y la terminología de la ofrenda.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este verso porque el hebreo no contiene el nombre divino.
  - Se preserva el paralelismo verbal entre «levantaréis» y la terminología de la ofrenda para no perder la conexión léxica del hebreo.
  - Se eligió un español bíblico claro y contemporáneo, evitando tecnicismos litúrgicos opacos.
