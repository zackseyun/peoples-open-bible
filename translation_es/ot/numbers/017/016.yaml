lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Y dijo
  lexicon: HALOT
  rationale: El verbo hebreo דבר marca avance narrativo. «Entonces ... habló» conserva ese flujo en español de forma natural, mientras mantiene el acto de hablar. «Y ... habló» sería más pegado al hebreo, pero menos idiomático; «Y dijo» suaviza demasiado el matiz verbal específico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con una transliteración reverente y auditable. «Yahvé» es la forma adoptada para el texto principal en español; «el SEÑOR» ocultaría el nombre propio, y «Yahveh» es una variante ortográfica posible pero menos usual en este proyecto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición indica dirección del habla hacia Moisés. En español, «a» es la equivalencia más clara y natural en este contexto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: La fórmula introductoria לֵאמֹר se refleja con «diciendo», que mantiene la transición a discurso directo sin expandir el contenido. «Y dijo» añadiría una coordinación no explícita; «al decir» suena más forzado aquí.
theological_decisions:
- issue: Nombre divino YHWH en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton יְהוָה. Se conserva como nombre propio en español para no sustituirlo por un título. La forma «Yahvé» mantiene la decisión teológica y textual de visibilizar el nombre revelado de Dios a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto coincide con el pasaje hebreo breve y con el auditable inglés POB: solo hay un marco narrativo, el sujeto divino con nombre propio, el destinatario Moisés y la fórmula introductoria «diciendo». No se requieren revisiones textuales ni notas de variante más allá del nombre divino.'
  spanish_consistency_notes:
  - Se mantiene el estilo bíblico sobrio y moderno del proyecto.
  - Se evita «SEÑOR» para no ocultar el Tetragrámaton.
  - «Entonces» reproduce adecuadamente el valor narrativo de la waw-consecutiva sin calcar la sintaxis hebrea.
  - La puntuación con coma final refleja la función introductoria de לֵאמֹר.
