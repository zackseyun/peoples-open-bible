translation:
  language: es
  text: Prepara tus palabras[a], y entonces serás escuchado; une la instrucción, y responde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Prepara una palabra» o «tu discurso»; el griego λόγον puede ser singular («una palabra» o «un discurso»), y «une la instrucción» es una metáfora que también podría traducirse de manera más interpretativa como «organiza la instrucción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑτοίμασον
  english_pob_choice: Prepare
  chosen_spanish: Prepara
  alternatives_spanish:
  - Haz listas
  - Ten listo
  - Prepárate
  lexicon: LSJ
  rationale: El imperativo de ἑτοιμάζω exige una acción deliberada de preparación. «Prepara» conserva el mandato directo en un español natural y fiel.
- source_word: λόγον
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - una palabra
  - tu discurso
  - tu argumento
  lexicon: LSJ
  rationale: λόγος puede referirse a palabra, discurso o argumento. El contexto sapiencial trata de lo que se va a decir; en español, el plural «palabras» suena más natural tras «prepara», sin perder la idea de discurso preparado.
- source_word: οὕτως
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - así
  - de este modo
  lexicon: LSJ
  rationale: El adverbio marca consecuencia o manera. «Entonces» comunica bien la relación causal y temporal entre preparar la խոսca y ser escuchado.
- source_word: ἀκουσθήσῃ
  english_pob_choice: you will be heard
  chosen_spanish: serás escuchado
  alternatives_spanish:
  - te escucharán
  - serás oído
  lexicon: LSJ
  rationale: El futuro pasivo de ἀκούω pide una construcción pasiva o equivalente. «Serás escuchado» mantiene el sentido de obtener audiencia, con un español digno y claro.
- source_word: σύνδησον
  english_pob_choice: bind together
  chosen_spanish: reúne
  alternatives_spanish:
  - ata junto
  - agrupa
  - encadena
  lexicon: LSJ
  rationale: La metáfora literalmente es «atar/juntar». En español, «reúne» comunica con más naturalidad la idea de juntar el material antes de responder, aunque atenúa la imagen de atadura.
- source_word: παιδείαν
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la disciplina
  - la enseñanza
  - la formación
  lexicon: LSJ
  rationale: En literatura sapiencial, παιδεία apunta a enseñanza formativa. «Instrucción» preserva ese valor sin sugerir primariamente castigo disciplinario.
- source_word: ἀποκρίθητι
  english_pob_choice: answer
  chosen_spanish: responde
  alternatives_spanish:
  - contesta
  - da respuesta
  lexicon: LSJ
  rationale: El imperativo medio de ἀποκρίνομαι significa contestar/responder. «Responde» es directo, idiomático y fiel al mandato final.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete (1910/1909) y la solución auditada en inglés POB, manteniendo la tensión lexical de λόγον y la metáfora de σύνδησον, aunque en español se opta por una versión más fluida de esa imagen.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en este pasaje no aparece ninguno de esos términos.
  - «Instrucción» mantiene el valor sapiencial de παιδεία sin cargarlo como castigo.
  - La pasiva «serás escuchado» conserva el matiz de obtener audiencia del griego ἀκουσθήσῃ.
