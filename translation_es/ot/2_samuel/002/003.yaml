translation:
  language: es
  text: Y David hizo subir a los hombres que estaban con él, cada hombre con su familia, y se establecieron en las ciudades de Hebrón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en los poblados de Hebrón». El hebreo puede referirse a los asentamientos pertenecientes al área de Hebrón, más que a un solo centro urbano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנָשָׁיו
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - sus hombres
  - los hombres que eran de él
  lexicon: HALOT
  rationale: אֲנָשָׁיו significa literalmente «sus hombres». En español, «los hombres» fluye con naturalidad en este contexto, mientras que la frase relativa posterior «que estaban con él» ya identifica al grupo sin perder el referente personal y masculino.
- source_word: אֲשֶׁר עִמּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban junto a él
  - que iban con él
  lexicon: HALOT
  rationale: La cláusula relativa señala al grupo acompañante de David. «Que estaban con él» conserva el valor relacional de manera natural en español moderno.
- source_word: הֶעֱלָה
  english_pob_choice: brought up
  chosen_spanish: hizo subir
  alternatives_spanish:
  - trajo
  - lo llevó arriba
  - hizo ascender
  lexicon: HALOT
  rationale: El hifil de עלה suele expresar «hacer subir» o «llevar arriba». Dado el movimiento hacia Hebrón y su región montañosa, «hizo subir» conserva mejor la orientación geográfica que un simple «trajo».
- source_word: אִישׁ וּבֵיתוֹ
  english_pob_choice: each man with his household
  chosen_spanish: cada hombre con su casa
  alternatives_spanish:
  - cada hombre con su familia
  - cada hombre y su casa
  lexicon: HALOT
  rationale: 'אִישׁ funciona distributivamente: cada unidad masculina junto con los suyos. «Casa» mantiene con más cercanía la imagen del hebreo; «familia» aclara, pero suaviza demasiado el término base. Se conserva además la correspondencia con la tensión semántica de בַּיִת como casa/casa-hogar.'
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they settled
  chosen_spanish: se establecieron
  alternatives_spanish:
  - habitaron
  - se quedaron
  - se asentaron
  lexicon: HALOT
  rationale: ישב en este contexto de traslado expresa la idea de fijar residencia. «Se establecieron» comunica mejor ese resultado que un calco como «habitaron».
- source_word: בְּעָרֵי חֶבְרוֹן
  english_pob_choice: in the towns of Hebron
  chosen_spanish: en las ciudades de Hebrón
  alternatives_spanish:
  - en los pueblos de Hebrón
  - en las ciudades de la región de Hebrón
  lexicon: HALOT
  rationale: עָרִים puede referirse a ciudades o poblados. Siguiendo la nota auditada del inglés, «ciudades de Hebrón» mantiene abierta la posibilidad de que se trate de los asentamientos del área de Hebrón, sin forzar una interpretación demasiado específica.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: HALOT
  rationale: Se usa la forma española habitual del topónimo, «Hebrón», para una lectura natural y reconocible en español bíblico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el rastro auditado en inglés. Se mantuvo la tensión entre «ciudades» y «área de Hebrón» mediante una nota de alternativa, como en el POB inglés.
  spanish_consistency_notes:
  - Se prefirió «Hebrón» como forma española estándar del nombre propio.
  - «Hizo subir» preserva la dirección ascendente implícita en עלה.
  - «Casa» conserva la ambigüedad controlada de בֵּיתוֹ entre casa física y hogar/household.
