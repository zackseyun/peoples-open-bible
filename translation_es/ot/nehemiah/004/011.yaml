base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/004/011.yaml
  text: The builders on the wall[a], and those who carried burdens, loaded themselves so that with one hand each did the work[b], and with the other held his weapon.
  footnotes:
  - marker: a
    text: Or 'those bearing loads were loaded'; the Hebrew participle עֹמְשִׂים is rare, and its precise nuance is difficult, but the sense is that the laborers handled materials while remaining armed.
    reason: lexical_alternative
  - marker: b
    text: Hebrew הַשָּׁלַח may refer more specifically to a spear, dart, or other weapon.
    reason: lexical_alternative
