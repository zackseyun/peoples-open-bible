translation:
  language: es
  text: ¿Todavía no entienden[a], ni recuerdan los cinco panes para los cinco mil, y cuántas canastas recogieron[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Todavía no comprenden?»
    reason: lexical_alternative
  - marker: b
    text: O «cuántas canastas tomaron»
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔπω
  english_pob_choice: still not
  chosen_spanish: Todavía no
  alternatives_spanish:
  - Aún no
  - No todavía
  lexicon: BDAG
  rationale: El adverbio expresa una negación temporal en una reprensión. «Todavía no» comunica con naturalidad que la falta de comprensión persiste hasta el presente, sin perder la fuerza retórica de la pregunta.
- source_word: νοεῖτε
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - comprenden
  - perciben
  - captan
  lexicon: BDAG
  rationale: Aquí νοέω se refiere a comprender el sentido de lo ocurrido, no a simple percepción sensorial. «Entienden» es natural en español actual y mantiene el sentido intelectual.
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - y no
  lexicon: BDAG
  rationale: En español, «ni» reproduce bien la coordinación negativa entre los dos verbos y evita una construcción forzada.
- source_word: μνημονεύετε
  english_pob_choice: remember
  chosen_spanish: recuerdan
  alternatives_spanish:
  - se acuerdan
  - tienen presente
  lexicon: BDAG
  rationale: El verbo denota traer a la memoria el hecho anterior. «Recuerdan» es la correspondencia más directa y clara para este contexto narrativo.
- source_word: τοὺς πέντε ἄρτους
  english_pob_choice: the five loaves
  chosen_spanish: los cinco panes
  alternatives_spanish:
  - los cinco panes de pan
  - los cinco panes/loaves
  lexicon: BDAG
  rationale: ἄρτος en el relato de la alimentación se refiere a panes o panes redondos. «Panes» es el término natural y fiel en español; «loaves» no requiere calco.
- source_word: τῶν πεντακισχιλίων
  english_pob_choice: for the five thousand
  chosen_spanish: para los cinco mil
  alternatives_spanish:
  - de los cinco mil
  - de entre los cinco mil
  lexicon: BDAG
  rationale: La expresión se relaciona con el milagro de la alimentación de los cinco mil. «Para los cinco mil» hace explícita esa asociación, como en el auditable inglés POB.
- source_word: πόσους κοφίνους
  english_pob_choice: how many baskets
  chosen_spanish: cuántas canastas
  alternatives_spanish:
  - cuántos canastos
  - cuántas cestas
  lexicon: BDAG
  rationale: κόφινος designa una canasta o cesto. «Canastas» es claro y ampliamente entendible en español latinoamericano; conserva la imagen concreta del texto.
- source_word: ἐλάβετε
  english_pob_choice: you gathered
  chosen_spanish: recogieron
  alternatives_spanish:
  - tomaron
  - levantaron
  - juntaron
  lexicon: BDAG
  rationale: En este contexto, λαμβάνω alude a recoger los pedazos sobrantes en las canastas. «Recogieron» comunica el acto con naturalidad; «tomaron» sería menos preciso para el contexto.
theological_decisions:
- issue: Forma de la reprensión y fuerza de la pregunta
  english_pob_reading: Do you still not understand, nor do you remember...
  chosen_spanish_reading: ¿Todavía no entienden, ni recuerdan...?
  alternative_spanish_readings:
  - ¿Aún no comprenden, ni recuerdan...?
  - ¿Todavía no comprenden, ni se acuerdan...?
  rationale: No hay cambio doctrinal; la decisión busca preservar la reprensión incisiva del original y del POB inglés, manteniendo una pregunta retórica directa sin suavizarla.
  doctrine_reference: No aplica
- issue: Relación de los panes con la alimentación de los cinco mil
  english_pob_reading: the five loaves for the five thousand
  chosen_spanish_reading: los cinco panes para los cinco mil
  alternative_spanish_readings:
  - los cinco panes de los cinco mil
  - los cinco panes del grupo de los cinco mil
  rationale: La construcción española mantiene la referencia al milagro específico sin introducir interpretación adicional. «Para» sigue la decisión auditada del inglés y conserva la vinculación contextual.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'El inglés POB revisó la coordinación negativa para añadir «do you» después de «nor», manteniendo la paralelización natural. La versión española conserva esa doble estructura con «ni» y mantiene el paralelismo verbal: «¿Todavía no entienden, ni recuerdan...?»'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se usa «panes» para ἄρτους por adecuación al relato de multiplicación de panes, sin recurrir a calco literal.
  - Se usa «canastas» para κοφίνους porque es un equivalente transparente y ampliamente comprendido.
  - Se conserva el tono de reproche interrogativo sin añadir explicaciones inexistentes en el texto.
