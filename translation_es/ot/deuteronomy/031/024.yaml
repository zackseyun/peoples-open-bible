    issue: La frase final «hasta que estuvieron completas» es poco natural y algo ambigua.
    rationale: El hebreo עַד תֻּמָּם marca la culminación/completitud de las palabras escritas. En español, «estuvieron completas» sugiere más un estado constatado que el proceso llevado a término, y además deja menos claro el referente. «Hasta que se completaron» o similar comunica mejor la finalización.
