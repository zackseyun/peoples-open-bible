translation:
  language: es
  text: No muestra parcialidad al pobre[a], y oye la súplica del oprimido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Variante griega: «El espíritu de los que temen al Señor vivirá, porque su esperanza está en el que los salva». Aquí el griego refleja una forma textual sustancialmente distinta del hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: לא ישא פנים אל דל
  english_pob_choice: does not show partiality to the poor
  chosen_spanish: no muestra parcialidad a favor del pobre
  alternatives_spanish:
  - no hace acepción de personas respecto del pobre
  - no favorece al pobre
  lexicon: HALOT
  rationale: La imagen hebrea de ‘alzar el rostro’ se entiende idiomáticamente como mostrar favoritismo o hacer acepción. En español, ‘mostrar parcialidad a favor de’ conserva ese valor relacional y evita sugerir injusticia contra los pobres, que el paralelismo no exige.
- source_word: דל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el débil
  - el humilde
  lexicon: HALOT
  rationale: דל puede abarcar pobreza y fragilidad social. ‘El pobre’ es la opción más directa y transparente; el contexto de la línea siguiente conserva la dimensión de vulnerabilidad.
- source_word: πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - la vida
  - el aliento
  lexicon: BDAG
  rationale: El griego introduce ‘espíritu’, no ‘vida’ ni ‘aliento’. En español, ‘espíritu’ mantiene el término del testigo griego y su posible carga antropológica o vital sin reducirla prematuramente.
- source_word: φοβουμένων Κύριον
  english_pob_choice: those who fear the Lord
  chosen_spanish: de los que temen a Yahvé
  alternatives_spanish:
  - de los que temen al Señor
  - de los reverentes ante Yahvé
  lexicon: BDAG / LXX usage
  rationale: Se conserva el verbo ‘temer’ como en el griego. ‘Yahvé’ sigue la norma del proyecto para el nombre divino; no se sustituye por ‘Señor’ para no ocultar el nombre presente en la tradición del texto base.
- source_word: ζήσεται
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá plenamente
  - permanecerá con vida
  lexicon: BDAG
  rationale: El futuro griego se vierte de forma simple y natural. ‘Vivirá’ es fiel y no añade matices no explicitados por el texto.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - expectativa
  lexicon: BDAG
  rationale: ‘Esperanza’ es el equivalente natural y mantiene el valor de confianza orientada al futuro.
- source_word: σώζοντα αὐτούς
  english_pob_choice: the one who saves them
  chosen_spanish: el que los salva
  alternatives_spanish:
  - el Salvador
  - quien los salva
  lexicon: BDAG
  rationale: 'El participio griego funciona sustantivamente: ‘el que salva’. Se evita ‘Salvador’ para no convertir una construcción verbal en un título no explícito. ‘Los’ mantiene el referente plural del griego.'
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el griego de la Septuaginta
  english_pob_reading: Follow the Hebrew Cairo Geniza witness in the main text, with the Greek preserved as a textual-variant footnote.
  chosen_spanish_reading: Seguir el hebreo conservado en la línea principal, y preservar el griego como variante textual en nota.
  alternative_spanish_readings:
  - Traducir solo el hebreo y omitir el griego
  - Colocar el griego en el cuerpo principal
  rationale: Para Sirácides, el proyecto traduce desde el hebreo donde se conserva, usando el griego como apoyo y control. Aquí el testigo griego no es un simple paralelo léxico, sino una forma textual sustancialmente distinta; por eso no debe desplazar al hebreo en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde se conserva; usar la LXX de Swete como contraste auditado.'
translation_notes:
  revision_awareness: La versión inglesa auditada del proyecto decidió no adoptar el griego en el texto principal porque el hebreo conservado en este versículo presenta una redacción diferente y prioritaria para Sirácides. La revisión más reciente ajustó la dirección de la parcialidad en inglés; en español se siguió el sentido idiomático confirmado por esa revisión, pero se formuló de manera natural con ‘a favor de’ para no perder la fuerza de favoritismo implícita en el hebreo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ según la norma del proyecto para el nombre divino.
  - Se mantiene ‘espíritu’ por la lectura griega, no ‘vida’, en el texto principal.
  - La nota al pie conserva explícitamente la variante griega para auditoría textual.
  - No se introduce ‘Cristo’ ni lenguaje eclesial ajeno al verso.
