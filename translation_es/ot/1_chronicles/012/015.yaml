translation:
  language: es
  text: Estos eran de entre los hijos de Gad[a], jefes del ejército; el menor era para cien, y el mayor para mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «uno para cien, y el grande para mil»; un giro que expresa capacidad o eficacia militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Estos
  - Estos son
  lexicon: HALOT
  rationale: El demostrativo plural introduce a los hombres enumerados. En español, el verbo copulativo se añade de manera natural para una cláusula nominal pasada.
- source_word: מִבְּנֵי גָד
  english_pob_choice: from the sons of Gad
  chosen_spanish: de los hijos de Gad
  alternatives_spanish:
  - de los gaditas
  - de los hijos de Gad
  lexicon: HALOT
  rationale: Mantiene de cerca la expresión tribal/familiar del hebreo sin reemplazarla por un gentilicio más interpretativo.
- source_word: רָאשֵׁי הַצָּבָא
  english_pob_choice: heads of the army
  chosen_spanish: jefes del ejército
  alternatives_spanish:
  - cabezas del ejército
  - jefes de la tropa
  - comandantes del ejército
  lexicon: HALOT
  rationale: ‘Roshim’ comunica jefatura o mando; ‘jefes’ es natural en español y conserva el sentido militar de liderazgo.
- source_word: אֶחָד לְמֵאָה
  english_pob_choice: the least was for a hundred
  chosen_spanish: el menor era para cien
  alternatives_spanish:
  - uno para cien
  - el menor era para un ciento
  - el más pequeño era para cien
  lexicon: HALOT
  rationale: El hebreo es elíptico y expresa proporción numérica. ‘Para cien’ conserva esa forma breve sin añadir una metáfora de rendimiento que el texto no explicita.
- source_word: הַקָּטָן
  english_pob_choice: the least
  chosen_spanish: el menor
  alternatives_spanish:
  - el más pequeño
  - el menor de ellos
  - el más débil
  lexicon: HALOT
  rationale: En este contraste comparativo, ‘el menor’ comunica rango relativo de manera natural en español y evita introducir una idea de debilidad que no está en el lexema mismo.
- source_word: וְהַגָּדוֹל לְאָלֶף
  english_pob_choice: and the greatest for a thousand
  chosen_spanish: y el mayor para mil
  alternatives_spanish:
  - y el más grande para mil
  - y el mayor era para mil
  - y el mayor contra mil
  lexicon: HALOT
  rationale: 'Se conserva el paralelismo con la primera mitad: una comparación numérica directa. ‘Mayor’ funciona bien para el contraste con ‘menor’ y mantiene la brevedad del hebreo.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca en el texto español, anclado en ‘Gad[a]’. La redacción sigue de cerca el hebreo y el ajuste editorial inglés que retiró ‘a match for’ para no añadir una idiomatización inexistente en el original.
  spanish_consistency_notes:
  - Se evitó ‘Mesías/Cristo’ y otras terminologías no pertinentes al versículo.
  - ‘Ejército’ traduce הַצָּבָא en sentido militar, coherente con el contexto de liderazgo bélico.
  - La proporcionalidad ‘para cien / para mil’ preserva la forma elíptica del hebreo sin sobreexplicar la frase.
