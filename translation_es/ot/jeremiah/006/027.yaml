translation:
  language: es
  text: Yo te he puesto como probador[a] entre mi pueblo, como fortaleza, para que conozcas y examines su camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ensayador entre mi pueblo, una fortaleza»; el hebreo es compacto y algo difícil. «Ensayador» destaca la imagen de probar metales que encaja con el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Su camino» también puede significar «su conducta» o «su manera de vivir».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּחוֹן
  english_pob_choice: a tester
  chosen_spanish: crisol
  alternatives_spanish:
  - probador
  - examinador
  - ensayador
  lexicon: HALOT
  rationale: El sustantivo deriva de la raíz בחן, asociada con probar o examinar, especialmente en un contexto de metalurgia o ensayo de metales. «Crisol» conserva la imaginería de prueba por fuego/metales que el contexto sugiere mejor que un término abstracto, y en español resulta más natural que «ensayador».
- source_word: נְתַתִּיךָ
  english_pob_choice: I have made you
  chosen_spanish: te he puesto
  alternatives_spanish:
  - te he hecho
  - te he establecido
  - te he dado
  lexicon: HALOT
  rationale: נָתַן puede significar dar, poner o establecer. «Te he puesto» expresa en español la idea de designación para una función, de forma más fiel y natural que «te he hecho».
- source_word: בְעַמִּי
  english_pob_choice: among my people
  chosen_spanish: entre mi pueblo
  alternatives_spanish:
  - en mi pueblo
  - en medio de mi pueblo
  lexicon: HALOT
  rationale: La preposición ב admite el sentido de «entre» en este tipo de colocación dentro de un grupo. «Entre mi pueblo» conserva la relación de ubicación social y funcional sin forzar una traducción literal rígida.
- source_word: מִבְצָר
  english_pob_choice: a fortress
  chosen_spanish: fortaleza
  alternatives_spanish:
  - fortín
  - plaza fuerte
  - baluarte
  lexicon: HALOT
  rationale: El sustantivo designa una posición fortificada. «Fortaleza» mantiene la imagen concreta y es el equivalente más transparente en español. Se evita suavizarlo a una cualidad abstracta porque el hebreo conserva un sustantivo físico.
- source_word: וְתֵדַע
  english_pob_choice: so that you may know
  chosen_spanish: para que conozcas
  alternatives_spanish:
  - y conozcas
  - y así conozcas
  - de modo que conozcas
  lexicon: HALOT
  rationale: Aunque la forma conjuntiva puede leerse secuencialmente, aquí funciona naturalmente con valor de finalidad en el contexto. «Para que conozcas» expresa esa relación sin perder la secuencia lógica del encargo.
- source_word: וּבָחַנְתָּ
  english_pob_choice: and test
  chosen_spanish: y examines
  alternatives_spanish:
  - y pruebes
  - y pruebes a fondo
  - y sometas a prueba
  lexicon: HALOT
  rationale: El verbo repite la raíz בחן, por lo que conviene mantener la cohesión léxica con el sustantivo anterior. «Examines» comunica la acción de poner a prueba de manera clara; en español, «pruebes» podía sonar menos preciso en este contexto.
- source_word: דַּרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su conducta
  - su proceder
  - su manera de vivir
  lexicon: HALOT
  rationale: דֶּרֶךְ puede referirse a camino literal o a conducta. «Su camino» preserva la metáfora hebrea y deja abierta la carga moral del contexto, como hace la lectura inglesa con «their way».
translation_notes:
  revision_awareness: El testimonio inglés revisado muestra alta concordancia y sin cambios sustanciales en la última pasada; se mantiene la decisión de conservar el doble campo semántico de prueba/metáfora fortificada sin emendar el hebreo.
  spanish_consistency_notes:
  - Se conserva la repetición conceptual de prueba mediante «crisol» y «examines».
  - Se mantiene el registro bíblico sobrio con sintaxis clara y moderna.
  - Se evita reemplazar la metáfora concreta por una abstracción interpretativa.
  - La preposición «entre» reproduce mejor el valor relacional de ב que un simple «en» en español.
