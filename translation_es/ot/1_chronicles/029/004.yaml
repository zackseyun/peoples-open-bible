translation:
  language: es
  text: tres mil talentos de oro[a], del oro de Ofir, y siete mil talentos de plata refinada, para recubrir las paredes de los edificios[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «del oro de Ofir». El hebreo puede entenderse como oro procedente de Ofir o como un genitivo descriptivo.'
    reason: lexical_alternative
  - marker: b
    text: «Talentos» es una unidad de peso, no una referencia a habilidad o capacidad.
    reason: cultural_note
lexical_decisions:
- source_word: שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres millares
  lexicon: HALOT
  rationale: La construcción cardinal se vierte de manera directa y natural en español. "Tres mil" preserva sin artificio el valor numérico del hebreo.
- source_word: כִּכְּרֵי / כִּכַּר
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - medidas
  - pesos
  lexicon: HALOT
  rationale: El término designa una unidad antigua de peso; "talentos" conserva ese valor histórico y sigue la solución de la tradición de traducción, sin convertirlo en una medida moderna imprecisa.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: Término material directo. "Oro" es el equivalente normal y fiel en español.
- source_word: מִזְּהַב אוֹפִיר
  english_pob_choice: from the gold of Ophir
  chosen_spanish: del oro de Ofir
  alternatives_spanish:
  - del oro procedente de Ofir
  - del oro de Ofir
  lexicon: HALOT
  rationale: Se mantiene la preposición de procedencia con "de" en español natural, y se conserva Ofir como topónimo transliterado. La forma permite la lectura de origen/calidad del oro sin forzar una paráfrasis.
- source_word: וְשִׁבְעַת אֲלָפִים
  english_pob_choice: and seven thousand
  chosen_spanish: y siete mil
  alternatives_spanish:
  - y siete millares
  lexicon: HALOT
  rationale: La frase numérica se traduce de forma directa y idiomática.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  lexicon: HALOT
  rationale: En este contexto se trata del metal precioso, no de dinero en general; "plata" es la correspondencia natural en español.
- source_word: מְזֻקָּק
  english_pob_choice: refined
  chosen_spanish: refinada
  alternatives_spanish:
  - purificada
  - pura
  lexicon: HALOT
  rationale: El participio pasivo describe metal depurado por refinación. "Refinada" es preciso y suena natural en español actual.
- source_word: לָטוּחַ
  english_pob_choice: to overlay
  chosen_spanish: para recubrir
  alternatives_spanish:
  - para cubrir
  - para revestir
  - para chapar
  lexicon: HALOT
  rationale: En un contexto de metal precioso aplicado a muros, "recubrir" transmite bien la idea de una capa aplicada sobre la superficie. Evita la posible ambigüedad de "enlucir" o "revestir" con connotaciones técnicas menos claras.
- source_word: קִירוֹת
  english_pob_choice: the walls
  chosen_spanish: las paredes
  alternatives_spanish:
  - los muros
  lexicon: HALOT
  rationale: En español "paredes" es claro y natural; no cambia el referente arquitectónico del hebreo, aunque "muros" también sería posible.
- source_word: הַבָּתִּים
  english_pob_choice: the buildings
  chosen_spanish: de los edificios
  alternatives_spanish:
  - de las casas
  - de las construcciones
  lexicon: HALOT
  rationale: Aunque literalmente puede ser "casas", el contexto del templo y la construcción arquitectónica favorece "edificios", que evita sugerir viviendas domésticas y mantiene el plural amplio del hebreo.
theological_decisions:
- issue: 'Sentido de Ofir: procedencia o genitivo descriptivo'
  english_pob_reading: Or 'of Ophir gold.' The Hebrew can be understood as specifying gold sourced from Ophir or as a descriptive genitive.
  chosen_spanish_reading: del oro de Ofir
  alternative_spanish_readings:
  - oro de Ofir
  - oro procedente de Ofir
  rationale: 'La forma principal conserva la ambigüedad del hebreo: puede indicar oro proveniente de Ofir o describir una calidad/tipo de oro. No se resuelve la tensión con una paráfrasis explicativa en el texto principal.'
  doctrine_reference: N/A
- issue: Unidad de peso antigua y no habilidad personal
  english_pob_reading: '''Talents'' is a unit of weight, not a reference to skill or ability.'
  chosen_spanish_reading: talentos
  alternative_spanish_readings:
  - pesos
  - medidas
  rationale: Se mantiene el tecnicismo histórico para no desviar el sentido hacia el uso moderno de "talento" como capacidad. La nota aclara el valor metrológico del término.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios de revisión aplicados; el control más reciente indica acuerdo alto y sin modificaciones necesarias. La redacción española conserva las dos ambigüedades documentadas: la procedencia/descripción de Ofir y el valor metrológico de "talentos".'
  spanish_consistency_notes:
  - Se mantuvo "talentos" por consistencia con la terminología histórica de medida usada en la POB inglesa.
  - '"Plata refinada" y "recubrir" conservan el matiz metalúrgico del hebreo.'
  - '"Edificios" preserva la amplitud contextual de הַבָּתִּים sin imponer "casas" domésticas.'
