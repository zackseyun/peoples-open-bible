- from: Después de él, Sadoq hijo de Imer hizo reparaciones frente[a] a su casa, y después de él, Semaías hijo de Sekenías, guardián[b] de la Puerta del Oriente, hizo reparaciones.
  to: Después de él, Sadoc hijo de Imer hizo reparaciones[a] frente a su casa[b], y después de él, Semaías hijo de Secanías, guardián[c] de la Puerta Oriental, hizo reparaciones.
  rationale: Se corrige el anclaje de las notas para que coincidan con los términos comentados, se añade la alternativa espacial preservada por el POB para נֶגֶד בֵּיתוֹ, y se normalizan algunos nombres/expresiones para una lectura española más natural sin cambiar el sentido del hebreo.
