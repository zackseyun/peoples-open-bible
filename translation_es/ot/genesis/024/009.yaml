translation:
  language: es
  text: Y el siervo puso su mano debajo del muslo de Abraham su amo y le juró acerca de este asunto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Debajo del muslo'' es una traducción literal de la expresión hebrea para un gesto solemne de juramento; algunos la entienden de manera simbólica en relación con los lomos o con la descendencia del pacto.'
    reason: cultural_note
lexical_decisions:
- source_word: הָעֶבֶד
  english_pob_choice: the servant
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el servidor
  lexicon: HALOT
  rationale: עֶבֶד puede significar 'siervo' o 'esclavo'. Dado que la POB en inglés opta por 'servant' para conservar la relación de dependencia, en español 'esclavo' preserva mejor la fuerza léxica de la subordinación; 'siervo' suavizaría demasiado el término en este contexto narrativo.
- source_word: וַיָּשֶׂם ... אֶת יָדוֹ
  english_pob_choice: put his hand
  chosen_spanish: puso su mano
  alternatives_spanish:
  - colocó su mano
  - puso la mano
  lexicon: HALOT
  rationale: שׂוּם significa 'poner, colocar, establecer'. 'Puso su mano' es natural en español y mantiene la literalidad suficiente sin sonar forzado.
- source_word: תַּחַת יֶרֶךְ
  english_pob_choice: under the thigh
  chosen_spanish: debajo del muslo
  alternatives_spanish:
  - bajo el muslo
  - debajo del muslo superior
  - debajo de los lomos
  lexicon: HALOT
  rationale: יָרֵךְ es literalmente 'muslo'. 'Debajo del muslo' conserva la imagen corporal concreta del hebreo; 'lomos' o una explicación simbólica irían más allá del texto principal.
- source_word: אַבְרָהָם אֲדֹנָיו
  english_pob_choice: Abraham his master
  chosen_spanish: Abraham su señor
  alternatives_spanish:
  - Abraham su amo
  - Abraham su dueño
  lexicon: HALOT
  rationale: אֲדוֹן en este marco humano expresa autoridad de quien dirige la casa. En español, 'señor' reproduce esa relación sin introducir una carga interpretativa innecesaria; 'amo' o 'dueño' sonarían más ásperos o reductivos.
- source_word: וַיִּשָּׁבַע לוֹ
  english_pob_choice: and swore to him
  chosen_spanish: y le juró
  alternatives_spanish:
  - y juró a él
  - y tomó juramento
  lexicon: HALOT
  rationale: שׁבע en nifal es 'juró / prestó juramento'. 'Le juró' conserva la dirección personal del juramento marcada por לוֹ y resulta idiomático en español.
- source_word: עַל הַדָּבָר הַזֶּה
  english_pob_choice: concerning this matter
  chosen_spanish: acerca de este asunto
  alternatives_spanish:
  - sobre este asunto
  - respecto de este asunto
  - acerca de esta cosa
  lexicon: HALOT
  rationale: דָּבָר abarca 'palabra, asunto, cosa'. Aquí remite a la encomienda concreta que Abraham acaba de dar; 'asunto' comunica bien ese valor contextual en español.
theological_decisions:
- issue: 'Gestualidad del juramento: literalidad versus interpretación simbólica'
  english_pob_reading: Translate the gesture literally as 'under the thigh' and leave symbolic interpretation to a footnote.
  chosen_spanish_reading: Traducir literalmente la expresión corporal como 'debajo del muslo' y dejar la posible explicación simbólica en una nota.
  alternative_spanish_readings:
  - interpretar el gesto como relacionado con los genitales
  - explicitar el vínculo con los lomos o la descendencia del pacto
  rationale: El hebreo presenta la acción física sin explicación. Mantener la literalidad preserva la transparencia del texto y evita decidir en el cuerpo principal una interpretación que el pasaje no enuncia de forma explícita.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no cambió el pasaje: el último pase indicó que no hacía falta modificar la propuesta, con alta concordancia entre revisores y sin observaciones pendientes.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto en otros pasajes, pero aquí no aparece el nombre divino explícito.
  - '''Señor'' se usa aquí para אֲדוֹן en sentido humano de autoridad doméstica; no funciona como sustituto del nombre divino.'
  - Se preserva la concreción corporal del hebreo ('muslo') y se documenta en nota la tensión interpretativa sin resolverla en el texto principal.
