review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura general del hebreo: ubicación en la parte superior del soporte, el elemento redondo alrededor, la medida de medio codo, y la idea de integración material de las piezas. Sin embargo, los marcadores de notas al pie están mal anclados: la nota [a] explica יְדֹתֶיהָ (''sus soportes/agarraderas''), pero en el texto está puesta sobre ''todo alrededor'', mientras que la nota [b] explica מִסְגְּרֹתֶיהָ (''paneles/marcos''), pero en el texto está puesta sobre ''de alto''. Eso rompe la trazabilidad léxica exigida. Además, ''salientes'' es posible, pero ''soportes'' refleja mejor la decisión documentada del POB en contexto estructural.'
  spanish_quality_summary: El español es claro y legible, con registro digno y natural. 'En la parte superior del soporte' y 'de una sola pieza con él' funcionan bien. 'Borde redondo todo alrededor' es aceptable, aunque 'reborde redondo alrededor' sonaría algo más arquitectónico; no es necesario forzarlo. La reparación principal es reubicar las notas y alinear mejor 'יְדֹתֶיהָ' con 'soportes' para concordar con el audit trail.
  glossary_alignment: No hay términos teológicos de proyecto en juego. En lo léxico, 'soporte' para מְכוֹנָה, 'paneles' para מִסְגְּרוֹתֶיהָ, y 'de una sola pieza con él' para מִמֶּנָּה están alineados con el expediente. La única desalineación relevante es 'salientes' frente a la preferencia auditada 'supports' = 'soportes', además del anclaje incorrecto de las notas.
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están colocados en frases equivocadas.
    rationale: La nota [a] sobre יְדֹתֶיהָ aparece anclada a 'todo alrededor', y la nota [b] sobre 'paneles/marcos' aparece anclada a 'de alto'. Las notas deben aparecer exactamente en la palabra o frase relevante del texto español.
  - severity: medium
    issue: '''Sus salientes'' no refleja tan bien como ''sus soportes'' la decisión léxica principal documentada para יְדֹתֶיהָ.'
    rationale: Aunque 'salientes' conserva cierta ambigüedad formal, el expediente inglés optó por 'supports' por el contexto estructural. 'Soportes' es más fiel al rationale sin perder naturalidad.
  revised_spanish_text: Y en la parte superior del soporte había un borde redondo todo alrededor, de medio codo de alto; y en la parte superior del soporte, sus soportes[a] y sus paneles[b] eran de una sola pieza con él.
  revised_footnotes:
  - marker: a
    text: O 'sus agarraderas'; el hebreo יְדֹתֶיהָ literalmente significa 'sus manos' y puede referirse a partes proyectantes del soporte.
    reason: lexical_alternative
  - marker: b
    text: O 'sus marcos' para 'sus paneles'.
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas al pie para que correspondan a las palabras que explican, y se cambió 'salientes' por 'soportes' para alinearlo mejor con la decisión léxica documentada del POB en este contexto arquitectónico.
