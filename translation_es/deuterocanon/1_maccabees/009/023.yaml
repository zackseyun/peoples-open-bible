translation:
  language: es
  text: Y aconteció que, después de la muerte de Judas, los sin ley[a] surgieron en todos los territorios de Israel, y todos los que obraban la injusticia se alzaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sin ley hombres»; el plural griego puede funcionar de manera sustantiva, de modo que no es necesario añadir «hombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa griega pide en español una transición natural. «Aconteció» conserva el valor idiomático de apertura sin caer en una calca demasiado mecánica.
- source_word: τελευτήν
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - fin
  - fallecimiento
  lexicon: LSJ
  rationale: En este contexto se refiere claramente a la muerte de Judas. «Muerte» es la equivalencia directa y más transparente en español.
- source_word: ἐξέκυψαν
  english_pob_choice: emerged
  chosen_spanish: surgieron
  alternatives_spanish:
  - aparecieron
  - brotaron
  - emergieron
  lexicon: LSJ
  rationale: El verbo expresa aparecer de modo repentino o salir a la vista. «Surgieron» conserva la imagen de aparición súbita y funciona con naturalidad en español.
- source_word: οἱ ἄνομοι
  english_pob_choice: the lawless
  chosen_spanish: los impíos
  alternatives_spanish:
  - los sin ley
  - los inicuos
  - los malvados
  lexicon: LSJ
  rationale: El griego sustantiva a personas caracterizadas por la ausencia de ley. En español, «los impíos» mantiene el peso moral y bíblico sin añadir innecesariamente «hombres». Se preserva la tensión entre ilegalidad y impiedad mejor que con «malvados».
- source_word: ἐν πᾶσιν τοῖς ὁρίοις Ἰσραήλ
  english_pob_choice: in all the territories of Israel
  chosen_spanish: en todos los territorios de Israel
  alternatives_spanish:
  - en todos los límites de Israel
  - en todas las regiones de Israel
  - en todos los distritos de Israel
  lexicon: LSJ
  rationale: ὅρια aquí designa ámbitos geográficos extensos, no solo fronteras. «Territorios» reproduce bien esa extensión y coincide con la decisión auditada en inglés.
- source_word: ἀνέτειλαν
  english_pob_choice: sprang up
  chosen_spanish: se alzaron
  alternatives_spanish:
  - brotaron
  - surgieron
  - aparecieron
  lexicon: LSJ
  rationale: El verbo conserva una imagen de crecimiento o ascenso repentino. «Se alzaron» refleja el matiz figurado y encaja con el paralelo del primer hemistiquio.
- source_word: οἱ ἐργαζόμενοι τὴν ἀδικίαν
  english_pob_choice: those who worked unrighteousness
  chosen_spanish: los que practicaban la injusticia
  alternatives_spanish:
  - los que trabajaban la injusticia
  - los que hacían injusticia
  - los que obraban injusticia
  lexicon: BDAG
  rationale: La expresión participial indica acción continua. «Practicaban la injusticia» comunica bien la habitualidad y evita una literalidad forzada en español. «Injusticia» mantiene la fuerza ética del término griego ἀδικία.
- source_word: ἀδικίαν
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - maldad
  - injusticia
  lexicon: BDAG
  rationale: La palabra puede abarcar injusticia o conducta torcida. En este contexto, «injusticia» preserva el contraste moral y permite una lectura más inmediata en español, sin desdibujar el sentido de obrar contra el orden debido.
theological_decisions:
- issue: Cómo traducir οἱ ἄνομοι sin suavizar el carácter moral/covenantal del término
  english_pob_reading: Retain 'lawless' as the main rendering; avoid generic 'wicked'
  chosen_spanish_reading: «los impíos» en el texto principal
  alternative_spanish_readings:
  - los sin ley
  - los inicuos
  - los malvados
  rationale: El griego no solo describe maldad general, sino una condición de oposición al orden de Dios. «Impíos» es una opción bíblica natural en español que conserva la carga religiosa del término, mientras evita la adición interpretativa de «hombres».
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; preserve moral and covenantal force without over-paraphrase'
- issue: 'Cómo representar ἀδικίαν: justicia/injusticia vs. maldad general'
  english_pob_reading: those who worked unrighteousness / alternative 'worked injustice'
  chosen_spanish_reading: «los que practicaban la injusticia»
  alternative_spanish_readings:
  - los que obraban injusticia
  - los que hacían injusticia
  - los que practicaban maldad
  rationale: El contexto contrapone el orden fiel con la conducta torcida. «Injusticia» mantiene la referencia ética y jurídica del término, y «practicaban» conserva la idea de actividad continua.
  doctrine_reference: 'DOCTRINE.md: readable modern Spanish without flattening theological weight'
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego de Swete (1909) y toma en cuenta el audit trail inglés: se conserva la fórmula narrativa, se evita añadir «hombres» a οἱ ἄνομοι, y se mantiene la imagen de aparición repentina con un verbo español natural. También se distingue entre la fuerza moral de ἄνομοι y ἀδικίαν sin borrar su tensión semántica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrama.
  - Se mantiene «justicia/injusticia» como par léxico coherente para ἀδικία y no se reemplaza por un lenguaje más genérico.
  - «Territorios» se usa de manera consistente con la decisión POB inglesa para ὁρίοις.
  - No se introduce «Cristo» ni terminología cristiana posterior ajena al pasaje.
  - La puntuación sigue el español moderno y conserva el paralelismo de la frase griega.
