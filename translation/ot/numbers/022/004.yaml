id: NUM.22.4
reference: Numbers 22:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מוֹאָ֜ב אֶל זִקְנֵ֣י מִדְיָ֗ן עַתָּ֞ה יְלַחֲכ֤וּ הַ/קָּהָל֙ אֶת כָּל סְבִ֣יבֹתֵ֔י/נוּ כִּ/לְחֹ֣ךְ הַ/שּׁ֔וֹר אֵ֖ת יֶ֣רֶק הַ/שָּׂדֶ֑ה וּ/בָלָ֧ק בֶּן צִפּ֛וֹר מֶ֥לֶךְ לְ/מוֹאָ֖ב בָּ/עֵ֥ת הַ/הִֽוא־־־־׃
translation:
  text: And Moab said to the elders of Midian[a], “Now this assembly will lick up all that is around us[b], as the ox licks up the green growth of the field.” Now Balak son of Zippor was king of Moab at that time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this multitude will devour everything around us.” The Hebrew verb is literally “lick up,” and the main text preserves the simile’s imagery.
    reason: lexical_alternative
  - marker: b
    text: Or “the grass of the field.” The Hebrew refers more broadly to green vegetation.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Rendered as the national name/personified polity 'Moab.' Although grammatically singular and personified as speaking, English naturally uses the place/people name as subject.
- source_word: זִקְנֵי מִדְיָן
  chosen: the elders of Midian
  alternatives:
  - Midian's elders
  lexicon: HALOT
  rationale: זִקְנֵי is the construct plural 'elders of.' 'The elders of Midian' is the most natural and transparent English rendering.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Marks immediate concern and discourse progression. 'Now' is concise and idiomatic.
- source_word: יְלַחֲכוּ
  chosen: will lick up
  alternatives:
  - will devour
  - will lap up
  lexicon: HALOT
  rationale: The verb לחך literally means 'lick.' Because the simile with the ox follows immediately, preserving 'lick up' in the main text best reflects the Hebrew imagery rather than flattening it to 'devour.'
- source_word: הַקָּהָל
  chosen: this assembly
  alternatives:
  - this multitude
  - this congregation
  lexicon: HALOT
  rationale: Refers to the gathered Israelite community. 'Assembly' preserves the collective sense without importing later ecclesiastical connotations of 'congregation.' 'This' is supplied in English to reflect the deictic force in context, since Moab is referring to the nearby people.
- source_word: אֶת כָּל סְבִיבֹתֵינוּ
  chosen: all that is around us
  alternatives:
  - all our surroundings
  - everything around us
  lexicon: HALOT
  rationale: Literally 'all our surroundings.' The chosen rendering is idiomatic and conveys the sense of everything in the vicinity being consumed.
- source_word: כִּלְחֹךְ הַשּׁוֹר
  chosen: as the ox licks up
  alternatives:
  - like an ox licking up
  lexicon: HALOT
  rationale: The comparative כ plus infinitive construct yields a simile. 'As the ox licks up' preserves the vivid agricultural image and matches the repeated root לחך.
- source_word: יֶרֶק הַשָּׂדֶה
  chosen: the green growth of the field
  alternatives:
  - the grass of the field
  - the vegetation of the field
  lexicon: HALOT
  rationale: יֶרֶק denotes green vegetation/herbage, not specifically cut grass. 'Green growth' is a natural English equivalent that preserves the broader sense.
- source_word: וּבָלָק בֶּן צִפּוֹר
  chosen: Now Balak son of Zippor
  alternatives:
  - And Balak son of Zippor
  lexicon: HALOT
  rationale: This clause introduces the king relevant to the ensuing narrative. 'Now' is a discourse-sensitive rendering of waw here, signaling background information rather than simple sequence.
- source_word: מֶלֶךְ לְמוֹאָב
  chosen: was king of Moab
  alternatives:
  - was the king of Moab
  lexicon: HALOT
  rationale: The predicate nominative is straightforward. English idiom does not require the article here.
- source_word: בָּעֵת הַהִוא
  chosen: at that time
  alternatives:
  - in those days
  lexicon: HALOT
  rationale: A standard temporal expression giving narrative setting. 'At that time' is the most direct equivalent.
