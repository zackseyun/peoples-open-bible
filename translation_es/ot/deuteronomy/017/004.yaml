revisions:
- from: y se te informa[a], y oyes de ello, y lo investigas a fondo, y he aquí, es verdad y cierto que esta abominación ha sido hecha en Israel,
  to: y se te informa[a], y oyes de eso, y lo investigas a fondo, y he aquí, es verdad y cierto que esta abominación ha sido cometida en Israel,
  rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad del español sin apartarse del hebreo ni de la auditoría inglesa: «oyes de eso» en lugar de «oyes de ello», «ha sido cometida» en lugar de «ha sido hecha», y corrección gramatical de la nota alternativa. No se requiere adjudicación adicional.'
