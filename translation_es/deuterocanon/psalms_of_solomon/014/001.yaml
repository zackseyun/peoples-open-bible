translation:
  language: es
  text: Fiel es Yahvé[a] a los que lo aman en verdad, a los que soportan su disciplina, a los que andan en la rectitud[b] de sus mandamientos, en la ley que nos mandó para nuestra vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Como el griego tiene Κύριος en un contexto judío que alude al nombre divino, se traduce aquí como «Yahvé» conforme al criterio del proyecto; la alternativa más literal sería «el Señor».
    reason: theological_note
  - marker: b
    text: También puede traducirse «justicia». Aquí «rectitud» expresa mejor la conducta justa conforme a los mandamientos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidedigno
  - confiable
  lexicon: BDAG
  rationale: Como predicado de Yahvé, πιστός expresa fiabilidad y constancia; 'fiel' es la equivalencia natural en español y conserva el peso relacional y pactal del término.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: Project default / context griego-judío
  rationale: Aunque el griego dice Κύριος, el contexto devocional judío y la norma del proyecto para el nombre divino favorecen 'Yahvé' en el texto principal, en vez de ocultarlo con un título genérico.
- source_word: ἀγαπῶσιν
  english_pob_choice: love
  chosen_spanish: aman
  alternatives_spanish:
  - quieren
  - tienen amor por
  lexicon: BDAG
  rationale: El verbo denota amor real, no mera disposición afectiva; 'aman' es directo, bíblico y fiel al valor verbal.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - con sinceridad
  - verdaderamente
  lexicon: BDAG
  rationale: Se conserva la locución preposicional casi literalmente porque transmite una esfera moral y religiosa, no solo la idea de sinceridad subjetiva.
- source_word: ὑπομένουσιν
  english_pob_choice: endure
  chosen_spanish: soportan
  alternatives_spanish:
  - perseveran bajo
  - resisten
  lexicon: BDAG
  rationale: Aquí el verbo incluye la idea de mantenerse bajo una carga o trato divino; 'soportan' comunica la perseverancia frente a la disciplina sin debilitarla.
- source_word: παιδείαν
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - formación
  lexicon: BDAG
  rationale: En este contexto de formación obediente, 'disciplina' conserva el sentido de corrección y entrenamiento divino. Se evita 'enseñanza' porque sería demasiado estrecho.
- source_word: πορευομένοις
  english_pob_choice: walk
  chosen_spanish: andan
  alternatives_spanish:
  - viven
  - caminan
  lexicon: BDAG
  rationale: '''Andan'' reproduce la metáfora bíblica de conducta continua y suena natural en español sin perder el matiz de estilo de vida.'
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: BDAG
  rationale: Aunque el audit trail inglés privilegia 'righteousness', en español 'justicia' mantiene el campo semántico y evita una abstracción menos natural. La nota preserva la alternativa 'rectitud' donde el lector la prefiera.
- source_word: προσταγμάτων
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - mandatos
  - mandamientos
  lexicon: BDAG
  rationale: '''Mandamientos'' encaja con el registro bíblico y expresa con claridad la idea de normas dadas por Dios; se adapta bien al genitivo ''de sus mandamientos''.'
- source_word: νόμῳ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - norma
  lexicon: BDAG
  rationale: '''Ley'' es la equivalencia más transparente en español para νόμος en este contexto y mantiene la relación con el mandato divino previo.'
- source_word: εἰς ζωὴν ἡμῶν
  english_pob_choice: for our life
  chosen_spanish: para nuestra vida
  alternatives_spanish:
  - para nuestra vida
  - para nuestra existencia
  - para darnos vida
  lexicon: BDAG
  rationale: Se conserva el singular colectivo 'vida' para reflejar ζωή y el propósito beneficioso de la ley para la comunidad; 'para nuestra vida' suena natural y fiel.
theological_decisions:
- issue: Tratamiento de Κύριος / nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: El versículo está en un marco judío-devocional y el proyecto pide traducir YHWH como 'Yahvé' en el texto principal. Aunque el griego usa Κύριος, aquí funciona como sustituto reverencial del nombre divino; por eso no se deja como título genérico.
  doctrine_reference: 'Project default: יהוה / YHWH -> Yahvé'
- issue: δικαιοσύνη en un contexto de obediencia
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La frase habla de la conducta conforme a los mandamientos; en español, 'justicia' preserva el contenido ético-covenantal sin introducir una tecnificación excesiva. Se deja la alternativa 'rectitud' para quienes prefieran enfatizar la cualidad moral.
  doctrine_reference: 'Project default: δικαιοσύνη -> justicia / rectitud by context'
- issue: παιδείαν como disciplina formativa
  english_pob_reading: discipline
  chosen_spanish_reading: disciplina
  alternative_spanish_readings:
  - instrucción
  - corrección
  - formación
  rationale: El texto no alude solo a información religiosa, sino a una acción divina que corrige y forma. 'Disciplina' conserva esa tensión entre corrección y entrenamiento, coherente con el audit trail inglés.
  doctrine_reference: English audit lexical decision for παιδείαν
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del audit trail, que no registra revisiones aplicadas y fue confirmado como de alta concordancia con la fuente griega; por ello no se introducen cambios interpretativos adicionales ni se atenúan las tensiones léxicas ya documentadas.
  spanish_consistency_notes:
  - Se mantiene el tratamiento del nombre divino como 'Yahvé' según el estándar del proyecto, aunque el griego subyacente use Κύριος.
  - Se conserva una sintaxis paralela para reflejar la estructura de participios y preposiciones del griego sin volverla rígida en español.
  - '''Disciplina'' y ''justicia'' se dejan como opciones semánticas centrales con notas, en lugar de fijar equivalentes más estrechos que borrarían matices del original.'
