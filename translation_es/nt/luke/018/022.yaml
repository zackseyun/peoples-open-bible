base_translation:
  language: en
  yaml_path: translation/nt/luke/018/022.yaml
  text: 'When Jesus heard this[a], he said to him, “One thing still is lacking for you: sell all that you have and distribute it to the poor, and you will have treasure in heaven; and come[b], follow me.”'
  footnotes:
  - marker: a
    text: Or 'You still lack one thing.' The Greek more literally says, 'One thing still lacks for you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'treasure in the heavens.' Greek has the plural 'heavens,' but English idiom commonly uses the singular 'heaven' here.
    reason: lexical_alternative
