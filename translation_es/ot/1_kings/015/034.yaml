translation:
  language: es
  text: Hizo lo malo a los ojos de Yahvé y anduvo en el camino de Jeroboam y en su pecado, con el cual hizo pecar a Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Hizo, pues
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se expresa de forma natural en español con un perfecto simple. Se omite la conjunción inicial como en la decisión inglesa, porque en castellano la secuencia narrativa fluye mejor sin 'y' al inicio.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: 'La expresión hebrea idiomática עשה הרע se vierte mejor como una fórmula evaluativa: ''hacer lo malo''. ''Lo malo'' conserva la valoración moral sin volverlo más abstracto de lo que exige el hebreo.'
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora de evaluación divina con una preposición española natural. 'Ante los ojos de Yahvé' mantiene la imagen idiomática del hebreo y la decisión POB de nombrar el tetragrámaton como Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para YHWH. No se sustituye por una máscara tradicional, y 'Yahvé' funciona como el nombre del pacto en español contemporáneo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: walked
  chosen_spanish: caminó
  alternatives_spanish:
  - anduvo
  - siguió
  lexicon: HALOT
  rationale: En la expresión 'andar/caminar en el camino de', 'caminó' preserva la metáfora de conducta y patrón de vida. 'Anduvo' sería posible, pero 'caminó' resulta más claro en español moderno.
- source_word: בְּדֶרֶךְ יָרָבְעָם
  english_pob_choice: in the way of Jeroboam
  chosen_spanish: en el camino de Jeroboam
  alternatives_spanish:
  - en la senda de Jeroboam
  - en la vía de Jeroboam
  lexicon: HALOT
  rationale: '''Camino'' reproduce el valor figurado de forma de vida o conducta. Se evita una paráfrasis explicativa para conservar la fórmula deuteronomista.'
- source_word: וּבְחַטָּאתוֹ
  english_pob_choice: and in his sin
  chosen_spanish: y en su pecado
  alternatives_spanish:
  - y en su culpa
  - y en su pecado cometido
  lexicon: HALOT
  rationale: '''Pecado'' es el equivalente natural en español para חטאת en este contexto formulaico. Se mantiene el singular con sufijo para reflejar la referencia a la transgresión paradigmática de Jeroboam.'
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: by which he caused Israel to sin
  chosen_spanish: con el cual hizo pecar a Israel
  alternatives_spanish:
  - por medio del cual hizo pecar a Israel
  - con el que llevó a Israel a pecar
  lexicon: HALOT
  rationale: El hifil de חטא tiene fuerza causativa; 'hizo pecar' lo conserva de manera directa y clara. 'Con el cual' enlaza el relativo con 'su pecado' sin sobreinterpretar la relación.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio bíblico sin expansión innecesaria.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea directamente el tetragrámaton. Siguiendo la política del proyecto, se preserva el nombre divino como Yahvé en lugar de sustituirlo por una convención de lectura.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide con la lectura auditada en inglés: fórmula narrativa breve, evaluación moral, metáfora de camino y cláusula causativa final. No se detectan variantes textuales en el paquete fuente que requieran nota.'
  spanish_consistency_notes:
  - Se mantiene una sintaxis breve y paralela para reflejar la estructura hebrea.
  - Se conserva la fórmula deuteronomista 'camino de Jeroboam' sin domesticarla.
  - No se introduce 'Cristo', 'SEÑOR' ni otras sustituciones no motivadas por el fuente.
