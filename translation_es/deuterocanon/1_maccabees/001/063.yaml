translation:
  language: es
  text: Y eligieron morir[a], para no quedar contaminados por los alimentos y no profanar el pacto santo[b]; y murieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las carnes». El término griego puede referirse a alimentos concretos, aquí en particular a los que, por la ley del pacto, los habrían contaminado.
    reason: lexical_alternative
  - marker: b
    text: O «un pacto santo». Aunque el griego no lleva artículo, el contexto apunta al pacto conocido de Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπεδέξαντο
  english_pob_choice: chose
  chosen_spanish: prefirieron
  alternatives_spanish:
  - eligieron
  - aceptaron
  - se resignaron a
  lexicon: LSJ
  rationale: El verbo medio expresa una toma voluntaria de una suerte o decisión. «Prefirieron» conserva la voluntad y suena natural en español, sin debilitar el matiz de elección que la revisión inglesa destacó.
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - perecer
  - dar la vida
  lexicon: LSJ
  rationale: El infinitivo de finalidad se vierte de forma natural con «morir» en español; «dar la vida» introduciría una interpretación más explícita que el griego no formula.
- source_word: μιανθῶσιν
  english_pob_choice: be defiled
  chosen_spanish: quedar contaminados
  alternatives_spanish:
  - ser contaminados
  - quedar impuros
  - mancharse ritualmente
  lexicon: LSJ
  rationale: «Contaminados» comunica la impureza ritual/moral del contexto macabeo. «Quedar contaminados» mantiene el resultado sobre ellos y evita una formulación demasiado técnica o arcaica.
- source_word: τοῖς βρώμασιν
  english_pob_choice: the foods
  chosen_spanish: los alimentos
  alternatives_spanish:
  - las comidas
  - las viandas
  - la comida
  lexicon: LSJ
  rationale: El plural griego alude a alimentos concretos, probablemente prohibidos. «Los alimentos» es amplio, claro y más cercano al campo semántico del texto que «las carnes», que sería más específico de lo que el griego exige.
- source_word: βεβηλώσωσιν
  english_pob_choice: profane
  chosen_spanish: profanar
  alternatives_spanish:
  - violar
  - deshonrar
  - tratar como común
  lexicon: LSJ
  rationale: En contraste con lo santo, «profanar» reproduce bien la oposición de lo sagrado frente a lo común o impuro. Es la equivalencia más directa y estable en español bíblico.
- source_word: διαθήκην ἁγίαν
  english_pob_choice: the holy covenant
  chosen_spanish: el santo pacto
  alternatives_spanish:
  - el pacto santo
  - el pacto sagrado
  - la santa alianza
  lexicon: LSJ
  rationale: Se conserva «pacto» para mantener el término pactal del texto y «santo» antes del sustantivo, una colocación natural en español bíblico. Se evita «alianza» porque podría sonar menos directamente ligada al vocabulario bíblico usado aquí.
- source_word: ἀπέθανον
  english_pob_choice: they died
  chosen_spanish: murieron
  alternatives_spanish:
  - perecieron
  - fueron muertos
  lexicon: LSJ
  rationale: El cierre simple del griego pide un verbo llano. «Murieron» refleja el hecho sin añadir causación explícita ni intensificar indebidamente el martirio.
theological_decisions:
- issue: Defilement from forbidden foods in a covenantal context
  english_pob_reading: ritual/moral defilement from prohibited foods
  chosen_spanish_reading: contaminación ritual y moral por alimentos prohibidos
  alternative_spanish_readings:
  - impureza legal por las comidas
  - corrupción moral por la comida
  rationale: El verso combina la dimensión ritual de pureza con la fidelidad al pacto. «Contaminados por los alimentos» deja abierta esa doble fuerza sin reducirla a una mera metáfora moral ni a una categoría legalista moderna.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Definiteness of διαθήκην ἁγίαν
  english_pob_reading: the covenant known to Israel, rendered definitely in context
  chosen_spanish_reading: el santo pacto como realidad conocida y concreta del pueblo de Israel
  alternative_spanish_readings:
  - un santo pacto
  - un pacto santo
  rationale: Aunque el griego carece de artículo, el contexto histórico-literario apunta al pacto conocido de Israel con Dios. «El santo pacto» comunica mejor esa referencia definida sin añadir contenido ajeno al texto.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El inglés POB pasó de «accepted death» a «chose to die» por naturalidad y precisión; por eso en español se prefirió «prefirieron morir» para reflejar la misma decisión voluntaria. Se mantuvo la estructura final breve y declarativa del griego, sin introducir causación externa en «murieron».
  spanish_consistency_notes:
  - Se mantiene «pacto» en lugar de «alianza» para conservar continuidad terminológica con el griego διαθήκη y con la auditable decisión inglesa.
  - «Profanar» se usa como equivalente estable de βεβηλόω en contextos de santidad/culto.
  - «Contaminados» funciona aquí como equivalente de impureza ritual sin perder inteligibilidad para lectores modernos.
