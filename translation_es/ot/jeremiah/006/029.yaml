translation:
  language: es
  text: Los fuelles soplan con fuerza[a]; el plomo es consumido por el fuego. En vano el refinador sigue refinando[b], pero los malvados no son apartados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los fuelles están quemados/abrasados; por su fuego se consume el plomo». El hebreo de esta cláusula es difícil, y las traducciones difieren en cómo se relacionan el fuego y el plomo.'
    reason: textual_variant
  - marker: b
    text: 'O: «los malvados no son separados» o, en sentido metalúrgico más preciso, «las impurezas no son extraídas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחַר
  english_pob_choice: blow fiercely
  chosen_spanish: resopla con fuerza
  alternatives_spanish:
  - sopla con fuerza
  - bufa intensamente
  - resopla violentamente
  lexicon: HALOT
  rationale: El verbo hebreo expresa respiración fuerte o resoplido; con מַפֻּחַ ('fuelle') como sujeto, el sentido idiomático es el del fuelle que aviva con intensidad. 'Resopla con fuerza' conserva la imagen y evita un calco mecánico.
- source_word: מַפֻּחַ
  english_pob_choice: bellows
  chosen_spanish: el fuelle
  alternatives_spanish:
  - los fuelles
  - el soplador
  lexicon: HALOT
  rationale: Designa el fuelle del fundidor o refinador. 'Fuelle' es la equivalencia natural en español para este contexto metalúrgico.
- source_word: מֵאִשְׁתָּם
  english_pob_choice: by the fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - del fuego
  - a causa del fuego
  - desde su fuego
  lexicon: HALOT
  rationale: La forma es difícil y la relación exacta entre fuego y plomo no es segura. 'Por el fuego' mantiene el valor contextual/instrumental sin cerrar indebidamente la ambigüedad textual.
- source_word: עֹפָרֶת
  english_pob_choice: the lead
  chosen_spanish: el plomo
  alternatives_spanish:
  - plomo
  lexicon: HALOT
  rationale: El sustantivo denota plomo, probablemente como parte del proceso de refinado. El artículo se añade por naturalidad en español.
- source_word: לַשָּׁוְא
  english_pob_choice: In vain
  chosen_spanish: En vano
  alternatives_spanish:
  - Para nada
  - Sin resultado
  - Inútilmente
  lexicon: HALOT
  rationale: La locución adverbial transmite la inutilidad del proceso de refinamiento. 'En vano' es la forma más idiomática y solemne en español.
- source_word: צָרַף ... צָרוֹף
  english_pob_choice: the refiner keeps refining
  chosen_spanish: el refinador sigue refinando
  alternatives_spanish:
  - el refinador refina una y otra vez
  - refina sin cesar
  - el refinador refina en vano
  lexicon: HALOT
  rationale: La repetición del mismo lexema intensifica la acción. 'Sigue refinando' reproduce el aspecto iterativo/insistente de modo fluido, manteniendo la escena metalúrgica.
- source_word: וְרָעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los malos
  - los malhechores
  lexicon: HALOT
  rationale: Aunque el marco es metalúrgico, el hebreo aplica el lenguaje a personas moralmente perversas. 'Malvados' conserva la acusación ética sin tecnicismo eclesiástico.
- source_word: נִתָּקוּ
  english_pob_choice: are not separated out
  chosen_spanish: no son separados
  alternatives_spanish:
  - no son apartados
  - no son extraídos
  - no son removidos
  lexicon: HALOT
  rationale: En la metáfora del refinado, el sentido es que la escoria o los elementos malos no quedan apartados del metal. 'No son separados' mantiene la idea del resultado esperado sin forzar una metáfora demasiado explicativa.
theological_decisions:
- issue: Metáfora del refinado y referent moral
  english_pob_reading: 'The verse speaks of failed refining as a metaphor for Judah''s moral incorrigibility: despite intense purifying effort, the wicked remain.'
  chosen_spanish_reading: 'El verso conserva el fracaso del refinado como metáfora de la persistencia de los malvados: pese al proceso intenso, no son apartados.'
  alternative_spanish_readings:
  - Una lectura solo metalúrgica centrada en la falla técnica del fundido
  - Una lectura moral sin imagen concreta de metalurgia
  rationale: El contexto profético de Jeremías usa la purificación metalúrgica para hablar del pueblo. Por eso la traducción retiene tanto la escena literal como la referencia moral, sin reducir 'malvados' a mera 'escoria' ni borrar la metáfora.
  doctrine_reference: Jeremías 6:27-30; cf. el uso profético del refinado como prueba y juicio sobre el pueblo
- issue: Ambigüedad de la primera cola textual
  english_pob_reading: The Hebrew of this clause is difficult, and translations differ on how the fire and lead are related.
  chosen_spanish_reading: La primera cola se traduce de manera prudente, conservando la relación entre fuelle, fuego y plomo sin resolverla de forma dogmática.
  alternative_spanish_readings:
  - El fuelle está quemado; por su fuego se consume el plomo
  - El fuelle resopla con fuerza; por el fuego se consume el plomo
  rationale: La sintaxis hebrea es oscura y admite más de una relación entre los elementos. El español preserva esa dificultad con una formulación legible y abierta, coherente con el aparato crítico inglés.
  doctrine_reference: Problema textual/filológico, no doctrinal
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión más reciente del proyecto: no se registraron cambios en el último pase y el acuerdo con la revisión cruzada fue alto. Se mantuvo la solución optimal-equivalence del inglés POB, con ajuste natural al español y conservación de la ambigüedad textual en la primera cola.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Fuelle'' se usa para מַפֻּחַ por ser el término técnico natural en español.'
  - '''Refinador/refinando'' mantiene la imagen metalúrgica sin reemplazarla por una paráfrasis moralista.'
  - '''Malvados'' preserva el juicio ético del hebreo וְרָעִים y evita diluirlo en un término meramente material.'
