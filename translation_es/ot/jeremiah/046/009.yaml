review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura exhortativa del hebreo y mantiene adecuadamente los etnónimos principales, pero falla en dos puntos léxicos importantes: «los luditas» no corresponde a לוּדִים y en español activa una asociación moderna equivocada; y «manejan el arco» debilita el doble participio hebreo/inglés «grasp and bend the bow», que pide una acción más concreta como «empuñan y tensan». También «enloquezcan» suena menos natural para carros que una formulación de arremetida desenfrenada, en línea con el audit trail inglés revisado.'
  spanish_quality_summary: El texto es legible, pero algunas elecciones suenan poco naturales o potencialmente confusas en español bíblico actual. «Suban» funciona, aunque algo rígido; «caballos» y «carros» como vocativos implícitos son aceptables. El mayor problema de calidad es «luditas», que en español no es un etnónimo bíblico transparente. «Arremetan frenéticamente» y «empuñan y tensan el arco» mejoran claridad, fuerza poética y fidelidad.
  glossary_alignment: 'No hay problemas con terminología teológica de proyecto. Los nombres étnicos deben mantenerse por transliteración contextual: «Cus» y «Put» están bien; para לוּדִים conviene «los Ludim» con nota sobre «lidios», no «luditas».'
  issues:
  - severity: high
    issue: «los luditas» traduce inadecuadamente לוּדִים
    rationale: «Luditas» en español designa un movimiento social moderno y no el etnónimo bíblico; además contradice la preferencia auditada por transliteración «Ludim» con «Lydians/lidios» solo en nota.
  - severity: medium
    issue: «los que toman y manejan el arco» no preserva bien תֹּפְשֵׂי דֹּרְכֵי קָשֶׁת
    rationale: 'El hebreo y el POB inglés conservan dos acciones concretas: agarrar/empuñar y doblar/tensar el arco. «Manejan» es demasiado general y pierde la viveza de la imagen.'
  - severity: medium
    issue: «enloquezcan» para carros suena poco idiomático
    rationale: Aunque intenta reflejar frenesí, para vehículos de guerra en español resulta extraño. Una forma como «arremetan frenéticamente» comunica mejor el sentido marcial del inglés revisado «drive madly» y del hebreo.
  revised_spanish_text: 'Suban[a], caballos, y arremetan frenéticamente, carros; salgan los guerreros: Cus, Put, los que toman el escudo, y los Ludim[b], los que empuñan y tensan el arco.'
  revised_footnotes:
  - marker: a
    text: O «avancen»; el hebreo puede funcionar como llamado de batalla con la idea de ascender o lanzarse al combate.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, algunos identifican a «los Ludim» con los «lidios».
    reason: alternative_reading
  revision_rationale: Se corrigió el etnónimo a «los Ludim» para ajustarse al hebreo y evitar la falsa asociación de «luditas». Se reemplazó «manejan» por «empuñan y tensan» para preservar las dos acciones del hebreo. Se mejoró «enloquezcan» a «arremetan frenéticamente» para reflejar con más naturalidad española el sentido bélico de movimiento desenfrenado documentado en el audit trail inglés. Se mantuvieron «Suban», «Cus» y «Put» como opciones fieles y legibles.
