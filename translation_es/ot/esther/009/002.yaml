translation:
  language: es
  text: Los judíos se reunieron en sus ciudades, en todas las provincias del rey Asuero, para echar mano de[a] los que buscaban su mal, y nadie pudo hacerles frente[b], porque el temor de ellos había caído sobre todos los pueblos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para atacar a los que buscaban su mal». La expresión hebrea es literalmente «para extender/enviar la mano contra».
    reason: lexical_alternative
  - marker: b
    text: 'También: «y nadie pudo resistirles».'
    reason: lexical_alternative
  - marker: c
    text: «Pueblos» probablemente alude a los diversos grupos étnicos o poblacionales dentro del imperio, no simplemente a una sola nación.
    reason: cultural_note
lexical_decisions:
- source_word: נִקְהֲלוּ
  english_pob_choice: assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El niphal de קהל expresa reunirse como grupo. «Se reunieron» suena natural en español y conserva la acción colectiva sin añadir matices no presentes en el hebreo.
- source_word: בְּעָרֵי/הֶם
  english_pob_choice: in their cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - en sus poblaciones
  - en sus villas
  lexicon: HALOT
  rationale: עִיר normalmente es «ciudad»; el posesivo plural se mantiene de forma directa y clara.
- source_word: בְּכָל מְדִינוֹת הַמֶּלֶךְ אֳחַשְׁוֵרוֹשׁ
  english_pob_choice: throughout all the provinces of King Ahasuerus
  chosen_spanish: en todas las provincias del rey Asuero
  alternatives_spanish:
  - por todas las provincias del rey Asuero
  - en todas las provincias del rey Ahasuero
  lexicon: HALOT
  rationale: מְדִינוֹת se refiere a provincias administrativas del imperio persa. «En todas las provincias» conserva la extensión distributiva; «Asuero» es la forma castellana habitual del nombre.
- source_word: לִשְׁלֹחַ יָד
  english_pob_choice: to lay hands on
  chosen_spanish: alargar la mano contra
  alternatives_spanish:
  - poner la mano sobre
  - levantar la mano contra
  - extender la mano contra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y hostil. «Alargar la mano contra» conserva la imagen verbal de forma bastante literal en español y comunica la agresión implícita sin suavizarla.
- source_word: בִּמְבַקְשֵׁי רָעָתָם
  english_pob_choice: those seeking their harm
  chosen_spanish: los que buscaban su mal
  alternatives_spanish:
  - los que procuraban su daño
  - los que buscaban hacerles daño
  lexicon: HALOT
  rationale: מְבַקְשֵׁי רָעָתָם significa literalmente «los que buscan su mal/daño». «Su mal» reproduce con concisión la fuerza del hebreo; «buscaban» mantiene el participio activo.
- source_word: וְאִישׁ לֹא עָמַד לִפְנֵיהֶם
  english_pob_choice: and no one could stand before them
  chosen_spanish: y nadie pudo mantenerse en pie delante de ellos
  alternatives_spanish:
  - y nadie pudo resistirles
  - y nadie se les pudo oponer
  - y nadie pudo estar delante de ellos
  lexicon: HALOT
  rationale: La frase hebrea es idiomática para resistencia o capacidad de oposición. «Mantenerse en pie delante de ellos» conserva la imagen de pie/enfrente y expresa el sentido de no poder resistir.
- source_word: כִּי נָפַל פַּחְדָּם
  english_pob_choice: because the fear of them had fallen
  chosen_spanish: porque el temor de ellos había caído
  alternatives_spanish:
  - porque el pavor de ellos había caído
  - porque su temor había caído
  lexicon: HALOT
  rationale: פחד se puede renderizar por «temor» o «terror/pavor» según contexto. «El temor de ellos había caído» refleja la metáfora hebrea de manera directa y sobria.
- source_word: עַל כָּל הָעַמִּים
  english_pob_choice: on all the peoples
  chosen_spanish: sobre todos los pueblos
  alternatives_spanish:
  - sobre todas las naciones
  - sobre todos los pueblos de la tierra
  lexicon: HALOT
  rationale: עַמִּים en plural alude a grupos étnicos o poblacionales dentro del imperio. «Pueblos» conserva ese matiz colectivo sin reducirlo a una sola nación.
- source_word: אֳחַשְׁוֵרוֹשׁ
  english_pob_choice: Ahasuerus
  chosen_spanish: Asuero
  alternatives_spanish:
  - Ahasuero
  - Ahasuero
  lexicon: HALOT
  rationale: Se sigue la convención castellana tradicional del nombre propio en forma «Asuero», plenamente identificable y adecuada para lectura bíblica en español.
theological_decisions:
- issue: Alcance de «los pueblos»
  english_pob_reading: '''Peoples'' likely refers to the various ethnic groups or populations within the empire, not merely a single nation.'
  chosen_spanish_reading: «todos los pueblos» conserva la referencia a múltiples grupos o poblaciones dentro del imperio, no a un solo pueblo homogéneo.
  alternative_spanish_readings:
  - «todas las naciones»
  - «los diversos pueblos»
  rationale: El plural hebreo עַמִּים sugiere diversidad de grupos. «Pueblos» mantiene esa amplitud sin imponer una lectura geopolítica más fuerte que la del texto.
  doctrine_reference: Ninguno; nota semántica y cultural.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «no man could stand before them» a «no one could stand before them» por naturalidad e inclusividad formal. La versión española refleja ese ajuste con «nadie» y mantiene el resto del sentido sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «Asuero» para אֳחַשְׁוֵרוֹשׁ por convención bíblica castellana.
  - Se conserva el plural «pueblos» para הָעַמִּים, en línea con la nota cultural del POB inglés.
  - La expresión idiomática de לִשְׁלֹחַ יָד se traduce de forma suficientemente literal para que el lector perciba la metáfora subyacente.
