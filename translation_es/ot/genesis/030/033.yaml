translation:
  language: es
  text: 'Así mi justicia[a] responderá por mí mañana[b], cuando vengas a revisar mi salario: toda cabra que no sea punteada ni manchada, y todo cordero que no sea oscuro[c], será considerado robado si se encuentra conmigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi rectitud» o «mi integridad». Aquí el hebreo se refiere a la conducta demostrablemente recta de Jacob en este acuerdo salarial.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en el día de mañana»; la frase puede significar «mañana» o, más generalmente, «después», cuando Labán revise el rebaño.
    reason: lexical_alternative
  - marker: c
    text: O «castaño»; el adjetivo hebreo denota un animal de color oscuro o parduzco entre las ovejas/corderos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָֽנְתָה
  english_pob_choice: will answer for
  chosen_spanish: responderá por mí
  alternatives_spanish:
  - dará testimonio por mí
  - hablará a mi favor
  lexicon: HALOT
  rationale: El verbo conserva la imagen de una respuesta/testimonio que vindica a Jacob. «Responderá por mí» mantiene la función idiomática sin volverla demasiado técnica.
- source_word: בִּי
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - a favor de mí
  - contra mí
  lexicon: HALOT
  rationale: En este contexto el testimonio actúa en favor de Jacob; «por mí» expresa bien esa relación sin perder la fuerza judicial de la frase.
- source_word: צִדְקָתִי
  english_pob_choice: my righteousness
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi rectitud
  - mi integridad
  lexicon: HALOT
  rationale: Se conserva el término más directo de la raíz צדק. «Justicia» permite mantener la tensión entre rectitud ética y vindicación en el acuerdo de salario, sin reducirlo solo a honestidad privada.
- source_word: בְּיוֹם מָחָר
  english_pob_choice: later
  chosen_spanish: mañana
  alternatives_spanish:
  - después
  - en el futuro
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en el día de mañana». Aunque el inglés opta por un valor más idiomático, en español «mañana» conserva la literalidad y puede abarcar el momento de revisión siguiente.
- source_word: כִּי תָב֥וֹא עַל שְׂכָרִי לְפָנֶיךָ
  english_pob_choice: when you come concerning my wages before you
  chosen_spanish: cuando vengas respecto a mi salario, delante de ti
  alternatives_spanish:
  - cuando vengas a revisar mi salario en tu presencia
  - cuando vengas acerca de mi salario delante de ti
  lexicon: HALOT
  rationale: Se preserva la idea de comparecencia y examen del salario. «Respecto a mi salario» refleja עַל שְׂכָרִי, y «delante de ti» mantiene לְפָנֶיךָ con su matiz de presencia/juzgamiento personal.
- source_word: נָקֹד
  english_pob_choice: speckled
  chosen_spanish: punteado
  alternatives_spanish:
  - moteado
  - manchado
  lexicon: HALOT
  rationale: La raíz indica marcas pequeñas o puntos. «Punteado» distingue este rasgo del siguiente término y preserva la imagen de pequeñas marcas sobre el animal.
- source_word: וְטָל֜וּא
  english_pob_choice: spotted
  chosen_spanish: manchado
  alternatives_spanish:
  - moteado
  - pintado
  lexicon: HALOT
  rationale: El término alude a marcas o parches visibles. «Manchado» funciona en español para la idea de un pelaje con marcas más amplias, complementando «punteado».
- source_word: וְחוּם
  english_pob_choice: dark-colored
  chosen_spanish: oscura
  alternatives_spanish:
  - morena
  - castaña
  lexicon: HALOT
  rationale: El color del animal ovino puede ser oscuro o pardo; «oscura» evita precisar indebidamente el tono exacto y conserva la amplitud del término.
- source_word: בָּעִזִּים
  english_pob_choice: among the goats
  chosen_spanish: cabrío
  alternatives_spanish:
  - las cabras
  - entre las cabras
  lexicon: HALOT
  rationale: En español, para el contraste con «oveja» resulta natural y conciso «cabrío» como designación del macho/categoría caprina en el enunciado de identificación. Si se prefiriera mayor literalidad, podría decirse «entre las cabras».
- source_word: בַּכְּשָׂבִים
  english_pob_choice: among the lambs
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - entre las ovejas
  lexicon: HALOT
  rationale: כשבים puede referirse a ovejas jóvenes o al ganado ovino en general según el contexto. Dado el paralelismo con la categoría caprina, «oveja» comunica la clase animal sin forzar una edad precisa.
- source_word: גָּנ֥וּב ה֖וּא אִתִּֽי
  english_pob_choice: is stolen if it is found with me
  chosen_spanish: será robado; está conmigo
  alternatives_spanish:
  - es robado si se halla conmigo
  - si se encuentra conmigo, será considerado robado
  lexicon: HALOT
  rationale: La construcción hebrea es breve y judicial. El español «será robado; está conmigo» intenta conservar la dureza del enunciado, aunque queda algo elíptico; por eso se mantiene la idea de posesión ilícita sin explicitar en exceso el juicio legal.
theological_decisions:
- issue: 'צִדְקָתִי: justicia/rectitud/integridad'
  english_pob_reading: The Hebrew term refers to Jacob's demonstrable uprightness in the wage arrangement.
  chosen_spanish_reading: mi justicia
  alternative_spanish_readings:
  - mi rectitud
  - mi integridad
  rationale: Se evita reducir el término a una simple virtud privada. En la escena, la palabra apunta a una justicia demostrable en el trato contractual, con resonancia de vindicación delante de Laban.
  doctrine_reference: Justicia/rectitud en contexto de pacto y trato humano; cf. uso ético-forense de צדק
- issue: 'בְּיוֹם מָחָר: literalidad o idiomatización'
  english_pob_reading: The phrase may mean 'tomorrow' or more generally 'at a later time' when Laban examines the flock.
  chosen_spanish_reading: mañana
  alternative_spanish_readings:
  - después
  - en un tiempo posterior
  rationale: Se conserva la literalidad principal porque el hebreo la permite y el contexto no exige borrar el valor temporal concreto. El español puede leerlo como el próximo momento de revisión sin perder naturalidad.
  doctrine_reference: No doctrinal; decisión temporal/idiomática
- issue: 'גָּנ֥וּב ה֖וּא אִתִּֽי: frase judicial tersa'
  english_pob_reading: any such animal found with Jacob counts as stolen.
  chosen_spanish_reading: será robado; está conmigo
  alternative_spanish_readings:
  - será considerado robado si está conmigo
  - si se halla conmigo, es robado
  rationale: La frase hebrea es elíptica y el español requiere completar un poco la relación predicativa. Se preserva la dureza legal, pero la formulación sigue siendo compacta para no sobreexplicar.
  doctrine_reference: No doctrinal; lenguaje judicial del relato
translation_notes:
  revision_awareness: La traducción inglesa pasó de «honesty» a «righteousness», de «inspect my wages» a una formulación más cercana al hebreo, y de «dark-colored» a «dark». La versión española sigue esa línea de mayor literalidad donde el hebreo es claro, pero conserva una redacción natural y mantiene las tensiones léxicas relevantes en justicia, temporalidad y color de los animales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; este versículo no lo contiene.
  - Se prefirió «justicia» para צִדְקָתִי por su amplitud ética y forense.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque no aparece aquí.
  - Se mantuvo un registro bíblico moderno, sin arcaísmos innecesarios.
  - Las categorías animales se expresan de forma comprensible en español, aun cuando la terminología exacta del hebreo admita matices de clase o color.
