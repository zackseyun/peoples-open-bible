    issue: «enviaste lejos» es poco natural en español para ἐξαπέστειλας
    rationale: Aunque comunica alejamiento, en español suena algo calcado. «Mandaste lejos» o «enviaste fuera» funcionan mejor; «mandaste lejos» mantiene la carga emotiva del reproche materno con mejor idiomaticidad.
  - severity: medium
    issue: «nuestro niño» sobreespecifica un matiz infantil para παιδίον
    rationale: El griego expresa afecto materno, pero en español «nuestro niño» puede sonar excesivamente infantil. «Nuestro hijo» es más natural y sigue siendo fiel al contexto familiar.
