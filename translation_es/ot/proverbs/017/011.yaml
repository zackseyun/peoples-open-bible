translation:
  language: es
  text: Un hombre rebelde busca solo el mal, y le será enviado un mensajero[a] cruel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ángel». La palabra hebrea puede significar tanto «mensajero» como «ángel».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - nada más
  lexicon: HALOT
  rationale: El hebreo es restrictivo; en español 'solo' conserva la limitación de manera natural y sin añadir énfasis innecesario.
- source_word: מְרִי
  english_pob_choice: a rebellious man
  chosen_spanish: un hombre rebelde
  alternatives_spanish:
  - un rebelde
  - la rebeldía
  - un hombre de rebelión
  lexicon: HALOT
  rationale: Aunque el sustantivo puede ser abstracto, aquí funciona metonímicamente como persona. 'Un hombre rebelde' mantiene el valor nominal y la referencia masculina singular del contexto.
- source_word: יְבַקֶּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - busca con empeño
  - procura
  - anda buscando
  lexicon: HALOT
  rationale: El piel de בקש expresa buscar/ procurar. 'Busca' es la opción más directa y natural en español proverbiales.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - mal
  - maldad
  - daño
  - desastre
  lexicon: HALOT
  rationale: Aquí el término puede abarcar mal moral y daño resultante. 'El mal' preserva esa amplitud mejor que una opción puramente moralizante o puramente consecuencial.
- source_word: מַלְאָךְ
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - ángel
  - enviado
  lexicon: HALOT
  rationale: Se preserva la amplitud semántica del hebreo sin imponer de entrada una lectura sobrenatural. 'Mensajero' funciona bien en español y mantiene abierta la tensión léxica.
- source_word: אַכְזָרִי
  english_pob_choice: cruel
  chosen_spanish: cruel
  alternatives_spanish:
  - sin piedad
  - feroz
  - despiadado
  lexicon: HALOT
  rationale: '''Cruel'' es la correspondencia más directa y natural para el adjetivo, con el tono fuerte del juicio del proverbio.'
- source_word: יְשֻׁלַּח
  english_pob_choice: will be sent
  chosen_spanish: se enviará
  alternatives_spanish:
  - será enviado
  - será despachado
  lexicon: HALOT
  rationale: El pasivo comunica una acción futura de juicio. En español, 'se enviará' mantiene la forma pasiva sin recargar la frase.
- source_word: בּוֹ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - a él
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente más amplio, el contexto hostil exige una dirección adversativa. 'Contra él' expresa mejor la fuerza punitiva en español.
theological_decisions:
- issue: 'מַלְאָךְ: ¿mensajero humano o ángel sobrenatural?'
  english_pob_reading: messenger, with footnote noting possible angel
  chosen_spanish_reading: mensajero, con nota de que también puede entenderse como ángel
  alternative_spanish_readings:
  - ángel
  - enviado
  rationale: No hay marcador explícito en el verso que obligue a identificar al agente como celestial. Se conserva 'mensajero' en el texto principal y se deja abierta la alternativa tradicional para no resolver prematuramente la tensión del hebreo.
  doctrine_reference: 'Principio POB: preservar la tensión léxica y teológica cuando el texto no la resuelve explícitamente.'
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «A rebel» a «A rebellious man» para reflejar con mayor precisión el sustantivo hebreo. En español se siguió esa revisión con «un hombre rebelde», evitando reducirlo a un simple sustantivo aislado y manteniendo el paralelo con los verbos singulares del verso.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; en este versículo no aparece el tetragrámaton.
  - Se mantiene «mensajero» en el texto principal para no forzar la lectura de «ángel».
  - Se opta por «el mal» para conservar la amplitud semántica de רָע en un proverbio de intención y consecuencia.
