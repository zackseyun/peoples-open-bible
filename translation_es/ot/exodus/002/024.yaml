revisions:
- from: Yahvé oyó su[a] gemido, y Yahvé se acordó de su pacto con Abraham, con Isaac[b] y con Jacob.
  to: Dios oyó sus gemidos[a], y Dios se acordó de su pacto con Abraham, con Isaac[b], y con Jacob.
  rationale: La revisión corrige el principal problema de fidelidad fuente al restituir «Dios» para אֱלֹהִים. También mejora la correspondencia con la decisión léxica inglesa al usar «sus gemidos», que expresa mejor el valor colectivo de נַאֲקָתָם y permite una nota alternativa significativa. Se conserva «se acordó» y «pacto» por fidelidad léxica y teológica, con una nota que explica el lenguaje de pacto sin parafrasear el texto principal.
