translation:
  language: es
  text: Sus manos son varas[a] de oro, engastadas con berilo[b]; su cuerpo[c] es marfil bruñido, cubierto de zafiros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'anillos de oro'. El término hebreo se refiere a formas redondeadas de oro y puede evocar una hechura semejante a joyas.
    reason: lexical_alternative
  - marker: b
    text: O 'engastadas con topacio' o 'engastadas con crisólito'; la identificación precisa de la piedra nombrada por el hebreo תַּרְשִׁישׁ es incierta.
    reason: lexical_alternative
  - marker: c
    text: O 'su vientre', 'sus entrañas' o 'su abdomen'. El hebreo puede referirse literalmente al vientre o a las entrañas, pero aquí el contexto favorece una descripción corporal más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus brazos
  lexicon: HALOT
  rationale: En este contexto poético de descripción corporal, יָדָיו se entiende de manera directa como 'manos'. En español, 'manos' conserva la imagen concreta y natural, mientras que 'brazos' sería una extensión interpretativa menos precisa.
- source_word: גְּלִילֵי זָהָב
  english_pob_choice: rods of gold
  chosen_spanish: cilindros de oro
  alternatives_spanish:
  - barras de oro
  - anillos de oro
  lexicon: HALOT
  rationale: גְּלִילִים refiere a formas redondeadas o cilíndricas. 'Cilindros' refleja mejor esa geometría que 'barras', y evita fijar la imagen en 'anillos', que es una posibilidad tradicional pero menos segura.
- source_word: מְמֻלָּאִים בַּתַּרְשִׁישׁ
  english_pob_choice: set with beryl
  chosen_spanish: llenos de berilo
  alternatives_spanish:
  - engastados con berilo
  - llenos de piedra de tarshish
  - engastados con topacio
  - engastados con crisólito
  lexicon: HALOT
  rationale: El participio pasivo hebreo dice literalmente 'llenados', y la POB inglesa optó por la imagen joyera de 'set with'. En español, 'llenos de berilo' mantiene la cercanía al hebreo y también comunica el efecto ornamental sin forzar demasiado la equivalencia técnica de engaste. Se preserva la incertidumbre del nombre de la piedra mediante alternativas.
- source_word: מֵעָיו
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su vientre
  - sus entrañas
  - su abdomen
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar literalmente 'vientre' o 'entrañas', el contexto poético permite una referencia más amplia al torso/cuerpo. Siguiendo la revisión inglesa, 'su cuerpo' evita una restricción anatómica excesiva y suena natural en español.
- source_word: עֶשֶׁת שֵׁן
  english_pob_choice: polished ivory
  chosen_spanish: marfil bruñido
  alternatives_spanish:
  - marfil pulido
  - obra de marfil
  - marfil trabajado
  lexicon: HALOT
  rationale: La expresión apunta a marfil trabajado o afinado. 'Bruñido' comunica la superficie refinada y pulida que la imagen sugiere, con tono digno y poético en español.
- source_word: מְעֻלֶּפֶת סַפִּירִים
  english_pob_choice: covered with sapphires
  chosen_spanish: cubierto de zafiros
  alternatives_spanish:
  - recubierto de zafiros
  - adornado con zafiros
  lexicon: HALOT
  rationale: El participio transmite la idea de estar cubierto o recubierto. 'Cubierto de zafiros' conserva la fuerza visual y sigue de cerca la lectura inglesa. 'Zafiros' mantiene la tradición de traducción, aunque la identificación exacta de la piedra antigua siga siendo incierta.
theological_decisions:
- issue: Descripción corporal idealizada en poesía amorosa
  english_pob_reading: Literal bodily description favored over metaphorical inward parts language
  chosen_spanish_reading: Descripción corporal literal dentro de la poesía amorosa
  alternative_spanish_readings:
  - imagen metafórica de sus entrañas
  - referencia simbólica a su interior
  rationale: La POB inglesa decidió no espiritualizar ni abstrayente el texto; en este género, la imagen celebra la belleza corporal. 'Su cuerpo' mantiene la lectura literal amplia sin trasladar el verso a una alegoría no indicada por el hebreo.
  doctrine_reference: Poética bíblica / Cantar de los Cantares 5:14
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que amplió el sentido de מֵעָיו de 'abdomen' a 'body' por ser más fiel al contexto poético. También conserva la incertidumbre léxica de תַּרְשִׁישׁ mediante nota, y mantiene la imaginería joyera sin introducir interpretaciones devocionales ajenas al texto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en el texto fuente.
  - Se prefirió 'zafiros' como equivalencia tradicional en español, con la advertencia de que la piedra antigua puede no coincidir exactamente con la gema moderna.
  - No se usó 'Señor' ni 'Cristo', pues no pertenecen a este pasaje.
  - La opción 'su cuerpo' sigue la revisión del audit trail inglés y evita una traducción demasiado estrecha de מֵעָיו.
