base_translation:
  language: en
  yaml_path: translation/ot/genesis/001/006.yaml
  text: And God said[a], “Let there be an expanse in the midst of the waters[b], and let it separate water from water.”
  footnotes:
  - marker: a
    text: Or “firmament,” “vault,” or “dome.” The Hebrew רָקִיעַ refers to something spread out; English renderings differ based on how explicitly they reflect the ancient cosmological picture.
    reason: lexical_alternative
  - marker: b
    text: Literally, “separating between waters and waters,” that is, distinguishing one body of water from another.
    reason: lexical_alternative
