  text: הַצִּ֘ילֵ֤/נִי מִ/דָּמִ֨ים אֱֽלֹהִ֗ים אֱלֹהֵ֥י תְּשׁוּעָתִ֑/י תְּרַנֵּ֥ן לְ֝שׁוֹנִ֗/י צִדְקָתֶֽ/ךָ׀׃
base_translation:
