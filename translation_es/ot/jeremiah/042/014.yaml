translation:
  language: es
  text: 'diciendo: «No, sino que iremos a la tierra de Egipto, donde no veremos guerra, ni oiremos el sonido de la trompeta, ni tendremos hambre de pan; y allí viviremos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y allí habitaremos». El verbo hebreo puede referirse tanto a residir establemente como a permanecer en un lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: La forma introduce el discurso citado y en español encaja naturalmente como gerundio de enlace. Conserva la relación discursiva sin añadir explicación.
- source_word: לֹא כִּי
  english_pob_choice: No, but
  chosen_spanish: No, sino que
  alternatives_spanish:
  - No, pero
  - No; más bien
  lexicon: HALOT
  rationale: La combinación hebrea expresa rechazo fuerte seguido de contraste. «Sino que» reproduce mejor el valor adversativo que un simple «pero».
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  - el país de Egipto
  lexicon: HALOT
  rationale: Se conserva el sustantivo «tierra», presente en el hebreo, para mantener la forma concreta y formal de la afirmación.
- source_word: נָבֹוא
  english_pob_choice: we will go into
  chosen_spanish: iremos a
  alternatives_spanish:
  - entraremos en
  - iremos hacia
  lexicon: HALOT
  rationale: El verbo de movimiento con destino puede expresarse en español de manera natural con «ir a». «Iremos a» conserva la dirección sin sonar forzado.
- source_word: אֲשֶׁר
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - en la cual
  lexicon: HALOT
  rationale: Con antecedente locativo, «donde» es el equivalente español más natural y directo.
- source_word: לֹא נִרְאֶה מִלְחָמָה
  english_pob_choice: we will not see war
  chosen_spanish: no veremos guerra
  alternatives_spanish:
  - no experimentaremos guerra
  - no presenciaremos guerra
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del hebreo («ver guerra») con un español claro. «Guerra» mantiene el sustantivo singular sin diluirlo en una interpretación más abstracta.
- source_word: וְקֹול שׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido de la trompeta
  alternatives_spanish:
  - la voz de la trompeta
  - el toque de trompeta
  lexicon: HALOT
  rationale: «Sonido» refleja bien קוֹל. «Trompeta» sigue la elección inglesa de una equivalencia comprensible para שׁוֹפָר, aunque el término también puede aludir al cuerno de carnero.
- source_word: לֹא נִשְׁמָע
  english_pob_choice: we will not hear
  chosen_spanish: ni oiremos
  alternatives_spanish:
  - no escucharemos
  - ni se oirá
  lexicon: HALOT
  rationale: En la secuencia de verbos en primera persona plural, el sentido se expresa de forma idiomática con «oiremos». La negación coordinada con «ni» conserva el paralelismo.
- source_word: וְלַחֶם לֹא נִרְעָב
  english_pob_choice: we will not be hungry for bread
  chosen_spanish: ni tendremos hambre de pan
  alternatives_spanish:
  - ni pasaremos hambre de pan
  - ni nos faltará pan
  lexicon: HALOT
  rationale: El hebreo usa una construcción con «pan» como objeto de necesidad; «tener hambre de pan» comunica bien la idea sin perder la imagen concreta del alimento básico. Se mantiene «pan» en vez de generalizar a «comida».
- source_word: וְשָׁם נֵשֵׁב
  english_pob_choice: and there we will live
  chosen_spanish: y allí habitaremos
  alternatives_spanish:
  - y allí viviremos
  - y allí moraremos
  lexicon: HALOT
  rationale: ישׁב admite residencia estable. «Habitar» conserva mejor la noción de asentamiento que un simple «estar», y también respeta la nota de la POB inglesa sobre la posibilidad de «dwell».
translation_notes:
  revision_awareness: 'La POB inglesa revisó la sintaxis para reflejar con mayor naturalidad el orden del hebreo: primero la negación enfática, luego la referencia a la tierra de Egipto, y después la serie de negaciones paralelas. Esta versión española sigue ese patrón y también adopta la última formulación inglesa para «we will not hear the sound of the trumpet» y «we will not be hungry for bread», evitando invertir los complementos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene el paralelismo de tres negaciones con «no veremos... ni oiremos... ni tendremos hambre...».
  - «Habitar» se conserva como posible equivalente de residencia estable, en línea con la nota inglesa sobre שָׁם נֵשֵׁב.
