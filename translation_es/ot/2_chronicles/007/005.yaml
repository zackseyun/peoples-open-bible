translation:
  language: es
  text: Y el rey Salomón sacrificó veintidós mil reses y ciento veinte mil ovejas[a], y el rey y todo el pueblo dedicaron la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ganado menor», pues el término hebreo puede incluir ovejas y cabras en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  english_pob_choice: sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - ofreció en sacrificio
  - inmoló
  lexicon: HALOT
  rationale: En contexto cultual, זבח expresa sacrificar mediante inmolación/ofrenda. «Sacrificó» es natural en español y conserva el sentido ritual sin sobreexplicar.
- source_word: זֶבַח הַבָּקָר
  english_pob_choice: cattle
  chosen_spanish: cabezas de ganado
  alternatives_spanish:
  - ganado
  - bueyes
  lexicon: HALOT
  rationale: El hebreo habla de un sacrificio de animales de hato; «cabezas de ganado» evita restringir indebidamente a bueyes y suena claro en español para una gran cuenta sacrificial.
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף
  english_pob_choice: twenty-two thousand
  chosen_spanish: veintidós mil
  alternatives_spanish:
  - veinte y dos mil
  lexicon: HALOT
  rationale: Número cardinal estándar en español moderno, fiel y transparente.
- source_word: וְצֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - animales de rebaño
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras en conjunto. El texto inglés optó por «sheep» con nota; en español «ovejas» es la forma más natural, mientras la nota preserva el alcance colectivo posible.
- source_word: מֵאָה וְעֶשְׂרִים אָלֶף
  english_pob_choice: one hundred twenty thousand
  chosen_spanish: ciento veinte mil
  alternatives_spanish:
  - cien y veinte mil
  lexicon: HALOT
  rationale: Número cardinal estándar en español moderno.
- source_word: וַיַּחְנְכוּ
  english_pob_choice: dedicated
  chosen_spanish: dedicaron
  alternatives_spanish:
  - inauguraron
  - consagraron
  lexicon: HALOT
  rationale: חנך aquí se refiere a la dedicación/inauguración formal del edificio. «Dedicaron» es el equivalente más claro y sobrio en español; «consagraron» puede sonar más técnico o más cargado litúrgicamente.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión literal «casa de Dios» para reflejar el hebreo בֵּית הָאֱלֹהִים y evitar sustituirla por «templo», que aunque válido es más interpretativo.
- source_word: הַמֶּלֶךְ וְכָל הָעָם
  english_pob_choice: the king and all the people
  chosen_spanish: el rey y todo el pueblo
  alternatives_spanish:
  - el rey Salomón y todo el pueblo
  lexicon: HALOT
  rationale: Tras nombrar a Salomón, el hebreo retoma «el rey»; conservarlo respeta el patrón discursivo y no añade redundancia innecesaria.
theological_decisions:
- issue: Renderizar צֹאן en un contexto de sacrificios masivos
  english_pob_reading: '''sheep'' with footnote noting ''small livestock'' as a broader lexical possibility'
  chosen_spanish_reading: '''ovejas'' con nota de que el término puede abarcar ganado menor'
  alternative_spanish_readings:
  - ganado menor
  - rebaño de ovejas y cabras
  rationale: El término hebreo puede incluir ovejas y cabras. Como el texto inglés conserva «sheep» y documenta la amplitud semántica, el español puede usar «ovejas» como equivalente natural y añadir una nota para no borrar la posibilidad colectiva del original.
  doctrine_reference: No aplica; decisión léxica de alcance semántico.
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que unió ambas cláusulas con «and» en inglés; por ello se usa una sola cadena coordinada con «y», sin inferir una relación consecutiva que el hebreo no exige explícitamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; en este versículo no aparece.
  - «Casa de Dios» conserva la fórmula literal del hebreo y la preferencia auditada del inglés.
  - La segunda mención de «el rey» se conserva sin repetir «Salomón», siguiendo la estructura del original.
