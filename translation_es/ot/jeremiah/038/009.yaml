base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/038/009.yaml
  text: My lord the king[a], these men have done evil in all that they did to Jeremiah the prophet, whom they threw into the cistern, and he will die there because of the famine, for there is no bread left in the city.
  footnotes:
