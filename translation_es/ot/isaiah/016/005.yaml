revisions:
- from: Un trono será establecido en amor fiel[a][b], y uno se sentará sobre él en fidelidad[c], en la tienda de David, juzgando y buscando justicia, y pronto para hacer rectitud.
  to: Un trono será establecido en amor fiel[a][b], y uno se sentará sobre él en fidelidad[c], en la tienda de David, juzgando y buscando justicia, y pronto para obrar con rectitud.
  rationale: Se revisa únicamente la cláusula final para lograr un español natural y fiel al hebreo poético. «Pronto para obrar con rectitud» preserva la idea de prontitud en la acción justa sin el giro poco idiomático «hacer rectitud». El resto del versículo y las notas pueden mantenerse.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:01:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: trono establecido, sujeto implícito preservado con «uno», «en fidelidad», «en la tienda de David», y la serie participial judicial. También conserva correctamente las alternativas documentadas en notas para el sujeto implícito y אֱמֶת. Sin embargo, el cierre «pronto para hacer rectitud» no suena natural en español y debilita la fuerza ético-jurídica de צֶדֶק; conviene ajustar esa frase sin apartarse del sentido fuente.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos puntos mejorables: «amor fiel» es aceptable aunque algo menos idiomático que «amor leal» o «amor constante»; aun así puede mantenerse porque la nota lexical lo explica bien. El problema principal es «hacer rectitud», que es torpe y poco natural en español bíblico contemporáneo. «Obrar con rectitud» expresa mejor la idea de acción justa. También mejora la fluidez «pronto para obrar con rectitud».'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Justicia» para מִשְׁפָּט está bien. Para צֶדֶק, «rectitud» puede funcionar, pero en esta construcción debe ir con un verbo idiomático: «obrar con rectitud».'
  issues:
  - severity: medium
    issue: La frase «y pronto para hacer rectitud» es poco natural en español.
    rationale: Aunque intenta reflejar la compresión del hebreo וּמְהִר צֶדֶק, «hacer rectitud» no es giro idiomático. «Obrar con rectitud» conserva el sentido de prontitud para actuar rectamente y mantiene la distinción respecto de «justicia» en la cláusula anterior.
  - severity: low
    issue: «Amor fiel» es comprensible pero algo menos idiomático que otras opciones.
    rationale: No es un error de fidelidad, y la nota explica bien חֶסֶד. Puede mantenerse para respetar la decisión lexical ya documentada, aunque «amor leal» sonaría algo más natural.
  revised_spanish_text: Un trono será establecido en amor fiel[a][b], y uno se sentará sobre él en fidelidad[c], en la tienda de David, juzgando y buscando justicia, y pronto para obrar con rectitud.
  revised_footnotes:
  - marker: a
    text: 'O: «él se sentará sobre él»; el hebreo deja implícito el sujeto.'
    reason: alternative_reading
  - marker: b
    text: «Amor fiel» traduce חֶסֶד, término que suele incluir lealtad de pacto, misericordia y amor constante.
    reason: lexical_alternative
  - marker: c
    text: 'O: «en verdad».'
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente la cláusula final para lograr un español natural y fiel al hebreo poético. «Pronto para obrar con rectitud» preserva la idea de prontitud en la acción justa sin el giro poco idiomático «hacer rectitud». El resto del versículo y las notas pueden mantenerse.
