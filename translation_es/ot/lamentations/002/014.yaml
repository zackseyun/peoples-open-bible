    reason: alternative_reading
  - marker: b
    text: O «cargas», una traducción tradicional del término profético aquí vertido como «oráculos».
    reason: lexical_alternative
  revision_rationale: Se corrige la principal desalineación con la auditoría inglesa al llevar el idiomático שׁוּב שְׁבִית al texto principal como «restaurar tu suerte» y reservar la lectura más literal de cautiverio para nota. También se reubican correctamente los marcadores de nota para que correspondan al término o frase pertinente. Se conserva el resto de la redacción por ser fiel y legible.
