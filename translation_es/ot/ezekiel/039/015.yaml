base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/015.yaml
  text: And those who pass through the land will pass through[a], and when one sees a human bone[b], he will set up a marker beside it until the buriers have buried it in the Valley of Hamon-gog.
  footnotes:
  - marker: a
    text: Or 'a man's bone.' The Hebrew uses adam, which can mean 'man' or refer generically to a human being; here the generic sense best fits the burial procedure.
    reason: lexical_alternative
  - marker: b
    text: Hamon-gog likely means 'the multitude of Gog' or 'Gog's multitude,' but it is retained here as a place name.
    reason: lexical_alternative
