translation:
  language: es
  text: Pero si hago lo que no quiero, ya no soy yo quien lo hace, sino el pecado que habita en mí.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: Conserva la transición condicional con contraste suave; «Pero si» es natural en español y refleja bien el giro argumentativo de Pablo.
- source_word: ὃ οὐ θέλω τοῦτο ποιῶ
  english_pob_choice: I do what I do not want
  chosen_spanish: hago lo que no quiero
  alternatives_spanish:
  - practico lo que no quiero
  - hago eso mismo que no quiero
  lexicon: BDAG
  rationale: «Hago» corresponde de forma directa a ποιῶ y evita duplicar innecesariamente el verbo, mientras mantiene la relación relativa-correlativa del griego en español claro y fiel.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no ya
  - no más
  lexicon: BDAG
  rationale: «Ya no» expresa con naturalidad en español el sentido temporal/lógico de οὐκέτι y preserva la negación de estado continuado.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito conserva el énfasis paulino; en español el orden «ya no soy yo» mantiene esa fuerza sin añadir explicación.
- source_word: κατεργάζομαι
  english_pob_choice: doing it
  chosen_spanish: lo hace
  alternatives_spanish:
  - lo realiza
  - lo lleva a cabo
  lexicon: BDAG
  rationale: En este contexto, la distinción principal no requiere un verbo más técnico; «lo hace» respeta la referencia directa al acto y sigue el ajuste del POB inglés a un verbo más llano.
- source_word: ἡ οἰκοῦσα ἐν ἐμοὶ ἁμαρτία
  english_pob_choice: sin dwelling in me
  chosen_spanish: el pecado que habita en mí
  alternatives_spanish:
  - el pecado que mora en mí
  - el pecado que vive en mí
  lexicon: BDAG
  rationale: «Que habita en mí» conserva la imagen participial de οἰκοῦσα y su personificación de ἁμαρτία, sin convertirla en «naturaleza pecaminosa» ni suavizar la tensión del texto.
theological_decisions:
- issue: Relación entre el «yo» y el pecado que habita en él
  english_pob_reading: Translate the clause straightforwardly as Paul's rhetorical distinction between 'I' and 'sin dwelling in me,' without softening either element.
  chosen_spanish_reading: Traducir la distinción retórica de Pablo entre «yo» y «el pecado que habita en mí», sin resolverla ni atenuarla.
  alternative_spanish_readings:
  - parafrasear para explicar la doctrina del pecado interno
  - usar «naturaleza pecaminosa» en lugar de «pecado»
  rationale: El griego nombra directamente ἁμαρτία, no σάρξ; por eso la traducción debe preservar la tensión teológica y retórica del pasaje, no resolverla con una explicación interpretativa.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: Se tomó como guía la última revisión inglesa, que prefirió «doing it» a formulaciones más explicativas, para mantener una correspondencia más directa entre ποιῶ / κατεργάζομαι y un español sencillo, sin perder el contraste paulino entre la acción y el pecado que habita.
  spanish_consistency_notes:
  - Se mantuvo «pecado» y no «naturaleza pecaminosa» para respetar el vocabulario explícito del griego.
  - Se prefirió «habita en mí» para conservar la imagen de residencia de οἰκοῦσα.
  - Se usó «yo» explícito para reflejar el énfasis del pronombre griego ἐγώ.
  - La puntuación reproduce el contraste adversativo del versículo con una cadencia natural en español.
