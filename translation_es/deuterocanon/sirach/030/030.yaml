translation:
  language: es
  text: Porque es mejor que tus hijos tengan que pedirte, que tú mires a las manos de tus hijos varones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática, «que dependas de tus hijos varones para tu sustento». El griego dice literalmente: «que mires a las manos de tus hijos varones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - más bueno
  - preferible
  - superior
  lexicon: LSJ
  rationale: El comparativo griego expresa una preferencia de valor o conveniencia; en español, «mejor» comunica de forma natural esa comparación sin perder el sentido evaluativo.
- source_word: τὰ τέκνα
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus niños
  - tus descendientes
  - tus hijos e hijas
  lexicon: LSJ
  rationale: τέκνα es un término general para hijos/descendencia; el posesivo σου lo hace explícitamente «tus». «Hijos» conserva la naturalidad del español y el paralelismo con la segunda mitad del verso, que distingue υἱῶν.
- source_word: δεηθῆναί
  english_pob_choice: should beg
  chosen_spanish: te pidan
  alternatives_spanish:
  - te rueguen
  - te imploren
  - te mendiguen
  lexicon: LSJ
  rationale: El verbo puede abarcar pedir con insistencia o suplicar. En este contexto de necesidad económica, «te pidan» es más natural en español y puede llevar la idea de dependencia; «te rueguen» o «te imploren» suenan más intensos, mientras que «te mendiguen» añade una dureza no exigida por el griego.
- source_word: ἐμβλέπειν
  english_pob_choice: look to
  chosen_spanish: mires a
  alternatives_spanish:
  - dependas de
  - miras hacia
  - pongas la vista en
  lexicon: LSJ
  rationale: El griego conserva una imagen concreta de mirar hacia algo. «Mires a» preserva el gesto visual y permite que el contexto comunique la dependencia, sin convertir prematuramente la metáfora en una abstracción.
- source_word: εἰς χεῖρας
  english_pob_choice: to the hands
  chosen_spanish: a las manos
  alternatives_spanish:
  - en las manos
  - hacia las manos
  - de las manos
  lexicon: LSJ
  rationale: La expresión griega es literal y corporal. «A las manos» mantiene la imagen de orientación hacia las manos como lugar de apoyo o sustento; evita neutralizar la metáfora en una lectura meramente explicativa.
- source_word: υἱῶν
  english_pob_choice: sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos e hijas
  - tus varones
  lexicon: LSJ
  rationale: Aunque υἱῶν es específicamente «hijos varones», en español «hijos» puede funcionar de modo genérico o masculino inclusivo. Aquí se mantiene la relación familiar sin forzar una marcación sexual que resulte extraña en la fluidez del verso; la distinción semántica sigue estando en la oposición con τέκνα.
theological_decisions:
- issue: Distinción entre τέκνα y υἱῶν
  english_pob_reading: children ... sons
  chosen_spanish_reading: hijos ... hijos
  alternative_spanish_readings:
  - hijos ... hijos varones
  - niños ... hijos
  rationale: El griego distingue un término general (τέκνα) de uno más específico (υἱῶν). En español, la primera cláusula se traduce naturalmente como «tus hijos»; la segunda conserva el mismo sustantivo por idiomaticidad, pero la nota léxica explica que el original dice literalmente «hijos varones».
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Imagen de dependencia económica expresada corporalmente
  english_pob_reading: look to the hands of your sons
  chosen_spanish_reading: mires a las manos de tus hijos
  alternative_spanish_readings:
  - dependas de tus hijos
  - mires a las manos de tus hijos para sostén
  rationale: El griego usa una imagen concreta de mirar hacia las manos, no un término abstracto para dependencia. El español conserva la imagen en el texto principal y deja la posible inferencia de sustento en el contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Tensión entre literalidad e inteligibilidad en el verbo δεηθῆναί
  english_pob_reading: should beg
  chosen_spanish_reading: te pidan
  alternative_spanish_readings:
  - te rueguen
  - tengan que pedirte
  rationale: La traducción principal evita una formulación demasiado áspera o arcaica, pero no borra la nota de necesidad. En el conjunto del verso, la dependencia vergonzosa se entiende por contraste con la imagen de depender de los hijos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que suavizó «have to beg» a «should beg» para sonar más formal y natural. En español se reflejó esa decisión con «te pidan», manteniendo la fuerza de dependencia sin introducir una obligación explícita que el griego no exige. También se conservó la imagen literal de «las manos» como en el inglés revisado, porque el audit trail la considera aceptable y la nota aclara el sentido idiomático.
  spanish_consistency_notes:
  - Se mantiene «hijos» en ambas cláusulas por naturalidad del español, pero se documenta la distinción original entre τέκνα y υἱῶν.
  - Se evita «Señor» u այլ equivalentes porque no aparece lenguaje divino en este versículo.
  - La puntuación reproduce una sola frase comparativa con dos cláusulas introducidas por «que», en consonancia con el griego y el inglés auditado.
