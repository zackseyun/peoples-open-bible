translation:
  language: es
  text: Y todas las naciones verdaderamente se volverán para temer a Yahvé Dios[a]; enterrarán sus ídolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «verdaderamente volverán para temer a Yahvé Dios». El verbo griego puede significar «volverse» o «volver/regresar», y aquí expresa el giro sincero de las naciones hacia Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los gentiles
  - cada nación
  lexicon: LSJ
  rationale: ἔθνη aquí abarca a los pueblos de la tierra en sentido universal. «Todas las naciones» conserva ese alcance amplio y suena natural en español bíblico sin restringir indebidamente a una categoría étnico-religiosa.
- source_word: ἐπιστρέψουσιν
  english_pob_choice: will turn
  chosen_spanish: se volverán
  alternatives_spanish:
  - volverán
  - se convertirán
  lexicon: LSJ
  rationale: El verbo expresa un giro o retorno. «Se volverán» mantiene la imagen de cambio de rumbo; «volverán» puede sonar demasiado elíptico y «se convertirán» introduce una terminología más técnica que no está explícita en el griego.
- source_word: ἀληθινῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - de verdad
  - genuinamente
  lexicon: LSJ
  rationale: El adverbio califica la sinceridad del cambio. «Verdaderamente» preserva la fuerza adverbial y el tono solemne con buena naturalidad en español.
- source_word: φοβεῖσθαι
  english_pob_choice: to fear
  chosen_spanish: temer
  alternatives_spanish:
  - reverenciar
  - adorar
  lexicon: LSJ
  rationale: La POB inglesa conserva «fear» por su fuerza bíblica. En español, «temer» mantiene esa tensión teológica de temor reverente; «reverenciar» suaviza demasiado y «adorar» amplía el sentido más allá del verbo griego.
- source_word: Κύριον τὸν θεόν
  english_pob_choice: the Lord God
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - el Señor, Dios
  - el Señor su Dios
  lexicon: LSJ
  rationale: El griego tiene el sintagma articular «el Señor Dios» sin posesivo. «El Señor Dios» respeta la estructura; se usa «Señor» en lugar de una sustitución por SEÑOR para conservar la convención de nombre divino en español POB.
- source_word: κατορύξουσιν
  english_pob_choice: will bury
  chosen_spanish: enterrarán
  alternatives_spanish:
  - ocultarán
  - sepultarán
  lexicon: LSJ
  rationale: El verbo literalmente significa excavar hacia abajo/enterrar. «Enterrarán» reproduce la imagen de manera idiomática y clara; «sepultarán» es posible, pero suena más fúnebre y menos directa aquí.
- source_word: τὰ εἴδωλα αὐτῶν
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  - sus falsos dioses
  lexicon: LSJ
  rationale: «Ídolos» es la equivalencia religiosa directa de εἴδωλα en este contexto. «Imágenes» resulta demasiado neutro y «falsos dioses» interpreta más de lo que el sustantivo dice.
theological_decisions:
- issue: Cómo rendir φοβεῖσθαι sin perder la tensión bíblica entre temor y reverencia
  english_pob_reading: to fear
  chosen_spanish_reading: temer
  alternative_spanish_readings:
  - reverenciar
  - venerar
  rationale: La fuente griega usa el lenguaje bíblico directo del temor de Dios. «Temer» conserva la tensión teológica y evita suavizar el texto hacia una mera actitud afectiva.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica documentada; no domesticar el lenguaje bíblico.'
- issue: Si ἐπιστρέψουσιν debe expresarse como conversión técnica
  english_pob_reading: will turn
  chosen_spanish_reading: se volverán
  alternative_spanish_readings:
  - se convertirán
  - volverán
  rationale: El griego presenta una metáfora de giro/retorno. «Se volverán» deja visible esa imagen y evita imponer terminología doctrinal posterior que no está lexicalmente explicitada.
  doctrine_reference: 'DOCTRINE.md: primacía del original; equivalencia óptima sin borrar metáforas del texto fuente.'
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto sin cambios; el acuerdo de revisión fue alto y no se registraron problemas de control cruzado.
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριος en continuidad con la convención POB en español, evitando el reemplazo por una máscara tipográfica como SEÑOR.
  - Se mantiene «ídolos» para εἴδωλα por su fuerza religiosa específica.
  - El adverbio «verdaderamente» refleja el matiz de ἀληθινῶς sin expandir el sentido a una paráfrasis interpretativa.
