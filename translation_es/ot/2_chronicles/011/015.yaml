    rationale: Aunque reproduce la decisión inglesa 'goat-demons', en español suena forzado y semicalcado. La revisión debe conservar el sentido demoníaco/caprino sin sacrificar legibilidad.
  - severity: low
    issue: La nota al pie depende de una forma principal mejorable
    rationale: La nota es correcta en sustancia, pero conviene armonizarla con una forma principal más idiomática en el texto.
