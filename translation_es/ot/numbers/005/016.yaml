translation:
  language: es
  text: Entonces el sacerdote la acercará y la pondrá en pie delante de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR»; aquí se usa «Yahvé» para preservar el nombre divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: shall bring her near
  chosen_spanish: la traerá cerca
  alternatives_spanish:
  - la presentará
  - la hará acercarse
  lexicon: HALOT
  rationale: El hifil de קרב conserva la idea espacial de acercar o presentar. En español, «traerá cerca» comunica ese movimiento sin convertirlo en un término técnico de ofrenda que el contexto inmediato no exige.
- source_word: אֹתָהּ
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  lexicon: 'Morfología hebrea: sufijo de objeto directo femenino singular'
  rationale: El pronombre objeto femenino singular reproduce con naturalidad el referente de la mujer en español y evita una redundancia innecesaria.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiando
  - el ministro
  lexicon: HALOT
  rationale: כֹּהֵן en contexto cultual/legal se traduce con el término español estándar «sacerdote». No hay aquí razón textual para sustituirlo por una perífrasis.
- source_word: וְהֶעֱמִדָהּ
  english_pob_choice: make her stand
  chosen_spanish: la pondrá en pie
  alternatives_spanish:
  - la hará estar de pie
  - la hará ponerse de pie
  lexicon: HALOT
  rationale: El hifil de עמד es causativo. «La pondrá en pie» expresa en español la idea de hacer que alguien quede de pie, manteniendo la fuerza causativa de manera idiomática.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» conserva el valor espacial y relacional de לִפְנֵי en un registro natural y claro. «Ante» también sería posible, pero «delante de» resulta más transparente en este contexto narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la decisión del POB de representar el Tetragrámaton con el nombre propio divino en español. «Yahvé» es la forma adoptada en el texto principal, de acuerdo con la convención del proyecto en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la política del POB de no ocultar el nombre divino tras un título, el español conserva el nombre propio de Dios; en esta edición, la forma normalizada es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se registraron cambios respecto del borrador anterior y la concordancia de revisión es alta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del Tetragrámaton, en coherencia con el criterio del proyecto.
  - «Sacerdote» conserva el valor cultual de כֹּהֵן sin añadir interpretaciones.
  - 'La traducción busca una equivalencia óptima: cercana al hebreo, pero con sintaxis española natural.'
