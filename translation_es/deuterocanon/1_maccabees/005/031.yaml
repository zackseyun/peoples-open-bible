translation:
  language: es
  text: Y Judas vio que la batalla había comenzado, y el clamor de la ciudad subió hasta el cielo con toques de trompeta[a] y un gran clamor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con trompetas y fuerte clamor'. Los dativos griegos pueden entenderse de manera más instrumental o más general como sonidos que acompañan la escena.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦρκται
  english_pob_choice: had begun
  chosen_spanish: había comenzado
  alternatives_spanish:
  - había empezado
  - ya estaba en curso
  lexicon: LSJ
  rationale: El perfecto griego indica que la acción ya estaba en marcha cuando Judas la vio; el pluscuamperfecto español conserva esa anterioridad narrativa.
- source_word: ὁ πόλεμος
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: LSJ
  rationale: En este contexto inmediato se trata del enfrentamiento presente, no de una guerra en sentido amplio; 'batalla' refleja mejor la escena.
- source_word: ἡ κραυγὴ τῆς πόλεως
  english_pob_choice: the outcry of the city
  chosen_spanish: el clamor de la ciudad
  alternatives_spanish:
  - el grito de la ciudad
  - la gritería de la ciudad
  lexicon: LSJ
  rationale: κραυγή expresa un clamor o grito fuerte. 'Clamor' mantiene el tono colectivo y natural en español para el ruido que sube desde la ciudad.
- source_word: ἀνέβη ἕως οὐρανοῦ
  english_pob_choice: went up to heaven
  chosen_spanish: subió hasta el cielo
  alternatives_spanish:
  - subió hasta el cielo
  - ascendió hasta el cielo
  lexicon: LSJ
  rationale: La imagen idiomática de ascenso se conserva en español con una expresión directa y bíblicamente inteligible; 'cielo' es el equivalente natural de οὐρανοῦ en este registro.
- source_word: σάλπιγξιν
  english_pob_choice: with trumpet blasts
  chosen_spanish: con toques de trompeta
  alternatives_spanish:
  - con trompetas
  - con sones de trompeta
  lexicon: LSJ
  rationale: El dativo indica acompañamiento o manera; 'toques de trompeta' explicita el sonido sin perder la referencia instrumental.
- source_word: κραυγῇ μεγάλῃ
  english_pob_choice: and a great cry
  chosen_spanish: y gran gritería
  alternatives_spanish:
  - y un gran clamor
  - y un gran grito
  lexicon: LSJ
  rationale: La segunda dative intensifica el estruendo. 'Gritería' comunica bien la sensación de múltiples voces y el carácter tumultuoso de la escena.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada; la presente redacción mantiene el sentido del griego y la equivalencia óptima sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene 'Judas' como nombre propio.
  - Se evita 'SEÑOR' o terminología no pertinente; el versículo no contiene vocabulario divino directo.
  - Se prefirió 'cielo' por naturalidad en español bíblico, sin alterar la imagen ascendente del griego.
  - No se usaron notas al pie porque no quedó ninguna ambigüedad que requiriera marcación textual.
