  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: «El nombre del primero es Pisón; es el que rodea toda la tierra de Havila, donde hay oro» preserva שֵׁם, el valor ordinal de הָאֶחָד, el referente no personal de הוּא, el sentido espacial de הַסֹּבֵב, y la cláusula locativa-existencial אֲשֶׁר שָׁם הַזָּהָב. Sin embargo, la nota al pie no preserva adecuadamente la alternativa significativa documentada en la auditoría inglesa, porque repite básicamente la misma redacción en lugar de ofrecer una verdadera opción léxica como «circunda».'
  spanish_quality_summary: El español es claro, natural y digno. «Rodea toda la tierra de Havila» suena bien y evita añadir «fluye». La única reparación necesaria es la nota al pie, para que aporte una alternativa real y justifique mejor la elección principal. El texto principal no necesita cambio.
  glossary_alignment: No hay términos del glosario principal especialmente conflictivos en este versículo. Los nombres propios «Pisón» y «Havila» son aceptables en español bíblico. La decisión «rodea» para הַסֹּבֵב concuerda con la revisión inglesa que evitó sobreinterpretar «flows around».
  issues:
  - severity: medium
    issue: La nota al pie actual no ofrece una alternativa léxica real.
    rationale: 'El texto de la nota dice: «O “el que rodea toda la tierra de Havila”», que repite esencialmente la lectura principal. La auditoría inglesa preserva una alternativa significativa («encircles/surrounds»). En español conviene reflejarla con una opción distinta, como «circunda», para que la nota tenga valor documental.'
  revised_spanish_text: El nombre del primero es Pisón; es el que rodea toda la tierra de Havila[a], donde hay oro.
  revised_footnotes:
  - marker: a
    text: O «el que circunda toda la tierra de Havila». El participio hebreo puede traducirse «rodea» o «circunda»; «rodea» es la forma más natural en español.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota al pie para que preserve una alternativa léxica auténtica y útil, en línea con la documentación inglesa.
