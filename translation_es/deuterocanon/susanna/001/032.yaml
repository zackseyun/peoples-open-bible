review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta la estructura básica del griego, pero introduce una sobretraducción importante en ἀποκαλύψαι αὐτήν al usar «desnudada», cuando el sentido documentado es «descubrirla/quitarle la cobertura», probablemente el velo. Además, la cláusula final omite explícitamente ἐπιθυμίας y termina diciendo que ellos se sacian «de la hermosura de ella», lo cual desplaza el sentido de «satisfacer su deseo por su belleza».
  spanish_quality_summary: El español es comprensible, pero «desnudada» sugiere desnudez total y excede el texto. «De la hermosura de ella» suena poco natural en español actual; «de su hermosura» o una reestructuración más idiomática mejora la legibilidad. La nota actual también repite una formulación algo torpe («llenura»).
  glossary_alignment: 'No hay términos del glosario mayor directamente implicados. La decisión «los hombres sin ley» es defendible y preserva el matiz legal-moral de παράνομοι. El problema principal es de fidelidad léxica: ἀποκαλύψαι no debe intensificarse a «desnudar», y ἐπιθυμία debe permanecer visible en el texto principal, no absorberse en «hermosura».'
  issues:
  - severity: high
    issue: «desnudada» sobretraduce ἀποκαλύψαι αὐτήν
    rationale: El griego dice literalmente «descubrirla / dejarla descubierta», y el contexto auditado lo entiende como quitarle la cobertura o velo ante la asamblea. «Desnudar» en español normalmente implica quitar la ropa y sugiere más de lo que el texto afirma.
  - severity: high
    issue: Se omite el sentido explícito de ἐπιθυμία en la cláusula final
    rationale: «Para que se saciaran de la hermosura de ella» hace de la hermosura el objeto directo del saciarse, pero el griego habla de quedar satisfechos/llenos en relación con el deseo provocado por su belleza. El deseo debe permanecer expresado.
  - severity: medium
    issue: «de la hermosura de ella» suena forzado en español
    rationale: Aunque no es incorrecto, resulta poco natural en español bíblico moderno neutral. «su hermosura» o «su belleza» comunica mejor el posesivo griego.
  - severity: low
    issue: La nota al pie puede afinarse para sonar más natural
    rationale: «tuvieran su llenura» es poco idiomático. «quedaran llenos de deseo» o «se hartaran de deseo» preserva mejor la literalidad sin torpeza.
  revised_spanish_text: Y los hombres sin ley ordenaron que ella fuera descubierta[a], para satisfacer su deseo por su hermosura.
  revised_footnotes:
  - marker: a
    text: O «para que quedaran llenos de deseo por su hermosura»; el griego habla literalmente de ser «llenados» en relación con su hermosura.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «desnudada» por «descubierta» para no implicar desnudez total donde el griego solo dice «descubrir». Se rehace la cláusula final para mantener explícita ἐπιθυμία («deseo») y reflejar con naturalidad que ellos querían satisfacer ese deseo al contemplar su hermosura. También se mejora la fluidez del español y la nota léxica.
