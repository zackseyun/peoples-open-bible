review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del versículo y conserva correctamente «animales impuros», «según tu valuación» y «será vendido». Sin embargo, falla en el sujeto y la voz de וּפָדָה: el hebreo aquí no dice «será redimido» sino una acción activa del redentor en este caso legal («lo redimirá»). Además, la nota [b] está anclada al verbo equivocado: la explicación literal corresponde a «y añadirá una quinta parte…», no a «será redimido».'
  spanish_quality_summary: El español es generalmente claro, pero «será redimido» introduce ambigüedad y rompe la secuencia normativa. «Añadirá una quinta parte sobre ella» es entendible, aunque más natural y fiel al sentido legal sería «añadirá una quinta parte a su valor» o «le añadirá una quinta parte». También conviene mantener la nota explicativa junto al segmento pertinente.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Impuros», «redimir», y «valuación» son aceptables en contexto. La única desalineación significativa es gramatical/lexical en וּפָדָה, donde el borrador español justificó indebidamente una pasiva que no corresponde a ese verbo en esta cláusula.
  issues:
  - severity: high
    issue: «será redimido» traduce incorrectamente וּפָדָה
    rationale: וּפָדָה es una forma activa en esta cláusula legal; la pasiva pertenece a la cláusula posterior וְאִם לֹא יִגָּאֵל. En español debe expresarse activamente, p. ej. «lo redimirá».
  - severity: medium
    issue: La nota [b] está colocada sobre la frase equivocada
    rationale: La nota explica la expresión literal «y añadirá su quinta parte sobre ello/ella», pero en el borrador está anclada en «será redimido». Debe moverse al segmento sobre la quinta parte.
  - severity: low
    issue: «sobre ella» suena menos natural en español legal actual
    rationale: Aunque intenta reflejar la estructura hebrea, en español resulta más claro «a su valor» o «le añadirá una quinta parte», preservando el sentido de sumar veinte por ciento a la valuación.
  revised_spanish_text: Pero si está entre los animales impuros[a], entonces lo redimirá según tu valuación, y añadirá una quinta parte[b] a su valor; y si no es redimido, entonces será vendido según tu valuación.
  revised_footnotes:
  - marker: a
    text: O «de entre el ganado impuro». El hebreo se refiere a un animal perteneciente a la categoría de animales ritualmente impuros.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y añadirá su quinta parte sobre ello»; es decir, añadirá un veinte por ciento al valor tasado.
    reason: lexical_alternative
  revision_rationale: Se corrige la voz verbal de וּפָדָה a una forma activa («lo redimirá»), en línea con el hebreo y con la auditoría inglesa revisada. Se reubica la nota [b] al segmento que realmente explica y se mejora la naturalidad de la frase aditiva con «a su valor», sin perder el sentido técnico de sumar una quinta parte a la valuación.
