base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/013.yaml
  text: So I went out by night through the Valley Gate[a], toward the Dragon Spring and toward the Dung Gate[b], and I inspected the walls of Jerusalem that had been broken down and its gates that had been consumed by fire.
  footnotes:
  - marker: a
    text: Or 'Serpent Spring' or 'Jackal Spring'; the Hebrew place name uses tannin, a term with a range including dragon, serpent, or similar creature.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression traditionally rendered 'I viewed' is literally more difficult; here it is understood in context as 'I was inspecting' the damaged walls.
    reason: lexical_alternative
