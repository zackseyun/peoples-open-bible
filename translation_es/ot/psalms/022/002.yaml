translation:
  language: es
  text: Dios mío, Dios mío, ¿por qué me has abandonado? Lejos de mi salvación[a] están las palabras de mi rugido[b].[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi liberación» o «mi ayuda». El hebreo יְשׁוּעָה puede significar «salvación», «liberación» o «ayuda».
    reason: lexical_alternative
  - marker: b
    text: O «mi gemido» o «mi clamor». El hebreo dice literalmente «las palabras de mi rugido», con una imagen vívida de angustia intensa.
    reason: lexical_alternative
  - marker: c
    text: O «Lejos de mi liberación están las palabras de mi rugido».
    reason: previous_rendering
lexical_decisions:
- source_word: אֵלִי אֵלִי
  english_pob_choice: My God, my God
  chosen_spanish: Dios mío, Dios mío
  alternatives_spanish:
  - ¡Dios mío, Dios mío!
  lexicon: HALOT
  rationale: El hebreo es una doble vocativa de lamentación y dirección a Dios. «Dios mío, Dios mío» conserva la repetición, el posesivo y el tono de súplica sin añadir una expansión interpretativa.
- source_word: לָמָה
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿con qué motivo?
  - ¿por qué razón?
  lexicon: HALOT
  rationale: Es la interrogativa natural en español y reproduce la fuerza del lamento sin volverlo más explicativo de lo que el hebreo dice.
- source_word: עֲזַבְתָּנִי
  english_pob_choice: have you forsaken me
  chosen_spanish: me has abandonado
  alternatives_spanish:
  - me has dejado
  - me has desamparado
  lexicon: HALOT
  rationale: «Abandonado» comunica bien el valor de dejar/forsake en un contexto de angustia. Se evita «desamparado» por ser más marcado en registro eclesiástico, aunque sería viable.
- source_word: רָחוֹק
  english_pob_choice: Far from
  chosen_spanish: Lejos de
  alternatives_spanish:
  - A distancia de
  - Muy lejos de
  lexicon: HALOT
  rationale: La construcción adverbial se vierte de modo natural como «Lejos de», manteniendo la relación espacial/relacional del hebreo sin sobreexplicar.
- source_word: מִישׁוּעָתִי
  english_pob_choice: my deliverance / my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi rescate
  - mi ayuda
  lexicon: HALOT
  rationale: Aunque el contexto de lamento admite «liberación» o «rescates», aquí se preserva la opción de la POB inglesa «my salvation» porque el hebreo יְשׁוּעָה la permite y la secuencia poética queda más reconocible en español. Se mantiene la tensión entre sentido inmediato de auxilio y resonancia más amplia de salvación.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - las palabras de
  - los dichos de
  lexicon: HALOT
  rationale: El constructo plural se refleja de forma directa con «las palabras de», la equivalencia más clara y sobria en español.
- source_word: שַׁאֲגָתִי
  english_pob_choice: my roaring
  chosen_spanish: mi rugido
  alternatives_spanish:
  - mi clamor
  - mi bramido
  - mi grito
  lexicon: HALOT
  rationale: Se conserva la imagen vigorosa del término, que literalmente remite al rugir. «Rugido» preserva la fuerza metafórica mejor que «clamor» o «grito», aunque estos suavizan o generalizan el matiz.
theological_decisions:
- issue: Sentido de יְשׁוּעָה en un salmo de lamento con posible resonancia mesiánica
  english_pob_reading: my salvation
  chosen_spanish_reading: mi salvación
  alternative_spanish_readings:
  - mi liberación
  - mi rescate
  - mi ayuda
  rationale: Se retiene «mi salvación» porque es una traducción legítima del sustantivo hebreo y porque la POB inglesa preservó esa posibilidad como lectura principal en su versión revisada. En español, esta opción conserva la resonancia bíblica sin negar que el valor inmediato en el lamento sea el de auxilio concreto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Estructura del segundo hemistiquio como afirmación de distancia más que como pregunta añadida
  english_pob_reading: Far from my salvation are the words of my roaring.
  chosen_spanish_reading: Lejos de mi salvación están las palabras de mi rugido.
  alternative_spanish_readings:
  - Lejos de mi liberación están las palabras de mi rugido
  - Las palabras de mi rugido están lejos de mi salvación
  rationale: Se conserva la sintaxis comprimida del hebreo, sin convertirla en una pregunta interpretativa. Esto mantiene la aspereza del lamento y evita introducir un sujeto verbal no expresado por el texto fuente.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: 'El pasaje pasó por una revisión donde se eliminó una paráfrasis interrogativa añadida en inglés y se volvió a una forma más cercana a la estructura hebrea. Para el español, se siguió esa dirección: se mantuvo la afirmación de distancia del segundo colon y no se añadió una pregunta interpretativa inexistente en el original.'
  spanish_consistency_notes:
  - Se usa «Dios mío» para אֵלִי, consistente con la convención de POB para el vocativo divino sin ocultar el nombre con una fórmula litúrgica.
  - Se prefirió «mi salvación» en el texto principal para conservar la polisemia de יְשׁוּעָה y su resonancia bíblica, con nota alternativa.
  - Se mantuvo «rugido» para שַׁאֲגָה por su fuerza imagística; en español es un término menos habitual que «clamor», pero reproduce mejor el paralelismo con el hebreo.
  - La puntuación con coma y dos interrogaciones sigue el paralelismo poético y la pausa del lamento sin forzar una sintaxis proseada.
