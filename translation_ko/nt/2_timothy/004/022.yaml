  text: The Lord be with your spirit. Grace be with you all.
translation:
  language: ko
  text: 주께서 그대의 영과 함께 계시기를 빕니다. 은혜가 여러분 모두와 함께 있기를 빕니다.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 단수에서 복수로 바뀐다. 「그대의 영」(단수, 디모데)에서 「여러분 모두」(복수, 디모데 주변의 회중)로 시야가 확장된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ κύριος μετὰ τοῦ πνεύματός σου
  english_pob_choice: The Lord be with your spirit
  chosen_korean: 주께서 그대의 영과 함께 계시기를 빕니다
  alternatives_korean:
  - 주께서 그대의 영혼과 함께하시기를 빕니다
  - 주께서 그대의 영과 함께하시기를 원합니다
  lexicon: BDAG
  rationale: 「영」(πνεῦμα)을 보존하여 단순한 「그대와 함께」가 아닌, 인격의 핵심을 향한 축복의 무게를 살린다.
- source_word: ἡ χάρις μεθ’ ὑμῶν
  english_pob_choice: Grace be with you all
  chosen_korean: 은혜가 여러분 모두와 함께 있기를 빕니다
  alternatives_korean:
  - 은혜가 여러분과 함께 있기를 빕니다
  - 은혜가 너희 모두와 함께
  lexicon: BDAG
  rationale: 복수 ὑμῶν의 시야 확장(디모데 → 회중)을 「여러분 모두」로 분명히 살린다. 본 마감 송영은 디모데뿐 아니라 그를 둘러싼 신앙 공동체 전체를 향한다.
