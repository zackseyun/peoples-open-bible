translation:
  language: es
  text: 'Habla a los hijos de Israel[a], diciendo: El que ofrece su sacrificio de paz[b] a Yahvé traerá su ofrenda a Yahvé de su sacrificio de paz[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «su sacrificio de ofrendas de paz»; tradicionalmente «ofrenda de paz», y en algunas versiones «ofrenda de comunión».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: Imperativo de hablar en un marco de instrucción divina; «Habla» mantiene el tono directo y natural en español sin añadir paráfrasis.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la fuerza literal del hebreo masculino plural y el sentido corporativo del pueblo del pacto.
- source_word: הַמַּקְרִיב
  english_pob_choice: He who offers
  chosen_spanish: El que ofrece
  alternatives_spanish:
  - El que presenta
  - El que trae
  lexicon: HALOT
  rationale: En contexto sacrificial, ofrecer expresa bien el acto cultual y sigue la decisión auditada en inglés de usar terminología sacrificial cercana.
- source_word: זֶבַח שְׁלָמָיו
  english_pob_choice: his sacrifice of peace offerings
  chosen_spanish: su sacrificio de ofrendas de paz
  alternatives_spanish:
  - su sacrificio de ofrendas de paz
  - su sacrificio de paz
  lexicon: HALOT
  rationale: Se conserva זֶבַח como «sacrificio» y שְׁלָמִים con una expresión que refleja la categoría sacrificial sin reemplazarla por una formulación más interpretativa. El plural técnico se expresa con «ofrendas de paz».
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: DOCTRINE.md default terminology
  rationale: Se sigue el término del proyecto para el nombre divino, evitando el ocultamiento con «SEÑOR».
- source_word: יָבִיא
  english_pob_choice: shall bring
  chosen_spanish: traerá
  alternatives_spanish:
  - deberá traer
  - traerá
  lexicon: HALOT
  rationale: El imperfecto legal expresa obligación/instrucción; «traerá» es una forma natural y suficientemente normativa en español bíblico moderno.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su ofrenda
  - su oblación
  lexicon: HALOT
  rationale: קרבן designa la ofrenda presentada a Dios; «ofrenda» es el equivalente más claro y ampliamente inteligible.
- source_word: מִזֶּבַח שְׁלָמָיו
  english_pob_choice: from his sacrifice of peace offerings
  chosen_spanish: de su sacrificio de ofrendas de paz
  alternatives_spanish:
  - de su sacrificio de ofrendas de paz
  - de sus ofrendas de paz
  lexicon: HALOT
  rationale: La preposición מִן marca procedencia; se conserva la relación entre la ofrenda general y el sacrificio específico, sin suavizarla.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se aplica el estándar del proyecto para el nombre del pacto y se evita la sustitución tradicional por una máscara tipográfica.
  doctrine_reference: 'DOCTRINE.md contested terms: YHWH → Yahvé'
- issue: Terminología de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrenda de paz
  - ofrendas de comunión
  rationale: La formulación mantiene el carácter técnico del sacrificio y refleja el plural hebreo sin eliminar la referencia a la paz/bienestar.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Dirección cultual y obligación legal
  english_pob_reading: shall bring
  chosen_spanish_reading: traerá
  alternative_spanish_readings:
  - deberá traer
  - ha de traer
  rationale: El futuro simple en español puede expresar mandato en texto legal; conserva la fuerza prescriptiva sin recargar la frase.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se ajustó la frase para que no requiera notas sin anclaje y para mantener una sintaxis española fluida, conservando el paralelismo del hebreo y la terminología sacrificial auditada en el contexto inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se conserva la estructura repetida «de su sacrificio de ofrendas de paz» para reflejar la repetición hebrea.
  - No se introdujeron notas al pie para evitar marcadores no anclados en el texto.
