translation:
  language: es
  text: Había allí, ese día[a], un hombre de entre los siervos de Saúl, detenido delante de Yahvé; su nombre era Doeg el edomita, el principal de los pastores de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «retenido delante de Yahvé» o «contenido delante de Yahvé». El hebreo no especifica por qué Doeg estaba detenido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁם
  english_pob_choice: Now ... was there
  chosen_spanish: Ahora ... había allí
  alternatives_spanish:
  - Y allí ... había
  - Entonces ... había allí
  lexicon: HALOT
  rationale: Combina la apertura narrativa y el valor locativo de forma natural en español. «Ahora» introduce el aparte discursivo; «había allí» conserva la presencia local sin sonar forzado.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - un cierto hombre
  lexicon: HALOT
  rationale: El sustantivo es indefinido y refiere a una persona masculina concreta. «Un hombre» es directo y fiel al hebreo.
- source_word: מֵעַבְדֵי שָׁאוּל
  english_pob_choice: of Saul’s servants
  chosen_spanish: de entre los siervos de Saúl
  alternatives_spanish:
  - de los siervos de Saúl
  - entre los siervos de Saúl
  - de los servidores de Saúl
  lexicon: HALOT
  rationale: El מן partitivo indica que era uno entre ellos. «Siervos» conserva el valor básico de עֶבֶד en contexto de servicio real; «de entre» expresa mejor la selección partitiva que un simple posesivo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: Expresa la referencia temporal con naturalidad en español y mantiene la deixis del hebreo.
- source_word: נֶעְצָר לִפְנֵי יְהוָה
  english_pob_choice: detained before Yahweh
  chosen_spanish: detenido delante de Yahvé
  alternatives_spanish:
  - retenido delante de Yahvé
  - contenido delante de Yahvé
  - detenido ante Yahvé
  lexicon: HALOT
  rationale: «Detenido» conserva la idea de ser retenido/impedido sin especificar la causa. «Delante de Yahvé» traduce la locución cultual לִפְנֵי יְהוָה con el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene la transliteración establecida para el Tetragrámaton, en lugar de sustituirla por un título.
- source_word: וּשְׁמוֹ דֹּאֵג הָאֲדֹמִי
  english_pob_choice: his name was Doeg the Edomite
  chosen_spanish: su nombre era Doeg el edomita
  alternatives_spanish:
  - y su nombre era Doeg el edomita
  - llamado Doeg el edomita
  lexicon: HALOT
  rationale: La fórmula nominal se vierte con la estructura más natural en español. «Edomita» traduce el gentilicio sin transliteración innecesaria.
- source_word: אַבִּיר
  english_pob_choice: the chief
  chosen_spanish: el principal
  alternatives_spanish:
  - el jefe
  - el mayor
  - el notable
  lexicon: HALOT
  rationale: אַבִּיר puede denotar prominencia o preeminencia. «Principal» comunica rango o autoridad sin imponer una lectura técnica excesiva; se preserva así la ambigüedad de estatus que el hebreo permite.
- source_word: הָרֹעִים
  english_pob_choice: shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los cuidadores de ovejas
  - los ganaderos
  lexicon: HALOT
  rationale: El sentido básico es «pastores». En combinación con el contexto de la corte de Saúl, el término puede referirse al personal encargado del rebaño real, sin necesidad de especificar más.
- source_word: אֲשֶׁר לְשָׁאוּל
  english_pob_choice: of Saul’s shepherds
  chosen_spanish: de Saúl
  alternatives_spanish:
  - que eran de Saúl
  - que pertenecían a Saúl
  lexicon: HALOT
  rationale: 'La cláusula relativa indica pertenencia o asociación. En español puede integrarse de modo natural en el sintagma posesivo final: «los pastores de Saúl».'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo emplea el nombre propio divino y el proyecto lo vierte por transliteración. Se mantiene «Yahvé» en español por coherencia terminológica y para no ocultar el nombre personal de Dios tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de נֶעְצָר לִפְנֵי יְהוָה
  english_pob_reading: detained before Yahweh
  chosen_spanish_reading: detenido delante de Yahvé
  alternative_spanish_readings:
  - retenido delante de Yahvé
  - contenido delante de Yahvé
  - impedido delante de Yahvé
  rationale: La frase no explica por qué Doeg estaba retenido ni especifica el trasfondo exacto. «Detenido» preserva esa indeterminación y evita resolver la tensión con una explicación ritual no expresada en el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios en la última revisión; el presente borrador sigue de cerca sus decisiones léxicas y preserva la ambigüedad de נֶעְצָר לִפְנֵי יְהוָה. La opción española adapta la sintaxis para publicación, sin introducir explicaciones ausentes en el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «siervos» para עַבְדֵי, en línea con el valor básico del término en servicio real.
  - «Detenido» mantiene la ambigüedad semántica del pasivo hebreo sin resolver el motivo de la detención.
  - «Pastores» traduce הָרֹעִים de manera directa, y «de Saúl» integra la cláusula relativa final de forma natural en español.
