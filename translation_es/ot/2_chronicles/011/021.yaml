base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/011/021.yaml
  text: Rehoboam loved Maacah the daughter of Absalom more than all his wives and his concubines[a], for he had taken eighteen wives and sixty concubines, and he fathered twenty-eight sons and sixty daughters.
  footnotes:
