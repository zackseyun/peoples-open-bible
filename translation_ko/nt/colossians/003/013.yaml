id: COL.3.13
reference: Colossians 3:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀνεχόμενοι ἀλλήλων καὶ χαριζόμενοι ἑαυτοῖς ἐάν τις πρός τινα ἔχῃ μομφήν· καθὼς καὶ ὁ ⸀κύριος ἐχαρίσατο ὑμῖν οὕτως καὶ ὑμεῖς·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/013.yaml
  text: bearing with one another and forgiving each other, if anyone has a complaint against anyone; just as the Lord also forgave you, so also you must do.
translation:
  language: ko
  text: 서로 용납하며, 누구든지 다른 사람에게 불만이 있거든 서로 용서하십시오. 주께서 여러분을 용서하신 것같이 여러분도 그렇게 하십시오.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀνεχόμενοι ἀλλήλων
  english_pob_choice: bearing with one another
  chosen_korean: 서로 용납하며
  alternatives_korean:
  - 서로 참아 주며
  - 서로 견디며
  lexicon: BDAG
  rationale: 「용납」은 한국 교회의 정립된 표현으로 ἀνέχομαι의 「견딤·받아들임」을 담는다.
- source_word: χαριζόμενοι ἑαυτοῖς
  english_pob_choice: forgiving each other
  chosen_korean: 서로 용서하십시오
  alternatives_korean:
  - 서로 은혜로 용서하며
  - 서로 사하며
  lexicon: BDAG
  rationale: χαρίζομαι의 「은혜로 용서함」을 「용서」로 옮긴다. 합쇼체 종결.
- source_word: ἐάν τις πρός τινα ἔχῃ μομφήν
  english_pob_choice: if anyone has a complaint against anyone
  chosen_korean: 누구든지 다른 사람에게 불만이 있거든
  alternatives_korean:
  - 누가 누구에게 불평이 있으면
  - 누군가 다른 이에게 책망할 일이 있다면
  lexicon: BDAG
  rationale: μομφή는 「불만·책망거리」. 자연스러운 한국어로 옮긴다.
- source_word: καθὼς καὶ ὁ κύριος ἐχαρίσατο ὑμῖν
  english_pob_choice: just as the Lord also forgave you
  chosen_korean: 주께서 여러분을 용서하신 것같이
  alternatives_korean:
  - 주께서도 여러분에게 그렇게 하신 것처럼
  - 주께서 여러분을 사하신 것과 같이
  lexicon: BDAG
  rationale: 표준 모범 정형. ὁ κύριος는 「주」.
- source_word: οὕτως καὶ ὑμεῖς
  english_pob_choice: so also you must do
  chosen_korean: 여러분도 그렇게 하십시오
  alternatives_korean:
  - 여러분도 그렇게
  - 여러분도 또한 그렇게 하라
  lexicon: BDAG
  rationale: 헬라어 생략 구문을 한국어에서 「그렇게 하십시오」로 자연스럽게 보완한다.
