revisions:
- from: 'Cuando llegó al hombre de Dios en el monte[a], se agarró de sus pies. Entonces se acercó Guehazí para apartarla, pero el hombre de Dios dijo: «Déjala, porque su alma está amarga dentro de ella[b], y Yahvé ha ocultado esto de mí y no me lo ha revelado».'
  to: 'Cuando llegó al hombre de Dios en el monte[a], se aferró a sus pies. Entonces Guehazí se acercó para apartarla, pero el hombre de Dios dijo: «Déjala, porque su alma está amarga dentro de ella[b], y Yahvé me lo ha ocultado y no me lo ha dicho».'
  rationale: Se ajustó «se agarró de sus pies» a «se aferró a sus pies» para reflejar mejor la fuerza del hebreo con un registro más natural y digno. Se reemplazó «ha ocultado esto de mí» por «me lo ha ocultado» para corregir una construcción poco idiomática en español. También se cambió «no me lo ha revelado» por «no me lo ha dicho» para ceñirse más al verbo hebreo y al paralelismo del texto fuente, sin perder el sentido de revelación retenida por Yahvé.
