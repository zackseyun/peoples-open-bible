lexical_decisions:
- source_word: זִיף
  english_pob_choice: Ziph
  chosen_spanish: Zif
  alternatives_spanish:
  - Sif
  - Zif
  lexicon: topónimo
  rationale: Es un nombre propio de lugar en una lista de asentamientos; se translitera en vez de traducirse. En español, "Zif" conserva la forma breve y legible del topónimo sin añadir vocales no atestiguadas.
- source_word: טֶלֶם
  english_pob_choice: Telem
  chosen_spanish: Telém
  alternatives_spanish:
  - Telem
  - Telém
  lexicon: topónimo
  rationale: También es un topónimo; se preserva la forma propia del nombre. Se usa acento gráfico para guiar la pronunciación en español y mantener una lectura natural sin alterar el nombre.
- source_word: בְעָלוֹת
  english_pob_choice: Bealoth
  chosen_spanish: Bealot
  alternatives_spanish:
  - Bealot
  - Baalot
  lexicon: topónimo
  rationale: El hebreo presenta el nombre del lugar; se translitera como topónimo. Se prefiere "Bealot" por reflejar de manera cercana la forma consonántica y por ser comprensible en español, dejando la alternativa con a inicial como variante tradicional.
- source_word: וָ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y
  lexicon: conjunción
  rationale: La conjunción coordinante se rinde naturalmente como "y" en español para enumerar los elementos de la lista.
- source_word: וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y
  lexicon: conjunción
  rationale: La segunda conjunción coordinante también se expresa como "y", conservando la simple enumeración de topónimos.
