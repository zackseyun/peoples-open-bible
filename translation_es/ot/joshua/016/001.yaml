    changes_summary: Added 'through' before 'the wilderness' to better reflect the boundary description and improve natural English while preserving the source sense.
translation:
  language: es
  text: Y salió la suerte para los hijos de José desde el Jordán junto a Jericó, hasta las aguas de Jericó al oriente, por la región desértica[a], subiendo desde Jericó a la región montañosa de Betel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el desierto». El hebreo puede referirse a una zona de soledad o estepa, no necesariamente a un desierto arenoso en sentido estricto.'
    reason: lexical_alternative
  - marker: b
    text: «Las aguas de Jericó» puede referirse específicamente al manantial o a la fuente de agua de Jericó.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - vino a salir
  - sucedió
  lexicon: HALOT
  rationale: El hebreo literalmente dice que la suerte 'salió'. En español, 'salió' conserva esa imagen de resultado del sorteo sin añadir una interpretación ajena.
- source_word: הַגּוֹרָל
  english_pob_choice: the lot
  chosen_spanish: la suerte
  alternatives_spanish:
  - el lote
  - la porción asignada
  lexicon: HALOT
  rationale: En español bíblico, 'suerte' comunica bien el sorteo distributivo. Mantiene la acción de asignación territorial y evita una expresión más técnica o menos natural.
- source_word: לִבְנֵי יוֹסֵף
  english_pob_choice: for the sons of Joseph
  chosen_spanish: para los hijos de José
  alternatives_spanish:
  - para los descendientes de José
  - para los hijos de José
  lexicon: HALOT
  rationale: '''Hijos de José'' refleja el giro hebreo בני y es comprensible en español. ''Descendientes'' sería más explicativo, pero debilita la forma concreta del original.'
- source_word: מִיַּרְדֵּן יְרִיחוֹ
  english_pob_choice: from the Jordan at Jericho
  chosen_spanish: desde el Jordán en Jericó
  alternatives_spanish:
  - desde el Jordán cerca de Jericó
  - desde el Jordán de Jericó
  lexicon: HALOT
  rationale: La expresión marca un punto geográfico de partida. 'En Jericó' es una manera sobria de reproducir la asociación locativa sin sobreinterpretarla.
- source_word: לְמֵי יְרִיחוֹ
  english_pob_choice: to the waters of Jericho
  chosen_spanish: hasta las aguas de Jericó
  alternatives_spanish:
  - hasta el manantial de Jericó
  - hasta el agua de Jericó
  lexicon: HALOT
  rationale: '''Aguas'' conserva el plural hebreo y evita decidir de antemano si se trata específicamente de un manantial. Es una solución fiel y suficientemente clara en español.'
- source_word: מִזְרָחָה
  english_pob_choice: on the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - hacia el oriente
  - al este
  lexicon: HALOT
  rationale: '''Al oriente'' es una fórmula bíblica natural en español y conserva la orientación cardinal sin sonar técnica o moderna en exceso.'
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto/ermo
  - la estepa
  lexicon: HALOT
  rationale: Aunque 'wilderness' suele traducirse 'desierto', aquí la línea fronteriza y el entorno topográfico permiten 'desierto' como equivalente idiomático. No se fuerza una precisión geográfica que el verso no explicita.
- source_word: עֹלֶה
  english_pob_choice: going up
  chosen_spanish: subiendo
  alternatives_spanish:
  - ascendiendo
  - que sube
  lexicon: HALOT
  rationale: El participio expresa movimiento ascendente en la descripción del límite. 'Subiendo' es natural en español y conserva el dinamismo topográfico.
- source_word: מִירִיחוֹ
  english_pob_choice: from Jericho
  chosen_spanish: desde Jericó
  alternatives_spanish:
  - de Jericó
  lexicon: HALOT
  rationale: Repite el punto de partida con la misma simplicidad del hebreo. 'Desde' hace explícita la dirección del movimiento ascendente.
- source_word: בָּהָר
  english_pob_choice: into the hill country of
  chosen_spanish: a la región montañosa de
  alternatives_spanish:
  - al monte de
  - a la serranía de
  lexicon: HALOT
  rationale: Aquí הָר funciona como área elevada, no solo un monte singular. 'Región montañosa' comunica bien el sentido topográfico sin perder la relación con Betel.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Beth-el
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicional en español. 'Betel' es la forma usual y clara en lectura bíblica.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de forma directa y toma en cuenta la revisión inglesa más reciente que añadió 'through' antes de 'the wilderness' para reflejar mejor el trayecto fronterizo; en español eso se expresa naturalmente con 'por el desierto'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija; este versículo no contiene el Tetragrámaton.
  - Se prefirió 'hijos de José' para conservar el giro tribal del hebreo.
  - '''Al oriente'' y ''por el desierto'' mantienen el estilo geográfico de delimitación del pasaje.'
  - '''Región montañosa'' evita reducir בָּהָר a un solo monte, coherente con la descripción topográfica.'
