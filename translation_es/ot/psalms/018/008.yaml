translation:
  language: es
  text: Entonces la tierra se estremeció y tembló, y los cimientos de los montes temblaron y se estremecieron, porque él estaba airado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque su ira ardió».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְעַשׁ
  english_pob_choice: reeled
  chosen_spanish: se estremeció
  alternatives_spanish:
  - se agitó
  - se convulsionó
  lexicon: HALOT
  rationale: געשׁ expresa agitación violenta o sacudida intensa. En español, 'se estremeció' comunica bien esa convulsión poética de la tierra sin sonar mecánico.
- source_word: וַתִּרְעַשׁ
  english_pob_choice: quaked
  chosen_spanish: tembló
  alternatives_spanish:
  - se sacudió
  - vibró
  lexicon: HALOT
  rationale: רעשׁ denota temblor o sacudida sísmica. 'Tembló' es natural y mantiene el paralelismo con el verbo anterior sin confundir los dos matices.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el mundo
  lexicon: HALOT
  rationale: En este contexto teofánico cósmico, 'la tierra' es más adecuado que un sentido local de 'país' o 'territorio'.
- source_word: מוֹסְדֵי
  english_pob_choice: foundations
  chosen_spanish: cimientos
  alternatives_spanish:
  - fundamentos
  - bases
  lexicon: HALOT
  rationale: La imagen es arquitectónica y poética. 'Cimientos' comunica claramente la idea de soportes fundamentales y funciona de modo idiomático en español.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: En poesía bíblica, 'montes' suena más natural y solemne en español que 'montañas', y conserva la referencia a los relieves elevados del texto hebreo.
- source_word: יִרְגָּזוּ
  english_pob_choice: trembled
  chosen_spanish: se agitaron
  alternatives_spanish:
  - temblaron
  - se conmovieron
  lexicon: HALOT
  rationale: רגז incluye temblor, agitación y conmoción. 'Se agitaron' ayuda a distinguir este verbo del anterior, manteniendo la progresión poética.
- source_word: וַיִּתְגָּעֲשׁוּ
  english_pob_choice: they reeled
  chosen_spanish: se estremecieron
  alternatives_spanish:
  - se sacudieron
  - se agitaron
  lexicon: HALOT
  rationale: La forma hitpael de געשׁ retoma e intensifica la imagen inicial. 'Se estremecieron' conserva el movimiento violento y la reiteración enfática del verso.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la conmoción cósmica. 'Porque' es la opción más clara y directa en español moderno.
- source_word: חָרָה לֽוֹ
  english_pob_choice: he was angry
  chosen_spanish: se encendió su ira
  alternatives_spanish:
  - estaba airado
  - ardió su ira
  lexicon: HALOT
  rationale: La expresión idiomática חרה + ל comunica ira ardiente. 'Se encendió su ira' conserva el componente literal de fuego/ardor sin perder claridad en español y mantiene la tensión antropopática del hebreo.
theological_decisions:
- issue: Descripción antropopática de la ira divina
  english_pob_reading: because he was angry
  chosen_spanish_reading: porque se encendió su ira
  alternative_spanish_readings:
  - porque estaba airado
  - porque ardió su ira
  rationale: El hebreo presenta la ira divina con lenguaje humano e imaginería de fuego. La traducción mantiene esa fuerza sin suavizarla ni convertirla en una explicación doctrinal abstracta.
  doctrine_reference: Anthropopathism in biblical poetry; preserve the source's vivid theological language rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó la pausa por una coordinación con 'and' para reflejar mejor la sucesión de verbos hebreos y eliminó el pronombre redundante. En español se siguió esa misma estructura coordinada, con una cadencia poética natural.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino en otros contextos del proyecto; en este versículo no aparece el Tetragrámaton explícito.
  - Se prefirió 'montes' por estilo poético bíblico, coherente con el registro elevado del Salterio.
  - La secuencia verbal conserva tres movimientos sucesivos y un cierre causal, sin convertir el verso en una paráfrasis explicativa.
