    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde los lomos hasta los muslos». «Caderas» se usa aquí como una traducción moderna y natural del punto superior de la prenda.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el registro de la prenda a un español más digno y eclesialmente legible, se mejora la naturalidad de la frase sobre la desnudez corporal, y se corrige la ubicación de los marcadores de nota para que coincidan con las explicaciones léxicas pertinentes.
