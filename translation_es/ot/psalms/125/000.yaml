review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite correctamente el título, la confianza en Yahvé, la comparación con el monte Sion y la idea de estabilidad permanente. Sin embargo, en el encabezado שִׁיר הַמַּעֲלוֹת el singular «Cántico de ascenso» suena menos fiel que la forma establecida «Cántico de las subidas» o «Cántico de ascensos», porque el hebreo lleva plural. Además, para לֹא יִמּוֹט la opción documentada inglesa preserva la alternativa formal «no será movido», por lo que conviene reflejar mejor ese eje léxico en español en nota.
  spanish_quality_summary: El texto es legible y digno, pero «Cántico de ascenso» resulta algo extraño en español bíblico y su nota alternativa no resuelve bien la naturalidad. «No será sacudido» es comprensible, aunque «no será movido» conecta mejor con la alternativa formal auditada y con el registro bíblico español; puede dejarse «sacudido» como nota alternativa si se quisiera, pero aquí conviene invertir la prioridad.
  glossary_alignment: Se alinea bien con la política del proyecto al usar «Yahvé» y «Sion». No hay conflictos terminológicos mayores. La principal corrección es estilístico-lexical en el superscrito y la correspondencia con la nota léxica de יִמּוֹט.
  issues:
  - severity: medium
    issue: El superscrito «Cántico de ascenso» reduce el plural de הַמַּעֲלוֹת y suena poco idiomático.
    rationale: El hebreo significa literalmente «canto/cántico de las subidas/ascensos». En español bíblico, «Cántico de las subidas» suena natural y conserva mejor el plural del original sin recurrir a una forma rara.
  - severity: low
    issue: La nota del marcador [a] ofrece «Cántico de ascensos», pero esa opción sería mejor como texto principal que «Cántico de ascenso», o bien debe reformularse hacia una alternativa más natural.
    rationale: 'La relación entre texto principal y nota no está bien jerarquizada: la nota no debe contener la opción más fiel/natural si el cuerpo usa una forma inferior.'
  - severity: low
    issue: «No será sacudido» es aceptable, pero no refleja tan bien la alternativa formal inglesa «it will not be moved».
    rationale: Para מוֹט, «mover» en pasiva conserva mejor el campo semántico de desplazamiento/inestabilidad y encaja bien en español bíblico moderno.
  revised_spanish_text: 'Cántico de las subidas. Los que confían en Yahvé son como el monte Sion: no será movido[a]; permanece para siempre.'
  revised_footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «no será sacudido».'
    reason: lexical_alternative
  revision_rationale: Se corrige el superscrito para reflejar el plural hebreo de forma natural en español («Cántico de las subidas»). Se ajusta לֹא יִמּוֹט a «no será movido», que corresponde mejor al matiz formal documentado en la auditoría inglesa, dejando «no será sacudido» como alternativa idiomática en nota. El resto del versículo se mantiene por ser fiel, claro y consistente con la terminología del proyecto.
