translation:
  language: es
  text: ¿No podré hacerles[a], casa de Israel, como hace este alfarero? —declara Yahvé—. Mira, como el barro en la mano del alfarero, así están ustedes en mi mano, casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como este alfarero» / «como hace este alfarero». El hebreo expresa la comparación de forma concisa, y puede verterse en español de más de una manera cercana.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/כַ/יּוֹצֵר הַ/זֶּה
  english_pob_choice: as this potter does
  chosen_spanish: como hace este alfarero
  alternatives_spanish:
  - como este alfarero
  - así como este alfarero hace
  lexicon: HALOT
  rationale: El hebreo une interrogación y comparación de forma concisa; en español conviene explicitar el verbo para conservar la fuerza comparativa sin volverlo oscuro. 'Como hace este alfarero' refleja el sentido de acción implícito en el contexto.
- source_word: אוּכַ֨ל
  english_pob_choice: Can I
  chosen_spanish: ¿No podré
  alternatives_spanish:
  - ¿Acaso no puedo?
  - ¿No puedo?
  lexicon: HALOT
  rationale: El perfecto valor retórico de la pregunta en primera persona permite una formulación natural en español. '¿No podré' conserva la idea de capacidad/poder divina y la forma interrogativa enfática.
- source_word: לַ/עֲשׂ֥וֹת לָ/כֶ֛ם
  english_pob_choice: do to you
  chosen_spanish: hacerles
  alternatives_spanish:
  - tratarles
  - obrar con ustedes
  lexicon: HALOT
  rationale: עָשָׂה es amplio; el contexto del alfarero y el barro autoriza un 'hacer' general. El dativo plural se expresa naturalmente con 'les' para mantener cercanía al hebreo sin sobreespecificar si es favor o juicio.
- source_word: בֵּ֥ית יִשְׂרָאֵ֖ל
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel
  - Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula colectiva/covenantal tradicional del hebreo. 'Casa de Israel' mantiene el registro profético y la correspondencia formal con el original.
- source_word: נְאֻם יְהוָ֑ה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé—
  alternatives_spanish:
  - —dice Yahvé—
  - —oráculo de Yahvé—
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se vierte con 'declara' para mantener su tono solemne y auditable. YHWH se representa como 'Yahvé' según el criterio del proyecto, preservando el nombre divino y no sustituyéndolo por un título.
- source_word: הִנֵּ֤ה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: HALOT
  rationale: '''Mira'' es un imperativo natural en español moderno y conserva la función deíctica y enfática de הִנֵּה sin arcaísmo innecesario.'
- source_word: כַ/חֹ֨מֶר֙
  english_pob_choice: like the clay
  chosen_spanish: como el barro
  alternatives_spanish:
  - como la arcilla
  - como el barro
  lexicon: HALOT
  rationale: חֹמֶר puede referirse al material plástico del alfarero; en español bíblico contemporáneo 'barro' comunica bien la imagen. Se evita 'arcilla' por sonar más técnico y menos natural en el paralelismo.
- source_word: בְּ/יַ֣ד הַ/יּוֹצֵ֔ר
  english_pob_choice: in the hand of the potter
  chosen_spanish: en la mano del alfarero
  alternatives_spanish:
  - en la mano del alfarero
  - en la mano del potero
  lexicon: HALOT
  rationale: Se mantiene la metáfora literal de poder y control. 'Alfarero' es el término estándar en español para el oficio del hebreo y conserva la imagen bíblica clásica sin perder claridad.
- source_word: כֵּן אַתֶּ֥ם בְּ/יָדִ֖/י
  english_pob_choice: so are you in my hand
  chosen_spanish: así están ustedes en mi mano
  alternatives_spanish:
  - así son ustedes en mi mano
  - de la misma manera ustedes están en mi mano
  lexicon: HALOT
  rationale: '''Así están ustedes'' mantiene la correspondencia del comparativo כֵּן con una construcción española natural. ''En mi mano'' conserva la metáfora de soberanía divina sin explicitar más de lo que el texto dice.'
- source_word: בֵּ֥ית יִשְׂרָאֵֽל
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel
  - Israel
  lexicon: HALOT
  rationale: Se conserva la misma fórmula al final para reproducir el encuadre inclusivo del hebreo. Repetir 'casa de Israel' evita perder la resonancia retórica del original.
theological_decisions:
- issue: Metáfora del alfarero y soberanía divina
  english_pob_reading: Retained the metaphor straightforwardly without importing a deterministic theological system.
  chosen_spanish_reading: Se conserva la metáfora de dominio y potestad divina sin convertirla en una tesis filosófica cerrada sobre predestinación.
  alternative_spanish_readings:
  - Se enfatiza una predestinación absoluta
  - Se diluye la imagen en un mero cuidado artesanal
  rationale: El versículo afirma la autoridad de Yahvé sobre Israel mediante la imagen del alfarero y el barro. La traducción debe mantener esa fuerza relacional y soberana, pero sin resolver indebidamente debates doctrinales que el verso no desarrolla.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se corrige el problema de validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español. La redacción sigue el último estado revisado del POB inglés, con el ajuste de la construcción verbal para reflejar mejor לַעֲשׂוֹת לָכֶם y con Yahvé en lugar de una sustitución nominal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton según el criterio del proyecto.
  - Se mantiene 'casa de Israel' como fórmula profética fija.
  - Se conserva 'alfarero' y 'barro' para la imagen literaria central.
  - La nota [a] está anclada en 'hacerles[a]' y no se reutiliza.
