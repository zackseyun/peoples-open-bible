translation:
  language: es
  text: Reprende a un amigo, porque con frecuencia hay calumnia, y no creas toda palabra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no confíes en todo informe». El griego dice literalmente «toda palabra», pero en este contexto se refiere a lo que se dice sobre alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγξον
  english_pob_choice: Reprove
  chosen_spanish: Reprende
  alternatives_spanish:
  - Corrige
  - Amonesta
  - Reprocha
  lexicon: LSJ
  rationale: El imperativo de ἐλέγχω puede expresar reprensión moral o corrección. «Reprende» conserva la fuerza interpersonal y ética sin intensificar innecesariamente el tono a una confrontación pública.
- source_word: φίλον
  english_pob_choice: a friend
  chosen_spanish: a un amigo
  alternatives_spanish:
  - a tu amigo
  - a un compañero
  lexicon: LSJ
  rationale: El singular anartro en griego funciona de manera proverbial y genérica. «A un amigo» mantiene esa generalidad sin añadir el posesivo que no está explícito en el texto.
- source_word: πολλάκις
  english_pob_choice: often
  chosen_spanish: con frecuencia
  alternatives_spanish:
  - a menudo
  - muchas veces
  lexicon: LSJ
  rationale: «Con frecuencia» reproduce bien el adverbio y su valor proverbial, con un registro natural en español.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: Aquí introduce la razón de la exhortación. «Porque» expresa con claridad la relación causal en español sin perder el valor explicativo.
- source_word: γίνεται
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - ocurre
  - se produce
  - surge
  lexicon: LSJ
  rationale: Aunque literalmente significa «llega a ser» o «acontece», con un sustantivo abstracto la equivalencia natural en español es «hay», que comunica la existencia de la situación de modo idiomático.
- source_word: διαβολή
  english_pob_choice: slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - slandra
  - difamación
  - acusación calumniosa
  lexicon: LSJ
  rationale: διαβολή denota acusación o habla difamatoria. «Calumnia» es el equivalente español más claro y sobrio para esta advertencia sapiencial.
- source_word: λόγῳ
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - rumor
  - informe
  - declaración
  lexicon: LSJ
  rationale: En este contexto λόγος refiere a lo dicho, a un dicho o afirmación. «Palabra» conserva la literalidad suficiente y suena natural en español.
- source_word: παντὶ λόγῳ
  english_pob_choice: every word
  chosen_spanish: toda palabra
  alternatives_spanish:
  - cada palabra
  - todo dicho
  - todo informe
  lexicon: LSJ
  rationale: La frase griega es literalmente «a toda palabra». «Toda palabra» mantiene la cercanía al original y la forma proverbial; en español también puede abarcar, por contexto, cualquier dicho o reporte.
- source_word: μὴ ... πίστευε
  english_pob_choice: do not believe
  chosen_spanish: no creas
  alternatives_spanish:
  - no confíes
  - no des crédito
  - no te fíes
  lexicon: LSJ
  rationale: πίστευε aquí exige no aceptar algo como verdadero. «No creas» es directo, claro y fiel al imperativo negativo en español.
translation_notes:
  revision_awareness: La revisión disponible indica que no hubo cambios necesarios respecto al estado anterior; se mantiene la lectura proverbial y la resolución idiomática de γένεται/γίνεται como «hay», con la nota que preserva la alternativa contextual para λόγος.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino ni una cita directa que lo requiera.
  - Se eligió «calumnia» para διαβολή, en línea con el valor de habla difamatoria del término y con un registro bíblico claro en español.
  - Se tradujo λόγος como «palabra» en el texto principal, pero la nota conserva «informe» como alternativa contextual para no perder la posible referencia a rumores o acusaciones.
  - 'El ritmo proverbial se preservó con una estructura breve y paralela: mandato, razón, advertencia negativa.'
