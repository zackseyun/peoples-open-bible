translation:
  language: es
  text: Yahvé continuó apareciéndose en Silo, porque Yahvé se reveló a Samuel en Silo por la palabra de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante la palabra de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  english_pob_choice: continued
  chosen_spanish: continuó
  alternatives_spanish:
  - volvió a
  - siguió
  lexicon: HALOT
  rationale: El hebreo con יסף + infinitivo expresa continuidad o reiteración. «Continuó» comunica bien esa idea en español natural sin perder el valor aspectual del verbo.
- source_word: לְהֵרָאֹה
  english_pob_choice: to appear
  chosen_spanish: apareciéndose
  alternatives_spanish:
  - mostrándose
  - ser visto
  lexicon: HALOT
  rationale: El nifal de ראה aquí expresa manifestación visible. En español, el gerundio pronominal «apareciéndose» conserva la idea de aparición divina y evita una construcción rígida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
  rationale: Se mantiene el nombre propio divino, no una sustitución por título. «Yahvé» es la forma establecida en español para este proyecto y preserva el carácter personal del nombre del pacto.
- source_word: בְשִׁלֹה / בְשִׁלוֹ
  english_pob_choice: at Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Siló
  lexicon: HALOT
  rationale: La preposición locativa ב se expresa naturalmente con «en». Se elige «Silo» como forma toponímica española ampliamente reconocible y sobria.
- source_word: נִגְלָה
  english_pob_choice: revealed himself
  chosen_spanish: se reveló
  alternatives_spanish:
  - se apareció
  - fue revelado
  lexicon: HALOT
  rationale: El nifal de גלה expresa autodescubrimiento o manifestación. «Se reveló» preserva esa auto-revelación y la diferencia de לְהֵרָאֹה, que ya se vertió como «apareciéndose».
- source_word: אֶל שְׁמוּאֵל
  english_pob_choice: to Samuel
  chosen_spanish: a Samuel
  alternatives_spanish:
  - para Samuel
  lexicon: HALOT
  rationale: La dirección del hebreo se expresa de forma directa y natural con «a Samuel».
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - mediante la palabra de Yahvé
  - a través de la palabra de Yahvé
  lexicon: HALOT
  rationale: El ב instrumental se rinde mejor con «por» en español, manteniendo la concisión y el posible valor mediador del sintagma hebreo.
theological_decisions:
- issue: Manifestación divina y auto-revelación
  english_pob_reading: The verse speaks of real divine self-disclosure without specifying the exact mode beyond appearance/revelation by the word of Yahweh.
  chosen_spanish_reading: El versículo afirma una manifestación real de Yahvé y su auto-revelación a Samuel, sin definir más el modo exacto de esa aparición.
  alternative_spanish_readings:
  - Una visión puramente interior de Samuel
  - Una teofanía corporal o visible en sentido estricto
  rationale: 'El hebreo combina dos expresiones: «continuó apareciéndose» y «se reveló». La traducción conserva ambas sin cerrar indebidamente la cuestión del modo de revelación.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se evita la sustitución por título para no borrar el nombre del pacto que el texto usa explícitamente. Esto sigue la convención doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto de auditoría en inglés no presenta revisiones aplicadas y el último pase indicó agreement pleno; por eso la versión española sigue de cerca las decisiones léxicas validadas, especialmente la distinción entre «apareciéndose» y «se reveló», y la conservación del nombre divino Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera uniforme para יְהוָה.
  - Se distingue «apareciéndose» de «se reveló» para reflejar las dos formas verbales hebreas sin colapsarlas.
  - «Silo» se usa como topónimo normalizado en el cuerpo, con nota alternativa para la forma «Siló».
  - La relación causal de כִּי se expresa con «porque» en español claro y formal.
