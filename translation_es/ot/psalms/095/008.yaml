revisions:
- from: No endurezcan su corazón[a][b][c][d], como en Meribá, como en el día de Masá en el desierto.
  to: No endurezcan sus corazones[a][b][c][d], como en Meribá, como en el día en Masá en el desierto.
  rationale: Se corrige 'su corazón' a 'sus corazones' para reflejar con más fidelidad y naturalidad el plural dirigido a la comunidad. También se ajusta la relación entre texto y nota d para que la nota preserve una formulación alternativa real, en vez de repetir la redacción principal. Aunque 'como en el día en Masá' es algo menos fluido, permite que la nota d conserve la opción más natural 'como en el día de Masá' como variante documentada en el historial inglés.
