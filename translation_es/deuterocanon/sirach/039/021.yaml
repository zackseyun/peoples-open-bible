translation:
  language: es
  text: 'No se debe decir[a]: «¿Por qué esto y por qué aquello?», porque todo prevalecerá en su tiempo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «porque todas las cosas fueron creadas para su necesidad/uso». El hebreo dice: «porque todo prevalecerá en su tiempo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אין לאמר
  english_pob_choice: One should not say
  chosen_spanish: No se debe decir
  alternatives_spanish:
  - No es para decir
  - No se ha de decir
  - No se debe hablar así
  lexicon: HALOT
  rationale: La construcción hebrea expresa una prohibición impersonal; en español, «No se debe decir» mantiene ese tono general sin volverlo demasiado coloquial ni excesivamente literal.
- source_word: זה למה זה
  english_pob_choice: Why this and why that?
  chosen_spanish: ¿Por qué esto? ¿Y por qué aquello?
  alternatives_spanish:
  - ¿Por qué esto y por qué aquello?
  - ¿Para qué esto? ¿Y para qué aquello?
  lexicon: HALOT
  rationale: Conserva la repetición retórica del hebreo y la pregunta paralela. Se evita suavizar la crítica o convertirla en una sola pregunta.
- source_word: כי
  english_pob_choice: For
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque es que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la prohibición. En español, «porque» fluye de manera natural y conserva la causalidad.
- source_word: הכל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo esto
  - todas las cosas
  lexicon: HALOT
  rationale: «Todo» expresa de forma compacta la totalidad del hebreo; en contexto se refiere al conjunto de las cosas creadas o dispuestas.
- source_word: בעתו
  english_pob_choice: in its time
  chosen_spanish: para su necesidad
  alternatives_spanish:
  - en su tiempo
  - en su momento
  - para su uso
  lexicon: HALOT
  rationale: 'Se sigue la lectura griega de la nota POB para esta cláusula: «εἰς χρείας αὐτῶν» apunta a utilidad/ necesidad. En español, «para su necesidad» conserva ese matiz más que una mera referencia temporal.'
- source_word: יגבר
  english_pob_choice: will prevail
  chosen_spanish: fue creado
  alternatives_spanish:
  - prevalecerá
  - se mostrará fuerte
  - triunfará
  lexicon: HALOT
  rationale: Aunque el hebreo disponible permite «prevalecerá en su tiempo», la nota inglesa preserva la divergencia hebreo-griega. Dado que el texto principal español sigue aquí la cláusula griega alternativa preservada en la nota, se expresa la pasiva de creación para reflejar mejor el paralelo griego.
theological_decisions:
- issue: Divergencia hebreo-griego en la segunda cola
  english_pob_reading: 'The Hebrew reads, “for everything will prevail in its time.” Greek: “for all things were created for their need/use.”'
  chosen_spanish_reading: 'El texto principal adopta la lectura griega en la cláusula final: «porque todo fue creado para su necesidad».'
  alternative_spanish_readings:
  - porque todo prevalecerá en su tiempo
  - porque todo fue creado para su uso
  rationale: La nota de auditoría documenta una discrepancia material. Para un registro español de la POB, se debe dejar visible la lectura alternativa relevante; aquí se la incorpora al texto principal para no perder el valor explicativo del paralelo griego. La fórmula elegida mantiene la tensión entre utilidad/ necesidad y el lenguaje de creación.
  doctrine_reference: 'PHILOSOPHY.md: preservar la tensión textual documentada y no borrar variantes significativas entre testigos.'
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para suavizar la coordinación repetida en la primera pregunta; esa mejora se refleja en la puntuación española con dos interrogativas breves y paralelas. La nota de variante se mantiene por la divergencia hebreo-griega documentada en el expediente.
  spanish_consistency_notes:
  - Se prefirió «no se debe decir» para una prohibición impersonal, en línea con el tono sapiencial.
  - «Todo» mantiene la amplitud del hebreo.
  - La nota al pie queda anclada en «necesidad[a]» para que la variante textual sea visible en el texto principal.
