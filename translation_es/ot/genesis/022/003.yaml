  - severity: medium
    issue: «holocausto» es menos claro que «ofrenda quemada» para עֹלָה en español actual
    rationale: Aunque tradicional, «holocausto» puede activar una asociación moderna ajena al contexto. «Ofrenda quemada» comunica mejor el término sacrificial con claridad contemporánea y fidelidad semántica.
  - severity: low
