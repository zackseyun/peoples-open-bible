  spanish_quality_summary: '''Casas de lugares altos'' es demasiado calcado y suena poco natural en español; además, la nota ya explica el literal hebreo, por lo que el texto principal puede mantener fidelidad con una forma más idiomática y cultualmente clara. También conviene suavizar ''de los hijos de Leví'' a ''de entre los hijos de Leví'', que conserva la formulación tribal sin sonar forzado.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Sacerdotes' y 'Leví' están bien. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc. El ajuste propuesto preserva la decisión documentada sobre la distinción levítica, mientras mejora la legibilidad española.
  issues:
  - severity: medium
    issue: '''Casas de lugares altos'' suena antinatural en español bíblico actual.'
    rationale: Aunque refleja de cerca el literal inglés revisado y el hebreo בֵּית בָּמוֹת, en español la expresión resulta dura y ambigua. Una formulación como 'santuarios de lugares altos' comunica mejor el referente cultual sin alejarse indebidamente del sentido, especialmente porque la nota puede preservar el literal hebreo.
  - severity: low
    issue: '''que no eran de los hijos de Leví'' es algo áspero en español.'
    rationale: La idea tribal/genealógica se preserva mejor y con más naturalidad como 'que no eran de entre los hijos de Leví' o bien 'que no eran levitas'. Dado que la nota ya ofrece 'levitas' como alternativa, la primera opción mantiene mejor la forma del hebreo en el texto principal.
