revisions:
- from: Y la casa fue construida durante muchos años antes de un gran y poderoso rey de Israel[a], y fue completada[b].
  to: Y la casa[a] fue construida durante muchos años en tiempos de un gran y poderoso rey de Israel, y fue completada[b].
  rationale: Se corrige la cláusula temporal para que el español exprese con claridad la lectura histórico-temporal documentada en el expediente inglés, evitando una frase poco natural. También se reubica la nota de 'la casa' en el término correcto. El resto del contenido puede mantenerse.
