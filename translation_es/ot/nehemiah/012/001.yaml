translation:
  language: es
  text: 'Ahora estos eran los sacerdotes y los levitas que subieron con Zorobabel hijo de Sealtiel[a] y Jesúa: Seraía, Jeremías y Esdras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Jesúa»; alternativamente «Josué» si el nombre se normaliza en vez de transliterarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these were
  chosen_spanish: Ahora estos eran
  alternatives_spanish:
  - Y estos eran
  - Estos eran
  lexicon: HALOT
  rationale: El waw inicial introduce una nueva lista; «Ahora» conserva el enlace discursivo sin sonar tan pesado como «Y», y «estos eran» mantiene el valor identificador de la construcción.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes oficiantes
  - los presbíteros
  lexicon: HALOT
  rationale: En este contexto genealógico/listado, כֹּהֲנִים se refiere de manera directa a los sacerdotes del culto; «sacerdotes» es el equivalente natural y claro en español.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los de Leví
  lexicon: HALOT
  rationale: «Levitas» es el término estable para לְוִיִּם y conserva la designación grupal bíblica.
- source_word: אֲשֶׁר עָלוּ
  english_pob_choice: who came up
  chosen_spanish: que subieron
  alternatives_spanish:
  - que fueron
  - que vinieron
  lexicon: HALOT
  rationale: עלה en contextos de retorno/restauración expresa el movimiento hacia Jerusalén; «subieron» mantiene esa fuerza más literalmente que una simple traducción de llegada.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Preposición de acompañamiento directa y natural en español.
- source_word: זְרֻבָּבֶל בֶּן שְׁאַלְתִּיאֵל
  english_pob_choice: Zerubbabel son of Shealtiel
  chosen_spanish: Zorobabel hijo de Sealtiel
  alternatives_spanish:
  - Zorobabel, hijo de Sealtiel
  lexicon: HALOT
  rationale: Se transcriben los nombres propios al español bíblico corriente; «hijo de» reproduce la relación filial sin añadir estructura innecesaria.
- source_word: וְיֵשׁוּעַ
  english_pob_choice: and Jeshua
  chosen_spanish: y Jesúa
  alternatives_spanish:
  - y Josué
  lexicon: HALOT
  rationale: La forma hebrea יֵשׁוּעַ se preserva mejor como «Jesúa» en este contexto postexílico, evitando la normalización a «Josué».
- source_word: שְׂרָיָה יִרְמְיָה עֶזְרָא
  english_pob_choice: Seraiah, Jeremiah, Ezra
  chosen_spanish: Seraía, Jeremías, Esdras
  alternatives_spanish:
  - Seraías, Jeremías, Esdras
  lexicon: HALOT
  rationale: Se mantienen los nombres propios como lista simple. «Seraía» refleja la forma española habitual del nombre hebreo; «Jeremías» y «Esdras» son las formas estándar reconocibles.
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo consonántico-vocalizado del WLC y el trazado auditado de la POB en inglés; no hubo revisiones aplicadas en el pase más reciente, y la concordancia general fue alta.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como convención general del proyecto cuando corresponda.
  - Se evitó «SEÑOR» y otras sustituciones litúrgicas no presentes en el texto.
  - Se mantuvo la serie de nombres propios en transliteración/español bíblico estándar para conservar la forma histórica del pasaje.
  - La puntuación reproduce una lista nominal con dos miembros iniciales y un bloque de nombres finales, conforme al hebreo y al inglés auditado.
