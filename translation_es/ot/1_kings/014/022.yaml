translation:
  language: es
  text: Y Judá hizo lo malo a los ojos de Yahvé, y despertaron sus celos[a] más que todo lo que habían hecho sus padres, por los pecados que cometieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo hicieron celoso» o «provocaron sus celos». El hebreo usa lenguaje de celos pactales para la respuesta de Yahvé a la infidelidad de Judá.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Es un nombre propio que en este contexto funciona de manera colectiva para el reino/pueblo, por lo que en español se mantiene la forma breve y natural «Judá».
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La construcción hebrea עשה + הרע expresa «hacer lo malo». En español, «hizo lo malo» conserva el sentido idiomático sin sonar forzado.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - en la vista de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora evaluativa hebrea con una expresión natural en español. Se usa «Yahvé» conforme a la guía del proyecto para el Tetragrámaton.
- source_word: וַיְקַנְאוּ אֹתוֹ
  english_pob_choice: they provoked him to jealousy
  chosen_spanish: lo provocaron a celos
  alternatives_spanish:
  - lo hicieron celoso
  - despertaron sus celos
  lexicon: HALOT
  rationale: «Provocar a celos» mantiene el lenguaje de celos pactales del hebreo y evita reducirlo a mera irritación o a una lectura psicológica inapropiada. El pronombre directo «lo» reproduce el objeto hebreo.
- source_word: מִכֹּל אֲשֶׁר עָשׂוּ אֲבֹתָם
  english_pob_choice: more than all that their fathers had done
  chosen_spanish: más que todo lo que habían hecho sus padres
  alternatives_spanish:
  - más que todo cuanto hicieron sus padres
  - más que todo lo que hicieron sus antepasados
  lexicon: HALOT
  rationale: La comparación con מן + כל se expresa naturalmente como «más que todo lo que». «Sus padres» conserva el paralelismo con el hebreo y la continuidad literaria del texto.
- source_word: בְּחַטֹּאתָם אֲשֶׁר חָטָאוּ
  english_pob_choice: by the sins that they committed
  chosen_spanish: por los pecados con que pecaron
  alternatives_spanish:
  - por los pecados que cometieron
  - a causa de los pecados que cometieron
  lexicon: HALOT
  rationale: El hebreo emplea el sustantivo cognado con el verbo para enfatizar la gravedad de la acción. «Pecados con que pecaron» preserva esa densidad semítica en español, aunque suene algo intensivo; «por» recoge el valor instrumental/causal de בְ.
theological_decisions:
- issue: Jealousy divina/covenantal
  english_pob_reading: they provoked him to jealousy
  chosen_spanish_reading: lo provocaron a celos
  alternative_spanish_readings:
  - lo hicieron celoso
  - despertaron sus celos
  - lo arrojaron a celos
  rationale: La frase conserva la categoría bíblica de los celos pactales de Yahvé ante la infidelidad de Judá. Se evita suavizarla como simple enojo y también cualquier giro que sugiera pecado en Dios.
  doctrine_reference: Translation philosophy §1, §3; nota auditada sobre קנא en el contexto del pacto
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; el presente borrador sigue de cerca el texto fuente hebreo y el cierre auditado en inglés, manteniendo la misma decisión sobre «provocaron a celos» y la metáfora evaluativa «a los ojos de Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, coherente con el estándar del proyecto.
  - Se conserva el paralelismo semítico sin cargar el español con un calco excesivo.
  - «Pecados con que pecaron» refleja el énfasis cognado del hebreo; si se prefiere mayor fluidez, la alternativa «por los pecados que cometieron» queda documentada en la nota.
  - El sujeto colectivo «Judá» admite verbo plural en español en la segunda mitad, de acuerdo con el sentido corporativo del hebreo.
