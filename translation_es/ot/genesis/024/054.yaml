  glossary_alignment: No hay términos del glosario mayor en juego salvo אָדוֹן. La elección «amo» está bien alineada con la decisión documentada del POB de evitar «Señor» cuando se refiere a Abraham como superior humano del siervo. Conviene conservar en nota la alternativa «mi señor», tal como hace el inglés con «my lord».
