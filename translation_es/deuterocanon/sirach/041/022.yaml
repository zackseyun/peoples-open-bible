translation:
  language: es
  text: por un amigo[a], sobre palabras de reproche; y después de dar un regalo a un hermano, no lo reproches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de esta línea es breve y algo elíptico. El paralelo griego hace explícito el sentido implícito: ''de amigos, acerca de palabras de reproche; y después de dar, no reproches''.'
    reason: textual_variant
lexical_decisions:
- source_word: מאוהב
  english_pob_choice: for a friend
  chosen_spanish: por un amigo
  alternatives_spanish:
  - de un amigo
  - a causa de un amigo
  - con un amigo
  lexicon: HALOT
  rationale: El hebreo es breve y el contexto es una advertencia ética ligada a relaciones personales. El paralelismo griego con ἀπὸ φίλων apoya entender una referencia a la esfera de un amigo, no un sentido sentimental. En español, 'por un amigo' conserva la fuerza tópica de la expresión sin sobreexplicar la elipsis.
- source_word: על דברי חרפה
  english_pob_choice: over words of reproach
  chosen_spanish: por palabras de reproche
  alternatives_spanish:
  - sobre palabras de reproche
  - acerca de palabras injuriosas
  - por palabras de insulto
  lexicon: HALOT
  rationale: דברי חרפה alude a palabras vergonzosas, insultantes o reprochadoras. 'Palabras de reproche' mantiene el campo semántico y es natural en español. 'Por' expresa aquí el motivo o asunto de la reprensión dentro de una formulación elíptica.
- source_word: ומאחרי
  english_pob_choice: and after
  chosen_spanish: y después de
  alternatives_spanish:
  - y luego de
  - y tras
  - y después
  lexicon: HALOT
  rationale: La preposición temporal queda bien reflejada con 'después de', que suena natural en español y preserva la secuencia adverbial del hebreo.
- source_word: מתת
  english_pob_choice: giving a gift
  chosen_spanish: dar un regalo
  alternatives_spanish:
  - dar un don
  - hacer un regalo
  - un acto de dar
  lexicon: HALOT
  rationale: מתת puede funcionar como sustantivo de regalo o de acto de dar. Como sigue una cláusula temporal, 'después de dar un regalo' aclara la sintaxis y se mantiene cerca del valor del hebreo.
- source_word: אח
  english_pob_choice: a brother
  chosen_spanish: a un hermano
  alternatives_spanish:
  - a un hermano de sangre
  - a un pariente
  - a un compañero
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hermano'. En español, 'hermano' conserva la referencia relacional básica y la lectura más directa del texto.
- source_word: מנאץ
  english_pob_choice: do not reproach him
  chosen_spanish: no lo reproches
  alternatives_spanish:
  - no lo injuries
  - no lo insultes
  - no lo reprendas
  lexicon: HALOT
  rationale: La forma hebrea es tersa y el paralelo griego explicita μὴ ὀνείδιζε, 'no reproches'. 'No lo reproches' preserva ese valor y encaja con el reproche previo de la línea anterior.
theological_decisions:
- issue: Uso del paralelo griego para aclarar una línea hebrea elíptica
  english_pob_reading: The Hebrew is terse and somewhat elliptical; the Greek parallel makes the implied sense explicit.
  chosen_spanish_reading: Se traduce la advertencia como una prohibición contra reprochar a un amigo por palabras de reproche y contra reprochar a un hermano después de darle un regalo.
  alternative_spanish_readings:
  - Una versión más fragmentaria que conserve la elipsis hebrea sin suplir el verbo implícito.
  - 'Leer la primera frase como una referencia puramente tópica: ''por un amigo, acerca de palabras de reproche''.'
  rationale: El hebreo conservado es breve y el testimonio griego aporta la estructura admonitiva completa. Como no hay una cuestión doctrinal, la decisión afecta principalmente la inteligibilidad y la fidelidad al conjunto de testimonios, manteniendo el hebreo como base y el griego como clarificación textual.
  doctrine_reference: 'PHILOSOPHY.md: Sirácida hebreo traducido desde el hebreo donde se conserva, usando el paralelo griego como apoyo de consistencia e interpretación'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se conserva la solución ya aprobada por su coherencia con el hebreo breve y el apoyo del griego paralelo.
  spanish_consistency_notes:
  - Se mantiene 'reproche' para חרפה / ὀνειδισμός a fin de conservar el matiz moral-social.
  - Se usa 'hermano' de manera literal, sin expandirlo a 'pariente' o 'compañero', porque el texto hebreo es concreto.
  - Se evita 'Señor' u otra terminología no pertinente; el verso no contiene nombres divinos ni cristológicos.
