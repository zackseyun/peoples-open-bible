revisions:
- from: ¿Son demasiado pequeñas para ti[a] las consolaciones de Dios, o una palabra hablada con suavidad para ti?
  to: ¿Son demasiado pequeñas para ti[a] las consolaciones de Dios, o una palabra dicha con suavidad a ti?
  rationale: Se mantiene la estructura y las decisiones léxicas principales del borrador, pero se corrige la segunda cláusula para un español más natural y más alineado con el sentido destinatario de la palabra. También se ajusta la nota alternativa en paralelo.
