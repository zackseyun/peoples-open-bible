  rationale: Se corrige «de su padre» a «paterna» para no introducir un posesivo ausente en el hebreo y para mantener el carácter genérico del proverbio. También se reubican las notas para que el marcador [a] acompañe la decisión verbal del primer hemistiquio y [b] la opción léxica para לֵץ.
