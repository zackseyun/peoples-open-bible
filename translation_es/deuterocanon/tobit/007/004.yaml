translation:
  language: es
  text: 'Y les dijo: «¿Conocen a Tobit, nuestro hermano[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestro pariente» o «nuestro familiar». El griego dice «nuestro hermano», probablemente como término de parentesco y no de un hermano literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γινώσκετε
  english_pob_choice: Do you know
  chosen_spanish: ¿Conocen... ?
  alternatives_spanish:
  - ¿Saben... ?
  - ¿Reconocen... ?
  lexicon: BDAG
  rationale: La forma interrogativa en griego pide si tienen conocimiento personal o relación previa. En español, «¿Conocen...?» expresa de manera natural esa pregunta de reconocimiento o familiaridad sin forzar un matiz más técnico.
- source_word: Τωβεὶτ
  english_pob_choice: Tobit
  chosen_spanish: Tobit
  alternatives_spanish:
  - Tobeit
  lexicon: Convención onomástica bíblica
  rationale: Se conserva el nombre propio en la forma establecida y legible en español, alineada con la convención del proyecto para nombres bíblicos.
- source_word: τὸν ἀδελφὸν ἡμῶν
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - nuestro pariente
  - nuestro pariente cercano
  lexicon: BDAG
  rationale: El griego usa ἀδελφός, que aquí funciona probablemente como término de parentesco amplio, no necesariamente de hermano literal. Se mantiene «nuestro hermano» para conservar la textura fraterna del texto fuente, como hizo la traducción inglesa, sin neutralizarlo prematuramente en «pariente».
theological_decisions:
- issue: Ἀδελφός como término de parentesco amplio, no necesariamente literal
  english_pob_reading: our brother
  chosen_spanish_reading: nuestro hermano
  alternative_spanish_readings:
  - nuestro pariente
  - nuestro familiar
  rationale: 'La lectura preserva el lenguaje relacional del griego y deja visible la tensión semántica: puede referirse a un pariente o miembro del mismo pueblo, pero el texto dice literalmente «hermano».'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4, 5
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada: esta versión no incluye notas de pie, y por eso no requiere marcadores en el texto. El contenido sigue el griego de Swete y mantiene la decisión auditada del inglés de conservar el valor fraterno de ἀδελφός.'
  spanish_consistency_notes:
  - Se usa «nuestro hermano» en lugar de «nuestro pariente» para no borrar la imagen relacional del original.
  - Se evita «SEÑOR» o equivalentes no pertinentes porque el verso no contiene el nombre divino ni κύριος con carga de cita divina.
  - El orden y el tono buscan una prosa bíblica moderna y clara, compatible con la serie POB en español.
