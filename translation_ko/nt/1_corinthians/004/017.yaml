  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τοῦτο ἔπεμψα ὑμῖν Τιμόθεον, ὅς ἐστίν ⸂μου τέκνον⸃ ἀγαπητὸν καὶ πιστὸν ἐν κυρίῳ, ὃς ὑμᾶς ἀναμνήσει τὰς ὁδούς μου τὰς ἐν Χριστῷ ⸀Ἰησοῦ, καθὼς πανταχοῦ ἐν πάσῃ ἐκκλησίᾳ διδάσκω.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/017.yaml
  text: For this reason I sent Timothy to you[a], who is my beloved and faithful child in the Lord. He will remind you of my ways in Messiah Jesus[b], just as I teach everywhere in every church.
  footnotes:
  - marker: a
    text: 'Or ''my beloved and faithful son in the Lord.'' The Greek τέκνον more literally means ''child,'' though in context it can be rendered ''son.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''in Christ Jesus.'' The Greek title Χριστός is rendered ''Messiah'' here to preserve its meaning.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이 때문에 내가 디모데를 여러분에게 보냈습니다. 그는 주 안에서 사랑하고 신실한 내 자녀이며, 그가 내가 어느 곳 모든 교회에서 가르치는 대로 메시아 예수 안에서의 내 행보를 여러분에게 일깨워 줄 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τέκνον ἀγαπητὸν καὶ πιστὸν
  english_pob_choice: beloved and faithful child
  chosen_korean: 사랑하고 신실한 내 자녀
  alternatives_korean:
