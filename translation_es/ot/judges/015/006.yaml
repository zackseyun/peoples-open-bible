    text: Or “gave her to his friend.” The Hebrew term can denote a companion or friend; some understand it more specifically in the wedding context as a groomsman or best man.
    reason: lexical_alternative
  - marker: b
    text: Literally “burned her and her father with fire.”
    reason: lexical_alternative
