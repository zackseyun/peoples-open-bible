translation:
  language: es
  text: Por tanto, el Creador del mundo, el que formó el origen del hombre[b] e ideó el origen de todas las cosas, les devolverá con misericordia el espíritu[a] y la vida, puesto que ahora ustedes desatienden su propia vida por causa de sus leyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aliento». El griego πνεῦμα puede significar «aliento» o «espíritu»; aquí se tradujo «espíritu», aunque el contexto de restauración de la vida también permite «aliento».
    reason: lexical_alternative
  - marker: b
    text: «El origen del hombre» usa el singular griego ἀνθρώπου en sentido representativo; la frase se refiere ampliamente al venir-a-ser humano.
    reason: cultural_note
lexical_decisions:
- source_word: τοιγαροῦν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: LSJ
  rationale: La partícula inferencial introduce una conclusión lógica; «Por tanto» conserva bien ese enlace sin sonar demasiado coloquial.
- source_word: ὁ τοῦ κόσμου κτίστης
  english_pob_choice: the Creator of the world
  chosen_spanish: el Creador del mundo
  alternatives_spanish:
  - el Hacedor del mundo
  - el Fundador del mundo
  lexicon: LSJ
  rationale: κτίστης admite el valor de creador/fundador; en este contexto teológico y cosmológico, «Creador» es la opción más natural y fiel.
- source_word: ὁ πλάσας
  english_pob_choice: who formed
  chosen_spanish: el que formó
  alternatives_spanish:
  - el que modeló
  - el que moldeó
  lexicon: LSJ
  rationale: πλάσσω expresa formar o dar forma; «formó» es claro y sobrio en español.
- source_word: ἀνθρώπου γένεσιν
  english_pob_choice: the origin of man
  chosen_spanish: el origen del hombre
  alternatives_spanish:
  - la creación del hombre
  - el origen de la humanidad
  lexicon: LSJ
  rationale: γένεσις aquí apunta al venir-a-ser o al origen humano; mantuve el singular representativo con «el hombre» para conservar la forma griega y su alcance genérico.
- source_word: πάντων ἐξευρὼν γένεσιν
  english_pob_choice: devised the origin of all things
  chosen_spanish: descubrió el origen de todas las cosas
  alternatives_spanish:
  - determinó el origen de todas las cosas
  - ideó el origen de todas las cosas
  lexicon: LSJ
  rationale: ἐξευρίσκω puede significar encontrar o idear; dado que el sujeto es Dios como creador, «descubrió» sigue el sentido de hallar/determinar sin introducir una paráfrasis excesiva. «Todas las cosas» reproduce el alcance cósmico de πάντων.
- source_word: τὸ πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el soplo
  lexicon: LSJ
  rationale: Aunque el audit trail inglés pasó por «breath», la revisión final volvió a «spirit». En español, «espíritu» refleja directamente πνεῦμα y mantiene abierta la tensión semántica con el sentido de vida/aliento en el contexto de resurrección.
- source_word: τὴν ζωὴν
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - la existencia
  lexicon: LSJ
  rationale: ζωή se traduce de manera estándar como «vida»; en la pareja con πνεῦμα conserva la fuerza del restablecimiento de la vida.
- source_word: πάλιν ἀποδώσει
  english_pob_choice: will ... give back
  chosen_spanish: les devolverá de nuevo
  alternatives_spanish:
  - les restaurará
  - les dará otra vez
  lexicon: LSJ
  rationale: ἀποδίδωμι con πάλιν expresa devolver o restituir; «devolverá de nuevo» refleja el matiz de retorno/restauración, aunque sea ligeramente enfático en español.
- source_word: μετʼ ἐλέους
  english_pob_choice: in mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - misericordiosamente
  - en misericordia
  lexicon: LSJ
  rationale: La construcción preposicional expresa el modo de la acción divina; «con misericordia» es idiomático y preserva el sustantivo «misericordia».
- source_word: ὑπερορᾶτε ἑαυτοὺς
  english_pob_choice: disregard yourselves
  chosen_spanish: se menosprecian a sí mismos
  alternatives_spanish:
  - se desprecian a sí mismos
  - desatienden su propia vida
  lexicon: LSJ
  rationale: ὑπεροράω implica pasar por alto, despreciar o no tomar en cuenta. En el contexto martirial, «se menosprecian a sí mismos» conserva el sentido reflexivo y la renuncia a la propia vida sin introducir una psicología más fuerte de la que el griego exige.
- source_word: διὰ τοὺς αὐτοῦ νόμους
  english_pob_choice: for the sake of his laws
  chosen_spanish: por causa de sus leyes
  alternatives_spanish:
  - por sus leyes
  - a causa de sus leyes
  lexicon: LSJ
  rationale: διά con acusativo puede expresar causa o motivo; «por causa de» reproduce bien la razón por la que se entregan, manteniendo la referencia a las leyes divinas.
theological_decisions:
- issue: Sentido de πνεῦμα en contexto de martirio y resurrección
  english_pob_reading: Rendered as 'spirit' in the main text
  chosen_spanish_reading: «el espíritu»
  alternative_spanish_readings:
  - «el aliento»
  - «el soplo»
  rationale: La secuencia con «la vida» y el marco de retribución/restauración favorecen la traducción directa de πνεῦμα como «espíritu», sin cerrar que el campo semántico roce también aliento o vida.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor representativo del singular ἀνθρώπου
  english_pob_reading: '''man'''
  chosen_spanish_reading: «el hombre»
  alternative_spanish_readings:
  - «la humanidad»
  - «el ser humano»
  rationale: El singular griego es genérico y representativo. En español, «el hombre» conserva la forma del original y su alcance antropológico amplio; se explica la representatividad en la nota de decisión.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue la versión final del audit trail inglés, que volvió de «breath» a «spirit» para τὸ πνεῦμα. Por eso la traducción española adopta «espíritu» en el texto principal y conserva la alternativa semántica en nota. También mantiene la estructura inferencial, la pareja «espíritu y vida» y el sentido causal de ὑπερορᾶτε ἑαυτοὺς διὰ τοὺς αὐτοῦ νόμους sin reescrituras expansivas.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aparece en este versículo; el texto mantiene la referencia genérica a Dios mediante «el Creador del mundo» implícita en el contexto.
  - Se preserva la singularidad representativa de «el hombre» para reflejar ἀνθρώπου sin neutralizar el matiz del griego.
  - La formulación «con misericordia» sigue el valor adverbial de μετʼ ἐλέους y evita un giro eclesiástico innecesario.
  - «Sus leyes» conserva el referente divino del contexto, sin sustituirlo por terminología confesional añadida.
