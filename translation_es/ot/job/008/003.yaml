translation:
  language: es
  text: ¿Dios pervierte la justicia[a], o el Todopoderoso pervierte la rectitud?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘¿Dios distorsiona el juicio, o el Todopoderoso distorsiona la justicia?’'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֵל
  english_pob_choice: Does God
  chosen_spanish: ¿Dios
  alternatives_spanish:
  - ¿El
  - ¿El Dios
  lexicon: HALOT
  rationale: El hebreo usa aquí אֵל como título divino común, no como nombre propio transliterado. En español, ‘Dios’ comunica con naturalidad la pregunta retórica y conserva el sentido del término original.
- source_word: יְעַוֵּת
  english_pob_choice: pervert
  chosen_spanish: pervierte
  alternatives_spanish:
  - distorsiona
  - retuerce
  lexicon: HALOT
  rationale: El verbo en piel expresa torcer o desviar algo recto; en un contexto legal-moral, ‘pervertir’ mantiene la fuerza forense y ética que refleja bien el hebreo.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la rectitud judicial
  - lo justo
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט apunta a justicia en sentido jurídico-moral. ‘Justicia’ es la forma más natural en español y preserva el peso legal del término sin reducirlo a un mero acto de juzgar.
- source_word: וְאִם
  english_pob_choice: or does
  chosen_spanish: o
  alternatives_spanish:
  - y si
  - o si
  lexicon: HALOT
  rationale: Aunque formalmente puede leerse ‘y si’, en la paralelismo interrogativo funciona disyuntivamente. ‘O’ refleja mejor la segunda pregunta paralela en español.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Siguiendo el criterio de traducir títulos divinos, ‘el Todopoderoso’ reproduce el valor tradicional de שַׁדַּי y resulta claro para lectores en español.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la justicia
  - lo recto
  lexicon: HALOT
  rationale: Para conservar la distinción con מִשְׁפָּט, se eligió ‘rectitud’ en lugar de repetir ‘justicia’. Así se mantiene el paralelismo semántico entre justicia jurídica y rectitud moral.
theological_decisions:
- issue: Distinción entre מִשְׁפָּט y צֶדֶק
  english_pob_reading: justice ... righteousness
  chosen_spanish_reading: justicia ... rectitud
  alternative_spanish_readings:
  - justicia ... justicia
  - juicio ... justicia
  rationale: El verso contrapone dos términos relacionados pero no idénticos. Traducir uno como ‘justicia’ y el otro como ‘rectitud’ evita aplanar la diferencia entre el orden jurídico y la integridad moral implícitos en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, §5'
- issue: Conservar el tono retórico de la acusación implícita
  english_pob_reading: Does God pervert justice, or does the Almighty pervert righteousness?
  chosen_spanish_reading: ¿Dios pervierte la justicia, o el Todopoderoso pervierte la rectitud?
  alternative_spanish_readings:
  - ¿Acaso Dios pervierte la justicia, o el Todopoderoso pervierte la rectitud?
  - ¿Dios tuerce la justicia, o el Todopoderoso tuerce la rectitud?
  rationale: El hebreo formula una pregunta retórica que cuestiona la posibilidad misma de tal acción en Dios. La traducción conserva ese tono acusatorio y lo deja igualmente abierto en español.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con el análisis auditado del POB en inglés. Se conserva la distinción léxica entre מִשְׁפָּט y צֶדֶק y se mantiene el carácter de pregunta retórica; no se documentaron revisiones posteriores que alteren esta lectura.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֵל y ‘el Todopoderoso’ para שַׁדַּי, conforme al criterio de traducir títulos divinos.
  - ‘Justicia’ y ‘rectitud’ se distinguen para reflejar el paralelismo hebreo sin repetir el mismo término español.
  - La nota al pie preserva la alternativa léxica reconocida por el POB en inglés, adaptándola al español.
