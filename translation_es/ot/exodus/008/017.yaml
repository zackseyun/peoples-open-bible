    issue: '''yo, he aquí, enviaré'' es poco natural en español'
    rationale: Aunque intenta reflejar הִנְנִי, el orden interrumpido suena artificial. 'he aquí, yo envío' conserva la fuerza deíctica y la inminencia con mejor español.
  - severity: high
    issue: '''y sobre tus casas'' no transmite bien וּבְבָתֶּיךָ en contexto'
    rationale: La plaga no solo cae sobre las casas; entra en ellas. La cláusula siguiente ('se llenarán') confirma un sentido interior. 'y en tus casas' o 'y dentro de tus casas' es más fiel.
  - severity: low
    issue: La decisión léxica documentada para וּבְבָתֶּיךָ contradice el mejor sentido contextual
    rationale: La explicación del borrador defiende 'sobre tus casas' por paralelismo, pero el propio contexto inmediato favorece 'en tus casas'. Conviene armonizar texto y rationale.
