  - marker: a
    text: El testimonio griego suministrado para este versículo es fragmentario en los datos de origen y parece conservar solo la palabra para «salud» (con una pequeña variante manuscrita) y una variante preposicional. La traducción, por tanto, refleja únicamente el texto superviviente, no una oración reconstruida.
