translation:
  language: es
  text: 'Y el rey dijo a Ester en el banquete de vino[a]: «¿Cuál es tu petición? Te será concedida. ¿Y cuál es tu solicitud? Aun hasta la mitad del reino[b], se hará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en el banquete del vino».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hasta la mitad del reino»; el texto no dice explícitamente «mi reino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִשְׁתֵּה הַיַּיִן
  english_pob_choice: at the wine banquet
  chosen_spanish: en el banquete del vino
  alternatives_spanish:
  - en el banquete de vino
  - durante el festín de vino
  lexicon: HALOT
  rationale: מִשְׁתֶּה designa un banquete o festín, y הַיַּיִן especifica el vino. «Banquete del vino» conserva la escena cortesana con naturalidad en español y evita una paráfrasis más libre.
- source_word: שְּׁאֵלָתֵךְ
  english_pob_choice: your petition
  chosen_spanish: tu petición
  alternatives_spanish:
  - tu solicitud
  - tu pedido
  - tu ruego
  lexicon: HALOT
  rationale: La forma viene de שאל y aquí se refiere a algo pedido, no a una pregunta. «Petición» reproduce bien el registro real/cortesano y mantiene la distinción con בַּקָּשָׁה más adelante.
- source_word: וְיִנָּתֵן לָךְ
  english_pob_choice: It will be granted to you
  chosen_spanish: Te será concedida
  alternatives_spanish:
  - Y te será dado
  - Y te lo concederán
  - Y será dado a ti
  lexicon: HALOT
  rationale: El valor idiomático de נתן en esta fórmula expresa que la petición será atendida. En español, «concedida» transmite mejor el matiz formal y jurídico que un simple «dada».
- source_word: בַּקָּשָׁתֵךְ
  english_pob_choice: your request
  chosen_spanish: tu solicitud
  alternatives_spanish:
  - tu petición
  - lo que solicitas
  - tu demanda
  lexicon: HALOT
  rationale: בַּקָּשָׁה expresa una solicitud o requerimiento. Para distinguirla de שְׁאֵלָה, aquí se usa «solicitud», que suena natural y conserva la ligera variación léxica del hebreo.
- source_word: עַד חֲצִי הַמַּלְכוּת
  english_pob_choice: Even up to half the kingdom
  chosen_spanish: Aun hasta la mitad del reino
  alternatives_spanish:
  - Hasta la mitad del reino
  - Incluso hasta la mitad del reino
  - Aun hasta media nación
  lexicon: HALOT
  rationale: El hebreo no dice explícitamente «mi reino», por lo que se conserva «el reino». «Aun hasta» refleja la fuerza enfática de עַד en esta hipérbole real.
- source_word: וְתֵעָשׂ
  english_pob_choice: it will be done
  chosen_spanish: se hará
  alternatives_spanish:
  - será hecho
  - se cumplirá
  - será realizado
  lexicon: HALOT
  rationale: La forma pasiva/medio-pasiva apunta al cumplimiento de lo pedido. «Se hará» es breve, idiomático y mantiene el tono solemne del decreto verbal del rey.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; esta redacción mantiene la misma equivalencia óptima y conserva las dos observaciones léxicas del aparato en español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se distingue «petición» y «solicitud» para reflejar la variación hebrea entre שְׁאֵלָה y בַּקָּשָׁה.
  - Se evita añadir posesivo en «el reino», siguiendo la observación textual del aparato inglés.
  - Se mantiene un registro cortesano y sobrio, adecuado al discurso del rey.
