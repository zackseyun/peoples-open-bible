revisions:
- from: 'Entonces David regresó para bendecir a su casa[a]. Pero Mical, hija de Saúl, salió al encuentro de David y dijo: «¡Qué honrado estuvo hoy el rey de Israel, descubriéndose hoy ante la vista de las esclavas de sus esclavos[c][b], como se descubre uno de los hombres vulgares sin vergüenza!»'
  to: 'Entonces David regresó para bendecir a su hogar. Pero Mical, hija de Saúl, salió al encuentro de David y dijo: «¡Qué honrado[a] estuvo hoy el rey de Israel, descubriéndose hoy ante la vista de las esclavas de sus esclavos[b], como se descubre sin vergüenza cualquiera de esos hombres vulgares[c]!»'
  rationale: Se corrigen los anclajes de las notas para que correspondan al segmento pertinente, se ajusta «su casa» a «su hogar» para reflejar mejor el sentido de בֵּיתוֹ como unidad doméstica, y se vuelve más idiomática la cláusula final. También se repara la nota [c] para que refleje la alternativa léxica de אַחַד הָרֵקִים, no solo del verbo «descubrirse».
