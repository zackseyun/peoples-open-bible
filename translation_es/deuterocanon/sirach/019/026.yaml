translation:
  language: es
  text: El atuendo de un hombre, y la risa[a] de sus dientes, y los pasos de una persona proclaman[b] lo relativo a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la risa de sus dientes». La expresión puede referirse más idiomáticamente a la sonrisa o al mostrar los dientes.
    reason: lexical_alternative
  - marker: b
    text: El griego de este versículo es algo abrupto en su formulación; la traducción procura mantenerse cerca de su imagen en vez de convertirla en un proverbio más interpretativo.
    reason: textual_variant
lexical_decisions:
- source_word: στολισμός
  english_pob_choice: attire
  chosen_spanish: atuendo
  alternatives_spanish:
  - vestido
  - vestimenta
  - adorno
  lexicon: LSJ
  rationale: El término griego alude al arreglo exterior o a la vestimenta visible. «Atuendo» comunica la idea de apariencia externa sin cargarla demasiado de ornamento, y encaja con el carácter proverbial del verso.
- source_word: ἀνδρός
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de un varón
  lexicon: LSJ
  rationale: El griego es masculino singular. Se conserva esa precisión con «de un hombre», sin neutralizar la referencia de género que el texto presenta.
- source_word: γέλως ὀδόντων
  english_pob_choice: the laughter of his teeth
  chosen_spanish: la risa de sus dientes
  alternatives_spanish:
  - la sonrisa de sus dientes
  - el mostrar de sus dientes
  lexicon: LSJ
  rationale: La expresión griega es inusual y literalmente habla de «risa» asociada a los dientes. «Risa de sus dientes» mantiene la imagen vívida y transparente, sin suavizarla interpretativamente; en español también puede sugerir la sonrisa o el mostrar los dientes.
- source_word: βήματα
  english_pob_choice: steps
  chosen_spanish: los pasos
  alternatives_spanish:
  - la manera de andar
  - la marcha
  lexicon: LSJ
  rationale: «Pasos» reproduce de forma natural el movimiento concreto que el proverbio menciona, dejando abierta la posible extensión al modo de andar.
- source_word: ἀνθρώπου
  english_pob_choice: a person's
  chosen_spanish: de una persona
  alternatives_spanish:
  - de un ser humano
  - de un hombre
  lexicon: LSJ
  rationale: Aquí el griego es más amplio que ἀνδρός. «Persona» refleja bien el sentido genérico humano y evita repetir innecesariamente «hombre».
- source_word: ἀναγγέλλει
  english_pob_choice: proclaim
  chosen_spanish: proclaman
  alternatives_spanish:
  - anuncian
  - dan a conocer
  - revelan
  lexicon: LSJ
  rationale: El verbo significa informar o dar a conocer con fuerza. En plural español, «proclaman» conserva el peso declarativo que tienen estos signos exteriores.
- source_word: τὰ περὶ αὐτοῦ
  english_pob_choice: what concerns him
  chosen_spanish: lo que concierne a él
  alternatives_spanish:
  - lo que es acerca de él
  - las cosas sobre él
  - lo que le atañe
  lexicon: LSJ
  rationale: La frase es amplia e idiomática. «Lo que concierne a él» sigue de cerca el griego y mantiene la idea de que los indicios exteriores revelan aspectos relativos a la persona.
translation_notes:
  revision_awareness: El texto griego de Sirach 19:26 es breve pero expresivamente irregular; la redacción española sigue de cerca la imagen del original, manteniendo la tensión entre literalidad y naturalidad que el audit trail inglés documenta. No se hicieron revisiones previas en esta pasada.
  spanish_consistency_notes:
  - Se mantuvo «hombre» para ἀνδρός y «persona» para ἀνθρώπου, respetando la diferencia semántica del griego.
  - «Atuendo» conserva la orientación hacia la apariencia exterior sin imponer una interpretación moral no explicitada.
  - La puntuación reproduce el paralelismo acumulativo del verso con comas y la conjunción final «y».
