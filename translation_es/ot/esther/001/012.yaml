    rationale: בִּדְבַר הַמֶּלֶךְ expresa el mandato del rey. En español bíblico-natural, «por orden del rey» comunica mejor ese valor que «a la orden del rey», que puede sonar calcado o ambiguo.
  - severity: medium
    issue: «se enojó muchísimo» es demasiado coloquial y sobreintensifica
    rationale: וַיִּקְצֹף ... מְאֹד se refleja mejor como «se enojó mucho» o «se enojó mucho/ muchísimo»; pero «muchísimo» añade un matiz más coloquial y enfático que el simple «muy/mucho» del hebreo y del POB inglés.
