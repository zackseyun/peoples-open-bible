translation:
  language: es
  text: Las nubes derramaron agua; los cielos dieron su voz; sí, tus flechas[a] se movían de un lado a otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus relámpagos». El hebreo dice «tus flechas», probablemente usando imaginería militar para el relámpago en este contexto de teofanía de tormenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹרְמוּ
  english_pob_choice: poured out
  chosen_spanish: se desbordaron
  alternatives_spanish:
  - fluyeron
  - derramaron
  lexicon: HALOT
  rationale: El verbo expresa un fluir impetuoso o abundante. En español, «se desbordaron» comunica bien la salida copiosa del agua en un contexto poético de tormenta sin perder la fuerza del hebreo.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: Aunque el hebreo tiene forma plural, en español poético «las aguas» conserva mejor el matiz plural y el ritmo del verso que el singular massivo.
- source_word: עָבוֹת
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - las nubes densas
  - las nubes de tormenta
  lexicon: HALOT
  rationale: El término alude a masas de nubes espesas. «Las nubes» es natural en español y, en este contexto teofánico, deja implícita su densidad sin sobrecargar el verso.
- source_word: קוֹל נָתְנוּ
  english_pob_choice: gave forth a sound
  chosen_spanish: dieron su voz
  alternatives_spanish:
  - emitieron un sonido
  - tronaron
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «dieron voz/sonido». «Dieron su voz» preserva el giro idiomático y el paralelismo poético mejor que una paráfrasis más explicativa.
- source_word: שְׁחָקִים
  english_pob_choice: the skies
  chosen_spanish: los cielos
  alternatives_spanish:
  - los firmamentos
  - las alturas
  lexicon: HALOT
  rationale: El término puede referirse a cielos o nubes. Como el primer hemistiquio ya menciona las nubes, «los cielos» mantiene el paralelismo y evita repetir la misma imagen en ambos miembros.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: La partícula intensifica o añade énfasis. «Sí» conserva esa función enfática en español poético de manera breve y natural.
- source_word: חֲצָצֶיךָ
  english_pob_choice: your arrows
  chosen_spanish: tus flechas
  alternatives_spanish:
  - tus rayos
  - tus relámpagos
  lexicon: HALOT
  rationale: El sustantivo significa primariamente «flechas». Se mantiene esa lectura en el texto principal para respetar la forma del hebreo; el contexto de teofanía tormentosa permite entender una imagen de relámpagos sin resolverla del todo en la línea principal.
- source_word: יִתְהַלָּכוּ
  english_pob_choice: moved about
  chosen_spanish: se movían de un lado a otro
  alternatives_spanish:
  - andaban por allí
  - cursaban
  lexicon: HALOT
  rationale: El hitpael de הלך expresa movimiento continuo o de aquí para allá. «Se movían de un lado a otro» comunica ese desplazamiento sin fijarlo innecesariamente en «relámpagos» o en otro referente específico.
theological_decisions:
- issue: 'Imagen de teofanía: flechas literales o relámpagos metafóricos'
  english_pob_reading: Retain 'your arrows' in the main text, allowing the storm-theophany context to suggest lightning metaphorically.
  chosen_spanish_reading: Mantener «tus flechas» en el texto principal, dejando que el contexto de tormenta sugiera el sentido metafórico de relámpagos.
  alternative_spanish_readings:
  - Traducir directamente «tus relámpagos»
  - Traducir «tus rayos»
  rationale: El hebreo usa el término ordinario para flechas. La lectura teofánica de tormenta es muy probable, pero no debe borrarse en el cuerpo del texto. Por eso se conserva la metáfora original y se aclara en nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético y el audito inglés sin cambios de revisión pendientes; conserva la metáfora de «flechas» en el cuerpo principal y aclara la lectura meteorológica en nota.
  spanish_consistency_notes:
  - Se usa «las aguas» para reflejar el plural hebreo y mantener el tono poético.
  - Se prefiere «los cielos» para diferenciarlo de «las nubes» en el primer hemistiquio.
  - «Dieron su voz» conserva el giro idiomático de קוֹל נָתְנוּ sin convertirlo en una interpretación demasiado explícita.
  - Se evita sustituir sistemáticamente «flechas» por «relámpagos» para no eliminar la tensión léxica documentada.
