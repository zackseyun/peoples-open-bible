  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales son adecuadas: ''Roma'', ''viaje'', ''sala del consejo'' y ''respondieron'' concuerdan con el POB inglés y con el griego. La única desviación está en el registro de ''de veras'' y en la formulación de la nota alternativa sobre βουλευτήριον.'
