translation:
  language: es
  text: ¿Cómo podría uno perseguir a mil, y dos poner en fuga a diez mil, si no fuera porque su Roca los vendió, y Yahvé los entregó[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los había entregado en manos de otros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  english_pob_choice: How could
  chosen_spanish: ¡Cómo podría…!
  alternatives_spanish:
  - Cómo
  - Cómo es que
  lexicon: HALOT
  rationale: La pregunta retórica expresa asombro e incredulidad; «cómo podría» reproduce mejor ese valor que un simple «cómo» en español natural.
- source_word: יִרְדֹּף
  english_pob_choice: pursue
  chosen_spanish: perseguir
  alternatives_spanish:
  - cazar
  - seguir
  lexicon: HALOT
  rationale: En contexto bélico, רדף expresa persecución militar; «perseguir» conserva el sentido sin sonar forzado.
- source_word: אֶחָד אֶלֶף
  english_pob_choice: one pursue a thousand
  chosen_spanish: uno a mil
  alternatives_spanish:
  - uno persiga a mil
  - uno persiguiendo a mil
  lexicon: HALOT
  rationale: El hebreo presenta una desproporción numérica concisa. En español, «uno a mil» transmite la misma relación sin añadir elementos no presentes.
- source_word: וּשְׁנַיִם
  english_pob_choice: and two
  chosen_spanish: y dos
  alternatives_spanish:
  - y dos hombres
  - dos
  lexicon: HALOT
  rationale: Se conserva la coordinación numérica simple del hebreo, evitando introducir «hombres» que no aparece en el texto.
- source_word: יָנִיסוּ
  english_pob_choice: put ... to flight
  chosen_spanish: poner en fuga
  alternatives_spanish:
  - hacer huir
  - causar que huyan
  lexicon: HALOT
  rationale: El hiphil de נוּס es causativo; «poner en fuga» es una expresión española idiomática que mantiene ese valor.
- source_word: רְבָבָה
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - una miríada
  lexicon: HALOT
  rationale: El valor numeral es claro en este pasaje; «diez mil» es más transparente en español moderno que «miríada».
- source_word: אִם לֹא כִּי
  english_pob_choice: unless
  chosen_spanish: si no fuera porque
  alternatives_spanish:
  - a menos que
  - excepto que
  lexicon: HALOT
  rationale: La construcción introduce la única explicación para el reverso imposible; «si no fuera porque» expresa bien esa relación causal-condicional en español.
- source_word: צוּרָם
  english_pob_choice: their Rock
  chosen_spanish: su Roca
  alternatives_spanish:
  - su peña
  - su roca
  lexicon: HALOT
  rationale: En Deuteronomio 32, צוּר funciona como título metafórico para Dios. «Roca» conserva el título y su fuerza simbólica; la mayúscula ayuda a señalar el uso titular.
- source_word: מְכָרָם
  english_pob_choice: had sold them
  chosen_spanish: los vendió
  alternatives_spanish:
  - los había vendido
  - los entregó
  lexicon: HALOT
  rationale: El verbo מכר se conserva con su imagen jurídica de «vender» en juicio de pacto; el perfecto simple español es natural aquí y mantiene la tensión del original.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre del pacto sin enmascararlo.'
- source_word: הִסְגִּירָם
  english_pob_choice: had given them up
  chosen_spanish: los entregó
  alternatives_spanish:
  - los entregó[a]
  - los puso en poder de
  lexicon: HALOT
  rationale: סגר en este contexto significa entregar a alguien al poder de otro. «Los entregó» comunica bien esa acción judicial; el matiz alternativo de «entregar» queda señalado en la nota.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto pide «Yahvé» en el texto principal, preservando el nombre propio del Dios de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: צור como título divino
  english_pob_reading: their Rock
  chosen_spanish_reading: su Roca
  alternative_spanish_readings:
  - su roca
  rationale: En el Cántico de Moisés, «Roca» es un título metafórico para Dios. La mayúscula ayuda a captar su función titular sin abandonar la metáfora.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece anclado en el texto español en «entregó[a]». La redacción mantiene el paralelismo del hebreo y conserva la tensión lexical entre «vendió» y «entregó».'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יהוה según el estándar del proyecto.
  - Se mantuvo «Roca» con mayúscula por su función titular en el contexto del Cántico de Moisés.
  - Se conservó el contraste entre «vendió» y «entregó», reflejando las dos imágenes judiciales del verso.
  - 'La estructura numérica fue mantenida de forma concisa: «uno a mil» / «dos» / «diez mil».'
