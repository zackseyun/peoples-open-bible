translation:
  language: es
  text: Entonces, muy perturbado[a], ordenó que trajeran a otros de entre los hebreos de aquella edad; y si comieran carne del muslo[b], que se dejara libres a los que traían; pero si se opusieran[c], que se los torturara con mayor severidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «profundamente agitado». El griego intensifica el estado emocional, pero no precisa una emoción única.'
    reason: alternative_reading
  - marker: b
    text: Lit. «comieran carne del muslo». La expresión griega es más literal que «cerdo» o «carne de cerdo».
    reason: lexical_alternative
  - marker: c
    text: 'O: «objetaran» o «replicaran». El verbo griego implica hablar en contra o resistirse verbalmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε δὴ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: LSJ
  rationale: Marca la progresión narrativa inmediata y funciona con naturalidad en español.
- source_word: σφόδρα περιπαθὼς
  english_pob_choice: becoming deeply agitated
  chosen_spanish: muy perturbado
  alternatives_spanish:
  - profundamente agitado
  - grandemente angustiado
  - muy conmovido
  lexicon: LSJ
  rationale: Conserva la intensidad del participio y del adverbio sin fijar indebidamente una emoción única como ira o mera tristeza.
- source_word: ἐκέλευσεν
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes
  lexicon: BDAG
  rationale: Verbo natural y suficientemente fuerte para la instrucción de un gobernante.
- source_word: ἄλλους ἐκ τῆς ἡλικίας τῶν Ἑβραίων
  english_pob_choice: others from among the Hebrews of that age
  chosen_spanish: a otros de entre los hebreos de aquella edad
  alternatives_spanish:
  - a otros hebreos de la misma edad
  - a otros del mismo grupo de edad entre los hebreos
  lexicon: LSJ
  rationale: Mantiene explícita la referencia a la edad/categoría de edad que está en el griego y evita borrar esa precisión.
- source_word: ἀγαγεῖν
  english_pob_choice: be brought in
  chosen_spanish: trajeran
  alternatives_spanish:
  - fueran traídos
  - los condujeran
  lexicon: BDAG
  rationale: En este contexto judicial y coercitivo, 'traer' expresa de forma natural la presentación de personas ante la autoridad.
- source_word: μηροφαγοῖεν
  english_pob_choice: would eat meat from the thigh
  chosen_spanish: comieran carne del muslo
  alternatives_spanish:
  - comieran carne del muslo de cerdo
  - comieran carne del muslo
  lexicon: LSJ
  rationale: Refleja más literalmente el compuesto griego que la paráfrasis 'pork' y conserva la tensión léxica del pasaje. No se fuerza una glosa más específica que el texto inmediato no impone.
- source_word: ἀπολύειν
  english_pob_choice: to release
  chosen_spanish: que se les soltara
  alternatives_spanish:
  - que se les liberara
  - que se los dejara ir
  lexicon: BDAG
  rationale: En contexto de detención, 'soltar' comunica bien la liberación de quienes estaban bajo custodia o coerción.
- source_word: ἀγώντας
  english_pob_choice: those who were brought in
  chosen_spanish: a los que eran traídos
  alternatives_spanish:
  - a los que habían sido traídos
  - a los presentados
  lexicon: LSJ
  rationale: Sigue de cerca la sintaxis del griego y mantiene la referencia a las personas sometidas a comparecencia.
- source_word: ἀντιλέγοιεν
  english_pob_choice: they objected
  chosen_spanish: objetaran
  alternatives_spanish:
  - se opusieran
  - replicaran
  lexicon: BDAG
  rationale: '''Objetar'' conserva la idea de hablar en contra o resistir verbalmente, sin añadir más contenido del necesario.'
- source_word: πικρότερον
  english_pob_choice: more severely
  chosen_spanish: con mayor severidad
  alternatives_spanish:
  - más severamente
  - más duramente
  lexicon: LSJ
  rationale: Aunque literalmente significa 'más amargamente', en el contexto de tortura el español natural requiere una equivalencia de intensidad punitiva.
- source_word: βασανίζειν
  english_pob_choice: to torture
  chosen_spanish: torturara
  alternatives_spanish:
  - atormentara
  - sometiera a tortura
  lexicon: BDAG
  rationale: El contexto martirial exige el sentido físico de tortura, no solo aflicción general.
theological_decisions:
- issue: Intensidad emocional del rey en περιπαθὼς σφόδρα
  english_pob_reading: emotionally disturbed/agitated rather than specifically wrathful
  chosen_spanish_reading: muy perturbado, sin especificar ira
  alternative_spanish_readings:
  - airado
  - furiosamente indignado
  - profundamente angustiado
  rationale: El griego expresa fuerte afectación emocional, pero no obliga a una sola emoción determinada; la traducción preserva esa tensión sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión textual; no sobreinterpretar el motivo emocional.
- issue: Sentido de μηροφαγοῖεν
  english_pob_reading: eat meat from the thigh
  chosen_spanish_reading: comieran carne del muslo
  alternative_spanish_readings:
  - comieran carne de cerdo
  - comieran carne del muslo de cerdo
  rationale: Se conserva la literalidad del compuesto y la ambigüedad heredada del griego, en lugar de imponer una explicación más específica sin necesidad textual.
  doctrine_reference: Fidelidad léxica al testimonio griego; evitar resolver una dificultad traductológica no resuelta en el original.
translation_notes:
  revision_awareness: Se revisó el antecedente inglés para respetar la corrección posterior de μηροφαγοῖεν como referencia más literal a «carne del muslo», en lugar de fijarlo como «cerdo». También se mantuvo la fuerza de πικρότερον con una equivalencia española natural ('con mayor severidad') sin perder el matiz comparativo.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o fórmulas eclesiales ajenas porque el versículo no las requiere.
  - '''Hebreos'' se mantiene como etnónimo del contexto narrativo.'
  - '''torturara'' conserva el valor físico del verbo βασανίζειν.'
  - Las notas solo marcan alternativas reales presentes en el texto o necesarias por ambigüedad griega.
