translation:
  language: es
  text: Timna era concubina de Elifaz, hijo de Esaú, y dio a luz a Amalec[a]. Estos son los hijos de Adá, esposa de Esaú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «dio a luz a Amalec para Elifaz». El hebreo usa una construcción genealógica que nombra al padre con «a/para».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתִמְנַע
  english_pob_choice: Timna
  chosen_spanish: Timna
  alternatives_spanish:
  - Timná
  lexicon: HALOT
  rationale: Nombre propio; se translitera para preservar la referencia genealógica sin añadir explicación.
- source_word: הָיְתָה
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - estaba
  lexicon: HALOT
  rationale: El perfecto copulativo en este contexto genealógico se expresa naturalmente en español con 'era', que describe estado o condición estable.
- source_word: פִילֶגֶשׁ
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - segunda esposa
  - mujer secundaria
  lexicon: HALOT
  rationale: '''Concubina'' conserva la distinción social y jurídica del término hebreo sin suavizarla con un equivalente menos preciso.'
- source_word: לֶאֱלִיפַז
  english_pob_choice: of Eliphaz
  chosen_spanish: de Elifaz
  alternatives_spanish:
  - para Elifaz
  lexicon: HALOT
  rationale: Con 'concubina', la relación se expresa en español de forma idiomática con 'de'. El nombre propio se adapta a la forma castellana habitual 'Elifaz'.
- source_word: בֶּן עֵשָׂו
  english_pob_choice: Esau’s son
  chosen_spanish: hijo de Esaú
  alternatives_spanish:
  - el hijo de Esaú
  lexicon: HALOT
  rationale: La construcción en aposición se vuelve natural en español como 'hijo de Esaú', manteniendo la identificación genealógica.
- source_word: וַתֵּלֶד
  english_pob_choice: she bore
  chosen_spanish: le dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: En español, 'dar a luz' comunica el acto de alumbramiento de manera natural y digna; se conserva el sentido narrativo de la forma verbal.
- source_word: אֶת עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: a Amalec
  alternatives_spanish:
  - Amalec
  lexicon: HALOT
  rationale: El objeto directo se expresa con 'a' ante persona/nombre propio en español. Se usa 'Amalec' como forma transliterada estable.
- source_word: לֶאֱלִיפַז
  english_pob_choice: to Eliphaz
  chosen_spanish: para Elifaz
  alternatives_spanish:
  - a Elifaz
  lexicon: HALOT
  rationale: Tras el verbo de dar a luz, la preposición lamed puede marcar al padre en la genealogía hebrea; en español, 'para Elifaz' conserva esa relación sin forzar una calca.
- source_word: אֵלֶּה בְּנֵי
  english_pob_choice: These are the sons of
  chosen_spanish: Estos son los hijos de
  alternatives_spanish:
  - Estos son los descendientes de
  lexicon: HALOT
  rationale: Se mantiene la fórmula genealógica con 'hijos de', que en español puede abarcar descendientes dentro del contexto de listas familiares.
- source_word: עָדָה
  english_pob_choice: Adah
  chosen_spanish: Adá
  alternatives_spanish:
  - Ada
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme al uso español bíblico común, con acento para reflejar la pronunciación.
- source_word: אֵשֶׁת עֵשָׂו
  english_pob_choice: Esau’s wife
  chosen_spanish: esposa de Esaú
  alternatives_spanish:
  - mujer de Esaú
  - la esposa de Esaú
  lexicon: HALOT
  rationale: '''Esposa de'' es la forma natural e inequívoca en español para el constructo hebreo, preservando la identificación de Adá.'
theological_decisions:
- issue: Relación genealógica implícita en 'hijos de Adá'
  english_pob_reading: These are the sons of Adah, Esau’s wife.
  chosen_spanish_reading: Estos son los hijos de Adá, esposa de Esaú.
  alternative_spanish_readings:
  - Estos son los descendientes de Adá, esposa de Esaú.
  - Estos son los nietos de Adá, esposa de Esaú.
  rationale: El hebreo dice literalmente 'hijos de Adá'; aunque el contexto amplio muestra que se trata de descendencia por línea intermedia, aquí se conserva la formulación del texto sin introducir 'nietos'. La ambigüedad genealógica se mantiene en el nivel que el hebreo permite.
  doctrine_reference: Genealogía bíblica y uso semítico de בן / בנים
translation_notes:
  revision_awareness: El audit trail inglés revisó 'grandsons' a 'sons' para ajustarse al hebreo בְנֵי; por eso el español sigue la formulación literal 'hijos de' sin expandirla a 'nietos'. También se conservó el matiz genealógico de ילד con 'dar a luz' y la preposición relacional con 'para Elifaz' en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en este proyecto, pero no aparece en este versículo.
  - Se mantiene 'Esaú' y 'Elifaz' con grafía española bíblica consistente.
  - '''Concubina'' se conserva por fuerza léxica; no se sustituye por ''segunda esposa''.'
  - La nota b preserva la alternativa textual/lexical sin resolver la ambigüedad en el cuerpo del texto.
