translation:
  language: es
  text: En cambio[a], debes abrir tu mano a él y ciertamente prestarle lo suficiente para su necesidad, para todo lo que le falte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «abrir, abrirás ... prestar, prestarás»; una forma verbal repetida usada para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Instead
  chosen_spanish: En cambio
  alternatives_spanish:
  - Pues
  - Porque
  - Pero
  lexicon: HALOT
  rationale: El contexto contrasta con la negativa o dureza implícita del versículo anterior; por eso conviene una marca adversativa/discursiva en español. «En cambio» expresa bien la oposición sin introducir contenido ajeno.
- source_word: פָתֹחַ תִּפְתַּח
  english_pob_choice: you must open
  chosen_spanish: debes abrir
  alternatives_spanish:
  - abrirás ciertamente
  - debes abrir ampliamente
  - abre sin falta
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la orden. «Debes abrir» comunica obligación de forma natural en español, sin volver la frase artificial. La repetición enfática queda sugerida por el paralelismo con «ciertamente prestarle».
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu palma
  - tu mano abierta
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta del hebreo para la generosidad. «Tu mano» es idiomático y fiel.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El movimiento de abrir la mano en dirección del necesitado se expresa de manera natural con «hacia él». Mantiene la orientación del gesto sin perder la referencia personal.
- source_word: וְהַעֲבֵט תַּעֲבִיטֶנּוּ
  english_pob_choice: and surely lend him
  chosen_spanish: y ciertamente prestarle
  alternatives_spanish:
  - y sin falta prestarle
  - y préstale con seguridad
  - y ciertamente darle prestado
  lexicon: HALOT
  rationale: El verbo עבט tiene aquí sentido de prestar. «Prestarle» comunica la acción básica; «ciertamente» intenta reproducir la fuerza enfática del infinitivo absoluto + verbo finito. «Darle prestado» suena más perifrástico y menos directo.
- source_word: דֵּי
  english_pob_choice: enough
  chosen_spanish: lo suficiente
  alternatives_spanish:
  - suficiente
  - en medida suficiente
  - lo bastante
  lexicon: HALOT
  rationale: «Lo suficiente» reproduce la idea de suficiencia y encaja bien con la cláusula siguiente. Mantiene un registro claro y bíblico sin sonar arcaico.
- source_word: מַחְסֹרוֹ
  english_pob_choice: for whatever he lacks
  chosen_spanish: para toda su falta
  alternatives_spanish:
  - para toda su necesidad
  - para todo lo que le falta
  - según su necesidad
  lexicon: HALOT
  rationale: מַחְסוֹר denota carencia o falta. «Su falta» conserva la raíz conceptual de carencia; «toda» refleja el alcance total del suministro. Aunque «necesidad» sería más idiomático, «falta» preserva mejor la concreción del término hebreo.
- source_word: אֲשֶׁר יֶחְסַר לֽוֹ
  english_pob_choice: whatever he lacks
  chosen_spanish: lo que le falte
  alternatives_spanish:
  - lo que le falta
  - todo lo que le falte
  - aquello que le falte
  lexicon: HALOT
  rationale: La relativa especifica el contenido de la carencia. «Lo que le falte» mantiene el sentido abierto y natural del hebreo. En el texto principal se integró con la frase anterior para evitar redundancia excesiva.
translation_notes:
  revision_awareness: El texto español sigue de cerca el paquete fuente hebreo y el trazado auditado en inglés, conservando la intensificación verbal y la estructura de carencia/suficiencia sin añadir interpretaciones devocionales. Se optó por una formulación española natural, pero con suficiente literalidad para que el paralelismo del hebreo siga siendo auditable.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda en este proyecto; este versículo no contiene el nombre divino.
  - Se prefirió «prestar» para עבט siguiendo el contexto auditado en inglés, donde el sentido es causativo de préstamo.
  - «Falta» se eligió para מַחְסוֹר por fidelidad semántica, aunque «necesidad» sería una alternativa más libre.
  - La nota [a] se ancla en la repetición verbal enfática y corresponde al único matiz textual destacado en el audit trail inglés.
