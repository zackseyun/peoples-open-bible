translation:
  language: es
  text: 'Hijo de hombre[a], profetiza contra los profetas de Israel, los que están profetizando, y diles a los que profetizan desde[b] su propio corazón: «Oigan la palabra de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, “Hijo de hombre”. Se conserva la fórmula fija de dirección profética de Ezequiel.
    reason: alternative_reading
  - marker: b
    text: Lit., “de su propio corazón”. El hebreo usa un modismo que indica que hablan desde sí mismos, no desde Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conservo la fórmula fija de dirección profética de Ezequiel. En español, “Hijo de hombre” mantiene el idiom a y la continuidad literaria mejor que una paráfrasis como “mortal” o “ser humano”.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - habla como profeta
  lexicon: HALOT
  rationale: El imperativo niphal de נבא exige el verbo usual de profecía. “Profetiza” es directo, natural y fiel al registro profético.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: Aunque normalmente significa “a/hacia”, aquí la comisión es de denuncia contra los profetas falsos. “Contra” reproduce la fuerza adversativa del contexto.
- source_word: נְבִיאֵי יִשְׂרָאֵל
  english_pob_choice: the prophets of Israel
  chosen_spanish: los profetas de Israel
  alternatives_spanish:
  - los profetas de Israel
  lexicon: HALOT
  rationale: 'La construcción posesiva se conserva de manera transparente. “Los profetas de Israel” deja visible la ironía: pertenecen a Israel, pero son objeto de condena.'
- source_word: הַנִּבָּאִים
  english_pob_choice: who are prophesying
  chosen_spanish: los que están profetizando
  alternatives_spanish:
  - los que profetizan
  lexicon: HALOT
  rationale: El participio expresa acción característica o en curso. El giro “los que están profetizando” refleja mejor esa continuidad que un simple presente, sin perder naturalidad.
- source_word: לִנְבִיאֵי מִלִּבָּם
  english_pob_choice: to those who prophesy from their own hearts
  chosen_spanish: a los que profetizan desde su propio corazón
  alternatives_spanish:
  - a los profetas de su propio corazón
  - a los que profetizan desde su mente
  lexicon: HALOT
  rationale: “Desde su propio corazón” conserva la metáfora hebrea del corazón como fuente interior del mensaje y, a la vez, comunica en español que la profecía nace de sí mismos y no de Yahvé. Mantengo “corazón” en lugar de “mente” para no borrar la imagen original.
- source_word: שִׁמְע֖וּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  lexicon: HALOT
  rationale: El imperativo llama a recibir con atención la palabra profética. “Oigan” es un equivalente imperativo claro en español actual; “Escuchen” también sería válido, pero “oigan” conserva mejor la sobriedad del mandato.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: “Palabra” preserva la fórmula profética tradicional y su peso intertextual. “Yahvé” sigue el criterio de la POB para el Tetragrámaton, evitando la sustitución por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se translitera el nombre divino con la forma española acordada por la POB. Esto mantiene visible el nombre propio del pacto en vez de ocultarlo tras un sustituto litúrgico.
theological_decisions:
- issue: Valor de אֶל en un oráculo de juicio
  english_pob_reading: Render as 'against' rather than the more literal 'to'
  chosen_spanish_reading: “contra” en lugar de “a”
  alternative_spanish_readings:
  - a
  rationale: El contexto inmediato es una denuncia judicial contra falsos profetas. “Contra” comunica la orientación del mandato sin añadir contenido ajeno al hebreo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; prioridad del sentido contextual del original'
- issue: Origen interno de la falsa profecía
  english_pob_reading: those who prophesy from their own hearts
  chosen_spanish_reading: los que profetizan desde su propio corazón
  alternative_spanish_readings:
  - los profetas de su propio corazón
  - los que profetizan desde su mente
  rationale: La frase hebrea contrapone revelación divina y discurso auto-generado. “Desde su propio corazón” conserva la metáfora y deja clara la procedencia humana de la palabra falsa.
  doctrine_reference: Preservar la imagen bíblica del corazón como centro interior sin neutralizarla con una abstracción moderna
translation_notes:
  revision_awareness: 'Concordancia alta con el texto inglés auditado y sin revisiones pendientes en el paquete fuente. Se mantuvo la equivalencia óptima y se resolvieron dos tensiones léxicas principales: אֶל como “contra” y מִלִּבָּם como procedencia interior expresada con “desde su propio corazón”.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יְהוָה.
  - Se conserva “Hijo de hombre” como fórmula profética fija.
  - Se mantiene “corazón” para reflejar la metáfora hebrea del centro interior, sin reemplazarla por “mente”.
  - El tono es sobrio y bíblico, pero en español moderno y claramente legible.
