review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y sentido básico del hebreo: ofrenda de cereal, libaciones, los tres tipos de animales, y las dos cláusulas procedimentales finales. Sin embargo, la última frase hebrea כַּמִּשְׁפָּט tiene fuerza normativa/prescriptiva más que meramente ritual, y el inglés auditado la fijó como ‘according to the ordinance’ con nota alternativa ‘according to the prescribed manner’.'
  spanish_quality_summary: El español es claro y natural. ‘Ofrenda vegetal’ y ‘libaciones’ son aceptables, aunque ‘ofrenda de grano’ sería algo más transparente para lectores generales. El problema principal es ‘conforme al rito’, que suena más ceremonial que legal/procedimental y debilita el matiz de norma establecida del hebreo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. Las elecciones para toros, carneros, corderos y libaciones son adecuadas. Conviene alinear מִשְׁפָּט con ‘ordenanza’ o una nota que preserve ‘manera prescrita’, en lugar de ‘rito’.
  issues:
  - severity: medium
    issue: ‘conforme al rito’ debilita el sentido de כַּמִּשְׁפָּט
    rationale: מִשְׁפָּט aquí no describe solo una ceremonia o rito, sino la norma/procedimiento prescrito para presentar las ofrendas. ‘Rito’ pierde el matiz legal-cúltico presente en el hebreo y reconocido en el audit trail inglés.
  - severity: low
    issue: Falta la nota léxica alternativa para כַּמִּשְׁפָּט
    rationale: El inglés POB conserva una alternativa significativa (‘according to the prescribed manner’). En español conviene preservarla porque aclara que se trata del modo establecido de presentación.
  revised_spanish_text: y su ofrenda vegetal y sus libaciones, para los toros, para los carneros y para los corderos, según su número, según la ordenanza[a].
  revised_footnotes:
  - marker: a
    text: O ‘según la manera prescrita’. El hebreo כַּמִּשְׁפָּט se refiere a la regla establecida para cómo debían presentarse estas ofrendas.
    reason: lexical_alternative
