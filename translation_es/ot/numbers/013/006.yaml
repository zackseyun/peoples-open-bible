  rationale: En esta lista de representantes tribales, la preposición ל con מַטֶּה señala afiliación/representación tribal. En español, «de la tribu de» comunica de manera natural esa pertenencia sin volverla más literal de lo necesario.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judáh
  lexicon: HALOT
  rationale: Nombre propio de la tribu/patrón ancestral. «Judá» es la forma estándar y clara en español bíblico.
- source_word: כָּלֵב
  english_pob_choice: Caleb
  chosen_spanish: Caleb
  alternatives_spanish:
  - Kaleb
  lexicon: HALOT
  rationale: Transliteración estable del nombre אישי. «Caleb» es la forma más reconocible y fiel al uso bíblico en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La relación constructa expresa filiación inmediata. «Hijo de» conserva la función genealógica de modo natural en español.
- source_word: יְפֻנֶּה
  english_pob_choice: Jephunneh
  chosen_spanish: Jephuné
  alternatives_spanish:
  - Jefuné
  - Jephunneh
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. «Jephunneh» en inglés pasa a una forma castellana inteligible; «Jephuné» mantiene la proximidad fonética sin exceder el dato fuente.
