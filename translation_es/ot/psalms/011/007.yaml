review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo y sigue la lectura principal del POB inglés: Yahvé es justo, ama actos rectos, y los rectos verán su rostro. Sin embargo, las notas están desalineadas con el audit trail: la nota a está anclada en «justo» aunque trata del hemistiquio final; la nota b atribuye literalidad a «sus rostros / su rostro», cuando en el POB inglés la nota b explica la literalidad de «his face» y su posible matiz de presencia/favor; además se añadió una nota c teológica no requerida. Eso afecta la fidelidad documental más que el texto base.'
  spanish_quality_summary: El español principal es claro, digno y natural. «Porque Yahvé es justo; ama las obras de justicia; los rectos contemplarán su rostro» es plenamente legible. No obstante, «obras de justicia» puede sonar un poco más abstracto que el inglés «righteous deeds»; «obras justas» fluye mejor en español y conserva suficientemente la conexión léxica. La puntuación y el registro son adecuados.
  glossary_alignment: Cumple con «Yahvé» para יהוה. «Justo/justicia» preserva bien la familia léxica de צַדִּיק / צְדָקוֹת. «Los rectos» para יָשָׁר y «rostro» para פָנֵימוֹ están bien. La principal corrección necesaria es de anclaje y contenido de notas, no de glosario.
  issues:
  - severity: high
    issue: La nota a está colocada en «justo» pero su contenido trata la sintaxis del hemistiquio final.
    rationale: Las notas deben anclarse en la palabra o frase pertinente del texto español. Aquí la alternativa «su rostro contempla a los rectos» corresponde a la cláusula final, no al adjetivo «justo».
  - severity: high
    issue: La nota b reproduce incorrectamente la literalidad como «sus rostros / su rostro».
    rationale: El hebreo פָנֵימוֹ aquí se refleja en singular español «su rostro». La nota del POB inglés dice literalmente «his face» y añade el posible sentido de presencia o favor; no introduce «sus rostros».
  - severity: medium
    issue: Se añadió una nota c redundante no respaldada por el audit trail.
    rationale: La ambigüedad sintáctica ya queda preservada en la nota de alternativa. La nota adicional recarga el verso y no añade evidencia nueva.
  - severity: low
    issue: «Obras de justicia» es aceptable, pero «obras justas» suena más natural en español para actos concretos.
    rationale: צְדָקוֹת aquí apunta a hechos rectos concretos. «Obras justas» conserva el sentido y mejora la fluidez, aunque no es un error grave mantener «obras de justicia».
  revised_spanish_text: Porque Yahvé es justo; ama las obras justas; los rectos contemplarán su rostro[a][b].
  revised_footnotes:
  - marker: a
    text: O, menos probable, «su rostro contempla a los rectos». La sintaxis hebrea del hemistiquio final se ha entendido de más de una manera.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «su rostro». La expresión también puede implicar su presencia o favor.
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido principal del borrador, pero se corrigen los anclajes y el contenido de las notas para alinearlos con la evidencia fuente y el audit trail inglés. También se simplifica «obras de justicia» a «obras justas» por mayor naturalidad en español sin perder el sentido de actos rectos concretos.
