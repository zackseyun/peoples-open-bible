translation:
  language: es
  text: 'Y dirá la gente: «Ciertamente, hay fruto para el justo[a]; ciertamente hay un Dios que juzga[b] en la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Ciertamente, fruto es para el justo»; es decir, el justo realmente recibe un resultado o recompensa.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo tiene un participio plural, literalmente «Dios/juzgantes» o «Dios que juzgan». Muchos entienden esto como referencia al único Dios verdadero con morfología plural; otros, menos probablemente, lo toman como «dioses que juzgan».
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/יֹאמַר
  english_pob_choice: And ... will say
  chosen_spanish: Y dirá
  alternatives_spanish:
  - Y dirán
  - Entonces dirá
  lexicon: HALOT
  rationale: El imperfecto hebreo con waw en contexto poético expresa aquí una secuencia futura o consecutiva. En español, «dirá» conserva ese valor prospectivo sin volver la frase artificial.
- source_word: אָדָם
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - el hombre
  - las personas
  - la humanidad
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, funciona de manera genérica. «La gente» comunica mejor en español moderno la voz colectiva e indefinida que la frase introduce, sin perder el sentido representativo.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - De veras
  - Verdaderamente
  - Sin duda
  lexicon: HALOT
  rationale: La partícula es enfática, no restrictiva. «Ciertamente» reproduce bien ese énfasis solemne en ambos casos.
- source_word: פְּרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - recompensa
  - resultado
  lexicon: HALOT
  rationale: «Fruto» mantiene la imagen hebrea literal y sigue siendo claro en español. En este contexto tiene sentido de resultado o recompensa, pero no conviene desactivar de entrada la metáfora.
- source_word: לַ/צַּדִּיק
  english_pob_choice: for the righteous
  chosen_spanish: para el justo
  alternatives_spanish:
  - para el recto
  - para el justo hombre
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado צַדִּיק se vierte naturalmente como «el justo». Preserva el valor moral-covenantal del término sin volverlo explicativo.
- source_word: יֵשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - sí hay
  lexicon: HALOT
  rationale: Es el equivalente existencial normal en español y mantiene la sencillez del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: a God
  chosen_spanish: un Dios
  alternatives_spanish:
  - Dios
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma es morfológicamente plural, aquí la lectura confesional apunta al Dios verdadero. «Un Dios» conserva el giro existencial del hebreo sin sugerir politeísmo; la mayúscula identifica al referente.
- source_word: שֹׁפְטִים
  english_pob_choice: who judges
  chosen_spanish: que juzga
  alternatives_spanish:
  - que juzgan
  - juzgando
  lexicon: HALOT
  rationale: El hebreo presenta participio plural; el POB inglés lo interpreta en singular por la referencia a Dios. En español, «que juzga» expresa esa decisión interpretativa de forma natural, sin borrar la tensión gramatical del original.
- source_word: בָּ/אָֽרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  - en la tierra/país
  lexicon: HALOT
  rationale: «Tierra» es el correlato directo y suficientemente amplio para el ámbito de la justicia divina. «En la tierra» mantiene el paralelismo con el juicio universal implícito.
theological_decisions:
- issue: 'Lectura de אֱלֹהִים שֹׁפְטִים: singular o plural'
  english_pob_reading: 'singular: ''a God who judges'''
  chosen_spanish_reading: 'singular: «un Dios que juzga»'
  alternative_spanish_readings:
  - 'plural: «dioses que juzgan»'
  - 'singular explícito: «Dios juzga»'
  rationale: El contexto poético culmina en la confesión de la justicia divina. La forma plural del participio se entiende mejor como rasgo gramatical que como afirmación de varios dioses. Mantener el singular evita introducir politeísmo y preserva el testimonio teológico del salmo.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió ''man'' por ''people'' para reflejar con más naturalidad אָדָם como genérico. En español se siguió esa actualización con «la gente», manteniendo el resto de las decisiones principales: imagen de «fruto», lectura singular de אֱלֹהִים y el sentido judicial de la cláusula final.'
  spanish_consistency_notes:
  - Se preservó el paralelismo de los dos «ciertamente».
  - «Justo» traduce el sustantivo/adjetivo sustantivado sin añadir explicaciones.
  - «Tierra» se usa en sentido amplio y no como «país».
  - La nota b explica la tensión morfológica de שֹׁפְטִים sin resolverla por una pluralidad teológica.
