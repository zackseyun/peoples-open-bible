- from: En el primer día habrá una santa convocación[a]; no harán ningún trabajo laborioso[b].
  to: El primer día habrá una santa convocación[a]; no harán ningún trabajo habitual[b].
  rationale: Se corrige la frase temporal a un español más natural («El primer día») y se sustituye «trabajo laborioso» por «trabajo habitual», que comunica mejor el sentido documentado de כָּל מְלֶאכֶת עֲבֹדָה en español contemporáneo, manteniendo en nota las alternativas más literales y tradicionales.
