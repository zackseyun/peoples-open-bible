base_translation:
  language: en
  yaml_path: translation/ot/daniel/007/027.yaml
  text: And the kingdom and the dominion and the greatness of the kingdoms under all heaven shall be given to the people of the saints of the Most High[a]. His kingdom shall be an everlasting kingdom[c][b], and all dominions shall serve and obey him.
  footnotes:
  - marker: a
    text: Or 'the people of the holy ones of the Most High' or 'the holy people of the Most High.'
    reason: lexical_alternative
  - marker: b
    text: 'The Aramaic has singular pronouns: ''His kingdom ... all dominions shall serve him and obey him.'' This may point to the representative ruler seen earlier in the vision, even as the kingdom is given to the saints.'
    reason: alternative_reading
  - marker: c
    text: '''Serve'' can also carry the sense ''worship'' in Daniel when the service is rendered to deity.'
    reason: lexical_alternative
