  language: ko
  text: '라오디게아에 있는 회중의 천사에게 써라. 「아멘이신 분, 신실하고 참되신 증인, 하나님의 창조의 시작[a]이신 분께서 이같이 말씀하신다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「하나님의 창조의 근원」이나 「하나님의 창조를 다스리는 자」. 헬라어 ἀρχή는 「시작」, 「근원」, 「통치자」의 의미를 모두 지닐 수 있다.'
