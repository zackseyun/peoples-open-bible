translation:
  language: es
  text: 'Porque esta es la alianza[a] que haré con la casa de Israel después de aquellos días, declara Yahvé: pondré[c] mi ley[b] dentro de ellos, y la escribiré en sus corazones. Yo seré su Dios, y ellos serán mi pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «cortaré» una alianza. El español normaliza el modismo con «haré», pero se conserva aquí la referencia de fondo al lenguaje pactal hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «instrucción». El hebreo torá puede significar «ley» o «instrucción»; aquí se usa «ley» para preservar el sentido de alianza.
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo traducido «pondré» tiene formalmente forma de perfecto («he puesto»), pero en este contexto profético se entiende con sentido futuro, en paralelo con las promesas que siguen.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבְּרִית / covenant
  english_pob_choice: the covenant
  chosen_spanish: la alianza
  alternatives_spanish:
  - el pacto
  - la alianza del pacto
  lexicon: HALOT
  rationale: El hebreo בְּרִית puede traducirse como alianza o pacto; en español bíblico contemporáneo, «alianza» comunica mejor la relación vinculante sin sonar tan técnico como «pacto». Se conserva el sentido covenantal del texto sin perder naturalidad.
- source_word: אֶכְרֹת
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - cortaré
  - concertaré
  lexicon: HALOT
  rationale: El hebreo usa el modismo literal «cortar una alianza», pero en español la forma natural es «hacer» una alianza. El matiz literal se reserva para nota, como en el audit trail inglés.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión corporativa y pactal del hebreo, en lugar de reducirla a «Israel» a secas.
- source_word: אַחֲרֵי הַיָּמִים הָהֵם
  english_pob_choice: after those days
  chosen_spanish: después de aquellos días
  alternatives_spanish:
  - tras aquellos días
  - al terminar esos días
  lexicon: HALOT
  rationale: La frase se vierte de manera cercana y natural, conservando la orientación profética futura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé», no una sustitución por título. Esto preserva la referencia al nombre propio del pacto.'
- source_word: תּוֹרָתִי
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  - mi enseñanza
  lexicon: HALOT
  rationale: En este contexto de renovación de la alianza, תּוֹרָה mantiene con fuerza su valor de norma pactal. «Ley» preserva esa resonancia mejor que una paráfrasis como «instrucción».
- source_word: בְּקִרְבָּם
  english_pob_choice: within them
  chosen_spanish: dentro de ellos
  alternatives_spanish:
  - en su interior
  - en medio de ellos
  lexicon: HALOT
  rationale: Aquí el paralelo con «en su corazón» favorece un sentido interno, no meramente comunitario. «Dentro de ellos» comunica bien la interiorización.
- source_word: לִבָּם
  english_pob_choice: hearts
  chosen_spanish: corazón
  alternatives_spanish:
  - corazones
  - mente
  - interior
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo y antropológico. En español, el singular «corazón» conserva mejor la imagen del texto y la relación con la interiorización de la ley.
- source_word: וְהָיִיתִי לָהֶם לֵאלֹהִים
  english_pob_choice: And I will be their God
  chosen_spanish: Yo seré su Dios
  alternatives_spanish:
  - Y yo seré Dios para ellos
  - Y seré para ellos Dios
  lexicon: HALOT
  rationale: Se conserva la fórmula de alianza en una forma idiomática y reverente en español.
- source_word: וְהֵמָּה יִהְיוּ לִי לְעָם
  english_pob_choice: and they shall be my people
  chosen_spanish: y ellos serán mi pueblo
  alternatives_spanish:
  - y serán pueblo mío
  - y me pertenecerán como pueblo
  lexicon: HALOT
  rationale: Se mantiene la fórmula pactal tradicional sin volverla demasiado literal. «Mi pueblo» comunica correctamente la pertenencia relacional.
theological_decisions:
- issue: El tiempo verbal de נָתַתִּי en una promesa futura
  english_pob_reading: 'Render with future sense: ''I will put my law within them'''
  chosen_spanish_reading: 'Ponerlo en futuro con valor profético: «pondré mi ley dentro de ellos»'
  alternative_spanish_readings:
  - he puesto mi ley dentro de ellos
  - puse mi ley dentro de ellos
  rationale: Aunque la forma hebrea es perfecta, el contexto encadenado de promesas futuras exige valor prospectivo para preservar la coherencia del anuncio. La traducción española sigue esa lectura profética sin forzar un pasado.
  doctrine_reference: 'Translation philosophy: preserve source meaning in context; prophetic perfect.'
- issue: Alcance de תּוֹרָה en un contexto de nueva alianza
  english_pob_reading: Translate as 'law' in the main text, preserve 'instruction' as an alternative
  chosen_spanish_reading: Traducir como «ley» en el texto principal y registrar «instrucción» como alternativa
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: En Jeremías 31 el término tiene fuerza de norma de alianza. «Ley» preserva mejor la continuidad canónica y el peso pactal; «instrucción» queda como posibilidad léxica documentada.
  doctrine_reference: Consistency of key terms with documented lexical alternatives.
- issue: 'Imagen de interiorización: בְּקִרְבָּם y לִבָּם'
  english_pob_reading: I will put my law within them / write it on their hearts
  chosen_spanish_reading: «dentro de ellos» y «en su corazón»
  alternative_spanish_readings:
  - en su interior
  - en sus corazones
  - en medio de ellos
  rationale: La cláusula paralela exige distinguir lo interno del mero ámbito comunitario. «Dentro de ellos» mantiene la interioridad; «corazón» conserva la antropología bíblica sin reducirla a «mente» o a una abstracción.
  doctrine_reference: Biblical anthropology and covenant internalization.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión en el contexto inglés: no hubo cambios aplicados y el acuerdo general fue alto. La versión española sigue la misma lectura de futuro profético para נָתַתִּי, conserva «ley» para תּוֹרָה en este contexto y mantiene la fórmula de alianza con el nombre divino Yahvé.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - Se mantuvo la fórmula pactal «Yo seré su Dios, y ellos serán mi pueblo» en estilo natural y reverente.
  - Se conservó el singular «corazón» por fidelidad a la imagen hebrea y por coherencia con la interiorización de la ley.
