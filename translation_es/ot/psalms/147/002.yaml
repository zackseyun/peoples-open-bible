review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Yahvé como sujeto, acción presente/habitual de construir/restaurar Jerusalén, y reunir a los apartados de Israel. Sin embargo, «desterrados» estrecha un poco el campo semántico de נִדְחֵי hacia destierro/exilio formal, mientras que el expediente inglés privilegia «outcasts» y conserva alternativas como «dispersed/banished/exiles».'
  spanish_quality_summary: El español es claro, digno y natural. «Yahvé edifica Jerusalén» suena bien en registro bíblico moderno. La mejora principal es ajustar «desterrados» a una opción más amplia y cercana al valor de exclusión/expulsión del hebreo, y añadir nota para preservar las alternativas léxicas documentadas.
  glossary_alignment: Alinea correctamente «יְהוָה → Yahvé» y mantiene bien los nombres propios. No hay conflicto doctrinal. El punto léxico a corregir es «נִדְחֵי», donde conviene una traducción menos restringida que «desterrados».
  issues:
  - severity: medium
    issue: «los desterrados» restringe demasiado נִדְחֵי
    rationale: El hebreo puede abarcar expulsados, dispersos, desterrados o exiliados. «Desterrados» funciona, pero en español suele sonar más específicamente a destierro formal. El rastro POB inglés eligió «outcasts» precisamente para mantener un sentido algo más amplio.
  - severity: low
    issue: Falta nota léxica para alternativas significativas
    rationale: El expediente inglés conserva alternativas para נִדְחֵי y para בּוֹנֵה. En español, al menos la nota sobre נִדְחֵי ayuda a preservar matices posibles sin recargar el texto principal.
  revised_spanish_text: Yahvé edifica Jerusalén; reúne a los expulsados[a] de Israel.
