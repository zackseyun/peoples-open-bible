  text: וְ/הָ/אִ֥ישׁ יָרָבְעָ֖ם גִּבּ֣וֹר חָ֑יִל וַ/יַּ֨רְא שְׁלֹמֹ֜ה אֶת הַ/נַּ֗עַר כִּֽי עֹשֵׂ֤ה מְלָאכָה֙ ה֔וּא וַ/יַּפְקֵ֣ד אֹת֔/וֹ לְ/כָל סֵ֖בֶל בֵּ֥ית יוֹסֵֽף־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/011/028.yaml
  text: Now the man Jeroboam was a mighty man of valor[a], and Solomon saw that the young man was industrious[b], so he appointed him over all the labor force of the house of Joseph.
  footnotes:
  - marker: a
    text: Or 'a capable man' or 'a valiant man.' The Hebrew expression can denote strength, valor, or notable ability.
    reason: lexical_alternative
  - marker: b
    text: '''The house of Joseph'' refers to the tribes descended from Joseph, especially Ephraim and Manasseh.'
    reason: cultural_note
