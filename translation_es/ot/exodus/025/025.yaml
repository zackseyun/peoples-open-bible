translation:
  language: es
  text: Harás para ella un marco de un palmo de ancho alrededor, y harás una moldura de oro alrededor de su marco.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una corona de oro alrededor de su marco». El hebreo זֵר puede referirse a un borde ornamental o moldura; «corona» es la traducción tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְגֶּרֶת
  english_pob_choice: frame
  chosen_spanish: marco
  alternatives_spanish:
  - borde
  - ribete
  lexicon: HALOT
  rationale: El hebreo designa una pieza estructural o borde de contorno para el mueble. «Marco» comunica mejor esa función constructiva en español moderno que «borde», que es más genérico.
- source_word: טֹפַח
  english_pob_choice: a handbreadth wide
  chosen_spanish: de un palmo de ancho
  alternatives_spanish:
  - de un palmo
  - del ancho de un palmo
  lexicon: HALOT
  rationale: La medida hebrea es una «mano/palmo». En español, «de un palmo de ancho» expresa con naturalidad la dimensión sin perder la unidad tradicional de medida.
- source_word: סָבִיב
  english_pob_choice: around / surrounding
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todos lados
  - en derredor
  lexicon: HALOT
  rationale: El término aparece dos veces y señala disposición envolvente. «Alrededor» preserva esa repetición con claridad y buen ritmo en español.
- source_word: זֵר
  english_pob_choice: molding
  chosen_spanish: borde
  alternatives_spanish:
  - ribete
  - moldura
  - corona
  lexicon: HALOT
  rationale: En este contexto de utensilio del tabernáculo, el término denota un adorno o remate perimetral. «Borde» es más transparente en español y evita la posible mala interpretación de «corona» como objeto real separado.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - oro
  - dorada
  lexicon: HALOT
  rationale: El sustantivo material se vierte naturalmente como «de oro» en español cuando modifica al borde o remate.
- source_word: לּוֹ / לְמִסְגַּרְתּוֹ
  english_pob_choice: for it / its frame
  chosen_spanish: para ella / de su marco
  alternatives_spanish:
  - para ella / para su marco
  - para la mesa / de su borde
  lexicon: HALOT
  rationale: Se conservan los pronombres referidos a la mesa sin repetir el sustantivo, y el posesivo «su» mantiene la cohesión textual del hebreo.
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Deberás hacer
  lexicon: HALOT
  rationale: La forma imperativa/instructiva del hebreo se expresa con futuro exhortativo en español bíblico claro y moderno. «Harás» conserva el tono directivo sin sonar forzado.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de Éxodo 25:25 y refleja el mismo paralelismo verbal que la POB en inglés: dos instrucciones consecutivas sobre el marco y el remate ornamental. Se ha mantenido la ambigüedad lexical relevante de זֵר mediante nota, sin imponer una lectura demasiado específica.'
  spanish_consistency_notes:
  - Se usó «palmo» para טֹפַח por ser la equivalencia natural y tradicional de la medida, manteniendo claridad para lectores hispanohablantes.
  - Se evitó «SEÑOR» o cualquier sustitución teológica porque el versículo no contiene el nombre divino.
  - «Marco» y «borde» se distribuyen para distinguir la pieza estructural del adorno ornamental, siguiendo la distinción contextual del hebreo.
