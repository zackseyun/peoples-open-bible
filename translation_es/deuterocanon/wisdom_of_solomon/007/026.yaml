translation:
  language: es
  text: Porque ella es un resplandor de la luz eterna[a], y un espejo sin mancha del obrar de Dios, y una imagen de su bondad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «reflejo de la luz eterna». El término griego puede indicar tanto un brillo que emana de una fuente como una luminosidad reflejada; «resplandor» se eligió porque encaja mejor con la secuencia del versículo: luz, espejo e imagen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαύγασμα
  english_pob_choice: radiance
  chosen_spanish: resplandor
  alternatives_spanish:
  - radiancia
  - irradiación
  - fulgor
  lexicon: LSJ/BDAG
  rationale: ἀπαύγασμα expresa una salida o brillo que proviene de una fuente luminosa. «Resplandor» comunica bien esa luz que irradia, sin sonar técnico ni perder la imagen de luz emitida que la POB quiso preservar con 'radiance'.
- source_word: φωτὸς ἀϊδίου
  english_pob_choice: eternal light
  chosen_spanish: la luz eterna
  alternatives_spanish:
  - la luz perpetua
  - la luz de siempre
  - la luz inagotable
  lexicon: LSJ
  rationale: 'El genitivo griego indica pertenencia o relación: «luz eterna». En español, «de la luz eterna» conserva esa relación de manera natural y fiel al matiz revisado en la POB.'
- source_word: ἔσοπτρον
  english_pob_choice: mirror
  chosen_spanish: espejo
  alternatives_spanish:
  - espejo de mano
  - espejo
  - lente
  lexicon: LSJ
  rationale: El término se refiere a un espejo. «Espejo» es el equivalente moderno directo y claro, y mantiene la secuencia imagética con el lenguaje de brillo y reflejo.
- source_word: ἀκηλίδωτον
  english_pob_choice: spotless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin mancha
  - inmaculado
  - sin defecto
  lexicon: LSJ
  rationale: El adjetivo significa no manchado, sin impureza. «Sin mancha» es una opción española natural y precisa; conserva la fuerza moral y visual del adjetivo junto al espejo.
- source_word: τῆς τοῦ θεοῦ ἐνεργείας
  english_pob_choice: of the working of God
  chosen_spanish: de la actividad de Dios
  alternatives_spanish:
  - de la obra de Dios
  - del actuar de Dios
  - de la operación de Dios
  lexicon: LSJ
  rationale: ἐνέργεια aquí apunta a acción eficaz, actividad operante. «Actividad de Dios» comunica ese sentido sin introducir un tecnicismo teológico posterior que podría oscurecer el pasaje.
- source_word: εἰκών
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - imagen
  - representación
  - semejanza
  lexicon: LSJ/BDAG
  rationale: «Imagen» es el equivalente directo y mantiene la resonancia teológica del término, tal como la POB preserva 'image'.
- source_word: ἀγαθότητος αὐτοῦ
  english_pob_choice: of his goodness
  chosen_spanish: de su bondad
  alternatives_spanish:
  - de su bondad
  - de su benevolencia
  - de su bien
  lexicon: LSJ
  rationale: ἀγαθότης denota bondad o benevolencia. «Bondad» es la opción española más natural y amplia, y conserva el alcance moral y benevolente del término.
theological_decisions:
- issue: Personificación femenina de Sabiduría
  english_pob_reading: Retained 'she' throughout the verse
  chosen_spanish_reading: «ella»
  alternative_spanish_readings:
  - repetir «Sabiduría» en vez del pronombre
  - usar una formulación neutra
  rationale: El contexto personifica a la Sabiduría con agencia personal y género gramatical femenino. Mantener «ella» preserva esa tensión literario-teológica sin convertirla en una deidad separada ni neutralizar la personificación.
  doctrine_reference: 'DOCTRINE.md: conservar la tensión teológica y la personificación gramatical cuando esté sustentada por el texto'
- issue: Relación genitiva de φωτὸς ἀϊδίου
  english_pob_reading: '''of eternal light'' after revision from ''from everlasting light'''
  chosen_spanish_reading: «de la luz eterna»
  alternative_spanish_readings:
  - «desde la luz eterna»
  - «procedente de la luz eterna»
  rationale: La revisión inglesa corrigió la relación genitiva para reflejar más directamente el griego. En español, «de la luz eterna» reproduce esa relación sin convertirla en una idea de procedencia que el griego no exige.
  doctrine_reference: 'DOCTRINE.md: reflejar con precisión las relaciones gramaticales del original'
translation_notes:
  revision_awareness: 'La versión inglesa final revisó «from everlasting light» a «of eternal light» para reflejar mejor el genitivo griego φωτὸς ἀϊδίου. Esta traducción española sigue esa revisión con «de la luz eterna» y conserva el orden imagético del versículo: resplandor, espejo sin mancha e imagen.'
  spanish_consistency_notes:
  - He mantenido «Sabiduría» como sujeto implícito en el pronombre femenino «ella», siguiendo la personificación del contexto.
  - He preferido «bondad» sobre opciones más técnicas como «benevolencia» para conservar naturalidad y amplitud semántica.
  - «Actividad de Dios» evita introducir un tecnicismo posterior para ἐνέργεια y armoniza con el estilo POB de claridad fiel al original.
