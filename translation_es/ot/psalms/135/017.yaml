translation:
  language: es
  text: Tienen orejas, pero no oyen; en verdad, no hay aliento[a] en sus bocas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu» para רוּחַ; aquí el contexto de ídolos sin vida y la mención de la boca favorecen «aliento».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָזְנַיִם
  english_pob_choice: ears
  chosen_spanish: orejas
  alternatives_spanish:
  - tienen orejas
  - tienen oídos
  lexicon: HALOT
  rationale: El hebreo nombra directamente el órgano corporal; en español, «orejas» conserva la imagen física más concreta. «Oídos» sería posible, pero tiende a sonar menos corpóreo y más funcional. La construcción verbal se deja implícita, como en el hebreo nominal.
- source_word: וְלֹא יַאֲזִינוּ
  english_pob_choice: but they do not hear
  chosen_spanish: pero no oyen
  alternatives_spanish:
  - pero no escuchan
  - y no oyen
  - pero no prestan oído
  lexicon: HALOT
  rationale: El verbo hiphil de אזן expresa atender/escuchar; en este contexto de ídolos inertes, «oyen» reproduce bien la incapacidad sensorial y mantiene la concisión del hebreo. «Escuchan» o «prestan oído» pueden sonar más interpretativos.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: en verdad
  alternatives_spanish:
  - además
  - incluso
  - sí
  lexicon: HALOT
  rationale: La partícula añade énfasis progresivo. «En verdad» conserva el valor intensificador sin volverlo meramente aditivo.
- source_word: אֵין יֶשׁ
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - carecen de
  lexicon: HALOT
  rationale: La combinación idiomática de negación de existencia se traduce con naturalidad por «no hay», equivalente claro y sobrio en español.
- source_word: רוּחַ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - espíritu
  - respiración
  - soplo
  lexicon: HALOT
  rationale: Aunque רוּחַ puede significar «espíritu», aquí el contexto de miembros corporales e idolatría apunta al sentido físico. «Aliento» preserva la concreción de vida/respiración y suena natural en español bíblico moderno.
- source_word: בְּפִיהֶם
  english_pob_choice: in their mouths
  chosen_spanish: en su boca
  alternatives_spanish:
  - en sus bocas
  - dentro de su boca
  lexicon: HALOT
  rationale: La imagen corporal se mantiene. En español, singular colectivo «su boca» funciona bien con referencia plural distributiva en un dicho sobre ídolos, sin perder el sentido original.
theological_decisions:
- issue: Sentido de רוּחַ en un pasaje de sátira contra los ídolos
  english_pob_reading: breath
  chosen_spanish_reading: aliento
  alternative_spanish_readings:
  - espíritu
  - soplo
  rationale: El contexto enumera órganos y su falta de función; el clímax es la ausencia de vida física en los ídolos. «Aliento» mantiene la tensión lexical de רוּחַ sin convertirla en una afirmación metafísica sobre «espíritu» donde el pasaje no lo exige.
  doctrine_reference: Mantener el sentido concreto primario y no resolver la polisemia más allá de lo que el contexto evidencia.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y coincide con el audit trail inglés en los puntos clave: órgano corporal explícito, negación de escuchar y רוּחַ como falta de aliento/vida en la boca. Se opta por una equivalencia óptima que suena natural en español sin perder la imagen satírica.'
  spanish_consistency_notes:
  - Se mantiene la oposición entre poseer órganos y no cumplir su función.
  - «Aliento» se usa de forma consistente para רוּחַ en este contexto concreto.
  - La nota al pie preserva la alternativa «espíritu» documentada por la POB inglesa.
  - Se evita el calco de «dar oído» porque el verso no exige esa formulación en español.
