  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: continuidad comparativa, distinción entre πνεῦμα y σῶμα, y el carácter participial de un sufrimiento simultáneo. Sin embargo, «constriñéndose» introduce un matiz reflexivo no presente en στενοχωρούμενος, y «siendo ahogado» para ἀγχόμενος suena menos preciso en este contexto de constricción/asfixia que «siendo sofocado».'
  spanish_quality_summary: 'El texto actual es comprensible, pero «con su espíritu constriñéndose» resulta poco natural en español y gramaticalmente desviado del participio pasivo/medio de padecimiento. «Siendo ahogado» puede sugerir ahogamiento por agua en español general. Una leve reparación mejora fidelidad y legibilidad: «con su espíritu siendo constreñido y su cuerpo siendo sofocado».'
  glossary_alignment: Se mantiene correctamente «espíritu» para πνεῦμα y «cuerpo» para σῶμα, en línea con la decisión teológica auditada de preservar la distinción antropológica. No hay conflictos con la terminología base del proyecto.
  issues:
