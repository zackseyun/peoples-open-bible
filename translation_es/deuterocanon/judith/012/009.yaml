revisions:
- from: Y cuando entraba[a], permanecía en la tienda purificada hasta que llevaba su alimento hacia la tarde.
  to: Y cuando entró[a], permaneció en la tienda purificada hasta que trajo su alimento hacia el atardecer.
  rationale: 'Se ajustó el aspecto verbal para reflejar mejor la secuencia narrativa del griego: «entró» en lugar de «entraba» y «trajo» en lugar de «llevaba». Se mantuvo «purificada» por fidelidad al expediente POB y su nota asociada. También se mejoró la naturalidad temporal con «hacia el atardecer».'
