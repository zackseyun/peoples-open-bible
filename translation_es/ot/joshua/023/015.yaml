translation:
  language: es
  text: Y sucederá[a] que, así como ha venido sobre ustedes toda la buena palabra que Yahvé su Dios les habló, así Yahvé traerá sobre ustedes toda la mala palabra, hasta destruirlos de esta buena tierra que Yahvé su Dios les ha dado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cada cosa mala’ o ‘todo el desastre’. El hebreo dice literalmente ‘toda la palabra/cosa mala’, en paralelo con ‘toda la buena palabra’ al inicio del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: Expresa el marcador discursivo de futuro solemne sin sonar arcaico; reproduce el valor introductorio de la construcción hebrea.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - como
  lexicon: HALOT
  rationale: Mantiene la correlación comparativa con ‘así’ en la segunda mitad del versículo.
- source_word: בָּא עֲלֵיכֶם
  english_pob_choice: has come upon you
  chosen_spanish: ha venido sobre ustedes
  alternatives_spanish:
  - ha venido a ustedes
  - ha recaído sobre ustedes
  lexicon: HALOT
  rationale: ‘Sobre ustedes’ conserva el hebreo עַל y el movimiento de cumplimiento que el contexto exige.
- source_word: כָּל הַדָּבָר הַטּוֹב
  english_pob_choice: every good word
  chosen_spanish: toda la buena palabra
  alternatives_spanish:
  - toda buena palabra
  - todo el buen dicho
  lexicon: HALOT
  rationale: Se preserva ‘palabra’ para conservar el paralelismo deliberado con ‘mala palabra’; ‘toda’ refleja el alcance colectivo de כָּל.
- source_word: דִּבֶּר ... אֲלֵיכֶם
  english_pob_choice: spoke to you
  chosen_spanish: les habló
  alternatives_spanish:
  - les habló a ustedes
  - les dijo
  lexicon: HALOT
  rationale: Es natural en español y mantiene la relación directa de habla indicada por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Sigue el término proyectivo en español para el nombre divino, conforme al estándar del proyecto.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - por eso
  lexicon: HALOT
  rationale: Conserva la fuerza correlativa con la cláusula anterior y su equilibrio retórico.
- source_word: יָבִיא ... עֲלֵיכֶם
  english_pob_choice: will bring upon you
  chosen_spanish: hará venir sobre ustedes
  alternatives_spanish:
  - traerá sobre ustedes
  - hará caer sobre ustedes
  lexicon: HALOT
  rationale: El hiphil de בוא expresa causación; ‘hará venir’ preserva esa causalidad y el mismo régimen preposicional.
- source_word: כָּל הַדָּבָר הָרָע
  english_pob_choice: every evil word
  chosen_spanish: toda la mala palabra
  alternatives_spanish:
  - toda la palabra mala
  - todo el mal anunciado
  lexicon: HALOT
  rationale: Se conserva la simetría lexical con ‘buena palabra’. ‘Mala’ evita cargar de inmediato con una lectura moral en la acción judicial de Yahvé.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - dañina
  - adversa
  lexicon: HALOT
  rationale: ‘Mala’ mantiene el contraste con ‘buena’ y deja abierta la tensión teológica de un juicio adverso sin resolverla en términos moralizantes.
- source_word: עַד הַשְׁמִידוֹ אֹתְכֶם
  english_pob_choice: until he has destroyed you
  chosen_spanish: hasta exterminarlos
  alternatives_spanish:
  - hasta destruirlos
  - hasta acabarlos
  lexicon: HALOT
  rationale: ‘Exterminarlos’ refleja la fuerza total del infinitivo hebreo con sufijo y la gravedad del juicio; el sujeto queda claro por el contexto de Yahvé.
- source_word: מֵעַל
  english_pob_choice: from off
  chosen_spanish: de sobre
  alternatives_spanish:
  - de encima de
  - de sobre la superficie de
  lexicon: HALOT
  rationale: Reproduce la imagen espacial de alejamiento ‘desde arriba/sobre’, sin reducirla a un simple ‘de’.
- source_word: הָאֲדָמָה הַטּוֹבָה הַזֹּאת
  english_pob_choice: this good land
  chosen_spanish: esta buena tierra
  alternatives_spanish:
  - esta tierra buena
  - esta tierra fértil
  lexicon: HALOT
  rationale: ‘Tierra’ es la equivalencia natural de אֲדָמָה en contexto de heredad pactal; ‘buena’ conserva el calificativo del texto.
- source_word: נָתַן לָכֶם
  english_pob_choice: has given to you
  chosen_spanish: les ha dado
  alternatives_spanish:
  - les dio
  - ha dado a ustedes
  lexicon: HALOT
  rationale: El perfecto indica un don ya realizado; ‘les ha dado’ es fluido y fiel al valor completivo.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de juicio y promesa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto y no se oculta tras un título funcional. Esto preserva la continuidad entre la palabra buena cumplida y la palabra mala/judicial anunciada por el mismo Dios.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: רָע aplicado a la acción judicial de Dios
  english_pob_reading: evil word
  chosen_spanish_reading: mala palabra
  alternative_spanish_readings:
  - palabra malvada
  - palabra mala
  - desastre
  rationale: ‘Mala’ conserva el paralelo con ‘buena’ y evita sugerir que Dios actúa moralmente mal; el contexto muestra juicio de pacto, no maldad divina.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it beyond the text'
- issue: דָּבָר en paralelismo con טוב / רע
  english_pob_reading: word
  chosen_spanish_reading: palabra
  alternative_spanish_readings:
  - cosa
  - asunto
  - mensaje
  rationale: Aunque a veces דָּבָר puede significar ‘cosa’, aquí el paralelismo con ‘habló’ favorece ‘palabra’, manteniendo la repetición intencional del texto hebreo.
  doctrine_reference: 'Lexical fidelity principle: retain deliberate Hebrew parallelism where the source makes it salient'
translation_notes:
  revision_awareness: El pasaje sigue de cerca el estado más reciente del audit trail, que ajustó la segunda mitad desde ‘bad word’ hacia ‘evil word’ para reflejar con mayor formalidad הָרָע. En español, se eligió ‘mala palabra’ para preservar el paralelismo con ‘buena palabra’ y, al mismo tiempo, evitar cargar el enunciado con una connotación moral inapropiada para la acción judicial de Yahvé. También se mantuvo la estructura correlativa ‘así como... así...’, y la imagen espacial de עַל / מֵעַל.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה.
  - Se mantiene ‘palabra’ en ambas mitades para reproducir el paralelismo lexical del hebreo.
  - ‘Tierra’ traduce אֲדָמָה en contexto de heredad pactal, no mero suelo.
  - La cláusula final conserva el movimiento espacial de ‘de sobre esta buena tierra’.
  - La nota textual/lexical se ancla solo en ‘palabra mala’ porque ahí aparece la ambigüedad principal en español.
