review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura hebrea, conserva correctamente «Yahvé» para יהוה y mantiene «hijos de Dios» conforme a la revisión inglesa auditada y la nota sobre la corte celestial. Sin embargo, «Asignen» no transmite bien el valor idiomático de הָבוּ en este contexto poético; en español suena administrativo y no como una exhortación cultual/poética a reconocer o atribuir gloria a Yahvé.
  spanish_quality_summary: El español es comprensible, pero «Asignen a Yahvé» resulta poco natural y estilísticamente inadecuado para un salmo. «Atribuyan» preserva mejor el sentido de reconocimiento/adscripción y suena más digno y legible. El resto del versículo es claro y de registro apropiado.
  glossary_alignment: 'Alinea bien con la terminología del proyecto en «Yahvé», «Dios», «gloria» y «fuerza». La principal desalineación está en la decisión para הָבוּ: según la evidencia y la rationale inglesa, debe expresar ‘atribuir/reconocer’, no ‘asignar’.'
  issues:
  - severity: medium
    issue: «Asignen» para הָבוּ es una elección léxica inadecuada
    rationale: Aunque intenta reflejar ‘ascribe’, en español bíblico moderno «asignar» sugiere distribuir o designar administrativamente, no reconocer o atribuir a Dios la gloria que le pertenece. «Atribuyan» representa mejor el hebreo y la rationale documentada.
  revised_spanish_text: Salmo de David. Atribuyan a Yahvé[a], hijos de Dios, atribuyan a Yahvé gloria y fuerza.
  revised_footnotes:
  - marker: a
    text: O «hijos de los poderosos» o «seres celestiales». La frase hebrea probablemente se refiere a miembros de la corte celestial.
    reason: alternative_reading
  revision_rationale: Se reemplaza «Asignen» por «Atribuyan» para reflejar con fidelidad el valor poético e idiomático de הָבוּ y mejorar la naturalidad del español sin alterar la estructura ni las decisiones teológicas documentadas. La nota se conserva, ya que sigue siendo útil para la ambigüedad de בְּנֵי אֵלִים.
