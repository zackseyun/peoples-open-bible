- from: Bendecid al Señor, noches y días; cantad alabanzas y exaltadlo sobremanera por los siglos.
  to: Bendigan al Señor, noches y días; canten alabanzas y exáltenlo sobremanera por siempre.
  rationale: Se ajusta el registro al español neutral latinoamericano con imperativos de tercera persona plural, se suaviza una construcción algo rígida ('cantad alabanzas') y se reemplaza 'por los siglos' por 'por siempre' para mayor claridad general, sin perder el sentido litúrgico ni la fuerza del original griego.
