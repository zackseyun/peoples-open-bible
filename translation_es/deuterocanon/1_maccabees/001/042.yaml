translation:
  language: es
  text: y que cada uno abandonara sus propias costumbres[a]. Y todas las naciones aceptaron la palabra del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus leyes» o «sus costumbres ancestrales». El griego τὰ νόμιμα puede denotar prácticas legal-religiosas habituales, especialmente observancias tradicionales.
    reason: lexical_alternative
  - marker: b
    text: O «la orden del rey» o «el decreto del rey». El griego dice literalmente «la palabra del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκαταλείπειν
  english_pob_choice: abandon
  chosen_spanish: abandonar
  alternatives_spanish:
  - dejar
  - renunciar a
  - abandonar por completo
  lexicon: BDAG
  rationale: El infinitivo expresa una dejación decidida de la práctica propia; «abandonar» comunica mejor esa renuncia coercitiva que un simple «dejar».
- source_word: ἕκαστον
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - todos
  - cada persona
  - cada cual
  lexicon: LSJ
  rationale: El griego es distributivo singular; «cada uno» conserva esa distribución mejor que una forma colectiva.
- source_word: τὰ νόμιμα αὐτοῦ
  english_pob_choice: his own customs
  chosen_spanish: sus propias costumbres
  alternatives_spanish:
  - sus propias leyes
  - sus propias ordenanzas
  - sus costumbres ancestrales
  lexicon: LSJ
  rationale: En este contexto helenístico-judío, νόμιμα puede referirse a prácticas legales y religiosas habituales. «Costumbres» es natural en español y mantiene la amplitud del término sin añadir explícitamente «ancestrales».
- source_word: ἐπεδέξαντο
  english_pob_choice: accepted
  chosen_spanish: aceptaron
  alternatives_spanish:
  - recibieron
  - adoptaron
  - acataron
  lexicon: BDAG
  rationale: El verbo significa recibir o aceptar; «aceptaron» sigue de cerca el sentido básico y deja que el contexto exprese la obediencia implícita al decreto.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todos los gentiles
  lexicon: LSJ
  rationale: Aquí ἔθνη designa ampliamente a los pueblos bajo el decreto real. «Naciones» es la opción más directa y no introduce un contraste más técnico como «gentiles».
- source_word: κατὰ τὸν λόγον τοῦ βασιλέως
  english_pob_choice: the word of the king
  chosen_spanish: la palabra del rey
  alternatives_spanish:
  - la orden del rey
  - el decreto del rey
  - el mandato del rey
  lexicon: BDAG
  rationale: λόγος puede significar palabra, declaración, asunto o mandato. Se mantiene «la palabra del rey» para seguir de cerca el griego, evitando sobreinterpretar el tipo jurídico del edicto.
translation_notes:
  revision_awareness: 'El texto español sigue la lectura del griego de Swete (1909) y conserva la tensión lexical documentada en el audit trail: νόμιμα se rinde con «costumbres» sin cerrar del todo el matiz legal-religioso, y λόγος se conserva como «palabra» con una nota que explicita las alternativas interpretativas de carácter directivo o decretal. No se registran revisiones aplicadas en el historial; se mantiene la solución de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «naciones» para ἔθνη conforme al contexto histórico y al criterio del POB en inglés.
  - Se evita «SEÑOR» u otra máscara, pues no hay aquí el tetragrámaton ni un κύριος divino.
  - La puntuación separa las dos proposiciones como en el griego y mantiene el paralelismo narrativo.
