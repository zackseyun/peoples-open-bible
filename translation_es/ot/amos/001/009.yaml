    changes_summary: Revised 'a whole community of exiles' to 'an entire population of exiles' for closer lexical correspondence to גָּלוּת שְׁלֵמָה ('a complete/entire exile, deportation') while preserving natural English. No other changes needed.
translation:
  language: es
  text: 'Así dice Yahvé: «Por tres transgresiones de Tiro, y por cuatro, no revocaré[a] el castigo, porque entregaron toda una población de exiliados[b] a Edom, y no recordaron un pacto de hermanos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «no lo volveré atrás»; el objeto queda implícito en hebreo, y el sentido es que el juicio anunciado no será revocado.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «una comunidad entera de exiliados» o «un cautiverio completo»; la expresión hebrea subraya un grupo colectivo entregado en bloque.
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «un pacto de hermanos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el SEÑOR
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Es la fórmula profética estándar; se conserva el tono solemne y directo. YHWH se vierte como «Yahvé» según el criterio del proyecto, en vez de ocultarlo con una sustitución litúrgica.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי צֹר וְעַל אַרְבָּעָה
  english_pob_choice: For three transgressions of Tyre, and for four
  chosen_spanish: Por tres transgresiones de Tiro, y por cuatro
  alternatives_spanish:
  - A causa de tres transgresiones de Tiro, y por cuatro
  - Por tres crímenes de Tiro, y por cuatro
  lexicon: HALOT
  rationale: Se preserva la escalera numérica idiomática de Amós. «Transgresiones» refleja la carga moral de פִּשְׁעֵי sin volverla más jurídica o más suave de lo que permite el hebreo.
- source_word: לֹא אֲשִׁיבֶנּוּ
  english_pob_choice: I will not revoke its punishment
  chosen_spanish: no revocaré su castigo
  alternatives_spanish:
  - no lo volveré atrás
  - no me retractaré
  lexicon: HALOT
  rationale: El hebreo es idiomático y deja el objeto implícito; en español conviene explicitar «su castigo» para que el juicio anunciado quede claro, manteniendo la fuerza judicial del texto.
- source_word: הַסְגִּירָם
  english_pob_choice: they delivered up
  chosen_spanish: entregaron
  alternatives_spanish:
  - pusieron en manos de
  - sacrificaron
  lexicon: HALOT
  rationale: El verbo expresa la acción de entregar gente a otra potencia. «Entregaron» conserva la gravedad y resulta natural en español bíblico moderno.
- source_word: גָּלוּת שְׁלֵמָה
  english_pob_choice: an entire population of exiles
  chosen_spanish: una población entera de exiliados
  alternatives_spanish:
  - una comunidad entera de exiliados
  - un cautiverio completo
  lexicon: HALOT
  rationale: Se refleja el carácter colectivo y completo de גָּלוּת שְׁלֵמָה. «Población entera» mantiene la amplitud de la frase sin convertirla en un tecnicismo extraño.
- source_word: לֶאֱדוֹם
  english_pob_choice: to Edom
  chosen_spanish: a Edom
  alternatives_spanish:
  - para Edom
  - sobre Edom
  lexicon: HALOT
  rationale: La preposición española más directa después de «entregaron» es «a», que conserva el valor direccional/dativo del hebreo.
- source_word: וְלֹא זָכְרוּ
  english_pob_choice: and did not remember
  chosen_spanish: y no recordaron
  alternatives_spanish:
  - y no se acordaron de
  - y no tuvieron presente
  lexicon: HALOT
  rationale: «Recordaron» es la equivalencia más simple y fiel para זָכְרוּ. Mantiene la conexión entre memoria y lealtad del pacto sin explicitar más de lo que el hebreo dice.
- source_word: בְּרִית אַחִים
  english_pob_choice: a covenant of brotherhood
  chosen_spanish: un pacto de hermanos
  alternatives_spanish:
  - un pacto fraternal
  - un pacto entre hermanos
  lexicon: HALOT
  rationale: Se conserva la metáfora familiar del hebreo. «Pacto de hermanos» suena más cercano al original que una abstracción como «fraternal», y mantiene la tensión de una alianza basada en vínculo de parentesco.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. El proyecto pide «Yahvé» como forma principal, preservando el nombre del pacto en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido implícito de לֹא אֲשִׁיבֶנּוּ
  english_pob_reading: I will not revoke its punishment
  chosen_spanish_reading: no revocaré su castigo
  alternative_spanish_readings:
  - no lo volveré atrás
  - no lo revocaré
  rationale: En Amós, la fórmula apunta a una sentencia anunciada que no será retirada. La traducción explicita «castigo» para evitar ambigüedad en español, sin perder el sentido judicial del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que afinó la frase de גָּלוּת שְׁלֵמָה hacia «an entire population of exiles». En español se refleja con «una población entera de exiliados» para mantener la correspondencia léxica y el sentido colectivo. También se conserva la decisión revisada de hacer explícito el objeto implícito de לֹא אֲשִׁיבֶנּוּ como referencia al castigo/jucio no revocado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera uniforme para el nombre divino.
  - Se usa «transgresiones» para פִּשְׁעֵי, evitando suavizar el reproche profético.
  - «Exiliados» conserva el sentido colectivo de גָּלוּת sin convertirlo en un término técnico más duro como «cautiverio» en el texto principal.
  - «Pacto de hermanos» preserva la metáfora de parentesco del hebreo y deja abierta la resonancia histórica de una alianza entre pueblos relacionados.
