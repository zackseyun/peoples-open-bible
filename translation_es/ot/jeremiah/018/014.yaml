  glossary_alignment: 'No hay conflictos con la terminología doctrinal global. Las decisiones léxicas clave siguen el rationale documentado: conservar la extrañeza de «aguas extranjeras», mantener «aguas» en plural poético, y no suavizar יִנָּתְשׁוּ a «se secan» o similar. La única mejora importante es usar una formulación más natural para נוֹזְלִים.'
