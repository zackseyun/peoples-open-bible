theological_decisions:
- issue: Whether to render ሚጠት with a more doctrinal term such as 'grace'
  chosen_reading: mercy
  alternative_readings:
  - grace
  - compassion
  rationale: The immediate apocalyptic context concerns vindication and relief for the faithful amid judgment. 'Mercy' best
    preserves that sense while avoiding later Christian doctrinal overtones not demanded by the Ge'ez.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
