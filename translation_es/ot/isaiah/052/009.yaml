translation:
  language: es
  text: ¡Prorrumpan en cantos[a] juntos, ruinas de Jerusalén! Porque Yahvé ha consolado a su pueblo; ha redimido a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Estallen en júbilo, griten de alegría juntos, ruinas de Jerusalén!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּצְחוּ
  english_pob_choice: Break forth
  chosen_spanish: ¡Rompan a cantar[a]!
  alternatives_spanish:
  - ¡Estallen en júbilo!
  - ¡Prorrumpan en canto!
  - ¡Brote su canto!
  lexicon: HALOT
  rationale: El hebreo expresa un imperativo plural de irrumpir súbitamente en sonido o canto. En español, 'rompan a cantar' conserva la idea de irrupción repentina y resulta natural y poético. Se mantiene la opción alternativa en nota porque el campo semántico también admite 'estallar' o 'prorrumpir'.
- source_word: רַנְּנוּ
  english_pob_choice: sing
  chosen_spanish: a cantar
  alternatives_spanish:
  - canten con gozo
  - griten de alegría
  - den voces de júbilo
  lexicon: HALOT
  rationale: רנן expresa júbilo vocal; en este paralelismo, 'a cantar' comunica bien la alabanza gozosa en español y encaja con 'rompan'. La alegría implícita queda reforzada por el contexto y por el tono exclamativo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - en unidad
  - como uno
  lexicon: HALOT
  rationale: '''Juntos'' es el equivalente directo, claro y natural para el adverbio de compañía colectiva.'
- source_word: חָרְב֖וֹת
  english_pob_choice: ruins
  chosen_spanish: ruinas
  alternatives_spanish:
  - lugares desolados
  - parajes devastados
  - ruinas desiertas
  lexicon: HALOT
  rationale: '''Ruinas'' reproduce con concisión la imagen de desolación convocada al canto. Es idiomático y mantiene la personificación poética del texto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre propio divino, siguiendo la política POB de no ocultar el Tetragrama tras una sustitución titulada. 'Yahvé' es la forma establecida en español del proyecto.
- source_word: נִחַם
  english_pob_choice: has comforted
  chosen_spanish: ha consolado
  alternatives_spanish:
  - ha confortado
  - ha tenido compasión de
  - ha dado consuelo a
  lexicon: HALOT
  rationale: El verbo נחם en este contexto apunta a alivio y consuelo para el pueblo afligido. 'Ha consolado' es una equivalencia natural en español y conserva el matiz pastoral sin exagerar.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su propio pueblo
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con naturalidad en español como 'su pueblo'. El artículo indefinido no aparece en el hebreo, así que se evita.
- source_word: גָּאַל
  english_pob_choice: has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - ha rescatado
  - ha reivindicado
  - ha reivindicado como propio
  lexicon: HALOT
  rationale: '''Redimido'' conserva el peso teológico y pactal del verbo גאל. ''Rescatado'' es posible, pero ''redimido'' resulta más cercano al lenguaje bíblico y evita reducir la idea a un simple auxilio.'
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el nombre propio tradicional en español.
theological_decisions:
- issue: Nombre divino del Tetragrama
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente יְהוָה. En la línea del POB, se preserva el nombre divino y no se sustituye por una titulación. 'Yahvé' es la forma española más reconocible y coherente con el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje de redención en גָּאַל
  english_pob_reading: has redeemed Jerusalem
  chosen_spanish_reading: ha redimido a Jerusalén
  alternative_spanish_readings:
  - ha rescatado a Jerusalén
  - ha reclamado a Jerusalén
  rationale: '''Redimido'' mantiene la resonancia de liberación pactal y restauración. No se sustituye por ''rescatado'' porque podría debilitar el trasfondo teológico del verbo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se preservó el imperativo poético intensivo de פִּצְחוּ, el valor jubiloso de רַנְּנוּ, el nombre divino יְהוָה como Yahvé, y el verbo de redención גָּאַל como ''redimido''. No se detectaron revisiones posteriores que exigieran cambios adicionales.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה según la terminología del proyecto.
  - Se eligió 'redimido' para גָּאַל, coherente con el uso bíblico de redención y con el registro del poema.
  - '''Ruinas'' conserva mejor la concisión y la personificación del hebreo que alternativas más explicativas.'
  - La exclamación inicial ayuda a reproducir el tono exhortativo del hebreo.
