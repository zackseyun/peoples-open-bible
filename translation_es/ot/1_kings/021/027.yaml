translation:
  language: es
  text: Y sucedió que, al oír Acab estas palabras, rasgó sus vestidos, se puso cilicio sobre su carne, ayunó, se acostó en cilicio y andaba[a] con paso lento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'andaba en silencio', 'andaba despacio' o 'andaba abatido'. El hebreo sugiere un movimiento contenido y humillado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִשְׁמֹעַ
  english_pob_choice: And it happened, when ... heard
  chosen_spanish: Y sucedió que, al oír...
  alternatives_spanish:
  - Y aconteció que, al oír...
  - Y ocurrió que, cuando oyó...
  lexicon: HALOT
  rationale: Conserva la fórmula narrativa hebrea וַיְהִי sin sonar forzado en español, y al mismo tiempo reproduce el valor temporal de כִשְׁמֹעַ con una construcción natural y digna.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  lexicon: HALOT
  rationale: Aquí דְּבָרִים remite a la declaración profética escuchada por Acab; 'palabras' preserva mejor la fuerza verbal del original que 'cosas'.
- source_word: וַיִּקְרַע בְּגָדָיו
  english_pob_choice: he tore his clothes
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó sus ropas
  - rompió sus vestidos
  lexicon: HALOT
  rationale: '''Vestidos'' es una opción más natural en registro bíblico español para el gesto de duelo, sin perder el sentido de prendas exteriores del hebreo.'
- source_word: וַיָּשֶׂם שַׂק עַל בְּשָׂרוֹ
  english_pob_choice: put sackcloth on his flesh
  chosen_spanish: puso cilicio sobre su carne
  alternatives_spanish:
  - puso saco sobre su carne
  - vistió cilicio sobre su carne
  - puso cilicio contra su piel
  lexicon: HALOT
  rationale: '''Cilicio'' comunica el sentido tradicional de שַׂק en un español bíblico comprensible. ''Sobre su carne'' mantiene la imagen concreta de contacto corporal directo, correspondiente a בְּשָׂרוֹ, sin suavizarla a ''cuerpo''.'
- source_word: וַיָּצֹם
  english_pob_choice: fasted
  chosen_spanish: ayunó
  alternatives_spanish:
  - guardó ayuno
  - se abstuvo de comer
  lexicon: HALOT
  rationale: '''Ayunó'' es el equivalente directo y natural en español para צום.'
- source_word: וַיִּשְׁכַּב בַּשָּׂק
  english_pob_choice: lay in sackcloth
  chosen_spanish: se acostó en cilicio
  alternatives_spanish:
  - se tendió en cilicio
  - yació en cilicio
  lexicon: HALOT
  rationale: Mantiene la postura de abatimiento sin añadir la idea de dormir. 'Se acostó' traduce היטב el verbo de recostarse/ponerse a descansar, y 'en cilicio' conserva el soporte material del acto.
- source_word: וַיְהַלֵּךְ אַט
  english_pob_choice: went about softly
  chosen_spanish: anduvo con lentitud
  alternatives_spanish:
  - anduvo suavemente
  - anduvo despacio
  - se movía con calma
  lexicon: HALOT
  rationale: אַט indica movimiento lento y contenido. 'Con lentitud' expresa bien esa marcha abatida sin decidir entre 'quietamente', 'suavemente' o 'de manera dejecteda' más allá de lo que el hebreo exige.
theological_decisions:
- issue: Naturaleza de la respuesta de Acab
  english_pob_reading: Render the verse as describing outward acts of mourning/humiliation without explicitly judging whether his repentance was sincere.
  chosen_spanish_reading: Describir actos externos de duelo y humillación sin afirmar ni negar en la traducción si hubo arrepentimiento sincero.
  alternative_spanish_readings:
  - Acab se arrepintió de verdad
  - Acab solo hizo duelo externo
  rationale: 'El versículo enumera acciones observables: rasgar vestidos, ponerse cilicio, ayunar, acostarse en cilicio y andar lentamente. No resuelve por sí mismo la cuestión de la sinceridad interior; por eso la traducción evita imponer una conclusión doctrinal.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el criterio auditado del POB en inglés. No se identificaron cambios de revisión aplicables en el paquete fuente; se conservó la tensión interpretativa sobre la respuesta de Acab y se mantuvo el matiz físico de בְּשָׂרוֹ como 'su carne'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''Cilicio'' se usa para שַׂק conforme al valor de duelo/penitencia del contexto.'
  - No se introduce 'Mesías', 'SEÑOR' ni terminología doctrinal ajena al versículo.
  - La nota al pie se ancla en 'anduvo[a]' para reflejar la alternativa semántica de אַט.
