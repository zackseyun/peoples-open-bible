translation:
  language: es
  text: 'Cuando David supo que Saúl estaba tramando en secreto daño contra él[a], dijo a Abiatar el sacerdote[b]: «Trae aquí el efod».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba maquinando daño contra él».
    reason: alternative_reading
  - marker: b
    text: El efod era un objeto sacerdotal asociado con la búsqueda de orientación de Dios en este contexto narrativo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: learned
  chosen_spanish: supo
  alternatives_spanish:
  - se enteró
  - llegó a saber
  - conoció
  lexicon: HALOT
  rationale: El wayyiqtol de ידע marca el momento en que David llega a saber algo en la narración. En español, «supo» conserva la entrada de conocimiento sin sonar tan pesado como una perífrasis más larga.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que David llegó a saber; «que» es la completiva natural en español.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - acerca de él
  - sobre él
  lexicon: HALOT
  rationale: El contexto hostil exige una equivalencia idiomática en español. «Contra él» conserva la dirección adversa del hebreo.
- source_word: מַחֲרִישׁ
  english_pob_choice: was secretly plotting
  chosen_spanish: estaba secretamente tramando
  alternatives_spanish:
  - estaba tramando en secreto
  - estaba maquinando
  - estaba planeando
  lexicon: HALOT
  rationale: El participio hifil de חרש expresa una acción de conspirar o tramar con matiz de secreto. «Secretamente tramando» mantiene esa fuerza y el aspecto continuo.
- source_word: הָרָעָה
  english_pob_choice: harm
  chosen_spanish: daño
  alternatives_spanish:
  - mal
  - desgracia
  lexicon: HALOT
  rationale: Aquí el daño es concreto e ինտencional contra David; «daño» evita cargar el término con una abstracción moral excesiva y refleja bien la amenaza inmediata.
- source_word: אֶל אֶבְיָתָר הַכֹּהֵן
  english_pob_choice: to Abiathar the priest
  chosen_spanish: a Abiatar el sacerdote
  alternatives_spanish:
  - a Abiatar, el sacerdote
  lexicon: HALOT
  rationale: La construcción es simple y reportativa. En español bíblico actual, el orden sin coma es claro y sobrio.
- source_word: הַגִּישָׁה
  english_pob_choice: Bring ... here
  chosen_spanish: Trae aquí
  alternatives_spanish:
  - Acerca aquí
  - Presenta aquí
  lexicon: HALOT
  rationale: El imperativo hifil de נגש pide acercar/presentar el objeto. En habla directa, «Trae aquí» comunica de forma natural la orden.
- source_word: הָאֵפוֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el pectoral
  - la vestidura sacerdotal
  lexicon: HALOT
  rationale: Se conserva el préstamo tradicional «efod» porque designa un objeto sacerdotal específico y el contexto narrativo de consulta a Dios lo presupone.
theological_decisions:
- issue: Sentido de מַחֲרִישׁ הָרָעָה
  english_pob_reading: Saul was secretly plotting harm against David
  chosen_spanish_reading: Saúl estaba secretamente tramando daño contra él
  alternative_spanish_readings:
  - Saúl estaba tramando mal contra él
  - Saúl estaba maquinando daño contra él
  rationale: 'La lectura sigue la nota inglesa: no se suaviza la hostilidad ni se traduce como simple silencio. «Tramando» conserva la idea conspirativa y «daño» refleja el carácter concreto de la amenaza.'
  doctrine_reference: 1 Samuel 23:9; HALOT חרש
- issue: Función del efod en la escena
  english_pob_reading: The ephod was a priestly object associated with seeking guidance from God in this narrative context.
  chosen_spanish_reading: el efod
  alternative_spanish_readings:
  - la vestidura sacerdotal
  - el objeto sacerdotal
  rationale: Se mantiene el término técnico sin explicar dentro del versículo, para no perder la especificidad del objeto y respetar la decisión auditada de transliteración. La función cultual queda implícita y puede aclararse en nota.
  doctrine_reference: 1 Samuel 23:9; uso narrativo del efod para consultar a Dios
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés. La redacción española mantiene el progreso narrativo, la hostilidad implícita en מַחֲרִישׁ הָרָעָה y la especificidad técnica de הָאֵפוֹד, sin expandir el sentido más allá de lo documentado.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el tetragrámaton; aquí no aparece.
  - Se prefirió «efod» como transliteración estable, coherente con la decisión inglesa auditada.
  - «Daño» se mantuvo para reflejar la concreción del peligro, evitando un «mal» demasiado abstracto en español.
  - La puntuación con comillas angulares conserva el discurso directo de manera clara y publicable.
