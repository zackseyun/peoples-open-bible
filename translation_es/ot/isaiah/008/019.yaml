  spanish_quality_summary: El español es claro y natural, pero ‘chirrían’ suena algo mecánico/áspero más que aviar o susurrante; ‘chillan’ o ‘pían’ encaja mejor con el matiz imitativo. Además, la única nota está anclada a ‘espiritistas’, aunque explica sobre todo ‘médiums’; conviene anclar las notas exactamente donde corresponden y preservar ambas alternativas del registro inglés.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: ‘Dios’ es correcto para אֱלֹהָיו; no aparece Yahvé. ‘Médiums’ y ‘espiritistas’ son defendibles para אֹבוֹת / יִדְּעֹנִים, pero debe conservarse la alternativa documentada para אֹבוֹת y la nota sobre la cualidad sonora de הַמְצַפְצְפִים וְהַמַּהְגִּים.'
  issues:
