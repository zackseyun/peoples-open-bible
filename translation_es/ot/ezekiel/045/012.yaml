    rationale: La auditoría inglesa dice explícitamente «Or 'maneh'» para הַמָּנֶה. En español, cualquier nota equivalente debe anclarse en «mina», no en una cifra intermedia de la serie.
  - severity: medium
    issue: Falta concordancia verbal en «veinte siclos, veinticinco siclos y quince siclos será...».
    rationale: 'En español estándar, un sujeto compuesto coordinado exige plural: «serán». Mantener «será» suena gramaticalmente defectuoso aunque refleje de cerca el hebreo singular del predicado nominal.'
  - severity: medium
    issue: «Vuestra mina» no encaja con el objetivo de español neutral latinoamericano.
    rationale: El proyecto pide español neutral y eclesialmente legible; «vuestra» y «vosotros» son marcadamente peninsulares. «Su mina» conserva el sentido normativo para los destinatarios sin localismo.
  revised_spanish_text: Y el siclo será de veinte geras[a]; veinte siclos, veinticinco siclos y quince siclos serán su mina[b].
