review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura causal del hebreo y conserva adecuadamente la acusación doble: no salir al encuentro con provisiones y contratar a Balaam para maldecir. También preserva bien los topónimos Petor y Aram-naharaim con nota cultural apropiada. Sin embargo, hay dos desajustes relevantes: «cuando salían de Egipto» introduce un aspecto imperfectivo no presente en בְּצֵאתְכֶם y suena menos natural que un infinitivo temporal; y «alquiló contra ti a Balaam» no es español idiomático para contratar a una persona, además de romper el orden natural de la frase hostil.'
  spanish_quality_summary: El texto es generalmente claro, pero «alquiló contra ti a Balaam» resulta poco natural y difícil de leer en español eclesial general. «Con pan y con agua» es aceptable, aunque «con pan y agua» suena más natural sin pérdida de sentido. «Cuando salían de Egipto» es gramatical, pero menos fiel y menos elegante que «cuando salieron de Egipto» o «al salir de Egipto». Conviene ajustar a un español más fluido y digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva Balaam, Beor, Petor y Aram-Naharaim. La nota sobre Aram-Naharaim está bien encaminada. La principal corrección léxica es sustituir «alquiló» por «contrató», que en español transmite correctamente שׂכר en este contexto sin perder la idea de pago. También conviene mantener la fuerza adversativa con «contra ti».
  issues:
  - severity: medium
    issue: «alquiló contra ti[a] a Balaam» es poco idiomático en español
    rationale: Aunque שׂכר significa contratar a sueldo, «alquilar» para una persona suena impropio en español moderno. «Contrató a Balaam ... contra ti» conserva el sentido y mejora mucho la legibilidad.
  - severity: medium
    issue: «cuando salían de Egipto» no refleja bien el valor temporal puntual del hebreo
    rationale: בְּצֵאתְכֶם funciona como expresión temporal de salida, mejor representada por «cuando salieron de Egipto» o «al salir de Egipto». El imperfecto «salían» sugiere proceso o repetición no indicada aquí.
  - severity: low
    issue: «con pan y con agua» puede simplificarse
    rationale: La repetición de «con» no es incorrecta, pero «con pan y agua» es más natural en español y sigue representando fielmente los dos sustantivos concretos del hebreo y la revisión inglesa.
  revised_spanish_text: porque no les salieron al encuentro con pan y agua por el camino, cuando salieron de Egipto, y porque contrató a Balaam hijo de Beor, de Petor, de Aram-Naharaim[a], contra ti para maldecirte.
  revised_footnotes:
  - marker: a
    text: Aram-Naharaim es tradicionalmente identificado con Mesopotamia, literalmente «Aram de los Dos Ríos».
    reason: cultural_note
  revision_rationale: Se ajusta «alquiló» a «contrató» por naturalidad y precisión en español; se cambia «cuando salían» por «cuando salieron» para reflejar mejor el valor temporal del hebreo; y se simplifica «con pan y con agua» a «con pan y agua» para mejorar fluidez sin pérdida semántica. También se reubica el marcador de nota para anclarlo directamente al topónimo relevante.
