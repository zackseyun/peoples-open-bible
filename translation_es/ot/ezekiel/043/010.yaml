translation:
  language: es
  text: En cuanto a ti[a], hijo de hombre, declara el templo a la casa de Israel, para que se avergüencen de sus iniquidades; y que midan el plano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la casa'. Aquí el término hebreo se refiere al santuario/templo en la visión de Ezequiel.
    reason: lexical_alternative
  - marker: b
    text: O 'el patrón' o 'el diseño'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Mantiene el vocativo fijo de Ezequiel y conserva la continuidad literaria del libro. 'Hijo de hombre' es la forma más transparente y tradicionalmente reconocible en español para este uso profético.
- source_word: הַגֵּד
  english_pob_choice: declare
  chosen_spanish: declara
  alternatives_spanish:
  - di
  - haz saber
  - proclama
  lexicon: HALOT
  rationale: El imperativo pide una comunicación pública y solemne. 'Declara' preserva el registro profético sin sonar tan arcaico como 'proclama' ni tan débil como 'di'.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión colectiva pactal del hebreo. 'Casa de Israel' refleja mejor el fraseo fuente que una explicación más interpretativa.
- source_word: הַבַּיִת
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - la casa
  lexicon: HALOT
  rationale: Aunque literalmente dice 'la casa', en este contexto de visión se refiere al santuario/templo. 'Templo' comunica el referente con claridad en español y sigue la decisión auditada en inglés.
- source_word: וְיִכָּלְמוּ
  english_pob_choice: so that they may be ashamed
  chosen_spanish: para que se avergüencen
  alternatives_spanish:
  - y se avergonzarán
  - para que sientan vergüenza
  lexicon: HALOT
  rationale: La forma verbal tras el imperativo funciona mejor como finalidad o resultado. 'Para que se avergüencen' preserva esa fuerza y evita convertirlo en mera coordinación futura.
- source_word: מֵעֲוֺנוֹתֵיהֶם
  english_pob_choice: of their iniquities
  chosen_spanish: de sus iniquidades
  alternatives_spanish:
  - de sus pecados
  - de su culpa
  lexicon: HALOT
  rationale: '''Iniquidades'' conserva el peso moral y jurídico del término hebreo עָוֹן mejor que el más general ''pecados''.'
- source_word: וּמָדְדוּ
  english_pob_choice: and let them measure
  chosen_spanish: y midan
  alternatives_spanish:
  - y que midan
  - y medirán
  lexicon: HALOT
  rationale: En español, la forma de mandato/jussivo se expresa con naturalidad mediante el subjuntivo exhortativo. 'Y midan' mantiene el valor de continuación imperativa sin añadir más de lo que el hebreo exige.
- source_word: תָּכְנִית
  english_pob_choice: the plan
  chosen_spanish: el diseño
  alternatives_spanish:
  - el plan
  - el patrón
  lexicon: HALOT
  rationale: El término apunta al trazado o disposición arquitectónica del templo. 'Diseño' expresa bien esa idea en español y evita la ambigüedad de 'plan', que puede sonar demasiado abstracto.
theological_decisions:
- issue: Referente de 'la casa' en la visión del templo
  english_pob_reading: Rendered as 'the temple' rather than the more literal 'the house.'
  chosen_spanish_reading: Se traduce como 'el templo' dentro de la cláusula 'declara el templo a la casa de Israel'.
  alternative_spanish_readings:
  - declara la casa a la casa de Israel
  - declara la casa de Israel el templo
  rationale: En Ezequiel 40–43, 'la casa' designa el santuario visionario. Traducirlo como 'templo' evita ambigüedad en español y sigue la lectura contextual auditada, sin introducir contenido doctrinal ajeno.
  doctrine_reference: Filología contextual; coherencia con la visión de Ezequiel 40–43
- issue: Fuerza de las cláusulas verbales posteriores al imperativo
  english_pob_reading: 'Read as purpose/exhortation: ''so that they may be ashamed ... and let them measure.'''
  chosen_spanish_reading: 'Se entiende como finalidad: ''para que se avergüencen ... y midan.'''
  alternative_spanish_readings:
  - y se avergonzarán ... y medirán
  - para que se avergüencen ... y que midan
  rationale: La secuencia verbal después del imperativo expresa mejor un efecto buscado que una simple coordinación futura. La traducción conserva el llamado profético a reconocer la culpa y atender cuidadosamente el diseño del templo.
  doctrine_reference: Sintaxis hebrea; llamado profético a la responsabilidad y al arrepentimiento
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reordenó ''the temple'' y ''to the house of Israel'' para reflejar mejor el hebreo y mejorar la naturalidad. La versión española sigue esa misma lógica sintáctica: ''declara el templo a la casa de Israel''. No se identificaron otros cambios sustantivos en el audit trail.'
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' por consistencia con el término pactal del hebreo.
  - Se reserva 'templo' para el referente visionario de הַבַּיִת en este contexto.
  - Se usa 'iniquidades' para conservar el peso moral de עָוֹן.
  - Se emplea subjuntivo exhortativo ('midan') para reflejar el valor jussivo del hebreo.
