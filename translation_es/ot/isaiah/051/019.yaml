  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «consolará», «espada» y el mantenimiento de «dos cosas» son adecuadas. «Desolación» para הַשֹּׁד es aceptable, aunque «devastación» sería más cercano al inglés POB; no es un error grave. El problema principal es de anclaje y función de notas, no de glosario.
