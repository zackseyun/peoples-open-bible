translation:
  language: es
  text: y los dos serán una sola carne. Así que ya no son dos[a], sino una sola carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y los dos serán en una sola carne».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσονται
  english_pob_choice: will become
  chosen_spanish: serán
  alternatives_spanish:
  - llegarán a ser
  - se convertirán en
  lexicon: BDAG
  rationale: En español, «serán» puede expresar el resultado de la unión sin añadir un verbo más interpretativo. Mantiene la fuerza del futuro y deja visible que el griego usa εἰμί con εἰς + acusativo de resultado.
- source_word: οἱ δύο
  english_pob_choice: the two
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  lexicon: BDAG
  rationale: «Los dos» conserva la dualidad explícita del griego y armoniza con el contraste posterior «ya no son dos».
- source_word: εἰς σάρκα μίαν
  english_pob_choice: one flesh
  chosen_spanish: una sola carne
  alternatives_spanish:
  - una carne
  - en una sola carne
  lexicon: BDAG
  rationale: «Una sola carne» mantiene la expresión bíblica estable y su vínculo intertextual con Génesis. Se omite «en» en el cuerpo principal porque en español suena más natural y no debe borrar el matiz de resultado, que se puede notar en la decisión lexical.
- source_word: σάρκα / σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: BDAG
  rationale: «Carne» preserva el sentido literal y la conexión bíblica sin convertirla en «naturaleza humana», que aquí iría más allá del alcance inmediato del texto.
- source_word: ὥστε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - de modo que
  lexicon: BDAG
  rationale: «Así que» expresa bien la inferencia/resultante con un registro natural y digno en español.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no son más
  - no siguen siendo
  lexicon: BDAG
  rationale: «Ya no» comunica la cesación de un estado previo con naturalidad en español y conserva la lectura inferencial del pasaje.
- source_word: ἀλλὰ μία σάρξ
  english_pob_choice: but one flesh
  chosen_spanish: sino una sola carne
  alternatives_spanish:
  - pero una sola carne
  - mas una sola carne
  lexicon: BDAG
  rationale: Tras una negación previa, «sino» es la correlación natural en español. «Una sola carne» mantiene la frase fija y evita una expansión explicativa.
theological_decisions:
- issue: Sentido teológico de «una sola carne» en la cita de Génesis
  english_pob_reading: Retain the covenantal-marital expression 'one flesh' without interpretive expansion.
  chosen_spanish_reading: Conservar «una sola carne» sin redefinirla ni reducirla a una sola dimensión.
  alternative_spanish_readings:
  - un solo cuerpo
  - una unión sexual
  - una sola persona
  rationale: El texto de Jesús cita una fórmula bíblica cargada de sentido antropológico y matrimonial, pero no la explica exhaustivamente. La traducción debe preservar esa amplitud y la tensión teológica documentada, no resolverla con una glosa interpretativa.
  doctrine_reference: Mantener la tensión teológica; guía sobre σάρξ
- issue: Relación entre la secuencia causal y la conclusión
  english_pob_reading: So they are no longer two, but one flesh.
  chosen_spanish_reading: Así que ya no son dos, sino una sola carne.
  alternative_spanish_readings:
  - por tanto ya no son dos, sino una sola carne
  - de modo que ya no son dos, sino una sola carne
  rationale: La cláusula final funciona como conclusión de la afirmación precedente. «Así que» y «ya no» conservan el movimiento lógico sin añadir explicación doctrinal extra.
  doctrine_reference: Lectura inferencial del ὥστε
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y coincide con la decisión auditada del POB inglés de conservar la expresión bíblica fija «one flesh». No se introdujeron cambios de sentido respecto al último pase revisado; la única adaptación importante es la formulación española natural de la relación resultante en el primer hemistiquio.
  spanish_consistency_notes:
  - Se mantiene «carne» en ambos miembros para conservar la repetición enfática del griego.
  - «Los dos» y «ya no son dos» preservan la dualidad explícita del original.
  - Se evitó «Cristo», «Señor» o terminología doctrinal ajena al versículo.
  - La nota al pie solo marca la alternativa literal de εἰς, sin sobreinterpretar el resultado matrimonial.
