revisions:
- from: ¡Cómo podría uno perseguir a mil, y dos poner en fuga a diez mil, si no fuera porque su Roca los vendió, y Yahvé los entregó[a]?
  to: ¿Cómo podría uno perseguir a mil, y dos poner en fuga a diez mil, si no fuera porque su Roca los vendió, y Yahvé los entregó[a]?
  rationale: Se ajusta la puntuación para expresar mejor la pregunta retórica en español y se reemplaza la nota por una alternativa léxica real y fiel al expediente, reflejando el sentido de «had delivered them over».
