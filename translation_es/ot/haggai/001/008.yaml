translation:
  language: es
  text: Suban[a] a los montes, traigan madera y construyan la casa[b], para que yo me complazca en ella y sea glorificado[c], dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al monte» o «a la región montañosa». El hebreo הָהָר puede referirse a un monte, una colina o una zona montañosa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; el hebreo dice «la casa».
    reason: lexical_alternative
  - marker: c
    text: O «y yo seré honrado». El verbo hebreo puede significar tanto «ser glorificado» como «ser honrado».
    reason: alternative_reading
lexical_decisions:
- source_word: עֲלוּ
  english_pob_choice: Go up
  chosen_spanish: Suban
  alternatives_spanish:
  - Suban hacia arriba
  - Asciendan
  lexicon: HALOT
  rationale: El imperativo plural de עלה pide una orden directa. En español, "suban" conserva el movimiento ascendente y suena natural y digno.
- source_word: הָהָר
  english_pob_choice: into the hills
  chosen_spanish: al monte
  alternatives_spanish:
  - a los montes
  - a la montaña
  - a la región montañosa
  lexicon: HALOT
  rationale: הָהָר puede referirse a monte, colina o región montañosa. "Al monte" mantiene la cercanía al hebreo y funciona bien en este contexto de obtener madera.
- source_word: וַהֲבֵאתֶם עֵץ
  english_pob_choice: bring wood
  chosen_spanish: traigan madera
  alternatives_spanish:
  - traigan madera aserrada
  - traigan leña
  - traigan madera para construir
  lexicon: HALOT
  rationale: עֵץ aquí funciona como material/madera. "Madera" es natural en español y preserva la amplitud del término sin especificar más de lo que el hebreo dice.
- source_word: וּבְנוּ
  english_pob_choice: and build
  chosen_spanish: y construyan
  alternatives_spanish:
  - y edifiquen
  - y levanten
  lexicon: HALOT
  rationale: בנה en imperativo plural se traduce bien por "construyan". "Edifiquen" sería posible, pero "construyan" es más transparente para el lector moderno.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente "casa". Aunque el referente es el templo, conservar "casa" respeta el idiomático del hebreo y evita expandir interpretativamente el texto.
- source_word: וְאֶרְצֶה בוֹ
  english_pob_choice: so that I may take pleasure in it
  chosen_spanish: para que yo me complazca en ella
  alternatives_spanish:
  - para que yo me agrade en ella
  - y me complazca en ella
  lexicon: HALOT
  rationale: רצה en qal expresa complacencia o aceptación favorable. En español, "me complazca" conserva el matiz de agrado/divino favor. El pronombre femenino singular concuerda con "la casa".
- source_word: וְאֶכָּבֵד
  english_pob_choice: and be glorified
  chosen_spanish: y sea glorificado
  alternatives_spanish:
  - y sea honrado
  - y reciba gloria
  lexicon: HALOT
  rationale: El nifal de כבד admite "ser glorificado" o "ser honrado". "Sea glorificado" mantiene el peso teológico del verbo y el paralelismo con la presencia divina en el templo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención doctrinal del proyecto para el nombre divino: transliterar יְהוָה como "Yahvé" en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. La política del proyecto pide verterlo como el nombre propio divino, no como un sustituto titulado. "Yahvé" es la forma elegida para el español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia de הַבָּיִת
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: Aunque el referente contextual es el templo, el hebreo dice literalmente "la casa". Mantener la expresión preserva la tensión lexical y el lenguaje del pacto sin perder inteligibilidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Valor de וְאֶרְצֶה בּוֹ
  english_pob_reading: so that I may take pleasure in it
  chosen_spanish_reading: para que yo me complazca en ella
  alternative_spanish_readings:
  - para que yo me agrade en ella
  - para que la acepte favorablemente
  rationale: El verbo רצה puede expresar complacencia o aceptación favorable. La forma elegida conserva esa ambivalencia sin forzar una interpretación más específica que la del hebreo.
  doctrine_reference: HALOT, רצה
translation_notes:
  revision_awareness: Coincide con la última revisión marcada como sin cambios; no se detectaron revisiones aplicadas ni divergencias relevantes respecto del texto auditado en inglés.
  spanish_consistency_notes:
  - 'Se mantuvo el tratamiento del Tetragrámaton como nombre propio divino: Yahvé.'
  - Se conservó «la casa» para הַבָּיִת, con nota aclaratoria del referente contextual.
  - Se preservó la ambigüedad de כבד en nifal con «sea glorificado», dejando abierta la alternativa «ser honrado».
  - El pronombre en «en ella» concuerda con «la casa», evitando una reinterpretación del referente.
