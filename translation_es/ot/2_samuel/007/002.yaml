  glossary_alignment: 'No hay conflictos con la terminología del proyecto: «Dios» es correcto para הָאֱלֹהִים, y no aparecen términos sensibles como Yahvé/Mesías/espíritu/esclavo. La decisión «Natán» y «arca de Dios» se ajusta bien. El punto léxico a reparar es יְרִיעָה: mejor reflejarlo como cortina/cortinaje/lona de tienda con una locución locativa más fiel que «entre cortinas».'
