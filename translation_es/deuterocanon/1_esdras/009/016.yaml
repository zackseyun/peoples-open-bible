translation:
  language: es
  text: Y Esdras el sacerdote seleccionó para sí hombres, jefes de sus casas paternas, todos designados por su nombre, y se congregaron el primer día[a] del décimo mes para examinar el asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en la luna nueva del décimo mes», es decir, en el primer día del mes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπελέξατο
  english_pob_choice: selected for himself
  chosen_spanish: seleccionó para sí
  alternatives_spanish:
  - eligió para sí
  - escogió para sí
  - seleccionó
  lexicon: BDAG
  rationale: El medio griego sugiere una acción hecha para su propio propósito; «seleccionó para sí» conserva ese matiz sin sonar forzado en español.
- source_word: ἄνδρας ἡγουμένους
  english_pob_choice: men, heads
  chosen_spanish: hombres, jefes
  alternatives_spanish:
  - varones, cabezas
  - hombres dirigentes
  - hombres principales
  lexicon: BDAG
  rationale: Se conserva el masculino explícito de ἄνδρας y el sentido administrativo de ἡγουμένους como personas con autoridad sobre grupos familiares.
- source_word: τῶν πατριῶν αὐτῶν
  english_pob_choice: of their fathers’ houses
  chosen_spanish: de sus casas paternas
  alternatives_spanish:
  - de sus familias paternas
  - de sus linajes
  - de sus casas de padres
  lexicon: LSJ
  rationale: «Casas paternas» refleja la estructura de parentesco del griego y mantiene la imagen genealógica sin sustituirla por un término más general como «clanes».
- source_word: πάντας κατ’ ὄνομα
  english_pob_choice: all of them designated by name
  chosen_spanish: todos designados por nombre
  alternatives_spanish:
  - todos por nombre
  - cada uno por nombre
  - todos nombrados individualmente
  lexicon: BDAG
  rationale: La frase indica una selección formal y registrada; «designados por nombre» conserva ese valor administrativo mejor que el simple «por nombre».
- source_word: συνεκλείσθησαν
  english_pob_choice: they convened
  chosen_spanish: se congregaron
  alternatives_spanish:
  - se reunieron
  - se juntaron
  - se convocaron
  lexicon: LSJ
  rationale: En este contexto procesal, el verbo expresa reunión conjunta para deliberación; «se congregaron» comunica ese sentido formal sin introducir la imagen literal de encierro.
- source_word: τῇ νουμηνίᾳ
  english_pob_choice: on the first day
  chosen_spanish: el primer día
  alternatives_spanish:
  - en la luna nueva
  - en el día de luna nueva
  - el día primero
  lexicon: LSJ
  rationale: «Primer día» expresa con claridad el valor calendárico de νουμηνία, que aquí funciona como el día inicial del mes.
- source_word: τοῦ μηνὸς τοῦ δεκάτου
  english_pob_choice: of the tenth month
  chosen_spanish: del décimo mes
  alternatives_spanish:
  - del mes décimo
  - del mes diez
  lexicon: LSJ
  rationale: La referencia temporal se mantiene de modo directo y natural en español.
- source_word: ἐτάσαι
  english_pob_choice: to examine
  chosen_spanish: para examinar
  alternatives_spanish:
  - para investigar
  - para inquirir
  - para revisar
  lexicon: BDAG
  rationale: El infinitivo de propósito indica una revisión formal del caso; «examinar» preserva bien ese matiz judicial/administrativo.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - el caso
  - la cuestión
  - el hecho
  lexicon: BDAG
  rationale: «Asunto» es una forma natural en español y conserva la amplitud semántica del término griego.
theological_decisions:
- issue: Lenguaje administrativo masculino
  english_pob_reading: men, heads of their fathers’ houses
  chosen_spanish_reading: hombres, jefes de sus casas paternas
  alternative_spanish_readings:
  - líderes de sus familias
  - cabezas de familia
  rationale: El griego usa ἄνδρας de forma explícita y una estructura de parentesco paterna; se preserva ese lenguaje sin neutralizarlo, porque la escena trata de representantes masculinos en un proceso genealógico-jurídico.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Valor calendárico de νουμηνία
  english_pob_reading: on the first day of the tenth month
  chosen_spanish_reading: el primer día del décimo mes
  alternative_spanish_readings:
  - en la luna nueva del décimo mes
  - en el día de luna nueva del décimo mes
  rationale: La lectura prioriza la claridad idiomática en español para el día inicial del mes; el sentido más literal queda implícito en el término calendárico y puede anotarse si fuese necesario.
  doctrine_reference: DOCTRINE.md §6 Readable modern English, not archaic or academic
translation_notes:
  revision_awareness: La redacción sigue de cerca la estructura apposicional del griego («hombres, jefes de sus casas paternas») y adopta la revisión que añadió comas para reflejar esa relación. Se evita la nota sobre νουμηνία porque en este caso no se ancla ningún marcador en el texto final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Mesías» como norma general del proyecto, pero este versículo no los contiene.
  - «Esdras» se conserva como forma española estándar del nombre propio.
  - Se prefirió «asunto» por ser natural y suficientemente amplio para τὸ πρᾶγμα.
  - La puntuación con comas reproduce la aposición griega y mejora la legibilidad en español.
