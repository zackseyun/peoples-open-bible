theological_decisions:
- issue: Nature of the supernatural phenomena described by φάσματα
  chosen_reading: Render as 'apparitions' without deciding whether the text implies objective demonic beings or fear-induced visions.
  alternative_readings:
  - phantoms
  - ghosts
  - visions
  rationale: The verse depicts terrifying manifestations but does not require a precise metaphysical explanation. The translation preserves the eerie ambiguity rather than importing a doctrinal claim about what these entities were.
  doctrine_reference: Preserve theological tension rather than resolve it.
