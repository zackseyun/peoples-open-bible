translation:
  language: es
  text: Y Joab hijo de Seruía estaba al mando del ejército, y Josafat hijo de Ahilud era secretario[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cronista» o «registrador»; el término hebreo designa a un funcionario real responsable de llevar registros y comunicar asuntos al rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹאָב
  english_pob_choice: And Joab
  chosen_spanish: Y Joab
  alternatives_spanish:
  - Ahora Joab
  - Joab
  lexicon: HALOT
  rationale: El prefijo conjuntivo וְ se conserva con «Y» para mantener el tono de lista administrativa. El nombre propio se translitera como «Joab».
- source_word: בֶּן צְרוּיָה
  english_pob_choice: son of Zeruiah
  chosen_spanish: hijo de Seruia
  alternatives_spanish:
  - el hijo de Seruia
  lexicon: HALOT
  rationale: La construcción genealógica se reproduce de forma natural en español con «hijo de». Se usa «Seruia» como transliteración habitual del nombre propio.
- source_word: עַל הַצָּבָא
  english_pob_choice: was over the army
  chosen_spanish: estaba sobre el ejército
  alternatives_spanish:
  - era comandante del ejército
  - estaba al mando del ejército
  lexicon: HALOT
  rationale: La preposición עַל con un oficial señala autoridad sobre una esfera; «estaba sobre el ejército» preserva con transparencia esa estructura. «Ejército» comunica bien el referente militar de צָבָא en este contexto.
- source_word: וִ/יהוֹשָׁפָט
  english_pob_choice: and Jehoshaphat
  chosen_spanish: y Josafat
  alternatives_spanish:
  - Josafat
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio en forma española común «Josafat» y la conjunción coordinante para continuar la enumeración.
- source_word: בֶּן אֲחִילוּד
  english_pob_choice: son of Ahilud
  chosen_spanish: hijo de Ahilud
  alternatives_spanish:
  - el hijo de Ahilud
  lexicon: HALOT
  rationale: Se conserva la relación filial de manera directa y formal, sin añadir artículo innecesario.
- source_word: מַזְכִּיר
  english_pob_choice: recorder
  chosen_spanish: cronista
  alternatives_spanish:
  - secretario
  - registrador
  lexicon: HALOT
  rationale: El término administrativo hebreo designa a un funcionario real encargado de registrar y presentar asuntos ante el rey. En español, «cronista» expresa mejor la función de registro oficial sin reducirla a una secretaría moderna; se deja visible la posible variación en la nota.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece explícitamente en el texto español en «ejército[a]». Se mantuvo la lectura fuente-auditable del verso sin introducir cambios doctrinales ni paraphrase innecesaria.'
  spanish_consistency_notes:
  - 'Se unificó la transliteración de nombres propios en una forma natural para el español: Seruia, Josafat.'
  - Se preservó la estructura enumerativa de cargos y oficios propia del hebreo.
  - La nota de pie de página está anclada exactamente en el sintagma con la ambigüedad léxica del término מַזְכִּיר.
