translation:
  language: es
  text: Los pensamientos del rey eran más regios[a] y más libres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más dignos de un rey». «Más regios» traduce el comparativo griego y conserva, en la medida de lo posible, el vínculo retórico entre «rey» y el adjetivo derivado de «rey».
    reason: lexical_alternative
  - marker: b
    text: O «más independientes». El comparativo griego ἐλευθερώτεροι enfatiza mayor libertad o independencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλέως
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - de un rey
  - del monarca
  lexicon: LSJ
  rationale: 'El genitivo singular indica posesión o pertenencia: los λογισμοί pertenecen al rey. «Del rey» es natural en español y conserva la referencia definida del contexto.'
- source_word: λογισμοὶ
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamientos
  - consideraciones
  - cálculos
  lexicon: LSJ
  rationale: El término puede abarcar pensamientos, razonamientos o cálculos. «Pensamientos» comunica con claridad el contenido interior sin cargar de tecnicismo el pasaje.
- source_word: βασιλικώτεροι
  english_pob_choice: more royal
  chosen_spanish: más reales
  alternatives_spanish:
  - más regios
  - más dignos de rey
  - más propios de un rey
  lexicon: LSJ
  rationale: El comparativo de βασιλικός conserva el enlace retórico con βασιλεύς. En español, «real» puede expresar lo relativo al rey; «regio» sería también posible, pero «más reales» mantiene la brevedad y la relación léxica con «rey».
- source_word: ἐλευθερώτεροι
  english_pob_choice: more free
  chosen_spanish: más libres
  alternatives_spanish:
  - más libres aún
  - más independientes
  - más libres de constricción
  lexicon: LSJ
  rationale: El comparativo de ἐλεύθερος enfatiza mayor libertad o independencia. «Más libres» conserva el paralelo con el otro comparativo y su fuerza literal.
translation_notes:
  revision_awareness: 'El texto griego presenta una construcción breve y paralelística: «los pensamientos del rey» + dos comparativos coordinados. La versión inglesa del POB osciló entre «kingly» y «royal»; aquí se optó por «reales» para mantener la relación visible con «rey», sin perder naturalidad en español. Se conservó el segundo comparativo como «más libres», siguiendo de cerca ἐλευθερώτεροι.'
  spanish_consistency_notes:
  - Se usa «rey» en lugar de «monarca» para mantener el vínculo léxico con βασιλεύς y el juego retórico del verso.
  - Se prefirió una estructura adjetival simple en español para reproducir el paralelismo del griego.
  - No se introdujeron términos teológicos porque el versículo no los contiene explícitamente.
