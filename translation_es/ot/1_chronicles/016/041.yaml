base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/016/041.yaml
  text: And with them were Heman and Jeduthun and the rest who were chosen[a], who were designated by name to give thanks to Yahweh[b], for his steadfast love endures forever.
  footnotes:
