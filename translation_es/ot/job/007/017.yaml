translation:
  language: es
  text: ¿Qué es el hombre[a], para que lo hagas tan importante[b], y para que pongas tu corazón en él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mortal» o «ser humano». אֱנוֹשׁ es un singular que subraya la fragilidad de la humanidad; compárese Salmo 8:4.
    reason: cross_reference
  - marker: b
    text: O «lo engrandezcas», «lo magnifiques» o «lo hagas grande». El hebreo usa el verbo גדל en piel, con el sentido de hacer grande o engrandecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué es
  alternatives_spanish:
  - ¿Qué
  - ¿Cuál es
  - ¿Qué es lo que
  lexicon: HALOT
  rationale: La interrogación hebrea abre una pregunta retórica; «¿Qué es» es natural en español y conserva la fuerza directa del original sin añadir paráfrasis.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - el humano
  - la humanidad
  lexicon: HALOT
  rationale: אֱנוֹשׁ señala humanidad mortal y singular representativa. «El hombre» mantiene ese singular genérico y la resonancia literaria con el paralelismo bíblico, sin convertirlo en plural abstracto.
- source_word: תְגַדְּלֶנּוּ
  english_pob_choice: you make so much of him
  chosen_spanish: lo engrandezcas
  alternatives_spanish:
  - lo magnifiques
  - lo hagas grande
  - lo exaltes
  lexicon: HALOT
  rationale: El piel de גדל expresa hacer grande/engrandecer. «Engrandezcas» conserva el valor léxico básico y resulta más fiel y sobrio en español que una expansión idiomática como «hacer mucho de él».
- source_word: תָשִׁית
  english_pob_choice: you set
  chosen_spanish: pongas
  alternatives_spanish:
  - sometas
  - coloques
  - fijes
  lexicon: HALOT
  rationale: שׂים significa poner/colocar/poner la atención en. «Pongas» es la forma más natural para reproducir la construcción verbal del hebreo en español.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu atención
  lexicon: HALOT
  rationale: Se mantiene «corazón» porque el hebreo usa el órgano como sede de atención y disposición; así se preserva la imagen antropomórfica y poética.
theological_decisions:
- issue: Renderizado singular representativo de אֱנוֹשׁ
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el ser humano
  - la humanidad
  rationale: El hebreo usa un singular masculino con valor representativo. «El hombre» conserva esa forma singular y la correspondencia con el eco bíblico al que alude la POB inglesa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Lenguaje antropomórfico del «corazón» divino
  english_pob_reading: set your heart on him
  chosen_spanish_reading: pongas en él tu corazón
  alternative_spanish_readings:
  - pongas tu atención en él
  - lo tengas presente
  rationale: La frase hebrea habla literalmente del «corazón» de Dios. Mantenerlo evita diluir la imagen y respeta el carácter poético y antropomórfico del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa concuerdan estrechamente; no se registran revisiones aplicadas en la fuente auditada. La versión española sigue esa lectura estable, manteniendo la metáfora del «corazón» y el singular representativo de אֱנוֹשׁ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantiene «hombre» en sentido genérico singular, coherente con el valor representativo del hebreo.
  - Se preserva «corazón» para no neutralizar la antropomorfía del original.
  - La puntuación reproduce una pregunta retórica con dos miembros paralelos, acorde con el hebreo.
