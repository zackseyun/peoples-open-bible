translation:
  language: es
  text: 'Al tercer día, José les dijo[a]: «Hagan esto y vivan, porque yo temo a Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hagan esto, y vivirán»; el hebreo puede expresar tanto un mandato directo seguido de su consecuencia como un resultado implícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  lexicon: HALOT
  rationale: El wayyiqtol de אמר introduce habla directa; en español, «les dijo» reproduce con naturalidad la función narrativa y el destinatario indicado por אֲלֵהֶם.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El sufijo pronominal marca el complemento indirecto; «les» evita pesadez y mantiene el referente plural.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: On the third day
  chosen_spanish: Al tercer día
  alternatives_spanish:
  - En el tercer día
  lexicon: HALOT
  rationale: La expresión temporal hebrea se expresa de forma idiomática en español como «Al tercer día».
- source_word: זֹאת עֲשׂוּ
  english_pob_choice: Do this
  chosen_spanish: Hagan esto
  alternatives_spanish:
  - Haced esto
  - Hagan esta cosa
  lexicon: HALOT
  rationale: El demostrativo con imperativo se vierte de manera directa y natural; el plural imperativo español mantiene la fuerza del mandato sin añadir elementos no presentes.
- source_word: וִחְיוּ
  english_pob_choice: and live
  chosen_spanish: y vivan
  alternatives_spanish:
  - y vivirán
  - para que vivan
  lexicon: HALOT
  rationale: El hebreo compacto permite un valor consecuencial; «y vivan» conserva la brevedad y deja abierta la relación de resultado que la nota inglesa documenta.
- source_word: אֶת הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: HALOT
  rationale: 'En esta confesión monoteísta, הָאֱלֹהִים refiere al verdadero Dios; en español, con el verbo «temer», el objeto se expresa naturalmente con preposición: «a Dios».'
- source_word: אֲנִי יָרֵא
  english_pob_choice: for I fear
  chosen_spanish: porque yo temo
  alternatives_spanish:
  - pues yo temo
  - yo temo
  lexicon: HALOT
  rationale: El participio predicativo con pronombre explícito expresa la disposición reverente de José; «porque yo temo» conserva la razón dada por José para su trato justo.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José el patriarca
  lexicon: HALOT
  rationale: Nombre propio en español bíblico estándar.
theological_decisions:
- issue: Sentido de «temo a Dios» en el contexto narrativo
  english_pob_reading: Joseph appeals to his reverence for the one true God as the basis for his just treatment of his brothers.
  chosen_spanish_reading: José apela a su reverencia por el único Dios verdadero como base de su trato justo hacia sus hermanos.
  alternative_spanish_readings:
  - José expresa un temor genérico a una deidad en contexto egipcio.
  - José afirma simplemente que es religioso.
  rationale: La narrativa de Génesis presenta a José como alguien que sirve al Dios de sus padres; «temo a Dios» conserva esa fuerza teológica sin suavizarla ni reinterpretarla.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto principal.
  spanish_consistency_notes:
  - Se usa «José» para el nombre propio, según la convención bíblica en español.
  - Se mantiene «Dios» con mayúscula por la referencia al Dios verdadero.
  - Se evita «SEÑOR» porque el hebreo aquí dice הָאֱלֹהִים, no el tetragrámaton.
  - La sintaxis española conserva la concisión del hebreo sin añadir explicaciones no presentes en el verso.
