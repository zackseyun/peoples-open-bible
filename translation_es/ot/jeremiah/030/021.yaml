translation:
  language: es
  text: Su gobernante[a] será uno de ellos[b], y su gobernador saldrá de en medio de su pueblo. Yo lo haré acercarse, y él se acercará a mí, porque ¿quién es este que ha comprometido su corazón para acercarse a mí?[c] —declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su noble». El hebreo puede denotar una figura prominente, poderosa o noble; aquí se entiende mejor como un líder del pueblo.
    reason: lexical_alternative
  - marker: b
    text: O «de entre ellos». La expresión indica que el líder surge del mismo pueblo.
    reason: lexical_alternative
  - marker: c
    text: 'También: «¿quién es este que ha osado en su corazón acercarse a mí?». El hebreo expresa literalmente la idea de haber empeñado o comprometido el corazón.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַדִּירוֹ
  english_pob_choice: his ruler
  chosen_spanish: su soberano
  alternatives_spanish:
  - su noble
  - su líder
  - su gobernante
  lexicon: HALOT
  rationale: אַדִּיר puede significar un personaje prominente, poderoso o noble. En paralelo con el participio que sigue, la idea de una figura de autoridad es clara; «soberano» conserva la dignidad y el peso político sin reducirlo a un simple adjetivo.
- source_word: מִמֶּנּוּ
  english_pob_choice: one of them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de él
  - de entre ellos mismos
  - saldrá de su propio pueblo
  lexicon: HALOT
  rationale: La expresión indica origen dentro del propio grupo. En español, «de entre ellos» comunica mejor esa procedencia colectiva que un literal «de él», que podría sonar ambiguo.
- source_word: מֹשְׁלוֹ
  english_pob_choice: his governor
  chosen_spanish: su gobernador
  alternatives_spanish:
  - su soberano
  - su gobernante
  - el que gobierna
  lexicon: HALOT
  rationale: El participio de משל denota a quien gobierna. Se mantiene «gobernador» para reflejar la función civil y conservar el paralelismo sin repetir exactamente «soberano».
- source_word: מִקִּרְבּוֹ
  english_pob_choice: from his midst
  chosen_spanish: de en medio de él
  alternatives_spanish:
  - de entre él
  - de su mismo medio
  - desde su interior
  lexicon: HALOT
  rationale: קֶרֶב tiene el sentido de medio, interior o entraña comunitaria. «De en medio de él» preserva la imagen hebrea de surgir desde dentro del grupo.
- source_word: וְהִקְרַבְתִּיו
  english_pob_choice: I will bring him near
  chosen_spanish: yo lo haré acercarse
  alternatives_spanish:
  - lo acercaré
  - lo haré venir cerca
  - lo traeré cerca
  lexicon: HALOT
  rationale: 'El Hifil es causativo: Yahvé hace que el personaje se acerque. «Yo lo haré acercarse» mantiene la iniciativa divina y suena natural en español.'
- source_word: וְנִגַּשׁ אֵלַי
  english_pob_choice: and he will approach me
  chosen_spanish: y él se acercará a mí
  alternatives_spanish:
  - y él se aproximará a mí
  - y vendrá a mí
  - y se presentará ante mí
  lexicon: HALOT
  rationale: נגשׁ puede sugerir acercarse, presentarse o aproximarse con solemnidad. «Se acercará a mí» preserva la repetición con el infinitivo final y evita añadir una noción no explicitada por el hebreo.
- source_word: עָרַב אֶת לִבּוֹ
  english_pob_choice: has pledged his heart
  chosen_spanish: ha comprometido su corazón
  alternatives_spanish:
  - ha empeñado su corazón
  - ha dado su corazón en prenda
  - ha puesto su corazón como garantía
  lexicon: HALOT
  rationale: עָרַב en este contexto tiene la idea de salir fiador o comprometerse como garantía. En español, «ha comprometido su corazón» conserva la fuerza de la decisión interior sin forzar una metáfora financiera poco transparente.
- source_word: לָגֶשֶׁת אֵלַי
  english_pob_choice: to approach me
  chosen_spanish: para acercarse a mí
  alternatives_spanish:
  - para venir a mí
  - para presentarse ante mí
  - para llegar hasta mí
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo נגשׁ con una equivalencia consistente en español. «Para acercarse a mí» enlaza bien con la línea anterior y conserva el tono solemne.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé.
  alternatives_spanish:
  - —dice Yahvé.
  - —oráculo de Yahvé.
  - —afirma Yahvé.
  lexicon: HALOT
  rationale: Siguiendo la terminología del proyecto, יהוה se traduce como «Yahvé». «Declara» reproduce adecuadamente la fórmula profética נְאֻם en un español moderno y digno.
theological_decisions:
- issue: Origen interno del gobernante y acceso singular a Dios
  english_pob_reading: The verse presents a leader from among the people whom the LORD himself brings near, with language that may evoke privileged or cultic access without explicitly identifying the figure as priestly or messianic.
  chosen_spanish_reading: El texto presenta a un soberano surgido de entre el pueblo, a quien Yahvé hace acercarse y que se acerca a él con una disposición interior extraordinaria, sin identificarlo explícitamente como Mesías ni como sacerdote.
  alternative_spanish_readings:
  - Se trata de un Mesías específicamente identificado
  - Se trata de un gobernador político posexílico
  - Se sugiere una figura sacerdotal-rey
  rationale: La frase hebrea mantiene una tensión real entre procedencia interna, iniciativa divina y acceso a Yahvé. La traducción conserva esa amplitud y no resuelve el pasaje en una identificación doctrinal más estrecha que el texto no nombra.
  doctrine_reference: Preservar la tensión teológica sin cerrarla prematuramente.
translation_notes:
  revision_awareness: 'El contexto auditado muestra un acuerdo alto y sin revisiones pendientes relevantes. Se conservan las tres notas de ambigüedad principales del inglés POB: el matiz de prominencia de אַדִּיר, el origen interno del líder y el giro idiomático de עָרַב אֶת־לִבּוֹ. No se introducen decisiones doctrinales adicionales ni se resuelve la figura hacia Mesías, sacerdote o gobernante posexílico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la pauta del proyecto.
  - 'Se conserva una sola línea léxica para נגשׁ: «acercarse», a fin de reflejar la repetición del hebreo.'
  - «Gobernador» se usa como título funcional y no como término eclesiástico.
  - La puntuación con raya y comas busca claridad editorial sin alterar el flujo del hebreo.
