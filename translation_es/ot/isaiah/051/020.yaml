translation:
  language: es
  text: Tus hijos se han desmayado; yacen a la cabecera[a] de todas las calles, como un antílope[b] en una red, llenos de la ira de Yahvé, de la reprensión[c] de tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en cada esquina». Literalmente, «a la cabeza de todas las calles».
    reason: lexical_alternative
  - marker: b
    text: O «como un buey salvaje en una red». El término hebreo para el animal es incierto.
    reason: lexical_alternative
  - marker: c
    text: O «el reproche de tu Dios». El hebreo expresa una reprensión severa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנַיִךְ
  english_pob_choice: Your sons
  chosen_spanish: Tus hijos
  alternatives_spanish:
  - Tus hijos varones
  - Tus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo בן con sufijo femenino de segunda persona plural se refiere literalmente a 'tus hijos'. En español, 'hijos' es el equivalente natural y puede abarcar el sentido filial sin forzar un marcado masculino innecesario en este contexto poético.
- source_word: עֻלְּפוּ
  english_pob_choice: have fainted
  chosen_spanish: se han desmayado
  alternatives_spanish:
  - han desfallecido
  - se han desvanecido
  lexicon: HALOT
  rationale: El verbo expresa colapso físico por agotamiento o angustia. 'Se han desmayado' comunica bien la imagen de caída corporal y funciona de manera natural en español moderno.
- source_word: שָׁכְב֛וּ
  english_pob_choice: they lie
  chosen_spanish: yacen
  alternatives_spanish:
  - están tendidos
  - yacen tendidos
  lexicon: HALOT
  rationale: El verbo señala la condición visible de estar echados/tendidos. 'Yacen' mantiene el tono poético y la imagen estática del hebreo.
- source_word: בְּרֹאשׁ כָּל חוּצ֖וֹת
  english_pob_choice: at the head of every street
  chosen_spanish: a la cabecera de todas las calles
  alternatives_spanish:
  - en la entrada de todas las calles
  - en la esquina de todas las calles
  lexicon: HALOT
  rationale: רֹאשׁ significa literalmente 'cabeza' o 'parte principal'. 'Cabecera' conserva la metáfora espacial y evita decidir demasiado pronto por 'esquina'; la fórmula sigue siendo comprensible en español.
- source_word: כְּתוֹא
  english_pob_choice: like an antelope
  chosen_spanish: como un antílope
  alternatives_spanish:
  - como un toro salvaje
  - como un buey salvaje
  lexicon: HALOT
  rationale: El término zoológico es incierto. 'Antílope' mantiene la idea de animal salvaje, ágil y vulnerable, sin afirmar una identificación más precisa de la que el hebreo permite.
- source_word: מִכְמָר
  english_pob_choice: in a net
  chosen_spanish: en una red
  alternatives_spanish:
  - en un lazo
  - en una trampa
  lexicon: HALOT
  rationale: El sustantivo designa una red para capturar animales. 'Red' es el equivalente más directo y claro en español.
- source_word: הַמְלֵאִים
  english_pob_choice: full of
  chosen_spanish: llenos de
  alternatives_spanish:
  - colmados de
  - rebosando de
  lexicon: HALOT
  rationale: El participio describe su estado. 'Llenos de' reproduce la construcción natural del español y conserva la fuerza de la imagen.
- source_word: חֲמַת יְהוָה
  english_pob_choice: the wrath of Yahweh
  chosen_spanish: la ira de Yahvé
  alternatives_spanish:
  - el furor de Yahvé
  - la furia de Yahvé
  lexicon: HALOT
  rationale: חמה puede significar ira ardiente o furor. 'Ira' es la opción más transparente y apta para lectura eclesial contemporánea; se conserva 'Yahvé' conforme al criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino, preservando la distinción frente a un reemplazo por 'Señor'.
- source_word: גַּעֲרַת אֱלֹהָיִךְ
  english_pob_choice: the rebuke of your God
  chosen_spanish: del reprendo de tu Dios
  alternatives_spanish:
  - de la reprensión de tu Dios
  - de la reprueba de tu Dios
  lexicon: HALOT
  rationale: גערה denota una reprensión severa, casi judicial. Se elige 'reprendo' para conservar el sustantivo de la misma raíz que el verbo español 'reprender' y mantener la dureza del original, aunque resulte menos usual que 'reprensión'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El versículo usa directamente el Tetragrámaton. La política del proyecto pide transliterar el nombre divino en el texto principal, evitando el ocultamiento litúrgico por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen del animal en כְּתוֹא
  english_pob_reading: like an antelope
  chosen_spanish_reading: como un antílope
  alternative_spanish_readings:
  - como un buey salvaje
  - como un toro salvaje
  rationale: La identificación exacta del animal es incierta. Se mantiene una solución zoológica general que preserve la imagen de una bestia atrapada sin sobredeterminar el lexema hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
- issue: Valor de גַּעֲרָה
  english_pob_reading: the rebuke of your God
  chosen_spanish_reading: del reprendo de tu Dios
  alternative_spanish_readings:
  - de la reprensión de tu Dios
  - de la reprueba de tu Dios
  rationale: El campo semántico incluye reprensión fuerte y censura judicial. 'Reprendo' intenta conservar la aspereza del término y su relación con 'reprender', sin suavizarlo a una simple observación correctiva.
  doctrine_reference: HALOT גערה
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y se armonizó con el audito en inglés POB. Se respetó la incertidumbre zoológica de כְּתוֹא y se mantuvo la transliteración de יְהוָה como Yahvé según el estándar del proyecto. No se introdujeron revisiones textuales ni cambios doctrinales respecto del paquete fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, no 'Señor'.
  - '''Ira'' se prefiere a ''furor/furia'' por claridad, sin perder el sentido de cólera ardiente.'
  - '''Cabecera de todas las calles'' conserva la metáfora hebrea de ''cabeza'' para no banalizarla en una mera paráfrasis.'
  - '''Reprendo'' es poco frecuente en español, pero se eligió por proximidad formal a גערה; la nota ofrece alternativas más idiomáticas.'
