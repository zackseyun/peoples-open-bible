translation:
  language: es
  text: Entonces quedarás libre de mi juramento[a] cuando llegues a mi familia; y si no te la dan, quedarás libre de mi juramento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de mi maldición»; el término hebreo puede designar un juramento con una sanción o maldición implícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּנָּקֶה / נָקִי
  english_pob_choice: you will be free
  chosen_spanish: quedarás libre
  alternatives_spanish:
  - serás librado
  - quedarás exento
  - serás libre
  lexicon: HALOT
  rationale: La forma nifal expresa quedar exento o liberado de una obligación o responsabilidad. En español, «quedarás libre» comunica con naturalidad la exención jurídica del juramento sin perder la fuerza legal del contexto.
- source_word: מֵאָלָתִי
  english_pob_choice: from my oath
  chosen_spanish: de mi juramento
  alternatives_spanish:
  - de mi maldición
  - del juramento que te impuse
  lexicon: HALOT
  rationale: En este contexto narrativo la referencia principal es la obligación jurada; «juramento» preserva ese sentido. La posibilidad de «maldición» se mantiene como alternativa porque אָלָה puede implicar una sanción o maldición asociada al juramento.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  - porque
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia temporal bajo la cual queda libre, por lo que «cuando» reproduce mejor la relación temporal-condicional que «si».
- source_word: תָבֹא אֶל מִשְׁפַּחְתִּי
  english_pob_choice: you come to my family
  chosen_spanish: llegues a mi familia
  alternatives_spanish:
  - vengas a mi familia
  - llegues a mis parientes
  - vengas a mi clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה abarca familia extensa o clan. «Mi familia» es suficientemente amplio y natural en español; el verbo en subjuntivo encaja con la cláusula temporal/condicional.
- source_word: וְאִם לֹא יִתְּנוּ לָךְ
  english_pob_choice: and if they do not give to you
  chosen_spanish: y si no te dan
  alternatives_spanish:
  - y si no te la dan
  - y si no te entregan
  - y si no conceden
  lexicon: HALOT
  rationale: El objeto está implícito en el hebreo y el texto inglés revisado evitó añadir «her». En español, «te dan» conserva esa misma indefinición sin introducir un objeto no atestiguado.
theological_decisions:
- issue: Sentido de אָלָה en contexto de juramento
  english_pob_reading: oath
  chosen_spanish_reading: juramento
  alternative_spanish_readings:
  - maldición
  - imprecación
  rationale: El texto subraya la liberación de la obligación jurada por Abraham. «Juramento» mantiene la fuerza legal principal y evita sobrecargar el pasaje con la idea de maldición, aunque esa connotación siga siendo posible en el término hebreo.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del texto inglés que eliminó el objeto explícito («her») porque no está en el hebreo. Por eso el español también evita introducir un objeto y mantiene la cláusula abierta: «si no te dan».'
  spanish_consistency_notes:
  - 'Se mantuvo la misma elección básica para תִּנָּקֶה y נָקִי: «quedarás libre».'
  - Se usó «juramento» como término principal para אָלָה, con nota de alternativa léxica.
  - El texto evita añadir un objeto femenino no presente en el hebreo, en armonía con la revisión inglesa.
  - Se conservó un registro sobrio y jurídico adecuado al contexto del pacto familiar.
