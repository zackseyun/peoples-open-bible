revisions:
- from: Y la mitad de sus hijos hablaba asdodita[a], y no sabían hablar judío, sino la lengua de un pueblo u otro.
  to: Y la mitad de sus hijos hablaba asdodita[a], y no sabían hablar judeano, sino la lengua de un pueblo u otro.
  rationale: Se reemplaza «judío» por «judeano» para reflejar con mayor fidelidad יְהוּדִית y la decisión léxica documentada del POB inglés («Judean»), evitando la ambigüedad de «judío» y la especificación excesiva de «hebreo». Se conserva el resto de la redacción, que ya transmite bien el sentido del hebreo. La nota se ajusta en paralelo para mantener coherencia terminológica y mejor estilo editorial.
