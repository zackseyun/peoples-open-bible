lexical_decisions:
- source_word: וְאַבְרָהָם
  english_pob_choice: And Abraham
  chosen_spanish: Y Abraham
  alternatives_spanish:
  - Ahora Abraham
  - Y entonces Abraham
  lexicon: HALOT
  rationale: La conjunción ו continúa la secuencia narrativa; en español, "Y" reproduce esa continuidad de forma natural y sobria. El nombre propio se conserva como Abraham.
- source_word: בֶּן תִּשְׁעִים וָתֵשַׁע שָׁנָה
  english_pob_choice: was ninety-nine years old
  chosen_spanish: tenía noventa y nueve años
  alternatives_spanish:
  - era de noventa y nueve años
  - tenía la edad de noventa y nueve años
  lexicon: HALOT
  rationale: El hebreo usa el modismo literal "hijo de noventa y nueve años"; en español, "tenía noventa y nueve años" comunica la edad sin forzar una construcción ajena al idioma. Se evita una paráfrasis más libre para conservar el dato exacto.
- source_word: בְּהִמֹּלוֹ
  english_pob_choice: when ... was circumcised
  chosen_spanish: cuando fue circuncidada
  alternatives_spanish:
  - al ser circuncidado
  - en su circuncisión
  lexicon: HALOT
  rationale: La forma verbal con ב expresa circunstancia temporal. En español, el pasivo "fue circuncidada" refleja adecuadamente la acción recibida y preserva la relación temporal introducida por "cuando".
- source_word: בְּשַׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne
  - el cuerpo
  lexicon: HALOT
  rationale: Se mantiene la concreción del hebreo con "carne", en vez de suavizar el término. Es el equivalente más directo y auditable para בשר en este contexto corporal.
- source_word: עָרְלָתוֹ
  english_pob_choice: of his foreskin
  chosen_spanish: de su prepucio
  alternatives_spanish:
  - de su foreskin
  - de su prepucio
  lexicon: HALOT
  rationale: '"Prepucio" es el término natural y preciso en español para עָרְלָה. Se evita un calco menos idiomático y se conserva el contenido anatómico del texto.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés, sin cambios sustantivos respecto a la lectura base: mantiene la edad exacta, la referencia corporal explícita y la estructura temporal de la frase. No se detectaron revisiones posteriores que afectaran el sentido.'
  spanish_consistency_notes:
  - Se conserva el nombre propio Abraham de forma uniforme.
  - Se usa "carne" para בשר, conforme a la fuerza concreta del hebreo.
  - Se usa "prepucio" para עָרְלָה, término médico claro en español.
  - El pasivo "fue circuncidada" refleja el valor verbal sin omitir el agente implícito.
  - El español resultante es publicable y evita el calco "hijo de noventa y nueve años".
