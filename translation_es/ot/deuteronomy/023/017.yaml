revisions:
- from: Vivirá contigo[a], en medio de ti, en el lugar que él escoja, dentro de una de tus puertas, donde le sea bueno[b]; no lo oprimirás.
  to: Vivirá contigo[a], en medio de ti, en el lugar que él escoja, dentro de una de tus puertas, donde le parezca mejor[b]; no lo oprimirás.
  rationale: Se cambia únicamente 'donde le sea bueno' por 'donde le parezca mejor' para expresar de manera natural y fiel el sentido de בַּטּוֹב לוֹ en español. Se conservan el modismo 'dentro de una de tus puertas', la nota cultural correspondiente, la fuerza legal de 'no lo oprimirás', y el masculino singular de la fuente.
