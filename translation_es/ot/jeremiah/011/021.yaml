    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: 'La nota ''O, más formalmente: «Así dice Yahvé»'' explica la fórmula כֹּה אָמַר יְהוָה, por lo que debe anclarse en ''esto es lo que dice Yahvé'', no después de ''Yahvé'' dentro del discurso directo.'
  - severity: medium
