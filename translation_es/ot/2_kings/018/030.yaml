translation:
  language: es
  text: 'No dejéis que Ezequías os haga confiar en Yahvé, diciendo: «Yahvé[a] ciertamente nos librará, y esta ciudad no será entregada en manos del rey de Asiria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «librando, librará»; forma enfática que significa «Yahvé ciertamente nos librará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַל יַבְטַח אֶתְכֶם
  english_pob_choice: do not let ... make you trust
  chosen_spanish: que no os haga confiar
  alternatives_spanish:
  - que no os persuada a confiar
  - no confiéis
  lexicon: HALOT
  rationale: 'El Hiphil de בטח con sufijo de objeto expresa una acción causativa: Ezequías no simplemente confía, sino que hace que el pueblo confíe. «Que no os haga confiar» conserva esa fuerza causativa en español y suena natural; «no confiéis» aplana el matiz y «persuadir» sería más interpretativo.'
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: uso onomástico bíblico
  rationale: Nombre propio bíblico establecido en español; no requiere transliteración nueva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino en forma española normalizada «Yahvé», siguiendo la convención del proyecto para יְהוָה y evitando la sustitución por un título como «el SEÑOR».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  lexicon: HALOT
  rationale: Introducción quotativa estándar; «diciendo» mantiene la relación directa con la cita siguiente.
- source_word: הַצֵּל יַצִּילֵנוּ
  english_pob_choice: will surely deliver us
  chosen_spanish: ciertamente nos librará
  alternatives_spanish:
  - nos librará con certeza
  - librándonos, nos librará
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la acción. «Ciertamente nos librará» expresa bien el énfasis en español sin sonar forzado; «librar» funciona de manera natural en contexto militar y preserva el sentido de rescate.
- source_word: וְלֹא תִנָּתֵן
  english_pob_choice: and ... will not be given
  chosen_spanish: no será entregada
  alternatives_spanish:
  - no será dada
  - no será entregada en manos de
  lexicon: HALOT
  rationale: El pasivo de נתן aquí indica entrega a control enemigo. «Será entregada» comunica esa idea con claridad en español bíblico contemporáneo.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sintagma nominal con demostrativo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo hebreo «en mano de», que en español bíblico sigue siendo claro y conserva la imagen concreta de dominio/control.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey de Asur
  lexicon: uso histórico-geográfico bíblico
  rationale: «Asiria» es la forma histórica estándar en español para el imperio asirio en este contexto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En la redacción española se conserva como «Yahvé», que transmite el nombre propio de Dios y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor intensivo de הַצֵּל יַצִּילֵנוּ
  english_pob_reading: will surely deliver us
  chosen_spanish_reading: ciertamente nos librará
  alternative_spanish_readings:
  - nos librará con certeza
  - librará, sí, nos librará
  rationale: La duplicación verbal intensifica la seguridad de la acción divina. «Ciertamente» preserva el énfasis sin introducir un giro demasiado pesado.
  doctrine_reference: HALOT; decisión léxica de intensificación verbal
- issue: Imagen de בְּיַד
  english_pob_reading: into the hand of
  chosen_spanish_reading: en mano de
  alternative_spanish_readings:
  - en la mano de
  - bajo el poder de
  rationale: Se mantiene la metáfora corpórea del hebreo por su fuerza concreta y su amplia comprensibilidad en español bíblico. No se sustituye por una abstracción menos vívida salvo necesidad contextual.
  doctrine_reference: HALOT; idiomatismo hebreo de dominio/control
translation_notes:
  revision_awareness: El texto inglés POB y la evaluación de revisión muestran alta concordancia y no requieren cambios sustantivos; la presente redacción española sigue la misma lectura óptima-equivalente, conservando la causatividad de בטח, la intensificación verbal de הַצֵּל יַצִּילֵנוּ y el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se prefirió «librará» frente a «salvará» para conservar el matiz militar/contextual de נצל.
  - Se conservó la metáfora «en mano de» para בְּיַד, en línea con el hebreo y el audit trail inglés.
  - «Ezequías» sigue la forma bíblica española habitual y no introduce ambigüedad.
  - La puntuación reproduce el cierre citacional de una sola frase con comillas españolas, adecuada para publicación.
