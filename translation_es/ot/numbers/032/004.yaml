translation:
  language: es
  text: La tierra que Yahvé golpeó delante de la congregación[a] de Israel es una tierra para el ganado[b], y tus siervos tienen ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la asamblea de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «apta para el ganado»; el término hebreo puede referirse ampliamente al ganado, no solo al ganado vacuno.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרֶץ
  english_pob_choice: The land
  chosen_spanish: La tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: אֶרֶץ designa aquí una porción de tierra/territorio; «tierra» conserva el artículo definido y es natural en español bíblico contemporáneo.
- source_word: הִכָּה
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hirió de muerte
  - hirió/atacó
  lexicon: HALOT
  rationale: נכה suele implicar golpear o herir, incluso en contexto militar/divino. «Hirió» mantiene la fuerza del acto sin añadir la interpretación de «derrotó» o intensificar a «hirió de muerte».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino y no se sustituye por un título. «Yahvé» sigue la convención del proyecto para יהוה.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La expresión espacial funciona de manera idiomática como «delante de» en español, manteniendo la idea de testigos/ubicación frente a la asamblea.
- source_word: עֲדַת יִשְׂרָאֵל
  english_pob_choice: the congregation of Israel
  chosen_spanish: la congregación[a] de Israel
  alternatives_spanish:
  - la asamblea de Israel
  - la comunidad de Israel
  lexicon: HALOT
  rationale: «עֲדָה» nombra al pueblo reunido; «congregación» es un equivalente tradicional y preciso en contextos del Pentateuco. La nota admite «asamblea» como alternativa válida.
- source_word: אֶרֶץ מִקְנֶה
  english_pob_choice: a land for livestock
  chosen_spanish: una tierra para el ganado[b]
  alternatives_spanish:
  - una tierra apta para el ganado
  - una tierra de ganado
  lexicon: HALOT
  rationale: מִקְנֶה se refiere a ganado/livestock de forma amplia, no solo a vacas. «Para el ganado» expresa adecuación o destino sin restringir indebidamente el término.
- source_word: וְלַעֲבָדֶיךָ
  english_pob_choice: and your servants have
  chosen_spanish: y tus siervos tienen
  alternatives_spanish:
  - y para tus siervos hay
  - y tus esclavos tienen
  lexicon: HALOT
  rationale: El prefijo ל aquí puede expresar posesión/beneficio; en español se vuelve naturalmente «tus siervos tienen». Se conserva «siervos» porque el propio contexto de habla cortesana favorece ese matiz y no obliga a «esclavos».
- source_word: מִקְנֶה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - ganado doméstico
  - bestias de crianza
  lexicon: HALOT
  rationale: «Ganado» es la forma más natural y amplia en español para animales de cría; cubre el valor léxico sin reducirlo a «cattle» en sentido estrecho.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene la transliteración del nombre propio del pacto según la norma del proyecto, en lugar de sustituirla por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Valor de מִקְנֶה
  english_pob_reading: livestock / land for livestock
  chosen_spanish_reading: ganado / tierra para el ganado
  alternative_spanish_readings:
  - ganado doméstico
  - tierra apta para el ganado
  rationale: La frase no exige limitarse a bovinos; el español «ganado» conserva la amplitud del sustantivo hebreo y la relación de pertenencia/suitability del sintagma.
  doctrine_reference: Project terminology default for מִקְנֶה as livestock/property in animals
translation_notes:
  revision_awareness: Se ajustó el verbo para reflejar con más precisión el valor de נכה sin sobrerinterpretar como «derrotó»; también se evitó una traducción demasiado estrecha de מִקְנֶה. La estructura general sigue de cerca el texto hebreo y el auditable trail inglés, con adaptación idiomática natural al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «siervos» en vez de «esclavos» por el contexto de habla y la formulación del verso.
  - «Ganado» se usa con sentido amplio, no restringido a bovinos.
  - La nota a [a] queda anclada en «congregación» y la nota [b] en «ganado», cumpliendo la correspondencia marcador-texto.
