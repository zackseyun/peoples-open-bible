translation:
  language: es
  text: La abertura para la cabeza estará en medio de ella; alrededor de su abertura habrá un borde tejido[a], como la abertura de una coraza, para que no se desgarre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “como la abertura de una armadura” o “como la abertura de una coraza de malla”. El hebreo תַחְרָא es raro, y la comparación es con una abertura reforzada del cuello que resiste el desgarro.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִי רֹאשׁוֹ
  english_pob_choice: its opening for the head
  chosen_spanish: la abertura para la cabeza
  alternatives_spanish:
  - la abertura de la cabeza
  - la abertura para la cabeza del portador
  - el hueco para la cabeza
  lexicon: HALOT
  rationale: En contexto de vestido, פִּי no se toma como “boca” literal, sino como abertura. “Para la cabeza” conserva la función del orificio y su referencia al usuario del vestido, sin volverlo técnico en exceso.
- source_word: בְּתוֹכוֹ
  english_pob_choice: in the middle of it
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - en su centro
  - en medio de ésta
  lexicon: HALOT
  rationale: La frase indica ubicación centrada dentro de la prenda. “En medio de ella” mantiene el sentido espacial directo y natural en español.
- source_word: שָׂפָה
  english_pob_choice: edge
  chosen_spanish: borde
  alternatives_spanish:
  - orilla
  - ribete
  - labio
  lexicon: HALOT
  rationale: Aquí שָׂפָה denota el remate o contorno reforzado alrededor de la abertura. “Borde” conserva la imagen de un contorno perimetral sin introducir una terminología demasiado interpretativa.
- source_word: מַעֲשֵׂה אֹרֵג
  english_pob_choice: a woven edge
  chosen_spanish: un borde tejido
  alternatives_spanish:
  - un remate tejido
  - un borde de tejido
  - una labor de tejedor
  lexicon: HALOT
  rationale: La construcción describe un borde hecho por tejido. “Borde tejido” preserva la relación entre la pieza de remate y la técnica de fabricación, de manera idiomática en español.
- source_word: כְּפִי תַחְרָא
  english_pob_choice: like the opening of a coat of mail
  chosen_spanish: como la abertura de una coraza
  alternatives_spanish:
  - como la abertura de una armadura
  - como la abertura de una coraza de malla
  - como la abertura de un peto
  lexicon: HALOT
  rationale: תַחְרָא es un término raro; el contexto compara la abertura reforzada con la de una pieza de armadura. “Coraza” es una opción amplia pero digna para el castellano bíblico, y evita fijar demasiado un tipo exacto de armadura cuando el término hebreo es incierto.
- source_word: לֹא יִקָּרֵעַ
  english_pob_choice: so that it may not be torn
  chosen_spanish: para que no se rompa
  alternatives_spanish:
  - para que no sea rasgada
  - para que no se desgarre
  - para que no se rasgue
  lexicon: HALOT
  rationale: 'El nifal expresa pasividad o resultado: la abertura reforzada evita una rotura. “No se rompa” es natural en español y conserva el propósito funcional del texto; “rasgarse” queda como alternativa más literal para tela.'
