lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de linaje de
  lexicon: HALOT
  rationale: En listas genealógicas o censales, בְּנֵי puede señalar pertenencia a un clan o línea familiar. En español, «los hijos de» conserva la estructura formal y es natural; «los descendientes de» explicita el sentido colectivo, pero pierde el paralelismo más directo con el hebreo.
- source_word: עֵילָם
  english_pob_choice: Elam
  chosen_spanish: Elam
  alternatives_spanish:
  - Elán
  lexicon: HALOT
  rationale: Nombre propio transliterado. Aquí designa el linaje/familia de Elam dentro de la lista de los retornados, no la región geográfica como tal.
- source_word: אֶלֶף מָאתַיִם חֲמִשִּׁים וְאַרְבָּעָה
  english_pob_choice: 1,254
  chosen_spanish: '1.254'
  alternatives_spanish:
  - mil doscientos cincuenta y cuatro
  - 1.254 personas
  lexicon: HALOT
  rationale: El total hebreo es 1.254. En español se mantiene el valor numérico en formato habitual de miles con punto para una lista censal. No se añade «personas» porque no está expresado explícitamente en el hebreo.
translation_notes:
  revision_awareness: El contexto auditado en inglés presenta acuerdo alto y no requiere notas de revisión; la traducción sigue la misma lectura censal y el mismo valor numérico, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico/censal breve, sin añadir elementos implícitos.
  - Se conserva el nombre propio Elam sin identificación geográfica adicional.
  - La cifra se normaliza al formato numérico español para facilitar la lectura pública.
