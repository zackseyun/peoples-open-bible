base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/022.yaml
  text: And at the time they began with singing and praise[a], Yahweh set ambushes against the Ammonites, Moab, and Mount Seir, who were coming against Judah[b], and they were struck down.
  footnotes:
  - marker: a
    text: Or 'the LORD set ambushers' / 'men in ambush.' The Hebrew participle can denote persons lying in ambush as well as the ambush action more generally.
    reason: lexical_alternative
  - marker: b
    text: Or 'who were coming to Judah.' In context the movement is hostile, so 'against Judah' is used in the main text.
    reason: lexical_alternative
