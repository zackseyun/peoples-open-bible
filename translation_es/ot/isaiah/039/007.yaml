review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: conserva el partitivo «algunos de tus hijos», la doble expresión genealógica, la toma/deportación, «eunucos» en el texto principal y «palacio del rey de Babilonia». Sin embargo, «que saldrán de ti» suena poco natural en español para descendencia humana, y «serán tomados» resulta más torpe que una pasiva más idiomática sin perder el sentido.'
  spanish_quality_summary: El texto es mayormente claro y fiel, pero necesita una reparación menor de naturalidad y fluidez. «Nacerán de ti» expresa mejor el valor genealógico en español que «saldrán de ti», y «se los llevarán» o «serán llevados» fluye mejor que «serán tomados». También conviene evitar la coma innecesaria antes de la primera relativa restrictiva.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Eunucos» respeta la decisión documentada para סָרִיסִים, con nota alternativa adecuada. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La nota léxica está bien orientada.
  issues:
  - severity: medium
    issue: «que saldrán de ti» es un calco poco natural en español
    rationale: Aunque refleja literalmente el hebreo, en español aplicado a hijos/descendencia suena extraño. «que nacerán de ti» o «que procederán de ti» preserva mejor el sentido genealógico con mejor legibilidad.
  - severity: medium
    issue: «serán tomados» suena rígido en este contexto
    rationale: La pasiva española es posible, pero aquí resulta menos natural que «se los llevarán», que mantiene el agente indefinido y comunica mejor el sentido de deportación/cautiverio.
  - severity: low
    issue: Puntuación mejorable en la relativa restrictiva
    rationale: La coma tras «hijos» no es necesaria en una relativa restrictiva y entorpece levemente la fluidez.
