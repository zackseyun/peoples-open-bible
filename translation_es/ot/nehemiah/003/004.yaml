translation:
  language: es
  text: Y junto a ellos[a] hizo reparaciones[b] Meremot, hijo de Urías, hijo de Hacoz; y junto a ellos[a] hizo reparaciones[b] Mesulam, hijo de Berequías, hijo de Meshezabel; y junto a ellos[a] hizo reparaciones[b] Sadoc, hijo de Baana[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «y junto a su mano», un modismo que significa «junto a ellos» o «al lado de ellos».
    reason: lexical_alternative
  - marker: b
    text: O «reparó» o, más literalmente, «fortaleció». El verbo hebreo en este capítulo es una fórmula fija para el trabajo de reparación de la muralla.
    reason: lexical_alternative
  - marker: c
    text: Baana también puede escribirse «Baaná» o «Baanah» en transliteración.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַל יָדָם
  english_pob_choice: and next to them
  chosen_spanish: y junto a ellos
  alternatives_spanish:
  - y al lado de ellos
  - y junto a su mano
  lexicon: HALOT
  rationale: El hebreo es un modismo espacial que en este contexto marca la sucesión de los obreros en la reconstrucción; en español, «junto a ellos» comunica cercanía y continuidad sin volver literal la imagen de la «mano».
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: trabajó
  alternatives_spanish:
  - hizo reparaciones
  - reparó
  - fortaleció
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo funciona como fórmula narrativa de participación en la obra del muro. «Trabajó» evita reducirlo a una sola técnica y conserva la idea de tomar parte en la reparación; las alternativas mantienen el valor de reparación/fortalecimiento cuando se quiera explicitar más el oficio.
- source_word: מְרֵמוֹת
  english_pob_choice: Meremoth
  chosen_spanish: Meremot
  alternatives_spanish:
  - Meremoté
  lexicon: Transliteración convencional del nombre propio
  rationale: Se translitera el nombre personal en forma natural para el español bíblico; se evita una castellanización innecesaria que altere el vínculo con el hebreo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Aquí la lista genealógica inmediata favorece «hijo de»; es la relación más directa y más clara en español.
- source_word: אוּרִיָּה
  english_pob_choice: Uriah
  chosen_spanish: Urías
  alternatives_spanish:
  - Uría
  lexicon: Transliteración convencional del nombre propio
  rationale: En español bíblico es estándar «Urías»; mantiene reconocimiento inmediato y buena inteligibilidad.
- source_word: הַקּוֹץ
  english_pob_choice: Hakkoz
  chosen_spanish: Hacoz
  alternatives_spanish:
  - Hakkoz
  - Cos
  lexicon: Transliteración convencional del nombre propio con artículo incorporado
  rationale: El hebreo presenta el artículo integrado al nombre; en español se conserva la forma convencional cercana a la grafía hebrea, sin añadir explicación dentro del texto.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Mesulam
  alternatives_spanish:
  - Mesullam
  - Meshulam
  lexicon: Transliteración convencional del nombre propio
  rationale: Se busca una forma española legible y cercana a la pronunciación hebrea; «Mesulam» es clara y evita una transliteración excesivamente técnica.
- source_word: בֶּרֶכְיָה
  english_pob_choice: Berechiah
  chosen_spanish: Berequías
  alternatives_spanish:
  - Berekías
  - Berecías
  lexicon: Transliteración convencional del nombre propio
  rationale: La forma con «qu» refleja mejor el sonido de /k/ ante e/i en español y conserva una grafía bíblica natural.
- source_word: מְשֵׁיזַבְאֵל
  english_pob_choice: Meshezabel
  chosen_spanish: Meshezabel
  alternatives_spanish:
  - Meshezabeel
  lexicon: Transliteración convencional del nombre propio
  rationale: Se mantiene la forma ya cercana al hebreo y usada en la tradición inglesa auditada; es transparente y evita duplicar variantes sin necesidad.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  lexicon: Transliteración convencional del nombre propio
  rationale: En español bíblico es usual «Sadoc», que corresponde bien al nombre hebreo y resulta más natural que conservar la z inglesa.
- source_word: בַּעֲנָא
  english_pob_choice: Baana
  chosen_spanish: Baana
  alternatives_spanish:
  - Baanah
  lexicon: Transliteración convencional del nombre propio
  rationale: Se conserva una transliteración breve y cercana al hebreo. La variante inglesa documentada se refleja en una nota, no en el texto principal.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la versión inglesa más reciente quedó sin cambios, con alta concordancia y sin observaciones de corrección. La propuesta española sigue de cerca esa lectura estable, trasladando el modismo hebreo con una fórmula natural en español y manteniendo la secuencia de nombres propios.
  spanish_consistency_notes:
  - Se mantiene «junto a ellos» de manera uniforme para las tres ocurrencias del modismo hebreo.
  - Los nombres propios se transliteran de forma consistente y bíblicamente reconocible en español.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque no aparecen en este versículo.
  - La nota [a] se ancla en «trabajó» para preservar la alternativa lexical del verbo hebreo.
