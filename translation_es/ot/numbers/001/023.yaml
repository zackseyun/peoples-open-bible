  text: Sus censados[a] de la tribu de Simeón fueron cincuenta y nueve mil trescientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Censados» refleja el sentido del participio derivado de פקד en el contexto de un censo; también podría expresarse como «los hombres censados», pero «hombres» no aparece en este versículo. «Sus» conserva el sufijo posesivo del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדֵי/הֶם
  english_pob_choice: their counted men
  chosen_spanish: Los censados[a]
  alternatives_spanish:
  - los contados
  - los enrolados
  - los hombres censados
  lexicon: HALOT
  rationale: El participio pasivo de פקד en este contexto de censo expresa personas incluidas en el conteo. «Censados» conserva el valor censal de forma natural en español. Se evita añadir «hombres» porque no está explícito en este versículo, aunque sí lo esté en el contexto más amplio.
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de parte de la tribu de
  - por la tribu de
  lexicon: HALOT
  rationale: La construcción formulaica en Números identifica la pertenencia tribal. En español, «de la tribu de» reproduce esa relación de pertenencia de manera fluida y fiel.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: HALOT
  rationale: Se usa la forma bíblica habitual en español para el nombre tribal.
- source_word: תִּשְׁעָה וַחֲמִשִּׁים אֶלֶף וּשְׁלֹשׁ מֵאוֹת
  english_pob_choice: fifty-nine thousand three hundred
  chosen_spanish: cincuenta y nueve mil trescientos
  alternatives_spanish:
  - noventa y cincuenta mil y trescientos
  lexicon: HALOT
  rationale: Se sigue el total exacto del hebreo con estilo numérico natural en español moderno, evitando un orden verbal artificial.
translation_notes:
  revision_awareness: La revisión inglesa añadió el posesivo «their» para reflejar el sufijo pronominal. En español, ese matiz queda expresado de manera implícita por la construcción nominal sin necesidad de un posesivo explícito.
  spanish_consistency_notes:
  - «Simeón» se mantiene como forma bíblica estándar en español.
  - «Censados» conserva el valor técnico del censo y evita introducir una glosa innecesaria en el texto principal.
  - El número se expresa con ortografía española estándar y coincide exactamente con el total del hebreo.
