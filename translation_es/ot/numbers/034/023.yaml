    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la forma del nombre propio a una transliteración española más natural («Janiel») sin alterar la estructura ni las decisiones léxicas fieles al hebreo y al audit trail inglés. La nota existente se conserva sin cambios porque sigue siendo pertinente.
