theological_decisions:
- issue: Rendering of חרם language in a war/victory context
  chosen_reading: I will devote their unjust gain ... and their wealth
  alternative_readings:
  - I will utterly destroy their gain
  - I will put their gain under the ban
  rationale: The verb חרם can imply destruction as part of devotion to God, but here its objects are 'their gain' and 'their wealth,' not the peoples themselves. Rendering it as 'devote' preserves the consecratory sense while avoiding overstatement beyond the syntax. The stronger technical alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
- issue: Moral nuance of בֶּצַע
  chosen_reading: their unjust gain
  alternative_readings:
  - their gain
  - their plunder
  rationale: The Hebrew term often carries a negative sense of greedy or unjust profit. Including that nuance reflects the source text's likely moral coloring without adding a separate doctrinal claim.
  doctrine_reference: Translation philosophy §1, §5
