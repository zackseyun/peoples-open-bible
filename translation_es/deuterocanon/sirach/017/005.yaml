translation:
  language: es
  text: Les dio consejo[a] y una lengua y ojos, oídos y un corazón[b], para razonar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deliberación» para διαβούλιον; el término griego puede denotar la capacidad de juicio considerado.
    reason: lexical_alternative
  - marker: b
    text: «Corazón» aquí conserva el sentido bíblico de la facultad interior de pensamiento y voluntad, no meramente de la emoción.
    reason: cultural_note
lexical_decisions:
- source_word: διαβούλιον
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - deliberación
  - propósito
  - entendimiento
  lexicon: LSJ
  rationale: El sustantivo griego expresa capacidad de deliberación o juicio considerado. «Consejo» es natural en español y conserva mejor esa idea que una abstracción más lejana como «propósito».
- source_word: γλῶσσαν
  english_pob_choice: a tongue
  chosen_spanish: una lengua
  alternatives_spanish:
  - habla
  - lenguaje
  - una lengua
  lexicon: LSJ
  rationale: El griego nombra el órgano corporal y probablemente lo usa por metonimia para el habla. En español, «una lengua» mantiene la concreción de la lista de facultades/miembros del cuerpo.
- source_word: ὀφθαλμούς
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - vista
  lexicon: LSJ
  rationale: El plural concreto debe conservarse para seguir la serie de órganos y facultades del versículo; «vista» desplazaría el sentido del órgano a la función.
- source_word: ὦτα
  english_pob_choice: ears
  chosen_spanish: oídos
  alternatives_spanish:
  - audición
  lexicon: LSJ
  rationale: «Oídos» conserva la forma concreta del listado griego, en paralelo con «ojos» y «lengua».
- source_word: καρδίαν
  english_pob_choice: a heart
  chosen_spanish: un corazón
  alternatives_spanish:
  - mente
  - entendimiento
  - inteligencia
  lexicon: LSJ
  rationale: En antropología bíblica, «corazón» designa el centro interior del pensamiento y la voluntad, no solo la emoción. Traducirlo literalmente preserva esa tensión conceptual.
- source_word: ἔδωκεν
  english_pob_choice: He gave
  chosen_spanish: Les dio
  alternatives_spanish:
  - Les concedió
  - Les otorgó
  lexicon: LSJ
  rationale: El pasado simple «dio» es directo y fiel al verbo griego. Se antepone «Les» para aclarar el complemento indirecto natural en español.
- source_word: διανοεῖσθαι
  english_pob_choice: to reason with
  chosen_spanish: para razonar con ellos
  alternatives_spanish:
  - para pensar con ellos
  - para reflexionar
  - para entender
  lexicon: LSJ
  rationale: El infinitivo expresa finalidad o resultado de los dones enumerados. «Razonar con ellos» refleja de forma natural y formal la actividad mental de διανοεῖσθαι, mejor que una paráfrasis más vaga.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  lexicon: LSJ
  rationale: El inglés POB lo integra como objeto indirecto. En español, «con ellos» reproduce el valor del complemento asociado al razonar sin perder la referencia a las facultades dadas.
theological_decisions:
- issue: Sentido antropológico de καρδία en la lista de facultades humanas
  english_pob_reading: Render literally as 'heart' while allowing the infinitive 'to reason with' to show its cognitive function.
  chosen_spanish_reading: Traducir literalmente «corazón» y dejar que «para razonar con ellos» muestre su función cognitiva.
  alternative_spanish_readings:
  - mente
  - entendimiento
  rationale: El versículo refleja la antropología bíblica en la que el corazón no es solo sede de emociones, sino también de pensamiento y voluntad. Mantener «corazón» conserva esa tensión en vez de reducirla a una categoría psicológica moderna.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Si suavizar la lista en facultades abstractas
  english_pob_reading: Keep the mixed concrete list ('tongue ... eyes, ears and a heart') rather than paraphrasing as speech/sight/hearing/intelligence.
  chosen_spanish_reading: Conservar la lista mixta y concreta («una lengua y ojos, oídos y un corazón») en vez de convertirla en abstracciones.
  alternative_spanish_readings:
  - habla, vista, oído e inteligencia
  rationale: El griego enumera órganos y facultades en una secuencia compacta. Preservar esa forma refleja mejor el texto fuente y evita introducir una interpretación más interpretativa que el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «to reason with» frente a «to think with» para διανοεῖσθαι. La versión española adopta ese matiz con «para razonar con ellos», manteniendo la estructura enumerativa y la concreción de los órganos/facultades.
  spanish_consistency_notes:
  - Se mantiene «corazón» como término antropológico bíblico, sin sustituirlo por «mente».
  - Se conserva la serie concreta «lengua, ojos, oídos, corazón» para no abstraer el catálogo griego.
  - «Yahvé» no aparece en este versículo.
  - La preposición «con» en «razonar con ellos» sigue el valor relacional exigido por la construcción final y la revisión inglesa reciente.
