lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: El verbo דבר en fórmulas de habla divina introduce una nueva acción narrativa. En español, "habló" conserva el carácter formal de la fórmula y es natural en este registro; "dijo" es posible, pero pierde un poco de la especificidad de un acto de habla solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'El nombre del pacto יְהוָה se mantiene como nombre propio en español: "Yahvé". Esto sigue la decisión doctrinal de no ocultar el Tetragrámaton con una sustitución titulativa como "el SEÑOR".'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso. En español, "a" expresa de manera natural ese objeto indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la cita siguiente. "Diciendo" preserva la fórmula hebrea de forma clara y literal suficiente en español.
- source_word: וַ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. "Entonces" comunica la secuencia discursiva de manera natural en español sin perder el valor progresivo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton de forma explícita; por coherencia con la política del proyecto, se conserva como nombre propio. "Yahvé" mantiene la referencia personal y pactal sin recurrir a una sustitución convencional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La fuente y el audit trail en inglés muestran acuerdo alto y sin revisiones pendientes; no se detectan cambios textuales necesarios respecto al sentido base. La principal decisión en español es la adaptación del nombre divino a la forma establecida del proyecto.
  spanish_consistency_notes:
  - Se mantiene un registro solemne y sobrio, apto para texto bíblico público.
  - '"Diciendo" conserva la fórmula hebrea sin volverla redundante en español.'
  - '"Yahvé" se usa de forma consistente con la terminología del proyecto para יְהוָה.'
