translation:
  language: es
  text: Alegra el alma de tu siervo[a], pues a ti, Señor, levanto mi alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vida» o «yo mismo»; el hebreo נֶפֶשׁ puede significar «alma», «vida» o «yo/ser» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמֵּחַ
  english_pob_choice: Gladden
  chosen_spanish: Alegra
  alternatives_spanish:
  - Alégra
  - Haz gozar
  lexicon: HALOT
  rationale: 'El imperativo piel de שׂמח expresa una acción causativa: pedir que Dios produzca alegría. «Alegra» conserva esa fuerza directiva en español natural y solemne. «Haz gozar» suena más perifrástico; «alégra» es posible, pero la forma sin acento en el texto puede leerse mejor como imperativo en una línea poética.'
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - yo mismo
  - ser
  lexicon: HALOT
  rationale: En este contexto devocional, נֶפֶשׁ se refiere a la persona interior del orante. «Alma» mantiene la carga religiosa y poética de la petición, y permite conservar la repetición posterior de נַפְשִׁי. «Vida» o «yo mismo» son posibles, pero atenúan el tono oracional.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aunque עבד puede designar esclavo, en la dirección a Dios dentro de los Salmos funciona como título reverente de pertenencia y servicio pactal. «Siervo» comunica mejor ese registro litúrgico en español bíblico que «esclavo», cuyo peso social sería aquí excesivo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base de la petición. «Porque» expresa con claridad la relación causal en español y conserva el enlace lógico sin volverlo explicativo de más.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: HALOT
  rationale: La preposición אֶל indica dirección. «A ti» es la forma más natural en español con el verbo siguiente («levanto»), manteniendo el movimiento orante hacia Dios.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Mi Señor
  - Soberano
  lexicon: HALOT
  rationale: Aquí se trata del título divino אֲדֹנָי. En español, «Señor» es la traducción estable y reverente para este título, sin necesidad de desarrollar más el matiz de dominio.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - yo mismo
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con la primera ocurrencia de נֶפֶשׁ para conservar la repetición poética. «Mi alma» suena natural en español y preserva el paralelismo del verso.
- source_word: אֶשָּׂא
  english_pob_choice: I lift up
  chosen_spanish: levanto
  alternatives_spanish:
  - alzo
  - elevo
  lexicon: HALOT
  rationale: El modismo de נשׂא en contexto de oración expresa dirigir la propia alma hacia Dios. «Levanto» es idiomático y fiel; «elevo» sería más formal, pero menos transparente en español actual.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ en un contexto de oración
  english_pob_reading: Render as 'soul' in both occurrences
  chosen_spanish_reading: Renderizarlo como «alma» en ambas ocurrencias
  alternative_spanish_readings:
  - vida
  - ser
  - yo mismo
  rationale: El verso usa el mismo término en la petición y en la motivación. «Alma» preserva la resonancia devocional y el paralelismo sin imponer una definición técnica de antropología bíblica.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Título divino אֲדֹנָי en invocación directa
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Mi Señor
  - Soberano
  rationale: En la oración, el título funciona como vocativo reverente para Dios. «Señor» conserva la dignidad del apelativo y es la forma más reconocible para lectores bíblicos en español.
  doctrine_reference: Translation philosophy §1; tratamiento de títulos divinos
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió una forma imperativa directa y natural («Gladden») frente a una paráfrasis más perifrástica. En español, «Alegra» conserva esa misma decisión de inmediatez y fuerza petitionaria sin perder el registro solemne. También se mantiene la repetición de נֶפֶשׁ mediante «alma» en ambos miembros del verso.
  spanish_consistency_notes:
  - Se traduce el nombre divino con «Señor» solo para אֲדֹנָי; no se introduce «Yahvé» porque el hebreo del verso no contiene el tetragrámaton.
  - Se conserva la repetición de נֶפֶשׁ con «alma» para mantener el paralelismo.
  - Se evita «esclavo» para עבד por el contexto orante y pactal del Salmo.
  - La puntuación refleja una sola oración de petición seguida de la causa introducida por «porque».
