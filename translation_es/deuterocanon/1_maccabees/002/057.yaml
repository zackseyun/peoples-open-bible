translation:
  language: es
  text: David[a], a causa de su misericordia, heredó el trono de un reino eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la misericordia de Dios heredó el trono de un reino eterno». El pronombre «su» puede entenderse como referido a Dios y no a David.'
    reason: alternative_reading
lexical_decisions:
- source_word: Δαυεὶδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Davíd
  lexicon: LSJ
  rationale: Nombre propio estándar; en español bíblico la forma usual y más reconocible es «David».
- source_word: ἐν τῷ ἐλέει αὐτοῦ
  english_pob_choice: because of his mercy
  chosen_spanish: por causa de su misericordia
  alternatives_spanish:
  - por su misericordia
  - a causa de su misericordia
  - en su misericordia
  lexicon: LSJ
  rationale: La revisión inglesa privilegia un valor causal de ἐν; en español, «por causa de» expresa con claridad esa relación. «Misericordia» conserva el sustantivo abstracto y el registro bíblico.
- source_word: ἐκληρονόμησεν
  english_pob_choice: inherited
  chosen_spanish: heredó
  alternatives_spanish:
  - recibió en herencia
  - obtuvo como herencia
  lexicon: LSJ
  rationale: «Heredó» reproduce el verbo patrimonial/dinástico de κληρονομέω con naturalidad y sin perder la fuerza hereditaria.
- source_word: θρόνον
  english_pob_choice: the throne
  chosen_spanish: el trono
  alternatives_spanish:
  - un trono
  lexicon: LSJ
  rationale: El contexto apunta al trono real reconocido; el artículo definido mantiene esa referencia concreta.
- source_word: βασιλείας αἰωνίας
  english_pob_choice: of an everlasting kingdom
  chosen_spanish: de un reino eterno
  alternatives_spanish:
  - de un reino perpetuo
  - de un reino perdurable
  - de una monarquía eterna
  lexicon: LSJ
  rationale: «Reino eterno» preserva el sentido de βασιλεία como reino/realidad regia y αἰωνίας como duración sin fin. «Reino» resulta más natural que una abstracción como «realeza» en este contexto.
theological_decisions:
- issue: Referencia de αὐτοῦ en «ἐν τῷ ἐλέει αὐτοῦ»
  english_pob_reading: 'The pronoun refers to David: ''because of his mercy.'''
  chosen_spanish_reading: «su» se deja sin explicitar en el texto principal, pero la redacción causal permite leerlo naturalmente de David; la nota conserva la alternativa de referirlo a Dios.
  alternative_spanish_readings:
  - por la misericordia de Dios
  - por la misericordia del Señor hacia él
  rationale: La sintaxis inmediata favorece a David, pero el contexto bíblico permite una lectura teológica en la que la misericordia sea la de Dios. La ambigüedad se preserva en nota para no cerrar indebidamente la tensión interpretativa.
  doctrine_reference: Preservar la tensión interpretativa documentada sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «in his mercy» a «because of his mercy» para reflejar mejor el valor causal de ἐν; la traducción española sigue esa decisión con «por causa de su misericordia», manteniendo también la posibilidad alternativa documentada en nota.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el nombre divino cuando corresponda, pero en este versículo no aparece el tetragrámaton.
  - «Misericordia» conserva el registro bíblico y permite tanto una lectura atributiva de David como una lectura teológica referida a Dios.
  - «Reino» se usa como equivalente de βασιλεία en un contexto dinástico, evitando tecnicismos innecesarios.
