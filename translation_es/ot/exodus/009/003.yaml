translation:
  language: es
  text: Mira, la mano de Yahvé vendrá sobre tu ganado que está en el campo—sobre los caballos, los asnos, los camellos, las vacas y las ovejas—con una plaga[a] muy severa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘pestilencia’; el término hebreo designa una epidemia mortal que afecta al ganado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira pues
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: Mantiene la fuerza deíctica e introductoria del hebreo con un español natural y directo. 'He aquí' sería más tradicional, pero menos natural en español actual.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano de Yahvé
  - la mano del Señor
  lexicon: HALOT
  rationale: Conserva el hebraísmo de agencia y juicio divino. Se usa 'Yahvé' conforme al estándar del proyecto para el nombre divino, no la máscara litúrgica 'SEÑOR'.
- source_word: הוֹיָה
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá
  - caerá
  - estará
  lexicon: HALOT
  rationale: Expresa mejor el valor predictivo e inminente del verbo en este anuncio profético. 'Vendrá' preserva la idea de acercamiento/irrupción sin volverlo demasiado literal.
- source_word: בְּמִקְנְךָ
  english_pob_choice: your livestock
  chosen_spanish: tu ganado
  alternatives_spanish:
  - tu ganado
  - tus animales de cría
  - tu hacienda
  lexicon: HALOT
  rationale: '''Ganado'' es el equivalente más natural en español bíblico para el conjunto de animales domésticos afectados. Aunque ''hacienda'' sería posible, es más amplio y menos transparente aquí.'
- source_word: אֲשֶׁר בַּשָּׂדֶה
  english_pob_choice: that are in the field
  chosen_spanish: que está en el campo
  alternatives_spanish:
  - que está en el campo
  - que están en el campo
  - que se encuentra en el campo
  lexicon: HALOT
  rationale: Conserva la localización del grupo afectado. Se opta por singular colectivo en español por la referencia global a 'ganado'.
- source_word: בַּסּוּסִים בַּחֲמֹרִים בַּגְּמַלִּים בַּבָּקָר וּבַצֹּאן
  english_pob_choice: upon the horses, the donkeys, the camels, the herds, and the flocks
  chosen_spanish: sobre los caballos, los asnos, los camellos, los rebaños y las manadas
  alternatives_spanish:
  - sobre los caballos, los asnos, los camellos, los bovinos y las ovejas
  - sobre los caballos, los burros, los camellos, el ganado mayor y el ganado menor
  lexicon: HALOT
  rationale: Se conserva la lista de especies y colectivos. 'Asnos' sigue la especie del hebreo con tono bíblico adecuado; 'rebaños' y 'manadas' reflejan el valor colectivo de בָּקָר y צֹאן sin forzar una sola especie.
- source_word: דֶּבֶר
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - plaga
  - pestilencia
  - epidemia
  lexicon: HALOT
  rationale: '''Plaga'' es la opción natural y fiel al sentido de azote mortal sobre el ganado. ''Pestilencia'' preservaría más el matiz de epidemia, pero suena más marcado y menos accesible.'
- source_word: כָּבֵד מְאֹד
  english_pob_choice: very severe
  chosen_spanish: muy severa
  alternatives_spanish:
  - muy severa
  - gravísima
  - muy grave
  lexicon: HALOT
  rationale: En español, el hebraísmo 'pesada' sería poco idiomático; 'severa' comunica bien la intensidad y gravedad del juicio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Se mantiene el nombre propio del pacto en la línea del proyecto y de la auditoría inglesa, evitando el reemplazo por una designación litúrgica. Esto preserva la referencia explícita al Tetragrámaton en el texto español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de דֶּבֶר
  english_pob_reading: plague
  chosen_spanish_reading: plaga
  alternative_spanish_readings:
  - pestilencia
  - epidemia
  rationale: La lectura inglesa trata el término como una enfermedad mortal del ganado. 'Plaga' comunica bien el azote divino sin exagerar una terminología técnica no requerida por el hebreo.
  doctrine_reference: HALOT / uso contextual en Éxodo 9:3
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'is coming' por 'will come' para reflejar mejor el sentido predictivo. La frase española usa 'vendrá' para alinearse con esa decisión revisada y evitar un presente progresivo impropio.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma estable para יְהוָה, en coherencia con el estándar del proyecto.
  - '''Asnos'' se prefirió a ''burros'' por registro bíblico más uniforme y por fidelidad al inventario animal del hebreo.'
  - '''Rebaños y manadas'' intenta conservar el carácter colectivo de בָּקָר y צֹאן sin introducir especies no explícitas.'
  - Se evitó 'SEÑOR' como máscara del nombre divino, porque el auditorio fuente documenta explícitamente el Tetragrámaton.
