review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general y la mayoría de las decisiones léxicas del hebreo: categoría distributiva de alimento/bebida, valor calificativo de los niphales (''que se pueda comer/beber'') y cambio de estado ritual (''quedará impuro''). Sin embargo, ''vaso'' es demasiado estrecho para בְּכָל כְּלִי, que en el contexto legal de Levítico abarca cualquier recipiente/vasija/utensilio. Además, ''caiga agua'' introduce una imagen más específica que el hebreo ''venga/llegue sobre él'', aunque sigue dentro de un margen aceptable; conviene ajustar a una formulación más neutral y cercana al original.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en precisión legal y amplitud semántica. 'Sobre el cual caiga agua' suena natural, aunque algo rígido; 'al cual le llegue agua' o 'sobre el cual venga agua' sería más cercano al hebreo. El cambio principal necesario es sustituir 'vaso' por 'recipiente', ya que 'vaso' en español suele limitarse a un objeto para beber.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Impuro' funciona bien para טמא en pureza ritual. 'Alimento' y 'bebida' son adecuados. La única desalineación importante es 'vaso' para כְּלִי, donde debe preferirse un término más amplio como 'recipiente' para preservar el alcance del original y de la auditoría inglesa ('vessel').
  issues:
  - severity: medium
    issue: '''vaso'' restringe indebidamente בְּכָל כְּלִי'
    rationale: כְּלִי es un término general para vasija/recipiente/utensilio. 'Vaso' en español normalmente designa un tipo particular de recipiente para beber, más estrecho que el hebreo y que 'vessel' en el POB inglés.
  - severity: low
    issue: '''caiga agua'' especifica más de lo necesario el verbo hebreo'
    rationale: יָבֹא עָלָיו מַיִם es literalmente 'agua venga sobre él'. 'Caiga agua' es comprensible, pero sugiere caída desde arriba; una formulación como 'le llegue agua' conserva mejor la neutralidad del original.
  - severity: low
    issue: La nota al pie puede simplificarse para reflejar mejor la alternativa literal
    rationale: La nota actual es correcta, pero puede redactarse de manera más concisa y alineada con el inglés auditado, destacando la opción más literal sin recargar la explicación.
  revised_spanish_text: Todo alimento que se pueda comer[a], al cual le llegue agua, quedará impuro; y toda bebida que se pueda beber en cualquier recipiente quedará impura.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «todo alimento que es comido, al cual le llega agua».'
    reason: lexical_alternative
  revision_rationale: Se ajusta 'vaso' a 'recipiente' para preservar el sentido amplio de כְּלִי en contexto legal ritual. También se reemplaza 'sobre el cual caiga agua' por 'al cual le llegue agua' para evitar una especificación innecesaria del movimiento del agua y reflejar mejor el hebreo 'venga sobre él'. La nota se simplifica y se mantiene la alternativa literal documentada por el POB inglés.
