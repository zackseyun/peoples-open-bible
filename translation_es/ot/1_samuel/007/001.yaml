    reason: alternative_reading
  revision_rationale: Se corrigen las notas al pie para que correspondan a sus anclajes reales en el texto y se mejora «subieron el arca» a «hicieron subir el arca» para un español más natural y fiel al matiz direccional del hebreo. El resto del borrador puede mantenerse.
