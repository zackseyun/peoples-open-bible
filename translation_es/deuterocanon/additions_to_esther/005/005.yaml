translation:
  language: es
  text: Y muchas veces[a], por locura, ha hecho que muchos de los que habían sido puestos en cargos de autoridad, amigos de confianza puestos a cargo de los asuntos, fueran partícipes de sangre inocente[b], y los ha envuelto en desastres irreparables,
