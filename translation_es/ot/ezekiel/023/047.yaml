translation:
  language: es
  text: Y la asamblea las apedreará con piedras y las cortará[a] con sus espadas. Matarán a sus hijos y a sus hijas, y quemarán sus casas con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las despedazará» o «las hará pedazos» con sus espadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָגְמוּ
  english_pob_choice: will stone
  chosen_spanish: apedreará
  alternatives_spanish:
  - los apedrearán
  - los lapidarán
  lexicon: HALOT
  rationale: רגם en este contexto es ejecución o agresión por apedreamiento. «Apedrear» conserva el valor verbal directo y suena natural en español bíblico actual.
- source_word: עֲלֵיהֶן
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - contra ellos
  - a ellas
  lexicon: HALOT
  rationale: El hebreo usa el pronombre femenino plural referido a las dos mujeres de la alegoría, pero en español la referencia inmediata en este verso se mantiene con el objeto directo «los», porque la oración continúa el foco narrativo sin explicitar la identificación alegórica.
- source_word: אֶבֶן
  english_pob_choice: with stones
  chosen_spanish: con piedras
  alternatives_spanish:
  - con una piedra
  - a pedradas
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, funciona colectivamente/instrumentalmente. «Con piedras» reproduce bien el valor idiomático y la imagen judicial de violencia.
- source_word: קָהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la multitud
  lexicon: HALOT
  rationale: קהל nombra un grupo reunido; «asamblea» conserva el matiz formal y judicial mejor que «multitud».
- source_word: וּבָרֵא
  english_pob_choice: and cut them down
  chosen_spanish: y los derribará
  alternatives_spanish:
  - y los abatirá
  - y los hará pedazos
  lexicon: HALOT
  rationale: La forma piel de ברא aquí expresa cortar/hecho caer con espada. «Derribar» es una solución española sobria para una muerte violenta; se evita una paráfrasis más dura que no esté exigida por el texto base.
- source_word: בְּחַרְבוֹתָם
  english_pob_choice: with their swords
  chosen_spanish: con sus espadas
  alternatives_spanish:
  - por medio de sus espadas
  - a espada
  lexicon: HALOT
  rationale: El ב instrumental se vierte naturalmente con «con». «Espadas» mantiene el plural y el registro concreto del arma.
- source_word: בְּנֵיהֶם וּבְנוֹתֵיהֶם
  english_pob_choice: their sons and their daughters
  chosen_spanish: a sus hijos y a sus hijas
  alternatives_spanish:
  - a sus hijos e hijas
  - a su descendencia
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente hijos varones e hijas; el español conserva esa distinción con el paralelismo completo.
- source_word: יַהֲרֹגוּ
  english_pob_choice: they will kill
  chosen_spanish: matarán
  alternatives_spanish:
  - matarán a
  - darán muerte a
  lexicon: HALOT
  rationale: הרג es el verbo común para matar. «Matarán» es claro, directo y fiel al valor léxico.
- source_word: וּבָתֵּיהֶן
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus viviendas
  lexicon: HALOT
  rationale: בַּיִת refiere literalmente a casas. «Casas» preserva la concreción y la fuerza de la destrucción descrita.
- source_word: בָּאֵשׁ יִשְׂרֹפוּ
  english_pob_choice: burn their houses with fire
  chosen_spanish: quemarán ... con fuego
  alternatives_spanish:
  - prenderán fuego a ...
  - las incendiarán
  lexicon: HALOT
  rationale: La fórmula hebrea estándar de destrucción por fuego se mantiene con «quemarán ... con fuego», que reproduce la redundancia enfática del original.
theological_decisions:
- issue: Referencia de los pronombres femeninos en el pasaje
  english_pob_reading: Rendered as 'them' without re-identifying the women in the main text
  chosen_spanish_reading: Se mantienen pronombres de tercera persona sin añadir explicación alegórica en el cuerpo del verso
  alternative_spanish_readings:
  - reidentificar explícitamente a las mujeres de la alegoría
  - sustituir por una paráfrasis explicativa
  rationale: El hebreo continúa refiriéndose a las dos mujeres con pronombres femeninos; en español conviene no introducir una aclaración interpretativa dentro del verso, para preservar la cohesión del texto y dejar la identificación alegórica al contexto inmediato.
  doctrine_reference: Ezekiel 23 allegory; source-cohesion principle
translation_notes:
  revision_awareness: El borrador sigue de cerca el análisis auditado del inglés POB y el hebreo WLC. Se conserva la secuencia de violencia judicial (apedrear, espada, matar, quemar) y se evita suavizar el lenguaje. La única elección más abierta es «derribará» para ברא, manteniendo una opción española sobria sin perder la alternativa más intensa documentada en el audit trail.
  spanish_consistency_notes:
  - Se usó «asamblea» para קָהָל en sentido formal/judicial.
  - Se prefirió «espadas» en plural para reflejar el sufijo plural del hebreo.
  - Se mantuvo la distinción entre «hijos» y «hijas» por fidelidad al paralelismo hebreo.
  - «Casas» se conservó como imagen concreta, no «hogares», para no suavizar la destrucción.
