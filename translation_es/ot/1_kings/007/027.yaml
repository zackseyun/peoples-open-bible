translation:
  language: es
  text: Hizo diez soportes de bronce. La longitud de cada soporte era de cuatro codos[a], su anchura de cuatro codos y su altura de tres codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘bases’. El término hebreo se refiere a los soportes de bronce hechos para las vasijas del complejo del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT / BDB
  rationale: El wayyiqtol narra la acción siguiente en secuencia. En español, 'hizo' comunica de forma natural y fiel la acción sin forzar una conjunción repetida que el contexto ya da por sentada.
- source_word: הַמְּכֹנוֹת
  english_pob_choice: the ... stands
  chosen_spanish: bases
  alternatives_spanish:
  - soportes
  - pedestales
  - plataformas
  lexicon: HALOT
  rationale: El término se refiere en este contexto a los soportes de bronce para las vasijas del complejo del templo. 'Bases' conserva la opción léxica documentada por la POB en inglés y sigue siendo la forma más directa y transparente en español, aunque el término puede abarcar más que una simple base estática.
- source_word: עֶשֶׂר
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - '10'
  lexicon: HALOT
  rationale: Numeral cardinal directo, sin variación semántica.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En inventarios del templo, נְחֹשֶׁת suele designar el metal trabajado como bronce. 'Bronce' preserva el uso contextual estándar y el paralelismo con la auditable decisión inglesa.
- source_word: אַרְבַּע בָּאַמָּה אֹרֶךְ
  english_pob_choice: The length ... was four cubits
  chosen_spanish: La longitud ... era de cuatro codos
  alternatives_spanish:
  - Medía cuatro codos de longitud
  - Su longitud era de cuatro codos
  lexicon: HALOT
  rationale: Se mantiene la medida antigua 'codos' y se expresa la dimensión en español natural. 'Longitud' refleja con precisión אֹרֶךְ sin perder claridad.
- source_word: הַמְּכוֹנָה הָאֶחָת
  english_pob_choice: each stand
  chosen_spanish: cada base
  alternatives_spanish:
  - la base individual
  - cada uno de los soportes
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'la base/stand una', un distributivo idiomático. 'Cada base' comunica ese valor distributivo de manera idiomática y evita una traducción demasiado rígida como 'la base una'.
- source_word: וְאַרְבַּע בָּאַמָּה רָחְבָּהּ
  english_pob_choice: its width four cubits
  chosen_spanish: su anchura de cuatro codos
  alternatives_spanish:
  - y su anchura era de cuatro codos
  - de cuatro codos era su anchura
  lexicon: HALOT
  rationale: '''Anchura'' reproduce רָחְבָּהּ con un registro sobrio y bíblico adecuado. La estructura con el posesivo conserva la relación exacta con cada unidad.'
- source_word: וְשָׁלֹשׁ בָּאַמָּה קוֹמָתָהּ
  english_pob_choice: its height three cubits
  chosen_spanish: y su altura de tres codos
  alternatives_spanish:
  - y su altura era de tres codos
  - de tres codos era su altura
  lexicon: HALOT
  rationale: קוֹמָה en este contexto es la dimensión vertical. 'Altura' es la equivalencia española más clara y precisa.
- source_word: אַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - cubit[cito]
  lexicon: HALOT
  rationale: Se conserva la unidad antigua como 'codos', que es la forma establecida en español bíblico y no requiere conversión aproximada a medidas modernas.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido revisado del inglés POB: elimina artículos innecesarios, mantiene el conteo exacto de diez unidades y conserva la estructura de medidas con claridad natural en español.'
  spanish_consistency_notes:
  - Se usa 'bronce' para נְחֹשֶׁת, coherente con el estándar contextual del templo.
  - Se conserva 'codos' para אַמָּה, evitando una conversión moderna aproximada.
  - '''Bases'' se mantiene como término principal por fidelidad al audit trail inglés, con nota léxica para reconocer la alternativa tradicional ''soportes''.'
