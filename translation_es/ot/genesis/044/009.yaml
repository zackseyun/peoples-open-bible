translation:
  language: es
  text: Cualquiera de tus siervos con quien se encuentre[a], que muera[b]; y nosotros también seremos esclavos de mi señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente «de entre tus siervos», con sentido partitivo: uno del grupo. La misma raíz aparece más adelante en «esclavos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Aquel con quien se encuentre entre tus siervos».'
    reason: previous_rendering
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whichever / whoever
  chosen_spanish: Aquel con quien
  alternatives_spanish:
  - quienquiera que
  - el que
  lexicon: HALOT
  rationale: El hebreo introduce una relativa indefinida. En español, «Aquel con quien» conserva el valor abierto de referencia y suena natural en una cláusula pasiva con el complemento preposicional posterior.
- source_word: יִמָּצֵא
  english_pob_choice: it is found
  chosen_spanish: se encuentre
  alternatives_spanish:
  - sea hallado
  - se halle
  lexicon: HALOT
  rationale: El nifal expresa aquí que algo resulta hallado en posesión de alguien. «Se encuentre» comunica bien la pasiva sin recargar la frase.
- source_word: אִתּוֹ
  english_pob_choice: with
  chosen_spanish: con quien
  alternatives_spanish:
  - en poder de quien
  - junto a quien
  lexicon: HALOT
  rationale: En esta construcción el sentido es posesión o acompañamiento del objeto hallado. En español, «con quien» integra de modo natural el vínculo entre la cosa encontrada y la persona.
- source_word: מֵעֲבָדֶיךָ
  english_pob_choice: among your servants
  chosen_spanish: de entre tus siervos
  alternatives_spanish:
  - entre tus siervos
  - de tus siervos
  lexicon: HALOT
  rationale: 'El מן es partitivo: uno del grupo. Mantengo «siervos» en esta primera mención porque funciona como autodesignación deferente ante un gobernante, sin forzar todavía el matiz de esclavitud legal.'
- source_word: וָמֵת
  english_pob_choice: let him die
  chosen_spanish: que muera
  alternatives_spanish:
  - y muera
  - muera
  lexicon: HALOT
  rationale: La secuencia funciona como resultado o consecuencia propuesta. En español, «que muera» expresa de forma idiomática esa consecuencia volitiva/jussiva.
- source_word: וְגַם
  english_pob_choice: and we also
  chosen_spanish: y nosotros también
  alternatives_spanish:
  - y también nosotros
  - además nosotros
  lexicon: HALOT
  rationale: La partícula añade una consecuencia adicional. «Y nosotros también» preserva la suma enfática sin alterar el orden natural del español.
- source_word: נִהְיֶה
  english_pob_choice: will become
  chosen_spanish: seremos
  alternatives_spanish:
  - nos volveremos
  - llegaremos a ser
  lexicon: HALOT
  rationale: Aunque el hebreo puede enfatizar entrada en estado, en este contexto judicial «seremos» comunica con claridad la condición resultante. «Nos volveremos» sería más marcado y menos sobrio.
- source_word: לַאדֹנִי
  english_pob_choice: to my lord
  chosen_spanish: para mi señor
  alternatives_spanish:
  - a mi señor
  - para mi amo
  lexicon: HALOT
  rationale: El sufijo de primera persona exige «mi». «Señor» refleja el trato respetuoso de corte; «amo» sonarían demasiado duro en español y no es necesario aquí.
- source_word: לַעֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: HALOT
  rationale: Aquí la propuesta es una entrega punitiva a servidumbre, por lo que el matiz de esclavitud es central. «Esclavos» conserva esa fuerza lexical mejor que «siervos».
theological_decisions:
- issue: Doble uso de עבד/servicio frente a esclavitud
  english_pob_reading: '''servants'' in the partitive phrase and ''slaves'' in the final penalty clause'
  chosen_spanish_reading: «siervos» en la primera mención y «esclavos» en la cláusula final
  alternative_spanish_readings:
  - «esclavos» en ambas apariciones
  - «siervos» en ambas apariciones
  - «criados» en ambas apariciones
  rationale: El hebreo repite la misma raíz, pero el contexto cambia. La primera mención es una forma deferente de autodesignación ante autoridad; la segunda describe una penalidad de servidumbre real. Mantener la distinción evita borrar la tensión léxica documentada por el POB inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5; términos debatidos sobre δοῦλος/siervo-esclavo según contexto
translation_notes:
  revision_awareness: Tomo en cuenta la revisión que corrigió la redacción inglesa torpe de la cláusula relativa; en español se resuelve naturalmente con «Aquel con quien se encuentre…», manteniendo el valor partitivo de מֵעֲבָדֶיךָ y la consecuencia jussiva del final. La lectura más reciente indicó que no hacía falta un nuevo ajuste de fondo.
  spanish_consistency_notes:
  - Uso «Yahvé» cuando corresponda al Tetragrámaton; aquí no aparece.
  - Conservo «señor» como título humano de cortesía, no como referencia divina.
  - Mantengo la distinción semántica entre «siervos» y «esclavos» según el contexto.
  - Evito arcaísmos fuertes; el tono es sobrio y publicable en español actual.
