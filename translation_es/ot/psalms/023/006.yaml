base_translation:
  language: en
  yaml_path: translation/ot/psalms/023/006.yaml
  text: Surely goodness and steadfast love will pursue me all the days of my life[c][b][a], and I will dwell in the house of Yahweh for length of days.
  footnotes:
  - marker: a
    text: Or 'will follow me.' The Hebrew verb more vividly means 'pursue,' portraying God's goodness and steadfast love as actively chasing after the psalmist.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will return to the house of the LORD.' The Masoretic pointing supports 'I will dwell,' but 'return' is a longstanding alternative.
    reason: alternative_reading
  - marker: c
    text: Or 'forever.' The Hebrew literally reads 'for length of days,' an idiom for enduring duration.
    reason: alternative_reading
