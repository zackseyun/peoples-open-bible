translation:
  language: es
  text: Sé fuerte y valiente, porque harás que este pueblo herede[a] la tierra que juré darles a sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «darás a este pueblo la tierra como herencia». El verbo hebreo es causativo («harás que ... herede»), aunque también puede expresarse de manera más idiomática en español como dar o repartir una herencia.
    reason: lexical_alternative
  - marker: b
    text: «Sus padres» se refiere a los antepasados de Israel, especialmente a los patriarcas; alternativamente, «sus antepasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזַק
  english_pob_choice: Be strong
  chosen_spanish: Sé fuerte
  alternatives_spanish:
  - Mantente firme
  - Sé firme
  lexicon: HALOT
  rationale: El imperativo qal de חזק expresa fortaleza o firmeza exhortativa. «Sé fuerte» es natural en español y conserva el valor imperativo directo.
- source_word: וֶאֱמָץ
  english_pob_choice: and courageous
  chosen_spanish: y valiente
  alternatives_spanish:
  - y resuelto
  - y audaz
  lexicon: HALOT
  rationale: En esta pareja formularia, אמץ añade ánimo, valor o resolución. «Valiente» transmite bien la idea en español sin perder la fuerza exhortativa.
- source_word: תַּנְחִיל
  english_pob_choice: you shall cause ... to inherit
  chosen_spanish: harás que ... herede
  alternatives_spanish:
  - darás ... como herencia
  - repartirás ... como herencia
  lexicon: HALOT
  rationale: El hiphil de נחל es causativo. «Harás que ... herede» preserva mejor esa causatividad que una versión más libre como «darás ... como herencia».
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta nación
  - estas personas
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo con demostrativo. «Este pueblo» conserva el sentido colectivo y el tono pactual.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  - la tierra prometida
  lexicon: HALOT
  rationale: En Josué, la referencia es a la tierra prometida. «La tierra» es la forma más sobria y fiel al contexto.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - he jurado
  - prometí bajo juramento
  lexicon: HALOT
  rationale: El perfecto expresa el juramento divino de modo directo. «Juré» reproduce la simplicidad y solemnidad del original.
- source_word: לַאֲבוֹתָם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a sus padres» y se refiere a los patriarcas. Se mantiene esa forma por fidelidad lexical y por el valor pactal del término.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give to them
  chosen_spanish: darles
  alternatives_spanish:
  - dar a ellos
  - entregarles
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa el contenido del juramento. «Darles» es una forma idiomática y clara en español, sin perder el sentido de concesión.
theological_decisions:
- issue: Referencia patriarcal en אבותם
  english_pob_reading: their fathers refers to Israel's forefathers, especially the patriarchs; alternatively, their ancestors.
  chosen_spanish_reading: a sus padres refiere a los antepasados de Israel, especialmente a los patriarcas; también puede entenderse como «a sus antepasados».
  alternative_spanish_readings:
  - a sus antepasados
  - a sus progenitores
  rationale: Conservar «padres» sigue de cerca el hebreo y respeta el marcado masculino plural. La nota aclara el referente histórico-teológico sin neutralizar innecesariamente el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La comparación con el audit trail en inglés muestra una lectura estable sin revisiones sustantivas; se mantiene la fuerza del par imperativo y la causatividad de תַּנְחִיל, con una formulación española idiomática y fiel.
  spanish_consistency_notes:
  - Se conserva «Yahvé» cuando aparezca el tetragrámaton; aquí no ocurre.
  - Se mantiene el lenguaje de alianza/patrialcal con «padres» para אבותם, siguiendo la política de precisión de género del proyecto.
  - «La tierra» conserva la referencia geográfica y teológica sin añadir explicaciones que el versículo no expresa.
