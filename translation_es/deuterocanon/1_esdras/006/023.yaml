translation:
  language: es
  text: En el primer año del reinado de Ciro, el rey Ciro dio órdenes de que se edificara la casa del Señor en Jerusalén, donde ofrecen sacrificios continuos mediante fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'donde sacrifican con fuego continuo'. La frase griega es compacta y también puede describir el lugar como uno de ofrendas continuas por fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτους πρώτου βασιλεύοντος Κύρου
  english_pob_choice: In the first year of the reign of Cyrus
  chosen_spanish: En el primer año del reinado de Ciro
  alternatives_spanish:
  - En el primer año, cuando Ciro reinaba
  - En el primer año del reinado de Ciro
  lexicon: LSJ
  rationale: La fórmula de datación se vierte con naturalidad en español como una nota de año de reinado, conservando el valor temporal del griego sin calco pesado.
- source_word: βασιλεὺς Κῦρος
  english_pob_choice: King Cyrus
  chosen_spanish: el rey Ciro
  alternatives_spanish:
  - Ciro, el rey
  - el rey Ciro
  lexicon: LSJ
  rationale: Se conserva explícitamente el título real y el nombre propio en un orden natural para el español.
- source_word: προσέταξεν
  english_pob_choice: gave orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - decretó
  lexicon: LSJ
  rationale: La acción expresa una orden autoritativa; 'dio órdenes' reproduce el tono administrativo sin sobreespecificar un edicto formal.
- source_word: τὸν οἶκον τοῦ κυρίου
  english_pob_choice: the house of the Lord
  chosen_spanish: la casa del Señor
  alternatives_spanish:
  - el templo del Señor
  - la casa de Yahvé
  lexicon: LSJ
  rationale: Se mantiene el giro 'casa de' para reflejar οἶκος; 'Señor' sigue la decisión del contexto griego κυρίου en un texto deuterocanónico griego.
- source_word: τὸν ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - que está en Jerusalén
  - la que está en Jerusalén
  lexicon: LSJ
  rationale: La frase es simplemente locativa; en español basta la ubicación sin reproducir la estructura atributiva completa.
- source_word: οἰκοδομῆσαι
  english_pob_choice: should be built
  chosen_spanish: se edificara
  alternatives_spanish:
  - fuera construido
  - se construyera
  lexicon: LSJ
  rationale: El infinitivo de contenido tras una orden se expresa con un subjuntivo pasivo natural en español; 'edificara' conserva el registro bíblico y el sentido de construcción del santuario.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el lugar donde
  lexicon: LSJ
  rationale: La relativa locativa se traduce de forma directa y fluida.
- source_word: ἐπιθύουσιν
  english_pob_choice: they offer sacrifices
  chosen_spanish: ofrecen sacrificios
  alternatives_spanish:
  - sacrifican
  - hacen sacrificios
  lexicon: LSJ
  rationale: Se explicita el sentido cultual del verbo compuesto con una expresión natural en español.
- source_word: διὰ πυρὸς
  english_pob_choice: by fire
  chosen_spanish: por fuego
  alternatives_spanish:
  - mediante fuego
  - con fuego
  lexicon: LSJ
  rationale: '''Por fuego'' conserva la imagen y la relación instrumental del griego, manteniendo la compacidad de la frase.'
- source_word: ἐνδελεχοῦς
  english_pob_choice: continual
  chosen_spanish: continuos
  alternatives_spanish:
  - permanentes
  - constantes
  lexicon: LSJ
  rationale: El adjetivo comunica continuidad o constancia; 'continuos' es el equivalente más directo y transparente en español.
theological_decisions:
- issue: Renderizado de κύριος en un texto griego deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Dueño
  rationale: Como el texto base es griego y usa κυρίου, se conserva la equivalencia tradicional 'Señor' en el sentido del inglés POB 'Lord', sin introducir la convención de sustitución del Nombre divino propio de traducciones hebreas.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Se corrigió el problema previo eliminando la nota al pie no anclada. La redacción española ahora no contiene marcadores de nota, por lo que no quedan pies sin referencia en el texto.
  spanish_consistency_notes:
  - Se prefirió 'casa del Señor' para mantener la terminología cultual ya auditada en el contexto griego.
  - '''Por fuego'' preserva la compactación del sintagma διὰ πυρὸς sin añadir glosa interpretativa.'
  - La puntuación española sigue el flujo de una sola oración narrativa, coherente con el registro de la POB.
