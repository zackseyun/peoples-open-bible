review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia ritual y la mayoría de las decisiones léxicas del hebreo: la vestidura de lino, la prenda interior, la remoción de las cenizas y su colocación junto al altar. Sin embargo, la cláusula relativa sobre las cenizas está formulada de manera poco fiel y poco natural en español: «las cenizas de la ofrenda quemada, a la que el fuego consumió» hace que el relativo parezca referirse a la ofrenda misma de forma torpe. El hebreo describe las cenizas como procedentes de la ofrenda quemada que el fuego consumió sobre el altar, no como una aposición separada.'
  spanish_quality_summary: El texto es mayormente claro, pero «calzoncillos» suena demasiado coloquial para el registro bíblico-digno solicitado. «Ropa interior de lino» o «prendas interiores de lino» es más natural y eclesialmente legible. También conviene reparar la sintaxis de la frase de las cenizas para evitar tropiezo. «Vestido de lino» es entendible, pero «vestidura de lino» encaja mejor con el contexto sacerdotal y con el rationale documentado.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones cultuales están en general bien encaminadas. Recomiendo alinear mejor מִדּוֹ con «vestidura» y מִכְנְסֵי בַד con una expresión menos coloquial que «calzoncillos», manteniendo «ofrenda quemada» si se desea evitar «holocausto».
  issues:
  - severity: medium
    issue: «calzoncillos de lino» es demasiado coloquial para el registro objetivo.
    rationale: Aunque semánticamente apunta a una prenda interior, en español general y eclesial suena doméstico o informal. «Prendas interiores de lino» conserva la función y mejora la dignidad del estilo.
  - severity: high
    issue: La cláusula «a la que el fuego consumió sobre el altar» está mal construida y oscurece la relación sintáctica.
    rationale: El relativo femenino singular después de coma produce una lectura forzada donde el fuego consume a «la ofrenda» como inciso mal unido a «cenizas». Una formulación integrada como «las cenizas de la ofrenda quemada que el fuego consumió sobre el altar» representa mejor el hebreo y el inglés auditado.
  - severity: low
    issue: «vestido de lino» es menos preciso en registro cultual que «vestidura de lino».
    rationale: «Vestido» puede sonar más cotidiano o femenino en algunos contextos hispanos. «Vestidura» conserva mejor la neutralidad ritual sin sobreespecificar el tipo de prenda.
  revised_spanish_text: Y el sacerdote se pondrá su vestidura de lino[a], y se pondrá prendas interiores de lino sobre su cuerpo[b]; y quitará las cenizas de la ofrenda quemada que el fuego consumió sobre el altar[c], y las pondrá junto al altar.
  revised_footnotes:
  - marker: a
    text: «Vestidura» traduce aquí una prenda ritual general; el hebreo nombra una vestidura sacerdotal específica, pero el texto no precisa su corte.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre su carne». Se traduce «sobre su cuerpo» por naturalidad en español, conservando la idea de prenda llevada directamente sobre la piel.
    reason: lexical_alternative
  - marker: c
    text: La frase hebrea es compacta y también puede expresarse, de manera más literal, como «las cenizas que el fuego consumió de la ofrenda quemada».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar fidelidad sintáctica y registro: «vestidura» encaja mejor con contexto sacerdotal; «prendas interiores» evita el tono coloquial de «calzoncillos»; y la cláusula de las cenizas se rehace para reflejar de forma natural el hebreo y la revisión inglesa auditada.'
