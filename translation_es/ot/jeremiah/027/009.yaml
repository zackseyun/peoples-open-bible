translation:
  language: es
  text: 'Pero ustedes[a] no escuchen a sus profetas, a sus adivinos, a sus soñadores, a sus agoreros ni a sus hechiceros, que les dicen: «No servirán al rey de Babilonia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «sus sueños»; el hebreo dice formalmente «sueños», pero en esta lista probablemente designa a quienes afirman recibir sueños reveladores.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Mas ustedes
  - En cuanto a ustedes
  lexicon: HALOT
  rationale: El contraste adversativo del contexto se expresa con naturalidad en español con «Pero ustedes». El pronombre explícito conserva el énfasis del hebreo.
- source_word: אַל תִּשְׁמְעוּ אֶל
  english_pob_choice: do not listen to
  chosen_spanish: no escuchen a
  alternatives_spanish:
  - no oigan a
  - no presten oído a
  - no atiendan a
  lexicon: HALOT
  rationale: שׁמע con אֶל pide la idea de escuchar/atender a alguien. «No escuchen a» suena natural y mantiene la prohibición sin convertirla en obediencia técnica.
- source_word: נְבִיאֵיכֶם
  english_pob_choice: your prophets
  chosen_spanish: a sus profetas
  alternatives_spanish:
  - a sus profetas
  lexicon: HALOT
  rationale: «Profetas» es el equivalente directo de נביאים. El posesivo se conserva para mostrar que se trata de sus propios mediadores religiosos, no de profetas aprobados por Yahvé.
- source_word: קֹסְמֵיכֶם
  english_pob_choice: your diviners
  chosen_spanish: a sus adivinos
  alternatives_spanish:
  - a sus divinadores
  - a sus adivinos de suertes
  lexicon: HALOT
  rationale: קסם se refiere a adivinación. «Adivinos» comunica el valor de forma breve y fiel en español contemporáneo.
- source_word: חֲלֹמֹתֵיכֶם
  english_pob_choice: your dreamers
  chosen_spanish: a sus soñadores
  alternatives_spanish:
  - a sus intérpretes de sueños
  - a sus soñadores
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sueños», pero aquí funciona metonímicamente para quienes presumen mensajes por sueños. «Soñadores» conserva la lista de personas de manera paralela, como en la solución inglesa.
- source_word: עֹנְנֵיכֶם
  english_pob_choice: your soothsayers
  chosen_spanish: a sus agoreros
  alternatives_spanish:
  - a sus adivinos por presagios
  - a sus augures
  lexicon: HALOT
  rationale: עֹנְנִים apunta a lectura de presagios/omenes. «Agoreros» transmite esa práctica en español sin tecnicismo excesivo.
- source_word: כַּשָּׁפֵיכֶם
  english_pob_choice: your sorcerers
  chosen_spanish: a sus hechiceros
  alternatives_spanish:
  - a sus magos
  - a sus hechiceros
  lexicon: HALOT
  rationale: כשף remite a hechicería o magia. «Hechiceros» es una equivalencia directa y de registro adecuado para la denuncia profética.
- source_word: אֲשֶׁר הֵם אֹמְרִים אֲלֵיכֶם לֵאמֹר
  english_pob_choice: who are saying to you, ‘...’
  chosen_spanish: 'que les dicen:'
  alternatives_spanish:
  - 'que les están diciendo:'
  - 'que les dicen:'
  - 'los cuales les dicen:'
  lexicon: HALOT
  rationale: La cláusula relativa introduce el contenido de su mensaje. En español, el presente simple comunica bien la acción reiterada y evita sobrecargar la frase.
- source_word: לֹא תַעַבְדוּ
  english_pob_choice: You will not serve
  chosen_spanish: No servirán
  alternatives_spanish:
  - No servirán
  - No servirán ustedes
  - Ustedes no servirán
  lexicon: HALOT
  rationale: 'En discurso reportado, el imperfecto tiene valor predictivo: el mensaje falso promete que no ocurrirá la servidumbre a Babilonia. Por eso se traduce como futuro, no como imperativo.'
- source_word: אֶת מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - al rey de Babilonia
  - al rey de Babel
  lexicon: HALOT
  rationale: La construcción se vierte con el orden natural del español. «Babilonia» mantiene la referencia política e histórica con claridad.
theological_decisions:
- issue: Cómo presentar a los practicantes ilegítimos sin añadir una etiqueta interpretativa que el verso no pone explícitamente
  english_pob_reading: Retain the labels 'prophets, diviners, dreamers, soothsayers, sorcerers' as the text presents them, with the prohibition 'do not listen' making their unreliability clear.
  chosen_spanish_reading: Mantener «profetas, adivinos, soñadores, agoreros y hechiceros», dejando que la prohibición «no escuchen» muestre su falta de fiabilidad.
  alternative_spanish_readings:
  - «falsos profetas»
  - «supuestos profetas»
  rationale: El hebreo nombra a estos grupos sin calificarlos aquí como falsos; el contexto profético ya los desautoriza. Añadir un adjetivo interpretativo iría más allá del texto base.
  doctrine_reference: 'Principio POB: no importar glosas doctrinales donde el texto no las formula; dejar que el contexto del pasaje haga la evaluación.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se reportan cambios necesarios y la solución inglesa mantiene la lectura predictiva de לֹא תַעַבְדוּ dentro del discurso citado.'
  spanish_consistency_notes:
  - Se mantiene el pronombre explícito «ustedes» para reflejar el hebreo enfático.
  - Se conserva la secuencia de cinco grupos con paralelismo léxico claro.
  - «Babilonia» se usa para el topónimo y «rey» para el sustantivo en orden español natural.
  - La nota de pie corresponde solo a la ambigüedad de חֲלֹמֹתֵיכֶם y se ancla en «soñadores» con [a].
