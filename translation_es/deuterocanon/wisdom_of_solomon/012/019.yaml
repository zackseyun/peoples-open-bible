revisions:
- from: Pero por tales obras enseñaste a tu pueblo que el justo debe ser humano[a], y llenaste de buena esperanza a tus hijos[b], porque das arrepentimiento por los pecados.
  to: Pero por tales obras enseñaste a tu pueblo que el justo debe ser benévolo con las personas[a], y llenaste de buena esperanza a tus hijos[b], porque concedes arrepentimiento por los pecados.
  rationale: Se sustituyó «humano» por «benévolo con las personas» para comunicar con claridad el valor de φιλάνθρωπον en español. Se mantuvo «tus hijos» en el texto principal por fidelidad a υἱούς y se corrigió la nota para reflejar la alternativa representativa documentada en la auditoría inglesa. Se ajustó «das arrepentimiento» a «concedes arrepentimiento» por mayor naturalidad sin cambiar el sentido teológico.
