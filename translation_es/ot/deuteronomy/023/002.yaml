translation:
  language: es
  text: Ningún hombre con testículos aplastados o con el pene cortado podrá entrar en la asamblea de Yahvé[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con mayor formalidad: «Ningún varón cuyos testículos estén aplastados o cuyo pene esté cortado podrá entrar en la asamblea de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: «La asamblea de Yahvé» puede referirse a la participación formal en la comunidad del pacto de Israel; el alcance exacto de la exclusión es debatido.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יָבֹא
  english_pob_choice: may enter
  chosen_spanish: podrá entrar
  alternatives_spanish:
  - no entrará
  - no podrá entrar
  - entrará
  lexicon: HALOT
  rationale: La forma hebrea expresa prohibición de acceso; en español legal-natural, «podrá entrar» con negación reproduce bien la restricción normativa sin volver la frase artificial.
- source_word: פְצוּעַ דַּכָּא
  english_pob_choice: with crushed testicles
  chosen_spanish: con testículos aplastados
  alternatives_spanish:
  - con testículos machacados
  - con los testículos triturados
  - herido en los testículos
  lexicon: HALOT
  rationale: El hebreo apunta de manera específica al daño por aplastamiento de los testículos. «Aplastados» comunica esa violencia de forma directa y clara en español, manteniendo el referente anatómico preciso.
- source_word: וּכְרוּת שָׁפְכָה
  english_pob_choice: or a severed penis
  chosen_spanish: o con el pene cortado
  alternatives_spanish:
  - o con el miembro cortado
  - o con el órgano cortado
  - o con el pene amputado
  lexicon: HALOT
  rationale: La expresión hebrea designa el órgano masculino cortado. «Pene» es el término más directo y preciso en español; «cortado» conserva la acción del texto sin suavizarla.
- source_word: בִּקְהַל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad reunida
  - la reunión
  lexicon: HALOT
  rationale: «Asamblea» es una equivalencia transparente y sobria para קהל en contexto legal/covenantal, y evita cargar el texto con connotaciones eclesiales no garantizadas por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en la forma de uso del proyecto, «Yahvé», en lugar de sustituirlo por un título.
- source_word: implicit male referent of the participial phrases
  english_pob_choice: man
  chosen_spanish: Ningún hombre
  alternatives_spanish:
  - Nadie
  - ninguna persona
  - ningún varón
  lexicon: HALOT
  rationale: El hebreo se refiere a un varón afectado por estas lesiones; «hombre» mantiene esa referencia masculina explícita y es natural en español para una norma legal.
theological_decisions:
- issue: Alcance de «la asamblea de Yahvé»
  english_pob_reading: Rendered as exclusion from the covenant assembly/community sphere without specifying later ecclesial or salvific implications.
  chosen_spanish_reading: Se traduce de forma literal como «la asamblea de Yahvé», sin precisar si se trata de participación litúrgica, membresía comunitaria o alguna otra esfera jurídica.
  alternative_spanish_readings:
  - la congregación de Yahvé
  - la comunidad de Yahvé
  - la asamblea del Señor
  rationale: El hebreo nombra la esfera de exclusión, pero no define por sí mismo todas sus implicaciones. La traducción preserva esa tensión sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica y jurídica del texto sin ampliarla.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios y el acuerdo de revisión fue alto. Se mantiene la solución directa para los términos anatómicos y la frase «la asamblea de Yahvé» sin reinterpretarla.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con el estándar del proyecto para el Tetragrámaton.
  - Se evitó «SEÑOR» como sustitución del nombre divino.
  - Se conservó la estructura disyuntiva del hebreo con «o».
  - El registro es jurídico y sobrio, acorde con una norma de exclusión en contexto legal-covenantal.
