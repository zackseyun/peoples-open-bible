theological_decisions:
- issue: Whether the verse teaches that hostile opposition against Zion/Jerusalem is divinely commissioned
  chosen_reading: The verse denies that such hostile gathering is from God and promises the downfall of the aggressor.
  alternative_readings:
  - The gathering is merely 'not by my aid' rather than wholly 'not from me'
  - The final clause could be read more neutrally as an attacker 'falling upon' you
  rationale: The immediate context (vv. 14, 17) emphasizes protection and vindication. The wording should not imply divine sponsorship of the attack or the success of the aggressor. The translation preserves the denial of divine source and the promise of the enemy's defeat.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
