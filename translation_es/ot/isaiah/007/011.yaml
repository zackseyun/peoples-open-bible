translation:
  language: es
  text: 'Pide para ti una señal de parte de Yahvé tu Dios: hazla tan profunda como el Seol, o tan alta como el cielo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “hazla profunda ... o hazla alta hacia arriba”; “el cielo” explicita el extremo superior implícito en el contraste con el Seol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאַל
  english_pob_choice: Ask
  chosen_spanish: Pide
  alternatives_spanish:
  - Pide
  - Solicita
  lexicon: HALOT
  rationale: El imperativo pide conserva el valor directo de la orden a Acaz y suena natural en español. Solicita es posible, pero menos inmediato y más marcado formalmente.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para ti
  lexicon: HALOT
  rationale: La forma pronominal añade énfasis personal. Para ti transmite ese matiz sin sonar forzado; para ti mismo enfatiza más la reflexividad, pero aquí sería más pesado.
- source_word: א֔וֹת
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - una señal
  - una muestra
  - un signo
  lexicon: HALOT
  rationale: Señal es el término más natural y claro en español bíblico contemporáneo para un acto confirmatorio de Dios. Signo es válido, pero menos idiomático en este contexto.
- source_word: מֵ/עִ֖ם
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: De parte de explicita la procedencia personal desde Yahvé sin sonar mecánico. De sería más literal, pero menos enfático respecto al origen divino de la señal.
- source_word: יְהוָ֣ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como Yahvé, según la convención del proyecto para יהוה. Jehová queda descartado por no corresponder al criterio editorial adoptado.
- source_word: אֱלֹהֶ֑י/ךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - tu Dios personal
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa como tu Dios. Personal no hace falta y podría introducir un matiz no explícito en el hebreo.
- source_word: הַעְמֵ֣ק שְׁאָ֔לָה
  english_pob_choice: make it as deep as Sheol
  chosen_spanish: hazla tan profunda como el Seol
  alternatives_spanish:
  - hazla tan profunda como el Seol
  - hazla tan honda como el Seol
  - hazla tan profunda como el sepulcro
  lexicon: HALOT
  rationale: El hebreo expresa profundidad extrema; profunda comunica bien esa intensificación. Seol se mantiene como término técnico tradicional para שְׁאוֹל, evitando reemplazarlo por sepulcro, que perdería su carga semántica y teológica.
- source_word: א֖וֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o
  lexicon: HALOT
  rationale: La conjunción disyuntiva se traduce de forma directa y sin ambigüedad.
- source_word: הַגְבֵּ֥הַּ
  english_pob_choice: as high as
  chosen_spanish: tan alta como
  alternatives_spanish:
  - tan alta como
  - hazla tan alta como
  - eleva hasta
  lexicon: HALOT
  rationale: 'El hebreo exige un paralelo con la primera mitad: altura extrema. Tan alta como mantiene la simetría del merismo y fluye con naturalidad en español.'
- source_word: לְ/מָֽעְלָ/ה
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - arriba
  - en lo alto
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente hacia arriba / en lo alto, el contexto de contraste con el Seol permite explicitar el extremo superior como el cielo, siguiendo la decisión POB en inglés. Se mantiene la naturalidad del merismo sin perder el sentido literal, que queda implícito.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo contiene el Tetragramatón. Se preserva el nombre propio divino como Yahvé, en continuidad con la política del proyecto y evitando la sustitución por un título genérico como Señor.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Merismo de profundidad/altura en la señal solicitada
  english_pob_reading: make it as deep as Sheol or as high as heaven
  chosen_spanish_reading: hazla tan profunda como el Seol, o tan alta como el cielo
  alternative_spanish_readings:
  - hazla tan honda como el Seol, o tan alta como el cielo
  - hazla tan profunda como el Seol, o tan alta como lo alto
  rationale: El hebreo contrapone dos extremos espaciales para expresar amplitud ilimitada de la señal. La formulación española conserva el merismo y explicita el extremo superior como cielo, tal como hace la versión inglesa, sin perder la base literal de 'hacia arriba / en lo alto'.
  doctrine_reference: 'DOCTRINE.md: Figurative language — merism and spatial extremes'
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo de WLC y el criterio auditado de la POB en inglés: mantiene el nombre divino Yahvé, conserva la señal como petición libre a Acaz y reproduce el merismo profundidad/altura con una explicitación natural del extremo superior. No se detectan revisiones previas que alteren esta unidad.'
  spanish_consistency_notes:
  - Se usa Yahvé de manera consistente para יהוה, no SEÑOR.
  - Se conserva Seol como término técnico para שְׁאוֹל, evitando sustituciones interpretativas más blandas.
  - 'La nota al pie marca la única explicitación interpretativa importante: el hebreo dice ''hacia arriba/en lo alto'' y la traducción principal dice ''el cielo'' por claridad estilística.'
