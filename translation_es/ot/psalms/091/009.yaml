translation:
  language: es
  text: Porque tú, Yahvé, eres mi refugio; has hecho del Altísimo tu morada.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una lectura común del hebreo difícil: «Porque has dicho: “Yahvé es mi refugio”, y has hecho del Altísimo tu morada».

      '
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal del verso de manera natural en español, conservando el valor explicativo que la POB inglesa dio con “Because”.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  lexicon: HALOT
  rationale: El pronombre explícito mantiene el énfasis del hebreo. Se usa la forma no marcada y cercana del texto poético, coherente con el paralelismo del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, siguiendo la pauta del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: מַחְסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi amparo
  - mi abrigo
  lexicon: HALOT
  rationale: “Refugio” reproduce bien el campo semántico de מַחְסֶה/מַחְסִי y mantiene el lenguaje de protección típico de los Salmos.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Muy Alto
  lexicon: HALOT
  rationale: Es el título divino natural en español y conserva el valor de designación de Dios con artículo definido.
- source_word: שַׂמְתָּ
  english_pob_choice: you have made
  chosen_spanish: has puesto
  alternatives_spanish:
  - has hecho
  - has establecido
  lexicon: HALOT
  rationale: Aquí שׂוּם expresa la idea de poner o establecer algo como algo. “Has puesto” suena natural en español y mantiene la relación con el complemento de objeto.
- source_word: מְעוֹנֶךָ
  english_pob_choice: your dwelling place
  chosen_spanish: tu morada
  alternatives_spanish:
  - tu habitación
  - tu lugar de residencia
  lexicon: HALOT
  rationale: “Morada” comunica la idea de residencia/habitación de forma digna y poética. Se prefiere “tu” para respetar el paralelismo de segunda persona en el hebreo.
theological_decisions:
- issue: Sintaxis difícil de Salmo 91:9
  english_pob_reading: 'The verse is rendered as direct address to the faithful person: ''Because you, O Yahweh, are my refuge, you have made the Most High your dwelling place.'' The English footnote preserves the common alternative: ''Because you have said, “The LORD is my refuge,” and have made the Most High your dwelling place.'''
  chosen_spanish_reading: 'Se conserva la lectura principal como dirección directa: “Porque tú, Yahvé, eres mi refugio; has puesto al Altísimo como tu morada.”'
  alternative_spanish_readings:
  - 'Porque has dicho: «Yahvé es mi refugio», y has puesto al Altísimo como tu morada.'
  - 'Porque tú has dicho: «Yahvé es mi refugio», y has puesto al Altísimo como tu morada.'
  rationale: El hebreo masorético es sintácticamente compacto y permite más de una solución. La versión principal sigue la forma más cercana al texto recibido sin rellenar un verbo implícito; la nota conserva la alternativa común de la tradición de traducción. Se preserva así la tensión textual en vez de resolverla artificialmente.
  doctrine_reference: Primacía del texto original y preservación de lecturas alternativas cuando el hebreo es difícil.
translation_notes:
  revision_awareness: La redacción en español sigue la revisión final del inglés al mantener una estructura en dos miembros, pero adapta la puntuación para una lectura fluida en español. Dado que el hebreo presenta una dificultad sintáctica real, la nota conserva la alternativa interpretativa documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa “Yahvé” de forma consistente para el Tetragrámaton, conforme a la terminología del proyecto.
  - Se preserva la distinción semántica entre “refugio” y “morada” para evitar aplanar los dos sustantivos hebreos.
  - Se mantiene la segunda persona explícita en ambos miembros para reflejar el paralelismo y la posible ambigüedad del hebreo.
  - La puntuación con punto y coma refleja dos cola poéticos relacionados sin forzar una subordinación excesiva.
