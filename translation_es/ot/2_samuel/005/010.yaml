translation:
  language: es
  text: Y David iba avanzando[a] y se hacía cada vez más grande, y Yahvé, el Dios de las huestes, estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «iba creciendo más y más». La expresión hebrea combina un verbo finito con un infinitivo absoluto para enfatizar un aumento continuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went on
  chosen_spanish: fue avanzando
  alternatives_spanish:
  - anduvo
  - siguió adelante
  lexicon: HALOT
  rationale: El hebreo usa un verbo finito con infinitivo absoluto para expresar progreso continuado. «Fue avanzando» conserva el movimiento y el valor aspectual progresivo sin sonar demasiado literal en español.
- source_word: הָל֣וֹךְ וְגָד֑וֹל
  english_pob_choice: growing greater
  chosen_spanish: creciendo en grandeza
  alternatives_spanish:
  - y haciéndose cada vez más grande
  - creciendo y volviéndose mayor
  lexicon: HALOT
  rationale: La construcción intensifica la idea de aumento continuo. «Creciendo en grandeza» transmite ese crecimiento sostenido y mantiene la fuerza del original sin forzar una repetición pesada.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: Nombre propio estándar
  rationale: Nombre propio ya establecido en español bíblico; no requiere adaptación adicional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrámaton como «Yahvé» en español, preservando el nombre divino personal en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los hosts
  - el Dios de las huestes
  lexicon: HALOT
  rationale: «צבאות» puede referirse a ejércitos/huestes. En español, «ejércitos» comunica con claridad la amplitud del título divino y evita un anglicismo o una expresión poco natural.
- source_word: עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estaba con David
  lexicon: HALOT
  rationale: La frase expresa presencia acompañante. «Estaba con él» conserva el pronombre hebreo y su referencia inmediata a David.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La línea del proyecto exige traducir יהוה como el nombre propio divino, no como sustitución reverencial. «Yahvé» es la forma española auditada que mejor preserva esa decisión.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de אֱלֹהֵי צְבָאוֹת
  english_pob_reading: the God of hosts
  chosen_spanish_reading: el Dios de los ejércitos
  alternative_spanish_readings:
  - el Dios de las huestes
  - el Dios de los hosts
  rationale: «Hosts» en inglés se conserva en español bíblico mejor como «ejércitos» o «huestes». Se eligió «ejércitos» por claridad y naturalidad, manteniendo la soberanía de Dios sobre las fuerzas celestiales o militares según el contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: El contexto inglés ya resolvió la idiomaticidad de la construcción hebrea como incremento continuo y fijó la traducción del nombre divino como Yahweh. La versión española conserva esas dos decisiones, adaptando 'hosts' a un equivalente natural en español sin perder el matiz de título divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se evita «Señor» como sustituto del nombre divino.
  - «estaba con él» conserva el pronombre de cercanía referencial del hebreo.
  - La nota al pie marca la alternativa aspectual del hebreo sin introducir lecturas no atestiguadas.
