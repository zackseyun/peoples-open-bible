    issue: La nota [a] está anclada a «creyó» pero el rastro inglés usa la nota a para פקד («visited / attended to / took notice of»).
    rationale: Esto altera la documentación auditada y hace que la nota española no preserve la misma decisión léxica significativa del original/POB.
  - severity: medium
    issue: La nota [a] sobre «creyó» introduce una alternativa no documentada como nota en el POB inglés.
    rationale: Aunque «creyeron» es una observación posible por concordancia semántica con el colectivo, no corresponde a una nota preservada en el audit trail y no es necesaria para resolver una ambigüedad nueva en español.
  - severity: low
