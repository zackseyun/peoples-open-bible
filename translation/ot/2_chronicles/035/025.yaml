id: 2CH.35.25
reference: 2 Chronicles 35:25
source:
  edition: WLC
  text: וַ/יְקוֹנֵ֣ן יִרְמְיָהוּ֮ עַל יֹאשִׁיָּהוּ֒ וַ/יֹּאמְר֣וּ כָֽל הַ/שָּׁרִ֣ים וְ֠/הַ/שָּׁרוֹת בְּ/קִינ֨וֹתֵי/הֶ֤ם עַל יֹאשִׁיָּ֨הוּ֙ עַד הַ/יּ֔וֹם וַ/יִּתְּנ֥וּ/ם לְ/חֹ֖ק עַל יִשְׂרָאֵ֑ל וְ/הִנָּ֥/ם כְּתוּבִ֖ים עַל הַ/קִּינֽוֹת־־׀־־־־׃
translation:
  text: And Jeremiah lamented for Josiah[a], and all the male singers and female singers speak of Josiah in their laments to this day. And they made them a statute in Israel; behold, they are written in the Laments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'written in the laments,' if the phrase refers generically to lament songs rather than to a specific collection titled Laments.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְקוֹנֵן
  chosen: lamented
  alternatives:
  - sang a lament
  - chanted a dirge
  - composed a lament
  lexicon: HALOT
  rationale: The verb from קונן denotes making or uttering a lament/dirge, especially in mourning for the dead. 'Lamented' is natural English and preserves the mourning sense without over-specifying whether Jeremiah composed or merely performed the lament.
- source_word: עַל
  chosen: for
  alternatives:
  - over
  - concerning
  lexicon: HALOT
  rationale: With lament language and a deceased person, English idiom prefers 'lamented for Josiah.' 'Over' is possible but slightly less natural here.
- source_word: הַשָּׁרִים וְהַשָּׁרוֹת
  chosen: the male singers and female singers
  alternatives:
  - the singing men and singing women
  - the singers, both men and women
  lexicon: HALOT
  rationale: These participial forms from שׁיר refer to singers, not 'officials/princes.' The gender distinction is explicit in Hebrew and should be preserved per the gender-accurate policy.
- source_word: וַיֹּאמְרוּ
  chosen: speak of
  alternatives:
  - spoke of
  - sang of
  - said
  lexicon: HALOT
  rationale: Although the verb is literally 'said,' in context with singers and laments it refers to their ongoing recitation or singing about Josiah. Present tense in English reflects the following 'to this day' and the continuing custom.
- source_word: בְּקִינוֹתֵיהֶם
  chosen: in their laments
  alternatives:
  - in their dirges
  - with their laments
  lexicon: HALOT
  rationale: קִינוֹת are funeral laments/dirges. 'Laments' is clear modern English; 'dirges' is accurate but less common.
- source_word: עַד הַיּוֹם
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering indicating the practice continued up to the writer's present.
- source_word: וַיִּתְּנוּם לְחֹק
  chosen: They made them a statute
  alternatives:
  - they established them as a custom
  - they made them an ordinance
  lexicon: HALOT
  rationale: The pronoun likely refers to the laments, and חֹק can denote a fixed statute, ordinance, or prescribed custom. 'Made them a statute' stays close to the Hebrew while remaining understandable.
- source_word: עַל יִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - for Israel
  - over Israel
  lexicon: HALOT
  rationale: 'Here עַל with חֹק is best rendered idiomatically as the sphere in which the statute/custom applied: ''in Israel.'''
- source_word: וְהִנָּם
  chosen: and behold, they are
  alternatives:
  - and indeed they are
  - and see, they are
  lexicon: HALOT
  rationale: הִנֵּה/וְהִנָּם draws attention to the following statement. 'Behold' preserves the deictic force and suits the elevated narrative style.
- source_word: כְּתוּבִים עַל הַקִּינוֹת
  chosen: written in the Laments
  alternatives:
  - written in the laments
  - recorded among the laments
  lexicon: HALOT
  rationale: The phrase likely refers to a known collection of laments, hence capitalized 'the Laments' in English to signal a title-like reference. A more generic reading remains possible and is preserved in a footnote.
