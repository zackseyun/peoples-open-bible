translation:
  language: es
  text: Así que Moisés mandó a Eleazar el sacerdote, a Josué hijo de Nun y a los jefes de las casas paternas de las tribus de los hijos de Israel[b] acerca de ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a ellos», entendiendo el pronombre como referido a los líderes nombrados en el versículo, y no a las tribus mencionadas antes.
    reason: alternative_reading
  - marker: b
    text: Expresión administrativa hebrea para los líderes de clan y de tribu de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - comandó
  lexicon: HALOT
  rationale: צוה expresa la emisión de una orden o instrucción autoritativa. En español, "mandó" comunica esa fuerza con naturalidad y sin sonar arcaico; "ordenó" también sería posible, pero "mandó" encaja bien en un contexto administrativo.
- source_word: לָהֶם
  english_pob_choice: concerning them
  chosen_spanish: acerca de ellos
  alternatives_spanish:
  - sobre ellos
  - en cuanto a ellos
  lexicon: HALOT
  rationale: El pronombre apunta a las tribus mencionadas antes, mientras que los destinatarios inmediatos son Eleazar, Josué y los jefes. "Acerca de ellos" conserva esa relación indirecta sin forzar una estructura poco natural en español.
- source_word: אֵת אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: to Eleazar the priest
  chosen_spanish: a Eleazar el sacerdote
  alternatives_spanish:
  - a Eleazar, el sacerdote
  - a Eleazar, sacerdote
  lexicon: HALOT
  rationale: El marcador de objeto con צוה introduce a la persona encargada de ejecutar la orden. En español, la preposición "a" expresa adecuadamente la relación personal; "sacerdote" traduce הַכֹּהֵן de modo directo y fiel.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué hijo de Nun
  alternatives_spanish:
  - Josué, hijo de Nun
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en forma habitual en español y el patronímico de manera concisa y fiel. "Hijo de Nun" reproduce correctamente el hebreo sin añadir interpretaciones.
- source_word: רָאשֵׁי אֲבוֹת הַמַּטּוֹת
  english_pob_choice: the heads of the fathers’ houses of the tribes
  chosen_spanish: los jefes de las casas paternas de las tribus
  alternatives_spanish:
  - los cabezas de las casas paternas de las tribus
  - los jefes de los clanes de las tribus
  lexicon: HALOT
  rationale: La expresión hebrea es administrativa y compacta. "Jefes" traduce רָאשֵׁי; "casas paternas" mantiene la imagen de אֲבוֹת; y "de las tribus" conserva la relación organizativa del texto. "Clanes" aclararía el sentido, pero sería más interpretativo.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - de los israelitas
  lexicon: HALOT
  rationale: Aquí la frase funciona como una designación de pertenencia dentro de la estructura tribal. "De Israel" preserva el sentido y suena más natural que una repetición literal; las alternativas más explícitas siguen siendo posibles, pero menos fluidas en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió "commanded" y reordenó "concerning them" para reflejar mejor la sintaxis hebrea sin alterar el sentido. En español, se reflejó esa misma decisión con "mandó" y la colocación final "acerca de ellos".
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó "sacerdote" para הַכֹּהֵן y "jefes" para רָאשֵׁי, evitando términos eclesiásticos más cargados.
  - La frase "casas paternas" conserva el color administrativo del hebreo sin reemplazarla por una explicación excesiva.
