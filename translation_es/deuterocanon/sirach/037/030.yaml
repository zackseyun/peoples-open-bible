translation:
  language: es
  text: Un sabio para sí mismo se saciará de deleite[b][a], y todos los que lo vean lo llamarán feliz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «todos los que lo vean»; la forma transmitida parece presentar una irregularidad ortográfica en la última palabra, pero el sentido es claro por el contexto.
    reason: textual_variant
  - marker: b
    text: 'El griego tiene aquí una línea sustancialmente diferente: «Porque en muchos alimentos habrá dolor, y la avidez se acercará hasta una enfermedad biliosa / la bilis». Para el texto principal se sigue el testimonio hebreo conservado en la Geniza del Cairo como fuente primaria donde existe.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πολλοῖς γὰρ βρώμασιν
  english_pob_choice: For in many foods
  chosen_spanish: Porque en muchos alimentos
  alternatives_spanish:
  - Pues en muchos manjares
  - Porque en muchos comestibles
  lexicon: LSJ; BDAG
  rationale: 'Se sigue el griego como testimonio paralelo: βρώμασιν se refiere a alimentos/comidas. "Alimentos" conserva el sentido general sin sonar artificioso en español.'
- source_word: ἔσται πόνος
  english_pob_choice: there will be pain
  chosen_spanish: habrá dolor
  alternatives_spanish:
  - habrá pena
  - habrá sufrimiento
  lexicon: LSJ
  rationale: πόνος puede significar dolor, fatiga o aflicción. "Dolor" mantiene la fuerza directa y es idiomático en español.
- source_word: ἡ ἀπληστία
  english_pob_choice: greed
  chosen_spanish: la avidez
  alternatives_spanish:
  - la codicia
  - la insaciabilidad
  lexicon: LSJ; BDAG
  rationale: ἀπληστία es la falta de saciedad, la codicia o avidez. "Avidez" conserva la idea de deseo insaciable sin cargar innecesariamente el término con un matiz meramente económico.
- source_word: ἐγγιεῖ ἕως χολέρας
  english_pob_choice: will come near to cholera/bilious sickness
  chosen_spanish: se acercará hasta la bilis
  alternatives_spanish:
  - se acercará hasta la colera
  - llegará hasta una enfermedad biliar
  lexicon: LSJ
  rationale: El griego χολέρας puede aludir a bilis o a una afección biliosa/colérica. Dado que el texto plantea un límite metafórico de deterioro, "hasta la bilis" conserva la imagen corporal y la ambigüedad del original mejor que una identificación clínica moderna.
theological_decisions:
- issue: Preferencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Hebrew witness preserved in the Cairo Geniza is followed for the main text as the primary source where extant; the Greek is a substantially different line.
  chosen_spanish_reading: Se traduce el griego paralelo, porque el hebreo preservado ofrece un contenido sustancialmente distinto de esta línea.
  alternative_spanish_readings:
  - 'Apegarse al hebreo: «Un hombre sabio para sí se llenará de deleite, y todos los que lo ven lo declararán feliz».'
  - Ofrecer solo una nota de variante sin reflejar el griego en el texto principal.
  rationale: Aquí el griego y el hebreo transmiten sentencias diferentes. Para un registro español basado en el texto fuente proporcionado con paralelo griego, conviene reflejar la línea griega en el texto principal y registrar la divergencia textual en la documentación.
  doctrine_reference: Crítica textual / testimonio paralelo
- issue: Valor de χολέρας
  english_pob_reading: cholera/bilious sickness
  chosen_spanish_reading: bilis
  alternative_spanish_readings:
  - cólera
  - enfermedad biliosa
  rationale: La forma griega puede entenderse como bilis o como una afección biliosa; en español, "bilis" evita imponer una equivalencia médica moderna y preserva el tono proverbial de deterioro extremo.
  doctrine_reference: Semántica léxica del griego koiné
translation_notes:
  revision_awareness: 'Se corrige el intento anterior: no se usan notas al pie porque el texto español final no contiene marcadores. El verso se alinea con el paralelo griego disponible y no con el hebreo de la ficha, dada la divergencia sustancial entre ambos testigos.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero sin arcaísmos innecesarios.
  - '"avidez" se usa para ἀπληστία por su valor de apetito insaciable.'
  - No se introducen marcas de nota al pie para evitar desajustes de validación.
