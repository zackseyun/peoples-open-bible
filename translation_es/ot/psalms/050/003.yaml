translation:
  language: es
  text: Nuestro Dios viene y no calla[a]; un fuego devora delante de él[b], y alrededor de él se desata una violenta tempestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nuestro Dios vendrá y no guardará silencio». Los imperfectos hebreos pueden entenderse con fuerza futura en este contexto poético.'
    reason: alternative_reading
  - marker: b
    text: 'O: «una tempestad se enfurece alrededor de él», o «es sumamente tempestuoso alrededor de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָבֹא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - vendrá
  - ha venido
  lexicon: HALOT
  rationale: El imperfecto hebreo admite fuerza presente o futura en este contexto poético. «Viene» conserva la inmediatez y el carácter de aparición divina, como el inglés POB «comes».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: Our God
  chosen_spanish: Nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Es el sintagma posesivo directo con sufijo de 1ª persona plural. «Nuestro Dios» reproduce de forma natural y fiel la relación de pertenencia comunitaria.
- source_word: וְאַל יֶחֱרַשׁ
  english_pob_choice: and does not keep silent
  chosen_spanish: y no calla
  alternatives_spanish:
  - y no guarda silencio
  - y no permanece callado
  - y no está callado
  lexicon: HALOT
  rationale: En poesía, la secuencia funciona como afirmación de que su venida no va acompañada de silencio. «No calla» es breve, idiomático y preserva la fuerza verbal de חָרַשׁ sin suavizarla en exceso.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: El sustantivo es indefinido en hebreo. En español, el artículo indefinido ayuda a la fluidez y corresponde al valor genérico del texto.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: «Delante de él» conserva la imagen espacial del hebreo sin sonar rígido en español. Es un equivalente natural de la fórmula inglesa «before him».
- source_word: תֹאכֵל
  english_pob_choice: devours
  chosen_spanish: devora
  alternatives_spanish:
  - consume
  - se come
  lexicon: HALOT
  rationale: Con sujeto «fuego», אכל expresa la acción de consumir/devorar. «Devora» mantiene el tono vívido y de juicio que el audit trail inglés busca conservar.
- source_word: וּסְבִיבָיו
  english_pob_choice: and around him
  chosen_spanish: y alrededor de él
  alternatives_spanish:
  - y a su alrededor
  - y en torno a él
  lexicon: HALOT
  rationale: Es una traducción directa del sintagma locativo con sufijo. «Alrededor de él» conserva la imagen sin añadir matices interpretativos.
- source_word: נִשְׂעֲרָה
  english_pob_choice: it storms violently
  chosen_spanish: hay una tempestad
  alternatives_spanish:
  - está tempestuoso
  - ruge una tormenta
  - hay tormenta
  lexicon: HALOT
  rationale: La forma nifal expresa turbulencia/torbellino. Dado que el hebreo no explicita un sujeto nominal, «hay una tempestad» mantiene la escena impersonal y clara en español sin imponer un sujeto ajeno al texto.
- source_word: מְאֹד
  english_pob_choice: violently
  chosen_spanish: muy violenta
  alternatives_spanish:
  - en gran manera
  - en extremo
  - grandemente
  lexicon: HALOT
  rationale: El adverbio intensifica la tempestad. «Muy violenta» comunica la fuerza del cuadro con naturalidad en español y evita el registro más abstracto de «grandemente».
theological_decisions:
- issue: La teofanía de juicio se presenta sin marco cristológico explícito ni resolución doctrinal posterior.
  english_pob_reading: Retain the imagery as a direct description of God appearing in judgment, without importing later doctrinal interpretation.
  chosen_spanish_reading: Conservar la imagen como una descripción directa de Dios que viene en juicio, sin introducir una interpretación doctrinal posterior.
  alternative_spanish_readings:
  - leerlo tipológicamente como prefiguración del juicio final
  - entenderlo como una alusión cristológica explícita
  rationale: El hebreo muestra la venida de Dios, el fuego y la tempestad como rasgos de una teofanía judicial. La traducción debe preservar ese peso teológico sin añadir un marco no explicitado por el verso.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente del texto de referencia; el consenso de control cruzado fue alto y confirmó la lectura base, por lo que el borrador español sigue de cerca el audit trail sin introducir ajustes no documentados.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, con posesivo de 1ª plural para reflejar אֱלֹהֵינוּ.
  - Se conserva la imaginería del juicio con «fuego» y «tempestad» sin suavizarla ni expandirla.
  - «No calla» se usa como equivalente idiomático de la negación verbal de silencio, en línea con la opción inglesa de mantener la fuerza verbal.
  - La puntuación refleja dos miembros poéticos principales separados por punto y coma, como en la estructura del hebreo y del inglés auditado.
