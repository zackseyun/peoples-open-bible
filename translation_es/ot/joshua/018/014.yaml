translation:
  language: es
  text: Entonces el límite se curvó y giró por el lado occidental hacia el sur, desde la montaña que está frente a Bet-horón al sur, y su término fue en Quiriat-baal (es decir, Quiriat-jearim), ciudad de los hijos de Judá[a]. Este era el lado occidental.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hijos de Judá», una designación tribal que significa el pueblo o los descendientes de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָאַר הַגְּבוּל
  english_pob_choice: the border curved
  chosen_spanish: el límite se curvó
  alternatives_spanish:
  - el límite se extendió
  - el límite fue trazado
  lexicon: HALOT
  rationale: En descripciones de límites, תאר y el contexto topográfico apuntan al curso del borde, no solo a un trazado abstracto. «Se curvó» refleja bien el giro del límite y sigue la revisión inglesa que prefirió 'curved'.
- source_word: וְנָסַב
  english_pob_choice: turned
  chosen_spanish: giró
  alternatives_spanish:
  - rodeó
  - dio vuelta
  lexicon: HALOT
  rationale: El verbo expresa cambio de dirección/circuito. «Giró» conserva la idea de virar en una línea territorial sin sonar demasiado coloquial.
- source_word: לִפְאַת יָם
  english_pob_choice: on the west side
  chosen_spanish: hacia el lado occidental
  alternatives_spanish:
  - al lado occidental
  - hacia occidente
  lexicon: HALOT
  rationale: En fórmulas de frontera, יָם suele señalar el oeste. «Lado occidental» mantiene la equivalencia direccional y es claro en español bíblico moderno.
- source_word: נֶגְבָּה
  english_pob_choice: southward
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - surward
  lexicon: HALOT
  rationale: Aquí la fuerza direccional es primaria. En español, «al sur» fluye mejor que un adverbio más literal y conserva la orientación geográfica.
- source_word: מִן הָהָר
  english_pob_choice: from the mountain
  chosen_spanish: desde la montaña
  alternatives_spanish:
  - desde el monte
  - desde el cerro
  lexicon: HALOT
  rationale: «Montaña» sigue de cerca el hebreo singular con artículo. «Monte» sería igualmente posible, pero «montaña» comunica la referencia geográfica de manera directa.
- source_word: אֲשֶׁר עַל פְּנֵי בֵית חֹרוֹן נֶגְבָּה
  english_pob_choice: that faces Beth-horon on the south
  chosen_spanish: que está frente a Bet-horón, al sur
  alternatives_spanish:
  - que mira hacia Bet-horón, al sur
  - que está opuesta a Bet-horón, al sur
  lexicon: HALOT
  rationale: El giro עַל־פְּנֵי en contexto geográfico suele indicar oposición/faz. «Está frente a» es natural y preserva la orientación meridional de Bet-horón.
- source_word: וְהָיָה תֹצְאֹתָיו
  english_pob_choice: and its end was
  chosen_spanish: y su término fue
  alternatives_spanish:
  - y sus salidas fueron
  - y llegó a su término
  lexicon: HALOT
  rationale: תֹצְאֹתָיו puede referirse a las salidas/extremos del límite, pero aquí el contexto culmina en un punto terminal. «Su término fue» mantiene el sentido de destino final sin perder la ambigüedad geográfica.
- source_word: אֶל קִרְיַת בַּעַל
  english_pob_choice: at Kiriath-baal
  chosen_spanish: en Quiriat-baal
  alternatives_spanish:
  - a Quiriat-baal
  - hasta Quiriat-baal
  lexicon: HALOT
  rationale: Con un punto terminal de frontera, el español idiomático admite «en» para ubicar el final del recorrido. Se conserva la transliteración del topónimo.
- source_word: הִיא קִרְיַת יְעָרִים
  english_pob_choice: (that is, Kiriath-jearim)
  chosen_spanish: (es decir, Quiriat-jearim)
  alternatives_spanish:
  - (esto es, Quiriat-jearim)
  - (la cual es Quiriat-jearim)
  lexicon: HALOT
  rationale: La apposición identifica el mismo lugar con otro nombre. «Es decir» comunica con naturalidad la equivalencia nominal.
- source_word: עִיר בְּנֵי יְהוּדָה
  english_pob_choice: a city of the sons of Judah
  chosen_spanish: ciudad de los hijos de Judá[a]
  alternatives_spanish:
  - ciudad del pueblo de Judá
  - ciudad perteneciente a Judá
  lexicon: HALOT
  rationale: Se conserva la expresión literal «hijos de Judá» porque la fórmula tribal del hebreo no debe suavizarse sin motivo. En español bíblico, «hijos de» mantiene el vínculo genealógico/tribal.
- source_word: זֹאת פְּאַת יָם
  english_pob_choice: This was the western side
  chosen_spanish: Esta era la parte occidental
  alternatives_spanish:
  - Este era el lado occidental
  - Esta era la frontera occidental
  lexicon: HALOT
  rationale: La clausura formulaica resume la sección del límite. «Parte occidental» traduce פאה de manera natural en español y recoge el valor de lado/sector del borde.
theological_decisions:
- issue: Tribal designation בני יהודה
  english_pob_reading: a city of the sons of Judah, a tribal designation meaning the people/descendants of Judah
  chosen_spanish_reading: ciudad de los hijos de Judá
  alternative_spanish_readings:
  - ciudad del pueblo de Judá
  - ciudad de los descendientes de Judá
  rationale: 'No hay una cuestión doctrinal fuerte, pero sí una decisión identitaria/lexical: mantener la fórmula tribal literal evita borrar el lenguaje genealógico del hebreo y conserva la referencia a la tribu de Judá.'
  doctrine_reference: N/A - lexical/tribal designation
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'extended' por 'curved' para reflejar mejor el giro del límite; la traducción española sigue esa revisión con «se curvó». También conserva la nota de POB sobre 'sons of Judah' como designación tribal, ahora anclada en el texto con [a].
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable aquí; no aparece el Tetragrámaton en este versículo.
  - Se conserva la transliteración de los topónimos Quiriat-baal y Quiriat-jearim para coherencia con el resto del proyecto.
  - «Límite» se usa para גבול en un contexto topográfico territorial, en línea con el inglés POB 'border'.
  - La nota [a] está anclada exactamente en «Judá[a]» para evitar notas sueltas sin soporte en el texto.
