translation:
  text: 'But you, my children, do not become double-faced like them, with both goodness and wickedness; rather cling to goodness alone, because the Lord God rests in it, and people long for it. But flee wickedness, destroying its scheme by your good deeds; for the double-faced are not of God, but serve their own desires, so that they may please Beliar.'
