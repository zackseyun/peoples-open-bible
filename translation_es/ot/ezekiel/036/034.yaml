translation:
  language: es
  text: Y la tierra desolada[a] será cultivada, en vez de ser una desolación, a los ojos de todos los que pasan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la tierra desolada será trabajada/cultivada, mientras que antes había sido una desolación ante los ojos de todos los que pasaban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאָרֶץ / הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra del país
  lexicon: HALOT
  rationale: En contexto de restauración en Ezequiel, אֶרֶץ se refiere al territorio restaurado y no a la tierra en sentido global. En español, «tierra» es natural y amplio, y comunica bien el ámbito territorial sin introducir una lectura excesivamente técnica.
- source_word: הַנְּשַׁמָּה
  english_pob_choice: desolate
  chosen_spanish: desolada
  alternatives_spanish:
  - devastada
  - asolada
  lexicon: HALOT
  rationale: El participio pasivo funciona adjetivalmente con «tierra». «Desolada» conserva la idea de ruina y mantiene el contraste directo con la futura productividad. «Asolada» sería posible, pero «desolada» es más transparente y estable en español bíblico moderno.
- source_word: תֵּעָבֵד
  english_pob_choice: will be cultivated
  chosen_spanish: será cultivada
  alternatives_spanish:
  - será trabajada
  - será labrada
  lexicon: HALOT
  rationale: El nifal de עבד aquí expresa que la tierra será trabajada agrícolamente. «Será cultivada» transmite con claridad la acción pasiva y su sentido agrícola. «Será labrada» sería más literal, pero menos inclusiva para lectores modernos.
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: instead of being
  chosen_spanish: en lugar de haber sido
  alternatives_spanish:
  - en vez de haber sido
  - en lugar de ser
  lexicon: HALOT
  rationale: La construcción marca contraste o reemplazo. «En lugar de haber sido» reproduce bien esa oposición temporal y causal entre el estado anterior y el nuevo estado de la tierra.
- source_word: הָיְתָה שְׁמָמָה
  english_pob_choice: being a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - una tierra desolada
  - una ruina
  lexicon: HALOT
  rationale: שְׁמָמָה es un sustantivo, no solo un adjetivo. Por eso se mantiene la fuerza nominal con «una desolación». La repetición conceptual con «desolada» ayuda a preservar la tensión léxica del hebreo.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - ante la vista de
  - en presencia de
  lexicon: HALOT
  rationale: El modismo señala visibilidad pública. «A los ojos de» conserva la imagen concreta del hebreo y su sentido de observación por parte de los transeúntes.
- source_word: כָּל עוֹבֵר
  english_pob_choice: all who pass by
  chosen_spanish: todos los que pasaban
  alternatives_spanish:
  - todos los que pasan
  - todo el que pasaba
  lexicon: HALOT
  rationale: El participio singular con כָּל tiene valor colectivo y durativo. «Todos los que pasaban» refleja bien el grupo genérico de observadores y mantiene el matiz de tránsito habitual en el pasaje.
translation_notes:
  revision_awareness: La comparación con el texto inglés auditado muestra alta concordancia; no se registran revisiones sustantivas. La decisión española sigue el mismo contraste de restauración agrícola y observación pública, manteniendo la tensión entre el estado previo de desolación y la acción futura de cultivo.
  spanish_consistency_notes:
  - Se usa «tierra» para אֶרֶץ en coherencia con el contexto territorial de restauración.
  - Se preserva la oposición entre el adjetivo «desolada» y el sustantivo «una desolación», evitando suavizar la repetición hebrea.
  - La imagen de observación pública se mantiene con «a los ojos de», equivalente natural de לְעֵינֵי.
  - Se eligió un futuro pasivo («será cultivada») para reflejar el nifal sin introducir un agente no expresado.
