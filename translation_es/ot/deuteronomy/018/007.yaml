translation:
  language: es
  text: entonces podrá ministrar[a] en el nombre de Yahvé[c] su Dios, como todos sus hermanos[b] los levitas que están de pie allí delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ministrará». El imperfecto hebreo puede traducirse con fuerza permisiva («podrá») o con valor más directo de futuro, según cómo se exprese en español el contexto legal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus hermanos», es decir, sus compañeros levitas.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo YHWH, tradicionalmente vertido «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: וְשֵׁרֵת
  english_pob_choice: then he may minister
  chosen_spanish: entonces podrá ministrar
  alternatives_spanish:
  - y ministrará
  - y podrá servir
  lexicon: HALOT
  rationale: El piel de שׁרת expresa servicio ministerial o cultual. En español, 'ministrar' comunica mejor ese servicio sagrado que el más amplio 'servir'. 'Podrá' conserva bien el valor permisivo o potencial del imperfecto en este contexto legal, y 'entonces' refleja la continuidad resultativa con la norma precedente.
- source_word: בְּשֵׁם
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  lexicon: HALOT
  rationale: La locución hebrea indica actuar bajo la autoridad o invocación del nombre. 'En el nombre de' es la equivalencia natural y fiel en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del tetragrámaton, siguiendo la convención del proyecto de usar 'Yahvé' en el texto principal y no una sustitución reverencial como 'el SEÑOR'.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  lexicon: HALOT
  rationale: La sufijación posesiva se vierte de forma directa y natural con 'su Dios', conservando la relación de pertenencia/covenantal sin sobreinterpretarla.
- source_word: כְּכָל
  english_pob_choice: like all
  chosen_spanish: como todos
  alternatives_spanish:
  - igual que todos
  - tal como todos
  lexicon: HALOT
  rationale: El valor comparativo de כ + כל se expresa de manera clara y natural con 'como todos', que preserva la comparación con el resto de los levitas.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos de raza
  - sus compañeros
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural y el audit trail inglés mantiene 'brothers', en español 'sus hermanos' transmite fielmente el parentesco/solidaridad del grupo. Se conserva la referencia masculina implícita por el contexto levítico sin forzar una paráfrasis neutral.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas sacerdotales
  lexicon: HALOT
  rationale: El término se mantiene con el etnónimo habitual y transparente en español; el contexto ya precisa que se trata del grupo levítico mencionado en apposición.
- source_word: הָעֹמְדִים
  english_pob_choice: who stand
  chosen_spanish: que están
  alternatives_spanish:
  - que permanecen
  - que se presentan
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'estar de pie', en contexto cultual español 'que están' seguido de 'delante de Yahvé' reproduce con naturalidad la imagen de presencia/atención. Se evita 'sirven' para no borrar la imagen literal de estar de pie.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allí mismo
  lexicon: HALOT
  rationale: '''Allí'' conserva la referencia locativa al lugar del santuario mencionado en el contexto inmediato, con un español fluido.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea fija de estar 'delante de' Dios se traduce de forma literal y natural con 'delante de Yahvé', manteniendo el matiz cultual y de presencia.
theological_decisions:
- issue: Renderización del tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue la política del proyecto de nombrar el tetragrámaton con una transliteración del nombre propio divino en lugar de sustituirlo por un título. 'Yahvé' es la forma estándar elegida para el texto español principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Kinship masculine plural אֶחָיו
  english_pob_reading: his brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus compañeros levitas
  - sus hermanos levitas
  rationale: El hebreo usa un término de parentesco masculino plural, pero en español 'sus hermanos' expresa con naturalidad la solidaridad de clan/tribu sin perder la marca masculina implícita. El appositivo 'los levitas' aclara el referente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La traducción sigue el pasaje base sin revisiones aplicadas; el control más reciente informó alta concordancia (0.95) y no requirió cambios. Se mantuvo el enfoque óptimo-equivalente del audit trail inglés, con atención al valor permisivo del imperfecto, a la apposición levítica y al nombre divino.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se mantiene 'levitas' para הַלְוִיִּם y no se paraphrasea como un término eclesiástico.
  - '''Ministrar'' conserva el registro cultual sin ampliar el sentido a ''servir'' en general.'
  - Las notas a, b, c siguen el orden y el contenido del trail auditado en inglés.
