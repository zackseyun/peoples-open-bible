translation:
  language: es
  text: Toma para ti otro rollo[a] y escribe en él todas las palabras anteriores que estaban en el primer rollo, que quemó Jehoiaquim, rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toma de nuevo para ti otro rollo». El hebreo abre con un imperativo que significa «volver/otra vez», y funciona idiomáticamente con «tomar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּב
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma de nuevo
  - Vuelve a tomar
  lexicon: HALOT
  rationale: En la secuencia imperativa שׁוּב קַח, שׁוּב funciona de modo adverbial con el mandato siguiente. En español, la idea se expresa con naturalidad dentro de 'Toma' y se aclara con la nota sobre la posibilidad de 'de nuevo'.
- source_word: קַח לְךָ
  english_pob_choice: Take for yourself
  chosen_spanish: para ti, toma
  alternatives_spanish:
  - Toma para ti
  - Consíguete
  lexicon: HALOT
  rationale: La forma pronominal לְךָ se conserva con una expresión natural en español. Se prioriza el sentido explícito de dirección personal del mandato sin volverlo redundante o afectado.
- source_word: מְגִלָּה אַחֶרֶת
  english_pob_choice: another scroll
  chosen_spanish: otro rollo
  alternatives_spanish:
  - otro scroll
  - otro libro-rol
  lexicon: HALOT
  rationale: מְגִלָּה es un rollo escrito; en español 'rollo' es claro y más natural que 'scroll' para una lectura bíblica moderna, aunque la nota preserva la alternativa si se desea un término más transliterado.
- source_word: וּכְתֹב עָלֶיהָ
  english_pob_choice: and write on it
  chosen_spanish: y escribe en él
  alternatives_spanish:
  - y escribe sobre él
  lexicon: HALOT
  rationale: Para un objeto escrito como un rollo, 'en él' comunica de forma idiomática la acción de escribir sobre su superficie. Se mantiene la referencia pronominal al rollo.
- source_word: אֵת כָּל הַדְּבָרִים הָרִאשֹׁנִים
  english_pob_choice: all the former words
  chosen_spanish: todas las palabras anteriores
  alternatives_spanish:
  - todas las palabras primeras
  - todas las palabras previas
  lexicon: HALOT
  rationale: דְּבָרִים aquí son las palabras/contenido del rollo, y הָרִאשֹׁנִים señala lo anterior en contraste con el nuevo rollo. 'Anteriores' conserva la referencia temporal y evita un calco poco natural de 'primeras'.
- source_word: אֲשֶׁר הָיוּ עַל הַמְּגִלָּה הָרִאשֹׁנָה
  english_pob_choice: that were on the first scroll
  chosen_spanish: que estaban en el primer rollo
  alternatives_spanish:
  - que estaban sobre el primer rollo
  lexicon: HALOT
  rationale: El relativo identifica el contenido previamente escrito. 'En' es más natural en español que 'sobre' para describir texto escrito en un rollo, aunque la imagen física subyacente sigue presente.
- source_word: אֲשֶׁר שָׂרַף
  english_pob_choice: which Jehoiakim ... burned
  chosen_spanish: que quemó
  alternatives_spanish:
  - que incendió
  - que quemó por completo
  lexicon: HALOT
  rationale: שָׂרַף se traduce directamente por 'quemó'. No se añade intensificación adicional, en línea con el audit trail inglés que evitó 'burned up'.
- source_word: יְהוֹיָקִים מֶלֶךְ יְהוּדָה
  english_pob_choice: Jehoiakim king of Judah
  chosen_spanish: Joacim, rey de Judá
  alternatives_spanish:
  - Jehoiaquim, rey de Judá
  - Joacim rey de Judá
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional 'Joacim' para el nombre propio, manteniendo el título regio appositivo. 'Judá' se conserva como nombre geográfico-histórico estándar.
theological_decisions:
- issue: No hay tensión teológica doctrinal directa; sí una decisión sobre la secuencia imperativa inicial y el contenido textual del rollo.
  english_pob_reading: The Hebrew opens with an imperative meaning 'return/again,' which functions idiomatically with 'take.' The text commands the replacement of the burned scroll with another carrying the same words.
  chosen_spanish_reading: 'Se refleja el mandato idiomático sin sobreinterpretar: ''Toma para ti otro rollo'' comunica la acción requerida y deja implícita la repetición; la nota a aclara la posibilidad de ''de nuevo''.'
  alternative_spanish_readings:
  - Vuelve y toma para ti otro rollo
  - Toma de nuevo para ti otro rollo
  rationale: La prioridad es preservar el valor pragmático del hebreo sin forzar una redundancia extraña en español. La nota mantiene visible la alternativa literal para auditar la decisión.
  doctrine_reference: No aplica una referencia doctrinal específica; decisión de pragmática y forma del mandato.
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del POB en inglés, que ubicó 'for yourself' después de 'Take' para reflejar mejor el orden hebreo y conservar el pronombre explícito. El español adopta una solución natural equivalente con la misma distinción pragmática.
  spanish_consistency_notes:
  - Se usó 'rollo' para מְגִלָּה, coherente con el registro bíblico en español y con la metáfora material del texto.
  - Se evitó 'Señor' o 'Eterno' porque no aparece el nombre divino en este versículo; el único nombre propio teológico/histórico es Yahvé en otros contextos, pero aquí no aplica.
  - Se mantuvo 'rey de Judá' como apposición breve y fiel al hebreo.
  - Se prefirió 'quemó' sin ampliación aspectual para respetar la sobriedad del original.
