translation:
  language: es
  text: Ahora escúchenme[a], y devuelvan a los cautivos que tomaron cautivos de entre sus hermanos, porque el ardor de la ira de Yahvé está sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre sus compatriotas israelitas». El hebreo dice «de sus hermanos», usando lenguaje de parentesco para miembros del mismo pueblo del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Introduce un cambio urgente en el discurso directo. En español, «Ahora» comunica de forma natural la transición inmediata; «Y ahora» también sería posible, pero no es necesario reproducir explícitamente el valor conjuntivo.
- source_word: שְׁמָעוּנִי
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escúchenme atentamente
  lexicon: HALOT
  rationale: El imperativo pide oír con atención la exhortación del hablante. «Escúchenme» es natural y fuerte en español contemporáneo; «óiganme» es posible, pero menos exhortativo en este contexto.
- source_word: וְהָשִׁיבוּ
  english_pob_choice: return
  chosen_spanish: devuelvan
  alternatives_spanish:
  - hagan volver
  - traigan de vuelta
  lexicon: HALOT
  rationale: El hifil de שוב expresa causar el regreso de otros. En este contexto, con objeto humano capturado, «devuelvan» transmite bien la acción requerida sin perder la fuerza de restitución.
- source_word: הַשִּׁבְיָה
  english_pob_choice: the captives
  chosen_spanish: los cautivos
  alternatives_spanish:
  - los prisioneros
  - la cautividad
  lexicon: HALOT
  rationale: Aunque el sustantivo puede referirse a la cautividad como colectividad, aquí apunta a las personas tomadas. «Los cautivos» refleja mejor ese referente concreto en español bíblico moderno.
- source_word: אֲשֶׁר שְׁבִיתֶם
  english_pob_choice: whom you have taken
  chosen_spanish: que ustedes han tomado
  alternatives_spanish:
  - que ustedes capturaron
  - a quienes ustedes han tomado cautivos
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los cautivos como los que ellos se llevaron. «Que ustedes han tomado» mantiene la relación verbal sin redundar en exceso con «cautivos»; la alternativa «han tomado cautivos» sería más explícita pero más pesada.
- source_word: מֵאֲחֵיכֶם
  english_pob_choice: from your brothers
  chosen_spanish: de sus hermanos
  alternatives_spanish:
  - de sus hermanos de nación
  - de sus compatriotas
  lexicon: HALOT
  rationale: «Hermanos» conserva el lenguaje de parentesco del hebreo y su carga de pacto/comunidad. En español, el matiz colectivo puede aclararse en nota; «compatriotas» sería interpretativo y suaviza el vínculo fraternal.
- source_word: חֲרוֹן אַף
  english_pob_choice: the burning anger
  chosen_spanish: el ardor de la ira
  alternatives_spanish:
  - la ira ardiente
  - el furor encendido
  lexicon: HALOT
  rationale: Este modismo hebreo evoca literalmente el calor/brote de la ira. «El ardor de la ira» conserva la imagen de intensidad sin sonar forzado en español; «ira ardiente» sería más literal, pero menos fluido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre propio divino sin sustituirlo por un título.'
- source_word: עֲלֵיכֶם
  english_pob_choice: is upon you
  chosen_spanish: está sobre ustedes
  alternatives_spanish:
  - está contra ustedes
  - recae sobre ustedes
  lexicon: HALOT
  rationale: La preposición על con ira expresa dirección/peso sobre los destinatarios. «Está sobre ustedes» conserva la imagen y la inmediatez del juicio; «está contra ustedes» interpreta el sentido, aunque es posible.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El verso usa directamente el Tetragrámaton. Conforme a la terminología del proyecto, se vierte como «Yahvé» para preservar el nombre del pacto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Kinship language for מֵאֲחֵיכֶם
  english_pob_reading: from your brothers
  chosen_spanish_reading: de sus hermanos
  alternative_spanish_readings:
  - de sus hermanos de nación
  - de sus compatriotas
  rationale: Se conserva el parentesco fraternal del hebreo, que en este contexto tiene fuerza de pueblo del pacto. La nota aclara que el sentido puede abarcar a los demás israelitas.
  doctrine_reference: 'POB lexical policy: covenant kinship terminology'
translation_notes:
  revision_awareness: El contexto de auditoría en inglés no requirió cambios de revisión; la versión final aprobada mantiene el sentido del texto hebreo y la decisión terminológica sobre el Nombre divino. La traducción española sigue esa línea con equivalencias naturales y fieles.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el lenguaje de parentesco con «hermanos» para מֵאֲחֵיכֶם y se aclara su alcance pactual en nota.
  - Se mantiene la imagen de la ira como algo que está «sobre» ellos, en vez de sustituirla por una formulación más abstracta.
  - «Escúchenme» y «devuelvan» preservan el tono imperativo urgente del pasaje.
