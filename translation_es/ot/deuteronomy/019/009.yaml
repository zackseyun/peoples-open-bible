translation:
  language: es
  text: si guardas[a] todo este mandamiento, poniéndolo por obra, que yo te mando hoy —amar a Yahvé tu Dios y andar en sus caminos todos tus días—, entonces te añadirás tres ciudades más, además de estas tres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo este mandamiento» (singular); se mantiene el singular para reflejar la forma del texto fuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - porque
  - cuando
  lexicon: HALOT
  rationale: En este contexto כִּי introduce una condición para la ampliación de las ciudades, no una causa ni solo una temporalidad. «Si» reproduce mejor la relación lógica del pasaje.
- source_word: תִשְׁמֹר
  english_pob_choice: you keep
  chosen_spanish: guardas
  alternatives_spanish:
  - observas
  - guardas cuidadosamente
  lexicon: HALOT
  rationale: שׁמר en lenguaje de pacto comunica guardar o observar un mandamiento. «Guardas» es natural en español y mantiene la idea de custodia fiel sin añadir matices no explícitos.
- source_word: כָּל הַמִּצְוָה הַזֹּאת
  english_pob_choice: all this commandment
  chosen_spanish: todo este mandamiento
  alternatives_spanish:
  - todo este mandato
  - este mandamiento completo
  lexicon: HALOT
  rationale: Se conserva el singular «mandamiento», como en el hebreo, y el valor totalizador de כָּל con «todo». No se pluraliza para no perder la forma del original.
- source_word: לַעֲשֹׂתָהּ
  english_pob_choice: by doing it
  chosen_spanish: para cumplirlo
  alternatives_spanish:
  - para hacerlo
  - al ponerlo por obra
  lexicon: HALOT
  rationale: El infinitivo expresa la realización efectiva del mandamiento. «Cumplirlo» transmite bien la idea de llevarlo a la práctica en un español bíblico claro, sin mecanicismo.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: which I am commanding you today
  chosen_spanish: que yo te mando hoy
  alternatives_spanish:
  - que yo te estoy mandando hoy
  - que hoy te mando
  lexicon: HALOT
  rationale: El participio tiene fuerza continua/progresiva; en español «te mando hoy» es una formulación natural que conserva la relación directa de autoridad y el marco temporal de hoy.
- source_word: לְאַהֲבָה
  english_pob_choice: to love
  chosen_spanish: para amar
  alternatives_spanish:
  - a amar
  - con el fin de amar
  lexicon: HALOT
  rationale: La forma infinitiva indica contenido/propósito. «Para amar» es una equivalencia fluida y fiel en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal según la terminología del proyecto, preservando el Tetragrámaton como nombre propio y no como título sustituto.
- source_word: וְלָלֶכֶת בִּדְרָכָיו
  english_pob_choice: and to walk in his ways
  chosen_spanish: y para andar en sus caminos
  alternatives_spanish:
  - y a caminar en sus caminos
  - y a vivir según sus caminos
  lexicon: HALOT
  rationale: «Andar en sus caminos» conserva el idioma metafórico de pacto del hebreo. «Andar» resulta más natural y menos coloquial que «caminar» en este registro.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all your days
  chosen_spanish: todos tus días
  alternatives_spanish:
  - todos los días
  - durante toda tu vida
  lexicon: HALOT
  rationale: La expresión hebrea marca duración continua a lo largo de la vida. «Todos tus días» es la equivalencia más directa y idiomática.
- source_word: וְיָסַפְתָּ לְךָ עוֹד שָׁלֹשׁ עָרִים
  english_pob_choice: then you shall add for yourself three more cities
  chosen_spanish: entonces añadirás para ti todavía tres ciudades más
  alternatives_spanish:
  - entonces agregarás para ti tres ciudades más
  - entonces sumarás para ti tres ciudades más
  lexicon: HALOT
  rationale: יסף significa añadir/incrementar. «Añadirás» conserva el valor verbal; «todavía» refleja עוֹד y «para ti» refleja לְךָ sin forzar posesión jurídica.
- source_word: עַל הַשָּׁלֹשׁ הָאֵלֶּה
  english_pob_choice: besides these three
  chosen_spanish: además de estas tres
  alternatives_spanish:
  - aparte de estas tres
  - sobre estas tres
  lexicon: HALOT
  rationale: עַל tiene aquí sentido aditivo. «Además de» comunica con claridad la suma de tres ciudades extra a las tres ya mencionadas.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. En español, el estándar del proyecto es usar «Yahvé» como nombre propio del pacto, preservando la referencia personal del texto original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Maintaining the singular force of הַמִּצְוָה
  english_pob_reading: all this commandment
  chosen_spanish_reading: todo este mandamiento
  alternative_spanish_readings:
  - todos estos mandamientos
  - este mandamiento entero
  rationale: El hebreo es singular; traducir en plural borraría una tensión léxica explícita que el POB inglés también preserva. La forma singular ayuda a mantener la precisión del original.
  doctrine_reference: Source grammar / singular noun with collective totality
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que retiró el adverbio añadido «carefully» por no estar explícito en el hebreo. La versión española evita igualmente cualquier intensificador no atestiguado y conserva la estructura condicional, el infinitivo de propósito, el nombre divino «Yahvé» y la adición final de «tres ciudades más» como en el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene el singular «mandamiento» para כָּל הַמִּצְוָה הַזֹּאת.
  - «Andar en sus caminos» preserva la metáfora covenantal sin volverla mero comportamiento.
  - La nota al pie explica la tensión singular/colectiva de «todo este mandamiento».
