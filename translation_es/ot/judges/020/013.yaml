revisions:
- from: Ahora entreguen a los hombres[a], los hijos de perversidad, que están en Gabaa, para que los pongamos a muerte y purguemos el mal de Israel. Pero Benjamín no quiso escuchar la voz de sus hermanos[c][b], los hijos de Israel.
