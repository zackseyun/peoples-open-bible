translation:
  language: es
  text: Y los matorrales del bosque serán cortados con hierro[a], y el Líbano caerá por un poderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Líbano caerá por el Poderoso», entendiendo «Poderoso» como un título que se refiere a Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִקַּף
  english_pob_choice: will be cut down
  chosen_spanish: serán cortados
  alternatives_spanish:
  - serán derribados
  - serán talados
  - serán hachados
  lexicon: HALOT
  rationale: El nifal expresa aquí una acción pasiva sobre la vegetación del bosque. «Serán cortados» conserva la imagen de tala/derribo sin introducir un sujeto explícito que el hebreo no da.
- source_word: סִבְכֵי
  english_pob_choice: the thickets of
  chosen_spanish: los espesos de
  alternatives_spanish:
  - las malezas de
  - los matorrales de
  - las marañas de
  lexicon: HALOT
  rationale: סבך designa crecimiento denso, enmarañado, o maleza espesa. «Espesos» busca mantener la idea de densidad y trabazón del hebreo; «thickets» en inglés no exige un equivalente único en español y puede sonar algo más interpretativo.
- source_word: הַיַּעַר
  english_pob_choice: the forest
  chosen_spanish: el bosque
  alternatives_spanish:
  - el bosque frondoso
  - la selva
  lexicon: HALOT
  rationale: יַעַר significa bosque/selva. «Bosque» es claro y natural en español; evita dar a la imagen un matiz tropical que «selva» podría sugerir.
- source_word: בַּבַּרְזֶל
  english_pob_choice: with iron
  chosen_spanish: con hierro
  alternatives_spanish:
  - con un instrumento de hierro
  - con el hierro de corte
  - con un hacha de hierro
  lexicon: HALOT
  rationale: La preposición instrumental y el sustantivo en hebreo dicen literalmente «con hierro». Mantenerlo así preserva la metáfora metonímica sin especificar una herramienta que el texto no nombra.
- source_word: וְהַלְּבָנוֹן
  english_pob_choice: and Lebanon
  chosen_spanish: y el Líbano
  alternatives_spanish:
  - y el Líbano forestal
  - y el monte Líbano
  lexicon: HALOT
  rationale: «Líbano» conserva el nombre propio y la posible personificación regional del texto poético. No se amplía a «monte» o «forestal» porque el hebreo no lo explicita.
- source_word: בְּאַדִּיר
  english_pob_choice: by a mighty one
  chosen_spanish: por un poderoso
  alternatives_spanish:
  - por el Poderoso
  - por un ser poderoso
  - por uno poderoso
  lexicon: HALOT
  rationale: 'אַדִּיר puede funcionar como adjetivo sustantivado: poderoso, majestuoso, fuerte. En español, «por un poderoso» mantiene la ambigüedad entre agente humano/potente y título divino; «por el Poderoso» resolvería demasiado pronto la tensión.'
- source_word: יִפּוֹל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - será derribado
  - se desplomará
  lexicon: HALOT
  rationale: נפל es «caer». «Caerá» preserva el sentido directo y la fuerza poética, sin convertirlo por completo en un pasivo causal interpretativo.
theological_decisions:
- issue: Si אַדִּיר debe entenderse como título divino explícito
  english_pob_reading: by a mighty one, with a footnote allowing 'the Mighty One' as a reference to God
  chosen_spanish_reading: por un poderoso, con nota que permite «el Poderoso» como posible referencia a Dios
  alternative_spanish_readings:
  - por el Poderoso
  - por el Todopoderoso
  - por un poderoso
  rationale: El contexto sugiere juicio divino, pero la expresión hebrea no marca de forma inequívoca un título con nombre divino. Por eso el texto principal conserva la ambigüedad y la nota recoge la lectura alternativa sin imponerla.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y coincide sustancialmente con la auditoría inglesa: conserva la pasiva de נִקַּף, el valor metonímico de «hierro», y la ambigüedad teológica de אַדִּיר. Se evita importar una especificación instrumental no presente en el hebreo y se mantiene el paralelismo poético entre el bosque talado y el Líbano que cae.'
  spanish_consistency_notes:
  - Se usa «Líbano» como nombre propio y no se añade «monte» porque el hebreo no lo expresa.
  - «Con hierro» mantiene la metáfora sobria del original; no se sustituye por «hacha» o «instrumento» en el texto principal.
  - «Por un poderoso» preserva la ambigüedad entre agente poderoso y posible título divino, en línea con la nota inglesa.
  - «Caerá» conserva נפל sin sobretraducirlo como «será derribado», aunque el contexto implique esa idea.
