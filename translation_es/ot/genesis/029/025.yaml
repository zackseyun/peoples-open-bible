translation:
  language: es
  text: 'Por la mañana[a], he aquí, era Lea. Y dijo a Labán: «¿Qué es esto que me has hecho? ¿No era por Raquel que trabajé contigo? ¿Por qué entonces me has engañado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te serví» en lugar de «trabajé contigo». El verbo hebreo puede denotar labor o servicio, y el contexto incluye tanto el trabajo contratado como el servicio prestado a Labán.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַבֹּקֶר
  english_pob_choice: In the morning
  chosen_spanish: Por la mañana
  alternatives_spanish:
  - En la mañana
  - Cuando amaneció
  lexicon: HALOT
  rationale: La expresión temporal introduce el nuevo estado de cosas de manera natural en español y conserva el valor narrativo de temporalidad sin volverlo torpe o demasiado literal.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: «He aquí» conserva el sobresalto del descubrimiento y el giro dramático de la partícula hebrea, con un registro digno y bíblico en español.
- source_word: הִוא לֵאָה
  english_pob_choice: it was Leah
  chosen_spanish: era Lea
  alternatives_spanish:
  - era ella, Lea
  - resultó ser Lea
  lexicon: HALOT
  rationale: En español, «era Lea» transmite la identificación descubierta en la escena sin necesidad de repetir un pronombre impersonal que suena menos natural.
- source_word: מַה זֹּאת עָשִׂיתָ לִּי
  english_pob_choice: What is this you have done to me?
  chosen_spanish: ¿Qué es esto que me has hecho?
  alternatives_spanish:
  - ¿Qué has hecho conmigo?
  - ¿Qué es lo que me has hecho?
  lexicon: HALOT
  rationale: La construcción mantiene la fuerza de la protesta y el valor enfático de «esto» sin perder la naturalidad del español.
- source_word: הֲלֹא
  english_pob_choice: Was it not
  chosen_spanish: ¿No era
  alternatives_spanish:
  - ¿No fue
  - ¿Acaso no era
  lexicon: HALOT
  rationale: La pregunta retórica en español queda clara con «¿No era…?», conservando la expectativa de respuesta afirmativa implícita en el hebreo.
- source_word: בְּרָחֵל
  english_pob_choice: for Rachel
  chosen_spanish: por Raquel
  alternatives_spanish:
  - a causa de Raquel
  - para Raquel
  lexicon: HALOT
  rationale: «Por Raquel» refleja bien la relación de finalidad o motivo que el hebreo expresa con ב en este contexto contractual.
- source_word: עָבַדְתִּי עִמָּךְ
  english_pob_choice: I worked with you
  chosen_spanish: trabajé contigo
  alternatives_spanish:
  - te serví
  - trabajé para ti
  lexicon: HALOT
  rationale: Se conserva el verbo de trabajo/labor del texto hebreo y se adapta la preposición al español idiomático. En la nota se preserva la alternativa de sentido «servir» porque el hebreo puede abarcar tanto labor como servicio.
- source_word: וְלָמָּה
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué entonces
  alternatives_spanish:
  - ¿Y por qué
  - ¿Por qué, entonces
  lexicon: HALOT
  rationale: «Entonces» mantiene el matiz inferencial y conclusivo que la revisión inglesa quiso resaltar, sin sonar coloquial.
- source_word: רִמִּיתָנִי
  english_pob_choice: have you deceived me
  chosen_spanish: me has engañado
  alternatives_spanish:
  - me has decepcionado
  - me has burlado
  lexicon: HALOT
  rationale: «Engañado» comunica bien la idea de fraude/decepción moral del verbo, de forma clara y seria en español.
translation_notes:
  revision_awareness: 'La traducción sigue la última revisión del inglés POB en el cierre interrogativo: «Why then have you deceived me?» → «¿Por qué entonces me has engañado?». Se evitó una formulación más coloquial para mantener el tono formal y directo del hebreo y del registro bíblico.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «Raquel» y «Lea» como formas españolas usuales y reconocibles para los nombres propios.
  - La nota[a] queda anclada en «Por la mañana[a]» para evitar una nota huérfana y para que la alternativa verbal quede ligada a la cláusula relevante.
