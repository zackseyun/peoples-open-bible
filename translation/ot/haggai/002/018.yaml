id: HAG.2.18
reference: Haggai 2:18
source:
  edition: WLC
  text: שִׂימוּ נָ֣א לְבַבְ/כֶ֔ם מִן הַ/יּ֥וֹם הַ/זֶּ֖ה וָ/מָ֑עְלָ/ה מִ/יּוֹם֩ עֶשְׂרִ֨ים וְ/אַרְבָּעָ֜ה לַ/תְּשִׁיעִ֗י לְ/מִן הַ/יּ֛וֹם אֲשֶׁר יֻסַּ֥ד הֵֽיכַל יְהוָ֖ה שִׂ֥ימוּ לְבַבְ/כֶֽם־־־־־׃
translation:
  text: Now set your heart on this from this day onward[a], from the twenty-fourth day of the ninth month, from the day when the temple of Yahweh was founded; consider it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the day when the foundation of the temple of the LORD was laid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂימוּ נָא לְבַבְכֶם
  chosen: set your heart
  alternatives:
  - consider carefully
  - set your mind
  lexicon: HALOT
  rationale: The idiom literally means 'set your heart,' functioning as an exhortation to give careful attention. 'Set your heart' preserves the Hebrew imagery better than a flattened paraphrase, while remaining understandable in English. The repeated imperative is retained.
- source_word: מִן הַיּוֹם הַזֶּה וָמָעְלָה
  chosen: from this day onward
  alternatives:
  - from this day and upward
  - from this day forward
  lexicon: HALOT
  rationale: This temporal expression points ahead from the present date. 'From this day onward' is idiomatic modern English and preserves the forward-looking sense of וָמָעְלָה.
- source_word: מִיּוֹם עֶשְׂרִים וְאַרְבָּעָה לַתְּשִׁיעִי
  chosen: from the twenty-fourth day of the ninth month
  alternatives:
  - since the twenty-fourth day of the ninth month
  - from the twenty-fourth of the ninth month
  lexicon: HALOT
  rationale: The Hebrew dates the exhortation precisely. Supplying 'day' and 'month' in English makes the date natural and explicit.
- source_word: לְמִן הַיּוֹם
  chosen: from the day
  alternatives:
  - since the day
  lexicon: HALOT
  rationale: The phrase resumes and sharpens the temporal reference. 'From the day' keeps the prepositional linkage with the prior dating formula.
- source_word: אֲשֶׁר יֻסַּד
  chosen: when ... was founded
  alternatives:
  - when ... was laid
  - when ... was established
  lexicon: HALOT
  rationale: The passive of יסד refers to founding or laying a foundation. Because English commonly speaks of a building's foundation being laid, that is a viable alternative; however, 'was founded' matches the lexical core and reads smoothly with 'temple.'
- source_word: הֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the house of the LORD
  - the sanctuary of the LORD
  lexicon: HALOT
  rationale: הֵיכַל in this context refers to the temple building. 'Temple' is the clearest contextual rendering. יְהוָה is rendered 'the LORD' per project doctrine.
- source_word: שִׂימוּ לְבַבְכֶם
  chosen: set your heart on it
  alternatives:
  - consider it carefully
  - set your heart
  lexicon: HALOT
  rationale: The final repetition is emphatic. Adding 'on it' makes the English object explicit from context without changing the sense, and helps the repeated exhortation sound natural.
