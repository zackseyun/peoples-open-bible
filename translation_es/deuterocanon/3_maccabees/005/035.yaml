    issue: Falta 'ἐπιφανῆ' en el texto principal
    rationale: El griego dice τὸν ἐπιφανῆ θεὸν Κύριον. El borrador español actual dice solo 'a Dios, el Señor...', omitiendo el adjetivo 'manifiesto' o equivalente, pese a que la decisión léxica documenta su importancia teológica y contextual.
  - severity: medium
    issue: '''lo que vino del rey'' suena poco natural en español'
    rationale: Aunque es formalmente cercano, en español puede leerse como movimiento físico. 'Lo que vino de parte del rey' mantiene la amplitud semántica del griego y suena más idiomático sin sobredeterminar 'decreto' o 'mensaje'.
  - severity: low
    issue: La nota [a] está anclada en 'judíos' en vez de en el título correspondiente
    rationale: La nota explica 'el Rey de reyes' frente a 'el Rey de los que gobiernan', así que debe anclarse en esa frase para claridad editorial y correspondencia exacta.
