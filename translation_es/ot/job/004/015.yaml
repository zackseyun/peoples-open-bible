translation:
  language: es
  text: Entonces un espíritu pasó delante de mi rostro[a]; el pelo de mi carne se erizó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un viento» o «un aliento» pasó delante de mi rostro. La palabra hebrea רוּחַ puede significar «espíritu», «viento» o «aliento»; aquí el contexto favorece «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרוּחַ
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - un viento
  - un aliento
  lexicon: HALOT
  rationale: רוּחַ puede significar ‘espíritu’, ‘viento’ o ‘aliento’. En este contexto visionario, el sentido de una presencia inquietante que pasa delante del hablante favorece ‘espíritu’. El artículo indefinido conserva la falta de determinación del hebreo.
- source_word: עַל פָּנַי
  english_pob_choice: before my face
  chosen_spanish: delante de mi rostro
  alternatives_spanish:
  - sobre mi rostro
  - ante mi rostro
  - pasando junto a mí
  lexicon: HALOT
  rationale: La expresión literal es ‘sobre mi rostro’, pero con יַחֲלֹף (‘pasó’) la idea es de movimiento frente al hablante. ‘Delante de mi rostro’ conserva la imagen concreta sin sonar forzado en español.
- source_word: יַחֲלֹף
  english_pob_choice: passed
  chosen_spanish: pasó
  alternatives_spanish:
  - pasó de largo
  - se deslizó
  lexicon: HALOT
  rationale: El verbo חלף suele significar ‘pasar’ o ‘pasar de largo’. ‘Pasó’ es breve, natural y mantiene la acción descrita sin añadir interpretación.
- source_word: תְּסַמֵּר
  english_pob_choice: bristled
  chosen_spanish: se erizó
  alternatives_spanish:
  - se puso erizado
  - se puso de punta
  lexicon: HALOT
  rationale: El verbo indica poner rígido o erguido. Con ‘cabello’ como sujeto, ‘se erizó’ comunica bien la reacción física y conserva un registro literario adecuado.
- source_word: שַׂעֲרַת בְּשָׂרִי
  english_pob_choice: the hair of my flesh
  chosen_spanish: el cabello de mi carne
  alternatives_spanish:
  - el vello de mi cuerpo
  - el cabello de mi cuerpo
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente ‘el cabello de mi carne’. ‘Cabello de mi carne’ preserva la imagen y el tono solemne; ‘vello de mi cuerpo’ sería más idiomático pero menos cercano al hebreo.
theological_decisions:
- issue: 'רוּחַ: ¿espíritu, viento o aliento?'
  english_pob_reading: The context favors 'spirit' while noting the alternatives in a footnote.
  chosen_spanish_reading: un espíritu
  alternative_spanish_readings:
  - un viento
  - un aliento
  rationale: En la escena, la presencia que pasa provoca sobresalto y encaja mejor con ‘espíritu’ que con una referencia meteorológica o fisiológica. Se conserva la ambigüedad reconocida por la POB mediante nota.
  doctrine_reference: Job 4:15; cf. HALOT on רוּחַ
- issue: 'Imagen corporal: ‘flesh’ como ‘carne’'
  english_pob_reading: the hair of my flesh
  chosen_spanish_reading: el cabello de mi carne
  alternative_spanish_readings:
  - el vello de mi cuerpo
  rationale: ‘Carne’ mantiene la literalidad del hebreo בָּשָׂר y evita suavizar la expresión a una paráfrasis anatómica. La formulación preserva la fuerza poética del texto.
  doctrine_reference: Job 4:15; cf. HALOT on בָּשָׂר
translation_notes:
  revision_awareness: Se siguió el consenso alto del control cruzado y no hubo revisiones aplicadas en el pasaje fuente. La redacción española conserva la ambigüedad léxica documentada en la nota, pero adopta la opción contextual principal ‘espíritu’.
  spanish_consistency_notes:
  - Se mantiene ‘espíritu’ para רוּחַ conforme al criterio terminológico del proyecto cuando el contexto apunta a una presencia personal o visionaria.
  - Se traduce בָּשָׂר por ‘carne’ y no por ‘cuerpo’, para no diluir la literalidad del hebreo.
  - Se usa ‘rostro’ como equivalente de פָּנִים/פָּנַי para mantener el tono solemne y la imagen concreta del texto.
