    rationale: Aunque formalmente posible, en español bíblico contemporáneo suena rígido. El hebreo יְשֻׁנֶּא puede expresarse naturalmente como «cambia» sin perder el valor de cambio pasivo/medio implícito en contexto.
  - severity: low
