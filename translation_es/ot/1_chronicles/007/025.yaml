lexical_decisions:
- source_word: רֶפַח
  english_pob_choice: Rephah
  chosen_spanish: Refáh
  alternatives_spanish:
  - Refa
  - Refach
  - Refaḥ
  lexicon: HALOT
  rationale: Nombre propio en una genealogía; se translitera en lugar de traducirse. Se mantiene una forma española legible que refleja las consonantes hebreas y evita sustituirla por un equivalente no atestiguado.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - el hijo de él
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera persona masculina se expresa de manera natural en español como 'su hijo'. Se conserva la fórmula genealógica sin añadir un verbo explícito, como en el hebreo.
- source_word: רֶשֶׁף
  english_pob_choice: Resheph
  chosen_spanish: Reséf
  alternatives_spanish:
  - Resef
  - Reshef
  - Résef
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio dentro de una lista genealógica. Se translitera con ortografía española fluida, sin forzar el sentido léxico de 'llama' o 'plaga' que no corresponde al contexto.
- source_word: תֶלַח
  english_pob_choice: Telah
  chosen_spanish: Teláh
  alternatives_spanish:
  - Tela
  - Telaj
  - Télah
  lexicon: HALOT
  rationale: Nombre propio en contexto genealógico; se translitera. El acento ayuda a la lectura en español sin alterar la identificación del nombre.
- source_word: תַחַן
  english_pob_choice: Tahan
  chosen_spanish: Tahan
  alternatives_spanish:
  - Tahán
  - Taján
  lexicon: HALOT
  rationale: Nombre propio en genealogía; se conserva de forma transliterada y reconocible. No se traduce ni se interpreta.
- source_word: וְ
  english_pob_choice: ', / and'
  chosen_spanish: ','
  alternatives_spanish:
  - y
  - e
  lexicon: HALOT
  rationale: La conjunción hebrea encadena nombres en una serie genealógica. En español, la enumeración con comas resulta más natural y preserva la estructura listada sin sobrecargarla con repeticiones innecesarias de 'y'.
translation_notes:
  revision_awareness: 'El texto fuente coincide plenamente con la revisión más reciente: no se requieren cambios textuales ni decisiones de variante. La traducción española sigue la misma lectura genealógica del original hebreo y del audit trail inglés.'
  spanish_consistency_notes:
