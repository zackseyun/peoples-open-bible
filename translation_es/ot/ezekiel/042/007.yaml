translation:
  language: es
  text: Y el muro que estaba fuera, junto a las cámaras, hacia el atrio exterior, frente a las cámaras—su longitud era de cincuenta codos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: גָדֵר
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - barrera
  lexicon: HALOT
  rationale: גדר nombra una estructura de cierre o separación. En un contexto arquitectónico del templo, «muro» comunica mejor una obra fija y medida; «pared» suena más doméstico, y «barrera» más abstracta.
- source_word: לַחוּץ
  english_pob_choice: outside
  chosen_spanish: fuera
  alternatives_spanish:
  - afuera
  - al exterior
  lexicon: HALOT
  rationale: La expresión marca ubicación exterior respecto de las cámaras. «Fuera» es natural y breve en español, sin perder el contraste espacial.
- source_word: לְעֻמַּת
  english_pob_choice: alongside
  chosen_spanish: junto a
  alternatives_spanish:
  - frente a
  - paralelo a
  - en correspondencia con
  lexicon: HALOT
  rationale: La preposición puede indicar correspondencia, oposición o alineación. «Junto a» refleja la relación espacial directa en un español claro, sin forzar una idea técnica de paralelismo que el hebreo puede sugerir pero no exige de forma exclusiva.
- source_word: לְּשָׁכוֹת
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - salas
  - cuartos
  lexicon: HALOT
  rationale: En la visión del templo, לשכות son dependencias arquitectónicas específicas. «Cámaras» conserva el valor técnico y la tradición de traducción bíblica, más que «salas» o «cuartos».
- source_word: הֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: the outer court
  chosen_spanish: el atrio exterior
  alternatives_spanish:
  - el patio exterior
  - la corte exterior
  lexicon: HALOT
  rationale: En español bíblico, «atrio» es un término establecido para el espacio del templo. «Exterior» mantiene la distinción con el atrio interior; «patio» sería menos técnico en este contexto.
- source_word: אֶל פְּנֵי
  english_pob_choice: in front of
  chosen_spanish: frente a
  alternatives_spanish:
  - delante de
  - ante
  lexicon: HALOT
  rationale: El modismo indica posición de frente o delante de algo. «Frente a» es la opción más natural y precisa para el alineamiento arquitectónico.
- source_word: אָרְכּוֹ
  english_pob_choice: its length
  chosen_spanish: su longitud
  alternatives_spanish:
  - su largo
  - su extensión
  lexicon: HALOT
  rationale: El sufijo retoma el muro/barra medido. «Longitud» es el término técnico más claro en una descripción de medidas.
- source_word: חֲמִשִּׁים אַמָּה
  english_pob_choice: fifty cubits
  chosen_spanish: cincuenta codos
  alternatives_spanish:
  - cincuenta cubitos
  - unos veintidós metros aproximadamente
  lexicon: HALOT
  rationale: Se preserva la unidad antigua como en la traducción inglesa auditable. «Codos» es el equivalente español directo de אַמָּה y mantiene la transparencia del dato de medida.
translation_notes:
  revision_awareness: El inglés POB pasó de «parallel to» a «alongside» para לְעֻמַּת, privilegiando una relación espacial más directa. La versión española sigue esa revisión con «junto a», manteniendo el sentido de alineación/lateralidad sin convertirlo en una afirmación geométrica más fuerte de lo que exige el hebreo.
  spanish_consistency_notes:
  - Se usa «atrio» para el espacio del templo de forma consistente con el registro bíblico español.
  - Se mantiene «codos» como unidad de medida para transparencia y auditabilidad.
  - Se evita «SEÑOR» o sustitutos reverenciales porque este versículo no contiene el Tetragrámaton ni una cita divina directa.
