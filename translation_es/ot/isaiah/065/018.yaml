revisions:
- from: Pero alégrense y gócense para siempre en lo que yo estoy creando; porque, miren[a], yo estoy creando a Jerusalén como gozo, y a su pueblo como alegría.
  to: Pero alégrense y gócense para siempre en lo que yo estoy creando; porque he aquí[a], yo estoy creando a Jerusalén como regocijo, y a su pueblo como alegría.
  rationale: Se mantiene la lectura predicativa principal del hebreo, pero se sustituye «miren» por «he aquí» para reflejar mejor הִנְנִי en registro profético solemne. También se cambia «como gozo» por «como regocijo» para sonar más natural en español y conservar más claramente la conexión léxica con los verbos de regocijo del versículo. La nota alternativa se ajusta en consecuencia.
