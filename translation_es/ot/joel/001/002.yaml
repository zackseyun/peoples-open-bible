    issue: «todos los habitantes de la tierra» no sigue la decisión contextual auditada para הָאָרֶץ
    rationale: El expediente inglés documenta que aquí el mejor sentido es local/nacional («the land»), no el más amplio. En español conviene «del país» o «de la tierra» solo si se mantiene claramente el sentido local; «de la tierra» en español moderno tiende a leerse como mundial y contradice la decisión principal.
