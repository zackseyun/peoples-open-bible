revisions:
- from: '«Así dice Ciro, rey de Persia: Yahvé, el Dios de los cielos, me ha dado todos los reinos de la tierra, y él me ha encargado construirle una casa en Jerusalén, que está en Judá. ¿Quién de entre ustedes, de todo su pueblo, está con él? Que Yahvé su Dios[a] esté con él[b], y suba[c].»'
  to: '«Así dice Ciro, rey de Persia: Yahvé, el Dios de los cielos, me ha dado todos los reinos de la tierra, y él me ha encargado construirle una casa en Jerusalén, que está en Judá. Quienquiera[a] de entre ustedes, de todo su pueblo, que Yahvé su Dios esté con él[b], y suba[c].»'
  rationale: Se corrige un error sustancial de sentido en la cláusula partitiva «מִי בָכֶם מִכָּל עַמּוֹ», eliminando la adición no atestiguada «está con él» y devolviendo «con él» a la bendición «Yahvé su Dios esté con él». También se reemplaza la pregunta por una invitación abierta más fiel al original y se normalizan las notas para reflejar las alternativas y observaciones preservadas en el expediente inglés sin redundancia.
