translation:
  language: es
  text: Yahvé es clemente y compasivo[a], lento para enojarse y grande en amor fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "abundante en amor fiel". La expresión hebrea puede enfatizar tanto la grandeza como la abundancia del amor de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַנּוּן
  english_pob_choice: gracious
  chosen_spanish: clemente
  alternatives_spanish:
  - gracioso
  - lleno de gracia
  - benigno
  lexicon: HALOT
  rationale: El hebreo expresa alguien que concede favor/gracia. En español, 'clemente' comunica benevolencia activa y funciona de manera natural en paralelo con 'compasivo', sin perder la idea de favor divino.
- source_word: רַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - lleno de compasión
  - piadoso
  lexicon: HALOT
  rationale: El término denota profunda compasión o misericordia. 'Compasivo' preserva la distinción con חַנּוּן y es claro en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé''. Conserva el nombre propio del pacto y no lo sustituye por un título.'
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: slow to anger
  chosen_spanish: lento para la ira
  alternatives_spanish:
  - paciente
  - tardo para la ira
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español para esta expresión hebrea. Mantiene el sentido de paciencia ante la provocación sin traducir de forma literal la imagen corporal.
- source_word: וּגְדָל חָסֶד
  english_pob_choice: great in steadfast love
  chosen_spanish: grande en amor firme
  alternatives_spanish:
  - abundante en amor firme
  - grande en amor leal
  - abundante en amor leal
  lexicon: HALOT
  rationale: El hebreo puede enfatizar magnitud o abundancia del חָסֶד. 'Amor firme' busca expresar la fuerza de amor leal/covenantal sin recurrir a una fórmula demasiado técnica; 'grande' conserva la idea de magnitud del adjetivo.
theological_decisions:
- issue: Cómo verter חָסֶד sin borrar su peso de alianza
  english_pob_reading: steadfast love, with a footnote allowing 'abounding in steadfast love'
  chosen_spanish_reading: amor firme
  alternative_spanish_readings:
  - amor leal
  - amor constante
  - misericordia
  rationale: El hebreo חָסֶד contiene afecto, lealtad y durabilidad en un marco relacional de pacto. 'Amor firme' intenta mantener esa densidad semántica en español sin reducirlo solo a emoción ('amor') ni solo a una categoría teológica abstracta. La nota preserva la posibilidad de leer el giro como 'abundante' o como 'grande'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — חָסֶד / covenant love'
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton según la práctica doctrinal del proyecto, evitando la sustitución por un título. 'Yahvé' es la forma estable en español del mismo nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios textuales en la revisión más reciente; se mantuvo el sentido del original hebreo y la nota alternativa sobre la amplitud/abundancia de חָסֶד.
  spanish_consistency_notes:
  - Se mantuvo la distinción semántica entre חַנּוּן ('clemente') y רַחוּם ('compasivo').
  - Se usó 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - '''Amor firme'' se escogió para reflejar חָסֶד con claridad natural en español; la nota conserva la alternativa semántica de abundancia.'
  - La puntuación reproduce la cadencia de una declaración poética breve y equilibrada.
