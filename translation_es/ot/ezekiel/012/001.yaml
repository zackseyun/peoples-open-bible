lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce la fórmula profética estándar. En español, 'Y vino' mantiene la secuencia y el movimiento de llegada sin caer en un calco pesado como 'y aconteció'.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, 'palabra' conserva mejor el valor revelatorio y verbal que 'mensaje', y corresponde al uso establecido del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio del proyecto. No se sustituye por un título ni por una máscara litúrgica.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición indica dirección de la revelación; 'a mí' es la forma natural y clara en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijo:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: '''Diciendo,'' reproduce la función introductoria de speech marker en estilo formal y mantiene el flujo profético del hebreo.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton. En español del proyecto se usa 'Yahvé' para conservar el nombre propio del Dios del pacto, en lugar de una sustitución por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el anclaje [a] en el texto español, para que la nota de pie corresponda exactamente al marcador presente.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y solemne.
  - Se evita la sustitución de Yahvé por un título genérico.
  - La puntuación conserva la cadencia introductoria del hebreo y del POB inglés.
