translation:
  language: es
  text: Ahora bien, cuando se celebraban los juegos cuatrienales en Tiro[a], y el rey estaba presente,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego πενταετηρικοῦ dice literalmente «de cinco años», pero en el uso festivo suele referirse a juegos celebrados cada cuatro años por conteo inclusivo.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀγομένου
  english_pob_choice: were being held
  chosen_spanish: se celebraban
  alternatives_spanish:
  - se estaban celebrando
  - tenían lugar
  - se llevaban a cabo
  lexicon: LSJ
  rationale: El genitivo absoluto con ἄγω, aplicado a una fiesta o certamen, expresa su realización o celebración en curso. «Se celebraban» suena natural en español y conserva el valor aspectual sin añadir elementos ajenos al texto.
- source_word: πενταετηρικοῦ
  english_pob_choice: quadrennial
  chosen_spanish: cuatrienales
  alternatives_spanish:
  - quinquenales
  - cada cinco años
  lexicon: LSJ
  rationale: Aunque la forma griega es literalmente de «cinco años», el uso festivo cuenta de modo inclusivo y designa un ciclo de cuatro años. «Cuatrienales» transmite el intervalo real de forma clara para el español.
- source_word: ἀγῶνος
  english_pob_choice: games
  chosen_spanish: juegos
  alternatives_spanish:
  - competencia
  - certamen
  - juegos atléticos
  lexicon: LSJ
  rationale: En este contexto cívico-festivo de Tiro, ἀγών se refiere a juegos públicos. «Juegos» es el equivalente más natural y no añade una precisión que el verso no explicita.
- source_word: ἐν Τύρῳ
  english_pob_choice: in Tyre
  chosen_spanish: en Tiro
  alternatives_spanish:
  - en la ciudad de Tiro
  lexicon: LSJ
  rationale: Es una localización directa; se conserva el nombre propio en su forma española habitual.
- source_word: τοῦ βασιλέως παρόντος
  english_pob_choice: and the king was present
  chosen_spanish: y el rey estaba presente
  alternatives_spanish:
  - con el rey presente
  - y con el rey en asistencia
  lexicon: LSJ
  rationale: El segundo genitivo absoluto se vierte como una oración coordinada para mantener la fluidez en español, preservando la circunstancia acompañante del evento.
