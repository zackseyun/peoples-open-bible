translation:
  language: es
  text: para expulsar[a] de delante de ti naciones más grandes y más poderosas que tú, para introducirte, para darte su tierra como herencia, como sucede hoy[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'desposeer' o 'hacer que otro herede al despojar a los ocupantes previos'. El verbo hebreo implica quitar a los habitantes anteriores para que otro reciba la tierra.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''como este día'', un modismo que significa ''como es evidente hoy'' o ''como está hoy''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהוֹרִישׁ
  english_pob_choice: to drive out
  chosen_spanish: expulsar
  alternatives_spanish:
  - desposeer
  - echar fuera
  - hacer salir
  lexicon: HALOT
  rationale: En este contexto de conquista y ocupación territorial, el verbo hebreo expresa remover a los ocupantes previos. En español, 'expulsar' comunica bien la acción causativa sin perder la fuerza de desalojo que la POB inglesa quiso preservar con 'drive out'.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: El contexto es geopolítico y militar; 'naciones' es el equivalente más natural y conserva el alcance colectivo del hebreo.
- source_word: גְּדֹלִים וַעֲצֻמִים
  english_pob_choice: greater and mightier
  chosen_spanish: más grandes y más poderosas
  alternatives_spanish:
  - grandes y fuertes
  - más grandes y más fuertes
  - mayores y más poderosas
  lexicon: HALOT
  rationale: La pareja hebrea marca comparación de tamaño y fuerza frente a Israel. 'Más grandes y más poderosas' reproduce esa comparación en español con tono natural.
- source_word: מִמְּךָ
  english_pob_choice: than you
  chosen_spanish: que tú
  alternatives_spanish:
  - más que tú
  - comparadas contigo
  lexicon: HALOT
  rationale: Con comparativos, la preposición hebrea introduce el estándar de comparación. 'Que tú' es la forma más breve y natural en español para este giro.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: El hebreo usa un idiomа espacial de remoción desde la parte frontal/presencia. 'De delante de ti' conserva mejor esa imagen que un simple 'ante ti'.
- source_word: לַהֲבִיאֲךָ
  english_pob_choice: to bring you in
  chosen_spanish: introducirte
  alternatives_spanish:
  - traerte dentro
  - traerte adentro
  - llevarte dentro
  lexicon: HALOT
  rationale: El verbo causativo de בוא aquí apunta a hacer entrar a Israel en la tierra. 'Introducirte' condensa el sentido sin requerir una glosa más larga.
- source_word: לָתֶת לְךָ אֶת אַרְצָם
  english_pob_choice: to give you their land
  chosen_spanish: para darte su tierra
  alternatives_spanish:
  - para entregarte su tierra
  - para darte la tierra de ellos
  lexicon: HALOT
  rationale: La sintaxis hebrea es directa y enfatiza el don divino. 'Darte su tierra' conserva la sencillez y evita sobrecargar la frase.
- source_word: נַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión heredada
  - como patrimonio
  - en herencia
  lexicon: HALOT
  rationale: '''Herencia'' transmite la idea de posesión recibida por heredad, central en Deuteronomio. Es más natural que una traducción demasiado técnica y mantiene el peso teológico del término.'
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hasta hoy
  - tal como hoy
  - como es este día
  lexicon: HALOT
  rationale: El hebreo es un modismo de situación presente y verificable. 'Como en este día' preserva el valor idiomático sin sonar forzado en español.
theological_decisions:
- issue: Término de herencia de la tierra
  english_pob_reading: as an inheritance
  chosen_spanish_reading: como herencia
  alternative_spanish_readings:
  - como posesión
  - como patrimonio
  rationale: En Deuteronomio, la tierra no es solo propiedad sino don pactal recibido. 'Herencia' mantiene ese trasfondo covenantal que la POB inglesa quiso conservar con 'inheritance'.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la fuerza causativa de לְהוֹרִישׁ, el contraste comparativo de גְּדֹלִים וַעֲצֻמִים, el movimiento idiomático de מִפָּנֶיךָ y el valor pactal de נַחֲלָה. No se introdujeron revisiones textuales adicionales ni cambios respecto del acuerdo de alta coincidencia del registro inglés.'
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo; no se requirió decisión sobre el nombre divino.'
  - Se mantuvo 'herencia' para נַחֲלָה por consistencia terminológica con otros pasajes de posesión pactal.
  - '''Naciones'' se usa en sentido político-territorial, no como equivalente genérico de ''pueblos''.'
  - La estructura infinitiva acumulativa se conservó con 'para... para... para...' para reflejar la secuencia del hebreo.
