translation:
  language: es
  text: Y vino a Ecbátana y llegó a la casa de Ragüel, y Sara también salió a su encuentro[a]. Ella lo saludó, y él los saludó[b], y los introdujo en la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Sara también salió a su encuentro». La cláusula final tiene un sujeto singular implícito («y los introdujo en la casa»); el texto no nombra explícitamente quién los hizo entrar.'
    reason: alternative_reading
  - marker: b
    text: El testimonio semítico paralelo refleja la misma escena de llegada y saludo en la casa de Ragüel, aunque con algunas diferencias de redacción y detalle.
    reason: cross_reference
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  lexicon: BDAG
  rationale: En español, «llegó» comunica la llegada narrativa de manera natural y conserva el avance del movimiento sin sonar forzado.
- source_word: παρεγένετο
  english_pob_choice: arrived
  chosen_spanish: se presentó
  alternatives_spanish:
  - arribó
  - llegó a
  lexicon: BDAG
  rationale: El verbo griego añade el matiz de presentarse o hacerse presente en un destino concreto; «se presentó en la casa» distingue el segundo paso sin repetir simplemente «llegó».
- source_word: οἰκίαν
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - morada
  lexicon: BDAG
  rationale: «Casa» es el equivalente más directo y natural para el espacio físico de hospedaje; también puede implicar la unidad doméstica en contexto.
- source_word: Ἐκβάτανα
  english_pob_choice: Ecbatana
  chosen_spanish: Ecbátana
  alternatives_spanish:
  - Ecbatana
  lexicon: transliteración estándar
  rationale: Se conserva el topónimo con adaptación ortográfica mínima al español, manteniendo reconocibilidad y pronunciación.
- source_word: Ῥαγουήλ
  english_pob_choice: Raguel
  chosen_spanish: Ragüel
  alternatives_spanish:
  - Raguel
  lexicon: transliteración estándar
  rationale: Se adopta la forma española con diéresis para reflejar mejor la pronunciación y mantener la identificación con el nombre bíblico tradicional sin perder el vínculo con el griego.
- source_word: Σάρρα
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: transliteración estándar
  rationale: «Sara» es la forma natural en español y corresponde al nombre bíblico conocido; evita una grafía menos usual sin pérdida de identidad.
- source_word: ὑπήντησεν
  english_pob_choice: met
  chosen_spanish: lo encontró
  alternatives_spanish:
  - salió a recibirlo
  - se le acercó
  lexicon: BDAG
  rationale: El verbo puede expresar encuentro; aquí «lo encontró» funciona bien en español y mantiene la relación directa entre Sara y el visitante, sin añadir la idea de salida al encuentro que el texto no explicita.
- source_word: ἐχαιρέτισεν
  english_pob_choice: greeted
  chosen_spanish: lo saludó
  alternatives_spanish:
  - le dio la bienvenida
  - lo recibió con un saludo
  lexicon: BDAG
  rationale: «Lo saludó» reproduce el acto de saludo con claridad y evita sobrecargar el verso con un lenguaje más interpretativo como «dar la bienvenida».
- source_word: αὐτὸς αὐτούς
  english_pob_choice: he greeted them
  chosen_spanish: él los saludó
  alternatives_spanish:
  - él también los saludó
  - los saludó a ellos
  lexicon: BDAG
  rationale: La frase griega es breve y algo elíptica; en español conviene explicitar el sujeto con «él» para que la referencia sea transparente, manteniendo el paralelismo de saludos.
- source_word: εἰσήγαγεν
  english_pob_choice: brought ... into
  chosen_spanish: los introdujo en
  alternatives_spanish:
  - los llevó a
  - los condujo a
  lexicon: BDAG
  rationale: «Introdujo» expresa el acto de hacer pasar a un espacio interior y es más preciso que un simple «llevar» para el gesto de hospitalidad narrativa.
theological_decisions:
- issue: Sujeto implícito en el último verbo
  english_pob_reading: he brought them into the house
  chosen_spanish_reading: él los introdujo en la casa
  alternative_spanish_readings:
  - los introdujo en la casa
  - fueron introducidos en la casa
  rationale: El griego usa un verbo singular sin sujeto explícito; el contexto narrativo permite entender que se trata del anfitrión o representante de la casa. En español se mantiene el sujeto implícito con «él» para evitar ambigüedad, sin nombrar indebidamente al actor.
  doctrine_reference: criterio de referencia gramatical y coherencia narrativa
translation_notes:
  revision_awareness: 'Se atendió la advertencia previa sobre las marcas de nota: ahora cada nota aparece anclada en el texto con su marcador correspondiente. También se mantuvo la progresión verbal del griego (llegada, encuentro, saludo, entrada) sin fusionar indebidamente los movimientos.'
  spanish_consistency_notes:
  - Se usa «casa» para οἰκίαν en coherencia con el sentido inmediato de morada física.
  - 'Se conserva la transliteración bíblica estándar en español con adaptación mínima: «Ecbátana», «Ragüel», «Sara».'
  - Se evita introducir un nombre sujeto explícito en el verbo final más allá de «él», porque el griego no lo nombra en forma plena.
  - El estilo mantiene registro bíblico moderno y digno, evitando arcaísmos innecesarios.
