translation:
  language: es
  text: 'Y para la tribu de los hijos de Isacar, un líder: Paltiel hijo de Azán.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  english_pob_choice: And for the tribe of
  chosen_spanish: Y para la tribu de
  alternatives_spanish:
  - Y para el bastón de
  - Y para la rama de
  lexicon: HALOT
  rationale: En contextos tribales y de reparto, מַטֶּה significa 'tribu'. En español, 'tribu de' transmite con claridad la unidad administrativa y evita el literalismo de 'bastón' o 'rama', que serían engañosos aquí. Conjunción y preposición se integran naturalmente como 'Y para'.
- source_word: בְנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos de
  - los descendientes de
  lexicon: HALOT
  rationale: בְנֵי es formalmente 'hijos de' y aquí funciona como designación tribal estable. En español, 'los hijos de' conserva la forma tradicional y la referencia masculina del hebreo sin neutralizarla.
- source_word: יִשָׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Isacar
  - Issajar
  lexicon: Nombre propio
  rationale: Nombre propio tribal; 'Isacar' es la transliteración bíblica habitual y más legible en español que una forma más fonética o menos establecida.
- source_word: נָשִׂיא
  english_pob_choice: a leader
  chosen_spanish: un líder
  alternatives_spanish:
  - un jefe
  - un príncipe
  - un caudillo
  lexicon: HALOT
  rationale: En Números 34 se trata del representante designado de la tribu. 'Líder' comunica bien la función administrativa en español moderno y evita las connotaciones monárquicas o arcaizantes de 'príncipe'.
- source_word: פַּלְטִיאֵל
  english_pob_choice: Paltiel
  chosen_spanish: Paltiel
  alternatives_spanish:
  - Paltiel
  lexicon: Nombre propio
  rationale: Nombre propio; se conserva transliterado sin traducción.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Marcador patronímico estándar. 'Hijo de' es la equivalencia directa y natural en español.
- source_word: עַזָּן
  english_pob_choice: Azzan
  chosen_spanish: Azán
  alternatives_spanish:
  - Azzán
  - Azan
  lexicon: Nombre propio
  rationale: Nombre propio transliterado al español con acento gráfico para conservar la pronunciación llana/oxítona según uso bíblico español y facilitar la lectura. La forma 'Azán' es más natural en español que duplicar grafías ajenas.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español sigue de cerca la estructura de lista del hebreo y el equivalente funcional auditado en inglés, sin añadir glosas ni suavizar la designación tribal.
  spanish_consistency_notes:
  - Se mantiene el patrón administrativo de una lista nominal breve.
  - '''Hijos de'' se conserva para reflejar la fórmula tribal hebrea.'
  - Se evita 'SEÑOR' u otras convenciones no presentes en el versículo.
  - Los nombres propios se adaptan a la ortografía española estándar cuando existe forma establecida.
