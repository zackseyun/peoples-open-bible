id: 1CO.9.27
reference: 1 Corinthians 9:27
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ ὑπωπιάζω μου τὸ σῶμα καὶ δουλαγωγῶ, μή πως ἄλλοις κηρύξας αὐτὸς ἀδόκιμος γένωμαι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/009/027.yaml
  text: But I discipline my body and make it my slave[a], lest somehow, after preaching to others[c][b], I myself should become disqualified.
  footnotes:
  - marker: a
    text: Or 'I pummel my body'; the Greek verb literally refers to striking under the eye, used here metaphorically for severe self-discipline.
    reason: lexical_alternative
  - marker: b
    text: Or 'make it a slave' / 'enslave it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'rejected' or 'unapproved'; 'disqualified' fits the athletic imagery in the context.
    reason: alternative_reading
translation:
  language: ko
  text: 도리어 나는 내 몸을 쳐서 노예로 부립니다. 다른 사람들에게 선포한 후에 내 자신이 자격을 잃지 않으려는 것입니다.
  philosophy: optimal-equivalence
