translation:
  language: es
  text: Este es el servicio de los hijos de Coat en la tienda de reunión, acerca de las cosas santísimas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el Lugar Santísimo" / "el Santo de los Santos". Aquí la frase probablemente se refiere a los objetos sagrados de máxima santidad, más que solo al recinto interior.'
    reason: alternative_reading
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  lexicon: HALOT
  rationale: El demostrativo femenino singular introduce la cláusula y en español requiere una cópula explícita natural; 'Esta es' preserva el valor deíctico sin añadir contenido.
- source_word: עֲבֹדַת
  english_pob_choice: the service
  chosen_spanish: la tarea
  alternatives_spanish:
  - el servicio
  - el trabajo
  - el deber
  lexicon: HALOT
  rationale: Aquí designa una labor cultual asignada. 'Tarea' comunica bien el encargo concreto y evita que 'servicio' suene demasiado abstracto en español, aunque mantiene el carácter formal del deber sagrado.
- source_word: בְּנֵי קְהָת
  english_pob_choice: the sons of Kohath
  chosen_spanish: los hijos de Coat
  alternatives_spanish:
  - los descendientes de Coat
  - los coatitas
  lexicon: HALOT
  rationale: Se conserva la estructura genealógica del hebreo de forma transparente. 'Coat' sigue la transliteración estándar en español bíblico para קְהָת.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: '''Tienda de reunión'' reproduce el nombre técnico del santuario portátil con español natural y fiel al uso bíblico. Se evita ''tabernáculo'' como término más tradicional pero menos literal al componente de ''tienda''.'
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: the most holy things
  chosen_spanish: las cosas santísimas
  alternatives_spanish:
  - las cosas más santas
  - el lugar santísimo
  - el Santo de los Santos
  lexicon: HALOT
  rationale: El contexto de Números 4 trata del traslado y manejo de objetos del santuario, por lo que la referencia funcional a los objetos sagrados es preferible. 'Cosas santísimas' conserva la intensidad del superlativo y evita fijarlo indebidamente como un lugar.
theological_decisions:
- issue: Alcance de קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_reading: Refers to the most holy sacred objects entrusted to the Kohathites
  chosen_spanish_reading: Se refiere a las cosas santísimas, es decir, a los objetos sagrados de más alto grado de santidad confiados a los coatitas
  alternative_spanish_readings:
  - Se refiere al lugar santísimo como espacio interior
  - Se refiere al Santo de los Santos
  rationale: El contexto inmediato de Números 4 trata de la cobertura, transporte y custodia de los utensilios del tabernáculo. Por eso conviene mantener la lectura funcional sobre los objetos sagrados, sin negar que la expresión pueda sugerir un lugar en otros contextos.
  doctrine_reference: Números 4:4; cf. el uso contextual de קֹדֶשׁ הַקֳּדָשִׁים en el Pentateuco
translation_notes:
  revision_awareness: La versión inglesa revisada añadió 'concerning' para conectar con más naturalidad la frase sobre los objetos santísimos. En español, la relación se expresa con 'respecto de', que conserva la conexión semántica sin sugerir una aposición indebida.
  spanish_consistency_notes:
  - Se mantiene 'tienda de reunión' para בְּאֹהֶל מוֹעֵד, consistente con el nombre técnico del santuario portátil.
  - Se usa 'hijos de Coat' en lugar de 'coatitas' para seguir la transparencia genealógica del original.
  - Se conserva 'cosas santísimas' para reflejar la lectura funcional de la expresión, alineada con la nota auditada en inglés.
