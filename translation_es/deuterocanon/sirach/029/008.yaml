review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: contraste adversativo, paciencia hacia el humilde, y prohibición de demorarlo respecto de la limosna. Sin embargo, falta conservar la alternativa léxica principal documentada en el rastro inglés para μὴ παρελκύσῃς, que en este contexto también puede expresarse como ''no lo retrases al darle limosna'' o ''no demores darle limosna''.'
  spanish_quality_summary: El texto es claro y natural. No obstante, 'para la limosna' suena algo menos idiomático en español que una construcción verbal como 'al darle limosna' o 'para darle limosna'. Además, la nota actual se centra en ταπεινός, pero el rastro inglés preserva una nota sobre el matiz verbal de παρελκύσῃς; conviene alinear la nota española con esa decisión auditada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Limosna' corresponde bien a ἐλεημοσύνη. 'Humilde' es defendible para ταπεινός en contexto, aunque con nota alternativa. La revisión propuesta mantiene fidelidad léxica y mejora la naturalidad del español.
  issues:
  - severity: medium
    issue: La nota al pie no sigue la nota léxica preservada en el audit trail inglés.
    rationale: El POB inglés documenta la ambigüedad de μὴ παρελκύσῃς ('postpone/draw out the matter'), pero la nota española desplaza la atención a ταπεινός. Eso debilita la trazabilidad de una decisión léxica significativa.
  - severity: low
    issue: '''para la limosna'' es comprensible pero algo rígido en español.'
    rationale: En español bíblico natural, 'al darle limosna' o 'para darle limosna' expresa mejor la relación verbal implícita en ἐπʼ ἐλεημοσύνην y el objeto personal αὐτόν.
  revised_spanish_text: Pero con el humilde, sé paciente, y no lo hagas esperar[a] al darle limosna.
  revised_footnotes:
  - marker: a
    text: 'O: «no lo retrases al darle limosna». El verbo griego puede significar retrasar o alargar el asunto.'
    reason: lexical_alternative
