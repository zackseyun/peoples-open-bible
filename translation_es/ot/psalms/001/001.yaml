source:
  edition: WLC
  text: אַ֥שְֽׁרֵי הָ/אִ֗ישׁ אֲשֶׁ֤ר לֹ֥א הָלַךְ֮ בַּ/עֲצַ֪ת רְשָׁ֫עִ֥ים וּ/בְ/דֶ֣רֶךְ חַ֭טָּאִים לֹ֥א עָמָ֑ד וּ/בְ/מוֹשַׁ֥ב לֵ֝צִ֗ים לֹ֣א יָשָֽׁב־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/001/001.yaml
  text: Blessed is the man who does not walk in the counsel of the wicked[a], nor stand in the way of sinners[c][b], nor sit in the seat of scoffers.
  footnotes:
  - marker: a
    text: Hebrew 'the man' is grammatically masculine singular and here represents the exemplary righteous person generally, not only males.
    reason: cultural_note
  - marker: b
    text: Or 'Happy is the man'; the Hebrew beatitude carries the sense of a deeply fortunate or blessed state, not merely an emotion.
    reason: lexical_alternative
  - marker: c
    text: Or 'mockers' for 'scoffers.'
    reason: lexical_alternative
