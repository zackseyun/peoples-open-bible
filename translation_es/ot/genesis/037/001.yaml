review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: mantiene «Ahora», repite «en la tierra», y conserva la referencia a Canaán. Sin embargo, «de las moradas de su padre» no preserva adecuadamente el matiz de מְגוּרֵי, que apunta a residencia como forastero/estancia temporal, no simplemente a ‘moradas’.'
  spanish_quality_summary: El español es claro y digno, pero «la tierra de las moradas de su padre» suena poco idiomático y además debilita el sentido léxico. Una formulación como «la tierra donde su padre había vivido como forastero» suena natural en español y comunica mejor el valor semántico del hebreo. La nota al pie también debe ajustarse para que la alternativa literal corresponda a la nueva redacción principal.
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo la preferencia por precisión léxica. «Canaán» está bien. El problema principal es מְגוּרֵי: debe reflejar estancia/forastería/sojourning, no ‘moradas’.'
  issues:
