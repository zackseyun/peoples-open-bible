  rationale: 'Se ajusta únicamente la expresión de ruego y el valor de לִמְנוּחָה para lograr un español más natural y fiel al efecto contextual del hebreo y del inglés auditado: «traiga descanso» comunica mejor el alivio producido por la palabra del rey que «sea para descanso». Se conservan sin cambio las decisiones léxicas principales y las notas.'
