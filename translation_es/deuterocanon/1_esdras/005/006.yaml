    rationale: Aunque comprensible, en español suena menos natural en este contexto y puede leerse como si modificara directamente a «tribu», una entidad colectiva. «El que habló» expresa mejor la referencia al individuo identificado por la cláusula relativa, en línea con el griego ὃς y con un registro narrativo claro.
