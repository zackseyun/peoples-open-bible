revisions:
- from: Si se te presenta en el camino un nido de ave[a], en cualquier árbol o sobre la tierra, con polluelos o con huevos, y la madre está echada sobre los polluelos o sobre los huevos[b], no tomarás a la madre junto con los hijos.
  to: Si se te presenta en el camino un nido de ave[a], en cualquier árbol o en el suelo, con polluelos o con huevos, y la madre está posada sobre los polluelos o sobre los huevos[b], no tomarás a la madre junto con las crías.
  rationale: La revisión conserva la estructura y el sentido del borrador, pero mejora la fidelidad contextual y la naturalidad del español. «En el suelo» es más idiomático que «sobre la tierra» aquí; «está posada» encaja mejor con un ave en el nido que «está echada»; y «las crías» refleja mejor el valor contextual de הַבָּנִים que «los hijos», de acuerdo con la rationale del POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura casuística, el hallazgo incidental, la ubicación del nido y la prohibición de tomar a la madre con la cría. Sin embargo, dos elecciones debilitan la fidelidad al sentido auditado: «está echada» no refleja tan naturalmente el contexto aviar de רֹבֶצֶת como «está posada/sentada», y «los hijos» para הַבָּנִים suena poco idiomático en español para aves, mientras que el rastro POB justificó «the young» precisamente para evitar esa torpeza contextual.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «sobre la tierra» suena menos natural que «en el suelo» en este contexto concreto, y «junto con los hijos» resulta rígido y poco natural para una ley sobre aves. «Se te presenta» es aceptable, aunque «te encuentras» o «encuentras» sería más coloquial; no requiere cambio. Conviene pulir hacia un español más natural sin perder precisión.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La revisión propuesta mantiene el carácter legal de «no tomarás», conserva «ave» y ajusta el léxico contextual: «polluelos» para אֶפְרֹחִים, «posada» para רֹבֶצֶת en contexto aviar, y «las crías» para הַבָּנִים en contexto animal, en línea con la rationale inglesa de «the young».'
  issues:
  - severity: medium
    issue: «Está echada» para רֹבֶצֶת
    rationale: Aunque posible, suena menos natural en español para un ave sobre huevos o polluelos. El inglés auditado eligió «is sitting» precisamente para mantener la imagen física sin sobreinterpretar; «está posada» o «está sentada» refleja mejor el contexto aviar.
  - severity: high
    issue: «Junto con los hijos» para הַבָּנִים
    rationale: En español, «hijos» para aves resulta forzado y menos legible. La decisión inglesa evitó «children» y optó por «the young» por precisión contextual. «Las crías» o «los polluelos» preserva mejor el sentido del hebreo en contexto animal.
  - severity: low
    issue: «Sobre la tierra»
    rationale: Es cercano al hebreo, pero en español moderno de lectura general «en el suelo» es más idiomático para la ubicación física de un nido, sin pérdida de sentido.
