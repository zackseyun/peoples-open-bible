translation:
  language: es
  text: Entonces Samuel habló todas las palabras de Yahvé al pueblo, a los que le pedían un rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que le habían pedido un rey». El participio hebreo puede describir una acción en curso o a un grupo caracterizado por esa petición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - expuso
  lexicon: HALOT
  rationale: El hebreo marca el acto de comunicar el mensaje; en español, «habló» conserva el sentido de transmisión oral y suena natural con el complemento «todas las palabras de Yahvé». «Dijo» sería más literal pero menos fluido en esta construcción.
- source_word: אֵת כָּל דִּבְרֵי יְהוָה
  english_pob_choice: all the words of Yahweh
  chosen_spanish: todas las palabras de Yahvé
  alternatives_spanish:
  - todo lo que Yahvé había dicho
  - todas las palabras del Yahvé
  lexicon: HALOT
  rationale: Se mantiene la totalidad del mensaje divino, y «palabras de Yahvé» conserva visible la fórmula bíblica y el nombre divino como en el contexto fuente. «Todo lo que Yahvé había dicho» explicita el sentido, pero debilita la expresión nominal del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé» translitera el nombre propio divino y evita la sustitución por un título.'
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - al pueblo de Israel
  lexicon: HALOT
  rationale: «Pueblo» refleja el sustantivo definido hebreo sin añadir especificación que el texto no da. La contracción «al» corresponde naturalmente a אֶל.
- source_word: הַשֹּׁאֲלִים מֵאִתּוֹ מֶלֶךְ
  english_pob_choice: who were asking him for a king
  chosen_spanish: que le pedía un rey
  alternatives_spanish:
  - que le estaban pidiendo un rey
  - que le habían pedido un rey
  lexicon: HALOT
  rationale: El participio hebreo puede expresar acción en curso o una caracterización del grupo; en español, «que le pedía» mantiene esa ambigüedad entre una solicitud en curso y un grupo definido por esa petición. «Le» representa מֵאִתּוֹ como petición dirigida a Samuel.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La fuente hebrea usa el Tetragrama directamente, no un título. En español, «Yahvé» preserva el nombre personal de Dios conforme a la política del proyecto y mantiene la transparencia respecto del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor aspectual del participio הַשֹּׁאֲלִים
  english_pob_reading: who were asking him for a king
  chosen_spanish_reading: que le pedía un rey
  alternative_spanish_readings:
  - que le había pedido un rey
  - que le estaban pidiendo un rey
  rationale: El inglés POB preserva la posibilidad de acción continua o de caracterización. En español, la forma simple «pedía» conserva esa ambigüedad y evita fijar indebidamente solo una lectura aspectual.
  doctrine_reference: Nota gramatical sobre participios descriptivos en hebreo bíblico
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y no se requieren cambios adicionales respecto del sentido base: se mantiene la totalidad del mensaje, el nombre divino como Yahvé y la ambigüedad aspectual del participio hebreo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera consistente con la política terminológica del proyecto.
  - «Le pedía un rey» evita sobreinterpretar el participio hebreo y conserva la alternancia posible entre acción en curso y caracterización del grupo.
  - La puntuación y la mayúscula inicial siguen el uso estándar en español bíblico contemporáneo.
