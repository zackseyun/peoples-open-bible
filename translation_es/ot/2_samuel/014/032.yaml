revisions:
- from: 'Absalón dijo a Joab: «Mira, te he enviado a decir: “Ven acá, para que yo te envíe al rey y le diga: ‘¿Por qué vine de Guesur? Mejor me habría sido permanecer allí.’ Ahora, pues, que yo vea el rostro del rey; y si hay en mí culpa, que me dé muerte”»[a][b].'
  to: 'Absalón dijo a Joab: «Mira, te mandé decir: “Ven acá, para que yo te envíe al rey y le diga: ‘¿Por qué vine de Guesur? Habría sido mejor para mí quedarme allí’[b].” Ahora, pues, déjame ver el rostro del rey[a]; y si hay en mí culpa, que me dé muerte.”»'
  rationale: Se corrigió el valor de שָׁלַחְתִּי אֵלֶיךָ con «te mandé decir», que expresa envío de recado sin ambigüedad. Se mejoró la naturalidad de la cláusula elíptica sobre Guesur y se hizo más idiomática la petición «déjame ver el rostro del rey» preservando el modismo hebreo. También se recolocaron las notas en sus anclajes exactos dentro del texto.
