translation:
  language: es
  text: Yahvé los[a] aumente, a ustedes y a sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que Yahvé añada a ustedes, a ustedes y a sus hijos». El verbo hebreo puede traducirse más literalmente como «añadir a» o «aumentar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹסֵף
  english_pob_choice: increase
  chosen_spanish: aumente
  alternatives_spanish:
  - añada
  - haga crecer
  - multiplique
  lexicon: HALOT
  rationale: El hebreo יסף en hiphil expresa añadir o aumentar. En español, «aumente» comunica bien el sentido volitivo de bendición y conserva la idea de incremento sin sonar tan mecánico como «añada» en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre personal de Dios en vez de sustituirlo por un título.'
- source_word: עֲלֵיכֶם ... עֲלֵיכֶם
  english_pob_choice: to you, to you
  chosen_spanish: te, a ti
  alternatives_spanish:
  - a ti, a ti
  - sobre ti, sobre ti
  lexicon: HALOT
  rationale: La preposición עַל con sufijo en este dicho de bendición funciona de manera idiomática. En español, «te, a ti» conserva la repetición enfática con naturalidad y refleja la duplicación hebrea sin calcar «sobre».
- source_word: וְעַל בְּנֵיכֶם
  english_pob_choice: and to your children
  chosen_spanish: y a tus hijos
  alternatives_spanish:
  - y sobre tus hijos
  - y a tus descendientes
  lexicon: HALOT
  rationale: בָּנִים puede ser «hijos» o más ampliamente «descendencia». Aquí el paralelo familiar inmediato favorece «hijos», que es claro y fiel sin ampliar innecesariamente el alcance.
theological_decisions:
- issue: Fuerza volitiva de la forma verbal en una bendición
  english_pob_reading: May Yahweh increase you, you and your children.
  chosen_spanish_reading: Yahvé te aumente, a ti y a tus hijos.
  alternative_spanish_readings:
  - Yahvé te aumentará, a ti y a tus hijos.
  - Que Yahvé te aumente, a ti y a tus hijos.
  rationale: El contexto es benediccional, por lo que conviene un valor desiderativo/jusivo en español. La forma con subjuntivo expresa mejor una bendición o ruego que un simple futuro declarativo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s blessing force in context.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que simplificó la idea a «increase you» y mantuvo la repetición enfática. El español refleja esa misma relación breve y benedictoria, sin introducir una paráfrasis expansiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se usa «aumente» para conservar el matiz de incremento del hiphil de יסף.
  - La repetición enfática del hebreo se conserva con «te, a ti» y la expansión familiar «y a tus hijos».
  - El tono es de bendición deseativa, por eso se emplea el subjuntivo.
