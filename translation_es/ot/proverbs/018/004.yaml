translation:
  language: es
  text: Las palabras de la boca de un hombre[b] son aguas profundas[a]; la fuente de sabiduría es un arroyo que fluye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las palabras de la boca de un hombre son aguas profundas, un arroyo que fluye, una fuente de sabiduría». El hebreo puede leerse de modo que ambas imágenes de agua describan las palabras mismas, en vez de hacer de la segunda línea una afirmación aparte sobre la sabiduría.'
    reason: alternative_reading
  - marker: b
    text: «Hombre» traduce el hebreo אִישׁ, un término masculino singular usado aquí en estilo proverbial para un hablante individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: El plural hebreo conserva una imagen poética de abundancia y profundidad; en español, «aguas» suena natural y mantiene el paralelo metafórico.
- source_word: עֲמֻקִּים
  english_pob_choice: deep
  chosen_spanish: profundas
  alternatives_spanish:
  - hondas
  - profundas y hondas
  lexicon: HALOT
  rationale: «Profundas» reproduce la idea de profundidad física y figurada sin volver abstracta la imagen.
- source_word: דִּבְרֵי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - palabras
  lexicon: HALOT
  rationale: «Palabras» es el equivalente más directo y natural en español para el plural constructo de דִּבְרֵי en este proverbio.
- source_word: פִי אִישׁ
  english_pob_choice: of a man's mouth
  chosen_spanish: de la boca de un hombre
  alternatives_spanish:
  - de la boca de un varón
  - del habla de un hombre
  lexicon: HALOT
  rationale: La construcción hebrea se vierte con naturalidad como una relación de posesión/origen en español. «Boca» conserva el órgano de habla; «hombre» preserva el matiz genérico masculino de אִישׁ en estilo sapiencial.
- source_word: נַחַל
  english_pob_choice: brook
  chosen_spanish: arroyo
  alternatives_spanish:
  - riachuelo
  - quebrada
  lexicon: HALOT
  rationale: En español, «arroyo» comunica bien el curso de agua pequeño y en movimiento que equilibra la imagen con «fuente».
- source_word: נֹבֵעַ
  english_pob_choice: flowing
  chosen_spanish: que fluye
  alternatives_spanish:
  - que brota
  - que mana
  lexicon: HALOT
  rationale: El participio transmite movimiento continuo; «que fluye» mantiene el dinamismo sin añadir intensidad no exigida por el texto.
- source_word: מְקוֹר חָכְמָה
  english_pob_choice: the fountain of wisdom
  chosen_spanish: la fuente de sabiduría
  alternatives_spanish:
  - el manantial de sabiduría
  - la fuente de la sabiduría
  lexicon: HALOT
  rationale: «Fuente» conserva el campo semántico de מקור y funciona de manera natural en paralelo con el agua del verso. «Sabiduría» traduce חָכְמָה de forma estable en literatura sapiencial.
theological_decisions:
- issue: Ambigüedad sintáctica en la segunda mitad del versículo
  english_pob_reading: '''The fountain of wisdom is a flowing brook.'' The English note preserves an alternative where both water images describe the words themselves rather than making the second line a separate statement about wisdom.'
  chosen_spanish_reading: «la fuente de sabiduría es un arroyo que fluye»
  alternative_spanish_readings:
  - «las palabras de la boca de un hombre son aguas profundas; son un arroyo que fluye, una fuente de sabiduría»
  - «las palabras de la boca de un hombre son aguas profundas, un arroyo que fluye, una fuente de sabiduría»
  rationale: La estructura principal mantiene la lectura que separa la segunda línea como comparación sobre la sabiduría. Se preserva la tensión textual al no forzar una paráfrasis que elimine la alternativa documentada por la POB inglesa.
  doctrine_reference: Proverbial imagery and Hebrew syntax; no doctrinal claim beyond textual sense
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia y sin cambios necesarios; por eso esta versión conserva la lectura principal de la POB inglesa y mantiene la alternativa sintáctica en nota, sin ampliar el sentido más allá del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se mantuvo el registro sapiencial con léxico concreto de agua, evitando términos más abstractos como «profundo» en sentido filosófico o «sabio» como adjetivo no presente.
  - Se eligió «hombre» para אִישׁ siguiendo el valor genérico masculino documentado en la auditoría inglesa, no como exclusión teológica sino como fidelidad lexical.
