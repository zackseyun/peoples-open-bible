translation:
  language: es
  text: '¡Aplasta las cabezas de los gobernantes de los enemigos[a], que dicen[b]: «No hay nadie excepto nosotros»!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gobernantes enemigos». El griego también puede entenderse de forma más compacta, pero aquí se explicita «de los enemigos» para reflejar mejor la relación genitiva.'
    reason: lexical_alternative
  - marker: b
    text: La fuente griega de este versículo está señalada con incertidumbre de validación ('major_mismatch'); esta traducción sigue la redacción griega de la Zona 1 tal como se da aquí.
    reason: textual_variant
lexical_decisions:
- source_word: σύντριψον
  english_pob_choice: Crush
  chosen_spanish: ¡Rompe!
  alternatives_spanish:
  - ¡Aplasta!
  - ¡Destruye!
  lexicon: LSJ
  rationale: El imperativo aoristo de συντρίβω expresa un quebrantar violento. En español, «rompe» conserva la fuerza directa del mandato y resulta natural; «aplasta» también es posible, pero «rompe» evita añadir una imagen mecánica no explícita.
- source_word: κεφαλὰς
  english_pob_choice: heads
  chosen_spanish: las cabezas
  alternatives_spanish:
  - las cabezas
  - los jefes
  lexicon: LSJ
  rationale: Se mantiene la imagen corporal concreta del griego. «Los jefes» suavizaría el tropo y perdería la fuerza visual del texto.
- source_word: ἀρχόντων
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - rulers
  - príncipes
  - líderes
  lexicon: LSJ
  rationale: ἄρχων denota quienes ejercen autoridad. «Gobernantes» comunica bien esa autoridad en español actual y puede incluir tanto poder político como mando efectivo; «príncipes» sería demasiado estrecho o arcaizante.
- source_word: ἐχθρῶν
  english_pob_choice: of the enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - de los enemigos
  - hostiles
  lexicon: LSJ
  rationale: El genitivo califica a los gobernantes como pertenecientes al campo enemigo. En español, «gobernantes enemigos» conserva la relación sin sobrecargar la sintaxis; el sentido de pertenencia/identificación hostil queda implícito.
- source_word: λεγόντων
  english_pob_choice: who say
  chosen_spanish: de los que dicen
  alternatives_spanish:
  - que dicen
  - diciendo
  lexicon: LSJ
  rationale: El participio presente queda bien reflejado con una relativa que caracteriza a esos gobernantes. «De los que dicen» enlaza con el grupo anterior y mantiene el valor descriptivo continuo.
- source_word: Οὐκ ἔστιν πλὴν ἡμῶν
  english_pob_choice: There is no one except us
  chosen_spanish: No hay nadie fuera de nosotros
  alternatives_spanish:
  - No hay nadie excepto nosotros
  - No hay nadie más que nosotros
  - No hay ninguno aparte de nosotros
  lexicon: LSJ
  rationale: La construcción con πλήν + genitivo expresa exclusión, no comparación. «Fuera de nosotros» reproduce bien la exclusividad arrogante y suena natural en español; no se resuelve la frase hacia una comparación tipo «como nosotros» porque el griego no la exige.
theological_decisions:
- issue: Tono arrogante de la afirmación exclusiva
  english_pob_reading: 'The line is rendered as an arrogant claim of exclusive significance or power: ''There is no one except us.'''
  chosen_spanish_reading: 'La línea se vierte como una afirmación arrogante de exclusividad: «No hay nadie fuera de nosotros».'
  alternative_spanish_readings:
  - No hay nadie más que nosotros
  - No hay ninguno aparte de nosotros
  rationale: El griego expresa exclusión, no necesariamente una comparación de superioridad. La traducción mantiene la soberbia del dicho sin añadir una precisión doctrinal que el texto no explicita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto griego suministrado y la auditoría inglesa; no se introdujeron revisiones adicionales en esta pasada, y la nota textual conserva la incertidumbre de validación indicada en el expediente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva la imagen concreta de «cabezas» para no diluir el mandato violento del original.
  - «Gobernantes enemigos» intenta reflejar el genitivo griego sin forzar una construcción más pesada en español.
  - La cita final se formuló con puntuación de estilo hispano y comillas angulares.
  - No se usa «Cristo» ni terminología eclesiástica ajena al pasaje.
