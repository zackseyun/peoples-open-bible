translation:
  language: es
  text: Pero si ella ha quedado limpia[a] de su flujo, entonces contará para sí siete días, y después quedará limpia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha quedado purificada de su flujo ... después quedará purificada». El hebreo usa la misma raíz en ambas cláusulas: primero para el cese del flujo y luego para el estado ritual resultante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula condicional con valor de continuación o contraste se expresa naturalmente en español como «Pero si», manteniendo el matiz adversativo que el inglés POB captó con «But if».
- source_word: טָהֲרָה
  english_pob_choice: she is cleansed
  chosen_spanish: se ha limpiado
  alternatives_spanish:
  - ha quedado limpia
  - se ha purificado
  - queda limpia
  lexicon: HALOT
  rationale: Aquí el hebreo describe el cese del estado asociado con el flujo. «Se ha limpiado» comunica la transición resultante sin convertirla en una noción moral; además permite distinguirla del estado final posterior.
- source_word: מִזּוֹבָהּ
  english_pob_choice: from her discharge
  chosen_spanish: de su flujo
  alternatives_spanish:
  - de su descarga
  - de su flujo corporal
  - de su emisión
  lexicon: HALOT
  rationale: «Zov» designa una emisión anómala en este contexto ritual. «Flujo» es una opción española clara y sobria; evita el tecnicismo médico innecesario y sigue el sentido del término sin perder el marco de pureza ritual.
- source_word: וְסָפְרָה לָּהּ
  english_pob_choice: then she shall count seven days for herself
  chosen_spanish: entonces contará para sí siete días
  alternatives_spanish:
  - y contará para sí siete días
  - entonces deberá contar siete días para sí
  lexicon: HALOT
  rationale: El valor consecutivo de la forma verbal se expresa con «entonces». «Para sí» conserva el pronombre dativo hebreo y refleja que el conteo pertenece a su propio período de purificación.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - siete jornadas
  lexicon: HALOT
  rationale: Construcción numeral directa; «siete días» es la equivalencia natural y fiel en español.
- source_word: וְאַחַר
  english_pob_choice: and after that
  chosen_spanish: y después
  alternatives_spanish:
  - y después de eso
  - y luego
  lexicon: HALOT
  rationale: Expresa la secuencia procedimental del hebreo con una fórmula breve y natural, equivalente al inglés POB «and after that».
- source_word: תִּטְהָר
  english_pob_choice: she shall be clean
  chosen_spanish: quedará limpia
  alternatives_spanish:
  - será limpia
  - se limpiará
  - será purificada
  lexicon: HALOT
  rationale: El hebreo retoma la misma raíz de טהר con valor de estado alcanzado. «Quedará limpia» comunica el resultado ritual sin sugerir que el texto hable de culpa moral; también conserva la diferencia con el primer miembro, donde se expresa el cese del flujo.
theological_decisions:
- issue: Lenguaje de pureza ritual frente a pureza moral
  english_pob_reading: Render טהר/טמאה language with 'clean/cleansed' in a ritual sense, not as moral purity or sinfulness.
  chosen_spanish_reading: Traducir el campo de טהר con «limpia/limpiarse» en sentido ritual, no moral.
  alternative_spanish_readings:
  - pura/purificarse
  - sin mancha
  rationale: Levítico 15 trata del estado ceremonial vinculado con emisiones corporales, no de pecado moral. «Limpia» conserva la categoría ritual en un español comprensible y evita cargar el verso con connotaciones éticas ajenas al contexto.
  doctrine_reference: Preservar el sentido llano del texto; no introducir una lectura doctrinal que el pasaje no exige.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: mantiene la distinción entre el cese del flujo y el estado ritual posterior, y conserva la secuencia legal del procedimiento sin añadir explicaciones ajenas al verso.'
  spanish_consistency_notes:
  - Se usa «limpia/limpiarse» para טהר de manera consistente con el marco ritual de Levítico.
  - «Flujo» funciona como equivalente sobrio de זוב en este contexto y evita una traducción excesivamente médica.
  - 'La estructura condicional y consecutiva se ha preservado en un español natural: «Pero si... entonces... y después...».'
