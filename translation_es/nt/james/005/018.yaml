translation:
  language: es
  text: Y oró otra vez[a], y el cielo dio lluvia[b], y la tierra produjo su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cielo dio lluvia». En este contexto, el griego puede referirse tanto al «cielo» como al «firmamento»; se eligió «el cielo» en sentido meteorológico porque la referencia es al tiempo atmosférico.
    reason: lexical_alternative
  - marker: b
    text: O «la tierra produjo su cosecha» o «la tierra hizo brotar su fruto».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: El adverbio marca repetición. «Otra vez» es natural en español, conciso y conserva la idea de repetición sin añadir énfasis ajeno al griego.
- source_word: προσηύξατο
  english_pob_choice: he prayed
  chosen_spanish: oró
  alternatives_spanish:
  - prayed
  - hizo oración
  lexicon: BDAG
  rationale: El aoristo medio de προσεύχομαι se expresa de forma directa con «oró». «Hizo oración» es posible, pero menos natural y más pesado en español.
- source_word: ὁ οὐρανὸς
  english_pob_choice: the sky
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo visible
  - los cielos
  lexicon: BDAG
  rationale: En este contexto meteorológico, οὐρανός designa el cielo visible, no «el cielo» en sentido teológico. En español, «el cielo» comunica mejor esa referencia que «el cielo visible», que sería más explicativo de lo necesario.
- source_word: ὑετὸν ἔδωκεν
  english_pob_choice: gave rain
  chosen_spanish: dio lluvia
  alternatives_spanish:
  - envió lluvia
  - mandó lluvia
  lexicon: BDAG
  rationale: Se conserva el verbo de dar (δίδωμι) con una construcción natural en español. «Dio lluvia» refleja más de cerca la expresión griega que «envió lluvia».
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  - el campo
  lexicon: BDAG
  rationale: «La tierra» mantiene el paralelismo con «el cielo» y permite tanto el sentido amplio de creación como el agrícola del contexto.
- source_word: ἐβλάστησεν
  english_pob_choice: produced
  chosen_spanish: produjo
  alternatives_spanish:
  - brotó
  - hizo brotar
  - dio
  lexicon: BDAG
  rationale: βλαστάνω puede aludir a brotar o hacer crecer vegetación. Con καρπός como objeto, «produjo» es una equivalencia natural y fiel al resultado agrícola.
- source_word: τὸν καρπὸν αὐτῆς
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su cosecha
  - su producto
  - su fruto
  lexicon: BDAG
  rationale: «Fruto» reproduce bien καρπός y conserva una formulación suficientemente literal. «Cosecha» explicita el sentido agrícola, pero estrecha más el término griego.
theological_decisions:
- issue: Agencia divina implícita en la lluvia y la fertilidad de la tierra
  english_pob_reading: Render the verse as describing the observable result of Elijah's prayer without adding explanatory language about God's agency beyond the text.
  chosen_spanish_reading: La traducción describe el resultado observable de la oración, sin añadir que Dios envió la lluvia ni explicaciones teológicas suplementarias.
  alternative_spanish_readings:
  - Dios mandó la lluvia y la tierra dio fruto
  - El Señor respondió enviando lluvia
  rationale: El griego expresa que el cielo dio lluvia y la tierra produjo fruto. Aunque el contexto presupone la acción de Dios, este versículo no la enuncia explícitamente; por eso la versión española debe preservar la formulación del texto.
  doctrine_reference: 'Principio de fidelidad textual: no introducir afirmaciones doctrinales que el versículo no formula de manera explícita.'
translation_notes:
  revision_awareness: 'El pasaje presenta un alto acuerdo con la revisión más reciente: no se registran cambios de contenido respecto del borrador de referencia, y la formulación española mantiene la economía y la transparencia del griego sin introducir expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «oró» en lugar de una paráfrasis devocional más amplia para conservar la simplicidad del aoristo griego.
  - «El cielo» y «la tierra» conservan el paralelismo poético del griego.
  - Se evita «Cristo» o lenguaje litúrgico no presente en el texto.
  - «Fruto» se mantiene por transparencia léxica, con nota alternativa para el sentido agrícola.
