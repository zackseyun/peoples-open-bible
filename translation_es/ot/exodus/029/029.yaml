translation:
  language: es
  text: Y las vestiduras santas que son de Aarón serán para sus hijos después de él, para ungirlos[a] en ellas y para investirlos[b] en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ungir en ellas»; la idea es la unción ritual realizada mientras las vestiduras están puestas, no necesariamente una unción hecha con las vestiduras como instrumento.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «llenar la mano»; modismo sacerdotal de instalación u ordenación. Se vierte aquí con «investirlos» para dar un español natural sin perder el sentido ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִגְדֵי הַקֹּדֶשׁ
  english_pob_choice: the holy garments
  chosen_spanish: las vestiduras sagradas
  alternatives_spanish:
  - las vestiduras santas
  - los vestidos sagrados
  - las prendas sagradas
  lexicon: HALOT
  rationale: בגד denota ropa o vestiduras; con הקֹדשׁ se trata de prendas apartadas para uso cultual. «Vestiduras sagradas» comunica bien el carácter consagrado sin sonar arcaico ni introducir una asociación eclesiástica ajena.
- source_word: אֲשֶׁר לְאַהֲרֹן
  english_pob_choice: that are Aaron’s
  chosen_spanish: que son de Aarón
  alternatives_spanish:
  - que pertenecen a Aarón
  - que eran de Aarón
  - que están para Aarón
  lexicon: HALOT
  rationale: El ל indica pertenencia o asignación. «Que son de Aarón» expresa posesión de manera natural en español y mantiene la sencillez del hebreo.
- source_word: יִהְיוּ לְבָנָיו אַחֲרָיו
  english_pob_choice: shall belong to his sons after him
  chosen_spanish: serán para sus hijos después de él
  alternatives_spanish:
  - pertenecerán a sus hijos después de él
  - serán de sus hijos después de él
  - serán para sus hijos que vendrán después de él
  lexicon: HALOT
  rationale: La cláusula señala sucesión hereditaria dentro del linaje sacerdotal. «Serán para» conserva el hebraísmo de pertenencia/transferencia sin sobrecargar el verso.
- source_word: לְמָשְׁחָה בָהֶם
  english_pob_choice: for anointing in them
  chosen_spanish: para ungirlos con ellas
  alternatives_spanish:
  - para la unción con ellas
  - para ser ungidos con ellas
  - para ungir en ellas
  lexicon: HALOT
  rationale: El valor contextual es que los hijos reciben la unción mientras llevan esas vestiduras. En español, «ungirlos con ellas» comunica el rito de manera clara y mantiene la relación con las vestiduras sin forzar una frase poco natural.
- source_word: וּלְמַלֵּא בָם אֶת יָדָם
  english_pob_choice: and for ordaining them in them
  chosen_spanish: y para investirlos con ellas
  alternatives_spanish:
  - y para ordenarlos con ellas
  - y para llenarles la mano con ellas
  - y para consagrarlos con ellas
  lexicon: HALOT
  rationale: מלא יד es un modismo técnico de instalación sacerdotal. El inglés POB opta por «ordain» para captar el sentido funcional; en español, «investirlos» preserva la idea de investidura/instalación en el oficio sin convertirlo en lenguaje eclesiástico demasiado específico. Se mantiene el complemento «con ellas» para reflejar el valor instrumental/local del hebreo.
theological_decisions:
- issue: Tratamiento del modismo sacerdotal מלא את־יד
  english_pob_reading: retain the idiom 'filling their hand' in the main text / 'ordaining them' in the audit trail
  chosen_spanish_reading: «investirlos» en el texto principal, con el sentido de instalación sacerdotal
  alternative_spanish_readings:
  - llenarles la mano
  - ordenarlos
  - consagrarlos
  rationale: El hebreo contiene un giro ritual técnico. En español, «llenar la mano» sería demasiado opaco, mientras que «ordenar» puede sonar exclusivamente clerical. «Investir» conserva el carácter formal de nombramiento/instalación y deja visible la dimensión litúrgica del pasaje sin borrar la tensión lexical del original.
  doctrine_reference: 'Principio POB: primacía del idioma original, transparencia auditável, y preservación del término técnico cuando un equivalente natural puede ocultar la imagen ritual.'
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una traducción demasiado literal de «filling their hand» a «ordaining them», para hacer explícito el modismo técnico. En español se adopta una solución equivalente: no se calca el hebraísmo, pero se conserva la referencia a la investidura/instalación sacerdotal y la relación instrumental de las vestiduras. También se mantiene el matiz de sucesión («después de él») y de posesión («serán para sus hijos»).'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este verso no lo contiene.
  - Se evita «Cristo» porque no corresponde al hebreo de este versículo.
  - «Vestiduras sagradas» y no «santas» para mantener un registro más técnico y cultual.
  - «Investir» se usa aquí como equivalente funcional de la instalación sacerdotal, no como término doctrinal sacramental.
