translation:
  language: es
  text: ¿No dejarás a otro tus riquezas, y tu labor a los que echan suertes[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «a herederos por reparto» o «a los que reciben una porción asignada». El hebreo «a los conocedores de la suerte» es idiomático, y el paralelo griego apunta a la división de una herencia o porción repartida por suerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Will you not
  chosen_spanish: ¿No…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No será que…?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica que espera asentimiento; en español, la forma interrogativa abreviada conserva mejor el tono admonitorio que una afirmación lisa.
- source_word: לְאַחֵר
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - para otro
  - a alguien más
  lexicon: HALOT
  rationale: La preposición española natural para el destinatario es 'a'; mantiene el sentido de beneficiario sin añadir matiz legal.
- source_word: תַּעֲזוֹב
  english_pob_choice: leave
  chosen_spanish: dejarás
  alternatives_spanish:
  - abandonarás
  - legarás
  lexicon: HALOT
  rationale: '''Dejar'' reproduce bien el valor de ''leave'' / καταλείψεις sin convertirlo en un acto testamentario explícito como ''legarás'', que sería más específico de lo que el texto exige.'
- source_word: חֵילֶךָ
  english_pob_choice: your wealth
  chosen_spanish: tus riquezas
  alternatives_spanish:
  - tu riqueza
  - tus bienes
  - tu hacienda
  lexicon: HALOT
  rationale: En literatura sapiencial, חֵיל puede referirse a bienes materiales o riqueza; 'riquezas' es claro y natural en español, y evita la abstracción de 'recursos'.
- source_word: וִיגִיעֲךָ
  english_pob_choice: your labor
  chosen_spanish: tu labor
  alternatives_spanish:
  - tu trabajo
  - tu fatiga
  - tu afán
  lexicon: HALOT
  rationale: '''Labor'' conserva el vínculo con el esfuerzo personal y con el paralelo griego πόνους / κόπους, sin sobreparafrasear como ''el fruto de tu trabajo''.'
- source_word: לְיוֹדֵי גוֹרָל
  english_pob_choice: to those who cast the lot
  chosen_spanish: a los que echan la suerte
  alternatives_spanish:
  - a los que reparten por suerte
  - a los que reciben la porción sorteada
  - a los que sacan la suerte
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; el griego apoya la idea de reparto o asignación por sorteo. 'Echan la suerte' conserva la imagen del sorteo sin imponer una glosa interpretativa como 'herederos'.
translation_notes:
  revision_awareness: He tomado como base el hebreo de Kahana, con apoyo del paralelo griego de Swete. El inglés POB optó por una solución interpretativa para לְיוֹדֵי גוֹרָל ('those who cast the lot') y añadió una nota sobre herencia por asignación; en español se preserva la imagen del sorteo con una formulación idiomática equivalente, sin convertirla en una explicación explícita de herederos.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre 'tus riquezas' y 'tu labor' para reflejar la estructura hebrea y griega.
  - Se conserva el tono de advertencia retórica mediante pregunta directa.
  - '''Suerte'' refleja el campo semántico de גוֹרָל y permite una lectura natural en español sin perder el trasfondo de reparto por lotes.'
