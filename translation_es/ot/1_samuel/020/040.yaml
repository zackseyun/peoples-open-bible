  text: וַ/יִּתֵּ֤ן יְהֽוֹנָתָן֙ אֶת כֵּלָ֔י/ו אֶל הַ/נַּ֖עַר אֲשֶׁר ל֑/וֹ וַ/יֹּ֣אמֶר ל֔/וֹ לֵ֖ךְ הָבֵ֥יא הָ/עִֽיר־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/040.yaml
  text: Then Jonathan gave his weapons to the young man who was with him and said to him[a], “Go[c][b], bring them to the city.”
  footnotes:
  - marker: a
    text: Hebrew 'his weapons' could more broadly mean 'his equipment' or 'his gear'; the context of Jonathan's bow and arrows favors 'weapons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the boy who was with him' / 'his servant boy.' The Hebrew describes the young attendant as belonging to Jonathan.
    reason: lexical_alternative
  - marker: c
    text: The object of 'bring' is implicit in Hebrew and is supplied in English as 'them,' referring to Jonathan's weapons/equipment.
    reason: lexical_alternative
