translation:
  language: es
  text: Ellos muestran que la obra de la ley está escrita en sus corazones[a], mientras su conciencia también da testimonio y sus pensamientos los acusan o incluso los defienden[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las exigencias de la ley» o «lo que la ley requiere».
    reason: lexical_alternative
  - marker: b
    text: O «sus pensamientos se acusan o incluso se defienden unos a otros»; el griego tiene de manera más literal un sentido recíproco, «unos a otros».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνδείκνυνται
  english_pob_choice: show
  chosen_spanish: muestran
  alternatives_spanish:
  - demuestran
  - prueban
  lexicon: BDAG
  rationale: «Muestran» conserva el valor evidencial del verbo sin volverlo demasiado técnico ni convertirlo en una prueba absoluta; mantiene bien el sentido del griego y del inglés POB.
- source_word: τὸ ἔργον τοῦ νόμου
  english_pob_choice: the work of the law
  chosen_spanish: la obra de la ley
  alternatives_spanish:
  - las exigencias de la ley
  - lo que la ley requiere
  lexicon: BDAG
  rationale: Se conserva la expresión más directa y menos interpretativa del original. «Obra» refleja ἔργον en singular y evita resolver la tensión teológica del pasaje.
- source_word: γραπτὸν ἐν ταῖς καρδίαις αὐτῶν
  english_pob_choice: written on their hearts
  chosen_spanish: escrita en sus corazones
  alternatives_spanish:
  - escrita en sus interioridades
  - escrita dentro de sus corazones
  lexicon: BDAG
  rationale: «Escrita en sus corazones» reproduce la metáfora bíblica natural en español y mantiene la imagen de inscripción interior sin forzar el giro con una paráfrasis.
- source_word: συμμαρτυρούσης ... τῆς συνειδήσεως
  english_pob_choice: their conscience also bears witness
  chosen_spanish: su conciencia también da testimonio
  alternatives_spanish:
  - su conciencia también testifica
  - su conciencia también es testigo
  lexicon: BDAG
  rationale: «Dar testimonio» comunica de forma clara la fuerza corroborativa de συμμαρτυρέω y funciona bien como cláusula parentética en español.
- source_word: κατηγορούντων ἢ καὶ ἀπολογουμένων
  english_pob_choice: accuse or even defend
  chosen_spanish: los acusan o incluso los defienden
  alternatives_spanish:
  - los acusan o los excusan
  - los acusan o incluso los justifican
  lexicon: BDAG
  rationale: «Defienden» recoge mejor ἀπολογέομαι que «excusan» y mantiene la oposición moral del pasaje. Se explicita el objeto implícito con «los» para que el sentido sea natural en español.
theological_decisions:
- issue: Si el pasaje debe resolver el contenido de «la obra de la ley» como preceptos concretos o mantener la formulación abierta.
  english_pob_reading: Retain the less interpretive phrase "the work of the law" in the main text.
  chosen_spanish_reading: Mantener «la obra de la ley» en el texto principal.
  alternative_spanish_readings:
  - las exigencias de la ley
  - lo que la ley requiere
  rationale: La formulación griega es compacta y no explicita una glosa. Mantenerla preserva la tensión teológica y permite que el lector vea la expresión paulina sin reinterpretarla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla interpretativamente.
- issue: Cómo reflejar el valor recíproco/comparativo de λογισμῶν sin perder la naturalidad del español.
  english_pob_reading: their thoughts accuse or even defend them
  chosen_spanish_reading: sus pensamientos los acusan o incluso los defienden
  alternative_spanish_readings:
  - sus pensamientos se acusan o se defienden entre sí
  - sus pensamientos se acusan o incluso se justifican
  rationale: El griego no dice literalmente que los pensamientos se acusen «unos a otros» en el sentido de interacción mutua, sino que funcionan como acusadores o defensores respecto de las personas en vista. La formulación española sigue esa dirección y evita oscurecer el sujeto implícito.
  doctrine_reference: Respeto de la sintaxis y del referente implícito del pasaje.
translation_notes:
  revision_awareness: 'Se atendió la revisión auditada más reciente: el cierre de la cláusula refleja que los pensamientos acusan o defienden a las personas en vista, no «unos a otros». Por eso se evitó una formulación recíproca en español y se mantuvo el objeto implícito explícito con «los».'
  spanish_consistency_notes:
  - Se mantuvo «ley» para νόμος y «conciencia» para συνείδησις, con registro bíblico claro y contemporáneo.
  - Se evitó «SEÑOR» o sustitutos litúrgicos, ya que este versículo no contiene el nombre divino.
  - Se eligió «obra de la ley» como calco controlado, coherente con la política de la POB de preservar la expresión menos interpretativa.
