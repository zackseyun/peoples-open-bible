translation:
  language: es
  text: 'y con todo ser viviente[a] que está con ustedes: las aves, el ganado y todo animal salvaje[b] de la tierra con ustedes, de todos los que salieron del arca[c], todo animal salvaje de la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «criatura viviente». La frase hebrea también puede traducirse más literalmente como «alma viviente» o «criatura viviente».
    reason: lexical_alternative
  - marker: b
    text: O «bestia de la tierra». «Animal salvaje» hace más clara en español la distinción con el ganado.
    reason: lexical_alternative
  - marker: c
    text: La frase final es difícil en hebreo; más formalmente, «de todos los que salieron del arca, para todo animal salvaje de la tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: נֶפֶשׁ הַחַיָּה
  english_pob_choice: living creature
  chosen_spanish: ser viviente
  alternatives_spanish:
  - criatura viviente
  - ser vivo
  - alma viviente
  lexicon: HALOT
  rationale: La expresión hebrea abarca vida animada en general; en este contexto de alianza se refiere a animales. «Ser viviente» conserva la amplitud semántica sin sonar tan técnico como «alma viviente», que en español puede sugerir un matiz ajeno al contexto.
- source_word: אֲשֶׁר אִתְּכֶם
  english_pob_choice: that is with you
  chosen_spanish: que está con ustedes
  alternatives_spanish:
  - que está con vosotros
  - que se encuentra con ustedes
  lexicon: HALOT
  rationale: La relativa simple se expresa de forma natural en español con «que está con ustedes»; mantiene el sentido colectivo y evita una literalidad pesada.
- source_word: בָּעוֹף
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves del cielo
  lexicon: HALOT
  rationale: «עוֹף» puede abarcar seres voladores, pero aquí la enumeración contrasta con ganado y animales terrestres. «Aves» es el término más amplio y digno en español.
- source_word: בַּבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales domésticos
  - el ganado doméstico
  lexicon: HALOT
  rationale: La referencia apunta a animales domesticados de tierra. «Ganado» es breve, claro y suficientemente amplio en español bíblico contemporáneo.
- source_word: חַיַּת הָאָרֶץ
  english_pob_choice: every beast of the earth
  chosen_spanish: todo animal salvaje de la tierra
  alternatives_spanish:
  - toda bestia de la tierra
  - todo animal de la tierra
  - toda fiera de la tierra
  lexicon: HALOT
  rationale: «חַיַּת הָאָרֶץ» distingue animales silvestres de aves y ganado. «Animal salvaje» comunica esa categoría con claridad; «bestia» es más tradicional pero puede sonar peyorativo o menos preciso en español moderno.
- source_word: מִכֹּל יֹצְאֵי הַתֵּבָה
  english_pob_choice: from all that came out of the ark
  chosen_spanish: de todos los que salieron del arca
  alternatives_spanish:
  - de todo lo que salió del arca
  - entre todos los que salieron del arca
  lexicon: HALOT
  rationale: La expresión partitiva se vuelve natural en español con «de todos los que salieron del arca». Mantiene el matiz de procedencia sin forzar una construcción más cruda.
- source_word: לְכֹל חַיַּת הָאָרֶץ
  english_pob_choice: every beast of the earth
  chosen_spanish: para todo animal salvaje de la tierra
  alternatives_spanish:
  - para toda bestia de la tierra
  - a todo animal salvaje de la tierra
  lexicon: HALOT
  rationale: La construcción final es difícil y resumptiva. «Para» conserva el valor preposicional del hebreo sin decidir de manera excesiva entre lectura apposicional o especificativa; en español suena gramatical y deja visible la tensión sintáctica.
theological_decisions:
- issue: Alcance del pacto con los animales
  english_pob_reading: The covenant extends to all animal life associated with Noah, specified as birds, livestock, and wild animals.
  chosen_spanish_reading: El pacto incluye toda la vida animal asociada con Noé, especificada como aves, ganado y animales salvajes.
  alternative_spanish_readings:
  - El pacto se limita a las especies mencionadas explícitamente
  - El pacto incluye solo los animales que salieron del arca
  rationale: El texto hebreo y el audit trail inglés muestran una enumeración inclusiva. La traducción española conserva esa amplitud y evita estrechar el alcance del pacto.
  doctrine_reference: Génesis 9:9-11; pacto noéico
- issue: Sintaxis final repetitiva y ambigua
  english_pob_reading: The closing phrase is syntactically difficult and likely resumptive/appositional rather than a separate purposive clause.
  chosen_spanish_reading: La frase final se mantiene con «para», dejando visible su valor relacional y su dificultad sintáctica.
  alternative_spanish_readings:
  - 'una repetición puramente appositiva: «todo animal salvaje de la tierra»'
  - 'una lectura final explicativa: «es decir, todo animal salvaje de la tierra»'
  rationale: El hebreo es comprimido y repetitivo. Usar «para» evita borrar la tensión textual y no impone una resolución interpretativa más allá de lo que el pasaje sustenta.
  doctrine_reference: Principios de traducción del hebreo bíblico; Génesis 9:10
translation_notes:
  revision_awareness: La revisión inglesa reciente osciló entre «wild animal» y «beast», y también debatió si la frase final debía suavizarse o dejarse más formal. Esta versión española evita el calco excesivo de «bestia» cuando puede sonar áspero, pero conserva la categoría semántica de animales silvestres. Además, mantiene visible la dificultad de לְכֹל חַיַּת הָאָרֶץ con una construcción preposicional que no clausura la ambigüedad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - «Aves» y «ganado» reflejan categorías naturales en español bíblico sin perder el contraste con «animal salvaje».
  - Se preserva la repetición final del hebreo, evitando normalizarla en exceso.
  - Los marcadores de nota están anclados exactamente en el texto y no se reutilizan.
