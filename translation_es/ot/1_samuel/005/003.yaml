- from: Cuando los asdoditas se levantaron temprano al día siguiente, he aquí, Dagón había caído sobre su rostro al suelo delante del arca de Yahvé. Entonces tomaron a Dagón y lo devolvieron a su lugar.
  to: Cuando los asdoditas se levantaron temprano al día siguiente, he aquí, Dagón había caído rostro en tierra delante del arca de Yahvé. Entonces tomaron a Dagón y lo devolvieron a su lugar.
  rationale: Se ajusta únicamente la expresión de la postura de Dagón para lograr un español natural y bíblicamente digno, sin perder la fuerza humillante del hebreo. El resto del versículo está bien alineado con la fuente y con la terminología del proyecto.
