id: 1TH.4.1
reference: 1 Thessalonians 4:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Λοιπὸν ⸀οὖν, ἀδελφοί, ἐρωτῶμεν ὑμᾶς καὶ παρακαλοῦμεν ἐν κυρίῳ Ἰησοῦ, ⸀ἵνα καθὼς παρελάβετε παρ’ ἡμῶν τὸ πῶς δεῖ ὑμᾶς περιπατεῖν καὶ ἀρέσκειν θεῷ, ⸂καθὼς καὶ περιπατεῖτε⸃, ἵνα περισσεύητε μᾶλλον.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/001.yaml
  text: Finally then[a], brothers, we ask and urge you in the Lord Jesus that, just as you received from us how you ought to walk and to please God, just as you are also walking, you abound more and more.
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often uses the masculine plural to address a mixed group.
    reason: lexical_alternative
translation:
  language: ko
  text: 끝으로 형제[a] 여러분, 우리는 주 예수 안에서 여러분에게 요청하며 권면합니다. 여러분이 어떻게 행하여 하나님을 기쁘시게 해야 하는지를 우리에게서 받은 대로, 또 지금도 그렇게 행하고 있는 대로, 더욱 풍성하게 자라 가라는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수형이나 혼성 공동체를 가리키는 경우가 많다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λοιπὸν οὖν
  english_pob_choice: Finally then
  chosen_korean: 끝으로
  alternatives_korean:
  - 그러므로 끝으로
  - 마지막으로
  lexicon: BDAG
  rationale: 「끝으로」가 한국 교회 전통의 정형 어휘로 본 표현의 전환적 기능을 자연스럽게 담는다.
- source_word: ἐρωτῶμεν ὑμᾶς καὶ παρακαλοῦμεν
  english_pob_choice: we ask and urge you
  chosen_korean: 요청하며 권면합니다
  alternatives_korean:
  - 부탁하며 권합니다
  - 청하며 권면합니다
  lexicon: BDAG
  rationale: ἐρωτάω는 부드러운 요청, παρακαλέω는 권면. 두 동사의 어감을 「요청·권면」으로 구분한다.
- source_word: περιπατεῖν καὶ ἀρέσκειν θεῷ
  english_pob_choice: walk and to please God
  chosen_korean: 행하여 하나님을 기쁘시게
  alternatives_korean:
  - 살아 하나님을 기쁘시게
  - 처신하여 하나님께 합당하게
  lexicon: BDAG
  rationale: 2:12와 일관되게 「행함」 비유를 보존한다.
- source_word: περισσεύητε μᾶλλον
  english_pob_choice: abound more and more
  chosen_korean: 더욱 풍성하게 자라 가라
  alternatives_korean:
  - 더욱 풍성하게 되라
  - 점점 더 넘쳐 가라
  lexicon: BDAG
  rationale: περισσεύω의 「풍성하게 됨」을 「풍성하게 자라 가다」로 옮겨 점진적 성장을 담는다.
