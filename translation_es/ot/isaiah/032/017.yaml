revisions:
- from: Y el efecto de la justicia será paz[a], y el fruto de la justicia[b], quietud y seguridad para siempre.
  to: Y la obra de la justicia será paz[a], y el efecto de la justicia[b], quietud y seguridad para siempre.
  rationale: Se restauró «obra» para מַעֲשֵׂה, siguiendo la decisión auditada de mantener en el texto principal el valor amplio de acción/obra y reservar el matiz resultativo para nota. Se cambió «fruto» por «efecto» para reflejar mejor la revisión inglesa final de עֲבֹדַת y evitar una metáfora añadida. Se corrigió la nota sobre צדקה para que presente una alternativa real y útil en español.
