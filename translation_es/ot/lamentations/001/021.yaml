    rationale: Aunque comprensible, «se regocijan» preserva mejor la carga moral y el tono del lamento frente al gozo de los enemigos por la desgracia de Sion.
  - severity: low
    issue: «Que se vuelvan como yo» puede sonar levemente ambiguo en español.
    rationale: «Que lleguen a ser como yo» expresa con más naturalidad el deseo/imprecación y el matiz de llegar a compartir la condición de la hablante.
