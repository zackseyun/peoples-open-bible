translation:
  language: es
  text: 'Y toda mujer sabia de corazón[a] hiló con sus manos, y trajeron lo que habían hilado: el azul, la púrpura, el carmesí[b] y el lino fino.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''sabia de corazón'', un modismo para la destreza práctica fundada en una sabiduría interior.'
    reason: lexical_alternative
  - marker: b
    text: O 'el azul, la púrpura, el carmesí y el lino fino'; el hebreo enumera los materiales después de 'lo que habían hilado'.
    reason: alternative_reading
lexical_decisions:
- source_word: חַכְמַת לֵב
  english_pob_choice: wise of heart
  chosen_spanish: sabia de corazón
  alternatives_spanish:
  - hábil
  - sabia de espíritu
  - sabia en su interior
  lexicon: HALOT
  rationale: Conserva el idioma hebreo que une la sabiduría con el corazón, y a la vez suena natural en español. 'Hábil' comunica destreza, pero borra la imagen del corazón; 'sabia de corazón' mantiene ambos matices.
- source_word: בְּיָדֶיהָ
  english_pob_choice: with her hands
  chosen_spanish: con sus manos
  alternatives_spanish:
  - por sus manos
  - mediante sus manos
  lexicon: HALOT
  rationale: Es la manera más natural en español para expresar el instrumento manual del trabajo textil, sin perder la referencia explícita a las manos.
- source_word: טָוּוּ
  english_pob_choice: spun
  chosen_spanish: hilaba
  alternatives_spanish:
  - hilaban
  - estaba hilando
  - torcía hilo
  lexicon: HALOT
  rationale: En español, 'hilar' comunica claramente la acción de convertir fibra en hilo. El imperfecto 'hilaba' funciona bien con el colectivo distributivo 'toda mujer' y mantiene un tono narrativo fluido.
- source_word: וַיָּבִיאוּ
  english_pob_choice: they brought
  chosen_spanish: traían
  alternatives_spanish:
  - y trajeron
  - presentaban
  - llevaban
  lexicon: HALOT
  rationale: El verbo hebreo introduce la acción colectiva de llevar lo producido. 'Traían' conserva el sentido de acción repetida o colectiva en español y armoniza con el contexto de ofrenda y aportación.
- source_word: מַטְוֶה
  english_pob_choice: what they had spun
  chosen_spanish: lo que habían hilado
  alternatives_spanish:
  - el hilado
  - lo hilado
  - su hilado
  lexicon: HALOT
  rationale: La expresión mantiene el referente material sin forzar un tecnicismo. 'Lo que habían hilado' reproduce bien la relación entre el verbo y el sustantivo, y deja claro que se trata del producto del hilado.
- source_word: תְּכֵלֶת
  english_pob_choice: the blue
  chosen_spanish: la tela azul
  alternatives_spanish:
  - el azul
  - el hilo azul
  - la azul
  lexicon: HALOT
  rationale: En contexto de tabernáculo, el término alude a material teñido, no solo al color abstracto. 'La tela azul' explicita la referencia textil que en español sería ambigua si se dijera solo 'el azul'.
- source_word: אַרְגָּמָן
  english_pob_choice: the purple
  chosen_spanish: la púrpura
  alternatives_spanish:
  - la tela púrpura
  - el púrpura
  - el paño púrpura
  lexicon: HALOT
  rationale: '''La púrpura'' es una designación estable y digna en español para el material teñido. No se añade ''tela'' aquí para no sobrecargar una serie ya entendida como lista de materiales.'
- source_word: תּוֹלַעַת הַשָּׁנִי
  english_pob_choice: the scarlet yarn
  chosen_spanish: el carmesí
  alternatives_spanish:
  - el hilo escarlata
  - la lana escarlata
  - el escarlata
  lexicon: HALOT
  rationale: La expresión hebrea señala un material teñido de rojo intenso. 'El carmesí' preserva el valor cromático y el registro bíblico; se evita imponer 'hilo' porque el hebreo aquí enumera materiales de forma compacta y el contexto ya suple la noción textil.
- source_word: שֵׁשׁ
  english_pob_choice: the fine linen
  chosen_spanish: el lino fino
  alternatives_spanish:
  - lino fino
  - el fino lino
  - el lino
  lexicon: HALOT
  rationale: '''Lino fino'' es la forma natural y fiel en español para el tejido de calidad del contexto del tabernáculo. Mantiene la distinción de valor y textura implicada por el término hebreo.'
theological_decisions:
- issue: Lista de materiales textiles y posible explicitación de 'yarn/tela/hilo'
  english_pob_reading: The Hebrew lists the materials after 'what they had spun'; the English footnote preserves the possibility of reading the list as the materials themselves.
  chosen_spanish_reading: El texto principal usa una formulación comprensible en español y deja la lista como materiales textiles ofrecidos, sin repetir innecesariamente 'hilo' en cada elemento.
  alternative_spanish_readings:
  - la azul, la púrpura, el carmesí y el lino fino
  - la tela azul, la púrpura, el carmesí y el lino fino
  rationale: El hebreo permite entender que lo hilado se presenta en forma de materiales de color. En español, una formulación demasiado literal sonaría quebrada, mientras que una demasiado explícita impondría 'hilo' donde el hebreo es compacto. La redacción elegida conserva la textura del pasaje y su ambigüedad controlada.
  doctrine_reference: Éxodo 35:25; cf. Éxodo 25:4; 28:5-6
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el nivel de acuerdo fue alto; por eso se mantiene la lectura óptima-equivalente del audit trail en inglés, adaptada al español con cuidado para no perder la imagen hebrea ni la fluidez publicable.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma habitual del proyecto cuando aparezca el Nombre divino; en este versículo no aparece.
  - Se prefirió 'sabia de corazón' para conservar el modismo hebreo sin recurrir a una paráfrasis excesiva.
  - '''Lino fino'' se mantiene como término técnico-bíblico natural en español.'
  - La serie de colores/materiales se tradujo con términos dignos y comprensibles, evitando calcos demasiado rígidos.
