revisions:
- from: 'Y se pusieron de pie los jefes[a] de todo el pueblo, de todas las tribus de Israel, en la asamblea del pueblo de Dios: cuatrocientos mil hombres de a pie, portadores de espada.'
  to: 'Y los jefes[a] de todo el pueblo, de todas las tribus de Israel, tomaron su puesto en la asamblea del pueblo de Dios: cuatrocientos mil soldados de a pie que desenvainaban la espada.'
  rationale: Se ajusta el verbo principal para reflejar mejor la idea de tomar posición formal o estar en pie de guerra, se corrige la imagen participial de שֹׁלֵף חָרֶב con «que desenvainaban la espada», y se mejora la precisión militar con «soldados de a pie». La nota sobre «las esquinas» se conserva intacta porque documenta correctamente el modismo hebreo.
