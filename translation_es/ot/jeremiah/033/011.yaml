revisions:
- from: 'Se oye la voz del gozo y la voz de la alegría, la voz del novio y la voz de la novia, la voz de los que dicen: «Den gracias a Yahvé de los ejércitos, porque Yahvé es bueno, porque para siempre es su amor fiel», y de los que traen una ofrenda de acción de gracias a la casa de Yahvé. Porque yo restauraré la suerte de la tierra como al principio, dice Yahvé.'
  to: 'el sonido del gozo y el sonido de la alegría, el sonido del novio y el sonido de la novia, el sonido de los que dicen: «Den gracias a Yahvé de los ejércitos, porque Yahvé es bueno, porque su amor fiel permanece para siempre[a]», y de los que traen una ofrenda de acción de gracias a la casa de Yahvé. Porque yo restauraré la prosperidad de la tierra[b] como al principio, dice Yahvé.'
  rationale: Se reemplazó «Se oye/la voz de» por «el sonido de» para reflejar mejor la anáfora de קוֹל y el carácter auditivo general de la escena. Se cambió «la suerte de la tierra» por «la prosperidad de la tierra» para evitar una lectura de azar y expresar mejor la restauración integral implicada por שְׁבוּת en este contexto. Se añadió «permanece» en la fórmula litúrgica para naturalidad española y para corresponder al valor idiomático de la cláusula. Se incorporaron las dos notas del rastro auditado porque siguen siendo relevantes en español.
