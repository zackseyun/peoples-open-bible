translation:
  language: es
  text: Yahvé desistió[a] del daño[b] que había dicho que haría a su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cambió de parecer» o «lo sintió» respecto al daño que había dicho que haría a su pueblo.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «el mal»; aquí se refiere a una calamidad o daño amenazado, no al mal moral en Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּחֶם / נחם
  english_pob_choice: relented
  chosen_spanish: se aplacó
  alternatives_spanish:
  - se arrepintió
  - cambió de parecer
  - se volvió atrás
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo expresa un giro respecto de la acción anunciada. «Se aplacó» conserva la idea de cesar en una कार्रवाई prevista sin sugerir error moral o ignorancia en Dios. Evita además la carga más subjetiva de «se arrepintió» y mantiene la tensión teológica del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: convención POB para el Tetragrámaton
  rationale: El texto fuente usa el nombre divino propio, no un título. «Yahvé» preserva ese nombre en español según la convención del proyecto y evita la sustitución litúrgica por «el SEÑOR».
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: respecto de
  alternatives_spanish:
  - acerca de
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: Con נחם על, la preposición introduce el asunto al cual se refiere el cambio de acción. «Respecto de» suena natural en español y conserva la relación semántica sin cargarla de interpretación adicional.
- source_word: הָרָעָה
  english_pob_choice: the harm
  chosen_spanish: el mal
  alternatives_spanish:
  - el daño
  - la calamidad
  - el desastre
  lexicon: HALOT
  rationale: Aunque en este contexto se trata de una calamidad amenazada y no de mal moral en Dios, en español «el mal» refleja el alcance semántico amplio de רָעָה y mantiene la tensión del hebreo. La nota aclara que aquí no se trata de mal moral.
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that he had spoken of
  chosen_spanish: que había dicho
  alternatives_spanish:
  - que había hablado de
  - que había declarado
  - que había pronunciado
  lexicon: HALOT
  rationale: El hebreo remite a lo previamente anunciado por Yahvé. «Había dicho» es el equivalente español más natural y comunica bien el anuncio anterior sin recargar el estilo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: doing
  chosen_spanish: que haría
  alternatives_spanish:
  - de hacer
  - para hacer
  - para traer
  lexicon: HALOT
  rationale: El infinitivo con ל marca la acción prevista; en español, dentro de esta construcción, «que haría» traduce con fluidez la amenaza de una acción futura ya anunciada. Evita una estructura más pesada como «de hacer».
- source_word: לְעַמּוֹ
  english_pob_choice: to his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - para su pueblo
  - sobre su pueblo
  lexicon: HALOT
  rationale: El objeto afectado por la acción amenazada es el pueblo de Yahvé. «A su pueblo» es la forma natural en español para esta relación directa.
theological_decisions:
- issue: Lenguaje antropopático en נחם aplicado a Dios
  english_pob_reading: Render the verb as 'relented' rather than 'changed his mind' in the main text.
  chosen_spanish_reading: Usar «se aplacó» en el texto principal.
  alternative_spanish_readings:
  - cambió de parecer
  - se arrepintió
  rationale: La escena presenta un cambio real en la acción anunciada en respuesta a la intercesión, pero el español principal debe evitar formularlo como una corrección o error de parte de Dios. «Se aplacó» conserva el movimiento narrativo y deja intacta la tensión doctrinal del hebreo.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Coincide con el último pase de revisión, que no indicó cambios. La redacción corrige además el problema de validación anterior al anclar ambas notas con sus marcadores en el texto principal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton conforme al estándar del proyecto.
  - Se evita «el SEÑOR» como sustituto.
  - La nota b aclara la amplitud semántica de רָעָה sin moralizarla.
  - El estilo es sobrio y publicable, con puntuación española estándar.
