review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: partícula deíctica («He aquí»), metáfora antropomórfica («el ojo»), nombre divino («Yahvé»), destinatarios («los que lo temen») y la segunda línea con expectativa/espera. Sin embargo, «su amor constante» atenúa el matiz pactual de חֶסֶד más de lo deseable frente al audit trail inglés («steadfast love»), y la nota colocada en «sobre[a]» introduce una alternativa para אֶל que no era necesaria en español y desplaza la nota léxica importante del verbo יחל (esperar/poner la esperanza).'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y fidelidad teológica. «Está sobre los que…» es comprensible, aunque «está sobre» con «ojo» suena algo rígido; aun así es aceptable. La mejora principal es usar una expresión más fuerte para חֶסֶד, como «amor fiel», y trasladar la nota al verbo «esperan» para preservar la alternativa «esperan / ponen su esperanza».
  glossary_alignment: '«Yahvé» alinea con la terminología del proyecto. «Los que lo temen» preserva bien el registro. La principal desalineación es חֶסֶד: «amor constante» es posible, pero «amor fiel» refleja mejor el amor leal/pactual documentado. También conviene que la nota léxica refleje la decisión auditada sobre יחל, no sobre אֶל.'
  issues:
  - severity: medium
    issue: «su amor constante» debilita el matiz pactual de חֶסֶד
    rationale: El audit trail subraya benevolencia fiel/de pacto. «Constante» comunica duración, pero menos claramente fidelidad leal. «Amor fiel» o «amor leal» preserva mejor el razonamiento léxico y teológico.
  - severity: medium
    issue: La nota está anclada en «sobre» en vez de en «esperan»
    rationale: La nota inglesa preserva la alternativa semántica del verbo יחל («wait/hope»). La nota española actual comenta אֶל, pero ese punto no requiere nota en el texto principal y omite la ambigüedad relevante del verbo.
  - severity: low
    issue: «está sobre» con «el ojo» suena algo tieso en español
    rationale: No es incorrecto y sigue el sentido idiomático, pero el conjunto ganaría en fluidez con una formulación levemente más natural. Aun así, no hace falta un cambio mayor si se conserva la literalidad básica.
  revised_spanish_text: He aquí, el ojo de Yahvé está sobre los que lo temen, sobre los que esperan[a] su amor fiel.
  revised_footnotes:
  - marker: a
    text: 'O: «ponen su esperanza en su amor fiel». El verbo hebreo puede expresar tanto esperar como esperar con esperanza.'
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura del original y la dignidad del registro, pero se corrige el término de חֶסֶד a «amor fiel» para reflejar mejor el amor leal/pactual documentado. También se reubica la nota al verbo «esperan» para preservar la alternativa léxica principal del hebreo יחל, en línea con el audit trail inglés. No se requiere adjudicación adicional.
