translation:
  language: es
  text: Y aconteció que, cuando Laban oyó la noticia acerca de Jacob[a], hijo de su hermana[b], corrió a recibirlo, lo abrazó, lo besó y lo llevó a su casa[c]. Entonces Jacob contó a Laban todas estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el reporte acerca de Jacob». El hebreo puede referirse al informe o noticia relacionada con Jacob.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hijo de su hermana».
    reason: lexical_alternative
  - marker: c
    text: O «y le contó a Labán».
    reason: previous_rendering
lexical_decisions:
- source_word: כִ/שְׁמֹעַ
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyó
  alternatives_spanish:
  - al oír
  - apenas oyó
  lexicon: HALOT
  rationale: La construcción con כ + infinitivo introduce una relación temporal; «cuando ... oyó» conserva esa secuencia de manera natural en español sin exagerar inmediatez.
- source_word: שֵׁמַע
  english_pob_choice: the news about
  chosen_spanish: el informe acerca de
  alternatives_spanish:
  - la noticia acerca de
  - el reporte de
  lexicon: HALOT
  rationale: שֵׁמַע puede referirse a noticia, informe o reporte. «Informe acerca de» mantiene el valor de comunicación recibida y evita reducirlo solo a un acto de escuchar.
- source_word: בֶּן אֲחֹתוֹ
  english_pob_choice: his sister’s son
  chosen_spanish: hijo de su hermana
  alternatives_spanish:
  - su sobrino
  - el hijo de su hermana
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la relación de parentesco. «Hijo de su hermana» preserva esa formulación transparente; «sobrino» sería correcto pero menos fiel a la forma fuente.
- source_word: וַיָּרָץ לִקְרָאתוֹ
  english_pob_choice: he ran to meet him
  chosen_spanish: corrió a recibirlo
  alternatives_spanish:
  - corrió a su encuentro
  - corrió a ملاقاتarlo
  lexicon: HALOT
  rationale: לקראתו implica ir al encuentro de alguien. «Corrió a recibirlo» comunica ese movimiento de bienvenida en español con naturalidad, sin añadir matices no presentes en el texto.
- source_word: וַיְחַבֶּק לוֹ
  english_pob_choice: embraced him
  chosen_spanish: lo abrazó
  alternatives_spanish:
  - lo estrechó en un abrazo
  lexicon: HALOT
  rationale: חבק significa abrazar. «Lo abrazó» es la forma más directa y natural en español, manteniendo el registro narrativo.
- source_word: וַיְנַשֶּׁק לוֹ
  english_pob_choice: kissed him
  chosen_spanish: lo besó
  alternatives_spanish:
  - lo besó afectuosamente
  lexicon: HALOT
  rationale: נשׁק es besar. En este contexto familiar y de saludo, «lo besó» es suficiente y evita sobreinterpretaciones románticas.
- source_word: וַיְבִיאֵהוּ אֶל בֵּיתוֹ
  english_pob_choice: brought him to his house
  chosen_spanish: lo llevó a su casa
  alternatives_spanish:
  - lo condujo a su casa
  - lo introdujo en su casa
  lexicon: HALOT
  rationale: El causativo de בוא expresa llevar o traer. «Lo llevó a su casa» es una traducción natural en español y conserva la dirección del movimiento sin forzar «entrar».
- source_word: וַיְסַפֵּר
  english_pob_choice: he told
  chosen_spanish: contó
  alternatives_spanish:
  - relató
  - narró
  lexicon: HALOT
  rationale: ספר en piel puede significar contar o relatar. «Contó» es claro y adecuado para la continuación narrativa; el contexto ya identifica a Jacob como sujeto.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todos estos asuntos
  - todas estas palabras
  lexicon: HALOT
  rationale: דברים aquí abarca el contenido narrado, es decir, hechos o cosas dichas. «Todas estas cosas» reproduce bien la amplitud semántica sin volverlo excesivamente abstracto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no alteró el sentido base; sí aclaró el sujeto de «told» como Jacob. En español se refleja con «Entonces Jacob contó», evitando ambigüedad y manteniendo la secuencia narrativa del hebreo.
  spanish_consistency_notes:
  - Se usa «Laban» sin acento, conforme al nombre propio del texto fuente y al estándar del proyecto para este registro.
  - Se mantiene la correspondencia de parientes con «hijo de su hermana» para no sustituir la forma hebrea por un término más interpretativo.
  - Se evita «SEÑOR» u otra máscara para el nombre divino porque no aparece en este versículo.
  - Se conserva un registro bíblico moderno y digno, con verbos simples y directos.
