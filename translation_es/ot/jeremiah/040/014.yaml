translation:
  language: es
  text: 'Y le dijeron[b]: «¿De veras sabes[a] que Baalis, rey de los amonitas, ha enviado a Ismael hijo de Netanías para quitarte la vida[b]?» Pero Gedalías hijo de Ahicam no les creyó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Sabes con certeza…?». El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «golpearte en vida/alma», un modismo que significa matar o quitarle a alguien la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָדֹעַ תֵּדַע
  english_pob_choice: Do you really know
  chosen_spanish: ¿De veras sabes
  alternatives_spanish:
  - ¿Sabes con certeza
  - ¿Realmente sabes
  lexicon: HALOT
  rationale: La construcción hebrea con infinitivo absoluto más verbo finito intensifica la idea de saber; en español, «¿De veras sabes…?» transmite esa fuerza enfática de manera natural sin volverla mecánica.
- source_word: בַּעֲלִיס
  english_pob_choice: Baalis
  chosen_spanish: Baalis
  alternatives_spanish:
  - Baalís
  lexicon: Transliteración propia
  rationale: Se conserva el nombre propio como transliteración, siguiendo la decisión auditada en inglés y la práctica del proyecto para nombres no traducidos.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  english_pob_choice: king of the Ammonites
  chosen_spanish: rey de los amonitas
  alternatives_spanish:
  - rey de los hijos de Amón
  - rey del pueblo amonita
  lexicon: HALOT
  rationale: «Amonitas» es la forma natural y clara en español para el grupo étnico; mantiene el valor colectivo del constructo hebreo sin calco innecesario.
- source_word: שָׁלַח
  english_pob_choice: has sent
  chosen_spanish: ha enviado
  alternatives_spanish:
  - envió
  lexicon: HALOT
  rationale: El perfecto español refleja bien una acción anterior con relevancia en el relato. «Ha enviado» también conserva el carácter reportado de la noticia.
- source_word: יִשְׁמָעֵאל בֶּן נְתַנְיָה
  english_pob_choice: Ishmael son of Nethaniah
  chosen_spanish: Ismael hijo de Netanías
  alternatives_spanish:
  - Ismael, hijo de Netanías
  lexicon: Transliteración propia
  rationale: Se usan las formas bíblicas españolas de los nombres y la relación filial directa, sin añadir artículo que el hebreo no exige.
- source_word: לְהַכֹּתְךָ נָפֶשׁ
  english_pob_choice: to strike you down
  chosen_spanish: para quitarte la vida
  alternatives_spanish:
  - para golpearte hasta matarte
  - para matarte
  lexicon: HALOT
  rationale: El hebreo dice literalmente «golpearte a vida/vida-alma», un modismo para matar. En español, «quitarte la vida» comunica el sentido idiomático con dignidad y sin perder la referencia personal a נֶפֶשׁ.
- source_word: הֶאֱמִין לָהֶם
  english_pob_choice: did not believe them
  chosen_spanish: no les creyó
  alternatives_spanish:
  - no les dio crédito
  - no les tuvo fe
  lexicon: HALOT
  rationale: El verbo español «creer» reproduce bien el valor de confiar en lo dicho por otros en este contexto de advertencia. La forma breve mantiene la claridad narrativa.
- source_word: גְּדַלְיָהוּ בֶּן אֲחִיקָם
  english_pob_choice: Gedaliah son of Ahikam
  chosen_spanish: Gedalías hijo de Ahicam
  alternatives_spanish:
  - Gedalías, hijo de Ahicam
  lexicon: Transliteración propia
  rationale: Se conserva la forma española de los nombres propios y la filiación, acorde con el texto bíblico y la auditable transliteración del proyecto.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura revisada en inglés, especialmente en לְהַכֹּתְךָ נָפֶשׁ, evitando un giro más interpretativo que el texto no exige. No se introducen notas porque el español logra expresar el énfasis y el modismo sin requerir una alternativa textual publicada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando aparezca el Tetragrámaton; aquí no ocurre.
  - Se usa «amonitas» como gentilicio colectivo natural para בְּנֵי עַמּוֹן.
  - Se conserva la secuencia narrativa con una sola oración principal y una cláusula adversativa final, en paralelo al hebreo y al inglés auditado.
