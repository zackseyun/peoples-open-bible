  text: '이 백성의 마음이 둔해졌고, 그들이 귀로는 무겁게 들으며, 자기들의 눈을 감았으니, 이는 그들이 눈으로 보고, 귀로 듣고, 마음으로 깨닫고, 돌이켜서 내가 그들을 고치는 일이 없도록 함이다.」'
