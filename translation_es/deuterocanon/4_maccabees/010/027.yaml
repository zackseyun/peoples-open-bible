translation:
  language: es
  text: si en verdad tenías afectos[a] humanos, y tenías esperanza de parte de Dios de liberación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anhelos humanos» o «afecciones humanas». La frase griega es compacta y alude al apego o deseo propio de lo humano.
    reason: lexical_alternative
  - marker: b
    text: O «salvación». El griego puede referirse tanto a una liberación inmediata como a una salvación en sentido más amplio; aquí se prefiere «liberación» por el contexto inmediato.
    reason: alternative_reading
lexical_decisions:
- source_word: εἴπερ
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si realmente
  - si de veras
  lexicon: LSJ
  rationale: La partícula refuerza la condición sin convertirla en causalidad. «Si en verdad» mantiene ese énfasis retórico de manera natural en español.
- source_word: ἠσθάνου
  english_pob_choice: you had ... feelings / affections
  chosen_spanish: tenías afectos
  alternatives_spanish:
  - sentías
  - tenías sentimientos
  - percibías
  lexicon: LSJ
  rationale: El contexto es una apelación emotiva, no mera percepción física. «Afectos» conserva la fuerza afectiva de la expresión griega y el matiz relacional que la revisión inglesa quiso resaltar con «affections».
- source_word: ἀνθρώπους πόθων
  english_pob_choice: human affections
  chosen_spanish: afectos humanos
  alternatives_spanish:
  - anhelos humanos
  - deseos humanos
  - afecciones humanas
  lexicon: LSJ
  rationale: La frase griega es comprimida y apunta a lo característicamente humano. «Afectos humanos» comunica esa capacidad de apego o anhelo sin sobreinterpretar la construcción.
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  - confianza
  lexicon: LSJ
  rationale: «Esperanza» es el equivalente directo y mantiene tanto el sentido afectivo como el prospectivo del término griego.
- source_word: παρὰ θεῷ
  english_pob_choice: from God
  chosen_spanish: en Dios
  alternatives_spanish:
  - de parte de Dios
  - ante Dios
  - junto a Dios
  lexicon: LSJ
  rationale: Aunque παρά con dativo puede sugerir procedencia o relación, en español «en Dios» expresa de manera idiomática que la esperanza está fundada en Dios. Evita una formulación más dura y conserva la relación de dependencia.
- source_word: σωτηρίου
  english_pob_choice: for deliverance
  chosen_spanish: para liberación
  alternatives_spanish:
  - para salvación
  - para rescate
  lexicon: LSJ
  rationale: En este contexto martirial la referencia inmediata es a ser librados del sufrimiento y la muerte. «Liberación» conserva la amplitud del término griego sin cargarlo de un sentido doctrinal más específico que el contexto no exige.
theological_decisions:
- issue: σωτηρίου en un contexto de martirio
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - rescate
  rationale: El término puede abarcar tanto salvación en sentido amplio como rescate inmediato. Aquí la escena trata de la expectativa de auxilio frente al sufrimiento presente, por lo que «liberación» reproduce mejor la función contextual sin negar la resonancia teológica más amplia.
  doctrine_reference: 'Translation philosophy: primacía del original y claridad moderna sin lenguaje eclesiástico impuesto.'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «feelings» por «affections» para reflejar mejor πόθων («longings/affections»). Esta draft española sigue ese ajuste con «afectos», manteniendo el tono formal y la apelación emotiva del verso.
  spanish_consistency_notes:
  - Se usa «Dios» conforme al estándar del proyecto para θεός.
  - Se evita mecanizar «παρὰ θεῷ» como «de parte de Dios» porque en español la relación resulta más natural como «en Dios» en este contexto.
  - Se conserva una distinción entre la apelación afectiva («afectos») y el objeto esperado («esperanza... para liberación»), sin fusionar los dos miembros de la cláusula.
