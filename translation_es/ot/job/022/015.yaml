review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: pregunta retórica sobre seguir una conducta antigua recorrida por hombres malvados. «Senda antigua» para הָאֹרַח עוֹלָם y «han hollado» para דָּרְכוּ son opciones fieles. Sin embargo, el verbo תִּשְׁמֹר con objeto de camino suena poco natural en español como «guardarás la senda»; el sentido idiomático es más bien «seguir/mantenerte en» ese camino.'
  spanish_quality_summary: El español es claro y digno, pero «¿Guardarás la senda antigua…?» suena algo calcado y puede entenderse como conservar/proteger la senda en vez de andar en ella. «¿Seguirás la senda antigua…?» comunica mejor el valor idiomático en español. Además, la nota b actual no preserva la alternativa léxica documentada en la auditoría inglesa para «men of wickedness»; conviene trasladar esa nota, y la nota de «hollado» puede omitirse porque no responde a una ambigüedad que necesite nota en español.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Iniquidad» es aceptable para אָוֶן en este contexto. La revisión propuesta mejora la correspondencia idiomática de שׁמר sin alterar el sentido.
  issues:
  - severity: medium
    issue: «Guardarás la senda» no expresa bien el modismo de שׁמר con «camino»
    rationale: En hebreo puede significar guardar/observar un camino en el sentido de mantenerse en él; en español «guardar una senda» suele entenderse como conservarla o protegerla. «Seguirás» o «te mantendrás en» es más natural y fiel al sentido contextual.
  - severity: medium
    issue: La nota b comenta «hollado» en lugar de preservar la alternativa léxica relevante para מְתֵי אָוֶן
    rationale: La auditoría inglesa documenta una nota sobre «men of wickedness / evil men / men of iniquity». Esa variación sí es significativa. En cambio, «hollado» no introduce una ambigüedad que requiera nota en español.
  revised_spanish_text: ¿Seguirás la senda antigua[a], que han hollado los hombres de iniquidad?[b]
  revised_footnotes:
  - marker: a
    text: O «la senda de antiguo» o «la senda de tiempos antiguos». El hebreo se refiere a un camino seguido desde hace mucho tiempo en el pasado, no necesariamente a algo eterno.
    reason: lexical_alternative
  - marker: b
    text: O «hombres malvados» o «hombres de maldad». La frase hebrea es literalmente «hombres de iniquidad».
    reason: lexical_alternative
  revision_rationale: Se cambia «Guardarás» por «Seguirás» para expresar de manera natural en español el sentido idiomático de שׁמר con «camino/senda». Se conserva «senda antigua» y «han hollado» como opciones fieles y legibles. Se ajustan las notas para reflejar las alternativas léxicas significativas documentadas en la auditoría inglesa.
