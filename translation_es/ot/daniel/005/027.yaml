translation:
  language: es
  text: '«Tekel»: has sido pesado en las balanzas[a][b] y has sido hallado falto[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tekel» es la palabra aramea escrita que Daniel interpreta; se conserva transliterada para distinguir el signo-omen de su explicación.
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la balanza».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «deficiente» o «insuficiente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּקֵל
  english_pob_choice: Tekel
  chosen_spanish: Tekel
  alternatives_spanish:
  - una medida de peso
  - pesado
  lexicon: HALOT
  rationale: Se conserva la forma aramea inscrita como palabra-omen, porque Daniel la interpreta en vez de simplemente traducirla. En español, la transliteración mantiene la distinción entre el término escrito y su explicación.
- source_word: תְּקִילְתָּה
  english_pob_choice: you have been weighed
  chosen_spanish: has sido pesado
  alternatives_spanish:
  - fuiste pesado
  - eres pesado
  lexicon: HALOT
  rationale: El pasivo expresa una evaluación ya realizada con efecto presente. «Has sido pesado» reproduce bien el valor resultativo en un español natural y solemne.
- source_word: בְמֹאזַנְיָא
  english_pob_choice: in the balances
  chosen_spanish: en las balanzas
  alternatives_spanish:
  - en las balanzas de pesar
  - en las básculas
  lexicon: HALOT
  rationale: «Balanzas» comunica el instrumento de pesar y conserva la imagen judicial/metafórica. «Balanzas» es más fluido en español que «en los balances», aunque se mantiene la referencia al acto de pesar.
- source_word: וְהִשְׁתְּכַחַתְּ
  english_pob_choice: and found
  chosen_spanish: y has sido hallado
  alternatives_spanish:
  - y fuiste hallado
  - y se te halló
  lexicon: HALOT
  rationale: El contexto es el resultado de una comprobación. En español conviene explicitar el sujeto implícito con pasivo perifrástico para evitar ambigüedad y conservar la idea de examen concluido.
- source_word: חַסִּיר
  english_pob_choice: lacking
  chosen_spanish: falto
  alternatives_spanish:
  - deficiente
  - falto de peso
  - insuficiente
  lexicon: HALOT
  rationale: «Falto» transmite la idea de carencia o insuficiencia y deja oír la metáfora de estar por debajo del estándar tras la pesada. Evita sobreinterpretar el juicio con términos más explicativos que el original.
theological_decisions:
- issue: Metáfora de juicio por pesada
  english_pob_reading: A divine evaluative judgment is expressed through the imagery of weighing and deficiency, without expanding the text into a fuller doctrinal explanation.
  chosen_spanish_reading: Se conserva la imagen de evaluación divina mediante el pesado y el hallazgo de carencia, sin convertirla en una paráfrasis doctrinal explícita.
  alternative_spanish_readings:
  - Dios te ha juzgado y te ha declarado culpable
  - Se te ha condenado por no alcanzar la medida
  rationale: El texto usa lenguaje metafórico de medición y examen; la traducción debe preservar esa imagen, no reemplazarla por una explicación interpretativa que borre la tensión entre metáfora y juicio.
  doctrine_reference: Translation philosophy items 1, 3, and 6
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el testimonio fuente y con la solución inglesa auditada; no se requieren revisiones adicionales. Se mantiene la transliteración del término arameo y la metáfora de pesada/insuficiencia.
  spanish_consistency_notes:
  - Se prefiere «Yahvé» para el nombre divino en general, pero este versículo no lo contiene.
  - Se conserva «Tekel» como término arameo interpretado, en paralelo con la opción inglesa auditada.
  - «Balanzas» se usa para el instrumento de pesar, manteniendo la imagen forense/metafórica.
  - «Falto» conserva la idea de carencia sin añadir culpa explícita que el verso no enuncia.
