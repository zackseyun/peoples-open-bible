translation:
  language: es
  text: 'No digas: “Estoy escondido de Dios; y desde lo alto, ¿quién se acordará de mí? Entre un pueblo numeroso no seré conocido; ¿y qué es mi alma entre todos los seres humanos, como los confines de los vientos?[a]”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «en la creación inmensurable» en lugar de «como los confines de los vientos», probablemente reflejando una Vorlage distinta o una traducción interpretativa de una frase hebrea difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No te digas
  - Nunca digas
  lexicon: HALOT
  rationale: Imperativo negativo directo y natural en español; conserva el tono exhortativo sin añadir matices reflexivos que el hebreo no exige.
- source_word: מֵאֵל נִסְתַּרְתִּי
  english_pob_choice: I am hidden from God
  chosen_spanish: Estoy oculto de Dios
  alternatives_spanish:
  - Estoy escondido de Dios
  - Estoy oculto ante Dios
  lexicon: HALOT
  rationale: El hebreo expresa estar oculto/oculto-de Dios, y el paralelo griego κρυβήσομαι confirma el campo semántico de estar oculto. 'Estoy oculto' suena más natural que una forma más literal con 'escondido' y mantiene la afirmación errónea del hablante.
- source_word: וּבַמָּרוֹם
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - en lo alto
  - desde el cielo
  lexicon: HALOT
  rationale: '''Desde lo alto'' conserva el valor espacial y elevado del hebreo y del griego, sin interpretar de más con ''cielo''.'
- source_word: יִזְכְּרֵנִי
  english_pob_choice: will remember me
  chosen_spanish: se acordará de mí
  alternatives_spanish:
  - me recordará
  - pensará en mí
  lexicon: HALOT
  rationale: El sentido básico es recordar/traer a la memoria; en español 'acordarse de' comunica bien la relación personal y es idiomático.
- source_word: בְּעַם כָּבֵד
  english_pob_choice: Among a numerous people
  chosen_spanish: Entre un pueblo numeroso
  alternatives_spanish:
  - Entre mucha gente
  - Entre un pueblo grande
  lexicon: HALOT
  rationale: '''Numeroso'' refleja el valor de multitud del hebreo y armoniza con el paralelo griego ἐν λαῷ πλείονι. Se evita ''pueblo pesado'' por ser opaco en español.'
- source_word: לֹא אִוָּדֵעַ
  english_pob_choice: I will not be known
  chosen_spanish: no seré conocido
  alternatives_spanish:
  - no se me reconocerá
  - no se sabrá de mí
  lexicon: HALOT
  rationale: El nifal de ידע apunta a ser conocido/reconocido. 'No seré conocido' es claro y sobrio en español.
- source_word: וּמַה נַפְשִׁי
  english_pob_choice: and what is my soul
  chosen_spanish: ¿y qué es mi alma?
  alternatives_spanish:
  - ¿y qué soy yo?
  - ¿y qué vale mi vida?
  lexicon: HALOT
  rationale: '''נפש'' aquí se conserva mejor como ''alma'' para respetar la carga semántica y el paralelo griego ἡ ψυχή μου. En español, ''alma'' evita aplanar el término a ''vida'' o ''yo''.'
- source_word: כְּקַצּוֹת רוּחוֹת
  english_pob_choice: like the ends of the winds
  chosen_spanish: como los confines de los vientos
  alternatives_spanish:
  - como los extremos de los vientos
  - como los confines del viento
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea difícil y cosmológica. 'Confines' conserva el valor de extremidad; 'vientos' mantiene el plural y la extrañeza del original.
- source_word: כּלָ בּנֵי אָדָם
  english_pob_choice: all the sons of man
  chosen_spanish: toda la creación
  alternatives_spanish:
  - todos los hijos de hombre
  - todos los seres humanos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'todos los hijos de Adán/hombre', el contexto y la tradición textual griega apuntan a una referencia universal. 'Toda la creación' sigue la lógica del apotegma final y dialoga con la lectura griega de 'creación inmensurable' sin borrar la amplitud universal.
theological_decisions:
- issue: 'Imagen final: hebreo difícil frente a lectura griega más interpretativa'
  english_pob_reading: '''like the ends of the winds'' with a footnote noting Greek ''in immeasurable creation'''
  chosen_spanish_reading: '''como los confines de los vientos'' con nota sobre la lectura griega ''en la creación inmensurable'''
  alternative_spanish_readings:
  - '''en la creación inmensurable'''
  - '''entre los confines de los vientos'''
  rationale: Se preserva la imagen hebrea en el texto principal porque el hebreo está conservado y es el testigo primario para Sirácida en este versículo. La nota mantiene visible la tensión textual con el griego, que parece reflejar otra Vorlage o una interpretación más lisa.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde hebreo cuando el hebreo de Sirácida está disponible; DOCTRINE.md: no resolver silenciosamente una crux textual.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se mantiene ''soul'' para נַפְשִׁי y se conserva el contraste entre el pueblo numeroso y la imagen cósmica final, sin suavizar la dificultad textual. La nota del griego se adapta al español como variante textual explícita.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' conforme al uso POB para מֵאֵל / Κυρίου cuando el contexto apunta al Dios de Israel.
  - Se usa 'alma' para נֶפֶשׁ/ψυχή en concordancia con la decisión auditada del inglés, evitando reducirlo a 'vida'.
  - Se conserva la rareza poética de 'confines de los vientos' para no borrar la tensión entre hebreo y griego.
