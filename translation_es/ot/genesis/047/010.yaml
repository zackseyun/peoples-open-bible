translation:
  language: es
  text: Entonces Jacob bendijo a Faraón y salió de la presencia de Faraón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'saludó a Faraón' / 'se despidió de Faraón'; el verbo hebreo suele significar 'bendecir', pero en contextos de audiencia real puede solaparse con un saludo formal o una despedida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - saludó
  - despidió
  lexicon: HALOT, BDB
  rationale: ברך normalmente significa 'bendecir'. En este contexto de audiencia real, el inglés POB preserva el sentido básico pero anota que puede solaparse con un saludo formal o una despedida. 'Bendijo' mantiene ese valor léxico principal sin borrar la ambigüedad documentada.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: Nombre propio estándar
  rationale: Se conserva la forma habitual del nombre propio en español bíblico y moderno.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Faraón
  lexicon: Título real estándar
  rationale: '''Faraón'' es la forma normal en español para el título/nombre פרעה y comunica claramente el contexto cortesano.'
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: HALOT, BDB
  rationale: יצא expresa movimiento de salida. 'Salió' es natural en español y mantiene la concreción del acto de retirarse de la audiencia.
- source_word: מִלִּפְנֵי
  english_pob_choice: from Pharaoh’s presence
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - de la presencia ante
  lexicon: HALOT, BDB
  rationale: El hebreo idiomático literalmente significa 'de delante de'. 'De la presencia de' transmite bien la salida de una audiencia real sin sonar forzado en español.
theological_decisions:
- issue: Sentido de ברך en un contexto de audiencia real
  english_pob_reading: The Hebrew verb commonly means 'blessed,' but in royal-audience contexts it can overlap with formal salutation or farewell.
  chosen_spanish_reading: '''Bendijo'' en el texto principal, conservando la nota de que en este contexto puede solaparse con un saludo formal o despedida.'
  alternative_spanish_readings:
  - saludó
  - despidió
  - tomó congé de
  rationale: 'No se borra la tensión léxica observada por el POB: el verbo puede leerse como bendición propiamente dicha o como fórmula cortesana de saludo/despedida. Se mantiene el sentido principal de bendecir y se documentan las alternativas.'
  doctrine_reference: Ninguna; decisión léxica-contextual
translation_notes:
  revision_awareness: El texto inglés POB no necesitó revisiones, y la evaluación cruzada indicó alto acuerdo. La versión española sigue la misma lectura principal, preservando la nota de alternativa léxica sin introducir cambios no respaldados por la fuente.
  spanish_consistency_notes:
  - Se mantiene 'Faraón' de manera uniforme para el título real.
  - '''Salió de la presencia de Faraón'' refleja el idiomatismo hebreo sin calco excesivo.'
  - Se conserva el contraste entre sentido principal ('bendijo') y alternativas cortesanas documentadas en la nota.
