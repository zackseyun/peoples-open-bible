lexical_decisions:
- source_word: ⲛⲁⲥⲓⲉ
  chosen: without sense
  alternatives:
  - senseless
  - foolish
  - ignorant
  lexicon: Crum Coptic Dictionary; Layton, Coptic in 20 Lessons
  rationale: The form appears to be a privative expression for lack of sense/understanding.
    “Without sense” keeps the sharp privative force without the moral coloring of
    “foolish,” preserving the paradox with “wise.” Alignment medium; spelling may
    reflect an alternate orthography for ‘senselessness.’
- source_word: ⲥⲟⲟⲩⲛ (qualitative)
  chosen: wise
  alternatives:
  - knowing
  lexicon: Crum Coptic Dictionary
  rationale: Qualitative/stative of ⲥⲟⲟⲩⲛ (‘to know’) can function adjectivally (‘knowing’).
    In this paradoxic pair, “wise” idiomatically renders ‘knowing’ to stand antithetically
    against “without sense,” while preserving the voice’s sharpness.
- source_word: ⲡ/ⲧⲥⲟⲟⲩⲛ (noun)
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: Crum Coptic Dictionary
  rationale: With the article, ⲥⲟⲟⲩⲛ regularly means ‘knowledge.’ The following genitives
    (“of the Greek … of the barbarian”) suggest a construct ‘the knowledge of…,’ so
    ‘knowledge’ is preferred over ‘understanding’ for consistency with the poem’s
    recurring knowledge/ignorance motif.
- source_word: ⲉⲗⲗⲏⲛ
  chosen: Greek
  alternatives:
  - Hellene
  lexicon: Greek loanword via Coptic (LSJ)
  rationale: Common English rendering; retains the classical cultural contrast the
    text invokes.
- source_word: ⲃⲁⲣⲃⲁⲣⲟⲥ
  chosen: barbarian
  alternatives:
  - non‑Greek
  - foreigner
  lexicon: Greek loanword via Coptic (LSJ)
  rationale: “Barbarian” preserves the Greco‑Roman binary in its stark, provocative
    form—fitting the poem’s paradoxes. ‘Non‑Greek’ would domesticate the rhetoric.
