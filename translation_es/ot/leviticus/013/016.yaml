translation:
  language: es
  text: O si la carne viva[a] vuelve y se pone blanca, entonces irá al sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la carne viva»; en contexto se refiere al tejido vivo o carne en vivo expuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: א֣וֹ
  english_pob_choice: Or
  chosen_spanish: O
  alternatives_spanish:
  - Pero
  - O si
  lexicon: HALOT
  rationale: Conserva la fuerza disyuntiva del hebreo dentro de la secuencia diagnóstica sacerdotal; en español, ‘O si’ sería posible, pero ‘O’ deja que la condición la complete la siguiente partícula.
- source_word: כִ֥י
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - que
  lexicon: HALOT
  rationale: Aquí introduce una condición. ‘Si’ reproduce mejor el valor condicional en español que ‘cuando’.
- source_word: יָשׁ֛וּב
  english_pob_choice: turns back
  chosen_spanish: se vuelve
  alternatives_spanish:
  - regresa
  - vuelve a
  lexicon: HALOT
  rationale: El verbo expresa retorno/cambio de estado. ‘Se vuelve’ comunica bien la reversión visible del caso anterior sin sonar forzado.
- source_word: הַ/בָּשָׂ֥ר הַ/חַ֖י
  english_pob_choice: the raw flesh
  chosen_spanish: la carne viva
  alternatives_spanish:
  - la carne cruda
  - la carne sana
  lexicon: HALOT
  rationale: La lectura literal es ‘la carne viva’. En español, ‘carne viva’ conserva la tensión léxica del hebreo y evita suavizarla a una glosa más interpretativa como ‘carne cruda’.
- source_word: וְ/נֶהְפַּ֣ךְ
  english_pob_choice: becomes
  chosen_spanish: se vuelve
  alternatives_spanish:
  - es cambiada
  - es transformada
  lexicon: HALOT
  rationale: El nifal indica cambio de estado; ‘se vuelve’ mantiene el resultado observable en el tejido y corresponde al valor resultativo del verbo.
- source_word: לְ/לָבָ֑ן
  english_pob_choice: white
  chosen_spanish: blanca
  alternatives_spanish:
  - blanco
  - de color blanco
  lexicon: HALOT
  rationale: Adjetivo cromático directo, concordado con ‘la carne’.
- source_word: וּ/בָ֖א
  english_pob_choice: then he shall come
  chosen_spanish: entonces irá
  alternatives_spanish:
  - y vendrá
  - entonces se presentará
  lexicon: HALOT
  rationale: En español, ‘irá’ transmite el desplazamiento hacia el sacerdote dentro del procedimiento legal; ‘entonces’ explicita la secuencia, como en la lectura inglesa del paso consecuente.
- source_word: אֶל הַ/כֹּהֵֽן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote examinador
  - ante el sacerdote
  lexicon: HALOT
  rationale: ‘Sacerdote’ es el equivalente natural en español. ‘Al sacerdote’ conserva la dirección del movimiento y el marco ritual; no se añade ‘examinador’ porque no está explícito en el hebreo.
theological_decisions:
- issue: Término descriptivo para הַבָּשָׂר הַחַי
  english_pob_reading: the raw flesh
  chosen_spanish_reading: la carne viva
  alternative_spanish_readings:
  - la carne cruda
  - la carne sana
  rationale: La frase no usa terminología teológica especializada, pero sí una expresión corporal específica cuya literalidad importa. ‘Carne viva’ mantiene la tensión entre literalidad y función diagnóstica sin reemplazarla por una paráfrasis médica más moderna.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se sigue la lectura auditable del inglés POB: disyuntivo + condicional, cambio de estado con verbo de retorno, y nota léxica para la frase literal de ‘living flesh’ sin borrar su rareza semántica.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque no aparece el tetragrámaton ni una cita directa del nombre divino en este versículo.
  - Se conserva un tono jurídico-ritual claro y sobrio, acorde con Levítico.
  - La nota preserva la alternativa literal sin desplazar la lectura principal publicada.
