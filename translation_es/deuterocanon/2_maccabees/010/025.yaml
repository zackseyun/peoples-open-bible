translation:
  language: es
  text: Por tanto, pues hemos escogido que también esta nación esté libre de perturbación, juzgamos[a] que el santuario[b] les sea restaurado, y que vivan[c] conforme a las costumbres de sus antepasados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «decidimos» / «decretamos»; κρίνομεν es lenguaje administrativo formal para una determinación oficial.
    reason: lexical_alternative
  - marker: b
    text: «Santuario» también puede traducirse «templo», pues τὸ ἱερὸν puede referirse al complejo sagrado del templo.
    reason: lexical_alternative
  - marker: c
    text: El verbo traducido «vivan» (πολιτεύεσθαι) también puede sugerir ordenar la vida comunitaria o cívica, no solo la conducta privada.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρούμενοι
  english_pob_choice: since we choose
  chosen_spanish: pues hemos escogido
  alternatives_spanish:
  - ya que hemos decidido
  - puesto que hemos resuelto
  lexicon: LSJ
  rationale: El participio expresa la base deliberativa del decreto. «Pues hemos escogido» conserva la idea de una determinación formal sin sonar rígida en español.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - grupo étnico
  lexicon: LSJ
  rationale: En este contexto administrativo real, ἔθνος designa al colectivo judío como cuerpo político distinto. «Nación» mantiene ese valor colectivo-político.
- source_word: ἐκτὸς ταραχῆς εἶναι
  english_pob_choice: should be free from disturbance
  chosen_spanish: esté libre de perturbación
  alternatives_spanish:
  - esté libre de tumulto
  - esté sin disturbio
  - permanezca en paz
  lexicon: LSJ
  rationale: La frase apunta a estar exento de agitación o desorden público. «Libre de perturbación» conserva el matiz de orden civil y evita suavizarlo excesivamente.
- source_word: κρίνομεν
  english_pob_choice: we judge
  chosen_spanish: juzgamos
  alternatives_spanish:
  - decidimos
  - decretamos
  lexicon: LSJ
  rationale: El verbo expresa una determinación oficial. «Juzgamos» sigue de cerca el griego y funciona en el estilo administrativo del pasaje.
- source_word: τὸ ἱερὸν
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  - el recinto sagrado
  lexicon: LSJ
  rationale: Ἱερόν puede referirse al complejo sagrado o al templo. «Santuario» preserva el valor cultual sin restringirlo innecesariamente a un edificio.
- source_word: ἀποκατασταθῆναι
  english_pob_choice: should be restored
  chosen_spanish: sea restaurado
  alternatives_spanish:
  - sea restablecido
  - sea reinstalado
  lexicon: LSJ
  rationale: El pasivo infinitivo indica devolución a un estado o condición anterior apropiada. «Sea restaurado» es la manera más directa y natural en español.
- source_word: πολιτεύεσθαι
  english_pob_choice: they should live
  chosen_spanish: vivan
  alternatives_spanish:
  - se conduzcan
  - ordenen su vida comunitaria
  lexicon: LSJ
  rationale: El verbo puede tener matiz cívico o comunitario; aquí, unido a las costumbres ancestrales, puede expresarse de modo más sobrio como «vivan», dejando implícito el orden de la vida común.
- source_word: κατὰ τὰ ἐπὶ τῶν προγόνων αὐτῶν ἔθη
  english_pob_choice: according to the customs of their ancestors
  chosen_spanish: conforme a las costumbres de sus antepasados
  alternatives_spanish:
  - según las costumbres de sus antepasados
  - de acuerdo con las costumbres ancestrales de ellos
  lexicon: LSJ
  rationale: La expresión remite a prácticas tradicionales heredadas. «Conforme a» y «antepasados» conservan el tono formal y la referencia ancestral.
theological_decisions:
- issue: 'Alcance de τὸ ἱερὸν: santuario vs. templo'
  english_pob_reading: The sanctuary may also be rendered the temple, since τὸ ἱερὸν can refer to the sacred temple complex.
  chosen_spanish_reading: el santuario
  alternative_spanish_readings:
  - el templo
  - el recinto sagrado
  rationale: Se mantiene «santuario» porque reproduce el rango semántico del griego sin imponer una equivalencia más estrecha que el texto no exige. La alternativa «templo» queda implícitamente posible, pero no se adopta como texto principal.
  doctrine_reference: LSJ; contexto cultual del Segundo Templo
translation_notes:
  revision_awareness: El borrador sigue el estado de alta concordancia del audit trail inglés (sin revisiones aplicadas en la última pasada) y mantiene la solución óptima ya establecida, con ajuste a español natural y conservando la distinción entre la determinación oficial, el estado público de tranquilidad y la referencia cultual del τὸ ἱερὸν.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; no aplica en este versículo.
  - Se evita «Señor» o «templo» como sustitución automática para τὸ ἱερὸν; el texto principal usa «santuario» siguiendo el audit trail.
  - «Nación» mantiene el valor colectivo-político de ἔθνος en este contexto administrativo.
  - «Perturbación» traduce ταραχή con un matiz de desorden público, coherente con la función del pasaje.
