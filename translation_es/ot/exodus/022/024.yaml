translation:
  language: es
  text: Si prestas dinero[a] a mi pueblo, al pobre que está entre ustedes, no serás para él como un acreedor[c]; no le impondrás interés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando prestes dinero a mi pueblo». El hebreo usa una forma condicional frecuente en el lenguaje legal. Hebreo literal: «plata»; aquí con el sentido de dinero.'
    reason: alternative_reading
  - marker: c
    text: 'O: «no le cobrarás interés» o «no te portarás con él como acreedor». El hebreo literalmente dice: «no serás para él como un acreedor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La forma condicional hebrea se conserva con «si», que refleja bien el tono casuístico de la ley sin perder naturalidad en español.
- source_word: כֶּסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - moneda
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «plata», aquí el sentido económico es «dinero»; en español es la opción más clara y actual para un contexto legal.
- source_word: תַּלְוֶה
  english_pob_choice: lend
  chosen_spanish: prestas
  alternatives_spanish:
  - das en préstamo
  - prestares
  lexicon: HALOT
  rationale: El hiphil de לוה expresa prestar; «prestas» comunica de forma directa y natural la acción de conceder un préstamo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo Israel
  lexicon: HALOT
  rationale: Se conserva el posesivo de primera persona y el sustantivo colectivo «pueblo», que reproduce bien la referencia comunitaria del hebreo sin añadir «Israel» al texto.
- source_word: הֶעָנִי
  english_pob_choice: the poor among you
  chosen_spanish: al pobre
  alternatives_spanish:
  - al necesitado
  - a la persona pobre
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/adjetivo masculino singular; «al pobre» mantiene esa forma y el valor referencial individual sin sobreexplicar.
- source_word: עִמָּךְ
  english_pob_choice: among you
  chosen_spanish: que está contigo
  alternatives_spanish:
  - entre ustedes
  - contigo
  lexicon: HALOT
  rationale: Literalmente es «contigo»; en español «que está contigo» comunica de manera fluida la pertenencia o cercanía dentro de la comunidad, sin introducir una generalización innecesaria.
- source_word: כְּנֹשֶׁה
  english_pob_choice: like a creditor
  chosen_spanish: de acreedor
  alternatives_spanish:
  - como acreedor
  - como cobrador
  lexicon: HALOT
  rationale: La construcción hebrea expresa una conducta «como acreedor»; en español, la locución «hacer de acreedor» reproduce la función relacional y la presión implícita del término con buena fluidez.
- source_word: תְשִׂימוּן
  english_pob_choice: impose
  chosen_spanish: impondrás
  alternatives_spanish:
  - pondrás
  - cargarás
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «poner/colocar», pero con «interés» en esta construcción la idea es «imponer» o «cargar»; «impondrás» conserva el matiz jurídico.
- source_word: נֶשֶׁךְ
  english_pob_choice: interest
  chosen_spanish: interés
  alternatives_spanish:
  - usura
  - rédito
  lexicon: HALOT
  rationale: «Interés» expresa la prohibición económica de manera clara en español moderno; «usura» puede sugerir solo interés excesivo, lo que estrecharía indebidamente el sentido.
theological_decisions:
- issue: Conservación del caso legal condicional
  english_pob_reading: If you lend
  chosen_spanish_reading: Si prestas
  alternative_spanish_readings:
  - Cuando prestas
  rationale: Se preserva la forma casuística del hebreo con «si», manteniendo la estructura legal sin convertirla en una mera generalización temporal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Referencia a 'mi pueblo' sin ampliar a 'Israel'
  english_pob_reading: my people
  chosen_spanish_reading: mi pueblo
  alternative_spanish_readings:
  - mi pueblo Israel
  rationale: El hebreo dice «mi pueblo»; añadir «Israel» sería interpretativo. Se deja la referencia implícita tal como aparece en el texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Tratamiento del destinatario pobre en singular
  english_pob_reading: the poor among you
  chosen_spanish_reading: al pobre que está contigo
  alternative_spanish_readings:
  - al pobre entre ustedes
  - al necesitado que está contigo
  rationale: El hebreo es singular masculino y apunta a un individuo concreto; se mantiene esa singularidad sin neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación económica prohibida con el prójimo
  english_pob_reading: you shall not be like a creditor to him
  chosen_spanish_reading: no le harás de acreedor
  alternative_spanish_readings:
  - no le tratarás como acreedor
  - no serás para él como acreedor
  rationale: Se conserva la fuerza social y económica de la prohibición, expresando la relación de presión crediticia sin suavizarla a un mero consejo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «the poor man among you» a «the poor among you» para reflejar mejor el hebreo sin añadir «man». En español se optó por una formulación singular y natural («al pobre que está contigo») que conserva la referencia individual masculina del hebreo y evita una glosa innecesaria. También se mantuvo la lectura legal casuística de אִם y el valor económico de נֶשֶׁךְ como «interés», siguiendo la revisión más reciente y el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se usa «mi pueblo» para עַמִּי, siguiendo el posesivo del hebreo sin añadir «Israel».
  - Se traduce כֶּסֶף como «dinero» en el sentido contextual, no como «plata».
  - Se mantiene «interés» para נֶשֶׁךְ, evitando «usura» por su posible restricción semántica.
  - La formulación «no le harás de acreedor» busca reproducir la función relacional de כְּנֹשֶׁה con un español claro y bíblico.
  - Se conserva el tono legal casuístico con «Si», acorde al hebreo de ley caso por caso.
