base_translation:
  language: en
  yaml_path: translation/ot/proverbs/026/002.yaml
  text: Like a sparrow in its wandering[a], like a swallow in its flying[c][b], so an undeserved curse does not come to rest.
  footnotes:
  - marker: a
    text: Or 'like a swift' for the second bird term.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a curse without cause'; that is, a baseless or undeserved curse.
    reason: lexical_alternative
  - marker: c
    text: Literally 'does not come.' The imagery suggests it does not land or take effect.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
