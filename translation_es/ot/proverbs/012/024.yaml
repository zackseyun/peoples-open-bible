translation:
  language: es
  text: La mano de los diligentes gobernará[a], pero los perezosos[b] serán sometidos al trabajo forzado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernarán». El verbo hebreo puede expresar también ejercer dominio o autoridad.
    reason: lexical_alternative
  - marker: b
    text: O «los negligentes» o «los flojos». El hebreo רְמִיָּה puede señalar laxitud, descuido o pereza; aquí se entiende como un grupo personal en contraste con «los diligentes».
    reason: lexical_alternative
  - marker: c
    text: El hebreo מַס se refiere a servicio laboral obligatorio, a veces llamado corvea o tributo laboral.
    reason: cultural_note
lexical_decisions:
- source_word: יַד
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - mano
  - poder
  - control
  lexicon: HALOT
  rationale: Conservo la metonimia concreta del hebreo; en español, «mano» mantiene la imagen de agencia o capacidad sin perder naturalidad.
- source_word: חָרוּצִים
  english_pob_choice: the diligent
  chosen_spanish: los diligentes
  alternatives_spanish:
  - los industriosos
  - los trabajadores
  - los diligentes
  lexicon: HALOT
  rationale: El término apunta a personas marcadas por laboriosidad y empeño. «Diligentes» reproduce bien el valor proverbial y sostiene el contraste con רְמִיָּה.
- source_word: תִּמְשׁוֹל
  english_pob_choice: will rule
  chosen_spanish: gobernará
  alternatives_spanish:
  - reinará
  - dominará
  - gobernará
  lexicon: HALOT
  rationale: מָשַׁל expresa ejercer gobierno o dominio. «Gobernará» es claro, sobrio y adecuado al proverbio; «reinará» suena más monárquico y «dominará» más duro.
- source_word: רְמִיָּה
  english_pob_choice: the slack
  chosen_spanish: los perezosos
  alternatives_spanish:
  - los flojos
  - los negligentes
  - los perezosos
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar idea de laxitud o negligencia, aquí la revisión inglesa optó por un sujeto personal. En español, «los perezosos» comunica con naturalidad esa oposición a «los diligentes» sin perder el matiz de falta de empuje.
- source_word: תִּהְיֶה לָמַס
  english_pob_choice: will be put to forced labor
  chosen_spanish: serán sometidos a trabajos forzados
  alternatives_spanish:
  - quedarán para trabajos forzados
  - serán puestos a trabajos forzados
  - serán sometidos a trabajos forzados
  lexicon: HALOT
  rationale: מַס designa servicio laboral obligatorio, corvée o trabajo impuesto. «Trabajos forzados» transmite con claridad esa realidad social; «sometidos» conserva mejor la pasiva de resultado que una simple traducción con «ser».
translation_notes:
  revision_awareness: El texto inglés revisado cambió de una abstracción («slackness») a un sujeto personal («the slack»). La versión española sigue esa revisión y evita abstraer el término hebreo, manteniendo el paralelismo entre dos grupos de personas. También conserva el valor cultural de מַס como labor obligatoria, no simple tributo monetario.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «gobernará» por claridad proverbial y por correspondencia con el valor de משל.
  - «Trabajos forzados» se emplea para מַס, siguiendo el sentido de labor compulsoria indicado por el audit trail inglés.
  - El contraste se formuló entre personas («los diligentes» / «los perezosos») para reflejar el cambio revisado en el inglés POB.
