revisions:
- from: Así envió Moisés a mil de cada tribu, a la guerra[a], a ellos[b], y a Finees hijo de Eleazar, el sacerdote, a la guerra[b], con los vasos santos y las trompetas de la señal en su mano.
  to: 'Así Moisés los envió a la guerra, mil de cada tribu: a ellos, y a Finees hijo de Eleazar, el sacerdote, a la guerra, con los utensilios santos[a] y las trompetas para la señal de guerra[b] en su mano.'
  rationale: Se corrigieron los anclajes de las notas para que correspondan a los mismos elementos léxicos documentados en el POB inglés. También se ajustó «vasos santos» a «utensilios santos» para mejor naturalidad en español, y «trompetas de la señal» a «trompetas para la señal de guerra» para preservar con mayor claridad el matiz militar de תְּרוּעָה en este contexto. Se mantuvo la repetición de «a ellos» y el singular «en su mano» por fidelidad al hebreo.
