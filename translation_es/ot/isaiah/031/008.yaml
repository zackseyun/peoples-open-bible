review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: caída de Asiria, doble negación de agencia humana respecto de la espada, huida ante la espada y sometimiento final de sus jóvenes. También mantiene la tensión teológica de un instrumento de juicio no especificado. Sin embargo, hay un error importante en la realización del objeto de תֹאכֲלֶנּוּ: el hebreo significa ''lo devorará'' / ''devorará a él'' (a Asiria), no ''la devorará'' refiriéndose a la espada. Además, los anclajes de notas b/c/d están colocados sobre ''la espada'' en vez de sobre las expresiones pertinentes (''huirá'', ''jóvenes'', ''trabajo forzado'').'
  spanish_quality_summary: 'El español es en general legible y digno, pero presenta varias asperezas: la mayúscula inicial tras conjunción sería mejor como ''Y Asiria'' o sencillamente mantenerla, pero lo principal es corregir ''la devorará'' a ''lo devorará''. ''De delante de la espada'' es comprensible, aunque ''delante de'' sin ''de'' o ''ante'' suena más natural; no obstante, puede mantenerse por cercanía idiomática al hebreo. ''Serán forzados a trabajos serviles'' es menos fiel y menos natural que ''llegarán a ser trabajo forzado'' o mejor ''serán sometidos a trabajo forzado''.'
  glossary_alignment: No hay conflictos con Yahvé/Mesías/etc. La decisión de distinguir אִישׁ con 'hombre' y אָדָם con 'ser humano' está bien alineada con el razonamiento auditado. Donde el inglés eligió 'forced labor', el español debería alinearse mejor con 'trabajo forzado' en lugar de 'trabajos serviles', que desplaza el campo semántico de מַס.
  issues:
  - severity: high
    issue: Objeto pronominal incorrecto en 'la devorará'
    rationale: תֹאכֲלֶנּוּ = 'lo devorará' / 'devorará a él'; el sujeto es 'espada' y el objeto es Asiria. 'La devorará' invierte indebidamente la referencia y altera el sentido.
  - severity: medium
    issue: Traducción de לָמַס como 'trabajos serviles'
    rationale: מַס denota trabajo impuesto/forzado, tributo laboral, corvea. 'Trabajos serviles' es más vago y no expresa tan claramente la coerción institucional como 'trabajo forzado'.
  - severity: medium
    issue: Anclaje incorrecto de las notas [b][c][d]
    rationale: La nota sobre el medio no especificado pertenece a la referencia a la espada/juicio; la de 'escogidos' corresponde a 'jóvenes'; y la de corvea/tributo laboral corresponde a 'trabajo forzado'. En el borrador, las tres quedan acumuladas tras 'espada', causando desalineación documental.
  - severity: low
    issue: '''De delante de la espada'' suena algo rígido en español'
    rationale: Aunque conserva bien מִפְּנֵי, una forma más natural sería 'de delante de la espada' o 'ante la espada'. Puede mantenerse por fidelidad, pero conviene suavizar el conjunto con otras mejoras.
  revised_spanish_text: Y Asiria caerá por una espada no de hombre[a], y una espada no de ser humano lo devorará; y él huirá de delante de la espada[b], y sus jóvenes[c] serán sometidos a trabajo forzado[d].
  revised_footnotes:
