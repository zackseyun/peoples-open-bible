translation:
  language: es
  text: 'Así que fui a Perat[a], y cavé, y saqué el cinturón del lugar donde lo había escondido. Y he aquí que el cinturón estaba arruinado[b]; no servía para nada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Perat puede referirse al Éufrates; el hebreo lee el nombre de lugar ''Perat''.'
    reason: alternative_reading
  - marker: b
    text: 'O ''faja'', ''ceñidor'' o ''banda''. El hebreo designa una prenda que se lleva alrededor de la cintura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרָתָה
  english_pob_choice: Perath
  chosen_spanish: Perat
  alternatives_spanish:
  - el Éufrates
  lexicon: HALOT
  rationale: La forma hebrea se trata aquí como nombre propio; por eso se translitera en vez de interpretarse de inmediato como el río. Se conserva la posibilidad de identificarlo con el Éufrates en nota, como hace el audit trail en inglés.
- source_word: אֵזוֹר
  english_pob_choice: waistband
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - ceñidor
  - sash
  - lienzo para la cintura
  lexicon: HALOT
  rationale: En español, 'cinturón' comunica de manera natural un objeto llevado a la cintura. Aunque 'faja' o 'ceñidor' son posibles, pueden sonar más marcados o menos inmediatos. Se mantiene el sentido general del objeto sin forzar un término demasiado técnico.
- source_word: טְמַנְתִּיו
  english_pob_choice: I had hidden it
  chosen_spanish: lo había escondido
  alternatives_spanish:
  - lo había ocultado
  - lo había enterrado
  lexicon: HALOT
  rationale: El verbo hebreo admite la idea de ocultar, a veces enterrando, pero el contexto ya incluye 'cavé'; por eso 'escondido' reproduce bien la acción sin duplicar innecesariamente la imagen de enterrar.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: '''Y he aquí'' preserva el valor discursivo de sorpresa y descubrimiento del marcador hebreo, con un tono digno y reconocible en español bíblico moderno.'
- source_word: נִשְׁחַת
  english_pob_choice: was ruined
  chosen_spanish: estaba arruinado
  alternatives_spanish:
  - estaba echado a perder
  - estaba dañado
  - se había corrompido
  lexicon: HALOT
  rationale: El pasivo/reflexivo hebreo describe un estado de deterioro del objeto. 'Arruinado' transmite bien la idea de estar echado a perder sin añadir un matiz moral que el contexto no exige.
- source_word: לֹא יִצְלַח לַכֹּל
  english_pob_choice: it was good for nothing
  chosen_spanish: no servía para nada
  alternatives_spanish:
  - no era útil para nada
  - no valía para nada
  - no era apto para nada
  lexicon: HALOT
  rationale: La expresión hebrea indica inutilidad total. 'No servía para nada' es idiomático, claro y fiel al sentido, sin sonar tan coloquial como 'no valía para nada'.
- source_word: וָאֵלֵךְ ... וָאֶחְפֹּר ... וָאֶקַּח
  english_pob_choice: So I went ... and dug, and took
  chosen_spanish: Así que fui ... y cavé, y saqué
  alternatives_spanish:
  - Entonces fui ... y cavé ... y tomé
  lexicon: HALOT
  rationale: La cadena de wayyiqtol expresa sucesión narrativa. 'Así que fui' y la secuencia verbal con 'cavé' y 'saqué' conservan el avance de la acción en español natural. 'Saqué' funciona bien para el acto de retirar el objeto del lugar donde estaba escondido.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra acuerdo alto y sin revisiones sustanciales: se mantuvieron el nombre propio transliterado, el valor concreto de אֵזוֹר como prenda de cintura, y la expresión de inutilidad total de לֹא יִצְלַח לַכֹּל. La única tensión relevante es la identificación de Perat con el Éufrates, preservada en nota.'
  spanish_consistency_notes:
  - Se usó 'Perat' como transliteración del topónimo, coherente con el tratamiento del nombre propio en el texto base.
  - '''Cinturón'' se eligió como equivalente general comprensible para אֵזוֹר; la nota conserva alternativas léxicas relevantes.'
  - La construcción 'Y he aquí' mantiene el tono de descubrimiento del hebreo sin volverlo arcaizante en exceso.
  - '''No servía para nada'' traduce la inutilidad absoluta sin introducir una paráfrasis interpretativa más fuerte.'
