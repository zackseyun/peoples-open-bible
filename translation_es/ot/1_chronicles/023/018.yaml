lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En este contexto genealógico, בְּנֵי introduce a los miembros de la línea de Izhar. «Hijos de» reproduce de manera directa y natural la relación genealógica sin ampliar innecesariamente el alcance.
- source_word: יִצְהָר
  english_pob_choice: Izhar
  chosen_spanish: Izhar
  lexicon: HALOT
  rationale: Nombre propio; se translitera de forma estándar.
- source_word: שְׁלֹמִית
  english_pob_choice: Shelomith
  chosen_spanish: Shelomit
  alternatives_spanish:
  - Shelomith
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma breve y publicable en español, con ajuste ortográfico mínimo para la fonética española sin alterar la identificación del nombre.
- source_word: הָרֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - la cabeza
  - el primero
  lexicon: HALOT
  rationale: Con artículo, רֹאשׁ funciona aquí como título de rango en una lista genealógica/organizativa. «Jefe» comunica liderazgo de manera clara y natural en español; «cabeza» sería más literal, pero menos idiomática en este contexto; «el primero» conserva una posibilidad de orden, pero es menos preciso para el cargo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el hilo de auditoría en inglés, conservando la estructura genealógica breve y la ambigüedad lexical de רֹאשׁ mediante una nota.
  spanish_consistency_notes:
  - Se usa «hijos de» en sentido genealógico, no exclusivamente masculino-biológico.
  - Se mantiene la transliteración de nombres propios sin traducirlos.
  - La nota al pie preserva las alternativas léxicas documentadas para רֹאשׁ.
  - Se evita el calco rígido «la cabeza» en el cuerpo principal por falta de naturalidad en español, pero se conserva como alternativa en nota.
