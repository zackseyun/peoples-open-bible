translation:
  language: es
  text: Porque ¿quién puede comer[a], y quién puede gozar[b], aparte de él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «aparte de mí». Muchos intérpretes entienden el sentido como «aparte de él», refiriéndose a Dios, a la luz del contexto cercano.'
    reason: textual_variant
  - marker: b
    text: O «puede apresurarse» o «puede sentir». El verbo hebreo es difícil; aquí se entiende en el sentido de gozar o experimentar placer.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de lo dicho antes; «porque» conserva el valor explicativo de כִּי en un español natural y sobrio.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - qué persona
  lexicon: HALOT
  rationale: Interrogativo retórico; «quién» es la forma natural en español y mantiene el paralelismo de la pregunta.
- source_word: יֹאכַל
  english_pob_choice: can eat
  chosen_spanish: puede comer
  alternatives_spanish:
  - come
  - podrá comer
  lexicon: HALOT
  rationale: En la pregunta retórica, el imperfecto expresa capacidad/posibilidad; «puede comer» refleja mejor esa fuerza que un presente simple.
- source_word: וּמִי
  english_pob_choice: and who
  chosen_spanish: y quién
  alternatives_spanish:
  - o quién
  lexicon: HALOT
  rationale: La conjunción simple más el interrogativo conservan el paralelismo hebreo; «y quién» suena natural y no altera la relación coordinada.
- source_word: יָחוּשׁ
  english_pob_choice: can enjoy
  chosen_spanish: puede gozar
  alternatives_spanish:
  - puede disfrutar
  - puede sentir
  - puede apresurarse
  lexicon: HALOT
  rationale: El verbo es difícil; en este contexto de comer y bienestar, la lectura de disfrute/experiencia de placer encaja mejor. «Gozar» mantiene el matiz de experimentar deleite sin volver la frase demasiado explicativa.
- source_word: חוּץ מִמֶּנִּי
  english_pob_choice: apart from him
  chosen_spanish: fuera de él
  alternatives_spanish:
  - aparte de él
  - excepto él
  - fuera de mí
  lexicon: HALOT
  rationale: La construcción expresa exclusión. El texto consonántico/puntuado permite «de mí», pero el contexto inmediato apunta a Dios como referente; «fuera de él» preserva esa decisión sin ocultar la tensión textual.
theological_decisions:
- issue: Referente del sufijo final en מִמֶּנִּי
  english_pob_reading: apart from him
  chosen_spanish_reading: fuera de él
  alternative_spanish_readings:
  - fuera de mí
  rationale: La vocalización masorética da «de mí», pero el contexto de 2:24 y 2:26 atribuye el bien del disfrute a Dios. Siguiendo el criterio de la POB de no borrar la tensión documentada, el texto principal refleja el sentido contextual y se deja constancia de la alternativa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se requieren cambios respecto al sentido principal. Se conserva la tensión textual del sufijo final y la ambigüedad léxica del verbo יָחוּשׁ mediante notas.'
  spanish_consistency_notes:
  - Se emplea «Dios» implícito en la nota, pero el texto principal conserva el pronombre «él» para evitar introducir una glosa interpretativa en la línea principal.
  - «Porque» y no «for» calca el valor explicativo sin sonar artificial en español.
  - «Gozar» es una solución de registro bíblico moderado para el sentido de disfrute/experiencia de placer; se evita «hastenar» o «sentir» en el texto principal por ser menos coherentes aquí.
