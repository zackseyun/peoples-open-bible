translation:
  language: es
  text: Oigan, ustedes que están lejos[a], lo que he hecho; y conozcan, ustedes que están cerca, mi poder[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que están lejos» o «los lejanos». El hebreo usa adjetivos plurales sustantivados para grupos interpelados desde lejos y desde cerca.
    reason: lexical_alternative
  - marker: b
    text: O «mi fuerza» o «mi poderío». גְּבוּרָה puede denotar fuerza, poder o poderío.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: ¡Oigan!
  alternatives_spanish:
  - Escuchen
  - Oigan, ustedes
  lexicon: HALOT
  rationale: El imperativo plural שׁמע pide una llamada directa y profética. «Oigan» conserva el tono de anuncio audible y exhortativo sin volverlo excesivamente coloquial; el vocativo explícito ayuda a marcar la pluralidad del mandato.
- source_word: רְחוֹקִים
  english_pob_choice: you who are far away
  chosen_spanish: ustedes que están lejos
  alternatives_spanish:
  - los lejanos
  - los que están lejos
  lexicon: HALOT
  rationale: El adjetivo plural funciona sustantivado. En español, «ustedes que están lejos» expresa con naturalidad la función vocativa y preserva el contraste con «cerca».
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: what I have done
  chosen_spanish: lo que he hecho
  alternatives_spanish:
  - lo que hice
  - aquello que he hecho
  lexicon: HALOT
  rationale: La relativa más perfecto de primera persona se traduce de forma natural como «lo que he hecho», manteniendo la acción completada con relevancia actual en el discurso profético.
- source_word: וּדְעוּ
  english_pob_choice: and know
  chosen_spanish: y conozcan
  alternatives_spanish:
  - y sepan
  - y reconozcan
  lexicon: HALOT
  rationale: ידע en imperativo plural exige un verbo directo. «Conozcan» conserva el paralelismo con el mandato anterior y evita sobreinterpretar el verbo como «reconocer» o «admitir».
- source_word: קְרוֹבִים
  english_pob_choice: you who are near
  chosen_spanish: ustedes que están cerca
  alternatives_spanish:
  - los cercanos
  - los que están cerca
  lexicon: HALOT
  rationale: Como con רְחוֹקִים, el plural adjetival sustantivado se vierte con una frase vocativa natural en español. Se mantiene el paralelo retórico entre distancia y cercanía.
- source_word: גְּבֻרָתִי
  english_pob_choice: my might
  chosen_spanish: mi poder
  alternatives_spanish:
  - mi fuerza
  - mi poderío
  - mi poderío fuerte
  lexicon: HALOT
  rationale: גְּבוּרָה puede significar fuerza, poder o hazaña poderosa. «Mi poder» es idiomático en español y comunica bien la fuerza activa del sujeto divino; se mantiene la posibilidad de «fuerza» como alternativa semántica.
theological_decisions:
- issue: Sujeto implícito de la voz que habla
  english_pob_reading: The speaker is the LORD, continuing the divine speech context, but the verse is translated without adding the divine name not present in the Hebrew line.
  chosen_spanish_reading: La voz divina queda implícita en la primera persona («he hecho», «mi poder») sin añadir un sujeto explícito ausente del hebreo.
  alternative_spanish_readings:
  - 'Yahvé ha hablado: ...'
  - 'El Señor dice: ...'
  rationale: El hebreo conserva la primera persona sin nombrar al hablante. La traducción debe respetar esa economía textual y no introducir un sujeto que no aparece en el verso; el contexto amplio deja claro que se trata de Yahvé.
  doctrine_reference: Principios de fidelidad al texto y economía referencial en la traducción bíblica
translation_notes:
  revision_awareness: El contexto de revisión indica alto acuerdo y ningún cambio requerido en la última pasada; se conservan las decisiones principales del audit trail inglés, especialmente la vocativa plural, la relativa «lo que he hecho» y la ambigüedad semántica de גְּבֻרָתִי.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el texto lo requiera explícitamente; aquí no se añade por respeto al hebreo de primera persona sin sujeto nominal.
  - Se usa español neutral latinoamericano, con imperativos plurales de registro bíblico pero natural.
  - «Poder» se eligió como equivalente principal de גְּבֻרָה, dejando «fuerza» en nota para no perder el matiz semántico.
