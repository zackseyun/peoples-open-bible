theological_decisions:
- issue: Nature of the heavenly figures
  chosen_reading: Render descriptively as 'two other young men' without specifying angelic identity in the translation.
  alternative_readings:
  - two angels
  - two heavenly beings
  rationale: The Greek text itself calls them νεανίαι and describes their strength, beauty, and clothing, but does not explicitly name them angels in this verse. The translation preserves the narrative description without importing a more specific theological identification.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
