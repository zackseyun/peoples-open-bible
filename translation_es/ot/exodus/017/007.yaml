translation:
  language: es
  text: 'Y llamó al lugar Masá[a] y Meribá, por la disputa de los hijos[b] de Israel y porque probaron a Yahvé, diciendo[c]: «¿Está Yahvé entre nosotros o no?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Masá suena al hebreo relacionado con 'prueba', y Meribá suena al hebreo relacionado con 'disputa' o 'contienda'.
    reason: lexical_alternative
  - marker: b
    text: O 'los israelitas' por 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: c
    text: 'O: ''¿Está Yahvé en medio de nosotros o no?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: y llamó
  alternatives_spanish:
  - y nombró
  - y puso por nombre
  lexicon: HALOT
  rationale: El verbo hebreo con ‘nombre’ introduce una fórmula de nominación. En español, «llamó» conserva mejor esa estructura y suena natural en el contexto narrativo.
- source_word: שֵׁם הַמָּקוֹם
  english_pob_choice: the name of the place
  chosen_spanish: el nombre del lugar
  alternatives_spanish:
  - el lugar
  - el nombre del sitio
  lexicon: HALOT
  rationale: Se conserva la construcción formal del hebreo, no solo el lugar como objeto, para reflejar la fórmula de nombramiento.
- source_word: מַסָּה
  english_pob_choice: Massah
  chosen_spanish: Masá
  alternatives_spanish:
  - Tentación
  - Prueba
  lexicon: HALOT
  rationale: Se translitera el topónimo, pero con adaptación gráfica al español. El sentido de ‘prueba/testing’ queda recogido en la nota.
- source_word: וּמְרִיבָה
  english_pob_choice: and Meribah
  chosen_spanish: y Meribá
  alternatives_spanish:
  - y Contienda
  - y Disputa
  lexicon: HALOT
  rationale: También es nombre propio, por lo que se translitera. El matiz semántico de conflicto se expresa en la cláusula explicativa.
- source_word: עַל רִיב
  english_pob_choice: because of the quarreling
  chosen_spanish: por la disputa
  alternatives_spanish:
  - por la contienda
  - a causa de la riña
  lexicon: HALOT
  rationale: רִיב abarca pleito, disputa o contienda. «Disputa» es claro en español y mantiene el tono legal/narrativo del pasaje.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de forma fiel y entendible en español. «Hijos de Israel» mantiene la referencia corporativa sin neutralizarla.
- source_word: וְעַל נַסֹּתָם אֶת יְהוָה
  english_pob_choice: and because they tested Yahweh
  chosen_spanish: y porque probaron a Yahvé
  alternatives_spanish:
  - y porque pusieron a Yahvé a prueba
  - y porque tentaron a Yahvé
  lexicon: HALOT
  rationale: נָסָה en este contexto significa poner a prueba, no simplemente ‘intentar’. «Probaron a Yahvé» reproduce con sobriedad la fuerza del hebreo; «poner a prueba» queda como alternativa idiomática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, siguiendo la decisión doctrinal del POB y evitando la sustitución por un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijeron
  lexicon: HALOT
  rationale: Fórmula introductoria estándar para el discurso directo; «diciendo» conserva la relación sintáctica del hebreo.
- source_word: הֲיֵשׁ יְהוָה בְּקִרְבֵּנוּ אִם אָיִן
  english_pob_choice: Is Yahweh among us or not?
  chosen_spanish: ¿Está Yahvé entre nosotros o no?
  alternatives_spanish:
  - ¿Está Yahvé en medio de nosotros o no?
  - ¿Está Yahvé en nuestra presencia o no?
  lexicon: HALOT
  rationale: בְּקֶרֶב expresa ‘en medio de/entre’. «Entre nosotros» es natural y preserva la idea de presencia divina comunitaria; «en medio de nosotros» se anota como alternativa más literal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La base hebrea usa el Tetragrámaton, no un título. En español se traduce con la forma establecida por el proyecto, ‘Yahvé’, para preservar el nombre personal revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los niños de Israel
  rationale: Se conserva el valor corporativo y masculino plural del hebreo. ‘Los hijos de Israel’ es fiel y aún natural en registro bíblico español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indicó high_agreement y sin cambios sustanciales; se mantuvo la estructura formal del nombramiento, la transliteración de los topónimos y la decisión doctrinal de renderizar el Tetragrámaton como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «hijos de Israel» para conservar la expresión hebrea sin sustitución por un equivalente sociolingüístico más libre.
  - 'Se adaptaron los topónimos a una grafía española reconocible: Masá, Meribá.'
  - La puntuación del discurso directo sigue el uso moderno en español, con dos puntos antes de la cita.
