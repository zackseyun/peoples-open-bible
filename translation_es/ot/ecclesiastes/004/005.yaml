translation:
  language: es
  text: El insensato junta sus manos y come su propia carne[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'abraza' o 'ase sus manos'; la imagen es la de una inactividad ociosa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, se destruye a sí mismo por su insensatez o su pereza.
    reason: theological_note
lexical_decisions:
- source_word: הַכְּסִיל
  english_pob_choice: the fool
  chosen_spanish: el insensato
  alternatives_spanish:
  - el necio
  - el tonto
  lexicon: HALOT
  rationale: כְּסִיל en literatura sapiencial describe a una persona moralmente y espiritualmente insensata, no solo poco inteligente. 'Insensato' comunica bien ese matiz en español y mantiene el tono proverbial.
- source_word: חֹבֵק
  english_pob_choice: folds
  chosen_spanish: cruza
  alternatives_spanish:
  - abraza
  - aprisiona
  - junta
  lexicon: HALOT
  rationale: El verbo literalmente puede significar 'abrazar' o 'asir'; con 'sus manos' forma una imagen idiomática de inactividad. 'Cruza' expresa de manera natural en español la postura de manos inactivas sin perder la fuerza de la imagen corporal.
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus brazos
  - sus manos propias
  lexicon: HALOT
  rationale: יָד significa 'mano'; el plural con sufijo posesivo aquí se entiende naturalmente como 'sus manos'. Se conserva la concreción de la imagen.
- source_word: וְאֹכֵל
  english_pob_choice: and eats
  chosen_spanish: y come
  alternatives_spanish:
  - y está comiendo
  - así come
  lexicon: HALOT
  rationale: El participio hebreo continúa la descripción proverbial. 'Y come' mantiene el presente gnómico y suena natural en español.
- source_word: בְּשָׂרוֹ
  english_pob_choice: his own flesh
  chosen_spanish: su propia carne
  alternatives_spanish:
  - su carne
  - a sí mismo
  lexicon: HALOT
  rationale: בָּשָׂר significa literalmente 'carne'. En contexto es una metáfora de autodestrucción; 'su propia carne' conserva la imagen vívida y deja visible el paralelismo con la autoaniquilación causada por la necedad.
theological_decisions:
- issue: Fuerza metafórica de 'come su propia carne'
  english_pob_reading: Retain the literal metaphor in the main text as an image of self-destructive folly.
  chosen_spanish_reading: Conservar la metáfora literal en el texto principal como imagen de autodestrucción causada por la insensatez o la pereza.
  alternative_spanish_readings:
  - se destruye a sí mismo
  - se consume a sí mismo
  rationale: El hebreo presenta una metáfora corporal intensa; mantenerla evita reducir el texto a una explicación abstracta. La lectura interpretativa puede inferirse, pero no debe reemplazar la imagen original en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El pasaje coincide con la revisión actual sin cambios sustantivos; se mantiene el acuerdo alto del audit trail y la misma decisión principal de conservar la metáfora corporal con una expresión española natural.
  spanish_consistency_notes:
  - Se mantiene 'insensato' para כְּסִיל, en línea con el valor sapiencial del término.
  - '''Su propia carne'' conserva el paralelismo con el inglés auditado y la metáfora hebrea sin convertirla en paráfrasis.'
  - La nota a aclara la alternativa verbal hebrea sin imponer una lectura única.
  - La nota b explicita el sentido de autodestrucción preservando la imagen principal en el texto.
