translation:
  language: es
  text: Entonces todos los pueblos de la tierra verán que el nombre de Yahvé[a] ha sido proclamado sobre ti, y te temerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que tú eres llamado por el nombre de Yahvé». En hebreo, literalmente, el nombre de Yahvé «es llamado sobre ti», un modismo que expresa identificación y pertenencia pactual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאוּ
  english_pob_choice: Then ... will see
  chosen_spanish: Entonces ... verán
  alternatives_spanish:
  - Y ... verán
  - Y entonces ... verán
  lexicon: HALOT
  rationale: La forma con וְ introduce consecuencia en esta secuencia de bendición; «Entonces» conserva el valor resultativo mejor que un simple enlace copulativo y suena natural en español.
- source_word: כָּל עַמֵּי הָאָרֶץ
  english_pob_choice: all the peoples of the earth
  chosen_spanish: todos los pueblos de la tierra
  alternatives_spanish:
  - todas las naciones de la tierra
  - todos los pueblos del país
  lexicon: HALOT
  rationale: «Pueblos» refleja היטב עַמִּים y mantiene el matiz de múltiples colectivos. «Tierra» es preferible aquí a «país/land» por el alcance internacional del contexto.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que verán; en español, «que» expresa de manera directa esa cláusula completiva.
- source_word: שֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre de Yahweh
  - el nombre del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española proyectada por el POB, «Yahvé», en lugar de la sustitución tradicional «SEÑOR», para mantener la visibilidad del tetragrama.
- source_word: נִקְרָא עָלֶיךָ
  english_pob_choice: is called upon you
  chosen_spanish: es llamado sobre ti
  alternatives_spanish:
  - es invocado sobre ti
  - está puesto sobre ti
  - eres llamado por el nombre de Yahvé
  lexicon: HALOT
  rationale: La construcción pasiva con עַל se preserva de forma bastante literal para no borrar la imagen hebrea de pertenencia/identificación. «Sobre ti» conserva la preposición y la fuerza idiomática de marcación covenantal.
- source_word: וְיָרְאוּ מִמֶּךָּ
  english_pob_choice: and they will fear you
  chosen_spanish: y te temerán
  alternatives_spanish:
  - y tendrán temor de ti
  - y se asustarán de ti
  lexicon: HALOT
  rationale: «Temerán» reproduce el campo semántico de ירא sin reducirlo ni a pánico ni a reverencia exclusiva; el complemento con מן se expresa naturalmente con el objeto directo en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. La línea editorial del proyecto pide visibilizar el nombre del pacto; en español, «Yahvé» es la forma normativa adoptada para el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de נִקְרָא עָלֶיךָ
  english_pob_reading: the name of Yahweh is called upon you
  chosen_spanish_reading: el nombre de Yahvé es llamado sobre ti
  alternative_spanish_readings:
  - eres llamado por el nombre de Yahvé
  - el nombre de Yahvé es invocado sobre ti
  - el nombre de Yahvé se pronuncia sobre ti
  rationale: Se mantiene la imagen hebrea de un nombre colocado «sobre» la persona, porque expresa identificación pactual y pertenencia. La alternativa más idiomática en español podría suavizar la metáfora, pero aquí se preserva la tensión textual documentada.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés no introdujo cambios; el acuerdo de revisión fue alto y estable, así que el borrador español sigue de cerca la decisión auditada sobre el nombre divino, la construcción idiomática y el valor resultativo de la cláusula.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino, conforme al estándar del proyecto.
  - «Pueblos de la tierra» conserva el alcance universal del hebreo y evita el calco rígido «del país».
  - La metáfora de pertenencia en «es llamado sobre ti» se preserva para no perder el matiz pactual.
  - «Temerán» traduce el hebreo ירא sin forzar una explicación devocional ajena al texto.
