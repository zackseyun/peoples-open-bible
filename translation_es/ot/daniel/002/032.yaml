translation:
  language: es
  text: Aquella imagen[a]—su cabeza era de oro fino[b], su pecho y sus brazos de plata, su vientre y sus muslos de bronce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘estatua’. El arameo צַלְמָא puede denotar una imagen o una estatua.
    reason: lexical_alternative
  - marker: b
    text: 'O ‘oro bueno’ o ‘oro puro’. Literalmente: ‘oro bueno’, un modismo para oro de alta calidad.'
    reason: lexical_alternative
  - marker: c
    text: O ‘cobre’. El arameo נְחָשׁ a menudo se refiere al bronce en contexto, aunque la terminología antigua de metales puede solaparse.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַלְמָא
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - estatua
  lexicon: HALOT
  rationale: El término arameo puede significar ‘imagen’ o ‘estatua’. En español, ‘imagen’ es más amplio y conserva bien la referencia al objeto visto en el sueño; ‘estatua’ sigue siendo una alternativa válida, pero más específica.
- source_word: רֵאשֵׁהּ
  english_pob_choice: its head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - su cabeza
  lexicon: HALOT
  rationale: La equivalencia posesiva es directa y natural en español; ‘cabeza’ mantiene el sentido anatómico exacto del miembro de la figura.
- source_word: דִּי
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - que era
  - cuyo
  lexicon: HALOT
  rationale: Aquí la partícula relativa introduce la composición material de cada parte de la imagen. En español, ‘de’ expresa mejor esa relación genitiva que repetir una construcción relativa más pesada.
- source_word: דְהַב טָב
  english_pob_choice: fine gold
  chosen_spanish: oro fino
  alternatives_spanish:
  - oro bueno
  - oro puro
  lexicon: HALOT
  rationale: Tָב significa literalmente ‘bueno’, pero en contexto de metal precioso funciona como cualidad de excelencia. ‘Oro fino’ transmite naturalidad y valor sin convertirlo en una afirmación técnica de pureza que el texto no exige.
- source_word: חֲדוֹהִי
  english_pob_choice: its chest
  chosen_spanish: su pecho
  alternatives_spanish:
  - su torso
  - su pecho
  lexicon: HALOT
  rationale: El término señala la parte frontal superior del tronco. ‘Pecho’ es claro y idiomático en español; ‘torso’ sería más general y menos concreto.
- source_word: וּ/דְרָעוֹהִי
  english_pob_choice: its arms
  chosen_spanish: sus brazos
  alternatives_spanish:
  - sus brazos
  - sus brazos y manos
  lexicon: HALOT
  rationale: El plural arameo designa los brazos. ‘Brazos’ conserva el nivel anatómico del texto y evita ampliar indebidamente a ‘manos’.
- source_word: כְסַף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  lexicon: HALOT
  rationale: El sustantivo denota el metal plata de manera directa; no hay motivo contextual para variar la traducción.
- source_word: מְעוֹהִי
  english_pob_choice: its belly
  chosen_spanish: su vientre
  alternatives_spanish:
  - su vientre
  - su abdomen
  lexicon: HALOT
  rationale: Aunque ‘vientre’ y ‘abdomen’ son posibles, ‘vientre’ es más natural en una enumeración poética de partes del cuerpo y conserva el tono descriptivo del pasaje.
- source_word: יַרְכָתֵהּ
  english_pob_choice: its thighs
  chosen_spanish: sus muslos
  alternatives_spanish:
  - sus muslos
  - sus piernas
  - sus caderas
  lexicon: HALOT
  rationale: El término puede abarcar la zona del muslo o el flanco. En esta lista anatómica, ‘muslos’ es la opción más precisa y transparente en español.
- source_word: נְחָשׁ
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En listas metálicas bíblicas, el término suele referirse a ‘bronce’ en español. ‘Cobre’ es una alternativa posible, pero ‘bronce’ preserva mejor el valor convencional del conjunto.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y sin cambios necesarios; esta versión sigue de cerca el texto hebreo/arameo y la solución inglesa auditada, manteniendo las alternativas léxicas documentadas en notas.
  spanish_consistency_notes:
  - Se usó ‘imagen’ en el cuerpo principal, con nota alternativa ‘estatua’, para reflejar la amplitud semántica del arameo.
  - Se prefirió ‘oro fino’ por naturalidad y por reproducir el valor cualitativo de טָב sin sobrerinterpretar ‘pureza’.
  - Se mantuvo ‘bronce’ como término metalúrgico convencional, con nota para ‘cobre’ dada la superposición histórica posible.
  - La puntuación con guion largo reproduce el arranque enfático del inglés auditado y mejora la fluidez en español.
  - Se conservaron las posesiones con ‘su/sus’ para reflejar la secuencia de partes corporales vinculadas a la misma figura.
