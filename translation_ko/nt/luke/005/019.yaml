  yaml_path: translation/nt/luke/005/019.yaml
  text: And not finding a way to bring him in because of the crowd[a], they went up on the roof and lowered him with his mat through the tiles into the middle[c][b], in front of Jesus.
  footnotes:
  - marker: a
    text: Or 'not finding how to bring him in because of the crowd.' The Greek idiom can emphasize the manner or means as well as the access route.
    reason: lexical_alternative
  - marker: b
    text: That is, through the roof tiles. Luke's wording reflects a tiled roof structure.
    reason: cultural_note
  - marker: c
    text: Or 'with the little bed' or 'with the stretcher.' The Greek term refers to a small bed or sleeping mat.
    reason: lexical_alternative
