base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/012/020.yaml
  text: Then David got up from the ground[a], washed, anointed himself, and changed his clothes. He went into the house of Yahweh and bowed down. Then he went to his house, asked, and they set bread before him, and he ate.
  footnotes:
