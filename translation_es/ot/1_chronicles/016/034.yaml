translation:
  language: es
  text: Den gracias a Yahvé[a], porque él es bueno; porque su amor leal[b] perdura para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé»; se conserva el nombre divino según la práctica del proyecto para YHWH.'
    reason: alternative_reading
  - marker: b
    text: O «su fidelidad de pacto perdura para siempre». El hebreo חֶסֶד expresa amor leal con sentido de constancia y compromiso de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹד֤וּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Alaben
  - Exalten
  - Den alabanza
  lexicon: HALOT
  rationale: El imperativo plural de ידה en este uso litúrgico comunica acción de gratitud y alabanza. «Den gracias» conserva el valor idiomático sin volverlo mecánico ni perder el tono exhortativo.
- source_word: לַ/יהוָה֙
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvéh
  - al SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino propio como «Yahvé», conforme a la convención del proyecto para YHWH. La preposición hebrea exige en español un complemento natural con «a».
- source_word: כִּ֣י
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque / pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la exhortación. «Porque» expresa con claridad la relación causal en español y mantiene el paralelismo.
- source_word: ט֔וֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  - bueno
  lexicon: HALOT
  rationale: En este contexto predicativo, «bueno» es la equivalencia directa y más natural para la bondad moral y benéfica de Yahvé. Alternativas como «bondadoso» estrecharían el campo semántico.
- source_word: כִּ֥י
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque / pues
  lexicon: HALOT
  rationale: La segunda כִּי mantiene el encadenamiento explicativo del verso. Repetir «porque» conserva la cadencia y la estructura poética del hebreo.
- source_word: לְ/עוֹלָ֖ם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - para siempre
  lexicon: HALOT
  rationale: «Para siempre» es la forma más natural en español para expresar duración indefinida y estable. Conserva la fuerza temporal de לְעוֹלָם.
- source_word: חַסְדּֽ/וֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su amor fiel
  - su misericordia
  lexicon: HALOT
  rationale: «חֶסֶד» combina amor, lealtad y compromiso pactal. «Amor leal» preserva esa tensión sin reducir el término a mera emoción ni a una sola noción jurídica; también evita un calco demasiado técnico para el lector hispanohablante.
- source_word: לְ/עוֹלָ֖ם חַסְדּֽ/וֹ
  english_pob_choice: his steadfast love endures forever
  chosen_spanish: para siempre es su amor leal
  alternatives_spanish:
  - su amor leal es para siempre
  - su amor leal perdura para siempre
  - para siempre perdura su amor leal
  lexicon: HALOT
  rationale: El hebreo no expresa verbo explícito; en español se requiere una copula natural. La inversión «para siempre es su amor leal» mantiene la brevedad litúrgica y la idea de permanencia sin añadir más de lo que el texto indica.
theological_decisions:
- issue: Cómo verter el nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvéh
  - el SEÑOR
  rationale: Se sigue la directriz del proyecto de preservar el nombre divino en forma audible. En este verso no hay necesidad de ocultarlo bajo una sustitución devocional; «Yahvé» es la forma estable del texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cómo expresar חֶסֶד en un refrán litúrgico
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor constante
  - covenantal fidelity
  rationale: En un contexto de alabanza repetitiva, «amor leal» conserva el peso relacional y pactal de חֶסֶד. Evita diluir el término en «misericordia» y también evita una fórmula demasiado técnica que oscurezca su uso litúrgico.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El borrador sigue el consenso del audit trail inglés y no requiere revisión adicional según el último pase, que quedó sin cambios y con alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el nombre divino.
  - Se evita «SEÑOR» como máscara editorial, en armonía con la política del proyecto.
  - «Amor leal» se usa para חֶסֶד sin convertirlo en «misericordia», para no perder su dimensión de lealtad pactal.
  - 'La sintaxis breve y poética sigue la estructura del hebreo: exhortación + razón + razón + permanencia.'
