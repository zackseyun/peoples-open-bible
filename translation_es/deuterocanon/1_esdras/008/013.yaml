translation:
  language: es
  text: y llevar a Jerusalén dones para Yahvé[a], que tanto yo como mis amigos hemos prometido en voto, y todo el oro y la plata que se encuentre en la tierra de Babilonia para Yahvé en Jerusalén[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dones» puede entenderse también como «ofrendas»; el griego admite un sentido cultual en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'La frase final es breve en griego: literalmente, «para Yahvé en Jerusalén». El sentido es que los recursos están destinados al servicio de Yahvé allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπενεγκεῖν
  english_pob_choice: to bring
  chosen_spanish: llevar
  alternatives_spanish:
  - traer
  - conducir
  lexicon: LSJ
  rationale: El infinitivo expresa movimiento hacia un destino. En español, «llevar» comunica naturalmente la acción de transportar algo a Jerusalén sin perder la dirección del verbo griego.
- source_word: δῶρα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - ofrendas
  - regalos
  lexicon: LSJ
  rationale: «Dones» mantiene el valor amplio del término y evita cerrar demasiado pronto el sentido a un tecnicismo sacrificial. El contexto cultual sigue presente por la mención de Yahvé.
- source_word: τῷ κυρίῳ
  english_pob_choice: for the Lord
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el Señor
  - al Señor
  lexicon: LSJ
  rationale: En esta serie se sigue el criterio del proyecto de traducir el nombre divino por «Yahvé» en el texto principal. La forma dativa se expresa con «para», porque los dones están destinados a su servicio.
- source_word: ἃ ηὔξαμην
  english_pob_choice: which ... have vowed
  chosen_spanish: que yo y mis amigos hemos prometido
  alternatives_spanish:
  - que yo y mis amigos hemos votado
  - que yo y mis amigos hemos hecho voto de
  lexicon: LSJ
  rationale: El verbo medio puede tener fuerza de voto o promesa. En español, «hemos prometido» conserva la idea de compromiso asumido sin introducir un tecnicismo poco natural; el matiz votivo queda reflejado en la nota si se necesita distinguirlo.
- source_word: οἱ φίλοι
  english_pob_choice: my friends
  chosen_spanish: mis amigos
  alternatives_spanish:
  - mis compañeros
  - mis allegados
  lexicon: LSJ
  rationale: El griego dice simplemente «amigos». No hay base textual suficiente para especificar una categoría administrativa o cortesana.
- source_word: πᾶν χρυσίον καὶ ἀργύριον
  english_pob_choice: all the gold and silver
  chosen_spanish: todo el oro y la plata
  alternatives_spanish:
  - todo oro y plata
  - todo el oro y la plata
  lexicon: LSJ
  rationale: La frase indica la totalidad de los metales preciosos disponibles. «Todo el oro y la plata» es natural en español y conserva la amplitud de πᾶν.
- source_word: ὃ ἐὰν εὑρεθῇ
  english_pob_choice: that may be found
  chosen_spanish: que se encuentre
  alternatives_spanish:
  - que pudiera encontrarse
  - lo que se encuentre
  lexicon: LSJ
  rationale: La construcción relativa indefinida con subjuntivo expresa contingencia general. «Que se encuentre» mantiene esa apertura de manera clara y fluida.
- source_word: ἐν τῇ χώρᾳ τῆς Βαβυλωνίας
  english_pob_choice: in the land of Babylonia
  chosen_spanish: en la tierra de Babilonia
  alternatives_spanish:
  - en la tierra de Babilonia
  - en la región de Babilonia
  lexicon: LSJ
  rationale: «Χώρα» puede ser tierra, región o país. Dado el paralelismo con el contexto histórico, «tierra de Babilonia» suena natural y preserva el ámbito geográfico amplio.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - para Jerusalén
  lexicon: LSJ
  rationale: La preposición de dirección se rinde de forma normal con «a Jerusalén».
- source_word: τῷ κυρίῳ εἰς Ἰερουσαλήμ
  english_pob_choice: for the Lord in Jerusalem
  chosen_spanish: para Yahvé en Jerusalén
  alternatives_spanish:
  - para Yahvé, en Jerusalén
  - para Yahvé, hacia Jerusalén
  lexicon: LSJ
  rationale: La frase final es comprimida en griego. Se mantiene la relación cultual y el destino geográfico sin sobredeterminar la sintaxis más allá de lo que el original permite.
theological_decisions:
- issue: Render of κύριος in a Jewish-scriptural context
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El proyecto pide usar «Yahvé» en el texto principal para יהוה/κύριος cuando el referente es el Dios de Israel. Aquí el contexto de Jerusalén y los dones votivos hace claro que se trata del Dios de Israel, no de un superior humano.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / κύριος → Yahvé'
- issue: Cultic force of δῶρα and ηὔξαμην
  english_pob_reading: gifts ... have vowed
  chosen_spanish_reading: dones ... hemos prometido
  alternative_spanish_readings:
  - ofrendas ... hemos prometido
  - dones ... hemos hecho voto de
  rationale: El verso habla de recursos dedicados a Dios para Jerusalén. «Dones» conserva amplitud y «hemos prometido» comunica el compromiso asumido; el posible matiz de voto queda implícito sin forzar una formulación demasiado técnica.
  doctrine_reference: POB lexical policy on cultic dedication language
translation_notes:
  revision_awareness: El texto griego base y el audit trail inglés muestran alta concordancia; no se registraron revisiones sustantivas en la pasada más reciente, por lo que la draft española sigue de cerca el sentido del original sin necesidad de ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se evitó «Cristo» y cualquier terminología cristianizada ajena al pasaje.
  - 'La sintaxis española conserva dos miembros coordinados: los dones votivos y todo el oro/plata disponible.'
  - La nota sobre la frase final preserva la compresión del griego sin expandirla indebidamente.
