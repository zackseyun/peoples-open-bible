  text: Pero tú estás en lo alto para siempre, oh Yahvé.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Y tú, en cambio
  lexicon: HALOT
  rationale: El וְ inicial funciona aquí con valor adversativo por contraste con el destino de los impíos en el contexto inmediato. En español, «Pero tú» conserva mejor ese giro que una simple suma con «Y tú».
- source_word: מָרוֹם
  english_pob_choice: on high
  chosen_spanish: sublime
  alternatives_spanish:
  - en lo alto
  - en las alturas
  - exaltado
  lexicon: HALOT
  rationale: El sustantivo expresa altura/exaltación. Dado que en español «eres en lo alto» suena poco natural, «sublime» comunica la elevación permanente de Yahvé sin perder el sentido de eminencia; aun así, se conserva en nota la posibilidad más literal de «en lo alto».
- source_word: לְ/עֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para toda la eternidad
  lexicon: HALOT
  rationale: La expresión indica permanencia continua. «Para siempre» es la forma natural y digna en español para este valor temporal.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - Yahvé
  - oh YHWH
  - oh el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, y se añade la interjección vocativa «oh» porque el hebreo dirige la frase a la segunda persona con apelación directa.
theological_decisions:
- issue: Nombre divino en vocativo directo
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - oh el SEÑOR
  - oh Jehová
  rationale: El hebreo contiene יְהוָה en dirección de segunda persona. En español, el vocativo «oh» refleja la apelación directa sin sustituir el nombre propio por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor semántico de מָרוֹם
  english_pob_reading: on high
  chosen_spanish_reading: sublime
  alternative_spanish_readings:
  - en lo alto
  - exaltado
  - en las alturas
  rationale: El término hebreo expresa altura/exaltación, no sólo ubicación espacial. «Sublime» preserva la dimensión de elevación permanente y resulta idiomático en español, aunque el matiz espacial queda documentado como alternativa.
  doctrine_reference: 'HALOT: מָרוֹם — height, exalted place/state'
translation_notes:
  revision_awareness: El texto inglés POB revisado quedó sin cambios en el último pase, con consenso alto. La presente propuesta sigue el mismo análisis de contraste, duración e invocación divina, pero adapta el sustantivo hebreo מָרוֹם a un español idiomático sin perder la noción de altura/exaltación.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se conserva el contraste adversativo inicial con «Pero».
  - La nota[a] marca la alternativa más literal de «en lo alto» para transparentar el valor de מָרוֹם.
