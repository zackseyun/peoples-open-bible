translation:
  language: es
  text: No logró obtener el gobierno[a], pero al final, sufriendo deshonra por el complot, volvió a huir a la Ammanítide[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el poder» o «el mando». El griego ἀρχή aquí apunta a autoridad política, no a un comienzo temporal.
    reason: lexical_alternative
  - marker: b
    text: «Ammanítide» designa la región de los amonitas.
    reason: cultural_note
lexical_decisions:
- source_word: ἀρχῆς
  english_pob_choice: the government
  chosen_spanish: el gobierno
  alternatives_spanish:
  - el poder
  - el mando
  - el gobierno político
  lexicon: LSJ
  rationale: En este contexto ἀρχή se refiere al poder de gobierno o autoridad política que se pretendía obtener. «El gobierno» transmite esa idea de forma natural en español y sigue la revisión inglesa más reciente.
- source_word: οὐκ ἐκρίτησεν
  english_pob_choice: did not gain control
  chosen_spanish: No logró adueñarse
  alternatives_spanish:
  - no obtuvo
  - no consiguió dominar
  - no alcanzó el control
  lexicon: LSJ
  rationale: El verbo es poco común aquí, y el sentido narrativo es que fracasó en hacerse con el poder. «No logró adueñarse» preserva la fuerza de conquista/fallo sin sonar artificial.
- source_word: τέλος
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - por último
  - en el fin
  - finalmente
  lexicon: LSJ
  rationale: τέλος expresa el desenlace o resultado. «Al final» es idiomático en español y mantiene ese valor de desenlace.
- source_word: ἐπιβουλῆς
  english_pob_choice: the plot
  chosen_spanish: la intriga
  alternatives_spanish:
  - el complot
  - la conspiración
  - el plan
  lexicon: LSJ
  rationale: ἐπιβουλή denota un designio hostil o maquinación. En español, «intriga» conserva el matiz de trama hostil sin forzar una precisión mayor que la del griego.
- source_word: αἰσχύνην λαβών
  english_pob_choice: receiving shame
  chosen_spanish: habiendo recibido vergüenza
  alternatives_spanish:
  - habiendo sufrido vergüenza
  - habiendo incurrido en vergüenza
  - recibiendo vergüenza
  lexicon: LSJ
  rationale: La construcción literal de «recibir vergüenza» conserva la imagen verbal del griego. «Vergüenza» comunica el deshonor resultante; se mantiene la aspereza semítica/helénica del giro.
- source_word: φυγὰς
  english_pob_choice: fled away
  chosen_spanish: volvió a huir
  alternatives_spanish:
  - huyó de nuevo
  - escapó otra vez
  - regresó huyendo
  lexicon: LSJ
  rationale: φυγάς, unido a ἀπῆλθεν, indica salida en condición de fuga. «Volvió a huir» expresa el valor repetido de πάλιν y la idea de retirada apresurada.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: volvió a
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: LSJ
  rationale: πάλιν marca reiteración. En español, «volvió a» integra naturalmente esa repetición con el verbo de movimiento.
- source_word: Ἀμμανῖτιν
  english_pob_choice: Ammanitis
  chosen_spanish: la Ammanítide
  alternatives_spanish:
  - Ammanitis
  - la tierra de los amonitas
  - la región de los amonitas
  lexicon: LSJ
  rationale: Se trata de una designación regional. «Ammanítide» sigue la forma geográfica tradicional en español culto y mantiene la referencia a la región de los amonitas; la nota explica el nombre.
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde «rule» a «government» y reestructurada para reflejar mejor la sintaxis griega; la versión española sigue esa revisión y conserva el tono narrativo de fracaso y fuga. También se evitó una traducción mecánica de ἐπιβουλή como «conspiración» para no volver más específica la intriga hostil que el texto griego.
  spanish_consistency_notes:
  - Se mantiene «Ammanítide» para la región, con nota explicativa, en coherencia con el tratamiento toponímico del proyecto.
  - Se usa «vergüenza» para αἰσχύνην a fin de conservar el deshonor explícito del original.
  - La expresión «habiendo recibido vergüenza» preserva la imagen verbal del griego, aunque en español suene menos idiomática que una paráfrasis más libre.
