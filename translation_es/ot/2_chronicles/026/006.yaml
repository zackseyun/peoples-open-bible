translation:
  language: es
  text: Salió y peleó contra los filisteos, y derribó[a] la muralla de Gat, la muralla de Jabne y la muralla de Asdod[b]; y edificó ciudades en la región de Asdod y entre los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘abrió brecha en’ o ‘derribó’ la muralla de Gat, la muralla de Jabne y la muralla de Asdod.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘en Asdod y entre los filisteos’; ‘Asdod’ puede referirse a la ciudad o a su región circundante.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: He went out
  chosen_spanish: Salió
  alternatives_spanish:
  - Fue
  - Salió al combate
  lexicon: HALOT
  rationale: יצא expresa la acción básica de salir; en español, ‘salió’ conserva la secuencia narrativa sin añadir una imagen militar que ya queda clara por el verbo siguiente.
- source_word: וַיִּלָּחֶם
  english_pob_choice: fought against
  chosen_spanish: peleó contra
  alternatives_spanish:
  - luchó contra
  - hizo guerra contra
  lexicon: HALOT
  rationale: El verbo implica combate hostil; ‘peleó contra’ es natural en español y mantiene la relación adversativa del hebreo.
- source_word: בַּפְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - Filistea
  - el pueblo filisteo
  lexicon: HALOT
  rationale: El hebreo usa el gentilicio/pueblo, no un nombre territorial; por eso se mantiene ‘los filisteos’.
- source_word: וַיִּפְרֹץ
  english_pob_choice: broke down
  chosen_spanish: derribó
  alternatives_spanish:
  - abrió brecha en
  - rompió
  lexicon: HALOT
  rationale: Con objeto ‘muralla’, פרץ comunica demolición o apertura violenta; ‘derribó’ recoge bien la idea de desmontar/abatir la fortificación en un español claro y natural.
- source_word: חוֹמַת
  english_pob_choice: the wall of
  chosen_spanish: la muralla de
  alternatives_spanish:
  - el muro de
  - la pared de
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘la muralla de’, en español ‘muralla’ transmite mejor la fortificación urbana que ‘muro’ o ‘pared’.
- source_word: גַּת
  english_pob_choice: Gath
  chosen_spanish: Gat
  alternatives_spanish:
  - Gath
  lexicon: N/A
  rationale: Se mantiene la transliteración habitual al español de la ciudad filistea.
- source_word: יַבְנֶה
  english_pob_choice: Jabneh
  chosen_spanish: Jabne
  alternatives_spanish:
  - Yabne
  - Jamnia
  lexicon: N/A
  rationale: Se conserva una transliteración directa del hebreo; ‘Jamnia’ depende de la tradición griega y se evita por no ser la forma base hebrea.
- source_word: אַשְׁדּוֹד
  english_pob_choice: Ashdod
  chosen_spanish: Asdod
  alternatives_spanish:
  - Ashdod
  lexicon: N/A
  rationale: Se usa la forma española habitual del topónimo.
- source_word: וַיִּבְנֶה עָרִים
  english_pob_choice: he built cities
  chosen_spanish: edificó ciudades
  alternatives_spanish:
  - construyó ciudades
  - levantó ciudades
  lexicon: HALOT
  rationale: בנה significa ‘construir/edificar’; ‘edificó’ es digno y fiel al acto de fundar o construir asentamientos.
- source_word: בְּאַשְׁדּוֹד
  english_pob_choice: in the territory of Ashdod
  chosen_spanish: en la región de Asdod
  alternatives_spanish:
  - en Asdod
  - en el territorio de Asdod
  lexicon: HALOT
  rationale: El contexto sugiere una zona asociada a Asdod, no necesariamente la ciudad misma; ‘región’ evita la ambigüedad de ubicar varias ciudades dentro de una sola ciudad.
- source_word: וּבַפְּלִשְׁתִּים
  english_pob_choice: among the Philistines
  chosen_spanish: entre los filisteos
  alternatives_spanish:
  - en Filistea
  - en la tierra de los filisteos
  lexicon: HALOT
  rationale: La forma sigue siendo el pueblo, no un territorio; ‘entre’ preserva esa referencia social/geográfica sin convertirla de manera rígida en un nombre de país.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: para וַיִּפְרֹץ se adopta un verbo más natural y preciso para murallas fortificadas, equivalente al último pass revisado (‘broke down’). No se añaden elementos no sustentados por el hebreo.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma POB general cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - 'Se usan topónimos españoles consistentes: Gat, Jabne y Asdod.'
  - Se conserva ‘filisteos’ como pueblo y se evita territorializar salvo en la nota de Asdod, siguiendo el contexto del hebreo.
  - ‘Muralla’ se emplea de modo uniforme para חוֹמַת, preservando el singular constructo de cada ciudad.
