translation:
  language: es
  text: Se levantó de su sueño[a], y bendijo el nombre del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se levantó de su sueño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξανέστη
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  - despertó
  lexicon: BDAG
  rationale: El verbo griego puede expresar ‘levantarse’ o ‘ponerse en pie’. En este contexto, unido a ‘de su sueño’, el español natural y fiel es ‘se levantó’. Evita forzar ‘despertó’, que en español sugiere más directamente el acto de dejar de dormir que el movimiento expresado por el verbo.
- source_word: ἐξ ὕπνου
  english_pob_choice: from his sleep
  chosen_spanish: de su sueño
  alternatives_spanish:
  - de su dormir
  - del sueño
  lexicon: BDAG
  rationale: ὕπνου significa literalmente ‘sueño’. ‘De su sueño’ es claro, digno y corresponde al giro bíblico del texto sin añadir matices extra.
- source_word: ἐυλόγησεν
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - dio bendición
  lexicon: BDAG
  rationale: En relación con el nombre divino, ‘bendijo’ preserva el registro bíblico y la fuerza reverente del verbo mejor que ‘alabó’, que sería más explicativo y menos preciso aquí.
- source_word: τῷ ὀνόματι Κυρίου
  english_pob_choice: the name of the Lord
  chosen_spanish: el nombre del Señor
  alternatives_spanish:
  - el nombre del Señor Dios
  - el nombre del Señor
  lexicon: BDAG
  rationale: Se conserva la fórmula estable ‘el nombre del Señor’ para reflejar la construcción griega y el uso bíblico. ‘Señor’ mantiene la convención del contexto litúrgico y del audit trail inglés para κύριος.
theological_decisions:
- issue: Renderización de κύριος en una fórmula de bendición
  english_pob_reading: the name of the Lord
  chosen_spanish_reading: el nombre del Señor
  alternative_spanish_readings:
  - el nombre de Yahvé
  - el nombre del Señor Dios
  rationale: Aunque el proyecto suele usar ‘Yahvé’ para יהוה, aquí la fuente griega dice Κυρίου y la formulación inglesa auditada conserva ‘Lord’. En una doxología breve, ‘el Señor’ es la equivalencia española más natural y sigue la evidencia griega sin sobrecargar el verso con una reconstrucción no explícita.
  doctrine_reference: Salmo/uso doxológico del nombre divino; fidelidad a κύριος en cita o fórmula reverente
translation_notes:
  revision_awareness: 'El audit trail inglés revisó ‘woke’ a ‘rose’ para acercarse más a ἐξανέστη sin perder naturalidad. La versión española sigue esa misma decisión: ‘se levantó’ reproduce el matiz de levantarse/ponerse en pie y mantiene la fluidez del castellano. No se detectan tensiones textuales adicionales en el fragmento.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno.
  - ‘Señor’ se usa aquí por corresponder al griego κύριος en la fórmula transmitida y por coherencia con la breve doxología.
  - La nota alternativa se ancla en el verbo principal para reflejar la pequeña oscilación semántica entre ‘levantarse’ y ‘despertar’.
