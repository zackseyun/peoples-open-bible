translation:
  language: es
  text: 'Y sucedió[a] que, al ver los comandantes de los carros a Josafat, dijeron: «¡Ciertamente él es el rey de Israel!». Entonces se volvieron contra él para pelear[b], pero Josafat gritó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aconteció». La fórmula narrativa hebrea introduce el episodio sin añadir interpretación.
    reason: alternative_reading
  - marker: b
    text: O «se apartaron contra él para pelear» o «se volvieron contra él para atacarlo». El verbo hebreo puede expresar volverse o desviarse hacia alguien con intención hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: Mantiene la fórmula narrativa hebrea sin caer en un calco arcaizante; «sucedió» conserva el arranque de secuencia y el tono de relato histórico.
- source_word: כִּרְאוֹת
  english_pob_choice: when ... saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - en cuanto vieron
  lexicon: HALOT
  rationale: El infinitivo constructo expresa una relación temporal inmediata; «al ver» es natural en español y preserva la simultaneidad/secuencia del hecho.
- source_word: שָׂרֵי הָרֶכֶב
  english_pob_choice: the commanders of the chariots
  chosen_spanish: los comandantes de los carros
  alternatives_spanish:
  - los capitanes de los carros
  - los comandantes de los carros de guerra
  - los jefes de los carros
  lexicon: HALOT
  rationale: שָׂרֵי designa oficiales o jefes militares; «comandantes» comunica ese rango. «Carros» refleja הָרֶכֶב con una forma española clara y bíblica, sin oscurecer el referente militar.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - De veras
  lexicon: HALOT
  rationale: Aquí marca una identificación afirmada con seguridad, no restricción; «ciertamente» transmite la convicción de los que hablan.
- source_word: מֶלֶךְ יִשְׂרָאֵל הוּא
  english_pob_choice: he is the king of Israel
  chosen_spanish: él es el rey de Israel
  alternatives_spanish:
  - es el rey de Israel
  - se trata del rey de Israel
  lexicon: HALOT
  rationale: Conserva el pronombre masculino del hebreo y la identificación errónea de Josafat. En español, «él es» resulta más directo que una identificación impersonal.
- source_word: וַיָּסֻרוּ עָלָיו
  english_pob_choice: they turned aside against him
  chosen_spanish: se apartaron contra él
  alternatives_spanish:
  - se volvieron contra él
  - giraron contra él
  - se desviaron contra él
  lexicon: HALOT
  rationale: סור con עַל puede implicar girarse o desviarse en dirección hostil. «Se apartaron contra él» conserva la noción de apartarse/dirigirse hacia un blanco hostil, sin borrar la tensión léxica entre “girar” y “atacar” documentada en el POB inglés.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para pelear
  alternatives_spanish:
  - para luchar
  - para combatir
  - para atacar
  lexicon: HALOT
  rationale: El infinitivo indica entrar en combate; «pelear» es idiomático y suficientemente amplio. «Combatir» sería más formal, y «atacar» estrecharía el sentido hacia la ofensiva.
- source_word: וַיִּזְעַק
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - dio un grito
  - exclamó
  lexicon: HALOT
  rationale: זעק denota un grito fuerte, a menudo de angustia o urgencia. «Gritó» comunica bien la intensidad sin introducir contenido no presente en el versículo.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del POB inglés que corrige la referencia natural a Jehosafat («él es») y conserva con precisión el matiz de סור en una dirección hostil. Se evita el calco mecánico y se mantiene la tensión léxica entre ‘apartarse’ y el sentido de ataque sugerido por el contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no figura.
  - Se mantiene «Josafat» como forma española estable del nombre propio.
  - «Comandantes» y «carros» son consistentes con el registro bíblico narrativo y con la lectura militar del contexto.
  - El marcador [a] se ancla en la fórmula inicial; el marcador [b] se ancla en la cláusula de movimiento hostil.
