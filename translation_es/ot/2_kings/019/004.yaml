base_translation:
  language: en
  yaml_path: translation/ot/2_kings/019/004.yaml
  text: Perhaps Yahweh your God will hear all the words of the Rabshakeh[a], whom his master the king of Assyria has sent to mock the living God, and will rebuke the words that Yahweh your God has heard[c][b]. Therefore lift up a prayer for the remnant that remains.
  footnotes:
  - marker: a
    text: Rabshakeh is likely an Assyrian official title; alternatively, 'chief cupbearer' is sometimes proposed.
    reason: cultural_note
  - marker: b
    text: Or 'to reproach,' 'to defy,' or 'to taunt' the living God.
    reason: lexical_alternative
  - marker: c
    text: Or 'offer a prayer' or simply 'pray.' The Hebrew idiom is literally 'lift up a prayer.'
    reason: lexical_alternative
