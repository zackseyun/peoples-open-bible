revisions:
- from: Seis días se podrá hacer trabajo[a], pero en el séptimo día habrá un sábado de completo reposo, santo para Yahvé. Cualquiera que haga trabajo en el día de sábado ciertamente morirá.
  to: Seis días se puede trabajar,[a] pero el séptimo día es un sábado de completo reposo, santo para Yahvé. Cualquiera que trabaje en el día de sábado ciertamente será puesto a muerte.
  rationale: Se ajusta la redacción para mejorar la naturalidad del español sin perder el marco legal del hebreo. Se conserva 'Yahvé' según la política del proyecto y 'sábado de completo reposo' para reflejar la intensificación de שבת שבתון. La corrección principal es 'ciertamente será puesto a muerte', que sí preserva la fuerza penal pasiva de מוֹת יוּמָת. También se suavizan calcos poco idiomáticos como 'en el séptimo día' y 'se podrá hacer trabajo'.
  reviewer_model: gpt-5.4
