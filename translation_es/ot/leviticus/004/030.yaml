translation:
  language: es
  text: Y el sacerdote tomará [a] parte de su sangre con su dedo y la pondrá sobre los cuernos[b] del altar del holocausto, y derramará toda su sangre[c] en la base del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “de su sangre”. El hebreo dice literalmente “de su sangre”, con sentido partitivo: el sacerdote toma una porción para aplicarla al altar.'
    reason: lexical_alternative
  - marker: b
    text: Los “cuernos” del altar son las protuberancias semejantes a cuernos en sus esquinas.
    reason: cultural_note
  - marker: c
    text: Aunque aquí se dice “toda su sangre”, la secuencia implica que la sangre restante se derrama después de aplicar una porción con el dedo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: shall take
  chosen_spanish: tomará
  alternatives_spanish:
  - tomará entonces
  - tomará para sí
  lexicon: HALOT
  rationale: En una instrucción ritual, el qatal con waw tiene fuerza normativa; en español, el futuro simple comunica mejor el valor prescriptivo que un pasado narrativo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: En español bíblico actual, 'sacerdote' es claro y natural para el oficiante cultual; se evita una paráfrasis innecesaria.
- source_word: מִדָּמָהּ
  english_pob_choice: some of its blood
  chosen_spanish: algo de su sangre
  alternatives_spanish:
  - parte de su sangre
  - de su sangre
  lexicon: HALOT
  rationale: La preposición מִן con sangre aquí es partitiva. 'Algo de su sangre' conserva ese matiz sin forzar una formulación demasiado técnica.
- source_word: בְּאֶצְבָּעוֹ
  english_pob_choice: with his finger
  chosen_spanish: con su dedo
  alternatives_spanish:
  - con el dedo
  - por medio de su dedo
  lexicon: HALOT
  rationale: El sentido instrumental de בְּ se expresa naturalmente con 'con'. 'Dedo' mantiene la concreción del gesto ritual.
- source_word: וְנָתַן
  english_pob_choice: and put
  chosen_spanish: la pondrá
  alternatives_spanish:
  - la aplicará
  - la colocará
  lexicon: HALOT
  rationale: '''Poner'' en español transmite el acto de depositar o aplicar la sangre sin añadir una interpretación más técnica que el hebreo no exige.'
- source_word: עַל קַרְנֹת מִזְבַּח הָעֹלָה
  english_pob_choice: on the horns of the altar of burnt offering
  chosen_spanish: sobre los cuernos del altar del holocausto
  alternatives_spanish:
  - sobre los cuernos del altar para el holocausto
  - sobre las puntas del altar del holocausto
  lexicon: HALOT
  rationale: Se conserva 'cuernos' de forma literal para el término cultual; 'altar del holocausto' refleja el tipo de altar, siguiendo el valor tradicional del sacrificio por holocausto.
- source_word: וְאֶת כָּל דָּמָהּ
  english_pob_choice: and ... all its blood
  chosen_spanish: toda su sangre
  alternatives_spanish:
  - el resto de su sangre
  - toda la sangre
  lexicon: HALOT
  rationale: Aunque el sentido práctico es que se derrama la porción restante después de la aplicación ritual, el hebreo dice 'toda su sangre'. En español puede mantenerse 'toda' sin explicitar 'resto' en el texto principal.
- source_word: יִשְׁפֹּךְ
  english_pob_choice: he shall pour out
  chosen_spanish: derramará
  alternatives_spanish:
  - vertirá
  - vaciará
  lexicon: HALOT
  rationale: '''Derramar'' es el equivalente natural y ritualmente claro para שׁפך en este contexto sacrificial.'
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  english_pob_choice: at the base of the altar
  chosen_spanish: en la base del altar
  alternatives_spanish:
  - junto a la base del altar
  - sobre la base del altar
  lexicon: HALOT
  rationale: '''Base'' conserva el valor de יסוד y suena más natural que ''fundamento'' en contexto de altar. ''En'' funciona bien en español para la ubicación ritual.'
theological_decisions:
- issue: Aspecto verbal normativo en instrucción ritual
  english_pob_reading: Rendered the sequence as prescriptive ('shall take ... shall pour out')
  chosen_spanish_reading: Se traduce con futuro simple normativo ('tomará ... pondrá ... derramará')
  alternative_spanish_readings:
  - pasado narrativo ('tomó ... puso ... derramó')
  rationale: Aunque la forma hebrea puede parecer narrativa, el contexto legislativo-sacrificial pide una lectura normativa. El futuro simple en español transmite mejor la instrucción ritual.
  doctrine_reference: Translation philosophy §1, §6
- issue: Terminología cultual de los cuernos del altar
  english_pob_reading: Preserved 'horns' literally
  chosen_spanish_reading: Se conserva 'cuernos' literalmente
  alternative_spanish_readings:
  - '''puntas'''
  - '''proyecciones'''
  rationale: El término tiene peso cultual y simbólico; conservarlo evita borrar una imagen ritual específica que el texto hebreo mantiene.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tensión entre 'algo de su sangre' y 'toda su sangre'
  english_pob_reading: Some blood is taken and then 'all its blood' is poured out
  chosen_spanish_reading: Se mantiene la misma tensión con 'algo de su sangre' y 'toda su sangre'
  alternative_spanish_readings:
  - '''el resto de su sangre'' en el texto principal'
  rationale: El hebreo dice literalmente 'de su sangre' y luego 'toda su sangre'. El español debe conservar ambas expresiones sin resolver demasiado la relación interna, dejando la secuencia ritual como la presenta el texto.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo masorético y coincide con el auditorio inglés de la POB: mantiene el valor partitivo de מִן, conserva literalmente los “cuernos” del altar y refleja la lectura normativa del tiempo verbal en una instrucción ritual. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se usa 'sacerdote' en lugar de 'cura' o 'pontífice' por neutralidad y claridad bíblica.
  - Se usa 'holocausto' para הָעֹלָה siguiendo el término sacrificial tradicional y comprensible en español eclesial.
  - Se conserva 'cuernos' por consistencia con el término cultual y con el tratamiento auditado en inglés.
