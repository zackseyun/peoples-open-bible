revisions:
- from: El que había expatriado a muchos de su patria pereció en tierra extraña, habiendo ido a los lacedemonios[a], como si fuera a obtener protección[b] por causa de la parentela.
  to: El que había desterrado a muchos de su patria pereció en tierra extraña, habiendo ido a los lacedemonios[a], como si fuera a obtener protección por causa del parentesco[b].
  rationale: Se reemplaza ‘expatriado’ por ‘desterrado’ para lograr un español más natural y claro sin perder la idea de expulsión de la patria; se cambia ‘parentela’ por ‘parentesco’ por mayor precisión léxica para συγγένεια y mejor adecuación al rationale del audit trail. Se mantiene ‘lacedemonios’, ‘pereció’ y ‘tierra extraña’ por buena fidelidad al griego y al POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:54:43Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura global del griego: el sujeto participial, el contraste patria/tierra extraña, el destino hacia los lacedemonios y la expectativa de hallar protección por la συγγένεια. Sin embargo, dos elecciones atenúan o desvían el sentido documentado: “expatriado” suena menos natural y menos claramente causativo que el audit trail inglés ‘had made … exiles’, y “parentela” no es la mejor equivalencia para συγγένεια en español bíblico general; ‘parentesco’ preserva mejor la relación de kinship sin matiz coloquial o de grupo familiar amplio.'
  spanish_quality_summary: El texto es mayormente legible, pero “expatriado a muchos de su patria” resulta algo forzado en español; “había hecho exiliados/lejos de su patria” tampoco sería ideal, por lo que “había desterrado a muchos de su patria” o “había expulsado…” serían opciones más naturales. Dado el audit trail, ‘desterrado’ comunica bien la expulsión de la patria en registro digno. También conviene ajustar la nota b para corresponder a ‘parentesco’.
  glossary_alignment: No hay términos del glosario maestro en conflicto directo. La principal cuestión léxica es συγγένεια, mejor como ‘parentesco’ que ‘parentela’. ‘Lacedemonios’ concuerda con la decisión POB y mantiene la alternativa ‘espartanos’ en nota. ‘Pereció’ y ‘tierra extraña’ están bien alineados con el rationale documentado.
  issues:
  - severity: medium
    issue: “había expatriado a muchos de su patria” suena poco natural y algo opaco en español
    rationale: Aunque ἀποξενώσας implica hacer extraños/expulsar de la patria, ‘expatriar’ en español moderno suele usarse más en voz pasiva/reflexiva o en registros administrativos. Aquí no transmite con suficiente claridad la acción de forzar a otros fuera de su tierra. ‘Había desterrado a muchos de su patria’ es más idiomático y conserva la fuerza del contexto.
  - severity: medium
    issue: “parentela” no refleja tan bien συγγένεια como ‘parentesco’
    rationale: ‘Parentela’ puede sonar coloquial o referirse al conjunto de parientes, mientras que συγγένεια aquí apunta a kinship/relación de parentesco como base diplomática. ‘Parentesco’ es más preciso, claro y apto para el trasfondo histórico señalado en la nota.
  - severity: low
    issue: La nota b debe armonizarse con el término elegido en el texto principal
    rationale: Si se sustituye ‘parentela’ por ‘parentesco’, la nota debe citar la misma palabra para evitar desajuste terminológico.
  revised_spanish_text: El que había desterrado a muchos de su patria pereció en tierra extraña, habiendo ido a los lacedemonios[a], como si fuera a obtener protección por causa del parentesco[b].
