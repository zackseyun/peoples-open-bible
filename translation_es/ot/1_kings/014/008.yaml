revisions:
- from: y rasgué el reino de la casa de David y te lo di a ti. Pero no has sido como mi esclavo David, que guardó mis mandamientos y que anduvo tras de mí con todo su corazón, para hacer solo lo recto[a] ante mis ojos.
  to: y arranqué el reino de la casa de David y te lo di. Pero no has sido como mi siervo David, que guardó mis mandamientos y que anduvo tras de mí[a] con todo su corazón, para hacer solo lo recto ante mis ojos.
  rationale: Se corrige 'esclavo' a 'siervo' conforme a la decisión léxica y teológica ya auditada para este contexto davidico. Se reubica la nota al pie al sintagma que realmente explica, y se ajusta su alternativa a un español natural. También se mejora la naturalidad de קרע con 'arranqué' y se elimina el énfasis innecesario de 'a ti', sin alterar el sentido del original.
  reviewer_model: gpt-5.4
