translation:
  language: es
  text: 'Y había quienes decían: «Hemos pedido prestado dinero[a] para el impuesto del rey[b], por nuestros campos y nuestras viñas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «plata»; es decir, dinero.
    reason: lexical_alternative
  - marker: b
    text: O «tributo del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ
  english_pob_choice: And there were
  chosen_spanish: Y había
  alternatives_spanish:
  - Y había algunos
  - Y estaban
  lexicon: HALOT
  rationale: El hebreo introduce de forma existencial a un nuevo grupo dentro de la queja. En español, «Y había» conserva ese valor sin sonar forzado.
- source_word: אֲשֶׁר אֹמְרִים
  english_pob_choice: those who said
  chosen_spanish: quienes decían
  alternatives_spanish:
  - los que decían
  - quienes decían entonces
  lexicon: HALOT
  rationale: El participio hebreo sugiere habla reportada o continua; «quienes decían» mantiene el carácter descriptivo dentro del relato.
- source_word: לָוִינוּ
  english_pob_choice: we have borrowed
  chosen_spanish: Hemos pedido dinero prestado
  alternatives_spanish:
  - Hemos tomado prestado
  - Pedimos dinero prestado
  lexicon: HALOT
  rationale: «Préstamo» está implícito en el verbo hebreo. En español, añadir «dinero» hace explícito el objeto económico que el contexto ya presupone, sin cambiar el sentido de fondo.
- source_word: כֶסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - moneda
  lexicon: HALOT
  rationale: Aunque literalmente es «plata», en este contexto denota medio de pago. «Dinero» comunica la equivalencia económica de manera natural para el lector español.
- source_word: לְמִדַּת הַמֶּלֶךְ
  english_pob_choice: for the king’s tax
  chosen_spanish: para el tributo del rey
  alternatives_spanish:
  - para el impuesto del rey
  - para la contribución del rey
  lexicon: HALOT
  rationale: La expresión refiere un pago debido al rey. «Tributo» conserva mejor la amplitud semántica del hebreo que «impuesto», que puede sonar demasiado técnico o moderno.
- source_word: שְׂדֹתֵינוּ וּכְרָמֵינוּ
  english_pob_choice: on our fields and our vineyards
  chosen_spanish: sobre nuestros campos y nuestras viñas
  alternatives_spanish:
  - por nuestros campos y nuestras viñas
  - en nuestros campos y nuestras viñas
  lexicon: HALOT
  rationale: La preposición hebrea puede reflejar la base sobre la que se calcula la carga. «Sobre» conserva esa relación de gravamen o imposición, aunque en español también permite entender el terreno afectado.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje base; la redacción española sigue de cerca el sentido del hebreo y armoniza con la opción inglesa ya auditada.
  spanish_consistency_notes:
  - Se mantuvo el valor existencial de וְיֵשׁ con una construcción natural en español.
  - Se evitó «SEÑOR» u այլ sustitutos porque no hay aquí el tetragrámaton ni una cita directa de YHWH.
  - Se prefirió «tributo» por su amplitud semántica en este contexto fiscal-político.
  - La puntuación reproduce el discurso directo con comillas angulares españolas y conserva la estructura de la queja.
