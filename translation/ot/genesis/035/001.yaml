theological_decisions:
- issue: Reference of אֱלֹהִים in this verse
  chosen_reading: The one true God speaks to Jacob
  rationale: Despite the plural form, the singular verb and narrative context clearly indicate Israel's God, not 'gods' or a divine council member.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering of Bethel
  chosen_reading: Transliterate the place name as 'Bethel' rather than translate its meaning
  alternative_readings:
  - House of God
  rationale: The translation philosophy directs that personal names are transliterated; the same principle applies naturally to established place names unless context requires explicating the meaning.
  doctrine_reference: Translation philosophy §2
