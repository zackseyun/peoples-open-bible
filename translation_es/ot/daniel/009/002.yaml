translation:
  language: es
  text: 'En el primer año de su reinado[a], yo, Daniel, entendí por los libros el número de los años sobre los cuales había venido la palabra de Yahvé al profeta Jeremías, para que se cumplieran las desolaciones de Jerusalén: setenta años.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los rollos». El término hebreo puede referirse de manera amplia a documentos escritos; «libros» se usa en el texto principal por ser más natural en español, mientras que «rollos» conserva con mayor explicitud el medio antiguo.
    reason: cultural_note
lexical_decisions:
- source_word: בִּ/שְׁנַ֤ת אַחַת֙
  english_pob_choice: In the first year
  chosen_spanish: En el primer año
  alternatives_spanish:
  - En un año
  - En el año uno
  lexicon: HALOT
  rationale: La expresión con אַחַת funciona como un ordinal idiomático. En español, «en el primer año» es natural y fiel; «en un año» desfigura el sentido temporal.
- source_word: לְ/מָלְכ֔/וֹ
  english_pob_choice: of his reign
  chosen_spanish: de su reinado
  alternatives_spanish:
  - de su realeza
  - cuando empezó a reinar
  lexicon: HALOT
  rationale: El sustantivo verbal con sufijo indica el período de gobierno. «De su reinado» conserva el valor temporal y es la forma más idiomática en español.
- source_word: בִּינֹ֖תִי
  english_pob_choice: understood
  chosen_spanish: entendí
  alternatives_spanish:
  - discerní
  - comprendí
  lexicon: HALOT
  rationale: El verbo expresa que Daniel llegó a comprender el dato profético. «Entendí» mantiene la claridad sin añadir matiz interpretativo.
- source_word: בַּ/סְּפָרִ֑ים
  english_pob_choice: from the books
  chosen_spanish: en los libros
  alternatives_spanish:
  - de los libros
  - en los rollos
  lexicon: HALOT
  rationale: El hebreo admite valor locativo e instrumental. Dado que el texto describe el medio de consulta, «en los libros» funciona con naturalidad; la nota preserva la alternativa cultural de «rollos».
- source_word: מִסְפַּ֣ר הַ/שָּׁנִ֗ים
  english_pob_choice: the number of the years
  chosen_spanish: el número de los años
  alternatives_spanish:
  - el número de años
  - la cantidad de años
  lexicon: HALOT
  rationale: La construcción nominal se conserva de forma bastante formal para no diluir la estructura hebrea ni el énfasis en una cifra precisa.
- source_word: אֲשֶׁ֨ר הָיָ֤ה דְבַר יְהוָה֙ אֶל יִרְמִיָ֣ה הַ/נָּבִ֔יא
  english_pob_choice: concerning which the word of Yahweh had come to Jeremiah the prophet
  chosen_spanish: acerca de los cuales había venido la palabra de Yahvé al profeta Jeremías
  alternatives_spanish:
  - sobre los cuales había venido la palabra de Yahvé al profeta Jeremías
  - con respecto a los cuales vino la palabra de Yahvé al profeta Jeremías
  lexicon: HALOT
  rationale: La relativa identifica esos años como el contenido de la revelación dada a Jeremías. «Había venido» refleja la anterioridad respecto del entendimiento de Daniel; «acerca de los cuales» mantiene la relación semántica sin sobrecargarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» como nombre propio divino, no la sustitución litúrgica «SEÑOR».'
- source_word: לְ/מַלֹּ֛אות
  english_pob_choice: to fulfill
  chosen_spanish: para que se cumplieran
  alternatives_spanish:
  - para cumplir
  - para el cumplimiento de
  lexicon: HALOT
  rationale: 'El infinitivo constructo con לְ se expresa en español con una finalidad impersonal: «para que se cumplieran». Esto conserva la tensión textual sin imponer un sujeto explícito que el hebreo no destaca.'
- source_word: לְ/חָרְב֥וֹת יְרוּשָׁלִַ֖ם
  english_pob_choice: the desolations of Jerusalem
  chosen_spanish: las desolaciones de Jerusalén
  alternatives_spanish:
  - la desolación de Jerusalén
  - las ruinas de Jerusalén
  lexicon: HALOT
  rationale: El plural חָרְבוֹת se mantiene con «desolaciones», preservando el registro profético y el plural del hebreo. «Ruinas» reduciría el alcance semántico a restos materiales.
- source_word: שִׁבְעִ֥ים שָׁנָֽה
  english_pob_choice: seventy years
  chosen_spanish: setenta años
  alternatives_spanish:
  - setenta años
  lexicon: HALOT
  rationale: Equivalencia directa y transparente; no requiere expansión.
theological_decisions:
- issue: Nombre divino יְהוָה en contexto de cita profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La referencia no es una mera sustitución estilística sino el nombre propio del pacto. Se mantiene «Yahvé» de acuerdo con la política del proyecto y para no ocultar el nombre divino en la cita de Jeremías.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre «para que se cumplieran» y el fin de los setenta años
  english_pob_reading: to fulfill the desolations of Jerusalem
  chosen_spanish_reading: para que se cumplieran las desolaciones de Jerusalén
  alternative_spanish_readings:
  - para cumplir las desolaciones de Jerusalén
  - para el cumplimiento de las desolaciones de Jerusalén
  rationale: La frase hebrea puede leerse como propósito o resultado respecto del período profetizado; no se resuelve la tensión con una paráfrasis más interpretativa. «Se cumplieran» conserva la forma impersonal y el foco temporal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que afinó la relación relativa («concerning which») y mantuvo la finalidad de לְמַלֹּאות como «to fulfill»; la presente redacción española sigue ese ajuste conservando la estructura formal y la pluralidad de «desolaciones». También se alineó con la decisión doctrinal del proyecto de usar «Yahvé/Yahvé» en vez de «el SEÑOR».
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Yahvé» y el título «Señor», conforme al estándar del proyecto.
  - «Desolaciones» preserva el plural hebreo y evita reducir el sentido a meras ruinas físicas.
  - La sintaxis «para que se cumplieran» refleja una finalidad impersonal adecuada al infinitivo constructo hebreo.
  - La nota entre corchetes se aplica solo a «los libros» y no a otra expresión para evitar ambigüedad de marcador.
