base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/023/008.yaml
  text: 'These are the names of the mighty men who belonged to David: Josheb-basshebeth[a], a Tahkemonite, chief of the Three. He was Adino the Eznite[c][b], who wielded his spear against eight hundred slain at one time.'
  footnotes:
  - marker: a
    text: The Hebrew text of this verse is difficult. 'Josheb-basshebeth' follows the Masoretic Text; the parallel in 1 Chronicles 11:11 reads 'Jashobeam, a Hachmonite.'
    reason: textual_variant
  - marker: b
    text: Or 'chief of the thirty,' according to some ancient witnesses and interpreters; the Masoretic Text reads 'chief of the Three.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'Adino the Eznite,' a very difficult phrase. Many understand it instead as something like 'he wielded his spear' or 'he brandished his spear.'
    reason: lexical_alternative
