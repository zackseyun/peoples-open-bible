revisions:
- from: Con gran fuerza mi ropa[a] está deformada; como la abertura de mi túnica, me aprieta.
  to: Con gran fuerza mi prenda está deformada[a]; como el cuello[b] de mi túnica, me aprieta.
  rationale: 'Se ajusta el singular de לְבוּשִׁי con «mi prenda», se conserva la naturalidad de «me aprieta», y se recuperan las dos notas léxicas importantes del POB inglés: la incertidumbre de יִתְחַפֵּשׂ y la literalidad de כְּפִי. «Cuello» funciona mejor en español de vestimenta, mientras la nota preserva «boca/abertura».'
