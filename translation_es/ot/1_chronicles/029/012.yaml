translation:
  language: es
  text: Las riquezas y el honor[b] proceden de delante de ti[a], y tú reinas sobre todo. En tu mano están el poder y la fuerza, y en tu mano está engrandecer[c] y fortalecer a todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «proceden de tu presencia» o «vienen de ti»; el hebreo dice literalmente: «de delante de ti».'
    reason: lexical_alternative
  - marker: b
    text: «Honor» también puede verterse «gloria».
    reason: lexical_alternative
  - marker: c
    text: «Engrandecer» también puede significar «exaltar».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  lexicon: HALOT
  rationale: El término expresa abundancia o riqueza material. «Riquezas» conserva el paralelismo con «honor» y el tono elevado de la oración.
- source_word: הַכָּבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  lexicon: HALOT
  rationale: En este contexto de alabanza real y donación divina, «honor» comunica bien la idea de prestigio o dignidad concedida por Dios. «Gloria» sigue siendo una alternativa válida, pero «honor» armoniza mejor con «riquezas».
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: come from before you
  chosen_spanish: proceden de delante de ti
  alternatives_spanish:
  - proceden de tu presencia
  - vienen de ti
  lexicon: HALOT
  rationale: La preposición y el sustantivo hebreos conservan la imagen espacial de proceder «de delante de» la presencia divina. «Proceden de delante de ti» mantiene esa imagen sin volverla una paráfrasis abstracta.
- source_word: מוֹשֵׁל בַּכֹּל
  english_pob_choice: you rule over all
  chosen_spanish: tú reinas sobre todo
  alternatives_spanish:
  - tú gobiernas sobre todo
  - tú eres soberano sobre todo
  lexicon: HALOT
  rationale: El participio expresa dominio continuo. «Reinas sobre todo» es natural en español bíblico y comunica la soberanía permanente de Dios.
- source_word: בְיָדְךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - por tu mano
  - en tu poder
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta del hebreo, importante para la imagen de control y posesión divina.
- source_word: כֹּחַ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  lexicon: HALOT
  rationale: En este verso, el término denota capacidad efectiva o poder disponible en Dios. «Poder» distingue este término del siguiente «fuerza».
- source_word: וּגְבוּרָה
  english_pob_choice: might
  chosen_spanish: fuerza
  alternatives_spanish:
  - mantenimiento
  - valentía
  - vigor
  lexicon: HALOT
  rationale: El sustantivo puede indicar fuerza poderosa o vigor. «Fuerza» preserva el paralelismo con «poder» sin fusionar ambos términos.
- source_word: לְגַדֵּל
  english_pob_choice: to make great
  chosen_spanish: engrandecer
  alternatives_spanish:
  - hacer grande
  - exaltar
  - magnificar
  lexicon: HALOT
  rationale: El verbo significa hacer grande o elevar. «Engrandecer» es un equivalente español natural que conserva la idea de promover a una condición mayor.
- source_word: וּלְחַזֵּק
  english_pob_choice: to strengthen
  chosen_spanish: fortalecer
  alternatives_spanish:
  - fortificar
  - dar fuerza
  - hacer fuerte
  lexicon: HALOT
  rationale: El verbo expresa hacer fuerte o reforzar. «Fortalecer» es claro y fiel en español contemporáneo.
- source_word: לַכֹּל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todo
  - a todas las cosas
  - a todos y a todo
  lexicon: HALOT
  rationale: Aunque el hebreo es más amplio, en este contexto el dativo final puede entenderse como inclusión de personas y de todo cuanto Dios sostiene. «A todos» fluye bien en español y mantiene la amplitud referencial sin forzar una abstracción.
theological_decisions:
- issue: Cómo reflejar la frase מִלְּפָנֶיךָ sin neutralizar la imagen de la presencia divina
  english_pob_reading: come from before you
  chosen_spanish_reading: proceden de delante de ti
  alternative_spanish_readings:
  - proceden de tu presencia
  - vienen de ti
  rationale: La elección preserva la imagen hebrea de procedencia desde la presencia de Dios. Evita resolver la expresión solo como origen abstracto, manteniendo la tensión poética y teológica del texto.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo y el auditorial inglés sin depender mecánicamente de él; conserva la imagen espacial de מִלְּפָנֶיךָ, mantiene la distinción entre כֹּחַ y גְבוּרָה, y usa equivalentes naturales en español para לְגַדֵּל y לְחַזֵּק.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - 'Se conserva el paralelismo poético mediante pares cercanos: «riquezas/honor», «poder/fuerza», «engrandecer/fortalecer».'
  - «De delante de ti» se eligió por fidelidad imagética, aunque suene menos idiomático que una simple referencia a origen.
