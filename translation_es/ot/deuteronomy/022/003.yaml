revisions:
- from: Y así harás con su asno[a], y así harás con su manto, y así harás con cualquier cosa perdida de tu hermano, que se le haya perdido y tú la hayas encontrado; no podrás desentenderte de ella.
  to: Y así harás con su asno, y así harás con su manto, y así harás con cualquier cosa perdida de tu hermano que se le pierda y tú la encuentres; no podrás desentenderte de ella[a].
  rationale: Se corrige el anclaje de la nota para que corresponda a לְהִתְעַלֵּם, y se aligera la sintaxis de la cláusula relativa para un español más natural y legalmente general sin alterar el sentido del hebreo ni las decisiones del POB inglés.
