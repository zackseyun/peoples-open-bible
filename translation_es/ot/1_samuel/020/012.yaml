review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general del hebreo elíptico: juramento solemne, sondear la disposición de Saúl, referencia temporal comprimida, actitud favorable hacia David y promesa de avisarle. Sin embargo, hay ajustes necesarios para mayor fidelidad y naturalidad: el juramento suena mejor como «Tan cierto como que vive Yahvé» o equivalente; «te enviaré» omite el objeto implícito de ‘enviar a alguien/mensaje’; y «te revelaré» queda incompleto frente a «te lo revelaré / te lo comunicaré».'
  spanish_quality_summary: 'La redacción es bastante clara, pero presenta giros algo rígidos o incompletos: «para mañana a esta hora» suena menos natural que «mañana a esta hora»; «resulta favorable hacia David» puede simplificarse a «es favorable a David»; y «¿no te enviaré entonces y te revelaré?» suena truncado en español. También conviene corregir el espacio antes de la comilla de cierre.'
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé», «Dios de Israel» y el tratamiento idiomático de וְגָלִיתִי אֶת אָזְנֶךָ mediante nota. No hay conflicto doctrinal. La mejora principal es sintáctica y estilística, no terminológica.
  issues:
  - severity: medium
    issue: La cláusula juratoria «Vive Yahvé, el Dios de Israel» es posible, pero suena abrupta en este contexto elíptico.
    rationale: El hebreo introduce una fórmula de juramento abreviada. En español bíblico claro, «Tan cierto como que vive Yahvé, el Dios de Israel» comunica mejor el valor solemne sin sobreinterpretar.
  - severity: medium
    issue: «para mañana a esta hora» es menos natural que la secuencia española habitual.
    rationale: El hebreo temporal es comprimido; en español «mañana a esta hora, o al tercer día» conserva la compresión pero mejora la fluidez.
  - severity: medium
    issue: «¿no te enviaré entonces y te revelaré?» deja incompletos los verbos en español.
    rationale: אֶשְׁלַח אֵלֶיךָ probablemente implica enviar aviso o mensajero; además, «te revelaré» requiere objeto. «¿no mandaré a avisarte entonces y te lo revelaré?» expresa el sentido de modo natural.
  - severity: low
    issue: La nota b no refleja bien la función de la nota inglesa sobre la elipsis difícil.
    rationale: Conviene señalar que la redacción hebrea es elíptica y probablemente forma parte de una promesa/juramento, no solo del ‘resultado respecto de David’.
  revised_spanish_text: 'Y Jonatán dijo a David: «Tan cierto como que vive Yahvé, el Dios de Israel: cuando haya sondeado a mi padre[a] mañana a esta hora, o al tercer día[b], y he aquí que es favorable a David, ¿no mandaré a avisarte entonces y te lo revelaré[c]?»'
  revised_footnotes:
