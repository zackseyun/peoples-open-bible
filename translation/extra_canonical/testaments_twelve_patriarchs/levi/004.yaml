theological_decisions:
- issue: Bracketed clause 'at the suffering of the Most High' in v.1
  chosen_reading: Included in the main text as part of the extant Greek witness, without doctrinal expansion.
  alternative_readings:
  - Omit as secondary expansion
  - Render with capitalized 'Passion'
  rationale: The clause is present in the supplied Greek text though marked as textually uncertain. It is translated straightforwardly as 'the suffering of the Most High' and not harmonized to later Christian formulae.
  doctrine_reference: Preserve theological tension rather than resolve it; translate what is in the Greek witness honestly.
- issue: v.4 phrase 'in the tender mercies of his son'
  chosen_reading: Retained in the main text as 'until the Lord visits all the nations in the tender mercies of his son forever.'
  alternative_readings:
  - '''in his tender mercies'' if υἱοῦ is omitted'
  - Treat as later Christian interpolation and remove from translation
  rationale: The supplied text includes the bracketed reading '[son]'. Because the project requires transparency rather than silent excision, the phrase is translated as witnessed and flagged in a note as textually uncertain and possibly secondary.
  doctrine_reference: Translate honestly and use notes rather than silently harmonizing.
- issue: Referent of 'him' in v.6
  chosen_reading: 'Left ambiguous in the main text: ''those who bless him... those who curse him...'''
  alternative_readings:
  - the Lord
  - the son
  - Levi / Levi's line
  rationale: The Greek pronoun αὐτόν lacks an explicit antecedent in the immediate verse and may point back differently depending on how v.4 is read. The translation preserves the ambiguity rather than resolving it dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
