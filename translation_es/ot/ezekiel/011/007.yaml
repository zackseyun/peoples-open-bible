review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y preserva la metáfora central de la olla y la carne. Sin embargo, חַלְלֵיכֶם significa específicamente 'tus/vuestros muertos por violencia' o 'vuestros caídos/slain', y 'vuestros muertos' debilita un matiz importante del original. También la nota b no presenta una alternativa real, porque repite 'la carne' en vez de reflejar la alternativa inglesa 'la carne' / 'la vianda' o similar; en español conviene mantener 'carne' en el texto, pero la nota debe explicar otra posibilidad genuina.
  spanish_quality_summary: El español es claro y digno, pero mezcla registro peninsular ('vuestros', 'habéis') con el objetivo de español neutral latinoamericano. Además, 'Señor Yahvé' sin artículo es defendible por cercanía al inglés auditado, pero en español bíblico natural suena mejor 'el Señor Yahvé'. La frase resultante fluye mejor con ajustes menores.
  glossary_alignment: Se preserva correctamente 'Yahvé' para יְהוִה y 'olla' para הַסִּיר. 'Carne' es una buena decisión contextual para בָּשָׂר en español. El principal desajuste terminológico es חַלְלֵיכֶם, que debería reflejar mejor el sentido de 'caídos' o 'muertos violentamente' en lugar de simplemente 'muertos'.
  issues:
  - severity: medium
    issue: חַלְלֵיכֶם se tradujo como 'vuestros muertos'
    rationale: El hebreo se refiere a los muertos por violencia, no a los muertos en general. 'Tus/vuestros caídos' o 'tus/vuestros muertos violentamente' preserva mejor el matiz del original y del POB inglés 'your slain'.
  - severity: medium
    issue: Registro no neutral latinoamericano
    rationale: El borrador usa 'vuestros' y 'habéis', rasgos peninsulares. El proyecto pide español neutral latinoamericano o ampliamente eclesial; 'sus'/'han puesto' o 'tus'/'has puesto' encajaría mejor.
  - severity: low
    issue: '''Señor Yahvé'' sin artículo suena menos natural en español'
    rationale: Aunque no es incorrecto, la fórmula profética en español suele fluir mejor como 'el Señor Yahvé'. Esto mantiene ambos elementos del hebreo y mejora la legibilidad.
  - severity: medium
    issue: La nota b no ofrece una alternativa real
    rationale: La nota dice 'O la carne' cuando el texto principal ya dice 'la carne'. Si se conserva nota, debe ofrecer una alternativa verdadera o simplemente omitirse.
  revised_spanish_text: 'Por tanto, así dice el Señor Yahvé: Sus caídos[a], a quienes han puesto en medio de ella, ellos son la carne[b], y ella es la olla; pero a ustedes los sacaré de en medio de ella.'
  revised_footnotes:
