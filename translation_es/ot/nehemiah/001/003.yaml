    text: O «del exilio». La frase hebrea puede traducirse «del cautiverio» o «del exilio».
    reason: lexical_alternative
  - marker: b
    text: O «en gran angustia y oprobio».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [b] para que corresponda al segmento hebreo correcto; se suaviza «a fuego» a «por fuego» para un español más natural sin perder la fuerza instrumental; y se mejora levemente la redacción del remanente/sobrevivientes para reflejar mejor la estructura hebrea y la decisión léxica auditada.
