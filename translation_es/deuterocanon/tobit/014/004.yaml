base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/014/004.yaml
  text: 'Go to Media[a], my child, because I am convinced that what Jonah the prophet spoke concerning Nineveh will happen: it will be overthrown. But in Media there will be peace for a while. And our brothers will be scattered from the good land, and Jerusalem will be desolate, and the house of God in it will be burned down[b], and it will be desolate until a time.'
  footnotes:
  - marker: a
    text: Or, 'there will be rather more peace until a season.' The Greek includes a comparative term that may suggest relative safety in Media rather than absolute peace.
    reason: lexical_alternative
  - marker: b
    text: '''The house of God'' refers to the temple in Jerusalem.'
    reason: cross_reference
