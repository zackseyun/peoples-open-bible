- from: 'Así dirán a ellos: “Los dioses[a] que no hicieron los cielos y la tierra perecerán de la tierra y de debajo de los cielos”.'
  to: 'Así les dirán ustedes: “Los dioses[b] que no hicieron los cielos y la tierra perecerán[a] de la tierra y de debajo de los cielos.”'
  rationale: Se corrigió la persona verbal para reflejar la segunda persona plural del arameo, se mejoró la naturalidad del español con 'les', se reubicó la nota léxica sobre יֵאבַדוּ en 'perecerán' y se añadió la nota teológica/documental sobre 'los dioses' exigida por el expediente auditado. Se mantuvieron 'los cielos y la tierra' y 'de debajo de los cielos' como opciones fieles y legibles.
