  yaml_path: translation/ot/1_samuel/029/006.yaml
  text: Then Achish called David and said to him[a], “As Yahweh lives, you are upright, and your going out and your coming in with me in the camp is good in my sight; for I have not found any evil in you from the day of your coming to me to this day. But in the eyes of the lords of the Philistines[c][b], you are not good.”
  footnotes:
