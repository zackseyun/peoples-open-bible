id: JOS.7.6
reference: Joshua 7:6
source:
  edition: WLC
  text: וַ/יִּקְרַ֨ע יְהוֹשֻׁ֜עַ שִׂמְלֹתָ֗י/ו וַ/יִּפֹּל֩ עַל פָּנָ֨י/ו אַ֜רְצָ/ה לִ/פְנֵ֨י אֲר֤וֹן יְהוָה֙ עַד הָ/עֶ֔רֶב ה֖וּא וְ/זִקְנֵ֣י יִשְׂרָאֵ֑ל וַ/יַּעֲל֥וּ עָפָ֖ר עַל רֹאשָֽׁ/ם־־־׃
translation:
  text: Then Joshua tore his clothes and fell facedown to the ground before the ark of Yahweh until evening[a], he and the elders of Israel[b], and they put dust on their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the ark of Yahweh.'
    reason: alternative_reading
  - marker: b
    text: Throwing dust on the head was a customary sign of grief, humiliation, or mourning.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְרַע
  chosen: tore
  alternatives:
  - ripped
  - tore apart
  lexicon: HALOT
  rationale: קרע in mourning/distress contexts commonly means to tear garments. 'Tore' is natural modern English and preserves the concrete action.
- source_word: שִׂמְלֹתָיו
  chosen: his clothes
  alternatives:
  - his garments
  - his robes
  lexicon: HALOT
  rationale: שִׂמְלָה refers broadly to clothing/garments. 'His clothes' is readable modern English; the mourning gesture is clear from context.
- source_word: וַיִּפֹּל עַל־פָּנָיו אַרְצָה
  chosen: fell facedown to the ground
  alternatives:
  - fell on his face to the ground
  - fell with his face to the earth
  lexicon: HALOT
  rationale: The idiom denotes prostration. 'Fell facedown to the ground' communicates the posture clearly in contemporary English while retaining the physicality of the Hebrew.
- source_word: לִפְנֵי אֲרוֹן יְהוָה
  chosen: before the ark of the LORD
  alternatives:
  - before the ark of Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' אֲרוֹן here is the covenant ark. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַד הָעֶרֶב
  chosen: until evening
  alternatives:
  - until the evening
  - until sundown
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'Until evening' is idiomatic and sufficiently precise.
- source_word: הוּא וְזִקְנֵי יִשְׂרָאֵל
  lemma: הוּא
  chosen: he and the elders of Israel
  alternatives:
  - both he and the elders of Israel
  lexicon: HALOT
  rationale: The pronoun הוּא is emphatic/appositional, indicating Joshua together with the elders shared in the action. 'He and the elders of Israel' preserves this plainly.
- source_word: וַיַּעֲלוּ עָפָר עַל־רֹאשָׁם
  chosen: they threw dust on their heads
  alternatives:
  - they put dust on their heads
  - they cast dust on their heads
  lexicon: HALOT
  rationale: The idiom describes a mourning/humiliation gesture. Although the verb is literally 'caused to go up,' English idiom prefers 'threw' or 'cast' dust on the head.
