translation:
  language: es
  text: Y la luz de la luna será como la luz del sol, y la luz del sol será siete veces más intensa, como la luz de siete días, en el día en que Yahvé venda la fractura de su pueblo y sane la herida[a] causada por su golpe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el magullamiento/aplastamiento causado por su golpe». El hebreo puede expresarse con una imagen de lesión algo distinta, pero el sentido es que Yahvé sana el daño asociado con su propio golpe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will be
  chosen_spanish: Y ... será
  alternatives_spanish:
  - Y ... estará
  - Entonces ... será
  lexicon: HALOT
  rationale: La forma introduce un estado futuro en español con la misma sencillez que en el inglés POB, manteniendo la secuencia profética sin una paráfrasis excesiva.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - resplandor
  - claridad
  lexicon: HALOT
  rationale: El sustantivo denota luz luminosa literal en el paralelismo de luna y sol; 'luz' es la opción más directa y natural en español.
- source_word: הַלְּבָנָה
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna blanca
  lexicon: HALOT
  rationale: En este contexto poético, el término designa la luna; 'la luna' comunica mejor que una traducción etimológica por 'la blanca'.
- source_word: כְּאוֹר הַחַמָּה
  english_pob_choice: like the light of the sun
  chosen_spanish: como la luz del sol
  alternatives_spanish:
  - como el resplandor del sol
  - como la claridad del sol
  lexicon: HALOT
  rationale: Conserva la comparación explícita y el sustantivo repetido en una estructura natural en español.
- source_word: הַחַמָּה
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  - el calor
  lexicon: HALOT
  rationale: Aquí el referente es claramente el sol físico, no el calor abstracto.
- source_word: שִׁבְעָתַיִם
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - séptuplo
  - siete pliegues
  lexicon: HALOT
  rationale: '''Siete veces'' expresa con claridad la multiplicación por siete; es idiomático y suficientemente literal para el español bíblico.'
- source_word: כְּאוֹר שִׁבְעַת הַיָּמִים
  english_pob_choice: like the light of seven days
  chosen_spanish: como la luz de siete días
  alternatives_spanish:
  - como la luz de siete jornadas
  - como la luz de siete días juntos
  lexicon: HALOT
  rationale: Preserva la imagen poética sin decidir en exceso si la idea es acumulativa o intensificada.
- source_word: בְּיוֹם
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día cuando
  - cuando
  lexicon: HALOT
  rationale: Esta construcción temporal mantiene el registro profético y la especificidad del momento de restauración.
- source_word: חֲבֹשׁ
  english_pob_choice: binds up
  chosen_spanish: venda
  alternatives_spanish:
  - ata
  - cura
  lexicon: HALOT
  rationale: La raíz expresa la acción de vendar o sujetar una herida; en español, 'venda' comunica esa imagen de curación física y restauración.
- source_word: שֶׁבֶר
  english_pob_choice: fracture
  chosen_spanish: fractura
  alternatives_spanish:
  - quebradura
  - rotura
  lexicon: HALOT
  rationale: '''Fractura'' conserva bien la metáfora médica que acompaña a ''vendar'' y refleja la idea de una ruptura real.'
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su nación
  - su gente
  lexicon: HALOT
  rationale: Es la equivalencia natural de עַם con sufijo posesivo en contexto pactual.
- source_word: וּמַחַץ
  english_pob_choice: and heals the wound
  chosen_spanish: y sane la herida
  alternatives_spanish:
  - y sane el golpe
  - y cure la herida
  lexicon: HALOT
  rationale: En español conviene explicitar el objeto que recibe la sanidad; 'herida' mantiene la imagen de daño físico sin reducir el matiz de golpe o contusión.
- source_word: מַכָּתוֹ
  english_pob_choice: from his blow
  chosen_spanish: de su golpe
  alternatives_spanish:
  - causada por su golpe
  - de su azote
  lexicon: HALOT
  rationale: Sigue la decisión del POB inglés de mantener la referencia al golpe procedente de Yahvé, preservando la tensión teológica de que él hiere y él sana.
- source_word: יִרְפָּא
  english_pob_choice: heals
  chosen_spanish: sane
  alternatives_spanish:
  - sanará
  - curará
  lexicon: HALOT
  rationale: En la subordinada temporal, el presente de subjuntivo es idiomático en español y conserva el valor futuro relativo del texto.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: usar ''Yahvé'' en el texto principal, sin ocultarlo tras ''SEÑOR''.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sujeto implícito del golpe en מַכָּתוֹ
  english_pob_reading: the wound from his blow
  chosen_spanish_reading: la herida de su golpe
  alternative_spanish_readings:
  - la herida causada por su golpe
  - su herida
  rationale: La lectura mantiene que el daño procede de Yahvé, preservando la tensión profética de juicio y restauración en un mismo sujeto divino.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto hebreo WLC y el audit trail inglés POB. No se detectaron revisiones aplicadas en la fuente inglesa; la propuesta española sigue esa lectura estable, preservando el paralelismo poético y la tensión teológica del sufrimiento causado por Yahvé y su posterior sanidad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa 'luna' y 'sol' en registro poético claro, en lugar de calcos etimológicos.
  - Se conserva la imagen médica con 'fractura' y 'herida' para reflejar el campo semántico de vendaje/sanidad.
  - El subjuntivo 'sane' expresa adecuadamente la subordinada temporal futura en español.
  - La nota al pie se ancla en 'sol[a]' porque allí está la principal alternativa léxica documentada.
