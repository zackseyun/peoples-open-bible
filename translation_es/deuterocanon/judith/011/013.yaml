translation:
  language: es
  text: Y las primicias del grano y los diezmos del vino y del aceite, que habían apartado y consagrado para los sacerdotes que sirven en Jerusalén delante del rostro[a] de nuestro Dios, han decidido consumirlos[b], aunque a nadie del pueblo le está permitido tocarlos ni siquiera con las manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de nuestro Dios». El griego dice más literalmente «delante del rostro de nuestro Dios», expresión viva para indicar la presencia de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «es lícito» o «es propio». El griego puede entenderse como una prohibición normativa o de conveniencia cultual, pero en cualquier caso excluye tocarlos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαρχὰς
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  - ofrenda de primicias
  lexicon: LSJ
  rationale: ἀπαρχή nombra la primera porción apartada de la cosecha para ofrenda. En español bíblico, «primicias» comunica de forma natural ese sentido cultual sin perder la referencia al primer producto reservado.
- source_word: σίτου
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - trigo
  - cereal
  lexicon: LSJ
  rationale: σίτος puede ser trigo o grano en sentido amplio. Como la lista reúne productos agrícolas en general, «grano» conserva mejor el valor genérico que «trigo».
- source_word: δεκάτας
  english_pob_choice: tithes
  chosen_spanish: diezmos
  alternatives_spanish:
  - décimas
  lexicon: LSJ
  rationale: El término cultual δεκάτη se expresa de manera clara y tradicional como «diezmos», manteniendo el sentido religioso-económico.
- source_word: ἐφυλάξαν
  english_pob_choice: had set aside
  chosen_spanish: habían apartado
  alternatives_spanish:
  - habían reservado
  - habían guardado
  lexicon: LSJ
  rationale: En este contexto φυλάσσω implica conservar algo separado para uso sagrado. «Habían apartado» reproduce bien la idea de reservarlo para un fin distinto del uso común.
- source_word: ἁγιάσαντες
  english_pob_choice: having consecrated them
  chosen_spanish: habiéndolos consagrado
  alternatives_spanish:
  - habiéndolos santificado
  - habiéndolos separado como sagrados
  lexicon: LSJ
  rationale: El participio expresa una dedicación previa a uso santo. «Consagrado» es más natural en español que «santificado» en un contexto cultual y mantiene la fuerza religiosa.
- source_word: τοῖς ἱερεῦσιν
  english_pob_choice: for the priests
  chosen_spanish: para los sacerdotes
  alternatives_spanish:
  - a los sacerdotes
  lexicon: LSJ
  rationale: El dativo tras ἁγιάσαντες indica dedicación en beneficio o para uso de los sacerdotes. «Para los sacerdotes» expresa esa finalidad con claridad.
- source_word: τοῖς παρεστηκόσιν
  english_pob_choice: who stand
  chosen_spanish: que están
  alternatives_spanish:
  - que sirven
  - que permanecen
  lexicon: LSJ
  rationale: El participio perfecto sugiere presencia/servicio continuo en el ámbito sagrado. «Que están» es sobrio y natural en español, sin forzar una interpretación más específica que el texto no exige.
- source_word: ἀπέναντι τοῦ προσώπου τοῦ θεοῦ ἡμῶν
  english_pob_choice: before the face of our God
  chosen_spanish: delante del rostro de nuestro Dios
  alternatives_spanish:
  - en presencia de nuestro Dios
  - delante de nuestro Dios
  lexicon: LSJ
  rationale: Se conserva la expresión semítica intensiva del griego («rostro de nuestro Dios») en vez de suavizarla a «presencia». Así se mantiene el color del original y la fuerza de cercanía reverente.
- source_word: κεκρίκασιν
  english_pob_choice: they have decided
  chosen_spanish: han decidido
  alternatives_spanish:
  - han resuelto
  - han juzgado
  lexicon: LSJ
  rationale: Aquí κρίνω no es condenar sino tomar una resolución firme. «Han decidido» comunica bien el carácter deliberado del acto.
- source_word: ἐξαναλῶσαι
  english_pob_choice: to consume
  chosen_spanish: consumirlos
  alternatives_spanish:
  - gastar
  - agotar
  - usarlos
  lexicon: LSJ
  rationale: El verbo significa consumir o gastar por completo. En este contexto de alimentos apartados, «consumirlos» resulta fiel y comprensible.
- source_word: οὐδὲ ταῖς χερσὶν καθῆκεν ἅψασθαι
  english_pob_choice: it is not permitted ... even to touch them with their hands
  chosen_spanish: no le está permitido tocarlos ni siquiera con las manos
  alternatives_spanish:
  - no es lícito tocarlos ni siquiera con las manos
  - no es propio tocarlos ni siquiera con las manos
  lexicon: LSJ
  rationale: La prohibición cultual se expresa de modo claro con «no le está permitido». «Ni siquiera con las manos» conserva el énfasis concreto del griego.
- source_word: οὐδένα τῶν ἐκ τοῦ λαοῦ
  english_pob_choice: any of the people
  chosen_spanish: a ninguno del pueblo
  alternatives_spanish:
  - a nadie del pueblo
  - a ninguno entre el pueblo
  lexicon: LSJ
  rationale: La frase distingue al pueblo en general de los sacerdotes. «A ninguno del pueblo» mantiene esa oposición sin añadir matices sociales no explicitados.
theological_decisions:
- issue: Estado sagrado de los productos reservados
  english_pob_reading: The produce is already consecrated for priestly use in Jerusalem and is forbidden to ordinary people.
  chosen_spanish_reading: Los productos aparecen ya consagrados para uso sacerdotal en Jerusalén y, por tanto, vedados al pueblo común.
  alternative_spanish_readings:
  - Los productos solo estarían apartados, sin una consagración formal.
  - La prohibición podría entenderse como una mera norma práctica, no cultual.
  rationale: La secuencia de «apartar», «consagrar» y la prohibición de tocar apunta a una reserva sagrada real, no meramente práctica. La traducción conserva esa tensión cultual sin rebajarla.
  doctrine_reference: 'Principio POB: primacía del texto original; preservar la tensión teológica cuando el griego la sostiene.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente al preferir «habían apartado» para ἐφυλάξαν, omitir todo añadido innecesario y mantener el tono formal y natural. También conserva la imagen completa «delante del rostro de nuestro Dios» para reflejar la fuerza del giro griego.
  spanish_consistency_notes:
  - Se usa «primicias», «diezmos» y «consagrados» con registro bíblico claro y coherente.
  - Se eligió «pueblo» para οἱ ἐκ τοῦ λαοῦ, reservando «sacerdotes» para el grupo distinguido en el versículo.
  - Se mantuvo «Y Dios nuestro» como «nuestro Dios» y se conservó la formulación intensiva «del rostro» por fidelidad al original.
  - «Consumirlos» evita introducir la idea de destrucción; sigue el valor de uso/agotamiento del verbo griego en contexto alimentario-sagrado.
