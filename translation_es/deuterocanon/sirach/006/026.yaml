review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego: mantiene el imperativo de acercarse a la sabiduría personificada, conserva «alma», «fuerza» y «sus caminos», y respeta la personificación femenina. Sin embargo, la nota al pie no preserva bien la alternativa documentada en inglés: repite prácticamente la misma formulación principal y no explicita las alternativas léxicas más formales de ambos verbos.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial moderno: «Acércate a ella con toda tu alma, y con toda tu fuerza guarda sus caminos». La sintaxis y el registro funcionan bien. Solo conviene ajustar la nota para que sea útil y fiel al expediente de auditoría.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La personificación femenina de la sabiduría se conserva correctamente con «ella» y «sus». «Alma», «fuerza», «guarda» y «caminos» son opciones adecuadas y legibles.
  issues:
  - severity: medium
    issue: La nota al pie no transmite la alternativa léxica real del expediente inglés.
    rationale: 'La nota actual dice: «O: “Acércate a ella ... y guarda sus caminos”», que repite sustancialmente el texto principal y no refleja la observación inglesa: «Draw near to her ... and guard her ways», es decir, que ambos verbos admiten un matiz más formal. La nota debe ofrecer alternativas reales como «Acércate más a ella / Llega cerca de ella» y «custodia/observa sus caminos», o al menos indicar con claridad que hay opciones más formales para ambos verbos.'
  revised_spanish_text: Acércate a ella con toda tu alma[a], y con toda tu fuerza guarda sus caminos.
  revised_footnotes:
  - marker: a
    text: 'O: «Llega cerca de ella ... y custodia sus caminos». El griego también admite traducciones más formales para ambos verbos.'
    reason: lexical_alternative
