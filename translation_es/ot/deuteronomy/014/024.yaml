translation:
  language: es
  text: Y si el camino es demasiado largo para ti, de modo que no puedas llevarlo, porque el lugar que Yahvé tu Dios escogerá para poner allí su nombre está muy lejos de ti, cuando Yahvé tu Dios te bendiga[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque Yahvé tu Dios te bendiga». El hebreo puede leerse aquí de modo temporal o causal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Si
  lexicon: HALOT
  rationale: La combinación waw + כי introduce una continuación condicional; en español, «Y si» conserva esa continuidad y el valor hipotético sin endurecer el enlace lógico.
- source_word: יִרְבֶּה מִמְּךָ הַדֶּרֶךְ
  english_pob_choice: the journey is too long for you
  chosen_spanish: el camino se alarga demasiado para ti
  alternatives_spanish:
  - el viaje es demasiado largo para ti
  - la distancia es excesiva para ti
  lexicon: HALOT
  rationale: La imagen hebrea dice literalmente que «el camino crece» respecto de la persona; en español, «se alarga demasiado para ti» comunica con naturalidad que la distancia excede tu capacidad práctica, sin perder la idea de exceso de trayecto.
- source_word: לֹא תוּכַל שְׂאֵתוֹ
  english_pob_choice: you are not able to carry it
  chosen_spanish: no puedas llevarlo
  alternatives_spanish:
  - no puedas cargarlo
  - no puedas soportarlo
  lexicon: HALOT
  rationale: En este contexto el objeto implícito es el traslado físico del diezmo/ofrenda. «Llevarlo» mantiene concreción y fluidez en español; «cargarlo» es posible, pero algo más pesado estilísticamente.
- source_word: יִרְחַק מִמְּךָ הַמָּקוֹם
  english_pob_choice: the place ... is too far from you
  chosen_spanish: el lugar ... está muy lejos de ti
  alternatives_spanish:
  - el lugar ... está distante de ti
  - el lugar ... queda lejos de ti
  lexicon: HALOT
  rationale: Se conserva el sentido espacial de רחק con una formulación natural en español. «Muy lejos» expresa la distancia que hace difícil el traslado.
- source_word: אֲשֶׁר יִבְחַר יְהוָה אֱלֹהֶיךָ
  english_pob_choice: that Yahweh your God will choose
  chosen_spanish: que Yahvé tu Dios escogerá
  alternatives_spanish:
  - que Yahvé tu Dios elegirá
  - que Yahvé tu Dios escogerá
  lexicon: HALOT
  rationale: «Escogerá» mantiene el matiz de elección deliberada del lugar central de culto, siguiendo el lenguaje deuteronómico. Se preserva el nombre divino según el estándar del proyecto.
- source_word: לָשׂוּם שְׁמֹו שָׁם
  english_pob_choice: to put his name there
  chosen_spanish: para poner allí su nombre
  alternatives_spanish:
  - para establecer allí su nombre
  - para colocar allí su nombre
  lexicon: HALOT
  rationale: La expresión deuteronómica es un modismo teológico sobre la designación del lugar de adoración. «Poner allí su nombre» reproduce la metáfora con naturalidad en español.
- source_word: כִּי יְבָרֶכְךָ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: when Yahweh your God blesses you
  chosen_spanish: cuando Yahvé tu Dios te bendiga
  alternatives_spanish:
  - porque Yahvé tu Dios te bendiga
  - cuando Yahvé tu Dios te bendice
  lexicon: HALOT
  rationale: Se adopta «cuando» por su función temporal/circunstancial en el flujo legal, siguiendo la lectura preferida en el audit trail inglés. El subjuntivo refleja adecuadamente la contingencia futura del marco legal.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se conserva el nombre divino en forma audible y no se sustituye por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se revisó el estado más reciente del audio-trail inglés: no hubo cambios en la última pasada y el veredicto fue de alta concordancia con observaciones menores. La redacción española sigue la decisión óptima de equivalencia, preservando la ambigüedad de כי en una nota cuando corresponde.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se conserva el tono legal deuteronómico con sintaxis clara y digna.
  - «Lugar» y «su nombre» reproducen el lenguaje cultual del original sin sustituirlo por una paráfrasis interpretativa.
  - «Camino» traduce el hebreo דֶּרֶךְ con valor de distancia/recorrido en este contexto.
