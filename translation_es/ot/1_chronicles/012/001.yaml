translation:
  language: es
  text: Ahora bien, estos son los hombres que vinieron a David en Siclag, mientras aún estaba retenido[a] por causa de Saúl hijo de Cis; y ellos estaban entre los guerreros valientes[b], ayudantes en la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mantenido a distancia» o «confinado» por causa de Saúl hijo de Cis.
    reason: lexical_alternative
  - marker: b
    text: O «entre los valientes»; hebreo gibbôrîm se refiere a guerreros valientes o héroes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estos son
  alternatives_spanish:
  - Y estos son
  - Estos son
  lexicon: HALOT
  rationale: La expresión abre una nueva sección/lista. «Ahora bien» conserva el valor discursivo de introducción y el matiz conjuntivo de וְ sin sonar forzado en español.
- source_word: הַבָּאִים
  english_pob_choice: who came
  chosen_spanish: que vinieron
  alternatives_spanish:
  - los que vienen
  - los que vinieron
  lexicon: HALOT
  rationale: El participio sustantivado identifica al grupo; en español, la relativa «que vinieron» es la forma más natural y precisa en este contexto narrativo.
- source_word: אֶל דָּוִיד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - hacia David
  - para David
  lexicon: HALOT
  rationale: La preposición direccional se vierte de modo directo con «a David», que mantiene el movimiento hacia la persona nombrada.
- source_word: לְצִיקְלַג
  english_pob_choice: at Ziklag
  chosen_spanish: en Siclag
  alternatives_spanish:
  - a Siclag
  - en Ziklag
  lexicon: HALOT
  rationale: En este contexto la localización funciona como marco narrativo del encuentro; «en Siclag» expresa mejor la ubicación donde llegaron a David. Se usa la forma castellana tradicional del topónimo.
- source_word: עוֹד עָצוּר
  english_pob_choice: while he was still kept back
  chosen_spanish: mientras aún estaba retenido
  alternatives_spanish:
  - mientras todavía estaba contenido
  - mientras aún estaba apartado
  lexicon: HALOT
  rationale: La combinación expresa un estado continuo de restricción. «Retenido» conserva la fuerza pasiva y evita precisar más de lo que el hebreo dice.
- source_word: מִפְּנֵי שָׁאוּל בֶּן קִישׁ
  english_pob_choice: because of Saul son of Kish
  chosen_spanish: por causa de Saúl hijo de Cis
  alternatives_spanish:
  - a causa de Saúl hijo de Cis
  - debido a Saúl hijo de Cis
  lexicon: HALOT
  rationale: «מִפְּנֵי» aquí marca la razón de la retención. «Por causa de» reproduce la relación causal de forma transparente y sobria.
- source_word: וְהֵמָּה
  english_pob_choice: and they
  chosen_spanish: y ellos
  alternatives_spanish:
  - y éstos
  - y ellos mismos
  lexicon: HALOT
  rationale: El pronombre resumptivo funciona como reinicio del sujeto. «Y ellos» mantiene la conexión sin añadir énfasis innecesario.
- source_word: בַּגִּבּוֹרִים
  english_pob_choice: among the mighty warriors
  chosen_spanish: entre los valientes
  alternatives_spanish:
  - entre los guerreros valientes
  - entre los poderosos
  lexicon: HALOT
  rationale: גִּבּוֹרִים designa hombres de valor guerrero. «Valientes» comunica bien la fuerza semántica; se evita «mighty men» por sonar menos natural en español.
- source_word: עֹזְרֵי הַמִּלְחָמָה
  english_pob_choice: helpers in war
  chosen_spanish: ayudantes en la guerra
  alternatives_spanish:
  - auxiliadores en la guerra
  - los que ayudan en la guerra
  - ayudantes para la guerra
  lexicon: HALOT
  rationale: La construcción expresa función militar de apoyo. «Ayudantes en la guerra» sigue de cerca el hebreo y conserva la designación funcional sin amplificarla.
translation_notes:
  revision_awareness: El audit trail inglés pasó de «restricted» a «kept back» para expresar con más naturalidad la idea de restricción/exclusión. La versión española sigue esa revisión con «retenido», que conserva el matiz de estar impedido o contenido sin sobreespecificar prisión. También se mantuvo la lectura de grupo guerrero de gibbôrîm, reflejada como «los valientes», con nota alternativa para «hombres valientes/guerreros valientes».
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando aparezca el nombre divino; en este versículo no se presenta.
  - Se mantiene «Saúl hijo de Cis» siguiendo la relación patronímica del hebreo.
  - «Siclag» se adopta como forma castellana tradicional del topónimo, aunque la transliteración académica sería Ziklag.
