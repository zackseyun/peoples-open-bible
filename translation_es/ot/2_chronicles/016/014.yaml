base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/016/014.yaml
  text: They buried him in his tomb[a], which he had cut out for himself in the City of David, and laid him on the bier that had been filled with spices and various blended ointments prepared by a perfumer’s craft[b]; and they made a very great burning for him.
  footnotes:
  - marker: a
    text: Or 'bed' or 'couch'; the Hebrew term refers to a place of lying down, here likely a funerary bier.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression 'they made a great burning for him' likely refers to an honorific burning of spices or aromatics at the funeral, not necessarily cremation of the body.
    reason: cultural_note
