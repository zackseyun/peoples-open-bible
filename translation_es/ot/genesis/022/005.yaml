    text: Or 'we will bow down'; the Hebrew verb can refer more literally to prostrating oneself in worship.
    reason: lexical_alternative
  - marker: b
    text: Abraham says, literally, 'we will return to you.' The text does not explain whether this is concealment, expectation, or confidence in God's provision.
    reason: alternative_reading
