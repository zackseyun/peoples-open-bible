revisions:
- from: Aquel lugar fue llamado el valle de Escol[a][b], por el racimo que los hijos de Israel cortaron de allí[c].
  to: Aquel lugar se llamó el valle de Escol[a][b], por el racimo que los hijos de Israel cortaron de allí[c].
  rationale: Se ajusta la fórmula de nombramiento a un español más idiomático («se llamó») y se corrige la nota c para que ofrezca alternativas reales en lugar de repetir la lectura principal. El resto del texto preserva fielmente el sentido del hebreo y las decisiones del POB inglés.
