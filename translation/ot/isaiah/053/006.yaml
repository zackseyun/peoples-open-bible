id: ISA.53.6
reference: Isaiah 53:6
source:
  edition: WLC
  text: כֻּלָּ֨/נוּ֙ כַּ/צֹּ֣אן תָּעִ֔ינוּ אִ֥ישׁ לְ/דַרְכּ֖/וֹ פָּנִ֑ינוּ וַֽ/יהוָה֙ הִפְגִּ֣יעַ בּ֔/וֹ אֵ֖ת עֲוֺ֥ן כֻּלָּֽ/נוּ׃
translation:
  text: All of us[a], like sheep, have gone astray; each of us has turned to his own way[c][b]; and Yahweh has laid on him the iniquity of us all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each one has turned to his own way.' The Hebrew has the masculine singular 'each man' with distributive force, referring to all people in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD has caused the iniquity of us all to fall on him' or 'to meet on him.' The Hebrew verb can carry the sense of causing something to strike or converge upon someone.
    reason: alternative_reading
  - marker: c
    text: '''Iniquity'' may also be understood as ''guilt'' or, by extension, the liability or punishment associated with guilt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּנוּ
  chosen: All of us
  alternatives:
  - we all
  - all of us together
  lexicon: HALOT
  rationale: Fronted for emphasis in Hebrew; 'All of us' preserves the comprehensive scope and reads naturally in English.
- source_word: כַּצֹּאן
  chosen: like sheep
  alternatives:
  - as sheep
  lexicon: HALOT
  rationale: Standard comparative phrase; 'like sheep' is idiomatic modern English and preserves the simile.
- source_word: תָּעִינוּ
  chosen: have gone astray
  alternatives:
  - have wandered
  - have erred
  lexicon: HALOT
  rationale: The verb conveys straying or wandering from the right path. 'Have gone astray' best fits the sheep imagery and moral context.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine with distributive force. Per doctrine, gender-accurate rendering is preferred over flattening to a neutral term; 'each man' preserves the representative singular while still applying universally in context.
- source_word: לְדַרְכּוֹ
  chosen: to his own way
  alternatives:
  - to his own path
  - in his own direction
  lexicon: HALOT
  rationale: '''Way'' is a common and theologically resonant rendering of דֶּרֶךְ in moral contexts. ''His own'' preserves the selfish, individualized turning.'
- source_word: פָּנִינוּ
  chosen: has turned
  alternatives:
  - turned
  - have turned
  lexicon: HALOT
  rationale: With the distributive singular אִישׁ, English idiom is smoother with singular agreement in the clause ('each man has turned'), while still reflecting the collective first-person sense of the Hebrew verb.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the LORD'.
- source_word: הִפְגִּיעַ בּוֹ
  chosen: has laid on him
  alternatives:
  - has caused to fall on him
  - has made intercession against/with him
  - has placed upon him
  lexicon: HALOT
  rationale: In this causative form with בּוֹ and the object 'iniquity,' the sense is that the LORD caused the iniquity to meet or fall upon him. 'Has laid on him' is clear, idiomatic, and faithful to the context of transferred guilt/burden.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment for iniquity
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. 'Iniquity' preserves the moral weight and traditional theological resonance here without over-specifying whether the focus is act, guilt, or liability.
- source_word: כֻּלָּנוּ
  chosen: of us all
  alternatives:
  - of all of us
  lexicon: HALOT
  rationale: This closing phrase mirrors the opening totality and is rendered idiomatically as 'of us all' to preserve the inclusio.
