review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: imperativos dirigidos a Yahvé, prohibición de airarse por el éxito del malvado, y referencia final al hombre que ejecuta planes. Sin embargo, dos decisiones atenúan matices fuente que el rastro POB sí quiso preservar: «espera en él» no refleja bien el valor de espera paciente/expectante de וְהִתְחוֹלֵל לוֹ, y «no te enojes» debilita la imagen de ardor de אַל תִּתְחַר. Además, falta una nota para la alternativa documentada de la segunda cláusula.'
  spanish_quality_summary: El español es legible y natural, con buen uso de «Yahvé» y una sintaxis clara. No obstante, «Calla» suena algo más estrecho y abrupto que el sentido más amplio de quietud/silencio; «quédate en silencio» o «permanece en silencio» sería posible, pero no imprescindible si se conserva la nota. La mejora principal es hacer más fiel y natural «espera con paciencia en él» y reforzar la metáfora de ira con «no ardas de ira».
  glossary_alignment: 'Alinea bien con la política del proyecto en «Yahvé». No hay otros términos doctrinales clave en disputa. Conviene acercarse más al audit trail inglés en la documentación de alternativas: para וְהִתְחוֹלֵל לוֹ debe preservarse la alternativa de espera anhelante / descanso en él, y para אַל תִּתְחַר la opción tradicional es «no te irrites / no te inquietes», pero el texto principal debe reflejar mejor el ardor.'
  issues:
  - severity: medium
    issue: «y espera en él» subtraduce וְהִתְחוֹלֵל לוֹ
    rationale: El hebreo y el POB inglés apuntan a una espera paciente, incluso anhelante, no solo a una confianza genérica. En español, «espera con paciencia en él» o «aguarda con paciencia en él» preserva mejor el sentido exhortativo.
  - severity: medium
    issue: «no te enojes» debilita la imagen de ardor de אַל תִּתְחַר
    rationale: El audit trail insiste en la metáfora de quemarse/arder con ira. «No ardas de ira» es natural en español bíblico moderno y más fiel que la neutralización «no te enojes».
  - severity: low
    issue: Falta nota para la alternativa léxica de וְהִתְחוֹלֵל לוֹ
    rationale: El POB inglés conserva explícitamente alternativas como «wait longingly» y «rest in him». La revisión española debería retener esa justificación documentada.
  - severity: low
    issue: La nota b actual invierte la relación principal/alternativa
    rationale: En el texto principal aparece «no te enojes», mientras que la nota pone «arde de ira» como alternativa. Dado el criterio del proyecto, conviene que la imagen más literal pase al texto principal y la alternativa más tradicional quede en nota.
  revised_spanish_text: Calla[a] ante Yahvé y espera con paciencia en él[b]; no ardas de ira[c] a causa del que prospera en su camino, a causa del hombre que hace intrigas.
