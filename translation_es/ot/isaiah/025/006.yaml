translation:
  language: es
  text: Yahvé de los Ejércitos preparará en este monte para todos los pueblos un banquete de manjares ricos[a], un banquete de vino añejo; manjares ricos llenos de tuétano, vino añejo bien refinado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un banquete de cosas grasas ... un banquete de vino sobre las lías». La imagen hebrea enfatiza abundancia y lujo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: will make
  chosen_spanish: preparará
  alternatives_spanish:
  - hará
  - dispondrá
  - hará preparar
  lexicon: HALOT
  rationale: En español, para un banquete la idea de «hacer» puede sonar poco natural; «preparará» conserva la acción concreta y el sentido de disposición del banquete sin perder la base verbal de עשה. Mantiene la agencia divina explícita.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio, siguiendo el criterio del proyecto de no sustituir el Tetragrámaton por una mayúscula de título. «Yahvé» es la forma española estable y legible para el nombre.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» comunica directamente el valor semántico de צבאות. Se evita «huestes» por ser más tradicional pero menos transparente para lectores modernos.
- source_word: לְכָל הָעַמִּים
  english_pob_choice: for all the peoples
  chosen_spanish: para todos los pueblos
  alternatives_spanish:
  - para todos los pueblos y naciones
  - para todos los pueblos de la tierra
  lexicon: HALOT
  rationale: «Pueblos» preserva mejor el plural colectivo de עמים que «naciones» en español, y mantiene la amplitud universal del banquete sin borrar la pluralidad de grupos humanos.
- source_word: בָּהָר הַזֶּה
  english_pob_choice: on this mountain
  chosen_spanish: en este monte
  alternatives_spanish:
  - sobre este monte
  - en esta montaña
  lexicon: HALOT
  rationale: «Monte» es una opción bíblica y natural en español; «en este monte» reproduce bien la localización del hebreo sin sonar forzado. «Montaña» sería posible, pero «monte» encaja mejor en este registro profético.
- source_word: מִשְׁתֵּה
  english_pob_choice: a feast
  chosen_spanish: un banquete
  alternatives_spanish:
  - una fiesta
  - un festín
  lexicon: HALOT
  rationale: En español, «banquete» comunica mejor la idea de una comida solemne y abundante. El contexto de los alimentos y el vino favorece esta opción sobre «fiesta».
- source_word: שְׁמָנִים
  english_pob_choice: rich food
  chosen_spanish: manjares ricos
  alternatives_spanish:
  - manjares exquisitos
  - comida abundante
  - alimentos ricos
  lexicon: HALOT
  rationale: El hebreo alude a alimentos grasos/ricos como imagen de abundancia y lujo. «Manjares ricos» conserva esa fuerza imagística sin caer en un calco opaco como «cosas gordas». Se repite luego para mantener la estructura paralela del original.
- source_word: שְׁמָרִים
  english_pob_choice: aged wine
  chosen_spanish: vino añejo
  alternatives_spanish:
  - vino sobre las lías
  - vino madurado
  lexicon: HALOT
  rationale: La imagen apunta a vino reposado y de gran calidad. «Vino añejo» comunica bien el valor positivo en español, mientras que la lectura más literal de «vino sobre las lías» se reserva para nota por ser menos natural como texto principal.
- source_word: מְמֻחָיִם
  english_pob_choice: full of marrow
  chosen_spanish: llenos de médula
  alternatives_spanish:
  - colmados de médula
  - con médula
  - llenos de tuétano
  lexicon: HALOT
  rationale: «Médula» reproduce el campo semántico de tuétano/médula de forma clara y sobria; en este contexto alimentario funciona bien junto a «manjares ricos». Se evita una paráfrasis que diluya la imagen de los mejores cortes.
- source_word: מְזֻקָּקִים
  english_pob_choice: well refined
  chosen_spanish: bien refinado
  alternatives_spanish:
  - bien clarificado
  - bien filtrado
  - purificado
  lexicon: HALOT
  rationale: Para el vino, «bien refinado» comunica la idea de claridad, pureza y esmerada elaboración. Conserva el carácter positivo del participio sin imponer una explicación técnica excesiva.
theological_decisions:
- issue: Alcance universal del banquete escatológico
  english_pob_reading: for all the peoples
  chosen_spanish_reading: para todos los pueblos
  alternative_spanish_readings:
  - para todas las naciones
  - para todos los pueblos y naciones
  rationale: Se preserva el plural de עמים para no borrar la visión universal del texto. «Pueblos» evita reemplazar sin necesidad el matiz colectivo por una formulación más teológica o más abstracta.
  doctrine_reference: Mantener la tensión del texto original; primacía del hebreo sobre la tradición de traducción.
- issue: Tensión entre literalidad e imagen culinaria abundante
  english_pob_reading: rich food ... aged wine ... full of marrow ... well refined
  chosen_spanish_reading: manjares ricos ... vino añejo ... llenos de médula ... bien refinado
  alternative_spanish_readings:
  - manjares grasos
  - comida grasa
  - vino sobre las lías
  - vino madurado
  rationale: La traducción conserva la imaginería de abundancia y lujo sin volverla críptica para el español contemporáneo. No se suaviza la riqueza material del cuadro, porque esa exuberancia forma parte del mensaje profético.
  doctrine_reference: No eliminar la fuerza simbólica del banquete; respetar la imaginería del texto.
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin traducir mecánicamente desde él: se respetó la semántica hebrea de עשה, צבאות, עמים, מִשְׁתֵּה, שְׁמָנִים, שְׁמָרִים, מְמֻחָיִם y מְזֻקָּקִים, y se eligieron equivalentes españoles naturales y transparentes. No hubo revisiones previas que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Nombre divino.
  - «Ejércitos» mantiene la transparencia del título צְבָאוֹת frente a «huestes».
  - «Pueblos» conserva el plural colectivo de עמים.
  - 'La paralelización del hebreo se preserva con dos miembros principales: banquete de manjares ricos / banquete de vino añejo, seguido de los rasgos explicativos.'
  - «Médula» y «vino añejo» mantienen una imagen rica pero comprensible para lectura eclesial contemporánea.
