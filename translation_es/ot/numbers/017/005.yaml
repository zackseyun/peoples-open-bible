  to: como un recordatorio para los hijos de Israel[a], para que ningún ajeno[b], que no sea de la descendencia de Aarón, se acerque a quemar incienso delante de Yahvé, y para que no llegue a ser como Coré y como su compañía, tal como Yahvé habló por medio de Moisés[c] a este[d].
