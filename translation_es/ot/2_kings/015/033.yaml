translation:
  language: es
  text: Tenía veinticinco años cuando comenzó a reinar, y reinó dieciséis años en Jerusalén. El nombre de su madre fue Jerusá[a], hija de Sadoc.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jerusá también puede aparecer como Jerushá en algunas traducciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: twenty-five years old
  chosen_spanish: veinticinco años
  alternatives_spanish:
  - un hijo de veinticinco años
  lexicon: HALOT
  rationale: Es el modismo hebreo de edad; en español natural se expresa simplemente con la edad, sin añadir "hijo". "Tenía veinticinco años" preserva el sentido idiomático y la lectura pública.
- source_word: הָיָה בְמָלְכֹו
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - cuando reinó
  lexicon: HALOT
  rationale: La construcción hebrea introduce la edad al acceder al trono. "Comenzó a reinar" conserva el valor inceptivo que el inglés POB ya identificó y suena natural en español.
- source_word: וְשֵׁשׁ עֶשְׂרֵה שָׁנָה מָלַךְ
  english_pob_choice: and he reigned sixteen years
  chosen_spanish: y reinó dieciséis años
  alternatives_spanish:
  - y gobernó dieciséis años
  lexicon: HALOT
  rationale: '"Reinó" es el equivalente directo del verbo de reinar en este contexto regnal. Mantiene el paralelismo de la fórmula histórica sin sobreinterpretar el término.'
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español bíblico; no requiere transliteración especial.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre fue
  alternatives_spanish:
  - Su madre se llamaba
  lexicon: HALOT
  rationale: Se conserva la fórmula histórica hebrea con sintaxis española clara. "Fue" mantiene el tono de registro genealógico/narrativo.
- source_word: יְרוּשָׁא
  english_pob_choice: Jerusha
  chosen_spanish: Jerusá
  alternatives_spanish:
  - Jerusha
  - Jerushá
  lexicon: HALOT
  rationale: Se translitera el nombre propio con acento final para lectura española. La forma alternativa inglesa Jerushah se refleja en la nota; no se fuerza una grafía tradicional inexistente en español.
- source_word: בַּת צָדוֹק
  english_pob_choice: daughter of Zadok
  chosen_spanish: hija de Sadoc
  alternatives_spanish:
  - hija de Zadoc
  lexicon: HALOT
  rationale: Se mantiene la relación filial literal. Se usa "Sadoc" como forma española bíblica establecida del nombre, en vez de una transliteración cruda.
translation_notes:
  revision_awareness: El texto hebreo y el audito inglés están en alto acuerdo y no muestran revisiones problemáticas; se mantuvo la fórmula regnal sin cambios interpretativos añadidos.
  spanish_consistency_notes:
  - Se conserva el registro histórico sobrio propio de una nota regnal.
  - No se usa "SEÑOR" ni terminología teológica ajena al versículo.
  - '"Jerusá" y "Sadoc" mantienen una españolización coherente con nombres bíblicos comunes.'
