revisions:
- from: Y edificó altares para todo el ejército de los cielos en los dos atrios de la casa de Yahvé[a].
  to: Construyó altares para todo el ejército celestial en los dos atrios de la casa de Yahvé[a].
  rationale: Se elimina la conjunción inicial para reflejar mejor el flujo narrativo natural del español. Se cambia «ejército de los cielos» por «ejército celestial» para mayor claridad y naturalidad sin perder el sentido cultual del hebreo. Se conserva la nota con una alternativa más formalmente cercana al hebreo («hueste de los cielos») para preservar la gama semántica documentada por el POB inglés.
