translation:
  language: es
  text: 'Y dijo[a]: «Hagar, esclava de Sarai, ¿de dónde has venido y adónde vas?» Y ella dijo[b]: «Estoy huyendo de la presencia de Sarai, mi señora».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la esclava mujer». El hebreo destaca aquí la condición servil femenina de Hagar bajo Sarai.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de la presencia de Sarai, mi señora».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁפְחַת
  english_pob_choice: slave woman
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  - criada esclava
  lexicon: HALOT
  rationale: שִׁפְחָה señala una mujer en condición servil. En español, «esclava» conserva con mayor fuerza ese estatus que «sierva» o «criada», y por eso sigue la decisión auditada de no suavizar el término.
- source_word: אֵי מִזֶּה
  english_pob_choice: where have you come from
  chosen_spanish: ¿de dónde has venido?
  alternatives_spanish:
  - ¿de dónde vienes?
  - ¿de dónde has llegado?
  lexicon: HALOT
  rationale: La expresión pregunta por el origen. «¿De dónde has venido?» es natural en español y mantiene el sentido idiomático del hebreo sin añadir información.
- source_word: וְאָ֣נָה תֵלֵ֑כִי
  english_pob_choice: and where are you going
  chosen_spanish: ¿adónde vas?
  alternatives_spanish:
  - ¿a dónde vas?
  - ¿adónde irás?
  lexicon: HALOT
  rationale: אָנָה con הלך pregunta por el destino. «¿Adónde vas?» conserva la dirección de la pregunta y suena idiomático en diálogo directo.
- source_word: מִ/פְּנֵי
  english_pob_choice: from the presence of
  chosen_spanish: de la presencia de
  alternatives_spanish:
  - de delante de
  - lejos de
  lexicon: HALOT
  rationale: El hebreo literalmente dice «de la presencia/rostro de». En esta escena marca separación de una persona; por eso «de la presencia de» refleja mejor la fuerza de la frase que un simple «de».
- source_word: גְּבִרְתִּי
  english_pob_choice: my mistress
  chosen_spanish: mi señora
  alternatives_spanish:
  - mi dueña
  - mi ama
  lexicon: HALOT
  rationale: La forma femenina denota superioridad social/autoridad sobre Hagar. «Mi señora» comunica la relación de subordinación con claridad en español, sin introducir un matiz sexual que «mistress» podría evocar en algunos contextos modernos en inglés.
- source_word: בֹּרַֽחַת
  english_pob_choice: I am fleeing
  chosen_spanish: estoy huyendo
  alternatives_spanish:
  - huye
  - estoy escapando
  lexicon: HALOT
  rationale: El participio expresa una acción en curso. «Estoy huyendo» mantiene el valor durativo y la gravedad de la huida mejor que un presente simple.
- source_word: הָגָר
  english_pob_choice: Hagar
  chosen_spanish: Hagar
  lexicon: HALOT
  rationale: Nombre propio transliterado según la convención del proyecto.
- source_word: שָׂרַי
  english_pob_choice: Sarai
  chosen_spanish: Sarai
  lexicon: HALOT
  rationale: Nombre propio transliterado según la convención del proyecto.
theological_decisions:
- issue: Si explicitar al mensajero de Yahvé en el texto principal
  english_pob_reading: And he said
  chosen_spanish_reading: Y dijo
  alternative_spanish_readings:
  - Y el ángel de Yahvé dijo
  - Y él dijo
  rationale: El hebreo de este versículo no repite el título del mensajero; por eso el texto español conserva la forma breve y no importa una identificación adicional que pertenece al contexto inmediato del versículo anterior.
  doctrine_reference: Translation philosophy §1
- issue: Cómo verter מִפְּנֵי en relación con el escape de Hagar
  english_pob_reading: from the presence of
  chosen_spanish_reading: de la presencia de
  alternative_spanish_readings:
  - de delante de
  - alejándome de
  rationale: La frase preserva la relación personal y espacial de la huida. «De la presencia de» mantiene la tensión documental entre cercanía física y separación relacional que el hebreo expresa.
  doctrine_reference: HALOT; translation philosophy §1
- issue: Cómo reflejar el estatus de Hagar frente a Sarai
  english_pob_reading: slave woman
  chosen_spanish_reading: esclava
  alternative_spanish_readings:
  - sierva
  - servidora
  rationale: La línea narrativa subraya la condición servil de Hagar bajo Sarai. «Esclava» evita suavizar el dato social que el hebreo hace explícito.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del audit trail inglés y conserva la revisión más reciente al reflejar explícitamente «de la presencia de» para מִפְּנֵי. También mantiene el tratamiento directo de Hagar como mujer en condición servil, evitando suavizar שִׁפְחַת con un término más eufemístico.
  spanish_consistency_notes:
  - Se mantiene Yahvé en el proyecto, pero en este versículo el hebreo no contiene יהוה; por eso no se introduce ningún equivalente divino.
  - Se usó «esclava» para שִׁפְחַת en coherencia con la política del proyecto de preservar la fuerza léxica de los términos de servidumbre.
  - «Mi señora» se eligió por claridad natural en español; la nota conserva la literalidad relacional de גְּבִרְתִּי.
  - Los signos de diálogo y la puntuación siguen el uso editorial en español bíblico moderno.
