translation:
  language: es
  text: Yahvé escuchó a Ezequías y sanó al pueblo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oyó a Ezequías». El verbo hebreo puede significar «oír» o «escuchar/responder favorablemente» en esta construcción.
    reason: lexical_alternative
  - marker: b
    text: «Sanó» puede referirse a la remoción por parte de Yahvé de la aflicción o del juicio asociado con el estado ritual impropio del pueblo, no necesariamente solo a una enfermedad física.
    reason: theological_note
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: listened
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - escuchó favorablemente
  lexicon: HALOT
  rationale: En esta construcción con אֶל, שׁמע puede expresar no solo oír, sino atender favorablemente. «Escuchó» conserva esa respuesta relacional mejor que un mero «oyó», y evita una perífrasis demasiado explicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio «Yahvé», siguiendo la decisión terminológica del proyecto y preservando el nombre divino en vez de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca aquí el destinatario de la escucha. En español, «escuchó a Ezequías» expresa de manera natural esa relación.
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías el rey
  lexicon: standard proper-name convention
  rationale: Nombre propio usual en español bíblico; no requiere transliteración.
- source_word: וַיִּרְפָּא
  english_pob_choice: healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - restauró
  lexicon: HALOT
  rationale: רפא normalmente significa «sanar/curar». «Sanó» es una equivalencia natural y fiel; mantiene abierta la referencia tanto a una sanidad física como a la remoción de la aflicción o juicio, sin resolver la tensión del pasaje.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la comunidad
  lexicon: HALOT
  rationale: «Pueblo» corresponde bien al colectivo de Israel reunido en contexto cultual y es más preciso que «gente».
theological_decisions:
- issue: Alcance de «sanó al pueblo»
  english_pob_reading: Retain the healing language as stated, without narrowing it to physical healing only.
  chosen_spanish_reading: Mantener el lenguaje de sanidad sin reducirlo a una curación física exclusiva.
  alternative_spanish_readings:
  - perdonó al pueblo
  - los restauró
  - los libró
  rationale: El contexto inmediato habla de la participación irregular en la Pascua y de la oración de Ezequías por ellos, pero el texto hebreo usa רפא. «Sanó» preserva esa imagen verbal y deja abierta la posibilidad de que se trate de la remoción de una aflicción o juicio, no solo de una enfermedad corporal.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de resolverla de antemano.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no introduce cambios y mantiene alto acuerdo con la evaluación cruzada. No se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se prefirió «sanó» sobre «curó» o «restauró» para mantener la fuerza verbal de רפא sin interpretar en exceso.
  - El verso se presenta en una frase simple y publicable, sin añadir elementos no presentes en el hebreo.
