translation:
  language: es
  text: El que presta atención a un asunto hallará el bien[a], y bienaventurado[b] es el que confía en Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obra con prudencia respecto de un asunto» o «el que es prudente en un asunto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bienaventurado es él»; el masculino singular es genérico y se refiere a cualquier persona que confía en Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּיל
  english_pob_choice: gives careful attention
  chosen_spanish: presta atención
  alternatives_spanish:
  - obra con prudencia
  - actúa sabiamente
  - considera con prudencia
  lexicon: HALOT
  rationale: El participio hifil de שׂכל puede expresar actuar con entendimiento, obrar con prudencia o prestar atención con discernimiento. En este proverbio, unido a עַל דָּבָר, el matiz activo y atento se comunica mejor en español con «presta atención», que mantiene la idea de consideración cuidadosa sin volverla demasiado abstracta.
- source_word: עַל דָּבָר
  english_pob_choice: to a matter
  chosen_spanish: a un asunto
  alternatives_spanish:
  - sobre un asunto
  - con respecto a un asunto
  - a una cosa
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra», «cosa» o «asunto». Aquí el contexto sapiencial habla de tratar una cuestión con discernimiento, por eso «asunto» resulta más natural en español. La preposición עַל se refleja de manera idiomática con «a», sin perder la orientación hacia el asunto considerado.
- source_word: יִמְצָא טוֹב
  english_pob_choice: will find good
  chosen_spanish: encontrará bien
  alternatives_spanish:
  - hallará bien
  - obtendrá bien
  - encontrará prosperidad
  lexicon: HALOT
  rationale: 'מָצָא conserva su valor básico de «hallar/encontrar», y טוֹב es amplio: bien, beneficio, bienestar. «Encontrará bien» preserva la concisión del hebreo y evita reducir el resultado a prosperidad material, manteniendo la amplitud semántica del texto.'
- source_word: וּבוֹטֵחַ
  english_pob_choice: and ... who trusts
  chosen_spanish: el que confía
  alternatives_spanish:
  - el que se fía
  - el que deposita su confianza
  - y el que confía
  lexicon: HALOT
  rationale: El participio funciona de manera genérica y paralela al primer miembro. En español, una relativa sustantivada («el que confía») comunica con naturalidad la forma proverbial sin añadir elementos ajenos al hebreo.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahveh
  - en el Señor
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde conforme a la norma del proyecto como «Yahvé». «En Yahvé» conserva el nombre divino explícito del hebreo y evita la sustitución por un título genérico.
- source_word: אַשְׁרָיו
  english_pob_choice: blessed is he
  chosen_spanish: bienaventurado es
  alternatives_spanish:
  - dichoso es
  - feliz es
  - bendecido es
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa una condición de bienaventuranza o dicha favorable, no simplemente emoción subjetiva. «Bienaventurado es» mantiene ese valor de beatitud proverbial en un español reverente y claro.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El versículo usa directamente el Tetragrámaton. Siguiendo la norma del proyecto, se preserva el nombre personal de Dios en lugar de sustituirlo por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de אַשְׁרֵי/אַשְׁרָיו como beatitud
  english_pob_reading: blessed is he
  chosen_spanish_reading: bienaventurado es
  alternative_spanish_readings:
  - feliz es
  - dichoso es
  rationale: La expresión no describe mero estado anímico, sino la condición de quien goza del favor y la dicha de Dios. «Bienaventurado» conserva esa fuerza sapiencial y bíblica.
  doctrine_reference: Uso bíblico de expresiones de beatitud en literatura sapiencial
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantuvo la lectura estable. El español refleja esa estabilidad, conservando el paralelismo proverbial y el nombre divino explícito en Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se eligió una estructura proverbial natural en español («El que...») para reflejar el participio hebreo sin perder genericidad.
  - «Bien» se dejó deliberadamente amplio para no restringir טוֹב a prosperidad material.
  - La elección de «bienaventurado» conserva la fuerza de beatitud del hebreo אַשְׁרֵי.
