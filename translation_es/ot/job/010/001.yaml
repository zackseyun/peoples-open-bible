translation:
  language: es
  text: Mi alma aborrece mi vida[a]; daré rienda suelta a mi queja[b]; hablaré en la amargura de mi alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi alma está cansada de mi vida». El verbo hebreo puede expresar tanto hartazgo como aborrecimiento intenso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «soltaré mi queja». El modismo hebreo indica que Job ya no contendrá su lamento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָקְטָה
  english_pob_choice: loathes
  chosen_spanish: aborrece
  alternatives_spanish:
  - está cansada de
  - siente repulsión por
  - detesta
  lexicon: HALOT
  rationale: El verbo expresa una mezcla de hastío, rechazo y repulsión intensa. «Aborrece» comunica mejor esa fuerza emocional en español que una opción más débil como «está cansada de».
- source_word: נַפְשִׁי
  english_pob_choice: My soul
  chosen_spanish: Mi alma
  alternatives_spanish:
  - yo
  - mí mismo
  - mi ser
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere al yo interior y conserva el paralelismo retórico del verso. «Mi alma» mantiene la imagen hebrea y la intensidad afectiva mejor que reducirlo a «yo».
- source_word: בְּחַיָּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mientras viva
  - mi vivir
  lexicon: HALOT
  rationale: Con la preposición, la frase apunta a la vida de Job como aquello de lo que habla el verbo. «Mi vida» es la forma natural y fiel en español.
- source_word: אֶעֶזְבָה
  english_pob_choice: I will give free course to
  chosen_spanish: dejaré correr libremente
  alternatives_spanish:
  - soltaré
  - daré rienda suelta a
  - abandonaré
  lexicon: HALOT
  rationale: En este modismo el verbo no significa simplemente «dejar» sino soltar sin restricción. «Dejaré correr libremente» conserva la idea de desatar la queja sin volverla demasiado interpretativa.
- source_word: עָלַי
  english_pob_choice: to
  chosen_spanish: mi
  alternatives_spanish:
  - sobre mí
  - contra mí
  - a
  lexicon: HALOT
  rationale: En la construcción con אֶעֶזְבָה y שִׂיחִי, el hebreo funciona de manera idiomática con el objeto de la queja. En español, «mi queja» expresa con naturalidad el sentido de la frase.
- source_word: שִׂיחִי
  english_pob_choice: my complaint
  chosen_spanish: mi queja
  alternatives_spanish:
  - mi lamento
  - mi meditación
  - mi queja interior
  lexicon: HALOT
  rationale: En el contexto de lamento de Job, שִׂיחַ se refiere a la queja o lamento doloroso, no a una meditación neutra. «Queja» es breve y adecuada; «lamento» también sería viable.
- source_word: אֲדַבְּרָה
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - hablaré yo
  - me pondré a hablar
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución. «Hablaré» transmite bien esa intención decidida sin añadir coloración innecesaria.
- source_word: בְּמַר
  english_pob_choice: in the bitterness of
  chosen_spanish: en la amargura de
  alternatives_spanish:
  - desde la amargura de
  - con la amargura de
  - en lo amargo de
  lexicon: HALOT
  rationale: La preposición más el sustantivo señalan el ámbito o manera emocional del habla. «En la amargura de» es una equivalencia natural y conservadora.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi ser
  - mi interior
  - yo
  lexicon: HALOT
  rationale: La repetición final retiene la intensidad emotiva y el paralelismo del hebreo. «Mi alma» es la opción más fiel y reconocible en español.
translation_notes:
  revision_awareness: Se mantuvo la lectura y el tono del borrador inglés auditado, pero se ajustó a un español más natural y publicable. Se preservó la tensión léxica de נָקְטָה como rechazo intenso/hastío mediante «aborrece», y el modismo de אֶעֶזְבָה con una nota alternativa que refleja la posibilidad de «soltar» o «dar rienda suelta».
  spanish_consistency_notes:
  - Se mantiene «alma» para נֶפֶשׁ en ambas apariciones por cohesión retórica.
  - Se conservó la primera persona singular en todo el verso para reflejar la resolución del hablante.
  - «Queja» se usa de modo consistente para שִׂיחַ en este contexto de lamento, con la alternativa «lamento» indicada en la nota.
  - La puntuación reproduce el paralelismo de dos puntos del hebreo con punto y coma en español.
