translation:
  language: es
  text: 'Ahora bien, la casa de Saúl tenía un siervo llamado Ziba, y lo llamaron ante David. Entonces el rey le dijo: «¿Eres tú Ziba?». Y él respondió: «Tu siervo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente, «Soy tu siervo». La respuesta hebrea es elíptica: «Tu siervo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/בֵית שָׁאוּל
  english_pob_choice: Now the house of Saul had
  chosen_spanish: Ahora bien, en la casa de Saúl había
  alternatives_spanish:
  - Y para la casa de Saúl había
  - Ahora bien, perteneciente a la casa de Saúl había
  lexicon: HALOT
  rationale: La construcción preposicional hebrea introduce existencia/posesión en la casa de Saúl. En español, «había» comunica de forma natural esa función narrativa, y «Ahora bien» refleja el waw de enlace al iniciar la escena.
- source_word: עֶבֶד
  english_pob_choice: a servant
  chosen_spanish: un esclavo
  alternatives_spanish:
  - un siervo
  - un servidor
  lexicon: HALOT
  rationale: El término עבד puede abarcar «siervo» o «esclavo». Aquí se trata de un miembro subordinado de la casa de Saúl; para mantener la fuerza léxica sin suavizarla, se traduce «esclavo».
- source_word: וּשְׁמוֹ צִיבָא
  english_pob_choice: whose name was Ziba
  chosen_spanish: llamado Siba
  alternatives_spanish:
  - y su nombre era Siba
  - cuyo nombre era Siba
  lexicon: HALOT
  rationale: La fórmula hebrea es idiomática; en español, «llamado Siba» fluye con naturalidad y conserva la identificación del personaje. Se emplea «Siba» como forma española del nombre.
- source_word: וַיִּקְרְאוּ ל֖וֹ אֶל דָּוִד
  english_pob_choice: and they called him to David
  chosen_spanish: y lo llamaron a David
  alternatives_spanish:
  - y lo convocaron ante David
  - y lo llamaron ante David
  lexicon: HALOT
  rationale: El verbo קרא con el complemento de destino expresa convocarlo para comparecer ante David. «Lo llamaron a David» sigue de cerca el hebreo y conserva la sencillez narrativa.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Título definido normal de David en el relato.
- source_word: הַאַתָּה צִיבָא
  english_pob_choice: Are you Ziba?
  chosen_spanish: ¿Tú eres Siba?
  alternatives_spanish:
  - ¿Eres Siba?
  - ¿Acaso tú eres Siba?
  lexicon: HALOT
  rationale: La interrogación hebrea se vierte naturalmente como pregunta directa. Se conserva el pronombre explícito para reflejar el énfasis y la identificación personal.
- source_word: עַבְדֶּךָ
  english_pob_choice: Your servant
  chosen_spanish: Tu esclavo
  alternatives_spanish:
  - Tu siervo
  - Soy tu esclavo
  lexicon: HALOT
  rationale: 'La respuesta hebrea es elíptica: literalmente, «tu esclavo». Mantener la elipsis preserva la brevedad cortés del hebreo y la tensión entre autoidentificación y sumisión deferente.'
theological_decisions:
- issue: Término social de עֶבֶד / עַבְדֶּךָ
  english_pob_reading: a servant / Your servant
  chosen_spanish_reading: un esclavo / Tu esclavo
  alternative_spanish_readings:
  - un siervo / Tu siervo
  - un servidor / Tu servidor
  rationale: 'No hay una cuestión doctrinal explícita, pero sí una decisión lexical con implicación social: el hebreo usa el vocabulario de esclavitud/servidumbre. Para no atenuar la fuerza del término, se conserva «esclavo», mientras que la forma final elíptica mantiene el tono reverente del diálogo.'
  doctrine_reference: Lexical force in social-historical context
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés sin depender mecánicamente de él: se mantuvo la estructura narrativa hebrea, se conservó la fuerza de עבד como «esclavo» y se respetó la respuesta elíptica de cortesía del hebreo.'
  spanish_consistency_notes:
  - Se usó «Siba» para el nombre propio, coherente con la forma española habitual del hebreo צִיבָא.
  - Se evitó «SEÑOR» porque aquí el referente es «el rey» humano, David.
  - La puntuación y comillas siguen normas del español moderno de lectura bíblica.
