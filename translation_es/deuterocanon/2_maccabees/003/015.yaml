  to: Pero los sacerdotes, habiéndose arrojado ante el altar con sus vestiduras sacerdotales, invocaban al cielo[a] a aquel que había legislado acerca de los depósitos[b], para que guardara estas cosas a salvo para quienes las habían depositado.
  rationale: Se corrige el anclaje de la nota [a] para que corresponda a «al cielo», que es el punto léxico-teológico comentado. Se mejora la naturalidad de σῶα διαφυλάξαι con «guardar estas cosas a salvo», manteniendo el sentido de preservarlas de pérdida o daño. Los demás elementos clave del original y del POB inglés quedan preservados.
