translation:
  language: es
  text: Pero tú[a], Israel, mi siervo, Jacob, a quien he elegido, descendencia de Abraham, mi amigo—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el que me ama».
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Pero en cuanto a ti
  lexicon: HALOT
  rationale: La conjunción con el pronombre independiente introduce contraste fuerte con el contexto inmediato; en español, «Pero tú» conserva esa oposición de forma natural y fiel.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio conservado por transliteración estándar.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: POB documenta que עבד puede tener fuerza de esclavo/siervo; aquí el texto hebreo y la política terminológica favorecen mantener la dureza lexical de «esclavo». Aunque «siervo» es más tradicional en español eclesiástico, «esclavo» preserva mejor el valor léxico cuando se habla de la relación de pertenencia y servicio a Yahvé.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: HALOT
  rationale: Nombre propio conservado; funciona en aposición con Israel.
- source_word: אֲשֶׁר בְּחַרְתִּיךָ
  english_pob_choice: whom I have chosen
  chosen_spanish: a quien he elegido
  alternatives_spanish:
  - a quien escogí
  lexicon: HALOT
  rationale: El perfectivo hebreo expresa acción completada con vigencia; el presente perfecto español comunica bien la elección divina realizada y vigente. «Elegido» mantiene el matiz electivo sin sonar forzado.
- source_word: זֶרַע אַבְרָהָם
  english_pob_choice: offspring of Abraham
  chosen_spanish: descendencia de Abraham
  alternatives_spanish:
  - linaje de Abraham
  - simiente de Abraham
  lexicon: HALOT
  rationale: זֶרַע es colectivo singular. «Descendencia» preserva ese carácter corporativo y es idiomática en español; «simiente» sería más calco y menos natural.
- source_word: אֹהֲבִי
  english_pob_choice: my friend
  chosen_spanish: mi amigo
  alternatives_spanish:
  - el que me ama
  - mi amado
  lexicon: HALOT
  rationale: Se mantiene la lectura relacional que POB documenta para Abraham. «Mi amigo» comunica la relación íntima de pacto sin borrar la alternativa literal, que se conserva en nota.
theological_decisions:
- issue: Sentido de אֹהֲבִי aplicado a Abraham
  english_pob_reading: my friend
  chosen_spanish_reading: mi amigo
  alternative_spanish_readings:
  - el que me ama
  rationale: La ambigüedad del participio con sufijo de primera persona es real. En contexto, la expresión puede funcionar idiomáticamente como relación de amistad/pacto, no solo como descripción verbal. «Mi amigo» refleja esa lectura recibida y mantiene la tensión con la alternativa más literal.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica y lexical)
- issue: Elección del término para עבד
  english_pob_reading: my servant
  chosen_spanish_reading: mi esclavo
  alternative_spanish_readings:
  - mi siervo
  rationale: La política terminológica del proyecto prioriza «esclavo» cuando el hebreo עבד sostiene el peso léxico de dependencia/pertenencia. Aquí no hay razón de contexto suficiente para suavizarlo a «siervo», pues el título forma parte de la identificación de Israel como propiedad/servidumbre de Yahvé.
  doctrine_reference: 'Project terminology defaults: δοῦλος / עבד -> esclavo'
translation_notes:
  revision_awareness: El pasaje coincide muy estrechamente con el texto base y la revisión más reciente indicó que no eran necesarios cambios; la versión española mantiene esa estabilidad, trasladando la misma decisión de POB sobre la ambigüedad de אֹהֲבִי y la fuerza de עבד al español con terminología auditable.
  spanish_consistency_notes:
  - Se mantiene el nombre divino del proyecto como Yahvé en la terminología, aunque este versículo no lo contiene explícitamente.
  - «Descendencia» se usa como singular colectivo, en línea con el valor de זֶרַע.
  - La nota de pie preserva la alternativa literal sin eliminar la lectura relacional principal.
  - Se evita «SEÑOR» como sustituto del nombre divino porque no aparece en este versículo, y no hay base para introducir una máscara terminológica.
