translation:
  language: es
  text: Vivo yo[a], declara el Señor Yahvé, que este proverbio no volverá a usarse[b] entre ustedes en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Juramento idiomático hebreo: literalmente, «Si este proverbio todavía fuera para ustedes en Israel», con el sentido de «Ciertamente este proverbio ya no volverá a usarse entre ustedes en Israel».'
    reason: lexical_alternative
  - marker: b
    text: O «citarse» o «pronunciarse»; el verbo hebreo se refiere a emplear un proverbio o dicho proverbial.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֕נִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Tan cierto como que vivo
  - Por mi vida
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento idiomático. «Vivo yo» conserva la forma breve y solemne del original sin añadir explicación innecesaria, y comunica con naturalidad el juramento divino en español.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - pronuncia
  lexicon: HALOT
  rationale: Es la fórmula profética estándar de introducción de un dicho autoritativo. «Declara» mantiene el tono formal y la función de anuncio solemne.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahveh
  - el Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina el título אדני con el nombre divino YHWH. En español, el proyecto pide rendir YHWH como «Yahvé»; por eso se mantiene «el Señor Yahvé» para reflejar ambos elementos sin ocultar el nombre propio divino.
- source_word: אִם יִהְיֶה לָכֶם עוֹד
  english_pob_choice: shall no longer be
  chosen_spanish: no volverá a usarse
  alternatives_spanish:
  - ya no existirá para ustedes
  - no seguirá siendo usado por ustedes
  lexicon: HALOT
  rationale: En juramentos, אִם puede funcionar con fuerza elíptica de negación. La idea no es solo existencia futura, sino cese de uso del proverbio; por eso «no volverá a usarse» expresa con claridad la fuerza idiomática.
- source_word: מְשֹׁל הַמָּשָׁל הַזֶּה
  english_pob_choice: this proverb shall ... be used
  chosen_spanish: este proverbio
  alternatives_spanish:
  - este dicho
  - esta parábola
  lexicon: HALOT
  rationale: מָשָׁל aquí designa un proverbio o dicho proverbial circulante. «Proverbio» es el equivalente más preciso y natural en español para este contexto.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: entre ustedes en Israel
  alternatives_spanish:
  - en Israel
  - en medio de Israel
  lexicon: HALOT
  rationale: El hebreo señala el ámbito social de circulación del proverbio. «Entre ustedes en Israel» conserva la referencia local y el matiz de uso comunitario de forma clara en español.
theological_decisions:
- issue: Renderizado de YHWH en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahveh
  rationale: El texto hebreo contiene el Tetragrama y el proyecto español usa «Yahvé» para YHWH. Aunque el inglés auditado usa «Lord GOD» por convención tipográfica, en español se conserva el nombre divino explícito para no enmascarar el original y mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión reciente indica que no hubo cambios en el archivo inglés de base y que el estado quedó en alta concordancia, con solo observaciones menores. Esta propuesta sigue la lectura inglesa auditada, pero ajusta la forma divina al estándar español del proyecto («Yahvé») y hace explícita en la nota la fuerza idiomática del juramento hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para YHWH, conforme al estándar del proyecto en español.
  - «Señor» se conserva como equivalente de אֲדֹנָי, distinguiéndolo del nombre divino.
  - «Proverbio» traduce מָשָׁל en su sentido de dicho proverbial, no de parábola narrativa.
  - La negación idiomática se expresa con «no volverá a usarse» para reflejar el cese efectivo del dicho.
