translation:
  language: es
  text: Entonces Esaú se estableció en la región montañosa de Seír[a]; Esaú es Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''vivió en la región montañosa de Seír'' o ''habitó en el monte Seír''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: settled
  chosen_spanish: habitó
  alternatives_spanish:
  - se estableció
  - residió
  - vivió
  lexicon: HALOT
  rationale: El hebreo de ישׁב en narración puede expresar residencia estable. En español, 'habitó' comunica con naturalidad la permanencia en un lugar sin forzar una imagen más técnica; 'se estableció' sería más explícito, pero menos directo.
- source_word: בְּהַר
  english_pob_choice: in the hill country of
  chosen_spanish: en la región montañosa de
  alternatives_spanish:
  - en el monte de
  - en la montaña de
  - en la sierra de
  lexicon: HALOT
  rationale: Aquí הַר no exige una sola montaña, sino una zona montañosa vinculada a Seír. 'Región montañosa' conserva ese valor geográfico y evita la impresión de un pico único.
- source_word: שֵׂעִיר
  english_pob_choice: Seir
  chosen_spanish: Seír
  alternatives_spanish:
  - Seir
  lexicon: nombre propio
  rationale: Se conserva el nombre propio con transliteración española habitual, adaptando la acentuación gráfica al español.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: nombre propio
  rationale: Se usa la forma castellana tradicional y reconocible del nombre propio, con tilde por la acentuación del español.
- source_word: הוּא אֱדֹום
  english_pob_choice: is Edom
  chosen_spanish: es Edom
  alternatives_spanish:
  - o sea, Edom
  - o sea Edom
  - es decir, Edom
  lexicon: HALOT
  rationale: La cláusula identifica a Esaú con Edom. 'Es Edom' mantiene la identificación directa del hebreo sin añadir glosa interpretativa.
translation_notes:
  revision_awareness: El inglés POB optó por 'settled in the hill country of Seir' con nota para alternativas léxicas ('lived', 'dwelt'). La versión española sigue esa decisión de residencia estable y conserva la ambigüedad geográfica de הַר mediante 'región montañosa'. No se detectaron revisiones textuales relevantes en el expediente auditado.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera del versículo; no aplica.
  - La identificación final 'Esaú es Edom' conserva la nota genealógica del hebreo sin explicitarla más allá del texto.
  - Se evita 'Señor' o formulaciones litúrgicas porque el texto no contiene el nombre divino ni κύριος.
  - La nota al pie ofrece equivalentes españoles genuinos para el campo semántico de ישׁב y הַר, siguiendo el patrón del POB inglés.
