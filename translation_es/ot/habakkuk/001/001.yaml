translation:
  language: es
  text: El oráculo[a] que vio Habacuc, el profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "carga" o "pronunciamiento". Hebreo massaʾ es un encabezamiento profético para un mensaje solemne y de peso.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשָׂא
  english_pob_choice: the oracle
  chosen_spanish: la profecía
  alternatives_spanish:
  - el oráculo
  - la carga
  - el pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, מַשָּׂא puede designar un mensaje revelado y solemne. En español, "profecía" comunica bien el género del enunciado inicial sin sugerir de entrada una carga emocional humana. "Oráculo" es posible, pero en español bíblico puede sonar más técnico o menos natural; "carga" sería demasiado literal y potencialmente ambiguo.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La partícula relativa solo enlaza el encabezamiento con la visión comunicada; "que" es la equivalencia natural y sobria en español.
- source_word: חָזָה
  english_pob_choice: saw
  chosen_spanish: tuvo en visión
  alternatives_spanish:
  - vio
  - recibió en visión
  - contempló
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente "ver", pero en contexto profético remite a recibir revelación. En español, "tuvo en visión" conserva el carácter visionario sin volverlo mecánicamente literal ni perder la dimensión profética. "Vio" sería más directo, pero menos explícito para lectores modernos; "recibió en visión" añade una glosa interpretativa más fuerte.
- source_word: חֲבַקּוּק
  english_pob_choice: Habakkuk
  chosen_spanish: Habacuc
  alternatives_spanish:
  - Habakkuk
  lexicon: standard Spanish biblical proper-name convention
  rationale: Se usa la forma tradicional y reconocible en español bíblico, que preserva la identificación del personaje y la inteligibilidad eclesial.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: El título identifica el oficio del sujeto; "el profeta" traduce directamente el sustantivo y mantiene el valor descriptivo del encabezamiento.
theological_decisions:
- issue: Cómo rendir מַשָּׂא en un encabezamiento profético
  english_pob_reading: oracle rather than burden
  chosen_spanish_reading: profecía
  alternative_spanish_readings:
  - oráculo
  - carga
  - pronunciamiento
  rationale: La POB inglesa entiende מַשָּׂא como un título profético de mensaje revelado, no como un peso psicológico. "Profecía" mantiene la solemnidad y el carácter revelado del texto en español, evitando introducir una imagen de "carga" que no es segura aquí. Aunque "oráculo" es una alternativa válida, "profecía" resulta más natural para lectores hispanohablantes sin sacrificar el sentido básico del encabezamiento.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source genre and meaning without over-interpretation.'
translation_notes:
  revision_awareness: Se tuvo en cuenta que la POB inglesa conserva el verbo "saw" para retener la metáfora de visión profética, y que explica en nota la ambigüedad de מַשָּׂא. La versión española mantiene esa tensión semántica con una solución idiomática y una nota que recoge las alternativas léxicas relevantes.
  spanish_consistency_notes:
  - Se usó "Habacuc" por la forma bíblica estándar en español.
  - '"Profecía" evita una literalidad que podría sonar como "carga" física o emocional en español.'
  - La colocación "que tuvo en visión" busca ser natural y fiel al valor profético del hebreo sin expandir indebidamente el texto.
