  text: Ben-deker[a], en Makaz, en Shaalbim, en Bet-semes, y en Elón-bet-hanán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente, «el hijo de Deker»; aquí se conserva la forma hebrea como designación personal: «Ben-deker».'
