    rationale: El inglés auditado usa 'Mephaath'. El borrador cambia a 'Mefaat', lo cual podría ser aceptable como adaptación española, pero la justificación es insuficiente y las alternativas repiten la misma forma. Conviene fijar una forma española consistente y limpiar la decisión léxica implícita en el texto.
  - severity: low
