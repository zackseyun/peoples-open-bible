  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יהוה se traduce como ''Yahvé'', no ''SEÑOR''; בֵּית יְהוָה se mantiene como ''casa de Yahvé'' con nota alternativa para ''templo''; y el idioma teológico ''pondré mi nombre'' se conserva sin paráfrasis en el texto principal. Las notas apoyan adecuadamente las decisiones léxicas y teológicas documentadas en el POB inglés.'
