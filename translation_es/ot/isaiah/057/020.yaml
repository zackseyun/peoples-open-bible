  text: וְ/הָ/רְשָׁעִ֖ים כַּ/יָּ֣ם נִגְרָ֑שׁ כִּ֤י הַשְׁקֵט֙ לֹ֣א יוּכָ֔ל וַ/יִּגְרְשׁ֥וּ מֵימָ֖י/ו רֶ֥פֶשׁ וָ/טִֽיט׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/057/020.yaml
  text: But the wicked are like the tossing sea[a], for it cannot be quiet[b], and its waters toss up mire and mud.
  footnotes:
