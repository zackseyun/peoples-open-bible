revisions:
- from: Y no cortarás tu [a]de mi casa para siempre[b], ni siquiera cuando Yahvé corte a los enemigos de David, a cada uno de ellos, de sobre la faz de la tierra.
  to: Y no cortarás tu amor fiel[a] de mi casa para siempre, ni siquiera cuando Yahvé corte de la faz de la tierra a los enemigos de David, a cada uno de ellos.
  rationale: Se corrige la omisión de חַסְדְּךָ en el texto principal, se mejora la naturalidad de la expresión española con 'amor fiel', y se conserva el paralelismo verbal de כרת con 'cortar' en ambas cláusulas. También se suaviza el idiomatismo final a una forma más natural en español sin perder solemnidad ni sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:06:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido global del hebreo: mantiene la doble ocurrencia de כרת con el mismo verbo, preserva ''Yahvé'', refleja la relación sintáctica ''ni siquiera cuando'', y comunica el distributivo אִישׁ con ''a cada uno de ellos''. También conserva ''casa'' y ''para siempre'' de forma fiel al contexto de pacto. Sin embargo, el texto principal omite por error la traducción de חַסְדְּךָ en la frase ''tu [a]de mi casa'', y la expresión ''corte a los enemigos de David'' suena menos natural en español que ''corte de la faz de la tierra a los enemigos de David'' o ''elimine''. Dado que la decisión léxica documentada favorece mantener ''cortar'' en ambos miembros, conviene reparar la sintaxis sin perder ese paralelismo.'
  spanish_quality_summary: La legibilidad actual está afectada por una omisión grave en el texto principal y por una construcción algo forzada en la segunda cláusula. 'De sobre la faz de la tierra' es comprensible, pero 'de la faz de la tierra' es más natural en español bíblico moderno y sigue siendo fiel al idiomatismo hebreo. 'Tu fidelidad leal' es entendible pero algo torpe; 'tu amor fiel' suena más natural y todavía conserva el matiz pactal, especialmente con nota. La revisión propuesta mejora fluidez, corrección gramatical y dignidad estilística sin apartarse de las decisiones del audit trail.
  glossary_alignment: Se mantiene 'Yahvé' conforme al glosario del proyecto. No hay conflicto con otras entradas troncales. Para חֶסֶד, el borrador documenta bien la dimensión pactal; en español conviene usar 'amor fiel' en el texto principal y dejar 'lealtad de pacto' / 'amor leal' en nota como alternativas explicativas. Esto preserva la filosofía del POB de no tecnificar en exceso el texto principal.
  issues:
  - severity: high
    issue: Omisión de la traducción de חַסְדְּךָ en el texto principal
    rationale: La frase 'Y no cortarás tu [a]de mi casa' está incompleta y no transmite el sentido básico del versículo. Es un error textual sustantivo, no solo estilístico.
  - severity: medium
    issue: '''tu fidelidad leal'' es poco idiomático en español'
    rationale: Aunque intenta reflejar חֶסֶד, la combinación suena rígida y menos natural que opciones como 'tu amor fiel', apoyadas por nota para conservar la riqueza semántica.
  - severity: low
    issue: '''de sobre la faz de la tierra'' suena calcozado'
    rationale: Refleja de cerca מֵעַל פְּנֵי הָאֲדָמָה, pero 'de la faz de la tierra' es más natural y sigue transmitiendo el mismo idiomatismo solemne en español.
  revised_spanish_text: Y no cortarás tu amor fiel[a] de mi casa para siempre, ni siquiera cuando Yahvé corte de la faz de la tierra a los enemigos de David, a cada uno de ellos.
  revised_footnotes:
  - marker: a
    text: O 'tu amor constante' / 'tu lealtad de pacto' / 'tu amor leal'. חֶסֶד suele expresar amor fiel dentro de una relación de pacto.
    reason: lexical_alternative
  revision_rationale: Se corrige la omisión de חַסְדְּךָ en el texto principal, se mejora la naturalidad de la expresión española con 'amor fiel', y se conserva el paralelismo verbal de כרת con 'cortar' en ambas cláusulas. También se suaviza el idiomatismo final a una forma más natural en español sin perder solemnidad ni sentido.
