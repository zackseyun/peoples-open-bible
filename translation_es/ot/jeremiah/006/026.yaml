translation:
  language: es
  text: Hija de mi pueblo[a], cíñete de cilicio y revuélcate[b] en cenizas; haz duelo como por un hijo único[c], un lamento muy amargo, porque de repente vendrá sobre nosotros el destructor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oh hija de mi pueblo». El hebreo preserva un vocativo directo y personificado.'
    reason: alternative_reading
  - marker: b
    text: 'O: «revuélcate en cenizas» o «cúbrete de ceniza». El verbo hebreo describe un acto físico de duelo en ceniza.'
    reason: lexical_alternative
  - marker: c
    text: Lit. «duelo de un único [hijo]»; la expresión hebrea intensifica el dolor como el de perder al hijo único.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת עַמִּי
  english_pob_choice: Daughter of my people
  chosen_spanish: Hija de mi pueblo
  alternatives_spanish:
  - Oh hija de mi pueblo
  - Mi pueblo amado
  lexicon: HALOT
  rationale: Conserva el vocativo personificado del hebreo y la relación posesiva 'de mi pueblo'. 'Oh' es estilístico, no lexical; 'mi pueblo amado' añade afecto no explicitado por el texto.
- source_word: חִגְרִי שָׂק
  english_pob_choice: put on sackcloth
  chosen_spanish: cíñete de cilicio
  alternatives_spanish:
  - vístete de cilicio
  - ata cilicio alrededor de ti
  lexicon: HALOT
  rationale: El verbo implica ceñir o poner sobre el cuerpo una prenda de luto. 'Cíñete de cilicio' conserva la imagen corporal y el registro bíblico, sin perder inteligibilidad en español.
- source_word: וְהִתְפַּלְּשִׁי בָאֵפֶר
  english_pob_choice: and roll in ashes
  chosen_spanish: y revuélcate en ceniza
  alternatives_spanish:
  - y rúelete en ceniza
  - y cúbrete de ceniza
  lexicon: HALOT
  rationale: El hitpael expresa una acción física intensa de duelo en ceniza/polvo. 'Revuélcate' comunica bien esa acción ritual; 'cúbrete' suaviza demasiado el movimiento.
- source_word: אֵבֶל יָחִיד
  english_pob_choice: mourning as for an only son
  chosen_spanish: haz duelo como por un hijo único
  alternatives_spanish:
  - haz duelo como por un hijo único varón
  - haz duelo como por un único hijo
  lexicon: HALOT
  rationale: '''Yajid'' en contextos de duelo suele intensificar la pérdida del único hijo. ''Hijo único'' transmite el peso idiomático de la expresión y mantiene la naturalidad en español.'
- source_word: מִסְפַּד תַּמְרוּרִים
  english_pob_choice: a most bitter lamentation
  chosen_spanish: un lamento muy amargo
  alternatives_spanish:
  - un lamento amarguísimo
  - un duelo de gran amargura
  lexicon: HALOT
  rationale: '''Mišpád'' es lamento/duelo fúnebre; ''tamrurim'' intensifica la amargura. ''Lamento muy amargo'' conserva el énfasis sin sonar artificial.'
- source_word: כִּי פִתְאֹם
  english_pob_choice: for suddenly
  chosen_spanish: porque de repente
  alternatives_spanish:
  - pues de repente
  - porque súbitamente
  lexicon: HALOT
  rationale: '''De repente'' es la equivalencia natural en español para la irrupción inesperada; mantiene la razón causal introducida por ''ki''.'
- source_word: הַשֹּׁדֵד
  english_pob_choice: the destroyer
  chosen_spanish: el destructor
  alternatives_spanish:
  - el devastador
  - el saqueador
  lexicon: HALOT
  rationale: El participio incluye la idea de devastar/despojar; 'destructor' comunica la fuerza destructiva general en el contexto profético, más amplia que 'saqueador'.
- source_word: עָלֵינוּ
  english_pob_choice: upon us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - contra nosotros
  - sobre vos
  lexicon: HALOT
  rationale: Se preserva el plural de primera persona, manteniendo la solidaridad profética del hablante con el pueblo, tal como refleja el hebreo y la lectura auditada del POB.
theological_decisions:
- issue: Cambio de segunda persona a primera persona plural al final del versículo
  english_pob_reading: Retain the shift with 'Daughter of my people ... upon us'
  chosen_spanish_reading: 'Mantener la transición: ''Hija de mi pueblo ... sobre nosotros'''
  alternative_spanish_readings:
  - Suavizar a 'sobre ti' para coherencia estilística
  - Reformular en tercera persona para evitar la oscilación pronominal
  rationale: El hebreo pasa intencionalmente del vocativo singular femenino a la identificación comunitaria en primera persona plural. Conservar ese cambio evita nivelar la retórica y mantiene la solidaridad del profeta con el pueblo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'He seguido el último estado revisado del POB en inglés: la versión final mantiene el vocativo ''Daughter of my people'', elimina el añadido innecesario ''for yourself'' y refuerza ''a most bitter lamentation''. En español se refleja esa intensificación con ''un lamento muy amargo'' y se conserva la transición pronominal a ''sobre nosotros''.'
  spanish_consistency_notes:
  - Se usa 'cilicio' como equivalente estándar de sackcloth en registro bíblico, coherente con el uso eclesial en español.
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton; no hay necesidad de sustitución.
  - '''Destructor'' mantiene la amplitud semántica del participio hebreo sin reducirlo a saqueador o plunderer.'
  - Las notas al pie se limitan a alternativas realmente relevantes para el lector español y no duplican decisiones ya transparentes en el texto principal.
