revisions:
- from: Yahvé ha declarado hoy que tú has de ser para él un pueblo especial[a], como te prometió[b], y que has de guardar todos sus mandamientos.
  to: Yahvé ha declarado hoy que tú has de ser para él su pueblo atesorado[a], como te prometió[b], y que has de guardar todos sus mandamientos.
  rationale: Se revisa solo el sintagma לְעַם סְגֻלָּה para preservar mejor el valor léxico de pertenencia preciosa/tesoro documentado en el source packet y en el audit trail inglés. 'Su pueblo atesorado' mantiene la identidad corporativa de עַם y el matiz de valor de סְגֻלָּה, en español natural y digno. La nota [a] se ajusta para reflejar con más precisión la alternativa 'treasured possession'.
