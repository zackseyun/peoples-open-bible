revisions:
- from: Y los puso bajo custodia en la casa del capitán de la guardia[a], en la casa de la cárcel[b], el lugar donde José estaba preso.
  to: Y los puso bajo custodia en la casa del capitán de la guardia[a], en la casa de la prisión[c][b], el lugar donde José estaba preso.
  rationale: 'Se ajusta el texto para mejorar la naturalidad del español sin apartarse del hebreo ni del rastro inglés: ‘casa de la prisión’ preserva mejor el compuesto que ‘casa de la cárcel’; se corrigen y reordenan las notas para reflejar fielmente las alternativas documentadas en inglés, incluyendo la nota necesaria sobre ‘capitán de la guardia’.'
