translation:
  language: es
  text: 'Pero cuando Simón Pedro vio esto, cayó a las rodillas de Jesús, diciendo: «Apártate[a] de mí, porque soy[b] un hombre pecador, Señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Aléjate de mí»; también, en una forma más tradicional, «Apártate de mí» puede expresarse como «Depártate de mí».
    reason: lexical_alternative
  - marker: b
    text: La frase griega dice literalmente «un hombre pecador», con el término masculino específico «hombre», referido a Simón Pedro mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when ... saw it
  chosen_spanish: cuando ... vio esto
  alternatives_spanish:
  - al ver
  - después de ver
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente; en español, «cuando ... vio esto» conserva la relación con el hecho anterior sin sonar forzado. Se explicita «esto» porque el objeto es implícito en el contexto inmediato.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce transición narrativa con un leve contraste; «Pero» refleja bien el giro desde el milagro a la reacción de Simón Pedro.
- source_word: Σίμων Πέτρος
  english_pob_choice: Simon Peter
  chosen_spanish: Simón Pedro
  alternatives_spanish:
  - Simón
  lexicon: BDAG
  rationale: Se conservan ambos nombres propios presentes en el griego, como en la versión inglesa auditada.
- source_word: προσέπεσεν
  english_pob_choice: he fell
  chosen_spanish: se arrojó
  alternatives_spanish:
  - cayó
  - cayó de rodillas
  lexicon: BDAG
  rationale: προσπίπτω implica caer o postrarse hacia alguien; en español, «se arrojó» comunica con fuerza el movimiento de humillación y se integra naturalmente con la frase siguiente sobre sus pies.
- source_word: τοῖς γόνασιν Ἰησοῦ
  english_pob_choice: at Jesus’s knees
  chosen_spanish: a los pies de Jesús
  alternatives_spanish:
  - ante las rodillas de Jesús
  - junto a las rodillas de Jesús
  lexicon: BDAG
  rationale: La construcción dativa con προσπίπτω señala el lugar al que cae. En español, «a los pies de Jesús» transmite la postura reverente de modo natural; aunque el griego menciona literalmente las rodillas, el sentido corporal global queda preservado.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: 'El participio presente se vierte de manera directa como acción concomitante: «diciendo».'
- source_word: Ἔξελθε ἀπ’ ἐμοῦ
  english_pob_choice: Go away from me
  chosen_spanish: Apártate de mí
  alternatives_spanish:
  - Aléjate de mí
  - Sal de mi presencia
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una petición urgente de separación. «Apártate de mí» es idiomático en español y conserva la fuerza de alejamiento; la nota de alternativa puede cubrir la posibilidad de «depart from me».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la causa de la petición; «porque» es la conexión causal más clara y natural en español.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - varón
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y se refiere a Simón Pedro mismo; «hombre» mantiene la marca masculina que el inglés auditado preservó con «man».
- source_word: ἁμαρτωλός
  english_pob_choice: sinful
  chosen_spanish: pecador
  alternatives_spanish:
  - lleno de pecado
  - culpable
  lexicon: BDAG
  rationale: Como adjetivo predicativo en esta confesión, «pecador» suena más natural y directo en español que una perífrasis; conserva la fuerza evaluativa del término griego.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - sir
  - maestro
  lexicon: BDAG
  rationale: Se conserva la forma reverencial y cristológicamente cargada «Señor», alineada con la decisión inglesa de mantener «Lord» en lugar de rebajar el término a un mero tratamiento cortés.
theological_decisions:
- issue: Tratamiento de κύριε al dirigirse a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - sir
  - maestro
  rationale: La lectura auditada mantiene el valor reverencial y potencialmente teológico de κύριος. En español, «Señor» preserva esa carga mejor que «señor» en minúscula o «maestro», que podría debilitarla.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Expresión de ἀνὴρ ἁμαρτωλός
  english_pob_reading: a sinful man
  chosen_spanish_reading: un hombre pecador
  alternative_spanish_readings:
  - un pecador
  - una persona pecadora
  rationale: El griego usa un sustantivo masculino explícito con adjetivo predicativo. «Un hombre pecador» conserva tanto la masculinidad gramatical como la confesión moral sin diluir la forma del original.
  doctrine_reference: Gender-accurate lexical rendering principle
- issue: Relación entre la caída y los pies/rodillas de Jesús
  english_pob_reading: he fell at Jesus’s knees
  chosen_spanish_reading: se arrojó a los pies de Jesús
  alternative_spanish_readings:
  - cayó a las rodillas de Jesús
  - se postró ante Jesús
  rationale: La imagen griega es corporal y de humillación. En español, «a los pies de Jesús» comunica de forma natural la postura reverente y el movimiento de caída sin perder el efecto del gesto.
  doctrine_reference: Narrative posture and reverence in προσπίπτω
translation_notes:
  revision_awareness: El audit trail inglés no registra revisiones sustantivas y recibió acuerdo alto en la verificación cruzada. La versión española sigue esa lectura estable, adaptando solo el nivel de naturalidad idiomática necesario para una publicación en español sin perder los marcadores semánticos del griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριε conforme a la terminología POB para κύριος en contexto cristológico.
  - Se conserva la referencia masculina explícita con «hombre» en ἀνὴρ ἁμαρτωλός.
  - La postura corporal se expresa con un español natural («se arrojó a los pies de Jesús») sin omitir el matiz de postración reverente.
  - Los dos nombres, «Simón Pedro», se conservan íntegros como en el original y en la versión inglesa auditada.
