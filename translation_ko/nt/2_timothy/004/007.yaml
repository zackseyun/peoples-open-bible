  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸν ⸂καλὸν ἀγῶνα⸃ ἠγώνισμαι, τὸν δρόμον τετέλεκα, τὴν πίστιν τετήρηκα·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/007.yaml
  text: I have fought the good fight, I have finished the race, I have kept the faith.
translation:
  language: ko
  text: 나는 선한 싸움을 싸웠고[a], 달려갈 길을 마쳤으며, 믿음을 지켰습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀγών은 운동 경기 또는 군사적 싸움을 함께 가리킨다. 본 절은 사역 전체를 단일한 「큰 싸움·큰 경주」로 회고하는 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν καλὸν ἀγῶνα ἠγώνισμαι
  english_pob_choice: I have fought the good fight
  chosen_korean: 선한 싸움을 싸웠고
  alternatives_korean:
  - 훌륭한 싸움을 끝까지 싸웠고
  - 좋은 경주를 잘 치렀고
  lexicon: BDAG
  rationale: 한국 성서 전통의 「선한 싸움을 싸웠고」를 보존한다. ἀγών의 경기·싸움 양가적 의미를 한국어 「싸움」이 자연스럽게 담는다. 완료형의 「완수된 상태」를 「~고」 종결로 옮긴다.
- source_word: τὸν δρόμον τετέλεκα
  english_pob_choice: I have finished the race
  chosen_korean: 달려갈 길을 마쳤으며
  alternatives_korean:
  - 경주를 마쳤으며
  - 달음질을 다 달렸으며
  lexicon: BDAG
  rationale: δρόμος는 「달리는 길·경주」. 한국 성서 전통의 「달려갈 길」이 자연스럽고 사역의 길 전체를 가리키는 함의를 담는다.
- source_word: τὴν πίστιν τετήρηκα
  english_pob_choice: I have kept the faith
  chosen_korean: 믿음을 지켰습니다
  alternatives_korean:
  - 신실함을 끝까지 지켰습니다
  - 그 믿음을 잘 지켰습니다
  lexicon: BDAG
  rationale: τηρέω는 「지키다·보전하다」. 1:12, 1:14의 φυλάσσω(맡긴 것을 지킴)와 호응한다. πίστις를 「믿음」으로 옮기되 「신실함」 가능성도 가능하나, 본 절은 사역 회고의 핵심 결산이므로 한국 성서 전통의 「믿음을 지키다」를 채택한다.
theological_decisions:
- issue: 4:7의 세 동사(τρι콜론) 짝 구조 보존 — 싸움·경주·믿음
  chosen_reading: 나는 선한 싸움을 싸웠고, 달려갈 길을 마쳤으며, 믿음을 지켰습니다
  alternative_readings:
  - 훌륭한 싸움을 끝까지 싸웠고, 경주를 다 마쳤으며, 신실함을 지켰습니다
  rationale: 4:7은 세 완료형 동사(ἠγώνισμαι, τετέλεκα, τετήρηκα)가 운율적 짝(τρι콜론)을 이루며, 사역 전체를 회고적으로 결산한다. 한국어로도 「싸웠고 ~ 마쳤으며 ~ 지켰습니다」의 세 마디 짝을 보존하여 본문의 운율적 무게를 살린다. 「믿음을 지켰다」는 한국 성서 전통의 정형 표현으로, 본 절의 결산적 무게를 약화시키지 않는다.
  doctrine_reference: 'DOCTRINE.md: preserve literary structure; north-star — true and powerful meaning'
