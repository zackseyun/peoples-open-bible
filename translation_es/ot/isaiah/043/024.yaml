translation:
  language: es
  text: No me compraste con plata caña aromática[a], ni me saciaste con la grasa de tus sacrificios; sino que me cargaste con tus pecados[b]; me fatigaste con tus iniquidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cálamo» o «caña aromática». El término hebreo alude a una caña fragante y costosa.
    reason: lexical_alternative
  - marker: b
    text: Lit., «me hiciste servir con tus pecados».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִ֨יתָ / קנה
  english_pob_choice: did not buy
  chosen_spanish: no me compraste
  alternatives_spanish:
  - no me adquiriste
  - no me compraste ni adquiriste
  lexicon: HALOT
  rationale: El verbo en este contexto comercial se refiere de manera natural a comprar/adquirir. En español, «compraste» comunica con claridad la relación con «plata» sin endurecer la frase con un tecnicismo.
- source_word: קָנֶה
  english_pob_choice: sweet cane
  chosen_spanish: caña aromática[a]
  alternatives_spanish:
  - caña dulce
  - calamo
  - caña perfumada
  lexicon: HALOT
  rationale: El término alude a una caña costosa y fragante usada como perfume o ingrediente aromático. «Caña aromática» conserva el valor material y la cualidad fragante sin imponer una transliteración innecesaria.
- source_word: בַכֶּסֶף
  english_pob_choice: with silver
  chosen_spanish: con plata
  alternatives_spanish:
  - con dinero
  - por plata
  lexicon: HALOT
  rationale: «Plata» preserva el concreto hebreo כֶּסֶף y funciona bien en español como medio de pago. «Con» mantiene la relación instrumental del hebreo.
- source_word: חֵלֶב זְבָחֶיךָ
  english_pob_choice: the fat of your sacrifices
  chosen_spanish: la grasa de tus sacrificios
  alternatives_spanish:
  - el sebo de tus sacrificios
  - la mejor parte de tus sacrificios
  lexicon: HALOT
  rationale: «Grasa» es la equivalencia directa y comprensible para חֵלֶב. Mantiene el imaginario sacrificial y evita suavizar la imagen con una paráfrasis como «la mejor parte».
- source_word: הִרְוִיתָנִי
  english_pob_choice: satisfy me
  chosen_spanish: me saciaste
  alternatives_spanish:
  - me satisfaciste
  - me llenaste
  lexicon: HALOT
  rationale: El hebreo expresa causar saciedad o plenitud. «Saciar» conserva mejor la imagen de suficiencia ofrecida que una explicación más abstracta.
- source_word: אַךְ
  english_pob_choice: instead
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: Aquí introduce un contraste fuerte entre lo debido y lo ocurrido. «Sino que» reproduce bien la corrección adversativa en español y evita debilitar el giro.
- source_word: הֶעֱבַדְתַּנִי
  english_pob_choice: you burdened me
  chosen_spanish: me cargaste
  alternatives_spanish:
  - me hiciste servir
  - me esclavizaste
  - me impusiste carga
  lexicon: HALOT
  rationale: El verbo literalmente significa hacer servir/trabajar, pero en este contexto la imagen es la de imponer una carga al hablar de los pecados. «Me cargaste» conserva la fuerza figurada sin eliminar la tensión antropomórfica.
- source_word: בְּחַטֹּאותֶיךָ
  english_pob_choice: with your sins
  chosen_spanish: con tus pecados
  alternatives_spanish:
  - por tus pecados
  - a causa de tus pecados
  lexicon: HALOT
  rationale: «Pecados» es la equivalencia normal de חַטֹּאות. «Con» sigue la forma del hebreo y mantiene la frase como medio/instrumento.
- source_word: הוֹגַעְתַּנִי
  english_pob_choice: you wearied me
  chosen_spanish: me fatigaste
  alternatives_spanish:
  - me cansaste
  - me agotaste
  lexicon: HALOT
  rationale: El verbo denota causar cansancio o fatiga. «Fatigaste» conserva el tono elevado del texto profético y la repetición paralela con la línea anterior.
- source_word: בַּעֲוֺנֹתֶיךָ
  english_pob_choice: with your iniquities
  chosen_spanish: con tus maldades
  alternatives_spanish:
  - con tus iniquidades
  - con tu culpa
  lexicon: HALOT
  rationale: עָוֹן puede expresar iniquidad, culpa o perversidad. En un español más amplio y natural, «maldades» comunica el peso moral del término; «iniquidades» se mantiene como alternativa más literal si se prefiere conservar mayor proximidad léxica.
theological_decisions:
- issue: 'Antropomorfismo: Dios dice que ha sido cargado y fatigado por los pecados de Israel'
  english_pob_reading: Retain the anthropomorphic expressions 'satisfy me,' 'burdened me,' and 'wearied me' without softening them into abstract paraphrase.
  chosen_spanish_reading: Conservar «me saciaste», «me cargaste» y «me fatigaste» sin convertir la denuncia en una formulación abstracta.
  alternative_spanish_readings:
  - me honraste... me ofendiste
  - me desatendiste... me irritaste
  rationale: El hebreo presenta una queja directa y figurada, no una explicación doctrinal suavizada. Mantener el antropomorfismo respeta la tensión del texto y evita borrar el contraste entre el sacrificio debido y la carga causada por el pecado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue el alto grado de acuerdo del audit trail en inglés y no introduce cambios sustantivos frente a la lectura óptima ya aprobada. Se mantiene la imagen comercial de la primera línea, el contraste fuerte de אַךְ y el antropomorfismo de las dos últimas cláusulas.
  spanish_consistency_notes:
  - Se conserva la distinción entre «pecados» (חטאות) y «maldades» (עֲוֹנֹת) para reflejar la variación hebrea.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - «Plata» y «caña aromática» mantienen el registro concreto de los bienes ofrecidos.
  - La puntuación con punto y coma reproduce la estructura poética en dos miembros principales más una cola final paralela.
