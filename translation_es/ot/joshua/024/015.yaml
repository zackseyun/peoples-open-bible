base_translation:
  language: en
  yaml_path: translation/ot/joshua/024/015.yaml
  text: But if it is evil in your eyes to serve Yahweh[a], choose for yourselves today whom you will serve—whether the gods your fathers served beyond the River, or the gods of the Amorites in whose land you are dwelling. But as for me and my house[d][c][b], we will serve Yahweh.
  footnotes:
