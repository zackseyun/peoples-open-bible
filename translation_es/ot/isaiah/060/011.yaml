translation:
  language: es
  text: Tus puertas estarán abiertas[a] continuamente; de día y de noche no serán cerradas, para que te sea traída la riqueza de las naciones[b], con sus reyes llevados en procesión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'permanecerán abiertas'. El hebreo describe un estado continuo de las puertas.
    reason: lexical_alternative
  - marker: b
    text: O 'las riquezas de las naciones'. חֵיל puede denotar también fuerza o ejército, pero aquí probablemente alude a bienes materiales traídos como tributo.
    reason: lexical_alternative
  - marker: c
    text: O 'con sus reyes siendo llevados' o 'con sus reyes llevados'. El participio hebreo puede sugerir escolta, procesión o conducción en sometimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִתְּחוּ
  english_pob_choice: will be open
  chosen_spanish: estarán abiertas
  alternatives_spanish:
  - permanecerán abiertas
  - serán abiertas
  lexicon: HALOT
  rationale: El hebreo presenta un estado durativo de las puertas de Sion. En español, 'estarán abiertas' comunica ese estado continuo con naturalidad, sin forzar un calco verbal que sonaría extraño en este contexto poético.
- source_word: שְׁעָרַיִךְ
  english_pob_choice: your gates
  chosen_spanish: tus puertas
  alternatives_spanish:
  - tus portones
  - tus entradas
  lexicon: HALOT
  rationale: '''Puertas'' es la forma más directa y bíblicamente reconocible para שְׁעָרַיִךְ, y conserva el paralelismo urbano de Jerusalén sin introducir matices arquitectónicos innecesarios.'
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: HALOT
  rationale: '''Continuamente'' refleja bien la idea de apertura ininterrumpida y mantiene un tono elevado acorde con la poesía profética.'
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - día y noche
  - por día y por noche
  lexicon: HALOT
  rationale: La expresión española idiomática más natural para el merismo es 'de día y de noche', que preserva la duración total sin sonar rígida.
- source_word: לֹא יִסָּגֵרוּ
  english_pob_choice: they will not be shut
  chosen_spanish: no serán cerradas
  alternatives_spanish:
  - no se cerrarán
  - no serán clausuradas
  lexicon: HALOT
  rationale: Para puertas, 'cerradas' es el equivalente más natural y claro en español. Conserva la negación del cierre sin perder la imagen concreta del acceso abierto.
- source_word: חֵיל גּוֹיִם
  english_pob_choice: the wealth of the nations
  chosen_spanish: la riqueza de las naciones
  alternatives_spanish:
  - las riquezas de las naciones
  - el poderío de las naciones
  - el ejército de las naciones
  lexicon: HALOT
  rationale: Aunque חֵיל puede significar fuerza, ejército o recursos, el contexto inmediato de Isaías 60 habla de tributo, oro y bienes traídos a Sion. 'La riqueza de las naciones' preserva esa coherencia temática y el valor material probable que destacó la POB inglesa.
- source_word: וּמַלְכֵיהֶם
  english_pob_choice: with their kings
  chosen_spanish: y sus reyes
  alternatives_spanish:
  - con sus reyes
  - junto con sus reyes
  lexicon: HALOT
  rationale: El hebreo une a los reyes con el material traído; en español, 'y sus reyes' mantiene la coordinación simple, mientras la siguiente frase aclara el modo en que llegan.
- source_word: נְהוּגִים
  english_pob_choice: led in procession
  chosen_spanish: llevados en procesión
  alternatives_spanish:
  - guiados en procesión
  - llevados
  - conducidos
  lexicon: HALOT
  rationale: El participio pasivo de נהג permite una lectura de conducción ceremonial. 'Llevados en procesión' conserva el matiz pasivo y la imagen de homenaje público sin imponer una idea más dura de cautiverio.
theological_decisions:
- issue: Sentido de חֵיל גּוֹיִם en la escena de Sion recibiendo homenaje
  english_pob_reading: economic wealth/resources of the nations
  chosen_spanish_reading: la riqueza de las naciones
  alternative_spanish_readings:
  - el ejército de las naciones
  - la fuerza de las naciones
  rationale: El pasaje vecino describe a las naciones trayendo bienes, oro y ofrendas a Jerusalén. Por eso, la lectura económica es la más coherente con el contexto profético y evita militarizar innecesariamente la imagen.
  doctrine_reference: Isaías 60:5-11; 60:13-17
- issue: Matiz de נְהוּגִים respecto de los reyes
  english_pob_reading: kings led in a ceremonial or subdued manner
  chosen_spanish_reading: sus reyes, llevados en procesión
  alternative_spanish_readings:
  - sus reyes, conducidos
  - sus reyes, llevados como cautivos
  rationale: La forma pasiva admite tanto escolta ceremonial como sometimiento. 'Llevados en procesión' preserva la ambigüedad significativa del hebreo y encaja con la escena de homenaje real sin forzar una lectura de cautiverio.
  doctrine_reference: Isaías 60:3, 10-12
translation_notes:
  revision_awareness: El texto inglés POB fue revisado recientemente y se mantuvo sin cambios en la última pasada. La presente redacción española sigue de cerca su decisión semántica principal ('wealth of the nations' y 'led in procession'), pero la adapta a un español natural y publicable, conservando la ambigüedad donde el hebreo la permite.
  spanish_consistency_notes:
  - Se mantuvo 'riqueza' para חֵיל, en continuidad con la lectura auditada de la POB inglesa, evitando 'ejército' por el contexto de tributo.
  - Se tradujo el estado durativo de las puertas con 'estarán abiertas', una solución española idiomática para la apertura continua.
  - Se preservó el matiz pasivo de נְהוּגִים con 'llevados en procesión', sin cerrar la posibilidad de una escolta ceremonial o sujeción.
  - No se usó 'SEÑOR' ni 'Cristo' porque este versículo no contiene esos términos.
