id: 2CO.12.9
reference: '2 Corinthians 12:9'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ εἴρηκέν μοι· Ἀρκεῖ σοι ἡ χάρις μου· ἡ γὰρ ⸀δύναμις ἐν ἀσθενείᾳ ⸀τελεῖται. ἥδιστα οὖν μᾶλλον καυχήσομαι ἐν ταῖς ἀσθενείαις ⸀μου, ἵνα ἐπισκηνώσῃ ἐπ’ ἐμὲ ἡ δύναμις τοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/009.yaml
  text: And he has said to me[a], "My grace is sufficient for you, for my power is made perfect in weakness." Therefore I will boast all the more gladly in my weaknesses[d][c][b], so that the power of Messiah
    may dwell upon me.
translation:
  language: ko
  text: 그분이 내게 말씀하셨습니다. 「내 은혜가 네게 족하다. 능력은 약한 데서 온전해진다.」 그러므로 메시아의 능력이 내게 머무르도록, 나는 차라리 더 기쁘게 나의 약함을 자랑하겠습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀρκεῖ σοι ἡ χάρις μου
  english_pob_choice: My grace is sufficient for you
  chosen_korean: 내 은혜가 네게 족하다
  lexicon: BDAG
  rationale: 신적 음성으로서 한국어 합쇼체가 아닌 반말 「족하다」로 인용한다(친밀하고 단호한 신탁의 어조). 본문 화자의 합쇼체와 변별되는 등록 전환.
  alternatives_korean:
  - 내 은혜가 너에게 충분하다
- source_word: δύναμις ἐν ἀσθενείᾳ τελεῖται
  english_pob_choice: power is made perfect in weakness
  chosen_korean: 능력은 약한 데서 온전해진다
  lexicon: BDAG
  rationale: 신적 격언. 반말 인용 안에서 그대로. 「온전해지다」가 τελέω의 「완성·성숙」을 자연스럽게 담는다.
- source_word: ἥδιστα
  english_pob_choice: all the more gladly
  chosen_korean: 차라리 더 기쁘게
  lexicon: BDAG
  rationale: 최상급 부사. 「차라리 더 기쁘게」가 바울의 역설을 잘 살린다.
  alternatives_korean:
  - 가장 기쁘게
- source_word: ἐπισκηνώσῃ
  english_pob_choice: dwell upon
  chosen_korean: 머무르도록
  lexicon: BDAG
  rationale: 「장막처럼 위에 덮다」. 「머무르다」가 자연스럽다.
  alternatives_korean:
  - 덮어 거하시도록
theological_decisions:
- issue: '12:9 신적 음성의 등록(register) — 합쇼체 vs 반말'
  chosen_reading: 인용 안의 신적 음성은 반말 「족하다 / 온전해진다」, 화자의 보고는 합쇼체
  alternative_readings:
  - 전부 합쇼체로 통일
  rationale: 신적 음성은 친밀하고 단호한 신탁으로서, 합쇼체의 정중함보다 반말의 직접성이 본문의 어조를 더 잘 보존한다. 화자의 보고는 합쇼체를 유지하여 두 층을 변별한다. 글로서리에 따른 등록 전환을 명시한다.
  doctrine_reference: 'DOCTRINE.md §3: preserve register/genre distinctions; KOREAN_PIPELINE 합쇼체 정책'
