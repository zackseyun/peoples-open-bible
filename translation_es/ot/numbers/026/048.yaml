translation:
  language: es
  text: 'Los hijos de Neftalí, por sus clanes: de Jahzeel, el clan de los Jahzeelitas; de Guni, el clan de los Gunitas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: Se mantiene la forma genealógica literal del hebreo, que en este contexto introductorio de censo y linaje es transparente en español. 'Descendientes de' sería posible, pero suaviza la estructura original.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: HALOT
  rationale: Nombre tribal propio transliterado al español con la forma usual y reconocible, sin añadir equivalencias interpretativas.
- source_word: לְ/מִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: El לְ distributivo se rinde naturalmente con 'por' en español en una lista censal. 'Clanes' preserva el valor genealógico y social de מִשְׁפָּחָה mejor que 'familias' en este contexto.
- source_word: לְ/יַחְצְאֵל
  english_pob_choice: of Jahzeel
  chosen_spanish: de Jahzeel
  alternatives_spanish:
  - de Jahezel
  - para Jahzeel
  lexicon: HALOT
  rationale: La preposición לְ introduce aquí el antepasado del subgrupo; en español 'de' expresa mejor pertenencia o procedencia genealógica que una traducción más mecánica como 'para' o 'a'.
- source_word: מִשְׁפַּחַת הַ/יַּחְצְאֵלִי
  english_pob_choice: the clan of the Jahzeelites
  chosen_spanish: el clan de los jahzeelitas
  alternatives_spanish:
  - la familia de los jahzeelitas
  - el clan de la casa de Jahzeel
  lexicon: HALOT
  rationale: Se conserva 'clan' para מִשְׁפַּחַת, y el gentilicio colectivo se vierte con plural español ('jahzeelitas'), como grupo descendiente y no como individuo. Se mantiene el nombre propio adaptado de modo consistente.
- source_word: לְ/גוּנִי
  english_pob_choice: of Guni
  chosen_spanish: de Guni
  alternatives_spanish:
  - para Guni
  - de Guni
  lexicon: HALOT
  rationale: Mismo valor genealógico de לְ que en la cláusula anterior; 'de' es la forma española más clara para indicar ascendencia.
- source_word: מִשְׁפַּחַת הַ/גּוּנִי
  english_pob_choice: the clan of the Gunites
  chosen_spanish: el clan de los gunitas
  alternatives_spanish:
  - la familia de los gunitas
  - el clan de la casa de Guni
  lexicon: HALOT
  rationale: Se mantiene el paralelismo del versículo y el sentido colectivo del gentilicio. 'Gunitas' reproduce el carácter de grupo familiar/tribal del original.
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue revisada y marcada como sin cambios necesarios; esta propuesta sigue de cerca su estructura, pero vuelve al hebreo para sostener el paralelismo genealógico y el valor distributivo de לְ en español.
  spanish_consistency_notes:
  - Se usa 'clan' de manera consistente para מִשְׁפָּחָה en este registro censal.
  - Los nombres propios se transliteran de forma estable y sin castellanizaciones fluctuantes.
  - Se evita 'familias' donde 'clanes' preserva mejor la distinción tribal del texto.
  - La estructura enumerativa con dos miembros de la tribu se conserva sin añadidos explicativos.
