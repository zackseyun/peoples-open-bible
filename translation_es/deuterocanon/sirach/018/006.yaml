translation:
  language: es
  text: No es posible disminuir ni añadir, y no es posible rastrear[a] las maravillas de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sondear» o «penetrar» las maravillas de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔστιν
  english_pob_choice: it is not possible
  chosen_spanish: no es posible
  alternatives_spanish:
  - no se puede
  - no hay manera de
  lexicon: BDAG
  rationale: La construcción impersonal expresa imposibilidad, no mera negación de existencia. «No es posible» conserva ese valor con naturalidad en español y corresponde bien al tono sapiencial.
- source_word: ἐλαττῶσαι
  english_pob_choice: to diminish
  chosen_spanish: disminuir
  alternatives_spanish:
  - reducir
  - menguar
  - menoscabar
  lexicon: LSJ
  rationale: El infinitivo indica hacer algo menor o menos. «Disminuir» mantiene el paralelismo con «añadir» y suena digno en español contemporáneo.
- source_word: προσθεῖναι
  english_pob_choice: to add
  chosen_spanish: añadir
  alternatives_spanish:
  - agregar
  - sumar
  lexicon: LSJ
  rationale: El sentido básico es de adición. «Añadir» es la correspondencia más directa y conserva el contraste con «disminuir».
- source_word: ἐξιχνιάσαι
  english_pob_choice: to trace out
  chosen_spanish: rastrear
  alternatives_spanish:
  - sondear
  - fathom/penetrar
  - investigar a fondo
  lexicon: LSJ
  rationale: El verbo sugiere seguir huellas hasta el final para comprender exhaustivamente. «Rastrear» conserva la metáfora de seguir una huella; en este contexto, con el complemento «las maravillas de Yahvé», comunica bien la imposibilidad de abarcar plenamente su alcance.
- source_word: τὰ θαυμάσια
  english_pob_choice: the wonders
  chosen_spanish: las maravillas
  alternatives_spanish:
  - las cosas maravillosas
  - los prodigios
  - las obras maravillosas
  lexicon: LSJ
  rationale: El plural alude de manera amplia a realidades o actos maravillosos. «Maravillas» es conciso, reverente y suficientemente abierto para no restringir innecesariamente el sentido.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - del Dueño
  lexicon: BDAG
  rationale: En el texto griego de Sabiduría/Sirácida κύριος funciona como título divino. Siguiendo la norma del proyecto, se usa «Yahvé» para hacer visible el nombre divino, sin enmascararlo con «SEÑOR». En español, esto además evita una posible ambigüedad con un simple título de cortesía.
theological_decisions:
- issue: Tratamiento del nombre divino en κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque la POB inglesa usa «Lord» por la convención del inglés bíblico, la política del proyecto español pide «Yahvé» para יהוה / YHWH y para κύριος cuando en este contexto remite al Dios de Israel. Esto preserva la transparencia textual y evita el reemplazo reverencial por una máscara tipográfica.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
- issue: Objeto implícito en «disminuir o añadir»
  english_pob_reading: Leave the object implicit rather than supplying it.
  chosen_spanish_reading: Dejar el objeto implícito también en español.
  alternative_spanish_readings:
  - disminuir o añadir a sus obras
  - disminuir o añadirles
  rationale: El griego no especifica objeto. Mantener la elipsis en español conserva el carácter proverbial y evita interpretar de más el alcance de la advertencia.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios necesarios en la última pasada; la redacción española mantiene la misma lectura de equilibrio y de imposibilidad, con ajuste terminológico al sistema español del POB.
  spanish_consistency_notes:
  - Se mantiene la estructura binaria «disminuir ni añadir» para reflejar el paralelismo del griego.
  - «Yahvé» se usa de forma coherente con el estándar español del proyecto para el referente divino de κύριος.
  - Se evita introducir un objeto explícito que no aparece en el griego.
  - La nota a preserva una alternativa semántica real del verbo ἐξιχνιάσαι sin sobrecargar el texto principal.
