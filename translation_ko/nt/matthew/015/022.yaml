  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ γυνὴ Χαναναία ἀπὸ τῶν ὁρίων ἐκείνων ἐξελθοῦσα ⸀ἔκραζεν λέγουσα· Ἐλέησόν με, κύριε ⸀υἱὸς Δαυίδ· ἡ θυγάτηρ μου κακῶς δαιμονίζεται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/022.yaml
  text: 'And behold[a], a Canaanite woman from those regions came out and was crying out, saying, "Have mercy on me, Lord, Son of David; my daughter is badly demon-possessed."'
translation:
  language: ko
  text: '그런데 보십시오, 한 가나안 여자가 그 지역에서 나와 외치며 말합니다. 「주여, 다윗의 자손이여, 나를 불쌍히 여겨 주십시오. 내 딸이 귀신에 심하게 시달리고 있습니다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「귀신에게 심하게 짓눌리다」 / 「귀신에게 괴롭힘 당하다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνὴ Χαναναία
  english_pob_choice: a Canaanite woman
  chosen_korean: 한 가나안 여자
  alternatives_korean:
  - 한 가나안 여인
  lexicon: BDAG
  rationale: 마태가 마가의 「시로페니키아」 대신 구약적 「가나안」을 의도적으로 사용. 「가나안 여자」로 그 의도를 그대로 살린다.
- source_word: υἱὸς Δαυίδ
  english_pob_choice: Son of David
  chosen_korean: 다윗의 자손
  alternatives_korean:
  - 다윗의 아들
  lexicon: BDAG
  rationale: 메시아적 칭호. 한국 성경 전통에서 「다윗의 자손」이 정착어이며, 칭호로서의 무게가 분명하다.
- source_word: κακῶς δαιμονίζεται
  english_pob_choice: is badly demon-possessed
  chosen_korean: 귀신에 심하게 시달리고 있습니다
  alternatives_korean:
  - 귀신 들려 심하게 고통받고 있습니다
  lexicon: BDAG
  rationale: δαιμονίζομαι의 수동적 고통 어감을 살리면서 자연스러운 한국어로 옮긴다.
