translation:
  language: es
  text: No profanará[a] su descendencia[b] entre su pueblo, porque yo soy Yahvé, que lo santifica[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contaminará» o «deshonrará». El verbo hebreo expresa hacer profano o común lo que debería ser santo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, al quebrantar las restricciones matrimoniales en este contexto, traería profanación sobre su línea dentro de la comunidad del pacto.
    reason: cultural_note
  - marker: c
    text: O «que lo hace santo» o «que lo consagra».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַלֵּל
  english_pob_choice: profane
  chosen_spanish: profanará
  alternatives_spanish:
  - contaminará
  - deshonrará
  lexicon: HALOT
  rationale: El piel de חלל en contextos de santidad sacerdotal expresa hacer profano o común lo que debe ser santo. «Profanará» conserva el campo léxico cultual con la misma fuerza que el inglés POB «profane».
- source_word: זַרְע֖וֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - sus hijos
  - su linaje
  lexicon: HALOT
  rationale: זֶרַע puede referirse a semilla, descendencia o posteridad. En este contexto de matrimonio y línea sacerdotal, «descendencia» es natural en español y conserva la referencia genealógica sin la dureza literal de «simiente».
- source_word: בְּעַמָּ֑יו
  english_pob_choice: among his people
  chosen_spanish: entre su pueblo
  alternatives_spanish:
  - entre sus gentes
  - dentro de su pueblo
  lexicon: HALOT
  rationale: La preposición ב con עַם y sufijo se traduce de forma idiomática como «entre su pueblo». Mantiene el marco social y comunitario del mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, sin sustituirlo por un título. «Yahvé» es la forma estándar del proyecto para יהוה.
- source_word: מְקַדְּשׁוֹ
  english_pob_choice: who sanctifies him
  chosen_spanish: que lo santifica
  alternatives_spanish:
  - que lo hace santo
  - que lo consagra
  lexicon: HALOT
  rationale: El participio de קדשׁ expresa hacer santo o apartar para Dios. «Santifica» preserva el lenguaje formal de santidad que conviene al contexto sacerdotal y alinea con la lectura inglesa.
theological_decisions:
- issue: Alcance de la prohibición y efecto sobre la línea sacerdotal
  english_pob_reading: The verse refers to the priest not rendering his offspring profane within the covenant community, because the LORD is the one who sanctifies the priest.
  chosen_spanish_reading: El versículo dice que el sacerdote no debe profanar su descendencia dentro de su pueblo, porque Yahvé es quien lo santifica.
  alternative_spanish_readings:
  - El versículo podría entenderse más específicamente como una prohibición de descalificar su linaje sacerdotal mediante un matrimonio prohibido.
  - El versículo podría leerse como una referencia exclusiva a la pureza de la línea del sumo sacerdote.
  rationale: El contexto inmediato trata de restricciones matrimoniales sacerdotales, por lo que la descendencia está en juego; sin embargo, el hebreo no explicita en el texto una formulación más técnica sobre el oficio. La redacción española conserva la amplitud del original y no resuelve la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla en exceso.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios y el texto mantiene el acuerdo alto con la auditoría en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה según el estándar del proyecto.
  - Se usa «santifica» para קדשׁ, conservando el lenguaje de santidad sacerdotal.
  - «Descendencia» traduce זרע en su sentido genealógico, evitando el literalismo de «simiente».
  - Se conserva la fuerza cultual de חלל con «profanará», en línea con la decisión inglesa de no suavizar el verbo.
