revisions:
- from: Estas son las aguas de Meribá[a], donde los hijos de Israel disputaron con Yahvé[b], y fue mostrado santo entre ellos.
  to: Estas son las aguas de Meribá[a], con las cuales los hijos de Israel disputaron con Yahvé[b], y él fue reconocido como santo entre ellos.
  rationale: Se corrige la relativa para reflejar mejor el hebreo sin convertirla en un mero locativo, y se reemplaza la cláusula final por una formulación más natural en español que mantiene el sentido pasivo-manifestativo del nifal de קדש. También se mejora la nota alternativa para que el español represente mejor las opciones documentadas en la auditoría inglesa.
