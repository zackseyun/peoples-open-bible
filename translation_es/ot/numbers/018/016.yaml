translation:
  language: es
  text: 'Y los que deben ser redimidos desde un mes de edad, los redimirás conforme a tu valoración: cinco siclos de plata, según el siclo del santuario; equivale a veinte geras[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: "el siclo es de veinte geras". El pronombre hebreo se refiere al siclo del santuario como la medida patrón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְדוּיָו
  english_pob_choice: those to be redeemed
  chosen_spanish: los que han de ser redimidos
  alternatives_spanish:
  - su redimido
  - el precio de su redención
  - los redimidos de él/ella
  lexicon: HALOT
  rationale: El participio pasivo con sufijo es difícil de verter de forma literal. En este contexto legal sobre el rescate de los primogénitos, el sentido apunta a las personas que están sujetas a redención. En español, la perífrasis pasiva conserva el valor jurídico sin introducir un sustantivo ajeno al hebreo.
- source_word: מִבֶּן חֹדֶשׁ
  english_pob_choice: from a month old
  chosen_spanish: desde un mes de edad
  alternatives_spanish:
  - desde que cumple un mes
  - a la edad de un mes
  lexicon: HALOT
  rationale: La expresión marca el umbral de edad a partir del cual aplica la norma. 'Desde un mes de edad' mantiene el valor temporal y resulta natural en español jurídico-bíblico.
- source_word: תִּפְדֶּה
  english_pob_choice: you shall redeem
  chosen_spanish: los redimirás
  alternatives_spanish:
  - deberás redimirlos
  - redimirás
  lexicon: HALOT
  rationale: El imperfecto de 2ms en una instrucción legal se expresa como mandato futuro. Se usa el futuro simple para conservar la fuerza normativa, con complemento objeto explícito según el referente contextual.
- source_word: בְּעֶרְכְּךָ
  english_pob_choice: according to your valuation
  chosen_spanish: conforme a tu valoración
  alternatives_spanish:
  - según tu tasación
  - de acuerdo con tu valoración
  lexicon: HALOT
  rationale: ערך en contexto sacerdotal/legal tiene el sentido de valoración tasada. 'Conforme a tu valoración' mantiene el registro formal y la referencia al valor asignado por autoridad competente.
- source_word: כֶּסֶף חֲמֵשֶׁת שְׁקָלִים
  english_pob_choice: five shekels of silver
  chosen_spanish: cinco siclos de plata
  alternatives_spanish:
  - cinco siclos de dinero
  - cinco monedas de plata
  lexicon: HALOT
  rationale: La construcción monetaria se vierte de manera idiomática en español como 'siclos de plata', preservando la medida y el metal como en el hebreo.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - según el siclo sagrado
  - conforme al siclo del santuario
  lexicon: HALOT
  rationale: '''שקל הקדש'' especifica el patrón de peso usado en el santuario. ''Siclo del santuario'' conserva la terminología cultual y evita suavizarla a un equivalente genérico.'
- source_word: עֶשְׂרִים גֵּרָה הוּא
  english_pob_choice: it is twenty gerahs
  chosen_spanish: es de veinte geras
  alternatives_spanish:
  - el siclo es de veinte geras
  - equivale a veinte geras
  lexicon: HALOT
  rationale: El pronombre hebreo remite al siclo del santuario y define su equivalencia. 'Es de veinte geras' mantiene la relación de equivalencia sin forzar el antecedente en el flujo principal.
theological_decisions:
- issue: Referencia del pronombre final 'it' / הוּא
  english_pob_reading: The pronoun 'it' refers to the sanctuary shekel as the standard weight.
  chosen_spanish_reading: '''Es de veinte geras'' deja la equivalencia implícita, con el antecedente entendido como el siclo del santuario.'
  alternative_spanish_readings:
  - '''El siclo del santuario es de veinte geras'''
  - '''Él es de veinte geras'''
  rationale: El hebreo aclara que la unidad normativa es el siclo del santuario. En español, la formulación principal conserva la concisión del texto base; el sentido aclarado se entiende por el contexto inmediato, sin perder la equivalencia de medida.
  doctrine_reference: None
- issue: Carácter legal/normativo de la instrucción
  english_pob_reading: you shall redeem according to your valuation
  chosen_spanish_reading: los redimirás conforme a tu valoración
  alternative_spanish_readings:
  - deberás redimirlos según tu valoración
  - redime según tu valoración
  rationale: El versículo funciona como norma cultual y legal, no como narración. El futuro simple en español comunica mandato/instrucción con fidelidad al imperfecto hebreo.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente, que no introdujo cambios y mantuvo el consenso de la versión inglesa auditada. La redacción española sigue la misma lectura: redención de los primogénitos desde un mes de edad, valoración sacerdotal de cinco siclos de plata y aclaración metrológica del siclo del santuario.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como término estándar del proyecto solo cuando el hebreo lo exige; aquí el versículo no contiene el nombre divino.
  - '''Siclo'' y ''gera'' se mantienen como unidades antiguas transliteradas para preservar el sistema de medida del texto.'
  - Se evitó 'señor' o 'Señor' porque no corresponde a ninguna forma del hebreo aquí.
  - Se eligió 'redimidos/redimir' en vez de 'rescatados/rescatar' para reflejar el campo léxico de פדה en contexto legal.
