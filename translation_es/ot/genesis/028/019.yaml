translation:
  language: es
  text: Y llamó a aquel lugar Betel[a], pero antes el nombre de la ciudad era Luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Betel significa «casa de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - lo llamó
  - nombró
  lexicon: HALOT
  rationale: El hebreo usa un wayyiqtol de קרא con objeto de 'nombre'; en español, 'llamó' conserva bien el acto de nombrar sin sonar forzado. 'Lo llamó' podría explicitar el objeto, pero el hebreo no lo hace de forma directa en la superficie.
- source_word: אֶת שֵׁם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - nombre
  lexicon: HALOT
  rationale: Se conserva la estructura explícita 'llamó el nombre de'. Aunque 'nombró' sería más breve, 'el nombre' refleja mejor la forma hebrea auditable.
- source_word: הַמָּקוֹם הַהוּא
  english_pob_choice: that place
  chosen_spanish: aquel lugar
  alternatives_spanish:
  - ese lugar
  - ese sitio
  lexicon: HALOT
  rationale: '''Aquel'' reproduce la distancia demostrativa de הַהוּא con un registro natural en español bíblico contemporáneo. ''Lugar'' mantiene el sentido básico de מָקוֹם.'
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  - Casa de Dios
  lexicon: HALOT
  rationale: Se translitera el topónimo como 'Betel', forma ya asentada en español. No se traduce como 'Casa de Dios' en el texto principal para mantener el nombre propio; su sentido se deja para nota.
- source_word: וְאוּלָם
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - no obstante
  lexicon: HALOT
  rationale: La partícula introduce una aclaración contrastiva; 'pero' es la opción más directa y natural en español, sin sobrerrepresentar la fuerza adversativa.
- source_word: לוּז
  english_pob_choice: Luz
  chosen_spanish: Luz
  alternatives_spanish:
  - Lus
  lexicon: HALOT
  rationale: Nombre propio conservado sin adaptación, conforme al uso estándar.
- source_word: שֵׁם הָעִיר
  english_pob_choice: the name of the city
  chosen_spanish: el nombre de la ciudad
  alternatives_spanish:
  - el nombre de aquella ciudad
  - la ciudad se llamaba
  lexicon: HALOT
  rationale: Se mantiene el genitivo hebreo de forma transparente. 'La ciudad se llamaba' sería más idiomático, pero menos fiel a la estructura del original.
- source_word: לָרִאשֹׁנָה
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - antiguamente
  - primeramente
  - anteriormente
  lexicon: HALOT
  rationale: En este contexto temporal, 'antes' comunica con claridad que Luz era el nombre previo de la ciudad. 'Antiguamente' también sería posible, pero suena más interpretativo.
theological_decisions:
- issue: Sentido del nombre Betel
  english_pob_reading: Bethel means 'house of God.'
  chosen_spanish_reading: Betel significa 'casa de Dios'.
  alternative_spanish_readings:
  - Betel quiere decir 'casa de Dios'
  - 'Betel: ''casa de Dios'''
  rationale: Aunque el texto principal conserva el nombre propio, la nota explica su significado léxico sin convertirlo en traducción del nombre dentro del versículo. Esto preserva tanto el uso del topónimo como su valor semántico.
  doctrine_reference: Génesis 28:19; cf. Gn 28:17
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y sin revisiones aplicadas; por ello no se introducen cambios textuales expansivos. La solución sigue de cerca el hebreo y conserva la nota lexical del nombre propio como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto que requiera ajuste.
  - Se conserva la distinción entre nombre propio ('Betel', 'Luz') y su explicación semántica en nota, evitando paréntesis explicativos en el cuerpo del texto.
  - 'El orden sintáctico sigue el hebreo con fluidez española: verbo inicial, objeto ''el nombre'', luego el topónimo y la cláusula contrastiva final.'
