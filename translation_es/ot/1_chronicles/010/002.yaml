- from: Y los filisteos persiguieron a Saúl y a sus hijos[a], y los filisteos hirieron de muerte a Jonatán, a Abinadab y a Malqui-shúa, hijos de Saúl.
  to: Y los filisteos persiguieron a Saúl y a sus hijos[a], y los filisteos abatieron a Jonatán, a Abinadab y a Malqui-shúa, los hijos de Saúl.
  rationale: Se cambia «hirieron de muerte» por «abatieron» para reflejar mejor el hebreo וַיַּכּוּ y la decisión auditada «struck down», sin añadir un resultado más explícito de lo necesario. Se añade «los» en «los hijos de Saúl» para una apposición más natural y completa en español. Se conserva «sus hijos[a]» por fluidez, mientras la frase final identifica claramente que son los hijos varones de Saúl, y se pule la nota al pie para mayor naturalidad.
