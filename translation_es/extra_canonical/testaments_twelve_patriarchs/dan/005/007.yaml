source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: Καὶ *οἱ ἐμοὶ υἱοὶ⁶¹ συνεγγίζοντές⁶² εἰσι τοῦ⁶³ Λευὶ καὶ συναμαρτάνοντες⁶⁴ αὐτοῖς⁶⁵ ἐν πᾶσιν. *οἱ δὲ υἱοὶ τοῦ⁶⁶ Ἰούδα ἔσονται ἐν πλεονεξίᾳ ἁρπάζοντες⁶⁷ ἀλλότρια ὡς⁶⁸ λέοντες.]
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/007.yaml
  text: And my sons are drawing near to Levi and sinning together with them in all things. But the sons of Judah will be in greed, snatching what belongs to others like lions.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:36Z'
    unchanged: false
    changes_summary: Adjusted the first clause to reflect the present participles more directly ('are drawing near' / 'sinning together') rather than future auxiliaries. Kept the second clause future, and rendered ἐν πλεονεξίᾳ more formally as 'in greed.'
translation:
  language: es
  text: Y mis hijos se están acercando a Leví y pecando junto con ellos en todo. Pero los hijos de Judá estarán en codicia, arrebatando lo ajeno como leones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ ἐμοὶ υἱοὶ συνεγγίζοντές εἰσι
  english_pob_choice: my sons are drawing near
  chosen_spanish: mis hijos se están acercando
  alternatives_spanish:
  - mis hijos se acercan
  - mis hijos se aproximan
  lexicon: LSJ
  rationale: Refleja la revisión inglesa que prefiere participio presente sobre futuro. 'Se están acercando' captura el aspecto continuo griego.
- source_word: συναμαρτάνοντες αὐτοῖς
  english_pob_choice: sinning together with them
  chosen_spanish: pecando junto con ellos
  alternatives_spanish:
  - pecando con ellos
  - pecando en compañía suya
  lexicon: LSJ
  rationale: συναμαρτάνω = pecar juntamente; 'pecando junto con' preserva el prefijo σύν-.
- source_word: ἐν πλεονεξίᾳ
  english_pob_choice: in greed
  chosen_spanish: en codicia
  alternatives_spanish:
  - en avaricia
  - en avidez
  lexicon: LSJ
  rationale: πλεονεξία como vicio paulino se traduce tradicionalmente como 'codicia' o 'avaricia'; 'codicia' captura mejor el matiz de querer más de lo propio (cf. Lc 12:15).
- source_word: ἁρπάζοντες ἀλλότρια
  english_pob_choice: snatching what belongs to others
  chosen_spanish: arrebatando lo ajeno
  alternatives_spanish:
  - arrebatando los bienes ajenos
  - robando lo ajeno
  lexicon: LSJ
  rationale: ἁρπάζω → 'arrebatar' (verbo violento de rapiña). 'Lo ajeno' es la forma natural en español para ἀλλότρια.
- source_word: ὡς λέοντες
  english_pob_choice: like lions
  chosen_spanish: como leones
  alternatives_spanish:
  - a la manera de leones
  lexicon: LSJ
  rationale: Símil directo (cf. Gn 49:9 sobre Judá como león).
theological_decisions:
- issue: Judá representado en codicia/rapiña
  chosen_reading: los hijos de Judá estarán en codicia, arrebatando lo ajeno como leones
  alternative_readings:
  - interpretar la imagen como elogio de fuerza
  rationale: El contexto del testamento es advertencia escatológica negativa contra ambas tribus; la imagen del león aquí no es heroica sino voraz. Conservar la fuerza moral negativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'El inglés POB pasó de futuro ''will draw near / will sin'' a presente continuo ''are drawing near / sinning together'' para reflejar los participios presentes griegos. El español sigue ese cambio. ''Greedy'' pasó a ''in greed'' por formalidad: ''en codicia'' refleja la frase preposicional griega.'
  spanish_consistency_notes:
  - υἱοί → hijos.
  - πλεονεξία → codicia.
  - ἁρπάζω → arrebatar.
