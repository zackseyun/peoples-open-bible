translation:
  language: es
  text: Bendigan a Dios, ustedes que temen al Señor con entendimiento[a], porque la misericordia del Señor está sobre los que le temen[b], con juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con conocimiento» o «con discernimiento».
    reason: lexical_alternative
  - marker: b
    text: O «con justicia»; el griego deja comprimida la relación entre misericordia y juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendigan
  lexicon: BDAG
  rationale: El imperativo plural pide una respuesta doxológica directa. «Bendecid» conserva mejor la fuerza bíblica de εὐλογεῖτε que un genérico «alabad», y mantiene la cercanía con el lenguaje de bendecir a Dios sin volverlo una paráfrasis.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: θεόν se traduce de forma directa como «Dios», con artículo y complemento preposicional natural en español.
- source_word: οἱ φοβούμενοι τὸν κύριον
  english_pob_choice: you who fear the Lord
  chosen_spanish: ustedes que temen al Señor
  alternatives_spanish:
  - los que temen al Señor
  - ustedes, los que temen al Señor
  lexicon: BDAG
  rationale: Aunque el participio puede leerse como tercero plural, el POB inglés lo entendió vocativamente; en español, la segunda persona plural expresa mejor el llamado directo. «Señor» sigue la convención del POB para κύριος en este contexto devocional.
- source_word: ἐν ἐπιστήμῃ
  english_pob_choice: with understanding
  chosen_spanish: con entendimiento
  alternatives_spanish:
  - con conocimiento
  - con discernimiento
  lexicon: BDAG
  rationale: «Con entendimiento» reproduce la idea de una reverencia informada sin endurecer la frase en un calco como «en conocimiento». Mantiene la amplitud semántica de ἐπιστήμῃ y su matiz de saber aplicado.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - misericordia constante
  lexicon: BDAG
  rationale: «Misericordia» es el equivalente directo y más estable en español bíblico para ἔλεος. Evita sustituir por un término más interpretativo y conserva el tono devocional del pasaje.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor
  lexicon: BDAG
  rationale: Se mantiene «Señor» porque el texto fuente griego usa κύριος en un marco de cita/devoción donde el POB inglés ya fijó esa lectura. Aunque el proyecto prefiere «Yahvé» para יהוה en textos hebreos, aquí la fuente inmediata es griega y el audit trail documenta «Lord».
- source_word: φοβουμένους αὐτόν
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que lo temen
  - quienes le temen
  lexicon: BDAG
  rationale: La construcción participial se vierte de modo natural en español con «los que le temen», preservando el sentido reverente y la referencia personal a Dios.
- source_word: μετὰ κρίματος
  english_pob_choice: with judgment
  chosen_spanish: con juicio
  alternatives_spanish:
  - con justicia
  - con sentencia
  lexicon: BDAG
  rationale: «Con juicio» conserva la compresión y la tensión del griego. No se expande a «justicia» en el texto principal para no resolver lo que el pasaje deja ambivalente; en español, «juicio» mantiene la posibilidad judicial sin perder la sobriedad del término.
theological_decisions:
- issue: Relación entre misericordia y juicio en μετὰ κρίματος
  english_pob_reading: The Lord's mercy is upon those who fear him, with judgment.
  chosen_spanish_reading: La misericordia del Señor está sobre los que le temen, con juicio.
  alternative_spanish_readings:
  - La misericordia del Señor está sobre los que le temen, con justicia
  - La misericordia del Señor, unida al juicio, está sobre los que le temen
  rationale: El griego mantiene una relación comprimida y no decide de forma explícita si κρίμα debe entenderse como juicio, justicia o medida judicial. El español principal conserva esa tensión con «con juicio», evitando una resolución interpretativa demasiado fuerte.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó confirmado sin observaciones por el control de concordancia, por lo que esta redacción sigue de cerca el texto griego y el trazado auditado en inglés.
  spanish_consistency_notes:
  - 'Se mantiene la convención del proyecto para κύριος en este contexto griego: «Señor», no «Yahvé», porque no se está traduciendo un hebreo explícito.'
  - «Bendecid» conserva el registro litúrgico y la forma de plural exhortativo.
  - «Con juicio» mantiene la ambigüedad deliberada de κρίμα sin sustituirla por una explicación interpretativa.
  - No se introduce «Cristo» ni terminología ajena al pasaje.
