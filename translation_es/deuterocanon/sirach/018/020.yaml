translation:
  language: es
  text: Antes del juicio, examínate, y en la hora de la visitación[a] encontrarás expiación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la hora de la inspección» o «en el tiempo del recuento»; el lenguaje de visitación en griego puede sugerir un momento de revisión divina o de intervención.
    reason: lexical_alternative
  - marker: b
    text: O «expiación» o «propiciación»; el griego señala la remoción de culpa y el restablecimiento del favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ κρίσεως
  english_pob_choice: Before judgment
  chosen_spanish: Antes del juicio
  alternatives_spanish:
  - Antes de la condenación
  - Antes de la decisión
  lexicon: LSJ
  rationale: κρίσις conserva un campo amplio de juicio o evaluación judicial. «Juicio» mantiene esa amplitud en español sin restringirlo a «condenación» ni volverlo demasiado abstracto con «decisión».
- source_word: ἐξέταζε
  english_pob_choice: examine
  chosen_spanish: examínate
  alternatives_spanish:
  - pruébate
  - escudríñate
  - investígate
  lexicon: LSJ
  rationale: El imperativo pide autoexamen. «Examínate» es natural en español actual y conserva el sentido reflexivo y exhortativo mejor que alternativas más ásperas o más técnicas.
- source_word: σεαυτόν
  english_pob_choice: yourself
  chosen_spanish: a ti mismo
  alternatives_spanish:
  - a ti
  - a tu persona
  lexicon: LSJ
  rationale: El reflexivo directo se expresa con claridad en español como «a ti mismo», que suena natural y enfático sin añadir contenido.
- source_word: ἐν ὥρᾳ ἐπισκοπῆς
  english_pob_choice: in the hour of visitation
  chosen_spanish: en la hora de la visitación
  alternatives_spanish:
  - en la hora de la inspección
  - en el tiempo del recuento
  - en la hora de la supervisión
  lexicon: LSJ
  rationale: ἐπισκοπή puede significar visitación, inspección u oversight. «Visitación» preserva la resonancia bíblica y la posible dimensión divina/judicial, sin resolver la ambigüedad hacia un sentido meramente administrativo.
- source_word: εὑρήσεις
  english_pob_choice: you will find
  chosen_spanish: encontrarás
  alternatives_spanish:
  - hallarás
  - obtendrás
  - descubrirás
  lexicon: LSJ
  rationale: El futuro de εὑρίσκω se rinde de forma natural con «encontrarás». «Hallarás» también sería posible, pero «encontrarás» resulta más corriente y claro en español moderno.
- source_word: ἐξιλασμόν
  english_pob_choice: atonement
  chosen_spanish: expiación
  alternatives_spanish:
  - atonement
  - propiciación
  - reconciliación
  lexicon: LSJ
  rationale: Ἐξιλασμός se refiere a la remoción de culpa y al restablecimiento del favor. En español, «expiación» mantiene con precisión el peso sacrificial y reconciliador; «propiciación» es más técnico y «reconciliación» puede perder la noción de expiación.
theological_decisions:
- issue: Sentido de ἐπισκοπή en contexto sapiencial
  english_pob_reading: visitation with likely divine/judicial overtones
  chosen_spanish_reading: visitación con matiz divino o judicial
  alternative_spanish_readings:
  - inspección
  - supervisión
  - recuento
  rationale: La traducción conserva «visitación» para no cerrar el pasaje a un sentido puramente administrativo. Así se mantiene la tensión entre visita divina, revisión judicial e intervención decisiva.
  doctrine_reference: Preservar la tensión teológica del término en lugar de resolverla de antemano.
- issue: Traducción de ἐξιλασμόν
  english_pob_reading: atonement
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - propiciación
  - atonement
  - perdón
  rationale: «Expiación» comunica el valor sacrificial y purificador del término sin recurrir a jerga eclesiástica. «Perdón» sería demasiado débil y no reflejaría la densidad cultual del griego.
  doctrine_reference: Evitar simplificar un término sacrificial a mera absolución moral.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión indicada: no se reportaron cambios necesarios y el cotejo final mostró alto acuerdo. La decisión española mantiene la misma arquitectura semántica del audit trail inglés: juicio -> autoexamen -> visitación -> expiación.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se usa «visitación» para conservar la ambigüedad teológica del término griego ἐπισκοπή.
  - Se prefiere «expiación» sobre «propiciación» por claridad moderna y fidelidad sacrificial.
  - La estructura sintáctica sigue de cerca el original griego sin calco innecesario.
