lexical_decisions:
- source_word: ἀπέστειλαν
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω expresa envío; «enviaron» es natural en español y conserva el sentido narrativo sin añadir matiz técnico.
- source_word: ἀγγέλους
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: BDAG
  rationale: El contexto narrativo apunta a representantes humanos, no a seres celestiales; «mensajeros» mantiene esa amplitud y corresponde al inglés auditado.
- source_word: λόγοις εἰρηνικοῖς
  english_pob_choice: peaceful words
  chosen_spanish: palabras de paz
  alternatives_spanish:
  - palabras pacíficas
  - términos de paz
  - palabras de reconciliación
  lexicon: BDAG
  rationale: La expresión dativa puede funcionar como contenido o modo del mensaje. «Palabras de paz» conserva el sustantivo λόγοις y la idea de una propuesta conciliadora o de paz, sin cerrar indebidamente la ambigüedad.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: Participio de introducción del discurso; «diciendo» es la forma breve y estándar en español narrativo.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - ante él
  - hacia él
  lexicon: BDAG
  rationale: Con verbos de envío, πρὸς + acusativo señala destino o receptor. «A él» es fiel, aunque más literal que «le», y conserva el referente explícito del griego.
translation_notes:
  revision_awareness: El inglés auditado pasó de «words of peace» a «peaceful words» para una formulación más natural; en español se optó por «palabras de paz» para preservar el sustantivo «palabras» y dejar abierta la misma amplitud semántica de λόγοις εἰρηνικοῖς.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando «embajadores» por ser más interpretativo que el contexto exige.
  - Se prefirió «palabras de paz» en lugar de una paráfrasis como «mensajes pacíficos» para respetar la forma nominal del griego.
  - La puntuación reproduce la estructura narrativa breve del versículo y conserva la coma final que introduce el discurso.
