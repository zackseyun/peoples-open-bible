translation:
  language: es
  text: Entonces edifica un altar a Yahvé, tu Dios, sobre la cumbre de esta fortaleza[a], en ordenada disposición, y toma el segundo toro y ofrécelo en holocausto con la madera de la Aserá que cortes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bastión». El hebreo מָעוֹז puede referirse a un lugar fortificado o de fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה / לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma recomendada en el proyecto, en vez de ocultarlo con un título genérico. La preposición ל aquí expresa destino/dedicación, por lo que «para» comunica bien la finalidad cultual del altar.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios tuyo
  - tu Dios de pacto
  lexicon: HALOT
  rationale: La expresión mantiene el vínculo de alianza y la dirección personal del mandato sin añadir explicaciones que el hebreo no exige.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - sacrificio-altar
  lexicon: HALOT
  rationale: Es el equivalente directo y estable para el lugar de sacrificio.
- source_word: רֹאשׁ הַמָּעוֹז הַזֶּה
  english_pob_choice: the top of this stronghold
  chosen_spanish: la cumbre de este fuerte
  alternatives_spanish:
  - la cima de esta fortaleza
  - la cumbre de esta fortaleza
  lexicon: HALOT
  rationale: רֹאשׁ se vierte naturalmente como «cumbre» o «cima». מָעוֹז designa un lugar fortificado o de fuerza; «fuerte» conserva ese valor sin decidir más de lo necesario sobre el tipo exacto de estructura.
- source_word: בַּמַּעֲרָכָה
  english_pob_choice: in orderly arrangement
  chosen_spanish: en orden
  alternatives_spanish:
  - en orden correcto
  - de manera ordenada
  lexicon: HALOT
  rationale: La expresión es breve y algo concentrada; en español, «en orden» preserva la idea de disposición ordenada/procedente sin sobreespecificar objetos o pasos que el hebreo no nombra explícitamente.
- source_word: הַפָּר הַשֵּׁנִי
  english_pob_choice: the second bull
  chosen_spanish: el segundo toro
  alternatives_spanish:
  - el segundo novillo
  - el segundo buey
  lexicon: HALOT
  rationale: פָּר se refiere a un toro/bull. «Toro» es claro y natural en español; se evita añadir «joven» porque no está exigido por el sustantivo mismo aquí.
- source_word: וְהַעֲלִיתָ עוֹלָה
  english_pob_choice: offer it up as a burnt offering
  chosen_spanish: ofrécelo en holocausto
  alternatives_spanish:
  - sacrifícalo como holocausto
  - preséntalo en holocausto
  lexicon: HALOT
  rationale: «Holocausto» es el término técnico español para la ofrenda totalmente quemada. El verbo «ofrecer» mantiene el sentido sacrificial idiomático de הִעֲלָה sin perder naturalidad.
- source_word: בַּעֲצֵי הָאֲשֵׁרָה
  english_pob_choice: with the wood of the Asherah
  chosen_spanish: con la madera de la Aserá
  alternatives_spanish:
  - con la madera de Asherá
  - con la madera del poste de Aserá
  lexicon: HALOT
  rationale: Se conserva el término cultual debatido como nombre propio/objeto de culto, siguiendo el criterio del POB de no resolver de forma cerrada el referente. «Madera» traduce עֲצֵי de modo directo.
- source_word: אֲשֶׁר תִּכְרֹת
  english_pob_choice: that you cut down
  chosen_spanish: que tú cortarás
  alternatives_spanish:
  - que tú derribarás
  - que tú talarás
  lexicon: HALOT
  rationale: En el contexto de un objeto/árbol cultual, «cortarás» comunica bien la acción mandada. Se conserva el valor relativo de la cláusula final sin convertirla en una paráfrasis más larga.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se sigue la política del proyecto de expresar el Tetragrámaton por el nombre divino en la lengua meta, en lugar de sustituirlo por un título en mayúsculas. «Yahvé» es la forma establecida en el texto español del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de הָאֲשֵׁרָה
  english_pob_reading: the Asherah
  chosen_spanish_reading: la Aserá
  alternative_spanish_readings:
  - la Aserah
  - el poste de Aserá
  - el árbol de Aserá
  rationale: El hebreo puede referirse a un objeto de culto asociado con Asherah, pero el alcance exacto es debatido. Mantener «Aserá» evita imponer una identificación más precisa que la del texto; la nota preserva la alternativa explicativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
translation_notes:
  revision_awareness: 'La redacción española sigue el consenso alto del audit trail inglés y refleja la revisión más reciente que prefirió una formulación más natural para בַּמַּעֲרָכָה. Se mantuvieron sin resolver de forma innecesaria las dos tensiones léxicas principales: מָעוֹז (fuerte/fortaleza) y הָאֲשֵׁרָה (Aserá/posible objeto de culto).'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto.
  - Se conserva «Aserá» como transliteración funcional del término cultual debatido.
  - «Holocausto» se emplea en sentido técnico sacrificial, no en el uso moderno no bíblico.
  - La cláusula final mantiene el futuro español para reflejar el mandato secuencial del hebreo.
