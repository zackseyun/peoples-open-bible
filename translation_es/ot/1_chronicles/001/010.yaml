translation:
  language: es
  text: Y Cus engendró a Nimrod; él comenzó a ser un poderoso en la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la tierra». El hebreo אֶרֶץ puede significar «tierra» o «land/territorio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כּוּשׁ
  english_pob_choice: And Cush
  chosen_spanish: Y Cus
  alternatives_spanish:
  - Ahora Cus
  lexicon: HALOT
  rationale: La conjunción וְ enlaza una nota genealógica continua, por lo que en español la conexión simple con «Y» es natural. El nombre propio כּוּשׁ se translitera como «Cus» para conservar la referencia onomástica del texto fuente.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró a
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: En contextos genealógicos, ילד expresa la generación directa de un descendiente. «Engendró» mantiene esa fuerza genealógica en español bíblico moderno sin depender de una formulación más interpretativa.
- source_word: נִמְרֹד
  english_pob_choice: Nimrod
  chosen_spanish: Nimrod
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma transliterada estándar en español.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - este
  - él mismo
  lexicon: Hebrew grammar
  rationale: El pronombre independiente aporta énfasis o reanudación; en español normalmente se expresa con «él» sin sobrecargar el texto con una marcación adicional.
- source_word: הֵחֵל לִהְיוֹת
  english_pob_choice: began to be
  chosen_spanish: comenzó a ser
  alternatives_spanish:
  - empezó a ser
  - fue el primero en ser
  - llegó a ser
  lexicon: HALOT
  rationale: La combinación verbal indica inicio de estado o actividad. «Comenzó a ser» refleja con naturalidad el valor inceptivo del hebreo sin introducir una paráfrasis más fuerte que el original.
- source_word: גִּבּוֹר
  english_pob_choice: a mighty one
  chosen_spanish: un hombre poderoso
  alternatives_spanish:
  - un poderoso
  - un valiente
  - un guerrero
  lexicon: HALOT
  rationale: גִּבּוֹר puede abarcar fuerza, prestigio o capacidad guerrera. «Un hombre poderoso» comunica la idea general en español y evita estrechar el sentido a «guerrero», que sería más específico que el hebreo aquí.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra/país
  - sobre la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede significar «tierra» o «país/land». Aquí la POB inglesa preserva la ambigüedad con nota; en español «en la tierra» mantiene esa amplitud semántica de manera natural.
theological_decisions:
- issue: Alcance de בָּאָרֶץ en la caracterización de Nimrod
  english_pob_reading: in the land
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - en el país
  - sobre la tierra
  rationale: El hebreo אֶרֶץ es semánticamente amplio y el contexto no obliga a universalizar la afirmación. «En la tierra» conserva la amplitud sin resolver la tensión entre ‘tierra’ y ‘país/land’, coherente con la filosofía de preservar alternativas interpretativas.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió una formulación más formal para גִּבּוֹר («a mighty one») sin añadir explicaciones interpretativas. En español se optó por una equivalencia natural con «un hombre poderoso», manteniendo la amplitud semántica y la transparencia audit trail del POB.
  spanish_consistency_notes:
  - Se usa «Cus» para כּוּשׁ y «Nimrod» para נִמְרֹד, conforme a transliteración estable de nombres propios.
  - Se conserva el paralelismo narrativo breve típico de genealogías hebreas.
  - No se traduce la partícula אֶת de manera independiente, ya que solo marca el objeto directo.
  - La nota de pie mantiene la alternativa semántica de אֶרֶץ sin imponer una lectura universalizante.
