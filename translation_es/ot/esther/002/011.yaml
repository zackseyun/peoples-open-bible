revisions:
- from: Y cada día Mardoqueo caminaba de un lado a otro frente al patio de la casa de las mujeres[a], para saber cómo estaba Ester y qué se haría con ella.
  to: Y cada día Mardoqueo caminaba de un lado a otro frente al patio de la casa de las mujeres[a], para saber del bienestar de Ester y qué se haría con ella.
  rationale: Se ajusta 'cómo estaba Ester' a 'del bienestar de Ester' para reflejar mejor שְׁלוֹם y alinearse con la revisión final del POB inglés, manteniendo un español natural y digno. También se pule la redacción tipográfica de la nota sin alterar su contenido sustancial.
