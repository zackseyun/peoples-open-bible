revisions:
- from: Cántico de las Ascensiones. Cuando Yahvé restauró la fortuna de Sion[a], éramos como los que sueñan.
  to: Cántico de ascenso. Cuando Yahvé restauró la suerte de Sion[a], fuimos como quienes sueñan.
  rationale: Se ajusta el superscrito a un español más natural y digno, se reemplaza 'fortuna' por 'suerte' para reflejar mejor el modismo hebreo sin sugerencias indebidas, y se afina la cláusula final con 'fuimos como quienes sueñan' para una correspondencia más natural con el perfecto hebreo y mejor fluidez en español. La nota se mantiene y se armoniza léxicamente con el texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:26:25Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro inglés del POB en los puntos principales: mantiene el superscrito, traduce בְּשׁוּב temporalmente como ''Cuando'', usa ''Yahvé'' para יְהוָה, conserva la amplitud semántica de שִׁיבַת צִיּוֹן en el texto principal y preserva la alternativa exílica en nota. Sin embargo, ''Cántico de las Ascensiones'' suena menos idiomático en español bíblico que ''Cántico de ascenso(s)'', y ''éramos como los que sueñan'' desajusta el valor puntual/narrativo de הָיִינוּ frente al más natural ''éramos como quienes sueñan'' o mejor ''fuimos como quienes sueñan'' en este contexto. También conviene mejorar ''la fortuna de Sion'', que en español puede sonar a riqueza o azar, hacia ''la suerte de Sion'', que preserva mejor el giro semítico de restauración de fortuna/cautividad.'
  spanish_quality_summary: 'La redacción es comprensible, pero tiene dos tropiezos de naturalidad y registro: ''las Ascensiones'' se percibe calcado y poco usado; ''la fortuna de Sion'' es menos claro en español eclesial general. ''Como los que sueñan'' es aceptable, pero ''como quienes sueñan'' fluye mejor. La nota es clara y fiel.'
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> ''Yahvé'' correctamente; no hay términos doctrinales mayores fuera de eso. La excepción propuesta es estilística/idiomática: שִׁיבַת no conviene como ''fortuna'' en español, aunque refleje el inglés ''fortunes''; ''suerte'' transmite mejor el mismo campo semántico sin perder la tensión con ''cautividad'' preservada en la nota.'
  issues:
  - severity: medium
    issue: Superscrito 'Cántico de las Ascensiones' poco idiomático
    rationale: Aunque es formalmente cercano a 'A Song of Ascents', en español bíblico suena rígido y poco natural. 'Cántico de ascenso' preserva mejor el título tradicional sin caer en calco torpe.
  - severity: medium
    issue: '''la fortuna de Sion'' puede sugerir riqueza o azar'
    rationale: El hebreo שִׁיבַת צִיּוֹן aquí apunta a restauración de la suerte/estado de Sion, con posible matiz de cautividad. 'Suerte' funciona mejor que 'fortuna' en español amplio y mantiene la amplitud semántica.
  - severity: low
    issue: Aspecto verbal de 'éramos' discutible en contexto narrativo
    rationale: הָיִינוּ es perfecto y en español puede sonar más vivo 'fuimos como quienes sueñan'. No es error grave, pero mejora la correspondencia y la naturalidad del verso.
  revised_spanish_text: Cántico de ascenso. Cuando Yahvé restauró la suerte de Sion[a], fuimos como quienes sueñan.
  revised_footnotes:
