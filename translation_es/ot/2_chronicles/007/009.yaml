- from: El octavo día celebraron una asamblea solemne[a][b], porque habían dedicado el altar durante siete días, y la fiesta durante siete días.
  to: El octavo día celebraron una asamblea solemne[a], porque celebraron la dedicación del altar[b] durante siete días, y la fiesta durante siete días.
  rationale: Se corrige el cambio de sentido introducido por 'habían dedicado' y se restituye la idea fuente de que realizaron/celebraron la dedicación del altar durante siete días. También se recoloca la nota textual para que comente el verbo correcto.
