translation:
  language: es
  text: Entonces Josué reunió a todas las tribus de Israel a Siquem[a], y llamó a los ancianos de Israel, a sus cabezas[b], a sus jueces y a sus oficiales; y se presentaron delante de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Siquem»; la forma hebrea es direccional, literalmente «hacia Siquem».
    reason: lexical_alternative
  - marker: b
    text: O «sus líderes» para «sus cabezas».
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «delante de Dios»; esto puede implicar una comparecencia en un santuario o sitio sagrado del pacto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֶּאֶסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - congregó
  lexicon: HALOT
  rationale: אָסַף en este contexto narrativo indica traer a un grupo para una asamblea. En español, «reunió» es natural y conserva la idea concreta de convocar y juntar personas.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of Israel
  chosen_spanish: las tribus de Israel
  alternatives_spanish:
  - los grupos tribales de Israel
  lexicon: HALOT
  rationale: «Tribus» es el equivalente social-político estándar y fiel para שֵׁבֶט en este contexto nacional.
- source_word: שְׁכֶמָה
  english_pob_choice: to Shechem
  chosen_spanish: en dirección a Siquem
  alternatives_spanish:
  - a Siquem
  - hacia Siquem
  lexicon: HALOT
  rationale: La forma hebrea es direccional, literalmente «hacia/ a Siquem». En español, «en dirección a Siquem» preserva el matiz direccional sin sonar forzado; el cumplimiento de la reunión se entiende en el contexto narrativo.
- source_word: וַיִּקְרָא לְ
  english_pob_choice: he called for
  chosen_spanish: llamó a
  alternatives_spanish:
  - convocó a
  - mandó llamar a
  lexicon: HALOT
  rationale: קרא con ל expresa convocar a personas específicas. «Llamó a» es breve, claro y suficientemente fiel; «convocó a» también sería posible, pero algo más formal.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los mayores de Israel
  lexicon: HALOT
  rationale: «Ancianos» es el equivalente habitual y preciso para el grupo de liderazgo reconocido.
- source_word: רָאשָׁיו
  english_pob_choice: its heads
  chosen_spanish: sus cabezas
  alternatives_spanish:
  - sus jefes
  - sus líderes
  lexicon: HALOT
  rationale: La traducción literal «sus cabezas» conserva la imagen semítica y la distinción funcional frente a los ancianos. Se mantiene la tensión lexical en lugar de nivelarla con un término interpretativo.
- source_word: שֹׁפְטָיו
  english_pob_choice: its judges
  chosen_spanish: sus jueces
  alternatives_spanish:
  - sus magistrados
  lexicon: HALOT
  rationale: «Jueces» refleja de forma directa el título cívico/judicial del hebreo.
- source_word: שֹׁטְרָיו
  english_pob_choice: its officers
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus funcionarios
  - sus alguaciles
  lexicon: HALOT
  rationale: שֹׁטֵר designa funcionarios administrativos o encargados. «Oficiales» mantiene la función sin sobreespecificar.
- source_word: וַיִּתְיַצְּבוּ
  english_pob_choice: they presented themselves
  chosen_spanish: se presentaron
  alternatives_spanish:
  - se pusieron de pie
  - tomaron su lugar
  lexicon: HALOT
  rationale: El hitpael expresa situarse formalmente ante una autoridad. «Se presentaron» transmite bien el carácter ceremonial y judicial del encuentro.
- source_word: לִפְנֵי הָאֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - delante del Dios
  lexicon: HALOT
  rationale: El hebreo dice הָאֱלֹהִים, no YHWH. «Delante de Dios» es una traducción directa y digna, sin sustituir indebidamente el término por «el SEÑOR».
theological_decisions:
- issue: Significado de לִפְנֵי הָאֱלֹהִים en un contexto de asamblea pactal
  english_pob_reading: before God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - ante Dios
  - delante del santuario de Dios
  rationale: El texto hebreo nombra explícitamente a Dios, no al nombre divino YHWH. La frase puede sugerir un contexto sagrado o cultual, pero esa expansión interpretativa se conserva solo como posibilidad, no como sustitución en el texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 5; distinción YHWH/אֱלֹהִים
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; esta redacción mantiene el acuerdo alto con el texto fuente y con la auditoría inglesa, conservando tanto el matiz direccional de שְׁכֶמָה como la tensión literal de רָאשָׁיו y la formulación directa de הָאֱלֹהִים.
  spanish_consistency_notes:
  - Se mantiene «Dios» para הָאֱלֹהִים y no se sustituye por «Yahvé» o «el SEÑOR», porque el versículo no usa YHWH.
  - Se conserva «Siquem» como forma española estándar del topónimo.
  - «Sus cabezas» queda deliberadamente literal para respetar la estructura hebrea y la distinción de oficios.
  - La puntuación y el flujo de la oración buscan una lectura pública clara sin añadir contenido interpretativo al texto principal.
