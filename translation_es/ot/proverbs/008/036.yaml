revisions:
- from: Pero el que peca contra mí hace violencia a su vida[a]; todos los que me aborrecen aman la muerte.
  to: Pero el que peca contra mí hace violencia a su alma[a]; todos los que me aborrecen aman la muerte.
  rationale: Se ajusta נַפְשׁוֹ a «su alma» en el texto principal para seguir mejor la revisión final documentada en inglés («wrongs his own soul») y para lograr un español más natural y solemne que «hace violencia a su vida». La nota preserva la amplitud semántica de נפש («alma/vida» y, por extensión, la propia persona).
