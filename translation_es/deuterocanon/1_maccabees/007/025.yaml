    issue: La nota [a] está anclada en la frase equivocada.
    rationale: La variante/sentido problemático afecta a «no podía hacerles frente», no a «se habían fortalecido». La ancla actual puede confundir al lector sobre cuál expresión está en discusión textual.
  - severity: medium
    issue: «Los acusó maliciosamente» no preserva del todo el matiz de «brought wicked charges against them».
    rationale: κατηγόρησεν tiene color forense de acusar/presentar cargos, y πονηρά califica las acusaciones como malas o maliciosas. La formulación adverbial suena menos precisa que una construcción nominal como «presentó acusaciones maliciosas contra ellos».
