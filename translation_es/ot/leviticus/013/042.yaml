review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura condicional y la distinción entre las dos zonas de calvicie, pero no representa fielmente צָרַעַת al traducirlo como «sarna», que es demasiado específico y engañoso frente al sentido más amplio de afección/enfermedad cutánea documentado en la auditoría. Además, las notas al pie están invertidas respecto de sus anclajes en el texto: [a] está en «calva» pero contiene la nota cultural sobre la distinción de términos, mientras [b] está en «frente calva» pero contiene la nota léxica sobre «lepra», cuando esta debería anclarse al término que traduce צָרַעַת.'
  spanish_quality_summary: El español es fluido y legible, pero «sarna» introduce una lectura popular y médica impropia en este contexto. «Rojiblanca» y «lesión» funcionan aceptablemente. La repetición «en su calva o en su frente calva» es natural dentro del registro legal. Conviene mantener una formulación más exacta como «enfermedad cutánea» y anclar las notas donde corresponden.
  glossary_alignment: No hay conflicto con términos de proyecto mayores como Yahvé/Mesías. Sí hay desalineación con la rationale léxica del inglés POB para צָרַעַת, que explícitamente evita identificarlo con una enfermedad moderna concreta. «Enfermedad cutánea» o «afección cutánea» se alinea mejor; la alternativa tradicional «lepra» debe quedar en nota. La distinción entre קָרַחַת y גַּבַּחַת puede mantenerse en texto como «calva» / «frente calva» con nota cultural.
  issues:
  - severity: high
    issue: «sarna» para צָרַעַת
    rationale: «Sarna» nombra una enfermedad concreta y no corresponde al sentido amplio del hebreo ni a la decisión auditada del POB, que evita equiparar el término con una entidad médica específica.
  - severity: high
    issue: Notas al pie mal ancladas/intercambiadas
    rationale: La nota sobre la distinción entre las dos zonas de calvicie debe anclarse a «calva»/«frente calva», mientras la nota sobre la alternativa tradicional «lepra» debe anclarse al término que traduce צָרַעַת. En el borrador actual, los marcadores no corresponden a sus contenidos.
  - severity: medium
    issue: Pérdida parcial de la fuerza diagnóstica de צָרַעַת פֹּרַחַת
    rationale: «Es una sarna que brota» suena coloquial y estrecha el sentido. «Es una enfermedad cutánea[a] que brota» o «...leprosa[a] que brota» preserva mejor el registro y la semántica.
