  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὕτως ἡμᾶς λογιζέσθω ἄνθρωπος ὡς ὑπηρέτας Χριστοῦ καὶ οἰκονόμους μυστηρίων θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/001.yaml
  text: 'This is how a person should regard us: as servants of Messiah and stewards of the mysteries of God[a][b].'
  footnotes:
  - marker: a
    text: 'Or ''Christ.'' The Greek title Χριστός is rendered ''Messiah'' here because it functions as a title.'
    reason: lexical_alternative
  - marker: b
    text: '''A man'' here has generic force, meaning any person in general.'
    reason: cultural_note
translation:
  language: ko
  text: 사람은 우리를 메시아의 종이며 하나님의 비밀들의 청지기로 여겨야 합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπηρέτας
  english_pob_choice: servants
  chosen_korean: 종
  alternatives_korean:
  - 수종드는 자
  - 조력자
  lexicon: BDAG
  rationale: ὑπηρέτης는 「상관 밑에서 일하는 자」. 노예(δοῦλος)의 강한 매임과 구분되는 「종」이 적합.
- source_word: οἰκονόμους
  english_pob_choice: stewards
  chosen_korean: 청지기
  alternatives_korean:
  - 관리인
  - 맡은 자
  lexicon: BDAG
  rationale: 가정 재산을 맡은 노예 관리인 비유. 한국어 신학 정착어.
- source_word: μυστηρίων θεοῦ
  english_pob_choice: mysteries of God
  chosen_korean: 하나님의 비밀들
  alternatives_korean:
  - 하나님의 신비들
  lexicon: BDAG
  rationale: '2:7과 일관. 종말론적 감추어진 경륜.'
