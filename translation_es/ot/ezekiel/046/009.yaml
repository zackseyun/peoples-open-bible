review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura normativa del hebreo: entrada por una puerta, salida por la opuesta, prohibición de regresar por la misma. Conserva correctamente יְהוָה como «Yahvé» y transmite la idea cultual de לְהִשְׁתַּחֲוֺת con «postrarse». Sin embargo, «en las fiestas señaladas» estrecha algo el alcance de בַּמּוֹעֲדִים frente al valor más amplio «tiempos señalados», y la nota [a] queda invertida respecto a la opción principal del audit trail inglés. Además, «de frente» comunica parcialmente נִכְחוֹ, pero «recto hacia adelante» o «directamente hacia adelante» expresa mejor la idea de seguir al frente y salir por el lado opuesto.'
  spanish_quality_summary: El texto es claro y natural en español eclesial moderno. «El pueblo de la tierra» suena un poco marcado, pero es defendible por fidelidad contextual. La frase final mejora en naturalidad y precisión si se evita el algo ambiguo «de frente». También conviene ajustar la nota de [b], porque la alternativa más literal no es simplemente repetir «postrarse», sino aclarar el matiz corporal/cultual.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Yahvé» para יְהוָה, «postrarse» para הִשְׁתַּחֲוָה con nota explicativa, y mantenimiento del contraste espacial de las puertas norte/sur. La principal excepción es בַּמּוֹעֲדִים, donde conviene volver al valor por defecto más amplio «tiempos señalados» y dejar «fiestas/festividades» como alternativas en nota.'
  issues:
  - severity: medium
    issue: «en las fiestas señaladas» estrecha בַּמּוֹעֲדִים
    rationale: El hebreo puede referirse a tiempos señalados en sentido amplio, no solo a fiestas. El audit trail inglés eligió «appointed times» precisamente para preservar ese rango.
  - severity: low
    issue: La nota [a] presenta como alternativas lo que debería ser la opción principal y viceversa
    rationale: Si se mantiene la lógica del audit trail, la redacción principal debería ser «tiempos señalados», con «fiestas señaladas»/«festividades» en nota.
  - severity: medium
    issue: «de frente» es algo ambiguo para כִּי נִכְחוֹ יֵצֵאוּ
    rationale: Puede sonar a orientación corporal, pero no expresa con suficiente claridad la idea de seguir recto y salir por el lado opuesto. «Recto hacia adelante» o equivalente comunica mejor el mandato.
  - severity: low
    issue: La nota [b] podría reflejar mejor el literal corporal del verbo
    rationale: La nota actual repite demasiado la opción principal; conviene señalar explícitamente «inclinarse/prosternarse en adoración» como alternativa explicativa.
  revised_spanish_text: Cuando el pueblo de la tierra venga ante Yahvé en los tiempos señalados[a], el que entre por la puerta del norte para postrarse[b] saldrá por la puerta del sur; y el que entre por la puerta del sur saldrá por la puerta del norte. No volverá por la puerta por la que entró, sino que saldrá recto hacia adelante[c].
  revised_footnotes:
  - marker: a
    text: 'O: «en las fiestas señaladas» o «en las festividades».'
    reason: lexical_alternative
  - marker: b
    text: Lit., «inclinarse» o «prosternarse en adoración».
    reason: lexical_alternative
  - marker: c
    text: Lit., «enfrente de él/ello saldrán»; es decir, deben seguir recto y salir por el lado opuesto, no volver por la puerta de entrada.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos puntos principales: restituye el valor más amplio de בַּמּוֹעֲדִים con «tiempos señalados», dejando las opciones festivas en nota, y precisa la cláusula final con «recto hacia adelante», que refleja mejor la instrucción de continuar al frente y salir por el lado opuesto. Se conservan las fortalezas del borrador: «Yahvé», «el pueblo de la tierra» y «postrarse».'
