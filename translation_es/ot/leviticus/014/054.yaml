revisions:
- from: Esta es la ley para todo caso de lepra[a] y para un eccema.
  to: Esta es la ley para todo caso de lepra y para una picazón[a].
  rationale: Se reemplaza «eccema» por «picazón» para seguir mejor la decisión auditada del POB («itch») y evitar una identificación médica demasiado precisa. Se mueve el marcador de nota al término que traduce נֶתֶק y se adapta la nota al español, conservando la alternativa léxica y la incertidumbre dermatológica documentada.
