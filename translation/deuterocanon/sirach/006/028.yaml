theological_decisions:
- issue: Referent of the feminine suffixes in 'its rest' and 'it will turn'
  chosen_reading: The suffixes refer to wisdom/instruction personified in the immediate context.
  alternative_readings:
  - The suffixes could be taken more generally as referring to the pursuit/discipline of wisdom rather than wisdom herself.
  rationale: The broader context of Sirach 6 personifies wisdom as a feminine figure, and the Greek also preserves feminine reference. English avoids repeated 'her' here for readability, but the underlying referent remains wisdom.
