translation:
  language: es
  text: Por esta razón se abrieron los depósitos[a][b], e hizo volar las nubes como aves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de esta línea es textualmente y léxicamente incierto: el consonántico puede leerse como «creó», mientras que el paralelo griego favorece la idea de que los depósitos celestes «fueron abiertos».'
    reason: textual_variant
  - marker: b
    text: El testimonio hebreo principal procede de la tradición de la Genizá del Cairo; el griego sirve aquí como comprobación de coherencia para la imagen meteorológica.
    reason: source_note
lexical_decisions:
- source_word: למען / διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Por esta causa
  - Así que
  lexicon: HALOT; BDAG
  rationale: La conexión es consecutiva o causal, no final. «Por esta razón» conserva el enlace discursivo con tono natural en español y refleja bien el griego διὰ τοῦτο.
- source_word: ברא / ἠνεῴχθησαν
  english_pob_choice: opened / created
  chosen_spanish: fueron abiertos
  alternatives_spanish:
  - creó
  - se abrieron
  lexicon: HALOT; LXX parallel
  rationale: El testimonio griego favorece claramente la idea de apertura de depósitos celestes. En español, «fueron abiertos» mantiene la imagen meteorológica y evita la dificultad de «creó un almacén», que suena menos natural en este contexto poético.
- source_word: אוצר / θησαυροί
  english_pob_choice: storehouse / storehouses
  chosen_spanish: los almacenes
  alternatives_spanish:
  - el tesoro
  - los tesoros
  - las reservas
  lexicon: HALOT; LSJ
  rationale: «Almacenes» comunica el sentido de depósitos o reservorios celestiales y funciona mejor en español que «tesoros», que podría sugerir riqueza material más que provisión guardada.
- source_word: ויעף / ἐξεπέτασαν
  english_pob_choice: made ... fly
  chosen_spanish: desplegaron su vuelo
  alternatives_spanish:
  - alzaron el vuelo
  - volaron
  - fueron lanzadas
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego sugieren movimiento rápido y extendido de las nubes. «Desplegaron su vuelo» conserva la imagen poética sin forzar un causativo demasiado pesado en español.
- source_word: עבים / νεφέλαι
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - las nubes densas
  - los nubarrones
  lexicon: HALOT; LSJ
  rationale: «Nubes» es la traducción normal y clara; el contexto ya implica nubes de lluvia o tormenta, por lo que no es necesario añadir calificativos.
- source_word: כצפרים / ὡς πετεινά
  english_pob_choice: like birds
  chosen_spanish: como aves
  alternatives_spanish:
  - como pájaros
  - cual aves
  lexicon: HALOT; LSJ
  rationale: «Como aves» mantiene el registro poético y amplio del término. En español bíblico, «aves» es suficientemente natural y no restringe el símil a un tipo coloquial de pájaro.
theological_decisions:
- issue: Tensión textual entre el hebreo consonántico (ברא, «creó») y el paralelo griego (ἠνεῴχθησαν, «fueron abiertos»).
  english_pob_reading: The English POB documents the uncertainty and ultimately renders a weather image with 'opened' in the audit trail, while the latest revision note mentions 'created' from ברא.
  chosen_spanish_reading: «fueron abiertos los almacenes»
  alternative_spanish_readings:
  - «creó el almacén»
  - «abrió los almacenes»
  rationale: Para el español, seguir la imagen del paralelo griego produce una frase más inteligible y coherente con la poesía meteorológica. Se conserva la tensión textual mediante una nota, sin ocultar que el hebreo puede leerse como «creó».
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo conservado, usando el paralelo griego como entrada de traducción real cuando ilumina la lectura.'
- issue: Imagen poética de las nubes moviéndose con rapidez comparable al vuelo de aves.
  english_pob_reading: made the clouds fly like birds
  chosen_spanish_reading: las nubes desplegaron su vuelo como aves
  alternative_spanish_readings:
  - hizo volar las nubes como aves
  - las nubes volaron como aves
  rationale: La forma elegida preserva el dinamismo sin convertir el verso en prosa pesada. «Desplegaron su vuelo» mantiene la metáfora y evita una imagen demasiado técnica o abrupta.
  doctrine_reference: 'Poética bíblica: conservar la metáfora y el paralelismo sin domesticarlos excesivamente.'
translation_notes:
  revision_awareness: La redacción española toma en cuenta la última revisión del audit trail, que prefirió «created» para ברא, pero también el conjunto del expediente, especialmente la nota lexical y la paralela griega. Por eso se opta por una solución que mantiene la imagen de apertura de depósitos celestes y deja constancia de la variante textual en nota.
  spanish_consistency_notes:
  - Se usa «almacenes» para θησαυροί / אוצר con el fin de sostener la imagen de depósitos celestes, no de riqueza material.
  - Se mantiene «aves» en el símil para conservar el registro poético amplio y evitar una restricción coloquial.
  - Se evita «SEÑOR» y cualquier sustitución teológica no presente en el verso.
  - El verbo plural «desplegaron» concuerda con «las nubes» y reproduce la acción colectiva del griego plural.
