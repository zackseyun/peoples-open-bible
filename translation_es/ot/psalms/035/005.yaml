translation:
  language: es
  text: Que sean como paja ante el viento, con[a] el ángel de Yahvé ahuyentándolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y el ángel de Yahvé ahuyentándolos». La conjunción hebrea también puede leerse simplemente como «y», y el participio puede entenderse como «ahuyentando» o «empujando lejos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיוּ
  english_pob_choice: May they be
  chosen_spanish: Que sean
  alternatives_spanish:
  - Que lleguen a ser
  - Que estén
  lexicon: HALOT
  rationale: El hebreo expresa un deseo/imprecación; en español, la forma optativa natural es 'Que sean', que conserva el valor volitivo sin volverlo una simple afirmación futura.
- source_word: כְּמֹץ
  english_pob_choice: like chaff
  chosen_spanish: como paja
  alternatives_spanish:
  - como tamo
  - como afrecho
  lexicon: HALOT
  rationale: מֹץ se refiere a la parte liviana separada en la trilla. 'Paja' es una equivalencia amplia y transparente para lectores bíblicos en español; 'tamo' sería más técnico/regional, pero menos claro de entrada.
- source_word: לִפְנֵי רוּחַ
  english_pob_choice: before the wind
  chosen_spanish: delante del viento
  alternatives_spanish:
  - ante el viento
  - frente al viento
  lexicon: HALOT
  rationale: La imagen espacial 'delante de' se conserva con naturalidad en español. 'Viento' mantiene el sustantivo común y no especifica indebidamente una brisa o un soplo menor.
- source_word: וּמַלְאַךְ יְהוָה
  english_pob_choice: with the angel of Yahweh
  chosen_spanish: y el ángel de Yahvé
  alternatives_spanish:
  - y el mensajero de Yahvé
  - con el ángel de Yahvé
  lexicon: HALOT
  rationale: El hebreo coordina un segundo elemento de la escena; en español, 'y' reproduce mejor esa coordinación que 'con'. 'Ángel' conserva el sentido sobrenatural más natural en este giro fijo, y 'Yahvé' sigue la norma del proyecto para יְהוָה.
- source_word: דּוֹחֶה
  english_pob_choice: driving them away
  chosen_spanish: los ahuyente
  alternatives_spanish:
  - los expulse
  - los empuje lejos
  lexicon: HALOT
  rationale: El participio tiene fuerza activa de expulsar/ahuyentar. 'Ahuyente' comunica el movimiento forzoso y la idea de ser echados lejos, sin añadir un objeto explícito que el hebreo no marca.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En la serie española del proyecto se adopta 'Yahvé' como forma estable para preservar el nombre del pacto y evitar el reemplazo reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identity of מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: '''Ángel'' es la lectura más natural y tradicional para esta expresión recurrente en contexto narrativo/poético. No se introduce una identificación doctrinal adicional del personaje; se conserva la ambigüedad bíblica donde existe.'
  doctrine_reference: HALOT; uso contextual recurrente de מַלְאָךְ יְהוָה
translation_notes:
  revision_awareness: La propuesta sigue el último estado auditado en inglés, que corrigió la relación de la segunda cláusula para expresar expulsión/alejamiento en vez de una dirección indefinida. En español se reflejó con un verbo de expulsión ('ahuyente') y se mantuvo la coordinación simple del hebreo con 'y'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evitó 'el SEÑOR' para no ocultar el nombre divino en el texto principal.
  - La imagen del viento y la paja/tamo se conservó sin explicar de más el trasfondo agrícola en el cuerpo del verso.
