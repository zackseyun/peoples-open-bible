review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: la porción restante de la ofrenda la comen Aarón y sus hijos; debe comerse sin levadura; y el lugar se especifica como el atrio de la tienda de reunión. También conserva correctamente la repetición final del verbo ''comer''. La única desalineación relevante es estilístico-lexical en la nota a, donde ''lo que permanece'' no refleja tan bien el matiz de resto/porción sobrante como ''lo que queda'' o ''lo que resta''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Lo que quede de ella' funciona, pero 'Lo que sobre de ella' o 'Lo que quede de ella' son ambos naturales; no exige cambio. 'Se comerá sin levadura' es una buena solución para el pasivo prescriptivo y evita sobredeterminar 'pan'. La puntuación y la sintaxis son buenas. Conviene una pequeña corrección editorial en la nota b para quitar comillas sobrantes y dejarla más limpia.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé ni términos cristológicos. 'Atrio' para חצר y 'tienda de reunión' para אֹהֶל מוֹעֵד están bien alineados con el expediente inglés y con un español bíblico legible. 'Sin levadura' para מַצּוֹת sigue correctamente la revisión inglesa documentada.
  issues:
  - severity: low
    issue: La nota a usa 'lo que permanece' como alternativa.
    rationale: Aunque posible, suena menos fiel al valor de 'resto/remanente' de וְהַנּוֹתֶרֶת que alternativas como 'lo que resta' o 'el resto'.
  - severity: low
    issue: La redacción de la nota b contiene comillas y formato torpes.
    rationale: No afecta el sentido, pero conviene normalizarla para claridad editorial en español.
  revised_spanish_text: Lo que quede de ella, Aarón y sus hijos lo comerán[a]. Se comerá sin levadura[c] en un lugar santo[b]; lo comerán en el atrio de la tienda de reunión.
  revised_footnotes:
  - marker: a
    text: O 'el remanente' o 'lo que resta'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''en un lugar santo'', no ''en el lugar santo''; la cláusula siguiente especifica ese lugar como el atrio de la tienda de reunión.'
    reason: lexical_alternative
  - marker: c
    text: O 'ázimo'. El hebreo se refiere a que la ofrenda debe comerse en estado sin levadura.
    reason: lexical_alternative
  revision_rationale: 'El texto principal puede mantenerse. Se proponen solo reparaciones menores en las notas: mejorar la alternativa léxica de la nota a para reflejar mejor el sentido de resto sobrante, y limpiar la redacción/editorialización de la nota b.'
