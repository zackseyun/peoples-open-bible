review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: prohibición de acercarse, mandato de quitarse el calzado, y razón causal basada en la santidad del lugar. Sin embargo, la nota [a] no preserva la alternativa léxica documentada (''No te aproximes'') sino que repite esencialmente el texto principal. Además, la nota [b] está invertida respecto del rastro inglés: el inglés anota literalmente ''ground of holiness'' para אַדְמַת קֹדֶשׁ, no ''de tus pies'' para מֵעַל רַגְלֶיךָ. También conviene mejorar עוֹמֵד por ''estás de pie'' en vez de ''estás parado'' para neutralidad panhispánica y tono bíblico más digno.'
  spanish_quality_summary: El español es generalmente claro, pero 'Entonces él dijo' suena algo pesado; 'Entonces dijo' es más natural. 'Quítate las sandalias de los pies' es comprensible, pero en registro bíblico suena más natural 'de tus pies'. 'Estás parado' es entendible, pero menos elegante y menos neutral que 'estás de pie'. 'Tierra santa' es una buena solución idiomática para אַדְמַת קֹדֶשׁ.
  glossary_alignment: No hay conflicto con la terminología de proyecto. 'Tierra santa' conserva adecuadamente qōdeš aquí. La revisión principal necesaria es alinear las notas con las decisiones léxicas auditadas y mejorar la neutralidad/readabilidad del español.
  issues:
  - severity: high
    issue: La nota [b] está anclada y formulada para la frase equivocada.
    rationale: 'El rastro inglés conserva como nota literal ''ground of holiness'' para אַדְמַת קֹדֶשׁ, pero el borrador español pone ''Literalmente: «de tus pies»'', que corresponde a otra expresión y además no refleja la nota auditada principal.'
  - severity: medium
    issue: La nota [a] no presenta una alternativa real.
    rationale: La alternativa inglesa es 'Do not approach here.' En español, la nota debería ofrecer algo como 'No te aproximes aquí' o equivalente, no repetir casi exactamente 'No te acerques aquí'.
  - severity: medium
    issue: '''Estás parado'' es menos natural y menos neutral que ''estás de pie''.'
    rationale: Para עוֹמֵד, 'estás de pie' mantiene el sentido posicional y suena más digno y ampliamente legible en español eclesial.
  - severity: low
    issue: El sujeto explícito en 'Entonces él dijo' es innecesario.
    rationale: En español narrativo, 'Entonces dijo' fluye mejor sin pérdida de claridad.
  revised_spanish_text: 'Entonces dijo[a]: «No te acerques aquí. Quítate las sandalias de tus pies, porque el lugar donde estás de pie es tierra santa[b]».'
