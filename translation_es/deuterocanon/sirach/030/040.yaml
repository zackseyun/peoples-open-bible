translation:
  language: es
  text: Si lo maltratas y lo echas, huirá; ¿por qué camino[a] lo buscarás?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «¿por qué camino lo buscarás?» La formulación es concreta y retórica, y enfatiza la dificultad de recuperar a alguien una vez que se ha ido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: BDAG
  rationale: La oración es condicional abierta; «si» preserva mejor la estructura y el valor hipotético del griego.
- source_word: κακώσῃς
  english_pob_choice: you mistreat
  chosen_spanish: lo maltratas
  alternatives_spanish:
  - lo haces sufrir
  - lo tratas mal
  - lo hieres
  lexicon: BDAG
  rationale: El verbo puede abarcar tratar mal o causar daño; «maltratar» conserva la fuerza interpersonal sin restringirlo solo al daño físico.
- source_word: ἀπάρᾳς
  english_pob_choice: send him away
  chosen_spanish: lo despides
  alternatives_spanish:
  - lo envías lejos
  - lo apartas
  - lo mandas fuera
  lexicon: LSJ
  rationale: El contexto de expulsión o separación y el recurso natural del español favorecen «despedir» en el sentido de mandar fuera/dejar ir; mantiene la relación con la huida siguiente.
- source_word: ἀποδρᾷ
  english_pob_choice: he will run off
  chosen_spanish: huirá
  alternatives_spanish:
  - saldrá corriendo
  - escapará
  - se escapará
  lexicon: BDAG
  rationale: El verbo expresa fuga o escape; «huirá» es breve, natural y suficientemente concreto en español.
- source_word: ἐν ποίᾳ ὁδῷ
  english_pob_choice: on what road
  chosen_spanish: ¿por qué camino
  alternatives_spanish:
  - ¿por qué senda
  - ¿por qué ruta
  - ¿en qué camino
  lexicon: BDAG
  rationale: «Camino» conserva la imagen concreta de vía o trayecto; la pregunta en español suena más natural con «¿por qué camino?» que con una calca rígida.
- source_word: ζητήσεις
  english_pob_choice: will you look for
  chosen_spanish: lo buscarás
  alternatives_spanish:
  - lo buscarás de nuevo
  - lo procurarás
  - lo rastrearás
  lexicon: BDAG
  rationale: El futuro interrogativo retórico pide una forma directa en español; «buscar» mantiene la idea de buscar activamente sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Valor retórico de la pregunta final
  english_pob_reading: The wording is concrete and rhetorical, emphasizing the difficulty of recovering someone once driven away.
  chosen_spanish_reading: La pregunta final conserva un tono concreto y retórico, subrayando lo difícil que será recuperarlo una vez despedido.
  alternative_spanish_readings:
  - ¿dónde lo buscarás?
  - ¿en qué lugar lo buscarás?
  rationale: El griego no usa una pregunta meramente locativa sino una formulación que enfatiza el modo o trayecto de búsqueda; «¿por qué camino lo buscarás?» mantiene ese efecto sin borrar la dificultad implícita.
  doctrine_reference: Sabiduría práctica / admonición moral del Sirácida
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que prefirió «send him away» sobre «drive him away» para ajustarse más de cerca a ἀπάρᾳς; en español se optó por «lo despides» para reflejar esa separación con un verbo natural y formal.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otros sustitutos no pertinentes, pues no hay aquí referencia al nombre divino.
  - Se mantuvo el singular masculino («lo») por el antecedente individual masculino del contexto.
  - «Camino» conserva la imagen espacial concreta del griego y evita la abstracción de «dónde».
  - No se usó «Cristo», «gracia» ni terminología doctrinal ajena al versículo.
