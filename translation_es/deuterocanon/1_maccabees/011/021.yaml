lexical_decisions:
- source_word: ἐπορεύθησάν
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fueron de camino
  - se dirigieron
  lexicon: BDAG
  rationale: Verbo narrativo de movimiento en aoristo; «fueron» mantiene naturalidad en español y refleja el desplazamiento sin añadir matices innecesarios.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos
  lexicon: BDAG
  rationale: «Algunos» conserva la referencia indefinida y se ajusta bien al orden natural del español.
- source_word: μισοῦντες
  english_pob_choice: who hated
  chosen_spanish: que odiaban
  alternatives_spanish:
  - odiando
  - que aborrecían
  lexicon: BDAG
  rationale: La participio se vierte como relativa para una lectura fluida. «Odiaban» expresa el valor fuerte del término; «aborrecían» sería posible, pero menos directo.
- source_word: τὸ ἔθνος αὐτῶν
  english_pob_choice: their own nation
  chosen_spanish: su propia nación
  alternatives_spanish:
  - su propio pueblo
  - su nación
  lexicon: BDAG
  rationale: «Nación» mantiene el sentido político-étnico del griego en este contexto macabeo. El posesivo «su propia» reproduce la intensificación de αὐτῶν.
- source_word: ἄνδρες παράνομοι
  english_pob_choice: lawless men
  chosen_spanish: hombres inicuos
  alternatives_spanish:
  - hombres sin ley
  - hombres malvados
  - hombres rebeldes
  lexicon: BDAG
  rationale: Se preserva el juicio moral del sintagma. «Inicuos» comunica la carga ética sin convertir la frase en una mera descripción jurídica; «sin ley» sería más literal, pero suena menos natural en español y puede sonar técnico donde el griego funciona como caracterización moral.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: informaron
  alternatives_spanish:
  - reportaron
  - dieron cuenta
  - avisaron
  lexicon: BDAG
  rationale: En un contexto ante un rey, el verbo implica llevar una noticia o acusación. «Informaron» es claro y digno en español; «reportaron» sería más calco, y «avisaron» rebaja el registro.
- source_word: περικάθηται
  english_pob_choice: was besieging
  chosen_spanish: estaba sitiando
  alternatives_spanish:
  - asediaba
  - rodeaba
  - bloqueaba
  lexicon: LSJ
  rationale: El contexto militar con una fortaleza requiere el valor de sitio/asedio. «Estaba sitiando» conserva el aspecto progresivo del relato y el sentido hostil del verbo.
- source_word: τὴν ἄκραν
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - la acra
  - la fortaleza
  lexicon: LSJ
  rationale: «Ciudadela» comunica el sentido común del término y funciona bien en español. Se deja abierta la alternativa histórica «Acra» en nota, porque el griego puede referirse al nombre propio de la fortificación en Jerusalén.
theological_decisions:
- issue: Traducción de ἄκρα como nombre propio o como sustantivo común
  english_pob_reading: 'the citadel, with a footnote: Or, “the Acra,” the fortified citadel in Jerusalem.'
  chosen_spanish_reading: la ciudadela[a]
  alternative_spanish_readings:
  - la Acra
  - la fortaleza
  rationale: El texto griego admite tanto el sentido común «ciudadela» como la referencia histórica específica al Acra. La traducción principal conserva la inteligibilidad inmediata; la nota preserva la tensión lexical e histórica documentada por la POB inglesa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue el orden y la apposición del griego, reflejando la revisión inglesa que reordenó «some lawless men, who hated their own nation» para hacer más natural la relación entre participio y apposición. En español se mantuvo esa relación con «Y algunos hombres inicuos, que odiaban a su propia nación».
  spanish_consistency_notes:
  - Se usa «Y» inicial para corresponder a καὶ, con ritmo narrativo sobrio.
  - Se mantiene el nombre «Jonatán» para Ἰωνάθαν, conforme al uso español bíblico estándar.
  - «Ciudadela» se prefiere en el texto principal; «Acra» queda restringida a la nota para no sobrecargar el flujo del versículo.
  - No se introduce terminología eclesiástica ajena al pasaje; el registro permanece histórico-narrativo.
