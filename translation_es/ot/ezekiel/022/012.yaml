    issue: Renderizado de אֲדֹנָי יְהוִה como «Yahvé Dios»
    rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יהוה. «Yahvé Dios» no conserva de manera transparente ese orden ni ese valor, y en español suena menos natural. «El Señor Yahvé» preserva ambos elementos sin ocultar el nombre divino.
