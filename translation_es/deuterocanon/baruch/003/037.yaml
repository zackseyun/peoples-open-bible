translation:
  language: es
  text: Halló todo camino de conocimiento, y lo dio a Jacob su siervo[a] y a Israel su amado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hijo»; el griego παῖς también puede significar «hijo» o «sirviente/siervo» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεῦρεν
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - descubrió
  lexicon: LSJ
  rationale: El verbo compuesto expresa hallar o descubrir con sentido de búsqueda lograda. «Halló» conserva el valor de encontrar algo ya rastreado o averiguado, sin endurecer el verso con una forma demasiado técnica.
- source_word: πᾶσαν ὁδὸν
  english_pob_choice: every way
  chosen_spanish: todo camino
  alternatives_spanish:
  - toda vía
  - cada camino
  lexicon: LSJ
  rationale: ὁδός es literalmente «camino» o «vía», y en este contexto de sabiduría/conocimiento funciona de modo figurado como curso o modo. «Todo camino» mantiene la metáfora sin explicarla de más.
- source_word: ἐπιστήμης
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: LSJ
  rationale: ἐπιστήμη denota conocimiento o comprensión. «Conocimiento» es la equivalencia más directa y evita introducir «sabiduría» donde el griego no usa σοφία.
- source_word: ἔδωκεν αὐτήν
  english_pob_choice: gave it
  chosen_spanish: lo dio
  alternatives_spanish:
  - se lo dio
  - lo concedió
  lexicon: LSJ
  rationale: Aunque el antecedente griego es femenino, en español la expresión más natural para el sintagma nominal «todo camino de conocimiento» es retomarlo con «lo». «Lo dio» mantiene la referencia sin sonar forzado.
- source_word: τῷ παιδὶ αὐτοῦ
  english_pob_choice: his servant
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su hijo
  - su hijo y siervo
  lexicon: LSJ
  rationale: παῖς puede significar niño, hijo, siervo o esclavo según contexto. Dado el uso documental del POB de «slave/esclavo» para δοῦλος y la tensión lexical aquí, se prefiere «esclavo» para no suavizar el término; esto preserva la ambigüedad fuerte del griego mejor que «siervo».
- source_word: τῷ ἠγαπημένῳ ὑπʼ αὐτοῦ
  english_pob_choice: his beloved
  chosen_spanish: su amado
  alternatives_spanish:
  - el amado por él
  - el que era amado por él
  lexicon: LSJ
  rationale: El participio pasivo expresa «el amado por él». «Su amado» es natural en español y conserva la relación afectiva sin añadir explicación interpretativa.
- source_word: Ἰακώβ ... Ἰσραήλ
  english_pob_choice: Jacob ... Israel
  chosen_spanish: Jacob ... Israel
  alternatives_spanish:
  - Jacob ... el Israel de Dios
  - Jacob ... el pueblo de Israel
  lexicon: n/a
  rationale: Se conservan ambos nombres en paralelo, como en el griego, para mantener la fuerza poética y la tensión de designación del pueblo elegido sin colapsarlos en una sola referencia.
theological_decisions:
- issue: Valor de παῖς en relación con Dios
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - hijo
  - niño
  rationale: El griego admite varias posibilidades, pero el contexto pactal no exige filiación literal. «Esclavo» conserva la aspereza lexical y evita resolver la ambigüedad hacia un lenguaje más devocional que el texto no pide.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve lexical tension'
- issue: Relación entre Jacob e Israel
  english_pob_reading: retain both names in parallel
  chosen_spanish_reading: retener ambos nombres en paralelo
  alternative_spanish_readings:
  - fundirlos en un solo referente
  - parafrasear como el pueblo de Israel
  rationale: El hebreo/griego presenta paralelismo nominal. Mantener Jacob e Israel permite que el lector perciba la duplicación literaria y la memoria de la elección sin simplificarla.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés, pero el español se ajustó directamente al griego: ἐξεῦρεν se rindió con «halló»; πᾶσαν ὁδὸν mantiene la metáfora con «todo camino»; ἐπιστήμης se traduce como «conocimiento»; y παῖς conserva su ambigüedad con una solución fuerte («esclavo») para no suavizar el término. Se retuvo el paralelismo Jacob/Israel, y se añadió una nota de alternativa para παῖς conforme al expediente inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton ni una sustitución griega de κύριος.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el texto.
  - «Conocimiento» se mantiene consistente con ἐπιστήμη y no se reinterpreta como «sabiduría».
  - La referencia pronominal femenina de αὐτήν se adapta al español con «lo» por concordancia natural con el sintagma nominal precedente.
  - Se conserva la tensión lexical de παῖς sin domesticarla con una sola opción devocional.
