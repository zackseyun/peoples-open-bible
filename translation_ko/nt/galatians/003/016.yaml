translation:
  language: ko
  text: 이제 약속들은 아브라함과 그의 씨[a]에게 주어졌습니다. 「그리고 씨들에게」라고 하지 않고, 한 분을 가리켜 「그리고 네 씨에게」라고 했습니다. 그 씨가 곧 메시아입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 σπέρμα는 단수 집합 명사이며, 바울의 논증은 그 단수형에 기댄다.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπέρματι
