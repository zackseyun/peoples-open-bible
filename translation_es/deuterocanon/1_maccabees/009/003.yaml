translation:
  language: es
  text: Y en el primer mes del año ciento cincuenta y dos, acamparon en Jerusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦ μηνὸς τοῦ πρώτου
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - durante el primer mes
  - del primer mes
  lexicon: LSJ
  rationale: La frase griega funciona como referencia temporal; en español, 'en el primer mes' expresa de manera natural y fiel el marco temporal sin forzar una estructura genitiva impropia.
- source_word: ἔτους δευτέρου καὶ πεντηκοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: of the one hundred and fifty-second year
  chosen_spanish: del año ciento cincuenta y dos
  alternatives_spanish:
  - en el año ciento cincuenta y dos
  - del año 152
  lexicon: LSJ
  rationale: La numeración griega es aditiva y equivale a 152. En español, 'del año ciento cincuenta y dos' preserva el valor numérico en un registro claro y estándar.
- source_word: παρενέβαλον
  english_pob_choice: they encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon militarmente
  - levantaron el campamento
  lexicon: LSJ
  rationale: El verbo griego describe el acto de establecer campamento, normalmente en contexto militar. 'Acamparon' mantiene el sentido básico y resulta natural en español; no se añade un matiz más fuerte que el del original.
- source_word: εἰς Ἱερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hacia Jerusalén
  lexicon: LSJ
  rationale: 'Aunque εἰς puede señalar movimiento hacia un lugar, con un verbo de acampar el sentido resultante en español se expresa mejor como ubicación: ''en Jerusalén''. No se traduce como ''contra Jerusalén'' porque el griego no lo dice explícitamente.'
translation_notes:
  revision_awareness: El audit trail inglés revisó 'at Jerusalem' a 'in Jerusalem' por naturalidad idiomática con εἰς Ἱερουσαλήμ tras 'encamped'. La versión española sigue ese mismo criterio de ubicación natural sin perder el movimiento implícito del griego.
  spanish_consistency_notes:
  - Se usa 'Jerusalén' con mayúscula por ser nombre propio.
  - 'Se conserva el orden temporal del griego: primero el mes, luego el año, luego la acción.'
  - No se introduce terminología teológica ajena al versículo, que es puramente narrativa y cronológica.
