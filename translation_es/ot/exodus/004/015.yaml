review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: mandato a Moisés de hablar a Aarón, poner las palabras en su boca, promesa divina de estar con la boca de ambos e instrucción sobre lo que harán. Sin embargo, hay dos desajustes frente al texto fuente y al rastro POB: «Hablarás a él» es un calco poco natural de דבר אל y debe ser «le hablarás» o equivalente; además, la nota [a] está anclada en el lugar equivocado, pues comenta la cláusula posterior «estaré con tu boca y con su boca», no «en su boca». También «acerca de lo que ustedes deben hacer» añade una preposición no exigida y endurece ligeramente el matiz frente a «lo que harán / lo que han de hacer».'
  spanish_quality_summary: El español es generalmente claro y digno, pero contiene una construcción antinatural («Hablarás a él») y una ubicación errónea de nota al pie. El resto suena comprensible y bastante fiel. «Estaré con tu boca y con su boca» preserva bien la imagen hebrea, aunque resulte marcado; eso es apropiado aquí. «Les instruiré lo que han de hacer» o «les instruiré lo que harán» fluye mejor que «les instruiré acerca de lo que ustedes deben hacer».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. No aparecen Yahvé/Mesías/etc. La decisión de conservar «boca» para פֶּה concuerda con la justificación teológica auditada. El plural final debe mantenerse claro en español, idealmente sin sobrecargar el texto.
  issues:
  - severity: high
    issue: «Hablarás a él» es un calco no idiomático.
    rationale: El hebreo דבר אל significa hablar a/alguien, pero en español natural se expresa «le hablarás» o «hablarás con él» según contexto. Aquí «le hablarás» preserva mejor el complemento indirecto sin perder formalidad.
  - severity: medium
    issue: La nota [a] está anclada en la frase equivocada.
    rationale: 'La nota dice «Hebreo, literalmente: “estaré con tu boca y con su boca”», pero el marcador aparece tras «en su boca». Debe colocarse en la cláusula «con tu boca y con su boca» o no incluirse.'
  - severity: medium
    issue: «Acerca de lo que ustedes deben hacer» es más pesado y algo más interpretativo que el original.
    rationale: אֵת אֲשֶׁר תַּעֲשׂוּן significa sencillamente «lo que harán/han de hacer». «Acerca de» no está en el hebreo y «deben» puede sonar más fuerte que el inglés auditado «shall do».
  revised_spanish_text: Le hablarás y pondrás las palabras en su boca, y yo estaré con tu boca y con su boca[a], y yo les instruiré lo que ustedes han de hacer[b].
