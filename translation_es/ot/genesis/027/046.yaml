translation:
  language: es
  text: 'Entonces Rebeca dijo a Isaac: «Estoy cansada[b] de mi vida[c] por causa de las hijas de Het[a]. Si Jacob toma mujer[d] de las hijas de Het, como estas, de entre las hijas de la tierra, ¿qué es la vida para mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujeres hititas» / «las hijas de los hititas».
    reason: lexical_alternative
  - marker: b
    text: O «hastiada» / «harta».
    reason: lexical_alternative
  - marker: c
    text: O «de mi existencia».
    reason: alternative_reading
  - marker: d
    text: O «se casa con una mujer» / «toma esposa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then Rebekah said
  chosen_spanish: Entonces Rebeca dijo
  alternatives_spanish:
  - Y Rebeca dijo
  - Luego Rebeca dijo
  lexicon: WLC / contexto narrativo
  rationale: El hebreo introduce la acción narrativa con waw consecutiva; «Entonces» comunica el avance secuencial de la escena de forma natural en español.
- source_word: קַצְתִּי
  english_pob_choice: I am weary
  chosen_spanish: Estoy cansada
  alternatives_spanish:
  - Estoy hastiada
  - Me fastidia
  - Estoy harta
  lexicon: HALOT
  rationale: El verbo expresa hastío, disgusto o cansancio emocional; en español, «Estoy cansada» conserva la fuerza afectiva sin volverlo excesivamente coloquial o más duro de lo que exige el hebreo.
- source_word: בְחַיַּי
  english_pob_choice: of my life
  chosen_spanish: de mi vida
  alternatives_spanish:
  - con mi vida
  - en mi vida
  lexicon: HALOT
  rationale: Con קוץ, la frase indica cansancio respecto de la propia vida. «De mi vida» mantiene la relación idiomática y la lectura de la POB en inglés sin añadir interpretación.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por culpa de
  lexicon: HALOT
  rationale: La preposición es causal en este contexto. «Por causa de» es formal, claro y fiel al valor causal del hebreo.
- source_word: בְּנוֹת חֵת
  english_pob_choice: the daughters of Heth
  chosen_spanish: las hijas de Het
  alternatives_spanish:
  - mujeres hititas
  - las hijas de los hititas
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo, que mantiene el gentilicio/linaje y el paralelismo del texto. La equivalencia étnica interpretativa queda como alternativa.
- source_word: אִם לֹקֵחַ יַעֲקֹב אִשָּׁה
  english_pob_choice: If Jacob takes a wife
  chosen_spanish: Si Jacob toma mujer
  alternatives_spanish:
  - Si Jacob se casa con una mujer
  - Si Jacob toma esposa
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática para matrimonio. «Toma mujer» reproduce el giro con sobriedad; en español puede sonar marcado, pero aquí conserva mejor el trazo literal que la POB audita.
- source_word: כָּאֵלֶּה
  english_pob_choice: like these
  chosen_spanish: como estas
  alternatives_spanish:
  - como esas
  - de esta clase
  lexicon: WLC / contexto inmediato
  rationale: El demostrativo apunta a las mujeres ya mencionadas en el contexto. «Como estas» preserva la deixis cercana y la referencia inmediata.
- source_word: מִבְּנוֹת הָאָרֶץ
  english_pob_choice: from the daughters of the land
  chosen_spanish: de entre las hijas de la tierra
  alternatives_spanish:
  - de las hijas de la tierra
  - de las mujeres de la tierra
  - de entre las mujeres del país
  lexicon: HALOT
  rationale: Se mantiene la paralelística del hebreo con la expresión literal «hijas de la tierra». «De entre» refleja mejor el matiz de procedencia que un simple genitivo en español.
- source_word: לָמָּה לִּי חַיִּים
  english_pob_choice: what is life to me?
  chosen_spanish: ¿para qué quiero yo vida?
  alternatives_spanish:
  - ¿qué es la vida para mí?
  - ¿qué me importa la vida?
  - ¿para qué me sirve la vida?
  lexicon: HALOT
  rationale: El hebreo expresa una pregunta retórica sobre la valía de la vida en esas circunstancias. «¿Para qué quiero yo vida?» conserva el tono existencial y evita expandir la idea a «qué bueno es» o similares.
theological_decisions:
- issue: Traducción del ethnónimo חֵת
  english_pob_reading: Retain the literal 'daughters of Heth' in the main text
  chosen_spanish_reading: Mantener «las hijas de Het» en el texto principal
  alternative_spanish_readings:
  - mujeres hititas
  - las hijas de los hititas
  rationale: No es un punto doctrinal, pero sí de fidelidad filológica. La forma literal preserva el nombre propio hebreo y deja la identificación étnica como posible aclaración en nota.
  doctrine_reference: Principio POB de primacía del idioma original y nombres transliterados
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del expediente inglés, que afinó la cláusula final a una forma más literal («what is life to me?»). En español se reflejó ese mismo ajuste con una pregunta retórica más formal y menos interpretativa. También se preservó la tensión léxica de קַצְתִּי mediante «estoy cansada», sin diluirla en un mero «me molesta».
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Rebeca» y «Isaac» según la convención del proyecto.
  - Se preservó «Het» en la línea principal por consistencia con la política de nombres del proyecto y con el inglés auditado.
  - La pregunta final se dejó breve y retórica, sin explicitar una paráfrasis interpretativa.
  - El orden de las cláusulas sigue de cerca el hebreo para conservar el paralelismo causal y condicional.
