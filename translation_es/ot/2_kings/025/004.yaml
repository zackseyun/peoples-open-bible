translation:
  language: es
  text: Entonces se abrió una brecha en la ciudad, y todos los hombres de guerra huyeron de noche por el camino de la puerta entre los dos muros, que estaba junto al jardín del rey; y los caldeos rodeaban la ciudad por todos lados[a]; y el rey[b] fue por el camino del Arabá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los babilonios». El hebreo dice específicamente «caldeos», y se conserva ese término en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O «él». El hebreo deja implícito el sujeto; el contexto indica que se refiere al rey.
    reason: lexical_alternative
  - marker: c
    text: El Arabá es la depresión del Jordán que continúa hacia el sur; tradicionalmente también se traduce «la llanura». Se conserva aquí como nombre geográfico.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּבָּקַע
  english_pob_choice: was breached
  chosen_spanish: fue brechada
  alternatives_spanish:
  - fue abierta
  - fue quebrada
  - fue tomada por asalto
  lexicon: HALOT
  rationale: El hebreo niphal de בקע expresa que la ciudad quedó abierta por una ruptura en la defensa. «Fue brechada» conserva la imagen de una brecha y el sentido militar de asedio sin suavizarlo a una fórmula más interpretativa. Se evita «tomada por asalto» porque añade el acto de captura que no está explícito en el verbo.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Es el equivalente directo y natural de עיר en este contexto de Jerusalén sitiada.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los guerreros
  - los soldados
  lexicon: HALOT
  rationale: «Hombres de guerra» reproduce de cerca la expresión hebrea y conserva el matiz idiomático y masculino del sustantivo compuesto. «Soldados» sería más moderno, pero menos transparente respecto del original.
- source_word: הַלַּיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - por la noche
  lexicon: HALOT
  rationale: La expresión funciona adverbialmente. «De noche» es la forma española natural y breve para indicar el momento de la fuga.
- source_word: דֶּרֶךְ שַׁעַר
  english_pob_choice: by the way of the gate
  chosen_spanish: por el camino de la puerta
  alternatives_spanish:
  - por la puerta
  - por el camino de la entrada
  lexicon: HALOT
  rationale: Se conserva la estructura de דרך con un giro natural en español. «Puerta» traduce שַׁעַר, y «por el camino de» refleja el énfasis de ruta del hebreo sin volverlo demasiado literal.
- source_word: בֵּין הַחֹמֹתַיִם
  english_pob_choice: between the two walls
  chosen_spanish: entre los dos muros
  alternatives_spanish:
  - entre las dos murallas
  - entre los muros
  lexicon: HALOT
  rationale: El dual hebreo señala dos muros. «Muros» funciona bien en español y mantiene la imagen topográfica; «murallas» también sería posible, pero «muros» es más directo.
- source_word: אֲשֶׁר עַל גַּן הַמֶּלֶךְ
  english_pob_choice: which was by the king’s garden
  chosen_spanish: que estaba junto al jardín del rey
  alternatives_spanish:
  - que estaba cerca del jardín del rey
  - que estaba al lado del jardín del rey
  lexicon: HALOT
  rationale: עַל aquí indica proximidad. «Junto a» expresa bien esa cercanía en español y mantiene el valor topográfico del lugar.
- source_word: וְכַשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo del texto hebreo. Aunque históricamente alude a fuerzas babilónicas, el término específico «caldeos» respeta la elección del POB inglés y no borra la tensión lexical.
- source_word: עַל הָעִיר סָבִיב
  english_pob_choice: were around the city on every side
  chosen_spanish: estaban alrededor de la ciudad por todos lados
  alternatives_spanish:
  - rodeaban la ciudad
  - estaban alrededor de la ciudad
  lexicon: HALOT
  rationale: «Por todos lados» explicita סביב y comunica el cerco completo. Se prefiere una construcción estática porque el hebreo describe la posición del ejército enemigo alrededor de la ciudad.
- source_word: וַיֵּלֶךְ
  english_pob_choice: the king went
  chosen_spanish: y el rey fue
  alternatives_spanish:
  - y él fue
  - y el rey salió
  lexicon: HALOT
  rationale: El sujeto está implícito en hebreo; el contexto lo identifica como el rey. «Fue» mantiene la sencillez narrativa del verbo, aunque en español puede sonar menos enfático que «salió»; se evita añadir un matiz no explicitado por el verbo.
- source_word: דֶּרֶךְ הָעֲרָבָה
  english_pob_choice: by the way of the Arabah
  chosen_spanish: por el camino del Arabá
  alternatives_spanish:
  - por el camino del Arabá/Aravá
  - por el camino de la llanura
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico como topónimo transliterado. «Arabá» evita la interpretación tradicional de «la llanura», que perdería el referente regional específico.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo de WLC y el acuerdo alto del control inglés. No hubo revisiones aplicadas en la fuente inglesa, por lo que la redacción española refleja directamente las decisiones léxicas auditadas: ''brechada'', ''hombres de guerra'', ''caldeos'' y el topónimo ''Arabá''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva el etnónimo 'caldeos' en el cuerpo principal para no sustituirlo por el interpretativo 'babilonios'.
  - Se usa 'Arabá' como topónimo y no 'la llanura' para respetar la referencia geográfica concreta.
  - La secuencia narrativa conserva el valor del hebreo con una estructura española fluida, sin convertir la huida en una paráfrasis interpretativa.
