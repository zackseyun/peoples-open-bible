base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/009.yaml
  text: 'This shall be yours from the most holy things[a], from the fire: every offering of theirs, every grain offering of theirs, every sin offering of theirs, and every guilt offering of theirs, which they render to me[c][b]. It is most holy for you and for your sons.'
  footnotes:
