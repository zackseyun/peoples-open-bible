revisions:
- from: Rehum, el comandante, y Shimshai, el escriba, escribieron una carta[a] contra Jerusalén al rey Artajerjes, así:[b]
  to: Rehum el comandante[a] y Shimshai el escriba escribieron una sola carta contra Jerusalén al rey Artajerjes, como sigue:[b]
  rationale: Se ajusta 'una carta' a 'una sola carta' para preservar mejor el valor numeral de חֲדָה, en línea con la revisión auditada del inglés. También se mejora la naturalidad española con 'como sigue:' como introductor de cita y se aligera la sintaxis eliminando comas innecesarias alrededor de las aposiciones.
  reviewer_model: gpt-5.4
