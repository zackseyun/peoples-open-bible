translation:
  language: es
  text: Así los saqué de la tierra de Egipto y los llevé al desierto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וָאֽוֹצִיאֵ֖ם
  english_pob_choice: So I brought them out
  chosen_spanish: Así los saqué
  alternatives_spanish:
  - Y los saqué
  - Entonces los saqué
  - Así los saqué de allí
  lexicon: HALOT
  rationale: El verbo hifil de יצא expresa causar que salgan, es decir, sacar. En español, «sacar» conserva mejor la fuerza causativa que «traer» en esta primera cláusula. «Así» reproduce el valor discursivo/secuencial del waw narrativo que el POB rindió con «So».
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: Se preserva explícitamente אֶרֶץ con «tierra», en vez de simplificarlo a solo «Egipto». «Tierra de Egipto» es natural en español bíblico y mantiene la plenitud de la expresión fuente.
- source_word: וָאֲבִאֵם
  english_pob_choice: and brought them
  chosen_spanish: y los hice entrar
  alternatives_spanish:
  - y los llevé
  - y los conduje
  - y los traje
  lexicon: HALOT
  rationale: El hifil de בוא aquí resalta hacer entrar. «Hice entrar» conserva la causalidad del hebreo mejor que un simple «llevé»; además evita la ambigüedad de «traer» cuando el movimiento es hacia un lugar destino.
- source_word: אֶל הַמִּדְבָּר
  english_pob_choice: into the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - al desierto
  - hacia el desierto
  - al desierto
  lexicon: HALOT
  rationale: מִדְבָּר se rinde bien con «desierto» en español bíblico. Dado que el verbo «hice entrar» ya incorpora la idea de movimiento, «en el desierto» suena natural y evita la dureza de repetir una preposición direccional forzada.
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la última pasada y muestra alto acuerdo con la revisión; por eso esta propuesta sigue de cerca su estructura, pero ajusta el primer verbo al valor causativo más natural en español.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - 'Se conserva la doble secuencia del hebreo: sacar de Egipto e introducir en el desierto.'
  - No se añaden notas porque no hay variantes textuales ni tensiones teológicas documentadas en este versículo.
