review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en los elementos principales: plural «las coronas», futuro «serán», nombres Helem/Hen sin armonización, «memorial», «templo» y «Yahvé». Conserva correctamente la nota sobre Helem/Heldai. Sin embargo, el anclaje de la nota está mal ubicado al final del versículo en vez de junto a «Helem», y «Tobías» se aparta de la decisión auditada «Tobijah»/טוֹבִיָּה al normalizar demasiado el nombre.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Como memorial en el templo de Yahvé» fluye bien. La principal mejora es técnica: mover la nota al nombre correspondiente. También conviene ajustar «Tobías» a una forma más próxima al hebreo y a la decisión documentada; «Tobíah» evita confusión con el nombre más convencional de otra forma hebrea y preserva mejor la fuente.'
  glossary_alignment: 'Buen alineamiento general con las convenciones del proyecto, especialmente «Yahvé». Se preserva «Hen» como nombre propio y no se traduce como «gracia/favor». El punto débil es el nombre טוֹבִיָּה: «Tobías» no refleja tan fielmente la forma elegida en la auditoría inglesa; una transliteración española más cercana como «Tobíah» encaja mejor con la primacía de la forma fuente.'
  issues:
  - severity: medium
    issue: El marcador de nota [a] está colocado al final del versículo y no junto a «Helem».
    rationale: La nota explica específicamente la variante del nombre «Helem» frente a «Heldai» en 6:10. Según las reglas del proyecto, el marcador debe aparecer en la palabra o frase relevante.
  - severity: medium
    issue: «Tobías» normaliza en exceso el nombre טוֹבִיָּה frente a la decisión auditada de preservar una transliteración más cercana a la forma hebrea.
    rationale: Aunque «Tobías» es legible en español, la auditoría inglesa escogió «Tobijah» precisamente para reflejar mejor טוֹבִיָּה y evitar simplificación. En español, «Tobíah» preserva mejor esa prioridad formal sin volverse ininteligible.
  revised_spanish_text: Y las coronas serán para Helem[a], Tobíah, Jedaías y Hen hijo de Sofonías, como memorial en el templo de Yahvé.
  revised_footnotes:
  - marker: a
    text: Helem corresponde a Heldai en Zacarías 6:10; esto puede reflejar una variante del mismo nombre.
    reason: alternative_reading
  revision_rationale: Se mueve la nota al nombre pertinente («Helem») para cumplir la regla de anclaje y se ajusta «Tobías» a «Tobíah» para reflejar mejor טוֹבִיָּה y la decisión lexical auditada, manteniendo un español claro y eclesialmente legible.
