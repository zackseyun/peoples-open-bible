base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/028.yaml
  text: 'But there is a God in heaven who reveals mysteries[a], and he has made known to King Nebuchadnezzar what will be in the latter days. Your dream, and the visions of your head upon your bed[c][b], were these:'
  footnotes:
  - marker: a
    text: Or 'God in heaven' or 'the God in heaven.' The Aramaic expression is formally indefinite, though it clearly refers to the true God in context.
    reason: alternative_reading
  - marker: b
    text: Or 'in the last days.' The phrase can denote a future climactic period without specifying a particular eschatological system.
    reason: lexical_alternative
  - marker: c
    text: Literally 'the visions of your head.'
    reason: lexical_alternative
