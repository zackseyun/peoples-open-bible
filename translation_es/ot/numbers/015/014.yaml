translation:
  language: es
  text: Y si un forastero habita con ustedes, o alguien que está entre ustedes por todas sus generaciones, y ofrece una ofrenda de alimento[a], aroma agradable para Yahvé, como ustedes hacen, así hará él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda hecha por fuego' o 'ofrenda por fuego' para 'ofrenda de alimento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Y cuando
  lexicon: HALOT
  rationale: Introduce una condición legal unida a la instrucción anterior. 'Y si' conserva la conexión del ו inicial y su fuerza condicional sin volver el español pesado.
- source_word: יָגוּר
  english_pob_choice: is staying
  chosen_spanish: habita
  alternatives_spanish:
  - está alojado
  - reside
  - está viviendo
  lexicon: HALOT
  rationale: El verbo גור indica residir como no nativo. 'Habita' comunica permanencia contextual en español bíblico contemporáneo sin sonar mecánico; el matiz de extranjería queda expresado por גֵּר.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente extranjero
  - extranjero residente
  - advenedizo
  lexicon: HALOT
  rationale: '''Forastero'' transmite mejor la condición de no originario que ''extranjero'' en muchos contextos pastorales en español, y evita la carga moderna administrativa de ''extranjero''. Se mantiene la categoría legal de alguien que vive entre Israel sin borrarla.'
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - junto a ustedes
  lexicon: HALOT
  rationale: Refleja la preposición con sufijo de segunda persona plural. En español, 'con ustedes' es la correspondencia más directa y natural.
- source_word: אוֹ אֲשֶׁר בְּתוֹכְכֶם
  english_pob_choice: or anyone who is among you
  chosen_spanish: o alguien que está entre ustedes
  alternatives_spanish:
  - o quien esté entre ustedes
  - o cualquiera que esté entre ustedes
  lexicon: HALOT
  rationale: La frase amplía el caso del גֵּר a cualquier persona dentro de la comunidad. 'Alguien que está entre ustedes' conserva la inclusividad y la construcción relativa sin sobreespecificar más allá del hebreo.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - a lo largo de sus generaciones
  lexicon: HALOT
  rationale: Expresa continuidad normativa. 'Por todas sus generaciones' suena natural en español bíblico y conserva la idea de vigencia intergeneracional.
- source_word: וְעָשָׂה
  english_pob_choice: and he offers
  chosen_spanish: y ofrece
  alternatives_spanish:
  - y hará
  - y presentará
  lexicon: HALOT
  rationale: Aunque el verbo literal es 'hacer', en contexto sacrificial español puede decirse 'ofrece' para indicar la presentación de la ofrenda sin perder el acto ritual.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: una ofrenda de alimento
  alternatives_spanish:
  - una ofrenda encendida
  - una ofrenda hecha por fuego
  lexicon: HALOT
  rationale: Se sigue la opción de la POB inglesa de 'food offering', que evita un calco opaco y conserva la categoría sacrificial. En español, 'ofrenda de alimento' comunica esa decisión de forma comprensible, aunque la expresión hebrea sea técnicamente una ofrenda por fuego.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma placentero
  - aroma de agradable olor
  - olor grato
  lexicon: HALOT
  rationale: Es el equivalente natural de la fórmula sacrificial. 'Aroma agradable' preserva el valor idiomático de aceptación ante Dios sin traducir de forma arcaica o excesivamente interpretativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: Project default YHWH→Yahvé
  rationale: Se sigue el estándar del proyecto para יהוה. 'Para Yahvé' expresa dirección u উদ্দেশo cultual en el contexto de la ofrenda mejor que una máscara tradicional con 'SEÑOR'.
- source_word: כַּאֲשֶׁר תַּעֲשׂוּ כֵּן יַעֲשֶׂה
  english_pob_choice: just as you do, so he shall do
  chosen_spanish: como ustedes hacen, así hará él
  alternatives_spanish:
  - como ustedes lo hacen, así lo hará él
  - así como ustedes hacen, así él hará
  lexicon: HALOT
  rationale: Conserva la fórmula comparativa y legal de igualdad ritual entre el israelita y el forastero. 'Así hará él' mantiene el valor prescriptivo del hebreo sin añadir modalidades ajenas al texto.
theological_decisions:
- issue: Inclusión del forastero en el rito descrito
  english_pob_reading: The verse extends the same sacrificial procedure to the sojourner or other person among Israel, without distinction in the act described here.
  chosen_spanish_reading: El versículo aplica el mismo procedimiento sacrificial al forastero o a cualquier persona que viva entre Israel, sin distinguirlos en el acto descrito.
  alternative_spanish_readings:
  - Podría leerse más restringidamente como aplicable solo a un forastero residente integrado a la vida de Israel.
  rationale: La cláusula final 'como ustedes hacen, así hará él' enfatiza igualdad de práctica en este caso. La traducción conserva esa igualdad sin resolver más de lo que el versículo dice sobre el estatus pactual global del forastero.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado estable del POB inglés, especialmente la actualización de 'whoever' a 'anyone' en la segunda cláusula. En español se optó por 'alguien que está entre ustedes' para mantener la inclusividad sin introducir un pronombre relativo más abstracto que pudiera sonar menos natural.
  spanish_consistency_notes:
  - Se conserva Yahvé para יהוה, conforme al estándar del proyecto.
  - '''Forastero'' se usa aquí como equivalente funcional de גֵּר, no como traducción automática de cada ''stranger''.'
  - '''Ofrenda de alimento'' sigue la decisión inglesa ''food offering'' y se acompaña de nota para la alternativa literal de ofrenda por fuego.'
  - Se mantiene el paralelismo legal final con una estructura simple y directa.
  - La puntuación y el registro buscan un español de lectura eclesial moderna, sin arcaísmos innecesarios.
