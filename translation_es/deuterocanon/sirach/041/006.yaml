translation:
  language: es
  text: De un hijo de injusticia viene el dominio del mal, y la deshonra está siempre con su descendencia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מבן עול
  english_pob_choice: from a child of injustice
  chosen_spanish: de un hijo de injusticia
  alternatives_spanish:
  - del hijo de injusticia
  - de un hijo de maldad
  - del hijo de error
  lexicon: HALOT
  rationale: בן funciona aquí como 'hijo' o 'descendiente'; en español 'hijo' conserva el paralelismo semítico y suena natural. עול se entiende mejor como injusticia / wrongdoing, por lo que 'injusticia' preserva el peso moral del giro.
- source_word: ממשלת רע
  english_pob_choice: the rule of evil
  chosen_spanish: el dominio del mal
  alternatives_spanish:
  - el gobierno del mal
  - el poder del mal
  - el dominio de la maldad
  lexicon: HALOT
  rationale: ממשלה expresa dominación, gobierno o autoridad ejercida. 'Dominio' refleja bien esa fuerza y evita reducir el término a mera 'regla'. רע aquí funciona sustantivamente como 'mal', por lo que 'dominio del mal' es más fluido en español que una calca más dura.
- source_word: וריש עם
  english_pob_choice: disgrace
  chosen_spanish: la vergüenza
  alternatives_spanish:
  - el oprobio
  - la deshonra
  - el reproche
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil, y el paralelo griego ὄνειδος confirma el sentido de reproche público / deshonra. 'Vergüenza' es idiomático y claro en español, y conserva el campo semántico de humillación social.
- source_word: זרעו
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - sus hijos
  - su prole
  - sus descendientes
  lexicon: HALOT
  rationale: זרע designa progenie o descendencia. 'Descendencia' preserva la referencia colectiva sin volverla excesivamente biológica o arcaica.
- source_word: תמיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - de continuo
  - sin cesar
  lexicon: HALOT
  rationale: תמיד expresa duración continua. 'Siempre' es la opción más natural y directa en español.
theological_decisions:
- issue: Relación entre hebreo transmitido y paralelo griego en una línea difícil
  english_pob_reading: Retain the Hebrew-based sense while allowing the Greek parallel to confirm lasting disgrace attached to the descendants.
  chosen_spanish_reading: Mantener la línea hebrea inteligible y dejar que el griego confirme la idea de vergüenza duradera sobre la descendencia.
  alternative_spanish_readings:
  - 'Traducir más directamente del griego: ''La herencia de los pecadores perecerá, y con su descendencia permanecerá el oprobio.'''
  - Emendar el hebreo para hacer que la primera cola hable de una herencia que perece.
  rationale: La política del proyecto da prioridad al testimonio hebreo donde se conserva, pero aquí el hebreo es difícil en la segunda cola. Por eso la traducción sigue el hebreo de forma conservadora y usa el paralelo griego como apoyo de sentido, sin desplazar el texto base.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original disponible; en Sirácides, traducir desde el hebreo cuando exista y mantener el griego como control.'
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando una nota al pie no anclada en el texto. Ahora no hay marcadores de nota, para evitar desajustes de validación.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque aquí no aparece el tetragrámaton.
  - Se prefirió 'hijo' en lugar de 'siervo' o 'persona' para conservar el paralelismo semítico de בן.
  - Se mantuvo 'mal' como sustantivo para רע, en línea con el sentido moral del pasaje.
  - La fórmula completa busca ser publicable y fiel, sin forzar una calca del griego que borre la prioridad del hebreo.
