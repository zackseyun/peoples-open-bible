translation:
  language: es
  text: y Joyadá[a], el líder de Aarón, y con él tres mil setecientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Joyadá, el líder para Aarón", es decir, el jefe que representaba a la casa sacerdotal aarónica.'
