translation:
  language: es
  text: Las aguas se cerraron a mi alrededor hasta mi misma vida[a]; las profundidades me rodearon; las algas[b] estaban envueltas alrededor de mi cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta mi alma», es decir, «hasta mi vida» o «hasta mi misma persona».'
    reason: lexical_alternative
  - marker: b
    text: «Algas» también podría rendirse «juncos» o «carrizos»; el contexto de Jonás sumergido en el mar favorece «algas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲפָפוּנִי
  english_pob_choice: closed in around me
  chosen_spanish: me cerraron alrededor
  alternatives_spanish:
  - me rodearon
  - me cercaron
  lexicon: HALOT
  rationale: El verbo expresa una acción de cercar u ocupar el espacio en torno al hablante. «Me cerraron alrededor» conserva la fuerza de amenaza y el movimiento envolvente sin volverlo mecánico.
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo es idiomático y poético; «las aguas» mantiene el matiz colectivo y la imagen de peligro.
- source_word: עַד נֶפֶשׁ
  english_pob_choice: to my very life
  chosen_spanish: hasta mi misma vida
  alternatives_spanish:
  - hasta mi alma
  - hasta mi vida
  - hasta lo más profundo de mí
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ señala vida o sí mismo, no una entidad separada. «Hasta mi misma vida» preserva la intensificación sin introducir una interpretación ajena como «hasta el cuello».
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - las profundidades
  - el hondo mar
  lexicon: HALOT
  rationale: «El abismo» reproduce bien la masa acuosa primordial o profunda del término, y en español es una equivalencia natural de «the deep» en este contexto poético.
- source_word: יְסֹבְבֵנִי
  english_pob_choice: surrounded me
  chosen_spanish: me rodeó
  alternatives_spanish:
  - me circundó
  - me cercó
  lexicon: HALOT
  rationale: La forma verbal mantiene la idea de envolver por todos lados. «Me rodeó» es claro, natural y paralelo a la primera cola.
- source_word: סוּף
  english_pob_choice: seaweed
  chosen_spanish: las algas
  alternatives_spanish:
  - los juncos
  - los carrizos
  - las algas marinas
  lexicon: HALOT
  rationale: En el contexto de Jonás bajo el mar, la referencia más probable y comunicativamente clara es a algas. Se evita «juncos» o «carrizos», que en español sugieren agua dulce o orillas.
- source_word: חָבוּשׁ
  english_pob_choice: was wrapped around
  chosen_spanish: se enredaron alrededor
  alternatives_spanish:
  - estaban envueltas alrededor
  - fueron atadas alrededor
  lexicon: HALOT
  rationale: El participio pasivo expresa algo sujeto o ceñido. «Se enredaron alrededor» transmite la imagen vívida de vegetación marina adherida y envolvente, sin forzar una construcción demasiado rígida.
- source_word: לְרֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: de mi cabeza
  alternatives_spanish:
  - sobre mi cabeza
  lexicon: HALOT
  rationale: El hebreo nombra la cabeza de forma concreta. En español, «de mi cabeza» funciona naturalmente con «alrededor» y conserva la imagen corporal directa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del texto hebreo y el audit trail inglés, sin cambios de revisión aplicados. Se mantuvo la tensión lexical de נֶפֶשׁ como vida/self y de סוּף como vegetación marina probable en este contexto.
  spanish_consistency_notes:
  - Se usó «abismo» para תְּהוֹם por coherencia con el valor poético de aguas profundas; si en otros pasajes del libro se prefiriera «profundidades», convendría mantener una regla contextual estable.
  - «Las aguas» conserva el plural hebreo idiomático.
  - No se introdujo «alma» en el texto principal para no borrar la tensión semántica de נֶפֶשׁ.
