review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB en casi todo: נָקַבְתָּ = ''atravesaste'', לַהֲפִיצֵנִי = ''para dispersarme'', עֲלִיצֻתָם = ''su exultación'', y בַּמִּסְתָּר = ''en secreto'' están bien representados. También preserva la decisión interpretativa principal para פְּרָזָיו mediante ''sus guerreros'' y mantiene la nota alternativa. Sin embargo, la nota al pie está anclada en ''bastones'', cuando la ambigüedad realmente corresponde a ''sus guerreros'' (פְּרָזָיו), no a בְמַטָּיו.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. No obstante, 'con sus propios bastones' suena algo débil o poco marcial en contexto poético-bélico; 'con sus propias varas' conserva mejor el campo léxico de מַטֶּה en registro bíblico legible. Además, conviene mover el marcador de nota al sintagma ambiguo para que la lectura sea más transparente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé/Mesías/esclavo, etc. La elección 'guerreros' para פְּרָזָיו concuerda con la decisión documentada del POB, y la alternativa debe seguir en nota. 'Exultación' es aceptable aunque algo elevada; no requiere cambio.
  issues:
  - severity: medium
    issue: Marcador de nota colocado en el término equivocado
    rationale: La nota explica la ambigüedad de פְּרָזָיו ('sus guerreros/aldeas/hordas'), pero el marcador [a] está puesto en 'bastones', que traduce בְמַטָּיו. Esto desorienta al lector y no refleja la evidencia fuente.
  - severity: low
    issue: '''Bastones'' suena menos adecuado en un contexto militar-poético'
    rationale: Aunque léxicamente posible, 'bastones' en español puede evocar apoyo al caminar más que vara/arma. 'Varas' mantiene mejor el núcleo semántico de מַטֶּה y la dignidad bíblica sin sobreinterpretar como 'lanzas'.
  revised_spanish_text: Tú atravesaste la cabeza de sus guerreros[a] con sus propias varas; ellos irrumpieron como tormenta para dispersarme, su exultación como la de uno que va a devorar al pobre en secreto.
  revised_footnotes:
