translation:
  language: es
  text: 'Se trasladó de allí y cavó otro pozo[a], y no riñeron por él. Entonces le puso por nombre Rejobot, y dijo: «Porque ahora Yahvé nos ha dado espacio, y seremos fecundos en la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Rejobot» refleja el topónimo hebreo רְחֹבוֹת. El nombre sugiere «lugares anchos» o «espacios amplios»; la explicación de Isaac juega con ese sentido: «ahora Yahvé nos ha dado espacio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעְתֵּק
  english_pob_choice: He moved
  chosen_spanish: Se trasladó de allí
  alternatives_spanish:
  - Se movió de allí
  - Se fue de allí
  - Se desplazó de allí
  lexicon: HALOT
  rationale: El verbo expresa un cambio de lugar en la narración. «Se trasladó de allí» conserva el sentido de desplazamiento sin forzar una imagen más específica que el hebreo no exige.
- source_word: בְּאֵר אַחֶרֶת
  english_pob_choice: another well
  chosen_spanish: otro pozo
  alternatives_spanish:
  - un pozo diferente
  - otro aljibe
  lexicon: HALOT
  rationale: «Pozo» es el equivalente natural y preciso para בְּאֵר en este contexto. «Otro pozo» reproduce la simpleza del sintagma hebreo.
- source_word: וְלֹא רָבוּ עָלֶיהָ
  english_pob_choice: they did not quarrel over it
  chosen_spanish: no riñeron por él
  alternatives_spanish:
  - no pelearon por él
  - no disputaron por él
  - no contendieron por él
  lexicon: HALOT
  rationale: ריב aquí denota contienda o disputa. «Riñeron» comunica bien la tensión interpersonal en español sin perder el matiz de conflicto sobre el pozo.
- source_word: וַיִּקְרָא שְׁמָהּ רְחֹבוֹת
  english_pob_choice: he called its name Rehoboth
  chosen_spanish: llamó su nombre Rehobot
  alternatives_spanish:
  - le puso por nombre Rehobot
  - lo nombró Rehobot
  lexicon: HALOT
  rationale: Se conserva la fórmula de nombramiento bíblica y el topónimo transliterado. «Su nombre» sigue el hebreo con naturalidad española.
- source_word: רְחֹבוֹת
  english_pob_choice: Rehoboth
  chosen_spanish: Rehobot
  alternatives_spanish:
  - Rehobot
  - Rejobot
  - Espacios anchos
  lexicon: HALOT
  rationale: Como nombre propio, se translitera. Se prefiere «Rehobot» para una forma más fluida en español, manteniendo la referencia al nombre hebreo y su juego etimológico en la nota.
- source_word: כִּי עַתָּה הִרְחִיב יְהוָה לָנוּ
  english_pob_choice: For now Yahweh has made room for us
  chosen_spanish: Porque ahora Yahvé nos ha dado espacio
  alternatives_spanish:
  - Porque ahora Yahvé nos ha hecho lugar
  - Porque ahora Yahvé nos ha ensanchado
  - Porque ahora Yahvé nos ha dado amplitud
  lexicon: HALOT
  rationale: הִרְחִיב expresa ensanchar o dar espacio. «Nos ha dado espacio» reproduce el sentido espacial de manera idiomática y mantiene el juego con el nombre del lugar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: «Yahvé», en lugar de un reemplazo por mayúsculas o una forma tradicionalizada distinta.'
- source_word: וּפָרִינוּ בָאָרֶץ
  english_pob_choice: and we will be fruitful in the land
  chosen_spanish: y fructificaremos en la tierra
  alternatives_spanish:
  - y seremos fecundos en la tierra
  - y nos multiplicaremos en la tierra
  - y daremos fruto en la tierra
  lexicon: HALOT
  rationale: פרה significa ser fecundo o fructificar. «Fructificaremos» conserva el paralelismo verbal y el posible eco de bendición de aumento; «en la tierra» refleja con fidelidad אָרֶץ.
- source_word: בָאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  - en la tierra prometida
  lexicon: HALOT
  rationale: Aquí אָרֶץ funciona como «tierra» en sentido territorial. Se evita explicitar «prometida» porque el versículo no lo dice.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Para un draft auditable y transparente, se mantiene el Nombre propio como «Yahvé», conforme a la norma del proyecto y sin sustituirlo por una convención eclesiástica de ocultamiento.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con el audit trail inglés: se mantiene el juego entre el nombre propio Rehobot y el verbo de «dar espacio/ensanchar» en la explicación de Isaac. No hay revisiones aplicadas en el paquete de referencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Tierra» conserva el valor territorial de אָרֶץ sin sobreinterpretación.
  - La nota al pie preserva el juego etimológico entre רְחֹבוֹת y הִרְחִיב.
