translation:
  language: es
  text: Solo a la tribu de Leví no dio heredad[a]; las ofrendas hechas por fuego a Yahvé, Dios de Israel, son su heredad[b], como le dijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: "las ofrendas por fuego de Yahvé".'
    reason: lexical_alternative
  - marker: b
    text: 'Algunos entienden esto, a la luz de pasajes cercanos, como: "Yahvé, Dios de Israel, es su heredad".'
    reason: alternative_reading
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: Marca la excepción restrictiva frente a la distribución anterior de la tierra. 'Solo' conserva esa fuerza de exclusión con español natural y sobrio.
- source_word: לְשֵׁבֶט הַלֵּוִי
  english_pob_choice: to the tribe of Levi
  chosen_spanish: a la tribu de Leví
  alternatives_spanish:
  - para la tribu de Leví
  lexicon: HALOT
  rationale: La construcción verbal en español exige una expresión de destinatario; 'a la tribu de Leví' reproduce bien el dativo del hebreo en este contexto de reparto de heredad.
- source_word: לֹא נָתַן נַחֲלָה
  english_pob_choice: he gave no inheritance
  chosen_spanish: no dio heredad
  alternatives_spanish:
  - no dio una heredad
  - no asignó heredad
  lexicon: HALOT
  rationale: '''Heredad'' comunica el reparto territorial-covenantal propio de Josué mejor que el más general ''posesión''. Se evita añadir artículo para mantener la concisión del hebreo.'
- source_word: אִשֵּׁי יְהוָה
  english_pob_choice: the offerings by fire of the LORD
  chosen_spanish: las ofrendas encendidas para Yahvé
  alternatives_spanish:
  - las ofrendas hechas por fuego para Yahvé
  - las ofrendas de fuego para Yahvé
  lexicon: HALOT
  rationale: '''Ofrendas encendidas'' conserva el valor etimológico ligado al fuego sin sonar tan técnico o rígido como una calca. Se mantiene Yahvé según el estándar del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: project-default
  rationale: Se sigue el término estándar del proyecto para el nombre divino, en vez de sustituirlo por 'SEÑOR'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción natural en español para la cadena de posesión/apposición, manteniendo el referente divino y el vínculo pactual con Israel.
- source_word: הוּא נַחֲלָתוֹ
  english_pob_choice: are his inheritance
  chosen_spanish: son su heredad
  alternatives_spanish:
  - es su heredad
  - es su herencia
  lexicon: HALOT
  rationale: 'Se preserva la tensión del hebreo y del audit trail inglés: el antecedente inmediato es plural (''las ofrendas encendidas''), por eso en español se usa plural concordando con ese referente. ''Heredad'' mantiene el campo semántico del reparto de tierra y provisión cultual.'
- source_word: כַּאֲשֶׁר דִּבֶּר לוֹ
  english_pob_choice: as he spoke to him
  chosen_spanish: como le había dicho
  alternatives_spanish:
  - como le habló
  - como le había prometido
  lexicon: HALOT
  rationale: '''Había dicho'' conserva el valor de ''habló/dijo'' sin introducir ''prometió'', que interpretaría más de lo que el hebreo inmediato exige. El pluscuamperfecto encaja bien en español narrativo.'
theological_decisions:
- issue: 'La heredad de Leví: provisión cultual vs. Yahvé como heredad'
  english_pob_reading: the offerings by fire ... are his inheritance
  chosen_spanish_reading: las ofrendas encendidas para Yahvé ... son su heredad
  alternative_spanish_readings:
  - Yahvé, Dios de Israel, es su heredad
  - Yahvé mismo es su heredad
  rationale: El hebreo coloca primero las ofrendas y luego el predicado; por eso el texto principal conserva esa sintaxis y no armoniza con pasajes cercanos que hablan de Yahvé como heredad de Leví. Se preserva así la tensión teológica documentada en el audit trail.
  doctrine_reference: Josh 13:14; cf. pasajes paralelos sobre la heredad levítica
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail inglés que corrigió la expresión a 'offerings by fire' por mayor cercanía léxica a אִשֵּׁי. En español se optó por 'ofrendas encendidas' para mantener ese vínculo con el fuego sin perder fluidez. También se conservó la alternativa teológica sobre si la heredad de Leví son las ofrendas o Yahvé mismo, sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יהוה.
  - Se usa 'heredad' para נַחֲלָה, en coherencia con el reparto de tierra en Josué.
  - Se mantiene la concordancia plural 'son' por el antecedente inmediato plural, preservando la tensión del original.
  - '''Ofrendas encendidas'' evita tanto una paráfrasis libre como una literalidad torpe, y deja abierta la nota formal alternativa.'
