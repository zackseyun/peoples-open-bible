translation:
  language: es
  text: 'Y estos entraron en la casa de Micaía y tomaron la imagen tallada, el efod, los ídolos domésticos[a] y la imagen fundida. Entonces el sacerdote les dijo: «¿Qué están haciendo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los terafines». El término hebreo se refiere a objetos cultuales domésticos o ídolos domésticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These men
  chosen_spanish: Y éstos
  alternatives_spanish:
  - Y estos hombres
  - Estos
  lexicon: HALOT
  rationale: El demostrativo introduce al grupo ya identificado en el contexto inmediato. «Éstos» mantiene la referencia sin añadir una palabra inexistente en el hebreo; «hombres» sería explicativo, pero no necesario para la claridad en español.
- source_word: בָּאוּ
  english_pob_choice: went into
  chosen_spanish: entraron
  alternatives_spanish:
  - fueron a
  - vinieron a
  lexicon: HALOT
  rationale: Con el complemento «la casa de Micaía», el verbo comunica entrada al lugar. «Entraron» expresa con naturalidad el movimiento narrativo y conserva el sentido de acceso al interior.
- source_word: בֵּית מִיכָה
  english_pob_choice: Micah’s house
  chosen_spanish: la casa de Micaía
  alternatives_spanish:
  - la casa de Micah
  - la casa de Miqueas
  lexicon: HALOT
  rationale: Se conserva el nombre propio según la forma usada en este pasaje. La construcción española normaliza el genitivo como «la casa de X» sin perder el sentido del hebreo.
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se llevaron
  - agarraron
  lexicon: HALOT
  rationale: El verbo narrativo básico en español es «tomar» en el sentido de apropiarse de objetos. «Se llevaron» introduciría un matiz más interpretativo; «tomaron» mantiene neutralidad.
- source_word: פֶּסֶל
  english_pob_choice: carved image
  chosen_spanish: la imagen tallada
  alternatives_spanish:
  - el ídolo tallado
  - la escultura
  lexicon: HALOT
  rationale: «Imagen tallada» conserva el componente material de una figura hecha por talla, como en la lectura de la POB en inglés. Se evita «ídolo» como equivalencia única porque el hebreo nombra el objeto físico antes que la valoración teológica.
- source_word: הָאֵפוֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el efod sacerdotal
  lexicon: HALOT
  rationale: Se translitera el término técnico, ya que no tiene equivalente simple en español. Añadir «sacerdotal» sobrerrestringiría el objeto en este contexto de práctica cultual ilegítima.
- source_word: הַתְּרָפִים
  english_pob_choice: the household idols
  chosen_spanish: los ídolos del hogar
  alternatives_spanish:
  - los terafines
  - los ídolos domésticos
  lexicon: HALOT
  rationale: La POB inglesa opta por un término explicativo para objetos cultuales domésticos. «Ídolos del hogar» comunica esa función a lectores modernos; «terafines» preservaría el tecnicismo, pero sería menos transparente.
- source_word: הַמַּסֵּכָה
  english_pob_choice: the cast image
  chosen_spanish: la imagen fundida
  alternatives_spanish:
  - la imagen de fundición
  - la imagen moldeada
  lexicon: HALOT
  rationale: La imagen hecha por fundición se expresa naturalmente como «imagen fundida». «Fundida» refleja el proceso metalúrgico implícito sin cargar el texto con un calco áspero.
- source_word: וַיֹּאמֶר אֲלֵיהֶם הַכֹּהֵן
  english_pob_choice: Then the priest said to them
  chosen_spanish: Entonces el sacerdote les dijo
  alternatives_spanish:
  - Y el sacerdote les dijo
  - Luego el sacerdote les dijo
  lexicon: HALOT
  rationale: «Entonces» conserva la progresión narrativa de וַ- como avance en la acción. «Sacerdote» es el equivalente directo de הַכֹּהֵן y evita introducir una denominación eclesiástica ajena.
- source_word: מָה אַתֶּם עֹשִׂים
  english_pob_choice: What are you doing?
  chosen_spanish: ¿Qué están haciendo?
  alternatives_spanish:
  - ¿Qué hacen?
  - ¿Qué están haciendo ustedes?
  lexicon: HALOT
  rationale: El español contemporáneo expresa mejor la acción en curso con la perífrasis progresiva. Se mantiene la pregunta directa del hebreo sin añadir «aquí» ni otros elementos no presentes.
theological_decisions:
- issue: Tratamiento de los objetos cultuales en un contexto idólatra
  english_pob_reading: Use concrete terms ('carved image,' 'household idols,' 'cast image') rather than flattening all items into a single generic term.
  chosen_spanish_reading: Mantener términos concretos («imagen tallada», «ídolos del hogar», «imagen fundida») en lugar de reducir todo a «ídolo».
  alternative_spanish_readings:
  - ídolos
  - imágenes
  rationale: El versículo enumera objetos distintos; la traducción los conserva diferenciados para no borrar la variedad léxica del hebreo. Al mismo tiempo, el español deja claro que se trata de objetos cultuales condenables por el contexto narrativo.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa sin cambios sustantivos. Se conservó la distinción entre los cuatro objetos cultuales y la progresión narrativa simple del hebreo, manteniendo la lectura de alta concordancia del audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «efod» sin adaptar el término para conservar la especificidad cultural.
  - «Ídolos del hogar» reproduce la decisión explicativa de la POB inglesa para תְּרָפִים sin perder la alternativa técnica en nota.
  - Se evitó «graven image»/«ídolo» como traducción única de פֶּסֶל para preservar la concreción material del objeto.
