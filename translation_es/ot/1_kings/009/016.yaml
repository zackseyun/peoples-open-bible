  yaml_path: translation/ot/1_kings/009/016.yaml
  text: Pharaoh king of Egypt had gone up and captured Gezer and burned it with fire[a], and he killed the Canaanites who lived in the city, and gave it as a dowry to his daughter, Solomon’s wife.
  footnotes:
