source:
  edition: WLC
  text: מֵפֵר֙ אֹת֣וֹת בַּדִּ֔ים וְ/קֹסְמִ֖ים יְהוֹלֵ֑ל מֵשִׁ֧יב חֲכָמִ֛ים אָח֖וֹר וְ/דַעְתָּ֥/ם יְשַׂכֵּֽל׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/044/025.yaml
  text: who frustrates the signs of boasters and makes diviners act like fools[a], who turns wise men back and makes their knowledge foolish[c][b],
  footnotes:
  - marker: a
    text: Or 'omens' for 'signs.' The Hebrew can refer to purported validating signs used by deceptive practitioners.
    reason: lexical_alternative
  - marker: b
    text: Or 'drives diviners mad' / 'makes diviners foolish.' The Hebrew verb conveys making them act irrationally or exposing them as fools.
    reason: lexical_alternative
  - marker: c
    text: Or 'turns the wise backward.' The phrase pictures reversal and humiliation of those reputed to be wise.
    reason: lexical_alternative
