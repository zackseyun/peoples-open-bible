translation:
  language: es
  text: 'Se le informó al rey de Egipto que el pueblo había huido, y el corazón de Faraón y de sus siervos[a] se volvió contra el pueblo, y dijeron: «¿Qué es esto que hemos hecho[b], que hemos dejado ir a Israel de servirnos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la mente de Faraón y de sus siervos cambió hacia el pueblo».
    reason: lexical_alternative
  - marker: b
    text: O, «que hemos liberado a Israel de nuestro servicio» o «de ser nuestros esclavos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד / it was reported
  english_pob_choice: It was reported
  chosen_spanish: Fue informado
  alternatives_spanish:
  - Se dijo
  - Le fue comunicado
  lexicon: HALOT
  rationale: La forma pasiva impersonal de נגד se conserva en español con una pasiva perifrástica natural. "Fue informado" reproduce el carácter no agentivo del hebreo sin forzar un sujeto explícito.
- source_word: לְמֶלֶךְ מִצְרַיִם / to the king of Egypt
  english_pob_choice: to the king of Egypt
  chosen_spanish: al rey de Egipto
  alternatives_spanish:
  - al rey egipcio
  lexicon: HALOT
  rationale: La construcción es directa y se vierte con el orden natural del español. "Rey de Egipto" conserva la relación posesiva del original.
- source_word: כִּי בָרַח הָעָם / that the people had fled
  english_pob_choice: that the people had fled
  chosen_spanish: que el pueblo había huido
  alternatives_spanish:
  - que el pueblo huyó
  - que el pueblo había escapado
  lexicon: HALOT
  rationale: ברח expresa huida; "había huido" refleja bien la secuencia narrativa en español. "Pueblo" mantiene el sustantivo definido del hebreo.
- source_word: וַיֵּהָפֵךְ לְבַב פַּרְעֹה וַעֲבָדָיו / the heart of Pharaoh and his servants was turned
  english_pob_choice: the heart of Pharaoh and of his servants was turned
  chosen_spanish: el corazón de Faraón y de sus siervos se volvió
  alternatives_spanish:
  - el corazón de Faraón y de sus siervos fue cambiado
  - la mente de Faraón y de sus siervos cambió
  lexicon: HALOT
  rationale: לְבַב se conserva como "corazón" para mantener la antropología y la imagen hebreas, como hace la POB en inglés con "heart". El verbo נהפך admite "se volvió" para reflejar el giro interno sin añadir interpretación psicológica ajena al texto.
- source_word: אֶל הָעָם / against the people
  english_pob_choice: against the people
  chosen_spanish: contra el pueblo
  alternatives_spanish:
  - hacia el pueblo
  - respecto del pueblo
  lexicon: HALOT
  rationale: Aunque אֶל puede ser direccionalmente neutral, aquí el cambio de disposición es hostil en contexto. "Contra" hace explícito ese valor contextual en un español idiomático.
- source_word: וַיֹּאמְרוּ / and they said
  english_pob_choice: and they said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y decían
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; el pretérito simple español conserva ese avance. No se requiere aspecto durativo.
- source_word: מַה זֹּאת עָשִׂינוּ / What is this we have done
  english_pob_choice: What is this we have done
  chosen_spanish: ¿Qué es esto que hemos hecho?
  alternatives_spanish:
  - ¿Qué hemos hecho?
  - ¿Qué es lo que hemos hecho?
  lexicon: HALOT
  rationale: Se conserva la fuerza idiomática completa del hebreo, incluyendo el demostrativo זֹּאת. La forma española mantiene el tono de desconcierto o arrepentimiento implícito.
- source_word: שִׁלַּחְנוּ / we have let ... go
  english_pob_choice: we have let ... go
  chosen_spanish: al haber dejado ir
  alternatives_spanish:
  - al haber enviado fuera
  - al haber soltado
  lexicon: HALOT
  rationale: שׁלח aquí es liberar/dismiss. "Dejar ir" es idiomático en español y corresponde al valor que la POB fijó en inglés.
- source_word: אֶת יִשְׂרָאֵל / Israel
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  lexicon: HALOT
  rationale: Se conserva el nombre propio sin ampliar el referente. El objeto directo con "a" es natural en español para personas/nombres propios.
- source_word: מֵעָבְדֵנוּ / from serving us
  english_pob_choice: from serving us
  chosen_spanish: para que nos sirviera
  alternatives_spanish:
  - de servirnos
  - de nuestro servicio
  - de ser nuestros esclavos
  lexicon: HALOT
  rationale: La construcción hebrea expresa cese de servicio. En español, "para que nos sirviera" hace explícita la finalidad de la relación laboral servil sin imponer "esclavos" en el texto principal, que sería una intensificación interpretativa.
theological_decisions:
- issue: Elección antropológica para לְבַב
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - mente
  rationale: Se preserva la antropología bíblica del corazón como centro de voluntad y pensamiento, en vez de reducirla a un término psicológico moderno. Esto mantiene la textura literaria y teológica del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de מֵעָבְדֵנוּ en el cierre de la queja
  english_pob_reading: from serving us
  chosen_spanish_reading: para que nos sirviera
  alternative_spanish_readings:
  - de servirnos
  - de ser nuestros esclavos
  rationale: El hebreo describe la cesación del servicio a Egipto. La opción principal evita añadir una afirmación de esclavitud que el sintagma inmediato no explicita, aunque el trasfondo narrativo sí incluya opresión. Se conserva así la tensión entre servicio y esclavitud.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión menor: se retiró un ''of'' redundante para mejorar la fluidez sin alterar el sentido. La versión española sigue esa lectura consolidada y mantiene intactas las decisiones clave: "heart" → "corazón" y "from serving us" → una formulación no intensificada en el texto principal.'
  spanish_consistency_notes:
  - Se usa "Faraón" con mayúscula como nombre propio convencional en español.
  - Se mantiene "siervos" en sentido cortesano/administrativo para reflejar עבדים en este contexto narrativo; la nota b aclara la alternativa más fuerte relacionada con esclavitud.
  - '"Pueblo" traduce העם de modo uniforme y no se pluraliza.'
  - La puntuación conserva una sola cláusula principal con una pausa fuerte antes de la cita directa, acorde con el hebreo narrativo.
