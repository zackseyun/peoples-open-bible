    rationale: El audit trail inglés da como alternativa «with the fire of my fury I destroyed them». El borrador español dice «con el fuego de mi furia los consumí», repitiendo el verbo principal en vez de reflejar la alternativa «destruí».
  - severity: medium
    issue: La nota [a] explica el modismo en presente y pierde el matiz resultativo/retributivo ya cumplido.
    rationale: El hebreo y la nota inglesa explican que las consecuencias de su conducta han vuelto sobre ellos. «Recaen sobre ellos» suena gnómico o presente general; «han recaído sobre ellos» o «les han venido encima» refleja mejor el valor.
  - severity: low
