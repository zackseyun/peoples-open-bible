review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el sentido básico del griego: imposibilidad de oponerse al rey y espera continua de un momento oportuno para ejecutar el propósito por medio de una estratagema. Sin embargo, «vigilaba la oportunidad» suena menos idiomático que una formulación que exprese mejor ἐτήρει + εὔκαιρον como ‘seguir esperando/buscando un momento oportuno’.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere un ajuste de naturalidad y precisión idiomática. «Vigilaba la oportunidad» resulta algo forzado en español bíblico moderno. «Un momento oportuno» también refleja mejor el valor sustantivado de εὔκαιρον que «la oportunidad» en esta construcción.
  glossary_alignment: No hay términos teológicos o de glosario mayor en disputa. «Rey» y «estratagema» están bien. La revisión propuesta mantiene la omisión correcta de añadidos no expresados como «abiertamente».
  issues:
  - severity: medium
    issue: «vigilaba la oportunidad» es una colocación poco natural en español
    rationale: Aunque intenta preservar ‘kept watching for’, en español suena más idiomático ‘seguía esperando un momento oportuno’ o ‘estaba atento a un momento oportuno’, manteniendo el imperfecto durativo de ἐτήρει.
  - severity: low
    issue: «la oportunidad» puede sonar demasiado definida
    rationale: εὔκαιρον aquí se refiere a un tiempo oportuno/favorable. «Un momento oportuno» comunica con más claridad el matiz temporal subyacente.
  revised_spanish_text: Pero, como no le era posible oponerse al rey, seguía esperando un momento oportuno para lograrlo mediante una estratagema.
  revision_rationale: Se ajusta la frase central para que el español suene natural y preserve mejor la fuerza durativa de ἐτήρει y el matiz temporal de εὔκαιρον, sin añadir información ausente del griego ni alterar el sentido del objeto implícito en «lograrlo».
