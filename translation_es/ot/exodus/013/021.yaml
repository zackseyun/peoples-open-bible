translation:
  language: es
  text: Yahvé iba delante de ellos de día, en una columna de nube, para guiarlos por el camino[a]; y de noche, en una columna de fuego, para darles luz, a fin de que pudieran caminar de día y de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; en algunas traducciones se translitera como «Yahweh».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: the LORD / Yahweh in audit context
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: WLC / HALOT
  rationale: El hebreo usa el Nombre propio del pacto, no un título genérico. En español POB se conserva la forma «Yahvé» para reflejar auditablemente el Tetragrámaton sin ocultarlo bajo «SEÑOR».
- source_word: הֹלֵךְ
  english_pob_choice: was going before
  chosen_spanish: iba delante
  alternatives_spanish:
  - estaba yendo delante
  - iba antes
  lexicon: HALOT
  rationale: El participio expresa acción continua; «iba delante» comunica en español esa guía sostenida con naturalidad y sin perder la idea de presencia previa.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: «Delante de ellos» conserva la imagen espacial y la función de guía. Es el equivalente más natural para el idiomático לִפְנֵיהֶם.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en el día
  lexicon: HALOT
  rationale: La locución adverbial española más natural y paralela a «de noche» es «de día».
- source_word: בְּעַמּוּד עָנָן
  english_pob_choice: in a pillar of cloud
  chosen_spanish: en una columna de nube
  alternatives_spanish:
  - en un pilar de nube
  - en una columna de nubes
  lexicon: HALOT
  rationale: «Columna» expresa mejor que «pilar» la imagen bíblica en español contemporáneo. «Nube» mantiene el singular concreto del hebreo עָנָן; «columna de nube» sería más idiomático que «de nubes».
- source_word: לַנְחֹתָם
  english_pob_choice: to lead them
  chosen_spanish: para guiarlos
  alternatives_spanish:
  - para conducirlos
  - para llevarlos
  lexicon: HALOT
  rationale: נחה aquí implica guiar en el camino. «Guiarlos» preserva la dirección intencional y suena más natural en español que una traducción demasiado literal.
- source_word: הַדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - a lo largo del camino
  lexicon: HALOT
  rationale: La frase española «por el camino» recoge el movimiento del trayecto y evita la dureza de «en el camino» en este contexto de desplazamiento.
- source_word: וְלַיְלָה
  english_pob_choice: and by night
  chosen_spanish: y de noche
  alternatives_spanish:
  - y por la noche
  - y en la noche
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «de día» mediante «de noche».
- source_word: בְּעַמּוּד אֵשׁ
  english_pob_choice: in a pillar of fire
  chosen_spanish: en una columna de fuego
  alternatives_spanish:
  - en un pilar de fuego
  lexicon: HALOT
  rationale: Se conserva la misma solución que en la primera mitad del verso para mantener el paralelismo formal y visual.
- source_word: לְהָאִיר לָהֶם
  english_pob_choice: to give them light
  chosen_spanish: para alumbrarles
  alternatives_spanish:
  - para darles luz
  - para iluminarlos
  lexicon: HALOT
  rationale: El hiphil de אור expresa hacer luz / alumbrar. «Alumbrarles» es breve, natural y suficientemente fiel al propósito de la columna de fuego.
- source_word: לָלֶכֶת
  english_pob_choice: so that they could travel
  chosen_spanish: para que pudieran ir
  alternatives_spanish:
  - para que caminaran
  - para que pudieran viajar
  lexicon: HALOT
  rationale: El infinitivo final indica resultado o capacidad. «Pudieran ir» conserva la sencillez del movimiento sin sobreespecificar «viajar».
- source_word: יוֹמָם וָלָיְלָה
  english_pob_choice: by day and by night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - de día y por la noche
  - día y noche
  lexicon: HALOT
  rationale: La repetición del par temporal se mantiene en una formulación española fluida y simétrica.
theological_decisions:
- issue: Nombre divino YHWH en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El contexto fuente usa el Tetragrámaton directamente. En el texto español se preserva el Nombre con la forma POB «Yahvé», evitando la sustitución por un título. Esto mantiene la transparencia traductológica y la continuidad con el audit trail.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; no se registran cambios aplicados. La presente propuesta sigue esa lectura estable y solo adapta al español las decisiones léxicas y teológicas ya documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se conserva el paralelismo poético-semántico de «de día / de noche» y «columna de nube / columna de fuego».
  - «Guiarlos» y «alumbrarles» reproducen con naturalidad el propósito y la guía continuada del hebreo sin introducir elementos ajenos.
  - El pie de nota ancla explícitamente el Nombre divino para transparencia textual.
