translation:
  language: es
  text: Cantar de los cantares[a], que es de Salomón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''Cantar de los cantares'', una expresión superlativa que significa un canto sobresaliente o el más excelente.'
    reason: lexical_alternative
  - marker: b
    text: O 'por Salomón', 'para Salomón' o 'acerca de Salomón'; la preposición hebrea puede indicar varias clases de relación.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: Song
  chosen_spanish: Cantar
  alternatives_spanish:
  - canto
  - canción
  lexicon: HALOT
  rationale: La forma nominal hebrea designa un poema/canto. En español, 'Cantar' funciona bien como título tradicional y preserva el valor literario del libro mejor que 'canción', que sonaría demasiado moderna o ligera.
- source_word: הַשִּׁירִים
  english_pob_choice: of Songs
  chosen_spanish: de los Cantares
  alternatives_spanish:
  - de las canciones
  - de los cantos
  - de los cantos por excelencia
  lexicon: HALOT
  rationale: 'El hebreo expresa una construcción superlativa o de excelencia. ''Cantares'' mantiene el eco del giro hebreo y es la forma consagrada en español para este libro, sin explicitar en exceso la idea de ''el mejor''. '
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: En español, 'que' introduce con naturalidad la cláusula relativa después de un título nominal y evita una rigidez innecesaria.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: is Solomon’s
  chosen_spanish: es de Salomón
  alternatives_spanish:
  - es para Salomón
  - es por Salomón
  - es acerca de Salomón
  lexicon: HALOT
  rationale: 'La preposición hebrea ל admite varias relaciones: posesión, dedicación, autoría o asociación. ''Es de Salomón'' conserva mejor esa amplitud que una opción más estrecha como ''por Salomón''.'
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Shelomó
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española establecida.
theological_decisions:
- issue: Relación del canto con Salomón expresada por לִשְׁלֹמֹה
  english_pob_reading: 'Render broadly as association/possession: ''is Solomon’s'''
  chosen_spanish_reading: '''es de Salomón'' mantiene una relación amplia de pertenencia/atribución'
  alternative_spanish_readings:
  - es por Salomón
  - es para Salomón
  - es acerca de Salomón
  rationale: El hebreo no especifica de manera inequívoca autoría, dedicación o asunto. La traducción española debe preservar esa tensión interpretativa sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El contexto auditado de la POB inglesa no requirió revisiones posteriores: la lectura estable fue ''The Song of Songs, which is Solomon’s.'' con nota que preserva la ambigüedad de לִשְׁלֹמֹה. La versión española sigue esa misma línea, manteniendo el superlativo y la relación amplia con Salomón.'
  spanish_consistency_notes:
  - Se usa 'Cantar de los Cantares' por ser la forma española bíblica transparente y fiel al superlativo hebreo.
  - Se evita 'SEÑOR' o cualquier paráfrasis interpretativa porque el versículo no contiene el nombre divino.
  - '''Es de Salomón'' conserva la ambigüedad de autoría/pertenencia/dedicación señalada en el audit trail inglés.'
  - La puntuación y el orden siguen un registro bíblico claro y publicable en español moderno.
