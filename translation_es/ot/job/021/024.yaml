translation:
  language: es
  text: Sus recipientes de leche[a] están llenos de leche, y el tuétano de sus huesos está bien regado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus ubres están llenas de leche». El término hebreo es raro y puede referirse a ubres o a recipientes para leche.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲטִינָיו
  english_pob_choice: his pails
  chosen_spanish: sus pailas
  alternatives_spanish:
  - sus ubres
  - sus recipientes de leche
  lexicon: HALOT
  rationale: El término hebreo es raro y el POB inglés lo resolvió con una imagen natural de recipientes/órganos asociados con abundancia, dejando la alternativa «udders» en nota. En español, «pailas» conserva la idea de recipientes llenos y evita una atribución demasiado literal y extraña al varón del poema, mientras mantiene abierta la ambigüedad histórica del término.
- source_word: מָלְאוּ
  english_pob_choice: are full
  chosen_spanish: están llenas
  alternatives_spanish:
  - fueron llenadas
  - se llenan
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí un estado resultante; en español, el presente «están llenas» transmite mejor la condición actual de abundancia que un pasado o un proceso.
- source_word: חָלָב
  english_pob_choice: milk
  chosen_spanish: leche
  lexicon: HALOT
  rationale: Es el sentido léxico normal y, en este contexto, comunica riqueza, nutrición y prosperidad.
- source_word: וּמֹחַ
  english_pob_choice: and the marrow
  chosen_spanish: y el tuétano
  alternatives_spanish:
  - y la médula
  lexicon: HALOT
  rationale: «Tuétano» es un equivalente concreto y natural en español para la sustancia interna de los huesos. «Médula» sería posible, pero «tuétano» preserva mejor el sabor corporal e imagístico del hebreo.
- source_word: עַצְמוֹתָיו
  english_pob_choice: of his bones
  chosen_spanish: de sus huesos
  alternatives_spanish:
  - en sus huesos
  lexicon: HALOT
  rationale: La relación constructa se expresa de forma directa como «de sus huesos», manteniendo la imagen del tuétano contenido en los huesos.
- source_word: יְשֻׁקֶּה
  english_pob_choice: is well-watered
  chosen_spanish: está bien regado
  alternatives_spanish:
  - está humedecido
  - está empapado
  - está regado
  lexicon: HALOT
  rationale: El pasivo intensivo sugiere ser irrigado o abundantemente humedecido. «Bien regado» comunica fertilidad y prosperidad en un español claro, sin perder la imaginería de abundancia corporal.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantuvo la lectura estable del versículo y su nota léxica sobre el término raro para el sujeto de «llenas de leche».
  spanish_consistency_notes:
  - Se conservó un registro poético y sobrio, acorde con la poesía sapiencial.
  - Se evitó «SEÑOR» u otras convenciones no presentes en el versículo.
  - Se mantuvo la concreción corporal de la imagen hebrea sin explicitarla más allá de lo necesario.
