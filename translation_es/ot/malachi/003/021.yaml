translation:
  language: es
  text: Y pisotearán a los impíos[a], porque serán ceniza debajo de las plantas de sus pies en el día en que yo actúe, dice Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los malvados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַסּוֹתֶם
  english_pob_choice: And you will trample
  chosen_spanish: Y pisotearán
  alternatives_spanish:
  - Y aplastarán
  - Y pisarán
  lexicon: HALOT
  rationale: La forma verbal expresa una acción de victoria y sometimiento físico. "Pisotearán" conserva la imagen corporal fuerte y es natural en español sin suavizar el sentido.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: a los impíos
  alternatives_spanish:
  - a los malvados
  - a los perversos
  lexicon: HALOT
  rationale: El término designa personas moralmente culpables. "Impíos" mantiene el registro bíblico y la categoría ética sin volverlo demasiado interpretativo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la razón de la acción: su derrota final. "Porque" comunica con claridad la relación causal en español.'
- source_word: יִהְיוּ אֵפֶר
  english_pob_choice: they will be ashes
  chosen_spanish: serán ceniza
  alternatives_spanish:
  - se convertirán en ceniza
  - serán como ceniza
  lexicon: HALOT
  rationale: El predicado hebreo es directo; en español, "serán ceniza" conserva la declaración enfática sin añadir una comparación que el texto no expresa de forma explícita.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - por debajo de
  lexicon: HALOT
  rationale: Preposición espacial simple. "Debajo de" suena natural en español y conserva la relación de inferioridad física.
- source_word: כַּפּוֹת רַגְלֵיכֶם
  english_pob_choice: the soles of your feet
  chosen_spanish: las plantas de sus pies
  alternatives_spanish:
  - las suelas de sus pies
  - las plantas de los pies
  lexicon: HALOT
  rationale: כַּף con "pie" alude idiomáticamente a la planta/sola del pie. En español, "plantas de sus pies" preserva la imagen y el paralelismo con el pisoteo.
- source_word: בַּיּוֹם אֲשֶׁר
  english_pob_choice: on the day when
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día cuando
  - en el día que
  lexicon: HALOT
  rationale: La expresión temporal introduce el momento de la intervención divina. "En el día en que" es claro y formalmente adecuado.
- source_word: אֲנִי עֹשֶׂה
  english_pob_choice: I act
  chosen_spanish: yo actúe
  alternatives_spanish:
  - yo haga
  - yo intervenga
  lexicon: HALOT
  rationale: La forma es elíptica y apunta a la acción decisiva de Yahvé. "Actúe" comunica esa intervención sin sobreespecificarla; el pronombre puede omitirse en español, pero se conserva para dar énfasis al sujeto divino.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Armados
  - Yahvé de los Ejércitos Celestiales
  lexicon: HALOT
  rationale: Se mantiene "Yahvé" para el nombre divino, conforme al criterio del proyecto. צְבָאוֹת se traduce por su sentido básico en una forma bíblica inteligible en español, "de los Ejércitos", preservando la fuerza militar/cósmica del título.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El proyecto exige traducir el nombre divino como "Yahvé" y no ocultarlo bajo un sustituto. Esto conserva la identidad del nombre del pacto y sigue la política editorial indicada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los Hosts
  - Yahvé de las Huestes
  rationale: '"Ejércitos" traduce צְבָאוֹת de manera transparente para lectores modernos y conserva el carácter soberano y militar del título. "Hosts" o "huestes" son más tradicionales pero menos claros en español actual.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios sustantivos; el consenso de auditoría fue de alta concordancia y no se documentaron objeciones textuales o de sentido.
  spanish_consistency_notes:
  - Se conserva "Yahvé" consistentemente para יְהוָה.
  - '"Ejércitos" se usa para צְבָאוֹת siguiendo la decisión auditada de traducir el título con transparencia semántica.'
  - '"Impíos" mantiene el registro bíblico y evita sustituirlo por una paráfrasis más débil.'
  - La frase "yo actúe" refleja la intervención divina sin añadir contenido causal no expresado explícitamente.
