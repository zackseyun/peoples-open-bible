translation:
  language: es
  text: Entonces los comerciantes y los vendedores de toda clase de mercancías[a][b] pasaban la noche fuera de Jerusalén una o dos veces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se alojaban» o «pernoctaban».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «una vez y dos», un modismo que significa «una o dos veces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּלִינוּ
  english_pob_choice: spent the night
  chosen_spanish: pasaban la noche
  alternatives_spanish:
  - se alojaban
  - pernoctaban
  lexicon: HALOT
  rationale: לון expresa pasar la noche o alojarse. «Pasaban la noche» reproduce el valor temporal de manera natural en español sin sugerir residencia permanente.
- source_word: הָרֹכְלִים
  english_pob_choice: the merchants
  chosen_spanish: los comerciantes
  alternatives_spanish:
  - los mercaderes
  - los vendedores ambulantes
  lexicon: HALOT
  rationale: רֹכֵל designa a un comerciante o traficante. «Comerciantes» es claro y adecuado al contexto comercial del versículo.
- source_word: וּמֹכְרֵי כָל מִמְכָּר
  english_pob_choice: and sellers of every kind of goods
  chosen_spanish: y los vendedores de toda clase de mercancías
  alternatives_spanish:
  - y los vendedores de toda suerte de mercancías
  - y los vendedores de todo tipo de mercancías
  lexicon: HALOT
  rationale: 'La construcción hebrea amplía el alcance comercial: vendedores de cualquier artículo vendible. «Toda clase de mercancías» conserva esa amplitud sin sonar artificial.'
- source_word: מִחוּץ לִירוּשָׁלָם
  english_pob_choice: outside Jerusalem
  chosen_spanish: fuera de Jerusalén
  alternatives_spanish:
  - afuera de Jerusalén
  - en las afueras de Jerusalén
  lexicon: HALOT
  rationale: מִחוּץ indica ubicación exterior a la ciudad. «Fuera de Jerusalén» es la formulación más directa e idiomática en español.
- source_word: פַּעַם וּשְׁתָּיִם
  english_pob_choice: once or twice
  chosen_spanish: una o dos veces
  alternatives_spanish:
  - una vez o dos
  - una o dos ocasiones
  lexicon: HALOT
  rationale: El hebreo usa un modismo que significa «una o dos veces». La equivalencia natural en español mantiene la idea de escasa repetición sin exagerarla.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: mantiene la secuencia comercial, el matiz temporal de לון y el modismo final sin ampliar la frecuencia.'
  spanish_consistency_notes:
  - Se eligió «comerciantes» para רֹכְלִים y «vendedores» para מֹכְרֵי, respetando la duplicación comercial del hebreo.
  - «Fuera de Jerusalén» conserva la localización exterior sin añadir matices geográficos que el hebreo no expresa.
  - «Una o dos veces» traduce el modismo פַּעַם וּשְׁתָּיִם de forma natural y fiel.
