    rationale: Aunque refleja לְךָ, en español bíblico y general 'tu esposa' comunica mejor la relación posesiva sin rigidez innecesaria.
  - severity: medium
    issue: '''una que odias'' suena elíptico y algo coloquial'
    rationale: La elipsis de 'mujer' no es incorrecta, pero reduce claridad y dignidad estilística. 'la mujer que odias' conserva mejor el paralelismo y la legibilidad.
  revised_spanish_text: No desprecies a tu esposa[a], y no confíes en la mujer que odias.
