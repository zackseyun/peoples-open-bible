translation:
  language: es
  text: Él bendecirá a los que temen a Yahvé[a], a los pequeños junto con los grandes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los más pequeños ... con los grandes»; el hebreo contrapone grupos menores y mayores en sentido amplio, probablemente incluyendo condición social además de tamaño literal.
    reason: alternative_reading
lexical_decisions:
- source_word: יְבָרֵךְ
  english_pob_choice: He will bless
  chosen_spanish: Él bendecirá
  alternatives_spanish:
  - Que bendiga
  - Él bendice
  lexicon: HALOT
  rationale: El piel imperfecto con Dios como sujeto implícito expresa una acción futura o declarativa de bendición. En español, «bendecirá» conserva bien esa certeza poética sin convertirlo en imperativo o deseo.
- source_word: יִרְאֵי יְהוָה
  english_pob_choice: those who fear Yahweh
  chosen_spanish: los que temen a Yahvé
  alternatives_spanish:
  - los que reverencian a Yahvé
  - los temerosos de Yahvé
  lexicon: HALOT
  rationale: La construcción sustantivada se vierte naturalmente como «los que temen». «Temen» mantiene el peso reverencial y pactual de ירא sin debilitarlo a mera deferencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino. En español, «Yahvé» sigue la convención del proyecto para preservar el nombre de pacto revelado a Israel, en vez de sustituirlo por un título.
- source_word: הַקְּטַנִּים
  english_pob_choice: the small
  chosen_spanish: los pequeños
  alternatives_spanish:
  - los pequeños de menor rango
  - los menores
  - los insignificantes
  lexicon: HALOT
  rationale: El sustantivo adjetival contrasta con «los grandes» y abarca una gama amplia de personas de menor condición o importancia. «Los pequeños» conserva esa amplitud sin restringirlo solo a tamaño físico.
- source_word: עִם
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - al lado de
  lexicon: HALOT
  rationale: «Junto con» expresa inclusión de ambos grupos de manera natural en español y refleja el valor conjuntivo de la preposición, sin perder el paralelismo.
- source_word: הַגְּדֹלִים
  english_pob_choice: the great
  chosen_spanish: los grandes
  alternatives_spanish:
  - los poderosos
  - los prominentes
  - los importantes
  lexicon: HALOT
  rationale: En contraste con «los pequeños», la expresión mantiene la amplitud del hebreo para personas de mayor estatus o importancia. «Los grandes» preserva el paralelismo sin estrechar el sentido.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El verso usa directamente el Tetragrámaton. La lectura española «Yahvé» conserva el nombre propio de pacto y evita la sustitución por un título, en línea con la doctrina del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés de referencia ya estaba marcado como de alta concordancia y sin cambios necesarios en la última revisión. La versión española sigue de cerca esa solución, manteniendo la amplitud semántica de «small/great» y el nombre divino como nombre propio.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo breve y directo del hebreo: bendición + temores de Yahvé + pequeños/grandes.'
  - Se evitó «SEÑOR» para no ocultar el nombre divino donde el hebreo tiene explícitamente יְהוָה.
  - «Los pequeños» y «los grandes» conservan la tensión social amplia indicada por el audit trail, sin imponer una lectura exclusiva de edad o tamaño.
