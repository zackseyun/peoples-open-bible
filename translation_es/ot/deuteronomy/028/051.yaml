base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/028/051.yaml
  text: It will consume the offspring of your livestock and the produce of your land until you are destroyed; it will leave you no grain[a], new wine, or oil, no calves of your herd or lambs of your flock, until it has destroyed you.
  footnotes:
