translation:
  language: es
  text: Y pondrás a los levitas delante de Aarón y delante de sus hijos varones, y los presentarás[a] como ofrenda mecida a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los mecerás como ofrenda mecida a Yahvé». El hebreo usa el verbo ritual de mecer/presentar junto con el sustantivo técnico «ofrenda mecida».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲמַדְתָּ
  english_pob_choice: you shall set
  chosen_spanish: harás que ... se pongan
  alternatives_spanish:
  - los pondrás
  - los colocarás
  - los harás estar
  lexicon: HALOT
  rationale: 'El hiphil de עמד es causativo: hacer que alguien esté de pie o colocar en posición. En español, «harás que ... se pongan» conserva bien la idea de poner en posición para una acción ritual sin sonar demasiado mecánico.'
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Es el nombre tribal/persona colectiva normal en español bíblico y mantiene la referencia al grupo sacerdotal-levítico.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» expresa claramente la disposición espacial/ritual frente a Aarón y sus hijos, con estilo natural en español.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: N/A (nombre propio)
  rationale: Se usa la forma castellana usual del nombre propio bíblico.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos», en español «hijos» comunica bien la referencia a los descendientes masculinos de Aarón en este contexto sacerdotal. Se conserva la correspondencia literal sin forzar una glosa adicional en el texto principal.
- source_word: וְהֵנַפְתָּ
  english_pob_choice: you shall present
  chosen_spanish: presentarás
  alternatives_spanish:
  - mecerás
  - ofrecerás
  - harás mecer
  lexicon: HALOT
  rationale: El verbo נוף tiene sentido ritual de mecer/presentar. «Presentarás» recoge la función ceremonial de manera clara en español cuando el objeto son personas; el sentido técnico se sostiene por la mención explícita de תְּנוּפָה.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: N/A (pronombre)
  rationale: Se adapta al régimen verbal español y mantiene la referencia directa a los levitas.
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda de mecimiento
  - como ofrenda presentada
  lexicon: HALOT
  rationale: «Ofrenda mecida» conserva el término técnico de la teología ritual sin usar una expresión demasiado eclesiástica. Además, refleja mejor la imagen del sustantivo תְּנוּפָה que una simple paráfrasis.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» conforme al criterio del proyecto. «A» expresa de forma natural la dirección de la ofrenda/presentación hacia Yahvé en español litúrgico y bíblico.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto establece «Yahvé» como forma principal en español para el Tetragrámaton. Se evita «SEÑOR» para no ocultar el nombre propio de pacto que aparece en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión de la acción ritual con levitas como objeto de תְּנוּפָה
  english_pob_reading: present them as a wave offering
  chosen_spanish_reading: presentarlos como ofrenda mecida
  alternative_spanish_readings:
  - mecerlos como ofrenda mecida
  - ofrecerlos como ofrenda de mecimiento
  rationale: El hebreo combina verbo y sustantivo técnicos de la misma esfera ritual. En español, «presentarlos» evita una imagen corporal torpe sobre personas, pero «ofrenda mecida» conserva la categoría cultual y la tensión lexical entre movimiento ritual y ofrenda formal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: Coincide con la última pasada revisada (sin cambios) y con el veredicto de alta concordancia; no se detectaron revisiones aplicadas en el paquete auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del Tetragrámaton, coherente con las normas del proyecto.
  - Se usa «ofrenda mecida» para תְּנוּפָה, preservando el tecnicismo ritual y la relación con el verbo «presentar».
  - «Levitas» y «Aarón» siguen la terminología bíblica estándar en español, sin introducir equivalentes eclesiásticos modernos.
  - El pronombre objeto se adapta a la sintaxis española («los») sin perder la referencia explícita a los levitas.
