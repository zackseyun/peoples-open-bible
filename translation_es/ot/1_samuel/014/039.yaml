translation:
  language: es
  text: Porque vive Yahvé[a], el que salva a Israel, aun si está en Jonatán, mi hijo, ciertamente morirá». Pero nadie de entre todo el pueblo le respondió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «si está en Jonatán, mi hijo»; el objeto implícito queda sin expresar. El contexto sugiere la culpa o el asunto bajo investigación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  english_pob_choice: as the LORD lives
  chosen_spanish: vive Yahvé
  alternatives_spanish:
  - vive el SEÑOR
  - por la vida de Yahvé
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento basado en la vida de Yahvé. En español, «Porque vive Yahvé» conserva el valor idiomático de juramento y mantiene el nombre divino según la pauta del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el equivalente español definido por el proyecto para el Tetragrámaton, sin sustituirlo por una convención de ocultamiento.
- source_word: הַמּוֹשִׁיעַ אֶת יִשְׂרָאֵל
  english_pob_choice: who saves Israel
  chosen_spanish: el que salva a Israel
  alternatives_spanish:
  - el que libra a Israel
  - el que ha salvado a Israel
  lexicon: HALOT
  rationale: El participio con artículo funciona como descripción atributiva de Yahvé. «El que salva» preserva el sentido durativo/caracterizador mejor que una forma pasada.
- source_word: כִּי אִם
  english_pob_choice: even if
  chosen_spanish: si
  alternatives_spanish:
  - aun si
  - aunque
  lexicon: HALOT
  rationale: En este juramento la construcción introduce una posibilidad extrema. En español, la estructura breve «si está en...» resulta natural y no añade interpretación que el contexto ya sugiere.
- source_word: יֶשְׁנוֹ בְּיוֹנָתָן בְּנִי
  english_pob_choice: it is in Jonathan my son
  chosen_spanish: está en Jonatán, mi hijo
  alternatives_spanish:
  - se halla en Jonatán, mi hijo
  - está en Jonatán, mi hijo la culpa
  lexicon: HALOT
  rationale: El hebreo es elíptico; el objeto implícito queda sin explicitar. «Está en Jonatán, mi hijo» conserva la ambigüedad documentada sin sobreespecificar la culpa o el delito.
- source_word: מוֹת יָמוּת
  english_pob_choice: he shall surely die
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - morirá sin falta
  - seguramente morirá
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la certeza/solemnidad. «Ciertamente morirá» comunica esa fuerza judicial con naturalidad en español.
- source_word: וְאֵין עֹנֵהוּ
  english_pob_choice: But not one ... answered him
  chosen_spanish: Pero no hubo quien le respondiera
  alternatives_spanish:
  - Y nadie le respondió
  - Pero nadie le respondió
  lexicon: HALOT
  rationale: La cláusula reporta el silencio del pueblo ante Saúl. «No hubo quien le respondiera» reproduce bien el valor distributivo/negativo de la expresión hebrea.
- source_word: מִכָּל הָעָם
  english_pob_choice: of all the people
  chosen_spanish: de entre todo el pueblo
  alternatives_spanish:
  - entre todo el pueblo
  - de todo el pueblo
  lexicon: HALOT
  rationale: La preposición partitiva marca que ninguno respondió de todo el conjunto. «De entre todo el pueblo» expresa mejor el valor distributivo que un simple «de todo el pueblo».
theological_decisions:
- issue: Nombre divino en el juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino conforme al estándar del proyecto y se evita la máscara tradicional en mayúsculas. Esto mantiene la transparencia con el hebreo fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad del objeto implícito en la cláusula condicional
  english_pob_reading: even if it is in Jonathan my son
  chosen_spanish_reading: si está en Jonatán, mi hijo
  alternative_spanish_readings:
  - si la culpa está en Jonatán, mi hijo
  - aun si el delito está en Jonatán, mi hijo
  rationale: El hebreo no explicita el referente; el contexto sugiere la cuestión bajo investigación. La traducción española conserva esa tensión sin cerrarla indebidamente.
  doctrine_reference: Principio de transparencia textual y no sobreespecificación del objeto implícito
- issue: Fórmula de juicio seguro
  english_pob_reading: he shall surely die
  chosen_spanish_reading: ciertamente morirá
  alternative_spanish_readings:
  - morirá sin falta
  - sin duda morirá
  rationale: La intensificación hebrea expresa certeza solemne, no solo probabilidad. «Ciertamente morirá» preserva el peso jurídico y oracular del enunciado.
  doctrine_reference: Principio de equivalencia formal/funcional para infinitivo absoluto + imperfecto
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios respecto del estado previo; esta propuesta mantiene la misma lectura global, con ajuste natural del español para conservar el juramento, la elipsis hebrea y el cierre distributivo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al criterio del proyecto.
  - Se preserva la elipsis de יֶשְׁנוֹ בְּיוֹנָתָן בְּנִי sin introducir 'culpa' en el texto principal.
  - La intensificación de מוֹת יָמוּת se vierte con 'ciertamente' para evitar una paráfrasis más larga.
  - '''No hubo quien le respondiera'' conserva el silencio colectivo y la partitivo de ''de entre todo el pueblo''.'
