translation:
  language: es
  text: Sé favorable a nosotros[a], Yahvé; sé favorable a nosotros, porque estamos hartos de desprecio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ten compasión de nosotros». El verbo hebreo puede expresar favor, gracia o misericordia; se eligió «sé favorable» para conservar mejor el sentido central de חנן.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «porque mucho nos hemos saciado de desprecio»; es un giro idiomático que comunica: «estamos hartos de desprecio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנוּ
  english_pob_choice: Be gracious to us
  chosen_spanish: Ten compasión de nosotros
  alternatives_spanish:
  - Sé favorable para con nosotros
  - Ten gracia de nosotros
  - Mira con favor a nosotros
  lexicon: HALOT
  rationale: El verbo חנן puede abarcar gracia, favor o misericordia. En español, «ten compasión de nosotros» comunica una súplica natural y solemne, sin volverla mecánicamente literal ni perder el tono de petición por favor/favor divino. Se evita «gracia» como sustantivo porque aquí la forma verbal pide una expresión verbal idiomática.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al estándar del proyecto, en lugar de sustituirlo por un título. La forma es reconocible y más usual en español bíblico que una transliteración más pesada.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la súplica. «Porque» expresa bien la relación causal y suena natural en español bíblico contemporáneo.
- source_word: רַב
  english_pob_choice: more than enough
  chosen_spanish: hartos
  alternatives_spanish:
  - saciados
  - llenos en gran manera
  - más que llenos
  lexicon: HALOT
  rationale: El adverbio intensifica la idea de saturación del objeto «desprecio». En español, «hartos» reproduce la noción idiomática de exceso con buena fluidez, manteniendo la carga negativa del texto.
- source_word: שָׂבַעְנוּ
  english_pob_choice: we have had
  chosen_spanish: estamos hartos
  alternatives_spanish:
  - hemos quedado llenos
  - hemos sido saciados
  - tenemos suficiente
  lexicon: HALOT
  rationale: Aunque el hebreo expresa literalmente estar saciados/llenos, el contexto negativo exige una equivalencia idiomática en español. «Estamos hartos» conserva el sentido experiencial de saturación excesiva sin sonar forzado.
- source_word: בּוּז
  english_pob_choice: contempt
  chosen_spanish: desprecio
  alternatives_spanish:
  - contempto
  - escarnio
  - burla
  lexicon: HALOT
  rationale: El sustantivo denota trato despectivo, desdén o desprecio. «Desprecio» es claro, digno y suficientemente amplio para abarcar la humillación implícita en el verso.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: Se mantiene la decisión confesional y auditada del POB de no ocultar el nombre divino tras un título. «Yahvé» preserva el referente personal del Tetragrámaton y es idiomático en español bíblico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se conserva la repetición enfática del verbo en dos miembros paralelos, el nombre divino no sustituido, y la metáfora de saciedad convertida en un equivalente idiomático español sin perder la intensidad negativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Ten compasión de nosotros» refleja la fuerza verbal de חנן con un equivalente natural en español, sin imponer un matiz penitencial más fuerte que el del hebreo.
  - Se mantiene la repetición poética de la súplica y la cláusula causal con «porque».
  - «Estamos hartos de desprecio» preserva la idea de saturación excesiva sin traducir de forma demasiado literal y extraña.
