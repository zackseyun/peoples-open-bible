review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la mayor parte del hebreo: mantiene el singular colectivo «su corazón», el vocativo a «muro de la hija de Sion», el imperativo de derramar lágrimas, la continuidad «día y noche» y la idea de no darse alivio. Sin embargo, en la cláusula final pierde una imagen importante del original: בַּת עֵינֵךְ no es simplemente «tus ojos», sino un modismo centrado en la pupila/niña del ojo. Además, la nota a sobre la alternativa del singular/plural quedó invertida respecto del inglés auditado.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «oh muro» suena algo acartonado; «Oh, muro...» o «muralla» mejora la legibilidad. La frase final «no cesen tus ojos» suena menos precisa y reduce la fuerza poética. Una formulación como «no repose la niña de tus ojos» conserva mejor la imagen y sigue siendo comprensible con nota.
  glossary_alignment: 'Hay un problema de alineación terminológica: el borrador usa «Yahvé» para אֲדֹנָי. La política dada para «Yahvé» aplica a יהוה, no automáticamente a אֲדֹנָי. Aquí el hebreo dice אֲדֹנָי, así que debe traducirse «el Señor». El resto de las decisiones terminológicas principales son aceptables.'
  issues:
  - severity: high
    issue: אֲדֹנָי fue traducido como «Yahvé»
    rationale: El texto fuente tiene אֲדֹנָי, no יהוה. Según la evidencia y el rastro inglés POB, corresponde «el Señor», no el nombre divino «Yahvé».
  - severity: high
    issue: בַּת עֵינֵךְ fue reducido a «tus ojos»
    rationale: Esto elimina la imagen idiomática del original y la decisión léxica auditada. Debe preservarse al menos con una forma más cercana, apoyada por nota si hace falta.
  - severity: medium
    issue: La nota [a] presenta mal la alternativa
    rationale: El texto principal ya dice «Su corazón», pero la nota dice «O “su corazón”». La alternativa correcta es «Sus corazones», como en el audit trail inglés.
  - severity: low
    issue: Puntuación y vocativo mejorables
    rationale: '«oh muro» puede ajustarse a una puntuación española más natural: «Oh, muro de la hija de Sion: ...».'
