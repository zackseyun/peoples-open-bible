    text: Or 'If it pleases the king.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that it may not be altered' or 'so that it may not be transgressed.' The Hebrew idiom refers to the decree's fixed legal force.
    reason: lexical_alternative
  - marker: c
    text: Literally 'her royalty' or 'her queenship.'
    reason: lexical_alternative
