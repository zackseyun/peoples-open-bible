translation:
  language: es
  text: No trames[a] violencia contra un hermano, y lo mismo contra un amigo y compañero juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «No ares falsedad contra tu hermano», es decir, no maquines engaño contra él.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּחֲרוֹשׁ
  english_pob_choice: devise
  chosen_spanish: trames
  alternatives_spanish:
  - maquines
  - planees
  - conspires
  lexicon: HALOT
  rationale: El hebreo usa una metáfora agrícola ('arar') para una acción intencional de maldad. En español, 'tramar' conserva el sentido de planear con intención dañina y mantiene el valor figurado sin sonar forzado. 'Maquinar' también sería posible, pero 'tramar' encaja mejor con el paralelismo y la advertencia moral.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - daño
  - injusticia
  - agravio
  lexicon: HALOT
  rationale: '''Violencia'' refleja de manera directa el sustantivo hebreo y preserva la fuerza de una acción injuriosa o abusiva. La alternativa griega ''ψεῦδος'' sugiere una lectura distinta, pero el testimonio hebreo es el primario y debe guiar el texto principal.'
- source_word: עַל אָח
  english_pob_choice: against a brother
  chosen_spanish: contra un hermano
  alternatives_spanish:
  - contra tu hermano
  - contra un pariente
  - contra un hermano tuyo
  lexicon: HALOT
  rationale: '''Hermano'' mantiene la forma breve y representativa del hebreo אָח, que puede abarcar a un miembro cercano de la comunidad además del hermano literal. No se añadió ''tu'' porque el imperativo español ya implica destinatario directo y el hebreo no lo exige expresamente.'
- source_word: רֵעַ
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - prójimo
  - compañero
  - vecino
  lexicon: HALOT
  rationale: '''Amigo'' es la forma más natural y comunicativa en español para רֵעַ en este paralelismo relacional. Se evita ''prójimo'' porque en español introduce un matiz más técnico o eclesiástico que no está exigido por el hebreo.'
- source_word: חָבֵר
  english_pob_choice: companion
  chosen_spanish: compañero
  alternatives_spanish:
  - asociado
  - camarada
  - amigo
  lexicon: HALOT
  rationale: '''Compañero'' conserva la cercanía semántica pero distingue este segundo término de רֵעַ, evitando la nivelación de dos palabras afines del hebreo. En español, la pareja ''amigo y compañero'' reproduce bien el doble alcance social del verso.'
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: igualmente
  alternatives_spanish:
  - juntos
  - también
  - de la misma manera
  lexicon: HALOT
  rationale: 'Aunque el hebreo literalmente dice ''juntos'', aquí funciona de manera adverbial para intensificar el segundo miembro del paralelismo: ''haz lo mismo''. ''Igualmente'' transmite ese valor y suena natural en español. Se mantiene, no obstante, la estructura coordinada del hebreo en la frase completa.'
theological_decisions:
- issue: Divergencia textual entre el hebreo ('violencia') y el griego ('falsehood') en la primera prohibición
  english_pob_reading: 'The main text follows the Hebrew primary witness: ''Do not devise violence against a brother.'' The Greek alternative is preserved in a footnote as a divergent reading.'
  chosen_spanish_reading: No trames violencia contra un hermano.
  alternative_spanish_readings:
  - No trames falsedad contra tu hermano.
  - No maquinés engaño contra tu hermano.
  - No planees mentira contra tu hermano.
  rationale: 'Dado que el hebreo conservado es de alta confianza y es el testimonio principal para Sirácides, el texto español sigue esa lectura. La divergencia griega no se borra: se conserva como nota para que el lector vea la tensión textual y el posible trasfondo metafórico de ''arar/falsedad''.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md: preserve theological/interpretive tension rather than resolve it silently'
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que prefirió un tono más formal ('devise') y ajustó el segundo miembro a 'and likewise'. En español, 'trames' mantiene esa formalidad con naturalidad, y 'igualmente' refleja el valor adverbial del hebreo sin perder el paralelismo. Se preserva además la tensión textual hebreo-griega mediante la nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton cuando aparezca, pero este versículo no lo contiene.
  - Se evita 'SEÑOR' como sustituto no requerido.
  - '''Hermano'' se mantiene sin posesivo para respetar la generalidad representativa del hebreo.'
  - La coordinación 'amigo y compañero' conserva la duplicación enfática del original.
