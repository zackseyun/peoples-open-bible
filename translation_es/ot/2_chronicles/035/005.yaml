translation:
  language: es
  text: Y pónganse en el lugar santo, según las divisiones de las casas paternas de sus hermanos[a], los hijos del pueblo, y según la división de una casa paterna para los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gente del pueblo»; literalmente, «los hijos del pueblo», para distinguir a los israelitas no levitas de los levitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִמְדוּ
  english_pob_choice: And stand
  chosen_spanish: Y estén
  alternatives_spanish:
  - Y estén de pie
  - Y manténganse
  - Y pónganse de pie
  lexicon: HALOT
  rationale: El imperativo plural de עמד pide una instrucción directa. En español, «estén» conserva la orden en forma natural; se mantiene la conjunción inicial para reflejar el vínculo con el mandato previo.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en el santuario
  - en lo santo
  lexicon: HALOT
  rationale: La expresión es local y cultual. «Lugar santo» preserva el sentido concreto sin forzar una referencia más específica que el hebreo no exige aquí.
- source_word: לִפְלֻגּוֹת
  english_pob_choice: according to the divisions of
  chosen_spanish: según las divisiones de
  alternatives_spanish:
  - de acuerdo con las divisiones de
  - conforme a las divisiones de
  lexicon: HALOT
  rationale: La preposición con el sustantivo expresa ordenamiento o arreglo por grupos. «Según» comunica bien la relación organizativa sin añadir matiz interpretativo.
- source_word: בֵּית הָאָבוֹת
  english_pob_choice: the fathers’ houses
  chosen_spanish: las casas paternas
  alternatives_spanish:
  - las casas de los padres
  - las casas ancestrales
  - los linajes paternos
  lexicon: HALOT
  rationale: Se conserva la estructura genealógica del hebreo. «Casas paternas» es una equivalencia formal comprensible en español bíblico y mantiene la imagen de agrupación familiar/tribal.
- source_word: לַאֲחֵיכֶם
  english_pob_choice: of your brothers
  chosen_spanish: de sus hermanos
  alternatives_spanish:
  - de vuestros hermanos
  - de sus parientes
  - de sus compatriotas
  lexicon: HALOT
  rationale: En el contexto, el posesivo se refiere a los levitas respecto de los demás israelitas. «Sus hermanos» mantiene el lenguaje de parentesco del original sin neutralizarlo.
- source_word: בְּנֵי הָעָם
  english_pob_choice: the sons of the people
  chosen_spanish: los hijos del pueblo
  alternatives_spanish:
  - el pueblo
  - la gente del pueblo
  - los laicos
  lexicon: HALOT
  rationale: La forma literal conserva la distinción entre los no levitas y los levitas. «Hijos del pueblo» deja visible la expresión hebrea y su peso social/covenantal.
- source_word: וַחֲלֻקַּת
  english_pob_choice: and the division of
  chosen_spanish: y según la división de
  alternatives_spanish:
  - y la división de
  - y conforme a la división de
  - y la repartición de
  lexicon: HALOT
  rationale: El hebreo coordina una segunda indicación paralela. Añadir «según» delante de la última frase hace más clara la simetría de los dos arreglos sin apartarse del sentido.
- source_word: בֵּית אָב
  english_pob_choice: a father’s house
  chosen_spanish: una casa paterna
  alternatives_spanish:
  - una casa de padre
  - un linaje paterno
  - una casa ancestral
  lexicon: HALOT
  rationale: El singular aquí funciona como unidad representativa. «Una casa paterna» es fiel y evita una explicación excesiva que no está en el texto.
- source_word: לַלְוִיִּם
  english_pob_choice: for the Levites
  chosen_spanish: para los levitas
  alternatives_spanish:
  - de los levitas
  - a los levitas
  - correspondiente a los levitas
  lexicon: HALOT
  rationale: La preposición marca la porción o asignación correspondiente a los levitas. «Para» funciona naturalmente en español y conserva la relación distributiva.
theological_decisions:
- issue: Distinción social/cultual entre levitas y los demás israelitas
  english_pob_reading: ‘the sons of the people’ distinguishes the non-Levitical Israelites from the Levites
  chosen_spanish_reading: «los hijos del pueblo» mantiene la distinción entre los levitas y los demás israelitas sin suavizarla
  alternative_spanish_readings:
  - «el pueblo»
  - «los laicos»
  - «los demás israelitas»
  rationale: El hebreo expresa una categoría social concreta. La redacción literal conserva la distinción que el contexto sacerdotal/levítico necesita, y evita borrar la oposición interna del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y refleja la revisión inglesa que añadió la segunda aparición de «according to» para hacer más visible el paralelismo; en español se replicó con «según» en ambas cláusulas organizativas.
  spanish_consistency_notes:
  - Se mantuvo «levitas» en minúscula por tratarse de un gentilicio/clase funcional en español bíblico.
  - Se evitó «SEÑOR» y otros reemplazos litúrgicos no presentes en el texto.
  - «Lugar santo» conserva el matiz cultual sin especificar un recinto más concreto que el hebreo no determina.
