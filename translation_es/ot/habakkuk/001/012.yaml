translation:
  language: es
  text: ¿No eres tú desde la antigüedad, Yahvé, mi Dios, mi Santo? No moriremos[a]. Yahvé, para juicio lo has designado, y tú, Roca, lo has establecido para reprensión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una lectura alternativa preservada en algunas tradiciones: «Tú no mueres». El Texto Masorético hebreo dice «No moriremos».'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Are you not
  chosen_spanish: ¿No eres tú
  alternatives_spanish:
  - ¿Acaso no eres tú
  - ¿No es así que tú eres
  lexicon: HALOT
  rationale: La pregunta retórica pide una respuesta afirmativa. En español, «¿No eres tú» conserva bien el tono directo y expectativo sin añadir fuerza innecesaria.
- source_word: מִקֶּדֶם
  english_pob_choice: from of old
  chosen_spanish: desde la antigüedad
  alternatives_spanish:
  - desde tiempos antiguos
  - desde la eternidad
  lexicon: HALOT
  rationale: «Desde la antigüedad» comunica la idea temporal de gran antigüedad sin convertirla automáticamente en una afirmación metafísica más fuerte que la del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino en forma transliterada, conforme al criterio del proyecto y al valor auditado del Tetragrámaton.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: Expresa de forma natural el posesivo de primera persona y conserva el tono de confesión personal del profeta.
- source_word: קְדֹשִׁי
  english_pob_choice: my Holy One
  chosen_spanish: mi Santo
  alternatives_spanish:
  - mi Santo Dios
  - mi Santo Uno
  lexicon: HALOT
  rationale: «Santo» funciona en español como título reverencial de Dios y evita una formulación demasiado pesada. Se conserva la mayúscula por tratarse de un título divino.
- source_word: לֹא נָמוּת
  english_pob_choice: We will not die
  chosen_spanish: No moriremos
  alternatives_spanish:
  - No vamos a morir
  - No pereceremos
  lexicon: HALOT
  rationale: 'La forma verbal hebrea apoya la primera persona plural; por eso se traduce directamente como una confesión de confianza: «No moriremos».'
- source_word: לְמִשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para justicia
  - para sentencia
  lexicon: HALOT
  rationale: «Juicio» conserva el sentido judicial/punitivo del contexto, donde Dios destina al agente para un acto de juzgar.
- source_word: שַׂמְתּוֹ
  english_pob_choice: you have appointed him
  chosen_spanish: lo has puesto
  alternatives_spanish:
  - lo has nombrado
  - lo has designado
  lexicon: HALOT
  rationale: El verbo שׂים admite «poner/colocar»; en español, «lo has puesto» reproduce con naturalidad la idea de asignación divina sin introducir una especificación no explícita. La relación con el objeto directo se entiende por el contexto.
- source_word: צוּר
  english_pob_choice: Rock
  chosen_spanish: Roca
  alternatives_spanish:
  - Peña
  - Roca
  lexicon: HALOT
  rationale: «Roca» mantiene el título divino tradicional y es plenamente inteligible en español, conservando la imagen de firmeza y estabilidad.
- source_word: לְהוֹכִיחַ
  english_pob_choice: for reproof
  chosen_spanish: para reprensión
  alternatives_spanish:
  - para corrección
  - para reproche
  lexicon: HALOT
  rationale: «Reprensión» preserva el matiz disciplinario y judicial de יכח sin reducirlo solamente a castigo. Es una buena equivalencia para el registro bíblico en español.
- source_word: יְסַדְתּוֹ
  english_pob_choice: have established him
  chosen_spanish: lo has establecido
  alternatives_spanish:
  - lo has fundado
  - lo has cimentado
  lexicon: HALOT
  rationale: «Establecido» refleja bien יסד en sentido de fijar o asentar firmemente para un propósito.
theological_decisions:
- issue: Lectura de לֹא נָמוּת
  english_pob_reading: We will not die
  chosen_spanish_reading: No moriremos
  alternative_spanish_readings:
  - Tú no mueres
  rationale: 'Se sigue la vocalización masorética y la lectura directa del hebreo, como hace la traducción inglesa. Se conserva la tensión teológica: el texto afirma la esperanza de que el pueblo no será aniquilado, mientras reconoce que otras tradiciones leen la frase de modo distinto.'
  doctrine_reference: Primacía del texto fuente; preservar lecturas alternativas en nota cuando están atestiguadas
- issue: Título divino en el paralelo final
  english_pob_reading: you, O Rock
  chosen_spanish_reading: y tú, Roca
  alternative_spanish_readings:
  - y tú, oh Roca
  - y tú, Peña
  rationale: Se conserva el vocativo teológico como título de Dios, paralelo al uso de Yahvé al inicio del versículo. «Roca» mantiene la metáfora de estabilidad sin perder naturalidad en español.
  doctrine_reference: Consistencia terminológica para títulos divinos
- issue: Valor de לְהוֹכִיחַ
  english_pob_reading: for reproof
  chosen_spanish_reading: para reprensión
  alternative_spanish_readings:
  - para corrección
  - para reprobación
  rationale: Se mantiene el matiz de confrontación/discipлина sin convertirlo en un término exclusivamente punitivo. Esto deja visible la amplitud semántica del hebreo.
  doctrine_reference: Evitar estrechar indebidamente un campo semántico bíblico
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para eliminar una coma innecesaria tras 'LORD' y confirmar la dirección de la frase vocativa. La versión española refleja esa misma sintaxis de invocación directa sin coma después de Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se tradujo el título divino כְּדוֹשִׁי como «mi Santo» para conservar reverencia y naturalidad.
  - Se respetó la primera persona plural en «No moriremos», con nota para la lectura alternativa atestiguada.
  - Se usó léxico sobrio y publicable, evitando calcos innecesarios pero sin parafrasear el contenido fuente.
