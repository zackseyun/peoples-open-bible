  - severity: low
    issue: Paralelismo animal puede sonar más idiomático con 'rebaños'
    rationale: La fidelidad al hebreo no exige repetir un término menos común; usar 'rebaños de ganado' y 'rebaños de ovejas' preserva el paralelismo y mejora la lectura pública.
  revised_spanish_text: ¡Cómo gimen los animales! Los rebaños de ganado andan confundidos[a], porque no hay pasto para ellos; aun los rebaños de ovejas sufren.
