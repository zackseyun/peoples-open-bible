translation:
  language: es
  text: Pero en cuanto a ti[a], no temas, mi siervo Jacob, declara Yahvé, y no te desalientes, Israel; porque, mira, yo te estoy salvando desde lejos, y a tu descendencia desde la tierra de su cautiverio[b]. Jacob volverá y estará tranquilo y seguro, sin que nadie lo haga temer[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y tú». La frase inicial puede leerse como un giro enfático: «Pero en cuanto a ti»'
    reason: alternative_reading
  - marker: b
    text: 'O: «desde la tierra donde están cautivos»; más ampliamente, «desde la tierra del exilio»'
    reason: alternative_reading
  - marker: c
    text: 'O: «y nadie lo hará temer»'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ti
  alternatives_spanish:
  - Y tú
  - Pero tú
  lexicon: HALOT
  rationale: La partícula con el pronombre independiente marca un giro enfático o contrastivo; 'Pero en cuanto a ti' conserva ese desplazamiento discursivo mejor que un simple 'y tú'.
- source_word: אַל תִּירָא
  english_pob_choice: do not fear
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no te asustes
  lexicon: HALOT
  rationale: Es la prohibición directa y natural para ירא; en español bíblico actual 'no temas' es claro y fiel, sin perder el tono solemne.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: El English POB optó por 'slave' cuando busca fuerza léxica; en español, 'esclavo' preserva esa dureza. Aquí se mantiene el matiz de pertenencia del pacto sin suavizarlo a 'siervo'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente; se conserva 'Yahvé' según la terminología del proyecto, y 'declara' reproduce la fórmula profética solemne.
- source_word: וְאַל תֵּחַת
  english_pob_choice: do not be dismayed
  chosen_spanish: ni te acobardes
  alternatives_spanish:
  - ni te desmayes
  - ni te desalientes
  lexicon: HALOT
  rationale: חתת en nifal puede expresar abatimiento o desmayo por temor. 'No te acobardes' diferencia este verbo del anterior 'no temas' y suena natural en español actual.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: mira, yo
  alternatives_spanish:
  - he aquí que yo
  - ciertamente yo
  lexicon: HALOT
  rationale: La partícula añade inmediatez enfática. 'Mira, yo' conserva el gesto de atención profética sin volver rígida la frase.
- source_word: מוֹשִׁיעֲךָ
  english_pob_choice: I am saving you
  chosen_spanish: yo te estoy salvando
  alternatives_spanish:
  - yo te salvaré
  - yo te voy a salvar
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción segura o inminente; el progresivo 'te estoy salvando' mantiene ese valor mejor que un futuro simple.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - de lejos
  - desde un lugar lejano
  lexicon: HALOT
  rationale: La expresión indica distancia espacial; 'desde lejos' es natural y transparente en español.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: a tu descendencia
  alternatives_spanish:
  - a tu linaje
  - a tus hijos
  lexicon: HALOT
  rationale: La forma colectiva de זרע se transmite bien con 'descendencia', que es clara y mantiene el sentido de continuidad genealógica.
- source_word: מֵאֶרֶץ שִׁבְיָם
  english_pob_choice: from the land of their captivity
  chosen_spanish: desde la tierra de su cautiverio
  alternatives_spanish:
  - desde la tierra donde están cautivos
  - desde la tierra del exilio
  lexicon: HALOT
  rationale: שבי denota cautiverio/cautivos. 'Cautiverio' sigue de cerca la construcción hebrea y evita ampliar el sentido a 'exilio' sin necesidad.
- source_word: וְשָׁב
  english_pob_choice: will return
  chosen_spanish: volverá
  alternatives_spanish:
  - retornará
  - regresará
  lexicon: HALOT
  rationale: שוב aquí expresa restauración por retorno; 'volverá' es directo y natural en español.
- source_word: וְשָׁקַט
  english_pob_choice: be quiet
  chosen_spanish: descansará en quietud
  alternatives_spanish:
  - estará quieto
  - vivirá en paz
  lexicon: HALOT
  rationale: El verbo implica quedar en reposo/quietud. Se amplía mínimamente con 'descansará en quietud' para sonar idiomático sin perder el núcleo semántico.
- source_word: וְשַׁאֲנַן
  english_pob_choice: at ease
  chosen_spanish: vivirá seguro
  alternatives_spanish:
  - estará tranquilo
  - vivirá en sosiego
  lexicon: HALOT
  rationale: El término denota tranquilidad con seguridad estable. 'Vivir seguro' comunica bien el estado de seguridad y calma del contexto.
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: with no one to make him afraid
  chosen_spanish: sin que nadie lo haga temer
  alternatives_spanish:
  - y nadie lo hará temer
  - sin que nadie lo aterrorice
  lexicon: HALOT
  rationale: La forma causativa expresa ausencia de quien infunda miedo. 'Sin que nadie lo haga temer' conserva esa causalidad en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - dice Yahvé
  rationale: Se mantiene el nombre propio divino en español, conforme al estándar del proyecto, en vez de enmascararlo con un título. La fórmula profética se conserva con la solemnidad requerida.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: ¿עַבְדִּי como honorífico o como esclavitud lexical?
  english_pob_reading: my servant
  chosen_spanish_reading: mi esclavo
  alternative_spanish_readings:
  - mi siervo
  rationale: Aquí se sigue la preferencia POB de no suavizar el valor léxico de עבד cuando el contexto no exige un honorífico eufemístico. El término puede sonar fuerte, pero evita perder la tensión lexical documentada.
  doctrine_reference: 'DOCTRINE.md: δοῦλος/עבד — esclavo cuando la fuerza léxica lo pide'
- issue: Construcción participial con הִנְנִי + participio
  english_pob_reading: I am saving you
  chosen_spanish_reading: yo te estoy salvando
  alternative_spanish_readings:
  - yo te salvaré
  - voy a salvarte
  rationale: El participio con הִנְנִי sugiere acción segura o inminente; el presente progresivo refleja mejor esa cercanía que un futuro simple, sin negar el valor futuro implícito.
  doctrine_reference: 'DOCTRINE.md: Aspecto verbal y acción inminente'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo masorético y el audit trail inglés. La traducción inglesa ya había optado por una equivalencia óptima con notas para el matiz participial, el cautiverio y la cláusula final; la versión española conserva esas mismas tensiones semánticas, ajustándolas a un español bíblico moderno y claro.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el paralelismo Jacob/Israel como dos nombres covenantales distintos en la misma línea.
  - '''Esclavo'' se usa de forma deliberada para עַבְדִּי, siguiendo la fuerza léxica documentada.'
  - La cláusula final conserva la ausencia de agente temible con una construcción natural en español.
