  to: En aquel tiempo me fue devuelto[a] el entendimiento, y, para la gloria de mi reino, mi majestad y mi esplendor volvieron a mí. Mis consejeros y mis nobles me buscaron[b], y fui restablecido[c] sobre mi reino, y se me añadió una grandeza extraordinaria.
