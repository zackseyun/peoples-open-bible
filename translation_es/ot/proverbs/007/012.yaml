    rationale: El verbo hebreo תֶאֱרֹב es 3fs y el contexto refiere a la mujer. En español, «acecha» sin «ella» puede sonar truncado o ambiguo al final del verso; «ella acecha» o «ella está al acecho» preserva mejor la referencia.
  - severity: medium
    issue: Nota [a] no reproduce correctamente la alternativa auditada
    rationale: La nota dice «Afuera, ahora en las plazas», pero el inglés preserva una alternativa del tipo «Sometimes outside, sometimes in the plazas». Debe mantener la repetición/alternancia en ambos miembros.
