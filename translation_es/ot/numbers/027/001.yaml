  source_alignment_summary: 'El borrador español sigue bien la estructura genealógica y el sentido general del hebreo: las hijas de Zelofehad se acercan, se preserva la cadena ''hijo de'', la afiliación a los clanes de Manasés hijo de José, y la fórmula de nombramiento de las hijas. También conserva adecuadamente la nota cultural sobre Noa. Sin embargo, hay pequeños desajustes: ''Y estos son'' cambia innecesariamente el marco narrativo frente al hebreo narrativo y al POB inglés (''Y estos eran/fueron''); y la puntuación puede mejorarse para reflejar mejor que ''de los clanes...'' modifica la genealogía en continuidad, no como frase cortada por punto.'
