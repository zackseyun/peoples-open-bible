translation:
  language: es
  text: ¡Maldigan a Meroz[a]!, dijo el ángel de Yahvé; ¡maldigan, sí, maldigan a sus habitantes!, porque no vinieron en ayuda de Yahvé[b], en ayuda de Yahvé contra los poderosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el mensajero de Yahvé'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''en ayuda de Yahvé ... contra los poderosos''; la frase final también puede entenderse como ''entre los poderosos'' o ''con los poderosos guerreros''.'
    reason: alternative_reading
lexical_decisions:
- source_word: א֣וֹרוּ / אֹ֥רוּ / אָר֖וֹר
  english_pob_choice: curse / curse, utterly curse
  chosen_spanish: ¡maldito...! / ¡malditos, sí, malditos...!
  alternatives_spanish:
  - Maldigan
  - Sean maldecidos
  - Sea maldito
  lexicon: HALOT
  rationale: El hebreo usa el imperativo repetido de ארר, con intensificación por el infinitivo absoluto. En español, 'maldito' funciona como imprecación judicial fuerte y la repetición 'malditos, sí, malditos' preserva la fuerza intensiva sin suavizarla a una simple declaración.
- source_word: מֵר֗וֹז
  english_pob_choice: Meroz
  chosen_spanish: Meroz
  alternatives_spanish:
  - Meróz
  lexicon: Nombre propio
  rationale: Es un nombre propio transliterado. Se conserva la forma breve y reconocible 'Meroz' para mantener la publicación clara y la consistencia con el uso bíblico en español.
- source_word: מַלְאַ֣ךְ יְהוָ֔ה
  english_pob_choice: the angel of the LORD
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  lexicon: HALOT
  rationale: 'מַלְאָךְ admite ''ángel'' o ''mensajero''. Como el texto fuente es esta fórmula bíblica, ''el ángel de Yahvé'' conserva la resonancia literaria y la tensión teológica sin resolverla. Se aplica la política del proyecto para YHWH: ''Yahvé''.'
- source_word: יֹשְׁבֶ֑י/הָ
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitaban en ella
  - los moradores de ella
  lexicon: HALOT
  rationale: El participio con sufijo femenino singular señala a los que viven en Meroz. 'Sus habitantes' es natural en español y conserva el sentido colectivo sin añadir elementos interpretativos.
- source_word: כִּ֤י לֹֽא בָ֨אוּ֙
  english_pob_choice: because they did not come
  chosen_spanish: porque no vinieron
  alternatives_spanish:
  - porque no acudieron
  - ya que no llegaron
  lexicon: HALOT
  rationale: La causalidad de כִּי se expresa con 'porque'. 'Vinieron' reproduce el movimiento hacia la ayuda con una forma simple y transparente; 'acudieron' sería posible, pero menos directa.
- source_word: לְ/עֶזְרַ֣ת יְהוָ֔ה
  english_pob_choice: to the help of the LORD
  chosen_spanish: en ayuda de Yahvé
  alternatives_spanish:
  - para ayudar a Yahvé
  - a la ayuda de Yahvé
  lexicon: HALOT
  rationale: La construcción nominal con ל marca orientación hacia la ayuda. En español, 'en ayuda de' reproduce bien la función idiomática sin forzar 'ayudar a Yahvé', que suena menos natural y puede borrar la forma nominal del hebreo.
- source_word: בַּ/גִּבּוֹרִֽים
  english_pob_choice: against the mighty
  chosen_spanish: contra los poderosos
  alternatives_spanish:
  - entre los poderosos
  - con los poderosos
  - contra los guerreros poderosos
  lexicon: HALOT
  rationale: La preposición ב aquí es sintácticamente discutida. El contexto y la revisión inglesa favorecen 'against'. En español, 'contra los poderosos' refleja esa lectura y mantiene la tensión interpretativa, sin expandirla a 'guerreros'.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh / the LORD in the audit trail, with doctrine guidance favoring Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se sigue la guía del proyecto para traducir יְהוָה como 'Yahvé'. Esto preserva el nombre del pacto y evita la convención de máscara litúrgica 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza del 'ángel de Yahvé'
  english_pob_reading: the angel of the LORD without resolving broader theological debates
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  rationale: Se mantiene la ambigüedad teológica del hebreo y del audit trail inglés. 'Ángel' conserva la formulación tradicional del pasaje sin decidir si se trata de un mensajero creado o una manifestación especial de Yahvé.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa, que cambió 'among the mighty' por 'against the mighty'. También conserva la intensificación del segundo imperativo de ארר y la formulación abierta de 'el ángel de Yahvé'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme a la política del proyecto.
  - '''Ángel de Yahvé'' se usa de forma consistente para מַלְאַךְ יְהוָה cuando el contexto no exige ''mensajero''.'
  - '''Contra los poderosos'' refleja la decisión revisada del audit trail inglés y evita una suavización semántica.'
