translation:
  language: es
  text: Geber, hijo de Urí, en la tierra de Galaad, la tierra de Sijón, rey de los amorreos, y de Og, rey de Basán; y él era el único gobernador que estaba en la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que estaba sobre la tierra». El hebreo dice literalmente «que estaba en la tierra», pero algunos entienden la frase en sentido administrativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּבֶר
  english_pob_choice: Geber
  chosen_spanish: Geber
  alternatives_spanish:
  - Géber
  lexicon: HALOT
  rationale: Es nombre propio; se translitera, no se traduce. En español mantengo la misma forma base del audit trail inglés para conservar la identificación del personaje.
- source_word: בֶּן אֻרִי
  english_pob_choice: son of Uri
  chosen_spanish: hijo de Urí
  alternatives_spanish:
  - hijo de Uri
  lexicon: HALOT
  rationale: La construcción patronímica se expresa naturalmente como 'hijo de'. Acentúo Urí para la prosodia española y porque el nombre propio se adapta a la ortografía española sin alterar su identidad.
- source_word: בְּאֶרֶץ גִּלְעָד
  english_pob_choice: in the land of Gilead
  chosen_spanish: en la tierra de Galaad
  alternatives_spanish:
  - en Galaad
  - en la tierra de Gilead
  lexicon: HALOT
  rationale: Conservo 'tierra' para reflejar explícitamente אֶרֶץ, como hace el POB inglés, y uso 'Galaad' por la forma bíblica española más reconocible y estable.
- source_word: אֶרֶץ סִיחוֹן מֶלֶךְ הָאֱמֹרִי וְעֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: the land of Sihon king of the Amorites and of Og king of Bashan
  chosen_spanish: la tierra de Sijón, rey de los amorreos, y de Og, rey de Basán
  alternatives_spanish:
  - la tierra de Sijón, rey del amorreo, y de Og, rey de Basán
  - la tierra de Sijón, rey de los amorreos, y de Og, rey de Basán
  lexicon: HALOT
  rationale: Mantengo la repetición de 'tierra' para respetar la estructura appositiva del hebreo. 'Amorreos' traduce הָאֱמֹרִי como colectivo étnico, y 'Sijón' / 'Basán' siguen la forma española estándar de estos nombres.
- source_word: נְצִיב
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - oficial
  - gobernante regional
  - delegado
  lexicon: HALOT
  rationale: En el contexto administrativo de 1 Reyes 4, נְצִיב designa un funcionario territorial nombrado. 'Gobernador' comunica bien esa función en español contemporáneo sin debilitar la fuerza administrativa.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: único
  alternatives_spanish:
  - uno
  - solo
  lexicon: HALOT
  rationale: 'Sigo la revisión inglesa que clarifica el sentido del verbless Hebrew: no solo ''había uno'', sino que Geber era el único gobernador de esa zona. ''Único'' expresa mejor esa conclusión sin añadir contenido ajeno.'
- source_word: אֲשֶׁר בָּאָרֶץ
  english_pob_choice: who was in the land
  chosen_spanish: que estaba en la tierra
  alternatives_spanish:
  - que estaba en el país
  - que estaba sobre la tierra
  lexicon: HALOT
  rationale: Conservo la lectura más literal de בְּ/בָאָרֶץ, reflejando la ambigüedad señalada por el POB inglés. 'Estaba en la tierra' evita resolver de forma prematura el posible matiz administrativo de 'sobre la tierra'.
theological_decisions:
- issue: 'Ambigüedad de נְצִיב en el cierre del versículo: presencia física versus cargo administrativo'
  english_pob_reading: The Hebrew literally reads 'who was in the land,' but some take the phrase in an administrative sense.
  chosen_spanish_reading: que estaba en la tierra
  alternative_spanish_readings:
  - que estaba sobre la tierra
  - que gobernaba la tierra
  rationale: Sostengo la ambigüedad del hebreo y del audit trail inglés sin imponer la interpretación administrativa como si fuera segura. El contexto del capítulo favorece un cargo regional, pero la frase final queda abierta en español, tal como lo hace el texto fuente.
  doctrine_reference: Ninguno; decisión de ambigüedad lexical y contextual, no doctrinal
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que cambió de una formulación impersonal a 'él era el único gobernador' para reflejar mejor el hebreo sin verbo y aclarar que Geber es el único funcionario de esa región. La versión española adopta esa claridad con 'él era el único gobernador' y mantiene el cierre literal 'que estaba en la tierra' para conservar la tensión interpretativa documentada.
  spanish_consistency_notes:
  - He usado 'tierra' para אֶרֶץ de manera consistente, ya que el versículo repite el término y la estructura appositiva depende de esa repetición.
  - 'He preferido nombres bíblicos españoles estables: Galaad, Sijón, Basán, Urí.'
  - He mantenido 'amorreos' como etnónimo colectivo, en línea con el sentido del hebreo y la tradición bíblica española inteligible.
  - No he sustituido 'gobernador' por 'oficial' o 'delegado' porque el contexto administrativo favorece un término directo y claro en español.
  - La nota al pie preserva la alternativa administrativa sin borrar la lectura literal del hebreo.
