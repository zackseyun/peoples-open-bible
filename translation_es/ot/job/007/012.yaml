translation:
  language: es
  text: ¿Soy yo el mar, o un monstruo marino[a], que pongas guardia[b] sobre mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dragón» o «serpiente» para תַּנִּין, una criatura grande y amenazante, a menudo en imaginería de mar y caos.
    reason: lexical_alternative
  - marker: b
    text: O «me vigiles» o «pongas vigilancia sobre mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָם
  english_pob_choice: Am I the sea
  chosen_spanish: ¿Soy yo el mar?
  alternatives_spanish:
  - ¿Soy yo el océano?
  - ¿Soy yo el mar?
  lexicon: HALOT
  rationale: El hebreo abre con una pregunta retórica que identifica al hablante con el mar, imagen de fuerza caótica. En español, «el mar» es la opción más directa, natural y fiel a la imagen; «océano» suena menos pegado al trasfondo poético hebreo.
- source_word: תַּנִּין
  english_pob_choice: sea monster
  chosen_spanish: monstruo marino
  alternatives_spanish:
  - dragón
  - serpiente
  - monstruo
  lexicon: HALOT
  rationale: תַּנִּין puede referirse a una criatura marina amenazante, un dragón o una serpiente según el contexto. «Monstruo marino» conserva el matiz de criatura grande y temible sin decidir innecesariamente por una imagen más mitológica o más zoológica.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - si
  - o si
  lexicon: HALOT
  rationale: Aquí la partícula funciona de manera disyuntiva en la pareja retórica. En español, «o» refleja mejor la sintaxis y la fuerza de la comparación que «si».
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: El hebreo introduce la cláusula que expresa el resultado o propósito percibido de la comparación. En español, «para que» comunica de forma natural la finalidad/resultado de la vigilancia impuesta sobre Job, sin endurecer el vínculo causal.
- source_word: תָשִׂים
  english_pob_choice: you set
  chosen_spanish: pongas
  alternatives_spanish:
  - places
  - pongan
  - pongas
  lexicon: HALOT
  rationale: El verbo שׂים es «poner/colocar/establecer». En la construcción final española, «pongas» con el sujeto implícito de segunda persona singular preserva la acción de establecer vigilancia sobre Job de manera idiomática.
- source_word: עָלַי
  english_pob_choice: over me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - contra mí
  lexicon: HALOT
  rationale: La preposición עַל con מִשְׁמָר expresa supervisión o restricción dirigida a Job. «Sobre mí» conserva esa relación sin introducir un matiz hostil más fuerte que el del hebreo.
- source_word: מִשְׁמָר
  english_pob_choice: a guard
  chosen_spanish: vigilancia
  alternatives_spanish:
  - custodia
  - guarda
  - vigilancia
  lexicon: HALOT
  rationale: מִשְׁמָר puede significar guardia, custodia o vigilancia. Dado que en español «poner vigilancia sobre mí» reproduce bien la idea de supervisión impuesta, «vigilancia» mantiene el sentido de control continuo y evita forzar una imagen personal de «guardia» donde el hebreo es más abstracto.
theological_decisions:
- issue: Imagen de caos en תַּנִּין
  english_pob_reading: Rendered as 'sea monster' without mythologizing beyond the text
  chosen_spanish_reading: «monstruo marino» sin desarrollar una mitología que el verso no explicita
  alternative_spanish_readings:
  - dragón
  - serpiente
  - monstruo
  rationale: El versículo usa imaginería poética estándar del mar y de una criatura marina amenazante para expresar el lamento de Job. La traducción española debe preservar esa fuerza simbólica sin importar un sistema mitológico más desarrollado que el texto no demanda explícitamente.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica sin resolverla por la tradición de traducción.
translation_notes:
  revision_awareness: El contexto de revisión indica alto acuerdo y ningún cambio pendiente; se mantiene la lectura base del POB inglés, ajustando únicamente la formulación española para que suene natural y conserve la imaginería poética y la ambigüedad léxica documentada.
  spanish_consistency_notes:
  - Se mantiene «mar» para יָם en lugar de «océano», por ser la opción más directa y bíblicamente congruente.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se conserva el tono retórico de una queja poética, sin suavizar la fuerza de la comparación.
  - «Vigilancia» refleja mejor en español la custodia/observación impuesta por מִשְׁמָר en este contexto que una traducción demasiado personal como «guardia».
