  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה = «Yahvé» y אֲדֹנָי = «el Señor», con la distinción preservada. No hay conflicto relevante con otros términos de glosario. La elección «su fruto» es aceptable si se conserva la aclaración en nota; «los hijos que criaron» es una paráfrasis moderada y fiel del sentido de niños tiernamente cuidados.'
  issues:
