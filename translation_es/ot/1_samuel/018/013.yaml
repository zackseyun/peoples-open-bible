translation:
  language: es
  text: Así, Saúl lo apartó de su presencia y lo nombró jefe de mil, y él salía y entraba[a] delante del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «salía y entraba», un modismo para actividad pública o militar regular, posiblemente con el sentido de liderar al pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסִרֵהוּ
  english_pob_choice: removed him
  chosen_spanish: lo apartó
  alternatives_spanish:
  - lo removió
  - lo quitó de en medio
  lexicon: HALOT
  rationale: סוּר en causativo expresa quitar o apartar. «Lo apartó» conserva la acción concreta y suena natural en español, sin añadir una lectura de expulsión definitiva.
- source_word: מֵעִמּוֹ
  english_pob_choice: from his presence
  chosen_spanish: de su presencia
  alternatives_spanish:
  - de estar con él
  - de junto a él
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «de con él», pero en español «de su presencia» mantiene mejor el marco cortesano y relacional que el calco directo.
- source_word: וַיְשִׂמֵהוּ לוֹ
  english_pob_choice: appointed him
  chosen_spanish: lo nombró
  alternatives_spanish:
  - lo puso
  - lo asignó
  lexicon: HALOT
  rationale: שׂוּם con objeto indirecto aquí indica establecer o asignar a un cargo. «Lo nombró» comunica una designación oficial de modo claro y fiel.
- source_word: שַׂר אָלֶף
  english_pob_choice: commander of a thousand
  chosen_spanish: jefe de mil
  alternatives_spanish:
  - comandante de mil
  - capitán de mil
  lexicon: HALOT
  rationale: שַׂר denota un oficial o jefe militar-administrativo. «Jefe de mil» conserva la referencia numérica sin forzar un título militar moderno que el español bíblico no requiere.
- source_word: וַיֵּצֵא וַיָּבֹא
  english_pob_choice: went out and came in
  chosen_spanish: salía y entraba
  alternatives_spanish:
  - iba y venía
  - salía y volvía
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo con un español natural. «Salía y entraba» mantiene el valor de actividad pública o militar regular sin interpretarlo excesivamente.
- source_word: לִפְנֵי הָעָם
  english_pob_choice: before the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - ante el pueblo
  - en presencia del pueblo
  lexicon: HALOT
  rationale: La preposición y la construcción funcionan de forma visible/relacional. «Delante del pueblo» preserva la ambigüedad entre visibilidad y liderazgo sin estrechar el sentido.
translation_notes:
  revision_awareness: 'El texto hebreo y el auditable inglés coinciden en el movimiento narrativo: apartarlo, designarlo para un cargo y describir su actividad pública. La versión española mantiene el idiomatismo final y evita explicitar más de lo que el original afirma.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino.
  - Conservé «mil» sin pluralizar innecesariamente para respetar la unidad numérica del hebreo.
  - Elegí un registro bíblico claro y contemporáneo, sin recurrir a fórmulas eclesiásticas más arcaicas.
