- from: Maldita sea su ira[a], porque es feroz, y su furor, porque es duro. Los dividiré en Jacob y los dispersaré en Israel.
  to: Maldita sea su ira[a], porque es feroz, y su furor, porque es violento. Los dividiré en Jacob y los dispersaré en Israel.
