translation:
  language: es
  text: Entonces extendió la tienda sobre el tabernáculo y puso la cubierta de la tienda sobre él, desde arriba, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּפְרֹשׂ
  english_pob_choice: spread
  chosen_spanish: extendió
  alternatives_spanish:
  - desplegó
  - tendió
  lexicon: HALOT
  rationale: El verbo expresa la acción de extender una cubierta o tela. En español, "extendió" comunica de manera natural esa acción sin añadir la idea de montar una carpa que no está explícita en el hebreo.
- source_word: הָאֹהֶל
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - la tienda de campaña
  - el pabellón
  lexicon: HALOT
  rationale: En este contexto de santuario portátil, "tienda" conserva el sentido básico de אֹהֶל y suena natural en español. Se evita "tienda de campaña" por ser más específico de uso militar/cotidiano moderno y menos sobrio en este pasaje.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario
  lexicon: HALOT
  rationale: מִשְׁכָּן tiene en Éxodo el valor técnico de la estructura sagrada. "Tabernáculo" es el equivalente tradicional y preciso en español bíblico, y preserva la distinción con אֹהֶל y מִכְסֶה.
- source_word: וַיָּשֶׂם
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - situó
  lexicon: HALOT
  rationale: שׂים es un verbo general de colocar. "Puso" es la opción más directa y natural en español, sin introducir matices adicionales.
- source_word: מִכְסֵה הָאֹהֶל
  english_pob_choice: the covering of the tent
  chosen_spanish: la cubierta de la tienda
  alternatives_spanish:
  - la cobertura de la tienda
  - el recubrimiento de la tienda
  lexicon: HALOT
  rationale: מִכְסֶה es una cubierta o recubrimiento protector. "Cubierta" funciona bien en español para mantener la relación entre la tienda y su capa exterior, y evita la pesadez de una construcción demasiado literal.
- source_word: עָלָיו
  english_pob_choice: over it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre eso
  lexicon: HALOT
  rationale: El pronombre remite al tabernáculo/estructura mencionada antes. "Sobre él" mantiene la referencia directa y el paralelismo espacial del hebreo.
- source_word: מִלְמָעְלָה
  english_pob_choice: from above
  chosen_spanish: desde arriba
  alternatives_spanish:
  - por arriba
  - desde lo alto
  lexicon: HALOT
  rationale: La expresión indica dirección descendente desde una posición superior. "Desde arriba" es clara, fiel y natural en español.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - justamente como Yahvé mandó a Moisés
  lexicon: HALOT
  rationale: La fórmula de obediencia se conserva con fidelidad. "Tal como" refleja bien כַּאֲשֶׁר, y "había mandado" preserva el orden temporal implícito en la narración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se mantiene el nombre divino en forma hispánica establecida por el proyecto: "Yahvé". Esto evita la sustitución por un título y conserva la identidad personal del Nombre revelado.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La elección "Yahvé" sigue la convención doctrinal del proyecto en español y preserva el nombre de pacto sin reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se señalan cambios necesarios y el resultado mantiene alta concordancia con el análisis auditado.'
  spanish_consistency_notes:
  - Se preserva la distinción léxica entre "tienda" y "tabernáculo" para reflejar אֹהֶל y מִשְׁכָּן.
  - '"Cubierta" refleja מִכְסֶה sin cargar el texto con terminología técnica innecesaria.'
  - La fórmula final conserva el paralelismo de obediencia característico de Éxodo y el orden narrativo del hebreo.
  - Se usa "Yahvé" de manera consistente con la política del proyecto para יְהוָה.
