translation:
  language: es
  text: Y sus niños[a], de quienes ustedes dijeron que serían botín[b], y sus hijos, que hoy no conocen el bien ni el mal[c], ellos entrarán allá, y yo se la daré, y ellos la poseerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus pequeños' o 'sus dependientes'.
    reason: lexical_alternative
  - marker: b
    text: O 'serían presa' o 'serían despojo'.
    reason: lexical_alternative
  - marker: c
    text: Esta expresión hebrea es un modismo para indicar discernimiento moral inmaduro.
    reason: cultural_note
lexical_decisions:
- source_word: טַפְּכֶם
  english_pob_choice: your little ones
  chosen_spanish: sus niños
  alternatives_spanish:
  - sus pequeños
  - sus hijos pequeños
  - sus dependientes
  lexicon: HALOT
  rationale: טַף designa niños pequeños o dependientes, con énfasis en vulnerabilidad. En español, 'niños' comunica con naturalidad esa idea sin perder la referencia a la generación joven contrasta con los adultos incrédulos.
- source_word: לָבַז יִהְיֶה
  english_pob_choice: would become plunder
  chosen_spanish: serían presa
  alternatives_spanish:
  - serían botín
  - serían despojo
  - llegarían a ser presa
  lexicon: HALOT
  rationale: בַּז se refiere a botín o presa tomada por un enemigo. 'Presa' conserva la fuerza del daño esperado y funciona bien en español; evita un calco rígido y mantiene la amenaza implícita.
- source_word: בְנֵיכֶם
  english_pob_choice: your children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  - sus vástagos
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, el contexto apunta a la generación siguiente en conjunto; 'hijos' es más preciso que 'niños' para esta segunda referencia y mantiene la distinción contextual del versículo.
- source_word: לֹא יָדְעוּ הַיּוֹם טוֹב וָרָע
  english_pob_choice: who today do not know good or evil
  chosen_spanish: que hoy no conocen el bien ni el mal
  alternatives_spanish:
  - que hoy no distinguen el bien del mal
  - que hoy no saben lo bueno y lo malo
  - que hoy no conocen el bien de el mal
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de discernimiento moral no desarrollado. 'No conocen el bien ni el mal' preserva el giro sin imponer una conclusión doctrinal; 'bien y mal' es la forma idiomática natural en español.
- source_word: שָׁמָּה
  english_pob_choice: in there
  chosen_spanish: allá
  alternatives_spanish:
  - allí
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio remite al lugar previamente mencionado. 'Allá' encaja con 'entrarán' y conserva la referencia deíctica al territorio prometido.
- source_word: אֶתְּנֶנָּה
  english_pob_choice: I will give it
  chosen_spanish: se la daré
  alternatives_spanish:
  - la daré
  - la daré a ellos
  - se la entregaré
  lexicon: HALOT
  rationale: 'El hebreo expresa ''la daré'' con referencia al objeto implícito (la tierra) y destinatarios explícitos en el contexto. ''Se la daré'' naturaliza la dativa en español y mantiene el doble referente: el objeto femenino y los beneficiarios.'
- source_word: יִירָשׁוּהָ
  english_pob_choice: they shall possess it
  chosen_spanish: la poseerán
  alternatives_spanish:
  - la heredarán
  - tomarán posesión de ella
  - la heredarán y poseerán
  lexicon: HALOT
  rationale: ירש puede significar heredar o poseer en contexto de tierra prometida. 'Poseerán' conserva la idea de entrar en posesión del territorio sin restringirla solo a la noción de herencia legal.
theological_decisions:
- issue: La frase 'no conocen el bien ni el mal' como indicio de inmadurez moral
  english_pob_reading: Retain the idiom as a statement of immature moral discernment, not a doctrinal claim about innocence or accountability.
  chosen_spanish_reading: Mantener el modismo como señal de falta de discernimiento moral maduro, sin convertirlo en una afirmación doctrinal sobre inocencia o responsabilidad.
  alternative_spanish_readings:
  - una descripción general de la infancia
  - una afirmación de no responsabilidad del pacto
  - una prueba de inocencia moral
  rationale: El hebreo formula una caracterización idiomática de inmadurez. La traducción conserva la tensión textual y no resuelve debates teológicos posteriores que el versículo no decide explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La revisión más reciente corrigió la referencia de 'sons' a 'children' para mayor precisión. En español, se reflejó esa distinción con 'sus niños' para טַפְּכֶם y 'sus hijos' para בְנֵיכֶם, manteniendo la coherencia con el contexto de la generación más joven.
  spanish_consistency_notes:
  - Se mantiene 'allá' para שָׁמָּה con un matiz direccional natural en español.
  - Se usa 'poseerán' para ירשׁ, coherente con la posesión efectiva de la tierra prometida.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una sustitución directa relevante.
  - Se conserva 'bien ni el mal' como modismo bíblico natural en español, sin amplificación doctrinal.
