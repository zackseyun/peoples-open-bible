lexical_decisions:
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Jehosafat
  alternatives_spanish:
  - Josafat
  lexicon: nombre propio
  rationale: Es un nombre propio hebreo; se translitera de forma reconocible en español. Se prefiere «Jehosafat» para conservar la forma cercana al hebreo y al audio/ortografía tradicional de este nombre.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: HALOT
  rationale: Es el marcador genealógico estándar; en español bíblico natural se expresa como «hijo de».
- source_word: פָּרוּחַ
  english_pob_choice: Paruah
  chosen_spanish: Páruaj
  alternatives_spanish:
  - Parúa
  - Paruaj
  lexicon: nombre propio
  rationale: Nombre propio transliterado. Se conserva la forma con acentuación gráfica para facilitar la lectura en español sin alterar el valor onomástico.
- source_word: בְּ/יִשָׂשכָר
  english_pob_choice: in Issachar
  chosen_spanish: en Isacar
  alternatives_spanish:
  - sobre Isacar
  lexicon: HALOT
  rationale: La preposición בְ admite «en»; el contexto administrativo permite inferir territorio o jurisdicción, pero el hebreo no obliga a explicitar «sobre». «En Isacar» mantiene la cercanía formal y la ambigüedad controlada del original.
translation_notes:
  revision_awareness: Se corrige la validación anterior asegurando que el único marcador de nota, [a], aparece exactamente en el texto principal y corresponde a la alternativa lexical documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo la secuencia nominal breve del hebreo, sin añadir verbos ni artículos innecesarios.
  - «Isacar» se usa como forma española estándar del nombre tribal.
  - No se introdujo «Cristo», «SEÑOR» ni otros equivalentes no presentes en el fuente.
