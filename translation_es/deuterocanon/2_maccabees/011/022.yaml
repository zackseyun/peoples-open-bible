translation:
  language: es
  text: 'Y la carta del rey contenía esto[a]: «Rey Antíoco a su hermano Lisias[b], saludos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «contenía así»; idiomáticamente, esto introduce el texto de la carta.
    reason: lexical_alternative
  - marker: b
    text: «Hermano» puede ser un título cortesano de cercanía política más que una afirmación de parentesco literal.
    reason: cultural_note
lexical_decisions:
- source_word: Ἡ ... ἐπιστολή
  english_pob_choice: the ... letter
  chosen_spanish: la carta
  alternatives_spanish:
  - la epístola
  - el documento
  lexicon: LSJ
  rationale: ἐπιστολή designa una carta o mensaje escrito. En español, «carta» es la equivalencia natural y clara para esta fórmula epistolar.
- source_word: περιεῖχεν
  english_pob_choice: contained
  chosen_spanish: contenía
  alternatives_spanish:
  - decía
  - iba así
  - llevaba
  lexicon: LSJ
  rationale: El verbo expresa que el escrito incluía el texto que sigue. «Contenía» mantiene la cercanía al griego y suena natural en español.
- source_word: οὕτως
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - así
  - de esta manera
  - lo siguiente
  lexicon: LSJ
  rationale: Con περιεῖχεν, οὕτως introduce el contenido de la carta. «Esto» funciona bien en español para abrir la cita sin sobreexplicar.
- source_word: Βασιλεὺς Ἀντίοχος
  english_pob_choice: King Antiochus
  chosen_spanish: Rey Antíoco
  alternatives_spanish:
  - Antíoco, rey
  - el rey Antíoco
  lexicon: LSJ
  rationale: El orden título-nombre es una fórmula encabezadora. «Rey Antíoco» reproduce ese patrón de manera natural en español.
- source_word: τῷ ἀδελφῷ
  english_pob_choice: to his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - al hermano
  - a su aliado
  lexicon: LSJ
  rationale: El griego usa ἀδελφός, que puede ser parentesco literal o título cortesano de cercanía política. «Su hermano» conserva la ambigüedad posible en español, como hace la traducción inglesa, sin decidir más de lo que el texto da.
- source_word: Λυσίᾳ
  english_pob_choice: Lysias
  chosen_spanish: Lisias
  alternatives_spanish:
  - Lysias
  lexicon: propio
  rationale: Se emplea la forma hispana habitual del nombre propio, «Lisias», para lectura natural en español.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - salud
  - que te vaya bien
  lexicon: LSJ
  rationale: Es la salutación epistolar convencional del griego. «Saludos» transmite el valor formular sin añadir contenido doctrinal.
translation_notes:
  revision_awareness: 'This draft corrects the earlier validation issue by anchoring both footnotes directly in the Spanish text: [a] on «contenía esto» and [b] on «hermano». The wording follows the Greek epistolary formula closely while remaining idiomatic in Spanish.'
