translation:
  language: ko
  text: 만일 우리가 우리의 죄들을 고백하면, 그분은 신실하시고 의로우셔서 우리의 죄들을 용서하시고 우리를 모든 불의에서 깨끗하게 하실 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁμολογῶμεν
  english_pob_choice: confess
  chosen_korean: 고백하면
  alternatives_korean:
  - 시인하면
  - 자백하면
  lexicon: BDAG
  rationale: ὁμολογέω는 「같은 말을 한다」 — 하나님의 죄 진단에 동의함. 「고백하다」가 한국 교회 전통의 표준 등가어이다.
- source_word: πιστὸς … καὶ δίκαιος
  english_pob_choice: faithful and righteous
  chosen_korean: 신실하시고 의로우셔서
  alternatives_korean:
  - 충성스럽고 의로우셔서
  lexicon: BDAG
  rationale: 두 속성 모두 언약적. 「신실」은 πίστις 계열로 약속을 지키시는 분, 「의」는 정직한 판결의 함의를 살린다.
