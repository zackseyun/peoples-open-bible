    rationale: La nota sobre el singular pronominal debe acompañar 'Su reino será un reino eterno', mientras la nota sobre el posible matiz de adoración debe ir anclada en 'le servirán'. El texto actual pone [c] solo tras 'servirán' pero deja [b] sin reflejar la doble documentación inglesa asociada al segundo hemistiquio.
  - severity: low
    issue: '''Bajo todos los cielos'' resulta menos natural en español que ''bajo todo el cielo''.'
    rationale: Aunque es defendible como calco del modismo, en español eclesial y bíblico 'bajo todo el cielo' comunica mejor el alcance universal sin extrañeza innecesaria.
