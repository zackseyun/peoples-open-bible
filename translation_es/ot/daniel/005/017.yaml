revisions:
- from: 'Entonces Daniel respondió y dijo delante del rey: «Que tus dones sean para ti mismo, y da tus regalos a otro. Sin embargo, leeré la escritura para el rey y le daré a conocer la interpretación».'
  to: 'Entonces Daniel respondió y dijo delante del rey: «Que tus dones sean para ti mismo, y da tus recompensas a otro. Sin embargo, leeré el escrito para el rey y le daré a conocer la interpretación».'
  rationale: 'Se ajustan dos términos para reflejar mejor el contexto y la auditoría léxica del POB: «recompensas» transmite con más precisión la idea de compensación real prometida por el rey, y «el escrito» evita la ambigüedad potencial de «la escritura» en español, manteniendo a la vez el referente concreto del texto misterioso en la pared. No se requieren notas al pie.'
