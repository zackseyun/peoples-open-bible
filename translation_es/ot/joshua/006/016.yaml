translation:
  language: es
  text: 'Y aconteció a la séptima vez, cuando los sacerdotes tocaron las trompetas[a], que Josué dijo al pueblo: «¡Griten, porque Yahvé les ha dado la ciudad!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שׁוֹפָרוֹת; tradicionalmente, «cuernos de carnero». Aquí se traduce de manera idiomática como «trompetas» para un español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el siguiente evento en secuencia. «Aconteció» conserva ese valor discursivo con un registro bíblico claro y natural en español.
- source_word: בַּפַּעַם הַשְּׁבִיעִית
  english_pob_choice: at the seventh time
  chosen_spanish: en la séptima vez
  alternatives_spanish:
  - en la séptima ocasión
  - a la séptima vez
  lexicon: HALOT
  rationale: פַּעַם puede referirse a una ocasión o repetición. En este contexto de acciones repetidas, «en la séptima vez» comunica la cuenta de la secuencia sin agregar interpretación.
- source_word: תָּקְעוּ
  english_pob_choice: blew
  chosen_spanish: tocaron
  alternatives_spanish:
  - soplaron
  - hicieron sonar
  lexicon: HALOT
  rationale: Con שׁוֹפָר, el español bíblico natural suele decir que los sacerdotes «tocaron» el instrumento. «Hicieron sonar» también sería fiel, pero menos conciso.
- source_word: בַּשּׁוֹפָרוֹת
  english_pob_choice: trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - los cuernos
  - los shofares
  lexicon: HALOT
  rationale: El hebreo nombra específicamente שׁוֹפָר, pero el contexto narrativo en español se expresa con naturalidad mediante «trompetas», como en el audit trail en inglés. Se conserva la referencia instrumental sin cargar el texto principal con una glosa técnica.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - habló
  lexicon: HALOT
  rationale: Renderiza la introducción del discurso de forma directa y estándar en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo reunido
  - a la gente
  lexicon: HALOT
  rationale: El sustantivo colectivo se mantiene como «pueblo», siguiendo el uso bíblico y la referencia comunitaria del relato.
- source_word: הָרִיעוּ
  english_pob_choice: Shout
  chosen_spanish: ¡griten!
  alternatives_spanish:
  - ¡den un grito!
  - ¡prorrumpan en gritos!
  lexicon: HALOT
  rationale: El imperativo pide un clamor fuerte. «¡Griten!» es natural en español y conserva el sentido de elevar un grito colectivo sin añadir «de guerra» que el hebreo no explicita.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» es la equivalencia más clara y directa en español.
- source_word: נָתַן
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - les ha entregado
  - les ha concedido
  lexicon: HALOT
  rationale: El perfecto expresa una acción presentada como ya realizada desde la perspectiva de la promesa divina. «Ha dado» mantiene la sobriedad del original; «ha entregado» sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton como «Yahvé», preservando el nombre propio divino en el texto principal en lugar de reemplazarlo por un título.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Mantiene la referencia definida al objeto concreto del relato. En contexto se entiende como Jericó, pero el hebreo dice simplemente «la ciudad».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino. El español del proyecto lo vierte como «Yahvé» para conservar la distinción entre el nombre revelado y un título como «Señor», manteniendo la transparencia auditiva del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail en inglés no muestra revisiones aplicadas y el control de revisión más reciente indica que no hubo cambios necesarios; la versión española sigue esa lectura estable, preservando el paralelismo narrativo y la decisión léxica sobre שׁוֹפָרוֹת y el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se usa «pueblo» para הָעָם y «ciudad» para הָעִיר, respetando la concreción del relato sin explicitar Jericó en el texto.
  - El imperativo «¡griten!» conserva la fuerza exhortativa sin añadir un matiz técnico como «guerra» que no está en el hebreo.
