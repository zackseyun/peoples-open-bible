review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la mayor parte del hebreo: agencia instrumental («Por mano de tus mensajeros»), jactancia militar («Con mis muchos carros… yo mismo he subido»), geografía hiperbólica del Líbano, y la secuencia verbal futura («cortaré… entraré»). También conserva adecuadamente la imagen de los cedros y la conífera selecta, con nota para la incertidumbre botánica. Sin embargo, falla en un punto fuente-teológico importante: אֲדֹנָי aquí es título, no el tetragrámaton, y el inglés POB lo documenta expresamente como «the Lord». Por eso «Yahvé» no preserva la distinción del texto fuente en este versículo.'
  spanish_quality_summary: El español es generalmente claro y digno. «Por mano de tus mensajeros» funciona, aunque algo literal; es aceptable. «Rincones más remotos» suena natural. «Bosque-jardín» comunica la imagen, aunque con leve extrañeza poética tolerable. El principal ajuste de calidad/precisión es reemplazar «Yahvé» por «el Señor». Además, la nota actual está anclada en el referente divino, pero en realidad explica el verbo חֵרַפְתָּ; conviene moverla a «insultado[a]».
  glossary_alignment: Cumple en general con la terminología del proyecto, excepto en el tratamiento de אֲדֹנָי. La política del proyecto pide «Yahvé» para יהוה / YHWH, pero aquí la fuente no tiene YHWH sino אֲדֹנָי, de modo que debe traducirse «el Señor». «Mensajeros», «cipreses», «cedros» y el resto están bien alineados. La nota botánica del inglés POB debería preservarse preferentemente en español, ya que el inglés la conserva por incertidumbre léxica.
  issues:
  - severity: high
    issue: Se tradujo אֲדֹנָי como «Yahvé».
    rationale: El texto fuente usa אֲדֹנָי, no יהוה. El propio rastro de auditoría inglés subraya esta distinción teológica y léxica. «Yahvé» borra una diferencia que el proyecto exige preservar cuando la fuente la marca.
  - severity: medium
    issue: La nota [a] está anclada en «Yahvé» pero comenta el verbo «has insultado».
    rationale: Los marcadores deben aparecer en la palabra o frase relevante. La nota propuesta trata alternativas para חֵרַפְתָּ, por lo que debe anclarse en «insultado[a]» o equivalente.
  - severity: medium
    issue: No se preservó la nota léxica sobre la incertidumbre de בְּרֹשׁ.
    rationale: El inglés POB mantiene una nota explícita («Or 'its finest firs'»). Dado que el español usa «cipreses», conviene conservar la alternativa «abetos» o similar en nota para reflejar la incertidumbre botánica documentada.
  revised_spanish_text: 'Por mano de tus mensajeros has insultado[a] al Señor, y has dicho: «Con mis muchos carros yo mismo he subido a las alturas de los montes, a los rincones más remotos del Líbano; y cortaré sus altos cedros, sus escogidos cipreses[b], y entraré en su posada más lejana, en su bosque-jardín».'
  revised_footnotes:
