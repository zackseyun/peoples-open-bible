translation:
  language: es
  text: El necio desprecia la disciplina de su padre, pero el que guarda la reprensión[a] se vuelve prudente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pero el que guarda/observa la reprensión se vuelve prudente». El verbo hebreo tras «guarda» puede significar también «observar» o «retener»; el verbo final puede entenderse como «ser prudente» o «mostrarse sagaz».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱוִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el tonto
  - el insensato
  lexicon: HALOT
  rationale: En Proverbios, el término describe a una persona moralmente insensata, no solo poco inteligente. «Necio» conserva el tono sapiencial y la fuerza categórica del contraste.
- source_word: יִנְאַץ
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - rechaza con desdén
  - desestima
  lexicon: HALOT
  rationale: El verbo expresa un rechazo desdeñoso y despectivo. «Desprecia» reproduce bien ese matiz de desprecio activo.
- source_word: מוּסַר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrección
  - instrucción
  lexicon: HALOT
  rationale: En el contexto sapiencial, el término incluye formación correctiva además de enseñanza. «Disciplina» es la forma más natural en español para ese campo semántico.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: de su padre
  alternatives_spanish:
  - de su progenitor
  - de su padre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su padre»; se conserva la referencia masculina explícita sin neutralizarla.
- source_word: וְשֹׁמֵר
  english_pob_choice: whoever heeds
  chosen_spanish: el que guarda
  alternatives_spanish:
  - quien observa
  - quien atiende a
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «el que guarda/observa». En español, «guardar» mantiene esa imagen de retener y dar valor a la reprensión, aunque el contexto también permite el sentido funcional de heed.
- source_word: תּוֹכַחַת
  english_pob_choice: reproof
  chosen_spanish: la reprensión
  alternatives_spanish:
  - la corrección
  - el reproche
  lexicon: HALOT
  rationale: Este sustantivo denota corrección verbal o reprensión. «Reprensión» mantiene el registro sapiencial y la relación con el acto de corregir.
- source_word: יַעְרִם
  english_pob_choice: is prudent
  chosen_spanish: se vuelve prudente
  alternatives_spanish:
  - obra prudentemente
  - muestra prudencia
  lexicon: HALOT
  rationale: El verbo puede expresar llegar a ser prudente o mostrarse astuto/discreto. «Se vuelve prudente» conserva el sentido resultante sin insinuar astucia engañosa.
theological_decisions:
- issue: Lenguaje parental masculino explícito
  english_pob_reading: his father's
  chosen_spanish_reading: de su padre
  alternative_spanish_readings:
  - de su progenitor
  - de su padre o madre
  rationale: El hebreo nombra específicamente al padre; se mantiene esa precisión conforme a la política de fidelidad formal y a la lectura auditada del POB inglés.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: 'La revisión auditada del POB inglés quedó sin cambios (latest_revision_pass: unchanged = true). La versión española sigue el mismo sentido aprobado y refleja la misma tensión léxica en torno a וְשֹׁמֵר y יַעְרִם.'
  spanish_consistency_notes:
  - Se usa «necio» para אֱוִיל por su valor sapiencial fijo en español.
  - Se conserva «padre» en singular, sin neutralización.
  - «Disciplina» y «reprensión» mantienen la pareja correctiva del proverbio.
  - La nota [a] recoge la alternativa verbal hebrea sin duplicar el marcador.
