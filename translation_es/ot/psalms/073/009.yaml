    text: 'O: «Ponen su boca en los cielos». El hebreo dice literalmente «en», pero aquí probablemente describe habla desafiante dirigida contra el cielo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su lengua camina por la tierra». El verbo hebreo es literalmente «camina/va»; aquí se expresa de forma más vívida para reflejar el tono arrogante del verso.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto principal para seguir la decisión semántica principal ya documentada en el POB inglés: ''contra los cielos'' comunica mejor el desafío implícito que el literal ''en los cielos'', que pasa a nota. También se cambia ''recorre'' por ''se pasea por'' para conservar la idea de movimiento verbal y añadir el matiz de insolencia contextual sin llegar a una expresión demasiado coloquial o sobrecargada. Las notas se simplifican para que sirvan al lector en español con enfoque textual, no metatraductológico.'
