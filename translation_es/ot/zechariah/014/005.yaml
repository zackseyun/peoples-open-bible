translation:
  language: es
  text: Y huirán por el valle de mis montes[a], porque el valle de los montes llegará hasta Azal. Sí, huirán como huyeron de delante del terremoto en los días de Uzías, rey de Judá. Entonces Yahvé mi Dios vendrá, y todos los santos[b] con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra lectura: «con ustedes».'
    reason: textual_variant
  - marker: b
    text: 'El hebreo dice «los santos» o «los santos/consagrados»; puede referirse a asistentes celestiales. Algunos entienden: «los ángeles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנַסְתֶּם
  english_pob_choice: you will flee
  chosen_spanish: huirán
  alternatives_spanish:
  - escaparán
  - se pondrán en fuga
  lexicon: HALOT
  rationale: El verbo נוּס expresa huida real; en español, «huirán» conserva la fuerza y se ajusta al paralelo explícito con la huida anterior por el terremoto.
- source_word: גֵּיא / גֵּי
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - ravina
  - barranco
  lexicon: HALOT
  rationale: «Valle» es el equivalente natural y claro en español para גיא en este contexto topográfico.
- source_word: הָרַי
  english_pob_choice: my mountains
  chosen_spanish: mis montes
  alternatives_spanish:
  - mis montañas
  - los montes
  lexicon: HALOT
  rationale: El sufijo de primera persona singular debe conservarse. «Montes» suena bíblico y natural en español; «mis montañas» también sería posible, pero «montes» refleja mejor el registro.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la razón de la huida: el valle se extenderá hasta Azal.'
- source_word: יַגִּיעַ
  english_pob_choice: will reach
  chosen_spanish: llegará
  alternatives_spanish:
  - se extenderá
  - alcanzará
  lexicon: HALOT
  rationale: En este uso espacial, «llegará» comunica bien la extensión hasta Azal sin forzar el castellano.
- source_word: אָצַל
  english_pob_choice: Azal
  chosen_spanish: Azal
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y debe transliterarse.
- source_word: כַאֲשֶׁר נַסְתֶּם
  english_pob_choice: as you fled
  chosen_spanish: como huyeron
  alternatives_spanish:
  - tal como huyeron
  - así como huyeron
  lexicon: HALOT
  rationale: La comparación repite el mismo verbo y mantiene la referencia histórica. En español, «como huyeron» conserva la relación comparativa sin sobrecargar la frase.
- source_word: מִפְּנֵי הָרַעַשׁ
  english_pob_choice: from before the earthquake
  chosen_spanish: de delante del terremoto
  alternatives_spanish:
  - de la presencia del terremoto
  - ante el terremoto
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «De delante de» conserva el matiz de מִפְּנֵי, y «terremoto» es una elección natural para הָרַעַשׁ.
- source_word: עֻזִּיָּה
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Ozías
  lexicon: HALOT
  rationale: La forma española tradicional y reconocible del nombre propio es «Uzías».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino en vez de sustituirlo por un título.'
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: HALOT
  rationale: El sufijo de primera persona singular se conserva con el posesivo español «mi».
- source_word: כָּל קְדֹשִׁים
  english_pob_choice: all the holy ones
  chosen_spanish: todos los seres santos
  alternatives_spanish:
  - todos los santos
  - todos los santos seres
  lexicon: HALOT
  rationale: «Seres santos» conserva la amplitud semántica de קְדֹשִׁים sin decidir de antemano si se trata de humanos glorificados o seres celestiales.
- source_word: עִמָּךְ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - contigo
  lexicon: HALOT
  rationale: Se adopta la lectura contextual que armoniza con «Yahvé mi Dios vendrá». La variante «contigo» queda reflejada en nota.
theological_decisions:
- issue: Identidad de los קְדֹשִׁים acompañando a Yahvé
  english_pob_reading: all the holy ones
  chosen_spanish_reading: todos los seres santos
  alternative_spanish_readings:
  - todos los santos
  - todos los santos ángeles
  rationale: El hebreo no precisa si se trata de ángeles o de otros seres santos. La traducción principal conserva esa amplitud para no resolver indebidamente la cuestión.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Lectura de עִמָּךְ al final del versículo
  english_pob_reading: with him
  chosen_spanish_reading: con él
  alternative_spanish_readings:
  - contigo
  rationale: En el contexto inmediato, la secuencia «Yahvé mi Dios vendrá» favorece «con él». La variante alterna se mantiene por transparencia textual.
  doctrine_reference: Principio POB de variación textual auditable
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre propio divino del texto hebreo siguiendo la convención establecida del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje se revisó con acuerdo alto entre el texto hebreo, la traducción inglesa auditada y la revisión reciente. No se detectaron cambios de revisión sustantivos; se mantuvieron la lectura principal de huida, el nombre divino Yahvé y la nota textual final sobre עִמָּךְ.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el sufijo posesivo de primera persona en «mis montes» y «mi Dios».
  - Se mantiene la ambigüedad de קְדֹשִׁים con una solución amplia en español.
  - La nota [a] marca la variante textual de עִמָּךְ; la nota [b] aclara la posible amplitud de «seres santos».
  - «Huirán» y «como huyeron» preservan la repetición verbal del hebreo.
