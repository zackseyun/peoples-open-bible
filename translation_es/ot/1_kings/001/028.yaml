translation:
  language: es
  text: 'Entonces el rey David respondió[a] y dijo: «Llamen a Betsabé». Y ella vino ante el rey y estuvo de pie ante el rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contestó». La fórmula narrativa hebrea suele usar «respondió» para introducir el discurso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en fórmulas narrativas introduce el discurso; en español, «respondió» comunica esa función con naturalidad. «Contestó» es posible, pero «respondió» mantiene mejor el registro formal del relato.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - el rey, David
  - David, el rey
  lexicon: HALOT
  rationale: La apposición hebrea se vierte de manera natural como «el rey David», conservando el título real unido al nombre propio.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - manifestó
  lexicon: HALOT
  rationale: אמר es el verbo común de habla; «dijo» es la correspondencia más directa y sobria en español bíblico contemporáneo.
- source_word: קִרְאוּ לִי
  english_pob_choice: Call ... to me
  chosen_spanish: Llamen ... para mí
  alternatives_spanish:
  - Citen ... para mí
  - Llamen ... a mí
  lexicon: HALOT
  rationale: קרא con ל expresa llamar o hacer venir. «Llamen ... para mí» conserva la fuerza de la orden sin forzar un registro excesivamente burocrático.
- source_word: לְבַת שָׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Bathsheba
  lexicon: HALOT
  rationale: Se usa la forma castellana establecida del nombre propio, «Betsabé», que es reconocible y natural en español bíblico.
- source_word: וַתָּבֹא לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: she came before the king
  chosen_spanish: ella vino delante del rey
  alternatives_spanish:
  - ella se presentó ante el rey
  - ella llegó a la presencia del rey
  lexicon: HALOT
  rationale: בוא + לפני indica venir ante la presencia de alguien. «Vino delante del rey» refleja con fidelidad la imagen hebrea y evita añadir matices no explícitos.
- source_word: וַתַּעֲמֹד לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: stood before the king
  chosen_spanish: se quedó de pie delante del rey
  alternatives_spanish:
  - permaneció de pie delante del rey
  - estuvo de pie delante del rey
  lexicon: HALOT
  rationale: עמד significa «estar de pie / ponerse de pie». «Se quedó de pie» comunica la postura resultante con naturalidad, y mantiene la repetición de «delante del rey» para reflejar el énfasis cortesano del hebreo.
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo masorético (WLC) y el archivo auditado en inglés. No se requieren correcciones de sentido respecto de la versión inglesa; la principal adaptación fue hacer natural en español la fórmula de respuesta y la presentación cortesana.
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio en forma castellana establecida: «Betsabé».'
  - Se conserva la repetición de «delante del rey» para reflejar la estructura enfática del hebreo.
  - Se usa puntuación de cita directa en estilo español moderno y registro bíblico digno.
