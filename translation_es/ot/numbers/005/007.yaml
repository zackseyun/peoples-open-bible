revisions:
- from: Entonces confesarán el pecado[a] que han cometido, y él restituirá íntegramente su culpa[b], añadiendo un quinto sobre ello, y lo dará al que fue objeto de su culpa.
  to: Entonces confesarán el pecado que han cometido, y él hará restitución íntegra por su culpa[a], añadiendo un quinto a ello, y lo dará a aquel con quien tenía esa deuda[b].
  rationale: 'Se revisa la línea principal para expresar en español natural el sentido jurídico de וְהֵשִׁיב אֶת אֲשָׁמוֹ בְּרֹאשׁוֹ: no se restituye la culpa misma, sino la restitución íntegra correspondiente a ella. También se reemplaza la expresión poco idiomática «fue objeto de su culpa» por una formulación más clara que todavía conserva el matiz de deuda/responsabilidad frente a la persona agraviada. Se reubican las notas para alinearlas con las ambigüedades léxicas y teológicas más relevantes del expediente inglés.'
  reviewer_model: gpt-5.4
