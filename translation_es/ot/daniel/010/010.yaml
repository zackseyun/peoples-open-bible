review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del hebreo: conserva el marcador discursivo, el indefinido «una mano», el contacto físico de «me tocó» y el detalle anatómico de «las palmas de mis manos». Sin embargo, «me puso sobre mis rodillas» suena poco natural y no expresa bien en español la postura resultante de quedar apoyado en rodillas y manos.'
  spanish_quality_summary: La redacción es generalmente clara y fiel, pero «sobre mis rodillas» resulta forzada en español para una postura corporal. Una formulación más idiomática y exacta es «me hizo ponerme sobre mis rodillas y las palmas de mis manos», que mantiene el sentido causativo y la imagen física completa.
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. Las decisiones léxicas relevantes están bien orientadas: «he aquí», «una mano», «me tocó» y «palmas de mis manos» son adecuadas. La única corrección necesaria es estilístico-semántica en la expresión de וַתְּנִיעֵנִי עַל.'
  issues:
  - severity: medium
    issue: «me puso sobre mis rodillas» es una construcción poco idiomática
    rationale: Aunque intenta reflejar literalmente עַל, en español corporal suena rígida y puede sugerir ubicación imprecisa más que postura resultante. El hebreo describe que Daniel quedó apoyado en rodillas y manos.
  - severity: low
    issue: Se pierde parcialmente el matiz causativo de וַתְּנִיעֵנִי
    rationale: «Me puso» comunica resultado, pero «me hizo ponerme» reproduce mejor que una fuerza externa lo movió hasta esa postura, sin introducir «temblar», ya descartado por la auditoría inglesa.
  revised_spanish_text: Y he aquí, una mano me tocó y me hizo ponerme sobre mis rodillas y las palmas de mis manos.
  revision_rationale: 'Se ajusta la cláusula verbal central para que el español suene natural y conserve mejor el valor causativo del hebreo: la mano no solo lo «pone» de manera estática, sino que lo hace pasar a la postura descrita. Se mantiene la imagen literal de rodillas y palmas, sin añadir el matiz de temblor que la revisión inglesa ya había descartado.'
