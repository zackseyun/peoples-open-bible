translation:
  language: es
  text: Guarden el sábado, porque es santo para ustedes. Cualquiera que lo profane[a] ciertamente será condenado a muerte, porque cualquiera que haga trabajo en ese día[b], esa persona será cortada de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo desacralice».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «será cortada de entre su pueblo», una fórmula legal cuyo modo exacto de sanción no se especifica aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: You shall keep
  chosen_spanish: Guarden
  alternatives_spanish:
  - Deben guardar
  - Observen
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o custodiar. En español, «guardar» mantiene bien el sentido de observancia fiel y el tono imperativo, sin sonar tan rígido como una traducción mecánica ni sustituir innecesariamente el matiz legal.
- source_word: הַשַּׁבָּת
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el Sabbat
  - el día de reposo
  lexicon: HALOT
  rationale: En este contexto, el término designa la institución/día sagrado. «El sábado» es la forma más natural y reconocible en español, mientras que «Sabbat» sería más transliterado y «día de reposo» introduce una glosa interpretativa.
- source_word: קֹדֶשׁ הִוא לָכֶם
  english_pob_choice: it is holy to you
  chosen_spanish: es santo para ustedes
  alternatives_spanish:
  - es santo para vosotros
  - es sagrado para ustedes
  - les es santo
  lexicon: HALOT
  rationale: קֹדֶשׁ expresa santidad o cosa apartada para Dios. «Santo para ustedes» conserva la relación de pertenencia/beneficio del dativo לָכֶם y suena más natural en español bíblico actual que una calca como «les es santo».
- source_word: מְחַלְלֶיהָ
  english_pob_choice: whoever profanes it
  chosen_spanish: Cualquiera que lo profane
  alternatives_spanish:
  - Quien lo profane
  - Sus profanadores
  - Cualquiera que lo desacralice
  lexicon: HALOT
  rationale: חלל en piel significa profanar o desacralizar. «Profane» es el equivalente español más preciso y asentado; «desacralice» es posible pero menos directo y más técnico, mientras que «profanadores» perdería el valor genérico del participio.
- source_word: מוֹת יוּמָת
  english_pob_choice: shall surely be put to death
  chosen_spanish: será ciertamente muerto
  alternatives_spanish:
  - será puesto ciertamente a muerte
  - será sin duda ejecutado
  - morirá ciertamente
  lexicon: HALOT
  rationale: La intensificación hebrea pide una construcción enfática. «Será ciertamente muerto» conserva mejor la fuerza formal y la pasiva judicial del original que «morirá ciertamente», que podría sonar menos específicamente legal. Se mantiene la tensión del texto sin especificar el modo de ejecución.
- source_word: כָּל הָעֹשֶׂה בָהּ מְלָאכָה
  english_pob_choice: whoever does work on it
  chosen_spanish: cualquiera que haga en él alguna obra
  alternatives_spanish:
  - quien haga trabajo en él
  - cualquiera que haga en él trabajo
  - quien haga en él alguna labor
  lexicon: HALOT
  rationale: מְלָאכָה designa trabajo, labor u obra, con frecuencia trabajo de tipo ocupacional o productivo. «Alguna obra» suena natural en español bíblico y preserva el carácter general de la prohibición sin añadir el «cualquier» explícito que el hebreo no repite aquí.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será eliminada
  - será extirpada
  - será excluida
  lexicon: HALOT
  rationale: כרת en fórmulas legales/covenantales se vierte convencionalmente como «ser cortado». En español, «será cortada» conserva ese eco literal y la ambigüedad del juicio, sin decidir si implica muerte, exclusión o una sanción divina específica.
- source_word: הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person
  chosen_spanish: esa persona
  alternatives_spanish:
  - ese alma
  - esa vida
  - ese individuo
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí señala al sujeto culpable, no una entidad doctrinal del ser humano. «Persona» comunica claramente el referente jurídico y evita cargar el texto con una antropología que el verso no desarrolla.
- source_word: מִקֶּרֶב עַמֶּיהָ
  english_pob_choice: from among his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - del medio de su pueblo
  - de en medio de su pueblo
  - de entre sus pueblos
  lexicon: HALOT
  rationale: La fórmula expresa exclusión de la comunidad. «De entre su pueblo» es la manera más natural y fiel de reproducir el giro idiomático en español, manteniendo la formulación legal abierta sin explicar el mecanismo de la sanción.
theological_decisions:
- issue: Sentido de la pena en וְנִכְרְתָה ... מִקֶּרֶב עַמֶּיהָ
  english_pob_reading: Retain the idiom 'shall be cut off from among his people' without specifying whether this means execution, excommunication, childlessness, or divine judgment.
  chosen_spanish_reading: Mantener la fórmula «será cortada de entre su pueblo» sin precisar si se trata de ejecución, exclusión comunitaria, esterilidad o juicio divino.
  alternative_spanish_readings:
  - será excluida de su comunidad
  - será removida por juicio divino
  - será expulsada de entre su pueblo
  rationale: La expresión hebrea es jurídicamente densa y no aclara aquí el mecanismo exacto de la sanción. Conservar la fórmula permite respetar la tensión teológica del texto en lugar de resolverla por adelantado.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Uso de «sábado» para הַשַּׁבָּת
  english_pob_reading: the Sabbath
  chosen_spanish_reading: el sábado
  alternative_spanish_readings:
  - el Sabbat
  - el día de reposo
  rationale: La palabra hebrea designa el día sagrado; en español, «sábado» es la forma más estable y comprensible para lectores de iglesia. «Día de reposo» explica el concepto, pero tiende a interpretarlo más que a nombrarlo.
  doctrine_reference: POB project terminology guidance
- issue: Conservación del sujeto jurídico «esa persona» para הַנֶּפֶשׁ הַהִוא
  english_pob_reading: that person
  chosen_spanish_reading: esa persona
  alternative_spanish_readings:
  - esa alma
  - esa vida
  - ese individuo
  rationale: En este contexto, נֶפֶשׁ funciona como sujeto legal del delito. «Persona» evita convertir el término en una declaración doctrinal sobre el alma humana y conserva la referencia al culpable individual.
  doctrine_reference: Translation philosophy §3 (Preserve lexical/theological tension)
translation_notes:
  revision_awareness: Se revisó el expediente en busca de consistencia con la decisión inglesa y no se detectaron cambios pendientes; la versión española sigue de cerca el trazado lexical y la tensión legal preservada por la POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo «sábado» como equivalente principal de הַשַּׁבָּת, en línea con la decisión inglesa de usar un nombre natural del día sagrado.
  - Se evitó «SEÑOR» o sustitutos para el nombre divino porque este versículo no contiene el Tetragrámaton.
  - Se conservó la ambigüedad legal de וְנִכְרְתָה mediante «será cortada», siguiendo la política POB de no resolver el alcance de la fórmula.
  - Se usó «persona» para נֶפֶשׁ, evitando cargar el texto con una lectura antropológica no explicitada por el hebreo.
