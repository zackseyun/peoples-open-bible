    issue: «Vengan» no es la mejor equivalencia idiomática para לְכוּ en una exhortación inclusiva.
    rationale: Aunque posible, en español «Vengan» suele invitar a otros a acercarse al hablante. Aquí los hablantes se incluyen en la acción («exterminémoslos»), por lo que «Vamos» o «Vamos, ...» representa mejor la propuesta colectiva.
  - severity: low
