translation:
  language: es
  text: Y entablé batalla con él[a], y él y su campamento fueron aplastados por nosotros, y nos sentamos en el trono de su reino;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «y él y su campamento fue aplastado por nosotros»; en español se acomoda la concordancia al sujeto compuesto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆψα ... μάχην
  english_pob_choice: joined battle
  chosen_spanish: entablé batalla
  alternatives_spanish:
  - me uní al combate
  - entablé combate
  - combatí
  lexicon: LSJ
  rationale: 'La expresión griega es idiomática: no solo indica pelear, sino entrar en combate. «Entablé batalla» conserva esa fuerza militar y suena natural en español.'
- source_word: συνετρίβη
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastados
  alternatives_spanish:
  - fue aplastado
  - fueron derrotados
  - fueron quebrantados
  lexicon: LSJ
  rationale: El griego usa un verbo fuerte de trituración/quebrantamiento. En español, «aplastados» mantiene mejor esa intensidad que «derrotados».
- source_word: ἡ παρεμβολὴ αὐτοῦ
  english_pob_choice: his camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su ejército
  - su campamento militar
  - su hueste
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή designa un campamento o fuerza acampada. «Campamento» es el equivalente más directo y no fuerza una lectura más amplia que el texto no exige.
- source_word: ὑφʼ ἡμῶν
  english_pob_choice: by us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - a manos nuestras
  - por nuestras fuerzas
  lexicon: LSJ
  rationale: La frase agente es sencilla; «por nosotros» conserva la voz de primera persona plural sin expansión interpretativa.
- source_word: ἐκαθίσαμεν
  english_pob_choice: we sat
  chosen_spanish: nos sentamos
  alternatives_spanish:
  - tomamos asiento
  - nos sentamos en el trono
  lexicon: LSJ
  rationale: Aunque el contexto implica entronización, el verbo básico es «sentarse». En español, «nos sentamos» respeta el valor literal y el complemento aclara la escena real.
- source_word: ἐπὶ θρόνου βασιλείας αὐτοῦ
  english_pob_choice: on the throne of his kingdom
  chosen_spanish: en el trono de su reino
  alternatives_spanish:
  - sobre el trono de su reino
  - en el trono real de su reino
  lexicon: LSJ
  rationale: Se mantienen θρόνος y βασιλεία de forma transparente. «En el trono de su reino» refleja la imagen de ocupación del poder sin añadir títulos no presentes.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se conservó la primera persona plural del narrador («entablé», «nos sentamos») como en el griego y el texto inglés auditado.
  - No se añadió una paráfrasis de entronización más explícita que el griego; el complemento «en el trono de su reino» ya comunica el sentido.
