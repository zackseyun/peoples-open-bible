revisions:
- from: Porque ustedes no estuvieron allí la primera vez[a], Yahvé nuestro Dios se desató contra nosotros[b], porque no lo buscamos conforme al estatuto.
  to: Porque ustedes no estuvieron allí la primera vez[a], Yahvé nuestro Dios irrumpió contra nosotros[b], porque no lo buscamos conforme a la ordenanza.
  rationale: Se ajusta פָּרַץ a ‘irrumpió contra nosotros’ para conservar mejor el matiz de irrupción súbita de juicio divino sin recurrir a una expresión demasiado coloquial. Se cambia ‘estatuto’ por ‘ordenanza’ para reflejar mejor el valor de כַּמִּשְׁפָּט en este contexto cultual y alinearlo con el audit trail inglés. También se pulen las notas para un español más natural y preciso.
