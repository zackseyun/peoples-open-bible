theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render שׁוּב with explicitly theological 'repent'
  chosen_reading: return
  alternative_readings:
  - repent
  - turn back
  rationale: The verse emphasizes relational return to God alongside abandoning sinful conduct and thoughts. 'Return' preserves the Hebrew metaphor and theological breadth without narrowing it to one doctrinal formulation of repentance.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
