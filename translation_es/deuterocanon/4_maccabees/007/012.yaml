translation:
  language: es
  text: Así, Eleazar[a], descendiente de Aarón, aunque era quemado por el fuego, no cambió su determinación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «el aarónida»; es decir, uno perteneciente a la línea de Aarón.
    reason: lexical_alternative
  - marker: b
    text: O «su razón» / «su propósito racional». El griego puede denotar una determinación razonada, un tema importante en 4 Macabeos.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: LSJ
  rationale: Introduce la conclusión o continuidad del relato anterior. «Así» mantiene la conexión retórica de manera natural en español sin añadir matiz temporal excesivo.
- source_word: ὁ Ἀαρωνίδης
  english_pob_choice: the descendant of Aaron
  chosen_spanish: descendiente de Aarón
  alternatives_spanish:
  - aarónida
  - de la línea de Aarón
  - aarónico
  lexicon: LSJ
  rationale: El griego indica pertenencia a la línea de Aarón. En español, «descendiente de Aarón» comunica con claridad la relación genealógica sin depender de un tecnicismo opaco como «aarónida».
- source_word: Ἐλεάζαρος
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleázaro
  lexicon: Nombre propio tradicional
  rationale: Se conserva la transliteración estándar del nombre propio.
- source_word: διὰ τοῦ πυρὸς
  english_pob_choice: through the fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - a través del fuego
  - en medio del fuego
  - por medio del fuego
  lexicon: LSJ
  rationale: La construcción con διά y genitivo expresa circunstancia o medio. «Por el fuego» es breve y natural en español, y mantiene la idea de sufrir la acción del fuego.
- source_word: ὑπερτηκόμενος
  english_pob_choice: being burned
  chosen_spanish: fue abrasado
  alternatives_spanish:
  - fue quemado
  - se derritió
  - fue consumido
  lexicon: LSJ
  rationale: El participio comunica quedar intensamente afectado por el calor, incluso con la imagen de derretirse/consumirse. «Fue abrasado» conserva la violencia del verbo y sugiere el efecto del fuego sin exagerar más allá del griego.
- source_word: οὐ μετετράπη τὸν λογισμόν
  english_pob_choice: did not change his resolve
  chosen_spanish: no cambió su resolución
  alternatives_spanish:
  - no cambió su razón
  - no alteró su propósito
  - no fue desviado en su pensamiento
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός suele tener peso de razón, juicio o resolución gobernante. Aquí el contexto apunta a la firmeza interior de Eleazar bajo tortura, por eso «resolución» mantiene la idea de constancia deliberada sin perder la dimensión racional.
theological_decisions:
- issue: λoγισμός en un pasaje sobre la razón que domina las pasiones
  english_pob_reading: his resolve
  chosen_spanish_reading: su resolución
  alternative_spanish_readings:
  - su razón
  - su propósito racional
  - su modo de pensar
  rationale: El libro insiste en la primacía de la razón/juicio moral, pero en esta frase concreta el énfasis está en que Eleazar no cedió bajo el sufrimiento. «Resolución» conserva la fuerza ética de una decisión firme y deja abierta la resonancia filosófica del término griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: Se tomó como base el texto griego de Swete 1909 y el auditorio inglés de POB. Se siguió la revisión reciente que prefirió «burned through the fire» frente a «consumed through the fire», procurando en español una opción igual de cercana al griego, pero idiomática. También se mantuvo la nota sobre λογισμός por su importancia temática en 4 Macabeos.
  spanish_consistency_notes:
  - Se usa «Aarón» para el nombre bíblico, conforme al español estándar.
  - Se evitó «SEÑOR» u otra convención de sustitución porque este versículo no contiene el nombre divino.
  - «Resolución» se eligió para λογισμός por coherencia con la terminología de firmeza racional en 4 Macabeos.
