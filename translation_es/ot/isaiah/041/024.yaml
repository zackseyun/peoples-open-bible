translation:
  language: es
  text: Miren, ustedes son de la nada, y su obra es de la inexistencia[a]; quien los elige es una abominación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «de la no existencia»; el término hebreo es raro y difícil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Miren esto
  - He aquí
  lexicon: HALOT
  rationale: Es una interjección deíctica que introduce una declaración enfática. «Mira» mantiene la inmediatez y el tono de reprensión profética sin caer en un registro arcaico.
- source_word: מֵאַיִן
  english_pob_choice: from nothing
  chosen_spanish: de la nada
  alternatives_spanish:
  - de la no existencia
  - desde nada
  - de inexistencia
  lexicon: HALOT
  rationale: El hebreo expresa origen o procedencia desde la ausencia. En español, «de la nada» conserva mejor el valor idiomático y la fuerza polémica que un calco más pesado.
- source_word: וּפָעָלְכֶם
  english_pob_choice: and your work
  chosen_spanish: y su obra
  alternatives_spanish:
  - y su trabajo
  - y su hechura
  - y lo que hacen
  lexicon: HALOT
  rationale: «Pā‘al» puede abarcar obra, producto o hechura. «Obra» es suficientemente amplio y mantiene el paralelismo; el posesivo plural se expresa con «su» dirigido a los destinatarios.
- source_word: מֵאָפַע
  english_pob_choice: from nonexistence
  chosen_spanish: de la no existencia
  alternatives_spanish:
  - de la inexistencia
  - de la nada
  - de la vaciedad
  lexicon: HALOT
  rationale: El término es raro y difícil; el contexto intensifica la nulidad de la obra. «No existencia» preserva la idea de ausencia de ser sin resolver de manera demasiado cerrada la rareza léxica.
- source_word: תּוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - cosa abominable
  - algo detestable
  - repugnancia
  lexicon: HALOT
  rationale: Es un término fuerte de repulsión moral y cultual. «Abominación» preserva ese peso semántico y la resonancia bíblica mejor que un equivalente más suave.
- source_word: יִבְחַר בָּכֶם
  english_pob_choice: whoever chooses you
  chosen_spanish: quien los elige
  alternatives_spanish:
  - el que los elige
  - quienquiera que los escoja
  - quien los escogiere
  lexicon: HALOT
  rationale: El singular genérico se expresa naturalmente con «quien». «Elige» mantiene el sentido de escoger/preferir sin sobrecargar el verso con una perífrasis.
theological_decisions:
- issue: Referente del segundo plural
  english_pob_reading: The 'you' addresses idols/gods denounced in the surrounding context, not merely their human makers.
  chosen_spanish_reading: Los «ustedes» y «los» se entienden como dirigidos a los ídolos/dioses denunciados en el contexto inmediato, no solo a sus fabricantes humanos.
  alternative_spanish_readings:
  - Podría entenderse por metonimia que se habla de los artesanos o adoradores
  - Podría personalizarse como una alusión a los pueblos que los siguen
  rationale: El pasaje continúa la burla profética contra los ídolos del contexto. Mantener el destinatario implícito conserva la confrontación directa sin introducir explicación interpretativa en el texto principal.
  doctrine_reference: Isaías 41:21-24; polémica profética contra los ídolos
translation_notes:
  revision_awareness: La versión inglesa revisó la redacción para reflejar más de cerca las preposiciones hebreas («from nothing», «from nonexistence»). La propuesta española sigue esa misma línea, pero opta por una formulación natural («de la nada», «de la no existencia») que conserva el paralelismo y la rareza léxica sin sonar artificial.
  spanish_consistency_notes:
  - Se mantiene «abominación» para תּוֹעֵבָה, en consonancia con el peso cultual y moral documentado en POB.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni una cita de κύριος.
  - Se traduce el genérico singular con «quien» para no perder la fuerza proverbial del hebreo.
  - 'La puntuación reproduce la progresión retórica: interjección, acusación de nulidad, y veredicto final.'
