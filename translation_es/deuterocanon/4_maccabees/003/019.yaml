translation:
  language: es
  text: Y ahora también el tiempo nos llama a la demostración del relato del autodominio racional[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «la prueba del relato del autodominio racional», o «la demostración del relato de la razón templada».'
