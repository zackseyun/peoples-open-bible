  yaml_path: translation/nt/romans/014/019.yaml
  text: So then, let us pursue what makes for peace and what builds up one another.
translation:
  language: ko
  text: 그러므로 우리는 화평에 속한 것과 서로를 세우는 것을 추구합시다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_korean: 그러므로
  lexicon: BDAG
  rationale: 추론적 결론.
- source_word: τὰ τῆς εἰρήνης
  english_pob_choice: what makes for peace
  chosen_korean: 화평에 속한 것
  alternatives_korean:
  - 평화에 이르는 것
  - 평화를 이루는 것
  lexicon: BDAG
  rationale: 14:17의 εἰρήνη(평화)와 어휘 변주 「화평」으로 한국 성경 관행 따름. 속격 구문 「~에 속한 것」.
- source_word: τὰ τῆς οἰκοδομῆς τῆς εἰς ἀλλήλους
  english_pob_choice: what builds up one another
  chosen_korean: 서로를 세우는 것
  alternatives_korean:
  - 서로의 덕을 세우는 것
  lexicon: BDAG
  rationale: οἰκοδομή의 건축 은유를 「세우다」로. εἰς ἀλλήλους의 상호성을 「서로를」.
- source_word: διώκωμεν
  english_pob_choice: let us pursue
  chosen_korean: 추구합시다
  alternatives_korean:
  - 좇읍시다
  lexicon: BDAG
  rationale: 권유. 「추구하다」가 자연스럽다.
