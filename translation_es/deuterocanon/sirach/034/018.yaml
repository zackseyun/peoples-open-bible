translation:
  language: es
  text: Aun Dios no tardará[a], y como un guerrero saldrá y no se contendrá, hasta que aplaste los lomos del cruel y ejecute venganza contra las naciones; hasta que despoje el cetro de arrogancia y corte completamente la vara del malvado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego suministrado para este versículo dice en cambio: «levantando el alma e iluminando los ojos, dando sanidad, vida y bendición». Esto refleja una tradición textual sustancialmente distinta del hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: גם אל
  english_pob_choice: Even God
  chosen_spanish: Aun Dios
  alternatives_spanish:
  - Incluso Dios
  - Y también Dios
  lexicon: HALOT
  rationale: גם añade énfasis. En español, 'Aun Dios' conserva esa fuerza enfática sin convertirla en una formulación más explicativa que el hebreo.
- source_word: לא יתמהמה
  english_pob_choice: will not delay
  chosen_spanish: no tardará
  alternatives_spanish:
  - no se demorará
  - no se detendrá
  lexicon: HALOT
  rationale: The hitpael/imperfect of מהמה expresa demora o tardanza. 'No tardará' es natural en español y preserva la idea de que la acción divina no se pospone.
- source_word: כגבור יצא
  english_pob_choice: like a warrior he will go out
  chosen_spanish: como un guerrero saldrá
  alternatives_spanish:
  - como un héroe saldrá
  - como un hombre poderoso saldrá
  lexicon: HALOT
  rationale: גבור en contexto bélico apunta a un combatiente fuerte. 'Guerrero' comunica mejor el trasfondo marcial que una opción más genérica.
- source_word: לא יתאפק
  english_pob_choice: not hold back
  chosen_spanish: no se contendrá
  alternatives_spanish:
  - no se frenará
  - no se reprimirán sus impulsos
  lexicon: HALOT
  rationale: El verbo expresa no contenerse o no restringirse. 'No se contendrá' mantiene la idea de auto-restricción y suena natural en español.
- source_word: ימחץ
  english_pob_choice: crushes
  chosen_spanish: aplaste
  alternatives_spanish:
  - quiebre
  - destruya
  lexicon: HALOT
  rationale: מחץ es un verbo fuerte de aplastar o esmagar. El subjuntivo 'aplast[e]' armoniza con la secuencia hasta que y conserva la violencia de la imagen.
- source_word: מתני אכזרי
  english_pob_choice: the loins of the cruel
  chosen_spanish: los lomos del cruel
  alternatives_spanish:
  - las caderas del cruel
  - la fuerza del cruel
  lexicon: HALOT
  rationale: מתנים es literalmente 'lomos/riñones/caderas' y puede implicar fuerza. Se conserva la imagen concreta, siguiendo la decisión inglesa de no desmaterializarla.
- source_word: לגוים ישיב נקם
  english_pob_choice: repays vengeance on the nations
  chosen_spanish: devuelva venganza sobre las naciones
  alternatives_spanish:
  - retribuya venganza a las naciones
  - haga volver la venganza sobre las naciones
  lexicon: HALOT
  rationale: ישיב נקם tiene sentido de devolver o retribuir venganza. 'Sobre las naciones' refleja bien el blanco del juicio y sigue la revisión inglesa más natural.
- source_word: יוריש
  english_pob_choice: dispossesses
  chosen_spanish: despoje
  alternatives_spanish:
  - expulse
  - quite la posesión de
  lexicon: HALOT
  rationale: ירש en hiphil puede significar hacer perder la posesión, desposeer. 'Despoje' expresa bien la remoción del dominio ilegítimo.
- source_word: שבט זדון
  english_pob_choice: the scepter of arrogance
  chosen_spanish: el cetro de arrogancia
  alternatives_spanish:
  - la vara de insolencia
  - el cetro de orgullo
  lexicon: HALOT
  rationale: שבט puede ser vara, bastón o cetro. En paralelo con מטה y en un contexto de gobierno opresivo, 'cetro' comunica poder regente; זדון es mejor 'arrogancia' que un simple 'orgullo'.
- source_word: מטה רשע
  english_pob_choice: the staff of the wicked
  chosen_spanish: la vara del malvado
  alternatives_spanish:
  - el bastón del impío
  - la vara de maldad
  lexicon: HALOT
  rationale: מטה puede ser vara, bastón o cetro. Aquí 'vara' mantiene el paralelismo con שבט sin sonar redundante. רשע se vierte como 'malvado' para conservar el uso substantival personal.
- source_word: גדוע יגדע
  english_pob_choice: he will cut down completely
  chosen_spanish: corte completamente
  alternatives_spanish:
  - corte del todo
  - destruya por completo
  lexicon: HALOT
  rationale: La infinitiva absoluta con el verbo finito intensifica la acción. 'Corte completamente' expresa esa fuerza enfática en un español fluido.
theological_decisions:
- issue: Divergence between the Hebrew source and the supplied Greek parallel
  english_pob_reading: Translate from the extant Hebrew witness as primary, while noting that the Greek parallel given in Zone 1 reflects a substantially different text.
  chosen_spanish_reading: Traducir primariamente del testimonio hebreo conservado, señalando en nota que el paralelo griego transmitido aquí corresponde a otra forma textual sustancialmente distinta.
  alternative_spanish_readings:
  - «levantando el alma e iluminando los ojos, dando sanidad, vida y bendición»
  rationale: En Sirácides, el proyecto traduce del hebreo cuando está disponible. Aquí el griego no es una equivalencia cercana sino una tradición textual diferente, por lo que no debe armonizarse en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; preservar honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail en el sentido de mantener el hebreo como base principal y de conservar el matiz enfático y judicial del cierre, pero adaptando el español a una formulación más natural: ''devuelva venganza sobre las naciones'' y ''corte completamente''. También se reflejó la nota de divergencia textual mediante nota al pie, sin armonizar el griego con el hebreo en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אל según el estándar del proyecto.
  - Se usa 'guerrero' para גבור por el contexto bélico/judicial.
  - Se conserva la imaginería corporal de 'lomos' y la de autoridad de 'cetro' y 'vara' para no diluir el paralelismo hebreo.
  - Se evita 'SEÑOR' o 'el Señor' porque el hebreo aquí dice אל, no el Tetragrámaton.
  - La nota al pie marca la fuerte divergencia del griego paralelo sin introducirla en el texto principal.
