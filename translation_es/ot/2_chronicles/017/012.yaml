revisions:
- from: Y Josafat iba haciéndose más y más grande[a][b], y edificó fortalezas y ciudades de almacén en Judá.
  to: Y Josafat se hacía cada vez más poderoso, y edificó fortalezas[a] y ciudades de almacén[b] en Judá.
  rationale: Se ajustó la expresión del crecimiento progresivo a un español más natural y preciso para el contexto de estatus real («se hacía cada vez más poderoso»). También se corrigió la ubicación de las notas al pie para que queden ancladas a los términos que realmente explican, preservando la lógica del expediente léxico inglés y mejorando la claridad para el lector.
