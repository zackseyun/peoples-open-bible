review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo primario: מחוה = «declara», חליפות נהיות = cambios/eventos venideros, ומגלה = «revela», נסתרות = «cosas ocultas». También conserva correctamente en nota la expansión temporal del paralelo griego sin desplazar el hebreo del texto principal. Sin embargo, «la búsqueda de las cosas ocultas» suena menos fiel al sentido de חקר como objeto revelado; en español bíblico-natural aquí funciona mejor «la investigación/indagación de las cosas ocultas», que expresa el sondeo o escrutinio de lo escondido.'
  spanish_quality_summary: 'El español es claro y digno. No hay problemas graves de legibilidad. La única mejora necesaria es estilístico-semántica: «revela la búsqueda» sugiere el acto humano de buscar más que el campo investigado o el escrutinio de lo oculto. «Revela la investigación de las cosas ocultas» suena más natural y más preciso en este contexto sapiencial. También conviene conservar la nota textual b del inglés sobre el estado fragmentario de Masada, ya que forma parte del rastro de auditoría relevante para esta línea.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. Las decisiones «declara», «los cambios que están por venir» y «las cosas ocultas» encajan bien. La excepción recomendada es ajustar חקר de «búsqueda» a «investigación» por fidelidad contextual en español.
  issues:
  - severity: medium
    issue: «la búsqueda de las cosas ocultas» no refleja del todo bien חקר
    rationale: Aunque «búsqueda» es posible, en español aquí suena a acción en curso del buscador; el hebreo apunta mejor a «investigación/indagación/sondeo» como aquello que Dios revela respecto de lo oculto.
  - severity: medium
    issue: Falta la nota textual equivalente a la nota b del inglés POB
    rationale: El inglés conserva una nota de crítica textual sobre el estado fragmentario del rollo de Masada. No debe perderse sin razón, porque forma parte del audit trail y justifica la preferencia por el hebreo de la Geniza con apoyo del griego.
  revised_spanish_text: Él declara los cambios que están por venir[a][b], y revela la investigación de las cosas ocultas.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «Él declara lo que ha pasado y lo que está por venir, y revela las huellas de las cosas ocultas». Esto refleja una expansión temporal más plena que el hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: El rollo de Masada para esta sección es fragmentario y no conserva este versículo en una forma suficiente para reemplazar aquí la redacción de la Geniza de El Cairo.
    reason: textual_variant
  revision_rationale: Se ajusta «búsqueda» a «investigación» para representar mejor חקר en español natural y fiel. Además, se restituye la nota textual del audit trail inglés sobre Masada, anclada en el mismo segmento donde el inglés la conserva.
