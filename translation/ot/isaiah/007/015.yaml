theological_decisions:
- issue: Temporal force of לְדַעְתּוֹ in relation to the child's diet and moral discernment
  chosen_reading: Rendered temporally as 'when he knows to refuse the evil and choose the good.'
  alternative_readings:
  - 'Rendered as purpose: ''so that he may know...'''
  - 'Rendered as terminus: ''by the time he knows...'''
  rationale: The Hebrew construction naturally allows a temporal sense in context. This avoids importing a theological claim that the diet causes moral discernment, while preserving the prophetic timeframe tied to the child.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
