translation:
  language: es
  text: Andan desnudos[a], sin ropa; hambrientos, llevan gavillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gavilla». El sustantivo hebreo está en singular, pero aquí puede tener sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוֹם
  english_pob_choice: naked
  chosen_spanish: desnudos
  alternatives_spanish:
  - sin ropa
  - desnudos
  lexicon: HALOT
  rationale: El adjetivo describe falta de vestido o desnudez. «Desnudos» es la equivalencia más directa y natural en español, y conserva la fuerza social de la privación descrita en el contexto.
- source_word: הִלְּכוּ
  english_pob_choice: they go about
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  - andan de un lado a otro
  lexicon: HALOT
  rationale: El verbo expresa acción continua o condición reiterada. «Andan» comunica bien el movimiento habitual sin volver la frase innecesariamente explicativa.
- source_word: בְּלִי
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin
  - careciendo de
  lexicon: HALOT
  rationale: La preposición marca ausencia de forma directa. «Sin» es el equivalente español más natural y preciso.
- source_word: לְבוּשׁ
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestido
  - vestidura
  lexicon: HALOT
  rationale: El sustantivo se refiere a vestido o prenda de vestir. «Ropa» funciona con claridad en español moderno y evita una restricción artificial al singular.
- source_word: רְעֵבִים
  english_pob_choice: hungry
  chosen_spanish: hambrientos
  alternatives_spanish:
  - con hambre
  - famélicos
  lexicon: HALOT
  rationale: El adjetivo indica hambre. «Hambrientos» conserva el sentido léxico sin intensificarlo indebidamente.
- source_word: נָשְׂאוּ
  english_pob_choice: they carry
  chosen_spanish: llevan
  alternatives_spanish:
  - cargan
  - portan
  lexicon: HALOT
  rationale: נשא puede significar llevar o cargar. «Llevan» es idiomático en español y permite la imagen de transportar el grano cosechado.
- source_word: עֹמֶר
  english_pob_choice: sheaves
  chosen_spanish: gavillas
  alternatives_spanish:
  - una gavilla
  - manojos de grano
  lexicon: HALOT
  rationale: El sustantivo puede funcionar colectivamente en contexto. «Gavillas» transmite la carga de la cosecha de modo claro y natural. Se conserva la posibilidad singular en nota porque el hebreo es singular morfológicamente.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la lectura auditada en inglés; no hubo revisiones aplicadas en el pase más reciente, y la única tensión léxica relevante es el singular hebreo עֹמֶר frente al plural idiomático en español.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero con español contemporáneo.
  - Se prefirió «gavillas» por claridad idiomática; la nota conserva la alternativa singular documentada en el auditor inglés.
  - No hay decisiones teológicas especiales en este versículo.
