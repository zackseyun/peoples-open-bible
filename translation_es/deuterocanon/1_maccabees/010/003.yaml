translation:
  language: es
  text: Y Demetrio envió cartas a Jonatán con palabras de paz[a], para honrarlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con palabras pacíficas». La expresión griega λόγοις εἰρηνικοῖς también puede verterse más literalmente de esta manera.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para hacerlo grande». Aquí el sentido es honrarlo o elevar su rango.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: LSJ
  rationale: El aoristo de ἀποστέλλω aquí significa simplemente ‘enviar’; en español, ‘envió’ es natural y fiel al acto epistolar.
- source_word: ἐπιστολὰς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - mensajes escritos
  lexicon: LSJ
  rationale: El plural acusa varias cartas o comunicaciones escritas; ‘cartas’ reproduce de modo claro y normal el sentido.
- source_word: λόγοις εἰρηνικοῖς
  english_pob_choice: with peaceful words
  chosen_spanish: con palabras de paz
  alternatives_spanish:
  - con palabras pacíficas
  - en términos de paz
  lexicon: LSJ
  rationale: La frase dativa describe el tono o contenido de las cartas. ‘Con palabras de paz’ conserva la relación entre λόγοις y εἰρηνικοῖς, y la nota permite la alternativa más literal.
- source_word: ὥστε
  english_pob_choice: so as to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - de manera que
  lexicon: LSJ
  rationale: 'Aquí el contexto expresa propósito: Demetrio escribe para atraer el favor de Jonatán. ‘Para’ es el equivalente español más natural; la finalidad queda clara sin cargar la frase.'
- source_word: μεγαλῦναι
  english_pob_choice: honor
  chosen_spanish: honrarlo
  alternatives_spanish:
  - engrandecerlo
  - exaltarlo
  - hacerlo grande
  lexicon: LSJ
  rationale: Literalmente significa ‘hacer grande’, pero en este contexto político la intención es elevar la consideración de Jonatán. ‘Honrarlo’ comunica esa intención en español sin perder la tensión del término, que se conserva en las alternativas.
- source_word: Ἰωναθὰν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: standard transliteration
  rationale: Se usa la forma española habitual del nombre propio bíblico.
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete y concuerda con la lectura auditada en inglés (high_agreement). Se conserva la decisión léxica de traducir el valor idiomático de μεγαλῦναι como ‘honrar’/‘honrarlo’, con nota de literalidad para no borrar la tensión semántica del original.
  spanish_consistency_notes:
  - Se usa ‘Jonatán’ para el nombre propio, en coherencia con la transliteración española estándar.
  - ‘Cartas’ mantiene el plural explícito de ἐπιστολάς.
  - No se introduce vocabulario eclesiástico ajeno al contexto político del pasaje.
