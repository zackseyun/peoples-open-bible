  spanish_quality_summary: El texto es comprensible, pero «casas de gente» resulta algo tosco en español amplio y «en deshonra» suena rígido; «de muchas personas» y «en deshonor» leen con mayor naturalidad y dignidad. La principal mejora necesaria es hacer que el texto principal refleje mejor la fuerza negativa de ἐπιθυμίᾳ con «lujuria», dejando «deseo» y «pasión» como alternativas en nota, en paralelo con el audit trail inglés.
  glossary_alignment: No hay términos teológicos de proyecto especialmente implicados aquí. La revisión propuesta alinea mejor ἐπιθυμίᾳ con la decisión léxica documentada del POB («lust») y mantiene οἴκους como «casas» con nota explicativa, conforme al historial de revisión inglés.
  issues:
  - severity: medium
    issue: «por la pasión» no preserva adecuadamente la decisión principal del POB para ἐπιθυμίᾳ
    rationale: El audit trail inglés escoge «lust» como lectura principal por el contexto de deshonra, preservando «desire/passion» solo como alternativas. El español invirtió esa jerarquía semántica y suavizó el matiz negativo.
  - severity: low
    issue: «casas de gente» suena poco natural en español general
    rationale: Aunque «gente» puede ser genérico, en esta construcción posesiva resulta menos idiomático que «casas de muchas personas» o equivalente, sin pérdida de sentido.
  - severity: low
    issue: La nota de ἀτιμίᾳ pone como alternativa «en vergüenza», menos natural que «con vergüenza» o «en deshonor»
    rationale: No es un error grave, pero conviene una formulación más idiomática en español para las alternativas léxicas.
