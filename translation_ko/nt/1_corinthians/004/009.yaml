  text: δοκῶ ⸀γάρ, ὁ θεὸς ἡμᾶς τοὺς ἀποστόλους ἐσχάτους ἀπέδειξεν ὡς ἐπιθανατίους, ὅτι θέατρον ἐγενήθημεν τῷ κόσμῳ καὶ ἀγγέλοις καὶ ἀνθρώποις.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/009.yaml
  text: For it seems to me that God has displayed us[a], the apostles, last of all, like men sentenced to death, because we have become a spectacle to the world[c][b], both to angels and to men.
  footnotes:
  - marker: a
    text: 'Or ''those doomed to die'' for ''men sentenced to death.'' The Greek ἐπιθανατίους refers to persons appointed for death, likely with arena imagery.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''a theater'' more literally; the sense is ''a public spectacle.'''
    reason: lexical_alternative
  - marker: c
    text: '''Men'' here translates ἀνθρώποις in contrast with ''angels,'' meaning human beings generally.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 생각하기에, 하나님께서는 우리 사도들을 가장 끝에 두셔서 사형 선고를 받은 자들처럼 드러내셨습니다. 이는 우리가 세상에, 곧 천사들에게도 사람들에게도, 구경거리가 되었기 때문입니다.
  philosophy: optimal-equivalence
