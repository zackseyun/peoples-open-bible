review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una bienaventuranza sobre el hombre cuyo corazón está preparado para invocar el nombre del Señor. Conserva adecuadamente «corazón», el valor sapiencial de Μακάριος, y el infinitivo religioso ἐπικαλέσασθαι como «invocar». Sin embargo, la nota al pie [a] no preserva una verdadera alternativa léxica, porque repite exactamente la misma formulación ya usada en el texto.'
  spanish_quality_summary: El español es claro, digno y natural para registro bíblico. «Bienaventurado», «cuyo corazón está dispuesto» e «invocar el nombre del Señor» leen bien. La única reparación necesaria es en la nota [a], que debe ofrecer una alternativa real y no duplicar el texto principal.
  glossary_alignment: La elección de «Señor» para Κυρίου es defendible aquí por tratarse del texto griego con κύριος y por seguir el rastro auditado en inglés; no exige adjudicación mayor. «El hombre» también sigue correctamente la decisión auditada sobre ἀνήρ con valor representativo. No hay conflicto sustancial con la terminología del proyecto en este versículo.
  issues:
  - severity: medium
    issue: La nota [a] no ofrece una alternativa léxica real.
    rationale: El texto principal ya dice «invocar el nombre del Señor», y la nota [a] repite «O «invocar el nombre del Señor»». Debe reflejar la alternativa documentada en inglés, p. ej. una opción como «llamar al nombre del Señor» o equivalente natural en español.
  revised_spanish_text: Bienaventurado el hombre cuyo corazón está dispuesto a invocar el nombre del Señor[a][b].
  revised_footnotes:
  - marker: a
    text: O «llamar al nombre del Señor».
    reason: lexical_alternative
  - marker: b
    text: «El hombre» traduce una forma griega masculina singular usada aquí con valor representativo; alternativamente, «la persona».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota [a] para que preserve una alternativa léxica auténtica, en vez de repetir exactamente la redacción del texto.
