translation:
  language: es
  text: En sus manos[a] te cargarán[b], para que no golpees tu pie contra una piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lit.: «en/sobre las palmas/manos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te llevarán» o «te alzarán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: 'On'
  chosen_spanish: Sobre
  alternatives_spanish:
  - En
  - Encima de
  lexicon: HALOT
  rationale: La preposición introduce la imagen espacial de sostener/cargar; "sobre" conserva esa relación sin sonar forzado en español.
- source_word: כַּפַּיִם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus palmas
  - sus manos/palmas
  lexicon: HALOT
  rationale: El hebreo alude literalmente a las palmas/manos. En español, "manos" mantiene la imagen con naturalidad; "palmas" preserva más literalidad anatómica, pero suena más marcado.
- source_word: יִשָּׂא֑וּ/נְ/ךָ
  english_pob_choice: they will carry you
  chosen_spanish: te llevarán
  alternatives_spanish:
  - te cargarán
  - te sostendrán
  - te alzarán
  lexicon: HALOT
  rationale: נָשָׂא aquí comunica llevar/cargar en una escena de protección. "Llevarán" es natural y fiel; "cargarán" conserva el peso físico, mientras que "sostendrán" o "alzarán" desplazan el matiz.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español moderno, "para que no" expresa bien el propósito preventivo de פֶּן sin introducir una construcción arcaica o demasiado rígida.
- source_word: תִּגֹּף
  english_pob_choice: you strike
  chosen_spanish: golpees
  alternatives_spanish:
  - choques
  - topes
  - tropieces
  lexicon: HALOT
  rationale: El verbo נָגַף denota golpear/chocar; en este contexto con el pie y la piedra, "golpees" transmite la acción concreta sin perder la imagen física. "Tropieces" interpreta el resultado más que el golpe mismo.
- source_word: בָּאֶבֶן
  english_pob_choice: against a stone
  chosen_spanish: contra una piedra
  alternatives_spanish:
  - con una piedra
  - sobre una piedra
  lexicon: HALOT
  rationale: La preposición en este contexto se entiende naturalmente como oposición/choque. "Piedra" es idiomático en español y mantiene la indefinición del hebreo.
- source_word: רַגְלֶךָ
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tu pie derecho
  - tus pies
  lexicon: HALOT
  rationale: El sustantivo es singular con sufijo de segunda persona. "Tu pie" reproduce con precisión la forma y el uso idiomático del español.
theological_decisions:
- issue: 'Verbo de protección: llevar, cargar o levantar'
  english_pob_reading: they will carry you
  chosen_spanish_reading: te llevarán
  alternative_spanish_readings:
  - te cargarán
  - te sostendrán
  - te alzarán
  rationale: La imagen hebrea presenta a los ángeles como portadores protectores. "Te llevarán" conserva esa protección activa sin obligar al lector a decidir entre matices demasiado técnicos o arcaizantes.
  doctrine_reference: Salmo 91:12; Hebreos 1:14 (ministerio protector de los ángeles)
- issue: Cláusula preventiva de פֶּן
  english_pob_reading: lest
  chosen_spanish_reading: para que no
  alternative_spanish_readings:
  - no sea que
  - lest
  rationale: La fuerza de prevención se mantiene mejor en español con una finalidad negativa. Esto evita suavizar el aviso o convertirlo en mera consecuencia accidental.
  doctrine_reference: Salmo 91:12; uso preventivo de פֶּן en hebreo bíblico
translation_notes:
  revision_awareness: El hebreo y el audit trail inglés coinciden en la imagen de portación protectora y en la finalidad preventiva; la versión española mantiene esa estructura sin volverla arcaica. Se evitó "señor"/"SEÑOR" porque no aparece el nombre divino en este versículo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre portación protectora y prevención del tropiezo.
  - '"Piedra" se eligió por naturalidad en español, aunque el hebreo es indefinido y permite la misma lectura general.'
  - Las notas se limitaron a alternativas léxicas que ya están respaldadas por el audit trail inglés.
