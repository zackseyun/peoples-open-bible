translation:
  language: es
  text: Pero si me dan a conocer el sueño y su interpretación[a], recibirán de mí dones y recompensas y gran honor. Por tanto, denme a conocer el sueño y su interpretación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «háganme saber» / «declárenme», para el verbo arameo repetido con el sentido de «dar a conocer».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵן
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora, si
  lexicon: HALOT
  rationale: La partícula introduce una condición contrastiva frente a la amenaza anterior; en español, «Pero si» conserva el valor adversativo y condicional de forma natural.
- source_word: חֶלְמָא
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - un sueño
  lexicon: HALOT
  rationale: El referente ya está en contexto como el sueño del rey, por lo que el artículo definido es el más fiel y claro.
- source_word: וּפִשְׁרֵהּ
  english_pob_choice: and its interpretation
  chosen_spanish: y su interpretación
  alternatives_spanish:
  - y su significado
  - y su solución
  lexicon: HALOT
  rationale: En Daniel, פשר se usa para la explicación/interpretación de un sueño o misterio; «interpretación» mantiene el sentido técnico y el paralelismo del verso.
- source_word: תְּהַחֲוֺן
  english_pob_choice: you make known
  chosen_spanish: den a conocer
  alternatives_spanish:
  - declaren
  - muestren
  lexicon: HALOT
  rationale: El verbo arameo tiene valor causativo de «dar a conocer» o «declarar». «Den a conocer» preserva ese matiz y funciona bien en el imperativo plural español.
- source_word: מַתְּנָן
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - presentes
  lexicon: HALOT
  rationale: El plural hebreo-arameo indica obsequios valiosos; «dones» es natural en español bíblico contemporáneo y no reduce el matiz de liberalidad.
- source_word: וּנְבִזְבָּה
  english_pob_choice: and rewards
  chosen_spanish: y recompensas
  alternatives_spanish:
  - y remuneraciones
  - y pago
  lexicon: HALOT
  rationale: El sustantivo denota retribución o galardón otorgado por el rey; «recompensas» refleja bien el plural y la idea de retribución.
- source_word: וִיקָר שַׂגִּיא
  english_pob_choice: and great honor
  chosen_spanish: y gran honra
  alternatives_spanish:
  - y gran honor
  - y mucho honor
  lexicon: HALOT
  rationale: יקָר expresa honor/prestigio, intensificado por שַׂגִּיא. «Honra» es un equivalente natural y digno en español; se conserva la intensificación con «gran».
- source_word: תְּקַבְּלוּן
  english_pob_choice: you will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - obtendrán
  - ustedes recibirán
  lexicon: HALOT
  rationale: El imperfecto tiene valor futuro; el español omite el pronombre por ser innecesario y mantener fluidez, sin perder el sentido de promesa.
- source_word: מִן קֳדָמַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi presencia
  - de mi parte
  lexicon: HALOT
  rationale: El giro idiomático señala al rey como dador/origen de la recompensa. «De mí» es la forma más directa y natural en español.
- source_word: לָהֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así pues
  - Entonces
  lexicon: HALOT
  rationale: La partícula introduce una inferencia lógica a partir de la promesa anterior; «Por tanto» conserva el enlace argumentativo.
- source_word: הַחֲוֺנִי
  english_pob_choice: make known to me
  chosen_spanish: denme a conocer
  alternatives_spanish:
  - háganmelo saber
  - declárenmelo
  lexicon: HALOT
  rationale: El imperativo con sufijo de primera persona singular exige un destinatario explícito. «Denme a conocer» mantiene la repetición del verbo anterior y el tono directo.
translation_notes:
  revision_awareness: El texto base en inglés había sido revisado para reflejar con mayor precisión el plural de וּנְבִזְבָּה («recompensas»). La redacción española mantiene ese plural y conserva la repetición del verbo de «dar a conocer» en ambos miembros del verso, siguiendo el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, pero este versículo no contiene el nombre divino.
  - Se conserva la repetición léxica entre «den a conocer» y «denme a conocer» para reflejar el paralelismo del arameo.
  - «Honra» se usa por estilo bíblico natural en español, sin cambiar el sentido de «honor/prestigio».
