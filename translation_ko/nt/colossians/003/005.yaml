  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Νεκρώσατε οὖν τὰ ⸀μέλη τὰ ἐπὶ τῆς γῆς, πορνείαν, ἀκαθαρσίαν, πάθος, ἐπιθυμίαν κακήν, καὶ τὴν πλεονεξίαν ἥτις ἐστὶν εἰδωλολατρία,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/005.yaml
  text: 'Therefore, put to death the members that are on the earth: sexual immorality, impurity, passion, evil desire, and greed, which is idolatry.'
translation:
  language: ko
  text: 그러므로 땅 위에 있는 지체들을 죽이십시오. 곧 음행, 부정, 정욕, 악한 욕망, 그리고 우상 숭배인 탐심[a]입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「탐욕」. 「우상 숭배」와 동일시되는 것은 직전의 단수 명사 「탐심」을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Νεκρώσατε
  english_pob_choice: put to death
  chosen_korean: 죽이십시오
  alternatives_korean:
  - 죽음에 처하십시오
  - 사멸시키십시오
  lexicon: BDAG
  rationale: 부정과거 명령. 「죽이십시오」가 한국 교회의 정립된 표현.
- source_word: τὰ μέλη τὰ ἐπὶ τῆς γῆς
  english_pob_choice: the members that are on the earth
  chosen_korean: 땅 위에 있는 지체들
  alternatives_korean:
  - 땅에 속한 지체들
  - 너희 안의 땅의 것들
  lexicon: BDAG
  rationale: μέλη의 「지체」 은유를 보존한다. 「땅 위에 있는」으로 공간적 직역.
- source_word: πορνείαν
  english_pob_choice: sexual immorality
  chosen_korean: 음행
  alternatives_korean:
  - 성적 부도덕
  - 음란
  lexicon: BDAG
  rationale: 「음행」은 한국 교회의 정립된 표현으로 πορνεία의 광의를 담는다.
- source_word: ἀκαθαρσίαν
  english_pob_choice: impurity
  chosen_korean: 부정
  alternatives_korean:
  - 불결
  - 더러움
  lexicon: BDAG
  rationale: 「부정」은 도덕적 더러움을 포괄적으로 담는다.
- source_word: πάθος
  english_pob_choice: passion
  chosen_korean: 정욕
  alternatives_korean:
  - 욕정
  - 부끄러운 욕망
  lexicon: BDAG
  rationale: 「정욕」은 한국 교회의 정립된 표현.
- source_word: ἐπιθυμίαν κακήν
  english_pob_choice: evil desire
  chosen_korean: 악한 욕망
  alternatives_korean:
  - 악한 정욕
  - 사악한 욕심
  lexicon: BDAG
  rationale: κακή가 욕망을 도덕적으로 부정적으로 규정.
- source_word: τὴν πλεονεξίαν ἥτις ἐστὶν εἰδωλολατρία
  english_pob_choice: greed, which is idolatry
  chosen_korean: 우상 숭배인 탐심
  alternatives_korean:
  - 곧 우상 숭배인 탐욕
  - 탐심 곧 우상 숭배
  lexicon: BDAG
  rationale: ἥτις는 직전 단수 「탐심」을 가리킨다. 한국어 어순상 「우상 숭배인 탐심」으로 옮긴다.
