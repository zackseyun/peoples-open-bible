translation:
  language: es
  text: Que juzgue a tu pueblo con rectitud[a], y a tus afligidos[b] con justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Juzgará a tu pueblo con rectitud». El imperfecto hebreo puede leerse como volitivo («Que juzgue») o como futuro/predictivo en este contexto.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tus pobres» o «tus necesitados». El término hebreo puede referirse a los pobres económicos, a los afligidos o a los oprimidos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדִין
  english_pob_choice: May he judge
  chosen_spanish: Que juzgue
  alternatives_spanish:
  - Que él juzgue
  - Juzgará
  - Juzgue
  lexicon: HALOT
  rationale: El imperfecto hebreo admite lectura volitiva o futura. En español, una forma exhortativa/subjuntiva expresa bien el valor de ruego del contexto real del salmo, sin perder el sentido de acto judicial del verbo 'juzgar'.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  lexicon: HALOT
  rationale: '''Pueblo'' conserva mejor el matiz colectivo y pactal del hebreo con sufijo de segunda persona masculina singular.'
- source_word: בְצֶדֶק
  english_pob_choice: with righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - en justicia
  - con rectitud
  lexicon: HALOT
  rationale: צֶדֶק puede expresarse por 'justicia' o 'rectitud'. Aquí 'con justicia' resulta natural en español y mantiene el valor moral-jurídico del término, en paralelo con משפט.
- source_word: וַעֲנִיֶּיךָ
  english_pob_choice: and your afflicted ones
  chosen_spanish: y a tus afligidos
  alternatives_spanish:
  - y a tus pobres
  - y a tus necesitados
  - y a los oprimidos
  lexicon: HALOT
  rationale: El hebreo puede abarcar pobres, afligidos, necesitados u oprimidos. 'Afligidos' preserva esa amplitud semántica y evita reducir el término solo a lo económico.
- source_word: בְמִשְׁפָּט
  english_pob_choice: with justice
  chosen_spanish: con rectitud
  alternatives_spanish:
  - con justicia
  - según justicia
  - con juicio
  lexicon: HALOT
  rationale: Aunque משפט puede ser 'justicia' o 'juicio', 'rectitud' ayuda en español a diferenciarlo de צֶדֶק y mantiene la idea de decisión conforme a lo justo. Se conserva así la distinción de ambos miembros poéticos.
theological_decisions:
- issue: 'Valor del imperfecto hebreo inicial: petición o futuro'
  english_pob_reading: May he judge / He will judge
  chosen_spanish_reading: Que juzgue
  alternative_spanish_readings:
  - Juzgará
  - Él juzgue
  rationale: El salmo tiene tono de oración por el rey, así que la lectura volitiva es la más natural. En español, 'Que juzgue' comunica esa súplica sin cerrar por completo la posibilidad semántica futura implícita en el hebreo.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity exists)
- issue: Distinción entre צֶדֶק y משפט
  english_pob_reading: with righteousness ... with justice
  chosen_spanish_reading: con justicia ... con rectitud
  alternative_spanish_readings:
  - con rectitud ... con justicia
  - con justicia ... con justicia
  rationale: Se opta por distinguir los dos términos en español para no perder la paralelización ni aplanar el hebreo. 'Justicia' y 'rectitud' se solapan, pero juntos conservan mejor la tensión léxica y poética del versículo.
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity exists)
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios aplicados en la fuente inglesa, y el borrador español sigue la misma lectura volitiva y la misma amplitud semántica para ענייך.'
  spanish_consistency_notes:
  - Se mantiene el registro reverente y bíblico con español moderno y claro.
  - Se evita 'SEÑOR' para el nombre divino porque este versículo no lo contiene; no se requiere decisión sobre Yahvé aquí.
  - '''Justicia'' y ''rectitud'' se distribuyen para reflejar el paralelismo hebreo sin sobrerrepetición.'
  - Los marcadores de nota se colocan solo donde hay ambigüedad real en español, con anclajes en el texto.
