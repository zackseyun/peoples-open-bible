review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé como sujeto, honra/preeminencia del padre respecto de los hijos, y validación divina de la posición de la madre sobre sus hijos. Sin embargo, en el segundo hemistiquio se aparta del inglés POB y de la decisión léxico-teológica principal al preferir ''derecho'' en vez de ''autoridad'', aunque el audit trail deja ''right'' como alternativa de nota y no como texto principal.'
  spanish_quality_summary: El español es claro y digno, pero 'confirmó el derecho de la madre sobre sus hijos' suena más jurídico-abstracto que relacional y pierde parte de la fuerza práctica familiar del contexto sapiencial. 'Estableció la autoridad de la madre sobre sus hijos' suena más natural y paralela al razonamiento del verso. El resto del versículo es fluido y correcto.
  glossary_alignment: 'Alinea correctamente YHWH -> ''Yahvé''. No hay otros términos de glosario mayor en juego. La principal desalineación es con la decisión documentada para משפט: el POB inglés adopta ''authority'' como lectura principal y reserva ''right'' para nota alternativa; el español debería hacer lo mismo.'
  issues:
  - severity: medium
    issue: '''el derecho de la madre'' no sigue la lectura principal documentada'
    rationale: El audit trail inglés escogió 'the mother's authority' como traducción principal de משפט האם por su fuerza jurídico-relacional en el ámbito familiar. 'Derecho' es una alternativa válida, pero quedó explícitamente como alternativa/nota, no como texto base.
  - severity: low
    issue: '''confirmó'' es aceptable, pero ''estableció'' refleja mejor la elección inglesa principal'
    rationale: El hebreo קיים y el griego ἐστερέωσεν permiten 'confirmó', pero el POB inglés fijó 'established' como principal. En español, 'estableció' combina mejor con 'autoridad' y expresa con más claridad una disposición firme.
  revised_spanish_text: Porque Yahvé honró al padre por encima de los hijos, y estableció la autoridad[a] de la madre sobre sus hijos.
  revised_footnotes:
  - marker: a
    text: O 'el derecho de la madre'. El hebreo mishpat puede significar 'juicio', 'justicia' o un 'derecho/pretensión' legal; aquí probablemente se refiere a la autoridad legítima de la madre dentro de la familia.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el segundo hemistiquio para seguir la decisión léxica principal documentada en el POB inglés: משפט האם se vierte mejor como ''la autoridad de la madre'' en el texto principal, mientras ''derecho'' se conserva como alternativa en nota. También se cambia ''confirmó'' por ''estableció'' para corresponder más estrechamente a la elección principal ''established'' y al matiz de hacer firme.'
