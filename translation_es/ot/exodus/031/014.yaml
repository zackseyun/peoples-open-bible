revisions:
- from: Guarden el sábado[a], porque es santo para ustedes. Cualquiera que lo profane será ciertamente muerto, porque cualquiera que haga en él[b] alguna obra, esa persona será cortada de entre su pueblo.
  to: Guarden el sábado, porque es santo para ustedes. Cualquiera que lo profane[a] ciertamente será condenado a muerte, porque cualquiera que haga trabajo en ese día[b], esa persona será cortada de entre su pueblo.
  rationale: Se corrigió el anclaje de la nota léxica para que recaiga sobre «lo profane», donde corresponde. Se sustituyó «será ciertamente muerto» por «ciertamente será condenado a muerte», que comunica de forma natural y jurídica la pasiva enfática hebrea. Se reemplazó «haga en él alguna obra» por «haga trabajo en ese día» para evitar el añadido no explícito «alguna» y mejorar la naturalidad española sin perder el sentido de מְלָאכָה. Se mantuvo «será cortada de entre su pueblo» para conservar la fórmula legal y la tensión teológica del original.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:26:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: guardar el sábado, su santidad para la comunidad, la pena de muerte por profanarlo y la fórmula legal de ser cortado de entre su pueblo. Sin embargo, dos elecciones españolas no preservan bien ni el hebreo ni el rastro POB en inglés: «será ciertamente muerto» suena antinatural y no refleja bien la pasiva judicial idiomática; y «haga en él alguna obra» introduce un añadido («alguna») que el inglés auditado evitó explícitamente y usa «obra», menos natural aquí que «trabajo».'
  spanish_quality_summary: 'La legibilidad es desigual. «Guarden el sábado» y «porque es santo para ustedes» funcionan bien. Pero «será ciertamente muerto» es poco idiomático en español bíblico actual, y «haga en él alguna obra» suena forzado; «haga trabajo en él» también sería torpe, por lo que conviene reformular a «haga trabajo en ese día». Las notas al pie también necesitan ajuste: la nota [a] está anclada en «sábado», pero su contenido trata de «profane», así que el anclaje es incorrecto. La nota [b] debe seguir anclando la frase de corte legal.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «sábado» es aceptable para הַשַּׁבָּת en este contexto. «Persona» para נֶפֶשׁ es correcto. Conviene mantener la fórmula jurídica «será cortada de entre su pueblo» o mejor «será excluida/cortada de entre su pueblo» solo si se explica; dado el rastro POB, la forma literal «será cortada de entre su pueblo» es defendible. La mayor desviación es estilística y de fidelidad fina: el proyecto inglés prefirió no añadir «any», por lo que en español debe evitarse «alguna».'
  issues:
  - severity: high
    issue: La expresión «será ciertamente muerto» es español poco natural y no comunica bien la pasiva legal de מוֹת יוּמָת.
    rationale: El hebreo expresa una pena judicial enfática, y el inglés POB la auditó como «shall surely be put to death». En español natural y fiel, «ciertamente será condenado a muerte» o «ciertamente se le dará muerte» preserva mejor el matiz legal y la claridad.
  - severity: high
    issue: La nota [a] está colocada en «sábado», pero su contenido corresponde a «lo profane».
    rationale: La disciplina de salida exige que cada nota esté anclada en la palabra o frase pertinente. El contenido «O “desacralizarlo”» explica מְחַלְלֶיהָ, no הַשַּׁבָּת.
  - severity: medium
    issue: «cualquiera que haga en él alguna obra» es forzado y añade «alguna» sin base necesaria en el hebreo auditado.
    rationale: El inglés POB evitó añadir «any» porque no es explícito aquí. Además, «obra» en español moderno no es la opción más clara para מְלָאכָה en este contexto legal sabático; «trabajo» es más natural.
  - severity: low
    issue: El pronombre «él» para el sábado suena menos natural que una reformulación temporal.
    rationale: Aunque gramaticalmente posible, en español bíblico actual «en ese día» o «en él» puede sonar rígido. «En ese día» aclara la referencia sin cambiar el sentido.
  revised_spanish_text: Guarden el sábado, porque es santo para ustedes. Cualquiera que lo profane[a] ciertamente será condenado a muerte, porque cualquiera que haga trabajo en ese día[b], esa persona será cortada de entre su pueblo.
  revised_footnotes:
  - marker: a
    text: O «lo desacralice».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «será cortada de entre su pueblo», una fórmula legal cuyo modo exacto de sanción no se especifica aquí.'
    reason: alternative_reading
  revision_rationale: Se corrigió el anclaje de la nota léxica para que recaiga sobre «lo profane», donde corresponde. Se sustituyó «será ciertamente muerto» por «ciertamente será condenado a muerte», que comunica de forma natural y jurídica la pasiva enfática hebrea. Se reemplazó «haga en él alguna obra» por «haga trabajo en ese día» para evitar el añadido no explícito «alguna» y mejorar la naturalidad española sin perder el sentido de מְלָאכָה. Se mantuvo «será cortada de entre su pueblo» para conservar la fórmula legal y la tensión teológica del original.
