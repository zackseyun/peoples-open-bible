  to: Había seis escalones al trono[a], y un escabel de oro unido al trono, y apoyabrazos a este lado y al otro, junto al asiento, y dos leones de pie junto a los apoyabrazos.
  rationale: Se conserva la traducción base porque es fiel al hebreo y al audit trail del POB. Se corrige el error gramatical de la nota al pie y se ajusta levemente la frase bilateral para una lectura más natural en español sin alejarse del texto fuente.
