  rationale: Se ajusta una expresión poco idiomática ('uno hacia el otro' > 'el uno frente al otro') y se precisa mejor la imagen espacial de סֹכְכִים ('cubriendo por encima con sus alas') sin alterar el sentido ni la terminología cultual establecida. Se conserva 'propiciatorio' con su nota léxica alternativa.
