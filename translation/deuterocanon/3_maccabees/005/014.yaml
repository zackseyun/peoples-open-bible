id: 3MA.5.14
reference: 3 Maccabees 5:14
source:
  edition: lxx-swete-1909
  text: μεσούσης δὲ ἤδη ἑκάτης ὥρας σχεδόν, ὁ πρὸς ταῖς κλήσεσιν τεταγμένος, ἀθρόους τοὺς κλητοὺς ἰδών, ἔνευσε προσελθὼν τὸν βασιλέα.
  language: Greek
  pages:
  - 743
  confidence: high
  validation: agree
translation:
  text: And when it was already nearly the middle of the sixth hour[a], the man appointed over the summonses, seeing those who had been summoned assembled in a mass, came up and signaled to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'about the middle of the sixth hour.' In ancient reckoning this is roughly around midday.
    reason: cultural_note
lexical_decisions:
- source_word: μεσούσης ... ἑκάτης ὥρας σχεδόν
  chosen: when the sixth hour was already nearly halfway through
  alternatives:
  - about the middle of the sixth hour
  - when it was nearly midday
  - as the sixth hour was almost half spent
  lexicon: LSJ
  rationale: μεσούσης with ὥρας indicates the hour being in its middle; ἤδη and σχεδόν together add the sense 'already' and 'nearly.' A more literal rendering preserves the ancient time reference rather than converting it to a modern clock time.
- source_word: ὁ πρὸς ταῖς κλήσεσιν τεταγμένος
  chosen: the man appointed over the summonses
  alternatives:
  - the one assigned to the roll calls
  - the official in charge of the summonses
  - the officer appointed over the registrations
  lexicon: LSJ
  rationale: τεταγμένος denotes someone appointed/assigned. κλήσεις can mean summonses or calls; in this context of people being called up and assembled, 'summonses' best preserves the administrative sense without overinterpreting as a census or registration.
- source_word: ἀθρόους
  chosen: gathered in a mass
  alternatives:
  - assembled together
  - in a crowd
  - all together
  lexicon: LSJ
  rationale: ἀθρόους conveys being collected together in one body or mass. 'Gathered in a mass' preserves the visual force more clearly than the flatter 'together.'
- source_word: τοὺς κλητούς
  chosen: those who had been summoned
  alternatives:
  - the summoned ones
  - those called
  - the invitees
  lexicon: LSJ
  rationale: κλητοί here refers to persons who have been called/summoned by authority, not invited socially. The perfect-like English 'had been summoned' fits the administrative setting.
- source_word: ἔνευσε
  chosen: signaled
  alternatives:
  - nodded to
  - gave a sign to
  - gestured to
  lexicon: LSJ
  rationale: The verb denotes giving a sign, often by nodding or gesture. 'Signaled' is idiomatic and leaves the exact gesture unspecified.
- source_word: προσελθὼν τὸν βασιλέα
  chosen: came up and signaled to the king
  alternatives:
  - approached the king and signaled
  - having come near the king, he signaled
  lexicon: LSJ
  rationale: The participle is naturally rendered with an English finite verb in sequence. The sense is that he approached the king and then gave the signal.
