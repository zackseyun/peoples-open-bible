translation:
  language: es
  text: Y los príncipes de Isacar estaban con Débora[a]; e Isacar estuvo asimismo con Barac; al valle fueron enviados tras sus pasos[b]. Entre las divisiones de Rubén hubo grandes exámenes[c] del corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes de Isacar» o «líderes de Isacar». La expresión hebrea es poética y puede funcionar idiomáticamente más que como un posesivo estricto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a sus pies»; es decir, siguiendo de cerca a Barac.
    reason: lexical_alternative
  - marker: c
    text: O «grandes resoluciones del corazón» o «grandes deliberaciones del corazón». La frase hebrea es difícil; en el contexto probablemente destaca el debate interior de Rubén más que la acción.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂרַי
  english_pob_choice: princes of
  chosen_spanish: príncipes de
  alternatives_spanish:
  - líderes de
  - jefes de
  lexicon: HALOT
  rationale: El hebreo poético sugiere un grupo dirigente de Isacar; «príncipes» conserva el registro elevado de la canción y corresponde bien al valor idiomático señalado por el audit trail, sin forzar un posesivo literal que sonaría extraño en español.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - al lado de
  lexicon: HALOT
  rationale: Expresa acompañamiento sencillo y directo, como en el inglés auditado.
- source_word: וְיִשָּׂשכָר כֵּן בָּרָק
  english_pob_choice: and Issachar was likewise with Barak
  chosen_spanish: e Isacar estuvo asimismo con Barac
  alternatives_spanish:
  - y así Isacar estuvo con Barac
  - e Isacar, de igual modo, con Barac
  lexicon: HALOT
  rationale: «כֵּן» expresa correspondencia o semejanza; en español conviene suplir el verbo para que la elipsis resulte natural. «Estuvo asimismo» conserva el paralelismo y el matiz de continuidad.
- source_word: בָּעֵמֶק
  english_pob_choice: into the valley
  chosen_spanish: al valle
  alternatives_spanish:
  - hacia el valle
  - en el valle
  lexicon: HALOT
  rationale: Con el pasivo de movimiento en contexto militar, el español breve «al valle» comunica desplazamiento/deployación sin sobrecargar la frase.
- source_word: שֻׁלַּח
  english_pob_choice: they were sent
  chosen_spanish: fueron enviados
  alternatives_spanish:
  - fue enviado
  - fueron despachados
  lexicon: HALOT
  rationale: Aunque la forma es singular, el sujeto es colectivo/tribal y el sentido en contexto es plural. «Fueron enviados» sigue la lectura de acción colectiva indicada por el audit trail.
- source_word: בְּרַגְלָיו
  english_pob_choice: at his feet
  chosen_spanish: a sus pies
  alternatives_spanish:
  - tras sus pasos
  - siguiéndolo de cerca
  lexicon: HALOT
  rationale: La imagen literal se conserva en español para mantener la transparencia del giro idiomático. «A sus pies» deja visible la metáfora de seguir muy de cerca a Barac.
- source_word: בִּפְלַגּוֹת רְאוּבֵן
  english_pob_choice: among the divisions of Reuben
  chosen_spanish: entre las divisiones de Rubén
  alternatives_spanish:
  - entre las tribus de Rubén
  - entre los clanes de Rubén
  lexicon: HALOT
  rationale: «Divisiones» reproduce el valor básico de פְּלַגּוֹת y conserva la conexión con la idea de fragmentación o facciones internas; «entre» funciona bien en español con un plural colectivo.
- source_word: גְּדֹלִים
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - muchas
  - importantes
  lexicon: HALOT
  rationale: Adjetivo directo que intensifica la expresión siguiente, tal como en el inglés auditado.
- source_word: חִקְקֵי לֵב
  english_pob_choice: searchings of heart
  chosen_spanish: indagaciones de corazón
  alternatives_spanish:
  - búsquedas de corazón
  - deliberaciones de corazón
  lexicon: HALOT
  rationale: La frase es difícil y poética. «Indagaciones de corazón» mantiene la idea de examen interior y evita suavizar la tensión del hebreo, mientras sigue siendo idiomática en español. Se conserva el carácter reflexivo/hesitante señalado por el audit trail.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo y el audit trail inglés sin cambios sustanciales; se preserva la sintaxis poética y la ambigüedad de חִקְקֵי לֵב con una solución transparente en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - 'Se emplean nombres propios bíblicos en forma española estándar: Débora, Barac, Rubén, Isacar.'
  - Se conserva el registro poético con léxico elevado («príncipes») y una construcción breve que respeta la paralelía del hebreo.
  - Las notas mantienen las alternativas relevantes del audit trail, incluyendo la lectura idiomática de «a sus pies» y la dificultad de «indagaciones de corazón».
