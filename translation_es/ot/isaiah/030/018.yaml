translation:
  language: es
  text: Por tanto, Yahvé espera para mostrarles su gracia, y por tanto se levanta[a] para mostrarles misericordia; porque Yahvé es un Dios de justicia. Bienaventurados todos los que esperan por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es exaltado para mostrarles misericordia» o «se exalta para mostrarles misericordia».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Expresa bien la relación inferencial/resultativa del hebreo. 'Por tanto' suena natural en español bíblico contemporáneo y conserva el enlace lógico sin añadir causalidad más fuerte que el texto.
- source_word: יְחַכֶּה
  english_pob_choice: waits
  chosen_spanish: espera
  alternatives_spanish:
  - aguarda
  - demora
  lexicon: HALOT
  rationale: חכה denota 'esperar'. 'Espera' conserva el sentido básico y la tensión del retraso deliberado de la acción divina. 'Aguarda' es posible, pero menos común; 'demora' desplaza el verbo hacia el resultado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma establecida por el proyecto en español, en lugar de sustituirlo por un título. 'Yahvé' comunica el Tetragrámaton con naturalidad en español bíblico.
- source_word: לַחֲנַנְכֶם
  english_pob_choice: to be gracious to you
  chosen_spanish: ser gracioso contigo
  alternatives_spanish:
  - mostrarse favorable contigo
  - tener misericordia de ti
  lexicon: HALOT
  rationale: חנן significa 'mostrar gracia/favor'. En español, la construcción más fiel y readable es 'ser gracioso contigo', pero para evitar una lectura coloquial o ambigua se ha mantenido 'ser gracioso' con la nota de alternativa semántica en el mismo segmento. Se preserva la distinción con רחם, que sigue después. Si se prefiere una formulación más explícita, 'mostrarte gracia' sería otra opción, pero no es la más idiomática aquí.
- source_word: יָרוּם
  english_pob_choice: rises up
  chosen_spanish: se levanta
  alternatives_spanish:
  - es exaltado
  - se exalta
  lexicon: HALOT
  rationale: רום puede ser 'estar alto/levantarse' o 'ser exaltado'. 'Se levanta' conserva la imagen verbal de movimiento hacia la intervención. En español, además, encaja bien con el paralelismo con 'espera' sin forzar una interpretación exclusivamente pasiva o exclusivamente reflexiva.
- source_word: לְרַחֶמְכֶם
  english_pob_choice: to show you mercy
  chosen_spanish: para mostrarte misericordia
  alternatives_spanish:
  - para compadecerte
  - para tener compasión de ti
  lexicon: HALOT
  rationale: רחם expresa compasión/misericordia. 'Misericordia' mantiene la diferencia léxica respecto a חנן y es una equivalencia natural en español eclesial. 'Compasión' también es viable, pero 'misericordia' refleja mejor el registro bíblico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de lo dicho antes. 'Porque' es la conexión causal más clara y natural en español.
- source_word: אֱלֹהֵי מִשְׁפָּט
  english_pob_choice: a God of justice
  chosen_spanish: un Dios de justicia
  alternatives_spanish:
  - el Dios de justicia
  - un Dios de juicio
  lexicon: HALOT
  rationale: 'La construcción en español funciona bien como predicación nominal: ''un Dios de justicia''. ''Justicia'' captura mejor מִשְׁפָּט aquí que ''juicio'', porque el punto es la rectitud/gobierno justo de Yahvé, fundamento de su tiempo de gracia y misericordia.'
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed are
  chosen_spanish: Bienaventurados son
  alternatives_spanish:
  - Bienaventurados
  - Dichosos son
  lexicon: HALOT
  rationale: Fórmula sapiencial de bienaventuranza. 'Bienaventurados' conserva el peso bíblico y litúrgico mejor que 'felices'. Se añade el verbo para una sintaxis española completa sin perder la forma proverbial.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todo
  lexicon: HALOT
  rationale: Traducción directa del cuantificador universal, natural con el participio plural siguiente.
- source_word: חוֹכֵי
  english_pob_choice: who wait
  chosen_spanish: los que esperan
  alternatives_spanish:
  - los que aguardan
  - los que confían
  lexicon: HALOT
  rationale: 'El participio de חכה mantiene el eco con el verbo anterior: Yahvé ''espera'' y son bienaventurados los que ''esperan'' en él. Esa repetición literaria se preserva mejor con ''esperan'' que con ''confían''.'
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - para él
  lexicon: HALOT
  rationale: El hebreo usa la preposición 'para/en relación con'. En español bíblico, 'esperar en él' es idiomático y mantiene la orientación relacional hacia Yahvé. 'Por él' sonaría menos preciso en este contexto.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto, conforme al criterio del proyecto, en vez de sustituirlo por un título. 'Yahvé' es la forma establecida para el español y evita ocultar la identidad del nombre en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de יָרוּם en contexto
  english_pob_reading: he rises up
  chosen_spanish_reading: se levanta
  alternative_spanish_readings:
  - es exaltado
  - se exalta
  rationale: El hebreo admite una lectura de movimiento hacia la acción o de exaltación. Aquí, la secuencia 'espera ... se levanta ... para mostrarte misericordia' favorece la lectura activa. La alternativa de exaltación se conserva implícitamente por la ambigüedad del verbo, sin borrar la tensión semántica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Distinción entre חנן y רחם
  english_pob_reading: to be gracious / to show mercy
  chosen_spanish_reading: ser gracioso / mostrar misericordia
  alternative_spanish_readings:
  - mostrar favor / tener compasión
  - dar gracia / compadecerse
  rationale: 'Se mantiene la diferencia de dos verbos cercanos pero no idénticos: primero el favor/gracia inmerecida, luego la compasión misericordiosa. En español, ''gracioso'' puede sonar menos técnico, pero conserva la correspondencia léxica sin colapsar ambos verbos en una sola idea.'
  doctrine_reference: HALOT lexical distinction חנן vs. רחם
- issue: אֱלֹהֵי מִשְׁפָּט como fundamento del versículo
  english_pob_reading: a God of justice
  chosen_spanish_reading: un Dios de justicia
  alternative_spanish_readings:
  - el Dios de justicia
  - un Dios de juicio
  rationale: '''Justicia'' comunica mejor el atributo de gobierno recto que motiva la confianza en su demora aparente. ''Juicio'' introduciría un matiz más punitivo que el texto no requiere aquí.'
  doctrine_reference: Lexical-theological sense of מִשְׁפָּט in context
translation_notes:
  revision_awareness: 'Concordant with the English audit trail: no applied revisions in the latest pass; cross-check status high_agreement and verdict agree. The Spanish draft keeps the same major lexical/theological decisions while adapting the diction to natural Spanish and preserving the Hebrew play on חכה/חכה.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יהוה, conforme al estándar del proyecto.
  - Se distingue 'gracia'/'favor' de 'misericordia'/'compasión' para no fusionar חנן y רחם.
  - '''Espera'' / ''los que esperan'' preserva el paralelismo verbal del hebreo.'
  - '''Justicia'' se emplea para מִשְׁפָּט en sentido de gobierno recto, no como mero castigo.'
