review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido base del hebreo y del POB en inglés: pregunta retórica, imagen de cordel de tienda, muerte, y la frase final deliberadamente abierta. Sin embargo, «se ha alzado» no refleja con suficiente precisión la idea de algo quitado o desarraigado; en español sugiere más bien elevación que remoción. Además, la nota [a] está anclada en «Mueren», pero su contenido explica la imagen del cordel, no el verbo morir; falta una nota para la alternativa de «mueren ... sin/antes de sabiduría».'
  spanish_quality_summary: El texto es claro y bastante natural, pero «se ha alzado su cordel de tienda dentro de ellos» suena algo extraño en español y puede leerse de forma física poco idiomática. «¿No se les arranca su cordel de tienda desde dentro?» conserva mejor la metáfora y la legibilidad. También conviene corregir la colocación de las notas para que correspondan al término explicado.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «sabiduría» y la imagen de «cordel de tienda» concuerdan con la justificación auditada. La principal mejora es lexical: preferir un verbo de remoción como «arranca» o «retira» sobre «alza».'
  issues:
