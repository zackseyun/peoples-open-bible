base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/010/010.yaml
  text: She guided the righteous man[a], a fugitive from his brother’s anger, in straight paths; she showed him the kingdom of God, and gave him knowledge of holy things; she prospered him in his labors[b], and increased the fruits of his toil.
  footnotes:
  - marker: a
    text: Or 'knowledge of holy ones.' The Greek phrase can refer either to sacred things or to holy persons/beings.
    reason: alternative_reading
  - marker: b
    text: Literally 'multiplied his toils/pains'; here likely meaning the yield or gains associated with his labor, since the context describes Wisdom’s beneficence.
    reason: lexical_alternative
