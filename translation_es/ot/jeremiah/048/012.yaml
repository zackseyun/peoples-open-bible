revisions:
- from: Por tanto, he aquí, vienen días, declara Yahvé, cuando enviaré contra él[a] a los que vierten; y lo verterán[b], vaciarán sus vasijas y romperán sus tinajas[c].
  to: Por tanto, vienen días, declara Yahvé, cuando le enviaré[a] a los que vierten; y lo verterán[b], vaciarán sus vasijas y romperán sus tinajas[c].
  rationale: Se ajusta ‘contra él’ a ‘le enviaré’ para reflejar mejor ל֥וֹ y seguir la decisión documentada del POB sin sobreinterpretar el matiz hostil. Se aligera el inicio para un español más natural y se corrige la nota textual sobre ‘sus tinajas’, que en el borrador estaba confusa y repetitiva.
