  from: I am the essence, and the one with the consort; those who are within my consort
    make me known.
  to: I am the substance, and the one who has no substance; those who exist outside
    my association are ignorant of me.
  rationale: Contains two severe mistranslations. First, `ⲧⲉⲧⲉ ⲙⲛ ⲧⲉⲥⲟⲩⲥⲓⲁ` is `ⲧⲉⲧⲉ
    ⲙⲛⲧⲉⲥ ⲟⲩⲥⲓⲁ` ("the one who has no substance"), not "with the consort". Second,
    `ⲉⲃⲟⲗ ϩⲛ` means "outside of", not "within", and `ⲥⲉⲣⲁⲧⲥⲟⲟⲩⲛ` is `ⲥⲉ-ⲣ-ⲁⲧⲥⲟⲟⲩⲛ`
    ("they are ignorant" - using the privative `ⲁⲧ-`), not a causative "make known"
    (which is grammatically impossible here).
