translation:
  language: es
  text: y oirás lo que dicen[a], y después se fortalecerán tus manos[b], y descenderás al campamento.” Así que él descendió con Purá, su siervo, hasta el borde de los hombres armados que estaban en el campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que están diciendo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «se harán fuertes tus manos»; la imagen hebrea conserva el valor de valor o ánimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: and you will hear
  chosen_spanish: oirás
  alternatives_spanish:
  - y oirás
  - y escucharás
  lexicon: HALOT
  rationale: El verbo שׁמע aquí pide una percepción auditiva directa de una conversación, y el futuro simple español transmite bien la secuencia de instrucciones sin sonar artificial.
- source_word: מַה יְדַבֵּרוּ
  english_pob_choice: what they are saying
  chosen_spanish: lo que ellos hablan
  alternatives_spanish:
  - lo que ellos dicen
  - lo que están diciendo
  lexicon: HALOT
  rationale: Se mantiene el contenido de lo escuchado sin forzar una progresión aspectual que el español no necesita. 'Hablan' preserva el acto de conversación inmediata en escena.
- source_word: וְאַחַר
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y después de eso
  lexicon: HALOT
  rationale: Marca la secuencia temporal de forma natural en español. 'Después' conserva la relación lógica entre oír y fortalecerse.
- source_word: תֶּחֱזַקְנָה יָדֶיךָ
  english_pob_choice: your hands will be strengthened
  chosen_spanish: se fortalecerán tus manos
  alternatives_spanish:
  - tus manos se fortalecerán
  - te fortalecerás
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de las manos fortalecidas, que en este contexto expresa valor y resolución. No se reduce a una paráfrasis abstracta como 'serás fortalecido'.
- source_word: וְיָרַדְתָּ בַּמַּחֲנֶה
  english_pob_choice: and you will go down into the camp
  chosen_spanish: y descenderás al campamento
  alternatives_spanish:
  - y bajarás al campamento
  - y descenderás al campamento
  lexicon: HALOT
  rationale: ירד literalmente es 'descender/bajar'. 'Al campamento' comunica en español el movimiento hacia el recinto militar sin exigir una preposición demasiado literal que suene extraña.
- source_word: וַיֵּרֶד הוּא
  english_pob_choice: So he went down
  chosen_spanish: Así que él descendió
  alternatives_spanish:
  - Y él descendió
  - Entonces descendió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte con una conexión fluida. 'Así que' refleja bien la consecuencia de la instrucción previa.
- source_word: וּפֻרָה
  english_pob_choice: Purah
  chosen_spanish: Purá
  alternatives_spanish:
  - Pura
  lexicon: transliteración convencional en español
  rationale: Se adapta el nombre propio a la grafía española con acento para la pronunciación natural, sin alterar la identidad del personaje.
- source_word: נַעֲרוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su servidor
  - su asistente
  lexicon: HALOT
  rationale: Aunque נַעַר puede significar 'joven', el audit trail inglés revisado prefirió 'servant' por naturalidad y contexto. En español 'siervo' conserva la relación de subordinación sin introducir una función eclesiástica ajena.
- source_word: אֶל קְצֵה
  english_pob_choice: to the edge of
  chosen_spanish: hasta el borde de
  alternatives_spanish:
  - a la orilla de
  - hasta el extremo de
  lexicon: HALOT
  rationale: '''Borde'' expresa bien קצה en sentido espacial y táctico. ''Hasta'' conserva el desplazamiento hasta ese límite.'
- source_word: הַחֲמֻשִׁים
  english_pob_choice: the armed men
  chosen_spanish: los hombres armados
  alternatives_spanish:
  - los armados
  - las tropas armadas
  lexicon: HALOT
  rationale: El participio designa a quienes están equipados para la guerra. 'Hombres armados' es claro en español y preserva el matiz militar sin convertirlo en un término técnico distinto.
- source_word: אֲשֶׁר בַּמַּחֲנֶה
  english_pob_choice: who were in the camp
  chosen_spanish: que estaban en el campamento
  alternatives_spanish:
  - que se hallaban en el campamento
  - que estaban en el campamento
  lexicon: HALOT
  rationale: Se mantiene la identificación de esos hombres como los que se encontraban dentro del campamento, con una formulación natural para lectores contemporáneos.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que prefirió 'his servant' para נַעֲרוֹ en lugar de 'his young man', y conserva la estructura narrativa y las dos notas alternativas donde el español también admite matices relevantes.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene 'campamento' para מַחֲנֶה y 'hombres armados' para הַחֲמֻשִׁים, evitando sobretraducciones como 'tropas' salvo que el contexto lo exija.
  - Se conserva la imagen corporal 'manos' en vez de neutralizarla, porque forma parte del idiomático hebreo y del énfasis en el ánimo para la acción.
