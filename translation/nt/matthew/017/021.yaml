id: MAT.17.21
reference: Matthew 17:21
source:
  edition: robinson-pierpont-2005-byzantine
  text: Τοῦτο δὲ τὸ γένος οὐκ ἐκπορεύεται εἰ μὴ ἐν προσευχῇ καὶ νηστείᾳ.
  language: Greek
translation:
  text: But[a] this kind does not come out except by prayer and fasting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the
      4th-century Sinaiticus and Vaticanus) and early Syriac and Coptic translations,
      but is present in the Byzantine majority tradition, the Latin tradition, and
      most Syriac witnesses. It was likely added by later scribes to harmonize with
      Mark 9:29.
    reason: textual_critical
lexical_decisions:
- source_word: γένος
  chosen: kind
  alternatives:
  - sort
  - race
  - family
  lexicon: BDAG
  rationale: In this context, referring to a category or class of demons, 'kind' is
    the standard and most accurate English equivalent.
- source_word: ἐκπορεύεται
  chosen: come out
  alternatives:
  - go out
  - depart
  lexicon: BDAG
  rationale: Refers to the expulsion of the demon from the afflicted person; 'come
    out' captures the directional movement naturally in English.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - if not
  - unless
  lexicon: BDAG
  rationale: Functions as an exclusive particle phrase here, best rendered as 'except'
    before the prepositional phrase.
