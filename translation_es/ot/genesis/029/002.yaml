    issue: «abrevarían» para יַשְׁקוּ
    rationale: El hebreo permite un presente/habitual narrativo-explicativo («abrevaban», «daban de beber»). El condicional en español puede sonar demasiado hipotético o futurizo. Conviene una forma habitual más directa.
  - severity: medium
    issue: Notas mal ancladas en el texto
    rationale: La nota sobre la repetición de «he aquí» no tiene ancla en el texto; la nota de עָלֶיהָ debe ir en «junto a él»; y la nota literal sobre «la boca del pozo» debe anclarse a esa frase. El requerimiento del proyecto exige que toda nota tenga marcador exacto en el texto.
  - severity: low
    issue: Nota d incompleta respecto al inglés auditado
    rationale: El inglés conserva la alternativa completa «for from that well they would water the flocks». En español conviene mantener la alternativa completa, no solo «darían de beber a los rebaños», para reflejar mejor el alcance de la variante expresiva.
