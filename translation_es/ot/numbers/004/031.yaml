  source_alignment_summary: 'El borrador español refleja bien la estructura y el inventario del hebreo: introduce la especificación del encargo de los meraritas, mantiene la noción concreta de lo que deben transportar, y enumera correctamente los componentes del tabernáculo. Sin embargo, ''responsabilidad de su carga'' suena algo abstracto y menos idiomático que el hebreo מִשְׁמֶרֶת מַשָּׂאָם, que expresa un encargo/deber relacionado con lo que llevan. También conviene ajustar la nota de ''marcos'' para que corresponda mejor al matiz inglés de ''boards of the tabernacle'' y al uso más natural en español bíblico.'
