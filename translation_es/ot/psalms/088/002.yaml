translation:
  language: es
  text: Oh Yahvé[a], Dios de mi salvación, de día clamo; de noche estoy delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “delante de ti”; la cláusula es elíptica, por lo que el español añade “estoy” para completar la idea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Oh Yahvé
  alternatives_spanish:
  - Oh Jehová
  - Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo como 'Yahvé', de acuerdo con la terminología POB. El vocativo '¡Oh' expresa la llamada directa en oración, como el inglés 'O'.
- source_word: אֱלֹהֵי
  english_pob_choice: God of
  chosen_spanish: Dios de
  alternatives_spanish:
  - mi Dios
  - el Dios de
  lexicon: HALOT
  rationale: La construcción hebrea introduce la relación posesiva con naturalidad en español como 'Dios de'. El contexto posterior define la posesión por la frase siguiente.
- source_word: יְשׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi rescate
  lexicon: HALOT
  rationale: '''Salvación'' preserva el campo semántico amplio del sustantivo hebreo y el registro teológico del salmo. ''Liberación'' o ''rescate'' especifican demasiado el tipo de auxilio.'
- source_word: יוֹם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - en el día
  - durante el día
  lexicon: HALOT
  rationale: En español, 'de día' funciona como adverbio temporal idiomático y mantiene el contraste con 'de noche'.
- source_word: צָעַקְתִּי
  english_pob_choice: I cry out
  chosen_spanish: clamo
  alternatives_spanish:
  - he clamado
  - grito
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía expresa una acción continuada o habitual en este lamento. 'Clamo' reproduce bien el valor presente/iterativo y el tono urgente; 'grito' pierde el matiz de súplica.
- source_word: בַּלַּיְלָה
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: '''De noche'' preserva el paralelismo con ''de día'' y suena natural en español contemporáneo.'
- source_word: נֶגְדֶּךָ
  english_pob_choice: I am before you
  chosen_spanish: estoy delante de ti
  alternatives_spanish:
  - estoy ante ti
  - estoy en tu presencia
  lexicon: HALOT
  rationale: El hebreo es una frase verbal implícita ('delante de ti'); en español se explicita con 'estoy' para completar la cláusula sin añadir contenido sustancial. 'Delante de ti' conserva la imagen espacial del original mejor que una paráfrasis abstracta.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: Se sigue la política POB de no ocultar el Tetragrámaton con una sustitución litúrgica. 'Yahvé' mantiene el nombre pactual revelado en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Frase final elíptica en hebreo
  english_pob_reading: at night I am before you
  chosen_spanish_reading: de noche estoy delante de ti
  alternative_spanish_readings:
  - de noche delante de ti
  - por la noche estoy en tu presencia
  rationale: El hebreo es una cláusula nominal elíptica; el español requiere verbo copulativo. 'Estoy delante de ti' explicita la elipsis con el mínimo añadido necesario y conserva el sentido de presencia orante.
  doctrine_reference: 'DOCTRINE.md: translation principles — preserve ellipsis with minimal supplied verbs'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y coincide sustancialmente con la auditoría inglesa: se conserva el nombre divino, el paralelismo temporal ''de día / de noche'' y la elipsis final se completa solo con el verbo mínimo necesario en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal para יהוה, en coherencia con el estándar POB en español.
  - '''De día / de noche'' conserva el paralelismo poético del hebreo y evita una prosa más explicativa.'
  - '''Estoy delante de ti'' es una expansión mínima requerida por la sintaxis española; no añade una interpretación devocional distinta.'
