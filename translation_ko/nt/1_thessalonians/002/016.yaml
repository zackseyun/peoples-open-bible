id: 1TH.2.16
reference: 1 Thessalonians 2:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κωλυόντων ἡμᾶς τοῖς ἔθνεσιν λαλῆσαι ἵνα σωθῶσιν, εἰς τὸ ἀναπληρῶσαι αὐτῶν τὰς ἁμαρτίας πάντοτε. ἔφθασεν δὲ ἐπ’ αὐτοὺς ἡ ⸀ὀργὴ εἰς τέλος.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/016.yaml
  text: by hindering us from speaking to the Gentiles so that they may be saved[a], so as always to fill up the measure of their sins[b]. But wrath has come upon them at last.
  footnotes:
  - marker: a
    text: "Or 'fully,' 'completely,' or 'to the end' for 'at last' (Greek: εἰς τέλος)."
    reason: lexical_alternative
  - marker: b
    text: '''Wrath'' likely refers to divine judgment, but Paul does not specify here whether he means a present historical judgment, final judgment, or both.'
    reason: alternative_reading
translation:
  language: ko
  text: 또한 그들은 이방인들이 구원받도록 우리가 그들에게 말하는 것을 막아, 자기들의 죄를 언제나 가득 채워 가고 있습니다. 그러나 진노가 마침내[a] 그들 위에 임하였습니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「온전히」, 「끝까지」. 헬라어 εἰς τέλος.
    reason: lexical_alternative
  - marker: b
    text: 「진노」는 신적 심판을 가리키나, 바울이 현재 역사적 심판인지 최종 심판인지 혹은 둘 다인지 본문에서 명시하지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: κωλυόντων ἡμᾶς ... λαλῆσαι
  english_pob_choice: hindering us from speaking
  chosen_korean: 우리가 ... 말하는 것을 막아
  alternatives_korean:
  - 우리가 말하지 못하도록 가로막으며
  - 우리가 전하는 것을 방해하여
  lexicon: BDAG
  rationale: κωλύω의 「막다·방해하다」 의미. 「막다」가 가장 자연스럽다.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_korean: 이방인들에게
  alternatives_korean:
  - 열방에게
  - 이방 민족들에게
  lexicon: BDAG
  rationale: 한국 교회 전통의 「이방인」을 채택한다.
- source_word: ἵνα σωθῶσιν
  english_pob_choice: so that they may be saved
  chosen_korean: 구원받도록
  alternatives_korean:
  - 구원에 이르도록
  - 구원을 얻도록
  lexicon: BDAG
  rationale: σῴζω 수동 가정법. 「구원받다」가 표준이다.
- source_word: εἰς τὸ ἀναπληρῶσαι αὐτῶν τὰς ἁμαρτίας πάντοτε
  english_pob_choice: so as always to fill up the measure of their sins
  chosen_korean: 자기들의 죄를 언제나 가득 채워 가고 있습니다
  alternatives_korean:
  - 그들의 죄의 분량을 항상 채워 가고 있습니다
  - 늘 자기들의 죄를 가득 채워 가고 있습니다
  lexicon: BDAG
  rationale: ἀναπληρόω의 「가득 채우다」 의미와 πάντοτε의 「언제나」를 보존하여 행위의 누적적·지속적 성격을 담는다.
- source_word: ἔφθασεν ... ἡ ὀργὴ εἰς τέλος
  english_pob_choice: wrath has come upon them at last
  chosen_korean: 진노가 마침내 그들 위에 임하였습니다
  alternatives_korean:
  - 진노가 그들에게 끝까지 이르렀습니다
  - 진노가 그들 위에 온전히 임하였습니다
  lexicon: BDAG
  rationale: φθάνω의 「이르다·임하다」와 εἰς τέλος의 「마지막까지·마침내」를 함께 옮긴다. 종말론적 좁힘을 피하고 본문 무게를 보존한다.
theological_decisions:
- issue: ἡ ὀργή 「진노」의 함의
  chosen_reading: 「진노가 마침내 그들 위에 임하였습니다」로 보존
  alternative_readings:
  - 현재 역사적 심판
  - 최종 종말론적 심판
  - 양자 모두
  rationale: 본문은 「진노」의 정확한 시점·범위를 명시하지 않는다. 본 번역은 어휘 자체를 보존하고 시점·범위 해석은 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
