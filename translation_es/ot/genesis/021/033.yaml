revisions:
- from: Y plantó un tamarisco en Beerseba[a], y allí invocó el nombre de Yahvé[b], Dios eterno.
  to: Y plantó un tamarisco en Beerseba[a], y allí invocó a Yahvé, el Dios eterno[b].
  rationale: Se ajusta la fórmula cultual a un español más natural («invocó a Yahvé») mientras la nota preserva la amplitud semántica del hebreo y las alternativas documentadas por el POB. También se revisa אֵל עוֹלָם a «el Dios eterno», que en español refleja mejor el valor titular; la nota conserva la alternativa más breve.
