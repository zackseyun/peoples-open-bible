id: MAT.10.5
reference: Matthew 10:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τούτους τοὺς δώδεκα ἀπέστειλεν ὁ Ἰησοῦς παραγγείλας αὐτοῖς λέγων· Εἰς ὁδὸν ἐθνῶν μὴ ἀπέλθητε καὶ εἰς πόλιν Σαμαριτῶν μὴ εἰσέλθητε·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/005.yaml
  text: 'Jesus sent out these twelve, instructing them, saying, “Do not go on the road to the Gentiles, and do not enter a town of the Samaritans.”'
  footnotes:
  - marker: a
    text: Or “into the way of the Gentiles.” The Greek expression is more literally road/path language and likely refers to heading toward Gentile territory.
    reason: lexical_alternative
  - marker: b
    text: Or “a Samaritan town.”
    reason: lexical_alternative
translation:
  language: ko
  text: '예수님이 이 열둘을 보내시며 그들에게 명하여 말씀하셨습니다. 「이방인의 길로 가지 말고, 사마리아인의 동네에도 들어가지 말라.'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 10:5의 이방인·사마리아 사역 제한 (선교 우선순위)
  chosen_reading: 본문 그대로 「이방인의 길로 가지 말고 ... 들어가지 말라」
  alternative_readings:
  - 「먼저는 유대인에게」 식의 완화
  rationale: 예수님이 12제자를 처음 파송할 때 이스라엘 집의 잃은 양에게 한정하신 명령으로, 28:19의 만민 파송과는 구속사적 단계가 다르다. 한국 전통 번역의 「가지 말고 ... 들어가지 말라」 어조를 유지하여 강한 금지 명령을 보존한다.
  doctrine_reference: 'DOCTRINE.md: §1 원어 우선; §5 본문이 말한 강도를 그대로 옮긴다'
