review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del sentido del griego: στέφανος → «corona», γερόντων → «los ancianos», πολυπειρία → «mucha experiencia», y φόβος Κυρίου → «el temor del Señor». Sin embargo, καύχημα se acerca mejor a «jactancia», «motivo de orgullo» o «motivo de gloria» que a «gloria» sin más; «gloria» debilita el matiz de aquello en que uno se gloría/boasta y se aparta de la decisión auditada en inglés («boast»).'
  spanish_quality_summary: 'El español es legible y digno, pero hay un problema formal importante: el texto usa un marcador [m] fuera de secuencia alfabética y añade una nota estilística no necesaria. Además, «es mucha experiencia» suena algo rígido; «es la mucha experiencia[a]» sería menos natural, así que conviene mantener la forma simple pero corregir el segmento de καύχημα para mayor precisión semántica y mejor paralelismo.'
  glossary_alignment: 'Alineación parcial con la terminología del proyecto. «el Señor» para Κυρίου es aceptable aquí por tratarse de κύριος en el testimonio griego, y «temor» preserva bien φόβος. La principal desviación es καύχημα → «gloria», que no sigue de cerca la decisión léxica inglesa ni el valor normal del término. También debe corregirse la disciplina de notas al pie: marcadores únicos y en orden.'
  issues:
  - severity: medium
    issue: καύχημα está vertido como «gloria»
    rationale: El griego denota «boast», «motivo de jactancia» o aquello en que uno se gloría. «Gloria» sola desplaza el sentido hacia honor abstracto y atenúa la fuerza retórica presente en el original y en la auditoría inglesa.
  - severity: medium
    issue: Marcador de nota [m] indebido y fuera de orden
    rationale: Las instrucciones requieren marcadores únicos en orden (a, b, c...). El borrador usa [m] para una nota estilística prescindible, aunque solo hay otra nota [a]. Esto incumple la disciplina de notas.
  - severity: low
    issue: Nota estilística sobre «corona» innecesaria
    rationale: La elección «corona» ya es natural y fiel; no hace falta una nota adicional salvo que preserve una alternativa significativa del original o resuelva una ambigüedad real.
  revised_spanish_text: La corona de los ancianos es mucha experiencia[a], y su motivo de gloria es el temor del Señor.
  revised_footnotes:
  - marker: a
    text: O «gran experiencia» o «amplia experiencia». El griego πολυπειρία subraya una experiencia extensa adquirida con el tiempo.
    reason: lexical_alternative
