review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: ''y sus hermanos'', ''jefes de casas paternas'', el total numérico, y la cadena genealógica con ''hijo de''. También conserva adecuadamente la transliteración principal de los nombres. Sin embargo, una nota al pie numérica no coincide con el hebreo ni con la auditoría inglesa: el hebreo dice ''doscientos cuarenta y dos'', no ''cuarenta y dos''. Además, la nota [a] está mal anclada, porque comenta ''jefes de casas paternas'' pero aparece en ''hermanos''.'
  spanish_quality_summary: 'El español principal es claro, natural y digno para una lista genealógica. ''Jefes de casas paternas'' suena bien en español bíblico moderno. La puntuación funciona. El problema principal es de aparato crítico: colocación inadecuada de una nota y contenido erróneo de otra.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios y la genealogía están bien conservados. 'Casas paternas' respeta la racionalidad léxica documentada para רָאשִׁים לְאָבוֹת.
  issues:
  - severity: high
    issue: La nota [b] sobre el número es incorrecta.
    rationale: 'El hebreo מָאתַיִם אַרְבָּעִים וּשְׁנָיִם significa ''doscientos cuarenta y dos''. La nota actual dice ''Hebreo: “cuarenta y dos”'', lo cual altera el sentido del texto fuente.'
  - severity: medium
    issue: La nota [a] está anclada en 'hermanos' pero explica 'jefes de casas paternas'.
    rationale: Las instrucciones requieren que cada nota se ancle exactamente en la palabra o frase relevante. La explicación sobre la estructura social hebrea corresponde a 'jefes de casas paternas', no a 'sus hermanos'.
  - severity: low
    issue: La nota [a] no preserva bien la alternativa documentada en la auditoría inglesa para 'brothers'.
    rationale: La auditoría inglesa sí incluye una nota léxica en 'brothers' con alternativas como 'kinsmen'. En español conviene mantener una nota correspondiente sobre 'hermanos'/'parientes', y separar esa nota de la observación sobre 'casas paternas'.
  revised_spanish_text: y sus hermanos[a], jefes de casas paternas, 242[b]; y Amashsai[c], hijo de Azarel, hijo de Ahzai, hijo de Meshillemoth, hijo de Immer.
  revised_footnotes:
  - marker: a
    text: 'O: ''sus parientes''. El hebreo también puede referirse a asociados o miembros del mismo grupo familiar o sacerdotal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''doscientos cuarenta y dos''.'
    reason: lexical_alternative
  - marker: c
    text: También puede transliterarse 'Amasai'.
    reason: alternative_reading
