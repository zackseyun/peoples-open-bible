translation:
  language: es
  text: Entonces Moisés se levantó y fue a Datán y Abiram[a], y los ancianos de Israel fueron tras él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los ancianos de Israel fueron detrás de él». El hebreo dice más literalmente: «fueron tras él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El verbo קום en secuencia narrativa expresa que Moisés se incorporó para actuar; en español, «se levantó» comunica ese movimiento inicial de manera natural y sin sobretraducción.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - partió
  lexicon: HALOT
  rationale: הלך indica desplazamiento narrativo hacia un destino; «fue» es la equivalencia más sobria y transparente en español para este contexto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia personas; en español, «a» reproduce de forma natural esa dirección sin añadir matiz innecesario.
- source_word: דָּתָן וַאֲבִירָם
  english_pob_choice: Dathan and Abiram
  chosen_spanish: Datán y Abiram
  alternatives_spanish:
  - Datán y Abirán
  lexicon: standard transliteration
  rationale: Se transliteran los nombres propios con ortografía española habitual. «Datán» mantiene la acentuación para la pronunciación en español; «Abiram» se conserva conforme al nombre hebreo.
- source_word: וַיֵּלְכ֥וּ אַחֲרָיו
  english_pob_choice: went after him
  chosen_spanish: fueron tras él
  alternatives_spanish:
  - iban detrás de él
  - lo siguieron
  lexicon: HALOT
  rationale: El hebreo dice literalmente «fueron tras él»; esta opción conserva la imagen espacial y evita colapsar el giro en una sola idea más interpretativa como «lo siguieron».
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los mayores de Israel
  - los ancianos israelitas
  lexicon: HALOT
  rationale: La construcción constructa se refiere al grupo reconocido de liderazgo. «Ancianos» es el equivalente tradicional y preciso en español, y mantiene la fuerza institucional del término.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada concuerdan estrechamente; no se detectaron revisiones posteriores que alteren el sentido. Se conservó la progresión narrativa con marcador temporal inicial («Entonces») y la imagen direccional del hebreo en «fueron tras él».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en contextos vecinos, conforme a la política del proyecto; este versículo no lo contiene.
  - Se mantiene un registro bíblico claro y contemporáneo, evitando tanto arcaísmos como paráfrasis interpretativas.
  - La transliteración de nombres propios sigue el uso español corriente, con acentuación gráfica cuando ayuda a la pronunciación.
