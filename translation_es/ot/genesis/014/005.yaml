revisions:
- from: En el año catorce[a], Kedorlaomer[b] vino con los reyes que estaban con él, y derrotaron a los refaítas en Astarot-qarnaim, a los zuzim[c] en Ham, y a los emitas en Save-quiriataim[d].
  to: En el decimocuarto año, Kedorlaomer[a] vino con los reyes que estaban con él, y derrotaron a los Refaím[b] en Asterot-carnaim, a los Zuzim en Ham, y a los Emim en Save-quiriataim[c].
  rationale: Se ajusta el marco temporal a una forma ordinal más natural en español («decimocuarto año»), se reubica correctamente la nota sobre «gigantes» en Refaím, y se preservan los etnónimos como nombres de pueblo en vez de convertirlos en gentilicios castellanos. También se normalizan los topónimos compuestos para una transliteración más coherente y legible en español eclesial moderno.
  reviewer_model: gpt-5.4
