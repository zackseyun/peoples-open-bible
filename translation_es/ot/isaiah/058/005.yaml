translation:
  language: es
  text: '¿Es este el ayuno que yo escojo: un día para que una persona se humille?[a] ¿Es para inclinar su cabeza como un junco,[b] y para extender cilicio y ceniza? ¿Llamarás a esto ayuno, y un día aceptable a Yahvé?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un día para que un hombre se aflija». El hebreo idiomáticamente habla de afligirse a sí mismo, especialmente en contextos de ayuno.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como una caña» o «como un carrizo». El hebreo designa una planta de pantano; la imagen apunta a doblar la cabeza de manera visible y externa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צ֣וֹם
  english_pob_choice: fast
  chosen_spanish: ayuno
  alternatives_spanish:
  - ayunar
  - ayuno (como práctica)
  lexicon: HALOT
  rationale: El sustantivo designa la práctica o jornada de ayuno. En español, 'ayuno' es el equivalente natural y mantiene bien la fuerza nominal en ambas ocurrencias.
- source_word: אֶבְחָרֵ֔הוּ
  english_pob_choice: that I choose
  chosen_spanish: que yo escogí
  alternatives_spanish:
  - que yo elijo
  - que yo escojo
  lexicon: HALOT
  rationale: בחר expresa elegir/escoger. Dado el marco retórico del versículo, el pretérito 'escogí' suena natural en español y conserva la pregunta evaluativa divina sin añadir matiz interpretativo.
- source_word: עַנּ֥וֹת אָדָ֖ם נַפְשׁ֑וֹ
  english_pob_choice: to humble himself
  chosen_spanish: para que una persona se humille
  alternatives_spanish:
  - para afligirse
  - para negarse a sí misma
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático de 'afligir el alma', especialmente en contextos de ayuno. En español, 'se humille' comunica la postura penitencial de manera clara; la alternativa más literal 'afligirse' queda registrada como lectura posible.
- source_word: עַנּ֥וֹת אָדָ֖ם נַפְשׁ֑וֹ
  english_pob_choice: a day for a person to humble himself
  chosen_spanish: una persona
  alternatives_spanish:
  - un hombre
  - alguien
  lexicon: HALOT
  rationale: אָדָם es singular masculino gramatical con valor representativo. En español, 'una persona' mantiene el sentido genérico y resulta más natural que una marcación masculina no motivada por el contexto inmediato.
- source_word: הֲ/לָ/כֹ֨ף
  english_pob_choice: to bow down
  chosen_spanish: inclinar
  alternatives_spanish:
  - doblar
  - agachar
  lexicon: HALOT
  rationale: El infinitivo expresa la acción externa de inclinarse o doblarse. 'Inclinar' es fiel y fluido en español y conserva el contraste con el ayuno meramente exterior.
- source_word: כְּ/אַגְמֹ֜ן
  english_pob_choice: like a reed
  chosen_spanish: como un junco
  alternatives_spanish:
  - como una caña
  - como un carrizo
  - como un junco de pantano
  lexicon: HALOT
  rationale: אגמון puede referirse a una planta de pantano como junco/caña/carrizo. 'Junco' es claro en español y suficientemente amplio; se preserva la nota de lectura alternativa en el pie de página.
- source_word: וְ/שַׂ֤ק
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco de tela áspera
  - tela áspera
  lexicon: HALOT
  rationale: En lenguaje bíblico y eclesial, 'cilicio' comunica el signo de duelo y humillación asociado al término. Aunque 'sackcloth' puede traducirse literalmente como 'tela áspera', 'cilicio' es el equivalente tradicional más reconocido en español.
- source_word: וָ/אֵ֨פֶר֙
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  lexicon: HALOT
  rationale: El sentido léxico es 'ashes'. En español, 'ceniza' funciona como sustantivo colectivo más natural en esta construcción, sin perder la referencia simbólica.
- source_word: יַצִּ֔יעַ
  english_pob_choice: to spread out
  chosen_spanish: extender
  alternatives_spanish:
  - desplegar
  - poner
  lexicon: HALOT
  rationale: El hifil de יצע aquí se refiere a extender o disponer algo bajo uno mismo. 'Extender' es idiomático y reproduce bien la imagen de poner cilicio y ceniza como lecho o soporte.
- source_word: תִּקְרָא
  english_pob_choice: will you call
  chosen_spanish: llamarás
  alternatives_spanish:
  - llamas
  - proclamarás
  lexicon: HALOT
  rationale: La forma imperfecta en pregunta retórica se rinde naturalmente con 'llamarás'. Mantiene el desafío profético dirigido al oyente.
- source_word: רָצ֖וֹן
  english_pob_choice: acceptable
  chosen_spanish: agradable
  alternatives_spanish:
  - aceptable
  - de agrado
  lexicon: HALOT
  rationale: En la expresión 'día de favor/aceptación para Yahvé', 'agradable' comunica la idea de lo que es conforme al agrado divino. Se preserva así el valor relacional del término sin forzar una fórmula jurídica rígida.
- source_word: לַ/יהוָֽה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Siguiendo la política del proyecto, el Tetragrámaton se vierte como 'Yahvé' en el texto principal. La preposición se expresa de forma natural en español como 'a' en esta construcción evaluativa.
theological_decisions:
- issue: Cómo verter el idiomático ענה נפש en un contexto de ayuno
  english_pob_reading: a day for a person to humble himself
  chosen_spanish_reading: un día para que una persona se humille
  alternative_spanish_readings:
  - un día para afligirse
  - un día para negarse a sí misma
  rationale: El versículo critica la piedad meramente externa. 'Se humille' transmite la postura penitencial que el contexto exige, mientras que 'afligirse' conserva la literalidad idiomática pero suena más áspero; por eso puede mantenerse como alternativa documentada.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tratamiento del sujeto genérico אָדָם
  english_pob_reading: a person
  chosen_spanish_reading: una persona
  alternative_spanish_readings:
  - un hombre
  - alguien
  rationale: El hebreo usa un singular genérico. En español, 'una persona' preserva la referencia representativa sin masculinizar innecesariamente el enunciado; 'un hombre' queda como alternativa más literal, pero menos natural aquí.
  doctrine_reference: Translation philosophy §4
- issue: ¿Traducir אֶבְחָרֵהוּ con presente o pasado en la pregunta retórica?
  english_pob_reading: that I choose
  chosen_spanish_reading: que yo escogí
  alternative_spanish_readings:
  - que yo elijo
  - que yo escojo
  rationale: Aunque el inglés POB usa presente, el español suena más natural con pretérito en una pregunta evaluativa formulada como examen del ayuno ya propuesto. No cambia el contenido básico de la elección divina ni el tono retórico.
  doctrine_reference: Translation philosophy §1
- issue: Equivalente de שַׂק en español bíblico
  english_pob_reading: sackcloth
  chosen_spanish_reading: cilicio
  alternative_spanish_readings:
  - tela áspera
  - saco de tela áspera
  rationale: '''Cilicio'' es el término bíblico tradicional en español para la señal de duelo/humillación asociada al hebreo. Aunque es más eclesial que literal, mantiene con precisión la función simbólica del objeto en este contexto.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El auditorio inglés pasó de ''a man'' a ''a person'' por naturalidad genérica, manteniendo la singularidad representativa. Para el español, se adoptó de entrada ''una persona'' por la misma razón. También se conservó la estructura retórica general del inglés POB, pero con ajustes idiomáticos necesarios: ''humble himself'' > ''se humille'', ''like a reed'' > ''como un junco'', y ''acceptable to Yahweh'' > ''día agradable a Yahvé''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la convención del proyecto para יהוה.
  - Se prefirió 'ayuno' como sustantivo en ambas preguntas, coherente con el valor nominal de צ֣וֹם.
  - '''Cilicio'' se emplea como equivalente bíblico tradicional de שַׂק, sin perder la nota de duelo/humillación.'
  - '''Ceniza'' se usó en singular colectivo como forma natural en español; el plural ''cenizas'' queda como alternativa léxica.'
  - '''Una persona'' conserva el valor genérico de אָדָם sin imponer masculino específico.'
  - Las notas a pie preservan la alternativa léxica de 'junco' y la posible lectura nominal de 'ayuno' como rito.
