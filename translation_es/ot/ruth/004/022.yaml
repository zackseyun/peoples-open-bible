translation:
  language: es
  text: Y Obed engendró a Jesé[a], y Jesé engendró a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue padre de»; el hebreo genealógico suele usar un verbo que puede expresarse así o como «engendró».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: HALOT
  rationale: La conjunción une esta nota genealógica final con la lista anterior; en español, «Y» es el equivalente más natural y directo en una genealogía.
- source_word: עֹבֵד
  english_pob_choice: Obed
  chosen_spanish: Obed
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar; no hay motivo para traducirlo.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En genealogías, el verbo expresa la relación de paternidad/engendramiento. «Engendró» preserva esa fuerza genealógica de forma natural en español y evita una paráfrasis más débil.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce de manera independiente]'
  lexicon: HALOT
  rationale: Marcador de objeto directo sin equivalente independiente en español; su función queda absorbida por la sintaxis española.
- source_word: יִשָׁי / יִשַׁי
  english_pob_choice: Jesse
  chosen_spanish: Jesé
  alternatives_spanish:
  - Yishai
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional y reconocible «Jesé», que corresponde al nombre bíblico estándar en español.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: HALOT
  rationale: Nombre propio con forma castellana estándar; se conserva sin cambios.
theological_decisions:
- issue: Verbo genealógico y alcance doctrinal
  english_pob_reading: fathered
  chosen_spanish_reading: engendró
  alternative_spanish_readings:
  - fue padre de
  - engendró a
  rationale: La línea es una genealogía simple que culmina en David. «Engendró» conserva el sentido biológico/genealógico del hebreo sin introducir matices doctrinales añadidos ni arcaísmos innecesarios.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el dossier inglés; el estado de la versión más reciente indica que no hubo cambios necesarios y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico sobrio y directo.
  - Se usa «Jesé» por consistencia con el nombre bíblico tradicional en español.
  - La puntuación con coma reproduce el paralelismo de la lista genealógica sin añadir énfasis interpretativo.
