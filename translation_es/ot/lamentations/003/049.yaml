    issue: Se cambió el singular hebreo 'mi ojo' a plural 'mis ojos' en el texto principal.
    rationale: El singular está explícito en עֵינִי y el POB inglés lo conservó por fidelidad formal. En español poético sigue siendo comprensible y digno, por lo que no hace falta suavizarlo en el cuerpo del texto.
  - severity: low
    issue: La elección 'se derraman' con 'mis ojos' es aceptable, pero no es la imagen más ajustada para un sujeto singular revisado.
    rationale: Con 'mi ojo', una formulación como 'corre' o 'fluye' refleja mejor נִגְּרָה y su imagen de fluir hacia abajo sin introducir 'lágrimas'.
  - severity: low
    issue: La nota actual explica solo la variación singular/plural y no preserva las alternativas léxicas del inglés POB para el resto del verso.
    rationale: El rastro de auditoría inglés conserva alternativas para 'cease/be still' y 'interruption/pause/respite/relief'; conviene mantenerlas en español en una nota compacta.
  revised_spanish_text: Mi ojo[a] corre y no cesa, sin interrupción.
