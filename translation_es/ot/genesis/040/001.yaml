translation:
  language: es
  text: Después[a] de estas cosas, el copero del rey de Egipto y el panadero pecaron contra su amo, el rey de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «Después de estos acontecimientos». La fórmula narrativa hebrea también puede traducirse más formalmente como «Y aconteció después de estas cosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחַר הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: After these things
  chosen_spanish: Después[a] de estas cosas
  alternatives_spanish:
  - Después de estos acontecimientos
  - Y aconteció después de estas cosas
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se conserva con una estructura natural en español. 'Después de estas cosas' mantiene el valor formal del hebreo sin volverlo excesivamente literal o arcaizante. La nota recoge la alternativa formal que el POB inglés preservó.
- source_word: מַשְׁקֵה
  english_pob_choice: the cupbearer
  chosen_spanish: el copero
  alternatives_spanish:
  - el copero principal
  - el mayordomo de bebidas
  lexicon: HALOT
  rationale: El término designa al servidor real encargado de servir la bebida. 'Copero' es el equivalente español claro y tradicionalmente comprensible. No se añade 'principal' porque no está explícito en este versículo.
- source_word: וְהָאֹפֶה
  english_pob_choice: the baker
  chosen_spanish: el panadero
  alternatives_spanish:
  - el hornero
  - el panadero real
  lexicon: HALOT
  rationale: El participio sustantivado significa simplemente 'el panadero'. 'Panadero' es natural en español y evita introducir una relación posesiva que el hebreo no expresa aquí. La revisión inglesa que quitó 'his' respalda esta decisión.
- source_word: חָטְאוּ
  english_pob_choice: sinned against
  chosen_spanish: pecaron contra
  alternatives_spanish:
  - ofendieron a
  - hicieron mal contra
  lexicon: HALOT
  rationale: Con la preposición que marca al agraviado, el verbo conserva su fuerza moral y relacional. 'Pecaron contra' reproduce bien esa carga en español y evita suavizarlo a mera desavenencia.
- source_word: לַאֲדֹנֵיהֶם
  english_pob_choice: against their master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su maestro
  lexicon: HALOT
  rationale: En el contexto de corte, 'señor' comunica la relación de superioridad humana sin la ambigüedad moderna de 'amo' y sin cargar con un matiz exclusivamente religioso. El posesivo singular en español resume el sentido colectivo de 'their'.
- source_word: לְמֶלֶךְ מִצְרָיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el rey egipcio
  lexicon: HALOT
  rationale: Se conserva la repetición formal del título real para reflejar el énfasis del hebreo. 'El rey de Egipto' es la correspondencia más directa y coincide con el audit trail inglés.
theological_decisions:
- issue: Valor moral y relacional de חטא con יעד humano (pecar contra alguien)
  english_pob_reading: sinned against their master
  chosen_spanish_reading: pecaron contra su señor
  alternative_spanish_readings:
  - ofendieron a su señor
  - hicieron mal contra su señor
  rationale: No se diluye la fuerza moral del verbo en una mera ofensa social. 'Pecaron contra' mantiene que hubo culpa real y que el daño recayó sobre una autoridad humana concreta.
  doctrine_reference: Hamartiología bíblica; responsabilidad moral ante autoridades humanas
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó el posesivo en 'the baker' para no introducir en español ningún equivalente posesivo; por eso se traduce simplemente 'el panadero'. También se respetó la decisión auditada de conservar la fórmula narrativa formal sin expandirla innecesariamente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto cuando no aparece el nombre divino en este versículo; por tanto no afecta al texto.
  - '''Señor'' se emplea aquí solo como traducción de אדון en un contexto humano, no como título divino.'
  - Se mantuvo el paralelismo 'el rey de Egipto' en ambas ocurrencias para reflejar la repetición hebrea.
