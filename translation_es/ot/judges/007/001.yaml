    rationale: Aunque puede reflejar גִּבְעָה, 'colina' es más ampliamente comprensible en español neutro y mantiene bien el valor topográfico sin elevar el registro innecesariamente.
  revised_spanish_text: Entonces Jerobaal (es decir, Gedeón) y todo el pueblo que estaba con él se levantaron de madrugada y acamparon junto a la fuente[a] de Harod. El campamento de Madián estaba al norte de ellos, junto a la colina de Moreh en el valle.
  revised_footnotes:
