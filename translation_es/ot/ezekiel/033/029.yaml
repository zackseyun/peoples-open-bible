review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: resultado/consecuencia en «Entonces sabrán», contenido en «que yo soy Yahvé», circunstancia temporal en «cuando haga», y causa del juicio en «por... las abominaciones que han cometido». Sin embargo, «haga de la tierra» desplaza הָאָרֶץ «la tierra/la land» hacia una construcción menos natural y algo ambigua en español; «convierta la tierra en» o «haga de la tierra» no es imposible, pero aquí suena menos claro que una formulación directa. Además, el inglés auditado preserva una nota léxica para וּמְשַׁמָּה como posible «horror/espanto», y la nota española actual no corresponde a esa evidencia sino que introduce una alternativa gráfica del nombre divino no necesaria.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos problemas de calidad editorial: 1) la nota [a] sobre «Yahweh» no hace falta, porque el proyecto ya fija «Yahvé» como forma principal y no existe aquí una ambigüedad relevante que deba anotarse; 2) «haga de la tierra una desolación y una ruina» suena menos natural que «convierta la tierra en desolación y ruina» o «deje la tierra desolada y en ruinas». Conviene además conservar mejor la nota de matiz para el segundo sustantivo hebreo.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto en «Yahvé», «abominaciones» y el manejo general del juicio profético. No hay conflicto doctrinal. La excepción principal es de aparato crítico/nota: la nota española debería seguir la alternativa léxica del segundo sustantivo, no crear una nota sobre «Yahweh».'
  issues:
  - severity: medium
    issue: La nota actual [a] no sigue la evidencia auditada
    rationale: La nota inglesa documenta una alternativa léxica para «desolation and a waste / astonishment-horror», no una variante de transliteración del nombre divino. La nota española debería preservar esa información relevante del hebreo.
  - severity: medium
    issue: «haga de la tierra una desolación y una ruina» es poco natural y algo torpe
    rationale: Aunque comprensible, esta construcción suena forzada en español bíblico actual. El hebreo expresa poner la tierra en estado de desolación; «convierta la tierra en desolación y ruina» transmite mejor el sentido y lee con más claridad.
  - severity: low
    issue: «ruina» atenúa el matiz posible de espanto/horror del segundo sustantivo sin nota explicativa
    rationale: La elección principal puede ser aceptable, pero el expediente inglés preserva explícitamente la alternativa semántica de efecto espantoso. Conviene reflejarla en nota española.
  revised_spanish_text: Entonces sabrán que yo soy Yahvé, cuando convierta la tierra en desolación y ruina[a], por todas las abominaciones que han cometido.
  revised_footnotes:
  - marker: a
    text: O «desolación y espanto/horror». El segundo sustantivo hebreo puede subrayar no solo la ruina del país, sino también el efecto espantoso que esa ruina produce.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria sobre «Yahweh» para ajustarse al estándar del proyecto y se restaura la nota léxica realmente respaldada por la auditoría inglesa. También se mejora la naturalidad y precisión del español cambiando «haga de la tierra» por «convierta la tierra en».
