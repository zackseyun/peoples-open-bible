lexical_decisions:
- source_word: μάτην
  english_pob_choice: in vain
  chosen_korean: 헛되이
  lexicon: BDAG
  rationale: 정착된 한국어 부사. 예언적 판단의 어조를 보존한다.
- source_word: σέβονταί
