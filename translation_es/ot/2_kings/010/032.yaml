translation:
  language: es
  text: En aquellos días, Yahvé comenzó a recortar el territorio de Israel[a][b], y Hazael los derrotó en todo el territorio de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comenzó a cortar partes de Israel». El hebreo expresa el comienzo de una reducción de Israel, probablemente por pérdidas territoriales.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en todo el límite de Israel». La expresión hebrea puede referirse a frontera o territorio; aquí probablemente señala la extensión completa del dominio de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En ese tiempo
  - Por aquellos días
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula temporal idiomática. «En aquellos días» reproduce bien el giro y su tono narrativo sin endurecer el español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo como «Yahvé», de acuerdo con la política POB y la transparencia frente al Tetragrámaton.
- source_word: הֵחֵל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: HALOT
  rationale: El Hifil de החל marca el inicio de una acción; «comenzó» es el equivalente natural y fiel en español.
- source_word: לְקַצּוֹת
  english_pob_choice: to cut off parts of
  chosen_spanish: cortar partes de
  alternatives_spanish:
  - cortar de Israel
  - recortar a Israel
  - ir reduciendo a Israel
  lexicon: HALOT
  rationale: La imagen no apunta a destrucción total sino a una reducción progresiva. «Cortar partes de» conserva el valor metafórico de la raíz sin sobreinterpretar el alcance.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: at Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - en Israel
  - contra Israel
  lexicon: HALOT
  rationale: En español, el complemento más natural con «cortar partes» es «de Israel». Mantiene la idea de disminución territorial o fragmentación del pueblo/ámbito israelita.
- source_word: וַיַּכֵּם
  english_pob_choice: struck them down
  chosen_spanish: los golpeó
  alternatives_spanish:
  - los hirió
  - los abatió
  - los derrotó
  lexicon: HALOT
  rationale: נכה conserva una fuerza concreta de golpe/smiting. «Los golpeó» retiene esa literalidad; el contexto bélico permite inferir el daño sin añadir más de lo que dice el hebreo.
- source_word: חֲזָאֵל
  english_pob_choice: Hazael
  chosen_spanish: Hazael
  alternatives_spanish:
  - Jazael
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de modo estándar. No requiere adaptación semántica.
- source_word: בְּכָל גְּבוּל יִשְׂרָאֵל
  english_pob_choice: throughout all the territory of Israel
  chosen_spanish: en todo el territorio de Israel
  alternatives_spanish:
  - a lo largo de toda la frontera de Israel
  - por toda la frontera de Israel
  - en todo el límite de Israel
  lexicon: HALOT
  rationale: גְּבוּל puede significar frontera o territorio. Aquí el contexto militar-geográfico favorece «territorio», y «en todo» comunica la extensión completa de los ataques.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre divino como nombre propio, no como título sustitutivo. Esto mantiene la transparencia del original y la coherencia doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «cut off parts of Israel» frente a «cut away at Israel» para reflejar mejor לְקַצּוֹת. La versión española sigue esa decisión con una formulación que conserva la imagen de reducción progresiva y el paralelismo con la segunda cláusula.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar POB.
  - «Territorio» se usa para גְּבוּל porque en este contexto militar-geográfico no se trata solo de la línea fronteriza sino del ámbito completo afectado.
  - El pronombre objeto «los» en la segunda cláusula remite a Israelitas implícitos en el contexto; el hebreo también los omite explícitamente en el sujeto/objeto por economía narrativa.
