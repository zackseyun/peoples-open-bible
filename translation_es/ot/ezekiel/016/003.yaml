translation:
  language: es
  text: 'y dirás[a]: «Así dice el Señor Yahvé a Jerusalén: tu origen y tu nacimiento son de la tierra del cananeo; tu padre era amorreo, y tu madre, hitita».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con mayor fluidez, «de la tierra de Canaán». El hebreo dice más literalmente «de la tierra del cananeo», preservando el énfasis étnico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ / וְאָמַרְתָּ֞
  english_pob_choice: and say
  chosen_spanish: y dirás
  alternatives_spanish:
  - y di
  - y dirás entonces
  lexicon: HALOT
  rationale: 'La forma imperativa/indicativa de encargo profético se expresa de manera natural en español con futuro exhortativo: «y dirás». Conserva el valor de mandato introductorio sin sonar forzado.'
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Así dice el Señor
  lexicon: HALOT
  rationale: La fórmula profética queda mejor en presente en español; «Así dice» mantiene la vividez y el registro bíblico sin depender de una estructura arcaizante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva la combinación de título más nombre divino. El audit trail inglés usa «the Lord GOD» para distinguir אֲדֹנָי de יְהוָה; en español, «el Señor Yahvé» comunica ambos elementos sin el enmascaramiento «SEÑOR».
- source_word: לִירוּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - para Jerusalén
  - contra Jerusalén
  lexicon: HALOT
  rationale: La ל direccional marca al destinatario del oráculo. En español, «a Jerusalén» es la forma más directa y natural para introducir el destinatario.
- source_word: מְכֹרֹתַיִךְ
  english_pob_choice: your origin
  chosen_spanish: tu origen
  alternatives_spanish:
  - tu procedencia
  - tu fuente
  - tu ascendencia
  lexicon: HALOT
  rationale: Se conserva el sentido de procedencia/origen figurado que el inglés POB entendió correctamente. «Origen» en español evita reducir el término a una noción meramente comercial de «venta».
- source_word: מוֹלְדֹתַיִךְ
  english_pob_choice: your birth
  chosen_spanish: tu nacimiento
  alternatives_spanish:
  - tu nacimiento de origen
  - tu natividad
  - tu engendramiento
  lexicon: HALOT
  rationale: El paralelo con «origen» se refleja con «nacimiento», una equivalencia clara y digna que mantiene la fuerza del binomio hebreo.
- source_word: מֵאֶרֶץ הַכְּנַעֲנִי
  english_pob_choice: from the land of the Canaanite
  chosen_spanish: de la tierra del cananeo
  alternatives_spanish:
  - de la tierra de Canaán
  - de la tierra cananea
  lexicon: HALOT
  rationale: Se conserva el matiz étnico del singular gentilicio, tal como lo preserva la decisión inglesa. «Del cananeo» evita suavizarlo a «Canaán» y mantiene la tensión textual.
- source_word: הָאֱמֹרִי
  english_pob_choice: an Amorite
  chosen_spanish: amorreo
  alternatives_spanish:
  - un amorreo
  - el amorreo
  lexicon: HALOT
  rationale: 'Como predicado nominal en una genealogía figurada, el español puede omitir el artículo: «tu padre fue amorreo». Esto suena natural y conserva la fuerza étnica.'
- source_word: חִתִּית
  english_pob_choice: a Hittite
  chosen_spanish: hitita
  alternatives_spanish:
  - una hitita
  - la hitita
  lexicon: HALOT
  rationale: Se mantiene el gentilicio en forma breve y natural. El contexto exige una designación étnica, no una paráfrasis.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: La combinación hebrea reúne el título אֲדֹנָי con el nombre propio יְהוִה. La lectura española debe dejar visibles ambos componentes; por eso se evita reemplazar el nombre por una convención de ocultamiento y se usa «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Ancestría figurada de Jerusalén
  english_pob_reading: Render the genealogy language straightforwardly as metaphorical accusation without adding interpretive explanation into the main text.
  chosen_spanish_reading: Conservar el lenguaje de origen y parentesco como acusación figurada sin explicarlo dentro del versículo.
  alternative_spanish_readings:
  - tu ascendencia es cananea
  - tu origen moral es cananeo
  rationale: El hebreo usa parentesco shockeante para denunciar a Jerusalén. El español debe mantener esa dureza sin convertirla en paráfrasis explicativa que diluya el golpe retórico.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail inglés y conserva sus decisiones centrales: fórmula profética breve, nombre divino explícito como Yahvé, y el matiz étnico de «cananeo» sin suavizarlo. No se introdujeron cambios sustanciales respecto del análisis revisado.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y publicable, evitando calcos excesivamente rígidos.
  - «Señor Yahvé» preserva la distinción funcional del inglés «the Lord GOD» y es coherente con la política del proyecto para יְהוִה.
  - La frase «tu padre fue amorreo, y tu madre hitita» conserva la simetría y la dureza retórica del original.
