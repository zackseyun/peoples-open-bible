  yaml_path: translation/deuterocanon/2_maccabees/003/028.yaml
  text: The man who had just entered the treasury with much rushing about and all his guard[a], they carried out helpless, being completely incapacitated[c][b], having plainly recognized the sovereign power.
  footnotes:
  - marker: a
    text: Or 'with much pomp' for 'with great rushing about'; the Greek can suggest bustling display accompanying his entrance.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the previously mentioned treasury.'
    reason: lexical_alternative
  - marker: c
    text: The Greek phrase rendered 'being utterly incapacitated' is idiomatic and difficult; it conveys that he was completely brought low.
    reason: lexical_alternative
