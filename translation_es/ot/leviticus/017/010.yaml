translation:
  language: es
  text: Y cualquier hombre de la casa de Israel, o del forastero[a] que reside entre ellos, que coma sangre alguna, yo pondré mi rostro contra la persona[b] que coma la sangre, y la excluiré[c] de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extranjero residente entre ellos» o «forastero que vive entre ellos» para הַגֵּר הַגָּר בְּתוֹכָם.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la vida/persona que come»; aquí se usa «persona» para el individuo culpable en sentido jurídico.'
    reason: lexical_alternative
  - marker: c
    text: «Excluiré» traduce una fórmula de pena de pacto; el texto no especifica aquí si significa muerte, expulsión u otro juicio divino.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִישׁ אִישׁ
  english_pob_choice: And any man
  chosen_spanish: Y cualquier hombre
  alternatives_spanish:
  - Y cualquier persona
  - Y cualquier hombre, cualquiera
  lexicon: HALOT
  rationale: La duplicación de אִישׁ tiene fuerza distributiva/intensiva; «cualquier» transmite ese valor. Se conserva «hombre» para reflejar el matiz masculino-legal del hebreo y el encaje con el resto de la cláusula.
- source_word: מִבֵּית יִשְׂרָאֵל
  english_pob_choice: from the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de Israel
  - de entre Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión idiomática «casa de Israel» por su valor legal y de pacto, en lugar de reducirla a un simple «Israel».
- source_word: וּמִן הַגֵּר הַגָּר בְּתוֹכָם
  english_pob_choice: or from the sojourner who sojourns among them
  chosen_spanish: o del forastero que reside entre ellos
  alternatives_spanish:
  - o del forastero residente entre ellos
  - o del forastero que peregrina entre ellos
  lexicon: HALOT
  rationale: גֵּר designa al no israelita que vive dentro de la comunidad; «forastero que reside» evita tanto «extranjero» como «resident alien» y comunica la residencia estable sin perder el sentido legal.
- source_word: אֲשֶׁר יֹאכַל כָּל דָּם
  english_pob_choice: who eats any blood
  chosen_spanish: que coma cualquier sangre
  alternatives_spanish:
  - que coma sangre de cualquier clase
  - que ingiera sangre alguna
  lexicon: HALOT
  rationale: «Coma» reproduce el verbo ordinario de comer. «Cualquier sangre» refleja el alcance total de כָּל דָּם sin volver la frase más pesada.
- source_word: וְנָתַתִּי פָנַי
  english_pob_choice: I will set my face against
  chosen_spanish: yo pondré mi rostro contra
  alternatives_spanish:
  - yo volveré mi rostro contra
  - yo me opondré
  lexicon: HALOT
  rationale: Se conserva el idiomatismo antropomórfico del hebreo. «Pondré mi rostro contra» es transparente en español y mantiene la fuerza judicial de la expresión.
- source_word: בַּנֶּפֶשׁ הָאֹכֶלֶת
  english_pob_choice: against the person who eats
  chosen_spanish: contra la persona
  alternatives_spanish:
  - contra el alma
  - contra el individuo que come
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí señala al sujeto ofensor en sentido jurídico. «Persona» evita una lectura metafísica de «alma» y sigue la decisión auditada en inglés.
- source_word: אֶת הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - esa sangre
  - la sangre mencionada
  lexicon: HALOT
  rationale: En español, el artículo definido basta para remitir a la sangre prohibida ya mencionada. «La sangre» suena natural y conserva la referencia anafórica.
- source_word: וְהִכְרַתִּי אֹתָהּ
  english_pob_choice: and I will cut him off
  chosen_spanish: y la cortaré
  alternatives_spanish:
  - y la eliminaré
  - y la extirparé
  lexicon: HALOT
  rationale: Se preserva la fórmula legal de «cortar». Dado que el antecedente inmediato es «la persona» en español, el pronombre aparece en femenino por concordancia gramatical, sin cambiar la referencia al individuo culpable.
- source_word: מִקֶּרֶב עַמָּהּ
  english_pob_choice: from among his people
  chosen_spanish: de en medio de su pueblo
  alternatives_spanish:
  - de entre su pueblo
  - del seno de su pueblo
  lexicon: HALOT
  rationale: «De en medio de» reproduce מִקֶּרֶב con bastante literalidad y mantiene la fórmula de exclusión/castigo comunitario. «Su pueblo» sigue la concordancia natural en español para el referente individual.
theological_decisions:
- issue: Fórmula de castigo 'cut off'
  english_pob_reading: Retain the idiom 'cut off' without specifying the exact mode of judgment.
  chosen_spanish_reading: Conservar la fórmula «cortar» sin precisar el modo exacto del juicio.
  alternative_spanish_readings:
  - exterminará
  - lo quitará del pueblo
  - lo expulsará
  rationale: El hebreo emplea una fórmula legal-covenantal que deja abierto si el castigo implica muerte, expulsión o juicio divino. Traducirla con un verbo más explícito cerraría una tensión que el texto no resuelve aquí.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla más allá del hebreo.'
translation_notes:
  revision_awareness: 'Se siguió el trazado auditado del inglés POB sin traducir mecánicamente: se mantuvo la forma legal de «casa de Israel», el valor de גֵּר como residente no nativo y la fórmula penal «cortar» sin especificar su mecanismo. No se detectaron revisiones posteriores que alteraran la decisión base.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» en el proyecto como norma general, pero este versículo no contiene el tetragrámaton ni una cita explícita de κύριος.
  - Se mantuvo el registro jurídico-covenantal con sintaxis clara y moderna en español.
  - Los pronombres se ajustaron a la gramática española cuando el antecedente fue «persona», sin perder la referencia al ofensor masculino genérico del hebreo.
