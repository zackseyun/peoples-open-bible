revisions:
- from: Y colgó la cabeza cortada de Nicanor desde la acrópolis[a], visible para todos, y señal clara de la ayuda del Señor.
  to: Y colgó la cabeza cercenada[a] de Nicanor de la ciudadela[b], visible para todos y como una señal clara de la ayuda del Señor.
  rationale: Se ajusta ἄκρας a «ciudadela» para mayor fidelidad funcional y legibilidad en español, se añade la nota léxica correspondiente, y se mejora la sintaxis final con «como una señal clara» para reflejar naturalmente el doble predicado del griego. También se incorpora la alternativa léxica para προτομή, ya preservada en el audit trail inglés.
