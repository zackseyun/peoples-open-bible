  - marker: b
    text: «Lugar alto» se refiere a un sitio de culto elevado usado para la adoración.
    reason: cultural_note
  - marker: c
    text: O «no prevalecerá». Esta traducción hace explícito el sentido probable de que su oración no tendrá éxito.
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el texto principal porque representa fielmente el hebreo y el audit trail inglés. Solo se corrigen las notas para reflejar con precisión las alternativas documentadas: en [a], la apertura personal/impersonal de נִרְאָה; en [c], que «no prevalecerá» es alternativa explicativa, mientras que «no podrá» permanece como la lectura principal y más literal de יוּכָל.'
