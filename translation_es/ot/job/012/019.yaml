review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: sujeto divino implícito, ''sacerdotes'' para כֹּהֲנִים, ''despojados'' para שׁוֹלָל y ''los poderosos'' para אֵתָנִים. Sin embargo, מוֹלִיךְ en este contexto de juicio se alinea mejor con ''lleva ... cautivos'' o ''se lleva''/''lleva lejos'' que con el más débil ''lleva''. Además, el anclaje de notas no coincide con la práctica del POB inglés: la nota sobre la alternativa de כֹּהֲנִים no está justificada por la evidencia fuente, mientras que falta una nota para אֵתָנִים (''los duraderos/firmes/establecidos'').'
  spanish_quality_summary: El español es legible y digno, pero 'Él lleva a los sacerdotes despojados' suena algo poco natural y ambiguo en español, como si simplemente los transportara. 'Se lleva cautivos a los sacerdotes, despojados[a]' mejora la fuerza judicial y la fluidez. 'Derriba a los poderosos' es natural y adecuado. Conviene eliminar la nota innecesaria en 'sacerdotes' y trasladar la nota léxica al segundo hemistiquio.
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. 'Sacerdotes', 'despojados' y 'los poderosos' son apropiados. El único ajuste terminológico importante es reforzar מוֹלִיךְ con un matiz de llevarse/llevar cautivo para reflejar mejor 'leads away'. También debe preservarse en nota la alternativa de אֵתָנִים como 'los firmes/establecidos' según el rastro inglés.
  issues:
  - severity: medium
    issue: מֹולִיךְ quedó como 'lleva', demasiado débil para 'leads away' en contexto de humillación/jucio.
    rationale: El hebreo hiphil con el contexto de Job 12 presenta a Dios conduciendo a figuras prominentes fuera de su lugar de seguridad. 'Lleva' solo puede sonar neutral; 'se lleva cautivos' o 'lleva ... lejos' comunica mejor el despojo y la degradación.
  - severity: medium
    issue: La nota [a] sobre כֹּהֲנִים ('sacerdotes oficiales') no está respaldada por la decisión inglesa ni es necesaria en español.
    rationale: La auditoría inglesa escogió simplemente 'priests' y solo mencionó 'priestly officials' como alternativa léxica remota en decisiones internas, no como nota del texto. Añadirla como nota al lector español introduce una alternativa no preservada en el POB auditado.
  - severity: medium
    issue: Falta una nota para אֵתָנִים, que el POB inglés sí preservó con una alternativa significativa ('the enduring ones').
    rationale: La gama semántica de איתן incluye fuerza, firmeza y estabilidad. El español principal puede decir 'los poderosos', pero debe conservarse en nota la alternativa 'los firmes/establecidos' para reflejar la evidencia y la rationale documentada.
  revised_spanish_text: Él se lleva cautivos a los sacerdotes, despojados[a], y derriba a los poderosos[b].
  revised_footnotes:
  - marker: a
    text: O 'despojados de sus bienes'; también puede entenderse como 'saqueados' o 'desposeídos'.
    reason: lexical_alternative
  - marker: b
    text: O 'los firmes' o 'los establecidos', es decir, los que parecían estar sólidamente asentados.
    reason: lexical_alternative
  revision_rationale: Se fortaleció מוֹלִיךְ para reflejar mejor 'leads away' en un contexto de juicio y humillación. Se eliminó una nota innecesaria sobre 'sacerdotes' no sustentada por la presentación inglesa al lector, y se añadió la nota requerida para אֵתָנִים, preservando la alternativa semántica de firmeza/estabilidad documentada en la auditoría. El resto del verso se mantiene fiel, natural y claro en español.
