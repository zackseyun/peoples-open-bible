revisions:
- from: 'Así que enviaron un mensaje a José[a], diciendo: “Tu padre mandó antes de morir, diciendo:”.'
  to: 'Entonces enviaron un mensaje a José[a], diciendo: «Tu padre mandó antes de morir, diciendo,»'
  rationale: Se ajusta el conector inicial a uno más neutro para el vav narrativo ('Entonces'), y se mejora la puntuación del discurso citado para que el doble 'diciendo' refleje la estructura hebrea sin producir una clausura extraña con dos puntos al final dentro de las comillas. Se conserva la nota léxica sobre וַיְצַוּוּ y el sentido de 'mandó' para צִוָּה.
  reviewer_model: gpt-5.4
