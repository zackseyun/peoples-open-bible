    issue: Marcador de nota al pie anclado en la palabra equivocada
    rationale: La nota [a] explica alternativas para «Hades», pero en el texto está colocada después de «se angustió». Según las instrucciones, el marcador exacto debe aparecer en la palabra o frase relevante.
