translation:
  language: es
  text: 'Ahora, pues, hagan esto, porque Yahvé ha hablado acerca de David, diciendo: «Por la mano de mi siervo[a] David salvaré a mi pueblo Israel de la mano de los filisteos y de la mano de todos sus enemigos».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi esclavo». El hebreo עַבְדִּי puede denotar esclavo o siervo, pero en este contexto de comisión real-divina se traduce «mi siervo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «David, mi siervo, salvará a mi pueblo Israel de la mano de los filisteos y de la mano de todos sus enemigos». La forma hebrea puede entenderse con David como sujeto gramatical, en vez de Yahvé como el hablante implícito que actúa por medio de David.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: Como marcador discursivo de transición urgente, «ahora, pues» conserva el valor temporal y exhortativo sin sonar rígido en español.
- source_word: עֲשׂוּ
  english_pob_choice: do it
  chosen_spanish: hagan esto
  alternatives_spanish:
  - háganlo
  - actúen
  lexicon: HALOT
  rationale: El imperativo plural pide ejecutar la propuesta o instrucción; «hagan esto» conserva la referencia contextual sin volverla demasiado idiomática ni oscura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio según la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: אָמַר אֶל דָּוִד לֵאמֹר
  english_pob_choice: has spoken concerning David, saying
  chosen_spanish: ha hablado acerca de David, diciendo
  alternatives_spanish:
  - ha hablado a David, diciendo
  - ha dicho respecto de David, diciendo
  lexicon: HALOT
  rationale: «Acerca de David» refleja la lectura auditada de אֶל דָּוִד como referencia sobre David, no como destinatario directo. «Diciendo» conserva la fórmula de introducción del discurso citado.
- source_word: בְּיַד
  english_pob_choice: By the hand of
  chosen_spanish: Por la mano de
  alternatives_spanish:
  - Mediante
  - Por medio de
  lexicon: HALOT
  rationale: Se preserva el idiomático hebreo de agencia/instrumentalidad. «Por la mano de» suena natural en español bíblico sin borrar la imagen.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Dado que el texto fuente usa עבד y el POB inglés evitó suavizarlo con «servant» por defecto, «esclavo» mantiene la fuerza léxica de dependencia y pertenencia. En este contexto, la tensión entre servicio comisionado y condición de esclavo se conserva sin resolverla artificialmente.
- source_word: הוֹשִׁיעַ
  english_pob_choice: I will save
  chosen_spanish: salvaré
  alternatives_spanish:
  - libraré
  - rescataré
  lexicon: HALOT
  rationale: 'Se traduce en primera persona singular conforme a la lectura auditada: es Yahvé quien habla y actúa mediante David, afirmando su iniciativa salvadora.'
- source_word: עַמִּי יִשְׂרָאֵל
  english_pob_choice: my people Israel
  chosen_spanish: a mi pueblo Israel
  alternatives_spanish:
  - a mi pueblo, Israel
  - a Israel mi pueblo
  lexicon: HALOT
  rationale: Conserva el posesivo de pacto y la apposición nacional en un orden natural del español.
- source_word: מִיַּד פְּלִשְׁתִּים
  english_pob_choice: from the hand of the Philistines
  chosen_spanish: de la mano de los filisteos
  alternatives_spanish:
  - del poder de los filisteos
  - de los filisteos
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea de poder opresivo con la misma imagen de «mano» que el texto repite.
- source_word: וּמִיַּד כָּל אֹיְבֵיהֶם
  english_pob_choice: and from the hand of all their enemies
  chosen_spanish: y de la mano de todos sus enemigos
  alternatives_spanish:
  - y de todos sus enemigos
  - y del poder de todos sus enemigos
  lexicon: HALOT
  rationale: Se conserva la repetición idiomática y el alcance total de כָּל. El posesivo «sus» remite naturalmente a Israel dentro de la cita.
theological_decisions:
- issue: Sujeto de הוֹשִׁיעַ en la cita
  english_pob_reading: 'Yahweh is the speaker and ultimate subject: ''I will save ... by the hand of my servant David.'''
  chosen_spanish_reading: Yahvé habla como sujeto de «salvaré», mientras David funciona como instrumento («por la mano de mi esclavo David»).
  alternative_spanish_readings:
  - David salvará a mi pueblo Israel
  - Yahvé salvará ... por medio de David
  rationale: La construcción hebrea permite ambas posibilidades, pero el contexto inmediato («Yahvé ha hablado ... diciendo») favorece que Yahvé sea quien promete salvar, sin eliminar la mediación davídica expresada por la frase instrumental.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it without documentation)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó la cláusula a «hablado acerca de David» por la lectura de אֶל דָּוִד como referencia sobre David. La traducción española refleja esa decisión y también conserva la alternativa semántica documentada sobre el sujeto de «salvaré».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton según la norma del proyecto.
  - Se preserva «mano» en las expresiones de agencia y opresión para reflejar la repetición del hebreo.
  - Se evitó «Cristo» o términos eclesiales no presentes en el texto.
  - La nota de pie de página marca la tensión léxica de עבד sin diluirla con una equivalencia única.
