translation:
  language: es
  text: Busquen a Yahvé y su fuerza[a]; busquen su rostro continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'busquen continuamente su presencia'. El hebreo dice literalmente 'busquen su rostro continuamente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  english_pob_choice: Seek
  chosen_spanish: Busquen
  alternatives_spanish:
  - Busquen
  - Busquen tras
  - Inquieran de
  lexicon: HALOT
  rationale: El imperativo plural de דרשׁ en un contexto de adoración expresa buscar a Dios con intención y devoción. 'Busquen' mantiene el impulso exhortativo natural en español sin volverlo meramente informativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio divino 'Yahvé', conforme al criterio del proyecto. En español es la forma más estable y reconocible para preservar el nombre personal del Dios de Israel.
- source_word: וְעֻזּוֹ
  english_pob_choice: and his strength
  chosen_spanish: y su fuerza
  alternatives_spanish:
  - y su fuerza
  - y su poder
  - y su vigor
  lexicon: HALOT
  rationale: עֹז abarca fuerza, poder o vigor. 'Fuerza' es una equivalencia directa, natural en español y apta para el paralelismo del verso.
- source_word: בַּקְּשׁוּ
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen
  - busquen con diligencia
  - busquen tras
  lexicon: HALOT
  rationale: בקשׁ comparte el campo semántico de buscar, procurar o perseguir. Aquí 'busquen' conserva el paralelismo poético con דִּרְשׁוּ y suena más idiomático que repetir 'inquieran' o una expresión más marcada.
- source_word: פָנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su rostro
  - su presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'su rostro'. En español, 'buscar su rostro' suena comprensible y mantiene la imagen relacional. 'Presencia' es una alternativa interpretativa válida, pero aquí se preserva la imaginería del hebreo.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: siempre
  alternatives_spanish:
  - siempre
  - continuamente
  - constantemente
  lexicon: HALOT
  rationale: תָּמִיד expresa constancia u استمرارidad. 'Siempre' es breve, natural y suficientemente fiel en español, aunque 'continuamente' también sería posible si se quisiera subrayar la continuidad incesante.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino. Se conserva como 'Yahvé' en vez de sustituirlo por un título, manteniendo la identidad covenantal y la coherencia terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether פָנָיו should be made idiomatic as 'su presencia' or kept formally as 'su rostro'
  english_pob_reading: his face
  chosen_spanish_reading: su rostro
  alternative_spanish_readings:
  - su presencia
  rationale: Se conserva la metáfora corporal del hebreo para no resolver prematuramente la tensión poética. 'Su rostro' reproduce mejor la imagen y deja abierta la lectura relacional o cultual que el lector puede inferir.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El antecedente en inglés fue revisado sin cambios tras el último pase; la versión española sigue de cerca esa decisión auditada, preservando el paralelismo de dos imperativos y la imagen literal de 'rostro' con una nota alternativa para 'presencia'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, en línea con el criterio del proyecto.
  - Se prefirió 'fuerza' a 'poder' o 'músculo' por ser la equivalencia más directa de עֹז en este contexto.
  - 'Se conservó el paralelismo verbal con dos imperativos en plural: ''Busquen...; busquen...'''
  - '''Siempre'' se eligió como equivalente idiomático de תָּמִיד, sin introducir matices de duración que el hebreo no exige explícitamente.'
