revisions:
- from: Pero si la mancha blanca está en la piel de su carne[a], y su apariencia no está más profunda que la piel, y su pelo no se ha vuelto blanco[b], entonces el sacerdote aislará la lesión[c] por siete días.
  to: Pero si la mancha blanca está en la piel de su carne[a], y no parece más profunda que la piel, y su pelo no se ha vuelto blanco, entonces el sacerdote aislará el área afectada[c] por siete días.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español y alinear mejor las notas léxicas con el audit trail: se cambió ''su apariencia no está más profunda que la piel'' por ''no parece más profunda que la piel''; se sustituyó ''la lesión'' por ''el área afectada'' para reflejar mejor נֶגַע en este contexto; se corrigió la nota de בַּהֶרֶת para preservar el matiz de brillo. Se eliminó la nota [b] porque no añade una alternativa necesaria en español y el texto principal ya expresa claramente el cambio de estado.'
