review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y la línea del POB en la mayor parte del versículo: «deshabitada», «el santuario era pisoteado», «los hijos de extranjeros», «la ciudadela», «para los gentiles» y el cierre musical reflejan adecuadamente el original. Sin embargo, «no había quien entrara ni saliera de sus habitantes» no es español natural y además distorsiona la sintaxis: el griego describe la ausencia de tránsito/vida en Jerusalén, no una salida «de sus habitantes» como complemento directo forzado. La revisión inglesa ya simplificó esto a «from her». También «morada» para κατάλυμα es posible pero menos preciso que «alojamiento» o «lugar de alojamiento» en este contexto.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero presenta un problema importante de naturalidad y claridad en «de sus habitantes». Esa frase suena antinatural y confusa en español. Además, «como un desierto» es aceptable, aunque «como un lugar desierto» o «como un yermo» evitarían imaginar arena literal; no obstante, no exige cambio. «Cítara» es entendible, pero dado el rastro inglés («harp» con nota «lyre»), «arpa» en el texto principal con nota «lira» alinea mejor con el POB.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La elección «gentiles» está bien justificada. El principal desajuste es con el audit trail inglés revisado: el español conserva una explicación de γενημάτων en nota, lo cual es válido, pero el texto principal debe reflejar el sentido contextual fluido de la revisión, no la construcción defectuosa «de sus habitantes».'
  issues:
  - severity: high
    issue: 'Frase antinatural y semánticamente torcida: «no había quien entrara ni saliera de sus habitantes»'
    rationale: El griego expresa que no había nadie entrando ni saliendo de Jerusalén; la forma española actual resulta gramaticalmente extraña y comunica mal el sentido. Debe repararse a algo como «no había quien entrara ni saliera de ella» o «no había nadie que entrara ni saliera».
  - severity: medium
    issue: «Morada» debilita el sentido concreto de κατάλυμα
    rationale: κατάλυμα aquí apunta a lugar de alojamiento/cuarto de hospedaje más que a vivienda estable. «Alojamiento» o «lugar de alojamiento» refleja mejor el sustantivo y el contexto de ocupación.
  - severity: medium
    issue: «Cítara» se aparta del POB inglés principal sin necesidad suficiente
    rationale: El rastro inglés lleva «harp» en el texto principal y «lyre» en nota. En español, «arpa» en texto y «lira» en nota preserva mejor esa decisión documentada, mientras que «cítara» introduce una especificación distinta.
  revised_spanish_text: Y Jerusalén estaba deshabitada como un desierto; no había quien entrara ni saliera de ella[a], y el santuario era pisoteado, y los hijos de extranjeros estaban en la ciudadela[b], un alojamiento para los gentiles; y el deleite fue quitado de Jacob, y la flauta y el arpa cesaron[c].
