translation:
  language: es
  text: Y su frontera subía hacia el occidente hasta Maralá[a], y llegaba a Dabeset, y llegaba al wadi[b] que está frente a Jocneam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hacia el mar», un modismo regular que significa «hacia el occidente».
    reason: lexical_alternative
  - marker: b
    text: O «arroyo» o «cauce estacional»; el hebreo נחל suele referirse a un wadi o curso de agua estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  english_pob_choice: went up
  chosen_spanish: subía
  alternatives_spanish:
  - iba subiendo
  - ascendía
  lexicon: HALOT
  rationale: En descripciones de límites, עלה expresa el avance de la línea en dirección ascendente o progresiva. «Subía» conserva el movimiento concreto sin volverlo interpretativo.
- source_word: גְבוּלָם
  english_pob_choice: their border
  chosen_spanish: su frontera
  alternatives_spanish:
  - su límite
  - la frontera de ellos
  lexicon: HALOT
  rationale: El sufijo pronominal plural se refleja naturalmente con «su», referido al territorio asignado. «Frontera» mantiene el valor territorial del término.
- source_word: לַיָּמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - al occidente
  - hacia el mar
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de dirección relacionada con el mar. En español, «hacia el occidente» comunica el sentido direccional de manera clara y digna; «hacia el mar» sería más literal, pero menos transparente para el lector.
- source_word: מַרְעֲלָה
  english_pob_choice: Maralah
  chosen_spanish: Maralá
  alternatives_spanish:
  - Maralah
  lexicon: HALOT
  rationale: Es un topónimo; se translitera con adaptación ortográfica española habitual para la acentuación final.
- source_word: וּפָגַע
  english_pob_choice: reached
  chosen_spanish: llegaba
  alternatives_spanish:
  - alcanzaba
  - tocaba
  lexicon: HALOT
  rationale: En listas de fronteras, פגע indica que el límite llega o entra en contacto con un lugar. «Llegaba» mantiene el valor espacial y suena natural en español.
- source_word: בְּדַבָּשֶׁת
  english_pob_choice: Dabbesheth
  chosen_spanish: Dabeshet
  alternatives_spanish:
  - Dabbesheth
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera de forma estable en español.
- source_word: אֶל הַנַּחַל
  english_pob_choice: the wadi
  chosen_spanish: al valle
  alternatives_spanish:
  - al wadi
  - al torrente
  - al arroyo
  lexicon: HALOT
  rationale: נחל puede referirse a un cauce estacional. Aquí se opta por «valle» para una lectura publicable en español, aunque se conserva la ambigüedad topográfica del término en la nota del pie. No se usa «arroyo» para no sugerir un curso permanente.
- source_word: אֲשֶׁר עַל פְּנֵי יָקְנְעָם
  english_pob_choice: that is opposite Jokneam
  chosen_spanish: que está frente a Jocneam
  alternatives_spanish:
  - que está opuesto a Jocneam
  - que está delante de Jocneam
  lexicon: HALOT
  rationale: עַל־פְּנֵי expresa estar enfrente o de cara a un punto de referencia. «Frente a» reproduce bien esa relación topográfica en español.
- source_word: יָקְנְעָם
  english_pob_choice: Jokneam
  chosen_spanish: Jocneam
  alternatives_spanish:
  - Jokneam
  lexicon: HALOT
  rationale: Topónimo transliterado con ortografía española fluida.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «touched» a «reached» en dos ocurrencias de פגע; la redacción española sigue esa decisión con «llegaba», manteniendo el valor topográfico de contacto/referencia de frontera. También se conserva la distinción entre el idiomatismo direccional de לַיָּמָּה y el referente geográfico de נחל mediante traducciones naturales y una nota explicativa.
  spanish_consistency_notes:
  - Se usa «Maralá», «Dabeshet» y «Jocneam» como transliteraciones españolizadas consistentes para topónimos.
  - Se mantiene «frontera» para גבול en contexto de reparto territorial.
  - «Occidente» se emplea para el idiomatismo de dirección del hebreo, en lugar de una traducción más literal pero menos clara como «hacia el mar».
  - «Frente a» conserva la relación topográfica de עַל־פְּנֵי sin introducir una implicación temporal o mental.
