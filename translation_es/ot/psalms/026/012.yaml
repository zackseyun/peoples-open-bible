translation:
  language: es
  text: Mi pie está firme en terreno llano[a]; en las asambleas bendeciré a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un lugar llano»; el hebreo también puede implicar rectitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלִי
  english_pob_choice: My foot
  chosen_spanish: Mi pie
  alternatives_spanish:
  - Mis pies
  lexicon: HALOT
  rationale: El hebreo está en singular con sufijo de primera persona singular, por lo que el sentido básico es 'mi pie'. En español, el singular conserva mejor la imagen personal de estabilidad que el plural idiomático.
- source_word: עָמְדָה
  english_pob_choice: stands
  chosen_spanish: se mantiene
  alternatives_spanish:
  - está firme
  - permanece
  - ha estado firme
  lexicon: HALOT
  rationale: El perfecto qal 3fs concuerda con el sujeto femenino singular 'pie'. En poesía, el perfecto puede describir un estado presente resultante; 'se mantiene' comunica estabilidad actual sin perder la idea de firmeza adquirida.
- source_word: בְּמִישׁוֹר
  english_pob_choice: on level ground
  chosen_spanish: en terreno llano
  alternatives_spanish:
  - en un lugar llano
  - en terreno parejo
  - en un lugar recto
  lexicon: HALOT
  rationale: מִישׁוֹר denota ante todo un lugar llano o nivelado. 'Terreno llano' conserva la imagen concreta y deja abierta la resonancia metafórica de rectitud/uprightness que el contexto puede sugerir.
- source_word: בְּמַקְהֵלִים
  english_pob_choice: in the assemblies
  chosen_spanish: en las asambleas
  alternatives_spanish:
  - entre las congregaciones
  - en las reuniones del pueblo
  - entre los reunidos
  lexicon: HALOT
  rationale: El plural de קהל se refiere a reuniones o asambleas de personas. 'Asambleas' es claro en español moderno y evita imponer un matiz eclesiástico que el hebreo no exige.
- source_word: אֲבָרֵךְ
  english_pob_choice: I will bless
  chosen_spanish: bendeciré
  alternatives_spanish:
  - yo bendeciré
  - alabaré
  - bendigo
  lexicon: HALOT
  rationale: La forma piel de ברך significa 'bendecir'. El futuro 'bendeciré' reproduce bien el valor volitivo/declarativo del contexto poético y mantiene la relación léxica directa con el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del tetragrámaton como 'Yahvé', conforme al criterio del proyecto de no sustituirlo por una mayúscula reverencial ni por un título. 'Jehová' queda como alternativa tradicional, pero no es la forma elegida.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el tetragrámaton, y el marco del proyecto pide preservarlo en la lengua meta como nombre propio. 'Yahvé' mantiene la identidad del nombre de pacto sin sustituirlo por un título funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el último pase auditado: no se registran revisiones aplicadas y el control cruzado informó alto acuerdo. La redacción española procura mantener la imagen singular del pie, la noción de estabilidad y la preservación del nombre divino.'
  spanish_consistency_notes:
  - Se mantiene el singular 'Mi pie' conforme al hebreo y a la decisión inglesa documentada.
  - '''Asambleas'' evita un sesgo denominacional no presente en el מקור.'
  - '''Yahvé'' es consistente con la terminología predeterminada del proyecto para יְהוָה.'
  - La nota al pie conserva la ambigüedad léxica de מִישׁוֹר sin ampliar indebidamente el sentido.
