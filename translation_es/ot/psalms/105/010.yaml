translation:
  language: es
  text: Lo confirmó[a] a Jacob como estatuto,[b] a Israel como pacto eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo estableció’. El verbo hebreo puede expresar hacer que algo permanezca firme o quede establecido.
    reason: lexical_alternative
  - marker: b
    text: O ‘pacto perpetuo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמִידֶהָ
  english_pob_choice: He confirmed it
  chosen_spanish: Lo confirmó
  alternatives_spanish:
  - Lo estableció
  - Lo puso en firme
  lexicon: HALOT
  rationale: El verbo en hifil de עמד expresa aquí causar que algo permanezca firme, confirme o establezca. ‘Lo confirmó’ conserva el valor causal y suena natural en español, sin perder la referencia anafórica al pacto/promesa del contexto anterior.
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: para Jacob
  alternatives_spanish:
  - a Jacob
  lexicon: HALOT
  rationale: El ל aquí marca la relación destinataria o beneficiaria dentro del paralelismo; en español ‘para Jacob’ comunica bien el sentido de asignación o promulgación del estatuto.
- source_word: לְחֹק
  english_pob_choice: as a statute
  chosen_spanish: como estatuto
  alternatives_spanish:
  - como decreto
  - como ordenanza
  lexicon: HALOT
  rationale: ‘Estatuto’ preserva el matiz jurídico-covenantal de חֹק, que en poesía bíblica puede referirse a algo prescrito o fijado. ‘Decreto’ o ‘ordenanza’ son posibles, pero ‘estatuto’ mantiene mejor la formalidad del texto.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: para Israel
  alternatives_spanish:
  - a Israel
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con ‘para Jacob’ y el nombre de pacto del pueblo. ‘Para Israel’ resulta claro y conserva la estructura del hebreo.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: pacto eterno
  alternatives_spanish:
  - pacto perpetuo
  - pacto para siempre
  lexicon: HALOT
  rationale: בְּרִית se traduce por ‘pacto’ y עוֹלָם por ‘eterno’ en un español bíblico claro y digno. ‘Pacto eterno’ conserva la durabilidad sin forzar una fórmula más rígida.
theological_decisions:
- issue: Referente del sufijo femenino en וַיַּעֲמִידֶהָ
  english_pob_reading: The suffix refers to the covenantal promise/oath mentioned in the preceding verses, rendered generically as 'it.'
  chosen_spanish_reading: El sufijo se vierte de manera genérica como ‘lo’, refiriéndose a la promesa/juramento del contexto previo.
  alternative_spanish_readings:
  - la confirmó
  - confirmó esa promesa
  - confirmó ese juramento
  rationale: El antecedente inmediato en el salmo es el juramento y la palabra pactada de Yahvé; español requiere una forma masculina neutra genérica para un antecedente implícito no explícito. ‘Lo’ preserva la anáfora sin especificar más de lo que el verso por sí solo permite.
  doctrine_reference: Covenant theology / promesa jurada a los patriarcas
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto hebreo y concuerda con el audit trail inglés: conserva el valor causativo de עמד en hifil, el paralelismo Jacob/Israel y la fuerza jurídica de חֹק y בְּרִית עוֹלָם, sin introducir una paráfrasis amplia.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque este versículo no contiene el Tetragrámaton.
  - ‘Pacto’ se mantiene como término técnico coherente con la terminología POB.
  - ‘Eterno’ conserva la duración continua sin sobreinterpretar matices escatológicos.
