translation:
  language: es
  text: Además de los principales delegados[a] de Salomón que estaban a cargo de la obra, tres mil trescientos[c][b], que tenían autoridad sobre el pueblo que hacía la obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «principales oficiales» o «principales supervisores». Los términos administrativos hebreos combinan ideas de rango y supervisión.'
    reason: lexical_alternative
  - marker: b
    text: «Tenían autoridad sobre» traduce un verbo que puede denotar ejercicio de autoridad; en este contexto se refiere a la supervisión de los obreros.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el pueblo», aquí referido a la mano de obra empleada en el proyecto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַד
  english_pob_choice: besides
  chosen_spanish: Además de
  alternatives_spanish:
  - aparte de
  - además
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la idea de adición o excepción respecto del total ya mencionado, sin perder la relación con lo anterior.
- source_word: שָּׂרֵי הַנִּצָּבִים
  english_pob_choice: chief deputies
  chosen_spanish: los jefes de los supervisores
  alternatives_spanish:
  - los jefes de los oficiales
  - los jefes de los encargados
  - los jefes de los diputados
  lexicon: HALOT
  rationale: La combinación hebrea reúne rango y función de supervisión. En español, "jefes de los supervisores" conserva la doble idea de autoridad superior y supervisión administrativa, evitando un término eclesiástico ajeno al contexto.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: Solomon’s
  chosen_spanish: de Salomón
  alternatives_spanish:
  - de Solomon
  - pertenecientes a Salomón
  lexicon: HALOT
  rationale: El ל indica relación o pertenencia; "de Salomón" es la forma natural y fiel en español.
- source_word: אֲשֶׁר עַל הַמְּלָאכָה
  english_pob_choice: who were over the work
  chosen_spanish: que estaban sobre la obra
  alternatives_spanish:
  - que estaban a cargo de la obra
  - que supervisaban la obra
  lexicon: HALOT
  rationale: '"Estaban sobre la obra" sigue de cerca la preposición hebrea עַל y preserva la noción de autoridad sobre el proyecto. "Obra" funciona bien en español bíblico para el trabajo de construcción.'
- source_word: שְׁלֹשֶׁת אֲלָפִים וּשְׁלֹשׁ מֵאוֹת
  english_pob_choice: three thousand three hundred
  chosen_spanish: tres mil trescientos
  alternatives_spanish:
  - '3.300'
  - tres mil y trescientos
  lexicon: HALOT
  rationale: Se conserva el valor cardinal en forma literaria habitual en español, clara y fiel al hebreo.
- source_word: הָרֹדִים
  english_pob_choice: who ruled over
  chosen_spanish: los cuales gobernaban sobre
  alternatives_spanish:
  - los cuales dominaban sobre
  - los cuales dirigían
  lexicon: HALOT
  rationale: El verbo רדה tiene fuerza de ejercer autoridad. "Gobernaban sobre" preserva esa fuerza mejor que una simple idea de supervisión, aunque en contexto se trata de autoridad laboral.
- source_word: בָּעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los trabajadores
  lexicon: HALOT
  rationale: El hebreo dice literalmente "el pueblo"; se mantiene esa expresión, aunque el referente contextual sean los obreros.
- source_word: הָעֹשִׂים בַּמְּלָאכָה
  english_pob_choice: doing the work
  chosen_spanish: que hacía la obra
  alternatives_spanish:
  - que trabajaba en la obra
  - que realizaba la obra
  lexicon: HALOT
  rationale: El participio plural hebreo se vierte como relativo con verbo singular colectivo en español, una solución natural para referirse al conjunto del pueblo trabajador.
theological_decisions:
- issue: Autoridad administrativa expresada por רדה y עַל
  english_pob_reading: '''Ruled over'' translates a verb that can denote exercising authority; in context it refers to oversight of laborers.'
  chosen_spanish_reading: '"Gobernaban sobre" mantiene la idea de autoridad real sin convertirla en mero control técnico.'
  alternative_spanish_readings:
  - supervisaban
  - dirigían
  rationale: La tensión entre autoridad y supervisión debe quedar visible. "Gobernaban sobre" conserva el peso del verbo hebreo y la relación de dominio funcional sobre el personal de trabajo, sin insinuar un gobierno político pleno.
  doctrine_reference: Lexical-theological note on רדה in administrative context
- issue: Referencia colectiva a 'el pueblo'
  english_pob_reading: Hebrew 'the people,' referring here to the labor force engaged in the project.
  chosen_spanish_reading: '"el pueblo" se mantiene, con referente contextual a la mano de obra.'
  alternative_spanish_readings:
  - los trabajadores
  - la fuerza laboral
  rationale: No se reemplaza el sustantivo bíblico por un equivalente explicativo en el texto principal, porque el hebreo conserva la amplitud de "pueblo"; el contexto aclara que se trata de obreros.
  doctrine_reference: Contextual semantics of עם in construction labor
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión auditada en inglés; no se detectaron cambios de fondo en el sentido ni en la puntuación esencial del contenido. La versión española sigue el mismo marco de decisión léxica y contextual.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre autoridad jerárquica y supervisión laboral, reflejando la doble capa semántica de los términos hebreos.
  - '"Obra" se usa de forma consistente para el proyecto de construcción, evitando alternar innecesariamente con "trabajo" dentro del mismo verso.'
  - Se conservó "el pueblo" en el cuerpo del texto para respetar el hebreo, y se aclaró su referente laboral en nota.
  - La formulación numérica se normalizó como "tres mil trescientos" para lectura litúrgica y pública en español.
