translation:
  language: es
  text: Has acortado los días de su juventud; lo has cubierto de vergüenza[a]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo has vestido de vergüenza».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְצַרְתָּ
  english_pob_choice: you have shortened
  chosen_spanish: has acortado
  alternatives_spanish:
  - has abreviado
  - has acortado los días
  lexicon: HALOT
  rationale: El hifil de קצר expresa hacer más corto o acortar. «Has acortado» conserva el valor léxico básico y suena natural en español poético.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - el tiempo de
  - la vida de
  lexicon: HALOT
  rationale: El constructo plural «días de» mantiene la imagen hebrea del lapso vital sin añadir interpretación innecesaria.
- source_word: עֲלוּמָיו
  english_pob_choice: his youth
  chosen_spanish: su juventud
  alternatives_spanish:
  - su edad juvenil
  - sus días de juventud
  lexicon: HALOT
  rationale: «Juventud» es la equivalencia más directa y natural para el período juvenil indicado por el sustantivo hebreo.
- source_word: הֶעֱטִיתָ
  english_pob_choice: you have covered
  chosen_spanish: lo has cubierto
  alternatives_spanish:
  - lo has vestido
  - lo has revestido
  - lo has envuelto
  lexicon: HALOT
  rationale: El hifil de עטה puede significar envolver, vestir o cubrir. Dado que el complemento es «vergüenza», «cubierto» expresa bien la imagen sin forzar una metáfora adicional en el texto principal.
- source_word: עָלָיו
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - sobre él
  - a él
  lexicon: HALOT
  rationale: En español, el objeto directo pronominal «lo» integra con naturalidad la idea de ser cubierto, mientras que la preposición implícita queda absorbida por la construcción idiomática.
- source_word: בּוּשָׁה
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - humillación
  lexicon: HALOT
  rationale: «Vergüenza» es una correspondencia básica y clara para el sustantivo, y preserva la fuerza afectiva y honorífica del término hebreo.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva la transliteración por tratarse de un término litúrgico/musical de sentido incierto.
theological_decisions:
- issue: Referente de los sufijos masculinos singulares («su», «lo»)
  english_pob_reading: Retain the masculine singular pronoun ('his,' 'him') without specifying the referent.
  chosen_spanish_reading: Conservar el posesivo y el objeto en singular masculino sin identificar explícitamente al referente.
  alternative_spanish_readings:
  - Interpretarlo de forma corporativa como el rey davídico
  - Precisarlo como la dinastía davídica o el ungido personificado
  rationale: El contexto del salmo apunta al rey ungido humillado, pero el verso mismo no lo nombra aquí. Mantener «su» y «lo» preserva la ambigüedad poética y no resuelve más de lo que el texto permite.
  doctrine_reference: Preservar la tensión interpretativa sin sobreespecificar el referente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto permanece en acuerdo alto con el control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Selah» transliterado para respetar el término litúrgico del hebreo.
  - Se evitó «Señor» u otras sustituciones teológicas ajenas al versículo, ya que el texto no contiene el nombre divino.
  - La imagen de «cubrir con vergüenza» se conserva en la traducción principal, con la alternativa de «vestir» indicada en nota para reflejar la oscilación léxica del verbo hebreo.
