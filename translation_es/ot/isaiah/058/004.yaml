review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: ayunar para conflicto, para golpear violentamente, y no ayunar de modo que la voz sea oída en lo alto. También conserva correctamente la reserva teológica de בַּמָּרוֹם como «en lo alto». Sin embargo, hay un problema de fidelidad respecto al aparato de notas: la nota [a] se presenta como alternativa más literal, pero el texto principal ya usa precisamente esa forma literal («puño de maldad»).'
  spanish_quality_summary: El español es claro y legible, con tono adecuado. «Miren» funciona bien para הֵן. «Pleito y contienda» es comprensible, aunque algo pesado, pero aceptable. La frase «hacer que su voz sea oída» es correcta aunque un poco rígida; puede simplificarse a «hacer oír su voz» sin pérdida de sentido. El principal ajuste necesario es armonizar texto y nota léxica para evitar redundancia/incoherencia.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto en este versículo. «En lo alto» respeta la decisión de no explicitar «cielo» o «Dios». No aparecen términos de glosario mayor como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: La nota [a] no funciona como alternativa porque repite exactamente el texto principal.
    rationale: 'El inglés POB pone en el texto «with a wicked fist» y reserva «with a fist of wickedness» para nota. En español, el texto principal usa «con un puño de maldad», y la nota dice «Más literalmente: “con un puño de maldad”». Eso elimina la distinción documentada entre lectura principal natural y alternativa literal.'
  - severity: low
    issue: La construcción «hacer que su voz sea oída» suena más pesada de lo necesario.
    rationale: El causativo de לְהַשְׁמִיעַ puede expresarse naturalmente en español como «hacer oír su voz», que preserva mejor la fluidez sin perder el sentido.
  revised_spanish_text: 'Miren: ayunan para pleito y contienda, y para golpear con un puño malvado[a]. Hoy no ayunan para hacer oír su voz en lo alto[b].'
  revised_footnotes:
  - marker: a
    text: 'Más literalmente: «con un puño de maldad».'
    reason: lexical_alternative
  - marker: b
    text: «En lo alto» puede aludir al ámbito celestial, es decir, a hacer que su voz sea oída delante de Dios.
    reason: alternative_reading
  revision_rationale: Se ajusta la frase sobre el puño para que el texto principal sea natural en español («puño malvado») y la nota preserve la alternativa más literal documentada («puño de maldad»). También se suaviza «hacer que su voz sea oída» a «hacer oír su voz», que expresa bien el causativo hebreo en español idiomático. Se conservan «Miren», «pleito y contienda» y «en lo alto» por buena alineación con el hebreo y con las decisiones del POB.
