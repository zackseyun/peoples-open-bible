    text: O «Y aconteció». El hebreo usa una fórmula narrativa común para introducir una explicación de fondo.
    reason: lexical_alternative
  - marker: b
    text: Lit. «cuando David estaba [con] Edom». En contexto, se refiere a la campaña o presencia de David en Edom.
    reason: lexical_alternative
  revision_rationale: Se corrigió el verbo principal para reflejar la fuerza letal de וַיַּךְ en este contexto («abatió» en vez de «hirió»), se ajustó «los muertos» a «los caídos» para conservar el matiz bélico de הַחֲלָלִים, y se movió la nota [b] al segmento que realmente explica. El resto de la estructura y el registro del borrador son adecuados.
