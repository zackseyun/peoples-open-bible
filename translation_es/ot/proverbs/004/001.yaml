review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: dos imperativos plurales dirigidos a בָנִים, seguido por מוּסַר אָב y el infinitivo לָדַעַת con בִּינָה. Sin embargo, «para conocer entendimiento» suena poco natural en español y no expresa bien la meta sapiencial del infinitivo; además, «atiendan» es posible, pero «presten atención» distingue mejor הקשיבו de שׁמע sin sonar truncado.'
  spanish_quality_summary: 'El español es en general claro y digno, pero la frase final resulta torpe: «conocer entendimiento» no es idiomático en español bíblico contemporáneo. «Llegar a entender» o «adquirir entendimiento» comunican mejor el sentido. También conviene suavizar «atiendan» a «presten atención», más natural en registro eclesial amplio.'
  glossary_alignment: No hay términos del glosario mayor implicados. La decisión «hijos» para בָנִים es aceptable y fiel al marco masculino del hebreo, especialmente con nota. «Instrucción» para מוּסַר y «entendimiento» para בִּינָה concuerdan con la justificación auditada. La principal corrección es idiomática/sintáctica en torno a לָדַעַת בִּינָה.
  issues:
  - severity: medium
    issue: «para conocer entendimiento» es poco idiomático
    rationale: Aunque sigue de cerca el inglés auditado, en español «conocer entendimiento» suena antinatural y oscurece el propósito de לָדַעַת בִּינָה. Una formulación como «para llegar a entender» preserva la finalidad y la idea sapiencial.
  - severity: low
    issue: «atiendan» es menos natural que «presten atención» en este contexto
    rationale: הקשיבו pide atención enfocada. «Atiendan» puede entenderse, pero «presten atención» suena más claro y distingue mejor el segundo imperativo del primero en español general.
  revised_spanish_text: Oigan[a], hijos, la instrucción de un padre, y presten atención para llegar a entender.
  revised_footnotes:
  - marker: a
    text: O «hijos e hijas». El hebreo dice «hijos», preservando el marco de instrucción de padre a hijo típico de Proverbios.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el sentido del hebreo y la decisión auditada de mantener el marco filial masculino con nota, pero se mejora la naturalidad del español: «presten atención» representa mejor הקשיבו, y «para llegar a entender» evita el calco poco idiomático «conocer entendimiento» mientras mantiene el valor final de לָדַעַת בִּינָה.'
