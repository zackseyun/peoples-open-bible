- from: Clama a mí, y yo te responderé, y te anunciaré[a] cosas grandes y cercadas que no has conocido.
  to: Clama a mí, y yo te responderé, y te diré cosas grandes y ocultas[a] que no has conocido.
  rationale: Se revisa el término principal para וּבְצֻרוֹת a «ocultas», en conformidad con la decisión contextual del POB inglés y con mejor claridad en español. Se cambia «te anunciaré» por «te diré» para reflejar más de cerca el valor sencillo y personal de וְאַגִּידָה. Se conserva «Clama a mí» como opción aceptable y digna. La nota mantiene las alternativas semánticas relevantes sin contradecir el texto principal y con una explicación más idiomática en español.
