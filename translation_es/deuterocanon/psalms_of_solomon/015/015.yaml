  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: los que temen al κύριος reciben misericordia, viven por la misericordia de su Dios, y los pecadores perecen para siempre. También preserva correctamente la ambigüedad de ἐν αὐτῇ mediante nota. Sin embargo, la expresión «serán mostrados misericordia» no comunica fielmente en español el valor pasivo de ἐλεηθήσονται de manera natural ni clara; suena a calco incorrecto. Además, la nota sobre «Señor» no está justificada aquí y choca con la preferencia terminológica del proyecto por «Yahvé» cuando κύριος representa el nombre divino.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero contiene una frase no idiomática: «serán mostrados misericordia». La reparación mínima y natural es «se les mostrará misericordia», que conserva la pasiva/acción recibida sin madera sintáctica. También conviene quitar la nota [a] sobre «Señor», ya que no aporta una alternativa textual necesaria y distrae del flujo.'
  glossary_alignment: 'Hay una desalineación parcial con la terminología del proyecto: la traducción usa «Señor» para κύριον. Dado que el expediente inglés eligió ''Lord'' y el propio borrador razona desde κύριος como título reverente, no hace falta escalar esto; pero tampoco corresponde añadir una nota léxica para defender «Señor». El resto de términos clave («misericordia», «perecerán», «para siempre») está bien alineado.'
  issues:
