translation:
  language: es
  text: Bienaventurado[a] el hombre que me escucha, velando junto a mis puertas día tras día, vigilando los postes de mis entradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un singular masculino con fuerza genérica; se refiere representativamente a cualquier persona que escucha a la Sabiduría.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: HALOT
  rationale: En este contexto sapiencial, la bienaventuranza expresa mejor la idea de dicha/florecimiento asociado con atender a la Sabiduría. «Bienaventurado» conserva el tono sentencioso de la fórmula y es más solemne que «feliz».
- source_word: אָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre[a]
  alternatives_spanish:
  - la persona
  - alguien
  - la humanidad
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino con fuerza genérica. Se conserva «el hombre» para respetar la forma proverbial y la singularidad del texto, aclarando en nota su valor representativo para cualquier persona.
- source_word: שֹׁמֵעַ לִי
  english_pob_choice: who listens to me
  chosen_spanish: que me escucha
  alternatives_spanish:
  - que oye mi voz
  - que me presta atención
  - que me obedece
  lexicon: HALOT
  rationale: El participio con לִי apunta a una escucha continua y atenta. «Me escucha» es natural en español y mantiene la metáfora auditiva sin imponer de entrada la idea de obediencia, aunque esta queda implicada.
- source_word: לִשְׁקֹד
  english_pob_choice: watching
  chosen_spanish: velando
  alternatives_spanish:
  - vigilando
  - haciendo guardia
  - esperando con vigilancia
  lexicon: HALOT
  rationale: El verbo transmite vigilancia diligente y atenta. «Velando» comunica bien la actitud de expectación persistente y encaja con la imagen de estar a las puertas.
- source_word: עַל דַּלְתֹתַי
  english_pob_choice: at my doors
  chosen_spanish: a mis puertas
  alternatives_spanish:
  - junto a mis puertas
  - ante mis puertas
  - sobre mis puertas
  lexicon: HALOT
  rationale: «A mis puertas» reproduce de forma natural la ubicación de presencia/atención que sugiere la construcción hebrea. En español mantiene la imagen de espera ante el acceso de la Sabiduría.
- source_word: יוֹם יוֹם
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - día por día
  - cada día
  lexicon: HALOT
  rationale: La repetición hebrea expresa continuidad. «Día tras día» preserva ese matiz iterativo mejor que una simple adverbialización.
- source_word: לִשְׁמֹר
  english_pob_choice: keeping watch
  chosen_spanish: guardando
  alternatives_spanish:
  - vigilando
  - custodiando
  - observando
  lexicon: HALOT
  rationale: En paralelo con la imagen anterior, el verbo puede expresar mantener vigilancia atenta. «Guardando» funciona en español como complemento natural de «velando» y deja abierta la idea de atención persistente sin forzar una defensa física.
- source_word: מְזוּזֹת
  english_pob_choice: the doorposts
  chosen_spanish: los postes
  alternatives_spanish:
  - los postes de las puertas
  - los umbrales
  - los marcos
  lexicon: HALOT
  rationale: El término nombra los postes/jambas de la puerta. En español, «postes» es fiel pero puede sonar algo general; se mantiene aquí por la cercanía al concreto arquitectónico y para evitar añadir una glosa que altere la brevedad del paralelismo.
- source_word: פְּתָחָי
  english_pob_choice: of my entrances
  chosen_spanish: de mis entradas
  alternatives_spanish:
  - de mis accesos
  - de mis umbrales
  - de mis puertas
  lexicon: HALOT
  rationale: «Entradas» preserva el plural hebreo y el paralelismo con «puertas», sin colapsar ambos términos en uno solo. Es suficientemente claro en español y deja visible la imagen arquitectónica.
theological_decisions:
- issue: Masculino singular genérico en אָדָם
  english_pob_reading: the man
  chosen_spanish_reading: el hombre[a]
  alternative_spanish_readings:
  - la persona
  - cualquiera
  rationale: Se mantiene el masculino singular por fidelidad a la forma hebrea y al estilo proverbial. La nota explicita que no restringe el referente a varones, sino que funciona genéricamente para cualquier ser humano que escucha a la Sabiduría.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'El contexto inglés muestra alta concordancia y ninguna revisión aplicada en el último pase. La presente redacción sigue el sentido auditado: beatitud sapiencial + escucha atenta + vigilancia continua ante las puertas/entradas de la Sabiduría.'
  spanish_consistency_notes:
  - Se usa «Sabiduría» implícita por el contexto inmediato del capítulo, pero se respeta el pronombre de primera persona del hebreo en el verso.
  - Se evita «Cristo»/«SEÑOR» porque el verso no contiene esos términos; el texto habla en primera persona de la Sabiduría personificada.
  - «Bienaventurado» se mantiene como fórmula solemne coherente con el género sapiencial y con el inglés auditado.
