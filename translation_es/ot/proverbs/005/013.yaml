translation:
  language: es
  text: y no escuché la voz de mis instructores[a], ni incliné mi oído a mis maestros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no obedecí la voz de mis instructores». En contextos sapienciales, el verbo hebreo puede incluir la idea de oír con obediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  english_pob_choice: did not listen
  chosen_spanish: no escuché
  alternatives_spanish:
  - no obedecí
  - no oí
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar o obedecer según el contexto. En un marco sapiencial, «escuché» conserva la idea de recibir atentamente la instrucción, sin forzar todavía el matiz más interpretativo de «obedecí», aunque ese trasfondo queda posible.
- source_word: בְּקוֹל
  english_pob_choice: to the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - lo que ... decía
  lexicon: HALOT
  rationale: La expresión hebrea con בקול preserva la imagen de «voz». En español, «la voz de» es natural y mantiene el vínculo con la metáfora original.
- source_word: מוֹרָי
  english_pob_choice: my instructors
  chosen_spanish: mis instructores
  alternatives_spanish:
  - mis maestros
  - quienes me instruían
  lexicon: HALOT
  rationale: El término proviene de ירה en el sentido de instruir. «Instructores» distingue este sustantivo del siguiente «maestros» y conserva el matiz de quienes dan dirección o enseñanza.
- source_word: מְלַמְּדַי
  english_pob_choice: my teachers
  chosen_spanish: mis maestros
  alternatives_spanish:
  - mis instructores
  - quienes me enseñaban
  lexicon: HALOT
  rationale: Deriva de למד, «enseñar». «Maestros» es un equivalente natural en español y reproduce bien la segunda pareja léxica del verso.
- source_word: הִטִּיתִי אָזְנִי
  english_pob_choice: incline my ear
  chosen_spanish: incliné mi oído
  alternatives_spanish:
  - volví mi oído
  - presté atención
  lexicon: HALOT
  rationale: La locución hebrea es un modismo de atención cuidadosa. «Incliné mi oído» preserva la metáfora corporal de forma clara y digna en español.
- source_word: וְ...וְלֹא
  english_pob_choice: and ... nor
  chosen_spanish: y ... ni
  alternatives_spanish:
  - y ... y no
  - pero ... no
  lexicon: HALOT
  rationale: El hebreo coordina dos cláusulas negativas. En español, «ni» en la segunda cláusula refleja mejor la continuidad de la negación y suena más natural que repetir «y no».
translation_notes:
  revision_awareness: 'El español sigue de cerca el audit trail inglés, pero ajusta la sintaxis para una lectura natural: se eligió «escuché» frente a «obedecí» como primera opción, y se mantuvo la metáfora de «incliné mi oído» para conservar el paralelismo del hebreo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este verso no contiene el nombre divino.
  - Se distingue «instructores» de «maestros» para reflejar la diferencia entre מוֹרָי y מְלַמְּדַי.
  - La negación final se expresa con «ni» para reproducir el paralelismo negativo del hebreo sin añadir énfasis extra.
