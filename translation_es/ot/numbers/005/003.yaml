translation:
  language: es
  text: De varón a mujer los enviarás fuera del campamento[a]; los enviarás fuera para que no profanen su campamento[b], en medio del cual yo habito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus campamentos»; el hebreo tiene el plural «sus campamentos», posiblemente aludiendo a las divisiones o secciones del campamento.
    reason: lexical_alternative
  - marker: b
    text: O «en medio de los cuales habito». El hebreo puede referirse tanto al campamento como al pueblo asociado con él.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזָּכָר עַד נְקֵבָה
  english_pob_choice: From male to female
  chosen_spanish: De varón a mujer
  alternatives_spanish:
  - De macho a hembra
  - De hombre a mujer
  - De masculino a femenino
  lexicon: HALOT
  rationale: El hebreo expresa el rango completo con la pareja léxica varón/mujer. En español bíblico, «varón» y «mujer» conserva la referencia personal y biológica sin sonar técnico o zoológico como «macho/hembra», y evita el posible matiz social de «hombre/mujer» que no refleja tan directamente el par léxico.
- source_word: תְּשַׁלֵּחוּ / תְּשַׁלְּחוּם
  english_pob_choice: you shall send them ... you shall send them out
  chosen_spanish: los despedirás ... los despedirás
  alternatives_spanish:
  - los enviarás ... los enviarás fuera
  - los echarás ... los echarás fuera
  - los expulsarás ... los expulsarás
  lexicon: HALOT
  rationale: El Piel de שלח en este contexto exige repetición verbal y movimiento de salida. «Despedir» mantiene el acto de remover/mandar fuera sin cargar demasiado con fuerza punitiva, y permite conservar la reiteración del hebreo y del POB inglés.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - al exterior del campamento
  - a fuera del campamento
  - hacia afuera del campamento
  lexicon: HALOT
  rationale: La frase hebrea se vuelve natural en español como «fuera del campamento», conservando la separación espacial sin calco preposicional innecesario.
- source_word: יְטַמְּאוּ
  english_pob_choice: they may not defile
  chosen_spanish: contaminen
  alternatives_spanish:
  - contaminen ritualmente
  - profanen
  - vuelvan impuro
  lexicon: HALOT
  rationale: En el marco sacerdotal, טמא puede verterse con «contaminar» cuando el contexto cultual apunta al efecto de impureza ritual sobre el campamento. Se evita «defile» calcado y «profanar» por ser menos preciso aquí; la forma negativa del propósito en español expresa bien el hebreo.
- source_word: מַחֲנֵיהֶם
  english_pob_choice: their camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - sus campamentos
  - su campamento/los campamentos
  - el campamento de ellos
  lexicon: HALOT
  rationale: Aunque el hebreo tiene plural con sufijo, la revisión inglesa optó por singular para reflejar el sustantivo base y la lectura colectiva. En español, el singular colectivo «su campamento» es idiomático y mantiene esa decisión auditada sin perder el sentido corporativo.
- source_word: אֲשֶׁר אֲנִי שֹׁכֵן בְּתוֹכָם
  english_pob_choice: in the midst of which I dwell
  chosen_spanish: en medio del cual yo habito
  alternatives_spanish:
  - en medio de los cuales yo habito
  - entre los cuales habito
  - en cuya mitad habito
  lexicon: HALOT
  rationale: El hebreo permite referir la clausula relativa al campamento/campamentos o al colectivo asociado. «En medio del cual yo habito» conserva la imagen de presencia divina central sin resolver de manera innecesaria la ambigüedad pronominal; «habito» traduce שכן con el matiz de morar presencialmente.
theological_decisions:
- issue: Referencia del relativo final y presencia divina en el campamento
  english_pob_reading: 'The clause is rendered personally/corporately: ''their camp, in whose midst I dwell,'' highlighting God’s dwelling among the people as represented in the camp.'
  chosen_spanish_reading: «en medio del cual yo habito» mantiene la presencia divina en el espacio/cuerpo comunitario del campamento sin decidir más de lo que el hebreo permite.
  alternative_spanish_readings:
  - en medio de los cuales yo habito
  - en cuya mitad habito
  - entre ellos habito
  rationale: El hebreo בְּתוֹכָם puede señalar el campamento como totalidad o al pueblo vinculado con él. La traducción elegida conserva la tensión interpretativa y la fuerza teológica de la presencia de Yahvé en medio de Israel, sin homogeneizar la pluralidad que aparece en la forma hebrea.
  doctrine_reference: Presencia de Dios entre su pueblo; mantener tensión interpretativa documentada
translation_notes:
  revision_awareness: El texto inglés POB más reciente simplificó «their camps» a «their camp» y ajustó el final a «in the midst of which I dwell» por naturalidad formal. La versión española sigue esa revisión en el cuerpo principal con un singular colectivo idiomático («su campamento») y mantiene la ambigüedad del relativo final en nota, sin perder el matiz cultual del hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no nombra el tetragrámaton, por lo que no aparece aquí.
  - Se mantiene «campamento» como término técnico del contexto del desierto.
  - Se usa «contaminen» para la impureza ritual, no para contaminación material común.
  - Se evita «señor»/«SEÑOR» como sustituto, porque el versículo no contiene el nombre divino y el POB busca transparencia terminológica.
