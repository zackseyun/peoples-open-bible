translation:
  language: es
  text: Y por medio de él[b] fueron entregados a Sanamassar[a], gobernador de Judea[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sanamassar es la forma griega del funcionario llamado Sesbasar en el paralelo hebreo (Esdras 1:8).
    reason: alternative_reading
  - marker: b
    text: O 'por su mano', resaltando la idea de agencia en la transferencia.
    reason: lexical_alternative
  - marker: c
    text: Griego 'Judea'; el paralelo hebreo tiene 'Judá'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ δὲ τούτου
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  - por su mano
  lexicon: LSJ
  rationale: El griego expresa mediación o instrumentación. 'Por medio de él' conserva ese valor de agencia sin sonar demasiado mecánico en español. 'Por su mano' queda como alternativa posible, pero suena más interpretativa.
- source_word: παρεδόθησαν
  english_pob_choice: were handed over
  chosen_spanish: fueron entregados
  alternatives_spanish:
  - fueron entregados en manos de
  - fueron puestos bajo su autoridad
  - fueron entregados
  lexicon: BDAG
  rationale: El pasivo de παραδίδωμι comunica un acto de transferencia o entrega. 'Fueron entregados' reproduce bien ese sentido en español y mantiene la pasividad del verbo griego.
- source_word: Σαναμασσάρῳ
  english_pob_choice: Sanamassar
  chosen_spanish: Sanamassar
  alternatives_spanish:
  - Sesbasar
  - Sheshbazzar
  lexicon: transliteración del griego
  rationale: Se conserva la forma griega del nombre en el texto principal. La forma hebrea paralela se resguarda como alternativa conocida, pero no sustituye al testimonio griego principal.
- source_word: προστάτῃ
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - líder
  - jefe
  - protector
  lexicon: LSJ
  rationale: En este contexto administrativo, 'gobernador' comunica una función oficial de manera clara para el lector moderno. 'Líder' o 'jefe' serían más vagos; 'protector' no expresa tan bien el cargo.
- source_word: τῆς Ἰουδαίας
  english_pob_choice: of Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - de Judá
  lexicon: LSJ
  rationale: El griego nombra la región como Ἰουδαία, por lo que la forma natural en español es 'Judea'. La correspondencia hebrea 'Judá' queda reconocida como alternativa de trasfondo, no como sustitución del griego.
translation_notes:
  revision_awareness: El pasaje fue revisado y confirmado sin cambios en el audit trail más reciente; la redacción española sigue el testimonio griego principal y conserva en nota la correspondencia del paralelo hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Judea' en el texto principal conforme al griego, con 'Judá' sólo en nota.
  - Se conserva el nombre griego Sanamassar en el cuerpo del texto, sin reemplazarlo por la forma hebrea.
  - '''Fueron entregados'' respeta el pasivo de transferencia de παραδίδωμι y es compatible con el contexto administrativo.'
