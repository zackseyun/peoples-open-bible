translation:
  language: es
  text: ¡Sé exaltado[a], Yahvé, en tu fuerza! Cantaremos y haremos música a tu poderío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Levántate, Yahvé, en tu fuerza!». El verbo hebreo puede entenderse como una llamada a que Dios se levante o como una proclamación de su exaltación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּמָה
  english_pob_choice: Be exalted
  chosen_spanish: ¡Enaltecido seas
  alternatives_spanish:
  - ¡Levántate
  - ¡Sea exaltado
  lexicon: HALOT
  rationale: El hebreo es una forma imperativa/jusiva dirigida a Dios y puede entenderse como una súplica o proclamación de exaltación. «Enaltecido seas» conserva ese valor y suena natural en español litúrgico sin volverla una orden áspera.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto conforme al criterio del proyecto para el Tetragrámaton. «Yahvé» mantiene la referencia personal del texto hebreo y evita la sustitución por un título.
- source_word: בְּעֻזֶּךָ
  english_pob_choice: in your strength
  chosen_spanish: en tu poder
  alternatives_spanish:
  - por tu poder
  - en tu fuerza
  lexicon: HALOT
  rationale: La preposición בְּ con עֹז puede expresar esfera o medio. En español, «en tu poder» comunica de manera clara y digna la manifestación de la fuerza divina, manteniendo la imagen poética sin sonar forzado.
- source_word: נָשִׁירָה
  english_pob_choice: We will sing
  chosen_spanish: Cantaremos
  alternatives_spanish:
  - Cantemos
  - Seguiremos cantando
  lexicon: HALOT
  rationale: La forma cohortativa de primera plural expresa intención o resolución. «Cantaremos» conserva bien ese matiz voluntativo en español contemporáneo y resulta natural en paralelo con el segundo verbo.
- source_word: וּנְזַמְּרָה
  english_pob_choice: and make music
  chosen_spanish: y haremos música
  alternatives_spanish:
  - y cantaremos alabanzas
  - y tañeremos
  lexicon: HALOT
  rationale: זמר en contextos de alabanza apunta a hacer música o cantar con acompañamiento. «Haremos música» preserva la dimensión musical sin reducirlo a un simple sinónimo de «cantar».
- source_word: גְּבוּרָתֶךָ
  english_pob_choice: your might
  chosen_spanish: de tu poderío
  alternatives_spanish:
  - de tu poder
  - de tu valentía
  lexicon: HALOT
  rationale: גְּבוּרָה expresa fuerza, poder, proeza o hazaña poderosa. «Poderío» capta el matiz de fuerza manifiesta y funciona bien como complemento de alabanza; además evita repetir «poder» de forma plana.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La decisión del proyecto de verterlo como «Yahvé» se preserva aquí para mantener la transparencia frente al original y no ocultar el nombre divino tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: 'Valor del primer verbo: exaltación o levantamiento'
  english_pob_reading: Be exalted
  chosen_spanish_reading: Enaltecido seas
  alternative_spanish_readings:
  - Levántate
  - Sé exaltado
  rationale: 'Como en el audit trail inglés, el hebreo admite tanto la idea de ‘levantarse’ como la de ser exaltado. En español, «Enaltecido seas» retiene la ambigüedad teológica útil: puede funcionar como petición de exaltación y como proclamación de la altura/poder de Yahvé.'
  doctrine_reference: 'DOCTRINE.md: Poetic imperatives addressed to God'
- issue: Relación entre las dos expresiones de poder
  english_pob_reading: in your strength / your might
  chosen_spanish_reading: en tu poder / de tu poderío
  alternative_spanish_readings:
  - en tu fuerza / de tu fuerza
  - en tu poder / de tu fuerza
  rationale: El hebreo distingue entre עֹז (‘strength’) y גְּבוּרָה (‘might/power’). En español se conserva la distinción con «poder» y «poderío», evitando borrar la tensión poética entre dos términos cercanos pero no idénticos.
  doctrine_reference: 'DOCTRINE.md: Lexical distinctions in Hebrew poetry'
translation_notes:
  revision_awareness: 'El registro inglés pasó por ajustes menores entre «of your might» y «to your might» para reflejar mejor la relación poética con el hebreo. En español, opté por una formulación que conserve esa relación sin forzar un régimen preposicional artificial: «haremos música acerca de tu poderío».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, de acuerdo con el estándar del proyecto.
  - Se conserva la diferencia semántica entre עֹז y גְּבוּרָה mediante «poder» y «poderío».
  - El estilo es reverente pero moderno, sin calcos rígidos del inglés.
  - La nota [a] recoge la alternativa verbal relevante sin introducir una segunda lectura teológica distinta.
