    rationale: «Vergüenza» puede sonar más interna o emocional. קָלוֹן en este contexto incluye deshonra pública/humillación; «deshonra» lo comunica con mayor precisión y sigue siendo natural en español bíblico contemporáneo.
  revised_spanish_text: Si soy malvado[a], ¡ay de mí! Aun si soy justo, no puedo alzar mi cabeza, lleno de deshonra y viendo mi aflicción.
