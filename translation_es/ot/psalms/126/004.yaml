translation:
  language: es
  text: Restaura nuestra suerte[a], oh Yahvé[b], como torrentes en el Néguev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Trae de vuelta a nuestros cautivos» / «restaura nuestro cautiverio». El modismo hebreo puede referirse específicamente al regreso de exiliados o, más ampliamente, a la restauración de la condición del pueblo.'
    reason: alternative_reading
  - marker: b
    text: La imagen es la de los cauces normalmente secos del Néguev que de pronto se llenan con la lluvia.
    reason: cultural_note
lexical_decisions:
- source_word: שׁוּבָה
  english_pob_choice: Restore
  chosen_spanish: Restaura
  alternatives_spanish:
  - Restituye
  - Vuelve
  - Haz volver
  lexicon: HALOT
  rationale: El imperativo de שוב con אֶת + שבות/נו expresa una súplica de restauración; en español, «Restaura» comunica bien la petición sin forzar de entrada la idea de exilio literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en forma auditable y transparente, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: שבותנו
  english_pob_choice: our fortunes
  chosen_spanish: nuestras fortunas
  alternatives_spanish:
  - nuestro cautiverio
  - nuestros cautivos
  - nuestra restauración
  lexicon: HALOT
  rationale: El hebreo admite la lectura idiomática de «fortuna/estado/restauración» y también la de cautiverio/cautivos. «Fortunas» mantiene el valor amplio del giro y deja abierta la tensión exílico-restaurativa.
- source_word: כַּאֲפִיקִים
  english_pob_choice: like streams
  chosen_spanish: como torrentes
  alternatives_spanish:
  - como corrientes
  - como cauces
  - como wadis
  lexicon: HALOT
  rationale: אֲפִיקִים son cauces o cursos de agua; en el contexto del Néguev, «torrentes» comunica mejor la imagen de cauces secos que de pronto se llenan por lluvias estacionales.
- source_word: בַּנֶּגֶב
  english_pob_choice: in the Negev
  chosen_spanish: en el Néguev
  alternatives_spanish:
  - en el sur
  - en el desierto del sur
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico del Néguev porque la imagen depende de la región árida y sus cauces estacionales; es más concreto que un simple «sur».
theological_decisions:
- issue: Sentido de שוב את־שבות
  english_pob_reading: a prayer for restoration of the community's fortunes/condition
  chosen_spanish_reading: una oración por la restauración del estado/fortuna del pueblo, sin cerrar la posibilidad de retorno del exilio
  alternative_spanish_readings:
  - una petición específica por el regreso de los desterrados
  - una petición por la liberación de cautivos
  rationale: 'La formulación española mantiene la amplitud del hebreo y la tensión documentada: puede aludir a exiliados que regresan, pero también a una restauración más general de la comunidad.'
  doctrine_reference: Preservar la tensión exegética sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto coincide con el consenso alto del repaso más reciente; no se registraron revisiones aplicadas en el paquete fuente. Se mantuvo la ambigüedad del giro hebreo y la imagen del Néguev sin suavizarlas.
  spanish_consistency_notes:
  - Se usó «Yahvé» consistentemente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «fortunas» para conservar la amplitud del modismo hebreo, con nota alternativa para la lectura de cautiverio.
  - «Torrentes» transmite mejor la fuerza visual del paralelismo que una traducción más neutral como «corrientes».
