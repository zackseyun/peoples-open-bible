base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/014/032.yaml
  text: Absalom said to Joab[a], “Look, I sent word to you, saying, ‘Come here, so that I may send you to the king, to say, “Why did I come from Geshur? It would have been better for me to remain there.”’ Now therefore, let me see the king’s face; and if there is guilt in me[b], let him put me to death.”
  footnotes:
  - marker: a
    text: Hebrew literally, “let me see the king’s face,” an idiom for appearing before the king.
    reason: lexical_alternative
  - marker: b
    text: Or, “Better for me if I were still there.” The Hebrew clause is elliptical.
    reason: lexical_alternative
