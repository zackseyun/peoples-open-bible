translation:
  language: es
  text: Hay una generación[a] que maldice a su padre y no bendice a su madre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su padre». El hebreo emplea sufijos pronominales singulares; en español, ''su'' sigue de manera natural al sustantivo colectivo ''generación''.'
    reason: lexical_alternative
  - marker: b
    text: «No bendice» también puede implicar «no habla bien de» o «no honra» en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - linaje
  - grupo
  - clase de personas
  lexicon: HALOT
  rationale: דּוֹר designa aquí una clase o tipo de personas caracterizada por un rasgo común. En el contexto de Proverbios 30:11–14, el patrón repetido favorece 'generación', que conserva tanto el valor léxico como el efecto literario de la serie.
- source_word: אָבִיו
  english_pob_choice: its father
  chosen_spanish: su padre
  alternatives_spanish:
  - su padre (de ella/de él)
  lexicon: HALOT
  rationale: El hebreo usa sufijo singular de 3.ª persona masculina; en español, con el antecedente colectivo 'generación', 'su padre' transmite naturalmente la relación posesiva sin forzar un posesivo inusual.
- source_word: יְקַלֵּל
  english_pob_choice: curses
  chosen_spanish: maldice
  alternatives_spanish:
  - maldice con desprecio
  - habla con desprecio contra
  lexicon: HALOT
  rationale: El piel de קלל expresa maldecir o hablar con desprecio. 'Maldice' es la opción más directa y natural en un contexto de honra a los padres, y conserva la severidad del acto.
- source_word: לֹא יְבָרֵךְ
  english_pob_choice: does not bless
  chosen_spanish: no bendice
  alternatives_spanish:
  - no habla bien de
  - no honra
  lexicon: HALOT
  rationale: ברך en piel normalmente significa 'bendecir'. Aquí implica también hablar bien de o mostrar honra, pero 'bendice' debe mantenerse en el texto principal por su equivalencia léxica directa y por el paralelo con 'maldice'.
translation_notes:
  revision_awareness: El texto coincide con el sentido del paquete fuente y con la traducción inglesa auditada; no se registran revisiones aplicadas en el pass más reciente.
  spanish_consistency_notes:
  - Se conserva 'generación' para reflejar el refrán proverbial y la caracterización colectiva del hebreo.
  - Se mantiene el paralelismo verbal 'maldice / no bendice' para preservar la tensión retórica del original.
  - Se evita reemplazar 'bendice' por 'honra' en el texto principal, aunque se anota la implicación contextual en nota.
  - La puntuación y el orden son naturales en español moderno sin perder la relación posesiva singular del hebreo.
