revisions:
- from: Porque, ¿quién sabe qué es bueno para el hombre en la vida[a], durante el número de los días de su vida fugaz, que él pasa como sombra? Porque, ¿quién puede decirle al hombre qué habrá después de él, debajo del sol?
  to: Porque, ¿quién sabe qué es bueno para el hombre en la vida, durante el número de los días de su vida fugaz[a], que él pasa como una sombra? Porque, ¿quién puede decirle al hombre qué habrá después de él, bajo el sol?
  rationale: Se ajusta la fórmula fija de Eclesiastés a «bajo el sol», se mejora la naturalidad de la comparación con «como una sombra», y se mueve el marcador de nota para que ancle con mayor precisión la decisión léxica sobre הֶבֶל en «vida fugaz».
  reviewer_model: gpt-5.4
