translation:
  language: es
  text: Estos son los mandamientos y los juicios que Yahvé mandó por medio de Moisés a los hijos de Israel[a], en las llanuras de Moab, junto al Jordán, frente a Jericó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “hijos de Israel”; expresión pactual que designa colectivamente al pueblo de Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “junto al Jordán, en Jericó”.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El hebreo introduce una fórmula conclusiva de resumen en plural; en español la copula explícita 'son' hace la frase natural y fiel sin añadir contenido.
- source_word: הַמִּצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: las mandatos
  alternatives_spanish:
  - los mandamientos
  - las órdenes
  - los mandatos
  lexicon: HALOT
  rationale: El campo semántico es el de preceptos/mandatos legales. Se mantiene el tono jurídico; sin embargo, en español 'mandamientos' sería el equivalente más idiomático y solemne para la fórmula final del libro.
- source_word: וְהַמִּשְׁפָּטִים
  english_pob_choice: and the judgments
  chosen_spanish: y las normas
  alternatives_spanish:
  - y los juicios
  - y los estatutos
  - y las ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים en este contexto puede ser 'juicios', 'estatutos' o 'normas'. 'Normas' comunica bien el sentido legal general en español actual; se conserva la distinción conceptual respecto de 'mandatos' sin sobrecargar el verso con un término poco natural.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó
  - dio
  lexicon: HALOT
  rationale: Se conserva el verbo de autoridad. 'Mandó' suena natural en español y mantiene la correspondencia con מִצְוֺת / mandatos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: ''Yahvé'', preservando el nombre personal del pacto en lugar de sustituirlo por un título.'
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - por Moisés
  lexicon: HALOT
  rationale: La expresión hebrea es un idiom a de agencia. 'Por medio de Moisés' refleja la mediación sin sonar literalista en español.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión de pacto 'hijos de Israel' porque el audit trail inglés la retuvo por su fuerza lexical; en español es comprensible y evita neutralizar el texto a 'israelitas'.
- source_word: בְּעַרְבֹת מוֹאָב
  english_pob_choice: in the plains of Moab
  chosen_spanish: en las llanuras de Moab
  alternatives_spanish:
  - en los llanos de Moab
  - en las estepas de Moab
  - en las llanuras de Moab
  lexicon: HALOT
  rationale: עַרְבֹת designa una región de llanura/estepa. 'Llanuras de Moab' es claro, tradicional y fiel al topónimo bíblico.
- source_word: עַל יַרְדֵּן יְרֵחוֹ
  english_pob_choice: by the Jordan at Jericho
  chosen_spanish: junto al Jordán, en Jericó
  alternatives_spanish:
  - junto al Jordán frente a Jericó
  - al otro lado del Jordán, frente a Jericó
  - junto al Jordán, frente a Jericó
  lexicon: HALOT
  rationale: La preposición עַל aquí señala cercanía/ubicación junto a. La formulación española mantiene el lugar sin fijar innecesariamente una de las posibles matizaciones de oposición o proximidad frente a Jericó.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se preserva el nombre propio de Dios según la política del proyecto y la decisión auditada del POB en inglés. No se sustituye por 'Señor' para no ocultar el Tetragrama.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula legal final de resumen
  english_pob_reading: the commandments and the judgments
  chosen_spanish_reading: los mandatos y las normas
  alternative_spanish_readings:
  - los mandamientos y los juicios
  - los mandamientos y las ordenanzas
  - los mandatos y las ordenanzas
  rationale: El versículo funciona como clausura legal del libro de Números. Se optó por una combinación comprensible y jurídica en español, intentando conservar la distinción entre dos clases de disposiciones sin cargar el texto con tecnicismos excesivamente arcaicos.
  doctrine_reference: Números 36:13 contexto legal-covenantal
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audio/edición en inglés, que no requería cambios sustantivos y se mantiene en alta concordancia con el texto hebreo. La redacción española intenta conservar esa misma resolución sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva la expresión de pacto 'hijos de Israel' para reflejar la formulación heredada del original.
  - 'Se mantiene el paralelismo legal del cierre: mandatos / normas, sin convertirlo en paráfrasis libre.'
  - El marcador [a] en el texto se vincula a la nota lexical sobre 'hijos de Israel'; los marcadores [b] y [c] reflejan alternativas legítimas del hebreo en contexto.
