    reason: lexical_alternative
  - marker: c
    text: O «harán una búsqueda minuciosa» o «investigarán».
    reason: lexical_alternative
  revision_rationale: Se revisa la repetición de עבר para que el español conserve la dificultad del hebreo sin sugerir de forma primaria que están enterrando a transeúntes vivos. La aclaración «es decir» hace explícita la aposición ya presente en el original. Se mantienen la nota sobre la dificultad textual y el resto de las decisiones léxicas principales.
