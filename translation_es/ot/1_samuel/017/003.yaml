translation:
  language: es
  text: Ahora los filisteos estaban en el monte, de un lado[a], e Israel estaba en el monte, del otro lado, con el valle[b] entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «colina» en ambos casos; el hebreo הָר puede referirse a una colina o a una montaña según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «desfiladero» o «hondonada»; el hebreo גַּיְא puede designar un valle con lados escarpados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְלִשְׁתִּים
  english_pob_choice: Now the Philistines
  chosen_spanish: Ahora los filisteos
  alternatives_spanish:
  - Y los filisteos
  - Los filisteos
  lexicon: HALOT
  rationale: El ו narrativo puede funcionar como transición de escena; en español, «Ahora» reproduce bien ese inicio descriptivo sin añadir contenido. «Filisteos» es la forma usual y transparente del etnónimo.
- source_word: עֹמְדִים
  english_pob_choice: were standing
  chosen_spanish: estaban sobre
  alternatives_spanish:
  - estaban de pie sobre
  - se hallaban sobre
  - estaban apostados sobre
  lexicon: HALOT
  rationale: El participio expresa una postura o estado continuo. En español, «estaban sobre» conserva esa descripción de ubicación/postura en el escenario de batalla sin volverlo demasiado pesado.
- source_word: אֶל הָהָר מִזֶּה
  english_pob_choice: on the mountain on one side
  chosen_spanish: sobre el monte, de un lado
  alternatives_spanish:
  - en el monte, de este lado
  - sobre la montaña, de un lado
  - en el monte, a un lado
  lexicon: HALOT
  rationale: אֶל con עמד aquí marca posición relativa en el terreno. «Sobre el monte» refleja la localización, y «de un lado» traduce מִזֶּה de forma idiomática. «Monte» mantiene la opción de la POB en inglés para הָר, aunque «montaña» también sería posible.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: and Israel
  chosen_spanish: e Israel
  alternatives_spanish:
  - y Israel
  - e los israelitas
  lexicon: HALOT
  rationale: Se conserva el nombre colectivo «Israel» como en el hebreo. La forma «e» es la conjunción española adecuada ante vocal inicial.
- source_word: עֹמְדִים
  english_pob_choice: were standing
  chosen_spanish: estaba
  alternatives_spanish:
  - estaban
  - permanecía
  - se hallaba
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, «Israel» funciona como colectivo singular en español. Se usa «estaba» para mantener la concordancia natural y el sentido durativo de la escena.
- source_word: אֶל הָהָר מִזֶּה
  english_pob_choice: on the mountain on the other side
  chosen_spanish: sobre el monte, del otro lado
  alternatives_spanish:
  - en el monte, del otro lado
  - sobre la montaña, del otro lado
  - en el monte, al otro lado
  lexicon: HALOT
  rationale: La segunda mitad mantiene el paralelismo con la primera. «Del otro lado» expresa con naturalidad la contraposición de מִזֶּה.
- source_word: וְהַגַּיְא
  english_pob_choice: with the valley
  chosen_spanish: con el valle
  alternatives_spanish:
  - y el valle
  - con la hondonada
  - con el desfiladero
  lexicon: HALOT
  rationale: גַּיְא puede ser «valle» o «ravine». En esta escena militar, «valle» es la opción más clara y natural en español. Se conserva la relación aditiva de וְ con «con».
- source_word: בֵּינֵיהֶם
  english_pob_choice: between them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - entre ambos
  - entre los dos
  lexicon: HALOT
  rationale: La frase preposicional se traduce de manera directa. «Entre ellos» es la forma más natural en español para indicar la ubicación del valle.
translation_notes:
  revision_awareness: El inglés POB mantuvo la escena con «mountain» y «valley», y registró las alternativas léxicas «hill» y «ravine». Esta versión española preserva ese mismo núcleo semántico, ajustando únicamente la sintaxis para que suene natural en español y manteniendo la topografía de batalla sin atenuarla ni ampliarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto cuando corresponda.
  - Se usa «monte» para הָר siguiendo la opción principal de la POB en inglés; en nota se deja abierta la alternativa «colina».
  - Se conserva «Israel» como colectivo territorial/nacional, sin expandirlo a «los israelitas» porque el hebreo nombra al grupo como entidad.
  - El valle se vierte como «valle» por claridad, con nota de la posible amplitud semántica hacia «desfiladero» o «hondonada».
