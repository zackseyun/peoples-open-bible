translation:
  language: es
  text: Desde el decimotercer año de Josías, hijo de Amón, rey de Judá, hasta este día, estos veintitrés años, la palabra de Yahvé ha venido a mí, y les he hablado, madrugando y hablando[a], pero no han escuchado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «madrugando y hablando», un hebraísmo que expresa acción repetida y perseverante.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן ... וְעַד
  english_pob_choice: From ... even to
  chosen_spanish: Desde ... hasta
  alternatives_spanish:
  - De ... hasta
  - Desde ... incluso hasta
  lexicon: HALOT
  rationale: La pareja temporal expresa un tramo que va desde un punto inicial hasta el presente señalado. En español, «desde ... hasta» conserva con claridad ese marco extenso y natural.
- source_word: שְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: the thirteenth year
  chosen_spanish: el decimotercer año
  alternatives_spanish:
  - año trece
  - trece años
  lexicon: HALOT
  rationale: El hebreo se refiere a un año regnal, no a una duración de trece años. En español, el ordinal comunica mejor la referencia cronológica.
- source_word: לְיֹאשִׁיָּהוּ בֶן אָמוֹן מֶלֶךְ יְהוּדָה
  english_pob_choice: of Josiah son of Amon, king of Judah
  chosen_spanish: de Josías, hijo de Amón, rey de Judá
  alternatives_spanish:
  - de Josías hijo de Amón, rey de Judá
  - de Josías, el hijo de Amón, rey de Judá
  lexicon: HALOT
  rationale: Se mantiene la fórmula genealógica y regnal. «Hijo de» evita perder la relación familiar y conserva el sentido histórico del texto.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - hoy
  - este mismo día
  lexicon: HALOT
  rationale: «Este día» preserva el tono deíctico y profético del hebreo mejor que «hoy».
- source_word: זֶה שָׁלֹשׁ וְעֶשְׂרִים שָׁנָה
  english_pob_choice: these twenty-three years
  chosen_spanish: estos veintitrés años
  alternatives_spanish:
  - por veintitrés años
  - han sido veintitrés años
  lexicon: HALOT
  rationale: La expresión appositiva con demostrativo se vuelve de forma natural «estos veintitrés años», conservando el matiz de período transcurrido.
- source_word: הָיָה דְבַר יְהוָה אֵלַי
  english_pob_choice: the word of Yahweh has come to me
  chosen_spanish: la palabra de Yahvé ha venido a mí
  alternatives_spanish:
  - la palabra de Yahvé vino a mí
  - la palabra de Yahvé estaba conmigo
  lexicon: HALOT
  rationale: «Ha venido a mí» reproduce bien el valor perfecto con continuidad hasta el presente en el marco temporal dado. Se mantiene «Yahvé» por la convención del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como «Yahvé» según la terminología del proyecto, evitando la sustitución por un título.
- source_word: וָאֲדַבֵּר אֲלֵיכֶם
  english_pob_choice: and I have spoken to you
  chosen_spanish: y he hablado a ustedes
  alternatives_spanish:
  - y les hablé
  - y les he hablado
  lexicon: HALOT
  rationale: El perfecto español comunica bien la acción que se extiende dentro del período descrito. «A ustedes» mantiene el complemento pronominal sin ambigüedad.
- source_word: אַשְׁכֵּים וְדַבֵּר
  english_pob_choice: rising early and speaking
  chosen_spanish: madrugando y hablando
  alternatives_spanish:
  - levantándome temprano y hablando
  - madrugando para hablar
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática con un español natural. «Madrugando y hablando» refleja el hebreo sin forzar una paráfrasis excesiva.
- source_word: וְלֹא שְׁמַעְתֶּם
  english_pob_choice: but you have not listened
  chosen_spanish: pero no han escuchado
  alternatives_spanish:
  - pero no me han escuchado
  - pero no obedecieron
  lexicon: HALOT
  rationale: «Escuchado» preserva la metáfora auditiva de שׁמע sin convertirla directamente en «obedecer». El perfecto español mantiene el contraste con el período todavía vigente.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La fuente hebrea usa el nombre propio divino. En la tradición del proyecto español, «Yahvé» preserva ese nombre y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Handling the prophetic idiom אַשְׁכֵּים וְדַבֵּר
  english_pob_reading: rising early and speaking
  chosen_spanish_reading: madrugando y hablando
  alternative_spanish_readings:
  - levantándome temprano y hablando
  - madrugando para hablar
  rationale: El giro comunica la perseverancia e insistencia profética. Se conserva la imagen verbal del hebreo con una formulación española que no elimina el matiz reiterativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve significant lexical decisions'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español en «Amón[a]». Se mantuvo la decisión auditada de reflejar el hebraísmo אַשְׁכֵּים וְדַבֵּר con una formulación española natural y se evitó depender de una nota sin anclaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene el registro bíblico formal y contemporáneo, evitando calcos rígidos donde el español requiere fluidez.
  - La secuencia temporal «desde ... hasta este día» y el resumen «estos veintitrés años» preservan el marco profético del original.
