    rationale: Aunque comprensible, suena calco. “grande en hazañas” o “grande en obras” comunica mejor el elogio militar/narrativo de רַב פְּעָלִים.
  - severity: low
    issue: “él descendió” añade énfasis innecesario
    rationale: El pronombre independiente hebreo sirve al flujo narrativo, pero en español basta “bajó” o “descendió” sin “él”.
