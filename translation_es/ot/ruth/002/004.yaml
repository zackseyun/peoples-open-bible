translation:
  language: es
  text: 'Y he aquí, Booz llegó de Belén y dijo a los segadores: «Yahvé esté con ustedes[a]». Ellos le respondieron: «Que Yahvé te bendiga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé con ustedes», una fórmula de saludo o bendición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y he aquí
  - Y mira
  lexicon: HALOT
  rationale: La partícula narrativa introduce la escena con vivacidad deíctica. «Y he aquí» conserva el tono formal y el valor de sorpresa/presentación del hebreo sin caer en un calco áspero.
- source_word: בֹּעַז
  english_pob_choice: Boaz
  chosen_spanish: Booz
  alternatives_spanish:
  - Boaz
  lexicon: transliteración bíblica tradicional
  rationale: En español bíblico es común la forma «Booz», que mantiene la identificación del personaje y resulta legible para lectores de iglesia; no altera el referente.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El verbo de movimiento en contexto narrativo admite «llegó», que suena natural en español y transmite el ingreso a la escena desde Belén.
- source_word: מִבֵּית לֶחֶם
  english_pob_choice: from Bethlehem
  chosen_spanish: de Belén
  alternatives_spanish:
  - desde Belén
  lexicon: toponimia bíblica
  rationale: «De Belén» refleja directamente la procedencia indicada por la preposición מִן. «Desde Belén» es posible, pero «de» es más conciso y natural aquí.
- source_word: לַקֹּצְרִים
  english_pob_choice: to the reapers
  chosen_spanish: a los segadores
  alternatives_spanish:
  - a los reaperos
  - a los cosechadores
  lexicon: HALOT
  rationale: «Segadores» comunica el oficio agrícola de קוצרים con registro bíblico natural en español. «Cosechadores» es menos tradicional y «reaperos» no es idiomático.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se preserva el nombre divino propio en forma española estable «Yahvé», coherente con la política del proyecto y con el hebreo directo del texto.
- source_word: עִמָּכֶם
  english_pob_choice: be with you
  chosen_spanish: esté con ustedes
  alternatives_spanish:
  - está con ustedes
  - sea con ustedes
  lexicon: HALOT
  rationale: 'La cláusula nominal de bendición/greeting se expresa mejor en español con un subjuntivo volitivo: «esté con ustedes». «Sea con ustedes» también es posible, pero menos natural aquí.'
- source_word: יְבָרֶכְךָ
  english_pob_choice: May the LORD bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - lo bendiga
  - os bendiga
  lexicon: HALOT
  rationale: El verbo expresa un deseo o bendición dirigida al interlocutor singular. En español, «te bendiga» reproduce la fuerza volitiva sin sobrecargar el enunciado con una fórmula más larga.
theological_decisions:
- issue: Rendering of the divine name יְהוָה in the blessing and reply
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa el Tetragrammaton de forma directa en ambos casos. La traducción mantiene el nombre propio divino en español, evitando la sustitución por un título y preservando el valor de alianza del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Volitive force of the greetings and blessing formulas
  english_pob_reading: '''Yahweh be with you'' / ''May Yahweh bless you'''
  chosen_spanish_reading: «Yahvé esté con ustedes» / «Yahvé te bendiga»
  alternative_spanish_readings:
  - «Yahvé está con ustedes» / «Yahvé te bendiga»
  - «Que Yahvé esté con ustedes» / «Que Yahvé te bendiga»
  rationale: El hebreo contiene fórmulas benedictorias o de saludo con sentido desiderativo. El español debe reflejar ese matiz volitivo; por eso se usa subjuntivo sin añadir una partícula innecesaria.
  doctrine_reference: Uso volitivo en bendiciones y saludos bíblicos
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en el valor formal de וְהִנֵּה ('And behold'), pero se decidió una equivalencia española natural y digna («Y he aquí»). También se respetó la conservación del nombre divino como traducción del Tetragrammaton, adaptándolo al estándar español del proyecto («Yahvé»).
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» conforme al estándar del proyecto.
  - Se preserva el tono de bendición/saludo con subjuntivo volitivo en español.
  - La traducción evita calcos excesivamente literales y conserva la escena narrativa breve y directa.
