lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - gobernó
  - fue juez de
  lexicon: HALOT
  rationale: En Jueces, שׁפט designa la función recurrente de los jueces sobre Israel. «Juzgó» conserva ese término estructural sin convertirlo en una paráfrasis administrativa o militar.
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Luego de él
  - Después de Ibzán
  lexicon: HALOT
  rationale: El pronombre remite al juez anterior en el contexto inmediato. En español, «Después de él» mantiene la referencia sin añadir el nombre del antecesor, que no está explícito en el versículo.
- source_word: אֵילוֹן
  english_pob_choice: Elon
  chosen_spanish: Elón
  alternatives_spanish:
  - Elon
  lexicon: transliteración propia
  rationale: Se conserva el nombre propio con acento gráfico español para lectura natural. No se traduce ni se adapta más allá de la transliteración.
- source_word: הַזְּבוּלֹנִי
  english_pob_choice: the Zebulunite
  chosen_spanish: el zabulonita
  alternatives_spanish:
  - el de Zabulón
  - el zebulonita
  lexicon: HALOT
  rationale: El gentilicio identifica a Elón por su filiación tribal. «Zabulonita» es la forma natural en español bíblico y conserva el valor adjetival del hebreo.
- source_word: עֶשֶׂר שָׁנִים
  english_pob_choice: ten years
  chosen_spanish: diez años
  alternatives_spanish:
  - por diez años
  lexicon: HALOT
  rationale: La duración se expresa con la fórmula idiomática normal en español. No se añade una preposición que el hebreo no exige.
translation_notes:
  revision_awareness: 'Esta redacción sigue el texto hebreo directo y la auditoría inglesa, pero evita la cláusula repetida que en una versión previa podía sonar redundante en español. Mantiene el mismo contenido semántico: sucesión, identidad tribal, acto de juzgar y duración del cargo.'
  spanish_consistency_notes:
  - Se conserva «juzgó» como término técnico de Jueces.
  - Se mantiene un estilo sobrio y publicable, sin ampliar el alcance del verbo.
  - El gentilicio tribal se normaliza como «zabulonita» para claridad en español.
  - No se añaden notas al pie porque no hay una ambigüedad que requiera marca textual en esta línea.
