translation:
  language: es
  text: Y la palabra de Yahvé vino a mí[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé», el nombre divino. El texto principal conserva esta forma según la norma del proyecto.'
    reason: lexical_explanation
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una nueva unidad discursiva. En español, «Y vino» conserva el movimiento y la inmediatez del hebreo sin recurrir a un calco duro como «y fue» o a una paráfrasis más libre. Mantiene el enlace con el versículo anterior y suena natural en registro bíblico contemporáneo.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la voz
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר־יְהוָה, «la palabra» preserva el valor técnico y teológico de revelación divina. «Mensaje» aclara, pero debilita la formulación establecida; «voz» no corresponde bien al sustantivo hebreo aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la norma del proyecto en español, se translitera como «Yahvé» para preservar el nombre propio divino en vez de sustituirlo por un título. «El SEÑOR» ocultaría el nombre; «Jehová» no es la forma adoptada por este proyecto.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La forma preposicional con sufijo de primera persona se expresa de manera directa como «a mí». Es la opción más natural y fiel al valor básico de אֵלַי en este contexto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: La construcción infinitiva introduce el discurso que sigue. «Diciendo» conserva la función formulaica y el tono profético; «y dijo» reestructura innecesariamente, y «con estas palabras» sería más explicativo que el hebreo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo contiene el nombre propio de Dios, no un título. La forma española «Yahvé» mantiene visible la referencia al Tetragrámaton y se ajusta al estándar del proyecto, evitando la sustitución tradicional por «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética de revelación
  english_pob_reading: the word of Yahweh came to me, saying,
  chosen_spanish_reading: vino la palabra de Yahvé a mí, diciendo,
  alternative_spanish_readings:
  - me llegó la palabra de Yahvé, diciendo,
  - Yahvé me habló, diciendo,
  rationale: La lectura elegida conserva la fórmula profética formal y la relación entre la palabra divina y el profeta. «Me habló» es más dinámico, pero reduce la fuerza técnica de la expresión hebrea; «me llegó» es posible, aunque menos inmediato que el verbo de movimiento presente en la línea.
  doctrine_reference: 'DOCTRINE.md: Prophetic revelation formulas'
translation_notes:
  revision_awareness: La revisión en inglés quedó sin cambios y con acuerdo alto; no hay indicios de corrección textual o de cambio de lectura. La versión española sigue esa lectura estable, manteniendo la fórmula profética y la transliteración del nombre divino de acuerdo con el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la fórmula profética con «la palabra ... vino ... diciendo», sin sustituirla por una paráfrasis más interpretativa.
  - Se evita el arcaísmo excesivo, pero se conserva un registro bíblico sobrio y publicable.
