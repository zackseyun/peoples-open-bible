revisions:
- from: porque no escucharon la voz de Yahvé su Dios[a], sino que transgredieron su pacto[b], todo lo que Moisés, el esclavo[c] de Yahvé, había mandado; no escucharon ni lo hicieron.
  to: porque no escucharon la voz de Yahvé su Dios[a], sino que transgredieron su pacto[b], todo lo que Moisés, siervo de Yahvé, mandó[c]; no escucharon ni lo hicieron.
  rationale: Se corrige «esclavo» a «siervo» porque, en este contexto, עֶבֶד es un título honorífico establecido para Moisés y así lo documenta el expediente inglés. Se ajusta «había mandado» a «mandó» para seguir mejor el hebreo y mejorar la naturalidad. Se reemplaza la nota c por la nota de énfasis repetitivo que sí está respaldada por el rastro inglés; las notas restantes se conservan con leve pulido idiomático.
