translation:
  language: es
  text: Si no hago las obras de mi Padre[a], no me crean;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no crean lo que digo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  lexicon: BDAG
  rationale: Introduce una cláusula condicional simple y directa, fiel al protasis griego y natural en español.
- source_word: οὐ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no ...
  lexicon: BDAG
  rationale: La negación de ποιῶ se expresa de manera natural en español con 'no' ante el verbo finito.
- source_word: ποιῶ
  english_pob_choice: am not doing
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - realizo
  lexicon: BDAG
  rationale: El presente indicativo español puede abarcar el valor progresivo sin necesidad de marcarlo explícitamente; 'hago' mantiene la sencillez y la referencia a la acción en curso.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las obras
  - las acciones
  lexicon: BDAG
  rationale: '''Obras'' es el equivalente más natural de ἔργα en este contexto joánico y conserva el peso teológico de las acciones de Jesús.'
- source_word: τοῦ πατρός μου
  english_pob_choice: of my Father
  chosen_spanish: de mi Padre
  alternatives_spanish:
  - de mi Padre celestial
  - de mi propio Padre
  lexicon: BDAG
  rationale: Se conserva la relación posesiva directa. 'Padre' se capitaliza como título divino en este contexto.
- source_word: μὴ πιστεύετέ μοι
  english_pob_choice: do not believe me
  chosen_spanish: no me crean
  alternatives_spanish:
  - no crean en mí
  - no me crean a mí
  lexicon: BDAG
  rationale: La forma imperativa con μή se vierte como prohibición. 'Crean' comunica con naturalidad la credencia personal dirigida a Jesús; el matiz de 'creer lo que digo' queda como alternativa documental si se desea explicitar el valor testimonial.
theological_decisions:
- issue: Alcance de πιστεύω con dativo μοι
  english_pob_reading: 'personal trust/credence directed toward Jesus: ''do not believe me'''
  chosen_spanish_reading: 'credibilidad personal dirigida a Jesús: ''no me crean'''
  alternative_spanish_readings:
  - no crean en mí
  - no crean lo que digo
  rationale: El dativo con πιστεύω admite el sentido de creer a alguien. En este contexto, Jesús apela a sus obras como garantía de sus afirmaciones; por eso se mantiene la forma breve y personal, sin interpretar de más el objeto de la creencia.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; Johannine testimony and signs'
translation_notes:
  revision_awareness: El texto base inglés permaneció sin cambios en la última revisión; no hay revisiones aplicadas que alteren la decisión española. La solución española conserva la misma tensión semántica entre creer a Jesús personalmente y creer su testimonio.
  spanish_consistency_notes:
  - Se mantiene el uso de 'Padre' con mayúscula para el título divino en Juan.
  - Se evita 'Cristo' porque el versículo no usa Χριστός ni exige un título mesiánico.
  - '''Obras'' se conserva como término joánico estándar y no se sustituye por ''milagros'' para no estrechar el alcance del griego ἔργα.'
  - La nota al pie ofrece la alternativa proposicional sin desplazar la lectura principal del texto.
