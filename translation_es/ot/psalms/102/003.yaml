translation:
  language: es
  text: No ocultes de mí tu rostro[a] en el día de mi angustia[b]; inclina hacia mí tu oído. En el día en que clamo, respóndeme pronto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presencia» para «rostro»; el hebreo puede referirse a la presencia favorable de Dios.
    reason: lexical_alternative
  - marker: b
    text: 'O «en el día de la angustia que me aflige»; el hebreo literalmente dice: «en el día de angustia para mí».'
    reason: lexical_alternative
  - marker: c
    text: O «apresúrate a responderme».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תַּסְתֵּר
  english_pob_choice: Do not hide
  chosen_spanish: No ocultes
  alternatives_spanish:
  - No escondas
  - No apartes
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de ocultar/esconder; en súplica poética, «No ocultes» conserva el mandato implorativo con naturalidad en español.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu faz
  - tu presencia
  lexicon: HALOT
  rationale: «Rostro» mantiene la imagen concreta del hebreo y es claro en español. Se evita reemplazarlo de entrada por «presencia» para no borrar la metáfora, aunque esa sea una posible implicación.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartado de mí
  lexicon: HALOT
  rationale: La relación de separación se expresa de forma directa y natural con «de mí» en español.
- source_word: בְּיוֹם
  english_pob_choice: in the day
  chosen_spanish: en el día
  alternatives_spanish:
  - el día en que
  - cuando
  lexicon: HALOT
  rationale: Se conserva la repetición temporal del hebreo con una forma española transparente y reverente.
- source_word: צַר לִי
  english_pob_choice: of my distress
  chosen_spanish: de mi angustia
  alternatives_spanish:
  - de mi aflicción
  - en mi angustia
  - cuando me angustio
  lexicon: HALOT
  rationale: La frase indica una situación de apremio que afecta al hablante; «angustia» comunica bien ese valor en español moderno y litúrgico.
- source_word: הַטֵּה
  english_pob_choice: incline
  chosen_spanish: inclina
  alternatives_spanish:
  - tiende
  - baja
  lexicon: HALOT
  rationale: El verbo se usa como idiomatisimo de atención al escuchar; «inclina» es la opción más fiel y estable en el lenguaje bíblico.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: Con «inclina» en español resulta más idiomático decir «hacia mí» para conservar el movimiento direccional implícito.
- source_word: אָזְנֶךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu oído atento
  lexicon: HALOT
  rationale: «Oído» conserva la imagen antropomórfica y es el sustantivo más natural en español bíblico para el acto de escuchar.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: clamo
  alternatives_spanish:
  - llamo
  - grito
  - invoco
  lexicon: HALOT
  rationale: En contexto de lamento y oración, «clamo» expresa mejor la intensidad devocional que un simple «llamo».
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - sin demora
  - de prisa
  lexicon: HALOT
  rationale: Como adverbio que modifica la respuesta divina, «pronto» es claro y natural en español; conserva urgencia sin sonar mecánico.
- source_word: עֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - atiéndeme
  lexicon: HALOT
  rationale: En petición dirigida a Dios, «respóndeme» es la forma más estable y digna en español; evita sonar coloquial.
theological_decisions:
- issue: Imagen de «rostro» / posible «presencia»
  english_pob_reading: Preserve the concrete imagery in the main text
  chosen_spanish_reading: Conservar «rostro» en el texto principal
  alternative_spanish_readings:
  - sustituir por «presencia»
  rationale: La metáfora hebrea comunica favor y cercanía divina sin exigir una lectura corporal de Dios. El español puede conservarla sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §3, §6
- issue: Estructura temporal repetida
  english_pob_reading: Keep the repeated 'in the day' structure
  chosen_spanish_reading: Mantener la repetición con «en el día»
  alternative_spanish_readings:
  - colapsar en «cuando»
  rationale: La repetición forma parte del paralelismo poético del versículo y refuerza la urgencia de la súplica; por eso se preserva.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de צַר לִי
  english_pob_reading: of my distress / trouble for me
  chosen_spanish_reading: de mi angustia
  alternative_spanish_readings:
  - de mi aflicción
  - cuando estoy en angustia
  rationale: Se mantiene el sentido de una aflicción personal real sin diluir la expresión en una paráfrasis más general.
  doctrine_reference: HALOT; poetic lament usage
translation_notes:
  revision_awareness: El texto sigue el consenso del audit trail inglés y no requiere cambios según la última revisión; se preservan la imagen de «rostro», la repetición temporal y la urgencia de la respuesta divina con equivalentes naturales en español.
  spanish_consistency_notes:
  - Se usa «rostro» en lugar de «presencia» en el texto principal, conforme a la decisión de conservar la metáfora.
  - «Angustia» refleja el valor personal de צַר לִי sin perder la fuerza poética del lamento.
  - «Clamo» y «respóndeme pronto» mantienen el registro de oración urgente propio del versículo.
  - Las notas a y b/c se mantienen como alternativas léxicas pertinentes y no contradicen el texto principal.
