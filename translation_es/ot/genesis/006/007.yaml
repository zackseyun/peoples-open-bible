    reason: lexical_alternative
  - marker: b
    text: O «siento pesar de haberlos hecho». El hebreo expresa pesar o regret atribuido a Dios; esta traducción conserva esa tensión sin insinuar culpa moral en Dios.
    reason: theological_note
  - marker: c
    text: Lit. «aves de los cielos»; también puede traducirse «aves del cielo». La expresión sigue de cerca el hebreo.
    reason: lexical_alternative
  revision_rationale: Se corrige la formulación de נִחַמְתִּי para evitar la implicación de arrepentimiento moral en Dios y alinearla con el rationale documentado del POB. También se reubican y corrigen las notas para que correspondan a los lugares y contenidos adecuados, especialmente la nota sobre «aves de los cielos». No se requieren cambios mayores en la estructura restante del versículo.
