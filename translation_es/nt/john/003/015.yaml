translation:
  language: es
  text: para que todo el que cree en él tenga vida eterna[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quien cree».
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones traducen esta frase «hacia él», pero el griego aquí dice «en él» (ἐν αὐτῷ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa finalidad; en español, «para que» es la forma natural y fiel para un propósito/resulto subordinado sin endurecer el estilo.
- source_word: πᾶς ὁ πιστεύων
  english_pob_choice: everyone who believes
  chosen_spanish: todo el que cree
  alternatives_spanish:
  - todo el que cree en él
  - quien cree
  - todos los que creen
  lexicon: BDAG
  rationale: El participio articular presente funciona sustantivamente como un genérico singular. «Todo el que cree» preserva el alcance universal y la construcción singular en español.
- source_word: πιστεύων
  english_pob_choice: believes
  chosen_spanish: cree
  alternatives_spanish:
  - tiene fe
  - confía
  lexicon: BDAG
  rationale: En Juan, πιστεύω se traduce con «cree» de manera transparente y estable. Evita una paráfrasis innecesaria y mantiene la fuerza verbal del griego.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - hacia él
  lexicon: BDAG
  rationale: El texto griego dice ἐν, no εἰς. Por eso se conserva «en él» y no una lectura direccional como «hacia él» o «en él / dentro de él».
- source_word: ἔχῃ
  english_pob_choice: may have
  chosen_spanish: tenga
  alternatives_spanish:
  - pueda tener
  - tenga que
  lexicon: BDAG
  rationale: El subjuntivo presente bajo ἵνα pide una forma final. En español, «para que ... tenga» expresa naturalmente finalidad sin añadir matices de posibilidad que no están en el griego.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida eterna
  - vida del siglo venidero
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia usual y fiel en contexto joánico. Mantiene el valor escatológico de αἰώνιος sin volver el español artificial.
theological_decisions:
- issue: Relación entre ἐν αὐτῷ y la tradición de traducciones con lectura direccional
  english_pob_reading: in him
  chosen_spanish_reading: en él
  alternative_spanish_readings:
  - hacia él
  - en él, con lectura implícita de unión
  rationale: 'Se conserva el valor preposicional real del griego. La decisión no intenta importar εἰς ni suavizar la construcción: la fe se sitúa ''en él'' conforme al texto base.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance genérico de πᾶς ὁ πιστεύων
  english_pob_reading: everyone who believes
  chosen_spanish_reading: todo el que cree
  alternative_spanish_readings:
  - quien cree
  - todos los que creen
  rationale: La expresión es inclusiva y genérica, no masculina específica. «Todo el que cree» conserva ese alcance y respeta la forma singular substantivada del participio.
  doctrine_reference: Translation philosophy §4
- issue: Finalidad de ἵνα con subjuntivo
  english_pob_reading: so that ... may have
  chosen_spanish_reading: para que ... tenga
  alternative_spanish_readings:
  - a fin de que ... tenga
  - de modo que ... tenga
  rationale: La subordinada expresa propósito. En español bíblico actual, «para que» comunica esa finalidad de manera clara y digna.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios; no se introdujeron enmiendas respecto al audit trail inglés, solo una traslación española ajustada al griego fuente.
  spanish_consistency_notes:
  - Se mantuvo «vida eterna» como terminología joánica estable.
  - Se evitó «Señor» o «Cristo» porque no aparecen en el versículo.
  - Se preservó el valor de ἐν con «en él», conforme al texto griego.
  - La estructura con «todo el que» refleja el genérico singular del participio articular.
