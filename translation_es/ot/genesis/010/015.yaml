lexical_decisions:
- source_word: וּ/כְנַעַן
  english_pob_choice: And Canaan
  chosen_spanish: Y Canaán
  alternatives_spanish:
  - Ahora Canaán
  - Canaán
  lexicon: HALOT
  rationale: La conjunción inicial se conserva como enlace genealógico simple con «Y». El nombre propio se translitera como «Canaán» según el uso español habitual y la política del POB de transliterar nombres.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  - engendró
  lexicon: HALOT
  rationale: En una genealogía, יָלַד expresa la relación de procreación. «Engendró» preserva el valor genealógico y es natural en español bíblico sin caer en una paráfrasis excesiva.
- source_word: צִידֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidon
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma española estándar «Sidón», más reconocible y fiel a la tradición hispana de transliteración de topónimos y antropónimos bíblicos.
- source_word: בְּכֹר/וֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su primero
  - su hijo mayor
  lexicon: HALOT
  rationale: La forma con sufijo posesivo señala a Sidón como el primogénito de Canaán. «Primogénito» conserva el valor lexical y genealógico del hebreo; el posesivo se expresa de manera natural con «su».
- source_word: וְ/אֶת
  english_pob_choice: and
  chosen_spanish: y a
  alternatives_spanish:
  - y
  - y lo
  lexicon: HALOT
  rationale: El hebreo une el segundo descendiente con una conjunción y marcador de objeto directo. En español, «y a» comunica naturalmente la coordinación con objeto personal sin añadir contenido ajeno al texto.
- source_word: חֵת
  english_pob_choice: Heth
  chosen_spanish: Heth
  alternatives_spanish:
  - Het
  - Jeth
  lexicon: HALOT
  rationale: Se mantiene el nombre propio como «Heth», acorde con el audit trail inglés y con la transliteración directa del hebreo, sin expansión interpretativa en el texto principal.
translation_notes:
  revision_awareness: El inglés POB mantiene una genealogía literal y no introduce ampliaciones explicativas en el texto principal; solo añade una nota cruzada para Heth. Dado que la españolización no requiere aclaración adicional para la lectura pública, se conserva la misma sobriedad y no se agrega nota en el texto.
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico breve y secuencial del pasaje.
  - Se preserva el valor de parentesco de בְּכֹר con «primogénito».
  - No se añade nota textual porque el inglés solo usa una nota cruzada explicativa y el español principal no necesita anclaje adicional.
