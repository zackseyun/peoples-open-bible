id: 2TH.1.9
reference: 2 Thessalonians 1:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἵτινες δίκην τίσουσιν ὄλεθρον αἰώνιον ἀπὸ προσώπου τοῦ κυρίου καὶ ἀπὸ τῆς δόξης τῆς ἰσχύος αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/001/009.yaml
  text: These will pay the penalty of eternal destruction[a], away from the presence of the Lord and from the glory of his might,
  footnotes:
  - marker: a
    text: Or possibly, 'destruction that comes from the presence of the Lord and from the glory of his might.' The Greek preposition can be understood either as separation ('away from') or as source/origin ('from').
    reason: alternative_reading
translation:
  language: ko
  text: 이들은 영원한 멸망의 형벌을 받을 것이니, 주의 얼굴로부터 그리고 그분의 강력하신 영광으로부터 떨어져 있을 것입니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주의 얼굴과 그분의 강력하신 영광으로부터 오는 멸망」. 헬라어 ἀπό는 분리(「~로부터 떨어져」)로도, 출처(「~로부터 오는」)로도 읽을 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: These
  chosen_korean: 이들은
  alternatives_korean:
  - 그러한 자들은
  - 그들은
  lexicon: BDAG
  rationale: 앞 구절의 박해자들을 받는 자연스러운 한국어 지시 표현.
- source_word: δίκην τίσουσιν
  english_pob_choice: will pay the penalty
  chosen_korean: 형벌을 받을 것이니
  alternatives_korean:
  - 벌을 치를 것이니
  - 처벌을 받을 것이니
  lexicon: BDAG
  rationale: δίκη + τίνω는 사법적 형벌을 치르는 의미. 한국어 「형벌을 받다」가 미래의 사법적 결과를 자연스럽게 표현한다.
- source_word: ὄλεθρον αἰώνιον
  english_pob_choice: eternal destruction
  chosen_korean: 영원한 멸망
  alternatives_korean:
  - 영구한 파멸
  - 영원한 파멸
  lexicon: BDAG
  rationale: 종말론적 정황에서 αἰώνιος는 「영원한」으로 옮긴다. ὄλεθρος는 「멸망」이 표준이며 양상(소멸/영원한 형벌)에 대한 교리적 결정을 강요하지 않는다.
- source_word: ἀπὸ προσώπου τοῦ κυρίου
  english_pob_choice: away from the presence of the Lord
  chosen_korean: 주의 얼굴로부터 떨어져
  alternatives_korean:
  - 주의 임재로부터 떨어져
  - 주의 면전으로부터 떨어져
  lexicon: BDAG
  rationale: 직역 「얼굴」을 유지하되, 분리의 ἀπό 의미를 「떨어져」로 표현한다. 「임재」로 의역하지 않음으로써 출처 해석의 여지를 본문에 남긴다.
- source_word: ἀπὸ τῆς δόξης τῆς ἰσχύος αὐτοῦ
  english_pob_choice: from the glory of his might
  chosen_korean: 그분의 강력하신 영광으로부터
  alternatives_korean:
  - 그분의 능력의 영광으로부터
  - 그분의 권능의 영광으로부터
  lexicon: BDAG
  rationale: δόξα는 「영광」, ἰσχύς는 「강력함/능력」. 한국어로 자연스럽게 「강력하신 영광」으로 결합한다.
theological_decisions:
- issue: ἀπό의 의미 — 분리 또는 출처
  chosen_reading: 분리/배제 — 「주의 얼굴로부터 떨어져」
  alternative_readings:
  - 출처 — 「주의 얼굴로부터 오는 멸망」
  rationale: 두 해석 모두 문법적으로 가능하며 해석사적 무게가 있다. 본문은 사법적 형벌의 정황상 분리 해석을 본문에 두고, 출처 해석을 각주로 보존한다.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension'
- issue: ὄλεθρον αἰώνιον의 양상
  chosen_reading: 영원한 멸망(소멸론 또는 영벌론 양상은 본문이 결정하지 않으므로 좁히지 않음)
  alternative_readings:
  - 소멸론적 해석
  - 영원한 의식적 형벌 해석
  rationale: 본문 자체가 양상을 확정하지 않으므로 번역도 그 결정을 강요하지 않는다.
  doctrine_reference: 'Do not import doctrinal claims the text does not make'
