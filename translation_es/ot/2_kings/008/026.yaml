translation:
  language: es
  text: Ocozías tenía veintidós años cuando comenzó a reinar, y reinó un año en Jerusalén. El nombre de su madre era Atalía, hija[a] de Omrí, rey de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descendiente de Omrí'. En hebreo, 'hija' a veces puede denotar una descendiente o integrante de una dinastía, no necesariamente una hija inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: was twenty-two years old
  chosen_spanish: tenía veintidós años
  alternatives_spanish:
  - era de veintidós años
  - era un hijo de veintidós años
  lexicon: HALOT
  rationale: La fórmula hebrea expresa edad de modo idiomático. En español natural, 'tenía veintidós años' comunica el valor exacto sin forzar el giro literal 'hijo de veintidós años'.
- source_word: בְמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando empezó a reinar
  alternatives_spanish:
  - cuando comenzó a reinar
  - cuando se hizo rey
  lexicon: HALOT
  rationale: La construcción verbal de acceso al trono se expresa con naturalidad en español como el inicio del reinado. 'Empezó a reinar' conserva el sentido funcional del inglés POB y del hebreo.
- source_word: וְשָׁנָה אַחַת מָלַךְ
  english_pob_choice: and he reigned one year
  chosen_spanish: y reinó un año
  alternatives_spanish:
  - y reinó por un año
  - y reinó durante un año
  lexicon: HALOT
  rationale: El hebreo indica duración breve y directa. 'Reinó un año' es fiel, idiomático y mantiene la concisión del texto fuente.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español, sin decisión interpretativa adicional.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother's name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre se llamaba
  lexicon: HALOT
  rationale: La fórmula hebrea es nominal y formal. En español, 'El nombre de su madre era' preserva la estructura informativa con tono bíblico sobrio, sin perder naturalidad.
- source_word: עֲתַלְיָהוּ
  english_pob_choice: Athaliah
  chosen_spanish: Atalía
  alternatives_spanish:
  - Atalía
  lexicon: standard transliteration into Spanish
  rationale: Se usa la forma habitual en español bíblico. La adaptación gráfica 'Atalía' es transparente y respeta la tradición de transliteración española.
- source_word: בַּת עָמְרִי
  english_pob_choice: the daughter of Omri
  chosen_spanish: hija de Omrí
  alternatives_spanish:
  - descendiente de Omrí
  - mujer de la casa de Omrí
  lexicon: HALOT
  rationale: El hebreo 'hija' puede indicar descendencia dinástica, no solo filiación inmediata. Se conserva 'hija' en el texto principal, como en el inglés POB, porque esa es la lectura más literal; el posible alcance genealógico amplio queda documentado en la nota.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  lexicon: HALOT
  rationale: Construcción posesiva estándar, sin necesidad de ajustes semánticos.
theological_decisions:
- issue: Alcance genealógico de 'hija de Omrí'
  english_pob_reading: 'Retain the literal familial term in the main text: ''the daughter of Omri,'' while noting the possible broader sense ''descendant of Omri'' in a footnote.'
  chosen_spanish_reading: Mantener 'hija de Omrí' en el texto principal y señalar en nota la posible lectura amplia 'descendiente de Omrí'.
  alternative_spanish_readings:
  - descendiente de Omrí
  - miembro de la dinastía de Omrí
  rationale: No es una cuestión doctrinal, sino lexical e histórica. El hebreo permite un uso ampliado de 'hija' para descendencia o pertenencia dinástica. La forma principal conserva la literalidad; la nota preserva la tensión interpretativa sin resolverla indebidamente.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se reportaron cambios y el acuerdo de revisión fue alto. Se mantuvo la lectura literal con nota para la posible amplitud genealógica de ''hija de Omrí''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponde a Tetragrámaton; este versículo no contiene el nombre divino.
  - Se prefirió 'rey'/'reinar' por ser la terminología directa del hebreo y del inglés auditado.
  - Se mantuvo una puntuación sobria y publication-readable, acorde con un registro bíblico moderno en español.
