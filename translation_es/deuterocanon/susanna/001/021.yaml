  to: Y sucedió que, cuando las criadas[a] habían salido, los dos ancianos se levantaron y se lanzaron sobre ella.
  rationale: Se ajusta la fórmula narrativa a un español más natural («Y sucedió que»), se traduce τὰ κοράσια con «criadas» para reflejar mejor el contexto doméstico documentado por el POB, y se refuerza ἐπέδραμον con «se lanzaron sobre ella» para preservar la agresividad súbita del original sin sobreinterpretarlo.
