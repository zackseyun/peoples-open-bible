translation:
  language: es
  text: 'Ella le dijo a su señora: «¡Ojalá mi señor estuviera delante del profeta que está en Samaria! Entonces lo curaría[a] de su lepra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más idiomáticamente, «lo sanaría». El verbo hebreo es literalmente «recoger» o «reunir», usado aquí con el sentido de quitarle o hacerlo recobrar de su enfermedad.
    reason: lexical_alternative
  - marker: b
    text: «Lepra» traduce el término hebreo tradicional צָרַעַת, que también puede referirse más ampliamente a una enfermedad grave de la piel.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבִרְתָּהּ
  english_pob_choice: her mistress
  chosen_spanish: su señora
  alternatives_spanish:
  - su ama
  - su patrona
  lexicon: HALOT
  rationale: El término señala a una superiora femenina dentro de un ámbito doméstico o social. «Señora» comunica dignidad y jerarquía sin cargar en español moderno una connotación ajena o demasiado rígida. Evita además que «ama» suene demasiado esclavista o «patrona» demasiado moderno.
- source_word: אַחֲלֵי
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá!
  alternatives_spanish:
  - Si tan solo
  - ¡Quién pudiera!
  lexicon: HALOT
  rationale: La partícula expresa deseo vehemente o anhelo. «Ojalá» es la forma natural y digna en español para este valor optativo, manteniendo la fuerza emotiva del hebreo.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi maestro
  lexicon: HALOT
  rationale: Aquí la joven se dirige con respeto a Naamán. «Mi señor» conserva la deferencia del posesivo y suena más natural que «mi amo», que en español puede sugerir una relación esclavista más dura de la que el contexto inmediato necesita enfatizar.
- source_word: לִפְנֵי
  english_pob_choice: were before
  chosen_spanish: estuviera delante de
  alternatives_spanish:
  - estuviera en presencia de
  - estuviera ante
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para estar en presencia de alguien. «Delante de» conserva la imagen espacial del texto fuente y sigue siendo idiomático en español.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta Eliseo
  lexicon: HALOT
  rationale: El hebreo usa el título y no el nombre propio. Mantener «el profeta» respeta esa forma y deja que el contexto identifique a Eliseo sin añadir información que el verso no explicita.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: que está en Samaria
  alternatives_spanish:
  - en Samaria
  lexicon: HALOT
  rationale: El relativo explícita la localización del profeta con fluidez natural en español. Aunque el hebreo simplemente dice «en Samaria», la formulación conservada evita una construcción demasiado compacta al introducir el antecedente «el profeta».
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así
  lexicon: HALOT
  rationale: Marca la consecuencia del deseo expresado antes. «Entonces» reproduce bien esa secuencia lógica en español.
- source_word: יֶאֱסֹף
  english_pob_choice: would cure him
  chosen_spanish: lo sanaría
  alternatives_spanish:
  - lo curaría
  - lo restauraría
  lexicon: HALOT
  rationale: La POB inglesa pasó de una glosa literal («gather him in») a una equivalencia natural tras revisión. En español, «sanaría» comunica el resultado terapéutico con claridad y mantiene el sentido del verbo en este contexto. «Curaría» también es posible, pero «sanaría» suena más fluido en registro bíblico contemporáneo.
- source_word: מִצָּרַעְתּוֹ
  english_pob_choice: from his leprosy
  chosen_spanish: de su lepra
  alternatives_spanish:
  - de su enfermedad de la piel
  - de su afección cutánea
  lexicon: HALOT
  rationale: Se conserva el término tradicional «lepra», siguiendo la POB inglesa y su nota de que צָרַעַת puede referirse a una afección cutánea más amplia. El español puede añadir una nota para evitar una identificación clínica moderna demasiado estrecha.
translation_notes:
  revision_awareness: 'El inglés auditado muestra una revisión importante: se descartó una traducción demasiado literal de יֶאֱסֹף («gather him in») y se fijó el sentido natural «would cure him of his leprosy». La versión española sigue esa decisión revisada, evitando calcar la imagen literal y manteniendo el resultado terapéutico explícito. También se conserva el tono reverente de la interlocución («mi señor», «su señora») sin introducir el nombre propio de Eliseo, que el hebreo no da.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exija; este versículo no lo contiene.
  - Se mantuvo «lepra» por consistencia con la POB inglesa y porque el término conserva el campo tradicional de צָרַעַת sin forzar una identificación médica moderna.
  - Se prefirió «sanaría» sobre «curaría» para un registro bíblico claro y natural en español, sin perder el valor resultativo del hebreo.
