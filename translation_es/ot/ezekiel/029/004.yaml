translation:
  language: es
  text: Pondré garfios en tus mandíbulas[b], y haré que los peces de tus canales del Nilo[a] se peguen a tus escamas; y te sacaré de en medio de tus canales del Nilo, y todos los peces de tus canales del Nilo se pegarán a tus escamas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus ríos' o 'tus canales'; el término hebreo, en contextos de Egipto, se refiere al Nilo y a sus vías de agua.
    reason: lexical_alternative
  - marker: b
    text: O 'en tus mejillas'. El hebreo puede significar 'mandíbula' o 'mejilla'; 'mandíbulas' encaja mejor con la imagen de captura de un gran ser del río.
    reason: lexical_alternative
lexical_decisions:
- source_word: חחיים
  english_pob_choice: hooks
  chosen_spanish: garfios
  alternatives_spanish:
  - ganchos
  - anzuelos
  - garfios y ganchos
  lexicon: HALOT
  rationale: El término alude a implementos para sujetar o arrastrar una presa. En español, 'garfios' comunica con fuerza esa acción de captura y conserva mejor el matiz agresivo de la imagen que 'ganchos', que puede sonar más genérico.
- source_word: בִּלְחָיֶיךָ
  english_pob_choice: in your jaws
  chosen_spanish: en tus mandíbulas
  alternatives_spanish:
  - en tus mejillas
  - en tus quijadas
  lexicon: HALOT
  rationale: לְחִי puede significar 'mandíbula' o 'mejilla'. Aquí la imagen es la de un gran animal del río capturado con garfios; 'mandíbulas' expresa bien el órgano de agarre y evita una lectura demasiado humana de 'mejillas'.
- source_word: וְהִדְבַּקְתִּי
  english_pob_choice: I will make ... cling
  chosen_spanish: haré que ... se peguen
  alternatives_spanish:
  - haré que ... se adhieran
  - las fijaré
  - las haré quedar pegadas
  lexicon: HALOT
  rationale: El hiphil de דבק es causativo. 'Haré que ... se peguen' conserva esa causatividad y suena natural en español, sin perder la imagen de adherencia física.
- source_word: דְגַת
  english_pob_choice: the fish of
  chosen_spanish: los peces de
  alternatives_spanish:
  - el pez de
  - la pesca de
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular colectivo/constructo, en español el plural 'los peces de' transmite con mayor naturalidad la referencia colectiva a la fauna del río, como en la traducción inglesa auditada.
- source_word: יְאֹרֶיךָ
  english_pob_choice: your Nile channels
  chosen_spanish: tus canales del Nilo
  alternatives_spanish:
  - tus ríos
  - tus canales
  - tus corrientes del Nilo
  lexicon: HALOT
  rationale: En los oráculos sobre Egipto, יְאֹר se refiere específicamente al Nilo y sus cursos de agua. 'Canales del Nilo' preserva el entorno egipcio y la pluralidad del término, mientras evita la vaguedad de 'ríos'.
- source_word: בְּקַשְׂקְשֹׂתֶיךָ
  english_pob_choice: to your scales
  chosen_spanish: a tus escamas
  alternatives_spanish:
  - sobre tus escamas
  - en tus escamas
  lexicon: HALOT
  rationale: Con דבק, la preposición expresa el lugar de adherencia. 'A tus escamas' funciona de modo natural con 'se peguen' y mantiene la imagen de los peces adheridos a la superficie del monstruo.
- source_word: וְהַעֲלִיתִיךָ
  english_pob_choice: I will bring you up
  chosen_spanish: te sacaré
  alternatives_spanish:
  - te haré subir
  - te levantaré
  - te traeré arriba
  lexicon: HALOT
  rationale: El hiphil de עלה significa hacer subir. En este contexto de extracción desde el agua, 'te sacaré' comunica la acción de arrancarlo del río de forma idiomática en español, sin perder el sentido de traslado hacia afuera y arriba.
- source_word: מִתּוֹךְ
  english_pob_choice: from the midst of
  chosen_spanish: del medio de
  alternatives_spanish:
  - de en medio de
  - desde el interior de
  - del seno de
  lexicon: HALOT
  rationale: '''Del medio de'' preserva la idea de ser extraído desde dentro del conjunto de aguas, y es un equivalente claro y natural de ''from the midst of''.'
- source_word: תִּדְבָּק
  english_pob_choice: will cling
  chosen_spanish: se pegarán
  alternatives_spanish:
  - se adherirán
  - se quedarán pegados
  - se aferrarán
  lexicon: HALOT
  rationale: El qal imperfecto comunica la misma imagen de adherencia que en la primera cláusula. 'Se pegarán' es idiomático en español y mantiene la repetición enfática del versículo.
translation_notes:
  revision_awareness: La revisión disponible indica que no se requirieron cambios sustantivos; esta redacción sigue de cerca el texto hebreo y el trazado auditado en inglés, conservando la imaginería de captura y adherencia sin atenuarla.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferente para el nombre divino en este proyecto, aunque en este versículo no aparece.
  - Se prefirió 'mandíbulas' frente a 'mejillas' por coherencia con la metáfora zoológica del pasaje.
  - Se tradujo יְאֹר como 'canales del Nilo' para conservar el contexto egipcio y la pluralidad del sustantivo.
  - Se preservó la repetición de 'se peguen / se pegarán' para reflejar la insistencia del hebreo.
