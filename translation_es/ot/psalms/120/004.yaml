revisions:
- from: Flechas agudas de un guerrero[a], con brasas de retam[b].
  to: Flechas afiladas de un guerrero,[a] con brasas de la retama[b].
  rationale: Se cambia 'retam' por 'la retama' para seguir mejor la evidencia léxica y la claridad del español, dejando el hebreo técnico en la nota cultural. También se ajusta 'agudas' a 'afiladas' por mayor naturalidad e idiomaticidad, conservando la alternativa documentada en una nota más limpia. No se requiere adjudicación adicional porque la corrección es directa y no doctrinalmente sensible.
