translation:
  language: es
  text: Y sacarás tus enseres como enseres de exilio, de día, ante sus ojos[a], y tú mismo saldrás por la tarde ante sus ojos, como los que salen al exilio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “como los enseres de un exiliado”. El hebreo admite tanto un sentido colectivo (“enseres de exilio”) como uno individualizado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “como los que salen al exilio” o “como exiliados salen”. El hebreo dice literalmente “como las salidas de exilio/exiliados”, un giro idiomático que describe el modo de la deportación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתָ
  english_pob_choice: you shall bring out
  chosen_spanish: sacarás
  alternatives_spanish:
  - harás salir
  - sacarás afuera
  lexicon: HALOT
  rationale: El hifil de יצא es causativo; en español, aquí 'sacar' transmite de forma natural la acción de hacer salir los objetos sin perder el valor imperativo/profético.
- source_word: כֵלֶיךָ
  english_pob_choice: your baggage
  chosen_spanish: tus enseres
  alternatives_spanish:
  - tu equipaje
  - tus pertenencias
  - tus objetos
  lexicon: HALOT
  rationale: כְּלִי puede abarcar objetos, utensilios o bienes portátiles. En este gesto simbólico de deportación, 'enseres' comunica bien los objetos que se llevan al partir, con un tono sobrio y amplio.
- source_word: כִּכְלֵי גוֹלָה
  english_pob_choice: like the baggage of exile
  chosen_spanish: como enseres de exilio
  alternatives_spanish:
  - como el equipaje de un exiliado
  - como enseres de un exiliado
  - como equipaje de destierro
  lexicon: HALOT
  rationale: La construcción puede leerse colectivamente o con sentido individualizado. 'Enseres de exilio' conserva la relación estrecha entre los objetos y la situación de deportación sin forzar el singular 'un exiliado'.
- source_word: גוֹלָה
  english_pob_choice: exile
  chosen_spanish: exilio
  alternatives_spanish:
  - destierro
  - cautiverio
  - exilio/deportación
  lexicon: HALOT
  rationale: Aquí גוֹלָה funciona como estado/situación de deportación. 'Exilio' preserva el tema y evita el matiz más interpretativo de 'cautiverio'.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en pleno día
  lexicon: HALOT
  rationale: La indicación temporal contrasta con 'por la tarde'. 'De día' es breve, claro y idiomático en español.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - en su presencia visible
  - delante de sus ojos
  lexicon: HALOT
  rationale: El hebreo es un idiomático de visibilidad pública. 'Ante sus ojos' conserva la fuerza expresiva y la repetición enfática del texto.
- source_word: וְאַתָּה
  english_pob_choice: and you yourself
  chosen_spanish: y tú mismo
  alternatives_spanish:
  - y tú
  - pero tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. 'Tú mismo' reproduce ese relieve mejor que un simple 'tú'.
- source_word: תֵּצֵא
  english_pob_choice: shall go out
  chosen_spanish: saldrás
  alternatives_spanish:
  - te irás
  - partirás
  lexicon: HALOT
  rationale: יצא en qal aquí describe la acción de Ezekiel de salir. 'Salir' es la equivalencia directa y más sobria.
- source_word: בָּעֶרֶב
  english_pob_choice: in the evening
  chosen_spanish: por la tarde
  alternatives_spanish:
  - en la tarde
  - al atardecer
  - por la noche
  lexicon: HALOT
  rationale: El contraste con 'de día' pide una marca temporal opuesta; 'por la tarde' suena natural en español y mantiene la oposición con el acto diurno.
- source_word: כְּמוֹצָאֵי גוֹלָה
  english_pob_choice: like those going out into exile
  chosen_spanish: como los que salen al exilio
  alternatives_spanish:
  - como los que van al exilio
  - como quienes salen para el exilio
  - como los que parten al exilio
  lexicon: HALOT
  rationale: El hebreo literalmente habla de 'salidas de exilio/de exiliados', un giro idiomático de deportación. En español, 'los que salen al exilio' conserva el movimiento y hace explícito el referente humano implícito.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide sustancialmente con la línea de lectura del POB en inglés. La principal decisión revisada es mantener la tensión entre el sentido colectivo de גוֹלָה y la posible lectura individualizada en la nota, además de hacer explícito en español el giro idiomático de מוֹצָאֵי.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' solo cuando el hebreo lo exige; este versículo no lo contiene.
  - Se usa 'exilio' de manera consistente para גוֹלָה, evitando 'cautiverio' por ser más interpretativo.
  - '''Ante sus ojos'' se mantiene repetido para reflejar la insistencia del hebreo.'
  - La distinción temporal 'de día' / 'por la tarde' preserva el contraste del paralelismo.
  - No se introducen términos eclesiásticos ajenos al contexto narrativo-profético.
