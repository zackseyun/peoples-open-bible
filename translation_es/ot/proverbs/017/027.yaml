translation:
  language: es
  text: El que refrena sus palabras tiene conocimiento[b], y el hombre de entendimiento es sereno[a] de espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es calmado en espíritu». El hebreo dice literalmente «es frío de espíritu», usando una imagen de temperatura para la autodisciplina interior.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un hombre de entendimiento»; la forma masculina singular se usa proverbialmente para una persona caracterizada por discernimiento.'
    reason: cultural_note
lexical_decisions:
- source_word: חוֹשֵׂךְ
  english_pob_choice: restrains
  chosen_spanish: refrena
  alternatives_spanish:
  - contiene
  - retiene
  lexicon: HALOT
  rationale: El participio expresa la acción de contener o frenar la expresión verbal. «Refrena» conserva la idea de autocontrol y funciona con naturalidad en español, sin perder la fuerza proverbial.
- source_word: אֲמָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - su habla
  lexicon: HALOT
  rationale: אֲמָרִים alude a palabras o expresiones pronunciadas. «Sus palabras» es la opción más directa y clara en español.
- source_word: יוֹדֵעַ דָּעַת
  english_pob_choice: has knowledge
  chosen_spanish: tiene conocimiento
  alternatives_spanish:
  - conoce el conocimiento
  - es conocedor
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y describe a una persona caracterizada por el conocimiento. «Tiene conocimiento» comunica esa cualidad en español sin sonar forzado.
- source_word: וְקַר
  english_pob_choice: is cool
  chosen_spanish: es frío
  alternatives_spanish:
  - está tranquilo
  - es sereno
  lexicon: HALOT
  rationale: קר significa literalmente «frío/cool». Se conserva la imagen concreta del hebreo en «frío», en paralelo con el control de las palabras.
- source_word: רוּחַ
  english_pob_choice: in spirit
  chosen_spanish: de espíritu
  alternatives_spanish:
  - en su espíritu
  - de temperamento
  lexicon: HALOT
  rationale: רוּחַ aquí se refiere a la disposición interior o temperamento. «De espíritu» mantiene el término antropológico bíblico y sugiere esa disposición interior.
- source_word: אִישׁ תְּבוּנָה
  english_pob_choice: a man of understanding
  chosen_spanish: el hombre de entendimiento
  alternatives_spanish:
  - un hombre de entendimiento
  - una persona de entendimiento
  lexicon: HALOT
  rationale: La frase constructa denota a una persona caracterizada por discernimiento. Se conserva la forma masculina singular del hebreo, con valor proverbial general, y «entendimiento» traduce adecuadamente תְּבוּנָה.
theological_decisions:
- issue: Imagen de temperatura aplicada al autocontrol interior
  english_pob_reading: is cool in spirit
  chosen_spanish_reading: es frío de espíritu
  alternative_spanish_readings:
  - es sereno de espíritu
  - está calmado de espíritu
  rationale: El hebreo usa una imagen concreta de temperatura para describir la compostura interior. «Frío de espíritu» preserva mejor esa tensión léxica que una equivalencia totalmente explicativa.
  doctrine_reference: Principio de transparencia léxica POB; cf. sabiduría proverbial hebrea
- issue: Forma masculina singular con valor proverbial
  english_pob_reading: a man of understanding
  chosen_spanish_reading: el hombre de entendimiento
  alternative_spanish_readings:
  - una persona de entendimiento
  - el que entiende
  rationale: El hebreo emplea אִישׁ, forma masculina singular, para expresar una verdad general. Se mantiene la huella formal del original sin convertirla en una neutralización no requerida por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva la imagen térmica de קר, la construcción idiomática de יוֹדֵעַ דָּעַת y la forma proverbial masculina de אִישׁ תְּבוּנָה. No se registraron revisiones previas aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo «conocimiento» y no «sabiduría» porque el hebreo usa דָּעַת, no חָכְמָה.
  - «Frío de espíritu» preserva la metáfora hebrea; la nota ofrece la equivalencia interpretativa «calmado».
  - Se conservó el masculino singular proverbial de «el hombre de entendimiento» por fidelidad al hebreo y al audit trail.
