  language: en
  yaml_path: translation/deuterocanon/sirach/012/012.yaml
  text: Be to him like one who reveals a secret[a], and he will not find a way to ruin you[b]; and know the outcome of jealousy.
  footnotes:
  - marker: a
    text: Or 'like one uncovering a secret.' The image likely means to treat such a person with caution, as one would someone who exposes confidential matters.
    reason: lexical_alternative
  - marker: b
    text: Or 'know the outcome of envy.' Hebrew 'the end of jealousy/envy'; the Greek parallel expands the warning and makes the eventual consequence more explicit.
    reason: alternative_reading
