    text: Or 'the latter things.' The Hebrew expression refers to what comes later, here functioning as a challenge to foretell the future.
    reason: lexical_alternative
  - marker: b
    text: Or 'do good and do evil.' The sense is a challenge to show any real power, whether for benefit or for harm.
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'be dismayed' is rare and may also carry the sense 'look in awe' or 'gaze about in alarm.'
    reason: lexical_alternative
