translation:
  language: es
  text: Así que tomé a mi concubina y la despedacé[a], y la envié por toda la tierra de la heredad de Israel[b], porque cometieron vileza y ultraje[c] en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la desmembré» / «la corté en pedazos».'
    reason: lexical_alternative
  - marker: b
    text: «Heredad» conserva el matiz de tierra repartida como posesión de pacto, no solo una región geográfica.
    reason: cultural_note
  - marker: c
    text: «Vileza» puede también entenderse como «maldad» o «depravación»; «ultraje» puede expresarse también como «acto vergonzoso», «infamia» o «vileza atroz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹחֵז
  english_pob_choice: So I took hold of
  chosen_spanish: Así que tomé
  alternatives_spanish:
  - Así que me apoderé de
  - Así que agarré
  lexicon: HALOT
  rationale: אחז expresa tomar o agarrar con la mano. En español, «tomé» conserva la acción narrativa con naturalidad; «agarré» sería más coloquial y «me apoderé de» podría sonar más fuerte de lo que el contexto exige.
- source_word: בְּפִילַגְשִׁי
  english_pob_choice: my concubine
  chosen_spanish: mi concubina
  alternatives_spanish:
  - mi mujer secundaria
  - mi esposa secundaria
  lexicon: HALOT
  rationale: פילגש designa una concubina, una mujer de estatus inferior al de esposa plena. «Concubina» es el equivalente preciso y reconocido en español bíblico.
- source_word: וָאֲנַתְּחֶהָ
  english_pob_choice: cut her in pieces
  chosen_spanish: la despedacé
  alternatives_spanish:
  - la corté en pedazos
  - la dismemberé
  lexicon: HALOT
  rationale: נתח indica cortar en pedazos. «La despedacé» comunica de manera directa el acto violento y mantiene el peso del hebreo sin sonar excesivamente técnico.
- source_word: וָאֲשַׁלְּחֶהָ
  english_pob_choice: sent her
  chosen_spanish: la envié
  alternatives_spanish:
  - la mandé
  - envié sus partes
  lexicon: HALOT
  rationale: שלח significa enviar. El hebreo conserva el pronombre femenino singular; «la envié» respeta esa forma, aunque el contexto hace evidente que se trata del cuerpo despedazado.
- source_word: בְּכָל שְׂדֵה נַחֲלַת יִשְׂרָאֵל
  english_pob_choice: throughout all the territory of Israel’s inheritance
  chosen_spanish: por toda la tierra de la heredad de Israel
  alternatives_spanish:
  - por toda la región de la heredad de Israel
  - por todo el territorio de la heredad de Israel
  lexicon: HALOT
  rationale: שׂדה en esta expresión distributiva apunta al ámbito territorial, y נַחֲלָה conserva el matiz de heredad/cobertura asignada por pacto. «Heredad» mantiene mejor que «territorio» la resonancia de posesión otorgada por Dios.
- source_word: זִמָּה
  english_pob_choice: lewdness
  chosen_spanish: vileza
  alternatives_spanish:
  - depravación
  - maldad
  lexicon: HALOT
  rationale: זִמה suele señalar una acción moralmente escandalosa, a menudo con tinte sexual. «Vileza» preserva la carga de vergüenza y repugnancia moral sin volverla un tecnicismo.
- source_word: וּנְבָלָה
  english_pob_choice: outrage
  chosen_spanish: vergüenza
  alternatives_spanish:
  - ultraje
  - infamia
  lexicon: HALOT
  rationale: נבלה expresa una acción vergonzosa, degradante y socialmente inadmisible. «Vergüenza» comunica bien esa deshonra pública; «ultraje» resaltaría más la agresión, pero aquí el par con זִמה ya cubre el peso moral.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - contra Israel
  lexicon: HALOT
  rationale: La preposición ב es locativa/social. «En Israel» mantiene la referencia al ámbito comunitario donde ocurrió el hecho.
theological_decisions:
- issue: Matiz pactual de נַחֲלַת יִשְׂרָאֵל
  english_pob_reading: Israel’s inheritance
  chosen_spanish_reading: la heredad de Israel
  alternative_spanish_readings:
  - la tierra de Israel
  - el territorio de Israel
  rationale: «Heredad» conserva el sentido de tierra asignada como posesión de pacto, no solo geografía. Esta opción sigue la intención del POB de no diluir el trasfondo covenantal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza moral de זִמָּה וּנְבָלָה
  english_pob_reading: lewdness and outrage
  chosen_spanish_reading: vileza y vergüenza
  alternative_spanish_readings:
  - maldad y ultraje
  - depravación y deshonra
  rationale: La pareja hebrea expresa condena moral intensa. «Vileza y vergüenza» preserva la censura ética y la dimensión de deshonra pública sin imponer una categoría doctrinal ajena al pasaje.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto en inglés fue revisado y quedó sin cambios en el último pase, con acuerdo alto entre revisión y comprobación cruzada; la redacción española sigue esa lectura estable y no introduce ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece, así que no se usa ninguna sustitución por defecto.
  - Se conservó «concubina» como término técnico bíblico, en línea con el uso auditado del POB.
  - «Heredad» se eligió para reflejar el matiz pactual de נַחֲלָה, coherente con la decisión inglesa de mantener inheritance.
