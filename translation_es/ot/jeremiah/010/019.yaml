base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/019.yaml
  text: Woe is me because of my brokenness[a]; my wound is grievous. But I said, “Surely this is my sickness[c][b], and I must bear it.”
  footnotes:
  - marker: a
    text: Or 'for my hurt' / 'because of my injury.' The Hebrew שבר can refer to a fracture, breaking, or ruin.
    reason: lexical_alternative
  - marker: b
    text: Or 'my wound is severe' or 'my wound is sick.' The Hebrew verb נַחְלָה conveys being weak, sick, or grievous.
    reason: lexical_alternative
  - marker: c
    text: Or 'this is my illness, and I will bear it.' The final clause can be heard either as resignation ('I must bear it') or simple future ('I will bear it').
    reason: lexical_alternative
