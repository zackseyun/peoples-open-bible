translation:
  language: es
  text: También[a], todos los judeanos que estaban en Moab, entre los amonitas, en Edom y en todas las demás tierras oyeron que el rey de Babilonia había dejado un remanente[b] para Judá y había nombrado a Gedalías, hijo de Ahicam, hijo de Safán, sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Además»; la partícula añade otro grupo al informe previo.
    reason: lexical_alternative
  - marker: b
    text: O «sobrevivientes para Judá»; el término hebreo puede referirse más generalmente a los que quedaron con vida después del desastre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Also
  chosen_spanish: Además
  alternatives_spanish:
  - También
  - Y además
  lexicon: HALOT
  rationale: La partícula añade otro grupo al relato anterior. «Además» conserva el valor aditivo y suena natural en español moderno sin perder continuidad narrativa.
- source_word: כָּל הַיְּהוּדִים
  english_pob_choice: all the Judeans
  chosen_spanish: todos los judeanos
  alternatives_spanish:
  - todos los judíos
  lexicon: HALOT
  rationale: En este contexto territorial y exílico, «judeanos» refleja mejor a los habitantes vinculados con Judá que el término más amplio y posterior «judíos». «Todos» conserva la totalidad de כָּל.
- source_word: אֲשֶׁר בְּמוֹאָב וּבִבְנֵי עַמּוֹן וּבֶאֱדוֹם
  english_pob_choice: who were in Moab, among the Ammonites, in Edom
  chosen_spanish: que estaban en Moab, entre los amonitas, en Edom
  alternatives_spanish:
  - que estaban en Moab, en Amón, en Edom
  - que estaban en Moab, entre los hijos de Amón, en Edom
  lexicon: HALOT
  rationale: Los grupos dispersos se ubican geográficamente. «Entre los amonitas» traduce de manera idiomática el valor de pueblo/entorno de בְּנֵי עַמּוֹן, conservando la referencia étnica sin la literalidad pesada de «hijos de Amón».
- source_word: וַאֲשֶׁר בְּכָל הָאֲרָצוֹת
  english_pob_choice: and in all the other lands
  chosen_spanish: y en todas las demás tierras
  alternatives_spanish:
  - y en todas las tierras
  - y en todos los otros países
  lexicon: HALOT
  rationale: «Demás» hace explícito que estas tierras se añaden a las ya nombradas. «Tierras» respeta el marco antiguo mejor que «países» y evita una lectura moderna anacrónica.
- source_word: שָׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - se enteraron
  lexicon: HALOT
  rationale: El verbo narra la recepción de la noticia; «oyeron» es directo y fiel al sentido básico. «Se enteraron» explicita más de lo que el hebreo exige.
- source_word: כִּי נָתַן מֶלֶךְ בָּבֶל שְׁאֵרִית לִיהוּדָה
  english_pob_choice: that the king of Babylon had left a remnant for Judah
  chosen_spanish: que el rey de Babilonia había dejado un remanente para Judá
  alternatives_spanish:
  - que el rey de Babilonia había dejado sobrevivientes para Judá
  - que el rey de Babilonia había dado un remanente a Judá
  lexicon: HALOT
  rationale: «Remanente» preserva el término cargado del profetismo bíblico y sigue el criterio del POB en inglés. Aunque נָתַן literalmente es «dar», en este contexto expresa haber dejado/permitido quedar un grupo sobreviviente, y «había dejado» comunica bien esa idea en español.
- source_word: וְכִי הִפְקִיד עֲלֵיהֶם
  english_pob_choice: and had appointed ... over them
  chosen_spanish: y había puesto sobre ellos
  alternatives_spanish:
  - y había nombrado sobre ellos
  - y había establecido sobre ellos
  lexicon: HALOT
  rationale: הִפְקִיד indica colocar a alguien en una posición de responsabilidad. «Había puesto sobre ellos» reproduce la imagen de autoridad de forma clara y natural; «nombrado» es posible, pero menos vívido.
- source_word: אֶת גְּדַלְיָהוּ בֶּן אֲחִיקָם בֶּן שָׁפָן
  english_pob_choice: Gedaliah son of Ahikam, son of Shaphan
  chosen_spanish: a Gedalías, hijo de Ahicam, hijo de Safán
  alternatives_spanish:
  - a Gedalías hijo de Ahicam, hijo de Safán
  - a Gedalías, el hijo de Ahicam, el hijo de Safán
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de manera consistente. Se conserva la cadena genealógica de forma transparente; el artículo repetido no es necesario en español y haría más pesada la frase.
theological_decisions:
- issue: שְׁאֵרִית / remnant
  english_pob_reading: remnant
  chosen_spanish_reading: remanente
  alternative_spanish_readings:
  - sobrevivientes
  rationale: «Remanente» conserva la continuidad léxica y la resonancia canónica del término en la literatura profética, sin sobrecargar el verso con una interpretación teológica adicional. «Sobrevivientes» aclara el sentido histórico, pero pierde esa continuidad.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura del POB inglés auditado; no se documentaron revisiones posteriores ni cambios pendientes en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «judeanos» para reflejar el ámbito de Judá en contexto exílico, manteniendo coherencia con el criterio POB de distinguirlo de «judíos» cuando corresponde.
  - Se conserva «remanente» como término técnico-bíblico consistente con la traducción inglesa auditada.
  - 'Los nombres propios siguen una transliteración castellana estable: Gedalías, Ahicam, Safán.'
  - «Tierras» se usa para הָאֲרָצוֹת en un marco antiguo y geográfico, evitando modernizar a «países».
