review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura tripartita de prohibiciones del hebreo: no vender, no cambiar/intercambiar, y no permitir que רֵאשִׁית הָאָרֶץ ''pase''. También preserva correctamente el nombre divino como ''Yahvé''. Sin embargo, hay dos desajustes principales: (1) ''lo cambiarán'' introduce un objeto singular explícito no presente en el hebreo y suena menos natural que una formulación impersonal/legal; (2) ''porque es cosa santa para Yahvé'' añade ''cosa'', que no está en el texto fuente y resulta algo torpe. El hebreo קֹדֶשׁ לַיהוָה se expresa mejor como ''es santo para Yahvé'' o ''es sagrado para Yahvé''.'
  spanish_quality_summary: El español es comprensible, pero puede afinarse para sonar más natural y jurídico-litúrgico. 'Nada de ello' funciona, aunque 'nada de eso' o 'ninguna parte' serían más idiomáticos; no obstante, no es un error. 'Lo cambiarán' y 'cosa santa' sí rebajan la naturalidad. 'La primicia de la tierra' es defendible y refleja el inglés auditado, especialmente con nota aclaratoria.
  glossary_alignment: Alineación buena con el glosario del proyecto en 'Yahvé'. No hay conflicto con otros términos doctrinales. Para קֹדֶשׁ conviene evitar una expansión innecesaria ('cosa santa') y mantener la fuerza predicativa simple del hebreo. La nota léxica sobre רֵאשִׁית הָאָרֶץ está bien orientada.
  issues:
  - severity: medium
    issue: '''lo cambiarán'' explicita un objeto que el hebreo no expresa y suena menos natural en una serie legal negativa.'
    rationale: יָמֵר aparece sin objeto expreso; en español jurídico-natural funciona mejor 'ni lo intercambiarán' o simplemente 'ni lo permutarán / ni harán intercambio de ello'. Dado el paralelismo con la cláusula previa, 'ni lo intercambiarán' mantiene claridad sin sobreinterpretar demasiado.
  - severity: medium
    issue: '''porque es cosa santa para Yahvé'' añade ''cosa'' y produce una formulación poco idiomática.'
    rationale: El hebreo dice literalmente 'porque [es] santidad/santo para Yahvé'. En español bíblico claro, 'porque es santo para Yahvé' conserva mejor el predicado de consagración sin añadir un sustantivo no presente.
  - severity: low
    issue: La nota al pie omite la alternativa 'primicias de la tierra' en plural, que aparece en el rastro inglés.
    rationale: Aunque el singular 'primicia' es válido en español, la auditoría inglesa preservó también 'firstfruits'. Conviene mantener esa alternativa en la nota para reflejar plenamente la ambigüedad léxica documentada.
  revised_spanish_text: No venderán nada de ello[a], ni lo intercambiarán, ni pasará la primicia de la tierra, porque es santo para Yahvé.
  revised_footnotes:
  - marker: a
    text: O 'las primicias de la tierra' o 'la primera porción de la tierra'; el hebreo רֵאשִׁית הָאָרֶץ puede resaltar tanto la parte primera/escogida de la tierra como su carácter de primicia consagrada.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el español para reflejar con más fidelidad y naturalidad el hebreo: ''lo intercambiarán'' suena mejor que ''lo cambiarán'' en contexto legal; ''es santo para Yahvé'' evita la adición innecesaria de ''cosa'' y conserva la fuerza predicativa de קֹדֶשׁ לַיהוָה. Se amplió la nota para incluir la alternativa ''las primicias de la tierra'', ya preservada en la auditoría inglesa.'
