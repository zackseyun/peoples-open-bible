translation:
  language: es
  text: 'Entonces respondí y le dije: «¿Qué son estos dos olivos[a] que están a la derecha del candelabro y a su izquierda?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «¿Qué [son] estos dos olivos a la derecha del candelabro y a su izquierda?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַעַן וָאֹמַר
  english_pob_choice: Then I answered and said
  chosen_spanish: Entonces respondí y le dije
  alternatives_spanish:
  - Y respondí y dije
  - Entonces contesté y le dije
  lexicon: HALOT
  rationale: La secuencia verbal hebrea expresa continuidad narrativa. «Entonces» refleja el avance del relato sin añadir contraste; «respondí y le dije» conserva el giro idiomático hebreo de «responder y decir» sin reducirlo a un simple «pregunté».
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - al ángel
  lexicon: HALOT
  rationale: El pronombre objeto se mantiene de forma natural en español como dativo «le». No se explicita el referente porque el verso no lo nombra; el antecedente queda en el contexto inmediato.
- source_word: מַה
  english_pob_choice: What are
  chosen_spanish: ¿Qué son
  alternatives_spanish:
  - ¿Qué es
  - ¿Qué significan
  lexicon: HALOT
  rationale: 'Con sujeto plural, el español requiere plural: «¿Qué son…?». Se conserva la pregunta de identificación sin convertirla en una paráfrasis interpretativa.'
- source_word: שְּׁנֵי הַזֵּיתִים הָאֵלֶה
  english_pob_choice: these two olive trees
  chosen_spanish: estos dos olivos
  alternatives_spanish:
  - estos dos árboles de olivo
  - estos dos árboles olivos
  lexicon: HALOT
  rationale: זֵיתִים puede expresarse en español como «olivos» para un referente arbóreo natural y breve. Se evita «ramas» porque el hebreo aquí habla de árboles, no de ramas; y se mantiene el demostrativo «estos» y la pluralidad «dos».
- source_word: עַל יְמִין הַמְּנוֹרָה
  english_pob_choice: on the right of the lampstand
  chosen_spanish: a la derecha de la menorá
  alternatives_spanish:
  - a la derecha del candelabro
  - del lado derecho de la menorá
  lexicon: HALOT
  rationale: La relación espacial se vierte idiomáticamente como «a la derecha de». Se conserva «menorá» como término técnico para la pieza cultual, en lugar de reemplazarlo por una palabra más genérica que borre el referente ritual.
- source_word: וְעַל שְׂמֹאולָהּ
  english_pob_choice: and on its left
  chosen_spanish: y a su izquierda
  alternatives_spanish:
  - y del lado izquierdo de ella
  - y a la izquierda de la menorá
  lexicon: HALOT
  rationale: El sufijo femenino se refiere a la menorá. «A su izquierda» reproduce la relación posesiva y espacial de manera natural en español, manteniendo el paralelismo con «a la derecha».
theological_decisions:
- issue: Identificación del objeto cultual מְנוֹרָה
  english_pob_reading: lampstand
  chosen_spanish_reading: menorá
  alternative_spanish_readings:
  - candelabro
  - lámpara
  rationale: Aunque «lampstand» es una traducción posible, en español «menorá» comunica mejor el objeto cultual específico del contexto de Zacarías y evita una imagen doméstica o demasiado general. No se introduce una explicación adicional en el texto para no exceder el verso.
  doctrine_reference: Éxodo 25:31-40; Zacarías 4:2
- issue: Preservación del modo hebreo de pregunta-descripción
  english_pob_reading: What are these two olive trees ...?
  chosen_spanish_reading: ¿Qué son estos dos olivos ...?
  alternative_spanish_readings:
  - ¿Qué significan estos dos olivos ...?
  - ¿Quiénes son estos dos olivos ...?
  rationale: El hebreo formula una pregunta de identificación, no una interpretación alegórica explícita. Por eso se conserva la apertura semántica de la pregunta sin convertirla en una explicación doctrinal.
  doctrine_reference: Principio de deferencia al sentido inmediato del texto
- issue: Relación espacial alrededor de la menorá
  english_pob_reading: on the right ... and on its left
  chosen_spanish_reading: a la derecha ... y a su izquierda
  alternative_spanish_readings:
  - del lado derecho ... y del lado izquierdo
  - a su derecha ... y a su izquierda
  rationale: La lectura mantiene la simetría del hebreo y evita la ambigüedad de «sobre», que en español podría sugerir contacto superior y no simple ubicación lateral.
  doctrine_reference: Lectura literal de עַל en contexto espacial
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «at the right ... and at its left» por «on the right ... and on its left» para reflejar mejor la espacialidad del hebreo; por eso el español usa «a la derecha ... y a su izquierda», sin sobretraducir la preposición. También se respetó la decisión inglesa de no convertir la pregunta en «asked», manteniendo la fórmula semítica «respondí y le dije».
  spanish_consistency_notes:
  - Se usa «menorá» de manera consistente para מְנוֹרָה, conforme al contexto cultual de Zacarías 4.
  - Se evita «SEÑOR» u otras sustituciones no presentes en este verso; el pasaje no contiene el nombre divino.
  - Se mantiene «olivos» para זֵיתִים por claridad natural en español, sin perder el carácter arbóreo del hebreo.
