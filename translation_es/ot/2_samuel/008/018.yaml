translation:
  language: es
  text: Benaía, hijo de Joyadá, estaba a cargo de los quereteos y los peleteos, y los hijos de David eran sacerdotes.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «ministros principales» o «funcionarios reales». El hebreo usa el término ordinario para «sacerdotes», pero algunos lo entienden aquí en un sentido más amplio de corte, porque el contexto trata de la administración real.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנָיָהוּ בֶּן־יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía, hijo de Joyadá
  alternatives_spanish:
  - Benaía, hijo de Yehoyadá
  - Benaya, hijo de Joyadá
  lexicon: Nombres propios bíblicos; transliteración estándar
  rationale: Se translitera el nombre propio según el uso bíblico español más natural y legible. «Hijo de» reproduce la relación patronímica con claridad; «Joyadá» refleja el nombre hebreo con adaptación gráfica española.
- source_word: וְהַכְּרֵתִי
  english_pob_choice: the Kerethites
  chosen_spanish: los quereteos
  alternatives_spanish:
  - los cereteos
  - los kereteos
  lexicon: HALOT
  rationale: Es un designador de grupo/gentilicio. «Quereteos» conserva la forma transparente y coincide con el valor transliterado del hebreo, mientras que «cereteos» es la forma tradicional española. Se prefiere la forma más directa al hebreo.
- source_word: וְהַפְּלֵתִי
  english_pob_choice: the Pelethites
  chosen_spanish: los peleteos
  alternatives_spanish:
  - los pelteos
  lexicon: HALOT
  rationale: También es un nombre de grupo. «Peleteos» mantiene la correspondencia con el hebreo y la pareja paralela con «quereteos» sin añadir interpretación etnica o funcional.
- source_word: כֹּהֲנִים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - ministros principales
  - funcionarios reales
  lexicon: HALOT
  rationale: El sentido léxico ordinario de כֹּהֲנִים es «sacerdotes». Aunque el contexto admite una posible lectura cortesana más amplia, se conserva el valor léxico primario en el texto principal y se deja la alternativa interpretativa en nota.
- source_word: הָיוּ
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - estaban
  - servían como
  lexicon: HALOT
  rationale: El verbo copulativo hebreo se rinde naturalmente con «eran» en español, manteniendo la relación predicativa sin sobreinterpretar la función.
theological_decisions:
- issue: Sentido de «sacerdotes» aplicado a los hijos de David
  english_pob_reading: Retain the formal rendering 'priests' in the main text, with a footnote noting the possible sense 'chief ministers' or 'royal officials.'
  chosen_spanish_reading: Mantener «sacerdotes» en el texto principal, con una nota sobre el posible sentido de «ministros principales» o «funcionarios reales».
  alternative_spanish_readings:
  - los hijos de David eran ministros principales
  - los hijos de David eran funcionarios reales
  rationale: Se preserva la tensión textual y teológica sin resolverla por interpretación. La nota registra la lectura contextual posible, pero el cuerpo principal conserva el valor léxico directo del hebreo, conforme al criterio de transparencia.
  doctrine_reference: Transparencia léxica; preservación de tensiones textuales en la traducción
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la revisión inglesa más reciente; no se identifican cambios sustantivos pendientes. La decisión principal es mantener la lectura léxica de כֹּהֲנִים como «sacerdotes» y documentar la alternativa cortesana en nota.
  spanish_consistency_notes:
  - 'Se conserva una transliteración española consistente para nombres propios y etnónimos: Benaía, Joyadá, quereteos, peleteos.'
  - La puntuación refleja el orden coordinado del hebreo y la nota se ancla en «sacerdotes» para hacer visible la alternativa interpretativa.
