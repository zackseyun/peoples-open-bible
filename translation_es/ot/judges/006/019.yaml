revisions:
- from: Entonces Gedeón entró y preparó un cabrito[a] y panes sin levadura de un efa de harina. Puso la carne en una canasta y el caldo en una olla[b], y lo sacó hasta él, debajo de la encina, y se lo presentó.
  to: Entonces Gedeón entró y preparó un cabrito y panes sin levadura de un efa de harina. Puso la carne en una canasta y el caldo en una olla, y se lo llevó hasta donde él estaba, debajo del terebinto[a], y se lo presentó[b].
  rationale: Se corrigieron los anclajes de las notas al pie para que correspondan a las palabras pertinentes; se restauró «terebinto» como lectura principal, conforme a la decisión léxica documentada; y se reemplazó «lo sacó hasta él» por una formulación española más natural que conserva el sentido de llevarlo a la presencia del visitante sin introducir lenguaje sacrificial.
