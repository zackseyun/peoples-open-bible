    text: 'O: «tenlos por culpables».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «échalos fuera» o «destiérralos».'
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y el sentido del borrador, pero se corrige הַדִּיחֵמוֹ con «Expúlsalos», que transmite mejor la idea de echar fuera o excluir. También se repara la nota alternativa no idiomática y se ajusta levemente la puntuación del vocativo para mayor naturalidad en español.
