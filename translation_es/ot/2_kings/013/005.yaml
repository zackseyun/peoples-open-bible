base_translation:
  language: en
  yaml_path: translation/ot/2_kings/013/005.yaml
  text: And Yahweh gave Israel a deliverer[a], so that they went out from under the hand of Aram[c][b]; and the sons of Israel lived in their tents as formerly.
  footnotes:
  - marker: a
    text: Or 'a savior.' The Hebrew word denotes one who brings rescue or deliverance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from under the hand of Aram,' an idiom for release from Aram's power.
    reason: cultural_note
  - marker: c
    text: Or 'as before' / 'as in former times.' Literally, 'as yesterday, three days ago,' a Hebrew idiom for former days.
    reason: lexical_alternative
