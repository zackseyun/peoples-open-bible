translation:
  language: es
  text: 'Entonces respondieron y dijeron delante del rey: «Daniel, que es uno de los exiliados de Judá, no te presta atención[a], oh rey, ni al mandato[b] que has firmado, sino que tres veces al día hace su petición[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no te muestra consideración». El modismo arameo literalmente habla de no poner atención o consideración sobre el rey.
    reason: lexical_alternative
  - marker: b
    text: O «interdicto» o «decreto» para «mandato». El término apunta a una prohibición legal vinculante.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «busca su petición». La expresión significa que continúa presentando su ruego; el destinatario no se nombra explícitamente en esta cláusula, aunque el contexto identifica al Dios de Daniel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la secuencia narrativa; «Entonces» conserva la progresión natural en español sin perder el valor temporal.
- source_word: עֲנוֹ וְאָמְרִין
  english_pob_choice: they answered and said
  chosen_spanish: respondieron y dijeron
  alternatives_spanish:
  - contestaron y dijeron
  - replicaron y dijeron
  lexicon: HALOT
  rationale: La fórmula semítica doble se mantiene con dos verbos en español para reflejar el énfasis y la cadencia del original.
- source_word: קֳדָם מַלְכָּא
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - ante el rey
  lexicon: HALOT
  rationale: La preposición expresa estar en presencia de la autoridad real; «delante del rey» es natural y conserva el marco cortesano.
- source_word: דִּי מִן בְּנֵי גָלוּתָא דִּי יְהוּד
  english_pob_choice: who is one of the exiles from Judah
  chosen_spanish: que es uno de los exiliados de Judá
  alternatives_spanish:
  - que es uno de los cautivos de Judá
  - que pertenece a los exiliados de Judá
  lexicon: HALOT
  rationale: «Exiliados» reproduce el grupo deportado sin suavizarlo. Se evita expandir más allá de lo que el arameo dice, pero se conserva la caracterización acusatoria.
- source_word: לָא שָׂם עֲלַיִךְ ... טְעֵם
  english_pob_choice: pays no attention to you
  chosen_spanish: no te presta atención
  alternatives_spanish:
  - no te tiene en cuenta
  - no te hace caso
  - no se fija en ti
  lexicon: HALOT
  rationale: El modismo arameo de «no poner atención/consideración sobre» se vierte con una expresión idiomática española clara, sin perder el matiz de desatención o desprecio.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - ¡oh rey!
  lexicon: HALOT
  rationale: Se preserva el vocativo explícito para reproducir la presión retórica y el tono de acusación en la escena de corte.
- source_word: וְעַל אֱסָרָא דִּי רְשַׁמְתָּ
  english_pob_choice: or to the injunction that you have signed
  chosen_spanish: ni a la orden que has firmado
  alternatives_spanish:
  - ni al interdicto que has firmado
  - ni al decreto que has firmado
  lexicon: HALOT
  rationale: «אֱסָרָא» en este contexto es una prohibición o mandato vinculante; «orden» comunica el valor legal de manera legible en español. «Has firmado» sigue la idea de un edicto formal escrito/enactado.
- source_word: וְזִמְנִין תְּלָתָה בְּיוֹמָא
  english_pob_choice: but three times a day
  chosen_spanish: pero tres veces al día
  alternatives_spanish:
  - y tres veces al día
  - mas tres veces al día
  lexicon: HALOT
  rationale: La expresión temporal se mantiene en su forma idiomática natural en español. «Pero» reproduce el contraste adversativo del contexto.
- source_word: בָּעֵא בָּעוּתֵהּ
  english_pob_choice: he makes his petition
  chosen_spanish: hace su petición
  alternatives_spanish:
  - presenta su petición
  - eleva su petición
  - hace su ruego
  lexicon: HALOT
  rationale: La combinación verbal-nominal expresa el acto continuado de suplicar; «hace su petición» conserva la literalidad funcional sin añadir explícitamente el destinatario.
theological_decisions:
- issue: Explicitar o no el destinatario de la petición de Daniel
  english_pob_reading: 'Leave the object implicit: ''he makes his petition'''
  chosen_spanish_reading: 'Dejar implícito el destinatario: «hace su petición»'
  alternative_spanish_readings:
  - hace su petición a Dios
  - ora a su Dios
  - presenta su petición a Dios
  rationale: El arameo no nombra aquí al destinatario; el contexto lo deja claro, pero la traducción no debe añadirlo. Se preserva así la tensión textual y la sobriedad del original.
  doctrine_reference: Primacía del texto fuente sobre la paráfrasis devocional; no ampliar lo que el versículo no explicita.
- issue: Valor legal de אֱסָרָא
  english_pob_reading: injunction
  chosen_spanish_reading: orden / mandato vinculante
  alternative_spanish_readings:
  - interdicto
  - decreto
  - prohibición
  rationale: El término arameo puede abarcar una prohibición legal vinculante. «Orden» es comprensible en español; la nota lexical mantiene abiertas las alternativas más precisas sin imponer un solo tecnicismo.
  doctrine_reference: Respeto por la fuerza jurídico-retórica del texto en su contexto imperial.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se conservó la duplicación semítica «respondieron y dijeron», el vocativo «oh rey», el carácter legal de אֱסָרָא y la omisión deliberada del destinatario de la petición. No se introdujeron expansiones doctrinales ni se sustituyó el matiz jurídico por lenguaje eclesiástico tradicional.'
  spanish_consistency_notes:
  - Se usa «exiliados» para גָלוּתָא en coherencia con el valor histórico-político del término.
  - «Petición» mantiene el registro formal del pasaje; no se cambió a «oración» para no importar un término no explícito en la cláusula.
  - La puntuación mantiene la división de discurso directo y el vocativo cortés propio de la escena judicial.
