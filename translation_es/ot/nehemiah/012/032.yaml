translation:
  language: es
  text: Hosaya y la mitad de los oficiales de Judá fueron detrás de ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "tras ellos". El hebreo puede denotar seguir en secuencia; "detrás de ellos" hace explícita la imagen de la procesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: iban
  alternatives_spanish:
  - fueron
  - anduvieron
  - proseguían
  lexicon: HALOT
  rationale: El imperfecto con waw consecutiva narra movimiento en pasado; en español, 'iban' expresa bien el avance procesional continuo sin sonar rígido. 'Fueron' es posible, pero 'iban' conserva mejor la imagen de marcha.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: behind them
  chosen_spanish: detrás de ellos
  alternatives_spanish:
  - después de ellos
  - tras ellos
  lexicon: HALOT
  rationale: La POB inglesa eligió 'behind them' para explicitar el orden procesional. En español, 'detrás de ellos' comunica esa misma relación espacial de forma natural; 'tras ellos' sería también correcto pero algo más literario.
- source_word: הוֹשַׁעְיָה
  english_pob_choice: Hoshaiah
  chosen_spanish: Hosaías
  alternatives_spanish:
  - Hoshaía
  - Osaías
  lexicon: transliteración onomástica
  rationale: Se conserva el nombre propio en forma española tradicionalizada y fácilmente legible. 'Hosaías' respeta la base consonántica y el acento final del nombre hebreo.
- source_word: וַחֲצִי
  english_pob_choice: and half of
  chosen_spanish: y la mitad de
  alternatives_spanish:
  - y medio de
  - con la mitad de
  lexicon: HALOT
  rationale: 'El sustantivo חֲצִי significa ''mitad''; con la conjunción coordinante, el sentido es aditivo: Hosaías y un grupo parcial de los oficiales. ''La mitad de'' refleja fielmente esa coordinación.'
- source_word: שָׂרֵי
  english_pob_choice: officials
  chosen_spanish: oficiales
  alternatives_spanish:
  - príncipes
  - jefes
  - dirigentes
  lexicon: HALOT
  rationale: En este contexto ceremonial y administrativo, 'oficiales' mantiene el valor de cargo o función pública sin forzar una lectura monárquica que 'príncipes' podría sugerir.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: nombre geográfico/tribal estándar
  rationale: '''Judá'' es la forma española estándar del nombre tribal y territorial hebreo.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el acuerdo con el control cruzado fue alto; por eso se mantiene la lectura procesional clara, sin añadir incertidumbre textual.
  spanish_consistency_notes:
  - Se mantiene la transliteración española 'Hosaías' para el nombre propio, coherente con una lectura bíblica en español fluida.
  - '''Oficiales'' se usa de manera consistente con la decisión inglesa POB para שָׂרֵי en un contexto administrativo, evitando ''príncipes''.'
  - La preposición relacional se resuelve con 'detrás de ellos' para conservar la imagen espacial que la nota inglesa destaca.
