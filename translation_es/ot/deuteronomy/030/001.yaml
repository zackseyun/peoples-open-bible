translation:
  language: es
  text: Y sucederá que, cuando vengan sobre ti todas estas cosas —la bendición y la maldición que he puesto delante de ti—, y las hagas volver a tu corazón[a] entre todas las naciones adonde Yahvé tu Dios te haya expulsado,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las tomes a pecho»; literalmente, «las hagas volver a tu corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y sucederá que, cuando
  alternatives_spanish:
  - Y será que, cuando
  - Y cuando
  lexicon: HALOT
  rationale: La fórmula introduce una circunstancia futura. En español, «Y sucederá que, cuando» conserva el valor temporal y el tono narrativo sin caer en un calco rígido.
- source_word: יָבֹאוּ עָלֶיךָ
  english_pob_choice: come upon you
  chosen_spanish: vengan sobre ti
  alternatives_spanish:
  - vengan sobre ti
  - te alcancen
  - te sobrevengan
  lexicon: HALOT
  rationale: El verbo expresa acontecimientos que recaen sobre la persona. «Vengan sobre ti» mantiene la imagen hebrea de algo que cae o recae sobre el destinatario.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todos estos דברים/matters
  - todos estos asuntos
  lexicon: HALOT
  rationale: דְּבָרִים aquí alude al conjunto de realidades del pacto ya mencionadas. «Cosas» es la opción española más natural y amplia, sin forzar un sentido técnico de «palabras».
- source_word: הַבְּרָכָה וְהַקְּלָלָה
  english_pob_choice: the blessing and the curse
  chosen_spanish: la bendición y la maldición
  alternatives_spanish:
  - la bendición y la maldición
  - la bendición y el maldición
  lexicon: HALOT
  rationale: Se conserva el paralelismo de las sanciones del pacto. «Maldición» es el correlato directo y estándar de «bendición» en español bíblico.
- source_word: אֲשֶׁר נָתַתִּי לְפָנֶיךָ
  english_pob_choice: that I have set before you
  chosen_spanish: que he puesto delante de ti
  alternatives_spanish:
  - que he puesto ante ti
  - que he presentado delante de ti
  lexicon: HALOT
  rationale: El hebreo usa una idiomática de colocar algo «delante de» alguien. «Puesto delante de ti» reproduce la fuerza de presentación/colocación sin sonar artificial.
- source_word: וַהֲשֵׁבֹתָ אֶל לְבָבֶךָ
  english_pob_choice: and you take them to heart
  chosen_spanish: las traerás de nuevo a tu corazón
  alternatives_spanish:
  - las llevarás de nuevo a tu corazón
  - las volverás a tu corazón
  - las tomarás en cuenta
  lexicon: HALOT
  rationale: El hiphil de שוב con «corazón» expresa volver algo al centro de la reflexión interior. Se opta por una fórmula que mantiene el movimiento de «volver» y la metáfora del corazón, sin reemplazarla por una interpretación demasiado libre.
- source_word: לְבָבֶךָ
  english_pob_choice: mind / heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: En hebreo, «corazón» incluye pensamiento, memoria y decisión; en este contexto conviene conservar la imagen bíblica. «Corazón» permite además dejar visible la tensión semítica entre afecto y reflexión.
- source_word: בְּכָל הַגּוֹיִם
  english_pob_choice: among all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - en todas las naciones
  - en medio de todas las naciones
  lexicon: HALOT
  rationale: «Entre» comunica mejor la dispersión dentro de pueblos extranjeros que un simple «en».
- source_word: הִדִּיחֲךָ
  english_pob_choice: has driven you
  chosen_spanish: te habrá dispersado
  alternatives_spanish:
  - te habrá echado
  - te habrá expulsado
  - te habrá desterrado
  lexicon: HALOT
  rationale: El verbo denota expulsión/impulso fuera de un lugar; en este contexto de exilio, «dispersado» hace explícita la dimensión geográfica del juicio sin negar la fuerza del desplazamiento. Se conserva el matiz de desarraigo presente en el hebreo.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - Yahvé, tu Dios
  - el SEÑOR tu Dios
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene la forma «Yahvé» según el estándar doctrinal del proyecto para el Tetragrámaton. «Tu Dios» conserva la fórmula pactual del hebreo sin necesidad de sustitución litúrgica.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - allí
  lexicon: HALOT
  rationale: El adverbio señala el lugar del exilio. «Allí» es natural en español y mantiene la referencia espacial.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En esta tradición de trabajo, se evita ocultarlo tras un sustituto mayúsculo y se lo vierte como «Yahvé» para preservar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de וַהֲשֵׁבֹתָ אֶל לְבָבֶךָ
  english_pob_reading: take them to heart
  chosen_spanish_reading: las traerás de nuevo a tu corazón
  alternative_spanish_readings:
  - las tomarás a pecho
  - las recordarás de corazón
  - las reflexionarás en tu corazón
  rationale: La frase hebrea no es solo memoria intelectual; implica devolver estas realidades al centro de la interioridad. La versión española mantiene la metáfora corporal del corazón y evita reducirla a simple recuerdo.
  doctrine_reference: 'DOCTRINE.md Lexical semantics: לֵב / לְבָב as inner person'
- issue: Alcance de הִדִּיחֲךָ en contexto de exilio
  english_pob_reading: has driven you
  chosen_spanish_reading: te habrá dispersado
  alternative_spanish_readings:
  - te habrá expulsado
  - te habrá desterrado
  - te habrá arrojado
  rationale: En el contexto inmediato, la idea no es solo expulsión sino dispersión entre naciones. «Dispersado» hace visible el resultado histórico del juicio sin perder la noción de haber sido apartado por Yahvé.
  doctrine_reference: DOCTRINE.md Covenant curse / exile language
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés que prefirió una expresión más natural para וַהֲשֵׁבֹתָ אֶל־לְבָבֶךָ. En español se reflejó esa misma decisión conservando la metáfora de «volver al corazón» y evitando una paráfrasis meramente mental. También se respetó la elección doctrinal del nombre divino como Yahvé, en continuidad con el marco del proyecto, aunque el contexto auditado inglés usó otra convención.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se conservó «corazón» para לְבָב, evitando «mente» para no borrar la antropología semítica del texto.
  - «Entre todas las naciones» se eligió para reflejar dispersión geográfica y social.
  - La puntuación con raya reproduce la incisión discursiva del hebreo y del inglés auditado.
  - El marcador [a] está anclado en la frase sobre el corazón y ofrece una alternativa literal sin duplicar notas.
