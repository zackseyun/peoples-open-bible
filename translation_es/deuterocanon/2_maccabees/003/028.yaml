    reason: lexical_alternative
  - marker: b
    text: La expresión griega es idiomática y difícil; comunica que quedó totalmente postrado o incapacitado por completo.
    reason: lexical_alternative
  revision_rationale: Se reemplazó ‘sin ayuda’ por ‘indefenso’ para evitar ambigüedad sintáctica y reflejar correctamente ἀβοήθητον como estado de Heliodoro. Se ajustó ‘completamente abatido’ a ‘totalmente incapacitado’ para alinearlo mejor con el valor idiomático de τοῖς ὅλοις καθεστῶτα documentado en el POB. Se eliminó la nota teológica innecesaria para no sobrecargar el texto cuando ‘poder soberano’ ya preserva la reserva del griego.
