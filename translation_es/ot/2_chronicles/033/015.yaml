translation:
  language: es
  text: Quitó los dioses extranjeros y el ídolo[a] de la casa de Yahvé, y todos los altares que había construido en el monte de la casa de Yahvé y en Jerusalén[b], y los arrojó fuera de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la imagen». El hebreo סֶמֶל puede referirse a un ídolo o imagen de culto.
    reason: lexical_alternative
  - marker: b
    text: O «en la colina de la casa de Yahvé»; es decir, el monte del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: He removed
  chosen_spanish: Quitó
  alternatives_spanish:
  - Retiró
  - Removió
  - Quitó de en medio
  lexicon: HALOT
  rationale: El verbo implica hacer desaparecer o apartar algo de su lugar. «Quitó» es natural en español y conserva la fuerza de eliminación sin añadir interpretación.
- source_word: אֱלֹהֵי הַנֵּכָר
  english_pob_choice: the foreign gods
  chosen_spanish: los dioses extranjeros
  alternatives_spanish:
  - los dioses de los extranjeros
  - los dioses extraños
  lexicon: HALOT
  rationale: La construcción alude a deidades no pertenecientes a Yahvé. «Dioses extranjeros» comunica bien ese sentido en español y conserva el contraste religioso del contexto.
- source_word: הַסֶּמֶל
  english_pob_choice: the idol
  chosen_spanish: el ídolo
  alternatives_spanish:
  - la imagen
  - la estatua cultual
  - la imagen tallada
  lexicon: HALOT
  rationale: En este contexto reformador, סֶמֶל designa una figura cultual condenada. «Ídolo» expresa mejor el valor religioso del objeto que «imagen» en español corriente.
- source_word: מִבֵּית יְהוָה
  english_pob_choice: from the house of Yahweh
  chosen_spanish: de la casa de Yahvé
  alternatives_spanish:
  - del templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión del hebreo «casa de Yahvé», en línea con el criterio del proyecto de no sustituir el nombre divino por una convención de máscara.
- source_word: וְכָל הַמִּזְבְּחוֹת
  english_pob_choice: and all the altars
  chosen_spanish: y todos los altares
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del plural hebreo con כָּל. No hay motivo para estrechar o ampliar el referente.
- source_word: אֲשֶׁר בָּנָה
  english_pob_choice: that he had built
  chosen_spanish: que había construido
  alternatives_spanish:
  - que construyó
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien que los altares fueron construidos antes de ser retirados. «Construido» preserva el matiz de obra deliberada.
- source_word: בְּהַר בֵּית יְהוָה
  english_pob_choice: on the mountain of the house of Yahweh
  chosen_spanish: en el monte de la casa de Yahvé
  alternatives_spanish:
  - en la colina de la casa de Yahvé
  - en el monte del templo de Yahvé
  lexicon: HALOT
  rationale: «Monte» mantiene la literalidad de הַר y «casa de Yahvé» conserva la forma hebrea. No se reemplaza por «templo» en el texto principal, aunque sea una aclaración contextual válida.
- source_word: וּבִירוּשָׁלָם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  lexicon: HALOT
  rationale: Traslada sin cambio el topónimo y el valor locativo de la frase.
- source_word: וַיַּשְׁלֵךְ
  english_pob_choice: and he threw them
  chosen_spanish: y los arrojó
  alternatives_spanish:
  - y los lanzó
  - y los echó
  lexicon: HALOT
  rationale: «Arrojó» conserva el gesto enérgico y despectivo del verbo hebreo mejor que una opción más neutra.
- source_word: חוּצָה לָעִיר
  english_pob_choice: outside the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - al exterior de la ciudad
  - afuera de la ciudad
  lexicon: HALOT
  rationale: «Fuera de la ciudad» es idiomático y preciso para la expulsión a un lugar exterior a los límites urbanos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto en español: «Yahvé» para el Tetragrámaton, manteniendo el nombre divino personal y no una sustitución funcional.'
theological_decisions:
- issue: El nombre divino יְהוָה en una narración de reforma del culto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión doctrinal del proyecto preserva el nombre propio de Dios. En español, «Yahvé» es la forma consistente con ese criterio y evita ocultar el Tetragrámaton bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se conserva la distinción entre «dioses extranjeros» e «ídolo», la ubicación doble «en el monte de la casa de Yahvé y en Jerusalén», y el final enfático «fuera de la ciudad». No se registran revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se mantuvo «casa de Yahvé» en lugar de «templo» para respetar el eco del hebreo y la política del proyecto sobre el nombre divino.
  - «Ídolo» se usó como término cultual fuerte, coherente con el contexto de reforma y con la nota alternativa sobre «imagen».
  - El orden y la puntuación reflejan el paralelismo hebreo y la secuencia narrativa del original.
