translation:
  language: es
  text: ¡Ay de ellos, porque se apartaron de mí! Destrucción para ellos, porque se rebelaron contra mí. Aunque yo los redimiría, dicen mentiras contra mí.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: א֤וֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de ellos!
  - ¡Ay! / ¡Ay de ellos!
  lexicon: HALOT
  rationale: El interjección profética admite «¡Ay!» en español como exclamación de lamentación y amenaza. Para conservar la carga directa del hebreo en un registro natural, se mantiene además «de ellos» en el contexto inmediato.
- source_word: נָדְדוּ מִמֶּנִּי
  english_pob_choice: have wandered from me
  chosen_spanish: se apartaron de mí
  alternatives_spanish:
  - anduvieron errantes lejos de mí
  - se desviaron de mí
  lexicon: HALOT
  rationale: «נדד» puede expresar apartarse, vagar o huir. «Se apartaron de mí» conserva la separación relacional y el matiz de distanciamiento del pacto sin forzar una idea más fuerte de fuga intencional.
- source_word: שֹׁד לָהֶם
  english_pob_choice: Destruction to them
  chosen_spanish: Destrucción para ellos
  alternatives_spanish:
  - Ruina para ellos
  - Devastación para ellos
  lexicon: HALOT
  rationale: «שֹׁד» denota ruina, devastación o destrucción violenta. «Destrucción para ellos» reproduce con naturalidad la fórmula hebrea breve y acusatoria.
- source_word: פָשְׁעוּ בִי
  english_pob_choice: have rebelled against me
  chosen_spanish: se rebelaron contra mí
  alternatives_spanish:
  - han transgredido contra mí
  - se alzaron contra mí
  lexicon: HALOT
  rationale: «פשׁע» es más fuerte que un simple pecado; implica rebelión o quiebra de lealtad. «Se rebelaron contra mí» mantiene ese sentido en un español claro y bíblico.
- source_word: וְאָנֹכִי אֶפְדֵּם
  english_pob_choice: Though I would redeem them
  chosen_spanish: Aunque yo los redimiría
  alternatives_spanish:
  - Y yo los redimiría
  - Pero yo los redimiría
  - Y yo mismo los redimiría
  lexicon: HALOT
  rationale: El imperfecto de פדה aquí admite un valor no pasado que expresa disposición o intención divina en tensión con la respuesta humana. «Aunque yo los redimiría» conserva esa relación adversativa y la ambigüedad deliberada del texto.
- source_word: דִּבְּרוּ עָלַי כְּזָבִים
  english_pob_choice: they speak lies against me
  chosen_spanish: hablan mentiras contra mí
  alternatives_spanish:
  - han hablado mentiras contra mí
  - hablan falsedades contra mí
  - me calumnian con mentiras
  lexicon: HALOT
  rationale: La frase señala discurso falso dirigido contra Dios. «Hablan mentiras contra mí» sigue de cerca la orientación de עָלַי y evita suavizar el tono hostil.
theological_decisions:
- issue: Sentido de וְאָנֹכִי אֶפְדֵּם
  english_pob_reading: Though I would redeem them
  chosen_spanish_reading: Aunque yo los redimiría
  alternative_spanish_readings:
  - Y yo los redimiría
  - Pero yo los redimiría
  - Yo los redimiría
  rationale: 'Se preserva la tensión teológica: Dios está dispuesto a redimir, pero Israel responde con mentira. La forma condicional en español ayuda a evitar decidir prematuramente entre un sentido pasado («yo los redimí») y uno meramente futuro, manteniendo la ambigüedad que el auditorio debe percibir.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: se prefirió una fórmula más directa para שֹׁד («Destrucción para ellos») y una equivalencia más cercana para נָדְדוּ מִמֶּנִּי («se apartaron de mí»), conservando la tensión del imperfecto en אֶפְדֵּם mediante una construcción condicional en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma general del proyecto cuando corresponda; aquí no aplica.
  - Se mantuvo «redimiría» para reflejar el imperfecto y la posibilidad de lectura no pasada; no se cambió por un pasado narrativo.
  - «Mentiras» se prefirió a «falsedad» para conservar la acusación directa del hebreo y un español bíblico claro.
