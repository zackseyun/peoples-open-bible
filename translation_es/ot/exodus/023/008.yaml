    reason: lexical_alternative
  revision_rationale: Se conserva la base del borrador, pero se corrige lo necesario para alinearlo mejor con el rastro inglés y con un español más natural. Se añade la nota indispensable sobre el posible sentido forense de דִּבְרֵי צַדִּיקִים y se mejora la frase sobre פִּקְחִים a "los de ojos claros", que preserva la metáfora visual con mejor legibilidad que "los de vista clara". No se requiere reescritura mayor ni adjudicación doctrinal.
