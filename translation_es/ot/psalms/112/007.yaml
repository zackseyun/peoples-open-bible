  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: מִשְּׁמוּעָה רָעָה se transmite naturalmente como «malas noticias», לֹא יִירָא como una negación habitual/característica, y בַּיהוָה correctamente como «en Yahvé». La estructura también conserva la relación entre la firmeza del corazón y su confianza en Yahvé.'
  spanish_quality_summary: El español es claro y eclesialmente legible. Sin embargo, «su corazón está firme, confiado en Yahvé» suena algo suelto en la coordinación predicativa. «Su corazón está firme, confiando en Yahvé» calca menos bien el valor estativo; mejor es compactar la relación con «su corazón está firme, porque confía en Yahvé» o «su corazón está firme, seguro en Yahvé». Dado que el inglés auditado preserva explícitamente «trusting in Yahweh», la solución más fiel y natural en español es «su corazón está firme, confiando en Yahvé» no del todo idiomática, o mejor reestructurar a «su corazón está firme; confía en Yahvé».
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: YHWH → «Yahvé», לֵב → «corazón». No hay conflicto doctrinal. Las notas alternativas también recogen adecuadamente «mal informe» y «establecido».'
  issues:
  - severity: medium
    issue: La relación entre «está firme» y «confiado en Yahvé» resulta algo torpe en español.
    rationale: 'El hebreo tiene dos predicaciones nominales/adjetivales consecutivas sobre el corazón: «establecido/firme» y «confiado/trusting en Yahvé». En español, «su corazón está firme, confiado en Yahvé» es comprensible, pero suena menos natural y puede percibirse como aposición pesada. Una leve reestructuración mejora la fluidez sin perder sentido.'
  - severity: low
    issue: La nota [b] usa «es firme» como alternativa a un texto principal con «está firme».
    rationale: No es incorrecto, pero la distinción ser/estar aquí puede introducir una diferencia que no está en foco en el hebreo. Conviene mantener alternativas más directamente léxicas como «su corazón es firme» o «su corazón está establecido» con formulación paralela y clara.
  revised_spanish_text: No temerá malas noticias[a]; su corazón está firme; confía en Yahvé[b].
  revised_footnotes:
  - marker: a
    text: 'O: «un mal informe».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «su corazón está firme, confiado en Yahvé». O «su corazón es firme» o «su corazón está establecido».
    reason: lexical_and_structural_clarification
