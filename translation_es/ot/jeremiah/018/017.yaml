translation:
  language: es
  text: Como un viento del oriente, los dispersaré delante del enemigo; les mostraré la espalda y no el rostro[a] en el día de su desastre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les volveré la espalda y no el rostro». El hebreo usa una imagen corporal para expresar el retiro de su favor y de su atención.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרוּחַ קָדִים
  english_pob_choice: Like an east wind
  chosen_spanish: Como un viento del oriente
  alternatives_spanish:
  - Como el viento del oriente
  - Como un viento oriental
  lexicon: HALOT
  rationale: כְּ introduce comparación, y רוּחַ קָדִים describe literalmente un viento del oriente. En español, 'viento del oriente' conserva la imagen natural sin añadir intensidad no explicitada en el hebreo.
- source_word: אֲפִיצֵם
  english_pob_choice: I will scatter them
  chosen_spanish: los dispersaré
  alternatives_spanish:
  - los esparciré
  - los echaré a dispersión
  lexicon: HALOT
  rationale: El verbo hifil de פוץ expresa acción causativa de dispersar. 'Dispersaré' es fiel, claro y mantiene el matiz de juicio colectivo.
- source_word: לִפְנֵי אוֹיֵב
  english_pob_choice: before the enemy
  chosen_spanish: delante del enemigo
  alternatives_spanish:
  - ante el enemigo
  - en presencia del enemigo
  lexicon: HALOT
  rationale: La expresión indica la situación de quedar expuestos o arrojados ante el adversario. 'Delante del enemigo' suena natural en español y conserva la fuerza espacial del hebreo.
- source_word: עֹרֶף וְלֹא פָנִים
  english_pob_choice: my back and not my face
  chosen_spanish: la espalda y no el rostro
  alternatives_spanish:
  - la nuca y no el rostro
  - la espalda y no la cara
  lexicon: HALOT
  rationale: Aunque עֹרֶף apunta literalmente a la nuca o parte posterior del cuello, en este paralelismo con פָנִים el sentido idiomático es retirar el favor y la atención. 'Espalda' comunica bien el giro de rechazo y mantiene el paralelo con 'rostro'.
- source_word: אֶרְאֵם
  english_pob_choice: I will show them
  chosen_spanish: les mostraré
  alternatives_spanish:
  - los haré ver
  - les haré ver
  lexicon: HALOT
  rationale: En esta construcción ראה puede tener valor de 'mostrar, hacer ver'. 'Les mostraré' refleja el hebreo y mantiene la personificación divina sin volverla explicativa o abstracta.
- source_word: בְּיוֹם אֵידָם
  english_pob_choice: in the day of their disaster
  chosen_spanish: en el día de su desastre
  alternatives_spanish:
  - en el día de su calamidad
  - cuando les llegue el desastre
  lexicon: HALOT
  rationale: אֵיד denota desastre, ruina o calamidad. 'Desastre' es claro y solemne en español, y conserva el valor temporal del giro 'en el día de'.
theological_decisions:
- issue: Antropomorfismo de rechazo divino
  english_pob_reading: 'Retain the bodily metaphor literally: ''I will show them the back and not the face.'''
  chosen_spanish_reading: 'Mantener la metáfora corporal: ''les mostraré la espalda y no el rostro''.'
  alternative_spanish_readings:
  - me apartaré de ellos
  - les retiraré mi favor
  - no los miraré con favor
  rationale: El hebreo expresa el juicio mediante imagen concreta de desatención o retirada de favor. La versión española conserva la metáfora sin resolverla en paráfrasis abstracta, para no borrar la tensión textual documentada.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar el posesivo explícito ('my') delante de 'back' y 'face' porque el hebreo no lo expresa; la propuesta española también evita introducir posesivos que no están en el texto y mantiene el paralelo corporal sin añadir elementos ajenos al original.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito y la frase se mantiene con sujeto implícito por el contexto profético.
  - '''Rostro'' se prefirió a ''cara'' por registro bíblico y por correspondencia con el paralelismo hebreo con פָנִים.'
  - La puntuación conserva el paralelismo de dos miembros y el tono oracular del hebreo.
