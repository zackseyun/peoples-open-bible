translation:
  language: es
  text: 'Ezequías les prestó atención[a] y les mostró toda su casa del tesoro[b]: la plata, el oro, las especias, el aceite fino, su armería[c], y todo lo que se hallaba en sus almacenes. No hubo nada en su casa ni en todo su dominio[d] que Ezequías no les mostrara.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los oyó” o “los recibió favorablemente”; el modismo hebreo también puede dar la idea de dar audiencia o prestar atención.
    reason: lexical_alternative
  - marker: b
    text: O “su tesorería” o “su almacén de tesoros”.
    reason: lexical_alternative
  - marker: c
    text: O “su arsenal”; más literalmente, “la casa de su equipo”.
    reason: lexical_alternative
  - marker: d
    text: O “en todo su reino” o “en toda su dominación”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע עֲלֵיהֶם
  english_pob_choice: listened to them
  chosen_spanish: les prestó atención
  alternatives_spanish:
  - los oyó
  - los recibió favorablemente
  - les escuchó
  lexicon: HALOT
  rationale: El hebreo שׁמע עַל puede expresar no solo oír, sino dar audiencia o atender favorablemente. En español, 'les prestó atención' comunica ese valor relacional mejor que un simple 'los oyó'.
- source_word: וַיַּרְאֵם
  english_pob_choice: showed them
  chosen_spanish: les mostró
  alternatives_spanish:
  - les hizo ver
  - les permitió ver
  lexicon: HALOT
  rationale: El verbo hiphil de ראה se vierte naturalmente como 'mostrar'. 'Les mostró' conserva el sentido activo del original sin añadir matices ajenos.
- source_word: בֵּית נְכֹתֹה
  english_pob_choice: his treasure house
  chosen_spanish: su casa de tesoros
  alternatives_spanish:
  - su tesorería
  - su almacén de tesoros
  - su casa de objetos preciosos
  lexicon: HALOT
  rationale: La expresión hebrea designa el lugar donde se guardaban objetos valiosos. 'Casa de tesoros' mantiene la imagen del hebreo y resulta comprensible en español; se evita 'tesorería' por sonar más institucional que concreta.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el plata
  - el dinero
  lexicon: HALOT
  rationale: Aquí כֶּסֶף se refiere al metal precioso almacenado, no a dinero en general. En español, 'la plata' es el equivalente natural y preciso.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  lexicon: HALOT
  rationale: Referencia directa al metal precioso entre los bienes reales.
- source_word: הַבְּשָׂמִים
  english_pob_choice: the spices
  chosen_spanish: los aromas
  alternatives_spanish:
  - las especias
  - los perfumes
  - los aromáticos
  lexicon: HALOT
  rationale: El plural denota sustancias aromáticas valiosas. 'Aromas' es un español amplio que evita reducirlo solo a condimentos culinarios; además preserva la vaguedad útil del original en un inventario de tesoros.
- source_word: שֶׁמֶן הַטּוֹב
  english_pob_choice: the fine oil
  chosen_spanish: el aceite fino
  alternatives_spanish:
  - el buen aceite
  - el aceite precioso
  lexicon: HALOT
  rationale: La frase significa literalmente 'el aceite bueno'. 'Aceite fino' transmite calidad o excelencia en español moderno sin especificar indebidamente su uso.
- source_word: בֵּית כֵּלָיו
  english_pob_choice: his armory
  chosen_spanish: su casa de armas
  alternatives_spanish:
  - su armería
  - su arsenal
  - la casa de sus utensilios
  lexicon: HALOT
  rationale: En contexto real de inventario de recursos, כֵּלִים puede referirse a armas o equipo. 'Casa de armas' conserva la estructura del hebreo y mantiene la relación con un depósito de equipo militar; se evita 'armería' por ser más idiomático pero menos transparente respecto a la imagen original.
- source_word: אֲשֶׁר נִמְצָא בְּאֹצְרֹתָיו
  english_pob_choice: everything that was found in his storehouses
  chosen_spanish: todo lo que se hallaba en sus almacenes
  alternatives_spanish:
  - todo lo que se encontraba en sus tesoros
  - todo lo que había en sus depósitos
  lexicon: HALOT
  rationale: אֹצָר puede significar tesoro o almacén. Como ya se tradujo בֵּית נְכֹתֹה con una frase de tesoro, 'almacenes' evita repetición y conserva la idea de bienes guardados.
- source_word: לֹא הָיָה דָבָר אֲשֶׁר לֹא הֶרְאָם
  english_pob_choice: There was nothing ... that Hezekiah did not show them
  chosen_spanish: No hubo nada ... que Ezequías no les mostrara
  alternatives_spanish:
  - No había cosa alguna ... que Ezequías no les mostrara
  - Nada había ... que no les enseñara
  lexicon: HALOT
  rationale: La doble negación hebrea expresa totalidad enfática. 'No hubo nada... que... no les mostrara' reproduce esa fuerza en español sin suavizarla.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su palacio
  lexicon: HALOT
  rationale: Aunque el contexto es real, 'casa' traduce literalmente el hebreo y permite mantener el paralelismo con la enumeración de posesiones.
- source_word: וּבְכָל מֶמְשַׁלְתּוֹ
  english_pob_choice: in all his realm
  chosen_spanish: en todo su dominio
  alternatives_spanish:
  - en todo su reino
  - en toda su jurisdicción
  lexicon: HALOT
  rationale: מֶמְשָׁלָה implica dominio, gobierno o esfera de poder. 'Dominio' refleja bien la extensión del poder de Ezequías y conserva el matiz de control soberano.
theological_decisions:
- issue: Alcance de la expresión de escucha inicial
  english_pob_reading: heard them / listened to them / received them favorably
  chosen_spanish_reading: les prestó atención
  alternative_spanish_readings:
  - los oyó
  - los recibió favorablemente
  - les escuchó
  rationale: La frase hebrea no describe solo percepción auditiva. En este contexto diplomático, sugiere que Ezequías les dio audiencia y atención, sin decidir de forma excesiva entre oír y favorecer.
  doctrine_reference: Ninguna; decisión semántica contextual
- issue: Inventario de bienes reales y posible terminología militar
  english_pob_reading: his armory / arsenal / house of equipment
  chosen_spanish_reading: su casa de armas
  alternative_spanish_readings:
  - su armería
  - su arsenal
  - la casa de sus utensilios
  rationale: El hebreo puede abarcar equipo o armas. 'Casa de armas' conserva la ambigüedad útil del texto y evita cerrar el sentido solo a 'armería' o solo a 'utensilios'.
  doctrine_reference: Ninguna; decisión léxica contextual
- issue: Cobertura total de lo mostrado
  english_pob_reading: There was nothing in his house or in all his realm that Hezekiah did not show them
  chosen_spanish_reading: No hubo nada en su casa ni en todo su dominio que Ezequías no les mostrara
  alternative_spanish_readings:
  - No había nada...
  - Nada había...
  rationale: 'El hebreo usa una negación total enfática. El español debe mantener la exhaustividad: no queda nada fuera de lo exhibido a los visitantes.'
  doctrine_reference: Ninguna; énfasis retórico del original
translation_notes:
  revision_awareness: 'Se revisó la redacción para hacerla más transparente al hebreo: se mantuvo la secuencia de enumeración de bienes, se evitó sobre-interpretar בֵּית כֵּלָיו con un equivalente demasiado técnico, y se conservó la negación enfática final. No se detectaron cambios de revisión en el audit trail inglés más allá de la aprobación sin modificaciones.'
  spanish_consistency_notes:
  - Se mantiene 'Ezequías' para חִזְקִיָּהוּ.
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - '''Dominio'' se usa de manera consistente para מֶמְשָׁלָה, conforme a la preferencia POB.'
  - '''Casa de tesoros'' y ''almacenes'' se diferencian para evitar redundancia y respetar el paralelismo semántico del hebreo.'
