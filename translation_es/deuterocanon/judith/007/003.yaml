translation:
  language: es
  text: Y acamparon en el valle, cerca de Betulia[a], junto a la fuente, y se extendieron en anchura hacia Dotaim hasta Belbaim, y en longitud desde Betulia hasta Ciamón, que está enfrente de Esdraelón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego αὐλών puede significar «patio/corral» en algunos contextos, pero aquí el marco geográfico y los hitos topográficos cercanos favorecen «valle».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρενέβαλον
  english_pob_choice: they encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acantonaron
  - establecieron campamento
  lexicon: LSJ
  rationale: El verbo griego describe el establecimiento de un campamento militar. En español, «acamparon» comunica con naturalidad la acción sin perder el sentido militar del contexto.
- source_word: ἐν τῷ αὐλῶνι
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en la hondonada
  - en la llanura
  lexicon: LSJ
  rationale: En este entorno geográfico con lugares nombrados y una fuente, αὐλών designa un valle o hondonada. «Valle» es la opción más clara y fiel en español.
- source_word: πλησίον Βαιτυλουὰ
  english_pob_choice: near Bethulia
  chosen_spanish: cerca de Betulia
  alternatives_spanish:
  - junto a Betulia
  lexicon: LSJ
  rationale: πλησίον expresa proximidad espacial directa. Se translitera el topónimo conforme al uso español del pasaje.
- source_word: ἐπὶ τῆς πηγῆς
  english_pob_choice: by the spring
  chosen_spanish: junto a la fuente
  alternatives_spanish:
  - junto al manantial
  - cerca de la fuente
  lexicon: LSJ
  rationale: πηγή puede ser «fuente» o «manantial». «Fuente» es suficientemente natural en español bíblico y conserva la referencia topográfica.
- source_word: παρέτειναν
  english_pob_choice: they extended
  chosen_spanish: se extendieron
  alternatives_spanish:
  - se prolongaron
  - se desplegaron
  lexicon: LSJ
  rationale: El verbo indica la extensión de la línea del campamento. La forma pronominal española mantiene la idea de expansión espacial de manera idiomática.
- source_word: εἰς εὖρος
  english_pob_choice: in breadth
  chosen_spanish: en anchura
  alternatives_spanish:
  - en amplitud
  - en ancho
  lexicon: LSJ
  rationale: La expresión mide una dimensión del campamento. «Anchura» reproduce bien el contraste dimensional con «longitud» y suena natural en español formal.
- source_word: ἐπὶ Δοθαειμ ἕως Βελβαΐμ
  english_pob_choice: toward Dothaim as far as Belbaim
  chosen_spanish: hacia Dotaim hasta Belbaim
  alternatives_spanish:
  - en dirección de Dotaim hasta Belbaim
  - desde Dotaim hasta Belbaim
  lexicon: LSJ
  rationale: ἐπί con nombre propio aquí es direccional. «Hacia ... hasta ...» conserva el movimiento/alcance sin imponer una geometría más precisa que la del griego.
- source_word: εἰς μῆκος
  english_pob_choice: in length
  chosen_spanish: en longitud
  alternatives_spanish:
  - a lo largo
  - en largo
  lexicon: LSJ
  rationale: 'Se mantiene el paralelismo con εἰς εὖρος mediante una dimensión equivalente en español: «longitud».'
- source_word: ἕως Βαιτυλουὰ ἕως Κυαμῶνος
  english_pob_choice: from Bethulia as far as Cyamon
  chosen_spanish: desde Betulia hasta Ciamón
  alternatives_spanish:
  - hasta Betulia hasta Ciamón
  - de Betulia hasta Ciamón
  lexicon: LSJ
  rationale: La secuencia de ἕως marca el alcance lineal; «desde ... hasta ...» es la manera natural de expresarlo en español y preserva el recorrido espacial.
- source_word: ἀπέναντι Ἐσδρηλών
  english_pob_choice: opposite Esdraelon
  chosen_spanish: que está enfrente de Esdrelón
  alternatives_spanish:
  - opuesto a Esdrelón
  - frente a Esdrelón
  lexicon: LSJ
  rationale: ἀπέναντι indica posición enfrente u opuesta. «Que está enfrente de» aclara la relación geográfica sin añadir interpretación extra.
theological_decisions:
- issue: Topónimos y transliteración geográfica
  english_pob_reading: Proper names are transliterated as place names with no doctrinal load.
  chosen_spanish_reading: 'Se conservan los nombres propios como topónimos transliterados en español: Betulia, Dotaim, Belbaim, Ciamón y Esdrelón.'
  alternative_spanish_readings:
  - Betulia, Dotaim, Belbaín, Ciamón y Esdraelón
  - formas castellanizadas tradicionales
  rationale: No hay cuestión doctrinal, pero sí una decisión de consistencia textual. Se privilegian formas legibles en español sin sustituir los nombres por equivalentes interpretativos.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «stretched out» a «extended» para un registro más formal. La redacción española sigue esa revisión con «se extendieron», manteniendo el paralelismo dimensional del griego y el tono formal.
  spanish_consistency_notes:
  - Se evita «Señor» o una máscara litúrgica porque no hay el nombre divino en este versículo.
  - Se mantiene la dimensión doble del campamento con «anchura» y «longitud» para reflejar εὖρος y μῆκος.
  - Los topónimos se transliteran de manera uniforme y readable en español.
  - «Fuente» se prefiere sobre «manantial» por claridad y por el uso frecuente en español bíblico.
