review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo dice literalmente que él ''dio'' su rendimiento/producto agrícola al חָסִיל y su יְגִיעַ al אַרְבֶּה. La estructura y el sentido judicial están bien captados en general, pero el borrador español falla en dos puntos importantes: usa «su produce», que no es español natural para יְבוּלָם, y deja «swarming» sin traducir en la segunda langosta. Además, las notas no reflejan exactamente las alternativas preservadas por el rastro inglés para חָסִיל.'
  spanish_quality_summary: 'La legibilidad en español es insuficiente para publicación por el anglicismo «swarming» y por «produce», que suena calcado e impropio en español general. «su trabajo» funciona, aunque «su labor» también sería posible. Conviene además usar posesivo plural para mayor claridad: «sus cosechas / su labor».'
  glossary_alignment: No hay términos teológicos del glosario mayor en juego aquí. Léxicamente, «langosta devoradora» para חָסִיל y «langosta migratoria» o equivalente para אַרְבֶּה respetan la distinción hebrea mejor que repetir simplemente «langosta». Se debe evitar el anglicismo y mejorar «produce» a «cosecha» o «producto».
  issues:
  - severity: high
    issue: 'Anglicismo no traducido: «la langosta swarming»'
    rationale: El término inglés quedó incrustado en el texto español, lo que lo hace inaceptable estilísticamente y opaco para el lector.
  - severity: high
    issue: «su produce» es un calco no natural en español
    rationale: Aunque sigue el inglés 'produce', en español bíblico moderno y general «produce» no funciona aquí; «sus cosechas», «su producto» o «su rendimiento» serían naturales y fieles a יְבוּלָם.
  - severity: medium
    issue: La nota [a] no preserva la alternativa principal documentada para חָסִיל
    rationale: El rastro inglés conserva explícitamente «caterpillar / oruga» como alternativa léxica; la nota española actual habla de יְבוּלָם en vez de ese término, desplazando la justificación importante.
  - severity: low
    issue: El posesivo singular «su» puede sonar ambiguo
    rationale: El hebreo tiene sufijo plural «de ellos». En español puede mantenerse singular colectivo, pero «sus cosechas» aclara mejor el referente.
  revised_spanish_text: Él dio sus cosechas[a] a la langosta devoradora, y su labor[b] a la langosta migratoria.
