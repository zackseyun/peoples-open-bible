review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego de Juan 8:13: οὖν como continuidad discursiva, αὐτῷ como pronombre, Σὺ con énfasis inicial, περὶ σεαυτοῦ como referencia reflexiva, y ἡ μαρτυρία σου οὐκ ἔστιν ἀληθής sin reducirlo a tecnicismo legal. Sin embargo, «testificas» suena menos natural y menos ampliamente eclesial que «das testimonio», y la nota sobre «le dijeron[a]» no aporta una alternativa necesaria en español; además, el anclaje de la nota en «le dijeron» no es el mejor lugar para una observación que en realidad trata del pronombre griego αὐτῷ.'
  spanish_quality_summary: El texto es comprensible y digno, pero requiere un ajuste menor para mayor naturalidad y legibilidad en español neutro. «Así que» funciona, aunque «Entonces» suena más narrativo y menos conversacional en este contexto. «Das testimonio» es más idiomático que «testificas». La frase final «tu testimonio no es verdadero» es fiel y clara.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión clave es mantener «testimonio» para μαρτυρία y un verbo relacionado para μαρτυρεῖς; «das testimonio» preserva mejor esa coherencia léxica en español. «Verdadero» conserva adecuadamente ἀληθής y su tensión entre veracidad y posible validez.
  issues:
  - severity: medium
    issue: «testificas» es menos natural que «das testimonio» en español bíblico moderno
    rationale: Aunque es comprensible, «testificas» suena más forense o regional y menos idiomático para una audiencia amplia. «Das testimonio» conserva mejor el campo semántico de μαρτυρεῖς y la relación con «testimonio».
  - severity: low
    issue: «Así que» puede sonar demasiado coloquial para οὖν en esta secuencia narrativa
    rationale: «Entonces» refleja con más naturalidad la progresión del relato y evita un matiz excesivamente conversacional sin perder la continuidad lógica.
  - severity: low
    issue: La nota [a] no es necesaria y su anclaje resulta poco preciso
    rationale: En español, «le dijeron» ya expresa naturalmente αὐτῷ. La alternativa «le dijeron a él» no añade valor suficiente para el lector, y la nota no corresponde a una ambigüedad relevante que deba preservarse.
  revised_spanish_text: 'Entonces los fariseos le dijeron: «Tú das testimonio acerca de ti mismo; tu testimonio no es verdadero».

    '
  revision_rationale: Se ajusta el texto para mayor naturalidad y legibilidad en español neutro sin alterar el sentido del griego ni la decisión teológica del POB. «Entonces» refleja bien οὖν en narrativa; «das testimonio» es más idiomático y mantiene la coherencia con «testimonio»; se elimina la nota innecesaria sobre αὐτῷ.
