translation:
  text: And he spoke peaceful words to them with deceit[a], and they trusted him; then he fell upon the city suddenly, struck it a great blow[b], and destroyed many people from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'words of peace.' The Greek phrase can be rendered more literally that way; 'peaceful words' was chosen for natural English while preserving the sense of conciliatory speech used deceptively.
    reason: lexical_alternative
  - marker: b
    text: Or 'they believed him.' Here the sense is that they accepted his assurances and so trusted him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: A straightforward past narrative verb; 'spoke' fits the construction with λόγους and preserves the verbal force without unnecessary expansion.
- source_word: λόγους εἰρηνικούς
  chosen: peaceful words
  alternatives:
  - words of peace
  - peaceable words
  lexicon: LEH
  rationale: The adjective εἰρηνικούς modifies λόγους directly. 'Peaceful words' is natural modern English; 'words of peace' is possible but slightly more idiomatic than the Greek requires. The phrase implies conciliatory speech, not necessarily genuine peace.
- source_word: ἐν δόλῳ
  chosen: with deceit
  alternatives:
  - deceitfully
  - in deceit
  - with treachery
  lexicon: BDAG
  rationale: The prepositional phrase expresses manner/instrument. 'With deceit' preserves the concrete noun and the sense that the peaceful speech was a deceptive tactic. 'Deceitfully' is smoother but less formally transparent.
- source_word: ἐπίστευσαν αὐτῷ
  chosen: they trusted him
  alternatives:
  - they believed him
  - they put faith in him
  lexicon: BDAG
  rationale: In this narrative context the sense is practical trust in his assurances, not a theological concept of faith. 'Trusted him' best communicates that they accepted his peaceful claims.
- source_word: ἐπέπεσεν ἐπὶ τὴν πόλιν
  chosen: he fell upon the city
  alternatives:
  - he attacked the city
  - he descended on the city
  lexicon: LEH
  rationale: The verb literally conveys falling upon or attacking. 'Fell upon' preserves the vividness of the Greek while remaining intelligible in English. The following adverb ἐξαίφνα sharpens the sudden assault.
- source_word: ἐξαίφνα
  chosen: suddenly
  alternatives:
  - unexpectedly
  - all at once
  lexicon: BDAG
  rationale: A simple adverb of suddenness; 'suddenly' is the most direct and idiomatic rendering.
- source_word: ἐπάταξεν αὐτὴν πληγὴν μεγάλην
  chosen: struck it a great blow
  alternatives:
  - dealt it a great blow
  - struck it with a great slaughter
  - smote it with a great blow
  lexicon: LEH
  rationale: The idiom combines πατάσσω with πληγή. 'Struck it a great blow' preserves the metaphor and avoids overinterpreting πληγή as specifically 'slaughter,' though the context is violent. 'Smote' is archaic.
- source_word: ἀπώλεσεν
  chosen: destroyed
  alternatives:
  - killed
  - wiped out
  lexicon: BDAG
  rationale: The verb can mean destroy or kill. Because the object is 'many people from Israel,' the sense includes lethal destruction; 'destroyed' stays close to the Greek while allowing the human object. 'Killed' is possible but narrows the lexical range.
- source_word: λαὸν πολὺν
  chosen: many people
  alternatives:
  - a great multitude of people
  - many of the people
  lexicon: LEH
  rationale: This phrase denotes a large number of people. 'Many people' is clear and natural; 'a great multitude' would sound elevated beyond the narrative style.
- source_word: ἐξ Ἰσραήλ
  chosen: from Israel
  alternatives:
  - of Israel
  - among Israel
  lexicon: BDAG
  rationale: The preposition ἐξ is best preserved as 'from.' In context it identifies those destroyed as belonging to Israel. 'Of Israel' is also possible, but 'from Israel' more closely reflects the Greek wording.
