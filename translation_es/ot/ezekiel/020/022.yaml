  glossary_alignment: No hay conflicto con la terminología principal del proyecto. No aparece el nombre divino explícito en este versículo. «Mi nombre», «profanado» y «naciones» concuerdan bien con las decisiones documentadas. La opción verbal para el modismo de la mano debe mantener la imagen sin perder el sentido de contención.
