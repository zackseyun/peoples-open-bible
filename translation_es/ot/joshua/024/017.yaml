translation:
  language: es
  text: Porque Yahvé nuestro Dios es el que nos hizo subir a nosotros y a nuestros padres de la tierra de Egipto, de la casa de esclavitud, y el que hizo estas grandes señales ante nuestros ojos, y nos guardó en todo el camino por el cual anduvimos, y entre todos los pueblos por en medio de los cuales pasamos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el nombre del pacto en español como «Yahvé» en vez de ocultarlo con una equivalencia tradicional.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: La posesión comunitaria se expresa naturalmente con «nuestro Dios», manteniendo la relación de alianza sin añadir matices no presentes.
- source_word: הַמַּעֲלֶה אֹתָנוּ וְאֶת אֲבוֹתֵינוּ
  english_pob_choice: the one who brought us and our fathers up
  chosen_spanish: el que nos hizo subir a nosotros y a nuestros padres
  alternatives_spanish:
  - el que nos sacó a nosotros y a nuestros padres
  - el que nos llevó arriba a nosotros y a nuestros padres
  lexicon: HALOT
  rationale: El participio de עלה conserva mejor la imagen de «subir»; en español se expresa de forma natural con «nos hizo subir», evitando una traducción plana pero manteniendo el paralelismo con «a nosotros y a nuestros padres».
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: Se conserva la explicitud de «tierra», que está en el hebreo y forma parte de la formulación histórica del éxodo.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: from the house of slavery
  chosen_spanish: de la casa de esclavitud
  alternatives_spanish:
  - de la casa de esclavos
  - de la casa de servidumbre
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de manera reconocible en español con «casa de esclavitud», preservando la idea de condición servil sin suavizar el sustantivo.
- source_word: וַאֲשֶׁר עָשָׂה לְעֵינֵינוּ
  english_pob_choice: and who did these great signs before our eyes
  chosen_spanish: y el que hizo estas grandes señales ante nuestros ojos
  alternatives_spanish:
  - y el que hizo estas grandes señales delante de nuestros ojos
  - y el que realizó estas grandes señales ante nuestros ojos
  lexicon: HALOT
  rationale: «Señales» mantiene el vínculo léxico con אותות y evita interpretar de antemano como «milagros» o «prodigios»; «ante nuestros ojos» reproduce bien el valor testimonial.
- source_word: הָאֹתוֹת הַגְּדֹלוֹת הָאֵלֶּה
  english_pob_choice: these great signs
  chosen_spanish: estas grandes señales
  alternatives_spanish:
  - estos grandes prodigios
  - estos grandes milagros
  lexicon: HALOT
  rationale: Se prefiere «señales» para conservar la amplitud semántica de אות, dejando abierta la posibilidad de una lectura más amplia que «milagros».
- source_word: וַיִּשְׁמְרֵנוּ
  english_pob_choice: kept us
  chosen_spanish: nos guardó
  alternatives_spanish:
  - nos preservó
  - nos cuidó
  lexicon: HALOT
  rationale: «Guardar» refleja bien la idea de protección providencial del verbo, y funciona con naturalidad en español bíblico contemporáneo.
- source_word: בְּכָל הַדֶּרֶךְ אֲשֶׁר הָלַכְנוּ בָהּ
  english_pob_choice: in all the way in which we walked
  chosen_spanish: en todo el camino por el cual anduvimos
  alternatives_spanish:
  - por todo el camino por el cual anduvimos
  - en todo el camino que anduvimos
  lexicon: HALOT
  rationale: «Camino» conserva la imagen hebrea y «anduvimos» mantiene el lenguaje de itinerario sin sonar artificioso.
- source_word: וּבְכֹל הָעַמִּים
  english_pob_choice: and among all the peoples
  chosen_spanish: y entre todos los pueblos
  alternatives_spanish:
  - y entre todas las naciones
  - y en medio de todos los pueblos
  lexicon: HALOT
  rationale: «Pueblos» es más natural que «naciones» en este contexto y mantiene el plural étnico del hebreo.
- source_word: אֲשֶׁר עָבַרְנוּ בְּקִרְבָּם
  english_pob_choice: through whose midst we passed
  chosen_spanish: por los cuales pasamos en medio de ellos
  alternatives_spanish:
  - en medio de los cuales pasamos
  - por cuya mitad pasamos
  lexicon: HALOT
  rationale: 'Se conservan los dos componentes de עבר y בקרבם: el paso a través de ellos y la idea de ir «en medio» de esos pueblos.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto en español según el criterio editorial del proyecto, evitando la sustitución reverencial que borra la forma original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Formulación de עֲבָדִים en la frase del éxodo
  english_pob_reading: house of slavery
  chosen_spanish_reading: casa de esclavitud
  alternative_spanish_readings:
  - casa de esclavos
  - casa de servidumbre
  rationale: La frase hebrea expresa con fuerza la condición de esclavitud histórica. «Casa de esclavitud» conserva ese valor sin convertirlo en una paráfrasis más abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested bonded-status terminology
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «house of slaves» a «house of slavery», y también ajustó la colocación de la cláusula de las señales y la preposición en la frase del camino. La presente redacción española sigue esas decisiones revisadas con una sintaxis natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el lenguaje de alianza y éxodo con «nuestro Dios», «nuestros padres», «tierra de Egipto» y «casa de esclavitud».
  - «Señales» se mantiene para אותות, evitando introducir «milagros» como glosa interpretativa.
  - «Nos guardó» refleja la protección continua implícita en וַיִּשְׁמְרֵנוּ.
  - La clausula final conserva tanto «por los cuales» como «en medio de ellos» para no perder la doble imagen del hebreo.
