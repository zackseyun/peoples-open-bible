    text: Or 'judged' in both occurrences of 'condemned.' The Greek verb is κρίνω, which can mean 'judge' or, in context, 'condemn.'
    reason: lexical_alternative
  - marker: b
    text: Or 'only Son,' 'unique Son'; traditionally, 'only begotten Son.'
    reason: alternative_reading
