base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/009/039.yaml
  text: And he told Ezra the priest and reader to bring the law of Moses that had been given by the God of Israel[a][b].
  footnotes:
  - marker: a
    text: Or 'reader' may be understood more specifically as 'public reader'; some might also render it 'scribe,' but the Greek term here more directly denotes one who reads aloud.
    reason: lexical_alternative
  - marker: b
    text: Or 'that had been handed down by the God of Israel.' The Greek participle can emphasize transmission as well as giving.
    reason: lexical_alternative
