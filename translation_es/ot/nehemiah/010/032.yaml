revisions:
- from: En cuanto a los pueblos de la tierra que traen mercancías y todo grano en el día de sábado para vender[a], no compraremos de ellos en sábado ni en día santo; y dejaremos pasar el séptimo año y toda deuda.
  to: En cuanto a los pueblos de la tierra que traen mercancías y todo grano en día de sábado para vender, no les compraremos en sábado ni en día santo; y dejaremos el séptimo año y toda deuda[a].
  rationale: 'Se hace una corrección mínima pero necesaria: se reubica la nota al sintagma final que realmente comenta; se reemplaza «no compraremos de ellos» por el español idiomático «no les compraremos»; y se suaviza «en el día de sábado» a «en día de sábado». Además, «dejaremos el séptimo año» refleja mejor la tersura del hebreo que «dejaremos pasar», sin imponer una interpretación más específica que la del POB inglés.'
  reviewer_model: gpt-5.4
