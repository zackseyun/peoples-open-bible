base_translation:
  language: en
  yaml_path: translation/ot/genesis/004/023.yaml
  text: 'And Lamech said to his wives[a], “Adah and Zillah, hear my voice; wives of Lamech, listen to my word: for I have killed a man for wounding me[b], even a young man for striking me.”'
  footnotes:
  - marker: a
    text: Or, 'I killed a man for my wound, a young man for my bruise.' The Hebrew may be read more literally with the nouns 'wound' and 'bruise' rather than the verbal expressions 'wounding me' and 'striking me.'
    reason: lexical_alternative
  - marker: b
    text: Some understand Lamech's words as a threat or general boast ('I would kill a man...') rather than a report of an actual killing.
    reason: alternative_reading
