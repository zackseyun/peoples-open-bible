  text: The reeds along the Nile[a], along the bank of the Nile, and every sown field of the Nile will dry up, be driven away[c][b], and be no more.
  footnotes:
  - marker: a
    text: Or 'The bare places/meadows along the Nile.' The Hebrew word עָרוֹת is uncertain in this context; the translation 'reeds' reflects the riverbank vegetation sense suggested by the surrounding phrases.
    reason: lexical_alternative
  - marker: b
    text: Hebrew יְאֹר can mean 'river' or 'canal,' but in this Egypt context it refers to the Nile.
    reason: cultural_note
  - marker: c
    text: Or 'all that is sown by the Nile.'
    reason: lexical_alternative
