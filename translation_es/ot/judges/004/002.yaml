review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y conserva la agencia directa de Yahvé, el modismo fuerte de וַיִּמְכְּרֵם y el topónimo final. Sin embargo, hay dos detalles de fidelidad formal y de auditoría: el marcador [b] está anclado en «Sísara» pero la nota trata sobre «Haróset-hagoyim», así que el anclaje no corresponde al lugar relevante del texto; y «en manos de» suena menos natural aquí que «en mano de», que además refleja mejor el singular hebreo בְּיַד dentro del modismo bíblico español.'
  spanish_quality_summary: El español es claro y digno. No obstante, la secuencia «y Sísara, comandante de su ejército, vivía...» reorganiza bien el sentido, pero puede sonar algo suelta frente a la estructura hebrea «y el comandante de su ejército era Sísara». También conviene mover la nota [b] al topónimo. La forma «Haróset-hagoyim» es aceptable en español dado el planteamiento del proyecto.
  glossary_alignment: 'Correcto en lo principal: יְהוָה → «Yahvé», no «SEÑOR»; מָכַר → «vendió» preservado; שַׂר צְבָאוֹ → «comandante de su ejército» conforme al POB; topónimo transliterado mantenido. No hay conflicto terminológico mayor.'
  issues:
  - severity: medium
    issue: El marcador de nota [b] está colocado en «Sísara», pero la nota explica «Haróset-hagoyim».
    rationale: Las instrucciones exigen que cada marcador aparezca en la palabra o frase pertinente. La nota cultural corresponde al topónimo final, no al nombre personal.
  - severity: low
    issue: «Los vendió en manos de» es comprensible, pero «los vendió en mano de» suena más idiomático en registro bíblico y se acerca más al singular hebreo בְּיַד.
    rationale: El hebreo usa singular «en la mano de» como modismo de poder. En español bíblico, «en mano de» preserva mejor la locución fija sin perder naturalidad.
  - severity: low
    issue: La estructura de la segunda cola puede alinearse mejor con el hebreo.
    rationale: «Y el comandante de su ejército era Sísara, que vivía...» refleja más de cerca וְשַׂר צְבָאוֹ סִיסְרָא וְהוּא יוֹשֵׁב, aunque el borrador actual no distorsiona el sentido.
  revised_spanish_text: Así Yahvé[a] los vendió en mano de Jabín, rey de Canaán, que reinaba en Hazor; y el comandante de su ejército era Sísara, que vivía en Haróset-hagoyim[b].
  revised_footnotes:
