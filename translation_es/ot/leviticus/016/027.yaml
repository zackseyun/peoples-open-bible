base_translation:
  language: en
  yaml_path: translation/ot/leviticus/016/027.yaml
  text: And the bull for the sin offering and the goat for the sin offering[a], whose blood was brought in to make atonement in the sanctuary, he shall bring out outside the camp, and they shall burn their hides, their flesh[d][c][b], and their dung in the fire.
  footnotes:
  - marker: a
    text: Or more idiomatically, 'he shall bring them outside the camp.' The Hebrew more literally has 'he shall bring out to outside the camp.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their skins' for 'their hides.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew shifts from singular ('he shall bring out') to plural ('they shall burn'), likely distinguishing the officiant from those assisting.
    reason: cultural_note
  - marker: d
    text: Or 'and they shall burn in the fire their hides, their flesh, and their dung.'.
    reason: previous_rendering
