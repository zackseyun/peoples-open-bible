translation:
  language: es
  text: Porque infringir la ley en lo pequeño y en lo grande es lo mismo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «transgredir en cosas pequeñas y en cosas grandes es equivalente»
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: LSJ
  rationale: La partícula introduce explicación o fundamento del dicho anterior. «Porque» transmite con naturalidad esa función causal-explicativa en español, sin añadir matices no presentes en el griego.
- source_word: παρανομεῖν
  english_pob_choice: to break the law
  chosen_spanish: infringir la ley
  alternatives_spanish:
  - quebrantar la ley
  - transgredir
  - violar la ley
  lexicon: LSJ
  rationale: El verbo denota actuar contra la ley. «Infringir la ley» conserva el sentido jurídico y es natural en español moderno; «transgredir» sería más técnico y menos directo, y «violar» puede sonar más fuerte o trasladar connotaciones distintas.
- source_word: ἐν μικροῖς καὶ ἐν μεγάλοις
  english_pob_choice: in small matters and in great matters
  chosen_spanish: en cosas pequeñas y en cosas grandes
  alternatives_spanish:
  - en asuntos pequeños y en asuntos grandes
  - en cosas menores y en cosas mayores
  - en lo pequeño y en lo grande
  lexicon: LSJ
  rationale: Los plurales neutros funcionan sustantivamente y oponen ámbitos menores y mayores. «Cosas pequeñas» / «cosas grandes» conserva la concisión y la antítesis del griego sin volverlo artificioso en español.
- source_word: ἰσοδύναμόν ἐστιν
  english_pob_choice: is equivalent
  chosen_spanish: es equivalente
  alternatives_spanish:
  - es lo mismo
  - tiene el mismo valor
  - es igual
  lexicon: LSJ
  rationale: El adjetivo expresa igualdad de fuerza o valor. «Es equivalente» reproduce bien la afirmación de equivalencia moral o de clase, sin precisar más de lo que el texto dice.
theological_decisions:
- issue: Equivalencia moral entre infracciones pequeñas y grandes
  english_pob_reading: The verse states that violating the law in minor matters and major matters is equivalent in kind.
  chosen_spanish_reading: El versículo afirma que infringir la ley en asuntos pequeños y en asuntos grandes es equivalente en tipo o clase.
  alternative_spanish_readings:
  - El versículo solo dice que cualquier infracción cuenta como quebrantar la ley, sin afirmar igualdad de gravedad en todo sentido.
  - El versículo enseña que las faltas pequeñas y grandes tienen exactamente las mismas consecuencias.
  rationale: La construcción griega ἰσοδύναμόν ἐστιν hace una afirmación fuerte de equivalencia. La traducción debe conservar esa fuerza sin importar una teoría completa sobre consecuencias o castigos que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica; no resolver el alcance exacto de la equivalencia más allá del texto.
translation_notes:
  revision_awareness: La revisión inglesa añadió «matters» tras «great» para equilibrar la antítesis. La versión española ya expresa ese equilibrio con «cosas pequeñas y en cosas grandes», manteniendo la paridad semántica del griego y la fluidez natural del español.
  spanish_consistency_notes:
  - Se mantiene «ley» para παρανομεῖν, en coherencia con el valor jurídico del verbo.
  - Se usa «cosas pequeñas / cosas grandes» para preservar la oposición neutra plural del griego.
  - «Equivalente» conserva la afirmación de igualdad de clase sin sobreinterpretar el alcance punitivo.
