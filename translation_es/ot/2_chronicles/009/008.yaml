review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y conserva bien los puntos teológicos clave: «Yahvé», «su trono» referido a Yahvé, y la causalidad de «porque tu Dios amó a Israel». Sin embargo, hay pequeños problemas de fidelidad/claridad en español: «te puso sobre su trono» suena menos natural que «te puso en su trono» para entronización; «hacer justicia y rectitud» no refleja tan bien la función regia de לַעֲשׂוֹת מִשְׁפָּט וּצְדָקָה como «administrar justicia y rectitud» o «ejercer justicia y rectitud»; y la nota a está formulada de manera poco idiomática.'
  spanish_quality_summary: 'El texto es legible, pero contiene giros algo rígidos o poco naturales para español bíblico actual: «se agradó de ti» es aceptable pero algo tieso; la nota «Que el Dios de ti, Yahvé, sea bendecido» es claramente antinatural; «sobre su trono» y «hacer justicia y rectitud» pueden mejorarse para sonar más idiomáticos sin perder literalidad.'
  glossary_alignment: Cumple bien con el glosario del proyecto al usar «Yahvé» y «Dios». No hay conflicto con términos doctrinales mayores. «Rectitud» para צְדָקָה es defendible en este contexto real, aunque la construcción verbal conviene ajustarla para preservar mejor el sentido de administración regia.
  issues:
  - severity: medium
    issue: 'La nota [a] está redactada de forma antinatural: «Que el Dios de ti, Yahvé, sea bendecido».'
    rationale: Aunque intenta reflejar el orden hebreo, no es español legible ni una alternativa útil para el lector. Debe darse una alternativa idiomática como «Que Yahvé tu Dios sea bendito».
  - severity: medium
    issue: «Te puso sobre su trono» suena menos natural en español para una entronización.
    rationale: El hebreo preserva la imagen teológica del trono de Yahvé, pero en español «poner en su trono» comunica mejor la instalación regia sin perder el sentido.
  - severity: medium
    issue: «Para hacer justicia y rectitud» es demasiado literal y no expresa bien la función regia.
    rationale: La fórmula מִשְׁפָּט וּצְדָקָה en contexto de reinado apunta al ejercicio/administración de justicia. «Administrar justicia y rectitud» preserva mejor el sentido que «hacer».
  revised_spanish_text: Bendito sea Yahvé tu Dios[a], que se agradó de ti y te puso en su trono como rey para Yahvé tu Dios. Porque tu Dios amó a Israel para establecerlo[b] para siempre, te hizo rey sobre ellos para administrar justicia y rectitud.
  revised_footnotes:
  - marker: a
    text: 'O: «Que Yahvé tu Dios sea bendito».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para establecerlo para siempre», con referencia colectiva a Israel como pueblo.'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace reparaciones pequeñas pero importantes: mejora la naturalidad de la alternativa benedictoria en la nota [a], usa «en su trono» como español más idiomático para entronización sin perder la teología de «su trono», y cambia «hacer justicia y rectitud» por «administrar justicia y rectitud» para reflejar mejor la función real del hebreo. Se conserva el singular «establecerlo» por la decisión auditada de mantener la referencia colectiva de Israel en singular.'
