revisions:
- from: 'Y no emparentarás con ellos[a]: no darás tu hija a su hijo, ni tomarás su hija para tu hijo.'
  to: 'Y no te unirás en matrimonio con ellos[a]: no darás tu hija a su hijo, ni tomarás su hija para tu hijo.'
  rationale: Se ajusta la primera cláusula para expresar con mayor precisión el valor matrimonial y recíproco de תִתְחַתֵּן, manteniendo un español natural y digno. Se conserva la nota alternativa ya que refleja la opción formal documentada por el POB inglés.
