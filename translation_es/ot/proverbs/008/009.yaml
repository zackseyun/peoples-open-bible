  rationale: Se ajusta el primer adjetivo a «claros» para reflejar mejor נְכֹחִים en contexto de palabras/discurso sapiencial, mientras se conserva «rectos» para וִישָׁרִים. Así se preserva la distinción léxica del hebreo y del POB inglés sin sacrificar naturalidad en español.
