translation:
  language: es
  text: Uzías edificó torres en Jerusalén, en la Puerta de la Esquina, en la Puerta del Valle y en el Ángulo[a]; y las fortificó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la esquina»; el término hebreo puede denotar un ángulo, esquina o punto de giro de la fortificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El hebreo בנה aquí refiere a levantar obras arquitectónicas. «Edificó» es natural en español bíblico y conserva un registro digno, equivalente a «built» sin sonar demasiado coloquial.
- source_word: עֻזִּיָּהוּ
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Uzzías
  lexicon: Nombre propio bíblico
  rationale: Se adopta la forma española tradicional y ampliamente reconocible del nombre propio, manteniendo la identificación directa del personaje.
- source_word: מִגְדָּלִים
  english_pob_choice: towers
  chosen_spanish: torres
  alternatives_spanish:
  - torres fortificadas
  - baluartes
  lexicon: HALOT
  rationale: מִגְדָּלִים son «torres»; no conviene añadir «fortificadas» al sustantivo porque el texto reserva la acción defensiva para el verbo final. «Torres» reproduce con precisión el sustantivo.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: Uso locativo estándar
  rationale: La preposición ב con el nombre de la ciudad se vierte de modo directo como «en Jerusalén».
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: junto a
  alternatives_spanish:
  - en
  - junto con
  lexicon: HALOT
  rationale: En contextos de puertas y fortificaciones, עַל indica ubicación adyacente o asociada. «Junto a» evita la idea de estar literalmente encima de la puerta y conserva la relación espacial natural en español.
- source_word: שַׁעַר הַפִּנָּה
  english_pob_choice: the Corner Gate
  chosen_spanish: la Puerta de la Esquina
  alternatives_spanish:
  - la Puerta del Ángulo
  - la Puerta del Rincón
  lexicon: HALOT
  rationale: Se conserva el valor topográfico del constructo. «Esquina» refleja de manera clara el sentido de corner/giro estructural y mantiene el nombre del acceso sin sobreinterpretarlo.
- source_word: שַׁעַר הַגַּיְא
  english_pob_choice: the Valley Gate
  chosen_spanish: la Puerta del Valle
  alternatives_spanish:
  - la Puerta de la Garganta
  - la Puerta del Torrente
  lexicon: HALOT
  rationale: גַּיְא significa «valle»; como nombre de puerta, «la Puerta del Valle» es la equivalencia directa y clara en español.
- source_word: הַמִּקְצֹעַ
  english_pob_choice: the Angle
  chosen_spanish: el Ángulo
  alternatives_spanish:
  - la esquina
  - el rincón
  - el ángulo de la muralla
  lexicon: HALOT
  rationale: El término puede denotar ángulo, esquina o punto de giro de una fortificación. «El Ángulo» preserva el matiz técnico/topográfico que el POB inglés quiso mantener con «the Angle», sin confundirlo con el nombre anterior de la puerta.
- source_word: וַיְחַזְּקֵם
  english_pob_choice: and he fortified them
  chosen_spanish: y las fortificó
  alternatives_spanish:
  - y las укрепó
  - y las hizo fuertes
  - y las fortaleció
  lexicon: HALOT
  rationale: 'חזק en pi‘el tiene aquí sentido defensivo/constructivo: reforzar o fortificar. En español, «fortificó» conserva bien el matiz militar y arquitectónico aplicado a las torres.'
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido y las decisiones léxicas del registro inglés auditado, sin cambios relevantes respecto de la última revisión marcada como sin modificaciones.
  spanish_consistency_notes:
  - Se mantiene «Uzías» como forma española del nombre propio.
  - Se usa «Puerta» con mayúscula por tratarse de nombres de puertas urbanas.
  - 'Se conserva la distinción entre las dos referencias espaciales: «la Esquina» como nombre de puerta y «el Ángulo» como otro punto de la fortificación.'
  - Se evita convertir el verbo final en una simple idea de ‘hacer fuertes’ para conservar el matiz militar de fortificación.
