translation:
  language: es
  text: 'Y Samuel dijo: «¿Por qué entonces me consultas, si Yahvé se ha apartado de ti y ha llegado a ser tu adversario?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «Y ... dijo» conserva la secuencia de la historia con naturalidad y sin añadir interpretación.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: Nombre propio
  rationale: Nombre propio estándar, sin transliteración especial adicional en español.
- source_word: וְלָמָּה
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué entonces
  alternatives_spanish:
  - ¿Y por qué
  - ¿Por qué
  lexicon: HALOT
  rationale: La partícula conjuntiva más el interrogativo expresan una respuesta encendida y conectada con lo anterior; «¿Por qué entonces» preserva ese matiz retórico.
- source_word: תִּשְׁאָלֵנִי
  english_pob_choice: do you ask me
  chosen_spanish: me consultas
  alternatives_spanish:
  - me preguntas
  - inquieres de mí
  lexicon: HALOT
  rationale: «Consultar» refleja bien el valor de שאל en este contexto de búsqueda de orientación, y evita sonar demasiado genérico frente a la fuerza del verbo en la escena.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino sin máscara titulativa. En español, la forma de proyecto «Yahvé» preserva el nombre revelado y la decisión doctrinal del POB.
- source_word: סָר מֵעָלֶיךָ
  english_pob_choice: has turned away from you
  chosen_spanish: se ha apartado de ti
  alternatives_spanish:
  - se ha retirado de ti
  - ha dado la espalda a ti
  lexicon: HALOT
  rationale: «Apartarse de» reproduce bien la idea relacional de סור con מעל, con una expresión natural y sobria en español.
- source_word: וַיְהִי עָרֶךָ
  english_pob_choice: has become your adversary
  chosen_spanish: ha llegado a ser tu adversario
  alternatives_spanish:
  - se ha vuelto tu adversario
  - ha sido tu adversario
  - se ha hecho tu enemigo
  lexicon: HALOT
  rationale: Se conserva la decisión revisada de «adversary» y se opta por «ha llegado a ser» para expresar el cambio de estado sin forzar una lectura más dura que la permitida por el hebreo. «Adversario» mantiene la tensión léxica documentada.
theological_decisions:
- issue: Traducción del nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del POB evita la sustitución por un título. «Yahvé» traslada al español la decisión de recuperar el nombre propio divino, preservando el valor de pacto y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de עָר en la cláusula final
  english_pob_reading: has become your adversary
  chosen_spanish_reading: ha llegado a ser tu adversario
  alternative_spanish_readings:
  - ha llegado a ser tu enemigo
  - está contra ti
  rationale: El hebreo conserva una oposición fuerte; «adversario» refleja mejor la precisión formal del término que un genérico «enemigo», y mantiene la severidad del juicio sin exagerar más allá del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrigió la última cláusula de «enemy» a «adversary». La traducción española adopta esa lectura revisada como base y la expresa con un equivalente formal en español, sin suavizar la oposición divina implícita en el hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con el estándar del proyecto para יהוה.
  - Se prefirió «adversario» en la última cláusula para reflejar la decisión revisada del inglés POB.
  - No se añadieron notas al pie porque no fue necesario preservar una alternativa textual o léxica adicional en español que no quedara ya reflejada en las decisiones lexicales.
