translation:
  language: es
  text: Y multó al pueblo con cien talentos de plata y un talento de oro.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le impuso una pena económica al pueblo». El verbo griego puede indicar causar pérdida o exigir una multa; aquí el contexto señala un pago punitivo en plata y oro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζημίωσεν
  english_pob_choice: fined
  chosen_spanish: lo multó
  alternatives_spanish:
  - le impuso una multa
  - lo penalizó
  - le exigió una pena pecuniaria
  lexicon: LSJ
  rationale: El verbo expresa causar pérdida o imponer una pena económica. En español, «multó» conserva de forma natural el sentido punitivo y pecuniario, sin diluirlo en una mera tributación.
- source_word: τὸ ἔθνος
  english_pob_choice: the nation
  chosen_spanish: lo
  alternatives_spanish:
  - a la nación
  - al pueblo
  - a la gente
  lexicon: LSJ
  rationale: El objeto directo queda resumido en el pronombre «lo» para evitar una repetición pesada en español, dado que el acto de multar ya implica al sujeto colectivo mencionado en el contexto inmediato. La referencia corporativa sigue siendo la del grupo sometido.
- source_word: ἀργυρίου
  english_pob_choice: of silver
  chosen_spanish: de plata
  alternatives_spanish:
  - en plata
  lexicon: LSJ
  rationale: El genitivo material se vierte naturalmente como «de plata», que en español comunica el metal del monto cuantificado.
- source_word: τάλαντοις ἑκατόν
  english_pob_choice: one hundred talents
  chosen_spanish: cien talentos
  alternatives_spanish:
  - ciento de talentos
  lexicon: LSJ
  rationale: La expresión de cantidad se traduce de forma directa y idiomática. «Cien talentos» mantiene la unidad monetaria/peso antigua sin añadir explicación innecesaria.
- source_word: χρυσίου ταλάντῳ ἑνί
  english_pob_choice: and one talent of gold
  chosen_spanish: y un talento de oro
  alternatives_spanish:
  - y un solo talento de oro
  - y un talento áureo
  lexicon: LSJ
  rationale: Se conserva la yuxtaposición del segundo monto como otra parte de la pena, con «de oro» para reflejar el genitivo de material y mantener la comparación con la plata.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español y que no haya notas sin ancla. Se mantuvo la base griega como fuente primaria y la equivalencia óptima del audit trail inglés.
  spanish_consistency_notes:
  - Se preservó el valor punitivo del verbo griego sin convertirlo en un sentido tributario neutro.
  - «Talentos» se mantiene como unidad antigua de peso/valor, coherente con el registro bíblico.
  - 'El orden de los montos sigue el griego: plata primero, luego oro.'
