  text: וָאֶזְכְּרָה אֶת רַחֲמֵי יְהֹוָה, וַחֲסָדָיו אֲשֶׁר מֵעוֹלָם.<br><small>(ח)</small> הַמַּצִּיל אֶת חוֹסֵי בוֹ, וַיִּגְאָלֵם מִכָּל רָע.
