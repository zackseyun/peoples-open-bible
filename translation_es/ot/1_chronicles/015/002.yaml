translation:
  language: es
  text: 'Entonces David dijo[a]: «Nadie debe llevar el arca de Dios sino los levitas, porque Yahvé los ha escogido para llevar el arca de Yahvé y para ministrarle[b] para siempre.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El arca de Dios no debe ser llevada por nadie sino por los levitas». El hebreo es elíptico y omite el sujeto implícito.'
    reason: lexical_alternative
  - marker: b
    text: «Ministrarle» puede traducirse también «servirle». El verbo hebreo suele referirse al servicio sagrado o litúrgico.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca temporal de avance narrativo; «Entonces» conserva la secuencia sin sonar forzado en español.
- source_word: אָמַר דָּוִיד
  english_pob_choice: David said
  chosen_spanish: David dijo
  alternatives_spanish:
  - David declaró
  lexicon: HALOT
  rationale: Fórmula narrativa normal y directa; «dijo» es la equivalencia no marcada y fiel al reporte histórico.
- source_word: לֹא לָשֵׂאת אֶת אֲרוֹן הָאֱלֹהִים כִּי אִם הַלְוִיִּם
  english_pob_choice: No one is to carry the ark of God except the Levites
  chosen_spanish: Nadie debe llevar el arca de Dios sino los levitas
  alternatives_spanish:
  - El arca de Dios no debe ser llevada por nadie excepto los levitas
  - Solo los levitas deben llevar el arca de Dios
  lexicon: HALOT
  rationale: El hebreo es elíptico; en español se requiere suplir el sujeto implícito. «Nadie debe llevar» conserva el valor prohibitivo sin alejarse del texto.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca divina
  lexicon: HALOT
  rationale: «Arca» es el término bíblico preciso para el objeto cultual; «de Dios» preserva la relación posesiva del constructo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - la tribu de Leví
  - los hijos de Leví
  lexicon: HALOT
  rationale: Nombre de grupo étnico-tribal establecido en español bíblico; es claro y exacto.
- source_word: כִּי בָם בָּחַר יְהוָה
  english_pob_choice: for Yahweh has chosen them
  chosen_spanish: porque Yahvé ha escogido a ellos
  alternatives_spanish:
  - porque Yahvé los ha escogido
  - pues Yahvé eligió a ellos
  lexicon: HALOT
  rationale: Se mantiene el referente plural y el sentido de elección duradera. Se deja «a ellos» para reflejar el énfasis del hebreo בָּם, aunque en español suene menos idiomático; se preserva así la forma subyacente sin borrar la tensión estilística.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, evitando la sustitución por título.
- source_word: לָשֵׂאת
  english_pob_choice: to carry
  chosen_spanish: llevar
  alternatives_spanish:
  - cargar
  - portar
  lexicon: HALOT
  rationale: En contexto levítico/cultual, «llevar» es natural y comunica el acto físico de transportar el arca con dignidad.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca del Yahvé
  - el arca del Señor
  lexicon: HALOT
  rationale: Mantiene la construcción genitiva transparente y la terminología uniforme con el nombre divino del proyecto.
- source_word: וּלְשָׁרְתוֹ
  english_pob_choice: and to minister to him
  chosen_spanish: y para ministrarle
  alternatives_spanish:
  - y para servirle
  - y para hacer su servicio
  lexicon: HALOT
  rationale: «Ministrar» preserva la resonancia cultual del verbo שׁרת. El sufijo se entiende referido a Yahvé, como en el audit trail inglés, y el dativo enclítico «-le» lo expresa de forma natural.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Expresa duración indefinida y solemne en español bíblico contemporáneo.
theological_decisions:
- issue: Referencia del sufijo pronominal en וּלְשָׁרְתוֹ
  english_pob_reading: The Levites are appointed to minister to him, with the pronoun referring to the LORD.
  chosen_spanish_reading: Los levitas son nombrados para ministrarle a Yahvé.
  alternative_spanish_readings:
  - para ministrar al arca
  - para servir ante ella
  rationale: Se sigue la lectura personal del pronombre, coherente con el antecedente teológicamente prominente Yahvé y con el servicio levítico entendido como servicio sagrado a Dios, no mera atención a un objeto.
  doctrine_reference: Servicio levítico / culto a Yahvé
- issue: Elipsis del sujeto en la prohibición inicial
  english_pob_reading: The Hebrew is elliptical and leaves the implied subject unstated.
  chosen_spanish_reading: Se suplanta con «Nadie debe llevar» para hacer explícita la prohibición.
  alternative_spanish_readings:
  - El arca de Dios no debe ser llevada por nadie
  - No es para llevar el arca de Dios sino los levitas
  rationale: El español requiere sujeto explícito en esta construcción. La suplencia no cambia el sentido y mantiene la fuerza normativa del hebreo.
  doctrine_reference: Sintaxis hebrea elíptica
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión y mostró alto acuerdo en la verificación cruzada; esta propuesta sigue esa lectura sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton conforme al estándar del proyecto.
  - Se conserva «Levitas» como nombre tribal técnico.
  - «Ministrarle» mantiene la categoría cultual del verbo frente a un «servirle» más general.
  - La elección «a ellos» en la decisión léxica refleja el plural explícito del hebreo, aunque el español final lo integra con una formulación más fluida.
