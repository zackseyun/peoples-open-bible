  text: צפו עִוְרִ֤ים כֻּלָּ/ם֙ לֹ֣א יָדָ֔עוּ כֻּלָּ/ם֙ כְּלָבִ֣ים אִלְּמִ֔ים לֹ֥א יוּכְל֖וּ לִ/נְבֹּ֑חַ הֹזִים֙ שֹֽׁכְבִ֔ים אֹהֲבֵ֖י לָ/נֽוּם׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/056/010.yaml
  text: His watchmen are blind[a], all of them; they know nothing. All of them are mute dogs, unable to bark, dreamers, lying down, loving to slumber.
  footnotes:
  - marker: a
    text: Or 'muttering' for 'dreaming' (הֹזִים); the Hebrew term is rare and contextually difficult. The main text follows the sense suggested by the surrounding sleep imagery.
    reason: lexical_alternative
