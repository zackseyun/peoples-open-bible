    reason: lexical_alternative
  - marker: c
    text: O «los engordados» o «los ricos» para «los bien alimentados».
    reason: lexical_alternative
  - marker: d
    text: O «forasteros» o «extranjeros residentes» para «residentes temporales».
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente para reflejar mejor גרים como «residentes temporales», en línea con la revisión inglesa a 'sojourners', eliminar el anglicismo de la nota, mejorar la naturalidad de מֵחִים con «los bien alimentados», y reubicar los marcadores de nota junto a las palabras correspondientes.
