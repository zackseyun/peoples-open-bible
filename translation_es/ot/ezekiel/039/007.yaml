base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/039/007.yaml
  text: And I will make my holy name known in the midst of my people Israel[a], and I will no longer let my holy name be profaned; and the nations will know that I am Yahweh[b], the Holy One in Israel.
  footnotes:
