translation:
  language: es
  text: el que mantiene[a] nuestra vida[b] entre los vivientes[c], y no ha permitido que resbalen nuestros pies[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que pone» o «el que coloca»; el participio hebreo de שׂוּם también puede tener ese sentido, aunque aquí expresa la acción de preservar.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo נֶפֶשׁ puede significar «alma», «vida» o «nosotros mismos»; aquí el contexto permite traducir «vida».
    reason: lexical_alternative
  - marker: c
    text: 'O: «en vida».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «que vacilen» o «que tambaleen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂם
  english_pob_choice: the one who keeps
  chosen_spanish: el que mantiene
  alternatives_spanish:
  - el que pone
  - el que coloca
  - el que conserva
  lexicon: HALOT
  rationale: El participio sustantivado de שׂוּם puede expresar 'poner/colocar', pero en este contexto el efecto idiomático es preservador. 'Mantiene' comunica bien en español la función continua del sujeto sin borrar el matiz de 'colocar' que queda reflejado en la nota.
- source_word: נַפְשֵׁנוּ
  english_pob_choice: our soul
  chosen_spanish: nuestra vida
  alternatives_spanish:
  - nuestra alma
  - nosotros mismos
  - nuestra vida interior
  lexicon: HALOT
  rationale: 'נֶפֶשׁ tiene un campo amplio: alma, vida, ser, persona. Como el paralelismo inmediato habla de estar ''en vida'', ''nuestra vida'' preserva mejor el sentido global del hebreo en español y evita una lectura demasiado espiritualizada de ''alma''.'
- source_word: בַּחַיִּים
  english_pob_choice: in life
  chosen_spanish: en vida
  alternatives_spanish:
  - entre los vivientes
  - entre los vivos
  - en el ámbito de los vivos
  lexicon: HALOT
  rationale: La construcción hebrea apunta al ámbito de la vida o de los vivientes. 'En vida' es una forma natural en español que conserva la idea de preservación en la esfera de la vida sin cargar el verso con una perífrasis más larga.
- source_word: וְלֹא נָתַן
  english_pob_choice: and has not allowed
  chosen_spanish: y no ha permitido
  alternatives_spanish:
  - y no ha dado
  - y no ha dejado
  - y no ha consentido
  lexicon: HALOT
  rationale: נָתַן con לַמּוֹט funciona idiomáticamente como 'permitir/consentir que ocurra'. 'Ha permitido' reproduce esa fuerza causal mejor que una traducción literal como 'dio'.
- source_word: לַמּוֹט
  english_pob_choice: to slip
  chosen_spanish: que resbalen
  alternatives_spanish:
  - que tambaleen
  - que vacilen
  - que se muevan
  lexicon: HALOT
  rationale: La imagen de מוֹט expresa inestabilidad y deslizamiento. En español, con 'pies', 'resbalar' resulta natural y visual; 'tambalear' o 'vacilar' son posibles, pero cambian un poco el cuadro concreto.
- source_word: רַגְלֵנוּ
  english_pob_choice: our feet
  chosen_spanish: nuestros pies
  alternatives_spanish:
  - nuestros pasos
  - nuestras pisadas
  lexicon: HALOT
  rationale: El término es literalmente 'pies'. Mantener la imagen corporal preserva el paralelismo y la metáfora de estabilidad. 'Pasos' sería una interpretación válida, pero menos concreta.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un verso de preservación de la vida
  english_pob_reading: '''our soul'' may also be rendered ''our life'' or ''us''; Hebrew נֶפֶשׁ has a broad range including soul, life, and self.'
  chosen_spanish_reading: '''nuestra vida'''
  alternative_spanish_readings:
  - '''nuestra alma'''
  - '''nosotros'''
  rationale: En este verso, el paralelo con 'en vida' hace que la referencia principal sea la vida preservada por Dios. 'Nuestra vida' evita imponer una antropología más técnica donde el texto funciona de manera más amplia y poética.
  doctrine_reference: Antropología bíblica; uso amplio de נֶפֶשׁ en el AT
translation_notes:
  revision_awareness: La POB inglesa revisó recientemente 'among the living' a 'in life' para acercarse más al sentido hebreo de colocar o mantener la vida en la esfera de la vida. La redacción española adopta esa revisión con 'en vida', mientras conserva la tensión lexical de שׂוּם mediante la nota sobre 'poner/colocar'.
  spanish_consistency_notes:
  - Se mantuvo el tono formal y bíblico, pero con sintaxis natural en español.
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino explícito.
  - Se preservó la imagen concreta de los pies para no diluir el paralelismo poético.
  - '''Vida'' se usó para נֶפֶשׁ en este contexto específico, sin negar otros posibles sentidos en el léxico bíblico.'
