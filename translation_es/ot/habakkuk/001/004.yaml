  text: עַל כֵּן֙ תָּפ֣וּג תּוֹרָ֔ה וְ/לֹֽא יֵצֵ֥א לָ/נֶ֖צַח מִשְׁפָּ֑ט כִּ֤י רָשָׁע֙ מַכְתִּ֣יר אֶת הַ/צַּדִּ֔יק עַל כֵּ֛ן יֵצֵ֥א מִשְׁפָּ֖ט מְעֻקָּֽל־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/001/004.yaml
  text: Therefore the law grows numb[a], and justice never goes forth. For the wicked surrounds the righteous[d][c][b]; therefore justice goes forth perverted.
  footnotes:
  - marker: a
    text: Or 'grows slack,' 'becomes feeble,' or 'is paralyzed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice never comes forth forever'; the Hebrew expression is idiomatic for justice not emerging at all.
    reason: lexical_alternative
  - marker: c
    text: Or 'encircles' or 'hems in.' The verb can also mean 'crowns' in other contexts, but here it likely describes the wicked enclosing the righteous.
    reason: lexical_alternative
  - marker: d
    text: Or 'perverted' or 'crooked.'
    reason: lexical_alternative
