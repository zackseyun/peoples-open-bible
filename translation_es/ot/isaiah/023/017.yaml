translation:
  language: es
  text: Y sucederá que al cabo de setenta años Yahvé se ocupará de Tiro[a][b], y ella volverá a su salario y se prostituirá con todos los reinos de la tierra sobre la faz de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé visitará a Tiro»; el verbo hebreo también puede implicar intervención punitiva o restauradora según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Su salario» alude a la paga de una prostituta, continuando la metáfora del oráculo que presenta a Tiro como prostituta entre las naciones.
    reason: cultural_note
  - marker: c
    text: 'El hebreo usa dos términos emparentados pero distintos en este verso: «tierra/país» y «suelo». Aquí se ha preferido repetir «tierra» para conservar un español más natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y ocurrirá
  - Y acontecerá
  lexicon: HALOT
  rationale: Como marcador profético, וְהָיָה introduce un giro futuro de manera formularia. «Sucederá» conserva ese valor sin sonar forzado en español.
- source_word: מִקֵּץ שִׁבְעִים שָׁנָה
  english_pob_choice: at the end of seventy years
  chosen_spanish: al cabo de setenta años
  alternatives_spanish:
  - al final de setenta años
  - después de setenta años
  lexicon: HALOT
  rationale: מִקֵּץ expresa más exactamente el cumplimiento del plazo que un simple «después de». «Al cabo de» comunica el cierre del período con naturalidad.
- source_word: יִפְקֹד
  english_pob_choice: will attend to
  chosen_spanish: atenderá
  alternatives_spanish:
  - visitará
  - tomará en cuenta
  - intervendrá en
  lexicon: HALOT
  rationale: 'El verbo פקד tiene un campo semántico amplio: visitar, intervenir, atender, castigar o restaurar según el contexto. «Atenderá» mantiene la intervención divina sin resolver de antemano si el matiz es punitivo o restaurador.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino conforme al criterio del proyecto, evitando la sustitución por un título.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  lexicon: HALOT
  rationale: Nombre propio geográfico tradicional en español; «Tiro» es la forma estable y clara para la ciudad fenicia.
- source_word: וְשָׁבָה
  english_pob_choice: and she will return
  chosen_spanish: y ella volverá
  alternatives_spanish:
  - y volverá
  - y regresará
  lexicon: HALOT
  rationale: El verbo está en femenino singular y retoma la personificación de Tiro. «Ella» preserva esa personificación explícita.
- source_word: לְאֶתְנַנָּה
  english_pob_choice: to her wages
  chosen_spanish: a su salario
  alternatives_spanish:
  - a su paga
  - a su hire
  lexicon: HALOT
  rationale: אֶתְנַן designa la paga/hire de una prostituta. «Salario» evita una expresión arcaica y mantiene la idea comercial; el contexto siguiente deja claro el sentido metafórico-sexual.
- source_word: וְזָנְתָה
  english_pob_choice: and prostitute herself
  chosen_spanish: y se prostituirá
  alternatives_spanish:
  - y prostituirá
  - y cometerá prostitución
  lexicon: HALOT
  rationale: «Se prostituirá» reproduce directamente la fuerza del verbo זנה y mantiene la imagen figurada de Tiro como prostituta entre las naciones.
- source_word: אֶת כָּל מַמְלְכֹת הָאָרֶץ
  english_pob_choice: with all the kingdoms of the earth
  chosen_spanish: con todos los reinos de la tierra
  alternatives_spanish:
  - con todos los reinos del mundo
  - con todos los reinos de la tierra
  lexicon: HALOT
  rationale: Con זנה, el objeto marcado por אֶת introduce a las partes con las que Tiro se entrega. «Con» expresa bien la relación implícita del verbo en español; «tierra» conserva el universalismo del hebreo.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the earth / ground
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la faz del suelo
  - sobre la superficie de la tierra
  lexicon: HALOT
  rationale: La locución española tradicional «sobre la faz de la tierra» comunica de forma natural el hebraísmo y refleja el cierre universal del verso. Se prefiere «tierra» aquí en vez de distinguir de modo artificial entre אָרֶץ y אֲדָמָה, siguiendo la revisión inglesa que optó por la lectura más natural.
theological_decisions:
- issue: Alcance semántico de יִפְקֹד
  english_pob_reading: neutral divine intervention ('the LORD will attend to Tyre')
  chosen_spanish_reading: intervención divina neutral ('Yahvé atenderá a Tiro')
  alternative_spanish_readings:
  - Yahvé castigará a Tiro
  - Yahvé visitará a Tiro
  - Yahvé restaurará a Tiro
  rationale: El contexto indica una acción decisiva de Yahvé sobre Tiro después de setenta años, pero el verbo por sí solo no obliga a precisar si el matiz es punitivo o restaurador. La traducción conserva esa tensión interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del contexto inglés, que prefirió en la clausula final una expresión más natural equivalente a «on the face of the earth» en lugar de una versión demasiado literal de «ground». También conserva la lectura neutral de יִפְקֹד y la metáfora comercial-sexual de Tiro.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, en línea con el criterio del proyecto.
  - Se usa «Tiro» como topónimo fijo en español.
  - Se conserva la personificación femenina de la ciudad mediante «ella».
  - Se evita resolver el verbo פקד con una interpretación doctrinal cerrada.
  - La última cláusula se vierte con un hebraísmo natural en español («sobre la faz de la tierra») para respetar tanto el estilo como la revisión contextual.
