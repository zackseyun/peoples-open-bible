translation:
  language: es
  text: Pero ¿cómo podré recoger el dinero[a], si no conozco a ese hombre?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «la plata»; aquí se refiere a dinero confiado en depósito, por eso se traduce «el dinero».
    reason: lexical_alternative
  - marker: b
    text: 'La tradición semítica paralela amplía la idea: «¿Cómo puedo tomar el dinero de Gabael? Él no me reconocerá, y yo no lo conozco...», haciendo explícito que el problema es el desconocimiento mutuo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: La partícula adversativa introduce una objeción inmediata frente a la instrucción anterior. «Pero» comunica bien el giro discursivo en español moderno sin sonar arcaico.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: ¿cómo...?
  alternatives_spanish:
  - ¿de qué manera...?
  lexicon: BDAG
  rationale: La pregunta expresa la dificultad práctica. «¿Cómo...?» conserva la fuerza interrogativa de manera natural.
- source_word: δυνησομαι
  english_pob_choice: will I be able
  chosen_spanish: podré
  alternatives_spanish:
  - seré capaz de
  lexicon: BDAG
  rationale: El futuro de δύναμαι comunica capacidad futura. En español, «podré» mantiene esa idea con mayor fluidez que una perífrasis más larga.
- source_word: λαβεῖν
  english_pob_choice: to get
  chosen_spanish: recibir
  alternatives_spanish:
  - obtener
  - tomar
  lexicon: BDAG
  rationale: En este contexto se trata de recuperar una suma depositada. «Recibir» expresa bien la acción de cobrar o recoger el dinero sin perder el matiz de obtención; «obtener» o «tomar» serían posibles, pero menos naturales aquí.
- source_word: τὸ ἀργύριον
  english_pob_choice: the money
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  lexicon: BDAG
  rationale: El griego dice literalmente «la plata», pero en el contexto narrativo se refiere a fondos confiados en depósito. «El dinero» hace explícito ese sentido, como en la traducción inglesa auditada.
- source_word: καὶ
  english_pob_choice: since
  chosen_spanish: si
  alternatives_spanish:
  - porque
  - puesto que
  lexicon: BDAG
  rationale: Aunque la conjunción es «y», el sentido lógico en el versículo introduce la causa de la dificultad. En español, una subordinada condicional/causal breve evita una acumulación poco natural y refleja la relación explicativa del griego.
- source_word: οὐ γινώσκω
  english_pob_choice: I do not know
  chosen_spanish: no lo conozco
  alternatives_spanish:
  - no lo sé
  - no tengo trato con él
  lexicon: BDAG
  rationale: Aquí γινώσκω expresa conocimiento personal o reconocimiento de la persona. «No lo conozco» conserva esa relación interpersonal mejor que «no lo sé».
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre masculino singular se refiere al hombre involucrado en la entrega del dinero. En español, el clítico de objeto directo «lo» resulta natural y preciso.
translation_notes:
  revision_awareness: La versión inglesa POB ya optó por interpretar τὸ ἀργύριον como “the money” y añadió una nota sobre la tradición semítica paralela. Esta propuesta sigue esa línea, pero ajusta el verbo y la subordinación para que el español suene natural sin perder el sentido de incapacidad y desconocimiento personal.
  spanish_consistency_notes:
  - Se mantiene «el dinero» para ἀργύριον en sentido de fondos depositados, en continuidad con el criterio POB.
  - Se traduce γινώσκω como conocimiento personal («conozco») y no como simple información cognitiva.
  - La cláusula con «si» expresa en español la relación explicativa que el inglés auditado marcó con «since».
