  source_alignment_summary: 'El borrador refleja bien el sentido base del hebreo: males innumerables rodean al salmista, sus iniquidades lo alcanzan, no puede ver, son más que los cabellos de su cabeza y su corazón desfallece. También preserva correctamente la tensión teológica de עֲוֹנֹתַי como culpa propia y mantiene las alternativas léxicas en notas. Sin embargo, la última cláusula en el texto principal se aparta del English POB auditado, que eligió una forma idiomática equivalente a ''my heart fails me'' y relegó la literalidad a nota; el español puso la forma literal en el texto principal y la idiomática solo en alternativas implícitas, invirtiendo la decisión documentada.'
