  yaml_path: translation/deuterocanon/3_maccabees/005/027.yaml
  text: But when he had received it and was struck with astonishment at the lawless departure[a], being in every way overcome by ignorance[b], he kept asking whether what had been decreed had indeed been carried out for him with urgency.
  footnotes:
  - marker: a
    text: Or 'the lawless result' or 'the unlawful issue'; the Greek phrase uses ἔξοδος in a context where 'departure' is possible lexically but unlikely in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'what had been written down' or 'the issued order'; the Greek can refer specifically to a written decree.
    reason: lexical_alternative
