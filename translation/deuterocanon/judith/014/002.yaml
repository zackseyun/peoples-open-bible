theological_decisions:
- issue: Gendered military designation in πᾶς ἀνὴρ ἰσχύων
  chosen_reading: every strong man
  alternative_readings:
  - every able-bodied person
  - every warrior
  rationale: The Greek uses ἀνήρ, not a generic human term. Because the context is a military muster and the source is grammatically and semantically masculine, the translation preserves that gendered reference rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
