translation:
  language: es
  text: El que come mi carne y bebe mi sangre permanece en mí[a][b], y yo en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alimenta de» / «mastica»; el verbo griego es más vívido que un verbo genérico de comer.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicional: «habita en mí, y yo en él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρώγων
  english_pob_choice: The one who eats
  chosen_spanish: El que come
  alternatives_spanish:
  - El que se alimenta de
  - Quien come
  lexicon: BDAG
  rationale: El artículo con participio presente funciona como sustantivo; «El que» conserva el valor singular y caracterizado de la acción. «Come» es la opción más natural y fiel en español moderno. «Se alimenta de» refleja mejor la vividez de τρώγω, pero puede sonar más interpretativo o menos directo.
- source_word: τρώγων
  english_pob_choice: eats
  chosen_spanish: come
  alternatives_spanish:
  - mastica
  - se alimenta de
  lexicon: BDAG
  rationale: τρώγω es más gráfico que el verbo común para comer, con posible matiz de «masticar» o «devorar». En español, «come» comunica con claridad sin forzar un tecnicismo. Se deja constancia de las alternativas porque el verbo griego tiene una viveza que no debe ocultarse.
- source_word: μου τὴν σάρκα
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  - mi naturaleza humana
  lexicon: BDAG
  rationale: σάρξ se traduce aquí como «carne» para preservar el lenguaje concreto y sacrificial del texto. «Cuerpo» o «naturaleza humana» suavizarían o reinterpretarían el término sin apoyo suficiente en la forma griega de este versículo.
- source_word: καὶ πίνων μου τὸ αἷμα
  english_pob_choice: and drinks my blood
  chosen_spanish: y bebe mi sangre
  alternatives_spanish:
  - y toma mi sangre
  - y ingiere mi sangre
  lexicon: BDAG
  rationale: La coordinación del participio presente exige una traducción paralela y directa. «Bebe mi sangre» conserva el impacto literal del griego y no atenúa la imagen sacrificial.
- source_word: ἐν ἐμοὶ μένει
  english_pob_choice: remains in me
  chosen_spanish: permanece en mí
  alternatives_spanish:
  - permanece unido a mí
  - habita en mí
  - abide en me
  lexicon: BDAG
  rationale: μένω es un verbo clave en Juan con sentido de permanencia relacional. «Permanece» es natural en español y preserva la idea de permanencia sin resolverla en una fórmula doctrinal más específica.
- source_word: κἀγὼ ἐν αὐτῷ
  english_pob_choice: and I in him
  chosen_spanish: y yo en él
  alternatives_spanish:
  - y yo permanezco en él
  - y yo también en él
  lexicon: BDAG
  rationale: El griego omite el verbo repetido, y el español puede suplirlo de modo natural. «Y yo en él» conserva la elipsis y la estructura paralela del original. «Yo también» no expresa bien la reciprocidad del texto.
theological_decisions:
- issue: Lectura eucarística o metafórica de comer la carne y beber la sangre
  english_pob_reading: Retain the literal wording of the Greek without interpretive expansion.
  chosen_spanish_reading: Conservar el lenguaje literal del griego sin ampliarlo interpretativamente.
  alternative_spanish_readings:
  - Hacer explícita una lectura sacramental
  - Hacer explícita una lectura metafórica de creer
  rationale: El versículo es teológicamente discutido; el griego presenta la imagen sin resolverla. La traducción mantiene la tensión al no sustituir la concreción del texto por una explicación confesional.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Lenguaje joánico de permanencia mutua
  english_pob_reading: Translate μένει as relational permanence ('remains') rather than a mystical paraphrase.
  chosen_spanish_reading: Traducir μένει como permanencia relacional («permanece») y no como una paráfrasis mística.
  alternative_spanish_readings:
  - habita en mí
  - está unido conmigo
  rationale: El versículo expresa una reciprocidad de permanencia entre Jesús y el creyente. «Permanece» conserva el lenguaje joánico sin cerrarlo a un sistema teológico posterior ni diluirlo en paráfrasis.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §6 Readable modern English.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; no hay revisiones aplicadas ni variantes textuales relevantes para este versículo. La versión española sigue esa lectura estable, conservando la tensión semántica del griego en torno a τρώγω y μένω.
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ, en línea con el criterio terminológico del proyecto.
  - Se usa «permanece» para μένω, evitando «abide»/«abide en mí» por no ser el español más natural.
  - La elipsis final «y yo en él» reproduce la estructura breve del griego y la tradición auditada del texto inglés.
  - Las notas a y b se anclan en el segmento inicial para reflejar la alternativa léxica y la forma tradicional documentada.
