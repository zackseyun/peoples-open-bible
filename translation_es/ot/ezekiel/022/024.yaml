review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura básica del hebreo: vocativo profético, mandato de hablar a la destinataria femenina, identificación metafórica como tierra, doble predicación negativa y marco temporal de juicio. Sin embargo, hay desajustes en la documentación y una elección léxica principal mejorable: «no regada» introduce connotación de riego humano más que de lluvia/aguacero, mientras que el hebreo raro apunta a «no llovida / sin lluvia / no rociada por lluvia». Además, las notas están mal ancladas: la nota [a] no es una alternativa real, la [b] está puesta sobre «ella» aunque explica לֹא גֻשְׁמָהּ, y la [c] se aplica a «indignación» pero en el inglés auditado la alternancia relevante es «ira».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Hijo de hombre» suena menos natural que la forma establecida y ampliamente inteligible «hijo de hombre»; en español bíblico no requiere mayúscula interna. «Dile a ella» es comprensible, aunque algo pesado; «di[a]le» o «dile» sería más fluido, pero no es necesario cambiarlo para fidelidad. La principal mejora de legibilidad y precisión es sustituir «no regada» por una formulación que remita explícitamente a la lluvia, por ejemplo «sin lluvia» en el texto principal, dejando «no rociada» como alternativa en nota.
  glossary_alignment: No hay términos del glosario mayor directamente implicados salvo mantener el registro profético. La decisión de «hijo de hombre» concuerda con la preferencia auditada. «Purificada» es aceptable para לֹא מְטֹהָרָה y preserva el matiz ritual-moral. «Indignación» también es aceptable para זעם, con nota alternativa «ira».
  issues:
  - severity: high
    issue: La nota [b] está anclada en el lugar equivocado.
    rationale: La nota [b] explica לֹא גֻשְׁמָהּ («no rained on / sin lluvia / no rociada»), pero en el borrador está puesta sobre «ella», donde el hebreo correspondiente es לָהּ («a ella»). Esto confunde la relación entre texto y evidencia fuente.
  - severity: medium
    issue: «No regada» no refleja con suficiente precisión la imagen de lluvia del hebreo raro.
    rationale: «Regada» en español suele sugerir riego artificial. El inglés auditado preserva la relación con lluvia («not rained on») y la nota menciona «without rain / not showered upon». «Sin lluvia» o «no llovida»/«no rociada» preserva mejor el campo semántico.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real.
    rationale: 'Dice «O: “Hijo de hombre”» repitiendo exactamente el texto principal. Debe eliminarse o reemplazarse por una nota verdadera; como el inglés no exige nota aquí, lo mejor es quitarla.'
  - severity: low
    issue: Capitalización de «Hijo de hombre».
    rationale: En medio de oración, «hijo de hombre» en español normalmente no lleva mayúscula inicial salvo por inicio de cita. La minúscula mejora naturalidad sin perder registro bíblico.
  revised_spanish_text: '«Hijo de hombre, dile a ella: “Tú eres una tierra no purificada y sin lluvia[a] en el día de la indignación[b]”»'
  revised_footnotes:
  - marker: a
    text: La expresión hebrea es rara y también puede entenderse como «no rociada» o «no llovida» en el día de la ira.
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el día de la ira».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de notas para que correspondan al hebreo pertinente, se elimina una nota redundante, se mejora «no regada» a «sin lluvia» para reflejar mejor la imagen de lluvia del original y del audit trail, y se normaliza la capitalización de «hijo de hombre» en español. Se conserva «purificada» e «indignación» por fidelidad y registro.
