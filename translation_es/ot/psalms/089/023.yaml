    rationale: El hebreo tiene אוֹיֵב como sujeto de יַשִּׁא. La versión española actual empieza con ‘No impondrá...’, lo que borra un elemento léxico significativo presente en la fuente y en el POB inglés.
  - severity: high
    issue: La frase ‘impondrá tributo sobre él’ no sigue la decisión auditada ‘exact tribute from him’.
    rationale: El audit trail explica que בּוֹ, con este valor verbal, se vierte mejor como ‘from him’. En español, ‘exigirá tributo de él’ o ‘le impondrá tributo’ serían opciones más fieles; pero si se mantiene ‘tributo’, ‘de él’ representa mejor la decisión documentada que ‘sobre él’.
  - severity: medium
    issue: 'La nota [a] contiene una alternativa mal formulada: ‘No engañará a su enemigo’.'
    rationale: El pronombre hebreo se refiere al protegido (‘him’), no al enemigo. La nota debe decir ‘No lo engañará un enemigo’ o equivalente, y también corregir la alternativa ‘impose on him’ a un español más natural.
