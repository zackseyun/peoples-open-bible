translation:
  text: “Listen now about the stones that go into the building. The stones, then, that are square and
    white and that fit together at their joints—these are the apostles and bishops and teachers and deacons,
    who walked in the reverent dignity of God and who oversaw and taught and served God’s elect with purity
    and reverence—some have fallen asleep, and some are still alive. They were always in agreement with
    one another, had peace among themselves, and listened to each other; for this reason their joints
    fit in the building of the tower.
