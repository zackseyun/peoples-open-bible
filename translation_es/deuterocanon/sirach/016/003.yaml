translation:
  language: es
  text: No confíes en su vida, ni te apoyes en su descendencia[a]; porque no tendrán un buen final. Pues uno que hace lo que agrada[b] vale más que mil[c], y morir sin hijos que tener muchos hijos en injusticia y un final sin ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «no te apoyes en su lugar» o «posición», mientras que el hebreo aquí puede entenderse como su descendencia o su resultado/futuro.
    reason: textual_variant
  - marker: b
    text: También puede entenderse como «uno que hace la voluntad»; el sentido religioso queda implícito, pero no se añade en el texto principal.
    reason: lexical_alternative
  - marker: c
    text: La frase final es breve y difícil; también puede leerse como «que mil, y morir sin hijos, antes que tener muchos hijos en injusticia y un final presuntuoso o malvado».
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תַּאֲמִין
  english_pob_choice: Do not trust
  chosen_spanish: No confíes
  alternatives_spanish:
  - No creas
  - No pongas tu confianza en
  lexicon: HALOT
  rationale: El hifil de אמן aquí expresa poner confianza, no simple creencia intelectual. «Confiar» reproduce bien la advertencia sapiencial en español natural.
- source_word: בְּחַיֵּיהֶם
  english_pob_choice: in their life
  chosen_spanish: en su vida
  alternatives_spanish:
  - en sus vidas
  - en su vida / prosperidad
  lexicon: HALOT
  rationale: El singular colectivo «vida» es idiomático en español y conserva la referencia a la vitalidad o aparente prosperidad de los descendientes.
- source_word: וְאַל תִּבְטַח
  english_pob_choice: and do not rely on
  chosen_spanish: ni te apoyes en
  alternatives_spanish:
  - ni confíes en
  - ni te aferres a
  lexicon: HALOT
  rationale: «Apoyarse en» comunica dependencia o respaldo mejor que repetir «confiar», evitando una repetición pesada y manteniendo el matiz de seguridad dependiente.
- source_word: בְּעִקְבוֹתָם
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su posteridad
  - su linaje
  - sus hijos
  lexicon: HALOT
  rationale: Aunque la imagen literal puede sugerir «talones» o «lo que viene detrás», el contexto del versículo y la revisión inglesa la entienden como descendencia/offspring. «Descendencia» mantiene el vínculo genealógico sin forzar una lectura más estrecha.
- source_word: אַחֲרִית טוֹבָה
  english_pob_choice: a good end
  chosen_spanish: un buen final
  alternatives_spanish:
  - un buen fin
  - un buen desenlace
  lexicon: HALOT
  rationale: «Final» y «fin» son válidos; «final» suena más natural y conserva la idea de desenlace/resultado.
- source_word: טוֹב אֶחָד
  english_pob_choice: one who does what is pleasing
  chosen_spanish: uno que hace lo agradable
  alternatives_spanish:
  - uno que hace lo que agrada
  - uno que hace lo que es recto
  lexicon: HALOT
  rationale: El hebreo es elíptico y el sustantivo רָצוֹן puede expresar lo agradable o lo conforme a la voluntad. «Lo agradable» preserva la ambigüedad del original sin añadir de forma explícita «a Dios» al texto principal.
- source_word: עוֹשֶׂה רָצוֹן
  english_pob_choice: who does what is pleasing
  chosen_spanish: hace lo agradable
  alternatives_spanish:
  - hace la voluntad
  - hace lo que agrada
  lexicon: HALOT
  rationale: Se mantiene el valor de «hacer lo que agrada/agrada a alguien» sin explicitar un objeto no dicho. La formulación es breve y fiel al paralelismo sapiencial.
- source_word: עֲרִירִי
  english_pob_choice: childless
  chosen_spanish: sin hijos
  alternatives_spanish:
  - estéril
  - sin descendencia
  lexicon: HALOT
  rationale: «Sin hijos» es claro y directo en español contemporáneo. Evita una posible connotación biológica excesiva de «estéril», que no siempre corresponde al foco del verso.
- source_word: בְּעַוְלָה
  english_pob_choice: in unrighteousness
  chosen_spanish: en injusticia
  alternatives_spanish:
  - en maldad
  - con injusticia
  - en iniquidad
  lexicon: HALOT
  rationale: עַוְלָה puede ser injusticia o maldad. «Injusticia» conserva el sustantivo moral y resulta natural en español bíblico actual.
- source_word: זָדוֹן
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - impío
  - arrogante
  - presuntuoso
  lexicon: HALOT
  rationale: «Sin ley» reproduce la idea de falta de sometimiento normativo y deja intacta la fuerza moral del término, sin suavizarlo con un equivalente más interpretativo.
- source_word: μὴ ἔπεχε ἐπὶ τὸν τόπον αὐτῶν
  english_pob_choice: do not rely on their offspring
  chosen_spanish: ni te apoyes en su descendencia
  alternatives_spanish:
  - ni te fijes en su lugar
  - ni te aferres a su posición
  lexicon: BDAG
  rationale: La línea griega ofrece «lugar/posición», pero el hebreo paralelo y la revisión inglesa optan por una idea de descendencia o resultado. Se mantiene esa decisión principal y se registra la alternativa griega en nota.
theological_decisions:
- issue: Objeto implícito de 'hace lo agradable'
  english_pob_reading: Leave the object implicit rather than adding 'to God' in the main text.
  chosen_spanish_reading: Dejar implícito el objeto, sin añadir «a Dios» en el texto principal.
  alternative_spanish_readings:
  - uno que hace la voluntad de Dios
  - uno justo vale más que mil
  rationale: El contexto sapiencial sugiere referencia divina, pero el hebreo no la explicita. Añadir «a Dios» haría más explícito el sentido, pero excedería el dato textual principal. La redacción española conserva la tensión entre ambigüedad formal y fuerza religiosa implícita.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Contraste duro entre morir sin hijos y tener muchos hijos en injusticia
  english_pob_reading: Retain the stark comparison without softening it.
  chosen_spanish_reading: Mantener el contraste fuerte sin suavizarlo.
  alternative_spanish_readings:
  - mejor morir sin hijos que tener muchos hijos impíos
  - mejor morir sin hijos que tener muchos hijos en maldad
  rationale: El verso presenta un juicio sapiencial tajante. La traducción conserva la dureza del contraste entre la ausencia de hijos y la descendencia numerosa marcada por injusticia y fin sin ley.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se ha seguido la revisión más reciente del audit trail: en la tradición inglesa se corrigió una lectura anterior de ''future'' a ''offspring'' para בְּעִקְבוֹתָם y se restauró la cláusula sobre ''a good end''. La versión española refleja esa decisión, manteniendo además la contraposición final entre estar sin hijos y tener muchos hijos caracterizados por injusticia y un final sin ley.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se conserva «justicia/injusticia» como eje moral, sin sustituirlo por vocabulario eclesiástico tradicional.
  - «Sin ley» se mantiene por la fuerza moral de זָדוֹן; no se reemplaza por una paráfrasis más débil.
  - Las notas distinguen la variante griega de la base hebrea sin mezclar ambas en el texto principal.
