review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: futuro plural (''Vendrán y declararán''), destinatario indefinido (''a un pueblo'') y la concisión final (''lo ha hecho''). Sin embargo, se aparta del juicio principal del audit trail en dos puntos importantes: (1) צִדְקָתוֹ se documentó en inglés como ''his righteousness'' con alternativa ''his justice'', pero el español puso ''su justicia'' en el texto principal y desplazó la equivalencia más directa; (2) כִּי se documentó preferentemente como cláusula de contenido (''que he has done it''), mientras que el borrador eligió la lectura causal ''porque'', invirtiendo la preferencia principal. La nota b también contiene una alternativa española poco natural (''que será nacido'').'
  spanish_quality_summary: El español principal es generalmente claro y digno, pero necesita ajustes para fidelidad y naturalidad. 'Su justicia' es posible, pero en este contexto el equivalente más fiel al main text auditado es 'su rectitud' o 'su justicia' según estrategia; dado el POB inglés y la nota preservando 'justice', conviene llevar 'rectitud' al texto principal para mantener la alternativa 'justicia' en nota. 'Porque él lo ha hecho' suena algo explicativo y menos climáctico que 'que él lo ha hecho'. Además, la nota c contiene un anglicismo/error ('terse') y la nota b propone una formulación no idiomática. También es preferible evitar el pronombre explícito 'él' si no aporta contraste.
  glossary_alignment: 'No hay conflicto con términos de glosario de alto perfil como Yahvé/Mesías. La cuestión clave es צדקה/δικαιοσύνη: el proyecto pide preservar la tensión entre ''justicia'' y ''rectitud/righteousness''. El audit trail inglés eligió el equivalente de ''righteousness'' en el texto principal y dejó ''justice'' en nota; por coherencia metodológica, el español debe reflejar esa misma jerarquía semántica. La cláusula final también debe seguir la preferencia documentada por lectura de contenido con nota para la causal.'
  issues:
  - severity: high
    issue: La cláusula final principal usa 'porque' en vez de 'que'.
    rationale: El audit trail inglés documenta como lectura principal de כִּי una cláusula de contenido ('that he has done it'), dejando la causal como alternativa en nota. El borrador invierte esa decisión sin nueva justificación de fuente.
  - severity: medium
    issue: '''Su justicia'' en el texto principal no sigue la jerarquía léxica del audit trail para צִדְקָתוֹ.'
    rationale: El inglés principal usa 'his righteousness' y preserva 'his justice' como alternativa. En español, 'su rectitud' reproduce mejor esa elección principal, mientras que 'su justicia' puede quedar en nota.
  - severity: medium
    issue: 'La nota b contiene una alternativa española antinatural: ''que será nacido''.'
    rationale: No es español idiomático. La alternativa fiel y natural es 'que nacerá' o 'que será engendrado/nacido' según contexto; aquí 'que nacerá' basta.
  - severity: low
    issue: La nota c contiene el anglicismo 'terse'.
    rationale: Debe decir 'breve', 'conciso' o similar en español natural.
  - severity: low
    issue: El pronombre explícito 'él' en 'que él lo ha hecho' no es necesario.
    rationale: El hebreo no exige énfasis contrastivo aquí; omitirlo mantiene mejor la concisión climáctica en español.
  revised_spanish_text: Vendrán y declararán su rectitud[a] a un pueblo que aún no ha nacido[b], que lo ha hecho[c].
  revised_footnotes:
