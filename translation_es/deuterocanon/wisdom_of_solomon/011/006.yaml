translation:
  language: es
  text: En lugar de la fuente de un río de curso incesante[a], quedaron perturbados por sangre fangosa[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en lugar del manantial de un río de curso incesante". El griego permite una formulación más cercana al orden y al campo semántico de "spring/manantial", aunque en español "fuente de un río" suena más natural.'
    reason: lexical_alternative
  - marker: b
    text: '"Sangre fangosa" intenta reproducir una expresión griega que combina sangre con la idea de fango o lodo, subrayando agua sucia y contaminada, no sangre en sentido abstracto.'
    reason: lexical_alternative
