    rationale: κακοπάθεια expresa sufrimiento, penuria o dura fatiga; 'dificultad' suena demasiado débil y genérica para el peso del término.
  - severity: low
    issue: '''la ventaja de otros'' es algo rígido en español'
    rationale: Aunque léxicamente defendible, 'el provecho de otros' o 'el bien de otros' suena más natural en español y representa bien λυσιτέλεια en este contexto.
  - severity: medium
    issue: Falta una nota sobre εὐχαριστία
    rationale: El inglés POB documenta expresamente que aquí significa gratitud/agradecimiento y no 'Eucharist'. Dado el posible malentendido teológico en español con 'eucaristía/acción de gracias', conviene preservar esa aclaración.
  revised_spanish_text: Así como no es fácil para quien prepara un banquete y busca el provecho[a] de otros, con todo, por la gratitud[b] de los muchos soportaremos gustosamente la penuria;
