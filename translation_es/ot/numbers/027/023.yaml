translation:
  language: es
  text: Él le impuso las manos y le encargó[a], tal como Yahvé había hablado por medio de Moisés[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le mandó» o «le dio una orden». El verbo hebreo puede denotar dar una orden, pero aquí también participa en el acto formal de encargar a Josué para su tarea.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por la mano de Moisés», un modismo que significa por medio de Moisés como agente de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְמֹךְ
  english_pob_choice: laid
  chosen_spanish: impuso
  alternatives_spanish:
  - puso
  - apoyó
  - extendió
  lexicon: HALOT
  rationale: El verbo סמך, con manos sobre una persona, expresa la imposición ritual de manos. En español, «impuso» comunica mejor ese acto formal y preserva el sentido ceremonial sin añadir explicación ajena al texto.
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: las manos
  alternatives_spanish:
  - sus manos
  - la mano
  lexicon: HALOT
  rationale: La forma hebrea es plural; por eso debe mantenerse el plural en español. Se omite el posesivo explícito porque el pronombre de objeto ya identifica a la persona afectada y el español lo tolera con naturalidad.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - encima de él
  lexicon: HALOT
  rationale: La preposición על en esta construcción expresa contacto sobre la persona. «Sobre él» es la forma más natural y fiel en español para la acción de imposición de manos.
- source_word: וַיְצַוֵּהוּ
  english_pob_choice: commanded him
  chosen_spanish: le dio encargo
  alternatives_spanish:
  - le mandó
  - lo encargó
  - lo comisionó
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «mandar/comandar», en este contexto de instalación pública de Josué la función es la de nombrarlo para una responsabilidad. «Le dio encargo» conserva la fuerza de autoridad sin introducir un tecnicismo eclesial y evita reducir el acto a una mera orden aislada.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: HALOT
  rationale: «Tal como» expresa adecuadamente la correspondencia exacta entre la acción de Moisés y lo que Yahvé había dicho.
- source_word: דִּבֶּר
  english_pob_choice: had spoken
  chosen_spanish: había hablado
  alternatives_spanish:
  - habló
  - había dicho
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien que la palabra de Yahvé precede a la acción narrada. «Había hablado» mantiene el tono bíblico sin forzar la sintaxis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma transliterada, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de agencia mediada. En español, «por medio de Moisés» comunica con claridad que Yahvé habló a través de Moisés como su agente, sin perder el sentido del giro original.
theological_decisions:
- issue: Sentido de וַיְצַוֵּהוּ en la investidura de Josué
  english_pob_reading: commanded him
  chosen_spanish_reading: le dio encargo
  alternative_spanish_readings:
  - le mandó
  - lo comisionó
  - le encargó
  rationale: El contexto no es una orden casual, sino la instalación formal de Josué en su función. «Le dio encargo» preserva ese matiz vocacional/administrativo sin recurrir a lenguaje litúrgico posterior y sin borrar la fuerza directiva del verbo.
  doctrine_reference: Translación por equivalencia óptima; mantener el sentido institucional del pasaje sin paraphrase excesiva.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «commissioned him» a «commanded him» para ajustarse más de cerca al verbo hebreo. En español se buscó un equivalente que conserve esa cercanía léxica y a la vez el matiz de investidura pública del contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el tetragrámaton.
  - Se mantiene el paralelismo de acción ritual + mandato/encargo, como en el hebreo.
  - Se evita «SEÑOR» como sustitución del nombre divino y «Cristo» u otra terminología no pertinente.
  - Se conserva el tono sobrio y bíblico, sin arcaísmos innecesarios.
