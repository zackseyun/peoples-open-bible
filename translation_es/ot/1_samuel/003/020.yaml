translation:
  language: es
  text: Y todo Israel, desde Dan hasta Beerseba, supo que Samuel había quedado confirmado como profeta de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había quedado establecido como profeta de Yahvé». El hebreo puede expresar que Samuel fue establecido o confirmado públicamente en su condición de profeta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - llegó a saber
  - reconoció
  lexicon: HALOT
  rationale: El verbo ידע aquí expresa conocimiento reconocido públicamente; «supo» mantiene la concisión narrativa del hebreo y funciona bien con el complemento siguiente que explica el contenido conocido.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todos los israelitas
  - la totalidad de Israel
  lexicon: HALOT
  rationale: La expresión colectiva se conserva de manera natural en español como un sujeto nacional corporativo.
- source_word: מִדָּן וְעַד בְּאֵר שָׁבַע
  english_pob_choice: from Dan to Beer-sheba
  chosen_spanish: desde Dan hasta Beerseba
  alternatives_spanish:
  - desde Dan y hasta Beerseba
  - de Dan a Beerseba
  lexicon: HALOT
  rationale: Se preserva el merismo geográfico con los topónimos, porque el hebreo no está describiendo solo un trayecto sino el alcance completo del territorio.
- source_word: נֶאֱמָן
  english_pob_choice: established
  chosen_spanish: estaba establecido
  alternatives_spanish:
  - estaba confirmado
  - era reconocido
  - había quedado establecido
  lexicon: HALOT
  rationale: El participio niphal de אמן puede significar ser establecido, confirmado o mostrado como fiable. En este contexto, la idea principal es que la condición profética de Samuel quedó públicamente establecida, no solo que fuera moralmente «fiel».
- source_word: לְנָבִיא
  english_pob_choice: as a prophet
  chosen_spanish: como profeta
  alternatives_spanish:
  - en calidad de profeta
  - para profeta
  lexicon: HALOT
  rationale: La preposición לְ marca función o estatus; «como profeta» expresa de manera natural esa designación.
- source_word: לַיהוָה
  english_pob_choice: of Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - para Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la convención del proyecto. La relación expresada por לַ puede entenderse como pertenencia o comisión profética; «de Yahvé» es la forma más idiomática y fiel al español bíblico actual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto pide traducir יהוה como «Yahvé» en el texto principal. Se evita el reemplazo por una convención de ocultamiento, porque el hebreo usa explícitamente el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נֶאֱמָן aplicado a Samuel
  english_pob_reading: established as a prophet
  chosen_spanish_reading: estaba establecido como profeta
  alternative_spanish_readings:
  - estaba confirmado como profeta
  - era reconocido como profeta
  - había quedado establecido como profeta
  rationale: La frase señala que el ministerio profético de Samuel quedó autenticado públicamente, en continuidad con el versículo anterior. «Establecido» conserva la fuerza de reconocimiento/validación sin convertirlo en una declaración técnica de ordenación.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que prefirió «established» frente a «confirmed» para נֶאֱמָן, y traslada esa misma decisión con «estaba establecido».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, en lugar de «SEÑOR».
  - Se preserva el merismo «desde Dan hasta Beerseba» sin convertirlo en una paráfrasis territorial general.
  - «Samuel estaba establecido como profeta» mantiene el matiz de autenticación pública del hebreo sin cargarlo de terminología eclesiástica posterior.
  - La nota al pie se ancla en «Yahvé[a]» y conserva la alternativa léxica principal documentada por el POB inglés.
