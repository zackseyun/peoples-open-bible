translation:
  language: es
  text: Aquella noche al rey se le fue el sueño[a], y mandó traer el libro de los registros[b], los anales; y fueron leídos delante del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «el sueño del rey huyó».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el libro de las remembranzas, los anales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/לַּ֣יְלָה הַ/ה֔וּא
  english_pob_choice: On that night
  chosen_spanish: Aquella noche
  alternatives_spanish:
  - En aquella noche
  - Esa noche
  lexicon: HALOT
  rationale: La expresión marca una noche específica dentro de la narración. «Aquella noche» conserva la referencia demostrativa y suena natural en español actual.
- source_word: נָדְדָ֖ה שְׁנַ֣ת הַ/מֶּ֑לֶךְ
  english_pob_choice: the king could not sleep
  chosen_spanish: al rey se le fue el sueño
  alternatives_spanish:
  - el rey no pudo dormir
  - el sueño del rey huyó
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «el sueño del rey huyó». En español, «se le fue el sueño» comunica bien esa imagen sin volverla forzada; mantiene la tensión lexical del original mejor que una simple negación.
- source_word: וַ/יֹּ֗אמֶר
  english_pob_choice: so he ordered
  chosen_spanish: y mandó
  alternatives_spanish:
  - y dijo
  - y ordenó
  lexicon: HALOT
  rationale: Aquí el verbo introduce una orden práctica. «Mandó» transmite la fuerza directiva del contexto y es más idiomático que repetir «dijo».
- source_word: לְ/הָבִ֞יא
  english_pob_choice: to be brought
  chosen_spanish: traer
  alternatives_spanish:
  - que trajeran
  - para ser traído
  lexicon: HALOT
  rationale: Tras la orden, el infinitivo expresa el contenido de lo mandado. En español, un infinitivo activo como «traer» funciona con naturalidad y deja implícitos a los encargados del servicio real.
- source_word: סֵ֤פֶר הַ/זִּכְרֹנוֹת֙
  english_pob_choice: the book of records
  chosen_spanish: el libro de las memorias
  alternatives_spanish:
  - el libro de los recuerdos
  - el libro de los registros
  lexicon: HALOT
  rationale: El sustantivo זִכְרוֹנוֹת apunta a registros destinados al recuerdo. «Memorias» conserva esa relación con el recordar, mientras que la alternativa «registros» aclararía más el sentido archivístico.
- source_word: דִּבְרֵ֣י הַ/יָּמִ֔ים
  english_pob_choice: the chronicles
  chosen_spanish: los anales
  alternatives_spanish:
  - las crónicas
  - los hechos de los días
  lexicon: HALOT
  rationale: La frase constructa designa registros anales. «Anales» es un equivalente breve y formal en español para ese tipo de archivo histórico; «crónicas» queda como alternativa válida.
- source_word: וַ/יִּהְי֥וּ נִקְרָאִ֖ים
  english_pob_choice: and they were read
  chosen_spanish: y fueron leídos
  alternatives_spanish:
  - y se leían
  - y comenzaron a ser leídos
  lexicon: HALOT
  rationale: El plural del verbo se refleja en «fueron leídos». La forma pasiva española conserva el hecho de la lectura en curso sin añadir elementos que el hebreo no especifica.
- source_word: לִ/פְנֵ֥י הַ/מֶּֽלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - ante el rey
  lexicon: HALOT
  rationale: «Delante del rey» reproduce bien la idea de presencia inmediata y lectura pública ante él. Es claro en español y mantiene el valor espacial-relacional de לפני.
theological_decisions:
- issue: Imagen idiomática del sueño que «huye» frente a una negación simple del insomnio
  english_pob_reading: the king could not sleep; literally, 'the king's sleep fled.'
  chosen_spanish_reading: al rey se le fue el sueño
  alternative_spanish_readings:
  - el rey no pudo dormir
  - el sueño del rey huyó
  rationale: 'No hay carga doctrinal directa, pero sí una tensión lexical importante: el hebreo personifica el sueño como algo que se escapa. La forma idiomática española elegida conserva esa imagen mejor que una negación plana.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: la versión española conserva la secuencia narrativa, la imagen idiomática del sueño que huye y la alternativa archivística para el libro/los anales. No se detectaron revisiones aplicadas en el registro inglés, por lo que no se introdujeron ajustes textuales adicionales.'
  spanish_consistency_notes:
  - Se emplea «rey» sin mayúscula por estilo español común, salvo en encabezados o si el contexto editorial requiriera otra convención.
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - «Memorias» y «anales» se mantienen como pareja lexical que deja visible la opción archivística sin perder fluidez en español.
  - 'La puntuación refleja la estructura del hebreo y del audit trail inglés: coordinación narrativa, coma explicativa y cierre con lectura pública.'
