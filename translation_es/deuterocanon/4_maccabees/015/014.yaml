- from: Al ver cómo uno por uno eran torturados[a] y quemados, la madre no cambió por su piedad.
  to: Al ver a cada uno torturado[a] y quemado, la madre no cambió a causa de su piedad.
  rationale: Se ajusta καθʼ ἓν a «a cada uno» para reflejar mejor el distributivo del griego dentro de la acción de ver. Se simplifica la sintaxis para mayor claridad en español. Se cambia «por su piedad» a «a causa de su piedad» para expresar con más naturalidad el valor causal de διὰ τὴν εὐσέβειαν, manteniendo «piedad» como término clave de 4 Macabeos.
