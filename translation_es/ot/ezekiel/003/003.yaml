translation:
  language: es
  text: 'Y él me dijo[a]: «Hijo de hombre, alimenta tu vientre y llena tus entrañas con este rollo que yo te doy». Entonces lo comí, y me supo en la boca dulce como miel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser humano», «mortal». Se conserva el hebraísmo «Hijo de hombre» como forma repetida de tratamiento en Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conserva el giro idiomático profético y su valor formal de tratamiento. En español, «Hijo de hombre» es la manera más transparente y fiel de mantener la expresión sin diluirla en una paráfrasis.
- source_word: בִּטְנְךָ
  english_pob_choice: your belly
  chosen_spanish: tu vientre
  alternatives_spanish:
  - tu barriga
  - tu estómago
  lexicon: HALOT
  rationale: «Vientre» conserva la imaginería corporal concreta del hebreo y suena más natural y digno en español bíblico actual que un calco como «barriga». «Estómago» estrecharía demasiado el sentido.
- source_word: תַאֲכֵל
  english_pob_choice: feed
  chosen_spanish: alimenta
  alternatives_spanish:
  - come
  - da de comer a
  lexicon: HALOT
  rationale: El Hifil tiene valor causativo; «alimenta» refleja mejor la idea de hacer entrar alimento al vientre que un simple «come». Mantiene la fuerza verbal del original.
- source_word: וּמֵעֶיךָ
  english_pob_choice: your inward parts
  chosen_spanish: tus entrañas
  alternatives_spanish:
  - tus partes internas
  - tus interiores
  lexicon: HALOT
  rationale: «Entrañas» conserva el lenguaje interno, visceral y bíblico del hebreo. Es una equivalencia natural en español y evita la rigidez de «partes internas».
- source_word: תְמַלֵּא
  english_pob_choice: fill
  chosen_spanish: llena
  alternatives_spanish:
  - colma
  - satisface
  lexicon: HALOT
  rationale: Es la traducción más directa del verbo מלא en este contexto de plenitud corporal. «Llena» conserva la imagen concreta sin añadir matices ajenos.
- source_word: הַמְּגִלָּה
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - pergamino
  - libro
  lexicon: HALOT
  rationale: «Rollo» es claro en español y corresponde al objeto escrito enrollado. «Pergamino» introduciría un soporte material no explicitado por el hebreo.
- source_word: נֹתֵן
  english_pob_choice: I am giving
  chosen_spanish: yo te doy
  alternatives_spanish:
  - yo estoy dando
  - yo te estoy dando
  lexicon: HALOT
  rationale: En español, el presente simple transmite bien la acción inmediata y en curso del participio en la escena. Evita una forma perifrástica innecesariamente pesada.
- source_word: וָאֹכְלָה
  english_pob_choice: So I ate it
  chosen_spanish: Y lo comí
  alternatives_spanish:
  - Entonces lo comí
  - Y la comí
  lexicon: HALOT
  rationale: Mantiene la progresión narrativa con una coordinación simple y natural. El pronombre neutro «lo» refiere al rollo sin forzar género en español.
- source_word: וַתְּהִי בְּפִי
  english_pob_choice: it was in my mouth
  chosen_spanish: en mi boca fue
  alternatives_spanish:
  - estuvo en mi boca
  - llegó a ser en mi boca
  lexicon: HALOT
  rationale: La frase española mantiene el foco sensorial del hebreo, aunque en un orden más natural. «Fue» conserva la idea de estado resultante sin sobreexplicarla.
- source_word: כִּדְבַשׁ לְמָתוֹק
  english_pob_choice: as sweet as honey
  chosen_spanish: dulce como miel
  alternatives_spanish:
  - como miel para dulzura
  - tan dulce como la miel
  lexicon: HALOT
  rationale: Expresa con naturalidad la comparación hebrea y su cualidad gustativa. «Dulce como miel» es idiomático y fiel al sentido.
theological_decisions:
- issue: Conservación del tratamiento profético «Hijo de hombre»
  english_pob_reading: The Hebrew idiom “son of man” is retained here as Ezekiel’s repeated form of address.
  chosen_spanish_reading: Se mantiene «Hijo de hombre» como fórmula fija de dirección profética.
  alternative_spanish_readings:
  - ser humano
  - mortal
  - hijo de un hombre
  rationale: La frase funciona como vocativo repetido en Ezequiel; traducirla por un equivalente dinámico perdería su carácter fijo y su intertextualidad. La forma tradicional literal es la más fiel y reconocible.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'Revisado a la luz del aviso de validación previo: el marcador [a] ahora aparece exactamente en el texto español donde corresponde.'
  spanish_consistency_notes:
  - Se mantuvo «Hijo de hombre» para בֶּן אָדָם, en coherencia con la decisión auditada del POB en inglés.
  - Se prefirieron términos corporales concretos («vientre», «entrañas») para conservar la imaginería hebrea.
  - No se añadió puntuación ni contenido extra al sentido del versículo; la cláusula final reproduce la comparación de dulzura de modo idiomático en español.
