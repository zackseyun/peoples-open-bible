revisions:
- from: 'Y dijo[a]: «Oh Yahvé, Dios de Israel, no hay Dios como tú en los cielos ni en la tierra; que guardas el pacto y la misericordia[b] para tus siervos, los que andan delante de ti con todo su corazón» .'
  to: 'Y dijo[a]: «Oh Yahvé, Dios de Israel, no hay Dios como tú en los cielos ni en la tierra, tú que guardas el pacto y el amor constante[b] para tus siervos, los que andan delante de ti con todo su corazón».'
