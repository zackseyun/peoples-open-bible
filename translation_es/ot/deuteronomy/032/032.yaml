translation:
  language: es
  text: Porque su vid procede de la vid de Sodoma, y de los campos de Gomorra; sus uvas son uvas de veneno[a], sus racimos son amargos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uvas de hiel». El hebreo רֹאשׁ puede designar una planta o sustancia venenosa o amarga; «hiel» es una traducción tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el versículo anterior; «porque» conserva bien la fuerza causal/explanatoria en español bíblico moderno.
- source_word: מִגֶּפֶן סְדֹם
  english_pob_choice: from the vine of Sodom
  chosen_spanish: de la vid de Sodoma
  alternatives_spanish:
  - de la vid de Sodoma
  - procede de la vid de Sodoma
  lexicon: HALOT
  rationale: Se mantiene la imagen de origen/metáfora vegetal. «Vid» es el equivalente natural de גֶּפֶן y «de Sodoma» conserva el genitivo sin explicitar más de lo que el hebreo dice.
- source_word: גַּפְנָם
  english_pob_choice: their vine
  chosen_spanish: su vid
  alternatives_spanish:
  - su vid
  - su parra
  lexicon: HALOT
  rationale: El posesivo singular en español refleja el hebreo colectivo singular. «Vid» conserva la metáfora agrícola con mayor precisión que una paráfrasis como «parra».
- source_word: וּמִשַּׁדְמֹת עֲמֹרָה
  english_pob_choice: and from the fields of Gomorrah
  chosen_spanish: y de los campos de Gomorra
  alternatives_spanish:
  - y de las tierras de Gomorra
  - y de los sembrados de Gomorra
  lexicon: HALOT
  rationale: שַׁדְמֹת apunta a tierras/campos cultivados; «campos» es natural en español y mantiene el ámbito agrícola sin sobreespecificar.
- source_word: עֲנָבֵימוֹ
  english_pob_choice: their grapes
  chosen_spanish: sus uvas
  alternatives_spanish:
  - sus uvas
  - sus racimos
  lexicon: HALOT
  rationale: El plural con sufijo se expresa de forma directa y natural con «sus uvas».
- source_word: עִנְּבֵי רֹאשׁ
  english_pob_choice: grapes of poison
  chosen_spanish: uvas de veneno
  alternatives_spanish:
  - uvas venenosas
  - uvas de hiel
  lexicon: HALOT
  rationale: Se sigue la decisión inglesa de preservar el valor léxico de רֹאשׁ como sustancia tóxica/amarga. «De veneno» mantiene la tensión imagética sin domesticarla; «uvas venenosas» sería más interpretativa.
- source_word: אַשְׁכְּלֹת
  english_pob_choice: clusters
  chosen_spanish: racimos
  alternatives_spanish:
  - racimos
  - grupos
  lexicon: HALOT
  rationale: «Racimos» es el término idiomático y preciso para el contexto vitivinícola.
- source_word: מְרֹרֹת
  english_pob_choice: bitter
  chosen_spanish: amargos
  alternatives_spanish:
  - amargos
  - de amargura
  lexicon: HALOT
  rationale: El adjetivo español reproduce bien el paralelismo poético con «uvas de veneno» y evita una abstracción innecesaria.
theological_decisions:
- issue: Imagen moral de Sodoma y Gomorra sin resolver el referente explícito de la vid
  english_pob_reading: Retain the agricultural metaphor as a moral indictment without making the referent more explicit than the Hebrew does.
  chosen_spanish_reading: Mantener la metáfora agrícola como acusación moral sin precisar en el texto principal a quién se aplica la vid más allá de lo que dice el hebreo.
  alternative_spanish_readings:
  - Interpretar la vid directamente como Israel
  - Interpretar la vid directamente como los enemigos de Israel
  rationale: El versículo usa imágenes de origen y fruto para cargar la denuncia moral. La traducción conserva esa tensión interpretativa en lugar de resolverla por cuenta propia.
  doctrine_reference: Preservar la tensión teológica y exegética del texto.
translation_notes:
  revision_awareness: 'Se siguió el ajuste más reciente del audit trail: el cierre no añade un equivalente explícito de לָמוֹ, porque el contexto posesivo ya lo absorbe de forma natural en español. También se preservó la metáfora agrícola sin resolver el referente interpretativo.'
  spanish_consistency_notes:
  - Se usa «vid» para גֶּפֶן, coherente con el campo semántico agrícola.
  - 'Se usa «Dios/Yahvé» no aplica aquí; se mantiene la toponimia bíblica en forma española tradicional: Sodoma, Gomorra.'
  - Se evitó «Cristo», «Señor» y otros términos no pertinentes al versículo.
  - La puntuación separa las dos imágenes paralelas con punto y coma, reflejando la estructura poética del hebreo.
