lexical_decisions:
- source_word: עַד אָן
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será?
  - ¿Hasta cuándo seguirás?
  lexicon: HALOT
  rationale: La expresión hebrea es una pregunta idiomática de duración; en español, «¿Hasta cuándo» comunica naturalmente el reproche y la impaciencia del hablante sin volverlo demasiado literal.
- source_word: תְּמַלֶּל
  english_pob_choice: will you keep saying
  chosen_spanish: seguirás diciendo
  alternatives_spanish:
  - hablarás
  - dirás
  lexicon: HALOT
  rationale: El valor iterativo y enfático del verbo se conserva mejor con «seguirás diciendo», que expresa continuidad y mantiene el tono de censura del contexto.
- source_word: אֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: HALOT
  rationale: El demostrativo es plural y amplio; «estas cosas» evita restringir indebidamente el referente a «palabras» y refleja bien la referencia a las declaraciones previas de Job.
- source_word: וְרוּחַ כַּבִּיר
  english_pob_choice: and ... be a mighty wind
  chosen_spanish: y ... serán un viento impetuoso
  alternatives_spanish:
  - y ... serán un viento fuerte
  - y ... serán un viento poderoso
  - y ... serán un viento bravío
  lexicon: HALOT
  rationale: Se conserva la metáfora de viento literal para la fuerza vacía de la խոսa. «Impetuoso» transmite vigor, ímpetu y cierta violencia retórica, cercano a «mighty/strong wind» en el contexto poético.
- source_word: אִמְרֵי פִיךָ
  english_pob_choice: the words of your mouth
  chosen_spanish: las palabras de tu boca
  alternatives_spanish:
  - los dichos de tu boca
  - tus palabras
  lexicon: HALOT
  rationale: La construcción hebrea se preserva de manera transparente y natural. «Tu boca» mantiene el paralelismo poético y la concreción corporal del hebreo mejor que una simplificación a «tus palabras».
theological_decisions:
- issue: Metáfora de 'viento' aplicada al habla
  english_pob_reading: the words of your mouth be a mighty wind
  chosen_spanish_reading: las palabras de tu boca serán un viento impetuoso
  alternative_spanish_readings:
  - las palabras de tu boca serán un viento fuerte
  - las palabras de tu boca serán un viento poderoso
  rationale: 'No se espiritualiza ni se moraliza la imagen: el hebreo presenta una comparación despectiva del discurso de Job como algo poderoso pero vacío. La traducción mantiene la imagen física de ''viento'' para conservar la tensión retórica.'
  doctrine_reference: Poética sapiencial del AT; figura retórica sin carga doctrinal directa
translation_notes:
  revision_awareness: 'El contexto auditado en inglés favorece una equivalencia óptima: se mantiene la metáfora de ''wind'', la pregunta idiomática ''How long'' y el matiz iterativo de תְּמַלֶּל. No hubo revisiones aplicadas en el pase más reciente, y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda al texto; aquí no aparecen.
  - Se conserva el paralelismo poético de dos miembros y el tono de reproche de Bildad.
  - No se traduce mecánicamente «mouth» como «boca» en sentido biológico; se mantiene porque el hebreo usa una expresión concreta y poética.
