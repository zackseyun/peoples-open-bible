  - marker: a
    text: 'O: «Entonces bajó a la era y hizo exactamente como su suegra le había indicado».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «Así que» por «Entonces» para reflejar con mayor precisión el waw narrativo como avance secuencial, sin añadir una implicación causal innecesaria. También se limpia el formato de la nota al pie, conservando la alternativa léxica documentada en el audit trail inglés.
