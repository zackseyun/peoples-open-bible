  source_alignment_summary: 'El borrador sigue bien el sentido del griego: ὁδὸς ἁμαρτωλῶν = «camino de los pecadores», ὡμαλισμένη ἐκ λίθων = imagen de camino allanado/empedrado con piedras, y ἐπʼ ἐσχάτῳ αὐτῆς βόθρος ᾅδου = «al final… [hay] un foso/pozo del Hades». También preserva correctamente «Hades» como término más preciso que «infierno».'
  spanish_quality_summary: 'El español es claro y legible, pero hay dos detalles mejorables: 1) «empedrado con piedras» suena algo redundante; 2) «pozo de Hades» resulta menos natural y menos preciso que «fosa/foso del Hades» o «fosa de Hades», porque βόθρος en este contexto es más bien una cavidad, fosa o hoyo ominoso, no un pozo de agua. Además, «al final de él» puede simplificarse a «al final» sin pérdida.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La conservación de «Hades» está bien justificada. «Pecadores» y «camino» también están alineados. La principal corrección es estilístico-lexical: preferir una formulación menos redundante para la calzada de piedras y un equivalente más exacto para βόθρος.'
  issues:
  - severity: medium
    issue: «empedrado con piedras» es redundante en español
    rationale: Aunque no es incorrecto, «empedrado» ya incluye la idea de piedras; combinado con la nota, una formulación como «allanado con piedras» o «empedrado» sin repetir «con piedras» evita pesadez. Dado que el griego sí expresa ἐκ λίθων, conviene conservar «con piedras», pero con un verbo/adjetivo menos redundante.
  - severity: medium
    issue: «pozo de Hades» no representa tan bien βόθρος
    rationale: βόθρος suele evocar fosa, hoyo o foso, más que «pozo». «Pozo» en español puede sugerir una estructura vertical hecha para sacar agua. «Fosa del Hades» mantiene mejor la imaginería ominosa y el vínculo con el reino de los muertos.
  - severity: low
    issue: Falta el artículo en «de Hades»
    rationale: En español eclesial y general, «del Hades» suele sonar más natural cuando se trata del nombre del ámbito de los muertos.
  revised_spanish_text: El camino de los pecadores[a] está allanado con piedras, y al final hay una fosa[b] del Hades.
