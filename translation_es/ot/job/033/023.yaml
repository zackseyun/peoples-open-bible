translation:
  language: es
  text: Si hay para él un ángel[a], un mediador, uno entre mil, para declarar al hombre su rectitud[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un ángel, un intérprete» o «un mensajero, un mediador».
    reason: alternative_reading
  - marker: b
    text: O «para hacer saber al hombre lo que es recto para él».
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: Introduce una condición hipotética; «si» conserva mejor el valor condicional del hebreo.
- source_word: יֵשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  lexicon: HALOT
  rationale: Expresa de manera natural la partícula existencial sin añadir énfasis innecesario.
- source_word: עָלָיו
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - a favor de él
  - sobre él
  lexicon: HALOT
  rationale: Mantiene la relación de beneficio o representación que sugiere עַל en este contexto de mediación.
- source_word: מַלְאָךְ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: HALOT
  rationale: El contexto apunta a un intermediario celestial; por eso «ángel» comunica mejor el valor contextual que «mensajero».
- source_word: מֵלִיץ
  english_pob_choice: mediator
  chosen_spanish: mediador
  alternatives_spanish:
  - intérprete
  - vocero
  - intercesor
  lexicon: HALOT
  rationale: «Mediador» reproduce la función de intervenir e interpretar sin resolver indebidamente si se trata de un intérprete humano o de un agente celestial.
- source_word: אֶחָד מִנִּי אָלֶף
  english_pob_choice: one among a thousand
  chosen_spanish: uno entre mil
  alternatives_spanish:
  - uno de mil
  - uno entre un millar
  lexicon: HALOT
  rationale: Es una expresión idiomática de rareza; «uno entre mil» suena natural en español y conserva esa rareza excepcional.
- source_word: לְהַגִּיד
  english_pob_choice: to declare
  chosen_spanish: para declarar
  alternatives_spanish:
  - para decir
  - para hacer saber
  - para explicar
  lexicon: HALOT
  rationale: Conserva el valor formal y enfático del infinitivo de finalidad sin volverse arcaico.
- source_word: לְאָדָם
  english_pob_choice: to man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a un hombre
  - a la humanidad
  lexicon: HALOT
  rationale: Refleja el uso representativo de אָדָם como ser humano individual; en español, «al hombre» conserva la referencia genérica y la forma del original.
- source_word: יָשְׁרוֹ
  english_pob_choice: his uprightness
  chosen_spanish: su rectitud
  alternatives_spanish:
  - lo recto para él
  - su camino recto
  - lo que es recto para él
  lexicon: HALOT
  rationale: «Rectitud» reproduce la idea de ישר como lo recto/upright; además, permite mantener la ambigüedad del genitivo (si se refiere a su rectitud o a lo recto para él).
theological_decisions:
- issue: Identidad y función del מַלְאָךְ מֵלִיץ
  english_pob_reading: Rendered generically as 'an angel, a mediator' without identifying the figure more specifically.
  chosen_spanish_reading: Se traduce de manera genérica como «un ángel, un mediador», sin identificar más específicamente la figura.
  alternative_spanish_readings:
  - un mensajero, un intérprete
  - un intercesor celestial con lectura más definida
  rationale: El hebreo presenta una figura intermediaria, pero no la identifica de manera explícita más allá de los términos usados. La traducción conserva esa ambigüedad y evita imponer una identificación angelológica o cristológica que el texto no desarrolla aquí.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado quedó sin modificaciones, y el consenso de control cruzado fue de acuerdo moderado con observaciones menores. Se preserva por tanto la lectura base y su ambigüedad lexical-teológica.
  spanish_consistency_notes:
  - Se mantiene «ángel» para מַלְאָךְ y «mediador» para מֵלִיץ, siguiendo el valor contextual del verso.
  - «Uno entre mil» conserva la idiomaticidad del hebreo אֶחָד מִנִּי אָלֶף.
  - «Rectitud» deja abierta la alternativa contextual de «lo recto para él», tal como la nota textual indica.
  - Se usa «al hombre» para אָדָם en sentido representativo, sin neutralizar la referencia.
