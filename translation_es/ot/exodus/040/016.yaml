translation:
  language: es
  text: Y Moisés hizo conforme a todo lo que Yahvé le mandó; así hizo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - obró
  lexicon: HALOT
  rationale: El verbo עשה es amplio ('hacer/hacer obrar'). En este contexto de obediencia a una orden, 'hizo' conserva la acción concreta y natural en español sin perder la idea de cumplimiento.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio bíblico estándar
  rationale: Transliteración estable en español para el nombre propio.
- source_word: כְּכֹל
  english_pob_choice: according to all
  chosen_spanish: conforme a todo
  alternatives_spanish:
  - según todo
  - de acuerdo con todo
  lexicon: HALOT
  rationale: La construcción expresa conformidad plena con lo mandado. 'Conforme a todo' comunica la totalidad y la conformidad de manera natural en español.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  - lo que
  lexicon: HALOT
  rationale: En español, 'lo que' hace más natural la referencia al contenido de la orden. Evita una subordinación pesada sin perder el sentido relativo.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - mandó
  - había mandado
  - ordenó
  lexicon: HALOT
  rationale: El mandato antecede a la acción de Moisés; el pluscuamperfecto expresa esa anterioridad de forma clara. 'Mandado' mantiene el campo semántico de instrucción/mandato del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se conserva el nombre divino revelado en el hebreo, no la sustitución tradicional 'el SEÑOR'. La forma 'Yahvé' sigue el estándar del proyecto para el Tetragrámaton.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - le
  - lo
  lexicon: HALOT
  rationale: El sufijo pronominal retoma a Moisés como destinatario del mandato; en español, 'le' funciona como dativo ético/objetivo natural con 'mandar'.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - así
  - de ese modo
  lexicon: HALOT
  rationale: '''Así'' reproduce la idea resumptiva de correspondencia exacta entre mandato y cumplimiento.'
- source_word: עָשָׂה
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - lo hizo
  lexicon: HALOT
  rationale: La repetición del verbo refuerza la obediencia de Moisés. En español, repetir 'hizo' mantiene el énfasis retórico del hebreo.
theological_decisions:
- issue: Nombre divino Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre propio de Dios. En coherencia con la política del POB, se evita la sustitución por un título y se preserva el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue el ajuste reciente del audit trail al usar un pasado simple/natural en la acción principal y conservar la repetición final para reflejar el paralelismo hebreo. Se respetó el consenso del control cruzado, con atención especial al nombre divino y a la conformidad total de la obediencia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se prefirió 'conforme a todo' para reflejar כְּכֹל sin volverlo mecánico.
  - Se conservó la repetición verbal ('hizo... hizo') para reproducir el énfasis del hebreo.
  - No se añadió nota al pie porque la decisión sobre Yahvé ya queda explicada en los metadatos de decisión léxica y teológica.
