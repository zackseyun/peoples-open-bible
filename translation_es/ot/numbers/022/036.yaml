revisions:
- from: Cuando Balac oyó que Balaam había llegado[a], salió a su encuentro hasta la ciudad de Moab, que está sobre la frontera del Arnón[b], al borde de la frontera.
  to: Cuando Balac oyó que Balaam había llegado, salió a su encuentro en la ciudad de Moab[a], que está en la frontera del Arnón, al borde de la frontera[b].
  rationale: Se corrige la nota [a] para reflejar la ambigüedad léxica real documentada en el POB. Se reemplaza «hasta la ciudad de Moab» por «en la ciudad de Moab» para una localización más natural y fiel en español tras «salió a su encuentro». Se ajusta «sobre la frontera» a «en la frontera» por claridad idiomática, manteniendo el sentido geográfico y la repetición de «frontera» del hebreo.
