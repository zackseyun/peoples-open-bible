review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: vocativo profético, nombramiento como vigilante, recepción de una palabra de la boca divina y deber de advertir. Sin embargo, dos elecciones debilitan la fidelidad fina al texto fuente y al rastro POB: «amonestarás» introduce un matiz de reprensión más fuerte que el de advertir/avisar, y «de mi parte» desplaza el origen directo de מִמֶּנִּי (‘de mí / de parte mía’ en sentido de procedencia) hacia una formulación más interpretativa. Además, la nota [a] está anclada en «Israel» pero corresponde a «te he puesto como centinela».'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorar en naturalidad bíblica y precisión semántica. «Centinela» funciona, aunque «atalaya» también sería posible; no requiere cambio. «Oirás» debe llevar tilde: «oirás» es correcto sin tilde según la ortografía actual? No: el futuro de oír es «oirás», sin tilde en la i, así que está bien. El principal ajuste de calidad es usar «advertirás» en vez de «amonestarás» para no sugerir una censura moral más específica de la que expresa el hebreo.'
  glossary_alignment: No hay conflicto con términos de proyecto mayores. Se conserva bien «hijo de hombre». «Centinela» es una opción aceptable para צֹפֶה. La principal desalineación es con la decisión inglesa documentada para מִמֶּנִּי, que favorece «from me»; en español conviene «de mí» para preservar la procedencia directa, aunque suene un poco más formal. También conviene corregir el anclaje de la nota léxica alternativa para נְתַתִּיךָ.
  issues:
  - severity: medium
    issue: «Amonestarás» para וְהִזְהַרְתָּ
    rationale: El verbo hebreo en Hifil se centra en advertir/dar aviso, no necesariamente en reprender. «Amonestar» en español suele añadir matiz de censura o corrección moral.
  - severity: medium
    issue: «de mi parte» para מִמֶּנִּי
    rationale: 'Aunque idiomático, es más interpretativo y delegativo. El hebreo y la decisión POB subrayan origen directo: la advertencia viene «de mí».'
  - severity: low
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota ofrece una alternativa para «te he puesto como centinela», no para «Israel». Debe marcarse junto a esa frase.
  - severity: low
    issue: 'Alternativa léxica corrupta en metadatos: «te he नियुक्तado»'
    rationale: Hay un error evidente de mezcla de escritura en los metadatos léxicos. No afecta directamente el texto bíblico, pero confirma necesidad de pequeña revisión editorial.
  revised_spanish_text: Y tú, hijo de hombre, te he puesto[a] como centinela para la casa de Israel; y oirás una palabra de mi boca y los advertirás de mí.
  revised_footnotes:
  - marker: a
    text: 'O: «te he nombrado un centinela para la casa de Israel».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «amonestarás» a «advertirás» para reflejar mejor el sentido de advertencia del hebreo; se cambia «de mi parte» a «de mí» para preservar la procedencia directa expresada por מִמֶּנִּי y alinearse con la decisión documentada del POB; y se recoloca la nota [a] en la frase a la que realmente corresponde. No se requiere adjudicación adicional porque son correcciones menores y claras.
