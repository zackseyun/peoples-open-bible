  text: '1 Et factum est dum loqueretur leo uerba haec ad

    2 aquilam, et uidi Et ecce quod superauerat caput non conparuit. et surrexerunt alae duae quae ad eum transierunt et erectae sunt ut regnarent, et erat regnum eorum exile et tumulti plenum. Et uidi et ecce ipsa non apparesebant, et omne corpus aquilae incendebatur, et expauescebat terra ualde.

    3 et ego a multo excessu mentis et a magno timore uigilaui, et dixi spiritui meo: Ecce tu mihi praestitisti haec in eo quod

    4 scrutas uias altissimi. Ecce adhuc fatigatus sum animo, et

    5 spiritu meo inualidus sum ualde, et nec modica est in me uirtus a multo timore quem expaui nocte hac. Nunc ergo orabo

    6 altissimum ut me confortet usque in finem. Et dixi: domi-

    7 nator domine, si inueni gratiam ante oculos tuos, et si iustificatus sum apud te prae multis, et si certum ascendit deprecatio mea ante faciem tuam, Conforta me et ostende seruo tuo mihi

    8 interpretationem et distinctionem uisus horribilis huius, ut plenissime consoles animam meam. Dignum enim me habuisti

    9 ostendere mihi temporum finem et temporum nouissima. et dixit ad me: Haec est interpretatio uisionis huius quam

    10 uidisti: Aquilam quam uidisti ascendentem de mari, hoc est

    11 regnum quartum quod uisum est in uisu Danihelo fratri tuo. Sed non est illi interpretatum quomodo ego nunc tibi interpretor

    12 uel interpretatus sum. Ecce dies ueniunt et exsurget regnum

    13 super terram et erit timoratio omnium regnorum quae fuerunt ante eam.

    14 Regnabunt autem in ea XII reges, unus post unum.

    15 Nam secundus qui incipiet regnare, ipse tenebit amplius

    16 tempus prae xii. Haec est interpretatio xii alarum quas

    17 uidisti. Et quoniam audisti uocem quae locuta est non de

    18 capitibus eius exientem sed de medio corpore eius, Haec est interpretatio: quoniam post tempus regni illius nascentur contentiones non modicae, et periclitabitur ut cadat, et non cadet

    19 tunc, sed iterum constituetur in suum initium. Et quoniam

    20 uidisti subalares octo coherentes alis eius, Haec est interpretatio : exsurgent enim in ipso octo reges, quorum erunt tempora

    21 leuia et anni citati, et duo quidem ex ipsis perient Adpropinquante tempore medio, quattuor autem seruabuntur in tempore cum incipiet adpropinquare tempus eius ut finiatur,

    22 duo uero in finem seruabuntur. Et quoniam uidisti tria capita

    23 quiescentia, Haec est interpretatio : in nouissimis eius suscitabit altissimus tria regna et renouabit in ea multa et dominabunt

    24 terram, Et qui habitant in ea cum labore multo super omnes qui fuerunt ante hos; propter hoc ipsi uocati sunt capita

    25 aquilae. Isti enim erunt qui recapitulabunt impietates eius, et

    26 qui perficient nouissima eius. Et quoniam uidisti caput maius non apparescens, quoniam unus ex eis super lectum suum morietur, et tamen cum tormentis. Nam duo qui superauerunt,

    27 gladius eos comedet. Vnius enim gladius comedet qui cum eo,

    28 sed tamen et hic gladio in nouissimis cadet. Et quoniam uidisti

    29 duas subalares treicentes super caput quod est a dextera parte, Haec est interpretatio: hii sunt quos conseruauit altissimus in

    30 finem suam, hoc erat regnum exile et turbationis plenum, Sicut

    31 uidisti; et leonem quem uidisti de silua euigilantem mugientem et loquentem ad aquilam et arguentem eam iniustitias ipsius et omnes sermones eius, sicut audisti; Hic est unctus, quem

    32 hic est unctus, quem reservavit Altissimus in finem ad eos et impietates ipsorum. arguet illos de iniustitiis ipsorum et infulciet coram ipsis spretiones eorum.

    33 et erit cum arguerit eos, tunc corrumpet eos. Nam residuum

    34 populum meum liberabit cum misericordia, qui saluati sunt super fines meos, et iocundabit eos, quoadusque ueniat finis, dies iudicii, de quo locutus sum tibi ab initio. Hoc est somnium

    35 quod uidisti, et haec interpretatio eius:

    36 Tu autem solus dignus fuisti scire altissimi secretum hoc.

    37 Scribe ergo omnia ista in

    38 libro, quae uidisti, et pones ea in loco abscondito. Et docebis ea sapientes de populo tuo, quorum scis corda posse capere et

    39 seruare secreta haec. Tu autem adhuc sustine hic alios dies septem, ut tibi ostendatur quicquid uisum fuerit altissimo

    40 ostendere tibi. Et profectus est a me. et factum est cum audisset omnis populus, quoniam pertransierunt septem dies, et ego non fuissem reuersus in ciuitatem, et congregauit se omnis a minimo usque ad maximum et uenit ad

    41 me, et dixerunt mihi dicentes: Quid peccauimus tibi, et quid iniuste egimus in te; quoniam derelinquens dereliquisti nos et

    42 sedisti in loco hoc? Tu enim nobis superasti ex omnibus prophetis, sicut botrus de uindemia, et sicut lucerna in loco obscuro,

    43 et sicut portus naui saluatae a tempestate. Aut non sufficiunt

    44 nobis mala quae contigerunt? Si ergo tu nos dereliqueris, quanto erat nobis melius, si essemus succensi et nos in incendio

    45 Sion: Nec enim nos meliores sumus eorum, qui ibi mortui sunt. et plorauerunt uoce magna.

    46 et respondi ad eos et dixi: Confide Israel, et noli tristari

    47 tu domus Jacob. Est enim memoria uestri coram altissimo,

    48 et fortis non est oblitus uestri in contentione. Ego enim non dereliqui uos neque excessi a uobis, sed ueni in hunc locum ut deprecarer pro desolatione Sion, et ut quererem misericordiam pro humilitate sanctificationis uestrae. Et nunc ite unusquisque uestrum in domum suam et ego ueniam ad uos post dies istos. Et profectus est populus sicut dixi ei in ciuitatem. Ego autem sedi in campo vii diebus, sicut mihi mandauit, et manducabam de floribus solummodo agri, de herbis facta est mihi esca in diebus illis.

    49 Et nunc ite unusquisque uestrum in domum suam et ego ueniam ad uos post dies istos.

    50 Et profectus est populus sicut dixi ei in ciuitatem.

    51 Ego autem sedi in campo vii diebus, sicut mihi mandauit, et manducabam de floribus solummodo agri, de herbis facta est mihi esca in diebus illis.'
