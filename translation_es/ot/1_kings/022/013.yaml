revisions:
- from: 'Y el mensajero que había ido a llamar a Micaías le habló, diciendo: “Mira ahora: las palabras de los profetas, a una voz,[a] son favorables al rey. Por favor, que tu palabra sea como la palabra de uno de ellos, y habla favorablemente.”'
  to: 'Y el mensajero que había ido a llamar a Micaías le dijo: “Mira ahora: las palabras de los profetas, a una voz,[a] favorecen al rey. Por favor, que tu palabra sea como la palabra de uno de ellos, y habla favorablemente.”'
  rationale: Se ajusta la cláusula central para que suene natural en español sin perder el modismo hebreo ni la nota explicativa. «Favorecen al rey» expresa mejor el sentido relacional de טוֹב אֶל הַמֶּלֶךְ en esta construcción. También se sustituye «le habló, diciendo» por «le dijo» para un español más fluido y digno.
