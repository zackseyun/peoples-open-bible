  text: וַ/יְהִ֤י כָל הָ/עָם֙ נָד֔וֹן בְּ/כָל שִׁבְטֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר הַ/מֶּ֜לֶךְ הִצִּילָ֣/נוּ מִ/כַּ֣ף אֹיְבֵ֗י/נוּ וְ/ה֤וּא מִלְּטָ֨/נוּ֙ מִ/כַּ֣ף פְּלִשְׁתִּ֔ים וְ/עַתָּ֛ה בָּרַ֥ח מִן הָ/אָ֖רֶץ מֵ/עַ֥ל אַבְשָׁלֽוֹם־־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/019/010.yaml
  text: And all the people were disputing throughout all the tribes of Israel[a], saying, “The king delivered us from the hand of our enemies, and he rescued us from the hand of the Philistines[c][b], but now he has fled from the land because of Absalom.”
  footnotes:
  - marker: a
    text: Or “were debating” or “were in dispute.” The Hebrew suggests widespread contention among the tribes, not merely casual conversation.
    reason: lexical_alternative
  - marker: b
    text: Literally “from the hand of our enemies” and “from the hand of the Philistines,” a Hebrew idiom for deliverance from another’s power.
    reason: lexical_alternative
  - marker: c
    text: Or “from before Absalom” / “on account of Absalom.” The Hebrew expression is idiomatic for fleeing away because of him.
    reason: lexical_alternative
