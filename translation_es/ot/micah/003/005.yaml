base_translation:
  language: en
  yaml_path: translation/ot/micah/003/005.yaml
  text: Thus says Yahweh concerning the prophets who lead my people astray[a], who bite with their teeth and cry, “Peace,” but against anyone who does not put something into their mouths[d][c][b], they consecrate war.
  footnotes:
  - marker: a
    text: Literally, “who bite with their teeth.” The image likely depicts predatory prophets who announce well-being when they are fed or paid.
    reason: lexical_alternative
  - marker: b
    text: Literally, “who does not put on their mouth.” The sense is to give them food or payment.
    reason: lexical_alternative
  - marker: c
    text: Or “they declare holy war against him.” The Hebrew says “they consecrate war,” using cultic language for preparing an attack.
    reason: alternative_reading
  - marker: d
    text: Or 'but against anyone who does not put something into their mouths, they consecrate war.'.
    reason: previous_rendering
