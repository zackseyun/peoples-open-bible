review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el griego en lo básico: mantiene la negación enfática, el pasivo de μνησθήσεται, el valor temporal de ὅταν y «los justos» para δικαίους. También sigue la revisión auditada que entiende como referente implícito al pecador, no a «su destrucción». Sin embargo, las notas están mal alineadas con esa decisión y entre sí: la nota [a] presenta como alternativa precisamente la lectura ya adoptada en el texto, y la [c] invierte las opciones del inglés auditado.'
  spanish_quality_summary: El español principal es claro y natural. «y ciertamente no será recordado cuando visite a los justos» suena digno y comprensible. No requiere cambio mayor, pero las notas deben corregirse para evitar confusión sobre el sujeto implícito y para reflejar fielmente el historial de auditoría inglés.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «los justos» para δικαίους y «visite» para ἐπισκέπτηται son apropiados. La fuerza de οὐ μὴ queda razonablemente preservada con «ciertamente no».
  issues:
  - severity: medium
    issue: La nota [a] contradice la decisión principal auditada
    rationale: El texto principal ya adopta la lectura en que el sujeto implícito es el pecador («no será recordado»). La nota [a] la presenta erróneamente como lectura alternativa.
  - severity: medium
    issue: La nota [c] no corresponde al sentido de la nota inglesa de referencia
    rationale: La nota inglesa [c] conserva la renderización previa «it will certainly not be remembered…». En español, la nota actual dice «cuando él visite», que cambia el sujeto de «visite» en vez de reflejar la alternativa sobre qué no será recordado.
  revised_spanish_text: y ciertamente no será recordado[a] cuando visite a los justos[b][c].
  revised_footnotes:
  - marker: a
    text: 'O: «y ciertamente no se recordará» o «y ciertamente no será recordada», si el sujeto implícito se entiende como su destrucción o ruina, en vez del pecador.'
    reason: alternative_reading
  - marker: b
    text: El verbo puede significar también «atender» o «cuidar de».
    reason: lexical_alternative
  - marker: c
    text: 'Otra versión previa: «y ciertamente no será recordada cuando visite a los justos».'
    reason: previous_rendering
  revision_rationale: El texto principal puede mantenerse, pero las notas deben ajustarse al griego y al rastro de auditoría inglés. La corrección principal es distinguir con claridad entre la lectura adoptada (el pecador no será recordado) y la lectura alternativa/previa (no será recordada su destrucción o ruina).
