  text: וְ/סָמַ֤ךְ אֶת יָד/וֹ֙ עַל רֹאשׁ֔/וֹ וְ/שָׁחַ֣ט אֹת֔/וֹ לִ/פְנֵ֖י אֹ֣הֶל מוֹעֵ֑ד וְ֠/זָרְקוּ בְּנֵ֨י אַהֲרֹ֧ן אֶת דָּמ֛/וֹ עַל הַ/מִּזְבֵּ֖חַ סָבִֽיב־־־־׃
base_translation:
