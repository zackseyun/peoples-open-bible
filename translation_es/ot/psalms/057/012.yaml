translation:
  language: es
  text: ¡Sé exaltado sobre los cielos, oh Dios! Que tu gloria esté[a] sobre toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu gloria está sobre toda la tierra». El hebreo de la segunda línea no tiene un verbo finito explícito, así que debe suplirse según el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: ר֣וּמָה
  english_pob_choice: Be exalted
  chosen_spanish: ¡Enaltecido seas!
  alternatives_spanish:
  - Sé exaltado
  - Levántate en alto
  lexicon: HALOT
  rationale: La forma hebrea expresa una súplica/jussivo dirigida a Dios. En español, «enaltecido seas» conserva el valor de deseo o petición y comunica supremacía de manera natural en registro poético.
- source_word: עַל שָׁמַ֣יִם
  english_pob_choice: above the heavens
  chosen_spanish: sobre los cielos
  alternatives_spanish:
  - por encima de los cielos
  - más alto que los cielos
  lexicon: HALOT
  rationale: «Sobre» reproduce bien la relación espacial de superioridad; «los cielos» mantiene el plural poético del hebreo y su tono elevado.
- source_word: אֱלֹהִ֑ים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡Dios!
  lexicon: HALOT
  rationale: Es vocativo directo. En español, «oh Dios» marca con claridad la invocación sin volverla coloquial ni mecánica.
- source_word: כָּל הָאָ֣רֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitable
  - todo el mundo
  lexicon: HALOT
  rationale: En paralelo con «los cielos», «la tierra» es la equivalencia más natural y fiel. «Toda» conserva el sentido global de כָּל.
- source_word: כְּבוֹדֶֽךָ
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu esplendor
  lexicon: HALOT
  rationale: כבוד aplicado a Dios denota su gloria/majestad manifiesta. «Tu gloria» es la opción más transparente y consistente con el uso bíblico en español.
theological_decisions:
- issue: La segunda línea hebrea no tiene verbo finito explícito
  english_pob_reading: let your glory be above all the earth
  chosen_spanish_reading: que tu gloria esté sobre toda la tierra
  alternative_spanish_readings:
  - tu gloria está sobre toda la tierra
  - tu gloria sea sobre toda la tierra
  rationale: La POB inglesa resuelve el elipsis con un mandato implícito en paralelo al primer hemistiquio. En español, «que ... esté» conserva la fuerza optativa/jussiva sin convertir el verso en una afirmación plana.
  doctrine_reference: Translation philosophy §3; preserve tension rather than resolve it
- issue: Paralelismo poético entre altura celestial y extensión terrenal
  english_pob_reading: Be exalted above the heavens ... let your glory be above all the earth
  chosen_spanish_reading: Enaltecido seas sobre los cielos ... que tu gloria esté sobre toda la tierra
  alternative_spanish_readings:
  - Sé exaltado sobre los cielos ... tu gloria está sobre toda la tierra
  rationale: La versión española conserva el paralelismo vertical del hebreo y la diferencia de matiz entre la súplica del primer miembro y la resolución del segundo. No aplana la línea final en una simple declaración.
  doctrine_reference: Psalmic parallelism; optimal equivalence
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: sin cambios requeridos y con acuerdo alto en el control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Dios» como vocativo sin sustituirlo por «Señor», conforme al texto fuente.
  - Se conserva el plural poético «los cielos» y la universalidad de «toda la tierra» para reflejar el paralelismo cósmico.
  - Se usa «gloria» en vez de «honor» o «esplendor» por consistencia teológica y léxica con כבוד aplicado a Dios.
