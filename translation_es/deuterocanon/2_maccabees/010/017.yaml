- from: Juan y Absalón[a], los que fueron enviados por ustedes, después de entregar el documento escrito, preguntaron acerca de los asuntos indicados por él.
  to: Juan y Absalón[a], quienes fueron enviados de parte de ustedes, después de entregar el documento escrito, preguntaron acerca de los asuntos indicados en él.
  rationale: Se ajusta 'por ustedes' a 'de parte de ustedes' para reflejar mejor el valor de procedencia de παρʼ ὑμῶν, y 'indicados por él' a 'indicados en él' para que el referente sea claramente el documento y suene natural en español. También se reemplaza 'los que fueron enviados' por 'quienes fueron enviados' para mayor fluidez.
