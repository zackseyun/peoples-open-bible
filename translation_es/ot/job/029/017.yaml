translation:
  language: es
  text: Quebré los colmillos[a] del injusto[b], y de sus dientes arranqué la presa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quijadas». El término hebreo puede referirse más ampliamente a los dientes o huesos de la mandíbula, pero aquí la imagen depredadora favorece «colmillos».
    reason: lexical_alternative
  - marker: b
    text: O «el malvado» o «el que obra injustamente». El hebreo enfatiza la conducta injusta o wrongful del agresor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲשַׁבְּרָה
  english_pob_choice: I broke
  chosen_spanish: Quebré
  alternatives_spanish:
  - Rompí
  - Desmenucé
  lexicon: HALOT
  rationale: שׁבר expresa quebrar o romper con fuerza. «Quebré» conserva el golpe verbal breve y enérgico del hebreo, sin intensificar innecesariamente.
- source_word: מְתַלְּעוֹת
  english_pob_choice: fangs
  chosen_spanish: colmillos
  alternatives_spanish:
  - mandíbulas
  - dientes de presa
  lexicon: HALOT
  rationale: El término puede aludir a las piezas dentales de la mandíbula, pero en el marco de imagen depredadora encaja mejor «colmillos» en español; mantiene la fuerza figurada sin sonar técnico o torpe.
- source_word: עַוָּל
  english_pob_choice: the unrighteous
  chosen_spanish: el injusto
  alternatives_spanish:
  - el malvado
  - el inicuo
  - el que obra injustamente
  lexicon: HALOT
  rationale: El hebreo destaca la cualidad de obrar con injusticia o wrongfully. «El injusto» preserva ese sentido moral-jurídico de manera natural en español, sin cargarlo de matiz más amplio que «malvado».
- source_word: וּמִשִּׁנָּיו
  english_pob_choice: from his teeth
  chosen_spanish: de sus dientes
  alternatives_spanish:
  - de entre sus dientes
  - de sus colmillos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de sus dientes». En español, «de sus dientes» es claro y directo; evita añadir un matiz espacial que el texto no exige.
- source_word: אַשְׁלִיךְ
  english_pob_choice: I snatched
  chosen_spanish: arranqué
  alternatives_spanish:
  - arrebataré
  - saqué
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea puede abarcar arrojar/cast, el contexto y la revisión inglesa subrayan la acción de retirar con fuerza lo retenido por el agresor. «Arranqué» comunica bien esa extracción en español, con violencia controlada y naturalidad.
- source_word: טָרֶף
  english_pob_choice: the prey
  chosen_spanish: la presa
  alternatives_spanish:
  - el botín
  - la víctima
  lexicon: HALOT
  rationale: טָרֶף es «presa» en la imagen de depredación. «La presa» conserva el paralelismo animal del versículo y sugiere claramente lo arrebatado al injusto.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «threw» a «snatched» para reflejar mejor el hebreo en la segunda hemistiquio. En español se siguió esa corrección con «arranqué», que expresa extracción enérgica desde la boca del agresor, en vez de un simple gesto de arrojar. La primera mitad mantiene la imagen corporal violenta con «quebré los colmillos» y el sustantivo «el injusto» para conservar el matiz moral de עַוָּל.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo corporal entre «colmillos» y «dientes», evitando variar innecesariamente la imaginería.
  - «Injusto» preserva el énfasis ético del hebreo, coherente con el uso de POB para עַוָּל.
  - La construcción verbal en pasado simple suena natural en español y conserva el tono testimonial del discurso de Job.
