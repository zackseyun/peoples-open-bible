translation:
  language: es
  text: Y se revelará[a] la gloria de Yahvé, y toda carne[b] verá juntamente, porque la boca de Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será manifestada». El hebreo nifal admite la idea de manifestación o revelación.
    reason: alternative_reading
  - marker: b
    text: 'O «toda la humanidad». Hebreo: «toda carne».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִגְלָה
  english_pob_choice: will be revealed
  chosen_spanish: se revelará
  alternatives_spanish:
  - será revelada
  - se manifestará
  lexicon: HALOT
  rationale: El nifal expresa pasividad o manifestación; en español, «se revelará» conserva la idea de que la gloria queda al descubierto sin añadir un sujeto agente explícito.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvé
  - la gloria del Yahvé
  lexicon: HALOT
  rationale: «כָבוֹד» se mantiene como «gloria», y el nombre divino se traduce con el criterio del proyecto como «Yahvé», preservando el peso teológico del constructo hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Yahweh
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre divino adoptada por el proyecto, en vez de ocultarlo con un título.
- source_word: וְרָאוּ
  english_pob_choice: will see
  chosen_spanish: la verá
  alternatives_spanish:
  - verá
  - contemplará
  lexicon: HALOT
  rationale: El hebreo tiene sujeto plural implícito; en español, «la verá» retoma «la gloria» de manera natural y evita añadir un objeto no explícito distinto del texto.
- source_word: כָל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «carne» para no diluir el alcance universal ni perder la carga antropológica concreta del idiom. En español, «toda carne» es entendible y mantiene la tensión literal.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - a una
  - en conjunto
  lexicon: HALOT
  rationale: «יַחְדָּו» enfatiza el alcance colectivo; «juntamente» es una solución formal y natural que preserva la simultaneidad/unidad del ver.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón o fundamento de la afirmación anterior; «porque» es la equivalencia española más directa y clara.
- source_word: פִּי יְהוָה
  english_pob_choice: the mouth of Yahweh
  chosen_spanish: la boca de Yahvé
  alternatives_spanish:
  - la boca de Yahvé
  - la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo («boca») en lugar de suavizarla a «palabra», porque el texto apela a la fuerza concreta de la expresión divina.
- source_word: דִּבֵּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - ha declarado
  lexicon: HALOT
  rationale: El perfecto queda bien en español con pretérito perfecto compuesto; «ha hablado» sigue de cerca el verbo hebreo y expresa una palabra ya emitida y por eso segura.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto, se preserva el nombre propio de Dios en español en vez de sustituirlo por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Whether to render כָל בָּשָׂר literally or dynamically
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda la humanidad
  - todos
  rationale: La imagen hebrea es deliberadamente corpórea y universal. «Toda carne» mantiene la tensión entre literalidad e idiomatismo sin borrar la connotación de criatura humana mortal.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue el alto acuerdo del control cruzado y refleja la revisión que eliminó cualquier pronombre añadido no explícito en el hebreo. Se conservan la pasiva profética, el nombre divino y la imagen de «carne» con un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva el paralelismo entre «se revelará», «la verá» y «ha hablado» sin introducir objetos implícitos ajenos al texto.
  - «Toda carne» se mantiene para respetar la imaginería hebrea y la tensión universal del verso.
  - La puntuación refleja un enunciado profético coordinado con dos miembros y una cláusula causal final.
