translation:
  language: es
  text: Antes del granizo[a], el relámpago destella; y al humilde[b] le precede el favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego suministrado aquí lee en cambio: «El sacrificio de un hombre justo es aceptable, y su memorial no será olvidado», lo que refleja una tradición textual o una alineación de versículos distinta del hebreo conservado.'
    reason: textual_variant
  - marker: b
    text: O «el bajo» o «el abatido». El término hebreo puede denotar a quien es humilde o a quien ha sido rebajado.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: El valor temporal/secuencial del hebreo se expresa con naturalidad en español con «antes de», manteniendo la relación de precedencia entre los dos miembros del proverbio.
- source_word: בָרָד
  english_pob_choice: hail
  chosen_spanish: granizo
  alternatives_spanish:
  - pedrisco
  - granizada
  lexicon: HALOT
  rationale: «Granizo» es el equivalente directo y más natural en español general para el fenómeno meteorológico del texto.
- source_word: יִנְצַח
  english_pob_choice: flashes forth / goes forth
  chosen_spanish: destella
  alternatives_spanish:
  - sale
  - aparece primero
  - brilla
  lexicon: HALOT
  rationale: El verbo es difícil en este contexto. Dado el paralelismo con el segundo miembro y la imagen meteorológica, «destella» comunica bien la irrupción visible del relámpago antes del granizo sin añadir un sentido no atestiguado.
- source_word: בָּרָק
  english_pob_choice: lightning
  chosen_spanish: relámpago
  alternatives_spanish:
  - rayo
  - fulgor
  lexicon: HALOT
  rationale: «Relámpago» es el término más claro y idiomático para el fenómeno emparejado con el granizo.
- source_word: דַכָּא
  english_pob_choice: the humble
  chosen_spanish: el humilde
  alternatives_spanish:
  - el bajo
  - el abatido
  - el oprimido
  lexicon: HALOT
  rationale: El hebreo puede denotar al humilde o al abatido. En este proverbio sapiencial, «el humilde» conserva la fuerza ética y evita una lectura excesivamente material de «abatido» o «oprimido».
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  - encanto
  lexicon: HALOT
  rationale: En contexto sapiencial/social, חֵן suele significar favor o aceptación favorable; «favor» es la opción más precisa y transparente en español.
theological_decisions:
- issue: Seguimiento del texto hebreo frente al paralelo griego divergente
  english_pob_reading: The Hebrew proverb is primary; the supplied Greek witness reflects a different textual tradition or verse alignment and is noted only as a variant.
  chosen_spanish_reading: 'Se traduce el proverbio hebreo conservado: «Antes del granizo, el relámpago destella; y antes del humilde, sale el favor».'
  alternative_spanish_readings:
  - «El sacrificio de un hombre justo es aceptable, y su memoria no será olvidada»
  - «El sacrificio de un justo es agradable, y su memorial no será olvidado»
  rationale: Siguiendo la filosofía del proyecto, cuando el hebreo de Sirácides está disponible se toma como texto primario. El griego citado no corresponde al hebreo de este versículo y parece pertenecer a otra tradición o alineación. Por eso se mantiene en nota como variante textual, no en el cuerpo del texto.
  doctrine_reference: 'PHILOSOPHY.md: priorizar el hebreo en Sirácides cuando se conserva; usar el griego como testimonio secundario con anotación explícita.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que ajustó la segunda cláusula hacia «the humble» y eliminó añadidos no presentes en el hebreo, además de preferir una formulación verbal más cercana al original. La versión española refleja esa decisión y evita introducir complementos ajenos al texto.
  spanish_consistency_notes:
  - Se mantiene «favor» para חֵן, coherente con el uso sapiencial del término y con la opción inglesa auditada.
  - Se conserva la correspondencia secuencial de «antes de... y antes de...», en vez de paraphrasear la relación temporal.
  - No se usa terminología eclesiástica tradicional no requerida por el texto; la redacción sigue el proverbio hebreo de manera directa y legible.
