translation:
  language: es
  text: 'Hasta los cipreses[a] se alegran por ti, los cedros del Líbano: «Desde que has yacido, no sube el talador contra nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juníperos» o «abetos»; la especie exacta designada por el término hebreo es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Sí, hasta
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: גַּם añade énfasis e inclusión inesperada en el canto de burla. En español, “Sí, hasta” conserva ese matiz enfático mejor que un simple “también”.
- source_word: בְּרוֹשִׁים
  english_pob_choice: cypresses
  chosen_spanish: cipreses
  alternatives_spanish:
  - juníperos
  - abetos
  lexicon: HALOT
  rationale: El término hebreo designa una conífera de identificación botánica incierta. “Cipreses” es una opción natural y clara en español, manteniendo la referencia arbórea sin fijar indebidamente la especie exacta.
- source_word: שָׂמְח֥וּ לְךָ
  english_pob_choice: rejoice over you
  chosen_spanish: se alegran por ti
  alternatives_spanish:
  - se alegran de ti
  - se regocijan por ti
  lexicon: HALOT
  rationale: La preposición ל con שׂמח puede expresar alegría por causa de alguien. “Se alegran por ti” comunica bien el sentido idiomático y el tono de burla sin sonar forzado.
- source_word: אַרְזֵי לְבָנ֑וֹן
  english_pob_choice: the cedars of Lebanon
  chosen_spanish: los cedros del Líbano
  alternatives_spanish:
  - los cedros de لبنان
  - los cedros del Líbano
  lexicon: HALOT
  rationale: Es una construcción estable y transparente en español, equivalente al sintagma constructo hebreo y acorde al imaginario poético del Líbano.
- source_word: מֵ/אָ֣ז
  english_pob_choice: Since
  chosen_spanish: Desde que
  alternatives_spanish:
  - Desde el momento en que
  - Ever since
  lexicon: HALOT
  rationale: La partícula marca el tiempo desde la caída del rey. “Desde que” es natural en español y conserva el valor temporal de inicio.
- source_word: שָׁכַ֔בְתָּ
  english_pob_choice: you have lain down
  chosen_spanish: te has acostado
  alternatives_spanish:
  - has yacido
  - te has echado
  lexicon: HALOT
  rationale: El hebreo conserva la metáfora de yacer/acostarse. “Te has acostado” mantiene el tropo sin explicitarlo como “moriste”, preservando la tensión poética documentada por la POB inglesa.
- source_word: לֹֽא יַעֲלֶ֥ה
  english_pob_choice: no ... comes up
  chosen_spanish: no sube
  alternatives_spanish:
  - no volverá a subir
  - no asciende
  lexicon: HALOT
  rationale: El imperfecto presenta la situación resultante continua. “No sube” reproduce de manera concisa la imagen del talador que ya no asciende a cortar.
- source_word: הַ/כֹּרֵ֖ת
  english_pob_choice: woodcutter
  chosen_spanish: el talador
  alternatives_spanish:
  - el leñador
  - el cortador
  lexicon: HALOT
  rationale: El participio de כרת designa al que corta árboles. “Talador” es claro y mantiene el matiz de cortar con fuerza; evita domesticarlo a un término más general como “leñador”.
- source_word: עָלֵֽי/נוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - hacia nosotros
  lexicon: HALOT
  rationale: En la imagen de tala, la dirección es hostil. “Contra nosotros” refleja mejor esa fuerza que una traducción más literal pero menos idiomática como “sobre nosotros”.
theological_decisions:
- issue: Personificación de los árboles en un canto de burla
  english_pob_reading: The trees are personified within a taunt song against the fallen king of Babylon.
  chosen_spanish_reading: Los árboles conservan la personificación poética dentro de una burla contra el rey caído, sin convertir el verso en una explicación prosaica.
  alternative_spanish_readings:
  - Los árboles literalmente celebran
  - Los árboles representan una reducción de la tala
  rationale: El contexto literario es una sátira poética. Mantener la personificación evita aplanar el texto y preserva su tono de burla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Sentido de שָׁכַבְתָּ en contexto
  english_pob_reading: Retain the metaphor 'you have lain down' rather than explicitly translating 'you died.'
  chosen_spanish_reading: Se conserva la metáfora con “te has acostado” en lugar de explicitar “has muerto”.
  alternative_spanish_readings:
  - has muerto
  - has sido abatido
  rationale: La expresión hebrea es figurada y se presta a la ironía del canto. Traducirla de forma directa manteniendo la metáfora sigue la decisión auditada de la POB inglesa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje coincide con el testimonio hebreo masorético y con la auditoría inglesa de la POB en lectura y decisiones principales. No se identificaron revisiones aplicadas; se preservó la metáfora de ‘acostarse’ y la personificación arbórea, y se mantuvo la incertidumbre botánica en nota.
  spanish_consistency_notes:
  - Se emplea “Yahvé” como terminología por defecto solo cuando aparece el tetragrámaton; aquí no hay ocurrencia.
  - Se mantiene el tono poético con puntuación de cita breve y dos puntos para introducir el discurso de los árboles.
  - “Talador” conserva la fuerza del participio hebreo sin caer en un equivalente excesivamente genérico.
