revisions:
- from: Y así harás en el séptimo día del mes, por cualquiera que peca por error[a] o por simplicidad; así harás expiación por la casa[b].
  to: Y así harás el séptimo día del mes, por cualquiera que peque por error o por simplicidad[a]; así haréis expiación por el templo[b].
  rationale: Se corrigió el número verbal de וְכִפַּרְתֶּם a plural («haréis»), se mejoró la naturalidad de la fecha, se mantuvo la fuerza genérica de אִישׁ con una formulación más fluida, y se alineó el referente principal de הַבָּיִת con el English POB usando «el templo» en el texto y «la casa» en nota. También se rehízo la nota [a] para reflejar con precisión la alternativa léxica y sintáctica documentada en la auditoría inglesa.
  reviewer_model: gpt-5.4
