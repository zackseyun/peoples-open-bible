translation:
  language: es
  text: los cinco gobernantes de los filisteos, y todos los cananeos, y los sidonios, y los heveos que habitaban en la región montañosa del Líbano, desde el monte Baal-hermón hasta Lebo-hamat[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta la entrada de Hamat». La expresión hebrea puede entenderse tanto como nombre de lugar, Lebo-hamat, como de manera descriptiva.'
    reason: alternative_reading
lexical_decisions:
- source_word: סַרְנֵי
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - jefes
  - príncipes
  - señores
  lexicon: HALOT
  rationale: El término designa líderes políticos filisteos. «Gobernantes» comunica bien la función sin la carga feudal de «señores» ni la posible impropiedad histórica de «príncipes».
- source_word: פְלִשְׁתִּים
  english_pob_choice: Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - filisteos
  lexicon: HALOT
  rationale: Etnónimo estándar en español bíblico, claro y natural.
- source_word: כָל הַכְּנַעֲנִי
  english_pob_choice: all the Canaanites
  chosen_spanish: todos los cananeos
  alternatives_spanish:
  - todo Canaán
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular colectiva, aquí funciona como grupo étnico; el plural español expresa mejor la referencia colectiva.
- source_word: הַצִּידֹנִי
  english_pob_choice: the Sidonians
  chosen_spanish: los sidonios
  alternatives_spanish:
  - los de Sidón
  - el pueblo sidonio
  lexicon: HALOT
  rationale: La singular colectiva hebrea se vierte naturalmente con el etnónimo plural en español.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: los heveos
  alternatives_spanish:
  - los hivitas
  - el pueblo heveo
  lexicon: HALOT
  rationale: Se prefiere «heveos» por ser el etnónimo bíblico más asentado en español y más inteligible para lectores de Biblia.
- source_word: יֹשֵׁב
  english_pob_choice: who lived
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - moradores de
  lexicon: HALOT
  rationale: El participio describe ubicación habitual en pasado; «habitaban» mantiene el valor durativo y suena natural en español.
- source_word: הַר הַלְּבָנוֹן
  english_pob_choice: the hill country of Lebanon
  chosen_spanish: la región montañosa del Líbano
  alternatives_spanish:
  - la serranía del Líbano
  - la zona montañosa del Líbano
  - el monte del Líbano
  lexicon: HALOT
  rationale: El hebreo apunta al territorio montañoso, no a un pico único. «Región montañosa» evita la lectura de un monte específico y preserva el sentido geográfico.
- source_word: מֵהַר בַּעַל חֶרְמוֹן
  english_pob_choice: from Mount Baal-hermon
  chosen_spanish: desde el monte Baal-hermón
  alternatives_spanish:
  - desde el monte Baal Hermón
  lexicon: HALOT
  rationale: Se conserva el topónimo con transliteración española y acento gráfico en Hermón según uso normal del nombre propio.
- source_word: עַד לְבוֹא חֲמָת
  english_pob_choice: as far as Lebo-hamath
  chosen_spanish: hasta Lebo-hamat
  alternatives_spanish:
  - hasta la entrada de Hamat
  - hasta Lebo-hamat[a]
  lexicon: HALOT
  rationale: La secuencia puede leerse como topónimo fijo o como expresión descriptiva. Se mantiene el nombre propio en una forma española breve y reconocible, sin resolver indebidamente la ambigüedad en el texto principal.
theological_decisions:
- issue: Alcance geográfico de la cláusula final
  english_pob_reading: The Hebrew expression can be understood either as a place name, Lebo-hamath, or descriptively.
  chosen_spanish_reading: La expresión puede entenderse como topónimo, Lebo-hamat, o descriptivamente como «la entrada de Hamat».
  alternative_spanish_readings:
  - Lebo-hamat
  - la entrada de Hamat
  rationale: Se preserva la tensión interpretativa documentada por la POB inglesa. El texto principal usa el topónimo; la nota recoge la alternativa descriptiva sin perder la ambigüedad del hebreo.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y la evaluación de concordancia; no se documentaron cambios adicionales aplicados al contenido base. La redacción española sigue la decisión óptima ya establecida, con una nota para la ambigüedad final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «filisteos», «cananeos», «sidonios» y «heveos» como etnónimos naturales en español.
  - Se evita la traducción mecánica de «hill country» como «colina» o «monte» único; se interpreta como región montañosa.
  - Se conserva la ambigüedad de לְב֥וֹא חֲמָת mediante nota, como en la POB inglesa.
