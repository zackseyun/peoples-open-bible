translation:
  language: es
  text: Entonces los hijos de Israel enviaron a Finees, hijo de Eleazar, el sacerdote, a los hijos de Rubén[a], a los hijos de Gad y a la media tribu de Manasés, en la tierra de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: "los israelitas enviaron a Finees ... a los rubenitas, a los gaditas y a la media tribu de Manasés".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... enviaron
  alternatives_spanish:
  - Y ... enviaron
  - Luego ... enviaron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; 'Entonces' preserva bien esa progresión temporal en español sin sonar mecánico.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de forma transparente, como en el audit trail inglés, y 'hijos' es natural en español bíblico.
- source_word: בְנֵי רְאוּבֵן
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los rubenitas
  lexicon: HALOT
  rationale: Se mantiene la construcción hebrea literal para dejar visible el paralelismo con las otras tribus y evitar sustituirla por el gentilicio.
- source_word: בְנֵי גָד
  english_pob_choice: the sons of Gad
  chosen_spanish: los hijos de Gad
  alternatives_spanish:
  - los gaditas
  lexicon: HALOT
  rationale: Paralelo a 'los hijos de Rubén'; conserva la formulación fuente y la simetría del hebreo.
- source_word: חֲצִי שֵׁבֶט מְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: '''Media tribu'' es la forma más natural y establecida en español bíblico para este constructo, y refleja bien la relación partitiva del hebreo.'
- source_word: אֶל אֶרֶץ הַגִּלְעָד
  english_pob_choice: in the land of Gilead
  chosen_spanish: a la tierra de Galaad
  alternatives_spanish:
  - en la tierra de Galaad
  - hacia la tierra de Galaad
  lexicon: HALOT
  rationale: Aquí אֶל introduce el destino del envío; 'a la tierra de Galaad' reproduce el valor direccional del hebreo con naturalidad en español.
- source_word: אֶת פִּינְחָס
  english_pob_choice: Phinehas
  chosen_spanish: Finees
  alternatives_spanish:
  - Fines
  lexicon: HALOT
  rationale: Se translitera el nombre propio según uso bíblico tradicional en español, manteniendo reconocimiento lector.
- source_word: בֶּן אֶלְעָזָר
  english_pob_choice: son of Eleazar
  chosen_spanish: hijo de Eleazar
  alternatives_spanish:
  - descendiente de Eleazar
  lexicon: HALOT
  rationale: La construcción patronímica se vierte de forma directa y fiel al hebreo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el sacerdote
  lexicon: HALOT
  rationale: '''Sacerdote'' comunica la función cultual del término con claridad en español; en este contexto identifica a Eleazar por su oficio.'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con el audit trail inglés; la corrección necesaria fue anclar la nota [a] en la forma abreviada 'Rubén[a]' dentro del texto para cumplir la validación.
  spanish_consistency_notes:
  - Se mantuvo 'Finees' como transliteración española tradicional del nombre hebreo Phinehas.
  - Se usó 'hijos de Israel' y 'hijos de Rubén/Gad' para conservar la transparencia estructural del hebreo.
  - '''Tierra de Galaad'' sigue el uso bíblico español habitual para הַגִּלְעָד.'
  - No se introdujeron notas teológicas porque el versículo es narrativo y no presenta tensión doctrinal específica.
