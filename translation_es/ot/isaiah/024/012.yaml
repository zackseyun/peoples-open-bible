  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: נִשְׁאַר = «queda», בָּעִיר = «en la ciudad», y la segunda colon expresa la destrucción de la puerta. Sin embargo, «la puerta» para שָׁעַר es menos preciso que «la puerta de la ciudad» o «la puerta», y el giro «hasta quedar en ruina» suena algo forzado para וּשְׁאִיָּה יֻכַּת. Una formulación más natural y fiel al valor resultativo es «la puerta queda reducida a ruinas» o «es derribada hasta quedar en ruinas».'
  spanish_quality_summary: El español es comprensible, pero «Desolación queda en la ciudad» suena algo rígido; «Solo queda desolación en la ciudad» sería más idiomático, aunque añade «solo». Sin añadir matiz no expreso, «Queda desolación en la ciudad» mejora la fluidez. Además, «en ruina» es menos natural que «en ruinas», y «hasta quedar en ruina» resulta pesado. La frase revisada mantiene dignidad y legibilidad eclesial.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Las decisiones léxicas principales encajan con el proyecto. El ajuste recomendado es estilístico-lexical: preferir «ruinas» para שְׁאִיָּה en español idiomático, sin perder la cercanía semántica con «desolación».'
  issues:
