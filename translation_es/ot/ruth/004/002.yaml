translation:
  language: es
  text: 'Entonces tomó a diez hombres de entre los ancianos de la ciudad y dijo[a]: «Siéntense aquí», y se sentaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escogió a diez hombres de entre los ancianos de la ciudad». El verbo hebreo puede implicar tomar con un propósito; aquí probablemente se trata de seleccionar testigos para el procedimiento legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - eligió
  - seleccionó
  - reunió
  lexicon: HALOT
  rationale: לקח en narrativa con waw consecutivo se traduce de manera más directa con «tomó». En este contexto puede implicar escoger para un propósito legal; «tomó» conserva esa ambigüedad sin volver el texto pesado. Se evita «seleccionó» en el cuerpo por ser más interpretativo, aunque queda como alternativa válida.
- source_word: עֲשָׂרָה אֲנָשִׁים
  english_pob_choice: ten men
  chosen_spanish: diez hombres
  alternatives_spanish:
  - diez personas
  - diez varones
  lexicon: HALOT
  rationale: La expresión es masculina y se refiere a participantes adultos en un acto público y jurídico. «Hombres» mantiene el valor de género del hebreo y la fuerza legal de la escena mejor que una forma genérica.
- source_word: מִזִּקְנֵי הָעִיר
  english_pob_choice: from the elders of the city
  chosen_spanish: de entre los ancianos de la ciudad
  alternatives_spanish:
  - de los ancianos de la ciudad
  - entre los ancianos de la ciudad
  lexicon: HALOT
  rationale: זקני העיר designa a los líderes reconocidos de la comunidad. «Ancianos» reproduce el término social y judicial del hebreo; «de entre» expresa con naturalidad el matiz partitivo de מִן y evita una lectura demasiado rígida.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - les habló
  lexicon: HALOT
  rationale: El verbo narrativo básico אמר se vierte con «dijo». No hace falta ampliar el destinatario porque el contexto ya lo muestra en el discurso directo siguiente.
- source_word: שְׁבוּ
  english_pob_choice: Sit
  chosen_spanish: Sentaos
  alternatives_spanish:
  - Sentaos aquí
  - Tomad asiento
  lexicon: HALOT
  rationale: El imperativo plural de ישב en este marco judicial pide que tomen su lugar. En español, «sentaos» preserva la forma imperativa breve y digna; «tomad asiento» sería más idiomático en algunas variantes, pero menos directo.
- source_word: פֹה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: פֹה es un adverbio deíctico simple. «Aquí» es la equivalencia natural y clara en español.
- source_word: וַיֵּשֵׁבוּ
  english_pob_choice: they sat down
  chosen_spanish: se sentaron
  alternatives_spanish:
  - tomaron asiento
  - quedaron sentados
  lexicon: HALOT
  rationale: La forma narrativa de ישב en respuesta al mandato se expresa con «se sentaron», que suena natural en español y conserva la secuencia acción-reacción del hebreo.
theological_decisions:
- issue: Posible matiz legal de la escena y la selección de testigos
  english_pob_reading: The Hebrew verb can imply taking for a purpose, here likely selecting witnesses for the legal proceeding.
  chosen_spanish_reading: El verbo puede implicar tomar con propósito, aquí probablemente escoger testigos para el procedimiento legal.
  alternative_spanish_readings:
  - simplemente tomó
  - reunió a diez hombres
  rationale: No se pierde la tensión semántica del verbo. En el texto principal se mantiene la lectura sobria «tomó», mientras la nota explica que el acto probablemente tiene función jurídica de testigos.
  doctrine_reference: contexto jurídico narrativo; no doctrinal
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios y que el acuerdo con el texto fuente era alto. Esta versión mantiene esa línea: conserva la ambigüedad del verbo hebreo, respeta el plural masculino y usa un español natural, sin suavizar el contexto jurídico.'
  spanish_consistency_notes:
  - «Ancianos» se usa para זקני, manteniendo el término comunitario y judicial del hebreo.
  - Se eligió «Sentaos» como forma plural reverente/narrativa; si se prefiere registro neutro moderno, «Siéntense» sería una alternativa de estilo, no de sentido.
  - La puntuación reproduce con claridad la cita directa y la secuencia narrativa.
  - No se introduce «testigos» en el cuerpo del versículo para no adelantar la inferencia interpretativa más allá del texto; eso queda en la nota.
