translation:
  language: es
  text: 'Y se completaron los asuntos del sacrificio de Yahvé en aquel día: la Pascua fue ofrecida[a], y los sacrificios fueron llevados al altar de Yahvé, conforme al mandato del rey Josías[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la Pascua fue llevada»; el griego usa lenguaje sacrificial que también puede traducirse «llevada», «presentada» u «ofrecida».
    reason: lexical_alternative
  - marker: b
    text: «Josías» corresponde aquí al nombre griego; en el paralelo hebreo aparece la forma «Josías/Josiah».
    reason: alternative_reading
lexical_decisions:
- source_word: συνετελέσθη
  english_pob_choice: were completed
  chosen_spanish: se completaron
  alternatives_spanish:
  - se terminaron
  - quedaron cumplidos
  lexicon: LSJ
  rationale: El aoristo pasivo indica conclusión de las acciones sacrificiales. «Se completaron» mantiene la idea de terminación formal sin endurecer demasiado el español.
- source_word: τὰ τῆς θυσίας τοῦ κυρίου
  english_pob_choice: the matters of the Lord’s sacrifice
  chosen_spanish: los asuntos del sacrificio de Yahvé
  alternatives_spanish:
  - las cosas del sacrificio de Yahvé
  - los asuntos de la ofrenda de Yahvé
  lexicon: LSJ
  rationale: La expresión griega es amplia e idiomática; «asuntos» conserva el alcance de los procedimientos o trámites ligados al sacrificio. Se usa «Yahvé» por la norma del proyecto para κύριος en contexto veterotestamentario, con el matiz culto conservado.
- source_word: ἀχθῆναι τὸ πάσχα
  english_pob_choice: the Passover was offered
  chosen_spanish: el Pascua fue ofrecida
  alternatives_spanish:
  - la Pascua fue llevada
  - la Pascua fue presentada
  lexicon: LSJ
  rationale: El verbo literalmente puede significar «ser llevado», pero en contexto sacrificial admite «ofrecer». Se mantiene el valor cultual; «Pascua» se toma como sustantivo festivo/sacrificial.
- source_word: προσαχθῆναι τὰς θυσίας
  english_pob_choice: the sacrifices were brought up
  chosen_spanish: los sacrificios fueron llevados
  alternatives_spanish:
  - los sacrificios fueron ofrecidos
  - los sacrificios fueron presentados
  lexicon: LSJ
  rationale: προσάγω puede ser «llevar, presentar, ofrecer». Aquí conviene «llevados» para conservar el movimiento hacia el altar que explicita el complemento siguiente, sin perder el sentido sacrificial.
- source_word: ἐπὶ τὸ τοῦ κυρίου θυσιαστήριον
  english_pob_choice: onto the altar of the Lord
  chosen_spanish: al altar de Yahvé
  alternatives_spanish:
  - sobre el altar de Yahvé
  - hacia el altar de Yahvé
  lexicon: LSJ
  rationale: En español, con el verbo «llevar» el complemento «al altar» expresa naturalmente la dirección del griego ἐπί con acusativo. «De Yahvé» sigue la decisión terminológica del nombre divino.
- source_word: κατὰ τὴν ἐπιταγὴν
  english_pob_choice: according to the command
  chosen_spanish: conforme al mandato
  alternatives_spanish:
  - según la orden
  - de acuerdo con el mandato
  lexicon: LSJ
  rationale: ἐπιταγή denota una directiva autorizada; «mandato» comunica mejor la autoridad formal que «orden» en este contexto real y cultual.
- source_word: τοῦ βασιλέως Ἰωσείου
  english_pob_choice: of King Josias
  chosen_spanish: del rey Josías
  alternatives_spanish:
  - del rey Josias
  lexicon: LSJ
  rationale: El nombre griego Ἰωσείου corresponde a la forma española estándar «Josías»; aunque el inglés audit trail conserva «Josias» como forma griega, en español la forma tradicional reconocible es preferible y no contradice el origen griego.
theological_decisions:
- issue: Cómo renderizar κύριος en un contexto cultual veterotestamentario/deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El proyecto establece «Yahvé» para יהוה; en 1 Esdras el griego κύριος suele reflejar la referencia al nombre divino del trasfondo hebreo. Usar «Yahvé» evita la máscara litúrgica y mantiene la identificación teológica subyacente sin perder la dependencia del texto griego.
  doctrine_reference: 'DOCTRINE.md: κύριος / יהוה → Yahvé en el texto principal'
- issue: Forma del nombre propio del rey
  english_pob_reading: Josias
  chosen_spanish_reading: Josías
  alternative_spanish_readings:
  - Josias
  rationale: Aunque la versión inglesa retiene la forma griega «Josias» por fidelidad al 1 Esdras griego, en español la forma estándar y ampliamente reconocible es «Josías». No altera el referente y mejora la legibilidad.
  doctrine_reference: 'DOCTRINE.md: transliteración de nombres con forma idiomática reconocible'
translation_notes:
  revision_awareness: Se consultó el texto griego de Swete LXX 1909 como ancla primaria y el paralelo hebreo solo como control secundario de nombres y marco cultual. La redacción española sigue la lectura griega, preservando la amplitud de τὰ τῆς θυσίας y la secuencia sacrificial del versículo. Se adoptó la forma española «Josías» por claridad, y se mantuvo el nombre divino «Yahvé» conforme a la terminología del proyecto.
  spanish_consistency_notes:
  - Se evita el calco rígido «las cosas de la sacrificio»; «asuntos del sacrificio» conserva idiomatismo y amplitud semántica.
  - «Pascua» se conserva como nombre de la fiesta/sacrificio, no como verbo ni como simple comida ritual.
  - Se mantiene el paralelismo entre la conclusión de los ritos y el traslado de los sacrificios al altar.
  - La puntuación con dos puntos reproduce la transición explicativa del original y ayuda a la lectura en español.
