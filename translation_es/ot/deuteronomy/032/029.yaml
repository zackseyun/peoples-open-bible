translation:
  language: es
  text: ¡Ojalá fueran sabios, entendieran[a] esto y discernieran su fin!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «obraran con prudencia» o «adquirieran discernimiento». El hebreo puede abarcar tanto comprensión como conducta sabia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ל֥וּ
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá!
  alternatives_spanish:
  - Si solo
  - Si tan solo
  lexicon: HALOT
  rationale: La partícula expresa un deseo/queja optativa, no una condición simple. En español, «¡Ojalá!» reproduce con naturalidad ese tono de anhelo lamentoso.
- source_word: חָכְמ֖וּ
  english_pob_choice: they were wise
  chosen_spanish: fueran sabios
  alternatives_spanish:
  - tuvieran sabiduría
  - se hicieran sabios
  lexicon: HALOT
  rationale: El verbo refleja la idea de poseer o ejercer sabiduría. «Fueran sabios» conserva la fuerza predicativa y encaja con la estructura optativa del verso.
- source_word: יַשְׂכִּ֣ילוּ
  english_pob_choice: they would understand
  chosen_spanish: entendieran
  alternatives_spanish:
  - obraran con prudencia
  - adquirieran discernimiento
  lexicon: HALOT
  rationale: El hifil de שׂכל puede implicar comprender o actuar con entendimiento. Aquí el paralelo con «discernieran» favorece un verbo de comprensión directa en español.
- source_word: זֹ֑את
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - estas cosas
  lexicon: HALOT
  rationale: El demostrativo singular mantiene la referencia inmediata y no amplía indebidamente el alcance del objeto señalado.
- source_word: יָבִ֖ינוּ
  english_pob_choice: they would discern
  chosen_spanish: discernieran
  alternatives_spanish:
  - entendieran
  - consideraran
  lexicon: HALOT
  rationale: De בין, con matiz de percibir o distinguir. Se traduce distinto de יַשְׂכִּילוּ para preservar el paralelismo poético y la doble cadencia cognitiva.
- source_word: לְאַחֲרִיתָם
  english_pob_choice: their end
  chosen_spanish: su fin
  alternatives_spanish:
  - su último destino
  - su futuro
  lexicon: HALOT
  rationale: אַחֲרִית puede indicar desenlace, consecuencia final o futuro. «Su fin» mantiene concisión y el sentido de desenlace/jucio presente en el contexto del Cántico.
theological_decisions:
- issue: Sentido de אַחֲרִיתָם en el contexto del juicio
  english_pob_reading: their end
  chosen_spanish_reading: su fin
  alternative_spanish_readings:
  - su futuro
  - su último destino
  rationale: El verso exhorta a reconocer el desenlace moral y judicial que les aguarda. «Su fin» conserva esa carga sin suavizarla hacia un futuro meramente temporal.
  doctrine_reference: Deuteronomio 32:29; cf. principio de retribución del Cántico de Moisés
translation_notes:
  revision_awareness: El inglés auditado fue revisado solo en puntuación inicial para mayor naturalidad; la traducción española conserva la estructura optativa, el paralelismo cognitivo y la referencia ambigua pero orientada al desenlace final.
  spanish_consistency_notes:
  - Se usa «Ojalá» para la fuerza optativa de ל֥וּ, en lugar de un condicional simple.
  - Se mantiene la distinción entre «entendieran» y «discernieran» para reflejar los dos verbos hebreos paralelos.
  - «Su fin» sigue la terminología POB de «their end» y no la sustituye por un giro más interpretativo.
  - El tono es reverente y publicable en español latinoamericano, sin arcaísmos innecesarios.
