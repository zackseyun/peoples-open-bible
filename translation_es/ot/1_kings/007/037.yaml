  glossary_alignment: No hay términos teológicos sensibles en este versículo. La elección de «soportes» para הַמְּכֹנוֹת concuerda con la línea de evitar una especificación excesiva. Se mantiene fielmente el énfasis de uniformidad documentado en el English POB.
