translation:
  language: es
  text: Ciertamente[a], yo lo constituiré el primogénito, el más alto de los reyes de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el preeminente'; 'primogénito' aquí denota rango y privilegio, no necesariamente orden literal de nacimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף
  english_pob_choice: Indeed
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Además
  - También
  - Seguro
  lexicon: HALOT
  rationale: La partícula introduce énfasis y una nueva afirmación divina; 'Ciertamente' conserva ese valor enfático en español natural sin reducirla a simple adición.
- source_word: אָ֭נִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente está explícito en hebreo y aporta énfasis al hablante; en español puede mantenerse con 'yo' sin forzar el ritmo.
- source_word: בְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - el primogénito
  - el preeminente
  - el heredero
  lexicon: HALOT
  rationale: '''Primogénito'' reproduce el término de estatus y privilegio. En español evita una lectura meramente biológica y conserva la tensión entre rango y orden de nacimiento.'
- source_word: אֶתְּנֵהוּ
  english_pob_choice: I will make him
  chosen_spanish: lo haré
  alternatives_spanish:
  - lo pondré
  - lo nombraré
  - lo constituiré
  lexicon: HALOT
  rationale: El verbo נתן con complemento predicativo expresa constituir o hacer alguien algo. 'Lo haré' es idiomático en español y conserva el valor causativo/resultativo.
- source_word: עֶלְיוֹן
  english_pob_choice: the highest
  chosen_spanish: el más alto
  alternatives_spanish:
  - el supremo
  - el exaltado
  - el más elevado
  lexicon: HALOT
  rationale: Como adjetivo de rango relativo a otros reyes, 'el más alto' expresa supremacía comparativa sin convertir la expresión en título divino ('el Altísimo').
- source_word: לְמַלְכֵי אָרֶץ
  english_pob_choice: of the kings of the earth
  chosen_spanish: de los reyes de la tierra
  alternatives_spanish:
  - sobre los reyes de la tierra
  - entre los reyes de la tierra
  lexicon: HALOT
  rationale: La relación marcada por לְ después de un comparativo expresa referencia/comparación. 'De los reyes de la tierra' mantiene la estructura natural en español y comunica que sobresale respecto de ellos.
theological_decisions:
- issue: ‘Primogénito’ como título de rango, no solo de nacimiento
  english_pob_reading: Retain 'the firstborn' as a royal status term of preeminence without making the messianic interpretation explicit in the translation.
  chosen_spanish_reading: Conservar 'primogénito' como término de preeminencia real, sin explicitar en la traducción la identificación mesiánica.
  alternative_spanish_readings:
  - el heredero
  - el preeminente
  rationale: El hebreo designa estatus, herencia y prioridad. Mantener 'primogénito' preserva la tensión teológica y permite la lectura canónica sin resolverla dentro del verso.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El borrador se ajusta al texto hebreo de WLC y al audit trail inglés; se corrigió la anotación para que la marca de nota [a] aparezca explícitamente en el texto español.
  spanish_consistency_notes:
  - He usado 'primogénito' para preservar el término de estatus del hebreo y evitar una paráfrasis más interpretativa.
  - '''El más alto de los reyes de la tierra'' mantiene la comparación jerárquica sin introducir ''sobre'' donde el hebreo usa una relación nominal.'
  - La nota [a] está anclada en 'Ciertamente[a]' para cumplir la validación y señalar la alternativa léxica documentada.
