translation:
  language: es
  text: Vamos[a], volvamos a Yahvé, porque él nos despedazó[b], pero nos sanará; nos hirió, pero nos vendará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y nos sanará... y nos vendará». El hebreo usa simplemente la conjunción «y», pero «pero» aclara el contraste en español.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo sugiere la imagen de una fiera que desgarra a su presa; por eso la traducción conserva la fuerza del daño anunciado.
    reason: cultural_note
lexical_decisions:
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vayamos
  - Vamos
  lexicon: HALOT
  rationale: Es un imperativo plural que introduce una exhortación colectiva. «Vengan» conserva el tono de llamado y resulta natural en español bíblico contemporáneo.
- source_word: וְנָשׁוּבָה
  english_pob_choice: let us return
  chosen_spanish: volvamos
  alternatives_spanish:
  - volvamos de regreso
  - regresemos
  - y volvamos
  lexicon: HALOT
  rationale: La cohortativa expresa resolución compartida; «volvamos» comunica bien la idea de retorno al pacto sin volverla más explicativa de lo que pide el hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Preposición direccional normal en español. Aquí marca el movimiento de retorno hacia Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre divino en español sin sustituirlo por un título.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del llamado a volver. «Porque» mantiene la relación explicativa de forma clara y directa.
- source_word: טָרָף
  english_pob_choice: has torn us
  chosen_spanish: nos despedazó
  alternatives_spanish:
  - nos rasgó
  - nos desgarró
  lexicon: HALOT
  rationale: El verbo evoca el desgarrar de una presa por una fiera. «Despedazar» conserva esa fuerza imagética y la severidad del juicio, sin suavizarla con un término más general.
- source_word: וְיִרְפָּאֵנוּ
  english_pob_choice: but he will heal us
  chosen_spanish: pero nos sanará
  alternatives_spanish:
  - y nos sanará
  - nos curará
  lexicon: HALOT
  rationale: El hebreo trae «y», pero en español el contraste paralelo se expresa mejor con «pero». «Sanará» preserva el campo semántico de curación/restauración con dignidad bíblica y claridad.
- source_word: יַךְ
  english_pob_choice: has struck us
  chosen_spanish: nos hirió
  alternatives_spanish:
  - nos golpeó
  - nos castigó
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfectiva, el paralelismo la presenta junto al daño ya sufrido. «Hirió» mantiene el sentido de causar daño sin volverlo excesivamente coloquial o interpretativo.
- source_word: וְיַחְבְּשֵׁנוּ
  english_pob_choice: but he will bind us up
  chosen_spanish: pero nos vendará
  alternatives_spanish:
  - y nos vendará
  - nos curará
  lexicon: HALOT
  rationale: El verbo significa atar/vendar una herida. «Vendar» en español conserva la metáfora médica y el contraste restaurador con la herida previa.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la decisión POB de no ocultar el Nombre divino detrás de un título. «Yahvé» es la forma española estándar dentro de este proyecto y preserva la referencia personal al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión entre juicio y restauración
  english_pob_reading: has torn us / will heal us; has struck us / will bind us up
  chosen_spanish_reading: nos despedazó, pero nos sanará; nos hirió, pero nos vendará
  alternative_spanish_readings:
  - nos desgarró, y nos sanará; nos golpeó, y nos vendará
  - nos lastimó y nos curará
  rationale: 'La versión española conserva la tensión teológica: el mismo Yahvé que hiere también restaura. Se mantiene el contraste sin neutralizar ni suavizar ninguno de los dos polos.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se revisó la traducción a la luz del paquete fuente hebreo y del rastro auditado en inglés. No hubo revisiones aplicadas en el último paso; la lectura final mantiene el contraste poético y la referencia directa al Nombre divino según la práctica del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - «Sanará» y «vendará» conservan el paralelismo curativo sin volverlo meramente explicativo.
  - «Despedazó» refuerza la imagen animal del hebreo y mantiene la severidad del juicio.
  - Las dos cláusulas concesivas/contrastivas usan «pero» para reflejar el sentido discursivo que el inglés POB también explicitó.
