    reason: lexical_alternative
  revision_rationale: Se ajusta «alrededor» a «todo alrededor» para reflejar mejor la fuerza de סָבִיב סָבִיב sin volver el español torpe. También se pule la nota literal para que suene más natural en español, manteniendo la misma información auditada.
