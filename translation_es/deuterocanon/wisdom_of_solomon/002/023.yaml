  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: Dios creó al hombre con vistas a la ἀφθαρσία y lo hizo a imagen de algo propio de Dios. Conserva correctamente el singular representativo «el hombre», «creó» para ἔκτισε, y «a imagen de» para εἰκόνα ... ἐποίησεν αὐτόν. Sin embargo, una nota léxica introduce «imperdurabilidad», que no corresponde bien a la alternativa inglesa documentada «imperishability» ni suena natural en español bíblico; «imperecibilidad» expresa mejor la gama semántica documentada.'
  spanish_quality_summary: El texto principal es claro, fiel y de buena legibilidad eclesial. «Porque Dios creó al hombre para la incorruptibilidad[a], y lo hizo a imagen de su propia naturaleza[b]» suena natural y digno. La única reparación necesaria es en la nota [a], donde «imperdurabilidad» resulta poco idiomático y menos preciso. En la nota [b], «distintividad» es algo abstracto, pero como alternativa de nota para una frase griega difícil sigue siendo aceptable.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Dios», «hombre», «incorruptibilidad» y «naturaleza» están bien alineados con el expediente inglés y el griego. No intervienen términos sensibles del glosario como Yahvé, Mesías, Espíritu o esclavo. Se recomienda ajustar solo la alternativa española de «imperishability» a «imperecibilidad».'
  issues:
  - severity: medium
    issue: La nota [a] usa «imperdurabilidad» como alternativa para ἀφθαρσία.
    rationale: «Imperdurabilidad» no es la mejor correspondencia para «imperishability» y suena poco natural en español bíblico general. «Imperecibilidad» preserva mejor la idea de no estar sujeto a corrupción o perecer, en línea con la explicación léxica documentada.
  revised_spanish_text: Porque Dios creó al hombre para la incorruptibilidad[a], y lo hizo a imagen de su propia naturaleza[b].
  revised_footnotes:
