translation:
  language: es
  text: Así, los constructores de Salomón, los constructores de Hiram y los hombres de Gebal[a] cortaron y prepararon la madera y las piedras para edificar la casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los gebalitas’ o ‘los giblitas’, es decir, trabajadores de Gebal (Biblos).
    reason: lexical_alternative
  - marker: b
    text: Es decir, la casa de Yahvé, el templo.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּפְסְלוּ
  english_pob_choice: cut
  chosen_spanish: cortaron
  alternatives_spanish:
  - hecharon
  - tallaron
  - desbastaron
  lexicon: HALOT
  rationale: El verbo en este contexto se refiere al trabajo de cortar o dar forma a materiales de construcción. 'Cortaron' es natural en español y puede abarcar tanto madera como piedra; 'tallaron' sugiere más específicamente labrado fino, y 'desbastaron' sería más técnico de lo que pide el verso.
- source_word: בֹּנֵי שְׁלֹמֹה
  english_pob_choice: Solomon’s builders
  chosen_spanish: los constructores de Salomón
  alternatives_spanish:
  - los edificadores de Salomón
  - los obreros de Salomón
  lexicon: HALOT
  rationale: La frase hebrea funciona como designación ocupacional. 'Constructores' comunica el oficio de manera clara en español sin perder la relación posesiva con Salomón.
- source_word: וּבֹנֵי חִירוֹם
  english_pob_choice: Hiram’s builders
  chosen_spanish: los constructores de Hiram
  alternatives_spanish:
  - los edificadores de Hiram
  - los obreros de Hiram
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera expresión, como en el hebreo y en la traducción inglesa auditada.
- source_word: וְהַגִּבְלִים
  english_pob_choice: the men of Gebal
  chosen_spanish: los hombres de Gebal
  alternatives_spanish:
  - los gebalitas
  - los giblitas
  lexicon: HALOT
  rationale: La designación gentilicia se vuelve transparente con 'hombres de Gebal'. Las formas etnónimas más literales quedan disponibles, pero son menos claras para el lector moderno.
- source_word: וַיָּכִינוּ
  english_pob_choice: prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - dejaron listo
  - dispusieron
  lexicon: HALOT
  rationale: כּוּן en hiphil expresa preparar o dejar listo. 'Prepararon' reproduce bien el valor verbal sin añadir matices ajenos.
- source_word: הָעֵצִים
  english_pob_choice: the timber
  chosen_spanish: la madera
  alternatives_spanish:
  - la madera para construcción
  - los maderos
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'timber' para precisar el contexto constructivo, el hebreo dice simplemente 'los árboles/maderas'. En español 'la madera' conserva la amplitud del original y resulta más natural que 'madera de construcción' en este verso.
- source_word: וְהָאֲבָנִים
  english_pob_choice: the stones
  chosen_spanish: las piedras
  alternatives_spanish:
  - los bloques de piedra
  - la piedra
  lexicon: HALOT
  rationale: El hebreo habla de 'las piedras'; 'las piedras' mantiene la forma simple y fiel. 'Bloques de piedra' explicitaría el trabajo de cantería sin que el texto lo diga de manera directa.
- source_word: לִבְנוֹת הַבָּיִת
  english_pob_choice: to build the house
  chosen_spanish: para edificar la casa
  alternatives_spanish:
  - para construir la casa
  - para edificar el templo
  lexicon: HALOT
  rationale: Se conserva 'la casa' porque el hebreo usa בית, y el inglés POB preserva esa forma en el texto principal. 'Edificar' suena más sobrio y bíblico que 'construir' en este contexto.
theological_decisions:
- issue: Sentido de בית ('la casa') en contexto del templo
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - la casa de Yahvé
  rationale: El POB inglés retiene 'the house' en el texto principal para preservar la formulación hebrea, con nota explicativa de que se trata del templo. En español se sigue la misma estrategia para no sustituir el término fuente por una glosa interpretativa.
  doctrine_reference: 1 Reyes 5:32; uso técnico de בית para el santuario
- issue: Identificación de los trabajadores de Gebal
  english_pob_reading: the men of Gebal
  chosen_spanish_reading: los hombres de Gebal
  alternative_spanish_readings:
  - los gebalitas
  - los giblitas
  rationale: La decisión prioriza claridad y transparencia histórica. El verso no requiere convertir el gentilicio en un término eclesiástico o tradicional; basta con mantener la referencia geográfica explícita.
  doctrine_reference: 1 Reyes 5:32; nota lexical sobre Gebal/Byblos
translation_notes:
  revision_awareness: 'El texto sigue de cerca la última versión inglesa auditada, que no requirió cambios, y conserva sus decisiones clave: el paralelismo de los tres grupos de trabajadores, el verbo de cortar/preparar y la retención de ‘la casa’ como forma base de בית, con nota explicativa del templo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar POB en notas explicativas cuando se identifica la 'casa' como templo.
  - Se evita 'siervos' u otros términos más tradicionales porque el hebreo y el audit trail inglés hablan de trabajadores/constructores.
  - '''Casa'' se conserva en el texto principal para respetar la transparencia lexical del hebreo בית.'
  - La puntuación y el orden siguen una cadencia bíblica natural en español sin copiar servilmente el inglés.
