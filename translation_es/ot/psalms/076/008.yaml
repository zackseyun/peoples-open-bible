translation:
  language: es
  text: Tú, tú eres temible[a]; ¿y quién podrá mantenerse en pie delante de ti cuando tu ira se enciende[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para ser temido' o 'imponente'; el hebreo expresa literalmente algo como 'que inspira temor'.
    reason: lexical_alternative
  - marker: b
    text: O 'desde que tu ira se enciende' o 'desde el momento en que tu ira se encendió'.
    reason: lexical_alternative
lexical_decisions:
- source_word: נּוֹרָא
  english_pob_choice: fearsome / to be feared
  chosen_spanish: temible
  alternatives_spanish:
  - para ser temido
  - imponente
  - terrible
  lexicon: HALOT
  rationale: El hebreo נוֹרָא describe a alguien que inspira temor reverente o pavor. En español, 'temible' conserva esa fuerza sin sonar anticuado ni suavizarse como 'impresionante'. 'Para ser temido' refleja mejor la forma predicativa, pero en español suena más pesado; por eso se mantiene como alternativa en nota.
- source_word: וּמִי
  english_pob_choice: and who
  chosen_spanish: ¿y quién?
  alternatives_spanish:
  - ¿pero quién?
  - ¿quién?
  lexicon: HALOT
  rationale: La partícula coordinante más interrogativo se rinde naturalmente con '¿y quién?'. 'Pero quién' introduciría un matiz adversativo que el hebreo no exige.
- source_word: יַעֲמֹד לְפָנֶיךָ
  english_pob_choice: can stand before you
  chosen_spanish: podrá ponerse en pie delante de ti
  alternatives_spanish:
  - podrá estar delante de ti
  - podrá mantenerse en tu presencia
  - podrá resistirte
  lexicon: HALOT
  rationale: El verbo 'estar en pie' conserva la imagen hebrea de mantenerse firme ante alguien. 'Ponerse en pie delante de ti' comunica tanto la postura como la incapacidad implicada por la pregunta retórica. 'Resistirte' explicaría el sentido, pero perdería la imagen verbal.
- source_word: מֵאָז
  english_pob_choice: when / from the time of
  chosen_spanish: cuando
  alternatives_spanish:
  - desde que
  - desde el momento en que
  - a partir de cuando
  lexicon: HALOT
  rationale: Aquí מֵאָז funciona temporalmente en conexión con אַפֶּךָ. 'Cuando' es la forma más natural en español para expresar el momento en que se activa la ira, sin forzar una perífrasis más dura o más abstracta.
- source_word: אַפֶּךָ
  english_pob_choice: your anger
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu enojo
  - tu furor
  - tu cólera
  lexicon: HALOT
  rationale: אַף se usa metonímicamente para 'ira' o 'enojo'. 'Ira' es la opción más digna y fuerte en español bíblico sin depender de un término exclusivamente litúrgico. 'Enojo' es más coloquial; 'furor' o 'cólera' pueden intensificar más de lo que el contexto requiere.
- source_word: אַתָּה ... אַתָּה
  english_pob_choice: You, you
  chosen_spanish: Tú, tú
  alternatives_spanish:
  - Tú mismo
  - Tú solo
  - Eres tú
  lexicon: HALOT
  rationale: La repetición del pronombre es enfática. 'Tú, tú' preserva la insistencia poética sin añadir exclusividad no explícita.
theological_decisions:
- issue: Temor reverente ante Dios
  english_pob_reading: Render נורא as 'fearsome' / 'to be feared' to preserve both dread and reverent awe before God.
  chosen_spanish_reading: '''Temible'' mantiene el doble valor de temor y reverencia ante la majestad divina.'
  alternative_spanish_readings:
  - para ser temido
  - imponente
  - terrible
  rationale: El versículo une la descripción de Dios con la imposibilidad de que alguien permanezca delante de él cuando su ira se enciende. 'Temible' conserva esa gravedad teológica sin banalizarla ni cargarla con un matiz meramente sensacionalista.
  doctrine_reference: Salmo 76:8; teología bíblica del temor de Yahvé
- issue: Ira divina y acceso a la presencia de Dios
  english_pob_reading: who can stand before you when your anger is aroused
  chosen_spanish_reading: ¿quién podrá ponerse en pie delante de ti cuando tu ira se enciende?
  alternative_spanish_readings:
  - ¿quién podrá resistirte cuando se encienda tu ira?
  - ¿quién podrá mantenerse en tu presencia cuando tu ira se encienda?
  rationale: El hebreo presenta una pregunta retórica sobre la imposibilidad de mantenerse ante Dios. 'Ponerse en pie delante de ti' retiene la imagen concreta y no reduce el sentido a mera oposición moral o política.
  doctrine_reference: Éxodo 33:20; Salmo 130:3
- issue: Tensión temporal de מֵאָז אַפֶּךָ
  english_pob_reading: when your anger is aroused / from the time of your anger
  chosen_spanish_reading: cuando tu ira se enciende
  alternative_spanish_readings:
  - desde que tu ira se enciende
  - desde el momento en que tu ira se enciende
  rationale: La construcción hebrea admite un matiz temporal que puede sonar como 'desde que' o 'cuando'. En español, 'cuando tu ira se enciende' comunica el punto de activación sin sobrecargar la sintaxis ni fijar una cronología más precisa de la que el verso da.
  doctrine_reference: Salmo 76:8; observación temporal sobre מֵאָז
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el cambio del inglés POB desde ''to be feared'' / ''from the time of your anger'' hacia ''fearsome'' / ''when your anger is aroused''. La versión española preserva el doble énfasis del hebreo: la cualidad temible de Dios y la imposibilidad de sostenerse ante él cuando su ira se activa, sin depender de una paráfrasis excesiva.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo exige; en este versículo no aparece el Tetragrámaton explícito.
  - Se evita 'SEÑOR' como sustituto por convención editorial, conforme a la política del proyecto.
  - '''Ira'' se usa de forma consistente para אַף en contexto judicial/teológico, sin intensificar a ''furor'' salvo necesidad contextual.'
  - La repetición 'Tú, tú' conserva el énfasis del hebreo sin añadir explicaciones interpretativas en el texto principal.
