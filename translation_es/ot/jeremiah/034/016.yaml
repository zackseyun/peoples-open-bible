revisions:
- from: Pero ustedes volvieron atrás y profanaron mi nombre, y cada hombre tomó de vuelta a su esclavo varón[a] y cada hombre a su esclava[b], a quienes ustedes habían enviado libres para su propia voluntad[c]; y los sometieron para que fueran para ustedes esclavos varones y esclavas.
  to: Pero ustedes se volvieron atrás y profanaron mi nombre, y cada hombre tomó de nuevo a su esclavo y cada hombre a su esclava, a quienes ustedes habían enviado libres[a], y los sometieron para que fueran sus esclavos y esclavas.
  rationale: Se corrigen errores de concordancia y giros poco naturales, mientras se preserva fielmente el sentido del hebreo y las decisiones léxicas auditadas. «Se volvieron atrás» refleja bien la reversión culpable; «tomó de nuevo» comunica la recuperación de personas antes liberadas; se elimina «varón» por innecesario en español; y la nota única conserva la alternativa literal importante de לְנַפְשָׁם sin sobrecargar el texto. La cláusula final se vuelve idiomática con «para que fueran sus esclavos y esclavas».
