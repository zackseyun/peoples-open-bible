    text: Or 'I am awesomely made' or 'I am made in an awe-inspiring way.' The Hebrew conveys reverent awe, not terror.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my soul'; also 'I myself' or 'my inner being.'
    reason: lexical_alternative
