    issue: El marcador de nota [a] está colocado en ‘mandado’ pero la nota trata sobre ‘el campamento de los filisteos’.
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase pertinente. Tal como está, el anclaje induce a error interpretativo.
  - severity: low
    issue: El pronombre explícito ‘ellos’ hace la frase menos natural en español.
    rationale: El plural ya queda claro en ‘golpearon/derrotaron’; en narrativa bíblica española no hace falta explicitar el sujeto aquí.
  - severity: low
    issue: ‘Derrotaron’ es posible, pero ‘golpearon’ o ‘hirieron’ preserva mejor la fuerza verbal de נכה mientras deja abierta la amplitud del resultado militar.
    rationale: La fuente hebrea expresa el acto de golpear/abatir; ‘derrotaron’ tiende a resumir el resultado más que la acción.
  revised_spanish_text: Así David hizo como Dios le había mandado, y golpearon el campamento[a] de los filisteos desde Gabaón hasta Gezer.
  revised_footnotes:
