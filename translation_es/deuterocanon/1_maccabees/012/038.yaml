translation:
  language: es
  text: Y Simón reconstruyó Adida[a] en la Sefelá[b], y la fortificó con puertas y barras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «construyó Adida»; el verbo griego puede significar tanto «construir» como «reconstruir/restaurar» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Sefelá» es la región de colinas bajas de Judá; alternativamente, «la llanura baja».
    reason: cultural_note
lexical_decisions:
- source_word: ᾠκοδόμησεν
  english_pob_choice: rebuilt
  chosen_spanish: reconstruyó
  alternatives_spanish:
  - construyó
  - edificó
  - restauró
  lexicon: LSJ
  rationale: El verbo griego puede significar tanto 'construir' como 'reconstruir/restaurar'. En este contexto de una plaza ya conocida y reforzada militarmente, 'reconstruyó' expresa mejor la idea de restauración o reedificación que la de fundación nueva, sin salir del rango semántico.
- source_word: τὴν Ἀδιδὰ
  english_pob_choice: Adida
  chosen_spanish: Adida
  alternatives_spanish:
  - Adidá
  lexicon: Transliteración directa del griego
  rationale: Es un nombre propio de lugar, por lo que se conserva transliterado. 'Adida' sigue de cerca la forma griega Ἀδιδά y resulta publicable en español.
- source_word: ἐν τῇ σεφηλά
  english_pob_choice: in the Shephelah
  chosen_spanish: en la Sefelá
  alternatives_spanish:
  - en la llanura baja
  - en el bajío
  lexicon: Término geográfico histórico
  rationale: Se mantiene el nombre regional tradicional de la franja de piedemonte de Judá. 'Sefelá' preserva mejor la referencia geográfica específica que una paráfrasis como 'llanura baja'.
- source_word: ὠχύρωσεν
  english_pob_choice: fortified
  chosen_spanish: fortificó
  alternatives_spanish:
  - reforzó
  - hizo segura
  - la aseguró
  lexicon: LSJ
  rationale: El verbo describe hacer un lugar defensible. 'Fortificó' es el equivalente castellano más natural en un contexto militar.
- source_word: θύρας
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - entradas
  lexicon: LSJ
  rationale: Aunque en fortificaciones el sentido puede ser 'gates', en español 'puertas' conserva la imagen de los accesos asegurados y evita una exageración interpretativa cuando el griego no especifica el tipo arquitectónico con total precisión.
- source_word: μοχλούς
  english_pob_choice: bars
  chosen_spanish: barras
  alternatives_spanish:
  - cerrojos
  - trancas
  - barrales
  lexicon: LSJ
  rationale: El término refiere a barras o travesaños usados para asegurar puertas. 'Barras' mantiene la imagen concreta y es natural en español.
translation_notes:
  revision_awareness: El texto griego y el aparato inglés concuerdan plenamente; se conserva la decisión del POB inglés de entender ᾠκοδόμησεν como 'rebuilt' en contexto, y se mantiene la nota cultural sobre Σεφηλά.
  spanish_consistency_notes:
  - Se usa el mismo nombre geográfico 'Sefelá' de forma consistente con la transliteración del término regional.
  - Se evita 'SEÑOR' u otro ajuste teológico porque el versículo no contiene vocabulario divino.
  - '''Puertas y barras'' reproduce de forma idiomática la imaginería de fortificación del griego.'
