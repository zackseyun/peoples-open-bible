translation:
  language: es
  text: 'Entonces el rey le dijo: «¿Cuántas veces tengo que hacerte jurar que no me digas nada más que la verdad en nombre de Yahvé?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... dijo
  - Y entonces ... le dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia y suena natural en español bíblico contemporáneo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título definido sin nombre propio; «el rey» es la correspondencia directa y más natural.
- source_word: עַד כַּמֶּה פְעָמִים
  english_pob_choice: How many times
  chosen_spanish: ¿Cuántas veces?
  alternatives_spanish:
  - ¿Hasta cuántas veces?
  - ¿Con qué frecuencia?
  lexicon: HALOT
  rationale: La expresión hebrea comunica reproche por repetición; «¿Cuántas veces?» conserva el valor idiomático y la exasperación sin calco extraño.
- source_word: מַשְׁבִּיעֶךָ
  english_pob_choice: must I make you swear
  chosen_spanish: tengo que obligarte a jurar
  alternatives_spanish:
  - debo ponerte bajo juramento
  - tengo que hacerte jurar
  lexicon: HALOT
  rationale: El hiphil de שבע es causar que alguien jure o ponerlo bajo juramento. «Obligarte a jurar» refleja esa fuerza con español claro y mantiene la carga de insistencia.
- source_word: אֲשֶׁר לֹא תְדַבֵּר אֵלַי
  english_pob_choice: that you tell me nothing but the truth
  chosen_spanish: que no me digas nada más que la verdad
  alternatives_spanish:
  - que me digas sólo la verdad
  - que no me hables sino la verdad
  lexicon: HALOT
  rationale: La construcción funciona como contenido del juramento. Se preserva la negación y la restricción en español sin convertirla en una paráfrasis más amplia; «decir» conserva mejor la idea de informar que «hablar».
- source_word: רַק אֱמֶת
  english_pob_choice: nothing but the truth
  chosen_spanish: nada más que la verdad
  alternatives_spanish:
  - sólo la verdad
  - únicamente la verdad
  lexicon: HALOT
  rationale: רַק expresa exclusividad; «nada más que la verdad» es idiomático en español jurídico y transmite la misma restricción absoluta.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - invocando el nombre de Yahvé
  lexicon: HALOT
  rationale: בְּשֵׁם señala la esfera o autoridad de la fórmula de juramento. El proyecto exige «Yahvé» para יְהוָה en el texto principal, por lo que se usa la fórmula española estable «en nombre de Yahvé».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh in the main text
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto para el Tetragrámaton es usar «Yahvé» como forma principal en español. Se evita la máscara «SEÑOR» porque el texto hebreo nombra explícitamente a YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «speak to me» a «tell me» para ajustar naturalidad sin cambiar el sentido. La versión española sigue esa misma decisión semántica con «me digas».
  spanish_consistency_notes:
  - Se mantuvo el título «el rey» sin añadir el nombre de Acab, porque el hebreo no lo da en este versículo.
  - Se conservó el tono de reprimenda y urgencia del original mediante una pregunta exasperada en primera persona.
  - «En nombre de Yahvé» se eligió como equivalente estable y publicable para la fórmula de juramento, sin ocultar el nombre divino.
