translation:
  language: es
  text: Entonces Saúl y todo el pueblo que estaba con él se reunieron[a] y llegaron a la batalla. Y he aquí, la espada de cada hombre estaba contra su compañero, con una confusión muy grande[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gritaron' o 'fueron convocados/reunidos'. El verbo hebreo puede entenderse de más de una manera aquí.
    reason: lexical_alternative
  - marker: b
    text: O 'un pánico muy grande' o 'un tumulto muy grande'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזָּעֵק
  english_pob_choice: rallied
  chosen_spanish: se agrupó
  alternatives_spanish:
  - se reunió
  - se juntó
  - se congregó
  lexicon: HALOT / contexto narrativo
  rationale: El verbo hebreo admite la idea de ser convocado, reunirse o alzarse en respuesta a una situación. En español, 'se agrupó' conserva la idea de reunión/movilización sin imponer un matiz externo de 'llamados' que no está explícito en el contexto inmediato.
- source_word: הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: the people who were with him
  chosen_spanish: todo el pueblo que estaba con él
  alternatives_spanish:
  - la gente que estaba con él
  - los hombres que estaban con él
  - las tropas que estaban con él
  lexicon: HALOT
  rationale: '''Pueblo'' sigue de cerca עָם y mantiene la amplitud del hebreo; ''que estaba con él'' reproduce la relación de compañía sin militarizar de más el sustantivo.'
- source_word: וַיָּבֹאוּ עַד הַמִּלְחָמָה
  english_pob_choice: came to the battle
  chosen_spanish: llegó a la batalla
  alternatives_spanish:
  - llegaron a la batalla
  - vinieron a la batalla
  - se acercaron a la batalla
  lexicon: HALOT
  rationale: El hebreo expresa llegada o alcance del lugar de la pelea. En español, 'llegó' funciona bien con el sujeto compuesto ('Saúl y todo el pueblo') entendido como unidad narrativa; si se prefiere mayor literalidad gramatical, 'llegaron' sería la alternativa natural.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y resulta que
  - Y de pronto
  lexicon: HALOT
  rationale: '''He aquí'' conserva la marca de súbito enfocar la escena, muy cercana al hebreo narrativo, sin sonar forzado en español bíblico contemporáneo.'
- source_word: חֶרֶב אִישׁ בְּרֵעֵהוּ
  english_pob_choice: every man's sword was against his companion
  chosen_spanish: la espada de cada hombre estaba contra su compañero
  alternatives_spanish:
  - la espada de cada hombre estaba contra su amigo
  - cada hombre empuñaba su espada contra su compañero
  - la espada de un hombre estaba contra su compañero
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de 'espada' y la relación recíproca 'contra su compañero'. 'Compañero' preserva רֵעַ sin convertirlo en 'amigo', que en español puede suavizar indebidamente el contraste bélico.
- source_word: מְהוּמָה גְּדוֹלָה מְאֹד
  english_pob_choice: with very great confusion
  chosen_spanish: con muy grande confusión
  alternatives_spanish:
  - con muy gran confusión
  - con un enorme desconcierto
  - con un pánico muy grande
  lexicon: HALOT
  rationale: '''Confusión'' recoge el abanico semántico de מְהוּמָה (confusión, tumulto, pánico) y aquí mantiene el efecto de desorden general sin añadir una emoción específica no explícita en el hebreo.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el tramo de revisión del POB en inglés: se pasó de ''were summoned'' a ''rallied''. Por eso el español evita una traducción pasiva de convocatoria y opta por una formulación de reunión/movilización que conserva la apertura semántica del verbo hebreo. También se respetó la nota alternativa sobre מְהוּמָה, traduciendo con ''confusión'' para abarcar la gama sin imponer solo ''pánico'' o ''tumulto''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - '''Pueblo'' conserva el valor colectivo de עָם sin convertirlo automáticamente en ''tropas''.'
  - '''Compañero'' se usó para רֵעַ porque en este contexto es la relación más neutra y literaria en español.'
