translation:
  language: es
  text: Anduvo en el camino de los reyes de Israel, como había hecho la casa de Ahab, porque la hija de Ahab era su esposa, y hizo lo malo[a] a los ojos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «lo malo» conserva la fórmula evaluativa hebrea; también podría traducirse «el mal», pero se prefirió una forma que refleja el uso formular del original en español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: He walked
  chosen_spanish: Anduvo
  alternatives_spanish:
  - Fue
  - Caminó
  lexicon: HALOT
  rationale: Con בְּדֶרֶךְ, el hebreo expresa conducta o estilo de vida. «Anduvo» conserva la metáfora del caminar y suena natural en español bíblico moderno.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way of
  chosen_spanish: en el camino de
  alternatives_spanish:
  - en la manera de
  - según el camino de
  lexicon: HALOT
  rationale: La expresión es idiomática y aquí señala un patrón de conducta. «En el camino de» mantiene la imagen sin volverla mecánica.
- source_word: מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: the kings of Israel
  chosen_spanish: los reyes de Israel
  alternatives_spanish:
  - los monarcas de Israel
  lexicon: HALOT
  rationale: Traducción directa y transparente del genitivo; conserva la referencia al reino del norte como modelo político-moral.
- source_word: כַּאֲשֶׁר עָשׂוּ בֵּית אַחְאָב
  english_pob_choice: as the house of Ahab had done
  chosen_spanish: como había hecho la casa de Ahab
  alternatives_spanish:
  - como hizo la casa de Ahab
  - tal como había actuado la casa de Ahab
  lexicon: HALOT
  rationale: «Casa» conserva el hebraísmo dinástico בֵּית y permite la relación histórica con la dinastía de Ahab sin explicitarla en exceso.
- source_word: בֵּית אַחְאָב
  english_pob_choice: the house of Ahab
  chosen_spanish: la casa de Ahab
  alternatives_spanish:
  - la dinastía de Ahab
  lexicon: HALOT
  rationale: Se mantiene la expresión bíblica tradicional y al mismo tiempo comprensible; «dinastía» sería explicativo, pero menos fiel al giro del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la conducta, y «porque» expresa con claridad la relación causal en español.
- source_word: בַּת אַחְאָב
  english_pob_choice: Ahab’s daughter
  chosen_spanish: la hija de Ahab
  alternatives_spanish:
  - la hija de Ahab
  lexicon: HALOT
  rationale: Se vierte de forma literal y natural la cadena constructa, manteniendo la identificación familiar como motivo explicativo.
- source_word: הָיְתָה לּוֹ לְאִשָּׁה
  english_pob_choice: was his wife
  chosen_spanish: era su esposa
  alternatives_spanish:
  - fue su esposa
  - había sido su esposa
  lexicon: HALOT
  rationale: El hebreo literalmente dice «era para él por mujer». En contexto describe una relación matrimonial vigente, por lo que «era su esposa» es claro y fiel.
- source_word: וַיַּעַשׂ הָרַע
  english_pob_choice: he did what was evil
  chosen_spanish: e hizo lo malo
  alternatives_spanish:
  - e hizo el mal
  - y obró mal
  lexicon: HALOT
  rationale: La fórmula evaluativa se conserva con el sustantivo neutro «lo malo», reflejando el artículo hebreo sobre רַע y evitando una paráfrasis excesiva.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de evaluación divina. Según el estándar del proyecto, יְהוָה se traduce «Yahvé», no con una máscara litúrgica.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el estándar español del proyecto lo rinde como «Yahvé» para preservar el nombre del pacto y evitar el reemplazo devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la evaluación moral final
  english_pob_reading: he did what was evil
  chosen_spanish_reading: hizo lo malo
  alternative_spanish_readings:
  - hizo el mal
  - hizo lo que era malo
  rationale: La cláusula hebrea es una fórmula valorativa estable. «Lo malo» conserva el juicio moral sin convertirlo en una explicación interpretativa.
  doctrine_reference: Uso consistente de fórmulas evaluativas en narrativa histórica del Antiguo Testamento
translation_notes:
  revision_awareness: El registro inglés indica acuerdo alto y ninguna revisión aplicada; esta versión española sigue el mismo contenido base, ajustando únicamente el nombre divino al estándar español del proyecto y manteniendo intacta la estructura evaluativa del versículo.
  spanish_consistency_notes:
  - Se mantiene «casa de Ahab» de forma consistente con el hebraísmo dinástico del original.
  - «Yahvé» se usa conforme al estándar del proyecto para יְהוָה.
  - La relación causal introducida por כִּי se expresa con «porque», sin forzar un matiz adicional.
