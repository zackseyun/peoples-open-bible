review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: levantar una señal pública para las naciones, reunir a los expulsados de Israel y recoger a los dispersos de Judá desde los extremos de la tierra. Las decisiones principales («alzará», «bandera», «desterrados», «dispersos de Judá») son sustancialmente fieles al texto fuente y al rastro de auditoría inglés revisado.'
  spanish_quality_summary: 'El español es claro y legible, pero necesita ajustes menores de naturalidad y de disciplina de notas. «Juntará» suena algo menos digno que «reunirá» en este registro, y el uso de tres notas no sigue bien las razones documentadas: la nota sobre «desterrados» repite el sentido en vez de preservar una alternativa clara, y falta una nota para el modismo «cuatro confines/extremos de la tierra» que sí está documentado en la auditoría inglesa. También conviene alinear mejor la marcación de notas con el contenido real de cada una.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Judá», «Israel», «tierra» y el lenguaje de restauración están bien manejados. La excepción documentada sobre el femenino plural de וּנְפֻצוֹת se preserva adecuadamente con un plural colectivo no específico en español.
  issues:
  - severity: medium
    issue: La nota [b] no preserva bien la alternativa léxica documentada para נִדְחֵי יִשְׂרָאֵל.
    rationale: El inglés auditado conserva como alternativa «outcasts of Israel». La nota española actual («O “los desterrados”») no ofrece una alternativa real, porque repite prácticamente la traducción principal. Conviene ofrecer «los expulsados» o «los apartados», o bien «los marginados», según el matiz que se quiera preservar.
  - severity: medium
    issue: Falta una nota para el modismo מֵאַרְבַּע כַּנְפוֹת הָאָרֶץ.
    rationale: La auditoría inglesa documenta explícitamente el literal «las cuatro alas de la tierra» como nota cultural. El borrador español no conserva esa información y en su lugar asigna [c] al femenino plural de Judá. Esa nota puede mantenerse, pero la nota del modismo también debería estar presente porque forma parte del razonamiento fuente auditado.
  - severity: low
    issue: «Juntará» es menos natural y menos elevado que «reunirá» en este contexto.
    rationale: Aunque semánticamente es posible para יְקַבֵּץ, en español bíblico moderno «reunirá» o «congregará» suenan más dignos y fluidos. La variación verbal del inglés no obliga a usar un verbo distinto si el resultado en español pierde registro.
  revised_spanish_text: Él alzará una bandera para las naciones[a], y reunirá a los desterrados de Israel[b]; reunirá a los dispersos de Judá[c] desde los cuatro confines de la tierra[d].
  revised_footnotes:
  - marker: a
    text: O «señal» o «estandarte».
    reason: lexical_alternative
  - marker: b
    text: O «los expulsados de Israel»; el hebreo también puede entenderse como los que fueron arrojados o apartados.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «los dispersos de Judá» en plural femenino; aquí se entiende colectivamente del pueblo de Judá, no específicamente de mujeres.'
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «de las cuatro alas de la tierra», un modismo para los extremos más lejanos de la tierra.
    reason: cultural_note
  revision_rationale: Se ajusta la redacción para un registro más natural y digno en español («reunirá» en ambas cláusulas), se corrige la nota sobre «desterrados» para que conserve una alternativa léxica real, y se añade la nota cultural documentada sobre «las cuatro alas de la tierra». También se mantiene una nota aclaratoria útil sobre el plural femenino de «los dispersos de Judá», anclada correctamente en el texto.
