translation:
  language: es
  text: cuando fijó un límite para el mar[a], para que las aguas no transgredieran su mandato[b], cuando trazó los cimientos de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fijó su límite» para חֻקּוֹ; el término hebreo puede denotar un decreto fijo o un límite prescrito.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «su boca»; es decir, lo que su boca ordena.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׂוּמוֹ
  english_pob_choice: when he set
  chosen_spanish: cuando fijó
  alternatives_spanish:
  - cuando puso
  - al fijar
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo ב tiene valor temporal en este contexto; «cuando fijó» reproduce bien esa función y mantiene naturalidad en español.
- source_word: לַיָּם
  english_pob_choice: for the sea
  chosen_spanish: para el mar
  alternatives_spanish:
  - al mar
  - para el océano
  lexicon: HALOT
  rationale: La preposición ל introduce al mar como destinatario del límite asignado; «para el mar» conserva esa relación sin sonar forzado en español.
- source_word: חֻקּוֹ
  english_pob_choice: a boundary
  chosen_spanish: un límite
  alternatives_spanish:
  - su límite
  - un decreto
  lexicon: HALOT
  rationale: En este contexto creador, חֹק/חֻק puede referirse a un límite fijado. «Límite» preserva el sentido concreto sin perder la idea de determinación establecida.
- source_word: וּמַיִם
  english_pob_choice: so that the waters
  chosen_spanish: para que las aguas
  alternatives_spanish:
  - y las aguas
  lexicon: HALOT
  rationale: El hebreo enlaza la segunda cláusula con valor de resultado/finalidad; «para que» expresa mejor esa relación que una simple coordinación.
- source_word: לֹא יַעַבְרוּ
  english_pob_choice: would not transgress
  chosen_spanish: no transgredieran
  alternatives_spanish:
  - no pasaran más allá
  - no cruzaran
  lexicon: HALOT
  rationale: יַעַבְרוּ puede significar pasar más allá o sobrepasar un límite. «Transgredieran» conserva la fuerza de sobrepasar una frontera establecida, como en la opción inglesa.
- source_word: פִּיו
  english_pob_choice: his command
  chosen_spanish: su mandato
  alternatives_spanish:
  - su boca
  - su palabra
  lexicon: HALOT
  rationale: Literalmente es «su boca», pero aquí funciona como metonimia de lo que sale de ella. «Mandato» expresa de forma natural en español la idea de una orden vinculante, manteniendo la tensión literal/idiomática.
- source_word: בְּחוּקוֹ
  english_pob_choice: when he marked out
  chosen_spanish: cuando trazó
  alternatives_spanish:
  - al marcar
  - cuando prescribió
  lexicon: HALOT
  rationale: Con חקק, el matiz de inscribir, trazar o marcar queda bien reflejado por «trazó», especialmente con «los cimientos de la tierra».
- source_word: מוֹסְדֵי אָרֶץ
  english_pob_choice: the foundations of the earth
  chosen_spanish: los cimientos de la tierra
  alternatives_spanish:
  - los fundamentos de la tierra
  - los cimientos de la tierra
  lexicon: HALOT
  rationale: La expresión es una imagen cosmológica estándar; «cimientos» conserva la metáfora de construcción y resulta idiomático en español.
theological_decisions:
- issue: Imagen de creación y orden divino
  english_pob_reading: Render the verse as describing God's ordering of creation without importing later doctrinal claims.
  chosen_spanish_reading: La traducción presenta la ordenación de la creación por parte de Dios sin añadir formulaciones doctrinales posteriores.
  alternative_spanish_readings:
  - Leer el verso de manera más abstracta como mera metáfora del orden.
  - Leerlo directamente en clave cristológica en el texto principal.
  rationale: El poema sapiencial describe de manera concreta el acto creador y el establecimiento de límites. La versión española debe conservar esa imagen sin resolver tensiones teológicas más amplias que el hebreo no explicita aquí.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del audit trail, que indica que no se requieren cambios adicionales y que el grado de acuerdo textual es alto con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto solo cuando el hebreo lo exige explícitamente; aquí el texto no contiene el Tetragrámaton, por lo que no aparece.
  - Se eligió «mandato» para פִּיו para conservar la metonimia sin hacer la frase artificialmente literal.
  - «Trazó» preserva la imagen constructiva de חקק en relación con los cimientos de la tierra.
  - Se usa «límite» en lugar de «decreto» en el cuerpo principal para expresar la concreción espacial del contexto marino.
  - La puntuación y el orden verbal siguen un español natural de cadencia bíblica sin depender de calcos rígidos.
