review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la lista griega de grupos y el sentido principal de συνανέβησαν como viaje a Jerusalén. Sin embargo, la estructura partitiva ἐκ rige toda la enumeración, y en español suena más fiel y claro expresarla una sola vez como «de entre…» o repetirla de forma controlada. Además, el borrador ancla la nota [b] en «siervos del templo», pero en la auditoría inglesa la nota b corresponde léxicamente a ἱερόδουλοι / «temple servants» y ofrece «temple slaves» como alternativa; eso es aceptable, pero el texto principal en español debería alinearse mejor con la política del proyecto sobre δοῦλος, que normalmente favorece «esclavo» salvo razón contextual documentada.
  spanish_quality_summary: El español es legible, pero «Y subieron algunos de los hijos de Israel, y de los sacerdotes…» queda algo trabado por la repetición de «y de los». «Porteros» funciona, aunque «guardianes de las puertas» sería más explícito; no hace falta cambiarlo. «Siervos del templo» es comprensible, pero en este proyecto «siervos» puede debilitar innecesariamente la fuerza léxica cuando ya existe una nota aclaratoria.
  glossary_alignment: 'Buena alineación general con «hijos de Israel», «sacerdotes», «levitas» y «Jerusalén». El punto principal es ἱεροδούλων: aunque la auditoría inglesa permitió «temple servants» por contexto institucional, las pautas españolas del proyecto indican que δοῦλος normalmente debe reflejarse como «esclavo» salvo razón contextual fuerte. En español «esclavos del templo» sigue siendo natural y permite reservar la nota para la alternativa institucional «siervos del templo».'
  issues:
  - severity: medium
    issue: La construcción partitiva de la lista suena poco natural y algo ambigua en español.
    rationale: El griego presenta miembros tomados de varios grupos. «Y subieron algunos de los hijos de Israel, y de los sacerdotes…» puede leerse como una coordinación torpe. «Algunos de entre los hijos de Israel, los sacerdotes…» o similar transmite mejor la estructura.
  - severity: medium
    issue: «Siervos del templo» debilita la fuerza léxica de ἱεροδούλων frente a la política española del proyecto.
    rationale: Aunque el inglés eligió «temple servants» con nota alternativa, la guía española prioriza «esclavo» para vocablos de la familia δοῦλος salvo excepción documentada. Aquí «esclavos del templo» sigue siendo claro y fiel.
  - severity: low
    issue: La nota [b] puede mejorar su redacción para sonar más natural en español.
    rationale: «Ligadas por sujeción» es entendible, pero «sujetas» o «vinculadas» al servicio sagrado es más idiomático.
  revised_spanish_text: Y subieron a Jerusalén algunos de entre los hijos de Israel[a], los sacerdotes, los levitas, los cantores del templo, los porteros y los esclavos del templo[b].
  revised_footnotes:
