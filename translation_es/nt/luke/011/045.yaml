translation:
  language: es
  text: 'Entonces uno de los intérpretes de la ley[a] le dijo: «Maestro, al decir estas cosas, nos insultas también[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de los expertos en la ley». El término griego se refiere a especialistas en la ley judía, no necesariamente a abogados en el sentido moderno.
    reason: lexical_alternative
  - marker: b
    text: O «nos tratas con desprecio también». El verbo puede implicar insultar, humillar o tratar con arrogancia, no solo ofender.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκριθεὶς δέ
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces ... le respondió
  alternatives_spanish:
  - Y ... le respondió
  - Entonces ... respondió
  lexicon: ἀποκρίνομαι; δέ
  rationale: La construcción participial funciona como introducción narrativa de una réplica; en español, «le respondió» conserva esa función con fluidez. «Entonces» refleja el leve avance narrativo de δέ sin forzar contraste.
- source_word: τις τῶν νομικῶν
  english_pob_choice: one of the lawyers
  chosen_spanish: uno de los intérpretes de la ley
  alternatives_spanish:
  - uno de los expertos en la ley
  - uno de los juristas
  lexicon: νομικός
  rationale: νομικός en Lucas alude a un especialista en la ley de Moisés, no a un abogado moderno. «Intérpretes de la ley» comunica mejor ese perfil en español que «abogados» o «juristas», y evita el anacronismo profesional.
- source_word: λέγει αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le respondió
  alternatives_spanish:
  - le dijo
  - respondió a él
  lexicon: λέγω
  rationale: Aunque el griego usa presente histórico, en español narrativo «le respondió» suena natural y preserva la relación dialogal con Jesús.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Rabí
  - Maestro, maestro
  lexicon: διδάσκαλος
  rationale: Como vocativo, «Maestro» mantiene la dignidad y la naturalidad del trato. «Rabí» sería más específico culturalmente, pero menos transparente para una lectura amplia.
- source_word: ταῦτα λέγων
  english_pob_choice: in saying these things
  chosen_spanish: al decir estas cosas
  alternatives_spanish:
  - diciendo estas cosas
  - por decir estas cosas
  lexicon: οὗτος; λέγω
  rationale: «Al decir estas cosas» conserva la relación temporal y causal implícita en el participio, sin cargar el español con una paráfrasis excesiva.
- source_word: καὶ ἡμᾶς
  english_pob_choice: us also
  chosen_spanish: nos también
  alternatives_spanish:
  - también a nosotros
  - a nosotros también
  lexicon: καί; ἐγώ
  rationale: En español, «nos insultas también» reproduce la adición de καί con naturalidad. El pronombre anticipado se ajusta a la sintaxis española sin alterar el sentido.
- source_word: ὑβρίζεις
  english_pob_choice: insult
  chosen_spanish: insultas
  alternatives_spanish:
  - nos tratas con desprecio
  - nos humillas
  lexicon: ὑβρίζω
  rationale: ὑβρίζω puede expresar insultar, tratar con desprecio o humillar. «Insultas» es la opción más directa aquí y coincide con la fuerza inmediata del reclamo, sin perder la posibilidad de un matiz de deshonra o desprecio.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con el audit trail inglés. Se ajustó solo la formulación española para naturalidad sintáctica y precisión semántica: νομικός se rindió como «intérprete de la ley» para evitar el falso amigo «abogado», y ὑβρίζω se dejó en «insultas» con nota alternativa para conservar el rango semántico de desprecio/humillación documentado por el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento formal directo a Jesús con el vocativo «Maestro».
  - La puntuación y la subordinación reflejan el discurso directo del original griego.
  - No se introdujo lenguaje doctrinal ajeno al versículo.
  - Las notas a y b se anclan en los puntos léxicos donde el español podría sugerir una lectura demasiado estrecha.
