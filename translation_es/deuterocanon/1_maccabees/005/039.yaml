translation:
  language: es
  text: Y los árabes habían sido contratados para ayudarles, y estaban acampados al otro lado del wadi[a], listos para venir contra ti en batalla[b]. Y Judas fue a su encuentro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al otro lado del torrente». χείμαρρος puede designar un cauce estacional o torrencial; «wadi» se mantiene para reflejar mejor el terreno probable.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «contra ti» en singular, conservando el discurso directo dirigido a Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄραβες
  english_pob_choice: Arabs
  chosen_spanish: árabes
  alternatives_spanish:
  - arabios
  lexicon: LSJ
  rationale: Es el etnónimo directo y natural en español moderno. «Arabios» existe, pero es menos idiomático y no aporta ventaja semántica aquí.
- source_word: μεμίσθωνται
  english_pob_choice: had been hired
  chosen_spanish: habían sido contratados
  alternatives_spanish:
  - habían sido alquilados
  - habían sido pagados para servir
  lexicon: LSJ
  rationale: El perfecto medio/pasivo indica una acción completada con estado resultante. «Habían sido contratados» conserva bien la idea de haber recibido pago para prestar ayuda, sin añadir el matiz técnico de «mercenarios» que el texto no explicita.
- source_word: εἰς βοήθειαν αὐτοῖς
  english_pob_choice: to help them
  chosen_spanish: para ayudarles
  alternatives_spanish:
  - en ayuda de ellos
  - como auxilio para ellos
  lexicon: LSJ
  rationale: La frase expresa propósito. «Para ayudarles» es claro y fiel, y mantiene el valor final sin sobretraducir.
- source_word: παρεμβάλλουσιν
  english_pob_choice: they were encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - estaban acampados
  - se habían acampado
  lexicon: LSJ
  rationale: Aunque el verbo está en presente en griego, en la secuencia narrativa describe la situación militar ya dada. «Acamparon» funciona bien en español narrativo; la idea de campamento queda preservada por el contexto inmediato.
- source_word: πέραν τοῦ χειμάρρου
  english_pob_choice: beyond the wadi
  chosen_spanish: al otro lado del wadi
  alternatives_spanish:
  - más allá del torrente
  - del otro lado del arroyo
  lexicon: LSJ
  rationale: «Wadi» refleja mejor el tipo de cauce estacional del término χείμαρρος que «arroyo» o «torrente». En español, «al otro lado del wadi» conserva esa especificidad geográfica de forma comprensible.
- source_word: ἕτοιμοι τοῦ ἐλθεῖν ἐπὶ σὲ εἰς πόλεμον
  english_pob_choice: ready to come against you in battle
  chosen_spanish: listos para venir contra ti en batalla
  alternatives_spanish:
  - preparados para atacarte en guerra
  - listos para caer sobre ti en combate
  lexicon: LSJ
  rationale: Se conserva la dirección hostil («contra ti») y el sustantivo militar («en batalla»). «Venir» mantiene la imagen de avance/confrontación del infinitivo original.
- source_word: εἰς συνάντησιν αὐτῶν
  english_pob_choice: to meet them
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarse con ellos
  - para salir a su encuentro
  lexicon: LSJ
  rationale: La expresión española reproduce de manera natural la idea de ir al encuentro de alguien, con el matiz de confrontación implícito en el contexto militar.
translation_notes:
  revision_awareness: No hay cambios textuales en el pasaje fuente respecto del expediente inglés; se conservan las mismas decisiones clave, con ajuste natural del español para la secuencia narrativa y el término geográfico χείμαρρος.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «árabes» como etnónimo natural y no «arabios», por idiomaticidad en español actual.
  - Se preservó el valor militar de la frase final sin añadir explícitamente «mercenarios», que el griego no dice de forma directa aquí.
  - La referencia singular «contra ti» se reflejó en la nota porque afecta la lectura del discurso reportado.
