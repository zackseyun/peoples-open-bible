  - severity: medium
    issue: «colocadas oportunamente» puede malentender εὐκαίρως como mera oportunidad temporal
    rationale: En este contexto militar el énfasis parece ser colocación adecuada/ventajosa en la formación; «adecuadamente» o «convenientemente» transmite mejor la función táctica.
