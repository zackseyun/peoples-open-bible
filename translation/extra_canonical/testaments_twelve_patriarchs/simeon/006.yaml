translation:
  text: |-
    1 Behold, I have told you everything, so that I may be cleared from your sin. 2 But if you remove from yourselves envy and every hardness of heart, my bones will blossom like a rose in Israel, and my flesh like a lily in Jacob; and my fragrance will be like the fragrance of Lebanon. Holy ones will be multiplied from me forever and ever, and their branches will extend far away.
    
    3 Then the seed of Canaan will perish, and no remnant will remain for Amalek; all the Cappadocians will perish, and all the Hittites will be utterly destroyed. 4 Then the land of Ham will fail, and every people will perish. Then all the earth will cease from turmoil, and all that is under heaven from war.
    
    5 Then a great sign will be glorified for Israel, because the Lord God, appearing on the earth, will come and save Adam in him. 6 Then all the spirits of deceit will be given over to be trampled down, and men will rule over the evil spirits. 7 Then I also will arise in gladness, and I will bless the Most High for his wonders.
