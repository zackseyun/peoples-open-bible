translation:
  language: es
  text: Y el ojo de Yahvé lo miró para bien[a], y lo levantó[b] del polvo de inmundicia[c].[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo miró con favor»; la expresión hebrea combina la mirada divina con intención benéfica.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo también puede sugerir «lo sacudió» o «lo alzó»; aquí se vierte con sentido de elevación desde una condición baja.
    reason: lexical_alternative
  - marker: c
    text: «Polvo de inmundicia» también puede entenderse como «polvo de hedor» o «polvo fétido»; la imagen hebrea es vívida, pero su matiz exacto es algo incierto.
    reason: alternative_reading
  - marker: d
    text: 'La paralela griega de este versículo difiere notablemente: «El Señor arrancó las raíces de las naciones y plantó a los humildes en su lugar». El hebreo y el griego parecen reflejar formas textuales sustancialmente distintas.'
    reason: textual_variant
lexical_decisions:
- source_word: וְעֵין יי
  english_pob_choice: And the eye of the Lord
  chosen_spanish: el ojo del Señor
  alternatives_spanish:
  - el ojo de Yahvé
  - el ojo del Yahvé
  lexicon: HALOT
  rationale: Conservo la imagen concreta del 'ojo' como modo hebreo de expresar la atención divina, en vez de reducirla a un verbo general como 'vio'. En español, 'Señor' mantiene la convención reverente para יי/יהוה en un registro bíblico claro y publicable.
- source_word: צָפַתְהוּ
  english_pob_choice: looked on him
  chosen_spanish: lo miró
  alternatives_spanish:
  - lo vigiló
  - lo observó
  - lo tuvo en vista
  lexicon: HALOT
  rationale: El verbo hebreo combina mirar/observar con intención. 'Lo miró' conserva la relación con 'ojo' y evita cargar el texto con una interpretación demasiado activa como 'vigiló'.
- source_word: לְטוֹב
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - con favor
  - para su bien
  - favorablemente
  lexicon: HALOT
  rationale: '''Para bien'' reproduce con concisión la idea de intención benéfica sin expandir innecesariamente el sentido. Es una fórmula natural en español y mantiene la apertura semántica del hebreo.'
- source_word: וַיְנַעֲרֵהוּ
  english_pob_choice: lifted him
  chosen_spanish: lo levantó
  alternatives_spanish:
  - lo alzó
  - lo sacudió fuera
  - lo sacó
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir 'sacudir' o 'sacudir fuera', el audit trail inglés ya privilegia un valor de elevación/ascenso desde una condición baja. 'Lo levantó' comunica ese resultado sin perder la imagen de rescate implícita.
- source_word: מֵעֲפַר
  english_pob_choice: from the dust
  chosen_spanish: del polvo
  alternatives_spanish:
  - desde el polvo
  - fuera del polvo
  lexicon: HALOT
  rationale: '''Del polvo'' es la equivalencia más natural y fiel en español para el origen de la condición degradada. Mantiene el paralelismo con la expresión siguiente sin introducir matices ajenos.'
- source_word: צַחֲנָה
  english_pob_choice: filth
  chosen_spanish: inmundicia
  alternatives_spanish:
  - hedor
  - suciedad
  - fétidez
  lexicon: HALOT
  rationale: El término hebreo apunta a una condición repugnante, con posible matiz de 'hedor'. 'Inmundicia' preserva la degradación moral/material de manera idiomática en español sin fijar de forma excesiva el tipo exacto de suciedad.
- source_word: Greek parallel ῥίζας ἐθνῶν ἐξέτιλεν ... καὶ ἐφύτευσεν ταπεινοὺς ἀντʼ αὐτῶν
  english_pob_choice: The Greek parallel for this verse differs sharply
  chosen_spanish: La paralela griega de este versículo difiere notablemente
  alternatives_spanish:
  - La versión griega paralela de este versículo difiere mucho
  - El paralelo griego de este versículo presenta una forma muy distinta
  lexicon: NA
  rationale: Dado el fuerte desajuste textual señalado por el audit trail, no integro la lectura griega en el texto principal, pero la registro en nota para no borrar la tensión documental entre el hebreo y el griego.
theological_decisions:
- issue: Tratamiento del nombre divino abreviado יי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: Sigo el valor reverente del abreviado יי en un registro bíblico estándar, manteniendo la referencia divina sin sustituirla por una transliteración que el contexto de esta línea no requiere.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יהוה/YHWH → the Lord / Lord'
- issue: Relación entre el texto hebreo y el paralelo griego muy divergente
  english_pob_reading: The Hebrew and Greek appear to reflect substantially different textual forms.
  chosen_spanish_reading: El hebreo y el griego parecen reflejar formas textuales sustancialmente distintas.
  alternative_spanish_readings:
  - El hebreo y el griego reflejan lecturas bastante distintas
  - Hay una diferencia textual importante entre el hebreo y el griego
  rationale: Conservo explícitamente la divergencia textual porque forma parte del valor auditado del POB. No armonizo ni fusiono ambas tradiciones en el verso principal para no borrar la variante documentada.
  doctrine_reference: POB textual criticism practice; source packet parallel note
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente, que prefirió una expresión más natural para el movimiento desde una condición baja. Sin embargo, dado que el hebreo subyacente usa un verbo vívido de 'sacudir', el español mantiene la imagen de elevación en el texto principal y deja la alternativa más literal en nota. También se conserva la advertencia de fuerte divergencia entre el hebreo y el paralelo griego.
  spanish_consistency_notes:
  - Mantengo 'Señor' para יי conforme al registro bíblico del proyecto en español.
  - Evito 'Cristo', 'SEÑOR' en mayúsculas, y otras convenciones no necesarias aquí.
  - Uso 'para bien' como equivalente sobrio de לְטוֹב sin expandir a 'con favor' en el texto principal.
  - '''Inmundicia'' conserva el tono degradado del sustantivo hebreo sin fijar excesivamente ''hedor'' en el cuerpo principal.'
