translation:
  language: es
  text: Entonces Judá fue contra los cananeos que habitaban en Hebrón[a] (el nombre anterior de Hebrón era Quiriat-arbá[b]), y abatieron[c] a Sésai, Ahimán y Talmai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue contra el cananeo»; el hebreo usa una forma singular que probablemente funciona de manera colectiva aquí, de ahí «los cananeos».
    reason: lexical_alternative
  - marker: b
    text: O «Hebrón antes se llamaba Quiriat-arbá».
    reason: lexical_alternative
  - marker: c
    text: «Abatieron» también puede traducirse como «derrotaron» o «mataron» en este contexto militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went against
  chosen_spanish: fue contra
  alternatives_spanish:
  - marchó contra
  - avanzó contra
  - fue contra
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «fue», pero en este contexto militar con אֶל introduce un movimiento hostil. «Fue contra» conserva la imagen de desplazamiento y expresa claramente la intención bélica sin sobreparafrasear.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la tribu de Judá
  - los de Judá
  lexicon: HALOT
  rationale: El hebreo usa el nombre colectivo «Judá». En español, el nombre propio «Judá» es la forma más directa y fiel; el sentido tribal queda claro por el verbo plural posterior.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque la forma es singular, funciona aquí como colectivo para un pueblo. «Los cananeos» refleja mejor ese valor colectivo y encaja con el contexto militar.
- source_word: הַיּוֹשֵׁב בְּחֶבְרוֹן
  english_pob_choice: living in Hebron
  chosen_spanish: que habitaban en Hebrón
  alternatives_spanish:
  - que vivían en Hebrón
  - que moraban en Hebrón
  lexicon: HALOT
  rationale: El participio expresa residencia estable. «Que habitaban» es natural en español bíblico contemporáneo y mantiene el aspecto durativo del hebreo.
- source_word: וְשֵׁם חֶבְרוֹן לְפָנִים
  english_pob_choice: Hebron’s former name was
  chosen_spanish: el nombre anterior de Hebrón era
  alternatives_spanish:
  - Hebrón antes se llamaba
  - antiguamente se llamaba Hebrón
  lexicon: HALOT
  rationale: La cláusula aclara un cambio o identificación de topónimo. «Nombre anterior» reproduce con precisión el valor temporal de לְפָנִים y es claro en español.
- source_word: קִרְיַת אַרְבַּע
  english_pob_choice: Kiriath-arba
  chosen_spanish: Quiriat-arbá
  alternatives_spanish:
  - Kiriat-arba
  - Ciudad de Arba
  lexicon: HALOT
  rationale: Como nombre propio de lugar, se translitera al español. «Quiriat-arbá» sigue la convención gráfica hispana y evita una traducción interpretativa del topónimo.
- source_word: וַיַּכּוּ
  english_pob_choice: they struck down
  chosen_spanish: derrotaron
  alternatives_spanish:
  - golpearon
  - mataron
  - derrotaron
  lexicon: HALOT
  rationale: En contexto bélico, נכה puede expresar una victoria decisiva. «Derrotaron» comunica bien el resultado militar, aunque el verbo hebreo permite también la idea más concreta de dar muerte o golpear; se preserva esa amplitud en la nota.
- source_word: שֵׁשַׁי וְאֶת אֲחִימַן וְאֶת תַּלְמָי
  english_pob_choice: Sheshai, Ahiman, and Talmai
  chosen_spanish: Sésai, Ahimán y Talmai
  alternatives_spanish:
  - Sesai, Ahimán y Talmai
  - Sheshai, Ahimán y Talmai
  lexicon: HALOT
  rationale: Son nombres propios y se transliteran. Se usa «Sésai» para reflejar la forma hispana habitual del nombre; los demás nombres se mantienen en transliteración directa.
theological_decisions:
- issue: Valor del colectivo frente al singular en «הַכְּנַעֲנִי»
  english_pob_reading: the Canaanites
  chosen_spanish_reading: los cananeos
  alternative_spanish_readings:
  - el cananeo
  rationale: No se fuerza el singular morfológico cuando el contexto narrativo y el audit trail inglés tratan el término como colectivo. Así se preserva el sentido étnico-poblacional sin perder la naturalidad del español.
  doctrine_reference: No aplica; decisión de número y referente étnico-histórico.
- issue: Intensidad de la acción militar en וַיַּכּוּ
  english_pob_reading: they struck down
  chosen_spanish_reading: derrotaron
  alternative_spanish_readings:
  - los hirieron
  - los mataron
  rationale: 'El hebreo permite varias intensidades: golpe, derrota o muerte. El inglés POB eligió una formulación amplia; en español «derrotaron» mantiene esa amplitud y evita precisar más de lo que el texto exige.'
  doctrine_reference: No aplica; decisión semántica de verbo de combate.
translation_notes:
  revision_awareness: El texto inglés auditado está en alta concordancia y sin revisiones aplicadas; se conserva su lectura principal y se reflejan en notas las alternativas léxicas documentadas para el verbo de combate y la identificación de Hebrón/Quiriat-arbá.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa un español bíblico moderno y claro, evitando calcos excesivos.
  - Los nombres propios se transliteran de forma consistente con la ortografía española cuando corresponde.
