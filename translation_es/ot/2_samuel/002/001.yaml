  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה se traduce como «Yahvé», no «SEÑOR»; Judá, David y Hebrón están bien normalizados en español; no hay conflictos con otros términos doctrinales del glosario.'
