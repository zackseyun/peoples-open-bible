translation:
  language: es
  text: Josías celebró la Pascua a Yahvé en Jerusalén, y sacrificaron la Pascua el día catorce del primer mes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: kept
  chosen_spanish: celebró
  alternatives_spanish:
  - observó
  - guardó
  - hizo
  lexicon: HALOT
  rationale: Con פֶּסַח como objeto, el verbo hebreo funciona idiomáticamente como celebración u observancia cultual. En español, “celebró” comunica de forma natural la realización ritual sin perder el matiz de acto religioso.
- source_word: פֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pascua
  - la fiesta de Pascua
  - la pascua
  lexicon: HALOT
  rationale: Aquí el sustantivo nombra la celebración en conjunto. “La Pascua” es la forma española estándar y fiel al sentido del pasaje.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: La preposición ל expresa dedicación o orientación hacia Yahvé. Se mantiene “Yahvé” como forma del nombre divino, y “para” conserva bien la relación de consagración en español.
- source_word: בִירוּשָׁלַםִ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: Es un complemento locativo directo con nombre propio; “en Jerusalén” es la equivalencia natural y exacta.
- source_word: וַיִּשְׁחֲטוּ
  english_pob_choice: they slaughtered
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - degollaron
  - mataron
  lexicon: HALOT
  rationale: Aunque el verbo puede ser “degollar/matar”, en contexto pascual el acto es sacrificial. “Sacrificaron” expresa de manera clara y sobria la acción cultual sin volverla más explícita de lo que el hebreo permite.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el cordero pascual
  - el sacrificio de Pascua
  - la víctima pascual
  lexicon: HALOT
  rationale: El hebreo repite el mismo sustantivo, que aquí puede designar la víctima por metonimia. En español, el contexto de “sacrificaron” ya aclara esa referencia, por lo que no se añade “cordero” ni otra especificación no explícita en el texto base.
- source_word: בְּאַרְבָּעָה עָשָׂר
  english_pob_choice: on the fourteenth day
  chosen_spanish: el día catorce
  alternatives_spanish:
  - el catorce
  - a los catorce
  lexicon: HALOT
  rationale: La forma hebrea expresa la fecha del mes de manera compacta. En español, “el día catorce” reproduce con claridad el dato calendárico, y la continuación “del primer mes” completa la expresión.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: of the first month
  chosen_spanish: del primer mes
  alternatives_spanish:
  - en el primer mes
  lexicon: HALOT
  rationale: La frase especifica a qué mes pertenece la fecha. “Del primer mes” es la solución más natural y precisa en español.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Se sigue el criterio del proyecto de traducir יהוה como “Yahvé” en el texto principal. Esto conserva el nombre propio del pacto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de פֶּסַח en el segundo miembro
  english_pob_reading: the Passover
  chosen_spanish_reading: la Pascua
  alternative_spanish_readings:
  - el cordero pascual
  - el sacrificio de Pascua
  rationale: El inglés de auditoría retiró “lamb” por no estar explícito en el hebreo. En español, se mantiene “la Pascua” y se deja que el contexto verbal de sacrificio soporte la referencia a la víctima sin añadir un sustantivo interpretativo.
  doctrine_reference: 'DOCTRINE.md: source-grounded lexical restraint'
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una revisión importante: se eliminó ''lamb'' del segundo פֶּסַח porque el hebreo dice solo ''la Pascua''. Por eso el español evita también ''cordero'' o equivalentes explicativos, y conserva la misma restricción semántica.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יהוה conforme al criterio del proyecto.
  - Se evitó 'SEÑOR' o 'el Señor' para no ocultar el nombre divino.
  - Se usó 'Pascua' de forma consistente para ambos casos de פֶּסַח, dejando que el contexto verbal distinga celebración y víctima.
  - El registro es sobrio y bíblico, pero con sintaxis española natural.
