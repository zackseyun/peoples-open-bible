- from: No seguirás a la mayoría para hacer el mal[a], ni responderás en un litigio para apartarte tras la mayoría, para pervertir la justicia.
  to: No seguirás a la mayoría para hacer el mal, ni testificarás en un litigio[a] para desviarte siguiendo a la mayoría, para pervertir la justicia.
