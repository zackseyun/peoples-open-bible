translation:
  language: es
  text: 'lo que yo te mando hoy: amar a Yahvé tu Dios, andar en sus caminos y guardar sus mandamientos, sus estatutos y sus juicios[a], para que vivas y te multipliques,[b] y Yahvé tu Dios te bendiga en la tierra en la que estás entrando para poseerla[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus ordenanzas' para 'sus juicios' (מִשְׁפָּטָיו).
    reason: lexical_alternative
  - marker: b
    text: O 'y vivirás y te multiplicarás, y Yahvé tu Dios te bendecirá'. La secuencia verbal hebrea puede entenderse como resultado o como promesa.
    reason: alternative_reading
  - marker: c
    text: O 'para heredarla' o 'para tomar posesión de ella'; לְרִשְׁתָּהּ puede expresar herencia de la tierra además de posesión. El hebreo dice literalmente 'adonde estás entrando allí para poseerla'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: lo cual
  alternatives_spanish:
  - que
  - lo que
  lexicon: HALOT
  rationale: Introduce el contenido de lo mandado; 'lo cual' conserva la relación relativa sin sonar forzado en español.
- source_word: מְצַוְּךָ
  english_pob_choice: I am commanding you
  chosen_spanish: yo te estoy mandando
  alternatives_spanish:
  - yo te mando
  - yo te ordeno
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inmediata; 'te estoy mandando' refleja mejor ese matiz que un presente simple.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: '''Hoy'' es natural y conserva el énfasis temporal.'
- source_word: לְאַהֲבָה
  english_pob_choice: to love
  chosen_spanish: amar
  alternatives_spanish:
  - para amar
  lexicon: HALOT
  rationale: Infinitivo de propósito; 'amar' es claro y directo en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre propio del pacto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, Yahvé
  lexicon: HALOT
  rationale: Forma posesiva de alianza; 'tu Dios' reproduce el sufijo de segunda persona.
- source_word: לָלֶכֶת בִּדְרָכָיו
  english_pob_choice: to walk in his ways
  chosen_spanish: andar en sus caminos
  alternatives_spanish:
  - caminar en sus caminos
  - ir en sus caminos
  lexicon: HALOT
  rationale: '''Andar'' mantiene el modismo hebreo de conducta de vida con una forma natural en español.'
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - observar
  - cumplir
  lexicon: HALOT
  rationale: En contexto de pacto, 'guardar' expresa bien la obediencia vigilante requerida.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  lexicon: HALOT
  rationale: '''Mandamientos'' conserva el registro formal y la distinción con el verbo ''mandar''.'
- source_word: חֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  lexicon: HALOT
  rationale: '''Estatutos'' es una correspondencia estable para חֻקִּים en lenguaje legal-covenantal.'
- source_word: מִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus ordenanzas
  - sus decisiones judiciales
  lexicon: HALOT
  rationale: Se preserva la cercanía léxica con משפט; 'juicios' mantiene la posible tensión entre juicio y ordenanza.
- source_word: וְחָיִיתָ
  english_pob_choice: so that you may live
  chosen_spanish: para que vivas
  alternatives_spanish:
  - y vivirás
  lexicon: HALOT
  rationale: El contexto favorece valor de resultado/finalidad; 'para que vivas' lo expresa con naturalidad.
- source_word: וְרָבִיתָ
  english_pob_choice: and multiply
  chosen_spanish: y te multipliques
  alternatives_spanish:
  - y crezcas en número
  - y aumentes
  lexicon: HALOT
  rationale: Mantiene el lenguaje de bendición del pacto y el vínculo con el crecimiento del pueblo.
- source_word: וּבֵרַכְךָ
  english_pob_choice: and ... may bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - te bendecirá
  lexicon: HALOT
  rationale: El verbo se coordina con el valor de resultado de la cláusula anterior; el subjuntivo en español comunica bien esa relación.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  lexicon: HALOT
  rationale: En contexto de promesa de herencia, 'tierra' es la equivalencia más fiel y tradicional.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  english_pob_choice: that you are entering to possess
  chosen_spanish: que entras
  alternatives_spanish:
  - adonde vas
  - que estás entrando
  lexicon: HALOT
  rationale: Se evita la redundancia de 'allí' y se conserva el movimiento hacia la posesión sin añadir elementos no necesarios.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess it
  chosen_spanish: para poseer[a]
  alternatives_spanish:
  - para heredarlo
  - para tomar posesión de ella[a]
  lexicon: HALOT
  rationale: '''Poseer'' sigue de cerca el campo semántico de ירשׁ; se ancla la nota porque el español puede sugerir también ''heredar'' en este contexto.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre propio del pacto según la política del proyecto, evitando la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que elimina la redundancia de 'there' y 'it' al final; por eso el español evita toda expansión innecesaria y mantiene una clausula final breve y natural.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - 'Se distinguieron los tres términos legales: ''mandamientos'', ''estatutos'' y ''juicios''.'
  - Se prefirió 'tierra' para בָּאָרֶץ por el contexto de promesa y herencia.
  - La cláusula final queda natural en español sin añadir el adverbio 'allí' ni el pronombre 'la'.
