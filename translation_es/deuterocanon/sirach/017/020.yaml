translation:
  language: es
  text: Sin embargo, a los que se arrepienten les concedió un retorno[a][b], y alentó a los que iban fallando en la paciencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Un retorno» también puede entenderse como «un regreso», «una vuelta» o, en el contexto, una restauración.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega puede abarcar un volver a Dios, un restablecimiento o una recuperación; se conserva el alcance abierto del término.
    reason: theological_note
  - marker: c
    text: 'La frase griega es compacta y permite otra lectura: «a los que iban fallando a la paciencia» o «a los que iban fallando para ser pacientes».'
    reason: alternative_reading
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: LSJ
  rationale: La partícula introduce contraste fuerte; «Sin embargo» conserva ese giro adversativo en español con un tono natural y digno.
- source_word: μετανοοῦσιν
  english_pob_choice: to those who repent
  chosen_spanish: a los que se arrepienten
  alternatives_spanish:
  - a los arrepentidos
  - a los que cambian de mente
  lexicon: BDAG
  rationale: El participio presente sustantivado refiere a personas caracterizadas por el arrepentimiento. «Se arrepienten» mantiene el valor verbal activo mejor que un adjetivo fijo.
- source_word: ἔδωκεν
  english_pob_choice: he granted
  chosen_spanish: les concedió
  alternatives_spanish:
  - les dio
  lexicon: BDAG
  rationale: «Concedió» reproduce bien el matiz de dar algo favorable o otorgado, y suena más natural en español junto con el objeto implícito de beneficio.
- source_word: ἐπάνοδον
  english_pob_choice: a return
  chosen_spanish: un retorno
  alternatives_spanish:
  - un regreso
  - una vuelta
  - una restauración
  - un camino de vuelta
  lexicon: LSJ
  rationale: «Retorno» sigue de cerca el sustantivo griego sin cerrar el sentido en una sola interpretación; deja abierta la posibilidad de regreso, restauración o restablecimiento según el contexto.
- source_word: παρεκάλεσεν
  english_pob_choice: he encouraged
  chosen_spanish: alentó
  alternatives_spanish:
  - animó
  - exhortó
  - consoló
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar exhortar, consolar o animar. Aquí «alentó» preserva la idea de fortalecer con apoyo sin decidir en exceso entre consuelo y exhortación.
- source_word: ἐκλείποντας
  english_pob_choice: those who were failing
  chosen_spanish: a los que iban fallando
  alternatives_spanish:
  - a los que desfallecían
  - a los que se agotaban
  - a los que fallaban
  lexicon: LSJ
  rationale: El participio puede expresar desfallecer, fallar o ir cediendo. «Iban fallando» mantiene la amplitud semántica y el valor progresivo del proceso sin restringirlo a lo físico o lo moral.
- source_word: ὑπομονήν
  english_pob_choice: in patience
  chosen_spanish: en la paciencia
  alternatives_spanish:
  - con paciencia
  - en perseverancia
  - con constancia
  lexicon: BDAG
  rationale: La preposición implícita en español se expresa de forma natural con «en la paciencia», reflejando la relación compacta del griego con παρακαλέω. «Paciencia» conserva el término tradicional y la idea de perseverancia resistente.
theological_decisions:
- issue: Alcance de ἐπάνοδον en contexto de arrepentimiento
  english_pob_reading: a return
  chosen_spanish_reading: un retorno
  alternative_spanish_readings:
  - un regreso
  - una restauración
  - un camino de vuelta
  rationale: El griego no obliga a concretar si el énfasis es regreso a Dios, restablecimiento o renovación. «Retorno» conserva esa apertura y evita resolver la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión interpretativa sin sobreespecificar.
- issue: Relación entre παρεκάλεσεν y ὑπομονήν
  english_pob_reading: he encouraged those who were failing in patience
  chosen_spanish_reading: alentó a los que iban fallando en la paciencia
  alternative_spanish_readings:
  - alentó a los que estaban desfalleciendo a perseverar
  - consoló a los que estaban faltando a la paciencia
  - alentó a los que se agotaban con paciencia
  rationale: 'La sintaxis griega es compacta y admite más de una lectura: que Dios aliente a los que fallan «en la paciencia», o que los anime «a la paciencia». La redacción elegida sigue de cerca la construcción y deja abierta la ambigüedad documentada.'
  doctrine_reference: Preservar la tensión interpretativa sin resolverla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que mantuvo «a return» y afinó la última frase a «in patience». La versión española sigue esa línea, conservando apertura semántica en ἐπάνοδον y reflejando ὑπομονήν con una construcción natural en español sin cerrar la ambigüedad sintáctica del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - «Arrepentirse» se usa para μετανοεῖν/μετανοοῦσιν según el valor de cambio de actitud y retorno.
  - «Paciencia» se conserva para ὑπομονήν, en línea con la terminología del proyecto cuando el contexto sugiere perseverancia resistente.
  - Se evitó traducir ἐπάνοδον como «restauración» en el texto principal para no resolver una interpretación que el audit trail deja abierta.
