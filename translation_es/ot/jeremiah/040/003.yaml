translation:
  language: es
  text: Yahvé ha hecho que esto suceda y ha hecho tal como dijo, porque han pecado contra Yahvé y no escucharon su voz[a]; por tanto, esto les ha sucedido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no obedecieron su voz». El hebreo «escuchar su voz» suele implicar obediencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «esta calamidad les ha sobrevenido». El hebreo «esto» puede referirse más específicamente al desastre que acaba de describirse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: has brought it about
  chosen_spanish: ha hecho que esto suceda
  alternatives_spanish:
  - ha traído esto
  - ha ocasionado esto
  - ha hecho venir esto
  lexicon: BDB / HALOT
  rationale: El hebreo usa un verbo causativo con valor de hacer venir sobre ellos el acontecimiento anunciado. En español, 'ha hecho que esto suceda' conserva la fuerza causal sin sonar forzado ni ocultar que el referente es el juicio/calamidad ya mencionado.
- source_word: וַיַּעַשׂ
  english_pob_choice: has done
  chosen_spanish: ha cumplido
  alternatives_spanish:
  - ha hecho
  - ha actuado
  - ha ejecutado
  lexicon: BDB / HALOT
  rationale: En paralelo con el verbo anterior, 'ha cumplido' comunica que Yahvé realizó lo que había anunciado. Mantiene el valor de cumplimiento del dicho profético, sin perder la simplicidad del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: Se conserva el nombre divino explícito del texto hebreo como 'Yahvé', conforme a la terminología del proyecto y sin sustituirlo por un título.
- source_word: כַּאֲשֶׁר דִּבֵּר
  english_pob_choice: just as he said
  chosen_spanish: exactamente como dijo
  alternatives_spanish:
  - tal como dijo
  - como dijo
  lexicon: BDB / HALOT
  rationale: '''Exactamente como dijo'' expresa bien la idea de cumplimiento fiel y es natural en español. ''Como dijo'' sería posible, pero menos enfático respecto de la correspondencia entre palabra y acontecimiento.'
- source_word: שְׁמַעְתֶּם בְּקוֹלוֹ
  english_pob_choice: did not listen to his voice
  chosen_spanish: no escucharon su voz
  alternatives_spanish:
  - no obedecieron su voz
  - no atendieron su voz
  - no escucharon su palabra
  lexicon: BDB / HALOT
  rationale: El hebreo 'escuchar la voz' conserva una imagen idiomática que puede implicar obediencia. En español, 'no escucharon su voz' mantiene esa imagen; la nota permite la alternativa interpretativa 'obedecer' sin imponerla al texto principal.
- source_word: דבר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este hecho
  - esta calamidad
  lexicon: BDB / HALOT
  rationale: '''Esta cosa'' es formalmente cercana al hebreo דבר זה y preserva la amplitud del referente. Aunque el contexto apunta a una desgracia concreta, evitar ''calamidad'' en el texto principal deja abierta la referencia como en el hebreo.'
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrama como 'Yahvé', preservando el nombre personal del Dios del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de שׁמע בקולו
  english_pob_reading: did not listen to his voice
  chosen_spanish_reading: no escucharon su voz
  alternative_spanish_readings:
  - no obedecieron su voz
  - no hicieron caso de su voz
  rationale: La lectura principal retiene la metáfora hebrea de escuchar la voz. En español, esto puede implicar obediencia, pero no se fuerza en el texto principal; así se conserva la tensión lexical documentada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español. Además, se mantuvo el registro formal con 'por tanto' y se preservó la relación causal y de cumplimiento del original hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme a la terminología del proyecto.
  - Se prefirió una construcción natural en español para el doble perfecto verbal hebreo, sin perder el énfasis en el cumplimiento de lo dicho.
  - El sustantivo deíctico 'esta cosa' conserva la vaguedad del hebreo דבר זה, con nota para la lectura contextual de calamidad.
  - Se evitó introducir 'SEÑOR' o 'obedecer' en el texto principal para no borrar decisiones lexicales documentadas.
