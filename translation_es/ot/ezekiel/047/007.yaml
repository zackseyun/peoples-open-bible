translation:
  language: es
  text: Cuando volví[a], he aquí que junto a la orilla del arroyo había muchísimos árboles, de un lado y del otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más compacta, «a ambos lados». El modismo hebreo es literalmente «de este lado y de este lado».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּבֵנִי
  english_pob_choice: When I returned
  chosen_spanish: Al volver yo
  alternatives_spanish:
  - Cuando volví
  - Cuando regresé
  - Mientras volvía
  lexicon: HALOT
  rationale: La forma hebrea es un infinitivo constructo con sufijo de primera persona singular, con valor temporal. En español, «Al volver yo» conserva la referencia al propio retorno del hablante y la relación temporal inmediata sin añadir sujeto externo. «Cuando volví» sería más idiomático, pero suaviza un poco la forma verbal original; «cuando regresé» es válido pero menos directo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - mira
  - y resulta que
  lexicon: HALOT
  rationale: La partícula introduce una percepción repentina o llamativa. «He aquí que» preserva ese golpe de atención y el tono profético mejor que un simple «y había». En español moderno sigue siendo digno y claro.
- source_word: אֶל שְׂפַת הַנַּחַל
  english_pob_choice: on the bank of the stream
  chosen_spanish: junto a la orilla del arroyo
  alternatives_spanish:
  - en la ribera del río
  - a la orilla del torrente
  - junto al borde del cauce
  lexicon: HALOT
  rationale: שְׂפָה es «orilla/borde» y נַחַל puede ser arroyo, torrente o cauce de río. «Arroyo» comunica bien el curso de agua sin forzar «río», y «orilla» mantiene la imagen espacial. «Junto a» evita una rigidez preposicional poco natural en español.
- source_word: עֵץ רַב מְאֹד
  english_pob_choice: very many trees
  chosen_spanish: árboles muy abundantes
  alternatives_spanish:
  - muchísimos árboles
  - una gran multitud de árboles
  - árboles en gran abundancia
  lexicon: HALOT
  rationale: Aunque עֵץ está en singular, funciona de manera colectiva aquí; el contexto exige pluralidad abundante. «Árboles muy abundantes» expresa esa cantidad y conserva el intensificador מְאֹד sin sonar forzado. Evita perder el valor colectivo que el inglés POB ya reconoció.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on this side and on that side
  chosen_spanish: de un lado y del otro
  alternatives_spanish:
  - de ambos lados
  - a un lado y al otro
  - en esta parte y en la otra
  lexicon: HALOT
  rationale: El hebreo es un giro distributivo literal, «de esto y de esto», que señala ambos lados. «De un lado y del otro» conserva la vivacidad espacial del hebreo mejor que la compresión «de ambos lados», aunque esa última también sería interpretativamente correcta.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y la decisión inglesa de leer la escena como una percepción repentina junto al arroyo. No hay revisiones aplicadas en el control más reciente; se conserva la lectura distributiva de «de un lado y del otro» y la abundancia colectiva de «árboles muy abundantes».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «arroyo» para נַחַל por adecuación semántica y fluidez en español; no se impone «río» porque el hebreo no exige un cauce mayor.
  - La secuencia «he aquí que» conserva el valor de sorpresa/visión del hebreo וְהִנֵּה.
  - No se introduce terminología eclesiástica no presente en el texto.
