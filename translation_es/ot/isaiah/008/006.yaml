translation:
  language: es
  text: Porque este pueblo ha rechazado las aguas de Shiloah[a] que fluyen suavemente, y se regocija por Rezín y el hijo de Remalías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shiloah es la forma hebrea del nombre; «Siloé» es la forma tradicional española relacionada con la tradición griega.
    reason: lexical_alternative
  - marker: b
    text: O, en una lectura difícil, «y tiembla ante Rezín y el hijo de Remalías». El hebreo dice «se regocija», pero algunos entienden el sentido de otra manera según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: La conjunción compuesta introduce la razón del juicio anunciado en el contexto; «Porque» comunica con naturalidad en español el valor causal sin perder la fuerza explicativa del hebreo.
- source_word: מָאַס
  english_pob_choice: has rejected
  chosen_spanish: ha rechazado
  alternatives_spanish:
  - ha desechado
  - ha despreciado
  lexicon: HALOT
  rationale: El verbo expresa rechazo decidido. «Ha rechazado» conserva el valor de repudio o negativa firme sin cargar más de lo que el texto exige.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta nación
  - estas personas
  lexicon: HALOT
  rationale: La frase profética singular se reproduce mejor con «este pueblo», que preserva el tono relacional y de alianza del hebreo.
- source_word: מֵי הַשִּׁלֹחַ
  english_pob_choice: the waters of Shiloah
  chosen_spanish: las aguas de Siloé
  alternatives_spanish:
  - las aguas de Siloah
  lexicon: HALOT
  rationale: El hebreo nombra el manantial como שִׁלֹחַ; en español bíblico y de recepción eclesial, «Siloé» es la forma más reconocible y corresponde a la tradición griega señalada en la nota inglesa. Se mantiene el nombre propio sin sustituirlo por una glosa interpretativa.
- source_word: הַהֹלְכִים לְאַט
  english_pob_choice: that flow gently
  chosen_spanish: que fluyen suavemente
  alternatives_spanish:
  - que van despacio
  - que corren mansamente
  lexicon: HALOT
  rationale: La imagen literal es de aguas que «van suavemente/ lentamente». «Que fluyen suavemente» es una expresión natural en español y conserva el contraste con la fuerza del río en el verso siguiente.
- source_word: וּמְשׂוֹשׂ
  english_pob_choice: rejoices in
  chosen_spanish: se alegra en
  alternatives_spanish:
  - se regocija en
  - se goza en
  lexicon: HALOT
  rationale: La forma masorética presenta el sentido positivo de regocijo. «Se alegra en» conserva la construcción con el objeto nombrado y evita suavizar la tensión textual; el posible sentido alternativo queda documentado en nota.
- source_word: אֶת רְצִין וּבֶן רְמַלְיָהוּ
  english_pob_choice: Rezin and the son of Remaliah
  chosen_spanish: Rezín y el hijo de Remalías
  alternatives_spanish:
  - Rezín y el hijo de Remalía
  - Rezín y Remalías hijo
  lexicon: HALOT
  rationale: Los nombres propios se transliteran con formas españolas usuales. «Hijo de Remalías» preserva el giro hebreo y el matiz de distancia o referencia política del original.
theological_decisions:
- issue: Sentido difícil de וּמְשׂוֹשׂ con Rezin y el hijo de Remaliah
  english_pob_reading: Translate the Masoretic Text straightforwardly as 'and rejoices in Rezin and the son of Remaliah' while preserving the alternative negative understanding in a footnote.
  chosen_spanish_reading: 'Traducir el texto masorético de manera directa: «y se alegra en Rezín y en el hijo de Remalías».'
  alternative_spanish_readings:
  - y tiembla ante Rezín y el hijo de Remalías
  - y se estremece ante Rezín y el hijo de Remalías
  rationale: El hebreo apunta formalmente a un verbo de alegría/regocijo, aunque el contexto ha llevado a algunos a entender un sentido contrario. La versión principal no corrige el texto para armonizarlo con una lectura interpretativa; la dificultad se conserva mediante nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que mantuvo la lectura de joy/rejoicing en la cláusula difícil, con el ajuste estilístico de naturalidad en la preposición. Para el español se conservó esa decisión y se documentó la alternativa negativa en nota, sin sustituir el MT por una conjetura.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando aparezca el nombre divino; aquí no ocurre.
  - 'Se transliteran los nombres propios bíblicos con formas españolas estándar: Siloé, Rezín, Remalías.'
  - Se mantuvo el contraste entre las aguas suaves y la respuesta política/religiosa del pueblo sin añadir explicación interpretativa al texto base.
