translation:
  language: es
  text: Y los hijos de Israel hicieron así[a], y unos recogieron más y otros menos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: “el que recogió mucho y el que recogió poco”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - obraron
  lexicon: HALOT
  rationale: El hebreo aquí usa עשה en la expresión idiomática 'hacer así'; en español, 'hicieron así' o 'hicieron lo que se les había mandado' sería posible, pero 'hicieron así' conserva la correspondencia directa con כֵן y suena natural.
- source_word: כֵן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de esta manera
  lexicon: HALOT
  rationale: '''Así'' reproduce con naturalidad el adverbio de modo y mantiene la construcción bíblica ''hicieron así'' sin cargarla de explicación adicional.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la filiación literal del hebreo ('hijos'), en lugar de aplanar el giro a 'israelitas', para mantener la forma idiomática y el matiz genealógico del original.
- source_word: וַיִּלְקְטוּ
  english_pob_choice: they gathered
  chosen_spanish: recogieron
  alternatives_spanish:
  - juntaron
  - recolectaron
  lexicon: HALOT
  rationale: לקט se refiere a recoger/recopilar, especialmente alimento. 'Recogieron' funciona bien en contexto de maná y evita una repetición excesiva de 'juntaron' en español.
- source_word: הַמַּרְבֶּה
  english_pob_choice: some more
  chosen_spanish: unos más
  alternatives_spanish:
  - el que recogió mucho
  - los que recogieron mucho
  - algunos más
  lexicon: HALOT
  rationale: El participio sustantivado contrasta distributivamente con el siguiente. 'Unos más' reproduce la comparación sin forzar una relativa; mantiene la tensión entre una formulación más libre y la lectura más formal del hebreo.
- source_word: הַמַּמְעִיט
  english_pob_choice: some less
  chosen_spanish: otros menos
  alternatives_spanish:
  - el que recogió poco
  - los que recogieron poco
  - algunos menos
  lexicon: HALOT
  rationale: Se preserva el paralelo con 'unos más'. 'Otros menos' comunica el contraste cuantitativo del hebreo y evita introducir una explicación interpretativa no presente en el texto.
translation_notes:
  revision_awareness: 'El texto hebreo y el audio de control en inglés coinciden en el sentido general: obediencia al mandato previo y recogida desigual del maná. No se requieren revisiones textuales ni decisiones doctrinales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo distributivo de 'some more and some less' con 'unos más y otros menos'.
  - Se conservó 'hijos de Israel' por fidelidad al giro hebreo y a la terminología del proyecto.
  - La nota al pie ofrece la alternativa más formal, en línea con el apéndice lexical del inglés POB.
