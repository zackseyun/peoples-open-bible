translation:
  language: es
  text: entonces nos habrían tragado vivos cuando su ira ardía contra nosotros[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nos tragaron» si se toma como pasado simple; el contexto amplio (vv. 2–5) favorece el sentido contrafactual: «nos habrían tragado».'
    reason: lexical_alternative
  - marker: b
