revisions:
- from: Todas estas cosas son el libro del pacto de Dios Altísimo[a], la ley que Moisés mandó como herencia para las asambleas de Jacob[b].
  to: Todas estas cosas son el libro del pacto del Altísimo Dios[a], la ley que Moisés ordenó como herencia para las asambleas de Jacob[b].
  rationale: Se ajusta la frase divina a una formulación más natural en español («del Altísimo Dios») sin perder la alternativa documentada del orden griego, y se cambia «mandó» por «ordenó» para una lectura más idiomática y precisa en contexto legal.
