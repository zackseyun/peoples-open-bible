translation:
  language: es
  text: La música durante el duelo es un discurso inoportuno[a], pero los azotes y la disciplina son sabiduría[b] en todo tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuera de tiempo» para «inoportuno».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «los azotes y la disciplina ... sabiduría», una expresión proverbial comprimida que también puede entenderse como «pertenecen a la sabiduría» o «son apropiados en la sabiduría».
    reason: lexical_alternative
lexical_decisions:
- source_word: μουσικὰ
  english_pob_choice: Music
  chosen_spanish: La música
  alternatives_spanish:
  - La música instrumental
  - Las cosas musicales
  lexicon: LSJ
  rationale: El neutro plural griego es amplio y puede referirse a lo musical en general. «La música» conserva esa amplitud en un español natural y publicado, sin restringirlo indebidamente a canto o instrumentos.
- source_word: ἐν πένθει
  english_pob_choice: during mourning
  chosen_spanish: durante el duelo
  alternatives_spanish:
  - en duelo
  - en tiempo de duelo
  - durante el luto
  lexicon: LSJ
  rationale: La expresión marca el contexto temporal y situacional. «Durante el duelo» comunica bien la circunstancia de luto/aflicción en español contemporáneo y mantiene el valor temporal.
- source_word: ἄκαιρος
  english_pob_choice: untimely
  chosen_spanish: inoportuno
  alternatives_spanish:
  - fuera de tiempo
  - mal oportuno
  - intempestivo
  lexicon: LSJ
  rationale: El adjetivo significa que algo no ocurre en el momento adecuado. «Inoportuno» transmite con claridad la idea de falta de oportunidad o adecuación; además, la nota conserva la alternativa más literal «fuera de tiempo».
- source_word: διήγησις
  english_pob_choice: discourse
  chosen_spanish: discurso
  alternatives_spanish:
  - habla
  - relato
  - exposición
  lexicon: LSJ
  rationale: En este proverbio, el sustantivo apunta a un acto de hablar o de exposición verbal. «Discurso» es un equivalente formal y natural que evita reducirlo a mera charla y refleja el tono sapiencial.
- source_word: μάστιγες
  english_pob_choice: beatings
  chosen_spanish: los azotes
  alternatives_spanish:
  - los latigazos
  - los golpes
  - las flagelaciones
  lexicon: LSJ
  rationale: El término denota golpes dados con látigo o azote, con fuerza corporal explícita. «Los azotes» conserva ese sentido físico sin diluirlo en una corrección meramente metafórica.
- source_word: παιδεία
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la instrucción
  - la corrección
  - la educación disciplinaria
  lexicon: LSJ
  rationale: En la literatura sapiencial, παιδεία incluye formación correctiva además de instrucción. «La disciplina» mantiene esa amplitud y encaja con el paralelismo con los azotes.
- source_word: ἐν παντὶ καιρῷ
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en todo momento
  - en cada tiempo
  lexicon: LSJ
  rationale: La frase expresa aplicabilidad general y absoluta. «En todo tiempo» es una equivalencia directa, solemne y plenamente idiomática en español bíblico contemporáneo.
- source_word: σοφίας
  english_pob_choice: are wisdom
  chosen_spanish: son sabiduría
  alternatives_spanish:
  - pertenecen a la sabiduría
  - son propio de la sabiduría
  - son sabios
  lexicon: LSJ
  rationale: El genitivo es elíptico y proverbial. «Son sabiduría» preserva la forma concisa de la sentencia y su fuerza comprimida, sin expandirla más de lo que el griego permite.
theological_decisions:
- issue: Fuerza corporal del proverbio sobre castigo y disciplina
  english_pob_reading: Translate the line straightforwardly as a wisdom saying commending corrective punishment and discipline, without softening the physical term.
  chosen_spanish_reading: Traducir de manera directa como dicho sapiencial que presenta los azotes y la disciplina como sabiduría, sin atenuar el término corporal.
  alternative_spanish_readings:
  - Rebajar μάστιγες a «reprensiones» o «correcciones»
  - Hacer que la frase signifique solo disciplina moral sin componente físico
  rationale: El griego contrapone claramente el habla musical en duelo con la corrección física y la disciplina como apropiadas en su lugar. La traducción debe conservar esa tensión sin introducir mitigación moderna en el texto mismo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El inglés POB revisó la línea desde «speech» a «discourse» y desde «at every time» a «at all times» para mayor naturalidad sin perder el valor temporal. La versión española sigue esa misma orientación: usa «discurso» y «en todo tiempo» para conservar el tono formal y la simetría proverbial.'
  spanish_consistency_notes:
  - Se mantiene «sabiduría» para σοφίας, siguiendo la literalidad proverbial del audit trail.
  - 'Se evita «SEÑOR» u otro reemplazo teológico no pertinente: no hay aquí término divino alguno.'
  - «Azotes» conserva la fuerza corporal de μάστιγες, coherente con la decisión inglesa de no suavizar el término.
