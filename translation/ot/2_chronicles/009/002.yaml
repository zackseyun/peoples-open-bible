id: 2CH.9.2
reference: 2 Chronicles 9:2
source:
  edition: WLC
  text: וַ/יַּגֶּד לָ֥/הּ שְׁלֹמֹ֖ה אֶת כָּל דְּבָרֶ֑י/הָ וְ/לֹֽא נֶעְלַ֤ם דָּבָר֙ מִ/שְּׁלֹמֹ֔ה אֲשֶׁ֧ר לֹ֦א הִגִּ֖יד לָֽ/הּ־־־־׃
translation:
  text: And Solomon answered all her questions[b][a]; nothing was hidden from Solomon that he did not explain to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Solomon told her all her matters'; Hebrew more literally, 'all her words.'
    reason: lexical_alternative
  - marker: b
    text: Or 'there was not a matter hidden from Solomon that he did not tell her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֶּד
  chosen: answered
  alternatives:
  - told
  - declared
  - explained
  lexicon: HALOT
  rationale: The verb נגד literally means 'tell/declare,' but in this context with 'all her words/matters' it idiomatically refers to responding to the queen's inquiries or riddles. 'Answered' best captures the contextual sense in natural English while remaining faithful to the narrative situation.
- source_word: אֶת כָּל דְּבָרֶיהָ
  chosen: all her questions
  alternatives:
  - all her words
  - all her matters
  - all her sayings
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' In the immediate context of testing Solomon with hard questions, the phrase refers to the matters she raised. 'All her questions' makes the implied sense explicit in idiomatic English.
- source_word: נֶעְלַם
  chosen: was hidden
  alternatives:
  - escaped notice
  - was concealed
  lexicon: HALOT
  rationale: The Niphal of עלם here conveys being hidden or concealed. 'Was hidden' is a direct and clear rendering that preserves the metaphor.
- source_word: דָּבָר
  chosen: nothing
  alternatives:
  - not a thing
  - no matter
  lexicon: HALOT
  rationale: 'With the negation, the singular noun functions idiomatically: ''not a thing'' or ''nothing.'' ''Nothing'' is the most natural English expression.'
- source_word: מִשְּׁלֹמֹה
  chosen: from Solomon
  alternatives:
  - to Solomon
  lexicon: HALOT
  rationale: The preposition מן with נעלם regularly marks the person from whom something is hidden. 'From Solomon' is the straightforward sense.
- source_word: אֲשֶׁר לֹא הִגִּיד לָהּ
  chosen: that he did not explain to her
  alternatives:
  - which he did not tell her
  - that he did not declare to her
  lexicon: HALOT
  rationale: 'The relative clause qualifies ''nothing was hidden'': there was nothing hidden from Solomon that he did not in turn make known to her. ''Explain'' fits the context of answering difficult questions, though ''tell'' is more formally literal.'
