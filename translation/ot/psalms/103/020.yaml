  from: who do his word by obeying the sound of his word
  to: who do his word, listening to the sound of his word
  rationale: The phrase 'do his word by obeying' is tautological, as 'doing his word' is a form of obedience. The Hebrew construction, with the participle 'doing' (עֹשֵׂי) followed by the infinitive 'to hear' (לִשְׁמֹעַ), suggests that hearing is the trigger or circumstance for the action, not a separate means. The suggested rewrite, which aligns with the provided footnote, removes the redundancy and more accurately reflects the Hebrew sequence of 'hear then do'.
