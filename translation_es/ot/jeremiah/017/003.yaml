review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del hebreo y la auditoría inglesa: conserva «mi montaña en el campo», coordina correctamente «tu riqueza… todos tus tesoros… y tus lugares altos» como objetos de «daré como botín», y mantiene la lectura causal de בְּחַטָּאת. Sin embargo, introduce un error importante al añadir «Iahvé» al texto principal, pese a que no aparece en el hebreo de este versículo, y además deja una concordancia verbal incorrecta («Iahvé los daré»).'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero necesita reparación menor. «Mi montaña en el campo» y «lugares altos» son naturales dentro del registro bíblico. El principal problema de legibilidad y fidelidad es la inserción no justificada de «Iahvé» y la sintaxis resultante. También conviene alinear las notas: la nota [c] está anclada a «lugares altos», pero en realidad comenta la frase «a causa del pecado…».'
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: no había יהוה en el texto fuente, por lo que no debe añadirse «Yahvé» en el cuerpo del versículo; «riqueza», «tesoros», «lugares altos» y «botín» reflejan bien las decisiones POB. La traducción de בְּכָל גְּבוּלֶיךָ como «en todo tu territorio» es aceptable, aunque «por todo tu territorio» o «a lo largo de todo tu territorio» expresaría mejor el matiz distributivo de «throughout».'
  issues:
  - severity: high
    issue: Se añadió «Iahvé» al texto principal sin base en el hebreo.
    rationale: Jeremías 17:3 no contiene el nombre divino. Incorporarlo altera la forma del original y viola la disciplina de trabajar desde la evidencia fuente.
  - severity: high
    issue: La frase «Iahvé los daré como botín» es gramaticalmente incorrecta.
    rationale: Combina un sujeto explícito con una primera persona verbal incompatible. Debe ser «los daré» o «Yahvé los dará», pero lo segundo no está respaldado por el texto fuente.
  - severity: medium
    issue: La nota [c] está anclada al lugar equivocado.
    rationale: Su contenido trata las alternativas de «a causa del pecado… / en pecado…», no «tus lugares altos». El marcador debe ir en la frase causal.
  - severity: low
    issue: Ortografía del nombre divino en nota.
    rationale: La nota [a] usa «Yahvé», pero el texto principal usa «Iahvé». El proyecto prefiere «Yahvé» cuando corresponda.
  revised_spanish_text: Mi montaña en el campo[a]—tu riqueza[b], todos tus tesoros, y tus lugares altos a causa del pecado[c] en todo tu territorio[d]—los daré como botín.
  revised_footnotes:
