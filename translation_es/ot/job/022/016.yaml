translation:
  language: es
  text: los que fueron arrebatados antes de tiempo[a][b], cuyo fundamento fue arrastrado por un río[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron cortados antes de su tiempo». El verbo hebreo es difícil y puede sugerir ser tomados, consumidos o removidos de repente.'
    reason: lexical_alternative
  - marker: b
    text: El versículo puede aludir específicamente a la generación destruida por el diluvio, o más generalmente a la caída repentina de los impíos.
    reason: cross_reference
  - marker: c
    text: 'O: «cuyo fundamento fue derramado por un río»; es decir, fue sobrepasado o arrastrado. La imagen hebrea es muy condensada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - los cuales
  lexicon: HALOT
  rationale: El relativo introduce personas en plural; en español, "los que" suena natural y mantiene el referente personal sin forzar un calco.
- source_word: קֻמְּטוּ
  english_pob_choice: were snatched away
  chosen_spanish: fueron arrebatados
  alternatives_spanish:
  - fueron arrancados
  - fueron apresados
  - fueron cortados
  lexicon: HALOT
  rationale: El verbo hebreo es difícil y puede sugerir ser tomados, removidos o eliminados súbitamente. "Arrebatados" conserva la idea de remoción repentina sin decidir en exceso por una imagen física única.
- source_word: וְלֹא עֵת
  english_pob_choice: before their time
  chosen_spanish: antes de tiempo
  alternatives_spanish:
  - antes de su tiempo
  - en un tiempo no debido
  - cuando no era su hora
  lexicon: HALOT
  rationale: La expresión hebrea comunica un fin prematuro. "Antes de tiempo" es idiomático en español y preserva la fuerza de juicio anticipado.
- source_word: נָהָר
  english_pob_choice: a river
  chosen_spanish: un río
  alternatives_spanish:
  - un arroyo
  - un torrente
  - una inundación
  lexicon: HALOT
  rationale: El sustantivo básico es "río"; se mantiene la imagen concreta del texto sin convertirla de entrada en una interpretación como "inundación".
- source_word: יוּצַק
  english_pob_choice: was washed away
  chosen_spanish: fue arrasado
  alternatives_spanish:
  - fue derramado
  - fue lavado
  - fue barrido
  lexicon: HALOT
  rationale: El verbo literalmente se relaciona con derramar/verter, pero aplicado al fundamento y al río sugiere ser sobrepasado o destruido por el agua. "Arrasado" comunica en español esa destrucción por embate de aguas de manera natural y cercana a la metáfora.
- source_word: יְסוֹדָם
  english_pob_choice: their foundation
  chosen_spanish: su fundamento
  alternatives_spanish:
  - su base
  - sus cimientos
  lexicon: HALOT
  rationale: El sustantivo puede ser singular colectivo con sufijo plural. "Su fundamento" preserva la imagen del soporte que colapsa y permite una referencia colectiva sin perder claridad.
theological_decisions:
- issue: Alusión histórica específica o metáfora general de juicio
  english_pob_reading: The verse may allude specifically to the generation destroyed by the flood, or more generally to the sudden downfall of the wicked.
  chosen_spanish_reading: La versión española conserva la imagen sin decidir si se trata de una alusión concreta a la generación del diluvio o de una metáfora general del derrumbe repentino de los impíos.
  alternative_spanish_readings:
  - Podría aludir de manera específica a los destruidos por el diluvio.
  - Podría ser solo una metáfora del juicio súbito contra los impíos.
  rationale: El hebreo y el contexto permiten ambas posibilidades. Mantener la ambigüedad respeta la cautela del POB en inglés y evita cerrar indebidamente el sentido.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla por adelantado.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado más reciente del audit trail en inglés, que no introdujo revisiones adicionales tras la última pasada. Se preserva la misma doble tensión: la dificultad léxica de קֻמְּטוּ y la ambigüedad histórica/figurativa del agua que destruye el fundamento.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el Tetragrámaton.
  - Se eligió «impíos» en la nota teológica, aunque el texto principal no lo explicita, para reflejar el sujeto implícito del contexto inmediato sin ampliar el verso.
  - Se mantuvo «fundamento» para conservar la metáfora de base estructural, en línea con el inglés auditado.
  - La puntuación y el orden buscan un español publicable sin perder la condensación poética del hebreo.
