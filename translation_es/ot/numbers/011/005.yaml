revisions:
- from: Recordamos el pescado que comíamos en Egipto de balde[a], los pepinos, los melones, los puerros, las cebollas y los ajos.
  to: Nos acordamos del pescado que comíamos en Egipto de balde[a], los pepinos, los melones, los puerros, las cebollas y los ajos.
  rationale: Se cambió 'Recordamos' por 'Nos acordamos de' para expresar inequívocamente la memoria presente del discurso directo y alinearse con la decisión fuente y la auditoría inglesa. El resto del versículo y la nota pueden mantenerse.
