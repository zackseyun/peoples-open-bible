- from: 'En aquel día se cantará este canto en la tierra de Judá: «Tenemos una ciudad fuerte[a][b][c]; él pone la salvación por muros y baluarte».'
  to: 'En aquel día se cantará este canto en la tierra de Judá: «Tenemos una ciudad fuerte[a]; él pone la salvación como muros y baluarte[c]».[b]'
