translation:
  language: es
  text: Pero en mi tropiezo[a] se alegraron y se reunieron; se juntaron contra mí—extraños[b] que yo no conocía. Me despedazaron[c] y no se detuvieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en mi cojera» o «cuando tropecé». El hebreo puede referirse a una debilidad corporal o, más ampliamente, a una caída o fracaso momentáneo.'
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea es rara e incierta; también puede entenderse como «golpeadores», «agresores», o quizá «afligidos/cojos».
    reason: lexical_alternative
  - marker: c
    text: 'O: «me despedazaron, y no callaron», si la imagen es la de un hostigamiento verbal incesante más que la de un ataque continuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְצַלְעִי
  english_pob_choice: at my stumbling
  chosen_spanish: en mi tropiezo
  alternatives_spanish:
  - en mi cojera
  - cuando tropecé
  - en mi vacilar
  lexicon: HALOT
  rationale: צלע puede referirse a cojera/lamidez o, más ampliamente, a una caída, tropiezo o debilidad. 'En mi tropiezo' conserva la amplitud semántica y suena natural en español sin reducir el hebreo a una lesión física específica.
- source_word: שָׂמְחוּ
  english_pob_choice: they rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - estuvieron alegres
  lexicon: HALOT
  rationale: El verbo expresa gozo hostil ante la desgracia del salmista. 'Se alegraron' comunica bien esa reacción en español actual; 'regocijaron' es posible pero más marcado.
- source_word: וְנֶאֱסָפוּ / נֶאֶסְפוּ
  english_pob_choice: and gathered together; they gathered
  chosen_spanish: y se reunieron; se juntaron
  alternatives_spanish:
  - y se congregaron; se congregaron
  - y se juntaron; se juntaron
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo con dos verbos paralelos en español. 'Reunieron/juntaron' refleja el acopio o agrupamiento hostil sin perder naturalidad.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - encima de mí
  lexicon: HALOT
  rationale: En contexto adversarial, 'contra mí' expresa la fuerza hostil del hebreo mejor que una traducción literal como 'sobre mí'.
- source_word: נֵכִים
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - personas desconocidas
  lexicon: HALOT
  rationale: Aunque el término es raro y discutido, el audit trail inglés terminó prefiriendo 'strangers'. 'Extraños' reproduce esa lectura en español y deja abierta la rareza léxica sin imponer 'smiters' o 'afligidos' como sentido principal.
- source_word: וְלֹא יָדַעְתִּי
  english_pob_choice: whom I did not know
  chosen_spanish: que yo no conocía
  alternatives_spanish:
  - a quienes no conocía
  - y yo no sabía
  lexicon: HALOT
  rationale: Se traduce como cláusula relativa natural en español para reflejar la función descriptiva del hebreo y la revisión inglesa que integró esta expresión con el sustantivo anterior.
- source_word: קָרְעוּ
  english_pob_choice: they tore at me
  chosen_spanish: me despedazaron
  alternatives_spanish:
  - me rasgaron
  - me destrozaron
  lexicon: HALOT
  rationale: קרע indica rasgar o desgarrar. 'Me despedazaron' transmite la violencia figurada o literal del ataque con fuerza idiomática en español, sin añadir un objeto explícito que el hebreo no da.
- source_word: וְלֹא דָמּוּ
  english_pob_choice: and did not stop
  chosen_spanish: y no callaron
  alternatives_spanish:
  - y no cesaron
  - y no se quedaron callados
  lexicon: HALOT
  rationale: דמם puede significar callar o cesar. Dado que la imagen puede ser de abuso verbal insistente o de ataque incesante, 'no callaron' preserva la ambigüedad y coincide con la alternativa textual señalada en el audit trail inglés.
theological_decisions:
- issue: 'Naturaleza de la agresión final: física o verbal'
  english_pob_reading: They tore at me and did not stop; alternatively, they tore, and they were not silent.
  chosen_spanish_reading: Me despedazaron y no callaron.
  alternative_spanish_readings:
  - Me despedazaron y no cesaron.
  - Me rasgaron y no se quedaron callados.
  rationale: El hebreo permite tanto la imagen de desgarramiento físico como la de hostigamiento verbal persistente. La formulación elegida mantiene abierta esa tensión, sin forzar una resolución que el texto no decide explícitamente.
  doctrine_reference: Salmos 35:15; paralelismo poético hebreo y polisemia de דמם
translation_notes:
  revision_awareness: El texto inglés más reciente cambió la lectura de 'strikers' a 'strangers' para נֵכִים, y también mantuvo la frase final como un ataque continuo. La versión española sigue esa revisión, conserva la repetición de los verbos de reunión y evita cerrar la ambigüedad de דמּוּ.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene una distinción entre verbos de reunión ('se reunieron' / 'se juntaron') para reflejar la duplicación hebrea.
  - '''Extraños'' se eligió por coherencia con la revisión inglesa final y por su naturalidad en español.'
