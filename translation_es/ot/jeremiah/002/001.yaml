- from: Y fue la palabra de Yahvé[a] a mí, diciendo,
  to: Y vino la palabra de Yahvé[a] a mí, diciendo,
  rationale: Se reemplaza «Y fue» por «Y vino» para reflejar con fidelidad idiomática la fórmula profética hebrea y la rationale del POB en inglés. Se conservan «la palabra», «Yahvé», «a mí» y «diciendo» por ser fieles al texto fuente y a la terminología del proyecto.
