  yaml_path: translation/ot/1_samuel/019/013.yaml
  text: Then Michal took the household idol and laid it on the bed[b][a], and she put a cushion of goats’ hair at its head and covered it with the garment.
  footnotes:
  - marker: a
    text: Or 'the teraphim,' 'the household gods,' or 'the image.' The Hebrew term refers to household cult objects; here it appears to function as a single figure in the bed.
    reason: lexical_alternative
  - marker: b
    text: The exact meaning of the Hebrew expression is uncertain; it may refer to a woven goats’ hair covering, net, pillow, or similar item placed at the head.
    reason: lexical_alternative
