lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: El verbo דבר introduce la fórmula narrativa de discurso. En español, «habló» conserva el hecho de que Yahvé se dirige a Moisés y suena natural en una fórmula solemne; «dijo» también sería posible, pero «habló» refleja mejor el matiz del acto de hablar como introducción formal del oráculo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del texto hebreo. La forma «Yahvé» es la convención española del proyecto para יְהוָה y evita la sustitución titulada «el SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso. En español, «a» expresa de manera natural la dirección del habla hacia Moisés.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - diciendo
  lexicon: HALOT
  rationale: La construcción infinitiva formula la introducción del discurso. «Diciendo» preserva la fórmula narrativa sin añadir explicación.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se mantiene el nombre personal del pacto en lugar de una sustitución titular. La forma española común y auditable del nombre es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto de auditoría inglesa no requirió cambios de sentido; la versión española sigue la misma lectura formal del hebreo y conserva la fórmula de introducción del discurso.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene una estructura breve y ceremonial, adecuada para una fórmula de apertura del discurso divino.
  - «Diciendo» conserva la dependencia sintáctica del infinitivo hebreo sin amplificación interpretativa.
