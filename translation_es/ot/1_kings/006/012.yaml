revisions:
- from: En cuanto a esta casa que estás edificando[a], si andas en mis estatutos, cumples mis juicios y guardas todos mis mandamientos para andar en ellos, entonces estableceré mi palabra contigo, la que hablé a David, tu padre.
  to: En cuanto a esta casa que estás edificando, si andas en mis estatutos, cumples mis juicios y guardas todos mis mandamientos andando en ellos, entonces estableceré mi palabra contigo[a], que hablé a David tu padre.
  rationale: 'La revisión corrige el principal problema de alineación con la auditoría inglesa: la nota al pie debe explicar el modismo hebreo de «establecer mi palabra», no el participio de «edificando». También se ajusta «para andar en ellos» a «andando en ellos» para reflejar mejor el matiz modal del infinitivo, y se pule la cláusula final para que suene más natural en español sin apartarse del hebreo.'
