translation:
  language: es
  text: Los jóvenes de Aven[a] y de Pi-beset[b] caerán a espada, y estas ciudades irán al cautiverio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aven probablemente se refiere a On, es decir, Heliópolis en Egipto.
    reason: alternative_reading
  - marker: b
    text: Pi-beset suele identificarse con Bubastis.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּח֥וּרֵי
  english_pob_choice: young men of
  chosen_spanish: los jóvenes de
  alternatives_spanish:
  - los muchachos de
  - los hombres jóvenes de
  lexicon: HALOT
  rationale: בַּחוּרִים designa a varones jóvenes en la plenitud de la vida. «Los jóvenes de» conserva el sentido humano y el tono de desastre/juzgamiento sin introducir una precisión social que el hebreo no exige.
- source_word: אָ֛וֶן
  english_pob_choice: Aven
  chosen_spanish: Aven
  alternatives_spanish:
  - 'On'
  lexicon: HALOT
  rationale: Es un topónimo. Se mantiene la forma transliterada «Aven» en el texto principal; la identificación histórica con On se conserva en nota para no borrar la tensión onomástica.
- source_word: וּ/פִי בֶ֖סֶת
  english_pob_choice: Pi-beseth
  chosen_spanish: Pi-beset
  alternatives_spanish:
  - Pi-beseth
  - Bubastis
  lexicon: HALOT
  rationale: Se translitera el nombre propio con ortografía española fluida. Se evita sustituirlo por «Bubastis» en el cuerpo, preservando la forma hebrea, mientras la identificación histórica queda anotada.
- source_word: בַּ/חֶ֣רֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: La expresión hebrea es instrumental/causal en un contexto de guerra. En español, «caer a espada» es natural y reproduce bien el valor idiomático de muerte violenta.
- source_word: יִפֹּ֑לוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - serán abatidos
  - morirán
  lexicon: HALOT
  rationale: נפל conserva la imagen de caída y funciona como fórmula de muerte en combate. «Caerán» mantiene la metáfora hebrea sin perder claridad.
- source_word: וְ/הֵ֖נָּה
  english_pob_choice: and these cities
  chosen_spanish: y estas ciudades
  alternatives_spanish:
  - y ellas
  - y estos lugares
  lexicon: HALOT
  rationale: El pronombre femenino plural remite a las ciudades mencionadas. En español conviene explicitar el referente para evitar ambigüedad, como también hace la audit trail inglesa.
- source_word: בַּ/שְּׁבִ֥י
  english_pob_choice: into captivity
  chosen_spanish: al cautiverio
  alternatives_spanish:
  - a la cautividad
  - en cautiverio
  - al exilio
  lexicon: HALOT
  rationale: שׁבי denota estado de cautiverio/deportación. «Al cautiverio» es una forma natural y fiel en español bíblico; «exilio» sería más interpretativo.
- source_word: תֵלַֽכְנָה
  english_pob_choice: will go
  chosen_spanish: irán
  alternatives_spanish:
  - serán llevadas
  - marcharán
  lexicon: HALOT
  rationale: הלך es literalmente «ir/andar». En combinación con «al cautiverio», «irán» preserva la imagen verbal del hebreo y comunica el destino de deportación.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó un «of» redundante antes de Pi-beseth por fluidez, sin cambiar el sentido. El español adopta una construcción igualmente fluida y mantiene la transliteración de los topónimos, con notas de identificación histórica.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención del proyecto cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se mantiene la metáfora de «caer» en vez de explicitar solo «morir» para respetar el verbo hebreo נפל.
  - «Al cautiverio» evita cargar el verso con un matiz eclesiástico o doctrinal ajeno al hebreo.
  - Las notas aclaratorias preservan las identificaciones históricas sin reemplazar los nombres del texto principal.
