  rationale: Se corrige el versículo para alinearlo con la decisión auditada de seguir el griego en Sirach 11:11, ya que la línea hebrea suministrada parece corresponder a otro contexto. 'Hay quien' refleja bien ἔστιν; 'trabaja, se afana y se apresura' conserva la serie de esfuerzo sin colapsar sus matices; 'tanto más queda falto' comunica la ironía comparativa de τόσῳ μᾶλλον ὑστερεῖται en español natural. La nota se invierte para reflejar honestamente la situación textual documentada por la POB inglesa.
