translation:
  language: es
  text: No puedo llevar yo solo[a] a todo este pueblo, porque es demasiado pesado para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevar a todo este pueblo yo solo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּכַל
  english_pob_choice: am not able
  chosen_spanish: no puedo
  alternatives_spanish:
  - no soy capaz de
  - no me es posible
  lexicon: HALOT
  rationale: El verbo expresa capacidad/in-capacidad. En español, «no puedo» comunica de forma natural la imposibilidad sin perder el valor verbal básico.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español se puede reflejar con «yo» explícito, y el énfasis se intensifica en la combinación con «solo».
- source_word: לְבַדִּי
  english_pob_choice: by myself
  chosen_spanish: yo solo
  alternatives_spanish:
  - por mí mismo
  - solo
  lexicon: HALOT
  rationale: La expresión apunta a hacerlo sin ayuda. «Yo solo» mantiene el sentido de autosuficiencia/aislamiento y conserva el énfasis del hebreo con español idiomático.
- source_word: לָשֵׂאת
  english_pob_choice: to carry
  chosen_spanish: llevar
  alternatives_spanish:
  - cargar
  - soportar
  - llevar
  lexicon: HALOT
  rationale: נשא aquí tiene el valor de cargar una responsabilidad o peso. «Llevar» funciona bien en español para la imagen de carga y la responsabilidad pastoral implícita.
- source_word: כָּל הָעָם הַזֶּה
  english_pob_choice: all this people
  chosen_spanish: todo este pueblo
  alternatives_spanish:
  - toda esta gente
  - todo este pueblo
  lexicon: HALOT
  rationale: Se conserva el sustantivo colectivo singular «pueblo», que corresponde mejor al hebreo que un plural suavizado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Introduce la razón de la incapacidad. «Porque» es claro y directo en español contemporáneo.
- source_word: כָבֵד מִמֶּנִּי
  english_pob_choice: it is too heavy for me
  chosen_spanish: me es demasiado pesado
  alternatives_spanish:
  - es demasiado pesado para mí
  - me resulta demasiado pesado
  lexicon: HALOT
  rationale: כבד expresa peso/burdensidad. «Me es demasiado pesado» preserva la idea de carga excesiva sin añadir un sujeto explícito que el hebreo no formula.
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión inglesa movió לְבַדִּי de una construcción apposicional («I alone») a una más natural («by myself»). En español, «yo solo» conserva el énfasis y la naturalidad, sin forzar una paráfrasis.
  spanish_consistency_notes:
  - Se mantiene el término colectivo singular «pueblo» para reflejar el hebreo.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque este versículo no contiene el tetragrámaton.
  - La imagen de la carga se conserva con «llevar» y «pesado», sin convertir el texto en una abstracción excesiva.
