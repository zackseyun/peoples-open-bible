translation:
  language: es
  text: Prepárense según las casas de sus padres[a], conforme a sus divisiones[b], de acuerdo con la escritura de David, rey de Israel, y con la escritura de Salomón, su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'según las casas paternas de ustedes'. La expresión hebrea se refiere a agrupaciones domésticas ancestrales o paternas dentro de Israel.
    reason: lexical_alternative
  - marker: b
    text: '''Divisiones'' también puede traducirse ''cursos'', especialmente en contextos organizativos sacerdotales o levíticos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָכִינוּ
  english_pob_choice: Prepare yourselves
  chosen_spanish: Prepárense
  alternatives_spanish:
  - Pónganse en orden
  - Dispónganse
  - Alístense
  lexicon: HALOT
  rationale: El hiphil imperativo plural de כון comunica la idea de disponer o preparar activamente. En español, 'Prepárense' expresa esa exhortación de forma natural y directa sin añadir matices ajenos al contexto organizativo/cúltico.
- source_word: לְבֵית אֲבוֹתֵיכֶם
  english_pob_choice: by your fathers’ houses
  chosen_spanish: por casas de sus padres
  alternatives_spanish:
  - según las casas de sus padres
  - por sus casas paternas
  - por casas ancestrales
  lexicon: HALOT
  rationale: La expresión hebrea designa unidades familiares/patrimoniales de tipo ancestral o paterno. 'Casas de sus padres' conserva bien la estructura del original; 'por' funciona en español como marcador de asignación o distribución.
- source_word: כְּמַחְלְקוֹתֵיכֶם
  english_pob_choice: according to your divisions
  chosen_spanish: conforme a sus divisiones
  alternatives_spanish:
  - según sus divisiones
  - según sus cursos
  - por sus divisiones
  lexicon: HALOT
  rationale: מַחְלְקוֹת alude a divisiones o grupos asignados, con posible trasfondo sacerdotal/levítico. 'Divisiones' mantiene la fuerza semántica sin forzar el término técnico 'cursos', que podría sonar más interpretativo en español.
- source_word: בִּכְתָב
  english_pob_choice: in accordance with the writing of
  chosen_spanish: de acuerdo con la escritura de
  alternatives_spanish:
  - conforme a la escritura de
  - según la escritura de
  - en la escritura de
  lexicon: HALOT
  rationale: כְּתָב es 'escritura' o 'documento'. La preposición con ב indica conformidad con una norma escrita; 'de acuerdo con' refleja esa relación normativa de manera idiomática y sin añadir 'prescrito'.
- source_word: דָּוִיד מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: David king of Israel
  chosen_spanish: David, rey de Israel
  alternatives_spanish:
  - David rey de Israel
  - David, el rey de Israel
  lexicon: HALOT
  rationale: Se conserva el título apposicional de forma sobria y natural en español. La coma ayuda a leer la frase como aposición nominal, sin introducir determinación extra no presente en el hebreo.
- source_word: וּבְמִכְתַּב
  english_pob_choice: and the writing of
  chosen_spanish: y con la escritura de
  alternatives_spanish:
  - y en la escritura de
  - y con el documento de
  - y según la escritura de
  lexicon: HALOT
  rationale: מִכְתָּב es un sustantivo afín a כְּתָב y refiere a un escrito/documento. 'Con la escritura de' mantiene la repetición del hebreo y evita sobreinterpretar el segundo miembro con una expansión distinta al primero.
- source_word: שְׁלֹמֹה בְנוֹ
  english_pob_choice: Solomon his son
  chosen_spanish: Salomón, su hijo
  alternatives_spanish:
  - Salomón su hijo
  - Salomón, hijo de él
  lexicon: HALOT
  rationale: La aposición filial se traduce de manera directa y clara. 'Su hijo' preserva la relación paterno-filial sin necesidad de explicitar el antecedente, que en contexto es David.
translation_notes:
  revision_awareness: 'El borrador sigue la lectura final del audit trail inglés, que suaviza la primera mitad del versículo y mantiene una fórmula más literal y repetitiva en la segunda: ''in accordance with the writing of David king of Israel and the writing of Solomon his son.'' No se introducen notas porque el hebreo y el inglés auditado no exigen una alternativa textual o teológica adicional en este versículo.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque aquí no aparece el tetragrámaton.
  - Se usa 'escritura' para כְּתָב/מִכְתָּב de manera consistente con el valor de documento escrito.
  - '''Divisiones'' conserva la posible referencia técnico-organizativa sin imponer ''cursos'' en el texto principal.'
  - Se mantiene 'rey de Israel' como aposición simple, siguiendo la concisión del hebreo.
