translation:
  language: es
  text: Y Nicanor[a], con plena seguridad y con arrogante altivez, había decidido causar una destrucción general a los que estaban con Judas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había resuelto infligir un castigo común al partido de Judas». La expresión griega κοινὸν ... τρόπον es idiomática y difícil; el texto principal adopta una formulación clara en español para expresar la idea de una destrucción general contra el grupo de Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ πάσης ἀσφαλείας
  english_pob_choice: in complete confidence
  chosen_spanish: con plena seguridad
  alternatives_spanish:
  - con completa confianza
  - con plena confianza
  - con total seguridad
  lexicon: LSJ
  rationale: La frase expresa un estado de seguridad/confianza personal, no protección física. «Con plena seguridad» conserva ese matiz de autosuficiencia confiada y suena natural en español.
- source_word: ὑψαυχενῶν
  english_pob_choice: with arrogant pride
  chosen_spanish: con arrogante altivez
  alternatives_spanish:
  - con orgullo arrogante
  - con soberbia
  - con altivez arrogante
  lexicon: LSJ
  rationale: El participio comunica elevación soberbia del cuello/actitud de desprecio. «Altivez» mantiene el tono moral de soberbia e insolencia; «arrogante» refuerza el matiz adverbial.
- source_word: διεγνώκει
  english_pob_choice: had decided
  chosen_spanish: había decidido
  alternatives_spanish:
  - había resuelto
  - había determinado
  lexicon: LSJ
  rationale: El pluscuamperfecto indica una decisión ya fijada antes de la acción narrada. «Había decidido» es claro y fiel al aspecto perfectivo del verbo.
- source_word: κοινὸν ... τρόπον
  english_pob_choice: a common destruction
  chosen_spanish: una destrucción común
  alternatives_spanish:
  - una destrucción general
  - un castigo común
  - una ruina común
  lexicon: LSJ
  rationale: La expresión es idiomática y difícil; no conviene calcarla como «modo común». En este contexto, la revisión inglesa entendió que se trata de una destrucción/aniquilación compartida o general contra el grupo de Judas. «Destrucción común» conserva la rareza semántica sin domesticarse demasiado.
- source_word: τῶν περὶ τὸν Ἰούδαν
  english_pob_choice: those around Judas
  chosen_spanish: los que estaban con Judas
  alternatives_spanish:
  - los de alrededor de Judas
  - la gente de Judas
  - el grupo de Judas
  lexicon: LSJ
  rationale: La construcción se refiere al grupo asociado con Judas. «Los que estaban con Judas» es idiomático en español y preserva la referencia colectiva sin añadir precisión histórica que el griego no exige.
- source_word: συστήσασθαι
  english_pob_choice: to make
  chosen_spanish: provocar
  alternatives_spanish:
  - llevar a cabo
  - idear
  - hacer
  lexicon: LSJ
  rationale: Con τρόπον, el infinitivo señala el establecimiento o producción de un cierto curso de acción, aquí destructivo. «Provocar» expresa mejor la idea de desencadenar/ocasionar una destrucción sobre el grupo, sin perder la relación con el plan decidido.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que corrigió la clausula final para reflejar mejor κοινὸν ... τρόπον con συστήσασθαι como una intención de destrucción contra el grupo de Judas, no como «ejemplo público». La redacción española sigue esa revisión y evita una interpretación moralizante ajena al griego.
  spanish_consistency_notes:
  - Se mantuvo «Y Nicanor» para reflejar la coordinación narrativa inicial del griego.
  - Se prefirió «había decidido» para preservar el pluscuamperfecto narrativo.
  - Se evitó «Mesías/Cristo» o terminología teológica no presente en el versículo.
  - «Destrucción común» intenta conservar la tensión semántica del original, con nota alternativa para la lectura idiomática.
  - «Los que estaban con Judas» reproduce de manera natural τῶν περὶ τὸν Ἰούδαν sin sobrerrepresentar el matiz geográfico de περὶ.
