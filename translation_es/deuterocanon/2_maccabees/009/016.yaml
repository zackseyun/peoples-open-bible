    issue: La nota [a] está anclada en 'templo' pero explica ἀναθήμασιν ('ofrendas votivas').
    rationale: Los marcadores deben aparecer exactamente en la palabra o frase pertinente. Tal como está, induce al lector a pensar que la alternativa afecta a 'santo templo'.
  - severity: medium
