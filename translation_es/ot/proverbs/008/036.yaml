review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: pecar contra la Sabiduría trae autodaño, y odiarla equivale a amar la muerte. Sin embargo, la combinación elegida para חֹמֵס נַפְשׁוֹ no preserva del todo la misma fuerza ni la misma ambigüedad que el expediente inglés final: el texto principal dice «hace violencia a su vida», pero la nota lo presenta como lectura más literal «a su alma/vida», lo que queda algo desajustado. Además, «hace violencia a su vida» suena menos natural en español que una formulación que mantenga el objeto personal o antropológico más cercano al hebreo.'
  spanish_quality_summary: El español es claro y digno, pero «hace violencia a su vida» resulta algo forzado e idiomáticamente menos natural en registro bíblico contemporáneo. «A su alma» funciona mejor en el texto principal, conserva la formalidad del expediente inglés final («his own soul»), y la nota puede aclarar que también puede entenderse como «su vida». El resto del verso está bien logrado; «aborrecen» y «aman la muerte» son naturales y apropiados.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La principal cuestión léxica es נַפְשׁוֹ: el borrador favorece «su vida», pero el rastro auditado en inglés fue revisado hacia «his own soul» con nota de alternativa «soul/life». En español conviene seguir esa decisión documentada en el texto principal y conservar «vida» como alternativa en nota.'
  issues:
  - severity: medium
    issue: «hace violencia a su vida» suena poco idiomático en español
    rationale: Aunque reproduce elementos del hebreo, la frase no es la opción más natural ni más clara en español eclesial contemporáneo. «Hace violencia a su alma» o «se hace daño a sí mismo» suenan mejor; dado el expediente inglés final, «a su alma» es la mejor reparación.
  - severity: medium
    issue: Desajuste entre texto principal y nota en torno a נַפְשׁוֹ
    rationale: El texto principal usa «su vida», pero la nota dice «más literalmente, a su alma/vida», lo que hace parecer que el principal ya no está reflejando la elección formal del expediente inglés final. Conviene alinear texto y nota.
  revised_spanish_text: Pero el que peca contra mí hace violencia a su alma[a]; todos los que me aborrecen aman la muerte.
  revised_footnotes:
  - marker: a
    text: O, «a su vida». Literalmente, «hace violencia a su alma/vida». El hebreo también puede expresar daño contra la propia persona.
    reason: lexical_alternative
  revision_rationale: Se ajusta נַפְשׁוֹ a «su alma» en el texto principal para seguir mejor la revisión final documentada en inglés («wrongs his own soul») y para lograr un español más natural y solemne que «hace violencia a su vida». La nota preserva la amplitud semántica de נפש («alma/vida» y, por extensión, la propia persona).
