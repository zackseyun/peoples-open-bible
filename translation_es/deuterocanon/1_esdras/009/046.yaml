translation:
  language: es
  text: Y cuando se leyó la ley[b], todos se quedaron de pie erguidos; y Azarías[a] bendijo al Dios Altísimo, el Señor de los ejércitos[c], el Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Azarías; el paralelo hebreo tiene Azariah.
    reason: alternative_reading
  - marker: b
    text: O 'cuando la ley fue abierta' o 'desenrollada'. El verbo griego literalmente significa 'soltar', pero en este contexto se refiere a abrir la ley para su lectura pública.
    reason: lexical_alternative
  - marker: c
    text: '''Ejércitos'' traduce el griego sabaōth, un título divino tradicional que a veces se deja transliterado como ''Sabaot'' o ''Sabaoth''.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ λῦσαι
  english_pob_choice: when ... was read
  chosen_spanish: cuando se leyó
  alternatives_spanish:
  - cuando fue leída
  - cuando se abrió
  - cuando se desenrolló
  lexicon: BDAG; contexto de lectura pública de un rollo
  rationale: Aunque λύω literalmente puede significar 'soltar/desatar', en este contexto funciona como cláusula temporal vinculada a la apertura/lectura pública de la ley. La revisión inglesa ya decidió por 'was read' como la opción más natural y fiel al contexto; en español, 'se leyó' conserva ese sentido sin introducir una imagen demasiado mecánica de desenrollar.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - el libro de la ley
  - la Torá
  lexicon: BDAG
  rationale: νόμος aquí refiere a la ley/Torá presentada públicamente. 'La ley' es el equivalente más directo y natural en español. Se evita 'la Torá' porque el texto griego no la nombra explícitamente y 'el libro de la ley' añadiría una precisión no presente en la cláusula.
- source_word: πάντες ὀρθοὶ ἔστησαν
  english_pob_choice: they all stood upright
  chosen_spanish: todos se pusieron de pie con reverencia
  alternatives_spanish:
  - todos permanecieron de pie
  - todos se mantuvieron erguidos
  - todos se pusieron de pie
  lexicon: BDAG
  rationale: ὀρθοὶ añade la idea de postura erguida, no solo estar de pie. En español, 'se pusieron de pie con reverencia' preserva el contenido físico y comunica la actitud reverente implícita en el contexto litúrgico, sin perder el matiz de postura correcta/recta.
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - pronunció bendición sobre
  lexicon: BDAG
  rationale: Con Dios como objeto, εὐλογέω puede expresarse naturalmente como 'bendecir' en español, manteniendo la misma dirección devocional del original. 'Alabó' sería más interpretativo; 'pronunció bendición sobre' resulta pesado y menos idiomático.
- source_word: Ἀζαρίας
  english_pob_choice: Azarias
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: LSJ; forma bíblica castellana tradicional compatible con la forma griega
  rationale: La forma griega primaría favorece 'Azarias' en inglés; en español, 'Azarías' es la transliteración natural y reconocible, y además mantiene la proximidad fonética con el griego y con el paralelo hebreo. Se conserva la variante documentada en nota.
- source_word: τῷ ὑψίστῳ θεῷ
  english_pob_choice: the Most High God
  chosen_spanish: al Dios Altísimo
  alternatives_spanish:
  - al Dios Altísimo
  - al Altísimo Dios
  - al Dios, el Altísimo
  lexicon: BDAG
  rationale: El título se vierte de forma idiomática en español como 'Dios Altísimo'. El dativo se expresa con 'al'. Esta opción preserva la titularidad del sintagma sin sonar artificial.
- source_word: σαβαὼθ
  english_pob_choice: hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - Sabaot
  - Sabaoth
  - de las huestes
  lexicon: LSJ; uso bíblico tradicional
  rationale: El inglés POB traduce semánticamente σαβαώθ como 'hosts'. En español, 'ejércitos' comunica ese valor colectivo militar/celestial con claridad y evita transliteraciones innecesarias. 'Huestes' también sería posible, pero 'ejércitos' es más transparente para lectores amplios.
- source_word: Παντοκράτορι
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  - el Todopoderoso
  lexicon: BDAG
  rationale: παντοκράτωρ se corresponde bien con 'Todopoderoso' en español bíblico y contemporáneo. Mantiene el título divino sin ampliar el sentido hacia 'Soberano de todo', que sería más explicativo que el griego.
theological_decisions:
- issue: 'Cadena de títulos divinos: τῷ ὑψίστῳ θεῷ σαβαὼθ Παντοκράτορι'
  english_pob_reading: the Most High God, the Lord of hosts, the Almighty
  chosen_spanish_reading: al Dios Altísimo, el Señor de los ejércitos, el Todopoderoso
  alternative_spanish_readings:
  - al Dios Altísimo, el Dios de los ejércitos, el Todopoderoso
  - al Dios Altísimo, Sabaot, el Todopoderoso
  - al Dios Altísimo, el Señor de las huestes, el Todopoderoso
  rationale: El griego apila títulos divinos. En español, 'Señor de los ejércitos' expresa con naturalidad el valor teológico de σαβαώθ en el uso bíblico, y evita dejar el término sin función sintáctica. Se mantiene la serie de títulos sin suavizarla, respetando la tensión entre traducción semántica y el peso tradicional del título.
  doctrine_reference: 'POB doctrine: traducir títulos divinos cuando el sentido sea claro; mantener el valor teológico del acumulado titular sin borrar su densidad.'
- issue: Azarías frente a la forma griega Ἀζαρίας y el paralelo hebreo Azariah
  english_pob_reading: Greek Azarias; the Hebrew parallel has Azariah.
  chosen_spanish_reading: Azarías
  alternative_spanish_readings:
  - Azarías (con nota sobre Azarías/Azariah)
  - Azarías / Azariah
  rationale: La forma española natural y establecida del nombre es 'Azarías'. La nota preserva la diferencia documentada con el paralelo hebreo sin imponer una forma híbrida o menos idiomática en el texto principal.
  doctrine_reference: 'POB doctrine: transliterate nombres con auditable apoyo textual; conservar variantes relevantes en nota.'
translation_notes:
  revision_awareness: La revisión inglesa del POB cambió 'was opened' por 'was read' para reflejar mejor ἐν τῷ λῦσαι τὸν νόμον en contexto. Esta versión española sigue esa revisión y conserva la traducción semántica de σαβαώθ como título de 'los ejércitos' en el registro principal, con nota alternativa para la transliteración tradicional.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton.
  - Se mantiene 'Dios' para θεός y 'Todopoderoso' para παντοκράτωρ, sin fusionarlos.
  - '''Ley'' traduce νόμος de modo directo y no se expande a ''Torá'' en el texto principal.'
  - Se conserva el acumulado de títulos divinos sin normalizarlo a una sola expresión.
  - El nombre propio se adapta a la forma española habitual 'Azarías', con nota de control textual.
