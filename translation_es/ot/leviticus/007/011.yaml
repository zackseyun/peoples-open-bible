revisions:
- from: Ahora esta es la ley del sacrificio de las ofrendas de paz[a], que se ha de presentar a Yahvé.
  to: Y esta es la ley del sacrificio de las ofrendas de paz[a], que uno presentará a Yahvé.
  rationale: Se ajusta la apertura a un español más natural y bíblicamente digno («Y esta es...»), y se cambia «se ha de presentar» por «que uno presentará» para reflejar mejor el singular genérico y el matiz prescriptivo del hebreo en material legal, sin perder claridad ni neutralidad. Se conserva la terminología clave y la nota léxica documentada.
