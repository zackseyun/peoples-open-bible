translation:
  language: es
  text: Había cierto hombre de Ramataim-zofim[a], de la región montañosa de Efraín, y su nombre era Elcaná, hijo de Jeroam, hijo de Elíhu, hijo de Tojú, hijo de Zuf, un efraimita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Posible lectura alternativa: «un efrateo». El hebreo lleva אֶפְרָתִי, forma que puede entenderse aquí como designación regional vinculada con Efraín; por eso se traduce en el texto principal como «un efraimita».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there was
  chosen_spanish: Ahora había
  alternatives_spanish:
  - Y había
  - Había
  lexicon: HALOT
  rationale: La forma narrativa de וַיְהִי introduce la escena. «Ahora había» conserva el arranque discursivo sin sonar forzado en español y mantiene la función narrativa de apertura.
- source_word: אִישׁ אֶחָד
  english_pob_choice: a certain man
  chosen_spanish: un cierto hombre
  alternatives_spanish:
  - un hombre
  - un hombre determinado
  lexicon: HALOT
  rationale: La combinación suele presentar un personaje todavía no especificado. «Un cierto hombre» conserva ese valor introductorio y la indefinición narrativa del hebreo.
- source_word: מִן הָרָמָתַיִם צוֹפִים
  english_pob_choice: from Ramathaim-zophim
  chosen_spanish: de Ramataim-zofim
  alternatives_spanish:
  - de Ramataim de los zufitas
  - de Ramataim-zofim en la región de Zuf
  lexicon: HALOT
  rationale: Se trata de un topónimo tratado como nombre propio compuesto. Se translitera para no sobreinterpretar sus componentes internos, siguiendo la decisión auditada del inglés POB.
- source_word: מֵהַר אֶפְרָיִם
  english_pob_choice: from the hill country of Ephraim
  chosen_spanish: del monte de Efraín
  alternatives_spanish:
  - de la serranía de Efraín
  - de la región montañosa de Efraín
  lexicon: HALOT
  rationale: En expresiones territoriales, הַר puede referirse al macizo o región montañosa. «Del monte de Efraín» es breve, natural y fiel al valor geográfico del hebreo.
- source_word: וּשְׁמוֹ
  english_pob_choice: and his name was
  chosen_spanish: y su nombre era
  alternatives_spanish:
  - y se llamaba
  - y su nombre fue
  lexicon: HALOT
  rationale: La cláusula paratáctica se reproduce de manera directa. «Y su nombre era» conserva el estilo narrativo hebreo sin añadir matices no presentes.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  - Elcán
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estable y publicable en español bíblico, con acento gráfico para reflejar la pronunciación natural del nombre.
- source_word: בֶּן ... בֶּן ... בֶּן ... בֶן
  english_pob_choice: son of ... son of ... son of ... son of
  chosen_spanish: hijo de ... hijo de ... hijo de ... hijo de
  alternatives_spanish:
  - descendiente de ... descendiente de ...
  - hijo de ... descendiente de ...
  lexicon: HALOT
  rationale: En genealogía, בֶּן se rinde con «hijo de» porque es la formulación directa y habitual en español, manteniendo el encadenamiento genealógico del texto.
- source_word: אֶפְרָתִי
  english_pob_choice: an Ephrathite / an Ephraimite
  chosen_spanish: un efraimita
  alternatives_spanish:
  - un efrateo
  - un efraimita (posiblemente «efrateo»)
  lexicon: HALOT
  rationale: La revisión del POB en inglés resolvió la ambigüedad hacia «Ephraimite» en este contexto, por la cercanía con la frase territorial anterior. En español, «efraimita» preserva esa lectura y evita imponer «efrateo» como si fuera inequívoco.
theological_decisions:
- issue: Identificación de אֶפְרָתִי en relación con la procedencia de Elcaná
  english_pob_reading: an Ephraimite
  chosen_spanish_reading: un efraimita
  alternative_spanish_readings:
  - un efrateo
  rationale: No es una cuestión doctrinal, pero sí de identificación histórico-geográfica. La decisión sigue la revisión auditada del POB inglés, que favorece entender el término como adscripción a Efraín por el contexto inmediato del «monte de Efraín».
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del POB en inglés, que cambió la lectura final de la designación final de «an Ephrathite» a «an Ephraimite» por coherencia con la frase territorial previa. Se conservó la ambigüedad relevante mediante una nota, en vez de normalizar silenciosamente el término.
  spanish_consistency_notes:
  - Se usó «Yahvé» como política general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se transliteraron los nombres propios de forma estable y se mantuvo la cadena genealógica con «hijo de».
  - «Monte de Efraín» conserva el valor territorial del hebreo sin convertirlo en una paráfrasis explicativa.
