translation:
  language: es
  text: Si un hombre hace pastar un campo o una viña[a], y suelta su animal para que pace en el campo de otro[b], restituirá de lo mejor de su campo y de lo mejor de su viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si un hombre quema un campo o una viña». El verbo hebreo בער puede referirse a quemar en algunos contextos, pero aquí la mención inmediata de soltar su animal favorece el sentido de pastar o consumir por ganado.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en un campo de otro». Se hace explícito el sentido posesivo implícito para que el caso legal suene natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En este contexto jurídico casuístico, la partícula introduce un caso hipotético; en español legal-natural, «Si» es la equivalencia más clara y directa.
- source_word: יַבְעֶר
  english_pob_choice: causes ... to be grazed over
  chosen_spanish: hace que ... sean consumidos
  alternatives_spanish:
  - hace que ... sean pastados
  - quema
  lexicon: HALOT
  rationale: Se conserva el valor causativo del verbo en hifil. Dado que el contexto inmediato habla de soltar el animal y de que pace en otro campo, «consumidos» comunica el daño por pastoreo sin imponer «quema», aunque esa acepción exista en otros contextos.
- source_word: שָׂדֶה אוֹ כֶרֶם
  english_pob_choice: a field or vineyard
  chosen_spanish: un campo o una viña
  alternatives_spanish:
  - un terreno o una viña
  - un campo o un viñedo
  lexicon: HALOT
  rationale: «Campo» y «viña» reproducen los sustantivos agrícolas básicos del hebreo con un registro natural y bíblico en español.
- source_word: וְשִׁלַּח אֶת־בְּעִירֹה
  english_pob_choice: and lets his animal loose
  chosen_spanish: y suelta su animal
  alternatives_spanish:
  - y libera su animal
  - y deja su bestia suelta
  - y suelta su ganado
  lexicon: HALOT
  rationale: «Suelta» mantiene la idea de liberar o dejar ir. «Animal» sigue la decisión del POB inglés por claridad moderna; otras opciones serían más arcaicas o más colectivas.
- source_word: בְּעִירֹה
  english_pob_choice: his animal
  chosen_spanish: su animal
  alternatives_spanish:
  - su bestia
  - su ganado
  - su res
  lexicon: HALOT
  rationale: El sufijo posesivo se expresa naturalmente con «su». «Animal» evita sobreespecificar especie y sigue la lectura amplia del caso legal.
- source_word: וּבִעֵר בִּשְׂדֵה אַחֵר
  english_pob_choice: so that it grazes in another man's field
  chosen_spanish: para que pace en el campo de otro
  alternatives_spanish:
  - para que coma en el campo de otro
  - para que se alimente en el campo de otro
  lexicon: HALOT
  rationale: La repetición de בער se entiende por el contexto como acción de pastar/consumir. «Pace» es la forma más natural y precisa en español para el daño causado por el animal; «de otro» reproduce el hebreo אַחֵר sin añadir innecesariamente «hombre», aunque ese sentido esté implícito en el caso legal.
- source_word: מֵיטַב שָׂדֵהוּ וּמֵיטַב כַּרְמוֹ
  english_pob_choice: from the best of his own field and the best of his own vineyard
  chosen_spanish: con lo mejor de su campo y con lo mejor de su viña
  alternatives_spanish:
  - de lo mejor de su campo y de lo mejor de su viña
  - con la parte mejor de su campo y de su viña
  lexicon: HALOT
  rationale: «מֵיטַב» expresa la porción más buena/escogida. En español, la construcción «con lo mejor de» comunica con naturalidad el pago compensatorio desde los bienes del responsable.
- source_word: יְשַׁלֵּם
  english_pob_choice: he shall make restitution
  chosen_spanish: restituirá
  alternatives_spanish:
  - pagará
  - hará restitución
  lexicon: HALOT
  rationale: Se preserva el valor jurídico de compensación, más fuerte que un simple «pagará». «Restituirá» es conciso y adecuado al registro legal del pasaje.
translation_notes:
  revision_awareness: Se ha seguido el consenso alto del audit trail inglés, manteniendo la decisión contextual de בער como daño por pastoreo y conservando la forma casuística legal del versículo sin añadir lectura teológica no presente en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «restituir» para שׁלם en sentido legal-penal, en coherencia con el POB inglés.
  - Se traduce אַחֵר de forma implícita («de otro») sin forzar una expansión de género, aunque el inglés la explicita por estilo jurídico.
