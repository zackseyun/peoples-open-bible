  text: כַּ/שֶּׁ֤מֶן הַ/טּ֨וֹב עַל הָ/רֹ֗אשׁ יֹרֵ֗ד עַֽל הַ/זָּקָ֥ן זְקַֽן אַהֲרֹ֑ן שֶׁ֝/יֹּרֵ֗ד עַל פִּ֥י מִדּוֹתָֽי/ו׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/133/002.yaml
  text: It is like the good oil on the head[a], running down on the beard, on Aaron’s beard[b], which runs down on the collar of his robes.
  footnotes:
  - marker: a
    text: Or 'precious oil.' Many English versions use 'precious' here to emphasize the oil’s richness, but the Hebrew more literally says 'good oil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on the edge/opening of his robes.' The Hebrew expression literally involves the 'mouth' of the garments and may refer to the collar or upper opening.
    reason: lexical_alternative
