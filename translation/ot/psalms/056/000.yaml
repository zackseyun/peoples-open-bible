id: PSA.56.0
reference: Psalms 56:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֤חַ עַל י֬וֹנַת אֵ֣לֶם רְ֭חֹקִים לְ/דָוִ֣ד מִכְתָּ֑ם בֶּֽ/אֱחֹ֨ז אֹת֖/וֹ פְלִשְׁתִּ֣ים בְּ/גַֽת׀־׃
translation:
  text: 'For the choir director: according to “The Silent Dove of Distant Places.” Of David[a]. A miktam[b], when the Philistines seized him in Gath.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew “The Dove of Distant Silence,” or possibly another tune title; the exact meaning of the phrase is uncertain.
    reason: alternative_reading
  - marker: b
    text: Miktam is a technical term in the psalm headings; its precise meaning is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music leader
  - To the choirmaster
  lexicon: HALOT
  rationale: Superscription formula in Psalms indicating direction to the one overseeing musical performance. 'Choir director' is clear modern English while preserving the functional sense.
- source_word: עַל
  chosen: according to
  alternatives:
  - upon
  - set to
  - concerning
  lexicon: HALOT
  rationale: In psalm headings with a following tune/title, עַל commonly introduces the melody or musical setting. 'According to' best fits that usage in readable English.
- source_word: יוֹנַת אֵלֶם רְחֹקִים
  chosen: “The Dove on Distant Oaks”
  alternatives:
  - “The Silent Dove of Those Far Away”
  - “The Dove of Distant Silence”
  lexicon: HALOT
  rationale: This phrase is obscure and likely a tune title. Because the exact sense is uncertain, it is treated as a quoted title. 'אֵלֶם' may relate to silence/muteness, but some take it differently; the traditional musical-title handling avoids overclaiming. 'Oaks' reflects a possible sense connected with terebinths/gods only indirectly, but because the phrase is highly uncertain, the main text preserves it as a title and the alternative is footnoted.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - By David
  - For David
  lexicon: HALOT
  rationale: Standard superscription formula. 'Of David' preserves the Hebrew's ambiguity of authorship/association without forcing a narrower claim.
- source_word: מִכְתָּם
  chosen: A miktam
  alternatives:
  - A psalm
  - An inscription
  lexicon: HALOT
  rationale: Technical term of uncertain meaning in psalm headings. Transliteration is preferable to a speculative translation.
- source_word: בֶּאֱחֹז
  chosen: when ... seized
  alternatives:
  - when ... took hold of
  - when ... captured
  lexicon: HALOT
  rationale: Temporal infinitive construct with ב marks the occasion. 'Seized' is concise and fits the hostile action of the Philistines toward David.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation.
- source_word: בְּגַת
  chosen: in Gath
  alternatives:
  - at Gath
  lexicon: HALOT
  rationale: Locative preposition with place name; 'in Gath' is the most natural English rendering.
