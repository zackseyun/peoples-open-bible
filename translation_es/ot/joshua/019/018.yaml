    issue: Topónimo הַכְּסוּלֹת renderizado como 'Chesullot'
    rationale: La forma 'Chesullot' no sigue claramente ni la transliteración inglesa auditada ('Chesulloth') ni una adaptación española estándar. En una lista de lugares, la consistencia toponímica importa; una forma como 'Quesulot' resulta más natural en español y más justificable filológicamente.
  - severity: low
    issue: '''frontera'' puede ser menos preciso que ''límite'' en contexto de delimitación tribal'
    rationale: גְּבוּל suele referirse al límite o lindero territorial. 'Frontera' no es erróneo, pero en español bíblico 'límite' evita una resonancia moderna de frontera entre estados. No obstante, esto es estilístico, no un error de fidelidad.
  revised_spanish_text: Y su límite fue Jezreel[a], Quesulot y Sunem.
