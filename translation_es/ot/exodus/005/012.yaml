translation:
  language: es
  text: Así el pueblo fue esparcido por toda la tierra de Egipto para recoger rastrojo para paja[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para recoger paja para rastrojo», si קַשׁ y תֶּבֶן se entienden con menor distinción; el texto principal conserva el contraste probable entre el rastrojo recogido y el suministro habitual de paja.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּפֶץ
  english_pob_choice: were scattered
  chosen_spanish: fue esparcido
  alternatives_spanish:
  - fue dispersado
  - se dispersó
  lexicon: HALOT
  rationale: El verbo expresa el efecto de una dispersión forzada sobre el pueblo en el contexto narrativo. "Fue esparcido" conserva ese matiz pasivo/resultativo con naturalidad en español y evita atribuirles iniciativa propia.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: '"עָם" designa al colectivo. "El pueblo" es la equivalencia más directa y no añade una identificación explícita que el hebreo de este versículo no formula por sí mismo.'
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: por toda la tierra de Egipto
  alternatives_spanish:
  - por toda la tierra de Egipto
  - a lo largo de toda la tierra de Egipto
  lexicon: HALOT
  rationale: La construcción distributiva indica extensión por el territorio entero. "Por toda la tierra de Egipto" reproduce bien el alcance espacial y suena natural en español bíblico contemporáneo.
- source_word: לְקֹשֵׁשׁ
  english_pob_choice: to gather
  chosen_spanish: para recoger
  alternatives_spanish:
  - para juntar
  - para recolectar
  lexicon: HALOT
  rationale: El verbo denota reunir material suelto o disperso. "Recoger" expresa bien esa acción en español sin perder la idea de ir reuniendo piezas pequeñas o restos.
- source_word: קַשׁ
  english_pob_choice: stubble
  chosen_spanish: rastrojo
  alternatives_spanish:
  - paja corta
  - caña seca
  lexicon: HALOT
  rationale: El POB inglés distingue este término de תֶּבֶן. "Rastrojo" preserva la idea de residuo vegetal tosco y mantiene la diferencia lexical con "paja" en la misma cláusula.
- source_word: לַתֶּבֶן
  english_pob_choice: for straw
  chosen_spanish: en lugar de paja
  alternatives_spanish:
  - para paja
  - para usar como paja
  lexicon: HALOT
  rationale: El ל puede expresar finalidad o sustitución. En español, "en lugar de paja" hace explícito el contraste funcional que el contexto exige y que el POB inglés también busca conservar.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo WLC y conserva la decisión auditada del POB inglés de mantener la distinción probable entre קַשׁ y תֶּבֶן. Se optó por una formulación española fluida, sin perder el contraste material ni el carácter forzado de la acción.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con léxico transparente para lectores de iglesia.
  - Se evitó 'SEÑOR' u այլ terminology no pertinente porque el versículo no contiene el nombre divino.
  - '''Rastrojo'' y ''paja'' se distinguen deliberadamente para reflejar la tensión léxica documentada en el audit trail.'
