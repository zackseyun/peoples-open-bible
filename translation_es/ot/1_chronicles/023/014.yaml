revisions:
- from: Y también Moisés[a], el hombre de Dios[b], sus hijos fueron llamados a la tribu de Leví.
  to: Y en cuanto a Moisés, el hombre de Dios, sus hijos fueron llamados[a] a la tribu de Leví[b].
  rationale: 'Se ajusta la apertura a un español más natural y más fiel a la función discursiva de la waw (''Y en cuanto a Moisés''). Se corrigen las notas para que reflejen el audit trail inglés real: una alternativa léxica de inclusión/registro y la formulación previa de la construcción verbal. No se altera el sentido principal del versículo.'
