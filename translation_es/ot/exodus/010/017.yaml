translation:
  language: es
  text: Y ahora[a], por favor, perdonen mi pecado solo esta vez, y rueguen a Yahvé, su Dios[b], para que aparte de mí solo esta muerte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Ahora''. El hebreo también puede entenderse como una transición simple: ''Y ahora''.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''Yahvé su Dios''. Faraón mantiene distancia al decir ''su Dios'', no ''nuestro Dios''.'
    reason: source_note
  - marker: c
    text: 'Hebreo: ''esta muerte''. Faraón probablemente se refiere a la plaga mortal presente y sus efectos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La combinación conserva tanto la transición discursiva como la urgencia temporal del hebreo, de manera natural en español.
- source_word: שָׂא נָא חַטָּאתִי
  english_pob_choice: please forgive my sin
  chosen_spanish: por favor, perdona mi pecado
  alternatives_spanish:
  - por favor, lleva mi pecado
  - por favor, borra mi pecado
  - por favor, absuelve mi pecado
  lexicon: HALOT
  rationale: El hebreo usa el verbo de 'llevar/cargar' con 'pecado' como objeto, pero en español la equivalencia idiomática más clara y fiel al valor de absolver/retirar culpa es 'perdona mi pecado'. Se mantiene la súplica con 'por favor'.
- source_word: אַךְ הַפַּעַם
  english_pob_choice: just this once
  chosen_spanish: solo esta vez
  alternatives_spanish:
  - solo por esta vez
  - únicamente esta vez
  - solo esta ocasión
  lexicon: HALOT
  rationale: Expresa la restricción temporal de modo idiomático, preservando el énfasis de que la petición vale para una sola ocasión.
- source_word: וְהַעְתִּירוּ
  english_pob_choice: and plead
  chosen_spanish: y ruega
  alternatives_spanish:
  - y suplica
  - e intercede
  - y presenta súplica
  lexicon: HALOT
  rationale: El verbo implica intercesión insistente ante Dios. En español, 'rogar' comunica bien la intensidad de la petición sin sonar arcaico.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - ante Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: Yahvé, no una sustitución reverencial.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: 'En el discurso directo de Faraón al estilo bíblico, el singular contextual resulta natural en español y conserva el distanciamiento: no dice ''nuestro Dios''.'
- source_word: וְיָסֵר מֵעָלַי
  english_pob_choice: that he may remove from me
  chosen_spanish: para que quite de mí
  alternatives_spanish:
  - para que aparte de mí
  - para que remueva de mí
  - para que aleje de mí
  lexicon: HALOT
  rationale: '''Quitar de mí'' transmite la remoción efectiva del mal o castigo expresado por el hebreo, con claridad y sin añadir matices no presentes.'
- source_word: רַק אֶת הַמָּוֶת הַזֶּה
  english_pob_choice: this death only
  chosen_spanish: solo esta muerte
  alternatives_spanish:
  - únicamente esta muerte
  - solamente esta muerte
  - esta muerte solamente
  lexicon: HALOT
  rationale: Se conserva la literalidad de 'esta muerte', con el adverbio restrictivo colocado de forma natural en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. De acuerdo con la política del proyecto, se preserva el nombre divino como Yahvé en el texto principal, evitando la sustitución litúrgica por SEÑOR.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Alcance de 'esta muerte'
  english_pob_reading: this death
  chosen_spanish_reading: esta muerte
  alternative_spanish_readings:
  - esta plaga
  - esta muerte causada por la plaga
  - este desastre mortal
  rationale: El hebreo dice literalmente 'esta muerte'. Aunque el contexto apunta a la plaga mortal presente, se mantiene la expresión literal para no borrar la tensión léxica entre muerte y calamidad.
  doctrine_reference: Contexto narrativo de Éxodo 10:17 y nota léxica POB sobre 'this death'
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que prefiere una cláusula final más directa ('that he may remove') en lugar de una formulación más explicativa. En español se reflejó como 'para que quite de mí', manteniendo la relación de propósito sin sobreexplicar. También se respetó la decisión revisada de conservar la literalidad de 'this death' en lugar de sustituirla por 'plaga'.
  spanish_consistency_notes:
  - Se usa Yahvé consistentemente para יהוה según el estándar del proyecto.
  - Se evitó 'SEÑOR' como sustitución reverencial.
  - '''Pecado'' traduce חטאת en este contexto de culpa moral personal.'
  - '''Solo esta vez'' conserva la restricción enfática de אַךְ הַפַּעַם.'
  - La forma singular 'tu Dios' mantiene el distanciamiento retórico de Faraón.
