translation:
  language: es
  text: Y se levantó y se fue por su vida[a], y llegó a Beerseba, que pertenece a Judá, y dejó allí a su servidor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y vio»; muchos testigos y traducciones antiguas leen «y temió». O también: «para salvar su vida» o «huyó por su vida».'
    reason: textual_variant_and_lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: En español, «se levantó» comunica de manera natural el verbo narrativo de acción y conserva el movimiento secuencial del hebreo sin sonar arcaico.
- source_word: וַיֵּלֶךְ אֶל־נַפְשׁוֹ
  english_pob_choice: went for his life
  chosen_spanish: fue para salvar su vida
  alternatives_spanish:
  - huyó para salvar su vida
  - fue por su vida
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a autopreservación. En español, «fue para salvar su vida» transmite el sentido con claridad y mantiene la tensión narrativa; «huyó» es más interpretativo.
- source_word: בְּאֵר שֶׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beer-seba
  lexicon: HALOT
  rationale: Se adopta la transliteración corriente en español bíblico, sin perder identificabilidad del topónimo.
- source_word: אֲשֶׁר לִֽ/יהוּדָה
  english_pob_choice: which belongs to Judah
  chosen_spanish: que pertenece a Judá
  alternatives_spanish:
  - que está en Judá
  - que era de Judá
  lexicon: HALOT
  rationale: «Pertenece a» expresa bien la afiliación territorial o jurisdiccional del hebreo sin forzar una localización puramente geográfica.
- source_word: נַעֲר֖/וֹ
  english_pob_choice: his servant
  chosen_spanish: su criado
  alternatives_spanish:
  - su siervo
  - su sirviente
  - su ayudante
  lexicon: HALOT
  rationale: נַעַר aquí designa al acompañante de Elías. «Criado» es una solución sobria y natural en español bíblico; evita imponer «siervo» donde el contexto narrativo favorece la relación de acompañante/ayudante.
theological_decisions:
- issue: 'Texto base: וַיַּרְא frente a la tradición de «temió / se asustó»'
  english_pob_reading: The main text omits 'he saw' and preserves the standard flow from the revision pass; the footnote notes Hebrew 'and he saw' and the widespread alternative reading 'he feared.'
  chosen_spanish_reading: 'Se sigue la lectura funcional del flujo narrativo: «Y se levantó y fue para salvar su vida…» sin traducir explícitamente «vio».'
  alternative_spanish_readings:
  - Y vio y se levantó y fue para salvar su vida...
  - Y temió y se levantó y fue para salvar su vida...
  rationale: La evidencia textual del paquete muestra la tensión entre el consonantal hebreo y la tradición interpretativa. En español conviene no introducir «vio» en el cuerpo del texto, porque distrae y no está sustentado por la lectura revisada de trabajo; la nota puede preservar la alternativa textual.
  doctrine_reference: Crítica textual / translación con variantes
- issue: Valor de אֶל־נַפְשׁוֹ como modismo de autopreservación
  english_pob_reading: went for his life
  chosen_spanish_reading: fue para salvar su vida
  alternative_spanish_readings:
  - huyó para salvar su vida
  - fue por su vida
  rationale: Se conserva la idea central sin sobrecargar el español con un calco que suene opaco. La formulación mantiene el sentido de peligro inminente y evita borrar la intensidad narrativa.
  doctrine_reference: Hermenéutica léxico-sintáctica
translation_notes:
  revision_awareness: El inglés del paquete muestra una revisión posterior que retiró «he saw» del texto principal para evitar una lectura secundaria y mantener una línea narrativa más natural. La versión española sigue esa decisión revisada y conserva el valor idiomático de אֶל־נַפְשׁוֹ con una nota que explica la alternativa literal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige explícitamente; este verso no contiene el nombre divino.
  - Se mantiene «Judá» como entidad territorial, no como equivalencia eclesiástica.
  - «Criado» refleja el acompañante de rango subordinado en la narrativa, sin forzar «siervo».
  - La puntuación y el encadenamiento verbal siguen el estilo narrativo bíblico en español contemporáneo.
