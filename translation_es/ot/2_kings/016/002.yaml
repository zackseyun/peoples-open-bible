base_translation:
  language: en
  yaml_path: translation/ot/2_kings/016/002.yaml
  text: Ahaz was twenty years old when he began to reign[a], and he reigned sixteen years in Jerusalem. He did not do what was right in the eyes of Yahweh his God[b], as David his father had done.
  footnotes:
