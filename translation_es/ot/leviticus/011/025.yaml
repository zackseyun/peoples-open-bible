review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: una norma distributiva sobre quien lleva una nebelá, el lavado de la ropa y la impureza ritual hasta la tarde. También preserva correctamente la nota sobre la alternativa formal «de sus cadáveres». Sin embargo, «vestidos» suena menos natural aquí que «ropa/ropas», y «cadáveres» en español puede sugerir fuertemente cuerpos humanos; en un contexto levítico de animales, «carcasas» comunica mejor la referencia específica del hebreo נְבֵלָה y del inglés auditado.'
  spanish_quality_summary: La redacción es clara y digna, pero puede mejorarse en naturalidad y precisión léxica para español bíblico contemporáneo. «Todo el que» encaja algo mejor que «cualquiera que» en estilo legal. «Sus ropas» es más idiomático que «sus vestidos» en este contexto ritual.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La decisión clave es léxica-contextual: para נְבֵלָה conviene «carcasas» en este versículo por tratarse de restos de animales impuros en legislación de pureza, evitando la posible lectura humana de «cadáveres». «Impuro» está bien para טָמֵא.'
  issues:
  - severity: medium
    issue: «cadáveres» para נְבֵלָה puede sonar humano en español
    rationale: Aunque no es incorrecto, en español general «cadáver» suele asociarse primero con un cuerpo humano. En Levítico 11 el referente es animal, y «carcasas» reproduce mejor el campo semántico del hebreo y la decisión del inglés POB («carcasses»).
  - severity: low
    issue: «sus vestidos» resulta menos natural que «sus ropas» en este contexto
    rationale: בְּגָדָיו significa ropa/vestidos, pero en una instrucción de pureza ritual «lavará sus ropas» es el giro más idiomático y ampliamente comprensible en español neutral.
  - severity: low
    issue: «Y cualquiera que» es aceptable, pero «Y todo el que» suena más propio de formulación legal
    rationale: Ambas opciones son fieles al distributivo de כָל + participio, pero «todo el que» fluye mejor en un registro normativo bíblico sin perder claridad.
  revised_spanish_text: Y todo el que cargue alguna de sus carcasas[a] lavará sus ropas y será impuro hasta la tarde.
  revised_footnotes:
