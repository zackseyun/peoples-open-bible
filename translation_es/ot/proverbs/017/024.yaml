translation:
  language: es
  text: La sabiduría está ante el rostro de un hombre entendido[a][b], pero los ojos del necio están en los confines de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La sabiduría está en la presencia de uno que entiende». El comienzo hebreo también puede entenderse menos literalmente, donde «rostro» expresa presencia más que el rostro físico.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un hombre entendido». El masculino singular funciona proverbialmente como tipo representativo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «de la tierra» puede entenderse como «del país» en vez de «de la tierra/el mundo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת פְּנֵי
  english_pob_choice: before the face of
  chosen_spanish: delante del rostro de
  alternatives_spanish:
  - en la presencia de
  - ante el rostro de
  lexicon: HALOT
  rationale: Sigo la lectura preposicional de אֶת y la imagen concreta de פְּנֵי. En español, «delante del rostro de» conserva el valor espacial e imagístico sin sonar tan rígido como un calco, y mantiene abierta la posibilidad de presencia implícita.
- source_word: מֵבִין
  english_pob_choice: a discerning man
  chosen_spanish: un hombre que discierne
  alternatives_spanish:
  - un hombre entendido
  - una persona que discierne
  lexicon: HALOT
  rationale: 'El participio describe a una persona caracterizada por discernimiento. Mantengo el masculino singular proverbial como en el hebreo y en el POB inglés, pero en español lo vuelvo más natural con una relativa: «un hombre que discierne».'
- source_word: חָכְמָה
  english_pob_choice: Wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - Sabiduría
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo abstracto como sujeto. En español, «la sabiduría» comunica el sentido de forma directa y fiel; no hace falta mayúscula doctrinal ni personificación obligatoria.
- source_word: וְעֵינֵי
  english_pob_choice: but the eyes
  chosen_spanish: pero los ojos
  alternatives_spanish:
  - y los ojos
  lexicon: HALOT
  rationale: La conjunción es adversativa por contraste proverbiales. «Pero» expresa mejor la oposición entre la cercanía de la sabiduría para el entendido y la dispersión del necio.
- source_word: כְסִיל
  english_pob_choice: of a fool
  chosen_spanish: del necio
  alternatives_spanish:
  - del insensato
  - del tonto
  lexicon: HALOT
  rationale: En Proverbios, כְסִיל designa al necio moral e intelectualmente. «Necio» es un equivalente bíblico y sobrio en español, más preciso que «tonto».
- source_word: בִּקְצֵה
  english_pob_choice: at the ends of
  chosen_spanish: en los confines de
  alternatives_spanish:
  - en los extremos de
  - hasta los confines de
  lexicon: HALOT
  rationale: La expresión transmite lejanía extrema y mirada errante. «En los confines de» conserva la imagen hiperbólica mejor que una formulación más plana.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el país
  lexicon: HALOT
  rationale: Aquí «tierra» es más natural en español y mantiene la amplitud del contraste hiperbólico. «La tierra» puede abarcar tanto el mundo como el territorio, igual que el hebreo puede ser más amplio que un país específico.
theological_decisions:
- issue: Imágenes concretas de rostro/presencia
  english_pob_reading: The Hebrew opening may also be taken less literally, with 'face' expressing presence rather than physical face.
  chosen_spanish_reading: El comienzo puede entenderse literalmente como «rostro», o menos literalmente como «presencia».
  alternative_spanish_readings:
  - delante de la presencia de
  - en la presencia de
  rationale: Conservo el lenguaje corporal del hebreo en la línea principal, pero reconozco que «rostro» puede funcionar como presencia. Esto evita perder la tensión semántica documentada por el POB inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Tipo proverbial masculino singular
  english_pob_reading: a discerning man
  chosen_spanish_reading: un hombre que discierne
  alternative_spanish_readings:
  - una persona que discierne
  - el que discierne
  rationale: El hebreo usa masculino singular de manera proverbial. Mantengo esa forma en español por fidelidad al texto y a la política de precisión de género, sin forzar neutralización donde el original no la hace.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Personificación de sabiduría
  english_pob_reading: Wisdom is before the face of a discerning man
  chosen_spanish_reading: La sabiduría está delante del rostro de un hombre que discierne
  alternative_spanish_readings:
  - La sabiduría está en la presencia de un hombre que discierne
  rationale: La cláusula puede leerse como abstracción, no necesariamente como personificación doctrinal. La traducción conserva la imagen y no añade carga teológica que el hebreo no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el audit trail inglés; no se detectaron revisiones aplicadas en la fuente. La versión española sigue la lectura optimizada del POB: mantiene la imagen de rostro/presencia, el masculino proverbial y la hipérbole espacial del necio.'
  spanish_consistency_notes:
  - Se emplea «sabiduría» en minúscula porque el hebreo es un sustantivo abstracto sin exigencia de personificación doctrinal.
  - Se usa «necio» para כְסִיל, consistente con el valor proverbial moral e intelectual.
  - «Tierra» y «confines» preservan la amplitud espacial del hebreo sin reducirla a un territorio local.
  - 'La colocación de las notas evita duplicar el sentido: a trata la posible lectura de presencia; b, la forma proverbial masculina; c, la alternativa territorial/terrestre.'
