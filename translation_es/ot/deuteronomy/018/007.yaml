review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: servicio cultual permitido en contexto legal, ''en el nombre de Yahvé su Dios'', comparación con ''todos sus hermanos los levitas'', y localización ''allí delante de Yahvé''. Sin embargo, una elección significativa reduce la literalidad de הָעֹמְדִים (''los que están de pie/que permanecen de pie''): ''que están allí'' suaviza demasiado la imagen verbal que el inglés auditado preserva con ''who stand''.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mayor fidelidad y naturalidad bíblica. 'Podrá ministrar' funciona bien en registro eclesial y legal. 'En el nombre de Yahvé su Dios' es natural. La secuencia de notas en el texto no coincide con el orden lógico del contenido, aunque eso no afecta el sentido; conviene armonizarla con las notas revisadas. El principal problema de estilo/fidelidad es 'que están allí', mejorado por 'que están de pie allí' o 'que permanecen allí'.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה → ''Yahvé'' correctamente; אֱלֹהָיו → ''su Dios''; אֶחָיו retenido como ''sus hermanos'' con aclaración levítica; בְּשֵׁם → ''en el nombre de''. ''Ministrar'' concuerda con la decisión cultual para שׁרת. La única desalineación parcial es עמד, que debería conservar más explícitamente la idea de ''estar de pie''.'
  issues:
  - severity: medium
    issue: הָעֹמְדִים se tradujo 'que están' en lugar de conservar la imagen de 'estar de pie'/'stand'.
    rationale: El audit trail inglés justificó mantener el verbo literal 'who stand'. En español, 'que están' pierde parte de la imagen cultual-presencial del hebreo. 'Que están de pie allí delante de Yahvé' preserva mejor la forma y sigue siendo natural.
  - severity: low
