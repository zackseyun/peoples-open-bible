translation:
  language: es
  text: Si ustedes no ayunan el mundo[a], no encontrarán el reino[b]; y si no hacen del sábado un sábado[c][d], no verán al Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La construcción conserva la rareza del copto y del testimonio griego: no significa “ayunen del mundo”, sino literalmente “ayunen el mundo”.'
    reason: lexical_alternative
  - marker: b
    text: El copto dice simplemente “el reino”; el paralelo griego de Oxirrinco añade “de Dios”. Esta versión sigue la base copta.
    reason: textual_variant
  - marker: c
    text: 'Construcción predicativa literal: “hacer del sábado un sábado”. Probablemente quiere decir guardar el sábado como sábado, pero se conserva la forma comprimida de Tomás.'
    reason: cultural_note
  - marker: d
    text: Una línea manuscrita presenta la ortografía ⲥⲁⲙⲃⲁⲧⲟⲛ antes de la normalización a ⲥⲁⲃⲃⲁⲧⲟⲛ; es una alternancia gráfica corriente en manos sahídico-licopolitanas.
    reason: dialect_note
lexical_decisions:
- source_word: ⲉⲣϣⲁⲛ_ (protasis)
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: Layton, Coptic Grammar; Lambdin, Introduction to Sahidic Coptic
  rationale: La cláusula condicional futura o general de ⲉⲣϣⲁⲛ_ se expresa con naturalidad en español con “si”, manteniendo la estructura sentenciosa del dicho.
- source_word: ⲧⲙⲣⲏⲥⲧⲉⲩⲉ
  english_pob_choice: fast
  chosen_spanish: ayunan
  alternatives_spanish:
  - se abstienen de comer
  lexicon: Crum, Coptic Dictionary (s.v. rnhsteue < Gk νηστεύειν)
  rationale: “Ayunar” es el equivalente normal del verbo de préstamo y conserva el matiz ascético sin sobreexplicar.
- source_word: ⲡⲕⲟⲥⲙⲟⲥ
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el cosmos
  lexicon: Crum, Coptic Dictionary (s.v. ⲕⲟⲥⲙⲟⲥ)
  rationale: “Mundo” es la traducción idiomática y más transparente para el préstamo griego en este contexto.
- source_word: ⲁϩⲉ
  english_pob_choice: find
  chosen_spanish: encontrarán
  alternatives_spanish:
  - hallarán
  - descubrirán
  lexicon: Crum, Coptic Dictionary (s.v. ⲁϩⲉ)
  rationale: “Encontrar” reproduce bien la concisión del dicho y es estilísticamente natural en español.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reinado
  - la realeza
  lexicon: Crum, Coptic Dictionary (s.v. ⲙⲛⲧⲣⲱ ‘kingship, reign’)
  rationale: “Reino” mantiene la formulación tradicional y sigue la decisión inglesa de no añadir un genitivo explícito que el coptico no tiene.
- source_word: ⲧⲙⲉⲓⲣⲉ
  english_pob_choice: make
  chosen_spanish: hacen
  alternatives_spanish:
  - hacen que
  - realizan
  lexicon: Crum, Coptic Dictionary (s.v. ⲙⲉⲓⲣⲉ)
  rationale: En español, la construcción predicativa se vuelve más natural con “hacer del sábado un sábado” que con un calco rígido; “hacen” conserva la literalidad del predicado-objeto.
- source_word: ⲡⲥⲁⲃⲃⲁⲧⲟⲛ … ⲛⲥⲁⲃⲃⲁⲧⲟⲛ
  english_pob_choice: the Sabbath … a Sabbath
  chosen_spanish: el sábado … un sábado
  alternatives_spanish:
  - el sábado … un sábado verdaderamente
  - el día de reposo … un día de reposo
  lexicon: Crum, Coptic Dictionary (s.v. ⲥⲁⲃⲃⲁⲧⲟⲛ)
  rationale: La repetición se preserva para reflejar la fuerza del predicado-accusativo y la concisión de Tomás; “sábado” comunica el término cultural sin reinterpretarlo.
- source_word: ⲛⲁⲩ
  english_pob_choice: see
  chosen_spanish: verán
  alternatives_spanish:
  - contemplarán
  - mirarán
  lexicon: Crum, Coptic Dictionary (s.v. ⲛⲁⲩ)
  rationale: “Ver” es el equivalente directo y mantiene el paralelismo con “encontrarán”.
- source_word: ⲡⲉⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al Padre celestial
  lexicon: Crum, Coptic Dictionary (s.v. ⲓⲱⲧ)
  rationale: El artículo definido funciona como título; en español se conserva con mayúscula inicial para reflejar el valor titular sin añadir contenido interpretativo.
theological_decisions:
- issue: El “reino” sin complemento explícito de “Dios/los cielos”
  english_pob_reading: Greek POxy 1 reads “the kingdom of God,” whereas NH Coptic has simply “the kingdom.” This draft follows the Coptic base text.
  chosen_spanish_reading: el reino
  alternative_spanish_readings:
  - el reino de Dios
  - el reino de los cielos
  rationale: La base copta no incluye complemento genitivo; por tanto, se mantiene la forma desnuda “el reino” y se evita importar una precisión no atestiguada en este testimonio.
  doctrine_reference: Crítica textual; prioridad del testimonio coptico de NH II frente al paralelo griego fragmentario
- issue: La expresión “hacer del sábado un sábado” como predicado-accusativo comprimido
  english_pob_reading: “Make the Sabbath a Sabbath” is a literal predicate-accusative. It likely means to let the Sabbath truly be what it is (i.e., keep/observe it as such), but the rendering keeps Thomas’s compressed style.
  chosen_spanish_reading: hacer del sábado un sábado
  alternative_spanish_readings:
  - guardar el sábado como sábado
  - observar verdaderamente el sábado
  rationale: Se conserva la dureza literal de Tomás y la tensión semántica del predicado-accusativo; se evita una paráfrasis explicativa que borraría el estilo comprimido del dicho.
  doctrine_reference: Hermenéutica del dicho; observancia del sábado en tradición tomasina
- issue: El sujeto directo en “ayunar el mundo”
  english_pob_reading: “Fast to the world” renders Coptic ⲉ with its directional sense. Many translators smooth this to “fast from the world,” but both Coptic and the Greek witness preserve the odd prepositional choice; the strangeness is likely deliberate.
  chosen_spanish_reading: ayunan el mundo
  alternative_spanish_readings:
  - ayunan al mundo
  - ayunan frente al mundo
  rationale: La revisión auditada del POB indica que no debe leerse como “from”; en español, se preserva la rareza sintáctica con un objeto directo literal, evitando normalizarla a una expresión devocional común.
  doctrine_reference: Gramática coptica y testimonio griego paralelo; preservación de la rareza intencional
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión adjudicada que corrigió la lectura de la primera cláusula: ⲉ- aquí funciona como marcador de objeto directo, no como preposición direccional “a/para”. Por eso la versión española evita “ayunar a/para el mundo” o “ayunar del mundo” y conserva una construcción literal que refleje la extrañeza sintáctica. También se siguió el cierre de revisión más reciente, sin cambios sustantivos adicionales.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como término por defecto en el proyecto, pero este dicho no lo contiene.
  - Se usa “reino” para ⲙⲛⲧⲣⲣⲟ de acuerdo con la práctica del POB y el valor idiomático en Tomás.
  - Se conserva la mayúscula en “Padre” por el sentido titular del término.
  - Se evita “Cristo” o cualquier complemento doctrinal no atestiguado por el texto.
  - La repetición “sábado… sábado” reproduce la estructura literal y la fuerza retórica del original.
