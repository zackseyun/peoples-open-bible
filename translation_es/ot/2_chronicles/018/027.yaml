translation:
  language: es
  text: 'Y Micaías dijo[a]: «Si de veras vuelves en paz, Yahvé no ha hablado por medio de mí». Entonces dijo: «¡Oigan[b], todos ustedes, pueblos!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé no ha hablado por mí»; es decir, «por medio de mí».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «pueblos» en plural, un llamado profético de alcance más amplio que «pueblo» en singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Miqueas
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma reconocible para el español bíblico, manteniendo la referencia al profeta. «Micaías» refleja mejor el hebreo del nombre que una traducción interpretativa.
- source_word: אִם שׁוֹב תָּשׁוּב
  english_pob_choice: If you indeed return
  chosen_spanish: Si tú vuelves
  alternatives_spanish:
  - Si de veras vuelves
  - Si vuelves ciertamente
  lexicon: HALOT
  rationale: El hebreo usa una condición con infinitivo absoluto para énfasis. En español, «Si tú vuelves» conserva la condicionalidad; el énfasis se mantiene en el contexto sin forzar una repetición artificial.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - sano y salvo
  - seguro
  lexicon: HALOT
  rationale: «Shalom» aquí comunica retorno sin daño, con el matiz usual de paz/seguridad. «En paz» reproduce de cerca la expresión hebrea y suena natural en español bíblico.
- source_word: לֹא דִבֶּר יְהוָה בִּי
  english_pob_choice: the LORD has not spoken by me
  chosen_spanish: Yahvé no ha hablado por medio de mí
  alternatives_spanish:
  - Yahvé no ha hablado por mí
  - Yahvé no ha hablado a través de mí
  lexicon: HALOT
  rationale: Se conserva la idea instrumental del hebreo בִּי. «Por medio de mí» hace explícito el sentido de mediación profética sin perder la relación directa con el texto hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la decisión editorial del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título. «Yahvé» es la forma estándar del proyecto y es plenamente legible en español.'
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: ¡Oigan!
  alternatives_spanish:
  - ¡Escuchen!
  - ¡Oíd!
  lexicon: HALOT
  rationale: El imperativo plural pide atención solemne. «¡Oigan!» es natural en español latinoamericano y conserva la fuerza profética del llamado.
- source_word: עַמִּים כֻּלָּם
  english_pob_choice: all you peoples
  chosen_spanish: pueblos todos
  alternatives_spanish:
  - todos los pueblos
  - pueblos, todos ustedes
  lexicon: HALOT
  rationale: Se mantiene el plural «pueblos» para no aplanar עַמִּים a singular. «Pueblos todos» conserva el alcance plural y el tono de proclamación profética.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto exige preservarlo como nombre propio, no ocultarlo tras un sustituto devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance profético de «peoples» / עַמִּים
  english_pob_reading: all you peoples
  chosen_spanish_reading: pueblos todos
  alternative_spanish_readings:
  - todos los pueblos
  - ¡oigan, todos ustedes, pueblos!
  rationale: El plural hebreo se conserva para reflejar la amplitud del llamado profético. No se reduce a «pueblo» singular, porque el texto apunta a una apelación más amplia que un grupo concreto.
  doctrine_reference: Poética profética y fidelidad semántica al plural hebreo
translation_notes:
  revision_awareness: 'El texto inglés auditado no requirió revisiones en la última pasada; la versión española se alinea con la lectura estable y conserva las decisiones clave: nombre divino, énfasis condicional y plural profético.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se preserva el plural «pueblos» para עַמִּים.
  - Se mantiene un registro bíblico natural sin recurrir a fórmulas eclesiásticas que oculten el hebreo.
