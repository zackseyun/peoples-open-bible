translation:
  language: es
  text: 'Así que el pueblo contendió con Moisés y dijo: «Dennos agua para que bebamos». Y Moisés les dijo: «¿Por qué contienden conmigo? ¿Por qué ponen a prueba[a] a Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ponen a Yahvé a prueba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶב
  english_pob_choice: quarreled
  chosen_spanish: contendió
  alternatives_spanish:
  - discutió
  - litigó
  - riñó
  lexicon: HALOT
  rationale: ריב expresa disputa o contienda; en español, «contendió» conserva la fuerza adversativa sin sonar tan coloquial como «rió» ni tan técnico como «litigó». Mantiene el vínculo lexical con la réplica de Moisés («contienden»).
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El sustantivo con artículo puede traducirse naturalmente como «el pueblo». «De Israel» no está explícito en este versículo y no se añade en el texto principal.
- source_word: תְּנוּ לָנוּ מַיִם
  english_pob_choice: Give us water
  chosen_spanish: Denos agua
  alternatives_spanish:
  - Dénnos agua
  - Danos agua
  - Proveednos agua
  lexicon: HALOT
  rationale: La forma imperativa plural pide una orden directa; «Denos agua» reproduce la brevedad del hebreo y la fuerza de la súplica. Se evita «proveer» por ser más interpretativo.
- source_word: וְנִשְׁתֶּה
  english_pob_choice: so that we may drink
  chosen_spanish: para que bebamos
  alternatives_spanish:
  - y beberemos
  - a fin de que bebamos
  - para beber
  lexicon: HALOT
  rationale: El valor cohortativo expresa finalidad o resultado deseado. «Para que bebamos» comunica ese sentido de propósito en español de forma natural.
- source_word: מַה תְּרִיבוּן עִמָּדִי
  english_pob_choice: Why do you quarrel with me?
  chosen_spanish: ¿Por qué contienden conmigo?
  alternatives_spanish:
  - ¿Por qué riñen conmigo?
  - ¿Por qué disputan conmigo?
  - ¿Por qué luchan conmigo?
  lexicon: HALOT
  rationale: Se conserva el paralelismo con el primer verbo de la escena usando la misma raíz semántica en español. «Contienden» mantiene el tono de reprensión y el matiz de disputa.
- source_word: מַה תְּנַסּוּן
  english_pob_choice: Why do you test
  chosen_spanish: ¿Por qué ponen a prueba
  alternatives_spanish:
  - ¿Por qué prueban
  - ¿Por qué tientan
  - ¿Por qué testean
  lexicon: HALOT
  rationale: נָסָה en este contexto significa «poner a prueba», especialmente con implicación teológica. La perífrasis evita una lectura demasiado técnica de «testear» y preserva la seriedad del acto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Conforme a la terminología POB en español, el Tetragrámaton se rinde como «Yahvé» para preservar el nombre del pacto en la forma ya establecida para esta versión.
theological_decisions:
- issue: Cómo traducir el verbo de disputa ריב sin suavizar la tensión
  english_pob_reading: quarreled / quarrel with me
  chosen_spanish_reading: contendió / contienden conmigo
  alternative_spanish_readings:
  - discutió / discuten conmigo
  - riñó / riñen conmigo
  - litigó / litigan conmigo
  rationale: El pasaje presenta una confrontación real con Moisés, no solo una queja. «Contender» conserva la oposición y mantiene la correspondencia verbal entre la acusación del pueblo y la respuesta de Moisés.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre del pacto. En español POB, «Yahvé» conserva esa identidad sin reemplazarla por una convención de mayúsculas que la oculte.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de מַה תְּנַסּוּן אֶת יְהוָה
  english_pob_reading: Why do you test Yahweh?
  chosen_spanish_reading: ¿Por qué ponen a prueba a Yahvé?
  alternative_spanish_readings:
  - ¿Por qué prueban a Yahvé?
  - ¿Por qué tientan a Yahvé?
  rationale: La acción no es una mera prueba intelectual sino un desafío a la presencia y provisión de Dios. «Ponen a prueba» conserva la tensión teológica y el valor relacional del verbo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español, ahora anclados en «dijo[a]» y «dijo[b]». Se mantuvo la lectura fuente-directa de יְהוָה como Yahvé y se preservó la tensión verbal de ריב/נסה sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «contender/contienden» para ריב a fin de conservar el enlace léxico entre ambas cláusulas.
  - «Poner a prueba» se usa para נָסָה por su valor teológico en contexto.
  - La puntuación y el registro son de español bíblico moderno, claro y publicable.
