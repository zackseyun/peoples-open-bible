translation:
  language: es
  text: Pero estos cinco reyes huyeron y se escondieron en la cueva en Makkedá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y estos cinco reyes huyeron y se escondieron en la cueva en Makkedá.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: HALOT
  rationale: נוס expresa huida ante peligro; en español, «huyeron» comunica con naturalidad el movimiento de retirada bajo presión, manteniendo el valor narrativo de escape sin suavizarlo demasiado.
- source_word: חֲמֵשֶׁת
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - los cinco
  lexicon: HALOT
  rationale: Es el numeral cardinal del grupo y se traduce de forma directa. En español, el orden «cinco reyes» es más natural que un calco con artículo adicional.
- source_word: הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: these five kings
  chosen_spanish: estos cinco reyes
  alternatives_spanish:
  - los cinco reyes
  - aquellos cinco reyes
  lexicon: HALOT
  rationale: El demostrativo הָאֵלֶּה se conserva con «estos» para reflejar la deixis específica del hebreo. Se antepone al numeral para una construcción idiomática en español.
- source_word: וַיֵּחָבְאוּ
  english_pob_choice: hid
  chosen_spanish: se escondieron
  alternatives_spanish:
  - se ocultaron
  - se escondieron a sí mismos
  lexicon: HALOT
  rationale: 'חבא tiene sentido reflexivo: «se escondieron» conserva esa idea de ocultarse voluntariamente y suena natural en español moderno. «Se ocultaron» sería válido, pero menos común en este registro narrativo.'
- source_word: בַמְּעָרָה
  english_pob_choice: in the cave
  chosen_spanish: en la cueva
  alternatives_spanish:
  - en una cueva
  lexicon: HALOT
  rationale: El artículo hebreo indica un referente definido; «la cueva» reproduce esa precisión. En español, «en la cueva» es la forma más fluida dentro de la locución locativa.
- source_word: בְּמַקֵּדָה
  english_pob_choice: at Makkedah
  chosen_spanish: de Makkedá
  alternatives_spanish:
  - en Makkedá
  - cerca de Makkedá
  lexicon: HALOT
  rationale: Se mantiene el topónimo transliterado. Con «cueva de Makkedá» se expresa de manera natural la relación locativa del hebreo sin sobrecargar la frase con una preposición menos idiomática en español.
- source_word: וַ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: HALOT
  rationale: La waw narrativa marca avance del relato; «Pero» conserva el matiz de transición discursiva que la POB inglesa documenta, sin imponer una oposición más fuerte de la que exige el hebreo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) según el paquete fuente; la POB inglesa coincide plenamente con la lectura y no muestra revisiones sustantivas. Se conservó el topónimo transliterado y la estructura narrativa breve del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no contiene el Tetragrámaton.
  - Se mantiene «Makkedá» como topónimo transliterado conforme a la política del proyecto.
  - Se prefirió un español narrativo natural («huyeron», «se escondieron») sin perder la referencia al hebreo reflexivo.
  - La nota alternativa reproduce la variación documentada en la edición inglesa entre «But» y «And».
