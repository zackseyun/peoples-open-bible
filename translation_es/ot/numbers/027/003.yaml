base_translation:
  language: en
  yaml_path: translation/ot/numbers/027/003.yaml
  text: Our father died in the wilderness[a], and he was not among the congregation of those who gathered themselves against Yahweh in the company of Korah, but he died in his own sin[c][b], and he had no sons.
  footnotes:
  - marker: a
    text: Or 'assembly' instead of 'congregation' for the Hebrew עֵדָה.
    reason: lexical_alternative
  - marker: b
    text: Or 'who assembled against the LORD' for 'those who gathered themselves against the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because of his sin' or 'in his sin.' The Hebrew does not specify the particular sin, only that his death was not as part of Korah's rebellion.
    reason: alternative_reading
