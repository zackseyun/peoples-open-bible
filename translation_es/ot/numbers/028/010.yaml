review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: la ofrenda del sábado, su carácter adicional respecto de la ofrenda regular, y la referencia a la libación correspondiente. Sin embargo, «está en su sábado» no refleja bien el sentido idiomático distributivo de בְּשַׁבַּתּוֹ en español; suena torpe y semánticamente opaco. Además, la nota al pie actual no ayuda, porque repite esencialmente la misma formulación poco natural.'
  spanish_quality_summary: El texto es comprensible en general, pero «está en su sábado» resulta poco idiomático y difícil de leer en español bíblico natural. «Ofrenda quemada» es defendible por la documentación, aunque sigue sonando menos establecido que «holocausto»; no obstante, no requiere cambio forzoso aquí. «Ofrenda de libación» es claro y digno.
  glossary_alignment: 'No hay conflicto con la terminología de proyecto principal. La decisión de mantener «ofrenda quemada» en vez de «holocausto» sigue la justificación documentada. «Sábado» y «libación» están bien alineados. La principal corrección necesaria es estilístico-semántica en la representación de בְּשַׁבַּתּוֹ: conviene expresar el valor distributivo de forma natural en español, por ejemplo «cada sábado».'
  issues:
  - severity: high
    issue: «está en su sábado» es una construcción antinatural y semánticamente débil en español.
    rationale: Aunque intenta conservar la forma más literal del hebreo/inglés auditado («on its Sabbath»), en español no comunica con claridad que la ofrenda corresponde a cada ocurrencia del sábado. La frase puede sonar casi locativa o absurda.
  - severity: medium
    issue: La nota al pie «O «en su sábado»» no aporta una alternativa útil.
    rationale: Como el texto principal ya lleva «cada sábado» en la revisión propuesta, la nota puede preservar la textura más literal del hebreo. En el borrador actual, la nota solo duplica la redacción problemática en vez de aclararla.
  revised_spanish_text: La ofrenda quemada de cada sábado es para[cada sábado][a], además de la ofrenda quemada regular y su ofrenda de libación.
  revised_footnotes:
  - marker: a
    text: 'Lit. «en su sábado». La expresión hebrea tiene fuerza distributiva: corresponde a cada sábado.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «está en su sábado» por una formulación natural en español que preserve el sentido distributivo de בְּשַׁבַּתּוֹ. Se conserva la alternativa más literal en nota para reflejar la textura del hebreo sin sacrificar legibilidad. El resto del versículo puede mantenerse.
