translation:
  language: es
  text: Que estén bien[a]. En el año ciento cuarenta y ocho[b], el día quince de Xántico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «Estén bien». Como cierre epistolar, funciona idiomáticamente como una despedida.'
    reason: lexical_alternative
  - marker: b
    text: Xántico es un nombre de mes macedonio usado en la datación seléucida.
    reason: cultural_note
lexical_decisions:
- source_word: ὑγιαίνετε
  english_pob_choice: Farewell
  chosen_spanish: Salud
  alternatives_spanish:
  - Vayan bien
  - Estén bien
  - Adiós
  lexicon: LSJ
  rationale: En saludos finales epistolares, ὑγιαίνω funciona como despedida convencional con el sentido de “estar bien” o “que estés bien”. En español, “Salud” conserva esa fuerza breve y formulaica sin sonar excesivamente literal ni demasiado coloquial; evita además convertirlo en una exhortación médica.
- source_word: ἔτους
  english_pob_choice: year
  chosen_spanish: año
  alternatives_spanish:
  - del año
  lexicon: LSJ
  rationale: La fórmula de datación griega se vierte de manera directa y natural en español como “año”, manteniendo el valor cronológico del original.
- source_word: ἑκατοστοῦ τεσσερακοστοῦ ὀγδόου
  english_pob_choice: one hundred forty-eighth
  chosen_spanish: ciento cuarenta y ocho
  alternatives_spanish:
  - centésimo cuadragésimo octavo
  lexicon: LSJ
  rationale: La secuencia ordinal indica el número del año seléucida. En español moderno, la forma cardinal dentro de la fórmula fechada resulta clara y digna; “centésimo cuadragésimo octavo” sería más estrictamente ordinal, pero menos natural en este tipo de datación.
- source_word: Ξανθικοῦ
  english_pob_choice: Xanthicus
  chosen_spanish: Xántico
  alternatives_spanish:
  - Xanthico
  lexicon: LSJ
  rationale: Es un nombre de mes macedonio usado en la datación seléucida. Se translitera al español como nombre propio histórico, conservando el referente cultural sin traducirlo.
- source_word: πεντεκαιδεκάτῃ
  english_pob_choice: fifteenth day
  chosen_spanish: el día quince
  alternatives_spanish:
  - quince
  lexicon: LSJ
  rationale: El dativo femenino concuerda con un “día” implícito en la fórmula de fecha. En español, explicitar “el día quince” reproduce con claridad la elipsis del griego y evita la ambigüedad de un simple “quince”.
theological_decisions:
- issue: No hay una decisión doctrinal sustantiva; el pasaje es una fórmula de despedida y datación.
  english_pob_reading: Farewell. In the one hundred forty-eighth year, on the fifteenth day of Xanthicus.
  chosen_spanish_reading: Salud. En el año ciento cuarenta y ocho, el día quince de Xántico.
  alternative_spanish_readings:
  - Adiós. En el año ciento cuarenta y ocho, el día quince de Xántico.
  - Estén bien. En el año ciento cuarenta y ocho, el día quince de Xántico.
  rationale: La única cuestión interpretativa relevante es la fuerza de ὑγιαίνετε. La lectura elegida mantiene el valor de despedida convencional sin cargarla de contenido doctrinal ni moral que el texto no tiene.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: El texto griego coincide plenamente con el audit trail en inglés; no se registran revisiones textuales ni cambios de sentido, solo la adaptación idiomática necesaria para español.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera del pasaje porque el texto no lo contiene.
  - Se conserva la transliteración histórica del mes para reflejar la datación seléucida.
  - La despedida se expresa con una fórmula breve y natural en español, sin sobretraducir ὑγιαίνετε como una orden literal.
