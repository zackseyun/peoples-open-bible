translation:
  text: 'His disciples said to him[1], "On what day will the kingship[1] come?"


    [He said], "It will not come by watching. They will not say, ‘Look, here!’ or
    ‘Look, there![2]’ Rather, the Father’s kingship is spread out upon the earth[3][a][3][2],
    and people do not see it."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: ⲡⲙⲛⲧⲣⲣⲟ can be rendered ‘kingdom’; ‘kingship’ reflects the abstract ‘reign/rule’
      nuance (Crum; Layton).
    reason: lexical_alternative
  - marker: '2'
    text: The ms line-level shows ⲧⲏ ‘there’; the normalized line prints ⲡⲏ ‘sky/heaven.’
      The deictic pairing ‘here/there’ fits the immediate syntax; ‘heaven’ would be
      contextually awkward here.
    reason: textual_variant
  - marker: '3'
    text: ‘Earth’ (ⲡⲕⲁϩ) can also mean ‘land.’ The image is of something already diffused
      across the ground.
    reason: cultural_note
  - marker: a
    text: Or 'He said,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: kingship
  alternatives:
  - kingdom
  lexicon: Crum; Layton
  rationale: Abstract formation from ⲣⲣⲟ ‘king’; denotes rule/reign rather than a
    territorial realm. Thomas often prefers the abstract sense.
- source_word: ⲛⲁϣ ⲛϩⲟⲟⲩ
  chosen: on what day
  alternatives:
  - when
  lexicon: Crum
  rationale: Literal ‘which day(s)’. Kept marked interrogative sense rather than smoothing
    to generic ‘when’.
- source_word: ϭⲱϣⲧ
  chosen: watching
  alternatives:
  - observation
  - scrutiny
  lexicon: Crum
  rationale: Noun ‘watching/observing.’ ‘By watching’ preserves terse idiom and matches
    context of seeking outward signs.
- source_word: ⲉⲓⲥϩⲏⲏⲧⲉ
  chosen: Look!
  alternatives:
  - See!
  - Behold!
  lexicon: Crum
  rationale: Imperative of ‘to see.’ ‘Look!’ maintains punchy deictic force.
- source_word: ⲡⲓⲥⲁ
  chosen: here
  alternatives:
  - the place (here)
  lexicon: Crum
  rationale: Literally ‘the place’; in this deictic formula it functions as ‘here.’
- source_word: ⲧⲏ / ⲡⲏ
  chosen: there
  alternatives:
  - heaven/sky (if read ⲡⲏ)
  lexicon: Crum
  rationale: Line-level reading shows deictic ⲧⲏ ‘there.’ Normalized text prints ⲡⲏ
    ‘sky/heaven,’ which would disrupt the here/there pair in this context. Chose deictic
    ‘there’ and note the variant.
- source_word: ⲥⲡⲱⲣϣ
  chosen: is spread out
  alternatives:
  - has been spread out
  - has been scattered
  lexicon: Crum
  rationale: 'Verb ‘to spread/scatter.’ Stative/present sense fits the clause: an
    already-present, pervasive reality.'
- source_word: ϩⲓϫⲛ ⲡⲕⲁϩ
  chosen: upon the earth
  alternatives:
  - on the land
  lexicon: Crum
  rationale: Common idiom ‘upon the earth’; retained concrete spatial image.
- source_word: ⲛⲣⲱⲙⲉ
  chosen: people
  alternatives:
  - humans
  - men
  lexicon: Crum
  rationale: Generic plural; inclusive ‘people’ avoids gendered narrowing.
textual_note: 'No lacunae are marked in Dilley’s text for this saying. Orthography
  shows typical Sahidic with Lycopolitan features (e.g., ms line-level ‘ⲡⲉϫⲁⲩ’ vs.
  normalized ‘ⲡⲉϫⲉⲛⲧⲟⲟⲩ’). A notable minor variant concerns the second deictic: the
  line-level transcription reads ⲧⲏ (‘there’), while the normalized line shows ⲡⲏ
  (‘sky/heaven’). The parallel deictic formula (here/there) and immediate context
  (‘They will not say, Look…’) favor ⲧⲏ ‘there.’ I translate accordingly and record
  the alternative reading. The phrase ⲡⲓⲥⲁ (‘the place’) functions deictically as
  ‘here.’ The clause ⲡⲙⲛⲧⲣⲣⲟ ⲛⲡⲉⲓⲱⲧ ⲉⲣⲉⲛⲧⲟⲥⲡⲱⲣϣ ⲉⲃⲟⲗ uses a stative/present sense,
  hence ‘is spread out,’ not future.'
