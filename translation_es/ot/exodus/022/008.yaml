translation:
  language: es
  text: 'Por cualquier caso de agravio, acerca de un buey, un asno, una oveja[a], una prenda, o cualquier objeto perdido, del cual alguien diga: «Este es», el asunto de ambas partes vendrá ante Dios[b]. Aquel a quien Dios declare culpable pagará el doble a su prójimo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: שֶׂה es un término más amplio para ganado menor y puede referirse a una oveja o a una cabra.
    reason: lexical_alternative
  - marker: b
    text: O «ante los jueces» / «ante el tribunal»; אֱלֹהִים puede referirse directamente a Dios o a jueces humanos que actúan bajo autoridad divina en contextos legales.
    reason: alternative_reading
lexical_decisions:
- source_word: דְּבַר פֶּשַׁע
  english_pob_choice: case of wrongdoing
  chosen_spanish: caso de agravio
  alternatives_spanish:
  - caso de delito
  - asunto de transgresión
  - caso de falta
  lexicon: HALOT
  rationale: דָּבָר en este contexto legal indica un asunto o caso; פֶּשַׁע señala agravio, transgresión o falta. «Caso de agravio» conserva el matiz jurídico sin restringirlo demasiado a un delito penal específico.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - ox
  - toro
  - res
  lexicon: HALOT
  rationale: En español, «buey» es un equivalente natural y bíblicamente reconocible para el animal de trabajo del contexto legal de propiedad. Mantiene la fuerza concreta sin sonar técnico o forzado.
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - mula
  lexicon: HALOT
  rationale: «Asno» es el equivalente bíblico tradicional y claro en español, y corresponde bien al registro legal del listado de bienes.
- source_word: שֶׂה
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - ganado menor
  - cordero
  - cabra/oveja
  lexicon: HALOT
  rationale: El hebreo שֶׂה puede referirse de manera más amplia al ganado menor, pero en una lista representativa «oveja» es un equivalente natural y comprensible. La amplitud semántica se conserva mejor que con una especificación excesiva.
- source_word: שַׂלְמָה
  english_pob_choice: garment
  chosen_spanish: vestido
  alternatives_spanish:
  - prenda
  - ropa
  - manto
  lexicon: HALOT
  rationale: «Vestido» comunica una prenda de ropa de forma clara y digna en español. Aunque «prenda» es más general, «vestido» aquí funciona bien como equivalente amplio de una pieza de vestir sin estrechar el sentido a un tipo concreto de manto.
- source_word: אֲבֵדָה
  english_pob_choice: lost thing
  chosen_spanish: objeto perdido
  alternatives_spanish:
  - cosa perdida
  - bien perdido
  - propiedad perdida
  lexicon: HALOT
  rationale: El sustantivo se refiere a algo extraviado o perdido. «Objeto perdido» preserva el valor amplio del término y suena natural en español contemporáneo.
- source_word: אֲשֶׁר יֹאמַר כִּי הוּא זֶה
  english_pob_choice: about which someone says, ‘This is it,’
  chosen_spanish: 'del cual alguien diga: «Esto es»'
  alternatives_spanish:
  - 'acerca de lo cual alguien diga: «Este es»'
  - 'sobre el que alguien afirme: «Este es»'
  lexicon: HALOT
  rationale: La cláusula expresa una reclamación o identificación del objeto disputado. «Esto es» conserva la demostración breve del hebreo sin añadir una interpretación más explícita de la que el texto requiere.
- source_word: הָאֱלֹהִים / אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - los jueces
  - el tribunal
  lexicon: HALOT
  rationale: La forma léxica básica es «Dios», y la traducción principal mantiene ese valor. El posible sentido institucional en el marco legal queda reconocido en una nota, sin reemplazar la forma del texto por una interpretación secundaria.
- source_word: יָבֹא דְּבַר שְׁנֵיהֶם
  english_pob_choice: the case of both parties shall come
  chosen_spanish: el asunto de ambas partes vendrá
  alternatives_spanish:
  - el caso de ambos vendrá
  - el asunto de los dos comparecerá
  lexicon: HALOT
  rationale: «Asunto» reproduce bien דָּבָר como materia o caso legal, y «ambas partes» expresa con naturalidad el dual posesivo del hebreo en lenguaje jurídico español.
- source_word: יַרְשִׁיעֻן
  english_pob_choice: declares guilty
  chosen_spanish: declare culpable
  alternatives_spanish:
  - condene
  - declare responsable
  lexicon: HALOT
  rationale: El verbo hifil de רשע significa declarar culpable en un contexto judicial. «Declare culpable» es preciso, sobrio y evita cargar el texto con tecnicismos ajenos.
- source_word: יְשַׁלֵּם שְׁנַיִם
  english_pob_choice: shall pay double
  chosen_spanish: pagará el doble
  alternatives_spanish:
  - restituirá el doble
  - pagará dos veces
  lexicon: HALOT
  rationale: La expresión indica restitución doble. «Pagará el doble» es breve y fiel, y conserva el sentido de compensación legal sin explicitar más de la cuenta.
- source_word: לְרֵעֵהוּ
  english_pob_choice: to his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su semejante
  - al otro
  lexicon: HALOT
  rationale: רֵעַ puede ser vecino, compañero o prójimo. En este contexto legal, «prójimo» comunica bien a la otra persona afectada y encaja con el español bíblico sin sonar arcaico en exceso.
theological_decisions:
- issue: Sentido de אֱלֹהִים en un litigio legal
  english_pob_reading: God, with a footnote preserving the judicial alternative
  chosen_spanish_reading: Dios, con una nota que preserve la alternativa judicial
  alternative_spanish_readings:
  - los jueces
  - el tribunal
  rationale: La lectura principal conserva la forma explícita del texto hebreo. Dado que en contextos legales אֱלֹהִים puede referirse a Dios o a jueces investidos de autoridad, la nota mantiene la tensión interpretativa en vez de resolverla por completo en el cuerpo del texto.
  doctrine_reference: Éxodo 22:8; principio POB de prioridad al texto fuente y notas para lecturas alternativas plausibles
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene una decisión estable: conservar ''God'' en el texto principal y dejar la alternativa judicial en nota; también reconoce que שֶׂה es más amplio que ''sheep''. La redacción española sigue esa misma distribución de decisiones, sin introducir interpretaciones no documentadas.'
  spanish_consistency_notes:
  - Se mantuvo el registro legal sobrio y claro, evitando términos eclesiásticos que no aparecen en el hebreo.
  - '''Dios'' se conserva en el cuerpo del texto conforme a la lectura principal auditada; la alternativa judicial queda en nota.'
  - Se usó puntuación y comillas españolas para una presentación publicable.
  - La lista de bienes se tradujo con equivalentes naturales y concretos, preservando la secuencia del hebreo.
