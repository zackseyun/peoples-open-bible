translation:
  language: es
  text: Y Joab luchó contra Rabá de los amonitas y capturó la ciudad real[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad capital». El hebreo dice literalmente «la ciudad de la realeza/el reino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלָּחֶם
  english_pob_choice: fought against
  chosen_spanish: luchó en
  alternatives_spanish:
  - luchó contra
  - peleó contra
  - hizo guerra contra
  lexicon: HALOT
  rationale: El verbo expresa combate militar. En español, "luchar" comunica bien la acción bélica; "en" mantiene la referencia al lugar del enfrentamiento sin sobrecargar la frase. "Contra" sería también posible, pero aquí la construcción con el lugar suena más natural y sigue el sentido adversativo del contexto.
- source_word: רַבַּת בְּנֵי עַמּוֹן
  english_pob_choice: Rabbah of the Ammonites
  chosen_spanish: Rabá de los amonitas
  alternatives_spanish:
  - Rabá de los hijos de Amón
  - Rabá de Amón
  lexicon: HALOT
  rationale: Se conserva el nombre propio Rabá. "De los amonitas" traduce la designación étnico-política de manera clara y natural en español, siguiendo la decisión inglesa de claridad moderna sin perder el referente histórico.
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  - apresó
  lexicon: HALOT
  rationale: En contexto militar, לכד significa capturar o apoderarse de una ciudad. "Capturó" es directo, preciso y corresponde bien al uso bélico del verbo.
- source_word: עִיר הַמְּלוּכָה
  english_pob_choice: the royal city
  chosen_spanish: la ciudad real
  alternatives_spanish:
  - la ciudad de la realeza
  - la capital
  - la ciudad regia
  lexicon: HALOT
  rationale: El hebreo dice literalmente "la ciudad del reino/realeza". "Ciudad real" conserva la cercanía semántica con la expresión hebrea y mantiene la ambigüedad documentada entre una ciudad vinculada a la realeza o la capital. Se evita cerrar demasiado el sentido con "capital" en el texto principal.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el juicio auditado del POB en inglés, manteniendo la ambigüedad lexical de עִיר הַמְּלוּכָה en una nota sin resolverla interpretativamente en el cuerpo principal.
  spanish_consistency_notes:
  - Se usa "Y" al inicio para reflejar la partícula narrativa וַ sin cargar el estilo.
  - Se conserva "Rabá" como topónimo y "amonitas" como etnónimo estándar en español.
  - '"Ciudad real" refleja la decisión inglesa "royal city" y evita una glosa más interpretativa en el texto principal.'
  - La puntuación y el orden siguen una sintaxis natural en español sin perder el encuadre militar del verso.
