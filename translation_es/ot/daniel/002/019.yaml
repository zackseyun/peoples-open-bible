translation:
  language: es
  text: Entonces el misterio[b] fue revelado a Daniel en una visión de la noche[a]. Entonces Daniel bendijo[c] al Dios del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en una visión nocturna».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el secreto».'
    reason: alternative_reading
  - marker: c
    text: 'O: «alabó al Dios del cielo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Y entonces
  - Luego
  lexicon: HALOT
  rationale: El marcador arameo expresa secuencia narrativa. «Entonces» es natural en español y conserva la repetición del original en ambas cláusulas.
- source_word: בְּחֶזְוָא דִי לֵילְיָא
  english_pob_choice: in a vision of the night
  chosen_spanish: en una visión de la noche
  alternatives_spanish:
  - en una visión nocturna
  - en una visión de noche
  - en una visión nocturna de la noche
  lexicon: HALOT
  rationale: La frase preserva la imagen y el orden del arameo sin volverla más libre de lo que permite el texto. «Visión de la noche» mantiene el matiz formal del genitivo.
- source_word: רָזָה
  english_pob_choice: the mystery
  chosen_spanish: el misterio
  alternatives_spanish:
  - el secreto
  lexicon: HALOT
  rationale: En Daniel, el término designa un contenido oculto que Dios da a conocer. «Misterio» refleja esa carga en español mejor que «secreto», sin perder el carácter de revelación divina.
- source_word: גֲלִי
  english_pob_choice: was revealed
  chosen_spanish: fue revelado
  alternatives_spanish:
  - fue dado a conocer
  - fue descubierto
  - fue divulgado
  lexicon: HALOT
  rationale: La pasiva preserva que el conocimiento llega por revelación y no por hallazgo humano. «Fue revelado» mantiene la forma teológica y la lectura natural en español.
- source_word: בָּרִךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - bendijo/presentó bendición a
  lexicon: HALOT
  rationale: Aunque el inglés POB retiene «blessed» por fidelidad léxica, en español el verbo idiomático cuando un humano dirige bendición a Dios es «bendecir». «Bendijo» conserva el vínculo verbal sin imponer «alabó», que desplaza el valor léxico.
- source_word: לֶאֱלָהּ שְׁמַיָּא
  english_pob_choice: the God of heaven
  chosen_spanish: al Dios del cielo
  alternatives_spanish:
  - al Dios de los cielos
  - al Dios celestial
  lexicon: HALOT
  rationale: La titulación aramea funciona como nombre reverente. «Dios del cielo» reproduce bien el genitivo y es claro en español; se usa «al» por la construcción verbal de bendecir.
- source_word: דָנִיֵּאל
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - —
  lexicon: tradicional
  rationale: Nombre propio transliterado de forma estándar en español.
theological_decisions:
- issue: Cómo traducir ברך aplicado a Dios
  english_pob_reading: Daniel blessed the God of heaven
  chosen_spanish_reading: Daniel bendijo al Dios del cielo
  alternative_spanish_readings:
  - Daniel alabó al Dios del cielo
  - Daniel dio bendición al Dios del cielo
  rationale: La base léxica de ברך se conserva con «bendijo», que en español bíblico es la opción más directa y no borra la relación de bendición dirigida a Dios. «Alabó» comunica bien la respuesta de adoración, pero suaviza el verbo fuente.
  doctrine_reference: Translation philosophy §5
- issue: Expresión de la revelación del misterio
  english_pob_reading: The mystery was revealed
  chosen_spanish_reading: el misterio fue revelado
  alternative_spanish_readings:
  - el misterio fue dado a conocer
  - el secreto fue revelado
  rationale: «Misterio» evita reducir el contenido oculto a simple información secreta; el pasivo conserva que la iniciativa es divina. La formulación mantiene la tensión entre lo oculto y lo dado a conocer.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se conservó la repetición de «Then» con «Entonces», se mantuvo el valor revelatorio de רָזָה con «misterio» y la pasiva «fue revelado», y se trasladó el debate entre «blessed» y «praised» al contraste español entre «bendijo» y «alabó». No se detectaron revisiones aplicadas en el registro inglés, y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo salvo en la construcción fija «el Dios del cielo», conforme al español bíblico actual.
  - Se mantiene «misterio» para רָזָה, coherente con el uso previo en Daniel.
  - Se conserva la repetición de «Entonces» para reflejar la estructura del arameo y del texto auditado en inglés.
  - La puntuación y el orden de las dos oraciones siguen el patrón del original, con una lectura fluida en español.
