revisions:
- from: Y si en verdad olvidas a Yahvé tu Dios, y sigues a otros dioses, y les sirves, y te inclinas ante ellos[a], hoy testifico contra ustedes que ciertamente perecerán.
  to: Y si de veras olvidas[a] a Yahvé tu Dios, y vas tras otros dioses, y les sirves, y te postras ante ellos, hoy testifico contra ti que ciertamente perecerás.
  rationale: Se corrige el versículo para conservar la segunda persona singular del hebreo en toda la línea, rasgo característico del discurso pactual de Deuteronomio y presente explícitamente en las formas verbales y sufijos del original. También se mejora la naturalidad de la intensificación con 'de veras olvidas' y se hace más preciso el gesto cultual con 'te postras ante ellos'. La nota léxica se mantiene, ahora anclada directamente en 'olvidas', que es donde pertenece la explicación del infinitivo absoluto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:55:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del hebreo: mantiene Yahvé, distingue entre servir y postrarse/inclinarse, y conserva la fuerza enfática de los infinitivos absolutos mediante una nota. Sin embargo, cambia de manera injustificada el destinatario singular del hebreo a plural (''ustedes... perecerán''), lo que altera un rasgo discursivo importante de Deuteronomio, donde Israel suele ser interpelado en singular representativo. También conviene ubicar mejor ''hoy'' para corresponder a ''I testify against you today''.'
  spanish_quality_summary: El español es claro y digno, pero la mezcla de singular inicial ('olvidas', 'sigues') con plural final ('ustedes', 'perecerán') produce inconsistencia interna. Además, 'en verdad olvidas' suena algo menos natural que una formulación que preserve el énfasis mediante nota y una redacción más fluida. 'Te inclinas ante ellos' es aceptable, aunque 'te postras ante ellos' refleja con más precisión el gesto cultual.
  glossary_alignment: 'Alinea correctamente יְהוָה como ''Yahvé'' y conserva la distinción léxica entre וַעֲבַדְתָּם (''sirves'') y וְהִשְׁתַּחֲוִיתָ לָהֶם (''te postras/te inclinas''). No hay conflicto con la terminología principal del proyecto. La principal desviación no es glosarial sino gramatical-discursiva: el singular hebreo debe conservarse en español.'
  issues:
  - severity: high
    issue: Cambio del destinatario de singular a plural
    rationale: 'El hebreo usa segunda persona singular de forma sostenida: ''tu Dios'', ''fuiste'', ''sirves'', y finalmente ''perecerás'' implícito en singular representativo. Cambiar a ''ustedes... perecerán'' altera la forma de apelación del texto y rompe la coherencia interna del versículo.'
  - severity: medium
    issue: Inconsistencia pronominal dentro del mismo versículo
    rationale: El borrador comienza con 'olvidas... sigues... te inclinas' y luego pasa a 'contra ustedes... perecerán'. Aun si se defendiera una lectura comunitaria, esta mezcla dentro de una sola oración suena descuidada y menos fiel al original.
  - severity: low
    issue: '''En verdad olvidas'' suena algo rígido en español'
    rationale: La intensificación hebrea se puede mantener mejor con 'si de veras olvidas' o con una formulación base natural apoyada por la nota léxica, sin perder fidelidad.
  - severity: low
    issue: '''Te inclinas ante ellos'' es menos preciso que ''te postras ante ellos'''
    rationale: הִשְׁתַּחֲוָה denota prosternación/homenaje. 'Inclinarse' es posible, pero 'postrarse' comunica mejor la acción física y cultual sin colapsarla con 'adorar'.
  revised_spanish_text: Y si de veras olvidas[a] a Yahvé tu Dios, y vas tras otros dioses, y les sirves, y te postras ante ellos, hoy testifico contra ti que ciertamente perecerás.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «olvidando, olvidas»; forma enfática que significa «ciertamente» o «de veras olvidas».'
    reason: lexical_alternative
  revision_rationale: Se corrige el versículo para conservar la segunda persona singular del hebreo en toda la línea, rasgo característico del discurso pactual de Deuteronomio y presente explícitamente en las formas verbales y sufijos del original. También se mejora la naturalidad de la intensificación con 'de veras olvidas' y se hace más preciso el gesto cultual con 'te postras ante ellos'. La nota léxica se mantiene, ahora anclada directamente en 'olvidas', que es donde pertenece la explicación del infinitivo absoluto.
