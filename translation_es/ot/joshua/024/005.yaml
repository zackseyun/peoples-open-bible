translation:
  language: es
  text: Entonces envié a Moisés y a Aarón, e herí[a] a Egipto, como hice en medio de él[b], y después los saqué a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'golpeé a Egipto' o 'afligí a Egipto'; el hebreo puede significar 'golpear', 'herir' o 'afligir', aquí con referencia a los golpes de Yahvé contra Egipto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'como hice en medio de él'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  english_pob_choice: I sent
  chosen_spanish: envié
  alternatives_spanish:
  - mandé
  - despaché
  lexicon: HALOT
  rationale: En español, 'envié' comunica de manera natural la acción de enviar/mandar a Moisés y Aarón en un contexto de comisión divina. 'Mandé' sería posible, pero 'envié' mantiene mejor la correspondencia directa con שׁלח y el tono narrativo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: transliteración estándar
  rationale: Nombre propio bíblico estándar en español.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: transliteración estándar
  rationale: Nombre propio bíblico estándar en español.
- source_word: וָאֶגֹּף
  english_pob_choice: I struck
  chosen_spanish: hice caer sobre Egipto
  alternatives_spanish:
  - golpeé a Egipto
  - herí a Egipto
  - castigué a Egipto
  lexicon: HALOT
  rationale: El verbo נגף puede significar 'golpear/abatir/herir'. En español, 'hice caer sobre Egipto' conserva la idea de golpes divinos sin reducirlo a una sola de las opciones interpretativas; además deja abierta la referencia a las plagas, como en el audit trail inglés.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: nombre propio colectivo
  rationale: '''Egipto'' funciona naturalmente como nombre colectivo del país y su población en este contexto.'
- source_word: כַּאֲשֶׁר עָשִׂיתִי בְּקִרְבּוֹ
  english_pob_choice: as I did in its midst
  chosen_spanish: como hice en medio de él
  alternatives_spanish:
  - como hice en su interior
  - como hice en medio de ella
  lexicon: HALOT
  rationale: '''En medio de él'' reproduce el singular del hebreo referido colectivamente a Egipto; en español es más idiomático que una construcción literal pesada. La frase conserva la tensión del texto sobre la acción divina dentro de Egipto sin explicitar más de lo que el hebreo dice.'
- source_word: וְאַחַר
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y después de eso
  lexicon: HALOT
  rationale: '''Y después'' expresa la secuencia temporal de forma clara y natural.'
- source_word: הוֹצֵאתִי אֶתְכֶם
  english_pob_choice: I brought you out
  chosen_spanish: los saqué a ustedes
  alternatives_spanish:
  - los conduje fuera
  - los saqué
  lexicon: HALOT
  rationale: El Hiphil de יצא se traduce bien como 'sacar'. Dado que el destinatario es Israel corporativamente y el español requiere claridad del objeto, 'los saqué a ustedes' conserva el sentido directo del hebreo y el énfasis del discurso dirigido al pueblo.
theological_decisions:
- issue: Referente del 'los/ustedes' en la salida de Egipto
  english_pob_reading: Retained as 'you' addressing Israel corporately, including the ancestors' exodus generation in covenantal solidarity.
  chosen_spanish_reading: Se conserva como una segunda persona plural dirigida corporativamente a Israel, expresada en español con objeto explícito para evitar ambigüedad.
  alternative_spanish_readings:
  - los saqué
  - saqué a sus padres
  - los hice salir
  rationale: El hebreo dice directamente 'los saqué/los hice salir' con destinatario plural. En español, añadir 'a ustedes' ayuda a mantener la dirección al pueblo sin resolver la tensión histórica que el texto conserva entre la audiencia presente y la generación del éxodo.
  doctrine_reference: Preservar la tensión teológica y retórica del discurso de pacto sin explicarla en paráfrasis.
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del POB inglés, especialmente la preferencia por un equivalente más natural de כַּאֲשֶׁר ('como hice / as I did') y la conservación de la secuencia narrativa sin expansión explicativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en este proyecto como equivalente estable del nombre divino, aunque en este versículo no aparece explícitamente en el hebreo citado.
  - Se mantiene el tono narrativo formal y bíblico sin recurrir a calcos excesivamente literales que oscurezcan el español.
  - La elección de 'hice caer sobre Egipto' evita reemplazar la tensión léxica de נגף por una interpretación única como 'plagué', preservando la amplitud semántica documentada.
