translation:
  language: es
  text: 'El rey fue con Daniel a la casa de Bel[a]. Y los sacerdotes de Bel dijeron: «Mira, nosotros salimos afuera. Pero tú, oh rey, dispone los alimentos, mezcla el vino y colócalo, y cierra la puerta».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templo de Bel». El griego dice literalmente «casa de Bel», una manera habitual de referirse al santuario o templo de una divinidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ βασιλεὺς
  english_pob_choice: The king
  chosen_spanish: El rey
  alternatives_spanish:
  - El monarca
  - El rey mismo
  lexicon: LSJ
  rationale: βασιλεύς designa al rey gobernante; en español, «el rey» reproduce con naturalidad el título simple sin añadir énfasis innecesario.
- source_word: μετὰ Δανιὴλ
  english_pob_choice: with Daniēl
  chosen_spanish: con Daniel
  alternatives_spanish:
  - junto con Daniel
  lexicon: LSJ
  rationale: μετά con genitivo expresa compañía. Se usa el nombre común «Daniel» para claridad y naturalidad en español.
- source_word: εἰς τὸν οἶκον τοῦ Βήλ
  english_pob_choice: into the house of Bel
  chosen_spanish: a la casa de Bel
  alternatives_spanish:
  - al templo de Bel
  - a la casa de Bel
  lexicon: LSJ
  rationale: οἶκος significa literalmente «casa». En este contexto cultual puede referirse al templo, pero se conserva «casa» en el texto principal para no desplazar el matiz del griego; en nota se puede explicitar la equivalencia cultual.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: LSJ
  rationale: Es un marcador de atención. «Mira» reproduce el tono directo y natural del discurso sin arcaísmo.
- source_word: ἡμεῖς ἀποτρέχομεν ἔξω
  english_pob_choice: we are going outside
  chosen_spanish: nosotros vamos a salir
  alternatives_spanish:
  - nos vamos afuera
  - salimos
  lexicon: LSJ
  rationale: ἀποτρέχομεν expresa salir/retirarse rápidamente, pero aquí la función comunicativa es anunciar que abandonan el lugar. «Vamos a salir» mantiene esa fuerza sin sobrerrepresentar la rapidez.
- source_word: σύ δέ, βασιλεῦ
  english_pob_choice: But you, O king,
  chosen_spanish: Pero tú, oh rey,
  alternatives_spanish:
  - Y tú, rey,
  - Pero tú, rey,
  lexicon: LSJ
  rationale: δέ marca contraste entre su salida y la acción del rey. «Oh rey» conserva la vocación formal del vocativo βασιλεῦ.
- source_word: παράθες τὰ βρώματα
  english_pob_choice: set out the food
  chosen_spanish: dispon los alimentos
  alternatives_spanish:
  - pon la comida
  - sirve la comida
  lexicon: LSJ
  rationale: παράθες es un imperativo de poner delante, colocar para servir. «Dispon los alimentos» suena digno y mantiene la idea de preparación ritual; «alimentos» evita reducir βρώματα a comida común si el contexto exige provisiones.
- source_word: τὸν οἶνον κεράσας θές
  english_pob_choice: mix the wine and set it out
  chosen_spanish: mezcla el vino y ponlo
  alternatives_spanish:
  - tras mezclar el vino, ponlo
  - mezcla el vino y dispónlo
  lexicon: LSJ
  rationale: κεράσας es participio aoristo que antecede a la acción principal de θές. Se conserva la secuencia verbal explícita en español con una forma natural y fiel.
- source_word: ἀπόκλεισον τὴν θύραν
  english_pob_choice: shut the door
  chosen_spanish: cierra la puerta
  alternatives_spanish:
  - enciérrala
  - sella la puerta
  lexicon: LSJ
  rationale: ἀποκλείω significa cerrar/shut off. «Cierra la puerta» es el equivalente más directo; «sellar» o «encerrar» añadirían fuerza no expresada en el griego.
theological_decisions:
- issue: ἡ οἶκος τοῦ Βήλ como espacio cultual
  english_pob_reading: house of Bel
  chosen_spanish_reading: casa de Bel
  alternative_spanish_readings:
  - templo de Bel
  rationale: El griego dice literalmente «casa», pero en este contexto se trata del recinto cultual de Bel. Se mantiene «casa» en la traducción base y se deja abierta la identificación con templo sin imponerla en el texto principal.
  doctrine_reference: Principio de primacía del original y conservación del matiz léxico
- issue: Tono del vocativo βασιλεῦ
  english_pob_reading: O king
  chosen_spanish_reading: oh rey
  alternative_spanish_readings:
  - rey
  - mi rey
  rationale: El vocativo se conserva como apelación solemne. «Oh rey» reproduce la formalidad sin introducir afecto o propiedad que no están en el texto.
  doctrine_reference: Respeto del registro retórico del original
translation_notes:
  revision_awareness: 'Se siguió la revisión final del audit trail inglés que ajusta la secuencia de κεράσας θές para reflejar más directamente el orden griego: «mezcla el vino y ponlo», en lugar de convertirlo en una subordinada temporal. También se conservó la opción léxica de ''house of Bel'' como ''casa de Bel'' en el texto principal, con nota alternativa para el valor cultual.'
  spanish_consistency_notes:
  - Se mantiene «Bel» como nombre propio invariable, conforme al griego y al audit trail inglés.
  - Se usa «Daniel» en lugar de transliteración ornamental para mayor inteligibilidad en español.
  - No se introduce «SEÑOR» ni otros sustitutos teológicos, porque el versículo no contiene el tetragrámaton ni κύριος en función divina.
  - 'Se conserva la fuerza imperativa de las órdenes con verbos simples y directos: «dispon», «mezcla», «ponlo», «cierra».'
