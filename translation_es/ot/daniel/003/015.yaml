base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/015.yaml
  text: Now if you are ready[a], when you hear the sound of the horn, pipe, lyre, trigon, harp, and bagpipe, and every kind of music, to fall down and worship the image that I have made, well and good. But if you do not worship, in that very hour you will be thrown into the midst of a blazing furnace of fire[d][c][b]. And who is the god who will deliver you out of my hands?
  footnotes:
  - marker: a
    text: Or 'triangular harp' for 'trigon'; the exact instrument denoted by שַׂבְּכָא is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Traditional renderings often have 'psaltery' for 'harp' (פְּסַנְתֵּרִין).
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'double pipe'; the identification of סוּמְפֹּנְיָה is debated. Older English 'symphony' reflects the form of the word, not a modern orchestra.
    reason: lexical_alternative
  - marker: d
    text: 'The Aramaic is elliptical after ''that I have made''; ''well'' is supplied to complete the sense: if they comply, no punishment follows.'
    reason: lexical_alternative
