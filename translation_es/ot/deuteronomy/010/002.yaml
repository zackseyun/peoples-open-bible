translation:
  language: es
  text: Y escribiré en las tablas las palabras[a] que estaban en las primeras tablas, que quebraste, y las pondrás en el arca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los mandamientos»; el hebreo dice «las palabras».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶכְתֹּב
  english_pob_choice: And I will write
  chosen_spanish: Y escribiré
  alternatives_spanish:
  - Y escribiré
  - Y escribiré yo
  lexicon: HALOT
  rationale: El imperfecto con waw expresa aquí una promesa/instrucción divina en futuro simple; «escribiré» comunica con naturalidad la acción prometida sin forzar un presente continuo.
- source_word: הַלֻּחֹת
  english_pob_choice: the tablets
  chosen_spanish: las tablas
  alternatives_spanish:
  - las tablas
  - las tablas de piedra
  - las tabletas
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, «tablas» es una forma natural para las placas/tablas del pacto. Se evita añadir «de piedra» porque no aparece en este versículo, aunque el contexto inmediato lo supone.
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las palabras
  - los mandatos
  - los dichos
  lexicon: HALOT
  rationale: דְּבָרִים puede abarcar «palabras», «asuntos» o «mandatos»; la elección de «palabras» sigue de cerca el hebreo y conserva la tensión que el auditable inglés POB marcó con su nota sobre la alternativa «commandments».
- source_word: הָיּוּ עַל הַ לֻּחֹת הָרִאשֹׁנִים
  english_pob_choice: that were on the first tablets
  chosen_spanish: que estaban sobre las primeras tablas
  alternatives_spanish:
  - que estaban sobre las primeras tablas
  - que estaban en las primeras tablas
  - que fueron sobre las primeras tablas
  lexicon: HALOT
  rationale: «Estaban sobre» reproduce con sencillez la ubicación indicada por el hebreo. «Primeras» mantiene el contraste con las tablas reemplazadas sin introducir una glosa interpretativa.
- source_word: שִׁבַּרְתָּ
  english_pob_choice: you broke
  chosen_spanish: que quebraste
  alternatives_spanish:
  - que quebraste
  - que rompiste
  - que destrozaste
  lexicon: HALOT
  rationale: «Quebraste» conserva un tono bíblico sobrio y corresponde bien al valor de שׁבר en este contexto. «Rompiste» también es posible, pero menos solemne.
- source_word: וְשַׂמְתָּם
  english_pob_choice: and you shall put them
  chosen_spanish: y las pondrás
  alternatives_spanish:
  - y las pondrás
  - y las colocarás
  - y las meterás
  lexicon: HALOT
  rationale: El sufijo masculino plural se entiende mejor en español refiriéndolo a las tablas mencionadas inmediatamente. «Las pondrás» es una equivalencia natural y evita un giro demasiado literal con «ellos».
- source_word: בָּאָרוֹן
  english_pob_choice: in the ark
  chosen_spanish: en el arca
  alternatives_spanish:
  - en el arca
  - dentro del arca
  - en el arca del pacto
  lexicon: HALOT
  rationale: «Arca» es el término establecido y fiel para ארון en este contexto sagrado. Se evita añadir «del pacto» porque no está presente en esta línea.
theological_decisions:
- issue: Referente del sufijo en וְשַׂמְתָּם
  english_pob_reading: The pronoun refers to the tablets.
  chosen_spanish_reading: El sufijo se refiere a las tablas.
  alternative_spanish_readings:
  - El sufijo se refiere a las palabras o mandatos escritos en las tablas.
  rationale: Aunque gramaticalmente el sufijo plural masculino puede remitir a «palabras», el movimiento físico de poner algo en el arca encaja mejor con las tablas mismas, y así se preserva la lectura contextual seguida por la POB inglesa.
  doctrine_reference: Contexto narrativo de Deuteronomio 10:1-5
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente: no hubo cambios necesarios según el auditor inglés, con acuerdo alto y sin observaciones pendientes.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» donde corresponda en este proyecto, pero en este versículo no aparece el Tetragrámaton.
  - Se usó «tablas» y no «tableros» ni «tablillas» para conservar el término bíblico natural en español.
  - Se evitó traducir mecánicamente desde el inglés; la redacción parte del hebreo y solo usa el inglés POB como guía auditada.
  - La nota textual conserva la alternativa léxica principal que el POB inglés documentó para הַדְּבָרִים.
