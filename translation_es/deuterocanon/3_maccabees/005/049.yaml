base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/005/049.yaml
  text: Considering that moment to be for them the final turn of life[a], the end of their most miserable expectation, they turned to pity and lamentation and kept kissing one another, embracing their relatives, falling upon their necks—parents upon children and mothers upon young daughters; and others, holding infant babies to their breasts[c][b], were drawing out their last milk.
  footnotes:
  - marker: a
    text: Or 'the end of their most miserable waiting'; the Greek προσδοκία can denote expectation, suspense, or waiting for what is about to happen.
    reason: lexical_alternative
  - marker: b
    text: Literally 'falling upon the necks,' a Greek idiom for throwing oneself into another's embrace in grief or affection.
    reason: cultural_note
  - marker: c
    text: Or 'young women'; the context of family pairings favors 'young daughters.'
    reason: lexical_alternative
