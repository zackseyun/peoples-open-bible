  glossary_alignment: No hay términos teológicos clave del glosario global en juego. En nombres propios, el borrador en general respeta la orientación del POB, pero conviene alinear הַסְּנֻאָה con la forma documentada «Hassenuá» en español, mejor que «Hasenuá».
  issues:
