translation:
  language: es
  text: El consejo de Yahvé es para los que le temen[a], y él les da a conocer su pacto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El secreto de Yahvé es para los que le temen».
    reason: lexical_alternative
  - marker: b
    text: O «alianza».
    reason: lexical_alternative
lexical_decisions:
- source_word: סוֹד
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - secreto
  - cónclave íntimo
  - consejo confidencial
  lexicon: HALOT
  rationale: סוֹד puede expresar secreto, confidencia o deliberación íntima. En español, «consejo» comunica mejor la idea de una deliberación confidencial o propósito comunicado, sin reducir el sentido a mera información oculta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Doctrina POB sobre el Tetragrámaton
  rationale: Se conserva el nombre divino propio en transliteración española. «Yahvé» mantiene la referencia al nombre revelado, en lugar de sustituirlo por un título.
- source_word: לִירֵאָיו
  english_pob_choice: for those who fear him
  chosen_spanish: para los que le temen
  alternatives_spanish:
  - para los que lo reverencian
  - para quienes le temen
  - a los que le temen
  lexicon: HALOT
  rationale: La forma participial señala a quienes viven en temor reverente de Yahvé. «Le temen» es natural en español y conserva el valor reverencial de ירא.
- source_word: וּבְרִיתוֹ
  english_pob_choice: and his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su pacto de alianza
  lexicon: HALOT
  rationale: בְּרִית se traduce de manera directa como «pacto». En el contexto poético, el posesivo se integra naturalmente en español como «su pacto».
- source_word: לְהוֹדִיעָם
  english_pob_choice: he makes his covenant known to them
  chosen_spanish: da a conocer
  alternatives_spanish:
  - hace conocer
  - lo da a conocer
  - les da a conocer
  lexicon: HALOT
  rationale: El hifil de ידע significa «hacer conocer». En español, «da a conocer» reproduce bien la acción causativa y permite que el objeto implícito se entienda por el antecedente inmediato «su pacto».
theological_decisions:
- issue: Sentido de סוֹד en relación con la revelación divina
  english_pob_reading: Rendered as 'counsel' rather than 'secret'
  chosen_spanish_reading: «consejo» en lugar de «secreto»
  alternative_spanish_readings:
  - «el secreto de Yahvé»
  - «la confidencia de Yahvé»
  rationale: El versículo presenta una revelación relacional asociada al pacto. «Consejo» preserva la idea de comunicación íntima y deliberativa sin convertirla en conocimiento esotérico aislado.
  doctrine_reference: Translation philosophy §3, §5
- issue: Objeto implícito de לְהוֹדִיעָם
  english_pob_reading: Supplied 'it' in English; revised reading says God makes his covenant known
  chosen_spanish_reading: 'El sujeto explícito es Yahvé: «él da a conocer su pacto a ellos»'
  alternative_spanish_readings:
  - «da a conocerlo a ellos»
  - «les da a conocer su pacto»
  rationale: La revisión inglesa aclara que el sujeto es Yahvé, no el pacto. El español sigue esa precisión y hace explícito el agente divino para evitar ambigüedad sintáctica.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'La traducción sigue la revisión más reciente del inglés auditado: el segundo hemistiquio expresa que Yahvé da a conocer su pacto a quienes le temen, no que el pacto sea el sujeto de «hacer conocer».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se mantiene «pacto» para בְּרִית, evitando sustituirlo por un término más eclesiástico sin base textual.
  - Se conserva la relación poética entre «consejo» y «pacto» sin forzar una glosa explicativa dentro del texto principal.
  - La construcción «les/ a ellos» se resuelve en un español natural con «a ellos» para mantener el paralelismo y la transparencia sintáctica.
