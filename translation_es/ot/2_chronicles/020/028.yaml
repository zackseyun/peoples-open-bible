translation:
  language: es
  text: Y llegaron a Jerusalén con arpas[a], liras y trompetas, a la casa[b] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con arpas/laúdes»; la forma exacta del instrumento antiguo denotado por נְבָלִים es incierta.
    reason: lexical_alternative
  - marker: b
    text: O «al templo de Yahvé»; literalmente, «a la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: And they came
  chosen_spanish: Y llegaron
  alternatives_spanish:
  - Y vinieron
  - Y entraron
  lexicon: HALOT
  rationale: El verbo narrativo de llegada se expresa naturalmente en español con «llegaron». Mantiene el avance secuencial del waw consecutivo sin añadir la especificidad de «entraron».
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma usual española y ampliamente reconocible.
- source_word: בִּנְבָלִים
  english_pob_choice: with harps
  chosen_spanish: con salterios
  alternatives_spanish:
  - con arpas
  - con laúdes
  - con instrumentos de cuerda
  lexicon: HALOT
  rationale: נבל designa un instrumento de cuerda antiguo de forma no totalmente segura. «Salterios» es un término español tradicional y suficientemente amplio para este contexto musical; se conserva la incertidumbre en nota.
- source_word: וּבְכִנֹּרוֹת
  english_pob_choice: and lyres
  chosen_spanish: liras
  alternatives_spanish:
  - liras
  - arpas
  lexicon: HALOT
  rationale: כִּנּוֹר corresponde normalmente a «lira». Se distingue de נבל para no colapsar dos términos hebreos diferentes en una sola palabra española.
- source_word: וּבַחֲצֹצְרֹת
  english_pob_choice: and trumpets
  chosen_spanish: y trompetas
  alternatives_spanish:
  - y trompetas ceremoniales
  - y trompetas de plata
  lexicon: HALOT
  rationale: El término denota trompetas, probablemente de uso ceremonial. «Trompetas» es fiel y claro; no se añade «de plata» porque no aparece en el verso.
- source_word: אֶל בֵּית יְהוָה
  english_pob_choice: to the house of Yahweh
  chosen_spanish: a la casa de Yahvé
  alternatives_spanish:
  - al templo de Yahvé
  - a la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de Yahvé», que refleja בֵּית יְהוָה y mantiene el nombre divino según la norma del proyecto. «Templo» queda como equivalencia interpretativa, no principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La traducción española sigue la decisión doctrinal del proyecto de transliterar el Tetragrámaton como «Yahvé», preservando el nombre personal del Dios de Israel en lugar de sustituirlo por un título.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. La norma del proyecto en español es transliterarlo como «Yahvé», no ocultarlo detrás de un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Revisado a la luz del paquete hebreo, la traducción inglesa auditada y el último pase de revisión, que no introdujo cambios. Se mantuvieron la distinción entre נבל y כִּנּוֹר, y la rendición del Tetragrámaton como Yahvé.
  spanish_consistency_notes:
  - Se preserva la secuencia narrativa con un pretérito simple natural en español.
  - Se distingue «salterios» de «liras» para no fusionar dos instrumentos hebreos diferentes.
  - Se mantiene «casa de Yahvé» como calco transparente del hebreo, con «templo» solo como alternativa anotada.
  - Se usa «Yahvé» de forma consistente con la terminología doctrinal del proyecto.
