translation:
  language: es
  text: Al día siguiente[a], los hombres que estaban con Judas vinieron, cuando ya había surgido la necesidad, para recoger los cuerpos de los que habían caído y ponerlos a descansar con sus parientes en las tumbas de sus antepasados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devolverlos a sus tumbas ancestrales». El griego menciona explícitamente tanto a los parientes como las tumbas de sus antepasados.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δὲ ἐχομένῃ
  english_pob_choice: On the following day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - Al día siguiente mismo
  - El día siguiente
  lexicon: LSJ
  rationale: La expresión griega es temporal e idiomática; «Al día siguiente» es la equivalencia natural en español y conserva la secuencia narrativa sin añadir matices no presentes.
- source_word: οἱ περὶ τὸν Ἰούδαν
  english_pob_choice: the men with Judas
  chosen_spanish: los hombres que estaban con Judas
  alternatives_spanish:
  - los que rodeaban a Judas
  - Judas y sus hombres
  lexicon: LSJ
  rationale: La frase designa al grupo de Judas. «Los hombres que estaban con Judas» mantiene el sentido colectivo sin introducir un término militar más explícito que el griego no exige.
- source_word: καθʼ ὃν χρόνον τὸ τῆς χρείας ἐγέγονει
  english_pob_choice: when the need had arisen
  chosen_spanish: cuando ya había surgido la necesidad
  alternatives_spanish:
  - cuando se había vuelto necesario
  - en el momento en que la situación lo requería
  lexicon: LSJ
  rationale: El griego expresa que la circunstancia había llegado a exigir esta acción. «Había surgido la necesidad» reproduce bien el matiz y suena natural en español.
- source_word: τὰ σώματα τῶν προπεπτωκότων
  english_pob_choice: the bodies of those who had fallen
  chosen_spanish: los cuerpos de los que habían caído
  alternatives_spanish:
  - los cuerpos de los caídos
  - los cadáveres de los que habían caído
  lexicon: LSJ
  rationale: «Los que habían caído» conserva la imagen verbal del participio griego y evita sobreinterpretar el contexto con un término más técnico de batalla de lo necesario.
- source_word: ἀνακομίσασθαι
  english_pob_choice: to gather up
  chosen_spanish: recoger
  alternatives_spanish:
  - reunir
  - levantar
  lexicon: LSJ
  rationale: En este contexto funerario, el verbo indica recuperar los cuerpos del lugar donde yacen. «Recoger» transmite esa acción de manera clara y sobria en español.
- source_word: ἀποκαταστῆσαι
  english_pob_choice: to lay them
  chosen_spanish: depositarlos
  alternatives_spanish:
  - volver a ponerlos
  - ponerlos
  lexicon: LSJ
  rationale: El verbo aquí se relaciona con la colocación de los cuerpos en el destino funerario. «Depositarlos» es más fiel al acto de colocarlos para sepultura que una paráfrasis más interpretativa.
- source_word: μετὰ τῶν συγγενῶν
  english_pob_choice: with their relatives
  chosen_spanish: con sus parientes
  alternatives_spanish:
  - con sus familiares
  - entre sus parientes
  lexicon: LSJ
  rationale: «Parientes» mantiene el vínculo familiar explícito del griego sin restringirlo a un grado concreto de parentesco.
- source_word: εἰς τοὺς πατρῴους τάφους
  english_pob_choice: their ancestral tombs
  chosen_spanish: en las tumbas de sus antepasados
  alternatives_spanish:
  - en sus tumbas ancestrales
  - en las tumbas paternas
  lexicon: LSJ
  rationale: πατρῴους τάφους apunta a tumbas heredadas por linaje/antepasados. «Tumbas de sus antepasados» expresa ese valor ancestral de modo transparente para el lector español.
theological_decisions:
- issue: Relación entre recuperar los cuerpos y darles sepultura familiar
  english_pob_reading: to gather up the bodies of those who had fallen and to lay them with their relatives in their ancestral tombs
  chosen_spanish_reading: recoger los cuerpos de los que habían caído y depositarlos con sus parientes en las tumbas de sus antepasados
  alternative_spanish_readings:
  - recoger los cuerpos de los caídos y llevarlos a sus tumbas ancestrales
  - recuperar los cuerpos de los muertos y sepultarlos con su familia
  rationale: El texto griego une la recuperación de los cuerpos con su colocación en un lugar funerario familiar. La redacción española conserva ambos elementos sin reducirlos a una sola idea de sepultura.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Tono sobrio para la acción funeraria
  english_pob_reading: the bodies of those who had fallen
  chosen_spanish_reading: los cuerpos de los que habían caído
  alternative_spanish_readings:
  - los cadáveres de los caídos
  - los muertos
  rationale: «Los cuerpos» mantiene el referente físico sin imponer un registro más crudo de lo que el pasaje requiere; «los que habían caído» preserva la dignidad narrativa del griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: El contexto inglés revisó una opción más literal («the tombs of their fathers») hacia «their ancestral tombs» por naturalidad e idiomatismo. La versión española sigue ese ajuste semántico con «tumbas de sus antepasados», manteniendo explícito el vínculo familiar y ancestral que el griego expresa mediante συγγενῶν y πατρῴους τάφους.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Parientes»/«antepasados» conserva el doble eje familiar y ancestral del original sin fusionarlo indebidamente.
  - La estructura temporal «Al día siguiente» sigue el valor narrativo de τῇ δὲ ἐχομένῃ de manera natural en español.
