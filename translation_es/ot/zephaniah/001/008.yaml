base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/001/008.yaml
  text: And on the day of Yahweh’s sacrifice[a], I will punish the officials, the king’s sons[c][b], and all who wear foreign clothing.
  footnotes:
  - marker: a
    text: Or 'the sacrifice of the LORD'; the phrase may also evoke a sacrificial feast prepared by the LORD in judgment (cf. Zeph 1:7).
    reason: lexical_alternative
  - marker: b
    text: '''Officials'' may also be rendered ''princes'' or ''rulers.'''
    reason: lexical_alternative
  - marker: c
    text: That is, garments associated with foreign peoples; the expression may imply adoption of foreign customs or loyalties, not merely non-native fabric.
    reason: cultural_note
