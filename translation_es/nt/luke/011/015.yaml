translation:
  language: es
  text: 'Pero algunos de ellos dijeron[a]: «Por Beelzebul, el jefe de los demonios, expulsa los demonios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Beelzebub: forma tradicional del nombre, traducido aquí como Beelzebul siguiendo el texto griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - algunos de ellos
  lexicon: BDAG
  rationale: τινὲς introduce un grupo indeterminado dentro del conjunto presente; «algunos» es natural en español y conserva esa indefinición sin añadir precisión no expresada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca contraste con la reacción positiva del contexto inmediato; «Pero» transmite bien ese valor adversativo en español.
- source_word: ἐξ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - entre ellos
  - de entre ellos
  lexicon: BDAG
  rationale: La construcción partitiva identifica a los hablantes como surgidos del grupo mayor. «De ellos» es idiomático y conserva esa relación partitiva.
- source_word: εἶπον
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - decían
  lexicon: BDAG
  rationale: El aoristo presenta la acusación como un hecho puntual; el pasado simple español expresa bien esa acción concluida.
- source_word: Ἐν
  english_pob_choice: By
  chosen_spanish: Por
  alternatives_spanish:
  - Mediante
  - Con
  lexicon: BDAG
  rationale: Aquí ἐν con un nombre personal comunica instrumentalidad o agencia. «Por» es la forma más natural en español para expresar «por medio de» o «por la acción de».
- source_word: Βεελζεβοὺλ
  english_pob_choice: Beelzebul
  chosen_spanish: Beelzebul
  alternatives_spanish:
  - Beelzebub
  lexicon: BDAG
  rationale: Se sigue la forma griega del texto base, manteniendo la primacía de la fuente original. La variante tradicional «Beelzebub» queda como alternativa reconocida, no como forma principal.
- source_word: τῷ ἄρχοντι τῶν δαιμονίων
  english_pob_choice: the ruler of the demons
  chosen_spanish: el gobernante de los demonios
  alternatives_spanish:
  - el príncipe de los demonios
  - el jefe de los demonios
  lexicon: BDAG
  rationale: ἄρχων indica una figura de autoridad o gobierno. «Gobernante» conserva el sentido de autoridad de manera clara y actual; «príncipe» es tradicional pero menos transparente hoy.
- source_word: ἐκβάλλει
  english_pob_choice: he casts out
  chosen_spanish: expulsa
  alternatives_spanish:
  - echa fuera
  - arroja fuera
  lexicon: BDAG
  rationale: En contextos de exorcismo, ἐκβάλλω tiene el sentido establecido de expulsar o echar fuera. «Expulsa» es natural y fiel; el sujeto implícito se mantiene por el contexto.
- source_word: τὰ δαιμόνια
  english_pob_choice: demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - espíritus malignos
  lexicon: BDAG
  rationale: δαιμόνια corresponde directamente a «demonios». «Espíritus malignos» sería interpretativo y menos pegado al término griego.
theological_decisions:
- issue: Forma del nombre Βεελζεβούλ en español
  english_pob_reading: Beelzebul
  chosen_spanish_reading: Beelzebul
  alternative_spanish_readings:
  - Beelzebub
  rationale: La forma principal sigue el texto griego y la política de transliterar nombres propios cuando el original lo permite. La variante tradicional se reconoce, pero no sustituye la forma del texto fuente en la línea principal.
  doctrine_reference: 'Translation philosophy: original-language primacy; transliterate names rather than normalizing to tradition.'
- issue: Expresión de ἐν con valor instrumental/agencial
  english_pob_reading: By
  chosen_spanish_reading: Por
  alternative_spanish_readings:
  - Mediante
  - Con
  rationale: El griego no describe localización espacial aquí, sino la supuesta agencia de Beelzebul en la expulsión de demonios. «Por» en español comunica esa relación causal/instrumental sin sobreexplicar.
  doctrine_reference: 'Grammar and discourse: instrumental ἐν in exorcism accusation.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la forma griega de SBLGNT y el auditoría inglesa: mantiene el contraste adversativo, el partitivo «de ellos», el nombre transliterado Beelzebul, el valor instrumental de ἐν y el sentido exorcístico de ἐκβάλλει. No se detectaron revisiones previas aplicadas en el paquete.'
  spanish_consistency_notes:
  - Se conserva «demonios» para δαιμόνια, coherente con el uso técnico del término en el versículo.
  - «Gobernante» evita introducir la equivalencia tradicional «príncipe» sin necesidad contextual.
  - La cita se presenta con comillas angulares españolas y puntuación natural para lectura pública.
