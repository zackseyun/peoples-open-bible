translation:
  language: es
  text: Holón con sus pastizales[a], y Debir con sus pastizales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lista paralela en 1 Crónicas 6:58 lee «Hilen» para este nombre de ciudad; aquí Josué presenta «Holón».
    reason: cross_reference
lexical_decisions:
- source_word: חֹלֹן
  english_pob_choice: Holon
  chosen_spanish: Holón
  alternatives_spanish:
  - Hilen
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español se translitera y se ajusta la acentuación gráfica para lectura natural. Se conserva la forma de Joshua, mientras que la variante paralela de 1 Crónicas 6:58 queda reflejada en la nota.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - su terreno común
  - sus tierras abiertas
  - sus alrededores
  lexicon: HALOT
  rationale: מִגְרָשׁ denota el terreno abierto asociado a una ciudad, con uso comunal y de pastoreo. En español, 'pastizales' comunica bien la idea espacial y funcional sin recurrir a 'suburbios', que sería engañoso aquí. El posesivo plural 'sus' sigue la referencia a cada ciudad.
- source_word: דְּבִר
  english_pob_choice: Debir
  chosen_spanish: Debir
  lexicon: HALOT
  rationale: Nombre propio de lugar; se mantiene transliterado. No se traduce porque funciona como topónimo en una lista de ciudades.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El marcador de objeto repetido se integra de manera natural en la coordinación española. No se representa explícitamente como partícula, porque en esta lista el español exige una formulación fluida y la relación entre ciudad y terreno asociado ya queda clara con 'con sus pastizales'.
translation_notes:
  revision_awareness: Coincide con el texto hebreo recibido y con el audit trail inglés; no se requiere revisión adicional. Se preserva la diferencia textual con 1 Crónicas mediante nota.
  spanish_consistency_notes:
  - Se mantiene 'Holón' y 'Debir' como topónimos transliterados.
  - Se evita 'suburbios' por su carga semántica moderna en español.
  - La coordinación simple 'y' reproduce de forma natural la lista hebrea con repetición de וְאֶת.
  - No hay decisiones teológicas explícitas en este versículo.
