translation:
  language: es
  text: 'Él dijo: «Ya no te regocijarás[a], oh virgen hija de Sidón, oprimida. Levántate, cruza a Kittim[b]; aun allí no tendrás descanso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ya no te alegrarás».'
    reason: lexical_alternative
  - marker: b
    text: Kittim probablemente se refiere a Chipre y, por extensión, puede evocar territorios marítimos del occidente.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - Y dijo
  - Dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se vierte naturalmente en español con el pretérito simple. Se conserva el sujeto explícito por claridad y porque el hebreo introduce la cita directa de forma marcada.
- source_word: לֹא תוֹסִיפִי עוֹד לַעְלֹז
  english_pob_choice: You will exult no more
  chosen_spanish: Ya no te alegrarás
  alternatives_spanish:
  - No seguirás alegrándote
  - Ya no exultarás
  lexicon: HALOT
  rationale: 'El hebreo expresa cesación: “no continuarás más” en relación con el regocijo. En español, “ya no” comunica bien la idea de término; “alegrarás” es más idiomático que un calco rígido, aunque “exultarás” también sería posible si se quisiera conservar más elevación léxica.'
- source_word: הַמְעֻשָּׁקָה
  english_pob_choice: oppressed
  chosen_spanish: oprimida
  alternatives_spanish:
  - afligida
  - aplastada
  - maltratada
  lexicon: HALOT
  rationale: El participio pasivo de עשׁק describe a la ciudad/personificación como objeto de opresión. “Oprimida” es la correspondencia directa y natural en español, preservando el tono profético sin añadir matices ajenos.
- source_word: בְּתוּלַת בַּת צִידוֹן
  english_pob_choice: virgin daughter of Sidon
  chosen_spanish: virgen hija de Sidón
  alternatives_spanish:
  - virgen hija de Sidón
  - doncella hija de Sidón
  - virgen, hija de Sidón
  lexicon: HALOT
  rationale: Se mantiene la personificación profética y la relación constructa. “Virgen hija de Sidón” conserva la metáfora sin paraphrasearla; “hija” reproduce la imagen ciudad/pueblo, y “virgen” mantiene la connotación de juventud e intacto esplendor que el texto utiliza irónicamente.
- source_word: כתיים
  english_pob_choice: Kittim
  chosen_spanish: Kittim
  alternatives_spanish:
  - Chipre
  lexicon: HALOT
  rationale: Se translitera el nombre propio en el texto principal, siguiendo la práctica del POB. La identificación geográfica más probable puede ir en nota, pero no sustituye el nombre en el cuerpo del texto.
- source_word: קוּמִי עֲבֹרִי
  english_pob_choice: Arise, cross over
  chosen_spanish: Levántate, pasa
  alternatives_spanish:
  - Levántate, cruza
  - Ponte en pie, atraviesa
  lexicon: HALOT
  rationale: Son dos imperativos femeninos singulares dirigidos a Sidón personificada. “Levántate, pasa” mantiene brevedad, urgencia y naturalidad en español; “pasa” conserva la noción de ir más allá o cruzar sin forzar un calco.
- source_word: גַּם שָׁם
  english_pob_choice: even there
  chosen_spanish: aun allí
  alternatives_spanish:
  - también allí
  - incluso allí
  lexicon: HALOT
  rationale: La partícula intensiva “גַּם” con “שָׁם” subraya que ni en el lugar de refugio habrá alivio. “Aun allí” transmite bien la extensión enfática y el contraste implícito.
- source_word: לֹא יָנוּחַ לָךְ
  english_pob_choice: you will find no rest
  chosen_spanish: no tendrás descanso
  alternatives_spanish:
  - no hallarás descanso
  - no descansará para ti
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma verbal masculina singular con complemento dativo, el sentido idiomático es que el reposo no estará disponible para Sidón. “No tendrás descanso” es la forma más natural y fiel en español; “hallarás” también sería posible, pero “tendrás” suena más directo y sobrio.
theological_decisions:
- issue: Personificación profética de Sidón como “virgen hija”
  english_pob_reading: virgin daughter of Sidon
  chosen_spanish_reading: virgen hija de Sidón
  alternative_spanish_readings:
  - doncella de Sidón
  - hija virgen de Sidón
  rationale: El texto usa una imagen poética y profética para la ciudad, no un dato literal sobre virginidad. Mantener “virgen hija” preserva la figura retórica y el tono de juicio sin normalizarla o suavizarla.
  doctrine_reference: Isaías 23:12; personificación profética y lenguaje oracular
- issue: Destino de huida sin reposo
  english_pob_reading: you will find no rest
  chosen_spanish_reading: no tendrás descanso
  alternative_spanish_readings:
  - no hallarás descanso
  - no habrá descanso para ti
  rationale: La idea teológica/retórica central es la imposibilidad de escapar del juicio divino mediante traslado geográfico. “No tendrás descanso” comunica esa negación total de alivio sin introducir una interpretación excesiva.
  doctrine_reference: Isaías 23:12; tema del juicio ineludible
translation_notes:
  revision_awareness: 'Se siguió el consenso alto del audit trail inglés sin cambios sustantivos: se conservaron la personificación profética, el nombre propio Kittim y la idea de cese del gozo con equivalencia natural en español. No hubo revisiones aplicadas en el expediente inglés reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo tiene el nombre divino; este versículo no lo contiene.
  - Se prefirió «Kittim» transliterado en el texto, con identificación geográfica en nota, para mantener la forma del nombre propio.
  - Se conservó el tono profético y la imagen de ciudad personificada sin expandir el sentido más allá del hebreo.
  - «Descanso» se eligió para reflejar נוּחַ en contexto idiomático, no como simple quietud física.
