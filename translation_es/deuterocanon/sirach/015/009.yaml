translation:
  language: es
  text: La alabanza no es apropiada en boca de un hombre malvado[a], porque no le ha sido asignada por Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «porque no fue enviada por Yahvé». El hebreo dice más literalmente: «porque no le ha sido asignada por Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא נָאֲתָה
  english_pob_choice: is not fitting
  chosen_spanish: no es apropiada
  alternatives_spanish:
  - no es conveniente
  - no es adecuada
  - no es bella
  lexicon: HALOT
  rationale: El hebreo expresa conveniencia o idoneidad, no mera belleza estética. En español, «no es apropiada» comunica con naturalidad esa idea de pertinencia moral y social, sin perder el matiz de decoro que también sugiere el paralelo griego.
- source_word: תְהִלָּה
  english_pob_choice: Praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - praise
  - elogio
  - canto de alabanza
  lexicon: HALOT
  rationale: El sustantivo designa alabanza en general. «Alabanza» es el equivalente natural y digno en español; evita restringir el sentido a un canto o himno, lo cual no exige el contexto.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en los labios de
  - de la boca de
  lexicon: HALOT
  rationale: Conserva la imagen corporal concreta del hebreo y del griego ἐν στόματι. «En la boca de» es idiomático en español y mantiene la fuerza figurada del dicho.
- source_word: רָשָׂע
  english_pob_choice: wicked man
  chosen_spanish: un hombre malvado
  alternatives_spanish:
  - un malvado
  - un impío
  - un pecador
  lexicon: HALOT
  rationale: El hebreo es singular masculino; se conserva esa precisión. «Malvado» transmite la carga moral de רָשָׁע mejor que opciones más genéricas, y distingue este término del griego paralelo ἁμαρτωλοῦ («pecador»).
- source_word: נֶחְלְקָה לּוֹ
  english_pob_choice: has not been allotted to him
  chosen_spanish: no le ha sido asignada
  alternatives_spanish:
  - no le ha sido repartida
  - no le ha sido concedida
  - no le ha correspondido
  lexicon: HALOT
  rationale: El hebreo comunica reparto/apropiación de una porción; «asignada» preserva la idea de una asignación debida o correspondiente. En español suena más natural que una traducción demasiado literal de «allot», sin borrar la noción de que la alabanza no le pertenece como parte suya.
- source_word: מֵאֵל
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de Dios
  - desde Dios
  - por parte de Dios
  lexicon: HALOT
  rationale: La revisión inglesa prefirió la agencia divina más natural en pasiva («by God»). En español, «por Dios» expresa esa agencia con claridad y mantiene la relación causal sin oscurecer el hebreo/greek source.
theological_decisions:
- issue: Relación entre el hebreo y el paralelo griego en la segunda cola
  english_pob_reading: Follow the Hebrew sense 'it has not been allotted to him by God' in the main text, with the Greek 'sent from the Lord' preserved in a note.
  chosen_spanish_reading: 'Seguir el sentido hebreo en el texto principal: «no le ha sido asignada por Dios».'
  alternative_spanish_readings:
  - «no ha sido enviada por el Señor»
  - «no le ha sido enviada por Yahvé»
  rationale: El hebreo conservado es el testimonio principal de alta confianza para este versículo y usa la imagen de asignación/reparto. El griego paralelo ofrece una formulación distinta («no fue enviada del Señor»), que se preserva como lectura alternativa para transparencia, sin desplazar la prioridad del hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo cuando el hebreo sobrevive; usar el paralelo griego como testimonio auditado, no como sustituto automático.'
translation_notes:
  revision_awareness: Esta redacción sigue la revisión final del audit trail, que prefirió una agencia divina más natural en la segunda cola («por Dios»). Se mantiene la primacía del hebreo en el cuerpo del texto y se conserva en la nota la alternativa griega para la transparencia textual requerida por el proyecto.
  spanish_consistency_notes:
  - Se usa «alabanza» para תְהִלָּה, en coherencia con el léxico bíblico español y con el registro solemne del texto.
  - Se evita «SEÑOR» como máscara del nombre divino; dado que aquí el hebreo dice אֵל y el griego Κυρίου, la traducción principal usa «Dios» y la nota preserva la variante griega «el Señor».
  - «No es apropiada» mantiene el valor de conveniencia/fittingness sin volver la frase demasiado arcaica o rígida.
  - «Hombre malvado» conserva el singular masculino del hebreo y la fuerza moral del término sin introducir una generalización no requerida por el contexto.
