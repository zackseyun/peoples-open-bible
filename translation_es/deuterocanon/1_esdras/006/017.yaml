translation:
  language: es
  text: Y los vasos sagrados, los de oro y los de plata, que Nabucodonosor había sacado de la casa en Jerusalén y había depositado en su propio templo, Ciro el rey los sacó otra vez del templo de Babilonia, y fueron entregados a Zorobabel y a Sanabassar[a], el gobernador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Σαβανασσάρ; probablemente corresponde al nombre que en Esdras suele aparecer como «Sheshbazzar».
    reason: alternative_reading
lexical_decisions:
- source_word: ἱερὰ σκεύη
  english_pob_choice: holy vessels
  chosen_spanish: vasos sagrados
  alternatives_spanish:
  - vasos santos
  - utensilios sagrados
  - vasos del santuario
  lexicon: LSJ
  rationale: σκεύη son objetos/vasos, y ἱερά expresa su carácter consagrado. «Vasos sagrados» conserva la fuerza cultual sin forzar un término más técnico que el griego no exige.
- source_word: τὰ χρυσᾶ καὶ τὰ ἀργυρᾶ
  english_pob_choice: the gold and the silver ones
  chosen_spanish: los de oro y los de plata
  alternatives_spanish:
  - los vasos de oro y plata
  - los vasos dorados y de plata
  - los de oro y plata
  lexicon: LSJ
  rationale: Los adjetivos están sustantivados y retoman a σκεύη. En español, «los de oro y los de plata» preserva esa referencia sin recargar la frase.
- source_word: ἐξήνεγκεν
  english_pob_choice: had carried out / brought out
  chosen_spanish: había sacado / sacó otra vez
  alternatives_spanish:
  - había llevado fuera / volvió a sacar
  - había sacado / volvió a sacar
  - había extraído / extrajo nuevamente
  lexicon: LSJ
  rationale: El verbo significa sacar o traer fuera. Se usa pluscuamperfecto para Nabucodonosor y pretérito para Ciro, reflejando el orden narrativo del griego.
- source_word: οἴκου τοῦ ἐν Ἰερουσαλήμ
  english_pob_choice: the house in Jerusalem
  chosen_spanish: la casa de Jerusalén
  alternatives_spanish:
  - la casa que estaba en Jerusalén
  - el templo en Jerusalén
  - la casa de la que estaba en Jerusalén
  lexicon: LSJ
  rationale: Se mantiene «casa» para respetar la distinción léxica con ναός en la segunda mitad del versículo. El contexto cultual hace inteligible que se trata del santuario de Jerusalén.
- source_word: ἀπηρείσατο
  english_pob_choice: deposited
  chosen_spanish: había depositado
  alternatives_spanish:
  - había colocado
  - había puesto
  - había almacenado
  lexicon: LSJ
  rationale: El sentido es colocar o consignar en un lugar sagrado/administrativo. «Depositar» comunica esa acción formal con claridad en español.
- source_word: ἐν τῷ αὐτοῦ ναῷ
  english_pob_choice: in his own temple
  chosen_spanish: en su propio templo
  alternatives_spanish:
  - en su templo
  - en su santuario
  - en el templo de su dios
  lexicon: LSJ
  rationale: «Su propio templo» conserva el contraste posesivo del griego y evita añadir una especificación sobre la divinidad que el texto no formula explícitamente.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  - otra vez más
  lexicon: LSJ
  rationale: Marca reversión/restauración. «Otra vez» es natural en español y mantiene la repetición enfática del original.
- source_word: τοῦ ναοῦ τοῦ ἐν Βαβυλωνίᾳ
  english_pob_choice: the temple in Babylon
  chosen_spanish: del templo de Babilonia
  alternatives_spanish:
  - del templo que estaba en Babilonia
  - del templo en Babilonia
  - del santuario de Babilonia
  lexicon: LSJ
  rationale: ναός se traduce como «templo». «De Babilonia» resulta idiomático en español y mantiene el lugar del recinto sin perder el contraste con «casa».
- source_word: παρεδόθη
  english_pob_choice: they were handed over
  chosen_spanish: fueron entregados
  alternatives_spanish:
  - les fueron entregados
  - fueron puestos en manos de
  - fueron confiados
  lexicon: LSJ
  rationale: El pasivo indica transferencia formal de custodia. «Fueron entregados» es directo y conserva el matiz administrativo.
- source_word: Ζοροβαβὲλ
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubbabel
  - Zorobabel
  lexicon: transliteration
  rationale: Se usa la transliteración habitual en español bíblico para este nombre, manteniendo reconocibilidad sin depender de la forma inglesa.
- source_word: Σαβανασσάρῳ
  english_pob_choice: Sanabassar
  chosen_spanish: Sanabassar
  alternatives_spanish:
  - Sananassar
  - Sheshbazzar
  - Sabanassar
  lexicon: transliteration
  rationale: Se sigue la forma griega como base primaria en 1 Esdras. La alternativa tradicional se preserva en nota para no borrar la tensión nominal del testimonio paralelo.
- source_word: τῷ ἐπάρχῳ
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el prefecto
  - el sátrapa
  - el administrador provincial
  lexicon: LSJ
  rationale: ἔπαρχος corresponde a un oficial gobernante; «gobernador» es la equivalencia más natural y clara en español contemporáneo.
theological_decisions:
- issue: Distinción entre οἶκος y ναός en el versículo
  english_pob_reading: Translate οἶκος as 'house' for Jerusalem and ναός as 'temple' for Babylon
  chosen_spanish_reading: Traducir οἶκος como «casa» y ναός como «templo»
  alternative_spanish_readings:
  - Traducir ambos como «templo» para mayor fluidez
  - Traducir ambos como «casa» para uniformidad
  rationale: El griego distingue dos términos y el POB inglés preserva esa diferencia. En español, mantener «casa» frente a «templo» evita nivelar el léxico y deja visible la diferencia de registro del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 5
- issue: Identificación del nombre Σαβανασσάρῳ
  english_pob_reading: Use 'Sanabassar' in the main text, with 'Sheshbazzar' preserved in a footnote
  chosen_spanish_reading: Usar «Sanabassar» en el texto principal y preservar «Sheshbazzar» en nota
  alternative_spanish_readings:
  - Poner «Sheshbazzar» en el texto principal
  - Unificar el nombre con la forma de Esdras
  rationale: La fuente primaria aquí es el griego de 1 Esdras, por lo que la transliteración debe seguir ese testimonio. La nota conserva la identificación tradicional sin borrar la variante textual.
  doctrine_reference: DOCTRINE.md § Translation philosophy 2, 3
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del texto griego principal y del paralelo semítico: se mantuvo la distinción οἶκος/ναός, se respetó la secuencia verbal con pluscuamperfecto + pretérito, y se preservó la forma griega del nombre Σαβανασσάρῳ en el texto principal.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Casa» se reserva para οἶκος y «templo» para ναός, de modo consistente con el criterio auditado.
  - «Sanabassar» sigue la transliteración griega; la nota cubre la identificación tradicional.
  - «Vasos sagrados» mantiene el valor cultual de ἱερά sin introducir una paráfrasis más amplia.
