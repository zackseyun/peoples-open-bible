translation:
  language: es
  text: 'Y dijo David: «Mostraré bondad[a] a Hanún hijo de Nahás, como su padre me mostró bondad». Y David envió por medio de sus siervos para consolarlo[b] por su padre; y los siervos de David llegaron a la tierra de los amonitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «benevolencia» o «lealtad». El hebreo חֶסֶד aquí expresa bondad leal o favor benevolente en un contexto diplomático, no principalmente misericordia compasiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acerca de su padre». La expresión hebrea probablemente se refiere a ofrecer condolencias por la muerte de su padre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶסֶד
  english_pob_choice: kindness
  chosen_spanish: misericordia
  alternatives_spanish:
  - bondad
  - bondadosidad
  - lealtad
  lexicon: HALOT
  rationale: En este contexto diplomático, חֶסֶד expresa un acto benevolente y relacional entre David y Hanún. 'Misericordia' conserva dignidad y amplitud semántica en español bíblico sin reducir el término a una mera cortesía social. También permite reflejar ambos usos de la palabra en el versículo.
- source_word: עִם
  english_pob_choice: to
  chosen_spanish: con
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: El hebreo usa עִם literalmente 'con'; en español, 'hacer misericordia con alguien' es natural y mantiene la relación interpersonal del texto mejor que forzar una construcción con 'a' o 'para'.
- source_word: חָנ֣וּן בֶּן נָחָ֗שׁ
  english_pob_choice: Hanun son of Nahash
  chosen_spanish: Hanún hijo de Nahás
  alternatives_spanish:
  - Hanún, hijo de Nahás
  lexicon: convención onomástica bíblica
  rationale: Se transliteran los nombres propios según uso hispano bíblico. 'Hijo de' preserva la relación filial explícita del hebreo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: '''Como'' expresa la comparación de forma simple y natural en español, sin añadir intensidad interpretativa no requerida por el hebreo.'
- source_word: עָשָׂה ... חֶסֶד
  english_pob_choice: showed kindness
  chosen_spanish: hizo misericordia
  alternatives_spanish:
  - mostró misericordia
  - actuó con misericordia
  lexicon: HALOT
  rationale: El hebreo literal 'hacer חֶסֶד' puede mantenerse en español con 'hacer misericordia', que conserva la estructura verbal del original. Aunque menos idiomático que 'mostró misericordia', evita suavizar la fórmula y deja visible el paralelismo del versículo.
- source_word: לְנַחֲמוֹ
  english_pob_choice: to comfort him
  chosen_spanish: para consolarlo
  alternatives_spanish:
  - para confortarlo
  - para darle consuelo
  lexicon: HALOT
  rationale: '''Consolar'' reproduce bien נחם en el contexto de duelo. Se conserva la finalidad del envío sin extender el sentido más allá de lo que el pasaje permite.'
- source_word: אֶל אָבִיו
  english_pob_choice: concerning his father
  chosen_spanish: acerca de su padre
  alternatives_spanish:
  - sobre su padre
  - por su padre
  lexicon: HALOT
  rationale: La expresión hebrea indica el motivo o el asunto de la consolación, probablemente en relación con la muerte del padre. 'Acerca de su padre' mantiene esa relación sin especificar más de lo que el texto evidencia.
- source_word: בְּיַד עֲבָדָיו
  english_pob_choice: by the hand of his servants
  chosen_spanish: por mano de sus siervos
  alternatives_spanish:
  - por medio de sus siervos
  - en manos de sus siervos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de agencia mediante 'por mano de'. 'Siervos' mantiene el término tradicional bíblico para עֲבָדִים, aunque 'esclavos' sería la opción más estricta léxicamente; aquí el contexto cortesano y diplomático favorece 'siervos' para evitar una dureza innecesaria en español.
- source_word: עַבְדֵי דָוִד
  english_pob_choice: David’s servants
  chosen_spanish: los siervos de David
  alternatives_spanish:
  - los servidores de David
  - los esclavos de David
  lexicon: HALOT
  rationale: Se mantiene la misma elección terminológica para coherencia interna. 'Siervos' suena natural en registros bíblicos y conserva el vínculo de dependencia sin imponer una lectura social más fuerte que la que el contexto inmediato requiere.
- source_word: אֶרֶץ בְּנֵי עַמּוֹן
  english_pob_choice: the land of the Ammonites
  chosen_spanish: la tierra de los hijos de Amón
  alternatives_spanish:
  - la tierra de los amonitas
  - el país de los amonitas
  lexicon: convención bíblica
  rationale: Se conserva el etnónimo semítico 'hijos de Amón' para reflejar con mayor transparencia la forma del hebreo בני עמון. En español bíblico es claro y evita transformar el nombre colectivo en un gentilicio más interpretativo.
theological_decisions:
- issue: Sentido de חֶסֶד en un contexto político-diplomático
  english_pob_reading: kindness rather than covenantal 'steadfast love'
  chosen_spanish_reading: misericordia / hacer misericordia
  alternative_spanish_readings:
  - bondad
  - lealtad pactal
  - amor constante
  rationale: El pasaje describe reciprocidad de trato entre reyes y sus casas; no exige limitar חֶסֶד a 'amor pactal', pero tampoco reducirlo a simple amabilidad superficial. 'Misericordia' mantiene amplitud, seriedad moral y posibilidad de reciprocidad diplomática.
  doctrine_reference: Uso léxico-contextual de חֶסֶד en narrativas históricas; no introduce una afirmación doctrinal específica.
- issue: Naturaleza de לְנַחֲמוֹ אֶל אָבִיו
  english_pob_reading: to comfort him concerning his father
  chosen_spanish_reading: para consolarlo acerca de su padre
  alternative_spanish_readings:
  - para darle el pésame por su padre
  - para consolarlo por la muerte de su padre
  rationale: El contexto sugiere condolencia por el padre de Hanún, pero el hebreo no explicita directamente 'muerte' en la frase misma. 'Acerca de su padre' deja visible esa relación y evita sobreespecificar más allá del texto.
  doctrine_reference: Principio de cautela exegética y respeto por la ambigüedad contextual.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial auditado en inglés: la revisión final restauró la fuerza de בְּיַד עֲבָדָיו con una formulación más explícita de agencia (''by the hand of his servants''). La versión española conserva esa imagen con ''por mano de sus siervos''. También se mantuvo la equivalencia óptima para לְנַחֲמוֹ/אֶל אָבִיו, siguiendo la nota inglesa sobre la posible referencia a condolencias por duelo sin convertirla en una paráfrasis cerrada.'
  spanish_consistency_notes:
  - Se mantuvo 'siervos' para traducir עֲבָדִים de forma coherente con el registro bíblico y con la decisión de no colapsar el matiz relacional en un término puramente doméstico.
  - Se preservó la secuencia verbal hebrea con 'hizo misericordia' y 'por mano de sus siervos' para que el lector pueda rastrear el paralelismo y la agencia del original.
  - '''Hijos de Amón'' conserva la estructura étnica del hebreo donde el inglés POB usa ''Ammonites''; en español resulta claro y más cercano al texto fuente.'
