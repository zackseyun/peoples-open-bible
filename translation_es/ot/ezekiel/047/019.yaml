  text: וּ/פְאַת֙ נֶ֣גֶב תֵּימָ֔נָ/ה מִ/תָּמָ֗ר עַד מֵי֙ מְרִיב֣וֹת קָדֵ֔שׁ נַחֲלָ֖ה אֶל הַ/יָּ֣ם הַ/גָּד֑וֹל וְ/אֵ֥ת פְּאַת תֵּימָ֖נָ/ה נֶֽגְבָּ/ה־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/047/019.yaml
  text: And the south side[a], southward, shall be from Tamar to the waters of Meriboth-kadesh, to the wadi, to the Great Sea. This is the south side[c][b], southward.
  footnotes:
  - marker: a
    text: Or, 'the waters of Meribah-kadesh.' The Hebrew here reads 'Meriboth-kadesh,' a related place-name form.
    reason: alternative_reading
  - marker: b
    text: Or, 'wadi'; the Hebrew term refers to a streambed or watercourse, often seasonal.
    reason: lexical_alternative
  - marker: c
    text: That is, the Mediterranean Sea.
    reason: cultural_note
