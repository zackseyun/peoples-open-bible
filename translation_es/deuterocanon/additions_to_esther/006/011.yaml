translation:
  language: es
  text: En el cuarto año del reinado de Ptolomeo y Cleopatra, Dosíteo, que dijo ser sacerdote y levita, y Ptolomeo su hijo, trajo la carta que sigue sobre Purim[a], la cual dijeron también que existía y que había sido traducida por Lisímaco hijo de Ptolomeo, uno de los de Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «de los Phrouraia», la designación griega usada aquí para la fiesta judía de Purim.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la cual dijeron que existía y que había sido traducida por Lisímaco hijo de Ptolomeo». El griego es breve y puede subrayar la existencia o disponibilidad del documento más que su autenticidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔτους τετάρτου
  english_pob_choice: In the fourth year
  chosen_spanish: En el cuarto año
  alternatives_spanish:
  - En el año cuarto
  lexicon: LSJ
  rationale: La fórmula cronológica se vierte de manera natural en español sin perder el valor dativo/genitivo temporal del griego.
- source_word: Βασιλεύοντος
  english_pob_choice: of the reign of
  chosen_spanish: del reinado de
  alternatives_spanish:
  - mientras reinaban
  - cuando reinaba
  lexicon: LSJ
  rationale: En una datación formal, 'del reinado de' conserva el valor temporal y documental del participio sin forzar una construcción más interpretativa.
- source_word: Πτολεμαίου καὶ Κλεοπάτρας
  english_pob_choice: Ptolemy and Cleopatra
  chosen_spanish: Ptolomeo y Cleopatra
  alternatives_spanish:
  - Tolomeo y Cleopatra
  lexicon: LSJ
  rationale: Son nombres propios transliterados; se mantiene la forma más reconocible en español bíblico y académico.
- source_word: εἰσήνεγκεν
  english_pob_choice: brought in
  chosen_spanish: presentó
  alternatives_spanish:
  - trajo
  - introdujo
  - sometió
  lexicon: LSJ
  rationale: En un colofón o nota documental, 'presentó' comunica la acción de introducir formalmente un escrito en español natural, sin añadir burocracia ajena al griego.
- source_word: ὃς ἔφη εἶναι
  english_pob_choice: who said that he was
  chosen_spanish: que dijo ser
  alternatives_spanish:
  - que dijo que era
  - que afirmó ser
  lexicon: LSJ
  rationale: '''Dijo ser'' conserva la neutralidad del griego, evitando una sospecha explícita que el texto no exige.'
- source_word: ἱερεὺς καὶ Λευείτης
  english_pob_choice: a priest and a Levite
  chosen_spanish: sacerdote y levita
  alternatives_spanish:
  - sacerdote y un levita
  - sacerdote, es decir, levita
  lexicon: LSJ
  rationale: El griego coordina ambos sustantivos; el español puede omitir artículos para mantener la misma coordinación compacta y sonora.
- source_word: τὴν προκειμένην ἐπιστολήν
  english_pob_choice: the following letter
  chosen_spanish: la carta que sigue
  alternatives_spanish:
  - la carta presente
  - la carta antes mencionada
  lexicon: LSJ
  rationale: '''Que sigue'' refleja bien el valor de προκειμένην como texto puesto delante del lector, con un español claro y directo.'
- source_word: τῶν Φρουραίων
  english_pob_choice: concerning Purim
  chosen_spanish: sobre Purim
  alternatives_spanish:
  - de Purim
  - acerca de Purim
  - del Phrouraia
  lexicon: LSJ
  rationale: Se traduce por el referente de la fiesta judía, siguiendo la decisión POB de no transliterar el helenismo cuando el referente es claro, pero sin añadir 'fiesta' al cuerpo del texto.
- source_word: ἣν ἔφασαν εἶναι
  english_pob_choice: which they said also existed
  chosen_spanish: la cual dijeron también que existía
  alternatives_spanish:
  - la cual dijeron que era auténtica
  - la cual dijeron que estaba disponible
  lexicon: LSJ
  rationale: '''Existía'' conserva la ambigüedad mínima del griego: existencia/disponibilidad del documento, sin importar una valoración de autenticidad.'
- source_word: καὶ ἑρμηνευκέναι
  english_pob_choice: and had been translated
  chosen_spanish: y que había sido traducida
  alternatives_spanish:
  - y que había sido interpretada
  - y que había sido vertida
  lexicon: LSJ
  rationale: En contexto documental, 'traducida' es la equivalencia más probable para ἑρμηνεύω, y coincide con la lectura auditada del POB inglés.
- source_word: Λυσίμαχον Πτολεμαίου
  english_pob_choice: Lysimachus son of Ptolemy
  chosen_spanish: Lisímaco hijo de Ptolomeo
  alternatives_spanish:
  - Lisímaco, hijo de Ptolomeo
  - Lisímaco de Ptolomeo
  lexicon: LSJ
  rationale: La relación genitiva se expresa con 'hijo de' por ser la forma más clara y natural en español.
- source_word: τῶν ἐν Ἰερουσαλήμ
  english_pob_choice: one of those in Jerusalem
  chosen_spanish: uno de los de Jerusalén
  alternatives_spanish:
  - uno de los que estaban en Jerusalén
  - de los que están en Jerusalén
  lexicon: LSJ
  rationale: Se preserva la construcción partitiva del griego con una fórmula española equivalente y sobria.
theological_decisions:
- issue: Tono de ὃς ἔφη εἶναι (afirmación neutral o dudosa)
  english_pob_reading: who said that he was
  chosen_spanish_reading: que dijo ser
  alternative_spanish_readings:
  - que afirmó ser
  - que pretendía ser
  rationale: El texto funciona como nota histórica de transmisión y no introduce por sí mismo una acusación. 'Dijo ser' mantiene la neutralidad del original y de la lectura POB.
  doctrine_reference: Translation philosophy §1, §3
- issue: Τῶν Φρουραίων como nombre helenizado de Purim
  english_pob_reading: concerning Purim
  chosen_spanish_reading: sobre Purim
  alternative_spanish_readings:
  - de Purim
  - del Phrouraia
  rationale: La referencia apunta a la fiesta judía conocida como Purim. En el cuerpo principal se privilegia la inteligibilidad; el helenismo queda auditado en nota.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que ajustó la referencia de τῶν Φρουραίων de una formulación más explicativa a 'concerning Purim' para no añadir 'festival' al cuerpo del texto. También se mantuvo la lectura neutral de ἔφη y la descripción documental de la carta como existente y traducida.
  spanish_consistency_notes:
  - Se mantiene 'Ptolomeo' como transliteración uniforme del nombre propio.
  - Se usa 'sacerdote y levita' sin artículo repetido, en paralelo con la última revisión inglesa.
  - '''Purim'' se conserva como nombre de la festividad en el texto principal, con la designación griega explicada en nota.'
  - '''Lisímaco hijo de Ptolomeo'' sigue la forma genealógica clara y consistente con el resto del corpus.'
  - La puntuación y el orden responden a un español bíblico moderno, no a una calca del inglés.
