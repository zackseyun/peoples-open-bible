review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la mayor parte del hebreo: «volvieron a Yahvé, el Dios de Israel, y lo buscaron» refleja fielmente וַיָּשָׁב … עַל יְהוָה … וַיְבַקְשֻׁהוּ. También es aceptable mantener el singular colectivo en «en su angustia» con nota. Sin embargo, la cláusula final invierte el referente: וַיִּמָּצֵא לָהֶם significa «él fue hallado por ellos / se dejó hallar por ellos», refiriéndose a Dios, no «fueron hallados por ellos».'
  spanish_quality_summary: 'El español es claro y digno en general, pero «fueron hallados por ellos» es gramaticalmente correcto y semánticamente equivocado. Además, la nota b está mal anclada conceptualmente: el texto principal ya dice «lo buscaron», pero la alternativa relevante pertenece a la cláusula final. Conviene mover la marca a «hallado» y expresar la pasiva correctamente. «Hallado» suena algo más bíblico; «encontrado» sería más común, pero «hallado» sigue siendo natural y cercano al registro del proyecto.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé», אֱלֹהֵי יִשְׂרָאֵל -> «el Dios de Israel». No hay conflicto con otras políticas léxicas. La corrección necesaria no afecta la glosa principal, sino la sintaxis y el referente de וַיִּמָּצֵא לָהֶם.'
  issues:
  - severity: high
    issue: 'La cláusula final invierte sujeto y objeto: «fueron hallados por ellos».'
    rationale: El hebreo וַיִּמָּצֵא לָהֶם tiene como sujeto singular implícito a Dios («él fue hallado por ellos»), no a Israel o a un sujeto plural. La versión actual altera el sentido del versículo.
  - severity: medium
    issue: La nota b está colocada en «lo buscaron» aunque su contenido corresponde a la cláusula final.
    rationale: 'La nota dice «O: “fue hallado por ellos”», que no es alternativa de «lo buscaron», sino de la frase final. Debe anclarse donde aparece «hallado/encontrado».'
  - severity: low
    issue: La nota a podría expresarse con más precisión.
    rationale: Conviene aclarar que el singular hebreo se entiende colectivamente de Israel, en vez de solo decir que el contexto habla de Israel de manera colectiva.
  revised_spanish_text: Pero en su angustia[a] volvieron a Yahvé, el Dios de Israel, y lo buscaron, y él fue hallado[b] por ellos.
  revised_footnotes:
