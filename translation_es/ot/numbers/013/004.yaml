lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: And these
  chosen_spanish: Y estos
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: Se conserva la continuidad narrativa del ו inicial con «Y», y el demostrativo plural se vierte naturalmente como «estos» en español.
- source_word: שְׁמוֹתָם
  english_pob_choice: were their names
  chosen_spanish: eran sus nombres
  alternatives_spanish:
  - sus nombres
  - los nombres eran
  lexicon: HALOT
  rationale: El hebreo funciona como encabezado de lista; en español, «eran sus nombres» reproduce de manera natural ese valor copulativo sin perder el sentido literal de «sus nombres».
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de parte de la tribu de
  - perteneciente a la tribu de
  lexicon: HALOT
  rationale: En este contexto de enumeración tribal, לְמַטֵּה señala pertenencia/adscripción tribal. «De la tribu de» es la forma más natural y fiel en español.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  lexicon: HALOT
  rationale: Se adopta la forma bíblica usual en español «Rubén», que es clara y reconocible para lectores de iglesia.
- source_word: שַׁמּוּעַ
  english_pob_choice: Shammua
  chosen_spanish: Samúa
  alternatives_spanish:
  - Samuá
  - Shammúa
  lexicon: HALOT
  rationale: El nombre se translitera a la forma castellana tradicional y eufónica «Samúa», manteniendo el valor de nombre propio sin traducirlo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La relación genealógica בן se expresa de forma estándar y natural en español como «hijo de».
- source_word: זַכּוּר
  english_pob_choice: Zaccur
  chosen_spanish: Zaccur
  alternatives_spanish:
  - Zacur
  lexicon: HALOT
  rationale: Se preserva el nombre propio en transliteración bíblica habitual, sin intentar traducirlo.
