revisions:
- from: Pastoreando el rebaño de Yahvé[a] en fidelidad y justicia[b], no permitirá que ninguno de ellos se debilite en su pasto[c].
  to: Pastoreando el rebaño de Yahvé[a] en fidelidad y justicia[b], no permitirá que ninguno de ellos se debilite en su pastura[c].
  rationale: Se conserva la traducción principal casi intacta, pero se cambia 'pasto' por 'pastura' para mejorar la naturalidad y la precisión de la imagen pastoral. También se corrigen las notas para que distingan adecuadamente las expresiones griegas y expliquen con más precisión la decisión 'Yahvé'.
