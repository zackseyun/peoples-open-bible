    issue: La distinción onomástica hebrea יְהוֹאָשׁ / יוֹאָשׁ no está reflejada en el texto español.
    rationale: El borrador pone 'Joás' en ambas apariciones, pero la nota afirma que se reflejan ambas formas. El rastro auditado inglés preserva explícitamente la diferencia, y en español puede hacerse naturalmente con 'Jehoás' al inicio y 'Joás' al final.
  - severity: medium
    issue: '''Lo hirió'' estrecha demasiado el sentido de הִכָּהוּ en contexto militar.'
    rationale: 'נכה aquí puede significar golpear/derrotar en combate. ''Hirió'' sugiere una lesión corporal específica y no expresa tan bien la idea de derrota militar repetida. ''Lo derrotó'' en el texto, con nota ''O: lo golpeó'', se ajusta mejor al contexto y a la nota auditada.'
  - severity: low
    issue: La nota a explica bien la diferencia formal, pero queda desmentida por el texto actual.
    rationale: Una vez corregido el texto a 'Jehoás ... Joás', la nota vuelve a ser veraz y útil.
