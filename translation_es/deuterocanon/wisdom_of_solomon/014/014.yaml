translation:
  language: es
  text: Pues por la vanidad humana entró en el mundo[a][b], y por eso les fue ideado un fin breve[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto de «entró» no está expresado en griego; el contexto apunta al surgimiento de la idolatría o de los ídolos.
    reason: alternative_reading
  - marker: b
    text: También puede entenderse como «vanagloria humana»; el griego κενοδοξίᾳ denota gloria vacía o autoexaltación sin contenido.
    reason: lexical_alternative
  - marker: c
    text: La voz pasiva no nombra quién les ideó ese fin breve.
    reason: alternative_reading
lexical_decisions:
- source_word: κενοδοξίᾳ
  english_pob_choice: through human vanity
  chosen_spanish: por la vanidad humana
  alternatives_spanish:
  - por la vanagloria humana
  - por la vacía gloria humana
  - por el orgullo humano
  lexicon: LSJ
  rationale: El dativo expresa medio o causa. «Vanidad» conserva bien la idea de gloria vacía o autoexaltación sin introducir un término más fuerte de lo que el griego exige. «Vanagloria» también sería posible, pero en español puede sonar más literaria o menos transparente para una lectura pública amplia.
- source_word: ἀνθρώπων
  english_pob_choice: human
  chosen_spanish: humana
  alternatives_spanish:
  - de los hombres
  - de la gente
  lexicon: LSJ
  rationale: El genitivo califica a κενοδοξίᾳ. «Humana» mantiene el valor genérico y evita el masculino tradicional «de los hombres», que en español contemporáneo puede sonar menos claro o más limitado.
- source_word: εἰσῆλθεν
  english_pob_choice: it entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró ella
  - entró eso
  - ingresó
  lexicon: LSJ
  rationale: El verbo griego es singular y el sujeto está implícito por el contexto. En español, el sujeto puede quedar igualmente implícito; por eso se traduce simplemente «entró», sin forzar un pronombre que no aparece en el original.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra
  lexicon: LSJ
  rationale: «Mundo» es la correspondencia natural de κόσμος aquí y conserva la amplitud del término para el orden humano en el que entra la idolatría.
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_spanish: y por eso
  alternatives_spanish:
  - por esta causa
  - por lo cual
  - por esta razón
  lexicon: LSJ
  rationale: La expresión introduce consecuencia causal. «Y por eso» mantiene esa relación de modo claro y fluido en español, sin perder la conexión con el hecho anterior.
- source_word: σύντομον
  english_pob_choice: to be brief
  chosen_spanish: breve
  alternatives_spanish:
  - corto
  - de poca duración
  - rápido
  lexicon: LSJ
  rationale: Con τέλος, σύντομον indica brevedad temporal. En español, «breve» funciona bien como predicativo y conserva la idea de duración reducida sin cargar el texto con explicaciones.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de ellas
  - su propio
  lexicon: LSJ
  rationale: El pronombre apunta al referente plural implícito del contexto. En español, el posesivo singular «su» puede referirse naturalmente a un antecedente plural cuando el sentido ya está claro, y evita una formulación pesada.
- source_word: τέλος
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - final
  - término
  - desenlace
  lexicon: LSJ
  rationale: «Fin» es la equivalencia más natural y fiel en este contexto de término o conclusión designada. «Desenlace» sería más interpretativo y «término» suena menos idiomático aquí.
- source_word: ἐπενόηθη
  english_pob_choice: was devised
  chosen_spanish: se ideó
  alternatives_spanish:
  - fue ideado
  - fue planeado
  - se dispuso
  lexicon: LSJ
  rationale: El pasivo no nombra al agente. El giro impersonal-reflexivo «se ideó» preserva esa indeterminación en español y evita introducir una agencia explícita que el texto griego no da.
theological_decisions:
- issue: Sujeto implícito de εἰσῆλθεν
  english_pob_reading: The subject is implied from context and refers to the rise of idols or idolatry; English supplies 'it.'
  chosen_spanish_reading: El sujeto queda implícito en español, como en el griego; el contexto inmediato identifica el referente sin necesidad de nombrarlo en la traducción principal.
  alternative_spanish_readings:
  - entró la idolatría en el mundo
  - entraron los ídolos en el mundo
  rationale: El griego no expresa el sujeto. El español permite mantener esa misma indeterminación. Nombrarlo en el texto principal podría fijar una interpretación contextual válida, pero más explícita de lo que la frase sola dice.
  doctrine_reference: Preservar la tensión contextual sin resolverla artificialmente.
- issue: Agente del pasivo ἐπενόηθη
  english_pob_reading: The passive 'was devised' does not explicitly name who devised their brief end.
  chosen_spanish_reading: 'Se conserva un pasivo/impersonal equivalente: «se ideó que su fin fuera breve», sin nombrar al agente.'
  alternative_spanish_readings:
  - fue ideado su fin breve
  - Dios ideó que su fin fuera breve
  - fue determinado que su fin fuera breve
  rationale: El griego no identifica al agente. La traducción principal evita introducir a Dios o cualquier otro agente, manteniendo la pasividad e indefinición del original.
  doctrine_reference: No importar afirmaciones doctrinales que el texto no formula explícitamente.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del expediente al reflejar διὰ con genitivo como causal/instrumental («por la vanidad humana») y mantiene el valor pasivo de ἐπενόηθη sin especificar agente. Se ha respetado también la ambigüedad contextual del sujeto implícito.
  spanish_consistency_notes:
  - Se prefirió «vanidad» como término base por su relación directa con κενοδοξία; se dejó constancia de «vanagloria» como alternativa.
  - Se evitó el tradicionalismo eclesiástico «SEÑOR» o fórmulas análogas porque el verso no contiene el nombre divino.
  - «Fin» y «breve» conservan la relación de τέλος y σύντομον sin añadir matices doctrinales sobre condena o juicio que el texto no explícita.
