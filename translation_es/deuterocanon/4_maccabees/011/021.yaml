revisions:
- from: Porque indomable es, oh tirano, la piadosa comprensión[a].
  to: Porque el entendimiento piadoso[a] es invencible, oh tirano.
  rationale: Se reemplaza «indomable» por «invencible» para reflejar con mayor precisión ἀνίκητος. Se cambia «la piadosa comprensión» por «el entendimiento piadoso» para lograr un español más natural y más cercano a «godly understanding», manteniendo la tensión entre piedad y racionalidad. Se conserva el vocativo directo y la nota de alternativas léxicas.
  reviewer_model: gpt-5.4
