review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia principal: Jonadab/Jehonadab instruye a Amnón a acostarse, fingir enfermedad, pedir que Tamar venga, prepare comida y así él coma de su mano. Sin embargo, hay dos ajustes de fidelidad: 1) el nombre propio debe seguir la forma española habitual del contexto bíblico, ‘Jonadab’, no el anglicismo transliterado ‘Jehonadab’; 2) ‘delante de mí’ es comprensible, pero ‘ante mis ojos’ o ‘a mi vista’ refleja mejor לְעֵינַי y enlaza con ‘para que yo lo vea’.'
  spanish_quality_summary: El español es claro y natural, con buen tono narrativo. ‘Acuéstate en tu cama’ y ‘finge estar enfermo’ están logrados. No obstante, ‘el plato’ suena algo estrecho en español para הַבִּרְיָה, que aquí es una preparación/comida especial; ‘la comida[a]’ o ‘la preparación[a]’ lee más naturalmente y evita reducirlo a vajilla o a un plato servido. También conviene eliminar la nota en ‘de su mano’, porque la expresión ya es suficientemente natural en español y no crea ambigüedad que requiera nota.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La principal cuestión de alineación terminológica es onomástica: usar ‘Jonadab’ en español bíblico corriente. El resto del léxico clave está bien alineado con el razonamiento del POB: ‘finge estar enfermo’, ‘comida’ por לֶחֶם en sentido amplio, y preservación de ‘de su mano’.'
  issues:
  - severity: medium
    issue: Nombre propio ‘Jehonadab’
    rationale: La forma del borrador parece calcada del inglés. En español bíblico común y legible, la forma establecida es ‘Jonadab’, especialmente en 2 Samuel 13.
  - severity: medium
    issue: ‘el plato’ para הַבִּרְיָה
    rationale: ‘Plato’ puede sugerir el recipiente o una ración ya servida. El hebreo apunta más bien a una comida/preparación especial para un enfermo o convaleciente. ‘La comida’ con nota conserva mejor sentido y naturalidad.
  - severity: low
    issue: Nota innecesaria en ‘de su mano’
    rationale: La expresión funciona bien en español y ya preserva la literalidad importante para la escena. La nota no añade una alternativa necesaria; basta dejar la frase en el texto.
  revised_spanish_text: 'Jonadab le dijo: “Acuéstate en tu cama y finge estar enfermo. Cuando tu padre venga a verte, dile: ‘Por favor, que venga Tamar, mi hermana, y me prepare comida, y que prepare la comida[a] ante mis ojos, para que yo la vea y coma de su mano.’”'
