- from: Que los malvados caigan en sus propias redes, todos a la vez[a][b], mientras yo paso.[c]
  to: Que los malvados caigan en sus propias redes[a], juntos[b], mientras yo paso[c].
  rationale: Se ajusta «todos a la vez» a «juntos» para reflejar con más sobriedad y precisión el adverbio יַחַד, y se rehacen las notas para que documenten alternativas de traducción relevantes al lector en vez del historial interno de revisión. Se mantiene «sus propias redes» y «mientras yo paso» por estar alineados con la revisión auditada y por sonar naturales en español.
