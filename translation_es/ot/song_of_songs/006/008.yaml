lexical_decisions:
- source_word: שִׁשִּׁים
  english_pob_choice: sixty
  chosen_spanish: sesenta
  alternatives_spanish:
  - '60'
  lexicon: HALOT
  rationale: Número cardinal directo; en español se expresa naturalmente como 'sesenta'.
- source_word: הֵמָּה
  english_pob_choice: There are
  chosen_spanish: Hay
  alternatives_spanish:
  - Son
  - Ellas son
  lexicon: HALOT
  rationale: El pronombre enfático hebreo se vierte con una construcción existencial natural en español, manteniendo el tono enumerativo sin calco pesado.
- source_word: מְּלָכ֔וֹת
  english_pob_choice: queens
  chosen_spanish: reinas
  alternatives_spanish:
  - mujeres reales
  - damas reales
  lexicon: HALOT
  rationale: '''Reinas'' conserva el sentido léxico normal y el contexto cortesano/harem del pasaje.'
- source_word: וּשְׁמֹנִים
  english_pob_choice: and eighty
  chosen_spanish: y ochenta
  alternatives_spanish:
  - e ochenta
  lexicon: HALOT
  rationale: Conjunción más cardinal; la forma estándar y natural en español es 'y ochenta'.
- source_word: פִּילַגְשִׁים
  english_pob_choice: concubines
  chosen_spanish: concubinas
  alternatives_spanish:
  - esposas secundarias
  lexicon: HALOT
  rationale: El término técnico español 'concubinas' corresponde con precisión al valor lexical del hebreo en contexto real/cortesano.
- source_word: וַעֲלָמוֹת
  english_pob_choice: young women
  chosen_spanish: doncellas
  alternatives_spanish:
  - jóvenes mujeres
  - muchachas
  - vírgenes
  lexicon: HALOT
  rationale: '''Doncellas'' es una opción digna y literaria que puede abarcar el campo de ''jóvenes mujeres''; se evita fijar ''vírgenes'' porque el término hebreo no lo exige por sí solo.'
- source_word: אֵין מִסְפָּר
  english_pob_choice: without number
  chosen_spanish: sin número
  alternatives_spanish:
  - sin contar
  - sin número alguno
  - innumerables
  lexicon: HALOT
  rationale: La expresión idiomática hebrea de innumerabilidad se reproduce de forma breve y poética con 'sin número'.
translation_notes:
  revision_awareness: El pasaje no requiere revisiones textuales; la versión inglesa auditada también se mantuvo sin cambios tras la revisión más reciente, con acuerdo alto entre revisores. La traducción española sigue ese mismo equilibrio entre precisión léxica y fluidez poética.
  spanish_consistency_notes:
  - Se mantiene 'reinas' para מְלָכוֹת y 'concubinas' para פִּילַגְשִׁים, en continuidad con la precisión léxica del contexto cortesano.
  - Se evita 'vírgenes' como término principal porque el propio expediente inglés documenta que עֲלָמוֹת es más amplio y solo podría sugerir esa lectura en algunos contextos.
  - '''Hay'' se usa para reflejar la construcción existencial idiomática del hebreo con הֵמָּה sin sobrecargar el español con un calco de sujeto explícito.'
