    rationale: El texto español no debe depender de un préstamo inglés cuando hay equivalentes naturales y fieles como «cámara de guardia». Esto afecta legibilidad, registro y adecuación al proyecto.
  - severity: medium
    issue: «Puerta de entrada» no representa tan bien la estructura de acceso
    rationale: הַשַּׁעַר en Ezequiel 40 se refiere al conjunto del acceso/gateway. «Portón» o «entrada» funcionan mejor que «puerta de entrada», que suena redundante y menos arquitectónico.
  - severity: low
