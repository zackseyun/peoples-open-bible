    rationale: La nota a explica «salvaciones/de liberaciones», mientras la nota b explica «salidas/vías de escape». En el texto, ambos marcadores aparecen juntos tras «salvaciones», dejando «salidas» sin su anclaje correspondiente.
  - severity: medium
