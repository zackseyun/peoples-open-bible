translation:
  language: es
  text: Porque también nosotros, como ustedes, oímos a su Señor, y le hemos ofrecido sacrificios desde los días de Asbacafat, rey de los asirios[a], que nos trajo aquí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Asbacafat es la forma griega del nombre; el paralelo hebreo de Esdras 4:2 identifica a este rey con Esarhadón.
    reason: alternative_reading
  - marker: b
    text: La expresión «nos trajo aquí» puede sugerir traslado o reasentamiento bajo dominio asirio.
    reason: cultural_note
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: like you / also, like you
  chosen_spanish: también nosotros, como ustedes
  alternatives_spanish:
  - igualmente, como ustedes
  - de la misma manera, como ustedes
  lexicon: LSJ
  rationale: ὁμοίως marca semejanza con el grupo al que se habla. En español, «también nosotros» conserva la inclusión explícita de la fuente y «como ustedes» expresa la comparación de forma natural.
- source_word: ἀκούομεν
  english_pob_choice: hear / listen to
  chosen_spanish: oímos
  alternatives_spanish:
  - escuchamos
  - atendemos a
  lexicon: BDAG
  rationale: El verbo puede significar oír o prestar atención. «Oímos» sigue de cerca el valor léxico básico que el audit trail corrigió hacia una lectura más exacta, sin añadir una matización de obediencia que el griego no exige aquí.
- source_word: τοῦ κυρίου ὑμῶν
  english_pob_choice: your Lord
  chosen_spanish: a su Lord
  alternatives_spanish:
  - a su Señor
  - a su Soberano
  lexicon: BDAG
  rationale: Se conserva el préstamo POB «Lord» para reflejar el criterio del proyecto frente a κύριος cuando el contexto no exige «Dios» explícitamente. El posesivo plural de cortesía «su» reproduce el griego «de ustedes» sin forzar una fórmula teológica más amplia.
- source_word: ἐπιθύσομεν
  english_pob_choice: we have been sacrificing
  chosen_spanish: le hemos estado sacrificando
  alternatives_spanish:
  - le hemos ofrecido sacrificios
  - le hemos venido sacrificando
  lexicon: LSJ
  rationale: El verbo se refiere a sacrificio cultual. En español, «le hemos estado sacrificando» mantiene el objeto indirecto y la fuerza sacrificial; el aspecto continuo refleja la revisión del POB inglés que entendió acción en curso desde un punto pasado.
- source_word: ἀπὸ ἡμερῶν
  english_pob_choice: since the days of
  chosen_spanish: desde los días de
  alternatives_spanish:
  - desde el tiempo de
  - a partir de los días de
  lexicon: LSJ
  rationale: La locución temporal indica un punto de inicio pasado. «Desde los días de» es la correspondencia más directa y natural en español.
- source_word: Ἀσβακαφὰθ
  english_pob_choice: Asbakaphath
  chosen_spanish: Asbacafat
  alternatives_spanish:
  - Asbakafat
  - Esarhadón
  lexicon: Greek proper name / transliteration
  rationale: Se translitera la forma griega, siguiendo el principio POB para nombres en la tradición griega. La identificación con Esarhadón queda implícita en la nota, pero no sustituye la forma del texto base.
- source_word: βασιλέως Ἀσσυρίων
  english_pob_choice: king of the Assyrians
  chosen_spanish: rey de los asirios
  alternatives_spanish:
  - rey de Asiria
  - rey asirio
  lexicon: LSJ
  rationale: La forma griega es étnica («de los asirios»). En español, «rey de los asirios» preserva ese matiz con claridad, aunque «rey de Asiria» sería una alternativa idiomática.
- source_word: μετήγαγεν
  english_pob_choice: brought us here
  chosen_spanish: que nos trajo aquí
  alternatives_spanish:
  - que nos trasladó aquí
  - que nos condujo aquí
  lexicon: LSJ
  rationale: El verbo expresa traslado o transporte desde un lugar a otro. «Nos trajo aquí» es idiomático y mantiene la posible idea de reubicación imperial sin añadir explicitamente «forzado».
- source_word: ἐνταῦθα
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - hasta aquí
  - en este lugar
  lexicon: LSJ
  rationale: Adverbio locativo simple; «aquí» es la equivalencia natural y directa.
theological_decisions:
- issue: Uso de κύριος en un contexto donde la referencia parece al Dios de Israel, pero el griego dice literalmente «su Lord»
  english_pob_reading: Render the claim straightforwardly ... without endorsing or denying its sincerity.
  chosen_spanish_reading: Traducir con «su Lord» y no expandir a «su Dios» o «el Señor su Dios».
  alternative_spanish_readings:
  - su Señor
  - el Señor, su Dios
  - su Dios
  rationale: El texto griego conserva el posesivo y no añade «Dios». Mantener «Lord» respeta la terminología POB y deja abierta la cuestión de si el hablante está usando una forma reverencial o una autodescripción religiosa más amplia.
  doctrine_reference: DOCTRINE.md §§1, 3, 5; término controvertido κύριος → Lord
- issue: Valor aspectual de ἐπιθύσομεν en la cláusula sacrificial
  english_pob_reading: we have been sacrificing to him since the days of Asbakaphath
  chosen_spanish_reading: le hemos estado sacrificando desde los días de Asbacafat
  alternative_spanish_readings:
  - le sacrificaremos desde los días de Asbacafat
  - le hemos ofrecido sacrificios desde los días de Asbacafat
  rationale: La revisión inglesa entendió una acción iniciada en el pasado y continuada hasta el presente narrativo. El español adopta ese valor progresivo con «hemos estado sacrificando» para no convertir el verbo en un futuro simple que alteraría el sentido temporal.
  doctrine_reference: DOCTRINE.md §§1, 4
- issue: Referencia cultural a la deportación/traslado imperial
  english_pob_reading: The phrase 'brought us here' may imply forced relocation or resettlement under Assyrian rule.
  chosen_spanish_reading: 'Conservar una formulación neutral: «que nos trajo aquí».'
  alternative_spanish_readings:
  - que nos trasladó aquí
  - que nos trajo a este lugar por fuerza
  rationale: El griego solo afirma el traslado; la implicación de desplazamiento imperial pertenece al contexto histórico, no a una explicitación semántica obligatoria. La traducción evita sobreinterpretar y deja el matiz en la nota.
  doctrine_reference: DOCTRINE.md §§2, 5
translation_notes:
  revision_awareness: 'El español sigue la revisión más reciente del expediente: ἀκούομεν se refleja con «oímos» y ἐπιθύσομεν con un valor de acción continuada («le hemos estado sacrificando» / «desde los días de...»), en vez de un futuro simple. También se conserva la forma griega del nombre propio y se evita expandir κύριος a «Dios», conforme al criterio del POB y a la advertencia de la lectura paralela hebrea.'
  spanish_consistency_notes:
  - Se mantiene «Lord» como forma técnica del proyecto para κύριος en este registro, coherente con el audit trail inglés.
  - «Asbacafat» sigue la transliteración del griego; la nota resuelve la identificación histórica sin reemplazar la forma textual.
  - La cláusula temporal «desde los días de» conserva la relación aspectual entre el inicio pasado y la continuidad implícita.
  - No se añade «Dios» porque el griego no lo dice; se preserva así la tensión léxica documentada.
