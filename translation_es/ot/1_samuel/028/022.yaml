translation:
  language: es
  text: Ahora bien, por favor escucha, tú también, la voz[a] de tu sierva[b], y permíteme poner delante de ti un pedazo[c] de pan. Come, para que haya fuerza en ti, porque has de seguir tu camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «escucha la voz de tu sierva»; es un modismo hebreo que significa «haz caso a tu sierva» o «escucha lo que dice tu sierva».
    reason: lexical_alternative
  - marker: b
    text: 'O: «criada». El hebreo usa específicamente un término femenino para «sierva».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un bocado de pan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora bien[a]
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: HALOT
  rationale: Marca transición discursiva y petición urgente; «Ahora bien» transmite mejor el matiz inferencial/exhortativo que un simple «ahora».
- source_word: שְׁמַע נָא
  english_pob_choice: please listen
  chosen_spanish: por favor escucha
  alternatives_spanish:
  - escucha, por favor
  - te ruego que escuches
  lexicon: HALOT
  rationale: El imperativo con נָא expresa súplica o cortesía; «por favor» mantiene ese matiz en español sin volverlo arcaico.
- source_word: גַם אַתָּה
  english_pob_choice: you also
  chosen_spanish: tú también
  alternatives_spanish:
  - también tú
  - incluso tú
  lexicon: HALOT
  rationale: 'Conserva la reciprocidad enfática del hebreo: así como ella ha sido escuchada, él también debe escuchar.'
- source_word: בְּקוֹל שִׁפְחָתֶךָ
  english_pob_choice: to the voice of your female servant
  chosen_spanish: la voz de tu sierva
  alternatives_spanish:
  - la voz de tu sierva mujer
  - la voz de tu criada
  - lo que dice tu sierva
  lexicon: HALOT
  rationale: «Sierva» refleja bien שִׁפְחָה y preserva el rasgo de género. En español, la idiomática «escuchar la voz de» se entiende naturalmente como «escucha a/lo que dice» sin perder la imagen hebrea.
- source_word: וְאָשִׂימָה לְפָנֶיךָ
  english_pob_choice: and let me set before you
  chosen_spanish: y deja que ponga delante de ti
  alternatives_spanish:
  - y permíteme poner delante de ti
  - y pondré delante de ti
  lexicon: HALOT
  rationale: La cohortativa primera persona suena en español como oferta suplicante; «deja que ponga» conserva el matiz volitivo y cortés mejor que un futuro simple.
- source_word: פַּת לֶחֶם
  english_pob_choice: a piece of bread
  chosen_spanish: un pedazo de pan
  alternatives_spanish:
  - un bocado de pan
  - una porción de pan
  - un pedacito de pan
  lexicon: HALOT
  rationale: פַּת puede ser «pedazo» o «mordisco/migaja»; «pedazo de pan» es claro, digno y evita sobre-precisar el tamaño.
- source_word: וֶאֱכֹל
  english_pob_choice: Eat
  chosen_spanish: Come
  alternatives_spanish:
  - y come
  - cómelo
  lexicon: HALOT
  rationale: Imperativo directo; en español puede mantenerse breve para reflejar la secuencia exhortativa del hebreo.
- source_word: וִיהִי בְךָ כֹּחַ
  english_pob_choice: so that there may be strength in you
  chosen_spanish: para que haya fuerza en ti
  alternatives_spanish:
  - para que tengas fuerza
  - y haya fuerza en ti
  lexicon: HALOT
  rationale: El hebreo expresa resultado/deseo; «para que haya fuerza en ti» conserva la metáfora de fuerza presente dentro de la persona, más cercano al original que «tener fuerza».
- source_word: כִּי תֵלֵךְ בַּדָּרֶךְ
  english_pob_choice: because you must go on your way
  chosen_spanish: porque has de seguir tu camino[c]
  alternatives_spanish:
  - porque vas a seguir tu camino
  - porque debes seguir tu camino
  - porque tienes que irte por el camino
  lexicon: HALOT
  rationale: El hebreo justifica la necesidad de comer por el viaje inmediato. «Has de seguir tu camino» suena natural en español y mantiene la idea de necesidad/inevitabilidad sin ampliar el contenido.
translation_notes:
  revision_awareness: 'Tomé como base la revisión más reciente del audit trail, que ajusta el orden para sonar más natural en inglés y mantiene ''female servant'' y ''piece of bread''. En español, mantuve esas mismas decisiones base pero las expresé con equivalentes naturales: ''sierva'' para שִׁפְחָה, ''pedazo de pan'' para פַּת לֶחֶם, y una construcción final que refleja la necesidad de reemprender el viaje. También integré los matices de cortesía y exhortación de נָא y el énfasis de גַם אַתָּה.'
  spanish_consistency_notes:
  - Usé «sierva» de manera consistente para שִׁפְחָה, evitando «sirvienta» porque puede sonar demasiado doméstico en algunos registros.
  - Mantuve un español moderno y reverente, sin depender de fórmulas tradicionales como «oye ahora» o «camina por el camino».
  - Conservé la imagen hebrea de escuchar la voz y la de fuerza interior, sin convertirlas en paráfrasis excesivas.
