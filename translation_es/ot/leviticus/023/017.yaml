translation:
  language: es
  text: De sus moradas traerán dos panes para ofrenda mecida; serán de dos décimas[a] de efa de flor de harina, horneados con levadura[b], como primicias para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''dos décimas''; en la medida sacerdotal, esto equivale a dos décimas de efa.'
    reason: cultural_note
  - marker: b
    text: 'O: ''horneados como pan leudado''. El hebreo indica explícitamente que estos panes de primicias llevan levadura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמּוֹשְׁבֹתֵיכֶם
  english_pob_choice: From your dwellings
  chosen_spanish: Desde sus moradas
  alternatives_spanish:
  - Desde sus viviendas
  - Desde donde habitan
  lexicon: HALOT
  rationale: מושבות designa el lugar de residencia o asentamiento. 'Moradas' conserva el matiz locativo con un registro bíblico claro en español; 'desde' refleja bien el origen del traslado del ofrecimiento.
- source_word: תָּבִיאּוּ
  english_pob_choice: you shall bring
  chosen_spanish: traeréis
  alternatives_spanish:
  - presentarán
  - deberéis traer
  lexicon: HALOT
  rationale: En el contexto legal-cultual, el verbo expresa la acción prescrita de llevar la ofrenda al santuario. 'Traeréis' mantiene el imperativo/jussivo plural del texto con naturalidad en español.
- source_word: לֶחֶם תְּנוּפָה
  english_pob_choice: loaves of bread for a wave offering
  chosen_spanish: dos panes de ofrenda mecida
  alternatives_spanish:
  - dos panes para ofrenda mecida
  - dos panes de ofrenda de mecimiento
  lexicon: HALOT
  rationale: לֶחֶם aquí es singular formal pero con 'dos' exige plural idiomático en español. 'Ofrenda mecida' preserva el término técnico cultual de תְּנוּפָה sin sustituirlo por una paráfrasis más interpretativa.
- source_word: שְׁתַּיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos
  lexicon: HALOT
  rationale: Número cardinal directo; se mantiene sin cambios semánticos.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: of two-tenths of an ephah
  chosen_spanish: de dos décimas de efa
  alternatives_spanish:
  - de dos diezmos de efa
  - de dos décimas de medida
  lexicon: HALOT
  rationale: עשרונים son décimas de efa en el sistema levítico; el español necesita una expresión metrológica comprensible. Se conserva 'efa' para mantener la equivalencia cultual y se evita expandir innecesariamente la unidad.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: La tradición bíblica en español usa 'flor de harina' para סֹלת y comunica bien la harina refinada de ofrenda. Es fiel y naturalmente reconocible en registro litúrgico.
- source_word: חָמֵץ תֵּאָפֶינָה
  english_pob_choice: baked with leaven
  chosen_spanish: cocidos con levadura
  alternatives_spanish:
  - horneados con levadura
  - cocidos leudados
  lexicon: HALOT
  rationale: El hebreo indica que el pan es leudado y luego horneado. 'Cocidos con levadura' intenta expresar el resultado culinario de forma natural en español, aunque 'horneados con levadura' también sería posible; se mantiene la nota implícita de que no son panes sin levadura.
- source_word: בִּכּוּרִים
  english_pob_choice: as firstfruits
  chosen_spanish: como primicias
  alternatives_spanish:
  - como primeros frutos
  - en calidad de primicias
  lexicon: HALOT
  rationale: '''Primicias'' es el equivalente cultual establecido en español para ביכורים. Mantiene el valor ofrendatorio y la referencia a los primeros productos dedicados a Dios.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ''Yahvé''. La preposición ל aquí expresa dedicación/ofrenda, por lo que ''para'' comunica bien la dirección cultual del gesto.'
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme a la pauta del proyecto, se preserva el nombre propio del pacto en español como 'Yahvé', en lugar de enmascararlo con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido técnico de תְּנוּפָה
  english_pob_reading: wave offering
  chosen_spanish_reading: ofrenda mecida
  alternative_spanish_readings:
  - ofrenda alzada
  - ofrenda movida
  rationale: Se mantiene la categoría ritual específica sin reemplazarla por un término más general. 'Ofrenda mecida' conserva el gesto cultual implícito en el hebreo y es comprensible para lectores bíblicos en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: consistency of key terms, or documented exception'
- issue: Expresión de חָמֵץ תֵּאָפֶינָה
  english_pob_reading: baked with leaven
  chosen_spanish_reading: cocidos con levadura
  alternative_spanish_readings:
  - horneados con levadura
  - leudados y horneados
  rationale: El punto teológico-litúrgico es que estas primicias se presentan con levadura, algo distintivo frente a otras ofrendas de cereal. La redacción elegida evita borrar esa tensión ritual.
  doctrine_reference: Levítico 23:17; comparación interna con normas de ofrenda sin levadura
- issue: Expresión metrológica 'two-tenths of an ephah'
  english_pob_reading: two-tenths of an ephah
  chosen_spanish_reading: dos décimas de efa
  alternative_spanish_readings:
  - dos diezmos de efa
  - dos décimas de una medida
  rationale: La equivalencia de medida debe ser inteligible sin perder el marco sacerdotal. 'Décimas de efa' mantiene el sistema antiguo y evita modernizarlo indebidamente.
  doctrine_reference: Contexto sacerdotal/levítico de medidas rituales
translation_notes:
  revision_awareness: Se observó el último pase de revisión (2026-04-23T11:11:35Z) con estado sin cambios y acuerdo alto; no se introdujeron modificaciones contra la decisión auditada en inglés, salvo la adaptación necesaria al estándar español de POB y al nombre divino del proyecto.
  spanish_consistency_notes:
  - Se mantuvo el registro cultual y legal del versículo, evitando paráfrasis explicativas fuera del alcance del hebreo.
  - Se preservó la tensión ritual de panes leudados dentro de una ofrenda de primicias, sin suavizarla.
  - '''Primicias'' se usó de forma consistente para ביכורים.'
  - '''Ofrenda mecida'' mantiene la terminología técnica preferida por el proyecto.'
  - El nombre divino aparece como 'Yahvé' según la pauta española del proyecto.
