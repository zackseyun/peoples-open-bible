translation:
  language: es
  text: 'No digas[a]: «Esto es malo; ¿qué es esto?»[b], pues todo prevalecerá en su tiempo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido es algo difícil aquí; el paralelo griego aclara el sentido como «esto es peor que aquello».
    reason: textual_variant
  - marker: b
    text: 'O: «Esto es peor que aquello».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אל לאמר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No decir
  - No hables así
  lexicon: HALOT
  rationale: El hebreo funciona como una prohibición seguida de infinitivo; en español la forma natural y fiel es un imperativo negativo directo. Mantiene el valor exhortativo del original y del paralelo griego οὐκ ἔστιν εἰπεῖν.
- source_word: זה רע מה זה
  english_pob_choice: This is worse than that / This is bad; what is this?
  chosen_spanish: Esto es peor que aquello
  alternatives_spanish:
  - Esto es malo; ¿qué es esto?
  - Esto es peor que esto
  lexicon: HALOT
  rationale: El hebreo transmitido es áspero, pero el paralelo griego aclara el sentido comparativo. En español, «peor que aquello» conserva esa comparación sin volver la frase extrañamente literal o confusa.
- source_word: רע
  english_pob_choice: worse / bad / evil
  chosen_spanish: peor
  alternatives_spanish:
  - malo
  - malvado
  - malo en grado comparativo
  lexicon: HALOT
  rationale: Aunque רע puede significar «malo» o «malvado», aquí el contexto comparativo y el griego πονηρότερον piden un comparativo. «Peor» comunica mejor la relación entre dos cosas.
- source_word: כל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo cuanto existe
  - todas las cosas
  - todo ello
  lexicon: HALOT
  rationale: El universal hebreo se expresa con un «todo» natural en español y suficientemente amplio para el alcance sentencioso del proverbio.
- source_word: בעתו
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en el tiempo debido
  - en su debido tiempo
  lexicon: HALOT
  rationale: La preposición con sufijo exige un valor temporal posesivo; «en su tiempo» es fiel y idiomático.
- source_word: יגביר
  english_pob_choice: will prevail / will prosper / will be approved
  chosen_spanish: prevalecerá
  alternatives_spanish:
  - prosperará
  - será aprobado
  - saldrá bien
  lexicon: HALOT
  rationale: El verbo hebreo es difícil; el griego εὐδοκιμηθήσεται sugiere ser aprobado, prosperar o resultar aceptable. «Prevalecerá» conserva la idea de resultado efectivo sin fijar una sola glosa demasiado estrecha.
theological_decisions:
- issue: Relación entre el hebreo difícil y el paralelo griego
  english_pob_reading: Use the Greek parallel to clarify that the verse warns against ranking one thing as worse than another.
  chosen_spanish_reading: 'La traducción adopta la lectura comparativa implícita: no declarar una cosa peor que otra, porque todo tendrá su momento y su resultado.'
  alternative_spanish_readings:
  - 'No digas: «Esto es malo; ¿qué es esto?» porque todo prevalecerá en su tiempo.'
  - 'No digas: «Esto es peor que aquello»; pues todo prosperará en su tiempo.'
  rationale: La base hebrea es algo oscura, pero el paralelo griego es una ayuda real de traducción y no solo una nota. Por eso la redacción española conserva el sentido comparativo y el desenlace temporal/evaluativo sin sobrecargar el texto.
  doctrine_reference: 'PHILOSOPHY.md: translated from Hebrew where it survives in Sirach, with Greek parallel as actual input; optimal-equivalence policy.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje hebreo de base y la revisión más reciente, pero la versión española opta por una solución intermedia: mantiene la claridad comparativa sugerida por el griego y conserva el desenlace evaluativo/temporal del hebreo sin traducir mecánicamente la última forma verbal.'
  spanish_consistency_notes:
  - Se usa «todo» para el hebreo הכול en sentido universal.
  - Se prefiere «prevalecerá» para יגביר, evitando introducir explícitamente «prosperar» o «ser aprobado» en el texto principal.
  - Se mantiene «peor que aquello» para conservar la comparación señalada por el paralelo griego.
  - La puntuación con dos puntos tras la prohibición ayuda a reflejar el cambio de voz entre mandato y razón.
