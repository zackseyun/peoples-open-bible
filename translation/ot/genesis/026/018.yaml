id: GEN.26.18
reference: Genesis 26:18
source:
  edition: WLC
  text: וַ/יָּ֨שָׁב יִצְחָ֜ק וַ/יַּחְפֹּ֣ר אֶת בְּאֵרֹ֣ת הַ/מַּ֗יִם אֲשֶׁ֤ר חָֽפְרוּ֙ בִּ/ימֵי֙ אַבְרָהָ֣ם אָבִ֔י/ו וַ/יְסַתְּמ֣וּ/ם פְּלִשְׁתִּ֔ים אַחֲרֵ֖י מ֣וֹת אַבְרָהָ֑ם וַ/יִּקְרָ֤א לָ/הֶן֙ שֵׁמ֔וֹת כַּ/שֵּׁמֹ֕ת אֲשֶׁר קָרָ֥א לָ/הֶ֖ן אָבִֽי/ו׀־־׃
translation:
  text: Then Isaac dug again the wells of water that had been dug in the days of Abraham his father[a], which the Philistines had stopped up after Abraham's death, and he called them by the names that his father had given them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''Isaac returned and dug.'' The Hebrew verb can explicitly denote returning, but here likely functions idiomatically to mark renewed action: ''dug again.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: Then Isaac dug again
  alternatives:
  - Isaac returned and dug
  - Isaac turned back and dug
  lexicon: HALOT
  rationale: 'The verb שוב literally means ''returned/turned back,'' but in this construction before a second verb it idiomatically marks resumption: Isaac ''again'' undertook the digging. Rendering the resumptive force in English avoids a wooden ''returned'' that could mislead the reader into thinking primarily of travel rather than renewed action.'
- source_word: וַיַּחְפֹּר
  chosen: dug again
  alternatives:
  - reopened by digging
  - dug out again
  lexicon: HALOT
  rationale: חפר means 'dig.' Because the context is previously existing wells that had been stopped up, 'dug again' captures both the literal action and the restorative sense without overparaphrasing to 'reopened' alone.
- source_word: בְּאֵרֹת הַמַּיִם
  chosen: the wells of water
  alternatives:
  - the water wells
  - the wells
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew expression. 'Wells of water' sounds natural enough in English and retains the emphasis on these being water sources, not metaphorical wells.
- source_word: אֲשֶׁר חָפְרוּ בִּימֵי אַבְרָהָם אָבִיו
  chosen: that had been dug in the days of Abraham his father
  alternatives:
  - which they had dug in the lifetime of Abraham his father
  - that were dug during the days of Abraham his father
  lexicon: HALOT
  rationale: The plural verb likely has an indefinite or unspecified subject ('they dug'), but English naturally uses the passive here. 'In the days of' is a standard rendering of בימי and preserves the temporal idiom.
- source_word: וַיְסַתְּמוּם
  chosen: had stopped up
  alternatives:
  - had filled in
  - had blocked up
  lexicon: HALOT
  rationale: סתם means to stop up or block. 'Stopped up' is idiomatic for wells and preserves the sense without specifying the exact material used. The pluperfect fits the narrative sequence.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group.
- source_word: אַחֲרֵי מוֹת אַבְרָהָם
  chosen: after Abraham's death
  alternatives:
  - after the death of Abraham
  lexicon: HALOT
  rationale: This is the most natural modern English rendering of the construct phrase while preserving the temporal relation.
- source_word: וַיִּקְרָא לָהֶן שֵׁמוֹת
  chosen: he gave them ... names
  alternatives:
  - he called them ... names
  - he named them
  lexicon: HALOT
  rationale: קרא with ל plus 'names' means to assign names. 'He gave them names' is idiomatic English and keeps the object relationship explicit.
- source_word: כַּשֵּׁמוֹת אֲשֶׁר קָרָא לָהֶן אָבִיו
  chosen: the same names that his father had given them
  alternatives:
  - according to the names that his father had called them
  - names like those his father had called them
  lexicon: HALOT
  rationale: 'The prefixed כ here expresses correspondence: Isaac used names matching those previously assigned by Abraham. ''The same names'' communicates this clearly in English.'
