review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: la excepción introductoria, la lista de quienes se quedan, la cláusula explicativa «sé que tenéis mucho ganado» y la permanencia en los asentamientos ya dados. Sin embargo, hay dos desajustes relevantes con el audit trail y con el anclaje de notas: «vuestras mujeres» debilita la especificidad contextual de נְשֵׁיכֶם, que aquí se refiere a esposas, y la nota [b] está colocada en «ganado» aunque su contenido corresponde a טַף («vuestros pequeños»/«vuestros hijos»).'
  spanish_quality_summary: El español es claro y digno, pero la combinación de voseo reverencial peninsular («vuestras», «os») no encaja con la guía de español neutral latinoamericano. «Sus esposas, sus pequeños y su ganado» o «sus esposas, sus hijos pequeños y su ganado» suena más natural y eclesialmente legible. También conviene alinear la nota sobre «pueblos/ciudades» con el sustantivo anotado en el texto.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. Las decisiones léxicas principales son adecuadas en general: «ganado» para מִקְנֶה, «quedarán» para יֵשְׁבוּ y perfecto compuesto para נָתַתִּי. La principal corrección glosarial/contextual es preferir «esposas» sobre «mujeres» por el contexto doméstico, en línea con la decisión inglesa documentada («your wives»).'
  issues:
  - severity: medium
    issue: «vuestras mujeres» debería ser «sus esposas» o equivalente contextual
    rationale: Aunque אִשָּׁה puede significar «mujer», en este contexto de miembros del hogar dejados atrás el sentido específico es marital. El audit trail inglés documenta «your wives» precisamente por esa razón.
  - severity: high
