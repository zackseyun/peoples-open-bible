base_translation:
  language: en
  yaml_path: translation/ot/proverbs/027/013.yaml
  text: Take his garment[a], for he has put up security for a stranger[b]; and hold it in pledge for a foreign woman.
  footnotes:
  - marker: a
    text: Or, 'Take a pledge from him for a foreign woman.' The Hebrew of the second line is terse, and the verb may be understood as taking or holding collateral from the man himself.
    reason: lexical_alternative
  - marker: b
    text: '''Foreign woman'' translates a Hebrew term that can mean a non-Israelite woman or, in Proverbs, a socially/morally illicit woman; the broader wording is retained here.'
    reason: lexical_alternative
  ai_draft:
