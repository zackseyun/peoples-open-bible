id: ECC.1.2
reference: Ecclesiastes 1:2
source:
  edition: WLC
  text: הֲבֵ֤ל הֲבָלִים֙ אָמַ֣ר קֹהֶ֔לֶת הֲבֵ֥ל הֲבָלִ֖ים הַ/כֹּ֥ל הָֽבֶל׃
translation:
  text: Breath of breaths[a], says Qoheleth[b]; breath of breaths, all is mere breath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew הֶבֶל (hevel), literally 'breath' or 'vapor.' Qoheleth uses this word across 38 occurrences in the book, metaphorically carrying three linked senses at once — transient (like a breath that's already gone), elusive (can't be grasped), and ironic (what was expected and what happens don't match). No single English word covers all three. We render with the concrete image — 'breath' in the superlative, 'mere breath' in the predicate — and let context develop each sense. Traditional English renderings include 'vanity' (KJV — misread in modern English as 'pride') and 'meaninglessness' (NIV — imports a nihilism Qoheleth's argument does not assert). The construct הֲבֵל הֲבָלִים is a Hebrew absolute-superlative, like 'song of songs' or 'holy of holies.'
    reason: lexical_choice
  - marker: b
    text: Qoheleth is the Hebrew title/name traditionally rendered 'the Teacher' or 'the Preacher' — both interpretive and each narrowing the semantic range differently. We transliterate to preserve the openness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵל
  chosen: breath
  alternatives:
  - vapor
  - mere breath
  - fleeting
  - elusive
  - futility
  - meaninglessness
  - vanity
  - absurd
  lexicon: HALOT
  rationale: Hebrew הֶבֶל literally denotes breath or vapor and is deployed metaphorically across Ecclesiastes to carry three linked senses simultaneously (transient, elusive, ironic). Abstracting glosses like 'futility,' 'meaninglessness,' or 'vanity' each foreground one sense and drop the other two — 'futility' narrows to goal-frustration and loses the transience and incomprehensibility senses that carry much of Qoheleth's argument (3:11; 8:17). The concrete image 'breath' preserves all three senses as latent to the reader, matches the author's specific choice of a concrete-image word over the abstract Hebrew alternatives he had available (שָׁוְא, רִיק), and lets the Hebrew superlative render naturally. Scholarly precedent for the concrete-image approach (Alter; Seow glosses 'ephemeral' back to breath; Fox argues 'absurd' but concedes the loss of image).
- source_word: הֲבֵל הֲבָלִים
  chosen: breath of breaths
  alternatives:
  - vanity of vanities
  - utter futility
  - absolute futility
  - mere breath of mere breaths
  lexicon: HALOT
  rationale: The construct-plus-plural pattern is a Hebrew absolute- superlative ('X of Xs'), like 'song of songs' or 'holy of holies.' Rendering as 'breath of breaths' preserves both the superlative form and the concrete image in a single construction. The intensifying 'mere' is dropped here because the superlative itself does the intensifying work and 'mere breath of mere breaths' is absurd in English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically qatal, Hebrew speech formulas in proverbial or literary framing function performatively and are idiomatically rendered with the English present. 'Says Qoheleth' fits the discourse register and keeps the statement vivid.
- source_word: קֹהֶלֶת
  chosen: Qoheleth
  alternatives:
  - the Teacher
  - the Preacher
  - the Assembler
  lexicon: HALOT
  rationale: Following the transliterate-when-uncertain philosophy, 'Qoheleth' preserves the Hebrew designation without prematurely resolving its nuance. 'Teacher' and 'Preacher' each narrow the semantic range differently.
- source_word: הַכֹּל
  chosen: everything
  alternatives:
  - all
  - the whole
  lexicon: HALOT
  rationale: The phrase הַכֹּל הָבֶל is idiomatically broad and comprehensive. 'Everything' is the most natural modern English rendering and preserves the totalizing force.
- source_word: הָבֶל
  chosen: mere breath
  alternatives:
  - breath
  - vapor
  - fleeting
  - vanity
  - meaningless
  - futile
  lexicon: HALOT
  rationale: In predicate position ('everything is X'), the bare noun 'breath' reads as an ontological claim about substance rather than Qoheleth's evaluative verdict. 'Mere' supplies the evaluative tone the Hebrew reader picks up from context but an English reader will not supply unprompted — the surprise-and-deflation weight that makes the verse land as a verdict rather than a definition. This matches Alter's published solution.
