translation:
  language: es
  text: Así también tú, guardiana de la ley, aunque cercada por todos lados por el diluvio de las pasiones[a] y oprimida por los vientos feroces de los tormentos de tus hijos, soportaste con valentía las tormentas de la piedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «emociones». El griego πάθη es un término clave en 4 Macabeos para las pasiones o impulsos que la razón debe dominar.
    reason: lexical_alternative
  - marker: b
    text: Lit. «los inviernos de la piedad». El griego χειμῶνας puede referirse literalmente a «inviernos», pero aquí también funciona metafóricamente como «tormentas» o «temporales».
    reason: lexical_alternative
lexical_decisions:
- source_word: νομοφύλαξ
  english_pob_choice: guardian of the law
  chosen_spanish: guardiana de la ley
  alternatives_spanish:
  - custodia de la ley
  - la que guarda la ley
  lexicon: LSJ
  rationale: El compuesto expresa a una persona que protege o custodia la ley. En español, «guardiana de la ley» conserva ese sentido activo y suena natural y digna en el contexto exhortativo.
- source_word: πανταχόθεν
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - de todos lados
  - en todas partes
  lexicon: LSJ
  rationale: Con el participio de cerco, la idea espacial de estar rodeada en todas direcciones es la dominante. «Por todos lados» es claro y idiomático.
- source_word: ἐν τῷ τῶν παθῶν περικυκλουμένῃ κατακλυσμῷ
  english_pob_choice: surrounded on every side by the flood of passions
  chosen_spanish: cercada por todos lados por el diluvio de las pasiones
  alternatives_spanish:
  - rodeada por el diluvio de las pasiones
  - cercada por la inundación de las pasiones
  lexicon: LSJ
  rationale: παθῶν en 4 Macabeos forma parte del vocabulario clave sobre las pasiones; por eso se mantiene «pasiones» en vez de suavizarlo a «emociones». κατακλυσμός se rinde con una imagen fuerte como «diluvio», que conserva el valor metafórico sin sonar forzado.
- source_word: καρτεροῖς ἀνέμοις
  english_pob_choice: the fierce winds
  chosen_spanish: los vientos feroces
  alternatives_spanish:
  - los vientos fuertes
  - los vientos violentos
  lexicon: LSJ
  rationale: καρτερός comunica fuerza y dureza; «feroces» encaja con la imagen de tormenta y con la intensidad retórica del pasaje.
- source_word: ταῖς τῶν υἱῶν βασάνοις
  english_pob_choice: by your sons’ torments
  chosen_spanish: los tormentos de tus hijos
  alternatives_spanish:
  - las torturas de tus hijos
  - las pruebas de tus hijos
  lexicon: LSJ
  rationale: 'βάσανοι tiene fuerza de tormentos/torturas. El posesivo «de tus hijos» sigue el sentido más natural del genitivo en el contexto: los tormentos padecidos por ellos.'
- source_word: συνεχομένη
  english_pob_choice: pressed
  chosen_spanish: oprimida
  alternatives_spanish:
  - apremiada
  - estrechada
  - afligida
  lexicon: LSJ
  rationale: El participio indica ser comprimida o agobiada por fuerzas adversas. «Oprimida» preserva esa presión externa y combina bien con la imagen del viento.
- source_word: γενναίως
  english_pob_choice: bravely
  chosen_spanish: con valentía
  alternatives_spanish:
  - valerosamente
  - con nobleza
  - con coraje
  lexicon: LSJ
  rationale: El adverbio combina valor y nobleza de ánimo. «Con valentía» es una equivalencia natural y sobria en español.
- source_word: ὑπέμεινας
  english_pob_choice: endured
  chosen_spanish: soportaste
  alternatives_spanish:
  - perseveraste
  - resististe
  - sostuviste
  lexicon: LSJ
  rationale: El verbo expresa resistencia firme bajo prueba. «Soportaste» conserva la idea de aguante perseverante y es idiomático en español actual.
- source_word: τοὺς τῆς εὐσεβείας χειμῶνας
  english_pob_choice: the storms of godliness
  chosen_spanish: los inviernos de la piedad
  alternatives_spanish:
  - las tormentas de la piedad
  - los temporales de la devoción
  - los inviernos de la devoción
  lexicon: LSJ
  rationale: χειμῶνες puede significar literalmente «inviernos» o, metafóricamente, «tormentas/temporales». Se conserva la imagen de estación dura con «inviernos», siguiendo de cerca el griego. εὐσέβεια se traduce aquí como «piedad» para mantener el tono reverente y la tensión metafórica del texto.
theological_decisions:
- issue: Sentido de πάθη en 4 Macabeos
  english_pob_reading: passions
  chosen_spanish_reading: pasiones
  alternative_spanish_readings:
  - emociones
  - sufrimientos
  rationale: La obra usa πάθη como término técnico en su argumento sobre el dominio racional de las pasiones. «Pasiones» conserva mejor esa carga conceptual que una versión psicologizante como «emociones».
  doctrine_reference: Translation philosophy §§1, 6
- issue: Renderización de εὐσέβεια
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - religiosidad
  rationale: εὐσέβεια en este libro apunta a la reverencia y fidelidad hacia Dios. «Piedad» mantiene el registro bíblico y la referencia religiosa sin introducir matices ajenos.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El borrador inglés revisado cambió «emotions» por «passions» para acercarse más a πάθη. La versión española sigue esa revisión y conserva además la metáfora climática de χειμῶνας con «inviernos», mientras mantiene una redacción natural en español.
  spanish_consistency_notes:
  - Se mantuvo «pasiones» para πάθη por coherencia con el vocabulario clave de 4 Macabeos.
  - Se prefirió «piedad» para εὐσέβεια en esta línea poética, aunque en otros contextos del proyecto puede ser adecuado «devoción» o «piedad» según el registro.
  - Se conservó el femenino de «guardiana» porque el referente del contexto es una mujer; esto aclara la concordancia implícita del griego.
  - «Tormentos de tus hijos» refleja el genitivo posesivo de manera idiomática en español.
