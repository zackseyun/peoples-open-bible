translation:
  language: es
  text: Y uno reinará[a] procedente de Jacob, y destruirá al sobreviviente[b] de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tendrá dominio». El verbo hebreo puede traducirse «reinar» o «tener dominio».
    reason: lexical_alternative
  - marker: b
    text: O «remanente». El hebreo usa un sustantivo singular con posible fuerza colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵרְדְּ
  english_pob_choice: And one shall rule
  chosen_spanish: Y uno reinará[a]
  alternatives_spanish:
  - Y él reinará
  - Y uno tendrá dominio
  - Y uno gobernará
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal de רדה, con sentido de gobernar o dominar. En español, «reinará» comunica con naturalidad la idea de gobierno regio en este contexto oracular, sin añadir un sujeto explícito que el hebreo no presenta.
- source_word: מִיַּעֲקֹב
  english_pob_choice: from Jacob
  chosen_spanish: desde Jacob
  alternatives_spanish:
  - de Jacob
  - a partir de Jacob
  lexicon: HALOT
  rationale: La preposición min expresa origen o procedencia. «Desde Jacob» conserva bien esa fuente/origen en un español claro y natural.
- source_word: וְהֶאֱבִיד
  english_pob_choice: and he shall destroy
  chosen_spanish: y destruirá[b]
  alternatives_spanish:
  - y hará perecer
  - y aniquilará
  - y borrará
  lexicon: HALOT
  rationale: El hiphil de אבד implica causar destrucción o pérdida. «Destruirá» es directo y suficientemente fuerte sin exagerar el matiz.
- source_word: שָׂרִיד
  english_pob_choice: the survivor
  chosen_spanish: al sobreviviente[b]
  alternatives_spanish:
  - al remanente
  - al que quede
  - al restante
  lexicon: HALOT
  rationale: שָׂרִיד designa al que queda con vida o sobrevive. «Sobreviviente» mantiene el valor singular y personal que refleja mejor el sustantivo que un abstracto como «remanente».
- source_word: מֵעִיר
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la ciudad fortificada
  - de la ciudad enemiga
  lexicon: HALOT
  rationale: עִיר significa simplemente «ciudad». En español, «de la ciudad» evita especificaciones no sustentadas por la palabra misma.
theological_decisions:
- issue: Referencia real y posible lectura mesiánica del oráculo de Balaam
  english_pob_reading: Render the verse in straightforward royal language without making the messianic interpretation explicit in the text.
  chosen_spanish_reading: Traducir con lenguaje real sencillo, sin explicitar en el texto una lectura mesiánica.
  alternative_spanish_readings:
  - Interpretarlo explícitamente como profecía mesiánica
  - Limitarlo solo a un rey histórico inmediato
  rationale: 'El hebreo presenta a un gobernante que surge de Jacob y actúa con dominio, pero el verso no lo identifica explícitamente como Mesías. Por eso se conserva la tensión teológica: lenguaje regio claro, sin resolver la interpretación en el texto mismo.'
  doctrine_reference: Preservar la tensión teológica sin imponer una conclusión doctrinal no explicitada por el hebreo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas con los marcadores [a] y [b] dentro del texto español, y se mantuvo la distinción entre el verbo de gobierno y el sustantivo singular de quien sobrevive.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «sobreviviente» para conservar el valor concreto del hebreo שָׂרִיד, en vez de «remanente», salvo en la nota alternativa.
  - Se eligió un tono formal y publicable, con sintaxis natural en español latinoamericano.
