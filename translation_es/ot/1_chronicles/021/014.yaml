translation:
  language: es
  text: Así Yahvé envió una plaga sobre Israel[a], y de Israel cayeron setenta mil hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pestilencia'. El término hebreo denota un brote mortal, a menudo en contexto de juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma auditada por la POB en español, 'Yahvé', en lugar de sustituirlo por un título. Esto mantiene la referencia directa al nombre personal de Dios en el texto fuente.
- source_word: וַיִּתֵּן
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - dio
  - puso
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente 'dio', con דֶּבֶר el español natural y fiel es 'envió una plaga', porque expresa la acción causativa de juicio sin un calco rígido.
- source_word: דֶּבֶר
  english_pob_choice: a plague
  chosen_spanish: una plaga
  alternatives_spanish:
  - pestilencia
  - una enfermedad mortal
  lexicon: HALOT
  rationale: '''Plaga'' comunica en español contemporáneo la idea de una mortandad enviada por Dios. ''Pestilencia'' es posible, pero más arcaica; se reserva como alternativa léxica si se quiere mayor proximidad terminológica al hebreo.'
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: on Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - contra Israel
  lexicon: HALOT
  rationale: '''Sobre Israel'' reproduce bien la imagen de un castigo que cae encima del pueblo y corresponde al uso idiomático español con una plaga que sobreviene a alguien.'
- source_word: וַיִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - murieron
  - fueron derribados
  lexicon: HALOT
  rationale: Se conserva el valor idiomático de 'caer' como eufemismo/expresión de muerte en juicio. 'Murieron' explicita más de lo que el hebreo dice; 'cayeron' mantiene la huella del original.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - de los israelitas
  lexicon: HALOT
  rationale: '''De Israel'' es la forma natural para marcar pertenencia sin añadir una paráfrasis interpretativa. Conserva la relación colectiva expresada por el hebreo.'
- source_word: שִׁבְעִים אֶלֶף אִישׁ
  english_pob_choice: seventy thousand men
  chosen_spanish: setenta mil hombres
  alternatives_spanish:
  - setenta mil personas
  - setenta mil varones
  lexicon: HALOT
  rationale: El hebreo dice explícitamente 'hombres' (אִישׁ) tras el numeral; por eso se mantiene 'hombres' en lugar de neutralizarlo con 'personas'. Esto preserva la precisión léxica y la concordancia con la POB inglesa.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: So Yahweh sent a plague on Israel
  chosen_spanish_reading: Así Yahvé envió una plaga sobre Israel
  alternative_spanish_readings:
  - Así Yahvé permitió una plaga sobre Israel
  - Así Yahvé mandó una plaga sobre Israel
  rationale: El hebreo atribuye directamente la acción a Yahvé sin atenuarla con 'permitió'. La traducción mantiene esa afirmación frontal del juicio divino y no resuelve la tensión teológica que el texto presenta.
  doctrine_reference: Preservar la tensión teológica del texto fuente; primacía del original sobre una suavización doctrinal.
translation_notes:
  revision_awareness: Coincide con el estado de alta concordancia del audit trail inglés; no se aplicaron revisiones posteriores al pasaje base. Se mantuvo la decisión de traducir el nombre divino por 'Yahvé' y de conservar el verbo de caída como 'cayeron' para reflejar el hebreo sin suavizar la agencia divina.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del Tetragrámaton en todo el pasaje.
  - '''Plaga'' y la nota alternativa ''pestilencia'' conservan la tensión léxica del hebreo דֶּבֶר.'
  - La construcción 'cayeron de Israel' respeta la estructura del hebreo y la idiomática de muerte en juicio.
  - Se usa 'hombres' para אִישׁ conforme a la precisión léxica auditada.
