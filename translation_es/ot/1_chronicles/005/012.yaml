translation:
  language: es
  text: Joel el jefe, Shafam el segundo[a], y Jaanai y Shafat en Basán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Shafam el diputado» o «Shafam el segundo en rango».'
