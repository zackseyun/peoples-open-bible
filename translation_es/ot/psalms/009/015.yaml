translation:
  language: es
  text: para que cuente todas tus alabanzas en las puertas de la hija de Sión; me alegraré en tu salvación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación». El término hebreo puede referirse tanto al rescate de un peligro presente como a la salvación en un sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para
  lexicon: HALOT
  rationale: La partícula expresa propósito; «para que» es la forma natural en español y conserva claramente el valor final del hebreo.
- source_word: אֲסַפְּרָה
  english_pob_choice: I may recount
  chosen_spanish: yo cuente
  alternatives_spanish:
  - yo recuente
  - yo narre
  - yo declare
  lexicon: HALOT
  rationale: El piel de ספר tiene aquí el sentido de relatar o contar públicamente. «Cuente» comunica ese acto de enumerar/relatar con naturalidad en español sin perder la fuerza de testimonio.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas las
  - el conjunto de
  lexicon: HALOT
  rationale: 'Como modifica «alabanzas», el plural femenino en español refleja bien el hebreo: no solo una alabanza, sino la totalidad de ellas.'
- source_word: תְּהִלָּתֶיךָ
  english_pob_choice: your praises
  chosen_spanish: tus alabanzas
  alternatives_spanish:
  - tu alabanza
  - tus loores
  lexicon: HALOT
  rationale: «Alabanzas» es el equivalente más directo y transparente para el plural hebreo, manteniendo el matiz de actos o expresiones de alabanza dirigidas a Dios.
- source_word: בְּשַׁעֲרֵי
  english_pob_choice: in the gates of
  chosen_spanish: en las puertas de
  alternatives_spanish:
  - en los portones de
  - a las puertas de
  lexicon: HALOT
  rationale: En español, «puertas» transmite la imagen pública de acceso, reunión y juicio que tienen los «gates» hebreos; «en» conserva la localización pública del acto de contar.
- source_word: בַת צִיּוֹן
  english_pob_choice: Daughter Zion
  chosen_spanish: la Hija de Sion
  alternatives_spanish:
  - la Hija de Sión
  - Sion hija
  lexicon: HALOT
  rationale: Se preserva el título poético personificado. «Hija de Sion» mantiene la imagen hebrea y resulta comprensible en español bíblico moderno.
- source_word: אָגִילָה
  english_pob_choice: I will rejoice
  chosen_spanish: me alegraré
  alternatives_spanish:
  - me gozaré
  - exultaré
  lexicon: HALOT
  rationale: El verbo גיל expresa regocijo intenso; «me alegraré» es natural y digno en español, aunque «exultaré» queda como alternativa más intensa.
- source_word: בִּישׁוּעָתֶךָ
  english_pob_choice: in your salvation
  chosen_spanish: en tu salvación
  alternatives_spanish:
  - en tu liberación
  - por tu salvación
  lexicon: HALOT
  rationale: Se conserva «salvación» para mantener la amplitud teológica del término hebreo, siguiendo la decisión documentada en la tradición auditada.
theological_decisions:
- issue: 'ישועה: salvación o liberación'
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  rationale: El contexto inmediato apunta a rescate del peligro, pero el término hebreo también tiene una resonancia más amplia. «Salvación» preserva esa amplitud canónica sin negar el sentido concreto de libramiento.
  doctrine_reference: Preservar la tensión léxica y teológica; no reducir el término a un solo nivel de sentido.
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en inglés: la revisión más reciente no introdujo cambios y el cotejo cruzado fue de alta concordancia. La redacción española sigue la misma decisión principal para ישועה («salvación») y conserva la alternativa lexical en nota.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - «Hija de Sion» conserva el título poético personificado del hebreo.
  - «Salvación» se usa de forma consistente con la amplitud teológica del hebreo ישועה, con nota para «liberación».
