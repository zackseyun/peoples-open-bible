theological_decisions:
- issue: Nature of Samson's consecration
  chosen_reading: a Nazirite of God from the womb
  alternative_readings:
  - one consecrated to God from birth
  rationale: The Hebrew uses the technical term נְזִיר, so the main text preserves the specific institution rather than generalizing it. This also maintains the prenatal consecration emphasis without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Scope of Samson's role in Israel's deliverance
  chosen_reading: he will begin to save Israel
  alternative_readings:
  - he will save Israel
  rationale: The verb יָחֵל explicitly marks an initial stage. Rendering it as merely 'he will save' would overstate the text and obscure the narrative tension that Samson initiates, rather than completes, deliverance.
  doctrine_reference: Translation philosophy §§1, 3
