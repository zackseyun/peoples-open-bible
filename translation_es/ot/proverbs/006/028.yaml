translation:
  language: es
  text: ¿Puede[a] un hombre caminar sobre brasas y no se le quemen los pies?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La partícula hebrea אִם significa normalmente «si», pero aquí introduce una pregunta retórica; por eso el español usa «¿Puede…?» para preservar la fuerza del proverbio. Otra posibilidad sería: «Si un hombre camina sobre brasas, ¿no se le quemarán los pies?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Can
  chosen_spanish: ¿Puede
  alternatives_spanish:
  - Si
  - ¿Será que
  lexicon: HALOT
  rationale: En este contexto sapiencial, אִם introduce una pregunta retórica hipotética. En español, «¿Puede» conserva mejor esa fuerza interrogativa natural que un simple «Si», sin perder el matiz de posibilidad cuestionada.
- source_word: יְהַלֵּךְ
  english_pob_choice: walk
  chosen_spanish: caminar
  alternatives_spanish:
  - andar
  - ir
  lexicon: HALOT
  rationale: הלך en esta forma expresa el acto de caminar o moverse a pie. «Caminar» es claro y fiel para el lector español moderno.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino genérico. Se conserva «un hombre» para mantener la precisión gramatical y el valor ejemplar del proverbio.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición indica contacto directo con la superficie de las brasas; «sobre» comunica mejor esa relación espacial en español.
- source_word: הַגֶּחָלִים
  english_pob_choice: coals
  chosen_spanish: brasas
  alternatives_spanish:
  - carbones
  - ascuas
  lexicon: HALOT
  rationale: גחלים puede referirse a carbones encendidos o brasas. «Brasas» expresa de manera más natural en español la imagen de material ardiente que quema los pies.
- source_word: וְרַגְלָיו
  english_pob_choice: and his feet
  chosen_spanish: y no se le quemen los pies
  alternatives_spanish:
  - y sus pies no se quemen
  - y no sean quemados sus pies
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y sus pies». En español, una construcción impersonal refleja mejor la pregunta retórica final y evita rigidez, sin abandonar el plural hebreo de «pies».
- source_word: תִכָּוֶינָה
  english_pob_choice: be scorched
  chosen_spanish: se le quemen
  alternatives_spanish:
  - se le chamusquen
  - se le escaldan
  lexicon: HALOT
  rationale: כוה en nifal expresa ser quemado o escaldado. «Se le quemen» es idiomático y suficientemente fuerte para el daño causado por las brasas; «chamusquen» sería más coloquial.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el audit trail inglés sin cambios textuales recientes; la decisión principal fue adaptar la pregunta retórica inicial a un español natural sin perder el valor hipotético del hebreo.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando calcos innecesarios.
  - Se conservó el masculino genérico «un hombre» por fidelidad al hebreo.
  - «Brasas» comunica mejor que «coals» la imagen ardiente esperada en español.
  - La nota [a] señala la tensión entre el valor normal de אִם («si») y su función retórica aquí.
