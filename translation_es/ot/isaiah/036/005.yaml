  to: 'Yo digo[a]: «Solo palabras de los labios: consejo y fuerza para la guerra». Ahora, ¿en quién has confiado, que te has rebelado contra mí?'
  rationale: Se elimina «Ellos son» porque no está en el hebreo y porque la frase nominal elíptica se puede reproducir de manera natural en español. Se cambia «para que te hayas rebelado» por «que te has rebelado» para reflejar mejor la pregunta retórica del original. Se conserva «Yo digo» con nota, en línea con la decisión principal del audit trail y la transparencia textual.
