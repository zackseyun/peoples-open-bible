  to: Partieron de Elim, y toda la congregación de los hijos de Israel[a] llegó al desierto de Sin, que está entre Elim y Sinaí[b], el decimoquinto día del segundo mes, después de haber salido de la tierra de Egipto.
  rationale: Se corrige el anclaje de la nota [a] para que corresponda a «hijos de Israel», como exige el contenido de la nota y las reglas del proyecto. Se mantiene la estructura general del borrador por su buena fidelidad al hebreo y al rastro de auditoría inglés. Se pule la fecha a «el decimoquinto día del segundo mes» por mayor naturalidad bíblica en español. Se conserva «llegó» porque con «toda la congregación» sigue siendo gramaticalmente aceptable y evita rehacer más de lo necesario; la reparación principal es el anclaje de la nota.
