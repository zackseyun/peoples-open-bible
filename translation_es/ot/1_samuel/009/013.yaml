  to: Tan pronto como entren en la ciudad, lo encontrarán, antes de que suba al lugar alto[a] para comer. Porque el pueblo no comerá hasta que él llegue, ya que él es quien bendice el sacrificio[b]; después comerán los invitados. Así que suban ahora, porque hoy[c] lo encontrarán.
