translation:
  language: es
  text: Y los caldeos[b] rompieron en pedazos los pilares de bronce que estaban en la casa de Yahvé, y los soportes[a], y el mar de bronce que estaba en la casa de Yahvé, y llevaron su bronce a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las bases» para הַמְּכֹנוֹת, refiriéndose a las estructuras de apoyo de las pilas del templo.
    reason: lexical_alternative
  - marker: b
    text: «Los caldeos» se refiere a las fuerzas babilónicas.
    reason: cultural_note
lexical_decisions:
- source_word: עַמּוּדֵי הַנְּחֹשֶׁת
  english_pob_choice: the bronze pillars
  chosen_spanish: los pilares de bronce
  alternatives_spanish:
  - los pilares broncíneos
  - las columnas de bronce
  lexicon: HALOT
  rationale: עַמּוּדִים designa pilares o columnas; en español, «pilares» es natural y mantiene la imagen arquitectónica. «De bronce» refleja נְחֹשֶׁת con el metal correspondiente sin forzar un arcaísmo.
- source_word: אֲשֶׁר בֵּית יְהוָה
  english_pob_choice: that were in the house of Yahweh
  chosen_spanish: que estaban en la casa de Yahvé
  alternatives_spanish:
  - que eran de la casa de Yahvé
  - que estaban en el templo de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa una cláusula relativa no verbal. «Que estaban en la casa de Yahvé» explicita la ubicación con fluidez y conserva el referente cultual sin añadir posesión que el texto no exige.
- source_word: הַמְּכֹנוֹת
  english_pob_choice: the stands
  chosen_spanish: las bases
  alternatives_spanish:
  - los soportes
  - las estructuras de apoyo
  lexicon: HALOT
  rationale: La POB inglesa preserva la ambigüedad lexical con nota («bases» como alternativa de «stands»). En español, «bases» comunica bien el componente estructural asociado a los lavamanos del templo y evita una expresión más vaga.
- source_word: יָם הַנְּחֹשֶׁת
  english_pob_choice: the bronze sea
  chosen_spanish: el mar de bronce
  alternatives_spanish:
  - la gran pila de bronce
  - el mar broncíneo
  lexicon: HALOT
  rationale: 'Se conserva el nombre tradicional del mueble del templo: «mar de bronce». «Pila» interpretaría el objeto, pero el hebreo usa literalmente יָם, y la POB inglesa retiene «sea» para preservar la imagen fuente.'
- source_word: שִׁבְּרוּ
  english_pob_choice: broke in pieces
  chosen_spanish: rompieron en pedazos
  alternatives_spanish:
  - quebraron
  - despedazaron
  lexicon: HALOT
  rationale: El verbo implica desarmar o fracturar objetos pesados para su traslado. «Rompieron en pedazos» expresa mejor la acción concreta que un simple «rompieron».
- source_word: כַשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: El hebreo dice específicamente «caldeos». Se mantiene el término fuente; la identificación histórica con Babilonia queda clara en el contexto y no exige sustitución.
- source_word: וַיִּשְׂאוּ
  english_pob_choice: and carried
  chosen_spanish: y llevaron
  alternatives_spanish:
  - y se llevaron
  - y cargaron
  lexicon: HALOT
  rationale: En contexto de botín y despojo, נָשָׂא tiene el sentido de transportar/cargar. «Llevaron» es el equivalente más natural y directo en español.
- source_word: נְחֻשְׁתָּם
  english_pob_choice: their bronze
  chosen_spanish: su bronce
  alternatives_spanish:
  - el bronce de ellos
  - su metal de bronce
  lexicon: HALOT
  rationale: El sufijo plural remite colectivamente a los objetos de bronce mencionados. En español, «su bronce» reproduce esa referencia conjunta de forma compacta y clara.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  - hacia Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional se expresa de manera idiomática con «a Babilonia». Mantiene el movimiento hacia el destino sin sobreinterpretar la trayectoria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención POB para el Tetragrámaton: transliteración del nombre divino como «Yahvé», preservando el nombre propio revelado y evitando la sustitución por un título.'
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de templo y despojo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio de Dios, no un título. Mantener «Yahvé» preserva la referencia pactual del pasaje y coincide con la política de la POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del control cruzado y conserva las decisiones del audit trail en inglés: «bronze» → «bronce», «stands» → «bases», «bronze sea» → «mar de bronce», y el nombre divino como Yahvé. No se requieren revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «casa de Yahvé» para בית יְהוָה, acorde con el proyecto.
  - Se conservó la imagen de «mar de bronce» en vez de reinterpretarla como «pila», para no perder el nombre técnico del objeto.
  - «Los caldeos» se dejó en el cuerpo, con nota explicativa sobre la identificación babilónica.
  - El registro es bíblico-formal, con sintaxis natural para lectorado eclesial amplio.
