translation:
  language: es
  text: y sus señales[a] y sus hechos que hizo en medio de Egipto[b][c], a Faraón rey de Egipto y a toda su tierra—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maravillas» para «señales».
    reason: lexical_alternative
  - marker: b
    text: O «en Egipto»; el hebreo dice más literalmente «en medio de Egipto».
    reason: lexical_alternative
  - marker: c
    text: O «contra Faraón ... y contra toda su tierra»; la preposición hebrea es literalmente «a», pero el contexto es de actos dirigidos en juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹתֹתָיו
  english_pob_choice: his signs
  chosen_spanish: sus señales
  alternatives_spanish:
  - sus maravillas
  - sus señales milagrosas
  lexicon: HALOT
  rationale: אוֹת suele significar señal, indicio o portento. En español, «señales» conserva la amplitud del término y su carácter visible y comprobable. «Maravillas» sería posible, pero desplaza el matiz hacia lo extraordinario; «señales milagrosas» añade explicación no exigida por el hebreo.
- source_word: מַעֲשָׂיו
  english_pob_choice: his deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus actos
  lexicon: HALOT
  rationale: מַעֲשֶׂה designa algo realizado, un hecho o acto concreto. «Hechos» es natural en español y conserva el peso de acciones efectivas de Dios. «Obras» puede sonar más solemne, pero en español también puede sugerir un uso teológico más técnico; «actos» es válido, aunque menos idiomático aquí.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he did
  chosen_spanish: que hizo
  alternatives_spanish:
  - que realizó
  - las cuales hizo
  lexicon: HALOT
  rationale: La cláusula relativa en hebreo modifica de manera directa a «señales» y «hechos». «Que hizo» es la forma más simple y fiel en español; «realizó» eleva el registro sin aportar contenido adicional.
- source_word: בְּתוֹךְ מִצְרַיִם
  english_pob_choice: in the midst of Egypt
  chosen_spanish: en medio de Egipto
  alternatives_spanish:
  - dentro de Egipto
  - en Egipto
  lexicon: HALOT
  rationale: בְּתוֹךְ significa literalmente «en el medio / en medio de». «En medio de Egipto» conserva la imagen hebrea de manera clara y readable. «En Egipto» es más breve, pero atenúa la fuerza del énfasis espacial; «dentro de Egipto» es posible, aunque menos natural en este contexto.
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - contra Faraón
  - para Faraón
  lexicon: HALOT
  rationale: La preposición לְ es más amplia que un simple «contra», aunque el contexto es de actos de juicio dirigidos al destinatario. «A Faraón» mantiene la forma de la relación preposicional sin forzar la interpretación. «Contra Faraón» expresa el sentido contextual, pero lo hace explícito de modo más interpretivo.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - monarca de Egipto
  lexicon: HALOT
  rationale: Construcción nominal estándar. «Rey de Egipto» es directa, natural y plenamente fiel.
- source_word: וּלְכָל אַרְצוֹ
  english_pob_choice: and to all his land
  chosen_spanish: y a toda su tierra
  alternatives_spanish:
  - y a toda su nación
  - y a todo su país
  lexicon: HALOT
  rationale: אֶרֶץ aquí puede referirse a territorio o tierra. «Tierra» mantiene el alcance geográfico amplio del hebreo y la referencia posesiva («su»). «País» puede sonar más moderno, pero estrecha el matiz territorial; «nación» cambiaría el referente del hebreo.
- source_word: וְאֶת ... וְאֶת
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - tanto ... como
  - así como
  lexicon: HALOT
  rationale: La repetición coordinada se refleja de forma simple con «y ... y», preservando la acumulación retórica del hebreo. Otras opciones reorganizan la frase y suavizan la estructura original.
theological_decisions:
- issue: Si לְ en לְפַרְעֹה debe traducirse como dirección neutral o como hostilidad judicial
  english_pob_reading: The Hebrew preposition is literally 'to,' but the context is of acts directed in judgment.
  chosen_spanish_reading: «a Faraón» mantiene la literalidad de la relación preposicional, mientras el contexto de juicio queda sugerido por la secuencia completa.
  alternative_spanish_readings:
  - «contra Faraón»
  - «en contra de Faraón»
  rationale: El hebreo no usa aquí una preposición inequívocamente hostil; la hostilidad proviene del contexto narrativo y teológico. En español, «a Faraón» evita imponer una interpretación demasiado explícita en la línea principal, pero la nota puede reconocer el sentido contextual de juicio.
  doctrine_reference: Éxodo y Deuteronomio presentan las señales y plagas como actos judiciales de Yahvé contra Egipto y Faraón.
translation_notes:
  revision_awareness: Se siguió el contexto auditado del texto inglés POB, que mantiene la coordinación de objetos, conserva la expresión espacial fuerte «in the midst of Egypt» y anota la posible lectura judicial de לְ. No se registraron revisiones posteriores que alteraran ese enfoque.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología base del proyecto cuando el versículo lo requiera en contexto cercano, aunque aquí el hebreo no lo nombra explícitamente.
  - Se eligió «Faraón» con mayúscula como nombre/título en el registro bíblico español.
  - 'Se preservó la acumulación retórica con dos grupos coordinados: «señales» y «hechos».'
