revisions:
- from: Pero el pueblo no volvió[a] al que los hirió, ni buscó a Yahvé de los Ejércitos.
  to: Pero el pueblo no volvió[a] a quien los hirió, ni buscaron a Yahvé de los Ejércitos.
  rationale: Se ajusta el segundo verbo a plural ('buscaron') para reflejar mejor el hebreo y sonar más natural en español, manteniendo el sujeto colectivo 'el pueblo'. También se suaviza 'al que' a 'a quien', que resulta un poco más digno y fluido sin cambiar el sentido. Se conserva la nota léxica ya presente porque está bien formada y no introduce ambigüedad.
