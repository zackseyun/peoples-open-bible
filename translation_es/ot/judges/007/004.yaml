translation:
  language: es
  text: 'Entonces Yahvé dijo a Gedeón[a]: «Todavía el pueblo es demasiado numeroso. Hazlos descender al agua, y allí los probaré para ti. Y sucederá que el que yo te diga: “Este irá contigo”, ese irá contigo; y todo aquel que yo te diga: “Este no irá contigo”, ese no irá contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «lo refinaré para ti allí», usando un verbo empleado con frecuencia para fundir o purificar metal; aquí significa probar o examinar al pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del pacto, conforme al estándar del proyecto en español. «Yahvé» evita la máscara litúrgica «SEÑOR» y es natural en registro bíblico moderno.
- source_word: עוֹד הָעָם רָב
  english_pob_choice: The people are still too many
  chosen_spanish: Todavía el pueblo es demasiado numeroso
  alternatives_spanish:
  - El pueblo sigue siendo muy numeroso
  - El pueblo aún es mucho
  lexicon: HALOT
  rationale: «עוֹד» con «רָב» comunica una cantidad excesiva en contexto narrativo, no solo que el pueblo es numeroso. «Demasiado numeroso» preserva esa fuerza.
- source_word: הוֹרֵד אוֹתָם אֶל הַמַּיִם
  english_pob_choice: Bring them down to the water
  chosen_spanish: Hazlos descender a las aguas
  alternatives_spanish:
  - Llévalos a las aguas
  - Bájalos a las aguas
  lexicon: HALOT
  rationale: El causativo de ירד se refleja bien con «hacer descender». «A las aguas» mantiene el plural y el matiz más literal del hebreo, sin sonar forzado.
- source_word: וְאֶצְרְפֶנּוּ לְךָ שָׁם
  english_pob_choice: and there I will test them for you
  chosen_spanish: y allí los probaré para ti
  alternatives_spanish:
  - y allí los refinaré para ti
  - y allí los examinaré para ti
  lexicon: HALOT
  rationale: El verbo צרף conserva la imagen de refinar/metales, pero en esta escena funciona como prueba divina. «Probar» mantiene la metáfora y la intención narrativa sin introducir una explicación ajena al texto.
- source_word: וְהָיָה
  english_pob_choice: And it shall be that
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: Se preserva la función de introducción procedimental del hebreo con una fórmula natural en español. «Sucederá que» comunica el encadenamiento formal del procedimiento.
- source_word: אֲשֶׁר אֹמַר אֵלֶיךָ זֶה יֵלֵךְ אִתָּךְ
  english_pob_choice: the one of whom I say to you, ‘This one shall go with you,’
  chosen_spanish: 'el que yo te diga: “Este irá contigo”'
  alternatives_spanish:
  - 'aquel de quien yo te diga: “Este irá contigo”'
  - 'el que yo diga a ti: “Este irá contigo”'
  lexicon: HALOT
  rationale: La construcción distributiva se vierte con «el que yo te diga», que respeta la selección individual. Se conserva el demostrativo «este» para reflejar el índice de designación del hebreo.
- source_word: הוּא יֵלֵךְ אִתָּךְ
  english_pob_choice: he shall go with you
  chosen_spanish: ese irá contigo
  alternatives_spanish:
  - él irá contigo
  - ese mismo irá contigo
  lexicon: HALOT
  rationale: El pronombre resumptivo intensifica la confirmación. «Ese» mantiene la referencia enfatizada al seleccionado y evita neutralizar el singular marcado.
- source_word: וְכֹל אֲשֶׁר אֹמַר אֵלֶיךָ זֶה לֹא יֵלֵךְ עִמָּךְ
  english_pob_choice: but anyone of whom I say to you, ‘This one shall not go with you,’
  chosen_spanish: 'y todo aquel que yo te diga: “Este no irá contigo”'
  alternatives_spanish:
  - 'y cualquiera de quien yo te diga: “Este no irá contigo”'
  - 'pero todo aquel que yo te diga: “Este no irá contigo”'
  lexicon: HALOT
  rationale: «וְכֹל» aquí funciona de modo distributivo en contraste con la cláusula anterior. «Todo aquel» conserva la amplitud distributiva sin perder la estructura formal del hebreo.
- source_word: עִמָּךְ / אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - a tu lado
  lexicon: HALOT
  rationale: En español, «contigo» es la forma natural y fiel de «con + tú» en diálogo directo. Se unifica la variación hebrea entre dos preposiciones que en español no requieren distinción.
- source_word: הוּא לֹא יֵלֵךְ
  english_pob_choice: he shall not go
  chosen_spanish: ese no irá
  alternatives_spanish:
  - él no irá
  - ese mismo no irá
  lexicon: HALOT
  rationale: Se conserva el pronombre enfático con «ese», que reproduce la reafirmación final de exclusión. El futuro simple expresa adecuadamente la decisión divina.
theological_decisions:
- issue: La prueba divina mediante el agua
  english_pob_reading: God says he will test the people at the water
  chosen_spanish_reading: Dios dice que los probará allí
  alternative_spanish_readings:
  - Dios dice que los refinará allí
  - Dios dice que los examinará allí
  rationale: «Probar» permite conservar la imagen de refinamiento del verbo צרף sin forzar al lector con una metalurgia explícita. La escena narra un criterio divino de selección; la traducción mantiene esa función.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza del distributivo en la selección
  english_pob_reading: the one ... he shall go / everyone ... he shall not go
  chosen_spanish_reading: el que ... ese irá / todo aquel ... ese no irá
  alternative_spanish_readings:
  - el que ... él irá / todo aquel ... él no irá
  - aquel ... irá / cualquiera ... no irá
  rationale: El hebreo usa singular masculino para cada individuo. En español se conserva con singular marcado y demostrativos distintos para no borrar la selección individual ni suavizar el contraste.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que prefirió una formulación más literal para la introducción procedimental ('And it shall be that') y ajustó el distributivo a un registro más formal. En español se siguió esa dirección con «Y sucederá que» y con construcciones distributivas como «el que» y «todo aquel», manteniendo la literalidad funcional sin sonar rígido.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se preserva la imagen de selección/probación con «probaré», y se marca la nota del sentido de refinación metálica en la nota al pie.
  - Se mantiene la distinción entre las fórmulas repetidas con «contigo» para una lectura natural en español, sin perder el paralelismo hebreo.
  - Se conserva el singular enfático en la cláusula final mediante «ese», evitando neutralizar el matiz individual del hebreo.
