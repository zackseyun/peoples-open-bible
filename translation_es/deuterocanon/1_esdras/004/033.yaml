translation:
  language: es
  text: Entonces el rey y los nobles[a] se miraron unos a otros, y comenzó a hablar acerca de la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los grandes hombres» o «los magnates». El griego se refiere a figuras cortesanas de alto rango.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: LSJ
  rationale: El sustantivo griego designa al rey en sentido directo; en español moderno 'el rey' es la equivalencia natural y fiel.
- source_word: οἱ μεγιστᾶνες
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los magnates
  - los grandes hombres
  - los oficiales
  lexicon: LSJ
  rationale: El término apunta a figuras cortesanas de alto rango. 'Nobles' preserva ese estatus social y suena natural en español; 'magnates' sería más marcado y menos fluido.
- source_word: ἔβλεπον
  english_pob_choice: looked
  chosen_spanish: se miraban
  alternatives_spanish:
  - miraban
  - se fijaban el uno en el otro
  lexicon: LSJ
  rationale: El imperfecto narrativo expresa una acción en curso; en español, 'se miraban' comunica mejor la reciprocidad y el matiz progresivo que un simple pretérito.
- source_word: εἷς τὸν ἕτερον
  english_pob_choice: at one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - el uno al otro
  - uno al otro
  lexicon: LSJ
  rationale: Es un idiomatismo recíproco. 'Unos a otros' es claro, natural y conserva la reciprocidad del griego sin sobrecargar la frase.
- source_word: ἤρξατο λαλεῖν
  english_pob_choice: began to speak
  chosen_spanish: comenzó a hablar
  alternatives_spanish:
  - empezó a hablar
  - comenzó a decir
  lexicon: LSJ
  rationale: La construcción inceptiva se traduce de manera directa y digna. 'Comenzó a hablar' es la formulación más natural en español para marcar el inicio del discurso.
- source_word: περὶ τῆς ἀληθείας
  english_pob_choice: about the truth
  chosen_spanish: acerca de la verdad
  alternatives_spanish:
  - sobre la verdad
  - con respecto a la verdad
  lexicon: LSJ
  rationale: 'El artículo griego favorece una referencia definida: no solo ''verdad'' en abstracto, sino ''la verdad'' como asunto concreto de discusión. ''Acerca de'' mantiene un registro sobrio y claro.'
translation_notes:
  revision_awareness: El texto griego breve y el audit trail inglés coinciden sustancialmente; no se documentan revisiones materiales ni variantes textuales relevantes. Se conservó la referencia definida de 'la verdad' y el valor recíproco del giro verbal sin expandir el contenido.
  spanish_consistency_notes:
  - Se mantiene 'nobles' para μεγιστᾶνες, en consonancia con la decisión inglesa y con un registro español natural.
  - Se traduce el imperfecto con una forma progresiva ('se miraban') para reflejar la escena narrativa.
  - Se usa 'la verdad' con artículo definido, siguiendo la observación del audit trail inglés sobre el referente concreto del pasaje.
