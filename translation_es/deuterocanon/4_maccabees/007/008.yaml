translation:
  language: es
  text: Tales hombres deben ser los que establecen la ley con su propia sangre[a], y la defienden con noble sudor mediante sufrimientos hasta la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que sostienen la ley»; el verbo griego puede sugerir hacer, producir o hacer que algo se mantenga en pie, y aquí probablemente significa afirmar la ley mediante la fidelidad vivida, no promulgarla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιούτους
  english_pob_choice: Such men
  chosen_spanish: Tales hombres
  alternatives_spanish:
  - Hombres como estos
  - Tales personas
  lexicon: LSJ
  rationale: El demostrativo griego apunta al tipo de personas en vista. En español, "Tales hombres" conserva la referencia masculina del contexto y fluye con naturalidad.
- source_word: δεῖ
  english_pob_choice: must be
  chosen_spanish: deben ser
  alternatives_spanish:
  - han de ser
  - es necesario que sean
  lexicon: LSJ
  rationale: Expresa necesidad de modo directo y natural en español, sin debilitar la fuerza normativa del verbo griego.
- source_word: τοὺς δημιουργοῦντας τὸν νόμον
  english_pob_choice: those who establish the law
  chosen_spanish: los que establecen la ley
  alternatives_spanish:
  - los que sostienen la ley
  - los que hacen la ley
  - los que hacen prevalecer la ley
  lexicon: LSJ
  rationale: La decisión sigue la lectura auditada de que δημιουργέω aquí no significa legislar, sino hacer que la ley quede afirmada por la acción fiel. "Establecen" conserva esa fuerza de confirmar/afirmar sin sugerir creación legislativa.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: LSJ
  rationale: En este contexto judío remite a la ley ancestral/divina. Se mantiene en minúscula para un registro sobrio y porque el español no requiere capitalización teológica aquí.
- source_word: ἰδίῳ αἵματι
  english_pob_choice: with their own blood
  chosen_spanish: con su propia sangre
  alternatives_spanish:
  - por su propia sangre
  - mediante su propia sangre
  lexicon: LSJ
  rationale: El dativo instrumental se vierte de manera idiomática. "Con" conserva el matiz de medio y el tono sacrificial/corporal del original.
- source_word: γενναίῳ ἱδρῶτι
  english_pob_choice: with noble sweat
  chosen_spanish: con noble sudor
  alternatives_spanish:
  - con sudor valiente
  - con sudor generoso
  - con esforzado sudor
  lexicon: LSJ
  rationale: Se conserva la imagen concreta del sudor. "Noble" traduce el valor de γενναῖος como noble/valiente y mantiene el tono elevado del pasaje.
- source_word: τοῖς μέχρι θανάτου πάθεσιν
  english_pob_choice: through sufferings unto death
  chosen_spanish: por medio de sufrimientos hasta la muerte
  alternatives_spanish:
  - mediante sufrimientos hasta la muerte
  - a través de sufrimientos hasta la muerte
  - con sufrimientos hasta la muerte
  lexicon: LSJ
  rationale: '"Por medio de" expresa el instrumento o medio de la defensa; "hasta la muerte" conserva μέχρι θανάτου sin añadir una interpretación que cierre el proceso antes de tiempo. "Sufrimientos" reproduce πάθη en su sentido de padecimientos/endurecimientos.'
- source_word: ὑπερασπίζοντας
  english_pob_choice: defend it
  chosen_spanish: la defienden
  alternatives_spanish:
  - la protegen
  - luchan en defensa de ella
  - la amparan
  lexicon: LSJ
  rationale: El participio implica defender/proteger con firmeza. "La defienden" es directo, claro y mantiene el objeto implícito de la ley.
theological_decisions:
- issue: Sentido de δημιουργοῦντας τὸν νόμον
  english_pob_reading: those who establish the law
  chosen_spanish_reading: los que establecen la ley
  alternative_spanish_readings:
  - los que sostienen la ley
  - los que hacen la ley
  rationale: La POB inglesa entiende el verbo en sentido de confirmar/establecer la ley por la fidelidad vivida, no de redactarla como legisladores. La opción española preserva esa tensión semántica sin convertirla en mera legislación humana.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia masculina del sujeto
  english_pob_reading: Such men
  chosen_spanish_reading: Tales hombres
  alternative_spanish_readings:
  - Tales personas
  - Tales seres humanos
  rationale: El griego usa construcción masculina y el contexto presenta un grupo de varones ejemplares. Se conserva el referente masculino sin imponer una genericidad que borre el dato gramatical.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ordenar la segunda cláusula como ''with noble sweat defend it through sufferings unto death'' a la forma final ''defend it with noble sweat through sufferings unto death''. La redacción española refleja esa cadencia natural, pero resuelve el medio y el camino con una estructura idiomática propia: ''la defienden con noble sudor por medio de sufrimientos hasta la muerte''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando aparezca el nombre divino en otros contextos; aquí no aparece.
  - Se preserva 'la ley' en minúscula por coherencia con el contexto judío y con el estilo sobrio del proyecto.
  - '''Sufrimientos'' se usa para πάθη en lugar de ''pasiones'', porque aquí el contexto es martirial y de padecimiento.'
  - No se introduce 'Cristo' ni terminología eclesial ajena al texto.
  - El marcador [a] aparece exactamente junto al segmento que admite la alternativa lexical documentada.
