  text: הִגִּ֥יד לְ/ךָ֛ אָדָ֖ם מַה טּ֑וֹב וּ/מָֽה יְהוָ֞ה דּוֹרֵ֣שׁ מִמְּ/ךָ֗ כִּ֣י אִם עֲשׂ֤וֹת מִשְׁפָּט֙ וְ/אַ֣הֲבַת חֶ֔סֶד וְ/הַצְנֵ֥עַ לֶ֖כֶת עִם אֱלֹהֶֽי/ךָ־־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/micah/006/008.yaml
  text: He has told you[a], O man, what is good; and what does Yahweh require of you but to do justice, and to love steadfast love[b], and to walk humbly with your God?
  footnotes:
  - marker: a
    text: Or 'to love mercy,' 'to love kindness,' or 'to love covenant loyalty.' The Hebrew חֶסֶד carries the sense of loyal, steadfast love within covenant relationship.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'O man' uses a singular representative address to a human hearer.
    reason: cultural_note
