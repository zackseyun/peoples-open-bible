translation:
  language: es
  text: Y el número de los que lamían, llevando el agua con su mano a su boca[a], fue de trescientos hombres; pero todos los demás del pueblo se arrodillaron sobre las rodillas para beber agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde su mano hasta su boca». La frase hebrea destaca que levantaban el agua con la mano en vez de arrodillarse para beber directamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר
  english_pob_choice: the number of
  chosen_spanish: el número de
  alternatives_spanish:
  - la cantidad de
  - el conteo de
  lexicon: HALOT
  rationale: En español, ‘el número de’ transmite con naturalidad el valor cuantitativo del sustantivo hebreo sin perder el tono narrativo formal.
- source_word: הַמֲלַקְקִים
  english_pob_choice: those lapping
  chosen_spanish: los que lamían
  alternatives_spanish:
  - los que estaban lamiendo
  - los lamedores
  lexicon: HALOT
  rationale: El participio describe a un grupo en acción; ‘los que lamían’ conserva la imagen física viva del hebreo y evita un sustantivo artificial.
- source_word: בְּיָדָם אֶל פִּיהֶם
  english_pob_choice: with their hand to their mouth
  chosen_spanish: llevando el agua con su mano a su boca
  alternatives_spanish:
  - con su mano a su boca
  - desde su mano hasta su boca
  lexicon: HALOT
  rationale: La expresión hebrea destaca que alzaban el agua con la mano hasta la boca. En español, ‘llevando el agua con su mano a su boca’ comunica esa acción de forma clara y mantiene el contraste con arrodillarse para beber directamente. Se preserva el singular distributivo por persona, como en el audit trail inglés.
- source_word: שְׁלֹשׁ מֵאוֹת אִישׁ
  english_pob_choice: three hundred men
  chosen_spanish: trescientos hombres
  alternatives_spanish:
  - trescientas personas
  - trescientos varones
  lexicon: HALOT
  rationale: ‘Hombres’ encaja con el contexto militar y mantiene la correspondencia directa con אִישׁ después de un numeral.
- source_word: וְכֹל יֶתֶר הָעָם
  english_pob_choice: but all the rest of the people
  chosen_spanish: pero todo el resto del pueblo
  alternatives_spanish:
  - y todo el resto del pueblo
  - todo lo demás del pueblo
  lexicon: HALOT
  rationale: Aunque el hebreo usa ו, el contraste en el contexto favorece ‘pero’. ‘Pueblo’ refleja הָעָם de modo natural y solemne.
- source_word: כָּרְעוּ
  english_pob_choice: knelt
  chosen_spanish: se arrodilló
  alternatives_spanish:
  - se inclinó
  - se puso de rodillas
  lexicon: HALOT
  rationale: ‘Arrodillarse’ expresa el gesto corporal de manera directa en español y conserva la fuerza de la postura opuesta a lamer el agua.
- source_word: עַל בִּרְכֵיהֶם
  english_pob_choice: on their knees
  chosen_spanish: sobre sus rodillas
  alternatives_spanish:
  - en sus rodillas
  - sobre las rodillas
  lexicon: HALOT
  rationale: ‘Sobre sus rodillas’ sigue de cerca la frase hebrea y mantiene la imagen corporal completa. Evita suavizar la repetición que subraya la postura.
- source_word: לִשְׁתּוֹת מָיִם
  english_pob_choice: to drink water
  chosen_spanish: para beber agua
  alternatives_spanish:
  - para tomar agua
  - para beber
  lexicon: HALOT
  rationale: ‘Beber agua’ es la equivalencia más directa y digna; conserva la concreción del objeto explícito en hebreo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el presente borrador mantiene el sentido del texto fuente y la oposición narrativa entre los que lamían el agua con la mano y los que se arrodillaban para beber.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ cuando el Tetragrámaton aparezca en textos relacionados; en este versículo no aparece.
  - Se conserva un registro bíblico contemporáneo, claro y digno, sin depender de formulaciones tradicionales que oculten el matiz corporal del hebreo.
  - La nota textual/lexical está anclada en la frase correspondiente para reflejar la alternativa documentada del audit trail inglés.
