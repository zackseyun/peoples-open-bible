translation:
  language: es
  text: Entonces Moisés presentó el caso de ellas[a] ante Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'presentó el reclamo legal de ellas ante Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: brought
  chosen_spanish: llevó
  alternatives_spanish:
  - presentó
  - trajo
  - acercó
  lexicon: HALOT
  rationale: El hifil de קרב puede significar 'hacer acercar' o 'presentar'. En este contexto jurídico, 'llevó' comunica de manera natural que Moisés puso el asunto ante la autoridad de Yahvé para decisión, sin perder la idea de acercamiento formal.
- source_word: מִשְׁפָּטָהּ/מִשְׁפָּטָן
  english_pob_choice: their case
  chosen_spanish: su caso
  alternatives_spanish:
  - su causa
  - su reclamo legal
  - su litigio
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a juicio, decisión legal o caso. Con el sufijo femenino plural, aquí se trata del asunto jurídico de las hijas; 'su caso' es natural en español y conserva el matiz de apelación legal.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: '''Ante'' expresa de forma idiomática en español la presentación de una causa ante una autoridad judicial o superior. Conserva el valor relacional de ''before'' sin sonar forzado.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la política del proyecto de traducir el Tetragrámaton como 'Yahvé', preservando el nombre divino propio en lugar de sustituirlo por un título.
- source_word: וַ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: La waw narrativa avanza la secuencia de hechos; 'Así que' refleja bien la conexión consecuencial con la escena previa y suena natural en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre del pacto. La lectura española 'Yahvé' preserva ese nombre propio y evita la sustitución por un título, conforme a la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene la equivalencia óptima: ''brought'' / ''presented'' para וַיַּקְרֵב y ''their case'' / ''legal claim'' para מִשְׁפָּט. La versión española conserva esa tensión entre el giro jurídico y una lectura más idiomática, sin reducirla a una paráfrasis.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para יְהוָה según la norma del proyecto; 'Yahvé' mantiene consistencia con otros pasajes.
  - '''Caso'' conserva el registro jurídico amplio de מִשְׁפָּט sin tecnicismos innecesarios.'
  - '''Ante'' funciona en español como equivalente formal de la presentación de una causa ante una autoridad.'
