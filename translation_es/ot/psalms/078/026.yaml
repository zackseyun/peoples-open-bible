translation:
  language: es
  text: Hizo soplar el viento del oriente[a] en los cielos[b], y con su poder dirigió el viento del sur[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘hizo partir el viento del oriente en los cielos’.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘cielos’; en este paralelo poético puede referirse al ámbito donde soplan los vientos.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘sur’; aquí probablemente ‘viento del sur’ por paralelismo con ‘viento del oriente’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסַּע
  english_pob_choice: stirred up
  chosen_spanish: Hizo soplar
  alternatives_spanish:
  - desató
  - hizo levantarse
  - puso en movimiento
  lexicon: HALOT
  rationale: El hifil de נסע puede expresar causar que algo ‘salga’ o se ponga en marcha. En español, aplicado al viento, ‘hizo soplar’ comunica la acción eficaz de Dios sin perder naturalidad ni diluir la causación divina.
- source_word: קָדִים
  english_pob_choice: east wind
  chosen_spanish: viento del oriente
  alternatives_spanish:
  - viento de oriente
  - viento oriental
  - oriente
  lexicon: HALOT
  rationale: En este contexto poético, קָדִים funciona como viento direccional, no solo como punto cardinal. ‘Viento del oriente’ conserva el valor meteorológico y mantiene el paralelismo con ‘viento del sur’.
- source_word: בַּשָּׁמָיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: HALOT
  rationale: El plural hebreo שָׁמַיִם se refleja mejor con ‘los cielos’, que conserva el registro poético y la forma plural del original. La nota aclara la posible lectura espacial sin borrar el matiz formal.
- source_word: וַיְנַהֵג
  english_pob_choice: guided
  chosen_spanish: dirigió
  alternatives_spanish:
  - condujo
  - guio
  - llevó
  lexicon: HALOT
  rationale: נהג puede significar conducir, guiar o dirigir. ‘Dirigió’ preserva la idea de control soberano sobre el viento y suena más natural en español con el complemento instrumental.
- source_word: בְּעֻזּוֹ
  english_pob_choice: by his strength
  chosen_spanish: con su poder
  alternatives_spanish:
  - por su fuerza
  - con su fuerza
  - por su poder
  lexicon: HALOT
  rationale: עֹז denota fuerza, poder o vigor. ‘Con su poder’ expresa el medio o la manera de su acción y resulta idiomático en español, sin perder la fuerza semántica del hebreo.
- source_word: תֵימָן
  english_pob_choice: south wind
  chosen_spanish: viento del sur
  alternatives_spanish:
  - sur
  - viento meridional
  lexicon: HALOT
  rationale: Aunque literalmente puede significar ‘sur’, el paralelismo con קדים favorece aquí un término de viento direccional. ‘Viento del sur’ hace explícita esa función en español y evita ambigüedad.
theological_decisions:
- issue: Agencia divina sobre los vientos
  english_pob_reading: The verse is rendered to show God actively setting and directing the winds.
  chosen_spanish_reading: El versículo presenta a Dios como quien pone en movimiento y dirige los vientos.
  alternative_spanish_readings:
  - Una descripción impersonal de vientos que simplemente se levantan
  - Una formulación que atenúe la acción divina
  rationale: Los dos verbos hebreos tienen a Dios como sujeto. La traducción conserva esa agencia soberana sin añadir contenido doctrinal ajeno al texto, en armonía con el énfasis del salmo en la provisión de Yahvé.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la revisión más reciente; esta propuesta sigue la lectura aprobada y conserva las alternativas léxicas señaladas en el aparato inglés, adaptándolas a un español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto fuente lo exija explícitamente; aquí el versículo no contiene el tetragrámaton.
  - Se evita ‘SEÑOR’ como sustituto automático, pero tampoco aparece una referencia nominal directa a Dios en el hebreo de este versículo.
  - ‘Cielos’ preserva el plural hebreo de שָׁמַיִם y no se reduce a ‘cielo’ salvo en una nota explicativa.
  - ‘Viento del oriente’ y ‘viento del sur’ reflejan el sentido meteorológico contextual de קָדִים y תֵימָן.
