revisions:
- from: Y tus hijos serán pastores[a] en el desierto por cuarenta años, y llevarán[b] tu infidelidad hasta que vuestros cadáveres[c] sean consumidos en el desierto.
  to: Y sus hijos serán pastores[a] en el desierto por cuarenta años, y cargarán con[b] su infidelidad, hasta que sus cadáveres sean consumidos en el desierto[c].
  rationale: Se unificó la referencia pronominal para evitar la mezcla impropia de 'tus/tu' con 'vuestros' y para sonar natural en español neutral latinoamericano al dirigirse al pueblo como plural colectivo. Se ajustó 'llevarán' a 'cargarán con' por mayor naturalidad en español sin apartarse del sentido de נשא. También se corrigió la nota alternativa final para reflejar la alternativa documentada sobre תֹּם, no un simple cambio de 'cadáveres' a 'cuerpos'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:09:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: los hijos/sons, el ser ''pastores'', la duración de cuarenta años, el cargar con la infidelidad del pueblo y el final de los cadáveres en el desierto. Sin embargo, no preserva de manera consistente la segunda persona plural del hebreo, pues mezcla ''tus'' con ''vuestros''. Además, la nota [c] no corresponde bien a la alternativa inglesa documentada, que contrasta ''cadáveres/corpses'' con ''cuerpos'' sino la construcción ''hasta que vuestros cadáveres lleguen a su fin''.'
  spanish_quality_summary: El español es claro y digno, pero la mezcla de tuteo singular ('tus', 'tu') con plural peninsular ('vuestros') rompe la naturalidad y la coherencia, especialmente para un objetivo neutral latinoamericano. También 'llevarán tu infidelidad' suena menos idiomático que 'cargarán con su infidelidad' o 'cargarán con vuestra infidelidad', pero puede mantenerse si se corrige la persona; aun así, 'cargarán con' expresa mejor el sentido de soportar consecuencias en español.
  glossary_alignment: 'No hay conflictos con la terminología mayor del proyecto. ''Pastores'' para רֹעִים y ''infidelidad'' para זְנוּתֵיכֶם están alineados con el audit trail. ''Desierto'' es una opción aceptable para מִדְבָּר en español. La principal desviación es gramatical/pragmática: la referencia de segunda persona plural debe mantenerse de forma uniforme en español neutral.'
  issues:
  - severity: high
    issue: Mezcla inconsistente de tratamiento de segunda persona
    rationale: El texto usa 'tus hijos' y 'tu infidelidad', pero luego 'vuestros cadáveres'. El hebreo es 2mp en todo el versículo; en español debe unificarse. Para español neutral latinoamericano, conviene usar 'sus hijos ... su infidelidad ... sus cadáveres' al dirigirse al pueblo como plural, o bien una línea plenamente plural. La mezcla actual es incorrecta estilísticamente.
  - severity: medium
    issue: La nota [c] no refleja la alternativa documentada en inglés
    rationale: La alternativa inglesa es 'until your corpses come to an end in the wilderness', es decir, una variante de la cláusula verbal, no simplemente sustituir 'cadáveres' por 'cuerpos'. La nota española debería preservar esa alternativa semántica.
  - severity: medium
    issue: '''llevarán'' es posible pero menos natural aquí que ''cargarán con'''
    rationale: נשא con objeto abstracto de culpa/consecuencia suele sonar más natural en español como 'cargar con' o 'soportar'. Dado que el audit trail permite 'carry/bear/suffer for', una leve mejora de idiomaticidad ayuda sin perder fuerza.
  revised_spanish_text: Y sus hijos serán pastores[a] en el desierto por cuarenta años, y cargarán con[b] su infidelidad, hasta que sus cadáveres sean consumidos en el desierto[c].
  revised_footnotes:
  - marker: a
    text: O 'errantes' para 'pastores'; la palabra hebrea se relaciona literalmente con el pastoreo, pero algunos la entienden como énfasis en su andar nómada.
    reason: lexical_alternative
  - marker: b
    text: O 'llevarán' o 'sufrirán por'; el hebreo expresa cargar o soportar las consecuencias de la infidelidad.
    reason: lexical_alternative
  - marker: c
    text: O 'hasta que sus cadáveres lleguen a su fin en el desierto'.
    reason: alternative_reading
  revision_rationale: Se unificó la referencia pronominal para evitar la mezcla impropia de 'tus/tu' con 'vuestros' y para sonar natural en español neutral latinoamericano al dirigirse al pueblo como plural colectivo. Se ajustó 'llevarán' a 'cargarán con' por mayor naturalidad en español sin apartarse del sentido de נשא. También se corrigió la nota alternativa final para reflejar la alternativa documentada sobre תֹּם, no un simple cambio de 'cadáveres' a 'cuerpos'.
