    text: Expresión legal-moral hebrea para derramamiento de sangre cometido sin causa justa; implica culpa de sangre.
    reason: cultural_note
  revision_rationale: Se reemplazó 'atácalo' por 'derríbalo' para conservar la fuerza letal del contexto sin abandonar del todo el color idiomático del hebreo; se movió la nota léxica al verbo correcto; se eliminó la nota redundante sobre 'atácalo'; se ajustó 'así apartarás' a la coordinación directa 'y quita' para reflejar mejor la forma y la revisión auditada; y se corrigió el anglicismo 'sangreguilt' por 'culpa de sangre'.
