translation:
  language: es
  text: Sus tenazas[a] y sus recogedores[b] serán de oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus despabiladeras'; el término hebreo se refiere a un instrumento para asir o recortar asociado con el candelabro.
    reason: lexical_alternative
  - marker: b
    text: O 'sus bandejas' o, menos probablemente en este contexto, 'sus incensarios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְקָחֶיהָ
  english_pob_choice: its tongs
  chosen_spanish: sus tenazas
  alternatives_spanish:
  - sus pinzas
  - sus tenazas para mechas
  - sus snuffers
  lexicon: HALOT
  rationale: El término designa un utensilio para asir o recortar en el contexto del candelabro. En español, 'tenazas' comunica de manera natural la función de agarrar o manipular; 'pinzas' también sería posible, pero 'tenazas' conserva mejor la imagen de herramienta de metal y evita un tecnicismo poco común.
- source_word: מַחְתֹּתֶיהָ
  english_pob_choice: its firepans
  chosen_spanish: sus braseros
  alternatives_spanish:
  - sus bandejas
  - sus incensarios
  - sus recipientes para brasas
  lexicon: HALOT
  rationale: El sustantivo puede referirse a recipientes para fuego o brasas. En este contexto de mobiliario sagrado, 'braseros' transmite mejor el instrumento destinado a contener fuego/brasas que 'bandejas', y evita especificar innecesariamente 'incensarios', que sería demasiado estrecho.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - oro puro
  - de oro refinado
  lexicon: HALOT
  rationale: La expresión describe directamente la materia de los utensilios. 'De oro puro' es la formulación natural en español y preserva la composición material sin añadir matices no presentes en el hebreo.
- source_word: וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción une los dos utensilios. 'Y' es la coordinación normal en español y refleja de forma directa el hebreo.
- source_word: -הָ
  english_pob_choice: its
  chosen_spanish: sus
  alternatives_spanish:
  - su
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera femenina singular remite al candelabro. En español, el plural posesivo 'sus' es el equivalente natural cuando se enumeran dos objetos poseídos por un referente singular.
translation_notes:
  revision_awareness: 'El inglés POB mantiene una traducción simple y transparente con dos notas de alternativa léxica: ''snuffers'' para מַלְקָחֶיהָ y ''trays''/''censers'' para מַחְתֹּתֶיהָ. El español sigue esa misma línea de claridad, eligiendo términos idiomáticos que conservan la función cultual sin introducir una interpretación más estrecha que el hebreo.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o cualquier sustitución teológica porque el versículo no contiene el Nombre divino ni un título divino.
  - '''Oro puro'' se mantiene sin añadir ''fino'' o ''refinado'' para no desplazar el matiz directo de טָהוֹר.'
  - '''Braseros'' se prefiere a ''incensarios'' porque el hebreo y el audit trail inglés dejan abierta la función exacta del recipiente; el español no debe cerrarla más de lo que hace la fuente.'
