translation:
  language: ko
  text: 죽음아, 너의 승리가 어디에 있느냐? 죽음아, 너의 가시가 어디에 있느냐?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 호세아 13:14의 자유로운 인용. 일부 사본은 첫 절에서 「가시」를, 둘째 절에서 「승리」를 둔다(KJV 등 전통 번역의 근거). 또한 호세아 본문의 κύριος는 야훼를 가리키는데, 본 절은 바울이 그 본문을 자유롭게 인용하므로 신적 이름이 직접 등장하지는 않는다.
    reason: cross_reference
lexical_decisions:
- source_word: κέντρον
  english_pob_choice: sting
  chosen_korean: 가시
  alternatives_korean:
  - 독침
  lexicon: BDAG
  rationale: 본래 「뾰족한 침」을 가리키며, 한국어 관용으로 「가시」가 자연스럽다.
theological_decisions:
- issue: 호세아 13:14 인용에서의 신적 이름 처리
  chosen_reading: 신적 이름이 본문에 직접 나타나지 않음
  alternative_readings:
  - 원전(호 13:14)은 야훼의 말씀
  rationale: 본 절의 헬라어 본문에는 κύριος가 등장하지 않으므로 「야훼」 복원의 직접 대상이 아니다. 원문 호세아의 신적 발화 정황은 각주에 명시한다.
  doctrine_reference: 'KO glossary: κύριος=YHWH only where κύριος appears in the citation'
