id: GEN.49.18
reference: Genesis 49:18
source:
  edition: WLC
  text: לִֽ/ישׁוּעָתְ/ךָ֖ קִוִּ֥יתִי יְהוָֽה׃
translation:
  text: For your salvation I wait[a], O Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have waited for your deliverance, O Yahweh.' The Hebrew can also be rendered with 'deliverance' for 'salvation,' and the divine name is literally YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִישׁוּעָתְךָ
  chosen: for your salvation
  alternatives:
  - for your deliverance
  - for your victory
  lexicon: HALOT
  rationale: The noun יְשׁוּעָה commonly denotes salvation or deliverance. In this poetic context, 'salvation' best preserves the broader theological and existential sense without narrowing it to military rescue alone. The prefixed ל is not separately represented in English because 'wait for' naturally incorporates the object of expectation.
- source_word: קִוִּיתִי
  chosen: I wait
  alternatives:
  - I have waited
  - I hope for
  lexicon: HALOT
  rationale: The verb קוה expresses waiting with hope or expectation. English present 'I wait' works idiomatically in this brief poetic exclamation and conveys ongoing expectancy; 'I have waited' is possible but sounds more retrospective than the Hebrew necessarily requires here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
