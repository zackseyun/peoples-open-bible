  text: וַ/יְצַו֩ אַבְשָׁל֨וֹם אֶת נְעָרָ֜י/ו לֵ/אמֹ֗ר רְא֣וּ נָ֠א כְּ/ט֨וֹב לֵב אַמְנ֤וֹן בַּ/יַּ֨יִן֙ וְ/אָמַרְתִּ֣י אֲלֵי/כֶ֔ם הַכּ֧וּ אֶת אַמְנ֛וֹן וַ/הֲמִתֶּ֥ם אֹת֖/וֹ אַל תִּירָ֑אוּ הֲ/ל֗וֹא כִּ֤י אָֽנֹכִי֙ צִוִּ֣יתִי אֶתְ/כֶ֔ם חִזְק֖וּ וִ/הְי֥וּ לִ/בְנֵי חָֽיִל־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/028.yaml
  text: 'Then Absalom commanded his young men[a], saying, “Please watch: when Amnon’s heart is merry with wine, and I say to you, ‘Strike Amnon,’ then kill him. Do not fear. Have I not myself commanded you? Be strong, and be men of valor.”'
  footnotes:
