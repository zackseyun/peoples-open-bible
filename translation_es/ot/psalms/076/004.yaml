translation:
  language: es
  text: Allí quebró las flechas del arco[a], escudo y espada y guerra[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las flechas ígneas del arco». La expresión hebrea incluye un matiz de llama, fulgor o destello; por eso también puede leerse como una imagen poética de flechas con brillo ardiente.
    reason: lexical_alternative
  - marker: b
    text: O «y batalla» / «y combate». El sustantivo hebreo puede referirse a guerra o batalla; aquí se eligió «guerra» por sonar más natural en español como remate general del conjunto bélico.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁ֭מָּה
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Allí mismo
  - En ese lugar
  lexicon: HALOT
  rationale: El hebreo usa un adverbio de lugar deíctico que remite al contexto inmediato; «Allí» conserva esa referencia sin añadir el nombre del lugar que el verso no repite.
- source_word: שִׁבַּ֣ר
  english_pob_choice: he shattered
  chosen_spanish: rompió
  alternatives_spanish:
  - quebró
  - desmenuzó
  - hizo pedazos
  lexicon: HALOT
  rationale: El piel perfecto expresa una rotura enérgica y decisiva. En español, «rompió» funciona con naturalidad y mantiene la acción concreta; alternativas más fuertes como «hizo pedazos» pueden exagerar el grado no explicitado por el hebreo.
- source_word: רִשְׁפֵי קָ֑שֶׁת
  english_pob_choice: the arrows of the bow
  chosen_spanish: las flechas del arco[a]
  alternatives_spanish:
  - las flechas ígneas del arco
  - las flechas fulgurantes del arco
  - las flechas del arco, con imagen de fuego o fulgor
  lexicon: HALOT
  rationale: La POB inglesa optó por neutralizar la imagen poética de רִשְׁפֵי, tomando el sentido contextual de «arrows». En español, «flechas» transmite bien el referente; el marcador permite conservar la alternativa imagética sin forzar una lectura única en el cuerpo principal.
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - adarga
  - broquel
  lexicon: HALOT
  rationale: «Escudo» es el equivalente directo y transparente en español contemporáneo; los términos más literarios o arcaizantes no aportan mayor precisión aquí.
- source_word: וְחֶרֶב
  english_pob_choice: and sword
  chosen_spanish: y espada
  alternatives_spanish:
  - y la espada
  lexicon: HALOT
  rationale: La coordinación simple del listado bélico se conserva con «y espada», que suena natural y fiel al hebreo sin repetir innecesariamente artículos.
- source_word: וּמִלְחָמָה
  english_pob_choice: and battle
  chosen_spanish: y batalla[b]
  alternatives_spanish:
  - y guerra
  - y combate
  - y guerra/batalla
  lexicon: HALOT
  rationale: El sustantivo puede significar «guerra» o «batalla». Dado el contexto poético de armas concretas, «batalla» preserva bien el remate del inventario bélico. Se deja constancia de la alternativa en nota.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  - Pausa musical
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional porque la función exacta del término es incierta y probablemente musical/litúrgica; traducirlo sería más interpretativo que el hebreo permite.
theological_decisions:
- issue: Sujeto implícito del verbo en tercera persona singular masculina
  english_pob_reading: The implied subject is God, carried over from the surrounding context.
  chosen_spanish_reading: El sujeto implícito se entiende como Dios, retomado del contexto inmediato.
  alternative_spanish_readings:
  - Sujeto masculino no expresado
  - Él rompió... sin especificar en el verso
  rationale: El hebreo no expresa el sujeto en este verso, pero el contexto del salmo identifica a Dios como agente. La traducción española refleja ese antecedente sin añadir una afirmación doctrinal ajena al texto.
  doctrine_reference: Contexto literario del Salmo 76
- issue: Alcance de רִשְׁפֵי קָשֶׁת
  english_pob_reading: Or 'the fiery arrows of the bow.' The Hebrew expression literally involves 'flames/flashes of the bow,' a poetic way of referring to arrows with vivid imagery.
  chosen_spanish_reading: Se preserva la lectura principal de «flechas», dejando abierta la imagen de fuego o fulgor en nota.
  alternative_spanish_readings:
  - flechas ígneas del arco
  - flechas fulgurantes del arco
  rationale: La tensión entre referente concreto e imagen poética existe en el hebreo. Mantener «flechas» en el texto principal evita una sobreinterpretación, mientras la nota conserva la alternativa imagética documentada por la POB inglesa.
  doctrine_reference: Poética hebrea y semántica lexical
translation_notes:
  revision_awareness: La versión inglesa más reciente neutralizó «flashing arrows» a «arrows» y mantuvo «battle» para מִלְחָמָה; esta propuesta sigue esa revisión en el cuerpo principal, pero documenta en nota la alternativa imagética de רִשְׁפֵי. También conserva el tono formal y la lista sin artículos repetidos, acorde con la última pasada de revisión.
  spanish_consistency_notes:
  - Se usó «Allí» para el deíctico espacial, coherente con la referencia contextual sin introducir el topónimo ausente en el verso.
  - Se prefirió «escudo» y «espada» como equivalentes directos y de registro bíblico transparente.
  - Se mantuvo «Selah» sin traducir para respetar la convención POB y la incertidumbre funcional del término.
  - La puntuación conserva la cadencia poética de una lista breve y la pausa final del término litúrgico.
