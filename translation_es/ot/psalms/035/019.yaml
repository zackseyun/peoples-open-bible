translation:
  language: es
  text: No permitas que mis enemigos mentirosos se alegren de mí[a], ni que los que me aborrecen sin causa guiñen el ojo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que mis enemigos se alegren falsamente de mí». El hebreo es compacto y puede describir a los enemigos como caracterizados por falsedad, o bien su manera falsa de triunfar sobre el salmista.
    reason: lexical_alternative
  - marker: b
    text: «Guiñar el ojo» reproduce un modismo hebreo de señal maliciosa, burlona o conspirativa, no un gesto inocente.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not let
  chosen_spanish: No permitas que
  alternatives_spanish:
  - No dejes que
  - No consientas que
  lexicon: HALOT
  rationale: La partícula prohibitiva con imperfecto expresa una súplica dirigida a Dios; en español, «No permitas que» comunica bien la petición sin sonar mecánico.
- source_word: יִשְׂמְחוּ
  english_pob_choice: rejoice
  chosen_spanish: se alegren
  alternatives_spanish:
  - se regocijen
  - se gozen
  lexicon: HALOT
  rationale: «Alegrarse» refleja el sentido básico de שמח y suena natural en español. Se evita intensificar innecesariamente con «regocijarse».
- source_word: לִי
  english_pob_choice: over me
  chosen_spanish: de mí
  alternatives_spanish:
  - sobre mí
  - por mi caída
  - a costa mía
  lexicon: HALOT
  rationale: El valor idiomático es el de triunfar o festejar a costa de la desgracia del salmista. «De mí» suena menos forzado que un calco con «sobre mí» y mantiene la relación hostil; la expresión se completa con el contexto de alegría maliciosa.
- source_word: אֹיְבַי שֶׁקֶר
  english_pob_choice: my enemies falsely
  chosen_spanish: mis enemigos falsamente
  alternatives_spanish:
  - mis enemigos de mentira
  - mis enemigos mentirosos
  - mis falsos enemigos
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad compacta del hebreo: el adverbio puede modificar su conducta hostil/alegría o caracterizarlos por falsedad. «Falsamente» evita decidir demasiado pronto y refleja la revisión inglesa más precisa.'
- source_word: שֹׂנְאַי
  english_pob_choice: those who hate me
  chosen_spanish: los que me aborrecen
  alternatives_spanish:
  - los que me odian
  - mis odiadores
  lexicon: HALOT
  rationale: El participio describe hostilidad continua. «Aborrecer» es un equivalente fuerte y bíblico, algo más solemne que «odiar».
- source_word: חִנָּם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - gratuitamente
  - sin razón
  - por nada
  lexicon: HALOT
  rationale: Es la fórmula más directa y fiel en español para hostilidad injustificada, conservando la carga legal/moral del lamento.
- source_word: יִקְרְצוּ עָיִן
  english_pob_choice: wink the eye
  chosen_spanish: guiñen el ojo
  alternatives_spanish:
  - hagan una seña con el ojo
  - le hagan una señal con el ojo
  - guiñen el ojo con malicia
  lexicon: HALOT
  rationale: La imagen idiomática hebrea alude a una señal maliciosa o conspirativa. «Guiñen el ojo» mantiene la concreción de la figura y es suficientemente comprensible en español; el contexto aporta la valoración negativa.
theological_decisions:
- issue: Cómo reflejar la hostilidad injusta y la posible malicia señalada por el gesto ocular.
  english_pob_reading: The verse asks God to prevent enemies from triumphing falsely and from making a malicious eye signal.
  chosen_spanish_reading: El verso pide que Dios no permita que los enemigos celebren engañosamente ni que los odiadores hagan una señal de burla o conspiración con el ojo.
  alternative_spanish_readings:
  - que hagan un gesto de desprecio
  - que hagan una seña conspirativa con el ojo
  - que se burlen con la mirada
  rationale: No se suaviza el gesto ni se lo vuelve meramente neutral; se conserva la tensión del idiomatismo hebreo sin añadir interpretación excesiva al texto principal.
  doctrine_reference: Lamento imprecatorio / lenguaje poético de súplica en los Salmos
- issue: 'Ambigüedad de אֹיְבַי שֶׁקֶר: enemigos falsos o que actúan falsamente.'
  english_pob_reading: my enemies falsely
  chosen_spanish_reading: mis enemigos falsamente
  alternative_spanish_readings:
  - mis falsos enemigos
  - mis enemigos de mentira
  - mis enemigos mentirosos
  rationale: 'Se preserva la ambigüedad heredada del hebreo y de la revisión inglesa: el adverbio puede modificar la acción o describir la cualidad de la enemistad. La frase en español evita fijar una sola lectura.'
  doctrine_reference: Precisión semántica del hebreo poético
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que corrige «my false enemies» a «my enemies falsely» para reflejar mejor que el adverbio modifica la enemistad o el acto de regocijarse, no necesariamente la identidad de los enemigos. La versión española evita cerrar la ambigüedad y sigue el sentido del hebreo con una formulación natural.
  spanish_consistency_notes:
  - Se usa «Dios» implícito por la forma prohibitiva dirigida en oración, sin introducir sujeto explícito que el hebreo tampoco expresa.
  - Se mantiene un registro bíblico sobrio y actual, evitando arcaísmos innecesarios.
  - «Sin causa» conserva la fuerza jurídica y moral del reproche.
  - «Guiñen el ojo» se reserva aquí para el gesto hostil del hebreo, con nota explicativa para evitar lectura neutral.
