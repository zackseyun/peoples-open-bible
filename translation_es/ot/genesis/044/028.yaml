translation:
  language: es
  text: 'Uno salió de mí, y yo dije: «Ciertamente ha sido despedazado[a]», y no lo he visto hasta ahora.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente fue despedazado». El hebreo usa una construcción enfática («despedazado, despedazado») para intensificar la conclusión de Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out / left
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: El verbo expresa salida física y separación de la presencia de Jacob. «Salió» conserva la imagen básica sin volverla más interpretativa que el hebreo.
- source_word: הָאֶחָד
  english_pob_choice: the one
  chosen_spanish: el uno
  alternatives_spanish:
  - uno
  - aquel
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo definido y elíptico. «El uno» mantiene la referencia definida y la forma concisa del original.
- source_word: מֵאִתִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de junto a mí
  - de mi lado
  lexicon: HALOT
  rationale: La frase indica separación de la cercanía de Jacob. «De mí» es breve y fiel; «de junto a mí» explicaría más de lo que exige el hebreo.
- source_word: וָאֹמַר
  english_pob_choice: I said
  chosen_spanish: yo dije
  alternatives_spanish:
  - dije
  - yo pensé
  lexicon: HALOT
  rationale: El texto dice literalmente «y dije». Se conserva el acto de decir, sin sustituirlo por un verbo de pensamiento que el hebreo no usa.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - seguramente
  - sin duda
  lexicon: HALOT
  rationale: La partícula introduce una conclusión enfática. «Ciertamente» comunica la afirmación fuerte en un español natural y solemne.
- source_word: טָרֹף טֹרָף
  english_pob_choice: has been torn to pieces
  chosen_spanish: fue despedazado
  alternatives_spanish:
  - ha sido despedazado
  - fue hecho pedazos
  lexicon: HALOT
  rationale: La duplicación intensifica la idea de despedazamiento violento. «Fue despedazado» transmite el sentido pasivo y la fuerza del hebreo sin añadir una glosa excesiva.
- source_word: וְלֹא רְאִיתִיו
  english_pob_choice: and I have not seen him
  chosen_spanish: y no lo he visto
  alternatives_spanish:
  - y no lo vi
  - y no lo he vuelto a ver
  lexicon: HALOT
  rationale: El perfecto negativo se extiende hasta el presente del discurso. «No lo he visto» conserva esa vigencia actual; el objeto directo enclítico es idiomático en español.
- source_word: עַד הֵנָּה
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática. «Hasta ahora» reproduce de forma natural la referencia al presente.
translation_notes:
  revision_awareness: Se corrigió la falta de anclaje de la nota al incluir el marcador [a] en la frase «fue despedazado[a]». La redacción sigue de cerca el hebreo y el auditor inglés, manteniendo la intensificación del hebreo con una opción española natural.
  spanish_consistency_notes:
  - Se mantuvo «el uno» para reflejar el sustantivo definido hebreo.
  - Se prefirió el perfecto «no lo he visto» para conservar la referencia temporal vigente en el discurso.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; no hay decisiones teológicas adicionales en este versículo.
