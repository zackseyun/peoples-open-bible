translation:
  language: es
  text: No dominarás sobre él con dureza[a], sino que temerás a tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con severidad», «con crueldad»; el término hebreo alude a un trato duro, aplastante.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִרְדֶּה
  english_pob_choice: rule over
  chosen_spanish: te enseñorearás
  alternatives_spanish:
  - dominarás
  - regirás
  - gobernarás
  lexicon: HALOT
  rationale: En este contexto legal de servicio por deuda, el verbo español debe expresar relación de autoridad sobre una persona. «Te enseñorearás» comunica dominio personal sin perder el matiz de ejercer poder sobre otro; «dominarás» puede sonar más fuerte e impreciso, y «gobernarás» suena demasiado político.
- source_word: בּוֹ
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - sobre él
  - a él
  lexicon: HALOT
  rationale: El objeto pronominal masculino singular apunta al israelita en servicio. En español, el régimen verbal con «enseñorearse» pide la preposición «de», por lo que «de él» mantiene la referencia sin forzar la sintaxis.
- source_word: בְּפָרֶךְ
  english_pob_choice: harshly
  chosen_spanish: con dureza
  alternatives_spanish:
  - con severidad
  - ruthlessly
  - con crueldad
  lexicon: HALOT
  rationale: פָּרֶךְ expresa trato duro, aplastante o severo. «Con dureza» conserva ese campo semántico en español natural. «Con severidad» es posible, pero suena más formal y menos concreto; «con crueldad» y «ruthlessly» intensifican más de lo que exige el término.
- source_word: וְיָרֵאתָ
  english_pob_choice: but you shall fear
  chosen_spanish: sino que temerás
  alternatives_spanish:
  - y temerás
  - más bien, temerás
  lexicon: HALOT
  rationale: La conjunción hebrea es coordinante, pero el contraste discursivo entre el trato duro prohibido y la reverencia debida a Dios se comunica mejor en español con «sino que». Esto reproduce la lógica ética del versículo sin añadir contenido.
- source_word: מֵאֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: a tu Dios
  alternatives_spanish:
  - de tu Dios
  - ante tu Dios
  lexicon: HALOT
  rationale: Con ירא, el hebreo usa מִן como objeto del temor; en español se expresa naturalmente con «temer a». Mantener «tu Dios» preserva el poseedor y evita la impresión de una relación genérica.
theological_decisions:
- issue: Relación entre prohibición social y reverencia divina
  english_pob_reading: 'The verse grounds humane treatment in reverence toward God: ''but you shall fear your God.'''
  chosen_spanish_reading: 'El versículo fundamenta el trato humano en la reverencia a Dios: «sino que temerás a tu Dios».'
  alternative_spanish_readings:
  - «y temerás a tu Dios»
  - «más bien temerás a tu Dios»
  rationale: 'No hay controversia doctrinal, pero la traducción debe reflejar que el mandato social no es aislado: el respeto al prójimo queda regulado por el temor reverente a Dios. «Sino que» hace explícito el contraste ético que el inglés POB ya señaló.'
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo consonante y con la lectura inglesa auditada; no se observan revisiones aplicadas ni variantes textuales relevantes en el expediente. La decisión principal consiste en expresar en español el contraste ético del hebreo sin perder la fuerza de פָּרֶךְ ni la referencia idiomática de ירא con מִן.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usa un imperativo negativo futuro («No te enseñorearás») como equivalente natural y formal del hebreo legal.
  - «Temerás a tu Dios» conserva el sentido reverencial, no solo emocional, del verbo ירא.
