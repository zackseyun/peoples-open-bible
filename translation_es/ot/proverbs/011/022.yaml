revisions:
- from: Como un aro de oro en el hocico de un cerdo, así es la mujer hermosa[a] que carece de discreción.
  to: Como un aro[a] de oro en el hocico de un cerdo, una mujer hermosa que carece de discreción.
  rationale: Se reubica la nota al pie para que ancle correctamente la alternativa léxica de נֶזֶם («aro nasal»), y se simplifica la sintaxis para una formulación más natural y proverbial en español, sin cambiar el sentido.
  reviewer_model: gpt-5.4
