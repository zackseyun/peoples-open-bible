review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: rechazo de estatutos, pacto y testimonios; seguimiento de la vaciedad; imitación de las naciones vecinas; y uso correcto de «Yahvé» para יְהוָה. Sin embargo, hay pequeños problemas de fidelidad y naturalidad: la nota [a] está anclada en «padres» pero explica «vaciedad»; además, «acerca de las cuales Yahvé había mandado a ellos no hacer como ellas hacían» suena forzado y no expresa con naturalidad la prohibición de imitar sus prácticas.'
  spanish_quality_summary: 'El español es comprensible pero tiene varias asperezas: «a ellos» es poco natural; «acerca de las cuales» resulta rígido; y el anclaje de notas no corresponde bien. «Vaciedad» es defendible, aunque algo menos idiomático que «lo vacío»; puede mantenerse si se suaviza el resto de la frase.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יהוה, «estatutos», «testimonios», y mantenimiento del juego הבל/יהבלו mediante «vaciedad / vacíos». «Pacto» es aceptable para בְּרִית, aunque «alianza» también habría sido posible. No hay conflicto doctrinal mayor.'
  issues:
  - severity: high
    issue: La nota [a] está mal ubicada y su contenido no corresponde al lugar anclado.
    rationale: En el texto español [a] aparece tras «sus padres», pero la nota [a] del rastro inglés corresponde a הֶבֶל («emptiness/vanity»), no a אֲבוֹתָם. Esto rompe la trazabilidad de notas y puede confundir al lector.
  - severity: medium
    issue: 'La cláusula final es gramaticalmente torpe: «Yahvé había mandado a ellos no hacer como ellas hacían».'
    rationale: Aunque transmite el sentido básico, «mandado a ellos» no es español natural; además, la prohibición se expresa mejor como «les había mandado que no hicieran como ellas» o «les había mandado no hacer como ellas hacían».
  - severity: low
    issue: «Acerca de las cuales» suena poco idiomático en este contexto.
    rationale: El relativo hebreo introduce el referente de las naciones respecto de las cuales existía un mandamiento; en español bíblico legible, «respecto de las cuales» o reformular con «a las cuales»/«de las cuales» evita rigidez innecesaria.
