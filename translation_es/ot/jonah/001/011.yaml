translation:
  language: es
  text: 'Entonces le dijeron: «¿Qué debemos hacerte para que el mar se nos calme[a]?». Porque el mar se embravecía cada vez más[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea dice literalmente «de sobre nosotros» o «desde sobre nosotros», una imagen vívida de la presión o amenaza del mar contra ellos. El español la naturaliza como «se nos calme» para expresar ese alivio buscado de manera idiomática.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo más literal: «el mar iba y se embravecía / se agitaba». La construcción expresa aumento progresivo de la tormenta, no solo un estado fijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֵלָיו
  english_pob_choice: Then they said to him
  chosen_spanish: Entonces le dijeron
  alternatives_spanish:
  - Y le dijeron
  - Entonces le hablaron
  lexicon: HALOT
  rationale: Le dijeron comunica de forma natural el acto de dirigirse a Jonás y conserva el valor consecutivo de וַ.
- source_word: מַה נַּעֲשֶׂה לָּךְ
  english_pob_choice: What should we do to you
  chosen_spanish: ¿Qué haremos contigo?
  alternatives_spanish:
  - ¿Qué deberíamos hacer contigo?
  - ¿Qué vamos a hacer contigo?
  lexicon: HALOT
  rationale: La pregunta pide qué acción tomar respecto de Jonás. 'Contigo' es más natural en español que 'a ti' en este contexto y sigue de cerca la relación pragmática del hebreo.
- source_word: וְיִשְׁתֹּק
  english_pob_choice: so that the sea may quiet down
  chosen_spanish: para que el mar se calme
  alternatives_spanish:
  - y el mar se calme
  - para que el mar esté en calma
  lexicon: HALOT
  rationale: ‘Calmarse’ expresa bien el cese de la agitación del mar. Se usa 'para que' para marcar la finalidad que en contexto resulta del interrogante, manteniendo la fuerza causal/persuasiva del hebreo sin forzar una traducción mecánica del waw.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: '''Mar'' es el equivalente normal en español bíblico para יָם en este relato.'
- source_word: מֵעָלֵינוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - de sobre nosotros
  - desde sobre nosotros
  lexicon: HALOT
  rationale: 'La imagen hebrea literal de ''desde sobre nosotros'' es muy vívida, pero la revisión inglesa la reconoció como un giro menos natural. En español, ''para nosotros'' transmite el efecto buscado: que el mar se calme en nuestro beneficio.'
- source_word: הוֹלֵךְ וְסֹעֵר
  english_pob_choice: was growing more and more stormy
  chosen_spanish: iba cada vez más embravecido
  alternatives_spanish:
  - crecía y se agitaba
  - se volvía cada vez más tormentoso
  lexicon: HALOT
  rationale: La construcción expresa intensificación progresiva. 'Iba cada vez más embravecido' comunica bien el aumento continuo de la tempestad en un español natural y digno, sin perder la progresión del original.
theological_decisions:
- issue: Modo de traducir la finalidad implícita en la pregunta
  english_pob_reading: What should we do to you so that the sea may quiet down for us?
  chosen_spanish_reading: ¿Qué haremos contigo para que el mar se calme para nosotros?
  alternative_spanish_readings:
  - ¿Qué haremos contigo, para que el mar se calme?
  - ¿Qué deberíamos hacer contigo para que el mar se calme para nosotros?
  rationale: El hebreo presenta una pregunta seguida por una acción deseada, y la lectura inglesa la hace explícita con 'so that'. En español, 'para que' preserva esa finalidad sin añadir interpretación doctrinal.
  doctrine_reference: Narrativa histórica; no aplica una doctrina específica.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés para מֵעָלֵינוּ, que corrigió el literalismo “from upon us” a “for us”. También conserva la idea progresiva de הוֹלֵךְ וְסֹעֵר como intensificación continua del mar.
  spanish_consistency_notes:
  - Se mantuvo 'mar' para יָם en coherencia con el uso bíblico estándar y con el contexto narrativo.
  - Se prefirió 'calme' sobre 'esté quieto' por naturalidad, sin perder el valor de quietud solicitado.
  - '''Embravecido'' traduce la acumulación de סער con un español idiomático y no excesivamente técnico.'
  - No se usó 'SEÑOR' ni terminología litúrgica ajena, porque este versículo no contiene el Tetragrámaton ni un título divino explícito.
