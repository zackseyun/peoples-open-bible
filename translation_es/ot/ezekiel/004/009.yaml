translation:
  language: es
  text: Y tú, toma para ti trigo y cebada, habas y lentejas, mijo y espelta[a], y ponlos en un solo recipiente, y haz de ellos pan para ti. Según el número de los días que estás acostado sobre tu lado —trescientos noventa días— lo comerás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «emmer» o «una clase de trigo»; la identificación exacta del grano antiguo כֻסְּמִים es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח לְךָ
  english_pob_choice: take for yourself
  chosen_spanish: toma para ti
  alternatives_spanish:
  - toma
  - consíguelo para ti
  lexicon: HALOT
  rationale: El imperativo con el pronombre dativo tiene un matiz benefactivo/reflexivo. «Toma para ti» conserva ese valor sin sonar forzado en español.
- source_word: חִטִּין
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - trigo panificable
  lexicon: HALOT
  rationale: Es el equivalente natural y estándar en español para este cereal.
- source_word: שְׂעֹרִים
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - cebada
  lexicon: HALOT
  rationale: Corresponde de manera directa al cereal nombrado en el hebreo.
- source_word: פּוֹל
  english_pob_choice: beans
  chosen_spanish: habas
  alternatives_spanish:
  - frijoles
  - habas de fava
  lexicon: HALOT
  rationale: El término hebreo es general para una legumbre de grano grande; «habas» comunica bien el referente probable sin restringirlo indebidamente.
- source_word: עֲדָשִׁים
  english_pob_choice: lentils
  chosen_spanish: lentejas
  alternatives_spanish:
  - lentejas
  lexicon: HALOT
  rationale: Equivalente normal y preciso en español.
- source_word: דֹחַן
  english_pob_choice: millet
  chosen_spanish: mijo
  alternatives_spanish:
  - mijo
  lexicon: HALOT
  rationale: Es la forma más natural en español para este cereal.
- source_word: כֻסְּמִים
  english_pob_choice: spelt
  chosen_spanish: espelta
  alternatives_spanish:
  - trigo espelta
  - emmer
  - una clase de trigo
  lexicon: HALOT
  rationale: «Espelta» es la correspondencia tradicional y comprensible en español; la identificación exacta del grano antiguo sigue siendo incierta, por lo que se preserva en nota la alternativa.
- source_word: בִּכְלִי אֶחָד
  english_pob_choice: into one vessel
  chosen_spanish: en un solo recipiente
  alternatives_spanish:
  - en un solo vaso
  - en un solo contenedor
  lexicon: HALOT
  rationale: «Recipiente» es claro en español y conserva el sentido concreto de כלי; «uno» mantiene la idea de combinar todo junto.
- source_word: וְעָשִׂיתָ אֹתָם לְךָ לְלָחֶם
  english_pob_choice: make them into bread for yourself
  chosen_spanish: y haz de ellos pan para ti
  alternatives_spanish:
  - y hazlos pan para ti
  - y prepáralos como pan para ti
  lexicon: HALOT
  rationale: El hebreo expresa una transformación con finalidad alimentaria. «Haz de ellos pan para ti» mantiene la estructura y resulta idiomático en español.
- source_word: מִסְפַּר הַיָּמִים
  english_pob_choice: for the number of the days
  chosen_spanish: según el número de los días
  alternatives_spanish:
  - para el número de los días
  - conforme al número de los días
  lexicon: HALOT
  rationale: La expresión marca duración medida por los días señalados; «según» conserva el valor formal sin sonar rígido.
- source_word: שׁוֹכֵב עַל צִדְּךָ
  english_pob_choice: you lie on your side
  chosen_spanish: te acuestas sobre tu lado
  alternatives_spanish:
  - yaces sobre tu lado
  - estás acostado sobre tu lado
  lexicon: HALOT
  rationale: El participio describe el estado continuo de la acción simbólica. En español, el presente reflexivo comunica bien esa condición en una instrucción profética.
- source_word: שְׁלֹשׁ מֵאוֹת וְתִשְׁעִים יוֹם
  english_pob_choice: three hundred and ninety days
  chosen_spanish: trescientos noventa días
  alternatives_spanish:
  - 390 días
  lexicon: HALOT
  rationale: Se conserva el número escrito con palabras, conforme al estilo bíblico y al orden del hebreo.
- source_word: תֹּאכֲלֶנּוּ
  english_pob_choice: you shall eat it
  chosen_spanish: lo comerás
  alternatives_spanish:
  - lo comerás tú
  - deberás comerlo
  lexicon: HALOT
  rationale: El sufijo singular se refiere al pan como unidad colectiva. «Lo comerás» preserva la fuerza de mandato y es más natural en español que una perífrasis futura.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo de WLC y conserva la secuencia enumerativa, el carácter benefactivo de קַח לְךָ, la transformación alimentaria de וְעָשִׂיתָ אֹתָם לְךָ לְלָחֶם, y el valor durativo de la cláusula con שׁוֹכֵב. Se refleja además la incertidumbre léxica de כֻסְּמִים mediante una nota.
  spanish_consistency_notes:
  - Se prefirió un español bíblico claro y contemporáneo, evitando calcos innecesarios.
  - «Yahvé» no aparece en este versículo.
  - Se mantuvo la enumeración de granos y legumbres sin expandirla más allá del hebreo.
  - La nota sobre כֻסְּמִים preserva la tensión lexical documentada en el audit trail inglés.
