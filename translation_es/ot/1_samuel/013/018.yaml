translation:
  language: es
  text: y una compañía se volvió hacia el camino de Bet-horón[a], y una compañía se volvió hacia el camino del límite que domina el valle de Zeboim[b], hacia el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una división' o 'un destacamento'; literalmente, 'una cabeza'.
    reason: lexical_alternative
  - marker: b
    text: '''Zeboim'' probablemente es un nombre de lugar; el término subyacente puede estar relacionado con ''hienas''.'
    reason: cultural_note
lexical_decisions:
- source_word: הָרֹאשׁ אֶחָד
  english_pob_choice: one company
  chosen_spanish: una compañía
  alternatives_spanish:
  - una división
  - un destacamento
  - una cabeza
  lexicon: HALOT
  rationale: En este contexto militar, la expresión literalmente significa 'una cabeza', pero funciona idiomáticamente para una de las unidades de ataque. 'Compañía' comunica bien una unidad militar en español moderno sin perder la idea de grupo organizado.
- source_word: יִפְנֶה
  english_pob_choice: turned toward
  chosen_spanish: se volvió hacia
  alternatives_spanish:
  - se dirigió hacia
  - giró hacia
  - se encaminó hacia
  lexicon: HALOT
  rationale: El verbo expresa cambio de dirección. 'Se volvió hacia' conserva el movimiento direccional de forma natural en español y sigue de cerca la imagen del hebreo.
- source_word: דֶּרֶךְ
  english_pob_choice: road
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - sendero
  - camino
  lexicon: HALOT
  rationale: Aquí דֶּרֶךְ designa una vía de desplazamiento. 'Camino' es un equivalente amplio y natural en español, más fluido que 'ruta' en esta construcción.
- source_word: בֵּית חֹרוֹן
  english_pob_choice: Beth-horon
  chosen_spanish: Bet-horón
  alternatives_spanish:
  - Beth-horon
  - Bet Horón
  lexicon: transliteración toponímica
  rationale: Se translitera el nombre propio. 'Bet-horón' respeta la forma bíblica y es inteligible en español, manteniendo el carácter de topónimo.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el borde
  alternatives_spanish:
  - la frontera
  - el límite
  - el borde
  lexicon: HALOT
  rationale: Aunque 'borde' puede sonar menos geométrico que 'frontera', aquí encaja con la imagen topográfica de una línea elevada o borde de terreno. La opción preserva la referencia espacial antes que una noción política de frontera.
- source_word: הַנִּשְׁקָף
  english_pob_choice: that overlooks
  chosen_spanish: que mira
  alternatives_spanish:
  - que domina
  - que se alza sobre
  - que mira
  lexicon: HALOT
  rationale: El participio expresa la posición de algo que da hacia abajo o sobre un valle. 'Que mira' es una solución sobria y natural en español; evita sobrecargar con una paráfrasis interpretativa.
- source_word: גֵּי הַצְּבֹעִים
  english_pob_choice: the Valley of Zeboim
  chosen_spanish: el valle de Zeboim
  alternatives_spanish:
  - el valle de las hienas
  - el valle de Zeboim
  - el barranco de Zeboim
  lexicon: HALOT
  rationale: La secuencia funciona probablemente como topónimo. Se conserva 'Zeboim' por transparencia geográfica, sin imponer la posible etimología zoológica en el texto principal.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: toward the wilderness
  chosen_spanish: hacia el desierto
  alternatives_spanish:
  - hacia el desierto
  - al desierto
  - en dirección al desierto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el desierto. 'Hacia el desierto' reproduce esa orientación con claridad y concisión.
theological_decisions:
- issue: Tratamiento del topónimo y del posible sentido etimológico de Zeboim
  english_pob_reading: '''Zeboim'' is likely a place name; the underlying term may be related to ''hyenas.'''
  chosen_spanish_reading: Se mantiene 'Zeboim' como topónimo, con la posibilidad etimológica aparte.
  alternative_spanish_readings:
  - el valle de las hienas
  - el valle de Zeboim
  rationale: El texto hebreo y la auditoría inglesa favorecen entenderlo como nombre de lugar. Traducirlo como 'hienas' borraría la función toponímica en este versículo; por eso se conserva el nombre propio y se deja la alternativa implícita para nota.
  doctrine_reference: Principio de transparencia textual y preservación del valor toponímico en nombres propios bíblicos
translation_notes:
  revision_awareness: La auditoría inglesa indica que no hubo cambios en la última revisión y que el acuerdo con la revisión externa fue alto; por eso la propuesta sigue de cerca las decisiones ya establecidas, adaptándolas de forma natural al español.
  spanish_consistency_notes:
  - Se mantiene 'Bet-horón' como transliteración estable del topónimo.
  - Se usa 'compañía' para la unidad militar, coherente con la decisión inglesa de 'one company'.
  - Se evita 'SEÑOR' porque no hay aquí un sustituto del nombre divino; el versículo es puramente topográfico y militar.
  - '''Desierto'' traduce el sentido direccional de מִדְבָּרָה sin añadir matiz interpretativo.'
