base_translation:
  language: en
  yaml_path: translation/ot/genesis/024/002.yaml
  text: And Abraham said to his servant[a], the oldest of his household, who ruled over all that belonged to him[b], “Please put your hand under my thigh.”
  footnotes:
  - marker: a
    text: Placing the hand under the thigh was an ancient oath-taking gesture, likely signaling solemn covenantal commitment.
    reason: cultural_note
  - marker: b
    text: Or, more idiomatically, “who was in charge of all that he had.”
    reason: lexical_alternative
