lexical_decisions:
- source_word: וְגִבּוֹרֵי הַחֲיָלִים
  english_pob_choice: And the mighty warriors
  chosen_spanish: Y los guerreros poderosos
  alternatives_spanish:
  - Y los hombres valientes
  - Y los guerreros valientes
  lexicon: HALOT
  rationale: גִּבּוֹרִים expresa fuerza y destreza militar; הַחֲיָלִים refuerza la idea de tropa o fuerza de combate. 'Guerreros poderosos' conserva el sentido bélico y la lista continua del hebreo con 'Y'.
- source_word: עֲשָׂה אֵל
  english_pob_choice: Asahel
  chosen_spanish: Asael
  alternatives_spanish:
  - Asahel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en forma española habitual, 'Asael', que refleja bien la referencia conocida del personaje. La vocalización del hebreo apunta al nombre compuesto con 'El'.
- source_word: אֲחִי יוֹאָב
  english_pob_choice: the brother of Joab
  chosen_spanish: hermano de Joab
  alternatives_spanish:
  - el hermano de Joab
  - Joab[']s brother
  lexicon: HALOT
  rationale: El hebreo usa un constructo relacional. En español, 'hermano de Joab' es natural y fiel, sin añadir posesión innecesaria.
- source_word: אֶלְחָנָן
  english_pob_choice: Elhanan
  chosen_spanish: Elhanán
  alternatives_spanish:
  - Elhanan
  lexicon: HALOT
  rationale: Nombre propio transliterado con acento gráfico español para ayudar a la lectura. No se traduce el nombre.
- source_word: בֶּן דּוֹד֖וֹ
  english_pob_choice: son of Dodo
  chosen_spanish: hijo de Dodo
  alternatives_spanish:
  - descendiente de Dodo
  lexicon: HALOT
  rationale: La fórmula genealógica se conserva literalmente. 'Dodo' se trata como nombre propio, no como sustantivo común.
- source_word: מִבֵּית לָחֶם
  english_pob_choice: from Bethlehem
  chosen_spanish: de Belén
  alternatives_spanish:
  - de Bethlehem
  - procedente de Belén
  lexicon: HALOT
  rationale: El hebreo dice literalmente origen/localidad. En español, 'de Belén' comunica de forma natural la procedencia sin introducir una etnificación no expresada explícitamente en el texto base.
translation_notes:
  revision_awareness: 'El texto coincide con el packet fuente y con la traducción inglesa auditada: mantiene la lista militar, la identificación genealógica de Asael y Elhanán, y la procedencia geográfica final. No se introdujeron cambios textuales ni tensiones doctrinales en este versículo.'
  spanish_consistency_notes:
  - Se prefirió 'guerreros poderosos' para mantener el tono militar sin recurrir a un giro arcaizante.
  - '''Asael'' se usa como forma española corriente del nombre, mientras que ''Elhanán'' conserva el acento para lectura en español.'
  - La nota sobre 'de Belén' conserva la alternativa etnónima documentada por el POB inglés.
