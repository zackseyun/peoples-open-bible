theological_decisions:
- issue: Rendering references to divine agency in Joseph's deliverance
  chosen_reading: 'Retain explicit divine action: ''God loves more...'' and ''the Lord guarded me'''
  alternative_readings:
  - Use more generic providential language
  - Reduce to moral self-mastery alone
  rationale: The Greek grounds Joseph's chastity not merely in willpower but in God's favor and protection. This theological emphasis should remain explicit.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: How concretely to render σωφροσύνη in this seduction context
  chosen_reading: Translate as 'self-control' while allowing sexual purity to remain implied by context
  alternative_readings:
  - chastity
  - temperance
  rationale: The virtue is broader than sexual abstinence, yet this chapter applies it specifically to resisting adultery. 'Self-control' preserves lexical breadth and thematic consistency.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
