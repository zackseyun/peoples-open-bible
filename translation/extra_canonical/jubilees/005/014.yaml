translation:
  text: And if they do not walk in it[a], judgment is written for every creature and for every kind. And there is nothing in heaven or on earth, or in light or in darkness, or in Sheol or in the deep or in the place of darkness—all their judgments are ordained and written and engraved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The sequence 'in heaven ... on earth ... in light ... in darkness ... in Sheol ... in the deep ... in the place of darkness' reflects a comprehensive cosmological register. The final triad 'ordained and written and engraved' is retained to preserve the legal-record imagery.
    reason: cultural_note
    anchor_ref: '5:14'
  - marker: b
    text: Or 'everything is ordained'.
    reason: previous_rendering
