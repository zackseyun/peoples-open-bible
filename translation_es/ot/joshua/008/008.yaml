  to: Y cuando hayan tomado la ciudad[a], prenderán fuego a la ciudad. Conforme a la palabra de Yahvé, así harán. Miren, yo les he mandado.
  rationale: Se corrige el pronombre en la última cláusula para evitar añadir un objeto plural no presente en el hebreo. También se ajusta levemente la nota alternativa para que suene natural en español y siga reflejando la alternativa léxica entre «palabra» y «mandato», sin alterar la decisión principal del texto.
