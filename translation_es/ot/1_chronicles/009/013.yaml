translation:
  language: es
  text: Y sus hermanos[a], jefes de sus casas paternas, eran mil setecientos sesenta, hombres valientes[b] para la labor del servicio de la casa de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes». El hebreo «hermanos» puede abarcar vínculos de clan, no solo hermanos literales.
    reason: lexical_alternative
  - marker: b
    text: O «hombres capaces». La expresión es honorífica y puede señalar fuerza, valor o aptitud probada, no necesariamente combate militar en este contexto.
    reason: lexical_alternative
  - marker: c
    text: Literalmente «la casa de Dios»; es decir, el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  english_pob_choice: And their brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus hermanos de clan
  lexicon: HALOT
  rationale: El hebreo אָח en plural con sufijo posesivo puede abarcar hermanos literales o parientes del mismo linaje. «Hermanos» conserva la relación de parentesco/corporativa sin sobreinterpretar el vínculo.
- source_word: רָאשִׁים לְבֵית אֲבוֹתָם
  english_pob_choice: heads of their fathers’ houses
  chosen_spanish: cabezas de las casas de sus padres
  alternatives_spanish:
  - jefes de las casas de sus padres
  - cabezas de sus casas paternas
  lexicon: HALOT
  rationale: «Cabezas» reproduce רָאשִׁים y «casas de sus padres» mantiene el modismo genealógico בית אבות. «Casas» evita reducir la expresión a una mera lista de familias y conserva su tono administrativo-genealógico.
- source_word: אֶלֶף וּשְׁבַע מֵאוֹת וְשִׁשִּׁים
  english_pob_choice: 1,760
  chosen_spanish: mil setecientos sesenta
  alternatives_spanish:
  - '1.760'
  - mil setecientos y sesenta
  lexicon: HALOT
  rationale: El hebreo suma de forma directa 1,760. En español bíblico moderno, la cifra en palabras es clara y natural, y refleja fielmente el total.
- source_word: גִּבּוֹרֵי חֵיל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres poderosos
  alternatives_spanish:
  - hombres valientes
  - hombres capaces
  - mártires de valor
  lexicon: HALOT
  rationale: La expresión hebrea es honorífica y puede señalar fuerza, capacidad o valor probado. Dado que el contexto es de servicio del templo y no de combate, «hombres poderosos» preserva la fuerza del modismo sin volverlo militar de manera indebida. Se añadió «para la labor» para expresar el matiz funcional del conjunto.
- source_word: מְלֶאכֶת עֲבוֹדַת
  english_pob_choice: for the work of the service
  chosen_spanish: para la labor del servicio
  alternatives_spanish:
  - para el trabajo del servicio
  - para la obra del servicio
  - para la tarea del servicio
  lexicon: HALOT
  rationale: «Labor» refleja מְלֶאכֶת como trabajo/tarea concreta, y «servicio» conserva עֲבוֹדָה. La combinación mantiene visibles ambos sustantivos del hebreo sin colapsarlos en una sola noción.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: «Casa de Dios» sigue literalmente el hebreo y preserva la resonancia teológica del modismo. Aunque alude al templo, «casa» evita importar una glosa interpretativa donde el texto fuente dice «casa».
theological_decisions:
- issue: Kinship language in a masculine corporate/genealogical context
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - parientes
  - consanguíneos
  rationale: Se mantiene el término masculino y familiar del hebreo, acorde con el contexto genealógico y administrativo. No se neutraliza a un término más genérico porque el pasaje enumera varones asociados a casas paternas.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Temple terminology
  english_pob_reading: house of God
  chosen_spanish_reading: casa de Dios
  alternative_spanish_readings:
  - templo de Dios
  rationale: No hay conflicto doctrinal; se prefiere la formulación más literal para respetar la imagen hebrea y no sustituirla por una etiqueta interpretativa más desarrollada.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y fue confirmada como estable. Esta versión española sigue el mismo conjunto de decisiones léxicas y mantiene las tensiones semánticas documentadas (parentesco amplio, modismo honorífico y literalidad de «casa de Dios») sin sobreinterpretarlas.
  spanish_consistency_notes:
  - Se conserva la secuencia sintáctica del hebreo con sujeto plural y predicado nominal.
  - «Casa de Dios» se mantiene de forma consistente como equivalente de בֵּית הָאֱלֹהִים.
  - «Hermanos» se usa en sentido corporativo y se aclara en nota para evitar una lectura excesivamente restringida.
  - El número se expresa en palabras para fluidez editorial en español bíblico moderno.
  - «Hombres poderosos» busca preservar el tono honorífico de גִּבּוֹרֵי חֵיל sin forzar un léxico militar.
