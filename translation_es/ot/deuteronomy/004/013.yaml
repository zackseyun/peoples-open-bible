translation:
  language: es
  text: Y él les declaró su pacto, el cual les mandó hacer, las Diez Palabras[a]; y las escribió sobre dos tablas de piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las Diez Palabras»; tradicionalmente, «los Diez Mandamientos».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: declared
  chosen_spanish: anunció
  alternatives_spanish:
  - declaró
  - dio a conocer
  - hizo saber
  lexicon: HALOT
  rationale: El hebreo נגד en hifil expresa hacer saber, declarar o anunciar. «Anunció» mantiene un tono formal y público, apto para un contexto pactal, sin perder naturalidad en español.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  lexicon: HALOT
  rationale: El término bíblico central es בְּרִית. En español, «pacto» conserva bien la idea de un vínculo vinculante y formal; «alianza» es posible, pero puede sonar más amplia o menos precisa según el contexto. Se evita «convenio» por su tono más jurídico moderno y menos bíblico.
- source_word: אֲשֶׁר צִוָּה אֶתְכֶם לַעֲשׂוֹת
  english_pob_choice: which he commanded you to do
  chosen_spanish: el cual les mandó cumplir
  alternatives_spanish:
  - el cual les mandó hacer
  - el cual les ordenó observar
  - el cual les mandó guardar
  lexicon: HALOT
  rationale: El infinitivo לַעֲשׂוֹת dice literalmente «hacer». En español, para una serie de mandatos pactales, «cumplir» conserva el sentido práctico de ejecutar/obedecer sin imponer una interpretación más técnica que el hebreo no exige. Se evita «guardar/observar» porque suaviza o desplaza el valor directo de «hacer».
- source_word: עֲשֶׂרֶת הַדְּבָרִים
  english_pob_choice: the Ten Words
  chosen_spanish: las Diez Palabras
  alternatives_spanish:
  - los Diez Mandamientos
  - las diez palabras
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «las diez palabras». Se conserva esa designación propia del texto en vez de sustituirla por el rótulo tradicional «los Diez Mandamientos», que es interpretativo. Se capitaliza de manera natural en español como título designativo.
- source_word: וַיִּכְתְּבֵם
  english_pob_choice: and he wrote them
  chosen_spanish: y las escribió
  alternatives_spanish:
  - y las inscribió
  - y las grabó
  lexicon: HALOT
  rationale: כתב significa «escribir»; «escribió» es la equivalencia directa y suficiente. Aunque las tablas de piedra sugieren grabado, el hebreo no requiere introducir «grabó» como verbo principal.
- source_word: שְׁנֵי לֻחֹת אֲבָנִים
  english_pob_choice: two tablets of stone
  chosen_spanish: dos tablas de piedra
  alternatives_spanish:
  - dos tablas de piedras
  - dos tablas de roca
  - dos tablillas de piedra
  lexicon: HALOT
  rationale: La construcción denota tablas hechas de piedra. «Tablas de piedra» es claro, bíblico y fiel. Se evita «tablillas» porque puede sonar demasiado pequeño o moderno, y «de piedras» porque altera el sustantivo colectivo.
theological_decisions:
- issue: 'Nombre de la serie normativa: עֲשֶׂרֶת הַדְּבָרִים'
  english_pob_reading: the Ten Words, with a footnote noting the traditional Ten Commandments
  chosen_spanish_reading: las Diez Palabras, con nota sobre la lectura tradicional «los Diez Mandamientos»
  alternative_spanish_readings:
  - los Diez Mandamientos
  - las diez palabras
  rationale: 'La decisión central del POB inglés es respetar el nombre literal del hebreo en el texto principal y dejar la denominación tradicional en nota. En español se conserva la misma tensión: el texto dice «las Diez Palabras» y la nota aclara la lectura tradicional más conocida.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión inglesa revisada sustituyó dos puntos por coma para conservar la relación appositiva entre «do» y «the Ten Words». En español, la apposición se resuelve con coma y punto y coma de forma natural: «el cual les mandó cumplir, las Diez Palabras; y las escribió...».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida del proyecto solo cuando el texto contiene el nombre divino; aquí no aparece.
  - 'Se conserva el orden solemne de las acciones: anunciar el pacto, mandar cumplir, nombrar las Diez Palabras y escribirlas.'
  - «Pacto» se usa como término bíblico principal para בְּרִית en este contexto.
  - La puntuación busca reflejar la relación explicativa del original sin volverlo pesado ni excesivamente literal.
