    issue: «y los cumplen» debilita la distinción entre שמר y עשה
    rationale: El hebreo distingue entre «guardar» los mandamientos y «hacerlos». Traducir עשה como «cumplir» casi duplica el sentido de «guardar», mientras que la fuente y el POB auditado preservan una progresión de observar y llevar a la práctica.
  - severity: low
    issue: La nota usa «modismo pactal», expresión algo técnica
    rationale: Es comprensible, pero «modismo del pacto» suena más natural para lectores hispanos generales sin perder precisión.
