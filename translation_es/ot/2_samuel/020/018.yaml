revisions:
- from: 'Entonces ella dijo[a]: «En tiempos antiguos[b] solían decir: “Que pregunten con certeza en Abel, y así terminaron el asunto”».'
  to: 'Entonces ella dijo[a]: «En tiempos antiguos[b] solían decir: “Que consulten en Abel, y así daban fin al asunto”».'
  rationale: Se reemplazó «con certeza» por una formulación española natural que no distorsiona el valor del infinitivo absoluto, y se cambió el cierre a un imperfecto habitual («daban fin al asunto») para reflejar el carácter proverbial de la cita. También se ajustó la nota alternativa para conservar mejor las opciones léxicas documentadas en el audit trail inglés.
