translation:
  language: es
  text: Oh, mi fortaleza[a], velaré por ti[b], porque Dios es mi baluarte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo más de cerca la forma masorética: “Su fuerza[a]—por ti velaré” o “Su fuerza[a]—a ti velaré”. Una lectura tradicional común entiende: “Oh, mi fortaleza”. Algunos también entienden “cantaré”.'
    reason: alternative_reading
  - marker: b
    text: “Velaré” también puede entenderse como “estaré atento” o “esperaré”.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻזּוֹ
  english_pob_choice: O my strength / His strength
  chosen_spanish: ¡Oh, mi fortaleza!
  alternatives_spanish:
  - ¡Oh, su fortaleza!
  - Fortaleza mía
  lexicon: HALOT
  rationale: El hebreo con sufijo de 3ª masc. sing. permite una lectura estrictamente morfológica ('su fortaleza'), pero la tradición y el contexto poético favorecen una apelación vocativa. En español, '¡Oh, mi fortaleza!' conserva el tono directo y devocional sin perder la tensión textual, que se documenta en nota.
- source_word: אֵלֶיךָ
  english_pob_choice: to you / for you
  chosen_spanish: por ti
  alternatives_spanish:
  - a ti
  - hacia ti
  - para ti
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo de 2ª masc. sing. apunta direccionalmente a 'a/para ti', pero en español, unido a 'velaré', 'por ti' expresa con naturalidad la orientación de la vigilancia y su matiz de expectativa o dependencia.
- source_word: אֶשְׁמֹרָה
  english_pob_choice: I will keep watch / I will watch for
  chosen_spanish: velaré
  alternatives_spanish:
  - vigilaré
  - estaré atento
  - "guardar\0e9"
  lexicon: HALOT
  rationale: De שׁמר, el verbo puede significar guardar, vigilar o estar atento. 'Velaré' es un equivalente poético y digno en español que comunica vigilancia continua y, en este contexto, también espera confiada.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - por cuanto
  lexicon: HALOT
  rationale: Introduce la razón de la confianza del salmista. 'Porque' es la forma más clara y natural en español bíblico contemporáneo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: La forma plural con sentido singular se refiere al Dios de Israel; 'Dios' conserva el valor referencial estándar sin añadir determinaciones innecesarias.
- source_word: מִשְׂגַּבִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi alto refugio
  alternatives_spanish:
  - mi fortaleza
  - mi refugio seguro
  - mi baluarte
  lexicon: HALOT
  rationale: מִשְׂגָּב designa un lugar elevado y seguro de protección. 'Alto refugio' conserva la imagen de altura y amparo mejor que un término meramente abstracto, y evita cerrar el sentido con una sola metáfora militar.
theological_decisions:
- issue: 'Lectura del inicio: vocativo tradicional frente a forma masorética de 3ª persona'
  english_pob_reading: The English audit trail preserved the MT-based tension between 'His strength' and the vocative 'O my strength', with the latest revision favoring the vocative in the main text.
  chosen_spanish_reading: 'Se adopta la lectura vocativa: ''¡Oh, mi fortaleza!'''
  alternative_spanish_readings:
  - ¡Oh, su fortaleza!
  - Fortaleza mía, velaré por ti
  rationale: Aunque la puntuación del hebreo transmitido permite una lectura de 3ª persona, la tradición poética y la revisión más reciente del POB favorecen entenderlo como invocación. En español, la forma vocativa es la más natural y comunica mejor la oración directa, mientras que la alternativa literal queda documentada para no borrar la tensión textual.
  doctrine_reference: Translation philosophy §1 (primacía del texto original) y §3 (preservar tensiones interpretativas y teológicas)
- issue: Valor de מִשְׂגָּב como imagen de protección
  english_pob_reading: my stronghold
  chosen_spanish_reading: mi alto refugio
  alternative_spanish_readings:
  - mi fortaleza
  - mi refugio
  - mi baluarte
  rationale: La imagen no es solo defensiva, sino también de elevación y seguridad. 'Alto refugio' mantiene esa doble fuerza semántica sin imponer un matiz demasiado militar o demasiado abstracto.
  doctrine_reference: Psalms poetic imagery; translation philosophy §2 (preservar el peso semántico sin paraphrasear)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión reciente del POB que favorece la lectura vocativa en el arranque y la naturalidad de la cláusula verbal, pero sin neutralizar la tensión masorética documentada en el aparato auditado. La versión española conserva esa tensión mediante una nota alternativa, mientras adopta una sintaxis poética natural en español.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֱלֹהִים, conforme al estándar POB.
  - Se eligió 'fortaleza'/'refugio' en un campo semántico coherente con el hebreo מִשְׂגָּב y el tono poético.
  - Se prefirió 'velaré' por su equilibrio entre vigilancia y espera confiada, manteniendo la ambigüedad documentada en la nota.
  - La puntuación con exclamación inicial refleja el valor vocativo de la primera frase en español.
