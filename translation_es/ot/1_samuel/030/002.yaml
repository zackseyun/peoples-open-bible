translation:
  language: es
  text: Se llevaron cautivas a las mujeres que estaban en ella[a], de menor a mayor.[b] No mataron a nadie, sino que se las llevaron consigo y siguieron su camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Esto es, en la ciudad mencionada antes. O: «que estaban allí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de jóvenes a mayores». El hebreo «de pequeño a grande» es un modismo que puede abarcar todo el rango sin excepción, no solo la edad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבּוּ
  english_pob_choice: They took captive
  chosen_spanish: Se llevaron cautivas
  alternatives_spanish:
  - Las capturaron
  - Las tomaron como cautivas
  lexicon: HALOT
  rationale: El verbo hebreo expresa tomar personas como cautivas en contexto bélico. En español, «se llevaron cautivas» conserva bien el sentido de traslado forzoso y el matiz militar sin sonar tan técnico como «las capturaron».
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: HALOT
  rationale: El sentido léxico directo es «mujeres». Aunque el contexto de Ziclag incluye probablemente esposas, el hebreo no limita el término a eso, así que se mantiene la lectura más amplia.
- source_word: אֲשֶׁר בָּהּ
  english_pob_choice: who were in it
  chosen_spanish: que estaban en ella
  alternatives_spanish:
  - que estaban allí
  - que estaban en la ciudad
  lexicon: HALOT
  rationale: El pronombre femenino singular se refiere a la ciudad mencionada antes. «En ella» preserva esa referencia anafórica sin añadir una especificación que el versículo mismo no da.
- source_word: מִקָּטֹן וְעַד גָּדֹל
  english_pob_choice: from small to great
  chosen_spanish: desde pequeñas hasta grandes
  alternatives_spanish:
  - de pequeños a grandes
  - desde jóvenes hasta viejos
  - del más pequeño al más grande
  lexicon: HALOT
  rationale: La expresión hebrea abarca todo el rango sin excepción. En español, «desde pequeñas hasta grandes» mantiene la forma del hebreo y el valor totalizador; el femenino concuerda naturalmente con «las mujeres».
- source_word: לֹא הֵמִיתוּ אִישׁ
  english_pob_choice: They did not kill anyone
  chosen_spanish: No mataron a nadie
  alternatives_spanish:
  - No dieron muerte a nadie
  - No mataron a ninguna persona
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «no mataron a un hombre/persona», el valor idiomático es indefinido. «A nadie» transmite mejor el sentido natural en español y preserva la negación total.
- source_word: וַיִּנְהֲגוּ
  english_pob_choice: led them away
  chosen_spanish: sino que se las llevaron
  alternatives_spanish:
  - las condujeron
  - las hicieron irse
  lexicon: HALOT
  rationale: 'El verbo puede significar conducir o llevar forzosamente. En español, la coordinación con la frase anterior favorece una continuidad fluida: «sino que se las llevaron» expresa el desplazamiento impuesto sin introducir un sujeto explícito nuevo.'
- source_word: וַיֵּלְכ֖וּ לְדַרְכָּם
  english_pob_choice: went on their way
  chosen_spanish: y siguieron su camino
  alternatives_spanish:
  - y se fueron
  - y continuaron su camino
  lexicon: HALOT
  rationale: La expresión es un hebraísmo idiomático para indicar que partieron y continuaron su ruta. «Siguieron su camino» es una equivalencia natural y sobria en español.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa auditada, pero ajusta el sujeto pronominal y el acuerdo de género en español para mantener fluidez y fidelidad semántica. Se conserva la decisión de no convertir el hebreo idiomático «de pequeño a grande» en una paráfrasis interpretativa más específica que el original no exige.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se conserva el valor colectivo e indefinido de «nadie» para לֹא הֵמִיתוּ אִישׁ.
  - «Se las llevaron» mantiene el tono de desplazamiento forzoso del verbo hebreo y evita una lectura demasiado neutra.
