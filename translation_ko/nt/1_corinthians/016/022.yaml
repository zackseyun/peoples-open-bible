id: 1CO.16.22
reference: 1 Corinthians 16:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴ τις οὐ φιλεῖ τὸν ⸀κύριον, ἤτω ἀνάθεμα. ⸂Μαράνα θά⸃.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/016/022.yaml
  text: If anyone does not love the Lord[a], let him be accursed[b]. Marana tha.
  footnotes:
  - marker: a
    text: 'Or traditional: ''anathema''; that is, under a curse.'
    reason: lexical_alternative
  - marker: b
    text: Aramaic. Possibly 'Our Lord, come!' or 'Our Lord has come.'
    reason: alternative_reading
translation:
  language: ko
  text: 누구든지 주를 사랑하지 않으면 저주받을 것입니다. 마라나타.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀνάθεμα는 「하나님께 바쳐져 멸절되는 것」으로, 「저주받음」의 강한 함의를 갖는다.
    reason: lexical_alternative
  - marker: b
    text: 「마라나타」는 아람어 정형구를 음역한 것이다. 띄어 읽기에 따라 「마라나 타」(우리 주여, 오시옵소서)로 읽거나 「마란 아타」(우리 주께서 오셨다)로 읽을 수 있다. 본 번역은 헬라어 본문의 형태를 그대로 살려 음역으로 둔다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνάθεμα
  english_pob_choice: accursed
  chosen_korean: 저주받을 것이다
  alternatives_korean:
  - 저주 아래에 있다
  - 아나테마
  lexicon: BDAG
  rationale: 본문의 강한 무게를 약화시키지 않기 위해 「저주받을 것이다」를 채택. 한국 교회 전통에서 익숙한 표현.
- source_word: Μαράνα θά
  english_pob_choice: Marana tha
  chosen_korean: 마라나타
  alternatives_korean:
  - 마라나 타
  - 마란 아타
  lexicon: BDAG
  rationale: 아람어 정형구를 한국어 음역으로 보존. 의미는 각주에 명시.
theological_decisions:
- issue: 'ἀνάθεμα의 무게: 「저주」를 약화시키지 않을 것'
  chosen_reading: 저주받을 것이다
  alternative_readings:
  - 저주 아래에 두십시오
  - 하나님께 버려진 자가 되리라
  rationale: 헬라어 ἀνάθεμα는 「하나님께 바쳐져 멸절되는 것」을 가리키는 칠십인역의 정형이며, 본 절은 사도적 권면의 가장 강한 경고에 해당한다. 한국어로 「저주받을 것이다」로 옮겨 본문의 무게를 보존한다. 완곡어로 「불행하리라」 등은 채택하지 않는다.
  doctrine_reference: 'DOCTRINE.md: do not soften the source''s strongest plain meaning'
- issue: Μαράνα θά의 띄어 읽기와 의미
  chosen_reading: 마라나타(아람어 정형구의 음역 보존, 의미는 각주)
  alternative_readings:
  - 우리 주여, 오시옵소서(기원)
  - 우리 주께서 오셨다(선포)
  rationale: 헬라어 본문 자체가 띄어 읽기를 결정하지 않으며, 초대교회 예배 정형구로 두 해석 모두 가능하다. 음역을 유지하고 두 의미를 각주로 노출하는 것이 본문에 가장 충실하다.
  doctrine_reference: 'DOCTRINE.md: preserve liturgical Semiticisms'
