revisions:
- from: No tentarás a Yahvé tu Dios, como lo tentaste en Masah.[a][b]
  to: No pondrán a prueba a Yahvé su Dios,[a] como lo pusieron a prueba en Masah.[b]
  rationale: Se reemplaza 'tentar' por 'poner a prueba' para reflejar con precisión el sentido de נסה en este contexto. Se ajusta el tratamiento al plural del hebreo ('pondrán... pusieron') y se usa 'su Dios' para concordar con el destinatario colectivo. Se reordenan las notas para que la alternativa léxica ancle a la cláusula principal y la nota histórica a 'Masah'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:05:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la prohibición hebrea לֹא תְנַסּוּ, conserva Yahvé para יְהוָה y mantiene el topónimo Masah sin expandirlo en el texto principal. Sin embargo, ''No tentarás'' y ''lo tentaste'' en español moderno suelen sugerir incitación al mal más que ''poner a prueba'', lo que debilita la precisión semántica de נסה aquí. También hay una inconsistencia pronominal/numeral: el hebreo es 2ª plural en ambas formas verbales, mientras que el borrador pasa a singular.'
  spanish_quality_summary: La redacción es comprensible, pero 'No pondrán a prueba' / 'como lo pusieron a prueba' suena más natural y exacto en español bíblico actual que 'No tentarás... como lo tentaste'. Además, conviene alinear el tratamiento con el plural del hebreo y mejorar la colocación de las notas para anclar cada una a su referente.
  glossary_alignment: 'Alinea bien con el glosario del proyecto al usar ''Yahvé'' para יְהוָה. La principal desviación es lexical: para נסה en este contexto, el propio rastro inglés privilegia ''test'' con alternativa ''put ... to the test''; en español, ''poner a prueba'' preserva mejor ese valor que ''tentar''.'
  issues:
  - severity: high
    issue: Uso de 'tentar' para נסה
    rationale: En español general y eclesial, 'tentar' suele entenderse como seducir o inducir al pecado. Aquí el sentido es 'poner a prueba'. La opción actual puede desviar el significado del texto fuente.
  - severity: medium
    issue: Cambio de 2ª plural hebrea a singular español
    rationale: El hebreo tiene 2mp en 'no probarán' y 'como probaron'. Aunque a veces se naturaliza al singular en español, aquí no hay razón contextual fuerte para abandonar el plural, y el paralelismo se preserva mejor en plural.
  - severity: low
    issue: Anclaje de notas mejorable
    rationale: La nota léxica alternativa corresponde a la cláusula principal, y la nota histórica a 'Masah'. Conviene colocarlas junto a sus referentes inmediatos para mayor claridad.
  revised_spanish_text: No pondrán a prueba a Yahvé su Dios,[a] como lo pusieron a prueba en Masah.[b]
  revised_footnotes:
  - marker: a
    text: 'O: «No probarán a Yahvé su Dios».'
    reason: lexical_alternative
  - marker: b
    text: Masah fue el lugar donde Israel puso a prueba a Yahvé en el desierto (Éxodo 17:1–7); el nombre se relaciona con la idea de «prueba».
    reason: cross_reference
  revision_rationale: Se reemplaza 'tentar' por 'poner a prueba' para reflejar con precisión el sentido de נסה en este contexto. Se ajusta el tratamiento al plural del hebreo ('pondrán... pusieron') y se usa 'su Dios' para concordar con el destinatario colectivo. Se reordenan las notas para que la alternativa léxica ancle a la cláusula principal y la nota histórica a 'Masah'.
