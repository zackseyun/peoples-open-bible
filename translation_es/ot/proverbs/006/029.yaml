translation:
  language: es
  text: 'Así es también el que va a la mujer de su prójimo: todo el que la toca[b] no quedará sin castigo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “no será absuelto” o “no quedará libre de culpa”.'
    reason: lexical_alternative
  - marker: b
    text: Aquí “tocar” probablemente alude a contacto sexual ilícito, no meramente al contacto físico incidental.
    reason: cultural_note
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So is
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Así es
  lexicon: HALOT
  rationale: Introduce la comparación/conclusión proverbial con naturalidad en español, manteniendo la relación con el versículo anterior sin añadir explicaciones.
- source_word: הַבָּא
  english_pob_choice: the one who goes in
  chosen_spanish: el que va a
  alternatives_spanish:
  - el que entra a
  - el que se acerca a
  lexicon: HALOT
  rationale: El participio sustantivado pide una expresión personal en español. 'Va a' conserva el valor idiomático del hebreo en este contexto sexual sin volverlo más explícito de lo que el texto exige.
- source_word: אֶל אֵשֶׁת רֵעֵהוּ
  english_pob_choice: to his neighbor’s wife
  chosen_spanish: a la mujer de su prójimo
  alternatives_spanish:
  - a la esposa de su prójimo
  - a la mujer de su vecino
  lexicon: HALOT
  rationale: '''Mujer de su prójimo'' preserva la relación léxica de רֵעַ como cercano/prójimo y evita reducirlo a ''vecino'' solamente. ''Esposa'' es posible, pero ''mujer de'' sigue de cerca la construcción hebrea y el contexto marital.'
- source_word: לֹא יִנָּקֶה
  english_pob_choice: will not go unpunished
  chosen_spanish: no quedará sin castigo
  alternatives_spanish:
  - no será absuelto
  - no quedará limpio de culpa
  - no quedará sin culpa
  lexicon: HALOT
  rationale: 'El niphal de נקה aquí tiene fuerza judicial: no escapar de la sanción. ''No quedará sin castigo'' comunica bien esa idea en español moderno y conserva la ambigüedad entre castigo y absolución sin borrarla.'
- source_word: כָּל
  english_pob_choice: everyone
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - todo el que
  - todo aquel que
  lexicon: HALOT
  rationale: Con la forma participial siguiente, la distribución universal se expresa con una relativa natural en español. 'Cualquiera que' mantiene el alcance general sin sonar rígido.
- source_word: הַנֹּגֵעַ בָּהּ
  english_pob_choice: who touches her
  chosen_spanish: la toque
  alternatives_spanish:
  - la toque con la mano
  - tenga contacto con ella
  - la toque
  lexicon: HALOT
  rationale: En español, el antecedente femenino ya está claro por el contexto y se puede elidir con una relativa implícita. Se mantiene la sobriedad del hebreo; no se explicita sexualmente más allá de la señal léxica original de 'tocar'.
translation_notes:
  revision_awareness: Se siguió el sentido del hebreo WLC y el audit trail inglés de POB. El inglés usa 'goes in to' y 'touches her' para conservar la sobriedad del hebreo; en español se optó por 'va a' y una relativa implícita, manteniendo la misma cautela semántica. El cierre judicial de יִנָּקֶה se trasladó como 'no quedará sin castigo', respetando la alternativa de absolución señalada por POB.
  spanish_consistency_notes:
  - Se mantuvo 'prójimo' para רֵעַ, coherente con un registro bíblico neutral y sin forzar 'vecino'.
  - Se evitó 'absuelto' en el texto principal para no reducir la fuerza judicial del hebreo.
  - Se conservó la referencia genérica singular ('el que... cualquiera que...') conforme al participio substantivado y al distributivo כָּל.
