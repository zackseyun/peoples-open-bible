  rationale: Se aplicó una revisión menor para mejorar la naturalidad del español y eliminar una nota redundante, sin cambiar el sentido del hebreo ni las decisiones terminológicas del proyecto. Se omitió la nota sobre «Y sucedió» porque la reestructuración más natural en español ya no la requiere, y se corrigió la nota sobre «hijos de Israel» para que refleje alternativas reales.
