review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la madre siente inevitablemente solidaridad con los sufrimientos de sus hijos, pero por temor de Dios deja en segundo plano su rescate inmediato. Sin embargo, ''fue compelida'' suena calcado e incómodo en español, y ''seguridad temporal'' no expresa tan claramente como el griego/POB la idea de preservación o rescate inmediato ante el tormento.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita una reparación menor para sonar natural en español eclesial general. 'Se vio obligada a sentir' es más idiomático que 'fue compelida a sentir'. Además, 'rescate momentáneo' comunica mejor que 'seguridad temporal' la σωτηρία física e inmediata del contexto martirial.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dios' y 'temor de Dios' están bien. La elección 'compasión' para συμπάθεια es aceptable en español, aunque el matiz de 'sentir con ellos' conviene explicarlo en nota. La decisión sobre σωτηρία debe seguir evitando 'salvación' en sentido teológico; en este contexto conviene una expresión de rescate/preservación inmediata.
  issues:
  - severity: medium
    issue: '''fue compelida a sentir'' es un calco poco natural en español'
    rationale: Aunque semánticamente comprensible, 'compelida' suena forzado y poco idiomático. El griego ἠναγκασμένην ... ἔχειν pide una expresión de necesidad inevitable; 'se vio obligada a sentir' preserva mejor el sentido con buena legibilidad.
  - severity: medium
    issue: '''seguridad temporal'' debilita la idea de rescate/preservación inmediata'
    rationale: πρόσκαιρον σωτηρίαν en este contexto se refiere a supervivencia o liberación momentánea del tormento, no simplemente a un estado abstracto de seguridad. 'Rescate momentáneo' o 'preservación temporal' refleja mejor la escena.
