theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project default for the Tetragrammaton, aligning with the stated doctrine and common English Bible convention while preserving covenantal force.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of 'house of Jacob' and 'house of Joseph'
  chosen_reading: Corporate/national entities within Israel acting together in judgment
  alternative_readings:
  - Strictly dynastic households
  - purely metaphorical spiritual entities
  rationale: The verse's parallelism and Obadiah's context indicate collective peoples rather than merely literal households. The translation preserves the idiom without importing later theological systems.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: שָׂרִיד in judgment context
  chosen_reading: survivor
  alternative_readings:
  - remnant
  rationale: Avoids suggesting a preserved remnant of Esau when the verse explicitly denies any such survival. This preserves the force of total judgment without softening it through a theologically loaded English term.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
