    reason: lexical_alternative
  revision_rationale: La revisión mantiene el sentido del borrador, pero mejora la precisión léxica respecto a חָמַל, corrige una puntuación que podía distorsionar la sintaxis, usa un término más exacto para הַבָּקָר, y ajusta el tiempo verbal final a un español narrativo más natural, conservando la fuerza técnica de חרם.
