translation:
  language: es
  text: Un cántico[a], un salmo, de los hijos de Coré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los hijos de Coré». La preposición hebrea puede indicar asociación, autoría, dedicación o contexto de interpretación en los encabezados de los salmos.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - himno
  lexicon: HALOT
  rationale: En un encabezado de salmo, "cántico" comunica bien el carácter poético y litúrgico del hebreo שִׁיר sin sonar coloquial. "Canción" sería más neutro, pero menos solemne; "himno" añade una tonalidad más específica de culto que el hebreo no exige aquí.
- source_word: מִזְמוֹר
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - salmodia
  - composición musical
  lexicon: HALOT
  rationale: El término ya funciona en español como género bíblico establecido. "Salmo" preserva la distinción entre שִׁיר y מִזְמוֹר, igual que en el inglés POB, sin forzar una glosa explicativa.
- source_word: לִבְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - para los hijos de
  - de los descendientes de
  lexicon: HALOT
  rationale: La preposición ל en estos encabezados puede marcar pertenencia, dedicación, asociación o autoría. En español, "de los hijos de" mantiene esa amplitud con la menor sobreinterpretación posible.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  - Cora
  lexicon: HALOT
  rationale: Se adopta la forma bíblica tradicional en español "Coré", que es transparente para lectores eclesiales y corresponde al nombre propio del hebreo. "Korah" sería más transliterado, pero menos natural en español bíblico.
theological_decisions:
- issue: Función de לִבְנֵי קֹרַח en el encabezado
  english_pob_reading: of the sons of Korah
  chosen_spanish_reading: de los hijos de Coré
  alternative_spanish_readings:
  - para los hijos de Coré
  - de los descendientes de Coré
  rationale: 'Se conserva la ambigüedad del hebreo: puede indicar autoría, asociación, dedicación o contexto de ejecución. No se especifica una relación más estrecha de la que el texto permite.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto fuente hebreo y la auditoría inglesa; no hubo revisiones aplicadas en el último pase. La versión española conserva la doble designación genérica («cántico» / «salmo») y la ambigüedad de לִבְנֵי sin añadir información no sustentada.
  spanish_consistency_notes:
  - Se mantiene «salmo» como término técnico establecido en español bíblico.
  - Se usa «Coré» en vez de una transliteración inglesa para mayor naturalidad y consistencia con el uso bíblico español.
  - La nota conserva la ambigüedad funcional del hebreo sin resolverla a favor de autoría o dedicación.
