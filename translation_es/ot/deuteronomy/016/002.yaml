    issue: «de la oveja y del ganado» traduce de forma inadecuada צֹאן וּבָקָר
    rationale: צֹאן es un sustantivo colectivo para rebaño/pequeño ganado, no una referencia singular a «la oveja». La forma actual reduce y distorsiona el alcance léxico del hebreo, además de sonar poco natural en español.
  revised_spanish_text: Y sacrificarás la Pascua a Yahvé tu Dios[a], del rebaño y del ganado, en el lugar que Yahvé escogerá para hacer habitar allí su nombre.
