- from: regocijándome en el mundo de su tierra,[a] y mi deleite estaba con los hijos de los hombres.[b]
  to: regocijándome en el mundo de su tierra,[a] y mi deleite estaba con los hijos del hombre.[b]
  rationale: Se conserva la línea principal del borrador porque refleja adecuadamente el hebreo y el rastro auditado en inglés, pero se corrige «los hijos de los hombres» a «los hijos del hombre» para representar mejor בְּנֵי אָדָם en singular colectivo y mejorar el español. También se normaliza la redacción de las notas. No hace falta adjudicación adicional.
