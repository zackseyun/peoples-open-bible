translation:
  language: es
  text: Y sacrificaron el cordero de la Pascua[a] el día catorce del segundo mes. Entonces los sacerdotes y los levitas se avergonzaron y se consagraron, y trajeron holocaustos a la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la Pascua»; aquí se refiere a la víctima pascual, es decir, el cordero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחֲטוּ
  english_pob_choice: they slaughtered
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - degollaron
  - inmolaron
  lexicon: HALOT
  rationale: En este contexto cultual, el verbo describe la acción ritual sobre la víctima pascual. «Sacrificaron» comunica bien la acción sacrificial en español bíblico actual, aunque «degollaron» sería más literal al gesto físico y «inmolaron» más técnico.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover lamb
  chosen_spanish: el cordero de la Pascua
  alternatives_spanish:
  - la Pascua
  - el sacrificio de la Pascua
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual del POB inglés: no se trata solo de la fiesta, sino de la víctima pascual. En español, «el cordero de la Pascua» hace explícito el referente sin perder la ambigüedad cultual del hebreo.'
- source_word: בְּאַרְבָּעָה עָשָׂר לַחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: on the fourteenth day of the second month
  chosen_spanish: el día catorce del segundo mes
  alternatives_spanish:
  - el catorce del segundo mes
  - el día catorce del mes segundo
  lexicon: HALOT
  rationale: Es la equivalencia calendárica natural en español. «Día» se incluye para claridad idiomática, como en el inglés auditado.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los clérigos
  - los presbíteros
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente estándar para el personal cultual del templo. «Clérigos» y «presbíteros» introducirían connotaciones ajenas al hebreo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los hijos de Leví
  - la tribu de Leví
  lexicon: HALOT
  rationale: Término técnico ya establecido en español bíblico para la otra clase de personal del templo, distinta de los sacerdotes.
- source_word: נִכְלְמוּ
  english_pob_choice: were ashamed
  chosen_spanish: se avergonzaron
  alternatives_spanish:
  - fueron humillados
  - sintieron vergüenza
  lexicon: HALOT
  rationale: El nifal de כלם expresa vergüenza/humillación. «Se avergonzaron» es natural y conserva la respuesta moral de los ministros ante su descuido.
- source_word: וַיִּתְקַדְּשׁוּ
  english_pob_choice: consecrated themselves
  chosen_spanish: se consagraron
  alternatives_spanish:
  - se santificaron
  - se purificaron para el servicio
  lexicon: HALOT
  rationale: La acción es cultual y refleja preparación ritual para el servicio. «Se consagraron» es claro y mantiene el matiz ceremonial del hebreo sin caer en un calco excesivamente arcaico.
- source_word: וַיָּבִיאוּ עֹלוֹת
  english_pob_choice: they brought burnt offerings
  chosen_spanish: trajeron holocaustos
  alternatives_spanish:
  - presentaron holocaustos
  - trajeron ofrendas quemadas
  lexicon: HALOT
  rationale: «עֹלוֹת» son ofrendas totalmente quemadas; en español bíblico «holocaustos» es el término técnico tradicional y preciso. «Trajeron» reproduce el verbo de movimiento/ofrenda y mantiene el registro cultual.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la política POB de traducir יְהוָה como «Yahvé» y el sintagma literal «casa de». «Templo» explicita demasiado; «SEÑOR» ocultaría el nombre divino.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La base auditada del POB usa «Yahweh» para el Tetragrámaton. En español, la forma estable y transparente adoptada es «Yahvé», manteniendo el nombre divino visible sin la convención de reemplazo litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de הַפֶּסַח en este contexto
  english_pob_reading: the Passover lamb
  chosen_spanish_reading: el cordero de la Pascua
  alternative_spanish_readings:
  - la Pascua
  - el sacrificio pascual
  rationale: 'La tensión lexical debe preservarse: el hebreo puede nombrar la fiesta o la víctima. Aquí, como en el POB inglés, el contexto exige la víctima sacrificada. En español, «cordero de la Pascua» hace explícita esa referencia concreta.'
  doctrine_reference: HALOT, s.v. פֶּסַח; uso contextual en el versículo
translation_notes:
  revision_awareness: 'El POB inglés más reciente mantiene sin cambios su lectura: «slaughtered the Passover lamb», «were ashamed», «consecrated themselves» y «house of Yahweh», con la nota lexical sobre הַפֶּסַח. Mi borrador sigue ese mismo trazado auditado, trasladando la decisión principal al español con equivalentes naturales y conservando la nota sobre la ambigüedad de הַפֶּסַח.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el proyecto en español.
  - «Sacerdotes» y «levitas» se usan como términos técnicos estables, sin sustituirlos por vocabulario eclesiástico posterior.
  - «Holocaustos» se conserva por su valor técnico cultual y su correspondencia directa con עֹלוֹת.
  - La nota [a] se ancla en «cordero de la Pascua» para conservar la alternativa lexical documentada.
