revisions:
- from: Alégrense con Jerusalén y gócense en ella[a], todos los que la aman; exulten con ella en gozo[b], todos los que hacen duelo por ella.
  to: Alégrense con Jerusalén y alégrense en ella[a], todos los que la aman; regocíjense con ella con gozo[b], todos los que hacen duelo por ella.
  rationale: Ajusté dos expresiones para mejorar la naturalidad y seguir más de cerca la revisión auditada del English POB. «Alégrense en ella» conserva בָהּ sin el giro menos idiomático «gócense en ella». «Regocíjense con ella con gozo» preserva el énfasis del sustantivo cognado מָשׂוֹשׂ, pero suena más natural que «exulten con ella en gozo». Mantuve «hacen duelo por ella» porque es fiel al campo semántico de אבל y suficientemente claro.
