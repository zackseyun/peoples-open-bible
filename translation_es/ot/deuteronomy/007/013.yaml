translation:
  language: es
  text: 'Él te amará, te bendecirá y te multiplicará. Bendecirá el fruto de tu vientre y el fruto de tu tierra: tu grano, tu vino nuevo y tu aceite, las crías de tus hatos y las crías de tu rebaño, en la tierra que juró a tus padres[a] darte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘a tus antepasados’. El hebreo dice ‘a tus padres’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲהֵבְךָ
  english_pob_choice: He will love you
  chosen_spanish: Él te amará
  alternatives_spanish:
  - Él te amará con fidelidad de pacto
  - Él te mostrará amor
  lexicon: HALOT
  rationale: Conservo el futuro y el verbo simple 'amar' para expresar la secuencia de bendición. En español, 'amará' mantiene la fuerza afectiva y pactal sin añadir explicaciones no presentes en el texto.
- source_word: וּבֵרַכְךָ
  english_pob_choice: bless you
  chosen_spanish: te bendecirá
  alternatives_spanish:
  - te dará bendición
  - te impartirá bendición
  lexicon: HALOT
  rationale: '''Bendecirá'' es la correspondencia natural y fiel de ברך en contexto de pacto y abundancia.'
- source_word: וְהִרְבֶּךָ
  english_pob_choice: multiply you
  chosen_spanish: te multiplicará
  alternatives_spanish:
  - te hará muy numeroso
  - te aumentará
  lexicon: HALOT
  rationale: Mantengo el paralelismo verbal y el sentido de aumento numérico/poblacional del hebreo.
- source_word: וּבֵרַךְ פְּרִי בִטְנְךָ
  english_pob_choice: He will bless the fruit of your womb
  chosen_spanish: Bendecirá el fruto de tu vientre
  alternatives_spanish:
  - Bendecirá el fruto de tu seno
  - Bendecirá tu descendencia
  lexicon: HALOT
  rationale: '''Fruto de tu vientre'' conserva el giro idiomático concreto del hebreo sin reemplazarlo por una abstracción.'
- source_word: וּפְרִי אַדְמָתֶךָ
  english_pob_choice: the fruit of your ground
  chosen_spanish: el fruto de tu tierra
  alternatives_spanish:
  - el fruto de tu suelo
  - la producción de tu tierra
  lexicon: HALOT
  rationale: '''Tierra'' comunica de forma natural el campo cultivado y evita un calco pesado, conservando la repetición de פְּרִי.'
- source_word: דְּגָנְךָ
  english_pob_choice: your grain
  chosen_spanish: tu grano
  alternatives_spanish:
  - tu cereal
  - tu cereal cosechado
  lexicon: HALOT
  rationale: '''Grano'' es la equivalencia española clara para el producto cerealístico cosechado.'
- source_word: וְתִירֹשְׁךָ
  english_pob_choice: your new wine
  chosen_spanish: tu vino nuevo
  alternatives_spanish:
  - tu vino fresco
  - tu mosto
  lexicon: HALOT
  rationale: '''Vino nuevo'' reproduce la distinción de תירוש respecto de vino ya maduro; es comprensible y tradicional en español bíblico sin ser arcaizante.'
- source_word: וְיִצְהָרֶךָ
  english_pob_choice: your oil
  chosen_spanish: tu aceite
  alternatives_spanish:
  - tu aceite de oliva
  - tu aceite nuevo
  lexicon: HALOT
  rationale: '''Aceite'' es la forma natural en español; el contexto agrícola permite entender que se trata del aceite de oliva sin necesidad de explicitarlo.'
- source_word: שְׁגַר אֲלָפֶיךָ
  english_pob_choice: the offspring of your herds
  chosen_spanish: la cría de tus hatos
  alternatives_spanish:
  - la cría de tus reses
  - la descendencia de tus hatos
  lexicon: HALOT
  rationale: '''Hatos'' mantiene la idea de ganado/carece. ''Cría'' expresa correctamente el sentido de progenie animal y evita una paráfrasis excesiva.'
- source_word: וְעַשְׁתְּרֹת צֹאנֶךָ
  english_pob_choice: the young of your flock
  chosen_spanish: las primicias[b] de tu rebaño
  alternatives_spanish:
  - las crías de tu rebaño
  - los nacimientos de tu rebaño
  lexicon: HALOT
  rationale: El hebreo es un término difícil y poco transparente; la POB inglesa optó por una equivalencia de sentido ('young of your flock'). En español, 'primicias' preserva el campo semántico de lo que sale primero del rebaño, pero reconozco en nota la alternativa más directa 'crías'.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el país
  lexicon: HALOT
  rationale: En este contexto 'en la tierra' suena natural y refleja el territorio prometido, como en el inglés auditado.
- source_word: אֲשֶׁר נִשְׁבַּע לַאֲבֹתֶיךָ לָתֶת לָךְ
  english_pob_choice: that he swore to your fathers to give you
  chosen_spanish: que juró a tus padres darte
  alternatives_spanish:
  - que juró a tus antepasados darte
  - que juró a tus padres para dártela
  lexicon: HALOT
  rationale: Sigo la lectura masculinizada explícita del hebreo ('tus padres'), conservando también el enlace del juramento y el don de la tierra. El dativo final se vuelve natural en español con 'darte'.
theological_decisions:
- issue: Tratamiento de לַאֲבֹתֶיךָ (masculino plural)
  english_pob_reading: to your fathers
  chosen_spanish_reading: a tus padres
  alternative_spanish_readings:
  - a tus antepasados
  rationale: El hebreo usa un plural masculino concreto. Mantengo 'padres' para respetar la forma del texto y la decisión auditada de la POB inglesa, evitando neutralizar el término sin necesidad textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Término difícil עַשְׁתְּרֹת צֹאנֶךָ
  english_pob_reading: the young of your flock
  chosen_spanish_reading: las primicias de tu rebaño
  alternative_spanish_readings:
  - las crías de tu rebaño
  - la prole de tu rebaño
  rationale: El hebreo presenta una expresión poco transparente. La opción española intenta sostener la idea de aumento reproductivo del rebaño sin borrar la dificultad; se deja una alternativa más literal en la nota para no cerrar indebidamente la ambigüedad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La POB inglesa revisó 'herd' a 'herds' para reflejar mejor el plural hebreo en שְׁגַר אֲלָפֶיךָ. En español se reflejó ese plural con 'hatos' y se mantuvo la estructura de bendición agrícola y ganadera sin añadir contenido ajeno al texto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto fuente lo requiera; en este versículo no aparece el nombre divino explícito, por lo que no se introdujo.
  - Se conservaron imágenes concretas de fertilidad y producción agrícola ('fruto de tu vientre', 'fruto de tu tierra', 'grano', 'vino nuevo', 'aceite') siguiendo la pauta del original y del audit trail inglés.
  - Se evitó traducir dinámicamente 'tus padres' por 'tus antepasados' en el texto principal, pero se dejó la alternativa en nota por consistencia con la decisión auditada.
