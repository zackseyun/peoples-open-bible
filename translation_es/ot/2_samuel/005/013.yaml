translation:
  language: es
  text: Y David tomó más concubinas y esposas en Jerusalén, después de venir de Hebrón[a], y le nacieron más hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «de Jerusalén», lo que puede indicar el lugar desde el cual David las tomó después de establecerse allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - adquirió
  - llevó
  lexicon: HALOT
  rationale: לקח en este contexto describe tomar mujeres para unión conyugal o concubinato. «Tomó» conserva la sobriedad narrativa y la relación directa con el hebreo sin añadir matices interpretativos.
- source_word: ע֜וֹד
  english_pob_choice: more
  chosen_spanish: todavía más
  alternatives_spanish:
  - más
  - además
  lexicon: HALOT
  rationale: El adverbio expresa adición. «Todavía más» refleja bien la acumulación en ambas cláusulas y suena natural en español bíblico contemporáneo.
- source_word: פִּֽלַגְשִׁים
  english_pob_choice: concubines
  chosen_spanish: concubinas
  alternatives_spanish:
  - mujeres secundarias
  - amantes
  lexicon: HALOT
  rationale: El término hebreo distingue una categoría social y sexual específica; «concubinas» la preserva de forma transparente y reconocible en español.
- source_word: וְנָשִׁים
  english_pob_choice: wives
  chosen_spanish: esposas
  alternatives_spanish:
  - mujeres
  - mujeres casadas
  lexicon: HALOT
  rationale: En coordinación con «concubinas» y en el marco de la casa real, נשים aquí apunta a relaciones conyugales. «Esposas» evita la ambigüedad de «mujeres» y distingue la segunda categoría.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: Aunque el hebreo lleva מן, la revisión auditada del POB inglés favorece la lectura contextual «in Jerusalem». En español se mantiene esa solución para no forzar «desde», que sería menos natural y más interpretativa aquí.
- source_word: אַחֲרֵי בֹּא֣/וֹ מֵ/חֶבְר֑וֹן
  english_pob_choice: after he came from Hebron
  chosen_spanish: después de haber venido de Hebrón
  alternatives_spanish:
  - después de venir de Hebrón
  - después de que vino de Hebrón
  lexicon: HALOT
  rationale: La frase temporal sitúa la acción tras el traslado desde Hebrón. «Después de haber venido» conserva el valor temporal y resulta idiomático en español formal.
- source_word: וַיִּוָּלְדּוּ
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - fueron nacidos
  lexicon: HALOT
  rationale: El nifal de ילד se expresa naturalmente en español con una construcción impersonal o dativa. «Le nacieron» refleja la relación de pertenencia implícita en לְדָוִד mejor que un pasivo rígido.
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  - de David
  lexicon: HALOT
  rationale: La preposición marca relación con David como destinatario/poseedor de los nacimientos. En español, «le nacieron a David» comunica esa relación de forma clara e idiomática.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - descendencia
  lexicon: HALOT
  rationale: El hebreo nombra ambos sexos explícitamente; «hijos e hijas» conserva esa especificidad mejor que el generalizante «descendencia».
theological_decisions:
- issue: Narrativa sobre la poligamia de David
  english_pob_reading: Render the verse descriptively without moral qualification.
  chosen_spanish_reading: Traducir el versículo de manera descriptiva, sin añadir aprobación ni censura.
  alternative_spanish_readings:
  - añadir un matiz evaluativo
  - suavizar la poligamia con lenguaje no específico
  rationale: El hebreo registra los hechos y el nacimiento posterior de hijos e hijas sin comentario moral explícito. La traducción no debe importar una valoración doctrinal que el texto no formula.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not import doctrinal claims not stated by the verse.'
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que corrigió «from Jerusalem» a «in Jerusalem» por precisión léxica con el preposición hebrea; la versión española adopta esa misma lectura contextualizada. También se conservó la distinción entre concubinas y esposas, y se mantuvo la neutralidad moral descriptiva del versículo.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando corresponde al Tetragrámaton; aquí no aparece.
  - Conservé la distinción léxica entre «concubinas» y «esposas» para reflejar la coordinación hebrea.
  - Preferí la construcción dativa «le nacieron a David» para expresar el nifal de ילד de modo natural en español.
  - La nota [a] está anclada en el texto en el punto donde la lectura «en Jerusalén»/«de Jerusalén» afecta la interpretación.
