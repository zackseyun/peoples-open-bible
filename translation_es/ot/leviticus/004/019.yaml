translation:
  language: es
  text: Y quitará todo su sebo de este, y lo quemará sobre el altar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «y lo hará subir en humo sobre el altar». El verbo hebreo especifica la acción ritual de hacer subir una ofrenda en humo en un contexto sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y además
  lexicon: HALOT
  rationale: El hebreo enlaza esta acción con el rito precedente; en español, la simple conjunción conserva la continuidad narrativa sin añadir matiz no atestiguado.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: HALOT
  rationale: 'Expresa la totalidad exigida por el texto: no una parte, sino el conjunto completo del sebo.'
- source_word: חֶלְבּוֹ
  english_pob_choice: its fat
  chosen_spanish: su sebo
  alternatives_spanish:
  - su grasa
  - su gordura
  lexicon: HALOT
  rationale: En contexto levítico, חֵלֶב designa el sebo ritual reservado para el altar; 'sebo' preserva mejor el valor sacrificial que el genérico 'grasa'.
- source_word: יָרִים
  english_pob_choice: shall remove
  chosen_spanish: quitará
  alternatives_spanish:
  - retirará
  - levantará
  lexicon: HALOT
  rationale: La forma hifil puede implicar levantar o apartar, pero aquí la acción ritual es separar el sebo del animal para ofrecerlo; 'quitará' comunica bien esa separación sin perder el sentido operativo.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de ello
  - de ese animal
  lexicon: HALOT
  rationale: El sufijo remite al animal sacrificial; en español, el masculino singular es natural y mantiene la referencia sin añadir interpretación.
- source_word: וְהִקְטִיר
  english_pob_choice: and burn it
  chosen_spanish: y lo quemará
  alternatives_spanish:
  - y lo hará arder
  - y lo ofrecerá en humo
  lexicon: HALOT
  rationale: POB decidió 'burn it' por naturalidad formal en inglés, manteniendo el sentido sacrificial de הקטיר. En español, 'quemará' conserva la acción visible y resulta idiomático, mientras que el matiz cultual queda implicado por el contexto del altar.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: La terminación direccional y el verbo cultual favorecen una ubicación de ofrecimiento; 'sobre el altar' refleja mejor el acto ritual que 'en el altar'.
theological_decisions:
- issue: El sentido sacrificial de הִקְטִיר
  english_pob_reading: burn it on the altar
  chosen_spanish_reading: lo quemará sobre el altar
  alternative_spanish_readings:
  - lo ofrecerá en humo sobre el altar
  - lo hará subir en humo sobre el altar
  rationale: Se conserva el sentido ritual de ofrecer mediante combustión. 'Quemará' es suficientemente natural en español y no borra el trasfondo sacrificial, especialmente al estar unido al altar.
  doctrine_reference: Leviticus sacrificial procedure; cultic offering language
- issue: El valor léxico de חֵלֶב
  english_pob_reading: its fat
  chosen_spanish_reading: su sebo
  alternative_spanish_readings:
  - su grasa
  rationale: En español bíblico y ritual, 'sebo' distingue mejor la porción grasa destinada a Dios de la grasa común, preservando la fuerza cultual del término.
  doctrine_reference: Priestly sacrificial terminology
- issue: La referencia pronominal de מִמֶּנּוּ
  english_pob_reading: from it
  chosen_spanish_reading: de él
  alternative_spanish_readings:
  - de ello
  rationale: Aunque el referente es un animal, el texto hebreo lo trata como entidad masculina singular; 'de él' conserva esa concordancia de manera natural en español.
  doctrine_reference: Grammar and referent tracking in sacrificial law
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó una formulación más técnica por ''burn it'' para mayor naturalidad sin perder el sentido de הִקְטִיר. La versión española sigue esa línea: usa ''quemará'' para un registro fluido, pero mantiene el marco sacrificial explícito con ''sobre el altar''.'
  spanish_consistency_notes:
  - Se mantuvo 'altar' sin artículo adicional fuera de la construcción necesaria del español.
  - Se evitó 'Señor' o cualquier sustitución teológica ajena al texto, porque este versículo no contiene el nombre divino.
  - Se eligió 'sebo' en coherencia con el léxico sacrificial levítico y para distinguirlo de grasa genérica.
