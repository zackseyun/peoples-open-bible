translation:
  language: es
  text: Y Job volvió a tomar su discurso y dijo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su proverbio», «su parábola» o «su oráculo»; el término hebreo puede abarcar una gama amplia de dichos con peso o carácter figurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  english_pob_choice: again
  chosen_spanish: volvió a
  alternatives_spanish:
  - otra vez
  - de nuevo
  - continuó
  lexicon: HALOT
  rationale: El hebreo expresa reanudación o repetición de la acción; en español, «volvió a» comunica bien la idea de que Job retoma la palabra sin sonar rígido.
- source_word: שְׂאֵת
  english_pob_choice: took up
  chosen_spanish: tomar
  alternatives_spanish:
  - levantar
  - pronunciar
  - alzar
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y metáforica; «tomar su discurso» conserva la imagen de asumir o retomar la palabra, de modo cercano al valor de «took up» en el POB inglés.
- source_word: מְשָׁלוֹ
  english_pob_choice: his discourse
  chosen_spanish: su discurso
  alternatives_spanish:
  - su proverbio
  - su parábola
  - su oráculo
  lexicon: HALOT
  rationale: En Job, מָשָׁל puede abarcar dicho figurado, sentencia solemne o discurso poético amplio. «Discurso» refleja mejor aquí la función literaria que un género estrecho como «proverbio».
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y exclamó
  lexicon: HALOT
  rationale: Es la fórmula narrativa estándar; «y dijo» es la equivalencia natural y fiel en español.
- source_word: אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: Job
  lexicon: convención onomástica estándar
  rationale: Se conserva el nombre propio tradicional en español.
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la revisión más reciente y no requiere cambios sustantivos; se mantiene la equivalencia óptima del POB inglés, ajustada a una sintaxis natural en español.
  spanish_consistency_notes:
  - Se preserva el arranque narrativo con una fórmula breve y solemne.
  - «Discurso» se usa aquí como término funcional para מָשָׁל en este contexto poético; la nota conserva alternativas lexicales relevantes.
  - No se introduce terminología eclesiástica añadida ni una paráfrasis interpretativa más allá de lo que exige el hebreo.
