translation:
  language: es
  text: Y les pasó revista en Bezec[a], y los hijos de Israel eran trescientos mil, y los hombres de Judá treinta mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en Bezec'. El hebreo lleva el nombre de lugar בְּבָזֶק.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקְדֵם
  english_pob_choice: He mustered them
  chosen_spanish: los pasó revista
  alternatives_spanish:
  - los numeró
  - los revisó
  lexicon: HALOT
  rationale: En contexto militar, פקד no es un conteo abstracto sino la acción de pasar revista o reunir tropas para alistarlas. En español, 'pasó revista' comunica ese matiz de manera natural y fiel.
- source_word: בְּבָזֶק
  english_pob_choice: at Bezek
  chosen_spanish: en Bezec[a]
  alternatives_spanish:
  - en Bezek
  - en Bezec
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera. La preposición hebrea admite 'en' en español, que suena natural para una localización de reunión o muster.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se preserva la expresión familiar/literaria del hebreo. 'Hijos de Israel' mantiene la forma masculina representativa y la distinción con Judá que es importante en este versículo.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף
  english_pob_choice: three hundred thousand
  chosen_spanish: trescientos mil
  alternatives_spanish:
  - trescientos mil
  lexicon: HALOT
  rationale: La construcción numeral se vierte directamente con la cifra cardinal estándar en español.
- source_word: וְאִישׁ יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - cada hombre de Judá
  - Judá
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular, funciona colectivamente. 'Los hombres de Judá' expresa ese sentido colectivo de forma natural en español.
- source_word: שְׁלֹשִׁים אָלֶף
  english_pob_choice: thirty thousand
  chosen_spanish: treinta mil
  alternatives_spanish:
  - treinta mil
  lexicon: HALOT
  rationale: La construcción numeral se traduce de manera directa y transparente.
theological_decisions:
- issue: Expresión corporativa 'los hijos de Israel' frente a 'los israelitas'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  rationale: No hay controversia doctrinal, pero se conserva la formulación masculina representativa del hebreo y la distinción narrativa entre Israel y Judá. En español, 'hijos de Israel' evita aplanar la imagen a un etnónimo más genérico.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El pasaje coincide con el paquete fuente y el audit trail inglés; no se aplicaron revisiones recientes y el estado de concordancia es alto, por lo que el borrador español sigue la misma solución lexical y estructural con adaptación idiomática mínima.
  spanish_consistency_notes:
  - Se mantiene 'Bezec' como transliteración del topónimo.
  - Se conserva la distinción entre 'los hijos de Israel' y 'los hombres de Judá' para reflejar la estructura del hebreo.
  - Se usa un español sobrio y publicable, sin introducir paráfrasis ajenas al texto.
