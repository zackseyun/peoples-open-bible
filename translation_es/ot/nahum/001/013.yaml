translation:
  language: es
  text: Y ahora quebraré su yugo[a] de encima de ti, y arrancaré tus cadenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su barra». El término hebreo puede significar vara, barra o yugo; aquí «yugo» encaja mejor con la imagen paralela de opresión y cadenas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Pero ahora
  - Ahora
  lexicon: HALOT
  rationale: La partícula introduce una acción divina inminente; «Y ahora» conserva el enlace discursivo y suena natural en español.
- source_word: אֶשְׁבֹּר
  english_pob_choice: I will break
  chosen_spanish: quebraré
  alternatives_spanish:
  - romperé
  - haré pedazos
  lexicon: HALOT
  rationale: El verbo expresa ruptura; «quebraré» mantiene el valor directo y encaja con la imagen metafórica del yugo.
- source_word: מֹטֵהוּ
  english_pob_choice: his yoke
  chosen_spanish: su yugo
  alternatives_spanish:
  - su barra
  - su vara
  lexicon: HALOT
  rationale: El término hebreo puede denotar vara, barra o yugo; en este contexto de opresión y junto a «ligaduras», «yugo» comunica mejor la sujeción impuesta. Se conserva el sufijo de tercera persona singular sin identificar al opresor.
- source_word: מֵעָלַיִךְ
  english_pob_choice: from upon you
  chosen_spanish: de sobre ti
  alternatives_spanish:
  - de ti
  - de encima de ti
  lexicon: HALOT
  rationale: La preposición más עַל conserva la imagen de algo que pesa «sobre» la destinataria femenina singular.
- source_word: וּמוֹסְרֹתַיִךְ
  english_pob_choice: your bonds
  chosen_spanish: tus ligaduras
  alternatives_spanish:
  - tus cadenas
  - tus ataduras
  - tus grilletes
  lexicon: HALOT
  rationale: El sustantivo plural se usa metafóricamente para cautiverio o sometimiento; «ligaduras» mantiene el paralelismo con el yugo y es suficientemente amplio para la metáfora.
- source_word: אֲנַתֵּק
  english_pob_choice: I will tear off
  chosen_spanish: romperé
  alternatives_spanish:
  - arrancaré
  - desataré
  - haré pedazos
  lexicon: HALOT
  rationale: El valor de נתק es separar/arrancar con violencia. En español, «romperé» evita una doble imagen demasiado distinta y funciona bien en paralelo con el verbo anterior.
theological_decisions:
- issue: Sufijo masculino singular en «su yugo»
  english_pob_reading: Retain the generic third-person singular 'his yoke' without specifying the oppressor in the translation.
  chosen_spanish_reading: Mantener «su yugo» sin nombrar al opresor.
  alternative_spanish_readings:
  - el yugo de Asiria
  - su barra
  rationale: El hebreo solo señala un poseedor de tercera persona singular; el texto no lo identifica explícitamente. La traducción respeta esa reserva y no importa una identificación interpretativa al texto principal.
  doctrine_reference: Primacía del texto fuente y prudencia exegética; no introducir precisiones no explicitadas por el hebreo.
translation_notes:
  revision_awareness: La versión española sigue el pasaje con alta concordancia respecto del texto hebreo y del audit trail inglés; no se detectaron revisiones aplicadas en el último pase.
  spanish_consistency_notes:
  - Se mantuvo la segunda persona singular femenina («ti», «tus») conforme al hebreo.
  - Se conservó el paralelismo entre el instrumento de opresión («yugo») y sus ataduras («ligaduras»).
  - Se evitó identificar explícitamente al opresor en el cuerpo del texto, siguiendo la cautela del audit trail inglés.
