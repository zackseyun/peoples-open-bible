translation:
  language: es
  text: Sé el primero en detenerte[a], por buena educación, y no seas un glotón, para que no seas despreciado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo מוסר suele significar «disciplina» o «instrucción»; aquí, por el contexto de la mesa, se entiende mejor como conducta adecuada, decoro o buenas maneras.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de este versículo está atestiguado, pero el paquete de datos señala una discrepancia de fuente; la traducción sigue el testimonio hebreo como texto principal y no intenta armonizarlo con el paralelo griego, que no corresponde a esta línea.
    reason: textual_variant
lexical_decisions:
- source_word: חדל
  english_pob_choice: stop
  chosen_spanish: detenerte
  alternatives_spanish:
  - cesar
  - dejar de comer
  - pararte
  lexicon: HALOT
  rationale: En este contexto de mesa, la exhortación pide que la persona deje de comer antes que los demás; «detenerte» comunica el acto de parar sin sonar tan rígido como «cesar».
- source_word: ראשון
  english_pob_choice: be the first
  chosen_spanish: sé el primero
  alternatives_spanish:
  - sé el primero en hacerlo
  - antes que otros
  - primero
  lexicon: HALOT
  rationale: 'La expresión funciona de modo adverbial/predicativo con el imperativo: se exhorta a adelantar el acto de parar, no a ser «primero» en abstracto.'
- source_word: בעבור
  english_pob_choice: for the sake of
  chosen_spanish: por respeto a
  alternatives_spanish:
  - por causa de
  - en favor de
  - por amor a
  lexicon: HALOT
  rationale: La frase introduce el motivo ético-social. «Por respeto a» hace natural en español la finalidad de la conducta en un banquete y preserva la idea de consideración.
- source_word: מוסר
  english_pob_choice: good manners
  chosen_spanish: las buenas maneras
  alternatives_spanish:
  - la disciplina
  - la instrucción
  - la cortesía
  - la propriedad
  lexicon: HALOT
  rationale: Aunque מוסר suele significar «disciplina» o «instrucción», aquí el contexto de mesa apunta a conducta apropiada. «Buenas maneras» expresa bien la dimensión de urbanidad sin forzar el sentido.
- source_word: גרגרן
  english_pob_choice: glutton
  chosen_spanish: glotón
  alternatives_spanish:
  - comedón
  - glotón avaricioso
  - comilón
  lexicon: HALOT
  rationale: El sustantivo describe a quien come con avidez. «Glotón» es el equivalente natural en español y mantiene la censura moral del término.
- source_word: תמאס
  english_pob_choice: despised
  chosen_spanish: seas despreciado
  alternatives_spanish:
  - seas rechazado
  - seas aborrecido
  - seas detestado
  lexicon: HALOT
  rationale: La raíz expresa rechazo o desprecio. «Seas despreciado» sigue de cerca la revisión final del inglés POB y conserva el efecto social de repulsión por la glotonería.
translation_notes:
  revision_awareness: Seguí la línea final del audit trail en inglés y tomé el hebreo como testimonio principal para esta traducción, manteniendo la advertencia ética de mesa y la nota sobre la discrepancia textual con el paralelo griego dado.
  spanish_consistency_notes:
  - Se usa un registro moderno y digno, evitando arcaísmos innecesarios.
  - «Glotón» conserva la fuerza moral del hebreo y del inglés auditado.
  - «Buenas maneras» se eligió por claridad contextual; la nota conserva la tensión con el valor más frecuente de מוסר.
  - La construcción final «no sea que seas despreciado» sigue el tono admonitorio del original y de la revisión inglesa más reciente.
