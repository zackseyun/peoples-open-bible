  source_alignment_summary: 'El borrador sigue bien el griego en la estructura principal: ἐγώ εἰμι ἡ θύρα = «Yo soy la puerta»; δι’ ἐμοῦ = «por mí»; σωθήσεται = «será salvo»; εἰσελεύσεται καὶ ἐξελεύσεται = «entrará y saldrá»; νομὴν εὑρήσει = «hallará pasto». La única desviación relevante está en la nota: el inglés conserva la alternativa lexical «gate», pero la nota española ofrece «O “puerta”», que repite el texto principal en vez de preservar la alternativa contextual. Además, «entrada» en la nota actual no corresponde tan de cerca a la alternativa auditada.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico contemporáneo. «Será salvo» y «hallará» son dignos y comprensibles. «Pasto» es posible, aunque «pastos» o «pastura» podrían sonar más idiomáticos en algunos contextos; no obstante, «pasto» sigue siendo aceptable y fiel al singular griego. La puntuación con punto seguido en vez de punto y coma no es problemática. La reparación necesaria es menor y se limita a la nota al pie.
  glossary_alignment: No hay conflicto con la terminología por defecto del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La decisión «puerta» para θύρα está alineada con el audit trail. Debe corregirse la nota para reflejar la alternativa contextual equivalente a «portón»/«tranquera» más que repetir «puerta».
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa lexical documentada en el audit trail inglés.
    rationale: El inglés dice «Or “gate.”» para θύρα. La nota española dice «O “puerta”», que duplica el texto principal y falla en transmitir la alternativa interpretativa relevante. Esto afecta la fidelidad al expediente de auditoría, aunque no al sentido principal del versículo.
  - severity: low
    issue: La explicación de la nota menciona «entrada», que es más interpretativa que la alternativa auditada.
    rationale: «Entrada» puede ser defendible en abstracto, pero no corresponde tan directamente al contraste door/gate preservado en el POB inglés. Conviene una alternativa española más cercana, como «portón».
  revised_spanish_text: Yo soy la puerta. Si alguno entra por mí[a], será salvo; entrará y saldrá, y hallará pasto.
  revised_footnotes:
  - marker: a
    text: O «portón». La palabra griega puede denotar una puerta o un portón; «puerta» se conserva en el texto principal como la traducción léxica más directa.
    reason: lexical_alternative
  revision_rationale: El texto principal es sustancialmente fiel y legible; solo hace falta corregir la nota para que preserve la alternativa lexical auditada para θύρα en vez de repetir «puerta».
