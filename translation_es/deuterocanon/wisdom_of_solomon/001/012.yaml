  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: una doble prohibición, primero contra perseguir la muerte por el extravío de la propia vida, y luego contra traerse ruina a uno mismo por las obras de las propias manos. Conserva adecuadamente «muerte», «destrucción» y la expresión concreta «obras de sus manos». También mantiene las alternativas léxicas documentadas en las notas.'
  spanish_quality_summary: La redacción es mayormente clara, pero «codicien la muerte» suena poco idiomático y semánticamente desviado en español bíblico general, porque «codiciar» suele referirse a desear posesiones ajenas o bienes, no a «muerte». Además, «sobre sí» es menos natural que «sobre ustedes mismos» o «sobre sí mismos» en una exhortación directa; y conviene un ajuste menor para mayor fluidez y fidelidad idiomática.
  glossary_alignment: No hay términos de glosario mayor en disputa. La traducción respeta bien las decisiones del POB para ζηλοῦτε, ἐπισπᾶσθε y ἔργοις χειρῶν ὑμῶν, pero la realización española más fiel al sentido y más natural es «busquen» o «deseen» antes que «codicien».
  issues:
  - severity: medium
    issue: «codicien la muerte»
    rationale: Aunque intenta captar la fuerza activa de ζηλοῦτε, «codiciar» en español suele asociarse con bienes deseables o ajenos; con «muerte» resulta extraño y menos natural que «busquen» o «deseen». El original advierte contra procurar o atraer la muerte, no contra un tipo específico de avidez posesiva.
  - severity: low
    issue: «sobre sí» en segunda persona plural
    rationale: Es comprensible, pero en español actual suena más natural «sobre ustedes mismos» o «sobre sí mismos». En contexto exhortativo, «sobre ustedes mismos» comunica mejor el valor reflexivo del medio ἐπισπᾶσθε.
  - severity: low
    issue: Anclaje de notas
    rationale: La nota [b] está anclada a «manos», aunque en inglés el comentario se aplica a toda la frase «works of your hands». No es un error grave, pero conviene mantener el anclaje al sintagma relevante.
  revised_spanish_text: No busquen la muerte por el error de su vida[a], ni atraigan la destrucción sobre ustedes mismos por las obras de sus manos[b].
