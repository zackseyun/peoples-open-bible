translation:
  language: es
  text: Y se enfrentaron entre sí en batalla[a], y cayeron del campamento de Lisias unos cinco mil hombres[b], y cayeron delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «combatieron entre sí»; el verbo griego συμβάλλω en contexto militar puede expresar el hecho de trabar combate o chocar en batalla.
    reason: lexical_alternative
  - marker: b
    text: O «cayeron cinco mil hombres del campamento de Lisias»; la construcción griega con εἰς puede entenderse como aproximación numérica o como un total alcanzado.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβαλλον ἀλλήλοις
  english_pob_choice: they engaged one another in battle
  chosen_spanish: se enfrentaron entre sí en batalla
  alternatives_spanish:
  - entablaron batalla entre sí
  - combatieron uno contra otro
  - se trabaron en batalla entre sí
  lexicon: LSJ
  rationale: Con συμβάλλω en contexto militar, el sentido es entrar en combate o enfrentarse en batalla. «Se enfrentaron entre sí en batalla» conserva el recíproco de ἀλλήλοις y mantiene el tono bélico sin sonar demasiado literal ni añadir matices ajenos al griego.
- source_word: ἔπεσον
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - perecieron
  - fueron muertos
  - cayeron muertos
  lexicon: LSJ
  rationale: En narrativa de batalla, «cayeron» reproduce bien el valor idiomático de «fell» sin explicitar más de lo que dice el griego. «Fueron muertos» sería más interpretativo; «perecieron» desplaza el matiz hacia la muerte en general.
- source_word: ἐκ τῆς παρεμβολῆς Λυσίου
  english_pob_choice: from the camp of Lysias
  chosen_spanish: del campamento de Lisias
  alternatives_spanish:
  - del campamento militar de Lisias
  - de la tienda de guerra de Lisias
  - del campamento de Lisias
  lexicon: LSJ
  rationale: παρεμβολή en contexto militar significa campamento o encampamento. «Del campamento de Lisias» es natural en español y preserva la relación genitiva sin sobreexplicar.
- source_word: εἰς πεντακισχιλίους ἄνδρας
  english_pob_choice: about five thousand men
  chosen_spanish: unos cinco mil hombres
  alternatives_spanish:
  - aproximadamente cinco mil hombres
  - cinco mil hombres
  - hasta cinco mil hombres
  lexicon: LSJ
  rationale: La preposición εἰς con cifras puede marcar aproximación o alcance numérico. «Unos cinco mil hombres» refleja mejor esa posible aproximación que un numeral desnudo, y evita volver demasiado rígida la cifra.
- source_word: ἐξ ἐναντίας αὐτῶν
  english_pob_choice: before them
  chosen_spanish: frente a ellos
  alternatives_spanish:
  - en frente de ellos
  - opuestos a ellos
  - ante ellos
  lexicon: LSJ
  rationale: La expresión indica posición de cara al adversario, en oposición. «Frente a ellos» comunica bien el valor espacial y combativo; «ante ellos» sería posible, pero menos transparente en español corriente. Se conserva la repetición de la caída final con un giro que no borra la relación con el combate.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente del audit trail: se prefirió un español natural para el choque bélico (equivalente a ‘engaged one another in battle’) y para la frase final se escogió un valor espacial más fiel a ἐξ ἐναντίας αὐτῶν (‘before them’), evitando una paráfrasis más libre. También se mantuvo la aproximación numérica sugerida por εἰς πεντακισχιλίους.'
  spanish_consistency_notes:
  - Se usa «campamento» para παρεμβολή, en línea con el valor militar reconocido en el expediente.
  - Se evita «Cristo», «SEÑOR» u otra terminología no presente en el texto; la única teología implícita es el lenguaje narrativo de guerra.
  - «Lisias» mantiene la transliteración habitual del nombre propio griego.
  - La cifra se expresa con «unos» para reflejar la posible aproximación del griego sin fijar con exceso el alcance numérico.
