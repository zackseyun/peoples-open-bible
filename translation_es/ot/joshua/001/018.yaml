translation:
  language: es
  text: Todo hombre que se rebele contra tu mandato y no escuche tus palabras en todo lo que le mandes será condenado a muerte[a]. Solo esfuérzate y sé valiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Todo hombre que se rebele contra tu boca». En este giro hebreo, «tu boca» significa tu mandato o palabra con autoridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אִישׁ
  english_pob_choice: Every man
  chosen_spanish: Todo hombre
  alternatives_spanish:
  - Toda persona
  - Quienquiera
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular masculino representativo y distributivo. «Todo hombre» conserva esa forma y su fuerza general sin neutralizarla indebidamente.
- source_word: יַמְרֶה
  english_pob_choice: rebels against
  chosen_spanish: se rebele contra
  alternatives_spanish:
  - se oponga a
  - desobedezca a
  - rebele contra
  lexicon: HALOT
  rationale: El verbo expresa rebelión/insubordinación frente a una autoridad. «Se rebele contra» mantiene esa carga de resistencia deliberada mejor que un simple «desobedezca».
- source_word: אֶת פִּיךָ
  english_pob_choice: your command
  chosen_spanish: tu mandato
  alternatives_spanish:
  - tu boca
  - lo que dices
  - tu orden
  lexicon: HALOT
  rationale: «Tu boca» es literal, pero en este giro idiomático significa la palabra autoritativa del dirigente. «Tu mandato» comunica el sentido sin perder la referencia a autoridad.
- source_word: וְלֹא יִשְׁמַע אֶת דְּבָרֶיךָ
  english_pob_choice: and does not listen to your words
  chosen_spanish: y no escuche tus palabras
  alternatives_spanish:
  - y no oiga tus palabras
  - y no obedezca tus palabras
  - y no preste atención a tus palabras
  lexicon: HALOT
  rationale: שׁמע aquí puede ser oír, escuchar u obedecer. Dado que la rebelión ya fue expresada con ימרה, «no escuche» conserva la distinción léxica y la respuesta requerida de atención obediente.
- source_word: לְכֹל אֲשֶׁר תְּצַוֶּנּוּ
  english_pob_choice: in all that you command him
  chosen_spanish: en todo lo que le mandes
  alternatives_spanish:
  - en todo lo que le ordenes
  - respecto de todo lo que le mandes
  - en todo cuanto le mandes
  lexicon: HALOT
  rationale: La frase delimita el alcance de la obediencia requerida. «En todo lo que le mandes» es natural en español y sigue de cerca la construcción hebrea.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será ejecutado
  - morirá
  - será puesto a muerte
  lexicon: HALOT
  rationale: La forma pasiva/causativa apunta a una muerte impuesta judicialmente. «Será muerto» conserva el tenor legal y solemne del hebreo; «será ejecutado» explicita el sentido pero suena más interpretativo.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Pero
  - Sin embargo
  - Únicamente
  lexicon: HALOT
  rationale: Aquí marca transición exhortativa y limitadora. «Solo» reproduce bien el énfasis conciso del hebreo y encaja con la frase siguiente.
- source_word: חֲזַק וֶאֱמָץ
  english_pob_choice: be strong and courageous
  chosen_spanish: esfuérzate y sé valiente
  alternatives_spanish:
  - sé fuerte y valiente
  - sé fuerte y resuelto
  - sé firme y valiente
  lexicon: HALOT
  rationale: La fórmula exhortativa de Josué suele requerir un español natural y bíblicamente reconocible. «Esfuérzate y sé valiente» expresa la llamada a firmeza activa y coraje; «sé fuerte y valiente» es una alternativa posible, pero «esfuérzate» evita una repetición demasiado plana con «fuerte» y mantiene el impulso exhortativo.
theological_decisions:
- issue: Idioma figurado de «tu boca»
  english_pob_reading: your command
  chosen_spanish_reading: tu mandato
  alternative_spanish_readings:
  - tu boca
  - tu palabra autorizada
  rationale: La frase hebrea no se refiere a la boca física sino a la palabra con autoridad. Traducirla como «tu mandato» evita una literalidad opaca y preserva la relación entre habla autorizada y obediencia.
  doctrine_reference: DOCTRINE.md §Lexical fidelity and idiom
- issue: Fuerza judicial de la pena
  english_pob_reading: shall be put to death
  chosen_spanish_reading: será muerto
  alternative_spanish_readings:
  - será ejecutado
  - deberá morir
  rationale: La forma verbal comunica una pena impuesta, no simplemente el desenlace natural de morir. «Será muerto» mantiene la gravedad legal sin añadir detalles procesales que el hebreo no da.
  doctrine_reference: DOCTRINE.md §Translation of legal forms
- issue: Representación masculina singular
  english_pob_reading: Every man
  chosen_spanish_reading: Todo hombre
  alternative_spanish_readings:
  - Toda persona
  - Quienquiera
  rationale: El hebreo presenta un singular masculino representativo. Se conserva en español por fidelidad formal y porque el contexto de liderazgo militar/jurídico no exige neutralización.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El contexto auditado de la versión inglesa coincide de manera alta con el hebreo: se mantiene la distinción entre rebelión y escucha/obediencia, la lectura idiomática de «tu boca» como mandato, y la fuerza judicial de יוּמָת. No hubo revisiones posteriores que alteraran la base de traducción.'
  spanish_consistency_notes:
  - Se conserva el paralelismo entre «se rebele contra» y «no escuche», siguiendo la diferencia léxica entre ימרה y שמע.
  - «Solo» traduce רַק con un matiz exhortativo limitado, coherente con el cierre de ánimo a Josué.
  - Se usa «mandato» para evitar un calco duro de «boca» y mantener una dicción bíblica clara en español.
  - La pena «será muerto» conserva el tono jurídico del pasivo hebreo sin sobreexplicar.
