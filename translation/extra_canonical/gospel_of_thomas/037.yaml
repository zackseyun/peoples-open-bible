translation:
  text: 'His disciples said, "When[a] will you be revealed[f] to us, and when will we see you?" Jesus said, "When you strip naked without being ashamed,[b] and you take your clothes and put them under your feet like[e] the little children,[c] and trample on them, then[d] you will see the Son of the Living One,[g] and you will not be afraid."'
