review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo y conserva adecuadamente «hijos de Israel», «un hombre», «no tiene hijo» y «su herencia ... a su hija». Sin embargo, «entonces pasarán su herencia» debilita el valor causativo/jurídico de וְהַעֲבַרְתֶּם y además introduce un sujeto plural menos claro que el mandato directo del hebreo. El sentido exige una acción de transferencia: «transferirán» o equivalente.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «pasarán su herencia» suena menos natural y menos preciso en registro jurídico que «transferirán su herencia». También conviene ajustar la nota para evitar repetir como alternativa exacta la misma lectura que ya está en el texto principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hijos de Israel» preserva la forma familiar masculina documentada. No aparecen términos teológicos sensibles adicionales.
  issues:
  - severity: medium
    issue: «pasarán su herencia» no expresa con suficiente precisión el valor legal-causativo de וְהַעֲבַרְתֶּם
    rationale: El hiphil de עבר aquí significa hacer que la herencia pase legalmente a otra persona. «Transferirán» comunica mejor el sentido administrativo/jurídico que el más ambiguo «pasarán».
  - severity: low
    issue: La nota al pie repite como alternativa una formulación idéntica a la del texto principal
    rationale: 'Si el texto principal ya dice «hijos de Israel», la alternativa útil es «israelitas» o posiblemente «los hijos de Jacob/Israel» no; la repetición no aporta información nueva. También conviene mantener el patrón del inglés: alternativa idiomática y explicación literal.'
  revised_spanish_text: 'Y hablarás a los hijos de Israel[a], diciendo: «Si un hombre muere y no tiene hijo, entonces transferirán su herencia a su hija».'
  revised_footnotes:
