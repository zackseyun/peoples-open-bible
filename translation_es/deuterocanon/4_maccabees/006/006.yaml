  to: 'Pero no, no, no: alzando los ojos hacia el cielo[a], el anciano estaba exponiendo su carne a los azotes, y chorreaba sangre[b], y sus costados eran traspasados[c].'
  rationale: 'Se corrigen dos puntos principales para ajustarse mejor al griego y al rastro POB: «chorreaba sangre» expresa mejor el fluir visible de sangre que «se desangraba», y «eran traspasados» conserva la fuerza de κατετιτρώσκετο mejor que «eran heridos». También se suaviza la frase inicial a un español más natural con «alzando los ojos hacia el cielo».'
