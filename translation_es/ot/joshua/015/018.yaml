translation:
  language: es
  text: 'Y cuando ella llegó[a], lo instó a pedirle a su padre un campo. Entonces descendió[b] del asno, y Caleb le dijo[c]: «¿Qué quieres?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ella entró»; la forma hebrea señala el momento de su llegada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se bajó del asno»; el verbo hebreo puede sugerir un descenso repentino.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «¿Qué hay contigo?». El hebreo expresa un modismo que aquí significa «¿Qué quieres?» o «¿Qué te preocupa?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבוֹאָהּ
  english_pob_choice: when she came
  chosen_spanish: cuando ella llegó
  alternatives_spanish:
  - cuando entró
  - al llegar ella
  lexicon: HALOT
  rationale: El infinitivo con ב y sufijo femenino indica una cláusula temporal. «Llegó» comunica de modo natural el arribo sin añadir más precisión espacial de la que exige el hebreo.
- source_word: וַתְּסִיתֵהוּ
  english_pob_choice: she urged him
  chosen_spanish: lo instó
  alternatives_spanish:
  - lo persuadió
  - lo incitó
  - lo animó
  lexicon: HALOT
  rationale: El verbo puede abarcar persuadir, instigar o urgir. En este contexto familiar y petitorio, «lo instó» conserva la fuerza activa sin cargarlo innecesariamente con un matiz negativo.
- source_word: לִשְׁאוֹל
  english_pob_choice: to ask
  chosen_spanish: pedir
  alternatives_spanish:
  - preguntar
  - solicitar
  - pedirle
  lexicon: HALOT
  rationale: Aquí שאל rige la petición de una posesión concreta, no una mera pregunta. «Pedir» expresa mejor la acción de solicitar un campo.
- source_word: מֵאֵת אָבִיהָ
  english_pob_choice: her father
  chosen_spanish: de su padre
  alternatives_spanish:
  - a su padre
  - por parte de su padre
  lexicon: HALOT
  rationale: La expresión hebrea marca la fuente o el interlocutor de la solicitud. En español, «pedir de su padre» conserva el origen de la petición y resulta comprensible; el objeto pedido se expresa con «un campo».
- source_word: שָׂדֶה
  english_pob_choice: a field
  chosen_spanish: un campo
  alternatives_spanish:
  - una parcela
  - una tierra
  lexicon: HALOT
  rationale: «Campo» es el equivalente más directo y mantiene el paralelismo narrativo con el relato paralelo de Jueces 1:14 sin sobreinterpretar el tipo exacto de terreno.
- source_word: וַתִּצְנַח מֵעַל הַחֲמוֹר
  english_pob_choice: she got down from the donkey
  chosen_spanish: descendió del asno
  alternatives_spanish:
  - se bajó del asno
  - se apeó del asno
  - saltó del asno
  lexicon: HALOT
  rationale: צנח puede sugerir un descenso repentino. «Descendió» mantiene esa posible vivacidad más que una simple paráfrasis, y «asno» refleja con naturalidad el animal del contexto bíblico.
- source_word: מַה לָּךְ
  english_pob_choice: What do you want?
  chosen_spanish: ¿Qué quieres?
  alternatives_spanish:
  - ¿Qué tienes?
  - ¿Qué te pasa?
  - ¿Qué necesitas?
  lexicon: HALOT
  rationale: El hebreo es un modismo cuya fuerza contextual es interrogativa y petitoria. «¿Qué quieres?» comunica de forma breve la intención de Caleb, con nota para la literalidad idiomática.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el auditable inglés POB. No hubo revisiones aplicadas en el pass más reciente; el texto inglés quedó sin cambios y la concordancia general fue alta.
  spanish_consistency_notes:
  - Se mantiene el nombre «Caleb» según el uso propio y estándar del proyecto para nombres bíblicos.
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió una sintaxis española directa y readable, evitando calcos innecesarios pero respetando las tensiones léxicas del hebreo.
