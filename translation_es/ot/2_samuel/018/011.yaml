base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/011.yaml
  text: Then Joab said to the man who had told him[a], “Look, you saw him[b]; why then did you not strike him there to the ground? And I would have given you ten pieces of silver and one belt.”
