translation:
  language: es
  text: Y tomaron para sí esposas moabitas. El nombre de una era Orfa[a], y el nombre de la otra era Rut. Y habitaron allí unos diez años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, ''se casaron con mujeres moabitas''. El hebreo dice literalmente: ''tomaron para sí esposas moabitas''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  english_pob_choice: they took
  chosen_spanish: se tomaron
  alternatives_spanish:
  - se casaron
  - tomaron para sí
  lexicon: HALOT
  rationale: El hebreo usa la expresión idiomática de ‘tomar’ con mujeres; en español, ‘se tomaron’ conserva esa estructura sin perder el sentido marital que el objeto ‘mujeres’ hace claro. ‘Se casaron’ sería más interpretativo que el texto base.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos
  - para ellos mismos
  lexicon: HALOT
  rationale: El dativo hebreo expresa beneficio o implicación personal. ‘Para sí’ reproduce bien esa fuerza reflexiva en español y mantiene el matiz de acción tomada en provecho propio.
- source_word: נָשִׁים מֹאֲבִיּוֹת
  english_pob_choice: Moabite wives
  chosen_spanish: mujeres moabitas
  alternatives_spanish:
  - esposas moabitas
  - mujeres de Moab
  lexicon: HALOT
  rationale: En español, ‘mujeres moabitas’ conserva el dato étnico/nacional sin imponer un término más técnico. ‘Esposas moabitas’ subrayaría el vínculo matrimonial, pero el hebreo permite la construcción más general ‘mujeres’ con el contexto de matrimonio ya explícito.
- source_word: שֵׁם הָאַחַת
  english_pob_choice: The name of the one was
  chosen_spanish: El nombre de una era
  alternatives_spanish:
  - El nombre de la una era
  - Una se llamaba
  lexicon: HALOT
  rationale: ‘Una’ refleja mejor אַחַת que ‘la primera’. La formulación española mantiene el paralelismo nominativo del hebreo sin volverla demasiado explicativa.
- source_word: עָרְפָּה
  english_pob_choice: Orpah
  chosen_spanish: Orfa
  alternatives_spanish:
  - Orpá
  - Orpah
  lexicon: Transliteration
  rationale: Se adopta una transliteración castellana estable y legible. ‘Orfa’ facilita la pronunciación en español y mantiene reconocimiento bíblico; se evita forzar la grafía inglesa cuando la meta es una forma publicable en español.
- source_word: וְשֵׁם הַשֵּׁנִית
  english_pob_choice: and the name of the other was
  chosen_spanish: y el nombre de la otra era
  alternatives_spanish:
  - y el nombre de la segunda era
  - y la otra se llamaba
  lexicon: HALOT
  rationale: La revisión inglesa prefirió ‘the other’ frente a ‘the second’ por naturalidad. En español, ‘la otra’ conserva esa naturalidad y el contraste binario del hebreo, sin perder la secuencia narrativa.
- source_word: רוּת
  english_pob_choice: Ruth
  chosen_spanish: Rut
  alternatives_spanish:
  - Ruth
  lexicon: Transliteration
  rationale: Se usa la forma castellana habitual ‘Rut’, más propia de una edición en español, sin alterar la identidad del nombre.
- source_word: וַיֵּשְׁבוּ שָׁם
  english_pob_choice: And they lived there
  chosen_spanish: Y habitaron allí
  alternatives_spanish:
  - Y vivieron allí
  - Y permanecieron allí
  lexicon: HALOT
  rationale: ‘Habitaron’ conserva la fuerza de yāšaḇ como residir/establecerse, y suena más cercano al registro bíblico que ‘vivieron’, sin volverse arcaico.
- source_word: כְּעֶשֶׂר שָׁנִים
  english_pob_choice: about ten years
  chosen_spanish: unos diez años
  alternatives_spanish:
  - aproximadamente diez años
  - cerca de diez años
  lexicon: HALOT
  rationale: El prefijo כ indica aproximación. ‘Unos diez años’ expresa esa vaguedad de manera natural en español y preserva la incertidumbre del texto.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de ‘the second’ a ‘the other’ para reflejar mejor el contraste hebreo entre las dos mujeres. La versión española sigue esa revisión con ‘la otra’ y no ‘la segunda’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, aunque este versículo no lo contiene.
  - 'Se usa la transliteración bíblica española habitual de nombres propios: Rut, Orfa.'
  - Se conserva el paralelismo narrativo del hebreo en tres cláusulas breves.
  - La nota al pie recoge la alternativa léxica principal sin sobreinterpretar el verbo ‘tomar’.
