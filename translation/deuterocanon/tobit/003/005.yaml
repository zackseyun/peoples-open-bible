theological_decisions:
- issue: Whether to make God's judgments explicitly 'just' rather than 'true'
  chosen_reading: 'true'
  alternative_readings:
  - just
  rationale: The verse confesses the correctness of God's dealings, but the Greek adjective is ἀληθιναί. Rendering it 'true' preserves the source wording and lets the moral implication arise from context rather than importing a more interpretive gloss.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Whether ancestral guilt is stated as inherited culpability or as corporate/familial sin
  chosen_reading: the sins of my fathers
  alternative_readings:
  - my fathers' wrongdoing
  - our ancestral sins
  rationale: The Greek explicitly names 'my sins and the sins of my fathers.' The translation preserves the corporate confession without expanding it into a doctrinal statement about inherited guilt beyond what the text says.
  doctrine_reference: Never import doctrinal claims the text does not make.
