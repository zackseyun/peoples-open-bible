review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Finees, la genealogía sacerdotal, el apartamiento de la ira, la repetición de קנא/קנאה, y la no consumación de los hijos de Israel. Sin embargo, «al ponerse celoso con mi celo» no suena natural ni idiomático en español bíblico contemporáneo, y debilita la claridad de la relación medio/instrumento del infinitivo בְּקַנְאוֹ. Además, «de sobre» resulta demasiado calcado y poco natural en español general, aunque intenta preservar la imagen espacial de מֵעַל.'
  spanish_quality_summary: 'La redacción es en general digna y fiel, pero tiene dos puntos de legibilidad que requieren ajuste: «de sobre» suena forzado, y «al ponerse celoso con mi celo» resulta extraño e incluso puede sugerir un matiz emocional impropio en español. Una formulación como «ha apartado mi ira de los hijos de Israel, al mostrar celo[a] por mi celo entre ellos» mantiene la repetición léxica con español más claro y público-lecturable.'
  glossary_alignment: No hay conflicto con los términos globales del proyecto en este versículo. «Hijos de Israel», «sacerdote», «ira» y «celo» están alineados con la filosofía POB. La mejor alineación terminológica para קנא/קנאה en español aquí es mantener «celo» en ambas apariciones, evitando mezclar «celoso» con «celo» de forma poco idiomática.
  issues:
  - severity: medium
    issue: «de sobre» es un calco poco natural de מֵעַל
    rationale: Aunque intenta conservar la imagen espacial de la ira sobre Israel, en español corriente y eclesial suena rígido. «De los hijos de Israel» comunica el sentido con mejor naturalidad, en línea con la revisión inglesa que también optó por simplificar «from upon» a «from».
  - severity: high
    issue: «al ponerse celoso con mi celo» es poco natural y semánticamente torpe
    rationale: La construcción no suena idiomática en español y puede sugerir celos en sentido interpersonal. El hebreo expresa la acción de Finees mediante un cognado de la misma raíz que el sustantivo divino; en español conviene preservarlo con una construcción más natural, como «al mostrar celo por mi celo» o similar, idealmente explicada en nota.
  - severity: low
    issue: La nota actual sobre «Finees» es innecesaria y está mal redactada
    rationale: La forma castellana «Finees» es perfectamente normal en español bíblico y no requiere nota en este contexto. Además, el texto de la nota comienza con comilla sobrante y aporta información poco útil para la traducción del versículo.
