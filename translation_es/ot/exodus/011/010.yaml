translation:
  language: es
  text: Y Moisés y Aarón hicieron todas estas señales delante de Faraón[a], y Yahvé endureció el corazón de Faraón[b], y no dejó salir a los hijos de Israel[c] de su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas estas maravillas». El término hebreo puede denotar señales milagrosas o prodigios.
    reason: lexical_alternative
  - marker: b
    text: O «fortaleció el corazón de Faraón» o «hizo firme el corazón de Faraón».
    reason: lexical_alternative
  - marker: c
    text: O «los israelitas» o «los hijos de Israel». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֹשֶׁה וְאַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: Moisés y Aarón
  alternatives_spanish:
  - Moisés y Aarón
  lexicon: Nombres propios bíblicos
  rationale: Se conservan los nombres propios en su forma española usual y reconocible, sin añadir interpretaciones.
- source_word: עָשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - realizaron
  - efectuaron
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio ('hacer'). En español, 'hicieron' es la opción más directa y natural con 'señales', sin perder el valor factual del relato.
- source_word: כָּל הַמֹּפְתִים הָאֵלֶּה
  english_pob_choice: all these signs
  chosen_spanish: todas estas señales
  alternatives_spanish:
  - todos estos prodigios
  - todas estas maravillas
  lexicon: HALOT
  rationale: מֹפְתִים puede significar 'señales' o 'prodigios/maravillas'. 'Señales' mantiene la función evidencial de los actos ante Faraón, como en el audit trail inglés.
- source_word: לִפְנֵי פַרְעֹה
  english_pob_choice: before Pharaoh
  chosen_spanish: delante de Faraón
  alternatives_spanish:
  - en presencia de Faraón
  lexicon: HALOT
  rationale: '''Delante de'' reproduce bien לִפְנֵי en contexto narrativo y suena natural en español bíblico contemporáneo.'
- source_word: וַיְחַזֵּק
  english_pob_choice: hardened
  chosen_spanish: endureció
  alternatives_spanish:
  - fortaleció
  - hizo firme
  lexicon: HALOT
  rationale: Aunque חזק admite 'fortalecer' o 'hacer firme', en esta fórmula de Éxodo el efecto narrativo es el de resistencia obstinada; 'endureció' comunica ese sentido sin ocultar la tensión teológica. Se preservan las alternativas en el aparato conceptual porque el matiz literal sigue siendo importante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md / Tetragrammaton
  rationale: Se usa 'Yahvé' por ser la política terminológica del POB español para יְהוָה, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: לֵב פַּרְעֹה
  english_pob_choice: Pharaoh’s heart
  chosen_spanish: el corazón de Faraón
  alternatives_spanish:
  - el corazón del Faraón
  lexicon: HALOT
  rationale: La construcción hebrea se vierte con un genitivo natural en español. 'Corazón' mantiene la sede interior de voluntad y decisión presente en la imagen bíblica.
- source_word: שִׁלַּח
  english_pob_choice: did not let ... go out
  chosen_spanish: no dejó salir
  alternatives_spanish:
  - no envió
  - no permitió que saliera
  lexicon: HALOT
  rationale: En este contexto, שִׁלַּח expresa el acto de dejar partir/liberar. 'No dejó salir' es idiomático y conserva el sentido de retención frente a la liberación de Israel.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la forma masculina plural más cercana al hebreo. 'Los israelitas' suaviza la textura del original; 'los hijos de Israel' conserva mejor la expresión fuente y su uso corporativo.
- source_word: מֵאַרְצוֹ
  english_pob_choice: from his land
  chosen_spanish: de su tierra
  alternatives_spanish:
  - de su país
  - fuera de su tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra/territorio. 'De su tierra' es claro y acorde con el movimiento de expulsión o no-liberación expresado por el verbo.
theological_decisions:
- issue: Acción divina sobre el corazón de Faraón
  english_pob_reading: and Yahweh hardened Pharaoh’s heart
  chosen_spanish_reading: y Yahvé endureció el corazón de Faraón
  alternative_spanish_readings:
  - y Yahvé fortaleció el corazón de Faraón
  - y Yahvé hizo firme el corazón de Faraón
  rationale: Se conserva la lectura que expresa la obstinación resultante, como en el audit trail inglés, sin suavizar la tensión entre la soberanía divina y la responsabilidad humana. 'Endureció' es más comprensible para el lector español y mantiene el peso narrativo de la fórmula.
  doctrine_reference: Éxodo 11:10; doctrina POB sobre tensiones teológicas no resueltas por paráfrasis
- issue: Renderizado corporativo de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel y sus familias
  rationale: Se preserva la forma masculina plural del hebreo, como el audit trail inglés, evitando neutralizarla. A la vez, el sintagma funciona corporativamente para todo el pueblo.
  doctrine_reference: Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de 'but' a 'and' para seguir la conjunción hebrea; la línea española adopta igualmente una coordinación simple con 'y'. También se ha conservado la formulación de acción divina sobre el corazón de Faraón sin introducir una oposición adversativa inexistente en el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del tetragrama.
  - Se usa 'Faraón' de manera consistente sin artículo.
  - '''Señales'' conserva la función evidencial de מֹפְתִים.'
  - '''Los hijos de Israel'' preserva la textura del hebreo y la referencia corporativa.'
  - La coordinación con 'y' sigue el flujo narrativo del hebreo, sin 'pero'.
