translation:
  language: es
  text: Y algunos de ellos serán nombrados[a] en las grandes fortalezas del rey, y de entre ellos algunos serán nombrados para los asuntos del reino, siendo dignos de confianza; y sus superiores y los gobernantes sean de entre ellos, y vivan según sus propias leyes[b], tal como también el rey mandó en la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán designados». El pasivo griego de καθίστημι puede señalar nombramiento para un cargo o función.
    reason: lexical_alternative
  - marker: b
    text: O «anden conforme a sus leyes». El verbo griego con «leyes» es un modismo para vivir o conducirse de acuerdo con ellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατασταθήσεται
  english_pob_choice: shall be appointed
  chosen_spanish: serán puestos
  alternatives_spanish:
  - serán nombrados
  - serán नियुक्तados
  lexicon: LSJ
  rationale: En contexto administrativo, el pasivo de καθίστημι expresa designación para una función. «Serán puestos» conserva la idea de colocación oficial sin añadir un matiz jurídico excesivo que no exige el griego.
- source_word: ὀχυρώμασιν
  english_pob_choice: strongholds
  chosen_spanish: fortalezas
  alternatives_spanish:
  - plazas fuertes
  - fortificaciones
  lexicon: LSJ
  rationale: El término designa posiciones fortificadas militares. «Fortalezas» es natural en español y mantiene el sentido defensivo del pasaje.
- source_word: τοῖς μεγάλοις
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - principales
  - importantes
  lexicon: LSJ
  rationale: El adjetivo califica las fortalezas del rey. «Grandes» reproduce con sobriedad el valor del griego sin interpretar el rango como «principales».
- source_word: ἐπὶ χρειῶν τῆς βασιλείας
  english_pob_choice: over the needs of the kingdom
  chosen_spanish: sobre las necesidades del reino
  alternatives_spanish:
  - sobre los asuntos del reino
  - para los negocios del reino
  lexicon: LSJ
  rationale: χρεῖαι puede referirse a necesidades, asuntos o negocios. «Necesidades» sigue de cerca la forma del griego y funciona bien en un contexto de administración real.
- source_word: οὖσιν εἰς πίστιν
  english_pob_choice: being trustworthy
  chosen_spanish: siendo dignos de confianza
  alternatives_spanish:
  - siendo fieles
  - siendo fiables
  lexicon: LSJ; BDAG
  rationale: Aquí πίστις no está en un uso doctrinal, sino que describe la idoneidad para el cargo. «Dignos de confianza» comunica la idea de confiabilidad y mantiene el valor adjetival del giro.
- source_word: οἱ ἐπʼ αὐτῶν
  english_pob_choice: those over them
  chosen_spanish: los que estén sobre ellos
  alternatives_spanish:
  - sus superiores
  - los que estén a cargo de ellos
  lexicon: LSJ
  rationale: La expresión es breve y relacional. «Los que estén sobre ellos» conserva la relación jerárquica sin explicitar más de lo que permite el texto.
- source_word: οἱ ἄρχοντες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - los oficiales
  lexicon: LSJ
  rationale: ἄρχοντες nombra autoridades de gobierno. «Gobernantes» es formal y amplio, y encaja con el lenguaje de un decreto real.
- source_word: πορευέσθωσαν τοῖς νόμοις αὐτῶν
  english_pob_choice: let them live by their own laws
  chosen_spanish: vivan según sus propias leyes
  alternatives_spanish:
  - anden conforme a sus leyes
  - se conduzcan según sus leyes
  lexicon: LSJ
  rationale: 'El giro con πορεύομαι y «leyes» es idiomático: significa regirse por ellas. «Vivan según sus propias leyes» suena natural en español y preserva el sentido normativo.'
- source_word: καθὰ καὶ προσέταξεν
  english_pob_choice: just as the king commanded
  chosen_spanish: tal como también el rey mandó
  alternatives_spanish:
  - como también el rey ordenó
  - según también mandó el rey
  lexicon: LSJ
  rationale: προσέταξεν expresa una orden real. «Mandó» mantiene el tono de decreto con fluidez en español; «tal como también» refleja el valor comparativo del griego.
- source_word: ἐν γῇ Ἰούδα
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en la tierra de Judea
  lexicon: LSJ
  rationale: La forma griega es literal «en la tierra de Judá». Se conserva «Judá» para seguir más de cerca el original y evitar la regionalización interpretativa de «Judea».
theological_decisions:
- issue: Sentido de πίστις en un contexto administrativo, no doctrinal
  english_pob_reading: being trustworthy
  chosen_spanish_reading: siendo dignos de confianza
  alternative_spanish_readings:
  - siendo fieles
  - siendo fiables
  rationale: Aunque πίστις suele vincularse con «fe», aquí describe aptitud para cargos del reino. Traducirlo como confiabilidad evita imponer un matiz doctrinal ajeno al contexto y respeta el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: contested terms for πίστις; context-sensitive rendering'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios de contenido. No se introdujeron revisiones textuales nuevas; se mantuvo la lectura administrativa de πίστις como confiabilidad y la referencia literal a «la tierra de Judá» conforme al pasaje griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el texto no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece en este versículo.
  - Se conservaron construcciones administrativas sobrias para no sobreinterpretar el decreto real.
  - Se usó un español neutral y publicable, con fórmulas legales claras y sin arcaísmos innecesarios.
