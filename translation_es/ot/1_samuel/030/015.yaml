translation:
  language: es
  text: 'David le dijo: «¿Me guiarás hasta esta banda[a] de saqueadores?». Y él dijo: «Júrame por Dios que no me matarás ni me entregarás en manos de mi amo, y yo te guiaré hasta esta banda de saqueadores».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «banda» o «tropa»; el término hebreo denota un grupo merodeador.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתוֹרִדֵנִי
  english_pob_choice: Will you lead me down
  chosen_spanish: ¿Me bajarás
  alternatives_spanish:
  - ¿Me llevarás abajo
  - ¿Me conducirás abajo
  lexicon: HALOT
  rationale: El verbo en hifil de ירד expresa hacer descender. En español, «bajar» comunica con naturalidad la dirección descendente y la fuerza causativa, sin volver la frase rígida.
- source_word: הַגְּדוּד
  english_pob_choice: raiding party
  chosen_spanish: banda de saqueadores
  alternatives_spanish:
  - grupo de saqueadores
  - tropa saqueadora
  lexicon: HALOT
  rationale: גדוד aquí designa un grupo armado y merodeador. «Banda de saqueadores» conserva el matiz de grupo depredador mejor que «tropa», y evita suavizar el carácter violento del término.
- source_word: הִשָּׁבְעָה לִּי בֵאלֹהִים
  english_pob_choice: Swear to me by God
  chosen_spanish: Júrame por Dios
  alternatives_spanish:
  - Hazme juramento por Dios
  - Júrame en nombre de Dios
  lexicon: HALOT
  rationale: El imperativo niphal con la preposición expresa una exigencia solemne de juramento. «Júrame por Dios» es idiomático en español y mantiene la invocación explícita de Dios.
- source_word: אִם תְּמִיתֵנִי
  english_pob_choice: that you will not kill me
  chosen_spanish: que no me matarás
  alternatives_spanish:
  - que no me darás muerte
  - que no me pondrás a muerte
  lexicon: HALOT
  rationale: En fórmulas de juramento, el hebreo usa una construcción elíptica que implica la negación. En español conviene explicitarla para que el sentido del juramento quede claro y natural.
- source_word: תַּסְגִּרֵנִי בְּיַד אֲדֹנִי
  english_pob_choice: hand me over into the hand of my master
  chosen_spanish: me entregarás en manos de mi amo
  alternatives_spanish:
  - me pondrás en manos de mi amo
  - me entregarás en la mano de mi amo
  lexicon: HALOT
  rationale: סגר en hifil aquí equivale a entregar o poner a alguien bajo el control de otro. «En manos de» conserva el giro hebreo de poder y control, y «amo» evita la ambigüedad de «señor» para un dueño humano.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi amo
  alternatives_spanish:
  - mi señor
  - mi dueño
  lexicon: HALOT
  rationale: El contexto es el de un siervo con su propietario humano. «Amo» transmite esa relación con mayor precisión y evita confundirlo con un título honorífico o divino.
- source_word: וְאוֹרִדְךָ
  english_pob_choice: and I will lead you down
  chosen_spanish: y yo te bajaré
  alternatives_spanish:
  - y yo te llevaré abajo
  - y yo te conduciré abajo
  lexicon: HALOT
  rationale: Se mantiene la misma raíz verbal en español que en la primera cláusula para conservar la cohesión léxica y la reciprocidad de la promesa.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece en el texto principal junto al sintagma al que se aplica.'
  spanish_consistency_notes:
  - Se mantuvo la reiteración de «banda de saqueadores» para reflejar la repetición del hebreo.
  - «Amo» se usó de forma consistente para אֲדֹנִי, siguiendo el contexto servil del versículo.
  - Se preservó el encadenamiento directo de juramento y condición negativa en una estructura española clara y pública.
