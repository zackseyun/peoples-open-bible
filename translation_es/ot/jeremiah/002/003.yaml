translation:
  language: es
  text: Israel fue santo para Yahvé, las primicias[a] de su cosecha; todos los que lo devoraban[b] se hicieron culpables[c]; la calamidad vino sobre ellos, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las primicias de su producción'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''todos los que lo comían/devoraban''; la imagen es la de naciones que consumen o saquean a Israel.'
    reason: cultural_note
  - marker: c
    text: O 'incurrieron en culpa' o 'fueron tenidos por culpables'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - santidad
  - consagrado
  - sagrado
  lexicon: HALOT
  rationale: 'En este predicado sobre Israel, el sentido es relacional y cultual: Israel era apartado para Yahvé. ''Santo'' conserva esa fuerza bíblica y suena natural en español.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - perteneciente a Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: La lamed expresa pertenencia/dedicación. 'Para Yahvé' mantiene la relación de consagración sin reducirla a posesión meramente abstracta.
- source_word: רֵאשִׁית תְּבוּאָתֹה
  english_pob_choice: the firstfruits of his harvest
  chosen_spanish: las primicias de su cosecha
  alternatives_spanish:
  - las primicias de su fruto
  - la primera de su producción
  - las primicias de su producción
  lexicon: HALOT
  rationale: '''Primicias'' preserva el campo cultual de la ofrenda de los primeros frutos. ''Cosecha'' expresa bien תְּבוּאָה en español y evita una frase demasiado pesada.'
- source_word: אֹכְלָיו
  english_pob_choice: who devoured him
  chosen_spanish: los que lo devoraban
  alternatives_spanish:
  - los que lo comían
  - sus devoradores
  - los que lo consumían
  lexicon: HALOT
  rationale: El participio es metafórico y describe a naciones que saquean o consumen a Israel. 'Devoraban' conserva la violencia figurada mejor que 'comían'.
- source_word: יֶאְשָׁמוּ
  english_pob_choice: became guilty
  chosen_spanish: se hicieron culpables
  alternatives_spanish:
  - incurrieron en culpa
  - quedaron culpables
  - fueron hallados culpables
  lexicon: HALOT
  rationale: El verbo expresa llegar a ser culpable/incurrir en culpa. 'Se hicieron culpables' sigue el valor del verbo sin introducir un marco judicial más estrecho de lo necesario.
- source_word: רָעָה תָּבֹא אֲלֵיהֶם
  english_pob_choice: disaster came upon them
  chosen_spanish: el mal les vendrá
  alternatives_spanish:
  - la desgracia les vendrá
  - el desastre les sobrevendrá
  - la calamidad caerá sobre ellos
  lexicon: HALOT
  rationale: Aquí רָעָה puede entenderse como mal/desgracia en contexto de juicio. Se mantiene 'mal' por cercanía formal al hebreo, con futuro para reflejar la acción verbal; el contexto ya marca que es mal punitivo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética final se conserva con un verbo solemne y directo. 'Declara Yahvé' mantiene el peso oracular del hebreo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; el estándar del proyecto en español es 'Yahvé', no una sustitución reverencial. Se conserva así el nombre pactal del verso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Israel como pueblo consagrado / primicias
  english_pob_reading: the firstfruits of his harvest
  chosen_spanish_reading: las primicias de su cosecha
  alternative_spanish_readings:
  - las primicias de su producción
  - la primera de su producción
  rationale: La imagen cultual comunica que Israel pertenecía de modo especial a Yahvé, como lo primero ofrecido y apartado para él. 'Primicias' retiene la referencia sacrificial sin ampliar indebidamente el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se revisó la lectura final contra el audit trail inglés y el hebreo: se mantuvieron la metáfora cultual de primicias, el valor figurado de ''devorar'', la idea de culpa adquirida por los agresores y la fórmula profética final. No se detectaron cambios necesarios respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, conforme al estándar del proyecto.
  - '''Primicias'' mantiene el registro cultual; no se reemplazó por una paráfrasis más general.'
  - '''Devoraban'' conserva la imagen violenta del participio hebreo sin suavizarla.'
  - '''Se hicieron culpables'' evita sobreinterpretar el verbo como terminología forense estricta.'
  - '''El mal'' se deja cercano al hebreo; el contexto de juicio evita ambigüedad moral en la lectura del verso.'
