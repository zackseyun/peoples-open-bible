translation:
  language: es
  text: En Dios reposa mi salvación y mi gloria[a][b]; la roca de mi fuerza, mi refugio, está en Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Sobre Dios reposan mi salvación y mi gloria».'
    reason: lexical_alternative
  - marker: b
    text: «Mi gloria» también puede entenderse como «mi honor», es decir, mi dignidad o vindicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: 'On'
  chosen_spanish: En
  alternatives_spanish:
  - Sobre
  - Apoyada en
  - Sobre la base de
  lexicon: HALOT
  rationale: El hebreo introduce una relación de dependencia o apoyo. En español, "en Dios" comunica de manera natural que la salvación y la gloria del salmista descansan o se apoyan en Dios, sin volver el verso rígidamente literal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Es la equivalencia normal para אֱלֹהִים cuando se refiere al Dios de Israel, y conserva el referente teológico del texto.
- source_word: יִשְׁעִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi victoria
  lexicon: HALOT
  rationale: ישׁע denota rescate, salvación o liberación. "Mi salvación" es la opción más amplia y natural en español bíblico, y mantiene el alcance teológico y poético del original.
- source_word: וּכְבוֹדִי
  english_pob_choice: and my glory
  chosen_spanish: y mi gloria
  alternatives_spanish:
  - y mi honor
  lexicon: HALOT
  rationale: כָּבוֹד puede significar gloria, honor o dignidad. "Mi gloria" reproduce el paralelismo del verso; el posible matiz de honor o vindicación queda implícito.
- source_word: צוּר
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - mi peña
  - la peña
  lexicon: HALOT
  rationale: El sustantivo funciona como metáfora divina de estabilidad y protección. "La roca" es la forma más transparente en español y conserva la imagen bíblica.
- source_word: עֻזִּי
  english_pob_choice: my strength
  chosen_spanish: de mi fuerza
  alternatives_spanish:
  - de mi poder
  - de mi fortaleza
  lexicon: HALOT
  rationale: עֹז expresa fuerza o poder. En la frase nominal del verso, "la roca de mi fuerza" refleja la estructura hebrea y mantiene el sentido de poder/sostén sin añadir un significado más específico como "fortaleza".
- source_word: מַחְסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi asilo
  - mi abrigo
  lexicon: HALOT
  rationale: El término indica un lugar de refugio o amparo. "Mi refugio" es la equivalencia más directa y natural en el contexto de los Salmos.
- source_word: בֵּאלֹהִים
  english_pob_choice: is in God
  chosen_spanish: está en Dios
  alternatives_spanish:
  - está con Dios
  - está sobre Dios
  lexicon: HALOT
  rationale: La preposición בּ expresa aquí localización o base de sustentación. "Está en Dios" suple el verbo implícito del hebreo y conserva la idea de que el refugio se encuentra/permanece en Dios.
theological_decisions:
- issue: Relación entre las cláusulas nominales y la preposición inicial
  english_pob_reading: Treat the verse as a confession that the psalmist's salvation and glory rest on God, with the final clause stating that his refuge is in God.
  chosen_spanish_reading: 'Entender el versículo como una confesión de dependencia: la salvación y la gloria del salmista reposan en Dios, y su refugio está en Dios.'
  alternative_spanish_readings:
  - 'Traducir de forma más rígida: "Sobre Dios mi salvación y mi gloria"'
  - Reformular libremente como una afirmación de confianza general
  rationale: El hebreo es poético y omite el verbo copulativo. La redacción española conserva la imagen de apoyo y reposo sin perder la sintaxis natural del idioma, y sin borrar la tensión entre el apoyo en Dios y la localización del refugio en Dios.
  doctrine_reference: Poética hebrea; principio de equivalencia óptima sin parapraseo indebido.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el hebreo consonante y la estructura poética del WLC, junto con el audit trail inglés. Se ha evitado una traducción mecánica, pero también se han conservado las tensiones semánticas documentadas: la relación de dependencia expresada por עַל, el posible matiz de honor en כָּבוֹד, y la metáfora de apoyo/refugio en roca, fuerza y refugio.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, sin sustituirlo por una paráfrasis devocional.
  - Se usa «gloria» como forma principal para כָּבוֹד, con nota alternativa sobre «honor».
  - «Roca» conserva la metáfora bíblica estándar de firmeza y protección.
  - La puntuación española sigue el patrón de dos miembros poéticos separados por punto y coma, adecuado al paralelismo hebreo.
