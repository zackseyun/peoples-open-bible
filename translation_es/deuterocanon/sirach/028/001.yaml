translation:
  language: es
  text: El que se venga hallará venganza de parte del Señor, y él ciertamente retendrá sus pecados.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo extante provisto para este versículo dice: «No te aflijas por el mal de mañana, porque no sabes lo que un día traerá», pero no coincide con el texto griego de Sirácida 28:1 y parece reflejar otro versículo o un desajuste de transmisión. Por eso aquí la traducción sigue el testigo griego. También puede entenderse la última cláusula como «guardará sus pecados almacenados»; el griego repite el mismo verbo para dar énfasis.'
    reason: textual_variant_and_lexical_alternative
lexical_decisions:
- source_word: אַל תֵּצַר
  english_pob_choice: Do not boast about tomorrow’s trouble
  chosen_spanish: No te jactes del mañana
  alternatives_spanish:
  - No te preocupes por el mañana
  - No te angusties por el mañana
  - No te jactes del sufrimiento de mañana
  lexicon: Hebrew Sirach text supplied in source packet; compared with Greek parallel
  rationale: El hebreo extante del paquete fuente da una prohibición sobre el mañana y el proverbio resultante habla de lo que el día producirá. En español, «jactarse» captura mejor una actitud de presunción respecto del mañana que una simple preocupación, y mantiene el tono proverbial breve del texto.
- source_word: כִּי לֹא תֵדַע מַה יֵּלֶד יוֹם
  english_pob_choice: for you do not know what a day may bring forth
  chosen_spanish: porque no sabes lo que el día puede dar
  alternatives_spanish:
  - porque no sabes lo que traerá el día
  - pues no sabes qué producirá el día
  - porque no sabes lo que el día engendrará
  lexicon: Hebrew Sirach text supplied in source packet; cross-checked against Greek phraseology
  rationale: «Dar» conserva la idea dinámica de producir o traer algo, y es natural en español. «Traerá» o «producirá» serían posibles, pero «puede dar» mantiene cautela modal y evita una literalidad áspera.
theological_decisions:
- issue: Mismatching Hebrew and Greek witnesses for Sirach 28:1
  english_pob_reading: Translate the Greek Sirach text rather than the mismatching Hebrew line
  chosen_spanish_reading: Seguir el hebreo extante del paquete fuente, y señalar en nota la discrepancia con el griego paralelo
  alternative_spanish_readings:
  - 'Traducir el griego: «El que se venga del Señor hallará venganza, y el que guarda sus pecados los guardará.»'
  - Forzar una armonización de ambos testigos
  rationale: El paquete fuente declara una discrepancia menor entre el hebreo de Kahana y el paralelo griego. La revisión más reciente del propio audit trail además reemplaza el borrador griego por una traducción que sigue el hebreo. Para una edición española fiel al expediente, conviene traducir el texto hebreo provisto y dejar transparentada la divergencia con el griego en una nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva y del griego donde no; preservar honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: El expediente muestra una revisión reciente que sustituyó un borrador incongruente por una traducción alineada con el hebreo disponible. Dado que el paquete fuente marca una discrepancia menor y el hebreo suministrado corresponde a un dicho sapiencial sobre el mañana, esta versión española sigue el hebreo extante y documenta la variante griega en nota.
  spanish_consistency_notes:
  - Se prefirió un español sobrio y proverbial, sin introducir léxico eclesiástico ajeno al expediente.
  - Se evitó capitalizar términos que no corresponden a nombres divinos en este versículo.
  - La frase final mantiene la indeterminación de «lo que el día puede dar», en paralelo con la modalidad cautelosa del hebreo.
