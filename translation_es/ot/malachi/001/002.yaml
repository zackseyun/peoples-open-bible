translation:
  language: es
  text: '“Yo los he amado”, dice Yahvé. Pero ustedes dicen[a]: “¿Cómo nos has amado?” “¿No fue Esaú, hermano de Jacob?”, declara Yahvé. “Sin embargo, amé a Jacob,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: “Yo los amé … ¿Cómo nos amaste? … ¿No amé yo a Jacob?”. Los perfectos hebreos pueden verterse con pasado simple en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהַבְתִּי
  english_pob_choice: I have loved
  chosen_spanish: Yo los he amado
  alternatives_spanish:
  - Yo los amé
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresarse en español con pretérito perfecto compuesto para conservar la fuerza de una acción pasada con relevancia presente en el alegato profético.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - ustedes
  lexicon: HALOT
  rationale: El sufijo de 2.ª plural se refiere al pueblo en conjunto; en español, el objeto directo clítico plural mantiene la referencia plural y suena natural en el discurso directo.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - dijo Yahvé
  lexicon: HALOT
  rationale: La fórmula profética en presente transmite la declaración vigente de Yahvé; se mantiene el nombre divino 'Yahvé' según la terminología del proyecto.
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: But you say
  chosen_spanish: Pero ustedes dicen
  alternatives_spanish:
  - Y ustedes dicen
  - Pero ustedes dijeron
  lexicon: HALOT
  rationale: El conector introduce la objeción del pueblo; 'Pero' reproduce mejor el valor adversativo que un simple 'Y'.
- source_word: בַּמָּה
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿En qué forma?
  - ¿De qué manera?
  lexicon: HALOT
  rationale: Es un interrogativo idiomático de desafío; '¿Cómo?' es la forma más natural y fiel en español.
- source_word: אֲהַבְתָּנוּ
  english_pob_choice: have you loved us
  chosen_spanish: nos has amado
  alternatives_spanish:
  - nos amaste
  - nos has querido
  lexicon: HALOT
  rationale: El perfecto 2ms + 1cp se refleja con pretérito perfecto compuesto para conservar la paralela respuesta a 'Yo los he amado'.
- source_word: הֲלוֹא
  english_pob_choice: Was not
  chosen_spanish: ¿No era
  alternatives_spanish:
  - ¿Acaso no era
  - ¿No fue
  lexicon: HALOT
  rationale: Introduce una pregunta retórica que espera asentimiento; '¿No era...?' reproduce bien ese valor en español.
- source_word: אָח
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente cercano
  - consanguíneo
  lexicon: HALOT
  rationale: Término de parentesco directo, sin necesidad de ampliar el sentido.
- source_word: עֵשָׂו לְיַעֲקֹב
  english_pob_choice: Esau Jacob’s brother
  chosen_spanish: Esaú hermano de Jacob
  alternatives_spanish:
  - Esaú, el hermano de Jacob
  - Esaú, hermano de Jacob
  lexicon: HALOT
  rationale: La relación hebrea se expresa de manera idiomática en español como 'hermano de Jacob', conservando la comparación genealógica del argumento.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Fórmula profética solemne; 'declara Yahvé' conserva formalidad sin perder claridad.
- source_word: וָאֹהַב
  english_pob_choice: Yet I loved
  chosen_spanish: Sin embargo, amé
  alternatives_spanish:
  - Y amé
  - Pero amé
  lexicon: HALOT
  rationale: El valor contrastivo de la conjunción se reproduce con 'Sin embargo', manteniendo la tensión retórica del pasaje.
- source_word: אֶת יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El objeto directo se marca explícitamente en español con 'a' delante del nombre propio.
theological_decisions:
- issue: Si la frase debe explicitar la elección/covenio en lugar de mantener el verbo simple 'amar'
  english_pob_reading: Retain the simple verb 'loved' without expanding to 'chosen' or 'set my love on'.
  chosen_spanish_reading: Mantener el verbo simple 'amar' sin expandirlo a 'elegí' o 'puse mi amor en'.
  alternative_spanish_readings:
  - elegí a Jacob
  - puse mi amor en Jacob
  rationale: El hebreo usa אהב de manera directa; aunque el contexto implica elección y contraste, introducirlo en el texto principal añadiría interpretación no expresada léxicamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla; primacía del texto original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no hacía falta cambio; el borrador español sigue esa decisión y conserva el contraste retórico sin añadir expansión teológica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה según la terminología del proyecto.
  - Se conserva 'amar' en sentido simple, sin sustituirlo por un lenguaje de elección más interpretativo.
  - La puntuación reproduce la secuencia de citas y réplicas del texto hebreo y del inglés auditado.
