translation:
  language: es
  text: Él quita el entendimiento[b] de los jefes[a] del pueblo del país, y los hace vagar en un desierto sin camino[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cabezas del pueblo de la tierra». Hebreo «cabezas del pueblo de la tierra/país».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «corazón»; aquí se refiere al entendimiento o juicio.
    reason: lexical_alternative
  - marker: c
    text: Literalmente «en un vacío, no camino»; es decir, en un paraje desolado y sin sendero.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵסִיר
  english_pob_choice: removes
  chosen_spanish: quita
  alternatives_spanish:
  - remueve
  - retira
  - quita de
  lexicon: HALOT
  rationale: El hebreo expresa una acción causativa de quitar o retirar. En español, «quita» comunica con naturalidad esa acción divina sin perder el sentido de remoción continua o general.
- source_word: לֵב
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - corazón
  - mente
  - juicio
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «corazón», aquí señala la facultad interior de pensar y juzgar. «Entendimiento» reproduce esa función en español y evita una lectura meramente emotiva.
- source_word: רָאשֵׁי עַם הָאָרֶץ
  english_pob_choice: the heads of the people of the land
  chosen_spanish: los jefes del pueblo de la tierra
  alternatives_spanish:
  - los líderes del pueblo de la tierra
  - los jefes del pueblo de la región
  - los jefes de los pueblos de la tierra
  lexicon: HALOT
  rationale: «Cabezas de» es un hebraísmo para dirigentes; en español «jefes» conserva la imagen de autoridad y resulta idiomático. «Pueblo de la tierra» mantiene el sentido social/político de הָאָרֶץ sin forzar «tierra» como «mundo».
- source_word: וַיַּתְעֵם
  english_pob_choice: makes them wander
  chosen_spanish: los hace andar errantes
  alternatives_spanish:
  - los hace vagar
  - los extravía
  - los hace desviarse
  lexicon: HALOT
  rationale: El verbo causa la idea de vagar/extraviarse. «Andar errantes» conserva la imagen de desorientación y el matiz causativo de manera clara y digna.
- source_word: בְּתֹהוּ
  english_pob_choice: in a waste
  chosen_spanish: en un desierto
  alternatives_spanish:
  - en un vacío
  - en una desolación
  - en un wasteland
  lexicon: HALOT
  rationale: תֹהוּ denota desolación, vaciedad y falta de forma o camino. «Desierto» comunica un lugar inhóspito y desolado en español bíblico moderno; aquí funciona mejor que un calco abstracto.
- source_word: לֹא דָרֶךְ
  english_pob_choice: trackless
  chosen_spanish: sin camino
  alternatives_spanish:
  - sin senda
  - sin ruta
  - sin sendero
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente «no camino/road». «Sin camino» preserva la negación de una vía o senda y es más natural que un adjetivo compacto como «intransitable».
theological_decisions:
- issue: Agencia divina implícita
  english_pob_reading: The verse speaks of God's sovereign action over rulers' understanding and direction.
  chosen_spanish_reading: El versículo presenta a Dios como el agente soberano que quita discernimiento y extravía a los gobernantes.
  alternative_spanish_readings:
  - El versículo describe un proceso impersonal
  - El sujeto puede entenderse de forma general sin explicitar a Dios
  rationale: Aunque el sujeto no se repite en esta línea, el contexto de Job 12 atribuye la acción a Dios. La redacción española mantiene esa agencia implícita sin añadir elementos doctrinales ajenos al texto.
  doctrine_reference: Contexto inmediato de Job 12; filosofía de traducción POB sobre agencia explícita cuando el pasaje la presupone
translation_notes:
  revision_awareness: La versión en inglés revisada se mantuvo sin cambios en el pasaje auditado; la propuesta española sigue ese estado y conserva las mismas decisiones léxicas principales, adaptándolas a un español natural y transparente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para no ocultar la agencia divina ni introducir una convención no presente en el hebreo.
  - Se eligió «entendimiento» para לֵב por coherencia con el uso antropológico hebreo en contextos de juicio y discernimiento.
  - «Jefes» conserva el hebraísmo de רָאשֵׁי sin perder claridad para lectores modernos.
  - «Sin camino» mantiene la idea de una ruta ausente, paralela al inglés auditado «trackless».
