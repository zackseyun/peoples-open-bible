translation:
  language: es
  text: Ahora dame sabiduría y conocimiento, para que pueda salir y entrar[a] delante de este pueblo, porque ¿quién podrá juzgar a este tu gran pueblo[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «salir y entrar»; en este contexto es un modismo para ejercer liderazgo público.'
    reason: cultural_note
  - marker: b
    text: O «tu gran pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - Pues ahora
  lexicon: HALOT
  rationale: Marca temporal y discursiva que introduce la petición; «Ahora» es natural en español y preserva la concisión del hebreo sin añadir énfasis innecesario.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: HALOT
  rationale: Es el equivalente léxico más directo y digno en este contexto real y judicial.
- source_word: וּמַדָּע
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - discernimiento
  lexicon: HALOT
  rationale: «Conocimiento» mantiene la distinción con «sabiduría» y traduce con claridad el par hebreo sin fusionarlo con la primera palabra.
- source_word: תֶּן לִי
  english_pob_choice: give me
  chosen_spanish: dame
  alternatives_spanish:
  - concédeme
  - otórgame
  lexicon: HALOT
  rationale: Imperativo directo y natural en español; conserva la petición simple del hebreo.
- source_word: וְאֵצְאָה ... וְאָבוֹאָה
  english_pob_choice: so that I may go out ... and come in
  chosen_spanish: para que pueda salir y entrar
  alternatives_spanish:
  - para que pueda ir y venir
  - para que pueda salir ... y volver a entrar
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea de actividad pública/función de liderazgo, pero en español se formula con una construcción clara y fluida. «Salir y entrar» preserva mejor la imagen original que una paráfrasis explícita como «gobernar».
- source_word: לִפְנֵי הָעָם הַזֶּה
  english_pob_choice: before this people
  chosen_spanish: delante de este pueblo
  alternatives_spanish:
  - ante este pueblo
  - frente a este pueblo
  lexicon: HALOT
  rationale: «Delante de» reproduce la imagen espacial de לִפְנֵי y es idiomático en español; mantiene el matiz de actuación pública ante el pueblo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición; «porque» es claro y natural en español.
- source_word: מִי יִשְׁפֹּט
  english_pob_choice: who can judge
  chosen_spanish: ¿quién podrá juzgar?
  alternatives_spanish:
  - ¿quién puede juzgar?
  - ¿quién será capaz de juzgar?
  lexicon: HALOT
  rationale: «Juzgar» conserva el verbo del hebreo y el valor real/judicial del contexto; el futuro de posibilidad («podrá») expresa adecuadamente la pregunta retórica de capacidad.
- source_word: עַמְּךָ
  english_pob_choice: people of yours
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - el pueblo tuyo
  - este pueblo tuyo
  lexicon: HALOT
  rationale: En español, «tu pueblo» es la forma natural y fiel de la segunda persona posesiva; mantiene la referencia a Dios y la relación de pacto implícita.
- source_word: הַגָּדוֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - numeroso
  lexicon: HALOT
  rationale: «Gran» suena más natural antes del sustantivo y conserva el doble matiz de tamaño e importancia presente en el hebreo.
theological_decisions:
- issue: Idiomatismo de «salir y entrar» en el contexto de liderazgo
  english_pob_reading: Retain 'go out and come in before this people' as an idiomatic description of royal leadership rather than replacing it with an explicit paraphrase such as 'lead this people.'
  chosen_spanish_reading: Mantener «salir y entrar delante de este pueblo» como imagen idiomática de función pública y de gobierno, sin sustituirla por una paráfrasis explícita como «gobernar a este pueblo».
  alternative_spanish_readings:
  - guiar a este pueblo
  - gobernar a este pueblo
  rationale: El hebreo conserva la imagen corporal y pública; la traducción española debe dejarla visible. En español la frase es comprensible y la nota explica su sentido funcional, evitando borrar el recurso literario del original.
  doctrine_reference: 'Translation philosophy: optimal equivalence; primacy of original-language imagery over smoothing paraphrase.'
- issue: Referencia posesiva a «tu pueblo»
  english_pob_reading: people of yours
  chosen_spanish_reading: tu pueblo
  alternative_spanish_readings:
  - este pueblo tuyo
  - el pueblo de ti
  rationale: La posesión directa en español refleja con naturalidad el sufijo hebreo de 2ª persona y mantiene la relación teológica de Dios con su pueblo, sin forzar una expresión menos idiomática.
  doctrine_reference: Lexical fidelity to suffixal possession in Hebrew; covenant relationship language.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que reordenó el modismo como «go out and come in before this people». Se adoptó en español una construcción equivalente y natural («salir y entrar delante de este pueblo») para preservar la imagen hebrea y su función de liderazgo, sin intensificarla con una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponda al nombre divino explícito; aquí el texto usa posesivo de 2ª persona dirigido a Dios, por lo que no se introduce el nombre.
  - Se eligió «sabiduría» y «conocimiento» como par léxico diferenciado, siguiendo la distinción del inglés POB y del hebreo.
  - «Pueblo» se usa de manera consistente para עַם en este contexto real y comunitario.
  - La nota [a] explica el modismo sin borrar el texto base; la nota [b] preserva la alternativa lexical sobre la posición y cualidad del pueblo.
