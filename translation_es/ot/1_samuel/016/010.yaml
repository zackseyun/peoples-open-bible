translation:
  language: es
  text: 'Entonces Isaí hizo pasar siete de sus hijos delante de Samuel, y Samuel dijo a Isaí: «Yahvé no ha elegido a ninguno de estos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲבֵר
  english_pob_choice: had ... pass before
  chosen_spanish: hizo pasar
  alternatives_spanish:
  - presentó
  - hizo desfilar
  lexicon: HALOT
  rationale: 'El hifil de עבר es causativo: Isaí hizo que sus hijos pasaran delante de Samuel. «Hizo pasar» conserva esa causalidad de manera natural en español sin perder el movimiento procesional implícito.'
- source_word: שִׁבְעַת בָּנָיו
  english_pob_choice: seven of his sons
  chosen_spanish: siete de sus hijos
  alternatives_spanish:
  - sus siete hijos
  lexicon: HALOT
  rationale: La construcción expresa siete de los hijos de Isaí. En español, «siete de sus hijos» mantiene bien la relación partitiva y evita sugerir innecesariamente un total cerrado si el contexto narrativo se sigue con cuidado.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: Aquí el valor espacial/relacional queda bien expresado con «delante de», que suena natural en español narrativo y conserva la idea de presentación formal ante Samuel.
- source_word: לֹא בָחַר
  english_pob_choice: has not chosen
  chosen_spanish: no ha elegido
  alternatives_spanish:
  - no ha escogido
  - no ha seleccionado
  lexicon: HALOT
  rationale: בחר significa «elegir/seleccionar». «Ha elegido» reproduce el valor perfectivo del hebreo tal como lo entendió la POB inglesa y mantiene la fuerza evaluativa de la decisión divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino YHWH se rinde como «Yahvé», conforme a la terminología POB en español y en continuidad con la decisión doctrinal de no sustituir el Nombre por un título.
- source_word: בָּאֵלֶּה
  english_pob_choice: any of these
  chosen_spanish: ninguno de estos
  alternatives_spanish:
  - ninguno entre estos
  - ninguno de ellos
  lexicon: HALOT
  rationale: 'La preposición con el demostrativo expresa exclusión: Samuel afirma que ninguno de los hijos presentados es el escogido. «Ninguno de estos» comunica esa negación de manera natural en español, sin añadir contenido ajeno al texto.'
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. La política del proyecto requiere conservar el nombre divino en español como «Yahvé», evitando la sustitución por un título. Esto mantiene visible la identidad personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene el sentido causativo de וַיַּעֲבֵר, el valor partitivo de שִׁבְעַת בָּנָיו, y la negación exclusivista de בָּאֵלֶּה. No se registraron revisiones posteriores con cambios; el estado más reciente indica que no hubo modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé», consistente con la política terminológica del proyecto.
  - Se usa un español moderno y reverente, sin calco excesivo del orden hebreo.
  - «Elegido»/«elegir» se conserva como equivalente de בחר, evitando sustituciones teológicas no motivadas por la fuente.
