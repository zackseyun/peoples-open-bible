    rationale: Aunque comprensible, suena forzado. «cuya transgresión ha sido perdonada» o «cuya transgresión es perdonada» expresa mejor la relación posesiva y mantiene la pasiva del original.
  revised_spanish_text: De David. Un Maskil[a]. Bienaventurado aquel cuya transgresión ha sido perdonada[b], cuyo pecado está cubierto.
