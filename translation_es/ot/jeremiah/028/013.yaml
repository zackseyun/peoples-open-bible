translation:
  language: es
  text: 'Ve y di a Jananías[a]: «Así dice Yahvé: Has quebrado varas de madera, pero has hecho en su lugar varas de hierro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «varas de madera ... varas de hierro». El hebreo se refiere más precisamente a las varas o barras del yugo, aunque en contexto también puede entenderse más ampliamente como «yugos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ וְאָמַרְתָּ
  english_pob_choice: Go and say
  chosen_spanish: Ve y dile
  alternatives_spanish:
  - Ve y di
  - Anda y dile
  lexicon: HALOT
  rationale: 'El hebreo combina un infinitivo absoluto con un verbo finito para dar una orden enfática. En español, la secuencia natural y fiel es una doble exhortación: «Ve y dile».'
- source_word: אֶל חֲנַנְיָה
  english_pob_choice: to Hananiah
  chosen_spanish: a Jananías
  alternatives_spanish:
  - a Hananías
  - a Ananías
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma bíblica común en español con «Jananías», manteniendo la referencia al personaje histórico del texto.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva en español con un giro natural y solemne. יְהוָה se rinde como «Yahvé» según la pauta del proyecto, no como una sustitución titular.
- source_word: מוֹטֹת עֵץ
  english_pob_choice: wooden yoke-bars
  chosen_spanish: varas de madera
  alternatives_spanish:
  - barras de madera
  - varas de madera del yugo
  - yugos de madera
  lexicon: HALOT
  rationale: El hebreo designa más precisamente las barras o varas del yugo; en español, «varas de madera» conserva la imagen concreta sin sobrecargar la frase. Se evita «yugos» porque diluye la precisión del objeto.
- source_word: שָׁבָרְתָּ
  english_pob_choice: you have broken
  chosen_spanish: has quebrado
  alternatives_spanish:
  - has roto
  - quebraste
  lexicon: HALOT
  rationale: «Quebrar» reproduce bien el valor de ruptura física y mantiene un tono bíblico claro. El perfecto compuesto expresa la acción ya cumplida con relevancia presente.
- source_word: וְעָשִׂיתָ
  english_pob_choice: but you have made
  chosen_spanish: pero has hecho
  alternatives_spanish:
  - y has hecho
  - pero has fabricado
  lexicon: HALOT
  rationale: 'Aunque el waw puede ser coordinante, aquí el contexto pide contraste: la sustitución empeora la situación. «Pero» preserva ese matiz adversativo reconocido por el audit trail inglés.'
- source_word: תַחְתֵּיהֶן
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en lugar de ellas
  - en vez de ellas
  lexicon: HALOT
  rationale: La preposición indica sustitución. «En su lugar» es la forma idiomática y transparente en español, manteniendo el sentido de reemplazo.
- source_word: מֹטוֹת בַּרְזֶל
  english_pob_choice: iron yoke-bars
  chosen_spanish: varas de hierro
  alternatives_spanish:
  - barras de hierro
  - varas de hierro del yugo
  - yugos de hierro
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con «varas de madera» para conservar el contraste material y simbólico. «Varas de hierro» es claro en español y no añade un término más interpretativo.
theological_decisions:
- issue: Forma de renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre propio divino en español como «Yahvé», conforme a la norma del proyecto y para no ocultar el nombre detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó la redundancia de «saying» y conservó explícito «yoke-bars». En español se siguió la misma lógica: se omitió un equivalente redundante de לֵאמֹר y se mantuvo una referencia concreta a las varas/barras del yugo, con una nota que reconoce la alternativa más amplia «yugos».'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» en lugar de una sustitución titular.
  - Se conserva la oposición madera/hierro sin convertirla en una paráfrasis más abstracta.
  - El nombre propio se adapta a la forma usual en español bíblico, «Jananías».
  - La nota al pie está anclada explícitamente en el sintagma «Jananías[a]» para cumplir la trazabilidad de la alternativa lexical.
