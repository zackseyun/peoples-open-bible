translation:
  language: es
  text: cuando mis pasos fueron lavados con cuajada[a], y la roca derramó para mí corrientes de aceite[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mantequilla»; el hebreo חֵמָה puede denotar cuajada, crema o un producto lácteo semejante a la mantequilla.
    reason: lexical_alternative
  - marker: b
    text: O «junto a mí» / «conmigo» para עִמָּדִי; la expresión hebrea es literalmente espacial.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְחֹץ
  english_pob_choice: when ... were washed
  chosen_spanish: cuando ... fueron lavados
  alternatives_spanish:
  - en el lavar
  - mientras eran lavados
  lexicon: HALOT
  rationale: El infinitivo constructo con ב introduce una circunstancia temporal; en español, «cuando» conserva bien ese valor sin forzar una estructura nominal poco natural.
- source_word: הֲלִיכַי
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mi caminar
  - mi andar
  lexicon: HALOT
  rationale: El sustantivo puede aludir al caminar o curso de vida; «mis pasos» mantiene la imagen concreta y coincide con la elección auditada en inglés.
- source_word: בְּחֵמָה
  english_pob_choice: in curds
  chosen_spanish: con cuajadas
  alternatives_spanish:
  - con crema
  - con mantequilla
  lexicon: HALOT
  rationale: חֵמָה puede designar cuajada, crema o un producto lácteo espeso semejante a mantequilla. «Cuajadas» comunica el alimento lácteo con menos anacronismo que «mantequilla»; se preserva la alternativa tradicional en nota.
- source_word: וְצוּר
  english_pob_choice: and the rock
  chosen_spanish: y la roca
  alternatives_spanish:
  - y una roca
  - y la peña
  lexicon: HALOT
  rationale: צוּר es «roca/peña»; «la roca» sigue la lectura auditada y funciona naturalmente en el paralelismo poético.
- source_word: יָצוּק
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - hizo brotar
  lexicon: HALOT
  rationale: יצק expresa vaciar o derramar; «derramó» conserva la imagen de provisión abundante y es idiomático en español poético.
- source_word: עִמָּדִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - conmigo
  - junto a mí
  lexicon: HALOT
  rationale: La expresión es literalmente espacial («conmigo/junto a mí»), pero en este contexto comunica beneficio o disponibilidad; «para mí» refleja bien ese matiz, como en la decisión auditada en inglés.
- source_word: פַּלְגֵי
  english_pob_choice: streams of
  chosen_spanish: torrentes de
  alternatives_spanish:
  - corrientes de
  - arroyos de
  lexicon: HALOT
  rationale: פַּלְגֵי designa divisiones o canales de agua; «torrentes de» preserva la fuerza imagística de abundancia fluida en castellano.
- source_word: שָׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: HALOT
  rationale: שָׁמֶן significa aceite, normalmente de oliva en el contexto israelita. «Aceite» es preciso y mantiene la concisión poética.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido auditado en inglés y el hebreo subyacente: temporalidad de בִּרְחֹץ, valor concreto de הֲלִיכַי, ambigüedad láctea de חֵמָה, imagen de derramar de יָצוּק y el matiz espacial/benefactivo de עִמָּדִי. Se conserva la tensión léxica en notas para evitar ocultar alternativas legítimas.'
  spanish_consistency_notes:
  - Se usa «aceite» para שָׁמֶן, no «óleo», por ser más transparente y acorde con el estilo del proyecto.
  - «Cuajadas» evita el anacronismo de «mantequilla» en el texto principal, pero la nota preserva esa alternativa documentada.
  - No se introducen términos doctrinales ajenos al verso; el paralelismo poético se mantiene con sintaxis clara y digna.
