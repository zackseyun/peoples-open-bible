base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/027/001.yaml
  text: Now the sons of Israel according to their number—the heads of fathers’ houses[a], and the commanders of thousands and of hundreds[c][b], and their officers who served the king in every matter of the divisions that came in and went out month by month throughout all the months of the year—each division was twenty-four thousand.
  footnotes:
  - marker: a
    text: Or 'The Israelites,' a more idiomatic collective rendering of 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'heads of fathers’ houses,' a clan-based administrative term.
    reason: cultural_note
  - marker: c
    text: That is, the divisions rotated into and out of royal service month by month.
    reason: cross_reference
