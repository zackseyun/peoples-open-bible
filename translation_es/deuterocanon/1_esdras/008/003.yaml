translation:
  language: es
  text: Este Esdras subió de Babilonia[a] siendo un escriba hábil en la ley de Moisés la cual había sido dada por el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un escriba presto»; el adjetivo griego puede señalar aptitud, inteligencia o competencia ya ejercitada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: BDAG
  rationale: El verbo griego expresa el movimiento habitual hacia Jerusalén o la tierra desde Babilonia. «Subió» conserva ese valor direccional natural en español y corresponde bien al giro tradicional sin volverse demasiado rígido.
- source_word: γραμματεὺς
  english_pob_choice: scribe
  chosen_spanish: escriba
  alternatives_spanish:
  - secretario
  - erudito de la ley
  lexicon: BDAG
  rationale: «Escriba» es el equivalente establecido en el ámbito judío para un experto en la Ley y copista letrado. «Secretario» reduce indebidamente la carga jurídica y textual; «erudito de la ley» explica, pero añade interpretación.
- source_word: εὐφυὴς
  english_pob_choice: skillful
  chosen_spanish: hábil
  alternatives_spanish:
  - presto
  - listo
  - inteligente
  - experto
  lexicon: LSJ
  rationale: El adjetivo puede indicar aptitud, capacidad o competencia práctica. «Hábil» transmite esa competencia de manera clara y sobria en español, sin forzar un matiz de inteligencia abstracta ni de simple rapidez.
- source_word: νόμῳ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - Torá
  lexicon: BDAG
  rationale: En la expresión «la ley de Moisés», «ley» es el equivalente más natural y directo del griego. «Torá» sería posible, pero introduciría un hebraísmo no necesario en este punto.
- source_word: ἐκδεδομένῳ
  english_pob_choice: had been given
  chosen_spanish: había sido dada
  alternatives_spanish:
  - había sido entregada
  - había sido promulgada
  lexicon: LSJ
  rationale: El participio pasivo señala que la ley proviene de Dios como don/entrega. «Había sido dada» reproduce esa pasividad de modo natural y evita cargar el texto con el matiz moderno de «publicada».
- source_word: θεοῦ τοῦ Ἰσραήλ
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: BDAG
  rationale: La forma con artículo es idiomática y preserva la identificación pactual del sujeto divino. «El Dios de Israel» mantiene el valor del griego y suena natural en español.
theological_decisions:
- issue: Relación entre la identidad de Esdras y su competencia en la Ley
  english_pob_reading: being a skillful scribe in the law of Moses
  chosen_spanish_reading: siendo un escriba hábil en la ley de Moisés
  alternative_spanish_readings:
  - siendo un escriba bien instruido en la ley de Moisés
  - siendo un escriba experto en la ley de Moisés
  rationale: El griego une la función de Esdras como γραμματεύς con su cualidad εὐφυής dentro del ámbito de la Ley. «Hábil» preserva la competencia práctica sin afirmar más formación formal de la que el texto da.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Fuente divina de la ley mosaica
  english_pob_reading: that had been given by the God of Israel
  chosen_spanish_reading: la cual había sido dada por el Dios de Israel
  alternative_spanish_readings:
  - la cual el Dios de Israel había entregado
  - la cual había sido promulgada por el Dios de Israel
  rationale: La pasiva deja claro que la Ley procede de Dios; la redacción elegida mantiene esa afirmación explícita sin añadir inferencias doctrinales adicionales.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto con el control inglés y no presenta revisiones aplicadas; se mantuvo la línea de traducción óptima, con ajuste español para naturalidad y fidelidad semántica al griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero aquí el texto dice «el Dios de Israel» en griego, sin el nombre divino explícito.
  - Se eligió «ley» en lugar de «instrucción» o «Torá» para respetar la construcción griega y la lectura auditada de la POB inglesa.
  - «Hábil» conserva el campo semántico de εὐφυής sin sobretraducirlo como «aprendido» o «listo»; la nota conserva la alternativa tradicional «presto».
