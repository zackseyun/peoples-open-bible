id: 2CO.5.10
reference: 2 Corinthians 5:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοὺς γὰρ πάντας ἡμᾶς φανερωθῆναι δεῖ ἔμπροσθεν τοῦ βήματος τοῦ Χριστοῦ, ἵνα κομίσηται ἕκαστος τὰ διὰ τοῦ σώματος πρὸς ἃ ἔπραξεν, εἴτε ἀγαθὸν εἴτε ⸀φαῦλον.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/010.yaml
  text: For we all must be revealed before the judgment seat of Messiah, so that each one may receive what is due for what he has done in the body, whether good or bad.
  footnotes:
  - marker: a
    text: Or 'appear before the judgment seat of the Messiah.' The Greek verb can mean either simple appearance or being openly disclosed; the main text preserves the stronger sense of exposure.
    reason: lexical_alternative
  - marker: b
    text: Or 'the things done in the body.' The Greek phrase may be understood as deeds done through one's embodied life.
    reason: lexical_alternative
  - marker: c
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title.
    reason: alternative_reading
  - marker: d
    text: Or 'receive what is due for the things done through the body'.
    reason: previous_rendering
translation:
  language: ko
  text: 우리 모두는 반드시 메시아의 심판대 앞에 드러나야 합니다. 이는 각 사람이 몸으로 행한 것에 따라 선이든지 악이든지 그에 마땅한 것을 받기 위함입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βήματος τοῦ Χριστοῦ
  english_pob_choice: judgment seat of Messiah
  chosen_korean: 메시아의 심판대
  alternatives_korean:
  - 그리스도의 심판대
  lexicon: BDAG
  rationale: βῆμα는 로마 행정관의 공식 「재판석」. 한국어 「심판대」 정립.
- source_word: κομίσηται
  english_pob_choice: receive
  chosen_korean: 받다
  alternatives_korean:
  - 되돌려 받다
  lexicon: BDAG
  rationale: κομίζω는 「자기 몫을 받다」 — 응당한 보응.
- source_word: φαῦλον
  english_pob_choice: bad
  chosen_korean: 악
  alternatives_korean:
  - 나쁜 것
  lexicon: BDAG
  rationale: φαῦλος는 「하찮은·나쁜」.
