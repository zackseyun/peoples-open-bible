review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la sintaxis básica: θεωρῶν como participio causal, πατήρ como padre literal, καθʼ οὓς καιρούς como iterativo, ἀνέδειξεν como designación formal, y τὸν διαδεξάμενον como el sucesor. Sin embargo, falla en un punto importante del sentido auditado: ἐστρατοπέδευσεν fue resuelto en el POB inglés como sentido militar amplio (''campaigned''), con nota para la alternativa más literal ''encamped''. El español principal eligió «acampaba», invirtiendo la preferencia textual y relegando la lectura contextual más probable a nota.'
  spanish_quality_summary: «Y viendo que...» es inteligible, pero «regiones de arriba» suena algo calcado y poco natural en español eclesial general. «Regiones altas» o «regiones superiores» conserva el valor espacial con mejor legibilidad. Además, la nota [a] está anclada en «padre», pero la variante léxica realmente corresponde al verbo militar; el anclaje debe moverse al verbo/frase pertinente.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. La principal cuestión léxica es mantener la decisión auditada para ἐστρατοπέδευσεν como «hacía campaña» en el texto principal, con «acampaba» como alternativa en nota. «Designaba» es aceptable para ἀνέδειξεν, y «al que habría de sucederle» preserva bien τὸν διαδεξάμενον.
  issues:
  - severity: high
    issue: El texto principal usa «acampaba» para ἐστρατοπέδευσεν en vez de la opción contextual principal.
    rationale: El audit trail inglés documenta que, aunque el verbo puede significar literalmente «acampar», en este contexto de movimiento militar real el sentido amplio «hacer campaña» es el mejor. El español debe reflejar esa decisión en el texto principal y dejar «acampar» como alternativa en nota.
  - severity: medium
    issue: La nota [a] está anclada en «padre» en lugar del verbo/frase militar pertinente.
    rationale: La nota explica una alternativa léxica de ἐστρατοπέδευσεν, no de πατήρ. Debe aparecer junto a «hacía campaña» o la frase militar relacionada para que el lector entienda qué palabra comenta.
  - severity: low
    issue: «Regiones de arriba» suena poco idiomático en español.
    rationale: Aunque es literalmente cercano a ἄνω, en español moderno suena forzado. «Regiones altas» conserva el matiz espacial sin sobreespecificar geografía y mejora la lectura.
  revised_spanish_text: Y viendo que también mi padre, siempre que hacía campaña[a] en las regiones altas, designaba al que habría de sucederle,
  revised_footnotes:
  - marker: a
    text: O «acampaba»; el verbo griego puede entenderse más literalmente como «acampar», pero en este contexto militar amplio también puede significar «hacer campaña».
    reason: lexical_alternative
