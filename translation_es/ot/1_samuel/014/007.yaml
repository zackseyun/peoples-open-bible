translation:
  language: es
  text: 'Su escudero le dijo: «Haz todo lo que tengas en tu corazón[a]. Sigue adelante[b]; aquí estoy contigo, conforme a tu corazón[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Corazón» aquí se refiere a intención, resolución o voluntad, no solamente a emoción.
    reason: lexical_alternative
  - marker: b
    text: O «Vuélvete», «procede» o, más literalmente, «extiéndete para ti». La expresión hebrea es idiomática y comunica avanzar con el plan.
    reason: lexical_alternative
  - marker: c
    text: La fórmula hebrea expresa conformidad o alineación con la intención de la otra persona.
    reason: alternative_reading
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: his armor-bearer
  chosen_spanish: su escudero
  alternatives_spanish:
  - el que llevaba sus armas
  - su portador de armas
  lexicon: HALOT
  rationale: En este contexto militar, el portador de armas de un jefe de guerra se expresa con naturalidad en español como «escudero». Conserva la función de acompañante armado sin forzar un calco como «portador de armas».
- source_word: עֲשֵׂה כָּל אֲשֶׁר בִּלְבָבֶךָ
  english_pob_choice: Do all that is in your heart
  chosen_spanish: Haz todo lo que tengas en tu corazón
  alternatives_spanish:
  - Haz todo lo que está en tu corazón
  - Haz todo lo que quieras
  lexicon: HALOT
  rationale: «Corazón» conserva el hebraísmo para intención, resolución o voluntad. «Tengas» mantiene el valor interno y evita una lectura meramente emocional, sin perder la claridad del imperativo.
- source_word: נְטֵה לָךְ
  english_pob_choice: Turn yourself
  chosen_spanish: Aquí estoy contigo
  alternatives_spanish:
  - Vuélvete
  - Enderézate para ti
  - Adelante
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática y, en este pasaje, afirma disponibilidad y acompañamiento más que un giro físico explícito en la respuesta del escudero. El español se resuelve de forma natural mediante la segunda cláusula de apoyo: «Aquí estoy contigo», evitando un calco opaco en la línea principal.'
- source_word: הִנְנִי
  english_pob_choice: here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - He aquí que estoy
  - Estoy aquí
  lexicon: HALOT
  rationale: «Aquí estoy» reproduce el valor presentativo y la disponibilidad personal de הִנְנִי en español moderno y bíblico, sin exceso de arcaísmo.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - a tu lado
  lexicon: HALOT
  rationale: El sufijo pronominal de segunda persona singular se vierte naturalmente como «contigo», manteniendo la solidaridad y compañía expresadas por el hebreo.
- source_word: כִּלְבָבֶךָ
  english_pob_choice: according to your heart
  chosen_spanish: conforme a tu corazón
  alternatives_spanish:
  - según tu corazón
  - de acuerdo con tu corazón
  lexicon: HALOT
  rationale: La partícula כ indica conformidad o correspondencia. «Conforme a tu corazón» conserva la repetición del término «corazón» y la idea de alineación con la intención o resolución de Jonatán.
theological_decisions:
- issue: Sentido de «corazón» como voluntad/resolución, no solo emoción
  english_pob_reading: Heart here refers to intention, resolve, or will, not merely emotion.
  chosen_spanish_reading: «Corazón» se entiende como intención, resolución o voluntad, no solo como sentimiento.
  alternative_spanish_readings:
  - corazón = sentimientos
  - corazón = mente
  rationale: El hebreo לֵבָב en este contexto apunta al centro de la decisión y el impulso interior. Mantener «corazón» en el texto y explicitar su alcance evita reducirlo a emoción y preserva la tensión semántica del original.
  doctrine_reference: Antropología bíblica; uso semítico de לֵב/לֵבָב
translation_notes:
  revision_awareness: La versión inglesa revisada movió la traducción de נְטֵה לָךְ de una paráfrasis («Go on») a una opción más literal («Turn yourself»). En español se optó por no calcar la imagen verbal de modo opaco; se priorizó una lectura idiomática y natural del conjunto de la respuesta del escudero, manteniendo la idea de acompañamiento y concordancia de voluntad. También se preservó la repetición de «corazón» para reflejar el énfasis hebreo.
  spanish_consistency_notes:
  - Se mantiene «corazón» de manera consistente para בִּלְבָבֶךָ y כִּלְבָבֶךָ, en línea con la decisión léxica de la POB inglesa.
  - «Escudero» es una solución estable en español bíblico para נֹשֵׂא כֵלָיו en un contexto militar, sin introducir terminología eclesiástica.
  - Se evita «SEÑOR» u otras sustituciones de nombre divino porque este versículo no contiene el tetragrámaton ni un título divino explícito.
