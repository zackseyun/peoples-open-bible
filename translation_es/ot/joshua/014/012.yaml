base_translation:
  language: en
  yaml_path: translation/ot/joshua/014/012.yaml
  text: Now give me this hill country that Yahweh spoke about on that day[a], because you yourself heard on that day that the Anakim are there, with great fortified cities. Perhaps Yahweh will be with me, and I will drive them out[b], just as Yahweh said.
  footnotes:
  - marker: a
    text: Or 'this mountain.' The Hebrew הָהָר can refer either to a single mountain or to a mountainous region; here the broader regional sense is likely.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''Perhaps the LORD [will be] with me,'' an elliptical expression of hoped-for divine presence and aid.'
    reason: lexical_alternative
