review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el sentido benedictorio de יֹסֵף y respeta el nombre divino «Yahvé». Sin embargo, pierde parcialmente la repetición enfática de עֲלֵיכֶם ... עֲלֵיכֶם al convertirla en «te, a ti», y además cambia de segunda persona plural en hebreo («ustedes/vosotros») a singular («te/tus»). También «hijos» es posible, pero «hijos e hijas/niños» no es necesario; «hijos» puede mantenerse. La bendición debe dirigirse en plural para corresponder al hebreo y al contexto del salmo.
  spanish_quality_summary: '«Yahvé te aumente, a ti y a tus hijos» suena comprensible, pero en español bíblico natural resulta mejor expresar la bendición en plural y con una formulación más idiomática: «Yahvé los aumente[a], a ustedes y a sus hijos». Esto conserva la repetición enfática con buena legibilidad. La nota actual también contiene una alternativa menos natural («te añada»).'
  glossary_alignment: 'Alineado con el glosario en «Yahvé». La decisión principal que requiere ajuste es el número gramatical: el hebreo usa 2mp en toda la línea, por lo que el español debe reflejarlo con «los / a ustedes / sus». «Aumente» sigue siendo una buena opción para יֹסֵף, con nota alternativa sobre «añadir a» o «aumentar».'
  issues:
  - severity: high
    issue: Cambio indebido de plural a singular
    rationale: עֲלֵיכֶם y בְּנֵיכֶם son segunda persona masculina plural. El borrador usa «te... a ti... tus», lo que altera el referente del texto.
  - severity: medium
    issue: La repetición enfática hebrea se conserva solo de forma imperfecta
    rationale: El hebreo repite «sobre/a ustedes» dos veces. «te, a ti» intenta reflejarlo, pero al estar en singular y con clítico + frase tónica no reproduce bien la estructura. «los... a ustedes» lo refleja mejor en español.
  - severity: low
    issue: Alternativa de nota poco natural en español
    rationale: «te añada» suena menos idiomático que «añada a ustedes» o una formulación impersonal como «añadir a». La nota debe ajustarse al texto revisado y a la gramática del versículo.
  revised_spanish_text: Yahvé los[a] aumente, a ustedes y a sus hijos.
  revised_footnotes:
  - marker: a
    text: 'O: «Que Yahvé añada a ustedes, a ustedes y a sus hijos». El verbo hebreo puede traducirse más literalmente como «añadir a» o «aumentar».'
    reason: lexical_alternative
  revision_rationale: Se revisa al plural para reflejar fielmente la segunda persona plural del hebreo. También se conserva mejor la repetición enfática con «los... a ustedes». Se mantiene «Yahvé» según la terminología del proyecto y «aumente» como opción principal idiomática en una bendición. La nota se ajusta para reflejar la alternativa más literal sin crear una construcción española incorrecta.
