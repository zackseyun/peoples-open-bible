translation:
  language: es
  text: Ciertamente[a] he calmado y aquietado mi alma, como un niño destetado con su madre[b]; como un niño destetado es mi alma dentro de mí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si no he igualado y aquietado mi alma». El inicio hebreo es una expresión enfática idiomática; aquí se traduce como una afirmación segura.'
    reason: alternative_reading
  - marker: b
    text: La imagen es la de un niño que ya no está inquieto por mamar, sino que descansa tranquilamente con su madre.
    reason: cultural_note
  - marker: c
    text: 'O: «como un niño destetado sobre mí es mi alma». La expresión hebrea es difícil; «dentro de mí» comunica con naturalidad el sentido probable.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Si no
  - En verdad
  - Ciertamente
  lexicon: HALOT
  rationale: En este contexto, la abertura hebrea funciona como una afirmación enfática, no como una condicional literal. «Ciertamente» comunica bien la fuerza asseverativa en español natural y conserva el matiz de seguridad/testimonio del salmista.
- source_word: שִׁוִּיתִי
  english_pob_choice: I have calmed
  chosen_spanish: he aquietado
  alternatives_spanish:
  - he calmado
  - he igualado
  - he compuesto
  lexicon: HALOT
  rationale: El verbo aquí expresa haber puesto el propio interior en un estado sereno y estable. «Aquietado» refleja ese efecto interno con cierta cercanía al valor de 'hacer quieto' sin sonar tan abstracto como «igualado».
- source_word: וְדוֹמַמְתִּי
  english_pob_choice: and quieted
  chosen_spanish: y calmado
  alternatives_spanish:
  - y silenciado
  - y sosegado
  - y aquietado
  lexicon: HALOT
  rationale: El verbo añade la idea de volver callado o quieto lo que estaba agitado. «Calmado» encaja con el paralelismo y mantiene la imagen de una interioridad pacificada sin exagerar el matiz de silencio absoluto.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser interior
  - mi persona
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ refiere al yo interior del orante. «Alma» preserva el registro bíblico y la resonancia espiritual tradicional en español, sin obligar a una lectura filosófica técnica de cuerpo-alma.
- source_word: כְּגָמֻל
  english_pob_choice: like a weaned child
  chosen_spanish: como un niño destetado
  alternatives_spanish:
  - como un niño ya destetado
  - como un pequeño destetado
  - como un destetado
  lexicon: HALOT
  rationale: La forma participial pasiva indica a un niño que ya ha sido destetado. «Niño destetado» es claro, fiel y suficientemente natural en español, manteniendo la imagen concreta del texto.
- source_word: עֲלֵי אִמּוֹ
  english_pob_choice: with his mother
  chosen_spanish: con su madre
  alternatives_spanish:
  - junto a su madre
  - sobre su madre
  - al lado de su madre
  lexicon: HALOT
  rationale: La preposición hebrea aquí sugiere cercanía y reposo relacional, no una localización literal rígida. «Con su madre» reproduce de manera natural la intimidad de la escena, como en la lectura auditada del POB inglés.
- source_word: כַּגָּמֻל עָלַי נַפְשִׁי
  english_pob_choice: like a weaned child is my soul within me
  chosen_spanish: como un niño destetado es mi alma dentro de mí
  alternatives_spanish:
  - como un niño destetado está mi alma en mí
  - como un destetado es mi alma sobre mí
  - como un niño destetado mi alma está en mí
  lexicon: HALOT
  rationale: La clausula final repite e intensifica el símil; en español, «dentro de mí» expresa de forma natural el sentido interno y asentado que el inglés POB explicó con la misma lectura, sin forzar el hebreo idiomático «sobre mí».
theological_decisions:
- issue: Sentido antropológico de נַפְשִׁי
  english_pob_reading: Rendered as 'my soul' without importing a technical body-soul dualism.
  chosen_spanish_reading: «mi alma» conserva el lenguaje bíblico del yo interior sin convertirlo en una tesis antropológica técnica.
  alternative_spanish_readings:
  - mi ser interior
  - mi vida
  - mi persona
  rationale: El versículo describe la postura interior del salmista ante Dios. «Alma» es la opción más transparente y tradicional en español para preservar esa profundidad sin imponer una división filosófica que el hebreo no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue la decisión estable del POB inglés: leer אִם לֹא de modo enfático, mantener la doble imagen del niño destetado y conservar נַפְשִׁי como «alma» con valor de interioridad, sin introducir cambios textuales no respaldados por el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto lo exige; aquí no aparece el tetragrámaton.
  - «alma» se mantiene consistente con el tratamiento bíblico de נַפְשִׁי en el POB español, evitando alternar con «ser» sin necesidad.
  - La clausula final conserva el paralelismo hebreo con una solución idiomática española que no pierde el sentido de reposo interior.
  - Las notas distinguen claramente la lectura enfática del inicio y la dificultad de la última frase, siguiendo el audit trail inglés.
