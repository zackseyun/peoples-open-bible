translation:
  language: es
  text: 'Mi corazón se calentó dentro de mí; mientras meditaba[a], ardió el fuego[b]; entonces hablé con mi lengua:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras cavilaba» o «en mi meditación». El término hebreo puede denotar reflexión interior, meditación o murmuración interior.
    reason: lexical_alternative
  - marker: b
    text: O «el fuego se avivó» o «el fuego ardía». La imagen hebrea intensifica el calor interior hasta convertirlo en fuego ardiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַם
  english_pob_choice: grew hot
  chosen_spanish: se calentó
  alternatives_spanish:
  - estaba caliente
  - llegó a calentarse
  - se puso caliente
  lexicon: HALOT
  rationale: En contexto describe un cambio de estado interior, no solo una condición estática. «Se calentó» conserva el matiz incoativo del hebreo y evita mezclarlo con la imagen posterior del fuego ya encendido.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi alma
  - mi interior
  - mi ser
  lexicon: HALOT
  rationale: «Corazón» es la correspondencia natural de לֵב/לֵבָב para el centro interior de la persona, incluidos afectos y pensamientos, y mantiene la imagen antropológica del hebreo.
- source_word: בְּקִרְבִּי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mi interior
  - en medio de mí
  - dentro de mi ser
  lexicon: HALOT
  rationale: Expresa con naturalidad la localización interna del calor. «Dentro de mí» conserva el énfasis inward del original sin sonar forzado en español.
- source_word: בַּהֲגִיגִי
  english_pob_choice: as I meditated
  chosen_spanish: mientras meditaba
  alternatives_spanish:
  - al meditar
  - en mi meditación
  - mientras cavilaba
  lexicon: HALOT
  rationale: הֲגִיג puede abarcar meditar, murmurar o reflexionar. Aquí la preposición temporal favorece una traducción verbal en español; «mientras meditaba» comunica el proceso interior continuo sin borrar la ambigüedad reflexiva del término.
- source_word: תִבְעַר אֵשׁ
  english_pob_choice: the fire burned
  chosen_spanish: se encendió el fuego
  alternatives_spanish:
  - ardió el fuego
  - se abrasó el fuego
  - el fuego se avivó
  lexicon: HALOT
  rationale: El hebreo intensifica la metáfora de calor interior a fuego visible/activo. «Se encendió el fuego» conserva la imagen de ignición y sugiere ese incremento de intensidad; el reflexivo mantiene la vivacidad del cuadro poético.
- source_word: דִּבַּרְתִּי
  english_pob_choice: then I spoke
  chosen_spanish: entonces hablé
  alternatives_spanish:
  - y hablé
  - luego hablé
  - entonces dije
  lexicon: HALOT
  rationale: 'El aoristo simple funciona bien en español. «Entonces» marca la secuencia retórica del verso: primero la agitación interna, luego la expresión verbal.'
- source_word: בִּלְשׁוֹנִי
  english_pob_choice: with my tongue
  chosen_spanish: con mi lengua
  alternatives_spanish:
  - con mi boca
  - con mi hablar
  lexicon: HALOT
  rationale: «Lengua» es más literal que «boca» y conserva el rasgo corporal del hebreo. Aunque suene enfático, refleja con precisión el modo material de la palabra pronunciada.
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo alto del control cruzado y conserva la progresión poética del hebreo: calor interior, meditación, fuego, y finalmente habla. No se detectaron revisiones sustantivas en el pasaje auditado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «corazón» para לֵב por coherencia antropológica en el conjunto de los Salmos.
  - Se evitó traducir automáticamente el fuego como simple metáfora sin el matiz de intensificación que conserva la secuencia hebrea.
