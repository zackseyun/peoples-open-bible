translation:
  language: es
  text: Entonces algunos de los ancianos de Israel vinieron a mí y se sentaron ante mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vinieron a mí hombres de entre los ancianos de Israel», porque la expresión hebrea puede indicar hombres tomados de entre los ancianos, no necesariamente todo el cuerpo de ancianos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es singular, precede a un sujeto plural ('anשים'), un giro común en hebreo narrativo. En español conviene concordar en plural. 'Vinieron' mantiene el movimiento hacia el profeta y suena natural en registro bíblico.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - a mí
  lexicon: HALOT
  rationale: '''אֶל'' con sufijo de primera persona expresa dirección hacia el hablante; ''a mí'' reproduce de forma directa y natural ese valor.'
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: algunos
  alternatives_spanish:
  - hombres
  - algunos hombres
  lexicon: HALOT
  rationale: El sustantivo significa literalmente 'hombres', pero en español la frase completa 'algunos de los ancianos de Israel' ya identifica el grupo. Añadir 'hombres' podría sonar redundante y forzado; por eso se deja implícito dentro de la nota de que se trata de 'algunos' de los ancianos.
- source_word: מִזִּקְנֵי יִשְׂרָאֵל
  english_pob_choice: some of the elders of Israel
  chosen_spanish: algunos de los ancianos de Israel
  alternatives_spanish:
  - de entre los ancianos de Israel
  - algunos ancianos de Israel
  lexicon: HALOT
  rationale: La preposición מן señala procedencia o selección desde un conjunto mayor. 'Algunos de los ancianos de Israel' preserva esa relación y refleja la decisión revisada del texto inglés POB, evitando sugerir que se trata de todo el cuerpo de ancianos.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: sat
  chosen_spanish: se sentaron
  alternatives_spanish:
  - se sentaron
  - tomaron asiento
  lexicon: HALOT
  rationale: El sentido básico es postural, físico. 'Se sentaron' es claro, fiel y suficientemente formal; 'tomaron asiento' sería más interpretativo y menos directo.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: '''Delante de mí'' comunica bien la imagen espacial del hebreo y es natural en español bíblico contemporáneo. ''En mi presencia'' explicita el matiz idiomático, pero añade una interpretación que no es necesaria en el texto base.'
translation_notes:
  revision_awareness: Se siguió el texto hebreo directamente y se incorporó la revisión del audit trail en inglés, que prefirió 'some of the elders of Israel' frente a una formulación más literal pero menos natural. La traducción española refleja esa misma selección sin perder la idea de procedencia desde el grupo de ancianos.
  spanish_consistency_notes:
  - Se mantuvo 'ancianos de Israel' como término estable para זִקְנֵי יִשְׂרָאֵל.
  - Se usó voz narrativa simple y directa, acorde con el registro profético.
  - La nota al pie preserva la ambigüedad del מן hebreo, tal como lo hace el POB en inglés.
