translation:
  language: es
  text: Jonatán, el sumo sacerdote de la nación[a], y el senado, y los sacerdotes, y el resto del pueblo judío, a sus hermanos espartanos[b], saludos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del pueblo». El griego ἔθνος puede referirse al cuerpo nacional de los judíos, con matiz etnopolítico además de religioso.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» refleja el parentesco diplomático del griego; no implica necesariamente hermandad literal.
    reason: cultural_note
lexical_decisions:
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  - pontífice
  lexicon: BDAG
  rationale: En este contexto, ἀρχιερεύς designa el oficio sacerdotal supremo de Israel. «Sumo sacerdote» es la equivalencia española más clara y estable, y preserva el valor institucional del título.
- source_word: τοῦ ἔθνους
  english_pob_choice: of the nation
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la nación
  - del pueblo nacional
  lexicon: BDAG
  rationale: ἔθνος aquí señala al cuerpo colectivo de Israel/Judea más que a «gentiles». En español, «del pueblo» suena natural y conserva la referencia colectiva sin forzar una construcción pesada.
- source_word: γερουσία
  english_pob_choice: senate
  chosen_spanish: consejo de ancianos
  alternatives_spanish:
  - senado
  - gerusía
  lexicon: LSJ
  rationale: El término nombra un cuerpo gobernante de ancianos. «Consejo de ancianos» es transparente para el lector moderno y mantiene el sentido institucional que el inglés POB dejó entre «senate» y «council of elders» en su auditoría.
- source_word: ὁ λοιπὸς δῆμος
  english_pob_choice: the rest of the people
  chosen_spanish: el resto del pueblo
  alternatives_spanish:
  - el resto de la gente
  - la demás población
  lexicon: LSJ
  rationale: δῆμος conserva el sentido del pueblo como cuerpo cívico. «El resto del pueblo» refleja bien la distinción con los líderes nombrados antes.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: judío
  alternatives_spanish:
  - de los judíos
  - de los judeanos
  lexicon: BDAG
  rationale: Aquí el adjetivo «judío» funciona de manera natural en español para el conjunto remitente. Evita una repetición rígida y conserva la identidad étnico-religiosa y política que el griego puede abarcar.
- source_word: Σπαρτιάταις
  english_pob_choice: Spartan
  chosen_spanish: espartanos
  alternatives_spanish:
  - lacedemonios
  - spartanos
  lexicon: LSJ
  rationale: El etnónimo en dativo identifica a los destinatarios. «Espartanos» es la forma usual y más inteligible en español.
- source_word: τοῖς ἀδελφοῖς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - aliados
  lexicon: BDAG
  rationale: Se conserva el lenguaje diplomático de parentesco literal del texto griego. «Hermanos» mantiene esa afirmación sin suavizarla ni reinterpretarla.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: salud
  alternatives_spanish:
  - saludos
  - que se alegren
  lexicon: BDAG
  rationale: Es la fórmula epistolar griega convencional. «Salud» es una equivalencia española breve y formal que reproduce el valor formular sin añadir más contenido.
theological_decisions:
- issue: Lenguaje de fraternidad diplomática
  english_pob_reading: Retain 'brothers' as the stated kinship language of the letter.
  chosen_spanish_reading: Conservar «hermanos» como lenguaje de parentesco diplomático declarado.
  alternative_spanish_readings:
  - amigos
  - aliados
  - parientes
  rationale: El versículo formula una reclamación de fraternidad entre grupos políticos. La traducción conserva esa tensión histórica y retórica sin explicarla o desactivarla en el texto principal.
  doctrine_reference: DOCTRINE.md §3 (Preserve tension rather than resolve it); §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la sintaxis para hacer más natural la relación entre los títulos y el grupo judío, y prefirió «senate» en un punto de tradición institucional. En español se optó por «consejo de ancianos», que expresa el mismo cuerpo con mayor transparencia y sin perder el valor histórico del término. También se conservó la fórmula final de saludo como equivalente epistolar.
  spanish_consistency_notes:
  - Se mantiene el nombre propio como «Jonatán», conforme al uso español bíblico habitual.
  - Se evita «SEÑOR» o equivalentes de máscara, porque no aparece el Tetragrámaton en este versículo.
  - Se conserva un registro bíblico formal pero actual, apto para lectura pública y estudio.
  - La puntuación sigue la estructura acumulativa del griego con comas y dos puntos finales.
