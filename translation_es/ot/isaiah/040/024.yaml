base_translation:
  language: en
  yaml_path: translation/ot/isaiah/040/024.yaml
  text: Scarcely are they planted[a], scarcely are they sown, scarcely has their stem taken root in the earth, when he merely blows on them and they wither[b], and a storm carries them away like stubble.
  footnotes:
