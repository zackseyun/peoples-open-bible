translation:
  language: es
  text: Si su amo le da una esposa, y ella le da a luz hijos o hijas, la esposa y sus hijos pertenecerán a su amo[a]; y él saldrá solo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la esposa y sus hijos serán de su amo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y él saldrá solo», es decir, saldrá sin la esposa y los hijos dados durante su tiempo de servicio.'
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: 'La fórmula casuística de la ley se expresa mejor en español con una condicional directa: «Si». Mantiene el valor legal del caso hipotético.'
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  lexicon: HALOT
  rationale: En este contexto de servidumbre esclava, «amo» conserva la relación de autoridad y posesión que el texto regula. «Señor» podría sonar ambiguo por uso reverencial; «dueño» enfatiza la posesión, pero «amo» refleja mejor la relación social/legal.
- source_word: יִתֶּן לוֹ אִשָּׁה
  english_pob_choice: gives him a wife
  chosen_spanish: le da una mujer
  alternatives_spanish:
  - le da una esposa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «una mujer». En español, «mujer» mantiene esa forma y evita cerrar de antemano el matiz jurídico. Dado el contexto, la relación resulta marital, pero el texto fuente no usa aquí la palabra específica «esposa».
- source_word: וְיָלְדָה לוֹ
  english_pob_choice: and she bears him
  chosen_spanish: y ella le da a luz
  alternatives_spanish:
  - y ella lo alumbra
  - y ella le pare
  lexicon: HALOT
  rationale: «Dar a luz» comunica bien el acto de tener hijos y es natural en español. Conserva el sentido de alumbrar hijos para él sin sonar demasiado coloquial.
- source_word: בָנִים אוֹ בָנוֹת
  english_pob_choice: sons or daughters
  chosen_spanish: hijos o hijas
  alternatives_spanish:
  - niños o niñas
  - descendencia
  lexicon: HALOT
  rationale: La secuencia hebrea distingue explícitamente varones y mujeres. En español, «hijos o hijas» preserva esa distinción de forma natural y clara.
- source_word: הָאִשָּׁה וִילָדֶיהָ
  english_pob_choice: the wife and her children
  chosen_spanish: la mujer y sus hijos
  alternatives_spanish:
  - la esposa y sus hijos
  - la mujer y su descendencia
  lexicon: HALOT
  rationale: Para mantener coherencia con la primera parte, se conserva «mujer». El posesivo «sus» refleja el vínculo con ella y con los niños sin forzar un término más interpretativo.
- source_word: תִּהְיֶה לַאדֹנֶיהָ
  english_pob_choice: shall belong to her master
  chosen_spanish: pertenecerán a su amo
  alternatives_spanish:
  - serán de su amo
  - quedarán para su amo
  lexicon: HALOT
  rationale: El hebreo expresa una relación de pertenencia legal. «Pertenecerán» comunica esa posesión/status de modo directo y claro en español contemporáneo.
- source_word: וְהוּא יֵצֵא
  english_pob_choice: and he shall go out
  chosen_spanish: y él saldrá
  alternatives_spanish:
  - y él se irá
  - y él será liberado
  lexicon: HALOT
  rationale: «Salir» reproduce el verbo hebreo יֵצֵא y conserva la imagen legal del texto. Aunque la referencia es a la salida/retiro del servicio, la traducción mantiene el idiomático «saldrá».
- source_word: בְגַפּוֹ
  english_pob_choice: by himself
  chosen_spanish: solo
  alternatives_spanish:
  - por sí solo
  - sin compañía
  lexicon: HALOT
  rationale: El modismo hebreo indica que sale sin la mujer ni los hijos dados durante su servicio. «Solo» comunica de manera natural y breve esa idea en español.
theological_decisions:
- issue: Lenguaje de posesión y servidumbre en un contexto legal
  english_pob_reading: Use 'master' and explicit belonging language without softening the ownership relation.
  chosen_spanish_reading: Usar «amo» y «pertenecerán» sin suavizar la relación jurídica de pertenencia.
  alternative_spanish_readings:
  - usar «señor»
  - usar «dueño»
  - usar «serán de»
  rationale: El texto regula una situación de servidumbre/esclavitud y el español debe reflejar esa realidad legal sin eufemismos. «Amo» y «pertenecerán» preservan la fuerza jurídica del pasaje y su tensión ética sin reinterpretarla.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió el pasaje base con alta concordancia con el auditorio inglés; no hubo revisiones aplicadas en el tramo final, así que la propuesta española conserva la estructura legal y las decisiones léxicas principales sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantuvo «amo» de manera consistente para אֲדֹנָיו/לַאדֹנֶיהָ en un contexto de servidumbre.
  - Se conservó «mujer» en la primera cláusula para respetar el hebreo אִשָּׁה, aunque el contexto hace evidente la lectura de esposa; en la segunda cláusula se evitó variar a «esposa» para no romper la cohesión terminológica.
  - Se usó «pertenecerán» para expresar la relación legal de posesión/status indicada por תִּהְיֶה לַאדֹנֶיהָ.
