revisions:
- from: Entonces Yahvé respondió a Job desde el torbellino, y dijo:[a]
  to: Entonces Yahvé respondió a Job desde en medio del torbellino y dijo:[a]
  rationale: Se corrige la nota para que preserve una alternativa léxica real, y se ajusta la preposición a «desde en medio del» para reflejar mejor la fuerza de מִן־הַסְּעָרָה en español natural, manteniendo «torbellino» como la opción principal coherente con el expediente auditado.
  reviewer_model: gpt-5.4
