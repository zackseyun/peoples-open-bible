revisions:
- from: Y sucederá[a] que, cuando se cumplan tus días para irte a estar con tus padres, yo levantaré tu descendencia después de ti, la cual será de entre tus hijos, y estableceré su reino.
  to: Y sucederá[a] que, cuando se cumplan tus días para ir a estar con tus padres, yo levantaré tu descendencia después de ti, que será uno de tus hijos, y estableceré su reino.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión del español: «para ir a estar» fluye mejor que «irte a estar», y «que será uno de tus hijos» representa con más claridad el sentido individual y partitivo de אֲשֶׁר יִהְיֶה מִבָּנֶיךָ, en línea con la revisión inglesa auditada. La nota se ajustó para corresponder exactamente al modismo reflejado en el texto.'
