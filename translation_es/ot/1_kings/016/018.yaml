translation:
  language: es
  text: Cuando Zimri vio que la ciudad había sido capturada, entró en la ciudadela[a] de la casa del rey y quemó la casa del rey sobre sí mismo con fuego[b], y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fortaleza» o «palacio» para «ciudadela»; אַרְמוֹן puede designar una estructura real fortificada.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «quemó la casa del rey sobre sí mismo con fuego», describiendo la autodestrucción de Zimri al incendiar la residencia real a su alrededor.
    reason: cultural_note
lexical_decisions:
- source_word: כִּ/רְא֤וֹת
  english_pob_choice: when ... saw
  chosen_spanish: cuando vio
  alternatives_spanish:
  - al ver
  - mientras veía
  lexicon: HALOT
  rationale: El infinitivo constructo con כ expresa circunstancia temporal. «Cuando vio» reproduce la relación temporal de manera natural en español sin perder la secuencia narrativa.
- source_word: נִלְכְּדָ֣ה
  english_pob_choice: had been captured
  chosen_spanish: había sido capturada
  alternatives_spanish:
  - fue capturada
  - había caído
  lexicon: HALOT
  rationale: El nifal de לכד indica que la ciudad fue tomada/capturada. El pluscuamperfecto español refleja bien el trasfondo de la acción percibida por Zimri.
- source_word: הָ/עִ֔יר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Correspondencia directa y transparente de עִיר.
- source_word: אַרְמ֣וֹן
  english_pob_choice: citadel
  chosen_spanish: ciudadela
  alternatives_spanish:
  - fortaleza
  - palacio
  lexicon: HALOT
  rationale: אַרְמוֹן puede referirse a una estructura real fortificada. «Ciudadela» conserva la idea de recinto fortificado y evita confundirlo con «palacio», ya que luego aparece «la casa del rey».
- source_word: בֵּית הַ/מֶּ֑לֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - la casa real
  - el palacio
  lexicon: HALOT
  rationale: La expresión literal «casa del rey» preserva el hebreo y la repetición intencional del versículo, que no conviene nivelar con «palacio».
- source_word: וַ/יִּשְׂרֹ֨ף
  english_pob_choice: burned ... over himself with fire
  chosen_spanish: quemó ... sobre sí con fuego
  alternatives_spanish:
  - prendió fuego a ...
  - incendió ...
  lexicon: HALOT
  rationale: El verbo significa «quemar»; el contexto muestra destrucción mediante fuego. «Quemó ... sobre sí con fuego» preserva la construcción extraña del hebreo y la acción autodestructiva sin añadir explicación.
- source_word: עָלָ֧י/ו
  english_pob_choice: over himself
  chosen_spanish: sobre sí
  alternatives_spanish:
  - encima de sí
  - sobre él
  lexicon: HALOT
  rationale: La preposición עַל con sufijo funciona idiomáticamente aquí para indicar que la estructura ardió/cayó sobre él. «Sobre sí» mantiene esa tensión sin suavizarla.
- source_word: אֶת בֵּֽית מֶ֛לֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - la casa real
  - el palacio
  lexicon: HALOT
  rationale: Se conserva la repetición de la frase nominal, importante en el hebreo, en vez de reducirla a un equivalente más general.
- source_word: בָּ/אֵ֖שׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - en fuego
  lexicon: HALOT
  rationale: El beth instrumental se traduce naturalmente por «con fuego» en español.
- source_word: וַ/יָּמֹֽת
  english_pob_choice: and died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: Continuación narrativa simple y directa; «murió» reproduce la finalidad del acto sin atenuación.
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión del texto inglés: se evita añadir una expansión interpretativa como «down» y se conserva la relación literal entre «burned» y «over himself with fire», además de mantener la distinción entre אַרְמוֹן y בֵּית הַמֶּלֶךְ.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «casa del rey» a «palacio» para conservar la repetición del hebreo y evitar borrar la tensión entre אַרְמוֹן y בֵּית.
  - Se mantuvo un registro formal y bíblico moderno, evitando calcos ingleses innecesarios pero preservando la estructura narrativa del original.
