translation:
  language: es
  text: Y la procedencia de los caballos de Salomón era Egipto y Kue[b][a], y los mercaderes del rey los obtenían de Kue por un precio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y desde un depósito/centro de acopio»; el hebreo מִקְוֵא es difícil y también puede entenderse como un sustantivo común en vez del nombre propio Kue.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los mercaderes del rey los comprarían de un depósito por un precio»; esto refleja la posibilidad alternativa de tomar מִקְוֵא como un lugar de reunión o acopio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמוֹצָא
  english_pob_choice: the source
  chosen_spanish: la fuente
  alternatives_spanish:
  - el origen
  - la procedencia
  - la importación
  lexicon: HALOT
  rationale: En este contexto comercial, מוֹצָא expresa la fuente o procedencia de los caballos. «La fuente» conserva la idea de origen/suministro sin añadir más de lo que el hebreo dice.
- source_word: הַסּוּסִים
  english_pob_choice: the horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - los corceles
  lexicon: HALOT
  rationale: Es el sustantivo básico y directo para סוסים; «caballos» es claro y fiel.
- source_word: לִשְׁלֹמֹה
  english_pob_choice: that belonged to Solomon
  chosen_spanish: de Salomón
  alternatives_spanish:
  - que pertenecían a Salomón
  - para Salomón
  lexicon: HALOT
  rationale: La relación poseída/genitiva se expresa naturalmente en español con «de Salomón». No fuerza una explicación más larga que el texto no exige.
- source_word: מִמִּצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar.
- source_word: וּמִקְוֵא
  english_pob_choice: and Kue
  chosen_spanish: Qué
  alternatives_spanish:
  - de Qué
  - y de Qué
  - Kue
  lexicon: HALOT
  rationale: Se sigue la lectura toponímica adoptada en el inglés POB. En español, «Qué» mantiene la referencia al nombre propio y la forma breve adecuada al flujo de la frase.
- source_word: סֹחֲרֵי הַמֶּלֶךְ
  english_pob_choice: the king’s merchants
  chosen_spanish: los mercaderes del rey
  alternatives_spanish:
  - los comerciantes del rey
  - los mercaderes reales
  lexicon: HALOT
  rationale: El participio sustantivado designa comerciantes/mercaderes. «Mercaderes» refleja bien el ámbito comercial del pasaje.
- source_word: מִקְוֵא
  english_pob_choice: from Kue
  chosen_spanish: de Qué
  alternatives_spanish:
  - desde Qué
  - de un depósito
  - de una reunión/depósito
  lexicon: HALOT
  rationale: Se mantiene la misma decisión toponímica para la segunda ocurrencia, evitando introducir una segunda interpretación no asegurada por el contexto.
- source_word: יִקְחוּ
  english_pob_choice: would obtain
  chosen_spanish: los obtenían
  alternatives_spanish:
  - los compraban
  - los tomaban
  lexicon: HALOT
  rationale: לקח en este contexto de comercio indica adquisición; «obtenían» comunica la acción sin decidir excesivamente entre tomar y comprar.
- source_word: בִּמְחִיר
  english_pob_choice: for a price
  chosen_spanish: por un precio
  alternatives_spanish:
  - a precio
  - a cambio de un precio
  lexicon: HALOT
  rationale: La frase marca transacción/compraventa. «Por un precio» es natural en español y mantiene el sentido comercial.
translation_notes:
  revision_awareness: El inglés POB revisó la redacción para hacer más fluida la relación posesiva («Solomon’s horses») y conservar «source» y «Kue». La versión española sigue esa misma decisión base, pero mantiene la tensión textual de מִקְוֵא mediante nota, porque en español también existe la ambigüedad entre topónimo y sustantivo común.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el versículo.
  - «Mercaderes» se usa como equivalente natural de un participio sustantivado comercial; no se introduce lenguaje eclesiástico.
  - La puntuación reproduce la coordinación del hebreo con una coma y punto y coma para separar las dos cláusulas principales.
