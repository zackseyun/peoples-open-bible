lexical_decisions:
- source_word: Ἐχομένως
  english_pob_choice: Next
  chosen_spanish: Luego
  alternatives_spanish:
  - Después
  - Seguidamente
  - A continuación
  lexicon: LSJ
  rationale: El adverbio marca continuidad narrativa y secuencia. «Luego» es natural en español y preserva el avance inmediato de la acción sin añadir matiz interpretativo excesivo.
- source_word: δὲ
  english_pob_choice: they
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: La partícula introduce la continuación del relato, pero en español no requiere un equivalente explícito aquí. Se integra en la fluidez de la oración sin forzar una conjunción ajena al flujo del texto.
- source_word: τὸν πέμπτον
  english_pob_choice: the fifth
  chosen_spanish: al quinto
  alternatives_spanish:
  - al quinto hermano
  - al quinto hombre
  - al quinto de ellos
  lexicon: LSJ
  rationale: Literalmente es «el quinto». En el contexto de los siete hermanos, el sustantivo está implícito; «al quinto» conserva esa economía del griego y sigue siendo comprensible en español.
- source_word: προσάγοντες
  english_pob_choice: brought forward
  chosen_spanish: trajeron
  alternatives_spanish:
  - lo hicieron avanzar
  - lo presentaron
  - lo llevaron adelante
  lexicon: BDAG
  rationale: El participio expresa que lo colocaron o acercaron para la siguiente acción. «Trajeron» es breve y natural en español; el complemento contextual «al quinto» mantiene la idea de llevarlo adelante en la secuencia narrativa.
- source_word: ᾐκίζοντο
  english_pob_choice: tortured him
  chosen_spanish: lo torturaron
  alternatives_spanish:
  - lo maltrataron
  - lo atormentaron
  - lo abusaron
  lexicon: LSJ
  rationale: El verbo denota maltrato violento y tortura física. «Lo torturaron» reproduce con claridad la fuerza del término y coincide con la revisión inglesa que prefirió una forma más concisa y natural.
theological_decisions:
- issue: La referencia implícita al quinto hermano
  english_pob_reading: Literally, 'the fifth.' The word 'brother' is implied by the context of the seven brothers.
  chosen_spanish_reading: «al quinto» deja implícito «hermano» por el contexto.
  alternative_spanish_readings:
  - al quinto hermano
  - al quinto de ellos
  rationale: No hay una dificultad doctrinal, sino una decisión de fidelidad al griego. Mantener el sustantivo implícito respeta la forma abreviada del original y la nota explica la implicación contextual.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El contexto inglés muestra una revisión reciente de «were torturing him» a «tortured him» para mayor naturalidad y concisión. La versión española sigue esa misma orientación: usa un perfecto simple en español («lo torturaron») para reflejar la acción puntual del relato sin perder la violencia del verbo griego.'
  spanish_consistency_notes:
  - Se mantiene «quinto» sin añadir «hermano» en el texto principal para conservar la estructura elíptica del griego.
  - «Torturaron» se usa como equivalente fuerte y directo de ᾐκίζοντο, coherente con el contexto martirial.
  - El estilo evita calcos innecesarios y busca una prosa bíblica clara y contemporánea, apta para lectura pública.
