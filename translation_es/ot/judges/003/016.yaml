translation:
  language: es
  text: Ehud se hizo una espada de dos filos[b], de un codo de longitud[a], y la sujetó bajo su ropa, en su muslo derecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo gomed es una medida rara y su longitud exacta es incierta; suele entenderse aproximadamente como un codo o una medida del antebrazo.
    reason: cultural_note
  - marker: b
    text: 'O: «una espada de doble filo». Literalmente: «una espada, y para ella dos filos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לּוֹ
  english_pob_choice: made himself
  chosen_spanish: se hizo
  alternatives_spanish:
  - la hizo para sí
  - se fabricó
  lexicon: עשה
  rationale: El hebreo indica que Ehud la hizo para su propio uso. «Se hizo» conserva el matiz reflexivo sin forzar una paráfrasis más amplia.
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - daga
  - arma blanca
  lexicon: חרב
  rationale: חרב es el término normal para «espada». Aunque el contexto sugiere un arma relativamente corta, el sustantivo no obliga a traducir «daga», y «espada» preserva mejor el término de base.
- source_word: וְלָהּ שְׁנֵי פֵיוֹת
  english_pob_choice: with two edges
  chosen_spanish: de dos filos
  alternatives_spanish:
  - de dos bordes
  - doble filo
  lexicon: פי
  rationale: La imagen hebrea alude literalmente a «dos bocas/filos». «De dos filos» reproduce bien la expresión idiomática en español y mantiene la fuerza imagética sin explicarla en exceso.
- source_word: גֹּמֶד אָרְכָּהּ
  english_pob_choice: a cubit in length
  chosen_spanish: de un codo de longitud
  alternatives_spanish:
  - de una medida de codo
  - de aproximadamente un codo
  lexicon: גמד
  rationale: גֹּמֶד es una medida rara e incierta. «Un codo» ofrece una equivalencia aproximada ya asentada en español, y el contexto/nota preserva la incertidumbre del original.
- source_word: וַיַּחְגֹּר אוֹתָהּ
  english_pob_choice: strapped it on
  chosen_spanish: la sujetó
  alternatives_spanish:
  - la ciñó
  - la sujetó al cuerpo
  lexicon: חגר
  rationale: חגר describe el acto de ceñir o asegurar al cuerpo. «La sujetó» funciona de manera natural en español y, junto con la ubicación, comunica la fijación del arma.
- source_word: מִתַּחַת לְמַדָּיו
  english_pob_choice: under his clothes
  chosen_spanish: bajo su ropa
  alternatives_spanish:
  - bajo su vestidura
  - debajo de su manto
  lexicon: מד
  rationale: לְמַדָּיו se refiere a la ropa/vestidura de manera general. «Bajo su ropa» es natural en español y evita especificar indebidamente el tipo de prenda.
- source_word: עַל יֶרֶךְ יְמִינוֹ
  english_pob_choice: on his right thigh
  chosen_spanish: sobre su muslo derecho
  alternatives_spanish:
  - en su muslo derecho
  - a su muslo derecho
  lexicon: ירך
  rationale: יֶרֶךְ es «muslo» o zona de la cadera. «Sobre su muslo derecho» refleja la localización física del arma con una preposición natural en español.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y conserva la misma tensión léxica que la versión inglesa POB: arma denominada «espada», aunque de longitud corta e inusual; medida rara «gomed» explicada en nota; y expresión idiomática de «dos filos» mantenida con una alternativa en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Espada» se conserva por fidelidad al sustantivo hebreo חרב; no se sustituyó por «daga» pese al contexto.
  - «De dos filos» preserva la imagen hebrea sin mecanicismo.
  - Se evitó especificar la prenda como «manto» o «túnica» porque el hebreo habla de ropa de forma general.
