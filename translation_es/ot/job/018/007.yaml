translation:
  language: es
  text: Sus pasos vigorosos[a] se ven restringidos, y su propio consejo[b] lo hace caer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus pasos fuertes se ven restringidos»; אוֹן puede significar «fuerza» o «vigor», y el verbo también puede rendirse «se estrechan» o «quedan limitados».
    reason: lexical_alternative
  - marker: b
    text: O «su propio plan lo derriba».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵצְרוּ
  english_pob_choice: are constrained
  chosen_spanish: son restringidos
  alternatives_spanish:
  - son constreñidos
  - son estrechados
  - quedan limitados
  lexicon: HALOT
  rationale: El verbo hebreo expresa la idea de que los pasos del hombre son apretados, contenidos o puestos bajo restricción. «Son restringidos» conserva la imagen de limitación sin forzar un giro demasiado idiomático.
- source_word: צַעֲדֵי
  english_pob_choice: steps
  chosen_spanish: pasos
  alternatives_spanish:
  - andares
  - huellas
  - pisadas
  lexicon: HALOT
  rationale: El sustantivo se refiere a pasos o andares; «pasos» es la equivalencia más directa y clara en español.
- source_word: אוֹנוֹ
  english_pob_choice: his vigorous
  chosen_spanish: vigorosos
  alternatives_spanish:
  - fuertes
  - enérgicos
  - de vigor
  lexicon: HALOT
  rationale: Aquí אוֹן califica los pasos como fuertes o vigorosos. «Vigorosos» conserva el matiz de fuerza activa sin introducir un sustantivo como «fuerza» que no encaja bien con «pasos».
- source_word: וְתַשְׁלִיכֵהוּ
  english_pob_choice: casts him down
  chosen_spanish: lo hace caer
  alternatives_spanish:
  - lo derriba
  - lo arroja abajo
  - lo lanza al suelo
  lexicon: HALOT
  rationale: El causativo de שלך con objeto masculino admite la idea de arrojar o derribar. En español, «lo hace caer» comunica de manera natural el resultado de ruina que el contexto exige, sin perder el valor causal.
- source_word: עֲצָתוֹ
  english_pob_choice: his own counsel
  chosen_spanish: su propio consejo
  alternatives_spanish:
  - su propio plan
  - su propia estrategia
  - su propia decisión
  lexicon: HALOT
  rationale: 'עֵצָה puede significar consejo, plan o designio. «Su propio consejo» mantiene la ironía reflexiva del hebreo: lo que él mismo ideó termina derribándolo.'
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés, manteniendo la imagen poética de pasos antes vigorosos que ahora son restringidos, y el giro irónico en que el propio consejo del impío resulta su caída. No se registraron revisiones posteriores con cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «consejo» para עֲצָה, en línea con el valor de plan/designio además de consejo.
  - Se usa una construcción verbal natural en español («lo hace caer») para conservar el causativo hebreo sin calco rígido.
  - El adjetivo «vigorosos» evita perder el matiz de fuerza de אוֹן y encaja mejor con «pasos» que una traducción nominal.
