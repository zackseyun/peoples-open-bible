base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/031/017.yaml
  text: Then my anger will burn against them on that day[a], and I will forsake them and hide my face from them, and they will be devoured, and many evils and troubles will find them. And he will say on that day[b], ‘Is it not because my God is not among me that these evils have found me?’
  footnotes:
  - marker: a
    text: Or 'they will be devoured'; literally, 'and it/he will be for eating.' The Hebrew is compressed and may express becoming vulnerable to destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my God is not in my midst.' The singular wording personifies Israel as one speaker.
    reason: lexical_alternative
