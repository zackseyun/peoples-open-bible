id: ROM.13.11
reference: Romans 13:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ τοῦτο εἰδότες τὸν καιρόν, ὅτι ὥρα ⸂ἤδη ὑμᾶς⸃ ἐξ ὕπνου ἐγερθῆναι, νῦν γὰρ ἐγγύτερον ἡμῶν ἡ σωτηρία ἢ ὅτε ἐπιστεύσαμεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/011.yaml
  text: And do this, knowing the time, that it is already the hour for you to awaken from sleep, for now our salvation is nearer than when we believed.
translation:
  language: ko
  text: 그리고 이렇게 행하십시오[a]. 때를 알고 있기 때문입니다. 곧 여러분이 잠에서 깨어날 시각이 이미 이르렀습니다. 우리가 처음 믿었을 때보다 우리의 구원이 지금 더 가까워졌기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 어떤 사본들은 「여러분이」 대신 「우리가 잠에서 깨어날 시각」으로 읽는다.
    reason: textual_variant
lexical_decisions:
- source_word: Καὶ τοῦτο
  english_pob_choice: And do this
  chosen_korean: 그리고 이렇게 행하십시오
  alternatives_korean:
  - 그리고 이것을 행하십시오
  lexicon: BDAG
  rationale: τοῦτο는 앞 단락의 윤리 권면을 회수한다. 한국어에서 명령적 함의를 명시하여 「이렇게 행하십시오」로 옮긴다.
- source_word: εἰδότες τὸν καιρόν
  english_pob_choice: knowing the time
  chosen_korean: 때를 알고 있기 때문입니다
  alternatives_korean:
  - 시기를 알고 있으므로
  lexicon: BDAG
  rationale: 분사절의 원인적 뉘앙스를 한국어 인과 종결로 자연스럽게 옮긴다. καιρός는 결정적 시기.
- source_word: ὥρα
  english_pob_choice: the hour
  chosen_korean: 시각
  alternatives_korean:
  - 때
  - 시간
  lexicon: BDAG
  rationale: 명사적 ὥρα의 절박성과 수사적 무게를 「시각」으로 살린다.
- source_word: ἤδη
  english_pob_choice: already
  chosen_korean: 이미
  lexicon: BDAG
  rationale: 절박성 강조.
- source_word: ἐξ ὕπνου ἐγερθῆναι
  english_pob_choice: to wake from sleep
  chosen_korean: 잠에서 깨어나다
  alternatives_korean:
  - 잠에서 일어나다
  lexicon: BDAG
  rationale: 부정 과거 부정사로 잠의 상태에서 벗어남을 표현. 「깨어나다」가 자연스럽다.
- source_word: ἐγγύτερον ... ἡ σωτηρία
  english_pob_choice: salvation is nearer
  chosen_korean: 구원이 더 가까워지다
  alternatives_korean:
  - 구원이 더 가깝다
  lexicon: BDAG
  rationale: 비교급 부사. 「더 가까워지다」가 종말론적 진행 의미를 살린다.
- source_word: ἢ ὅτε ἐπιστεύσαμεν
  english_pob_choice: than when we believed
  chosen_korean: 처음 믿었을 때보다
  alternatives_korean:
  - 우리가 믿었던 때보다
  lexicon: BDAG
  rationale: 한국어 자연스러움을 위해 「처음」을 보충하나, 본문은 단지 「믿었을 때」이므로 각주로 두는 대신 일반 한국 성경 관행을 따른다.
theological_decisions:
- issue: 「구원」의 시제적 차원
  chosen_reading: 「우리의 구원」으로 유지하여 이미·아직의 종말론적 긴장을 그대로 보존
  alternative_readings:
  - 우리의 최종 구원
  - 주의 재림 시의 구원
  rationale: 본문은 구원을 신자에게 이미 속한 것(「우리의」)이면서도 아직 다가오는 것(「더 가까워진」)으로 말한다. 번역은 이를 한 단계로 좁히지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장은 해소하지 말고 보존하라'
