translation:
  language: es
  text: No llamen conspiración todo lo que este pueblo llama conspiración[a], ni teman lo que ellos temen[b], ni se aterroricen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No digan: “Conspiración”, respecto de todo lo que este pueblo dice que es conspiración».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su temor»; el sufijo singular se refiere de manera colectiva a «este pueblo», por eso se traduce naturalmente «lo que ellos temen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁר / קָשֶׁר
  english_pob_choice: conspiracy
  chosen_spanish: conspiración
  alternatives_spanish:
  - complot
  - trama
  - traición
  lexicon: HALOT
  rationale: «Conspiración» conserva el valor de alianza o plan conspirativo del sustantivo hebreo y su tono político/social. Es el equivalente español más natural y mantiene el paralelismo con la advertencia contra el miedo colectivo.
- source_word: תֹאמְרוּן
  english_pob_choice: call
  chosen_spanish: llamen
  alternatives_spanish:
  - digan
  - llamen por nombre
  - afirmen
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «decir», aquí introduce un nombre o etiqueta aplicada a una realidad; en español, «llamar» expresa mejor esa fuerza predicativa que «decir».
- source_word: לְכֹל אֲשֶׁר יֹאמַר הָעָם הַזֶּה
  english_pob_choice: everything that this people calls
  chosen_spanish: de todo lo que este pueblo llama
  alternatives_spanish:
  - de todo lo que este pueblo dice
  - respecto de todo lo que este pueblo llama
  lexicon: HALOT
  rationale: La construcción hebrea requiere explicitar en español la relación objeto-complemento. «De todo lo que este pueblo llama» conserva la idea de asignar la etiqueta «conspiración» a cada cosa que el pueblo nombra así.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - estas personas
  - esta nación
  lexicon: HALOT
  rationale: «Este pueblo» reproduce la expresión marcada del hebreo y mantiene su tono colectivo y algo distante, sin suavizarlo a una formulación más neutra.
- source_word: מוֹרָאוֹ
  english_pob_choice: what they fear
  chosen_spanish: lo que ellos temen
  alternatives_spanish:
  - su temor
  - lo que se teme
  - aquello que temen
  lexicon: HALOT
  rationale: El sufijo singular hebreo puede funcionar colectivamente; en español, «lo que ellos temen» expresa con naturalidad el objeto del temor y preserva el vínculo léxico con «teman» en la cláusula paralela.
- source_word: תִּירְאוּ
  english_pob_choice: fear
  chosen_spanish: teman
  alternatives_spanish:
  - tengan miedo
  - teman de
  - les teman
  lexicon: HALOT
  rationale: «Teman» es una traducción directa y formal de ירא, y mantiene el paralelismo verbal con la palabra relacionada מוֹרָא.
- source_word: תַעֲרִיצוּ
  english_pob_choice: be in dread
  chosen_spanish: se aterroricen
  alternatives_spanish:
  - se espanten
  - tiemblen
  - sientan pavor
  lexicon: HALOT
  rationale: El verbo intensifica la idea de temor. «Se aterroricen» conserva esa gradación sin repetir simplemente «teman», y en español transmite bien el carácter enfático del hebreo.
theological_decisions:
- issue: Alcance de la prohibición sobre «conspiración» y el miedo popular
  english_pob_reading: The verse forbids God's people from adopting the populace's fearful assessment and panic.
  chosen_spanish_reading: El versículo prohíbe adoptar el diagnóstico alarmista del pueblo y compartir su miedo.
  alternative_spanish_readings:
  - El versículo prohíbe participar en una conspiración política real.
  - El versículo prohíbe temer a las personas mismas.
  rationale: La repetición de «conspiración» y los dos mandatos sobre el temor favorecen una advertencia amplia contra aceptar el marco de pánico del pueblo, sin forzar el versículo a un único referente histórico.
  doctrine_reference: Isaías 8:12; cf. Isaías 8:11-13
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al omitir un artículo innecesario antes de «conspiración» en la formulación española, manteniendo la fuerza nominal y el paralelismo del versículo. También se preservó la tensión interpretativa entre «conspiración» como etiqueta social y la posible referencia a un complot concreto.
  spanish_consistency_notes:
  - Se usó «Yahvé» cuando el texto base lo requiera en este registro, pero este versículo no contiene el nombre divino explícito.
  - Se prefirió «pueblo» para הָעָם הַזֶּה siguiendo el matiz colectivo y marcado del hebreo.
  - «Conspiración» se mantuvo como término central por consistencia con el audit trail inglés y porque evita diluir el sentido político-social.
  - 'La intensificación final se resolvió con dos verbos distintos: «teman» / «se aterroricen», para reflejar la progresión hebrea sin redundancia innecesaria.'
