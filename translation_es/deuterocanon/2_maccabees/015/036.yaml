translation:
  language: es
  text: Y todos decretaron por voto común que de ningún modo se dejara este día sin conmemoración[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin ser observado». El griego ἀπαρασήμαντον significa literalmente «sin marca» o «sin señal distintiva»; aquí se refiere al recuerdo o la observancia pública del día.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδογμάτισαν
  english_pob_choice: they decreed
  chosen_spanish: decretaron
  alternatives_spanish:
  - resolvieron
  - promulgaron
  lexicon: LSJ
  rationale: El aoristo expresa una decisión formal y pública. «Decretaron» conserva ese carácter deliberativo e institucional en español.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: LSJ
  rationale: Refuerza la unanimidad del grupo con una forma natural en español.
- source_word: μετὰ κοινοῦ ψηφίσματος
  english_pob_choice: by common vote
  chosen_spanish: por voto común
  alternatives_spanish:
  - por resolución común
  - por acuerdo unánime
  lexicon: LSJ
  rationale: La combinación de κοινοῦ y ψήφισμα apunta a una resolución tomada en conjunto mediante votación o decisión formal. «Por voto común» mantiene el sentido cívico-deliberativo y evita sobretraducir.
- source_word: μηδαμῶς
  english_pob_choice: by no means
  chosen_spanish: de ningún modo
  alternatives_spanish:
  - en ninguna manera
  - de ninguna forma
  lexicon: LSJ
  rationale: Recoge la negación enfática del adverbio griego con un equivalente idiomático y solemne.
- source_word: ἐᾶσαι
  english_pob_choice: should be left
  chosen_spanish: se dejara
  alternatives_spanish:
  - se permitiera quedar
  - se dejase
  lexicon: LSJ
  rationale: El infinitivo de permitir/dejar se vuelve naturalmente pasivo en español en esta construcción. «Se dejara» conserva la idea de dejar permanecer.
- source_word: ἀπαρασήμαντον
  english_pob_choice: unmarked
  chosen_spanish: sin señal
  alternatives_spanish:
  - sin marca
  - sin conmemoración
  - sin ser observado
  lexicon: LSJ
  rationale: El griego significa literalmente «sin marca/señal distintiva». En un día de observancia pública, «sin señal» preserva la imagen de un día no distinguido ni conmemorado, evitando estrechar el sentido solo a una observancia litúrgica.
- source_word: τήνδε τὴν ἡμέραν
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - este día mismo
  - esta jornada
  lexicon: LSJ
  rationale: El demostrativo subraya el día concreto en cuestión. «Este día» es la equivalencia más natural y fiel.
translation_notes:
  revision_awareness: Se ha conservado el carácter formal y público del decreto, y se ha mantenido la ambigüedad útil de ἀπαρασήμαντον mediante una nota que refleja las alternativas documentadas en el auditable inglés POB.
  spanish_consistency_notes:
  - Se usa «decretaron» para el verbo de decisión formal.
  - Se mantiene «voto común» como reflejo del matiz de ψήφισμα sin introducir terminología eclesiástica.
  - Se evita «Señor» u otra terminología irrelevante; el versículo no contiene vocabulario teológico explícito.
  - La nota [a] recoge la alternativa semántica entre señal, observancia y conmemoración.
