  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: no quebrantar ni una sola palabra del superior, cumplir exactamente la orden recibida, y no demorar su ejecución. Sin embargo, la apertura «Y tú también no quebrantarás» suena poco natural en español, y la combinación «cumplirás con toda exactitud como te he mandado» no reproduce de la manera más clara la intensificación de ἐπιτελῶν ἐπιτελέσεις junto con καθότι.'
  spanish_quality_summary: El texto es mayormente claro y fiel, pero necesita un ajuste menor de naturalidad y fluidez. «Tampoco quebrantarás» expresa mejor καὶ σὺ δὲ οὐ. «Cumplirás plenamente, exactamente como te he mandado» suena más idiomático y distingue mejor entre el énfasis verbal y la correspondencia precisa de la orden. El resto es legible y digno.
  glossary_alignment: No hay conflicto con la terminología del proyecto. κύριος se refiere correctamente a un superior humano, por lo que «tu señor» es aceptable en este contexto. No aparecen términos doctrinales sensibles que exijan nota.
  issues:
  - severity: medium
    issue: 'Inicio poco natural: «Y tú también no quebrantarás»'
    rationale: Aunque calca el orden del griego, en español neutro suena torpe. «Y tú tampoco quebrantarás» o simplemente «Tampoco quebrantarás» preserva el contraste/adición de καὶ σὺ δὲ de forma más idiomática.
  - severity: medium
    issue: Distribución mejorable del énfasis entre ἐπιτελῶν ἐπιτελέσεις y καθότι
    rationale: «Cumplirás con toda exactitud como te he mandado» concentra demasiado el matiz de exactitud en la primera cláusula. El griego intensifica primero el cumplimiento mismo y luego añade «exactamente como te he mandado».
  - severity: low
    issue: «No tardarás en hacerlas» es correcto pero algo débil
    rationale: Es una traducción válida de οὐ μακρυνεῖς τοῦ ποιῆσαι αὐτά. No requiere cambio obligatorio, pero conviene mantenerla dentro de una redacción más fluida.
  revised_spanish_text: Y tú tampoco quebrantarás ni una sola de las palabras de tu señor, sino que las cumplirás plenamente, exactamente como te he mandado, y no tardarás en hacerlas.
