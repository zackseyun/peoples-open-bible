review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo y del POB inglés: «Todos ellos», «adúlteros», «como un horno», y el tramo temporal desde el amasado hasta el leudado/fermentación. Sin embargo, «que deja de revolver» no preserva con suficiente claridad la relación del verbo difícil מֵעִיר con el cuidado del horno; en español «revolver» se asocia más naturalmente con la masa que con el horno, lo que puede desviar la imagen. También conviene ajustar «desde que se amasa la masa» para evitar redundancia y acercarse más a «from the kneading of the dough».'
  spanish_quality_summary: El texto es legible y digno, pero «deja de revolver» suena poco natural con «horno», y «desde que se amasa la masa» resulta repetitivo. Una reparación menor mejora claridad e idiomaticidad sin apartarse del hebreo ni del audit trail.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Adúlteros» conserva correctamente la carga léxica sin expandirla teológicamente. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión sobre חֻמְצָתוֹ puede mantenerse como «fermentación», aunque «leudado» también sería posible; no requiere cambio.
  issues:
  - severity: medium
    issue: «deja de revolver» aplicado al horno es ambiguo y poco idiomático
    rationale: El hebreo מֵעִיר es difícil, pero el POB inglés documenta «stirring / stoking / tending». En español, «revolver» se entiende sobre todo de mezclar una sustancia, no de avivar o atender un horno; puede inducir a pensar en la masa en vez del fuego.
  - severity: low
    issue: «desde que se amasa la masa» es redundante
    rationale: Aunque comprensible, repite innecesariamente la idea de masa/amasado. «Desde el amasado de la masa» o «desde que se amasa» sería más limpio; dado que בָּצֵק está expreso, conviene conservarlo una sola vez con formulación más natural.
  revised_spanish_text: Todos ellos son adúlteros[a], como un horno encendido por un panadero[b][c], que deja de avivarlo desde el amasado de la masa hasta su fermentación.
  revised_footnotes:
  - marker: a
    text: O «ardiente» en lugar de «encendido». El participio hebreo puede subrayar el calor activo del horno.
    reason: lexical_alternative
  - marker: b
    text: O «que deja de atizarlo» o «que cesa de atenderlo». El verbo hebreo es difícil en este contexto y puede referirse a que el panadero pausa su cuidado del horno.
    reason: lexical_alternative
  - marker: c
    text: O «hasta que fermenta» o «hasta que leuda». El hebreo probablemente alude al proceso de fermentación o leudado de la masa.
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor: sustituye «revolver» por «avivarlo», que encaja mejor con el horno y preserva la nota léxica del verbo difícil; además, cambia «desde que se amasa la masa» por «desde el amasado de la masa» para eliminar redundancia y reflejar mejor el sintagma hebreo temporal.'
