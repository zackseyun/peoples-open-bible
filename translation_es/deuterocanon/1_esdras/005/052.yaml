base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/052.yaml
  text: And all who had vowed a vow to God began[a], from the new moon of the first month, to offer sacrifices to God[b], though the temple of God had not yet been built.
  footnotes:
  - marker: a
    text: Or, more literally, 'and the temple of God was not yet built.' The English main text uses 'though' to bring out the likely concessive sense of the Greek coordination.
    reason: lexical_alternative
  - marker: b
    text: The parallel Hebrew text in Ezra differs here, speaking of the Feast of Booths and the prescribed daily burnt offerings. 1 Esdras preserves a distinct Greek wording, which is followed in the main text.
    reason: cross_reference
