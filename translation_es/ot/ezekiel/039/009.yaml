review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia principal del hebreo: los habitantes salen, usan las armas como combustible, se enumeran varios tipos de armas, y las usan para fuego durante siete años. Sin embargo, omite la nota léxica importante sobre la dificultad de וְהִשִּׂיקוּ / la cláusula instrumental, presente en el audit trail inglés, y añade una traducción menos natural en español en la duplicación ''harán fuego ... y las quemarán''.'
  spanish_quality_summary: 'El texto es mayormente claro, pero ''harán fuego'' suena algo poco idiomático en español bíblico natural; ''encenderán fuego'' o ''harán hogueras'' sería más natural. Además, ''bastón de mano'' es comprensible pero demasiado literal y débil en contexto militar; ''garrote de mano'' preserva mejor la fuerza marcial con apoyo de nota. También hay un problema formal: la nota [a] se ancla dos veces a dos palabras distintas, lo cual contradice la instrucción de no reutilizar un marcador para dos notas/anclajes distintos en el mismo registro.'
  glossary_alignment: No hay términos teológicos de proyecto involucrados aquí. La distinción entre מָגֵן y צִנָּה se preserva correctamente. 'Lanza' para רֹמַח es buena. Conviene alinear mejor מַקֵּל יָד con el rationale del POB ('hand-club') mediante 'garrote de mano' o equivalente, y conservar en nota la alternativa más literal.
  issues:
  - severity: medium
    issue: Marcador de nota [a] reutilizado en dos lugares del texto
    rationale: Las instrucciones requieren marcadores únicos en orden; el mismo marcador no debe anclarse a dos palabras distintas dentro del mismo registro.
  - severity: medium
    issue: Falta la nota léxica correspondiente a la dificultad de la cláusula verbal sobre 'hacer fuego con las armas'
    rationale: El audit trail inglés conserva una nota significativa sobre el valor difícil de וְהִשִּׂיקוּ / la expresión 'kindle with the weapons'; el español debería preservarla para fidelidad editorial.
  - severity: low
    issue: '''Harán fuego'' suena menos natural en español que ''encenderán fuego'''
    rationale: Aunque entendible, la formulación resulta algo calcada; una opción más idiomática mejora la legibilidad sin perder sentido.
  - severity: medium
    issue: '''Bastón de mano'' debilita el contexto militar de מַקֵּל יָד'
    rationale: En esta lista de armas, 'garrote de mano' comunica mejor un arma portátil y se alinea más estrechamente con 'hand-club' del POB.
