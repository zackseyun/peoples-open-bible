translation:
  language: es
  text: Si no cuidas de poner por obra todas las palabras de esta ley, escritas en este libro[a][b][c], para temer este glorioso y temible nombre—Yahvé tu Dios—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “rollo” en vez de “libro”.
    reason: lexical_alternative
  - marker: b
    text: O “para reverenciar este glorioso y temible nombre”. El verbo hebreo puede incluir tanto reverencia como temor.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: “YHWH”; tradicionalmente se traduce “el SEÑOR”.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִשְׁמֹר לַעֲשׂוֹת
  english_pob_choice: are not careful to do
  chosen_spanish: no cuidas de poner por obra
  alternatives_spanish:
  - no observas para hacer
  - no te guardas de hacer
  - no procuras hacer
  lexicon: HALOT
  rationale: שמר + infinitivo de עשׂה expresa la idea de guardar con atención para obedecer. 'No cuidas de poner por obra' conserva el matiz de diligencia y la obediencia práctica sin sonar forzado en español.
- source_word: כָּל דִּבְרֵי הַתּוֹרָה הַזֹּאת
  english_pob_choice: all the words of this law
  chosen_spanish: todas las palabras de esta ley
  alternatives_spanish:
  - todas las palabras de esta instrucción
  - todos los mandatos de esta ley
  lexicon: HALOT
  rationale: דִּבְרֵי es literalmente 'palabras de', y תּוֹרָה aquí se refiere al cuerpo legal del pacto. 'Ley' mantiene mejor el alcance covenantal-legal que 'instrucción' en este contexto.
- source_word: הַכְּתוּבִים בַּסֵּפֶר הַזֶּה
  english_pob_choice: that are written in this book
  chosen_spanish: escritas en este libro
  alternatives_spanish:
  - escritas en este rollo
  - registradas en este libro
  lexicon: HALOT
  rationale: El participio pasivo concuerda con 'palabras' y describe su condición de texto fijado por escrito. 'Libro' es la opción idiomática en español, aunque 'rollo' sigue siendo una alternativa posible en nota.
- source_word: לְיִרְאָה
  english_pob_choice: to fear
  chosen_spanish: para temer
  alternatives_spanish:
  - para reverenciar
  - con el fin de temer
  lexicon: HALOT
  rationale: Se conserva 'temer' porque el verbo incluye tanto reverencia como temor y el contexto del pacto mantiene esa tensión teológica. 'Reverenciar' suaviza demasiado el peso del término.
- source_word: הַשֵּׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre
  - el nombre
  lexicon: HALOT
  rationale: El objeto del temor se expresa como 'el nombre', una forma reverencial de hablar de la identidad revelada de Dios. En español se mantiene 'nombre' para no diluir el sentido.
- source_word: הַנִּכְבָּד וְהַנּוֹרָא
  english_pob_choice: glorious and awesome
  chosen_spanish: glorioso y temible
  alternatives_spanish:
  - glorioso y asombroso
  - honroso y temible
  - venerable y terrible
  lexicon: HALOT
  rationale: נכבד comunica gloria, honor y peso; נורא comunica temor y sobrecogimiento. 'Glorioso y temible' conserva ambas dimensiones con naturalidad en español. "Awesome" en inglés se resuelve mejor aquí con 'temible' por el contexto de yir'ah.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se usa 'Yahvé' conforme al criterio del proyecto para el Tetragrámaton, preservando el nombre propio del pacto en lugar de la sustitución tradicional por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - tu Dios del pacto
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se expresa directamente con 'tu'. 'Tu Dios' mantiene la relación pactual implícita sin añadir elementos no presentes en el hebreo.
theological_decisions:
- issue: Cómo rendir la combinación de temor y reverencia en ירא
  english_pob_reading: to fear
  chosen_spanish_reading: para temer
  alternative_spanish_readings:
  - para reverenciar
  - para temer con reverencia
  rationale: La lectura de la POB conserva 'fear' porque el texto une obediencia pactual con temor reverente y sobrecogedor. En español, 'temer' preserva esa tensión mejor que una sola palabra más suave.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
- issue: Cómo traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; se conserva como nombre propio transliterado. 'Yahvé' corresponde al estándar del proyecto para evitar la sustitución por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se revisó el encaje con el hebreo masorético y con la audición inglesa: la POB mantiene la tensión entre obediencia cuidadosa, temor reverente y el nombre divino. No se detectaron revisiones necesarias respecto del último pase; se conserva la decisión de traducir el Tetragrámaton como Yahvé y de mantener ''temer'' en lugar de suavizarlo a ''reverenciar''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יְהוָה en todo el proyecto.
  - Se conserva 'ley' para תּוֹרָה en este contexto de pacto, no 'instrucción'.
  - '''Libro'' se usa como equivalente idiomático de סֵפֶר, con la posibilidad de ''rollo'' indicada en nota.'
  - '''Temer'' preserva el campo semántico completo de ירא sin borrar la dimensión de reverencia.'
  - La puntuación con raya final sigue el ritmo del inglés POB y deja abierta la aposición final 'Yahvé tu Dios'.
