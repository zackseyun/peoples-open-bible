translation:
  language: es
  text: 'Y él les dijo: «¿Qué aconsejan ustedes, para que respondamos a este pueblo que vino a hablarme, diciendo: “Aligera el yugo[a] que tu padre puso sobre nosotros”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la carga». El hebreo dice literalmente «desde el yugo», conservando la imagen de un yugo como metáfora de trabajo o gobierno opresivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵהֶם
  english_pob_choice: And he said to them
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y les dijo
  lexicon: HALOT
  rationale: El hebreo narra con una forma consecutiva simple; en español, «Y él les dijo» conserva el flujo narrativo sin añadir matices inexistentes.
- source_word: מָה אַתֶּם נוֹעָצִים
  english_pob_choice: What do you advise
  chosen_spanish: ¿Qué consejo dan ustedes?
  alternatives_spanish:
  - ¿Qué me aconsejan ustedes?
  - ¿Qué opinan ustedes?
  lexicon: HALOT
  rationale: נוֹעָצִים expresa consulta/consejo. «Dan consejo» conserva el sustantivo implícito y suena natural en español; el pronombre explícito ayuda a evitar ambigüedad del interlocutor plural.
- source_word: וְנָשִׁיב דָּבָר
  english_pob_choice: so that we may answer
  chosen_spanish: para que respondamos
  alternatives_spanish:
  - y respondamos
  - para que demos respuesta
  lexicon: HALOT
  rationale: El giro hebreo combina retorno de palabra con finalidad. «Para que respondamos» transmite la intención de producir una respuesta sin forzar una calca como «devolver una palabra».
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo
  - esta gente
  lexicon: HALOT
  rationale: «Pueblo» reproduce el singular colectivo hebreo con dignidad narrativa mejor que un plural español.
- source_word: דִּבְּרוּ אֵלַי
  english_pob_choice: have spoken to me
  chosen_spanish: me ha hablado
  alternatives_spanish:
  - me hablaron
  - han hablado conmigo
  lexicon: HALOT
  rationale: El perfecto hebreo en discurso referido se puede verter con presente perfecto español para conectar la acción previa con la deliberación actual, como en la traducción inglesa auditada.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - así
  lexicon: HALOT
  rationale: Introduce de manera directa el contenido de la petición; «diciendo» mantiene la función quotativa.
- source_word: הָקֵל
  english_pob_choice: Lighten
  chosen_spanish: Aligera
  alternatives_spanish:
  - Haz más ligero
  - Atenúa
  lexicon: HALOT
  rationale: El hifil de קלל aquí pide hacer más liviana una carga. «Aligera» conserva el mandato y funciona de forma idiomática en español.
- source_word: מִן הָעֹל
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - la carga
  - el peso
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del yugo, que el propio audit trail inglés retuvo por su fuerza metafórica de opresión y trabajo impuesto.
- source_word: נָתַן ... עָלֵינוּ
  english_pob_choice: put on us
  chosen_spanish: puso sobre nosotros
  alternatives_spanish:
  - colocó sobre nosotros
  - echó sobre nosotros
  lexicon: HALOT
  rationale: La combinación expresa imposición de una carga. «Puso sobre nosotros» es claro y respeta el verbo de imposición sin sobre-interpretar.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu progenitor
  - el padre de ti
  lexicon: HALOT
  rationale: Correspondencia directa del posesivo en discurso dirigido a Roboam.
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que todo marcador de nota aparezca exactamente en el texto español. La nota[a] está anclada en «dijo[a]» y la nota[b] en «yugo[b]».
  spanish_consistency_notes:
  - Se preserva el singular colectivo «pueblo» para reflejar el hebreo.
  - Se mantiene «yugo» como imagen metafórica principal, en línea con el audit trail inglés.
  - Se optó por un español bíblico claro y no arcaizante, evitando calcos como «devolver una palabra».
