review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura exhortativa del hebreo y conserva correctamente los referentes principales: el desierto, sus ciudades, Quedar, Sela y el clamor desde los montes. También preserva la nota léxica sobre סֶלַע como posible sustantivo común. Sin embargo, hay un desajuste importante en מֵרֹאשׁ הָרִים: el hebreo y el POB inglés están en plural (''from the tops of the mountains''), mientras que el español dice ''desde la cumbre de los montes'', que singulariza indebidamente la imagen. Conviene también suavizar la sintaxis inicial para que la personificación suene más natural en español.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. ''Quedar'' corresponde al uso español habitual para Kedar. ''Aldeas'' es aceptable para חֲצֵרִים, y ''canten con júbilo'' / ''griten'' funcionan bien. La apertura ''¡Levanten su voz el desierto y sus ciudades!'' es comprensible, pero en español suena más natural con verbo en subjuntivo exhortativo inicial: ''Que alcen su voz...'' o ''Alcen su voz...''. La corrección principal necesaria es pasar ''la cumbre'' a plural para concordar con ''los montes'' y con el hebreo.'
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. No aparecen términos sensibles como Yahvé, Mesías, espíritu, etc. Se mantiene el topónimo 'Sela' con nota alternativa adecuada. 'Quedar' es una forma española aceptable del nombre propio.
  issues:
  - severity: medium
    issue: La frase 'desde la cumbre de los montes' singulariza una expresión plural hebrea.
    rationale: מֵרֹאשׁ הָרִים significa 'desde las cimas/las cumbres de los montes' o 'desde lo alto de los montes'. El singular 'la cumbre' reduce la imagen distributiva/plural presente en el original y en el audit trail inglés.
  - severity: low
    issue: La apertura '¡Levanten su voz el desierto y sus ciudades!' suena algo forzada en español.
    rationale: Aunque semánticamente correcta, la personificación se expresa con mayor naturalidad en español bíblico moderno como 'Que alcen su voz el desierto y sus ciudades', conservando mejor el valor exhortativo del yusivo hebreo sin sonar abrupto.
  revised_spanish_text: Que alcen su voz[a] el desierto y sus ciudades, las aldeas donde habita Quedar; canten con júbilo los habitantes de Sela; griten desde las cumbres de los montes.
  revised_footnotes:
  - marker: a
    text: 'O: «los habitantes de la roca», si סֶלַע se toma como sustantivo común y no como el nombre propio Sela.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la exhortación inicial a una forma más natural en español ('Que alcen su voz') y se corrige el plural espacial del hebreo en la última frase ('desde las cumbres de los montes'). Se conserva la nota léxica sobre Sela/la roca y el resto del contenido fiel al original.
