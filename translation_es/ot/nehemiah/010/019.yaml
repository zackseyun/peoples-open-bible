lexical_decisions:
- source_word: הוֹדִיָּה
  english_pob_choice: Hodiah
  chosen_spanish: Hodías
  alternatives_spanish:
  - Hodías
  - Hodijá
  lexicon: HNp
  rationale: Es un nombre propio hebreo (HNp), por lo que se translitera en lugar de traducirse. En español, 'Hodías' conserva la forma reconocible del nombre y adapta la terminación a una escritura natural para lectores hispanohablantes; 'Hodijá' reflejaría más directamente el elemento final hebreo, pero suena menos establecida.
- source_word: חָשֻׁם
  english_pob_choice: Hashum
  chosen_spanish: Jasum
  alternatives_spanish:
  - Jasum
  - Hashum
  lexicon: HNp
  rationale: Nombre propio (HNp). En español bíblico es común representar la jota para un sonido aspirado inicial, por lo que 'Jasum' resulta más natural y legible que mantener la h muda inglesa 'Hashum'.
- source_word: בֵּצָי
  english_pob_choice: Bezai
  chosen_spanish: Bezai
  alternatives_spanish:
  - Bezai
  - Bezay
  lexicon: HNp
  rationale: Nombre propio (HNp). Se conserva la transliteración convencional, ya suficientemente reconocible en español, sin intentar una precisión fonética que alteraría el nombre establecido.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran acuerdo alto y no presentan variantes textuales o decisiones teológicas adicionales; por eso el español mantiene una simple lista de nombres propios, con una nota solo para la alternancia de transliteración del primer nombre.
  spanish_consistency_notes:
  - Se mantuvo el orden de los tres nombres tal como aparece en el hebreo y en la POB inglesa.
  - No se añadieron elementos explicativos al texto principal, porque el verso es una lista nominal breve.
  - La única nota reproduce la alternativa de transliteración documentada por la POB inglesa, adaptada al español.
