    text: Or 'the Assyrian' in the final clause; the Hebrew can personify Assyria as the invading enemy.
    reason: alternative_reading
  - marker: b
    text: Or 'in its gates'; Hebrew 'at its entrances/openings.'
    reason: lexical_alternative
