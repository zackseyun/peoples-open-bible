translation:
  language: es
  text: Sus piernas eran rectas, y las plantas de sus pies eran como la planta del pie de un ternero[a], y resplandecían como el aspecto del bronce bruñido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «como la pezuña de un ternero». El hebreo dice más literalmente «como la planta del pie de un ternero».
    reason: lexical_alternative
  - marker: b
    text: O «bronce pulido».
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלֵיהֶם
  english_pob_choice: their legs
  chosen_spanish: sus piernas
  alternatives_spanish:
  - sus pies
  lexicon: HALOT
  rationale: En español, "piernas" conserva la distinción que hace el POB entre las extremidades superiores de apoyo y las "plantas de sus pies" mencionadas después. "Pies" aquí borraría esa diferencia anatómica del hebreo y del inglés auditado.
- source_word: רֶגֶל יְשָׁרָה
  english_pob_choice: were straight
  chosen_spanish: eran rectas
  alternatives_spanish:
  - eran derechas
  - eran erguídas
  lexicon: HALOT
  rationale: El adjetivo describe la forma de las piernas de manera simple y directa. "Rectas" reproduce bien el sentido descriptivo sin añadir connotaciones posturales no exigidas por el texto.
- source_word: כַּף רַגְלֵיהֶם
  english_pob_choice: the soles of their feet
  chosen_spanish: las plantas de sus pies
  alternatives_spanish:
  - las palmas de sus pies
  - la planta de sus pies
  lexicon: HALOT
  rationale: '"Planta" es el equivalente natural en español para la parte inferior del pie. Mantiene el paralelismo con el POB y evita una expresión menos idiomática como "soles".'
- source_word: כְּכַף רֶגֶל עֵגֶל
  english_pob_choice: like the sole of a calf’s foot
  chosen_spanish: como la planta del pie de un ternero
  alternatives_spanish:
  - como la pezuña de un ternero
  - como la planta del pie de un becerro
  lexicon: HALOT
  rationale: El hebreo compara literalmente con la "planta" de un pie de ternero; no reduce de entrada la imagen a "pezuña". "Ternero" comunica bien la edad del animal en español y conserva la concreción anatómica del original.
- source_word: וְנֹצְצִים
  english_pob_choice: they gleamed
  chosen_spanish: resplandecían
  alternatives_spanish:
  - brillaban
  - centelleaban
  lexicon: HALOT
  rationale: El participio expresa un brillo vivo, visible. "Resplandecían" mantiene el valor visual y la dignidad del lenguaje profético/visionario.
- source_word: כְּעֵין
  english_pob_choice: like the appearance of
  chosen_spanish: como el aspecto de
  alternatives_spanish:
  - como la apariencia de
  - como el semblante de
  lexicon: HALOT
  rationale: En esta construcción, עַיִן tiene el sentido de apariencia o aspecto. "Aspecto" suena natural en español y conserva la distancia comparativa del hebreo.
- source_word: נְחֹשֶׁת קָלָל
  english_pob_choice: polished bronze
  chosen_spanish: bronce bruñido
  alternatives_spanish:
  - bronce pulido
  - bronce abrillantado
  - cobre bruñido
  lexicon: HALOT
  rationale: '"Bronce" es el equivalente bíblico más usual en español para נְחֹשֶׁת en imágenes metálicas. "Bruñido" refleja bien la idea de un metal trabajado para brillar, y preserva la alternativa inglesa "burnished bronze".'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios sustantivos; la formulación española conserva la distinción anatómica del hebreo y la imagen metálica final con la misma fuerza visual.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando aparece explícitamente el nombre divino; este versículo no lo contiene.
  - Se conserva la distinción entre "piernas" y "plantas de sus pies" para no perder la estructura descriptiva del original.
  - '"Bronce bruñido" se usa como equivalente natural y dignificado de la imagen metálica final, en línea con la preferencia del proyecto por términos transparentes.'
