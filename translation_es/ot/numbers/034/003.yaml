translation:
  language: es
  text: Y será para ustedes el lado sur desde el desierto de Zin, al lado de Edom[a]; y será para ustedes el límite sur desde el extremo del Mar de la Sal[b] hacia el oriente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "junto a Edom".'
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, "Mar Muerto"; o "desde el borde/extremo del Mar de la Sal".
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּאַת
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - borde
  - costado
  lexicon: HALOT
  rationale: En descripciones territoriales, el término señala un lado o flanco de la región. "Lado" comunica bien la idea espacial sin volverlo geométrico ni técnico en exceso.
- source_word: נֶגֶב
  english_pob_choice: southern / south
  chosen_spanish: sur / lado sur / límite sur
  alternatives_spanish:
  - Negev
  lexicon: HALOT
  rationale: Aquí funciona de manera direccional dentro de una fórmula de fronteras, no como nombre propio de la región del Négueb. Por eso se traduce con sentido direccional.
- source_word: מִמִּדְבַּר צִן
  english_pob_choice: from the wilderness of Zin
  chosen_spanish: desde el desierto de Zin
  alternatives_spanish:
  - desde el desierto de Sin
  lexicon: HALOT
  rationale: '"מִדְבָּר" puede ser "desierto" o "desierto/estepa"; en español bíblico, "desierto" es claro y digno. Se conserva Zin como nombre propio.'
- source_word: עַל יְדֵי אֱדוֹם
  english_pob_choice: along the side of Edom
  chosen_spanish: junto a Edom
  alternatives_spanish:
  - al lado de Edom
  - junto al lado de Edom
  - a lo largo de Edom
  lexicon: HALOT
  rationale: El hebreo expresa proximidad/adyacencia geográfica. "Junto a" es natural en español y conserva la relación espacial sin imponer una lectura más formal de línea fronteriza.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En contexto de repartición territorial, "límite" es una forma natural y precisa en español para la línea demarcadora.
- source_word: מִקְצֵה יָם הַמֶּלַח
  english_pob_choice: from the end of the Salt Sea
  chosen_spanish: desde el extremo del Mar de la Sal
  alternatives_spanish:
  - desde el borde del Mar de la Sal
  - desde la extremidad del Mar de la Sal
  lexicon: HALOT
  rationale: '"קָצֶה" indica extremo o punto terminal. Se conserva el nombre literal "Mar de la Sal" siguiendo la primacía del texto hebreo.'
- source_word: יָם הַמֶּלַח
  english_pob_choice: the Salt Sea
  chosen_spanish: Mar de la Sal
  alternatives_spanish:
  - Mar Muerto
  lexicon: HALOT
  rationale: Se mantiene el topónimo literal del hebreo, siguiendo la preferencia del POB por la forma transparente antes que la equivalencia tradicional interpretativa.
- source_word: קֵדְמָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: La dirección se expresa de forma idiomática y sobria en español bíblico moderno. "Hacia el oriente" conserva la orientación sin perder solemnidad.
- source_word: וְהָיָה לָכֶם
  english_pob_choice: shall be
  chosen_spanish: será para ustedes
  alternatives_spanish:
  - les corresponderá
  - habrá para ustedes
  lexicon: HALOT
  rationale: La fórmula legal-descriptiva del hebreo se vierte de manera directa y formal. "Será para ustedes" preserva la estructura sin añadir matices interpretativos.
theological_decisions:
- issue: Topónimo tradicional vs. forma literal en el nombre del mar
  english_pob_reading: the Salt Sea rather than 'the Dead Sea'
  chosen_spanish_reading: Mar de la Sal en lugar de 'Mar Muerto'
  alternative_spanish_readings:
  - Mar Muerto
  rationale: Se sigue la primacía del nombre hebreo literal para evitar una equivalencia tradicional que no está en el texto fuente. Esto mantiene la transparencia del POB.
  doctrine_reference: Principio de traducción transparente / primacía del texto fuente
translation_notes:
  revision_awareness: 'La redacción española se ajusta a la revisión del POB inglés que prefirió mantener ''shall be'' con consistencia formal. Por eso se conserva una estructura repetida y legal: ''será para ustedes ... y será para ustedes ...'', sin introducir un verbo de movimiento como ''corresponderá'' o ''se extenderá''.'
  spanish_consistency_notes:
  - Se mantuvo 'Mar de la Sal' para reflejar el hebreo יָם הַמֶּלַח y la política POB de primacía del término literal.
  - Se evitó 'Negev' como nombre propio porque aquí נֶגֶב es direccional.
  - Se usó 'lado sur' y 'límite sur' para reproducir el paralelismo de la cláusula hebrea.
  - Las notas al pie están ancladas explícitamente en el texto con [a] y [b].
