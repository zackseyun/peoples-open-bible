review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia y el sentido básico del hebreo: Moisés puso el חֹשֶׁן sobre Aarón y puso dentro de él el Urim y el Tumim. También preserva bien la transliteración de los términos rituales inciertos. Sin embargo, el anclaje y contenido de las notas no siguen fielmente la auditoría inglesa ni las normas del proyecto: la nota sobre Urim/Tumim está anclada solo a Tumim y la nota léxica sobre חֹשֶׁן aparece dos veces con el mismo marcador.'
  spanish_quality_summary: El español es claro y natural en general. 'Pectoral' es una buena elección para חֹשֶׁן. No obstante, la puntuación de notas en el texto está mal distribuida, y conviene hispanizar completamente la nota explicativa en lugar de dejarla en inglés. La frase principal solo requiere un ajuste menor de marcadores; el resto es plenamente legible.
  glossary_alignment: 'Alineado con la terminología del proyecto en lo principal: no hay nombres divinos ni términos mesiánicos en este versículo; חֹשֶׁן -> ''pectoral'' está bien motivado; אוּרִים / תֻּמִּים se conservan por transliteración, lo cual coincide con la decisión teológica auditada. Para mayor fidelidad al inglés auditado, la nota cultural debe abarcar ambos términos como conjunto y no solo ''Tumim''.'
  issues:
  - severity: medium
    issue: Reutilización incorrecta del marcador [a] para dos anclajes distintos del mismo tipo.
    rationale: Las instrucciones exigen marcadores únicos por nota dentro del registro. Si una sola nota cubre ambas ocurrencias de 'pectoral', no debe duplicarse el marcador; y si se ancla dos veces, requeriría marcadores distintos, lo cual tampoco refleja la auditoría inglesa.
  - severity: medium
    issue: La nota cultural [b] está anclada solo a 'Tumim' en lugar de al conjunto 'Urim y Tumim'.
    rationale: La decisión auditada trata ambos términos como una pareja ritual tradicionalmente transliterada. En español, el marcador debe colocarse en una posición que abarque el conjunto, no solo el segundo elemento.
  - severity: low
    issue: Las notas están en inglés en un borrador español.
    rationale: Aunque el contenido conceptual es correcto, la revisión española debe entregar notas legibles en español.
  revised_spanish_text: Y colocó sobre él el pectoral[a], y puso en el pectoral los Urim y los Tumim[b].
  revised_footnotes:
