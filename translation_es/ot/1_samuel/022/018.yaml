translation:
  language: es
  text: 'Entonces el rey dijo a Doeg[a]: «Vuélvete y derriba a los sacerdotes». Así que Doeg el edomita se volvió y derribó a los sacerdotes, y aquel día dio muerte a ochenta y cinco hombres que vestían un efod de lino.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ataca a los sacerdotes» o «cae sobre los sacerdotes». El verbo hebreo puede denotar agresión violenta de manera más amplia; se eligió «derriba» para reflejar mejor la fuerza del contexto de ejecución sin confundirlo con el verbo posterior de resultado, «dio muerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  english_pob_choice: Then the king said
  chosen_spanish: Entonces el rey dijo
  alternatives_spanish:
  - Y el rey dijo
  - Luego el rey dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» transmite bien la secuencia en español sin volverlo pesado. «Dijo» es el equivalente natural de וַיֹּאמֶר.
- source_word: סֹב
  english_pob_choice: turn
  chosen_spanish: da la vuelta
  alternatives_spanish:
  - vuélvete
  - gira
  lexicon: HALOT
  rationale: El imperativo aquí prepara la acción inmediata de atacar. «Da la vuelta» conserva el movimiento dirigido a la tarea y suena natural en español contemporáneo.
- source_word: וּפְגַע / וַיִּפְגַּע
  english_pob_choice: strike down
  chosen_spanish: ataca
  alternatives_spanish:
  - cae sobre
  - golpea
  - arremete contra
  lexicon: HALOT
  rationale: פגע puede abarcar encuentro violento, ataque o golpe. En este contexto de ejecución ordenada, «ataca» preserva la violencia sin anticipar demasiado el resultado verbal posterior de «dio muerte».
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes oficiante
  - los presbíteros
  lexicon: HALOT
  rationale: Es la designación directa del grupo. «Sacerdotes» es la equivalencia clara y estándar en español.
- source_word: הָאֲדֹמִי
  english_pob_choice: the Edomite
  chosen_spanish: el edomita
  alternatives_spanish:
  - el de Edom
  lexicon: HALOT
  rationale: El gentilicio identifica a Doeg por su origen. «Edomita» mantiene la forma adjetival habitual en español bíblico.
- source_word: וַיָּמֶת
  english_pob_choice: he put to death
  chosen_spanish: dio muerte
  alternatives_spanish:
  - mató
  - dio muerte a
  lexicon: HALOT
  rationale: El hifil de מות expresa causar la muerte. «Dio muerte» conserva el valor causativo y distingue este resumen final del verbo anterior de agresión.
- source_word: שְׁמֹנִים וַחֲמִשָּׁה אִישׁ
  english_pob_choice: eighty-five men
  chosen_spanish: ochenta y cinco hombres
  alternatives_spanish:
  - ochenta y cinco personas
  lexicon: HALOT
  rationale: אִישׁ con numeral se traduce naturalmente como «hombres» en este contexto de sacerdotes varones. Mantiene la referencia personal y el tono narrativo.
- source_word: נֹשֵׂא אֵפ֥וֹד בָּד
  english_pob_choice: who wore a linen ephod
  chosen_spanish: que llevaban un efod de lino
  alternatives_spanish:
  - que vestían un efod de lino
  - portadores de un efod de lino
  lexicon: HALOT
  rationale: נשא aplicado a una prenda puede significar llevarla puesta. «Llevaban» es natural en español y conserva la idea de portar/usar una vestidura sacerdotal. «Efod de lino» refleja בָּד sin añadir más de lo que el texto dice.
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa auditada, incorporando la revisión que eliminó el pronombre enfático innecesario y manteniendo la separación entre el mandato violento inicial y el resumen final de la matanza.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia divina.
  - Se prefirió «sacerdotes» y no una variante eclesiástica más marcada, porque el hebreo nombra directamente el oficio cultual.
  - «Efod de lino» conserva el objeto sacerdotal sin explicarlo más allá de lo que el hebreo especifica.
  - La nota textual en el marcador [a] mantiene la alternativa semántica del verbo para no borrar la tensión entre agresión y ejecución.
