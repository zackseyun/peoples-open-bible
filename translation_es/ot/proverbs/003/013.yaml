revisions:
- from: Bienaventurado[a] el hombre que halla sabiduría, y el hombre que obtiene entendimiento.
  to: Bienaventurado es el hombre[a] que halla sabiduría, y el hombre que obtiene entendimiento.
  rationale: Se añade «es» para completar la fórmula de bienaventuranza en español y se mueve la nota al pie a «hombre», que es el término realmente aclarado por la nota. No se requieren cambios léxicos mayores.
