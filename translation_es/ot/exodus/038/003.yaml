translation:
  language: es
  text: 'Hizo todos los utensilios del altar: las ollas[a], las palas, los cuencos, los garfios y los braseros. Hizo todos sus utensilios de bronce[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo traducido aquí como «ollas» puede referirse de modo más específico a recipientes usados para retirar cenizas.
    reason: lexical_alternative
  - marker: b
    text: O «cobre» para «bronce».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי הַמִּזְבֵּחַ
  english_pob_choice: the utensils of the altar
  chosen_spanish: los utensilios del altar
  alternatives_spanish:
  - los vasos del altar
  - los implementos del altar
  - los artículos del altar
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para equipo, instrumentos o recipientes. «Utensilios» mantiene esa amplitud en español y funciona bien en una lista de objetos del servicio del altar.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar del holocausto
  lexicon: HALOT
  rationale: Es el equivalente normal y directo de מִזְבֵּחַ en este contexto cultual.
- source_word: הַסִּירֹת
  english_pob_choice: the pots
  chosen_spanish: las ollas
  alternatives_spanish:
  - los recipientes
  - las vasijas
  lexicon: HALOT
  rationale: El hebreo nombra recipientes tipo olla; «ollas» es natural en español y conserva la referencia general sin añadir precisión no explicitada por el texto inmediato. La nota permite la alternativa léxica de material/uso si se quiere matizar.
- source_word: הַיָּעִים
  english_pob_choice: the shovels
  chosen_spanish: las palas
  alternatives_spanish:
  - las cucharas
  - las paletas
  lexicon: HALOT
  rationale: יָעִים designa una herramienta para recoger o retirar; «palas» expresa bien esa función en español y suena más natural que una traducción demasiado técnica.
- source_word: הַמִּזְרָקֹת
  english_pob_choice: the basins
  chosen_spanish: los tazones
  alternatives_spanish:
  - las vasijas
  - los cuencos
  lexicon: HALOT
  rationale: Aunque «basins» puede ser «lavatorios» o «fuentes» en otros contextos, aquí se trata de recipientes para el uso ritual; «tazones» comunica la forma de recipiente sin forzar una imagen doméstica excesiva.
- source_word: הַמִּזְלָגֹת
  english_pob_choice: the forks
  chosen_spanish: los garfios
  alternatives_spanish:
  - los tenedores
  - los ganchos
  lexicon: HALOT
  rationale: En contexto del altar, este término se refiere a implementos de dos o más puntas; «garfios» preserva el matiz funcional de herramienta cultual mejor que «tenedores», que suena anacrónico y doméstico.
- source_word: הַמַּחְתֹּת
  english_pob_choice: the firepans
  chosen_spanish: los braseros
  alternatives_spanish:
  - los incensarios
  - los carbones
  lexicon: HALOT
  rationale: מַחְתָּה es un recipiente para brasas/fuego. «Braseros» transmite la idea de un recipiente para carbón ardiente de modo claro para el lector español, manteniendo la función cultual.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus implementos
  lexicon: HALOT
  rationale: El sufijo remite al altar; repetir «utensilios» da continuidad léxica y hace explícita la referencia posesiva en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En el mobiliario del tabernáculo, «bronce» es la equivalencia más estable y transparente en español; «cobre» sigue siendo posible, pero suele resultar menos preciso para este contexto.
- source_word: וַיַּעַשׂ ... עָשָׂה
  english_pob_choice: He made ... He made
  chosen_spanish: Hizo ... Hizo
  alternatives_spanish:
  - Y hizo ... hizo
  - Fabricó ... hizo
  lexicon: HALOT
  rationale: 'Se conserva la repetición verbal del hebreo para reflejar la estructura del versículo: una introducción narrativa y una recapitulación final. «Hizo» es la forma más directa y fiel en español.'
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantiene una doble ocurrencia de עשה y prefiere «bronze» con nota alternativa «copper». También conserva una nota léxica para הַסִּירֹת como posible referencia a recipientes para retirar cenizas. La presente versión española sigue esas decisiones: conserva la repetición verbal, usa «bronce» con nota de alternativa material, y mantiene una nota para el matiz funcional de הַמַּחְתֹּת sin añadir precisión no explicitada por el texto.'
  spanish_consistency_notes:
  - Se mantiene «utensilios» para כְּלִי a lo largo del versículo.
  - Se evita traducir todo el inventario con un solo campo semántico cerrado, porque el hebreo enumera piezas específicas pero de uso amplio.
  - «Bronce» se usa de forma consistente con la terminología del tabernáculo en español.
  - La repetición de «Hizo ... Hizo» reproduce el paralelismo del hebreo sin alisarlo excesivamente.
