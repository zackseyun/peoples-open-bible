translation:
  language: es
  text: Y todos ellos conspiraron juntos para venir a pelear contra Jerusalén y para causar confusión[a] en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desorden» o «trastorno» en ella. El sustantivo hebreo puede denotar confusión, disturbio o desarreglo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ
  english_pob_choice: conspired
  chosen_spanish: se conspiraron
  alternatives_spanish:
  - se confabularon
  - tramaron juntos
  - se aliaron
  lexicon: HALOT
  rationale: El verbo קשר en este contexto expresa una unión hostil y coordinada; «se conspiraron» conserva ese sentido de trama colectiva con intención adversa.
- source_word: כֻלָּם
  english_pob_choice: all of them
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos de ellos
  lexicon: HALOT
  rationale: El hebreo enfatiza la totalidad del grupo; «todos» mantiene esa fuerza sin recargar el español.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - unidos
  lexicon: HALOT
  rationale: El adverbio refuerza la acción coordinada; «juntos» es natural en español y conserva la idea colectiva.
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: para venir
  alternatives_spanish:
  - para llegar
  - para acercarse
  lexicon: HALOT
  rationale: Se conserva el verbo de movimiento del hebreo antes de la acción bélica. «Venir» refleja la dirección hacia Jerusalén sin sustituirlo por un verbo más interpretativo.
- source_word: לְהִלָּחֵם
  english_pob_choice: fight against
  chosen_spanish: a pelear contra
  alternatives_spanish:
  - a combatir contra
  - a guerrear contra
  lexicon: HALOT
  rationale: El nifal de לחם indica entrar en combate; «pelear contra» comunica claramente la hostilidad sin intensificarlo a «hacer guerra».
- source_word: בִּירוּשָׁלָם
  english_pob_choice: against Jerusalem
  chosen_spanish: contra Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es locativa, en este contexto de ataque la equivalencia idiomática en español es «contra Jerusalén», preservando el blanco de la agresión.
- source_word: וְלַעֲשׂוֹת
  english_pob_choice: and to cause
  chosen_spanish: y para causar
  alternatives_spanish:
  - y para producir
  - y para provocar
  lexicon: HALOT
  rationale: Con el sustantivo siguiente, עשה funciona como verbo causativo de resultado; «causar» expresa bien la producción de un estado o efecto.
- source_word: לוֹ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en él
  - allí
  lexicon: HALOT
  rationale: El pronombre hebreo es masculino singular, pero el referente es Jerusalén como ciudad en español femenino; «en ella» mantiene la referencia locativa y la concordancia natural en español.
- source_word: תּוֹעָה
  english_pob_choice: confusion
  chosen_spanish: confusión
  alternatives_spanish:
  - desorden
  - trastorno
  - desbarajuste
  lexicon: HALOT
  rationale: El sustantivo puede abarcar confusión, desorden o disarray; en este contexto militar y opositor, «confusión» reproduce bien el objetivo de perturbar la obra sin añadir matices no explícitos.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con la lectura auditada del POB en inglés, manteniendo la secuencia verbal, el sujeto totalizante y la ambigüedad léxica de תּוֹעָה mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo exige explícitamente; este versículo no contiene el Tetragrámaton.
  - Se mantiene «Jerusalén» con artículo implícito y concordancia femenina en el pronombre por claridad natural en español.
  - Se conserva el paralelismo de dos infinitivos finales mediante «para venir» / «y para causar».
