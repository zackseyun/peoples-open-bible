translation:
  language: es
  text: ¡Bendito sea Yahvé[a], que no nos ha entregado como presa a sus dientes!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Bendito es Yahvé!». La fórmula hebrea de bendición también puede verterse así, aunque «¡Bendito sea Yahvé!» preserva mejor la fuerza doxológica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - ¡Bendito es!
  - ¡Alabado sea!
  lexicon: HALOT
  rationale: La fórmula hebrea es una bendición doxológica. En español, «¡Bendito sea!» conserva mejor ese valor exhortativo/benedictorio que «¡Bendito es!», que suena más descriptivo y menos litúrgico. «¡Alabado sea!» desplaza el campo léxico de bendición a alabanza explícita.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la terminología POB en español. «Yahvé» mantiene el Tetragrámaton sin sustituirlo por un título. «el SEÑOR» sería una sustitución tradicional, y «Jehová» no es la forma preferida del proyecto.
- source_word: שֶׁלֹּא
  english_pob_choice: who has not
  chosen_spanish: que no
  alternatives_spanish:
  - quien no ha
  - el cual no ha
  lexicon: HALOT
  rationale: La relativa introducida por שֶׁלֹּא se expresa de manera natural en español con «que no». Mantiene la relación directa con la bendición y no fuerza una construcción más pesada.
- source_word: נְתָנוּ
  english_pob_choice: has not given us
  chosen_spanish: no nos ha entregado
  alternatives_spanish:
  - no nos ha dado
  - no nos ha dejado
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», el contexto con «presa» y «dientes» pide en español un verbo que preserve la idea de entregar a la muerte o al poder del enemigo. «Entregar» conserva mejor la fuerza contextual sin introducir una paráfrasis excesiva. «No nos ha dado» es demasiado débil; «no nos ha dejado» no refleja el acto verbal de entrega.
- source_word: טֶרֶף
  english_pob_choice: prey
  chosen_spanish: presa
  alternatives_spanish:
  - presa de caza
  - alimento
  lexicon: HALOT
  rationale: «Presa» reproduce bien la imagen de un animal capturado o devorado y funciona naturalmente con «dientes». «Alimento» debilita la metáfora, y «presa de caza» añade una especificación innecesaria.
- source_word: לְשִׁנֵּיהֶם
  english_pob_choice: to their teeth
  chosen_spanish: a sus dientes
  alternatives_spanish:
  - a sus muelas
  - para sus dientes
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de los dientes como instrumento de desgarro. En español, «a sus dientes» es directo y claro; «para sus dientes» suena menos idiomático en este contexto.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton y el POB inglés lo vierte como «Yahweh». En español, «Yahvé» es el equivalente consistente con la decisión del proyecto de no ocultar el nombre divino bajo un título. Se evita «el SEÑOR» por ser una sustitución, y «Jehová» por no ser la forma adoptada por el POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza benedictoria de la fórmula inicial
  english_pob_reading: Blessed be Yahweh
  chosen_spanish_reading: ¡Bendito sea Yahvé!
  alternative_spanish_readings:
  - ¡Bendito es Yahvé!
  - ¡Alabado sea Yahvé!
  rationale: La construcción expresa una bendición proclamada, no solo una afirmación descriptiva. «Sea» reproduce mejor la fuerza jussiva/benedictoria de la fórmula hebrea y la opción inglesa auditada.
  doctrine_reference: 'Poética bíblica: fórmulas doxológicas'
translation_notes:
  revision_awareness: 'El pasaje coincide con el cotejo inglés más reciente y no requiere revisiones sustantivas; la versión española sigue el mismo perfil de decisión: mantener el nombre divino, conservar la metáfora de presa/dientes y reflejar la fórmula benedictoria con una construcción jussiva natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política POB en español para יהוה.
  - «Presa» y «dientes» conservan la imagen animal sin suavizarla.
  - La puntuación exclamativa refleja el carácter doxológico del versículo.
  - No se introducen términos eclesiásticos tradicionales que oculten el nombre divino o atenúen la metáfora.
