translation:
  language: es
  text: Les daré un corazón para que me conozcan[a], que yo soy Yahvé; y ellos serán mi pueblo, y yo seré su Dios, porque volverán a mí con todo su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que sepan que yo soy Yahvé». El hebreo también puede entenderse de modo que «que yo soy Yahvé» exprese el contenido de lo que llegarán a conocer.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y yo les daré
  alternatives_spanish:
  - Y les daré
  - Y yo daré
  lexicon: HALOT
  rationale: El perfecto profético con waw-consecutiva expresa promesa futura. En español, el futuro simple conserva bien el valor promisor. Se añade «yo» para mantener el énfasis verbal del hebreo y la claridad del sujeto.
- source_word: לֵב
  english_pob_choice: a heart
  chosen_spanish: un corazón
  alternatives_spanish:
  - el corazón
  - entendimiento
  lexicon: HALOT
  rationale: לֵב designa la interioridad, no solo la emoción. «Un corazón» conserva la metáfora bíblica y evita reducirla a mera comprensión intelectual.
- source_word: לָדַעַת אֹתִי
  english_pob_choice: to know me
  chosen_spanish: para que me conozcan
  alternatives_spanish:
  - para conocerme
  - para que me reconozcan
  lexicon: HALOT
  rationale: 'El infinitivo de propósito pide una finalidad: el corazón dado capacita para conocer a Dios. «Para que me conozcan» comunica bien el propósito relacional y mantiene el plural referido a «ellos».'
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy el Señor
  - porque yo soy Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé» conforme a la norma del proyecto. Aquí כִּי introduce el contenido de lo que han de conocer, por eso se traduce «que». Se mantiene «yo» para reflejar la autodeclaración enfática.
- source_word: וְהָיוּ לִי לְעָם
  english_pob_choice: and they will be my people
  chosen_spanish: y ellos serán mi pueblo
  alternatives_spanish:
  - y serán para mí un pueblo
  - y llegarán a ser mi pueblo
  lexicon: HALOT
  rationale: La fórmula pactal se mantiene en forma natural y readable. «Mi pueblo» preserva la relación de pertenencia del pacto sin explicitar más de lo que el hebreo dice.
- source_word: וְאָנֹכִי אֶהְיֶה לָהֶם לֵאלֹהִים
  english_pob_choice: and I will be their God
  chosen_spanish: y yo seré para ellos Dios
  alternatives_spanish:
  - y seré su Dios
  - y yo seré su Dios
  lexicon: HALOT
  rationale: Se conserva la asimetría hebrea «seré para ellos Dios» para no suavizar la fórmula de pacto. «Dios» corresponde a אֱלֹהִים y mantiene el paralelismo con la primera cláusula.
- source_word: כִּי יָשֻׁבוּ אֵלַי
  english_pob_choice: for they will return to me
  chosen_spanish: porque se volverán a mí
  alternatives_spanish:
  - porque volverán a mí
  - pues regresarán a mí
  lexicon: HALOT
  rationale: שׁוּב puede ser «volver» o «regresar». «Volverse a mí» conserva el sentido de retorno relacional y suena natural en español bíblico contemporáneo. Se usa «porque» para el valor causal del כִּי final.
- source_word: בְּכָל לִבָּם
  english_pob_choice: with all their heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con todo el corazón
  lexicon: HALOT
  rationale: La expresión idiomática española más fiel y natural es «con todo su corazón». Mantiene el valor integral del hebreo sin perder legibilidad.
theological_decisions:
- issue: 'Fórmula de pacto: «mi pueblo» / «Dios»'
  english_pob_reading: Retain the reciprocal covenant expression 'they will be my people, and I will be their God' in familiar form.
  chosen_spanish_reading: Conservar «ellos serán mi pueblo, y yo seré para ellos Dios» como fórmula recíproca de pacto.
  alternative_spanish_readings:
  - serán mi pueblo, y yo seré su Dios
  - serán para mí un pueblo, y yo seré su Dios
  rationale: Jeremías usa una fórmula de pacto central en la teología bíblica. La versión elegida preserva el paralelismo y la relación de pertenencia sin introducir una glosa interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Conocimiento de Yahvé
  english_pob_reading: Render as relational-covenantal knowledge rather than mere intellectual recognition.
  chosen_spanish_reading: Traducir «para que me conozcan» como conocimiento relacional y de pacto.
  alternative_spanish_readings:
  - para que reconozcan que yo soy Yahvé
  - para que sepan que yo soy Yahvé
  rationale: En Jeremías, «conocer» a Yahvé implica relación leal, no solo información correcta. La formulación directa preserva esa profundidad sin explicarla en exceso.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nombre divino יְהוָה
  english_pob_reading: The divine name יְהוָה is rendered 'the LORD' in the main text according to project style.
  chosen_spanish_reading: Render יְהוָה como «Yahvé» en el texto principal.
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El proyecto pide no enmascarar el Tetragrámaton con un sustituto litúrgico. «Yahvé» preserva el nombre propio divino y sigue la política terminológica indicada.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: El texto base muestra alta concordancia y no registra revisiones aplicadas; esta propuesta sigue el cierre de revisión más reciente sin cambios sustantivos, respetando el audit trail inglés y las decisiones léxicas ya aprobadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la fórmula de pacto con «mi pueblo» y «Dios» sin sustituirla por paráfrasis devocional.
  - «Corazón» traduce לֵב con valor antropológico integral, no solo emocional.
  - La nota a cubre la ambigüedad de «para que me conozcan / que yo soy Yahvé»; la nota b cubre la alternancia volver/retornar del verbo שׁוּב.
