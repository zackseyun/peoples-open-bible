review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: finalidad («para que»), temor de Yahvé, obediencia a estatutos y mandamientos, mención explícita de tres generaciones, duración de la vida y prolongación de los días. Sin embargo, hay ajustes necesarios para alinearse plenamente con el texto fuente y con el rastro POB: el texto principal usa «Yahvé» en las decisiones léxicas pero la línea española dice «Yahvé» correctamente; conviene mejorar la sintaxis de «guardando» con una coma y evitar la puntuación forzada con dos puntos. Además, «el hijo de tu hijo» es fiel pero menos natural; «tu nieto» puede ir en texto con nota para preservar la literalidad que el inglés también documenta. También es preferible «se prolonguen» a «se alarguen» por registro bíblico-natural en español.'
  spanish_quality_summary: 'La base es legible, pero suena algo rígida por la puntuación («: tú, y tu hijo...»), la repetición de comas y la expresión «el hijo de tu hijo» en el cuerpo principal. «Temas» es adecuado; «guardando» también. La revisión propuesta mejora fluidez y dignidad sin perder precisión. Se corrigen además pequeños problemas de calidad en el trasfondo léxico (por ejemplo, alternativas mal formadas como «reverencies»), aunque eso no afecta directamente el texto bíblico final.'
  glossary_alignment: 'Se preserva la terminología del proyecto: יהוה → «Yahvé»; אֱלֹהֶיךָ → «tu Dios»; חֻקֹּתָיו / מִצְוֺתָיו → «sus estatutos / sus mandamientos»; ירא → «temas». La revisión mantiene estas decisiones y añade una nota para conservar la alternativa literal «tu hijo y el hijo de tu hijo», en línea con la nota inglesa.'
  issues:
  - severity: medium
    issue: 'Puntuación poco natural en «que yo te mando: tú, y tu hijo, y el hijo de tu hijo»'
    rationale: El hebreo marca énfasis/aposición, no una explicación formal con dos puntos. En español resulta más natural un inciso con raya o comas sin sobrecargar la frase.
  - severity: medium
    issue: «el hijo de tu hijo» en el texto principal suena rígido
    rationale: Aunque es muy literal, el inglés POB eligió «grandson» en el texto y conservó la literalidad en nota. En español, «tu nieto» ofrece mejor legibilidad; la literalidad puede preservarse en nota.
  - severity: low
    issue: «tus días se alarguen» es menos idiomático que «tus días se prolonguen»
    rationale: Ambas opciones son posibles, pero «se prolonguen» refleja mejor el registro bíblico-natural y la elección inglesa «may be prolonged».
  - severity: low
    issue: Falta de nota para la formulación literal de tres generaciones
    rationale: El rastro POB inglés preserva esta alternativa. En español conviene mantenerla porque el texto revisado usará «tu nieto» por naturalidad.
  revised_spanish_text: 'para que temas a Yahvé tu Dios[a], guardando todos sus estatutos y sus mandamientos que yo te mando: tú, tu hijo y tu nieto[b], todos los días de tu vida, y para que tus días se prolonguen.'
  revised_footnotes:
  - marker: a
    text: O «reverencies a Yahvé tu Dios». El verbo hebreo puede incluir reverencia y asombro además de temor.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tú, tu hijo y el hijo de tu hijo».
    reason: lexical_alternative
  - marker: c
    text: O «tus días sean largos».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar la naturalidad y la fidelidad funcional al rastro POB: se mantiene «temas» y «Yahvé», se usa «tu nieto» en el texto principal con nota literal para conservar la explicitud del hebreo, y se cambia «se alarguen» por «se prolonguen». También hace falta ajustar la puntuación; idealmente el inciso enfático debería ir con raya, no con dos puntos. Nótese además que, si se conserva la nota c, su marcador debe anclarse en el texto. Por consistencia completa, el texto final debería llevar ese anclaje.'
