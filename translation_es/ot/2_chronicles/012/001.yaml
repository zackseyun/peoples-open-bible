translation:
  language: es
  text: Y cuando el reino de Roboam quedó establecido, y él se había fortalecido, abandonó la ley de Yahvé[a]—y todo Israel con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la instrucción de Yahvé». El hebreo תּוֹרָה puede significar «ley» o «instrucción», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Y aconteció que cuando
  - Cuando
  lexicon: HALOT
  rationale: La función narrativa temporal se conserva de forma natural en español con «Y cuando», sin añadir una fórmula más pesada que el hebreo no exige.
- source_word: כְּהָכִין מַלְכ֤וּת רְחַבְעָם
  english_pob_choice: Rehoboam’s kingdom was established
  chosen_spanish: el reino de Roboam estuvo establecido
  alternatives_spanish:
  - el reino de Roboam fue establecido
  - el reino de Roboam quedó establecido
  - la realeza de Roboam fue establecida
  lexicon: HALOT
  rationale: «Estuvo establecido» preserva el valor de consolidación/afianzamiento del estado del reino y evita forzar una voz pasiva más rígida en español.
- source_word: וּכְחֶזְקָתוֹ
  english_pob_choice: and he had become strong
  chosen_spanish: y cuando él se había fortalecido
  alternatives_spanish:
  - y cuando estaba fuerte
  - y cuando se había hecho fuerte
  - y al fortalecerse
  lexicon: HALOT
  rationale: La forma verbal comunica el cambio de estado de Roboam y mantiene el matiz temporal-circunstancial del hebreo.
- source_word: עָזַב
  english_pob_choice: abandoned
  chosen_spanish: abandonó
  alternatives_spanish:
  - desamparó
  - dejó
  - desertó
  lexicon: HALOT
  rationale: «Abandonó» comunica la ruptura covenantal con fuerza suficiente en español contemporáneo, sin arcaísmo.
- source_word: תּוֹרַת יְהוָה
  english_pob_choice: the law of Yahweh
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la instrucción de Yahvé
  - la Torá de Yahvé
  - la ley del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el término por defecto «Yahvé» para el Nombre divino y se usa «ley» como equivalente principal de תּוֹרָה en este contexto histórico-covenantal, según el audit trail en inglés.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  english_pob_choice: and all Israel with him
  chosen_spanish: y con él, todo Israel
  alternatives_spanish:
  - y todo Israel con él
  - y todo Israel junto con él
  - y todo Israel estaba con él
  lexicon: HALOT
  rationale: La colocación «con él, todo Israel» reproduce la elipsis del hebreo y mantiene la lectura amplia de «Israel» sin restringirla interpretativamente.
theological_decisions:
- issue: Sentido de תּוֹרָה en este contexto
  english_pob_reading: Or 'the instruction of the LORD.' The Hebrew torah can mean 'law' or 'instruction,' depending on context.
  chosen_spanish_reading: «la ley de Yahvé» con nota de alternativa «instrucción»
  alternative_spanish_readings:
  - la instrucción de Yahvé
  - la Torá de Yahvé
  rationale: En este pasaje histórico-covenantal, «ley» es la lectura más clara y consistente con la tradición de traducción auditada, pero se preserva la alternativa semántica para no borrar la amplitud de תּוֹרָה.
  doctrine_reference: Preservar la tensión léxica del original sin resolverla de forma dogmática.
- issue: Alcance de «todo Israel» en el contexto del reino dividido
  english_pob_reading: Rendered as 'all Israel' without narrowing it to Judah alone.
  chosen_spanish_reading: «todo Israel» sin limitarlo a Judá
  alternative_spanish_readings:
  - todo Judá
  - todo su pueblo
  rationale: Se conserva el sintagma hebreo tal como está, evitando una armonización histórica que el texto no realiza.
  doctrine_reference: Primacía del texto original sobre la interpretación armonizadora en la traducción.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail en inglés y el hebreo base. No se detectaron revisiones aplicadas en el expediente, y se mantuvo la decisión de traducir תּוֹרָה con «ley» en el texto principal, junto con la alternativa semántica en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Nombre divino.
  - Se conserva «Israel» sin restringirlo a Judá, siguiendo la decisión teológica auditada.
  - La puntuación con raya larga ayuda a reflejar la clausula añadida del hebreo sin sobrecargar la sintaxis española.
  - Se usa un estilo bíblico contemporáneo y sobrio, evitando calcos innecesarios.
