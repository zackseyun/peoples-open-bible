    issue: El topónimo הַמּוֹרֶה se tradujo como 'More' en vez de 'Moreh'.
    rationale: El inglés auditado usa 'Moreh', y el hebreo termina con ה. 'More' parece una forma truncada y puede percibirse como error onomástico.
