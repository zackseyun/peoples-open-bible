translation:
  language: es
  text: cuando yo los haga volver de entre los pueblos y los reúna de las tierras de sus enemigos[a], y seré reconocido como santo por medio de ellos ante los ojos de muchas naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: ''y seré santificado en ellos'' o ''y seré tenido por santo en ellos''. El sentido es que la santidad de Yahvé se muestra públicamente por lo que él hace con ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוֹבְבִי
  english_pob_choice: when I bring them back
  chosen_spanish: cuando yo los haga volver
  alternatives_spanish:
  - cuando los restaure
  - cuando yo los vuelva a traer
  lexicon: HALOT
  rationale: 'El hebreo usa el causativo de שוב con valor temporal: ''cuando haga volver''. En español, ''hacer volver'' comunica el acto de retorno del exilio sin introducir una paráfrasis más interpretativa como ''restaurar''.'
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - de entre los pueblos
  lexicon: HALOT
  rationale: Se conserva la distinción lexical frente a גוים del cierre del versículo. 'Entre los pueblos' refleja el origen de la dispersión y suena natural en español.
- source_word: וְקִבַּצְתִּי
  english_pob_choice: and gather
  chosen_spanish: y los reúna
  alternatives_spanish:
  - y los juntaré
  - y los congregue
  lexicon: HALOT
  rationale: קבץ significa 'reunir, juntar'. Aquí la coordinación temporal en español funciona mejor con subjuntivo anticipado tras 'cuando', manteniendo el valor secuencial del hebreo.
- source_word: מֵאַרְצוֹת אֹיְבֵיהֶם
  english_pob_choice: from the lands of their enemies
  chosen_spanish: de las tierras de sus enemigos
  alternatives_spanish:
  - de las tierras de sus adversarios
  - de los países de sus enemigos
  lexicon: HALOT
  rationale: ארצות es plural y literal 'tierras'. 'Tierras de sus enemigos' preserva la relación genitiva sin forzar 'países', que sería más moderno pero menos general.
- source_word: וְנִקְדַּשְׁתִּי בָם
  english_pob_choice: and I am shown holy through them
  chosen_spanish: y seré mostrado santo por medio de ellos
  alternatives_spanish:
  - y seré santificado en ellos
  - y se mostrará mi santidad por medio de ellos
  lexicon: HALOT
  rationale: Se mantiene la tensión entre pasivo/reflexivo y manifestación pública de la santidad divina. 'Seré mostrado santo' conserva el sentido de ser exhibido como santo, sin diluir la pasiva hebrea ni sugerir cambio intrínseco en Dios.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a la vista de
  - delante de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica visibilidad pública. 'Ante los ojos de' preserva la imagen y encaja con el registro bíblico formal.
- source_word: הַגּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - las muchas naciones
  - numerosas naciones
  lexicon: HALOT
  rationale: גוים se traduce como 'naciones' en sentido internacional. 'Muchas naciones' reproduce bien el adjetivo y mantiene la distinción con 'pueblos'.
theological_decisions:
- issue: Cómo renderizar וְנִקְדַּשְׁתִּי בָם sin borrar la pasiva/reflexiva hebrea
  english_pob_reading: I am shown holy through them
  chosen_spanish_reading: seré mostrado santo por medio de ellos
  alternative_spanish_readings:
  - seré santificado en ellos
  - se mostrará mi santidad por medio de ellos
  rationale: El hebreo expresa que la santidad de Yahvé se manifiesta públicamente en su acción con Israel. La forma elegida conserva la pasiva reflexiva y evita sugerir que Dios se vuelve más santo o que el sujeto humano causa esa santidad.
  doctrine_reference: Santidad divina; vindicación pública del nombre de Yahvé; cf. Ezequiel 39:27.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó la cláusula final de 'I show myself holy through them' a 'I am shown holy through them' para reflejar mejor el matiz pasivo/reflexivo del hebreo. La redacción española procura conservar esa misma tensión sin perder claridad.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito en la forma verbal sin introducir el título en el texto, conforme al versículo fuente y al estilo del proyecto.
  - '''pueblos'' y ''naciones'' se diferenciaron deliberadamente para reflejar la distinción hebrea entre עמים y גוים.'
  - La cláusula final usa una pasiva formal para no suavizar la fuerza teológica del hebreo.
  - Se evitó 'siendo santificado' por sonar menos natural en este contexto y porque 'seré mostrado santo' comunica mejor la manifestación pública requerida.
