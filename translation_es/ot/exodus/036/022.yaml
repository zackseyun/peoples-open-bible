translation:
  language: es
  text: Dos espigas para cada tabla[a], unidas una a otra[b]; así hizo todas las tablas del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'manos' para יָדֹת; el hebreo usa la palabra común para 'manos' de manera metafórica para las salientes de ensamblaje de cada tabla.
    reason: lexical_alternative
  - marker: b
    text: O 'unidas una frente a otra', destacando la alineación correspondiente de las dos espigas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי
  english_pob_choice: two
  chosen_spanish: Dos
  alternatives_spanish:
  - Dos (en vez de 'Hay dos')
  lexicon: HALOT
  rationale: El hebreo abre con un numeral directo; en español conviene conservar la estructura nominal breve sin añadir un verbo existencial.
- source_word: יָדֹת
  english_pob_choice: tenons
  chosen_spanish: espigas de unión
  alternatives_spanish:
  - tenones
  - manos
  - peines de unión
  lexicon: HALOT
  rationale: El término hebreo significa literalmente 'manos', pero aquí designa las salientes de ensamblaje de la tabla. 'Espigas de unión' comunica la función constructiva sin depender de un tecnicismo poco natural para el lector general.
- source_word: קֶּרֶשׁ
  english_pob_choice: board
  chosen_spanish: tabla
  alternatives_spanish:
  - tabla
  - tabla de madera
  - panel
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el elemento estructural es mejor expresado en español como 'tabla', que es claro y fiel al objeto físico.
- source_word: מְשֻׁלָּבֹת
  english_pob_choice: joined
  chosen_spanish: enlazadas
  alternatives_spanish:
  - unidas
  - encajadas
  - ensambladas
  lexicon: HALOT
  rationale: El participio pasivo describe piezas ajustadas entre sí; 'enlazadas' conserva la idea de acoplamiento recíproco sin exagerar la técnica del ensamblaje.
- source_word: אַחַת אֶל אֶחָת
  english_pob_choice: one to another
  chosen_spanish: una con otra
  alternatives_spanish:
  - una a otra
  - una frente a otra
  - una con la otra
  lexicon: HALOT
  rationale: La expresión hebrea indica correspondencia mutua. 'Una con otra' mantiene esa relación sin fijar innecesariamente una geometría particular.
- source_word: כֵּן
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de la misma manera
  lexicon: HALOT
  rationale: Marca la manera en que se realizó la obra en todas las tablas; 'así' es la equivalencia directa y natural en español.
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: El verbo hebreo es el verbo común de hacer; en una descripción artesanal, 'hizo' conserva la sencillez del original.
- source_word: קַרְשֵׁי
  english_pob_choice: boards
  chosen_spanish: tablas
  alternatives_spanish:
  - tablas
  - piezas
  - tablones
  lexicon: HALOT
  rationale: Se mantiene la misma palabra base para el elemento estructural, evitando variación innecesaria.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - el tabernáculo
  - la morada
  - la tienda de reunión
  lexicon: HALOT
  rationale: '''Tabernáculo'' es la equivalencia establecida para esta estructura sagrada y resulta transparente para el lector bíblico en español.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la línea editorial inglesa revisada, que eliminó cualquier verbo existencial añadido. También conserva la relación recíproca de las dos piezas de unión y el cierre general de toda la serie de tablas del tabernáculo.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se usa 'tabernáculo' de forma consistente con la terminología bíblica habitual y con el audit trail inglés.
  - Se prefirió 'tabla' para קֶרֶשׁ por claridad en español, manteniendo el sentido estructural del pasaje.
