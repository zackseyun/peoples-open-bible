translation:
  language: es
  text: Tú[a], oh rey, eres el rey de reyes, a quien el Dios del cielo ha dado el reino, la fuerza, el poder y la gloria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Tú mismo», para reforzar el valor enfático del pronombre.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el honor» o «el esplendor» para «la gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֣נְתְּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente en segunda persona masculina singular expresa un адресamento directo. En español, «Tú» conserva el trato directo; el vocativo se refuerza con «oh rey».
- source_word: מַלְכָּ֔/א
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El sustantivo determinado en contexto de apelación directa funciona como vocativo. «Oh rey» es natural y dignificado en español bíblico sin ser arcaizante en exceso.
- source_word: מֶ֖לֶךְ מַלְכַיָּ֑/א
  english_pob_choice: the king of kings
  chosen_spanish: el rey de reyes
  alternatives_spanish:
  - rey sobre reyes
  - gran rey
  lexicon: HALOT
  rationale: La cadena constructa expresa un título superlativo real. «El rey de reyes» reproduce con fidelidad y naturalidad la estructura y el énfasis del hebreo/aramaico.
- source_word: דִּ֚י
  english_pob_choice: to whom
  chosen_spanish: a quien
  alternatives_spanish:
  - para quien
  - porque
  lexicon: HALOT
  rationale: La partícula relativa introduce la cláusula del verbo «ha dado». En español, «a quien» expresa mejor el objeto indirecto de «ha dado» que una versión más literal pero menos natural.
- source_word: אֱלָ֣הּ שְׁמַיָּ֔/א
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios de los cielos
  - Dios del cielo
  lexicon: HALOT
  rationale: El título es un hebraísmo/aramaísmo bíblico bien establecido. «El Dios del cielo» preserva el título con buena inteligibilidad en español y sin cambiar el referente divino.
- source_word: מַלְכוּתָ֥/א
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el gobierno
  - la realeza
  lexicon: HALOT
  rationale: En este contexto, el término designa la realidad regia otorgada por Dios. «El reino» es la equivalencia más directa y amplia en español.
- source_word: חִסְנָ֛/א
  english_pob_choice: the might
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la potencia
  lexicon: HALOT
  rationale: El término denota fuerza/might en sentido regio. Aunque el inglés distinguió «might» de «power», en español «el poder» aquí comunica con naturalidad una capacidad efectiva y soberana; «la fuerza» queda reservada para el siguiente término para mantener la distinción semántica.
- source_word: וְ/תָקְפָּ֥/א
  english_pob_choice: the power
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el poder
  - la autoridad
  lexicon: HALOT
  rationale: El término añade vigor, capacidad o potencia. Para no repetir «poder» dos veces y conservar el paralelismo, «la fuerza» comunica adecuadamente la noción de energía/fortaleza activa en español.
- source_word: וִֽ/יקָרָ֖/א
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - el esplendor
  lexicon: HALOT
  rationale: El campo semántico incluye honor, gloria y esplendor. «La gloria» es la opción bíblica más natural en español y mantiene el tono elevado del pasaje.
- source_word: יְהַב לָֽ/ךְ
  english_pob_choice: has given ... to you
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  - te ha dado
  lexicon: HALOT
  rationale: El perfecto arameo expresa una acción completada con vigencia actual. En español, el perfecto compuesto «ha dado» preserva ese valor; el complemento indirecto ya está expresado con «a quien» y el destinatario implícito en el contexto.
theological_decisions:
- issue: Origen de la autoridad y la grandeza reales de Nabucodonosor
  english_pob_reading: Nebuchadnezzar's kingdom and royal greatness are presented as gifts from the God of heaven.
  chosen_spanish_reading: El reino, el poder, la fuerza y la gloria del rey proceden como dones del Dios del cielo.
  alternative_spanish_readings:
  - El rey posee estas cualidades por conquista o por derecho propio
  - Estas realidades son inherentes a su condición real
  rationale: El texto atribuye explícitamente estos elementos al acto de dar de Dios, no a una posesión autónoma del monarca. La redacción española conserva esa afirmación teológica sin añadir desarrollo doctrinal extrabíblico.
  doctrine_reference: La soberanía de Dios sobre los reinos humanos; cf. Daniel 2 en su conjunto.
translation_notes:
  revision_awareness: El inglés auditado ya mostraba alta concordancia y no requería revisión sustantiva; la presente versión sigue de cerca el texto arameo y mantiene la distinción entre los cuatro dones otorgados por el Dios del cielo, ajustando solo la distribución natural de los términos en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלָהּ y «el Dios del cielo» para el título fijo.
  - Se usa «el rey de reyes» como equivalente directo del título superlativo.
  - Se evita traducir mecánicamente «might/power» con dos veces «poder»; se preserva el paralelismo con «poder» y «fuerza».
  - «Gloria» conserva el registro bíblico común y admite las alternativas anotadas en nota.
  - La estructura vocativa «Tú, oh rey» respeta el arranque directo del original sin volverlo rígido.
