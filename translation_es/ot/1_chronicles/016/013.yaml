translation:
  language: es
  text: ¡Oh descendencia de Israel, su siervo[a]; hijos de Jacob[b], sus escogidos[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su esclavo»; el hebreo puede referirse a siervo o esclavo, pero aquí «siervo» encaja mejor con la designación pactual de Israel respecto de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «descendientes de Jacob»; el hebreo dice literalmente «hijos de Jacob».
    reason: lexical_alternative
  - marker: c
    text: O «sus elegidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - linaje
  lexicon: HALOT
  rationale: זֶרַע puede ser colectivo y referirse a la posteridad. En español, «descendencia» comunica bien ese valor colectivo sin la posible ambigüedad biológica de «simiente» ni la mayor interpretación de «linaje».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio y designación pactual; se conserva transliterado.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  lexicon: HALOT
  rationale: El contexto permite una pertenencia pactual a Dios, pero el POB documenta la fuerza léxica de עבד cuando el original la sostiene. En español, «esclavo» mantiene esa fuerza más directamente que «siervo», sin borrar la tensión entre pertenencia y servidumbre.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - hijos varones de
  - descendientes de
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente «hijos de», en español «hijos de» suena más natural y preserva la expresión genealógica/corporativa. «Descendientes de» es posible, pero atenúa la forma del hebreo.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio patriarcal conservado sin traducción.
- source_word: בְּחִירָיו
  english_pob_choice: his chosen ones
  chosen_spanish: sus escogidos
  alternatives_spanish:
  - sus elegidos
  - los que él escogió
  lexicon: HALOT
  rationale: El plural expresa a los que han sido seleccionados. «Escogidos» es claro y natural en español; «elegidos» sería viable, pero puede sonar más técnico o teológico según el contexto.
theological_decisions:
- issue: Referente de los sufijos de tercera persona en «su esclavo» y «sus escogidos»
  english_pob_reading: The suffixes refer to God, so Israel/Jacob are described as God's servant and God's chosen ones.
  chosen_spanish_reading: 'Los sufijos se entienden como posesivos referidos a Dios: Israel/Jacob son su esclavo y sus escogidos.'
  alternative_spanish_readings:
  - Los sufijos podrían leerse de modo más laxo dentro de la línea poética, pero el sentido natural es posesivo divino.
  rationale: El contexto circundante llama a recordar las obras de Yahvé; por eso conviene mantener el posesivo sin suavizarlo. La traducción conserva la relación de pertenencia que el hebreo expresa.
  doctrine_reference: Relación pactual de Israel con Yahvé; elección divina del pueblo.
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado del POB en inglés: ''offspring'' para זֶרַע como colectivo singular, ''servant'' para עבד con lectura pactual, ''sons of'' para בְּנֵי y ''chosen ones'' para בְּחִירָיו. No hubo revisiones pendientes en el pasaje de referencia.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo breve y vocativo del hebreo con puntuación exclamativa adecuada al llamado litúrgico.
  - Se evitó 'SEÑOR' para Yahvé porque este versículo no contiene el tetragrámaton, aunque el referente teológico sigue siendo Dios en el contexto inmediato.
  - Se prefirió 'escogidos' frente a 'elegidos' para conservar naturalidad sin perder el sentido de selección divina.
  - Se conservó 'hijos de' como reflejo más inmediato de la construcción hebrea y para mantener la simetría con la frase siguiente.
