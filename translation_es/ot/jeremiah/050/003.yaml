translation:
  language: es
  text: Porque una nación ha subido contra ella desde el norte; hará de su tierra una desolación, y no habrá habitante en ella. Desde el hombre hasta la bestia[a], han huido; se han ido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde el hombre hasta la bestia». El hebreo es un modismo que significa que todos los habitantes vivos, humanos y animales, han partido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la explicación causal o discursiva de la denuncia anterior. «Porque» conserva el valor explicativo de כִּי en un español natural y sobrio.
- source_word: עָלָה עָלֶיהָ
  english_pob_choice: has come up against her
  chosen_spanish: ha subido contra ella
  alternatives_spanish:
  - ha avanzado contra ella
  - ha venido contra ella
  lexicon: HALOT
  rationale: עלה con עַל en contexto militar expresa un movimiento de ataque o avance hostil. «Ha subido contra ella» mantiene la imagen espacial del hebreo y su sentido bélico.
- source_word: גּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: En contextos proféticos de juicio, גּוֹי señala una entidad política o nacional. «Nación» reproduce mejor ese valor que un término más vago como «pueblo».
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: desde el norte
  alternatives_spanish:
  - del norte
  - de la parte norte
  lexicon: HALOT
  rationale: La frase direccional se vierte de manera directa y natural en español. «Desde el norte» conserva el matiz de procedencia del ataque.
- source_word: יָשִׁית
  english_pob_choice: will make
  chosen_spanish: hará de
  alternatives_spanish:
  - convertirá en
  - pondrá como
  lexicon: HALOT
  rationale: שׂים con objeto y complemento de resultado expresa «hacer que algo sea» o «hacer de algo» una condición. «Hará de su tierra una desolación» mantiene ese valor resultativo sin sobreinterpretar.
- source_word: אַרְצָהּ
  english_pob_choice: her land
  chosen_spanish: su tierra
  alternatives_spanish:
  - la tierra de ella
  - su país
  lexicon: HALOT
  rationale: El sufijo femenino remite a Babilonia personificada. En español, «su tierra» es la forma natural de conservar la referencia sin forzar una repetición artificial del posesivo femenino.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desierta
  - en ruinas
  lexicon: HALOT
  rationale: El sustantivo denota devastación o ruina completa. «Una desolación» es fiel al sustantivo hebreo y mantiene la fuerza nominal del original.
- source_word: וְלֹא יִהְיֶה יוֹשֵׁב בָּהּ
  english_pob_choice: and there will be no inhabitant in it
  chosen_spanish: y no habrá habitante en ella
  alternatives_spanish:
  - y no habrá quien habite en ella
  - y no quedará habitante en ella
  lexicon: HALOT
  rationale: La construcción afirma despoblación total. «No habrá habitante en ella» conserva la concisión del hebreo y evita suavizar el alcance del juicio.
- source_word: מֵאָדָם וְעַד בְּהֵמָה
  english_pob_choice: From man to beast
  chosen_spanish: Desde el hombre hasta la bestia
  alternatives_spanish:
  - De humano a animal
  - Tanto hombre como bestia
  lexicon: HALOT
  rationale: La expresión idiomática marca totalidad entre los habitantes humanos y animales. Se conserva «hombre» para reflejar el valor genérico masculino del hebreo y «bestia» por su correspondencia bíblica tradicional y clara.
- source_word: נָדוּ
  english_pob_choice: have fled
  chosen_spanish: han huido
  alternatives_spanish:
  - han escapado
  - se han alejado
  lexicon: HALOT
  rationale: En un contexto de amenaza y desolación, נוד expresa huida o retirada precipitosa. «Han huido» comunica con precisión el escape forzado.
- source_word: הָלָכוּ
  english_pob_choice: they have gone away
  chosen_spanish: se han ido
  alternatives_spanish:
  - han partido
  - han salido
  lexicon: HALOT
  rationale: El segundo verbo intensifica el cierre de la deserción del lugar. «Se han ido» es idiomático en español y refleja la partida completa, distinta de la mera huida.
theological_decisions:
- issue: Expresión totalizante «מֵאָדָם וְעַד בְּהֵמָה» y valor de אָדָם
  english_pob_reading: From man to beast
  chosen_spanish_reading: Desde el hombre hasta la bestia
  alternative_spanish_readings:
  - Desde la humanidad hasta la bestia
  - Desde el ser humano hasta la bestia
  rationale: Se conserva el giro idiomático de totalidad sin neutralizar אָדָם. En este contexto profético, el hebreo abarca a todos los habitantes, humanos y animales, y la forma tradicional «del hombre hasta la bestia» sigue siendo clara en español.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Personificación femenina de Babilonia en el sufijo de אַרְצָהּ
  english_pob_reading: her land
  chosen_spanish_reading: su tierra
  alternative_spanish_readings:
  - la tierra de ella
  - su país
  rationale: El hebreo trata a Babilonia como femenina. En español, el posesivo «su» permite conservar la referencia femenina del antecedente sin introducir una construcción torpe o redundante.
  doctrine_reference: POB personification practice; Jeremiah 50 context
- issue: Fuerza del verbo resultativo יָשִׁית con לְשַׁמָּה
  english_pob_reading: will make her land a desolation
  chosen_spanish_reading: hará de su tierra una desolación
  alternative_spanish_readings:
  - convertirá su tierra en desolación
  - pondrá su tierra en desolación
  rationale: La cláusula expresa transformación completa en ruina. «Hará de... una desolación» preserva el valor causativo-resultativo del hebreo y la intensidad del juicio sin añadir interpretaciones ajenas al texto.
  doctrine_reference: Lexical force of שׂים + resultative complement
translation_notes:
  revision_awareness: El borrador sigue el último estado del audit trail en inglés, incluyendo la revisión final de la clausula de salida ('have fled' / 'have gone away') reflejada en español como «han huido; se han ido». También conserva la lectura de juicio total y la personificación femenina de Babilonia sin suavizarlas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque en este texto no aparece el nombre divino.
  - «Bestia» se usa para conservar el paralelismo bíblico de אָדָם/בְּהֵמָה y la amplitud totalizante del hebreo.
  - La puntuación con punto y coma refleja la bipartición del cierre hebreo entre huida y partida.
  - La nota al pie se ancla en «una desolación» para preservar la alternativa idiomática documentada por el audit trail.
