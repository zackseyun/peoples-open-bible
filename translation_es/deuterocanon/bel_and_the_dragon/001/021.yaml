translation:
  language: es
  text: Entonces el rey se enojó y arrestó[a] a los sacerdotes, a sus esposas y a sus hijos e hijas; y ellos le mostraron las puertas secretas[b] por donde solían entrar y consumir lo que estaba sobre la mesa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apresó».
    reason: lexical_alternative
  - marker: b
    text: O «puertas ocultas».
    reason: lexical_alternative
  - marker: c
    text: O «por donde entraban y consumían las cosas que estaban sobre la mesa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργισθεὶς
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se airó
  - se enfureció
  lexicon: BDAG
  rationale: El participio aoristo expresa el inicio o surgimiento de la ira en la narración. «Se enojó» es natural en español y conserva el valor narrativo sin intensificar más allá del griego.
- source_word: συνέλαβεν
  english_pob_choice: arrested
  chosen_spanish: arrestó
  alternatives_spanish:
  - apresó
  - tomó preso
  lexicon: BDAG
  rationale: En este contexto judicial y punitivo, el verbo indica una captura formal por parte del rey. «Arrestó» comunica bien la acción legal en español moderno.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  lexicon: BDAG
  rationale: Es el término habitual para ἱερεύς. El contexto ya identifica que se trata de los sacerdotes de Bel, así que no hace falta añadir especificación.
- source_word: γυναῖκας
  english_pob_choice: wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  lexicon: BDAG
  rationale: Aunque γυνή puede significar «mujer» o «esposa», el genitivo posesivo y la lista doméstica junto con «hijos» favorecen el sentido relacional. «Esposas» evita ambigüedad en español.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: BDAG
  rationale: τέκνα designa a los hijos en sentido familiar amplio. En español, «hijos» reproduce de forma natural el conjunto familiar mencionado.
- source_word: κρυπτὰς θύρας
  english_pob_choice: secret doors
  chosen_spanish: las puertas secretas
  alternatives_spanish:
  - las puertas ocultas
  - las entradas ocultas
  lexicon: BDAG
  rationale: La expresión señala accesos disimulados para el fraude. «Puertas secretas» mantiene concreción y fluidez; «ocultas» sigue siendo una alternativa válida.
- source_word: διʼ ὧν εἰσεπορεύοντο
  english_pob_choice: through which they used to go in
  chosen_spanish: por donde solían entrar
  alternatives_spanish:
  - por las cuales entraban
  - por donde acostumbraban entrar
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual en el pasado. «Solían entrar» transmite esa costumbre de forma clara y natural.
- source_word: ἐδαπάνων
  english_pob_choice: consume
  chosen_spanish: consumir
  alternatives_spanish:
  - comer
  - devorar
  lexicon: BDAG
  rationale: El verbo significa gastar/consumir; en este contexto se refiere a tomar lo que estaba en la mesa. «Consumir» conserva el sentido amplio sin añadir una imagen más fuerte que el griego.
- source_word: τὰ ἐπὶ τῇ τραπέζῃ
  english_pob_choice: what was on the table
  chosen_spanish: lo que estaba sobre la mesa
  alternatives_spanish:
  - las cosas sobre la mesa
  - la comida sobre la mesa
  lexicon: BDAG
  rationale: El neutro plural con la preposición expresa los elementos colocados sobre la mesa. «Lo que estaba sobre la mesa» evita especificar «comida» sin necesidad del contexto.
theological_decisions:
- issue: Sentido relacional de γυναικας en la lista familiar
  english_pob_reading: wives
  chosen_spanish_reading: esposas
  alternative_spanish_readings:
  - mujeres
  rationale: La lista de personas arrestadas forma un grupo familiar. Traducir con «esposas» preserva el vínculo doméstico implícito sin convertirlo en un término genérico.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Valor narrativo-jurídico de συνέλαβεν
  english_pob_reading: arrested
  chosen_spanish_reading: arrestó
  alternative_spanish_readings:
  - apresó
  - tomó preso
  rationale: La acción del rey es una detención punitiva tras descubrirse el engaño. «Arrestó» comunica mejor esa dimensión legal en español contemporáneo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, readable modern Spanish
translation_notes:
  revision_awareness: 'Se siguió de cerca el paquete fuente griego y el audit trail inglés. No se introdujeron cambios respecto del sentido base: solo se ajustó la dicción al español natural y se mantuvieron las ambigüedades léxicas relevantes mediante notas alternativas.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo exigiera; aquí no aparece el nombre divino.
  - Se mantuvo «consumir» para ἐδαπάνων, evitando sustituirlo por «comer» en el texto principal.
  - «Puertas secretas» se usó como opción principal, con «puertas ocultas» como alternativa registrada.
  - La estructura de lista familiar se conservó con paralelismo claro en español.
