translation:
  language: es
  text: Los atacaré como una osa[a] privada de sus cachorros, y desgarraré el recinto[b] de su corazón; allí los devoraré como un león[c]; una bestia del campo los desgarrará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como un oso’. El hebreo no marca explícitamente el género aquí; en español se usa ‘osa’ para conservar la imagen habitual de una madre privada de sus crías.
    reason: lexical_alternative
  - marker: b
    text: O ‘la cubierta de su corazón’, posiblemente refiriéndose a ‘su pecho’. La frase hebrea es rara y difícil.
    reason: lexical_alternative
  - marker: c
    text: O ‘como una leona’. El término hebreo puede entenderse con matiz de león/leona; aquí se prefirió ‘león’ por alineación más directa con la revisión inglesa y por evitar introducir una precisión de género no obligatoria.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְגְּשֵׁם
  english_pob_choice: I will attack them
  chosen_spanish: los atacaré
  alternatives_spanish:
  - los enfrentaré
  - los saldré al encuentro
  lexicon: HALOT
  rationale: El verbo puede significar ‘encontrar/encarar’, pero en un contexto de juicio con imágenes depredadoras la fuerza hostil es la adecuada. ‘Atacaré’ comunica esa intención sin suavizarla ni volverlo demasiado interpretativo.
- source_word: כְּדֹב שַׁכּוּל
  english_pob_choice: like a bear robbed of her cubs
  chosen_spanish: como una osa privada de sus cachorros
  alternatives_spanish:
  - como una osa despojada de sus cachorros
  - como un oso privado de sus crías
  lexicon: HALOT
  rationale: שַׁכּוּל expresa privación de hijos/pequeños. El femenino del hebreo e imagen de ferocidad maternal se conservan mejor con ‘osa’. ‘Privada de sus cachorros’ es natural y fiel al cuadro.
- source_word: וְאֶקְרַע
  english_pob_choice: and I will tear open
  chosen_spanish: desgarraré
  alternatives_spanish:
  - rasgaré
  - abriré de un tajo
  lexicon: HALOT
  rationale: קרע significa ‘rasgar/desgarrar’. En español, ‘desgarraré’ transmite mejor la violencia anatómica que sigue en el versículo que una simple ‘abriré’.
- source_word: סְגוֹר לִבָּם
  english_pob_choice: the enclosure of their heart
  chosen_spanish: el recinto de su corazón
  alternatives_spanish:
  - la cubierta de su corazón
  - el envoltorio de su corazón
  - su pecho
  lexicon: HALOT
  rationale: La expresión hebrea es rara y difícil. ‘Recinto’ conserva la idea de algo que encierra/cierra alrededor del corazón sin resolverla prematuramente en ‘pecho’, dejando visible la tensión léxica documentada por el POB inglés.
- source_word: וְאֹכְלֵם
  english_pob_choice: there I will devour them
  chosen_spanish: allí los devoraré
  alternatives_spanish:
  - allí los consumiré
  - allí los comeré
  lexicon: HALOT
  rationale: En imaginería depredadora, ‘devorar’ es la opción más fiel y idiomática. Se mantiene ‘allí’ para reproducir el énfasis locativo del hebreo.
- source_word: כְּלָבִיא
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - como una leona
  lexicon: HALOT
  rationale: Aunque el término puede sugerir un matiz de leona en algunos contextos, el POB revisado optó por ‘lion’ y el español más estable y directamente alineado con לָבִיא es ‘león’. Evita introducir una feminización no necesaria en el texto principal.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: a wild beast of the field
  chosen_spanish: una bestia del campo
  alternatives_spanish:
  - una fiera del campo
  - una bestia salvaje del campo
  lexicon: HALOT
  rationale: La expresión apunta a una criatura salvaje del campo. ‘Bestia del campo’ reproduce la estructura y el tono bíblico; ‘salvaje’ es implícito por el contexto animal.
- source_word: תְּבַקְּעֵם
  english_pob_choice: will tear them apart
  chosen_spanish: los despedazará
  alternatives_spanish:
  - los desgarrará
  - los partirá
  lexicon: HALOT
  rationale: בקע literalmente puede implicar ‘partir/abrir’. Con un sujeto animal, ‘despedazar’ comunica bien el resultado violento y mantiene la fuerza del cierre del versículo en español.
theological_decisions:
- issue: Imagen divina de juicio con depredación violenta
  english_pob_reading: Retain the first-person divine speech and violent animal metaphors without softening them.
  chosen_spanish_reading: Mantener la primera persona divina y las metáforas animales violentas sin atenuarlas.
  alternative_spanish_readings:
  - Suavizar la imagen con lenguaje más general de juicio
  - Convertir la escena en una advertencia abstracta
  rationale: El hebreo presenta a Dios como agente directo del juicio del pacto mediante una secuencia de imágenes de depredación. La versión española conserva esa severidad teológica en lugar de neutralizarla con eufemismos.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La revisión inglesa reciente cambió ‘lioness’ a ‘lion’ y ajustó el último verbo a ‘tear them apart’ para acercarse más al hebreo. El español sigue esa orientación: usa ‘león’ y un verbo de desgarro final (‘despedazará’) sin suavizar la imaginería.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó ‘SEÑOR’ y fórmulas de sustitución porque el texto aquí es de primera persona divina y no requiere máscara nominal.
  - ‘Corazón’ se conserva en la frase difícil como equivalente cercano al inglés ‘heart’, sin resolverla a ‘pecho’ en el texto principal para no borrar la ambigüedad documentada.
