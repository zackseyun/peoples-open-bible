    rationale: 'Aunque intenta reflejar el literal hebreo, en español suena poco natural. Puede conservarse la literalidad con una redacción más clara: «literalmente, “No me da dejar volver mi aliento/espíritu”» o similar. Conviene mantener la explicación idiomática sin dureza innecesaria.'
