    rationale: Si el texto dice 'ha olvidado parte de tu iniquidad', la nota debe ofrecer las otras posibilidades documentadas ('ha pasado por alto', 'te exige menos...'), no repetir la misma.
  revised_spanish_text: y te haría saber las cosas ocultas de la sabiduría[a], porque la sabiduría sólida es doble[b]. Sabe, pues, que Dios ha olvidado parte de tu iniquidad[c].
