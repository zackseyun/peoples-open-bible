translation:
  text: Keep a strict watch over your virgin daughter[a], lest she make you a byword of disgrace, a gossip of the city and a curse of the people[c][b], and seat you in the assembly at the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a name of disgrace' may also be rendered 'an evil name' or 'shameful repute.' The Greek parallel expands the idea toward becoming an object of public mockery.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult in Hebrew. Literally, it speaks of causing you to sit 'in the gathering/crowd at the gate.' The gate was the public place of civic assembly and judgment. The Greek parallel similarly points to public shame before a crowd.
    reason: cultural_note
  - marker: c
    text: Masada preserves the shorter wording 'Over a daughter keep watch; gossip in the city and an assembly of people ...' where the Cairo Geniza text here is fuller.
    reason: textual_variant
lexical_decisions:
- source_word: בני
  chosen: Keep
  alternatives:
  - build
  - set up
  lexicon: HALOT
  rationale: In this idiom with על and משמר, the sense is not literal building but establishing/maintaining something over someone. English 'keep' captures the imperative force naturally.
- source_word: על בתולתך
  chosen: over your virgin daughter
  alternatives:
  - concerning your maiden daughter
  - over your unmarried daughter
  lexicon: HALOT
  rationale: Hebrew בתולה denotes a virgin/maiden; 'virgin daughter' preserves the social-sexual nuance present in the source better than the broader 'unmarried daughter.'
- source_word: החזק משמר
  chosen: keep a strict watch
  alternatives:
  - strengthen a guard
  - maintain vigilance
  lexicon: HALOT
  rationale: The collocation intensifies the command to guard/watch carefully. 'Keep a strict watch' is idiomatic English that preserves the emphasis.
- source_word: פן תעשה לך שם סרה
  chosen: lest she make you a byword of disgrace
  alternatives:
  - lest she make for you an evil name
  - lest she bring you shameful repute
  lexicon: HALOT
  rationale: שם with סרה concerns damaged reputation or disgrace. 'Byword of disgrace' conveys public shame, and is supported by the Greek's expansion toward public mockery.
- source_word: דבת עיר
  chosen: gossip in the city
  alternatives:
  - an evil report in the city
  - talk of the town
  lexicon: HALOT
  rationale: דבה is report, slander, or gossip. 'Gossip in the city' is readable modern English and fits the sequence of public disgrace. 'Talk of the town' is too idiomatic and potentially light.
- source_word: וקללת עם
  chosen: a curse among the people
  alternatives:
  - the people's curse
  - reviling among the people
  lexicon: HALOT
  rationale: The phrase denotes becoming an object of communal cursing or denunciation. 'A curse among the people' preserves the nominal force and public setting.
- source_word: והושיבתך
  chosen: and seat you
  alternatives:
  - and make you sit
  - and cause you to dwell
  lexicon: HALOT
  rationale: 'The hiphil form is causative: she causes you to sit/be placed. ''Seat you'' is concise and preserves the causative sense.'
- source_word: בעדר שער
  chosen: in the assembly at the gate
  alternatives:
  - in the crowd at the gate
  - among the gathering at the gate
  lexicon: HALOT
  rationale: The Hebrew is somewhat difficult, but with the Greek's public-shame setting and the civic role of the gate, 'assembly at the gate' best captures a gathered public forum. 'Flock of the gate' would be too literal and obscure in English.
