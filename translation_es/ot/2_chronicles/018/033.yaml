base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/033.yaml
  text: But a man drew his bow at random and struck the king of Israel between the joints of the armor and the breastplate[a]. So he said to the charioteer, “Turn your hand and take me out of the camp[c][b], for I am wounded.”
  footnotes:
  - marker: a
    text: Or 'without aiming' / 'in his innocence.' The Hebrew לְתֻמּוֹ can denote simplicity or innocence, but in this battle context it most likely means the archer shot without specific aim.
    reason: lexical_alternative
  - marker: b
    text: Literally 'Turn your hand.' The expression likely means to turn the chariot around or maneuver it away from the fighting.
    reason: lexical_alternative
  - marker: c
    text: Or 'between the joints of the armor and the breastplate.' The exact armor terminology is uncertain, but the sense is that the arrow found a gap in the king's armor.
    reason: cultural_note
