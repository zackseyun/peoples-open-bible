translation:
  language: es
  text: Así se apartaron de los alrededores de la morada de Coré[a], Datán y Abiram. Y Datán y Abiram salieron, de pie a la entrada de sus tiendas, con sus esposas, sus hijos varones[b] y sus pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘subieron de los alrededores de la morada de Coré, Datán y Abiram’. El verbo hebreo dice literalmente ‘subieron’, pero aquí probablemente funciona de modo idiomático para indicar que se apartaron de la zona. ‘Morada’ traduce מִשְׁכָּן como residencia o lugar de campamento asociado con Coré, Datán y Abiram, no como el tabernáculo de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: ‘Hijos varones’ traduce aquí בְּנֵיהֶם. El hebreo lo distingue de טַפָּם, que se refleja en ‘sus pequeños’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּעָלוּ
  english_pob_choice: moved away
  chosen_spanish: se apartaron
  alternatives_spanish:
  - subieron
  - se retiraron
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘subieron’, pero en esta construcción con מֵעַל y el contexto de separación del grupo rebelde, el sentido es alejarse de la zona. ‘Se apartaron’ comunica ese movimiento sin cargar el texto con una dirección física impropia en español.
- source_word: מֵעַל
  english_pob_choice: from around
  chosen_spanish: de alrededor
  alternatives_spanish:
  - de sobre
  - alejándose de
  lexicon: HALOT
  rationale: La combinación con מִסָּבִיב refuerza la idea de separación del contorno o la vecindad inmediata. ‘De alrededor’ reproduce bien esa relación espacial en español.
- source_word: מִשְׁכַּן
  english_pob_choice: dwelling
  chosen_spanish: recinto
  alternatives_spanish:
  - morada
  - vivienda
  - tabernáculo
  lexicon: HALOT
  rationale: Aquí no se trata del tabernáculo de Yahvé, sino del lugar/habitación asociado con Coré, Datán y Abiram. ‘Recinto’ evita confusión cultual y conserva la idea de un lugar delimitado de residencia o campamento.
- source_word: מִסָּבִיב
  english_pob_choice: around
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todos lados
  - en torno a
  lexicon: HALOT
  rationale: Es un adverbio de cercanía circundante. ‘Alrededor’ es natural y fiel al valor espacial del hebreo.
- source_word: יָצְאוּ
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - vinieron afuera
  - salieron al exterior
  lexicon: HALOT
  rationale: Desde la escena narrativa, los dos hombres emergen de sus tiendas. ‘Salieron’ es la equivalencia directa y natural en español.
- source_word: נִצָּבִים
  english_pob_choice: standing
  chosen_spanish: quedándose de pie
  alternatives_spanish:
  - estando de pie
  - plantados
  lexicon: HALOT
  rationale: El participio describe la postura en la entrada de la tienda. ‘Quedándose de pie’ mantiene la escena visible sin añadir por sí mismo la carga interpretativa de desafío que podría tener ‘plantados’ o ‘tomando postura’.
- source_word: פֶּתַח
  english_pob_choice: the entrance of
  chosen_spanish: a la entrada de
  alternatives_spanish:
  - en la entrada de
  - junto a la entrada de
  lexicon: HALOT
  rationale: La expresión estándar para la abertura o umbral de una tienda. ‘A la entrada de’ suena natural y conserva la relación locativa.
- source_word: אָֽהֳלֵיהֶם
  english_pob_choice: their tents
  chosen_spanish: sus tiendas
  alternatives_spanish:
  - sus carpas
  - sus toldos
  lexicon: HALOT
  rationale: El plural hebreo se conserva con ‘sus tiendas’. Es el término más claro y sobrio para este contexto de campamento.
- source_word: וּנְשֵׁיהֶם
  english_pob_choice: with their wives
  chosen_spanish: con sus esposas
  alternatives_spanish:
  - y sus esposas
  lexicon: HALOT
  rationale: 'La conjunción en español funciona mejor como acompañamiento explícito: ‘con sus esposas’. Mantiene la escena familiar sin forzar la sintaxis.'
- source_word: וּבְנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus varones
  - sus hijos varones
  lexicon: HALOT
  rationale: Aunque el hebreo puede distinguir ‘hijos’ de los pequeños mencionados después, en español ‘hijos’ comunica de manera más natural el grupo filial. La distinción con ‘sus pequeños’ preserva luego la referencia a dependientes o niños menores.
- source_word: וְטַפָּם
  english_pob_choice: their little children
  chosen_spanish: sus pequeños
  alternatives_spanish:
  - sus niños pequeños
  - sus dependientes
  lexicon: HALOT
  rationale: טַף refiere a niños pequeños o dependientes. ‘Sus pequeños’ es una opción natural en español y conserva el matiz afectivo y concreto sin sobreexplicar.
theological_decisions:
- issue: Sentido de מִשְׁכַּן aplicado a Coré, Datán y Abiram, no al santuario de Yahvé
  english_pob_reading: dwelling of Korah, Dathan, and Abiram
  chosen_spanish_reading: recinto de Coré, Datán y Abiram
  alternative_spanish_readings:
  - morada de Coré, Datán y Abiram
  - vivienda de Coré, Datán y Abiram
  - tabernáculo de Coré, Datán y Abiram
  rationale: El contexto excluye el tabernáculo sagrado y pide un referente doméstico o de campamento. ‘Recinto’ mantiene la idea de lugar concreto asociado a ellos y evita trasladar el término a una connotación litúrgica indebida.
  doctrine_reference: Nm 16:27; uso contextual de מִשְׁכַּן en el relato
- issue: 'Postura de Datán y Abiram al salir: descripción física sin añadir una interpretación moral explícita'
  english_pob_reading: standing at the entrance of their tents
  chosen_spanish_reading: quedándose de pie a la entrada de sus tiendas
  alternative_spanish_readings:
  - parados a la entrada de sus tiendas
  - tomando postura a la entrada de sus tiendas
  rationale: El hebreo describe la postura. Aunque el contexto narrativo puede sugerir desafío, el texto no obliga a verbalizarlo. Por eso se conserva una descripción visible sin intensificarla innecesariamente.
  doctrine_reference: Principio de no sobreinterpretar la forma verbal cuando el contexto basta
- issue: Distinción entre בְּנֵיהֶם y טַפָּם
  english_pob_reading: their sons, and their little children
  chosen_spanish_reading: sus hijos y sus pequeños
  alternative_spanish_readings:
  - sus hijos y sus niños pequeños
  - sus hijos e hijitos
  rationale: El hebreo separa los hijos de los pequeños/dependientes. Mantener ‘hijos’ y ‘pequeños’ conserva esa distinción sin perder naturalidad en español.
  doctrine_reference: Nm 16:27; distinción léxica entre בנים y טף
translation_notes:
  revision_awareness: Se siguió el estado más reciente del texto fuente y del audit trail inglés, que no muestra revisiones aplicadas ni cambios pendientes; por eso la redacción española busca reflejar directamente las decisiones ya estabilizadas en el POB inglés, con ajuste idiomático natural al español.
  spanish_consistency_notes:
  - Se preservó la distinción entre el lugar asociado a Coré/Datán/Abiram y el tabernáculo de Yahvé, usando un término no cultual para מִשְׁכַּן.
  - Se mantuvo la diferencia entre ‘hijos’ y ‘pequeños’ para reflejar בְּנֵיהֶם y טַפָּם.
  - ‘Se apartaron’ y ‘de alrededor’ reproducen el valor espacial del movimiento sin imponer una traducción demasiado literal de ‘subieron’.
  - La frase ‘quedándose de pie’ conserva la postura sin añadir un matiz de rebelión que el participio por sí solo no exige.
