translation:
  text: And those who do not serve in the army or fight[a], but farm the land, again, when they sow, after reaping they bring tribute to the king; and by compelling one another[b], they bring the taxes to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'present tribute to the king.' The verb 'bring' here carries the sense of delivering payment owed to a ruler.
    reason: lexical_alternative
  - marker: b
    text: Literally 'compelling one another.' The phrase likely describes mutual pressure to ensure the king's taxes are paid.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατεύονται
  chosen: serve in the army
  alternatives:
  - go on campaign
  - serve as soldiers
  lexicon: LSJ
  rationale: The verb denotes military service or campaigning. 'Serve in the army' is natural modern English and distinguishes it from the following πολεμοῦσιν ('fight').
- source_word: πολεμοῦσιν
  chosen: fight
  alternatives:
  - wage war
  - make war
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the parallel with στρατεύονται without sounding overly formal.
- source_word: γεωργοῦσιν τὴν γῆν
  chosen: farm the land
  alternatives:
  - cultivate the land
  - work the soil
  lexicon: LSJ
  rationale: The phrase refers to agricultural labor. 'Farm the land' is idiomatic modern English while remaining close to the Greek sense.
- source_word: σπείρωσιν
  chosen: they sow
  alternatives:
  - they plant
  - they scatter seed
  lexicon: LSJ
  rationale: '''Sow'' is the direct agricultural term and pairs naturally with ''reaping'' in the next participle.'
- source_word: θερίσαντες
  chosen: after reaping
  alternatives:
  - having harvested
  - when they have reaped
  lexicon: LSJ
  rationale: The aorist participle is temporal relative to the main verb ἀναφέρουσιν. 'After reaping' expresses that sequence clearly and compactly.
- source_word: ἀναφέρουσιν
  chosen: bring
  alternatives:
  - carry up
  - present
  - pay
  lexicon: LSJ
  rationale: In this taxation context the verb means to bring or deliver up to a superior. 'Bring' keeps the concrete force; the fiscal sense is clarified by the object.
- source_word: τῷ βασιλεῖ
  chosen: to the king
  alternatives:
  - for the king
  lexicon: LSJ
  rationale: The dative here marks the recipient of the tribute/taxes.
- source_word: ἀναγκάζοντες
  chosen: by compelling
  alternatives:
  - forcing
  - pressing
  lexicon: LSJ
  rationale: The participle indicates coercive mutual pressure. 'By compelling' preserves the force without overinterpreting the exact mechanism.
- source_word: ἕτερος τὸν ἕτερον
  chosen: one another
  alternatives:
  - each other
  - one the other
  lexicon: LSJ
  rationale: Idiomatic reciprocal expression in English. The sense is mutual pressure among the people.
- source_word: τοὺς φόρους
  chosen: the taxes
  alternatives:
  - the tribute
  - the levies
  lexicon: LSJ
  rationale: φόροι are payments owed to a ruler. Since the verse already uses an unexpressed fiscal sense with ἀναφέρουσιν earlier, rendering φόρους as 'taxes' clarifies the specific obligation in the second clause.
