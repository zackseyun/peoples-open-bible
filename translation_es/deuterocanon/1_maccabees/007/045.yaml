translation:
  language: es
  text: Y los persiguieron por una jornada de camino, desde Adasá hasta llegar a Gazerá[a], y tocaron las trompetas de señal[b] detrás de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Gazera». Se conserva la transliteración del topónimo griego.
    reason: lexical_alternative
  - marker: b
    text: O «tocaron las trompetas de las señales detrás de ellos». La expresión griega puede traducirse más formalmente, pero «trompetas de señal» comunica con más claridad en español su sentido militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδίωκον
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - iban persiguiendo
  - los acosaron
  lexicon: LSJ
  rationale: El imperfecto griego expresa acción continuada; en español, el pretérito imperfecto perifrástico no resulta natural aquí. «Persiguieron» comunica la persecución militar con claridad y sin añadir más intensidad de la que exige el contexto.
- source_word: ὁδὸν ἡμέρας μιᾶς
  english_pob_choice: for a day's journey
  chosen_spanish: por el camino de un día
  alternatives_spanish:
  - por una jornada de camino
  - por el trayecto de un día
  lexicon: LSJ
  rationale: La expresión idiomática indica la distancia recorrida en un día. «Por el camino de un día» conserva el sentido de recorrido/duración sin sonar forzado en español.
- source_word: ἀπὸ Ἀδασὰ
  english_pob_choice: from Adasa
  chosen_spanish: desde Adasá
  alternatives_spanish:
  - desde Adasa
  lexicon: Transliteración propia
  rationale: Se conserva el topónimo transliterado. Se añade acento gráfico en español para la pronunciación natural, sin alterar el nombre.
- source_word: ἕως τοῦ ἐλθεῖν εἰς Γαζηρά
  english_pob_choice: until they came to Gazera
  chosen_spanish: hasta llegar a Gazerá
  alternatives_spanish:
  - hasta que llegaron a Gazerá
  - hasta que llegaron a Gazera
  lexicon: LSJ
  rationale: El infinitivo articular con ἕως marca el término de la persecución. «Hasta llegar a Gazerá» es fiel y fluido en español. Se conserva la transliteración del lugar.
- source_word: ἐσάλπισαν
  english_pob_choice: they sounded
  chosen_spanish: tocaron
  alternatives_spanish:
  - sonaron
  - soplaron
  lexicon: LSJ
  rationale: En español militar y bíblico, con un objeto como «trompetas», «tocaron» es la forma más natural para el acto de hacerlas sonar. Evita la rigidez de un calco como «sonaron las trompetas».
- source_word: ὀπίσω αὐτῶν
  english_pob_choice: behind them
  chosen_spanish: detrás de ellos
  alternatives_spanish:
  - tras ellos
  - a sus espaldas
  lexicon: LSJ
  rationale: La preposición adverbial indica posición posterior. «Detrás de ellos» preserva la imagen espacial sin introducir la idea interpretativa de «en persecución».
- source_word: ταῖς σάλπισγξιν τῶν σημασιῶν
  english_pob_choice: the signal trumpets
  chosen_spanish: las trompetas de las señales
  alternatives_spanish:
  - las trompetas de señal
  - las trompetas de las señales militares
  - las trompetas de aviso
  lexicon: LSJ
  rationale: El genitivo τῶν σημασιῶν califica las trompetas como instrumentos de señalización militar. «Trompetas de las señales» mantiene con más literalidad la estructura griega que «trompetas de señal», sin perder inteligibilidad.
translation_notes:
  revision_awareness: La traducción sigue el texto griego de Swete y el audit trail inglés, pero adapta la sintaxis al español para mantener naturalidad sin perder el matiz militar y la temporalidad del imperfecto griego.
  spanish_consistency_notes:
  - Se conserva la transliteración de los topónimos Adasá y Gazerá.
  - Se traduce el lenguaje militar de forma directa y sobria, sin suavizarlo.
  - No se introduce puntuación explicativa adicional porque el versículo es sintácticamente simple y el español puede seguir de cerca el griego sin perder claridad.
