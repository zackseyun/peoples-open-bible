translation:
  language: es
  text: Entonces Jesúa, hijo de Josadac, se levantó con sus hermanos, los sacerdotes[a], y Zorobabel, hijo de Sealtiel, con sus hermanos, y edificaron el altar del Dios de Israel para ofrecer sobre él holocaustos, como está escrito en la Ley de Moisés[b], hombre de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes» / «sus asociados»; el hebreo dice literalmente «sus hermanos», y la frase siguiente especifica que el grupo de Jesúa son «los sacerdotes».
    reason: lexical_alternative
  - marker: b
    text: «Ley» traduce el hebreo torah, que también puede significar «instrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: HALOT
  rationale: El verbo קום en esta secuencia narrativa marca inicio de acción decidida. En español, «se levantó» conserva el movimiento narrativo sin reducirlo a una mera postura física ni explicitar más de lo que el hebreo dice.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  lexicon: HALOT
  rationale: Se translitera el nombre propio. Para este personaje posexílico, «Jesúa» es una forma castellana estable y reconocible; «Josué» podría confundirlo con el personaje anterior del canon.
- source_word: וְאֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus asociados
  lexicon: HALOT
  rationale: Se conserva el parentesco literal del hebreo. La aposición «los sacerdotes» aclara, como en el texto fuente y en la POB inglesa, que se trata del grupo sacerdotal de Jesúa.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: Es el equivalente directo y natural de כֹּהֲנִים. «Sacerdotes» mantiene la referencia cultual concreta del contexto.
- source_word: זְרֻבָּבֶל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubbabel
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma castellana tradicional y transparente. La transliteración más cercana al hebreo también sería posible, pero «Zorobabel» es clara para lectura eclesial en español.
- source_word: שְׁאַלְתִּיאֵל
  english_pob_choice: Shealtiel
  chosen_spanish: Sealtiel
  alternatives_spanish:
  - Shealtiel
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional del nombre propio. No se traduce ni se amplifica.
- source_word: וַיִּבְנוּ
  english_pob_choice: they built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - levantaron
  lexicon: HALOT
  rationale: בנה significa «construir/edificar». «Edificaron» suena natural en español bíblico y mantiene el hecho de levantar el altar sin añadir la idea de «reconstruir» que el hebreo no expresa explícitamente.
- source_word: מִזְבַּח
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: HALOT
  rationale: Es la equivalencia estándar y precisa para el término cultual.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel (Yahvé)
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa y natural. En el propio contexto, el referente es el Dios pactal de Israel, sin necesidad de añadir glosa al cuerpo del texto.
- source_word: לְהַעֲלוֹת עָלָיו עֹלוֹת
  english_pob_choice: to offer burnt offerings on it
  chosen_spanish: para ofrecer sobre él holocaustos
  alternatives_spanish:
  - para subir sobre él holocaustos
  - para presentar holocaustos sobre él
  lexicon: HALOT
  rationale: La forma causativa de עלה con עֹלוֹת es un modismo sacrificial. «Ofrecer... holocaustos» comunica en español el acto cultual de manera fiel y digna; «sobre él» conserva el pronombre del altar.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: En español bíblico y litúrgico, «holocaustos» es el equivalente tradicional y preciso del sacrificio consumido por fuego. Mantiene la fuerza cultual del término sin explicarlo en exceso.
- source_word: כַּכָּתוּב
  english_pob_choice: as it is written
  chosen_spanish: conforme a lo escrito
  alternatives_spanish:
  - como está escrito
  - según está escrito
  lexicon: HALOT
  rationale: La fórmula de conformidad se vierte de manera sobria. «Conforme a lo escrito» conserva el matiz normativo del hebreo y encaja bien con la cláusula siguiente.
- source_word: בְּתוֹרַת מֹשֶׁה
  english_pob_choice: in the Law of Moses
  chosen_spanish: en la Ley de Moisés
  alternatives_spanish:
  - en la instrucción de Moisés
  - en la Torá de Moisés
  lexicon: HALOT
  rationale: En este contexto legal-cultual, תּוֹרָה remite a la normativa escrita mosaica. «Ley de Moisés» comunica de forma clara esa fuerza normativa en español, en línea con la POB inglesa.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  lexicon: HALOT
  rationale: Se conserva el título bíblico establecido para un mensajero o portavoz especialmente comisionado por Dios. «Hombre de Dios» mantiene el peso idiomático y teológico del hebreo.
theological_decisions:
- issue: Alcance del término אחים en el grupo de Jesúa
  english_pob_reading: his brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus asociados
  rationale: El hebreo usa el plural masculino de «hermanos» y luego lo delimita por la aposición «los sacerdotes». Se mantiene el término literal para no neutralizar el parentesco/coalición masculina que el texto presenta.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de תּוֹרָה en una cita de obediencia ritual
  english_pob_reading: the Law of Moses
  chosen_spanish_reading: la Ley de Moisés
  alternative_spanish_readings:
  - la instrucción de Moisés
  - la Torá de Moisés
  rationale: El contexto trata de prescripción cultual escrita; por eso «Ley» expresa la fuerza normativa sin perder la referencia mosaica. La traducción no borra el posible trasfondo más amplio de «instrucción», pero prioriza la lectura legal aquí.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: Coincide con el pasaje hebreo base y con el audit trail inglés en los puntos léxicos y sintácticos clave. Se mantuvo la secuencia narrativa, la referencia sacerdotal de Jesúa, el verbo cultual de edificar el altar, el modismo sacrificial de «ofrecer holocaustos», y la fórmula normativa «conforme a lo escrito en la Ley de Moisés». No se detectaron revisiones previas que obligaran a cambios adicionales.
  spanish_consistency_notes:
  - Se usó «Jesúa» y «Zorobabel» como formas castellanas reconocibles y consistentes con el uso bíblico en español.
  - Se prefirió «holocaustos» para עֹלוֹת por su valor técnico-cultual en español bíblico.
  - Se mantuvo «Ley de Moisés» en el cuerpo del texto y se aclaró en nota la amplitud semántica de תּוֹרָה.
  - El anclaje de la nota [a] se coloca en «hermanos» porque ahí recae la alternativa semántica principal; [b] se ancla en «Ley».
