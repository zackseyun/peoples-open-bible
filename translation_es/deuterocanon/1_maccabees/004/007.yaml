    issue: Referencia ambigua en «y estos estaban entrenados para la guerra»
    rationale: El demostrativo «estos» no tiene un antecedente natural e inequívoco en español dentro de la oración. El griego apunta a las fuerzas enemigas observadas; conviene explicitarlo para evitar ambigüedad.
  - severity: low
    issue: Participio algo poco fluido en «caballería rodeándolo»
    rationale: No es incorrecto, pero «caballería que lo rodeaba» suena más natural en español narrativo y mantiene bien el sentido participial griego.
