  text: Or if I had dealt falsely against his life—and no matter is hidden from the king—you yourself would have stood aloof[a].
  footnotes:
  - marker: a
    text: Or, 'you would have stood against me.' The Hebrew expression may denote standing apart from someone or standing in opposition to him; the context favors the sense that Joab would have withheld support and left the speaker exposed.
    reason: lexical_alternative
