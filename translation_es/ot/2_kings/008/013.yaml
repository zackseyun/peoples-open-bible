translation:
  language: es
  text: 'Hazael dijo: «Pero, ¿qué es tu siervo, este perro, para que haga esta gran cosa?» Y Eliseo dijo: «Yahvé me ha mostrado que tú serás rey sobre Aram[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rey de Aram»; el hebreo dice literalmente «rey sobre Aram».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: HALOT 5650
  rationale: El hebreo עבד puede expresar esclavitud o servidumbre; el inglés POB optó por la fuerza léxica de 'slave' en inglés en contraste con el gesto deferente del hablante. En español, 'esclavo' conserva esa tensión sin suavizarla indebidamente a 'siervo'.
- source_word: הַכֶּלֶב
  english_pob_choice: this dog
  chosen_spanish: este perro
  alternatives_spanish:
  - el perro
  - un perro
  lexicon: HALOT 3611
  rationale: La frase es autodepreciatoria e insultante; 'este perro' conserva la deixis y el tono de humillación del hebreo mejor que una forma más neutra.
- source_word: כִּי מָה
  english_pob_choice: But what
  chosen_spanish: Pero, ¿qué
  alternatives_spanish:
  - ¿qué
  - porque qué
  lexicon: HALOT 3588, 4100
  rationale: La fuerza discursiva aquí es de objeción incrédula. En español, 'Pero, ¿qué' reproduce mejor el giro adversativo que un simple '¿qué'.
- source_word: כִּי יַעֲשֶׂה
  english_pob_choice: that he should do
  chosen_spanish: para que haga
  alternatives_spanish:
  - que haga
  - como para que haga
  lexicon: HALOT 3588, 6213
  rationale: La construcción expresa asombro ante la posibilidad de realizar la acción. 'Para que haga' transmite bien la relación de finalidad/incredulidad sin fijar solo capacidad o simple futuro.
- source_word: הַדָּבָר הַגָּדוֹל הַזֶּה
  english_pob_choice: this great thing
  chosen_spanish: esta gran cosa
  alternatives_spanish:
  - este gran hecho
  - este gran asunto
  lexicon: HALOT 1697, 1419
  rationale: '''דבר'' es amplio y el POB inglés dejó cierta apertura semántica. ''Cosa'' mantiene esa amplitud en español; ''gran'' sigue el adjetivo sin elevarlo a ''hecho'' o ''asunto''.'
- source_word: הִרְאַנִי
  english_pob_choice: has shown me
  chosen_spanish: me ha mostrado
  alternatives_spanish:
  - me mostró
  - me ha hecho ver
  lexicon: HALOT 7200
  rationale: El perfecto hebreo se vierte con perfecto compuesto para expresar el resultado actual de la revelación profética, en línea con el inglés POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT 3068
  rationale: 'Se sigue el defecto del proyecto para el Nombre divino en español: ''Yahvé''. Evita el sustituto litúrgico y mantiene la forma reverencial establecida.'
- source_word: מֶלֶךְ עַל אֲרָם
  english_pob_choice: king over Aram
  chosen_spanish: rey sobre Aram
  alternatives_spanish:
  - rey de Aram
  - rey sobre Siria
  lexicon: HALOT 4428, 5921, 758
  rationale: La preposición עַל se rinde más directamente con 'sobre'. Se conserva 'Aram' para reflejar el nombre hebreo y evitar la equivalencia interpretativa 'Siria'.
theological_decisions:
- issue: Nombre divino YHWH en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. La lectura española del proyecto es 'Yahvé', por fidelidad al nombre pactal y en coherencia con el marco doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título real 'king over Aram'
  english_pob_reading: king over Aram
  chosen_spanish_reading: rey sobre Aram
  alternative_spanish_readings:
  - rey de Aram
  - rey sobre Siria
  rationale: No se suaviza la preposición a una formulación posesiva. 'Sobre' preserva la relación de dominio expresada por עַל; 'Aram' mantiene el referente hebreo sin interpretación geopolítica posterior.
  doctrine_reference: HALOT; audit trail lexical decision for עַל
translation_notes:
  revision_awareness: El rastro de revisión indica acuerdo alto y sin cambios necesarios; por eso el borrador sigue de cerca el sentido confirmado del inglés POB, pero ajusta el nombre divino al estándar español del proyecto ('Yahvé') y conserva las tensiones léxicas de esclavo/siervo y sobre/de en el cierre.
  spanish_consistency_notes:
  - Se mantiene 'Aram' y no 'Siria' para coherencia con el nombre propio hebreo.
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - '''este perro'' conserva la deíxis degradante del hebreo y la elección inglesa ''this dog''.'
  - La puntuación dialogal con comillas angulares no se usa para mantener un estilo bíblico amplio y legible en español.
