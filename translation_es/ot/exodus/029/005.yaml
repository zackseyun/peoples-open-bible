translation:
  language: es
  text: Entonces tomarás las vestiduras y vestirás a Aarón con la túnica, el manto del efod, el efod y el pectoral[a]; y lo ceñirás[b] con la banda hábilmente tejida del efod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente se ha traducido «coraza» o «placa pectoral»; el hebreo denota más ampliamente una pieza del pecho, por eso se usa «pectoral».
    reason: lexical_alternative
  - marker: b
    text: O «y lo atarás sobre él con la banda tejida del efod». El verbo hebreo es raro y puede enfatizar el acto de ajustar o ceñir el efod sobre Aarón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: Then you shall take
  chosen_spanish: Entonces tomarás
  alternatives_spanish:
  - Y tomarás
  - Tomarás
  lexicon: HALOT
  rationale: El hebreo introduce una instrucción secuencial; «Entonces» conserva el valor procedimental de la cadena narrativa/ritual sin volver rígida la sintaxis en español.
- source_word: הַבְּגָדִים
  english_pob_choice: the garments
  chosen_spanish: las vestiduras
  alternatives_spanish:
  - las prendas
  - las ropas
  lexicon: HALOT
  rationale: En un contexto sacerdotal, «vestiduras» mantiene el registro formal y cultual mejor que el término más general «ropas», sin importar terminología eclesiástica ajena al hebreo.
- source_word: וְהִלְבַּשְׁתָּ אֶת־אַהֲרֹן
  english_pob_choice: and clothe Aaron
  chosen_spanish: y vestirás a Aarón
  alternatives_spanish:
  - y pondrás sobre Aarón
  - y revestirás a Aarón
  lexicon: HALOT
  rationale: El causativo de לבש se expresa naturalmente en español con «vestir»; «revestir» es posible, pero suena más marcado y menos directo aquí.
- source_word: הַכֻּתֹּנֶת
  english_pob_choice: the tunic
  chosen_spanish: la túnica
  alternatives_spanish:
  - la ropa interior
  - la saya
  lexicon: HALOT
  rationale: «Túnica» es el equivalente transparente y reverente para la prenda básica cercana al cuerpo; evita arcaísmos o especificaciones que no exige el hebreo.
- source_word: מְעִיל הָאֵפֹד
  english_pob_choice: the robe of the ephod
  chosen_spanish: el manto del efod
  alternatives_spanish:
  - la ropa del efod
  - el manto del efod
  lexicon: HALOT
  rationale: «מְעִיל» puede rendirse como «manto» en español bíblico actual; se conserva el genitivo «del efod» para reflejar la construcción y evitar una paráfrasis explicativa no sustentada.
- source_word: הָאֵפֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el éfod
  lexicon: HALOT
  rationale: Se translitera el término técnico sin traducirlo, porque el hebreo nombra una pieza sacerdotal específica sin equivalente exacto en español.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - la pieza del pecho
  - el pecho ornamentado
  lexicon: HALOT
  rationale: «Pectoral» comunica bien en español la pieza colocada sobre el pecho y evita la connotación más bélica de «coraza/placa» que tendría «breastplate».
- source_word: וְאָפַדְתָּ לוֹ
  english_pob_choice: and you shall bind it on him
  chosen_spanish: y lo ceñirás
  alternatives_spanish:
  - y lo atarás
  - y lo sujetarás
  lexicon: HALOT
  rationale: El verbo raro אפד tiene un matiz de ceñir/ajustar la prenda; «ceñir» transmite mejor la acción ritual de fijación sin perder la ambigüedad lexical que el hebreo conserva.
- source_word: בְּחֵשֶׁב הָאֵפֹד
  english_pob_choice: with the skillfully woven band of the ephod
  chosen_spanish: con el cinturón tejido del efod
  alternatives_spanish:
  - con la banda tejida del efod
  - con el ceñidor tejido del efod
  lexicon: HALOT
  rationale: El sustantivo חֵשֶׁב aquí designa la banda o tejido de sujeción del efod. «Cinturón tejido» es claro en español y mantiene la función de sujeción; se evita añadir «habilidosamente» como adverbio independiente, porque en el hebreo la cualidad pertenece al tejido/banda.
- source_word: implícito objeto en וְאָפַדְתָּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - el efod
  lexicon: Hebrew syntax
  rationale: El español necesita un objeto explícito. Dado el contexto inmediato, «lo» retoma la prenda/ensamble referido por el verbo sin sobreexplicar.
theological_decisions:
- issue: Terminología del efod y del pectoral
  english_pob_reading: The passage uses technical priestly garment terms without collapsing them into later ecclesiastical or military language.
  chosen_spanish_reading: Se conservan los tecnicismos «efod» y «pectoral» sin sustituirlos por términos más tradicionales pero menos precisos.
  alternative_spanish_readings:
  - el efod y la coraza
  - el delantal sacerdotal y el pectoral
  rationale: La fidelidad al inventario cultual exige mantener los nombres técnicos. «Coraza» introduciría una imagen armamentística ajena al contexto, y «delantal sacerdotal» sería explicativo pero no fuente-cautivo.
  doctrine_reference: Éxodo 28–29 (vestiduras sacerdotales)
translation_notes:
  revision_awareness: 'El inglés POB revisó la cláusula final de «fasten» a «bind» y movió «skillfully» para que modifique la banda tejida. Esta versión española sigue esa revisión: «lo ceñirás» mantiene el verbo de sujeción, y «tejido» califica a «cinturón», no a un adverbio independiente. También conserva la decisión del audit trail de no traducir אֵפֹד por un equivalente funcional genérico.'
  spanish_consistency_notes:
  - Se mantiene «efod» de forma uniforme como tecnicismo transliterado.
  - «Vestiduras» y «túnica» sostienen un registro sacerdotal sin arcaizar en exceso.
  - «Pectoral» evita la lectura militar de «breastplate» y encaja con el contexto ritual.
  - La puntuación con punto y coma refleja la lista de prendas y la clausula final de sujeción.
