    changes_summary: Changed 'into the slander' to 'in the slander' for a more natural and literal rendering of the Hebrew preposition; otherwise retained the draft.
translation:
  language: es
  text: 'Por tanto, profetiza y di[a]: «Así dice el Señor Dios Yahvé: Porque, sí, porque los han dejado desolados y han arremetido contra ustedes desde todos lados, de modo que llegaron a ser posesión para el remanente de las naciones, y llegaron a los labios de la gente y a la difamación del pueblo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han ido tras ustedes con ansia», «los han engullido» o «han jadeado tras ustedes»; el verbo hebreo es difícil y expresa una presión hostil y depredadora de las naciones circundantes.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «subieron sobre el labio de la lengua», un modismo que significa que se volvieron asunto del habla de la gente.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa bien la inferencia profética del contexto anterior sin sonar artificial en español.
- source_word: הִנָּבֵא וְאָמַרְתָּ
  english_pob_choice: prophesy and say
  chosen_spanish: profetiza y di
  alternatives_spanish:
  - profetiza, y dirás
  - profetiza y declara
  lexicon: HALOT
  rationale: Mantiene el imperativo dirigido a Ezequiel y la fórmula profética directa.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Conserva el nombre divino como Yahvé, conforme al estándar del proyecto, y evita la sustitución por una máscara reverencial.
- source_word: יַעַן בְּיַעַן
  english_pob_choice: Because, indeed because
  chosen_spanish: Porque, sí, porque
  alternatives_spanish:
  - Porque, de hecho, porque
  - Ya que, sí, ya que
  lexicon: HALOT
  rationale: Intenta reflejar la duplicación enfática causal sin aplastarla en un solo 'porque'. La repetición mantiene el énfasis retórico del hebreo.
- source_word: שַׁמּוֹת
  english_pob_choice: they have made you desolate
  chosen_spanish: los han dejado desolados
  alternatives_spanish:
  - los han devastado
  - los han arrasado
  lexicon: HALOT
  rationale: '''Dejado desolados'' conserva el sentido de convertir en desierto/ruina y funciona bien en español para el objeto plural implícito del contexto.'
- source_word: וְשָׁאֹף
  english_pob_choice: have snapped at you
  chosen_spanish: han arremetido contra ustedes
  alternatives_spanish:
  - han acechado a ustedes
  - han ido tras ustedes con saña
  lexicon: HALOT
  rationale: El verbo es difícil; 'arremetido contra' comunica la presión hostil y predatoria sin obligar a una metáfora extraña en español. Conserva la tensión lexical reconocida por la POB inglesa.
- source_word: מִסָּבִיב
  english_pob_choice: from every side
  chosen_spanish: desde todos lados
  alternatives_spanish:
  - de todos lados
  - alrededor
  lexicon: HALOT
  rationale: Equivalente idiomático natural para expresar hostilidad circundante.
- source_word: לִהְיוֹתְכֶם מוֹרָשָׁה
  english_pob_choice: so that you became a possession
  chosen_spanish: de modo que llegaron a ser posesión
  alternatives_spanish:
  - para que fueran posesión
  - hasta llegar a ser posesión
  lexicon: HALOT
  rationale: '''Posesión'' refleja מוֹרָשָׁה como algo adquirido/apropiado; ''llegaron a ser'' preserva el valor resultativo.'
- source_word: לִשְׁאֵרִית הַגּוֹיִם
  english_pob_choice: for the remnant of the nations
  chosen_spanish: para el remanente de las naciones
  alternatives_spanish:
  - para el resto de las naciones
  - para las naciones restantes
  lexicon: HALOT
  rationale: '''Remanente'' conserva la fuerza lexical de שְׁאֵרִית sin convertirlo en una explicación interpretativa.'
- source_word: וַתֵּעֲלוּ עַל שְׂפַת לָשׁוֹן
  english_pob_choice: and you have come up on the lips of the tongue
  chosen_spanish: y subieron a los labios de la lengua
  alternatives_spanish:
  - y llegaron a los labios de la lengua
  - y se volvieron tema de la lengua
  lexicon: HALOT
  rationale: Se retiene la imagen idiomática difícil con una sintaxis española comprensible; 'subieron' reproduce el movimiento figurado del hebreo.
- source_word: וְדִבַּת עָם
  english_pob_choice: and in the slander of the people
  chosen_spanish: y en la difamación del pueblo
  alternatives_spanish:
  - y en la murmuración del pueblo
  - y en la calumnia del pueblo
  lexicon: HALOT
  rationale: '''Difamación'' comunica el valor de דִבָּה como mala fama/reporte hostil y evita suavizarlo demasiado.'
theological_decisions:
- issue: Tratamiento del tetragrámaton en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El paquete fuente pide que יְהוָה se rinda como 'Yahvé' en el texto principal. En la fórmula compuesta, 'Señor Yahvé' comunica ambos elementos sin recurrir a una máscara tipográfica tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se incorporó la revisión del contexto inglés que prefirió 'in the slander of the people' sobre 'into the slander', y se mantuvo la idea de una preposición locativa en español ('en la difamación'). También se preservó la tensión lexical del verbo קשה/שאף mediante una opción que sigue siendo idiomática en español sin borrar la dificultad reconocida por el POB inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto, no 'SEÑOR' como máscara reverencial.
  - '''Profetiza y di'' mantiene la comisión profética sin agregar tiempo verbal innecesario.'
  - '''Remanente'' se conserva para שְׁאֵרִית, y ''posesión'' para מוֹרָשָׁה, según la fuerza lexical del hebreo.'
  - La expresión idiomática de 'labios de la lengua' se conserva con una nota para que el lector entienda su valor figurado.
  - '''Difamación'' se prefiere a ''gossip'' o ''murmuración'' por la carga negativa más fuerte del sustantivo hebreo.'
