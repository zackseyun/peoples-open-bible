translation:
  language: es
  text: El que revela secretos anda de chismoso[a]; no te asocies con el que abre demasiado los labios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «anda difundiendo chismes». La expresión hebrea describe a quien va por ahí propagando rumores o información perjudicial.
    reason: lexical_alternative
  - marker: b
    text: Lit., «con el que abre sus labios». La frase alude a una persona que habla con demasiada libertad o demasiado.
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹלֶה סּוֹד
  english_pob_choice: reveals secrets
  chosen_spanish: revela secretos
  alternatives_spanish:
  - descubre secretos
  - pone al descubierto secretos
  lexicon: HALOT
  rationale: גלה con סוד expresa la acción de sacar a la luz información confidencial. En español, «revela secretos» conserva el sentido de divulgación indebida sin exagerar el matiz.
- source_word: הוֹלֵךְ רָכִיל
  english_pob_choice: goes about as a gossip
  chosen_spanish: anda en chismes
  alternatives_spanish:
  - anda de chismoso
  - va de chisme en chisme
  - anda difundiendo chismes
  lexicon: HALOT
  rationale: רכיל puede denotar a quien trafica con rumores dañinos. «Anda en chismes» mantiene el movimiento del hebreo y la idea de actividad habitual de habla perjudicial, de forma natural en español.
- source_word: וּלְפֹתֶה שְׂפָתָיו
  english_pob_choice: with one who opens his lips wide
  chosen_spanish: con el que abre demasiado los labios
  alternatives_spanish:
  - con el que habla demasiado libremente
  - con el que abre sus labios
  - con el de labios sueltos
  lexicon: HALOT
  rationale: La construcción apunta a una persona que habla con excesiva libertad. «Abre demasiado los labios» conserva la imagen corporal del hebreo y comunica la indiscreción verbal sin añadir contenido ajeno.
- source_word: לֹא תִתְעָרָב
  english_pob_choice: do not associate
  chosen_spanish: no te asocies
  alternatives_spanish:
  - no te mezcles
  - no te involucres
  - no hagas compañía
  lexicon: HALOT
  rationale: El hitpael de ערב aquí significa mezclarse o asociarse con alguien. «No te asocies» es claro, proverbial y fiel al sentido relacional del verbo.
translation_notes:
  revision_awareness: 'El texto español sigue el pasaje hebreo directamente y toma como apoyo el audit trail inglés: se mantiene la progresión de dos miembros proverbiales, pero se prefiere un español natural que conserve la fuerza moral del original. Se refleja la revisión inglesa que favorece un término de conversación dañina en vez de uno más jurídico.'
  spanish_consistency_notes:
  - Se usó «secretos» para סוד, en coherencia con el sentido práctico del proverbio.
  - Se evitó «calumniador» o «slander» porque el registro auditado privilegia el chisme/rumor dañino de רכיל.
  - Se mantuvo la imagen de «los labios» para no perder la metáfora hebrea.
  - La negación se vertió con imperativo exhortativo de segunda persona singular, adecuado al tono sapiencial.
