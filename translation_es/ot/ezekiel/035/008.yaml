translation:
  language: es
  text: Y llenaré sus montes con sus muertos; sobre tus collados[a], en tus valles y en todos tus barrancos, caerán los muertos a espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «caerán en ellos», refiriéndose a los collados, valles y barrancos recién nombrados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִלֵּאתִי
  english_pob_choice: I will fill
  chosen_spanish: llenaré
  alternatives_spanish:
  - y llenar&eacute;
  lexicon: HALOT
  rationale: El hebreo con waw y perfecto profético expresa aquí una declaración futura. En español conviene un futuro simple natural; el valor conjuntivo de la waw queda reflejado en la continuidad del enunciado sin forzar un "y" inicial en la línea principal.
- source_word: הָרָיו
  english_pob_choice: its mountains
  chosen_spanish: sus montes
  alternatives_spanish:
  - sus montañas
  lexicon: HALOT
  rationale: '"Montes" conserva el registro bíblico y topográfico adecuado para la tierra personificada. "Sus" mantiene el referente territorial/corporativo del sufijo de 3ms, como en el inglés POB.'
- source_word: חֲלָלָיו
  english_pob_choice: its slain
  chosen_spanish: sus muertos
  alternatives_spanish:
  - sus caídos
  - sus heridos de muerte
  lexicon: HALOT
  rationale: Aunque el término suele significar los muertos en combate o los heridos mortales, en español "muertos" comunica de forma más directa el resultado de la violencia. Se preserva el matiz bélico por el contexto y por la frase siguiente "a espada".
- source_word: גִּבְעוֹתֶיךָ
  english_pob_choice: your hills
  chosen_spanish: tus collados
  alternatives_spanish:
  - tus colinas
  - tus montes
  lexicon: HALOT
  rationale: '"Collados" es un término bíblico y claro para el primer elemento de la lista topográfica. Se evita "lugares altos" porque el contexto no exige la carga cultual de "high places".'
- source_word: גֵאוֹתֶיךָ
  english_pob_choice: your valleys
  chosen_spanish: tus valles
  alternatives_spanish:
  - tus hondonadas
  - tus alturas
  lexicon: HALOT
  rationale: Siguiendo el contexto de la tríada paisaje-hills/valleys/ravines del inglés POB, "valles" es la opción más natural en español y evita introducir la idea de exaltación o altura.
- source_word: אֲפִיקֶיךָ
  english_pob_choice: your ravines
  chosen_spanish: tus barrancos
  alternatives_spanish:
  - tus cauces
  - tus quebradas
  - tus arroyos
  lexicon: HALOT
  rationale: '"Barrancos" transmite bien la idea de canales o hondonadas del terreno y funciona de modo idiomático en la serie topográfica. Se evita "arroyos" para no sugerir necesariamente agua corriente.'
- source_word: חַלְלֵי חֶרֶב
  english_pob_choice: those slain by the sword
  chosen_spanish: los heridos a espada
  alternatives_spanish:
  - los muertos a espada
  - los caídos por la espada
  lexicon: HALOT
  rationale: El hebreo puede abarcar a los alcanzados mortalmente por la espada. "Heridos a espada" conserva el impacto violento y deja abierta la noción de muerte implícita en el contexto, sin perder la fuerza del participio.
- source_word: יִפְּלוּ בָהֶם
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - caerán en ellos
  - caerán sobre ellos
  lexicon: HALOT
  rationale: El verbo se traduce de forma directa y natural. La locución final se deja implícita en la línea principal, como en el inglés POB, porque la serie de lugares ya enmarca el sentido locativo.
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado del inglés POB: la conjunción inicial waw se integra de manera natural en español; la lista topográfica se mantiene en forma coherente; y el locativo final se conserva como sentido implícito, con nota alternativa, igual que en el texto base inglés.'
  spanish_consistency_notes:
  - Se usó "Y" solo en la puntuación normalizada del arranque implícito en la versión española, sin duplicar el valor conjuntivo del hebreo.
  - 'Se eligieron términos topográficos concretos y no cultuales: collados, valles y barrancos.'
  - '"Sus" y "tus" reflejan correctamente el cambio de referente del sufijo en el hebreo (3ms y 2ms) según la personificación del territorio.'
  - Se evitó "SEÑOR" u otra sustitución teológica, pues no hay aquí un nombre divino a resolver.
