translation:
  language: es
  text: Todo lo que tu mano halle para hacer, hazlo con todas tus fuerzas, porque no hay obra ni planificación ni conocimiento ni sabiduría en el Seol[a], adonde vas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tumba» o «el reino de los muertos». El término hebreo «Seol» se refiere al lugar o estado de los muertos en el Antiguo Testamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: Whatever
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Cualquier cosa que
  - Todo aquello que
  lexicon: HALOT
  rationale: La expresión introduce una relativa amplia e inclusiva; «Todo lo que» conserva la amplitud sin sonar forzada en español.
- source_word: תִּמְצָא יָדְךָ
  english_pob_choice: your hand finds
  chosen_spanish: tu mano halle
  alternatives_spanish:
  - tu mano encuentre
  - encuentres
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como lugar de oportunidad y capacidad práctica, en vez de reducirla a un simple «encuentres».
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para obrar
  - para realizar
  lexicon: HALOT
  rationale: «Hacer» es la forma más directa y general para el infinitivo de עשה en este contexto.
- source_word: בְּכֹחֲךָ
  english_pob_choice: with your might
  chosen_spanish: con todo tu poder
  alternatives_spanish:
  - con tu fuerza
  - con todas tus fuerzas
  lexicon: HALOT
  rationale: El inglés POB revisó la frase hacia una expresión más idiomática; en español, «con todo tu poder» transmite bien la intensidad exigida sin perder el matiz de capacidad/energía disponible. Se evita un calco rígido, pero también se evita añadir una formulación demasiado ajena al registro bíblico.
- source_word: עֲשֵׂה
  english_pob_choice: do it
  chosen_spanish: hazlo
  alternatives_spanish:
  - haz eso
  - haz
  lexicon: HALOT
  rationale: El imperativo retoma la acción ya mencionada; «hazlo» es natural en español y mantiene la referencia implícita al objeto anterior.
- source_word: מַעֲשֶׂה
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - actividad
  lexicon: HALOT
  rationale: «Obra» conserva bien el campo de acción/actividad concreta y suena bíblico sin volverse arcaizante en exceso; evita restringir el sentido a empleo o labor asalariada.
- source_word: חֶשְׁבּוֹן
  english_pob_choice: planning
  chosen_spanish: planeación
  alternatives_spanish:
  - planificación
  - cálculo
  lexicon: HALOT
  rationale: El sustantivo puede abarcar cálculo, reflexión o planificación; «planeación» expresa adecuadamente la capacidad de disponer y ordenar acciones futuras, en línea con la lectura auditada.
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - entendimiento
  lexicon: HALOT
  rationale: «Conocimiento» mantiene el sentido cognitivo básico y armoniza con la serie de facultades ausentes en el Seol.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: HALOT
  rationale: «Sabiduría» es la equivalencia estable en el corpus sapiencial y preserva el término técnico sin reducirlo a mera prudencia.
- source_word: בִּשְׁאוֹל
  english_pob_choice: in Sheol
  chosen_spanish: en el Seol
  alternatives_spanish:
  - en la tumba
  - en el reino de los muertos
  lexicon: HALOT
  rationale: Se translitera el término para conservar la noción veterotestamentaria específica y no importar una categoría posterior como «infierno». La mayúscula no es necesaria en español; se conserva como sustantivo propio de concepto teológico-bíblico.
- source_word: אֲשֶׁר אַתָּה הֹלֵךְ שָׁמָּה
  english_pob_choice: where you are going
  chosen_spanish: adonde tú vas
  alternatives_spanish:
  - donde tú vas
  - a donde tú vas
  lexicon: HALOT
  rationale: La relativa final/local se expresa de modo natural en español con «adonde», preservando el movimiento y la dirección del hebreo.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: Se conserva el término técnico hebreo como transliteración para no neutralizar la referencia del texto y para mantener la tensión semántica señalada por la auditoría inglesa. El lector hispano recibe así el concepto bíblico específico, con una forma española estándar («Seol»).
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza de בְּכֹחֲךָ
  english_pob_reading: with your might
  chosen_spanish_reading: con todo tu poder
  alternative_spanish_readings:
  - con tu fuerza
  - con todas tus fuerzas
  rationale: La exhortación enfatiza la entrega plena de la capacidad presente; la redacción escogida comunica intensidad sin exagerar ni atenuar el mandato. Se evita trivializar la apelación a la energía humana disponible.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'La versión española corrige el problema previo de anclaje de nota: el marcador [a] aparece ahora exactamente en «hacer[a]». Además, integra la revisión auditada del inglés («with your might») en un español natural («con todo tu poder») y conserva la transliteración técnica de שְׁאוֹל como «Seol».'
  spanish_consistency_notes:
  - Se usa «Seol» de manera consistente como transliteración bíblica estándar, evitando sustituirlo por «infierno».
  - Se mantiene un tono formal y público, apto para lectura eclesial.
  - 'Se conserva la serie nominal del hebreo con paralelismo claro: obra / planeación / conocimiento / sabiduría.'
