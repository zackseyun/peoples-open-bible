translation:
  language: es
  text: Y Sadoc el sacerdote y los sacerdotes que eran sus compañeros estaban delante del tabernáculo de Yahvé en el lugar alto que estaba en Gabaón.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus hermanos, los sacerdotes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵת
  english_pob_choice: And [left object marker untranslated while carrying forward the coordination]
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Asímismo
  lexicon: HALOT
  rationale: El hebreo introduce la continuación con waw y la marca de objeto no tiene equivalente directo en español. Aquí se conserva la simple coordinación narrativa con ‘Y’, sin forzar un calco de la partícula.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  lexicon: HALOT
  rationale: Se conserva el nombre propio mediante transliteración habitual al español bíblico. ‘Sadoc’ refleja la forma castellana más extendida y publicaable, sin alterar la identidad del personaje.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote principal
  - el sacerdote
  lexicon: HALOT
  rationale: El título definido identifica el oficio de Sadoc. En español, ‘sacerdote’ comunica de manera natural el cargo cultual sin introducir matices ajenos al hebreo.
- source_word: וְאֶחָיו הַכֹּהֲנִים
  english_pob_choice: and his fellow priests
  chosen_spanish: y sus compañeros sacerdotes
  alternatives_spanish:
  - y sus hermanos, los sacerdotes
  - y sus hermanos sacerdotes
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘sus hermanos, los sacerdotes’, pero en este contexto funcional alude a colegas del ministerio y no necesariamente a hermanos biológicos. ‘Compañeros sacerdotes’ preserva la relación grupal y evita una lectura excesivamente literal en español.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: La preposición marca ubicación frente al santuario. ‘Delante de’ es natural y mantiene la relación espacial/presencial del texto.
- source_word: מִשְׁכַּן יְהוָה
  english_pob_choice: the tabernacle of Yahweh
  chosen_spanish: el tabernáculo de Yahvé
  alternatives_spanish:
  - la morada de Yahvé
  - la tienda de Yahvé
  lexicon: HALOT
  rationale: ‘Mishkán’ nombra el santuario portátil, y ‘tabernáculo’ es el equivalente establecido y preciso. Se usa ‘Yahvé’ según el criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: ‘Yahvé’, en lugar de la convención de ocultarlo tras un título.'
- source_word: בַּבָּמָה
  english_pob_choice: at the high place
  chosen_spanish: en el lugar alto
  alternatives_spanish:
  - en el alto lugar
  - en el lugar de culto alto
  lexicon: HALOT
  rationale: ‘Bamáh’ designa un lugar de culto elevado. En español, ‘lugar alto’ transmite el término sin cargarlo automáticamente con la valoración negativa posterior de algunos pasajes.
- source_word: אֲשֶׁר בְּגִבְעוֹן
  english_pob_choice: that was in Gibeon
  chosen_spanish: que estaba en Gabaón
  alternatives_spanish:
  - que estaba en Gibeón
  - en Gabaón
  lexicon: HALOT
  rationale: La cláusula relativa especifica la ubicación del lugar alto. ‘Gabaón’ es una forma española bíblica clara y reconocible para el topónimo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton. Mantener ‘Yahvé’ preserva el nombre del pacto y sigue la norma del proyecto, en vez de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de ‘sus hermanos, los sacerdotes’ en contexto cultual
  english_pob_reading: his fellow priests
  chosen_spanish_reading: sus compañeros sacerdotes
  alternative_spanish_readings:
  - sus hermanos, los sacerdotes
  - sus hermanos sacerdotes
  rationale: La expresión hebrea puede denotar parentesco o asociación. Aquí el contexto administrativo y litúrgico favorece la idea de colegas del oficio. ‘Compañeros sacerdotes’ evita imponer una relación de sangre que el contexto no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral) and §6 (readable modern Spanish)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. No se detectaron revisiones aplicadas en la última pasada; se conserva la decisión de leer אֶחָיו en contexto como un grupo colegiado sacerdotal, no como hermanos biológicos. Se mantienen Yahvé, tabernáculo y lugar alto según las decisiones documentadas.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יהוה.
  - Se prefiere ‘sacerdote/sacerdotes’ en lugar de formas eclesiásticas más tradicionales que no añaden precisión.
  - ‘Lugar alto’ conserva el valor cultual de בָּמָה sin explicitar una evaluación negativa que el contexto inmediato no introduce.
  - El nombre propio del sacerdote se adapta a la forma castellana ‘Sadoc’, coherente con el registro bíblico en español.
