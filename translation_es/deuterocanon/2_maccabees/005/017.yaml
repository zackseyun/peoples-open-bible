translation:
  language: es
  text: Y Antíoco se envaneció en su mente[a], sin percibir que el Maestro[b] se había airado por un poco de tiempo a causa de los pecados de los que habitaban la ciudad; por eso hubo descuido[c] respecto del lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue levantado en su mente» o «se infló en su mente». El griego expresa la altivez interior de Antíoco.'
    reason: lexical_alternative
  - marker: b
    text: «Maestro» traduce el griego despotes, un título distinto de kyrios («Señor»).
    reason: lexical_alternative
  - marker: c
    text: 'O: «desatención» o «el lugar fue pasado por alto»; probablemente alude a la exposición temporal del santuario a la profanación.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμετεωρίζετο
  english_pob_choice: became arrogant in mind
  chosen_spanish: se envaneció en su pensamiento
  alternatives_spanish:
  - se elevó en su pensamiento
  - se volvió arrogante en su mente
  - se infló en su pensamiento
  lexicon: LSJ
  rationale: La imagen griega de ser “levantado” o “suspendido” en la mente se traduce aquí por un verbo español natural que conserva la idea de soberbia interior. “Se envaneció” comunica bien la altivez mental sin perder el matiz idiomático.
- source_word: διάνοιαν
  english_pob_choice: mind
  chosen_spanish: pensamiento
  alternatives_spanish:
  - mente
  - entendimiento
  lexicon: BDAG
  rationale: En español, “pensamiento” mantiene el foco en la disposición interior de Antíoco dentro de la expresión idiomática, sin sonar tan técnico como “entendimiento” ni tan abstracto como “mente” en este contexto.
- source_word: οὐ συνορῶν
  english_pob_choice: not perceiving
  chosen_spanish: sin percibir
  alternatives_spanish:
  - sin entender
  - sin ver
  lexicon: LSJ
  rationale: “Percibir” conserva tanto el valor cognitivo como el perceptivo del participio, y encaja con la idea de que Antíoco no captó la verdadera causa de lo que ocurría.
- source_word: ἀπώργισται
  english_pob_choice: had been angered
  chosen_spanish: había sido indignado
  alternatives_spanish:
  - había sido airado
  - se había irritado
  lexicon: LSJ
  rationale: La forma perfecta pasiva sugiere un estado resultante de una provocación previa. “Había sido indignado” mantiene ese sentido de haber sido movido a ira sin convertir el texto en una afirmación más fuerte de lo que el griego exige.
- source_word: βραχέως
  english_pob_choice: for a little while
  chosen_spanish: por un poco de tiempo
  alternatives_spanish:
  - por breve tiempo
  - por un instante
  lexicon: LSJ
  rationale: La frase española preserva la limitación temporal importante para la teología del versículo. “Por un poco de tiempo” suena natural y refleja la duración breve de la indignación divina.
- source_word: ὁ δεσπότης
  english_pob_choice: the Master
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Dueño
  - el Soberano
  lexicon: BDAG
  rationale: Se conserva la distinción entre δεσπότης y κύριος con “Maestro”, evitando la fusión automática con “Señor”. Aunque es un título menos común, en español mantiene la relación de autoridad absoluta que el griego expresa.
- source_word: πάρορασις
  english_pob_choice: disregard
  chosen_spanish: desconsideración
  alternatives_spanish:
  - descuido
  - omisión
  - desatención
  lexicon: LSJ
  rationale: El sustantivo griego denota pasar por alto u omitir. “Desconsideración” intenta captar esa idea de haber sido dejado de lado el lugar, sin forzar un abandono total o permanente.
- source_word: περὶ τὸν τόπον
  english_pob_choice: for the place
  chosen_spanish: para el lugar
  alternatives_spanish:
  - con respecto al lugar
  - acerca del lugar
  lexicon: LSJ
  rationale: “Para el lugar” funciona de forma directa con “hubo desconsideración” y deja abierta la referencia al lugar santo sin especificarla más allá de lo que el griego dice.
- source_word: τῶν τὴν πόλιν οἰκούντων
  english_pob_choice: those dwelling in the city
  chosen_spanish: de los que habitaban la ciudad
  alternatives_spanish:
  - de los habitantes de la ciudad
  - de los que vivían en la ciudad
  lexicon: BDAG
  rationale: La construcción participial se vierte de manera transparente en español y conserva el vínculo causal entre los pecados del pueblo y la indignación temporal del Maestro.
theological_decisions:
- issue: Cómo traducir δεσπότης sin borrar la distinción respecto de κύριος
  english_pob_reading: the Master
  chosen_spanish_reading: el Maestro
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  rationale: El griego usa δεσπότης, no κύριος. Para mantener la primacía del original y la distinción léxica documentada por la POB inglesa, se conserva una forma que expresa autoridad real sin convertirla en el título tradicional “Señor”.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original y tratamiento diferenciado de títulos divinos.'
- issue: Cómo reflejar la indignación temporal de Dios sin resolver el mecanismo teológico
  english_pob_reading: the Master had been angered for a little while... therefore there came to be disregard for the place
  chosen_spanish_reading: el Maestro había sido indignado por un poco de tiempo... por eso hubo desconsideración para el lugar
  alternative_spanish_readings:
  - el Maestro se había indignado por breve tiempo... por eso hubo descuido para el lugar
  - el Maestro había mostrado ira por un breve tiempo... por eso el lugar fue pasado por alto
  rationale: 'La frase mantiene la tensión teológica: Dios no es impotente, sino que permitió una breve exposición del lugar sagrado relacionada con los pecados del pueblo. La traducción evita explicar más de lo que el texto dice sobre la forma exacta de ese “pasar por alto”.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y no resolverla artificialmente.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete 1909 y el audit trail inglés, sin cambios sustantivos respecto al pase de revisión más reciente, que indicó conformidad alta y no requirió ajustes. Se preservan las dos tensiones documentadas: la altivez mental de Antíoco y el matiz de un breve dejar de lado del lugar santo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero aquí el texto usa δεσπότης y por eso se traduce como «el Maestro».
  - Se conserva el registro bíblico formal y sobrio, evitando «SEÑOR» para δεσπότης.
  - Se evita cargar «desconsideración» con un sentido moral moderno; aquí funciona como equivalente de ‘pasar por alto’ en contexto sagrado.
  - 'La estructura causal del verso queda explícita: pecados del pueblo -> indignación breve del Maestro -> desconsideración para el lugar.'
