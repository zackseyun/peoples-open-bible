translation:
  language: es
  text: He aquí, Yahvé está vaciando la tierra[a] y dejándola desolada; distorsionará[b] su superficie y dispersará a sus habitantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país» en lugar de «la tierra»; el hebreo אֶרֶץ puede significar cualquiera de los dos, pero el contexto más amplio aquí favorece un sentido universal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su faz» o «su rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introductoria marca una proclamación profética con énfasis deíctico. En español, «¡Mira!» comunica la misma llamada de atención de manera natural y solemne, sin volverlo arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma de proyecto «Yahvé», conforme al criterio terminológico del POB en español, en lugar de sustituirlo por un título.
- source_word: בּוֹקֵק
  english_pob_choice: is emptying
  chosen_spanish: está vaciando
  alternatives_spanish:
  - está dejando vacío
  - está despojando
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. «Está vaciando» conserva la imagen básica de vaciar/emptying sin perder la fuerza verbal del hebreo.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «the earth» por el contexto universal, en español «la tierra» puede abarcar ese sentido amplio de manera natural y digna, sin restringir indebidamente a un territorio local.
- source_word: וּבֹלְקָהּ
  english_pob_choice: and laying it waste
  chosen_spanish: y dejándola desolada
  alternatives_spanish:
  - y devastándola
  - y arrasándola
  lexicon: HALOT
  rationale: El verbo raro intensifica la idea de ruina junto con בוקק. «Dejándola desolada» comunica el resultado devastador con naturalidad en español, manteniendo la doble imagen de vaciar y arrasar.
- source_word: וְעִוָּה
  english_pob_choice: he will distort
  chosen_spanish: distorsionará
  alternatives_spanish:
  - alterará
  - torcerá
  lexicon: HALOT
  rationale: El hebreo describe torcer o deformar. «Distorsionará» refleja el sentido formal y conserva la tensión de una alteración violenta de la forma de la tierra.
- source_word: פָנֶיהָ
  english_pob_choice: its surface
  chosen_spanish: su superficie
  alternatives_spanish:
  - su faz
  - su rostro
  lexicon: HALOT
  rationale: Aunque literalmente es «su rostro/faz», el idioma del objeto terrestre pide una equivalencia clara. «Su superficie» expresa el sentido idiomático que el inglés POB ya documenta.
- source_word: וְהֵפִיץ
  english_pob_choice: and scatter
  chosen_spanish: y dispersará
  alternatives_spanish:
  - y esparcirá
  - y dispersará
  lexicon: HALOT
  rationale: El verbo se usa para dispersar personas. «Dispersará» es una equivalencia natural y precisa; mantiene el matiz judicial del esparcimiento sin introducir una imagen extra.
- source_word: יֹשְׁבֶיהָ
  english_pob_choice: its inhabitants
  chosen_spanish: a sus habitantes
  alternatives_spanish:
  - a los que la habitan
  - a sus moradores
  lexicon: HALOT
  rationale: El participio nominal refiere al conjunto de los que moran en ella. «A sus habitantes» es claro, sobrio y acorde con el valor colectivo del hebreo.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el principio del POB de no ocultar el Nombre propio del pacto tras una sustitución titulativa. «Yahvé» es la forma establecida para el Tetragrámaton en la línea editorial española del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de הָאָרֶץ en Isaías 24
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra
  rationale: El contexto de Isaías 24 es de alcance universal, no meramente local. En español, «la tierra» permite ese sentido global y conserva la ambigüedad lexical sin forzar una restricción a un territorio.
  doctrine_reference: HALOT / contexto inmediato de Isaías 24
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB en inglés, que sustituyó «twist its surface» por «distort its surface». Por eso se eligió «distorsionará su superficie» en vez de una forma más física como «torcerá». También se preservó la decisión doctrinal de traducir יְהוָה como Yahvé, no como un sustituto titular.
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y profético, evitando arcaísmos innecesarios.
  - «La tierra» se usa con alcance universal, en consonancia con el contexto de Isaías 24.
  - Se preservó la distinción entre vaciar/desolar y distorsionar/dispersar, que refleja la acumulación poética del hebreo.
  - El Nombre divino se uniforma como «Yahvé» para mantener consistencia con el proyecto POB en español.
