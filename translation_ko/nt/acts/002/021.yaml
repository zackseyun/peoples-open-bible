id: ACT.2.21
reference: Acts 2:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἔσται πᾶς ὃς ⸀ἐὰν ἐπικαλέσηται τὸ ὄνομα κυρίου σωθήσεται.
base_translation:
  language: en
  yaml_path: translation/nt/acts/002/021.yaml
  text: And it shall be that everyone who calls on the name of the Lord will be saved[a].
  footnotes:
  - marker: a
    text: Or 'whoever calls on the name of the Lord.' The phrase echoes Joel 2:32, where 'the Lord' refers to YHWH; in Acts, Peter applies the citation within his proclamation about Jesus.
    reason: alternative_reading
translation:
  language: ko
  text: 그리고 야훼의[a] 이름을 부르는 자마다 구원을 받을 것이다.』
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 요엘 2:32 인용. 히브리어 원문의 YHWH를 70인역이 κύριος로 옮긴 곳을 「야훼」로 표기한다. 베드로는 이 본문을 곧이어 예수에 관한 선포에 적용한다.
    reason: cross_reference
theological_decisions:
- issue: 요엘 인용 안의 κύριος(=YHWH) 처리 + 베드로의 그리스도론적 적용
  chosen_reading: 야훼
  alternative_readings:
  - 주
  rationale: 인용 자체는 YHWH를 가리키므로 「야훼」로 옮긴다. 베드로가 2:36에서 「하나님께서 그를 주(主)와 메시아가 되게 하셨다」고 선포함으로써 이 인용을 예수께 적용하지만, 21절 인용문 자체의 신명 정체는 보존한다.
  doctrine_reference: 'KOREAN_PIPELINE.md: κύριος(=YHWH) → 야훼'
