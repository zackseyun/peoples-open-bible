revisions:
- from: ¿Quién sabe? Dios[a] puede volverse y arrepentirse[b], y volverse del ardor de su ira[c], para que no perezcamos.
  to: ¿Quién sabe? Dios puede volverse y desistir[a], y volverse del ardor de su ira[b], para que no perezcamos.
  rationale: 'Se reemplaza «arrepentirse» por «desistir» para reflejar mejor el sentido de נחם en este contexto: Dios retira el juicio amenazado, sin implicar error moral. Se elimina la nota innecesaria sobre «Dios» y se conservan las notas útiles sobre el matiz de נחם y la imagen hebrea de «ardor» en la ira divina. El resto del verso se mantiene porque es fiel, claro y preserva la repetición significativa de שוב.'
