translation:
  language: es
  text: Y Jeshúa, Bani, Serebías, Jamín, Acub, Sabetai, Hodías, Maasías, Kelita, Azarías, Jozabad, Hanán, Pelaía, y los levitas daban al pueblo entendimiento[a] en la ley, mientras el pueblo permanecía en sus lugares[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ayudaban al pueblo a entender la ley». El verbo hebreo es causativo: los levitas hacían que la ley fuera entendida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mientras el pueblo permanecía de pie en su lugar». El hebreo expresa literalmente la idea de estar de pie o permanecer en la posición propia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יֵשׁוּעַ ... פְּלָאיָה
  english_pob_choice: Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, Pelaiah
  chosen_spanish: Jesúa, Baní, Serebías, Jamín, Acub, Sabetai, Hodías, Maasías, Quelitá, Azarías, Jozabad, Hanan, Pelaías
  alternatives_spanish:
  - Jesúa ... Pelaías
  - Josué ...
  lexicon: Nombres propios transliterados
  rationale: Se conservan como nombres propios hebreos, no se traducen. 'Jesúa' mantiene la forma tradicional española reconocible y cercana al hebreo; los demás nombres siguen transliteración conservadora para preservar el audit trail y la identificación del texto.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los levitas, es decir, los levitas
  - y los levitas
  lexicon: HALOT
  rationale: Se mantiene la estructura coordinante del hebreo. 'Levitas' es la equivalencia natural y transparente en español; no hace falta resolver si los nombres anteriores incluyen a levitas o si el texto añade un grupo amplio adicional.
- source_word: מְבִינִים
  english_pob_choice: gave the people understanding in the law
  chosen_spanish: daban al pueblo entendimiento en la ley
  alternatives_spanish:
  - hacían que el pueblo entendiera la ley
  - instruían al pueblo en la ley
  - explicaban la ley al pueblo
  lexicon: HALOT
  rationale: 'El verbo es causativo (hifil): no solo ''explicar'', sino causar comprensión. ''Daban ... entendimiento'' conserva ese valor causativo sin perder naturalidad en español y mantiene la conexión con ''en la ley''.'
- source_word: אֶת הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo
  - el pueblo
  lexicon: HALOT
  rationale: El objeto directo con אֶת se expresa en español de modo natural como complemento con 'a'. 'Al pueblo' preserva la relación verbal sin forzar una construcción extraña.
- source_word: לַ/תּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Torá
  - la instrucción
  - la ley
  lexicon: HALOT
  rationale: En este contexto narrativo de lectura pública e interpretación, 'la ley' comunica bien תּוֹרָה y sigue de cerca la elección auditada en inglés. 'Torá' sería posible, pero menos accesible para una lectura general.
- source_word: וְ/הָ/עָ֖ם עַל עָמְדָֽ/ם
  english_pob_choice: while the people remained in their places
  chosen_spanish: mientras el pueblo permanecía en sus lugares
  alternatives_spanish:
  - mientras el pueblo estaba en su lugar
  - mientras el pueblo permanecía en su puesto
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente, ''sobre su estar de pie / lugar''. ''Permanecía en sus lugares'' refleja la idea sin rigidez y conserva el sentido espacial del pasaje. El plural puede corresponder al contexto colectivo.'
theological_decisions:
- issue: Valor causativo de מְבִינִים en la función pública de los levitas
  english_pob_reading: gave the people understanding in the law
  chosen_spanish_reading: daban al pueblo entendimiento en la ley
  alternative_spanish_readings:
  - explicaban la ley al pueblo
  - hacían comprender la ley al pueblo
  - instruían al pueblo en la ley
  rationale: El pasaje no presenta solo lectura, sino mediación interpretativa. Se evita reducirlo a una mera explicación neutral o a una formulación demasiado libre; 'dar entendimiento' mantiene la acción eficaz atribuida a los levitas.
  doctrine_reference: Nehemías 8:7; función didáctica de la instrucción pública en la comunidad del pacto
- issue: Sentido de תּוֹרָה en contexto comunitario
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Torá
  - la instrucción
  rationale: En este contexto de lectura solemne, 'la ley' conserva la dimensión normativa y pública del texto sin introducir tecnicismos innecesarios. No se pierde la referencia a la instrucción pactal.
  doctrine_reference: Nehemías 8:7; uso de תּוֹרָה en la asamblea de Israel
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que corrigió 'explained the law to the people' por 'gave the people understanding in the law' para reflejar mejor el hebreo causativo מְבִינִים. También conserva el cierre sobre el pueblo permaneciendo en sus lugares, sin resolverlo hacia una paráfrasis más fuerte que la evidencia.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en otros pasajes del proyecto cuando corresponde; aquí no aparece el tetragrámaton.
  - '''Ley'' se mantiene para תּוֹרָה en coherencia con el audit trail inglés y la lectura pública del pasaje.'
  - Los nombres propios se transliteran de manera consistente y no se normalizan hacia formas litúrgicas distintas sin necesidad textual.
