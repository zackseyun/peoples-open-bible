    text: O «para el terror» o «para un desastre repentino». El término hebreo puede abarcar pánico, terror o calamidad.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «para el vacío» por «en vano» para lograr una equivalencia española natural y fiel al sentido de labor inútil de לָרִיק. Se conserva «calamidad» con nota por las alternativas léxicas documentadas para בֶּהָלָה. Se añade «ellos» para reflejar con más claridad el pronombre enfático הֵמָּה sin volver la frase artificiosa. No se requieren cambios doctrinales; «Yahvé» permanece correcto.
