translation:
  language: es
  text: He aquí[a], su alma está inflada; no es recta dentro de él, pero el justo vivirá por su fidelidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «el justo vivirá por su fe». El hebreo אֱמוּנָה puede denotar fidelidad, firmeza o fe.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a prestar atención. «He aquí» conserva ese valor deíctico y el registro formal del texto, sin volverlo arcaico en exceso.
- source_word: עֻפְּלָה
  english_pob_choice: is puffed up
  chosen_spanish: está henchida
  alternatives_spanish:
  - está inflada
  - está orgullosa
  lexicon: HALOT
  rationale: La imagen hebrea es de hinchazón/pufamiento, con sentido de arrogancia. «Está henchida» mantiene la metáfora corporal y el matiz de elevación orgullosa mejor que una paráfrasis abstracta.
- source_word: לֹא יָשְׁרָה
  english_pob_choice: it is not upright
  chosen_spanish: no es recta
  alternatives_spanish:
  - no es justa
  - no es derecha
  lexicon: HALOT
  rationale: El predicado expresa rectitud moral. «Recta» reproduce la idea de ישר sin perder naturalidad en español; «justa» podría confundir con el sustantivo jurídico de צַדִּיק.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser interior
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ apunta al interior de la persona en paralelo con su condición moral. «Alma» conserva la dimensión antropológica e interior que el contexto exige.
- source_word: בּוֹ
  english_pob_choice: within him
  chosen_spanish: dentro de él
  alternatives_spanish:
  - en él
  - en su interior
  lexicon: HALOT
  rationale: La preposición marca ubicación interna. «Dentro de él» suena natural en español y preserva la interioridad explícita del hebreo.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el justo hombre
  lexicon: HALOT
  rationale: Como sustantivo-adjetivo, צַדִּיק designa a la persona caracterizada por justicia recta. «El justo» es la forma natural y estable en español bíblico para este tipo de sujeto.
- source_word: בֶּאֱמוּנָתוֹ
  english_pob_choice: by his faithfulness
  chosen_spanish: por su fidelidad
  alternatives_spanish:
  - por su fe
  - por su constancia
  lexicon: HALOT
  rationale: אֱמוּנָה puede significar fidelidad, firmeza o fe. En este contraste profético, la idea de estabilidad leal es primaria; por eso se traduce «fidelidad», dejando abierta la alternativa «fe» según la tensión interpretativa documentada.
- source_word: יִחְיֶה
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - tendrá vida
  - seguirá viviendo
  lexicon: HALOT
  rationale: El verbo expresa simplemente vivir. «Vivirá» preserva la concisión hebrea y permite tanto el sentido de perseverar como el de vivir en plenitud sin sobreinterpretar.
theological_decisions:
- issue: Sentido de אֱמוּנָה en la clausula final
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - fe
  - constancia
  rationale: El POB inglés prioriza la fidelidad/steadfastness, y el contraste con el soberbio favorece esa lectura. Sin embargo, como el término puede recibir una lectura de «fe» en la tradición posterior, la alternativa se conserva implícita en la decisión léxica para no borrar la tensión semántica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; contested faith/faithfulness tension
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del audit trail, que sustituyó un inicio más coloquial por «Behold» para un registro más formal; en español se resolvió con «He aquí», manteniendo el tono reverente y la fuerza de atención del hebreo. También se preservó la tensión semántica de אֱמוּנָה sin resolverla de manera exclusiva.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - Se prefirió «el justo» como equivalente estable de צַדִּיק en el registro bíblico.
  - Se mantuvo una traducción no mecánica pero cercana al hebreo, con imagen corporal en «henchida» para no diluir עֻפְּלָה.
  - 'La nota alternativa se ancla en el mismo punto donde aparece la tensión interpretativa en el texto: la frase final sobre אֱמוּנָה.'
