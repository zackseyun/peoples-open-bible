translation:
  language: es
  text: '«¡Apártense! ¡Inmundos!», les gritaron. «¡Apártense, apártense, no toquen!». Porque huyeron[a]; hasta vagaron. Entre las naciones dijeron: «Ya no seguirán residiendo»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron expulsados»; el verbo hebreo es raro y su matiz en este contexto es debatido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Ya no seguirán sojornando», preservando el matiz de residir como extranjeros o forasteros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּרוּ
  english_pob_choice: Turn aside
  chosen_spanish: ¡Apártense!
  alternatives_spanish:
  - ¡Aléjense!
  - ¡Retírense!
  lexicon: HALOT
  rationale: El imperativo plural comunica apartarse para evitar contacto impuro. «Apártense» conserva la fuerza de orden urgente sin sonar excesivamente libre.
- source_word: טָמֵא
  english_pob_choice: Unclean
  chosen_spanish: ¡Inmundos!
  alternatives_spanish:
  - ¡Impuros!
  lexicon: HALOT
  rationale: En contexto cultual y social, «inmundos» mantiene el matiz de contaminación ritual y el tono exclamativo del hebreo. «Impuro» sería posible, pero menos idiomático en esta invectiva corta.
- source_word: קָרְאוּ לָמוֹ
  english_pob_choice: they cried to them
  chosen_spanish: les gritaron
  alternatives_spanish:
  - les clamaron
  - les dijeron a gritos
  lexicon: HALOT
  rationale: La idea es un clamor dirigido. «Gritaron» expresa bien la urgencia pública y el carácter de advertencia del verso.
- source_word: אַל תִּגָּעוּ
  english_pob_choice: do not touch
  chosen_spanish: no toquen
  alternatives_spanish:
  - no se acerquen
  - no entren en contacto
  lexicon: HALOT
  rationale: «Tocar» es el valor literal de נגע. En español, el imperativo «no toquen» preserva la prohibición breve y directa del original.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia. «Porque» es natural en español y mantiene la relación causal.
- source_word: נָצוּ
  english_pob_choice: they have fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron expulsados
  - se dispersaron
  lexicon: HALOT
  rationale: Se mantiene la opción principal del POB en un español natural. El verbo hebreo es raro y debatido; «huyeron» conserva la imagen de alejamiento, sin cerrar la discusión interpretativa.
- source_word: גַּם נָעוּ
  english_pob_choice: they have even wandered
  chosen_spanish: aun anduvieron errantes
  alternatives_spanish:
  - también vagaron
  - hasta anduvieron errantes
  lexicon: HALOT
  rationale: «Anduvieron errantes» traduce la idea de desplazamiento y desarraigo. «Aun» reproduce el énfasis progresivo de גַּם.
- source_word: אָמְרוּ בַּגּוֹיִם
  english_pob_choice: Among the nations they said
  chosen_spanish: Entre las naciones dijeron
  alternatives_spanish:
  - Dijeron entre las naciones
  - En medio de las naciones dijeron
  lexicon: HALOT
  rationale: «Entre las naciones» refleja la esfera geográfica/social del dicho y sugiere el exilio entre pueblos extranjeros.
- source_word: לֹא יוֹסִיפוּ לָגוּר
  english_pob_choice: They will stay no longer
  chosen_spanish: No seguirán residiendo
  alternatives_spanish:
  - No volverán a sojornar
  - No vivirán más como forasteros
  lexicon: HALOT
  rationale: El verbo גור puede expresar residir como extranjero o forastero. «Seguirán residiendo» conserva el sentido de permanencia habitada sin introducir «sojornar», que sería demasiado técnico para el texto principal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del texto hebreo y la solución auditada del POB inglés, manteniendo la triple orden de alejamiento, la prohibición de contacto, y la clausura social/exílica del verso. No se observaron revisiones aplicadas en el audit trail; la versión permanece estable.
  spanish_consistency_notes:
  - Se mantuvo un registro uniforme de imperativos plurales con «apártense / no toquen».
  - Se preservó el contraste entre contaminación ritual («Inmundos») y desplazamiento social («huyeron», «anduvieron errantes»).
  - Se eligió «Entre las naciones» para conservar la localización entre pueblos extranjeros sin añadir interpretaciones ajenas al verso.
  - «Residiendo» evita una paráfrasis demasiado libre y deja abierta la nota alternativa sobre el valor de גור.
