translation:
  language: es
  text: Mira[a], cuando entremos en la tierra, atarás este cordón escarlata en la ventana por donde nos bajaste, y reunirás dentro de tu casa a tu padre, a tu madre, a tus hermanos y a toda la familia de tu padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, “este cordón de hilo escarlata”.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  - Mira bien
  lexicon: HALOT
  rationale: Es una partícula de llamada de atención. «Mira» conserva la fuerza deíctica sin sonar arcaico como «He aquí» ni demasiado interpretativo.
- source_word: בָאִים בָּאָרֶץ
  english_pob_choice: when we come into the land
  chosen_spanish: cuando entremos en la tierra
  alternatives_spanish:
  - cuando lleguemos a la tierra
  - cuando entremos al país
  - al entrar en la tierra
  lexicon: HALOT
  rationale: El participio con la preposición expresa entrada inminente/futura. «Cuando entremos» comunica bien la condición futura y mantiene el sentido de pacto.
- source_word: תִּקְוַת חוּט הַשָּׁנִי הַזֶּה
  english_pob_choice: this scarlet cord
  chosen_spanish: este cordón escarlata
  alternatives_spanish:
  - este cordel escarlata
  - esta cuerda escarlata
  - esta línea de hilo escarlata
  lexicon: HALOT
  rationale: La cadena nominal es literalmente una especie de cuerda/hilo rojo. «Cordón escarlata» es natural en español y conserva el valor identificador del objeto sin perder la carga lexical.
- source_word: תִּקְשְׁרִי
  english_pob_choice: you shall tie
  chosen_spanish: atarás
  alternatives_spanish:
  - amarrarás
  - anudarás
  - deberás atar
  lexicon: HALOT
  rationale: La forma imperfecta femenina singular funciona como instrucción. «Atarás» mantiene el tono formal de mandato sin sobrecargarlo con perífrasis.
- source_word: בַּחַלּוֹן אֲשֶׁר הוֹרַדְתֵּנוּ בוֹ
  english_pob_choice: in the window through which you let us down
  chosen_spanish: en la ventana por la cual nos dejaste bajar
  alternatives_spanish:
  - en la ventana por donde nos bajaste
  - en la ventana en la que nos hiciste bajar
  - en la ventana desde la cual nos bajaste
  lexicon: HALOT
  rationale: 'הוֹרַדְתֵּנוּ es causativo: «hacer bajar / dejar bajar». La opción elegida conserva la relación con la ventana y evita interpretar más de lo que el hebreo exige.'
- source_word: תַּאַסְפִי אֵלַיִךְ הַבָּיְתָה
  english_pob_choice: you shall gather into your house
  chosen_spanish: reunirás en tu casa
  alternatives_spanish:
  - juntarás en tu casa
  - recogerás en tu casa
  - reunirás a tu casa
  lexicon: HALOT
  rationale: אָסַף con אֵלַיִךְ comunica reunir a personas hacia uno mismo. «Reunirás en tu casa» reproduce la idea de agrupar dentro del ámbito doméstico sin forzar un giro extraño en español.
- source_word: אָבִיךְ ... אִמֵּךְ ... אַחַיִךְ
  english_pob_choice: your father, your mother, your brothers
  chosen_spanish: tu padre, a tu madre, a tus hermanos
  alternatives_spanish:
  - tu padre, tu madre, tus hermanos
  - tu padre, tu madre y tus hermanos
  - tu padre, tu madre, tus hermanos varones
  lexicon: HALOT
  rationale: El plural masculino אַחַיִךְ se rinde como «tus hermanos»; el español no necesita marcar varonilidad explícita aquí porque la forma misma ya lo sugiere y el contexto no amplía a hermanas.
- source_word: כָּל בֵּית אָבִיךְ
  english_pob_choice: all your father's household
  chosen_spanish: toda la familia de tu padre
  alternatives_spanish:
  - toda la casa de tu padre
  - todo el hogar de tu padre
  - todo el linaje de tu padre
  lexicon: HALOT
  rationale: «Casa» en español puede sonar arquitectónico; «familia» comunica mejor el grupo de personas implicado. Se mantiene el sentido social del hebreo sin perder inteligibilidad.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés, manteniendo la instrucción directa, el valor identificador del cordón escarlata y el sentido colectivo de la casa/familia sin añadir interpretaciones no exigidas por la fuente. No hubo revisiones aplicadas en el pasaje inglés, y la concordancia general del control cruzado fue alta.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se prefiere un español moderno y digno: «mira», «cuando entremos», «atarás», «reunirás».'
  - «Cordón escarlata» conserva el término proyectual sin sustituirlo por «hilo» en el texto principal; la alternativa más literal queda en nota.
  - «Tu padre, a tu madre, a tus hermanos» mantiene el paralelismo de la lista y la referencia familiar de בית אָבִיךְ como conjunto doméstico.
  - No se emplea «Mesías/Cristo» ni vocabulario doctrinal relevante en este versículo.
