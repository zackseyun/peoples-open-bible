review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: seis días de trabajo permitido, contraste con el séptimo día, intensificación de שבת שבתון y uso de Yahvé para יהוה. Sin embargo, no preserva plenamente la fuerza de מוֹת יוּמָת, que en hophal expresa pena impuesta (''será puesto a muerte''), no simplemente ''morirá''. También hay giros menos fieles o menos naturales en español: ''en el séptimo día'' y ''en el día de sábado''.'
  spanish_quality_summary: 'El texto es generalmente claro, pero varias expresiones suenan poco naturales en español bíblico contemporáneo: ''se podrá hacer trabajo'', ''en el séptimo día'', ''haga trabajo'', y especialmente ''en el día de sábado''. Una redacción más idiomática puede conservar mejor el sentido legal y la dignidad del pasaje sin calco innecesario.'
  glossary_alignment: 'Alinea bien con la política del proyecto al usar ''Yahvé''. ''sábado de completo reposo'' es aceptable para שבת שבתון, aunque ''día de completo reposo'' o ''sábado de descanso completo'' serían también posibles. El principal desajuste terminológico/semántico está en מוֹת יוּמָת: debe reflejar ejecución/pena de muerte, no muerte en general.'
  issues:
  - severity: high
    issue: La cláusula final 'ciertamente morirá' no refleja adecuadamente מוֹת יוּמָת.
    rationale: 'El hebreo usa infinitivo absoluto + hophal imperfecto de מות, con sentido intensivo y pasivo/jurídico: ''ciertamente será puesto a muerte''. ''Morirá'' debilita la fuerza legal y elimina la voz pasiva penal documentada por el POB inglés.'
  - severity: medium
    issue: '''en el día de sábado'' es una formulación poco natural en español.'
    rationale: Aunque intenta reflejar explícitamente יוֹם, en español resulta forzada. 'en el día de reposo' o 'en el día sábado' serían mejores, pero dado que el proyecto mantiene 'sábado', 'en el día de sábado' conviene repararse a una formulación idiomática.
  - severity: medium
    issue: '''se podrá hacer trabajo'' y ''haga trabajo'' suenan pesados y poco idiomáticos.'
    rationale: El sentido legal puede mantenerse mejor con 'se puede trabajar' / 'trabaje' o con 'hacer trabajo' refinado. La actual redacción suena traducida mecánicamente.
  - severity: low
    issue: '''en el séptimo día'' es menos natural que ''el séptimo día'' o ''pero el séptimo día''.'
    rationale: La preposición 'en' no es incorrecta, pero en este contexto legal-descriptivo el español fluye mejor sin ella.
  revised_spanish_text: Seis días se puede trabajar,[a] pero el séptimo día es un sábado de completo reposo, santo para Yahvé. Cualquiera que trabaje en el día de sábado ciertamente será puesto a muerte.
  revised_footnotes:
  - marker: a
    text: 'O: "se hará trabajo". La forma hebrea puede expresarse de manera pasiva o impersonal; en este contexto legal, el sentido es que el trabajo está permitido durante esos seis días.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para mejorar la naturalidad del español sin perder el marco legal del hebreo. Se conserva 'Yahvé' según la política del proyecto y 'sábado de completo reposo' para reflejar la intensificación de שבת שבתון. La corrección principal es 'ciertamente será puesto a muerte', que sí preserva la fuerza penal pasiva de מוֹת יוּמָת. También se suavizan calcos poco idiomáticos como 'en el séptimo día' y 'se podrá hacer trabajo'.
