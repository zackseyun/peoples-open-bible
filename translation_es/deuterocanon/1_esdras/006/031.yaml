review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y la auditoría inglesa: mantiene el carácter oficial de προστάξαι, el matiz legal de παραβῶσίν y ἀκυρώσωσιν, el objeto punitivo ξύλον como «viga», y la confiscación final como pertenencia real. También conserva correctamente la nota sobre κρεμασθῆναι. Sin embargo, la redacción inicial «Y emitir una orden de que» suena calcada e infinitiva de manera poco natural en español bíblico corriente; conviene convertirla en una forma jussiva natural. Además, «se conviertan en propiedad real» es comprensible, pero «pasen a ser propiedad real» expresa mejor el resultado legal de confiscación.'
  spanish_quality_summary: La calidad general es buena y fiel, pero requiere un ajuste menor de fluidez y naturalidad. «Y emitir una orden de que» es torpe; «Y ordénese que» o «Y que se emita una orden de que» sería mejor. También «posesiones» es aceptable, aunque «bienes» suele sonar más jurídico-natural en este contexto; no obstante, no es imprescindible cambiarlo. El resto del verso es claro, digno y legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones léxicas principales concuerdan con la auditoría inglesa. Se preserva correctamente «colgado» en el texto principal con alternativas en nota.
  issues:
  - severity: medium
    issue: 'Apertura demasiado calcada: «Y emitir una orden de que»'
    rationale: Aunque refleja el infinitivo griego προστάξαι, en español resulta poco natural como continuación narrativa/jussiva. Una formulación como «Y ordénese que» preserva mejor el sentido administrativo con buena legibilidad.
  - severity: low
    issue: «se conviertan en propiedad real» puede mejorarse
    rationale: La frase es fiel, pero «pasen a ser propiedad real» comunica más naturalmente el efecto legal de confiscación en español.
  revised_spanish_text: Y ordénese que, si alguien transgrede cualquier parte de lo que ha sido escrito y lo anula, se tome una viga de su propia propiedad y sea colgado[a] en ella, y sus posesiones pasen a ser propiedad real.
  revised_footnotes:
  - marker: a
    text: 'O: «sea impalado» o «sea suspendido en ella». El griego dice «colgado», pero el castigo antiguo descrito pudo haber implicado impalación o suspensión pública en una viga de madera.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la apertura para que el español suene natural y formal sin perder el valor administrativo de προστάξαι. También se mejoró levemente la expresión del decomiso final con una formulación más idiomática en español jurídico-narrativo. Se conservó la nota léxica sobre κρεμασθῆναι sin cambios sustanciales.
