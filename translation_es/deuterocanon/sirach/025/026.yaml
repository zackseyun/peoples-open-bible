  spanish_quality_summary: El texto es breve y comprensible, pero «de tus entrañas» introduce una imagen más visceral que puede desviar el sentido hacia lo emocional o anatómico interno. «De tu carne» suena más bíblico, más natural en registro eclesial, y más cercano al razonamiento léxico documentado. También conviene mantener la nota explicando que no se trata de un término técnico de divorcio.
