lexical_decisions:
- source_word: γνώσονται
  english_pob_choice: they will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: BDAG
  rationale: El futuro de γινώσκω expresa aquí reconocimiento/conocimiento pleno; «sabrán» es natural en español y conserva el alcance relacional y covenantal sin volverlo una mera inferencia intelectual.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: En el texto griego, Κύριος traduce el nombre divino. Según la terminología del proyecto, el nombre se vierte como «Yahvé» en el texto principal para hacer visible la referencia al nombre divino, no como una máscara litúrgica.
- source_word: ὁ θεὸς αὐτῶν
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ellos
  lexicon: BDAG
  rationale: «Su Dios» reproduce de forma idiomática la relación posesiva y pactal del griego, manteniendo la referencia comunitaria y personal.
- source_word: δώσω
  english_pob_choice: I will give
  chosen_spanish: les daré
  alternatives_spanish:
  - daré a ellos
  - yo daré
  lexicon: BDAG
  rationale: El dativo αὐτοῖς pide una construcción natural en español; «les daré» conserva el futuro simple y el movimiento de dar hacia ellos.
- source_word: καρδίαν
  english_pob_choice: a heart
  chosen_spanish: un corazón
  alternatives_spanish:
  - un corazón interior
  - un centro interior
  lexicon: BDAG
  rationale: El sustantivo singular anartro se vierte con artículo indefinido en español para reflejar la unidad del don y mantener la metáfora antropológica concreta.
- source_word: ὦτα ἀκούοντα
  english_pob_choice: ears that hear
  chosen_spanish: oídos que oyen
  alternatives_spanish:
  - oídos oyentes
  - oídos para oír
  lexicon: BDAG
  rationale: 'La frase participial se conserva de manera literal y natural: «oídos que oyen». Mantiene la imagen corporal y la tensión teológica de receptividad activa sin abstraerla a «entendimiento» u «obediencia».'
theological_decisions:
- issue: Nombre divino detrás de κύριος en una declaración de pacto
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El contexto identifica a Dios en relación de pacto con «su Dios». Dado el principio del proyecto, el κύριος que traduce el nombre divino se expresa como «Yahvé» para no ocultar el nombre subyacente.
  doctrine_reference: 'Terminología del proyecto: יהוה / YHWH -> Yahvé en el texto principal.'
- issue: Metáfora antropológica de corazón y oídos que oyen
  english_pob_reading: Retain the concrete bodily metaphors rather than abstracting to 'understanding' or 'obedience.'
  chosen_spanish_reading: Mantener «corazón» y «oídos que oyen» de forma concreta.
  alternative_spanish_readings:
  - una mente y receptividad
  - corazones entendidos y oídos atentos
  rationale: El griego presenta imágenes corporales concretas. En español conviene conservarlas para no resolver la tensión teológica entre transformación interior y escucha respondiente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto coincide con la revisión más reciente: no se requirieron cambios, y la solución española sigue la lectura aprobada de mantener las metáforas concretas y el nombre divino visible.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para Κύριος cuando refiere al nombre divino, conforme al estándar del proyecto.
  - Se conserva la duplicación metafórica «corazón» / «oídos que oyen» sin reinterpretarla como términos abstractos.
  - La puntuación separa las dos cláusulas como en el griego, preservando el ritmo del verso.
