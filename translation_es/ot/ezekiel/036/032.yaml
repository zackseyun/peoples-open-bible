review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la acción de Yahvé no es por Israel, sigue la fórmula profética, mantiene el mandato de reconocerlo, y conserva la doble exhortación a la vergüenza por sus caminos. Sin embargo, varias elecciones españolas no son las más fieles ni naturales para el valor verbal e imperativo del texto.'
  spanish_quality_summary: 'La redacción es mayormente comprensible, pero contiene giros poco idiomáticos o inexactos: «que esto les quede sabido» suena forzado; «Sean avergonzados» suena pasivo y menos natural que el imperativo reflexivo; y «por causa de sus caminos» puede mejorarse a «por sus caminos» o «a causa de sus caminos» para mayor fluidez. También conviene ajustar «el Señor Yahvé» a «el Señor Dios, Yahvé» para reflejar mejor אֲדֹנָי יְהוִה en español sin perder el nombre divino.'
  glossary_alignment: Se preserva correctamente «Yahvé» para יהוה, pero en el compuesto אֲדֹנָי יְהוִה la solución «Señor Yahvé» no es la opción más clara ni digna en español eclesial. El resto de la terminología clave está básicamente alineado, aunque los imperativos deben sonar naturales en español.
  issues:
  - severity: medium
    issue: «que esto les quede sabido»
    rationale: Aunque intenta reflejar יִוָּדַע לָכֶם, en español suena artificial. «sépanlo bien» o «que les quede claro» transmite mejor la fuerza de reconocimiento exigido.
  - severity: medium
    issue: «Sean avergonzados»
    rationale: בּוֹשׁוּ es un imperativo directo. En español, «avergüéncense» es más natural y más cercano a la exhortación profética que una perífrasis pasiva.
  - severity: low
    issue: «por causa de sus caminos»
    rationale: Es comprensible, pero algo pesado. «por sus caminos» o «a causa de sus caminos» suena más natural sin perder el valor causal de מִן.
  - severity: medium
    issue: «declara el Señor Yahvé»
    rationale: Aunque preserva el nombre divino, el compuesto אֲדֹנָי יְהוִה pide una forma española más clara y solemne. «declara el Señor Dios, Yahvé» conserva título y nombre sin la rareza de «Señor Yahvé».
  revised_spanish_text: No es por causa de ustedes que yo actúo, declara el Señor Dios, Yahvé; sépanlo bien. Avergüéncense y sean humillados[a] por sus caminos, casa de Israel.
  revised_footnotes:
