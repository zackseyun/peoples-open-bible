translation:
  language: es
  text: 'Moisés escogió varones capaces[a] de entre todo Israel y los nombró jefes[b] sobre el pueblo: jefes de mil, jefes de cien, jefes de cincuenta y jefes de diez.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aptos». La frase hebrea אַנְשֵׁי חַיִל puede denotar hombres de fuerza, capacidad o probado valor; en este contexto señala principalmente idoneidad para el liderazgo.
    reason: lexical_alternative
  - marker: b
    text: O «líderes» o «principales» sobre el pueblo. El hebreo usa «cabezas» de manera metafórica para personas en autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְחַר
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: HALOT
  rationale: El verbo hebreo בחר expresa escoger o seleccionar. «Escogió» mantiene el valor narrativo directo del wayyiqtol y suena natural en español moderno.
- source_word: אַנְשֵׁי חַיִל
  english_pob_choice: capable men
  chosen_spanish: varones capaces
  alternatives_spanish:
  - varones aptos
  - hombres capaces
  - varones competentes
  lexicon: HALOT
  rationale: La expresión puede denotar hombres de fuerza, capacidad o probado valor. En este contexto administrativo, el matiz principal es la idoneidad para gobernar; por eso «varones capaces» conserva la idea de competencia sin desplazarla hacia el valor militar.
- source_word: מִכָּל יִשְׂרָאֵל
  english_pob_choice: from all Israel
  chosen_spanish: de entre todo Israel
  alternatives_spanish:
  - de todo Israel
  - de entre todo el pueblo de Israel
  lexicon: HALOT
  rationale: La preposición y el contexto indican selección dentro de la totalidad de la nación. «De entre todo Israel» expresa mejor la idea de extracción desde el conjunto.
- source_word: וַיִּתֵּן אֹתָם
  english_pob_choice: appointed them
  chosen_spanish: los nombró
  alternatives_spanish:
  - los नियुक्तó
  - los puso
  - los designó
  lexicon: HALOT
  rationale: Aunque el verbo hebreo literalmente significa «dar/poner», aquí funciona idiomáticamente como asignación a un cargo. «Los nombró» transmite bien la acción administrativa sin perder naturalidad en español.
- source_word: רָאשִׁים
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  - cabecillas
  lexicon: HALOT
  rationale: El sustantivo usa la metáfora de «cabezas» para personas con autoridad. En español, «jefes» preserva la función de mando con claridad y evita una literalidad extraña; por eso se mantiene la metáfora funcional más que la imagen anatómica.
- source_word: עַל הָעָם
  english_pob_choice: over the people
  chosen_spanish: sobre el pueblo
  alternatives_spanish:
  - sobre la gente
  - para el pueblo
  lexicon: HALOT
  rationale: La preposición עַל aquí indica autoridad y gobierno. «Sobre el pueblo» conserva esa relación jerárquica.
- source_word: שָׂרֵי
  english_pob_choice: commanders
  chosen_spanish: jefes
  alternatives_spanish:
  - comandantes
  - oficiales
  - capitanes
  lexicon: HALOT
  rationale: שַׂר designa a un oficial o gobernante puesto sobre un grupo. Dado que en español el texto ya usa «jefes» para רָאשִׁים, repetir «jefes de...» permite reflejar la estructura escalonada del hebreo sin introducir un término más militar de lo que exige el contexto.
- source_word: אֲלָפִים / מֵאוֹת / חֲמִשִּׁים / עֲשָׂרֹת
  english_pob_choice: thousands, hundreds, fifties, and tens
  chosen_spanish: mil, ciento, cincuenta y diez
  alternatives_spanish:
  - miles, centenas, cincuenta y decenas
  - mil, cien, cincuenta y diez
  lexicon: HALOT
  rationale: Las unidades numéricas describen la estructura administrativa. En español, para títulos de cargos, «jefes de mil/ciento/cincuenta/diez» refleja el paralelo hebreo de forma directa y legible; «ciento» se conserva por el valor distributivo del título, no como una cantidad aislada.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: elección de un término dinámico pero semánticamente fiel para אַנְשֵׁי חַיִל, conservación de la metáfora de autoridad en רָאשִׁים/שָׂרֵי, y mantenimiento de la estructura jerárquica numérica del hebreo. No se detectaron revisiones aplicadas en el pasaje fuente ni tensiones doctrinales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Jefes» se emplea de manera consistente para רָאשִׁים y también para שָׂרֵי en este contexto jerárquico; la repetición ayuda a conservar la estructura del texto hebreo.
  - Se evitó «capitanes» porque puede introducir una lectura excesivamente militar en una escena administrativa/judicial.
