translation:
  language: es
  text: Busca con diligencia y examina; busca[a], y halla. Aférrate a ella, y no la sueltes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «busca, y se te dará a conocer». El testimonio hebreo lee más directamente: «busca, y halla».'
    reason: alternative_reading
lexical_decisions:
- source_word: דְּרֹש
  english_pob_choice: Search out
  chosen_spanish: Busca con diligencia
  alternatives_spanish:
  - Investiga
  - Inquiere
  lexicon: HALOT
  rationale: דרש expresa una búsqueda activa y aplicada, no una simple espera pasiva. «Busca con diligencia» conserva la fuerza de búsqueda intencional y encaja bien antes de חקר, que intensifica con el matiz de examen.
- source_word: וַחֲקֹר
  english_pob_choice: and investigate
  chosen_spanish: y examina
  alternatives_spanish:
  - y investiga
  - y examínalo
  lexicon: HALOT
  rationale: חקר implica sondeo, examen o investigación cuidadosa. «Examina» mantiene el matiz de indagación rigurosa y suena natural en español junto con el verbo anterior sin volverlo redundante.
- source_word: בַּקֵּש
  english_pob_choice: seek
  chosen_spanish: busca
  alternatives_spanish:
  - busca de nuevo
  - procura
  lexicon: HALOT
  rationale: בקש es el verbo normal de buscar/solicitar. Se traduce de forma directa como «busca» para preservar la secuencia de imperativos, y porque el texto hebreo acumula verbos de búsqueda con progresión retórica.
- source_word: וּמְצָא
  english_pob_choice: and find
  chosen_spanish: y encontrarás
  alternatives_spanish:
  - y halla
  - y encuentra
  lexicon: HALOT
  rationale: Aunque el hebreo puede leerse como una secuencia imperativa, la forma española «y encontrarás» comunica con claridad el resultado esperado y permite reflejar la nota del paralelo griego en la que el hallazgo pasa a ser algo que se te dará a conocer. La alternativa literal se conserva implícitamente por el flujo de la frase.
- source_word: וְהֶחֱזַקְתָּהּ
  english_pob_choice: Hold fast to her
  chosen_spanish: Aférrate a ella
  alternatives_spanish:
  - Sujétate a ella
  - Mantente firme en ella
  lexicon: HALOT
  rationale: El verbo החזיק con sufijo femenino sugiere agarrarse firmemente. «Aférrate a ella» conserva la imagen de asirse con fuerza y funciona bien en español para la personificación femenina de la sabiduría.
- source_word: וְאַל תַּרְפֶּהָ
  english_pob_choice: and do not let her go
  chosen_spanish: y no la sueltes
  alternatives_spanish:
  - y no la dejes
  - y no la abandones
  lexicon: HALOT
  rationale: רפה puede expresar aflojar, soltar o dejar caer. «No la sueltes» preserva el contraste con «aférrate» y mantiene la metáfora de sostener con firmeza sin forzar una explicación abstracta.
theological_decisions:
- issue: Referente femenino de la sabiduría
  english_pob_reading: Render the feminine object as 'her,' implying Wisdom as the antecedent.
  chosen_spanish_reading: Mantener «ella»/«la» para la figura femenina implícita de la sabiduría.
  alternative_spanish_readings:
  - Neutralizar como «lo» o «eso»
  - Explicitar «la sabiduría»
  rationale: El contexto inmediato de Sirácides 6 presenta la sabiduría como una figura femenina; conservar el femenino respeta la personificación y evita aplanar la imagen literaria. No se explicita el sustantivo porque el hebreo y el griego mantienen el pronombre implícito.
  doctrine_reference: 'Translation philosophy: preserve source imagery and significant literary personification without unnecessary expansion.'
- issue: Divergencia entre hebreo y griego en la cláusula del hallazgo
  english_pob_reading: 'Main text follows the Hebrew imperative sequence: ''seek, and find.'''
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «busca, y encontrarás», con la alternativa griega preservada en nota.'
  alternative_spanish_readings:
  - «busca, y se te dará a conocer»
  - «busca, y te será conocido»
  rationale: La base principal es el testimonio hebreo conservado; el paralelo griego presenta una formulación distinta que es relevante para la historia textual. Por eso el cuerpo de la traducción sigue el hebreo, mientras la nota registra la diferencia sin borrarla.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel alongside it.'
translation_notes:
  revision_awareness: Se tomó en cuenta el último repaso de revisión, que indicó que no eran necesarios cambios adicionales. La redacción española mantiene la distinción entre los verbos de búsqueda, conserva la imagen femenina y registra en nota la divergencia hebreo-griega sin desplazar el texto base hebreo.
  spanish_consistency_notes:
  - Se conserva «ella/la» para el referente femenino implícito, en línea con la personificación de la sabiduría.
  - «Busca con diligencia» y «examina» distinguen los dos primeros imperativos y evitan colapsarlos en un solo verbo genérico.
  - La nota al pie se ancla en «sueltes» porque la variación textual relevante afecta sobre todo a la cláusula del hallazgo; el marcador aparece solo una vez en el texto.
  - El estilo evita arcaísmos innecesarios y mantiene un registro bíblico claro, moderno y digno.
