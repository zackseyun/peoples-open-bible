translation:
  language: es
  text: Porque ellos y su ganado subirían, y sus tiendas[b] vendrían como langostas en multitud[a]; tanto ellos como sus camellos eran incontables, y entraban en la tierra para destruirla[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad: «tan numerosos como langostas» o «como enjambres de langostas».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «sus tiendas vendrían», usando «tiendas» como metonimia de los campamentos de los invasores.'
    reason: cultural_note
  - marker: c
    text: 'También puede traducirse: «para devastarla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la relación explicativa con lo anterior. «Porque» transmite bien la conexión causal/explicativa en español sin añadir énfasis no requerido.
- source_word: הֵם
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - los invasores
  lexicon: HALOT
  rationale: Se conserva el pronombre explícito para mantener el énfasis del hebreo y la referencia a los pueblos invasores.
- source_word: וּמִקְנֵיהֶם
  english_pob_choice: and their livestock
  chosen_spanish: y su ganado
  alternatives_spanish:
  - y sus animales
  - y su ganado mayor
  lexicon: HALOT
  rationale: מִקְנֶה designa ganado/animales de cría en sentido amplio. «Ganado» es la forma natural y suficientemente precisa en español; «animales» sería más general y menos idiomático aquí.
- source_word: יַעֲלוּ
  english_pob_choice: would come up
  chosen_spanish: subirían
  alternatives_spanish:
  - subían
  - vendrían
  lexicon: HALOT
  rationale: El imperfecto narrativo expresa acción habitual o repetida en el pasado. «Subirían» comunica bien ese valor iterativo; además conserva la idea direccional de העלה/עלה.
- source_word: וְאָהֳלֵיהֶם יָבֹאוּ
  english_pob_choice: and their tents would come
  chosen_spanish: y sus tiendas vendrían
  alternatives_spanish:
  - y sus campamentos vendrían
  - y vendrían con sus tiendas
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de las «tiendas» como metonimia del campamento nómada. En español, «tiendas vendrían» preserva el tropo sin volverlo opaco.
- source_word: כְדֵי אַרְבֶּה לָרֹב
  english_pob_choice: like locusts in multitude
  chosen_spanish: como langostas en multitud
  alternatives_spanish:
  - como langostas en gran número
  - tan numerosas como langostas
  lexicon: HALOT
  rationale: «Como langostas en multitud» mantiene la comparación y el sustantivo de abundancia sin convertirlo en una paráfrasis más interpretativa. «Multitud» refleja la densidad del hebreo con una construcción natural en español.
- source_word: וְלָהֶם וְלִגְמַלֵּיהֶם אֵין מִסְפָּר
  english_pob_choice: both they and their camels were without number
  chosen_spanish: tanto ellos como sus camellos eran incontables
  alternatives_spanish:
  - ni ellos ni sus camellos podían contarse
  - ellos y sus camellos no tenían número
  lexicon: HALOT
  rationale: «Incontables» conserva el idiomático «sin número» y fluye mejor en español que una calca literal. Se mantiene la coordinación entre personas y camellos.
- source_word: וַיָּבֹאוּ בָאָרֶץ
  english_pob_choice: and they came into the land
  chosen_spanish: y entraban en la tierra
  alternatives_spanish:
  - y vinieron a la tierra
  - y llegaron a la tierra
  lexicon: HALOT
  rationale: El hebreo sigue la narración habitual de incursiones repetidas. «Entraban en la tierra» suena natural en español y conserva el aspecto iterativo más que un pasado puntual.
- source_word: לְשַׁחֲתָהּ
  english_pob_choice: to destroy it
  chosen_spanish: para destruirla
  alternatives_spanish:
  - para devastarla
  - para arruinarla
  lexicon: HALOT
  rationale: שׁחת expresa destrucción/arruinar. «Destruirla» es la opción amplia y fiel; «devastarla» o «arruinarla» intensifican o matizan más de lo que exige el contexto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del testimonio inglés: se consolidó la comparación sin añadir «entraban en» o «venían en» a la frase de las tiendas, y se mantuvo la lectura iterativa del imperfecto narrativo en todo el versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «tiendas» para reproducir la metonimia del hebreo, en línea con el audit trail inglés.
  - Se eligió «incontables» para evitar una calca pesada de «sin número» y conservar el sentido idiomático.
  - Se optó por «entraban» para reflejar el imperfecto habitual del relato, coherente con el valor iterativo señalado en el inglés auditado.
