translation:
  language: es
  text: Lavó las entrañas[a] y las patas con agua, y Moisés quemó todo el carnero sobre el altar. Era un holocausto de aroma agradable, una ofrenda hecha por fuego para Yahvé, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “partes internas” o “vísceras”.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֶּרֶב
  english_pob_choice: entrails
  chosen_spanish: intestino
  alternatives_spanish:
  - entrañas
  - vísceras
  - partes internas
  lexicon: HALOT
  rationale: El término hebreo designa las partes internas del animal sacrificado. En español, 'intestino' resulta claro y concreto, aunque algo más específico que el conjunto de vísceras; por eso se conserva la tensión con una nota alternativa implícita en las opciones. Evito una perífrasis demasiado general que borre la concreción ritual.
- source_word: הַכְּרָעַיִם
  english_pob_choice: legs
  chosen_spanish: las patas
  alternatives_spanish:
  - las piernas
  - las extremidades inferiores
  - las patas traseras
  lexicon: HALOT
  rationale: En contexto sacrificial se refiere a las patas del animal. 'Patas' es natural en español para un animal y mantiene la referencia anatómica sin sobrecargar el registro.
- source_word: רָחַץ בַּמָּיִם
  english_pob_choice: washed ... with water
  chosen_spanish: lavó ... con agua
  alternatives_spanish:
  - enjuagó ... con agua
  - lo lavó con agua
  lexicon: HALOT
  rationale: El verbo significa lavar; 'lavó con agua' conserva la explicitud del hebreo y su tono ritual. No se introduce una interpretación adicional como 'purificó' porque el texto dice lavar.
- source_word: וַיַּקְטֵר
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - hizo subir en humo
  - ofreció en humo
  - consumió por fuego
  lexicon: HALOT
  rationale: Aunque el valor cultual es 'hacer subir en humo', el audit trail inglés pasó a 'burned' por naturalidad formal. En español, 'quemó' es la equivalencia más natural y suficientemente fiel, sin perder el sentido sacrificial dentro del contexto del altar.
- source_word: כָּל הָאַיִל
  english_pob_choice: the whole ram
  chosen_spanish: todo el carnero
  alternatives_spanish:
  - el carnero entero
  - el carnero completo
  lexicon: HALOT
  rationale: '''Todo el carnero'' reproduce la totalidad expresada por כָּל y mantiene un español fluido. ''Carnero'' es más preciso para el animal sacrificial que ''oveja'' u otras opciones genéricas.'
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: La forma direccional hebrea se expresa naturalmente con 'sobre el altar', que conserva la escena sacrificial sin sonar forzado.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: En español bíblico actual, 'holocausto' sigue siendo el término tradicional y más reconocible para esta categoría sacrificial. Dado que el texto no trata del uso moderno del término, aquí conserva bien el género sacrificial sin ambigüedad inmediata.
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: for a pleasing aroma
  chosen_spanish: para aroma agradable
  alternatives_spanish:
  - para un aroma grato
  - como aroma agradable
  lexicon: HALOT
  rationale: La frase fija comunica aceptación agradable delante de Dios mediante la imagen del aroma. 'Aroma agradable' preserva el sentido metafórico de manera clara y digna en español.
- source_word: אִשֶּׁה
  english_pob_choice: food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda por fuego
  - ofrenda consumida por el fuego
  lexicon: HALOT
  rationale: אִשֶּׁה alude a una ofrenda hecha por fuego. En español, 'ofrenda encendida' transmite ese valor cultual sin recurrir a 'alimento' ni a una paráfrasis ajena al hebreo. Se conserva la tensión entre el acto del fuego y la ofrenda.
- source_word: לַיהוָה / יְהוָה
  english_pob_choice: to the LORD / Yahweh
  chosen_spanish: a Yahvé / Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: Se mantiene 'Yahvé' conforme al estándar del proyecto para el nombre divino, sin sustituirlo por 'Señor'. La primera aparición es regida por 'ofrenda encendida para Yahvé'; la cláusula final conserva 'como Yahvé había mandado a Moisés' para reflejar el nombre propio del texto hebreo.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: como Yahvé había mandado a Moisés
  alternatives_spanish:
  - tal como Yahvé había mandado a Moisés
  - según Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: La fórmula final expresa conformidad exacta con el mandato divino. 'Como' es natural en español y conserva la relación de correspondencia; 'mandado' refleja el imperativo recibido por Moisés sin necesidad de una paráfrasis más extensa.
theological_decisions:
- issue: Nombre divino יְהוָה en una fórmula sacrificial
  english_pob_reading: Yahweh / to the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. En coherencia con la política del POB en español, se traduce por 'Yahvé' para preservar el nombre propio del pacto en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: לְרֵיחַ נִיחֹחַ como expresión de aceptación cultual
  english_pob_reading: for a pleasing aroma
  chosen_spanish_reading: para aroma agradable
  alternative_spanish_readings:
  - para un aroma grato
  - para un aroma placentero
  rationale: La frase no pretende describir una fragancia literal de modo simplista, sino una ofrenda aceptable ante Yahvé. 'Aroma agradable' conserva la metáfora y la valoración positiva sin resolverla en términos más doctrinales que el hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern Spanish; preserve theological tension rather than over-explain'
translation_notes:
  revision_awareness: El audit trail inglés registra que la versión pasó de 'turned the whole ram into smoke' a 'burned the whole ram' por naturalidad formal, y mantiene una nota alternativa para אִשֶּׁה. La presente versión española sigue esa decisión de naturalidad formal, pero conserva la transparencia terminológica mediante 'ofrenda encendida' y una nota léxica para el primer sustantivo sacrificial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para el Tetragrámaton, sin sustituirlo por 'Señor'.
  - '''Holocausto'' se reserva aquí para עֹלָה como término sacrificial, no con sentido moderno.'
  - '''Aroma agradable'' mantiene la fórmula cultual sin añadir explicaciones interpretativas.'
  - '''Ofrenda encendida'' comunica אִשֶּׁה de forma transparente y coherente con el campo del fuego sacrificial.'
  - Se mantiene el nombre propio 'Moisés' y la estructura final de conformidad con el mandato divino.
