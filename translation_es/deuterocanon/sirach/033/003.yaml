translation:
  language: es
  text: Un hombre prudente entiende la palabra de Yahvé[a], y su instrucción[b] es como los Urim en el pectoral.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio hebreo conservado difiere fuertemente del paralelo griego de este versículo; esta traducción sigue el hebreo como testimonio primario de Sirácides donde está disponible.
    reason: textual_variant
  - marker: b
    text: O, «su ley/instrucción», si el sufijo se toma como referido a Yahvé en vez de al hombre prudente.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: Conserva el singular humano masculino del hebreo y mantiene la referencia típica de la literatura sapiencial a un sujeto representativo. En español, «un hombre» es natural y fiel sin volver genérico lo que el hebreo marca gramaticalmente.
- source_word: נָבוֹן
  english_pob_choice: discerning
  chosen_spanish: discerniente
  alternatives_spanish:
  - entendido
  - prudente
  - inteligente
  lexicon: HALOT
  rationale: «Discerniente» expresa la cualidad sapiencial de percibir y juzgar bien. Evita reducir el matiz a mera capacidad intelectual, como podría ocurrir con «inteligente» o «entendido».
- source_word: יָבִין
  english_pob_choice: understands
  chosen_spanish: entiende
  alternatives_spanish:
  - discierne
  - comprende
  lexicon: HALOT
  rationale: «Entiende» comunica con naturalidad el valor cognitivo de בין en este contexto sapiencial. «Discierne» sería posible, pero en español suena algo más marcado y el paralelismo con la primera cola ya sostiene la idea de percepción sabia.
- source_word: דְּבַר יְהֹוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra del Señor
  - el asunto de Yahvé
  lexicon: HALOT
  rationale: Se sigue el nombre divino directo según la política del proyecto, y «palabra» es la forma más natural para דָּבָר en este contexto. Se evita «el Señor» porque aquí el testimonio hebreo usa explícitamente el nombre divino.
- source_word: וְתוֹרָתוֹ
  english_pob_choice: his instruction
  chosen_spanish: su instrucción
  alternatives_spanish:
  - su ley
  - su enseñanza
  lexicon: HALOT
  rationale: «Instrucción» conserva el sentido pedagógico de תּוֹרָה y evita endurecer el término como «ley» en un dicho sapiencial. El posesivo en español queda deliberadamente ambiguo, como en el hebreo, para no resolver sin base si se refiere al hombre o a Yahvé.
- source_word: כְּאוּרִים
  english_pob_choice: like the Urim
  chosen_spanish: como los Urim
  alternatives_spanish:
  - como luces
  - como los oráculos de Urim
  lexicon: HALOT
  rationale: Se translitera el término técnico sacerdotal tradicional. «Los Urim» mantiene el referente cultual específico y no lo diluye en una explicación interpretativa.
- source_word: בַּחֹשֶׁן
  english_pob_choice: in the breastpiece
  chosen_spanish: en el pectoral
  alternatives_spanish:
  - en el pecho
  - en el pectoral del juicio
  lexicon: HALOT
  rationale: «Pectoral» es la equivalencia española estándar para el objeto sacerdotal, más clara y precisa que «breastplate». Evita la imagen de una pieza de armadura y conserva el contexto litúrgico.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh rather than masking the divine name as 'the LORD'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La edición española sigue el principio del proyecto de no enmascarar el Tetragrámaton. «Yahvé» preserva el nombre del pacto de forma transparente y auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahweh/Yahvé'
- issue: Ambigüedad del sufijo en וְתוֹרָתוֹ
  english_pob_reading: his instruction could refer either to the discerning man or to Yahweh; the Hebrew primary reading is kept with a note
  chosen_spanish_reading: su instrucción, con ambigüedad preservada en la nota
  alternative_spanish_readings:
  - su ley
  - la instrucción de Yahvé
  rationale: El español permite conservar la ambigüedad sintáctica del hebreo sin resolverla artificialmente. La lectura principal mantiene el referente más inmediato, y la nota deja constancia de la alternativa teológica y sintáctica.
  doctrine_reference: Source-level ambiguity in Hebrew syntax; aligns with English POB note a
- issue: Diferencia importante entre el hebreo conservado y el paralelo griego
  english_pob_reading: translation follows the surviving Hebrew text as primary witness, despite the sharp divergence from Greek
  chosen_spanish_reading: se sigue el hebreo conservado como testimonio primario, con nota sobre la variante griega
  alternative_spanish_readings:
  - seguir el griego
  - harmonizar hebreo y griego
  rationale: Dado el marcado desacuerdo entre el hebreo y el griego, la edición española debe hacer visible la decisión textual. Esto protege la trazabilidad del texto y evita una armonización no fundada.
  doctrine_reference: Textual criticism policy for Sirach; English POB footnote b
translation_notes:
  revision_awareness: El hebreo transmitido en el paquete de fuente difiere por completo del paralelo griego de Sirácides 33:3, que habla de alzar la mano sobre naciones extranjeras y mostrar dominio. La presente redacción española sigue el hebreo conservado como testimonio principal, reproduciendo además la ambigüedad del sufijo en וְתוֹרָתוֹ y señalando en nota la alternativa interpretativa. No se armonizó con el griego para mantener la trazabilidad del aparato auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» para coherencia con el estándar del proyecto.
  - Se usa «instrucción» en vez de «ley» en el cuerpo, porque el contexto sapiencial favorece el matiz pedagógico.
  - «Urim» se conserva transliterado como término técnico; «pectoral» nombra la pieza cultual con claridad en español.
  - La puntuación y las comillas siguen el uso estándar del español moderno, sin calco de la sintaxis inglesa.
