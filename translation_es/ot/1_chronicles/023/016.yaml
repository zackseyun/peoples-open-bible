lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una lista genealógica/organizativa, בְּנֵי introduce la línea de pertenencia o descendencia. «Hijos de» es la equivalencia más directa y natural en español bíblico para este tipo de encabezado; «descendientes de» amplía el sentido pero borra un poco la fórmula breve del hebreo.
- source_word: גֵרְשׁוֹם
  english_pob_choice: Gershom
  chosen_spanish: Gersón
  alternatives_spanish:
  - Gershom
  lexicon: HALOT
  rationale: El hebreo presenta la forma גֵרְשׁוֹם, pero en español bíblico la forma asentada y más reconocible de este nombre en contextos genealógicos es «Gersón». Se mantiene la transliteración tradicional española para claridad de lectura, sin cambiar el referente.
- source_word: שְׁבוּאֵל
  english_pob_choice: Shebuel
  chosen_spanish: Sebuel
  alternatives_spanish:
  - Shebuel
  lexicon: HALOT
  rationale: Se translitera el nombre propio con ortografía española fluida. «Sebuel» conserva la identidad del nombre hebreo para lectores en español y evita la grafía inglesa del audit trail, que no es necesaria en el texto final.
- source_word: הָרֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el cabeza
  - el principal
  lexicon: HALOT
  rationale: רֹאשׁ con artículo funciona aquí como título de primacía o liderazgo dentro de una lista administrativa. «Jefe» expresa esa función en español actual de modo natural. «El cabeza» sería más literal pero menos idiomático; «el principal» atenúa la idea de cargo.
theological_decisions:
- issue: Valor de רֹאשׁ como título de liderazgo en una genealogía levítica
  english_pob_reading: the chief
  chosen_spanish_reading: el jefe
  alternative_spanish_readings:
  - el cabeza
  - el principal
  rationale: 'No hay una cuestión doctrinal explícita, pero sí una decisión de matiz: el texto no describe solo orden cronológico, sino rango o liderazgo. «El jefe» conserva ese sentido funcional en español sin introducir contenido ajeno.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada no mostró cambios en la última revisión y fue verificada con alto grado de acuerdo; por eso la propuesta española sigue de cerca la lectura estable del texto hebreo y conserva la ambigüedad léxica de רֹאשׁ mediante nota.
  spanish_consistency_notes:
  - Se mantuvo un estilo genealógico breve y sobrio, acorde con listas de Crónicas.
  - Se evitó calcar el inglés cuando el español podía expresar mejor la función de liderazgo con «el jefe».
  - La nota reproduce la alternativa léxica relevante sin sobrecargar el verso.
