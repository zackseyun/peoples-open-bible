id: ROM.14.15
reference: Romans 14:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ ⸀γὰρ διὰ βρῶμα ὁ ἀδελφός σου λυπεῖται, οὐκέτι κατὰ ἀγάπην περιπατεῖς. μὴ τῷ βρώματί σου ἐκεῖνον ἀπόλλυε ὑπὲρ οὗ Χριστὸς ἀπέθανεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/015.yaml
  text: For if your brother is grieved because of food, you are no longer walking according to love. Do not destroy that one with your food—the one for whom Messiah died.
translation:
  language: ko
  text: 만일 음식 때문에 당신의 형제가 마음 상한다면, 당신은 더 이상 사랑을 따라 걷고 있지 않은 것입니다. 메시아께서 그를 위하여 죽으셨으니, 당신의 음식으로 그를 파멸시키지 마십시오.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λυπεῖται
  english_pob_choice: is grieved
  chosen_korean: 마음 상하다
  alternatives_korean:
  - 슬퍼하다
  - 괴로워하다
  lexicon: BDAG
  rationale: 내적 상함·괴로움. 「마음 상하다」가 음식으로 양심이 다치는 상황을 자연스럽게 표현.
- source_word: κατὰ ἀγάπην περιπατεῖς
  english_pob_choice: walking according to love
  chosen_korean: 사랑을 따라 걷다
  alternatives_korean:
  - 사랑을 좇아 살다
  lexicon: BDAG
  rationale: 바울의 「걷다」 은유 보존. 13:13과 어휘 일관.
- source_word: ἀπόλλυε
  english_pob_choice: do not destroy
  chosen_korean: 파멸시키지 마십시오
  alternatives_korean:
  - 멸하지 마십시오
  - 망하게 하지 마십시오
  lexicon: BDAG
  rationale: 현재 명령형의 강한 어휘. 「파멸시키다」가 무게를 살린다.
- source_word: ὑπὲρ οὗ Χριστὸς ἀπέθανεν
  english_pob_choice: the one for whom Messiah died
  chosen_korean: 메시아께서 그를 위하여 죽으셨다
  alternatives_korean:
  - 그를 위해 메시아께서 죽으셨다
  lexicon: BDAG
  rationale: 관계절을 한국어 인과 구조로 풀어 자연스럽게.
