  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé/Mesías/etc. «Cusita» sigue correctamente la preferencia documentada del POB frente a «etíope», conservando la alternativa en nota. El nombre «Ebed-melec» y «Jeremías el profeta» están bien tratados.
