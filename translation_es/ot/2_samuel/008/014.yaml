review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica: David pone guarniciones en Edom, Edom queda sometido a David, y Yahvé da la victoria. Sin embargo, hay dos problemas de fidelidad. Primero, la nota [a] no corresponde al lugar anclado en el texto ni preserva la alternativa importante del inglés sobre el sentido colectivo de «todo Edom». Segundo, «en todo lo que fue» no representa bien בְּכֹל אֲשֶׁר הָלָךְ, que significa «dondequiera que fue / por dondequiera que iba».'
  spanish_quality_summary: «Puso guarniciones en Edom; por todo Edom puso guarniciones» es natural y claro. «Todo Edom quedó sometido a David» es aceptable como solución idiomática para el colectivo nacional, aunque pierde el matiz léxico de עֲבָדִים. La frase final actual, «en todo lo que fue», suena poco natural en español y debe corregirse.
  glossary_alignment: Se respeta correctamente «Yahvé» para יְהוָה. «Guarniciones» alinea bien con נְצִבִים. Para עֲבָדִים, «quedó sometido» es una adaptación contextual defendible en español, aunque menos literal que «siervos» o «esclavos»; no requiere adjudicación mayor. La principal desalineación está en el modismo final, que debe expresarse como «dondequiera que fue» o equivalente.
  issues:
  - severity: high
    issue: La expresión «en todo lo que fue» no traduce adecuadamente בְּכֹל אֲשֶׁר הָלָךְ.
    rationale: 'El hebreo expresa ámbito de movimiento o trayectoria: «dondequiera que fue». La redacción actual es poco idiomática y puede entenderse como «en todo lo que llegó a ser», cambiando el sentido.'
  - severity: medium
    issue: La nota [a] no preserva la alternativa léxica/colectiva relevante del inglés POB.
    rationale: La nota inglesa explica que «todo Edom» es colectivo por «todos los edomitas» y ofrece esa alternativa. La nota española actual comenta la repetición verbal, pero el ancla [a] está en «Edom» y no ayuda al lector en el punto semántico principal.
  - severity: low
    issue: «Quedó sometido a David» reduce el matiz de עֲבָדִים.
    rationale: Aunque es español natural en contexto político, la palabra hebrea conserva la idea de servidumbre/subyugación. Conviene explicitarlo en nota para no perder completamente esa fuerza.
  revised_spanish_text: Puso guarniciones en Edom; por todo Edom[a] puso guarniciones, y todo Edom quedó sometido a David. Y Yahvé dio a David la victoria[b] dondequiera que fue.
  revised_footnotes:
