review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido global: Yahvé defiende judicialmente a los pobres y retribuye a quienes los despojan con la pérdida de la vida. Mantiene correctamente «Yahvé» por יְהוָה y «la vida» por נָפֶשׁ. Sin embargo, «pleiteará por ellos» debilita el cognado hebreo יָרִיב רִיבָם, donde el objeto explícito es «su causa/caso/pleito», no solo «por ellos». Además, el borrador pierde la repetición léxica de קבע ... קֹבְעֵיהֶם que el inglés auditado preservó con «rob ... rob».'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para reflejar mejor la estructura jurídica y la palabra repetida del hebreo. «Defenderá su causa» suena más idiomático y preciso que «pleiteará por ellos». En la segunda mitad, «despojará de la vida a los que los despojan» conserva mejor el juego verbal, aunque suene algo más marcado; sigue siendo comprensible y digno en español bíblico moderno.
  glossary_alignment: 'Alineado con la política del proyecto en «Yahvé». No hay problemas con términos doctrinales mayores. La única desalineación relevante es estilístico-lexical: el hebreo repite la raíz קבע y conviene reflejarla también en español con «despojar ... despojan» en vez de combinar «quitará la vida» con «despojan».'
  issues:
  - severity: medium
    issue: «pleiteará por ellos» no expresa plenamente el objeto cognado «su causa/pleito»
    rationale: יָרִיב רִיבָם contiene verbo y sustantivo forense cognados. El hebreo no solo dice que Yahvé actuará en su favor, sino que defenderá su causa. «Defenderá su causa» o «pleiteará su causa» reflejan mejor la construcción.
  - severity: medium
    issue: Se pierde la repetición léxica de קבע ... קֹבְעֵיהֶם
    rationale: El audit trail inglés preserva deliberadamente el juego «rob ... rob». En español, «despojará de la vida a los que los despojan» mantiene esa reciprocidad poética mejor que «quitará la vida a quienes los despojan».
  - severity: low
    issue: La nota al pie alternativa no sigue de cerca la alternativa inglesa principal
    rationale: La nota actual ofrece «defenderá su causa», que en realidad mejora el texto principal más que funcionar solo como alternativa. Conviene hacer del mejor giro el texto principal y dejar una alternativa más cercana a «plead/contend».
  revised_spanish_text: Porque Yahvé defenderá su causa, y despojará de la vida a los que los despojan[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Porque Yahvé contenderá por su causa y quitará la vida a quienes los despojan»'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos reparaciones pequeñas pero importantes: explicita «su causa» para reflejar el cognado forense יָרִיב רִיבָם, y conserva la repetición de la raíz קבע con «despojará ... despojan», en línea con la justificación léxica documentada en el POB inglés. El resultado sigue siendo natural y claro en español e intensifica la justicia poética del proverbio.'
