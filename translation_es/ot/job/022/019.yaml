translation:
  language: es
  text: Los justos ven y se alegran[a], y el inocente se burla de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ríen de ellos» o «se mofan de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאוּ
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - observan
  - miran
  - contemplan
  lexicon: HALOT
  rationale: El qal imperfecto 3mp de ראה expresa percibir o presenciar. En español, «ven» es la equivalencia más directa y natural, sin añadir matices que el hebreo no exige.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  - los justos
  lexicon: HALOT
  rationale: Es un plural sustantivado que designa una categoría moral. «Los justos» conserva ese valor y suena natural en español bíblico contemporáneo.
- source_word: וְיִשְׂמָחוּ
  english_pob_choice: and rejoice
  chosen_spanish: y se alegran
  alternatives_spanish:
  - y se gozan
  - y regocijan
  - y se alegran
  lexicon: HALOT
  rationale: El verbo שׂמח expresa alegría o regocijo. «Se alegran» comunica bien la respuesta positiva sin forzar un tono demasiado interpretativo.
- source_word: וְנָקִי
  english_pob_choice: and the innocent
  chosen_spanish: y el inocente
  alternatives_spanish:
  - y el limpio de manos
  - y el sin culpa
  - y el inocente
  lexicon: HALOT
  rationale: Aunque la forma es singular, funciona de manera genérica y paralela a «los justos». «El inocente» preserva el sustantivo moral y su naturalidad en español.
- source_word: יִלְעַג
  english_pob_choice: mock
  chosen_spanish: se burla de
  alternatives_spanish:
  - se ríe de
  - se mofa de
  - ridiculiza
  lexicon: HALOT
  rationale: לעג denota burla despectiva. «Se burla de» comunica la ironía o escarnio con un registro claro; en español mantiene mejor el tono que un simple «ríe de».
- source_word: לָמוֹ
  english_pob_choice: them
  chosen_spanish: de ellos
  alternatives_spanish:
  - a ellos
  - contra ellos
  - de ellos
  lexicon: HALOT
  rationale: El pronombre apunta a los impíos del contexto inmediato. Con «se burla de ellos» se conserva el referente sin introducirlo explícitamente en el texto principal.
theological_decisions:
- issue: Referente de «ellos» en el contexto
  english_pob_reading: The righteous and innocent are reacting to the downfall of the wicked described in the surrounding verses.
  chosen_spanish_reading: Los justos y el inocente reaccionan ante la caída de los impíos mencionados en el contexto cercano.
  alternative_spanish_readings:
  - Una referencia más general a la respuesta gozosa de los justos ante el juicio de Dios
  - Una lectura sin referencia concreta más allá del contraste moral
  rationale: El hebreo y el contexto de Job 22 apuntan a los impíos del entorno inmediato. La traducción mantiene el pronombre para no sobrecargar el verso, pero la nota contextual puede aclarar el referente.
  doctrine_reference: Contexto literario de Job 22; juicio divino sobre los impíos
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «it» porque no estaba representado en el hebreo; por eso el español también evita cualquier objeto neutro añadido y conserva solo la acción directa: «ven y se alegran».'
  spanish_consistency_notes:
  - Se mantiene «los justos» para צַדִּיקִים, en línea con el valor moral sustantivado.
  - «El inocente» conserva el singular genérico de נָקִי sin convertirlo en plural.
  - El pronombre «ellos» queda sin antecedente explícito en el verso, tal como permite el contexto inmediato, evitando una glosa intrusiva en el texto principal.
  - Se usa «burla de» para reflejar el matiz de desprecio de לעג, con la alternativa anotada en nota al pie.
