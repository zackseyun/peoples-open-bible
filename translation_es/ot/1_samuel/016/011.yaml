translation:
  language: es
  text: 'Entonces Samuel dijo a Isaí: «¿Son estos todos los jóvenes?» Y él dijo: «Todavía queda el menor; y he aquí, está pastoreando el rebaño[a]». Entonces Samuel dijo a Isaí: «Envía por él y tráelo, porque no nos sentaremos[b] hasta que él venga aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «está cuidando las ovejas». El hebreo dice literalmente «pastoreando el rebaño».
    reason: lexical_alternative
  - marker: b
    text: O, «no nos sentaremos alrededor / no tomaremos nuestro lugar», probablemente con el sentido de que no comenzarían la comida o la reunión formal hasta que él llegara.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתַמּוּ
  english_pob_choice: Are these all
  chosen_spanish: ¿Son estos todos
  alternatives_spanish:
  - ¿Han quedado completos?
  - ¿Son todos los jóvenes?
  lexicon: HALOT
  rationale: La pregunta no pide una idea abstracta de “completarse”, sino si falta alguno de los hijos presentados. «¿Son estos todos» conserva esa fuerza idiomática en español natural.
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los muchachos jóvenes
  lexicon: HALOT
  rationale: En este contexto se trata de los hijos de Isaí con edad suficiente para ser considerados jóvenes; «los jóvenes» es natural y evita infantilizar el grupo.
- source_word: עוֹד שָׁאַר
  english_pob_choice: still remains
  chosen_spanish: todavía queda
  alternatives_spanish:
  - aún queda
  - todavía permanece
  lexicon: HALOT
  rationale: La combinación expresa que uno no ha sido presentado aún. «Todavía queda» transmite bien la idea de que falta uno por traer sin sonar forzado.
- source_word: הַקָּטָן
  english_pob_choice: the youngest
  chosen_spanish: el menor
  alternatives_spanish:
  - el más joven
  - el pequeño
  lexicon: HALOT
  rationale: 'En contexto familiar, el sentido es ordinal y relacional: el hijo menor. «El menor» es idiomático en español y mantiene la referencia al orden entre hermanos.'
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: La partícula introduce una atención súbita al dato siguiente. «Mira» conserva esa deíxis de forma clara y moderna; en español bíblico puede alternar con «y he aquí», pero aquí suena más natural.
- source_word: רֹעֶה בַּצֹּאן
  english_pob_choice: shepherding the flock
  chosen_spanish: está pastoreando el rebaño
  alternatives_spanish:
  - está cuidando las ovejas
  - está apacentando el rebaño
  lexicon: HALOT
  rationale: El participio indica acción en curso. «Pastoreando» conserva el vínculo léxico con el campo del pastor y es suficientemente literal; «rebaño» refleja el colectivo צֹאן.
- source_word: שִׁלְחָה וְקָחֶנּוּ
  english_pob_choice: Send and bring him
  chosen_spanish: Envíalo y tráelo
  alternatives_spanish:
  - Mándalo y tráelo
  - Envía por él y tráelo
  lexicon: HALOT
  rationale: El hebreo combina dos imperativos directos; «Envíalo y tráelo» reproduce ese movimiento de manera concisa. «Envía por él» suavizaría la duplicación verbal presente en la fuente.
- source_word: לֹא נָסֹב
  english_pob_choice: we will not sit down
  chosen_spanish: no nos sentaremos
  alternatives_spanish:
  - no nos pondremos a la mesa
  - no tomaremos asiento
  lexicon: HALOT
  rationale: 'La decisión sigue la lectura idiomática del audit trail: no iniciar la reunión/comida antes de que llegue. «No nos sentaremos» es transparente y mantiene la ambigüedad útil del hebreo sin volverla demasiado interpretativa.'
- source_word: עַד בֹּאוֹ פֹה
  english_pob_choice: until he comes here
  chosen_spanish: hasta que él venga aquí
  alternatives_spanish:
  - hasta que llegue aquí
  - hasta su llegada aquí
  lexicon: HALOT
  rationale: La cláusula temporal es simple y directa. «Hasta que él venga aquí» mantiene la relación temporal y el movimiento hacia el lugar indicado.
theological_decisions:
- issue: Registro de la partícula de atención הִנֵּה en una escena narrativa
  english_pob_reading: and behold
  chosen_spanish_reading: y, mira,
  alternative_spanish_readings:
  - y he aquí
  - mira
  rationale: No hay carga doctrinal especial, pero sí una decisión de registro. Se evita una forma demasiado arcaica sin perder el efecto enfático del hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que elevó el registro de הִנֵּה de “look” a “behold”. En español, el equivalente funcional se resolvió con «mira», manteniendo formalidad moderada sin caer en una arcaismo innecesario. También se respetó la lectura idiomática de לֹא נָסֹב como una negativa a sentarse o tomar asiento antes de la llegada del menor, según el razonamiento auditado.
  spanish_consistency_notes:
  - Se mantiene «Isaí» para יִשַׁי y «Samuel» para שְׁמוּאֵל.
  - Se usa «Yahvé» no aparece en este versículo, por lo que no se requiere decisión terminológica adicional.
  - Se conserva el paralelismo narrativo con dos intervenciones de Samuel y la respuesta de Isaí.
  - La puntuación busca reproducir con claridad los diálogos directos y el énfasis de la partícula deíctica.
