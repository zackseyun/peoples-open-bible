base_translation:
  language: en
  yaml_path: translation/ot/zechariah/012/006.yaml
  text: On that day I will make the clans of Judah like a firepot among wood[a], and like a flaming torch among sheaves; and they will consume all the surrounding peoples, on the right and on the left. And Jerusalem will again dwell in her own place[b], in Jerusalem.
  footnotes:
