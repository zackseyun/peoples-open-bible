lexical_decisions:
- source_word: חוּרַי
  english_pob_choice: Hurai
  chosen_spanish: Hurai
  alternatives_spanish:
  - Huraih
  lexicon: HALOT
  rationale: Nombre propio; se translitera y no se traduce. Se conserva la forma breve y reconocible usada en la tradición POB inglesa.
- source_word: מִ/נַּחֲלֵי
  english_pob_choice: from the wadis of
  chosen_spanish: de los arroyos de
  alternatives_spanish:
  - de los valles de
  - de los wadis de
  lexicon: HALOT
  rationale: נחל puede abarcar wadi, cauce estacional, arroyo o valle. En español, 'arroyos' comunica mejor el sentido geográfico de cauces estacionales sin introducir un tecnicismo poco natural como 'wadis'.
- source_word: גָעַשׁ
  english_pob_choice: Gaash
  chosen_spanish: Gaas
  alternatives_spanish:
  - Gaash
  lexicon: HALOT
  rationale: Topónimo transliterado. Se adapta mínimamente la grafía al español para una lectura más natural, sin perder la identidad del nombre.
- source_word: אֲבִיאֵל
  english_pob_choice: Abiel
  chosen_spanish: Abiel
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la transliteración estándar en español.
- source_word: הָ/עַרְבָתִי
  english_pob_choice: the Arbathite
  chosen_spanish: el arbatita
  alternatives_spanish:
  - el arabatita
  lexicon: HALOT
  rationale: Gentilicio que indica procedencia. 'Arbatita' reproduce el valor de nombre étnico/geográfico de la forma inglesa POB y evita sobreinterpretar el lugar exacto; en español se usa artículo más gentilicio como etiqueta nominal.
translation_notes:
  revision_awareness: El texto base inglés no requiere cambios de sentido; se mantiene la estructura nominal de la lista con transliteración de nombres y una equivalencia funcional para נחל. No se incorporan revisiones posteriores porque el expediente indica ausencia de cambios.
  spanish_consistency_notes:
  - Se mantiene un español bíblico claro y sobrio, sin calco mecánico del inglés.
  - Se evita 'SEÑOR' u otras sustituciones porque el versículo no contiene el Tetragrámaton ni lenguaje divino.
  - Se conserva la distinción entre nombre propio y gentilicio, importante en listas onomásticas.
  - Se eligió 'arroyos' como solución natural en español para נחל, dejando las alternativas semánticas en nota.
