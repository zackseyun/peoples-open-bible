translation:
  language: es
  text: Y esta casa fue terminada el tercer día del mes de Adar[b][a], que era el sexto año del reinado del rey Darío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «este templo». El arameo dice literalmente «esta casa», una designación común del templo en Esdras.
    reason: lexical_alternative
  - marker: b
    text: O, «para el tercer día del mes de Adar». La frase también puede entenderse como el punto hasta el cual se extendió la obra, es decir, su fecha de terminación.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשֵׁיצִיא
  english_pob_choice: was finished
  chosen_spanish: fue terminada
  alternatives_spanish:
  - fue completada
  - terminaron
  lexicon: HALOT
  rationale: El verbo arameo expresa la conclusión de una obra. En español, la pasiva "fue terminada" conserva el enfoque en la casa/templo y suena natural; "fue completada" también es posible, pero menos idiomática aquí.
- source_word: בַּיְתָה דְנָה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta casa del templo
  lexicon: HALOT
  rationale: Se mantiene el sentido literal "casa" como en el arameo. En contexto de Esdras, designa el templo, pero conservar "casa" respeta la forma fuente; una nota permite la equivalencia contextual con "templo".
- source_word: עַד יוֹם תְּלָתָה
  english_pob_choice: by the third day
  chosen_spanish: para el tercer día
  alternatives_spanish:
  - el tercer día
  - hasta el tercer día
  lexicon: HALOT
  rationale: La preposición con fecha puede marcar el punto culminante alcanzado. "Para el tercer día" comunica bien que la obra quedó concluida en ese momento, sin forzar una lectura puramente temporal o estrictamente locativa.
- source_word: לִירַח אֲדָר
  english_pob_choice: of the month Adar
  chosen_spanish: del mes de Adar
  alternatives_spanish:
  - en el mes de Adar
  lexicon: HALOT
  rationale: La frase aramea es literalmente un genitivo de fecha. En español, "del mes de Adar" es la formulación más natural y fiel.
- source_word: דִּי הִיא
  english_pob_choice: which was
  chosen_spanish: que era
  alternatives_spanish:
  - el cual era
  - que fue
  lexicon: HALOT
  rationale: La cláusula relativa enlaza la fecha con el año del reinado. "Que era" reproduce la relación sintáctica de manera fluida y cronológica en español.
- source_word: שְׁנַת שֵׁת
  english_pob_choice: the sixth year
  chosen_spanish: el sexto año
  alternatives_spanish:
  - año seis
  lexicon: HALOT
  rationale: La expresión ordinal/regnal se rinde de forma idiomática en español como "el sexto año".
- source_word: לְמַלְכוּת
  english_pob_choice: of the reign of
  chosen_spanish: del reinado de
  alternatives_spanish:
  - del reino de
  - de la realeza de
  lexicon: HALOT
  rationale: En esta fórmula cronológica, el sustantivo remite al ejercicio del gobierno real; "reinado" preserva mejor ese valor que "reino".
- source_word: דָּרְיָוֶשׁ מַלְכָּא
  english_pob_choice: King Darius
  chosen_spanish: el rey Darío
  alternatives_spanish:
  - Darío el rey
  lexicon: HALOT
  rationale: Se conserva explícitamente el título real presente en el arameo. "El rey Darío" es una forma natural y clara en español, equivalente a la opción inglesa.
theological_decisions:
- issue: ¿"casa" o "templo" para בַּיְתָה דְנָה?
  english_pob_reading: The Aramaic reads literally 'this house,' a common designation for the temple in Ezra.
  chosen_spanish_reading: '"esta casa" en el texto principal, con la comprensión contextual de que se trata del templo.'
  alternative_spanish_readings:
  - '"este templo" en el texto principal'
  rationale: 'No se quiere borrar la tensión lexical documentada: el arameo dice literalmente "casa", aunque en Esdras funcione como designación del templo. Por eso se mantiene la literalidad en el cuerpo y se registra la equivalencia contextual en nota.'
  doctrine_reference: Uso contextual de términos cultuales en Esdras 1–6
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios sustanciales; la concordancia general con el audit trail inglés es alta y solo requiere decisiones de naturalidad española para la fecha y la fórmula regnal.
  spanish_consistency_notes:
  - Se mantuvo "casa" en el texto principal para respetar el valor literal de בַּיְתָה, sin ocultar su sentido templario.
  - Se prefirió "reinado" para לְמַלְכוּת por ser la forma cronológica más natural en español.
  - '"Darío" se mantiene como nombre propio tradicionalmente usado en español, con el título explícito "rey".'
  - La fecha se formuló de modo que siga siendo ambigua entre "para/by" y una lectura más estrictamente dativa, como refleja la nota.
  - No se usó "SEÑOR" ni terminología eclesiástica que no está en el original.
