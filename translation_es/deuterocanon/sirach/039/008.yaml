translation:
  language: es
  text: Él mismo hace clara[a] la instrucción de su enseñanza, y en la ley de la alianza del Señor se gloriará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «saca a luz la instrucción de su enseñanza». El griego también puede sugerir disciplina formativa y el acto de hacer algo manifiesto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se jactará». El verbo griego también puede expresar gloriarse o jactarse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: He himself
  chosen_spanish: Él mismo
  alternatives_spanish:
  - Él
  - Él personalmente
  lexicon: LSJ
  rationale: El pronombre intensivo se conserva mejor con «Él mismo», que expresa énfasis en el sujeto sin añadir contenido ajeno.
- source_word: ἐκφαίνει
  english_pob_choice: makes plain
  chosen_spanish: hace claro
  alternatives_spanish:
  - saca a luz
  - da a conocer
  - revela
  lexicon: LSJ
  rationale: El verbo indica hacer algo evidente o visible; «hace claro» transmite claridad de forma natural en español y mantiene la idea de manifestación sin exagerar.
- source_word: παιδείαν
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - formación
  - educación
  lexicon: LSJ
  rationale: En este contexto sapiencial, el término abarca enseñanza formativa; «instrucción» conserva bien el matiz pedagógico sin volverlo demasiado punitivo.
- source_word: διδασκαλίας
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  - instrucción
  lexicon: LSJ
  rationale: «Enseñanza» reproduce de manera directa el sentido de διδασκαλία y suena natural en español contemporáneo.
- source_word: νόμῳ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - Torá
  - instrucción
  lexicon: LSJ
  rationale: Aquí νόμος se refiere al marco normativo de la alianza divina; «ley» es el equivalente más claro y fiel para el lector español.
- source_word: διαθήκης
  english_pob_choice: covenant
  chosen_spanish: alianza
  alternatives_spanish:
  - pacto
  - covenio
  lexicon: LSJ
  rationale: En un contexto bíblico, διαθήκη expresa la relación pactal con Dios; «alianza» es un término bíblico claro en español y evita el tecnicismo de «testamento».
- source_word: Κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - de Dios
  lexicon: LSJ
  rationale: Siguiendo la convención del proyecto para κύριος en este tipo de fórmula bíblica, «Señor» funciona naturalmente en español y mantiene la referencia reverente al nombre divino.
- source_word: καυχήσεται
  english_pob_choice: he will boast
  chosen_spanish: se gloriará
  alternatives_spanish:
  - se jactará
  - se enorgullecerá
  - se alabará
  lexicon: LSJ
  rationale: El verbo puede significar jactarse o gloriarse; «se gloriará» conserva el tono bíblico de exultación sin la dureza negativa que puede tener «se jactará».
theological_decisions:
- issue: Relación entre «ley» y «alianza» en ἐν νόμῳ διαθήκης Κυρίου
  english_pob_reading: '''in the law of the Lord’s covenant,'' taking διαθήκης as qualifying νόμῳ.'
  chosen_spanish_reading: «en la ley de la alianza del Señor»
  alternative_spanish_readings:
  - «en la ley, la alianza del Señor»
  - «en la ley de la alianza del Señor»
  rationale: 'La sintaxis española permite reflejar la misma relación compacta del griego: la ley pertenece al marco de la alianza del Señor. Mantiene la ambigüedad controlada sin forzar una paráfrasis explicativa.'
  doctrine_reference: 'Contested terms table: κύριος → Señor'
- issue: Valor de καυχήσεται en un contexto sapiencial
  english_pob_reading: '''he will boast'' / ''he will glory'''
  chosen_spanish_reading: «se gloriará»
  alternative_spanish_readings:
  - «se jactará»
  - «se alegrará»
  rationale: En este pasaje la acción no es simple arrogancia, sino exultación en la ley pactal de Dios. «Se gloriará» conserva esa tensión y sigue siendo fiel al campo semántico del verbo.
  doctrine_reference: LSJ semantic range of καυχάομαι
translation_notes:
  revision_awareness: 'Se siguió el texto griego de Swete con concordancia alta y sin revisiones aplicadas en la fuente inglesa; la traducción española refleja esas decisiones estables y conserva las dos ambigüedades lexicales documentadas: ἐκφαίνει y καυχήσεται.'
  spanish_consistency_notes:
  - Se usó «alianza» para διαθήκη, en coherencia con el uso bíblico del término.
  - Se evitó «SEÑOR» en mayúsculas como convención de reemplazo, pero se mantuvo «Señor» por ser la forma estándar en español para κύριος en este marco.
  - Se prefirió «se gloriará» sobre «se jactará» para no endurecer innecesariamente el tono del verbo griego.
  - «Instrucción» y «enseñanza» distinguen los dos sustantivos griegos sin fusionarlos.
