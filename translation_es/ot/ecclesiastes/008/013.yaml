  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: contraste adversativo, bienestar negado al impío, no prolongar los días, imagen de la sombra y causa en la falta de temor ante Dios. Sin embargo, las notas al pie están mal ancladas: la nota [a] en español se coloca sobre «impío», pero la nota inglesa [a] corresponde a una alternativa de segmentación/lectura para la cláusula verbal «y no prolongará sus días», no a «the wicked». Además, la nota [b] en español está anclada a «sombra», aunque la alternativa corresponde a «delante de Dios / en la presencia de Dios».'
  spanish_quality_summary: El español es claro y digno. «Pero no le irá bien al impío» y «y no prolongará sus días» son naturales y fieles. «Como sombra» es comprensible, aunque «como una sombra» también sería posible; no es necesario cambiarlo. «Delante de Dios» es aceptable y bíblicamente natural. La principal reparación necesaria es la colocación y contenido de las notas, no la redacción principal.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים se traduce correctamente como «Dios». «Impío» para רָשָׁע es defendible en registro sapiencial. No hay términos clave del glosario mayor que requieran ajuste.'
  issues:
  - severity: high
    issue: La nota [a] está aplicada a «impío», pero la alternativa documentada corresponde a la cláusula «y no prolongará sus días».
    rationale: El English POB preserva una alternativa textual/estructural ligada a esa cláusula, no al sustantivo רָשָׁע. Mantenerla en «impío» altera el rastro de auditoría y confunde al lector.
  - severity: high
    issue: La nota [b] está anclada a «sombra», pero su contenido corresponde a «delante de Dios».
    rationale: La nota inglesa [b] explica la alternativa para מִלִּפְנֵי אֱלֹהִים («before God / in the presence of God»), no para כַּצֵּל.
  - severity: medium
    issue: La nota [a] española ofrece «al malvado», una alternativa no respaldada por la nota inglesa preservada.
    rationale: Aunque «malvado» es léxicamente posible, aquí la nota debía conservar la alternativa auditada del English POB, no introducir una distinta en ese marcador.
  revised_spanish_text: Pero no le irá bien al impío, y no prolongará sus días[a] como sombra, porque no teme delante de Dios[b].
