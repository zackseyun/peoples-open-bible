translation:
  language: es
  text: Y aconteció[a] que, cuando Moisés descendió del monte Sinaí con las dos tablas del testimonio en la mano de Moisés, al bajar del monte, Moisés no sabía que la piel de su rostro resplandecía[b] porque había hablado con él[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y sucedió». La fórmula hebrea introduce la escena narrativa.
    reason: source_note
  - marker: b
    text: O «brillaba» o «irradiaba». El verbo hebreo puede expresar emisión de rayos o resplandor; la traducción tradicional «tenía cuernos» se conserva como alternativa histórica, pero no encaja tan bien con el contexto.
    reason: lexical_alternative
  - marker: c
    text: 'La frase «porque había hablado con él» también puede entenderse temporalmente: «cuando habló con él».'
    reason: alternative_reading
  - marker: d
    text: Es decir, con Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo episodio. «Aconteció» conserva el valor discursivo sin sonar arcaica en exceso, y sigue de cerca la función del wayyiqtol hebreo.
- source_word: בְּרֶדֶת ... בְּרִדְתּוֹ
  english_pob_choice: when Moses came down ... as he came down
  chosen_spanish: cuando Moisés descendía ... mientras descendía
  alternatives_spanish:
  - cuando Moisés bajaba
  - al descender Moisés
  lexicon: HALOT
  rationale: El hebreo repite la idea del descenso para enmarcar la escena. «Descendía» y «mientras descendía» mantienen esa repetición temporal sin perder naturalidad en español.
- source_word: מֵהַר סִינַי
  english_pob_choice: from Mount Sinai
  chosen_spanish: del monte Sinaí
  alternatives_spanish:
  - del monte de Sinaí
  - desde el monte Sinaí
  lexicon: HALOT
  rationale: «Monte Sinaí» es la forma natural y fiel en español para el topónimo bíblico, preservando el sentido del hebreo sin sobretraducirlo.
- source_word: שְׁנֵי לֻחֹת הָעֵדֻת
  english_pob_choice: the two tablets of the testimony
  chosen_spanish: las dos tablas del testimonio
  alternatives_spanish:
  - las dos tablas de la alianza
  - las dos tablas del testimonio del pacto
  lexicon: HALOT
  rationale: Se mantiene «testimonio» para עֵדוּת, como en la decisión inglesa. «Tablas» comunica bien לֻחֹת en español bíblico y es más natural que «tablas de piedra» aquí, ya que el texto no lo añade explícitamente.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: in Moses' hand
  chosen_spanish: en la mano de Moisés
  alternatives_spanish:
  - en la mano de Moisés
  - en poder de Moisés
  lexicon: HALOT
  rationale: La imagen concreta de la mano debe conservarse. «En la mano de Moisés» reproduce el hebreo con claridad y sin perder el detalle físico.
- source_word: לֹא יָדַע
  english_pob_choice: did not know
  chosen_spanish: no sabía
  alternatives_spanish:
  - no conocía
  - no se dio cuenta
  lexicon: HALOT
  rationale: Para ידע, «no sabía» es la equivalencia simple y directa. «No se dio cuenta» introduciría un matiz más interpretativo que el hebreo no exige.
- source_word: קָרַן
  english_pob_choice: shone
  chosen_spanish: resplandecía
  alternatives_spanish:
  - brillaba
  - irradiaba
  lexicon: HALOT
  rationale: El verbo describe emisión de luz/rayos; la tradición de «cuernos» no encaja con el contexto. «Resplandecía» conserva la idea de brillo visible y el tono elevado del pasaje.
- source_word: עוֹר פָּנָיו
  english_pob_choice: the skin of his face
  chosen_spanish: la piel de su rostro
  alternatives_spanish:
  - la piel de su cara
  - su rostro
  lexicon: HALOT
  rationale: Se mantiene la expresión plena del hebreo. «Rostro» suena más digno que «cara» en este contexto, y «piel de su rostro» evita borrar el detalle corporal del original.
- source_word: בְּדַבְּרוֹ אִתּוֹ
  english_pob_choice: because he had spoken with him
  chosen_spanish: porque había hablado con él
  alternatives_spanish:
  - cuando había hablado con él
  - al hablar con él
  lexicon: HALOT
  rationale: La preposición puede ser temporal o causal; aquí se adopta la relación causal destacada por la POB inglesa. «Había hablado con él» conserva el aspecto perfecto y la referencia pronominal.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con Yahvé
  - con Dios
  lexicon: HALOT
  rationale: El hebreo conserva el pronombre; el contexto identifica al referente como Yahvé. La traducción mantiene el pronombre en el texto principal y deja la identificación implícita, fiel al original.
theological_decisions:
- issue: Sentido de קָרַן aplicado al rostro de Moisés
  english_pob_reading: shone rather than 'horned'
  chosen_spanish_reading: resplandecía / brillaba, no «tenía cuernos»
  alternative_spanish_readings:
  - tenía cuernos
  - era cornudo
  rationale: El contexto inmediato habla de un efecto visible de la presencia divina y de la reacción de temor en Israel. Traducir con lenguaje de cuernos introduciría una imagen ajena al pasaje y oscurecería la gloria reflejada en el rostro de Moisés.
  doctrine_reference: Exodo 34:29-35; principio de fidelidad semántica al contexto inmediato
- issue: Referencia de אִתּוֹ
  english_pob_reading: retain the pronoun 'him' in the main text, referring contextually to the LORD
  chosen_spanish_reading: mantener «él» en el texto principal, entendido contextualmente como Yahvé
  alternative_spanish_readings:
  - nombrar explícitamente a Yahvé
  - nombrar explícitamente a Dios
  rationale: El hebreo conserva un pronombre, y la versión española debe preservar esa forma para no sobreexplicar. La referencia divina queda clara por el contexto narrativo previo, sin alterar la textura del verso.
  doctrine_reference: Éxodo 34; principio de conservación de referentes pronominales cuando el contexto los hace inequívocos
translation_notes:
  revision_awareness: La última revisión del inglés POB cambió «was radiant» por «shone» para acercarse más al verbo hebreo, manteniendo el registro formal. La versión española sigue esa decisión con «resplandecía», que conserva la imagen de luz y evita la lectura histórica incorrecta de «cuernos».
  spanish_consistency_notes:
  - Se conserva «Yahvé» como referente implícito en la nota, conforme a la política terminológica del proyecto, pero no se sobrecarga el texto principal con el nombre donde el hebreo usa pronombre.
  - «Testimonio» se mantiene para עֵדוּת, en coherencia con el patrón del POB inglés y con el sentido pactal del pasaje.
  - Se eligió «rostro» en lugar de «cara» para un registro bíblico más digno sin cambiar el referente anatómico.
  - La repetición temporal del descenso se preserva mediante dos expresiones, evitando simplificar la estructura hebrea.
