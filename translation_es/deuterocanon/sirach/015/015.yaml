translation:
  language: es
  text: Si deseas, guardarás el mandamiento[a], y hacer su voluntad fielmente está en tu querer[b]. Si confías en él[c], tú también vivirás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene singular, 'mandamiento'; el paralelo griego usa plural, 'mandamientos'.
    reason: textual_variant
  - marker: b
    text: La cláusula media es difícil en el hebreo. El paralelo griego lee una expresión relacionada con producir fe o fidelidad, lo que sugiere una Vorlage distinta o una traducción interpretativa.
    reason: alternative_reading
  - marker: c
    text: 'O: "Si crees en él, tú también vivirás".'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם תַּחְפֹּץ / ἐὰν θέλῃς
  english_pob_choice: If you desire
  chosen_spanish: Si deseas
  alternatives_spanish:
  - Si quieres
  - Si estás dispuesto
  lexicon: HALOT
  rationale: Se conserva la fuerza volitiva del condicional sin reducirlo a mera capacidad. En español, "si deseas" reproduce bien la elección personal y suena natural y digno.
- source_word: תִּשְׁמֹר מִצְוָה / συντηρήσεις ἐντολάς
  english_pob_choice: you will keep the commandment
  chosen_spanish: guardarás el mandamiento
  alternatives_spanish:
  - obedecerás el mandamiento
  - guardarás los mandamientos
  lexicon: HALOT
  rationale: El hebreo trae singular, mientras el griego tiene plural. Se mantiene el singular en el texto principal por la prioridad del hebreo, y "guardarás" conserva el valor de observancia obediente.
- source_word: וְתָבִינָה לַעֲשׂוֹת רְצוֹנוֹ / πίστιν ποιῆσαι εὐδοκίας
  english_pob_choice: to do his will faithfully is within your pleasure
  chosen_spanish: hacer su voluntad fielmente está dentro de tu disposición
  alternatives_spanish:
  - hacer su voluntad fielmente está dentro de tu agrado
  - cumplir su voluntad fielmente está dentro de tu querer
  - y obrar con fidelidad es tu deleite
  lexicon: HALOT
  rationale: La línea media es textualmente difícil en hebreo y el paralelo griego apunta a una idea de fidelidad/disposición. "Dentro de tu disposición" intenta reflejar el campo de voluntad/agrado sin cerrar la ambigüedad ni imponer una solución dogmática o excesivamente interpretativa.
- source_word: אִם תַּאֲמִין בּוֹ
  english_pob_choice: If you trust in him
  chosen_spanish: Si confías en él
  alternatives_spanish:
  - Si crees en él
  - Si depositas tu confianza en él
  lexicon: HALOT
  rationale: '"Confiar" expresa con naturalidad el valor relacional de אמן con ב. Es idiomático en español y evita sobrecargar el pasaje con terminología más técnica de "fe".'
- source_word: תִּחְיֶה
  english_pob_choice: you too will live
  chosen_spanish: tú también vivirás
  alternatives_spanish:
  - también vivirás
  - vivirás también
  lexicon: HALOT
  rationale: Se conserva el énfasis de גַּם אַתָּה con "tú también". El futuro simple en español comunica bien la promesa resultante.
theological_decisions:
- issue: Tensión textual entre el hebreo y el griego en la cláusula media
  english_pob_reading: The main text follows the Hebrew as primary but allows the Greek to clarify the difficult middle clause.
  chosen_spanish_reading: El texto principal sigue el hebreo como testigo primario, pero la cláusula media se formula de modo que pueda albergar la idea de fidelidad/disposición que sugiere el griego.
  alternative_spanish_readings:
  - hacer su voluntad es tu agrado
  - y fidelidad consiste en hacer lo que le agrada
  - y el obrar fielmente está dentro de su favor
  rationale: El hebreo transmitido es oscuro; el griego aporta una lectura relacionada con fidelidad/voluntad. La traducción española evita resolver de manera cerrada la dificultad y conserva la tensión textual en una forma publicable.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como entrada real de traducción; preservar honestamente la incertidumbre del texto.'
- issue: Responsabilidad humana y obediencia
  english_pob_reading: The verse is rendered conditionally and volitionally without importing stronger doctrinal claims about autonomous free will.
  chosen_spanish_reading: El versículo queda en forma condicional y volitiva, sin convertirlo en una tesis filosófica sobre el libre albedrío.
  alternative_spanish_readings:
  - Si quieres, guardarás los mandamientos
  - Si estás dispuesto, guardarás su voluntad
  rationale: Sirácides enfatiza la responsabilidad humana, pero la traducción no debe endurecer esa afirmación más allá de lo que dice el texto. "Si deseas" mantiene el énfasis moral y volitivo sin forzar una lectura doctrinal.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión inglesa, que ajustó la cláusula media para acercarla más a לַעֲשׂוֹת רְצוֹנוֹ y evitar la expansión interpretativa "good pleasure". La versión española evita esa expansión y mantiene una formulación flexible: "hacer su voluntad fielmente está dentro de tu disposición".'
  spanish_consistency_notes:
  - Se usa "mandamiento" en singular para reflejar el hebreo, con nota sobre el plural griego.
  - Se evita "Cristo" y otras terminologías no pertinentes.
  - Se mantiene "confiar en él" en lugar de "tener fe" para conservar el matiz relacional del verbo.
  - La cláusula media se formula de manera abierta para no borrar la tensión textual hebreo-griego.
