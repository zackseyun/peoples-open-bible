    reason: lexical_alternative
  - marker: b
    text: O «que los hace santos». «Santifica» mantiene el verbo de קדשׁ y su sentido de acción divina de apartar y consagrar.
    reason: lexical_alternative
  revision_rationale: Se corrige «entre yo y ellos» a «entre mí y ellos» para ajustar el español a la gramática natural y fiel, sin cambiar el sentido del hebreo. El resto del borrador puede mantenerse.
