  revision_rationale: 'La revisión corrige tres puntos principales: sustituye «apoyo» por «esperanza» para reflejar mejor מַבָּטֵנוּ y el razonamiento lexical auditado; cambia «para ayuda» por «en busca de ayuda» para mejorar la naturalidad del español; y reemplaza «de delante del rey de Asiria» por «del rey de Asiria» para evitar un calco hebraísta innecesario. También se eliminó la nota redundante y se restauró la nota importante sobre «litoral/isla» documentada en el POB inglés. Se conserva el singular colectivo, la fórmula profética y el tono de desesperación del cierre.'
