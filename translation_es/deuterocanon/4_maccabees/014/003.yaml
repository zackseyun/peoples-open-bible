translation:
  language: es
  text: el sagrado y armonioso acuerdo de los siete hermanos acerca de la piedad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sagrado y armonioso concorde de los siete hermanos acerca de la piedad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὰς
  english_pob_choice: sacred
  chosen_spanish: sagrado
  alternatives_spanish:
  - santo
  - consagrado
  lexicon: LSJ
  rationale: ἱερός expresa lo que pertenece a lo divino o es sacro. «Sagrado» conserva el registro elevado del inglés POB y resulta natural en español sin volverse excesivamente litúrgico.
- source_word: ἐναρμόστους
  english_pob_choice: harmonious
  chosen_spanish: armonioso
  alternatives_spanish:
  - bien ajustado
  - concordante
  - en armonía
  lexicon: LSJ
  rationale: El adjetivo sugiere cosas ajustadas entre sí y en armonía. «Armonioso» comunica bien esa unión interna y mantiene el paralelismo estilístico con «sagrado».
- source_word: περὶ τῆς εὐσεβείας
  english_pob_choice: concerning godliness
  chosen_spanish: acerca de la piedad
  alternatives_spanish:
  - con respecto a la piedad
  - acerca de la devoción reverente
  - concerning godliness (calco no recomendado)
  lexicon: LSJ
  rationale: En 4 Macabeos εὐσέβεια designa la devoción reverente hacia Dios. En español, «piedad» es la alternativa más sobria y tradicional, y aquí conserva ese matiz devocional mejor que un giro más abstracto.
- source_word: τῶν ἑπτὰ ἀδελφῶν
  english_pob_choice: of the seven brothers
  chosen_spanish: de los siete hermanos
  alternatives_spanish:
  - de los siete varones
  - de los siete hermanos varones
  lexicon: LSJ
  rationale: ἀδελφῶν se refiere a los siete hermanos de la narración. «Hermanos» es preciso, natural y mantiene la referencia narrativa sin añadir información innecesaria.
- source_word: συμφωνίας
  english_pob_choice: accord
  chosen_spanish: acuerdo
  alternatives_spanish:
  - concordia
  - armonía
  - acuerdo concorde
  lexicon: LSJ
  rationale: συμφωνία puede significar acuerdo, concordia o armonía. Dado que ἐναρμόστους ya aporta la idea de armonía, «acuerdo» evita redundancia y refleja bien la idea de unidad conjunta.
theological_decisions:
- issue: Renderización de εὐσέβεια en contexto martirial
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - religiosidad
  - temor de Dios
  rationale: En 4 Macabeos εὐσέβεια es una virtud central que implica fidelidad reverente a Dios. «Piedad» conserva ese peso teológico en español y permite una lectura pública clara; «devoción» sería posible, pero menos técnico aquí.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 6'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «agreement» por «accord» para συμφωνίας. La redacción española sigue esa mejora con «acuerdo», mientras conserva la distinción entre ἐναρμόστους («armonioso») y συμφωνίας («acuerdo») para evitar redundancia semántica.
  spanish_consistency_notes:
  - Se mantiene «sagrado» para ἱερὰς, alineado con el registro elevado del texto griego y con la preferencia POB por no trivializar el lenguaje cultual.
  - «Piedad» se usa como equivalente de εὐσέβεια en este versículo, porque en español comunica mejor la virtud religiosa sin introducir un término demasiado abstracto.
  - «Acuerdo» se reserva para συμφωνίας, en coherencia con el audit trail inglés y para no duplicar la noción de armonía ya expresada por ἐναρμόστους.
