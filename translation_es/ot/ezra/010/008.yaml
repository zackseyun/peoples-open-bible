    text: O «al cabo de tres días». La frase establece un plazo límite para comparecer.
    reason: alternative_reading
  - marker: b
    text: O «serán puestos bajo el anatema» o «serán puestos bajo el ban». El verbo hebreo denota ser puesto bajo חרם, lo que puede implicar destrucción o confiscación; aquí el sentido contextual es la pérdida legal de los bienes.
    reason: lexical_alternative
  revision_rationale: 'Se revisa יָחֳרַם para reflejar la decisión final auditada del POB inglés (''forfeited'') con un español natural y claro: ''todos sus bienes serán confiscados''. La nota conserva la alternativa técnica de חרם/ban para no perder la carga léxica del hebreo. También se mejora ''todo su bien'' a ''todos sus bienes'' por naturalidad y precisión contextual.'
