  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé en este versículo. «Ira» para אַפִּי y «nación» para גּוֹי concuerdan con las decisiones auditadas. No hay problema teológico relevante; solo conviene alinear mejor las notas léxicas con el rastro inglés.
