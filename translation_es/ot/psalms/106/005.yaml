translation:
  language: es
  text: para ver el bien de tus escogidos, gozarme en el gozo de tu nación, y gloriarme con tu heredad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִרְאוֹת
  english_pob_choice: that I may see
  chosen_spanish: a fin de ver
  alternatives_spanish:
  - para ver
  - para que yo vea
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa finalidad. «A fin de ver» conserva la idea de propósito sin añadir contenido ajeno, y mantiene el verbo concreto «ver».
- source_word: בְּטוֹבַת
  english_pob_choice: the good of
  chosen_spanish: el bien de
  alternatives_spanish:
  - la bondad de
  - la prosperidad de
  - el bienestar de
  lexicon: HALOT
  rationale: En este contexto, טוֹבָה indica el bien/beneficio que pertenece a los escogidos, no una abstracción moral. «El bien de» sigue de cerca el valor lexical y evita sobrecargarlo con «prosperidad».
- source_word: בְּחִירֶיךָ
  english_pob_choice: your chosen ones
  chosen_spanish: tus escogidos
  alternatives_spanish:
  - tus elegidos
  - los que tú has escogido
  lexicon: HALOT
  rationale: El término remite a quienes Dios ha escogido. «Escogidos» es claro en español bíblico y conserva el sentido de elección sin importar categorías sistemáticas posteriores.
- source_word: לִשְׂמֹחַ
  english_pob_choice: rejoice
  chosen_spanish: alegrarme
  alternatives_spanish:
  - regocijarme
  - gozarme
  lexicon: HALOT
  rationale: El infinitivo continúa la serie de propósitos. Aquí el sentido natural en español es el reflexivo «alegrarme», que expresa participación personal en la alegría del pueblo de Dios.
- source_word: בְּשִׂמְחַת
  english_pob_choice: in the joy of
  chosen_spanish: en la alegría de
  alternatives_spanish:
  - con la alegría de
  - en el gozo de
  lexicon: HALOT
  rationale: La preposición ב marca esfera o participación. «En la alegría de» conserva la relación hebrea y suena natural en español contemporáneo.
- source_word: גּוֹיֶךָ
  english_pob_choice: your nation
  chosen_spanish: tu nación
  alternatives_spanish:
  - tu pueblo
  lexicon: HALOT
  rationale: גוֹי significa primariamente «nación». Aunque «pueblo» sería una opción contextual, «nación» refleja mejor la elección léxica del hebreo y la lectura del POB en inglés.
- source_word: לְהִתְהַלֵּל
  english_pob_choice: glory
  chosen_spanish: gloriarme
  alternatives_spanish:
  - gloriar
  - alardear
  - vanagloriarme
  lexicon: HALOT
  rationale: El hitpael puede significar «gloriarse» o «alabarse». En un contexto positivo de pacto, «gloriarme» conserva el matiz de orgullo gozoso con un registro formal adecuado y evita la dureza de «alardear».
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - junto con
  lexicon: HALOT
  rationale: La preposición indica asociación directa. «Con» reproduce de manera simple y exacta la relación entre el salmista y la heredad de Dios.
- source_word: נַחֲלָתֶךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  lexicon: HALOT
  rationale: En lenguaje bíblico español, «heredad» conserva mejor el valor de término pactal aplicado al pueblo de Dios. Además mantiene la resonancia tradicional del concepto de herencia asignada por Yahvé.
theological_decisions:
- issue: Mantener las designaciones de pacto sin fusionarlas
  english_pob_reading: your chosen ones ... your nation ... your inheritance
  chosen_spanish_reading: tus escogidos ... tu nación ... tu heredad
  alternative_spanish_readings:
  - tus elegidos ... tu pueblo ... tu herencia
  rationale: El versículo acumula tres expresiones distintas para Israel. La traducción preserva esa variedad y no las nivela en un solo término, para respetar la arquitectura teológica del hebreo.
  doctrine_reference: Salmos 106:5; Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa revisó 'prosperity' a 'good' y 'boast' a 'glory'. La presente redacción sigue esa revisión al optar por 'bien' y 'gloriarme', manteniendo además la estructura de propósito y los tres complementos pactales del hebreo.
  spanish_consistency_notes:
  - Se usa «escogidos» para בְּחִירֶיךָ, coherente con la terminología bíblica de elección.
  - Se usa «nación» para גּוֹיֶךָ y «heredad» para נַחֲלָתֶךָ, preservando la diferencia entre identidad corporativa y posesión pactal.
  - No se introduce «Cristo», «SEÑOR» ni otros sustitutos no presentes en el texto fuente.
  - El ritmo de la oración mantiene la serie infinitiva del hebreo con una estructura fluida en español.
