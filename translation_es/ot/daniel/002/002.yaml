translation:
  language: es
  text: Entonces el rey ordenó llamar[a] a los magos, a los encantadores, a los hechiceros y a los caldeos[b], para contarle al rey sus sueños. Y vinieron y estuvieron delante del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo literalmente dice «dijo para llamar», un giro idiomático que expresa una orden de convocarlos.
    reason: lexical_alternative
  - marker: b
    text: «Caldeos» puede referirse ya sea al pueblo étnico caldeo o, en este contexto, a una clase de sabios de la corte babilónica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... לִקְרֹא
  english_pob_choice: ordered
  chosen_spanish: ordenó llamar
  alternatives_spanish:
  - mandó llamar
  - dio la orden de llamar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dijo para llamar», una construcción idiomática de mandato. «Ordenó llamar» conserva la fuerza directiva sin calcar de forma extraña el original.
- source_word: חַרְטֻמִּים
  english_pob_choice: magicians
  chosen_spanish: magos
  alternatives_spanish:
  - magos de la corte
  - magos adivinos
  lexicon: HALOT
  rationale: En Daniel se trata de especialistas de corte en artes ocultas o adivinatorias. «Magos» es breve y natural en español; se evita «magos de la corte» por añadir más de lo que el término exige.
- source_word: אַשָּׁפִים
  english_pob_choice: enchanters
  chosen_spanish: encantadores
  alternatives_spanish:
  - hechiceros
  - adivinos
  lexicon: HALOT
  rationale: La función exacta es debatida, pero el campo semántico es de especialistas ocultistas. «Encantadores» distingue este grupo de los demás sin imponer una identificación más específica que la fuente no garantiza.
- source_word: מְכַשְּׁפִים
  english_pob_choice: sorcerers
  chosen_spanish: hechiceros
  alternatives_spanish:
  - hechiceros practicantes
  - brujos
  lexicon: HALOT
  rationale: El término procede de la raíz asociada con la hechicería. «Hechiceros» comunica bien el sentido negativo y mantiene una equivalencia natural en español.
- source_word: כַּשְׂדִּים
  english_pob_choice: Chaldeans
  chosen_spanish: caldeos
  alternatives_spanish:
  - caldeos[b]
  - chaldeos
  lexicon: HALOT
  rationale: Se conserva el etnónimo tradicional «caldeos», que en el contexto de Daniel puede referirse tanto al pueblo como a una clase de sabios de Babilonia. Esto mantiene la ambigüedad documentada.
- source_word: לְהַגִּיד
  english_pob_choice: to tell
  chosen_spanish: declararan
  alternatives_spanish:
  - contaran
  - dijeran
  lexicon: HALOT
  rationale: Aquí el verbo significa hacer saber/expresar el contenido del sueño ante el rey. «Declararan» suena más formal y refleja mejor la intención de dar a conocer el sueño que un simple «contaran».
- source_word: חֲלֹמֹתָיו
  english_pob_choice: his dreams
  chosen_spanish: sus sueños
  alternatives_spanish:
  - los sueños del rey
  - sus sueños
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere al rey. En español, el antecedente cercano hace claro que son «sus sueños».
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron y
  - llegaron
  lexicon: HALOT
  rationale: «Vinieron» reproduce el movimiento narrativo de manera natural y directa.
- source_word: וַיַּעַמְדּוּ לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: stood before the king
  chosen_spanish: se pusieron delante del rey
  alternatives_spanish:
  - estuvieron delante del rey
  - comparecieron delante del rey
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para presentarse ante un superior. «Se pusieron delante del rey» conserva la imagen corporal del texto y su sentido de comparecencia.
theological_decisions:
- issue: Ambigüedad de כַּשְׂדִּים
  english_pob_reading: The term can refer either to ethnic Chaldeans or to a class of Babylonian court wise men; the English keeps 'Chaldeans' and notes the ambiguity.
  chosen_spanish_reading: «caldeos» conserva la ambigüedad entre etnónimo y designación profesional de la corte.
  alternative_spanish_readings:
  - sabios babilonios
  - caldeos de la corte
  rationale: No se elimina la tensión lexical documentada. Se prefiere el término tradicional y se deja constancia de que puede aludir a una clase de sabios cortesanos además del grupo étnico.
  doctrine_reference: Daniel 2:2, nota lexical sobre כַּשְׂדִּים
translation_notes:
  revision_awareness: 'El pasaje en inglés fue revisado y quedó sin cambios; la cruz de control señala solo un asunto menor. La versión española sigue el mismo juicio general: se mantiene la lectura idiomática del mandato y la ambigüedad de «caldeos», sin necesidad de enmiendas textuales.'
  spanish_consistency_notes:
  - Se conserva el tratamiento narrativo en pasado perfecto simple, coherente con Daniel 2:2.
  - 'Se mantiene una cadena de títulos/ocupaciones en plural y con artículo: los magos, los encantadores, los hechiceros y los caldeos.'
  - «Sus sueños» depende de «el rey» y evita redundancia innecesaria.
  - 'El orden de la cláusula final refleja la secuencia hebrea: venir y presentarse ante el rey.'
