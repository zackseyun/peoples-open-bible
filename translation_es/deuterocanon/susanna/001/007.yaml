translation:
  language: es
  text: Estos hombres vieron a una mujer hermosa en apariencia, esposa[a] de uno de sus hermanos, de entre los hijos de Israel, llamada Susana, hija de Hilcías, esposa de Joaquín, mientras caminaba en el jardín de su marido al atardecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «una esposa de uno de sus hermanos, de entre los hijos de Israel». La expresión es difícil; la traducción conserva la idea de que se trataba de una mujer israelita casada dentro de su propio pueblo.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: These men
  chosen_spanish: Estos hombres
  alternatives_spanish:
  - Estos
  - Estos mismos
  lexicon: LSJ
  rationale: El demostrativo apunta a los dos ancianos del relato; añadir «hombres» da claridad natural en español sin introducir información ajena al contexto.
- source_word: ἰδόντες
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - habiendo visto
  - cuando vieron
  lexicon: LSJ
  rationale: El participio funciona narrativamente como una acción pasada simple; el pretérito es la opción más natural y fiel en español.
- source_word: γυναῖκα ἀστεῖαν τῷ εἴδει
  english_pob_choice: a woman beautiful in appearance
  chosen_spanish: una mujer hermosa en apariencia
  alternatives_spanish:
  - una mujer atractiva en su aspecto
  - una mujer bella de figura
  lexicon: LSJ
  rationale: «Ἀστεῖαν» junto con «τῷ εἴδει» califica el aspecto externo; «hermosa en apariencia» conserva la cualidad visible sin cargar la frase con interpretación adicional.
- source_word: γυναῖκα ἀδελφοῦ αὐτῶν ἐκ τῶν υἱῶν Ἰσραήλ
  english_pob_choice: a wife of one of their brothers from the sons of Israel
  chosen_spanish: esposa de uno de sus hermanos, de entre los hijos de Israel
  alternatives_spanish:
  - esposa de su hermano, de entre los hijos de Israel
  - esposa de un hermano de ellos, de entre los hijos de Israel
  - mujer israelita
  lexicon: LSJ
  rationale: La sintaxis griega es difícil y la auditable lectura inglesa preserva la tensión de «brother» sin resolverla del todo. En español, «uno de sus hermanos» mantiene el vínculo fraternal/connacional sin sugerir indebidamente un hermano literal compartido; «de entre los hijos de Israel» conserva el matiz étnico-covenantal.
- source_word: ὄνομα Σουσάνναν
  english_pob_choice: whose name was Susanna
  chosen_spanish: llamada Susana
  alternatives_spanish:
  - de nombre Susana
  - cuyo nombre era Susana
  lexicon: LSJ
  rationale: La fórmula nominal se expresa de manera idiomática y concisa en español con «llamada Susana», sin perder el valor identificador del original.
- source_word: θυγατέρα Χελκίου
  english_pob_choice: daughter of Hilkiah
  chosen_spanish: hija de Hilcías
  alternatives_spanish:
  - hija de Helcías
  lexicon: LSJ
  rationale: Se mantiene la genealogía con transliteración habitual en español bíblico para el nombre propio.
- source_word: γυναῖκα Ἰωακείμ
  english_pob_choice: wife of Joakim
  chosen_spanish: esposa de Joaquín
  alternatives_spanish:
  - mujer de Joaquín
  - la esposa de Joaquín
  lexicon: LSJ
  rationale: Se traduce de forma directa la relación conyugal y se adapta el nombre propio a la forma más reconocible en español, conservando el referente del texto griego.
- source_word: περιπατοῦσαν
  english_pob_choice: walking
  chosen_spanish: que paseaba
  alternatives_spanish:
  - caminando
  - que caminaba
  lexicon: LSJ
  rationale: El participio describe una acción en curso en el jardín; «paseaba» suena natural en español y mantiene el movimiento sin exagerar su carácter.
- source_word: ἐν τῷ παραδείσῳ τοῦ ἀνδρὸς αὐτῆς
  english_pob_choice: in her husband's garden
  chosen_spanish: en el jardín de su marido
  alternatives_spanish:
  - en el jardín de su esposo
  - en el huerto de su marido
  - en el paraíso de su marido
  lexicon: LSJ
  rationale: Aquí παράδεισος designa un jardín cerrado u ornamental, no el «paraíso» teológico; «jardín» es la equivalencia contextual más clara. «Marido» conserva el registro bíblico y relacional, aunque «esposo» sería igualmente posible.
- source_word: τὸ δειλινόν
  english_pob_choice: in the evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - en la tarde
  - por la tarde
  - al anochecer
  lexicon: LSJ
  rationale: La expresión temporal apunta al tiempo vespertino; «al atardecer» da una equivalencia idiomática precisa y un poco más concreta que «por la tarde».
theological_decisions:
- issue: Cómo reproducir la frase ambigua de parentesco «γυναῖκα ἀδελφοῦ αὐτῶν ἐκ τῶν υἱῶν Ἰσραήλ»
  english_pob_reading: a wife of one of their brothers from the sons of Israel
  chosen_spanish_reading: esposa de uno de sus hermanos, de entre los hijos de Israel
  alternative_spanish_readings:
  - esposa de su hermano, de entre los hijos de Israel
  - mujer israelita
  rationale: La frase griega es sintácticamente difícil y la POB inglesa conserva esa aspereza en vez de resolverla del todo. La versión española mantiene la relación de parentesco tal como está atestiguada, sin convertirla en una simple etiqueta étnica ni forzar una aclaración no presente en el texto.
  doctrine_reference: Preservar la tensión textual y la transparencia exegética; no suavizar una dificultad sintáctica del original.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que ajustó la primera frase a «a woman beautiful in appearance» por mayor cercanía y formalidad. La versión española refleja esa misma decisión con «hermosa en apariencia» y conserva el resto de las elecciones auditadas sin resolver la dificultad del sintagma de parentesco.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «Susana», «Hilcías» y «Joaquín» como formas bíblicas españolas estables.
  - «Jardín» se usa para παράδεισος en sentido contextual; no se emplea «paraíso» para evitar una lectura teológica no presente aquí.
  - La nota al pie se ancla en «mujer[a]» para transparentar la dificultad del griego sin interrumpir la fluidez del español.
