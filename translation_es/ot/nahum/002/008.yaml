translation:
  language: es
  text: 'Está decretado: ella será desnudada[a], será llevada; y sus esclavas serán llevadas, como el sonido de palomas, golpeando sobre sus corazones[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será descubierta» o «será exiliada»; el hebreo es difícil y puede combinar humillación e imagen de deportación.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «sobre sus corazones»; la frase puede referirse idiomáticamente a golpearse el pecho en duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֻצַּב
  english_pob_choice: It is decreed
  chosen_spanish: Está decretado
  alternatives_spanish:
  - Está fijado
  - Está determinado
  lexicon: HALOT
  rationale: La forma es difícil y el audit trail la entiende como un pasivo/impersonal de valor declarativo. «Está decretado» preserva ese valor jurídico-poético sin imponer una imagen demasiado concreta como «está fijado».
- source_word: גֻּלְּתָה
  english_pob_choice: she is stripped bare
  chosen_spanish: será desnudada
  alternatives_spanish:
  - será despojada
  - será descubierta
  lexicon: HALOT
  rationale: El contexto combina humillación y deportación; en español, «desnudada» mantiene la imagen de exposición y vergüenza sin reducir el sentido a exilio solamente. La nota conserva la alternativa de «descubierta».
- source_word: הֹעֲלָתָה
  english_pob_choice: she is carried away
  chosen_spanish: será llevada
  alternatives_spanish:
  - será conducida
  - será arrebatada
  lexicon: HALOT
  rationale: El hebreo expresa movimiento forzado. «Será llevada» es natural en español y mantiene la idea de traslado coercitivo; «arrebatada» podría exagerar el matiz si se leyera como violencia explícita.
- source_word: אַמְהֹתֶיהָ
  english_pob_choice: her slave girls
  chosen_spanish: sus esclavas
  alternatives_spanish:
  - sus siervas
  - sus muchachas esclavas
  lexicon: HALOT
  rationale: אָמָה tiene fuerza social de esclava/sierva subordinada. «Sus esclavas» preserva mejor la fuerza léxica que «siervas» y evita suavizar el término.
- source_word: מְנַהֲגוֹת
  english_pob_choice: are led away
  chosen_spanish: serán conducidas
  alternatives_spanish:
  - serán llevadas
  - serán guiadas
  lexicon: HALOT
  rationale: El participio sugiere ser conducidas o llevadas en procesión forzada. «Serán conducidas» conserva el matiz de dirección externa y encaja con el movimiento cautivo.
- source_word: כְּקוֹל יוֹנִים
  english_pob_choice: like the sound of doves
  chosen_spanish: gimiendo como el sonido de las palomas
  alternatives_spanish:
  - como el sonido de las palomas
  - como palomas
  lexicon: HALOT
  rationale: Se mantiene el paralelo auditivo explícito. «Gimiendo» interpreta el contexto de lamento; «palomas» es preferible a «doves» por naturalidad en español, sin perder la imagen sonora.
- source_word: מְתֹפְפֹת
  english_pob_choice: beating
  chosen_spanish: golpeándose el pecho
  alternatives_spanish:
  - golpeando
  - dándose golpes
  lexicon: HALOT
  rationale: El gesto se entiende en el pasaje como duelo. En español, la construcción completa con el objeto implícito aclara el gesto funerario y hace explícita la acción que el hebreo describe de manera más breve.
- source_word: עַל לִבְבֵהֶן
  english_pob_choice: on their hearts
  chosen_spanish: el pecho
  alternatives_spanish:
  - su corazón
  - sus corazones
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sobre sus corazones», en español la imagen idiomática de duelo se comunica mejor con «el pecho». La decisión sigue la nota inglesa sobre la posible alusión a golpearse el pecho en lamento.
theological_decisions:
- issue: Tensión entre humillación y deportación en el primer hemistiquio
  english_pob_reading: The Hebrew is difficult and may combine humiliation and deportation imagery.
  chosen_spanish_reading: El texto español conserva ambas dimensiones con «será desnudada» y «será llevada».
  alternative_spanish_readings:
  - será descubierta y llevada
  - será despojada y exiliada
  rationale: No se debe cerrar la ambigüedad del hebreo a una sola imagen. «Desnudada» mantiene la vergüenza/descubierta; «llevada» mantiene el traslado forzado. Juntas reflejan la tensión documentada.
  doctrine_reference: none
- issue: Gesto de duelo en las esclavas
  english_pob_reading: Literally 'on their hearts'; the phrase may idiomatically refer to beating their breasts in mourning.
  chosen_spanish_reading: «golpeándose el pecho» comunica el duelo sin perder el trasfondo literal del hebreo.
  alternative_spanish_readings:
  - golpeándose el corazón
  - golpeándose el pecho en duelo
  rationale: En español, «pecho» es la forma idiomática más clara para el gesto de lamentación. Mantiene la nota antropológica del texto sin sonar forzado o anatómicamente extraño.
  doctrine_reference: none
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó «fixed» por «decreed» y «led off» por «led away». Por ello, el español usa «Está decretado» y «serán conducidas»/«será llevada» con un registro formal y consistente con la revisión final.
  spanish_consistency_notes:
  - Se mantuvo un tono sobrio y publicable, sin arcaísmos innecesarios.
  - «Yahvé» no aparece en este versículo; no se requirió decisión sobre el nombre divino.
  - Se preservó la tensión interpretativa del hebreo con nota, en lugar de resolverla de modo unilateral.
  - Se evitó «siervas» en favor de «esclavas» por la fuerza lexical del sustantivo hebreo.
