  spanish_quality_summary: La redacción actual es comprensible pero poco idiomática y algo calcada. «Toda gloria es la hija del rey» no es español natural; «de oro tejido» también suena rígido. Conviene una formulación digna y clara que mantenga la poesía y las alternativas en notas.
  glossary_alignment: No hay términos teológicos de proyecto en juego. «La hija del rey» preserva bien בַת מֶלֶךְ. «Vestidura» es aceptable y de registro bíblico. Se debe preferir «gloriosa» en el texto principal para reflejar el valor predicativo documentado por el POB, dejando la alternativa más literal/sustantiva en nota si se desea.
  issues:
  - severity: high
    issue: «Toda gloria es la hija del rey» no refleja fielmente la predicación del hebreo/POB.
    rationale: כָּל כְּבוּדָּה funciona intensivamente con sentido de ‘toda gloriosa / completamente gloriosa’, no como una ecuación nominal natural en español. La frase actual resulta extraña y puede sugerir que la hija del rey ‘es toda la gloria’.
  - severity: medium
    issue: Falta «adentro/dentro» en el texto principal pese a que פְּנִימָה está en la línea base del POB.
    rationale: El inglés principal conserva «within» en el texto, con nota explicando la ambigüedad. En español también debe mantenerse esa ambigüedad en el cuerpo del versículo, no solo en la nota.
  - severity: medium
    issue: «de oro tejido» es torpe en español.
    rationale: Aunque intenta seguir «woven gold», en español suena poco natural. «tejida con oro» o «de oro entretejido» preserva mejor la idea textil sin forzar un sentido joyero.
