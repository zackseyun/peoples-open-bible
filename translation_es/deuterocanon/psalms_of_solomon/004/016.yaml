translation:
  language: es
  text: Que su porción[a], oh Yahvé, esté en deshonra delante de ti[d][c][b], su salida en gemidos y su entrada en una maldición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lote» en vez de «porción».
    reason: lexical_alternative
  - marker: b
    text: «Salida» y «entrada» probablemente forman una expresión bíblica pareja para todo el curso de los movimientos o de la vida de una persona.
    reason: cultural_note
  - marker: c
    text: O «en maldición»; el griego dice literalmente «en maldición».
    reason: lexical_alternative
  - marker: d
    text: O «Que su porción, oh Yahvé, esté en deshonra delante de ti; su salida en gemidos y su entrada en una maldición».
    reason: previous_rendering
lexical_decisions:
- source_word: γένοιτο
  english_pob_choice: May ... be
  chosen_spanish: Que ... esté
  alternatives_spanish:
  - Que ... sea
  - Sea que ...
  lexicon: LSJ
  rationale: El optativo expresa un deseo o ruego imprecatorio; en español, una construcción con «Que» + subjuntivo transmite mejor esa petición que un indicativo. «Esté» conserva el estado deseado sin añadir interpretación.
- source_word: μερὶς
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - lote
  - parte
  lexicon: LSJ
  rationale: «Porción» conserva la idea de lo asignado o destinado a alguien y funciona bien en un contexto de juicio. «Lote» también es posible, pero suena algo más técnico o abstracto en español.
- source_word: ἀτιμίᾳ
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - oprobio
  lexicon: LSJ
  rationale: «Deshonra» mantiene el tono formal y moral/judicial del griego. «Vergüenza» inclina más al matiz emocional, y «oprobio» puede sonar más literario o cargado.
- source_word: ἔξοδος
  english_pob_choice: going out
  chosen_spanish: salida
  alternatives_spanish:
  - partida
  - salir
  lexicon: LSJ
  rationale: En la pareja con «entrada», «salida» preserva la antítesis y suena natural en español. Puede entenderse tanto de movimientos concretos como del curso de vida.
- source_word: στεναγμοῖς
  english_pob_choice: groanings
  chosen_spanish: gemidos
  alternatives_spanish:
  - gemidos de dolor
  - suspiros
  lexicon: LSJ
  rationale: «Gemidos» reproduce el plural de sufrimiento de modo natural en español. «Gritos» sería demasiado fuerte y «suspiros» demasiado suave para el contexto.
- source_word: εἴσοδος
  english_pob_choice: coming in
  chosen_spanish: entrada
  alternatives_spanish:
  - ingreso
  - venir
  lexicon: LSJ
  rationale: «Entrada» preserva la oposición con «salida» y sugiere el patrón total de movimientos o de vida. En español moderno es más idiomático que una calca como «venir en».
- source_word: ἀρᾷ
  english_pob_choice: in a curse
  chosen_spanish: maldición
  alternatives_spanish:
  - bajo maldición
  - en maldición
  lexicon: LSJ
  rationale: El griego usa ἐν + dativo de forma literal; «en maldición» conserva esa estructura. Aunque «bajo maldición» es una opción idiomática, aquí se prefiere la cercanía formal al texto fuente.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  - Yahvé
  lexicon: LSJ
  rationale: Según el criterio del proyecto, el nombre divino se vierte como «Yahvé» en el texto principal. El vocativo se expresa naturalmente con «oh» en español reverente.
theological_decisions:
- issue: Ruego imprecatorio y no simple predicción
  english_pob_reading: Render the verse as a direct prayer-wish to the Lord against the wicked person.
  chosen_spanish_reading: 'Presentarlo como un ruego directo: «Que ...» dirigido a Yahvé.'
  alternative_spanish_readings:
  - Traducirlo como una afirmación predictiva de juicio
  - Suavizarlo a una petición menos explícita
  rationale: El optativo γένοιτο y el vocativo Κύριε apuntan a una súplica imprecatoria. Mantener ese valor preserva la tensión teológica del texto sin diluirla en una mera descripción.
  doctrine_reference: Preservar la fuerza imprecatoria del salmo sin atenuarla
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del inglés en dos puntos clave: la lista continua gobernada por un solo optativo y la preferencia por una traducción más literal de ἐν ἀρᾷ. En español se preservó la estructura continua con comas y se evitó introducir un valor no atestado como «bajo maldición».'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al criterio del proyecto para Κύριος en contexto de nombre divino.
  - Se mantuvo «porción» para conservar la posible tensión con «lote», sin borrar la alternativa documentada.
  - Se respetó la paralelía «salida/entrada» como pareja idiomática bíblica.
  - «En maldición» conserva la literalidad de ἐν ἀρᾷ, aunque suena menos idiomático que «bajo maldición».
