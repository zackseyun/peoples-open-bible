revisions:
- from: La palabra que vino a Yirmeyahu[a] acerca de todo el pueblo de Judá, en el cuarto año de Joacim, hijo de Josías, rey de Judá; era el primer año de Nabucodonosor, rey de Babilonia—
  to: La palabra que vino a Yirmeyahu acerca de[a] todo el pueblo de Judá, en el cuarto año de Joacim, hijo de Josías, rey de Judá—era el primer año de Nabucodonosor, rey de Babilonia—
