translation:
  text: Jesus said[a], “When you make the two one, you will become sons of the Human;
    and when you say, ‘Mountain[e][d][c][b], move away,’ it will move.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Sons of the Human’ could be rendered ‘children of the Human’ (Coptic ⲛϣⲏⲣⲉ
      can be collective). Retaining ‘sons’ keeps the sharper literal edge and Thomas’s
      diction.
    reason: lexical_alternative
  - marker: b
    text: ‘Aloud’ translates ϫⲱⲛⲧⲟⲥ, which can also mean ‘openly’ or ‘boldly.’
    reason: lexical_alternative
  - marker: c
    text: Cf. Thomas 22, 48 (motif of making ‘two one’), where similar transformation
      language appears.
    reason: cross_reference
  - marker: d
    text: Cf. Mark 11:23; Matt 17:20; 21:21 for the mountain-moving motif in the Synoptics.
    reason: cross_reference
  - marker: e
    text: Or 'say it aloud,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϩⲟⲧⲁⲛ
  chosen: when
  alternatives:
  - whenever
  lexicon: Layton, Grammar §257; Crum s.v. ϩⲟⲧⲁⲛ
  rationale: Temporal/conditional particle introducing a protasis with future sense
    in the ⲉⲣϣⲁⲛ construction; ‘when’ is concise and fits Thomasine terseness.
- source_word: ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛ ⲉⲓⲣⲉ
  chosen: when you make
  alternatives:
  - when you will have made
  lexicon: Layton, Grammar §182 (ⲉⲣϣⲁⲛ future); Crum s.v. ⲉⲓⲣⲉ
  rationale: ⲉⲣϣⲁⲛ marks a future protasis; English ‘when you make’ conveys the sense
    without clumsy future perfect.
- source_word: ⲡⲥⲛⲁⲩ
  chosen: the two
  alternatives:
  - both
  lexicon: Crum s.v. ⲥⲛⲁⲩ
  rationale: Definite dual ‘the two’ preserves the proverbial, enigmatic phrasing
    common in Thomas.
- source_word: ⲟⲩⲁ
  chosen: one
  alternatives:
  - a single one
  lexicon: Crum s.v. ⲟⲩⲁ
  rationale: Basic numeric sense; brevity matches the Coptic parallelism ‘the two’/‘one’.
- source_word: ⲛϣⲏⲣⲉ
  chosen: sons
  alternatives:
  - children
  lexicon: Crum s.v. ϣⲏⲣⲉ
  rationale: Literal ‘sons’ keeps Thomas’s diction; a footnote notes the gender-inclusive
    ‘children’ option.
- source_word: ⲛⲡⲣⲱⲙⲉ
  chosen: of the Human
  alternatives:
  - of man
  - of the Human Being
  - of the Man
  lexicon: Crum s.v. ⲣⲱⲙⲉ; Layton NHS 20 notes on Thomas’s ‘the Man’
  rationale: Definite ‘the Human’ renders Thomas’s technical ‘p-rōme’ without importing
    Synoptic ‘Son of Man’ idiom; preserves strangeness.
- source_word: ϫⲱⲛⲧⲟⲥ
  chosen: aloud
  alternatives:
  - openly
  - boldly
  lexicon: Crum s.v. ϫⲱⲛⲧⲟⲥ
  rationale: Adverb meaning ‘aloud, openly’; ‘aloud’ best fits modifying ‘say’ here.
- source_word: ⲡⲧⲟⲟⲩ
  chosen: mountain
  alternatives:
  - the mountain
  lexicon: Crum s.v. ⲧⲟⲟⲩ
  rationale: Coptic vocative commonly uses the definite article; English vocative
    drops it for idiomatic address. Decision noted here.
- source_word: ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ
  chosen: move away
  alternatives:
  - go out
  - move out
  lexicon: Crum s.v. ⲱⲱⲛⲉ; ⲉⲃⲟⲗ
  rationale: ⲱⲱⲛⲉ ‘move’ + directional ⲉⲃⲟⲗ ‘out/away’; ‘move away’ is concise and
    natural.
- source_word: ⲛⲧⲟϥ ⲛⲁ ⲡⲱⲱⲛⲉ
  chosen: it will move
  alternatives:
  - it shall move
  lexicon: Layton, Grammar §182 (ⲛⲁ- future); Crum s.v. ⲱⲱⲛⲉ
  rationale: ⲛⲁ- signals future; straightforward rendering keeps Thomas’s directness.
textual_note: No lacunae or conjectural restorations in Dilley’s text for this saying.
  The manuscript line has ϫⲟⲟⲥ, normalized by Dilley as the verb ‘say’ with the adverb
  ϫⲱⲛⲧⲟⲥ (‘aloud’). Sahidic with Lycopolitan influence does not affect sense here.
  The definite article on ⲡⲧⲟⲟⲩ (the mountain) reflects Coptic vocative usage; it
  is omitted in English for idiomatic address.
