translation:
  language: es
  text: Pues yo sé que Yahvé es grande[b][a], y nuestro Señor está por encima de todos los dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más grande que todos los dioses». La expresión hebrea literalmente dice «de/desde todos los dioses», un giro comparativo que indica superioridad sobre ellos.'
    reason: lexical_alternative
  - marker: b
    text: «Yahvé» traduce el nombre divino YHWH; «nuestro Señor» traduce una palabra hebrea diferente, «nuestro señor/amo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí la conjunción introduce la razón o fundamento del testimonio del salmista; 'Porque' expresa bien esa relación causal en español natural.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo sé
  alternatives_spanish:
  - he sabido
  - estoy convencido
  lexicon: HALOT
  rationale: El perfecto hebreo comunica un conocimiento asentado; 'yo sé' preserva ese valor de certeza en español sin forzar un pasado.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - cómo
  lexicon: HALOT
  rationale: La segunda כִּי introduce el contenido de lo que el salmista sabe; 'que' es la equivalencia directa y más clara.
- source_word: גָדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - más grande
  - poderoso
  lexicon: HALOT
  rationale: El adjetivo afirma la grandeza de Yahvé de manera absoluta; 'grande' es la correspondencia más simple y fiel en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma de referencia del proyecto en español, 'Yahvé', para no sustituirlo por un título.
- source_word: וַאֲדֹנֵינוּ
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro amo
  - nuestro soberano
  lexicon: HALOT
  rationale: El sustantivo significa 'señor/amo' con sufijo de primera persona plural. 'Nuestro Señor' mantiene la dignidad del título y su fuerza relacional en español.
- source_word: מִכָּל
  english_pob_choice: above all
  chosen_spanish: por encima de todos
  alternatives_spanish:
  - más que todos
  - sobre todos
  lexicon: HALOT
  rationale: La preposición marca comparación de superioridad. 'Por encima de todos' comunica de forma natural la idea comparativa que el inglés POB expresa como 'above all'.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - seres divinos
  - ídolos
  lexicon: HALOT
  rationale: En este contexto plural se refiere a otras deidades rivales o supuestas deidades. 'Los dioses' reproduce la fuerza polémica y comparativa del hebreo sin resolver la tensión teológica.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la norma del proyecto, se traslada al español como 'Yahvé' para preservar el nombre personal del Dios del pacto y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Comparativo implícito en מִכָּל אֱלֹהִים
  english_pob_reading: above all gods
  chosen_spanish_reading: por encima de todos los dioses
  alternative_spanish_readings:
  - más grande que todos los dioses
  - superior a todos los dioses
  rationale: El hebreo literalmente dice 'de/desde todos los dioses', una construcción comparativa idiomática. La traducción escogida expresa la superioridad sin perder el matiz relacional del original ni suavizar la afirmación polémica.
  doctrine_reference: Preservar la tensión lexical y teológica en vez de resolverla
- issue: Plural אֱלֹהִים
  english_pob_reading: all gods
  chosen_spanish_reading: todos los dioses
  alternative_spanish_readings:
  - todos los seres divinos
  - todas las deidades
  rationale: El plural aquí apunta a otros dioses en contraste con Yahvé. 'Dioses' mantiene el valor lexical y la fuerza del paralelo, evitando una reinterpretación metafísica no exigida por el versículo.
  doctrine_reference: Preservar la fuerza comparativa y polemica del texto
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés sin depender mecánicamente de él. Se respetó la decisión auditada de rendir el nombre divino como 'Yahvé' y el final comparativo como una superioridad sobre 'los dioses', manteniendo en español la misma tensión lexical que el POB inglés documenta. No se introdujeron revisiones adicionales respecto del pasaje base.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se usó 'Señor' para אֲדֹנֵינוּ como título relacional y no como sustituto del nombre divino.
  - Se conservó 'dioses' en plural para אֱלֹהִים en el contexto comparativo.
  - La nota de pie se ancla en 'por encima de todos los dioses' para reflejar la alternativa comparativa documentada.
