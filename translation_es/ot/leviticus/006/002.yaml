translation:
  language: es
  text: 'Ordena a Aarón y a sus hijos, diciendo: Esta es la ley del holocausto[a]: el holocausto mismo permanecerá sobre su fogón[b] en el altar toda la noche hasta la mañana, y el fuego del altar será mantenido encendido sobre él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta es la instrucción para el holocausto».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el holocausto estará sobre el lugar de combustión en el altar». El término hebreo se refiere al lugar ardiente o fogón del altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  english_pob_choice: Command
  chosen_spanish: Ordena
  alternatives_spanish:
  - Da la orden a
  - Comanda
  lexicon: HALOT
  rationale: El imperativo expresa una orden directa. En español, «Ordena» conserva la fuerza mandativa con naturalidad y dignidad; «Instruye» suavizaría indebidamente el tono.
- source_word: אַהֲרֹן וְאֶת־בָּנָיו
  english_pob_choice: Aaron and his sons
  chosen_spanish: Aarón y a sus hijos
  alternatives_spanish:
  - Aarón y a sus niños
  - Aarón y a sus descendientes
  lexicon: HALOT
  rationale: «Hijos» refleja con precisión בנים en este contexto sacerdotal masculino. Se mantiene el nombre propio en su forma usual en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula estándar para introducir discurso directo; «diciendo» es el equivalente natural y fiel en español.
- source_word: זֹאת תּוֹרַת
  english_pob_choice: This is the law of
  chosen_spanish: Esta es la ley de
  alternatives_spanish:
  - Esta es la instrucción de
  - Esta es la regulación de
  lexicon: HALOT
  rationale: En este marco sacrificial-legal, «ley» reproduce bien el tono jurídico-formal de תּוֹרָה. «Instrucción» sería posible, pero atenúa el registro normativo que el POB inglés preserva con «law».
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda de ascenso
  lexicon: HALOT
  rationale: «Holocausto» es el término tradicional y preciso para esta ofrenda sacrificial en español bíblico. «Ofrenda quemada» sería más descriptiva, pero menos establecida.
- source_word: הִוא הָעֹלָה
  english_pob_choice: the burnt offering itself
  chosen_spanish: el holocausto mismo
  alternatives_spanish:
  - es el holocausto
  - este es el holocausto
  lexicon: HALOT
  rationale: La repetición con pronombre es enfática. «Mismo» conserva ese énfasis sin sonar torpe, igual que el inglés POB con «itself».
- source_word: עַל מוֹקְדָה
  english_pob_choice: shall remain on its hearth
  chosen_spanish: sobre su hogar de fuego
  alternatives_spanish:
  - sobre su lugar de combustión
  - sobre su brasero
  - sobre su fogón
  lexicon: HALOT
  rationale: מוֹקְדָה se refiere al lugar de combustión/hearth del altar. «Hogar de fuego» busca preservar la imagen concreta y el matiz de lugar donde arde, evitando una paráfrasis abstracta. En una nota se conserva la alternativa «lugar de combustión» como posibilidad interpretativa.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: en el altar
  alternatives_spanish:
  - sobre el altar
  - encima del altar
  lexicon: HALOT
  rationale: Ambos valores son posibles según contexto; aquí «en» funciona bien con «permanecerá» y evita una redundancia demasiado pesada con «sobre su hogar de fuego».
- source_word: כָּל הַלַּיְלָה עַד הַבֹּקֶר
  english_pob_choice: all night until the morning
  chosen_spanish: toda la noche hasta la mañana
  alternatives_spanish:
  - durante toda la noche hasta la mañana
  - toda la noche hasta el amanecer
  lexicon: HALOT
  rationale: La secuencia temporal se mantiene de forma clara y fiel. «Mañana» reproduce el sustantivo hebreo; «amanecer» es interpretativo y más específico de momento.
- source_word: וְאֵשׁ הַמִּזְבֵּחַ תּוּקַד בּוֹ
  english_pob_choice: and the fire of the altar shall be kept burning on it
  chosen_spanish: y el fuego del altar será mantenido encendido sobre él
  alternatives_spanish:
  - y el fuego del altar seguirá ardiendo sobre él
  - y el fuego del altar se mantendrá encendido en él
  lexicon: HALOT
  rationale: La forma causativa-pasiva pide una idea de mantenimiento, no solo de combustión. «Será mantenido encendido» conserva ese sentido prescriptivo; «seguirá ardiendo» diluye la obligación de sostenerlo.
theological_decisions:
- issue: Valor normativo de תּוֹרָה en contexto sacrificial
  english_pob_reading: This is the law of the burnt offering
  chosen_spanish_reading: Esta es la ley del holocausto
  alternative_spanish_readings:
  - Esta es la instrucción del holocausto
  - Esta es la regulación del holocausto
  rationale: No hay disputa doctrinal, pero sí un matiz de registro. En este marco cultual, «ley» preserva el carácter normativo y formulaico del texto, sin convertirlo en un título global de la Torá.
  doctrine_reference: Translation philosophy §5
- issue: Naturaleza de la obligación sobre el fuego del altar
  english_pob_reading: shall be kept burning
  chosen_spanish_reading: será mantenido encendido
  alternative_spanish_readings:
  - arderá
  - seguirá ardiendo
  rationale: El hebreo indica mantenimiento continuo del fuego, no solo una descripción de que arde. «Será mantenido encendido» preserva la fuerza prescriptiva y evita reducir el mandato a un estado meramente descriptivo.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el texto fuente y con la auditoría inglesa; no se registraron revisiones aplicadas en el pasaje inglés, y la solución española sigue esa lectura estable, manteniendo las tres tensiones léxicas principales: תּוֹרָה como «ley», מוֹקְדָה como imagen concreta del lugar de combustión, y תּוּקַד como mandato de mantenimiento continuo del fuego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en todo el proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» y también se evita introducir terminología eclesiástica ajena al contexto sacrificial.
  - «Holocausto» se conserva como término técnico estable del sistema sacrificial.
  - La puntuación reproduce una fórmula bíblica clara en español, con dos puntos tras la cláusula introductoria.
