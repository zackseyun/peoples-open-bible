  revision_awareness: 'Coincide con el pasaje revisado más reciente del expediente inglés: no se registraron cambios en la última pasada y el cotejo final indicó alta concordancia (1.0). La redacción española sigue la misma lectura auditada, conservando la tensión idiomática de la primera cláusula y la fuerza prerrogativa de la segunda.'
  spanish_consistency_notes:
  - Se mantiene 'Saúl' y 'su casa' de forma consistente con el referente dinástico del hebreo.
  - Se usa 'gabaonitas' como gentilicio natural y bíblicamente reconocible.
  - '''Plata ni oro'' conserva la pareja lexical del original sin sustituirla por un equivalente interpretativo más amplio.'
  - Las notas distinguen entre el texto principal y la posible lectura idiomática/jurídica, siguiendo el patrón de la POB en inglés.
