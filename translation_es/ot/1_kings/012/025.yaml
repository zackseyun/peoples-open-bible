  to: Entonces Jeroboam edificó Siquem en la región montañosa de Efraín y habitó allí; y salió de allí y edificó Penuel[a].
  rationale: Se reubica la nota textual al topónimo «Penuel», que es donde corresponde la alternativa «Peniel». También se sustituye «luego» por «y» para ajustarse con mayor precisión a la coordinación narrativa del hebreo y del POB auditado, sin alterar el sentido.
