translation:
  language: es
  text: Tú me libras[a] de las contiendas del pueblo; me pones por cabeza de naciones[b]; un pueblo que no he conocido me sirve[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me rescatas» o «me liberas». פלט puede expresar libramiento activo, rescate o escape producido por Dios.
    reason: lexical_alternative
  - marker: b
    text: O «como cabeza de naciones». «Cabeza» conserva la metáfora hebrea de liderazgo; «por cabeza» refleja bien el valor resultativo del hebreo.
    reason: lexical_alternative
  - marker: c
    text: O «me servirán». El imperfecto hebreo puede leerse con sentido futuro en este contexto poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפַלְּטֵנִי
  english_pob_choice: You rescue me
  chosen_spanish: Tú me libras
  alternatives_spanish:
  - Tú me rescatas
  - Tú me liberas
  lexicon: HALOT
  rationale: פלט en piel con sufijo de 1cs expresa una acción eficaz de salvación/libramiento por parte de Dios. «Libras» comunica bien esa intervención personal y mantiene un tono natural en español sin perder la fuerza de rescate.
- source_word: מֵרִיבֵי עָם
  english_pob_choice: from the strivings of the people
  chosen_spanish: de las contiendas del pueblo
  alternatives_spanish:
  - de las disputas del pueblo
  - de las riñas del pueblo
  - de las contiendas de un pueblo
  lexicon: HALOT
  rationale: ריב puede abarcar contienda, disputa o pleito. «Contiendas» conserva esa amplitud conflictiva y encaja con el registro poético. «Pueblo» mantiene el colectivo singular del hebreo.
- source_word: תְּשִׂימֵנִי
  english_pob_choice: you set me
  chosen_spanish: me pones
  alternatives_spanish:
  - me colocas
  - me estableces
  - me pones en
  lexicon: HALOT
  rationale: שׂים significa poner, colocar o establecer. «Me pones» es breve y fiel; en contexto conserva la elevación del hablante sin forzar una interpretación más explicativa.
- source_word: לְרֹאשׁ גּוֹיִם
  english_pob_choice: as the head of nations
  chosen_spanish: por cabeza de naciones
  alternatives_spanish:
  - como cabeza de naciones
  - como jefe sobre naciones
  - por jefe de naciones
  lexicon: HALOT
  rationale: רֹאשׁ es literalmente «cabeza» y funciona como metáfora de liderazgo. «Por cabeza de naciones» preserva la imagen hebrea. «Naciones» refleja גּוֹיִם en su sentido político-collectivo.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo
  - gente
  lexicon: HALOT
  rationale: El sustantivo colectivo indefinido se expresa naturalmente como «un pueblo». Mantiene el valor colectivo sin necesidad de añadir un artículo relativo más fuerte que el hebreo.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I have not known
  chosen_spanish: que no conocía
  alternatives_spanish:
  - que no he conocido
  - que no conocí
  lexicon: HALOT
  rationale: El perfecto hebreo aquí puede expresar una relación de no familiaridad previa. En español, la relativa «que no conocía» suena natural y respeta el sentido de desconocimiento continuado o previo.
- source_word: יַעַבְדֽוּנִי
  english_pob_choice: serve me
  chosen_spanish: me sirve
  alternatives_spanish:
  - me servirán
  - me sirven
  - me obedecen
  lexicon: HALOT
  rationale: עבד significa «servir». En poesía, el presente simple funciona bien para un imperfecto con valor de acción resultante o característica. «Me sirve» mantiene la imagen de servicio sin añadir una modalidad futura no requerida por el hebreo.
theological_decisions:
- issue: ¿Cómo renderizar גּוֹיִם y עַם sin cargar categorías posteriores?
  english_pob_reading: Render in political-collective terms ('nations,' 'a people') without importing later ethnic-theological distinctions.
  chosen_spanish_reading: 'Traducir en términos político-colectivos: «naciones» y «un pueblo», sin introducir categorías teológicas posteriores no explícitas aquí.'
  alternative_spanish_readings:
  - «gentiles» para גּוֹיִם
  - «pueblos» para עַם
  rationale: El versículo habla de dominio/exaltación entre grupos políticos y colectivos. «Naciones» y «pueblo» comunican eso de modo preciso y evitan sobrecargar el texto con distinciones posteriores que el hebreo no menciona directamente.
  doctrine_reference: Principio de primacía del texto original y de conservar la tensión histórica del pasaje sin resolverla por tradición interpretativa.
translation_notes:
  revision_awareness: 'Seguí el audit trail inglés: mantuve «head of nations» como metáfora de liderazgo, conservé el colectivo singular «pueblo», y reflejé la ambigüedad del imperfecto final con una nota de alternativa futura. No introduje formulaciones más interpretativas que las sostenidas por el hebreo y el inglés auditado.'
  spanish_consistency_notes:
  - Usé «Yahvé» no porque aparezca aquí, sino como norma general del proyecto; en este versículo no hay un equivalente explícito a sustituir.
  - Conservé el paralelismo poético con verbos breves y directos para que la sintaxis española siga la del hebreo.
  - Elegí «contiendas» para רִיב por ser amplio y bíblicamente sobrio, sin reducirlo a un pleito jurídico o a una mera pelea verbal.
