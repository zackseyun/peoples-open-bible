translation:
  language: es
  text: 'Entonces la palabra de Yahvé vino a Jeremías, después de que el rey quemó el rollo y las palabras que Baruc había escrito de boca de Jeremías[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al dictado de Jeremías»; literalmente, «de boca de Jeremías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar con “palabra”, que en español mantiene mejor que “mensaje” el peso revelatorio y pactal del hebreo דְבַר. Se usa “Yahvé” conforme al criterio del proyecto para יְהוָה.
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció que ... vino
  - Y vino
  lexicon: HALOT
  rationale: La secuencia narrativa del waw consecutivo se vierte de forma natural con “Entonces”, que conserva el avance temporal sin el calco pesado “y aconteció”. “Vino” reproduce la llegada de la palabra a Jeremías.
- source_word: מִפִּי יִרְמְיָהוּ
  english_pob_choice: from the mouth of Jeremiah
  chosen_spanish: de boca de Jeremías
  alternatives_spanish:
  - de la boca de Jeremías
  - al dictado de Jeremías
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se conserva con una formulación española directa y comprensible. “De boca de Jeremías” mantiene la imagen oral del original y evita borrar la posibilidad de dictado oral que el texto sugiere.
- source_word: הַמְּגִלָּה
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el pergamino
  - el rollo escrito
  lexicon: HALOT
  rationale: Aunque “scroll” suele corresponder a “rollo”, en español bíblico “rollo” comunica con claridad el objeto material enrollado. Se evita “libro” porque el hebreo distingue el soporte físico de las “palabras” escritas en él.
- source_word: וְאֶת הַדְּבָרִים
  english_pob_choice: and the words
  chosen_spanish: y las palabras
  alternatives_spanish:
  - y los דברים escritos
  - y el contenido
  lexicon: HALOT
  rationale: Se preserva la distinción entre el soporte material y el contenido verbal. “Palabras” refleja mejor que “contenido” la referencia a los dichos proféticos concretos escritos por Baruc.
- source_word: אֲשֶׁר כָּתַב בָּרוּךְ
  english_pob_choice: that Baruch had written
  chosen_spanish: que Baruc había escrito
  alternatives_spanish:
  - que escribió Baruc
  lexicon: HALOT
  rationale: El pluscuamperfecto español expresa correctamente que la escritura de Baruc es anterior al momento narrado. Se mantiene el orden del sujeto propio y la subordinación relativa del original.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: Se conserva la fórmula introductoria estándar para el discurso siguiente. “Diciendo:” es la equivalencia natural y fiel en español bíblico contemporáneo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto establece Yahvé como forma principal en español para el Tetragrámaton. Se evita la sustitución por “el SEÑOR” porque el hebreo usa el nombre propio divino y el POB inglés lo preserva como Yahweh.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El paquete de fuente muestra alta concordancia y no registra cambios en la última revisión. La redacción española sigue la lectura auditada del POB inglés sin introducir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética con “la palabra de Yahvé” para conservar el registro bíblico y la transparencia sobre el nombre divino.
  - “Baruc” se usa de forma consistente con la transliteración española habitual del nombre propio hebreo.
  - La puntuación introduce una coma antes de “después de que” para reflejar la subordinación temporal de forma natural en español.
  - La nota al pie queda anclada en “Yahvé[a]” porque la alternativa léxica relevante afecta a la frase idiomática de la fuente, no a otro segmento.
