translation:
  language: es
  text: Entonces la palabra de Yahvé vino a Jeremías de Yahvé[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH (el nombre divino), tradicionalmente traducido «el SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y sucedió que ... vino
  - Y aconteció que ... vino
  lexicon: HALOT
  rationale: La forma narrativo-secuencial del waw consecutivo introduce un nuevo desarrollo; en español, «Entonces» conserva esa progresión sin la rigidez de un calco arcaico. Mantengo el verbo de llegada en la fórmula profética para no forzar una paráfrasis más libre.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of the LORD
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra de Yahvé
  lexicon: HALOT
  rationale: «Palabra» reproduce mejor la fórmula profética estable y su vínculo con la revelación, mientras que «mensaje» suaviza indebidamente la expresión. Se conserva «Yahvé» según la guía doctrinal para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español, el proyecto prefiere «Yahvé» como transliteración digna y reconocible del nombre divino, evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición introduce al receptor de la revelación; «a» es la opción natural en español y preserva la relación direccional sin añadir matiz.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar y de lectura pública.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - desde
  - procedente de
  lexicon: HALOT
  rationale: En esta fórmula profética, la preposición expresa procedencia/origen de la comunicación. «De parte de» comunica con claridad en español que el mensaje proviene de Yahvé, sin perder el sentido relacional del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - 'así:'
  - 'en estos términos:'
  lexicon: HALOT
  rationale: «Diciendo» mantiene la fórmula introductoria de discurso directo y prepara la cita siguiente, con la misma función sintáctica que en hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo repite el Tetragrámaton. La decisión española mantiene el nombre propio divino visible en el texto, sin sustituirlo por un título; «Yahvé» es la forma elegida por la guía del proyecto y conserva la referencia covenantal del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Repetición enfática del nombre divino en la fórmula profética
  english_pob_reading: the word of Yahweh came to Jeremiah from Yahweh
  chosen_spanish_reading: la palabra de Yahvé vino a Jeremías de parte de Yahvé
  alternative_spanish_readings:
  - la palabra de Yahvé vino a Jeremías de Yahvé
  - la palabra de Yahvé vino a Jeremías procedente de Yahvé
  rationale: Se conserva la repetición de «Yahvé» porque está en el hebreo y refuerza el origen de la palabra profética. «De parte de» evita una construcción menos natural en español, pero sigue marcando que la revelación procede del mismo Yahvé.
  doctrine_reference: Fórmulas proféticas de revelación en el AT; preservación de repeticiones significativas del texto fuente
translation_notes:
  revision_awareness: El registro inglés fue confirmado sin cambios por la última revisión; no se detectaron problemas textuales ni necesidad de revisión adicional. La versión española sigue esa estabilidad, manteniendo la estructura formularia del hebreo y la decisión doctrinal de traducir el Tetragrámaton como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo el tono bíblico sobrio y publicable sin arcaísmos innecesarios.
  - «Palabra de Yahvé» conserva la fórmula profética estándar y evita sustituirla por «mensaje».
  - La repetición de «Yahvé» se conservó deliberadamente por fidelidad al hebreo.
  - El marcador [a] aparece en el texto donde corresponde y remite a la nota sobre el nombre divino.
