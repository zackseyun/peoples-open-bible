  rationale: Se ajusta la apertura para un tono más natural y digno en español, se corrige la nota lexical para reflejar alternativas reales al hebreo הֵן, y se cambia «no puede ser abierto» por «no se puede abrir», que suena más idiomático sin perder el sentido pasivo e irreversible del original.
