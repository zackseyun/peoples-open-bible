    issue: 'Pronombre inicial incorrecto y construcción antinatural: ''Lo pondrán a él'''
    rationale: El hebreo אֹתָהּ es femenino singular y remite al objeto femenino del contexto anterior. 'Lo... a él' introduce masculino personal inexistente en la fuente y en español suena impropio. Debe corregirse, idealmente explicitando el referente para claridad.
  - severity: medium
    issue: Decisión léxica que justifica 'lo' como pronombre neutro
    rationale: La explicación del borrador afirma que 'lo' evita forzar género, pero en español 'lo' no funciona aquí como neutro anafórico adecuado para un referente concreto femenino del contexto. La racionalidad documentada no sostiene bien la elección.
  revised_spanish_text: Pondrán el candelabro y todos sus utensilios dentro de una cubierta de cuero fino[a], y lo colocarán sobre el armazón de transporte.
  revised_footnotes:
  - marker: a
    text: Hebreo תַּחַשׁ (tachash) es incierto; puede referirse a un tipo particular de piel o a un cuero duradero de alta calidad. Las traducciones tradicionales incluyen 'piel de marsopa' o identificaciones semejantes.
    reason: lexical_alternative
