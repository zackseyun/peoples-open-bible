base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/024.yaml
  text: Then King Nebuchadnezzar was astonished and rose up in haste[a]. He answered and said to his counselors, “Did we not throw three men, bound, into the midst of the fire?” They answered and said to the king, “Certainly[b], O king.”
  footnotes:
  - marker: a
    text: Or 'to his officials' or 'to his ministers' for the Aramaic term referring to those serving in the king's court.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'into the fire'; the Aramaic more fully says 'into the midst of the fire.'
    reason: lexical_alternative
