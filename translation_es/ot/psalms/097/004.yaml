translation:
  language: es
  text: Sus relámpagos iluminan el mundo[a]; la tierra ve y tiembla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la tierra ve y se estremece’. El verbo hebreo puede expresar temblor, sacudida o estremecimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵאִ֣ירוּ
  english_pob_choice: light up
  chosen_spanish: iluminan
  alternatives_spanish:
  - dan luz
  - alumbran
  lexicon: HALOT
  rationale: 'El hebreo es causativo (Hiphil) de אור: ‘hacer brillar / iluminar’. En español, ‘iluminar’ conserva con naturalidad ese valor causativo y evita una construcción pesada.'
- source_word: בְרָקָ֣י/ו
  english_pob_choice: his lightning flashes
  chosen_spanish: sus relámpagos
  alternatives_spanish:
  - sus rayos
  - sus relámpagos de luz
  lexicon: HALOT
  rationale: El plural con sufijo posesivo se refiere a los relámpagos de Dios. ‘Relámpagos’ es claro y mantiene el plural; ‘rayos’ también sería posible, pero ‘relámpagos’ comunica mejor la imagen visual del contexto poético.
- source_word: תֵּבֵ֑ל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra
  lexicon: HALOT
  rationale: Tēbēl suele designar el mundo en su extensión habitada. ‘El mundo’ preserva bien la amplitud cósmica sin forzar una explicación perifrástica.
- source_word: רָאֲתָ֖ה
  english_pob_choice: sees
  chosen_spanish: lo ve
  alternatives_spanish:
  - ve
  - lo vio
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, el paralelismo poético admite un presente vívido en español. Se añade ‘lo’ para referir de manera natural al fenómeno precedente, sin introducir un objeto ajeno al texto.
- source_word: וַ/תָּחֵ֣ל
  english_pob_choice: trembles
  chosen_spanish: tiembla
  alternatives_spanish:
  - se estremece
  - se quiebra
  lexicon: HALOT
  rationale: El verbo puede implicar temblar, retorcerse o estremecerse. ‘Tiembla’ es la opción más sobria y directa en español para este contexto de teofanía, sin añadir matices de dolor que el verso no exige.
- source_word: הָ/אָֽרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: Aquí הארץ funciona en paralelo con תבל y puede designar el ámbito creado/terrestre. ‘La tierra’ suena natural en español y mantiene el contraste con ‘el mundo’.
theological_decisions:
- issue: Alcance cósmico de la teofanía
  english_pob_reading: The verse describes God's manifestation affecting the whole created order, rendered with 'the world' and 'the earth' as distinct but complementary terms.
  chosen_spanish_reading: El verso presenta una manifestación divina que alcanza al conjunto del orden creado, con ‘el mundo’ y ‘la tierra’ como términos distintos y complementarios.
  alternative_spanish_readings:
  - Una lectura más local de ‘la tierra’ como ‘el país’ o ‘la región’
  rationale: La paralelismo poético y el contexto del salmo favorecen una extensión universal más que una local. La traducción conserva esa amplitud sin doctrinalizar el verso más allá de su evidencia léxica.
  doctrine_reference: Salmo 97:4; teofanía cósmica en poesía hebrea
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del control inglés POB: se conserva el paralelismo entre תֵּבֵל y הָאָרֶץ, y se refleja la alternativa semántica de וַתָּחֵל sin ampliar el sentido. Se prefirió un español natural (‘iluminan’, ‘relámpagos’, ‘tiembla’) frente a un calco mecánico, manteniendo la imagen poética y la distinción entre mundo y tierra.'
  spanish_consistency_notes:
  - Se usa ‘mundo’ para תֵּבֵל y ‘tierra’ para הָאָרֶץ, manteniendo la diferencia de alcance observada en el aparato inglés.
  - Se evita ‘SEÑOR’ porque el verso no contiene el Tetragrámaton ni una cita explícita de κύριος.
  - Se mantiene un tono poético sobrio y publicable, sin añadir vocabulario interpretativo no requerido por el hebreo.
