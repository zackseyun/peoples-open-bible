translation:
  language: es
  text: 'Entonces llegó ante el rey,[a] y el rey le dijo: «Micaías, ¿debemos ir a Ramot de Galaad a la batalla, o debemos abstenernos?». Y él le respondió: «Sube y triunfa, y Yahvé la entregará en manos del rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La respuesta de Micaías es probablemente irónica en el contexto; el hebreo mismo no marca la ironía de forma explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבוֹא
  english_pob_choice: So he came
  chosen_spanish: Y él vino
  alternatives_spanish:
  - Entonces vino
  - Y llegó
  lexicon: HALOT
  rationale: El wayyiqtol introduce una acción narrativa en secuencia. En español, «y él vino» conserva la progresión del relato sin forzar una interpretación adicional.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: En español bíblico y moderno, «rey» es la equivalencia natural de מֶלֶךְ. Se mantiene la referencia definida y el tono cortesano del contexto.
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaiah
  - Micaíahu
  lexicon: Tradición bíblica española / transliteración del hebreo
  rationale: Para lectura eclesial en español, «Micaías» es la forma más reconocible y transparente. Conserva el nombre propio sin imponer una transliteración menos usual.
- source_word: הֲנֵלֵךְ
  english_pob_choice: should we go
  chosen_spanish: ¿iremos?
  alternatives_spanish:
  - ¿debemos ir?
  - ¿habremos de ir?
  lexicon: HALOT
  rationale: La pregunta deliberativa en primera persona plural se expresa de modo natural con el futuro interrogativo español. Mantiene la consulta estratégica del rey.
- source_word: רָמֹת גִּלְעָד
  english_pob_choice: Ramoth-gilead
  chosen_spanish: Ramot de Galaad
  alternatives_spanish:
  - Ramot-Galaad
  - Ramot de Gilead
  lexicon: Uso bíblico toponímico
  rationale: Se conserva el topónimo en forma habitual para el español bíblico. «De Galaad» reproduce la relación geográfica del hebreo.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - a la guerra
  lexicon: HALOT
  rationale: Aquí מלחמה expresa el propósito militar de la expedición. «Guerra» comunica con claridad el conflicto armado, sin perder el valor bélico del término.
- source_word: אִם נֶחְדָּל
  english_pob_choice: or should we refrain
  chosen_spanish: o nos quedaremos
  alternatives_spanish:
  - o cesaremos
  - o nos abstendremos
  lexicon: HALOT
  rationale: El hebreo plantea la alternativa de no emprender la campaña. «Nos quedaremos» comunica la opción de permanecer en lugar de avanzar, con español natural; se preserva la alternativa sin resolver su matiz exacto.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Sube allá
  - Marcha
  lexicon: HALOT
  rationale: עלה conserva su valor idiomático de avance y ascenso, especialmente en contexto militar. «Sube» mantiene la forma breve y la ambigüedad deliberada del original.
- source_word: וְהַצְלַח
  english_pob_choice: and succeed
  chosen_spanish: y prospera
  alternatives_spanish:
  - y ten éxito
  - y triunfa
  lexicon: HALOT
  rationale: El hebreo puede expresar éxito/prosperidad en la empresa. «Prospera» conserva la amplitud semántica y suena suficientemente natural en un registro bíblico.
- source_word: וְנָתַן יְהוָה
  english_pob_choice: and Yahweh will give
  chosen_spanish: y Yahvé entregará
  alternatives_spanish:
  - y Yahvé dará
  - y Yahvé pondrá
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé», conforme al criterio del proyecto. «Entregará» refleja bien el acto de poner algo en poder de otro, que el contexto desarrolla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: DOCTRINE.md Contested terms
  rationale: Se sigue el término estándar del proyecto para el Tetragrama. «Yahvé» mantiene el nombre personal divino sin ocultarlo tras una sustitución titulada.
- source_word: בְּיַד הַמֶּלֶךְ
  english_pob_choice: into the hand of the king
  chosen_spanish: en mano del rey
  alternatives_spanish:
  - en la mano del rey
  - a manos del rey
  lexicon: HALOT
  rationale: Se conserva el idiomático «en mano de» para respetar la imagen hebrea de poder y control. En español bíblico es comprensible y directo.
theological_decisions:
- issue: Posible ironía en la respuesta de Micaías
  english_pob_reading: Translate the words straightforwardly without inserting explicit markers of sarcasm in the main text
  chosen_spanish_reading: Traducir de forma directa, sin marcar explícitamente la ironía en el cuerpo principal
  alternative_spanish_readings:
  - Añadir exclamación o giro que sugiera ironía
  - Parafrasear la respuesta como burla evidente
  rationale: El hebreo no marca la ironía de manera explícita, aunque el contexto narrativo la sugiere fuertemente. Se conserva la tensión interpretativa en el texto principal y se deja constancia en nota, evitando resolverla por anticipado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El Tetragrama aparece de forma directa y el proyecto exige preservarlo como nombre propio. «Yahvé» cumple la pauta doctrinal y evita la sustitución devocional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue la última revisión disponible, que no indicó cambios. Se mantiene el acuerdo alto con el audit trail inglés y se adapta la redacción al español sin añadir elementos interpretativos no marcados por el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al criterio del proyecto.
  - Se prefiere «rey» para מֶלֶךְ y «mano» en la expresión idiomática «en mano de».
  - 'Se conserva la deliberación militar con un futuro interrogativo natural en español: «¿iremos... o nos quedaremos?».'
  - La respuesta de Micaías se traduce de forma semánticamente directa para no resolver la posible ironía en el texto principal.
