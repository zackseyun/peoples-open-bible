  to: 'Ahora bien, estas son las naciones que Yahvé dejó para probar[a] a Israel por medio de ellas, es decir, todos los que no habían conocido[b] ninguna de las guerras de Canaán:'
  rationale: Se corrige la sintaxis de la frase explicativa para que «todos los que...» identifique correctamente al grupo de israelitas referido, en vez de parecer objeto directo de «probar». También se pule la nota léxica para que la alternativa española quede completa y más natural. No se requieren cambios doctrinales ni una relectura de fondo.
