translation:
  language: es
  text: No los escuchen[a]. Sirvan al rey de Babilonia y vivan. ¿Por qué esta ciudad habría de convertirse en una ruina[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No les hagan caso». El verbo hebreo puede abarcar no solo oír, sino también prestar atención u obedecer.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Por qué esta ciudad habría de quedar desolada?». El sustantivo hebreo se refiere a devastación o ruina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּשְׁמְעוּ אֲלֵיהֶם
  english_pob_choice: Do not listen to them
  chosen_spanish: No los escuchen
  alternatives_spanish:
  - No les hagan caso
  - No obedezcan lo que dicen
  lexicon: WLC/HALOT; POB English audit trail
  rationale: שׁמע con אֶל puede significar oír, escuchar o prestar atención/obedecer. En este contexto profético, el mandato apunta a rechazar su mensaje; "escuchen" conserva el valor básico de oír/hear y permite la implicación de hacer caso sin forzar una paráfrasis más explícita.
- source_word: עִבְדוּ
  english_pob_choice: Serve
  chosen_spanish: Sirvan
  alternatives_spanish:
  - Sean súbditos de
  - Obedezcan a
  lexicon: WLC/HALOT; POB English audit trail
  rationale: עבד en imperativo aquí expresa sometimiento político y servicio. "Sirvan" mantiene una correspondencia natural en español y conserva tanto la idea de servicio como la de sujeción, sin imponer un término más técnico o eclesial.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  - el rey de Babel
  lexicon: WLC/HALOT; POB English audit trail
  rationale: La construcción es directa y el español natural es el genitivo con "de". "Babilonia" comunica con claridad el referente histórico y coincide con el valor transparente del inglés auditado.
- source_word: וִחְיוּ
  english_pob_choice: and live
  chosen_spanish: y vivan
  alternatives_spanish:
  - y vivirán
  - para que vivan
  lexicon: WLC/HALOT; POB English audit trail
  rationale: El imperativo coordinado en hebreo conserva fuerza exhortativa. "Y vivan" mantiene la brevedad del original y el enlace con el mandato anterior, sin añadir una subordinación causal que el hebreo no exige.
- source_word: לָמָּה תִהְיֶה
  english_pob_choice: Why should ... become
  chosen_spanish: ¿Por qué ... habría de convertirse?
  alternatives_spanish:
  - ¿Por qué ... sería?
  - ¿Por qué ... llegaría a ser?
  lexicon: WLC/HALOT; POB English audit trail
  rationale: La pregunta retórica con יהיה permite matiz de devenir. "Habría de convertirse" reproduce bien el carácter prospectivo y retórico en español, evitando un simple "sería" que puede sonar menos dinámico.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - la ciudad misma
  lexicon: WLC/HALOT; POB English audit trail
  rationale: La construcción demostrativa se resuelve de forma idiomática con "esta ciudad". Es la opción más clara y fiel al deíctico hebreo.
- source_word: חָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - desolación
  - destrucción
  lexicon: WLC/HALOT; POB English audit trail
  rationale: El sustantivo indica estado de devastación o ruina. En español, "ruina" conserva el valor nominal concreto del hebreo y evita convertir el término en un adjetivo más genérico.
translation_notes:
  revision_awareness: Se tomó como base el hebreo masorético de Jeremías 27:17 y se contrastó con el texto y las decisiones léxicas del audit trail en inglés POB. No hubo revisiones aplicadas en el pass más reciente; se conservó el mismo sentido global y se ajustó al español natural sin perder la tensión entre escuchar/obedecer ni el matiz de ruina/desolación.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" porque este versículo no contiene el nombre divino ni κύριος.
  - '"Sirvan" se mantuvo para conservar el peso de עבד como sujeción/servicio político.'
  - '"Ruina" se eligió como sustantivo concreto para reflejar חָרְבָּה, con la alternativa "desolación" preservada en nota.'
