translation:
  language: es
  text: Un viento demasiado fuerte para esto[a] vendrá para mí; ahora yo también hablaré juicios[b] contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Un viento lleno de estos vendrá para mí»; la frase hebrea es compacta y puede expresar comparación («más que estos»), procedencia («de estos») o propósito.
    reason: lexical_alternative
  - marker: b
    text: O «yo también pronunciaré sentencia contra ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: רוח
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: En el contexto inmediato de Jeremías 4, la imagen es meteorológica y se enlaza con la mención anterior de un viento procedente de las alturas desoladas. «Viento» conserva mejor esa imagen que «espíritu» o «aliento».
- source_word: מלא
  english_pob_choice: too full
  chosen_spanish: demasiado lleno
  alternatives_spanish:
  - lleno
  - fuerte
  lexicon: HALOT
  rationale: El adjetivo expresa plenitud; en este contexto el viento resulta excesivo o demasiado intenso para la función anterior. «Demasiado lleno» conserva esa idea sin sobreinterpretar.
- source_word: מאלה
  english_pob_choice: for these
  chosen_spanish: de estos
  alternatives_spanish:
  - para estos
  - más que estos
  - desde estos
  lexicon: HALOT
  rationale: La preposición con el demostrativo es compacta y deja una relación elíptica. «De estos» mantiene esa compacidad en español y conserva la ambigüedad de comparación/origen que el hebreo permite.
- source_word: יבוא לי
  english_pob_choice: will come for me
  chosen_spanish: vendrá para mí
  alternatives_spanish:
  - vendrá a mí
  - vendrá por mí
  - vendrá a mi disposición
  lexicon: HALOT
  rationale: La expresión hebrea puede implicar dirección, disposición o agencia. «Para mí» conserva la apertura del sentido y permite entender que el viento llega al servicio o designio de Yahvé.
- source_word: עתה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  lexicon: HALOT
  rationale: Adverbio temporal estándar; «ahora» es natural y directo en español.
- source_word: גם אני
  english_pob_choice: I myself will also
  chosen_spanish: yo mismo también
  alternatives_spanish:
  - también yo
  - aun yo mismo
  lexicon: HALOT
  rationale: La combinación añade énfasis. «Yo mismo también» conserva la fuerza enfática del pronombre y del adverbio aditivo.
- source_word: אדבר
  english_pob_choice: will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - pronunciaré
  - declararé
  lexicon: HALOT
  rationale: El verbo básico es «hablar»; en español evita cargar de antemano un matiz jurídico que el objeto ya aporta.
- source_word: משפטים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias judiciales
  - juicios de condena
  - justicia
  lexicon: HALOT
  rationale: En este pasaje el plural se refiere a pronunciamientos judiciales contra el pueblo. «Juicios» conserva el campo forense y funciona de manera natural en español bíblico contemporáneo.
- source_word: אותם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - a ellos
  - sobre ellos
  lexicon: HALOT
  rationale: Aunque formalmente es el marcador de objeto directo con sufijo, en español la construcción con «hablar juicios» requiere explicitar la hostilidad judicial; «contra ellos» lo expresa con claridad.
theological_decisions:
- issue: La voz del hablante y la agencia divina en la frase «vendrá para mí»
  english_pob_reading: The speaker is the LORD announcing that the destructive wind comes at his behest and that he will pronounce judgments on the people.
  chosen_spanish_reading: El hablante es Yahvé, que anuncia que el viento viene a su servicio o disposición y que él mismo pronunciará juicios contra el pueblo.
  alternative_spanish_readings:
  - El profeta habla en primera persona en una sección poética no explícitamente marcada
  - «Para mí» podría leerse solo como dirección, sin fuerte matiz de agencia
  rationale: El contexto amplio de Jeremías presenta un oráculo de juicio divino. La primera persona continúa naturalmente esa voz, y la traducción conserva la forma compacta del hebreo sin añadir una glosa explícita como «dice Yahvé».
  doctrine_reference: Oráculo profético y juicio divino en Jeremías 4
- issue: El valor judicial de מִשְׁפָּטִים
  english_pob_reading: judgments
  chosen_spanish_reading: juicios
  alternative_spanish_readings:
  - sentencias
  - juicios de condena
  - justicia
  rationale: En este contexto no se trata de justicia abstracta, sino de pronunciaciones judiciales contra la gente. «Juicios» mantiene el forcejeo lexical entre veredicto y castigo sin borrar la tensión.
  doctrine_reference: Lenguaje judicial profético
- issue: Correspondencia del nombre divino implícito
  english_pob_reading: The speaker is the LORD
  chosen_spanish_reading: Se deja implícito Yahvé en la primera persona sin reemplazarlo por una máscara litúrgica.
  alternative_spanish_readings:
  - Señor
  - el Señor
  - Yahvé dijo
  rationale: La serie de verbos en primera persona se entiende como habla de Yahvé dentro del contexto profético. La versión española no inserta un sustituto devocional que no está en el hebreo del versículo.
  doctrine_reference: Uso del nombre divino en el POB español
translation_notes:
  revision_awareness: El auditor inglés no requirió cambios en la última revisión; esta versión mantiene esa lectura base, pero ajusta el español para preservar la ambigüedad compacta de מֵאֵלֶּה y la fuerza judicial de מִשְׁפָּטִים sin calco rígido.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal para el nombre divino cuando el contexto lo requiere, conforme al estándar del proyecto.
  - Se conserva la primera persona divina sin añadir un encabezado explicativo no presente en el hebreo.
  - «Juicios» se mantiene para el lenguaje forense de condena, no como justicia abstracta.
  - La puntuación y el orden buscan sonar naturales en español sin perder la estructura paralela del hebreo.
