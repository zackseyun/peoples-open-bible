translation:
  language: es
  text: 'Y sea engrandecido tu nombre para siempre[a], diciendo: «Yahvé de los ejércitos es Dios sobre Israel», y sea afirmada la casa[b] de tu siervo David delante de ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y sea hecho grande tu nombre para siempre».'
    reason: lexical_alternative
  - marker: b
    text: «Casa» aquí se refiere al hogar o dinastía de David, no solo a un edificio físico.
    reason: cultural_note
lexical_decisions:
- source_word: וְיִגְדַּל
  english_pob_choice: And may ... be magnified
  chosen_spanish: Y sea engrandecido
  alternatives_spanish:
  - Y sea hecho grande
  - Y crezca en grandeza
  lexicon: HALOT
  rationale: El hebreo expresa un deseo/jussivo en contexto de oración; en español, «sea engrandecido» conserva ese valor volitivo y la idea de que el nombre de Dios sea mostrado como grande. «Hecho grande» también sería posible, pero en español suena menos natural y más mecánico.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu renombre
  lexicon: HALOT
  rationale: «Nombre» mantiene el idioma hebreo y permite el sentido de reputación/identidad revelada sin explicitar más de lo que el texto exige.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: «Para siempre» es el equivalente natural en español y conserva la duración indefinida del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - con estas palabras
  lexicon: HALOT
  rationale: Se conserva la relación quotativa del hebreo con la confesión que sigue. «Diciendo» mantiene la conexión sintáctica sin sobreexplicarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrama. «Yahvé» preserva el nombre divino revelado, en lugar de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, «de los ejércitos» comunica bien el título divino y conserva su amplitud; «de las huestes» sería más arcaizante.
- source_word: אֱלֹהִים עַל יִשְׂרָאֵל
  english_pob_choice: is God over Israel
  chosen_spanish: es Dios sobre Israel
  alternatives_spanish:
  - es Dios por encima de Israel
  - es Dios para Israel
  lexicon: HALOT
  rationale: «Sobre Israel» reproduce la relación de autoridad soberana que sugiere עַל en este contexto confesional. Mantiene la fuerza de la afirmación sin convertirla en mera cercanía o beneficio.
- source_word: וּבֵית עַבְדְּךָ דָוִד
  english_pob_choice: and may the house of your servant David
  chosen_spanish: y la casa de tu siervo David
  alternatives_spanish:
  - y la dinastía de tu siervo David
  - y la casa de David, tu siervo
  lexicon: HALOT
  rationale: Se conserva «casa» porque el hebreo usa בַּיִת y en 2 Samuel 7 tiene un sentido dinástico por el contexto. «Dinastía» explicita el sentido, pero perdería el juego verbal del pasaje.
- source_word: יִהְיֶה נָכוֹן
  english_pob_choice: be established
  chosen_spanish: será establecida
  alternatives_spanish:
  - permanecerá firme
  - quedará firme
  lexicon: HALOT
  rationale: La combinación de היה + נָכוֹן comunica firmeza y establecimiento. «Será establecida» es natural en español y preserva el tono pactal/dinástico.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: «Delante de ti» mantiene la imagen relacional del hebreo y encaja con el lenguaje de audiencia/presencia divina. «Ante ti» también sería válido, pero «delante de ti» suena más fluido en este contexto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene explícitamente el Tetragrama. El proyecto no lo vela con «SEÑOR», por lo que «Yahvé» preserva el nombre propio de Dios y su identidad pactal en Israel.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of "house" in the Davidic promise
  english_pob_reading: Retain 'house' in the main text while allowing the dynastic sense to be inferred from context
  chosen_spanish_reading: Conservar «casa» en el texto principal, con sentido dinástico por el contexto
  alternative_spanish_readings:
  - dinastía
  - linaje
  rationale: En 2 Samuel 7, בַּיִת mantiene el juego de palabras con la promesa a David. Traducirlo por «dinastía» aclararía el sentido, pero debilitaría la textura verbal del pasaje y se apartaría del hebreo más de lo necesario.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y sin cambios necesarios; esta versión mantiene la estructura y las decisiones ya auditadas, con una formulación española natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma del Tetragrama, conforme al criterio del proyecto.
  - Se conservó «casa» para respetar el valor dinástico de בַּיִת en el contexto de 2 Samuel 7.
  - Se eligió «de los ejércitos» para צְבָאוֹת, aunque el texto principal usa la forma más natural «Yahvé de los ejércitos».
