  - severity: low
    issue: Forma del topónimo «Uzen-Sera»
    rationale: Si el nombre personal se corrige, el topónimo compuesto también debe armonizarse. Además, «Uzén-seerá» refleja mejor la estructura de un solo topónimo compuesto.
  - severity: low
    issue: Orden adjetival en «Bet-horón la baja / Bet-horón la alta»
    rationale: Es comprensible, pero en español toponímico suena más natural «Bet-horón Baja y Bet-horón Alta» manteniendo el valor distintivo de los dos lugares.
  revised_spanish_text: Y su hija fue Seerá[a], y edificó Bet-horón Baja y Bet-horón Alta[b], y Uzén-seerá.
