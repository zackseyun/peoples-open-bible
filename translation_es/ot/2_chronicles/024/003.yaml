translation:
  language: es
  text: Jehoyadá le consiguió dos esposas[a], y él engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: «Jehoyadá tomó dos esposas y engendró hijos e hijas», si se entiende que Jehoyadá es el sujeto en todo el versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא
  english_pob_choice: took
  chosen_spanish: le tomó
  alternatives_spanish:
  - tomó para él
  - le procuró
  lexicon: HALOT
  rationale: En contexto matrimonial, נשׂא puede expresar la acción de tomar esposa. El inglés POB conserva el valor idiomático con 'took for him'; en español, 'le tomó' mantiene el matiz de beneficio para otro y evita una paráfrasis demasiado explicativa.
- source_word: לּוֹ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - a él
  lexicon: HALOT
  rationale: El dativo pronominal indica que la acción beneficia a otro. En español, el clítico indirecto 'le' comunica de forma natural esa relación y preserva la ambigüedad contextual sobre si Jehoyadá actúa para sí o para otro personaje mencionado en el contexto.
- source_word: יְהוֹיָדָע
  english_pob_choice: Jehoiada
  chosen_spanish: Jehoyadá
  alternatives_spanish:
  - Joiadá
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio con una forma españolizada y reconocible, manteniendo la identificación estándar del personaje.
- source_word: נָשִׁים שְׁתָּיִם
  english_pob_choice: two wives
  chosen_spanish: dos esposas
  alternatives_spanish:
  - dos mujeres
  - dos mujeres para esposa
  lexicon: HALOT
  rationale: En este contexto, נָשִׁים se refiere a mujeres en relación marital. 'Esposas' evita la ambigüedad de 'mujeres' y conserva el sentido matrimonial explícito del hebreo.
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: El verbo con sujeto masculino expresa procreación/paternidad. 'Engendró' es fiel y más preciso que 'tuvo', aunque algo más formal; mantiene el paralelismo genealógico del hebreo.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos y hijas
  - varones y mujeres
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente los dos sexos. En español, 'hijos e hijas' es la formulación más natural y conserva esa distinción sin generalizar a 'niños' o 'descendencia'.
theological_decisions:
- issue: Referente de los sujetos implícitos en el versículo
  english_pob_reading: Jehoiada arranged two wives for King Joash, and Joash fathered sons and daughters.
  chosen_spanish_reading: Jehoyadá le tomó dos esposas, y él engendró hijos e hijas.
  alternative_spanish_readings:
  - Jehoyadá tomó dos esposas y engendró hijos e hijas.
  - Jehoyadá le procuró dos esposas, y él engendró hijos e hijas.
  rationale: El texto hebreo conserva a Jehoyadá como sujeto explícito de 'tomó', pero el dativo לּוֹ sugiere que la acción es en beneficio de otro. La traducción española mantiene esa tensión sin resolverla de forma excesiva, dejando que el contexto narrativo identifique al beneficiario.
  doctrine_reference: Interpretación contextual del referente narrativo; no implica una cuestión doctrinal.
translation_notes:
  revision_awareness: El pasaje no muestra revisiones previas en el paquete fuente; se sigue de cerca el hebreo masorético con el apoyo del análisis auditado en inglés. Se conserva la ambigüedad referencial principal del versículo, como hace el POB en inglés.
  spanish_consistency_notes:
  - Se usó 'Jehoyadá' para el nombre propio de forma consistente con la transliteración española estándar.
  - Se evitó 'SEÑOR' porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo la distinción sexual explícita del hebreo con 'hijos e hijas'.
