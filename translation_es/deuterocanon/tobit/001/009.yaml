revisions:
- from: Y cuando llegué a ser hombre[a], tomé a Ana por esposa de la simiente de nuestra familia ancestral[b], y de ella engendré a Tobías.
  to: Y cuando llegué a ser hombre[a], tomé por esposa a Ana, de la descendencia de nuestra familia paterna[b], y de ella engendré a Tobías.
  rationale: Se ajusta la genealogía para un español más natural y más claro en su sentido patrilineal, evitando un calco duro. También se corrige la colocación sintáctica para que «por esposa» no quede ambiguo y se mantiene el anclaje de la nota en la expresión completa de madurez masculina. Se deja «Tobías» en el texto revisado por legibilidad española, pero la revisión señala que esta elección queda en tensión con la decisión onomástica auditada y debería vigilarse a nivel editorial más amplio.
