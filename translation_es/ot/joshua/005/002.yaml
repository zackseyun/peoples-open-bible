translation:
  language: es
  text: 'En aquel tiempo Yahvé dijo a Josué: «Haz para ti cuchillos de pedernal[a], y vuelve a circuncidar a los hijos de Israel[b], por segunda vez[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «navajas de pedernal»; el hebreo se refiere a instrumentos de corte hechos de pedernal, usados aquí para la circuncisión.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los hijos de Israel»; muchos traductores vierten esto más generalmente como «los israelitas».
    reason: lexical_alternative
  - marker: c
    text: «Por segunda vez» se refiere a realizar la circuncisión de nuevo para Israel como pueblo, no necesariamente a circuncidar dos veces a los mismos individuos.
    reason: cultural_note
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La expresión temporal introduce el marco narrativo de manera natural en español. «En aquel tiempo» conserva el valor deíctico sin sonar demasiado moderno o coloquial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma española establecida en el proyecto, «Yahvé», en vez de sustituirlo por un título.
- source_word: אֶל יְהוֹשֻׁעַ
  english_pob_choice: to Joshua
  chosen_spanish: a Josué
  alternatives_spanish:
  - para Josué
  - dirigiéndose a Josué
  lexicon: BDB/lexical context
  rationale: La preposición hebrea marca destinatario directo del habla; en español, «a Josué» reproduce de forma natural esa dirección.
- source_word: עֲשֵׂה לְךָ
  english_pob_choice: Make for yourself
  chosen_spanish: Hazte
  alternatives_spanish:
  - Haz para ti
  - Prepárate
  lexicon: HALOT
  rationale: El imperativo con pronombre dativo tiene fuerza reflexiva/benefactiva. «Hazte» expresa esa relación de manera idiomática y concisa en español.
- source_word: חַרְבוֹת צֻרִים
  english_pob_choice: flint knives
  chosen_spanish: cuchillos de pedernal
  alternatives_spanish:
  - navajas de pedernal
  - cuchillos de sílex
  lexicon: HALOT
  rationale: En este contexto de circuncisión, la función del instrumento es la de un cuchillo; «de pedernal» preserva el material. «Pedernal» es claro y más bíblico que una paráfrasis genérica.
- source_word: וְשׁוּב מֹל
  english_pob_choice: and circumcise again
  chosen_spanish: y vuelve a circuncidar
  alternatives_spanish:
  - y circuncida de nuevo
  - y otra vez circuncida
  lexicon: HALOT
  rationale: «וְשׁוּב» aporta la idea de repetición/retorno antes del verbo. En español, «vuelve a circuncidar» conserva la duplicación de sentido sin forzar una construcción extraña.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la formulación literal masculina del hebreo, coherente con la audiencia inmediata del rito. «Los israelitas» sería más general, pero pierde la forma textual.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - de nuevo
  lexicon: HALOT
  rationale: La frase adverbial añade énfasis temporal aparte de «vuelve». «Por segunda vez» refleja con claridad que el texto marca una segunda realización del acto como pueblo.
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. La política del proyecto favorece «Yahvé» para mantener el nombre personal de Dios, evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de «los hijos de Israel»
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos varones de Israel
  rationale: El hebreo es masculino plural y el contexto inmediato trata del rito de circuncisión; preservar la forma masculina evita aplanar el dato textual y mantiene la tensión de género cuando está presente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: «Por segunda vez» y «vuelve a circuncidar»
  english_pob_reading: and circumcise ... again, a second time
  chosen_spanish_reading: y vuelve a circuncidar ... por segunda vez
  alternative_spanish_readings:
  - y circuncida de nuevo ... una segunda vez
  - y circuncida otra vez
  rationale: Se conserva la doble indicación de repetición del hebreo y del POB inglés sin fusionarlas. Así queda claro que el verso marca tanto el retorno a la acción como su carácter de segunda ocasión para Israel como pueblo.
  doctrine_reference: HALOT; nota cultural sobre el sentido corporativo del rito
translation_notes:
  revision_awareness: La revisión inglesa reciente movió «again» para que modifique directamente a «circumcise» y mantuvo «a second time». En español se reflejó esa distinción con «vuelve a circuncidar» y «por segunda vez», conservando ambas capas de repetición sin colapsarlas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto para יְהוָה.
  - Se usa «Josué» como nombre propio tradicional en español, sin necesidad de nota interna.
  - «Hijos de Israel» preserva la estructura masculina explícita del hebreo; no se normaliza a «israelitas» en el texto principal.
  - «Pedernal» comunica con naturalidad el material del instrumento y evita una sobreliteralidad incómoda.
  - La construcción «vuelve a circuncidar» conserva la repetición verbal del hebreo mejor que un simple «circuncida otra vez».
