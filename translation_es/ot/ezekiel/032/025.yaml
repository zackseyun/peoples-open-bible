review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general el sentido del hebreo y del POB inglés: ubicación entre los muertos, imagen de la cama/lecho funerario, multitud asociada, condición de incircuncisos, muerte a espada, terror en la tierra de los vivientes, deshonra compartida con los que descienden al pozo, y clausura con el pasivo singular. Sin embargo, no preserva bien dos decisiones auditadas importantes: (1) חֲלָלִים se reduce a ''muertos'' en vez de reflejar mejor ''slain/caídos/muertos violentamente''; (2) la oscilación de género del hebreo en סביבותיו קברותיה fue alisada sin nota, pese a que el POB inglés la documenta como rasgo significativo que debe quedar auditable.'
  spanish_quality_summary: 'El español es entendible y digno, pero tiene giros menos naturales o algo pesados: ''le hicieron una cama a ella'' suena forzado; ''fue puesto'' es gramatical pero menos idiomático que ''fue infundido'' o, si se mantiene el literalismo, conviene al menos mejorar el resto de la frase. ''Pozo'' funciona, aunque en este contexto funerario ''fosa'' suele sonar más natural bíblicamente. La frase puede ganar fluidez con ''le prepararon un lecho'' y ''los caídos''.'
  glossary_alignment: No hay conflictos con términos de proyecto como Yahvé/Mesías/etc. 'Incircuncisos' está bien y preserva la carga teológica. La principal desalineación es con la decisión léxica auditada de חֲלָלִים ('slain'), que en español conviene reflejar como 'caídos' o equivalente, no simplemente 'muertos'. También falta la nota sobre el cambio de género hebreo y la alternativa final masculina ya preservadas en el POB inglés.
  issues:
  - severity: medium
    issue: Se alisa el cambio de género hebreo sin nota
    rationale: El hebreo pasa de referentes femeninos a un sufijo masculino en סְבִיבוֹתָיו, y el POB inglés preservó esta tensión en notas. El borrador español lo regulariza a femenino sin dejar rastro auditable.
  - severity: medium
    issue: חֲלָלִים se traduce como 'muertos'
    rationale: Aunque comprensible, 'muertos' pierde el matiz repetido de muertos por violencia/guerra. 'Caídos' o 'muertos entre los caídos' conserva mejor el campo semántico del pasaje.
  - severity: low
    issue: '''le hicieron una cama a ella'' suena poco natural en español'
    rationale: Preserva la imagen, pero 'le prepararon un lecho' mantiene mejor la metáfora funeraria con mayor dignidad y fluidez.
  - severity: low
    issue: Faltan las notas heredadas del POB sobre la oscilación de género y la alternativa final masculina
    rationale: Son decisiones documentadas en la auditoría inglesa; si el español opta por una forma principal, debe al menos conservar la información relevante en notas cuando la ambigüedad sigue siendo significativa.
  revised_spanish_text: Entre los caídos le prepararon un lecho, con toda su multitud[a]; sus tumbas están alrededor de ella[b]. Todos ellos son incircuncisos, caídos a espada, porque su terror fue puesto en la tierra de los vivientes.[c] Así llevaron su deshonra con los que descienden a la fosa; ella fue puesta entre los caídos[d].
  revised_footnotes:
