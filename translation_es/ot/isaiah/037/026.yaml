revisions:
- from: ¿No has oído? Desde hace mucho lo hice; desde los días de antaño lo formé. Ahora lo he hecho acontecer[a], para que las ciudades fortificadas se conviertan en montones de ruinas.
  to: ¿No has oído? Hace mucho tiempo lo hice; desde los días de antaño lo formé. Ahora he hecho que suceda[a], para que las ciudades fortificadas se conviertan en montones de ruinas.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y el registro del español sin alterar el sentido del hebreo ni las decisiones auditadas del POB inglés: «Desde hace mucho» se elevó a «Hace mucho tiempo», y «lo he hecho acontecer» se sustituyó por «he hecho que suceda», que expresa de manera más idiomática que Dios ha llevado su designio a realización histórica. La cláusula final y la nota se mantienen sustancialmente iguales porque ya reflejaban bien la dificultad textual y el resultado de ruina.'
