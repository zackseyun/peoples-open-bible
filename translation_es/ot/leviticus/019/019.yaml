revisions:
- from: Ustedes guardarán mis estatutos. No aparearán su ganado con dos clases distintas; no sembrarán su campo con dos clases de semilla; y una prenda de material mezclado, shaatnez[a], no caerá sobre ustedes.
  to: Ustedes guardarán mis estatutos. No aparearán su ganado con dos clases distintas; no sembrarán su campo con dos clases de semilla; y una prenda de material mezclado, shaatnez[a], no se pondrá sobre ustedes.
  rationale: Se corrige únicamente la cláusula final para representar mejor יַעֲלֶה עָלֶיךָ y la decisión inglesa auditada, evitando el sentido impropio de «caerá sobre». El resto del borrador es fiel y natural.
