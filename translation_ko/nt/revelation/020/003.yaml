  language: ko
  text: 그를 무저갱에 던지고, 그 위를 닫고 봉인하였습니다. 이는 그가 천 년이 마무리될 때까지 더 이상 민족들을 미혹하지 못하게 하려 함이었습니다. 그 일들 후에 그는 잠시 동안 풀려나야 합니다.
