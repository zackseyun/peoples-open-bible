    text: O «de la unión», «del ensamblaje», o, menos probablemente, «del pegamento». El término hebreo puede referirse al material o al proceso por el cual se unen las partes del objeto trabajado.
    reason: lexical_alternative
  - marker: b
    text: O «para que no sea movido» o «para que no se derrumbe».
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota [a] sobre la frase correspondiente a לַדֶּבֶק y se cambió la lectura principal a «soldadura» para seguir la prioridad léxica documentada en el POB inglés. También se ajustó «Es bueno» a «Es buena» por concordancia natural con «soldadura», y «lo afirma con clavos» a «lo fija con clavos» para mayor naturalidad y precisión en español.
