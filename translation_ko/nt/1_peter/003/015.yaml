id: 1PE.3.15
reference: 1 Peter 3:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κύριον δὲ τὸν Χριστὸν ἁγιάσατε ἐν ταῖς καρδίαις ὑμῶν, ἕτοιμοι ἀεὶ πρὸς ἀπολογίαν παντὶ τῷ αἰτοῦντι ὑμᾶς λόγον περὶ τῆς ἐν ὑμῖν ἐλπίδος,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/015.yaml
  text: 'But regard Messiah the Lord as holy in your hearts, always ready for a defense to everyone who asks you for a reason concerning the hope that is in you,'
translation:
  language: ko
  text: '오직 여러분의 마음에 메시아를 주로 거룩하게 모시고[a], 여러분 안에 있는 소망에 대해 물어보는 모든 이에게 답변할 준비를 항상 갖추되,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '이사야 8:13의 인유 (LXX: 「만군의 야훼를 거룩하게 하라」). 베드로는 사 8:13의 「야훼」 자리에 「메시아」를 두어 메시아의 신적 정체성을 암묵적으로 천명한다.'
    reason: cross_reference
lexical_decisions:
- source_word: κύριον δὲ τὸν Χριστὸν ἁγιάσατε
  english_pob_choice: regard Messiah the Lord as holy
  chosen_korean: 메시아를 주로 거룩하게 모시고
  alternatives_korean:
  - 메시아를 주로 성별하고
  - 그리스도를 주로 거룩히 여기고
  lexicon: BDAG
  rationale: ἁγιάζω의 「거룩하게 함」을 「거룩하게 모시다」로 옮겨 한국어 어감을 살린다. κύριον과 Χριστόν 둘 다 칭호적으로 옮긴다.
- source_word: πρὸς ἀπολογίαν
  english_pob_choice: for a defense
  chosen_korean: 답변할 준비
  alternatives_korean:
  - 변명에 대비하여
  - 변증할 준비
  lexicon: BDAG
  rationale: ἀπολογία는 「공식 답변·변호」. 평이하게 「답변」으로 옮긴다.
- source_word: λόγον περὶ τῆς ἐν ὑμῖν ἐλπίδος
  english_pob_choice: a reason concerning the hope that is in you
  chosen_korean: 여러분 안에 있는 소망에 대해
  alternatives_korean:
  - 너희 안의 소망의 이유를
  lexicon: BDAG
  rationale: λόγον αἰτεῖν은 「설명·이유를 묻다」 관용. 자연스럽게 「물어보는」으로 풀어 옮긴다.
theological_decisions:
- issue: 사 8:13 인유에서 야훼 → 메시아 치환의 그리스도론적 함의
  chosen_reading: '메시아를 주로 거룩하게 모시라 — 본문 그대로; 각주에서 사 8:13의 「야훼」 자리에 「메시아」가 들어간 것의 함의 명시'
  alternative_readings:
  - 「주」를 빼고 「메시아」만 강조
  - 사 8:13 인유를 본문에서 평탄화
  rationale: 베드로는 사 8:13의 「야훼」 자리에 「메시아」를 두는 그리스도론적 치환을 한다. 본문이 이를 평탄하지 않게 명시하므로, 번역도 그 강도를 보존한다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장 보존; 원어 우선'
