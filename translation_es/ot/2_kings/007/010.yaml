translation:
  language: es
  text: 'Así que llegaron y llamaron a los guardianes de la puerta de la ciudad[a], y les informaron, diciendo: “Fuimos al campamento de Aram, y he aquí que no había allí nadie, ni sonido humano[b]; solo los caballos atados, y los asnos atados, y las tiendas como estaban”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los guardas de la puerta de la ciudad». El hebreo usa un singular colectivo, pero el contexto apunta al grupo encargado de la entrada.
    reason: lexical_alternative
  - marker: b
    text: O «ni voz humana». El hebreo puede referirse específicamente a la voz o de manera más amplia a cualquier sonido humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁעֵר הָעִיר
  english_pob_choice: the gatekeepers of the city
  chosen_spanish: los guardas de la ciudad
  alternatives_spanish:
  - los porteros de la ciudad
  - los guardacostas de la ciudad
  - los guardianes de la ciudad
  lexicon: HALOT
  rationale: שֹׁעֵר en este contexto nombra al personal encargado de vigilar y abrir/cerrar el acceso urbano. En español, «guardas» comunica bien esa función narrativa sin depender de un arcaísmo como «portero», y mantiene el matiz colectivo sugerido por el plural implícito del contexto.
- source_word: וַיַּגִּידוּ לָהֶם לֵאמֹר
  english_pob_choice: and they told them, saying
  chosen_spanish: y les contaron, diciendo
  alternatives_spanish:
  - y les informaron, diciendo
  - y les declararon, diciendo
  - y les dijeron
  lexicon: HALOT
  rationale: נגד en hifil significa comunicar o dar a conocer. «Contaron» conserva el acto de relatar la noticia con naturalidad en español, y «diciendo» mantiene la fórmula de reporte hebrea sin recargar el estilo.
- source_word: מַחֲנֵה אֲרָם
  english_pob_choice: the camp of Aram
  chosen_spanish: el campamento de Aram
  alternatives_spanish:
  - el campamento arameo
  - el campamento de Siria
  lexicon: HALOT
  rationale: Se conserva «Aram» como nombre propio, siguiendo la preferencia POB por no sustituirlo automáticamente por el equivalente tradicional «Siria». «Campamento» es la equivalencia más natural para מַחֲנֶה en un contexto militar.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y he aquí que
  - y resulta que
  lexicon: HALOT
  rationale: La fórmula española «he aquí» preserva el valor de presentación vívida de הִנֵּה. Se mantiene el tono solemne y narrativo sin volverlo demasiado coloquial.
- source_word: אֵין שָׁם אִישׁ
  english_pob_choice: there was no one there
  chosen_spanish: no hay allí ningún hombre
  alternatives_spanish:
  - no había allí nadie
  - no había allí ningún hombre
  - no había allí ninguna persona
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por un sentido genérico, el hebreo dice literalmente «no hay allí hombre». En español se preserva «ningún hombre» para no diluir la imagen original, mientras el contexto impide leerlo como una restricción masculina estricta.
- source_word: וְקוֹל אָדָם
  english_pob_choice: no human sound
  chosen_spanish: ni voz humana
  alternatives_spanish:
  - ni sonido humano
  - ni voz de hombre
  - ni sonido de persona
  lexicon: HALOT
  rationale: קוֹל puede ser «voz» o «sonido». Aquí la POB resalta la ausencia total de presencia humana; en español «voz humana» mantiene esa amplitud y refleja bien la alternativa lexical sin sonar forzado.
- source_word: כִּי אִם
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - sino solo
  - excepto
  - únicamente
  lexicon: HALOT
  rationale: La expresión idiomática introduce la única excepción al vacío descrito. «Solo» es breve, claro y natural en español, equivalente funcional de «only».
- source_word: הַסּוּס אָסוּר ... וְהַחֲמוֹר אָסוּר
  english_pob_choice: the horses tied, and the donkeys tied
  chosen_spanish: los caballos atados, y los asnos atados
  alternatives_spanish:
  - los caballos amarrados, y los asnos amarrados
  - los caballos sujetos, y los asnos sujetos
  - los caballos ligados, y los asnos ligados
  lexicon: HALOT
  rationale: אָסוּר procede de אסר, «atar/bloquear». En este contexto militar-campamental, «atados» es la opción más transparente y fiel. Se mantiene el plural natural en español porque el hebreo singular funciona de manera colectiva.
- source_word: וְאֹהָלִים כַּאֲשֶׁר הֵמָּה
  english_pob_choice: and the tents as they were
  chosen_spanish: y las tiendas como estaban
  alternatives_spanish:
  - y las tiendas tal como estaban
  - y las tiendas en el mismo estado
  - y las tiendas como estaban antes
  lexicon: HALOT
  rationale: La frase subraya que las tiendas quedaron sin alterar. «Como estaban» expresa bien la idea de estado intacto sin añadir más explicación que la que el texto exige.
theological_decisions:
- issue: Alcance de אִישׁ y de אָדָם en una escena de ausencia
  english_pob_reading: there was no one there / no human sound
  chosen_spanish_reading: no hay allí ningún hombre, ni voz humana
  alternative_spanish_readings:
  - no hay allí nadie, ni voz humana
  - no hay allí ningún hombre, ni sonido humano
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión antropológica y semántica: el hebreo usa términos que, en conjunto, describen ausencia total de personas y de actividad humana. La redacción española conserva la literalidad útil de אִישׁ y el valor genérico de אָדָם sin masculinizar indebidamente el sentido global.'
  doctrine_reference: Antropología bíblica; uso genérico de términos humanos en contexto narrativo.
translation_notes:
  revision_awareness: 'Se revisó la correspondencia con el texto hebreo y con la solución auditada en inglés. No se siguieron mecánicamente las elecciones del inglés cuando el español pedía una formulación más natural; aun así, se conservaron las distinciones semánticas clave: Aram, la ausencia de gente/voz, los animales atados y las tiendas intactas.'
  spanish_consistency_notes:
  - Se mantiene «Aram» como nombre propio, de acuerdo con la política POB, en lugar de «Siria».
  - Se emplea «atados» para אָסוּר por fidelidad léxica y naturalidad española en un contexto de campamento.
  - La combinación «ningún hombre, ni voz humana» preserva tanto la literalidad hebrea como el valor totalizador del inglés auditado.
  - «Guardas de la ciudad» refleja un colectivo funcional y evita el arcaísmo de «porteros».
