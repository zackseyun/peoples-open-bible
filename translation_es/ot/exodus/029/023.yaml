translation:
  language: es
  text: y una hogaza de pan, una torta de pan con aceite, y una oblea, del canasto de los panes sin levadura que está delante de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también puede transliterarse «Yahweh».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּכַּר לֶחֶם
  english_pob_choice: loaf of bread
  chosen_spanish: pan
  alternatives_spanish:
  - hogaza
  - pan redondo
  - torta de pan
  lexicon: HALOT
  rationale: כִּכַּר designa una unidad de pan con forma de torta o rueda; en español, «pan» funciona aquí como nombre genérico natural y evita sobrecargar la frase, manteniendo la distinción con el segundo elemento ritual.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: un/una
  alternatives_spanish:
  - uno/una
  - único/a
  lexicon: morfología del numeral cardinal
  rationale: 'El numeral expresa una sola pieza. En español debe concordar con el sustantivo: «un pan», «una torta», «una oblea».'
- source_word: חַלַּת לֶחֶם שֶׁמֶן
  english_pob_choice: cake of bread with oil
  chosen_spanish: torta de pan con aceite
  alternatives_spanish:
  - torta de pan con aceite
  - pan de torta con aceite
  - pan cocido con aceite
  lexicon: HALOT
  rationale: חַלָּה es una pieza de masa/pan en forma de torta o pastel; «torta de pan» conserva la idea de pieza horneada. «Con aceite» sigue de cerca la relación hebrea sin añadir la idea de mezcla que el texto no explicita.
- source_word: וְרָקִיק
  english_pob_choice: wafer
  chosen_spanish: oblea
  alternatives_spanish:
  - wafer
  - tortita delgada
  - galleta delgada
  lexicon: HALOT
  rationale: רָקִיק es una pieza delgada y plana; «oblea» comunica bien la delgadez ritual en español y es comprensible en registro bíblico.
- source_word: מִסַּל הַמַּצּוֹת
  english_pob_choice: from the basket of unleavened bread
  chosen_spanish: del canasto de los panes sin levadura
  alternatives_spanish:
  - de la canasta de los panes sin levadura
  - del canasto de los ázimos
  - del canasto de las tortas sin levadura
  lexicon: HALOT
  rationale: מִן indica procedencia; סַל es un recipiente de mimbre o similar, bien expresado por «canasto». «Panes sin levadura» reproduce de manera clara y natural la referencia colectiva de מַצּוֹת.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: doctrinal de nombre divino
  rationale: La pauta del proyecto pide «Yahvé» para יהוה en el texto principal. Se conserva el nombre propio divino en lugar de sustituirlo por un título.
theological_decisions:
- issue: El nombre divino יהוה en contexto cultual
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La elección «Yahvé» preserva el nombre propio y la referencia de pacto, en continuidad con la política terminológica del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «mixed with oil» a «with oil» para corresponder más de cerca al hebreo. En consecuencia, la versión española evita cualquier expansión como «mezclada con aceite» y mantiene simplemente «con aceite».
  spanish_consistency_notes:
  - 'Se mantiene la distinción de tres piezas distintas: «pan», «torta de pan con aceite» y «oblea».'
  - «Canasto» se usa como equivalente natural de סַל en este contexto ritual.
  - Se conserva «Yahvé» conforme al criterio del proyecto para יהוה.
  - La puntuación y la coordinación reproducen el ritmo enumerativo del hebreo sin añadir elementos.
