translation:
  language: es
  text: 'Y Tobit le dijo a ella[a]: «No te preocupes, hermana; él volverá sano y salvo, y tus ojos lo verán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermana» es la forma literal griega de tratamiento. En este contexto Tobit se dirige a su esposa; el término refleja un tratamiento familiar/conyugal más que una relación biológica entre hermanos.
    reason: cultural_note
lexical_decisions:
- source_word: Μὴ λόγον ἔχε
  english_pob_choice: Do not worry
  chosen_spanish: No te preocupes
  alternatives_spanish:
  - No te inquietes
  - No hagas un asunto de esto
  - No tomes esto a mal
  lexicon: LSJ
  rationale: 'La expresión griega es idiomática: literalmente habla de ‘tener una palabra/asunto’, pero en este contexto funciona como consuelo. ‘No te preocupes’ transmite de manera natural la idea de reassurance sin perder el tono pastoral del diálogo.'
- source_word: ἀδελφή
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - esposa
  lexicon: LSJ
  rationale: Se conserva el término literal del griego. Aunque el sentido contextual es conyugal, ‘hermana’ refleja la forma de tratamiento original y mantiene la primacía del texto fuente; ‘esposa’ sería una interpretación explicativa.
- source_word: ὑγιαίνων
  english_pob_choice: safe and sound
  chosen_spanish: sano y salvo
  alternatives_spanish:
  - bien
  - en buena salud
  - sin daño
  lexicon: LSJ
  rationale: El participio expresa estar sano o íntegro. En español, ‘sano y salvo’ comunica con naturalidad la combinación de salud y preservación física implicada por el contexto del viaje.
- source_word: ἐλεύσεται
  english_pob_choice: he will return
  chosen_spanish: volverá
  alternatives_spanish:
  - vendrá
  - llegará
  lexicon: LSJ
  rationale: El verbo significa ‘vendrá’, pero aquí el movimiento se entiende desde el punto de vista del hogar de Tobit; por eso ‘volverá’ expresa mejor el sentido contextual sin alejarse del griego.
- source_word: οἱ ὀφθαλμοί σου ὄψονται αὐτόν
  english_pob_choice: your eyes will see him
  chosen_spanish: tus ojos lo verán
  alternatives_spanish:
  - lo verás
  - lo verán tus ojos
  lexicon: LSJ
  rationale: Se preserva la mención explícita de ‘ojos’ para conservar la viveza retórica del griego. ‘Tus ojos lo verán’ suena natural en español y mantiene el énfasis visual del original.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete 1909 y es coherente con el audit trail inglés: mantiene el tratamiento literal ἀδελφή, traduce el consuelo idiomático de Μὴ λόγον ἔχε con una equivalencia natural en español, y conserva la imagen de los ojos como sujeto explícito de la visión. No se documentan revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se usa ‘Tobit’ como nombre propio estándar en español.
  - Se mantiene la puntuación de cita con comillas españolas y un vocativo separado por punto y coma.
  - ‘Sano y salvo’ equilibra fidelidad y naturalidad para ὑγιαίνων en un contexto de viaje.
