translation:
  language: es
  text: 'Y hablarás a los hijos de Israel[a], diciendo: «Este será aceite de santa unción[b] para mí, a través de sus generaciones»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas».
    reason: lexical_alternative
  - marker: b
    text: Es decir, apartado para el uso sagrado de Yahvé. O «aceite santo de unción».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Conservo la estructura idiomática hebrea con una expresión transparente y bíblicamente reconocible en español. «Hijos» mantiene la correspondencia formal con בְּנֵי y evita neutralizar prematuramente el giro del original.
- source_word: תְּדַבֵּר
  english_pob_choice: you shall speak
  chosen_spanish: hablarás
  alternatives_spanish:
  - dirás
  - deberás hablar
  lexicon: HALOT
  rationale: El verbo español simple comunica la instrucción dirigida a Moisés sin sobrecargar el tono. «Hablarás» mantiene el valor directivo del imperfecto hebreo en contexto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - así
  lexicon: HALOT
  rationale: «Diciendo» reproduce la fórmula introductoria del discurso directo de forma natural en español. Se evita una paráfrasis más libre.
- source_word: שֶׁמֶן מִשְׁחַת קֹדֶשׁ
  english_pob_choice: a holy anointing oil
  chosen_spanish: un aceite santo de unción
  alternatives_spanish:
  - un aceite de santa unción
  - un aceite de unción santo
  - aceite de santa unción
  lexicon: HALOT
  rationale: La cadena nominal se vierte de manera bastante literal para conservar el sentido de «aceite» + «unción» + «santo/con sagrado». En español, «aceite santo de unción» suena más natural que una calca rígida, y sigue siendo fiel al hebreo.
- source_word: יִהְיֶה זֶה
  english_pob_choice: This shall be
  chosen_spanish: Este será
  alternatives_spanish:
  - Esto será
  - Este ha de ser
  lexicon: HALOT
  rationale: «Este será» identifica el objeto referido por el demostrativo y conserva el valor declarativo/instructivo del hebreo sin añadir matices no presentes.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí
  - mío
  lexicon: HALOT
  rationale: La preposición expresa dedicación o destinación a Yahvé; en español, «para mí» es más natural que «a mí» en este contexto y mantiene la idea de uso consagrado sin explicitarla de más.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por vuestras generaciones
  alternatives_spanish:
  - a lo largo de vuestras generaciones
  - por todas vuestras generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La expresión hebrea indica continuidad a través de las generaciones. «Por vuestras generaciones» conserva la fórmula bíblica y su alcance duradero, con español claro y digno.
theological_decisions:
- issue: Dedicación santa del aceite en לִי
  english_pob_reading: for me
  chosen_spanish_reading: para mí
  alternative_spanish_readings:
  - mío
  - para Yahvé
  rationale: El hebreo señala que el aceite queda apartado para Yahvé. «Para mí» mantiene la primera persona divina del texto y evita reemplazarla por una formulación interpretativa más explícita. La santidad del aceite queda ya indicada por קֹדֶשׁ.
  doctrine_reference: 'Éxodo 30:31; POB: primacía del texto fuente y conservación de la primera persona divina cuando aparece en el original.'
- issue: Designación colectiva בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - los israelitas
  rationale: Se preserva el valor masculino plural del hebreo y su formulación tradicional. «Los israelitas» sería posible, pero diluye la transparencia formal del sintagma original.
  doctrine_reference: 'POB: precisión morfológica y lexical frente a neutralizaciones automáticas.'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó לִי de «to me» a «for me» por mayor naturalidad y precisión. En español se reflejó esa preferencia con «para mí», manteniendo la dedicación a Yahvé sin expandir el texto. Se conservó además la estructura breve de la cláusula y el tono instructivo del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del Tetragrámaton en notas teológicas, conforme a la política del proyecto.
  - Se mantuvo «hijos de Israel» por transparencia formal; no se sustituyó por una expresión más genérica en el texto principal.
  - «Aceite santo de unción» busca equilibrio entre fidelidad lexical y fluidez en español.
  - La puntuación con comillas angulares es adecuada para el estilo editorial en español bíblico.
