translation:
  language: es
  text: Entonces prosperarás[a], si cuidas de hacer los estatutos y los juicios[b] que Yahvé mandó a Moisés para Israel. Sé fuerte y valiente. No temas, ni te desalientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tendrás éxito». El verbo hebreo puede denotar prosperar o tener éxito.
    reason: lexical_alternative
  - marker: b
    text: O «los decretos y las ordenanzas». Los dos términos legales hebreos son distintos y se conservan con traducciones separadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así que
  lexicon: HALOT
  rationale: Marca consecuencia o resultado; «Entonces» conserva la relación lógica natural en español sin añadir matiz temporal innecesario.
- source_word: תַּצְלִ֔יחַ
  english_pob_choice: you will prosper
  chosen_spanish: prosperarás
  alternatives_spanish:
  - tendrás éxito
  - sucederás
  lexicon: HALOT
  rationale: El verbo hiphil de צלח puede significar prosperar o tener éxito. «Prosperarás» mantiene el sentido de bienestar y logro que encaja con el contexto de obediencia del pacto.
- source_word: אִם תִּשְׁמ֗וֹר לַעֲשׂוֹת
  english_pob_choice: if you are careful to do
  chosen_spanish: si cuidas de hacer
  alternatives_spanish:
  - si observas para hacer
  - si procuras hacer
  - si eres cuidadoso para hacer
  lexicon: HALOT
  rationale: La construcción combina guardar/observar con el infinitivo de hacer. «Cuidas de hacer» transmite atención diligente y obediencia sin sonar rígido en español.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» es la equivalencia más estable para חֻקִּים y conserva la categoría legal distinta de מִשְׁפָּטִים.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las normas
  - las ordenanzas
  - las decisiones judiciales
  lexicon: HALOT
  rationale: Aunque «juicios» puede sonar menos idiomático que «normas», preserva la distinción semántica del término legal hebreo y evita igualarlo a «estatutos».
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה עַל יִשְׂרָאֵל
  english_pob_choice: that Yahweh commanded Moses for Israel
  chosen_spanish: que Yahvé mandó a Moisés para Israel
  alternatives_spanish:
  - que Yahvé mandó a Moisés acerca de Israel
  - que Yahvé mandó por medio de Moisés para Israel
  lexicon: HALOT
  rationale: «Para Israel» refleja bien עַל en este contexto como destinatario/supuesto ámbito de las órdenes. Se conserva Moisés como receptor directo del mandato.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: «Yahvé» en lugar de un ocultamiento por «SEÑOR».'
- source_word: חֲזַק וֶאֱמָץ
  english_pob_choice: Be strong and courageous
  chosen_spanish: Esfuérzate y esfuérzate con valor
  alternatives_spanish:
  - Sé fuerte y valiente
  - Fortalécete y sé valiente
  - Sé fuerte y con coraje
  lexicon: HALOT
  rationale: La fórmula exhortativa hebrea pide fortaleza y valentía. En español, «Esfuérzate y esfuérzate con valor» intenta reflejar el doble énfasis sin caer en un calco demasiado duro; aun así, la repetición señala intensidad exhortativa.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas ni te asustes
  lexicon: HALOT
  rationale: Es la forma directa y natural de la prohibición en español, con buena correspondencia semántica.
- source_word: וְאַל תֵּחָת
  english_pob_choice: and do not be dismayed
  chosen_spanish: ni te desalientes
  alternatives_spanish:
  - ni te dismayes
  - ni te acobardes
  - ni te desanimes
  lexicon: HALOT
  rationale: חתת expresa quebranto, desaliento o dismayo. «Desalientes» comunica bien la pérdida de ánimo ante la tarea, manteniendo el tono exhortativo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo el estándar del proyecto, se traduce como «Yahvé» para conservar el nombre del pacto sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the paired exhortation חֲזַק וֶאֱמָץ
  english_pob_reading: Be strong and courageous
  chosen_spanish_reading: Esfuérzate y esfuérzate con valor
  alternative_spanish_readings:
  - Sé fuerte y valiente
  - Sé fuerte y resuelto
  rationale: La fórmula no solo ordena valentía, sino fortaleza para sostener la misión. La repetición en español intenta conservar la intensidad retórica del hebreo.
  doctrine_reference: Hebrew exhortation formula in narrative and leadership contexts
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el auditoría inglesa y no requiere revisión sustantiva. Se preservó la distinción entre חֻקִּים y מִשְׁפָּטִים, el nombre divino como «Yahvé» y la exhortación final con tono imperativo fuerte.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento singular de segunda persona coherente con el hebreo.
  - Se preservó la distinción legal entre «estatutos» y «juicios».
  - Se evitó la convención de ocultar el Nombre divino tras «SEÑOR».
  - La nota al pie se ancló solo en «prosperarás», donde existe la alternativa léxica principal.
