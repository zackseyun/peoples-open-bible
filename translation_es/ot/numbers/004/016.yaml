revisions:
- from: Y la responsabilidad de Eleazar hijo de Aarón, el sacerdote, será el aceite para la lámpara[a], el incienso aromático, la ofrenda vegetal[b] continua y el aceite de la unción[c]—la responsabilidad de todo el tabernáculo y de todo lo que hay en él, el santuario y sus utensilios[d].
  to: 'Y Eleazar, hijo de Aarón el sacerdote, estará a cargo[a] del aceite para la luz, del incienso aromático, de la ofrenda vegetal regular[b], y del aceite de la unción: del cargo de todo el tabernáculo y de todo lo que hay en él, el santuario[c] y sus utensilios[d].'
  rationale: Se ajusta la sintaxis principal para un español más natural («estará a cargo de»), se alinea mejor «aceite para la luz» con la decisión fuente/inglesa, y se restituyen notas léxicas relevantes preservadas en el expediente inglés. Los cambios son menores y no requieren adjudicación adicional.
