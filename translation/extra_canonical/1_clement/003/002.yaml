translation:
  text: From this came jealousy and envy, strife and faction, persecution and disorder,
    war and captivity. 3 Thus the dishonored rose up against the honored, the inglorious
    against the glorious, the foolish against the prudent, the young against the elders.
    4 Because of this, righteousness and peace have withdrawn far away, since each
    one abandoned the fear of God and became shortsighted in faith in him, neither
    walking in the lawful ways of his commandments nor conducting himself in a manner
    fitting for the Messiah, but each going according to the desires of his evil heart,
    having taken up unjust and ungodly jealousy, through which death also entered
    into the world.
