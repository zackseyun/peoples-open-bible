  spanish_quality_summary: El español es claro y legible. «Después de estas cosas», «en el reinado de» y «subió» son naturales y fieles. La principal mejora es reubicar la nota [a] al sintagma correcto. Además, «Quelquías» resulta algo tosco en español; «Jelquías» refleja mejor la forma griega Χελκείου en ortografía española y mantiene la distinción respecto de «Hilkías» preservada en nota.
  glossary_alignment: 'No hay términos teológicos del glosario mayor en juego. Los nombres propios están en formas españolas adecuadas: Esdras, Artajerjes, Azarías, Zacarías, Salum. Para Χελκείου, el proyecto pide seguir la fuente griega en el texto principal; «Jelquías» cumple mejor ese objetivo en español que «Quelquías», con nota que conserve la equivalencia más conocida «Hilkías».'
  issues:
