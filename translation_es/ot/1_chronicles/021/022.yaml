translation:
  language: es
  text: 'Entonces David dijo a Ornan: «Dame el sitio de la era, para que yo edifique sobre él un altar a Yahvé. Dámelo por el precio completo[a], para que la plaga sea detenida de sobre el pueblo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por plata completa», es decir, por el importe íntegro y no como regalo.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, «de sobre el pueblo». El hebreo conserva la imagen de una plaga que está “encima” del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל אָרְנָן / Ornan
  english_pob_choice: to Ornan
  chosen_spanish: a Ornan
  alternatives_spanish:
  - a Arauna
  - a Ornán
  lexicon: HALOT
  rationale: La forma hebrea de Crónicas es אָרְנָן, por lo que en español se conserva la transliteración 'Ornan'. 'Arauna' corresponde al paralelo de Samuel, no a este texto.
- source_word: מְקוֹם
  english_pob_choice: site
  chosen_spanish: sitio
  alternatives_spanish:
  - lugar
  lexicon: HALOT
  rationale: '''מקום'' designa un lugar o ubicación. ''Sitio'' reproduce bien el matiz de localización concreta y sigue la revisión inglesa reciente que prefirió ''site'' sobre ''place''.'
- source_word: הַגֹּרֶן
  english_pob_choice: the threshing floor
  chosen_spanish: la era
  alternatives_spanish:
  - la era de trillar
  - la era de la trilla
  lexicon: HALOT
  rationale: '''גורן'' es la era donde se trilla el grano. ''Era'' es el equivalente español natural y fiel; el complemento explicativo no es necesario aquí.'
- source_word: וְאֶבְנֶה בּוֹ
  english_pob_choice: so that I may build on it
  chosen_spanish: para que yo edifique sobre él
  alternatives_spanish:
  - y edificaré sobre él
  - para edificar sobre él
  lexicon: HALOT
  rationale: El cohortativo expresa intención o propósito. En español, 'para que yo edifique' conserva el valor final con un tono digno y claro.
- source_word: מִזְבֵּחַ
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un ara
  lexicon: HALOT
  rationale: '''מזבח'' se traduce de manera estándar por ''altar''. ''Ara'' sería menos transparente para el lector general y no aporta ventaja aquí.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el criterio doctrinal del proyecto: el Tetragrámaton se vierte ''Yahvé'', no con sustitución por ''SEÑOR''. Con ''a Yahvé'' se mantiene la dedicación del altar y la naturalidad del español.'
- source_word: בְּכֶסֶף מָלֵא
  english_pob_choice: for the full price
  chosen_spanish: por su precio completo
  alternatives_spanish:
  - por plata completa
  - por el importe completo
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática y comercial: indica pago íntegro, no un regalo. ''Por su precio completo'' conserva esa fuerza y suena natural en español.'
- source_word: תְּנֵהוּ לִי
  english_pob_choice: Give it to me
  chosen_spanish: dámelo
  alternatives_spanish:
  - entrégamelo
  - véndemelo
  lexicon: HALOT
  rationale: El verbo sigue siendo 'dar', y el contexto de pago completo comunica la transferencia de propiedad. 'Dámelo' preserva la repetición verbal sin añadir una paráfrasis comercial no explícita.
- source_word: וְתֵעָצַר
  english_pob_choice: so that ... may be stopped
  chosen_spanish: para que sea detenida
  alternatives_spanish:
  - para que se detenga
  - para que sea contenida
  lexicon: HALOT
  rationale: El nifal expresa ser detenida o restringida. 'Sea detenida' es formal, claro y adecuado para una plaga en contexto de juicio.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - la peste
  - la mortandad
  lexicon: HALOT
  rationale: '''מגפה'' en contextos de juicio divino se traduce con precisión por ''plaga''. Es el término más directo y transparente para el lector español.'
- source_word: מֵעַל הָעָם
  english_pob_choice: from upon the people
  chosen_spanish: de sobre el pueblo
  alternatives_spanish:
  - de entre el pueblo
  - del pueblo
  lexicon: HALOT
  rationale: Se conserva la imagen espacial del hebreo ('desde sobre'). 'De sobre el pueblo' mantiene la tensión literal sin volverse ininteligible en español.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto exige traducir יהוה como 'Yahvé' para preservar el nombre propio del pacto y no sustituirlo por un título. Se evita 'SEÑOR' por ser una convención de ocultamiento, no una traducción directa del texto base.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Purpose clause with the plague
  english_pob_reading: so that the plague may be stopped from upon the people
  chosen_spanish_reading: para que la plaga sea detenida de sobre el pueblo
  alternative_spanish_readings:
  - para que la plaga sea detenida del pueblo
  - para que la plaga se aparte del pueblo
  rationale: Se mantiene la imagen hebrea 'de sobre' para no borrar la localización concreta de la calamidad. Aunque 'del pueblo' suena más idiomático, aquí se preserva la tensión lexical documentada en el original y en la nota inglesa.
  doctrine_reference: Principio de transparencia textual del POB
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa reciente que prefirió 'site' para מְקוֹם; por eso se usa 'sitio' en español. También se conserva la decisión auditada de mantener la expresión comercial de 'precio completo' y la imagen hebrea de 'de sobre el pueblo' en la nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con la política del proyecto para יהוה.
  - '''Ornan'' se conserva conforme a la forma hebrea de Crónicas; no se armoniza con el paralelo de Samuel.'
  - '''Era'' corresponde a ''threshing floor'' y evita una perífrasis innecesaria.'
  - La repetición de 'dar' en 'Dame' / 'dámelo' refleja el verbo hebreo תן sin añadir interpretaciones no explícitas.
