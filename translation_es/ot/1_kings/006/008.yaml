translation:
  language: es
  text: La entrada de la cámara lateral del medio estaba en el lado derecho de la casa, y por escaleras de caracol[a] suben al piso del medio, y del medio al tercero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por escaleras en espiral». El término hebreo probablemente se refiere a escaleras que suben en espiral o dando vueltas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «del medio al tercero»; es decir, del piso o nivel del medio al tercer piso o nivel.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - acceso
  - vano
  - apertura
  lexicon: HALOT
  rationale: פֶּתַח designa una abertura o punto de ingreso; en español, 'entrada' expresa con naturalidad el sentido arquitectónico y mantiene la función de acceso.
- source_word: הַצֵּלָע הַתִּיכֹנָה
  english_pob_choice: the middle side chamber
  chosen_spanish: la cámara lateral del medio
  alternatives_spanish:
  - la cámara lateral central
  - la cámara lateral intermedia
  - la estancia lateral del medio
  lexicon: HALOT
  rationale: En contexto constructivo del templo, צֵלָע se refiere a una cámara lateral o dependencia lateral, no a 'costilla'. תִּיכֹנָה indica que es la del medio/intermedia; 'del medio' conserva la referencia sin forzar 'central'.
- source_word: אֶל כֶּתֶף הַבַּיִת הַיְמָנִית
  english_pob_choice: was on the right side of the house
  chosen_spanish: estaba en el lado derecho de la casa
  alternatives_spanish:
  - estaba junto al costado derecho de la casa
  - estaba en el flanco derecho de la casa
  - estaba hacia el hombro derecho de la casa
  lexicon: HALOT
  rationale: כֶּתֶף literalmente es 'hombro' o 'lado/flanco'; aquí, por tratarse de arquitectura, 'lado derecho' comunica con claridad la ubicación espacial. יְמָנִית conserva el valor de derecha, sin convertirlo innecesariamente en 'sur'.
- source_word: וּבְלוּלִּים
  english_pob_choice: by winding stairs
  chosen_spanish: por escaleras de caracol
  alternatives_spanish:
  - por escaleras de caracol en espiral
  - por escaleras en espiral
  - por escaleras de caracol o en espiral
  lexicon: HALOT
  rationale: El término alude a escaleras que giran o suben en espiral. 'Escaleras de caracol' es una expresión natural en español y refleja bien la imagen de ascenso curvo; la alternativa 'en espiral' queda implícita.
- source_word: יַעֲלוּ
  english_pob_choice: they went up
  chosen_spanish: subían
  alternatives_spanish:
  - subieron
  - ascendían
  - se subía
  lexicon: HALOT
  rationale: El verbo es plural y describe el modo de ascenso en la estructura. El imperfecto 'subían' da un sentido descriptivo continuo acorde con la instrucción arquitectónica; también deja claro el movimiento habitual por esas escaleras.
- source_word: עַל הַתִּיכֹנָה
  english_pob_choice: to the middle story
  chosen_spanish: al piso del medio
  alternatives_spanish:
  - al nivel del medio
  - al segundo piso
  - al piso intermedio
  lexicon: HALOT
  rationale: El contexto de niveles arquitectónicos sugiere un 'piso' o nivel; 'del medio' conserva la relación con תִּיכֹנָה sin imponer una numeración no explícita en la primera cláusula.
- source_word: וּמִן הַתִּיכֹנָה אֶל הַשְּׁלִשִׁים
  english_pob_choice: and from the middle to the third
  chosen_spanish: y del medio al tercero
  alternatives_spanish:
  - y del piso del medio al tercero
  - y del nivel intermedio al tercero
  - y del medio al tercer piso
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de la intermedia al tercero'. En español, 'del medio al tercero' preserva la brevedad y la progresión de niveles; 'piso' puede entenderse por el contexto ya introducido.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marca de nota aparezca explícitamente en el texto español. La redacción sigue de cerca el hebreo y conserva la progresión arquitectónica del versículo, alineada con el audit trail inglés.
  spanish_consistency_notes:
  - Se usó 'cámara lateral' para צֵלָע en coherencia con el contexto del templo y para evitar la traducción literal inadecuada 'costilla'.
  - Se eligió 'lado derecho' para כֶּתֶף הַבַּיִת הַיְמָנִית, manteniendo el valor espacial sin introducir 'sur' no indicado por el texto inmediato.
  - '''Escaleras de caracol'' es una equivalencia idiomática para בלולים que conserva la imagen de ascenso en espiral.'
  - Se mantuvo la secuencia de niveles con 'del medio al tercero' para reflejar con fidelidad la frase breve del hebreo.
