review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: negación doble de daño y destrucción, marco locativo en el monte santo, plenitud futura del conocimiento de Yahvé y símil final con las aguas. También preserva correctamente «Yahvé» para יְהוָה y mantiene «la tierra» para הָאָרֶץ, en línea con el alcance amplio documentado. Sin embargo, la nota al pie no preserva la alternativa del inglés POB: repite esencialmente el texto principal en vez de reflejar la variante documentada «earth/land» y además no marca la diferencia de Yahvé/SEÑOR según el criterio español del proyecto.'
  spanish_quality_summary: El español es claro, natural y digno. «No harán daño ni destruirán en todo mi monte santo» funciona bien. La única falla importante de calidad editorial está en la nota al pie, que no añade información útil y parece anclada en un lugar donde la alternativa real corresponde a «la tierra». Conviene mover el ancla a «la tierra» y hacer que la nota exprese la alternativa léxica pertinente.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: «Yahvé», «conocimiento», «la tierra», «monte santo». No obstante, la nota debe ajustarse al estándar del proyecto: si se conserva una alternativa heredada del inglés POB, en español debe presentarse de manera útil y coherente, aquí señalando «O «el país…»» o equivalente, no repitiendo la lectura principal.'
  issues:
  - severity: medium
    issue: La nota al pie no corresponde a la alternativa léxica documentada.
    rationale: La nota inglesa preserva la alternativa de הָאָרֶץ como «land», pero la nota española actual dice «O «la tierra estará llena del conocimiento de Yahvé»», que no ofrece una verdadera variante frente al texto principal y por tanto no cumple la función textual/auditada.
  - severity: medium
    issue: El ancla de la nota está colocada en «monte santo» en vez de en «la tierra».
    rationale: La alternativa documentada afecta a הָאָרֶץ, no a בְּכָל הַר קָדְשִׁי. El marcador debe aparecer en el punto pertinente del texto para no inducir al lector a pensar que la nota trata sobre «mi monte santo».
  revised_spanish_text: No harán daño ni destruirán en todo mi monte santo, porque la tierra[a] estará llena del conocimiento de Yahvé, como las aguas cubren el mar.
  revised_footnotes:
  - marker: a
    text: O «el país estará lleno del conocimiento de Yahvé».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que preserve la alternativa léxica real de הָאָרֶץ («tierra» / «país») y se reubica el marcador en la palabra correspondiente. El texto principal no requiere cambios sustanciales.
