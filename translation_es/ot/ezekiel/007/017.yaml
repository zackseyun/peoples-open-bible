translation:
  language: es
  text: Todas las manos se debilitarán[a], y a todas las rodillas les correrá agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a todas las rodillas les correrá agua», probablemente un modismo para rodillas que ceden de terror, quizá con la idea añadida de pérdida de control corporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas las
  - cada una de las
  lexicon: HALOT
  rationale: El cuantificador se repite con ambos sustantivos. En español, «todas» conserva la totalidad sin sonar artificial.
- source_word: הַיָּדַיִם
  english_pob_choice: hands
  chosen_spanish: manos
  alternatives_spanish:
  - manos
  - brazos
  lexicon: HALOT
  rationale: Aunque el inglés POB mantiene «hands», en español «manos» es el equivalente natural y directo del cuerpo, y conserva el valor imagístico de fuerza que falla.
- source_word: תִּרְפֶּינָה
  english_pob_choice: will grow weak
  chosen_spanish: se debilitarán
  alternatives_spanish:
  - se debilitarán
  - se aflojarán
  - se volverán débiles
  lexicon: HALOT
  rationale: La raíz רפה expresa debilitamiento o aflojamiento. «Se debilitarán» comunica bien la pérdida de fuerza en español moderno sin exagerar la paráfrasis.
- source_word: בִּרְכַּיִם
  english_pob_choice: knees
  chosen_spanish: rodillas
  alternatives_spanish:
  - rodillas
  lexicon: HALOT
  rationale: Término anatómico directo; se mantiene la imagen corporal del hebreo.
- source_word: תֵּלַכְנָה
  english_pob_choice: will run
  chosen_spanish: correrán
  alternatives_spanish:
  - correrán
  - fluirán
  - irán
  lexicon: HALOT
  rationale: Aunque literalmente el verbo es ‘ir/andar’, con «agua» funciona idiomáticamente para un líquido que corre. «Correrán» reproduce en español la vivacidad de la imagen.
- source_word: מָּיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  - líquido
  lexicon: HALOT
  rationale: El hebreo dice «agua». Se conserva esa palabra en el texto principal, como hizo el POB inglés, sin explicitar en la traducción principal la posible implicación fisiológica.
translation_notes:
  revision_awareness: El texto base y la lectura inglesa muestran alta concordancia con el hebreo; no se detectan revisiones textuales relevantes. La principal decisión traslativa es conservar la imaginería idiomática del versículo sin explicitar en el cuerpo principal la posible referencia a pérdida de control corporal.
  spanish_consistency_notes:
  - Se mantuvo un paralelismo claro entre «todas las manos» y «todas las rodillas».
  - «Se debilitarán» evita una calca rígida y comunica el valor de רפה con naturalidad.
  - Se preservó «agua» en el texto principal, siguiendo el patrón del POB inglés, y se aclaró el modismo en nota.
  - El registro es sobrio y bíblico, pero en español moderno y publicable.
