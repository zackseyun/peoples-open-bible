base_translation:
  language: en
  yaml_path: translation/ot/micah/007/002.yaml
  text: The faithful has perished from the land[a], and there is no upright one among mankind. All of them lie in wait for blood[c][b]; each hunts his brother with a net.
  footnotes:
  - marker: a
    text: Or 'from the earth.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his brother'; the term can extend beyond a literal sibling to a fellow member of the community.
    reason: lexical_alternative
  - marker: c
    text: Or 'with a snare.'
    reason: lexical_alternative
