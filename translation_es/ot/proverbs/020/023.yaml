translation:
  language: es
  text: Pesas desiguales[a] son una abominación para Yahvé, y las balanzas engañosas no son buenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «una piedra y una piedra», un modismo para pesas distintas usadas de forma deshonesta en el comercio.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - algo aborrecible
  lexicon: HALOT
  rationale: La palabra hebrea expresa algo moralmente repulsivo o detestable; «abominación» conserva la fuerza ética y el registro proverbial sin atenuarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con la forma usada por el proyecto en español, evitando sustituirlo por un título.
- source_word: אֶבֶן וָאָבֶן
  english_pob_choice: unequal weights
  chosen_spanish: pesas desiguales
  alternatives_spanish:
  - una pesa y otra pesa
  - pesas dobles
  - pesas desiguales en comercio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «una piedra y una piedra», un modismo para pesas distintas usadas de forma fraudulenta. «Pesas desiguales» comunica el sentido idiomático en español natural y mantiene el ámbito comercial.
- source_word: וּמֹאזְנֵי מִרְמָה
  english_pob_choice: deceitful scales
  chosen_spanish: las balanzas engañosas
  alternatives_spanish:
  - balanzas de engaño
  - balanzas fraudulentas
  - las básculas engañosas
  lexicon: HALOT
  rationale: מֹאזְנֵי son balanzas o escalas; מִרְמָה es engaño o fraude. «Balanzas engañosas» conserva la relación genitiva y el tono proverbial sin volverlo técnico en exceso.
- source_word: לֹא טוֹב
  english_pob_choice: are not good
  chosen_spanish: no son buenas
  alternatives_spanish:
  - no son buenas en absoluto
  - no son rectas
  - no son aceptables
  lexicon: HALOT
  rationale: La negación más «bueno» se traduce de forma directa como «no son buenas», preservando la sobriedad del proverbio y sin intensificar el juicio más allá del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto usa directamente el Tetragrámaton. La forma española del proyecto para este nombre es «Yahvé», que preserva el nombre personal del Dios del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto auditado coincide con la lectura inglesa aprobada: el proverbio denuncia la fraude comercial mediante un modismo hebreo y mantiene la evaluación breve «no son buenas». No se registran revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como nombre divino conforme al estándar del proyecto.
  - Se eligió «pesas» y «balanzas» por claridad natural en español, conservando el contraste entre el objeto adulterado y el instrumento de medición.
  - El adjetivo plural «buenas» concuerda con «balanzas» y refleja el hebreo לֹא טוֹב de manera sobria.
