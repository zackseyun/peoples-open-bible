translation:
  language: es
  text: No vayan tras otros dioses[a], los dioses de los pueblos que los rodean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «No sigan a otros dioses, a ninguno de los dioses de los pueblos que los rodean».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No han de
  - No deberán
  lexicon: HALOT
  rationale: La partícula negativa introduce una prohibición directa; en español, 'No' es la forma más natural y fiel para una orden negativa breve.
- source_word: תֵלְכוּן
  english_pob_choice: you shall go
  chosen_spanish: seguirán
  alternatives_spanish:
  - irán
  - caminarán
  - obedecerán
  lexicon: HALOT
  rationale: En el contexto hebreo, 'ir tras' expresa seguimiento/allegiance religiosa. 'Seguirán' conserva mejor el valor idiomático de seguir a otra deidad que un simple movimiento físico con 'irán'.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: a
  alternatives_spanish:
  - tras
  - detrás de
  lexicon: HALOT
  rationale: En español, la construcción 'seguir a' transmite con naturalidad el hebreo idiomático de ir tras alguien o algo, sin perder la idea de lealtad o adhesión.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otros ídolos
  lexicon: HALOT
  rationale: La frase denota deidades distintas del Dios de Israel. 'Otros dioses' es directo, transparente y no añade la connotación interpretativa de 'ídolos'.
- source_word: מֵאֱלֹהֵי
  english_pob_choice: from the gods of
  chosen_spanish: a los dioses de
  alternatives_spanish:
  - de entre los dioses de
  - entre los dioses de
  lexicon: HALOT
  rationale: 'El prefijo hebreo aquí funciona de modo partitivo dentro de la descripción: ''los dioses de los pueblos''. En español se expresa mejor como ''a los dioses de'' dentro del verbo ''seguir'', evitando un calco de ''de los dioses de'' que sonaría menos natural.'
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: עַמִּים puede referirse a pueblos o naciones. 'Los pueblos' mantiene el sentido léxico más cercano y funciona bien en español bíblico contemporáneo.
- source_word: אֲשֶׁר סְבִיבֹתֵיכֶם
  english_pob_choice: who are around you
  chosen_spanish: que están alrededor de ustedes
  alternatives_spanish:
  - que los rodean
  - circundantes
  lexicon: HALOT
  rationale: La cláusula relativa describe a los pueblos cercanos. 'Que están alrededor de ustedes' es claro, idiomático y conserva la referencia geográfica del hebreo.
theological_decisions:
- issue: Sentido del mandato prohibitivo
  english_pob_reading: A covenantal prohibition against pursuing or aligning with other deities.
  chosen_spanish_reading: Una prohibición pactal contra seguir o adherirse a otros dioses.
  alternative_spanish_readings:
  - Una prohibición solo contra acercarse físicamente a santuarios paganos
  - Una prohibición meramente ritual
  rationale: El hebreo 'ir tras' en Deuteronomio expresa lealtad religiosa, no solo desplazamiento físico. 'Seguir' mantiene esa fuerza sin explicitar 'adorar', que sería una paráfrasis más fuerte de lo que el texto dice.
  doctrine_reference: Deuteronomio 6:14; cf. el uso de 'ir tras' como lenguaje de fidelidad o infidelidad pactal en Deuteronomio.
translation_notes:
  revision_awareness: 'La redacción inglesa auditada corrigió ''from the gods of'' a ''the gods of'' por ajustarse mejor al hebreo. En español se refleja esa decisión evitando cualquier equivalente de ''desde/de entre'' y formulando la frase como identificación: ''a los dioses de los pueblos que están alrededor de ustedes''.'
  spanish_consistency_notes:
  - Se mantuvo 'dioses' y no 'ídolos' para no añadir una interpretación no explícita en el hebreo.
  - '''Pueblos'' se eligió sobre ''naciones'' por proximidad lexical y porque encaja con el referente geográfico del verso.'
  - La nota al pie preserva la alternativa idiomática de 'seguir' en lugar de una traducción más literal de 'ir tras'.
