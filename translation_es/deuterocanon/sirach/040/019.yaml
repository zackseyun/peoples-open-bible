translation:
  language: es
  text: Los hijos y la construcción de una ciudad establecen un nombre[b][a], pero mejor que ambos es el hallazgo de la sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de la tradición de Cairo Geniza lee aproximadamente: «y de ambos sale sabiduría» o «de ambos viene el hallazgo de la sabiduría». El paralelo griego, en cambio, dice: «una mujer intachable». Como esta parte del hebreo es textualmente incierta, existe una variante antigua bien atestiguada.'
    reason: alternative_reading
  - marker: b
    text: El antiguo rollo de Masada está fragmentario en este punto y no conserva suficiente de la línea para fijar con seguridad la redacción final.
    reason: textual_variant
lexical_decisions:
- source_word: τέκνα / ילד
  english_pob_choice: Children
  chosen_spanish: Los hijos
  alternatives_spanish:
  - Los niños
  - La descendencia
  lexicon: LSJ; HALOT
  rationale: El griego τέκνα y el hebreo ילד son colectivos en este proverbio sapiencial. 'Hijos' conserva el valor colectivo y suena natural en español bíblico contemporáneo.
- source_word: οἰκοδομὴ πόλεως / ועיר
  english_pob_choice: the building of a city
  chosen_spanish: la construcción de una ciudad
  alternatives_spanish:
  - la edificación de una ciudad
  - la fundación de una ciudad
  lexicon: LSJ; HALOT
  rationale: οἰκοδομὴ y עיר apuntan al acto de levantar o establecer una ciudad. 'Construcción' es transparente y mantiene la imagen de una obra cívica concreta.
- source_word: στηρίζουσιν ὄνομα / יעמידו שם
  english_pob_choice: establish a name
  chosen_spanish: establecen un nombre
  alternatives_spanish:
  - establecen renombre
  - hacen perdurar un nombre
  lexicon: LSJ; HALOT
  rationale: El giro semítico 'hacer/establecer un nombre' conserva el valor de reputación o memoria duradera. En español, 'nombre' mantiene el vínculo literal con שם sin perder inteligibilidad.
- source_word: ὑπὲρ ἀμφότερα / ומשניהם
  english_pob_choice: better than both
  chosen_spanish: más que ambos
  alternatives_spanish:
  - por encima de ambos
  - mejor que ambos
  lexicon: LSJ; HALOT
  rationale: ὑπὲρ ἀμφότερα expresa comparación de superioridad. 'Más que ambos' reproduce esa relación de forma breve y natural.
- source_word: γυνὴ ἄμωμος / מוצא חכמה
  english_pob_choice: a blameless wife / the finding of wisdom
  chosen_spanish: la mujer intachable
  alternatives_spanish:
  - la esposa sin mancha
  - la mujer irreprochable
  - el hallazgo de la sabiduría
  lexicon: BDAG; LSJ; HALOT
  rationale: 'Aunque el hebreo transmitido en Kahana lee ''y de ambos sale sabiduría'', el paralelo griego es explícito: γυνὴ ἄμωμος. Para el texto principal se adopta la lectura griega en esta línea, siguiendo el criterio de la POB de traducir con apoyo del paralelo cuando el hebreo es textualmente inestable. ''Intachable'' comunica ἄμωμος sin exagerar hacia ''sin pecado''.'
theological_decisions:
- issue: Manejo de la tensión textual entre hebreo y griego en la cola del versículo
  english_pob_reading: The main text follows the Greek-supported sense, while a footnote records the Hebrew reading 'and from both of them comes wisdom.'
  chosen_spanish_reading: 'El texto principal sigue el sentido apoyado por el griego: ''la mujer intachable''.'
  alternative_spanish_readings:
  - '''y de ambos sale sabiduría'''
  - '''el hallazgo de la sabiduría'''
  rationale: El paquete fuente muestra una disyunción real entre el hebreo de Kahana y el griego. Como el griego es explícito y la nota inglesa ya documenta la inestabilidad del hebreo, la traducción española debe preservar esa tensión en una nota y no resolverla artificialmente en el cuerpo del texto.
  doctrine_reference: 'PHILOSOPHY.md: usar el paralelo griego como entrada de traducción cuando el hebreo está corrupto o desplazado, dejando constancia de la alternativa textual.'
translation_notes:
  revision_awareness: La revisión más reciente en inglés sustituyó una propuesta basada en el griego por una lectura que intentaba seguir el hebreo 'ומשניהם מוצא חכמה'. Para esta entrega se restaura la opción principal alineada con el paralelo griego, porque el expediente fuente marca el hebreo como incierto y el griego ofrece una cláusula completa y coherente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - '''Hijos'' conserva el plural colectivo de τέκνα / ילד.'
  - '''Nombre'' se usa de forma literal para preservar el hebraísmo semántico de reputación o memoria.'
  - '''Intachable'' traduce ἄμωμος de modo moral, sin convertirlo en lenguaje doctrinal más fuerte que el original.'
  - Las notas [a] y [b] aparecen ancladas exactamente en el texto principal, sin marcadores sueltos.
