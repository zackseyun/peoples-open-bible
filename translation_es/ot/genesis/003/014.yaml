  to: 'Entonces Yahvé Dios dijo a la serpiente[a]: «Porque has hecho esto, maldito seas más que todo el ganado y más que toda bestia del campo. Sobre tu vientre irás, y polvo comerás[b] todos los días de tu vida».'
  rationale: Se corrige el comparativo para reflejar con precisión el hebreo מִן, se mejora la naturalidad de «sobre tu vientre irás» sin añadir interpretación, y se sustituye la nota estilística secundaria por la nota cultural documentada en el POB sobre «comer polvo». «Bestia del campo» mantiene mejor el registro formal y la cercanía al rastro de auditoría inglés que «animales del campo».
