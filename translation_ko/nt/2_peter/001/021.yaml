source:
  edition: SBLGNT
  text: οὐ γὰρ θελήματι ἀνθρώπου ἠνέχθη ⸂προφητεία ποτέ⸃, ἀλλὰ ὑπὸ πνεύματος ἁγίου φερόμενοι ἐλάλησαν ⸀ἀπὸ θεοῦ ἄνθρωποι.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/021.yaml
  text: For prophecy was never brought forth by the will of man[c][b][a], but men spoke from God as they were carried along by the Holy Spirit.
  footnotes:
  - marker: a
    text: Or 'was produced' for 'was brought forth'; the Greek verb is passive and related to the participle later in the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'being moved by the Holy Spirit.' The Greek more literally says 'being carried along,' emphasizing the Spirit's active guidance.
    reason: lexical_alternative
  - marker: c
    text: '''Man'' and ''men'' render Greek ἄνθρωπος/ἄνθρωποι in a representative human sense, not to exclude women where the context is generic.'
    reason: cultural_note
translation:
  language: ko
  text: 예언은 결코 사람의 뜻으로 나온 것이 아니라, 사람들이 성령에 이끌리어 하나님으로부터 말한 것이기 때문입니다.
  philosophy: optimal-equivalence
