base_translation:
  language: en
  yaml_path: translation/ot/2_kings/006/013.yaml
  text: And he said[a], “Go and see where he is, that I may send and seize him.” And it was reported to him, saying, “Behold[b], he is in Dothan.”
  footnotes:
  - marker: a
    text: 'Or “and I will send and take him”; the Hebrew sequence can be rendered more formally, but here it likely expresses purpose: “so that I may send and seize him.”'
    reason: lexical_alternative
  - marker: b
    text: Dothan was a town north of Samaria; it is also associated with the Joseph narrative (Gen 37:17).
    reason: cross_reference
