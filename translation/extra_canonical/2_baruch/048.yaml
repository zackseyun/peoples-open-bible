    After seven days, when the seventh day had passed, I prayed before the Mighty One and said:[a]
    
    “O Lord, I call upon your consolation, for I weep and wait before you. You are king, and you see those things that are beneath. You are he from whom the depths are heard, and to you the works listen. You alone know the birth of the generations, and you do not reveal your mysteries to many. You make known the multitude of the fire, and the stirring of the mighty wind. You search out the end of the times, and you examine the secret places of darkness. You appoint the number of those who pass away and are kept, and you reveal the dwelling places of those who are yet to be. You uncover the thought of the beasts, and the things hidden from the ages do not escape you. You command the flames by the spirit of fear and wrath, and they are changed into winds. By your word you establish what did not exist, and by the power of your might you hold what you created. By your wisdom you make sweet the bitter things of your law.
    
    “Without number are those who have forsaken them and in their multitude have gone down to destruction and become enemies, because they forsook me and sought what was not for their good. But toward me they have been more than at any time, even more as though I had not been with them, because they did not know and were not able to understand. For what is my life? For they in their birth made them, but we were not worthy. For we have not forsaken our fathers who perished, nor have we turned aside to death and the end of all. What then was it for them, and what now is it for those who are near to God? Look upon this people who are left to you, and save those who remain from among them for you. Do not shatter the hope of your people, and do not cut short the time of your help. For they are the people whom you chose, and we are the people for whom no number can be reckoned. But I will speak before you and say what my heart meditates. All my inward parts bear witness for us, and they know that we shall not fall so long as we keep your law. We shall be blessed even in this, that we were not born in confusion. For we are all one famous people, who received one law from the One, and the law that is among us helps us, and the excellent wisdom that is in us supports us.”
    
    When I had prayed and spoken these things, I was greatly comforted. And I wept and said to myself:[b]
    
    “You have certainly judged, O my soul, whether in the house or in the field, and my offspring have become your kingdoms. But my griefs are theirs, and my sorrows are like theirs. For from my kings I was given to you, and by your will I was created with you. For this is Adam, that he should not be anything that is corruptible, and man is he who has prepared for weeping something. And let not my goodness be destroyed, and let not my soul’s hope be without help. For you surely take up what is yours, as I said to you before. And I will speak what I said to you. For at that time the storehouses will come, and they will bring out the hosts of joy; and toward you from me...”[c]
