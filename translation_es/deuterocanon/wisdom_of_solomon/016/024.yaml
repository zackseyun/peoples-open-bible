translation:
  language: es
  text: Porque la creación[a], sirviéndote a ti, que la hiciste, se tensa para el castigo de los injustos, y se afloja en beneficio de los que han puesto su confianza en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se tensa para el castigo ... y se afloja en beneficio». El griego presenta una imagen física contrastante: la creación es «estirada» o «tensada» hacia el castigo y «aflojada» o «soltada» hacia el hacer bien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κτίσις
  english_pob_choice: creation
  chosen_spanish: la creación
  alternatives_spanish:
  - el mundo creado
  - la criatura
  lexicon: LSJ
  rationale: «La creación» conserva el alcance colectivo del orden creado y su valor como sujeto activo bajo Dios, sin reducirlo a una noción meramente impersonal de «naturaleza».
- source_word: τῷ ποιήσαντι
  english_pob_choice: its maker
  chosen_spanish: su hacedor
  alternatives_spanish:
  - el que la hizo
  - su creador
  lexicon: LSJ
  rationale: El dativo explicativo se expresa con naturalidad en español como «su hacedor», manteniendo la relación de pertenencia y origen entre la creación y Dios.
- source_word: ὑπηρετοῦσα
  english_pob_choice: serving
  chosen_spanish: sirviéndote
  alternatives_spanish:
  - ministrándote
  - prestándote servicio
  lexicon: LSJ
  rationale: El participio indica servicio subordinado a Dios; «sirviendo» es claro y digno, y evita una traducción demasiado eclesiástica como «ministrando».
- source_word: ἐπιτείνει
  english_pob_choice: intensifies itself
  chosen_spanish: se tensa
  alternatives_spanish:
  - se intensifica
  - se estira
  - se esfuerza
  lexicon: LSJ
  rationale: El verbo conserva la imagen física de tensión o estiramiento. «Se tensa» comunica mejor en español la fuerza gráfica del original que una forma más abstracta como «se intensifica».
- source_word: εἰς κόλασιν
  english_pob_choice: for the punishment of
  chosen_spanish: para el castigo de
  alternatives_spanish:
  - para castigar a
  - para la punición de
  - para el castigo contra
  lexicon: LSJ
  rationale: El sustantivo κόλασις tiene fuerza penal/judicial; en español «castigo» preserva ese sentido sin suavizarlo. La preposición «para» refleja bien el fin o la dirección del movimiento.
- source_word: κατὰ τῶν ἀδίκων
  english_pob_choice: the unrighteous
  chosen_spanish: de los injustos
  alternatives_spanish:
  - contra los injustos
  - de los impíos
  - de los malvados
  lexicon: LSJ
  rationale: «Ἄδικοι» apunta a quienes carecen de justicia; «los injustos» conserva el contraste moral y judicial del término. Se evita «impíos» por ser más interpretativo.
- source_word: ἀνίεται
  english_pob_choice: relaxes
  chosen_spanish: se afloja
  alternatives_spanish:
  - se relaja
  - se suelta
  - se alivia
  lexicon: LSJ
  rationale: El contraste con ἐπιτείνει pide una imagen de aflojamiento o soltarse. «Se afloja» preserva la metáfora física y la oposición con «se tensa».
- source_word: εἰς εὐεργεσίαν
  english_pob_choice: for the benefit of
  chosen_spanish: para beneficio de
  alternatives_spanish:
  - para bien de
  - para hacer el bien a
  - en beneficio de
  lexicon: LSJ
  rationale: εὐεργεσία nombra el hacer bien o la acción benéfica; «beneficio» mantiene el sentido sin forzar una abstracción demasiado técnica. La construcción con «para» refleja la finalidad del giro griego.
- source_word: ὑπὲρ τῶν εἰς σὲ πεποιθότων
  english_pob_choice: those who have put their trust in you
  chosen_spanish: de los que han puesto su confianza en ti
  alternatives_spanish:
  - de los que confían en ti
  - de los que te han confiado su causa
  - de los que han creído en ti
  lexicon: LSJ
  rationale: El participio perfecto expresa un estado ya establecido de confianza; «han puesto su confianza» conserva esa idea de acción completada con efecto vigente.
theological_decisions:
- issue: La creación como instrumento subordinado a Dios, no como fuerza autónoma
  english_pob_reading: Creation is rendered as an instrument serving God in both judgment and beneficence.
  chosen_spanish_reading: La creación aparece sirviendo al que la hizo, actuando bajo su dirección tanto para castigo como para beneficio.
  alternative_spanish_readings:
  - La naturaleza actúa por sí misma como fuerza impersonal.
  - La creación se personifica sin clara subordinación a Dios.
  rationale: 'El participio de servicio y el dativo explicativo muestran subordinación real a Dios. La traducción conserva esa tensión: la creación es activa, pero no autónoma.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve the text''s theological tension without importing claims.'
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete 1909 y la auditoría inglesa revisada, manteniendo el contraste entre ἐπιτείνει y ἀνίεται. Se ha preferido una solución española que preserve la imagen corporal de tensión/aflojamiento, en lugar de neutralizarla con verbos abstractos. También se conserva la finalidad de εἰς κόλασιν y εἰς εὐεργεσίαν con construcciones naturales en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige expresamente; aquí el verso se refiere a Dios de manera pronominal, así que no se introduce el nombre divino.
  - Se mantiene «la creación» como sujeto colectivo, coherente con el uso POB de κτίσις.
  - «Injustos» preserva la carga moral-jurídica de ἄδικοι.
  - La nota de pie de página mantiene la alternativa léxica sin suavizar la imagen del original.
