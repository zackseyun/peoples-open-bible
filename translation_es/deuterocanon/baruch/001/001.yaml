lexical_decisions:
- source_word: ΚΑΙ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  lexicon: BDAG
  rationale: La conjunción inicial se conserva como enlace narrativo simple. En español, «Y» reproduce la coordinación griega sin añadir matiz interpretativo.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - estas mismas
  lexicon: BDAG
  rationale: El demostrativo introduce lo que sigue de manera directa; «estas» es la equivalencia natural y fiel en español.
- source_word: λόγοι
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - relato
  - asuntos
  lexicon: BDAG
  rationale: Aquí λόγοι se refiere al contenido escrito del libro; «palabras» mantiene mejor la referencia al texto mismo que opciones más amplias como «relato» o «asuntos».
- source_word: τοῦ βιβλίου
  english_pob_choice: of the book
  chosen_spanish: del libro
  alternatives_spanish:
  - de este libro
  - del rollo
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de forma natural con «del libro». «Rollo» sería históricamente posible, pero el español actual comunica mejor con «libro».
- source_word: οὓς ἔγραψεν
  english_pob_choice: that ... wrote
  chosen_spanish: que ... escribió
  alternatives_spanish:
  - los cuales ... escribió
  - que ... había escrito
  lexicon: BDAG
  rationale: La relativa se vierte con «que» para una construcción fluida en español; el aoristo indica pasado simple, no pluscuamperfecto.
- source_word: Βαροὺχ
  english_pob_choice: Baruch
  chosen_spanish: Baruc
  alternatives_spanish:
  - Baruj
  lexicon: transliteration
  rationale: Se adopta la transliteración bíblica estándar en español para el nombre propio, conforme a la política del proyecto.
- source_word: υἱὸς
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: BDAG
  rationale: La fórmula genealógica se preserva literalmente porque el texto enumera ascendencia directa; «descendiente» debilitaría esa precisión.
- source_word: Νηρίου
  english_pob_choice: Neriah
  chosen_spanish: Nerías
  alternatives_spanish:
  - Nerías
  lexicon: transliteration
  rationale: Se usa la forma bíblica española asentada para el nombre, ajustando la terminación al uso hispano y manteniendo la identificación semítica del linaje.
- source_word: Μαασαίου
  english_pob_choice: Maaseiah
  chosen_spanish: Maasías
  alternatives_spanish:
  - Maaseías
  lexicon: transliteration
  rationale: Se prefiere la forma tradicional española del nombre, más natural en lectura bíblica que una transliteración más cercana al griego.
- source_word: Σεδεκίου
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: transliteration
  rationale: Se emplea la transliteración bíblica española usual del nombre, que refleja mejor la forma semítica que una adaptación directamente griega.
- source_word: Ἀσαδίου
  english_pob_choice: Hasadiah
  chosen_spanish: Hasadías[a]
  alternatives_spanish:
  - Asadías
  - Jasadías
  lexicon: transliteration
  rationale: El griego presenta Ἀσαδίου, pero el audit trail inglés documenta la preferencia por la forma semítica con aspiración inicial. En español se sigue esa decisión como «Hasadías», manteniendo la tensión textual entre la forma griega y la transliteración semítica convencional.
- source_word: Χελκίου
  english_pob_choice: Hilkiah
  chosen_spanish: Jilquías
  alternatives_spanish:
  - Hilkías
  - Chelquías
  lexicon: transliteration
  rationale: Se adopta la transliteración bíblica española estándar del nombre, que resulta más natural y reconocible que una forma calcada del griego.
- source_word: ἐν Βαβυλῶνι
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en Babilón
  - en Babilonia
  lexicon: BDAG
  rationale: La expresión locativa se traduce de modo directo y claro; «Babilonia» es la forma castellana más reconocible y fiel del topónimo.
theological_decisions:
- issue: Formas genealógicas en un texto griego deuterocanónico
  english_pob_reading: Use standard English biblical transliterations reflecting the Semitic names (Neriah, Maaseiah, Zedekiah, Hasadiah, Hilkiah)
  chosen_spanish_reading: Usar transliteraciones bíblicas españolas estándar que reflejan los nombres semíticos (Nerías, Maasías, Sedequías, Hasadías, Jilquías)
  alternative_spanish_readings:
  - 'Conservar formas más cercanas al griego: Nerias, Maasaias, Sedecías, Asadías, Chelquías'
  - Uniformar todo con grafía plenamente castellana moderna
  rationale: La decisión sigue la política del proyecto de transliterar nombres propios según convenciones bíblicas reconocibles en español, preservando al mismo tiempo la conexión con el trasfondo semítico que el audit trail inglés destaca. No es una cuestión doctrinal, pero sí afecta la inteligibilidad y la trazabilidad del linaje.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el audit trail inglés; la versión española sigue la lectura aprobada y conserva la única tensión lexical documentada en el nombre Ἀσαδίου/Hasadiah mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Baruc» para el nombre del autor y se usan transliteraciones bíblicas españolas consistentes para la genealogía.
  - Se evita «Señor» u otras sustituciones teológicas porque el texto no contiene el Tetragrámaton ni un título divino.
  - «Babilonia» se conserva como topónimo estándar en español, sin calco griego.
