    rationale: Aunque transmite intoxicación, suena más explicativo que traductivo y menos idiomático en registro bíblico. «Bebida fuerte» corresponde mejor al valor amplio de שֵׁכָר, evita un matiz demasiado moderno/técnico, y armoniza con la documentación inglesa.
  - severity: low
