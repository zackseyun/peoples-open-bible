  yaml_path: translation/ot/jeremiah/002/002.yaml
  text: 'Go and proclaim in the hearing of Jerusalem[a], saying, ‘Thus says Yahweh: I remember for you the faithful love of your youth, the love of your betrothal, when you went after me in the wilderness[b], in a land not sown.’'
  footnotes:
