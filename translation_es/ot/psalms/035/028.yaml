translation:
  language: es
  text: Y mi lengua meditará[a] en tu rectitud[b], y en tu alabanza[c] todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hablará de” o “pronunciará”. El hebreo puede referirse a meditar, murmurar o expresar verbalmente; aquí, con “mi lengua” como sujeto, también está presente el matiz de alabanza hablada.
    reason: lexical_alternative
  - marker: b
    text: O “tu justicia”. El hebreo puede denotar tanto rectitud como justicia, especialmente en contextos de vindicación.
    reason: lexical_alternative
  - marker: c
    text: O “alabanza de ti”. La expresión hebrea puede entenderse como alabanza dirigida a Dios o alabanza que le pertenece.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְשׁוֹנִי
  english_pob_choice: And my tongue
  chosen_spanish: Y mi lengua
  alternatives_spanish:
  - Y mi lengua también
  - Entonces mi lengua
  lexicon: HALOT
  rationale: La construcción hebrea usa “mi lengua” como metonimia de la habla. En español, “lengua” conserva bien esa imagen. Se mantiene la conjunción inicial con “Y” para enlazar con el verso anterior, como en el auditorio inglés de POB.
- source_word: תֶּהְגֶּה
  english_pob_choice: will meditate on
  chosen_spanish: meditará
  alternatives_spanish:
  - hablará de
  - proclamará
  - utterá
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar murmurar, meditar o articular en voz baja. Aunque la secuencia con “lengua” favorece expresión verbal, el último pase inglés volvió a “meditate on” para reflejar mejor תהגה. En español, “meditará” conserva esa amplitud semántica sin forzar un verbo más específico de proclamación.
- source_word: צִדְקֶךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu justicia recta
  - tu rectitud
  - tu justicia y rectitud
  lexicon: HALOT
  rationale: צדק puede abarcar justicia y rectitud, y en este contexto alude a la vindicación justa de Yahvé. Se eligió “justicia” porque en español comunica mejor la dimensión forense/vindicativa que el inglés POB preserva con “righteousness”, manteniendo abierta la tensión entre justicia moral y acto de vindicación.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - durante todo el día
  lexicon: HALOT
  rationale: Es una expresión temporal idiomática. “Todo el día” es natural en español y preserva la duratividad continua del hebreo.
- source_word: תְּהִלָּתֶךָ
  english_pob_choice: your praise
  chosen_spanish: tu alabanza
  alternatives_spanish:
  - tu elogio
  - la alabanza que te pertenece
  - alabanza a ti
  lexicon: HALOT
  rationale: תְּהִלָּה significa “alabanza”. “Tu alabanza” mantiene la forma del hebreo y permite entender que la lengua del salmista hablará de la alabanza dirigida a Yahvé o perteneciente a él.
theological_decisions:
- issue: צִדְקֶךָ como atributo divino en contexto de vindicación
  english_pob_reading: your righteousness
  chosen_spanish_reading: tu justicia
  alternative_spanish_readings:
  - tu rectitud
  - tu justicia vindicadora
  rationale: El contexto del salmo es de vindicación del justo frente a acusadores. “Justicia” preserva tanto la rectitud moral de Dios como su acto justo de vindicar, sin reducir el término a una sola faceta.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; mantener la amplitud semántica de δικαιοσύνη/justicia-rectitud cuando el contexto es de vindicación.'
translation_notes:
  revision_awareness: 'El auditorio inglés pasó por varias revisiones: de “declare” a “meditate on” para reflejar mejor תהגה, con énfasis en la claridad de las dos cláusulas. La versión española sigue ese último estado, pero preserva la ambigüedad verbal propia del hebreo y evita convertir el verso en una mera proclamación lineal. También conserva la paralelidad hebrea con dos objetos coordinados y el marco temporal final.'
  spanish_consistency_notes:
  - Se usa “Yahvé” en el proyecto, pero en este versículo no aparece el tetragrámaton explícito; la referencia divina queda implícita por el contexto del salmo y por los posesivos “tu”.
  - “Lengua” se mantiene como metonimia de habla, no como órgano físico aislado.
  - “Justicia” se eligió como opción principal para conservar el eje vindicador del término hebreo; se deja nota para “rectitud” como alternativa legítima.
  - “Alabanza” se usa en sentido de contenido verbal dirigido a Dios, coherente con la poesía hebrea del versículo.
