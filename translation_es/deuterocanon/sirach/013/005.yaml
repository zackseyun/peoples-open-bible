  rationale: Se hizo una reparación menor de estilo y precisión idiomática. «Te hablará con amabilidad» comunica mejor el sentido de palabras agradables o interesadas del hebreo que «hablará amablemente contigo». «Sin que le duela» suena más natural en español y refleja con más claridad que el agresor no siente ninguna pena por despojarte. Se conserva sin cambios la nota sobre el paralelo griego, ya que está correctamente anclada y formulada.
