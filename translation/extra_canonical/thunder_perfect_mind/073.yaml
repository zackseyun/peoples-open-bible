  from: I am my form, and your name.
  to: I am the honored one, and the one who is praised.
  rationale: The draft completely misidentifies the vocabulary here. ⲧⲁⲉⲓⲏⲟⲩ is not
    'form'; it is the qualitative of ⲧⲁⲉⲓⲟ ('to honor'), so ⲧ-ⲉⲧ-ⲧⲁⲉⲓⲏⲟⲩ means 'the
    one who is honored.' ⲥⲙⲟⲩ does not mean 'name' (which is ⲣⲁⲛ); it means 'to praise'
    or 'to bless.' ⲧ-ⲉⲧ-ⲟⲩ-ⲥⲙⲟⲩ means 'the one whom they praise' or 'the one who is
    praised.' This restores a classic paradoxical pairing typical of Thunder.
- timestamp: '2026-04-22T23:01:48Z'
