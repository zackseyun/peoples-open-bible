translation:
  language: es
  text: Él ha confirmado[a] sus palabras que habló contra nosotros y contra nuestros jueces que nos juzgaron[b], al traer sobre nosotros un gran desastre, como no se había hecho bajo todo el cielo, tal como se hizo en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ha establecido’, ‘ha cumplido’ o ‘ha llevado a cabo’. El hebreo de קום con ‘palabras’ expresa que las hizo quedar firmes y efectivas.
    reason: lexical_alternative
  - marker: b
    text: O ‘nuestros gobernantes que nos gobernaron’ o ‘nuestros líderes que nos gobernaron’. El hebreo de שפט puede referirse más ampliamente a autoridades de gobierno, no solo a jueces de tribunal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֶם
  english_pob_choice: has confirmed
  chosen_spanish: ha confirmado
  alternatives_spanish:
  - ha establecido
  - ha cumplido
  - ha hecho cumplir
  lexicon: HALOT
  rationale: En este contexto judicial, el hifil de קום con ‘palabras’ expresa que Dios hizo firme lo que había dicho; ‘ha confirmado’ conserva esa fuerza sin perder naturalidad en español.
- source_word: דבריו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su palabra
  - lo que dijo
  lexicon: HALOT
  rationale: El hebreo tiene plural con sufijo de tercera persona; ‘sus palabras’ respeta esa forma mejor que un singular genérico.
- source_word: דִּבֶּר עָלֵינוּ
  english_pob_choice: he spoke against us
  chosen_spanish: habló contra nosotros
  alternatives_spanish:
  - habló acerca de nosotros
  - pronunció juicio contra nosotros
  lexicon: HALOT
  rationale: La combinación דבר + על en este marco de juicio tiene fuerza adversativa; ‘contra nosotros’ reproduce esa orientación.
- source_word: שֹׁפְטֵינוּ אֲשֶׁר שְׁפָטוּנוּ
  english_pob_choice: our judges who judged us
  chosen_spanish: nuestros jueces[b]
  alternatives_spanish:
  - nuestros gobernantes[b]
  - nuestros líderes[b]
  - nuestros jueces que nos juzgaron[b]
  lexicon: HALOT
  rationale: ‘Jueces’ preserva la repetición léxica de שפט. Como en el audit trail inglés, el término puede abarcar autoridades gobernantes más allá del tribunal, por eso se documenta la alternativa en nota.
- source_word: לְהָבִיא עָלֵינוּ
  english_pob_choice: by bringing upon us
  chosen_spanish: al traer sobre nosotros
  alternatives_spanish:
  - para traer sobre nosotros
  - trayendo sobre nosotros
  lexicon: HALOT
  rationale: El infinitivo expresa medio o resultado de la confirmación divina; ‘al traer sobre nosotros’ comunica ese valor de manera natural en español.
- source_word: רָעָה גְדֹלָה
  english_pob_choice: a great disaster
  chosen_spanish: un gran desastre
  alternatives_spanish:
  - un gran mal
  - una gran calamidad
  lexicon: HALOT
  rationale: En contextos de juicio, רָעָה suele significar calamidad o desastre más que mal moral. ‘Gran desastre’ es claro y fiel al contexto.
- source_word: אֲשֶׁר לֹא נֶעֶשְׂתָה
  english_pob_choice: such as had not been done
  chosen_spanish: como no se había hecho
  alternatives_spanish:
  - que no se había hecho
  - tal como no se había hecho
  lexicon: HALOT
  rationale: La cláusula relativa compara la singularidad del desastre; ‘como no se había hecho’ preserva el valor comparativo con un español fluido.
- source_word: תַּחַת כָּל הַשָּׁמַיִם
  english_pob_choice: under all heaven
  chosen_spanish: bajo todo el cielo
  alternatives_spanish:
  - bajo el cielo entero
  - debajo de todo el cielo
  lexicon: HALOT
  rationale: Es un modismo hebreo para el ámbito de toda la tierra. ‘Bajo todo el cielo’ mantiene la imagen y resulta natural en español.
- source_word: כַּאֲשֶׁר נֶעֶשְׂתָה בִּירוּשָׁלָם
  english_pob_choice: as it was done in Jerusalem
  chosen_spanish: tal como se hizo en Jerusalén
  alternatives_spanish:
  - como se hizo en Jerusalén
  - tal como sucedió en Jerusalén
  lexicon: HALOT
  rationale: La forma pasiva femenina retoma ‘el desastre’; ‘se hizo’ conserva la pasiva sin sobreexplicar el sujeto implícito.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: The implied subject is God, continuing from the surrounding prayer context.
  chosen_spanish_reading: El sujeto implícito queda reflejado con ‘Él’ al inicio, en continuidad con la oración del contexto.
  alternative_spanish_readings:
  - Dios ha confirmado sus palabras...
  - Ha confirmado sus palabras...
  rationale: El contexto de la oración de Daniel identifica al autor de la acción como Dios. En español, un pronombre inicial ayuda a la legibilidad sin introducir indebidamente el nombre en el texto base.
  doctrine_reference: Daniel 9:4-14; coherencia contextual de la oración
- issue: Alcance de ‘jueces’
  english_pob_reading: The Hebrew terms for 'judges' can refer more broadly to governing authorities, not only courtroom judges.
  chosen_spanish_reading: ‘jueces’ se conserva en el texto, con nota sobre su posible alcance más amplio.
  alternative_spanish_readings:
  - gobernantes
  - líderes
  - autoridades
  rationale: La repetición de la raíz שפט merece mantenerse. La nota preserva la tensión léxica y evita reducir el término a un sentido exclusivamente judicial.
  doctrine_reference: Uso semántico de שפט en contextos de gobierno y juicio
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés aprobado: conserva el valor de confirmación/ejecución de las palabras, el matiz adversativo de ‘contra nosotros’, la amplitud semántica de שפט y la construcción comparativa final. No se detectaron revisiones posteriores que alteren esta base.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ no porque aparezca explícito en este versículo, sino por la norma del proyecto; aquí el sujeto queda pronominal como en el texto base.
  - ‘Desastre’ se prefirió a ‘mal’ o ‘calamidad’ por claridad contemporánea sin perder el valor de juicio.
  - ‘Bajo todo el cielo’ conserva el modismo hebreo y mantiene el registro bíblico sin arcaísmo excesivo.
