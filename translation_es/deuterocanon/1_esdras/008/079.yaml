base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/079.yaml
  text: And now what shall we say[a], Lord, having these things? They have transgressed your commandments[b], which you gave by the hand of your servants the prophets.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'through your servants the prophets.' The Greek reads 'by the hand of,' a standard biblical expression for mediated delivery.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'having these things' is compressed in Greek and likely refers back to the favors or circumstances just mentioned in the surrounding prayer.
    reason: lexical_alternative
