base_translation:
  language: en
  yaml_path: translation/ot/2_kings/004/029.yaml
  text: Then he said to Gehazi[a], “Tuck up your garment, take my staff in your hand, and go. If you meet anyone, do not greet him; and if anyone greets you, do not answer him[c][b]. Place my staff on the boy’s face.”
  footnotes:
  - marker: a
    text: Hebrew literally, 'Gird up your loins,' an idiom for preparing quickly for action.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not bless him' / 'if anyone blesses you'; here the verb likely refers to exchanging greetings on the road.
    reason: lexical_alternative
  - marker: c
    text: '''Anyone'' renders Hebrew ''man'' with generic force in this context.'
    reason: lexical_alternative
