review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura exhortativa del hebreo: tres imperativos coordinados, con el objeto directo humano de פְתָאִים conservado y una nota que explica la alternativa contextual. Sin embargo, hay un problema importante de concordancia/pronombre verbal: el hebreo usa imperativos plurales en toda la línea, mientras que el español mezcla singular (''Deja'', ''vive'', ''anda'').'
  spanish_quality_summary: El español es claro y legible, pero la mezcla de singular con un original plural debilita la fidelidad formal y produce incoherencia interna. Además, 'inteligencia' para בִּינָה es comprensible, pero en español bíblico y sapiencial 'entendimiento' o 'discernimiento' suena más natural que 'inteligencia', que puede sugerir capacidad intelectual general. 'Anden por el camino del entendimiento' mejora tanto la naturalidad como el registro.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de mantener 'simples' es defendible y está bien documentada con nota. Conviene ajustar בִּינָה de 'inteligencia' a 'entendimiento' para alinearlo mejor con la racionalidad sapiencial documentada por el inglés ('understanding').
  issues:
  - severity: high
    issue: Los imperativos están en singular en vez de plural.
    rationale: עִזְבוּ, וִחְיוּ y וְאִשְׁרוּ son todos 2mp. 'Deja... vive... anda' cambia el destinatario y no preserva la morfología ni la cohesión del verso.
  - severity: medium
    issue: '''Inteligencia'' no es la mejor opción para בִּינָה en este contexto.'
    rationale: Aunque posible, en español suena más a facultad mental general. 'Entendimiento' conserva mejor la resonancia sapiencial y corresponde más de cerca a 'understanding' del POB.
  - severity: low
    issue: La nota al pie es útil, pero el texto de la nota puede simplificarse levemente.
    rationale: La explicación actual es correcta; solo conviene mantenerla fluida y centrada en la posible mala interpretación de abandonar a otras personas.
  revised_spanish_text: Dejen a los simples[a], y vivan; y anden por el camino del entendimiento.
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Dejen a los simples». En el contexto sapiencial, la exhortación puede referirse a dejar atrás la simpleza o la compañía/condición de los simples; por eso el español conserva el objeto humano directo del hebreo.'
    reason: lexical_alternative
  revision_rationale: Se corrigen los tres imperativos al plural para reflejar fielmente el hebreo. Se cambia 'inteligencia' por 'entendimiento' para una equivalencia sapiencial más natural y más cercana a בינה/understanding. Se conserva 'a los simples' con nota porque reproduce el objeto directo del hebreo sin introducir 'caminos' o 'maneras' en el texto principal.
