revisions:
- from: Y si un buey[a] cornea a un hombre o a una mujer, y muere, el buey será apedreado sin falta, y no se comerá su carne; pero el dueño del buey queda libre.
  to: Y si un buey[a] cornea a un hombre o a una mujer y la mata, el buey ciertamente será apedreado, y no se comerá su carne; pero el dueño del buey queda libre.[b]
  rationale: Se hizo una reparación menor para mejorar la claridad referencial del resultado sobre la víctima humana y para dar una intensificación más natural al mandato legal. Además, se añadió la nota del valor jurídico de נָקִי, preservando una alternativa que el inglés POB documenta y que conviene mantener en español.
