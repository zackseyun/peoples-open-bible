translation:
  language: es
  text: Y recibió la señal de la circuncisión como sello de la justicia de la fe que tenía mientras estaba incircunciso[a], para que fuera padre de todos los que creen mientras están incircuncisos, para que también a ellos se les contara la justicia[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud» para δικαιοσύνη aquí y más adelante en el versículo.
    reason: lexical_alternative
  - marker: b
    text: Lit. «en incircuncisión»; es decir, mientras estaba incircunciso.
    reason: lexical_alternative
  - marker: c
    text: O «les fuera acreditada» o «les fuera contada».
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - marca
  lexicon: BDAG
  rationale: En este contexto de pacto, «señal» comunica bien el valor visible y testimonial de la circuncisión sin sonar técnico ni sacramentalizado.
- source_word: περιτομή
  english_pob_choice: circumcision
  chosen_spanish: circuncisión
  alternatives_spanish:
  - circuncisión ritual
  lexicon: BDAG
  rationale: Es el equivalente estándar y preciso para el rito al que Pablo alude.
- source_word: σφραγίς
  english_pob_choice: seal
  chosen_spanish: sello
  alternatives_spanish:
  - confirmación
  - certificación
  lexicon: BDAG
  rationale: «Sello» preserva la metáfora de autenticación/ratificación asociada a la señal de la circuncisión.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: BDAG
  rationale: En Romanos, δικαιοσύνη puede traducirse con fidelidad como «justicia»; en español bíblico es una opción natural y doctrinalmente válida. Se mantiene además la alternativa de «justicia»/«rectitud» en nota por la tensión léxica documentada.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: La cadena genitiva apunta a la justicia vinculada con la fe; «fe» es la opción principal y más natural en español.
- source_word: ἐν τῇ ἀκροβυστίᾳ
  english_pob_choice: while uncircumcised
  chosen_spanish: mientras estaba incircunciso
  alternatives_spanish:
  - en la incircuncisión
  - siendo incircunciso
  lexicon: BDAG
  rationale: La frase expresa el estado de Abraham cuando poseía esa fe; «mientras estaba incircunciso» comunica con claridad el valor temporal y de estado, evitando el calco duro «en incircuncisión».
- source_word: πατέρα πάντων τῶν πιστευόντων
  english_pob_choice: the father of all who believe
  chosen_spanish: padre de todos los que creen
  alternatives_spanish:
  - padre de todos los creyentes
  lexicon: BDAG
  rationale: «Los que creen» mantiene el participio como acción/condición viva y evita convertirlo en un sustantivo que suena menos explícito en el argumento paulino.
- source_word: δι’ ἀκροβυστίας
  english_pob_choice: while uncircumcised
  chosen_spanish: mientras están incircuncisos
  alternatives_spanish:
  - en incircuncisión
  - por incircuncisión
  lexicon: BDAG
  rationale: Aquí διά con genitivo expresa la condición en la que creen, no instrumento; la lectura temporal/estativa se entiende mejor con «mientras están incircuncisos».
- source_word: λογίζομαι
  english_pob_choice: counted
  chosen_spanish: se les contara
  alternatives_spanish:
  - se les acreditara
  - se les imputara
  - se les considerara
  lexicon: BDAG
  rationale: «Contar» conserva el valor contable/imputativo de λογίζομαι en un español claro y menos técnico que «imputar»; el dativo se expresa con naturalidad en pasiva impersonal.
- source_word: καί
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: BDAG
  rationale: «También» hace explícita la inclusión de los incircuncisos en la misma justicia contada, en línea con el argumento de Pablo.
theological_decisions:
- issue: Relación entre circuncisión y justicia por la fe
  english_pob_reading: Circumcision is rendered as a sign and seal of righteousness received by faith, not as the means of obtaining that righteousness.
  chosen_spanish_reading: La circuncisión se presenta como señal y sello de la justicia ligada a la fe ya existente en la incircuncisión, no como medio para obtener esa justicia.
  alternative_spanish_readings:
  - La circuncisión podría sonar como si transmitiera la justicia.
  - La justicia podría entenderse como consecuencia directa del rito.
  rationale: El griego coloca la circuncisión después de la justicia asociada con la fe en el estado de incircuncisión. La traducción preserva ese orden y evita sugerir una lectura sacramental o causal que el texto no exige.
  doctrine_reference: Romanos 4:9-12; Romanos 3:28; Gálatas 3:6-9
translation_notes:
  revision_awareness: El borrador sigue el sentido y las decisiones léxicas del texto fuente griego y del audit trail inglés. No se detectaron revisiones aplicadas en el registro inglés más reciente; por ello se mantiene una redacción estable, con ajustes normales para naturalidad del español y para preservar la tensión lexical δικαιοσύνη / λογίζομαι.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - «Justicia» se mantiene como renderización principal de δικαιοσύνη, con nota de alternativa «rectitud»/«justicia» según el contexto paulino.
  - «Fe» se usa para πίστις; no se ha sustituido por «fidelidad» porque la construcción enfatiza la fe de Abraham y de los creyentes.
  - «Incircunciso/incircuncisos» se emplea para conservar el estado descrito por ἐν τῇ ἀκροβυστίᾳ y δι’ ἀκροβυστίας sin introducir un giro explicativo excesivo.
