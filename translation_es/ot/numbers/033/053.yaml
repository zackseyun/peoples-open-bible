translation:
  language: es
  text: Ustedes tomarán posesión de la tierra y habitarán en ella[a], porque yo les he dado la tierra para poseerla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «heredarla». El verbo hebreo ירשׁ puede expresar tanto heredar como tomar posesión, especialmente en contextos de promesa de tierra del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹרַשְׁתֶּם
  english_pob_choice: you shall dispossess
  chosen_spanish: despojarán
  alternatives_spanish:
  - tomarán posesión de
  - expulsarán y poseerán
  - heredarán
  lexicon: HALOT
  rationale: El verbo hifil de ירשׁ en este contexto expresa quitar a otros para ocupar la tierra. En español, «despojarán» conserva esa fuerza de desalojar/desposeer sin suavizarla a una simple idea de herencia. «Tomarán posesión de» sería posible, pero atenúa el matiz causativo de expulsión implícito en el verbo.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: «La tierra» es la forma natural y bíblicamente adecuada para la tierra prometida. «Territorio» es más técnico y «país» suena menos ligado al lenguaje de promesa del pacto.
- source_word: וִישַׁבְתֶּם בָּהּ
  english_pob_choice: and dwell in it
  chosen_spanish: y habitarán en ella
  alternatives_spanish:
  - y vivirán en ella
  - y se establecerán en ella
  - y morarán en ella
  lexicon: HALOT
  rationale: ישׁב puede significar habitar, residir o asentarse. «Habitarán» mantiene el registro formal y el sentido de residencia estable. «Vivirán» es natural, pero menos preciso para el matiz de asentamiento; «morarán» es viable, aunque más tradicional.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» conserva la causalidad de forma clara y directa en español.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: HALOT
  rationale: El dativo destinatario en español se integra naturalmente con «les he dado». «A ustedes» sería explícito, pero menos fluido; «para ustedes» enfatiza beneficio, aunque el hebreo marca destinatarios de la dádiva.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: les he dado
  alternatives_spanish:
  - les di
  - les doy
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como realizada con vigencia actual. El pretérito perfecto compuesto español («les he dado») reproduce mejor ese valor que el simple «les di» o el presente.
- source_word: לָרֶשֶׁת אֹתָהּ
  english_pob_choice: to possess it
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para heredarla
  - para tomar posesión de ella
  lexicon: HALOT
  rationale: El infinitivo de ירשׁ expresa finalidad y puede significar poseer o heredar. «Poseerla» es conciso y conserva la idea de ocupación efectiva. «Heredarla» es una alternativa válida, pero podría desplazar el énfasis hacia la sucesión patrimonial más que hacia la posesión de la tierra.
theological_decisions:
- issue: Valor de ירשׁ en contexto de promesa de tierra
  english_pob_reading: possess / dispossess
  chosen_spanish_reading: despojarán / poseerla
  alternative_spanish_readings:
  - heredarán / heredarla
  - tomarán posesión de / tomar posesión de ella
  rationale: El pasaje une el desalojo de los ocupantes con la ocupación efectiva de la tierra dada por Dios. En español, «despojarán» mantiene el componente de desalojar, y «poseerla» conserva el resultado prometido. Se preserva así la tensión entre expulsión e herencia sin reducirla a una sola imagen.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió el valor de וְהוֹרַשְׁתֶּם hacia «dispossess» y elevó «dwell» a un registro más formal. Esta versión española refleja esa decisión con «despojarán» y «habitarán», manteniendo además el aspecto perfecto de נָתַתִּי con «les he dado».
  spanish_consistency_notes:
  - Se conserva «tierra» como término de la promesa territorial, coherente con el uso bíblico de אֶרֶץ.
  - Se evita «Cristo», «SEÑOR» u այլ masking conventions porque no aparecen en el texto fuente.
  - La nota de pie de página preserva la alternativa semántica de ירשׁ sin desplazar el sentido principal del mandato.
