translation:
  language: es
  text: Ahora, Elí tenía noventa y ocho años[a], y sus ojos estaban fijos, de modo que no podía ver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus ojos estaban puestos/fijos’; el hebreo describe la condición de sus ojos de una manera que implica ceguera.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן תִּשְׁעִים וּשְׁמֹנֶה שָׁנָה
  english_pob_choice: was ninety-eight years old
  chosen_spanish: tenía noventa y ocho años
  alternatives_spanish:
  - era un hijo de noventa y ocho años
  - tenía noventa y ocho años de edad
  lexicon: HALOT
  rationale: El hebreo usa el idiomático ‘hijo de X años’ para indicar edad; en español, ‘tener X años’ expresa con naturalidad la misma idea sin perder el sentido original.
- source_word: וְעֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de él
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo posesivo se vierte de manera directa como ‘sus ojos’.
- source_word: קָמָה
  english_pob_choice: were fixed
  chosen_spanish: estaban fijos
  alternatives_spanish:
  - estaban puestos
  - estaban endurecidos
  - estaban rígidos
  lexicon: HALOT
  rationale: La POB inglesa conserva la imagen concreta de una condición ocular ‘fija’ o ‘estirada’. ‘Estaban fijos’ mantiene esa fuerza descriptiva mejor que ‘estaban débiles’ o ‘estaban ciegos’, que ya interpretan el efecto.
- source_word: וְלֹא יָכֹל לִרְאוֹת
  english_pob_choice: so that he could not see
  chosen_spanish: de modo que no podía ver
  alternatives_spanish:
  - y no podía ver
  - así que no podía ver
  - de manera que no podía ver
  lexicon: HALOT
  rationale: La cláusula expresa resultado. ‘De modo que’ hace explícita la relación causal/resultativa que la POB inglesa también señaló con ‘so that’, sin añadir información nueva.
- source_word: וְ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: HALOT
  rationale: En español narrativo, el waw inicial puede conservarse como simple enlace. Aquí ‘Y’ sigue la secuencia del relato con naturalidad; ‘Ahora’ sería más interpretativo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantuvo sin cambios la decisión de traducir קָמָה con la imagen de ‘fixed’ y de expresar el resultado con ‘so that’. La versión española preserva esa misma equivalencia óptima y no introduce ajustes textuales ni teológicos adicionales.
  spanish_consistency_notes:
  - Se conserva ‘Y Elí’ para reflejar el enlace narrativo del hebreo, en lugar de convertirlo en un adverbio más interpretativo.
  - ‘Estaban fijos’ mantiene la tensión lexical entre una descripción física concreta y la implicación de ceguera, conforme a la nota alternativa.
  - No se usa ‘ciego’ en el texto principal porque el hebreo describe la condición de los ojos y el resultado visual, no emplea el adjetivo directo.
