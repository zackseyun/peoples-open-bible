translation:
  language: es
  text: Los hijos de extranjeros se marchitan y salen temblando de sus fortalezas[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hijos de forasteros» o, simplemente, «extranjeros». El hebreo dice literalmente «hijos de extranjería/extranjero».'
    reason: lexical_alternative
  - marker: b
    text: El verbo vertido «salen temblando» es raro e incierto; también podría entenderse como «salen encogidos» o «salen cojeando».
    reason: lexical_alternative
  - marker: c
    text: «Fortalezas» también puede traducirse «fortines» o, de manera más general, «recintos».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי נֵכָר
  english_pob_choice: The sons of foreigners
  chosen_spanish: Los hijos de extranjeros
  alternatives_spanish:
  - los hijos de forasteros
  - los extranjeros
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo de filiación ('hijos de') y el matiz de extranjería con 'extranjeros'. 'Forasteros' sería posible, pero 'extranjeros' comunica mejor la idea de pertenencia ajena en español bíblico contemporáneo sin perder la imagen poética.
- source_word: יִבֹּלוּ
  english_pob_choice: fade away
  chosen_spanish: se desvanecen
  alternatives_spanish:
  - se marchitan
  - se consumen
  - se desvanecen
  lexicon: HALOT
  rationale: El verbo נבל en qal expresa la idea de marchitarse, desvanecerse o languidecer. 'Se desvanecen' mantiene la pérdida de vigor de modo natural en español y no introduce indebidamente el matiz de temor que pertenece al verbo siguiente.
- source_word: וְיַחְרְגוּ
  english_pob_choice: come trembling out
  chosen_spanish: salen temblando
  alternatives_spanish:
  - salen encogidos
  - salen cohibidos
  - salen jadeando
  lexicon: HALOT
  rationale: El verbo es raro y de sentido incierto. En este contexto poético-militar, la imagen más segura es la de salir con temblor o agitación; 'salen temblando' preserva esa incertidumbre sin fijar demasiado el matiz.
- source_word: מִמִּסְגְּרֹתֵיהֶם
  english_pob_choice: out of their strongholds
  chosen_spanish: de sus fortalezas
  alternatives_spanish:
  - de sus fortificaciones
  - de sus enclosures
  - de sus refugios
  lexicon: HALOT
  rationale: מִסְגְּרוֹת puede denotar lugares de cierre o confinamiento, pero en este marco de derrota enemiga encaja mejor la idea de bastiones defensivos. 'Fortalezas' es claro y conserva la imagen militar; 'fortificaciones' también sería posible, pero resulta menos idiomático en español de este verso.
translation_notes:
  revision_awareness: El borrador inglés más reciente corrigió una formulación menos natural para mantener la construcción explícita 'sons of foreigners'; el español sigue esa decisión con 'Los hijos de extranjeros', conservando además el paralelismo poético y las tres zonas de incertidumbre léxica señaladas en el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'extranjeros' para נֵכָר, evitando reemplazarlo por 'forasteros' o 'gentiles' sin base contextual explícita.
  - Se traduce el movimiento final con 'salen temblando' para no fusionar el matiz de temor con el de decadencia del primer verbo.
  - '''Fortalezas'' conserva el campo semántico militar del inglés POB y es natural en español para un contexto de derrota y refugio defensivo.'
