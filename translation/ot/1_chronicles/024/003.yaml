id: 1CH.24.3
reference: 1 Chronicles 24:3
source:
  edition: WLC
  text: וַ/יֶּֽחָלְקֵ֣/ם דָּוִ֔יד וְ/צָדוֹק֙ מִן בְּנֵ֣י אֶלְעָזָ֔ר וַ/אֲחִימֶ֖לֶךְ מִן בְּנֵ֣י אִיתָמָ֑ר לִ/פְקֻדָּתָ֖/ם בַּ/עֲבֹדָתָֽ/ם־־׃
translation:
  text: David[a], with Zadok from the sons of Eleazar and Ahimelech from the sons of Ithamar, divided them according to their appointment in their service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divided them for their assigned duties in their service.' The Hebrew phrase combines ideas of appointment, oversight, or ordered assignment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחָלְקֵם
  chosen: divided them
  alternatives:
  - apportioned them
  - organized them into divisions
  lexicon: HALOT
  rationale: The verb from חלק with 3mp suffix most directly means 'he divided them.' In context of priestly courses, 'organized them into divisions' captures the sense, but 'divided them' stays closer to the Hebrew while remaining clear.
- source_word: וְצָדוֹק
  chosen: along with Zadok
  alternatives:
  - and Zadok
  lexicon: HALOT
  rationale: The conjunction is simply 'and'; 'along with' smooths the English by showing Zadok's participation with David without changing the sense.
- source_word: מִן בְּנֵי אֶלְעָזָר
  chosen: from the sons of Eleazar
  alternatives:
  - from among the sons of Eleazar
  - representing the sons of Eleazar
  lexicon: HALOT
  rationale: 'מן plus ''sons of'' naturally indicates source/origin: Zadok is identified as being from Eleazar''s line. ''From the sons of'' is a transparent rendering.'
- source_word: וַאֲחִימֶלֶךְ
  chosen: and Ahimelech
  lexicon: HALOT
  rationale: Proper name, transliterated by standard English convention in keeping with the translation philosophy.
- source_word: מִן בְּנֵי אִיתָמָר
  chosen: from the sons of Ithamar
  alternatives:
  - from among the sons of Ithamar
  - representing the sons of Ithamar
  lexicon: HALOT
  rationale: Parallel to the previous phrase; it identifies Ahimelech with the Ithamarite priestly line.
- source_word: לִפְקֻדָּתָם
  chosen: according to their appointment
  alternatives:
  - according to their office
  - by their oversight
  - for their ordering
  lexicon: HALOT
  rationale: פקדה can denote oversight, appointment, office, or assigned order. In this administrative context of priestly divisions, 'according to their appointment' best conveys an assigned ordering without overinterpreting the exact institutional nuance.
- source_word: בַּעֲבֹדָתָם
  chosen: in their service
  alternatives:
  - for their service
  - in their ministry
  lexicon: HALOT
  rationale: עבודה is service/work, here specifically priestly service. 'In their service' is natural English and preserves the cultic-administrative sense; 'ministry' is possible but slightly more interpretive.
