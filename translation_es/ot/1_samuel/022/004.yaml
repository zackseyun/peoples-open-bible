translation:
  language: es
  text: Él los llevó[a] ante el rey de Moab, y se quedaron con él todos los días que David estuvo en la fortaleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los condujo ante el rey de Moab». El verbo hebreo puede expresar tanto llevar como conducir a alguien ante otra persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנְחֵם
  english_pob_choice: He brought them
  chosen_spanish: Él los llevó
  alternatives_spanish:
  - Él los trajo
  - Él los condujo
  - Él los puso
  lexicon: HALOT
  rationale: El verbo puede expresar llevar o conducir a alguien hasta la presencia de otra persona. «Los llevó» comunica con naturalidad el movimiento hacia el rey de Moab sin perder la dirección relacional del hebreo.
- source_word: אֶת פְּנֵי מֶלֶךְ מוֹאָב
  english_pob_choice: before the king of Moab
  chosen_spanish: ante el rey de Moab
  alternatives_spanish:
  - delante del rey de Moab
  - en la presencia del rey de Moab
  lexicon: HALOT
  rationale: La expresión idiomática hebrea con פְּנֵי indica comparecer ante alguien. «Ante» conserva la idea de presencia y audiencia pública de forma natural en español.
- source_word: וַיֵּשְׁב֣וּ עִמּוֹ
  english_pob_choice: they stayed with him
  chosen_spanish: se quedaron con él
  alternatives_spanish:
  - vivieron con él
  - habitaron con él
  - permanecieron con él
  lexicon: HALOT
  rationale: ישב en este contexto narra residencia continuada. «Se quedaron con él» es idiomático y mantiene la idea de estancia prolongada sin sonar arcaico.
- source_word: כָּל יְמֵי הֱיוֹת
  english_pob_choice: all the days that
  chosen_spanish: todos los días que
  alternatives_spanish:
  - durante todos los días que
  - todo el tiempo que
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte con una fórmula española directa que conserva el valor de duración total del período señalado.
- source_word: הֱיוֹת דָּוִד
  english_pob_choice: David was
  chosen_spanish: David estuvo
  alternatives_spanish:
  - David estaba
  - David fue
  lexicon: HALOT
  rationale: El infinitivo de היה funciona temporalmente; en español, «estuvo» expresa la permanencia localizada en la fortaleza de modo natural y fiel.
- source_word: בַּמְּצוּדָה
  english_pob_choice: in the stronghold
  chosen_spanish: en la fortaleza
  alternatives_spanish:
  - en el baluarte
  - en la ciudadela
  - en el refugio fortificado
  lexicon: HALOT
  rationale: מְצוּדָה designa un lugar fortificado/refugio. «Fortaleza» comunica bien el sentido de enclave defensivo en este relato de David. Mantiene el término narrativo sin exagerar una equivalencia técnica.
translation_notes:
  revision_awareness: La versión coincide con el pasaje hebreo y con el audit trail inglés en sentido y estructura; se mantuvo la equivalencia óptima sin añadir matices no atestiguados. No se detectaron revisiones aplicadas en el inglés auditado.
  spanish_consistency_notes:
  - Se evitó «Señor» y cualquier sustitución teológica no presente en el texto.
  - «Ante» conserva la fuerza relacional de la expresión hebrea sin calco rígido.
  - «Se quedaron» respeta el valor durativo de וַיֵּשְׁבוּ en narrativa española.
  - «Fortaleza» mantiene la imagen de lugar defendido y es coherente con el uso narrativo de מְצוּדָה.
