translation:
  language: es
  text: 'Y dijo: «Si Aram es demasiado fuerte para mí[a], entonces tú serás mi salvación[b]; pero si los amonitas son demasiado fuertes para ti, entonces yo te salvaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Si Aram es más fuerte que yo ... y si los hijos de Amón son más fuertes que tú».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «serás para mí para salvación», una expresión idiomática de auxilio o liberación en batalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces él dijo
  - Y dijo
  lexicon: WLC/HALOT
  rationale: La narración hebrea usa wayyiqtol simple; en español, «Y él dijo» conserva el enlace narrativo sin sobrecargar el texto. Se mantiene el sujeto explícito para claridad.
- source_word: תֶּחֱזַק / יֶחֶזְקוּ (חזק)
  english_pob_choice: is too strong / are too strong
  chosen_spanish: es demasiado fuerte / son demasiado fuertes
  alternatives_spanish:
  - es más fuerte que mí / son más fuertes que ti
  - me supera / te superan
  lexicon: HALOT
  rationale: En este contexto militar, חזק expresa superioridad de fuerza. «Demasiado fuerte» reproduce bien el valor comparativo sin sonar forzado en español y conserva la idea de prevalecer en combate.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se translitera el nombre propio como «Aram», siguiendo la decisión del POB en inglés y evitando el rótulo geopolítico posterior «Siria», que sería menos exacto para el hebreo aquí.
- source_word: וְהָיִיתָ לִּי לִתְשׁוּעָה
  english_pob_choice: you shall be my salvation
  chosen_spanish: serás mi salvación
  alternatives_spanish:
  - serás para mí salvación
  - serás mi rescate
  - me rescatarás
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «serás para mí para salvación/deliverancia». En español, «serás mi salvación» mantiene la forma idiomática y la fuerza de compromiso sin perder el sentido de auxilio militar. Se conserva «salvación» porque el POB inglés decidió reflejar más de cerca תְּשׁוּעָה en esta revisión.
- source_word: תְּשׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - rescate
  - liberación
  - ayuda
  lexicon: HALOT
  rationale: Aunque el contexto es bélico, el sustantivo hebreo admite tanto rescate concreto como salvación. El POB en inglés optó por «salvation» en la revisión; en español, «salvación» preserva esa elección y su carga semántica más amplia.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: «Hijos de Amón» reproduce con fidelidad la construcción hebrea בְּנֵי עַמּוֹן y evita reemplazarla automáticamente por el etnónimo tradicional. Se mantiene una forma más cercana al original, dado el criterio de trabajo basado en la fuente.
- source_word: וְהוֹשַׁעְתִּיךָ
  english_pob_choice: I will save you
  chosen_spanish: yo te salvaré
  alternatives_spanish:
  - yo te rescataré
  - yo te libraré
  - yo te ayudaré
  lexicon: HALOT
  rationale: El hifil de ישע significa salvar/deliverar. «Yo te salvaré» sigue de cerca el sentido del verbo y armoniza con «salvación» en la cláusula anterior, sin introducir una paráfrasis más amplia que el hebreo no exige.
theological_decisions:
- issue: Valor de תְּשׁוּעָה en contexto bélico frente a su resonancia teológica general
  english_pob_reading: you shall be my salvation
  chosen_spanish_reading: serás mi salvación
  alternative_spanish_readings:
  - serás mi rescate
  - serás mi liberación
  rationale: Aunque el escenario es militar, la versión inglesa revisada decidió conservar «salvation» en vez de «rescue». El español sigue esa decisión para mantener la tensión semántica entre auxilio concreto y término más amplio, sin despojar al sustantivo de su alcance habitual.
  doctrine_reference: Uso léxico de תְּשׁוּעָה en literatura histórica; sin implicación doctrinal directa
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió de «come to my rescue / rescue» a «be my salvation / save» para reflejar más de cerca לִתְשׁוּעָה y mantener consistencia léxica con וְהוֹשַׁעְתִּיךָ. Esta propuesta española sigue esa revisión, pero conserva la naturalidad idiomática propia del español.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, pero con sintaxis moderna.
  - Se preservó la distinción entre el nombre propio Aram y el grupo étnico/político de Amón.
  - No se sustituyó «salvación» por «rescate» en el cuerpo del texto para respetar la revisión auditada del POB inglés.
  - Las notas usan marcadores únicos y se anclan solo donde aportan una alternativa significativa.
