  glossary_alignment: Correcto en el uso de «Yahvé» para יְהוָה y «Dios» para אֱלֹהַי. No hay conflicto con la terminología base del proyecto. El ajuste propuesto se limita a mejorar la representación de רָשַׁעְתִּי מֵאֱלֹהָי en español natural.
