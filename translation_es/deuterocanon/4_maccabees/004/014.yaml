translation:
  language: es
  text: Y el que había sido salvado inesperadamente se fue, para informar al rey de las cosas que le habían sucedido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παραδόξως
  english_pob_choice: unexpectedly
  chosen_spanish: inesperadamente
  alternatives_spanish:
  - de manera inesperada
  - sorprendentemente
  - contra toda expectativa
  lexicon: LSJ
  rationale: El adverbio expresa un hecho que ocurrió de modo sorprendente o fuera de lo esperado. «Inesperadamente» reproduce bien ese matiz en español sin introducir una valoración extra que el griego no exige.
- source_word: διασωθεὶς
  english_pob_choice: had been saved
  chosen_spanish: había sido salvado
  alternatives_spanish:
  - había escapado sano y salvo
  - había sido preservado
  lexicon: BDAG
  rationale: El participio aoristo pasivo indica que fue sacado con vida de una situación peligrosa. «Había sido salvado» conserva la pasividad y la idea de preservación o rescate, de forma clara en español.
- source_word: ᾤχετο
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  - se alejó
  lexicon: LSJ
  rationale: El imperfecto transmite la acción de irse o partir. «Se fue» es natural en español y mantiene la sencillez narrativa del pasaje.
- source_word: δηλώσων
  english_pob_choice: to report
  chosen_spanish: para informar
  alternatives_spanish:
  - para dar cuenta
  - para comunicar
  - para declarar
  lexicon: BDAG
  rationale: El participio de propósito expresa que se fue con la finalidad de dar noticia al rey. «Informar» comunica ese propósito con un tono adecuado para dirigirse a un rey.
- source_word: τῷ βασιλεῖ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al monarca
  - ante el rey
  lexicon: BDAG
  rationale: El dativo indica el destinatario de la comunicación. «Al rey» es la correspondencia directa y más transparente en español.
- source_word: τὰ συμβάντα αὐτῷ
  english_pob_choice: the things that had happened to him
  chosen_spanish: las cosas que le habían sucedido
  alternatives_spanish:
  - lo que le había ocurrido
  - los hechos que le habían acontecido
  - los sucesos que le habían sobrevenido
  lexicon: BDAG
  rationale: La construcción articular remite a los acontecimientos experimentados por él. «Las cosas que le habían sucedido» sigue de cerca la estructura griega y mantiene la claridad narrativa.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el contexto inglés; la versión española sigue de cerca la lectura auditada y conserva el matiz de sorpresa de παραδόξως y el propósito de δηλώσων sin intensificar ni atenuar el sentido.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - No se introducen notas porque el griego y el audit trail inglés no presentan variantes textuales ni ambigüedades doctrinales que requieran comentario adicional.
  - «Había sido salvado» se conserva en pasiva para reflejar con precisión el participio griego y la lógica del relato.
