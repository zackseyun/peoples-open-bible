translation:
  text: |-
    1 For look, days are coming when the books will be opened, in which the sins of all who have sinned are written, and also the storehouses in which the righteousness of all who were righteous in creation is gathered.
    2 And at that time you will see—and the many who are with you—the forbearance of the Most High that has been through all generations, how he has been patient with all who are born, both those who sin and those who are righteous.
    3 And I answered and said, “But look, Lord, no one knows the number of the things that have passed, nor of the things that are to come.
    4 For I know what has happened to us, but what will happen to our enemies I do not know, nor when you will visit your works.”
