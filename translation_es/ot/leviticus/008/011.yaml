  - severity: medium
    issue: La secuencia «esparció de ello» es poco natural
    rationale: Aunque «de ello» refleja literalmente מִמֶּנּוּ, con «esparcir» la frase queda forzada. «Roció con parte de ello» o «roció de ello» mejora la idiomaticidad; la nota puede preservar la literalidad «de él/de ello».
  - severity: low
    issue: «Batea» para הַכִּיּוֹר puede resultar opaco o regional
    rationale: Para un lector eclesial amplio, «fuente» comunica mejor el recipiente ritual de lavado del tabernáculo. «Batea» no es la opción más transparente en español neutral.
