  spanish_quality_summary: 'El español es claro y digno, pero ''se agitará'' suena algo menos natural para acción judicial divina que ''se levantará'' en el primer colon; aun así es aceptable. El principal problema de calidad es estilístico-semántico: repetir ''su tarea extraña'' pierde la intensificación y variación del paralelismo. ''Ajena'' funciona mejor en español bíblico y mantiene la diferencia sin sonar forzado.'
