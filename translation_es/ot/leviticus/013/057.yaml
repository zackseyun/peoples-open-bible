base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/057.yaml
  text: But if it appears again in the garment[a], or in the warp, or in the woof, or in any article of leather, it is a spreading outbreak[b]; you shall burn in the fire whatever has the infection in it.
  footnotes:
  - marker: a
    text: Or 'weft' for 'woof,' the crosswise threads in woven fabric.
    reason: lexical_alternative
  - marker: b
    text: Hebrew negaʿ, a technical term in Leviticus for an afflicted or contaminated spot; traditionally 'plague' or 'diseased mark.'
    reason: lexical_alternative
