base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/048/001.yaml
  text: 'Now these are the names of the tribes: from the northern extremity[a], beside the way of Hethlon to Lebo-hamath, Hazar-enan, at the border of Damascus northward beside Hamath, and extending from the east side to the sea, Dan[b], one portion.'
  footnotes:
  - marker: a
    text: Hebrew Lebo-hamath, traditionally understood as a place-name; literally, 'the entrance of Hamath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and it shall have its side from east to sea'; the Hebrew clause is compressed and describes the east-to-west extent of Dan's allotment.
    reason: alternative_reading
