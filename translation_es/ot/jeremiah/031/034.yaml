base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/034.yaml
  text: And they will no longer teach[a], each man his neighbor and each man his brother, saying, ‘Know Yahweh,’ for they will all know me, from the least of them to the greatest of them, declares Yahweh. For I will forgive their iniquity[c][b], and I will remember their sin no more.
  footnotes:
