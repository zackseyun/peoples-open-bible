review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia verbal del hebreo: oír, subir desde la casa del rey a la casa de Yahvé, y sentarse en la entrada de la puerta. También preserva correctamente יְהוָה como «Yahvé» y mantiene «casa» para בֵּית. Sin embargo, hay dos desajustes menores: la nota [b] está anclada a «subieron» pero explica una alternativa inexistente («salieron hacia arriba») y dice que aclara «palacio/casa real», aunque no lo hace; además, la capitalización de «puerta Nueva» es menos natural en español que «Puerta Nueva» si se trata como designación conocida, o «puerta nueva» si no. Dado que la nota [c] ya la trata como nombre conocido, conviene armonizar con «Puerta Nueva».'
  spanish_quality_summary: El español es claro y digno, pero la nota [b] suena forzada y poco idiomática. «Salieron hacia arriba» no es una alternativa útil en español. La frase principal es buena; una leve mejora de capitalización en «Puerta Nueva» la hace más natural y coherente con la nota cultural.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יְהוָה, «casa de Yahvé» para בֵּית יְהוָה, y «oficiales» para שָׂרֵי יְהוּדָה con nota alternativa a «príncipes». No hay conflictos teológicos relevantes. La revisión solo corrige la nota sobre וַיַּעֲלוּ y armoniza la designación de la puerta.'
  issues:
  - severity: medium
    issue: La nota [b] no corresponde bien a la decisión léxica documentada.
    rationale: El inglés auditado ofrece como alternativa relevante «from the palace» para מִבֵּית הַמֶּלֶךְ y explica «went up» como modismo de movimiento. La nota española actual propone «salieron hacia arriba», opción poco idiomática y no respaldada por la auditoría; además menciona «palacio/casa real» en la rationale pero no en la nota.
  - severity: low
    issue: Capitalización inconsistente en «puerta Nueva».
    rationale: Si se entiende como nombre conocido del complejo del templo, en español es más natural «Puerta Nueva» que capitalizar solo el adjetivo. La nota [c] ya la presenta como designación fija.
  revised_spanish_text: Cuando los oficiales[a] de Judá oyeron estas palabras, subieron[b] de la casa del rey a la casa de Yahvé y se sentaron a la entrada de la Puerta Nueva de Yahvé[c].
  revised_footnotes:
