translation:
  language: es
  text: No se había celebrado una[a] Pascua como esta en Israel desde los días de Samuel el profeta, y ninguno de los reyes de Israel celebró una Pascua como la que celebró Josías, con los sacerdotes, los levitas, todo Judá, Israel que estaba presente[b], y los habitantes de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se había observado en Israel una Pascua como esta desde los días de Samuel el profeta».'
    reason: lexical_alternative
  - marker: b
    text: «Israel que estaba presente» se refiere a los israelitas que estaban allí para la celebración; también puede entenderse como «los israelitas que estaban presentes».
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲשָׂה
  english_pob_choice: had been kept
  chosen_spanish: se había celebrado
  alternatives_spanish:
  - se había hecho
  - se había observado
  - se había guardado
  lexicon: HALOT
  rationale: Con פֶסַח, עשה funciona idiomáticamente como celebrar/guardar la Pascua, no como 'hacer' en sentido material. 'Se había celebrado' comunica bien el valor perfectivo-retrospectivo sin perder la idea de observancia cultual.
- source_word: פֶסַח
  english_pob_choice: Passover
  chosen_spanish: Pascua
  alternatives_spanish:
  - la Pascua
  - la fiesta de Pascua
  - la celebración de Pascua
  lexicon: HALOT
  rationale: El término designa aquí la observancia pascual en conjunto. 'Pascua' es el equivalente natural y fiel en español, suficientemente amplio para no restringirlo solo al sacrificio.
- source_word: כָּמֹהוּ
  english_pob_choice: like it
  chosen_spanish: como esa
  alternatives_spanish:
  - como ella
  - como esta
  - como aquella
  lexicon: HALOT
  rationale: El sufijo remite a la celebración anterior. En español, 'esa' mantiene la referencia anafórica a la Pascua mencionada y suena más natural que un pronombre neutro literal.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  lexicon: HALOT
  rationale: La preposición expresa marco nacional/corporativo. 'En Israel' preserva el alcance del comparativo sin volverlo innecesariamente interpretativo.
- source_word: מִימֵי שְׁמוּאֵל הַנָּבִיא
  english_pob_choice: since the days of Samuel the prophet
  chosen_spanish: desde los días de Samuel el profeta
  alternatives_spanish:
  - desde la época de Samuel el profeta
  - desde los días del profeta Samuel
  lexicon: HALOT
  rationale: '''Desde los días de'' reproduce bien el punto de partida temporal y la formulación bíblica. Se conserva ''Samuel el profeta'' para mantener la apposición explicativa del hebreo.'
- source_word: וְכָל מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: and none of the kings of Israel
  chosen_spanish: y ninguno de los reyes de Israel
  alternatives_spanish:
  - y todos los reyes de Israel no
  - y ningún rey de Israel
  lexicon: HALOT
  rationale: El hebreo usa una negación distributiva ('todos... no'), que en español se expresa con naturalidad como 'ninguno de'. Preserva el sentido sin calco pesado.
- source_word: לֹא עָשׂוּ כַּפֶּסַח
  english_pob_choice: had kept a Passover like
  chosen_spanish: había celebrado una Pascua como
  alternatives_spanish:
  - había guardado una Pascua como
  - había observado una Pascua como
  lexicon: HALOT
  rationale: Se mantiene el valor idiomático de עשה con פֶסַח. 'Celebrado' comunica la acción cultual de manera clara y digna en español.
- source_word: אֲשֶׁר עָשָׂה יֹאשִׁיָּהוּ
  english_pob_choice: the one that Josiah kept
  chosen_spanish: la que celebró Josías
  alternatives_spanish:
  - la que guardó Josías
  - la que observó Josías
  lexicon: HALOT
  rationale: La relativa vuelve a identificar la Pascua de Josías como modelo. 'Celebró' conserva la fuerza cultual y evita una traducción demasiado literal de 'hizo'.
- source_word: וְהַכֹּהֲנִים וְהַלְוִיִּם
  english_pob_choice: with the priests, the Levites
  chosen_spanish: con los sacerdotes, los levitas
  alternatives_spanish:
  - y los sacerdotes, y los levitas
  lexicon: HALOT
  rationale: El hebreo enlaza estos grupos con la celebración compartida; 'con' deja claro que participaron junto con Josías en el acto pascual.
- source_word: וְכָל יְהוּדָה
  english_pob_choice: all Judah
  chosen_spanish: todo Judá
  alternatives_spanish:
  - todo el pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva la designación nacional en forma concisa y natural. 'Todo Judá' refleja el colectivo del hebreo.
- source_word: וְיִשְׂרָאֵל הַנִּמְצָא
  english_pob_choice: Israel that was present
  chosen_spanish: Israel que estaba presente
  alternatives_spanish:
  - los israelitas que estaban presentes
  - Israel hallado allí
  lexicon: HALOT
  rationale: Se mantiene el sintagma colectivo 'Israel' y se explicita el participio como presencia real en la ocasión. Esto preserva la posible tensión entre el colectivo y los individuos presentes.
- source_word: וְיוֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: and the inhabitants of Jerusalem
  chosen_spanish: y los habitantes de Jerusalén
  alternatives_spanish:
  - y los moradores de Jerusalén
  - y los residentes de Jerusalén
  lexicon: HALOT
  rationale: Traducción directa y natural del participio sustantivado para los residentes de la ciudad.
theological_decisions:
- issue: Comparación histórica de la Pascua de Josías
  english_pob_reading: The verse states that no Passover like Josiah's had been kept since Samuel's days, using hyperbolic or qualitative comparison without denying other significant Passovers such as Hezekiah's.
  chosen_spanish_reading: 'La frase mantiene la comparación cualitativa: no se había celebrado una Pascua semejante desde Samuel, sin convertirla en una negación interpretativa de toda otra Pascua significativa.'
  alternative_spanish_readings:
  - No se había celebrado una Pascua igual desde Samuel, en sentido absoluto histórico.
  - No se había celebrado una Pascua semejante en Israel desde los días de Samuel, sin más matiz.
  rationale: La traducción conserva el alcance del hebreo y evita suavizar o armonizar el enunciado en el texto principal. La observación interpretativa queda en la decisión teológica, no en una expansión del versículo.
  doctrine_reference: Historia bíblica y lectura contextual del Antiguo Testamento
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado y quedó sin cambios en el último pase; la presente versión sigue de cerca esa lectura, manteniendo las decisiones léxicas clave ('kept/celebrated', 'Israel that was present') y la nota interpretativa sobre el carácter comparativo del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Pascua' para פֶסַח en sentido cultual general.
  - Se conserva 'sacerdotes' y 'levitas' sin sustituir por terminología eclesial posterior.
  - Se usa 'Israel' de modo colectivo donde el hebreo lo hace, con la aclaración necesaria en la nota.
  - No se introduce 'SEÑOR' para el nombre divino, ya que este versículo no contiene el tetragrámaton.
