  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la noche específica, el deseo imprecatorio con subjuntivo y la exclusión de toda expresión jubilosa. Sin embargo, la construcción inicial «He aquí, que…» no es idiomática en español; tras «He aquí» corresponde una reformulación sin «que», o bien conviene usar una introducción más natural. Además, la nota al pie actual para הִנֵּה no preserva la alternativa semánticamente relevante del inglés para רְנָנָה (‘canto’/‘clamor de júbilo’), que sí está documentada en la auditoría inglesa.'
  spanish_quality_summary: 'La frase es mayormente clara y digna, pero «He aquí, que aquella noche…» suena forzada. «He aquí: aquella noche sea estéril» mantiene el registro bíblico y mejora la fluidez. El resto del verso es natural y fiel; «estéril» y «grito de alegría» funcionan bien en español eclesial general.'
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. Las decisiones léxicas principales son adecuadas: «aquella noche», «estéril», y «grito de alegría». La principal corrección es estilístico-sintáctica, junto con alinear la nota al pie con la alternativa lexical documentada para רְנָנָה.'
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «He aquí, que aquella noche…»'
    rationale: En español, «He aquí» no se combina naturalmente con «que» introductorio en este contexto. La frase suena calcada y resta legibilidad. Una pausa con dos puntos o coma, seguida de «aquella noche sea…», transmite mejor el tono deíctico e imprecatorio.
  - severity: medium
    issue: La nota al pie está anclada en הִנֵּה en vez de reflejar la alternativa preservada para רְנָנָה
    rationale: La auditoría inglesa conserva como nota una alternativa lexical para «joyful cry» (‘singing’ / ‘shout of joy’). El borrador español reemplaza esa nota por alternativas para «He aquí», que no están exigidas por la evidencia y omiten la variación relevante del sustantivo principal.
  revised_spanish_text: 'He aquí: aquella noche sea estéril; que no entre en ella grito de alegría[a].'
  revised_footnotes:
