translation:
  language: es
  text: Él somete a los pueblos[a] debajo de nosotros, y a las naciones debajo de nuestros pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él pone a los pueblos en sujeción debajo de nosotros». El verbo hebreo aquí tiene el sentido de subyugar, no de hablar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַדְבֵּר
  english_pob_choice: subdues
  chosen_spanish: somete
  alternatives_spanish:
  - subyuga
  - pone en sujeción
  - domina
  lexicon: HALOT, BDB
  rationale: El verbo hebreo en este contexto es causativo y no significa ‘hablar’. Con ‘somete’ se conserva la fuerza de subyugación militar/real que el POB inglés expresó con ‘subdues’, y suena natural en español bíblico contemporáneo.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - las gentes
  lexicon: HALOT, BDB
  rationale: ‘Pueblos’ preserva el plural colectivo del hebreo y diferencia este término de לְאֻמִּים en el segundo colon. Se evita igualarlo con ‘naciones’ para no borrar la distinción léxica que el texto poético mantiene.
- source_word: תַּחְתֵּינוּ
  english_pob_choice: under us
  chosen_spanish: bajo nosotros
  alternatives_spanish:
  - debajo de nosotros
  - sometidos a nosotros
  lexicon: HALOT, BDB
  rationale: La preposición תחת con sufijo de primera plural expresa aquí sujeción metafórica. ‘Bajo nosotros’ refleja con claridad la imagen espacial de dominio y mantiene el paralelismo con ‘bajo nuestros pies’.
- source_word: וּלְאֻמִּים
  english_pob_choice: and nations
  chosen_spanish: y a las naciones
  alternatives_spanish:
  - y a los pueblos
  - y a los grupos étnicos
  lexicon: HALOT, BDB
  rationale: ‘Naciones’ comunica bien el segundo término y, junto con ‘pueblos’, conserva la variación poética. Se mantiene el objeto directo con ‘a las’ para una sintaxis española fluida.
- source_word: תַּחַת רַגְלֵינוּ
  english_pob_choice: under our feet
  chosen_spanish: bajo nuestros pies
  alternatives_spanish:
  - debajo de nuestros pies
  lexicon: HALOT, BDB
  rationale: ‘Bajo nuestros pies’ reproduce el modismo de conquista o sometimiento y conserva la imagen corporal del hebreo. Es una fórmula natural en español y corresponde al valor idiomático que el POB inglés mantuvo.
theological_decisions:
- issue: Lenguaje de conquista y sujeción corporativa
  english_pob_reading: The subject is God ('He') acting on behalf of his people, subduing other peoples under 'us.'
  chosen_spanish_reading: El sujeto es Dios implícito por el contexto, que somete a los pueblos en favor de su pueblo, conservando el ‘nosotros’ corporativo.
  alternative_spanish_readings:
  - Una afirmación meramente militar del rey o del pueblo
  - Una formulación suavizada que elimine la idea de sometimiento
  rationale: El hebreo y el audit trail inglés presentan una acción de subyugación real, no una metáfora vacía. En español se conserva el plural inclusivo/ corporativo (‘nosotros/nuestros’) y la imagen de dominio sin atenuarla, respetando la teología del salmo y su tono real.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El contexto auditado del POB inglés muestra alta concordancia y ningún cambio reciente. Se mantiene la decisión clave de entender יַדְבֵּר como ‘subdues’ y se conserva la distinción entre עַמִּים y לְאֻמִּים. La versión española sigue esa línea sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como convención general del proyecto solo cuando el texto fuente lo requiere explícitamente; en este verso el sujeto está implícito y el paralelismo no exige nombrarlo.
  - Se preserva la diferencia entre ‘pueblos’ y ‘naciones’, evitando un único equivalente para ambos términos.
  - La sintaxis con objeto directo introducido por ‘a’ en español mantiene claridad y naturalidad sin perder el paralelismo hebreo.
