id: ROM.1.16
reference: Romans 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐ γὰρ ἐπαισχύνομαι τὸ ⸀εὐαγγέλιον, δύναμις γὰρ θεοῦ ἐστιν εἰς σωτηρίαν παντὶ τῷ πιστεύοντι, Ἰουδαίῳ τε πρῶτον καὶ Ἕλληνι·
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/016.yaml
  text: For I am not ashamed of the good news[a], for it is the power of God for salvation to everyone who believes[b], to the Jew first and also to the Greek.
  footnotes:
  - marker: a
    text: Or 'gospel.'
    reason: lexical_alternative
  - marker: b
    text: '''Greek'' here can refer more broadly to a Gentile, that is, a non-Jew.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 복음을 부끄러워하지 않습니다. 이는 복음이 모든 믿는 자에게 — 먼저는 유대인에게, 그리고 헬라인에게도 — 구원에 이르게 하는 하나님의 능력이기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δύναμις θεοῦ
  english_pob_choice: power of God
  chosen_korean: 하나님의 능력
  alternatives_korean:
  - 하나님의 권능
  lexicon: BDAG
  rationale: 바울의 핵심 명제(δύναμις)를 「능력」으로 일관되게 옮긴다.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_korean: 구원
  alternatives_korean:
  - 건짐
  - 구출
  lexicon: BDAG
  rationale: 바울 신학의 「구원」으로 굳은 용어를 그대로 유지한다.
theological_decisions:
- issue: 1:16의 복음을 「하나님의 능력」으로 옮김에 있어 명제적 무게 보존
  chosen_reading: 하나님의 능력
  alternative_readings:
  - 하나님의 권능
  rationale: 바울의 논제(복음이 곧 구원을 이루는 하나님의 동력 그 자체)를 약화시키지 않기 위해 「능력」을 채택한다. 「권능」은 권위 함의가 강해 명제의 동력성이 가려질 수 있다.
  doctrine_reference: DOCTRINE.md §1 — preserve author's powerful meaning
