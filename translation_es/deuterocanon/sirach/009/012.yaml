translation:
  language: es
  text: No sea que tu corazón se incline hacia ella[a], y con sangre[b] seas llevado a la Fosa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene un pronombre femenino singular ('hacia ella'); el contexto inmediato no es claro. El paralelo griego apunta a 'los impíos', por lo que el sentido puede abarcar una referencia más general, pero aquí se conserva la forma singular documentada.
    reason: alternative_reading
  - marker: b
    text: 'También: ''por derramamiento de sangre'' o ''con culpa de sangre''. El plural hebreo de ''sangres'' suele implicar violencia o culpabilidad por sangre.'
    reason: lexical_alternative
  - marker: c
    text: '''Fosa'' puede entenderse también como ''sepulcro'', ''abismo'' o ''destrucción''. El paralelo griego usa ''Hades'', reforzando la idea de muerte o el mundo de los muertos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן / μὴ
  english_pob_choice: Lest / negative warning
  chosen_spanish: No te inclines
  alternatives_spanish:
  - Guárdate de inclinarte
  - No te desvíes
  lexicon: HALOT; LXX μὴ
  rationale: En español, la advertencia negativa se expresa con naturalidad y fuerza mediante una prohibición breve. 'No te inclines' conserva el sentido admonitorio de evitar una desviación moral sin sobrecargar la frase.
- source_word: תַּטֶּה / εὐδοκήσῃς
  english_pob_choice: turn aside / be well pleased
  chosen_spanish: te inclines
  alternatives_spanish:
  - te desvíes
  - te dejes llevar
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego apuntan a una dirección moral indebida. 'Inclinarse' en español reproduce la imagen de volverse hacia algo con el corazón, y permite mantener la ambigüedad fuente sin introducir un objeto explícito no atestiguado en este versículo aislado.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: te inclines
  alternatives_spanish:
  - tu corazón se desvíe
  - se incline tu corazón
  lexicon: HALOT
  rationale: Aunque el hebreo menciona el 'corazón', en español la construcción verbal ya implica la sede interior de la decisión. Se puede explicitar 'corazón' si se prefiere, pero la frase breve mantiene el tono sapiencial y el paralelismo del verso.
- source_word: וּבְדָמִים
  english_pob_choice: in blood / through bloodshed
  chosen_spanish: con sangre
  alternatives_spanish:
  - por derramamiento de sangre
  - con culpa de sangre
  lexicon: HALOT
  rationale: '''Con sangre'' mantiene la concisión del hebreo y deja abierta la fuerza idiomática de ''sangres'' como violencia o culpabilidad de sangre. Las alternativas interpretativas quedan preservadas como opciones semánticas reales.'
- source_word: שָׁחַת / ᾅδου
  english_pob_choice: the Pit / Hades
  chosen_spanish: la Fosa
  alternatives_spanish:
  - el Sepulcro
  - el Abismo
  - la tumba
  lexicon: HALOT; LSJ
  rationale: '''Fosa'' conserva el valor imagético de destrucción y caída, y en español evita igualar el término sin más a ''tumba'', que estrecharía el alcance. En combinación con el griego paralelo, apunta a la esfera de muerte/ruina sin borrar la tensión terminológica.'
theological_decisions:
- issue: Relación entre el hebreo fragmentario y el paralelo griego
  english_pob_reading: The Hebrew warning about the heart turning aside and descending to the Pit, informed by the Greek's reference to the ungodly and Hades.
  chosen_spanish_reading: La advertencia se mantiene como un llamado a no desviarse interiormente hacia el mal y a no caer en la esfera de muerte representada por la Fosa.
  alternative_spanish_readings:
  - No te inclines hacia ellos, y con sangre no vayas a la Fosa.
  - No te complazcas en la impiedad, recordando que hasta el Hades no serán justificados.
  rationale: El hebreo conservado es breve y presenta una referencia pronominal difícil; el griego paralelo aporta el trasfondo de impiedad y de desenlace en el reino de la muerte. La redacción española sigue la base hebrea sin ignorar la aclaración que da el griego.
  doctrine_reference: 'PHILOSOPHY.md: priorizar el hebreo conservado con el griego paralelo como apoyo real de traducción.'
- issue: Tratamiento de la ambigüedad de la referencia pronominal
  english_pob_reading: The latest English revision restored 'her' to match the feminine singular Hebrew pronoun.
  chosen_spanish_reading: No te inclines hacia ella
  alternative_spanish_readings:
  - No te inclines hacia él
  - No te inclines hacia ellos
  rationale: El pronombre hebreo femenino singular se refleja directamente con 'ella'. Aunque el contexto inmediato sea oscuro, traducirlo así evita borrar la tensión textual documentada en el expediente.
  doctrine_reference: Auditable textual fidelity; preserve documented lexical/theological tension.
translation_notes:
  revision_awareness: El expediente inglés pasó por una revisión que corrigió el pronombre de 'them' a 'her' para ajustarse al hebreo femenino singular אֵלֶיהָ. La versión española refleja esa corrección con 'ella', pero mantiene abierta la dificultad contextual y la posible ampliación sugerida por el griego paralelo. También se conserva la fuerza de 'sangres' mediante 'sangre' y se traduce שחת como 'Fosa' para no perder la imaginería de ruina/muerte.
  spanish_consistency_notes:
  - Se usa 'Fosa' con mayúscula para representar el ámbito de ruina/muerte, coherente con el tratamiento POB de términos como 'the Pit'.
  - Se conserva el tono sapiencial breve y admonitorio, evitando una paráfrasis expansiva.
  - Se respeta la tensión textual entre el hebreo singular y el trasfondo plural/general sugerido por el griego, sin fusionarlos artificialmente.
