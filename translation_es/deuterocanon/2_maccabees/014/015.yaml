revisions:
- from: Pero cuando oyeron el avance de Nicanor y el ataque de las naciones[a], se echaron polvo sobre sí y suplicaron al que había establecido a su pueblo para siempre[c][b], y que siempre acude en ayuda de su propia porción con manifestación.
  to: Pero cuando oyeron el avance de Nicanor y el ataque de los gentiles[a], se echaron polvo sobre sí mismos y suplicaron al que había establecido a su pueblo para siempre, y que siempre acude en ayuda de su propia porción[c] con manifestación[b].
  rationale: Se cambió «las naciones» por «los gentiles» para reflejar el matiz contextual de τῶν ἐθνῶν ya documentado en el expediente POB, dejando «las naciones» como alternativa en nota. Se ajustó «sobre sí» a «sobre sí mismos» para un español más natural. También se reubicaron las notas para que anclen exactamente donde corresponden en el texto español revisado y se mantuvo «con manifestación» como traducción cercana al griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:08Z'
