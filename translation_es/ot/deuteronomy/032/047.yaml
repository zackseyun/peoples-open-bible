translation:
  language: es
  text: Porque no es una palabra vacía para ustedes[a], sino que es su vida[b], y por esta palabra prolongarán sus días en la tierra que ustedes cruzan el Jordán para poseerla[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no es una cosa vacía para ustedes», «no es una cosa vana para ustedes» o «no es un asunto trivial para ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus vidas»; el plural puede funcionar idiomáticamente como un singular abstracto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «allí para poseerla», «allí para heredarla» o «allí para tomar posesión de ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָבָר רֵק
  english_pob_choice: an empty word
  chosen_spanish: una palabra vacía
  alternatives_spanish:
  - una cosa vana
  - una cosa trivial
  - una palabra vana
  lexicon: HALOT
  rationale: דָבָר conserva el sentido de 'palabra' o 'asunto', pero aquí, por el contexto de la instrucción de Moisés, 'palabra' comunica mejor el vínculo con el discurso pactal. רֵק expresa vacío o inutilidad; 'vacía' mantiene esa carga sin volver el español artificial.
- source_word: מִכֶּם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - de ustedes
  - para vosotros
  lexicon: HALOT
  rationale: 'La preposición מן no se entiende aquí como separación literal, sino en relación con ellos: la palabra no es vacía respecto de Israel. ''Para ustedes'' reproduce esa fuerza relacional de modo natural en español.'
- source_word: חַיֵּיכֶם
  english_pob_choice: your life
  chosen_spanish: su vida
  alternatives_spanish:
  - sus vidas
  - su vida misma
  - su sustento
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, funciona idiomáticamente como un sustantivo abstracto singular. 'Su vida' conserva ese valor y evita forzar el plural en español.
- source_word: וּבַדָּבָר הַזֶּה
  english_pob_choice: by this word
  chosen_spanish: por esta palabra
  alternatives_spanish:
  - mediante esta palabra
  - con esta palabra
  - por este asunto
  lexicon: HALOT
  rationale: 'La preposición בְּ es instrumental: la prolongación de los días ocurre por medio de la obediencia a esta palabra. ''Por esta palabra'' conserva la relación causal/instrumental y mantiene la continuidad con ''palabra'' al inicio del versículo.'
- source_word: תַּאֲרִיכוּ יָמִים
  english_pob_choice: you will prolong your days
  chosen_spanish: prolongarán sus días
  alternatives_spanish:
  - vivirán muchos años
  - alargarán sus días
  - tendrán larga vida
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'harán largos días'; en español, 'prolongarán sus días' preserva la imagen verbal sin volverla extraña. El futuro mantiene el valor de consecuencia prometida.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  - sobre el suelo
  lexicon: HALOT
  rationale: En Deuteronomio la referencia es a la tierra prometida. 'Sobre la tierra' conserva el matiz espacial de עַל y sigue siendo claro en español; 'tierra' es una opción más amplia y bíblica que 'país'.
- source_word: עֹבְרִים אֶת הַיַּרְדֵּן
  english_pob_choice: you are crossing the Jordan
  chosen_spanish: cruzan el Jordán
  alternatives_spanish:
  - están cruzando el Jordán
  - cruzan el Jordán en este momento
  - van a cruzar el Jordán
  lexicon: HALOT
  rationale: El participio expresa la acción vista desde la perspectiva de Moisés, como un cruce en curso o inminente. El presente 'cruzan' suena natural y conserva esa perspectiva sin añadir más de lo que el hebreo dice.
- source_word: שָׁמָּה לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para tomar posesión de ella
  - para heredarla
  - allí para poseerla
  lexicon: HALOT
  rationale: ירשׁ puede implicar 'tomar posesión' o 'heredar'. Dado que el complemento destino ya está claro, 'poseerla' conserva la idea de ocupar la tierra sin sobreexplicar, y el pronombre retoma 'la tierra' con fluidez.
theological_decisions:
- issue: Relación entre la palabra divina, la vida y la permanencia en la tierra
  english_pob_reading: The verse states that God's spoken instruction is the means by which Israel's life and long tenure in the land are sustained.
  chosen_spanish_reading: El versículo presenta la palabra de Dios como aquello que sostiene la vida de Israel y la duración de sus días en la tierra.
  alternative_spanish_readings:
  - Es solo una alabanza general a la importancia de la ley, sin implicar consecuencia pactal.
  - La frase 'su vida' podría entenderse de manera meramente poética y no como vínculo entre obediencia y vida.
  rationale: La estructura paralela 'es su vida' / 'por esta palabra prolongarán sus días' expresa una consecuencia pactal, no solo una valoración general. La redacción española conserva esa relación sin introducir categorías doctrinales ajenas al texto.
  doctrine_reference: Deuteronomio 30:15-20; Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto coincide con el audit trail inglés en sentido y decisiones léxicas principales; no se registran revisiones posteriores que alteren la solución de este versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino en el versículo.
  - '''Jordán'' conserva el nombre propio bíblico con artículo implícito según el uso español natural.'
  - Se mantiene la continuidad léxica 'palabra' / 'palabra' para reflejar דָבָר en ambos lugares.
  - La referencia territorial se vierte como 'la tierra' para seguir el contexto de Deuteronomio sin sobregeneralizar.
