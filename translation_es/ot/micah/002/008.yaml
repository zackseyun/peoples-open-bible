  text: וְ/אֶתְמ֗וּל עַמִּ/י֙ לְ/אוֹיֵ֣ב יְקוֹמֵ֔ם מִ/מּ֣וּל שַׂלְמָ֔ה אֶ֖דֶר תַּפְשִׁט֑וּ/ן מֵ/עֹבְרִ֣ים בֶּ֔טַח שׁוּבֵ֖י מִלְחָמָֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/002/008.yaml
  text: But lately my people have risen up as an enemy; from off the garment you strip the robe from those who pass by securely[a], those returning from war.
  footnotes:
