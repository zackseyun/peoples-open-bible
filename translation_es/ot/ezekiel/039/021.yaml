translation:
  language: es
  text: Y pondré mi gloria entre las naciones, y todas las naciones verán mi juicio[a] que he ejecutado, y mi mano[b] que he puesto sobre ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi justicia que he hecho/llevado a cabo».
    reason: lexical_alternative
  - marker: b
    text: «Mi mano» es un hebraísmo para la acción activa o el poder de Dios, especialmente en juicio.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will set
  chosen_spanish: pondré
  alternatives_spanish:
  - daré
  - colocaré
  lexicon: HALOT
  rationale: נתן puede significar 'dar', 'poner' o 'colocar'. En este contexto, con 'mi gloria entre las naciones', 'pondré' transmite de manera natural la acción concreta de situar algo en un lugar o esfera, y conserva mejor la fuerza idiomática que un simple 'dar'.
- source_word: כְּבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi honor
  - mi esplendor
  lexicon: HALOT
  rationale: כבוד puede denotar gloria, honor o peso. Aquí, como en la lectura inglesa, 'mi gloria' es la opción más fiel y teológicamente adecuada para la majestad manifiesta de Dios ante las naciones.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en las naciones
  lexicon: HALOT
  rationale: גוים se refiere a las naciones extranjeras en conjunto. 'Entre las naciones' es natural en español y conserva la idea de presencia pública y observable, no solo ubicación estática.
- source_word: וְרָאוּ כָל הַגּוֹיִם
  english_pob_choice: and all the nations will see
  chosen_spanish: y todas las naciones verán
  alternatives_spanish:
  - y verán todas las naciones
  - y todas las naciones verán
  lexicon: HALOT
  rationale: La forma verbal profética se expresa con futuro en español. Se mantiene el orden natural del español sin perder la universalidad del sujeto.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my judgment
  chosen_spanish: mi juicio
  alternatives_spanish:
  - mi juicio judicial
  - mi justicia
  - mi sentencia
  lexicon: HALOT
  rationale: משפט puede significar juicio, justicia, sentencia o decisión judicial. Aquí el contexto de intervención divina contra las naciones permite 'juicio' como término amplio y claro en español, sin perder la carga judicial del hebreo.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: that I have executed
  chosen_spanish: que he ejecutado
  alternatives_spanish:
  - que he hecho
  - que he llevado a cabo
  lexicon: HALOT
  rationale: Aunque עשה significa de modo básico 'hacer', en español jurídico y bíblico 'ejecutar' transmite bien la realización efectiva de un juicio. Conserva el matiz de acción consumada sin añadir contenido ajeno al texto.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi poder
  lexicon: HALOT
  rationale: יד literalmente significa 'mano' y suele funcionar como metáfora del poder o la acción activa de Dios. Se mantiene la imagen literal en el texto principal para no perder su fuerza profética.
- source_word: אֲשֶׁר שַׂמְתִּי בָהֶם
  english_pob_choice: that I have laid on them
  chosen_spanish: que he puesto sobre ellas
  alternatives_spanish:
  - que he tendido sobre ellas
  - que he impuesto sobre ellas
  lexicon: HALOT
  rationale: שׂים con 'mano' expresa poner o colocar la mano sobre alguien. 'He puesto sobre ellas' conserva la imagen idiomática en español; se mantiene el referente plural colectivo de 'las naciones' con 'ellas'.
theological_decisions:
- issue: Sentido de 'mi gloria' en relación con las naciones
  english_pob_reading: God's manifested majesty/reputation displayed through his acts of judgment
  chosen_spanish_reading: La gloria de Dios como majestad manifiesta que queda visible entre las naciones por medio de su acto de juicio
  alternative_spanish_readings:
  - mi honor en sentido abstracto
  - mi gloria como mera reputación
  rationale: El versículo vincula directamente la gloria divina con el juicio visto por todas las naciones. Por eso, 'mi gloria' no se reduce a un honor interno o abstracto, sino a una manifestación histórica y pública de la majestad de Yahvé.
  doctrine_reference: Ezequiel 39:21; cf. la relación bíblica entre gloria divina y actos de juicio
- issue: Valor metafórico de 'mi mano'
  english_pob_reading: A metaphor for God's active power in judgment, retained literally as 'hand'
  chosen_spanish_reading: '''Mi mano'' se conserva como metáfora de la acción poderosa de Dios en juicio'
  alternative_spanish_readings:
  - mi poder
  - mi intervención
  rationale: El hebreo usa una imagen corporal tradicional para la acción eficaz de Dios. Traducirla literalmente mantiene la densidad poética y teológica; el contexto ya aclara que se trata de una acción judicial.
  doctrine_reference: Ezequiel 39:21; uso profético de 'mano' como acción/poder divino
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al pasaje en el paquete auditado; el último pase indica que no hubo cambios y la revisión permanece estable.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma normal del nombre divino en el proyecto, pero aquí el versículo usa pronombres de primera persona y no requiere el nombre explícito.
  - '''Juicio'' se usa para מִשְׁפָּטִי siguiendo el valor judicial del contexto; la nota ofrece la alternativa ''justicia'' preservada por el audit trail.'
  - '''Mano'' se conserva literalmente para reproducir el hebraísmo sin eliminar su sentido de poder o acción.'
  - El plural femenino 'ellas' corresponde a 'las naciones' en español y mantiene la referencia colectiva del hebreo.
