base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/006/001.yaml
  text: Now in the second year of the reign of Darius[a], Haggai and Zechariah son of Iddo, the prophets, prophesied to the Jews who were in Judea and Jerusalem in the name of the Lord God of Israel[c][b], to them.
  footnotes:
  - marker: a
    text: Or 'Judah and Jerusalem,' following the Hebrew parallel more closely; the Greek reads 'Judea and Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The closing phrase 'over them' could also be understood as 'concerning them' or, less likely in context, simply 'to them.' The Greek and Hebrew both preserve this somewhat compressed wording.
    reason: alternative_reading
  - marker: c
    text: The Greek text has a duplicated article before 'prophets' ('the the prophets'), likely a scribal or transmission irregularity; the translation gives the intended sense.
    reason: textual_variant
