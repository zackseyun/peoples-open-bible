translation:
  language: es
  text: Pero si no hay iniquidad en su nación[a], que mi señor pase; no sea que su Señor y su Dios los defienda, y nosotros seamos un oprobio delante de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «que el señor pase». En este contexto, se entiende mejor como un tratamiento respetuoso a Holofernes («mi señor»), no como referencia a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - desorden
  - impiedad
  lexicon: BDAG
  rationale: ἀνομία expresa ausencia o violación de la ley, con fuerza moral y legal. En español, «iniquidad» conserva bien ese peso de maldad contraria al orden justo, sin sonar tan técnico como «ilegalidad» ni tan débil como «desorden».
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: BDAG
  rationale: Aquí el término se refiere a Israel como colectivo nacional. «Nación» conserva el matiz étnico-político mejor que «pueblo», que en español puede sonar más general.
- source_word: παρελθέτω
  english_pob_choice: let my lord pass by
  chosen_spanish: que mi señor pase
  alternatives_spanish:
  - que el señor pase
  - que pase
  - que mi señor siga adelante
  lexicon: BDAG
  rationale: El imperativo comunica que Holofernes debe pasar o seguir de largo. En español, «que mi señor pase» refleja la cortesía del hablante y evita la ambigüedad de tomar κύριος como referencia divina en la primera ocurrencia.
- source_word: μή ποτε
  english_pob_choice: lest perhaps
  chosen_spanish: no sea que quizá
  alternatives_spanish:
  - no sea que
  - quizá no
  - por si acaso
  lexicon: BDAG
  rationale: La combinación introduce una advertencia de posible resultado indeseable. «No sea que quizá» conserva la cautela doble del griego de manera natural en español.
- source_word: ὑπερασπίσῃ
  english_pob_choice: defend
  chosen_spanish: defienda
  alternatives_spanish:
  - proteja
  - ampare
  - salga en su defensa
  lexicon: LSJ
  rationale: El verbo tiene el sentido de defender o proteger activamente. «Defienda» mantiene el tono militar-forense del pasaje y corresponde bien al contexto narrativo.
- source_word: ὀνειδισμός
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - vergüenza
  - deshonra
  lexicon: BDAG
  rationale: El término apunta a deshonra pública o motivo de burla. «Oprobio» preserva ese matiz de vergüenza pública con un registro solemne adecuado al relato.
- source_word: πάσης τῆς γῆς
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - todo el mundo
  - toda la región
  lexicon: BDAG
  rationale: La frase tiene alcance expansivo y retórico. «Toda la tierra» reproduce de cerca la amplitud de la expresión griega sin reducirla a un ámbito local.
- source_word: κύριος
  english_pob_choice: Lord / my lord
  chosen_spanish: mi señor / su Señor
  alternatives_spanish:
  - señor / su señor
  - mi señor / su Señor Dios
  lexicon: BDAG
  rationale: La primera ocurrencia, por el contexto, es un tratamiento respetuoso dirigido a Holofernes; por eso se traduce «mi señor». La segunda, junto a «su Dios», se refiere claramente al Dios de Israel y se vierte «su Señor» para distinguir la referencia divina sin perder la correspondencia con el griego.
theological_decisions:
- issue: Distinción de las dos ocurrencias de κύριος en una misma cláusula
  english_pob_reading: First κύριος rendered as 'my lord' for the human addressee; second κύριος rendered as 'their Lord' for God
  chosen_spanish_reading: 'Primera ocurrencia: «mi señor» para Holofernes; segunda: «su Señor» para el Dios de Israel'
  alternative_spanish_readings:
  - «señor» para ambas ocurrencias
  - «mi señor» / «el Señor de ellos»
  rationale: El contexto narrativo obliga a distinguir el tratamiento cortesano del gobernante humano de la referencia teológica al Dios de Israel, especialmente porque la segunda aparece unida a «su Dios». La solución española mantiene esa tensión sin borrar la ambigüedad formal del griego más de lo necesario.
  doctrine_reference: 'DOCTRINE.md: κύριος se traduce según el sentido contextual; los títulos humanos no deben confundirse con los divinos.'
translation_notes:
  revision_awareness: El borrador sigue la última revisión del inglés auditado al evitar cualquier expansión innecesaria equivalente a «on their behalf», y conserva la fuerza de μή ποτε con una advertencia natural en español. También respeta la distinción textual entre el primer κύριος, dirigido a Holofernes, y el segundo, referido a Dios.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma preferida cuando el texto exige el nombre divino, pero en este versículo aparece κύριος con sentido contextual humano y divino; por eso se traduce con «mi señor» y «su Señor» según el referente.
  - «Oprobio» mantiene un registro elevado y evita rebajar el matiz público y social de ὀνειδισμός.
  - «Toda la tierra» conserva el alcance amplio de πάσης τῆς γῆς y no lo reduce a «el país» o «la región».
