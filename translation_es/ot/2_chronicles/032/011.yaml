revisions:
- from: '¿No es Hezekías[a] quien los está desviando, para entregarlos a morir de hambre y de sed, diciendo: «Yahvé, nuestro Dios, nos librará de la mano del rey de Asiria»?'
  to: '¿No los está desviando Ezequías[a] para entregarlos a la muerte por hambre y por sed, diciendo: «Yahvé, nuestro Dios, nos librará de la mano del rey de Asiria»?'
  rationale: Se corrige el nombre propio a la forma española normal «Ezequías» y se mejora la sintaxis para reflejar con mayor naturalidad y precisión la idea hebrea de ser entregados a una muerte por privación. Se conserva la nota léxica sobre מַסִּית y la terminología clave del proyecto, especialmente «Yahvé».
