lexical_decisions:
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - líder
  - jefe de clan
  lexicon: HALOT
  rationale: En Génesis 36, אַלּוּף designa un jefe tribal o de clan edomita. En español, «jefe» transmite bien el valor de autoridad y mantiene la repetición breve de la lista hebrea. «Jefe de clan» explicita el sentido, pero añade peso que el hebreo no lleva aquí; «caudillo» puede sonar más ideológico o militar.
- source_word: אָהֳלִיבָמָה
  english_pob_choice: Oholibamah
  chosen_spanish: Oholibamá
  alternatives_spanish:
  - Oholibamah
  - Aholibamá
  lexicon: transliteración convencional
  rationale: Se conserva el nombre propio con transliteración cercana al hebreo y al uso bíblico en español. Se prefiere «Oholibamá» como forma legible y consistente; «Aholibamá» es una variante tradicional, pero aquí se opta por una transliteración más directa del sonido inicial.
- source_word: אֵלָה
  english_pob_choice: Elah
  chosen_spanish: Elá
  alternatives_spanish:
  - Ela
  - Elah
  lexicon: transliteración convencional
  rationale: El término funciona como nombre propio dentro de una lista genealógica. Se mantiene la forma breve del nombre con acento gráfico para lectura en español, sin añadir ningún valor descriptivo que el hebreo no indique.
- source_word: פִּינֹן
  english_pob_choice: Pinon
  chosen_spanish: Pinón
  alternatives_spanish:
  - Pinon
  - Pinnón
  lexicon: transliteración convencional
  rationale: Se conserva el nombre propio con transliteración directa. «Pinón» refleja bien la forma hebrea y adapta la pronunciación a la ortografía española sin alterar el nombre.
translation_notes:
  revision_awareness: El texto base en inglés no introdujo cambios de revisión relevantes y el control cruzado reporta alta concordancia; por eso la redacción española sigue de cerca la lista hebrea sin expandirla.
  spanish_consistency_notes:
  - 'Se mantiene la estructura trinitaria repetida del hebreo: título + nombre, título + nombre, título + nombre.'
  - Se transliteran los nombres propios de modo uniforme y con acentuación española cuando ayuda a la lectura.
  - No se introduce lenguaje eclesiástico ni equivalencias interpretativas adicionales, porque el versículo es una lista nominal breve y estable.
