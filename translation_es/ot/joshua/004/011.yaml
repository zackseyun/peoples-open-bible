translation:
  language: es
  text: Y cuando todo el pueblo terminó de cruzar, el arca de Yahvé y los sacerdotes cruzaron delante del pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en presencia del pueblo». La expresión hebrea puede denotar tanto posición espacial («delante de») como presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y sucedió que ...
  alternatives_spanish:
  - Y aconteció que ...
  - Y ocurrió que ...
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce transición discursiva. En español, «Y sucedió que» mantiene el avance narrativo con naturalidad y sin añadir contenido ajeno.
- source_word: כַּאֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - as
  - al
  lexicon: HALOT
  rationale: Introduce una cláusula temporal; «cuando» expresa mejor la secuencia con la acción completada que sigue.
- source_word: תַּם
  english_pob_choice: had finished
  chosen_spanish: había terminado
  alternatives_spanish:
  - se había completado
  - había acabado
  lexicon: HALOT
  rationale: El verbo indica completitud. El pluscuamperfecto español preserva la relación temporal con la acción principal.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - toda la gente
  lexicon: HALOT
  rationale: «Pueblo» conserva el valor colectivo de הָעָם mejor que una referencia meramente genérica a personas.
- source_word: לַעֲבוֹר
  english_pob_choice: crossing over
  chosen_spanish: de cruzar
  alternatives_spanish:
  - para cruzar
  - al cruzar
  lexicon: HALOT
  rationale: En español, el infinitivo con «de» funciona bien después de «terminado» y conserva el sentido de מעבר/עבר en el cruce del Jordán.
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed over
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - cruzó
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa singular, el sujeto compuesto en español exige plural: el arca de Yahvé y los sacerdotes. «Cruzar» mantiene la correspondencia léxica con לַעֲבוֹר.'
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahweh
  - el arca de Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé». «Arca» es el equivalente natural de אֲרוֹן en este contexto cultual.'
- source_word: וְהַכֹּהֲנִים
  english_pob_choice: and the priests
  chosen_spanish: y los sacerdotes
  alternatives_spanish:
  - y los ministros sagrados
  lexicon: HALOT
  rationale: El hebreo nombra a los sacerdotes del relato; «sacerdotes» es la traducción directa y transparente en español.
- source_word: לִפְנֵי הָעָם
  english_pob_choice: before the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - en presencia del pueblo
  - ante el pueblo
  lexicon: HALOT
  rationale: La frase puede indicar posición espacial o presencia. En este contexto narrativo, «delante de»/«delante del» comunica mejor que iban al frente del pueblo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se preserva el nombre del pacto según el estándar del proyecto en español. «Yahvé» transmite el Tetragrámaton sin el reemplazo litúrgico por «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés concluyó que no eran necesarios cambios y que el acuerdo con el texto fuente era alto; por eso la redacción española sigue de cerca las decisiones auditadas sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio de la serie.
  - Se conserva la repetición léxica de «cruzar» para reflejar el juego de עבר en las dos formas verbales.
  - «Pueblo» traduce consistentemente הָעָם en un registro bíblico claro y natural.
  - La nota de pie marca la ambigüedad real de לִפְנֵי sin resolverla de forma excesiva.
