- issue: Meaning of נֶפֶשׁ in Saul's confession
  chosen_reading: Rendered as 'my life' rather than 'my soul'
  alternative_readings:
  - my soul was precious in your eyes
  rationale: In this narrative context David has spared Saul's physical life, so נֶפֶשׁ refers concretely to life/self rather than making a theological statement about the soul. This avoids importing anthropological claims the verse does not require.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; do not import doctrinal claims the text does not make.'
