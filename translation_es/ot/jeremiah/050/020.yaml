revisions:
- from: En aquellos días y en aquel tiempo[a], declara Yahvé, se buscará la iniquidad de Israel, pero no habrá ninguna, y los pecados de Judá, y no se hallarán[b]; porque perdonaré a los que deje como remanente.
  to: En aquellos días y en aquel tiempo[a], declara Yahvé, se buscará la iniquidad de Israel, pero no habrá ninguna; se buscarán los pecados de Judá, pero no se hallarán[b], porque perdonaré a los que deje como remanente.
  rationale: 'Se hizo una reparación menor para que la elipsis hebrea se exprese con naturalidad en español: se explicitó «se buscarán» en la cláusula paralela sobre Judá y se ajustó la puntuación. También se afinó la nota [b] para reflejar mejor las alternativas documentadas para אַשְׁאִיר sin confundirlas con «perdonaré».'
  reviewer_model: gpt-5.4
