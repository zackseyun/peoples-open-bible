review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo y sigue de cerca la auditoría inglesa: «En aquel día», «sus ciudades fortificadas», «los lugares abandonados del bosque», «a causa de los hijos de Israel» y «desolación» preservan adecuadamente el sentido. También mantiene la nota léxica sobre וְהָאָמִיר y la nota alternativa sobre מִפְּנֵי. Sin embargo, la cláusula final «y habrá desolación» debilita la referencia sintáctica del hebreo וְהָיְתָה שְׁמָמָה, que en contexto apunta más naturalmente a que ello/ella será desolación, no simplemente a que habrá desolación en general.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mayor precisión y cohesión. «La cima del árbol» es comprensible, aunque «la copa del árbol» suena un poco más natural; no obstante, puede mantenerse si se conserva la nota. El problema principal es la impersonalización de la última cláusula. Además, la nota b introduce «por temor», que estrecha demasiado la alternativa hebrea; conviene alinearla con la explicación auditada de retirada ante la presencia de Israel.
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, etc. «Hijos de Israel» está bien conservado conforme a la decisión documentada. La elección «ciudades fortificadas» y «desolación» concuerda con la racionalidad léxica de la POB.
  issues:
  - severity: medium
    issue: La cláusula final «y habrá desolación» impersonaliza el hebreo.
    rationale: וְהָיְתָה שְׁמָמָה expresa más directamente que la realidad descrita llegará a ser/será desolación. «Habrá desolación» introduce un giro existencial menos ligado al referente del verso.
  - severity: low
    issue: La nota b añade «por temor», interpretación más específica que la nota inglesa auditada.
    rationale: La evidencia permite un matiz de retirada «desde delante de» o «a causa de» la presencia de Israel, pero «por temor» agrega una motivación psicológica no explícita en el hebreo.
  revised_spanish_text: En aquel día sus ciudades fortificadas serán como los lugares abandonados del bosque y la cima del árbol[a], que abandonaron a causa de los hijos de Israel[b]; y será desolación.
  revised_footnotes:
  - marker: a
    text: También puede entenderse como «la copa del árbol» o «la rama superior». El hebreo se refiere a la parte más alta del árbol.
    reason: lexical_alternative
  - marker: b
    text: 'O: «que abandonaron por causa de los hijos de Israel». La expresión hebrea también puede indicar retirada desde delante de la presencia de Israel.'
    reason: alternative_reading
  revision_rationale: Se ajusta la cláusula final a «y será desolación» para reflejar mejor la sintaxis y fuerza del hebreo, evitando una formulación impersonal demasiado suelta. También se corrige la nota b para no sobredeterminar el sentido con «por temor» y alinearla mejor con la alternativa documentada en la auditoría inglesa.
