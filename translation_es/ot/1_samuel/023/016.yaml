translation:
  language: es
  text: Entonces Jonatán, hijo de Saúl, se levantó y fue a David en Horesh[a], y le fortaleció la mano en Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el bosque» o «el lugar boscoso».
    reason: lexical_alternative
  - marker: b
    text: O «lo animó en Dios»; literalmente, «le fortaleció la mano en Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en camino
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de קום introduce una acción iniciada. En español, «se levantó» comunica bien ese inicio narrativo sin sonar forzado, y mantiene un tono natural y sobrio.
- source_word: יְהוֹנָתָן בֶּן שָׁאוּל
  english_pob_choice: Jonathan son of Saul
  chosen_spanish: Jonatán, hijo de Saúl
  alternatives_spanish:
  - Jonatán, el hijo de Saúl
  - Jonatán, hijo de Saúl
  lexicon: Nombres propios / sintaxis hebrea
  rationale: Se conserva el nombre propio en forma española usual y la relación filial explícita. El orden mantiene la apposición hebrea y el peso narrativo de la referencia política y familiar.
- source_word: וַיֵּלֶךְ אֶל
  english_pob_choice: went to
  chosen_spanish: fue a
  alternatives_spanish:
  - fue hacia
  - fue hasta
  lexicon: HALOT
  rationale: «Fue a» es la equivalencia más directa y natural para הלך אל en este contexto. Evita tanto el desplazamiento de perspectiva como una formulación excesivamente interpretativa.
- source_word: חֹרְשָׁה
  english_pob_choice: Horesh
  chosen_spanish: Horeja
  alternatives_spanish:
  - Horesh
  - Joresa
  lexicon: HALOT
  rationale: El contexto lo trata como nombre de lugar. Se adopta una forma española legible del topónimo, conservando su carácter propio en vez de traducirlo como sustantivo común.
- source_word: וַיְחַזֵּק
  english_pob_choice: strengthened
  chosen_spanish: le fortaleció
  alternatives_spanish:
  - lo animó
  - le dio ánimo
  lexicon: HALOT
  rationale: חזק en pi‘el expresa fortalecer o hacer fuerte. «Le fortaleció» sigue de cerca la fuerza verbal del hebreo y evita reducirlo prematuramente a «animar».
- source_word: אֶת יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: la mano
  alternatives_spanish:
  - su mano
  - su ánimo
  - su resolución
  lexicon: HALOT
  rationale: El hebreo conserva la imagen de la «mano»; en español, con el clítico dativo «le» y el complemento «la mano» se mantiene la metáfora sin explicitarla en paráfrasis. Esto preserva la tensión idiomática documentada por el texto base.
- source_word: בֵּאלֹהִים
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - por Dios
  - con Dios
  lexicon: HALOT
  rationale: La preposición ב se rinde de manera directa como «en», indicando la esfera o fundamento de la acción. «Dios» corresponde al hebreo אֱלֹהִים, sin introducir el nombre divino donde el texto no lo da.
theological_decisions:
- issue: Renderizar אֱלֹהִים sin sustituirlo por el nombre YHWH
  english_pob_reading: God rather than the LORD
  chosen_spanish_reading: Dios, no Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El hebreo aquí usa אֱלֹהִים, no el tetragrámaton. Por fidelidad al texto fuente y a la primacía del idioma original, se traduce «Dios» y no se importa el nombre del pacto ni la convención tradicional de máscara.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; contested term table for יְהוָה'
- issue: Mantener la metáfora de «la mano» en vez de explicarla como ánimo o resolución
  english_pob_reading: literally, 'strengthened his hand in God'
  chosen_spanish_reading: le fortaleció la mano en Dios
  alternative_spanish_readings:
  - le dio ánimo en Dios
  - le fortaleció el ánimo en Dios
  rationale: La expresión hebrea es una metáfora concreta y el POB inglés la conserva. En español también puede sostenerse sin perder inteligibilidad, permitiendo que la nota explique la posible equivalencia funcional sin borrar la imagen textual.
  doctrine_reference: 'DOCTRINE.md: Preserve source imagery when intelligible; avoid flattening idioms without warrant'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto hebreo y con el audit trail inglés; no se detectan revisiones aplicadas en el paquete fuente. Se conserva la estructura narrativa, el nombre propio, el topónimo como lugar y la metáfora de la mano, con una única nota para la alternativa del topónimo.
  spanish_consistency_notes:
  - Se usa «Jonatán» para el nombre propio conforme al uso español habitual de la forma bíblica.
  - Se mantiene «Dios» para אֱלֹהִים, coherente con la primacía del idioma original.
  - Se conserva la metáfora de la «mano» porque el español la tolera y la nota puede aclararla sin reemplazarla.
  - El tono es formal y bíblico, pero en español moderno y readable para comunidad eclesial amplia.
