translation:
  language: es
  text: 'Y los niños luchaban entre sí dentro de ella[a]; y ella dijo: «Si así es, ¿por qué soy yo así?». Entonces fue a consultar a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿por qué soy yo de este modo?». La expresión hebrea es elíptica y también puede entenderse más literalmente como «¿por qué soy yo?».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְרֹצֲצוּ
  english_pob_choice: struggled together
  chosen_spanish: se pelearon
  alternatives_spanish:
  - lucharon entre sí
  - se forcejearon
  - se empujaban uno al otro
  lexicon: HALOT
  rationale: El verbo hebreo es recíproco e intensivo y describe una acción mutua entre los niños. «Se pelearon» comunica bien la tensión interna y el conflicto, sin perder naturalidad en español.
- source_word: הַבָּנִים
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los hijos
  - los muchachos
  lexicon: HALOT
  rationale: En el contexto prenatal, «los niños» suena más natural y legible en español que «los hijos», sin borrar que se trata de sus descendientes varones.
- source_word: בְּקִרְבָּהּ
  english_pob_choice: within her
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en su interior
  - en su vientre
  lexicon: HALOT
  rationale: La frase hebrea indica interioridad corporal. «Dentro de ella» conserva esa idea de forma clara y no añade una especificación que el hebreo no expresa de manera explícita.
- source_word: אִם כֵּן
  english_pob_choice: If it is so
  chosen_spanish: Si así es
  alternatives_spanish:
  - Si es así
  - Si eso es así
  lexicon: HALOT
  rationale: La expresión condicional funciona naturalmente en español como respuesta de desconcierto. «Si así es» mantiene el tono directo y la secuencia del hebreo.
- source_word: לָמָּה זֶּה אָנֹכִי
  english_pob_choice: why am I like this?
  chosen_spanish: ¿por qué soy yo así?
  alternatives_spanish:
  - ¿por qué estoy yo así?
  - ¿por qué soy así?
  - ¿por qué me pasa esto?
  lexicon: HALOT
  rationale: La construcción hebrea es elíptica y admite varias lecturas. En español, «¿por qué soy yo así?» conserva la rareza de la frase sin convertirla en una paráfrasis más interpretativa.
- source_word: לִדְרֹשׁ אֶת יְהוָה
  english_pob_choice: to inquire of Yahweh
  chosen_spanish: a consultar a Yahvé
  alternatives_spanish:
  - a inquirir de Yahvé
  - a buscar a Yahvé
  - a consultar a Yahvé para saber
  lexicon: HALOT
  rationale: דרש con objeto personal suele implicar buscar una respuesta o guía divina. «Consultar a Yahvé» transmite bien esa idea en español y mantiene la relación personal del verbo con el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», siguiendo el criterio del proyecto para el Tetragrámaton y evitando la sustitución por un título.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma «Yahvé» preserva el nombre propio divino y se alinea con la política del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota a un marcador presente en el texto. No se añadieron notas no ancladas. El sentido general coincide con el audit trail inglés y con el hebreo, manteniendo la tensión de la expresión elíptica de Rebeca.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se evitó «SEÑOR» como sustitución del nombre divino.
  - «Consultar» refleja el valor oracular de דרש en este contexto narrativo.
  - La nota [a] está anclada exactamente en la frase problemática para preservar la alternativa interpretativa.
