review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Jonatán recibe el informe, los mandos de Demetrio han llegado a Cedes/Kedés en Galilea, vienen con fuerza militar numerosa y buscan removerlo de su función. Sin embargo, «quitarlo de su cargo» suena algo coloquial y menos preciso que la idea de destitución/remoción de un puesto; además, conviene ajustar el topónimo a una forma más reconocible y natural para lectores bíblicos en español.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorar en dignidad y precisión. «Con mucha tropa» es comprensible, aunque algo informal; puede conservarse con nota o sustituirse por «con una gran fuerza». La mejora principal es «removerlo de su cargo», que suena más natural y fiel al matiz de μεταστῆσαι… τῆς χρείας. También es preferible «Quedes/Kedés en Galilea» frente a «Cedes de Galilea» para un topónimo bíblico mejor identificado.
  glossary_alignment: 'No hay términos teológicos de glosario mayor en juego. Las decisiones léxicas principales están mayormente alineadas con el expediente inglés: ἄρχοντες como «comandantes», μετὰ δυνάμεως πολλῆς con sentido militar, y μεταστῆσαι… τῆς χρείας como remoción de un cargo/oficio. La nota sobre δυνάμεως está bien orientada.'
  issues:
  - severity: medium
    issue: «Quitarlo de su cargo» es menos preciso y algo más coloquial que el sentido del griego.
    rationale: μεταστῆσαι αὐτὸν τῆς χρείας apunta a remover/destituir de una función, puesto u oficio. «Removerlo de su cargo» o «destituirlo de su cargo» preserva mejor el matiz oficial.
  - severity: low
    issue: El topónimo «Cedes» es posible, pero no es la opción más clara o reconocible para lectores bíblicos en español.
    rationale: Dado el griego Κῆδες y la identificación geográfica, «Quedes en Galilea» resulta más natural y evita una forma menos usual.
  - severity: low
    issue: «Con mucha tropa» es entendible, pero tiene un registro algo menos digno.
    rationale: El expediente inglés favorece «with a large force». En español, «con una gran fuerza[a]» o «con una fuerza numerosa[a]» suena más literario y mantiene la amplitud del término militar.
  revised_spanish_text: Y Jonatán oyó que los comandantes de Demetrio habían llegado a Quedes en Galilea con una gran fuerza[a], con la intención de removerlo de su cargo.
  revised_footnotes:
  - marker: a
    text: O «con un gran ejército». El griego puede referirse de manera amplia a una fuerza militar numerosa, no necesariamente con un término técnico único.
    reason: lexical_alternative
