translation:
  language: es
  text: Pero los campos de la ciudad y sus aldeas[a] se los dieron a Caleb hijo de Jefone, como propiedad suya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus asentamientos'. El término hebreo puede referirse a poblaciones dependientes o a terrenos asociados a la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת שְׂדֵה הָעִיר
  english_pob_choice: the fields of the city
  chosen_spanish: los campos de la ciudad
  alternatives_spanish:
  - el campo de la ciudad
  - las tierras de la ciudad
  lexicon: HALOT
  rationale: שְׂדֵה es singular en hebreo constructo, pero el sentido colectivo encaja mejor en español con un plural natural. 'Campos' conserva el valor agrícola y la idea de extensión vinculada a la ciudad sin sonar forzado.
- source_word: וְאֶת חֲצֵרֶיהָ
  english_pob_choice: its villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus asentamientos
  - sus poblados
  - sus patios
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, חֲצֵרִים puede referirse a dependencias o asentamientos asociados a la ciudad. 'Aldeas' expresa bien esa relación dependiente en español, sin cerrar la ambigüedad del hebreo.
- source_word: נָתְנוּ
  english_pob_choice: they gave
  chosen_spanish: se los dieron
  alternatives_spanish:
  - les dieron
  - lo dieron
  lexicon: HALOT
  rationale: El verbo básico es 'dar'. En español, 'se los dieron' reproduce de forma natural la entrega de esos terrenos a Caleb, manteniendo el sentido simple del hebreo.
- source_word: לְכָלֵב בֶּן יְפֻנֶּה
  english_pob_choice: to Caleb son of Jephunneh
  chosen_spanish: a Caleb hijo de Jefone
  alternatives_spanish:
  - a Caleb, hijo de Jefone
  lexicon: HALOT
  rationale: Se conserva el nombre propio en forma tradicional y clara para lectura eclesial en español. 'Hijo de' sigue la construcción normal del hebreo sin añadir matices no presentes.
- source_word: בַּאֲחֻזָּתוֹ
  english_pob_choice: as his possession
  chosen_spanish: como su posesión
  alternatives_spanish:
  - como su propiedad
  - como su heredad
  lexicon: HALOT
  rationale: אֲחֻזָּה denota una tenencia o posesión legal de tierra. 'Posesión' conserva ese valor jurídico sin introducir 'heredad', que podría sugerir más de lo que el término garantiza aquí.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'pasturelands' a 'villages' para reflejar mejor חֲצֵרֶיהָ como asentamientos dependientes o dependencias de la ciudad. La versión española sigue esa lectura contextual con 'aldeas', evitando una traducción demasiado agrícola.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' ausente porque el versículo no contiene el nombre divino.
  - Se evitó 'Cristo' y vocabulario teológico no pertinente; el versículo es puramente narrativo-jurídico.
  - '''Posesión'' se usa de forma consistente con el valor legal de אֲחֻזָּה en contexto de reparto territorial.'
