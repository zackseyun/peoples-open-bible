translation:
  language: es
  text: 'Y le dijo: «¿Qué ocurre, Ester? Yo soy tu hermano[a]; ten ánimo.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yo soy tu pariente» si el término se entiende en un sentido más amplio que una relación fraterna literal.
