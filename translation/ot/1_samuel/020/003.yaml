  text: וַ/יִּשָּׁבַ֨ע ע֜וֹד דָּוִ֗ד וַ/יֹּ֨אמֶר֙ יָדֹ֨עַ יָדַ֜ע אָבִ֗י/ךָ כִּֽי מָצָ֤אתִי חֵן֙ בְּ/עֵינֶ֔י/ךָ וַ/יֹּ֛אמֶר אַל יֵֽדַע זֹ֥את יְהוֹנָתָ֖ן פֶּן יֵֽעָצֵ֑ב וְ/אוּלָ֗ם חַי יְהוָה֙ וְ/חֵ֣י נַפְשֶׁ֔/ךָ כִּ֣י כְ/פֶ֔שַׂע בֵּינִ֖/י וּ/בֵ֥ין הַ/מָּֽוֶת־־־־־׃
translation:
  text: 'But David swore again and said, “Your father certainly knows that I have found favor in your eyes, and he has said, ‘Jonathan must not know this, lest he be grieved.’ But as the LORD lives, and as your soul lives, there is only a step between me and death.”'
