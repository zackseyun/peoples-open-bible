review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la secuencia del griego: Israel fue removido por fuerza hacia una tierra ajena y luego se apartó del Señor que lo había redimido. Sin embargo, mezcla indebidamente ἀπαχθῆναι y ἀποικεσίᾳ en «fue llevado cautivo», lo que desplaza el matiz específico de «into exile / en exilio». Además, la nota [a] está mal anclada: la alternativa documentada corresponde a ἀποστῆναι, no a «cautivo».'
  spanish_quality_summary: El español es legible, pero «fue llevado cautivo» suena menos preciso que «fue llevado al exilio» o «fue deportado», y la nota al pie colocada en «cautivo[a]» crea confusión semántica. También conviene evitar «país» cuando «tierra» refleja mejor γῆν y el registro bíblico.
  glossary_alignment: 'Hay una desviación respecto a la terminología del proyecto: para κύριος en contexto divino, el valor por defecto en español es «Yahvé», y no hay aquí una razón suficiente para mantener «Señor» solo por seguir el audit trail inglés. También «Mesías/Cristo» no aplica. «Redimido» está bien. «Exilio» refleja mejor ἀποικεσίᾳ que «cautivo».'
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada a «cautivo» pero explica ἀποστῆναι.
    rationale: Las alternativas «se apartaron de / apostataron de» pertenecen al segundo miembro de la oración, no al término de exilio. Esto rompe la correspondencia entre texto y nota.
  - severity: medium
    issue: «fue llevado cautivo» no representa con precisión la combinación ἀπαχθῆναι + ἀποικεσίᾳ.
    rationale: El griego distingue el acto de ser llevado y la condición/destino de exilio. «Cautivo» introduce un matiz distinto y sustituye el término auditado «exilio».
  - severity: medium
    issue: «país extranjero» es posible, pero «tierra extranjera» refleja mejor γῆν ἀλλοτρίαν y el registro bíblico.
    rationale: γῆ denota tierra/land; «tierra extranjera» preserva mejor el vínculo con la formulación fuente.
  - severity: medium
    issue: Uso de «Señor» en lugar de «Yahvé».
    rationale: La pauta del proyecto para el nombre divino favorece «Yahvé» en el texto principal. El hecho de que el griego tenga Κυρίου no basta por sí solo para desplazar esa convención, especialmente en un contexto claramente referido al Dios de Israel.
  revised_spanish_text: Cuando Israel fue llevado al exilio a una tierra extranjera, cuando se apartaron[a] de Yahvé, quien los había redimido,
