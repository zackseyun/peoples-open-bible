revisions:
- from: Cara a cara[a] hablo con él, claramente y no en enigmas; y contempla la forma de Yahvé. Entonces, ¿por qué no tuvieron temor de hablar contra mi siervo[b], contra Moisés?
  to: Boca a boca[a] hablo con él, claramente y no en enigmas; y contempla la forma de Yahvé[b]. Entonces, ¿por qué no tuvieron temor de hablar contra mi siervo, contra Moisés?
  rationale: Se revisa «Cara a cara» a «Boca a boca» para seguir el original hebreo y la decisión documentada del POB de preservar la imagen literal en el texto principal. Se repara y normaliza la nota [a], que estaba corrupta. También se ancla correctamente la nota [b] en «Yahvé», porque la alternativa afecta a toda la frase «la forma de Yahvé». El resto del versículo puede mantenerse.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del sentido hebreo: habla directa con Moisés, no en enigmas, contemplación de la forma de Yahvé y reprensión por hablar contra Moisés. Sin embargo, el cambio de «פֶּה אֶל פֶּה» a «Cara a cara» no sigue la decisión auditada del POB, que preserva la imagen literal «mouth to mouth» con nota alternativa. En español, «boca a boca» es suficientemente claro y conserva mejor el énfasis del original. Además, la nota al pie [a] está corrupta e incompleta.'
  spanish_quality_summary: El español es generalmente claro y digno. «Claramente», «enigmas», «contempla» y «la forma de Yahvé» funcionan bien. Pero la nota [a] contiene texto dañado («una խոս here?»), lo que la hace inaceptable. «Cara a cara» suena natural, pero aquí diluye un detalle textual significativo que el proyecto decidió mantener.
  glossary_alignment: 'Alineación buena en «Yahvé», «forma», y el tono general. Desalineación principal: el proyecto privilegia preservar la literalidad de פֶּה אֶל פֶּה; por eso debe decir «Boca a boca» en el texto principal y dejar «cara a cara» como alternativa en nota. No hay otros conflictos mayores con la terminología por defecto.'
  issues:
  - severity: high
    issue: La expresión principal «Cara a cara» no preserva la elección léxica auditada para פֶּה אֶל פֶּה.
    rationale: El original dice literalmente «boca a boca», y el POB en inglés decidió conservar esa imagen en el texto principal, relegando «face to face» a nota. En español también puede mantenerse «Boca a boca» sin perder inteligibilidad.
  - severity: high
    issue: La nota al pie [a] está corrupta e incompleta.
    rationale: Contiene texto ajeno/no español («una խոս here?»), lo que impide su uso editorial y no explica correctamente la alternativa.
  - severity: low
    issue: La elección «no tuvieron temor» es aceptable, pero «no tuvieron miedo» o «no temieron» sería más directa.
    rationale: No es un error; solo una cuestión de estilo. Puede conservarse porque suena digno y fiel al sentido de reprensión.
  revised_spanish_text: Boca a boca[a] hablo con él, claramente y no en enigmas; y contempla la forma de Yahvé[b]. Entonces, ¿por qué no tuvieron temor de hablar contra mi siervo, contra Moisés?
  revised_footnotes:
  - marker: a
    text: O «cara a cara». El hebreo dice literalmente «boca a boca», enfatizando el habla directa.
    reason: lexical_alternative
  - marker: b
    text: O «la semejanza de Yahvé» o «la apariencia de Yahvé».
    reason: lexical_alternative
  revision_rationale: Se revisa «Cara a cara» a «Boca a boca» para seguir el original hebreo y la decisión documentada del POB de preservar la imagen literal en el texto principal. Se repara y normaliza la nota [a], que estaba corrupta. También se ancla correctamente la nota [b] en «Yahvé», porque la alternativa afecta a toda la frase «la forma de Yahvé». El resto del versículo puede mantenerse.
