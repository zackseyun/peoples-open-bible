  yaml_path: translation/deuterocanon/1_maccabees/010/037.yaml
  text: And some of them shall be appointed in the king’s great strongholds[a], and from among them some shall be appointed over the needs of the kingdom, being trustworthy; and let those over them and the rulers be from among them, and let them live by their own laws[b], just as the king commanded in the land of Judah.
  footnotes:
  - marker: a
    text: Or 'for the affairs/business of the kingdom.' The Greek phrase 'over the needs of the kingdom' can refer broadly to administrative responsibilities.
    reason: lexical_alternative
  - marker: b
    text: Or 'walk according to their laws.' The Greek idiom uses 'go/walk' with laws to mean conduct life in accordance with them.
    reason: lexical_alternative
