review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: יְהוָה → «Yahvé», צַדִּיק como predicado de carácter divino, קִצֵּץ como acción perfecta de cortar/segar, עֲבוֹת como cuerdas/cordeles de atadura, y רְשָׁעִים como «los impíos». Sin embargo, la nota al pie no preserva fielmente la alternativa inglesa: repite la lectura principal («cuerdas») en vez de ofrecer alternativas reales equivalentes a «ropes» y «thick cords».'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español bíblico contemporáneo: «Yahvé es justo; ha cortado las cuerdas de los impíos». La sintaxis y el registro son adecuados. El único problema de calidad está en la redacción de la nota, que resulta confusa e internamente redundante.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: el Tetragrámaton se vierte como «Yahvé», no «SEÑOR»; «justo» es una opción aceptable para צַדִּיק; «cuerdas» para עֲבוֹת es apropiado; «los impíos» conserva bien el matiz bíblico. No hay conflicto doctrinal ni terminológico en el texto principal.'
  issues:
  - severity: medium
    issue: La nota al pie lexical_alternative no reproduce correctamente las alternativas preservadas en el audit trail inglés.
    rationale: 'El inglés dice: «Or ''ropes'' or ''thick cords'' of the wicked». La nota española actual dice: «También puede entenderse: «cuerdas» o «sogas gruesas» de los impíos», pero «cuerdas» ya es la lectura principal del texto y por tanto no funciona como alternativa. Debe ofrecer alternativas genuinas como «sogas» o «cuerdas gruesas».'
  revised_spanish_text: Yahvé es justo[a]; ha cortado las cuerdas de los impíos.
  revised_footnotes:
  - marker: a
    text: O «sogas» o «cuerdas gruesas» de los impíos.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo y suena natural en español. Solo se corrige la nota al pie para que preserve con precisión las alternativas léxicas documentadas en el POB inglés, sin redundar con la lectura principal.
