revisions:
- from: Pues, en efecto, no permitir que los que actúan impíamente sigan por mucho tiempo, sino hacerles caer inmediatamente en los castigos, es señal de gran benevolencia.
  to: Pues, en efecto, no permitir que los que actúan impíamente sigan por mucho tiempo, sino hacer que les sobrevengan enseguida los castigos, es señal de gran bondad.
  rationale: 'Se ajusta una frase calcada del griego a un español más natural y fiel al sentido: no la imagen literal de «caer en» castigos, sino la idea de que los castigos les sobrevienen de inmediato. También se cambia «benevolencia» por «bondad» para una expresión más idiomática y claramente comprensible, manteniendo la tensión teológica de que el castigo pronto es una muestra de bien divino.'
