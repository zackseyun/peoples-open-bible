translation:
  language: es
  text: 'La suerte tocó a la tribu de Manasés, porque él era el primogénito de José: a Macir, el primogénito de Manasés, el padre[a] de Galaad, porque él era un hombre de guerra, le pertenecían Galaad y Basán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antepasado/fundador de Galaad». El hebreo «padre de» puede denotar un progenitor o fundador, no solo un padre biológico inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַגּוֹרָל
  english_pob_choice: the lot fell
  chosen_spanish: La suerte tocó
  alternatives_spanish:
  - La suerte cayó
  - La porción salió
  lexicon: HALOT
  rationale: En este contexto de reparto por sorteo, גּוֹרָל expresa el resultado de la asignación. «Tocó» comunica en español el valor idiomático de que una porción fue adjudicada por suerte, sin volverlo mecánico.
- source_word: לְמַטֵּה מְנַשֶּׁה
  english_pob_choice: to the tribe of Manasseh
  chosen_spanish: a la tribu de Manasés
  alternatives_spanish:
  - para la tribu de Manasés
  - a la casa de Manasés
  lexicon: HALOT
  rationale: מַטֶּה aquí designa la unidad tribal. «Tribu» es la forma natural y fiel en español para este contexto de herencia territorial.
- source_word: כִּי הוּא בְּכוֹר יוֹסֵף
  english_pob_choice: for he was the firstborn of Joseph
  chosen_spanish: porque él era el primogénito de José
  alternatives_spanish:
  - pues él era el primogénito de José
  - porque era el primogénito de José
  lexicon: HALOT
  rationale: Se conserva el valor explicativo de כִּי con «porque». «Primogénito» mantiene tanto el orden de nacimiento como la relevancia hereditaria del término.
- source_word: לְמָכִיר
  english_pob_choice: to Machir
  chosen_spanish: a Macir
  alternatives_spanish:
  - para Macir
  - a Máquir
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en transliteración española. «A» conserva el sentido distributivo de la asignación territorial dentro de Manasés.
- source_word: בְּכוֹר מְנַשֶּׁה
  english_pob_choice: the firstborn of Manasseh
  chosen_spanish: el primogénito de Manasés
  alternatives_spanish:
  - el hijo primogénito de Manasés
  - el mayor de Manasés
  lexicon: HALOT
  rationale: «Primogénito» es la correspondencia natural de בְּכוֹר y preserva la carga de prioridad genealógica e inherente a la herencia.
- source_word: אֲבִי הַגִּלְעָד
  english_pob_choice: the father of Gilead
  chosen_spanish: el padre de Galaad
  alternatives_spanish:
  - el antepasado de Galaad
  - el fundador de Galaad
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea en su forma más directa. En español, «padre de» puede leerse tanto biológicamente como como progenitor/fundador, dejando abierta la misma tensión que documenta el POB en inglés.
- source_word: אִישׁ מִלְחָמָה
  english_pob_choice: a man of war
  chosen_spanish: un hombre de guerra
  alternatives_spanish:
  - un guerrero
  - un hombre guerrero
  lexicon: HALOT
  rationale: La expresión hebrea se vierte de manera bastante literal para conservar su fuerza caracterizadora. «Hombre de guerra» es comprensible y mantiene el tono bíblico sin reemplazarlo por un término más interpretativo.
- source_word: וַיְהִי לוֹ
  english_pob_choice: there belonged
  chosen_spanish: le pertenecían
  alternatives_spanish:
  - eran suyas
  - le correspondían
  - tenía
  lexicon: HALOT
  rationale: En un contexto de herencia, la frase indica posesión/asignación. «Le pertenecían» comunica pertenencia adjudicada sin reducir el sentido a posesión meramente casual.
- source_word: הַגִּלְעָד וְהַבָּשָׁן
  english_pob_choice: Gilead and Bashan
  chosen_spanish: Galaad y Basán
  alternatives_spanish:
  - Gilead y Bashán
  - Galaad y Bashán
  lexicon: HALOT
  rationale: Son topónimos establecidos; se transliteran al español con la forma más reconocible y estándar en una Biblia en español, manteniendo los nombres propios como tales.
theological_decisions:
- issue: Sentido de «padre de Galaad»
  english_pob_reading: The Hebrew 'father of' can denote a progenitor or founder, not only an immediate biological father.
  chosen_spanish_reading: el padre de Galaad
  alternative_spanish_readings:
  - el antepasado de Galaad
  - el fundador de Galaad
  rationale: No se fuerza una aclaración interpretativa en el texto principal. La fórmula española conserva la misma tensión semántica que el inglés POB documenta, permitiendo que «padre» pueda entenderse como progenitor o fundador según el contexto.
  doctrine_reference: Génesis 10:15; uso genealógico amplio de אָב
- issue: Distribución territorial por suerte
  english_pob_reading: the lot fell
  chosen_spanish_reading: La suerte tocó
  alternative_spanish_readings:
  - La suerte cayó
  - La asignación recayó
  rationale: La formulación mantiene que la distribución fue determinada por sorteo, sin introducir un matiz distinto sobre agencia humana o azar más allá del procedimiento bíblico de reparto.
  doctrine_reference: Josué 14–19; Proverbios 16:33
translation_notes:
  revision_awareness: Se siguió el pasaje de referencia y el audit trail inglés sin cambios sustanciales en la lectura revisada más reciente; el texto inglés quedó sin modificaciones, con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo «primogénito» para בְּכוֹר en ambos casos para preservar la relación genealógica y de herencia.
  - Se conservaron los topónimos como «Galaad» y «Basán», coherentes con el uso bíblico en español.
  - No se sustituyó «Yahvé» porque el versículo no contiene el nombre divino.
  - La nota al pie se ancla solo en «tocó» para ofrecer la alternativa idiomática documentada sin recargar el texto principal.
