theological_decisions:
- issue: Rendering κρίνω in this verse
  chosen_reading: Use 'condemned' in both clauses
  alternative_readings:
  - judged
  rationale: The immediate context (John 3:17–19) contrasts salvation with condemnation and speaks of a present adverse verdict tied to unbelief. Rendering both occurrences as 'condemned' preserves the judicial and soteriological force without importing a later systematic formulation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Rendering μονογενής
  chosen_reading: one and only
  alternative_readings:
  - only
  - only begotten
  - unique
  rationale: Within Nicene orthodoxy, the translation should not flatten the Son's uniqueness, but neither should it force later creedal wording into the text where the Greek term itself is best understood lexically as uniqueness. A footnote preserves the traditional 'only begotten' rendering because of its theological and historical significance.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy: original-language primacy over translation tradition.'
