translation:
  language: es
  text: Estaba Habacuc el profeta en Judea[a], y había cocido un potaje[b] y desmenuzado panes[c] en una vasija, y se iba al campo para llevarlo a los segadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alternativamente, 'Judá'. El griego Ἰουδαία puede referirse a la región de Judea o, en algunos contextos, a Judá.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'comida hervida' o 'comida cocida'; 'potaje' es una equivalencia natural en español para el plato preparado.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'panes' o 'hogazas'; el español mantiene el plural para reflejar mejor el griego ἄρτους.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμβακοὺμ
  english_pob_choice: Habakkuk
  chosen_spanish: Habacuc
  alternatives_spanish:
  - Abacuc
  lexicon: LSJ
  rationale: Nombre propio profético; en español bíblico actual, 'Habacuc' es la forma más reconocible y fiel al referente del griego Ἀμβακοὺμ.
- source_word: ὁ προφήτης
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - un profeta
  lexicon: LSJ
  rationale: El artículo identifica a Habacuc como figura conocida, no como un profeta indeterminado.
- source_word: ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: in Judea
  chosen_spanish: en Judea
  alternatives_spanish:
  - en Judá
  lexicon: LSJ
  rationale: En este contexto helenístico, Ἰουδαία designa normalmente la región de Judea; por eso se conserva 'Judea'. La alternativa 'Judá' queda posible como matiz geográfico-histórico, pero no es la opción principal aquí.
- source_word: ἥψησεν
  english_pob_choice: had cooked
  chosen_spanish: había cocido
  alternatives_spanish:
  - coció
  - había cocinado
  - hirvió
  lexicon: LSJ
  rationale: El verbo ἕψω puede significar cocer/hervir. 'Había cocido' mantiene el valor de cocción y el trasfondo narrativo previo a su salida, sin sonar tan moderno como 'había cocinado'.
- source_word: ἕψεμα
  english_pob_choice: a stew
  chosen_spanish: un potaje
  alternatives_spanish:
  - un guiso
  - un cocido
  - comida cocida
  lexicon: LSJ
  rationale: El sustantivo indica comida cocida o hervida. 'Potaje' comunica bien un plato preparado, sin fijar ingredientes, y preserva la concreción culinaria del griego. Se evita exagerar la especificidad de 'guiso' si se quisiera destacar más la cualidad de hervido.
- source_word: ἐνέθρυψεν
  english_pob_choice: crumbled
  chosen_spanish: desmenuzado
  alternatives_spanish:
  - desmigajado
  - quebrantado
  - partido en trozos
  lexicon: LSJ
  rationale: El verbo expresa romper en pequeñas porciones. 'Desmenuzado' reproduce bien esa acción y funciona naturalmente con 'panes' en español.
- source_word: ἄρτους
  english_pob_choice: bread
  chosen_spanish: panes
  alternatives_spanish:
  - pan
  - hogazas
  lexicon: LSJ
  rationale: El plural griego apunta a piezas de pan, no al sustantivo colectivo. 'Panes' conserva mejor la forma plural del original que el inglés POB, donde se optó por un mass noun idiomático.
- source_word: σκάφην
  english_pob_choice: a bowl
  chosen_spanish: una batea
  alternatives_spanish:
  - un cuenco
  - un tazón
  - una vasija
  lexicon: LSJ
  rationale: La palabra griega puede referirse a un recipiente. 'Batea' es amplia y compatible con un recipiente de preparación o servicio, evitando la imagen demasiado pequeña de 'cuenco' y la posible trivialización de 'tazón'.
- source_word: τὸ πεδίον
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - la llanura
  - el llano
  - el campo de labor
  lexicon: LSJ
  rationale: En contexto agrícola, 'el campo' es la equivalencia más natural y clara en español.
- source_word: ἀπενέγκαι
  english_pob_choice: to bring it
  chosen_spanish: llevarlo
  alternatives_spanish:
  - traerlo
  - transportarlo
  - llevarlo consigo
  lexicon: LSJ
  rationale: El infinitivo de propósito expresa la acción de entregar la comida a los segadores. 'Llevarlo' evita el giro más analítico 'para traerlo' y conserva la finalidad del movimiento.
- source_word: τοῖς θερισταῖς
  english_pob_choice: the reapers
  chosen_spanish: a los segadores
  alternatives_spanish:
  - a los cosechadores
  - a los cosechadores de la mies
  lexicon: LSJ
  rationale: El término designa a quienes siegan o cosechan. 'Segadores' es la opción más directa y bíblicamente transparente en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego normalizado y la línea de trabajo del POB en inglés: conserva el valor narrativo del imperfecto (''se iba''), traduce Ἰουδαία como Judea con nota alternativa, y mantiene la secuencia culinaria concreta sin añadir sujetos ni énfasis ausentes en el original. Se tuvo en cuenta la revisión inglesa que eliminó ''he himself'' por no ser necesario; en español no se introduce un énfasis equivalente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un κύριος con función divina.
  - Se conserva 'Habacuc' como nombre profético estándar en español.
  - '''Segadores'' mantiene el contexto agrícola sin introducir terminología eclesiástica.'
  - '''Potaje'' y ''desmenuzado panes'' evitan una paráfrasis excesiva y respetan el carácter concreto de la escena.'
