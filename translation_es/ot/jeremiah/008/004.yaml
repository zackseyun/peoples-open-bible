translation:
  language: es
  text: 'Les dirás: «Así dice Yahvé: ¿Cae la gente y no vuelve a levantarse? ¿Se aparta alguien[a] y no regresa?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Se vuelve atrás alguien y no regresa?» El hebreo repite el mismo verbo («volver/retornar») con efecto retórico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: You shall say to them
  chosen_spanish: Dirás a ellos
  alternatives_spanish:
  - Y dirás a ellos
  - Les dirás
  lexicon: HALOT
  rationale: La forma verbal transmite una comisión directa al profeta. En español, «dirás» conserva el valor de mandato/comisión sin añadir un auxiliar; «a ellos» mantiene el complemento del hebreo con naturalidad suficiente para un texto profético.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Yahvé
  - Así dice el SEÑOR
  lexicon: HALOT
  rationale: La fórmula profética se reproduce de manera estable con «Así dice». Se conserva el nombre divino como «Yahvé» conforme al criterio del proyecto para יְהוָה, evitando la sustitución por título.
- source_word: הֲיִפְּל֖וּ
  english_pob_choice: Do people fall
  chosen_spanish: ¿Caerán los hombres?
  alternatives_spanish:
  - ¿Caerán las personas?
  - ¿Se caerá la gente?
  lexicon: HALOT
  rationale: El hebreo usa tercera persona plural con valor proverbial/general. «Los hombres» expresa en español bíblico y sobrio el sentido genérico de la humanidad o la gente, sin imponer una lectura masculina exclusiva en sentido moderno.
- source_word: וְלֹ֣א יָק֑וּמוּ
  english_pob_choice: and not rise again
  chosen_spanish: y no se levantarán
  alternatives_spanish:
  - y no se pondrán de pie
  - y no volverán a levantarse
  lexicon: HALOT
  rationale: קוּם aquí alude a levantarse después de caer. «Se levantarán» conserva el contraste con «caerán» y funciona con naturalidad en español.
- source_word: אִם יָשׁ֖וּב וְלֹ֥א יָשֽׁוּב
  english_pob_choice: Does one turn away and not return?
  chosen_spanish: ¿Se volverá uno y no volverá?
  alternatives_spanish:
  - ¿Si se vuelve, no volverá?
  - ¿Se apartará uno y no volverá?
  lexicon: HALOT
  rationale: La repetición de שוב se conserva con «volverá / volverá», reflejando el efecto retórico del hebreo. «Se volverá uno» mantiene el valor proverbial e impersonal; el primer verbo puede sugerir apartarse o volver atrás, mientras el segundo indica el retorno esperado.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título. Esto preserva la referencia personal al Dios del pacto sin ocultar el nombre en el texto principal.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La traducción sigue la lectura alta de acuerdo del paquete fuente y mantiene sin cambios la fórmula profética, el nombre divino y la repetición retórica de שוב. Se preserva la tensión lexical entre «volver» y «retornar» mediante una nota alternativa, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene la repetición verbal de שוב con «volverá» para reflejar el paralelismo del hebreo.
  - La frase inicial conserva el tono profético directo y publicable, sin añadir explicaciones al cuerpo principal.
