translation:
  language: es
  text: Y te libraré de la mano del rey de Asiria[a], a ti y a esta ciudad, y defenderé esta ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la garra del rey de Asiria». El hebreo dice literalmente «de la mano de», un modismo de dominio o control.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכַּף
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la garra de
  - del alcance de
  lexicon: HALOT
  rationale: El hebreo usa un modismo concreto de poder/control. En español, «de la mano de» conserva la imagen y sigue siendo natural; «de la mano» reproduce mejor el valor idiomático que una paráfrasis abstracta.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - Asiria, su rey
  - el rey asirio
  lexicon: HALOT
  rationale: Es una construcción genitiva directa. «El rey de Asiria» es preciso, claro y mantiene el referente histórico sin añadir matiz interpretativo.
- source_word: אַצִּילְךָ
  english_pob_choice: I will deliver you
  chosen_spanish: te libraré
  alternatives_spanish:
  - te rescataré
  - te salvaré
  - te liberaré
  lexicon: HALOT
  rationale: La forma hifil de נצל expresa sacar de peligro o librar de una amenaza. «Libraré» comunica bien esa acción en español bíblico moderno y evita cargar el verbo con una lectura soteriológica más amplia que el contexto militar no exige.
- source_word: וְאֵת הָעִיר הַזֹּאת
  english_pob_choice: and this city
  chosen_spanish: y esta ciudad
  alternatives_spanish:
  - y esta misma ciudad
  - y la ciudad esta
  lexicon: HALOT
  rationale: El demostrativo señala a Jerusalén. «Esta ciudad» es la equivalencia natural y no sobretraduce el énfasis del hebreo.
- source_word: וְגַנּוֹתִי
  english_pob_choice: and I will defend
  chosen_spanish: defenderé
  alternatives_spanish:
  - protegeré
  - ampararé
  - resguardaré
  lexicon: HALOT
  rationale: La raíz גנן implica cubrir/proteger/defender. En contexto bélico, «defenderé» capta la acción activa de protección contra el asalto enemigo.
- source_word: עַל הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - sobre esta ciudad
  - por esta ciudad
  lexicon: HALOT
  rationale: Con גנן, עַל expresa la acción protectora sobre la ciudad. En español, el complemento se integra de forma natural sin reproducir mecánicamente la preposición.
theological_decisions:
- issue: Promesa de rescate histórico en contexto militar
  english_pob_reading: Use 'deliver' for God's rescue of Hezekiah and Jerusalem from Assyria without importing broader salvific theology.
  chosen_spanish_reading: Usar «libraré» para la liberación histórica de Ezequías y de Jerusalén de Asiria, sin importar aquí un sentido doctrinal más amplio de salvación.
  alternative_spanish_readings:
  - te salvaré
  - te redimiré
  - te rescataré
  rationale: El texto trata de una intervención histórica contra un enemigo concreto. «Libraré» mantiene el tono bíblico y el alcance inmediato del pasaje, evitando ampliar indebidamente el contenido teológico.
  doctrine_reference: 'Translation philosophy: original-language primacy; no importar afirmaciones doctrinales que el texto no hace explícitas.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto sigue en alto acuerdo con el control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Asiria» como nombre propio histórico uniforme.
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino.
  - «Libraré» y «defenderé» conservan el registro bíblico sin introducir tecnicismos no presentes en el hebreo.
