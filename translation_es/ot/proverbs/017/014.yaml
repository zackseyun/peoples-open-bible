base_translation:
  language: en
  yaml_path: translation/ot/proverbs/017/014.yaml
  text: The beginning of strife is like letting out water[b][a]; so abandon the quarrel before it breaks out.
  footnotes:
  - marker: a
    text: Or 'The beginning of strife is like one who releases water'; the Hebrew image may suggest opening a breach in a dam or channel, after which the flow becomes hard to stop.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'breaks out' is difficult; alternatives include 'bursts forth' or 'is exposed/escalates.' The sense is that one should stop the dispute before it becomes openly unmanageable.
    reason: lexical_alternative
