translation:
  language: es
  text: de modo que el pueblo no pudo oír las trompetas[a] a causa del llanto del pueblo; porque la multitud las hacía sonar fuertemente[b], de manera que se oía desde lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de Esdras 3:11 habla de un gran grito de alabanza a Yahvé; aquí 1 Esdras presenta de manera más desarrollada el sonido de trompetas y el llanto del pueblo.
    reason: cross_reference
  - marker: b
    text: 'O: «los toques de trompeta». El griego dice literalmente «las trompetas», pero el sentido puede ser el sonido que producían.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de manera que
  lexicon: BDAG
  rationale: Introduce una cláusula de resultado en español natural y formal, manteniendo la fuerza consecutiva del griego sin volverla causal de más.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: Pueblo conserva el referente colectivo y la repetición del sustantivo del contexto, con registro bíblico claro en español.
- source_word: μὴ ἀκούειν
  english_pob_choice: could not hear
  chosen_spanish: no pudo oír
  alternatives_spanish:
  - no podía oír
  - no llegaba a oír
  lexicon: BDAG
  rationale: El griego expresa incapacidad resultante; en español, el pretérito perfecto simple comunica bien la imposibilidad en ese momento.
- source_word: τῶν σαλπίγγων
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - los toques de trompeta
  - las trompetas sonando
  lexicon: BDAG
  rationale: Se conserva el sustantivo concreto del griego. Aunque el sentido puede incluir el sonido, el texto griego nombra los instrumentos y el contexto permite esa metonimia.
- source_word: διὰ τὸν κλαυθμὸν
  english_pob_choice: because of the weeping
  chosen_spanish: a causa del llanto
  alternatives_spanish:
  - por el llanto
  - debido al llanto
  lexicon: BDAG
  rationale: κλαυθμός denota llanto audible o lamento; llanto mantiene el sentido sonoro y emocional en un español idiomático.
- source_word: ὁ γὰρ ὄχλος
  english_pob_choice: for the crowd
  chosen_spanish: porque la multitud
  alternatives_spanish:
  - pues la multitud
  - porque el gentío
  lexicon: BDAG
  rationale: Multitud reproduce bien ὄχλος en un contexto de masa pública y armoniza con el flujo causal de la oración.
- source_word: ἦν ὁ σαλπίζων μεγάλως
  english_pob_choice: was sounding them loudly
  chosen_spanish: las tocaba con gran fuerza
  alternatives_spanish:
  - las hacía resonar con fuerza
  - las sonaba con gran fuerza
  lexicon: BDAG
  rationale: El participio ὁ σαλπίζων describe a quien toca/sopla las trompetas; en español, tocar es la forma más natural para el instrumento, y con gran fuerza refleja μεγάλως sin exagerar. Se evita una paráfrasis más interpretativa como 'sonaba' para no perder el agente implícito.
- source_word: μακρόθεν
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - de lejos
  - a lo lejos
  lexicon: BDAG
  rationale: Desde lejos es una equivalencia directa y corriente en español, adecuada para el cierre de la frase.
- source_word: ἀκούεσθαι
  english_pob_choice: it was heard
  chosen_spanish: se oía
  alternatives_spanish:
  - era oído
  - podía oírse
  lexicon: BDAG
  rationale: La pasiva impersonal griega se expresa de forma natural con se oía, que evita una construcción rígida y conserva la audibilidad del sonido.
theological_decisions:
- issue: Relación con el paralelo hebreo de Esdras 3:11 y el matiz del relato
  english_pob_reading: The Hebrew parallel in Ezra 3:11 describes the people raising a great shout in praise to the LORD; 1 Esdras here foregrounds the sound of trumpets and weeping in a more expanded way.
  chosen_spanish_reading: Se mantiene el texto griego de 1 Esdras con trompetas y llanto, sin armonizarlo en la lectura principal con el paralelo hebreo.
  alternative_spanish_readings:
  - armonizar el pasaje con 'clamor de alabanza al Yahvé'
  - sustituir 'trompetas' por 'clamor' en el texto principal
  rationale: La prioridad textual recae en el griego de 1 Esdras. El paralelo hebreo sirve como nota de comparación, no como sustitución del contenido transmitido por este versículo.
  doctrine_reference: Principio de prioridad del testimonio textual base; uso de paralelos solo como apoyo crítico.
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete 1909 como ancla principal. El audit trail inglés mantiene la lectura de trompetas y weeping, con una nota de cruce al paralelo hebreo y una alternativa lexical sobre τῶν σαλπίγγων; la versión española conserva esa tensión sin armonizarla en el texto principal.
  spanish_consistency_notes:
  - Se usa Yahvé en notas de paralelo cuando se menciona el trasfondo de Esdras 3:11, conforme a la terminología base del proyecto.
  - Trompetas se mantiene en el texto principal por fidelidad al griego; la posible metonimia queda en nota.
  - Llanto se elige para κλαυθμός por su valor audible y emocional, sin cargarlo con un registro excesivamente litúrgico.
  - La pasiva impersonal se oía reproduce con naturalidad ἀκούεσθαι en español contemporáneo.
