translation:
  language: es
  text: 'Pero Yahvé dijo a David mi padre: «Porque estaba en tu corazón[b] edificar una casa[a] para mi nombre, hiciste bien, porque eso estaba en tu corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «templo». El hebreo dice literalmente «casa», pero en este contexto se refiere al templo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literal: «estaba con tu corazón». La traducción «estaba en tu corazón» conserva la metáfora hebrea de intención o deseo en español natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: se conserva el nombre divino en transliteración reverente. En español, ‘Yahvé’ es la forma usual y legible para preservar el nombre personal sin sustituirlo por un título.'
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: Es el verbo narrativo natural en español para introducir discurso directo, y mantiene con fidelidad la acción de decir.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi papá
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona indica una referencia filial directa de Salomón a David; ‘mi padre’ es la forma sobria y fiel.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: HALOT
  rationale: Las partículas introducen una causa. ‘Porque’ comunica con claridad la razón dada por Yahvé.
- source_word: הָיָה עִם לְבָבְךָ
  english_pob_choice: it was in your heart
  chosen_spanish: estaba en tu corazón
  alternatives_spanish:
  - estaba con tu corazón
  - lo tenías en tu corazón
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea del corazón como sede de intención y deseo, sin forzar una paráfrasis psicológica más alejada del texto.
- source_word: לִבְנוֹת בַּיִת
  english_pob_choice: to build a house
  chosen_spanish: edificar una casa
  alternatives_spanish:
  - construir una casa
  - edificar un templo
  lexicon: HALOT
  rationale: ‘Edificar’ reproduce bien el registro bíblico y evita la interpretación explícita ‘templo’, que el POB inglés decidió no imponer. ‘Casa’ conserva el sustantivo literal del hebreo.
- source_word: לִשְׁמִי
  english_pob_choice: for my name
  chosen_spanish: para mi nombre
  alternatives_spanish:
  - por causa de mi nombre
  - en honor de mi nombre
  lexicon: HALOT
  rationale: La expresión conserva el sentido teológico de una casa asociada al nombre de Dios. Se mantiene la forma literal del hebreo, como en el audit trail inglés.
- source_word: הֱטִיבֹתָ
  english_pob_choice: you did well
  chosen_spanish: hiciste bien
  alternatives_spanish:
  - has hecho bien
  - obraste bien
  lexicon: HALOT
  rationale: La aprobación divina se expresa de modo natural y directo en español. ‘Hiciste bien’ mantiene la evaluación positiva del original.
- source_word: כִּי הָיָה עִם לְבָבֶךָ
  english_pob_choice: that it was in your heart
  chosen_spanish: en tenerlo en tu corazón
  alternatives_spanish:
  - porque estaba en tu corazón
  - por haberlo tenido en tu corazón
  lexicon: HALOT
  rationale: Se preserva la repetición enfática del hebreo, pero en español se reordena ligeramente para evitar una repetición pesada. ‘Tenerlo en tu corazón’ refleja el mismo valor idiomático de intención.
theological_decisions:
- issue: Rendición del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la decisión del POB de no enmascarar el nombre divino con un título. ‘Yahvé’ es la transliteración estándar y reconocible en español para el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de בַּיִת en este contexto
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: El hebreo dice ‘casa’, y el texto puede referirse al templo por el contexto. Se conserva la literalidad para respetar la primacía del idioma original, sin eliminar la referencia implícita al santuario.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
- issue: Metáfora del corazón como sede de intención
  english_pob_reading: it was in your heart
  chosen_spanish_reading: estaba en tu corazón
  alternative_spanish_readings:
  - lo tenías en tu corazón
  - estaba en tu mente
  rationale: Se conserva la antropología bíblica del ‘corazón’ como lugar de intención, voluntad y deseo. No se reemplaza por ‘mente’ para no perder la imagen semítica.
  doctrine_reference: 'DOCTRINE.md: preserve source-language metaphor where intelligible'
translation_notes:
  revision_awareness: Se revisó el paralelo inglés del POB y se mantuvo su decisión principal sobre יְהוָה, בַּיִת y לִשְׁמִי. En español se ajustó el orden para que la frase sea publicable y natural sin perder la metáfora hebrea ni la evaluación divina positiva.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se conserva ‘corazón’ para לֵב/לְבָב, no ‘mente’.
  - ‘Casa’ se mantiene donde el hebreo dice בַּיִת, evitando imponer ‘templo’.
  - El tono es bíblico y sobrio, pero con español contemporáneo claro.
