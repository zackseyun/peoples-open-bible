    issue: «la llama» traduce φλὸξ con artículo definido
    rationale: 'La auditoría inglesa documenta valor indefinido: «a flame». En español, «una llama» preserva mejor esa fuerza y evita sugerir una referencia previamente definida.'
  - severity: low
    issue: «por el fuego» añade artículo innecesario
    rationale: El griego tiene πυρός anartro. Aunque el artículo es posible en español, «pasar por fuego» suena natural en cita poética y se ajusta mejor a la sobriedad del original.
  - severity: low
    issue: Puntuación final de la cita
    rationale: En español, el punto final de la oración se coloca normalmente dentro de las comillas cuando toda la oración citada cierra el enunciado.
