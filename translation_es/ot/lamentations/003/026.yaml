translation:
  language: es
  text: Es bueno esperar en silencio por la salvación de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es bueno esperar con esperanza y callar»; el verbo hebreo puede expresar una espera confiada, y «en silencio» también puede entenderse como «calladamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is good
  chosen_spanish: Bueno es
  alternatives_spanish:
  - Es bueno
  - Bueno es que
  lexicon: HALOT
  rationale: El hebreo presenta un predicado en cláusula nominal; «Bueno es» conserva esa valoración sin forzar un verbo ajeno al texto. En español suena natural y mantiene el juicio de conveniencia o bondad.
- source_word: יָחִיל
  english_pob_choice: to wait
  chosen_spanish: esperar
  alternatives_spanish:
  - aguardar
  - esperar con esperanza
  - esperar confiadamente
  lexicon: HALOT
  rationale: El verbo admite la idea de esperar con expectación. «Esperar» es la opción más natural en español y deja implícito el matiz de esperanza que el contexto aporta.
- source_word: דוּמָם
  english_pob_choice: quietly
  chosen_spanish: en silencio
  alternatives_spanish:
  - calladamente
  - quietamente
  - en quietud
  lexicon: HALOT
  rationale: El adverbio expresa silencio o quietud; «en silencio» reproduce mejor esa fuerza semántica que «quietamente», y mantiene la relación adverbial con «esperar».
- source_word: לִתְשׁוּעַת
  english_pob_choice: for the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - el rescate
  - la victoria
  lexicon: HALOT
  rationale: תְּשׁוּעָה puede significar salvación o liberación. «Salvación» conserva el alcance teológico y corresponde al objeto de la espera en el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio en español según la convención POB. No se sustituye por un título como «el SEÑOR», para preservar la transparencia del texto fuente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton; la convención del proyecto es transliterarlo como «Yahvé». Esto preserva el nombre personal de Dios y evita una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el criterio auditado de la POB inglesa: predicado nominal en la primera mitad, verbo de espera con matiz de esperanza, adverbio de silencio, y el nombre divino rendido como Yahvé. No se detectaron revisiones posteriores que requirieran ajuste.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» para יְהוָה conforme a la convención de transparencia del proyecto.
  - «Esperar» se eligió como equivalente natural de יָחִיל sin perder el matiz de esperanza, que queda recogido en la nota.
  - «En silencio» conserva la ambigüedad entre silencio exterior y quietud interior sin añadir contenido ajeno al verso.
