- from: Y cuando el cuerpo tenga en su piel una inflamación[a], y se haya sanado[c][b],
  to: Y cuando el cuerpo tenga en su piel un forúnculo[a], y se sane[c][b],
  rationale: Se corrige שְׁחִין a «forúnculo» para conservar mejor el referente léxico concreto de una lesión tipo boil en contexto dermatológico. Se reemplaza «se haya sanado» por «se sane» para reflejar el hebreo de manera más natural y simple en español jurídico-casuístico. También se ajusta la nota alternativa de וְנִרְפָּא para alinearla con el audit trail inglés.
