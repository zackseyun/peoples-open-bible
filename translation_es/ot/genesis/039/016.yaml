translation:
  language: es
  text: Entonces guardó su prenda junto a ella, hasta que su amo vino a su casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'a su casa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּנַּח
  english_pob_choice: So she kept
  chosen_spanish: Así dejó
  alternatives_spanish:
  - Así puso
  - Así colocó
  - Así guardó
  lexicon: HALOT
  rationale: El verbo נוח en esta forma narrativa puede abarcar 'poner/colocar/dejar'. En contexto, ella conserva la prenda como evidencia, pero el hebreo describe la acción de dejarla en un lugar; 'dejó' mantiene esa acción sin añadir una noción más interpretativa que el texto no exige.
- source_word: בִּגְדוֹ
  english_pob_choice: his garment
  chosen_spanish: su vestido
  alternatives_spanish:
  - su prenda
  - su ropa
  - su manto
  lexicon: HALOT
  rationale: בגד es un término general para prenda o ropa. 'Vestido' funciona en español bíblico amplio como prenda exterior o indumentaria, sin precisar de más lo que el hebreo no especifica.
- source_word: אֶצְלָהּ
  english_pob_choice: beside her
  chosen_spanish: junto a ella
  alternatives_spanish:
  - al lado de ella
  - cerca de ella
  - con ella
  lexicon: HALOT
  rationale: La preposición אצל expresa cercanía espacial. 'Junto a ella' conserva esa proximidad de manera natural en español.
- source_word: עַד בּוֹא
  english_pob_choice: until ... came
  chosen_spanish: hasta que ... vino
  alternatives_spanish:
  - hasta que ... llegó
  - hasta el venir de
  lexicon: HALOT
  rationale: La construcción temporal se rinde de forma natural con una cláusula finita en español. 'Hasta que vino' mantiene la relación temporal del hebreo sin rigidizar la sintaxis.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su patrón
  - su dueño
  lexicon: HALOT
  rationale: En el contexto de esclavitud/servicio, אדון refiere al superior humano de José. 'Amo' preserva la fuerza relacional del término mejor que 'señor', que en español puede sonar demasiado honorífico o eclesiástico.
- source_word: אֶל בֵּיתוֹ
  english_pob_choice: into his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su casa
  - dentro de su casa
  - en su casa
  lexicon: HALOT
  rationale: La preposición אל indica movimiento hacia el lugar. 'A su casa' es la equivalencia española más natural y conserva el matiz direccional del hebreo.
translation_notes:
  revision_awareness: 'Se siguió el alto acuerdo del cotejo final: el inglés PO B había revisado la última cláusula de ''came home'' a ''came into his house'' para corresponder más de cerca al hebreo. En español se mantuvo esa direccionalidad con ''a su casa''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' para אדון porque aquí no es el nombre divino ni un título reverencial, sino el amo humano de José.
  - Se eligió un verbo simple ('dejó') para וַתַּנַּח porque el valor narrativo principal es la colocación/abandono de la prenda, no una paráfrasis de retención.
  - '''A su casa'' conserva el movimiento del hebreo אל ביתו sin sobrecargar con ''dentro de'' salvo que el contexto requiriera enfatizar el ingreso.'
