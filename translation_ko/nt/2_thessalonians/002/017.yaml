id: 2TH.2.17
reference: 2 Thessalonians 2:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: παρακαλέσαι ὑμῶν τὰς καρδίας καὶ ⸀στηρίξαι ἐν παντὶ ⸂ἔργῳ καὶ λόγῳ⸃ ἀγαθῷ.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/017.yaml
  text: encourage your hearts and strengthen them in every good work and word[a][b].
translation:
  language: ko
  text: 여러분의 마음을 격려하시고 모든 선한 일과 말 가운데서 굳게 하시기를 빕니다[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분의 마음을 위로하시고」. 헬라어 παρακαλέω는 격려·위로·권면의 의미를 함께 가진다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「세우시고」, 「견고하게 하시고」. 헬라어 στηρίζω는 「견고하게 함」의 의미이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλέσαι
  english_pob_choice: encourage
  chosen_korean: 격려하시고
  alternatives_korean:
  - 위로하시고
  - 권면하시고
  lexicon: BDAG
  rationale: 16절 「격려」(παράκλησις)와 어휘적 일관을 유지한다. 합쇼체 + 신적 주어 경어로 「격려하시고」.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_korean: 마음
  alternatives_korean:
  - 내면
  - 가슴
  lexicon: BDAG
  rationale: 「마음」이 카르디아의 성경적 인간론을 가장 잘 보존한다.
- source_word: στηρίξαι
  english_pob_choice: strengthen
  chosen_korean: 굳게 하시기를
  alternatives_korean:
  - 견고하게 하시기를
  - 세우시기를
  lexicon: BDAG
  rationale: στηρίζω의 「견고하게 만들다」 의미를 「굳게 하다」로 자연스럽게 표현한다. 16절의 기원적 어조를 「~하시기를 빕니다」로 종결한다.
- source_word: ἐν παντὶ
  english_pob_choice: in every
  chosen_korean: 모든 ~ 가운데서
  alternatives_korean:
  - 모든 ~에서
  - 모든 ~에 있어
  lexicon: BDAG
  rationale: ἐν + 여격의 영역적 의미.
- source_word: ἔργῳ
  english_pob_choice: work
  chosen_korean: 일
  alternatives_korean:
  - 행위
  - 행함
  lexicon: BDAG
  rationale: 「말」과 짝을 이루는 「일」로 자연스럽게 표현.
- source_word: λόγῳ
  english_pob_choice: word
  chosen_korean: 말
  alternatives_korean:
  - 말씀
  - 언사
  lexicon: BDAG
  rationale: 「일과 말」 짝의 정형 표현. 인간 발화를 가리키므로 「말씀」보다 「말」.
- source_word: ἀγαθῷ
  english_pob_choice: good
  chosen_korean: 선한
  alternatives_korean:
  - 좋은
  - 의로운
  lexicon: BDAG
  rationale: 도덕적 선을 가리키는 표준 어휘.
theological_decisions:
- issue: καρδία의 한국어 번역
  chosen_reading: 마음
  alternative_readings:
  - 내면
  - 가슴
  rationale: 성경적 카르디아는 사고·의지·감정의 중심을 포괄한다. 한국어 「마음」이 이를 보존한다.
  doctrine_reference: 'Translation philosophy §1, §6'
