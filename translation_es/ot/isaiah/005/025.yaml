review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: mantiene la ira de Yahvé que arde, la mano extendida en juicio, el temblor de los montes, los cadáveres en las calles y el estribillo final de juicio no agotado. Sin embargo, hay dos problemas de fidelidad editorial: el marcador de nota [a] está anclado en «pueblo», cuando la alternativa léxica corresponde a כַּסּוּחָה («como basura/desechos»), y la nota misma dice «como barrido», formulación menos natural que «como desechos barridos» o «como barrido[s]».'
  spanish_quality_summary: El español es mayormente claro, digno y natural. «Por tanto», «la ira de Yahvé ardió», «los montes temblaron» y «sus cadáveres» funcionan bien. «Con todo esto» es aceptable para el refrán isaiano, aunque «A pesar de todo esto» o «Por todo esto» cambiarían el matiz; no es necesario corregirlo. La principal reparación es reubicar la nota al término correcto y mejorar su redacción para que suene idiomática en español.
  glossary_alignment: El borrador usa correctamente «Yahvé» para יהוה y preserva la imaginería antropomórfica exigida por el proyecto. No hay conflicto serio con la terminología base. La decisión «basura» para כַּסּוּחָה es defendible, pero la alternativa documentada debe aparecer como nota en el punto léxico pertinente, no sobre «pueblo».
  issues:
  - severity: high
    issue: El marcador de la nota [a] está colocado sobre «pueblo» en vez de sobre «basura».
    rationale: La nota léxica documenta una alternativa para כַּסּוּחָה, no para בְּעַמּוֹ. Tal como está, el aparato sugiere erróneamente que la nota explica «su pueblo», lo cual distorsiona la trazabilidad con la evidencia fuente y el audit trail inglés.
  - severity: medium
    issue: La redacción de la nota «O ‘como barrido’» es poco natural y algo imprecisa en español.
    rationale: El hebreo se refiere a algo barrido o desechado; en español «como barrido» suena truncado. Conviene una formulación idiomática que preserve la alternativa léxica sin perder claridad, por ejemplo «O ‘como desechos barridos’» o «O ‘como barrido’, es decir, algo barrido y desechado».
  revised_spanish_text: Por tanto, la ira de Yahvé ardió contra su pueblo, extendió su mano contra ellos y los hirió; los montes temblaron, y sus cadáveres fueron como basura[a] en medio de las calles. Con todo esto, su ira no se ha apartado, y todavía su mano está extendida.
  revised_footnotes:
  - marker: a
    text: O «como desechos barridos»; el término hebreo se refiere a algo barrido o desechado.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al término correcto («basura» = כַּסּוּחָה) para mantener la trazabilidad con la evidencia fuente y el audit trail inglés, y se mejora la redacción de la alternativa léxica en español para que sea natural y precisa. No se requieren otros cambios sustanciales.
