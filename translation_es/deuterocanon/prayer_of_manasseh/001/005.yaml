  to: ante quien todo[a] se estremece y tiembla a la presencia de tu poder, porque la majestad de tu gloria es insoportable[b], y la ira de tu amenaza contra los pecadores es imposible de soportar[c].
  rationale: La revisión corrige el orden de los verbos para reflejar mejor φρίσσει καὶ τρέμει y reancla las notas para que cada alternativa corresponda a la cláusula correcta. También elimina una nota heredada del inglés que no funciona como nota útil en español y que en el borrador estaba aplicada erróneamente al segmento equivocado.
