id: ISA.19.21
reference: Isaiah 19:21
source:
  edition: WLC
  text: וְ/נוֹדַ֤ע יְהוָה֙ לְ/מִצְרַ֔יִם וְ/יָדְע֥וּ מִצְרַ֛יִם אֶת יְהוָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא וְ/עָֽבְדוּ֙ זֶ֣בַח וּ/מִנְחָ֔ה וְ/נָדְרוּ נֵ֥דֶר לַֽ/יהוָ֖ה וְ/שִׁלֵּֽמוּ־־׃
translation:
  text: And Yahweh will make himself known to Egypt[a], and Egypt will know Yahweh in that day, and they will serve with sacrifice and offering[c][b], and they will vow vows to Yahweh and fulfill them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD will be known to Egypt.' The Hebrew verb can be rendered more passively, but the main text brings out the sense of divine self-disclosure.
    reason: lexical_alternative
  - marker: b
    text: Or, 'they will serve with sacrifice and offering.' The Hebrew verb can mean 'serve,' but here it refers to worship in a sacrificial context.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'vow vows,' an emphatic expression meaning they will make vows to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנוֹדַע
  chosen: will make himself known
  alternatives:
  - will be known
  - will become known
  lexicon: HALOT
  rationale: Niphal of ידע can be rendered either statively ('be known') or with a passive/reflexive nuance. In English, 'will make himself known' best conveys the sense that the LORD becomes known to Egypt through his own self-disclosure, while remaining natural and preserving the divine agency implied by context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְמִצְרַיִם
  chosen: to Egypt
  alternatives:
  - by Egypt
  - among Egypt
  lexicon: HALOT
  rationale: 'The preposition ל with נודע here is best taken as marking the people to whom the LORD becomes known: ''to Egypt.'' This is more idiomatic and contextually precise than ''by Egypt.'''
- source_word: וְיָדְעוּ מִצְרַיִם אֶת־יְהוָה
  chosen: and Egypt will know the LORD
  alternatives:
  - and the Egyptians will know the LORD
  lexicon: HALOT
  rationale: The proper noun מִצְרַיִם can stand for the nation collectively. 'Egypt will know' preserves the corporate singular sense and matches the preceding clause, while still naturally referring to the people of Egypt.
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: This prophetic temporal formula is conventionally and accurately rendered 'in that day.' Either preposition is possible in English, but 'in' fits prophetic style well.
- source_word: וְעָבְדוּ
  chosen: they will worship
  alternatives:
  - they will serve
  lexicon: HALOT
  rationale: The verb עבד can mean 'serve' or 'worship.' Because it is immediately followed by sacrificial terms ('sacrifice and offering'), cultic worship is clearly in view, so 'worship' is the more precise rendering.
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - slaughter offering
  lexicon: HALOT
  rationale: זבח in sacrificial context is well rendered 'sacrifice.' A more technical gloss would be less readable and is not required by the context.
- source_word: וּמִנְחָה
  chosen: offering
  alternatives:
  - grain offering
  - gift offering
  lexicon: HALOT
  rationale: מנחה can denote a gift or tribute and in cultic settings often a grain offering. Here, paired generally with זבח, 'offering' preserves readability and broad sacrificial sense without over-specifying beyond what the immediate English context requires.
- source_word: וְנָדְרוּ נֵדֶר
  chosen: they will vow vows
  alternatives:
  - they will make a vow
  - they will vow a vow
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative for emphasis. 'Vow vows' preserves that emphasis more transparently than smoothing to the singular, while remaining understandable in English.
- source_word: וְשִׁלֵּמוּ
  chosen: and fulfill them
  alternatives:
  - and pay them
  - and perform them
  lexicon: HALOT
  rationale: The verb שלם with vows means to pay or fulfill them. 'Fulfill them' communicates the idiomatic sense clearly in modern English; the plural pronoun makes explicit the implied object, namely the vows.
