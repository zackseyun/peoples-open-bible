translation:
  language: es
  text: 'Ve y dile a mi siervo David[a]: «Así dice Yahvé: ¿Me edificarás tú una casa para que yo habite en ella?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Eres tú el que me edificará una casa para que yo habite en ella?» o «¿Acaso me edificarás tú una casa para que yo habite en ella?». La pregunta hebrea es enfática y retórica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: HALOT
  rationale: El imperativo breve de הלך se expresa de forma natural en español con «Ve», manteniendo la fuerza directa de la orden sin añadir matices innecesarios.
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y dile
  alternatives_spanish:
  - y dirás
  - entonces dile
  lexicon: HALOT
  rationale: La secuencia imperativa se vuelve más idiomática en español con «y dile», conservando el valor exhortativo del hebreo sin sonar forzado.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: En este contexto real y pactal, עבד funciona como designación honorífica. «Siervo» preserva el registro bíblico y la relación de pertenencia al servicio de Yahvé, sin cargar la idea de esclavitud literal.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética clásica con el nombre divino explícito, conforme a la norma del proyecto para יהוה.
- source_word: הַאַתָּה
  english_pob_choice: Would you
  chosen_spanish: ¿Tú…?
  alternatives_spanish:
  - ¿Acaso tú…?
  - ¿Serías tú…?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica enfática. En español, la inversión y el énfasis se expresan de manera más natural con una interrogación directa; el valor retórico se completa en la estructura de toda la frase.
- source_word: תִּבְנֶה לִּי בַיִת
  english_pob_choice: build a house for me
  chosen_spanish: me edificarás una casa
  alternatives_spanish:
  - me construirás una casa
  - me levantarás una casa
  lexicon: HALOT
  rationale: «Edificar» mantiene el tono bíblico y la metáfora de בַיִת como «casa», que el contexto desarrolla literaria y teológicamente. Se evita «templo» para no adelantar una especificación que el hebreo no verbaliza aquí.
- source_word: לְשִׁבְתִּי
  english_pob_choice: to dwell in
  chosen_spanish: para que yo habite en ella
  alternatives_spanish:
  - para habitar en ella
  - para mi morada
  lexicon: HALOT
  rationale: 'El infinitivo constructo con sufijo expresa finalidad: una casa para la morada de Yahvé. «Para que yo habite en ella» hace explícita la referencia pronominal y preserva el sentido de destino/purpose del hebreo.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la guía del proyecto, se evita la sustitución por «SEÑOR» y se emplea la forma española establecida «Yahvé», que conserva el nombre personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor de בַיִת en el contexto de la promesa davídica
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  - morada
  rationale: «Casa» conserva el vínculo verbal y temático con el pasaje, donde el contraste entre la casa que David construiría y la casa que Dios edificará para David es decisivo. «Templo» sería interpretativo y reduciría el juego literario del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Carácter retórico de la pregunta hebrea
  english_pob_reading: Would you build a house for me to dwell in?
  chosen_spanish_reading: ¿Tú me edificarás una casa para que yo habite en ella?
  alternative_spanish_readings:
  - ¿Acaso tú me edificarás una casa para que yo habite en ella?
  - ¿Me edificarás tú una casa para que yo habite en ella?
  rationale: La sintaxis española puede expresar la fuerza retórica del hebreo sin traducirla mecánicamente. La forma elegida conserva la pregunta enfática y deja abierta la misma tensión que resalta el inglés POB.
  doctrine_reference: 2 Samuel 7:5, nota auditada sobre la pregunta enfática
translation_notes:
  revision_awareness: Seguí el ajuste auditado del inglés POB que elimina una redundancia sintáctica innecesaria antes de David, manteniendo el sentido appositivo del hebreo. También preservé la decisión revisada de no sustituir el nombre divino por «SEÑOR», y mantuve «casa» en lugar de «templo» para conservar el juego literario del contexto. La pregunta retórica se hizo natural en español sin perder su fuerza enfática.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme a la política del proyecto.
  - Se prefiere «siervo» para עבד en este contexto de servicio real y pactal.
  - «Casa» se conserva para בַיִת por su valor intertextual en el capítulo.
  - La nota al pie marca la alternativa retórica explícita sin duplicar marcadores ni introducir variantes no atestiguadas.
