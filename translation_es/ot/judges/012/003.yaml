translation:
  language: es
  text: Cuando vi que no estaban librándonos[a], puse mi vida en mi mano y avancé contra los amonitas, y Yahvé los entregó en mi mano. Así que, ¿por qué han subido hoy contra mí para pelear contra mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «puse mi vida en mi mano», un modismo que significa «arriesgué mi vida».'
    reason: cultural_note
lexical_decisions:
- source_word: וָאֶרְאֶה
  english_pob_choice: When I saw
  chosen_spanish: Cuando vi
  alternatives_spanish:
  - Y vi
  - Y cuando vi
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce la percepción que da pie a la acción siguiente; en español, 'Cuando vi' conserva mejor el valor temporal-causal que un simple 'Y vi'.
- source_word: כִּי אֵינְךָ מוֹשִׁיעַ
  english_pob_choice: that you were not delivering us
  chosen_spanish: que no estabas liberándonos
  alternatives_spanish:
  - que no estabas salvándonos
  - que no había quien nos librara
  lexicon: HALOT
  rationale: מוֹשִׁיעַ en contexto bélico expresa rescate/liberación. 'Liberándonos' mantiene el objeto implícito ('nos') como en la revisión inglesa y evita cargar el verbo con un matiz soteriológico excesivo.
- source_word: וָאָשִׂימָה נַפְשִׁי בְכַפִּי
  english_pob_choice: I put my life in my hand
  chosen_spanish: puse mi vida en mi mano
  alternatives_spanish:
  - arriesgué mi vida
  - tomé mi vida en mi mano
  lexicon: HALOT
  rationale: La imagen hebrea de 'poner la vida en la mano' se conserva en español de forma natural; el sentido idiomático de arriesgar la vida queda implícito sin perder la metáfora.
- source_word: וָאֶעְבְּרָה אֶל בְּנֵי עַמּוֹן
  english_pob_choice: and crossed over against the Ammonites
  chosen_spanish: y crucé contra los amonitas
  alternatives_spanish:
  - y pasé contra los amonitas
  - y avancé contra los amonitas
  lexicon: HALOT
  rationale: עָבַר con אֶל en narración de guerra puede implicar movimiento hostil hacia el enemigo. 'Crucé contra' conserva el valor de movimiento y agresión sin sobrerrepresentar una marcha militar específica.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: El etnónimo español estándar es el más claro y natural en una traducción de lectura pública.
- source_word: וַיִּתְּנֵם יְהוָה בְּיָדִי
  english_pob_choice: and Yahweh gave them into my hand
  chosen_spanish: Yahvé los entregó en mi mano
  alternatives_spanish:
  - Yahvé los puso en mi poder
  - Yahvé me los entregó
  lexicon: HALOT
  rationale: La fórmula de victoria se conserva con 'entregó en mi mano', manteniendo el idiomatismo hebreo y la agencia divina. 'Yahvé' sigue el estándar español del proyecto para יְהוָה.
- source_word: וְלָמָה עֲלִיתֶם אֵלַי
  english_pob_choice: So why have you come up against me
  chosen_spanish: Así que, ¿por qué han subido hoy contra mí?
  alternatives_spanish:
  - Entonces, ¿por qué han subido contra mí?
  - ¿Por qué han venido hoy contra mí?
  lexicon: HALOT
  rationale: '''Subir contra'' reproduce el uso militar de עָלָה. La pregunta retórica se vuelve natural en español con ''¿por qué han subido...?''.'
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Equivalente idiomático moderno y suficientemente fiel al deíctico hebreo.
- source_word: לְהִלָּחֶם בִּי
  english_pob_choice: to fight against me
  chosen_spanish: para pelear contra mí
  alternatives_spanish:
  - para combatir contra mí
  - para luchar contra mí
  lexicon: HALOT
  rationale: El infinitivo de לחם con ב expresa combate hostil. 'Pelear contra mí' es claro y natural en español; conserva la fuerza adversativa del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton. Siguiendo la política del proyecto, se traduce con el nombre divino explícito 'Yahvé', no con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Objeto implícito de 'deliver'
  english_pob_reading: you were not delivering us
  chosen_spanish_reading: no estabas liberándonos
  alternative_spanish_readings:
  - no nos estabas salvando
  - no nos estabas librando
  rationale: La revisión inglesa agregó 'us' por el objeto implícito del hebreo. En español conviene hacerlo explícito con '-nos' para reflejar la referencia del hablante a su pueblo sin añadir contenido ajeno.
  doctrine_reference: 'Applied revision: 2026-04-23T11:07:15Z'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, incorporando el objeto implícito ('nos') en el verbo de rescate. También se preservó la imagen idiomática hebrea de 'poner la vida en la mano' y la fórmula de victoria con 'entregó en mi mano'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conservó la imagen corporal 'en mi mano' en lugar de sustituirla por una paráfrasis explicativa en el texto principal.
  - '''Amonitas'' se usa como etnónimo estándar y uniforme.'
  - La pregunta retórica se ordenó con puntuación española natural sin suavizar el tono acusatorio del hebreo.
