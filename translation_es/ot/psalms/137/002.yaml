translation:
  language: es
  text: Sobre los álamos[a] en medio de ella[b] colgamos nuestras liras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «sauces». El término hebreo puede referirse a árboles de tipo sauce o álamo; «sauces» es la traducción tradicional.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en su interior». El sufijo femenino singular remite al referente del contexto anterior, probablemente Babilonia.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «arpas». El hebreo kinnor denota un antiguo instrumento de cuerda, probablemente una lira.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: 'On'
  chosen_spanish: Junto a
  alternatives_spanish:
  - Sobre
  - En
  lexicon: HALOT
  rationale: La preposición hebrea expresa ubicación sobre o junto a un objeto. En español, "junto a" comunica la colocación física sin sonar forzado ni sugerir necesariamente apoyo encima de las ramas.
- source_word: עֲרָבִים
  english_pob_choice: poplars
  chosen_spanish: álamos
  alternatives_spanish:
  - sauces
  - álamos temblones
  lexicon: HALOT
  rationale: El término hebreo puede referirse a árboles de tipo sauce o álamo. Sigo la decisión inglesa de preferir una opción botánica concreta y natural en español. "Álamos" mantiene bien la imagen y evita una calca menos idiomática.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in its midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - en medio de esto
  lexicon: HALOT
  rationale: El sufijo femenino singular apunta al referente inmediato del contexto. "En medio de ella" conserva la referencia pronominal y el valor locativo sin especificar de más en el texto principal.
- source_word: תָּלִינוּ
  english_pob_choice: we hung
  chosen_spanish: colgamos
  alternatives_spanish:
  - colgamos allí
  - suspendimos
  lexicon: HALOT
  rationale: El verbo simple expresa la acción de colgar. "Colgamos" es natural en español y conserva la imagen poética de dejar los instrumentos colgados como señal de duelo.
- source_word: כִּנֹּרוֹתֵינוּ
  english_pob_choice: our lyres
  chosen_spanish: nuestras liras
  alternatives_spanish:
  - nuestros arpa[s]
  - nuestros instrumentos de cuerda
  lexicon: HALOT
  rationale: כִּנּוֹר designa un antiguo instrumento de cuerda, más precisamente una lira. "Liras" es claro y bastante preciso en español; "arpas" queda como alternativa tradicional menos exacta.
translation_notes:
  revision_awareness: El texto inglés revisado mantiene la lectura botánica preferida ('poplars') y la precisión instrumental ('lyres'), sin cambios en la evaluación de alta concordancia. La versión española sigue esas decisiones con equivalentes naturales y precisos.
  spanish_consistency_notes:
  - Se mantiene el registro poético y sobrio del versículo.
  - Se conserva la referencia pronominal de «ella» para el antecedente inmediato, sin añadir explicaciones al cuerpo del verso.
  - Las alternativas tradicionales quedan en notas para respetar la tensión lexical documentada.
