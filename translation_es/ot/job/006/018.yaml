review_pass:
  verdict: revise
  source_alignment_summary: 'La base del borrador sigue bien el sentido del hebreo: אָרְחוֹת ... דַּרְכָּם = «Los senderos de su camino», יִלָּפְתוּ = «se desvían», יַעֲלוּ = «suben», y וְיֹאבֵדוּ = «y perecen». Sin embargo, בַתֹּהוּ expresa movimiento hacia/into un lugar de desolación o vacío; «por la desolación» sugiere tránsito dentro de un medio más que entrada en el yermo. Conviene ajustar a «al yermo» o «a la desolación».'
  spanish_quality_summary: El español es claro y digno, pero «suben por la desolación» suena algo forzado e idiomáticamente menos natural que una construcción direccional. La nota al pie también se aleja del inglés auditado al cambiar «tracks» por «caminos de sus rutas», que suena torpe, y al reducir «waste» a «desierto», más específico que el hebreo. Una pequeña reparación mejora fidelidad y legibilidad.
  glossary_alignment: No hay términos del glosario teológico principal implicados. Las decisiones léxicas generales son sólidas. La principal excepción es בַתֹּהוּ, donde el español debe reflejar mejor el valor direccional de la preposición y el campo semántico de «wasteland/desolación/yermo».
  issues:
  - severity: medium
    issue: «por la desolación» no refleja bien בַתֹּהוּ
    rationale: La preposición ב aquí, en este contexto de movimiento con יַעֲלוּ, fue entendida en la auditoría inglesa como direccional («into wasteland»). «Por» sugiere recorrido a través de la desolación, no entrada o ascenso hacia el yermo.
  - severity: low
    issue: 'La nota al pie introduce una formulación española torpe: «Los caminos de sus rutas»'
    rationale: No corresponde bien a las alternativas documentadas («caravan tracks», «paths») y suena poco natural en español. Debe reformularse para preservar la dificultad del hebreo y la opción de «rutas de caravanas» sin crear una expresión extraña.
  - severity: low
    issue: La nota al pie usa «desierto» donde el texto principal procura mantener la amplitud de תֹהוּ
    rationale: «Desierto» restringe el sentido frente a «waste/wasteland/desolación/yermo». En la nota conviene conservar una opción más amplia, como «yermo» o «desolación».
  revised_spanish_text: Los senderos de su camino se desvían[a]; suben al yermo y perecen.
  revised_footnotes:
  - marker: a
    text: 'O: «Las rutas de caravanas se desvían; suben al yermo y desaparecen». El hebreo es difícil, y algunos entienden que el versículo habla de caravanas más que de los senderos o cauces mismos.'
    reason: alternative_reading
  revision_rationale: Se ajusta «por la desolación» a «al yermo» para reflejar mejor el movimiento direccional y el sentido de תֹהוּ en contexto. Se mejora la nota al pie para que sea natural en español y más fiel a las alternativas registradas en la auditoría inglesa, preservando la ambigüedad entre senderos/cauces y caravanas.
