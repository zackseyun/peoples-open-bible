revisions:
- from: Porque Dios[a], que gobierna sobre todo, ha hecho de esto una alegría para ellos, en lugar de la destrucción del linaje escogido.
  to: Porque Dios, que gobierna sobre todo, ha hecho esto motivo de alegría para ellos, en lugar de la destrucción del pueblo escogido[a].
  rationale: Se revisa para mejorar la naturalidad del español y reflejar mejor el sentido corporativo de γένος en contexto. ‘Ha hecho esto motivo de alegría para ellos’ expresa con claridad el valor de ἐποίησεν… εὐφροσύνην, y ‘pueblo escogido’ comunica mejor la referencia comunitaria que ‘linaje escogido’, dejando esta última como alternativa léxica documentada.
