translation:
  language: es
  text: Entonces los hombres de Israel y de Judá se levantaron y gritaron, y persiguieron a los filisteos hasta Gai[a] y hasta las puertas de Ecrón. Los filisteos caídos yacían por el camino hacia Shaaraim, hasta Gat y hasta Ecrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo difícil. La revisión inglesa optó por reflejar Gai como nombre propio para no borrar la ambigüedad del texto; otros entienden aquí «la entrada del valle».
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: HALOT
  rationale: En contexto militar, el verbo expresa una reacción súbita y una movilización; «se levantaron» mantiene esa inmediatez en español sin sonar arcaico.
- source_word: אַנְשֵׁי יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: the men of Israel and Judah
  chosen_spanish: los hombres de Israel y de Judá
  alternatives_spanish:
  - los hombres de Israel y Judá
  - los israelitas y los hombres de Judá
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». Se conserva el matiz masculino y militar del hebreo, y la preposición doble hace claro que «Israel» y «Judá» ambos dependen de «hombres de».
- source_word: וַיָּרִיעוּ
  english_pob_choice: shouted
  chosen_spanish: gritaron
  alternatives_spanish:
  - alzaron un grito de guerra
  - dieron un grito
  lexicon: HALOT
  rationale: El verbo puede denotar un grito de guerra; en español «gritaron» es natural y no añade interpretación excesiva, aunque el contexto bélico conserva la fuerza marcial.
- source_word: וַיִּרְדְּפוּ
  english_pob_choice: they pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - dieron caza a
  - siguieron persiguiendo
  lexicon: HALOT
  rationale: רדף en contexto militar se traduce con precisión como «persiguieron». Es el equivalente más directo y auditable.
- source_word: עַד בּוֹאֲךָ גַיְא
  english_pob_choice: as far as Gai
  chosen_spanish: hasta Gai
  alternatives_spanish:
  - hasta la entrada del valle
  - hasta el acceso al valle
  lexicon: HALOT
  rationale: La revisión inglesa decidió reflejar Gai como nombre propio en vez de interpretar la frase como «entrada del valle». Siguiendo ese juicio textual, se mantiene «Gai» en español para no borrar la dificultad del hebreo.
- source_word: שַׁעֲרֵי עֶקְרוֹן
  english_pob_choice: the gates of Ekron
  chosen_spanish: las puertas de Ecrón
  alternatives_spanish:
  - las puertas de Ekron
  - las entradas de Ecrón
  lexicon: HALOT
  rationale: Se conserva el plural literal «puertas» y se translitera el topónimo según una forma española estable y legible, «Ecrón».
- source_word: חַלְלֵי פְלִשְׁתִּים
  english_pob_choice: the slain Philistines
  chosen_spanish: los filisteos muertos
  alternatives_spanish:
  - los filisteos caídos
  - los filisteos muertos en combate
  lexicon: HALOT
  rationale: חַלְלֵי denota los muertos/slain de batalla. En español, «los filisteos muertos» preserva el sentido básico sin introducir una frase nominal más elaborada que el hebreo no exige.
- source_word: בְּדֶרֶךְ שַׁעֲרַיִם
  english_pob_choice: along the road to Shaaraim
  chosen_spanish: por el camino de Shaaraim
  alternatives_spanish:
  - a lo largo del camino de Shaaraim
  - en el camino hacia Shaaraim
  lexicon: HALOT
  rationale: בדרך indica la ruta o vía por donde ocurrieron los cadáveres; «por el camino de Shaaraim» es natural en español y mantiene la ambigüedad direccional sin forzarla.
- source_word: שַׁעֲרַיִם
  english_pob_choice: Shaaraim
  chosen_spanish: Shaaraim
  alternatives_spanish:
  - Saaraim
  lexicon: HALOT
  rationale: Nombre de lugar. Se translitera en vez de traducirlo para conservar la referencia geográfica precisa.
- source_word: גַּת
  english_pob_choice: Gath
  chosen_spanish: Gat
  alternatives_spanish:
  - Gath
  lexicon: HALOT
  rationale: Topónimo bíblico transliterado a la forma española tradicional y clara, «Gat».
- source_word: עֶקְרוֹן
  english_pob_choice: Ekron
  chosen_spanish: Ecrón
  alternatives_spanish:
  - Ekron
  lexicon: HALOT
  rationale: Topónimo bíblico transliterado con forma española legible, «Ecrón».
theological_decisions:
- issue: ¿Debe suavizarse la expresión de derrota total en la enumeración geográfica?
  english_pob_reading: The slain Philistines fell along the road to Shaaraim, as far as Gath and as far as Ekron.
  chosen_spanish_reading: Los filisteos muertos cayeron por el camino de Shaaraim, hasta Gat y hasta Ecrón.
  alternative_spanish_readings:
  - Los cadáveres de los filisteos cayeron...
  - Los filisteos caídos cayeron...
  rationale: Se conserva la imagen de abatimiento y alcance geográfico sin añadir un término más fuerte que el hebreo. La frase sigue siendo de derrota militar total, pero la traducción no la exagera.
  doctrine_reference: Narrativa histórica; no hay afirmación doctrinal explícita.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una interpretación explicativa («the entrance to the valley») por el nombre propio «Gai» para ser más fiel al hebreo difícil. Esta versión española sigue esa decisión y conserva también la repetición enfática de «hasta... y hasta...» en los límites geográficos.
  spanish_consistency_notes:
  - Se usó «Yahvé» según las normas del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «Judá» y «Ecrón» con acentos normativos en español.
  - Se mantuvo la estructura de límites geográficos repetidos para reflejar la fuerza del hebreo.
  - «Gai» se dejó sin explicar en el cuerpo para respetar la decisión textual; la nota da la alternativa interpretativa.
