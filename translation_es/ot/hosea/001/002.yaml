translation:
  language: es
  text: 'El comienzo de la palabra de Yahvé por medio de Oseas[a]. Y Yahvé dijo a Oseas: «Ve, toma para ti una mujer dada a la prostitución y hijos de prostitución[b][c], porque la tierra se entrega por completo a la prostitución, apartándose de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Cuando Yahvé habló por primera vez por medio de Oseas». El hebreo inicial puede entenderse como encabezamiento o como cláusula temporal.'
    reason: alternative_reading
  - marker: b
    text: 'O también: «una mujer de fornicación» y «hijos de fornicación». El hebreo זְנוּנִים puede abarcar inmoralidad sexual en general o prostitución de manera más específica.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «porque la tierra, prostituyéndose, se prostituye apartándose de Yahvé», una expresión hebrea enfática de infidelidad de pacto extrema.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחִלַּת דִּבֶּר יְהוָה בְּהוֹשֵׁעַ
  english_pob_choice: The beginning of the word of Yahweh through Hosea
  chosen_spanish: El comienzo de la palabra de Yahvé por medio de Oseas
  alternatives_spanish:
  - Cuando Yahvé habló por primera vez por medio de Oseas
  - El comienzo del hablar de Yahvé con Oseas
  lexicon: HALOT
  rationale: תְּחִלַּת con דִּבֶּר introduce una cláusula inicial que puede leerse como incipit o como marco temporal. 'El comienzo de la palabra' conserva la apertura formal y 'por medio de' expresa el valor mediador de בְּהוֹשֵׁעַ, distinguiéndolo del siguiente אֶל הוֹשֵׁעַ ('a Oseas').
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino según la convención del proyecto, preservando el Tetragrama como nombre propio y no como sustituto titulado.
- source_word: לֵךְ קַח לְךָ
  english_pob_choice: Go, take for yourself
  chosen_spanish: Ve, toma para ti
  alternatives_spanish:
  - Ve, cásate
  - Ve, toma
  lexicon: HALOT
  rationale: Se conservan los dos imperativos. 'Toma' refleja el verbo hebreo literal y 'para ti' comunica לְךָ sin añadir una interpretación no explicitada en el texto; el sentido matrimonial queda implícito por el contexto inmediato.
- source_word: אֵשֶׁת זְנוּנִים
  english_pob_choice: a wife of whoredom
  chosen_spanish: una mujer de prostituciones
  alternatives_spanish:
  - una esposa de prostitución
  - una mujer de fornicaciones
  - una mujer adúltera
  lexicon: HALOT
  rationale: '''זְנוּנִים'' admite una gama que va de inmoralidad sexual a prostitución. En español, ''prostituciones'' conserva la carga fuerte y la rareza poética del constructo, sin reducirlo únicamente a una profesión sexual ni suavizarlo con un término genérico.'
- source_word: וְיַלְדֵי זְנוּנִים
  english_pob_choice: children of whoredom
  chosen_spanish: hijos de prostituciones
  alternatives_spanish:
  - hijos de prostitución
  - hijos de inmoralidad sexual
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior y el mismo valor del sustantivo plural hebreo. 'Hijos de prostituciones' suena inusual en español, pero preserva la estructura y la dureza del hebreo sin normalizarla excesivamente.
- source_word: כִּי זָנֹה תִזְנֶה
  english_pob_choice: for the land utterly commits whoredom
  chosen_spanish: porque la tierra ciertamente se prostituye
  alternatives_spanish:
  - porque la tierra se prostituye por completo
  - porque la tierra seguramente se prostituye
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la acción. 'Ciertamente' reproduce la fuerza enfática sin forzar un adverbio más interpretativo; 'se prostituye' preserva el verbo de raíz זנה y su valor metafórico covenantal.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la nación
  lexicon: HALOT
  rationale: En Oseas, 'la tierra' conserva el término hebreo y su alcance teológico, que abarca el territorio y a sus habitantes en la esfera del pacto.
- source_word: מֵאַחֲרֵי יְהוָה
  english_pob_choice: by turning away from Yahweh
  chosen_spanish: apartándose de Yahvé
  alternatives_spanish:
  - dejando de seguir a Yahvé
  - alejándose de Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de detrás de Yahvé', un modismo de seguimiento y lealtad. 'Apartándose de Yahvé' comunica la apostasía en español natural sin borrar la imagen de seguimiento.
theological_decisions:
- issue: Mantener o suavizar el lenguaje sexual profético
  english_pob_reading: Preserve the imagery as 'whoredom' in both phrases
  chosen_spanish_reading: Conservar el lenguaje fuerte con 'prostituciones' y 'se prostituye'
  alternative_spanish_readings:
  - mujer promiscuo/a
  - mujer de inmoralidad sexual
  - adulterio
  rationale: Oseas emplea un lenguaje deliberadamente chocante para expresar la infidelidad del pacto. La elección de 'prostituciones' mantiene la dureza del texto y evita tanto la suavización moralizante como la reducción de la metáfora a un solo caso literal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo reflejar בְהוֹשֵׁעַ en la cláusula inicial
  english_pob_reading: through Hosea
  chosen_spanish_reading: por medio de Oseas
  alternative_spanish_readings:
  - con Oseas
  - a través de Oseas
  rationale: La repetición inmediata de 'a Oseas' en la cláusula siguiente favorece entender la primera expresión como mediación profética. 'Por medio de' expresa ese instrumento humano sin introducir una glosa doctrinal ajena.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La lectura española sigue el audit trail inglés sin depender mecánicamente de él: conserva la ambigüedad inicial de תְּחִלַּת דִּבֶּר, distingue el בְּ/הוֹשֵׁעַ mediador del אֶל הוֹשֵׁעַ destinatario, y mantiene la fuerza del lenguaje sexual profético. No se registraron revisiones sustantivas en el último pase.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente en el texto principal y en las notas.
  - Se evita 'SEÑOR' como sustituto del Nombre divino.
  - '''Oseas'' se conserva como nombre propio bíblico estándar en español.'
  - Se mantiene un registro reverente pero directo, adecuado para lectura eclesial y auditabilidad textual.
  - La puntuación sigue convenciones españolas con comillas angulares implícitas en el estilo editorial, pero aquí se usan comillas inglesas por compatibilidad de registro.
