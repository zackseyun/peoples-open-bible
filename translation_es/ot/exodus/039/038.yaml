  source_alignment_summary: 'El borrador refleja correctamente los cuatro elementos del inventario: מִזְבַּח הַזָּהָב como «altar de oro», שֶׁמֶן הַמִּשְׁחָה como «aceite de la unción», קְטֹרֶת הַסַּמִּים como «incienso aromático», y פֶּתַח הָאֹהֶל como «entrada de la tienda». Sin embargo, מָסַךְ en este contexto tabernacular se documentó en el POB inglés como «screen» para distinguirlo de otras telas cultuales, con alternativa «curtain». En español, «cortina» es posible, pero conviene una formulación que preserve mejor esa distinción técnica.'
