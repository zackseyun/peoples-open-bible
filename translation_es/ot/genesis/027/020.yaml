review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: pregunta de sorpresa de Isaac, vocativo afectuoso, y respuesta causal de Jacob. Preserva correctamente «Yahvé», «tu Dios» y la fuerza causativa de הִקְרָה. Sin embargo, las notas al pie no corresponden al contenido fuente ni al rastro auditado en inglés: la nota [a] está anclada en «su hijo» pero habla erróneamente de «el Dios de ustedes» / «tu Dios», y la [b] duplica el texto principal en vez de preservar la alternativa documentada. Además, en español suena más natural «encontraste» que «hallaste» en registro moderno neutral.'
  spanish_quality_summary: El texto es legible y digno, pero requiere una reparación menor de naturalidad y, sobre todo, de consistencia de notas. «¿Cómo es que encontraste tan pronto...?» fluye mejor en español neutral contemporáneo que «hallaste». «Delante de mí» es aceptable; «ante mí» sería más compacto, pero no es necesario. La puntuación y el registro general son adecuados.
  glossary_alignment: 'Alineado con la terminología del proyecto en puntos clave: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «tu Dios», y preservación de la causalidad en הִקְרָה. No hay conflicto teológico importante; la principal desviación está en las notas al pie, no en el glosario principal.'
  issues:
  - severity: high
    issue: La nota [a] es incorrecta y no corresponde al ancla ni al audit trail inglés.
    rationale: En el texto inglés, la nota a está anclada en «his son» y ofrece una alternativa para la cláusula final («the LORD your God gave success before me / made it happen for me»). El borrador español pone [a] tras «su hijo», pero la nota dice «el Dios de ustedes» / «tu Dios», lo cual no procede del hebreo ni de las decisiones auditadas.
  - severity: high
    issue: La nota [b] no preserva la alternativa documentada, sino que repite esencialmente el texto principal.
    rationale: El inglés conserva una nota de alternativa/renderizado previo para la cláusula verbal final. En español, la nota [b] «hizo que ocurriera delante de mí» no aporta variante real, pues duplica la traducción principal.
  - severity: medium
    issue: «Hallaste» suena algo más literario/tradicional que el objetivo de español neutral moderno.
    rationale: Aunque fiel, «encontraste» comunica mejor en español latinoamericano ampliamente legible sin perder dignidad ni precisión.
  revised_spanish_text: 'Entonces Isaac dijo a su hijo: «¿Cómo es que encontraste tan pronto, hijo mío?» Y él dijo[a]: «Porque Yahvé tu Dios hizo que ocurriera delante de mí».[b]'
  revised_footnotes:
