translation:
  language: es
  text: 'diciendo[a]: «Dios lo ha desamparado; persíganlo y agárrenlo, porque no hay quien lo rescate».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios lo ha abandonado». El verbo hebreo puede verterse de ambas maneras; se eligió «ha desamparado» por su fuerte resonancia de lamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - diciendo así
  lexicon: HALOT
  rationale: El infinitivo constructo de אמר funciona idiomáticamente como introducción de discurso citado. «Diciendo» conserva esa función narrativa en español y resulta natural en un encabalgamiento de cita.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma es plural, el verbo singular y el contexto muestran que se trata del título singular divino. «Dios» evita una lectura incorrecta en plural.
- source_word: עֲזָבוֹ
  english_pob_choice: has forsaken him
  chosen_spanish: lo ha abandonado
  alternatives_spanish:
  - lo ha desamparado
  - lo ha dejado
  lexicon: HALOT
  rationale: El qal perfecto con sufijo expresa una acción completa con efecto vigente. En español, «ha abandonado» comunica bien esa idea; además, «abandonado» es una alternativa válida ya reconocida en el audit trail. Se usa «lo» para concordar con el objeto masculino singular.
- source_word: רִדְפוּ
  english_pob_choice: pursue
  chosen_spanish: persigan
  alternatives_spanish:
  - corran tras él
  - persígannlo
  lexicon: HALOT
  rationale: Es un imperativo plural dirigido a hostiles. «Persigan» reproduce la fuerza del mandato sin añadir matiz de persecución legal o militar más específico del necesario.
- source_word: וְתִפְשׂוּהוּ
  english_pob_choice: and seize him
  chosen_spanish: apodérense de él
  alternatives_spanish:
  - y agárrenlo
  - y captúrenlo
  lexicon: HALOT
  rationale: תפשׂ implica tomar o asir con fuerza. «Apodérense de él» transmite con viveza la idea de agarrar/capturar, con una fuerza semántica cercana a «seize» y natural en español bíblico contemporáneo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón del mandato. «Porque» expresa de manera directa la causalidad en español.
- source_word: אֵין מַצִּיל
  english_pob_choice: there is no one to rescue him
  chosen_spanish: no hay quien lo rescate
  alternatives_spanish:
  - no hay salvador para él
  - no hay quien lo libre
  lexicon: HALOT
  rationale: 'אֵין marca inexistencia y מַצִּיל es un participio con valor de agente: alguien que rescata/libra. «No hay quien lo rescate» es idiomático y conserva la ausencia de un rescatador personal.'
theological_decisions:
- issue: La afirmación de abandono divino en boca de enemigos
  english_pob_reading: God has forsaken him
  chosen_spanish_reading: Dios lo ha abandonado
  alternative_spanish_readings:
  - Dios lo ha desamparado
  - Dios lo ha dejado
  rationale: Se mantiene el valor del insulto o burla de los enemigos sin convertirlo en una afirmación doctrinal del narrador. «Ha abandonado» conserva la tensión teológica que el salmo pone en boca de terceros.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Forma del enunciado introductorio
  english_pob_reading: saying
  chosen_spanish_reading: diciendo
  alternative_spanish_readings:
  - para decir
  rationale: El participio funciona como marco de cita directa. «Diciendo» mantiene la transición al discurso citado sin perder fluidez.
  doctrine_reference: Discurso reportado directo
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto hebreo y con el audit trail inglés: la lectura se mantiene en alto acuerdo, sin cambios editoriales necesarios respecto del análisis previo. Se preserva la tensión del desprecio enemigo sobre el supuesto abandono divino.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, no «dioses», por el verbo singular y el contexto.
  - Se mantiene «lo» como pronombre de objeto directo masculino singular para el referente implícito.
  - Se conserva una cadencia breve y directa, adecuada para el estilo poético de los Salmos.
  - La nota al pie marca la alternativa lexical relevante que el audit trail inglés ya documenta.
