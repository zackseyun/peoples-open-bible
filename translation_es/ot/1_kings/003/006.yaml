    reason: lexical_alternative
  - marker: b
    text: “In truth” may also be understood as “faithfully” or “with integrity.”
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: “as this day,” meaning the present situation visibly confirms it.'
    reason: cultural_note
