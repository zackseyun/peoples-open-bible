  to: 'Cuando Jezabel oyó que Nabot había sido apedreado y había muerto[a], Jezabel dijo a Ahab: «Levántate, toma posesión de la viña de Nabot el jezreelita, que rehusó darte por plata; pues Nabot ya no está vivo; está muerto».'
  rationale: Se proponen ajustes menores para mejorar la naturalidad del español sin apartarse del hebreo ni de las decisiones documentadas del POB. «Rehusó darte por plata» preserva mejor la literalidad que «te rehusó dar por plata» y suena más idiomático; «pues» y «ya no está vivo» hacen más fluida y natural la explicación, manteniendo la doble afirmación enfática del original. La nota se afina para un español más claro.
