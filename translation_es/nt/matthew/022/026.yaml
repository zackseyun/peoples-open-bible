translation:
  language: es
  text: Igualmente también el segundo y el tercero[a], hasta los siete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «hasta completar los siete».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: Likewise
  chosen_spanish: Igualmente
  alternatives_spanish:
  - Asimismo
  - De igual manera
  lexicon: BDAG
  rationale: Adverbio de conexión discursiva que enlaza con la secuencia anterior. «Igualmente» conserva la idea de continuación y suena natural en español sin perder la relación lógica.
- source_word: καὶ
  english_pob_choice: and / also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: El primer καὶ tras ὁμοίως refuerza la continuidad; en español queda mejor expresado con «también» para reflejar el matiz aditivo que el auditor inglés añadió con «also».
- source_word: ὁ δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hermano
  lexicon: BDAG
  rationale: El ordinal funciona sustantivado. Se conserva la elipsis del contexto griego, sin añadir «hermano» al texto principal.
- source_word: ὁ τρίτος
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer hermano
  lexicon: BDAG
  rationale: Igual que con «el segundo», se mantiene la forma sustantivada y la misma contención formal del original.
- source_word: ἕως τῶν ἑπτά
  english_pob_choice: up to the seven
  chosen_spanish: hasta los siete
  alternatives_spanish:
  - hasta los siete todos
  - hasta todos los siete
  - hasta el séptimo
  lexicon: BDAG
  rationale: La frase griega apunta al conjunto completo de siete. «Hasta los siete» reproduce la estructura de forma cercana y natural en español, dejando abierta la lectura idiomática del conjunto completo.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «Likewise the second and the third, up to the seven.» a «Likewise also the second and the third, up to the seven.» para reflejar más plenamente el καὶ después de ὁμοίως. La versión española integra ese matiz con «Igualmente también».
  spanish_consistency_notes:
  - Se mantiene el orden sintáctico breve del griego y del audit trail inglés.
  - Se preserva la elipsis de «hermano(s)» porque el contexto ya la aporta.
  - «Siete» aparece con artículo plural en español («los siete») para expresar el conjunto completo de manera natural.
