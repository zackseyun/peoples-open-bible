translation:
  language: es
  text: Saúl consultó a Yahvé, pero Yahvé no le respondió ni por sueños[a] ni por el Urim[b] ni por los profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediante sueños ... mediante el Urim ... mediante los profetas».
    reason: alternative_reading
  - marker: b
    text: El Urim era un medio sacerdotal para buscar dirección divina.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: inquired
  chosen_spanish: consultó
  alternatives_spanish:
  - inquirió
  - preguntó
  lexicon: HALOT
  rationale: En este contexto, שׁאל con referencia a Dios expresa buscar dirección oracular, no solo hacer una pregunta. «Consultó» comunica de forma natural esa búsqueda de guía divina en español.
- source_word: בַּיהוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el nombre divino YHWH. La convención del proyecto pide «Yahvé» en el texto principal, preservando el nombre del pacto en lugar de ocultarlo con un título.
- source_word: וְלֹא עָנָהוּ
  english_pob_choice: did not answer him
  chosen_spanish: no le respondió
  alternatives_spanish:
  - no le contestó
  - no le dio respuesta
  lexicon: HALOT
  rationale: ענה aquí se refiere a una respuesta dada a una consulta, especialmente oracular. «No le respondió» es la equivalencia más directa y natural en español.
- source_word: גַּם ... גַּם ... גַּם
  english_pob_choice: either ... or ... or
  chosen_spanish: ni ... ni ... ni
  alternatives_spanish:
  - ya sea ... ya sea ... ya sea
  - o ... o ... o
  lexicon: HALOT
  rationale: En una cláusula negativa, la repetición distributiva se expresa con naturalidad en español mediante «ni ... ni ... ni», conservando la serie de medios por los que podría haber venido la respuesta.
- source_word: בַּחֲלֹמוֹת
  english_pob_choice: by dreams
  chosen_spanish: por sueños
  alternatives_spanish:
  - mediante sueños
  - a través de sueños
  lexicon: HALOT
  rationale: El plural de sueños funciona aquí como medio de revelación. «Por sueños» mantiene brevedad y el valor instrumental del hebreo sin sonar forzado.
- source_word: בָּאוּרִים
  english_pob_choice: by the Urim
  chosen_spanish: por el Urim
  alternatives_spanish:
  - mediante el Urim
  - a través del Urim
  lexicon: HALOT
  rationale: אוּרִים es un término cultual específico que no conviene traducir especulativamente. Se conserva transliterado como «Urim», con artículo español omitido porque funciona como nombre técnico.
- source_word: בַּנְּבִיאִם
  english_pob_choice: by the prophets
  chosen_spanish: por los profetas
  alternatives_spanish:
  - mediante los profetas
  - a través de los profetas
  lexicon: HALOT
  rationale: נביאים designa a los mediadores humanos de la revelación divina. «Por los profetas» conserva el paralelismo con los otros medios y es idiomático en español.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrama de manera explícita. Se mantiene la decisión POB de no enmascararlo con un título, y se adopta la forma española del nombre divino establecida para este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Silencio revelatorio de Yahvé hacia Saúl
  english_pob_reading: The verse states that the LORD gave Saul no revelatory answer by any of the listed means.
  chosen_spanish_reading: El versículo afirma que Yahvé no dio respuesta a Saúl por ninguno de los medios mencionados.
  alternative_spanish_readings:
  - Yahvé lo rechazó sin responderle
  - Yahvé no quiso responderle
  rationale: La traducción conserva la tensión teológica sin añadir una explicación causal que el versículo no formula. Se mantiene abierto el motivo del silencio divino.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje fue revisado en el flujo fuente-inglés y quedó sin cambios en la última pasada; la versión española sigue de cerca esa lectura estable sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «Urim» como término técnico no traducido.
  - La serie distributiva negativa se expresa con «ni ... ni ... ni ...», equivalente funcional de «either ... or ... or» en contexto negativo.
  - «Consultó» refleja búsqueda oracular y evita reducir el verbo a una simple pregunta.
