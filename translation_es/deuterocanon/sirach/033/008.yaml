review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la cláusula griega aislada y mantiene el imperativo dual sin importar material de contexto externo. Sin embargo, ὀργήν se aleja demasiado al traducirse como 'indignación', ya que en este contexto el griego pide un término de ira más fuerte y no una reacción moralizada.
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. No obstante, 'Despierta la ira' suena menos idiomático que 'Aviva la ira' o 'Provoca la ira', y la pareja 'ira / indignación' no suena tan paralela ni tan intensa como el griego.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La decisión principal a corregir es la distinción entre θυμός y ὀργή: en español conviene mantenerla con ''ira'' y ''furor'' o equivalente, en lugar de ''indignación'', que desplaza el campo semántico.'
  issues:
  - severity: medium
    issue: '''indignación'' para ὀργήν debilita y moraliza el sentido'
    rationale: ὀργή en paralelo con θυμός sigue perteneciendo al campo de ira/wrath, no principalmente al de protesta moral. 'Indignación' introduce una matización ética que no está exigida por la fuente.
  - severity: low
    issue: '''Despierta la ira'' es menos natural para ἔγειρον θυμόν'
    rationale: Aunque comprensible, 'despertar la ira' suena algo forzado en español. 'Aviva la ira' reproduce mejor la idea de intensificar o poner en acción un afecto ya latente.
  revised_spanish_text: Aviva la ira y derrama el furor[a].
