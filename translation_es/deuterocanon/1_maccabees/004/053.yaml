review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: ofrecieron un sacrificio, en conformidad con la ley, sobre el altar recién hecho. Sin embargo, la sintaxis española ‘sobre el altar nuevo del holocausto’ puede leerse como si ‘nuevo’ modificara solo ‘altar’ dentro de una expresión menos natural, y ‘altar del holocausto’ es menos preciso que el griego/pliego auditado, que apunta al altar destinado a los holocaustos o del holocausto quemado. La nota alternativa inglesa también distingue mejor la relación del adjetivo ‘new’ con toda la frase nominal.'
  spanish_quality_summary: El español es claro y digno, pero ‘altar nuevo del holocausto’ suena algo rígido y menos idiomático que ‘nuevo altar del holocausto’ o, mejor, ‘altar nuevo para holocaustos’. Para conservar mejor la precisión cultual y la alternativa documentada, conviene ajustar el orden y la construcción preposicional.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. La terminología cultual sí debe mantenerse explícita, y ‘sacrificio’ está bien. El punto mejorable es θυσιαστήριον τῶν ὁλοκαυτωμάτων: en español bíblico general resulta más fiel y claro ‘altar para holocaustos’ o ‘altar de los holocaustos’ que ‘altar del holocausto’.'
  issues:
  - severity: medium
    issue: ‘altar del holocausto’ reduce la fuerza plural/genérica de τῶν ὁλοκαυτωμάτων
    rationale: El griego usa un genitivo plural (‘de los holocaustos’ / ‘para holocaustos’). Aunque ‘altar del holocausto’ puede entenderse como designación cultual, en español suena menos transparente y un poco más estrecho que la formulación respaldada por la nota inglesa.
  - severity: low
    issue: Colocación de ‘nuevo’ poco natural en español
    rationale: ‘el altar nuevo del holocausto’ es comprensible, pero ‘el nuevo altar para holocaustos’ o ‘el altar nuevo para holocaustos’ fluye mejor y refleja con más claridad que el altar mismo era nuevo.
  revised_spanish_text: Y ofrecieron sacrificio conforme a la ley sobre el nuevo altar para holocaustos[a] que habían hecho.
  revised_footnotes:
  - marker: a
    text: O ‘sobre el altar nuevo de los holocaustos que habían hecho’.
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase nominal para reflejar mejor θυσιαστήριον τῶν ὁλοκαυτωμάτων y para producir un español más natural y preciso en contexto cultual. Se conserva el lenguaje sacrificial explícito del original y de la auditoría inglesa, mientras la nota alternativa mantiene la otra posibilidad cercana documentada.
