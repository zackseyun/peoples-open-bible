review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Yahvé como sujeto, expulsión de las naciones de delante de Israel, y luego la desposesión de naciones mayores/más fuertes. Mantiene correctamente la distinción entre וְהוֹרִישׁ (''expulsar/desposeer'') y וִירִשְׁתֶּם (''desposeer'').'
  spanish_quality_summary: El español es claro y natural, pero la combinación 'desposeerán naciones' suena algo dura en español bíblico corriente. Además, 'más poderosas' es aceptable, pero 'más fuertes' o 'más poderosas' deben evaluarse frente al registro formal del audit trail; aquí el problema principal es de naturalidad sintáctica. Conviene una pequeña reparación para mejorar fluidez sin perder fuerza léxica.
  glossary_alignment: 'Se alinea bien con el glosario del proyecto: יְהוָה -> ''Yahvé''; גּוֹיִם -> ''naciones''. No hay conflicto terminológico doctrinal. La revisión propuesta conserva el contraste léxico entre la acción de Yahvé (''expulsará'') y la de Israel (''desposeerán de su tierra'').'
  issues:
  - severity: medium
    issue: '''desposeerán naciones'' suena poco idiomático en español'
    rationale: Aunque semánticamente es defendible, en español la transitividad directa con 'naciones' resulta áspera. Añadir 'de su tierra' hace explícito el objeto implícito de ירשׁ en contexto y mejora la legibilidad sin alterar el sentido.
  - severity: low
    issue: Repetición de 'ustedes' al final
    rationale: No es incorrecta, pero puede sonar pesada. En este caso se puede mantener por claridad y registro latinoamericano neutral; no requiere cambio obligatorio.
  revised_spanish_text: entonces Yahvé expulsará de delante de ustedes a todas estas naciones, y ustedes desposeerán de su tierra a naciones más grandes y más poderosas que ustedes.
  revision_rationale: Se ajusta la segunda cláusula para que el español suene más natural y explícito, manteniendo el valor de 'desposeer' aplicado a las naciones en contexto de conquista. No se requieren notas, porque la aclaración queda integrada en el texto sin introducir ambigüedad nueva.
