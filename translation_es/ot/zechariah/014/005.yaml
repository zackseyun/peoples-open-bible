base_translation:
  language: en
  yaml_path: translation/ot/zechariah/014/005.yaml
  text: And you will flee by the valley of my mountains[a], for the valley of the mountains will reach to Azal. Yes, you will flee as you fled from before the earthquake in the days of Uzziah king of Judah. Then Yahweh my God will come[b], and all the holy ones with him.
