    reason: lexical_alternative
  revision_rationale: Se ajusta «la casa del rey» a «la familia del rey» para preservar el sentido humano/colectivo en español claro, dejando la forma literal en nota. Se mejora el modismo a «hacer lo que era bueno ante sus ojos» para conservar la imagen hebrea con mejor naturalidad. También se simplifica la referencia final repitiendo «el rey» en vez de «éste».
