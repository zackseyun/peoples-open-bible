base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/032.yaml
  text: And it happened[a], when the commanders of the chariots saw Jehoshaphat, that they said, “Surely he is the king of Israel.” So they turned aside against him to fight[b], but Jehoshaphat cried out.
  footnotes:
  - marker: a
    text: Or “they turned against him to attack.” The Hebrew verb can denote turning toward or against someone in order to engage in battle.
    reason: lexical_alternative
  - marker: b
    text: Or 'they turned aside against him'.
    reason: previous_rendering
