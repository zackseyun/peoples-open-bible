  glossary_alignment: No hay términos del glosario principal del proyecto especialmente implicados en este versículo. «Faraón» está bien; no aparecen nombres divinos ni títulos mesiánicos. La decisión de edad con «tenía ... años» concuerda con la filosofía de evitar calcos duros.
