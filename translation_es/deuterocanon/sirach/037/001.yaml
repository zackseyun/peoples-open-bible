translation:
  language: es
  text: 'Todo amigo dice[a]: «Te amo», pero hay un amigo que es amigo solo de nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene una expresión comprimida al final; el paralelo griego aclara el sentido como «un amigo solo de nombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: כל אוהב
  english_pob_choice: Every friend
  chosen_spanish: Todo amigo
  alternatives_spanish:
  - Todo el que ama
  - Toda persona que ama
  lexicon: HALOT
  rationale: El hebreo אוהב puede expresar tanto 'el que ama' como 'amigo'; el paralelo griego Πᾶς φίλος favorece claramente el sentido social de 'amigo'. En español, 'Todo amigo' conserva la forma proverbial y el contraste entre amistad real y nominal.
- source_word: אומר
  english_pob_choice: says
  chosen_spanish: dirá
  alternatives_spanish:
  - dice
  - declara
  lexicon: HALOT
  rationale: Aunque el inglés auditado usa presente simple, en español el futuro proverbial ('dirá') suena natural y transmite el valor general y repetitivo del proverbio sin perder literalidad funcional.
- source_word: אהבתי
  english_pob_choice: I love him
  chosen_spanish: Lo amo
  alternatives_spanish:
  - Le amo
  - Lo he amado
  lexicon: HALOT
  rationale: El hebreo es una forma perfecta que en este contexto expresa una profesión directa de amor/afecto. 'Lo amo' reproduce la sencillez de la declaración; se usa 'lo' por referencia masculina genérica al amigo en el proverbio.
- source_word: אך
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: HALOT
  rationale: Introduce el contraste adversativo entre la declaración y la realidad; 'pero' es la equivalencia más natural y clara en español.
- source_word: יש
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - se encuentra
  lexicon: HALOT
  rationale: El existencial hebreo se vierte de modo idiomático con 'hay' en español.
- source_word: אהב שם אהב
  english_pob_choice: a friend who is a friend in name only
  chosen_spanish: amigo solo de nombre
  alternatives_spanish:
  - amigo solo por nombre
  - llamado amigo
  lexicon: HALOT
  rationale: El hebreo comprimido y el griego ὀνόματι μόνον φίλος apuntan a una amistad meramente nominal. 'Solo de nombre' mantiene la tensión entre el término 'amigo' y su vacío real, sin paraphrasear más allá de lo sustentado por el paralelo griego.
translation_notes:
  revision_awareness: El texto sigue el sentido establecido por el audit trail inglés y el paralelo griego, pero ajusta la sintaxis al español para preservar naturalidad proverbial ('dirá') y la fórmula nominal ('solo de nombre') sin añadir interpretación ajena al original.
  spanish_consistency_notes:
  - Se mantiene 'amigo' en ambos miembros para reproducir el contraste del proverbio.
  - Se evita 'Cristo' o terminología no pertinente; no hay contenido teológico doctrinal explícito en este versículo.
  - La nota conserva la tensión entre el hebreo comprimido y la clarificación del griego, sin resolverla por paráfrasis excesiva.
