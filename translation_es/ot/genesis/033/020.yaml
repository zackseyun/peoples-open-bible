translation:
  language: es
  text: Allí levantó un altar y lo llamó El-Elohe-Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Allí levantó un altar y llamó sobre él: “Dios, el Dios de Israel”»; o «proclamó sobre él: “Dios, el Dios de Israel”». El hebreo puede entenderse como nombre del altar o como invocación/declaración acerca de Dios.'
    reason: alternative_reading
  - marker: b
    text: El-Elohe-Israel significa «Dios, el Dios de Israel» o «El, el Dios de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֶּב
  english_pob_choice: set up
  chosen_spanish: levantó
  alternatives_spanish:
  - erigió
  - alzó
  - estableció
  lexicon: HALOT
  rationale: El verbo en contexto describe la acción de disponer o erigir un altar. En español, «levantó» comunica con naturalidad la instalación física sin sonar demasiado técnico o arcaizante.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: «Allí» reproduce de forma directa la indicación locativa del hebreo y suena natural en español bíblico contemporáneo.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: HALOT
  rationale: El sustantivo corresponde de manera estándar a «altar». No hace falta ampliar más en el texto principal.
- source_word: וַיִּקְרָא לוֹ
  english_pob_choice: called it
  chosen_spanish: lo llamó
  alternatives_spanish:
  - lo nombró
  - clamó sobre él
  - invocó sobre él
  lexicon: HALOT
  rationale: En la lectura principal del pasaje, la construcción se entiende como acto de nombrar el altar. «Lo llamó» conserva esa relación directa con el objeto.
- source_word: אֵל אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: El-Elohe-Israel
  chosen_spanish: El-Elohe-Israel
  alternatives_spanish:
  - Dios, el Dios de Israel
  - El, el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre transliterado del altar, siguiendo la decisión inglesa de preservar la forma nominal. La traducción del sentido se conserva en nota porque el hebreo también puede leerse como una declaración o invocación.
theological_decisions:
- issue: ¿El final del versículo nombra el altar o expresa una invocación/declaración acerca de Dios?
  english_pob_reading: Treat it as the name Jacob gave to the altar, while preserving the alternative reading in a footnote.
  chosen_spanish_reading: Se toma como el nombre que Jacob dio al altar, manteniendo la lectura alternativa en nota.
  alternative_spanish_readings:
  - 'Llamó sobre él: «Dios, el Dios de Israel»'
  - 'Proclamó sobre él: «Dios, el Dios de Israel»'
  rationale: La sintaxis inmediata favorece entender que Jacob da nombre al altar. Sin embargo, el hebreo permite también una lectura de invocación o declaración. La versión española conserva ambas posibilidades mediante nota para no borrar esa tensión textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con la última revisión disponible, que no requirió cambios. Se mantiene la alta concordancia del testimonio inglés y la decisión de preservar la ambigüedad hebrea en nota.
  spanish_consistency_notes:
  - Se usa «altar» de manera consistente con el valor léxico estándar de מִזְבֵּחַ.
  - Se preserva el nombre transliterado «El-Elohe-Israel» en el cuerpo del texto, con explicación semántica en nota.
  - Se evita sustituir el nombre por una paráfrasis interpretativa en el texto principal para respetar la decisión auditada de mantener la posibilidad de lectura nominal.
