translation:
  language: es
  text: 'Estabas en Edén[a], el jardín de Dios; toda piedra preciosa era tu revestimiento: rubí, topacio y diamante; berilo, ónice y jaspe; zafiro, turquesa y esmeralda; y oro. La hechura de tus engastes y tus monturas[b] estaba en ti; el día en que fuiste creado, fueron preparados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta de varias piedras de este versículo es incierta; los nombres antiguos de gemas no siempre corresponden de manera precisa a minerales modernos. Alternativas posibles incluyen cornalina para "rubí", crisólito para "topacio" o "berilo", lapislázuli para "zafiro", y carbunclo para "turquesa" o "esmeralda".
    reason: lexical_alternative
  - marker: b
    text: O, "la hechura de tus tamboriles y tus flautas", siguiendo la lectura tradicional de los términos hebreos difíciles como instrumentos musicales en vez de piezas de joyería.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעֵדֶן גַּן אֱלֹהִים
  english_pob_choice: in Eden, the garden of God
  chosen_spanish: en Edén, el jardín de Dios
  alternatives_spanish:
  - en Edén, el huerto de Dios
  - en Edén, el jardín de Yahvé
  lexicon: HALOT
  rationale: Conserva el nombre propio Edén y la estructura de constructo. 'Jardín de Dios' refleja de forma directa el hebreo sin sustituir la relación posesiva por una formulación más interpretativa.
- source_word: הָיִיתָ
  english_pob_choice: you were
  chosen_spanish: estuviste
  alternatives_spanish:
  - eras
  - fuiste
  lexicon: HALOT
  rationale: En español, 'estuviste' comunica mejor la ubicación/estado situado en Edén dentro de una descripción retrospectiva. Mantiene el pasado simple sin añadir matices no presentes en el hebreo.
- source_word: כָּל אֶבֶן יְקָרָה
  english_pob_choice: every precious stone
  chosen_spanish: toda piedra preciosa
  alternatives_spanish:
  - cada piedra preciosa
  - toda piedra de valor
  lexicon: HALOT
  rationale: '''Piedra preciosa'' es el equivalente natural y fiel para la serie de gemas. ''Toda'' conserva el valor distributivo de כָּל.'
- source_word: מְסֻכָתֶךָ
  english_pob_choice: was your covering
  chosen_spanish: era tu cobertura
  alternatives_spanish:
  - te cubría
  - era tu cubierta
  lexicon: HALOT
  rationale: '''Cobertura'' preserva el sustantivo hebreo sin decidir de manera cerrada si se trata de adorno, revestimiento o protección. ''Era'' reproduce el estado descrito en el texto.'
- source_word: אֹדֶם
  english_pob_choice: ruby
  chosen_spanish: rubí
  alternatives_spanish:
  - cornalina
  - sardio
  lexicon: HALOT
  rationale: Se mantiene la identificación tradicional en español por claridad y lectura pública, aunque la equivalencia mineral exacta sigue siendo incierta.
- source_word: פִּטְדָה
  english_pob_choice: topaz
  chosen_spanish: topacio
  alternatives_spanish:
  - crisólito
  lexicon: HALOT
  rationale: '''Topacio'' es la forma natural en español de la identificación tradicional. Se conserva la incertidumbre léxica sin forzar una precisión mineral moderna.'
- source_word: יָהֲלֹם
  english_pob_choice: diamond
  chosen_spanish: diamante
  alternatives_spanish:
  - jaspe
  - ónice
  lexicon: HALOT
  rationale: '''Diamante'' sigue la tradición de traducción usada en lectura devocional y pública. El término exacto del hebreo es debatido, pero la equivalencia tradicional es inteligible.'
- source_word: תַּרְשִׁישׁ
  english_pob_choice: beryl
  chosen_spanish: berilo
  alternatives_spanish:
  - crisólito
  lexicon: HALOT
  rationale: '''Berilo'' es el equivalente español estándar para la opción adoptada por la POB inglesa y funciona bien dentro de la lista de gemas.'
- source_word: שֹׁהַם
  english_pob_choice: onyx
  chosen_spanish: ónice
  alternatives_spanish:
  - berilo
  lexicon: HALOT
  rationale: '''Ónice'' conserva la identificación tradicional y es claro para el lector español. El hebreo permite otras propuestas, pero esta mantiene continuidad con la lista de piedras.'
- source_word: יָשְׁפֵה
  english_pob_choice: jasper
  chosen_spanish: jaspe
  lexicon: HALOT
  rationale: '''Jaspe'' es el equivalente natural y ampliamente reconocido en español.'
- source_word: סַפִּיר
  english_pob_choice: sapphire
  chosen_spanish: zafiro
  alternatives_spanish:
  - lapislázuli
  lexicon: HALOT
  rationale: '''Zafiro'' conserva la traducción tradicional y es idiomático en español. Se mantiene la posibilidad alternativa por la incertidumbre histórica del término.'
- source_word: נֹפֶךְ
  english_pob_choice: turquoise
  chosen_spanish: turquesa
  alternatives_spanish:
  - carbunclo
  - granate
  lexicon: HALOT
  rationale: '''Turquesa'' ofrece una lectura natural y pública para la gema, mientras que la identificación exacta sigue siendo discutida.'
- source_word: בָרְקַת
  english_pob_choice: emerald
  chosen_spanish: esmeralda
  alternatives_spanish:
  - carbunclo
  lexicon: HALOT
  rationale: '''Esmeralda'' sigue la traducción tradicional y clara en español.'
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  lexicon: HALOT
  rationale: Equivalente directo y natural.
- source_word: מְלֶאכֶת
  english_pob_choice: the workmanship of
  chosen_spanish: la obra de
  alternatives_spanish:
  - el trabajo de
  - la hechura de
  lexicon: HALOT
  rationale: '''Obra'' conserva la idea de labor hecha con pericia sin sonar demasiado técnica. Encaja bien con el campo semántico de artesanía/despliegue ornamental.'
- source_word: תֻּפֶּיךָ
  english_pob_choice: your tambourines
  chosen_spanish: tus tambores
  alternatives_spanish:
  - tus tamboriles
  - tus panderos
  lexicon: HALOT
  rationale: La POB inglesa conservó la lectura tradicional de instrumentos, aunque con tensión contextual. 'Tambores' ofrece un equivalente español entendible para ese campo instrumental, manteniendo la misma decisión interpretativa de base.
- source_word: וּנְקָבֶיךָ
  english_pob_choice: your sockets
  chosen_spanish: tus cavidades
  alternatives_spanish:
  - tus encajes
  - tus engastes
  lexicon: HALOT
  rationale: '''Cavidades'' mantiene la referencia espacial/del receptáculo sin imponer una solución más específica que el hebreo difícil no exige de forma concluyente. Preserva la alternativa artesanal frente a la lectura musical.'
- source_word: בָּךְ
  english_pob_choice: was in you
  chosen_spanish: estaba en ti
  alternatives_spanish:
  - estaba dentro de ti
  lexicon: HALOT
  rationale: Conserva la ubicación interna que el hebreo expresa mediante la preposición y el pronombre, de modo natural en español.
- source_word: בְּיוֹם הִבָּרַאֲךָ
  english_pob_choice: on the day you were created
  chosen_spanish: el día en que fuiste creado
  alternatives_spanish:
  - el día de tu creación
  lexicon: HALOT
  rationale: Sigue de cerca la temporalidad del hebreo y mantiene el pasivo de creación. 'En que fuiste creado' suena natural y preciso.
- source_word: כּוֹנָנוּ
  english_pob_choice: they were prepared
  chosen_spanish: fueron preparados
  alternatives_spanish:
  - fueron establecidos
  - quedaron dispuestos
  lexicon: HALOT
  rationale: Reproduce el pasivo del verbo con un español claro. 'Preparados' funciona bien con la serie de elementos y con la posible referencia a adornos o piezas artesanales.
theological_decisions:
- issue: Identidad del destinatario e imagen de Edén
  english_pob_reading: Translate the verse's exalted Eden imagery straightforwardly without importing a specific doctrinal identification (human king only, mythic figure, or Satan) into the wording.
  chosen_spanish_reading: Traducir la imagen exaltada de Edén de manera directa, sin incorporar en el enunciado una identificación doctrinal cerrada del destinatario.
  alternative_spanish_readings:
  - Aplicarlo explícitamente solo al rey de Tiro
  - Introducir una alusión explícita a Satanás o a un querubín caído
  rationale: El hebreo y la POB inglesa preservan la tensión interpretativa. El español debe reflejar esa misma apertura, manteniendo el lenguaje del texto sin resolver el debate en la traducción.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La POB inglesa revisó la segunda cola del versículo, cambiando 'pipes' por 'sockets' para reflejar una lectura artesanal más probable del hebreo. En español se siguió esa revisión, pero se mantuvo también una redacción que no fuerce una interpretación técnica cerrada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque aquí el hebreo usa אֱלֹהִים, no el tetragrámaton.
  - Se conservaron los nombres tradicionales de gemas en español por legibilidad, añadiendo nota sobre la incertidumbre lexical.
  - '''Tambores'' y ''cavidades'' intentan reflejar la tensión del hebreo difícil sin borrar la alternativa artesanal documentada por la POB inglesa.'
  - Se evitó 'Señor' o fórmulas eclesiásticas de sustitución para no ocultar el sentido del original.
