translation:
  language: es
  text: Entonces el pueblo de la tierra debilitaba las manos del pueblo de Judá y los atemorizaba[a][b] para impedirles construir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «debilitando las manos de», un modismo para desanimar o minar la determinación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y haciéndolos temer construir».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Así que
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce un nuevo episodio narrativo; «Entonces» conserva el avance de la acción con naturalidad en español moderno.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - los habitantes del país
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea reconocible en Esdras y su referencia a los habitantes locales opuestos a los que regresaron del exilio.
- source_word: מְרַפִּים יְדֵי
  english_pob_choice: kept weakening the hands of
  chosen_spanish: seguía debilitando las manos de
  alternatives_spanish:
  - desanimaba a
  - debilitaba el ánimo de
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de «debilitar las manos», que en hebreo expresa desaliento o debilitamiento del ánimo/resolve; «seguía» refleja el aspecto continuo.
- source_word: עַם יְהוּדָה
  english_pob_choice: the people of Judah
  chosen_spanish: el pueblo de Judá
  alternatives_spanish:
  - la gente de Judá
  - los judíos
  lexicon: HALOT
  rationale: La frase constructa se vierte de modo directo y sobrio; «Judá» corresponde a la comunidad judeana en reconstrucción.
- source_word: וּמְבַלְהִים
  english_pob_choice: and frightening
  chosen_spanish: y atemorizándolos
  alternatives_spanish:
  - y asustándolos
  - y causándoles temor
  lexicon: HALOT
  rationale: El participio de בהל denota producir alarma o pánico; «atemorizándolos» comunica bien esa fuerza en español sin perder el paralelismo con el verbo anterior.
- source_word: לִבְנוֹת
  english_pob_choice: from building
  chosen_spanish: para que no edificaran
  alternatives_spanish:
  - de edificar
  - para impedirles edificar
  lexicon: HALOT
  rationale: El infinitivo con ל expresa la actividad de la que eran disuadidos. En español, «para que no edificaran» transmite con claridad la prevención hostil implícita en el contexto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el rastro auditado en inglés. No se requieren correcciones sustantivas respecto del sentido básico; se mantiene la metáfora idiomática y la lectura alternativa sobre el efecto de la intimidación.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda, pero en este versículo no aparece el nombre divino.
  - «Edificar» se mantiene como equivalente bíblico claro para בנה en contexto de reconstrucción.
  - «Pueblo de la tierra» preserva la expresión técnica del texto bíblico en vez de sustituirla por una paráfrasis sociológica.
