review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del versículo, preserva «Yahvé» y mantiene la ambigüedad cultual sobre la participación de Salomón. Sin embargo, hay varios desajustes relevantes con la evidencia fuente y con la auditoría inglesa: (1) «ofrecía» introduce un imperfecto/habitual más fuerte que el hebreo narrativo y que el inglés «offered up»; la iteración ya está expresada por «tres veces al año». (2) El marcador [a] está mal anclado y la nota no corresponde al punto discutido por la auditoría inglesa: la nota inglesa a trata de וְהַקְטֵיר, no de «tres veces al año». (3) «hacía que se elevara el humo» es demasiado perifrástico y menos natural en español; además la nota ya puede preservar la amplitud semántica. (4) Falta la nota equivalente a la inglesa b sobre «la casa» = el templo. (5) «terminó la casa» es entendible, pero «completó la casa» refleja mejor וְשִׁלַּם y el tono formal del POB.'
  spanish_quality_summary: El español es legible, pero «hacía que se elevara el humo con ello» suena forzado y poco idiomático. «Quemaba incienso con él» es más natural en español y, con nota, conserva la alternativa léxica hebrea. También conviene usar un pretérito simple («ofreció») para evitar una habitualidad redundante y mejorar la fluidez narrativa.
  glossary_alignment: Buena alineación con la terminología del proyecto en «Yahvé», «holocaustos» y el mantenimiento de «casa». «Ofrendas de paz» es aceptable para שְׁלָמִים. El principal problema no es terminológico sino de anclaje de notas y de elección verbal en español.
  issues:
  - severity: medium
    issue: Tiempo verbal «ofrecía»
    rationale: El hebreo wayyiqtol narra la acción en secuencia; la frecuencia ya está dada por «tres veces al año». «Ofreció» preserva mejor el resumen narrativo sin sobrecargar el aspecto habitual.
  - severity: high
    issue: Nota [a] mal asignada a «tres veces al año»
    rationale: La auditoría inglesa pone la nota a en וְהַקְטֵיר, no en la expresión temporal. La nota actual introduce una alternativa menor no preservada en el audit trail y omite la alternativa importante documentada.
  - severity: medium
    issue: «hacía que se elevara el humo con ello» es poco natural
    rationale: Aunque intenta preservar la amplitud de קטר, en español suena perifrástico y pesado. El texto principal debe ser claro; la amplitud léxica puede guardarse en nota.
  - severity: medium
    issue: Falta nota sobre «la casa»
    rationale: La auditoría inglesa preserva una nota léxica para aclarar que «la casa» se refiere al templo. Esa aclaración sigue siendo útil en español.
  - severity: low
    issue: «terminó la casa» podría afinarse
    rationale: «Completó la casa» refleja mejor שלם y mantiene un registro más digno/formal, en línea con el inglés revisado «Thus he completed the house».
  revised_spanish_text: Y Salomón ofreció holocaustos y ofrendas de paz sobre el altar que había edificado para Yahvé tres veces al año, y quemaba incienso con él[a] delante de Yahvé. Así completó la casa[b].
  revised_footnotes:
