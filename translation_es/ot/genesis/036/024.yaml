revisions:
- from: 'Estos son los hijos de Zibeón: Aía[a] y Aná[b]. Este es el Aná que halló los yēmîm[c] en el desierto, mientras apacentaba los asnos de Zibeón su padre.'
  to: 'Estos son los hijos de Zibeón: Aía y Aná. Este es Aná, quien halló los yemim[a] en el desierto mientras apacentaba los asnos para Zibeón su padre.'
  rationale: Se eliminaron dos notas no justificadas sobre nombres propios, se normalizó la transliteración incierta a «yemim» siguiendo la práctica del POB inglés, se mejoró la naturalidad de la identificación de Aná en español y se ajustó la cláusula final para reflejar mejor el valor de servicio expresado por לְ.
