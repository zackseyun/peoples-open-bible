theological_decisions:
- issue: Rendering שְׁאוֹל in a lament about impending death
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse speaks from within Israelite death-language and does not require importing later, more developed notions of hell. 'Sheol' preserves the Hebrew concept and avoids doctrinal over-specification.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
