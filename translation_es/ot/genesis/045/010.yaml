review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: residencia en Gosén, cercanía a José, inclusión de la familia y los bienes. Sin embargo, dos elecciones se apartan del rastro auditado del POB y de la naturalidad española: "los hijos de tus hijos" conserva una literalidad innecesaria donde el inglés auditado decidió explícitamente "grandsons", y "tus ganados" suena poco natural frente a un colectivo más idiomático para בקר.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en fluidez y naturalidad bíblica moderna. "Habitarás" y "la tierra de Gosén" son aceptables. La secuencia enumerativa funciona, pero "los hijos de tus hijos" resulta más pesada que "tus nietos", y "tus ganados" es menos natural que "tus rebaños y tus manadas" o "tu ganado". Conviene además mantener la distinción entre צאן y בקר con dos colectivos idiomáticos diferentes.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La revisión propuesta sigue la decisión del POB para וּבְנֵי בָנֶיךָ como referencia masculina específica mediante "tus nietos", que en español puede abarcar ambos sexos; aun así, es la mejor equivalencia idiomática disponible sin una nota obligatoria, dado que el contexto ya distingue generaciones. Para בקר, se evita "ganados" por estilo español y se usa "manadas" para conservar contraste con "rebaños".
  issues:
  - severity: medium
    issue: '"los hijos de tus hijos" es demasiado literal'
    rationale: El hebreo literalmente dice "los hijos de tus hijos", pero el POB inglés auditado escogió "grandsons" por naturalidad idiomática conservando la referencia genealógica. En español, "los hijos de tus hijos" suena rígido y menos legible sin aportar una ganancia suficiente de fidelidad.
  - severity: medium
    issue: '"tus ganados" suena poco natural en español estándar'
    rationale: Aunque busca reflejar el colectivo de בקר, la forma plural "ganados" es menos idiomática en una enumeración de bienes familiares. "Manadas" mantiene el valor colectivo y contrasta bien con "rebaños".
  revised_spanish_text: Habitarás en la tierra de Gosén, y estarás cerca de mí—tú, tus hijos, tus nietos, tus rebaños, tus manadas y todo lo que tienes.
  revision_rationale: 'Se ajusta el español para seguir mejor la decisión auditada del POB y mejorar la naturalidad: "tus nietos" sustituye la literalidad pesada "los hijos de tus hijos", y "tus manadas" ofrece un colectivo más idiomático para distinguir בקר de "rebaños". No se requieren notas porque no se introduce nueva ambigüedad relevante.'
