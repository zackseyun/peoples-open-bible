translation:
  language: es
  text: Allanó un camino para su ira[a]; no libró su vida[b] de la muerte, sino que entregó su vida a la peste[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo un camino para su ira».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su alma»; aquí el sentido es «su vida».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «pestilencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְפַלֵּס
  english_pob_choice: leveled
  chosen_spanish: trazó
  alternatives_spanish:
  - allanó
  - preparó
  - hizo un camino
  lexicon: HALOT
  rationale: El pi’el de פלס expresa hacer nivelado o preparar un camino. En español, «trazó un camino» conserva la imagen concreta de abrir o disponer un curso, y suena natural en un registro poético bíblico.
- source_word: נָתִיב
  english_pob_choice: a path
  chosen_spanish: un camino
  alternatives_spanish:
  - una senda
  - una ruta
  - un sendero
  lexicon: HALOT
  rationale: נָתִיב es un término de vía/camino. «Camino» comunica bien la metáfora y encaja con el verbo sin sonar forzado.
- source_word: לְאַפּוֹ
  english_pob_choice: for his anger
  chosen_spanish: para su ira
  alternatives_spanish:
  - para su enojo
  - para su furor
  - para su cólera
  lexicon: HALOT
  rationale: אַף idiomáticamente significa ira/enojo. «Ira» preserva el tono elevado del poema y evita una paráfrasis explicativa.
- source_word: לֹא חָשַׂךְ
  english_pob_choice: he did not spare
  chosen_spanish: no escatimó
  alternatives_spanish:
  - no perdonó
  - no retuvo
  - no se abstuvo de
  lexicon: HALOT
  rationale: חָשַׂךְ puede significar ahorrar, retener o escatimar. «No escatimó» refleja bien el valor de no reservar ni ahorrar algo frente al juicio.
- source_word: מִמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de morir
  - de la mortandad
  lexicon: HALOT
  rationale: La preposición מן con מָוֶת es separativa. «De la muerte» reproduce de forma directa y clara el sentido del hebreo.
- source_word: נַפְשָׁם
  english_pob_choice: their soul
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  - su persona
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ alude a la vida mortal, no a una entidad separable de tipo doctrinal. En español, «vida» evita importar una lectura filosófica ajena al pasaje y mantiene el sentido de preservación/entrega a la muerte.
- source_word: וְחַיָּתָם
  english_pob_choice: their life/lives
  chosen_spanish: su existencia
  alternatives_spanish:
  - su vida
  - su vitalidad
  - su vivir
  lexicon: HALOT
  rationale: חַיָּה/חַיָּתָם remite a la vida viviente, la existencia en curso. «Existencia» permite distinguir este término del anterior sin perder el paralelismo semántico.
- source_word: לַדֶּבֶר
  english_pob_choice: to the plague
  chosen_spanish: a la peste
  alternatives_spanish:
  - a la plaga
  - al pestilencia
  - a la enfermedad
  lexicon: HALOT
  rationale: דֶּבֶר suele designar peste/pestilencia en contextos de juicio. «Peste» es claro en español y conserva el matiz de castigo epidémico.
- source_word: הִסְגִּיר
  english_pob_choice: gave over
  chosen_spanish: entregó
  alternatives_spanish:
  - entregó al poder de
  - cedió
  - condenó
  lexicon: HALOT
  rationale: El hifil de סגר puede significar entregar o poner en manos de otro. «Entregó» es breve, fuerte y fiel al gesto de dejar algo al juicio.
theological_decisions:
- issue: Imagen antropomórfica de la ira divina
  english_pob_reading: Retain the metaphor 'a path for his anger' without softening it into an abstract paraphrase.
  chosen_spanish_reading: 'Conservar la imagen: «Trazó un camino para su ira».'
  alternative_spanish_readings:
  - Desató su ira
  - Dejó libre curso a su ira
  rationale: El hebreo presenta una metáfora vívida. Mantenerla en español respeta la fuerza poética y no atenúa el lenguaje de juicio del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de נֶפֶשׁ en este contexto
  english_pob_reading: Translate as 'life' rather than 'soul.'
  chosen_spanish_reading: Traducir como «vida».
  alternative_spanish_readings:
  - alma
  - vida del alma
  rationale: Aquí נֶפֶשׁ se refiere a la vida mortal. «Vida» evita cargar el verso con una antropología más específica de la que exige el hebreo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó נַפְשָׁם a «their soul» y mantuvo un matiz singular para חַיָּתָם. En español, se optó por «su vida» para נַפְשָׁם y por «su existencia» para חַיָּתָם, preservando el paralelismo sin introducir una distinción artificial entre singular y plural que el español no exige con la misma naturalidad. También se conservó la metáfora de abrir/trazar un camino para la ira, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantuvo «ira» como equivalente de אַף por consistencia con el tono poético del pasaje.
  - «Peste» se eligió como equivalente accesible de דֶּבֶר en un contexto de juicio, sin convertirlo en una enfermedad genérica.
  - No se usó «alma» en el texto principal para נֶפֶשׁ, siguiendo la decisión auditada de evitar una lectura doctrinal posterior.
