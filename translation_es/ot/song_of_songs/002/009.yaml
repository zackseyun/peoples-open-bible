translation:
  language: es
  text: Mi amado[a] es como una gacela o como un joven venado. ¡Mira! Allí está de pie, detrás de nuestro muro, mirando por las ventanas, atisbando por la celosía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un cervatillo de los ciervos». El hebreo se refiere a un miembro joven de la familia de los venados; aquí se escoge «joven venado» para conservar la imagen masculina de la formulación hebrea de manera natural en español.'
    reason: lexical_alternative
  - marker: b
    text: «Celosía» se refiere a una abertura con entramado o listones en la pared o en el área de la ventana; no necesariamente a un accesorio moderno separado.
    reason: cultural_note
lexical_decisions:
- source_word: דּוֹמֶה
  english_pob_choice: is like
  chosen_spanish: es como
  alternatives_spanish:
  - se parece a
  - es semejante a
  lexicon: HALOT
  rationale: El participio expresa comparación o semejanza; en español, 'es como' comunica de manera natural esa relación poética sin endurecer la frase.
- source_word: דוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amante
  - mi querido
  lexicon: HALOT
  rationale: En Cantar de los Cantares, דוֹדִי es una apelación afectuosa y relacional. 'Mi amado' conserva el tono poético y evita una explicitación más sexual que no exige el hebreo.
- source_word: לִצְבִי
  english_pob_choice: a gazelle
  chosen_spanish: una gacela
  alternatives_spanish:
  - un ciervo
  - una corzuela
  lexicon: HALOT
  rationale: צְבִי designa un animal de la familia de los venados/gacelas. 'Gacela' es el equivalente moderno más claro y natural en español.
- source_word: לְעֹפֶר הָאַיָּלִים
  english_pob_choice: a young stag
  chosen_spanish: un cervatillo de los venados
  alternatives_spanish:
  - un joven venado
  - un cervatillo de ciervo
  lexicon: HALOT
  rationale: עֹפֶר indica un animal joven; con הָאַיָּלִים, la imagen se vincula a los venados/ciervos. 'Cervatillo de los venados' intenta conservar el matiz de juventud y el paralelismo con el hebreo, sin borrar la imagen masculina que resaltó la POB en inglés.
- source_word: הִנֵּה זֶה
  english_pob_choice: Look—there he
  chosen_spanish: ¡Mira! Allí está
  alternatives_spanish:
  - Mira, allí está
  - ¡Mira, he aquí
  lexicon: HALOT
  rationale: La expresión deíctica introduce una escena vívida. '¡Mira! Allí está' transmite la inmediatez y la atención visual sin el tono arcaizante de 'he aquí'.
- source_word: עוֹמֵד
  english_pob_choice: stands
  chosen_spanish: está
  alternatives_spanish:
  - está de pie
  - permanece
  lexicon: HALOT
  rationale: El participio describe presencia visible y sostenida. En español, 'está' funciona de forma natural en esta escena poética; 'está de pie' sería más literal pero menos fluido.
- source_word: אַחַר כָּתְלֵנוּ
  english_pob_choice: behind our wall
  chosen_spanish: detrás de nuestro muro
  alternatives_spanish:
  - detrás de nuestra pared
  - tras nuestro muro
  lexicon: HALOT
  rationale: כֹּתֶל es 'muro' o 'pared'. 'Muro' conserva mejor la imagen de separación y el registro poético del verso.
- source_word: מַשְׁגִּיחַ
  english_pob_choice: gazing
  chosen_spanish: asomándose
  alternatives_spanish:
  - mirando atentamente
  - observando
  lexicon: HALOT
  rationale: El hebreo describe una mirada atenta desde afuera, a través de una abertura. 'Asomándose' sugiere la acción de mirar desde un borde o abertura y encaja con la secuencia de ventanas/celosía sin volverla ominosa.
- source_word: מִן הַחֲלֹּנוֹת
  english_pob_choice: through the windows
  chosen_spanish: por las ventanas
  alternatives_spanish:
  - a través de las ventanas
  - desde las ventanas
  lexicon: HALOT
  rationale: Con verbos de mirada, el español admite 'por' para expresar paso visual a través de una abertura. 'Por las ventanas' suena natural y mantiene la imagen.
- source_word: מֵצִיץ
  english_pob_choice: peering
  chosen_spanish: mirando a través
  alternatives_spanish:
  - echando un vistazo
  - ojeando
  lexicon: HALOT
  rationale: El participio añade la idea de mirar por una rendija o abertura estrecha. 'Mirando a través' conserva la reiteración imagística sin introducir un giro coloquial excesivo.
- source_word: מִן הַחֲרַכִּים
  english_pob_choice: through the lattice
  chosen_spanish: la celosía
  alternatives_spanish:
  - la reja
  - las rendijas
  lexicon: HALOT
  rationale: חֲרַכִּים apunta a aberturas estrechas o entramado. 'Celosía' comunica bien el elemento arquitectónico tradicional y mantiene el paralelismo con 'ventanas'.
theological_decisions:
- issue: Imagen animal del amado y su posible carga afectiva/sexual
  english_pob_reading: The beloved is compared to a gazelle/young stag in a poetic, affectionate way.
  chosen_spanish_reading: El amado es comparado con una gacela y un cervatillo, en una imagen poética y afectuosa.
  alternative_spanish_readings:
  - en una imagen más erótica
  - como un animal salvaje sin matiz afectivo
  rationale: El hebreo y la POB inglesa sostienen una comparación lírica, no una explicación moralizante. La versión española conserva el carácter afectivo y el paralelismo poético sin intensificar innecesariamente la connotación sexual.
  doctrine_reference: Poética bíblica / lectura literaria del Cantar
- issue: 'Visibilidad desde la abertura: posible tensión entre vigilancia e intimidad'
  english_pob_reading: He is watching from behind the wall, through windows and lattice, in a vivid courtship scene.
  chosen_spanish_reading: Está detrás del muro, asomándose y mirando por las ventanas y la celosía, en una escena de observación íntima.
  alternative_spanish_readings:
  - espiando
  - vigilando
  rationale: '''Espiando'' o ''vigilando'' introducen una sospecha que el hebreo no exige. ''Asomándose'' y ''mirando'' preservan la ambigüedad y la intimidad visual del poema.'
  doctrine_reference: Poética bíblica / semántica contextual del participio
translation_notes:
  revision_awareness: El examen comparativo indica alta concordancia con la revisión inglesa más reciente (sin cambios). La redacción española sigue de cerca la lectura auditada del hebreo y adopta las decisiones léxicas clave de la POB inglesa, ajustándolas a un español natural y publicación-readable.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva 'mi amado' como fórmula afectiva estable en el Cantar.
  - Se evita 'espiar' para no introducir una lectura más negativa que la del hebreo.
  - '''Celosía'' se usa como equivalente arquitectónico tradicional y comprensible en español.'
