translation:
  language: es
  text: 'Entonces Moisés tomó la sangre y la arrojó sobre el pueblo[a], y dijo: «He aquí[b] la sangre del pacto que Yahvé ha hecho con ustedes acerca de todas estas palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la roció sobre el pueblo». El verbo hebreo dice más literalmente «arrojó» o «lanzó», pero en contextos sacrificiales puede describir la aplicación ritual de la sangre.
    reason: lexical_alternative
  - marker: b
    text: La partícula hebrea introduce una presentación solemne; también puede traducirse «Miren» o «Vean».
    reason: source_note
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - agarró
  - cogió
  lexicon: HALOT
  rationale: El verbo narrativo לקח se expresa de forma natural en español con «tomó». Mantiene el movimiento concreto del hebreo sin sobrecargar el estilo.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre sacrificada
  - esa sangre
  lexicon: HALOT
  rationale: El artículo definido se conserva como «la sangre»; el contexto sacrificial ya la identifica sin necesidad de añadir explicaciones.
- source_word: וַיִּזְרֹק
  english_pob_choice: threw
  chosen_spanish: la roció
  alternatives_spanish:
  - la arrojó
  - la echó
  - la esparció
  lexicon: HALOT
  rationale: Aunque זרק literalmente puede ser «arrojar/lanzar», en este contexto ritual el español «roció» comunica mejor la aplicación de sangre sobre el pueblo. Se mantiene la nota para no ocultar la fuerza más concreta del hebreo.
- source_word: עַל הָעָם
  english_pob_choice: on the people
  chosen_spanish: sobre el pueblo
  alternatives_spanish:
  - sobre la gente
  - encima del pueblo
  lexicon: HALOT
  rationale: «Sobre el pueblo» conserva el sentido espacial de עַל y funciona con naturalidad en español bíblico moderno.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: La partícula deíctica solemniza la declaración. «Miren» es más natural que «He aquí» en español actual, sin perder el énfasis de presentación.
- source_word: דַם הַבְּרִית
  english_pob_choice: the blood of the covenant
  chosen_spanish: la sangre del pacto
  alternatives_spanish:
  - la sangre del pacto
  - la sangre del convenio
  lexicon: HALOT
  rationale: Se traduce la cadena constructa de forma directa. En español «pacto» es la opción más estable y reconocible para el trasfondo bíblico del término בְּרִית.
- source_word: כָּרַת
  english_pob_choice: has cut / has made
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha cortado
  - ha establecido
  - ha sellado
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ha cortado», pero en español una calca como «ha cortado un pacto» suena artificial. «Ha hecho» refleja el valor idiomático reconocido en la traducción inglesa, preservando la idea de establecimiento del pacto sin forzar el castellano.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'Contested terms table: יְהוָה YHWH'
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton. «Yahvé» es la forma preferida en el proyecto para el texto principal en español.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - con ustedes todos
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se vierte de manera neutral como «con ustedes», apropiado para español latinoamericano y para un registro bíblico moderno.
- source_word: עַל כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: concerning all these words
  chosen_spanish: conforme a todas estas palabras
  alternatives_spanish:
  - con respecto a todas estas palabras
  - según todas estas palabras
  - acerca de todas estas palabras
  lexicon: HALOT
  rationale: עַל aquí marca relación con las estipulaciones pronunciadas. «Conforme a» comunica bien la referencia normativa del pacto en español, y mantiene la conexión con las palabras recién dichas.
theological_decisions:
- issue: Idiom of covenant-making כָּרַת ... בְּרִית
  english_pob_reading: has made with you
  chosen_spanish_reading: ha hecho con ustedes
  alternative_spanish_readings:
  - ha cortado con ustedes
  - ha establecido con ustedes
  - ha sellado con ustedes
  rationale: El hebreo conserva el idioma de «cortar» un pacto, pero la lectura inglesa ya reconoce el valor idiomático con «has made». En español, «ha hecho» comunica el sentido pactal de manera clara y no oculta el trasfondo sacrificial del contexto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Function of עַל כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_reading: concerning all these words
  chosen_spanish_reading: conforme a todas estas palabras
  alternative_spanish_readings:
  - con respecto a todas estas palabras
  - según todas estas palabras
  - acerca de todas estas palabras
  rationale: La preposición no describe mera ubicación; relaciona la sangre del pacto con las palabras/estipulaciones que acaban de ser dadas. «Conforme a» conserva esa relación normativa y evita una lectura demasiado abstracta.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo directamente y toma en cuenta la auditoría inglesa: se respeta la fuerza concreta de וַיִּזְרֹק mediante una nota, se conserva el nombre divino como Yahvé/Yahvé, y se adopta una solución española idiomática para כָּרַת ... בְּרִית sin perder el trasfondo pactal. También se ajusta עַל כָּל הַדְּבָרִים הָאֵלֶּה a una relación normativa natural en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «pacto» para בְּרִית, por coherencia con el lenguaje bíblico-covenantal en español.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - Se mantiene «Miren» como equivalente solemne de הִנֵּה, con nota explicativa.
  - Se conserva la nota de alternativa para el verbo ritual de sangre, porque el español «roció» no reproduce por sí solo la literalidad de זרק.
