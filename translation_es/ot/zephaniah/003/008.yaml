translation:
  language: es
  text: Por tanto, espérenme, declara Yahvé, para el día en que yo me levante para el botín[a]; porque mi juicio es reunir naciones, reunir reinos, derramar sobre ellos mi indignación, todo mi ardor de ira; porque en el fuego de mi celo[b] será consumida toda la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «para presa». El hebreo de לְעַד es difícil. La revisión más reciente del POB adopta el sentido de botín/presa; una interpretación alternativa lo entiende en sentido judicial, como «por testimonio» o «como testigo».
    reason: alternative_reading
  - marker: b
    text: «Celo» también puede traducirse «celos» o «ardor», según el contexto.
    reason: lexical_alternative
  - marker: c
    text: «Tierra» también puede traducirse «país» o «territorio», pero el contexto de naciones y reinos favorece aquí el sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Conserva el valor inferencial del hebreo y suena natural en español bíblico contemporáneo sin perder solemnidad.
- source_word: חַכּוּ לִי
  english_pob_choice: wait for me
  chosen_spanish: esperenme
  alternatives_spanish:
  - espérenme
  - espérenme con expectativa
  lexicon: HALOT
  rationale: Imperativo plural dirigido a los oyentes; en español, la forma enclítica unida al verbo expresa mejor la relación directa con Yahvé. Se evita una paráfrasis más amplia que añadiría matiz no explícito.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética y el nombre divino según el estándar del proyecto, sin sustituirlo por un ocultamiento litúrgico.
- source_word: לְיוֹם קוּמִי
  english_pob_choice: for the day when I rise up
  chosen_spanish: para el día en que yo me levante
  alternatives_spanish:
  - para el día de mi levantamiento
  - hasta el día en que me levante
  lexicon: HALOT
  rationale: La construcción temporal se vierte de modo natural en español y mantiene la imagen de la acción futura de Yahvé.
- source_word: לְעַד
  english_pob_choice: for plunder
  chosen_spanish: para el botín
  alternatives_spanish:
  - como botín
  - para presa
  lexicon: HALOT
  rationale: Se adopta la lectura que la revisión más reciente del POB considera probable y que encaja mejor con el flujo del versículo. 'Botín' conserva la imagen de despojo/saqueo implícita en la alternativa interpretativa.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my judgment
  chosen_spanish: mi juicio
  alternatives_spanish:
  - mi sentencia
  - mi decisión judicial
  lexicon: HALOT
  rationale: '''Juicio'' comunica bien la esfera legal y judicial del pasaje y funciona de forma más idiomática en español que una calca más técnica.'
- source_word: לֶאֱסֹף גּוֹיִם
  english_pob_choice: to gather nations
  chosen_spanish: reunir naciones
  alternatives_spanish:
  - juntar naciones
  - agrupar naciones
  lexicon: HALOT
  rationale: '''Reunir'' expresa la acción de convocar/recoger sin perder la formalidad del paralelismo.'
- source_word: לְקָבְצִי מַמְלָכוֹת
  english_pob_choice: to assemble kingdoms
  chosen_spanish: juntar reinos
  alternatives_spanish:
  - reunir reinos
  - agrupar reinos
  lexicon: HALOT
  rationale: Se usa un sinónimo español para mantener el paralelismo hebreo sin sonar redundante o forzado.
- source_word: לִשְׁפֹּךְ עֲלֵיהֶם זַעְמִי
  english_pob_choice: to pour out on them my indignation
  chosen_spanish: derramar sobre ellos mi indignación
  alternatives_spanish:
  - derramar sobre ellos mi ira
  - verter sobre ellos mi furor
  lexicon: HALOT
  rationale: '''Derramar'' preserva el verbo metafórico; ''indignación'' mantiene el matiz semántico distinguible de ''ira'' en la siguiente cola.'
- source_word: כֹּל חֲרוֹן אַפִּי
  english_pob_choice: all my burning anger
  chosen_spanish: todo mi ardor de ira
  alternatives_spanish:
  - toda mi ira ardiente
  - todo mi furor encendido
  lexicon: HALOT
  rationale: '''Ardor de ira'' transmite la intensidad y el carácter figurado del hebreo sin repetir innecesariamente ''indignación''. Se mantiene la fuerza emocional del binomio idiomático.'
- source_word: בְּאֵשׁ קִנְאָתִי
  english_pob_choice: in the fire of my jealousy
  chosen_spanish: en el fuego de mi celo
  alternatives_spanish:
  - en el fuego de mi celosía
  - en el fuego de mi celo divino
  lexicon: HALOT
  rationale: Se prefiere 'celo' porque en español puede expresar la intensidad protectora/covenantal del término sin la carga negativa de 'celos'. Se conserva el fuego metafórico.
- source_word: תֵּאָכֵל כָּל הָאָרֶץ
  english_pob_choice: all the earth will be consumed
  chosen_spanish: será consumida toda la tierra
  alternatives_spanish:
  - será devorada toda la tierra
  - toda la tierra será consumida
  lexicon: HALOT
  rationale: La pasiva refleja el niphal y 'tierra' mantiene la amplitud cósmica que el contexto de naciones y reinos favorece.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, manteniendo visibilidad del nombre propio divino sin enmascararlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Sentido de לְעַד
  english_pob_reading: for plunder
  chosen_spanish_reading: para el botín
  alternative_spanish_readings:
  - para presa
  - como botín
  rationale: La revisión más reciente del audit trail favorece la lectura de botín/presa sobre una interpretación judicial más distante. Se preserva esta tensión traductológica sin borrar la alternativa.
  doctrine_reference: English POB revision history / preserve meaningful ambiguity where source and tradition diverge
- issue: קִנְאָה aplicado a Dios
  english_pob_reading: jealousy
  chosen_spanish_reading: celo
  alternative_spanish_readings:
  - celos
  - jealousy
  rationale: En contexto de pacto, el término puede denotar exclusividad protectora más que emoción humana posesiva. 'Celo' comunica esa tensión en español; se conserva la imagen del fuego para no desactivar la fuerza del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological tension/ambiguity in footnotes)
- issue: Amplitude de הָאָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - todo el país
  - toda la región
  rationale: El contexto inmediato de 'naciones' y 'reinos' apoya la amplitud global; 'tierra' mantiene la resonancia totalizante del juicio.
  doctrine_reference: HALOT / context-driven semantic range
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail, que cambió la comprensión de לְעַד desde una lectura judicial más amplia hacia 'botín/presa', y he conservado el paralelismo semántico del versículo sin ocultar la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como máscara litúrgica.
  - '''Juicio'' se usa para מִשְׁפָּטִי por su naturalidad en español y su campo jurídico.'
  - Se distingue 'indignación' de 'ardor de ira' para reflejar los dos vocablos hebreos correlacionados.
  - '''Tierra'' se conserva con amplitud cósmica, no como mera región local.'
