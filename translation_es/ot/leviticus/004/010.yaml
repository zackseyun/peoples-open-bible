translation:
  language: es
  text: tal como se quita del buey del sacrificio de las ofrendas de paz[a], y el sacerdote los quemará sobre el altar de la ofrenda quemada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «se levanta del buey del sacrificio de las ofrendas de paz». El verbo hebreo evoca la remoción y elevación de las porciones destinadas a ser ofrecidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: HALOT
  rationale: Expresa con naturalidad la comparación procedimental con lo establecido antes, manteniendo la relación de analogía sin sobrecargar el español.
- source_word: יוּרַם
  english_pob_choice: it is removed
  chosen_spanish: se aparta
  alternatives_spanish:
  - se quita
  - es removido
  - se levanta
  lexicon: HALOT
  rationale: 'En contexto sacrificial, el verbo alude al acto ritual de separar las porciones para ofrecerlas. ''Se aparta'' conserva la idea de retirada/separación y deja visible la resonancia de ''elevar/llevar''. '
- source_word: מִשּׁוֹר
  english_pob_choice: from the ox
  chosen_spanish: del buey
  alternatives_spanish:
  - del toro
  - de la res
  lexicon: HALOT
  rationale: שור designa bovino; 'buey' es un equivalente claro y sobrio en español bíblico, cercano al valor léxico de 'ox' en inglés y adecuado al registro ritual.
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: del sacrificio de las ofrendas de paz
  alternatives_spanish:
  - del sacrificio de los ofrendas de paz
  - de la ofrenda de paz
  - del sacrificio de comunión
  lexicon: HALOT
  rationale: Se conserva la estructura nominal amplia que el audit trail inglés reforzó en la revisión. 'Ofrendas de paz' sigue la tradición semántica de שְׁלָמִים sin sustituirla por un glosario interpretativo diferente.
- source_word: וְהִקְטִירָם
  english_pob_choice: and ... shall burn them
  chosen_spanish: los quemará
  alternatives_spanish:
  - los hará arder
  - los ofrecerá en humo
  - los quemará como ofrenda
  lexicon: HALOT
  rationale: En contexto de altar, el verbo cultual puede expresarse con 'quemar' en español sin perder el sentido sacrificial; el objeto pronominal antecedente queda claro por el contexto inmediato.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiará
  - el sacerdote
  lexicon: HALOT
  rationale: Término estándar y transparente para el agente ritual.
- source_word: עַל מִזְבַּח הָעֹלָה
  english_pob_choice: on the altar of burnt offering
  chosen_spanish: sobre el altar del holocausto
  alternatives_spanish:
  - sobre el altar del sacrificio quemado
  - sobre el altar del holocausto
  lexicon: HALOT
  rationale: '''Altar del holocausto'' es la forma tradicional y comprensible en español para el altar de la ofrenda totalmente quemada; preserva el vínculo cultual con עֹלָה.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que amplió זֶבַח הַשְּׁלָמִים a 'sacrifice of peace offerings', por lo que en español se conserva explícitamente 'del sacrificio de las ofrendas de paz'. También se mantiene el valor ritual de יוּרַם con una nota que recoge la alternativa literal 'se levanta'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del Tetragrámaton en este proyecto cuando aparezca en el contexto cercano; aquí no aparece en el versículo.
  - '''Ofrendas de paz'' mantiene la equivalencia con el campo semántico de שְׁלָמִים y evita introducir una paráfrasis doctrinal.'
  - '''Holocausto'' se emplea en el sentido cultual tradicional para עֹלָה, no en el uso moderno de destrucción masiva.'
