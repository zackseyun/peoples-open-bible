translation:
  language: es
  text: Él edificó la ciudad alrededor, desde el Milo[b] hasta el área circundante, y Joab restauró[a] el resto de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «revivió» o «reparó». El verbo hebreo literalmente significa «hizo vivir», y aquí probablemente se usa de manera idiomática para restaurar la ciudad.'
    reason: lexical_alternative
  - marker: b
    text: «Milo» es un término topográfico de Jerusalén; su significado preciso es incierto. Puede referirse a una estructura en terrazas o a un terraplén de relleno.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: He built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó de nuevo
  lexicon: HALOT
  rationale: El qal wayyiqtol de בנה expresa una acción narrativa pasada; en español, «edificó» conserva mejor el tono solemne y el sentido de construcción. No se añadió «de nuevo», porque el hebreo no lo explicita.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - el poblado
  lexicon: HALOT
  rationale: עִיר se traduce naturalmente por «ciudad». «La ciudad» también mantiene la referencia a Jerusalén en el contexto.
- source_word: מִסָּבִיב
  english_pob_choice: all around
  chosen_spanish: en derredor
  alternatives_spanish:
  - alrededor
  - todo alrededor
  lexicon: HALOT
  rationale: La idea adverbial de cobertura total se expresa bien con «en derredor», que conserva el matiz de contorno/circunferencia sin sonar demasiado coloquial.
- source_word: מִן הַמִּלּוֹא
  english_pob_choice: from the Millo
  chosen_spanish: desde el Milo
  alternatives_spanish:
  - desde el Millo
  - desde la terraza de relleno
  lexicon: HALOT
  rationale: Se conserva el topónimo técnico como «Milo», siguiendo la decisión de no imponer una explicación interpretativa en el texto principal. La forma sin artículo es natural en español para un nombre propio/topográfico.
- source_word: וְעַד הַסָּבִיב
  english_pob_choice: even to the surrounding area
  chosen_spanish: hasta el área circundante
  alternatives_spanish:
  - hasta lo circundante
  - hasta el contorno
  lexicon: HALOT
  rationale: «Hasta el área circundante» refleja el alcance espacial comprimido del hebreo y mantiene la extensión del perímetro. «Área circundante» evita forzar un tecnicismo que el texto no define.
- source_word: יְחַיֶּה
  english_pob_choice: restored
  chosen_spanish: restauró
  alternatives_spanish:
  - revivió
  - mantuvo vivo
  - reparó
  lexicon: HALOT
  rationale: El piel de חיה literalmente significa «hacer vivir», pero aplicado a una ciudad funciona idiomáticamente como restauración/rehabilitación. «Restauró» comunica esa función sin perder la tensión semántica documentada.
- source_word: אֶת שְׁאָר הָעִיר
  english_pob_choice: the rest of the city
  chosen_spanish: el resto de la ciudad
  alternatives_spanish:
  - el remanente de la ciudad
  - lo que quedaba de la ciudad
  lexicon: HALOT
  rationale: שְׁאָר significa «resto/remanente». «El resto de la ciudad» es la equivalencia más directa y natural en español.
theological_decisions:
- issue: Sentido idiomático de יְחַיֶּה aplicado a una ciudad
  english_pob_reading: ‘restored/revived/repaired’ is likely idiomatic for restoring the city, while literally meaning ‘made alive’
  chosen_spanish_reading: «restauró» en el texto principal, preservando en la nota la posibilidad literal de «revivió/reparó»
  alternative_spanish_readings:
  - revivió
  - reparó
  - dio vida de nuevo
  rationale: La metáfora de «hacer vivir» no debe borrarse, pero en español «restauró» transmite mejor la acción urbana real sin exagerar el literalismo. La tensión entre sentido literal e idiomático queda visible en la nota.
  doctrine_reference: Principio de transparencia lexical; uso idiomático de metáfora verbal sin doctrinalización indebida
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español. La redacción mantiene el valor audit trail del inglés POB y conserva la ambigüedad documentada del hebreo en יְחַיֶּה y מִלּוֹא.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto solo cuando el hebreo lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se usa «edificó»/«restauró» con registro bíblico moderno y claro, evitando calcos innecesarios.
  - Los topónimos y términos técnicos se preservan cuando el texto fuente no define con certeza una equivalencia más interpretativa.
