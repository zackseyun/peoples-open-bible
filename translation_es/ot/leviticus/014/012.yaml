revisions:
- from: Entonces el sacerdote tomará el cordero macho[a] y lo presentará como expiación por la culpa[b], junto con el log de aceite, y lo mecerá como ofrenda mecida delante de Yahvé.
  to: Entonces el sacerdote tomará el único cordero macho[a] y lo presentará como ofrenda por la culpa[b], junto con el log[c] de aceite, y los mecerá como ofrenda mecida delante de Yahvé.
  rationale: La revisión corrige el plural exigido por אֹתָם, restituye mejor la categoría sacrificial técnica de אָשָׁם, conserva el matiz distintivo de הָאֶחָד, y añade la nota cultural sobre «log» presente en el rastro POB. El resultado suena natural en español bíblico actual sin apartarse del hebreo ni de las decisiones documentadas del POB.
