translation:
  language: es
  text: Entonces Josué echó suertes para ellos en Silo, delante de Yahvé, y allí Josué repartió la tierra a los hijos de Israel[a], según sus divisiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Israel». La expresión se refiere corporativamente al pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁלֵךְ
  english_pob_choice: cast
  chosen_spanish: echó
  alternatives_spanish:
  - echó suertes
  - tiró
  - arrojó
  lexicon: HALOT
  rationale: En español, con גּוֹרָל ('suerte'), la forma natural y fiel es 'echar suertes'. 'Echó' conserva el valor idiomático del acto de sorteo sin sonar forzado.
- source_word: גּוֹרָל
  english_pob_choice: lots
  chosen_spanish: suertes
  alternatives_spanish:
  - suerte
  - lotes
  lexicon: HALOT
  rationale: El sustantivo singular hebreo funciona de manera distributiva en el contexto de repartición tribal. En español, 'suertes' expresa bien el procedimiento de sorteo y evita una traducción demasiado literal que sonaría extraña.
- source_word: בְּשִׁלֹה
  english_pob_choice: at Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Siló
  - en Shiloh
  lexicon: HALOT
  rationale: Para el topónimo bíblico, 'Silo' es la forma establecida en español bíblico y sigue siendo inteligible; mantiene la referencia geográfica del lugar.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: '''Delante de'' comunica la idea de acto realizado en la presencia de Dios, con un matiz ceremonial y público natural en español. Se preserva el nombre divino ''Yahvé'' conforme al criterio del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, usando 'Yahvé' y no una sustitución por 'SEÑOR'. Esto mantiene visible el nombre del pacto en el texto español.
- source_word: וַיְחַלֶּק
  english_pob_choice: divided
  chosen_spanish: repartió
  alternatives_spanish:
  - dividió
  - apportionó
  - distribuyó
  lexicon: HALOT
  rationale: '''Repartió'' transmite con naturalidad la acción de asignar la tierra por porciones a las tribus. En español suena más idiomático que ''dividió'' en un contexto administrativo de heredad.'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el territorio
  lexicon: HALOT
  rationale: En Josué, 'la tierra' remite al territorio de herencia que se distribuye a Israel. 'La tierra' conserva esa fuerza covenantal sin añadir precisión interpretativa no explícita.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - a los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la relación literal 'hijos de Israel', que en español es clara y mantiene el matiz corporativo del hebreo sin neutralizarlo.
- source_word: כְּמַחְלְקֹתָם
  english_pob_choice: according to their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - conforme a sus repartos
  - según sus reparticiones
  lexicon: HALOT
  rationale: '''Divisiones'' reproduce el sustantivo hebreo de manera transparente y encaja con el reparto tribal. ''Según'' expresa adecuadamente el criterio distributivo del texto.'
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula ceremonial
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - en presencia de Yahvé
  - delante del SEÑOR
  rationale: El texto presenta el Tetragrámaton en un marco ritual/jurídico. Se mantiene 'Yahvé' por la norma del proyecto, preservando visiblemente el nombre del pacto y evitando la sustitución tradicional por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Concordancia alta con el audit trail inglés. Ajusté el verbo final a 'repartió' por naturalidad en español, manteniendo la misma función semántica de 'dividió/apportionó' y sin perder la idea de distribución por heredad. También preservé el nombre divino 'Yahvé' según la política del proyecto, en lugar del mascaramiento litúrgico tradicional.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' coherente con el criterio del proyecto para יְהוָה.
  - '''Hijos de Israel'' conserva el valor corporativo y la forma más cercana al hebreo.'
  - '''Echar suertes'' / ''suertes'' expresa el sorteo sin introducir una paráfrasis amplia.'
  - '''Repartió la tierra'' comunica la apportionment tribal con fluidez en español moderno.'
