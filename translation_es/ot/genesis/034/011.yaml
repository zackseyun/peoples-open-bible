translation:
  language: es
  text: 'Entonces Siquem dijo al padre de ella y a los hermanos de ella: «Que yo halle favor[a] ante sus ojos, y cualquier cosa que ustedes me digan[b], se los daré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que yo halle favor a sus ojos»; o «Que yo halle favor ante ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cualquier cosa que ustedes me pidan, se los daré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La forma consecutiva avanza la narración; «Entonces» comunica bien la secuencia en español sin perder la progresión del relato.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  lexicon: convención onomástica bíblica
  rationale: Se translitera el nombre propio con la forma castellana ampliamente reconocible y de lectura natural.
- source_word: אֶל אָבִיהָ וְאֶל אַחֶיהָ
  english_pob_choice: to her father and to her brothers
  chosen_spanish: a su padre y a sus hermanos
  alternatives_spanish:
  - a su padre y a sus hermanos
  - ante su padre y sus hermanos
  lexicon: HALOT
  rationale: El hebreo repite אֶל; en español la duplicación de «a» resulta pesada. Se conserva el doble destinatario con una sintaxis natural, sin perder que Siquem se dirige a ambos grupos.
- source_word: אֶמְצָא חֵן
  english_pob_choice: Let me find favor
  chosen_spanish: Permítanme hallar favor
  alternatives_spanish:
  - Que yo halle favor
  - Permítanme encontrar gracia
  lexicon: HALOT
  rationale: «Hallar favor» preserva el modismo hebreo. Se eligió una formulación de petición directa en plural de respeto/atención hacia los interlocutores, acorde con el contexto de negociación.
- source_word: בְּעֵינֵיכֶם
  english_pob_choice: in your eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a sus ojos
  - en sus ojos
  lexicon: HALOT
  rationale: La imagen idiomática se mantiene con «ante sus ojos», expresión natural en español para el valor de aceptación o beneplácito.
- source_word: וַאֲשֶׁר תֹּאמְרוּ אֵלַי
  english_pob_choice: and whatever you say to me
  chosen_spanish: y lo que sea que ustedes me digan
  alternatives_spanish:
  - y todo lo que me digan
  - y lo que ustedes me pidan
  lexicon: HALOT
  rationale: Se conserva el carácter abierto del relativo indefinido. «Digan» sigue de cerca el valor de אָמַר; no se adopta «pidan» en el texto principal porque esa es una inferencia contextual, no el sentido verbal básico.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: yo lo daré
  alternatives_spanish:
  - daré
  - yo daré
  lexicon: HALOT
  rationale: «Dar» reproduce el sentido básico de נָתַן sin restringirlo indebidamente. El pronombre «lo» es natural en español para referirse a la cosa ofrecida o concedida en el intercambio implícito.
theological_decisions:
- issue: חֵן como favor/gracia en un contexto de petición
  english_pob_reading: Let me find favor
  chosen_spanish_reading: Permítanme hallar favor
  alternative_spanish_readings:
  - Permítanme hallar gracia
  - Permítanme encontrar favor
  rationale: Se mantiene la neutralidad semántica de חֵן como aceptación/favor. «Gracia» es posible, pero en español puede sonar más teológica de lo que requiere esta petición concreta.
  doctrine_reference: Uso léxico-contextual de חֵן; no implica una declaración doctrinal específica.
translation_notes:
  revision_awareness: Se respetó el estado de alta concordancia del audio inglés y no se introdujeron revisiones sustantivas. La redacción española sigue el hebreo directamente y mantiene las alternativas léxicas relevantes donde el inglés POB las documenta.
  spanish_consistency_notes:
  - Se usa «Siquem» para el nombre propio y «favor» para חֵן en el texto principal, en coherencia con la tradición del proyecto y la naturalidad del español.
  - Se evitó «SEÑOR» u otra sustitución teológica no pertinente, pues el versículo no contiene el tetragrámaton ni un título divino.
  - Se conserva la distinción entre «decir» y «pedir» en el verbo principal, dejando la lectura contextual como alternativa en nota.
