translation:
  language: es
  text: Porque, como dije, la razón prudente puede triunfar sobre las pasiones, y redirigir algunas de ellas, e incluso anular otras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σώφρων
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sensato
  - sobrio
  - temperante
  lexicon: LSJ
  rationale: En este contexto filosófico, el adjetivo modifica νοῦς y expresa juicio disciplinado y recto. «Prudente» comunica mejor esa capacidad de discernimiento moral que una mera moderación emocional.
- source_word: νοῦς
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - mente
  - entendimiento
  - intelecto
  lexicon: LSJ
  rationale: En 4 Macabeos, νοῦς funciona como facultad racional central. «Razón» conserva el sentido de la facultad que gobierna y juzga, y suena natural en español dentro del argumento filosófico.
- source_word: κατὰ τῶν παθῶν
  english_pob_choice: over the passions
  chosen_spanish: sobre las pasiones
  alternatives_spanish:
  - contra las pasiones
  - sobre los sufrimientos
  - contra las emociones
  lexicon: LSJ
  rationale: Aquí πάθη alude a impulsos o pasiones, no a sufrimientos. «Sobre las pasiones» mantiene la idea de dominio o superioridad que exige el contexto.
- source_word: ἀριστεῦσαι
  english_pob_choice: to triumph
  chosen_spanish: triunfar
  alternatives_spanish:
  - sobresalir
  - prevalecer
  - vencer
  lexicon: LSJ
  rationale: El verbo expresa llegar a ser superior o sobresalir en la contienda. «Triunfar» transmite bien la victoria efectiva de la razón sobre las pasiones sin sonar forzado.
- source_word: μεταθεῖναι
  english_pob_choice: to redirect
  chosen_spanish: redirigir
  alternatives_spanish:
  - cambiar
  - transferir
  - alterar
  lexicon: LSJ
  rationale: El verbo indica cambiar la orientación o curso de algunas pasiones, no necesariamente eliminarlas. «Redirigir» preserva esa matización y mantiene el contraste con el verbo final.
- source_word: ἀκυρῶσαι
  english_pob_choice: to nullify
  chosen_spanish: anular
  alternatives_spanish:
  - invalidar
  - abolir
  - volver ineficaces
  lexicon: LSJ
  rationale: La idea es hacer inútil o sin efecto. «Anular» conserva la fuerza del término y funciona bien en español con el paralelismo de la cláusula anterior.
- source_word: τὰ μὲν αὐτῶν ... τὰ δὲ καί
  english_pob_choice: some of them ... others even
  chosen_spanish: algunas de ellas ... e incluso otras
  alternatives_spanish:
  - unas ... otras
  - algunas en verdad ... otras también
  lexicon: LSJ
  rationale: 'La correlación distingue dos resultados entre las pasiones: unas son redirigidas y otras quedan anuladas. El español mantiene esa contraposición sin rigidizar la sintaxis griega.'
theological_decisions:
- issue: Marco antropológico-filosófico de νοῦς y πάθη
  english_pob_reading: The verse is rendered in terms of rational mastery over passions without importing later doctrinal categories.
  chosen_spanish_reading: El versículo se presenta como dominio racional sobre las pasiones, sin introducir categorías doctrinales posteriores.
  alternative_spanish_readings:
  - Traducir νοῦς más genéricamente como «mente»
  - Traducir πάθη de forma más amplia como «emociones»
  rationale: El texto pertenece a una argumentación judía helenística sobre el gobierno de la razón. La redacción española conserva ese mundo conceptual y evita tanto la sobreinterpretación como la nivelación de la terminología filosófica.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Fuente griega y auditoría inglesa en alta concordancia; no se registran revisiones aplicadas en el expediente más reciente, por lo que el borrador español sigue de cerca la lectura aprobada sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se tradujo πάθη por «pasiones» para mantener la terminología filosófica del pasaje.
  - Se eligió «razón» para νοῦς por coherencia con el argumento sobre el gobierno racional de las pasiones.
  - Se evitó «SEÑOR» o terminología de sustitución, ya que el versículo no contiene el nombre divino.
  - Se mantuvo una sintaxis española fluida sin perder la estructura correlativa de «unas... otras».
