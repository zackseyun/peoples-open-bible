translation:
  language: es
  text: Y él hará volver sobre ti todas las enfermedades de Egipto[a] que temiste[b], y se te pegarán[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las dolencias de Egipto».
    reason: lexical_alternative
  - marker: b
    text: O «que temías».
    reason: lexical_alternative
  - marker: c
    text: O «se adherirán a ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁיב
  english_pob_choice: he will bring back
  chosen_spanish: hará volver
  alternatives_spanish:
  - traerá de vuelta
  - hará regresar
  lexicon: HALOT
  rationale: El hifil de שוב es causativo; en español, «hará volver» comunica bien la idea de hacer regresar o reintroducir sobre alguien las plagas, sin perder el valor causativo del hebreo.
- source_word: בְּךָ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - sobre ti mismo
  - contra ti
  - en ti
  lexicon: HALOT
  rationale: Con verbos de aflicción, la preposición expresa imposición o carga. «Sobre ti» reproduce mejor ese matiz que una simple dirección «a ti».
- source_word: כָּל מַדְוֵה מִצְרַיִם
  english_pob_choice: all the diseases of Egypt
  chosen_spanish: todas las enfermedades de Egipto
  alternatives_spanish:
  - todas las dolencias de Egipto
  - todos los males de Egipto
  - todas las plagas de Egipto
  lexicon: HALOT
  rationale: מַדְוֶה designa enfermedad/dolencia; «enfermedades» es la equivalencia más directa y evita ampliar indebidamente a «plagas». «De Egipto» mantiene el genitivo del texto.
- source_word: יָגֹרְתָּ מִפְּנֵיהֶם
  english_pob_choice: that you dreaded
  chosen_spanish: que temiste
  alternatives_spanish:
  - que te aterraban
  - de las que tuviste miedo
  - que te dieron miedo
  lexicon: HALOT
  rationale: יגר expresa temor intenso; «temiste» es natural en español y preserva el sentido sin añadir una intensidad interpretativa mayor que la del hebreo. El pronombre plural en hebreo se refiere a las enfermedades.
- source_word: וְדָבְקוּ
  english_pob_choice: and they will cling to you
  chosen_spanish: y se pegarán a ti
  alternatives_spanish:
  - y se adherirán a ti
  - y se te pegarán
  - y se te adherirán
  lexicon: HALOT
  rationale: דבק conserva la imagen física de adherirse o pegarse. «Se pegarán a ti» suena natural en español y mantiene la fuerza concreta de la metáfora.
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo base y con la revisión inglesa actual; no se detectaron cambios aplicados en la línea de revisión más reciente. Se mantiene la misma estructura de castigo gradual: retorno de enfermedades, temor previo y adhesión persistente.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» por defecto del proyecto solo cuando aparece el Tetragrámaton; aquí no aparece ningún nombre divino.
  - Se traduce מַדְוֶה como «enfermedades» en lugar de «plagas» para respetar el valor léxico directo del sustantivo.
  - Se mantiene el tono de amenaza judicial del contexto sin añadir explicaciones doctrinales ajenas al versículo.
