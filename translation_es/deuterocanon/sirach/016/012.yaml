translation:
  language: es
  text: Tan grandes como son sus misericordias[a], así también es su reprensión[b]; juzgará a un hombre[c] según sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “su misericordia” (singular), aunque el hebreo tiene el plural “sus misericordias”.
    reason: lexical_alternative
  - marker: b
    text: O “su corrección” o “su reprensión”; el griego también tiene la idea de “reprensión”.
    reason: lexical_alternative
  - marker: c
    text: El hebreo “un hombre” usa una forma masculina singular con valor representativo.
    reason: cultural_note
lexical_decisions:
- source_word: כְּרָב / κατὰ τὸ πολὺ
  english_pob_choice: as great as
  chosen_spanish: tan grandes como son
  alternatives_spanish:
  - según la abundancia de
  - en proporción a la grandeza de
  lexicon: HALOT; Greek κατὰ τὸ πολὺ
  rationale: 'La construcción comparativa expresa proporción: “as ... so ...”. En español, “tan grandes como son” conserva la relación proporcional y suena natural. Evita una paráfrasis excesiva y mantiene la fuerza cuantitativa del hebreo y del griego.'
- source_word: רַחֲמָיו / ἔλεος αὐτοῦ
  english_pob_choice: his mercies
  chosen_spanish: sus misericordias
  alternatives_spanish:
  - su misericordia
  - su compasión
  lexicon: HALOT; Greek ἔλεος
  rationale: Se conserva el plural hebreo, que comunica abundancia de actos misericordiosos. “Misericordias” refleja mejor el testimonio hebreo que el singular griego, sin perder inteligibilidad en español.
- source_word: תּוֹכַחְתּוֹ / ἔλεγχος αὐτοῦ
  english_pob_choice: his reproof
  chosen_spanish: su reprobación
  alternatives_spanish:
  - su reprensión
  - su corrección
  - su reprueba
  lexicon: HALOT; Greek ἔλεγχος
  rationale: El campo semántico apunta a corrección, reprensión o reprobación moral, no a castigo meramente punitivo. “Reprobación” mantiene el tono judicial-moral y preserva la tensión teológica entre misericordia y corrección. Se evita “castigo” porque estrecha indebidamente el sentido.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a cada hombre
  lexicon: HALOT
  rationale: El hebreo usa una forma masculina singular con valor representativo. “A un hombre” conserva esa forma y funciona de manera genérica en contexto, alineado con la decisión inglesa.
- source_word: כְּמִפְעָלָיו / κατὰ τὰ ἔργα αὐτοῦ
  english_pob_choice: according to his deeds
  chosen_spanish: según sus obras
  alternatives_spanish:
  - de acuerdo con sus obras
  - conforme a sus obras
  - según lo que ha hecho
  lexicon: HALOT; Greek ἔργα
  rationale: “Obras” reproduce bien el paralelismo con ἔργα y suena bíblicamente natural en español. “Según” conserva la idea de medida/criterio judicial presente tanto en el hebreo como en el griego.
- source_word: יִשְׁפֹּט / κρινεῖ
  english_pob_choice: he will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - él juzgará
  - dictaminará
  lexicon: HALOT; Greek κρινεῖ
  rationale: El futuro español expresa bien el valor gnómico-profético del imperfecto hebreo y coincide con el futuro griego. “Juzgará” mantiene el lenguaje forense y solemne del pasaje.
theological_decisions:
- issue: Relación entre misericordia divina y corrección/juzgamiento
  english_pob_reading: The verse presents mercy and reproof together in proportion, followed by judgment according to deeds.
  chosen_spanish_reading: El versículo presenta misericordia y reprobación en proporción, seguido de juicio conforme a las obras.
  alternative_spanish_readings:
  - misericordia y corrección
  - misericordia y reprensión
  - misericordia y castigo
  rationale: 'El hebreo תּוֹכַחַת y el griego ἔλεγχος favorecen una corrección o reprensión moral, no un castigo puramente retributivo. “Reprobación” conserva esa tensión: la misericordia abundante no anula la responsabilidad moral ni el juicio según las obras.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence.'
translation_notes:
  revision_awareness: El control cruzado reporta alta concordancia (agree) entre hebreo y griego, sin cambios pendientes en la última pasada. La redacción española sigue de cerca el hebreo como testimonio primario y mantiene en nota la alternativa que ofrece el griego para ἔλεος/ἔλεγχος.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma por defecto cuando aparezca el nombre divino; aquí no se usa.
  - Se usa “obras” para el paralelismo con ἔργα, en lugar de un término más abstracto.
  - Se evita “castigo” para no borrar la dimensión correctiva documentada en la tradición textual.
  - Las notas a, b y c están ancladas en el texto y corresponden a alternativas reales del expediente auditado.
