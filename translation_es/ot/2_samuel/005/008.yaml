translation:
  language: es
  text: 'Y David dijo aquel día: «Cualquiera que hiera a los jebuseos y alcance el canal[a], y a los cojos y a los ciegos, a quienes el alma de David aborrece. Por eso dicen[b]: “El ciego y el cojo no entrarán en la casa[c]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conducto», «desagüe» o «túnel»; el término hebreo probablemente se refiere a un sistema de agua o a un pozo o conducto vertical, pero su sentido preciso es incierto.
    reason: lexical_alternative
  - marker: b
    text: La sintaxis hebrea de esta cláusula es difícil. Algunos entienden que las palabras «el cojo y el ciego» pertenecen a la burla del versículo anterior, en vez de ser el objeto directo de la declaración de David.
    reason: alternative_reading
  - marker: c
    text: O «palacio»; «casa» puede referirse a la residencia real en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מַכֵּה יְבֻסִי
  english_pob_choice: Whoever strikes the Jebusites
  chosen_spanish: Cualquiera que hiera al jebuseo
  alternatives_spanish:
  - Todo el que hiera al jebuseo
  - Quienquiera que hiera a los jebuseos
  lexicon: HALOT
  rationale: כָּל con el participio introduce una fórmula indefinida de desafío; en español, «cualquiera que» comunica mejor esa función. «Jebuseo» singular conserva el valor gentilicio del hebreo, que en español puede funcionar colectivamente sin perder naturalidad.
- source_word: וְיִגַּע
  english_pob_choice: and reaches
  chosen_spanish: y alcance
  alternatives_spanish:
  - y toque
  - y llegue hasta
  lexicon: HALOT
  rationale: נגע aquí expresa llegar a o alcanzar el objetivo señalado; «alcance» preserva ese matiz sin añadir un imperativo explícito. Se evita «toque» por sonar más débil o accidental en este contexto militar.
- source_word: בַּצִּנּוֹר
  english_pob_choice: the water shaft
  chosen_spanish: el canal[a]
  alternatives_spanish:
  - el conducto
  - el desagüe
  - el pozo de agua
  lexicon: HALOT
  rationale: El término es difícil y el POB inglés señala la incertidumbre. «Canal» es una solución amplia y natural en español, pero se acompaña de nota para mantener la tensión léxica; no se fija una equivalencia más precisa de lo que el hebreo permite.
- source_word: וְאֶת הַפִּסְחִים וְאֶת הָעִוְרִים
  english_pob_choice: and the lame and the blind
  chosen_spanish: y a los cojos y a los ciegos
  alternatives_spanish:
  - e incluso a los cojos y a los ciegos
  - y los cojos y los ciegos
  lexicon: HALOT
  rationale: Los adjetivos substantivados se vierten de forma directa y natural en plural con artículo. Se añade «a» por exigencia del español con el complemento directo personal implícito.
- source_word: שנאו נֶפֶשׁ דָּוִד
  english_pob_choice: whom David’s soul hates
  chosen_spanish: a quienes el alma de David aborrece
  alternatives_spanish:
  - a quienes David aborrece
  - que David aborrece
  lexicon: HALOT
  rationale: Se conserva «alma» para reflejar el hebreo literal y la intensidad idiomática de la expresión. «Aborrece» mantiene el peso del verbo sin suavizarlo; «quienes» ayuda a resolver la cláusula comprimida sin borrar la tensión textual.
- source_word: עַל כֵּן יֹאמְרוּ
  english_pob_choice: Therefore they say
  chosen_spanish: Por eso dicen
  alternatives_spanish:
  - Por tanto dicen
  - De ahí que digan
  lexicon: HALOT
  rationale: Introduce un dicho proverbial. «Por eso dicen» es idiomático en español y conserva el sujeto impersonal/indefinido del hebreo y del POB inglés.
- source_word: עִוֵּר וּפִסֵּחַ
  english_pob_choice: The blind and the lame
  chosen_spanish: El ciego y el cojo
  alternatives_spanish:
  - El ciego y el lisiado
  - El cojo y el ciego
  lexicon: HALOT
  rationale: Aunque el hebreo usa formas sustantivadas de valor proverbial, el singular con artículo en español reproduce mejor el refrán fijado. Se evita «lisiado» porque añade un matiz más amplio que el hebreo de este versículo.
- source_word: לֹא יָבֹא אֶל הַבָּיִת
  english_pob_choice: shall not come into the house
  chosen_spanish: no entrarán en la casa
  alternatives_spanish:
  - no vendrán a la casa
  - no entrará en la casa
  lexicon: HALOT
  rationale: «Entrarán» comunica de modo natural el sentido de acceso prohibido. Se mantiene «la casa» sin precisar «palacio», porque el hebreo no lo explicita y el POB inglés también conserva esa reserva.
theological_decisions:
- issue: La frase difícil sobre los cojos y los ciegos y su relación con la voz de David
  english_pob_reading: Retain the difficult wording without softening or importing later legal/theological implications.
  chosen_spanish_reading: Se mantiene la dificultad del hebreo sin aclararla en exceso, dejando la frase como un enunciado duro y sintácticamente comprimido.
  alternative_spanish_readings:
  - Tomar la mención de «los cojos y los ciegos» como parte del burlón dicho previo, no como palabras directas de David
  - Suavizar la frase para evitar atribuirle a David un rechazo de discapacitados
  rationale: El hebreo admite una lectura sintácticamente difícil, y el POB inglés conserva esa tensión. La versión española evita domesticar el texto o convertirlo en una afirmación doctrinal sobre la discapacidad; simplemente refleja la dureza y la ambigüedad del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Posible referencia topográfica de בַּצִּנּוֹר
  english_pob_reading: The Hebrew term likely refers to a water system or shaft, but its precise sense is uncertain.
  chosen_spanish_reading: Se traduce de forma amplia como «el canal» y se marca la incertidumbre en nota.
  alternative_spanish_readings:
  - el conducto
  - el desagüe
  - el túnel
  rationale: No hay suficiente base para decidir una especificación más cerrada. La nota preserva la alternativa léxica y evita ocultar la ambigüedad del término hebreo.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: Se siguió la última revisión del POB inglés, que sustituyó una formulación imperativa por una secuencia coordinada («and reaches») para reflejar mejor el hebreo. La versión española adopta la misma decisión con «y alcance», manteniendo la coordinación y evitando añadir un mandato que el texto no explicita. También se preservó la dureza sintáctica de la cláusula problemática sobre «los cojos y los ciegos».
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo «casa» y no «palacio» en el texto principal para respetar la reserva del hebreo.
  - Se conservó el valor literal de «alma» en la expresión idiomática, sin convertirlo en un simple «David aborrece».
  - Se prefirió una solución léxica amplia para צִנּוֹר, con nota explicativa, por la incertidumbre reconocida en el audit trail.
