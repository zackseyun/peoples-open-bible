translation:
  language: es
  text: Pero de los hijos de Israel, Salomón no hizo esclavos, porque ellos eran los hombres de guerra, sus esclavos, sus comandantes, sus oficiales[a] y los comandantes de sus carros y sus jinetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus ayudantes’ para ‘sus oficiales’; el término hebreo probablemente se refiere a una clase específica de ayudantes militares de alto rango o a oficiales de carros.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: But from the sons of Israel
  chosen_spanish: Pero de los hijos de Israel
  alternatives_spanish:
  - Y de los hijos de Israel
  - Pero de los israelitas
  lexicon: HALOT
  rationale: Conservo la expresión genealógica hebrea “hijos de Israel” para mantener transparencia formal y la contraposición con el verso anterior. “Israelitas” sería más fluido, pero menos cercano al original.
- source_word: לֹא נָתַן ... עָבֶד
  english_pob_choice: made no slaves
  chosen_spanish: no hizo esclavos
  alternatives_spanish:
  - no los hizo esclavos
  - no asignó como esclavos
  lexicon: HALOT
  rationale: El hebreo expresa que Salomón no los puso en condición de esclavitud. “Hizo esclavos” sigue de cerca la fuerza lexical y conserva la dureza del término sin suavizarlo a “siervos”.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los guerreros
  - los hombres de batalla
  lexicon: HALOT
  rationale: “Hombres de guerra” reproduce la fórmula hebrea con su matiz militar y masculino. “Guerreros” sería comprensible, pero menos literal.
- source_word: וַעֲבָדָיו
  english_pob_choice: his slaves
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: HALOT
  rationale: Sigo la equivalencia del POB en inglés, que preserva el vínculo léxico con עָבֶד. En español, “esclavos” mantiene la misma fuerza y evita suavizar el término.
- source_word: וְשָׂרָיו
  english_pob_choice: his commanders
  chosen_spanish: sus comandantes
  alternatives_spanish:
  - sus jefes
  - sus capitanes
  lexicon: HALOT
  rationale: En este listado militar-administrativo, “comandantes” comunica bien la idea de jefatura y mando. “Jefes” es más general; “capitanes” estrecha demasiado el campo.
- source_word: וְשָׁלִשָׁיו
  english_pob_choice: his officers
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus adjuntos
  - sus ayudantes militares
  lexicon: HALOT
  rationale: La equivalencia inglesa toma una decisión amplia para un término históricamente discutido. En español, “oficiales” conserva esa amplitud y suena natural en un contexto militar.
- source_word: וְשָׂרֵי רִכְבּוֹ
  english_pob_choice: the commanders of his chariots
  chosen_spanish: los comandantes de sus carros
  alternatives_spanish:
  - los jefes de sus carros de guerra
  - los comandantes de su carrocería
  lexicon: HALOT
  rationale: “Carros” traduce רכב con naturalidad en el contexto antiguo, y mantiene el enlace con el cuerpo de carros del rey. “Carros de guerra” explicita lo implícito, pero añade más de lo que el hebreo dice.
- source_word: וּפָרָשָׁיו
  english_pob_choice: his horsemen
  chosen_spanish: sus jinetes
  alternatives_spanish:
  - su caballería
  - sus hombres de a caballo
  lexicon: HALOT
  rationale: “Jinetes” es el equivalente más directo y natural para tropas montadas. “Caballería” sería más colectivo y menos personal; “hombres de a caballo” es más descriptivo, pero menos conciso.
theological_decisions:
- issue: Conservación del lenguaje de esclavitud en עָבֶד
  english_pob_reading: made no slaves
  chosen_spanish_reading: no hizo esclavos
  alternative_spanish_readings:
  - no hizo siervos
  - no los empleó como servidores
  rationale: Sigo la decisión del POB de no suavizar עָבֶד en este contexto de trabajo forzado y jerarquía servil. “Esclavos” conserva la tensión social y la dureza del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1; tabla de términos controvertidos por analogía con δοῦλος
- issue: Mantenimiento de la lista militar sin neutralizar el masculino
  english_pob_reading: the men of war
  chosen_spanish_reading: los hombres de guerra
  alternative_spanish_readings:
  - los guerreros
  - los combatientes
  rationale: El hebreo usa una expresión masculina marcada para funciones militares y cortesanas antiguas. Mantengo esa forma por fidelidad histórica y lexical, sin neutralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB en inglés, que restableció ‘slaves’ para עָבֶד y mantuvo la lista militar-administrativa. En español se preserva la misma decisión léxica central, adaptando el orden a una sintaxis natural y publicable.
  spanish_consistency_notes:
  - Se usó ‘hijos de Israel’ de manera consistente con la forma hebrea y con el paralelismo del contexto.
  - Se mantuvo ‘esclavos’ tanto para el verbo de asignación como para el sustantivo posesivo posterior, conservando la reiteración del original.
  - ‘Comandantes’ y ‘oficiales’ distinguen grados dentro de la lista militar sin introducir términos eclesiásticos o anacrónicos.
  - ‘Carros’ y ‘jinetes’ reflejan el campo militar antiguo sin modernizarlo a vocabulario técnico contemporáneo.
