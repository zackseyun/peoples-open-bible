translation:
  language: es
  text: ni talando las plantas cultivadas de los enemigos, sino conservando las de los adversarios que han perecido[a], y levantando lo que ha caído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «para los que han perecido», tomando el participio dativo de modo más directo y dejando implícita la relación de posesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni siquiera
  - y no
  lexicon: LSJ
  rationale: La partícula negativa coordinante se expresa con «ni», que enlaza naturalmente con la continuación del miembro previo en español.
- source_word: δενδροτομῶν
  english_pob_choice: cutting down
  chosen_spanish: talando
  alternatives_spanish:
  - cortando
  - derribando
  lexicon: LSJ
  rationale: El verbo se refiere a cortar árboles o vegetación leñosa; «talando» conserva la imagen concreta y suena natural en español.
- source_word: τὰ ἥμερα ... φυτά
  english_pob_choice: the cultivated plants
  chosen_spanish: las plantas cultivadas
  alternatives_spanish:
  - las plantas domesticadas
  - los cultivos
  lexicon: LSJ
  rationale: ἥμερα contrasta con lo silvestre y designa lo domesticado/cultivado; φυτά es amplio y puede abarcar plantas, brotes o sembrados. «Plantas cultivadas» preserva amplitud sin restringir indebidamente.
- source_word: τῶν πολεμίων
  english_pob_choice: of enemies
  chosen_spanish: de los enemigos
  alternatives_spanish:
  - pertenecientes a los enemigos
  - de adversarios
  lexicon: LSJ
  rationale: Se mantiene el genitivo posesivo de forma directa y clara.
- source_word: τὰ δὲ τῶν ἐχθρῶν
  english_pob_choice: but those of foes
  chosen_spanish: sino ... de los enemigos
  alternatives_spanish:
  - pero ... de los enemigos
  - mas ... de los enemigos
  lexicon: LSJ
  rationale: El contraste con δέ se conserva con «sino», que en español marca bien la corrección/contraposición respecto de la primera cláusula.
- source_word: τοῖς ἀπολέσασιν
  english_pob_choice: who have been destroyed
  chosen_spanish: que han perecido
  alternatives_spanish:
  - que han sido destruidos
  - para los que han perecido
  lexicon: LSJ
  rationale: El dativo participial se entiende de modo directo y relativamente impersonal. «Han perecido» conserva la idea de ruina/muerte sin introducir ‘dueños’ ni otras aclaraciones que no están en el texto griego.
- source_word: διασώζων
  english_pob_choice: preserving
  chosen_spanish: preservando
  alternatives_spanish:
  - conservando
  - salvaguardando
  lexicon: LSJ
  rationale: El verbo expresa mantener a salvo o conservar intacto; «preservando» transmite esa acción ética de no destruir ni aprovecharse del bien enemigo.
- source_word: τὰ πεπτωκότα
  english_pob_choice: what has fallen
  chosen_spanish: lo que ha caído
  alternatives_spanish:
  - las cosas caídas
  - lo caído
  lexicon: LSJ
  rationale: El participio perfecto sustantivado se vierte de manera amplia y natural. «Lo que ha caído» conserva la generalidad y la imagen concreta.
- source_word: συνεγείρων
  english_pob_choice: raising up
  chosen_spanish: levantando
  alternatives_spanish:
  - restaurando
  - alzando
  lexicon: LSJ
  rationale: El verbo implica levantar de nuevo o juntamente; «levantando» mantiene la imagen física y puede sugerir restauración sin añadir un matiz no explícito.
theological_decisions:
- issue: Tratamiento ético de los bienes del enemigo
  english_pob_reading: Translate the verse as describing restraint and restoration even regarding enemies' cultivated property.
  chosen_spanish_reading: La frase presenta una conducta de contención y restauración aun respecto de las plantas cultivadas de los enemigos.
  alternative_spanish_readings:
  - Puede leerse de manera más general como no devastar lo ajeno en contexto bélico.
  - También podría entenderse como conservar bienes enemigos tras su derrota.
  rationale: 'El griego describe con fuerza una práctica de misericordia/templanza: no talar, preservar y levantar lo caído. La traducción española mantiene ese perfil ético sin suavizarlo ni convertirlo en mera abstracción.'
  doctrine_reference: Ética de la misericordia y la templanza en el discurso moral de 4 Macabeos
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en la frase traducida. La redacción española sigue más de cerca el griego que la versión inglesa revisada, evitando añadir «dueños» y manteniendo la ambigüedad del dativo participial con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «talando» para el acto de cortar vegetación leñosa, coherente con el paralelo «plantas cultivadas».
  - Se mantiene «enemigos» en ambos genitivos para no introducir distinciones interpretativas no marcadas en el griego.
  - «Perecido» se emplea como equivalente respetuoso y amplio de ἀπολέσασιν, sin forzar una paráfrasis explicativa.
  - La cláusula final conserva la imagen concreta de levantar lo caído, en línea con el griego perfecto sustantivado y el participio presente final.
