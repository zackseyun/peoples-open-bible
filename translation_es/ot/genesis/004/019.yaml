translation:
  language: es
  text: Lamec tomó para sí dos esposas[a]. El nombre de la una era Ada, y el nombre de la otra era Zila[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Lamec se casó con dos mujeres».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la segunda».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  lexicon: HALOT
  rationale: לקח significa literalmente ‘tomar’. En contexto matrimonial puede entenderse como ‘tomar por esposa’ o ‘casarse con’, pero aquí el complemento ‘para sí dos mujeres’ ya deja claro el sentido matrimonial. ‘Tomó’ conserva la forma hebrea sin ocultar el significado.
- source_word: לוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - a sí mismo
  lexicon: HALOT
  rationale: El sufijo pronominal expresa interés personal o beneficio. ‘Para sí’ reproduce bien ese matiz reflexivo en español natural.
- source_word: שְׁתֵּי נָשִׁים
  english_pob_choice: two wives
  chosen_spanish: dos mujeres
  alternatives_spanish:
  - dos esposas
  lexicon: HALOT
  rationale: נָשִׁים puede ser ‘mujeres’ o ‘esposas’. El hebreo no usa aquí el término más técnico para ‘esposas’, y la frase con לקח ya señala el contexto matrimonial. En español, ‘dos mujeres’ preserva mejor la literalidad del hebreo; el sentido de matrimonio queda explícito por el verbo y el contexto.
- source_word: שֵׁם הָאַחַת
  english_pob_choice: The name of the one
  chosen_spanish: El nombre de la una
  alternatives_spanish:
  - Una se llamaba
  - El nombre de la primera
  lexicon: HALOT
  rationale: La fórmula hebrea de nombramiento se conserva de manera bastante directa. ‘La una’ refleja el paralelismo formal del texto, aunque sea menos idiomático que una reformulación más libre.
- source_word: עָדָה
  english_pob_choice: Adah
  chosen_spanish: Ada
  alternatives_spanish:
  - Adá
  lexicon: transliteration
  rationale: Nombre propio transcrito de forma transparente al español. Se prefiere ‘Ada’ por ser la forma más natural y reconocible en español bíblico.
- source_word: הַשֵּׁנִית
  english_pob_choice: the other
  chosen_spanish: la otra
  alternatives_spanish:
  - la segunda
  lexicon: HALOT
  rationale: El adjetivo significa literalmente ‘la segunda’, pero en español ‘la otra’ es más natural cuando se refiere al segundo miembro de un par ya establecido. Mantiene la correspondencia con la solución inglesa revisada por su mayor naturalidad.
- source_word: צִלָּה
  english_pob_choice: Zillah
  chosen_spanish: Zila
  alternatives_spanish:
  - Sila
  lexicon: transliteration
  rationale: Nombre propio transcrito de forma directa al español. Se simplifica la grafía para una lectura más natural y consistente en español bíblico.
theological_decisions:
- issue: Si explicitar o no la poliginia del relato
  english_pob_reading: Rendered 'two wives' without added moral commentary
  chosen_spanish_reading: ‘dos mujeres’ sin comentario moral añadido
  alternative_spanish_readings:
  - ‘dos esposas’
  - ‘se casó con dos mujeres’
  rationale: El versículo narra el hecho de que Lamec tomó dos mujeres, pero no comenta su moralidad. La traducción no debe añadir una valoración doctrinal que el texto no expresa. Al mismo tiempo, ‘dos mujeres’ evita suavizar el dato narrativo con una terminología más interpretativa.
  doctrine_reference: 'Translation philosophy: no importar afirmaciones doctrinales que el texto no hace; preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó ‘the second’ a ‘the other’ por mayor naturalidad. En español se siguió esa misma lógica con ‘la otra’, aunque se conserva en nota la alternativa literal ‘la segunda’.
  spanish_consistency_notes:
  - Se mantuvo Yahvé reservado para el tetragrámaton, pero aquí no aparece.
  - 'Se eligieron nombres propios en transliteración española simple y estable: Ada, Zila.'
  - Se preservó la fórmula hebrea de nombramiento sin convertirla en una paráfrasis completa.
  - No se añadió juicio moral sobre la poliginia, en coherencia con la lectura inglesa auditada.
