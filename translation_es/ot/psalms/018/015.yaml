translation:
  language: es
  text: Envió sus flechas y los dispersó[a]; con abundantes relámpagos los sumió en confusión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los esparció». El pronombre plural se entiende por el contexto como referencia a los enemigos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: He sent out
  chosen_spanish: Envió
  alternatives_spanish:
  - Envió fuera
  - Mandó
  lexicon: HALOT / uso poético del verbo שׁלח
  rationale: En español, 'envió' comunica con naturalidad la acción de despachar o lanzar hacia afuera sin endurecer el verso. 'Envió fuera' sería más literal pero menos elegante; 'mandó' debilita la imagen de proyección de las armas.
- source_word: חִצָּיו
  english_pob_choice: his arrows
  chosen_spanish: sus flechas
  alternatives_spanish:
  - sus saetas
  - sus dardos
  lexicon: HALOT
  rationale: El hebreo חֵץ designa una flecha/saeta. 'Flechas' es transparente y poético en español; 'saetas' es posible pero más arcaizante; 'dardos' se aleja del objeto bélico común del pasaje.
- source_word: וַיְפִיצֵם
  english_pob_choice: and scattered them
  chosen_spanish: los dispersó
  alternatives_spanish:
  - los esparció
  - los desbandó
  lexicon: HALOT
  rationale: El verbo expresa dispersar/poner en fuga. 'Los dispersó' preserva el valor básico sin añadir una imagen demasiado específica. El referente implícito sigue siendo los enemigos, no las flechas.
- source_word: וּבְרָקִים
  english_pob_choice: with abundant lightning
  chosen_spanish: con abundantes relámpagos
  alternatives_spanish:
  - con muchos relámpagos
  - con abundante fulgor
  lexicon: HALOT
  rationale: בְרָקִים puede referirse a relámpagos o destellos. 'Relámpagos' mantiene la imagen concreta; en plural, 'abundantes' refleja el matiz de abundancia que el audit trail reconoce en רָב.
- source_word: רָב
  english_pob_choice: with abundant lightning
  chosen_spanish: abundantes
  alternatives_spanish:
  - muchos
  - en abundancia
  - gran abundancia
  lexicon: HALOT
  rationale: El valor de רָב aquí es adverbial o cuantitativo. En español, 'abundantes' integra naturalmente ese matiz dentro del sintagma preposicional sin introducir un verbo inexistente en el hebreo.
- source_word: וַיְהֻמֵּם
  english_pob_choice: and threw them into confusion
  chosen_spanish: los puso en confusión
  alternatives_spanish:
  - los llenó de confusión
  - los confundió
  lexicon: HALOT
  rationale: המם en contexto bélico expresa confundir, desorientar o aterrorizar. 'Los puso en confusión' conserva la fuerza verbal y la dimensión de tumulto mejor que un simple 'los confundió', que puede sonar más psicológico que militar.
theological_decisions:
- issue: Referente de los pronombres plurales en 'los dispersó' y 'los puso en confusión'
  english_pob_reading: The suffixes refer to David's enemies, understood from the broader context, not to the arrows or lightning.
  chosen_spanish_reading: Los sufijos pronominales se entienden como referencia a los enemigos del salmista, dados por el contexto, no a las flechas o a los relámpagos.
  alternative_spanish_readings:
  - Podrían referirse directamente a las flechas o a los relámpagos como objetos movidos en distintas direcciones.
  rationale: La imaginería del guerrero divino presenta las flechas y los relámpagos como instrumentos por medio de los cuales Yahvé dispersa y desordena a los enemigos. Esa lectura mantiene la coherencia del conjunto bélico-teofánico del salmo.
  doctrine_reference: Exégesis poética y teofanía guerrera en Salmos 18
- issue: Valor de רָב en la frase sobre los relámpagos
  english_pob_reading: with abundant lightning
  chosen_spanish_reading: abundantes relámpagos
  alternative_spanish_readings:
  - muchos relámpagos
  - relámpagos en abundancia
  rationale: El hebreo permite una lectura cuantitativa/adverbial de רָב. En español, 'abundantes relámpagos' conserva la tensión entre cantidad e intensidad sin forzar una paráfrasis explicativa.
  doctrine_reference: Poética hebrea y paralelismo sinonímico
translation_notes:
  revision_awareness: El inglés POB pasó de 'He sent out his arrows and scattered them; he multiplied lightning bolts and threw them into confusion.' a 'He sent out his arrows and scattered them; with abundant lightning he threw them into confusion.' El español sigue esa revisión y evita un verbo explícito de 'multiplicar' para רָב, integrando el matiz de abundancia en 'abundantes relámpagos'.
  spanish_consistency_notes:
  - Se mantiene 'flechas' para חִצָּיו, en línea con el valor léxico básico de חֵץ.
  - Se usa 'relámpagos' para בְרָקִים porque es la forma más natural en español para el fenómeno luminoso del pasaje.
  - Se evita 'SEÑOR' y no aparece el nombre divino en este versículo; la traducción conserva el sujeto tácito del contexto.
  - '''Confusión'' reproduce el campo semántico de המם sin convertirlo en un simple ''derrotó'', para no perder la tensión bélica del texto.'
