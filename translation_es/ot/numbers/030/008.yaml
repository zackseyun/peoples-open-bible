review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura casuística del hebreo y mantiene los elementos legales principales: esposo, día de oír, silencio como no objeción, votos, autoobligación y permanencia en vigor. Sin embargo, hay dos desajustes importantes: «sus ataduras» suena demasiado físico y poco jurídico para וֶאֱסָרֶהָ, y la nota [b] no corresponde a la alternativa preservada por el POB inglés para ese término, sino al verbo «shall stand».'
  spanish_quality_summary: El español es generalmente claro, pero «calla respecto de ella» resulta algo rígido, y «sus ataduras» puede inducir una lectura material impropia en un contexto legal. «Obligaciones vinculantes» o similar comunica mejor el sentido jurídico sin perder la metáfora de atar. También conviene mantener una nota para la alternativa más literal «sus ataduras» / «sus vínculos», ya que el inglés preservó esa posibilidad.
  glossary_alignment: 'No hay conflicto con la terminología teológica del proyecto. La revisión propuesta mejora la correspondencia léxica con el análisis documentado: conserva «votos», mantiene la repetición de «quedarán firmes» para קוּם / יָקֻמוּ, y reemplaza «ataduras» por una opción jurídica más fiel al uso contextual de אסר.'
  issues:
  - severity: high
    issue: «sus ataduras» para וֶאֱסָרֶהָ
    rationale: Aunque literal, en español actual evoca ataduras físicas más que compromisos autoimpuestos. El POB inglés justificó «binding obligations» precisamente para conservar la imagen de atar y el valor legal. «Obligaciones vinculantes» expresa ambos aspectos con mayor fidelidad y legibilidad.
  - severity: medium
    issue: La nota [b] está anclada en «quedarán firmes» pero el POB inglés la usa para נְדָרֶיהָ / וֶאֱסָרֶהָ
    rationale: La nota inglesa b aclara alternativas para el sustantivo que designa compromisos vinculantes, no para el verbo «shall stand». En español debe reubicarse junto al término correspondiente para preservar el rastro de auditoría lexical.
  - severity: low
    issue: «calla respecto de ella» suena poco idiomático
    rationale: No es incorrecto, pero «guarda silencio ante ella» o «no le dice nada» suena más natural. Aun así, no es indispensable corregirlo si se prefiere máxima cercanía al hebreo.
