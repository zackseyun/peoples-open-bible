translation:
  language: es
  text: Pero él soportaba los dolores, y despreciaba la coerción[a], y perseveraba a través de las torturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la compulsión» o «la necesidad»; el término griego puede denotar fuerza, restricción o necesidad, pero aquí probablemente se refiere a la presión que se ejercía sobre él.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπέμενεν
  english_pob_choice: endured
  chosen_spanish: soportaba
  alternatives_spanish:
  - perseveraba
  - aguantaba
  lexicon: BDAG
  rationale: El imperfecto expresa una acción շարունակada; «soportaba» mantiene la idea de resistencia sostenida y suena natural en español, sin perder el matiz de aguante bajo sufrimiento.
- source_word: τοὺς πόνους
  english_pob_choice: the pains
  chosen_spanish: los dolores
  alternatives_spanish:
  - los sufrimientos
  - las penas
  lexicon: BDAG
  rationale: πονους es plural concreto de dolor/sufrimiento. «Dolores» conserva la concreción corporal del contexto martirial mejor que una abstracción más general.
- source_word: περιεφρόνει
  english_pob_choice: despised
  chosen_spanish: despreciaba
  alternatives_spanish:
  - menospreciaba
  - mostraba desprecio por
  lexicon: BDAG
  rationale: El verbo implica tratar algo como de poco valor o mirar con desdén. «Despreciaba» reproduce bien ese juicio de desestimación y corresponde a la revisión inglesa más formal.
- source_word: τῆς ἀνάγκης
  english_pob_choice: the compulsion
  chosen_spanish: la compulsión
  alternatives_spanish:
  - la coerción
  - la necesidad
  - la presión
  lexicon: BDAG
  rationale: En este contexto de martirio, ἀνάγκη apunta a presión externa impuesta. «Compulsión» conserva esa fuerza coercitiva y permite mantener la tensión lexical documentada sin resolverla solo como «necesidad».
- source_word: διεκαρτέρει
  english_pob_choice: persevered through
  chosen_spanish: perseveraba entre
  alternatives_spanish:
  - persistía entre
  - se mantenía firme ante
  lexicon: BDAG
  rationale: El compuesto imperfecto enfatiza constancia bajo abuso continuo. «Perseveraba entre» conserva la continuidad y la relación con los tormentos sin añadir más interpretación de la necesaria.
- source_word: τοὺς αἰκισμούς
  english_pob_choice: the tortures
  chosen_spanish: los tormentos
  alternatives_spanish:
  - las torturas
  - los maltratos
  lexicon: BDAG
  rationale: αἰκισμοί puede abarcar trato brutal y tortura. «Tormentos» es un equivalente español amplio y dignificado que mantiene la severidad del sufrimiento; «torturas» queda como alternativa más explícita y técnica.
theological_decisions:
- issue: Cómo renderizar ἀνάγκη en un contexto de martirio sin borrar la presión externa
  english_pob_reading: The compulsion; the Greek term can denote force, constraint, or necessity, but here likely refers to the pressure being imposed on him.
  chosen_spanish_reading: la compulsión
  alternative_spanish_readings:
  - la coerción
  - la necesidad
  - la presión impuesta
  rationale: 'Se mantiene la ambigüedad controlada del griego: no se reduce a una necesidad abstracta ni se diluye en una paráfrasis. «Compulsión» preserva la idea de fuerza externa aplicada sobre el mártir.'
  doctrine_reference: Martirio y perseverancia bajo coerción externa; fidelidad bajo sufrimiento.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «despised» en lugar de «scorned» para περιεφρόνει, y conserva la decisión auditada de mantener ἀνάγκη en un campo semántico de presión externa. En español se eligieron formas que sostienen el paralelismo del verso y mantienen el registro martirial sin suavizar el lenguaje.
  spanish_consistency_notes:
  - Se mantiene un ritmo coordinado de tres miembros con «pero / y / y» para reflejar la estructura del griego.
  - «Despreciaba» se usa en un sentido relacional y valorativo, no como emoción pasajera.
  - «Compulsión» y la nota aclaran el rango semántico de ἀνάγκη sin cerrar indebidamente la ambigüedad.
  - «Tormentos» evita una repetición excesiva de «torturas» y sigue siendo suficientemente fuerte en español bíblico-literario.
