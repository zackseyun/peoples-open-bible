revisions:
- from: 'Alzó sus ojos y vio a las mujeres[a] y a los niños; y dijo: «¿Quiénes son estos contigo?» Y dijo: «Los niños que Dios ha concedido con gracia a tu siervo[b]».'
  to: 'Alzó sus ojos y vio a las mujeres y a los niños[a], y dijo: «¿Quiénes son estos contigo?». Y él respondió[b]: «Los niños con los que Dios ha favorecido a tu siervo».'
  rationale: 'Se ajustó la cláusula final para que el matiz de חָנַן se exprese con español más natural: ‘ha favorecido a tu siervo con’ evita la torpeza de ‘ha concedido con gracia’. También se anclaron correctamente las notas en las frases pertinentes, se suavizó la puntuación narrativa y se añadió ‘él respondió’ para que la repetición de ‘וַיֹּאמַר’ suene natural en español sin alterar el sentido.'
