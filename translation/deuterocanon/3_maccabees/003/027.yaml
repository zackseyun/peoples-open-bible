translation:
  text: But whoever shelters any of the Jews[a], from old man to infant, even to those at the breast, will be beaten to death with the most hateful tortures[b], together with his whole household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'even to sucklings' or 'even to babes at the breast' for the rare term referring to nursing infants.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb here refers to a brutal execution by beating; some render more technically 'will be cudgelled to death' or 'will be tortured on the wheel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεπάσῃ
  chosen: shelters
  alternatives:
  - hides
  - covers
  - protects
  lexicon: LSJ
  rationale: The verb literally has the sense of covering/concealing, but in this legal-threat context it refers to giving refuge or hiding someone from authorities. 'Shelters' preserves both protection and concealment better than the more wooden 'covers' and is less narrow than 'hides'.
- source_word: τινα τῶν Ἰουδαίων
  chosen: any of the Jews
  alternatives:
  - a Jew
  - any Jew
  lexicon: LSJ
  rationale: 'The construction is partitive and indefinite: ''any one of the Jews.'' ''Any of the Jews'' reflects the Greek closely while remaining natural English.'
- source_word: ἀπὸ γεραιοῦ μέχρι νηπίου
  chosen: from old man to infant
  alternatives:
  - from elder to child
  - from old person to baby
  lexicon: LSJ
  rationale: This marks the full age range among the Jews being sought. γεραιός denotes an old person; νηπίον denotes a very young child/infant. 'Old man' is retained as a conventional singular representative expression matching the Greek's masculine form and legal style.
- source_word: καὶ μέχρι ὑπομαστιγίων
  chosen: even to those at the breast
  alternatives:
  - even nursing infants
  - even babes under the breast
  lexicon: LSJ
  rationale: The rare term refers to children still under the breast, i.e., sucklings/nursing babies. 'Those at the breast' is idiomatic, vivid, and preserves the image without archaic wording.
- source_word: ἐχθίσταις βασάνοις
  chosen: with the most hateful tortures
  alternatives:
  - with the most grievous torments
  - with the harshest tortures
  lexicon: LSJ
  rationale: ἐχθίσταις is the superlative of 'hateful/odious'; βασάνοις are tortures or torments, especially judicially inflicted. 'Most hateful tortures' keeps the emotional force of the Greek rather than flattening it to mere severity.
- source_word: ὑποτυμπανισθήσεται
  chosen: will be beaten to death
  alternatives:
  - will be tortured on the wheel
  - will be cudgelled to death
  - will be executed by beating
  lexicon: LSJ
  rationale: The verb denotes a brutal form of execution by beating, often associated with being stretched or exposed on an instrument. Because the exact ancient procedure is not transparent to modern readers, 'will be beaten to death' communicates the core sense in accessible English; a more technical alternative is preserved in a footnote.
- source_word: πανοικίᾳ
  chosen: together with his whole household
  alternatives:
  - with his entire house
  - with all his family
  lexicon: LSJ
  rationale: The dative adverbial form means 'with the whole household.' 'Household' is preferable to 'family' because it can include all members of the domestic unit, not only blood relatives.
