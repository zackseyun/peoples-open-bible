translation:
  language: es
  text: Mi carne está vestida de gusanos y costras de polvo; mi piel se endurece[a] y se vuelve a abrir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi piel se cierra, y luego vuelve a supurar». El hebreo de los dos últimos verbos es difícil, y probablemente describe una piel que por un momento se cierra o cicatriza y luego se abre de nuevo.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָבַשׁ
  english_pob_choice: is clothed with
  chosen_spanish: está vestida de
  alternatives_spanish:
  - está cubierta de
  - lleva puesto
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente 'vestir/poner sobre'. En español, 'está vestida de' conserva la imagen pasiva y corporal sin sonar forzado con un sujeto como 'mi carne'.
- source_word: בְּשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: HALOT
  rationale: '''Carne'' reproduce con precisión el término hebreo y mantiene el énfasis físico e incluso vulnerable del texto. ''Cuerpo'' sería más general y perdería parte de la crudeza de la imagen.'
- source_word: רִמָּה
  english_pob_choice: worms
  chosen_spanish: gusanos
  alternatives_spanish:
  - larvas
  - gusanos de la podredumbre
  lexicon: HALOT
  rationale: El sustantivo denota gusanos/larvas asociados con descomposición. 'Gusanos' es natural en español y suficientemente amplio; 'larvas' sería más técnico y 'gusanos de la podredumbre' más interpretativo.
- source_word: גיש עָפָר
  english_pob_choice: clods of dust
  chosen_spanish: terrones de polvo
  alternatives_spanish:
  - costras de tierra
  - grumos de polvo
  lexicon: HALOT
  rationale: La construcción apunta a una masa endurecida de polvo/tierra. 'Terrones de polvo' transmite bien la imagen de suciedad apelmazada sobre la piel y conserva la concreción del hebreo.
- source_word: עוֹרִי
  english_pob_choice: my skin
  chosen_spanish: mi piel
  alternatives_spanish:
  - mi cutis
  - mi dermis
  lexicon: HALOT
  rationale: '''Piel'' es el equivalente natural y fiel en español; ''cutis'' es demasiado restringido y ''dermis'' demasiado técnico.'
- source_word: רָגַע
  english_pob_choice: hardens
  chosen_spanish: se endurece
  alternatives_spanish:
  - se cierra
  - se cura en parte
  - se endurece por un momento
  lexicon: HALOT
  rationale: En el contexto de una afección cutánea, el verbo probablemente describe que la piel se tensa o endurece momentáneamente. 'Se endurece' conserva la concreción y no fuerza una lectura excesivamente médica.
- source_word: וַיִּמָּאֵס
  english_pob_choice: breaks out again
  chosen_spanish: se vuelve a abrir
  alternatives_spanish:
  - vuelve a supurar
  - se agrieta otra vez
  - se ulcera de nuevo
  lexicon: HALOT
  rationale: El verbo es difícil y la imagen médica sugiere una recaída de la lesión. 'Se vuelve a abrir' refleja bien la repetición del proceso sin decidir demasiado entre las posibles lecturas de 'supurar' o 'agrietarse'.
translation_notes:
  revision_awareness: El pasaje fue revisado en el proyecto y se mantuvo sin cambios significativos; el acuerdo general con el control de calidad fue alto, con una observación menor sobre la dificultad de los dos verbos finales.
  spanish_consistency_notes:
  - Se preservó la metáfora corporal intensa del hebreo sin suavizarla.
  - Se evitó 'SEÑOR' u otras sustituciones, ya que no hay aquí el Tetragrámaton ni un problema de nomenclatura divina.
  - La ambigüedad de los verbos finales se conserva mediante una nota, porque el inglés POB también la documenta.
