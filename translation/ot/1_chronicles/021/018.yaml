id: 1CH.21.18
reference: 1 Chronicles 21:18
source:
  edition: WLC
  text: וּ/מַלְאַ֧ךְ יְהוָ֛ה אָמַ֥ר אֶל גָּ֖ד לֵ/אמֹ֣ר לְ/דָוִ֑יד כִּ֣י יַעֲלֶ֣ה דָוִ֗יד לְ/הָקִ֤ים מִזְבֵּ֨חַ֙ לַ/יהוָ֔ה בְּ/גֹ֖רֶן אָרְנָ֥ן הַ/יְבֻסִֽי־׀׃
translation:
  text: And the angel of Yahweh said to Gad to tell David that David should go up to set up an altar to Yahweh on the threshing floor of Ornan the Jebusite[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that David must go up' or 'that David is to go up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַלְאַךְ יְהוָה
  chosen: And the angel of the LORD
  alternatives:
  - And the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel'; in this narrative context involving a heavenly being, 'angel' is the natural rendering. יְהוָה follows the project default 'the LORD' rather than 'Yahweh'.
- source_word: אָמַר אֶל גָּד
  chosen: said to Gad
  alternatives:
  - spoke to Gad
  lexicon: HALOT
  rationale: אָמַר is the standard verb 'say'; 'said to' is the most direct and idiomatic rendering here.
- source_word: לֵאמֹר לְדָוִיד
  chosen: to tell David
  alternatives:
  - saying to David
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר plus indirect object naturally introduces reported speech or command content. In English, 'to tell David' is smoother while preserving the sense.
- source_word: כִּי יַעֲלֶה דָוִיד
  chosen: that David should go up
  alternatives:
  - that David must go up
  - that David is to go up
  lexicon: HALOT
  rationale: The clause gives the content of the angel's instruction. 'Should go up' captures the directive force without overstating it; 'go up' preserves the Hebrew verb עלה rather than flattening it to merely 'go'.
- source_word: לְהָקִים
  chosen: to set up
  alternatives:
  - to erect
  - to build
  lexicon: HALOT
  rationale: הקים commonly means 'raise, set up, establish.' For an altar, 'set up' reflects the verb more closely than the more generic 'build,' while remaining natural English.
- source_word: מִזְבֵּחַ
  chosen: an altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial structure indicated by מִזְבֵּחַ.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The lamed here marks dedication or relation; 'to the LORD' is a natural rendering in altar-building contexts and keeps the Hebrew preposition visible.
- source_word: בְּגֹרֶן
  chosen: on the threshing floor
  alternatives:
  - at the threshing floor
  lexicon: HALOT
  rationale: גֹרֶן is 'threshing floor.' 'On' fits the physical location in English, though 'at' is also possible.
- source_word: אָרְנָן הַיְבֻסִי
  chosen: of Ornan the Jebusite
  lexicon: HALOT
  rationale: Personal name is transliterated per project policy. The gentilic הַיְבֻסִי is rendered 'the Jebusite.' The English phrase attaches naturally to 'threshing floor' as possession/location.
