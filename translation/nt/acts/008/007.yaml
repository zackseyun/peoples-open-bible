theological_decisions:
- issue: Referent of the crying out and coming out
  chosen_reading: The unclean spirits are the ones crying out with a loud voice and coming out of the afflicted people.
  alternative_readings:
  - The possessed people are the ones crying out while the spirits come out.
  rationale: The neuter plural participle βοῶντα agrees naturally with πνεύματα ἀκάθαρτα, indicating that the spirits are described as crying out. This also fits common exorcism scenes in the Gospels and Acts. English requires some restructuring to make the referent intelligible.
