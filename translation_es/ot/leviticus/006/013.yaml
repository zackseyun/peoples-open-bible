translation:
  language: es
  text: 'Esta es la ofrenda de Aarón y de sus hijos, que ellos presentarán a Yahvé el día de su unción[a]: la décima parte de un efa de flor de harina como ofrenda regular de cereal, la mitad de ella por la mañana y la mitad de ella por la tarde.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el día en que él es ungido". El hebreo tiene pronombre singular ("lo"/"él") aunque el versículo menciona a "Aarón y sus hijos".'
    reason: alternative_reading
lexical_decisions:
- source_word: קָרְבַּן
  english_pob_choice: offering
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  - oblación
  lexicon: HALOT
  rationale: El término hebreo es amplio y cultual. En español, 'sacrificio' comunica con naturalidad el acto/ofrenda ceremonial en este contexto levítico, aunque 'ofrenda' sigue siendo una alternativa posible. Se evita una paráfrasis excesiva y se conserva el carácter técnico del texto.
- source_word: יַקְרִיבוּ
  english_pob_choice: shall present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - traerán
  lexicon: HALOT
  rationale: '''Presentar'' refleja bien el valor sacrificial de acercar una ofrenda ante Dios y suena natural en español moderno. ''Ofrecerán'' también sería posible, pero ''presentarán'' conserva mejor la idea formal del acto cultual.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio terminológico del proyecto: יהוה se vierte ''Yahvé'' en el texto principal, manteniendo la transparencia frente al nombre divino en lugar de sustituirlo por una convención de ocultamiento.'
- source_word: בְּיוֹם הִמָּשַׁח אֹתוֹ
  english_pob_choice: on the day he is anointed
  chosen_spanish: el día de su unción
  alternatives_spanish:
  - el día en que él es ungido
  - el día de ser ungido
  lexicon: HALOT
  rationale: La frase hebrea expresa tiempo de la unción. En español, 'el día de su unción' conserva la temporalidad y resulta más natural que una calca verbal. La ambigüedad del pronombre singular queda suficientemente reflejada sin forzar una pluralización.
- source_word: עֲשִׂירִת הָאֵפָה
  english_pob_choice: a tenth of an ephah
  chosen_spanish: la décima parte de un efa
  alternatives_spanish:
  - una décima de efa
  - un décimo de efa
  lexicon: HALOT
  rationale: '''Décima parte de un efa'' transmite con claridad la medida hebrea y evita una expresión demasiado técnica o arcaizante.'
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: '''Flor de harina'' es una equivalencia tradicional y precisa en español bíblico para la harina refinada usada en ofrendas de cereal.'
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda de grano
  - oblación de cereal
  lexicon: HALOT
  rationale: Se prefiere 'ofrenda de cereal' para reflejar el sentido sacrificial específico de מִנְחָה sin perder inteligibilidad. 'Grain offering' en inglés suele abarcar este mismo campo semántico.
- source_word: תָּמִיד
  english_pob_choice: regular
  chosen_spanish: regular
  alternatives_spanish:
  - continua
  - perpetua
  lexicon: HALOT
  rationale: '''Regular'' comunica la idea de una ofrenda recurrente o normativa sin introducir una continuidad física absoluta que el contexto no exige. Es fiel al valor de periodicidad habitual del término.'
- source_word: מַחֲצִיתָהּ ... וּמַחֲצִיתָהּ
  english_pob_choice: half of it ... and half of it
  chosen_spanish: la mitad de ella ... y la mitad de ella
  alternatives_spanish:
  - una mitad ... y una mitad
  - la mitad ... y la otra mitad
  lexicon: HALOT
  rationale: La repetición reproduce con fidelidad la distribución en dos porciones iguales y mantiene la relación anafórica con la ofrenda.
- source_word: בַּבֹּקֶר ... בָּעָרֶב
  english_pob_choice: in the morning ... in the evening
  chosen_spanish: por la mañana ... por la tarde
  alternatives_spanish:
  - en la mañana ... en la tarde
  - al amanecer ... al anochecer
  lexicon: HALOT
  rationale: '''Por la mañana'' y ''por la tarde'' son las expresiones más naturales en español para los marcadores temporales del rito diario, sin perder el paralelismo del hebreo.'
theological_decisions:
- issue: Referencia del pronombre singular en 'el día de su unción' dentro de 'Aarón y de sus hijos'
  english_pob_reading: Retain the singular as referring representatively to the anointed priestly office, beginning with Aaron.
  chosen_spanish_reading: Mantener 'su' en singular como referencia representativa al oficio sacerdotal ungido, con Aarón como cabeza primaria.
  alternative_spanish_readings:
  - '''el día de su unción'' entendido distributivamente para Aarón y sus hijos'
  - '''el día de su unción'' ajustado implícitamente a plural'
  rationale: 'El hebreo presenta un pronombre singular y la POB inglesa decide no suavizarlo al plural. En español se conserva la misma tensión: Aarón representa la cabeza del sacerdocio, y la norma se extiende a sus hijos sin borrar la forma singular del texto.'
  doctrine_reference: Preservar la tensión del texto fuente; primacía del hebreo sobre la nivelación traductora.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y la concordancia con la auditoría inglesa es alta. Se mantuvo la decisión de conservar el singular implícito en 'su unción' y el paralelismo de las mitades de la ofrenda sin ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con la terminología del proyecto para יהוה.
  - '''Ofrenda de cereal'' se reserva para מִנְחָה en contexto levítico, mientras ''sacrificio'' introduce el encabezado amplio de קָרְבַּן.'
  - El orden y la duplicación de 'la mitad de ella' mantienen el paralelismo del hebreo.
  - La puntuación con dos puntos reproduce adecuadamente la estructura introductoria del versículo.
