translation:
  language: es
  text: 'Y fue para los hijos restantes[a] de Manasés, según sus clanes[b]: para los hijos de Abiezer, y para los hijos de Helec, y para los hijos de Asriel, y para los hijos de Siquem, y para los hijos de Hefer, y para los hijos de Semida. Estos fueron los hijos varones[c] de Manasés, hijo de José, según sus clanes[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el resto de los descendientes de Manasés». El hebreo dice literalmente «los hijos restantes de Manasés».
    reason: lexical_alternative
  - marker: b
    text: «Clanes» traduce el hebreo mishpechot, una subdivisión de parentesco dentro de una tribu; «familias» es una alternativa posible.
    reason: cultural_note
  - marker: c
    text: El hebreo «los hijos varones» enfatiza que estas son las líneas masculinas de Manasés, en contraste con las hijas de Zelofehad mencionadas en el contexto cercano.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it was
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y fue
  - Y sucedió que
  lexicon: HALOT
  rationale: El hebreo introduce la declaración de reparto con una fórmula narrativa. En español, «Y aconteció que» conserva el arranque formal sin sonar tan duro como un calco de «y fue», y refleja bien la transición narrativa del pasaje.
- source_word: לִבְנֵי מְנַשֶּׁה
  english_pob_choice: for the sons of Manasseh
  chosen_spanish: a los hijos de Manasés
  alternatives_spanish:
  - para los hijos de Manasés
  - a los descendientes de Manasés
  lexicon: HALOT
  rationale: En contexto de asignación territorial, la preposición ל expresa destinatario de la porción. Se mantiene «hijos» para conservar la formulación genealógica del hebreo y del audit trail inglés.
- source_word: הַנּוֹתָרִים
  english_pob_choice: the remaining
  chosen_spanish: los restantes
  alternatives_spanish:
  - los que quedaban
  - el resto
  lexicon: HALOT
  rationale: «Los restantes» reproduce de manera precisa el sentido de resto o sobrantes dentro de la línea de Manasés, sin ampliar innecesariamente a «descendientes».
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: En el reparto tribal, מִשְׁפָּחָה designa una subdivisión de parentesco dentro de la tribu; «clanes» conserva mejor ese valor técnico que «familias», aunque se mantiene en nota la posibilidad alternativa.
- source_word: לִבְנֵי אֲבִיעֶזֶר ... וְלִבְנֵי חֵלֶק ...
  english_pob_choice: for the sons of Abiezer ... and for the sons of Helek ...
  chosen_spanish: a los hijos de Abiezer ... y a los hijos de Helec ...
  alternatives_spanish:
  - a la casa de Abiezer ...
  - a los descendientes de Abiezer ...
  lexicon: HALOT
  rationale: Se preserva la fórmula repetida לִבְנֵי + nombre propio como «hijos de», porque el registro legal del listado depende de esa repetición. «Helec» reproduce la transliteración habitual en español.
- source_word: אַשְׂרִיאֵל
  english_pob_choice: Asriel
  chosen_spanish: Asriel
  alternatives_spanish:
  - Ashriel
  lexicon: HALOT
  rationale: Se conserva la transliteración común en español, alineada con la tradición bíblica estándar y con el texto fuente.
- source_word: שֶׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Sichem
  - Shequem
  lexicon: HALOT
  rationale: «Siquem» es la forma bíblica en español más reconocible y establecida para este topónimo; evita una transliteración menos natural para el lector hispanohablante.
- source_word: חֵפֶר
  english_pob_choice: Hepher
  chosen_spanish: Hefer
  alternatives_spanish:
  - Jéfer
  - Hepher
  lexicon: HALOT
  rationale: Se usa la transliteración hispana sencilla y habitual «Hefer», manteniendo la correspondencia con el nombre propio del hebreo.
- source_word: שְׁמִידָע
  english_pob_choice: Shemida
  chosen_spanish: Semida
  alternatives_spanish:
  - Shemida
  lexicon: HALOT
  rationale: Se adapta a la transliteración española «Semida», coherente con la pronunciación habitual en español bíblico.
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos eran
  - Éstos fueron
  lexicon: HALOT
  rationale: La forma conclusiva del hebreo se vierte naturalmente con un pasado copulativo en español. «Estos fueron» introduce la identificación final de los grupos listados.
- source_word: בְּנֵי מְנַשֶּׁה בֶּן יוֹסֵף
  english_pob_choice: the sons of Manasseh son of Joseph
  chosen_spanish: los hijos de Manasés hijo de José
  alternatives_spanish:
  - los descendientes de Manasés, hijo de José
  - los hijos de Manasés, hijo de José
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica cercana al hebreo. «Hijo de José» identifica a Manasés y mantiene la cadena de ascendencia sin ampliar el texto.
- source_word: הַזְּכָרִים
  english_pob_choice: the male sons
  chosen_spanish: los hijos varones
  alternatives_spanish:
  - los varones
  - los hijos masculinos
  lexicon: HALOT
  rationale: El hebreo enfatiza el sexo masculino de estas líneas en contraste con las hijas de Zelofehad en el contexto inmediato. «Hijos varones» comunica esa tensión sin resultar demasiado torpe en español.
theological_decisions:
- issue: Énfasis en los descendientes varones frente a las hijas de Zelofehad
  english_pob_reading: These were the male sons of Manasseh son of Joseph, according to their clans.
  chosen_spanish_reading: Estos fueron los hijos varones de Manasés hijo de José, según sus clanes.
  alternative_spanish_readings:
  - Estos fueron los varones de Manasés hijo de José, según sus clanes
  - Estos fueron los hijos de Manasés hijo de José, según sus clanes
  rationale: 'Se conserva el matiz del hebreo y del audit trail inglés: no se trata simplemente de descendencia genérica, sino de líneas masculinas dentro de la asignación tribal. «Hijos varones» mantiene ese contraste sin sobreexplicar.'
  doctrine_reference: Contexto canónico de la distribución tribal en Josué 17; contraste narrativo con Números 27 y Josué 17:3-6.
- issue: Valor técnico de mishpechot en el reparto tribal
  english_pob_reading: according to their clans
  chosen_spanish_reading: según sus clanes
  alternative_spanish_readings:
  - según sus familias
  - conforme a sus familias
  rationale: No se fuerza «familias» como equivalente genérico, porque el contexto de heredad tribal exige un término más técnico. «Clanes» preserva la estructura social de la tribu sin perder inteligibilidad.
  doctrine_reference: Organización tribal de Israel en el Pentateuco y Josué; cf. Números 26.
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió explícitamente «And it was» para reflejar וַיְהִי. La presente versión española recupera ese arranque narrativo con «Y aconteció que», manteniendo el tono formal y la estructura de lista distributiva sin depender de una paráfrasis amplia.
  spanish_consistency_notes:
  - Se usa «Manasés» de forma uniforme para el nombre tribal y genealógico.
  - 'Se prefieren transliteraciones españolas estables: «Abiezer», «Helec», «Asriel», «Siquem», «Hefer», «Semida».'
  - Se mantiene «clanes» para מִשְׁפְּחֹתָם por coherencia con el resto del proyecto y con el sentido técnico del pasaje.
  - No se introduce una nota al pie porque el texto español no requiere una ambigüedad adicional que deba marcarse en línea.
