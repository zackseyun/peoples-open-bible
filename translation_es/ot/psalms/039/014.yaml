translation:
  language: es
  text: Aparta tu mirada de mí[a], para que vuelva a sonreír antes de que me vaya y ya no esté.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que recobre fuerzas» o «para que vuelva a alegrarme». El verbo hebreo puede comunicar alivio renovado, reanimación o brillo de ánimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשַׁע
  english_pob_choice: Look away
  chosen_spanish: Apártate
  alternatives_spanish:
  - Aparta tu mirada
  - Mira hacia otro lado
  lexicon: HALOT
  rationale: El hebreo pide que Dios retire su atención; en español, «apártate» comunica bien la separación solicitada sin sonar mecánico. Mantiene el tono de súplica del lamento.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de junto a mí
  - lejos de mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa separación directa. «De mí» es la correspondencia natural y sobria.
- source_word: וְאַבְלִיגָה
  english_pob_choice: so that I may smile again
  chosen_spanish: para que yo vuelva a sonreír
  alternatives_spanish:
  - para que recobre ánimo
  - para que recupere fuerzas
  - para que vuelva a alegrarme
  lexicon: HALOT
  rationale: בלג puede abarcar alivio, reanimación o brillo renovado. «Volver a sonreír» conserva el valor de alivio y restablecimiento visible que destacó la revisión inglesa, sin fijar indebidamente solo la idea de fuerza física.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - previo a
  lexicon: HALOT
  rationale: Marca temporal directa. «Antes de que» permite unir naturalmente las dos cláusulas verbales en español.
- source_word: אֵלֵךְ
  english_pob_choice: I go
  chosen_spanish: me vaya
  alternatives_spanish:
  - parta
  - vaya
  lexicon: HALOT
  rationale: En este contexto el verbo alude de forma reverente al morir o partir de la vida, pero el hebreo conserva la expresión indirecta. «Me vaya» mantiene esa reserva poética sin explicitar «morir».
- source_word: וְאֵינֶנִּי
  english_pob_choice: and am no more
  chosen_spanish: y ya no exista
  alternatives_spanish:
  - y ya no sea
  - y deje de existir
  - y no esté más
  lexicon: HALOT
  rationale: La expresión idiomática denota cesación total de la existencia/presencia. «Ya no exista» reproduce la solemnidad final sin exagerar ni suavizar el sentido.
theological_decisions:
- issue: Si conviene explicitar la muerte en la última línea
  english_pob_reading: Retain the Hebrew idiom as 'before I go and am no more' rather than explicitly saying 'before I die.'
  chosen_spanish_reading: 'Mantener la reserva poética: «antes de que me vaya y ya no exista».'
  alternative_spanish_readings:
  - antes de que muera
  - antes de partir de esta vida y desaparecer
  rationale: El hebreo alude claramente a la muerte, pero lo hace por medio de una fórmula indirecta. En español, conservar esa indirecta respeta el tono del original y evita añadir una explicitación que el verso no formula.
  doctrine_reference: Poética bíblica y principio de no sobre-explicación del texto
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «smile again» sobre «brighten up» por ser más natural y ajustarse mejor a וְאַבְלִיגָה. La redacción española adopta una solución equivalente («vuelva a sonreír») que conserva la idea de alivio visible y renovación interior. También se preserva la reserva del hebreo respecto de la muerte, sin explicitar «morir».
  spanish_consistency_notes:
  - Se usó «de mí» para la separación pedida a Dios, evitando fórmulas más interpretativas.
  - «Me vaya» mantiene el eufemismo hebreo para el morir/partir.
  - «Ya no exista» refleja la fórmula final de cesación sin endurecer el verso con una paráfrasis explicativa.
  - La nota al pie conserva la alternativa semántica documentada para וְאַבְלִיגָה.
