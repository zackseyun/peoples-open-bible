translation:
  language: es
  text: Los lazos de Seol[a] me rodearon; las trampas de la muerte me salieron al encuentro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sepulcro» o «el reino de los muertos» para «Seol».
    reason: alternative_reading
  - marker: b
    text: O «me encontraron» o «vinieron ante mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבְלֵי
  english_pob_choice: cords of
  chosen_spanish: lazos de
  alternatives_spanish:
  - cuerdas de
  - cordones de
  lexicon: HALOT
  rationale: En poesía hebrea, חבל puede referirse a cuerdas, lazos o bandas. «Lazos» conserva la imagen de algo que envuelve y aprieta, y funciona bien con el paralelo de «trampas». Se evita un calco demasiado literal si «cuerdas» suena menos natural en español poético aquí.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se mantiene la transliteración para preservar la referencia hebrea al ámbito de la muerte sin resolverla prematuramente como «sepulcro» o «reino de los muertos». Así se conserva la tensión teológica del término.
- source_word: סַבֻּנִי
  english_pob_choice: surrounded me
  chosen_spanish: me rodearon
  alternatives_spanish:
  - me cercaron
  - me envolvieron
  lexicon: HALOT
  rationale: El verbo expresa rodear o circundar. «Me rodearon» es directo y natural en español, y mantiene la imagen de cerco hostil.
- source_word: קִדְּמֻנִי
  english_pob_choice: confronted me
  chosen_spanish: me confrontaron
  alternatives_spanish:
  - me salieron al encuentro
  - me salieron al paso
  - me encontraron
  lexicon: HALOT
  rationale: El verbo puede significar salir al encuentro o preceder. «Me confrontaron» comunica con claridad la idea de un encuentro hostil, en línea con la lectura inglesa, sin borrar el matiz de irrupción inesperada.
- source_word: מֹקְשֵׁי
  english_pob_choice: snares of
  chosen_spanish: trampas de
  alternatives_spanish:
  - lazos de
  - redes de
  lexicon: HALOT
  rationale: מוקש denota una trampa o lazo de captura. «Trampas» mantiene el sentido y el paralelismo poético con el primer hemistiquio.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Traducción directa del sustantivo, con artículo para un español más fluido en esta construcción nominal.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  rationale: Se conserva el nombre propio transliterado para no nivelar la imagen hebrea a una sola interpretación doctrinal. La frase puede evocar sepulcro, muerte o el ámbito de los muertos; el español mantiene esa ambigüedad heredada del hebreo.
  doctrine_reference: Principio de primacía de la fuente original y conservación de la tensión semántica en términos teológicamente cargados.
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés; se conservan las dos alternativas principales documentadas: la transliteración de Sheol y el valor verbal de קדם como encuentro/confrontación. No se detectan revisiones posteriores que obliguen a ajustar el sentido.'
  spanish_consistency_notes:
  - Se mantiene «Sheol» como transliteración, coherente con la política POB de no sustituir automáticamente por «sepulcro».
  - Se prefirió «lazos» frente a «cuerdas» para reforzar el paralelismo con «trampas» sin perder la imagen de cerco.
  - «Confrontaron» intenta equilibrar el matiz de encuentro con el valor hostil exigido por el contexto poético.
  - Se usa «la muerte» con artículo por fluidez idiomática en español, sin alterar el sustantivo base.
