id: ISA.9.12
reference: Isaiah 9:12
source:
  edition: WLC
  text: וְ/הָ/עָ֥ם לֹא שָׁ֖ב עַד הַ/מַּכֵּ֑/הוּ וְ/אֶת יְהוָ֥ה צְבָא֖וֹת לֹ֥א דָרָֽשׁוּ־־־׃ס
translation:
  text: But the people did not return to him who struck them[a], nor did they seek Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, "the LORD of Hosts."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעָם
  chosen: But the people
  alternatives:
  - And the people
  - Yet the people
  lexicon: HALOT
  rationale: הָעָם is straightforwardly 'the people.' The prefixed וְ here is rendered adversatively as 'But' to reflect the contrastive force in context after judgment has fallen, while remaining within normal Hebrew narrative/discourse usage.
- source_word: לֹא שָׁב
  chosen: did not return
  alternatives:
  - did not turn back
  - did not repent
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn/return.' 'Return' preserves the relational/covenantal sense without over-interpreting it as explicit inner repentance, though repentance is implicated by context.
- source_word: עַד הַמַּכֵּהוּ
  chosen: to the one who struck them
  alternatives:
  - to him who struck them
  - to their smiter
  lexicon: HALOT
  rationale: The phrase literally means 'unto the one striking/struck him.' Although the suffix is morphologically singular, הָעָם is a collective noun and is naturally represented in English by plural object 'them.' 'The one who struck them' preserves the personal reference to God as the agent of judgment better than an abstract rendering such as 'to the blow.'
- source_word: וְאֶת
  chosen: nor
  alternatives:
  - and
  - and ... not
  lexicon: HALOT
  rationale: With the following negated verb, the conjunction is best rendered in idiomatic English as 'nor' to coordinate the two negative clauses smoothly.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than left in traditional form; 'Armies' communicates the plain sense in accessible modern English, while 'Hosts' is preserved as a lexical alternative because of its long translation history.
- source_word: לֹא דָרָשׁוּ
  chosen: did they seek
  alternatives:
  - did they inquire of
  - did they seek after
  lexicon: HALOT
  rationale: דָּרַשׁ in this context means to seek God, often with the sense of turning to him for help or guidance. 'Seek' is the clearest and most idiomatic English rendering without narrowing the sense to inquiry alone.
