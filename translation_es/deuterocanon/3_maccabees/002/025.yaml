    issue: Falta el sentido de προαποδεδειγμένων
    rationale: El borrador no traduce 'previamente mencionados/ya señalados', aunque el griego lo incluye claramente y el POB inglés lo conserva.
  - severity: medium
    issue: La estructura relativa puede ser ambigua
    rationale: En 'los compañeros de bebida y asociados que habían sido apartados...', la relativa puede entenderse como modificando solo al segundo sustantivo en lectura rápida; conviene una formulación que abarque con claridad a ambos grupos.
  - severity: low
    issue: '''e iba aumentando'' es algo áspero en este contexto'
    rationale: No es infiel, pero una formulación como 'y aumentando su maldad' o 'mientras aumentaba su maldad' fluye mejor y refleja bien el participio presente.
