  source_alignment_summary: 'El borrador refleja bien el hebreo: אַחַת/וּשְׁתַּיִם como adverbiales (''una vez / dos veces''), דִּבַּרְתִּי como habla ya realizada, וְלֹא אֶעֱנֶה como resolución de no responder, y וְלֹא אוֹסִיף con el matiz idiomático de no continuar. Sin embargo, la nota al pie actual no preserva correctamente la alternativa inglesa, porque repite esencialmente el texto principal en vez de reflejar la opción ''proceder no más / no seguir adelante''.'
  spanish_quality_summary: 'El español principal es claro, natural y digno: ''Una vez hablé, y no responderé; dos veces, y no añadiré más''. Solo conviene ajustar la nota para que sea idiomática y útil en español, y para que comunique de verdad la alternativa léxica documentada.'
  glossary_alignment: No hay términos del glosario teológico principal en juego. La decisión de mantener 'añadir' es correcta y coherente con la racionalidad léxica del POB, siempre que la nota explique que también puede significar 'continuar' o 'seguir adelante'.
  issues:
  - severity: medium
    issue: La nota al pie no conserva la alternativa léxica auditada.
    rationale: La nota española ofrece 'Hablé una vez...' como alternativa, pero eso no aporta una diferencia sustancial respecto del texto principal. La auditoría inglesa preserva específicamente la alternativa 'I spoke once ... I will proceed no further', centrada en el matiz de אוֹסִיף como 'continuar/proceder'.
  - severity: low
    issue: Redacción mejorable de la nota al pie.
    rationale: La formulación actual empieza con comillas y 'O:' de manera algo torpe. Puede simplificarse y sonar más natural en español eclesial amplio.
  revised_spanish_text: Una vez hablé[a], y no responderé; dos veces, y no añadiré más.
  revised_footnotes:
  - marker: a
    text: 'O: «Hablé una vez, pero no responderé; dos veces, pero no seguiré adelante». El modismo hebreo ''añadir'' puede significar continuar o repetir una acción.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural. Se corrige únicamente la nota al pie para reflejar la alternativa léxica real documentada por el POB y para mejorar su claridad en español.
