translation:
  language: es
  text: 'Porque ustedes han dicho[a]: «Hemos hecho pacto con la muerte, y con el Seol[b] hemos concertado un acuerdo. Cuando pase el azote abrumador[c], no llegará a nosotros, porque hemos hecho de la falsedad nuestro refugio y nos hemos escondido en el engaño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Con el Seol hemos concertado un pacto/tratado». El término hebreo es difícil; algunos lo han tomado como «visión», pero en este contexto lo más probable es que signifique un acuerdo en paralelo con «pacto».'
    reason: lexical_alternative
  - marker: b
    text: 'Seol: el ámbito de los muertos; no necesariamente idéntico a nociones posteriores de infierno.'
    reason: cultural_note
  - marker: c
    text: 'O: «el azote desbordante» o «el azote inundante». La expresión hebrea es difícil y combina la imagen de una inundación con la de un azote que golpea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Conserva la fuerza causal del hebreo y funciona de manera natural al introducir la acusación y su razón en español.
- source_word: אֲמַרְתֶּם
  english_pob_choice: you have said
  chosen_spanish: han dicho
  alternatives_spanish:
  - dijeron
  - han hablado
  lexicon: HALOT
  rationale: El perfecto hebreo se comunica bien con presente perfecto en español, manteniendo que la declaración tiene vigencia en el contexto de reprensión.
- source_word: כָּרַתְנוּ בְרִית
  english_pob_choice: we have made a covenant
  chosen_spanish: hemos hecho pacto
  alternatives_spanish:
  - hemos concertado un pacto
  - hemos cortado un pacto
  lexicon: HALOT
  rationale: ‘Hacer pacto’ transmite en español el valor idiomático de ‘cortar pacto’ sin forzar una calca; ‘pacto’ preserva la fuerza jurídica del hebreo.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - Muerte
  lexicon: HALOT
  rationale: Se conserva el sustantivo común y se mantiene la personificación retórica sin necesidad de capitalización.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - Sheol
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se translitera al español como ‘Seol’ para preservar el concepto hebreo y no reducirlo a ‘sepulcro’ ni cargarlo con sentidos doctrinales posteriores de ‘infierno’.
- source_word: עָשִׂינוּ חֹזֶה
  english_pob_choice: we have made an agreement
  chosen_spanish: hemos concertado un acuerdo
  alternatives_spanish:
  - hemos hecho un pacto
  - hemos hecho un acuerdo
  lexicon: HALOT
  rationale: Sigue la lectura contextual de ‘acuerdo/pacto’ para חֹזֶה, que en este verso funciona en paralelo con ‘pacto’; ‘concertar’ refleja bien la formalidad del trato.
- source_word: שיט שׁוֹטֵף
  english_pob_choice: the overwhelming scourge
  chosen_spanish: el azote abrumador
  alternatives_spanish:
  - el azote desbordante
  - el azote que todo lo arrasa
  - el azote inundante
  lexicon: HALOT
  rationale: La frase es difícil; ‘azote abrumador’ preserva el impacto del agente destructor y la imagen de fuerza arrolladora sin comprometerse de más con una sola reconstrucción metafórica.
- source_word: עבר
  english_pob_choice: passes through
  chosen_spanish: pase
  alternatives_spanish:
  - pase por
  - atraviese
  lexicon: HALOT
  rationale: 'Expresa el movimiento del azote en futuro/subjuntivo relativo al discurso directo: cuando pase, no alcanzará a ellos.'
- source_word: לֹא יְבוֹאֵנוּ
  english_pob_choice: it will not come to us
  chosen_spanish: no llegará a nosotros
  alternatives_spanish:
  - no vendrá a nosotros
  - no nos alcanzará
  lexicon: HALOT
  rationale: ‘Llegará’ conserva la idea de alcance o llegada del peligro de forma natural en español; mantiene la imagen sin añadir matiz ausente.
- source_word: כִּי שַׂמְנוּ
  english_pob_choice: because we have made
  chosen_spanish: porque hemos puesto
  alternatives_spanish:
  - porque hemos hecho
  - porque hemos colocado
  lexicon: HALOT
  rationale: שַׂמְנוּ se rinde con ‘hemos puesto’, que comunica el acto deliberado de establecer la mentira como base o apoyo.
- source_word: כָזָב
  english_pob_choice: falsehood
  chosen_spanish: la mentira
  alternatives_spanish:
  - la falsedad
  - el engaño
  lexicon: HALOT
  rationale: ‘Mentira’ es claro y directo en español y mantiene el valor de falsedad deliberada; en este paralelismo también encaja con ‘falsedad’ al final.
- source_word: מַחְסֵנוּ
  english_pob_choice: our refuge
  chosen_spanish: por refugio
  alternatives_spanish:
  - como refugio
  - por amparo
  lexicon: HALOT
  rationale: 'La metáfora se adapta al español con una locución natural: ‘poner por refugio’ comunica que la mentira es el lugar de seguridad que ellos se atribuyen.'
- source_word: וּבַשֶּׁקֶר נִסְתָּרְנוּ
  english_pob_choice: have hidden ourselves in deceit
  chosen_spanish: nos hemos escondido en falsedad
  alternatives_spanish:
  - nos hemos ocultado en engaño
  - nos hemos cubierto con falsedad
  lexicon: HALOT
  rationale: Conserva la reflexión del verbo y el paralelismo con ‘mentira’; ‘falsedad’ mantiene el registro formal y la correspondencia semántica con שׁקר.
theological_decisions:
- issue: Rendering of שְׁאוֹל
  english_pob_reading: Sheol, the realm of the dead; not necessarily identical with later notions of hell.
  chosen_spanish_reading: Seol, el ámbito de los muertos; no necesariamente equivalente al infierno en desarrollos posteriores.
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  rationale: La transliteración protege el mundo conceptual del hebreo y evita importar una doctrina posterior que el texto no exige. La nota en español mantiene abierta la distinción entre Seol y ‘infierno’.
  doctrine_reference: Translation philosophy §1, §3
- issue: Personification of death and Sheol
  english_pob_reading: Retained as covenant partners in the taunt
  chosen_spanish_reading: Se mantiene la personificación de la muerte y del Seol como interlocutores de un pacto burlón.
  alternative_spanish_readings:
  - Solo como metáfora impersonal
  - Como simple recurso poético
  rationale: El verso habla con ironía de alianzas con muerte y Seol; la traducción conserva esa retórica sin suavizarla ni convertirla en explicación doctrinal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Ambiguous difficult phrase שיט שׁוֹטֵף
  english_pob_reading: the overwhelming scourge / the flooding whip
  chosen_spanish_reading: el azote abrumador
  alternative_spanish_readings:
  - el azote desbordante
  - el azote inundante
  rationale: La combinación hebrea es difícil y admite varias reconstrucciones. Se elige una forma que preserve el golpe semántico general sin cerrar indebidamente la ambigüedad textual.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca la evaluación de alta concordancia del texto inglés POB y no introduce cambios sustantivos respecto del último pase. Se conserva la lectura contextual de חֹזֶה como ‘acuerdo’ y de שְׁאוֹל como ‘Seol’, junto con la nota sobre la ambigüedad de שיט שׁוֹטֵף.
  spanish_consistency_notes:
  - Se mantiene ‘Seol’ como transliteración estable para שְׁאוֹל, en coherencia con el criterio POB de no sustituirlo por ‘infierno’.
  - Se usa ‘pacto/acuerdo’ para el paralelismo hebreo, evitando la traducción literal ‘cortar’ que no suena natural en español.
  - Se conserva el registro formal y bíblico con vocabulario claro, evitando calcos innecesarios y sin diluir la dureza del pasaje.
