translation:
  language: es
  text: ¿Quién podrá narrar las proezas de Yahvé[a], o proclamar toda su alabanza?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «declarar las proezas de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «hacer oír toda su alabanza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who can
  chosen_spanish: ¿Quién podrá
  alternatives_spanish:
  - ¿Quién puede
  - ¿Quién
  lexicon: HALOT
  rationale: La pregunta retórica en hebreo implica capacidad humana limitada; «podrá» expresa esa capacidad de modo natural en español sin perder el matiz interrogativo.
- source_word: יְמַלֵּל
  english_pob_choice: recount
  chosen_spanish: narrar
  alternatives_spanish:
  - contar
  - relatar
  - declarar
  lexicon: HALOT
  rationale: El piel de מלל apunta a hablar o exponer en forma de relato. «Narrar» comunica bien el sentido de dar cuenta de hechos de manera solemne y fluida en español.
- source_word: גְּבוּרוֹת
  english_pob_choice: mighty deeds
  chosen_spanish: las proezas
  alternatives_spanish:
  - las obras poderosas
  - los hechos poderosos
  - las hazañas
  lexicon: HALOT
  rationale: El plural denota manifestaciones concretas de fuerza. «Proezas» conserva el valor de actos extraordinarios y poderosos con una resonancia poética adecuada para el salmo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, conforme a la convención del proyecto en español, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: יַשְׁמִיעַ
  english_pob_choice: proclaim / make heard
  chosen_spanish: proclamar
  alternatives_spanish:
  - hacer oír
  - dar a conocer
  - publicar
  lexicon: HALOT
  rationale: El hiphil de שמע tiene el sentido causal de «hacer oír». «Proclamar» refleja esa comunicación pública de modo idiomático y solemne en español.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  - cada
  lexicon: HALOT
  rationale: Se conserva el alcance totalizador del hebreo. En español, «toda su alabanza» suena natural y mantiene la idea de totalidad.
- source_word: תְּהִלָּתוֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - sus alabanzas
  - todo lo que merece alabanza
  lexicon: HALOT
  rationale: El singular con sufijo puede funcionar colectivamente. «Su alabanza» preserva esa forma y expresa de manera natural la totalidad de la alabanza debida a Dios.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se traslada al español la decisión doctrinal del POB de representar el Tetragrámaton con el nombre propio divino, preservando el carácter personal del nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparece anclado en el texto. También se evitó mezclar marcadores sin ancla. La redacción sigue de cerca el hebreo y el registro poético del salmo, manteniendo la distinción entre narrar/proclamar y la idea causal de «hacer oír».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Alabanza» traduce תְּהִלָּתוֹ de manera singular-colectiva, como en el audit trail en inglés.
  - «Proezas» y «narrar» conservan el tono poético sin introducir contenido ajeno al verso.
