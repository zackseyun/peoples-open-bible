translation:
  language: es
  text: Levanten una bandera en el país[a]; toquen la trompeta entre las naciones. Consagren naciones contra ella[b]; convoquen contra ella a los reinos de Ararat, Minni y Ashkenaz. Designen un mariscal[c] contra ella; hagan avanzar caballos como langostas erizadas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Levanten un estandarte».'
    reason: lexical_alternative
  - marker: b
    text: «Consagren naciones contra ella» usa lenguaje de guerra de apartar fuerzas para la batalla; puede implicar preparación para una guerra santa.
    reason: cultural_note
  - marker: c
    text: «Mariscal» traduce un término raro (tiphsar) para un oficial o funcionario militar; otras opciones son «comandante» u «oficial reclutador».
    reason: lexical_alternative
  - marker: d
    text: 'O: «como langostas peludas» o «como langostas ásperas»; la expresión hebrea es rara y vívida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ נֵס
  english_pob_choice: Raise a banner
  chosen_spanish: Levanten una bandera
  alternatives_spanish:
  - Levanten un estandarte
  - Levanten una señal
  lexicon: HALOT
  rationale: נֵס designa una señal alta, bandera o estandarte levantado públicamente. «Bandera» es claro y natural en español, y conserva la idea de convocación militar.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - por la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «país/territorio». En este contexto de alarma militar, «en la tierra» conserva la amplitud del hebreo sin restringirlo demasiado.
- source_word: תִּקְעוּ שׁוֹפָר
  english_pob_choice: blow a trumpet
  chosen_spanish: toquen el shofar
  alternatives_spanish:
  - toquen el cuerno
  - toquen la trompeta
  lexicon: HALOT
  rationale: שׁוֹפָר es el cuerno de alarma o convocatoria. Se mantiene «shofar» porque en español eclesial ya es un término reconocible y evita perder la referencia cultural específica del instrumento.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en las naciones
  lexicon: HALOT
  rationale: גּוֹיִם puede referirse a pueblos extranjeros o naciones. «Entre las naciones» conserva el alcance internacional del llamado bélico.
- source_word: קַדְּשׁוּ עָלֶיהָ גּוֹיִם
  english_pob_choice: Consecrate nations against her
  chosen_spanish: Consagren naciones contra ella
  alternatives_spanish:
  - Santifiquen naciones contra ella
  - Aparten naciones contra ella
  lexicon: HALOT
  rationale: קדשׁ en contextos de guerra puede significar apartar/consagrar para una misión. «Consagren» conserva la tensión sacral-militar que el inglés POB preserva.
- source_word: הַשְׁמִיעוּ עָלֶיהָ
  english_pob_choice: summon against her
  chosen_spanish: den aviso contra ella
  alternatives_spanish:
  - proclamen contra ella
  - hagan oír contra ella
  lexicon: HALOT
  rationale: El hiphil de שמע implica hacer oír, anunciar o proclamar. Aquí introduce la movilización de reinos específicos; «den aviso» comunica la proclamación militar sin sobretraducirla.
- source_word: מַמְלְכוֹת אֲרָרַט מִנִּי וְאַשְׁכְּנָז
  english_pob_choice: the kingdoms of Ararat, Minni, and Ashkenaz
  chosen_spanish: de los reinos de Ararat, Minni y Ashkenaz
  alternatives_spanish:
  - los reinos de Ararat, Minni y Ashkenaz
  - los reinos del Ararat, Minni y Ashkenaz
  lexicon: HALOT
  rationale: Se conservan los nombres propios transliterados. La construcción «de los reinos de...» refleja la relación genitiva del hebreo.
- source_word: פִּקְדוּ עָלֶיהָ טִפְסָר
  english_pob_choice: Appoint a marshal against her
  chosen_spanish: Designen un mariscal contra ella
  alternatives_spanish:
  - Comisionen un comandante contra ella
  - Designen un oficial contra ella
  lexicon: HALOT
  rationale: טִפְסָר es un término raro para un oficial, probablemente militar. «Mariscal» comunica rango y función en español, aunque sigue siendo una aproximación; se mantiene el valor de cargo militar sin diluirlo.
- source_word: הַעֲלוּ סוּס
  english_pob_choice: bring up horses
  chosen_spanish: traigan caballos
  alternatives_spanish:
  - hagan subir caballos
  - avancen caballos
  lexicon: HALOT
  rationale: El hiphil de עלה aquí tiene sentido de traer/poner en marcha tropas o caballos. «Traigan caballos» es más natural en español que un calco de «suban» y conserva la orden militar.
- source_word: כְּיֶלֶק סָמָר
  english_pob_choice: like bristling locusts
  chosen_spanish: como langostas erizadas
  alternatives_spanish:
  - como langostas ásperas
  - como langostas peludas
  lexicon: HALOT
  rationale: La expresión es rara y vívida. «Langostas erizadas» preserva la imagen de algo áspero/erizado, manteniendo el carácter figurado sin suavizarlo a una simple comparación con enjambres.
theological_decisions:
- issue: Lenguaje de guerra consagrado en קַדְּשׁוּ
  english_pob_reading: Consecrate nations against her uses warfare language of setting forces apart for battle; it may imply preparation for a holy war.
  chosen_spanish_reading: Consagren naciones contra ella conserva el matiz de apartar tropas para la batalla, con posible trasfondo de guerra santa.
  alternative_spanish_readings:
  - Santifiquen naciones contra ella
  - Aparten naciones contra ella
  rationale: En español, «consagrar» mantiene la tensión entre lo sacro y lo militar sin explicar de más. No se reduce a una simple movilización, porque el hebreo y la nota inglesa preservan esa ambigüedad cargada.
  doctrine_reference: Teología bíblica de la guerra santa / consagración para batalla en el AT
- issue: Término raro טִפְסָר
  english_pob_reading: Marshal translates a rare term (tiphsar) for an official or military officer; alternatives include commander or recruiting officer.
  chosen_spanish_reading: Mariscal intenta reproducir la función de oficial militar de rango, manteniendo la rareza del término.
  alternative_spanish_readings:
  - comandante
  - oficial militar
  - reclutador
  rationale: No hay equivalente exacto y transparente. «Mariscal» es una opción funcional de rango alto; se evita normalizarlo demasiado para no perder la particularidad del hebreo.
  doctrine_reference: No doctrinal issue; lexical/historical reference to a military office
- issue: Metáfora final con jerarquía y fuerza militar
  english_pob_reading: like hairy locusts or like rough locusts; the Hebrew expression is rare and vivid.
  chosen_spanish_reading: como langostas erizadas conserva la vividez y aspereza del hebreo.
  alternative_spanish_readings:
  - como langostas peludas
  - como langostas ásperas
  - como langostas rugosas
  rationale: La imagen no se aclara innecesariamente. Se mantiene el impacto visual y el carácter raro del hebreo, tal como hace la nota inglesa.
  doctrine_reference: Imagen poética y retórica profética
translation_notes:
  revision_awareness: La versión inglesa más reciente quedó sin cambios tras la revisión (high agreement, 1.0). Esta redacción española sigue de cerca esa lectura auditada y conserva las mismas decisiones léxicas y figurativas, adaptadas a un español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa «naciones» para גּוֹיִם, coherente con el inglés POB y con el tono internacional del pasaje.
  - Se conserva la rareza de טִפְסָר con una equivalencia funcional, sin sustituirla por un término eclesiástico tradicional.
  - La comparación final se deja figurada para respetar la imagen profética y la ambigüedad del hebreo.
