    reason: lexical_alternative
  revision_rationale: Se ajusta «para ir a David» a «hacia David» para evitar añadir finalidad no explícita; «refugio» se cambia a «fortaleza» para preservar mejor el valor militar de מְצַד; y «hombres valientes» se refuerza a «hombres poderosos y valientes» para reflejar con mayor fidelidad גִּבֹּרֵי הַחַיִל sin perder naturalidad en español.
