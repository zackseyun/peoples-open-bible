translation:
  language: es
  text: Sus actos de iniquidad estaban en aposentos secretos[a], en provocación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en desafío».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν καταγώγαις κρυφίοις
  english_pob_choice: in secret chambers
  chosen_spanish: en cámaras secretas
  alternatives_spanish:
  - en lugares ocultos
  - en aposentos secretos
  - en escondrijos
  lexicon: LSJ
  rationale: καταγώγαις κρυφίοις denota lugares ocultos o apartados. «Cámaras secretas» conserva la idea de espacios cerrados e internos sin especificar más de lo que el griego dice, y suena natural en español bíblico.
- source_word: αἱ παρανομίαι αὐτῶν
  english_pob_choice: their lawless deeds
  chosen_spanish: sus actos sin ley
  alternatives_spanish:
  - sus hechos ilegales
  - sus transgresiones
  - sus obras de iniquidad
  lexicon: LSJ
  rationale: παρανομίαι implica acciones contrarias a la ley o al orden recto. «Actos sin ley» preserva la fuerza moral-jurídica de la expresión y evita suavizarla a un término menos marcado.
- source_word: ἐν παροργισμῷ
  english_pob_choice: in provocation
  chosen_spanish: en provocación
  alternatives_spanish:
  - en desafío
  - en irritación
  - para provocar ira
  lexicon: LSJ
  rationale: παροργισμῷ puede significar provocación o exasperación. Como el texto griego no expresa un objeto explícito, «en provocación» mantiene la literalidad y la tensión semántica sin añadir sujeto u objeto no presentes en la línea.
- source_word: '[implied copula]'
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - se hallaban
  lexicon: N/A
  rationale: El griego es una construcción nominal sin verbo expreso. «Estaban» es la cópula más sobria en español para completar la frase sin introducir interpretación adicional.
theological_decisions:
- issue: Relación entre παροργισμός y la idea de provocar la ira divina
  english_pob_reading: in provocation
  chosen_spanish_reading: en provocación
  alternative_spanish_readings:
  - provocando su ira
  - en desafío
  - en exasperación
  rationale: 'La revisión del POB inglés señala que παροργισμός tiene peso teológico como provocación de ira en la tradición de la LXX, pero también insiste en no añadir un objeto explícito que el griego no da. «En provocación» preserva esa tensión: alude a la provocación sin convertirla en una paráfrasis explicativa.'
  doctrine_reference: 'LXX/Segundo Templo: vocabulario de provocación que puede estar asociado al juicio divino, sin explicitar aquí el objeto de la provocación.'
translation_notes:
  revision_awareness: La versión española sigue la lectura final del POB inglés («in provocation») y evita la expansión interpretativa «provocando a ira», aunque reconoce en la decisión teológica que el término griego puede resonar con la idea de provocar la ira divina en el trasfondo de la LXX. Se mantiene la brevedad del hemistiquio y la ausencia de verbo expreso con una cópula mínima.
  spanish_consistency_notes:
  - Se usa «actos sin ley» para mantener la fuerza jurídico-moral de παρανομίαι sin recurrir a una formulación eclesiástica tradicional no atestiguada aquí.
  - Se evita «SEÑOR» u otra máscara divina porque este versículo no contiene el nombre divino ni una cita directa de κύριος.
  - «En provocación» deja abierta la ambigüedad semántica entre provocación e irritación, tal como lo reflejan las revisiones del inglés POB.
