theological_decisions:
- issue: Interpretation of suffering as punitive destruction versus corrective discipline
  chosen_reading: The calamities/punishments are presented as serving the discipline of the Jewish people rather than their destruction.
  alternative_readings:
  - The punishments are merely educational in a general moral sense
  - The text speaks only of human political consequences, not divine chastening
  rationale: The explicit contrast μὴ πρὸς ὄλεθρον, ἀλλὰ πρὸς παιδείαν frames the suffering teleologically as corrective rather than annihilative. The translation preserves that theological tension without expanding beyond the text into a fuller doctrine of providence.
  doctrine_reference: Preserve theological tension rather than resolve it.
