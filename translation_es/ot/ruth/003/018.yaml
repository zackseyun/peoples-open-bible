translation:
  language: es
  text: 'Entonces ella dijo: «Quédate quieta, hija mía, hasta que sepas cómo resultará[a] el asunto, porque el hombre[b] no descansará sino hasta que haya terminado el asunto hoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo caerá el asunto». La expresión hebrea dice literalmente: «cómo caerá el asunto».'
    reason: lexical_alternative
  - marker: b
    text: «El hombre» se refiere a Booz, aunque el hebreo mantiene aquí la expresión sin nombrarlo.
    reason: cross_reference
lexical_decisions:
- source_word: שְׁבִי
  english_pob_choice: Sit still
  chosen_spanish: Quédate quieta
  alternatives_spanish:
  - Quédate
  - Permanece
  - Siéntate quieta
  lexicon: HALOT
  rationale: El imperativo de ישׁב puede expresar ‘sentarse’, ‘quedarse’ o ‘permanecer’. En este contexto Naomi pide a Rut que no se mueva y espere el desenlace; «quédate quieta» conserva la fuerza pragmática sin sonar duro o antinatural en español.
- source_word: בִתִּי
  english_pob_choice: my daughter
  chosen_spanish: hija mía
  alternatives_spanish:
  - mi hija
  - hija
  lexicon: HALOT
  rationale: Se mantiene el matiz afectivo del vocativo hebreo con el posesivo explícito. «Hija mía» es natural y conserva la cercanía de Naomi.
- source_word: תֵּדְעִי
  english_pob_choice: you learn
  chosen_spanish: sepas
  alternatives_spanish:
  - llegues a saber
  - conozcas
  - te enteres
  lexicon: HALOT
  rationale: 'ידע aquí es prospectivo: Rut debe esperar hasta conocer el resultado. El subjuntivo «sepas» comunica la adquisición futura del conocimiento de forma breve y fiel.'
- source_word: אֵיךְ יִפֹּל דָּבָר
  english_pob_choice: how the matter will turn out
  chosen_spanish: cómo resultará la cosa
  alternatives_spanish:
  - cómo saldrá el asunto
  - cómo se decidirá la cuestión
  - cómo caerá la cosa
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «cómo caerá la cosa». En español, «cómo resultará la cosa» conserva el sentido idiomático del desenlace sin borrar del todo la textura figurada del original.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - ese hombre
  - Boaz
  lexicon: HALOT
  rationale: El hebreo mantiene una referencia indefinida, aunque contextual, a Booz. Se conserva «el hombre» para no introducir el nombre donde el texto no lo da.
- source_word: יִשְׁקֹט
  english_pob_choice: will not rest
  chosen_spanish: no descansará
  alternatives_spanish:
  - no estará quieto
  - no reposará
  - no se quedará tranquilo
  lexicon: HALOT
  rationale: שׁקט aquí indica abstenerse de inactividad hasta resolver el asunto. «No descansará» reproduce bien esa determinación en español.
- source_word: כִּי אִם
  english_pob_choice: unless
  chosen_spanish: sino hasta que
  alternatives_spanish:
  - a menos que
  - excepto que
  - salvo que
  lexicon: HALOT
  rationale: La construcción introduce la única condición bajo la cual el hombre descansará. «Sino hasta que» expresa mejor esa fuerza exceptiva en español dentro de la frase negativa.
- source_word: כִּלָּה
  english_pob_choice: he has finished
  chosen_spanish: haya terminado
  alternatives_spanish:
  - haya acabado
  - haya completado
  - haya resuelto
  lexicon: HALOT
  rationale: כלה significa ‘terminar’ o ‘acabar’. En este contexto, «haya terminado» es la forma más directa y fiel para el cierre de un asunto pendiente.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - el caso
  - la cuestión
  lexicon: HALOT
  rationale: דבר es amplio y aquí se refiere al asunto pendiente de redención/matrimonio. «La cosa» sigue de cerca el hebreo y mantiene la repetición del sustantivo, aunque «el asunto» sería más idiomático.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Adverbio temporal directo y natural en español.
theological_decisions:
- issue: Referencia implícita al personaje principal en «el hombre»
  english_pob_reading: The man refers to Boaz, though the Hebrew keeps the expression indefinite rather than naming him here.
  chosen_spanish_reading: Se conserva «el hombre» sin nombrar a Booz.
  alternative_spanish_readings:
  - Booz no descansará
  - ese hombre no descansará
  - él no descansará
  rationale: El hebreo mantiene la referencia indefinida, y la POB la respeta en la traducción principal. En español se conserva esa indefinición para no resolver narrativamente lo que el texto deja abierto en esta línea.
  doctrine_reference: Fidelidad textual y respeto por la deixis narrativa del pasaje.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: la POB pasó de «fall out» a «turn out» y de «settled» a «finished» para acercarse más a la fuerza de los verbos hebreos. En español se optó por «cómo resultará la cosa» y «haya terminado», manteniendo tanto la claridad idiomática como la cercanía al hebreo.'
  spanish_consistency_notes:
  - Se preservó la referencia indefinida «el hombre» para armonizar con la auditoría inglesa.
  - Se evitó «Señor» o cualquier sustitución reverencial, porque el texto no contiene el nombre divino.
  - Se mantuvo el tono narrativo sobrio y familiar propio de Rut 3:18.
  - «Quédate quieta» refleja el imperativo de espera sin introducir una paráfrasis más interpretativa que la necesaria.
