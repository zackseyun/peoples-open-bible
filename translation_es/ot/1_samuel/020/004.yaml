translation:
  language: es
  text: 'Entonces Jonatán dijo a David[a]: «¿Qué dice tu alma? Yo lo haré por ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Lo que desees, yo lo haré por ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» conserva la secuencia de la acción en español de forma natural.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma española habitual del nombre propio, manteniendo la identificación clara y readable para una audiencia eclesial amplia.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del habla; «a» es la equivalencia natural en español.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: convención onomástica bíblica
  rationale: Nombre propio estándar en español.
- source_word: מַה תֹּאמַר נַפְשְׁךָ
  english_pob_choice: What does your soul say?
  chosen_spanish: ¿Qué dice tu alma?
  alternatives_spanish:
  - ¿Qué dice tu vida?
  - ¿Qué desea tu alma?
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea de נֶפֶשׁ como «alma» y el verbo «decir» para reflejar el sujeto gramatical femenino singular que sigue en hebreo. «Desea» interpretaría el sentido, pero perdería la imagen verbal documentada.
- source_word: וְאֶעֱשֶׂה לָּךְ
  english_pob_choice: I will do it for you
  chosen_spanish: Yo haré eso por ti
  alternatives_spanish:
  - Y haré eso por ti
  - Yo lo haré por ti
  lexicon: HALOT
  rationale: עָשָׂה se rinde con «haré»; el objeto implícito se expresa con «eso» para hacer explícita la referencia en español sin añadir contenido ajeno. «Por ti» expresa beneficio/compromiso mejor que un simple dativo direccional.
translation_notes:
  revision_awareness: Se siguió el ajuste del POB en inglés que volvió la primera cláusula una pregunta directa («What does your soul say?») y añadió un objeto implícito natural para «I will do it for you». La versión española conserva esa pregunta directa y explicita el objeto con «eso» para no dejarla elíptica en exceso.
  spanish_consistency_notes:
  - Se mantuvo «alma» para נֶפֶשׁ a fin de preservar la metáfora; no se sustituyó por «deseo» en el texto principal.
  - Se usó «a David» como complemento de destinatario, conforme al valor direccional de אֶל.
  - La nota al pie recoge la alternativa idiomática documentada por el audit trail en inglés sin desplazar el texto principal.
