translation:
  language: es
  text: Y sucedió que[a], cuando las puertas de Jerusalén se oscurecieron antes del sábado, dije que se cerraran las puertas, y dije que no las abrieran hasta después del sábado[c]. Y aposté a algunos de mis jóvenes[b] junto a las puertas, para que no entrara ninguna carga en sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «cuando las puertas de Jerusalén hacían sombra»; es un giro idiomático que señala la llegada del atardecer.
    reason: lexical_alternative
  - marker: b
    text: O «a algunos de mis siervos» o «a algunos de mis asistentes»; el hebreo puede referirse a miembros del séquito personal de Nehemías.
    reason: lexical_alternative
  - marker: c
    text: «Carga» puede referirse de modo específico a bienes transportados para el comercio, pues el contexto circundante trata del tráfico en sábado.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָֽלֲלוּ
  english_pob_choice: grew dark
  chosen_spanish: se oscurecían
  alternatives_spanish:
  - se hacían sombra
  - se volvían sombrías
  - se oscurecían al atardecer
  lexicon: HALOT
  rationale: El hebreo describe el inicio de la oscuridad al acercarse la tarde; en español, «se oscurecían» comunica ese avance natural hacia el atardecer sin forzar una paráfrasis. La nota conserva la alternativa más literal del hebreo como idiomatismo de sombras.
- source_word: שַׁעֲרֵי יְרוּשָׁלִַם
  english_pob_choice: the gates of Jerusalem
  chosen_spanish: las puertas de Jerusalén
  alternatives_spanish:
  - las puertas de Jerusalén
  - las entradas de Jerusalén
  lexicon: HALOT
  rationale: Aunque el sustantivo puede referirse a «puertas» o «portones», en español bíblico y actual «puertas de Jerusalén» es claro y natural para el conjunto de accesos urbanos.
- source_word: לִפְנֵי הַשַּׁבָּת
  english_pob_choice: before the Sabbath
  chosen_spanish: antes del sábado
  alternatives_spanish:
  - antes del sábado
  - en vísperas del sábado
  lexicon: HALOT
  rationale: Se conserva el valor temporal directo. «Sábado» expresa el יום/שׁבת como institución semanal; «antes del sábado» es más llano que una expresión litúrgica más marcada.
- source_word: וָאֹמְרָה
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - ordené
  - di la orden
  lexicon: HALOT
  rationale: El hebreo usa el verbo «decir», y el contexto administrativo da fuerza de mandato sin necesidad de reemplazarlo por un verbo más interpretativo. Se mantiene así la tensión entre forma verbal y función directiva.
- source_word: וַיִּסָּגְרוּ הַדְּלָתוֹת
  english_pob_choice: the doors should be shut
  chosen_spanish: que se cerraran las puertas
  alternatives_spanish:
  - que las puertas fueran cerradas
  - que se echaran las puertas
  lexicon: HALOT
  rationale: El español transmite mejor la orden con un subjuntivo pasivo/medio. «Puertas» mantiene la imagen urbana; «se cerraran» evita introducir agentes no expresados en el hebreo.
- source_word: אֲשֶׁר לֹא יִפְתָּחוּם
  english_pob_choice: that they should not open them
  chosen_spanish: que no las abrieran
  alternatives_spanish:
  - que no debían abrirlas
  - que no las abrieran nunca
  lexicon: HALOT
  rationale: El verbo plural con sufijo objeto apunta a un cierre impuesto a quienes las manejarían. En español, «no las abrieran» conserva el sentido activo y la referencia a las puertas sin sobrecargar la sintaxis.
- source_word: עַד אַחַר הַשַּׁבָּת
  english_pob_choice: until after the Sabbath
  chosen_spanish: hasta después del sábado
  alternatives_spanish:
  - hasta que pasara el sábado
  - hasta después del sábado
  lexicon: HALOT
  rationale: Se mantiene la relación temporal directa y la secuencia de cierre/reapertura sin añadir explicación.
- source_word: וּמִנְּעָרַי
  english_pob_choice: some of my young men
  chosen_spanish: a algunos de mis jóvenes
  alternatives_spanish:
  - a algunos de mis siervos
  - a algunos de mis sirvientes
  - a algunos de mis asistentes
  lexicon: HALOT
  rationale: נַעַר puede designar joven, sirviente o asistente. Dado que el contexto es de guardia y apoyo personal, «jóvenes» conserva el valor más literal, mientras «a algunos de» refleja el matiz partitivo de מִן.
- source_word: הֶעֱמַדְתִּי
  english_pob_choice: I stationed
  chosen_spanish: puse
  alternatives_spanish:
  - estacioné
  - coloqué
  - puse en guardia
  lexicon: HALOT
  rationale: En español, «puse» es breve y suficientemente administrativo; el contexto de vigilancia completa la idea de asignación. Si se eligiera «estacioné», sonaría más técnico pero menos natural en lectura bíblica continua.
- source_word: עַל הַשְּׁעָרִים
  english_pob_choice: at the gates
  chosen_spanish: en las puertas
  alternatives_spanish:
  - junto a las puertas
  - sobre las puertas
  - en las puertas
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente «sobre», con centinelas y puertas urbanas el español más natural es «en las puertas». Se evita «sobre» porque en español sonaría demasiado físico o extraño.
- source_word: לֹא יָבֹא מַשָּׂא
  english_pob_choice: so that no load might come in
  chosen_spanish: para que no entrara ninguna carga
  alternatives_spanish:
  - para que no entrara ninguna carga
  - para que no ingresara ninguna mercancía
  - para que no se trajera carga alguna
  lexicon: HALOT
  rationale: «Carga» conserva el sentido concreto de algo transportado; no se reduce a «mercancía» porque el hebreo es más amplio. «Entrara» recoge la imagen de ingreso a la ciudad.
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en día de sábado
  alternatives_spanish:
  - el día de sábado
  - en el sábado
  - en día de sábado
  lexicon: HALOT
  rationale: La expresión más literal sería «en día de sábado», que suena algo marcada pero fiel al hebreo. Se preserva «día» porque el texto lo expresa explícitamente; no se reduce a «en sábado».
theological_decisions:
- issue: Renderización de שַׁבָּת
  english_pob_reading: Sabbath
  chosen_spanish_reading: sábado
  alternative_spanish_readings:
  - Sabbath
  - descanso
  rationale: En español, «sábado» es la forma más transparente y de uso amplio para la institución del séptimo día. «Descanso» podría sugerir el sentido general, pero perdería la referencia histórica y legal concreta del pasaje.
  doctrine_reference: Éxodo 20:8-11; Levítico 23:3
- issue: Valor directivo de «dije»
  english_pob_reading: I said that the doors should be shut
  chosen_spanish_reading: dije que se cerraran las puertas
  alternative_spanish_readings:
  - ordené que se cerraran las puertas
  - mandé que se cerraran las puertas
  rationale: Se preserva el verbo de habla del hebreo sin borrar su fuerza imperativa contextual. La subordinada en subjuntivo comunica la orden sin cambiar el foco verbal original.
  doctrine_reference: Nehemías 13:19; respeto por la sintaxis fuente
- issue: מַשָּׂא como carga transportada
  english_pob_reading: Load may refer specifically to goods being carried in for trade
  chosen_spanish_reading: carga
  alternative_spanish_readings:
  - mercancía
  - bulto
  - peso
  rationale: «Carga» mantiene la amplitud del término hebreo y permite la lectura comercial del contexto sin encerrarla en una sola clase de bienes. No se añade «mercancía» en el texto principal porque sería más restrictivo que el original.
  doctrine_reference: Nehemías 13:15-22; observancia del sábado
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió un equivalente más cercano para el inicio de la oscuridad sin añadir expansión interpretativa. En español se mantuvo esa cercanía con «se oscurecían», evitando una paráfrasis demasiado libre y conservando el flujo narrativo y administrativo del versículo.
  spanish_consistency_notes:
  - Se usa «sábado» de manera uniforme para שׁבת, siguiendo una opción transparente y no eclesiástica.
  - Se mantiene el valor concreto de «carga» para מַשָּׂא, sin convertirlo en una glosa comercial demasiado estrecha en el texto principal.
  - Se conserva la primera persona singular del narrador y el tono administrativo de Nehemías mediante verbos simples y directos.
  - La frase «las puertas» se usa para שׁערים/דלתות por claridad en español, sin forzar diferencias terminológicas innecesarias entre ambos paralelismos del versículo.
