translation:
  language: es
  text: Tú viste la aflicción de nuestros padres en Egipto[a], y oíste su clamor junto al mar Rojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mar de Juncos». Tradicionalmente se vierte «mar Rojo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: you saw
  chosen_spanish: Tú viste
  alternatives_spanish:
  - Tú miraste
  - Tú tomaste en cuenta
  lexicon: HALOT
  rationale: El hebreo ראה aquí expresa ver con atención a la condición del pueblo. «Viste» conserva el sentido directo, la segunda persona dirigida a Dios y el registro de oración.
- source_word: עֳנִי
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - opresión
  - aflicción
  lexicon: HALOT
  rationale: «Aflicción» comunica sufrimiento o angustia de manera natural en español y mantiene el tono de plegaria del pasaje sin especificar más de lo que dice el hebreo.
- source_word: אֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: HALOT
  rationale: Se conserva el plural masculino concreto del hebreo y la referencia a los antepasados del pueblo. «Padres» es más fiel al paralelismo tradicional que neutralizar a «antepasados».
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: Es una indicación locativa simple; «en Egipto» reproduce el sentido sin añadir elementos que no están en el texto.
- source_word: זַעֲקָתָם
  english_pob_choice: their cry
  chosen_spanish: su clamor
  alternatives_spanish:
  - su grito
  - su clamor
  lexicon: HALOT
  rationale: «Clamor» conserva la fuerza de una súplica angustiada y funciona bien en español bíblico. El posesivo singular «su» refleja naturalmente el colectivo del hebreo.
- source_word: שָׁמַעְתָּ
  english_pob_choice: you heard
  chosen_spanish: escuchaste
  alternatives_spanish:
  - oíste
  - escuchaste
  lexicon: HALOT
  rationale: Aunque «oíste» sería literal, «escuchaste» comunica mejor la idea de oír con atención y respuesta implícita que tiene שׁמע en este contexto de oración.
- source_word: יַם סוּף
  english_pob_choice: the Red Sea
  chosen_spanish: el mar Rojo
  alternatives_spanish:
  - el mar de Juncos
  - el mar Rojo
  lexicon: HALOT
  rationale: Se sigue la forma tradicional y ampliamente inteligible en español, «mar Rojo». La alternativa más transparente al hebreo queda preservada en nota.
theological_decisions:
- issue: Nombre geográfico tradicional versus transparencia léxica
  english_pob_reading: Red Sea with a footnote noting 'Sea of Reeds'
  chosen_spanish_reading: mar Rojo con nota sobre 'mar de Juncos'
  alternative_spanish_readings:
  - mar de Juncos
  - mar Rojo
  rationale: Se mantiene la referencia tradicional reconocible para lectores hispanos, pero se documenta la transparencia del hebreo y su posible sentido literal en la nota, siguiendo el audit trail inglés.
  doctrine_reference: Ninguna doctrina en disputa; decisión lexical-geográfica.
translation_notes:
  revision_awareness: El auditor inglés no introdujo cambios de revisión y mantuvo alta concordancia; esta propuesta sigue ese estado sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene el trato directo a Dios en segunda persona singular («Tú»).
  - Se conserva el paralelismo verbal pasado («viste / escuchaste»).
  - Se evita introducir explicaciones interpretativas fuera del alcance del verso.
  - La nota conserva la alternativa léxica documentada para יַם סוּף.
