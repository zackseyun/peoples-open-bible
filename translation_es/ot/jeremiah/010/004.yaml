translation:
  language: es
  text: Lo decoran con plata y con oro[a]; lo fijan con clavos y con martillos, para que no se tambalee[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo adornan con plata y con oro».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que no se mueva» o «para que no sea sacudido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֶסֶף
  english_pob_choice: with silver
  chosen_spanish: con plata
  alternatives_spanish:
  - en plata
  - mediante plata
  lexicon: HALOT
  rationale: El ב instrumental/material se expresa naturalmente en español con "con". "Plata" conserva el material usado para adornar el ídolo sin forzar una estructura calcada.
- source_word: וּבְזָהָב
  english_pob_choice: and with gold
  chosen_spanish: y con oro
  alternatives_spanish:
  - y en oro
  - y mediante oro
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con "plata" y la referencia explícita al segundo metal. "Con" comunica el valor instrumental/material del hebreo.
- source_word: יְיַפֵּהוּ
  english_pob_choice: they decorate it
  chosen_spanish: lo decoran
  alternatives_spanish:
  - lo adornan
  - lo embellecen
  lexicon: HALOT
  rationale: El piel de יפה expresa hacer bello/adornar. "Decoran" es comprensible y conserva la acción externa de embellecer el objeto, sin sobrerreligiosizar el registro.
- source_word: בְּמַסְמְרוֹת
  english_pob_choice: with nails
  chosen_spanish: con clavos
  alternatives_spanish:
  - con clavos de fijación
  - con clavetes
  lexicon: HALOT
  rationale: '"Clavos" es el equivalente moderno más claro para un elemento de sujeción en este contexto artesanal.'
- source_word: וּבְמַקָּבוֹת
  english_pob_choice: and with hammers
  chosen_spanish: y con martillos
  alternatives_spanish:
  - y con mazos
  - y con mazos
  lexicon: HALOT
  rationale: '"Martillos" reproduce de manera directa la herramienta de golpeo/fijación que aparece en el hebreo y mantiene la imaginería satírica.'
- source_word: יְחַזְּקוּם
  english_pob_choice: they fasten it
  chosen_spanish: lo fijan
  alternatives_spanish:
  - lo aseguran
  - lo sujetan
  lexicon: HALOT
  rationale: El piel de חזק aquí significa hacer firme, asegurar. "Fijan" es natural en español y conserva la idea de inmovilizar el objeto con sujeciones.
- source_word: וְלֹא יָפִיק
  english_pob_choice: so that it will not totter
  chosen_spanish: para que no se tambalee
  alternatives_spanish:
  - para que no se mueva
  - para que no vacile
  lexicon: HALOT
  rationale: El valor contextual de יפיק es la inestabilidad/oscilar del objeto. "Tambalearse" transmite bien la ironía de un ídolo que debe ser asegurado para no moverse ni perder estabilidad.
theological_decisions:
- issue: Sátira contra el ídolo y su falta de vida propia
  english_pob_reading: The verse is rendered to emphasize the mockery of idols as man-made objects that must be decorated and physically secured.
  chosen_spanish_reading: 'La traducción conserva el tono irónico: un objeto hecho por humanos necesita ser adornado y atornillado para no moverse.'
  alternative_spanish_readings:
  - Una descripción más neutral del trabajo artesanal sobre una estatua
  - Una formulación más literal sin enfatizar el efecto satírico
  rationale: El contexto inmediato (Jer 10:3-5) ridiculiza a los ídolos como obras humanas sin vida ni capacidad de sostenerse. En español conviene mantener esa ironía sin añadir explicaciones extratextuales.
  doctrine_reference: Jeremías 10:3-5; principio de conservar el sentido llano y la fuerza polémica del texto fuente.
translation_notes:
  revision_awareness: 'Se siguió la revisión del audit trail que corrige el objeto singular: el hebreo y el contexto tratan al ídolo como un solo objeto, por eso se usa «lo» y no un plural. También se conservó la tensión lexical de יָפִיק con una nota alternativa, como en el POB inglés.'
  spanish_consistency_notes:
  - Se mantuvo "con" para el valor instrumental/material de ב en ambos pares de materiales.
  - Se prefirió "fijan"/"tambalee" por claridad moderna, sin perder la imagen de asegurar físicamente el ídolo.
  - Se conservó el singular pronominal "lo" por concordancia con el objeto singular del contexto.
  - El registro es sobrio y publicable, sin caer en calcos como "en plata" o "en oro".
