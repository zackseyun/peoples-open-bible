translation:
  language: es
  text: Allí asentó a los hambrientos[a], y establecieron una ciudad para vivir en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una ciudad para habitar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשֶׁב
  english_pob_choice: he settled
  chosen_spanish: hizo habitar
  alternatives_spanish:
  - hizo morar
  - estableció
  - hizo asentarse
  lexicon: HALOT
  rationale: 'El hifil de ישׁב tiene sentido causativo: hacer habitar, hacer morar, asentar. ''Hizo habitar'' conserva esa causalidad sin sonar tan rígido como un calco literal, y permite mantener el sujeto implícito del contexto.'
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en aquel lugar
  lexicon: HALOT
  rationale: Es el adverbio de lugar más directo y natural en español para el 'there' del inglés y el שָׁם hebreo.
- source_word: רְעֵבִים
  english_pob_choice: the hungry
  chosen_spanish: a los hambrientos
  alternatives_spanish:
  - a los que tenían hambre
  - a los famélicos
  - a los hambrientos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado para personas caracterizadas por el hambre. En español, 'a los hambrientos' expresa bien esa función y el valor colectivo.
- source_word: וַיְכוֹנְנוּ
  english_pob_choice: they established
  chosen_spanish: establecieron
  alternatives_spanish:
  - fundaron
  - prepararon
  - hicieron firme
  lexicon: HALOT
  rationale: כון en este contexto apunta a establecer o dejar firmemente dispuesto. 'Establecieron' conserva la idea de asentamiento duradero sin añadir una precisión excesiva como 'fundaron'.
- source_word: עִיר
  english_pob_choice: a city
  chosen_spanish: una ciudad
  alternatives_spanish:
  - un pueblo
  - un asentamiento
  lexicon: HALOT
  rationale: La equivalencia ordinaria y más fiel es 'ciudad'. Aunque el referente pueda no sugerir una urbe moderna, el uso bíblico de עִיר corresponde mejor a 'ciudad'.
- source_word: מוֹשָׁב
  english_pob_choice: to live in
  chosen_spanish: para vivir en ella
  alternatives_spanish:
  - para habitación
  - como lugar de habitación
  - para habitarla
  lexicon: HALOT
  rationale: מוֹשָׁב denota morada, habitación o lugar de asentamiento. 'Para vivir en ella' es una forma idiomática en español que conserva la finalidad/resultado. Se evita un giro más técnico y arcaizante sin perder el sentido.
theological_decisions:
- issue: Sujeto implícito del verbo singular causativo וַיּוֹשֶׁב
  english_pob_reading: The subject is God, carried over from the surrounding context, rendered simply as 'he' in the verse translation.
  chosen_spanish_reading: El sujeto queda implícito en el contexto y se refleja con 'hizo habitar' sin nombrarlo explícitamente en el versículo.
  alternative_spanish_readings:
  - Él hizo habitar a los hambrientos
  - Yahvé hizo habitar a los hambrientos
  rationale: El salmo viene describiendo las acciones de Yahvé en el contexto inmediato, por lo que el sujeto es claro sin necesidad de introducir un nombre divino en este hemistiquio. Mantener la forma verbal impersonal en español respeta el estilo del hebreo y la lectura auditada del inglés POB.
  doctrine_reference: Contexto literario del Salmo 107; continuidad del sujeto divino implícito.
translation_notes:
  revision_awareness: 'Se siguió la lectura de alta concordancia del audit trail inglés, sin revisiones posteriores que alteren el sentido básico. Se mantuvo la equivalencia óptima: verbo causativo, sustantivo adjetival y frase final de finalidad, con una nota para la alternativa más formal de מוֹשָׁב.'
  spanish_consistency_notes:
  - Se conserva 'hambrientos' como sustantivo colectivo, coherente con el inglés POB.
  - '''Ciudad'' se mantiene para עִיר, sin sustituirlo por ''pueblo'' o ''asentamiento'', porque el audit trail favorece el término bíblico usual.'
  - Se evita introducir 'Yahvé' en el texto principal, ya que el sujeto se recupera del contexto y el hebreo aquí no lo expresa explícitamente.
