  - severity: medium
    issue: '''los hijos de hombre'' suena antinatural en español'
    rationale: Aunque intenta seguir de cerca el hebreo, en español ampliamente legible la expresión normal es 'los hijos del hombre'. Así se conserva mejor el giro formal sin caer en un calco áspero.
  - severity: low
    issue: Uso de signos de exclamación en '¡cuánto más ...!'
    rationale: La construcción אַף כִּי introduce una inferencia de tipo 'cuánto más', no necesariamente una exclamación emotiva. En español proverbial, sin exclamaciones suena más sobrio y fiel al tono.
