  text: ⸀Ἔα, τί ἡμῖν καὶ σοί, Ἰησοῦ Ναζαρηνέ; ἦλθες ἀπολέσαι ἡμᾶς; οἶδά σε τίς εἶ, ὁ ἅγιος τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/004/034.yaml
  text: Ah! What have you to do with us[e][d][c][b][a], Jesus of Nazareth? Have you come to destroy us? I know who you are—the Holy One of God.
  footnotes:
  - marker: a
    text: Or 'Ah!' The interjection Ἔα is an abrupt cry of alarm or protest; some translations render the sense more interpretively as 'Leave us alone!'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'What to us and to you?'—a Semitic idiom expressing dissociation or hostile protest.
    reason: cultural_note
  - marker: c
    text: Or 'Jesus the Nazarene.'
    reason: alternative_reading
  - marker: d
    text: The plural 'us' is left unspecified in Greek and may refer to the demon alone in representative speech or more broadly to the demonic realm.
    reason: alternative_reading
  - marker: e
    text: Or 'God's Holy One.'
    reason: lexical_alternative
translation:
  language: ko
  text: 「아! 나사렛 예수여, 우리가 당신과 무슨 상관이 있습니까? 우리를 망하게 하러 오셨습니까? 나는 당신이 누구신지 안다, 곧 하나님의 거룩하신 분이시다.」
  philosophy: optimal-equivalence
