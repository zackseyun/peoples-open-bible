translation:
  language: es
  text: Entonces Balaam alzó los ojos y vio a Israel acampando[a] por sus tribus, y el Espíritu de Dios[b] vino sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acampado por sus tribus» o «tribu por tribu».
    reason: lexical_alternative
  - marker: b
    text: O «un espíritu de Dios vino sobre él».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא / עֵינָיו
  english_pob_choice: lifted up his eyes
  chosen_spanish: alzó los ojos
  alternatives_spanish:
  - levantó los ojos
  - alzando los ojos
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de percepción; en español, «alzó los ojos» preserva el valor idiomático y suena natural y digno. Mantiene la imagen verbal sin reducirla a un simple «vio».
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: HALOT
  rationale: El verbo informa la percepción inmediata de Balaam después de levantar los ojos. «Vio» es la equivalencia directa y más clara en español.
- source_word: שֹׁכֵן
  english_pob_choice: dwelling
  chosen_spanish: acampando
  alternatives_spanish:
  - morando
  - establecido
  - asentado
  lexicon: HALOT
  rationale: En este contexto Israel está organizado como campamento tribal. «Acampando» comunica mejor la situación concreta que «morando» y evita perder el matiz campamental del hebreo.
- source_word: לִשְׁבָטָיו
  english_pob_choice: according to its tribes
  chosen_spanish: por sus tribus
  alternatives_spanish:
  - según sus tribus
  - tribu por tribu
  - de acuerdo con sus tribus
  lexicon: HALOT
  rationale: La preposición con el sustantivo indica disposición u ordenamiento tribal. «Por sus tribus» conserva la idea de distribución entre tribus con una sintaxis natural en español.
- source_word: רוּחַ אֱלֹהִים
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - un espíritu de Dios
  - el espíritu de Dios
  - el soplo de Dios
  lexicon: HALOT
  rationale: En este contexto profético, la frase denota la presencia/inspiración divina sobre Balaam. «Espíritu» con mayúscula preserva la lectura teológica recibida por el POB sin ocultar la posibilidad alternativa señalada por el audit trail.
- source_word: וַתְּהִי עָלָיו
  english_pob_choice: came upon him
  chosen_spanish: vino sobre él
  alternatives_spanish:
  - estuvo sobre él
  - reposó sobre él
  - fue sobre él
  lexicon: HALOT
  rationale: El hebreo expresa una irrupción o llegada del Espíritu sobre Balaam. «Vino sobre él» mantiene el movimiento ingesivo mejor que una forma estática.
theological_decisions:
- issue: רוּחַ אֱלֹהִים en un contexto de oráculo profético
  english_pob_reading: the Spirit of God
  chosen_spanish_reading: el Espíritu de Dios
  alternative_spanish_readings:
  - un espíritu de Dios
  - el espíritu de Dios
  rationale: El contexto inmediato es una inspiración profética y la lectura principal del POB se conserva mejor con una traducción personalizada y reverente. A la vez, la nota alternativa deja abierta la lectura menos determinada del hebreo sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión léxica y teológica; equivalencia óptima
translation_notes:
  revision_awareness: El audit trail inglés reporta alta concordancia y no registra revisiones aplicadas. Se mantiene esa lectura estable, ajustando solo la formulación española para que el modismo hebreo suene natural y sea auditable.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «Espíritu» con mayúscula en la lectura principal, coherente con el contexto profético del POB.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - «Acampando» se eligió para reflejar el arreglo tribal campamental sin perder inteligibilidad en español.
  - La nota alternativa en b preserva la ambigüedad documentada entre una lectura pneumatológica definida y una formulación más literal del hebreo.
