translation:
  language: es
  text: No lloren por el muerto, ni lo lamenten. Lloren amargamente[a] por el que se va[b], porque no volverá ni verá la tierra de su nacimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lloren, sí, lloren». El hebreo usa un imperativo con infinitivo absoluto para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: Esta expresión se refiere, por el contexto, al gobernante que será llevado al exilio.
    reason: cultural_note
lexical_decisions:
- source_word: תִּבְכּוּ
  english_pob_choice: weep
  chosen_spanish: lloren
  alternatives_spanish:
  - lloren
  - lloren, sí, lloren
  - lloren amargamente
  lexicon: HALOT
  rationale: בכה expresa llorar/llorar en duelo. En español, «lloren» es natural y solemne; la intensidad se reserva para el segundo imperativo reforzado.
- source_word: לְמֵת
  english_pob_choice: for the dead
  chosen_spanish: por el muerto
  alternatives_spanish:
  - por el muerto
  - por el fallecido
  - por el difunto
  lexicon: HALOT
  rationale: El hebreo puede funcionar de modo genérico o referido a un muerto concreto. «Por el muerto» conserva la brevedad y el tono directo del original; evita suavizar la fuerza del término.
- source_word: תָּנֻדוּ לוֹ
  english_pob_choice: mourn for him
  chosen_spanish: lo lamenten
  alternatives_spanish:
  - lo lamenten
  - hagan duelo por él
  - muestren duelo por él
  lexicon: HALOT
  rationale: נוד en contextos de lamento puede implicar duelo, condolencia o gestos de pesar. «Lamenten» comunica el sentido de duelo en español sin forzar una imagen gestual específica.
- source_word: בְּכוּ בָכוֹ
  english_pob_choice: weep bitterly
  chosen_spanish: lloren amargamente
  alternatives_spanish:
  - lloren, sí, lloren
  - lloren intensamente
  - lloren con amargura
  lexicon: HALOT
  rationale: La combinación del imperativo con el infinitivo absoluto intensifica la acción. «Lloren amargamente» transmite esa fuerza de manera natural en español.
- source_word: לַהֹלֵךְ
  english_pob_choice: for the one going away
  chosen_spanish: por el que se va
  alternatives_spanish:
  - por el que parte
  - por el que va de camino
  - por el que se aleja
  lexicon: HALOT
  rationale: El participio indica literalmente «el que va/va yendo». «El que se va» conserva el movimiento verbal y resulta claro en español sin introducir todavía la noción interpretativa de exilio en el texto principal.
- source_word: לֹא יָשׁוּב עוֹד
  english_pob_choice: he will never return
  chosen_spanish: porque no volverá
  alternatives_spanish:
  - porque no regresará
  - porque no volverá jamás
  - porque no retornará
  lexicon: HALOT
  rationale: La negación con עוֹד expresa no retorno permanente. «No volverá» es idiomático y suficientemente fuerte; «jamás» sería posible, pero no necesario para el sentido.
- source_word: וְרָאָה
  english_pob_choice: or see
  chosen_spanish: ni verá
  alternatives_spanish:
  - o verá
  - ni verá
  lexicon: HALOT
  rationale: 'Después de una cláusula negativa, el waw puede funcionar de forma aditiva negativa. En español, «ni verá» preserva mejor la relación de coordinación negativa que un simple «o». '
- source_word: אֶרֶץ מוֹלַדְתּוֹ
  english_pob_choice: the land of his birth
  chosen_spanish: la tierra de su nacimiento
  alternatives_spanish:
  - la tierra de su nacimiento
  - su tierra natal
  - la tierra donde nació
  lexicon: HALOT
  rationale: מוֹלֶדֶת alude a nacimiento/origen natal. «La tierra de su nacimiento» mantiene el vínculo concreto con אֶרֶץ y evita agregar una interpretación más amplia que la del hebreo.
translation_notes:
  revision_awareness: La base inglesa revisada quitó «again» de «return» por redundancia. En español se refleja esa misma sobriedad con «no volverá», sin añadir «jamás» en el texto principal, aunque la negación ya comunica permanencia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto no aplicable aquí, al no aparecer el nombre divino en este versículo.
  - Se evitó «Cristo» u otra terminología no presente en el hebreo.
  - «Lamenten» se eligió para נוד por su naturalidad en un contexto de duelo, sin convertirlo en una paráfrasis amplia.
  - La coordinación final se resolvió con «ni verá» para conservar la negatividad acumulativa del hebreo.
