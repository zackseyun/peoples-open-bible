    rationale: Si el texto principal usa «sede de Ar» y la nota ofrece «sitio/lugar de Ar» como alternativa, la relación entre lectura principal y alternativa queda invertida respecto a la rationale auditada. Conviene poner en el texto la opción más neutra y dejar en la nota las alternativas de «morada/asiento».
