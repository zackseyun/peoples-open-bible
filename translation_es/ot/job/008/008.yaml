review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: כִּי como conector causal/exhortativo, שְׁאַל נָא como mandato cortés, לְדֹר רִישׁוֹן como apelación a una generación anterior, y לְחֵקֶר como investigación. Sin embargo, «Porque, por favor, pregunta» suena poco natural en español por la colocación de «por favor», y «sus padres» en este contexto puede leerse demasiado literalmente como los padres inmediatos de esa generación, cuando el hebreo admite y el POB documenta el sentido más amplio de antepasados. También falta en español la nota alternativa correspondiente al doble valor de חֵקֶר que sí preserva el POB inglés.'
  spanish_quality_summary: El español es comprensible, pero necesita pulido para sonar más natural y digno. «Porque, por favor, pregunta» resulta torpe; «Pues pregunta, por favor» o «Porque te ruego que preguntes» serían más idiomáticos, pero conviene mantener el imperativo cercano al original. «Disponte a la investigación» es aceptable y conserva el matiz de preparación/atención. Para legibilidad bíblica amplia, «sus antepasados» funciona mejor en el texto principal que «sus padres», con nota que explique el hebreo literal.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es idiomática-lexical: mantener el valor hebreo de אֲבוֹתָם sin producir una lectura española engañosa. También conviene reflejar la alternativa semántica de חֵקֶר (''investigación'' / ''lo investigado'') en nota, ya que el expediente inglés la conserva.'
  issues:
