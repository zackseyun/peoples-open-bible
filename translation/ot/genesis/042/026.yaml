id: GEN.42.26
reference: Genesis 42:26
source:
  edition: WLC
  text: וַ/יִּשְׂא֥וּ אֶת שִׁבְרָ֖/ם עַל חֲמֹרֵי/הֶ֑ם וַ/יֵּלְכ֖וּ מִ/שָּֽׁם־־׃
translation:
  text: Then they loaded their grain onto their donkeys and went from there[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their provisions' or 'their purchased grain.' The Hebrew term can denote food supplies, but in this context it most naturally refers to grain acquired in Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: they loaded
  alternatives:
  - they carried
  - they lifted
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'to lift/carry,' but with goods placed on animals in travel context, 'loaded' best captures the idiomatic sense in natural English without over-paraphrasing.
- source_word: שִׁבְרָם
  chosen: their grain
  alternatives:
  - their provisions
  - their purchased grain
  - their food
  lexicon: HALOT
  rationale: שֶׁבֶר in the Joseph narrative commonly refers to grain obtained during famine conditions. 'Their grain' is concise and contextually precise; 'provisions' is broader and less specific.
- source_word: עַל חֲמֹרֵיהֶם
  lemma: עַל
  chosen: onto their donkeys
  alternatives:
  - on their donkeys
  - upon their donkeys
  lexicon: HALOT
  rationale: The preposition עַל with a loading verb naturally yields 'onto' in English, expressing motion to placement. 'Donkeys' is the standard rendering of חֲמוֹר.
- source_word: וַיֵּלְכוּ
  chosen: went away
  alternatives:
  - went
  - departed
  - set out
  lexicon: HALOT
  rationale: הלך is a common motion verb. 'Went away' reflects departure from the location and works smoothly with the following phrase 'from there.'
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - thence
  - from that place
  lexicon: HALOT
  rationale: A straightforward deictic expression; 'from there' is clear modern English and preserves the source sense.
