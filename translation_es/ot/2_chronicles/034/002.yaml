  revision_rationale: Se ajusta el modismo hebreo בְּעֵינֵי para preservar mejor la imagen de evaluación divina mediante ‘a los ojos de Yahvé’, dejando ‘ante Yahvé’ como alternativa válida en nota. También se suaviza la última frase con los artículos para una lectura más natural en español general. El resto del versículo está bien alineado con la fuente y con la política terminológica del proyecto.
