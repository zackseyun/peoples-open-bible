  language: en
  yaml_path: translation/ot/leviticus/024/016.yaml
  text: Whoever blasphemes the name of Yahweh shall surely be put to death[a]; all the congregation shall certainly stone him[b]. The sojourner as well as the native-born—when he blasphemes the Name—shall be put to death.
  footnotes:
  - marker: a
    text: Or 'pronounces the name of the LORD' or 'curses the name of the LORD.' The Hebrew verb can carry the sense of uttering distinctly or of reviling in this context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Name' in the second clause, functioning as a reverential substitute for the divine name.
    reason: cultural_note
