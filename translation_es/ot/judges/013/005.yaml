    text: 'O: «a librar». El verbo hebreo puede significar «salvar» o «librar», según el contexto.'
    reason: lexical_alternative
  revision_rationale: Se corrige הָרָה a un estado presente («estás embarazada») para ajustarse al hebreo, se reemplaza «navaja» por «navaja de afeitar» para precisión semántica en español, se mejora la naturalidad de la prohibición con «pasará sobre su cabeza», y se traslada la única nota necesaria al verbo «salvar», siguiendo la alternativa léxica documentada en la POB inglesa. No se requiere adjudicación adicional porque las correcciones son claras desde el hebreo y el estilo español.
