translation:
  language: es
  text: Nuestra herencia ha pasado a extraños[a]; nuestras casas, a extranjeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nuestra herencia ha sido vuelta a extraños, nuestras casas a extranjeros». El verbo hebreo puede traducirse más literalmente como «ha sido vuelta», pero aquí probablemente implica un traspaso de posesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָתֵנוּ
  english_pob_choice: our inheritance
  chosen_spanish: nuestra heredad
  alternatives_spanish:
  - nuestra herencia
  - nuestra posesión
  lexicon: HALOT
  rationale: נַחֲלָה puede expresar heredad/inheritance como porción asignada; «heredad» conserva mejor el matiz patrimonial y de lote heredado que «herencia», que en español moderno puede sonar más abstracta o testamentaria.
- source_word: נֶהֶפְכָה
  english_pob_choice: has been turned over
  chosen_spanish: ha sido entregada
  alternatives_spanish:
  - ha sido vuelta
  - ha sido transferida
  - ha cambiado de manos
  lexicon: HALOT
  rationale: El nifal de הפך admite la idea de ser volteado/puesto al revés, pero en este contexto la POB entiende transferencia de posesión. «Entregada» comunica el traspaso de dominio en español natural sin perder la pasividad del verbo.
- source_word: לְזָרִים
  english_pob_choice: to strangers
  chosen_spanish: a extraños
  alternatives_spanish:
  - a extranjeros
  - a forasteros
  lexicon: HALOT
  rationale: זָרִים señala gente ajena a la comunidad. «Extraños» conserva esa idea de no pertenencia y funciona bien en el paralelismo con «extranjeros» del segundo hemistiquio.
- source_word: בָּתֵּינוּ
  english_pob_choice: our houses
  chosen_spanish: nuestras casas
  alternatives_spanish:
  - nuestros hogares
  lexicon: HALOT
  rationale: El hebreo habla literalmente de casas; «casas» mantiene la correspondencia formal y el paralelismo con la heredad.
- source_word: לְנָכְרִים
  english_pob_choice: to foreigners
  chosen_spanish: a extranjeros
  alternatives_spanish:
  - a forasteros
  - a no israelitas
  lexicon: HALOT
  rationale: נָכְרִים enfatiza extranjería. En español, «extranjeros» refleja bien el valor de ser de fuera y preserva el contraste poético con זָרִים.
translation_notes:
  revision_awareness: El texto coincide con el testimonio hebreo WLC y con la línea auditada en inglés; se ha mantenido la distinción poética entre זָרִים y נָכְרִים con dos equivalentes españoles distintos, y se ha optado por una formulación natural que conserva la pasividad y la idea de cambio de posesión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se preserva el paralelismo hebreo con dos términos españoles distintos: «extraños» y «extranjeros».'
  - «Heredad» se usa por su valor de porción heredada y su resonancia bíblica, sin sustituirla por un término más genérico.
