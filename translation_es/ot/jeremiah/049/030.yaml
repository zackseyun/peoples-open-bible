translation:
  language: es
  text: ¡Huyan! ¡Aléjense muy lejos! Habiten en lugares profundos[a], habitantes de Hazor, declara Yahvé, porque Nabucodonosor, rey de Babilonia, ha tomado consejo contra ustedes y ha ideado un plan contra ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «habiten profundo»; un modismo que sugiere retirarse a lugares remotos o escondidos.'
    reason: cultural_note
  - marker: b
    text: El hebreo cambia de «contra ustedes» a «contra ellos» al final del versículo; la traducción conserva ese cambio.
    reason: textual_note
lexical_decisions:
- source_word: נֻסוּ
  english_pob_choice: Flee!
  chosen_spanish: ¡Huyan!
  alternatives_spanish:
  - ¡Escapen!
  - ¡Pónganse en fuga!
  lexicon: HALOT
  rationale: El imperativo plural de נוס pide una orden directa de escape. «Huyan» es natural, breve y conserva el tono urgente de advertencia profética.
- source_word: נֻּדוּ מְאֹד
  english_pob_choice: Wander far away!
  chosen_spanish: ¡Aléjense muy lejos!
  alternatives_spanish:
  - ¡Aléjense mucho!
  - ¡Retírense muy lejos!
  lexicon: HALOT
  rationale: נוד expresa apartarse o errar lejos, y מְאֹד intensifica la distancia. En español, «aléjense muy lejos» mantiene la fuerza del alejamiento sin confundirlo con el primer mandato de huida.
- source_word: הֶעְמִיקוּ לָשֶׁבֶת
  english_pob_choice: Dwell deep
  chosen_spanish: Habiten en lugares profundos
  alternatives_spanish:
  - Háganse profundos para habitar
  - Habiten en lo profundo
  lexicon: HALOT
  rationale: La expresión idiomática comunica retirarse a lugares remotos o escondidos. «Habiten en lugares profundos» preserva la metáfora sin sonar forzado en español.
- source_word: יֹשְׁבֵי חָצוֹר
  english_pob_choice: inhabitants of Hazor
  chosen_spanish: habitantes de Hazor
  alternatives_spanish:
  - los que habitan en Hazor
  lexicon: HALOT
  rationale: El participio en constructo funciona de modo idiomático como designación de los residentes. Se conserva el nombre propio Hazor en transliteración.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: El hebreo usa la fórmula profética de autoridad con el nombre divino. Se sigue el estándar del proyecto para יְהוָה como «Yahvé», evitando el ocultamiento por «SEÑOR».
- source_word: יָעַץ ... עֵצָה
  english_pob_choice: has taken counsel
  chosen_spanish: ha tomado consejo
  alternatives_spanish:
  - ha planeado
  - ha trazado consejo
  lexicon: HALOT
  rationale: El binomio verbo-sustantivo enfatiza una deliberación intencional. «Ha tomado consejo» reproduce el campo semántico de consejo/plan sin perder el matiz de designio.
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - en contra de ustedes
  lexicon: HALOT
  rationale: En este contexto hostil, עַל con יעץ se vuelve naturalmente adversativo. «Contra ustedes» es la equivalencia clara en español.
- source_word: וְחָשַׁב ... מַחֲשָׁבָה
  english_pob_choice: and devised a plan
  chosen_spanish: y ha ideado un plan
  alternatives_spanish:
  - y ha formado un plan
  - y ha concebido un plan
  lexicon: HALOT
  rationale: La construcción cognada intensifica la idea de cálculo deliberado. «Ha ideado un plan» suena idiomático y conserva el sentido de trama o intención premeditada.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: 'El texto hebreo usa el Tetragrama de manera directa. Se aplica el estándar confesional y editorial del proyecto: «Yahvé», no el sustituto litúrgico «SEÑOR».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión pronominal al final del versículo
  english_pob_reading: Preserve the direct address to 'you' throughout
  chosen_spanish_reading: Mantener «ustedes» en ambas cláusulas finales
  alternative_spanish_readings:
  - armonizar a «ellos»
  - suavizar a un referente plural impersonal
  rationale: Aunque el audit trail inglés menciona una oscilación textual, la revisión más reciente del POB inglés decidió uniformar el referente a «you». El español sigue esa lectura final y no introduce una oscilación no respaldada por la versión vigente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve source-informed decisions; latest revision prefers direct address'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del contexto auditado: se mantiene el final en segunda persona («contra ustedes ... contra ustedes») y no la variante anterior con tercera persona. También conserva la distinción entre los dos imperativos iniciales y la imagen idiomática de «habitar profundo».'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - 'Se distinguieron los dos imperativos hebreos: «Huyan» y «Aléjense muy lejos».'
  - «Habiten en lugares profundos» intenta preservar el modismo sin calco opaco.
  - Se mantuvo la forma de respeto/plural «ustedes» para el адресo colectivo.
  - «Ha tomado consejo» y «ha ideado un plan» conservan el paralelismo deliberativo del hebreo.
