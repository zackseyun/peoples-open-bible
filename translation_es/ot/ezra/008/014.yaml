translation:
  language: es
  text: 'Y de los hijos de Bigvai: Utaí y Zabud, y con él[a] setenta varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «con él» (sufijo singular). Algunas traducciones lo suavizan a «con ellos» porque se mencionan dos nombres inmediatamente antes. Además, algunas tradiciones textuales y versiones antiguas reflejan un segundo nombre diferente, pero el texto masorético lee «Zabud».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: La construcción de מן + בני introduce un subgrupo genealógico/listado. «Hijos de» conserva la relación literal y el tono de lista del hebreo, sin forzar una explicación interpretativa.
- source_word: בִגְוַי
  english_pob_choice: Bigvai
  chosen_spanish: Bigvai
  lexicon: nombre propio
  rationale: Nombre propio/transliteración directa.
- source_word: עוּתַי
  english_pob_choice: Uthai
  chosen_spanish: Utaí
  alternatives_spanish:
  - Utai
  lexicon: nombre propio
  rationale: Se translitera el nombre propio al español con acento final para indicar la sílaba tónica en lectura hispana, manteniendo el mismo referente del texto fuente.
- source_word: ו/זבוד
  english_pob_choice: Zabbud
  chosen_spanish: Zabud
  alternatives_spanish:
  - Zabbud
  lexicon: nombre propio
  rationale: El texto consonántico apunta al nombre זבוד; en español, «Zabud» reproduce mejor la forma breve y legible en una lista genealógica. Se conserva como nombre propio sin desarrollar la variante textual en el cuerpo principal.
- source_word: וְ/עִמּ֖/וֹ
  english_pob_choice: and with them
  chosen_spanish: y con ellos
  alternatives_spanish:
  - y con él
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es 3ms, el propio contexto inmediato menciona dos nombres (Uthai y Zabud), y el audit trail inglés ya revisó la lectura hacia plural para reflejar correctamente el referente. En español, «con ellos» expresa de forma natural esa referencia plural.
- source_word: שִׁבְעִ֥ים
  english_pob_choice: seventy
  chosen_spanish: setenta
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: הַ/זְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: «Varones» conserva el valor de sexo masculino del hebreo זְכָרִים y suena más natural que «males» en español bíblico-readable, sin perder precisión en un listado censal.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió «with him» a «with them» para reflejar el referente plural de Uthai y Zabbud. La versión española adopta esa corrección, pero sigue señalando en nota que la forma hebrea es singular. También se mantiene la variante textual del segundo nombre en nota, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se preserva la estructura de lista genealógica con «Y de los hijos de…».
  - Se usa transliteración hispana consistente para nombres propios.
  - Se evita sustituir el valor genealógico por una paráfrasis explicativa.
  - «Varones» se eligió por claridad y por concordar con el registro bíblico de censos/listas.
