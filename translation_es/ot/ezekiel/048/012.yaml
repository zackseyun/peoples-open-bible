  text: וְ/הָיְתָ֨ה לָ/הֶ֧ם תְּרוּמִיָּ֛ה מִ/תְּרוּמַ֥ת הָ/אָ֖רֶץ קֹ֣דֶשׁ קָדָשִׁ֑ים אֶל גְּב֖וּל הַ/לְוִיִּֽם־׃
