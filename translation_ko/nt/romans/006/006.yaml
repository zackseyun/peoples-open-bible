id: ROM.6.6
reference: Romans 6:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦτο γινώσκοντες ὅτι ὁ παλαιὸς ἡμῶν ἄνθρωπος συνεσταυρώθη, ἵνα καταργηθῇ τὸ σῶμα τῆς ἁμαρτίας, τοῦ μηκέτι δουλεύειν ἡμᾶς τῇ ἁμαρτίᾳ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/006/006.yaml
  text: knowing this[a], that our old self was crucified with him, so that the body of sin might be rendered powerless, so that we should no longer be enslaved to sin[c][b],
translation:
  language: ko
  text: 우리의 옛 사람이 그분과 함께 십자가에 못 박힌 것을 우리는 압니다. 이는 죄의 몸이 무력해지고, 우리가 더 이상 죄에게 노예 노릇 하지 않게 하려 함입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ παλαιὸς ἡμῶν ἄνθρωπος
  english_pob_choice: our old self
  chosen_korean: 우리의 옛 사람
  lexicon: BDAG
  rationale: 바울의 정형구.
- source_word: συνεσταυρώθη
  english_pob_choice: was crucified with
  chosen_korean: 함께 십자가에 못 박힌
  lexicon: BDAG
  rationale: συν- 연합.
- source_word: τὸ σῶμα τῆς ἁμαρτίας
  english_pob_choice: the body of sin
  chosen_korean: 죄의 몸
  lexicon: BDAG
  rationale: 죄에 매여 있는 인격적 실존을 가리키는 표현. 직역 유지.
- source_word: καταργηθῇ
  english_pob_choice: rendered powerless
  chosen_korean: 무력해지고
  alternatives_korean:
  - 무효화되고
  - 효력을 잃고
  lexicon: BDAG
  rationale: 능력을 잃게 한다는 의미.
- source_word: δουλεύειν
  english_pob_choice: be enslaved
  chosen_korean: 노예 노릇 하지
  alternatives_korean:
  - 섬기지
  - 종노릇 하지
  lexicon: BDAG
  rationale: δουλ- 어근. 6장 전체의 δοῦλος 극성 보존을 위해 「노예 노릇」으로 옮김. DOCTRINE.md §1 + 본 과제 정책.
theological_decisions:
- issue: 6장에서 δοῦλος/δουλεύω 계열의 일관된 강한 번역
  chosen_reading: 「노예/노예 노릇」으로 통일
  alternative_readings:
  - 「종/종노릇」
  - 「섬김」
  rationale: 바울이 6장에서 의/죄의 양극 노예제를 극적 수사로 사용하므로, 한국 전통의 부드러운 「종」은 그 극성을 약화시킨다. DOCTRINE.md §1과 본 과제 정책에 따라 「노예」로 강하게 보존.
  doctrine_reference: 'DOCTRINE.md §1: Contested terms — δοῦλος'
