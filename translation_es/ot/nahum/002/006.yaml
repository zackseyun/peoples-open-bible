revisions:
- from: Él recuerda a sus nobles[a]; tropiezan en su marcha. Se apresuran hacia su muro[b], y se ha dispuesto el refugio de asedio.
  to: Él recuerda a sus nobles[a]; tropiezan en su marcha. Se apresuran hacia su muralla, y se ha dispuesto la protección de asedio[b].
  rationale: Se corrige la ubicación de la nota [b] para que explique הַסֹּכֵךְ, conforme a la evidencia fuente y al POB inglés. También se mejora la naturalidad y precisión del español con «muralla» y «protección de asedio», manteniendo la ambigüedad léxica del implemento militar.
