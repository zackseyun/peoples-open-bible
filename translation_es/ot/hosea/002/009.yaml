translation:
  language: es
  text: 'Ella perseguirá a sus amantes[a], pero no los alcanzará; los buscará, pero no los encontrará. Entonces dirá: «Iré y volveré a mi primer esposo, porque entonces me iba mejor que ahora».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi antiguo esposo». El hebreo dice literalmente «mi primer esposo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרִדְּפָה
  english_pob_choice: she will pursue
  chosen_spanish: perseguirá
  alternatives_spanish:
  - seguirá tras
  - irá tras
  lexicon: HALOT
  rationale: El verbo expresa persecución activa. «Perseguirá» conserva la imagen de ir tras alguien con insistencia, sin suavizarla.
- source_word: מְאַהֲבֶיהָ
  english_pob_choice: her lovers
  chosen_spanish: sus amantes
  alternatives_spanish:
  - sus amados
  - los que la aman
  lexicon: HALOT
  rationale: En el contexto de Oseas, el término alude a relaciones ilícitas o idolátricas, no a afecto legítimo. «Amantes» mantiene esa carga y coincide con el uso metafórico marital del pasaje.
- source_word: תַשִּׂיג
  english_pob_choice: she will overtake
  chosen_spanish: los alcanzará
  alternatives_spanish:
  - los atrapará
  - dará con ellos
  lexicon: HALOT
  rationale: En español, «alcanzar» reproduce bien la idea de perseguir sin lograr ponerse al nivel de la presa, conservando la metáfora de caza/persecución.
- source_word: וּבִקְשָׁתַם
  english_pob_choice: she will seek them
  chosen_spanish: los buscará
  alternatives_spanish:
  - los procurará
  - los andará buscando
  lexicon: HALOT
  rationale: «Buscar» es el equivalente natural de בקש en este contexto y mantiene el paralelismo con «hallar».
- source_word: תִמְצָא
  english_pob_choice: she will not find
  chosen_spanish: no los hallará
  alternatives_spanish:
  - no los encontrará
  - no los descubrirá
  lexicon: HALOT
  rationale: «Hallar» conserva la correspondencia poética con «buscar» y suena digno y claro en español bíblico contemporáneo.
- source_word: וְאָמְרָה
  english_pob_choice: Then she will say
  chosen_spanish: Entonces dirá
  alternatives_spanish:
  - Y dirá
  - Luego dirá
  lexicon: HALOT
  rationale: «Entonces» expresa la secuencia resultante del fracaso anterior, como en el audit trail en inglés.
- source_word: אֵלְכָה וְאָשׁוּבָה
  english_pob_choice: I will go and return
  chosen_spanish: Iré y volveré
  alternatives_spanish:
  - Iré de nuevo
  - Volveré
  lexicon: HALOT
  rationale: Las dos formas cohortativas expresan resolución. En español, «Iré y volveré» preserva ambos verbos sin reducirlos a una sola idea.
- source_word: אֶל אִישִׁי הָרִאשׁוֹן
  english_pob_choice: to my first husband
  chosen_spanish: a mi primer esposo
  alternatives_spanish:
  - a mi primer marido
  - a mi antiguo esposo
  lexicon: HALOT
  rationale: En español, «esposo» funciona bien en el marco matrimonial profético y evita el tono más coloquial de «marido». «Primer» sigue de cerca el hebreo literal.
- source_word: כִּי טוֹב לִי אָז מֵעָתָּה
  english_pob_choice: for it was better for me then than now
  chosen_spanish: porque entonces me iba mejor que ahora
  alternatives_spanish:
  - porque entonces estaba mejor para mí que ahora
  - porque me fue mejor entonces que ahora
  lexicon: HALOT
  rationale: La comparación temporal se expresa de forma natural en español con «me iba mejor», sin perder el contraste entre אָז y מֵעָתָּה.
theological_decisions:
- issue: Metáfora matrimonial de la infidelidad de Israel
  english_pob_reading: Retain 'lovers' and 'husband' language directly in the main text
  chosen_spanish_reading: Mantener «amantes» y «esposo» en el texto principal
  alternative_spanish_readings:
  - suprimir la metáfora con «aliados» o «protectores»
  - neutralizar con «compañeros»
  rationale: El hebreo usa deliberadamente lenguaje marital/sexual dentro de la acusación profética. Traducirlo con términos suavizados borraría una tensión textual central del libro.
  doctrine_reference: Oseas 2; filosofía de traducción POB §§1, 3, 6
- issue: אִישִׁי הָרִאשׁוֹן
  english_pob_reading: Or 'former husband.' The Hebrew reads literally 'my first husband.'
  chosen_spanish_reading: «mi primer esposo» en el texto, sin ocultar la literalidad
  alternative_spanish_readings:
  - «mi antiguo esposo»
  - «mi exesposo»
  rationale: El hebreo dice literalmente «mi primer esposo». En español, «primer esposo» preserva esa literalidad y deja abierta la lectura relacional sin introducir una equivalencia moderna no atestiguada.
  doctrine_reference: Nota lexical del texto fuente; transparencia POB
translation_notes:
  revision_awareness: El contexto auditado en inglés no introduce correcciones textuales ni cambios de sentido; la presente versión sigue la lectura de máxima coincidencia del paquete fuente y mantiene intacta la metáfora matrimonial. No hay revisiones aplicadas.
  spanish_consistency_notes:
  - 'Se mantiene el futuro profético en español con formas simples: «perseguirá», «alcanzará», «buscará», «hallará».'
  - «Amantes» y «esposo» conservan el campo semántico marital/sexual del hebreo sin eufemizarlo.
  - La secuencia narrativa se refleja con «Entonces dirá», coherente con el valor resultativo de וְאָמְרָה.
  - Se prefiere «esposo» sobre «marido» por registro bíblico digno y consistencia terminológica.
  - La comparación final se vierte con una construcción natural en español («me iba mejor») que mantiene el contraste temporal del hebreo.
