revisions:
- from: Porque nadie que haga injusticias[a] quedará oculto[b] ante tu conocimiento.
  to: Porque todo el que comete injusticias[a] no quedará oculto[b] de tu conocimiento.
  rationale: Se revisa para reflejar más directamente πᾶς ποιῶν con «todo el que», conservar la negación explícita con «no quedará oculto» y traducir ἀπὸ τῆς γνώσεώς σου de manera menos interpretativa como «de tu conocimiento». Se mantiene «injusticias» por la importancia temática del campo justicia/injusticia en el capítulo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:57:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: nadie/todo el que obra ἄδικα no puede quedar oculto del conocimiento divino. Sin embargo, se aparta innecesariamente del énfasis formal de πᾶς ποιῶν con «nadie que haga» cuando el rastro auditado del POB inglés ya fijó «everyone who does… will not be hidden» para reflejar más directamente el griego. Además, «ante tu conocimiento» es más interpretativo que la relación básica «de tu conocimiento».'
  spanish_quality_summary: El español es claro y digno, pero «quedará oculto ante tu conocimiento» suena algo forzado. Una formulación como «todo el que comete injusticias no quedará oculto de tu conocimiento» preserva mejor la sintaxis fuente y suena natural en registro bíblico moderno. Las notas también deben alinearse con el texto revisado y evitar notas innecesarias o poco útiles.
  glossary_alignment: «Injusticias» alinea bien con ἄδικα y conserva el campo léxico justicia/injusticia destacado en la auditoría inglesa. No hay conflictos con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: «nadie que haga» cambia la formulación positiva universal de πᾶς ποιῶν
    rationale: Aunque comunica el sentido lógico, la revisión inglesa adjudicada prefirió «everyone who does» precisamente para reflejar más directamente el griego y su énfasis. En español puede mantenerse naturalmente como «todo el que… no…».
  - severity: medium
    issue: «ante tu conocimiento» es más interpretativo que el griego
    rationale: ἀπὸ τῆς γνώσεώς σου se representa más fielmente con «de tu conocimiento». «Ante» introduce un matiz de exposición delante de alguien que no está explicitado en la preposición griega.
  - severity: low
    issue: La nota b no refleja bien la estructura negativa del original
    rationale: Si el texto principal lleva «no quedará oculto», la alternativa útil debe corresponder a esa forma, p. ej. «no será escondido», no una forma positiva aislada.
  revised_spanish_text: Porque todo el que comete injusticias[a] no quedará oculto[b] de tu conocimiento.
  revised_footnotes:
  - marker: a
    text: O «hechos injustos».
    reason: lexical_alternative
  - marker: b
    text: O «no será escondido».
    reason: lexical_alternative
