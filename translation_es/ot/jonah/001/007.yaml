translation:
  language: es
  text: 'Y dijeron, cada uno a su compañero: «Vamos, echemos suertes para que sepamos por causa de quién nos ha venido este mal[a]». Y echaron suertes, y la suerte cayó sobre Jonás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta calamidad» o «este desastre». La palabra hebrea puede significar mal, daño o desastre según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: each man to his companion
  chosen_spanish: cada uno a su compañero
  alternatives_spanish:
  - uno al otro
  - cada uno a su prójimo
  lexicon: HALOT
  rationale: La expresión distributiva pide un español natural que conserve la idea de intercambio mutuo sin volverlo genérico en exceso. «Cada uno a su compañero» mantiene el sentido recíproco del hebreo y evita una formulación demasiado eclesiástica como «prójimo».
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Venid
  alternatives_spanish:
  - Vamos
  - Id
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede corresponder a «ir», aquí funciona como exhortación para iniciar una acción conjunta. En español, «Venid» conserva bien el tono de invitación/exhortación; se prefiere el plural de la escena colectiva.
- source_word: וְנַפִּילָה גוֹרָלוֹת
  english_pob_choice: let us cast lots
  chosen_spanish: echemos suertes
  alternatives_spanish:
  - arrojemos suertes
  - echémonos a las suertes
  lexicon: HALOT
  rationale: «Echar suertes» es la forma idiomática y transparente en español para el procedimiento descrito. «Suertes» comunica el plural hebreo de גּוֹרָלוֹת sin forzar una expresión menos natural.
- source_word: וְנֵדְעָה
  english_pob_choice: so that we may know
  chosen_spanish: para que sepamos
  alternatives_spanish:
  - y sepamos
  - a fin de que sepamos
  lexicon: HALOT
  rationale: El matiz final/purpose se expresa con claridad con «para que». «Sepamos» conserva el valor cohortativo y la resolución conjunta de los marineros.
- source_word: בְּשֶׁלְּמִי
  english_pob_choice: on whose account
  chosen_spanish: por causa de quién
  alternatives_spanish:
  - a causa de quién
  - por quién
  lexicon: HALOT
  rationale: La pregunta busca identificar a la persona responsable del mal que los ha alcanzado. «Por causa de quién» mantiene la relación causal sin añadir una imputación moral más fuerte de la que el hebreo exige.
- source_word: הָרָעָה הַזֹּאת
  english_pob_choice: this evil
  chosen_spanish: este mal
  alternatives_spanish:
  - esta calamidad
  - este desastre
  lexicon: HALOT
  rationale: En este contexto tempestuoso, רָעָה designa la desgracia o daño experimentado. «Mal» conserva la amplitud semántica del hebreo sin sonar excesivamente moralizante en español; el contexto evita entenderlo como un mal ético cometido por Dios.
- source_word: לָנוּ
  english_pob_choice: has come upon us
  chosen_spanish: nos ha venido
  alternatives_spanish:
  - nos ha sobrevenido
  - ha caído sobre nosotros
  lexicon: HALOT
  rationale: En español se requiere un verbo explícito; «nos ha venido» refleja bien la irrupción de la calamidad sobre ellos y corresponde al sentido situacional del hebreo.
- source_word: וַיַּפִּלוּ גּוֹרָלוֹת
  english_pob_choice: So they cast lots
  chosen_spanish: Y echaron suertes
  alternatives_spanish:
  - Entonces echaron suertes
  - Y sortearon
  lexicon: HALOT
  rationale: La forma narrativa avanza con un perfecto simple en español. «Echaron suertes» es la expresión estable y fiel para el acto de echar lotes/suertes.
- source_word: וַיִּפֹּל הַגּוֹרָל עַל יוֹנָה
  english_pob_choice: the lot fell on Jonah
  chosen_spanish: la suerte cayó sobre Jonás
  alternatives_spanish:
  - el sorteo recayó sobre Jonás
  - la suerte tocó a Jonás
  lexicon: HALOT
  rationale: «La suerte cayó sobre» reproduce el resultado narrativo con naturalidad. Se conserva «Jonás» como forma española estándar del nombre propio.
theological_decisions:
- issue: Sentido de רָעָה en un contexto de calamidad providencial
  english_pob_reading: this evil
  chosen_spanish_reading: este mal
  alternative_spanish_readings:
  - esta calamidad
  - este desastre
  rationale: La opción «mal» preserva la amplitud léxica del hebreo y permite que el contexto determine que se trata de una desgracia sobrevenida, no de un mal moral atribuido a Dios. Las alternativas «calamidad» y «desastre» son posibles, pero estrechan el rango semántico más de lo que la fuente exige.
  doctrine_reference: Translation philosophy §1, §5
- issue: Mantenimiento del tono colectivo de la escena
  english_pob_reading: each man to his companion
  chosen_spanish_reading: cada uno a su compañero
  alternative_spanish_readings:
  - uno al otro
  - cada uno a su prójimo
  rationale: La escena subraya la resolución compartida de los marineros. La formulación elegida conserva esa reciprocidad sin introducir un registro devocional ajeno al contexto narrativo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada y no introduce revisiones sustantivas respecto del tramo final aprobado; conserva la ambigüedad léxica de רָעָה y la progresión narrativa de los verbos wayyiqtol.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto más amplio, aunque este versículo no lo contiene.
  - Se usa «Jonás» como forma española estable del nombre propio.
  - Se evita «SEÑOR» como sustituto del nombre divino por política terminológica del proyecto, aunque aquí no aplica directamente.
