translation:
  language: es
  text: Miró a uno y otro lado, y al ver que no había nadie[a], abatió al egipcio y lo escondió en la arena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no había hombre». El hebreo dice literalmente «que no había hombre», pero aquí puede usarse en sentido genérico para indicar que no había nadie allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן כֹּה וָכֹה
  english_pob_choice: He looked this way and that
  chosen_spanish: Miró a uno y otro lado
  alternatives_spanish:
  - Miró de aquí para allá
  - Miró a un lado y al otro
  lexicon: HALOT
  rationale: El hebreo describe el giro de la atención visual en ambas direcciones. En español, ‘miró a uno y otro lado’ comunica con naturalidad la acción de escudriñar alrededor sin forzar un calco.
- source_word: אֵין אִישׁ
  english_pob_choice: there was no one there
  chosen_spanish: no había nadie
  alternatives_spanish:
  - no había hombre
  - no había persona
  lexicon: HALOT
  rationale: Aunque אִישׁ es literalmente ‘hombre’, aquí funciona de manera genérica para indicar ausencia de testigos. ‘No había nadie’ preserva ese sentido contextual y evita una lectura innecesariamente masculina en español.
- source_word: וַיַּךְ
  english_pob_choice: he struck down
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - mató
  lexicon: HALOT
  rationale: El verbo hebreo básico es ‘golpear/golpear con violencia’. En este contexto el resultado es mortal, pero el hebreo no usa aquí un verbo explícito de matar. ‘Golpeó’ conserva la fuerza verbal sin añadir más de lo que el texto dice; el desenlace queda implícito por la acción posterior.
- source_word: הַמִּצְרִי
  english_pob_choice: the Egyptian
  chosen_spanish: al egipcio
  alternatives_spanish:
  - al egipcio aquel
  - al egipcio
  lexicon: HALOT
  rationale: Se mantiene la designación étnico-nacional simple del hebreo con el artículo incorporado naturalmente en español.
- source_word: וַיִּטְמְנֵהוּ
  english_pob_choice: hid him
  chosen_spanish: lo escondió
  alternatives_spanish:
  - lo ocultó
  - lo cubrió
  lexicon: HALOT
  rationale: טמן significa ‘ocultar/esconder’. ‘Lo escondió’ conserva el sentido básico. En español suena más transparente que ‘lo enterró’, que podría sugerir una acción más específica que el hebreo no exige por sí mismo.
- source_word: בַּחוֹל
  english_pob_choice: in the sand
  chosen_spanish: en la arena
  alternatives_spanish:
  - en la arena fina
  - en la tierra arenosa
  lexicon: HALOT
  rationale: חוֹל es ‘arena’ o ‘arena/sand’. ‘Arena’ es el equivalente natural en español y mantiene la imagen concreta del lugar donde lo ocultó.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: se conserva el giro idiomático de ‘looked this way and that’, se opta por un equivalente natural para אֵין אִישׁ (‘no había nadie’) y se mantiene la secuencia narrativa sin explicitar como ‘matar’ lo que el hebreo expresa con el verbo básico ‘golpear’.'
  spanish_consistency_notes:
  - Se prefirió ‘arena’ a ‘sand’ por naturalidad en español, sin alterar la imagen del entierro/ocultamiento.
  - Se evitó ‘hombre’ en el texto principal para no endurecer innecesariamente la lectura de אִישׁ cuando el contexto es genérico.
  - ‘Golpeó’ conserva la fuerza verbal del hebreo y deja que el contexto narrativo indique el resultado mortal.
