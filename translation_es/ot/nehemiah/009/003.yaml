translation:
  language: es
  text: Y se levantaron en su lugar[a], y leyeron del Libro de la Ley de Yahvé su Dios por un cuarto del día[b]; y por otro cuarto estaban confesando y postrándose a Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su puesto», «en su estación» o posiblemente «sobre su plataforma». La expresión hebrea es compacta y no especifica con total claridad la configuración del lugar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «un cuarto del día»; es decir, una cuarta parte del día se dedicó a la lectura, y otra cuarta parte a la confesión y la postración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּק֨וּמוּ
  english_pob_choice: they stood in their place
  chosen_spanish: se pusieron
  alternatives_spanish:
  - se levantaron
  - se alzaron
  lexicon: HALOT
  rationale: El verbo hebreo marca la acción de colocarse/levantarse para asumir su posición en la escena. En español, "se pusieron en su lugar" conserva la idea de tomar su puesto sin cargar el texto de una inferencia arquitectónica.
- source_word: עַל עָמְדָם
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en su estación
  - sobre su plataforma
  lexicon: HALOT
  rationale: La expresión es comprimida y puede referirse al lugar donde estaban parados. "En su lugar" reproduce bien la ambigüedad contextual sin especificar más de lo que el hebreo exige.
- source_word: וַיִּקְרְאוּ
  english_pob_choice: they read
  chosen_spanish: leyeron
  alternatives_spanish:
  - leían
  - proclamaron
  - llamaron
  lexicon: HALOT
  rationale: Con בְּסֵפֶר, el sentido es leer un texto escrito. El pretérito simple es natural en español narrativo y refleja la sucesión de acciones.
- source_word: בְּסֵפֶר תּוֹרַת
  english_pob_choice: from the Book of the Law
  chosen_spanish: del Libro de la Ley
  alternatives_spanish:
  - del libro de la ley
  - del rollo de la ley
  lexicon: HALOT
  rationale: '"Libro de la Ley" es una equivalencia clara y fiel para בְּסֵפֶר תּוֹרַת. "Rollo" es posible históricamente, pero no está exigido por el hebreo ni por la POB inglesa.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme a la norma del proyecto para יְהוָה, evitando la sustitución por un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de ellos
  - su divinidad
  lexicon: HALOT
  rationale: La forma posesiva es directa y natural en español. Se mantiene la relación de pertenencia/covenio implícita en el hebreo.
- source_word: רְבִעִ֣ית הַיּוֹם
  english_pob_choice: for a fourth of the day
  chosen_spanish: por un cuarto del día
  alternatives_spanish:
  - por la cuarta parte del día
  - durante una cuarta parte del día
  lexicon: HALOT
  rationale: El hebreo indica una cuarta parte del día. "Por un cuarto del día" es idiomático en español y conserva el valor cuantitativo.
- source_word: וּרְבִעִית
  english_pob_choice: for another fourth
  chosen_spanish: por otro cuarto
  alternatives_spanish:
  - y por un cuarto más
  - y por otra cuarta parte
  lexicon: HALOT
  rationale: La elipsis del hebreo se resuelve naturalmente como repetición paralela del primer tramo temporal. "Otro cuarto" mantiene el paralelismo sin sobreexplicar.
- source_word: מִתְוַדִּים
  english_pob_choice: they were confessing
  chosen_spanish: estaban confesando
  alternatives_spanish:
  - confesaban
  - se confesaban
  lexicon: HALOT
  rationale: El participio hitpael sugiere acción continua o sostenida. "Estaban confesando" refleja mejor ese aspecto que un pasado puntual.
- source_word: וּמִשְׁתַּחֲוִים
  english_pob_choice: bowing down
  chosen_spanish: postrándose
  alternatives_spanish:
  - inclinándose
  - adorando
  - arrodillándose
  lexicon: HALOT
  rationale: El verbo incluye la acción corporal de postrarse/bajarse en adoración. "Postrándose" preserva la concreción física, mientras el contexto devocional lo completa.
- source_word: לַיהוָה אֱלֹהֵיהֶם
  english_pob_choice: to Yahweh their God
  chosen_spanish: ante Yahvé su Dios
  alternatives_spanish:
  - a Yahvé su Dios
  - para Yahvé su Dios
  lexicon: HALOT
  rationale: La preposición ל con este verbo puede expresar dirección del acto reverente. "Ante Yahvé" hace explícita la orientación del gesto de postración sin perder el sentido cultual.
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se mantiene el nombre propio divino en transliteración, conforme a la decisión editorial del proyecto. Esto evita sustituir el nombre revelado por una designación titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de וּמִשְׁתַּחֲוִים en contexto cultual
  english_pob_reading: bowing down
  chosen_spanish_reading: postrándose
  alternative_spanish_readings:
  - adorando
  - inclinándose
  rationale: El hebreo conserva el gesto físico de reverencia; traducirlo como "postrándose" evita desmaterializar la acción en un mero concepto de adoración. El contexto ya establece que se trata de un acto de culto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve concrete bodily imagery where warranted'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo con apoyo del audit trail inglés. Se adoptó la revisión que prefiere "stood in their place" frente a una formulación más expansiva, por lo que en español se evitó añadir una idea de levantarse que el contexto no requiere. También se mantuvo la equivalencia temporal de "a fourth/another fourth" y la distinción entre confesar y postrarse.
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה.
  - '"Libro de la Ley" conserva la formulación del POB inglés y es coherente con el registro bíblico en español.'
  - Se mantiene el paralelismo temporal del versículo en dos mitades de un cuarto de día.
  - '"Postrándose" preserva el gesto físico sin perder el matiz de adoración implícito.'
