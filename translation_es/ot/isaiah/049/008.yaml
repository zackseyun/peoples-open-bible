translation:
  language: es
  text: 'Así dice Yahvé: “En un tiempo de favor te respondí[a], y en un día de salvación[b] te ayudé; te guardaré[c] y te daré como pacto para el pueblo[d], para levantar la tierra[e], para repartir las herencias desoladas”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en un tiempo aceptable”.
    reason: lexical_alternative
  - marker: b
    text: O “en un día de liberación”.
    reason: lexical_alternative
  - marker: c
    text: O “te protegeré”.
    reason: lexical_alternative
  - marker: d
    text: O “te daré como pacto al pueblo”.
    reason: lexical_alternative
  - marker: e
    text: O “para establecer la tierra” o “para restaurar la tierra”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el uso de nombre divino transparente del proyecto; 'Yahvé' conserva el valor del tetragrámaton sin ocultarlo, y es más apropiado que una convención de máscara como 'SEÑOR'.
- source_word: בְּעֵת רָצוֹן
  english_pob_choice: In a time of favor
  chosen_spanish: En tiempo de favor
  alternatives_spanish:
  - En un tiempo de favor
  - En tiempo aceptable
  lexicon: HALOT
  rationale: רָצוֹן expresa favor, aceptación o benevolencia. 'En tiempo de favor' es natural en español y reproduce la idea de una temporada divinamente favorable sin añadir paráfrasis.
- source_word: עֲנִיתִיךָ
  english_pob_choice: I answered you
  chosen_spanish: te respondí
  alternatives_spanish:
  - te contesté
  - te respondí favorablemente
  lexicon: HALOT
  rationale: ענה en este contexto significa responder. 'Te respondí' es directo y fiel; se evita incorporar 'favorablemente' al verbo porque ya quedó expresado por 'tiempo de favor'.
- source_word: בְיוֹם יְשׁוּעָה
  english_pob_choice: in a day of salvation
  chosen_spanish: en día de salvación
  alternatives_spanish:
  - en el día de salvación
  - en día de liberación
  lexicon: HALOT
  rationale: יְשׁוּעָה puede ser salvación o liberación. Se conserva 'salvación' por su alcance redentor más amplio; la ausencia de artículo se refleja con 'en día'.
- source_word: עֲזַרְתִּיךָ
  english_pob_choice: I helped you
  chosen_spanish: te ayudé
  alternatives_spanish:
  - te asistí
  - acudí en tu ayuda
  lexicon: HALOT
  rationale: עזר es ayudar, socorrer. 'Te ayudé' es claro y sobrio, y mantiene el paralelismo con 'te respondí'.
- source_word: וְאֶצָּרְךָ
  english_pob_choice: I will keep you
  chosen_spanish: te guardaré
  alternatives_spanish:
  - te preservaré
  - te protegeré
  lexicon: HALOT
  rationale: נצר implica guardar, vigilar, preservar. 'Te guardaré' retiene la nota de protección y vigilancia, y suena natural en español bíblico contemporáneo.
- source_word: וְאֶתֶּנְךָ לִבְרִית עָם
  english_pob_choice: give you as a covenant for the people
  chosen_spanish: te daré como pacto para el pueblo
  alternatives_spanish:
  - te daré como pacto al pueblo
  - te pondré como pacto para el pueblo
  lexicon: HALOT
  rationale: La construcción hebrea presenta al siervo como 'pacto', no solo como mediador. 'Como pacto para el pueblo' conserva esa densidad sin desplazarla a una formulación explicativa.
- source_word: לְהָקִים אֶרֶץ
  english_pob_choice: to raise up the land
  chosen_spanish: para levantar la tierra
  alternatives_spanish:
  - para establecer la tierra
  - para restaurar la tierra
  lexicon: HALOT
  rationale: קום en hifil puede significar levantar, establecer o restaurar. 'Levantar la tierra' conserva la imagen verbal concreta y deja abierta la fuerza restaurativa.
- source_word: לְהַנְחִיל נְחָלוֹת שֹׁמֵמוֹת
  english_pob_choice: to apportion the desolate inheritances
  chosen_spanish: para repartir las herencias desoladas
  alternatives_spanish:
  - para asignar las heredades desoladas
  - para hacer heredar las posesiones desoladas
  lexicon: HALOT
  rationale: נחל en hifil es dar como herencia, repartir, asignar. 'Repartir' funciona bien en español y mantiene el sentido distributivo; 'herencias' comunica de manera transparente נְחָלוֹת, y 'desoladas' refleja שֹׁמֵמוֹת.
theological_decisions:
- issue: Identidad y función del siervo como 'pacto para el pueblo'
  english_pob_reading: Retain the direct, text-level formulation that the addressed servant is given 'as a covenant for the people' without reducing it to merely 'mediator of a covenant.'
  chosen_spanish_reading: Mantener la formulación directa 'te daré como pacto para el pueblo' sin convertirla en 'mediador del pacto'.
  alternative_spanish_readings:
  - te daré como mediador del pacto para el pueblo
  - te daré para establecer un pacto con el pueblo
  rationale: La sintaxis hebrea לִבְרִית עָם presenta al personaje mismo en una función covenantal fuerte. La traducción preserva esa densidad y evita resolverla con una explicación doctrinal más estrecha.
  doctrine_reference: Preservar la tensión teológica del texto, no neutralizarla.
- issue: Alcance de יְשׁוּעָה
  english_pob_reading: Render as 'salvation' in the main text.
  chosen_spanish_reading: Traducirlo como 'salvación' en el texto principal.
  alternative_spanish_readings:
  - liberación
  rationale: '''Salvación'' conserva tanto el sentido inmediato de rescate como su resonancia redentora más amplia en el contexto del Siervo.'
  doctrine_reference: Mantener el alcance soteriológico amplio del término.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo consonante y la lectura auditada del POB inglés sin cambios relevantes en la última revisión; conserva las alternativas léxicas principales del expediente y mantiene la tensión teológica sobre 'pacto para el pueblo' y sobre יְשׁוּעָה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se evita 'Cristo' porque el versículo no contiene Χριστός ni título mesiánico griego; el texto habla de Yahvé y del siervo.
  - '''Pacto'' se conserva como opción de estilo bíblico para בְּרִית, manteniendo la formulación covenantal fuerte del original.'
  - '''Levantar la tierra'' mantiene el paralelismo con ''repartir las herencias desoladas'' y no fuerza una sola lectura explicativa.'
  - Las notas al pie preservan alternativas relevantes sin duplicar marcadores.
