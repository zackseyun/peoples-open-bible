translation:
  language: es
  text: 'Bendito sea Yahvé, el Dios de Israel, desde la eternidad hasta la eternidad[a]. Y que todo el pueblo diga: «¡Amén! ¡Alaben a Yah[b]!».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de eternidad en eternidad» / «de edad en edad».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Alaben a Yah». Tradicionalmente se translitera como «Aleluya».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Sea bendecido
  - Bendito
  lexicon: HALOT
  rationale: La forma participial de bendición funciona aquí como fórmula doxológica. «Bendito sea» conserva el valor litúrgico y la estructura exhortativa sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la decisión del proyecto de representar el Tetragrámaton con el nombre propio «Yahvé», manteniendo el nombre personal del Dios del pacto en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: La cadena constructa designa de manera directa al Dios que pertenece a Israel como su Dios del pacto. «El Dios de Israel» es natural y fiel al hebreo.
- source_word: מִן הָעוֹלָם וְעַד הָעוֹלָם
  english_pob_choice: from everlasting to everlasting
  chosen_spanish: desde la eternidad y hasta la eternidad
  alternatives_spanish:
  - desde la eternidad hasta la eternidad
  - por los siglos de los siglos
  - de eternidad en eternidad
  lexicon: HALOT
  rationale: עוֹלָם aquí expresa tiempo sin límite en una fórmula de alabanza. «Desde la eternidad y hasta la eternidad» conserva el alcance temporal y suena idiomático en español.
- source_word: וְאָמַר כָּל הָעָם
  english_pob_choice: And let all the people say
  chosen_spanish: Y que todo el pueblo diga
  alternatives_spanish:
  - Y diga todo el pueblo
  - Y que todo el pueblo responda
  lexicon: HALOT
  rationale: Aunque la forma verbal es narrativa en morfología, el contexto litúrgico la hace exhortativa/responsiva. «Y que todo el pueblo diga» preserva ese valor en español.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: En este contexto ritual, la transliteración «Amén» es la respuesta congregacional más fiel y reconocible.
- source_word: הַֽלְלוּ יָהּ
  english_pob_choice: Praise Yah
  chosen_spanish: ¡Aleluya!
  alternatives_spanish:
  - ¡Alabad a Yah!
  - ¡Alaben a Yah!
  lexicon: HALOT
  rationale: El hebreo es literalmente un imperativo plural seguido del nombre breve divino. En español, «Aleluya» conserva la forma litúrgica establecida; se anota la equivalencia con «Alaben a Yah» en nota para no perder el valor léxico del original.
theological_decisions:
- issue: Cómo distinguir el Tetragrámaton יְהוָה del nombre breve יָהּ en la misma doxología
  english_pob_reading: Render YHWH as 'Yahweh' and יָהּ as 'Yah' / 'Praise Yah'.
  chosen_spanish_reading: Yahvé para יְהוָה y Aleluya para הַלְלוּ יָהּ, con nota que explicita el valor de «Alaben a Yah».
  alternative_spanish_readings:
  - Yahvé / Yah
  - el SEÑOR / ¡Aleluya!
  - Yahvé / ¡Alabad a Yah!
  rationale: La forma corta del nombre divino aparece dentro de la exclamación final. Mantener «Aleluya» en el texto principal respeta la forma litúrgica tradicional y, a la vez, la nota conserva la tensión lexical entre transliteración y traducción del imperativo más el nombre breve.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente fuente; la lectura revisada más reciente indica que no hubo cambios necesarios y el consenso fue de alta concordancia con observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «Amén» como respuesta litúrgica sin explicitarla en el texto principal.
  - «Aleluya» se conserva por su uso eclesial amplio, pero la nota explica su sentido literal para no perder el dato hebreo.
  - La fórmula temporal se traduce con paralelismo español natural sin reducirla a un simple «por siempre».
