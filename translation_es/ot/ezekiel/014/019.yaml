    text: O ‘por derramamiento de sangre’. El hebreo dice literalmente ‘en sangre’.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó una construcción calcada a un español natural y claro: ‘eliminar de ella’ comunica bien la idea de quitar de la tierra a seres humanos y animales, sin introducir una paráfrasis amplia. También se suavizó ‘aquella tierra’ a ‘esa tierra’ por naturalidad. Se conservó ‘con sangre’ y su nota por fidelidad al expediente léxico auditado.'
