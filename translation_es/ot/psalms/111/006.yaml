translation:
  language: es
  text: Él ha declarado a su pueblo el poder de sus obras[a], al darles la herencia de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él ha declarado a su pueblo el poder de sus obras, para darles la herencia de las naciones». El infinitivo hebreo puede leerse como expresión de propósito o de medio/resultado.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּחַ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - m4d
  - potencia
  lexicon: HALOT
  rationale: כֹּחַ puede significar fuerza, poder o might. En español, «poder» conserva el sentido de capacidad eficaz y suena natural con «de sus obras».
- source_word: מַעֲשָׂיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus obras hechas
  - lo que ha hecho
  lexicon: HALOT
  rationale: מַעֲשֶׂה abarca obra, hecho o acto. «Obras» mantiene el registro formal del salmo y el vínculo con los actos divinos.
- source_word: הִגִּיד
  english_pob_choice: has declared
  chosen_spanish: ha declarado
  alternatives_spanish:
  - ha dado a conocer
  - ha anunciado
  - ha dicho
  lexicon: HALOT
  rationale: El hifil de נגד transmite la idea de hacer saber o proclamar. «Ha declarado» preserva el tono proclamatorio y público.
- source_word: לְעַמּוֹ
  english_pob_choice: to his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - para su pueblo
  lexicon: HALOT
  rationale: La preposición ל marca aquí el destinatario de la declaración. «A su pueblo» es la construcción más natural en español.
- source_word: לָתֵת
  english_pob_choice: in giving
  chosen_spanish: al dar
  alternatives_spanish:
  - dando
  - para dar
  - con el dar
  lexicon: HALOT
  rationale: El infinitivo con ל puede expresar medio, resultado o propósito. «Al dar» conserva la relación verbal sin forzar una sola lectura.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre retoma a «su pueblo». En español, el dativo clítico «les» fluye mejor dentro de la construcción infinitiva.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la posesión
  - la heredad
  lexicon: HALOT
  rationale: נַחֲלָה puede ser herencia, posesión o porción asignada. «Herencia» comunica bien el valor patrimonial y pactal en español moderno.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los pueblos
  - de los gentiles
  lexicon: HALOT
  rationale: גּוֹיִם alude a naciones extranjeras. «Naciones» es la opción más directa y evita el matiz excesivamente neotestamentario de «gentiles».
theological_decisions:
- issue: Relación del infinitivo final לָתֵת לָהֶם נַחֲלַת גּוֹיִם con la cláusula principal
  english_pob_reading: 'instrumental/result nuance: God declared the power of his works in giving them the inheritance of the nations'
  chosen_spanish_reading: 'matiz instrumental/resultativo: Dios declaró el poder de sus obras al darles la herencia de las naciones'
  alternative_spanish_readings:
  - 'matiz de propósito: Dios declaró el poder de sus obras para darles la herencia de las naciones'
  - 'matiz de medio: Dios declaró el poder de sus obras mediante el darles la herencia de las naciones'
  rationale: El infinitivo constructo con ל puede expresar propósito, medio o resultado. «Al darles» deja abierta la tensión textual y suena natural en español, sin decidir de forma excesiva entre las lecturas posibles.
  doctrine_reference: Preservar la ambigüedad gramatical donde el hebreo la permite.
translation_notes:
  revision_awareness: Se siguió el último ajuste del auditorio inglés, que prefirió una relación directa y natural para el infinitivo final. En español se optó por «al darles» para conservar la misma tensión entre propósito y medio/resultado sin sonar calcado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; aquí no aparece el nombre divino explícito.
  - Se mantuvo «naciones» para גּוֹיִם, coherente con el contexto histórico y con el audit trail en inglés.
  - «Pueblo» y «herencia» conservan un registro bíblico claro sin recurrir a un calco arcaizante.
