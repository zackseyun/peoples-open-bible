- from: Y si muere alguna de las reses[a] que les sirven de alimento, el que toque su cadáver quedará impuro hasta la tarde.
  to: Y si muere alguno de los animales que les son permitidos para alimento[a], el que toque su carcasa quedará impuro hasta la tarde.
  rationale: Se ajusta «reses» a «animales» para no estrechar בהמה, se cambia «cadáver» por «carcasa» para reflejar mejor נבלה en contexto de pureza ritual animal, y se suaviza la frase de clasificación alimentaria a «les son permitidos para alimento», que conserva mejor el valor categorial/permisivo del hebreo. La nota también se armoniza con «alimento».
