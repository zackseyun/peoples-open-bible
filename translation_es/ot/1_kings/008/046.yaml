revisions:
- from: Cuando pequen contra ti —porque no hay hombre[a] que no peque—, y te enojes contra ellos, y los entregues delante de un enemigo, y sus cautivadores[b] los lleven cautivos a la tierra del enemigo, lejana o cercana,
  to: Cuando pequen contra ti—porque no hay hombre[a] que no peque—, y te enojes contra ellos, y los entregues a un enemigo, y sus captores[b] los lleven cautivos a la tierra del enemigo, lejana o cercana,
  rationale: Se ajustó «delante de un enemigo» a «a un enemigo» para reflejar el sentido contextual de entrega al poder enemigo en español natural. Se cambió «cautivadores» por «captores» por claridad y mejor uso idiomático, preservando el matiz más literal en nota. También se simplificó ligeramente la puntuación sin alterar la sintaxis fuente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:49:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general bien la estructura hebrea y el audit trail inglés: conserva el escenario condicional inicial, la universalidad del pecado, la ira divina, la entrega al poder enemigo y la deportación a la tierra del enemigo, lejana o cercana. Sin embargo, dos elecciones no preservan de la mejor manera el sentido idiomático del hebreo en español: «delante de un enemigo» suena demasiado literal para לִפְנֵי en este contexto hostil, donde el sentido es entregarlos al poder de un enemigo; y «cautivadores» es poco natural frente al sentido claro de שֹׁבֵיהֶם como «captores» o «los que los llevaron cautivos».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta dos giros poco naturales para español bíblico moderno: «los entregues delante de un enemigo» y «sus cautivadores». Además, la puntuación mejora si se integra la cláusula parentética con rayas sin coma adicional innecesaria. El resto del versículo es legible y fiel.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Hombre» con nota alternativa es defendible por el rastro auditado, aunque «ser humano» también sería natural. No aparecen términos sensibles como Yahvé/Mesías. La revisión propuesta mantiene fidelidad léxica y mejora la idiomaticidad española.
  issues:
  - severity: medium
    issue: «delante de un enemigo» para וּנְתַתָּם לִפְנֵי אוֹיֵב
    rationale: Aunque לפני puede traducirse formalmente «delante de», en este contexto de juicio y derrota el sentido idiomático es entregarlos al poder de un enemigo. «Entregues a un enemigo» preserva mejor el significado en español natural.
  - severity: medium
    issue: «cautivadores» para שֹׁבֵיהֶם
    rationale: La palabra es comprensible pero poco idiomática y suena forzada. «Captores» expresa de manera clara y natural a quienes los llevan cautivos, y además ya aparece como alternativa en la nota del borrador.
  - severity: low
    issue: Puntuación algo cargada alrededor de la frase parentética
    rationale: La secuencia con raya, coma y varias conjunciones puede aligerarse levemente sin alterar la estructura. Esto mejora la fluidez en español.
  revised_spanish_text: Cuando pequen contra ti—porque no hay hombre[a] que no peque—, y te enojes contra ellos, y los entregues a un enemigo, y sus captores[b] los lleven cautivos a la tierra del enemigo, lejana o cercana,
  revised_footnotes:
  - marker: a
    text: O, «no hay ser humano que no peque».
    reason: lexical_alternative
  - marker: b
    text: Lit. «sus cautivadores».
    reason: lexical_alternative
  revision_rationale: Se ajustó «delante de un enemigo» a «a un enemigo» para reflejar el sentido contextual de entrega al poder enemigo en español natural. Se cambió «cautivadores» por «captores» por claridad y mejor uso idiomático, preservando el matiz más literal en nota. También se simplificó ligeramente la puntuación sin alterar la sintaxis fuente.
