translation:
  language: es
  text: ¡Cómo se ha convertido en prostituta la ciudad fiel! Estaba llena de justicia[a]; la rectitud[b] se alojaba en ella[c], pero ahora, asesinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ramera». El término hebreo se refiere a una prostituta; la imagen es metafórica para la infidelidad y la corrupción de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: O «justicia». El hebreo צֶדֶק puede solaparse semánticamente con «justicia», especialmente en paralelo con מִשְׁפָּט al inicio del verso.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «se alojaba en ella»; el verbo evoca pasar la noche o residir allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  english_pob_choice: How
  chosen_spanish: ¡Cómo...!
  alternatives_spanish:
  - ¡Ay, cómo...!
  - ¿Cómo...?
  lexicon: HALOT
  rationale: El hebreo abre con una exclamación de lamento, no con una pregunta informativa. «¡Cómo...!» conserva ese tono profético de sorpresa dolorosa en español natural.
- source_word: הָיְתָה
  english_pob_choice: has become
  chosen_spanish: se ha convertido
  alternatives_spanish:
  - ha llegado a ser
  - se volvió
  lexicon: HALOT
  rationale: El perfecto expresa un cambio consumado de estado. «Se ha convertido» comunica bien el resultado y mantiene el contraste con el estado anterior.
- source_word: לְזוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - ramera prostituta
  lexicon: HALOT
  rationale: El término hebreo designa literalmente a una prostituta; «prostituta» es el equivalente moderno claro y digno. Se conserva la fuerza metafórica de la imagen sin suavizarla.
- source_word: קִרְיָה נֶאֱמָנָה
  english_pob_choice: the faithful city
  chosen_spanish: la ciudad fiel
  alternatives_spanish:
  - la ciudad leal
  - la ciudad confiable
  lexicon: HALOT
  rationale: La expresión describe a Jerusalén como antes fiel o leal al pacto. «Ciudad fiel» reproduce de forma natural la caracterización moral del original.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - derecho
  - rectitud
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט señala el orden justo/judicial de la vida pública. «Justicia» es el equivalente más directo y coincide con la elección auditada en inglés.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la justicia
  - lo recto
  lexicon: HALOT
  rationale: El par con מִשְׁפָּט pide distinguir el segundo término para no colapsar ambos. «Rectitud» conserva la dimensión ética y personal de צֶדֶק mejor que repetir «justicia».
- source_word: יָלִין בָּהּ
  english_pob_choice: lodged in her
  chosen_spanish: se alojaba en ella
  alternatives_spanish:
  - habitaba en ella
  - pasaba la noche en ella
  lexicon: HALOT
  rationale: El verbo tiene la idea concreta de pernoctar o alojarse. «Se alojaba en ella» preserva esa imagen de residencia temporal/habitual y sugiere continuidad.
- source_word: וְעַתָּה
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - y ahora
  - ahora
  lexicon: HALOT
  rationale: La partícula introduce un fuerte contraste con el estado anterior. «Pero ahora» hace explícito el giro adversativo en español.
- source_word: מְרַצְּחִים
  english_pob_choice: murderers
  chosen_spanish: asesinos
  alternatives_spanish:
  - homicidas
  - matones
  lexicon: HALOT
  rationale: 'El participio funciona de manera elíptica al final del verso: donde antes residía la rectitud, ahora hay asesinos. «Asesinos» transmite la dureza profética sin añadir elementos ajenos.'
theological_decisions:
- issue: Metáfora sexual para la infidelidad de la ciudad
  english_pob_reading: Retain the metaphor explicitly as 'has become a prostitute'
  chosen_spanish_reading: Conservar la metáfora explícita como «se ha convertido en prostituta»
  alternative_spanish_readings:
  - se ha vuelto infiel
  - se ha corrompido
  rationale: El hebreo usa una imagen sexualizada fuerte para denunciar corrupción moral y de pacto. Suavizarla a una abstracción perdería parte del golpe profético del texto.
  doctrine_reference: 'Principio POB: primacía del idioma original y preservación de la imagen textual cuando el original la presenta claramente.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente inglés: no se reportan cambios necesarios y el pasaje mantiene el mismo sentido, tono profético y estructura de contraste. La versión española sigue esa línea sin introducir atenuaciones ni expansiones.'
  spanish_consistency_notes:
  - Se mantuvo «ciudad fiel» para קִרְיָה נֶאֱמָנָה, en coherencia con el valor covenantal de נֶאֱמָן.
  - Se distinguieron «justicia» y «rectitud» para reflejar el paralelismo מִשְׁפָּט / צֶדֶק.
  - Se conservó la imagen fuerte de la prostitución y la de la rectitud como residente/alojada, siguiendo la auditable elección inglesa de no suavizar el texto.
  - Se usó «asesinos» como cierre elíptico para reproducir la brusquedad profética del participio final.
