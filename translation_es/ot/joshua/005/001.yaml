base_translation:
  language: en
  yaml_path: translation/ot/joshua/005/001.yaml
  text: And it happened[a], when all the kings of the Amorites who were beyond the Jordan to the west, and all the kings of the Canaanites who were by the sea, heard that Yahweh had dried up the waters of the Jordan before the sons of Israel until they had crossed over, their hearts melted[c][b], and there was no longer spirit in them because of the sons of Israel.
  footnotes:
  - marker: a
    text: Or, 'all the kings of the Canaanites who were on the coast'; 'by the sea' refers to the coastal region.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts and ancient versions read 'until they had crossed over' instead of 'until we had crossed over.'
    reason: textual_variant
  - marker: c
    text: Hebrew 'there was no longer spirit in them,' an idiom for lost courage or resolve.
    reason: lexical_alternative
