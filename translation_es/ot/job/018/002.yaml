translation:
  language: es
  text: ¿Hasta cuándo pondrán trampas para las palabras[a]? Entiendan, y después hablaremos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo pondrán límites a las palabras?». El hebreo es difícil; algunos entienden la frase como una queja contra un hablar interminable, no solo como poner trampas verbales.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y después hablemos». El verbo final también puede entenderse como una invitación, no solo como futuro simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָנָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será que
  - ¿Por cuánto tiempo
  lexicon: HALOT
  rationale: La expresión hebrea es una interrogativa temporal idiomática; «¿Hasta cuándo?» es la forma natural en español y conserva la queja retórica.
- source_word: תְּשִׂימוּן
  english_pob_choice: will you set
  chosen_spanish: pondrán
  alternatives_spanish:
  - colocarán
  - seguirán poniendo
  lexicon: HALOT
  rationale: שׂים tiene el sentido básico de poner/colocar. En contexto interrogativo y reprochatorio, «pondrán» mantiene la acción verbal sin añadir un matiz iterativo no explícito.
- source_word: קִנְצֵי
  english_pob_choice: snares
  chosen_spanish: trampas
  alternatives_spanish:
  - lazos
  - redes
  - snares
  lexicon: HALOT
  rationale: El sustantivo es difícil; el POB inglés opta por la imagen hostil de «snares». «Trampas» comunica bien el valor figurado y es natural en español. Mantiene la tensión lexical sin decidir en exceso la etimología literal.
- source_word: לְמִלִּין
  english_pob_choice: for words
  chosen_spanish: para las palabras
  alternatives_spanish:
  - a las palabras
  - con palabras
  - en palabras
  lexicon: HALOT
  rationale: La preposición ל con «palabras» admite una relación difícil. «Para» refleja con sobriedad la construcción y permite la lectura de acecho/réplica contra las palabras.
- source_word: תָּבִינוּ
  english_pob_choice: Understand
  chosen_spanish: Entiendan
  alternatives_spanish:
  - Comprendan
  - Disciernan
  - Consideren
  lexicon: HALOT
  rationale: בין aquí tiene fuerza exhortativa/cognitiva. «Entiendan» conserva el imperativo o llamado directo sin añadir paráfrasis.
- source_word: וְאַחַר
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - después de eso
  lexicon: HALOT
  rationale: Marca secuencia temporal simple; «y después» es claro y fiel.
- source_word: נְדַבֵּר
  english_pob_choice: we will speak
  chosen_spanish: hablaremos
  alternatives_spanish:
  - hablemos
  - seguiremos hablando
  - vamos a hablar
  lexicon: HALOT
  rationale: La forma יכולה leerse como futuro o como invitación. «Hablaremos» preserva la forma verbal explícita y deja abierta la posibilidad exhortativa sin forzarla en la traducción principal.
translation_notes:
  revision_awareness: Se corrigió la colocación de las notas al pie para que cada marcador aparezca exactamente en el texto español. La redacción sigue el audit trail inglés, pero ajusta el orden y la naturalidad del español sin perder la ambigüedad del hebreo en קִנְצֵי y נְדַבֵּר.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico contemporáneo y solemne, sin calco excesivo.
  - «Trampas» se eligió por su naturalidad en español y por conservar la imagen agresiva del contexto.
  - No se introdujo terminología eclesiástica tradicional innecesaria.
  - El mandato cognitivo «Entiendan» conserva la fuerza del hebreo בין sin convertirlo en una paráfrasis amplia.
