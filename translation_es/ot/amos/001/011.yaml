review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la fórmula de juicio de Amós, conserva «Yahvé», mantiene la personificación singular de Edom y refleja adecuadamente «no revocaré su castigo». Sin embargo, en el hemistiquio final introduce un objeto «lo» en «su ira lo desgarró continuamente» que no está en el hebreo ni en el POB inglés principal; eso altera la sintaxis e introduce una ambigüedad de referente. Además, falta en español la nota de parentesco asociada a «su hermano», presente en el rastro inglés como dato interpretativo importante aunque no deba meterse en el texto principal.
  spanish_quality_summary: 'El español es generalmente claro y digno. «Rebeliones» para פִּשְׁעֵי es defendible, pero «transgresiones» se alinea mejor con la terminología POB auditada y con la fórmula profética repetida en Amós. La frase final suena más natural y fiel sin el pronombre añadido: «su ira desgarraba continuamente» o, más cerca del inglés auditado, «su ira desgarró continuamente».'
  glossary_alignment: Buena alineación con el glosario del proyecto en «Yahvé», «Dios» no aplicable, y conservación del singular personificado. La principal desalineación es léxica en פִּשְׁעֵי, donde el inglés auditado fijó «transgressions»; en español conviene «transgresiones» como equivalente por defecto, dejando «rebeliones» como alternativa en nota si se desea. También conviene preservar la nota de parentesco sobre «su hermano».
  issues:
  - severity: medium
    issue: «rebeliones» en lugar de «transgresiones»
    rationale: Aunque «rebeliones» es posible, el expediente inglés fijó «transgressions» por su valor moral-covenantal sin sobreespecificar. «Transgresiones» preserva mejor esa decisión terminológica en español.
  - severity: high
    issue: Pronombre añadido en «su ira lo desgarró continuamente»
    rationale: El hebreo no expresa ese objeto y el inglés principal tampoco. El «lo» introduce un referente incierto y cambia la imagen; debe quitarse o relegarse a nota como alternativa, no al texto principal.
  - severity: medium
    issue: Falta la nota sobre «su hermano» como evocación del parentesco Edom-Israel
    rationale: El POB inglés conserva esa observación interpretativa como nota cruzada. Dado que el español mantiene «su hermano», la nota también debe preservarse para reflejar el rastro auditado.
  - severity: low
    issue: La nota b actual no reproduce bien la alternativa inglesa
    rationale: La nota inglesa ofrece como alternativa una construcción del tipo «él desgarró perpetuamente en su ira...». La nota española actual repite casi el texto principal y además conserva el problema del objeto añadido.
