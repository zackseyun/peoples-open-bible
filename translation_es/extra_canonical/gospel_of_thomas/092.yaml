base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/092.yaml
  text: Jesus said[a], “Seek, and you will find. But the things that you asked me about in those days, which I did not tell you on that day—now I am willing to tell them[e][d][c][b], and you are not seeking them.”
  footnotes:
  - marker: a
    text: The relative construction can be read as singular (“that which”) or plural (“the things that”). The surrounding plural pronominal references favor a plural sense.
    reason: textual_variant
  - marker: b
    text: Printed morphological segmentation shows “you asked them,” while the normalized line supports “you asked me.” The translation follows “me.”
    reason: textual_variant
  - marker: c
    text: ⲉϩⲛⲁ + infinitive expresses readiness or intention in Coptic; hence “I am willing to tell” could also be rendered “I am about to tell.”
    reason: lexical_alternative
  - marker: d
    text: “Seek … find” is a well-known pair (cf. Matt 7:7; Luke 11:9), but Thomas’s saying continues in a different direction, contrasting “then” and “now.”
    reason: cross_reference
  - marker: e
    text: Or 'But the things that you asked me in those days, I did not tell you then; now I am willing to tell them, and you are not seeking them.'.
    reason: previous_rendering
