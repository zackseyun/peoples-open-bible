translation:
  language: es
  text: Shigaión[a] de David, que cantó a Yahvé acerca de las palabras de Cus, benjaminita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente un término técnico musical o poético, como «lamento» o «canto salvaje»; el término hebreo «Shigaión» es raro e incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁגָּיוֹן
  english_pob_choice: Shiggaion
  chosen_spanish: Shigaión
  alternatives_spanish:
  - lamento
  - canto salvaje
  - meditación
  lexicon: HALOT
  rationale: Conservo la transliteración para mantener el carácter técnico y raro del término en el encabezado, ya que su sentido preciso es incierto. La adaptación gráfica a «Shigaión» respeta mejor la ortografía española que una forma inglesa sin alterar la decisión lexical.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - perteneciente a David
  - por David
  lexicon: HALOT
  rationale: En los superscripciones de salmos, la preposición puede señalar autoría, dedicación o asociación. «De David» reproduce de manera compacta esa relación sin decidir más de lo que el hebreo exige.
- source_word: אֲשֶׁר שָׁר
  english_pob_choice: which he sang
  chosen_spanish: que cantó
  alternatives_spanish:
  - que él cantó
  - que cantó en voz alta
  lexicon: HALOT
  rationale: La cláusula relativa y el verbo verbal se expresan naturalmente en español como «que cantó». Mantiene el pasado y evita una literalidad innecesariamente pesada.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  lexicon: HALOT
  rationale: 'Sigo el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal, en lugar de un sustituto como «SEÑOR». La preposición española «a» corresponde al hebreo ל en este contexto de destinatario.'
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  - por causa de
  lexicon: HALOT
  rationale: En un encabezado poético, עַל puede introducir tema u ocasión. «Acerca de» conserva esa apertura sin forzar una lectura causal más específica.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el asunto de
  - la causa de
  - las acusaciones de
  lexicon: HALOT
  rationale: El plural constructo de דָּבָר admite varios matices. «Las palabras de» sigue de cerca la forma del hebreo y no introduce una interpretación como «acusaciones», que no está exigida por el texto.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  lexicon: HALOT
  rationale: El nombre propio se translitera al español como «Cus» para mantener la pronunciación y la ortografía habituales en español bíblico, sin perder la identificación del personaje.
- source_word: בֶּן יְמִינִי
  english_pob_choice: a Benjaminite
  chosen_spanish: benjaminita
  alternatives_spanish:
  - de Benjamín
  - hijo de un benjaminita
  - de la tribu de Benjamín
  lexicon: HALOT
  rationale: La expresión idiomática indica pertenencia tribal. «Benjaminita» comunica el sentido con naturalidad en español y evita el giro más literal pero menos claro «hijo de un benjaminita».
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se conserva el nombre divino en español como «Yahvé», en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El expediente inglés no requirió revisiones posteriores: el consenso fue alto y no hubo cambios aplicados. La versión española conserva esa estabilidad, manteniendo la incertidumbre lexical del término Shigaión mediante transliteración y nota alternativa.'
  spanish_consistency_notes:
  - He mantenido «Yahvé» de forma coherente con la norma del proyecto para el Tetragrámaton.
  - He preferido «Cus» y «benjaminita» por naturalidad en español bíblico sin alterar la referencia hebrea.
  - El tono es sobrio y de encabezado poético, acorde con un superscrito de salmo.
