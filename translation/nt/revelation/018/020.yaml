theological_decisions:
- issue: How explicitly to interpret God's judicial action toward Babylon on behalf of the saints
  chosen_reading: Retain the compressed wording 'has judged your judgment from her' rather than expanding to 'has avenged you on her' in the main text.
  alternative_readings:
  - God has avenged you on her
  - God has condemned her for what she did to you
  - God has executed your case against her
  rationale: The Greek uses κρίνω/κρίμα language rather than an explicit verb for vengeance. While the sense likely includes vindication or avenging, expanding the wording in the main text would resolve the compression interpretively. Preserving the judicial wording better fits the project's aim to avoid importing more than the source states, while an explanatory alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy items 1 and 3: original-language primacy; preserve theological tension rather than resolve it.'
