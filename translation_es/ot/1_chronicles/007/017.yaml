  lexicon: HALOT
  rationale: La fórmula genealógica se mantiene de manera transparente en español con 'hijos de'; la conjunción inicial se conserva como enlace narrativo simple.
- source_word: אוּלָם
  english_pob_choice: Ulam
  chosen_spanish: Ulam
  lexicon: HALOT
  rationale: Nombre propio; se translitera para preservar la forma del texto fuente.
- source_word: בְּדָן
