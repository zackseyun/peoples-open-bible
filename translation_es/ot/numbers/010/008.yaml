translation:
  language: es
  text: Y los hijos de Aarón, los sacerdotes, tocarán las trompetas; y serán para ustedes una ordenanza permanente[a] a través de sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perpetua» o «para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי אַהֲרֹן
  english_pob_choice: And the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  lexicon: HALOT
  rationale: «בני» nombra literalmente a los hijos/sucesores de Aarón; en español «hijos» conserva la relación familiar sin añadir interpretación.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: HALOT
  rationale: El término hebreo identifica a los hijos de Aarón como el grupo sacerdotal. «Sacerdotes» es el equivalente natural y transparente en español.
- source_word: יִתְקְעוּ
  english_pob_choice: shall blow
  chosen_spanish: tocarán
  alternatives_spanish:
  - harán sonar
  - soplarán
  lexicon: HALOT
  rationale: Para trompetas, en español bíblico y actual «tocar» expresa bien la acción de hacer sonar el instrumento sin volverlo mecánico.
- source_word: בַּחֲצֹצְרֹת
  english_pob_choice: the trumpets
  chosen_spanish: las trompetas
  alternatives_spanish:
  - las trompetas
  - las trompetas de plata
  lexicon: HALOT
  rationale: «Trompetas» corresponde directamente al sustantivo. No se añadió «de plata» al texto principal porque este versículo no lo dice, aunque el contexto inmediato sí lo menciona.
- source_word: וְהָיוּ לָכֶם
  english_pob_choice: and they shall be for you
  chosen_spanish: y esto será para ustedes
  alternatives_spanish:
  - y ellas serán para ustedes
  - y serán para ustedes
  lexicon: HALOT
  rationale: El verbo plural retoma la disposición/ordenanza en conjunto; en español «esto» sintetiza naturalmente la institución legal sin perder el referente plural del contexto.
- source_word: לְחֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: una ordenanza permanente
  alternatives_spanish:
  - una ordenanza perpetua
  - una estatuto permanente
  - una ordenanza para siempre
  lexicon: HALOT
  rationale: «חֻקָּה» es una ordenanza o estatuto legal; «permanente» conserva la fuerza duradera de «עוֹלָם» sin sobrecargar el español con un «para siempre» que puede sonar más absoluto que la fórmula hebrea según el contexto.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - por todas sus generaciones
  - para sus generaciones
  lexicon: HALOT
  rationale: La expresión hebrea indica vigencia continua en las sucesivas generaciones. «Por sus generaciones» mantiene el giro bíblico en español y refleja la continuidad covenantal.
theological_decisions:
- issue: Duración de לְחֻקַּת עוֹלָם
  english_pob_reading: a permanent statute
  chosen_spanish_reading: una ordenanza permanente
  alternative_spanish_readings:
  - una ordenanza perpetua
  - una ordenanza para siempre
  rationale: «עוֹלָם» puede expresar duración prolongada o permanente según el contexto legal. «Permanente» preserva la fuerza normativa sin imponer una lectura filosófica de infinitud absoluta donde el hebreo funciona como fórmula jurídica.
  doctrine_reference: Translation philosophy §3, §6
- issue: Referencia del plural verbal וְהָיוּ
  english_pob_reading: they shall be for you
  chosen_spanish_reading: y esto será para ustedes
  alternative_spanish_readings:
  - y ellas serán para ustedes
  - y serán para ustedes
  rationale: El hebreo usa plural, pero en español la ordenanza puede resumirse con un singular conceptual. Se optó por «esto» para que la frase suene natural y siga remitiendo a la institución completa.
  doctrine_reference: 'Revision awareness: plural preserve / legal summary'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que corrigió el singular conceptual a plural explícito; en español se preservó el contenido legal colectivo con «esto... será» como resumen idiomático de la ordenanza, sin perder el referente plural del contexto.
  spanish_consistency_notes:
  - Se mantuvo «Aarón» con tilde en español.
  - Se evitó importar «de plata» al texto principal porque no está en este versículo.
  - Se usó «tocar» para el sonido de las trompetas por naturalidad bíblica en español.
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino.
