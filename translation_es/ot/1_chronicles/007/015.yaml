translation:
  language: es
  text: Makhir tomó esposa para Jupim y para Supim. El nombre de su hermana era Maacá[a], y el nombre del segundo era Zelofejad; y Zelofejad tuvo hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el nombre del segundo hijo era Zelofejad». El hebreo dice simplemente «el segundo», dejando implícito el referente.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָקַח אִשָּׁה
  english_pob_choice: took a wife
  chosen_spanish: tomó una esposa
  alternatives_spanish:
  - tomó una mujer
  - se casó
  lexicon: HALOT
  rationale: La expresión hebrea puede significar 'tomar esposa' en sentido idiomático. En español, 'tomó una esposa' conserva ese valor sin forzar una paráfrasis más interpretativa como 'se casó', y mantiene la relación sintáctica con los destinatarios siguientes.
- source_word: לְחֻפִּים וּלְשֻׁפִּים
  english_pob_choice: for Huppim and for Shuppim
  chosen_spanish: para Jupim y para Supim
  alternatives_spanish:
  - para Jupim y Supim
  - para Jupim y Supim como esposa
  lexicon: HALOT
  rationale: 'Se conserva la repetición de לְ con ''para ... y para ...'', porque el hebreo es inusual y probablemente indica que Makhir gestionó esa esposa en favor de ambos. Los nombres se adaptan a una transliteración española fluida: Huppim > Jupim, Shuppim > Supim.'
- source_word: וְשֵׁם אֲחֹתוֹ מַעֲכָה
  english_pob_choice: The name of his sister was Maacah
  chosen_spanish: El nombre de su hermana era Maacá
  alternatives_spanish:
  - Y el nombre de su hermana era Maacá
  - su hermana se llamaba Maacá
  lexicon: HALOT
  rationale: Se mantiene la fórmula nominal sencilla y directa. 'Su hermana' se entiende naturalmente como referencia a Makhir en el contexto inmediato.
- source_word: וְשֵׁם הַשֵּׁנִי צְלָפְחָד
  english_pob_choice: and the name of the second was Zelophehad
  chosen_spanish: y el nombre del segundo era Zelofejad
  alternatives_spanish:
  - y el nombre del segundo hijo era Zelofejad
  - y el nombre del otro era Zelofejad
  lexicon: HALOT
  rationale: '''El segundo'' preserva la concisión del hebreo sin añadir ''hijo'', que sería interpretativo. Se opta por una transliteración española estándar de Zelophehad > Zelofejad.'
- source_word: וַתִּהְיֶנָה לִצְלָפְחָד בָּנוֹת
  english_pob_choice: and Zelophehad had daughters
  chosen_spanish: y Zelofejad tuvo hijas
  alternatives_spanish:
  - y hubo hijas para Zelofejad
  - y Zelofejad tenía hijas
  lexicon: HALOT
  rationale: La construcción posesiva/existencial se vierte de forma natural en español con 'tuvo hijas', conservando el dato genealógico principal.
theological_decisions:
- issue: Ambigüedad genealógica de 'el segundo'
  english_pob_reading: Retain the compressed wording 'the second' in the main text without adding 'son'
  chosen_spanish_reading: Mantener 'el segundo' sin añadir 'hijo' en el texto principal
  alternative_spanish_readings:
  - el segundo hijo
  - el otro
  rationale: No se trata de una cuestión doctrinal, pero sí de una decisión exegética importante. El hebreo no explicita el sustantivo elíptico, por lo que la traducción principal conserva la ambigüedad en vez de resolverla.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó 'sin cambios necesarios'; el borrador español sigue de cerca el texto hebreo y conserva la ambigüedad documentada en la nota inglesa sobre 'el segundo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa 'esposa' por ser la equivalencia idiomática natural de לָקַח אִשָּׁה en este contexto genealógico.
  - 'La transliteración adapta los nombres propios a una forma española legible y coherente: Makhir, Jupim, Supim, Maacá, Zelofejad.'
