  language: en
  yaml_path: translation/ot/judges/002/018.yaml
  text: Whenever Yahweh raised up judges for them[a], Yahweh was with the judge and saved them from the hand of their enemies all the days of the judge, for Yahweh was moved to pity by their groaning because of those who oppressed and afflicted them.
  footnotes:
