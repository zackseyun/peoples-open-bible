translation:
  language: es
  text: Bajo los árboles de loto[a] se recuesta, al abrigo entre los juncos y el pantano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "bajo los árboles sombríos". El término hebreo designa un árbol o vegetal de identificación incierta; "árboles de loto" sigue la identificación contextual más habitual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: Under
  chosen_spanish: Bajo
  alternatives_spanish:
  - Debajo de
  lexicon: HALOT
  rationale: La preposición expresa ubicación espacial inferior. 'Bajo' suena natural en español y conserva la relación de cobertura sin añadir matices ajenos.
- source_word: צֶאֱלִים
  english_pob_choice: the lotus trees
  chosen_spanish: los árboles de loto
  alternatives_spanish:
  - los árboles sombríos
  - los lotos
  lexicon: HALOT
  rationale: El término hebreo tiene identificación botánica incierta; la POB inglesa opta por 'lotus trees' como identificación contextual probable. 'Árboles de loto' preserva esa decisión y evita una paráfrasis genérica que borre la referencia vegetal.
- source_word: יִשְׁכָּב
  english_pob_choice: he lies down
  chosen_spanish: se recuesta
  alternatives_spanish:
  - se tiende
  - yace
  lexicon: HALOT
  rationale: El verbo describe la postura de descanso del animal. 'Se recuesta' comunica esa imagen en español con naturalidad y sin perder el valor aspectual de la escena.
- source_word: בְּסֵתֶר
  english_pob_choice: in the shelter
  chosen_spanish: en la sombra
  alternatives_spanish:
  - en el refugio
  - en el ocultamiento
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar cobertura o refugio, el contexto vegetal favorece una imagen de resguardo fresco. 'En la sombra' transmite la función protectora del follaje y mantiene la asociación con la vegetación del verso.
- source_word: קָנֶה
  english_pob_choice: the reeds
  chosen_spanish: los juncos
  alternatives_spanish:
  - las cañas
  - los cañaverales
  lexicon: HALOT
  rationale: El singular hebreo funciona colectivamente. 'Juncos' es un equivalente natural y apto para el entorno ribereño; evita el exceso de literalidad del singular español.
- source_word: וּבִצָּה
  english_pob_choice: and the marsh
  chosen_spanish: y del pantano
  alternatives_spanish:
  - y del marjal
  - y de la ciénaga
  lexicon: HALOT
  rationale: '''בִּצָּה'' designa terreno pantanoso o cenagoso. ''Pantano'' es claro y digno en español, y combina bien con la imagen del hábitat acuático.'
translation_notes:
  revision_awareness: El texto hebreo y la POB inglesa coinciden de manera alta; no se aplicaron revisiones sustantivas. Se mantuvo la incertidumbre botánica de צֶאֱלִים mediante nota, en línea con el aparato inglés.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otros términos de sustitución porque este versículo no contiene el nombre divino.
  - '''Juncos'' y ''pantano'' conservan el campo semántico acuático de la escena sin sobretraducir ni suavizar la imagen.'
  - La nota al pie preserva la alternativa interpretativa señalada por la POB inglesa.
