revisions:
- from: Porque era una descendencia[a] maldita desde el principio, y, sin respetar a nadie por las cosas en que pecaron[b], no les concediste perdón.
  to: Porque era un linaje[a] maldito desde el principio, y, sin tener deferencia hacia nadie por las cosas en que pecaron[b], no les concediste perdón.
  rationale: Se ajusta σπέρμα a 'linaje' para conservar mejor la metáfora genealógica del griego en un español natural, y se reemplaza 'sin respetar a nadie' por 'sin tener deferencia hacia nadie' para reflejar con mayor precisión el valor contextual de εὐλαβούμενος como temor/deferencia, no falta de respeto. También se pule la nota alternativa para que suene natural en español.
