translation:
  language: es
  text: 'Ahora Adonías, hijo de Haguit, se exaltó[a], diciendo: «Yo reinaré»[b]. Así se hizo para sí un carro, jinetes y cincuenta hombres que corrían delante de él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se puso a sí mismo por encima», o «se hizo grande». El verbo hebreo lleva el sentido de autoexaltación.
    reason: lexical_alternative
  - marker: b
    text: O «Yo seré rey».
    reason: alternative_reading
lexical_decisions:
- source_word: וַ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: El waw narrativo introduce la escena en progreso. «Ahora» conserva la continuidad discursiva en español sin sobrecargar con un «Y» inicial repetitivo.
- source_word: מִתְנַשֵּׂא
  english_pob_choice: exalted himself
  chosen_spanish: se exaltaba
  alternatives_spanish:
  - se exaltó
  - se ensalzaba
  - se hizo grande
  lexicon: HALOT
  rationale: El hitpael de נשׂא expresa autoexaltación o autopromoción. «Se exaltaba» mantiene el matiz reflexivo y el tono negativo implícito, sin añadir una glosa más explícita que el hebreo no exige en el cuerpo del texto.
- source_word: לֵאמֹר אֲנִי אֶמְלֹךְ
  english_pob_choice: saying, “I will reign.”
  chosen_spanish: 'diciendo: «Yo reinaré»'
  alternatives_spanish:
  - 'diciendo: «Seré rey»'
  - 'declarando: «Yo gobernaré»'
  lexicon: HALOT
  rationale: La forma verbal de מלך permite «reinar» o «ser rey». Se eligió «reinaré» para conservar la fuerza verbal del original y la ambición real de la frase, en línea con la lectura auditada en inglés.
- source_word: וַיַּעַשׂ לוֹ
  english_pob_choice: he made for himself
  chosen_spanish: se hizo para sí
  alternatives_spanish:
  - se preparó para sí
  - se consiguió para sí
  - mandó hacer para sí
  lexicon: HALOT
  rationale: עָשָׂה puede ser «hacer», pero aquí el sentido apunta a disponer/armar su aparato real. «Se hizo para sí» refleja la construcción hebrea de modo directo y evita interpretar demasiado el mecanismo concreto de adquisición.
- source_word: רֶכֶב
  english_pob_choice: a chariot
  chosen_spanish: un carro
  alternatives_spanish:
  - un carro de guerra
  - un carro real
  - un carro y su auriga
  lexicon: HALOT
  rationale: En español bíblico, «carro» es claro y natural para רֶכֶב. «Carro de guerra» sería demasiado específico; el contexto sugiere aparato regio, pero el lexema básico es más amplio.
- source_word: פָרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - hombres de a caballo
  - caballeros
  lexicon: HALOT
  rationale: El término designa hombres montados. «Jinetes» es la opción más transparente y natural en español contemporáneo, preservando la imagen de escolta montada sin tecnicismos colectivos.
- source_word: חֲמִשִּׁים אִישׁ
  english_pob_choice: fifty men
  chosen_spanish: cincuenta hombres
  alternatives_spanish:
  - cincuenta personas
  - cincuenta varones
  lexicon: HALOT
  rationale: Se conserva el masculino explícito de אִישׁ, ya que el texto habla de asistentes masculinos en una procesión real. «Hombres» es fiel y entendible.
- source_word: רָצִים לְפָנָיו
  english_pob_choice: running before him
  chosen_spanish: que corrían delante de él
  alternatives_spanish:
  - corriendo delante de él
  - que iban delante de él corriendo
  lexicon: HALOT
  rationale: El participio describe su función como corredores precediendo al personaje. «Que corrían delante de él» mantiene la imagen procesional de forma fluida en español.
theological_decisions:
- issue: Autoexaltación de Adonías
  english_pob_reading: Rendered מִתְנַשֵּׂא as 'exalted himself' to preserve the text's implicit criticism of self-exaltation without adding explicit moral commentary.
  chosen_spanish_reading: Se traduce «se exaltaba» para conservar la crítica implícita de la autoexaltación sin convertirla en una paráfrasis moralizante.
  alternative_spanish_readings:
  - se ensalzaba
  - se proclamaba a sí mismo
  rationale: El hebreo sugiere una acción de elevarse a sí mismo, y el contexto inmediato lo presenta como pretensión real indebida. La redacción española conserva esa tensión sin explicitar más de lo que dice el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Título real en la cita de Adonías
  english_pob_reading: “I will reign.”
  chosen_spanish_reading: «Yo reinaré»
  alternative_spanish_readings:
  - «Yo seré rey»
  - «Yo gobernaré»
  rationale: «Reinaré» refleja el verbo מלך y mantiene la ambición regia como acción. «Seré rey» es posible, pero desplaza el foco hacia el título; aquí se preserva el valor verbal señalado por la POB inglesa.
  doctrine_reference: HALOT; Translation philosophy §§1, 6
- issue: Representación de la escolta montada
  english_pob_reading: horsemen
  chosen_spanish_reading: jinetes
  alternative_spanish_readings:
  - hombres de a caballo
  - caballería
  rationale: El texto describe una escolta montada masculina; «jinetes» conserva la referencia humana y evita el tecnicismo militar de «caballería», que puede sonar más colectivo que el hebreo.
  doctrine_reference: Translation philosophy §§4, 6
translation_notes:
  revision_awareness: Se siguió la revisión final del audita inglés, que prefirió una formulación más directa para עשה/לוֹ y mantuvo la lectura de autoexaltación en מִתְנַשֵּׂא. En español se optó por un equivalente natural y formal, preservando el contraste entre la ambición personal de Adonías y la breve descripción de su aparato real.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto, aunque este versículo no la contiene.
  - Se usa «reinar» para מלך en primera persona, en continuidad con la decisión auditada en inglés.
  - «Jinetes» traduce פָרָשִׁים de manera humana y explícita, sin neutralizar el masculino del texto.
  - La nota a pie de página marca la tensión lexical de מִתְנַשֵּׂא sin resolverla por paráfrasis.
