translation:
  language: es
  text: Sus botones y sus ramas serán de una sola pieza con ella[a]; todo ello será una sola obra martillada[b] de oro puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ella»; el sentido es que los botones y las ramas debían formarse integrados en el candelabro, no añadirse aparte.
    reason: lexical_alternative
  - marker: b
    text: O «obra batida». El hebreo subraya que todo el candelabro debía hacerse como una sola pieza de oro puro martillada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפְתֹּרֵיהֶם
  english_pob_choice: their buds
  chosen_spanish: sus botones
  alternatives_spanish:
  - sus brotes
  - sus nudos
  lexicon: HALOT
  rationale: En el contexto del candelabro, el término designa un elemento ornamental de forma redondeada asociado a imaginería vegetal. «Botones» conserva esa imagen floral/vegetal en español sin sonar tan técnico como «capiteles» ni tan opaco como «nudos».
- source_word: וּקְנֹתָם
  english_pob_choice: and their branches
  chosen_spanish: y sus ramas
  alternatives_spanish:
  - y sus varas
  - y sus tallos
  lexicon: HALOT
  rationale: Para la menorá, קנה alude a los brazos proyectados del candelabro. «Ramas» sigue la elección inglesa y mantiene la imaginería vegetal que domina la descripción.
- source_word: מִמֶּנָּה
  english_pob_choice: with it
  chosen_spanish: con él
  alternatives_spanish:
  - de él
  - desde él
  lexicon: HALOT
  rationale: 'El hebreo expresa derivación integral: las piezas no debían ir unidas aparte, sino salir de la misma pieza. En español, «con él» comunica con naturalidad que forman una sola pieza, mientras que «de él» queda como alternativa más literal.'
- source_word: יִהְיוּ
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - deberán ser
  - habrán de ser
  lexicon: HALOT
  rationale: Aunque es forma imperfecta, aquí funciona como instrucción normativa. «Serán» conserva el valor prescriptivo en español bíblico moderno sin recargar la frase.
- source_word: כֻּלָּהּ
  english_pob_choice: all of it
  chosen_spanish: todo ello
  alternatives_spanish:
  - todo el conjunto
  - todo el candelabro
  lexicon: HALOT
  rationale: La expresión subraya la totalidad del objeto. «Todo ello» preserva esa referencia global y fluye bien en español.
- source_word: מִקְשָׁה
  english_pob_choice: hammered work
  chosen_spanish: obra martillada
  alternatives_spanish:
  - trabajo martillado
  - obra batida
  lexicon: HALOT
  rationale: El término indica metal trabajado a golpes desde una sola pieza. «Obra martillada» reproduce ese sentido manufacturero de manera clara y digna.
- source_word: אַחַת
  english_pob_choice: a single
  chosen_spanish: de una sola pieza
  alternatives_spanish:
  - una sola
  - en una sola pieza
  lexicon: HALOT
  rationale: En combinación con מִקְשָׁה, el numeral enfatiza unidad material. La frase «de una sola pieza» expresa bien la construcción íntegra del candelabro.
- source_word: זָהָב טָהוֹר
  english_pob_choice: pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro limpio
  lexicon: HALOT
  rationale: La locución fija se vierte naturalmente como «oro puro»; aquí se mantiene la colocación usual en español con el orden más idiomático «de oro puro».
theological_decisions:
- issue: Unidad material del candelabro frente a piezas separadas
  english_pob_reading: the buds and branches were to be formed integrally from the lampstand rather than attached separately
  chosen_spanish_reading: las ramas y los botones debían salir de una sola pieza con el candelabro, no añadirse aparte
  alternative_spanish_readings:
  - de él
  - desde él
  - hechas aparte
  rationale: 'Se conserva la tensión interpretativa de la preposición hebrea: el punto no es solo ubicación, sino origen integral. La redacción española deja claro que se trata de una manufactura de una sola pieza, como refleja la nota inglesa.'
  doctrine_reference: Éxodo 25:31-40; descripción del candelabro del tabernáculo
translation_notes:
  revision_awareness: Se siguió el paquete de referencia con concordancia alta y sin cambios de revisión relevantes; la traducción mantiene la decisión auditada de expresar la fabricación integral del candelabro y el matiz de mִקְשָׁה como obra martillada.
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta serie cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se prefirió «ramas» para קנה conforme al contexto de la menorá y la imaginería vegetal.
  - Se mantuvo «oro puro» como fórmula estable y transparente.
  - Se evitó «SEÑOR» porque el texto hebreo aquí no contiene el tetragrámaton.
