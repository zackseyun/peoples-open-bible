translation:
  language: es
  text: Cuando yo cierre[a] los cielos, de modo que no haya lluvia, o mande a la langosta[b] para que devore la tierra, o envíe peste[c] entre mi pueblo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si yo cierro los cielos ...». La partícula hebrea inicial puede entenderse de modo más literal como «si en verdad» o «he aquí, si».
    reason: lexical_alternative
  - marker: b
    text: Lit. «la langosta»; el hebreo usa un singular colectivo.
    reason: lexical_alternative
  - marker: c
    text: O «plaga» para «peste».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - He aquí, si
  lexicon: HALOT
  rationale: En este contexto introduce un caso condicional real de juicio divino; «Cuando» conserva la naturalidad del español y sigue la decisión inglesa sin volverla demasiado abstracta.
- source_word: אֶעֱצֹר
  english_pob_choice: I shut up
  chosen_spanish: yo cierre
  alternatives_spanish:
  - yo restrinja
  - yo retenga
  lexicon: HALOT
  rationale: Con «los cielos» el verbo expresa la idea de impedir la lluvia. En español, «cerrar los cielos» mantiene la imagen concreta del hebreo y funciona de modo idiomático y solemne.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: «Los cielos» reproduce mejor el registro bíblico y la imagen de una esfera celeste cerrada para retener la lluvia.
- source_word: וְלֹא יִהְיֶה מָטָר
  english_pob_choice: so that there is no rain
  chosen_spanish: de modo que no haya lluvia
  alternatives_spanish:
  - y no haya lluvia
  - para que no haya lluvia
  lexicon: HALOT
  rationale: La cláusula expresa resultado; «de modo que» comunica bien la relación causal sin forzar el español.
- source_word: חָגָב
  english_pob_choice: the locust
  chosen_spanish: la langosta
  alternatives_spanish:
  - el langosta
  - las langostas
  lexicon: HALOT
  rationale: Aunque el hebreo es singular colectivo, en español el sustantivo natural y bíblicamente claro es «la langosta»; se conserva el valor colectivo implícito.
- source_word: לֶאֱכֹל
  english_pob_choice: to devour
  chosen_spanish: devore
  alternatives_spanish:
  - coma
  - consuma
  lexicon: HALOT
  rationale: «Devorar» mantiene el matiz destructivo del inglés POB y del contexto de juicio contra la tierra, mejor que un simple «comer».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En español, «la tierra» es la forma más natural y amplia para este contexto de devastación agrícola y territorial; puede reflejar el alcance covenantal del hebreo sin estrecharlo.
- source_word: אֲשַׁלַּח
  english_pob_choice: send
  chosen_spanish: envíe
  alternatives_spanish:
  - mande
  - despache
  lexicon: HALOT
  rationale: «Enviar» es la correspondencia directa y mantiene la agencia divina en la acción de juicio.
- source_word: דֶּבֶר
  english_pob_choice: pestilence
  chosen_spanish: peste
  alternatives_spanish:
  - pestilencia
  - plaga
  lexicon: HALOT
  rationale: El inglés POB eligió «pestilence»; en español, «peste» transmite una calamidad epidémica grave y suena más natural que «pestilencia», sin diluir el juicio. Se preserva la alternativa de «plaga» por si el contexto litúrgico la prefiere.
- source_word: בְּעַמִּי
  english_pob_choice: among my people
  chosen_spanish: entre mi pueblo
  alternatives_spanish:
  - en mi pueblo
  - sobre mi pueblo
  lexicon: HALOT
  rationale: «Entre mi pueblo» refleja el valor distributivo/interno de בְּ con un brote dentro de la comunidad, siguiendo de cerca la decisión inglesa.
theological_decisions:
- issue: Serie de actos de juicio divino con agencia directa de Yahvé
  english_pob_reading: Use 'When ... or ... or ...' to present real covenant-discipline possibilities without softening divine agency.
  chosen_spanish_reading: Usar «Cuando ... o ... o ...» para presentar posibilidades reales de disciplina del pacto sin atenuar la agencia divina.
  alternative_spanish_readings:
  - Si cierro ...
  - He aquí, si cierro ...
  rationale: La frase hebrea enumera acciones judiciales posibles atribuidas directamente a Dios. El español mantiene esa fuerza con verbos en primera persona y una coordinación alternativa clara.
  doctrine_reference: Disciplina del pacto; providencia y juicio divino (cf. 2 Crónicas 7:14 en contexto inmediato)
translation_notes:
  revision_awareness: 'Se siguió el pasaje fuente hebreo con el audit trail inglés: הֵן se trató como inicio condicional; אֶעֱצֹר se mantuvo con imagen concreta de cerrar los cielos; חָגָב se entendió como singular colectivo; דֶּבֶר se rindió con un término de juicio epidémico fuerte. No se registran revisiones adicionales en el paso más reciente del inglés.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico con vocabulario claro y contemporáneo.
  - Se evitó sustituir términos de juicio por expresiones suavizadas.
  - Se preservó la alternancia condicional y disyuntiva del hebreo con «Cuando ... o ... o ...».
  - La puntuación final deja la frase abierta, como en una sección que continúa en el versículo siguiente.
