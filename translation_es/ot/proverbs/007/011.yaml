translation:
  language: es
  text: Ella es ruidosa y rebelde[a]; sus pies no permanecen en su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «en su casa sus pies no moran/permanecen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹמִיָּה
  english_pob_choice: loud
  chosen_spanish: ruidosa
  alternatives_spanish:
  - bulliciosa
  - clamorosa
  - alborotadora
  lexicon: HALOT
  rationale: El hebreo describe una disposición ruidosa, turbulenta o bochinchera. «Ruidosa» comunica bien ese rasgo en español actual sin perder naturalidad ni intensificar más de lo que el texto permite.
- source_word: וְסֹרָרֶת
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - obstinada
  - rebelde y obstinada
  - insumisa
  lexicon: HALOT
  rationale: La raíz סרר expresa terquedad e insubordinación. «Rebelde» conserva la fuerza moral y conductual de la palabra, y funciona de manera clara junto a «ruidosa».
- source_word: בְּבֵיתָהּ
  english_pob_choice: in her house
  chosen_spanish: en su casa
  alternatives_spanish:
  - dentro de su casa
  - en su hogar
  - en su vivienda
  lexicon: HALOT
  rationale: 'La preposición y el sustantivo son concretos: literalmente, «en su casa». «En su casa» mantiene esa concreción mejor que una paráfrasis como «en casa», que en español podría suavizar el detalle del hebreo.'
- source_word: לֹא יִשְׁכְּנוּ רַגְלֶיהָ
  english_pob_choice: her feet do not stay
  chosen_spanish: sus pies no permanecen
  alternatives_spanish:
  - sus pies no se quedan
  - sus pies no moran
  - sus pies no se detienen
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «sus pies no habitan/permanecen». «Permanecen» conserva mejor la idea de residencia o permanencia que una versión más libre, y mantiene la imagen personificada de los pies.
translation_notes:
  revision_awareness: El contexto inglés pasó de «at home» a «in her house» para reflejar más de cerca בְּבֵיתָהּ; el español sigue esa revisión con «en su casa», preservando la concreción del lugar y la imagen de permanencia ausente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en el proyecto, aunque este versículo no lo contiene.
  - Se usó «rebelde» como equivalente natural y fiel de סֹרָרֶת, sin desplazar el matiz de insubordinación.
  - «Permanecen» reproduce mejor la idea de residencia/dwelling que un simple «quedarse», y conserva el paralelismo con la nota literal.
