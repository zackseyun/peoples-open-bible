source:
  edition: WLC
  text: א֣וֹ נֶ֗פֶשׁ אֲשֶׁ֣ר תִּגַּע֮ בְּ/כָל דָּבָ֣ר טָמֵא֒ אוֹ֩ בְ/נִבְלַ֨ת חַיָּ֜ה טְמֵאָ֗ה א֤וֹ בְּ/נִבְלַת֙ בְּהֵמָ֣ה טְמֵאָ֔ה א֕וֹ בְּ/נִבְלַ֖ת שֶׁ֣רֶץ טָמֵ֑א וְ/נֶעְלַ֣ם מִמֶּ֔/נּוּ וְ/ה֥וּא טָמֵ֖א וְ/אָשֵֽׁם־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/002.yaml
  text: Or if a person touches any unclean thing—whether the carcass of an unclean wild animal[a], or the carcass of unclean livestock, or the carcass of an unclean swarming creature—and it is hidden from him, and he is unclean and becomes guilty[b],
  footnotes:
  - marker: a
    text: Or, 'he is unaware of it'; literally, 'it is hidden from him.'
    reason: lexical_alternative
  - marker: b
    text: That is, he incurs guilt for the impurity once the matter applies to him, not that touching a carcass is itself necessarily a moral evil in the same sense as intentional sin.
    reason: cultural_note
