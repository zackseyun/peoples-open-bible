base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/085.yaml
  text: For you[a], Lord, who have lightened our sins, have given us such a remnant[b]; yet we have turned back to transgress your law by mingling with the uncleanness of the nations of the land.
  footnotes:
