  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Pobre' para דָּל y 'necesitado' para אֶבְיוֹן están bien diferenciados. 'Polvo' preserva עָפָר. Para מֵאַשְׁפֹּת, 'montón de cenizas' es aceptable y más natural que 'montón de ceniza'; la nota puede conservar la alternativa 'montón de desechos'.
