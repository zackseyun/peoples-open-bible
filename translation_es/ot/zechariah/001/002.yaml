translation:
  language: es
  text: Yahvé se indignó mucho[a] con sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se airó mucho». El hebreo repite la misma raíz para intensificar la idea de ira.
    reason: lexical_alternative
  - marker: b
