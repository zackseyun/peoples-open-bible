base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/003/011.yaml
  text: For only Og king of Bashan was left of the remnant of the Rephaim[a]. Look, his bed was a bed of iron. Is it not in Rabbah of the Ammonites? Its length was nine cubits and its width four cubits[b], by the cubit of a man.
  footnotes:
  - marker: a
    text: Or 'the giants.' Hebrew 'Rephaim,' likely the name of an ancient people associated with great size.
    reason: alternative_reading
  - marker: b
    text: Or 'by an ordinary cubit' or 'according to the common cubit.' Hebrew literally, 'by the cubit of a man.'
    reason: lexical_alternative
