revisions:
- from: Y después[a] de estas cosas, Nabot el jezreelita tenía una viña en Jezreel, junto al palacio de Ahab, rey de Samaria.
  to: Después de estas cosas, Nabot el jezreelita tenía una viña en Jezreel, junto al palacio de Acab, rey de Samaria.[a]
  rationale: Se elimina la conjunción inicial para evitar una apertura española torpe y redundante, manteniendo intacta la transición temporal del hebreo. Se adapta «Ahab» a «Acab» por uso bíblico español más natural. La nota se simplifica estilísticamente sin cambiar su contenido lexical esencial sobre la construcción posesiva hebrea.
