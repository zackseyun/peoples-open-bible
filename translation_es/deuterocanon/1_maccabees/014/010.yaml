translation:
  language: es
  text: Suministró a las ciudades provisiones, y las dotó de medios de fortificación[b], hasta que el nombre de su gloria se hizo conocido[a] hasta los confines de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente, «su glorioso nombre se hizo conocido hasta los confines de la tierra». El griego dice más literalmente: «fue llamado el nombre de su gloria».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «medios de fortificación» puede referirse en sentido amplio a equipo, material o recursos defensivos para fortalecer las ciudades.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχορήγησεν
  english_pob_choice: supplied
  chosen_spanish: suministró
  alternatives_spanish:
  - proveyó
  - abasteció
  lexicon: LSJ
  rationale: El verbo expresa el acto de proveer lo necesario en un contexto administrativo y de abastecimiento. «Suministró» conserva esa fuerza y suena natural en español bíblico contemporáneo.
- source_word: βρώματα
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - alimentos
  - víveres
  - suministros
  lexicon: LSJ
  rationale: Aunque el sentido básico es «comidas/alimentos», aquí se trata del abastecimiento de ciudades; «provisiones» mantiene el valor de suministro para la vida y la resistencia urbana.
- source_word: ἔταξεν αὐτὰς
  english_pob_choice: furnished them
  chosen_spanish: las dotó
  alternatives_spanish:
  - las equipó
  - las dispuso
  lexicon: LSJ
  rationale: Con el objeto referido a las ciudades, el griego comunica que las dejó provistas para una condición defensiva. «Las dotó» evita la rigidez de un calco y conserva la idea de dotación efectiva.
- source_word: σκεύεσιν ὀχυρώσεως
  english_pob_choice: means of fortification
  chosen_spanish: medios de fortificación
  alternatives_spanish:
  - implementos de fortificación
  - recursos para fortificarlas
  - material de defensa
  lexicon: LSJ
  rationale: La expresión apunta de forma amplia al material o recursos necesarios para fortalecer defensivamente las ciudades. «Medios de fortificación» refleja bien esa amplitud sin restringirla a armas o herramientas específicas.
- source_word: ὠνομάσθη τὸ ὄνομα
  english_pob_choice: was renowned / was named
  chosen_spanish: fue proclamado
  alternatives_spanish:
  - fue nombrado
  - fue conocido
  - se hizo célebre
  lexicon: LSJ
  rationale: La frase griega es literalmente «fue llamado el nombre», pero funciona idiomáticamente como difusión pública de la fama. «Fue proclamado» preserva la idea de publicación/notoriedad sin forzar un giro extraño en español.
- source_word: τῆς δόξης αὐτοῦ
  english_pob_choice: of his glory
  chosen_spanish: de su gloria
  alternatives_spanish:
  - de su esplendor
  - glorioso
  lexicon: LSJ
  rationale: La construcción genitiva es fuerte y formal; «de su gloria» conserva el peso retórico y la relación posesiva del griego.
- source_word: ἕως ἄκρου γῆς
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta el extremo de la tierra
  - hasta los extremos de la tierra
  lexicon: LSJ
  rationale: La expresión idiomática indica alcance universal. «Confines» es una equivalencia natural y digna en español bíblico para el borde/extremo de la tierra.
theological_decisions:
- issue: Valor idiomático de «el nombre de su gloria»
  english_pob_reading: The Greek reads more literally, 'the name of his glory was named,' while the English note allows 'his glorious name became known.'
  chosen_spanish_reading: «el nombre de su gloria fue proclamado»
  alternative_spanish_readings:
  - «su glorioso nombre se hizo conocido»
  - «el nombre de su gloria fue conocido»
  rationale: La tensión del griego entre literalidad y sentido idiomático se mantiene sin borrar la construcción formal. «Fue proclamado» comunica difusión pública y notoriedad, permitiendo que el lector perciba el registro solemne del hebraísmo/grecismo subyacente.
  doctrine_reference: No doctrinal issue; lexical/idiomatic rendering only.
translation_notes:
  revision_awareness: 'La base inglesa fue revisada desde una traducción más literal («equipped them with implements of fortification», «was named to the end of the earth») hacia una forma más natural («furnished them with means of fortification», «was renowned to the ends of the earth»). La propuesta española sigue esa tendencia de equivalencia óptima: conserva la estructura y el contenido del griego, pero usa un español más fluido y publicable.'
  spanish_consistency_notes:
  - Se mantiene el registro solemne y bíblico sin arcaísmos innecesarios.
  - «Provisiones» y «medios de fortificación» preservan el contexto cívico-militar.
  - No se usa «SEÑOR» ni terminología litúrgica no presente en el verso.
  - La frase final se resuelve como notoriedad pública amplia, evitando una literalidad oscura que no comunica bien en español.
