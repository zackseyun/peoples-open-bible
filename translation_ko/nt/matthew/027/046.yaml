id: MAT.27.46
reference: Matthew 27:46
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: περὶ δὲ τὴν ἐνάτην ὥραν ⸀ἀνεβόησεν ὁ Ἰησοῦς φωνῇ μεγάλῃ λέγων· ⸂Ἠλὶ ἠλὶ⸃ λεμὰ σαβαχθάνι; τοῦτ’ ἔστιν· Θεέ μου θεέ μου, ἱνατί με ἐγκατέλιπες;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/046.yaml
  text: Now about the ninth hour Jesus cried out with a loud voice[a], saying, “Eli, Eli, lema sabachthani?” that is, “My God, my God[b], why have you forsaken me?”
  footnotes:
  - marker: a
    text: The wording echoes Psalm 22:1.
    reason: cross_reference
  - marker: b
    text: Or, 'did you forsake me?' The Greek verb is aorist; English present perfect is used here to preserve the natural force of the cry and its familiar Psalmic resonance.
    reason: lexical_alternative
translation:
  language: ko
  text: 제구시쯤에 예수께서 큰 소리로 외치셨습니다, 「엘리 엘리 라마 사박다니?」 이는 곧 「나의 하나님, 나의 하나님, 어찌하여 나를 버리셨습니까?」 입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시 22:1 인용. 헬라어 본문은 아람어 음역 ηλι ηλι λεμα σαβαχθανι를 그대로 두고 그 뜻을 풀어 준다. 시편 22편의 본 첫 구절은 히브리어로 אלי אלי למה עזבתני(ʻ엘리 엘리 라마 아자브타니ʼ)이며, 본문의 아람어 형태는 예수 시대의 일상어를 반영한다.
    reason: alternative_reading
theological_decisions:
- issue: 27:46 아람어 외침의 음역 보존
  chosen_reading: 「엘리 엘리 라마 사박다니」 — 아람어 음역 그대로 두고 한국어 번역을 그 뒤에 둠
  alternative_readings:
  - 음역 생략하고 한국어 번역만 제시
  rationale: 마태복음 본문 자체가 아람어 음역을 보존하고 그 다음에 헬라어 번역을 붙인다. 이는 예수의 마지막 부르짖음이 그분의 모국어로 외쳐졌음을 본문이 의도적으로 드러내는 방식이며, 또한 시편 22편 인용임을 보여 주는 본문 내적 표지이다. 한국어 번역도 본문의 이 구조를 그대로 따라, 아람어 음역(「엘리 엘리 라마 사박다니」)을 먼저 두고, 그 의미(「나의 하나님, 나의 하나님, 어찌하여 나를 버리셨습니까?」)를 본문 내부에서 풀어 준다.
  doctrine_reference: 'DOCTRINE.md §1, §5: render the source''s strongest plain meaning; preserve the text''s own structure'
