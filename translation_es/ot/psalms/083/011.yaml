translation:
  language: es
  text: Fueron destruidos en En-dor[a]; llegaron a ser estiércol[b] para el suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «junto a En-dor» o «por En-dor». La preposición hebrea puede rendirse con varios matices locativos con el topónimo En-dor.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «llegaron a ser estiércol sobre el suelo». El hebreo dice literalmente: «llegaron a ser estiércol para el suelo», imagen de cadáveres reducidos a desecho o abono.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁמְדוּ
  english_pob_choice: were destroyed
  chosen_spanish: fueron destruidos
  alternatives_spanish:
  - fueron aniquilados
  - fueron exterminados
  - perecieron
  lexicon: HALOT
  rationale: El nifal perfecto plural comunica un estado pasivo/resultativo de destrucción. «Fueron destruidos» es natural en español y mantiene la fuerza del hebreo sin intensificarla más allá de lo necesario.
- source_word: בְּעֵין דֹּאר
  english_pob_choice: at En-dor
  chosen_spanish: en En-dor
  alternatives_spanish:
  - en En-dor
  - junto a En-dor
  - por En-dor
  lexicon: HALOT
  rationale: La expresión es un topónimo con preposición locativa. En español, «en» conserva el valor locativo amplio del hebreo sin forzar una precisión que el preposición puede abarcar de varias maneras.
- source_word: הָיוּ
  english_pob_choice: they became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - fueron
  - se volvieron
  lexicon: HALOT
  rationale: Con predicado nominal, היה puede expresar resultado o cambio de estado. «Llegaron a ser» reproduce mejor ese matiz ingresivo que un simple «fueron».
- source_word: דֹּמֶן
  english_pob_choice: dung
  chosen_spanish: estiércol
  alternatives_spanish:
  - dung
  - excremento
  - basura
  lexicon: HALOT
  rationale: El término designa excremento usado como abono/refuse. «Estiércol» comunica en español bíblico el valor material y degradante del término, y además puede sugerir el matiz de desecho/manure implicado en el contexto poético.
- source_word: לָאֲדָמָה
  english_pob_choice: for the ground
  chosen_spanish: para la tierra
  alternatives_spanish:
  - para el suelo
  - sobre la tierra
  - para la tierra
  lexicon: HALOT
  rationale: אֲדָמָה se refiere a la tierra/suelo. «Para la tierra» conserva la relación final o de destino del hebreo; en español, «tierra» es la opción más natural y amplia sin perder la imagen.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado mostró acuerdo alto; se mantiene la lectura principal del original hebreo y la equivalencia óptima del texto inglés auditado.
  spanish_consistency_notes:
  - Se conserva «En-dor» como topónimo transliterado, siguiendo el texto inglés auditado.
  - Se evita «SEÑOR» u otra sustitución teológica, ya que este versículo no contiene el nombre divino.
  - «Tierra» se usa para אֲדָמָה por claridad y naturalidad en español, manteniendo el paralelismo poético con el hebreo.
