  verdict: revise
  source_alignment_summary: El borrador no preserva fielmente el sentido del hebreo ni la decisión léxica auditada en inglés. עַד אָ֭נָה se refleja bien como «¿Hasta cuándo?», y וּתְדַכְּאוּנַנִי בְמִלִּים puede representarse bien como «me aplastarán con palabras». Pero תּוֹגְיוּן נַפְשִׁי exige un objeto de primera persona singular («me» / «mi alma»), no «los».
  spanish_quality_summary: 'La frase actual es gramaticalmente defectuosa y poco legible: «¿Hasta cuándo[ a ] [a] los atormentarán...?» contiene marcación de nota mal colocada y un pronombre erróneo. El español natural y digno sería «¿Hasta cuándo me atormentarán y me aplastarán con palabras?[a]».'
  glossary_alignment: No hay términos de glosario doctrinal mayor implicados. La principal cuestión léxica es נַפְשִׁי, que según la auditoría inglesa se vierte mejor como pronombre personal en el texto principal, con nota para la alternativa «mi alma». «Atormentar» y «aplastar» se alinean bien con las decisiones POB.
  issues:
  - severity: high
    issue: 'Pronombre objeto incorrecto: «los atormentarán»'
    rationale: El hebreo tiene sufijo 1cs en נַפְשִׁי y en וּתְדַכְּאוּנַנִי; Job habla de sí mismo, no de terceros. Esto altera el sentido básico del versículo.
  - severity: medium
    issue: Marcación de nota al pie mal formada y duplicada
    rationale: El texto muestra «[ a ] [a]», lo cual incumple la convención requerida de marcador exacto y único en el punto pertinente.
  - severity: medium
    issue: La nota al pie actual está redactada de manera imprecisa
    rationale: La alternativa inglesa documenta «grieve my soul», no una discusión sobre objeto directo explícito frente a implícito. En español conviene reflejar claramente la alternativa «afligir mi alma» o «entristecer mi alma».
  revised_spanish_text: ¿Hasta cuándo me atormentarán y me aplastarán con palabras?[a]
  revised_footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo afligirán mi alma y me aplastarán con palabras?»'
