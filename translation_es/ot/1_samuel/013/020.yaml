review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: movimiento descendente, referencia a los filisteos como pueblo, propósito de afilar, y la lista de herramientas. Sin embargo, la nota al pie está anclada en el lugar equivocado: la incertidumbre léxica documentada en la auditoría inglesa corresponde al último instrumento (מַחֲרֵשָׁתוֹ), no a ''Todo Israel''. Además, ''a donde estaban los filisteos'' añade una localización explícita no presente en el texto; ''a los filisteos'' es más fiel y sigue siendo natural en español.'
  spanish_quality_summary: El español es claro y legible, con registro moderno y digno. 'Reja', 'azadón', 'hacha' y 'hoz' funcionan bien en contexto. No obstante, el anclaje incorrecto de la nota crea confusión interpretativa, y la expansión 'donde estaban' suena algo explicativa. Un ajuste menor mejora fidelidad y presentación.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las elecciones léxicas principales concuerdan con la base POB: ''Todo Israel'', ''afilar'', ''reja'', ''azadón'', ''hacha'', ''hoz''. La excepción necesaria es reposicionar la nota de incertidumbre léxica para que acompañe a ''hoz[a]'', conforme a la decisión inglesa sobre מַחֲרֵשָׁתוֹ.'
  issues:
  - severity: high
    issue: La nota al pie está anclada a 'Todo Israel' en lugar del término incierto final de la lista de herramientas.
    rationale: La auditoría inglesa documenta que la incertidumbre léxica recae sobre מַחֲרֵשָׁתוֹ ('his sickle' / posiblemente 'his coulter' u otro implemento de arado). Tal como está, la nota española induce a pensar que la duda afecta a 'Todo Israel', lo cual distorsiona la evidencia fuente.
  - severity: medium
    issue: '''A donde estaban los filisteos'' añade información no explícita en el hebreo.'
    rationale: הַפְּלִשְׁתִּים es simplemente el destino personal de movimiento, 'a los filisteos'. La expansión es comprensible, pero va más allá de la forma fuente y no es necesaria para naturalidad en español.
  revised_spanish_text: Todo Israel bajó a los filisteos, cada uno para afilar su reja, su azadón, su hacha y su hoz[a].
  revised_footnotes:
  - marker: a
    text: O posiblemente 'su cuchilla de arado' u otro implemento de arado; el término hebreo es incierto.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre el término hebreo incierto final, tal como lo documenta la auditoría inglesa, y se elimina la expansión explicativa 'donde estaban' para ajustarse mejor al hebreo sin perder naturalidad. El resto del texto puede mantenerse.
