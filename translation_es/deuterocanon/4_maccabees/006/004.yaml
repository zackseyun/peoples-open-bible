lexical_decisions:
- source_word: Πείσθητι
  english_pob_choice: Obey
  chosen_spanish: Obedece
  alternatives_spanish:
  - Sé persuadido
  - Sométete
  lexicon: LSJ
  rationale: El imperativo pasivo aoristo de πείθω puede tener el matiz de 'dejarse persuadir', pero en este contexto de cumplimiento de decretos reales expresa la idea de obedecer. 'Obedece' comunica ese valor de forma natural en español sin perder la fuerza exhortativa.
- source_word: ταῖς ... ἐντολαῖς
  english_pob_choice: the ... commands
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - las órdenes
  - los decretos
  lexicon: LSJ
  rationale: ἐντολαί son disposiciones autoritativas. 'Mandamientos' conserva el peso normativo del término, aunque 'órdenes' también sería posible; se eligió una forma que suena digna y clara en español.
- source_word: τοῦ βασιλέως
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - real
  - del soberano
  lexicon: LSJ
  rationale: El genitivo posesivo se vierte de manera directa y natural como 'del rey', manteniendo la relación de pertenencia sin añadir formalidad innecesaria.
- source_word: ἑτέρωθεν
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - de otro lado
  - desde otra parte
  lexicon: LSJ
  rationale: El adverbio indica procedencia u otro sector, y el audit trail inglés lo interpreta como la voz de otro heraldo. En español, 'otro heraldo' transmite con claridad que no es la misma voz anterior, sin volver demasiado literal la imagen espacial.
- source_word: κῆρυκος
  english_pob_choice: herald
  chosen_spanish: heraldo
  alternatives_spanish:
  - mensajero
  - pregonero
  lexicon: LSJ
  rationale: κῆρυξ designa un anunciador oficial. 'Heraldo' es el equivalente más preciso y elevado en español; 'pregonero' sería más coloquial y 'mensajero' demasiado general.
- source_word: ἐπιβοῶντος
  english_pob_choice: cried out
  chosen_spanish: gritaba
  alternatives_spanish:
  - clamaba
  - proclamaba
  lexicon: LSJ
  rationale: El participio expresa una llamada fuerte y pública. 'Gritaba' comunica la intensidad audible con naturalidad en español. Se evita 'proclamaba' porque suena más técnico y menos enfático.
translation_notes:
  revision_awareness: La redacción española sigue el pasaje breve y el valor imperativo del griego, pero adopta una sintaxis natural en español. El texto inglés revisado cambió 'shouted out' por 'cried out' para un registro más formal; aquí se reflejó con 'gritaba' por su claridad y tono, sin perder la intensidad del participio.
  spanish_consistency_notes:
  - Se mantuvo 'heraldo' para κῆρυξ en coherencia con la precisión léxica del audit trail.
  - No se usó 'SEÑOR' ni terminología teológica ajena al verso.
  - La nota al pie conserva la ambigüedad espacial de ἑτέρωθεν sin forzarla en el cuerpo principal del texto.
