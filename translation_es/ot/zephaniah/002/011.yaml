    rationale: El proyecto pide preservar alternativas significativas del aparato inglés. Aquí la nota inglesa [b] corresponde a כֹּל אִיֵּי הַגּוֹיִם, no a אִישׁ מִמְּקוֹמוֹ. La observación sobre «desde/en su lugar» puede quedar implícita en la decisión léxica, pero no debe desplazar la nota heredada.
