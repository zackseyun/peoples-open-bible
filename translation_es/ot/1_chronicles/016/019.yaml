translation:
  language: es
  text: cuando eran pocos en número[a], muy pocos, y residentes temporales en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pocos de verdad» o «casi ninguno»; el hebreo intensifica su pequeñez.
