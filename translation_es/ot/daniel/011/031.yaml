review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia verbal y el sentido general del hebreo: fuerzas que surgen del rey, profanación del santuario, supresión del sacrificio regular e instalación de la abominación desoladora. También conserva adecuadamente la ambigüedad comprimida de הַמִּקְדָּשׁ הַמָּעוֹז. Sin embargo, «procedentes de él» suena más pesado que el simple «de él», y «holocausto regular» no comunica tan claramente en español bíblico actual la referencia cultual establecida como «holocausto continuo».'
  spanish_quality_summary: 'La redacción es mayormente natural y digna, pero «santuario fortaleza» resulta algo áspero; aun así puede mantenerse por fidelidad a la decisión POB y con nota aclaratoria. El ajuste principal recomendado es mejorar la fluidez de «fuerzas... procedentes de él» a «fuerzas de él» o mejor «fuerzas suyas»/«fuerzas de su parte»; sin embargo, para cercanía al inglés auditado y al hebreo, «fuerzas de él» suena torpe. La mejor solución sencilla es «fuerzas de su parte», pero eso desplaza levemente el matiz de procedencia. Más estable es conservar «de él» con sintaxis natural: «Y fuerzas de él se levantarán». Además, «holocausto continuo» encaja mejor con el uso bíblico tradicional de התמיד y con la nota existente sobre «regular/continuo».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Abominación desoladora» es aceptable, aunque la nota alternativa «que desola» preserva bien el valor participial. «Holocausto continuo» alinea mejor el hebreo תָּמִיד con la nota léxica que ya menciona «continuo».
  issues:
  - severity: medium
    issue: «procedentes de él» es poco ágil en la línea principal.
    rationale: Aunque fiel al sentido de procedencia, la frase suena pesada en español bíblico continuo. Una forma más breve mejora la legibilidad sin perder el referente.
  - severity: medium
    issue: «el holocausto regular» no es la mejor formulación española para הַתָּמִיד.
    rationale: En español bíblico y eclesial, «continuo» comunica mejor el tecnicismo cultual de התמיד que «regular», y armoniza con la nota que preserva «regular/continuo».
  - severity: low
    issue: La nota b empieza con comillas y comilla simple extraña.
    rationale: 'La puntuación de la nota está descuidada: "''Hebreo..." debería normalizarse para buena presentación editorial.'
  revised_spanish_text: Y fuerzas de él[a] se levantarán, y profanarán el santuario fortaleza[b], y quitarán el holocausto continuo[c], y pondrán la abominación desoladora[d].
  revised_footnotes:
