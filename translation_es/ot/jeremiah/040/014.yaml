revisions:
- from: 'Y le dijeron: «¿De veras sabes que Baalis, rey de los amonitas, ha enviado a Ismael hijo de Netanías para quitarte la vida?» Pero Gedalías hijo de Ahicam no les creyó.'
  to: 'Y le dijeron[b]: «¿De veras sabes[a] que Baalis, rey de los amonitas, ha enviado a Ismael hijo de Netanías para quitarte la vida[b]?» Pero Gedalías hijo de Ahicam no les creyó.'
  rationale: Se conserva el texto base casi intacto, pero se añaden las notas léxicas exigidas por el audit trail inglés para la pregunta enfática y el modismo de muerte. El marcador [b] también se coloca en «le dijeron» para reflejar la ubicación de la nota en la traducción auditada y en «quitarte la vida» como anclaje principal del modismo literal. No se requiere adjudicación adicional.
