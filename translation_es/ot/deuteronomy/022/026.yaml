translation:
  language: es
  text: Pero a la joven no le harás nada[a]; la joven no tiene culpa que merezca la muerte. Porque, como cuando un hombre se levanta contra su prójimo y lo asesina, así es este caso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la joven no es culpable de ningún delito capital».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «así es este asunto»; es decir, este caso es comparable a un asesinato cometido por agresión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַנַּעַר
  english_pob_choice: But to the young woman
  chosen_spanish: Pero a la joven
  alternatives_spanish:
  - Y a la joven
  - Pero a la muchacha
  lexicon: HALOT
  rationale: En este contexto legal, נַעַר / נַעֲרָה se refiere a la joven comprometida del versículo anterior. ‘Joven’ conserva la referencia de edad sin volver el español áspero; ‘pero’ refleja el contraste con la pena del hombre en el contexto inmediato.
- source_word: לֹא תַעֲשֶׂה דָבָר
  english_pob_choice: you shall do nothing
  chosen_spanish: no le harás nada
  alternatives_spanish:
  - no le harás ningún daño
  - no harás nada contra ella
  lexicon: HALOT
  rationale: La fórmula expresa una prohibición legal absoluta. ‘No le harás nada’ conserva la fuerza general del hebreo sin añadir de manera explícita la idea de daño, que no está en las palabras mismas.
- source_word: אֵין לַנַּעַר חֵטְא מָוֶת
  english_pob_choice: the young woman has committed no sin deserving death
  chosen_spanish: la joven no tiene pecado de muerte
  alternatives_spanish:
  - la joven no es culpable de un delito capital
  - la joven no tiene culpa que merezca muerte
  lexicon: HALOT
  rationale: ‘Pecado de muerte’ reproduce más de cerca la construcción hebrea ‘pecado de muerte’. Se mantiene la tensión legal sin reemplazarla del todo por una explicación interpretativa; el lector español puede entenderlo como una falta que merece la pena capital.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la sentencia anterior. ‘Porque’ es natural en español y conserva la función causal.
- source_word: כַּאֲשֶׁר יָקוּם אִישׁ עַל רֵעֵהוּ
  english_pob_choice: when a man rises against his neighbor
  chosen_spanish: como cuando un hombre se levanta contra su prójimo
  alternatives_spanish:
  - como cuando un hombre se alza contra su semejante
  - como cuando un hombre se levanta contra su vecino
  lexicon: HALOT
  rationale: ‘Se levanta contra’ sigue la imagen verbal del hebreo y el paralelo con el caso de agresión. ‘Prójimo’ es una opción bíblico-jurídica amplia para רֵעַ y evita reducirlo a ‘vecino’ en sentido meramente local.
- source_word: וּרְצָחוֹ נֶפֶשׁ
  english_pob_choice: and murders him
  chosen_spanish: y le quita la vida
  alternatives_spanish:
  - y lo asesina
  - y lo mata
  lexicon: HALOT
  rationale: רצח apunta a homicidio ilícito, pero en español ‘asesina’ puede sonar demasiado técnico o fuerte según el registro. ‘Le quita la vida’ comunica el resultado homicida en lenguaje digno y natural, aunque no reproduce de forma literal el verbo especializado.
- source_word: כֵּן הַדָּבָר הַזֶּה
  english_pob_choice: this case is like
  chosen_spanish: así es este asunto
  alternatives_spanish:
  - así es este caso
  - de igual modo es este asunto
  lexicon: HALOT
  rationale: ‘Asunto’ traduce דָּבָר en su sentido jurídico de ‘caso/materia’. ‘Así es’ conserva la conclusión comparativa del hebreo, sin forzar una fórmula legal rígida en español.
theological_decisions:
- issue: Naturaleza de la inocencia de la joven en la analogía legal
  english_pob_reading: The verse states that the young woman bears no guilt warranting punishment in this case.
  chosen_spanish_reading: El versículo afirma que la joven no tiene una culpa que amerite la pena de muerte en este caso.
  alternative_spanish_readings:
  - El versículo afirma una inocencia moral absoluta sin matiz jurídico
  - El versículo se refiere solo a ausencia de responsabilidad penal
  rationale: El hebreo usa una fórmula legal (‘pecado de muerte’) que funciona dentro del caso judicial. La redacción española conserva ese peso jurídico y evita ampliar el alcance más allá del contexto inmediato.
  doctrine_reference: 'Principio de fidelidad semántica y judicial: no introducir conclusiones doctrinales que el texto no exige.'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente sin cambios sustanciales: el pasaje quedó estable y el acuerdo de revisión fue alto, con solo observaciones menores. La presente versión conserva el paralelismo legal y la relación causal del hebreo, ajustando el español para una lectura pública fluida.'
  spanish_consistency_notes:
  - Se mantuvo ‘joven’ para נַעַר / נַעֲרָה en contexto legal, coherente con la línea de la POB en textos afines.
  - Se tradujo רֵעַ como ‘prójimo’ para preservar amplitud relacional y evitar una restricción geográfica innecesaria.
  - Se evitó ‘SEÑOR’ y no hay términos del pacto divino en este versículo.
  - ‘Pecado de muerte’ conserva la tensión léxica del hebreo en vez de reemplazarla por una sola explicación judicial.
  - ‘Le quita la vida’ mantiene naturalidad en español para el homicidio ilícito sin perder el sentido de רצח.
