translation:
  language: es
  text: Él dirigirá el golpe de su ariete contra tus murallas, y con sus hachas[a] derribará tus torres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «con sus espadas» o «con sus herramientas de hierro», si la frase final se entiende de manera más general como referencia a armas o implementos de asedio y no literalmente a espadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְחִי
  english_pob_choice: the blow
  chosen_spanish: el golpe
  alternatives_spanish:
  - el impacto
  - el golpeo
  lexicon: HALOT
  rationale: El sustantivo denota un golpe o impacto; «el golpe» conserva la imagen de asalto sin volverla más abstracta de lo que permite el hebreo.
- source_word: קָבַלּוֹ
  english_pob_choice: his battering ram
  chosen_spanish: su ariete
  alternatives_spanish:
  - su ariete de asedio
  - su máquina de asedio
  lexicon: HALOT
  rationale: En contexto de sitio, el término apunta a un implemento para batir muros. «Ariete» comunica de forma natural y fiel la función militar.
- source_word: יִתֵּן
  english_pob_choice: will direct
  chosen_spanish: dirigirá
  alternatives_spanish:
  - pondrá
  - aplicará
  - dirigirá contra
  lexicon: HALOT
  rationale: El hebreo literalmente dice «pondrá/dará», pero en español el verbo transmite mejor la acción idiomática de aplicar el ariete contra la muralla.
- source_word: בְּחֹמוֹתַיִךְ
  english_pob_choice: against your walls
  chosen_spanish: contra tus murallas
  alternatives_spanish:
  - contra tus muros
  - sobre tus murallas
  lexicon: HALOT
  rationale: «Murallas» preserva el sentido fortificado del término y suena natural en español en un contexto de asedio.
- source_word: וּמִגְדְּלֹתַיִךְ
  english_pob_choice: your towers
  chosen_spanish: tus torres
  alternatives_spanish:
  - tus bastiones
  - tus torres defensivas
  lexicon: HALOT
  rationale: El sustantivo se refiere a torres defensivas; «torres» es la equivalencia directa y clara.
- source_word: יִתֹּץ
  english_pob_choice: will tear down
  chosen_spanish: derribará
  alternatives_spanish:
  - demolerá
  - abatirá
  lexicon: HALOT
  rationale: El verbo significa derribar o demoler. «Derribará» es preciso, natural y mantiene la fuerza destructiva.
- source_word: בְּחַרְבוֹתָיו
  english_pob_choice: with his axes
  chosen_spanish: con sus hachas
  alternatives_spanish:
  - con sus espadas
  - con sus herramientas de hierro
  lexicon: HALOT
  rationale: Aunque el consonantal puede sugerir «espadas», el contexto de demolición favorece la lectura de implementos de derribo. «Hachas» refleja esa tensión contextual sin ocultarla.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que cambió el último miembro de «swords» a «axes» por razones contextuales. Se preserva la imagen bélica del texto hebreo y se explicita en nota la alternativa tradicional de «espadas».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - Se usa «ariete» para קָבַלּוֹ porque en español bíblico moderno comunica mejor la función del instrumento de asedio que un calco como «máquina de guerra».
  - Se prefirió «murallas» frente a «muros» por el tono fortificado del asedio y por correspondencia con el registro del pasaje.
  - No se fuerza una armonización con lecturas más tradicionales si el contexto militar sugiere otra herramienta de demolición; por eso se anota la tensión entre «hachas» y «espadas».
