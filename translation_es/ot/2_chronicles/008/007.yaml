translation:
  language: es
  text: En cuanto a todo el pueblo que quedó de los hititas, los amorreos, los ferezeos, los heveos y los jebuseos, que no eran de Israel[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no eran israelitas». El hebreo dice más literalmente: «que no eran de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - la totalidad del pueblo
  lexicon: HALOT
  rationale: כָּל con הָעָם expresa el conjunto total del grupo en vista. «Todo el pueblo» conserva la fuerza colectiva y resulta natural en español bíblico moderno.
- source_word: הַנּוֹתָר
  english_pob_choice: who were left
  chosen_spanish: que quedó
  alternatives_spanish:
  - que permaneció
  - que fue dejado
  lexicon: HALOT
  rationale: El participio nifal de יתר/נותר indica los que quedaron como remanente. «Que quedó» comunica bien la idea de resto sobreviviente sin forzar un calco.
- source_word: מִן
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - entre
  - procedente de
  lexicon: HALOT
  rationale: Aquí מִן señala origen o procedencia respecto de los pueblos enumerados. En español, «de» es la forma más natural para ese valor relacional.
- source_word: הַחִתִּי וְהָאֱמֹרִי וְהַפְּרִזִּי וְהַחִוִּי וְהַיְבוּסִי
  english_pob_choice: the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites
  chosen_spanish: los hititas, los amorreos, los ferezeos, los heveos y los jebuseos
  alternatives_spanish:
  - los heteos, los amorreos, los perizitas, los heveos y los jebuseos
  - los hititas, los amorreos, los perizitas, los hivitas y los jebuseos
  lexicon: HALOT
  rationale: Se conservan los etnónimos tradicionales más reconocibles en español bíblico, ajustando la transliteración a formas usuales y legibles. Se mantiene el plural para reflejar que en hebreo estos nombres funcionan colectivamente como pueblos.
- source_word: אֲשֶׁר לֹא מִיִּשְׂרָאֵל הֵמָּה
  english_pob_choice: who were not from Israel
  chosen_spanish: que no eran de Israel
  alternatives_spanish:
  - que no eran israelitas
  - que no procedían de Israel
  lexicon: HALOT
  rationale: La construcción hebrea preserva la idea de procedencia con מִן, y la POB inglesa evita estrecharla a una etiqueta étnica más explícita. «Que no eran de Israel» mantiene esa ambigüedad controlada en español.
theological_decisions:
- issue: Identidad de los pueblos enumerados como no israelitas
  english_pob_reading: who were not from Israel
  chosen_spanish_reading: que no eran de Israel
  alternative_spanish_readings:
  - que no eran israelitas
  - que no procedían de Israel
  rationale: La frase española conserva la tensión entre identidad de pertenencia y procedencia geográfica/relacional sin convertirla en una definición más fuerte de la que exige el hebreo.
  doctrine_reference: Fidelidad al sentido histórico-gramatical; no doctrinally loaded wording beyond the source.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] directamente en el texto base, de modo que toda nota al pie quede anclada en la traducción publicada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - Se eligió «de Israel» para conservar la preposición de procedencia del hebreo sin sobretraducir.
  - Los etnónimos se mantienen en plural como nombres colectivos de pueblos.
