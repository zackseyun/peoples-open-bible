translation:
  language: es
  text: A Egipto le hemos dado la mano, y a Asiria[a], para saciarnos de pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hemos dado una mano a Egipto y Asiria»; es decir, nos hemos sometido a ellos, hemos buscado alianza con ellos, o hemos apelado a ellos en busca de ayuda.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Egypto
  lexicon: HALOT
  rationale: Es un nombre propio geográfico; en español bíblico moderno la forma natural y transparente es «Egipto».
- source_word: נָתַנּוּ יָד
  english_pob_choice: have given the hand
  chosen_spanish: hemos dado la mano
  alternatives_spanish:
  - hemos extendido la mano
  - hemos rendido la mano
  - nos hemos sometido
  lexicon: HALOT
  rationale: 'La imagen literal de «dar la mano» conserva el hebraísmo y permite la ambigüedad idiomática documentada por la nota inglesa: sometimiento, alianza o petición de ayuda. El presente perfecto en español refleja la acción pasada con efecto vigente en el lamento.'
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Assiria
  lexicon: HALOT
  rationale: Nombre propio histórico; «Asiria» es la forma estándar en español.
- source_word: לִשְׂבֹּעַ
  english_pob_choice: to get enough
  chosen_spanish: para saciarnos
  alternatives_spanish:
  - para quedar satisfechos
  - para tener suficiente
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad; «saciarnos» comunica bien el sentido de שבע con el sustantivo «pan», manteniendo la imagen concreta de quedar alimentados. En español, «para obtener suficiente» sería más explicativo pero menos natural.
- source_word: לָחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «pan», como en el hebreo, porque el contexto de hambre hace más vívida la imagen y evita diluirla en un término genérico.
theological_decisions:
- issue: Sentido del modismo «dar la mano»
  english_pob_reading: submitted to them, sought alliance with them, or appealed to them for help
  chosen_spanish_reading: hemos dado la mano
  alternative_spanish_readings:
  - nos hemos sometido a ellos
  - hemos buscado alianza con ellos
  - hemos apelado a ellos en busca de ayuda
  rationale: La versión principal mantiene la expresión idiomática sin decidir una sola interpretación, igual que el texto inglés con su nota. La ambigüedad es real y debe quedar visible para el lector.
  doctrine_reference: Lamentations 5:6; uso idiomático hebreo נתן יד
translation_notes:
  revision_awareness: Coincide con el texto hebreo y con la lectura auditada en inglés; se preserva la imagen idiomática de נתן יד y la finalidad de שבע + לָחֶם sin añadir explicaciones al cuerpo del versículo.
  spanish_consistency_notes:
  - Se usó «Egipto» y «Asiria» como nombres propios estándar en español.
  - Se prefirió el presente perfecto «hemos dado» para conservar el valor de acción pasada con relevancia presente en el lamento.
  - «Pan» mantiene la concreción del hebreo frente a un genérico como «alimento».
  - La nota al pie conserva la ambigüedad interpretativa documentada por la POB inglesa.
