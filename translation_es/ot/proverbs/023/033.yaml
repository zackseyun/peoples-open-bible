base_translation:
  language: en
  yaml_path: translation/ot/proverbs/023/033.yaml
  text: Your eyes will see strange things[b][a], and your heart will speak perverse things.
  footnotes:
  - marker: a
    text: Or 'strange women.' The Hebrew זָרוֹת can, in some contexts, refer to foreign or illicit women; here it may also be understood more generally as strange or distorted sights brought on by intoxication.
    reason: alternative_reading
  - marker: b
    text: Or 'twisted things' or 'crooked things.' The Hebrew תַּהְפֻּכוֹת refers to what is distorted or perverse, especially in speech.
    reason: lexical_alternative
