revisions:
- from: Y en el quinto año comerán su fruto, para que les aumente su cosecha. Yo soy Yahvé, su Dios.
  to: Y en el quinto año podrán comer su fruto, para que su producción les aumente. Yo soy Yahvé, su Dios.
  rationale: Se ajusta el verbo principal a «podrán comer» para reflejar el permiso legal del hebreo, y se sustituye «cosecha» por «producción» para conservar la amplitud de תְּבוּאָה y distinguirla de «fruto». No se requieren notas al pie porque no queda una ambigüedad nueva en español.
