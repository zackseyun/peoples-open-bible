translation:
  language: es
  text: Y si el que la consagró[a] redime su casa, añadirá una quinta parte de la plata de tu valuación a ella[b], y será suya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que la dedicó» o «el que la santificó».
    reason: lexical_alternative
  - marker: b
    text: Es decir, añadirá un quinto al valor tasado en plata según la valuación fijada por el sacerdote.
    reason: cultural_note
lexical_decisions:
- source_word: הַמַּקְדִּישׁ
  english_pob_choice: the one who consecrated it
  chosen_spanish: el que lo consagró
  alternatives_spanish:
  - el que lo dedicó
  - el que lo santificó
  lexicon: HALOT
  rationale: El participio de קדשׁ aquí designa a la persona que apartó la casa para uso sagrado en el marco legal de Levítico 27. «Consagró» conserva ese sentido cultual y suena natural en español; «dedicó» es posible, pero atenúa la fuerza sagrada; «santificó» es válido, aunque menos usual en este contexto legal.
- source_word: יִגְאַ֖ל
  english_pob_choice: redeems
  chosen_spanish: redime
  alternatives_spanish:
  - rescata
  - recompra
  lexicon: HALOT
  rationale: גאל expresa la recuperación de una posesión mediante pago en un contexto legal-sacral. «Redime» preserva el registro formal y la idea de recuperación por precio; «rescata» y «recompra» comunican la acción, pero son menos precisas o menos adecuadas al tono del pasaje.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa misma
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su casa». En un texto de valoración de propiedad, «casa» es más preciso que «hogar», que sonaría más doméstico que jurídico.
- source_word: וְיָסַף
  english_pob_choice: he shall add
  chosen_spanish: añadirá
  alternatives_spanish:
  - deberá añadir
  - agregará
  lexicon: HALOT
  rationale: La forma verbal tiene fuerza obligatoria en esta instrucción legal. «Añadirá» mantiene el matiz normativo sin volver la frase pesada en español; «deberá añadir» lo explicita más, pero suena menos directo.
- source_word: חֲמִישִׁית
  english_pob_choice: a fifth
  chosen_spanish: una quinta parte
  alternatives_spanish:
  - un quinto
  - veinte por ciento
  lexicon: HALOT
  rationale: El sustantivo indica una quinta parte. «Una quinta parte» es claro y natural en español; «un quinto» también sería correcto, pero suena más abstracto; «veinte por ciento» moderniza demasiado el registro.
- source_word: כֶּסֶף עֶרְכְּךָ
  english_pob_choice: the silver of your valuation
  chosen_spanish: del plata de tu valuación
  alternatives_spanish:
  - del dinero de tu valuación
  - de la plata conforme a tu valuación
  - del valor tasado por ti
  lexicon: HALOT
  rationale: כֶּסֶף significa literalmente «plata» y, por extensión, dinero; aquí conviene conservar la concreción material del hebreo. «Tu valuación» refleja עֶרְכְּךָ, la valuación fijada en el marco del capítulo. Si se prefiriera una fluidez mayor, «de la plata conforme a tu valuación» sería una alternativa válida, pero aquí se retiene la relación más cercana al hebreo.
- source_word: עָלָיו
  english_pob_choice: to it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - a ella
  - encima de ella
  - además de ella
  lexicon: HALOT
  rationale: En este contexto עַל expresa adición respecto de la suma tasada. «Sobre ella» reproduce la imagen preposicional del hebreo y, en español jurídico, puede entenderse como «añadido a ella». «Además de ella» es más explícito, pero menos literal.
- source_word: וְהָיָה לוֹ
  english_pob_choice: it shall be his
  chosen_spanish: y será suya
  alternatives_spanish:
  - y le pertenecerá
  - y quedará en su poder
  lexicon: HALOT
  rationale: 'La cláusula final expresa el resultado de la redención: la casa vuelve a ser de él. «Será suya» es breve, formal y fiel; «le pertenecerá» aclara la propiedad, pero suena más interpretativo.'
theological_decisions:
- issue: Término cultual para alguien que aparta una propiedad a Yahvé
  english_pob_reading: consecrated
  chosen_spanish_reading: consagró
  alternative_spanish_readings:
  - dedicó
  - santificó
  rationale: En Levítico 27 el acto pertenece al sistema de dedicaciones y valuaciones sagradas. «Consagró» conserva la fuerza cultual sin imponer una terminología eclesiástica posterior; además evita diluir el acto en un simple gesto de entrega.
  doctrine_reference: Primacía del texto original y preservación del registro legal-cultual de Levítico 27.
- issue: Renderización de כֶּסֶף como metal/precio concreto o como dinero abstracto
  english_pob_reading: silver
  chosen_spanish_reading: plata
  alternative_spanish_readings:
  - dinero
  - moneda
  rationale: El hebreo usa la concreción de «plata» para hablar del pago tasado. En español, «plata» mantiene esa imagen material; «dinero» sería más general, pero perdería la textura léxica del original.
  doctrine_reference: Respeto a la concreción semántica del hebreo en leyes de valoración.
translation_notes:
  revision_awareness: 'Se refleja el estado final sin cambios reportados en el audit trail: la lectura inglesa fue confirmada con alta concordancia y sin revisiones aplicadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto fuente lo requiere; aquí no aparece el Tetragrámaton de forma explícita en la unidad.
  - Se conserva «consagró» para el participio cultual y «redime» para גאל, manteniendo el registro legal-sacral.
  - «Plata» se mantiene como equivalente concreto de כֶּסֶף, en continuidad con la decisión auditada en inglés.
  - Se ha evitado una paráfrasis expansiva; la sintaxis española sigue de cerca la estructura condicional del hebreo sin caer en calco rígido.
