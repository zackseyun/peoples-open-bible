translation:
  language: es
  text: 'Y Manasés tuvo en Isacar y en Aser Bet-seán y sus aldeas[a], y Ibleam y sus aldeas, y los habitantes de Dor y sus aldeas, y los habitantes de En-dor y sus aldeas, y los habitantes de Taanac y sus aldeas, y los habitantes de Meguido y sus aldeas: las tres regiones[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sus hijas»; modismo hebreo para aldeas o asentamientos dependientes de una ciudad principal.
    reason: cultural_note
  - marker: b
    text: La expresión hebrea final es difícil; también puede entenderse como «los tres distritos» o «las tres provincias».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי לִמְנַשֶּׁה
  english_pob_choice: And Manasseh had
  chosen_spanish: Y Manasés tuvo
  alternatives_spanish:
  - Y perteneció a Manasés
  - Y había para Manasés
  lexicon: HALOT
  rationale: La construcción ויהי ל introduce la asignación posesiva/hereditaria de territorio. «Tuvo» comunica de manera natural en español que estas ciudades quedaron dentro de la porción de Manasés, sin perder el sentido de posesión/alotamiento.
- source_word: בְּיִשָּׂשכָר וּבְאָשֵׁר
  english_pob_choice: in Issachar and in Asher
  chosen_spanish: en Isacar y en Aser
  alternatives_spanish:
  - dentro de Isacar y de Aser
  - entre Isacar y Aser
  lexicon: HALOT
  rationale: El ב indica ubicación territorial dentro de los dominios de esas tribus. Mantener «en» conserva la relación espacial de pertenencia geográfica.
- source_word: בֵּית שְׁאָן
  english_pob_choice: Beth-shean
  chosen_spanish: Bet-seán
  alternatives_spanish:
  - Bet Shan
  - Beit-seán
  lexicon: HALOT
  rationale: Se sigue una transliteración habitual en español bíblico. «Bet-seán» es clara, reconocible y respeta la forma hebrea del topónimo.
- source_word: בְנוֹתֶיהָ
  english_pob_choice: its daughter villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus aldeas hijas
  - sus asentamientos dependientes
  - sus pueblos
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal «sus hijas» para aldeas o poblados dependientes. En español, «sus aldeas» comunica el referente sin sonar forzado; la metáfora se preserva en nota.
- source_word: יִבְלְעָם
  english_pob_choice: Ibleam
  chosen_spanish: Ibleam
  alternatives_spanish:
  - Jibleam
  lexicon: HALOT
  rationale: Topónimo transliterado de forma estándar.
- source_word: אֶת יֹשְׁבֵי דֹאר
  english_pob_choice: the inhabitants of Dor
  chosen_spanish: los habitantes de Dor
  alternatives_spanish:
  - los moradores de Dor
  - los que habitaban Dor
  lexicon: HALOT
  rationale: יֹשְׁבֵי designa a los que habitan en un lugar. «Los habitantes de Dor» es conciso y fiel, y conserva el valor participial del hebreo.
- source_word: עֵין דֹּר
  english_pob_choice: En-dor
  chosen_spanish: En-dor
  alternatives_spanish:
  - Endor
  lexicon: HALOT
  rationale: Se mantiene la forma compuesta del topónimo, habitual en español bíblico.
- source_word: תַעְנַךְ
  english_pob_choice: Taanach
  chosen_spanish: Taanac
  alternatives_spanish:
  - Ta'anac
  - Taanaj
  lexicon: HALOT
  rationale: Se opta por una transliteración española que refleja la pronunciación y evita una forma excesivamente anglicada.
- source_word: מְגִדּוֹ
  english_pob_choice: Megiddo
  chosen_spanish: Meguido
  alternatives_spanish:
  - Megiddo
  lexicon: HALOT
  rationale: «Meguido» es una transliteración natural en español, acorde con la fonética y el uso bíblico castellano.
- source_word: שְׁלֹשֶׁת הַנָּפֶת
  english_pob_choice: the three regions
  chosen_spanish: las tres regiones
  alternatives_spanish:
  - los tres distritos
  - las tres provincias
  lexicon: HALOT
  rationale: La expresión es difícil. La auditoría inglesa entendió נפת como un término geográfico/administrativo, no como «alturas». En español, «regiones» conserva esa ambigüedad sin imponer una lectura más precisa de la que el hebreo garantiza.
theological_decisions:
- issue: El sentido de pertenencia territorial de las ciudades frente a una simple ubicación geográfica
  english_pob_reading: And Manasseh had ...
  chosen_spanish_reading: Y Manasés tuvo ...
  alternative_spanish_readings:
  - Y perteneció a Manasés ...
  - Y había para Manasés ...
  rationale: Se conserva la idea de asignación tribal, no solo ubicación accidental. La forma escogida refleja posesión dentro del reparto de la tierra, que es el foco narrativo del pasaje.
  doctrine_reference: Josué 13–21; distribución de la tierra por herencia tribal
- issue: La frase final ambigua sobre הַנָּפֶת
  english_pob_reading: the three regions
  chosen_spanish_reading: las tres regiones
  alternative_spanish_readings:
  - los tres distritos
  - las tres provincias
  rationale: La evidencia disponible no permite fijar con certeza si se trata de regiones, distritos o una unidad administrativa particular. «Regiones» mantiene la ambigüedad documentada por el análisis inglés sin reducirla a un término más específico de lo que la fuente permite.
  doctrine_reference: Principios de traducción lexical y preservación de ambigüedad semántica
translation_notes:
  revision_awareness: La auditoría inglesa pasó de «the three heights» a «the three regions» tras una revisión que entendió הַנָּפֶת como término de distrito/región y no como referencia topográfica. Esta versión española sigue esa decisión revisada y evita introducir una lectura más específica. También mantiene la secuencia de topónimos y el patrón repetido de «sus aldeas» conforme al modismo hebreo documentado.
  spanish_consistency_notes:
  - Se usa «Manasés» para la tribu, siguiendo la forma bíblica habitual en español.
  - 'Se conservan transliteraciones estables: Bet-seán, En-dor, Taanac, Meguido.'
  - Se evita sustituir el nombre divino o introducir terminología doctrinal ajena al verso.
  - La puntuación con raya larga reproduce el cierre explicativo del hebreo y del inglés auditado.
