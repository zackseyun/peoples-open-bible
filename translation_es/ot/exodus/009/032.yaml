translation:
  language: es
  text: Pero el trigo y la espelta[b] no fueron golpeados, porque maduraban tarde[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el trigo y la espelta no fueron golpeados, porque maduran tarde».'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para «espelta» puede referirse a un cereal emparentado, como el emmer.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַחִטָּה
  english_pob_choice: But the wheat
  chosen_spanish: Pero el trigo
  alternatives_spanish:
  - Y el trigo
  lexicon: HALOT
  rationale: חִטָּה designa el trigo. Conservar «Pero» refleja en español el contraste contextual que la POB inglesa marcaba con «But», aunque el hebreo lleve una simple conjunción, y mantiene la fluidez natural en la narración de la plaga.
- source_word: וְהַכֻּסֶּמֶת
  english_pob_choice: and the spelt
  chosen_spanish: y la espelta
  alternatives_spanish:
  - y el emmer
  - y el centeno
  lexicon: HALOT
  rationale: כֻּסֶּמֶת se refiere a un cereal tradicionalmente entendido como espelta o emmer. «Espelta» es la opción más reconocible y precisa en español moderno; «centeno» se evita por ser menos probable botánicamente.
- source_word: לֹא נֻכּוּ
  english_pob_choice: were not struck down
  chosen_spanish: no fueron golpeados
  alternatives_spanish:
  - no fueron heridos
  - no fueron dañados
  lexicon: HALOT
  rationale: El pasivo de נכה comunica que estos cultivos no recibieron el golpe del granizo/plaga. «Golpeados» conserva el campo semántico de juicio y violencia mejor que «dañados», y suena más natural que un calco rígido.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la razón de la exención de daño. «Porque» expresa con claridad la causalidad en español contemporáneo.
- source_word: אֲפִילֹת הֵנָּה
  english_pob_choice: they were late-ripening
  chosen_spanish: eran tardías
  alternatives_spanish:
  - maduraban tarde
  - aún estaban tiernas
  - no estaban aún en espiga
  lexicon: HALOT
  rationale: La expresión hebrea indica que estaban en una fase tardía o atrasada de desarrollo, razón por la cual el granizo no las destruyó. «Eran tardías» mantiene la brevedad y la idea agrícola sin forzar una explicación más interpretativa.
translation_notes:
  revision_awareness: El pasaje hebreo y la auditoría inglesa están en alto acuerdo; no se registran revisiones aplicadas. La decisión principal en español fue mantener el contraste inicial y una fórmula agrícola breve para אֲפִילֹת הֵנָּה, sin añadir información ajena al texto.
  spanish_consistency_notes:
  - Se conservó «trigo» y «espelta» como nombres comunes de cereales en español neutro.
  - «Golpeados» retiene el registro de juicio de נכה sin introducir una interpretación excesiva.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
