theological_decisions:
- issue: Divine title in a verse with mixed witnesses (ה׳ / אלהים / אדני; Greek κύριος)
  chosen_reading: the Lord in the first clause; God in the second clause
  alternative_readings:
  - the Lord in both clauses
  - God in both clauses
  rationale: The primary Hebrew text explicitly has ה׳ in the first clause and אלהים in the second. The Greek uses κύριος in both places, and Masada reportedly has אדני in the second clause. Retaining 'the Lord' then 'God' follows the main Hebrew witness while preserving the verse's parallelism and source transparency.
  doctrine_reference: 'DOCTRINE.md: translate titles; transliterate names; κύριος → Lord'
