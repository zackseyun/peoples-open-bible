translation:
  language: es
  text: ¿No será dentro de muy poco[a] que Líbano se volverá un vergel[b], y el vergel será considerado un bosque?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en muy poco tiempo». El hebreo intensifica la brevedad con una serie equivalente a «aún / poco / poquísimo».
    reason: lexical_alternative
  - marker: b
    text: O «campo fértil» para «vergel». El hebreo כַּרְמֶל denota tierra fértil y cultivada; «vergel» se escoge para mantener el contraste vívido con «bosque».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No es... ?
  alternatives_spanish:
  - ¿Acaso no es... ?
  - ¿No será... ?
  lexicon: HALOT
  rationale: La pregunta retórica hebrea pide una respuesta afirmativa. En español, «¿No es... ?» conserva mejor el tono interrogativo directo que una afirmación enfática sin pregunta.
- source_word: עוֹד מְעַט מִזְעָר
  english_pob_choice: yet a very little while
  chosen_spanish: aún por un muy poco
  alternatives_spanish:
  - todavía por muy poco tiempo
  - en muy poquito tiempo
  lexicon: HALOT
  rationale: Los tres elementos intensifican la brevedad. «Aún» reproduce עוֹד, y «por un muy poco» mantiene la idea temporal y la acumulación enfática sin volverlo demasiado explicativo.
- source_word: וְשָׁב
  english_pob_choice: will turn into
  chosen_spanish: se volverá
  alternatives_spanish:
  - se convertirá en
  - vendrá a ser
  lexicon: HALOT
  rationale: שוב aquí expresa cambio de estado. En español, «se volverá» comunica transformación de modo natural y evita el matiz engañoso de «regresará».
- source_word: לְבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: el Líbano
  alternatives_spanish:
  - Líbano
  lexicon: HALOT
  rationale: Es el nombre propio geográfico; el artículo es natural en español y conserva la referencia del texto.
- source_word: כַּרְמֶל
  english_pob_choice: orchard
  chosen_spanish: vergel
  alternatives_spanish:
  - huerto
  - campo fértil
  lexicon: HALOT
  rationale: כַּרְמֶל designa tierra fértil y cultivada. «Vergel» comunica fruto, cultivo y belleza, y mantiene bien el contraste con «bosque» sin fijar indebidamente una sola especie de cultivo.
- source_word: וְהַכַּרְמֶל
  english_pob_choice: and the orchard
  chosen_spanish: y el vergel
  alternatives_spanish:
  - y el campo fértil
  - y el huerto
  lexicon: HALOT
  rationale: Se mantiene la misma elección léxica para el sustantivo repetido, preservando la simetría del hebreo.
- source_word: לַיַּעַר
  english_pob_choice: as a forest
  chosen_spanish: un bosque
  alternatives_spanish:
  - como bosque
  - en bosque
  lexicon: HALOT
  rationale: 'Con יֵחָשֵׁב la idea es de clasificación/valoración: será contado como. En español, «un bosque» funciona de forma natural con «ser considerado».'
- source_word: יֵחָשֵׁב
  english_pob_choice: will be regarded
  chosen_spanish: será considerado
  alternatives_spanish:
  - será reputado
  - será tenido por
  lexicon: HALOT
  rationale: El nifal de חשב expresa ser contado o estimado. «Será considerado» conserva el matiz evaluativo de manera clara y moderna.
theological_decisions:
- issue: Alcance de la imagen de transformación
  english_pob_reading: Render the verse as a rhetorical announcement of dramatic reversal in the land's condition without specifying whether the change is literal, metaphorical, or both.
  chosen_spanish_reading: Presentar el versículo como anuncio retórico de una reversión drástica, sin decidir si el cambio es literal, metafórico o ambos.
  alternative_spanish_readings:
  - Interpretarlo como una transformación agrícola literal.
  - Interpretarlo como una reversión principalmente simbólica o espiritual.
  rationale: El hebreo comunica una inversión sorprendente y esperanzada, pero no obliga a fijar un único nivel de referente. La traducción debe preservar la imagen y no resolver la tensión interpretativa que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del contexto en inglés; no hubo cambios posteriores indicados y el contenido se mantuvo estable.
  spanish_consistency_notes:
  - Se evitó traducir mecánicamente «will turn into» como «volverá a» para no introducir un falso sentido de retorno.
  - «Vergel» se eligió como equivalente español de un terreno fértil y cultivado, en lugar de forzar el nombre propio «Carmelo», porque el contexto léxico apunta al sustantivo común כַּרְמֶל.
  - Se mantuvo el contraste imagístico con «bosque» y la valoración pasiva con «será considerado» para reflejar la estructura del hebreo.
