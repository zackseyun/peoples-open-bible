translation:
  language: es
  text: Al día siguiente[a], los filisteos fueron a despojar a los caídos, y encontraron a Saúl y a sus tres hijos caídos en el monte Gilboa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a despojar a los muertos» o «a despojar a los caídos en batalla». El verbo hebreo se refiere a quitar la ropa o la armadura de los muertos en combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּחֳרָת
  english_pob_choice: The next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - El día siguiente
  - Al siguiente día
  - Al otro día
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo temporal que señala el día posterior a los hechos narrados. «Al día siguiente» transmite esa secuencia de manera natural en español y conserva el sentido narrativo.
- source_word: לְפַשֵּׁט
  english_pob_choice: to strip
  chosen_spanish: despojar
  alternatives_spanish:
  - quitar
  - desnudar
  - saquear
  lexicon: HALOT
  rationale: En este contexto bélico, el verbo se refiere a quitar ropa o armadura a los muertos en combate. «Despojar» mantiene la idea de quitar objetos o vestiduras y funciona bien con el complemento «a los caídos»; además evita una literalidad innecesariamente áspera en español sin perder la fuerza del acto.
- source_word: הַחֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: a los caídos
  alternatives_spanish:
  - a los muertos
  - a los muertos en combate
  - a los caídos en batalla
  lexicon: HALOT
  rationale: El término se refiere a los muertos en guerra. «Caídos» preserva el matiz militar y permite un español fluido; el contexto deja claro que se trata de muertos en batalla.
- source_word: וַיִּמְצְאוּ
  english_pob_choice: they found
  chosen_spanish: encontraron
  alternatives_spanish:
  - hallaron
  - dieron con
  - descubrieron
  lexicon: HALOT
  rationale: Es el verbo narrativo simple de hallazgo. «Encontraron» reproduce bien la sucesión wayyiqtol y es la opción más natural en español.
- source_word: נֹפְלִים
  english_pob_choice: fallen
  chosen_spanish: caídos
  alternatives_spanish:
  - caídos por tierra
  - tendidos
  - derrotados
  lexicon: HALOT
  rationale: El participio conserva la imagen de haber caído en combate. «Caídos» mantiene esa imagen y se alinea con el uso previo de «los caídos» para evitar una repetición forzada pero clara.
- source_word: בְּהַר הַגִּלְבֹּעַ
  english_pob_choice: on Mount Gilboa
  chosen_spanish: en el monte Gilboa
  alternatives_spanish:
  - sobre el monte Gilboa
  - en el monte de Gilboa
  lexicon: HALOT
  rationale: La construcción locativa admite «en» en español para un lugar de hallazgo. «Monte Gilboa» es la forma geográfica idiomática y fiel al topónimo bíblico.
- source_word: שְׁלֹשֶׁת בָּנָיו
  english_pob_choice: his three sons
  chosen_spanish: a sus tres hijos
  alternatives_spanish:
  - a sus tres varones
  - a sus tres hijos varones
  lexicon: HALOT
  rationale: «בנים» puede referirse a hijos masculinos; en este pasaje el contexto ya especifica que son los tres hijos de Saúl. «Hijos» es el equivalente natural y claro en español, sin necesidad de añadir «varones».
translation_notes:
  revision_awareness: Se mantuvo la lectura y secuencia narrativa de la fuente hebrea y el criterio auditado de la POB en inglés. La principal adaptación fue elegir un verbo español que comunique el acto bélico de quitar vestiduras o armamento sin perder la concreción del hebreo. No se introdujeron cambios textuales ni variantes mayores respecto del sentido base del inglés POB.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando el texto la requiera; en este versículo no aparece.
  - Se prefirió «caídos» para mantener la imagen participial de נֹפְלִים y armonizar con el lenguaje de guerra del pasaje.
  - «Monte Gilboa» sigue el nombre propio establecido y evita una paráfrasis geográfica innecesaria.
