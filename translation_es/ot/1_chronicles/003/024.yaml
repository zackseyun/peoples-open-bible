  - Delaia
  lexicon: HALOT
  rationale: Nombre propio con terminación teofórica. Se rinde como '-ías' para preservar el componente -yāh y acomodarlo a la ortografía española.
- source_word: וַעֲנָנִי
  english_pob_choice: and Anani
