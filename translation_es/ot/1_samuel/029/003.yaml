translation:
  language: es
  text: 'Entonces los jefes filisteos dijeron: «¿Quiénes son estos hebreos?». Y Aquís dijo a los jefes filisteos: «¿No es este David, el siervo de Saúl, rey de Israel, que ha estado conmigo estos días o estos años? Y no he hallado en él nada[a], desde el día en que se pasó a mí hasta este mismo día»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «desde el día en que cayó/pasó a mí»; es decir, desde que vino conmigo o se pasó a mi bando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי פְלִשְׁתִּים
  english_pob_choice: the Philistine commanders
  chosen_spanish: los jefes filisteos
  alternatives_spanish:
  - los comandantes filisteos
  - los príncipes de los filisteos
  - los líderes filisteos
  lexicon: HALOT
  rationale: שָׂרִים designa a personas de alto rango; en este contexto militar/político, «jefes» comunica autoridad sin depender de un término demasiado técnico o arcaico. «Comandantes» sería posible, pero «jefes» suena más natural en español y conserva el matiz de autoridad dirigente.
- source_word: הָעִבְרִים הָאֵלֶּה
  english_pob_choice: What are these Hebrews?
  chosen_spanish: ¿Quiénes son estos hebreos?
  alternatives_spanish:
  - ¿Qué son estos hebreos?
  - ¿Qué pasa con estos hebreos?
  - ¿Qué hacen estos hebreos aquí?
  lexicon: HALOT
  rationale: El hebreo es elíptico y pregunta por la identidad de los presentes. En español, «¿Quiénes son estos hebreos?» expresa la misma desconfianza sin añadir un elemento interpretativo que no esté en el texto.
- source_word: הָעִבְרִים
  english_pob_choice: Hebrews
  chosen_spanish: hebreos
  alternatives_spanish:
  - israelitas
  lexicon: HALOT
  rationale: Se conserva el etnónimo específico del hebreo, no un equivalente más teológico o identificador posterior. Esto preserva la perspectiva filistea del relato.
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Aquís
  alternatives_spanish:
  - Aquis
  - Aquish
  lexicon: transliteration convention
  rationale: Se usa la transliteración castellana habitual del nombre propio, manteniendo legibilidad en español bíblico.
- source_word: הֲלֹא
  english_pob_choice: Is this not
  chosen_spanish: ¿No es este
  alternatives_spanish:
  - ¿Acaso no es este?
  - ¿No es acaso este?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. «¿No es este» reproduce bien esa fuerza en español.
- source_word: עֶבֶד
  english_pob_choice: the servant
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el servidor
  lexicon: HALOT
  rationale: Aunque en contextos de corte puede significar «siervo», el POB inglés ya dejó abierta la fuerza lexical entre esclavo/siervo pero optó por «servant» por el contexto. En español, dado el valor relacional-político aquí y la preferencia terminológica POB por «esclavo» cuando la fuerza léxica lo permite, se elige «esclavo» sin borrar que David está bajo la autoridad de Saúl.
- source_word: שָׁאוּל מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: Saul king of Israel
  chosen_spanish: Saúl, rey de Israel
  alternatives_spanish:
  - Saúl, rey de Israel
  - Saúl, el rey de Israel
  lexicon: HALOT
  rationale: Se reproduce la apposición compacta del hebreo con coma en español. No se añade un artículo innecesario para mantener la concisión del original.
- source_word: אֲשֶׁר הָיָה אִתִּי
  english_pob_choice: who has been with me
  chosen_spanish: que ha estado conmigo
  alternatives_spanish:
  - que ha estado conmigo
  - que estuvo conmigo
  lexicon: HALOT
  rationale: El perfecto verbal expresa una relación continua desde el pasado hasta el presente del discurso; el presente perfecto español lo comunica con naturalidad.
- source_word: זֶה יָמִים אוֹ זֶה שָׁנִים
  english_pob_choice: these days or these years
  chosen_spanish: estos días o estos años
  alternatives_spanish:
  - estos días o estos años
  - hace días o hace años
  lexicon: HALOT
  rationale: Se preserva la repetición enfática de זֶה con «estos» en ambos miembros, manteniendo la textura idiomática del hebreo sin sobreexplicar.
- source_word: מְאֻמָּה
  english_pob_choice: nothing in him
  chosen_spanish: nada
  alternatives_spanish:
  - nada en él
  - ninguna cosa
  - ningún mal
  lexicon: HALOT
  rationale: El POB inglés finalizó con «in him» por cercanía al hebreo; en español, «no he hallado en él nada» mantiene esa referencia sin añadir una glosa. «Nada» funciona como equivalente idiomático y permite conservar la referencia interna al sujeto.
- source_word: מִיּוֹם נָפְלוֹ
  english_pob_choice: from the day of his defecting
  chosen_spanish: desde el día en que se pasó a mí
  alternatives_spanish:
  - desde el día en que se pasó a mí
  - desde el día en que cayó ante mí
  - desde el día en que desertó
  lexicon: HALOT
  rationale: נפל con sufijo en este contexto expresa pasar de una lealtad a otra. «Se pasó a mí» conserva la ambigüedad histórica del movimiento personal/político sin introducir una interpretación demasiado moderna o militarista como «desertó».
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this very day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta este mismo día
  - hasta el día de hoy
  - hasta hoy
  lexicon: HALOT
  rationale: Es una fórmula temporal natural en español. Se elige una forma clara y solemne que mantiene el valor demostrativo del hebreo.
theological_decisions:
- issue: Reto semántico de עֶבֶד aplicado a David respecto de Saúl
  english_pob_reading: the servant of Saul king of Israel
  chosen_spanish_reading: el esclavo de Saúl, rey de Israel
  alternative_spanish_readings:
  - el siervo de Saúl, rey de Israel
  - el servidor de Saúl, rey de Israel
  rationale: No se suaviza automáticamente a «siervo». El registro POB favorece «esclavo» cuando la palabra conserva fuerza relacional fuerte; aquí David aparece bajo la autoridad de Saúl, y la traducción mantiene esa tensión sin negar la función cortesana del término.
  doctrine_reference: Uso lexical del AT; no implica una afirmación doctrinal específica.
- issue: Valor de מִיּוֹם נָפְלוֹ en contexto político-militar
  english_pob_reading: from the day of his defecting
  chosen_spanish_reading: desde el día en que se pasó a mí
  alternative_spanish_readings:
  - desde el día en que desertó
  - desde el día en que cayó ante mí
  - desde el día en que se rindió
  rationale: La frase hebrea permite una lectura de cambio de lealtad. «Se pasó a mí» conserva la idea de traslado personal/político y evita fijar de forma demasiado dura una sola paráfrasis interpretativa.
  doctrine_reference: Histórico-narrativo; no doctrinal.
- issue: Perspectiva étnica de הָעִבְרִים
  english_pob_reading: these Hebrews
  chosen_spanish_reading: estos hebreos
  alternative_spanish_readings:
  - estos israelitas
  rationale: Se retiene el término del texto y la perspectiva de los filisteos. Sustituir por «israelitas» borraría una distinción importante del relato.
  doctrine_reference: Precisión histórica y literaria del texto bíblico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: se retiró la expansión interpretativa ''doing here'' y se mantuvo una formulación más literal para la pregunta de los filisteos. También se conservó la idea revisada de ''in him'' en la cláusula final, evitando traducirla como una acusación externa (''contra él'').'
  spanish_consistency_notes:
  - Se usa «hebreos» de manera consistente para הָעִבְרִים, no «israelitas».
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el tetragrámaton.
  - Se traduce עֶבֶד con «esclavo» aquí por coherencia con la fuerza lexical preferida por POB cuando el contexto lo permite.
  - 'La transliteración de nombres propios sigue el uso castellano común: Aquís, David, Saúl.'
  - Se conserva la sintaxis narrativa con comillas y puntuación compatibles con el español bíblico moderno.
