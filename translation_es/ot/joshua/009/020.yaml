    text: La palabra hebrea puede referirse de manera general a ira, pero en este contexto probablemente implica la ira divina relacionada con la violación del juramento.
    reason: theological_note
  revision_rationale: Se elimina la pausa fuerte con dos puntos para seguir más de cerca la secuencia hebrea y la revisión auditada del POB. Se ajusta la nota [a] para conservar las alternativas léxicas documentadas, incluyendo el equivalente de «spare them». Se sustituye «a causa del» por «por el» para una causalidad más natural en español sin alterar el sentido.
