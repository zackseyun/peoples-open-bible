translation:
  language: es
  text: 'Y le dijo: «¿Quién eres tú?». Y le dije[a]: «Soy un amalecita».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite una forma verbal de «dijo» en la segunda cláusula; por el contexto, la frase debe entenderse como «y le dije», es decir, la respuesta del hablante en discurso directo.
    reason: textual_variant
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said / And I said
  chosen_spanish: y le dijo / y le dije
  alternatives_spanish:
  - le dijo / le dije
  - y dijo / y dije
  lexicon: HALOT
  rationale: El waw-consecutivo marca avance narrativo. En español, el enlace con «y» conserva la sucesión; se usa tercera persona en el primer verbo según la forma hebrea, y primera persona en el segundo por el contexto inmediato de discurso reportado, tal como en el análisis inglés.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - me dijo
  lexicon: HALOT
  rationale: El dativo de 1cs se expresa naturalmente en español con clítico indirecto «me»; «a mí» sería más enfático y no necesario aquí.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es
  lexicon: HALOT
  rationale: Interrogativo directo estándar en español para introducir la pregunta de identidad.
- source_word: אָתָּה
  english_pob_choice: are you
  chosen_spanish: eres tú
  alternatives_spanish:
  - tú eres
  lexicon: HALOT
  rationale: El hebreo presenta una pregunta copulativa elíptica; en español, «¿Quién eres tú?» comunica con naturalidad la copula implícita. Se conserva el orden interrogativo posible en español bíblico sin forzar arcaísmo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal de 3ms se resuelve con clítico dativo «le», que en español es la forma más natural para un complemento indirecto.
- source_word: עֲמָלֵקִי
  english_pob_choice: an Amalekite
  chosen_spanish: un amalecita
  alternatives_spanish:
  - amalecita
  lexicon: HALOT
  rationale: El gentilicio se traduce con artículo indefinido, como en la autodefinición en español; «amalecita» conserva el valor étnico/nacional del hebreo.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - yo soy
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente hebreo funciona para identificación explícita; en español, el verbo copulativo basta. «Soy» mantiene la afirmación de identidad sin añadir más que lo requerido.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la secuencia narrativa del primer וַיֹּאמֶר, y se adoptó la corrección contextual de la segunda forma verbal como primera persona en el habla reportada. No hubo cambios en las decisiones revisadas del POB inglés.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el texto.
  - Se preservó el gentilicio étnico con valor nominal («amalecita»), acorde con la identidad autodeclarada.
  - La puntuación con comillas angulares y el signo de interrogación inicial siguen norma española y mantienen legibilidad litúrgica.
