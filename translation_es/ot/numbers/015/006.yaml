  to: O para un carnero prepararás una ofrenda de cereal, de flor de harina mezclada con aceite, dos décimas[a], con un tercio de un hin de aceite.
  rationale: Se ajusta מִנְחָה a 'ofrenda de cereal' para reflejar con más precisión la categoría sacrificial documentada, y se reordena la frase para que 'mezclada con aceite' modifique correctamente a 'flor de harina'. Se conserva la medida elíptica 'dos décimas' con su nota cultural, así como 'hin' y el tono procedimental del original.
