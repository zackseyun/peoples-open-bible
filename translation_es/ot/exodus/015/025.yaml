translation:
  language: es
  text: Así que clamó a Yahvé[a], y Yahvé le mostró un trozo de madera. Él lo arrojó al agua, y el agua se volvió dulce. Allí estableció para ellos un estatuto y un juicio[b], y allí los probó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un árbol» o «madera». El hebreo עֵץ puede referirse tanto a un árbol como a madera.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa sufijos singulares («para él» / «lo probó»), probablemente con referencia colectiva a Israel como pueblo; el español expresa el sentido con plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - clamo
  lexicon: HALOT
  rationale: צעק expresa un clamor intenso o de auxilio. «Clamó» conserva la fuerza del ruego sin sonar mecánico en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la transliteración POB «Yahvé», conforme al criterio del proyecto y a la distinción entre el Nombre y un título.
- source_word: וַיּוֹרֵהוּ
  english_pob_choice: showed him
  chosen_spanish: le mostró
  alternatives_spanish:
  - le indicó
  - le hizo ver
  lexicon: HALOT
  rationale: La forma causativa de ירה aquí tiene sentido revelador e indicativo en la narración. «Le mostró» es natural y reproduce la acción de dar a conocer el objeto.
- source_word: עֵץ
  english_pob_choice: a piece of wood
  chosen_spanish: un trozo de madera
  alternatives_spanish:
  - un árbol
  - madera
  lexicon: HALOT
  rationale: עֵץ puede significar árbol o madera. En el contexto de arrojarlo al agua, «un trozo de madera» comunica mejor el objeto inmediato sin perder la ambigüedad de la raíz.
- source_word: וַיַּשְׁלֵךְ
  english_pob_choice: threw
  chosen_spanish: lo arrojó
  alternatives_spanish:
  - lo lanzó
  - lo echó
  lexicon: HALOT
  rationale: «Arrojó» refleja היטב la acción fuerte de שלך y suena claro y digno en español.
- source_word: הַמַּיִם
  english_pob_choice: the water
  chosen_spanish: el agua
  alternatives_spanish:
  - las aguas
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma plural, en español el sustantivo es normalmente singular en este contexto narrativo.
- source_word: וַיִּמְתְּקוּ
  english_pob_choice: became sweet
  chosen_spanish: se volvió dulce
  alternatives_spanish:
  - se hicieron dulces
  - se endulzaron
  lexicon: HALOT
  rationale: מתק expresa un cambio de cualidad hacia lo dulce. «Se volvió dulce» mantiene la transformación sin introducir una interpretación excesiva.
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - En ese lugar
  lexicon: HALOT
  rationale: «Allí» conserva la deixis narrativa breve y enfática.
- source_word: שָׂם
  english_pob_choice: made
  chosen_spanish: dio
  alternatives_spanish:
  - estableció
  - puso
  lexicon: HALOT
  rationale: Con חֹק וּמִשְׁפָּט, el verbo שׂים funciona idiomáticamente como instituir o establecer. En español, «dio» expresa de manera natural que les otorgó/estableció una disposición normativa.
- source_word: לּוֹ
  english_pob_choice: for them
  chosen_spanish: les
  alternatives_spanish:
  - le
  lexicon: HALOT
  rationale: El sufijo singular hebreo funciona colectivamente para Israel. En español, el dativo plural «les» comunica mejor el referente colectivo presente en el contexto.
- source_word: חֹק
  english_pob_choice: a statute
  chosen_spanish: una ordenanza
  alternatives_spanish:
  - un estatuto
  - un decreto
  lexicon: HALOT
  rationale: חֹק denota una disposición fijada o prescrita. «Ordenanza» preserva el matiz legal/covenantal y es comprensible en español bíblico actual.
- source_word: וּמִשְׁפָּט
  english_pob_choice: and a judgment
  chosen_spanish: y un juicio
  alternatives_spanish:
  - y una sentencia
  - y una decisión
  lexicon: HALOT
  rationale: מִשְׁפָּט abarca juicio, decisión y norma jurídica. «Juicio» mantiene la relación léxica con el hebreo y deja abierta la amplitud semántica.
- source_word: נִסָּהוּ
  english_pob_choice: he tested them
  chosen_spanish: los probó
  alternatives_spanish:
  - los puso a prueba
  - los examinó
  lexicon: HALOT
  rationale: נסה significa probar o poner a prueba. «Los probó» es conciso y conserva la idea de una prueba real en el contexto del desierto.
theological_decisions:
- issue: Referente de los sufijos singulares en לּוֹ y נִסָּהוּ
  english_pob_reading: Collective reference to Israel, rendered in English as plural 'them'
  chosen_spanish_reading: Referencia colectiva a Israel, expresada con plural en español («les», «los»)
  alternative_spanish_readings:
  - «le» y «lo» con sentido corporativo singular
  - referencia a Moisés
  rationale: El contexto inmediato trata de la comunidad de Israel en Mará. El hebreo puede usar un singular colectivo; el español necesita explicitar el referente plural para evitar ambigüedad injustificada.
  doctrine_reference: Mantener la tensión textual sin resolverla artificialmente; equivalencia óptima con referencia colectiva documentada
- issue: Naturaleza de חֹק וּמִשְׁפָּט
  english_pob_reading: Legal/covenantal terms rendered concretely as 'a statute and a judgment'
  chosen_spanish_reading: Términos normativos/covenantales expresados como «una ordenanza y un juicio»
  alternative_spanish_readings:
  - «una ordenanza y una sentencia»
  - «un estatuto y una ley»
  rationale: La expresión parece señalar una disposición normativa inicial y no conviene convertirla en una formulación más amplia de la ley sinaítica. «Ordenanza» y «juicio» conservan el peso jurídico sin sobreespecificar.
  doctrine_reference: Preservar el valor jurídico del texto y su carácter de estipulación inicial
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la elección de 'a tree' a 'a piece of wood' para reflejar mejor el acto de arrojarlo al agua. La redacción española adopta ese ajuste con «un trozo de madera», evitando un calco de «árbol» que sería menos natural en este contexto. También se conserva la lectura documental de sufijos singulares con referente colectivo, tal como recoge el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de una sustitución por título.
  - Se evita «Cristo» porque el versículo no contiene mesianismo alguno.
  - «Espíritu» no aparece; no se requiere decisión terminológica aquí.
  - Se preserva la terminología jurídica con «ordenanza» y «juicio», acorde con el léxico hebreo y el registro POB.
  - Los pronombres dativos/acusativos en español se ajustan al referente colectivo de Israel para claridad lectora.
