- from: Hizo el velo[a] de azul, púrpura, carmesí y lino fino, y bordó sobre él querubines[c][b].
  to: Hizo la cortina[a] de azul, púrpura, carmesí[b] y lino fino, y trabajó en ella querubines[c].
