translation:
  language: es
  text: Y el hijo de Samai fue Maón[a], y Maón fue el padre de Bet-sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antepasado/fundador de Bet-sur». En genealogías, «padre de» también puede denotar al fundador o antepasado principal de un clan o asentamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֶן
  english_pob_choice: And the son of
  chosen_spanish: Y el hijo de
  alternatives_spanish:
  - Y el hijo de
  - Y el hijo de,
  - Entonces el hijo de
  lexicon: HALOT
  rationale: En contexto genealógico, בֶן expresa descendencia directa. «Hijo de» conserva ese valor sin sobretraducción, y «Y» mantiene la continuidad de la lista genealógica.
- source_word: שַׁמַּי
  english_pob_choice: Shammai
  chosen_spanish: Shammai
  alternatives_spanish:
  - Shammai
  lexicon: Nombre propio
  rationale: Es un nombre אישי; se translitera para conservar la forma del hebreo y la consistencia del proyecto.
- source_word: מָעוֹן
  english_pob_choice: Maon
  chosen_spanish: Maón
  alternatives_spanish:
  - Maon
  lexicon: Nombre propio
  rationale: Aquí funciona como nombre propio en la secuencia genealógica. Se adapta con tilde a la ortografía española para una lectura natural, sin alterar la identificación del nombre.
- source_word: וּ/מָעוֹן
  english_pob_choice: and Maon
  chosen_spanish: y Maón
  alternatives_spanish:
  - y Maon
  - y él, Maón
  lexicon: Nombre propio
  rationale: La repetición del nombre se mantiene de modo simple, como en la construcción hebrea. No se expande innecesariamente, para no borrar la forma genealógica del enunciado.
- source_word: אֲבִי
  english_pob_choice: was the father of
  chosen_spanish: fue el padre de
  alternatives_spanish:
  - fue padre de
  - fue antepasado de
  - fue fundador de
  lexicon: HALOT
  rationale: En fórmulas genealógicas, אָב puede señalar paternidad directa o una relación ancestral/fundacional. «Fue el padre de» conserva el giro estándar y deja abierta, sin imponerla, la amplitud semántica documentada.
- source_word: בֵּית צוּר
  english_pob_choice: Beth-zur
  chosen_spanish: Bet-sur
  alternatives_spanish:
  - Beth-sur
  - casa de Zur
  lexicon: HALOT
  rationale: Se conserva el nombre propio toponímico/clánico en transliteración. «Bet-sur» es la forma más natural en español y evita la paráfrasis «casa de Zur», que sería demasiado interpretativa en este contexto.
theological_decisions:
- issue: Valor genealógico de «padre de» en relación con un topónimo/clan
  english_pob_reading: In genealogies, "father of" can also denote the founder or leading ancestor of a clan or settlement.
  chosen_spanish_reading: En genealogías, «fue el padre de» puede también denotar al fundador o antepasado principal de un clan o asentamiento.
  alternative_spanish_readings:
  - fundador de
  - antepasado de
  - cabeza de
  rationale: Se conserva la ambigüedad histórica y social del hebreo sin resolverla de manera excesivamente específica. Esto evita reducir la relación a paternidad biológica cuando el propio contexto puede ser fundacional o clánica.
  doctrine_reference: Uso genealógico del hebreo bíblico; lectura histórico-lingüística de fórmulas de parentesco
- issue: Identificación de Bet-sur como nombre propio y no como traducción literal
  english_pob_reading: Beth-zur is treated as a place/clan name and transliterated.
  chosen_spanish_reading: Bet-sur se entiende como nombre propio de lugar o de clan y se translitera.
  alternative_spanish_readings:
  - casa de Zur
  - la casa de Zur
  rationale: La transliteración respeta el valor onomástico del hebreo y evita imponer un sentido composicional que el texto genealógico no desarrolla. Así se preserva la transparencia del dato textual.
  doctrine_reference: Onomástica bíblica; toponimia bíblica
translation_notes:
  revision_awareness: El texto inglés y la evaluación cruzada muestran acuerdo alto y sin cambios necesarios; el español sigue esa lectura estable, conservando la ambigüedad genealógica de «padre de» mediante nota y manteniendo la transliteración del nombre propio toponímico.
  spanish_consistency_notes:
  - Se mantiene el paralelismo genealógico breve propio del hebreo.
  - 'Los nombres propios se transliteran de forma consistente: Shammai, Maón, Bet-sur.'
  - Se evita sustituir el valor genealógico por una paráfrasis explicativa dentro del texto principal.
  - La nota a conserva la alternativa lexical documentada por el POB en inglés.
