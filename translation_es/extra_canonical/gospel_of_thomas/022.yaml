translation:
  language: es
  text: 'Jesús vio a unos pequeños que estaban siendo amamantados[a]. Dijo a sus discípulos: “Estos pequeños que están siendo amamantados son como los que han de entrar en el Reino[b].” Ellos le dijeron: “¿Nosotros, siendo pequeños, entraremos en el Reino?” Jesús les dijo: “Cuando hagan de los dos uno; y cuando hagan lo de dentro como lo de fuera, y lo de fuera como lo de dentro, y lo de arriba como lo de abajo[c]; y cuando hagan del masculino y del femenino un solo ser[d], de modo que el masculino no sea masculino y el femenino no sea femenino; y cuando hagan ojos en lugar de un ojo, y una mano en lugar de una mano, y un pie en lugar de un pie, y una imagen en lugar de una imagen[e], entonces entrarán en el Reino[f].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Amamantados” refleja el verbo copto específico de lactancia; otras opciones como “alimentados al pecho” o “lactados” son posibles, pero menos naturales o menos transparentes.
    reason: lexical_alternative
  - marker: b
    text: “Reino” traduce ⲙⲛⲧⲣⲣⲟ, un sustantivo abstracto que puede sugerir reinado o realeza; se conserva la forma idiomática “Reino” por legibilidad y continuidad con la terminología de Thomas.
    reason: lexical_alternative
  - marker: c
    text: El copto presenta aquí una sola polaridad espacial, que puede entenderse como “arriba/abajo” o, según algunos, “cielo/tierra”. No hay en este pasaje una pareja adicional de “atrás/adelante”.
    reason: cross_reference
  - marker: d
    text: 'También puede entenderse: “cuando hagan uno el masculino y el femenino”, pero se preserva la secuencia intensiva del original: dos → uno.'
    reason: alternative_reading
  - marker: e
    text: “Imagen” traduce el préstamo griego ϩⲓⲕⲱⲛ; podría decirse “icono”, pero “imagen” es más amplio y claro para lectura pública.
    reason: lexical_alternative
  - marker: f
    text: El “Reino” final se restituye según la lectura normalizada de Dilley; la línea del códice presenta un daño menor en este punto.
