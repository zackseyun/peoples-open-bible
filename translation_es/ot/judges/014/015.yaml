translation:
  language: es
  text: 'Y al séptimo día dijeron a la esposa de Sansón: «Engaña a tu marido para que nos diga el acertijo, no sea que te quememos a ti y a la casa[a] de tu padre con fuego. ¿Acaso nos invitaron para despojarnos[b]? ¿No es así?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la familia de tu padre». El hebreo puede referirse a la casa física o, más ampliamente, al hogar o la familia de tu padre.
    reason: lexical_alternative
  - marker: b
    text: O «para empobrecernos» o «para apoderarse de lo nuestro». El verbo hebreo puede llevar la idea de desposeer o tomar posesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּתִּי
  english_pob_choice: Entice
  chosen_spanish: Seduce
  alternatives_spanish:
  - Persuade
  - Convence
  - Engaña
  lexicon: HALOT
  rationale: El imperativo piel de פתה expresa una acción persuasiva con matiz de manipulación; «seduce» comunica bien ese impulso coercitivo y astuto en español, sin suavizarlo excesivamente como «persuade».
- source_word: אִישֵׁךְ
  english_pob_choice: your husband
  chosen_spanish: tu marido
  alternatives_spanish:
  - tu esposo
  - tu hombre
  lexicon: HALOT
  rationale: En el contexto matrimonial, אִישׁ significa naturalmente el marido. «Marido» es claro, idiomático y reproduce la relación prevista por el hebreo.
- source_word: וְיַגֶּד לָנוּ
  english_pob_choice: so that he may tell us
  chosen_spanish: para que nos diga
  alternatives_spanish:
  - y nos declare
  - y nos cuente
  lexicon: HALOT
  rationale: La construcción con waw y jussivo/imperfecto expresa finalidad; «para que nos diga» conserva la fuerza de propósito de manera natural en español.
- source_word: הַחִידָה
  english_pob_choice: the riddle
  chosen_spanish: el enigma
  alternatives_spanish:
  - la adivinanza
  - el acertijo
  lexicon: HALOT
  rationale: חִידָה designa una formulación enigmática o acertijo. «Enigma» mantiene la dignidad del registro y el sentido de pregunta difícil, aunque «acertijo» también es posible.
- source_word: פֶּן נִשְׂרֹף אֹתָךְ וְאֶת־בֵּית אָבִיךְ בָּאֵשׁ
  english_pob_choice: lest we burn you and your father’s household with fire
  chosen_spanish: no sea que te quememos a ti y a la casa de tu padre con fuego
  alternatives_spanish:
  - o te quemaremos a ti y a la casa de tu padre con fuego
  - para que no te quememos a ti y a la casa de tu padre con fuego
  lexicon: HALOT
  rationale: פֶּן introduce una amenaza o consecuencia negativa; «no sea que» reproduce bien ese matiz en español. Se mantiene explícito «con fuego» para conservar la imagen hebrea.
- source_word: בֵּית אָבִיךְ
  english_pob_choice: your father’s household
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - la familia de tu padre
  - el hogar de tu padre
  lexicon: HALOT
  rationale: El hebreo puede referirse a la casa física o al grupo familiar. En español, «la casa de tu padre» conserva la ambigüedad útil y la formulación más directa del texto.
- source_word: הֲלְיָרְשֵׁנוּ
  english_pob_choice: to dispossess us
  chosen_spanish: para despojarnos
  alternatives_spanish:
  - para quitarnos lo nuestro
  - para echarnos de lo nuestro
  - para privarnos de ello
  lexicon: HALOT
  rationale: ירשׁ aquí tiene el sentido de tomar posesión o desposeer. «Despojarnos» expresa bien la sospecha de que intentaban obtener ventaja o privarlos de algo valioso.
- source_word: קְרָאתֶם לָנוּ
  english_pob_choice: Did you invite us here
  chosen_spanish: nos habéis invitado
  alternatives_spanish:
  - nos habéis llamado
  - nos habéis convocado
  lexicon: HALOT
  rationale: קרא con ל puede significar llamar o invitar. Dado el contexto del banquete, «nos habéis invitado» es la opción más natural; el objeto implícito se mantiene sin añadir «aquí».
- source_word: הֲלֹא
  english_pob_choice: Is that not so?
  chosen_spanish: ¿No es así?
  alternatives_spanish:
  - ¿acaso no es así?
  - ¿no es cierto?
  lexicon: HALOT
  rationale: La partícula marca una pregunta retórica que espera asentimiento. «¿No es así?» transmite el tono acusatorio y concluyente del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el estado revisado del texto inglés: se mantiene la ausencia de un equivalente a ''here'' en la pregunta final y se preserva la fuerza amenazante de la cláusula con פֶּן. También se conserva la ambigüedad de בֵּית אָבִיךְ mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparezca en el pasaje; aquí no aparece.
  - Se evita «Cristo»/«SEÑOR» porque no corresponden a este versículo.
  - «Despojarnos» refleja la carga de dispossession de ירשׁ sin volverlo demasiado interpretativo.
  - «Casa de tu padre» mantiene la posible referencia tanto al edificio como al grupo familiar, en línea con la nota inglesa.
