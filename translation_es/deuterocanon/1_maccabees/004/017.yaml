translation:
  language: es
  text: 'Y dijo al pueblo: «No deseen los despojos[a], porque la batalla está delante de nosotros[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «No codicien los despojos» o «No codicien el botín».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «porque la batalla está enfrente de nosotros»; también puede entenderse «contra nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαόν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - las tropas
  - el ejército
  lexicon: LSJ
  rationale: Conservar «el pueblo» refleja con fidelidad el término griego amplio sin restringirlo interpretativamente a «tropas» o «ejército». En español suena natural en un discurso dirigido al grupo reunido.
- source_word: ἐπιθυμήσητε
  english_pob_choice: desire
  chosen_spanish: deseéis
  alternatives_spanish:
  - codiciéis
  - codiciéis con afán
  - deseéis con ansia
  lexicon: BDAG
  rationale: El verbo expresa un deseo intenso; en español, «deseéis» reproduce ese valor de manera natural y no añade por sí mismo la carga específica del décimo mandamiento que tendría «codiciéis».
- source_word: σκύλων
  english_pob_choice: spoils
  chosen_spanish: despojos
  alternatives_spanish:
  - botín
  - botín de guerra
  - plunder
  lexicon: LSJ
  rationale: El contexto es militar y alude a bienes tomados en combate. «Despojos» comunica bien la idea de bienes arrebatados en guerra y mantiene un registro digno y bíblico; «botín» sería también posible, pero suena algo más coloquial en algunos registros.
- source_word: πόλεμος
  english_pob_choice: battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  - la lucha
  lexicon: LSJ
  rationale: Aunque el sustantivo puede significar «guerra», aquí el contexto inmediato es la confrontación táctica presente; «batalla» expresa mejor esa situación concreta, siguiendo la decisión del texto inglés auditado.
- source_word: ἐξ ἐναντίας ἡμῶν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - frente a nosotros
  - contra nosotros
  - enfrente de nosotros
  lexicon: LSJ
  rationale: La expresión griega indica literalmente estar enfrente u opuesto. «Delante de nosotros» conserva la imagen espacial y comunica de forma natural la inminencia del enfrentamiento, sin perder la posibilidad de la lectura «contra nosotros».
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan de manera alta; no se documentaron revisiones sustantivas posteriores. La traducción española sigue esa lectura estable, conservando la tensión léxica entre «despojos/botín» y la imagen espacial de «enfrente/contra nosotros» mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se conserva «el pueblo» conforme al griego, sin sustituirlo por «tropas» o «ejército».
  - Se evita «codiciar» en el texto principal para no introducir una connotación moral más específica que la requerida por el contexto militar.
