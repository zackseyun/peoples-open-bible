translation:
  language: es
  text: ¿Ves a un hombre sabio en sus propios ojos[a]? Más esperanza hay para el necio que para él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Has visto a un hombre sabio en sus propios ojos?». El perfecto hebreo puede leerse como observación retórica o como pregunta directa.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָאִיתָ
  english_pob_choice: Do you see
  chosen_spanish: ¿Ves
  alternatives_spanish:
  - ¿Has visto
  - ¿Llegas a ver
  lexicon: HALOT
  rationale: El perfecto hebreo puede funcionar como observación retórica o pregunta. En español, el presente interrogativo da el mismo efecto proverbial y suena natural sin perder el valor retórico.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo singular masculino presenta un ejemplar concreto. 'Hombre' conserva ese valor de individuo varón sin neutralizar innecesariamente el término.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - sabio de verdad
  lexicon: HALOT
  rationale: Es adjetivo predicativo de אִישׁ. 'Sabio' corresponde de modo directo al campo de sabiduría proverbial y mantiene el contraste irónico con 'necio'.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: a sus propios ojos
  alternatives_spanish:
  - en su propia opinión
  - ante sí mismo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para autoevaluación. 'A sus propios ojos' preserva el giro literal y comunica bien la noción de autosuficiencia u ինքնaprecio.
- source_word: תִּקְוָה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  - perspectiva
  lexicon: HALOT
  rationale: El sustantivo significa esperanza o posibilidad favorable. 'Esperanza' es la equivalencia natural en español para este contraste sapiencial.
- source_word: לִכְסִיל
  english_pob_choice: for a fool
  chosen_spanish: para el necio
  alternatives_spanish:
  - para el tonto
  - para el insensato
  lexicon: HALOT
  rationale: כְסִיל es el término técnico de Proverbios para el necio moralmente terco. 'Necio' preserva mejor la carga sapiencial que 'tonto'.
- source_word: מִמֶּנּוּ
  english_pob_choice: than for him
  chosen_spanish: que para él
  alternatives_spanish:
  - que para ese hombre
  - que para tal persona
  lexicon: HALOT
  rationale: La comparación מן introduce un contraste de grado. 'Que para él' es breve y natural en español, manteniendo la referencia al hombre autoconfiado.
translation_notes:
  revision_awareness: 'Se siguió el criterio de la revisión más reciente: no hubo cambios requeridos, y la versión española conserva el valor retórico del perfecto hebreo con una pregunta natural en español.'
  spanish_consistency_notes:
  - Se conserva 'sabio' y 'necio' como pares sapienciales estándar.
  - No se neutralizó 'אִישׁ' porque el texto hebreo es masculino singular y el contexto proverbial usa un ejemplar típico.
  - La estructura comparativa 'más ... que ...' reproduce adecuadamente el מן comparativo del hebreo.
  - Se evitó 'SEÑOR' u otras sustituciones porque el versículo no contiene el nombre divino.
