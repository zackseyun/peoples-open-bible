id: JER.15.16
reference: Jeremiah 15:16
source:
  edition: WLC
  text: נִמְצְא֤וּ דְבָרֶ֨י/ךָ֙ וָ/אֹ֣כְלֵ֔/ם וַ/יְהִ֤י דברי/ך לִ֔/י לְ/שָׂשׂ֖וֹן וּ/לְ/שִׂמְחַ֣ת לְבָבִ֑/י כִּֽי נִקְרָ֤א שִׁמְ/ךָ֙ עָלַ֔/י יְהוָ֖ה אֱלֹהֵ֥י צְבָאֽוֹת־׃ס
translation:
  text: Your words were found[a], and I ate them, and your words became for me a joy and the delight of my heart, for your name is called over me, O Yahweh, God of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “I am called by your name.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נִמְצְאוּ
  chosen: were found
  alternatives:
  - were discovered
  - came to be found
  lexicon: HALOT
  rationale: Passive/reflexive Niphal of מצא. 'Were found' preserves the Hebrew verbal form and the sense that the words came to the prophet's encounter rather than being actively sought in the clause itself.
- source_word: דְבָרֶיךָ
  chosen: your words
  alternatives:
  - your word
  - your sayings
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix. 'Words' matches the Hebrew number and suits the repeated plural in the verse.
- source_word: וָאֹכְלֵם
  chosen: I ate them
  alternatives:
  - I consumed them
  - I devoured them
  lexicon: HALOT
  rationale: Literal rendering of אכל with 3mp object suffix. The metaphor of ingesting God's words is vivid and should be preserved rather than paraphrased.
- source_word: וַיְהִי
  chosen: became
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: 'Though formally singular, the verb introduces the result of receiving the words. ''Became'' best conveys the transition/result sense in idiomatic English: the words became joy to him.'
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: Dative of personal experience/benefit. 'For me' reads naturally in English and captures the experiential force.
- source_word: לְשָׂשׂוֹן
  chosen: a joy
  alternatives:
  - joy
  - gladness
  - exultation
  lexicon: HALOT
  rationale: ששון denotes joy/gladness, often exuberant. 'A joy' works well with the predicate structure and pairs naturally with the following noun.
- source_word: וּלְשִׂמְחַת לְבָבִי
  chosen: the delight of my heart
  alternatives:
  - the joy of my heart
  - the gladness of my heart
  lexicon: HALOT
  rationale: The construct phrase intensifies the previous term. Rendering with 'delight' avoids wooden repetition of 'joy ... joy' while preserving the semantic field of inner gladness.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Jeremiah's joy. 'For' is concise and natural in elevated but readable English.
- source_word: נִקְרָא שִׁמְךָ עָלַי
  chosen: your name is called over me
  alternatives:
  - I am called by your name
  - your name has been invoked over me
  lexicon: HALOT
  rationale: The Hebrew idiom literally says the name is called upon/over someone, marking belonging or identification. The more literal 'is called over me' preserves the covenantal idiom, while an alternative is worth preserving in a footnote because English readers may expect the idiomatic sense 'called by your name'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: God of hosts
  alternatives:
  - God of armies
  - God of heavenly armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the title. 'Hosts' preserves the breadth of צבאות better than narrowing it only to military forces.
