translation:
  language: es
  text: 'Porque así ha dicho el Señor Yahvé: He aquí[a], yo te entrego en manos de quienes odias, en manos de quienes tu alma se apartó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quienes tu alma detesta», o «de quienes tu alma fue arrancada». La expresión hebrea es vívida y puede indicar una fuerte alienación o repulsión.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: Se conserva la fórmula profética fija de Ezequiel con el nombre divino explícito. En español, «Señor Yahvé» refleja mejor el Tetragrámaton que una máscara como «SEÑOR», y mantiene la solemnidad del título compuesto.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí que
  lexicon: HALOT
  rationale: La partícula deíctica introduce una declaración solemne de juicio. «He aquí» es la equivalencia española más estable para conservar el tono profético sin volverlo coloquial.
- source_word: נֹתְנָךְ
  english_pob_choice: I am giving you
  chosen_spanish: yo te pongo
  alternatives_spanish:
  - yo te doy
  - yo te entrego
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa inminencia. «Pongo en manos de» preserva la imagen idiomática de entrega bajo control ajeno y evita perder la metáfora de mano.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: En español, la expresión pluralizada «en manos de» comunica con naturalidad el hebraísmo sin oscurecer el sentido de sometimiento o entrega a control ajeno.
- source_word: אֲשֶׁר שָׂנֵאת
  english_pob_choice: those whom you hate
  chosen_spanish: aquellos a quienes tú detestaste
  alternatives_spanish:
  - aquellos que tú odias
  - los que tú odiaste
  lexicon: HALOT
  rationale: El verbo hebreo expresa odio/aborrecimiento. «Detestaste» conserva fuerza negativa fuerte en un registro bíblico digno; el pretérito aquí sigue el valor relacional de la acusación profética, sin suavizarla.
- source_word: נָקְעָה נַפְשֵׁךְ מֵהֶם
  english_pob_choice: those from whom your soul has turned away
  chosen_spanish: aquellos de quienes tu alma se apartó
  alternatives_spanish:
  - aquellos de quienes tu alma se alejó
  - aquellos que tu alma aborreció
  - aquellos de quienes tu alma fue arrancada
  lexicon: HALOT
  rationale: Se mantiene «alma» para נֶפֶשׁ y la idea de distanciamiento/repulsión. «Se apartó» conserva la tensión semántica entre separación, rechazo y revulsión, sin decidir demasiado pronto por una sola alternativa interpretativa.
theological_decisions:
- issue: Nombre divino en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La política del proyecto pide usar «Yahvé» para יְהוָה en el texto principal. En esta fórmula profética, mantener el nombre evita ocultar el dato del original y preserva el tono de juicio del discurso divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Intensidad del giro final נָקְעָה נַפְשֵׁךְ מֵהֶם
  english_pob_reading: those from whom your soul has turned away
  chosen_spanish_reading: aquellos de quienes tu alma se apartó
  alternative_spanish_readings:
  - aquellos de quienes tu alma se alejó
  - aquellos que tu alma detestó
  - aquellos de quienes tu alma fue arrancada
  rationale: El hebreo permite una gama que va desde apartarse hasta ser arrancado/repelido. La redacción elegida conserva esa tensión sin borrar la ambigüedad ni forzar una sola lectura emocional.
  doctrine_reference: Lexical tension preserved; no doctrinal alteration
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios adicionales y el cotejo cruzado mostró alto acuerdo; esta versión sigue ese estado estable, adaptando el registro al español y preservando la tensión léxica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה conforme al estándar del proyecto.
  - Se conserva la fuerza negativa de שָׂנֵאת con «detestaste», sin reducirla a mera desaprobación.
  - «Tu alma» mantiene la personificación hebrea de נֶפֶשׁ y su carga afectiva.
  - La nota al pie marca la alternativa semántica del giro final sin convertirla en interpretación cerrada.
