  yaml_path: translation/ot/genesis/041/034.yaml
  text: 'Let Pharaoh do this: let him appoint overseers over the land and take a fifth of the produce of the land of Egypt during the seven years of abundance[a].'
  footnotes:
  - marker: a
    text: Or 'collect one-fifth from the land of Egypt.' The Hebrew verb can be understood as levying or taking a fifth portion during the years of abundance.
    reason: lexical_alternative
