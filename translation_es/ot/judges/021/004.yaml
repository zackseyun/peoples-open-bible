translation:
  language: es
  text: Y al día siguiente, el pueblo se levantó temprano, edificó allí un altar y ofreció holocaustos y sacrificios de paz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrendas de comunión' u 'ofrendas de bienestar'. El término hebreo designa una clase de sacrificios vinculada con paz, plenitud y comunión compartida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽיְהִי מִמָּחֳרָת
  english_pob_choice: And the next day
  chosen_spanish: Y al día siguiente
  alternatives_spanish:
  - Y aconteció al día siguiente
  - Y el día siguiente
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el siguiente momento temporal; en español se expresa con naturalidad como 'al día siguiente', sin añadir innecesariamente un giro más pesado como 'aconteció'.
- source_word: וַיַּשְׁכִּימוּ
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantaron temprano
  - se alzaron de madrugada
  lexicon: HALOT
  rationale: El verbo indica levantarse temprano. En español, 'se levantó temprano' mantiene la idea temporal con fluidez narrativa y una forma pública natural; el singular concuerda con 'el pueblo' como sujeto colectivo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los israelitas
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'el pueblo'; 'el pueblo' conserva ese referente colectivo sin explicitar 'israelitas', que no aparece en el hebreo de esta cláusula.
- source_word: וַיִּבְנוּ שָׁם מִזְבֵּחַ
  english_pob_choice: built an altar there
  chosen_spanish: edificó allí un altar
  alternatives_spanish:
  - construyó allí un altar
  - levantó allí un altar
  lexicon: HALOT
  rationale: '''Edificar'' reproduce bien el acto de construir un altar y suena digno en español bíblico moderno. ''Allí'' conserva la referencia explícita de שָׁם.'
- source_word: וַיַּעֲלוּ עֹל֖וֹת
  english_pob_choice: offered burnt offerings
  chosen_spanish: ofreció holocaustos
  alternatives_spanish:
  - presentó holocaustos
  - ofreció sacrificios quemados
  lexicon: HALOT
  rationale: '''Holocaustos'' es el equivalente sacrificial tradicional y preciso para עֹלֹת en español bíblico. Conserva la categoría cultual sin paráfrasis.'
- source_word: וּשְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - ofrendas de paz
  - sacrificios de comunión
  lexicon: HALOT
  rationale: '''Sacrificios de paz'' expresa de forma clara y reverente la clase sacrificial שְׁלָמִים, manteniendo el campo semántico de paz/plenitud/comunión sin imponer una sola glosa explicativa.'
theological_decisions:
- issue: Terminología sacrificial de עֹלֹת y שְׁלָמִים
  english_pob_reading: burnt offerings and peace offerings
  chosen_spanish_reading: holocaustos y sacrificios de paz
  alternative_spanish_readings:
  - holocaustos y ofrendas de paz
  - holocaustos y sacrificios de comunión
  rationale: La línea nombra ofrendas israelitas estándar sin expansión doctrinal. Se conserva el lenguaje cultual reconocible en español, evitando sustituirlo por una explicación interpretativa dentro del texto principal.
  doctrine_reference: Consistencia terminológica en sacrificios veterotestamentarios; equivalencia funcional con respeto al léxico cultual.
translation_notes:
  revision_awareness: El texto base y la revisión más reciente coinciden sin cambios sustantivos; la versión española sigue de cerca el hebreo y el audit trail inglés, manteniendo la estructura narrativa y las equivalencias sacrificiales ya validadas.
  spanish_consistency_notes:
  - Se conserva el sujeto colectivo 'el pueblo' sin explicitar 'israelitas', conforme al hebreo.
  - Se mantiene la referencia espacial explícita 'allí' para שָׁם.
  - El lenguaje sacrificial usa términos bíblicos estándar en español ('holocaustos', 'sacrificios de paz') y la nota preserva las alternativas semánticas de שְׁלָמִים.
  - La puntuación y el orden responden al estilo narrativo español moderno, sin perder el paralelismo de la cláusula hebrea.
