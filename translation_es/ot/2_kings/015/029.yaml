translation:
  language: es
  text: En los días de Peka, rey de Israel, vino Tiglat-pileser, rey de Asiria, y capturó a Ijón, Abel-bet-Maacá, Janoa, Quedes, Hazor, Galaad y Galilea[a] —toda la tierra de Neftalí— y los llevó a Asiria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “los llevó al exilio en Asiria” o “los deportó a Asiria”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּימֵי
  english_pob_choice: In the days of
  chosen_spanish: En los días de
  alternatives_spanish:
  - Durante el reinado de
  - En el tiempo de
  lexicon: HALOT
  rationale: Mantiene la fórmula temporal hebrea de introducción histórica sin recargar el texto con una paráfrasis interpretativa.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - avanzó
  lexicon: HALOT
  rationale: '''Vino'' conserva el movimiento narrativo del verbo básico sin añadir explícitamente la idea de invasión, que el contexto ya deja clara.'
- source_word: וַיִּקַּח
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: En contexto militar, 'capturó' comunica con naturalidad el valor de 'tomó' sin debilitar la acción hostil.
- source_word: עִיּוֹן
  english_pob_choice: Ijon
  chosen_spanish: Ijón
  alternatives_spanish:
  - Iyyón
  lexicon: Transliteración estándar
  rationale: Se usa una forma española reconocible del topónimo, con acento gráfico para la pronunciación natural en español.
- source_word: אָבֵל בֵּית מַעֲכָה
  english_pob_choice: Abel-beth-maacah
  chosen_spanish: Abel-bet-maaca
  alternatives_spanish:
  - Abel-bet-Maaca
  - Abel de Bet-maaca
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre compuesto como topónimo, con adaptación ortográfica mínima al español para legibilidad.
- source_word: יָנוֹחַ
  english_pob_choice: Janoah
  chosen_spanish: Janoah
  alternatives_spanish:
  - Janohá
  lexicon: Transliteración estándar
  rationale: Se mantiene la forma del nombre propio más reconocible en castellano bíblico; no hay base suficiente para forzar otra adaptación.
- source_word: קֶדֶשׁ
  english_pob_choice: Kedesh
  chosen_spanish: Quedes
  alternatives_spanish:
  - Kedesh
  lexicon: Transliteración estándar
  rationale: '''Quedes'' refleja la pronunciación española habitual de este topónimo y evita una grafía menos natural para el lector hispanohablante.'
- source_word: חָצוֹר
  english_pob_choice: Hazor
  chosen_spanish: Hatzor
  alternatives_spanish:
  - Hazor
  lexicon: Transliteración estándar
  rationale: Se preserva el topónimo con adaptación ortográfica a la fonética española, manteniendo el reconocimiento del nombre.
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  - la región de Galaad
  lexicon: HALOT
  rationale: La forma 'Galaad' es la adaptación española tradicional y clara del nombre geográfico.
- source_word: הַגָּלִילָה
  english_pob_choice: Galilee
  chosen_spanish: Galilea
  alternatives_spanish:
  - la Galilea
  - el distrito de Galilea
  lexicon: HALOT
  rationale: Como nombre geográfico, 'Galilea' funciona naturalmente en español y conserva el referente regional.
- source_word: כֹּל אֶרֶץ נַפְתָּלִי
  english_pob_choice: all the land of Naphtali
  chosen_spanish: toda la tierra de Neftalí
  alternatives_spanish:
  - toda la región de Neftalí
  - todo el territorio de Neftalí
  lexicon: HALOT
  rationale: '''Tierra'' reproduce bien אֶרֶץ y mantiene la síntesis territorial del versículo; ''Neftalí'' respeta la forma española del nombre tribal.'
- source_word: וַיַּגְלֵם
  english_pob_choice: he carried them away
  chosen_spanish: los llevó
  alternatives_spanish:
  - los deportó
  - los exilió
  lexicon: HALOT
  rationale: La forma breve 'los llevó' sigue el movimiento del hebreo y deja que el complemento final aclare el destino del traslado forzoso; evita introducir un tecnicismo que el texto no exige.
- source_word: אַשּׁוּרָה
  english_pob_choice: to Assyria
  chosen_spanish: a Asiria
  alternatives_spanish:
  - a Asiria
  - hacia Asiria
  lexicon: HALOT
  rationale: La preposición simple 'a' reproduce de modo directo el sentido direccional del hebreo y encaja con el verbo de traslado.
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde 'into Assyria' a 'to Assyria' para reflejar más directamente la forma direccional del hebreo; la presente redacción española sigue esa decisión con 'a Asiria'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque aquí no aparece el nombre divino.
  - Se conserva el tono histórico conciso del original sin expandir la sintaxis más allá de lo necesario.
  - Los topónimos se adaptan al español cuando existe forma asentada y legible, manteniendo reconocimiento bíblico.
