base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/010.yaml
  text: I clothed you with embroidered cloth[a], put fine leather sandals on you, wrapped you in fine linen[b], and covered you with silk.
  footnotes:
  - marker: a
    text: Or 'a costly fabric' for 'silk'; the precise identification of the Hebrew term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew תָּחַשׁ refers to a material used for fine footwear; its exact animal/source is uncertain, so 'fine leather' is used here rather than a more speculative identification such as 'porpoise skin' or 'dugong skin.'
    reason: lexical_alternative
