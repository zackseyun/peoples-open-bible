translation:
  language: es
  text: Y ahora[a], por favor, ven y maldice este pueblo por mí, porque es demasiado poderoso para mí. Quizá pueda golpearlo[b] y echarlo de la tierra, pues sé que a quien tú bendigas, queda bendito, y a quien tú maldigas, queda maldito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo «este pueblo»: singular colectivo; en español también podría expresarse como «esta gente» o con referencia plural, pero aquí se conserva el singular del original.'
    reason: lexical_alternative
  - marker: b
    text: O «golpearlos» / «echarlos»; el hebreo se refiere al pueblo como un singular colectivo, aunque en español también puede expresarse en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: Mantiene la transición discursiva urgente y el enlace lógico con la petición anterior, con un español natural.
- source_word: לְכָה נָּא
  english_pob_choice: please come
  chosen_spanish: por favor, ven
  alternatives_spanish:
  - ven, por favor
  - te ruego que vengas
  lexicon: HALOT
  rationale: Expresa la súplica imperativa con cortesía y urgencia sin sonar forzado.
- source_word: אָרָה לִּי
  english_pob_choice: curse this people for me
  chosen_spanish: maldice este pueblo por mí
  alternatives_spanish:
  - pon una maldición sobre este pueblo por mí
  - proclama maldición sobre este pueblo por mí
  lexicon: HALOT
  rationale: ‘Maldice’ comunica directamente el verbo de maldecir; ‘por mí’ preserva el dativo de interés/beneficiario.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - estas personas
  lexicon: HALOT
  rationale: ‘Pueblo’ conserva el tono colectivo y la referencia singular colectiva del hebreo mejor que una pluralización innecesaria.
- source_word: כִּי עָצוּם הוּא מִמֶּנִּי
  english_pob_choice: because they are too mighty for me
  chosen_spanish: porque es demasiado poderoso para mí
  alternatives_spanish:
  - porque es más fuerte que yo
  - porque es demasiado fuerte para mí
  lexicon: HALOT
  rationale: ‘Poderoso’ transmite la fuerza militar/capacidad del término sin perder el sentido comparativo; el singular respeta el colectivo hebreo.
- source_word: אוּלַי אוּכַל
  english_pob_choice: Perhaps I will be able
  chosen_spanish: Quizá pueda
  alternatives_spanish:
  - Tal vez podré
  - Quizá logre
  lexicon: HALOT
  rationale: Conserva la incertidumbre y la capacidad potencial de manera concisa y natural en español.
- source_word: נַכֶּה בּוֹ
  english_pob_choice: to strike them
  chosen_spanish: derrotarlo
  alternatives_spanish:
  - golpearlo
  - herirlo
  lexicon: HALOT
  rationale: Aquí se privilegia el resultado bélico implícito en el contexto; se mantiene el singular colectivo con ‘lo’. La opción literal ‘golpearlo’ sería posible, pero menos idiomática en español en este contexto.
- source_word: וַאֲגָרְשֶׁנּוּ
  english_pob_choice: and drive them out
  chosen_spanish: y echarlo
  alternatives_spanish:
  - y expulsarlo
  - y sacarlo
  lexicon: HALOT
  rationale: ‘Echar’ comunica el expulsar/arrojar fuera con fuerza en español natural; conserva el movimiento de expulsión.
- source_word: מִן הָאָרֶץ
  english_pob_choice: out of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de esta tierra
  lexicon: HALOT
  rationale: ‘Tierra’ mantiene la resonancia territorial del hebreo y suena natural en contexto bíblico.
- source_word: כִּי יָדַעְתִּי
  english_pob_choice: for I know
  chosen_spanish: pues sé
  alternatives_spanish:
  - porque sé
  - ya que sé
  lexicon: HALOT
  rationale: Introduce la explicación de forma breve y natural, conservando la fuerza causal.
- source_word: אֵת אֲשֶׁר תְּבָרֵךְ מְבֹרָךְ
  english_pob_choice: whoever you bless is blessed
  chosen_spanish: a quien tú bendigas, bendito queda
  alternatives_spanish:
  - quien tú bendigas queda bendito
  - el que tú bendigas será bendito
  lexicon: HALOT
  rationale: Mantiene el paralelismo y el valor resultativo del pasivo/reflejo con una formulación fluida; ‘queda’ subraya el estado resultante.
- source_word: וַאֲשֶׁר תָּאֹר יוּאָר
  english_pob_choice: and whoever you curse is cursed
  chosen_spanish: y a quien tú maldigas, maldito queda
  alternatives_spanish:
  - y quien tú maldigas queda maldito
  - y el que tú maldigas será maldito
  lexicon: HALOT
  rationale: Preserva el paralelismo con la primera cláusula y el sentido resultativo del hebreo.
translation_notes:
  revision_awareness: 'Se corrigió la ausencia del anclaje de nota: el marcador [a] aparece ahora en el texto español. La redacción también mantiene la singularidad colectiva del hebreo en forma idiomática española, y conserva el paralelismo bendecir/maldecir con un valor resultativo claro.'
  spanish_consistency_notes:
  - Se usa ‘pueblo’ para הָעָם y se evita pluralizar innecesariamente.
  - ‘Tierra’ conserva el matiz territorial de הָאָרֶץ.
  - Las cláusulas finales mantienen paralelismo sintáctico y semántico.
  - Se evita ‘SEÑOR’ porque no aparece el tetragrámaton en este versículo.
