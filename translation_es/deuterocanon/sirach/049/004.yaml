translation:
  language: es
  text: A excepción de David[a], Ezequías y Josías, todos ellos obraron corruptamente; los reyes de Judá abandonaron la ley del Altísimo[b], hasta llegar a su fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos ellos cometieron ofensa»; el griego se acerca más a una expresión de transgresión, mientras que el hebreo dice literalmente que «corrompieron» o «arruinaron».'
    reason: lexical_alternative
  - marker: b
    text: La frase final es breve en el hebreo («hasta terminación/fin»); el griego dice «los reyes de Judá llegaron a su fin / fracasaron».
    reason: alternative_reading
lexical_decisions:
- source_word: לבד / παρὲξ
  english_pob_choice: Except for
  chosen_spanish: Excepto
  alternatives_spanish:
  - A excepción de
  - Salvo
  lexicon: HALOT / BDAG
  rationale: Ambos términos marcan excepción directa. «Excepto» es natural en español actual y conserva la estructura del juicio general con tres excepciones nombradas.
- source_word: השחיטו / πλημμελίαν ἐπλημμέλησαν
  english_pob_choice: acted corruptly
  chosen_spanish: actuaron corruptamente
  alternatives_spanish:
  - obraron con corrupción
  - cometieron ofensa
  - obraron mal
  lexicon: HALOT / BDAG
  rationale: El hebreo puede significar corromper o arruinar; el griego usa una formulación de transgresión/ofensa. «Actuaron corruptamente» preserva la fuerza moral sin concretar indebidamente el tipo de pecado.
- source_word: ויעזבו / κατέλιπον
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  - se apartaron de
  lexicon: HALOT / BDAG
  rationale: Ambas fuentes expresan una salida deliberada de la obligación pactal. «Abandonaron» mantiene la culpa implícita mejor que un simple «dejaron».
- source_word: תורת עליון / τὸν νόμον τοῦ ὑψίστου
  english_pob_choice: the law of the Most High
  chosen_spanish: la ley del Altísimo
  alternatives_spanish:
  - la instrucción del Altísimo
  lexicon: HALOT / BDAG
  rationale: La pareja hebreo-griego favorece «ley» como forma principal. «Altísimo» traduce de manera directa el título divino y conserva su solemnidad.
- source_word: מלכי יהודה
  english_pob_choice: the kings of Judah
  chosen_spanish: los reyes de Judá
  alternatives_spanish:
  - los reyes de Judá
  lexicon: HALOT
  rationale: La referencia histórica se mantiene de forma directa y coincide con el griego οἱ βασιλεῖς Ἰούδα.
- source_word: עד תמם / ἐξέλιπον
  english_pob_choice: until they came to an end
  chosen_spanish: hasta llegar a su fin
  alternatives_spanish:
  - hasta que llegaron a su fin
  - hasta consumirse
  - hasta terminar
  lexicon: HALOT / BDAG
  rationale: La frase hebrea es breve y el griego apunta a un final/fracaso. «Hasta llegar a su fin» conserva el sentido de culminación sin especificar más de lo que el texto permite.
theological_decisions:
- issue: Cómo renderizar la cláusula final breve del hebreo a la luz del griego ἐξέλιπον
  english_pob_reading: The kings of Judah abandoned the law of the Most High, until they came to an end.
  chosen_spanish_reading: Los reyes de Judá abandonaron la ley del Altísimo, hasta llegar a su fin.
  alternative_spanish_readings:
  - los reyes de Judá fracasaron
  - los reyes de Judá desaparecieron
  rationale: Se mantiene la cláusula como resultado de su abandono, sin añadir una causalidad explícita ni definir el modo exacto del final. Así se respeta la tensión entre el hebreo conciso y el equivalente interpretativo griego.
  doctrine_reference: Preservar la tensión textual y la prioridad de los idiomas originales; no resolver indebidamente el alcance del final.
translation_notes:
  revision_awareness: Se corrigió la marcación de nota al pie para que cada marcador aparezca anclado exactamente en el texto español. Se evitó añadir «porque» o cualquier matiz causal no explícito en el hebreo, siguiendo la revisión más reciente del texto inglés POB.
  spanish_consistency_notes:
  - Se usó «Altísimo» como título divino uniforme para עליון / ὕψιστος.
  - Se prefirió «ley» sobre «instrucción» por la convergencia con νόμος y el contexto real/covenantal.
  - Se mantuvo «reyes de Judá» para conservar la referencia histórica y la correspondencia con el griego.
  - La clausula final se dejó abierta como resultado, no como explicación causal.
