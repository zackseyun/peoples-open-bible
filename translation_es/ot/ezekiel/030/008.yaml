translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé[a], cuando ponga fuego en Egipto y todos los que la ayudan[b] sean quebrantados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahveh». El hebreo usa el nombre divino YHWH, preservado aquí como Yahvé para no sustituirlo por un título.
    reason: source_note
  - marker: b
    text: O «todos sus aliados». El hebreo literalmente dice «todos sus ayudantes/helpers», refiriéndose probablemente a las naciones o fuerzas que apoyan a Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Y entonces sabrán
  lexicon: HALOT
  rationale: El verbo ידע expresa conocimiento; el וְ inicial puede marcar consecuencia. 'Entonces' conserva la relación de resultado de juicio anunciada en el contexto, con español natural y fiel.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que sabrán, por lo que 'que' es la equivalencia más directa y natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton. En el POB español se adopta 'Yahvé' como forma principal para preservar el nombre divino, no una sustitución titular.
- source_word: בְּתִתִּי
  english_pob_choice: when I set
  chosen_spanish: cuando ponga
  alternatives_spanish:
  - cuando dé
  - al poner
  lexicon: HALOT
  rationale: El infinitivo constructo con בְּ marca circunstancia temporal. En español, 'cuando ponga' expresa con naturalidad la acción divina de introducir o colocar fuego.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - un fuego
  lexicon: HALOT
  rationale: '''אֵשׁ'' es ''fuego''. En español, sin artículo definido resulta idiomático y mantiene la fuerza del juicio.'
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - contra Egipto
  lexicon: HALOT
  rationale: La preposición es locativa. Aunque el sentido sea de juicio hostil, conviene mantener 'en Egipto' como en el hebreo, como hizo el POB inglés.
- source_word: וְנִשְׁבְּרוּ
  english_pob_choice: and ... are broken
  chosen_spanish: y ... sean quebrantados
  alternatives_spanish:
  - y ... sean rotos
  - y ... sean quebrados
  lexicon: HALOT
  rationale: El Niphal de שׁבר indica ser quebrado o roto. 'Sean quebrantados' conserva el valor pasivo y la resonancia bíblica sin perder la idea física y figurada de desmoronamiento.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los
  lexicon: HALOT
  rationale: Expresa totalidad. En español se integra mejor con el sustantivo siguiente en plural.
- source_word: עֹזְרֶיהָ
  english_pob_choice: her helpers
  chosen_spanish: sus ayudadores
  alternatives_spanish:
  - sus ayudantes
  - sus aliados
  lexicon: HALOT
  rationale: '''עֹזְרֶיהָ'' deriva de עזר, ''ayudar''. ''Ayudadores'' conserva la fuerza léxica directa que el POB inglés mantuvo con ''helpers''; ''aliados'' queda como interpretación contextual posible, pero menos literal.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El versículo usa explícitamente el nombre del pacto. La política del proyecto pide no ocultarlo tras 'SEÑOR'; 'Yahvé' mantiene el nombre revelado y es la forma estándar del POB español.
  doctrine_reference: DOCTRINE.md — Tetragrámaton / nombre divino
- issue: Sentido de עֹזְרֶיהָ en contexto de juicio sobre Egipto
  english_pob_reading: all her helpers are broken
  chosen_spanish_reading: todos sus ayudadores sean quebrantados
  alternative_spanish_readings:
  - todos sus aliados sean quebrantados
  - todos los que la ayudan sean quebrantados
  rationale: El hebreo dice literalmente 'sus ayudadores'. Aunque puede aludir a naciones o fuerzas aliadas, el POB inglés preserva la expresión léxica y deja la interpretación abierta en nota; el español debe hacer lo mismo.
  doctrine_reference: Principio POB de transparencia léxica y notas de alternativa contextual
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «set fire in Egypt» por «set fire to Egypt» para hacer más natural la preposición inglesa sin alterar el hebreo locativo. En español se siguió esa misma distinción natural, con «poner fuego en Egipto», y se mantuvo la terminología del nombre divino y de 'helpers' con nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo Yahvé, conforme al estándar del POB español para יְהוָה.
  - Se eligió 'ayudadores' para reflejar la lexis de עוזרים y dejar abierta la opción contextual 'aliados' en nota.
  - '''Sean quebrantados'' conserva la pasiva del Niphal y el tono bíblico sin convertirlo en paráfrasis.'
  - La construcción 'Entonces sabrán que...' reproduce el valor consecutivo del prefijo verbal y del כִּי introductorio.
  - Se evitó 'SEÑOR' y 'Cristo', por no corresponder al texto ni a la terminología del pasaje.
