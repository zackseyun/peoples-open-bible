translation:
  language: es
  text: Y harás vestiduras santas para Aarón tu hermano[a], para gloria y para belleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para honor y para belleza' o 'para gloria y para esplendor'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás de hacer
  - Y debes hacer
  lexicon: WLC / HALOT
  rationale: El perfecto 2ms con prefijo en contexto instructivo funciona como mandato. En español, 'harás' conserva la fuerza directiva de manera natural; se mantiene la conjunción inicial para reflejar el enlace del hebreo.
- source_word: בִגְדֵי
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropas
  - vestidos
  lexicon: HALOT
  rationale: En contexto sacerdotal, 'vestiduras' es una opción digna y precisa para prendas de oficio sagrado. Evita la rigidez de un calco y no introduce terminología eclesiástica más específica que el hebreo.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santas
  alternatives_spanish:
  - sagradas
  - consagradas
  lexicon: HALOT
  rationale: El sentido es de prendas apartadas para uso sagrado. 'Santas' preserva el valor cultual de קֹדֶשׁ en español bíblico sin perder claridad.
- source_word: לְאַהֲרֹן
  english_pob_choice: for Aaron
  chosen_spanish: para Aarón
  alternatives_spanish:
  - para Aharón
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional y ampliamente reconocible del nombre propio, manteniendo inteligibilidad y continuidad bíblica.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano mayor
  - tu pariente
  lexicon: HALOT
  rationale: La relación familiar literal se conserva sin expansión interpretativa. 'Tu hermano' reproduce con claridad el vínculo entre Moisés y Aarón.
- source_word: לְכָבוֹד
  english_pob_choice: for glory
  chosen_spanish: para gloria
  alternatives_spanish:
  - para honor
  - para esplendor
  lexicon: HALOT
  rationale: '''Gloria'' mantiene el registro elevado y la amplitud semántica de כבוד, especialmente en paralelo con תפארת. No se estrecha a un mero honor humano.'
- source_word: וּלְתִפְאָרֶת
  english_pob_choice: and for beauty
  chosen_spanish: y para belleza
  alternatives_spanish:
  - y para esplendor
  - y para ornato
  lexicon: HALOT
  rationale: '''Belleza'' comunica con claridad moderna el valor estético de תפארת, preservando el paralelismo con ''gloria'' y sin sobretraducir hacia ''ornato''.'
theological_decisions:
- issue: Finalidad de las vestiduras sacerdotales
  english_pob_reading: The garments are made 'for glory and for beauty,' expressing both dignity and splendor without narrowing the phrase to merely human honor or merely divine glory.
  chosen_spanish_reading: Las vestiduras se hacen 'para gloria y para belleza', expresando dignidad y esplendor sin reducir la frase a un solo matiz.
  alternative_spanish_readings:
  - para honor y para belleza
  - para gloria y para esplendor
  rationale: La doble finalidad del hebreo לְכָבוֹד וּלְתִפְאָרֶת se conserva en español con un paralelismo natural. 'Gloria' y 'belleza' mantienen la amplitud semántica y el tono teológico del texto.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al colocar [a] junto a 'tu hermano', conforme al registro auditado de la POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo preposicional 'para... y para...' como reflejo natural del hebreo.
  - No se introdujo 'SEÑOR' ni otras convenciones de sustitución, ya que el versículo no contiene el nombre divino.
  - '''Vestiduras'' conserva el tono sacerdotal sin convertirlo en terminología eclesiástica posterior.'
