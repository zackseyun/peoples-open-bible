review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: secuencia narrativa, sujeto explícito, interjección de alarma, nombre divino Yahvé, referencia a «estos tres reyes» y el modismo de entrega al poder de Moab. Sin embargo, cambia el infinitivo más literalmente equivalente «dar» por «entregar», pese a que el rastro léxico inglés documenta la preferencia por conservar «called» y «to give them» sin intensificar el verbo, dejando que el sentido hostil lo aporte «en manos de Moab».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Entonces el rey de Israel dijo: “¡Ay!...”» fluye bien, y «en manos de Moab» es idiomático. La única reparación necesaria es alinear mejor el verbo con la decisión léxica documentada y evitar una nota que justifique una intensificación no necesaria.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; no hay conflictos con otros términos doctrinales. El punto a corregir es léxico-estilístico: לָתֵת אֹתָם debe mantenerse más cerca de «dar»/«poner ... en manos de» que de «entregar», porque el POB inglés explícitamente evitó sobreinterpretar el verbo.'
  issues:
  - severity: medium
    issue: «para entregarlos» sobreinterpreta לָתֵת אֹתָם
    rationale: El hebreo dice literalmente «para darlos», y el rastro inglés defendió conservar esa forma básica, dejando que el matiz hostil provenga del modismo siguiente «en la mano de Moab». «Entregarlos» es comprensible, pero intensifica el verbo más de lo documentado.
  - severity: medium
    issue: La nota [a] justifica un cambio innecesario frente a la decisión léxica auditada
    rationale: La nota afirma que «entregarlos» expresa con más claridad el contexto hostil, pero precisamente la documentación inglesa optó por no cargar ese matiz en el verbo «dar/call». Conviene eliminar esa nota y formular la frase de modo más fiel al rastro fuente.
  revised_spanish_text: 'Entonces el rey de Israel dijo: «¡Ay! Yahvé ha llamado a estos tres reyes para ponerlos en manos de Moab[a]».'
  revised_footnotes:
  - marker: a
    text: «En manos de Moab» reproduce el modismo hebreo «en la mano de Moab», es decir, «bajo el poder de Moab».
    reason: cultural_note
  revision_rationale: 'Se ajusta «para entregarlos» a «para ponerlos en manos de Moab» para preservar mejor la combinación hebrea לָתֵת ... בְּיַד y seguir la rationale auditada: no intensificar indebidamente el verbo «dar», dejando que el sentido de sometimiento lo exprese el modismo «en manos de». Se elimina la nota léxica anterior porque defendía una expansión no necesaria.'
