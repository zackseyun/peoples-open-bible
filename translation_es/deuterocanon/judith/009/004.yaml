  yaml_path: translation/deuterocanon/judith/009/004.yaml
  text: And you gave their wives as plunder[a], and their daughters into captivity, and all their spoils for division among the sons beloved by you, who also were zealous with your zeal and abhorred the defilement of their blood and called on you for help. O God, my God, hear me[b], the widow.
