translation:
  language: es
  text: Y la tarifa era un pim[a] para las rejas del arado, para las azadas, para las horquillas de tres puntas, para las hachas[b], y para ajustar los aguijones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un pim era probablemente un pequeño peso o pago, entendido a menudo como unos dos tercios de un siclo.
    reason: cultural_note
  - marker: b
    text: 'O: «el afilado era un pim»; el hebreo es difícil, y el versículo puede describir tanto la tarifa cobrada como el afilado mismo.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַפְּצִירָה
  english_pob_choice: the charge
  chosen_spanish: el afilado
  alternatives_spanish:
  - la carga
  - la tarifa
  - el afilamiento
  lexicon: HALOT
  rationale: El hebreo es difícil y puede referirse al acto o al costo vinculado con afilar o arreglar las herramientas. Dado que la POB inglesa preserva esa tensión con una nota alternativa, en español se elige una forma que pueda abarcar la operación, sin fijar indebidamente solo el cobro.
- source_word: פִים
  english_pob_choice: a pim
  chosen_spanish: un pim
  alternatives_spanish:
  - dos tercios de un siclo
  - un pago llamado pim
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado, porque su valor exacto es especializado y no conviene reemplazarlo por una equivalencia incierta en el texto principal.
- source_word: מַחֲרֵשֹׁת
  english_pob_choice: plowshares
  chosen_spanish: los arados
  alternatives_spanish:
  - las rejas del arado
  - las cuchillas del arado
  lexicon: HALOT
  rationale: Aunque el inglés dice 'plowshares', en español 'rejas del arado' sería más técnico; sin embargo, para una lectura amplia y natural se usa 'arados', entendiendo el instrumento agrícola en conjunto, con reconocimiento de que el término apunta a la pieza de hierro del arado.
- source_word: אֵתִים
  english_pob_choice: mattocks
  chosen_spanish: las azadas
  alternatives_spanish:
  - los zapapicos
  - las hoces de cavar
  lexicon: HALOT
  rationale: '''Azadas'' comunica bien la idea de herramienta de cavar o remover tierra y es comprensible en español moderno, aunque el implemento exacto no es totalmente seguro.'
- source_word: שְׁלֹשׁ קִלְּשׁוֹן
  english_pob_choice: the three-pronged forks
  chosen_spanish: los tridentes de tres puntas
  alternatives_spanish:
  - los tridentes
  - los tenedores de tres puntas
  lexicon: HALOT
  rationale: La expresión literalmente describe un útil de tres puntas. 'Tridentes de tres puntas' conserva la imagen con claridad, aunque resulta algo redundante; esa redundancia ayuda a mantener la forma hebrea sin simplificar en exceso.
- source_word: קַּרְדֻּמִּים
  english_pob_choice: axes
  chosen_spanish: las hachas
  alternatives_spanish:
  - los azadones
  - las hachas de leñador
  lexicon: HALOT
  rationale: '''Hachas'' es el equivalente más directo y natural para el español, manteniendo el sentido de herramienta de corte/chopado.'
- source_word: לְהַצִּיב הַדָּרְבָן
  english_pob_choice: for setting the goads
  chosen_spanish: para poner en orden los aguijones
  alternatives_spanish:
  - para fijar los aguijones
  - para ajustar los aguijones
  lexicon: HALOT
  rationale: El infinitivo puede implicar poner, ajustar o dejar listos los aguijones. 'Poner en orden' preserva la amplitud semántica de 'setting' sin decidir prematuramente entre fijar, ajustar o afilar.
translation_notes:
  revision_awareness: 'La POB inglesa mantiene una decisión óptima con nota alternativa: traduce הַפְּצִירָה como ''the charge'' y preserva pim como unidad técnica, mientras reconoce que el hebreo podría entenderse como el afilado mismo. La versión española sigue esa cautela, conserva pim y añade una nota alternativa equivalente para no borrar la tensión textual.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'SEÑOR' u otro sustituto teológico porque no aparece en el hebreo aquí.
  - Se conserva el orden enumerativo del hebreo y de la POB inglesa para reflejar la lista de herramientas sin expandirla interpretativamente.
  - '''Aguijones'' traduce el último término de forma dinámica y natural; no se fuerza ''goads'' como tecnicismo extranjero.'
  - La redundancia 'tridentes de tres puntas' sigue la forma hebrea y evita rebajar la precisión de la imagen.
