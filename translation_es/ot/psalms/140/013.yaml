base_translation:
  language: en
  yaml_path: translation/ot/psalms/140/013.yaml
  text: I know that Yahweh will uphold the cause of the afflicted[b][a], and justice for the needy.
  footnotes:
  - marker: a
    text: Or 'I have known'; the Hebrew form is traditionally understood here as the psalmist's confession, 'I know.' Some take the consonantal form as 'you know.'
    reason: textual_variant
  - marker: b
    text: Literally 'will do the cause/case of the afflicted'—that is, he will act to uphold their legal cause.
    reason: lexical_alternative
