- source_word: μηδὲν ἐπιστάμενος
  english_pob_choice: understanding nothing
  chosen_korean: 아무것도 알지 못하고
  alternatives_korean:
  - 아무것도 깨닫지 못하고
  lexicon: BDAG
  rationale: 표준 표현.
- source_word: νοσῶν περὶ ζητήσεις καὶ λογομαχίας
  english_pob_choice: sick with a craving for controversies and word-battles
  chosen_korean: 논쟁과 말다툼에 병적으로 집착하는 자
  alternatives_korean:
  - 변론과 말싸움에 병들어 있는 자
  lexicon: BDAG
  rationale: νοσέω의 「병들다」 비유를 「병적으로」로 옮긴다.
- source_word: φθόνος, ἔρις, βλασφημίαι, ὑπόνοιαι πονηραί
  english_pob_choice: envy, strife, slanders, and evil suspicions
  chosen_korean: 시기, 다툼, 비방, 악한 의심
  alternatives_korean:
  - 질투, 분쟁, 험담, 사악한 추측
  lexicon: BDAG
  rationale: 정형적 악행 목록.
