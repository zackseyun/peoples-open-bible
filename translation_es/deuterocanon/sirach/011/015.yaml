revisions:
- from: Y el ojo del Señor lo miró para bien[a], y lo levantó[b] del polvo de inmundicia[c].
  to: Y el ojo de Yahvé lo miró para bien[a], y lo levantó[b] del polvo de inmundicia[c].[d]
