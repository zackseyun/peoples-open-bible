review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: una madre, dos ψῆφοι, y el contraste entre una opción mortal y otra salvadora en relación con sus hijos. Sin embargo, ''salvador'' suena más personal y teológicamente cargado en español que el adjetivo griego σωτήριον en este contexto; ''que salva'' o ''salvadora'' preserva mejor el sentido adjetival. Además, la nota introduce alternativas (''guijarros'') no alineadas con la nota inglesa, que habla de ''votes'' o más literalmente ''pebbles''; conviene simplificar y ajustar la nota al audit trail.'
  spanish_quality_summary: El texto es legible y digno, pero 'uno mortal y otro salvador' resulta algo áspero e idiomáticamente menos natural porque 'salvador' suele percibirse como sustantivo o título personal. 'Uno mortal y otro que salva' fluye mejor y expresa con claridad el contraste. La nota actual también es algo recargada.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión 'votos' para ψήφους es defendible y está respaldada por el expediente inglés, con nota para el sentido más literal. La mejoría necesaria es principalmente de matiz léxico y de alineación de nota.
  issues:
  - severity: medium
    issue: '''salvador'' para σωτήριον'
    rationale: Aunque posible, en español 'salvador' se oye fácilmente como sustantivo o título personal ('el Salvador'), lo que puede introducir una resonancia más fuerte que el simple adjetivo griego. 'Que salva' mantiene el valor adjetival y el contraste con 'mortal' sin sobrecarga teológica.
  - severity: low
    issue: Nota al pie demasiado expandida respecto al audit trail
    rationale: La nota inglesa preserva 'two votes' y, más literalmente, 'two pebbles'. La nota española añade 'guijarros', que no aporta claridad adicional y puede sonar menos natural en registro bíblico. Conviene una nota más sobria y ajustada al expediente.
