translation:
  language: es
  text: Y Darío el medo recibió[a] el reino, siendo de aproximadamente sesenta y dos años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomó el reino». El verbo arameo admite una traducción más amplia, pero «recibió» refleja más de cerca la formulación y evita insinuar un mecanismo concreto de ascenso al poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/דָרְיָוֶשׁ
  english_pob_choice: And Darius
  chosen_spanish: Y Darío
  alternatives_spanish:
  - Ahora Darío
  - Entonces Darío
  lexicon: HALOT
  rationale: La conjunción וְ se mantiene como enlace narrativo simple con «Y». El nombre propio se translitera como «Darío» en español bíblico claro y natural.
- source_word: מָדָיָא
  english_pob_choice: the Mede
  chosen_spanish: el medo
  alternatives_spanish:
  - el mediano
  lexicon: HALOT
  rationale: El gentilicio se vierte como «el medo», forma idiomática en español que identifica el origen étnico/nacional de Darío.
- source_word: קַבֵּל
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - tomó
  - aceptó
  lexicon: HALOT
  rationale: «Recibió» refleja de cerca el valor verbal del arameo y evita cargar el texto con la idea de conquista o usurpación que «tomó» podría sugerir.
- source_word: מַלְכוּתָא
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  lexicon: HALOT
  rationale: «Reino» es la opción más natural en español para el dominio real al que se refiere el contexto narrativo.
- source_word: כְּבַר
  english_pob_choice: being about
  chosen_spanish: siendo de unos
  alternatives_spanish:
  - cuando tenía aproximadamente
  - a la edad de
  lexicon: HALOT
  rationale: La construcción aramea de edad se expresa en español con una frase participial que conserva la aproximación y suena natural y formal.
- source_word: שְׁנִין
  english_pob_choice: years old
  chosen_spanish: años
  alternatives_spanish:
  - años de edad
  lexicon: HALOT
  rationale: En español, «de unos sesenta y dos años» ya comunica la edad de forma idiomática; no hace falta repetir «de edad».
- source_word: שִׁתִּין וְתַרְתֵּין
  english_pob_choice: sixty-two
  chosen_spanish: sesenta y dos
  alternatives_spanish:
  - sesenta y dos años
  lexicon: HALOT
  rationale: Los numerales se traducen en español moderno estándar como «sesenta y dos».
theological_decisions:
- issue: Naturaleza de la llegada de Darío al reino
  english_pob_reading: received the kingdom
  chosen_spanish_reading: recibió el reino
  alternative_spanish_readings:
  - tomó el reino
  - llegó a ser rey sobre el reino
  rationale: Se conserva la ambigüedad del arameo respecto del modo de acceso al poder; no se resuelve si lo conquistó, lo heredó o fue puesto sobre él.
  doctrine_reference: Preservar la tensión interpretativa del texto sin armonizarla indebidamente.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del inglés POB, que prefirió «received the kingdom, being about sixty-two years old» para reflejar más directamente la construcción aramea. En español, «siendo de unos sesenta y dos años» conserva ese giro formal sin sonar forzado.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar en la serie, pero este versículo no contiene el nombre divino.
  - «Medo» se mantiene como gentilicio bíblico normal en lugar de una calca más técnica.
  - Se eligió «reino» en vez de «reinado» para ajustarse al contexto narrativo y a la formulación auditada en inglés.
  - La nota textual se ancla en «recibió» porque ahí está la alternativa lexical relevante.
