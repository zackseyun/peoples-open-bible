  glossary_alignment: No hay conflictos con los términos de proyecto. El manejo de συνετῇ como «sensata» está bien justificado; δουλεύω como «ha servido» respeta la decisión auditada; no aparecen términos sensibles como Yahvé/Mesías. La opción «el hombre» mantiene la precisión de género del griego según la política del proyecto.
