lexical_decisions:
- source_word: וְ/יוֹעֵאלָה
  english_pob_choice: and Joelah
  chosen_spanish: y Jeoela
  alternatives_spanish:
  - y Joela
  - y Yoeala
  lexicon: HALOT
  rationale: Se conserva el nombre propio mediante transliteración, no traducción. Se mantiene el conector 'y' para el prefijo וְ. 'Jeoela' sigue de cerca la forma hebrea יוֹעֵאלָה y evita una adaptación excesiva al molde castellano.
- source_word: וּ/זְבַדְיָה
  english_pob_choice: and Zebadiah
  chosen_spanish: y Zebadías
  alternatives_spanish:
  - y Zabadías
  - y Zebadiah
  lexicon: HALOT
  rationale: El nombre propio se translitera con una forma castellana natural y reconocible. Se mantiene 'y' para el prefijo conjuntivo. 'Zebadías' preserva la relación con la forma hebrea sin introducir traducción interpretativa.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: El hebreo constructo plural de בן se rinde de manera directa como 'los hijos de', que es natural en español y conserva el parentesco inmediato indicado por el texto.
- source_word: יְרֹחָם
  english_pob_choice: Jeroham
  chosen_spanish: Jeroham
  alternatives_spanish:
  - Jerojam
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma conocida 'Jeroham' por ser inteligible en español bíblico y cercana a la convención inglesa auditada.
- source_word: מִן הַ/גְּדֽוֹר
  english_pob_choice: from Gedor
  chosen_spanish: de Gedor
  alternatives_spanish:
  - de Gedor
  - desde Gedor
  lexicon: HALOT
  rationale: El מקור/preposición מִן se expresa aquí de forma natural con 'de' en una indicación de procedencia o afiliación. No se fuerza 'desde' porque el hebreo también puede señalar pertenencia o origen clanico/geográfico, y 'de Gedor' es la opción más fluida en español.
translation_notes:
  revision_awareness: 'El texto hebreo y la traducción inglesa auditada coinciden sustancialmente: una lista breve de nombres con filiación y procedencia. No se observan variantes textuales relevantes ni cambios de sentido pendientes; el punto más sensible es la transliteración de los nombres propios y la preposición de procedencia.'
  spanish_consistency_notes:
  - Se usa 'y' para reproducir el valor conjuntivo del hebreo inicial.
  - Se evita capitalización innecesaria fuera de los nombres propios.
  - '''de Gedor'' conserva una lectura sobria de procedencia/origen sin sobreespecificar el matiz.'
  - La nota al pie se limita a una alternativa ortográfica del primer nombre, siguiendo el antecedente inglés.
