base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/044/013.yaml
  text: And I will punish those who dwell in the land of Egypt[a], just as I punished Jerusalem, with the sword, with famine[b], and with pestilence.
  footnotes:
  - marker: a
    text: Or 'I will visit judgment on those who dwell in the land of Egypt ... as I visited Jerusalem.' The Hebrew verb פקד can mean 'attend to,' 'visit,' or, in judgment contexts like this one, 'punish.'
    reason: lexical_alternative
  - marker: b
    text: '''Pestilence'' may also be rendered ''plague.'''
    reason: lexical_alternative
