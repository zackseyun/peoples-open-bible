revisions:
- from: Así pusieron el arca de Dios sobre un carro nuevo, desde la casa de Abinadab[a]; y Uza y Ahío guiaban el carro.
  to: Entonces pusieron el arca de Dios sobre un carro nuevo de la casa de Abinadab, y Uza y Ahío guiaban[a] el carro.
  rationale: Se mejora la naturalidad del español narrativo, se elimina una nota innecesaria sobre «de/desde la casa de Abinadab», y se restaura la nota léxica importante del expediente inglés sobre נֹהֲגִים. El sentido fuente se mantiene intacto y más claro en español.
