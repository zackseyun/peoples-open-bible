translation:
  language: es
  text: Y lloraron por él allí[a], y todo Israel hizo gran duelo por él, y guardaron luto por muchos días, y dijeron,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego encadena vocabulario de duelo: primero un verbo de lamentación, luego el sustantivo ''gran duelo'', y después otro verbo distinto para el luto. La traducción conserva esa acumulación en vez de suavizarla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκόψαντο
  english_pob_choice: mourned
  chosen_spanish: lo lloraron
  alternatives_spanish:
  - lo lamentaron
  - hicieron duelo por él
  lexicon: LSJ
  rationale: El verbo medio de κόπτω en contexto fúnebre expresa lamento o duelo ritual. En español, “lo lloraron” comunica de manera natural ese duelo sin añadir gestos físicos que el griego no especifica.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: gramática griega
  rationale: El pronombre retoma a Judas en el contexto inmediato. En español, el objeto directo pronominal “lo” es la forma más natural y concisa.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  lexicon: LSJ
  rationale: Es un adverbio locativo simple; “allí” conserva la referencia espacial de modo idiomático en español.
- source_word: πᾶς Ἰσραήλ
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - la totalidad de Israel
  - Israel entero
  lexicon: LSJ
  rationale: La expresión es colectiva y nacional. “Todo Israel” preserva el alcance corporativo y suena natural en español bíblico contemporáneo.
- source_word: κοπετὸν μέγαν
  english_pob_choice: with great mourning
  chosen_spanish: con gran duelo
  alternatives_spanish:
  - con gran lamentación
  - con un gran duelo
  lexicon: LSJ
  rationale: κοπετός intensifica el campo semántico del lamento funerario y repite la idea del verbo anterior. “Gran duelo” mantiene esa acumulación sin recargar el estilo.
- source_word: ἔπενθουν
  english_pob_choice: they grieved
  chosen_spanish: se dolieron
  alternatives_spanish:
  - siguieron de duelo
  - estuvieron de luto
  lexicon: LSJ
  rationale: πενθέω introduce una variación respecto del primer verbo de duelo. “Se dolieron” preserva esa diferencia y expresa aflicción/bereavement sin repetir exactamente el mismo verbo.
- source_word: ἡμέρας πολλὰς
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - muchos días
  - durante muchos días
  lexicon: LSJ
  rationale: El acusativo de duración se vierte naturalmente como “por muchos días” en español.
- source_word: καὶ εἶπαν
  english_pob_choice: and said,
  chosen_spanish: y dijeron,
  alternatives_spanish:
  - y decían,
  lexicon: LSJ
  rationale: La cláusula introduce la cita del versículo siguiente; se conserva la conjunción y la coma final para señalar continuidad discursiva.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego de Swete 1909 y el rastreo auditado en inglés POB. No se detectan revisiones aplicadas en el expediente; se mantiene la repetición enfática de lenguaje de duelo que el inglés también preserva.
  spanish_consistency_notes:
  - Se usa “Israel” sin artículo para reflejar la expresión colectiva del griego.
  - Se evita “SEÑOR” o lenguaje sustitutivo porque no aparece el tetragrámaton ni κύριος en este versículo.
  - 'Se mantiene la progresión retórica de duelo triple: lloraron / gran duelo / se dolieron.'
