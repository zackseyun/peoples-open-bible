translation:
  language: es
  text: 'Entonces Saúl envió mensajeros a la casa de David para vigilarlo y matarlo por la mañana. Y Mical, su esposa, le dijo a David: «Si no salvas[a] tu vida esta noche, mañana serás ejecutado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si no escapas con tu vida esta noche, mañana serás ejecutado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - emisarios
  - enviados
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de enviados humanos de Saúl, no de seres celestiales. «Mensajeros» conserva el valor habitual y claro del término.
- source_word: לְשָׁמְרוֹ
  english_pob_choice: to watch him
  chosen_spanish: vigilarlo
  alternatives_spanish:
  - guardarlo
  - mantenerlo vigilado
  lexicon: HALOT
  rationale: El verbo describe una vigilancia hostil sobre David para capturarlo; «vigilarlo» comunica mejor esa acción de observación que «guardarlo», que en español puede sonar protector.
- source_word: וְלַהֲמִיתוֹ
  english_pob_choice: to kill him
  chosen_spanish: matarlo
  alternatives_spanish:
  - darle muerte
  - ponerlo a muerte
  lexicon: HALOT
  rationale: El hifil de מות expresa causar la muerte. «Matarlo» es directo y natural en español, sin perder la referencia al plan de asesinato.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - a la mañana
  lexicon: HALOT
  rationale: La expresión temporal señala el momento previsto para la ejecución; «por la mañana» es idiomática y clara en español.
- source_word: וַתַּגֵּד
  english_pob_choice: told
  chosen_spanish: informó
  alternatives_spanish:
  - avisó
  - dio aviso a
  lexicon: HALOT
  rationale: Aquí Mical comunica una advertencia urgente a David. «Informó» conserva el acto de comunicar; la forma seguida por «a David» permite mantener la estructura narrativa sin añadir interpretación excesiva.
- source_word: מִיכַל אִשְׁתּוֹ
  english_pob_choice: Michal his wife
  chosen_spanish: Mical, su esposa
  alternatives_spanish:
  - Mical, la esposa de él
  - Mical, mujer de él
  lexicon: HALOT
  rationale: Se preserva la aposición hebrea identificando a Mical como la esposa de David. En español, «su esposa» es claro y fluido; el nombre se mantiene en orden natural con coma explicativa.
- source_word: מְמַלֵּט אֶת־נַפְשְׁךָ
  english_pob_choice: save your life
  chosen_spanish: salvas tu vida
  alternatives_spanish:
  - escapas con vida
  - libras tu vida
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a preservar la propia vida ante un peligro mortal. «Salvar tu vida» reproduce bien la fuerza urgente del original. Se evita diluir el sentido con una paráfrasis más amplia.
- source_word: הַלַּיְלָה
  english_pob_choice: tonight
  chosen_spanish: esta noche
  alternatives_spanish:
  - esta misma noche
  - la noche de hoy
  lexicon: HALOT
  rationale: Con artículo y valor temporal inmediato, el sentido es la noche presente. «Esta noche» es la opción más natural y fiel.
- source_word: מוּמָת
  english_pob_choice: you will be put to death
  chosen_spanish: serás puesto a muerte
  alternatives_spanish:
  - morirás
  - serás muerto
  lexicon: HALOT
  rationale: La forma pasiva predice la muerte de David bajo agencia humana. «Serás puesto a muerte» mantiene un registro formal y conserva la pasiva, alineándose con la decisión inglesa de no neutralizar el agente implícito.
theological_decisions:
- issue: Conjunction and narrative flow
  english_pob_reading: And Michal his wife told David
  chosen_spanish_reading: E informó Mical, su esposa, a David
  alternative_spanish_readings:
  - Pero Mical, su esposa, avisó a David
  - Y Mical, su esposa, dijo a David
  rationale: El hebreo usa una simple conjunción narrativa. Se evita un «pero» interpretativo y se mantiene la progresión del relato con «e» ante vocal para mejor eufonía.
  doctrine_reference: Narrative accuracy / discourse coherence
- issue: Passive death prediction
  english_pob_reading: tomorrow you will be put to death
  chosen_spanish_reading: mañana serás puesto a muerte
  alternative_spanish_readings:
  - mañana morirás
  - mañana te darán muerte
  rationale: El pasivo hebreo deja ver que David será ejecutado por otros, no simplemente que morirá. La opción elegida conserva esa agencia externa y el tono formal del pasaje.
  doctrine_reference: Lexical theology of divine/human agency in judgment narratives
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió una conjunción narrativa simple («And») y una forma pasiva más formal («you will be put to death»). La versión española sigue esa línea, evitando una traducción más interpretativa del conector y manteniendo la pasiva formal en el cierre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponda en otros pasajes, aunque este versículo no lo contiene.
  - Se usa «Mical» con la grafía española usual y se conserva la relación posesiva con David de forma explícita.
  - Se evita «SEÑOR» como sustituto teológico porque no aparece el nombre divino en este versículo.
  - El tono combina claridad moderna con registro bíblico digno, sin calcos innecesarios.
