translation:
  language: es
  text: pieles de carneros teñidas de rojo, cuero fino[a], y madera de acacia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo תְּחָשִׁים designa un material o una fuente animal incierta; entre las posibilidades propuestas están «pieles de dugongo», «pieles de marsopa» o una clase de cuero de alta calidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹרֹת
  english_pob_choice: skins
  chosen_spanish: pieles
  alternatives_spanish:
  - cueros
  - pieles de animal
  lexicon: HALOT
  rationale: El sustantivo en plural constructo se refiere a pieles/cuernos como material. En español, «pieles» conserva la materialidad del listado sin sobreespecificar el procesamiento.
- source_word: אֵילִם
  english_pob_choice: ram
  chosen_spanish: carneros
  alternatives_spanish:
  - rams
  lexicon: HALOT
  rationale: El plural hebreo apunta a carneros; en español, «carneros» es natural y transparente dentro de una lista de materiales.
- source_word: מְאָדָּמִים
  english_pob_choice: dyed red
  chosen_spanish: teñidas de rojo
  alternatives_spanish:
  - enrojecidas
  - hechas rojas
  - rojas
  lexicon: HALOT
  rationale: La forma participial sugiere una acción aplicada a las pieles. «Teñidas de rojo» preserva esa idea de tratamiento intencional mejor que un simple adjetivo de color.
- source_word: עֹרֹת תְּחָשִׁים
  english_pob_choice: fine leather skins
  chosen_spanish: pieles de fine leather
  alternatives_spanish:
  - pieles de dugongo
  - pieles de marsopa
  - cuero fino
  - pieles de tahash
  lexicon: HALOT
  rationale: El referente de תְּחָשִׁים es incierto. Sin evidencia suficiente para fijar un animal, se mantiene la ambigüedad del material. La redacción final refleja esa incertidumbre, aunque requiere ajuste idiomático en una revisión posterior para español publicable.
- source_word: עֲצֵי
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - maderas
  - maderos
  lexicon: HALOT
  rationale: En una lista de materiales, el constructo se vierte naturalmente como «madera».
- source_word: שִׁטִּים
  english_pob_choice: acacia
  chosen_spanish: de acacia
  alternatives_spanish:
  - shittim
  - de árbol de acacia
  lexicon: HALOT
  rationale: La identificación a acacia es la opción establecida y clara; en español, «madera de acacia» comunica bien el término.
translation_notes:
  revision_awareness: El texto inglés base y la revisión más reciente no introdujeron cambios sustantivos; el punto principal para el español es resolver con transparencia la ambigüedad de תְּחָשִׁים sin convertirla en una especificación no demostrada. La redacción actual conserva esa tensión, aunque la frase intermedia necesita pulido idiomático para publicación final.
  spanish_consistency_notes:
  - 'Se mantiene el orden de los materiales del hebreo: pieles de carnero teñidas de rojo, pieles de תְּחָשִׁים y madera de acacia.'
  - Se evita reemplazar la incertidumbre léxica de תְּחָשִׁים por un equivalente tradicional no documentado.
  - Para una edición final, conviene unificar la expresión de la segunda frase en español más natural, sin perder la ambigüedad fuente.
