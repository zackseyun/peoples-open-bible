translation:
  language: es
  text: Después de él vino Samgar hijo de Anat, y derribó a seiscientos filisteos con una aguijada de bueyes[b]; también él salvó a Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libró a Israel». El verbo hebreo puede indicar rescate o liberación en un contexto militar.
    reason: lexical_alternative
  - marker: b
    text: Una «aguijada de bueyes» era un palo puntiagudo usado para arrear el ganado.
    reason: cultural_note
lexical_decisions:
- source_word: וְאַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Después
  - Después de aquel
  - Tras él
  lexicon: HALOT
  rationale: La expresión mira hacia el juez anterior sin nombrarlo. «Después de él» conserva la referencia anafórica de forma natural en español.
- source_word: הָיָה
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - estaba
  - llegó a ser
  - apareció
  lexicon: HALOT
  rationale: Aquí funciona como verbo de introducción secuencial; «fue» es una forma breve y natural en español para esa presentación narrativa.
- source_word: שַׁמְגַּר בֶּן עֲנָת
  english_pob_choice: Shamgar son of Anath
  chosen_spanish: Samgar hijo de Anat
  alternatives_spanish:
  - Shamgar hijo de Anath
  - Samgar ben-Anat
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma usual en español, y se mantiene literalmente «hijo de Anat» porque el texto no aclara si es filiación o epíteto.
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: golpeó
  alternatives_spanish:
  - derribó
  - mató
  - hirió
  lexicon: HALOT
  rationale: El verbo hebreo implica golpear con violencia y, por el contexto bélico, probablemente causar la muerte; «golpeó» evita afirmar más de lo que el verbo expresa, aunque en español suena menos conclusivo que la opción inglesa.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - filisteos
  - los filisteos
  lexicon: HALOT
  rationale: El sustantivo colectivo se vierte de manera directa y natural como «filisteos».
- source_word: שֵׁשׁ מֵאוֹת אִישׁ
  english_pob_choice: six hundred Philistines
  chosen_spanish: seis cientos filisteos
  alternatives_spanish:
  - seiscientos filisteos
  - seiscientos hombres filisteos
  lexicon: HALOT
  rationale: La cifra se conserva de modo formal y el colectivo se expresa en español sin añadir «hombres», siguiendo el ajuste revisado del inglés para una lectura más natural.
- source_word: בְּמַלְמַד הַבָּקָר
  english_pob_choice: with an ox goad
  chosen_spanish: con un aguijón de bueyes
  alternatives_spanish:
  - con un aguijón para bueyes
  - con una aguijada de bueyes
  - con un aguijón para el ganado
  lexicon: HALOT
  rationale: Se conserva el instrumento rural y su función de arreo. «Aguijón de bueyes» refleja el objeto del texto, aunque admite una leve ambigüedad natural en español; no se sustituye por un término moderno más técnico.
- source_word: וַיֹּשַׁע
  english_pob_choice: saved
  chosen_spanish: salvó
  alternatives_spanish:
  - libró
  - liberó
  - rescató
  lexicon: HALOT
  rationale: En Jueces el verbo suele expresar liberación de opresión. «Salvó» conserva el vocabulario repetido del libro y su amplitud semántica; «libró» sería una alternativa legítima, pero menos directa aquí.
- source_word: גַּם הוּא
  english_pob_choice: he too
  chosen_spanish: también él
  alternatives_spanish:
  - él también
  - incluso él
  lexicon: HALOT
  rationale: La partícula añade a Samgar a la serie de libertadores. «También él» mantiene el énfasis aditivo con buena fluidez española.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a Israel
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el objeto directo explícito sin expandirlo. «Israel» designa al pueblo/covenant community en el marco del libro.
theological_decisions:
- issue: Naturaleza de la acción salvadora de Samgar
  english_pob_reading: he too saved Israel
  chosen_spanish_reading: también él salvó a Israel
  alternative_spanish_readings:
  - también él libró a Israel
  - también él liberó a Israel
  rationale: El texto atribuye una verdadera acción de rescate/liberación a Samgar, pero no define su alcance ni duración. «Salvó» preserva la tensión sin convertir el acto en una afirmación soteriológica más amplia.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés al tratar el grupo contado como un colectivo natural («filisteos») y conserva el resto del sentido sin expandirlo. También refleja la decisión auditada de mantener el verbo de salvación en forma breve y la referencia al instrumento agrícola con un equivalente transparente en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada del nombre divino en este proyecto, pero este versículo no lo contiene.
  - «Samgar» y «Anat» se transliteran de manera uniforme y sobria.
  - Se mantiene el tono narrativo conciso propio del libro de Jueces, sin añadir detalles interpretativos.
  - La colocación de la nota [a] en «salvó» marca la alternativa lexical conservada en el audit trail.
  - La colocación de la nota [b] en «aguijón de bueyes» explica el objeto cultural sin sobrecargar el verso.
