translation:
  language: es
  text: Pero si te abstienes de hacer un voto[a], no habrá pecado en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no habrá culpa sobre ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: La partícula introduce aquí una condición con contraste respecto del versículo anterior; en español, «Pero si» conserva bien ese valor adversativo-condicional sin sonar arcaico.
- source_word: תֶחְדַּל
  english_pob_choice: you refrain
  chosen_spanish: te abstienes
  alternatives_spanish:
  - cesas
  - desistes
  lexicon: HALOT
  rationale: חדל expresa dejar de hacer algo o abstenerse de ello; «te abstienes» comunica con naturalidad la idea de no emprender la acción de votar.
- source_word: לִנְדֹּר
  english_pob_choice: from making a vow
  chosen_spanish: de hacer un voto
  alternatives_spanish:
  - de votar
  - de formular un voto
  lexicon: HALOT
  rationale: El infinitivo de נדר se refiere al acto de hacer un voto. «Hacer un voto» preserva el acto concreto y evita un giro demasiado técnico o rígido.
- source_word: לֹא יִהְיֶה
  english_pob_choice: there will be no
  chosen_spanish: no habrá
  alternatives_spanish:
  - no será
  - no existirá
  lexicon: HALOT
  rationale: La negación del verbo de existencia se expresa de forma natural en español con «no habrá», manteniendo el sentido resultativo/existencial del hebreo.
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - sobre ti
  - para ti
  lexicon: HALOT
  rationale: La preposición con sufijo es literalmente «en ti». En esta construcción legal-moral, «en ti» conserva la formulación hebrea y sigue siendo comprensible en español.
- source_word: חֵטְא
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - falta
  lexicon: HALOT
  rationale: חֵטְא puede abarcar pecado y culpa. Aquí, en contraste con el acto de hacer un voto, el sentido principal es que abstenerse de hacerlo no es pecado; «pecado» comunica con claridad la evaluación moral.
theological_decisions:
- issue: Valor moral de no hacer un voto
  english_pob_reading: The verse teaches that abstaining from making a vow is not itself sinful.
  chosen_spanish_reading: El versículo enseña que abstenerse de hacer un voto no constituye pecado.
  alternative_spanish_readings:
  - El versículo subraya más bien que no hay culpa jurídica al no votar.
  - El versículo enfatiza ausencia de responsabilidad culpable más que pecado en sentido estricto.
  rationale: El hebreo permite una superposición entre pecado y culpa, pero el contraste del contexto apunta a que no existe falta moral por no asumir un voto. La redacción principal mantiene «pecado» y deja abierta la matización de culpa en la nota.
  doctrine_reference: Deuteronomio 23:21-23; HALOT חטא
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa y quedó sin cambios; la redacción española sigue de cerca el valor condicional-adversativo del hebreo y conserva la alternativa semántica de חֵטְא en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención POB, aunque este versículo no lo contiene.
  - Se usa «voto» para נדר, coherente con el contexto inmediato de promesas votivas.
  - «Pecado» se conserva en el texto principal, con «culpa» como alternativa auditada en la nota.
