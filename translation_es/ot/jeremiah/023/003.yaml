  text: וַ/אֲנִ֗י אֲקַבֵּץ֙ אֶת שְׁאֵרִ֣ית צֹאנִ֔/י מִ/כֹּל֙ הָ/אֲרָצ֔וֹת אֲשֶׁר הִדַּ֥חְתִּי אֹתָ֖/ם שָׁ֑ם וַ/הֲשִׁבֹתִ֥י אֶתְ/הֶ֛ן עַל נְוֵ/הֶ֖ן וּ/פָר֥וּ וְ/רָבֽוּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/023/003.yaml
  text: And I myself will gather the remnant of my flock out of all the lands where I have driven them[a], and I will bring them back to their pasture[b], and they will be fruitful and multiply.
  footnotes:
  - marker: a
    text: Or 'where I have scattered them.' The Hebrew verb can denote causing to be driven away or dispersed; 'driven' was chosen to preserve the force of divine judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'to their fold' or 'to their habitation.' The Hebrew term can refer to a pasture, dwelling place, or resting place; 'pasture' fits the flock imagery here.
    reason: lexical_alternative
