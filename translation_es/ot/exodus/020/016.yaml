review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la prohibición forense de Éxodo 20:16: negación + verbo legal de testificar + dirección adversativa contra el prójimo + cualidad de falsedad. Sin embargo, la ubicación del adjetivo en «falso testimonio» suena menos idiomática y menos ajustada al giro fijo español que mejor refleja עֵד שָׁקֶר en este contexto.'
  spanish_quality_summary: '«No darás falso testimonio contra tu prójimo» es comprensible y tradicionalmente reconocible, pero en español general y jurídico-bíblico suena más natural «No darás testimonio falso contra tu prójimo». La nota actual no añade una alternativa útil, porque repite esencialmente la misma formulación invertida. Conviene alinear la nota con la alternativa auditada en inglés: «No testificarás falsamente contra tu prójimo».'
  glossary_alignment: No hay conflicto con los términos de proyecto. «Prójimo» es apropiado para רֵעַ; «testimonio/testificar» refleja bien el campo semántico legal de ענה + עֵד; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Orden poco natural en «falso testimonio»
    rationale: Aunque es entendible y tiene resonancia tradicional, «dar falso testimonio» suena menos natural en español actual que «dar testimonio falso», que además refleja con claridad la relación sustantivo + calificador de עֵד שָׁקֶר.
  - severity: medium
    issue: Nota al pie mal orientada
    rationale: 'La nota «O «testimonio falso contra tu prójimo»» no ofrece una alternativa léxica sustantiva al texto principal; solo reordena las mismas palabras. La auditoría inglesa preserva una alternativa verbal real: «testify falsely».'
