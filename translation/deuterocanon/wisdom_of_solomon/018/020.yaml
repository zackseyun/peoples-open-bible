translation:
  text: But the trial of death also touched the righteous[a], and a destruction of the multitude occurred in the wilderness[b]; yet the wrath did not remain for long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an experience of death' or 'a trial by death' for 'the testing of death.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a crushing of the multitude' for 'a breaking of the multitude.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἥψατο
  chosen: touched
  alternatives:
  - laid hold of
  - reached
  lexicon: LSJ
  rationale: From ἅπτομαι, here indicating that the experience came upon or affected the righteous. 'Touched' preserves the metaphor without overstating it as total destruction.
- source_word: δικαίων
  chosen: the righteous
  alternatives:
  - righteous people
  - just ones
  lexicon: LSJ
  rationale: Substantival genitive/plural after πεῖρα; 'the righteous' is natural English and preserves the moral-religious category.
- source_word: πεῖρα θανάτου
  chosen: the testing of death
  alternatives:
  - an experience of death
  - a trial by death
  - an assault of death
  lexicon: LSJ
  rationale: πεῖρα denotes trial, test, or experience. 'Testing of death' keeps the compact Greek expression and fits the context of a deadly plague that affected even the righteous without implying final condemnation.
- source_word: θραῦσις
  chosen: a breaking
  alternatives:
  - a crushing
  - a destruction
  - a shattering
  lexicon: LSJ
  rationale: The noun literally denotes breaking or shattering. 'A breaking' is slightly formal but preserves the imagery and leaves room for the context to define the nature of the calamity.
- source_word: πλήθους
  chosen: of the multitude
  alternatives:
  - of the crowd
  - of the people
  - of many
  lexicon: LSJ
  rationale: πλῆθος can denote a multitude or large number. 'The multitude' best reflects the collective sense in this plague context.
- source_word: ἐν ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: LSJ
  rationale: Standard rendering for ἔρημος in Israel's exodus setting; 'wilderness' better matches biblical usage than 'desert' here.
- source_word: ὀργή
  chosen: the wrath
  alternatives:
  - anger
  - indignation
  lexicon: LSJ
  rationale: In this context of divine judgment, 'wrath' better conveys judicial anger than the flatter 'anger'.
- source_word: οὐκ ἐπὶ πολὺ ἔμεινεν
  chosen: did not remain for long
  alternatives:
  - did not continue long
  - did not last long
  lexicon: LSJ
  rationale: Idiomatic English rendering of the temporal phrase, preserving the sense that the judgment was brief.
