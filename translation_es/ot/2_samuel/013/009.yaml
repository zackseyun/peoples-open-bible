  to: 'Entonces ella tomó la sartén y vertió el contenido delante de él[a], pero él se negó a comer. Y Amnón dijo: «Saquen de junto a mí a todos[c]». Así que todos salieron de junto a él.'
  rationale: Se corrigió «la derramó» por «virtió el contenido» para evitar que el español atribuya la acción a la sartén en vez de a la comida servida. También se eliminaron y reajustaron las notas para que expliquen correctamente el verbo hebreo en el lugar pertinente, conservando la nota colectiva sobre «todo hombre».
