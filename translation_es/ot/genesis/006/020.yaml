  to: De las aves, según sus clases[a], y del ganado, según sus clases, y de todo ser que se arrastra sobre la tierra, según su clase, dos de cada uno vendrán a ti para mantenerlos con vida.
  rationale: Se ajusta «especies» a «clases» para reflejar mejor לְמִין según la rationale POB y evitar un sentido biológico moderno; se reemplaza «reptil» por «ser que se arrastra» para no estrechar רֶמֶשׂ; y se usa «ganado» como equivalente natural y fiel para הַבְּהֵמָה en esta lista de categorías animales. No se requiere adjudicación adicional porque los cambios son léxicos y claros desde la evidencia fuente y el audit trail.
