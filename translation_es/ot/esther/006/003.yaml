revisions:
- from: 'Entonces el rey dijo[a]: «¿Qué honor y grandeza se han hecho para Mardoqueo por esto?». Los jóvenes del rey, sus servidores, dijeron: «No se ha hecho nada con él».'
  to: 'Entonces el rey dijo[a]: «¿Qué honor y grandeza se le han otorgado a Mardoqueo por esto?». Los jóvenes del rey que lo atendían dijeron: «No se ha hecho nada por él».'
  rationale: Se ajusta el español para expresar con naturalidad el pasivo de עשה en contexto de honores conferidos, se corrige el modismo final para que comunique correctamente la idea de que nada se ha hecho en favor de Mardoqueo, y se alisa la sintaxis de «jóvenes del rey» + participio mediante una relativa más natural en español. No se requieren cambios teológicos ni adjudicación especializada.
