  to: Y sobre ellas fueron hechos[a] querubines y palmeras, en las puertas del salón del templo[b], tal como fueron hechos en los muros; y había un voladizo de madera[c] ante el frente del vestíbulo, por fuera.
  rationale: Se ajusta «sobre ellos» a «sobre ellas» por concordancia con «puertas»; se reemplaza «templo» por «salón del templo» para preservar la referencia específica de הֵיכָל; «pieza de madera» se cambia por «voladizo de madera» para mantener el valor arquitectónico probable de עָב עֵץ sin falsa precisión; y «delante del frente» se suaviza a «ante el frente» para un español más natural y fiel.
