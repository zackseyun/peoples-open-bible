    text: O «llevó cautivos». El verbo hebreo enfatiza la captura y el traslado a cautiverio.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Amón», es decir, los amonitas.'
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido y las decisiones léxicas aprobadas, pero se corrige la puntuación para una lectura más natural y se reemplaza «pasar a» por «cruzar hacia» para reflejar mejor לַעֲבֹר אֶל en español claro y fiel.
