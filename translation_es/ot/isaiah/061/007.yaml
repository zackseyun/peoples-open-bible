  rationale: Se corrige «su vergüenza» a «vuestra vergüenza» para reflejar el sufijo hebreo de segunda persona plural y preservar el cambio de persona que el POB documentó. Se armoniza la nota a con esa corrección. También se repara la nota c para que ofrezca una alternativa léxica real, en lugar de repetir el texto principal.
