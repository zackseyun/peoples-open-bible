base_translation:
  language: en
  yaml_path: translation/ot/leviticus/008/024.yaml
  text: Then he brought Aaron’s sons near[a], and Moses put some of the blood on the lobe of their right ear, on the thumb of their right hand, and on the big toe of their right foot[b]. Then Moses splashed the blood against the altar all around.
  footnotes:
  - marker: a
    text: Or 'the tip of their right ear.' The Hebrew term refers to the outer extremity of the ear; 'lobe' is the most natural rendering here.
    reason: lexical_alternative
  - marker: b
    text: Or 'dashed' or 'splashed.' The Hebrew verb denotes throwing the blood in a sacrificial action, stronger than a light 'sprinkling.'
    reason: lexical_alternative
