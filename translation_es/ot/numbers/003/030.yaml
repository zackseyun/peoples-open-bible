translation:
  language: es
  text: Y el jefe[a] de la casa paterna[b] de las familias de los coatitas era Elizafán, hijo de Uziel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líder» o «príncipe» para נָשִׂיא.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «casa del padre», un modismo para una casa ancestral o unidad de linaje patrilineal.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/נְשִׂיא
  english_pob_choice: And the chief
  chosen_spanish: Y el jefe[a]
  alternatives_spanish:
  - Y el líder[a]
  - Y el príncipe[a]
  lexicon: HALOT
  rationale: נָשִׂיא aquí nombra una autoridad tribal o administrativa. «Jefe» comunica bien la función de mando sin introducir una connotación monárquica que «príncipe» podría sugerir en español. Se mantiene la coordinación con «Y» para conservar la secuencia enumerativa del contexto.
- source_word: בֵֽית אָב
  english_pob_choice: the ancestral house
  chosen_spanish: la casa paterna[b]
  alternatives_spanish:
  - la casa ancestral[b]
  - la casa del padre[b]
  lexicon: HALOT
  rationale: La expresión es idiomática y designa una unidad de linaje patrilineal. «Casa paterna» conserva la estructura de parentesco y suena natural en español; «casa ancestral» también es posible, pero «paterna» mantiene mejor el vínculo con אָב.
- source_word: לְ/מִשְׁפְּחֹ֣ת
  english_pob_choice: of the families
  chosen_spanish: de las familias
  alternatives_spanish:
  - de los clanes
  - para las familias
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת se refiere a agrupaciones familiares o clanes. «Familias» sigue de cerca el hebreo y encaja con el paralelismo con «casa paterna».
- source_word: הַ/קְּהָתִי
  english_pob_choice: of the Kohathites
  chosen_spanish: de los qehatitas
  alternatives_spanish:
  - de los coatitas
  - del clan de Quehat
  lexicon: HALOT
  rationale: Se translitera el gentilicio de forma consistente con el hebreo y con la práctica de los nombres de grupo. «Qehatitas» evita forzar una forma tradicional no auditada y mantiene la relación con קְהָת.
- source_word: אֶלִיצָפָן
  english_pob_choice: Elizaphan
  chosen_spanish: Elizafán
  alternatives_spanish:
  - Elizafán
  - Elizafán
  lexicon: Transliteración propia
  rationale: Nombre personal transliterado al español con grafía natural y cercana al hebreo/inglés auditado.
- source_word: בֶן עֻזִּיאֵל
  english_pob_choice: the son of Uzziel
  chosen_spanish: hijo de Uziel
  alternatives_spanish:
  - el hijo de Uziel
  - descendiente de Uziel
  lexicon: HALOT
  rationale: La fórmula genealógica se expresa de manera natural en español con «hijo de». Se omite el artículo porque el español no lo requiere para una identificación nominal breve.
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando explícitamente las notas [a] y [b] en el texto español. La redacción mantiene el valor administrativo de נָשִׂיא y el sentido idiomático de בֵּית אָב sin sobreparafrasear.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se prefirió «familias» para מִשְׁפְּחֹת en armonía con la estructura de parentesco del hebreo.
  - Se mantuvo un registro sobrio y bíblico, pero con sintaxis española natural.
