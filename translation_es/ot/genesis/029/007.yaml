  to: 'Entonces él dijo[a]: «Miren, aún queda mucho día; no es tiempo de reunir el ganado. Den de beber al rebaño[b], y luego vayan a llevarlo a pastar».'
  rationale: Se ajusta la interjección inicial al plural implícito del discurso («Miren») para una lectura española más coherente, y se reemplaza «pastorearlo» por «llevarlo a pastar», que expresa con más naturalidad el sentido contextual de רְעוּ tras abrevar al rebaño. Se conservan el contenido, la secuencia y las notas léxicas del original y del rastro POB.
