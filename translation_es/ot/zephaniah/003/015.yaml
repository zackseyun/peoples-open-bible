revisions:
- from: Yahvé ha quitado tus sentencias[a]; ha apartado a tu enemigo. El Rey de Israel, Yahvé, está en medio de ti[b]; no temerás más el mal.
  to: Yahvé ha quitado tus sentencias[a]; ha apartado a tu enemigo. El Rey de Israel, Yahvé, está en medio de ti; ya no temerás mal alguno[b].
  rationale: Se ajusta únicamente la cláusula final para lograr un español más natural y fiel al sentido hebreo de que no habrá más temor ante el mal o la calamidad. También se mueve la nota [b] al término relevante («mal alguno») en vez de anclarla a «en medio de ti», ya que la nota explica רָע, no בְּקִרְבֵּךְ.
