translation:
  language: es
  text: Y habiendo juzgado lo que es humanitario[a], ordené que los que del pueblo de los judíos estaban dispuestos, y por propia elección, y los sacerdotes y los levitas y estos otros en nuestro reino[b], fueran contigo a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que es benevolente»; la frase griega es sustantiva y describe un curso de acción considerado humano o bondadoso.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo suministrado presenta aquí una redacción sustancialmente diferente; esta traducción sigue el griego de 1 Esdras.
    reason: textual_variant
lexical_decisions:
- source_word: τὰ φιλάνθρωπα
  english_pob_choice: what is humane
  chosen_spanish: lo que es humano
  alternatives_spanish:
  - lo que es benevolente
  - lo que es bondadoso
  - el proceder humano
  lexicon: LSJ
  rationale: La expresión neutra plural con artículo funciona sustantivadamente y apunta a una decisión o curso de acción de carácter humano/benevolente. «Lo que es humano» conserva esa cualidad moral sin convertirla en una paráfrasis más libre.
- source_word: κρίνας
  english_pob_choice: having judged
  chosen_spanish: habiendo juzgado
  alternatives_spanish:
  - habiendo decidido
  - habiendo considerado
  lexicon: BDAG
  rationale: El participio aoristo introduce la deliberación previa del rey. «Habiendo juzgado» mantiene el matiz formal de decisión tras evaluar la situación.
- source_word: προσέταξα
  english_pob_choice: I ordered
  chosen_spanish: ordené
  alternatives_spanish:
  - mandé
  - decreté
  lexicon: BDAG
  rationale: Expresa una instrucción con autoridad real. «Ordené» es claro, natural y conserva el registro administrativo del decreto.
- source_word: τοὺς βουλομένους
  english_pob_choice: those ... who are willing
  chosen_spanish: los que ... estaban dispuestos
  alternatives_spanish:
  - los que deseaban
  - los que querían
  lexicon: BDAG
  rationale: El participio subraya voluntariedad. «Estaban dispuestos» comunica esa disponibilidad de manera natural en español y evita rigidizar la frase.
- source_word: αἱρετίζοντας
  english_pob_choice: and of their own choice
  chosen_spanish: y por propia elección
  alternatives_spanish:
  - y de su propia elección
  - y libremente
  lexicon: LSJ
  rationale: La forma rara refuerza la idea de elección voluntaria. «Por propia elección» mantiene el énfasis en la autodeterminación y evita duplicar de forma mecánica la idea de voluntad ya presente en el participio anterior.
- source_word: ἐκ τοῦ ἔθνους τῶν Ἰουδαίων
  english_pob_choice: of the nation of the Jews
  chosen_spanish: del pueblo de los judíos
  alternatives_spanish:
  - de la nación de los judíos
  - de entre el pueblo judío
  lexicon: BDAG
  rationale: ἔθνος aquí designa el grupo étnico/poblacional, no «gentiles». «Pueblo de los judíos» resulta más natural en español que una calca de «nación» y preserva el referente colectivo.
- source_word: τῶν ἱερέων
  english_pob_choice: priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: BDAG
  rationale: Término cultual estándar; en español bíblico «sacerdotes» es el equivalente directo y claro.
- source_word: τῶν Λευειτῶν
  english_pob_choice: Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  lexicon: BDAG
  rationale: Transliteración convencional del grupo levítico.
- source_word: τῶνδε
  english_pob_choice: these others
  chosen_spanish: estos otros
  alternatives_spanish:
  - estos
  - las personas siguientes
  lexicon: LSJ
  rationale: El demostrativo es algo elíptico. «Estos otros» mantiene la referencia abierta e inclusiva de los demás participantes mencionados por el decreto.
- source_word: συμπορεύεσθαί σοι
  english_pob_choice: should go with you
  chosen_spanish: fueran contigo
  alternatives_spanish:
  - viajaran contigo
  - te acompañaran
  lexicon: BDAG
  rationale: El infinitivo expresa acompañamiento en el viaje. «Fueran contigo» es natural en español en una subordinada de mandato y conserva el sentido de ir juntos hacia Jerusalén.
theological_decisions:
- issue: Tensión entre el testimonio griego y el paralelo hebreo (MT)
  english_pob_reading: Translate the extant Greek royal decree as the main text; note the Hebrew parallel as a cross-check only.
  chosen_spanish_reading: Mantener el decreto real griego como texto principal, sin armonizarlo con el hebreo paralelo.
  alternative_spanish_readings:
  - Adaptar el verso al sentido del paralelo hebreo sobre la preparación de Ezra para la ley
  - Combinar ambos testimonios en una lectura mixta
  rationale: La evidencia griega presenta una autorización real concreta, mientras que el paralelo hebreo refleja una formulación sustancialmente distinta. La fidelidad al testimonio base exige conservar el texto griego y no sustituirlo por una síntesis con el MT.
  doctrine_reference: Principio editorial de primacía de la fuente original en 1 Esdras; uso del paralelo hebreo solo como referencia cruzada.
- issue: Matiz de voluntariedad en αἱρετίζοντας
  english_pob_reading: The rare Greek form likely emphasizes voluntary participation.
  chosen_spanish_reading: Reforzar la voluntariedad con «por propia elección».
  alternative_spanish_readings:
  - solo «dispuestos»
  - «voluntariamente»
  rationale: El griego raro añade énfasis a la elección libre; por eso la traducción debe conservar tanto la disponibilidad como la autodeterminación, sin borrar la doble capa semántica.
  doctrine_reference: Respeto a la matización léxica del texto fuente; no nivelar la diferencia entre disposición y elección.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que aclaró la estructura de la lista y convirtió «by free choice» en una expresión más transparente de la voluntariedad. En español se preserva esa transparencia con «y por propia elección», manteniendo la coordinación explícita de los grupos mencionados.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto base lo requiera; aquí no aparece el tetragrámaton.
  - Se mantuvo el registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Sacerdotes» y «levitas» siguen la terminología cultual estándar del proyecto.
  - No se introdujo armonización con el paralelo hebreo; la nota lo señala sin absorber su contenido.
