translation:
  language: es
  text: Y sus arcos despedazarán[a] a los jóvenes; no tendrán compasión del fruto del vientre; sus ojos no perdonarán a los niños[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «sus arcos harán pedazos a los jóvenes»; algunos entienden «arcos» metonímicamente como «arqueros».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos»; aquí probablemente se usa en el sentido más amplio de «niños» o «hijos/descendencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְשָׁתוֹת
  english_pob_choice: bows
  chosen_spanish: arcos
  alternatives_spanish:
  - arcos de guerra
  - arcos y flechas
  lexicon: HALOT
  rationale: El hebreo nombra literalmente los arcos; en español 'arcos' conserva el instrumento y evita forzar una metonimia no necesaria en el texto base. Se mantiene la imagen de los arcos como agentes instrumentales de la matanza.
- source_word: נְעָרִים
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los muchachos jóvenes
  - los jóvenes varones
  lexicon: HALOT
  rationale: En este contexto bélico, 'jóvenes' comunica la edad y el vigor de los afectados sin restringir el sentido a niños pequeños ni endurecerlo innecesariamente como 'hombres jóvenes'.
- source_word: תְּרַטַּשְׁנָה
  english_pob_choice: will dash ... to pieces
  chosen_spanish: despedazarán
  alternatives_spanish:
  - harán pedazos
  - destrozarán
  - romperán en pedazos
  lexicon: HALOT
  rationale: El Piel de רטש expresa violencia intensa. 'Despedazarán' mantiene el carácter gráfico y brutal del verbo sin suavizarlo a un simple 'matarán'.
- source_word: פְרִי בֶטֶן
  english_pob_choice: the fruit of the womb
  chosen_spanish: el fruto del vientre
  alternatives_spanish:
  - el fruto del seno
  - la descendencia del vientre
  - los hijos del vientre
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo con 'vientre' para mantener la contundencia de la expresión y su paralelismo con 'hijos' al final del versículo.
- source_word: יְרַחֵמוּ
  english_pob_choice: will show no compassion
  chosen_spanish: no tendrán compasión
  alternatives_spanish:
  - no se apiadarán
  - no mostrarán misericordia
  - no se compadecerán
  lexicon: HALOT
  rationale: רחם aquí denota compasión afectiva. 'No tendrán compasión' es natural en español y conserva el tenor moral del juicio.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los hijos varones
  - los niños
  - la descendencia
  lexicon: HALOT
  rationale: Aunque el hebreo puede funcionar de manera genérica, el paralelo poético con 'fruto del vientre' permite una versión breve y fiel con 'los hijos'. Se evita convertirlo sin más en 'niños', que estrecharía el campo semántico.
- source_word: תָח֥וּס עֵינָם
  english_pob_choice: their eyes will not spare
  chosen_spanish: sus ojos no perdonarán
  alternatives_spanish:
  - sus ojos no se compadecerán
  - sus ojos no se apiadarán
  - sus ojos no tendrán piedad
  lexicon: HALOT
  rationale: 'Se conserva el singular colectivo implícito en ''ojo/ojos'' con un español natural en plural, como en la revisión inglesa. ''Perdonarán'' comunica היטב el valor de חוס en contextos de juicio: no eximirán ni dejarán pasar.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene la violencia del verbo principal, conserva la expresión idiomática ''fruto del vientre'', y refleja la decisión revisada de pluralizar ''ojos'' para el cierre del versículo.'
  spanish_consistency_notes:
  - Se usó 'Y' inicial para conservar el arranque conjuntivo del hebreo.
  - Se prefirió 'los jóvenes' por claridad natural en español sin perder el valor etario del hebreo.
  - Se mantuvo paralelismo sintáctico con tres miembros coordinados separados por punto y coma.
  - No se sustituyó 'hijos' por 'niños' para no estrechar indebidamente el hebreo בָּנִים.
