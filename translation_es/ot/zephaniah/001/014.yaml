revisions:
- from: Grande es el día de Yahvé; cerca está, muy pronto llegando[a]. ¡El sonido del día de Yahvé! Allí el guerrero clama amargamente[b].
  to: Cercano está el gran día de Yahvé; cercano, y viene muy rápido[a]. ¡El sonido del día de Yahvé! Allí el guerrero clama amargamente[b].
  rationale: Se corrige la apertura para que el predicado principal sea «Cercano está», como en el hebreo, y para que «el gran» modifique correctamente a «día». También se reemplaza «muy pronto llegando» por una expresión más natural y digna en español que sigue comunicando la rapidez intensiva del original. Se conservan «Yahvé», «sonido» y «guerrero» por buena alineación con el proyecto y el expediente léxico.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien los elementos principales del hebreo: la inminencia repetida de «el día de Yahvé», el uso de «Yahvé» para יְהוָה, el valor amplio de קוֹל como «sonido», y la imagen final del גִּבּוֹר que clama. Sin embargo, altera de forma importante la sintaxis y el énfasis inicial: el hebreo dice «Cercano está el gran día de Yahvé; cercano y muy apresurado», no «Grande es el día de Yahvé». Además, «muy pronto llegando» suena poco natural en español y no refleja con suficiente dignidad la construcción intensiva.'
  spanish_quality_summary: El texto es generalmente comprensible y digno, pero «Grande es el día de Yahvé» desplaza el foco desde la cercanía hacia la grandeza, y «muy pronto llegando» resulta torpe en español. Una redacción como «Cercano está el gran día de Yahvé; cercano, y viene muy rápido» o «... y llega muy rápidamente» preserva mejor el hebreo y mejora la fluidez. El resto del versículo funciona bien; «¡El sonido del día de Yahvé!» y «Allí el guerrero clama amargamente» son claros y fieles.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; גִּבּוֹר → «guerrero» es defendible y coincide con el POB inglés; קוֹל → «sonido» preserva la amplitud léxica. No hay conflicto doctrinal relevante. La única desalineación real es sintáctico-semántica en la apertura del versículo, donde הַגָּדוֹל debe modificar «día» como «el gran día», no predicarse como «Grande es el día».'
  issues:
  - severity: high
    issue: La cláusula inicial «Grande es el día de Yahvé» no refleja la estructura ni el énfasis del hebreo.
    rationale: 'En el hebreo, קָרוֹב abre y funciona como predicado: «Cercano está el gran día de Yahvé». הַגָּדוֹל modifica «día», no constituye la predicación principal. El borrador cambia el foco desde la inminencia a la grandeza.'
  - severity: medium
    issue: «muy pronto llegando» es poco idiomático en español bíblico actual.
    rationale: Aunque intenta reflejar וּמַהֵר מְאֹד, la combinación suena forzada. Una formulación como «y viene muy rápido» o «y llega muy rápidamente» comunica mejor la rapidez intensiva sin perder fidelidad.
  - severity: low
    issue: La nota [a] está bien orientada, pero puede ajustarse al texto revisado.
    rationale: Si se cambia la formulación principal, la nota alternativa debe corresponder exactamente a la nueva redacción española para evitar desajustes entre texto y aparato.
  revised_spanish_text: Cercano está el gran día de Yahvé; cercano, y viene muy rápido[a]. ¡El sonido del día de Yahvé! Allí el guerrero clama amargamente[b].
  revised_footnotes:
