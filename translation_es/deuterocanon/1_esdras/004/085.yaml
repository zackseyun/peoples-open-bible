translation:
  language: es
  text: subir y reconstruir Jerusalén y el templo sobre el cual fue llamado su nombre[a]; y celebraban con música y alegría durante siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre el cual fue invocado su nombre» o «que fue llamado por su nombre». La expresión griega refleja una fórmula semítica de templo que expresa la pertenencia y asociación del templo con Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβῆναι
  english_pob_choice: to go up
  chosen_spanish: subir
  alternatives_spanish:
  - ascender
  - volver
  lexicon: LSJ
  rationale: El verbo griego significa literalmente 'subir/ascender'. En contexto de Jerusalén también puede insinuar el retorno, pero el movimiento básico se conserva con 'subir', que en español es natural y fiel.
- source_word: οἰκοδομῆσαι
  english_pob_choice: rebuild
  chosen_spanish: reconstruir
  alternatives_spanish:
  - edificar
  - construir
  lexicon: LSJ
  rationale: El contexto habla de Jerusalén y el templo restaurados; 'reconstruir' expresa mejor la idea de edificar de nuevo sin perder el sentido básico del verbo.
- source_word: ἱερὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - lugar santo
  lexicon: LSJ
  rationale: Aquí el referente es el templo de Jerusalén; 'templo' es la equivalencia natural y clara en español.
- source_word: οὗ ὠνομάσθη τὸ ὄνομα αὐτοῦ ἐπ’ αὐτῷ
  english_pob_choice: on which his name was called
  chosen_spanish: sobre el cual fue llamado su nombre
  alternatives_spanish:
  - sobre el cual fue invocado su nombre
  - que fue llamado por su nombre
  lexicon: LSJ
  rationale: Se conserva la fórmula semítica de posesión/asociación divina sin convertirla en paráfrasis explicativa. 'Fue llamado su nombre' mantiene la forma y deja visible la tensión idiomática.
- source_word: ἐκωθωνίζοντο
  english_pob_choice: they celebrated
  chosen_spanish: se regocijaban
  alternatives_spanish:
  - celebraban
  - hacían fiesta
  lexicon: LSJ
  rationale: El verbo es raro y describe celebración festiva. 'Se regocijaban' transmite la alegría celebrativa sin volver demasiado específico el tipo de acto festivo.
- source_word: μουσικῶν
  english_pob_choice: with music
  chosen_spanish: con músicos
  alternatives_spanish:
  - con música
  - con acompañamiento musical
  lexicon: LSJ
  rationale: El genitivo plural puede referirse a música o a músicos. Dado que la forma griega permite ambas lecturas, 'con músicos' preserva la ambigüedad mejor que fijarla de modo unilateral.
- source_word: χαρᾶς
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: LSJ
  rationale: '''Alegría'' es una equivalencia directa y clara en español contemporáneo, adecuada junto al lenguaje festivo del pasaje.'
- source_word: ἡμέρας ἑπτά
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: LSJ
  rationale: En español, la duración se expresa naturalmente con 'durante'. Mantiene el valor temporal sin añadir contenido no presente.
theological_decisions:
- issue: Fórmula del nombre divino aplicado al templo
  english_pob_reading: on which his name was called
  chosen_spanish_reading: sobre el cual fue llamado su nombre
  alternative_spanish_readings:
  - sobre el cual fue invocado su nombre
  - que fue llamado por su nombre
  rationale: La frase refleja lenguaje de pacto sobre pertenencia y asociación con Dios. Se preserva la fórmula semítica en vez de resolverla por una explicación interpretativa, manteniendo la tensión textual documentada por la POB inglesa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió de ''had been called'' a ''was called'' para reflejar de manera más directa el perfecto/pasivo griego sin perder el sentido formal. En español se siguió esa decisión con una construcción igualmente directa: ''fue llamado su nombre''.'
  spanish_consistency_notes:
  - Se mantuvo Yahvé implícito solo donde el texto no lo explicita; aquí la referencia es al 'nombre' sobre el templo, por lo que no se introdujo 'Yahvé' en el cuerpo del versículo.
  - '''Templo'' se usa en lugar de ''santuario'' por la referencia inequívoca al templo de Jerusalén.'
  - Se evitó 'Cristo' o terminología confesional ajena al pasaje.
  - La frase 'con músicos y alegría' sigue de cerca la sintaxis griega y conserva la doble nota festiva del texto.
