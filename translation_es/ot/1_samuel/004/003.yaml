translation:
  language: es
  text: 'Cuando el pueblo llegó al campamento, los ancianos de Israel dijeron: «¿Por qué Yahvé nos ha abatido hoy delante de los filisteos? Traigamos aquí de Silo el arca del pacto de Yahvé, para que venga[a] en medio de nosotros y nos salve de la mano de nuestros enemigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él venga en medio de nosotros y nos salve», tomando los verbos singulares más directamente como referencia a Yahvé, cuya presencia se asocia con el arca.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las tropas
  lexicon: HALOT
  rationale: ‘El pueblo’ conserva el valor colectivo de הָעָם y funciona naturalmente en español sin militarizar de más el término. El contexto del campamento ya sugiere un grupo en campaña.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - el real
  lexicon: HALOT
  rationale: ‘Campamento’ es la equivalencia natural en español para el contexto militar y preserva la imagen espacial del hebreo.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los líderes de Israel
  - los jefes de Israel
  lexicon: HALOT
  rationale: ‘Ancianos’ es el término bíblico habitual para זִקְנִים y evita sustituirlo por un cargo más interpretativo.
- source_word: נְגָפָנוּ
  english_pob_choice: has struck us down
  chosen_spanish: nos ha abatido
  alternatives_spanish:
  - nos ha golpeado
  - nos ha derrotado
  lexicon: HALOT
  rationale: ‘Abatir’ transmite el sentido de ser derribados o vencidos por una acción divina en contexto de guerra, sin reducirlo a una simple derrota abstracta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de representar el Tetragrama por ‘Yahvé’, manteniendo el nombre propio divino en lugar de sustituirlo por un título.
- source_word: לִפְנֵי פְלִשְׁתִּים
  english_pob_choice: before the Philistines
  chosen_spanish: delante de los filisteos
  alternatives_spanish:
  - en presencia de los filisteos
  - ante los filisteos
  lexicon: HALOT
  rationale: ‘Delante de’/‘ante’ refleja el hebreo literalmente y conserva la idea de derrota en presencia del enemigo.
- source_word: נִקְחָה אֵלֵינוּ
  english_pob_choice: Let us bring here
  chosen_spanish: Traigamos aquí
  alternatives_spanish:
  - Llevemos aquí
  - Traigamos para nosotros
  lexicon: HALOT
  rationale: El cohortativo se vierte de forma natural como exhortación inclusiva en español. ‘Aquí’ reproduce el valor de movimiento hacia el lugar del hablante que el contexto exige.
- source_word: מִשִּׁלֹה
  english_pob_choice: from Shiloh
  chosen_spanish: desde Silo
  alternatives_spanish:
  - de Silo
  lexicon: HALOT
  rationale: Se translitera el topónimo como ‘Silo’, forma asentada en español bíblico y comprensible para lectores modernos.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto del SEÑOR
  lexicon: HALOT
  rationale: ‘Arca del pacto’ refleja la construcción nominal hebrea y mantiene el sentido covenantal. Se conserva ‘Yahvé’ para el nombre divino.
- source_word: וְיָבֹא בְקִרְבֵּנוּ
  english_pob_choice: so that it may come into our midst
  chosen_spanish: para que venga en medio de nosotros
  alternatives_spanish:
  - para que entre en medio de nosotros
  - para que venga en nuestro interior
  lexicon: HALOT
  rationale: ‘En medio de nosotros’ expresa de manera clara y natural el valor de בקרבנו. Se prefiere ‘venga’ por la continuidad del subjuntivo final con ‘para que’.
- source_word: וְיֹשִׁעֵנוּ
  english_pob_choice: and save us
  chosen_spanish: y nos salve
  alternatives_spanish:
  - y nos libre
  - y nos rescate
  lexicon: HALOT
  rationale: ‘Salvar’ es la equivalencia más amplia y fiel al hifil de ישׁע, y mantiene la relación con la petición de liberación militar inmediata.
- source_word: מִכַּף אֹיְבֵינוּ
  english_pob_choice: from the hand of our enemies
  chosen_spanish: de la mano de nuestros enemigos
  alternatives_spanish:
  - del poder de nuestros enemigos
  - del alcance de nuestros enemigos
  lexicon: HALOT
  rationale: ‘De la mano de’ conserva el hebraísmo y la imagen de poder/control ejercido por los enemigos.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino según la convención del proyecto y la transliteración española usual ‘Yahvé’, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referencia del singular verbal en וְיָבֹא ... וְיֹשִׁעֵנוּ
  english_pob_reading: it may come into our midst and save us
  chosen_spanish_reading: para que venga en medio de nosotros y nos salve
  alternative_spanish_readings:
  - para que él venga en medio de nosotros y nos salve
  - para que el arca venga en medio de nosotros y nos salve
  rationale: El hebreo usa verbos singulares cuyo sujeto inmediato es el arca. El español puede conservar esa gramática sin forzar la identificación, dejando abierta la tensión entre el arca como objeto sagrado y la expectativa de presencia salvadora asociada a ella.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La base inglesa revisada prefirió ‘bring here’ por naturalidad; en español se reflejó con ‘Traigamos aquí’. Se mantuvo el nombre divino explícito y la estructura final con ‘para que’ para conservar la relación de propósito del hebreo. También se preservó la tensión del singular verbal con una nota alternativa sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma coherente con el estándar del proyecto para יְהוָה.
  - Se prefirió ‘pacto’ en lugar de ‘alianza’ para mantener la terminología bíblica del arca.
  - ‘De la mano de’ preserva el hebraísmo idiomático y la imaginería de control enemigo.
  - La puntuación en estilo de cita española se ajusta para lectura pública en español.
