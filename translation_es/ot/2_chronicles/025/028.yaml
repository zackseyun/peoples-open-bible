translation:
  language: es
  text: Lo llevaron sobre caballos[a] y lo sepultaron con sus padres en la ciudad de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «sobre los caballos». El hebreo menciona caballos en plural de manera explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂאֻהוּ
  english_pob_choice: They carried him
  chosen_spanish: Lo llevaron
  alternatives_spanish:
  - Lo cargaron
  - Lo transportaron
  - Lo llevaron consigo
  lexicon: HALOT
  rationale: נשא en esta secuencia narrativa expresa que el cuerpo fue trasladado; en español, «lo llevaron» comunica con naturalidad ese traslado sin perder el sentido de carga/trasporte corporal.
- source_word: עַל הַסּוּסִים
  english_pob_choice: on horses
  chosen_spanish: sobre caballos
  alternatives_spanish:
  - encima de los caballos
  - en caballos
  - montado sobre caballos
  lexicon: HALOT
  rationale: La preposición hebrea es literalmente «sobre», y el plural de «caballos» debe preservarse. «Sobre caballos» mantiene la imagen explícita del texto fuente.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: and buried him
  chosen_spanish: y lo sepultaron
  alternatives_spanish:
  - y lo enterraron
  - y lo dieron sepultura
  lexicon: HALOT
  rationale: קבר se puede rendir por «sepultar» o «enterrar». «Sepultaron» conserva un registro digno y bíblico, sin imponer un tono eclesiástico ajeno al texto.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus padres ancestrales
  - con sus antepasados
  lexicon: HALOT
  rationale: Aunque la fórmula hebrea dice literalmente «con sus padres», en español «con sus padres» comunica mejor la locución funeraria y el vínculo dinástico/familiar. «Antepasados» explicita el sentido, pero atenúa la forma idiomática del hebreo.
- source_word: בְּעִיר יְהוּדָה
  english_pob_choice: in the city of Judah
  chosen_spanish: en la ciudad de Judá
  alternatives_spanish:
  - en la ciudad de Judá
  - en Judá
  - en la ciudad de David
  lexicon: HALOT
  rationale: El texto masorético leído aquí dice «ciudad de Judá», no «ciudad de David». Se conserva el nombre propio «Judá» y la estructura nominal del hebreo sin armonizar con lecturas paralelas.
theological_decisions:
- issue: Fórmula funeraria y término de parentesco
  english_pob_reading: with his fathers
  chosen_spanish_reading: con sus padres
  alternative_spanish_readings:
  - con sus antepasados
  - con sus padres ancestrales
  rationale: No hay diferencia doctrinal, pero sí una decisión de fórmula. En español, «con sus padres» mantiene la expresión heredada del hebreo de manera suficientemente literal y comprensible; se evita normalizarla demasiado a «antepasados», que interpreta más de lo que la forma exige.
  doctrine_reference: Principio de primacía del texto fuente; preservar fórmulas idiomáticas sin borrar su forma cuando esta sigue siendo inteligible.
- issue: Ubicación sepulcral según el MT
  english_pob_reading: Follow the MT wording 'in the city of Judah' without harmonizing to more familiar formulas.
  chosen_spanish_reading: en la ciudad de Judá
  alternative_spanish_readings:
  - en la ciudad de David
  - en Judá
  rationale: Se mantiene la lectura del texto hebreo dado, aunque resulte menos familiar. No se armoniza con una frase más conocida de otros pasajes, porque eso eliminaría una distinción textual presente en el fuente.
  doctrine_reference: Original-language primacy over translation tradition; preserve textual tension rather than resolve it.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético proporcionado y coincide sustancialmente con el audit trail en inglés: conserva el plural explícito de «caballos», la fórmula funeraria y la lectura «ciudad de Judá» sin armonización. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se mantuvo un registro digno y natural para «sepultaron», coherente con un relato histórico-bíblico.
  - «Con sus padres» conserva la fórmula hebrea y funciona en español como locución funeraria inteligible.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en este verso.
  - La nota al pie marca solo la alternativa léxica relevante de la preposición/imagen de «sobre los caballos».
