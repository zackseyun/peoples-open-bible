  language: en
  yaml_path: translation/ot/isaiah/048/015.yaml
  text: I[a], I have spoken; indeed[b], I have called him; I have brought him, and I will make his way prosper.
  footnotes:
  - marker: a
    text: The pronouns "him" and "his" refer to the one God has called and brought; in context, this is commonly understood to be Cyrus (see Isa 48:14).
    reason: cross_reference
  - marker: b
    text: Or "he will prosper in his way" / "his way will prosper." The Hebrew verb is causative, literally "he will make his way prosper."
    reason: lexical_alternative
