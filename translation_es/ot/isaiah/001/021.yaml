review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca las decisiones auditadas en inglés: mantiene la exclamación de lamento, el cambio de estado, la metáfora de prostitución, la personificación femenina de la ciudad, la distinción entre מִשְׁפָּט y צֶדֶק, la imagen vívida de יָלִין como alojamiento, y el cierre elíptico con «asesinos». Sin embargo, hay dos detalles que conviene reparar: la nota b introduce hebreo («כאן») impropio para una nota española del proyecto, y el orden de marcadores en el texto no refleja el orden auditado inglés para la cláusula «lodged in her[c][b]».'
  spanish_quality_summary: El español es claro, natural y digno. «¡Cómo se ha convertido en prostituta la ciudad fiel!» suena idiomático y conserva la fuerza profética. «Estaba llena de justicia; la rectitud se alojaba en ella» también es legible y fiel. El final «pero ahora, asesinos» mantiene la tersura abrupta del original, aunque queda deliberadamente elíptico; eso es aceptable. La principal objeción de calidad es la intrusión no traducida de «כאן» en la nota b, que rompe la legibilidad española.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos de los defaults mayores como Yahvé/Mesías. La elección de «prostituta» para לְזוֹנָה y «justicia / rectitud» para מִשְׁפָּט / צֶדֶק está bien justificada y alineada con la filosofía POB. «Asesinos» representa bien מְרַצְּחִים.
  issues:
  - severity: medium
    issue: La nota b contiene la palabra hebrea «כאן» dentro de una nota española.
    rationale: Esto parece un arrastre editorial o mezcla de idiomas. Debe expresarse enteramente en español para mantener claridad y consistencia del proyecto.
  - severity: low
    issue: El orden de los marcadores en el texto español no reproduce el patrón auditado inglés para la cláusula final media.
    rationale: El inglés POB ancla primero la nota sobre «lodged in her» y luego la alternativa léxica de «righteousness/justice» como «in her[c][b]». En español conviene anclar «rectitud[c][b] se alojaba en ella» o, más naturalmente, «la rectitud[c] se alojaba en ella[b]» según el contenido real de cada nota. Dado el contenido actual de las notas, lo más claro es dejar b en «rectitud» y c en «ella», pero corregirlas y ordenar el texto con precisión.
  revised_spanish_text: ¡Cómo se ha convertido en prostituta la ciudad fiel! Estaba llena de justicia[a]; la rectitud[b] se alojaba en ella[c], pero ahora, asesinos.
  revised_footnotes:
  - marker: a
    text: O «ramera». El término hebreo se refiere a una prostituta; la imagen es metafórica para la infidelidad y la corrupción de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: O «justicia». El hebreo צֶדֶק puede solaparse semánticamente con «justicia», especialmente en paralelo con מִשְׁפָּט al inicio del verso.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «se alojaba en ella»; el verbo evoca pasar la noche o residir allí.
    reason: lexical_alternative
