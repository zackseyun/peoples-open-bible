translation:
  language: es
  text: Jefté juzgó a Israel seis años[a]. Luego Jefté el galaadita murió y fue sepultado en las ciudades de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en las ciudades de Galaad». El plural puede funcionar de manera idiomática para una ciudad no especificada dentro de la región.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - gobernó
  - dirigió
  lexicon: HALOT
  rationale: En Jueces, el verbo שׁפט describe la función característica de los jueces de Israel. «Juzgó» conserva ese valor técnico y mantiene la continuidad con la terminología del libro.
- source_word: שֵׁשׁ שָׁנִים
  english_pob_choice: six years
  chosen_spanish: seis años
  alternatives_spanish:
  - durante seis años
  lexicon: HALOT
  rationale: La frase de duración es directa y no requiere ampliación; en español, «seis años» reproduce con naturalidad el sentido temporal.
- source_word: הַגִּלְעָדִי
  english_pob_choice: the Gileadite
  chosen_spanish: el galaadita
  alternatives_spanish:
  - el de Galaad
  - el oriundo de Galaad
  lexicon: HALOT
  rationale: El gentilicio hebreo se refleja de forma idiomática en español con «galaadita», conservando la identificación regional de Jefté sin añadir paráfrasis.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  lexicon: HALOT
  rationale: «Fue sepultado» es un equivalente natural y digno para el pasivo hebreo. Mantiene el tono de nota biográfica breve propio del contexto.
- source_word: בְּעָרֵי גִלְעָד
  english_pob_choice: in the cities of Gilead
  chosen_spanish: en las ciudades de Galaad
  alternatives_spanish:
  - en una de las ciudades de Galaad
  - en los poblados de Galaad
  lexicon: HALOT
  rationale: Se conserva el plural hebreo sin introducir especificación interpretativa. La redacción española refleja el dato textual tal como está, en línea con la revisión inglesa más reciente.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió mantener el plural hebreo «the cities of Gilead» en vez de precisar «one of the cities». En español se conserva esa misma cautela textual.
  spanish_consistency_notes:
  - Se usa «Jefté» para el nombre propio de forma consistente con la tradición española y con la transliteración del hebreo.
  - Se mantiene «Galaad» y el gentilicio «galaadita» para preservar la referencia geográfica y étnica.
  - No se introduce «SEÑOR» ni otras fórmulas de sustitución, porque el versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
