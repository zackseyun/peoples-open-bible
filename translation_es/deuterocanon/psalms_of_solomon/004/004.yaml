translation:
  language: es
  text: Sus ojos están puestos sobre toda mujer sin distinción[a]; su lengua es engañosa en una transacción con juramento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin restricción». El griego ἄνευ διαστολῆς puede expresar que mira a toda mujer indiscriminadamente, sin hacer distinciones.'
    reason: alternative_reading
  - marker: b
    text: 'O: «en una negociación con juramento» o «en un trato con juramento». El singular συναλλάγματι apunta a una transacción concreta.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ ὀφθαλμοὶ αὐτοῦ
  english_pob_choice: His eyes are
  chosen_spanish: Sus ojos están puestos
  alternatives_spanish:
  - Sus ojos están
  - Su mirada está puesta
  lexicon: LSJ
  rationale: En español, la imagen corporal de 'los ojos' se conserva mejor con una construcción natural de foco o intención. 'Están puestos' mantiene el sentido idiomático de atención dirigida sin perder la concreción del original.
- source_word: ἐπὶ πᾶσαν γυναῖκα
  english_pob_choice: on every woman
  chosen_spanish: en toda mujer
  alternatives_spanish:
  - sobre toda mujer
  - hacia toda mujer
  lexicon: LSJ
  rationale: La preposición griega con acusativo expresa dirección o foco; en español, 'en' comunica mejor el blanco de la mirada. 'Toda mujer' preserva el alcance universal de πᾶσαν.
- source_word: ἄνευ διαστολῆς
  english_pob_choice: without distinction
  chosen_spanish: sin distinción
  alternatives_spanish:
  - sin restricción
  - sin diferencia
  lexicon: LSJ
  rationale: La revisión inglesa más reciente favorece 'without distinction', y el griego διαστολή normalmente significa 'distinción' o 'diferencia'. 'Sin distinción' conserva ese matiz de mirar indiscriminadamente, sin desplazarlo hacia una idea más psicológica como 'sin restricción'.
- source_word: ἡ γλῶσσα ψευδὴς
  english_pob_choice: his tongue is deceitful
  chosen_spanish: su lengua es engañosa
  alternatives_spanish:
  - su lengua es falsa
  - su lengua miente
  lexicon: LSJ
  rationale: ψευδής describe el carácter de la lengua como falsa o engañosa. En español, 'engañosa' suena natural y conserva el valor adjetival del original sin convertirlo en una paráfrasis demasiado libre.
- source_word: ἐν συναλλάγματι
  english_pob_choice: in a transaction
  chosen_spanish: en una transacción
  alternatives_spanish:
  - en una negociación
  - en un trato
  lexicon: LSJ
  rationale: El singular συνάλλαγμα apunta a un intercambio o transacción concreta, no al concepto general de 'negocios'. 'Transacción' refleja ese ámbito sin sobredeterminarlo como contrato formal.
- source_word: μεθʼ ὅρκου
  english_pob_choice: with an oath
  chosen_spanish: con juramento
  alternatives_spanish:
  - con un juramento
  - bajo juramento
  lexicon: LSJ
  rationale: '''Con juramento'' expresa de forma sobria que la mentira va acompañada o reforzada por un juramento. Es una equivalencia natural en español para μεθʼ ὅρκου.'
theological_decisions:
- issue: Alcance de ἄνευ διαστολῆς en un contexto moral
  english_pob_reading: without distinction
  chosen_spanish_reading: sin distinción
  alternative_spanish_readings:
  - sin restricción
  - sin diferencia
  rationale: La evidencia revisada del texto griego favorece el sentido de 'distinción/diferencia' más que una mera falta de autocontrol. Por eso la traducción española conserva el matiz de indiscriminación en la mirada hacia toda mujer.
  doctrine_reference: No aplica; decisión lexical y contextual.
- issue: Relación entre συναλλάγματι y el juramento
  english_pob_reading: in a transaction with an oath
  chosen_spanish_reading: en una transacción con juramento
  alternative_spanish_readings:
  - en un trato con juramento
  - en una negociación con juramento
  rationale: La secuencia griega sugiere una transacción o intercambio concreto acompañado de juramento, no necesariamente un contrato técnico ni un ámbito genérico de negocios. 'Transacción' mantiene la concretez del griego y evita sobrerrestringir el sentido.
  doctrine_reference: No aplica; decisión lexical y contextual.
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa en dos puntos clave: ἄνευ διαστολῆς se entiende como ''sin distinción'' y συναλλάγματι como una ''transacción'', evitando tanto ''sin restricción'' como ''negocios''. También se conserva el valor adjetival de ψευδής mediante ''engañosa'', que resulta más natural en español que ''falsa'' en este contexto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exige; este versículo no lo contiene.
  - Se evita 'Cristo' porque no aparece lenguaje mesiánico aquí.
  - '''Transacción'' se mantiene como término técnico moderado para συναλλάγματι, sin convertirlo en ''contrato'' salvo evidencia explícita.'
  - La puntuación con punto y coma reproduce la bipartición del verso griego.
