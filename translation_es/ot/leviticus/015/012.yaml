translation:
  language: es
  text: Y una vasija de barro[a] que toque el que tiene flujo[b] será quebrada, y toda vasija de madera será enjuagada[c] con agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «recipiente de barro», «vasija de arcilla» o «vasija de cerámica».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «el que tiene flujo», un término técnico de pureza para una persona afectada por una emisión corporal.
    reason: cultural_note
  - marker: c
    text: O «será lavada en agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְלִי חֶרֶשׂ
  english_pob_choice: earthen vessel
  chosen_spanish: recipiente de barro
  alternatives_spanish:
  - vasija de barro
  - recipiente de arcilla
  - vasija de cerámica
  lexicon: HALOT
  rationale: כְלִי es un término general para recipiente/utensilio, y חֶרֶשׂ indica material de barro/arcilla cocida. ‘Recipiente de barro’ comunica naturalmente en español la clase material exigida por la ley de pureza sin introducir un tecnicismo innecesario.
- source_word: אֲשֶׁר יִגַּע בּוֹ
  english_pob_choice: that ... touches
  chosen_spanish: que toque
  alternatives_spanish:
  - que toca
  - que entra en contacto con
  lexicon: HALOT
  rationale: El relativo hebreo con יִגַּע expresa un contacto puntual en contexto legal. ‘Que toque’ conserva la sencillez y la fuerza directa del hebreo mejor que una paráfrasis más larga.
- source_word: הַזָּב
  english_pob_choice: the one with the discharge
  chosen_spanish: el que tiene la descarga
  alternatives_spanish:
  - el que padece la descarga
  - el hombre con la descarga
  - el que tiene flujo
  lexicon: HALOT
  rationale: La POB en inglés preserva el término técnico de pureza. En español, ‘el que tiene la descarga’ mantiene esa designación descriptiva sin convertirla en una interpretación más específica de lo que el hebreo exige en esta sola frase. ‘Flujo’ es posible, pero ‘descarga’ conserva el paralelismo con el contexto ritual y la idea de emisión corporal.
- source_word: יִשָּׁבֵר
  english_pob_choice: shall be broken
  chosen_spanish: será quebrado
  alternatives_spanish:
  - será roto
  - deberá romperse
  - habrá de ser quebrado
  lexicon: HALOT
  rationale: El nifal de שבר aquí funciona como una instrucción legal pasiva. ‘Será quebrado’ mantiene el mandato y el registro normativo, y ‘quebrar’ suena más natural en español bíblico que una construcción más mecánica.
- source_word: כָל כְּלִי עֵץ
  english_pob_choice: every wooden vessel
  chosen_spanish: todo recipiente de madera
  alternatives_spanish:
  - toda vasija de madera
  - todo utensilio de madera
  - cada recipiente de madera
  lexicon: HALOT
  rationale: La forma hebrea incluye cualquier objeto/recipiente de madera. ‘Recipiente de madera’ refleja bien la paralela relación con el ‘recipiente de barro’ y evita restringir indebidamente el campo semántico a una sola clase doméstica.
- source_word: יִשָּׁטֵף בַּמָּיִם
  english_pob_choice: shall be rinsed with water
  chosen_spanish: será enjuagado con agua
  alternatives_spanish:
  - será lavado con agua
  - será enjuagado en agua
  - será lavado en agua
  lexicon: HALOT
  rationale: שׁטף en este contexto ritual indica una limpieza por agua más breve y concreta que un lavado completo. ‘Enjuagar’ reproduce bien esa acción sobre un recipiente y conserva la distinción que la POB inglesa hace con ‘rinsed’.
theological_decisions:
- issue: Naturaleza técnica de ‘el que tiene la descarga’ en la ley de pureza
  english_pob_reading: a technical purity-law term for a person affected by a bodily discharge
  chosen_spanish_reading: 'un rótulo técnico descriptivo: ‘el que tiene la descarga’'
  alternative_spanish_readings:
  - el hombre con la descarga
  - el que tiene flujo corporal
  - el impuro por descarga
  rationale: El hebreo usa un término sustantivado de condición ritual. La traducción debe conservar el carácter técnico sin añadir más especificación médica o moral de la que el texto da en esta línea.
  doctrine_reference: Levítico 15; leyes de pureza ritual
- issue: Fuerza normativa de los verbos pasivos/jussivos
  english_pob_reading: shall be broken / shall be rinsed with water
  chosen_spanish_reading: será quebrado / será enjuagado con agua
  alternative_spanish_readings:
  - debe ser quebrado / debe ser enjuagado con agua
  - habrá de ser quebrado / habrá de ser enjuagado con agua
  rationale: En esta sección legal, el hebreo presenta instrucciones normativas. El futuro simple en español bíblico transmite adecuadamente la obligación o disposición legal sin sobrecargar la frase.
  doctrine_reference: Torá legislativa; pureza ceremonial
translation_notes:
  revision_awareness: 'Se sigue el estado de alta concordancia del audit trail en inglés, sin revisiones aplicadas; la redacción española mantiene las tres decisiones nucleares del original: recipiente de barro, el sujeto técnico de la descarga, y el tratamiento con agua del recipiente de madera.'
  spanish_consistency_notes:
  - Se preservó el paralelismo entre ‘recipiente de barro’ y ‘recipiente de madera’.
  - Se evitó ‘SEÑOR’ u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - ‘Enjuagado’ se eligió para distinguirlo de un lavado general y reflejar el objeto inanimado.
  - La frase ‘el que tiene la descarga’ mantiene la ambigüedad técnica del hebreo sin añadir género gramatical explícito donde el texto funciona como término de condición.
