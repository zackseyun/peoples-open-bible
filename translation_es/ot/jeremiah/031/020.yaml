translation:
  language: es
  text: ¿Es para mí Efraín un hijo precioso[a], un hijo de mis delicias? Pues cada vez que hablo de él, de veras sigo acordándome de él. Por eso mis entrañas se conmueven por él[b]; ciertamente tendré compasión de él, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “un hijo querido”. El hebreo puede expresar valor afectivo o estimación.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: “mis entrañas se conmueven por él”; es un hebraísmo que expresa compasión profunda. También puede expresarse de forma más idiomática como: “mi corazón se enternece por él”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵן יַקִּיר
  english_pob_choice: a precious son
  chosen_spanish: un hijo precioso
  alternatives_spanish:
  - un hijo querido
  - un hijo estimado
  lexicon: HALOT
  rationale: יַקִּיר expresa algo valioso, apreciado o precioso; 'hijo precioso' conserva la fuerza afectiva de la pregunta retórica sin perder naturalidad en español.
- source_word: אִם יֶלֶד שַׁעֲשֻׁעִים
  english_pob_choice: a child of delight
  chosen_spanish: un hijo de deleite
  alternatives_spanish:
  - un niño deleitoso
  - un hijo amado
  lexicon: HALOT
  rationale: La construcción hebrea apunta a alguien asociado con deleite o gozo. 'Hijo de deleite' mantiene la imagen y el paralelismo con la primera frase.
- source_word: כִּי מִדֵּי דַבְּרִי בּוֹ
  english_pob_choice: For as often as I speak of him
  chosen_spanish: Pues cada vez que hablo de él
  alternatives_spanish:
  - Pues siempre que hablo de él
  - Pues cada vez que hablo acerca de él
  lexicon: HALOT
  rationale: Se conserva el valor repetitivo de מִדֵּי con una expresión natural en español. 'Hablar de él' refleja el sentido contextual auditable que la revisión inglesa corrigió hacia una lectura más cercana al hebreo.
- source_word: זָכֹר אֶזְכְּרֶנּוּ עוֹד
  english_pob_choice: I still surely remember him
  chosen_spanish: todavía me acuerdo de él con certeza
  alternatives_spanish:
  - todavía lo recuerdo con certeza
  - sin duda me acuerdo de él todavía
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la afirmación; 'con certeza' intenta reflejar ese énfasis, mientras 'todavía' traduce עוֹד como persistencia continua.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Conector inferencial directo y natural en español, suficiente para mantener la relación lógica sin solemnidad innecesaria.
- source_word: הָמוּ מֵעַי לוֹ
  english_pob_choice: my inward parts are stirred for him
  chosen_spanish: mis entrañas se conmueven por él
  alternatives_spanish:
  - mi interior se conmueve por él
  - mis entrañas se agitan por él
  lexicon: HALOT
  rationale: מֵעַי alude literalmente a las entrañas/partes internas; 'se conmueven' expresa la emoción profunda en un español digno y bíblico sin ocultar el hebraísmo.
- source_word: רַחֵם אֲרַחֲמֶנּוּ
  english_pob_choice: I will surely have compassion on him
  chosen_spanish: tendré compasión de él
  alternatives_spanish:
  - le tendré compasión
  - ciertamente le mostraré misericordia
  lexicon: HALOT
  rationale: '''Tener compasión'' conserva el matiz emotivo de רחם mejor que un término más jurídico. La certeza ya queda reforzada por ''ciertamente'' y por el intensivo verbal del hebreo.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del proyecto, Yahvé, y una fórmula profética solemne y contemporánea.
theological_decisions:
- issue: Efraín como destinatario personificado y tensión juicio-misericordia
  english_pob_reading: Ephraim is addressed as the northern people personified as a beloved son, with the verse holding together prior judgment and present compassion.
  chosen_spanish_reading: Efraín es tratado como el pueblo del norte personificado como hijo amado, y el versículo conserva la tensión entre la memoria persistente de Dios y su compasión.
  alternative_spanish_readings:
  - Efraín como antepasado tribal individual
  - Efraín como mera metonimia sin tono afectivo
  rationale: El contexto inmediato de Jeremías 31 es corporativo y afectivo; la traducción mantiene la imagen filial y no suaviza la tensión entre el recuerdo continuo y la misericordia divina.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde 'speak against him' a 'speak of him' por mayor cercanía al hebreo. Esta versión española sigue esa revisión y evita introducir una idea de hostilidad que el hebreo no expresa de manera explícita. También se conservó la intensificación verbal en 'ciertamente' y 'con certeza' para reflejar los absolutos del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto.
  - '''Efraín'' se mantiene como nombre propio del destinatario personificado.'
  - '''Entrañas'' reproduce el hebraísmo מֵעַי sin sustituirlo por una paráfrasis que borre el matiz corporal-emotivo.'
  - Se evita 'Señor' como máscara del nombre divino, siguiendo la norma del proyecto.
