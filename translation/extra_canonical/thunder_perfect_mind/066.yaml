translation:
  text: And you embrace me[a]. You despised me, and you saw me[e][d][c][b]. Do not
    scatter the first things [...] Do not ponder [...] your limbs [...]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲧⲁⲉⲓⲟ can also be rendered “receive” or “welcome,” a recurring imperative
      in Thunder. “Embrace” is chosen for bodily resonance.
    reason: lexical_alternative
  - marker: b
    text: The OCR includes ⲙⲡⲣⲡⲟⲩϩⲧ (“do not fear”) and ⲛⲛϣⲟⲣⲡ (likely “first things/beginnings”),
      but the mapping to this sub-unit is uncertain; these are not carried into the
      main line pending firmer alignment.
    reason: alignment_note
  - marker: c
    text: ⲗⲁⲁⲧⲉ may also be translated “members.” “Limbs” keeps the corporeal edge
      felt in this poem’s body imagery.
    reason: lexical_alternative
  - marker: d
    text: The pair “shamelessness // shame” is preserved to keep the poem’s paradox
      rather than smoothing it into a single ethical stance.
    reason: parallelism_note
  - marker: e
    text: Or 'And you, embrace me without shame; and from shamelessness — and from
      shame — put my limbs to shame within you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲧⲁⲉⲓⲟ
  chosen: embrace
  alternatives:
  - receive
  - take in
  - welcome
  lexicon: Crum; Layton
  rationale: This imperative recurs in Thunder with affective, bodily overtones; “embrace”
    preserves that tactile resonance better than the more neutral “receive,” while
    still fitting the object marker ⲙⲙⲟⲓ/ⲙⲙⲟⲉⲓ (me).
- source_word: ϣⲱϥ (with ⲁⲧ- prefix)
  chosen: shame / shameless- (as a paradoxical pair)
  alternatives:
  - disgrace / without disgrace
  - be ashamed / unashamed
  lexicon: Crum; W. E. Crum, A Coptic Dictionary, s.v. ϣⲱϥ
  rationale: The ⲁⲧ- privative produces “without shame/shamelessness.” Retaining the
    same root in both halves (“shame/shamelessness”) preserves the poem’s antithetical
    bite better than switching to a synonym.
- source_word: ⲗⲁⲁⲧⲉ
  chosen: limbs
  alternatives:
  - members
  - body-parts
  lexicon: Crum; Layton
  rationale: “Limbs” maintains the corporeal concreteness and the unsettling force
    of making the body itself the locus of shame. “Members” is possible but reads
    more ecclesially in English.
- source_word: ⲁⲧⲏⲛ
  chosen: within
  alternatives:
  - inside
  - inward parts
  lexicon: Crum
  rationale: Locative sense marking interiority. “Within” keeps the compact cadence
    and interior focus.
- source_word: ⲡⲟⲩϩⲧ
  chosen: fear (not carried in main line)
  alternatives:
  - dread
  - awe
  lexicon: Crum
  rationale: The excerpt includes ⲙⲡⲣⲡⲟⲩϩⲧ (“do not fear”), but line mapping here
    is uncertain; I have not carried it into the main rendering to avoid conflating
    segments, pending firmer alignment.
- source_word: ⲙⲉⲗⲉⲧⲁ (from Gk μελετάω)
  chosen: ponder / dwell on (not carried)
  alternatives:
  - meditate
  - practice
  lexicon: Greek loan via Crum; LSJ μελετάω
  rationale: Present in the OCR string but its syntactic tie-in here is unclear; not
    carried into the English line to avoid overconfident reconstruction.
parallelism_check: 'The rendering keeps the explicit antithesis by repeating the same
  root: shamelessness // shame, and turns the paradox by commanding “put my limbs
  to shame within you,” intensifying the tension rather than resolving it.'
voice_check: Second-person plural imperatives addressing the audience (“embrace me
  … put …”) are preserved, with the intimate, confrontational Thunder voice maintained
  and the body-focused imagery left stark.
