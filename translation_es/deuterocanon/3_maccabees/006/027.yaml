translation:
  language: es
  text: Liberen, liberen las injustas ataduras; envíenlos a sus propios hogares[a] en paz, dejando sin efecto lo que había sido ordenado.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus propios lugares». La expresión griega εἰς τὰ ἴδια puede referirse de manera más amplia a lo que les pertenece o a sus propios hogares/lugares.
    reason: lexical_alternative
  - marker: b
    text: O «dejando sin efecto lo que había sido ordenado». El participio indica abandonar la orden emitida previamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύσατε
  english_pob_choice: Release
  chosen_spanish: Soltad
  alternatives_spanish:
  - Liberad
  - Desatad
  - Soltadlos
  lexicon: LSJ
  rationale: Imperativo plural de λύω. ‘Soltad’ expresa la acción de aflojar o desatar con fuerza y mantiene el tono urgente del mandato.
- source_word: ἐκλύσατε
  english_pob_choice: release
  chosen_spanish: soltad
  alternatives_spanish:
  - soltad por completo
  - desatad del todo
  - liberad
  lexicon: LSJ
  rationale: El segundo imperativo intensifica al primero. Repetir ‘soltad’ conserva la repetición enfática del griego sin forzar una paráfrasis.
- source_word: ἄδικα
  english_pob_choice: unjust
  chosen_spanish: injustas
  alternatives_spanish:
  - injustas
  - inicuas
  - inmerecidas
  lexicon: LSJ
  rationale: Califica a δεσμά con un juicio moral o jurídico. ‘Injustas’ es claro, natural y fiel al matiz de opresión indebida.
- source_word: δεσμά
  english_pob_choice: bonds
  chosen_spanish: cadenas
  alternatives_spanish:
  - lazos
  - grilletes
  - ataduras
  lexicon: LSJ
  rationale: Aunque ‘bonds’ puede ser más amplio, en español ‘cadenas’ comunica con mayor naturalidad la imagen de sujeción física y opresiva en este contexto.
- source_word: εἰς τὰ ἴδια
  english_pob_choice: to their own homes
  chosen_spanish: a sus propios hogares
  alternatives_spanish:
  - a lo suyo
  - a sus propios lugares
  - a sus casas
  lexicon: LSJ
  rationale: La expresión idiomática apunta a regresar a lo propio; ‘hogares’ hace explícito el sentido relacional/doméstico que el contexto sugiere para personas liberadas.
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  - en tranquilidad
  lexicon: LSJ
  rationale: La locución es un modismo estable. ‘En paz’ es la fórmula más natural y conserva el tono solemne del texto.
- source_word: ἐξαποστείλατε
  english_pob_choice: send them away
  chosen_spanish: enviadlos
  alternatives_spanish:
  - despachadlos
  - mandadlos fuera
  - dejadlos ir
  lexicon: LSJ
  rationale: El verbo indica enviar o despachar. En español, ‘enviadlos’ basta con el complemento de destino ya expresado en la frase.
- source_word: τὰ προστεταγμένα
  english_pob_choice: what has been ordered
  chosen_spanish: lo que había sido ordenado
  alternatives_spanish:
  - lo mandado
  - las órdenes dadas
  - lo que se había mandado
  lexicon: LSJ
  rationale: El participio neutro sustantivado refiere a mandatos previos sin especificar más. ‘Lo que había sido ordenado’ preserva la referencia a una orden previa sin añadir sujeto implícito.
- source_word: παραιτησάμενοι
  english_pob_choice: setting aside
  chosen_spanish: dejando a un lado
  alternatives_spanish:
  - apartando
  - prescindiendo de
  - renunciando a
  lexicon: LSJ
  rationale: El aoristo medio participial expresa abandonar o dejar de lado algo previamente vigente. ‘Dejando a un lado’ sigue el sentido del ajuste editorial inglés ‘setting aside’ y suena natural en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó ‘renouncing’ por ‘setting aside’ para παραιτησάμενοι. La redacción española sigue esa decisión y evita un verbo demasiado fuerte o abstracto, manteniendo el matiz de abandono de la orden previa.
  spanish_consistency_notes:
  - Se conserva el paralelismo de los dos imperativos iniciales.
  - ‘Injustas’ se aplicó a ‘cadenas’ para mantener la relación adjetival del griego.
  - ‘A sus propios hogares’ interpreta de forma idiomática εἰς τὰ ἴδια; se documenta la alternativa más literal en nota.
  - ‘Dejando a un lado’ mantiene la lectura revisada de παραιτησάμενοι sin introducir una connotación doctrinal ajena al contexto.
