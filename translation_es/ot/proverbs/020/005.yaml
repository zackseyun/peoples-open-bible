review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: el consejo interior se compara con aguas profundas y la persona entendida lo extrae. También mantiene correctamente el valor adversativo de וְ como «pero». Sin embargo, la primera cola en español queda menos fiel y menos natural al decir «Las aguas profundas son el consejo...», invirtiendo de manera torpe el enfoque del hebreo y debilitando la relación metafórica que el inglés auditado expresó con «is like». Además, «lo saca» no concuerda con el antecedente femenino «el consejo» y pierde la referencia femenina del sufijo de יִדְלֶנָּה.'
  spanish_quality_summary: La redacción actual es comprensible, pero suena rígida y poco proverbial. «Las aguas profundas son el consejo...» es gramaticalmente posible, aunque menos idiomático en español que «El consejo... es como aguas profundas». También conviene cambiar «lo saca» por «lo extrae» o «lo saca» con antecedente masculino claro; dado que «consejo» es masculino, la discordancia no existe, pero «lo saca» resulta algo plano y menos evocador de sacar agua. «Lo extrae» comunica mejor el matiz de דלה sin volverse forzado.
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Consejo», «corazón», «hombre de entendimiento» y la conservación del masculino genérico están alineados con la justificación auditada. La nota actual sobre «aguas profundas» está mal clasificada como alternativa léxica, porque en el texto principal ya se eligió precisamente esa forma; la nota útil debe preservar la alternativa «agua profunda» o explicar la variación con el inglés POB.
  issues:
  - severity: medium
    issue: 'La primera cola española invierte la imagen de forma poco natural: «Las aguas profundas son el consejo...»'
    rationale: El hebreo presenta «consejo ... [como] aguas profundas»; aunque no lleva partícula comparativa explícita, en español la formulación del borrador suena forzada y menos fiel al foco del proverbio. «El consejo en el corazón de un hombre es como aguas profundas» preserva mejor sentido y estilo proverbial.
  - severity: medium
    issue: La nota [a] no preserva correctamente la decisión auditada del inglés POB
    rationale: El inglés POB eligió «deep water» con nota alternativa «deep waters». Como el español principal usa «aguas profundas», la nota no debe decir simplemente que se conserva el plural; debe registrar la alternativa española correspondiente, por ejemplo «O «agua profunda»».
  - severity: low
    issue: «Lo saca» es menos preciso para דלה que una forma como «lo extrae»
    rationale: El verbo hebreo evoca sacar agua de un pozo. «Lo saca» es entendible, pero «lo extrae» conserva mejor la imagen de extraer algo hondo u oculto y suena más digno en registro bíblico moderno.
  revised_spanish_text: El consejo en el corazón de un hombre es como aguas profundas[a], pero un hombre de entendimiento lo extrae.
  revised_footnotes:
  - marker: a
    text: O «agua profunda». El hebreo dice literalmente «aguas profundas».
    reason: lexical_alternative
  revision_rationale: Se reordena la primera cola para reflejar con mayor naturalidad y fidelidad la metáfora hebrea en español. Se conserva «aguas profundas» como texto principal, pero se ajusta la nota para registrar la alternativa singular colectiva en español, en paralelo con la decisión auditada del inglés POB. Se cambia «lo saca» por «lo extrae» para expresar mejor el matiz de sacar algo como de aguas hondas.
