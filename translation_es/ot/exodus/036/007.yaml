translation:
  language: es
  text: Y el material era suficiente para toda la obra, para hacerla, y aún sobraba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y quedó algo sobrante». El verbo hebreo puede enfatizar que, después de lo necesario para la obra, todavía quedaba un excedente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמְּלָאכָה
  english_pob_choice: the material
  chosen_spanish: el material
  alternatives_spanish:
  - la obra
  - el trabajo
  - la artesanía
  lexicon: HALOT
  rationale: En este contexto, la frase explica que lo aportado por el pueblo bastaba para la construcción; por eso «material» comunica el referente concreto que ya había sido reunido. Mantiene la decisión contextual del POB inglés y evita que «la obra» suene a que el trabajo mismo era suficiente.
- source_word: הָיְתָה
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - estaba
  lexicon: HALOT
  rationale: Es la cópula normal en una cláusula descriptiva en pasado. «Era» suena natural en español y conserva el valor estativo del hebreo.
- source_word: דַיָּם
  english_pob_choice: sufficient
  chosen_spanish: suficiente
  alternatives_spanish:
  - bastante
  - de sobra
  lexicon: HALOT
  rationale: דַּי expresa suficiencia. «Suficiente» mantiene la fuerza formal del término sin añadir matices interpretativos indebidos.
- source_word: לְכָל הַמְּלָאכָה
  english_pob_choice: for all the work
  chosen_spanish: para toda la obra
  alternatives_spanish:
  - para todo el trabajo
  - para toda la tarea
  - para toda la labor
  lexicon: HALOT
  rationale: Aquí מְלָאכָה se refiere a la obra que debía realizarse en el tabernáculo. «Obra» permite conservar el paralelismo con el contexto de construcción y resulta idiomático en español bíblico contemporáneo.
- source_word: לַעֲשׂוֹת אֹתָהּ
  english_pob_choice: to do it
  chosen_spanish: para hacerla
  alternatives_spanish:
  - para realizarla
  - para llevarla a cabo
  lexicon: HALOT
  rationale: El infinitivo de עשה con sufijo pronominal se rinde de forma directa con «hacerla». En español preserva la relación con la obra mencionada sin sobreexplicar.
- source_word: וְהוֹתֵר
  english_pob_choice: and more than enough
  chosen_spanish: y había de sobra
  alternatives_spanish:
  - y sobraba
  - y quedó sobrante
  - y había exceso
  lexicon: HALOT
  rationale: El verbo denota excedente o sobrante. «Había de sobra» comunica la idea de superabundancia en un español natural, y conserva la alternativa semántica de «sobró» sin hacerla mecánicamente literal.
translation_notes:
  revision_awareness: El texto inglés fue revisado para añadir «there was» antes de «more than enough», reflejando mejor la idea final de exceso. La versión española incorpora esa misma precisión con «había de sobra», manteniendo el matiz de sobrante y evitando una simple repetición de «suficiente».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no hay aquí una referencia al nombre divino.
  - Se mantuvo «obra» para מְלָאכָה en la segunda ocurrencia, siguiendo el contraste contextual entre el material aportado y el trabajo por realizar.
  - La frase final se formuló de modo que exprese tanto suficiencia como excedente, tal como lo hace el hebreo y la nota auditada del POB inglés.
