translation:
  language: es
  text: Ningún hombre[a] podrá mantenerse delante de ti todos los días de tu vida[b]. Así como estuve con Moisés, estaré contigo. No te soltaré[c] ni te abandonaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Aquí ''hombre'' traduce un singular masculino hebreo con fuerza genérica: ningún ser humano u oponente humano podrá prevalecer.'
    reason: theological_note
  - marker: b
    text: 'O: ''Ningún hombre podrá estar delante de ti''. El hebreo puede expresar la idea de resistencia exitosa, es decir, que nadie podrá hacerte frente con éxito.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''No te fallaré ni te abandonaré''. El primer verbo puede sugerir no dejar caer, no aflojar el apoyo o no soltarte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְיַצֵּב
  english_pob_choice: will stand before
  chosen_spanish: se mantendrá delante de ti
  alternatives_spanish:
  - se pondrá en pie delante de ti
  - podrá resistirte
  - se sostendrá frente a ti
  lexicon: HALOT
  rationale: El hitpael de יצב aquí expresa tomar posición firme o presentarse con éxito frente a alguien en contexto de oposición. En español, 'se mantendrá delante de ti' conserva la imagen de estar firme ante Joshua y permite el valor adversativo sin sonar forzado.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - uno
  - persona
  - nadie
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino con fuerza genérica. 'Hombre' preserva esa forma representativa sin borrar el matiz de oposición humana general, siguiendo la decisión auditada de no neutralizar automáticamente el término.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - contra ti
  - en tu presencia
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'ante tu rostro', y en este contexto militar-promisorio 'delante de ti' mantiene el idiomatismo y deja que el verbo exprese la resistencia exitosa.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - durante toda tu vida
  - mientras vivas
  lexicon: HALOT
  rationale: Es una expresión hebrea estándar para abarcar toda la duración de la vida. La traducción elegida es transparente y natural en español.
- source_word: כַּאֲשֶׁר הָיִיתִי עִם מֹשֶׁה
  english_pob_choice: Just as I was with Moses
  chosen_spanish: Así como estuve con Moisés
  alternatives_spanish:
  - Como estuve con Moisés
  - Del mismo modo que estuve con Moisés
  lexicon: HALOT
  rationale: כַאֲשֶׁר marca comparación. 'Así como' reproduce de forma clara la analogía entre la presencia pasada de Yahvé con Moisés y la presencia prometida con Joshua.
- source_word: אֶהְיֶה עִמָּךְ
  english_pob_choice: I will be with you
  chosen_spanish: estaré contigo
  alternatives_spanish:
  - seré contigo
  - yo estaré con tu lado
  lexicon: HALOT
  rationale: El futuro de היה con עִם expresa una promesa de presencia. 'Estaré contigo' es la forma española más natural y fiel para esa asistencia covenantal/pactual.
- source_word: אַרְפְּךָ
  english_pob_choice: fail you
  chosen_spanish: te dejaré
  alternatives_spanish:
  - te soltaré
  - te abandonaré
  - te dejaré caer
  lexicon: HALOT
  rationale: La raíz רפה en hiphil sugiere dejar caer, aflojar o no sostener. En español, 'te dejaré' comunica la idea de soltar o no sostener; se mantiene además la pareja con 'abandonaré' para reflejar el paralelismo hebreo.
- source_word: אֶעֶזְבֶךָּ
  english_pob_choice: forsake you
  chosen_spanish: te abandonaré
  alternatives_spanish:
  - te forsacaré
  - te dejaré
  - te desampararé
  lexicon: HALOT
  rationale: עזב significa dejar/abandonar/abandonar en sentido solemne. 'Te abandonaré' preserva el tono pactual y funciona bien junto a 'te dejaré' para representar la doble negación.
theological_decisions:
- issue: Sentido genérico de אִישׁ en un contexto de promesa militar
  english_pob_reading: No man
  chosen_spanish_reading: Ningún hombre
  alternative_spanish_readings:
  - Nadie
  - Ninguna persona
  - Ningún enemigo
  rationale: Se conserva el singular masculino representativo del hebreo sin neutralizarlo. En español, 'hombre' puede sonar específico de sexo; por eso se deja un pie de nota para aclarar el valor genérico humano, sin perder la forma del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor del doble compromiso divino לֹא אַרְפְּךָ וְלֹא אֶעֶזְבֶךָּ
  english_pob_reading: I will not fail you or forsake you
  chosen_spanish_reading: No te dejaré ni te abandonaré
  alternative_spanish_readings:
  - No te dejaré ni te desampararé
  - No te soltaré ni te abandonaré
  - No fallaré en sostenerte ni te abandonaré
  rationale: 'La pareja hebrea expresa fidelidad total: no aflojar el sostén y no abandonar. En español, ''dejar'' + ''abandonar'' comunica bien el alcance de ambas negaciones sin introducir explicación excesiva ni perder la cadencia solemne.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1 y §5
- issue: Presencia divina comparada entre Moisés y Josué
  english_pob_reading: Just as I was with Moses, I will be with you
  chosen_spanish_reading: Así como estuve con Moisés, estaré contigo
  alternative_spanish_readings:
  - Como estuve con Moisés, así estaré contigo
  - Del mismo modo que estuve con Moisés, estaré contigo
  rationale: La comparación subraya continuidad de la presencia de Yahvé en la conducción del pueblo. El español elegido mantiene esa continuidad sin sobreexplicar la fórmula.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto inglés quedó sin cambios y con alto acuerdo entre revisiones; por eso este borrador español sigue de cerca el paquete fuente hebreo y el audit trail inglés, sin introducir nuevas tensiones ni resolverlas de forma distinta.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; en este versículo el sujeto implícito se expresa como 'estuve/estaré' y no necesita introducir el nombre en la línea principal.
  - Se conserva la fórmula de presencia divina con 'estaré contigo' por ser la equivalencia española más natural para עִם.
  - Se evita 'SEÑOR' como máscara del nombre divino, conforme a la norma del proyecto.
  - Los pies de nota distinguen entre alternativa léxica y aclaración teológica sin duplicar marcadores.
