translation:
  language: es
  text: Nabucodonosor, rey de Babilonia, me[a] ha devorado; me ha aplastado. Me ha hecho un vaso vacío; me ha tragado como un monstruo marino[b]; ha llenado su vientre con mis delicias[c]; me ha arrojado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La voz está personificada como Sion/Jerusalén; aunque algunas formas hebreas en esta línea poética puedan sugerir un objeto plural, el sentido en contexto suele traducirse como una personificación singular: ''me''.'
    reason: cultural_note
  - marker: b
    text: O 'como un dragón'. El hebreo tannin puede referirse a una gran serpiente, a una criatura monstruosa parecida a un dragón o a un monstruo marino; aquí la imagen de tragar favorece 'monstruo marino'.
    reason: lexical_alternative
  - marker: c
    text: O 'con mis cosas escogidas' o 'con mis manjares'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אכלנו
  english_pob_choice: has devoured me
  chosen_spanish: me ha devorado
  alternatives_spanish:
  - me ha comido
  - me ha consumido
  lexicon: HALOT
  rationale: Conserva el verbo de ingestión violenta y el tono poético de la acusación; 'devorado' transmite mejor la imagen que una forma más neutra como 'consumido'.
- source_word: הממנו
  english_pob_choice: has crushed me
  chosen_spanish: me ha aplastado
  alternatives_spanish:
  - me ha confundido
  - me ha destrozado
  - me ha quebrantado
  lexicon: HALOT
  rationale: En el paralelismo con 'devorado' y con la imagen de ruina, 'aplastado' expresa con claridad la fuerza destructiva del hebreo.
- source_word: הציגנו
  english_pob_choice: has made me an empty vessel
  chosen_spanish: me ha hecho un vaso vacío
  alternatives_spanish:
  - me ha convertido en un vaso vacío
  - me ha puesto como un vaso vacío
  lexicon: HALOT
  rationale: La forma hebrea introduce el resultado de quedar reducido a un recipiente inútil; 'me ha hecho un vaso vacío' sigue de cerca la metáfora sin forzarla.
- source_word: כלי ריק
  english_pob_choice: like an empty vessel
  chosen_spanish: un vaso vacío
  alternatives_spanish:
  - un recipiente vacío
  - un cántaro vacío
  lexicon: HALOT
  rationale: '''Vaso'' funciona como equivalente natural de כְּלִי en español y preserva la imagen de un objeto sin valor por estar vacío.'
- source_word: בלענו
  english_pob_choice: has swallowed me
  chosen_spanish: me ha tragado
  alternatives_spanish:
  - me ha engullido
  - me ha devorado
  lexicon: HALOT
  rationale: '''Tragado'' mantiene el verbo de deglución del original y su fuerza imagética en español moderno.'
- source_word: כתנין
  english_pob_choice: like a sea monster
  chosen_spanish: como a un monstruo marino
  alternatives_spanish:
  - como a un dragón
  - como a una serpiente monstruosa
  lexicon: HALOT
  rationale: '''Monstruo marino'' comunica bien el alcance de תנין en este contexto de voracidad, sin cargar la imagen con asociaciones tardías de ''dragón''.'
- source_word: מלא כרשו
  english_pob_choice: he has filled his belly
  chosen_spanish: ha llenado su vientre
  alternatives_spanish:
  - ha llenado su barriga
  - ha saciado su vientre
  lexicon: HALOT
  rationale: '''Vientre'' conserva el registro corporal y poético del hebreo; ''llenado'' refleja con naturalidad el acto de saciarse con lo ajeno.'
- source_word: מעדני
  english_pob_choice: with my delicacies
  chosen_spanish: con mis delicias
  alternatives_spanish:
  - con mis manjares
  - con mis exquisiteces
  - con mis cosas escogidas
  lexicon: HALOT
  rationale: '''Delicias'' reproduce el sentido de bienes agradables o preciados y encaja con la imagen de saqueo opulento.'
- source_word: הדיחנו
  english_pob_choice: he has cast me out
  chosen_spanish: me ha arrojado
  alternatives_spanish:
  - me ha expulsado
  - me ha echado
  lexicon: HALOT
  rationale: El verbo final probablemente sigue la secuencia de ingestión y rechazo; 'arrojado' conserva la violencia y la brusquedad del gesto sin sobreespecificarlo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'set me down like an empty vessel' a 'made me an empty vessel' por mayor exactitud léxica; la versión española sigue esa decisión con 'me ha hecho un vaso vacío'.
  spanish_consistency_notes:
  - Mantengo 'Yahvé' como convención POB cuando aparezca el nombre divino; aquí no aparece.
  - He usado español natural pero cercano a la metáfora hebrea, evitando una paráfrasis expansiva.
  - '''Monstruo marino'' se mantiene como opción principal por coherencia con la nota léxica inglesa sobre tannin.'
  - Las notas [a], [b] y [c] están ancladas explícitamente en el texto y corresponden a las ambigüedades documentadas.
