revisions:
- from: No oprimirás al forastero[a], y ustedes mismos conocen el alma[b] del forastero[c], porque forasteros fueron en la tierra de Egipto.
  to: No oprimirás al extranjero[a], y ustedes mismos conocen el alma[b] del extranjero, porque ustedes fueron extranjeros en la tierra de Egipto.
  rationale: Se reemplazó ‘forastero’ por ‘extranjero’ para representar mejor גֵר en español amplio y eclesial, sin perder el matiz mediante la nota. Se corrigió la cláusula final para una sintaxis natural y plenamente explícita en español. Se eliminaron notas redundantes y se conservaron las aclaraciones necesarias sobre ger y el modismo con נֶפֶשׁ.
