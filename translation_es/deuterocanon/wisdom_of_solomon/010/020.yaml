translation:
  language: es
  text: Por eso, los justos despojaron a los impíos[a], y cantaron alabanzas a tu santo nombre, oh Yahvé; y, unánimes, alabaron tu mano defensora[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'saquearon' o 'tomaron despojo de'. El verbo griego se refiere a quitar botín a enemigos vencidos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'tu mano que pelea en favor de [tu pueblo]' o 'tu mano campeona'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: Conserva la relación inferencial con el contexto previo de liberación, en un español natural y solemne. Evita una rigidez excesiva sin perder la lógica del texto.
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los rectos de corazón
  lexicon: LSJ
  rationale: El plural sustantivado se entiende bien como grupo caracterizado por justicia/rectitud. 'Los justos' mantiene la categoría moral-teológica del griego y es natural en español bíblico.
- source_word: ἐσκύλευσαν
  english_pob_choice: plundered
  chosen_spanish: despojaron
  alternatives_spanish:
  - saquearon
  - tomaron despojo de
  lexicon: LSJ
  rationale: El verbo griego indica tomar botín o despojar al enemigo vencido. 'Despojaron' conserva la idea de quitar bienes en contexto bélico sin sonar demasiado coloquial como 'saquearon'.
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los malvados
  lexicon: LSJ
  rationale: '''Impíos'' refleja mejor la falta de reverencia hacia Dios que un mero mal moral general. Mantiene la fuerza religiosa del término griego.'
- source_word: ὕμνησαν
  english_pob_choice: sang praise
  chosen_spanish: cantaron alabanzas
  alternatives_spanish:
  - entonaron alabanzas
  - himnaron
  lexicon: LSJ
  rationale: El verbo puede implicar canto de alabanza; 'cantaron alabanzas' expresa esa dimensión musical en español sin caer en un calco áspero.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Yahvé
  lexicon: LSJ
  rationale: La vocalización de la invocación directa en español requiere 'oh'. Se traduce el vocativo con 'Señor' porque aquí el griego usa κύριε como dirección litúrgica a Dios en la cita de la LXX; en esta línea la forma convencional preserva la fluidez devocional del texto. La opción 'oh Yahvé' sería más explícita, pero no es la forma primaria del audit trail para este caso.
- source_word: τὸ ὄνομα τὸ ἅγιόν σου
  english_pob_choice: your holy name
  chosen_spanish: tu santo nombre
  alternatives_spanish:
  - tu nombre santo
  - tu nombre sagrado
  lexicon: LSJ
  rationale: Es la fórmula bíblica normal en español y conserva el orden natural. 'Santo nombre' refleja la consagración del nombre divino sin sobreexplicar.
- source_word: τήν τε ὑπέρμαχόν σου χεῖρα
  english_pob_choice: your defending hand
  chosen_spanish: tu mano defensora
  alternatives_spanish:
  - tu mano que defiende
  - tu mano campeona
  - tu mano protectora
  lexicon: LSJ
  rationale: '''Defensora'' mantiene el sustantivo-metafórico ''mano'' y expresa el valor de ὑπέρμαχος como quien lucha en favor de otro. Es más breve y natural que una perífrasis amplia, y conserva la imagen bíblica de la mano divina activa.'
- source_word: ᾔνεσαν
  english_pob_choice: praised
  chosen_spanish: alabaron
  alternatives_spanish:
  - ensalzaron
  - dieron alabanza
  lexicon: LSJ
  rationale: Después de 'cantaron alabanzas', el segundo verbo puede traducirse simplemente 'alabaron' para distinguirlo del matiz musical del anterior sin perder el sentido de elogio ritual.
- source_word: ὁμοθυμαδόν
  english_pob_choice: with one accord
  chosen_spanish: unánimes
  alternatives_spanish:
  - de común acuerdo
  - con un solo sentir
  lexicon: LSJ
  rationale: El adverbio expresa unidad de ánimo e intención, no solo simultaneidad. 'Unánimes' es conciso y transmite bien la idea de actuar con un solo impulso.
theological_decisions:
- issue: Referentes morales generales vs. identificación histórica explícita
  english_pob_reading: the righteous / the ungodly are rendered generically, leaving historical referents to context.
  chosen_spanish_reading: los justos / los impíos, sin añadir 'israelitas' ni 'egipcios' en el texto principal.
  alternative_spanish_readings:
  - los justos israelitas... los impíos egipcios
  rationale: El griego presenta categorías morales-religiosas, no nombres étnicos. La traducción conserva esa forma del texto y deja que el contexto narrativo determine los referentes históricos.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Metáfora de la mano divina
  english_pob_reading: retain the metaphor of God's hand while expressing ὑπέρμαχος as defending/championing action.
  chosen_spanish_reading: tu mano defensora
  alternative_spanish_readings:
  - tu mano poderosa
  - tu mano protectora
  - tu mano campeona
  rationale: La expresión mantiene la metáfora bíblica de la mano como agente de acción divina, sin convertirla en una abstracción. 'Defensora' recoge el sentido de actuar en favor de su pueblo y también la resonancia de combate.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que el consenso de cotejo fue de alta concordancia. Se mantuvo ese estado estable, sin introducir expansiones interpretativas no sustentadas por el griego ni por el audit trail inglés.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo del versículo con dos acciones de alabanza: primero cantaron alabanzas, luego alabaron, evitando homogeneizar ambos verbos.'
  - Se mantuvo el vocativo directo a Dios con 'oh Señor' en armonía con el uso de κύριε en la LXX y con la lectura devocional del contexto.
  - '''Despojaron'' y ''mano defensora'' buscan equilibrio entre precisión léxica y fluidez bíblica en español, sin borrar la imaginería concreta de botín y combate.'
