translation:
  language: es
  text: Nuestra casa santa y hermosa, donde nuestros padres[b] te alabaron, ha venido a ser pasto del fuego[a], y todas nuestras cosas preciosas se han vuelto una ruina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: ''ha sido quemada por el fuego''.'
    reason: lexical_alternative
  - marker: b
    text: O 'nuestros antepasados'; pero el hebreo dice explícitamente 'padres'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית קָדְשֵׁנוּ וְתִפְאַרְתֵּנוּ
  english_pob_choice: our holy and beautiful house
  chosen_spanish: Nuestra casa santa y hermosa
  alternatives_spanish:
  - Nuestra casa santa y gloriosa
  - la casa de nuestra santidad y de nuestra hermosura/gloria
  lexicon: HALOT
  rationale: La cadena constructa hebrea expresa literalmente 'casa de nuestra santidad y de nuestra hermosura/gloria'. En español, 'casa santa y hermosa' conserva ambos rasgos de manera natural y cercana al valor del inglés auditado; 'gloriosa' es posible, pero 'hermosa' comunica mejor el matiz de algo valioso y espléndido, sin perder la carga cultual del templo.
- source_word: אֲשֶׁר הִלְלוּךָ אֲבֹתֵינוּ
  english_pob_choice: where our fathers praised you
  chosen_spanish: donde nuestros padres te alabaron
  alternatives_spanish:
  - en la cual nuestros padres te alabaron
  - donde nuestros antepasados te alabaron
  lexicon: HALOT
  rationale: El relativo אֲשֶׁר funciona bien como relativo locativo. 'Donde' es fluido en español y mantiene el vínculo con la casa/templo. Se conserva 'padres' para reproducir el masculino plural explícito del hebreo y su fuerza histórico-covenantal.
- source_word: הִלְלוּךָ
  english_pob_choice: praised you
  chosen_spanish: te alabaron
  alternatives_spanish:
  - te celebraron
  lexicon: HALOT
  rationale: El piel de הלל en este contexto cultual significa 'alabar'. 'Alabaron' es la correspondencia más directa y transparente para el español eclesial contemporáneo.
- source_word: הָיָה לִשְׂרֵפַת אֵשׁ
  english_pob_choice: has become a burning with fire
  chosen_spanish: se ha convertido en una quemadura con fuego
  alternatives_spanish:
  - ha sido quemada por el fuego
  - se ha convertido en un incendio
  - se ha vuelto algo quemado con fuego
  lexicon: HALOT
  rationale: 'El hebreo es literalmente nominal: ''ha llegado a ser para/una quemadura de fuego''. Se preserva la aspereza sintáctica con ''se ha convertido en una quemadura con fuego'', evitando suavizarlo demasiado y manteniendo la intensidad de devastación que el inglés auditado también conserva.'
- source_word: מַחֲמַדֵּינוּ
  english_pob_choice: our precious things
  chosen_spanish: nuestras cosas preciosas
  alternatives_spanish:
  - nuestros bienes preciosos
  - nuestras cosas deseadas
  - nuestros tesoros
  lexicon: HALOT
  rationale: El sustantivo denota objetos deseables, preciados o atesorados. 'Cosas preciosas' es suficientemente amplio para no precisar indebidamente si se trata de utensilios del templo, pertenencias o bienes valiosos, a la vez que refleja la ternura y el valor implicados.
- source_word: לְחָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: una ruina
  alternatives_spanish:
  - desolación
  - ruina/desolación
  lexicon: HALOT
  rationale: El término apunta a devastación o desolación. 'Una ruina' es concreto, natural en español y mantiene el carácter singular del predicado.
theological_decisions:
- issue: Referencia de 'casa santa y hermosa'
  english_pob_reading: The phrase refers primarily to the temple in Jerusalem.
  chosen_spanish_reading: La frase se entiende principalmente del templo de Jerusalén.
  alternative_spanish_readings:
  - Podría abarcar también Jerusalén o los lugares sagrados de la ciudad o la tierra.
  - Podría leerse de manera más amplia como el ámbito sagrado nacional.
  rationale: El contexto inmediato habla de la casa donde los padres alabaron a Dios, lo que apunta primero al templo. El lamento mayor incluye Sion y Jerusalén, pero aquí el referente principal sigue siendo el santuario.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Renderización de אֲבֹתֵינוּ
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El hebreo usa plural masculino explícito y carga histórica/covenantal. Se conserva 'padres' como forma fiel y consistente con el audit trail; 'antepasados' queda como alternativa léxica posible, pero no reemplaza la forma marcada del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del inglés POB que prefirió ''burning with fire'' frente a una forma más literal pero menos natural. En español se intentó conservar esa tensión: la redacción principal mantiene una construcción nominal áspera (''una quemadura con fuego'') para reflejar el hebreo, mientras la nota ofrece la alternativa más idiomática. También se respetó la elección editorial de ''fathers'' frente a ''ancestors''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto cuando el texto hebreo lo exija; este versículo no contiene el nombre divino explícito.
  - '''padres'' se mantiene como traducción de אֲבֹתֵינוּ por fidelidad al masculino plural del hebreo.'
  - '''alabaron'' se usa para הלל en contexto cultual, evitando una paráfrasis más general.'
  - '''ruina'' traduce el cierre nominal לְחָרְבָּה sin convertirlo en una explicación interpretativa excesiva.'
