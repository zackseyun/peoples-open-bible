lexical_decisions:
- source_word: דִלְעָן
  english_pob_choice: Dilean
  chosen_spanish: Dileán
  alternatives_spanish:
  - Dilán
  - Dil'an
  lexicon: N/A (topónimo propio)
  rationale: Se trata de un nombre de lugar en una lista de ciudades de Judá; por eso se translitera, no se traduce. «Dileán» sigue de cerca la forma consonántico-vocálica transmitida y mantiene una adaptación hispana legible.
- source_word: הַמִּצְפֶּה
  english_pob_choice: Mizpeh
  chosen_spanish: Mizpeh
  alternatives_spanish:
  - el Mizpeh
  - la atalaya
  - la vigilancia
  lexicon: HALOT
  rationale: Aunque el hebreo incluye el artículo, en este contexto funciona como parte del topónimo. En español conviene conservar el nombre tradicional «Mizpeh» en vez de traducir el sustantivo subyacente, para no perder el carácter de lugar propio.
- source_word: יָקְתְאֵל
  english_pob_choice: Joktheel
  chosen_spanish: Jokteel
  alternatives_spanish:
  - Jocteel
  - Joktheel
  lexicon: N/A (topónimo propio)
  rationale: Es otro nombre de lugar, por lo que se translitera. «Jokteel» ofrece una forma española clara y fiel a la convención inglesa «Joktheel», sin añadir vocales o consonantes no justificadas por el texto.
