translation:
  language: es
  text: Entonces David consoló[a] a Betsabé, su esposa, y entró a ella y se acostó con ella. Ella dio a luz un hijo, y él le puso por nombre Salomón. Y Yahvé lo amó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dio consuelo a Betsabé, su esposa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַחֵם
  english_pob_choice: comforted
  chosen_spanish: consoló
  alternatives_spanish:
  - lo consoló
  - la consoló
  lexicon: HALOT
  rationale: El piel de נחם aquí expresa dar consuelo después del duelo. En español, 'consoló' conserva el sentido pastoral y encaja de manera natural con el contexto narrativo.
- source_word: בַּת שֶׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Bat-seba
  - Bethsabé
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se adapta a la forma hispana más reconocible y estable, sin perder la referencia al hebreo.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa, su mujer
  lexicon: HALOT
  rationale: 'Se mantiene el dato explícito del hebreo: Betsabé es presentada aquí como la esposa de David. ''Esposa'' es digno y claro en español contemporáneo.'
- source_word: וַיָּבֹא אֵלֶיהָ
  english_pob_choice: he went in to her
  chosen_spanish: entró a ella
  alternatives_spanish:
  - fue a ella
  - vino a ella
  lexicon: HALOT
  rationale: Se conserva el valor idiomático semita de acceso sexual sin explicitarlo de forma más interpretativa. En español, 'entró a ella' reproduce con sobriedad la construcción y permite que el paralelo siguiente aclare la relación.
- source_word: וַיִּשְׁכַּב עִמָּהּ
  english_pob_choice: lay with her
  chosen_spanish: se acostó con ella
  alternatives_spanish:
  - durmió con ella
  - yacía con ella
  lexicon: HALOT
  rationale: '''Se acostó con ella'' es el equivalente natural y reverente para el idiomático verbo sexual. Mantiene el registro narrativo sin añadir matices ajenos.'
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: She bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - tuvo un hijo
  lexicon: HALOT
  rationale: '''Dio a luz'' es claro, digno y preciso en español; expresa el nacimiento sin arcaísmo excesivo.'
- source_word: וַיִּקְרָא אֶת שְׁמוֹ שְׁלֹמֹה
  english_pob_choice: he named him Solomon
  chosen_spanish: le puso por nombre Salomón
  alternatives_spanish:
  - lo llamó Salomón
  - le dio el nombre de Salomón
  lexicon: HALOT
  rationale: La construcción hebrea 'llamar el nombre' se rinde con una fórmula natural en español. 'Le puso por nombre' conserva el acto nominativo y evita una paráfrasis excesiva.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma bíblica tradicional y plenamente inteligible en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se preserva el nombre divino en su forma española establecida para este proyecto, evitando la sustitución por un título y manteniendo la decisión doctrinal del texto base.
- source_word: אֲהֵבוֹ
  english_pob_choice: loved him
  chosen_spanish: lo amó
  alternatives_spanish:
  - lo amaba
  - lo tuvo amor
  lexicon: HALOT
  rationale: '''Amó'' refleja de manera directa el verbo אהב. ''Lo amó'' mantiene la fuerza relacional sin diluirla en expresiones menos precisas.'
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El hebreo usa explícitamente el Tetragrama. La línea editorial del POB en inglés lo traduce como 'Yahweh'; en español, 'Yahvé' comunica ese nombre propio con naturalidad y coherencia doctrinal, en lugar de ocultarlo tras una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés y la revisión más reciente: no se documentaron cambios posteriores que alteraran la solución textual. Se mantuvieron las decisiones estables de nombre divino, idiomática sexual y nombre propio.'
  spanish_consistency_notes:
  - Se conserva el paralelismo narrativo del hebreo con oraciones breves unidas por 'y'.
  - Se mantiene la referencia explícita a Betsabé como esposa de David.
  - La forma 'entró a ella' se usa de modo idiomático y se complementa con 'se acostó con ella' para evitar ambigüedad.
  - 'Los nombres propios siguen formas bíblicas estándar en español: Betsabé, Salomón, Yahvé.'
