translation:
  language: es
  text: 'y dijo[a]: «Oh, Yahvé, Dios de nuestros padres, ¿no eres tú Dios en los cielos? ¿Y no gobiernas sobre todos los reinos de las naciones? En tu mano están el poder y la fuerza, y no hay quien pueda hacerte frente[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios de nuestros antepasados». El hebreo dice literalmente «Dios de nuestros padres».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «resistirte» o «mantenerse contra ti». El hebreo puede expresar la idea de ponerse de pie en oposición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente en hebreo; la política del proyecto pide conservarlo como «Yahvé» en español, en vez de ocultarlo bajo una convención litúrgica.
- source_word: אֱלֹהֵי אֲבֹתֵינוּ
  english_pob_choice: God of our fathers
  chosen_spanish: Dios de nuestros padres
  alternatives_spanish:
  - Dios de nuestros antepasados
  lexicon: HALOT
  rationale: La expresión es relacional y de pacto; «padres» conserva el plural masculino del hebreo y sigue de cerca la formulación original.
- source_word: הֲלֹא
  english_pob_choice: are you not
  chosen_spanish: ¿no eres tú
  alternatives_spanish:
  - ¿acaso no eres tú
  - ¿no es así que tú eres
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. En español, «¿no eres tú» mantiene con naturalidad ese valor interrogativo.
- source_word: אַתָּה הוּא אֱלֹהִים בַּשָּׁמַיִם
  english_pob_choice: you not God in heaven
  chosen_spanish: ¿no eres tú Dios en los cielos?
  alternatives_spanish:
  - ¿no eres tú el Dios en los cielos?
  - ¿no eres tú Dios que estás en los cielos?
  lexicon: HALOT
  rationale: La cláusula identifica a Yahvé como Dios en la esfera celestial. «En los cielos» conserva el plural hebreo y fluye mejor en español bíblico contemporáneo que una formulación más explicativa.
- source_word: מוֹשֵׁל
  english_pob_choice: rule
  chosen_spanish: gobiernas
  alternatives_spanish:
  - reinas
  - dominas
  lexicon: HALOT
  rationale: El participio expresa ejercicio soberano continuo. «Gobiernas» comunica ese dominio activo de manera clara y digna en español.
- source_word: מַמְלְכֹות הַגּוֹיִם
  english_pob_choice: the kingdoms of the nations
  chosen_spanish: todos los reinos de las naciones
  alternatives_spanish:
  - los reinos de las naciones
  - todos los reinos de los pueblos
  lexicon: HALOT
  rationale: «Reinos» traduce מַמְלְכוֹת, y «las naciones» conserva el referente colectivo de הַגּוֹיִם. Se mantiene «todos» para reflejar el alcance total del hebreo.
- source_word: וּבְיָדְךָ
  english_pob_choice: In your hand
  chosen_spanish: En tu mano
  alternatives_spanish:
  - Por tu mano
  - En tu poder
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de la mano como sede del poder efectivo, sin abstraerla en exceso.
- source_word: כֹּחַ וּגְבוּרָה
  english_pob_choice: power and might
  chosen_spanish: el poder y la fuerza
  alternatives_spanish:
  - el poder y la valentía
  - la fuerza y el poder
  lexicon: HALOT
  rationale: La pareja léxica expresa capacidad y vigor eficaz. «Poder y fuerza» es una combinación natural en español y mantiene el paralelismo semántico.
- source_word: וְאֵין עִמְּךָ לְהִתְיַצֵּב
  english_pob_choice: there is none who can stand against you
  chosen_spanish: y no hay quien pueda ponerse en tu presencia
  alternatives_spanish:
  - y no hay quien pueda resistirte
  - y no hay quien pueda mantenerse ante ti
  lexicon: HALOT
  rationale: El hebreo indica que nadie puede tomar posición frente a Dios en oposición. «Ponerse en tu presencia» conserva la idea de comparecer/estar de pie ante alguien superior, aunque aquí el matiz es de imposibilidad para resistir.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y él dijo
  lexicon: HALOT
  rationale: La secuencia narrativa pide un pasado simple natural en español; el sujeto queda claro por el contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La forma hebrea del Tetragrámaton está presente de manera directa. La traducción española del proyecto preserva el nombre covenantal como «Yahvé», manteniendo transparencia textual y coherencia terminológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לְהִתְיַצֵּב frente a Dios
  english_pob_reading: there is none who can stand against you
  chosen_spanish_reading: no hay quien pueda ponerse en tu presencia
  alternative_spanish_readings:
  - no hay quien pueda resistirte
  - no hay quien pueda mantenerse ante ti
  rationale: El verbo puede expresar colocarse de pie/comparecer, y en este contexto la afirmación apunta a la imposibilidad de oponerse a Yahvé. La formulación elegida conserva la imagen de comparecer ante un superior sin borrar la fuerza adversativa implícita.
  doctrine_reference: HALOT על יצב; contexto de soberanía divina en 2 Crónicas 20:6
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas; la versión española conserva las decisiones clave ya establecidas: Yahvé para יְהוָה, «Dios de nuestros padres» para la expresión de pacto, y una solución que mantenga la dificultad de לְהִתְיַצֵּב sin reducirla a un mero sinónimo suave.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la convención del proyecto para el nombre divino.
  - Se preservó el plural «cielos» para בַּשָּׁמַיִם, que suena natural y reverente en español bíblico.
  - Se tradujo el paralelismo final con una construcción que conserva la idea de imposibilidad de oposición, evitando una paráfrasis excesiva.
  - Las notas a y b están ancladas en el texto con los marcadores correspondientes.
