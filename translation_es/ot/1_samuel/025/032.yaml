revisions:
- from: 'David le dijo a Abigail[a]: «¡Bendito sea Yahvé, el Dios de Israel, que te envió hoy para recibirme!»'
  to: 'David le dijo a Abigail[a]: «¡Bendito sea Yahvé, el Dios de Israel, que te envió este día[a] a mi encuentro!»'
  rationale: Se corrige el núcleo semántico de לִקְרָאתִי con 'a mi encuentro', que refleja fielmente el sentido de encuentro intencional sin introducir el matiz de 'recibir'. También se ajusta הַיּוֹם הַזֶּה a 'este día' para preservar el tono solemne documentado en el POB inglés, manteniendo la alternativa 'hoy' en nota. Se conserva el resto del texto por su buena fidelidad y calidad.
