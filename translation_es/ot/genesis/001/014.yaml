    reason: lexical_alternative
  - marker: d
    text: O «para señales y para tiempos señalados, y para días y años».
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota sobre מוֹעֲדִים para que aparezca en «tiempos señalados», y se ajusta מְאֹרֹת a «luces» para seguir la decisión principal auditada del POB inglés, dejando «lumbreras» como alternativa en nota. También se distribuyen las notas en los términos correspondientes para mayor claridad sin cambiar el sentido.
