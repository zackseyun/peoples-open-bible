translation:
  language: es
  text: Yahvé habló a Moisés después de la muerte de los dos hijos de Aarón[a], cuando se acercaron ante Yahvé y murieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se acercaron ante Yahvé». El hebreo puede expresarse más formalmente como «en su acercarse ante Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: En la fórmula narrativa de habla divina, español natural y reverente pide 'habló'. Mantiene el acto de comunicación sin añadir contenido que el hebreo no expresa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino como transliteración castellana 'Yahvé', conforme a la pauta del proyecto. No se sustituye por un título como 'SEÑOR', porque el texto fuente usa el Tetragrama de manera directa.
- source_word: אַחֲרֵי מוֹת
  english_pob_choice: after the death
  chosen_spanish: después de la muerte
  alternatives_spanish:
  - después de morir
  - después del fallecimiento
  lexicon: HALOT
  rationale: La construcción idiomática expresa tiempo posterior al evento de morir. 'Después de la muerte' es fiel, claro y no pluraliza indebidamente el sustantivo.
- source_word: שְׁנֵי בְּנֵי אַהֲרֹן
  english_pob_choice: Aaron’s two sons
  chosen_spanish: los dos hijos de Aarón
  alternatives_spanish:
  - los dos hijos de Aarón
  - los hijos de Aarón, los dos
  lexicon: HALOT
  rationale: La estructura posesiva hebrea se vierte de manera natural en español con 'los dos hijos de Aarón', conservando el numeral y la relación filial sin forzar el orden del original.
- source_word: בְּקָרְבָתָם
  english_pob_choice: when they came near
  chosen_spanish: cuando se acercaron
  alternatives_spanish:
  - en su acercarse
  - cuando se presentaron
  lexicon: HALOT
  rationale: El valor temporal del prefijo con infinitivo constructo se entiende bien como 'cuando se acercaron'. 'Acercarse' mantiene el movimiento cultual sin volverlo más explícito de lo que el hebreo permite.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: '''Ante Yahvé'' comunica la preposición espacial/cultual con solemnidad y fluidez en español. Evita la repetición de una fórmula más pesada, pero preserva la referencia a la presencia divina.'
- source_word: וַיָּמֻתוּ
  english_pob_choice: and died
  chosen_spanish: y murieron
  alternatives_spanish:
  - y murieron
  - y perecieron
  lexicon: HALOT
  rationale: El wayyiqtol concluye la secuencia narrativa con una forma breve. 'Murieron' reproduce la tersura del hebreo y no introduce matices interpretativos adicionales.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El audit trail inglés ya decidió no ocultar el Tetragrama bajo una sustitución titulada. En español, 'Yahvé' es la forma coherente con la política terminológica del proyecto y conserva el nombre propio divino revelado en el texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El testimonio inglés permanece en alta concordancia y sin revisiones aplicadas; este borrador sigue la lectura estable del pasaje, manteniendo la estructura narrativa, el nombre divino sin sustitución y la alternativa lexical para בְּקָרְבָתָם.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con la terminología del proyecto para el Tetragrama.
  - '''Ante Yahvé'' conserva la referencia cultual de לִפְנֵי יְהוָה sin recurrir a una paráfrasis amplia.'
  - La nota al pie se ancla en 'se acercaron' para preservar la alternativa formal del hebreo.
  - No se introdujo lenguaje doctrinal o explicativo ajeno al versículo.
