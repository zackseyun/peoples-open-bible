translation:
  language: es
  text: Chelub, el hermano de Shuhá, engendró a Mehir; él fue padre[a] de Eshtón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antepasado/fundador de Eshtón». En listas genealógicas, «padre de» a veces designa a un fundador de clan o asentamiento, no necesariamente a un padre biológico inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/כְל֥וּב
  english_pob_choice: Chelub
  chosen_spanish: Chelub
  alternatives_spanish:
  - Kelub
  lexicon: HALOT
  rationale: Es nombre propio; se translitera, no se traduce. Se mantiene la forma «Chelub» como en el inglés POB para conservar consistencia onomástica, con una posible variante «Kelub» como alternativa de transliteración.
- source_word: אֲחִֽי שׁוּחָ֖ה
  english_pob_choice: the brother of Shuhah
  chosen_spanish: hermano de Shuhá
  alternatives_spanish:
  - el hermano de Shuhá
  - Shuhá es su hermano
  lexicon: HALOT
  rationale: La construcción de estado constructo con אח se expresa de forma natural en español con «hermano de». Se omite el artículo inicial porque el nombre propio ya delimita la relación y la frase resultante es más fluida en el contexto genealógico.
- source_word: הוֹלִ֣יד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En listas genealógicas, el hiphil de ילד suele indicar engendrar/ser padre de descendencia. «Engendró» conserva esa fuerza genealógica y es una solución más directa que una perífrasis explicativa.
- source_word: מְחִ֑יר
  english_pob_choice: Mehir
  chosen_spanish: Mehir
  alternatives_spanish:
  - Mejir
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva «Mehir» por consistencia y transparencia, sin adaptar la vocalización a una forma hispanizada no atestiguada en el material base.
- source_word: ה֖וּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: El pronombre independiente retoma el sujeto y se vierte con «él» para mantener la estructura anafórica explícita en español.
- source_word: אֲבִ֥י
  english_pob_choice: the father of
  chosen_spanish: padre de
  alternatives_spanish:
  - antepasado de
  - fundador de
  lexicon: HALOT
  rationale: En genealogías, אב puede indicar paternidad inmediata o una relación ancestral/fundacional. Se conserva «padre de» como equivalente base del inglés POB y del hebreo, dejando abierta la amplitud genealógica sin explicitarla en el texto principal.
- source_word: אֶשְׁתּֽוֹן
  english_pob_choice: Eshton
  chosen_spanish: Eshtón
  alternatives_spanish:
  - Eshton
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se opta por «Eshtón» para una lectura española más natural, preservando la secuencia consonántica y el acento prosódico sin alterar la identificación del nombre.
theological_decisions:
- issue: Valor genealógico de «padre de» en listas familiares
  english_pob_reading: Or 'ancestor/founder of Eshton.' In genealogical lists, 'father of' can sometimes denote a clan or settlement founder rather than an immediate biological father.
  chosen_spanish_reading: «padre de» se mantiene en el texto principal, con la posibilidad implícita de ‘antepasado/fundador’ señalada en nota.
  alternative_spanish_readings:
  - antepasado de Eshtón
  - fundador de Eshtón
  rationale: El hebreo y el POB inglés permiten que אב vaya más allá de la paternidad biológica inmediata en contextos genealógicos. La redacción principal conserva la forma más cercana al texto, mientras la nota evita cerrar indebidamente la referencia.
  doctrine_reference: Uso genealógico de אב en listas bíblicas; cf. Génesis 4–5 y paralelos de cronísticas.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el POB inglés; la presente propuesta sigue la lectura estable y el acuerdo alto del control cruzado, manteniendo la misma decisión genealógica de base con adaptación natural al español.
  spanish_consistency_notes:
  - Se conserva la transliteración de nombres propios de forma consistente y sin traducción interpretativa.
  - «Engendró» mantiene el registro genealógico breve y directo, acorde con listas cronísticas.
  - La nota de «padre de» preserva la tensión lexical documentada entre paternidad biológica y sentido ancestral/fundacional.
