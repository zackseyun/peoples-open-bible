translation:
  language: es
  text: Y el lobo morará con el cordero, y el leopardo se echará con el cabrito[a]; y el becerro, el león joven[b] y el becerro cebado estarán juntos, y un niño pequeño[d] los guiará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cabrito» puede expresarse como «cría de cabra».
    reason: lexical_alternative
  - marker: b
    text: O «cachorro de león».
    reason: lexical_alternative
  - marker: d
    text: O «un niño chico los guiará».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגָר
  english_pob_choice: will dwell
  chosen_spanish: morará
  alternatives_spanish:
  - habitará
  - morará allí
  - sojornará
  lexicon: HALOT
  rationale: גור en qal expresa morar/sojornar. «Morará» conserva la idea de convivencia pacífica sin volverla transitoria como «sojornará», y suena natural en español bíblico-digno.
- source_word: זְאֵב
  english_pob_choice: wolf
  chosen_spanish: lobo
  alternatives_spanish:
  - lobo gris
  lexicon: HALOT
  rationale: Término zoológico estándar y directo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto a
  - al lado de
  lexicon: HALOT
  rationale: La preposición indica asociación/proximidad; «con» es la opción más natural y fiel en español.
- source_word: כֶּבֶשׂ
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - oveja joven
  - borrego
  lexicon: HALOT
  rationale: En este par poético, «cordero» expresa mejor la presa vulnerable y es idiomático en español bíblico actual.
- source_word: וְנָמֵר
  english_pob_choice: leopard
  chosen_spanish: leopardo
  alternatives_spanish:
  - pantera
  lexicon: HALOT
  rationale: Nombre animal estándar.
- source_word: גְּדִי
  english_pob_choice: young goat
  chosen_spanish: cabrito
  alternatives_spanish:
  - chivo joven
  - cría de cabra
  lexicon: HALOT
  rationale: «Cabrito» comunica bien la edad juvenil del animal y es claro para lectores modernos; conserva la fuerza pastoral sin ambigüedad.
- source_word: יִרְבָּץ
  english_pob_choice: will lie down
  chosen_spanish: se echará
  alternatives_spanish:
  - se acostará
  - se recostará
  - reposará
  lexicon: HALOT
  rationale: רבץ se usa de animales echados o reposando. «Se echará» transmite el gesto de descansar de forma natural en español; no implica agresividad como otras opciones.
- source_word: וְעֵגֶל
  english_pob_choice: the calf
  chosen_spanish: el becerro
  alternatives_spanish:
  - el ternero
  - el novillo joven
  lexicon: HALOT
  rationale: «Becerro» cubre bien el joven bovino y encaja con el paralelismo poético del verso.
- source_word: וּכְפִיר
  english_pob_choice: the young lion
  chosen_spanish: el cachorro de león
  alternatives_spanish:
  - el leoncillo
  - el león joven
  lexicon: HALOT
  rationale: כפיר designa un león joven. «Cachorro de león» mantiene la imagen de juventud y el tono poético; evita la posible ambigüedad de «león joven».
- source_word: וּמְרִיא
  english_pob_choice: the fattened calf
  chosen_spanish: el novillo gordo
  alternatives_spanish:
  - el becerro gordo
  - el animal cebado
  - el ternero cebado
  lexicon: HALOT
  rationale: מְרִיא denota un animal cebado, bien alimentado. «Novillo gordo» da una imagen natural en español y conserva el matiz de abundancia; se evita suavizarlo a una mera generalidad.
- source_word: יַחְדָּו
  english_pob_choice: will be together
  chosen_spanish: estarán juntos
  alternatives_spanish:
  - juntos estarán
  - vivirán juntos
  lexicon: HALOT
  rationale: יַחְדָּו expresa simultaneidad/compañía. «Estarán juntos» es idiomático y conserva la idea de coexistencia armoniosa.
- source_word: וְנַעַר קָטֹן
  english_pob_choice: a little boy
  chosen_spanish: un niño pequeño
  alternatives_spanish:
  - un muchacho pequeño
  - un niño de poca edad
  - un joven pequeño
  lexicon: HALOT
  rationale: נַעַר puede abarcar niño/joven; קָטֹן añade pequeñez. «Niño pequeño» preserva la imagen de un guiador joven y es clara para el lector español.
- source_word: נֹהֵג
  english_pob_choice: will lead
  chosen_spanish: los guiará
  alternatives_spanish:
  - los conducirá
  - los llevará
  - los dirigirá
  lexicon: HALOT
  rationale: נהג puede significar guiar/dirigir/arrear. «Guiará» evita una nota demasiado dura de «arrear» y encaja con el tono pacífico del contexto.
- source_word: בָּם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - entre ellos
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere a los animales mencionados. En español, el objeto directo masculino plural «los» es natural con «guiará».
theological_decisions:
- issue: Naturaleza de la imagen de paz entre animales
  english_pob_reading: Render the animal pairings straightforwardly as prophetic-poetic imagery without interpreting them in the translation as either purely literal zoological transformation or merely symbolic social reconciliation.
  chosen_spanish_reading: Presentar las parejas animales de manera directa como imagen profética-poética, sin resolver en la traducción si se trata de una transformación zoológica literal o de un símbolo de paz social humana.
  alternative_spanish_readings:
  - Interpretación totalmente literal de paz entre animales
  - Interpretación enteramente metafórica de paz política humana
  rationale: El hebreo ofrece imágenes concretas de animales. La traducción debe conservar esa concreción y dejar abierta la cuestión interpretativa, en lugar de decidirla por adelantado.
  doctrine_reference: Preservar la tensión teológica del texto profético sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'Se siguió el pasaje base sin revisiones aplicadas (applied_revisions: []). El cotejo más reciente indica acuerdo alto y sin cambios necesarios; por tanto, el borrador español conserva el sentido del texto hebreo y la solución auditada en inglés, ajustada a un español natural y de registro bíblico contemporáneo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto de la colección solo cuando aparezca el Nombre divino; en este versículo no aplica.
  - Se evitó «Cristo/Mesías» porque el verso no contiene lenguaje mesiánico explícito nominal.
  - Se preservó la imaginería animal concreta sin convertirla en alegoría explícita.
  - «Morará» y «se echará» equilibran fidelidad semántica y naturalidad en español.
  - Se usó «novillo gordo» para mantener el sentido de animal cebado sin perder fluidez; la nota explica las alternativas.
  - Los referentes plurales se expresaron con concordancia masculina plural («los») por el grupo de animales mencionado.
