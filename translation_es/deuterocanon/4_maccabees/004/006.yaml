  text: with the accursed Simon and a very large force[a]. After coming forward, he said that he had come by the king’s commands[b], in order to take the private funds of the treasury.
  footnotes:
  - marker: a
    text: Or 'a very large army' or 'a most formidable force'; the Greek literally says 'a very heavy force/army,' using 'heavy' metaphorically for oppressive or formidable military strength.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the private funds of the treasury' likely refers to monies regarded as private or deposited funds within the treasury, not necessarily the whole treasury itself.
    reason: cultural_note
