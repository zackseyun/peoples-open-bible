translation:
  language: es
  text: Tú convocaste mis terrores de todas partes, como en un día señalado[a], y en el día de la ira de Yahvé no hubo sobreviviente ni remanente. A los que yo crié y hice crecer, mi enemigo los destruyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como en un día de fiesta’ / ‘como en un día de festival’; el hebreo compara la reunión de terrores con la congregación de personas en una ocasión festiva señalada.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְרָא
  english_pob_choice: You summoned
  chosen_spanish: Tú convocaste
  alternatives_spanish:
  - Tú llamaste
  - Tú convocaste a
  lexicon: HALOT
  rationale: El qal imperfecto 2ms de קרא, dirigido a Yahvé en discurso directo, admite ‘llamar’ o ‘convocar’. ‘Convocaste’ conserva la fuerza de reunir/atraer algo hacia un encuentro, más intensa que un simple ‘llamaste’.
- source_word: כְיוֹם מוֹעֵד
  english_pob_choice: as on an appointed day
  chosen_spanish: como en un día señalado
  alternatives_spanish:
  - como en un día de fiesta
  - como en una fecha señalada
  lexicon: HALOT
  rationale: מוֹעֵד puede ser ‘tiempo señalado’ y también conllevar la idea de fiesta/asamblea. ‘Día señalado’ mantiene la amplitud léxica y deja la ironía del paralelo, sin reducirlo únicamente a ‘fiesta’.
- source_word: מְגוּרַי
  english_pob_choice: my terrors
  chosen_spanish: mis terrores
  alternatives_spanish:
  - mis temores
  - los que me aterran
  lexicon: HALOT
  rationale: En este contexto, la lectura nominal ‘terrores’ encaja con el lenguaje de juicio y con la imagen de fuerzas reunidas alrededor del hablante. Se preserva la ambigüedad discutida en la nota.
- source_word: מִסָּבִיב
  english_pob_choice: from every side
  chosen_spanish: desde todos lados
  alternatives_spanish:
  - por todos lados
  - de alrededor
  lexicon: HALOT
  rationale: La expresión espacial idiomática comunica cerco y acometida múltiple. ‘Desde todos lados’ es natural en español y mantiene el valor idiomático.
- source_word: בְּיוֹם אַף יְהוָה
  english_pob_choice: on the day of Yahweh’s anger
  chosen_spanish: en el día de la ira de Yahvé
  alternatives_spanish:
  - en el día del furor de Yahvé
  - en el día de la ira de Yahvé
  lexicon: HALOT
  rationale: אַף aquí es ‘ira’. Se mantiene el nombre divino ‘Yahvé’ según la convención del proyecto, evitando el reemplazo por una máscara litúrgica.
- source_word: פָּלִיט וְשָׂרִיד
  english_pob_choice: survivor or remnant
  chosen_spanish: sobreviviente ni remanente
  alternatives_spanish:
  - sobreviviente ni resto
  - fugitivo ni remanente
  lexicon: HALOT
  rationale: La pareja nominal intensifica la total ausencia de escape. ‘Sobreviviente’ y ‘remanente’ preservan la distinción formal de los dos sustantivos y reflejan la revisión inglesa más formal.
- source_word: טִפַּחְתִּי
  english_pob_choice: I nurtured
  chosen_spanish: yo crié
  alternatives_spanish:
  - yo nutrí
  - yo cuidé
  lexicon: HALOT
  rationale: El verbo transmite crianza/tierno cuidado. ‘Crié’ es claro y natural en español; capta el sentido de rearing sin perder la relación afectiva implícita.
- source_word: וְרִבִּיתִי
  english_pob_choice: and raised
  chosen_spanish: y eduqué
  alternatives_spanish:
  - y levanté
  - y hice crecer
  lexicon: HALOT
  rationale: En contexto de hijos, el valor es de criar/levantar en vida y desarrollo. ‘Eduqué’ amplía el campo de formación y cuidado, emparejándose con ‘crié’ para evitar una redundancia plana.
- source_word: אֹיְבִי
  english_pob_choice: my enemy
  chosen_spanish: mi enemigo
  alternatives_spanish:
  - el enemigo
  - mi adversario
  lexicon: HALOT
  rationale: El sufijo de primera persona singular pide ‘mi enemigo’. Se conserva el singular hebreo, aunque pueda funcionar colectivamente.
- source_word: כִלָּם
  english_pob_choice: destroyed them
  chosen_spanish: los destruyó
  alternatives_spanish:
  - los consumió
  - los acabó
  lexicon: HALOT
  rationale: כלה en piel expresa acabar, consumir o destruir. ‘Los destruyó’ comunica con claridad la gravedad del acto sin sobrecargar el verbo con una interpretación específica.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. La política del proyecto pide ‘Yahvé’ en el texto principal, conservando el nombre pactual en lugar de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de מוֹעֵד en la comparación
  english_pob_reading: appointed day / feast day
  chosen_spanish_reading: día señalado
  alternative_spanish_readings:
  - día de fiesta
  - día festivo
  rationale: Se deja abierta la doble posibilidad entre ‘tiempo señalado’ y ‘fiesta/convocación’, como en el audit trail inglés. ‘Día señalado’ evita fijar innecesariamente una sola lectura.
  doctrine_reference: HALOT lexical range for מוֹעֵד
- issue: Pareja פָּלִיט וְשָׂרִיד
  english_pob_reading: survivor or remnant
  chosen_spanish_reading: sobreviviente ni remanente
  alternative_spanish_readings:
  - sobreviviente ni resto
  - fugitivo ni remanente
  rationale: Se mantiene la tensión de dos términos cercanos pero no idénticos, sin colapsarlos en una sola idea. ‘Remanente’ sigue la revisión inglesa más formal.
  doctrine_reference: HALOT lexical pair פָּלִיט / שָׂרִיד
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió ‘remnant’ sobre ‘escapee’ para reflejar con mayor formalidad la pareja פָּלִיט וְשָׂרִיד. La versión española refleja esa preferencia con ‘sobreviviente ni remanente’. También se preservó la nota sobre la ambigüedad de מְגוּרַי, cuya lectura puede abarcar ‘mis terrores’ o, en otra comprensión, ‘los que me aterran’.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ para el Tetragrama conforme al estándar del proyecto.
  - Se prefirió ‘Mesías’ no aplica aquí; no se introdujo terminología eclesiástica ajena al hebreo.
  - ‘Sobreviviente ni remanente’ mantiene la pareja nominal del hebreo y la revisión inglesa.
  - La puntuación refleja un solo enunciado poético con cadencia natural en español, sin añadir material interpretativo no sustentado por el texto.
