translation:
  language: es
  text: Pero si no le alcanza[a] para dos tórtolas o dos pichones de paloma, traerá como su ofrenda, por el pecado que cometió, la décima parte de un efa de flor de harina, como ofrenda por el pecado. No pondrá sobre ella aceite ni pondrá sobre ella incienso, porque es una ofrenda por el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «si su mano no alcanza»; es un modismo hebreo que significa que no tiene medios suficientes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַשִּׂיג יָדוֹ
  english_pob_choice: his means are not sufficient
  chosen_spanish: no le alcanza
  alternatives_spanish:
  - no le bastan sus recursos
  - sus medios no son suficientes
  - no puede costearlo
  lexicon: HALOT
  rationale: La idiomática hebrea de «su mano no alcanza» expresa insuficiencia económica. En español, «no le alcanza» comunica de forma natural la falta de recursos sin perder el sentido legal del texto.
- source_word: תֹרִים
  english_pob_choice: turtledoves
  chosen_spanish: tórtolas
  alternatives_spanish:
  - palomas torcaces
  - tórtolas comunes
  - tórtolas
  lexicon: HALOT
  rationale: En contexto sacrificial, el término designa tórtolas, no simplemente palomas. «Tórtolas» conserva la precisión zoológica y es inteligible en español bíblico.
- source_word: בְנֵי יוֹנָה
  english_pob_choice: young pigeons
  chosen_spanish: pichones
  alternatives_spanish:
  - pichones de paloma
  - palominos
  - pichones jóvenes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para aves jóvenes. «Pichones» reproduce el sentido de juventud de manera natural en español; el genitivo «de paloma» queda implícito en el paralelo con tórtolas.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: «Ofrenda» refleja bien el término amplio de lo que se presenta a Dios, y en este contexto funciona mejor que «sacrificio» por tratarse aquí de la ofrenda sustitutiva de harina.
- source_word: אֲשֶׁר חָטָא
  english_pob_choice: for the sin that he has committed
  chosen_spanish: por el pecado que cometió
  alternatives_spanish:
  - por el pecado que ha cometido
  - por lo que pecó
  - por el pecado cometido
  lexicon: HALOT
  rationale: El hebreo vincula la ofrenda con la falta concreta. «Por el pecado que cometió» mantiene la relación causal y el tono jurídico-ritual sin sobreexplicar.
- source_word: עֲשִׂירִת הָאֵפָה
  english_pob_choice: a tenth of an ephah
  chosen_spanish: la décima parte de un efa
  alternatives_spanish:
  - un décimo de efa
  - la décima de un efa
  lexicon: HALOT
  rationale: Se conserva la medida antigua «efa» y se vierte la forma fraccionaria de modo claro en español. «La décima parte» evita ambigüedad y suena natural.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es la equivalencia tradicional y precisa para harina finamente molida en ofrendas. Mantiene la textura cultual del texto mejor que una paráfrasis más genérica.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - para ofrenda por el pecado
  - como sacrificio por el pecado
  - para expiación
  lexicon: HALOT
  rationale: Aquí חַטָּאת tiene valor cultual y puede referirse a la ofrenda misma. Se traduce «ofrenda por el pecado» para conservar el vínculo ritual sin forzar una categoría posterior.
- source_word: לֹא יָשִׂים עָלֶיהָ שֶׁמֶן
  english_pob_choice: He shall put no oil on it
  chosen_spanish: No pondrá sobre ella aceite
  alternatives_spanish:
  - No le pondrá aceite
  - No colocará aceite sobre ella
  lexicon: HALOT
  rationale: Se mantiene la prohibición directa del hebreo. «Sobre ella» respeta el antecedente femenino implícito en la ofrenda de harina, y «aceite» es el término usual.
- source_word: וְלֹא יִתֵּן עָלֶיהָ לְבֹנָה
  english_pob_choice: and place no frankincense on it
  chosen_spanish: ni le echará incienso
  alternatives_spanish:
  - ni pondrá sobre ella incienso
  - ni le colocará incienso
  lexicon: HALOT
  rationale: לְבֹנָה es «incienso» en sentido de resina aromática. «Echará» conserva el paralelismo verbal del español y evita repetir «poner».
- source_word: כִּי חַטָּאת הִיא
  english_pob_choice: because it is a sin offering
  chosen_spanish: porque es una ofrenda por el pecado
  alternatives_spanish:
  - pues es una ofrenda por el pecado
  - porque es sacrificio por el pecado
  lexicon: HALOT
  rationale: La cláusula final explica por qué no se añaden aceite ni incienso. Se mantiene el valor cultual de חַטָּאת como «ofrenda por el pecado» para evitar reducirlo solo a la idea abstracta de pecado.
theological_decisions:
- issue: Sentido cultual de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - sacrificio por el pecado
  - ofrenda expiatoria
  rationale: En este contexto la palabra no designa solo la culpa, sino la pieza sacrificial prescrita. «Ofrenda por el pecado» conserva la función ritual y evita cargar el texto con lenguaje doctrinal ajeno al pasaje.
  doctrine_reference: Translation philosophy §1, §5
- issue: Concesión legal para quien carece de recursos
  english_pob_reading: his means are not sufficient
  chosen_spanish_reading: no le alcanza
  alternative_spanish_readings:
  - no puede costearlo
  - sus recursos no son suficientes
  rationale: El versículo establece una disposición para el pobre dentro de la ley sacrificial. «No le alcanza» comunica con claridad la insuficiencia económica y mantiene el carácter normativo del mandato.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión sigue de cerca la lectura inglesa auditada y el hebreo base, manteniendo la concesión económica, las medidas sacrificiales y la prohibición de aceite e incienso. Se adoptó una equivalencia española más natural para el modismo de recursos insuficientes y para las aves sacrificiales, sin perder precisión cultual.
  spanish_consistency_notes:
  - Se conserva «Yahvé» cuando corresponda al nombre divino en el proyecto, aunque este versículo no lo contiene.
  - Se mantuvo «ofrenda por el pecado» para חַטָּאת en coherencia con el léxico cultual del POB.
  - «Flor de harina» se usa como término tradicional y claro para סֹלֶת.
  - Se eligió «tórtolas» y «pichones» para reflejar la precisión zoológica del texto hebreo.
  - La nota [a] marca el modismo hebreo sin desplazar el sentido principal del versículo.
