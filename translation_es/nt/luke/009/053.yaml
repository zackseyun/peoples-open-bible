translation:
  language: es
  text: Y no lo recibieron[a], porque su rostro iba hacia Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no lo acogieron''. El verbo puede significar recibir, aceptar o dar acogida; aquí probablemente alude al rechazo de hospitalidad.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: ''su rostro iba a Jerusalén''. El griego también puede expresarse como ''su rostro estaba orientado hacia Jerusalén''; es un giro que indica dirección fija o resolución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐδέξαντο αὐτόν
  english_pob_choice: did not receive him
  chosen_spanish: no lo recibieron
  alternatives_spanish:
  - no lo acogieron
  - no lo aceptaron
  - no le dieron hospedaje
  lexicon: BDAG
  rationale: δέχομαι puede significar recibir, aceptar o dar acogida. En este contexto narrativo de viaje, 'recibir' conserva el núcleo léxico y deja abierta la implicación de rechazo de hospitalidad o bienvenida, como en la auditoría inglesa.
- source_word: τὸ πρόσωπον αὐτοῦ
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  lexicon: BDAG
  rationale: πρόσωπον es literalmente 'rostro/cara'. En español, 'rostro' es más digno y natural en un registro bíblico sin perder la imagen corporal concreta del texto.
- source_word: ἦν πορευόμενον
  english_pob_choice: was going toward
  chosen_spanish: iba hacia
  alternatives_spanish:
  - estaba yendo hacia
  - se dirigía hacia
  lexicon: BDAG
  rationale: La construcción perifrástica comunica movimiento o viaje. 'Iba hacia' refleja de forma natural el aspecto progresivo sin añadir una interpretación excesiva de determinación.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: toward Jerusalem
  chosen_spanish: hacia Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - rumbo a Jerusalén
  lexicon: BDAG
  rationale: εἰς marca dirección. 'Hacia' preserva la fuerza direccional y funciona bien con el verbo de movimiento en español.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: ὅτι introduce la razón del rechazo. 'Porque' es el conector causal más claro y directo en español moderno.
theological_decisions:
- issue: Fuerza idiomática de 'su rostro iba hacia Jerusalén'
  english_pob_reading: The phrase is kept as a directional idiom without importing additional theological explanation into the main text.
  chosen_spanish_reading: Se conserva la imagen concreta del rostro orientado en dirección a Jerusalén, sin convertirla en una paráfrasis interpretativa.
  alternative_spanish_readings:
  - se dirigía a Jerusalén
  - estaba resuelto a ir a Jerusalén
  rationale: En Lucas, la fórmula mantiene valor narrativo y alusivo dentro del viaje hacia Jerusalén. El español elegido preserva esa tensión sin sobreexplicar ni borrar la imagen del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción incorpora la revisión auditada del inglés POB que prefirió reflejar más directamente el participio πορευόμενον ('iba yendo / iba hacia') en lugar de importar una formulación más interpretativa. Por eso el español evita 'estaba resuelto' en el texto principal y reserva la fuerza idiomática para la nota.
  spanish_consistency_notes:
  - Se mantiene 'recibir' para δέχομαι, en lugar de sustituirlo por 'aceptar' en el texto principal.
  - '''Rostro'' conserva el lenguaje corporal del original y evita neutralizar el giro semítico.'
  - '''Hacia'' sostiene el valor direccional de εἰς sin añadir más contenido del que el verso expresa.'
  - El tono es sobrio y publicable, con puntuación castellana estándar.
