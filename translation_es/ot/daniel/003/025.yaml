revisions:
- from: 'Él respondió y dijo[a]: «¡Mira! Veo cuatro hombres desatados, caminando en medio del fuego, y no hay daño en ellos; y el aspecto del cuarto se parece al de un hijo de los dioses».'
  to: 'Él respondió y dijo[a]: «¡Mira! Veo cuatro hombres desatados, caminando en medio del fuego, y no hay daño en ellos; y el aspecto del cuarto es como un hijo de los dioses».'
  rationale: 'Se ajusta la última cláusula a una comparación más directa y más cercana al arameo y al expediente POB: «el aspecto del cuarto es como un hijo de los dioses». Esto evita la reestructuración innecesaria de «se parece al de» y preserva mejor la cautela fenomenológica del rey. El resto del versículo puede mantenerse.'
