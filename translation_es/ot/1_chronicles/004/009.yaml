  glossary_alignment: No hay conflictos con la terminología de proyecto. El nombre propio Jabez está bien; no hay términos teológicos sensibles aquí. Las notas al pie son coherentes con la justificación léxica inglesa, aunque conviene ajustar levemente la redacción para español natural.
