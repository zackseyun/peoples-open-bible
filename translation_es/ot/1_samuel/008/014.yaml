translation:
  language: es
  text: Tomará sus campos, sus viñas y sus mejores olivares[a], y los dará a sus siervos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'olivos' o 'plantaciones de olivos'; el hebreo probablemente se refiere a plantaciones de olivos como propiedad agrícola.
    reason: lexical_alternative
  - marker: b
    text: O 'a sus esclavos'; la palabra hebrea puede denotar tanto siervos como esclavos según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂדֹתֵיכֶם
  english_pob_choice: your fields
  chosen_spanish: sus campos
  alternatives_spanish:
  - sus tierras de cultivo
  - sus campos de cultivo
  lexicon: HALOT
  rationale: שָׂדֶה designa un campo o extensión cultivada. 'Campos' es el equivalente más directo y natural en español dentro de una lista de propiedades agrícolas.
- source_word: כַּרְמֵיכֶם
  english_pob_choice: your vineyards
  chosen_spanish: sus viñas
  alternatives_spanish:
  - sus viñedos
  lexicon: HALOT
  rationale: כֶּרֶם se refiere normalmente a una plantación de vid. 'Viñas' es breve, claro y fiel al valor agrícola del término; 'viñedos' también sería posible, pero 'viñas' mantiene mejor la serie compacta del hebreo.
- source_word: זֵיתֵיכֶם
  english_pob_choice: your best olive groves
  chosen_spanish: sus mejores olivares
  alternatives_spanish:
  - sus olivos
  - sus plantaciones de olivos
  - sus olivares
  lexicon: HALOT
  rationale: זַיִת puede aludir a olivos como árboles o a una plantación de olivos. En paralelo con campos y viñas, el sentido es de propiedades productivas, por eso 'olivares' funciona mejor que 'olivos' aislados. 'Mejores' conserva הַטּוֹבִים como los más valiosos o escogidos.
- source_word: הַטּוֹבִים
  english_pob_choice: best
  chosen_spanish: mejores
  alternatives_spanish:
  - buenos
  - más finos
  - escogidos
  lexicon: HALOT
  rationale: טוֹב aquí no describe solo cualidad moral, sino el valor o calidad superior de las posesiones. 'Mejores' comunica de forma natural que se trata de las porciones más deseables.
- source_word: יִקָּח
  english_pob_choice: will take
  chosen_spanish: tomará
  alternatives_spanish:
  - tomará por la fuerza
  - se apoderará de
  lexicon: HALOT
  rationale: לָקַח es simplemente 'tomar'. Aunque el contexto es coercitivo, 'tomará' preserva la forma verbal básica del hebreo y deja que el contexto de la monarquía explique la violencia implícita.
- source_word: וְנָתַן
  english_pob_choice: and give
  chosen_spanish: y los dará
  alternatives_spanish:
  - y los entregará
  - y los asignará
  lexicon: HALOT
  rationale: נָתַן es el verbo común 'dar'. En español, 'los dará' mantiene la sencillez y el ritmo del anuncio, sin introducir una burocratización que el hebreo no exige.
- source_word: לַעֲבָדָיו
  english_pob_choice: to his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus servidores
  - a sus esclavos
  lexicon: HALOT
  rationale: עֶבֶד puede significar 'siervo' o 'esclavo' según el contexto. Aquí la referencia apunta a los retenedores/funcionarios del rey; 'siervos' es más amplio y lector-friendly en español que 'esclavos', que podría sugerir bondage físico como foco principal.
theological_decisions:
- issue: Carácter de la confiscación real
  english_pob_reading: He will take... and give them to his servants.
  chosen_spanish_reading: Tomará... y los dará a sus siervos.
  alternative_spanish_readings:
  - Se apoderará de... y los entregará a sus siervos.
  - Tomará... y se los asignará a sus siervos.
  rationale: El versículo describe la advertencia de una apropiación real de bienes agrícolas. La traducción conserva el verbo simple 'tomará' / 'dará' para respetar el hebreo, sin suavizar la fuerza opresiva que el contexto narrativo ya proporciona.
  doctrine_reference: 1 Samuel 8:11–18
- issue: Sentido de עֲבָדִים en el entorno real
  english_pob_reading: to his servants
  chosen_spanish_reading: a sus siervos
  alternative_spanish_readings:
  - a sus esclavos
  - a sus servidores
  rationale: La POB inglesa retiene la ambigüedad contextual entre 'servants' y 'slaves'. En español, 'siervos' preserva esa amplitud sin fijar innecesariamente una relación de esclavitud que aquí no es el punto principal; a la vez, no elimina la posibilidad de subordinación fuerte.
  doctrine_reference: HALOT / uso contextual de עֶבֶד
translation_notes:
  revision_awareness: 'Se siguió el sentido confirmado en la revisión más reciente sin cambios sustanciales: el versículo mantiene la lista de propiedades agrícolas y la entrega de los bienes a los retenedores del rey. No se detectaron revisiones textuales que exigieran alterar el alineamiento con el inglés auditado.'
  spanish_consistency_notes:
  - 'Se mantuvo un registro léxico coherente con la política POB: ''Yahvé'' no aparece en este versículo, por lo que no se requiere decisión al respecto.'
  - Se prefirió 'siervos' para עֲבָדָיו por consistencia con el uso contextual del término en una corte real, pero se documentó la alternativa 'esclavos'.
  - '''Olivares'' se usó como equivalente de propiedad agrícola, siguiendo la lógica del inglés POB ''olive groves''.'
