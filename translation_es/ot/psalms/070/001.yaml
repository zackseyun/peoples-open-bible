revisions:
- from: Para el director del coro[a]. De David. Para hacer recordar.
  to: Para el director del coro[a]. De David. Para el recuerdo.
  rationale: Se reemplaza «Para hacer recordar» por «Para el recuerdo» para reflejar mejor la decisión auditada «For remembrance», conservar la ambigüedad sobre quién recuerda o qué se recuerda, y mejorar la naturalidad y dignidad del español en una superscripción de salmo. Se mantienen sin cambio «Para el director del coro» y «De David», que son fieles al hebreo y a la rationale documentada.
