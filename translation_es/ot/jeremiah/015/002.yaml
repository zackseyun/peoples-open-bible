translation:
  language: es
  text: 'Y sucederá[a] que, cuando te digan: «¿Adónde iremos?», les dirás: «Así dice Yahvé: Los que son para la muerte, a la muerte; los que son para la espada, a la espada; los que son para la hambruna, a la hambruna; y los que son para el cautiverio[b], al cautiverio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y será». La construcción hebrea introduce una circunstancia futura con tono profético.'
    reason: alternative_reading
  - marker: b
    text: 'O: «exilio». «Cautiverio» reproduce mejor el paralelismo breve del hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula profética introductoria se mantiene con un giro natural en español. «Sucederá» preserva el valor de anuncio de una circunstancia futura sin perder el registro solemne.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  - que
  lexicon: HALOT
  rationale: En esta construcción, la partícula introduce la circunstancia esperada; «cuando» comunica mejor el valor temporal que un condicional.
- source_word: יֹאמְרוּ אֵלֶיךָ
  english_pob_choice: they say to you
  chosen_spanish: te digan
  alternatives_spanish:
  - te dicen
  - te hablan
  lexicon: HALOT
  rationale: El verbo básico es «decir», y el contexto lo hace interrogativo. En español, «te digan» conserva la relación directa sin añadir información no explicitada.
- source_word: אָנָה נֵצֵא
  english_pob_choice: Where shall we go?
  chosen_spanish: ¿Adónde iremos?
  alternatives_spanish:
  - ¿A dónde saldremos?
  - ¿Adónde saldremos?
  lexicon: HALOT
  rationale: El hebreo pregunta por destino, no exige reproducir literalmente «salir» en español. «¿Adónde iremos?» sigue de cerca el sentido y la revisión auditada del inglés POB, evitando una expresión forzada.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: then you shall say to them
  chosen_spanish: les dirás
  alternatives_spanish:
  - entonces les dirás
  - y les dirás
  lexicon: HALOT
  rationale: El enlace consecutivo queda implícito en español. «Les dirás» es suficiente y fluido, manteniendo el mandato profético.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de mensajero profético con el nombre divino explícito, conforme al criterio del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se usa la transliteración del Nombre divino en la forma de uso estable del proyecto en español, en vez de sustituirla por un título.
- source_word: לַמָּוֶת
  english_pob_choice: for death / to death
  chosen_spanish: para muerte
  alternatives_spanish:
  - para la muerte
  - a muerte
  lexicon: HALOT
  rationale: La frase hebrea es terse y categórica. «Para muerte» conserva la estructura repetida y la fuerza judicial sin suavizarla.
- source_word: לַחֶרֶב
  english_pob_choice: for the sword / to the sword
  chosen_spanish: para espada
  alternatives_spanish:
  - para la espada
  - a espada
  lexicon: HALOT
  rationale: «Espada» mantiene el instrumento concreto del juicio. Se omite el artículo para reflejar la sequedad paralela del hebreo, como en el inglés POB.
- source_word: לָרָעָב
  english_pob_choice: for famine / to famine
  chosen_spanish: para hambre
  alternatives_spanish:
  - para el hambre
  - para hambre y escasez
  lexicon: HALOT
  rationale: Aunque el campo semántico puede abarcar hambre o hambruna, el hebreo aquí funciona como categoría de juicio. «Hambre» preserva la brevedad y la repetición; «hambruna» sería más explicativo.
- source_word: לַשְּׁבִי
  english_pob_choice: for captivity / to captivity
  chosen_spanish: para cautiverio
  alternatives_spanish:
  - para el cautiverio
  - para exilio
  lexicon: HALOT
  rationale: «Cautiverio» mantiene el paralelismo formal con los miembros anteriores. «Exilio» es una posibilidad contextual, pero introduce un matiz menos directo que el del sustantivo hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el criterio del proyecto de no enmascarar el Tetragrámaton. «Yahvé» preserva el nombre propio del pacto y evita sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahweh (en español, Yahvé)'
- issue: Fórmula de juicio repetida y categórica
  english_pob_reading: Those for death, to death; and those for the sword, to the sword; and those for famine, to famine; and those for captivity, to captivity
  chosen_spanish_reading: Los que para muerte, para muerte; los que para espada, para espada; los que para hambre, para hambre; los que para cautiverio, para cautiverio
  alternative_spanish_readings:
  - Quien esté para muerte, para muerte...
  - Los destinados a muerte, a muerte...
  rationale: El hebreo concentra una sentencia sobria y repetitiva. La traducción conserva esa dureza sin explicarla ni convertirla en una paráfrasis que diluya la tensión teológica del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preservar la tensión teológica y la textura del original'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que prefirió «Where shall we go?» sobre una forma con «out», por considerarla más natural sin alterar el sentido de destino implícito en el hebreo. La presente versión sigue esa decisión y conserva la fórmula de juicio repetitiva y el Nombre divino explícito.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene la secuencia judicial breve «para X, para X» para reflejar la tersura del hebreo.
  - «Cautiverio» se emplea por su paralelismo formal con «muerte», «espada» y «hambre», dejando «exilio» como alternativa anotada.
  - La pregunta se traduce con «¿Adónde iremos?» por naturalidad y fidelidad al valor de destino.
