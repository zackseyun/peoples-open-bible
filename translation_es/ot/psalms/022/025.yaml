translation:
  language: es
  text: Porque no despreció ni aborreció la aflicción del afligido[a], ni escondió su rostro de él; sino que, cuando clamó a él, lo oyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la miseria del pobre» o «la humillación del afligido».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָזָה
  english_pob_choice: despised
  chosen_spanish: despreció
  alternatives_spanish:
  - despreció con desprecio
  - menospreció
  lexicon: HALOT
  rationale: El verbo expresa tratar con desprecio; «despreció» es una equivalencia natural y fiel en español, y mantiene la correspondencia con el segundo verbo más fuerte que sigue.
- source_word: שִׁקַּץ
  english_pob_choice: abhorred
  chosen_spanish: aborreció
  alternatives_spanish:
  - detestó
  - repudió
  lexicon: HALOT
  rationale: El verbo intensifica el primero y sugiere considerar algo como repugnante o abominable. «Aborreció» conserva esa fuerza sin sonar artificial.
- source_word: עֱנוּת
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - miseria
  - humillación
  lexicon: HALOT
  rationale: El sustantivo denota sufrimiento, opresión o condición afligida. «Aflicción» es una equivalencia idiomática en español y no reduce el sentido solo a pobreza material o a humillación interior.
- source_word: עָנִי
  english_pob_choice: the afflicted
  chosen_spanish: el afligido
  alternatives_spanish:
  - el pobre
  - el necesitado
  - el humilde
  lexicon: HALOT
  rationale: En este contexto, el término apunta al que sufre o está oprimido. «El afligido» mantiene el vínculo con la «aflicción» del hemistiquio anterior y evita restringirlo solo a pobreza económica.
- source_word: הִסְתִּיר פָּנָיו
  english_pob_choice: hidden his face
  chosen_spanish: escondió de él su rostro
  alternatives_spanish:
  - apartó de él su rostro
  - ocultó su rostro
  lexicon: HALOT
  rationale: La expresión es un modismo hebreo sobre retirar atención favorable o presencia. «Escondió de él su rostro» conserva la imagen bíblica y es claro en español.
- source_word: בְשַׁוְּעוֹ
  english_pob_choice: when he cried
  chosen_spanish: cuando clamó
  alternatives_spanish:
  - cuando gritó
  - cuando elevó su clamor
  lexicon: HALOT
  rationale: La forma comunica un clamor de auxilio. «Clamó» reproduce bien la urgencia sin añadir más interpretación que el hebreo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - al Yahvé
  - a Dios
  lexicon: HALOT
  rationale: El pronombre se refiere a Dios en el contexto, pero el hebreo mantiene la referencia pronominal. «A él» conserva esa cohesión y evita introducir un título explícito no presente en el verso.
- source_word: שָׁמֵעַ
  english_pob_choice: he heard
  chosen_spanish: lo oyó
  alternatives_spanish:
  - le respondió
  - lo escuchó
  lexicon: HALOT
  rationale: El verbo significa ante todo oír. «Lo oyó» mantiene el sentido léxico básico, mientras que «respondió» iría más allá del texto.
theological_decisions:
- issue: Referencia del afligido
  english_pob_reading: The verse speaks generally of God's regard for the afflicted one, while fitting the psalm's immediate first-person context.
  chosen_spanish_reading: El verso habla de la atención de Dios al afligido, a la vez que encaja con el contexto inmediato de la voz del salmista.
  alternative_spanish_readings:
  - Una referencia específicamente mesiánica al sufriente
  - Una afirmación puramente general sobre cualquier pobre
  rationale: El hebreo usa formas singulares que permiten tanto la experiencia inmediata del salmista como un principio más amplio. La traducción conserva esa tensión sin forzar una lectura exclusivamente mesiánica ni meramente genérica.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La versión sigue de cerca la revisión estable del POB inglés: mantiene la doble negación intensiva, el modismo de «esconder el rostro» y la secuencia final «cuando clamó... lo oyó», sin introducir una interpretación más explícita que la del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «aflicción/afligido» para reflejar la relación léxica entre עֱנוּת y עָנִי.
  - Se evita «Señor» o «Yahvé» en la línea principal porque el hebreo usa pronombres en los miembros finales del verso.
  - La puntuación preserva la progresión del hebreo con una clausula principal, el contraste negativo y la conclusión adversativa implícita en español.
