translation:
  language: es
  text: Y reinó en su lugar, y se puso la corona[a] de Asia, e infligió un gran golpe[b] en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la diadema». El término griego διάδημα designa específicamente la insignia real o banda de realeza.
    reason: lexical_alternative
  - marker: b
    text: O «causó gran devastación en la tierra». El griego dice literalmente «hizo un gran golpe sobre la tierra», una expresión idiomática de daño o calamidad severa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβασίλευσεν
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - se hizo rey
  - gobernó como rey
  lexicon: LSJ
  rationale: El verbo aoristo expresa ejercicio de la realeza. «Reinó» conserva de forma natural y concisa esa idea en español, sin añadir un matiz ingresivo más fuerte que el del griego.
- source_word: ἀντʼ αὐτοῦ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: LSJ
  rationale: La expresión marca sucesión con reemplazo. «En su lugar» comunica bien esa sustitución en español moderno y mantiene el valor de ἀντί.
- source_word: περιέθετο
  english_pob_choice: put on
  chosen_spanish: se puso
  alternatives_spanish:
  - se colocó
  - se ciñó
  lexicon: LSJ
  rationale: La forma media indica que se pone algo sobre sí mismo. «Se puso» conserva la imagen concreta de asumir la insignia real sin forzar un registro más técnico de lo necesario.
- source_word: τὸ διάδημα
  english_pob_choice: the crown
  chosen_spanish: la corona
  alternatives_spanish:
  - el diadema
  - la diadema
  lexicon: LSJ
  rationale: διάδημα designa la banda o insignia real. En español, «corona» es más claro y natural para el lector general; «diadema» sería más técnico, pero menos accesible.
- source_word: τῆς Ἀσίας
  english_pob_choice: of Asia
  chosen_spanish: de Asia
  alternatives_spanish:
  - del Asia
  - de Asia Menor
  lexicon: LSJ
  rationale: Se mantiene el genitivo simple del griego. Añadir «Menor» o ampliar la referencia histórica iría más allá del texto.
- source_word: ἐποίησεν πληγὴν μεγάλην
  english_pob_choice: inflicted a great blow
  chosen_spanish: infligió un gran golpe
  alternatives_spanish:
  - causó gran devastación
  - asestó un gran golpe
  lexicon: LSJ
  rationale: πληγή puede ser golpe, choque o calamidad. «Infligió un gran golpe» preserva la metáfora de daño severo sin especificarla indebidamente como «devastación» o «plaga».
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la región
  lexicon: LSJ
  rationale: γῆ puede significar tierra o país. «Sobre la tierra» sigue de cerca el griego y conserva la amplitud semántica del término.
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo anclas visibles para ambas notas al texto español. No hubo otros cambios de sentido respecto del griego ni del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de tres miembros del verso.
  - Se evitó traducir mecánicamente como «SEÑOR» o «Cristo», que no aplican aquí.
  - «Tierra» conserva la amplitud de γῆ, sin precisar geográficamente más de lo que exige el texto.
