  rationale: Se corrigen los anclajes de las notas al pie para que correspondan a las palabras pertinentes del texto, se mejora la naturalidad de βοηθός con 'auxiliador', y se explicita 'está' en la segunda cláusula para un paralelismo español más claro sin alterar el sentido.
