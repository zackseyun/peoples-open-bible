translation:
  language: es
  text: Jerusalén ha pecado gravemente[a]; por eso se ha vuelto inmunda. Todos los que la honraban la desprecian, porque han visto su desnudez. Ella misma también gime y se vuelve atrás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''como una menstruante'' o ''como una impureza''; el hebreo expresa una condición de impureza ritual y separación social.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: ''se vuelve hacia atrás'' o ''retrocede''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵטְא חָטְאָה
  english_pob_choice: has sinned grievously
  chosen_spanish: ha pecado gravemente
  alternatives_spanish:
  - ha pecado un pecado
  - ha pecado en gran manera
  - ha pecado ciertamente
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto más verbo finito intensifica la acción verbal. En español, 'ha pecado gravemente' transmite la intensidad sin sonar mecánico, y conserva el valor de condena del texto.
- source_word: לְנִידָה
  english_pob_choice: unclean
  chosen_spanish: inmunda
  alternatives_spanish:
  - como una impura
  - como una menstruante
  - como una impureza
  lexicon: HALOT
  rationale: El término tiene fuerza ritual y social de impureza/separación. 'Inmunda' es la forma breve y bíblica más natural en español para este contexto, y preserva la carga de exclusión sin reducirla solo a una noción médica.
- source_word: מְכַבְּדֶיהָ
  english_pob_choice: who honored her
  chosen_spanish: los que la honraban
  alternatives_spanish:
  - los que la estimaban
  - los que la glorificaban
  lexicon: HALOT
  rationale: El verbo expresa honra, respeto o consideración. 'Honraban' mantiene el contraste directo con el desdén posterior y funciona con naturalidad en español.
- source_word: הִזִּילוּהָ
  english_pob_choice: despise her
  chosen_spanish: la desprecian
  alternatives_spanish:
  - la tratan con desprecio
  - la desairan
  - la deshonran
  lexicon: HALOT
  rationale: El hebreo comunica tratarla como cosa sin valor. 'Desprecian' reproduce bien la inversión de honor a desprecio y es idiomático en español.
- source_word: עֶרְוָתָהּ
  english_pob_choice: her nakedness
  chosen_spanish: su desnudez
  alternatives_spanish:
  - su vergüenza
  - sus vergüenzas
  lexicon: HALOT
  rationale: '''Desnudez'' conserva la imagen literal de exposición pública y vergüenza. En un pasaje poético de lamento, esa concreción es importante y no debe suavizarse en exceso.'
- source_word: נֶאֶנְחָה
  english_pob_choice: groans
  chosen_spanish: gime
  alternatives_spanish:
  - suspira
  - se lamenta
  - gime de dolor
  lexicon: HALOT
  rationale: El verbo expresa lamento audible y sufrimiento. 'Gime' es conciso, poético y suficientemente fuerte en español.
- source_word: וַתָּשָׁב אָחוֹר
  english_pob_choice: turns backward
  chosen_spanish: se vuelve atrás
  alternatives_spanish:
  - retrocede
  - vuelve hacia atrás
  - se vuelve hacia atrás
  lexicon: HALOT
  rationale: La expresión literal es 'volver atrás'/'hacia atrás'. 'Se vuelve atrás' conserva el movimiento de retirada y el matiz de retroceso vergonzoso, acorde con el contexto de humillación.
theological_decisions:
- issue: Imaginería de impureza ritual aplicada a Jerusalén
  english_pob_reading: Render לְנִידָה as 'unclean' in the main text; preserve the more concrete alternative in a footnote.
  chosen_spanish_reading: Traducir con 'inmunda' en el texto principal y dejar en nota la alternativa 'como una menstruante' o 'como una impureza'.
  alternative_spanish_readings:
  - como una menstruante
  - como una impureza
  - impura
  rationale: El pasaje usa lenguaje de impureza para describir la humillación y separación de Jerusalén. 'Inmunda' preserva ese peso ritual-social sin imponer una explicación doctrinal ni trivializar el matiz concreto del hebreo.
  doctrine_reference: Tradución con equivalencia óptima; conservar la tensión léxica y simbólica del texto
- issue: Personificación y repetición enfática en la última línea
  english_pob_reading: She herself also groans and turns backward.
  chosen_spanish_reading: Ella también gime y se vuelve atrás.
  alternative_spanish_readings:
  - Ella misma también gime y se vuelve atrás
  - Ella también gime y retrocede
  rationale: El hebreo combina גַּם e הִיא para reforzar la continuidad de Jerusalén como sujeto sufriente. En español, 'Ella también' deja la personificación clara sin recargar la frase con una redundancia innecesaria, y 'se vuelve atrás' preserva el movimiento de retirada del cierre poético.
  doctrine_reference: Poética profética; preservar el sujeto personificado y la imagen de retirada
translation_notes:
  revision_awareness: Se tuvo en cuenta que el inglés POB revisó la línea final para mantener con más literalidad 'turns backward' y el énfasis de 'she herself also'. En español, esa literalidad se conserva suficientemente con 'se vuelve atrás', mientras que 'Ella también' evita una redundancia poco natural sin perder la referencia enfática a Jerusalén.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como convención del proyecto solo cuando corresponde; este versículo no contiene el tetragrámaton.
  - '''inmunda'' se eligió por coherencia con el campo semántico de impureza ritual; la nota preserva la alternativa más concreta.'
  - '''desprecian'' y ''su desnudez'' mantienen el contraste honor/vergüenza del hebreo.'
  - La puntuación reproduce la división poética del verso en tres movimientos sintácticos principales.
