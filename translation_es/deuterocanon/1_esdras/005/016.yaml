review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego principal: repite la fórmula censal «los hijos de», conserva los números correctamente y mantiene las divergencias onomásticas frente al paralelo hebreo en notas. Sin embargo, hay una pequeña inconsistencia en la nota [a]: no diverge solo el nombre aislado, sino la entrada griega de la lista («Anneis») frente al paralelo hebreo «Bezai».'
  spanish_quality_summary: El español es claro y legible. La sintaxis de lista funciona bien. Los nombres transliterados son aceptables, pero conviene ajustar la nota [a] para reflejar con más precisión lo que dice la auditoría inglesa. El resto no requiere reparación obligatoria.
  glossary_alignment: 'No hay términos teológicos del glosario principal en este versículo. «los hijos de» corresponde bien a υἱοὶ en contexto genealógico. Las transliteraciones priorizan el griego, en línea con la política del proyecto para este pasaje con major mismatch. '
  issues:
  - severity: medium
    issue: La nota [a] habla de «El nombre griego aquí diverge», cuando la nota inglesa se refiere a la lista/nombre de este punto de la lista, no simplemente a un nombre genérico.
    rationale: La formulación actual puede sonar imprecisa o demasiado estrecha. Conviene explicitar que la lista griega aquí tiene «Anéis/Anneis», mientras que el paralelo hebreo aproximado lee «los hijos de Bezai», preservando mejor la justificación documental.
  - severity: low
    issue: La razón de la nota [a] en inglés es alternative_reading, pero en español figura como textual_variant.
    rationale: No afecta el texto bíblico, pero la documentación queda mejor alineada si la nota expresa una lectura paralela alternativa más que una variante textual estricta.
  revised_spanish_text: los hijos de Anéis[a], ciento uno; los hijos de Arom, los hijos de Basái, trescientos veintitrés; los hijos de Arseifoureit[b],
  revised_footnotes:
  - marker: a
    text: La lista griega aquí diverge del paralelo hebreo aproximado en Nehemías 7:23, que lee «los hijos de Bezai».
    reason: alternative_reading
  - marker: b
    text: El nombre «Arseifoureit» es incierto en griego; el paralelo hebreo aproximado podría apuntar a «Harif».
    reason: textual_variant
  revision_rationale: El texto principal puede mantenerse. Solo se ajusta la nota [a] para reflejar con mayor precisión la auditoría inglesa y la naturaleza de la divergencia con el paralelo hebreo aproximado.
