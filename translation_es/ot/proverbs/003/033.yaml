translation:
  language: es
  text: La maldición de Yahvé está sobre la casa del impío[a], pero bendice la morada de los justos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la casa del impío»; la preposición hebrea puede entenderse de manera más literal, pero «está sobre la casa de» comunica mejor la idea de una maldición que recae sobre el hogar.
    reason: lexical_alternative
  - marker: b
    text: O «hogar» o «vivienda» para «morada».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאֵרַת
  english_pob_choice: curse
  chosen_spanish: maldición
  alternatives_spanish:
  - curse
  - anatema
  lexicon: HALOT
  rationale: El sustantivo expresa una maldición o estado maldito; en español, «maldición» comunica de forma directa y natural el valor nominal en esta construcción predicativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con «Yahvé», conforme al criterio del proyecto para no sustituirlo por un título.
- source_word: בְּבֵית
  english_pob_choice: is on the house of
  chosen_spanish: está sobre la casa de
  alternatives_spanish:
  - está en la casa de
  - cae sobre la casa de
  lexicon: HALOT
  rationale: La preposición con בית permite un sentido espacial o de recaer sobre. En español, «está sobre la casa de» conserva la imagen de una maldición que pesa sobre el hogar, como en el audit trail inglés.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el injusto
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, funciona de modo representativo/generico. «El impío» mantiene la categoría moral sin forzar un masculino individual específico.
- source_word: וּנְוֵה
  english_pob_choice: the dwelling of
  chosen_spanish: la morada de
  alternatives_spanish:
  - el hogar de
  - la vivienda de
  lexicon: HALOT
  rationale: נוה designa un lugar de habitación o residencia. «Morada» es una opción clara y digna en español bíblico contemporáneo.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos ones
  lexicon: HALOT
  rationale: El plural adjetival funciona sustantivamente; «los justos» es el equivalente más idiomático y conserva la categoría ética del original.
- source_word: יְבָרֵךְ
  english_pob_choice: he blesses
  chosen_spanish: bendice
  alternatives_spanish:
  - bendecirá
  - da su bendición a
  lexicon: HALOT
  rationale: El imperfecto expresa aquí una verdad proverbial, no un tiempo estrictamente futuro. En español, el presente gnómico «bendice» reproduce bien ese valor.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa יְהוָה de manera directa. Se traduce con el nombre propio «Yahvé» para conservar la referencia al nombre del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Singular genérico רָשָׁע
  english_pob_reading: the wicked
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el malvado
  - la persona impía
  rationale: El singular hebreo es representativo. «El impío» mantiene el alcance genérico y suena natural en un proverbio, sin convertirlo en una expresión excesivamente abstracta.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete de fuente hebrea y coincide con la solución del audit trail en inglés: maldición sobre la casa del impío, en contraste con la bendición sobre la morada de los justos. No se introdujeron cambios de revisión posteriores ni conflictos textuales relevantes.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva el paralelismo proverbial con presente gnómico («está», «bendice»).
  - «Impío» y «justos» funcionan como sustantivos colectivos/generales en español bíblico contemporáneo.
  - La nota sobre בְּבֵית preserva la tensión entre un sentido más literal («en la casa») y el valor idiomático de recaer sobre el hogar.
