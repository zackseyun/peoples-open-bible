    rationale: Aunque semánticamente posible, 'guerrear' aquí es menos idiomático que 'luchar' o 'combatir', y puede sonar más tosco de lo necesario. 'Había luchado contra' preserva el sentido bélico con mejor legibilidad.
  - severity: low
    issue: El pronombre 'él' es innecesario.
    rationale: El sujeto ya está claro por el contexto; en español su omisión mejora la fluidez sin pérdida de sentido.
