revisions:
- from: Las cardenales de una herida limpian el mal[a], y los golpes limpian las partes más íntimas del vientre[b].
  to: Los moretones de una herida limpian el mal[a], y los golpes limpian lo más profundo del vientre[b].
  rationale: 'Se corrige un error gramatical («las cardenales»), se sustituye «cardenales» por «moretones» por mayor naturalidad panhispánica y mejor equivalencia funcional con «bruises», y se ajusta el segundo hemistiquio a una expresión más idiomática y fiel al hebreo antropológico: «lo más profundo del vientre». También se suaviza la nota léxica para evitar un tecnicismo innecesario.'
