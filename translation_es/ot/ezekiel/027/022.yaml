revisions:
- from: Los mercaderes de Saba y de Raamá[a]—ellos eran tus mercaderes—; con lo mejor de toda especia, con toda piedra preciosa y oro, pagaron por tus mercancías.
  to: Los mercaderes de Saba y de Raamá eran tus mercaderes; con las mejores especias, con toda piedra preciosa y oro, pagaron por tus mercancías[a].
  rationale: Se elimina la nota innecesaria sobre los nombres propios y se restaura la nota léxica pertinente documentada en el POB para נָתְנוּ. También se corrige la puntuación y se mejora la naturalidad de la frase sobre las especias, manteniendo el sentido de 'lo mejor de cada especia' en un español más idiomático.
