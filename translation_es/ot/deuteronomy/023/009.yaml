translation:
  language: es
  text: Los descendientes[a] que les nazcan en la tercera generación podrán entrar en la asamblea de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''hijos''; en este contexto legal-genealógico, el término puede referirse de manera más amplia a la descendencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''la tercera generación podrá entrar''; el hebreo puede expresarse de forma más formal, pero el sentido es que la admisión es permitida a partir de la tercera generación.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּנִים
  english_pob_choice: Children
  chosen_spanish: Los hijos
  alternatives_spanish:
  - Los niños
  - Los descendientes
  lexicon: HALOT
  rationale: En este contexto legal y genealógico, el hebreo masculino plural puede referirse a la descendencia. 'Hijos' conserva la relación filial sin limitarse a varones adultos, y es una forma natural en español para la descendencia de una línea familiar.
- source_word: אֲשֶׁר יִוָּלְדוּ לָהֶם
  english_pob_choice: born to them
  chosen_spanish: que les nazcan
  alternatives_spanish:
  - que nazcan de ellos
  - nacidos de ellos
  lexicon: HALOT
  rationale: La construcción pasiva de ילד con ל + pronombre expresa nacimiento en relación con ellos. 'Que les nazcan' mantiene esa relación de pertenencia/adscripción de forma idiomática en español, sin introducir un matiz biológico más fuerte de lo que exige el hebreo.
- source_word: דּוֹר שְׁלִישִׁי
  english_pob_choice: in the third generation
  chosen_spanish: en la tercera generación
  alternatives_spanish:
  - la tercera generación
  - a partir de la tercera generación
  lexicon: HALOT
  rationale: La frase marca el punto generacional desde el cual se permite el acceso. 'En la tercera generación' reproduce el valor temporal/legal sin volverla más interpretativa de lo necesario.
- source_word: יָבֹא
  english_pob_choice: may enter
  chosen_spanish: podrán entrar
  alternatives_spanish:
  - podrá entrar
  - tendrán entrada
  lexicon: HALOT
  rationale: En este contexto jurídico, el verbo comunica admisión permitida. 'Podrán entrar' expresa la autorización en español con claridad, conservando el valor permissivo del hebreo.
- source_word: בִּקְהַל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - el asamblea
  lexicon: HALOT
  rationale: קהל denota la comunidad reunida. 'Asamblea' es la equivalencia más directa y digna en español, y evita sustituir el término por uno eclesiástico menos preciso en este contexto legal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino transliterado según la convención del proyecto: ''Yahvé'', en lugar de sustituirlo por un título. Esto preserva el nombre propio del pacto reflejado en el hebreo.'
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política del proyecto pide conservar el nombre divino como nombre propio, no ocultarlo tras 'SEÑOR'. 'Yahvé' es la forma establecida en el español del proyecto y mantiene la referencia personal al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de בָּנִים en un contexto legal-genealógico
  english_pob_reading: Children
  chosen_spanish_reading: Los hijos
  alternative_spanish_readings:
  - Los descendientes
  - Los hijos e hijas
  rationale: Aunque la forma hebrea es masculina plural, aquí funciona representativamente para la descendencia de una línea. 'Los hijos' es fiel al hebreo y suficientemente natural en español; evita una paráfrasis excesiva y conserva el registro legal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Valor permisivo de יָבֹא
  english_pob_reading: may enter
  chosen_spanish_reading: podrán entrar
  alternative_spanish_readings:
  - podrá entrar
  - les será permitido entrar
  rationale: En legislación, el verbo no describe mero movimiento, sino admisión autorizada. 'Podrán entrar' expresa ese permiso de manera clara y conserva la fuerza normativa del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Preserve legal force and modal nuance'
translation_notes:
  revision_awareness: El audit trail en inglés muestra alta concordancia y ninguna revisión sustantiva del sentido; solo se eliminó 'into' por fluidez inglesa. La presente versión española sigue esa misma lectura permisiva y mantiene el registro legal, conservando el nombre divino y la referencia genealógica sin ampliaciones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Asamblea'' se mantiene para קהל por su valor comunitario-formal y su naturalidad en español.'
  - La modalidad permisiva de יָבֹא se refleja con 'podrán', no con un futuro meramente predictivo.
  - La nota a preserva la tensión entre 'hijos' como masculino plural y su uso genealógico inclusivo de descendencia.
