    text: 또는 「너희가 나를 다시 볼 것이다」. 헬라어는 여기서 더 문자적으로 「내가 너희를 다시 볼 것이다」로 읽으며, 돌아오심에 있어 예수의 주도성을 강조할 수 있다.
    reason: lexical_alternative
