base_translation:
  language: en
  yaml_path: translation/ot/judges/021/023.yaml
  text: So the sons of Benjamin did so[a], and took wives according to their number from the dancers whom they had seized. Then they went and returned to their inheritance, rebuilt the cities[c][b], and lived in them.
  footnotes:
  - marker: a
    text: Or 'from the dancing women.' The Hebrew participle is feminine plural.
    reason: lexical_alternative
  - marker: b
    text: Or 'whom they had snatched away' or 'carried off.' The Hebrew verb denotes taking by force.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'built the cities'; 'rebuilt' reflects the context of Benjamin's devastated towns in the preceding narrative.
    reason: lexical_alternative
