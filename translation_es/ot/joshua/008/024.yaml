  language: en
  yaml_path: translation/ot/joshua/008/024.yaml
  text: And it happened that when Israel had finished killing all the inhabitants of Ai in the field[a], in the wilderness where they had pursued them, and all of them had fallen by the edge of the sword until they were destroyed, then all Israel returned to Ai and struck it with the edge of the sword.
  footnotes:
