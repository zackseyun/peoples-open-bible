review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mantiene el deíctico introductorio, «siete espigas», el daño por el viento del este y el aspecto progresivo de «brotando». Sin embargo, no preserva adecuadamente la acumulación de dos adjetivos hebreos distintos (צְנֻמוֹת, דַּקּוֹת), porque los colapsa en una sola idea semántica («delgadas») y omite uno de ellos en la redacción efectiva. Además, «detrás de ellas» suena menos natural que «después de ellas» o «tras ellas» en este contexto secuencial del sueño.'
  spanish_quality_summary: 'El español es generalmente legible y digno, pero «delgadas y quemadas» pierde la duplicación descriptiva del original, y «iban brotando detrás de ellas» resulta algo torpe en español bíblico narrativo. Una leve revisión mejora fidelidad y fluidez: «marchitas, delgadas y quemadas por el viento del oriente, brotaban después de ellas».'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Espigas» para שִׁבֳּלִים es correcto. «Viento del oriente» es aceptable y natural. La principal cuestión léxica es distinguir los dos adjetivos hebreos apilados; en español conviene diferenciarlos para no perder contenido fuente.
  issues:
  - severity: medium
    issue: Los dos adjetivos hebreos צְנֻמוֹת y דַּקּוֹת no se distinguen en el texto español.
    rationale: El borrador asigna «delgadas» a ambos en las decisiones léxicas, pero en la frase final solo aparece una vez. Así se pierde una parte del énfasis descriptivo del hebreo.
  - severity: low
    issue: «Detrás de ellas» es menos idiomático que una formulación secuencial en español.
    rationale: Aunque posible, aquí el hebreo describe la aparición posterior de las espigas en la escena del sueño; «después de ellas» suena más natural y claro en español.
  revised_spanish_text: Y he aquí[a], siete espigas[b], marchitas, delgadas y quemadas por el viento del oriente, brotaban después de ellas.
  revised_footnotes:
