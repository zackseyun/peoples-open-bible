revisions:
- from: Y Salomón tenía doce [a] gobernadores sobre todo Israel, y ellos proveían al rey y a su casa; uno por mes en el año debía proveer.
  to: Y Salomón tenía doce delegados[a] sobre todo Israel, y ellos proveían al rey y a su casa; cada uno tenía que proveer durante un mes del año.
  rationale: 'Se reemplaza ''gobernadores'' por ''delegados'' para preservar mejor la amplitud administrativa de נִצָּבִים según la auditoría POB, manteniendo las otras opciones en nota. Se reformula la cláusula final para expresar claramente la obligación rotativa: cada uno proveía durante un mes del año. También se corrige la colocación del marcador de nota.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:46:59Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: posesión con ''Salomón tenía'', número, función administrativa sobre Israel, provisión para el rey y su casa, y la obligación rotativa mensual anual. Sin embargo, dos puntos necesitan ajuste para reflejar mejor el sentido fuente y la auditoría inglesa: (1) נִצָּבִים fue auditado como término administrativo amplio (''deputies''), por lo que ''gobernadores'' suena demasiado específico y fuerte; (2) ''uno por mes en el año debía proveer'' no expresa con claridad que cada uno tenía a su cargo un mes del año, sino que puede sugerir una frecuencia mensual.'
  spanish_quality_summary: 'El español es generalmente claro, pero contiene una ancla de nota mal espaciada (''doce [a] gobernadores'') y una cláusula final poco natural. ''Su casa'' es posible, pero en este contexto cortesano ''su casa'' puede sonar demasiado literal; ''su casa real'' o ''su casa'' con mejor contexto puede funcionar, aunque ''su casa'' sigue siendo aceptable. La mejor mejora es usar una formulación distributiva más natural: ''cada uno tenía que proveer durante un mes del año''.'
  glossary_alignment: 'No hay términos teológicos sensibles en juego. La principal cuestión lexical es נִצָּבִים: conviene alinearlo con la amplitud documentada en inglés mediante ''delegados'' o ''funcionarios'', y conservar alternativas en nota. El resto (''proveían'', ''sobre todo Israel'', ''rey'', ''casa'') está básicamente alineado.'
  issues:
  - severity: medium
    issue: '''gobernadores'' estrecha demasiado נִצָּבִים'
    rationale: La auditoría inglesa eligió 'deputies' precisamente para evitar implicar gobernación provincial demasiado fuerte. En español, 'gobernadores' añade una especificidad institucional no exigida por el hebreo.
  - severity: medium
    issue: La cláusula 'uno por mes en el año debía proveer' es ambigua y poco natural
    rationale: 'El hebreo expresa una obligación distributiva: a cada uno le correspondía proveer un mes del año. La redacción actual no lo comunica con claridad idiomática.'
  - severity: low
    issue: Espaciado incorrecto del marcador de nota
    rationale: 'El marcador debe ir pegado al término relevante según las convenciones del proyecto: ''doce delegados[a]'' o similar, no ''doce [a] gobernadores''.'
  revised_spanish_text: Y Salomón tenía doce delegados[a] sobre todo Israel, y ellos proveían al rey y a su casa; cada uno tenía que proveer durante un mes del año.
  revised_footnotes:
  - marker: a
    text: O 'funcionarios', 'oficiales' o 'gobernadores' para 'delegados'. El término hebreo se refiere en sentido amplio a administradores designados.
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza ''gobernadores'' por ''delegados'' para preservar mejor la amplitud administrativa de נִצָּבִים según la auditoría POB, manteniendo las otras opciones en nota. Se reformula la cláusula final para expresar claramente la obligación rotativa: cada uno proveía durante un mes del año. También se corrige la colocación del marcador de nota.'
