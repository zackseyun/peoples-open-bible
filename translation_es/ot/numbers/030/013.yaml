translation:
  language: es
  text: Pero si su marido realmente las anula[a] el día en que oye, entonces nada de lo que salió de sus labios[b]—ya sean sus votos o la obligación que se impuso sobre sí misma— se mantendrá. Su marido las ha anulado, y Yahvé la perdonará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite el verbo de forma intensiva; aquí se vierte con una expresión de énfasis para sonar natural en español sin perder la fuerza legal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'todo lo que salió de sus labios'. Es una expresión jurídica de alcance total para los compromisos verbales de la mujer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula introduce una transición condicional con matiz adversativo respecto del caso anterior; "Pero si" conserva esa fuerza de contraste en español natural.
- source_word: הָפֵר יָפֵר
  english_pob_choice: indeed annuls
  chosen_spanish: realmente anula
  alternatives_spanish:
  - ciertamente anula
  - de veras anula
  - anula
  lexicon: HALOT
  rationale: La construcción intensiva se expresa en español con un adverbio de énfasis antes del verbo, sin recurrir a una repetición forzada. "Realmente" mantiene el refuerzo legal del hebreo.
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En este contexto jurídico-matrimonial, "marido" es el equivalente directo y claro en español; "esposo" también sería posible, pero "marido" conserva mejor el registro legal.
- source_word: בְּיוֹם שָׁמְעוֹ
  english_pob_choice: on the day he hears
  chosen_spanish: el día que lo oye
  alternatives_spanish:
  - el día en que lo oye
  - cuando lo oye
  - el día de oírlo
  lexicon: HALOT
  rationale: Se conserva el marco temporal legal del hebreo. "El día que lo oye" es más natural en español que una estructura nominal pesada, sin perder la referencia al momento decisivo.
- source_word: כָּל מוֹצָא שְׂפָתֶיהָ
  english_pob_choice: nothing that came from her lips
  chosen_spanish: nada de lo que salió de sus labios
  alternatives_spanish:
  - todo lo que salió de sus labios
  - cualquier cosa que salió de sus labios
  - todo lo procedente de sus labios
  lexicon: HALOT
  rationale: La expresión hebrea literalmente abarca "todo lo que salió/procedió de sus labios"; en el contexto de nulidad legal, "nada de lo que salió de sus labios" preserva el alcance total y la negación resultante sin suavizarlo demasiado.
- source_word: לִנְדָרֶיהָ
  english_pob_choice: her vows
  chosen_spanish: sus votos
  alternatives_spanish:
  - sus promesas
  - sus juramentos
  lexicon: HALOT
  rationale: '"Votos" es la traducción estándar y más precisa para נדר en este marco religioso-jurídico.'
- source_word: וּלְאִסַּר נַפְשָׁהּ
  english_pob_choice: her binding obligation upon herself
  chosen_spanish: la obligación que se impuso sobre su alma
  alternatives_spanish:
  - la obligación con que se ató a sí misma
  - su obligación autoimpuesta
  - el vínculo con que se obligó
  lexicon: HALOT
  rationale: La frase hebrea conserva la idea de una obligación que recae sobre su propio ser/alma. "Sobre su alma" mantiene la literalidad semántica de נֶפֶשׁ sin borrar la tensión jurídica; "se impuso" expresa el carácter reflexivo de la autoobligación.
- source_word: לֹא יָקוּם
  english_pob_choice: shall stand
  chosen_spanish: no se mantendrá
  alternatives_spanish:
  - no permanecerá
  - no quedará en vigor
  - no se establecerá
  lexicon: HALOT
  rationale: El hebreo usa un modismo legal de permanencia o validez. "No se mantendrá" expresa con claridad que la declaración no tendrá vigencia jurídica.
- source_word: הֲפֵרָם
  english_pob_choice: has annulled them
  chosen_spanish: las ha anulado
  alternatives_spanish:
  - las ha dejado sin efecto
  - las ha invalidado
  - las ha hecho nulas
  lexicon: HALOT
  rationale: '"Anular" corresponde bien a הפר en contexto legal. Se mantiene el perfecto para el estado resultante: el marido ya dejó sin efecto los votos/obligación.'
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: Yahvé, sin ocultarlo bajo una sustitución tipográfica.'
- source_word: יִסְלַח לָהּ
  english_pob_choice: will forgive her
  chosen_spanish: la perdonará
  alternatives_spanish:
  - la perdonará Dios
  - le concederá perdón
  - la absolverá
  lexicon: HALOT
  rationale: '"Perdonará" comunica de forma natural el sentido de סלח en este contexto jurídico-religioso. Conserva la relación entre la nulidad legal y la liberación de culpa o responsabilidad.'
theological_decisions:
- issue: Perdón divino tras la anulación de un voto
  english_pob_reading: The verse states that the woman receives forgiveness because the husband has annulled the vow, releasing her from liability for nonfulfillment.
  chosen_spanish_reading: El versículo dice que ella recibe perdón porque su marido anuló la obligación, liberándola de la responsabilidad por no cumplirla.
  alternative_spanish_readings:
  - El perdón se refiere solo de manera general a la ligereza al hacer el voto
  - La frase es meramente formularia y no implica culpa o responsabilidad
  rationale: 'Se conserva la secuencia legal explícita del texto: anulación, invalidez y perdón de Yahvé. No se amplía a una doctrina general sobre culpa más allá de lo que el pasaje afirma.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma especulativa
- issue: Ámbito de 'נפשׁהּ' en la frase de autoobligación
  english_pob_reading: binding obligation upon herself
  chosen_spanish_reading: la obligación que se impuso sobre su alma
  alternative_spanish_readings:
  - la obligación que se impuso sobre sí misma
  - la obligación de su propia persona
  - su autoobligación
  rationale: En español, "alma" conserva una correspondencia semántica con נֶפֶשׁ que el registro jurídico del pasaje admite. Se añade "se impuso" para mantener la idea reflexiva de la autoobligación sin perder la literalidad base.
  doctrine_reference: Evitar suavizar el hebreo cuando el texto usa un término antropológico concreto
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado del inglés POB: mantiene el énfasis intensivo de הָפֵר יָפֵר, conserva la referencia temporal legal de בְּיוֹם שָׁמְעוֹ, y refleja la formulación revisada de la obligación como algo impuesto sobre ella, sin normalizar la tensión entre voto, invalidez y perdón. También se respeta el nombre divino como Yahvé, conforme al criterio del proyecto.'
  spanish_consistency_notes:
  - Se usa "marido" para el contexto matrimonial-legal; no se opta por "esposo" porque el tono jurídico del pasaje favorece el término más directo.
  - '"Yahvé" se mantiene de forma consistente para יהוה, conforme al estándar del proyecto.'
  - '"Votos" se usa para נדרים y "obligación" para אִסַּר, distinguiendo entre el voto y la carga jurídica resultante.'
  - '"No se mantendrá" traduce el valor de validez legal de לֹא יָקוּם; no se sustituye por una negación meramente existencial.'
  - La nota [b] se coloca en "labios" para anclar la expresión hebrea literal sin sobrecargar el texto principal.
