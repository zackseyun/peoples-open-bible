  text: And Moses said to Aaron and to his sons[a], “Boil the flesh at the entrance of the tent of meeting, and there eat it and the bread that is in the basket of ordination, just as I commanded, saying, ‘Aaron and his sons shall eat it.’”
  footnotes:
