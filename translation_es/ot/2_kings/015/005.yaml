translation:
  language: es
  text: Yahvé hirió al rey[a], y fue leproso hasta el día de su muerte, y vivía en una casa separada[b]. Y Jotam, hijo del rey, estaba a cargo de la casa real, juzgando al pueblo de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más amplia, «afligido por una enfermedad grave de la piel»; el término hebreo no necesariamente se refiere a la lepra moderna en sentido médico.
    reason: lexical_alternative
  - marker: b
    text: O «en una casa de separación» / «en una casa aislada»; la frase hebrea probablemente se refiere a una residencia segregada.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el defecto del proyecto para el nombre divino: transliterar el Tetragrámaton como «Yahvé», manteniendo la referencia explícita al nombre propio y evitando el sustituto litúrgico «SEÑOR».'
- source_word: וַיְנַגַּע
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - afligió
  - castigó
  lexicon: HALOT
  rationale: En este contexto narrativo la acción divina es una intervención punitiva; «hirió» comunica bien esa agencia y evita una lectura de simple contacto físico. «Afligió» sería posible, pero «hirió» conserva mejor la fuerza del evento.
- source_word: מְצֹרָע
  english_pob_choice: leprous
  chosen_spanish: leproso
  alternatives_spanish:
  - afectado por una enfermedad grave de la piel
  - afligido por una enfermedad de la piel
  - un leproso
  lexicon: HALOT
  rationale: Se conserva el término tradicional y conciso «leproso» en el texto principal, con la cautela lexical de que el hebreo no obliga a identificar lepra moderna. La forma adjetival refleja mejor el estado del rey que «un leproso».
- source_word: בְּבֵית הַחָפְשִׁית
  english_pob_choice: in a separate house
  chosen_spanish: en una casa separada
  alternatives_spanish:
  - en una casa aislada
  - en una casa de separación
  - en una casa apartada
  lexicon: HALOT
  rationale: La expresión hebrea es difícil; se traduce de modo funcional como residencia segregada. «Casa separada» conserva la idea de apartamiento sin introducir una interpretación demasiado técnica o demasiado libre.
- source_word: עַל הַבַּיִת
  english_pob_choice: over the household
  chosen_spanish: sobre la casa
  alternatives_spanish:
  - sobre el palacio
  - encargado de la casa
  - a cargo del palacio
  lexicon: HALOT
  rationale: Se preserva el giro administrativo hebreo con una formulación natural en español. «Sobre la casa» mantiene la estructura idiomática y su posible referencia al ámbito real/palatino.
- source_word: שֹׁפֵט
  english_pob_choice: judging
  chosen_spanish: juzgando
  alternatives_spanish:
  - gobernando
  - administrando justicia
  - haciendo justicia
  lexicon: HALOT
  rationale: El participio expresa una función continua; «juzgando» reproduce con fidelidad la acción en curso y conserva la proximidad al campo semántico judicial del hebreo.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - el pueblo del país
  - la gente de la tierra
  - la población de la tierra
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea casi literal para preservar su fuerza y ambigüedad histórica. «Pueblo de la tierra» evita modernizarla indebidamente y conserva el posible matiz colectivo o nacional.
theological_decisions:
- issue: Naturaleza de la condición del rey indicada por מְצֹרָע
  english_pob_reading: Retain 'leprous' in the main text while noting that the Hebrew may refer more broadly to a serious skin disease.
  chosen_spanish_reading: Retener «leproso» en el texto principal y advertir en nota que el hebreo puede referirse de manera más amplia a una enfermedad grave de la piel.
  alternative_spanish_readings:
  - afectado por una enfermedad grave de la piel
  - afligido por una enfermedad de la piel
  - con una afección cutánea grave
  rationale: La traducción no debe resolver en exceso una categoría médica que el hebreo no precisa. La opción tradicional es breve y reconocible, mientras que la nota preserva la tensión lexical documentada por el POB inglés.
  doctrine_reference: Preservar la tensión lexical sin sobreespecificar el diagnóstico.
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión del POB inglés: no hubo cambios aplicados y el veredicto de revisión fue de alta concordancia. La propuesta española sigue esa lectura estable, conservando las dos notas léxicas principales sobre la condición del rey y la casa separada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular para el nombre divino.
  - Se conserva la relación verbal punitiva con «hirió» y no se suaviza a un mero contacto.
  - «Leproso» se usa como término tradicional, acompañado de nota aclaratoria para evitar una identificación médica indebida.
  - «Casa separada» refleja la función segregada del hebreo sin convertirla en un término técnico ajeno al español bíblico.
  - «Sobre la casa» y «juzgando» conservan el paralelismo administrativo-judicial del hebreo.
