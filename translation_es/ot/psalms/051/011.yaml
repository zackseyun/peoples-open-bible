review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea imperativa y conserva la distinción entre חטא («pecados») y עון («iniquidades»). «Oculta tu rostro de mis pecados» sigue de cerca el hebreo, pero en español suena algo menos natural que «de mis pecados aparta tu rostro» o «esconde tu rostro de mis pecados». Aun así, la fidelidad principal está presente. El problema mayor no es de sentido, sino de notas: la nota sobre «iniquidades» está anclada erróneamente a «pecados», y se añadió una nota sobre «pecados» que no corresponde al aparato inglés ni es necesaria por nueva ambigüedad en español.'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad eclesial. «Oculta tu rostro» y «borra todas mis iniquidades» son naturales y reverentes. Sin embargo, el sistema de notas necesita corrección para que el anclaje corresponda al término pertinente y para evitar una nota redundante.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La distinción «pecados» / «iniquidades» está bien preservada, y «borra» para מְחֵה es una opción idiomática aceptable en español para la imagen de remoción.
  issues:
  - severity: medium
    issue: La nota sobre «iniquidades» está anclada a «pecados».
    rationale: El aparato inglés marca la observación semántica de עון/«iniquities», no de חטא/«sins». En español, el marcador debe aparecer junto a «iniquidades», no junto a «pecados».
  - severity: low
    issue: Se añadió una nota sobre «pecados» sin apoyo necesario en el audit trail.
    rationale: La POB inglesa no conserva una nota lexical para «sins» aquí, y el español no crea una ambigüedad nueva que exija nota. Mantener solo la nota relevante mejora la disciplina editorial.
  revised_spanish_text: Oculta tu rostro de mis pecados, y borra todas mis iniquidades[a].
  revised_footnotes:
  - marker: a
    text: «Iniquidades» traduce un término que también puede implicar «culpa».
    reason: lexical_alternative
