lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Solo que
  - Pero solo
  lexicon: HALOT
  rationale: Rַק marca una restricción o excepción. «Solo» comunica esa limitación de forma natural en español sin añadir contraste innecesario.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  - la sangre de la víctima
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido. «La sangre» conserva la referencia específica y directa del mandato legal.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: you shall not eat
  chosen_spanish: no comerán
  alternatives_spanish:
  - no coman
  - no debéis comer
  - no han de comer
  lexicon: HALOT
  rationale: En una prohibición legal, el futuro negativo funciona bien en español bíblico contemporáneo. Mantiene el tono normativo de la instrucción sin volverla demasiado coloquial.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en el suelo
  - sobre el suelo
  - en la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra», «suelo» o «tierra/territorio» según el contexto. Aquí el acto físico de derramar sangre favorece «sobre la tierra» como equivalente claro y suficientemente literal.
- source_word: תִּשְׁפְּכֶנּוּ
  english_pob_choice: you shall pour it out
  chosen_spanish: la derramarán
  alternatives_spanish:
  - la verterán
  - la echarán
  - la derramarán fuera
  lexicon: HALOT
  rationale: El verbo hebreo significa verter, derramar o vaciar. «Derramar» comunica bien la acción ritual de sacar la sangre, y el pronombre implícito se recupera por el antecedente «la sangre».
- source_word: כַּמָּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - igual que agua
  - como si fuera agua
  lexicon: HALOT
  rationale: La comparación es directa y sobria. «Como agua» preserva la sencillez del símil hebreo y su fuerza proverbial.
theological_decisions:
- issue: Prohibición de consumir sangre en ley alimentaria
  english_pob_reading: Render the command straightforwardly as a prohibition against consuming blood and an instruction to pour it out on the ground.
  chosen_spanish_reading: 'Traducir el mandato de manera directa: no comer la sangre y derramarla sobre la tierra.'
  alternative_spanish_readings:
  - No devorar la sangre
  - No beber la sangre
  - No consumir la sangre
  rationale: El versículo presenta una instrucción legal concreta. No conviene expandirla simbólicamente ni suavizar el alcance de la prohibición. «Comer la sangre» conserva la literalidad del hebreo y la fuerza normativa del texto.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue el consenso del audit trail inglés: prohibición directa, derramamiento intencional y símil simple. No se introdujeron notas porque el español no genera una ambigüedad adicional que requiera marca textual.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y legal, acorde con la fraseología de mandato.
  - Se evitó «SEÑOR» o terminología no presente en el versículo.
  - La elección de «la sangre» y «como agua» conserva la literalidad y la imagen simple del hebreo.
