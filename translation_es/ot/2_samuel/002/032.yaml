translation:
  language: es
  text: Se llevaron a Asahel y lo sepultaron en la tumba[a] de su padre, que estaba en Belén. Entonces Joab y sus hombres viajaron toda la noche[b], y les amaneció en Hebrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la sepultura de su padre». El hebreo קֶבֶר puede referirse tanto a una tumba como a una sepultura o lugar de enterramiento familiar.
    reason: lexical_alternative
  - marker: b
    text: O «y el alba los alcanzó en Hebrón». El hebreo idiomático dice literalmente que «se hizo luz para ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  english_pob_choice: They carried
  chosen_spanish: Se llevaron
  alternatives_spanish:
  - Lo cargaron
  - Lo llevaron
  lexicon: HALOT
  rationale: נשא en este contexto narrativo funerario expresa transportar el cuerpo para sepultura. En español, «se llevaron» comunica con naturalidad esa acción sin perder el sentido de traslado del cadáver.
- source_word: עֲשָׂהאֵל
  english_pob_choice: Asahel
  chosen_spanish: Asahel
  alternatives_spanish:
  - Asael
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio con la forma española usual «Asahel», coherente con la convención de transliterar nombres.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  lexicon: HALOT
  rationale: קבר significa enterrar/sepultar. «Sepultar» mantiene el registro digno del contexto sepulcral y es plenamente idiomático en español bíblico.
- source_word: בְּקֶבֶר אָבִיו
  english_pob_choice: in his father's tomb
  chosen_spanish: en la tumba de su padre
  alternatives_spanish:
  - en la sepultura de su padre
  - en la tumba paterna
  lexicon: HALOT
  rationale: קבר puede referirse a «grave/tomb». En español, «tumba» conserva esa ambigüedad y funciona bien como lugar de enterramiento familiar, sin forzar una distinción más técnica que el hebreo no exige aquí.
- source_word: אֲשֶׁר בֵּית לָחֶם
  english_pob_choice: which was at Bethlehem
  chosen_spanish: que estaba en Belén
  alternatives_spanish:
  - que era en Belén
  - que estaba en la ciudad de Belén
  lexicon: HALOT
  rationale: La cláusula relativa identifica la ubicación. En español, hace falta un verbo explícito; «estaba en Belén» es la forma más natural y fiel al valor locativo del hebreo.
- source_word: וַיֵּלְכ֣וּ כָל הַ/לַּ֗יְלָה
  english_pob_choice: traveled all night
  chosen_spanish: caminaron toda la noche
  alternatives_spanish:
  - viajaron toda la noche
  - anduvieron toda la noche
  lexicon: HALOT
  rationale: הלך es amplio («ir/caminar/viajar»). «Caminaron toda la noche» conserva el movimiento sostenido sin añadir una especificación militar que el hebreo no exige.
- source_word: יוֹאָב וַאֲנָשָׁיו
  english_pob_choice: Joab and his men
  chosen_spanish: Joab y sus hombres
  alternatives_spanish:
  - Joab y sus soldados
  lexicon: HALOT
  rationale: אֲנָשָׁיו significa literalmente «sus hombres». «Sus hombres» reproduce con exactitud la relación posesiva y el tono narrativo.
- source_word: וַיֵּאֹר לָהֶם
  english_pob_choice: daybreak came upon them
  chosen_spanish: al amanecer les llegó el día
  alternatives_spanish:
  - el alba se abatió sobre ellos
  - les amaneció
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «se hizo luz para ellos». «Les llegó el día» conserva la imagen idiomática de la llegada de la luz; «al amanecer» sitúa el momento de forma clara en español.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: at Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebrón,
  - a Hebrón
  lexicon: transliteración estándar
  rationale: El topónimo se translitera como «Hebrón». El hebreo locativo se expresa naturalmente con «en» en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la lectura inglesa auditada. Se mantuvo la ambigüedad léxica de קֶבֶר mediante una nota alternativa, y se conservó el idiomatismo de וַיֵּאֹר לָהֶם con una formulación española natural que refleja la metáfora de la luz/del amanecer.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el original lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «sepultaron» para el registro funerario y «tumba» para reflejar la ambigüedad de קבר.
  - Se mantuvo el estilo narrativo sobrio y directo, sin ampliaciones interpretativas.
