    reason: lexical_alternative
  revision_rationale: Se reemplaza la locución coloquial del texto principal por una formulación más transparente y más cercana al hebreo y al expediente inglés revisado. Se corrige la nota [a] para que preserve la correspondencia literal documentada. También se eleva levemente el registro de la cláusula final con 'le dieron muerte', que mantiene el sentido de וַיְמִיתוּהָ con tono más digno.
