translation:
  language: es
  text: Pero a causa de nuestro homicidio sacrílego[a], tú, por la justicia divina[b], soportarás un tormento eterno por fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «homicidio sacrílego»; también: «matanza sacrílega» o «asesinato de los santos».'
    reason: lexical_alternative
  - marker: b
    text: O «el juicio divino»; la expresión griega puede incluir la idea de justicia retributiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: μιεροφονίαν
  english_pob_choice: sacred murder
  chosen_spanish: homicidio sacrílego
  alternatives_spanish:
  - matanza sacrílega
  - asesinato de los santos
  - homicidio de lo sagrado
  lexicon: LSJ
  rationale: El compuesto griego une la idea de matar con una dimensión profanadora o impía. En español, «homicidio sacrílego» conserva la tensión entre violencia homicida y sacrilegio sin suavizarla ni convertirla en una paráfrasis explicativa.
- source_word: αὐτάρκη καρτερήσεις
  english_pob_choice: you will endure
  chosen_spanish: soportarás
  alternatives_spanish:
  - aguantarás
  - resistirás
  - soportarás plenamente
  lexicon: LSJ
  rationale: La forma intensifica la idea de resistencia bajo castigo. «Soportarás» es natural en español y mantiene el sentido de aguantar una prueba o pena con dureza; la nota deja visible la posible fuerza intensiva del griego.
- source_word: θείας δίκης
  english_pob_choice: divine justice
  chosen_spanish: la justicia divina
  alternatives_spanish:
  - el juicio divino
  - la retribución divina
  - la justicia de Dios
  lexicon: LSJ
  rationale: «Justicia divina» preserva el matiz judicial y moral de δίκη sin reducirlo solo a sentencia ni solo a castigo. En español, la construcción es clara y fiel al contexto de retribución.
- source_word: αἰώνιον βάσανον
  english_pob_choice: an eternal torment
  chosen_spanish: un tormento eterno
  alternatives_spanish:
  - una tortura eterna
  - un castigo eterno
  - un suplicio eterno
  lexicon: LSJ
  rationale: «Tormento» reproduce bien βάσανον como sufrimiento intenso y evita imponer una terminología doctrinal posterior. El adjetivo «eterno» conserva la duración marcada por αἰώνιον.
- source_word: διὰ πυρός
  english_pob_choice: by fire
  chosen_spanish: por fuego
  alternatives_spanish:
  - a través del fuego
  - con fuego
  - en fuego
  lexicon: LSJ
  rationale: La preposición con genitivo puede expresar medio o instrumento. «Por fuego» suena natural en español y mantiene la relación instrumental sin añadir explicaciones ajenas al texto.
theological_decisions:
- issue: Alcance de la retribución divina
  english_pob_reading: an eternal torment by fire
  chosen_spanish_reading: un tormento eterno por fuego bajo la justicia divina
  alternative_spanish_readings:
  - un tormento eterno por fuego
  - un castigo eterno por fuego
  - un suplicio eterno por fuego
  rationale: La frase conserva el lenguaje severo y judicial del versículo sin convertirlo en una formulación sistemática posterior. Se mantiene la tensión entre juicio, duración y fuego como medio de castigo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el último pase revisado del inglés, que hizo explícita la fuerza de αὐτάρκη y mantuvo la severidad del castigo. En español, esa fuerza se absorbió en «soportarás», evitando una sobreexplicación, y se preservó el orden natural de la cláusula para lectura pública.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se evitó «SEÑOR» y vocabulario eclesiástico tradicional no motivado por el griego.
  - «Tormento» conserva mejor βάσανον que «tortura» en registro bíblico público español.
  - Las notas al pie mantienen alternativas reales donde el griego admite varias lecturas, sin desactivar la opción principal del texto.
