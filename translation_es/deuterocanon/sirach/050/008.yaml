translation:
  language: es
  text: como flor de Líbano en los días de verano[a], y como un fuego de olíbano sobre la ofrenda de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «como lirios junto a las salidas del agua» aparece en la comparación correspondiente, donde el hebreo aquí dice «como un fuego de olíbano sobre la ofrenda de grano». El texto principal sigue el testimonio hebreo, manteniendo a la vista la tradición griega paralela.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּפֶרַח / ἄνθος
  english_pob_choice: like a blossom
  chosen_spanish: como flor
  alternatives_spanish:
  - como floración
  - como capullo
  lexicon: HALOT
  rationale: El término de comparación pide una imagen vegetal viva y breve. En español, 'flor' comunica con naturalidad la imagen poética sin recargarla; 'blossom' puede ser 'flor' o 'floración', pero aquí la forma breve conserva mejor el paralelismo.
- source_word: לְבָנוֹן / Λιβάνου
  english_pob_choice: of Lebanon
  chosen_spanish: de Líbano
  alternatives_spanish:
  - del Líbano
  - desde Líbano
  lexicon: HALOT
  rationale: La construcción poética se mantiene mejor con un genitivo simple en español. 'De Líbano' reproduce la asociación literaria con la vegetación célebre del lugar sin añadir matiz de procedencia no pedido por el contexto.
- source_word: בִּימֵי קָיִץ / ἐν ἡμέραις θέρους
  english_pob_choice: in the days of summer
  chosen_spanish: en los días de verano
  alternatives_spanish:
  - en tiempo de verano
  - en el verano
  lexicon: HALOT
  rationale: Se conserva la cadencia comparativa y el plural idiomático del hebreo/griego. 'Días de verano' respeta la imagen temporal y no aplana la expresión a un simple 'en verano'.
- source_word: וּכְאֵשׁ
  english_pob_choice: and like a fire
  chosen_spanish: y como una llama
  alternatives_spanish:
  - y como fuego
  - y como un fuego
  lexicon: HALOT
  rationale: El hebreo presenta una comparación con fuego en un contexto de incienso. En español, 'llama' concreta la imagen visual y permite una relación más natural con 'incienso', sin perder el sentido de ardor; la alternativa 'fuego' se conserva como posibilidad implícita pero menos fluida.
- source_word: לְבוֹנָה
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - olíbano
  - franquincienso
  lexicon: HALOT
  rationale: Aquí el referente cultual es el aroma quemado en la ofrenda; en español litúrgico amplio, 'incienso' comunica mejor la imagen al lector que 'franquincienso', aunque ese término es más exacto botánicamente. Se mantiene la tensión porque el contexto sacrificial requiere una sustancia aromática quemada.
- source_word: עַל הַמִּנְחָה
  english_pob_choice: upon the grain offering
  chosen_spanish: sobre la ofrenda vegetal
  alternatives_spanish:
  - sobre la ofrenda de grano
  - sobre la oblación
  lexicon: HALOT
  rationale: Se opta por 'ofrenda vegetal' para reflejar la decisión POB de no diluir el término sacrificial y a la vez evitar una calca poco idiomática. 'Ofrenda de grano' es alternativa clara, pero 'vegetal' preserva el ámbito cultual tradicional en español bíblico y mantiene la relación con la ofrenda ritual.
theological_decisions:
- issue: La tradición hebrea frente al paralelo griego en la segunda comparación
  english_pob_reading: The Hebrew witness is followed for the main text, with the Greek kept in view as a parallel tradition.
  chosen_spanish_reading: Se sigue el testimonio hebreo en el texto principal, con el griego visible como tradición paralela en nota.
  alternative_spanish_readings:
  - Seguir el griego en el texto principal
  - fusionar ambos testimonios en una sola línea
  rationale: 'El paquete de fuente presenta una diferencia material entre los testigos: el hebreo habla de incienso sobre la ofrenda, mientras el griego compara con lirios junto a aguas. La solución española debe respetar el texto base elegido y no borrar el testimonio alterno; por eso se conserva la lectura hebrea y se anota el paralelo griego.'
  doctrine_reference: Principio POB de transparencia textual y auditable reasoning; no armonización no documentada.
- issue: Término sacrificial מִנְחָה
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de grano
  - oblación
  rationale: El contexto es cultual y la imagen culmina en el humo/aroma sobre la ofrenda. 'Ofrenda vegetal' mantiene la categoría sacrificial específica sin reducirla a un genérico. Se evita 'oblación' por su tono más arcaico y menos transparente para lectores modernos.
  doctrine_reference: Consistencia terminológica sacrificial; preferencia por claridad moderna sin perder especificidad ritual.
translation_notes:
  revision_awareness: El contexto auditado muestra una discrepancia mayor entre el hebreo y el paralelo griego en la segunda mitad del verso; la redacción española sigue el hebreo, como en el POB inglés, y documenta la alternativa griega sin mezclar los testimonios. No se introdujeron cambios respecto a la base auditada en la decisión final, salvo la adaptación natural al español.
  spanish_consistency_notes:
  - Se usó 'de Líbano' y 'en los días de verano' para mantener el paralelismo poético y la sintaxis natural en español.
  - '''Ofrenda vegetal'' se emplea como equivalente transparente de מִנְחָה en contexto sacrificial; se evita ''ofrenda'' a secas por pérdida de especificidad.'
  - Se eligió 'incienso' como término cultual comprensible, manteniendo la referencia a una sustancia aromática quemada sobre la ofrenda.
  - La nota al pie marca explícitamente la variante griega sin desplazar la lectura hebrea del texto principal.
