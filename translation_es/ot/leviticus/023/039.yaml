revisions:
- from: Sin embargo[a], el día quince del séptimo mes, cuando hayan recogido[b] la cosecha de la tierra, celebrarán la fiesta de Yahvé por siete días. El primer día habrá un reposo solemne[c], y el octavo día un reposo solemne.
  to: Sin embargo, el día quince del séptimo mes, cuando hayan recogido[a] el producto de la tierra, celebrarán la fiesta de Yahvé[b] por siete días. El primer día habrá un reposo solemne[c], y el octavo día un reposo solemne.
  rationale: Se reubica la nota sobre «fiesta/festividad» al sintagma correcto, se conserva «Sin embargo» sin nota porque refleja bien אַךְ, y se ajusta «la cosecha de la tierra» a «el producto de la tierra» para representar mejor תְּבוּאַת הָאָרֶץ. El resto del versículo se mantiene por fidelidad, claridad y buena alineación terminológica con el proyecto.
