    text: Or "turned toward Shikkeron"; the verb describes the border line changing direction.
    reason: lexical_alternative
  - marker: c
    text: Hebrew "the outgoings of the border were seaward / at the sea"; this likely indicates the border terminated at the Mediterranean on the west.
    reason: lexical_alternative
