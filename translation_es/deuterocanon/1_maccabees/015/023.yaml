translation:
  language: es
  text: y a todas las regiones[a], y a Sampsame, y a los espartanos[b], y a Delos, y a Mindo, y a Sición, y a Caria, y a Samos, y a Panfilia, y a Licia, y a Halicarnaso, y a Cos, y a Side, y a Arad, y a Rodas, y a Fasélide, y a Gortina, y a Cnido, y a Chipre, y a Cirene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos nombres propios tienen formas españolas o inglesas alternativas; por ejemplo, Cos también se escribe Kos, y Cnido puede aparecer como Knidos.
    reason: lexical_alternative
  - marker: b
    text: Sampsame es un topónimo de forma incierta en la transliteración convencional; aquí se sigue de cerca la forma griega.
    reason: cultural_note
lexical_decisions:
- source_word: πάσας τὰς χώρας
  english_pob_choice: all the regions
  chosen_spanish: todas las regiones
  alternatives_spanish:
  - todos los territorios
  - todas las tierras
  - todos los países
  lexicon: LSJ
  rationale: χώρα puede referirse a región, territorio o país; en una lista de destinos, 'regiones' es amplio y natural en español sin introducir la idea moderna de estados-nación.
- source_word: Σαμψάμῃ
  english_pob_choice: Sampsame
  chosen_spanish: Sampsame
  alternatives_spanish:
  - Sampsama
  - Sampsáme
  lexicon: LSJ
  rationale: Es un nombre propio de lugar en dativo. Se conserva una transliteración cercana al griego porque la forma convencional en español no es segura.
- source_word: Σπαρτιάταις
  english_pob_choice: the Spartans
  chosen_spanish: los espartanos
  alternatives_spanish:
  - los spartanos
  - los de Esparta
  lexicon: LSJ
  rationale: El plural étnico designa al pueblo de Esparta, no solo a la ciudad. 'Los espartanos' comunica bien el referente en español.
- source_word: καὶ εἰς ...
  english_pob_choice: and to ...
  chosen_spanish: y a ...
  alternatives_spanish:
  - y hacia ...
  - y para ...
  lexicon: LSJ
  rationale: La repetición de εἰς con nombres de lugar funciona idiomáticamente como destino o destinatario de envío; 'y a' es la forma más natural en español.
- source_word: τὴν Καρίδα
  english_pob_choice: Caria
  chosen_spanish: Caria
  alternatives_spanish:
  - la región de Caria
  lexicon: LSJ
  rationale: Se trata de la región llamada Caria; en español normal se omite el artículo con nombres regionales.
- source_word: τὴν Παμφυλίαν καὶ Λυκίαν
  english_pob_choice: Pamphylia and Lycia
  chosen_spanish: Panfilia y Licia
  alternatives_spanish:
  - la Panfilia y Licia
  lexicon: LSJ
  rationale: Ambos son nombres geográficos; 'Panfilia' y 'Licia' son las transliteraciones usuales y naturales en español bíblico.
- source_word: Κῶ
  english_pob_choice: Cos
  chosen_spanish: Cos
  alternatives_spanish:
  - Kos
  lexicon: LSJ
  rationale: Cos es la forma castellanizada y tradicional; se mantiene para legibilidad, con la alternativa más cercana al griego en nota.
- source_word: Ἁλικαρνασσὸν
  english_pob_choice: Halicarnassus
  chosen_spanish: Halicarnaso
  alternatives_spanish:
  - Halicarnaso
  lexicon: LSJ
  rationale: La ciudad suele aparecer en español como Halicarnaso; es una forma estable y plenamente reconocible.
- source_word: Ἄραδον
  english_pob_choice: Aradus
  chosen_spanish: Arado
  alternatives_spanish:
  - Arad
  lexicon: LSJ
  rationale: El griego refleja la forma helenizada del nombre; en español, 'Arado' reproduce esa forma tradicional. Se evita forzar una adaptación moderna sin apoyo textual.
- source_word: Κνίδον
  english_pob_choice: Cnidus
  chosen_spanish: Cnido
  alternatives_spanish:
  - Knido
  - Cnidus
  lexicon: LSJ
  rationale: En español bíblico clásico y académico puede aparecer Cnido; conserva la relación con la forma griega y es más natural que un calco excesivo.
- source_word: Κύπρον
  english_pob_choice: Cyprus
  chosen_spanish: Chipre
  alternatives_spanish:
  - Kíprōs
  - Cipro
  lexicon: LSJ
  rationale: 'El nombre de la isla tiene forma española plenamente establecida: Chipre.'
theological_decisions:
- issue: Lista geográfica de destinatarios sin carga doctrinal explícita
  english_pob_reading: The verse is rendered as a dispatch list of places and peoples, without theological expansion.
  chosen_spanish_reading: La versión mantiene un inventario geográfico sencillo, sin ampliar ni espiritualizar los nombres.
  alternative_spanish_readings:
  - interpretar la lista como una enumeración simbólica
  - parafrasear los nombres como destinos generales
  rationale: No hay contenido doctrinal directo en el versículo; la fidelidad exige conservar la forma administrativa y enumerativa del texto griego.
  doctrine_reference: Principio de literalidad controlada en listas nominales; no aplica una doctrina específica.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el texto griego y el audit trail inglés permanecen en alto acuerdo, así que se preserva la enumeración y la transliteración cercana de los nombres propios.
  spanish_consistency_notes:
  - Se usa 'y a' de manera uniforme para reproducir la repetición de εἰς en la lista.
  - Se conservan los nombres propios con una mezcla de formas castellanizadas estables y transliteraciones cercanas, según el uso español más reconocible.
  - No se añadieron artículos donde el español geográfico normal los omite, para mantener fluidez sin alterar el sentido.
