review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo general: Dios no permitió la opresión de los patriarcas y reprendió a reyes en relación con ellos. Las decisiones principales («permitió», «nadie», «oprimiera», «reprendió», «reyes») están alineadas con el texto fuente y con el audit trail inglés. Sin embargo, la nota al pie introduce una alternativa española incorrecta para עֲלֵיהֶם.'
  spanish_quality_summary: El español es claro, natural y de registro digno. «No permitió que nadie los oprimiera» suena idiomático y preserva bien el valor del hebreo. «Por causa de ellos» es aceptable, aunque algo más natural podría ser «por ellos» o «por causa de ellos» según preferencia editorial. El problema principal no está en el texto principal sino en la formulación de la nota.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos de glosario sensibles como Yahvé, Mesías, esclavo, etc. La equivalencia léxica central se mantiene fiel al rationale documentado.
  issues:
  - severity: medium
    issue: 'La nota al pie contiene una alternativa española errónea: «porque de ellos».'
    rationale: El inglés auditado dice «Or 'for their sake' or 'because of them.'». En español, «porque de ellos» no es una formulación válida ni natural para expresar esa alternativa semántica. Debe corregirse a «por ellos», «por su causa» o «a causa de ellos», según el matiz que se quiera preservar.
  revised_spanish_text: No permitió que nadie los oprimiera[a], y reprendió a reyes por causa de ellos.
  revised_footnotes:
  - marker: a
    text: 'También: «por ellos» o «a causa de ellos».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Solo se corrige la nota al pie para reflejar de manera idiomática y exacta las alternativas documentadas para עֲלֵיהֶם.
