  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> ''Yahvé''; בית יהוה -> ''casa de Yahvé''; עֲבֹדָה -> ''servicio''. No hay conflictos doctrinales. La única desalineación práctica es que la nota lexical_alternative fue aplicada al término equivocado.'
