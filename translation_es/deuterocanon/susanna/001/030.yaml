translation:
  language: es
  text: Entonces la mandaron a llamar, y ella vino con sus padres, sus hijos y todos sus parientes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ δὲ ἀπέστειλαν
  english_pob_choice: So they sent for her
  chosen_spanish: Entonces los mandaron a llamar
  alternatives_spanish:
  - Y la enviaron a ella
  - Entonces la enviaron a llamar
  lexicon: BDAG
  rationale: ἀπέστειλαν, en este contexto narrativo, expresa la acción de convocarla para que compareciera, no simplemente el envío de un objeto o mensajero. En español, «mandaron a llamar» reproduce bien ese sentido idiomático y mantiene el matiz de convocatoria.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa de forma natural con «vino». Evita una formulación demasiado interpretativa y conserva la sencillez del griego.
- source_word: οἱ γονεῖς αὐτῆς
  english_pob_choice: her parents
  chosen_spanish: sus padres
  alternatives_spanish:
  - su padre y su madre
  lexicon: BDAG
  rationale: γονεῖς es plural y significa «padres». «Sus padres» es la equivalencia directa y natural en español; expandir a «su padre y su madre» añadiría especificidad no explicitada en el griego.
- source_word: τὰ τέκνα αὐτῆς
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: BDAG
  rationale: τέκνα en este listado familiar se traduce con el equivalente normal «hijos», que en español incluye el sentido de children sin sonar técnico.
- source_word: πάντες οἱ συγγενεῖς αὐτῆς
  english_pob_choice: all her relatives
  chosen_spanish: todos sus parientes
  alternatives_spanish:
  - todos sus familiares
  - todos sus deudos
  lexicon: BDAG
  rationale: συγγενεῖς denota parientes o relaciones de sangre/familia de modo amplio. «Parientes» es preciso y más cercano al registro bíblico que «familiares», sin caer en arcaísmo.
- source_word: οἱ δὲ
  english_pob_choice: So they
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ aquí marca continuidad narrativa más que contraste fuerte. «Entonces» comunica el avance de la acción con naturalidad en español.
