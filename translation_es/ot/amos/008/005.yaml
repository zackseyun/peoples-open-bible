    rationale: Aunque semánticamente correcto, «luna nueva» comunica mejor la observancia reconocible para lectores hispanohablantes y sigue fielmente la decisión inglesa «new moon».
  - severity: low
    issue: La puntuación alrededor de la cláusula final puede mejorarse.
    rationale: Una coma integra mejor en español la serie de infinitivos/resultados fraudulentos que una raya con espacios, sin alterar el sentido.
