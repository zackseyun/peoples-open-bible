review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura imperativa del hebreo y capta el sentido general: mandato de huir/desplazarse hacia Tarsis y llamado al duelo para los habitantes del ámbito marítimo. Sin embargo, dos elecciones no siguen de cerca el expediente inglés ni el mejor español contextual: «hasta Tarsis» introduce un matiz de límite/alcance no presente en el he direccional, y «lamentaos» en español suele significar ‘arrepentirse/sentir pesar por uno mismo’ más que dar un grito de duelo; el hebreo הֵילִילוּ pide algo como «giman» o «aúllen».'
  spanish_quality_summary: El texto es comprensible, pero «hasta Tarsis» suena menos preciso que «a Tarsis», y «moradores» es legible aunque más natural hoy sería «habitantes». «Giman» ofrece un español moderno, digno y claro para el clamor de duelo profético. «Costa» funciona, pero «costa marítima» en nota ya cubre la alternativa; el texto principal puede quedar en «la costa».
  glossary_alignment: No hay términos teológicos de proyecto en juego. La principal alineación léxica requerida es respetar עבר como movimiento «cruzar/pasar», תַּרְשִׁישָׁה como dirección «a Tarsis», הֵילִילוּ como clamor de duelo intenso, y אִי como «costa/isla/coastland» con nota alternativa. Se conserva la nota de «isla»; se ajusta el verbo de duelo para corresponder mejor a «wail».
  issues:
  - severity: medium
    issue: «hasta Tarsis» para תַּרְשִׁישָׁה
    rationale: El he direccional indica movimiento hacia un destino, no ‘hasta’ en sentido de límite o alcance. «A Tarsis» es la correspondencia más fiel y natural en español.
  - severity: medium
    issue: «lamentaos» para הֵילִילוּ
    rationale: Aunque relacionado con duelo, en español moderno «lamentarse» no transmite bien el imperativo de emitir un clamor de aflicción. «Giman» o «aúllen» reflejan mejor el valor de ילל y el audit trail inglés «wail».
  - severity: low
    issue: «moradores» suena más literario/arcaizante que necesario
    rationale: No es incorrecto, pero «habitantes» corresponde mejor al expediente inglés «inhabitants of» y al español eclesial moderno.
  revised_spanish_text: Crucen a Tarsis; giman[a], habitantes de la costa[b].
  revised_footnotes:
  - marker: a
    text: O «aúllen»; el hebreo puede expresar un grito de duelo intenso.
