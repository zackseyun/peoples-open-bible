    rationale: 'La nota comienza con un apóstrofo/comilla innecesario y termina con una explicación poco natural: «dominado por ella». Debe formularse con español más claro y correcto, manteniendo la explicación metafórica del inglés POB.'
  revised_spanish_text: Entonces no les bastó errar[a] acerca del conocimiento de Dios, sino que también, viviendo en una gran guerra de ignorancia[b], llaman paz a tan grandes males.
