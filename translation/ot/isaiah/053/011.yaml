theological_decisions:
- issue: Interpretation of בְּדַעְתּוֹ
  chosen_reading: 'subjective/instrumental: ''by his knowledge'''
  alternative_readings:
  - 'objective: ''by knowledge of him'''
  rationale: The Hebrew suffix most directly points to the servant's own knowledge, but the phrase is genuinely ambiguous and has been understood by many as referring to others' knowledge of the servant. To preserve theological tension rather than resolve it, the main text follows the more immediate grammatical reading and the alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Textual form of יִרְאֶה
  chosen_reading: MT 'he will see' without explicit object
  alternative_readings:
  - '''he will see light'' based on Dead Sea Scrolls and Septuagintal support'
  rationale: The provided source text is the Masoretic Text and lacks 'light.' Following original-language primacy for the given text, the main translation does not add 'light,' but the well-known textual variant is important enough to preserve in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Scope of לָרַבִּים
  chosen_reading: '''many'''
  alternative_readings:
  - '''the many'''
  rationale: The Hebrew says 'many,' and the translation should not expand this to 'all' for theological harmonization. 'Many' preserves the wording while leaving broader doctrinal synthesis to readers and theology, not the translation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
