revisions:
- from: 'Entonces alzó su discurso y dijo: «La declaración de Balaam hijo de Beor[a], la declaración del varón de ojo abierto[b]»'
  to: 'Entonces pronunció su discurso y dijo: «La declaración de Balaam hijo de Beor, la declaración del hombre cuyo ojo es abierto[a]»'
  rationale: Se ajusta el inicio para un español más natural sin perder la fuerza formularia del hebreo; se elimina una nota onomástica innecesaria; y se reformula la frase final para reflejar mejor el singular hebreo y la elección del audit trail, conservando en nota la ambigüedad textual documentada.
