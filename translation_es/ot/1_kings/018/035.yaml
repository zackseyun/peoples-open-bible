- from: Y el agua rodeó por completo el altar, y también llenó la zanja con agua.
  to: Y el agua corrió alrededor del altar[a], y también llenó la zanja[b] con agua.
  rationale: Se ajusta el verbo principal para preservar mejor el movimiento expresado por וַיֵּלְכוּ con ‘el agua’ como sujeto, evitando una formulación demasiado interpretativa. Se añaden notas léxicas para reflejar el expediente auditado del POB sobre el verbo y sobre תְּעָלָה.
