  rationale: Se ajusta הָאָרֶץ para alinearlo mejor con la decisión contextual del POB, manteniendo una nota que conserve la alternativa léxica. Se cambia 'Mira' por 'He aquí' para reflejar mejor הִנֵּה en registro profético. También se pule el estilo español reduciendo pronombres innecesarios y mejorando la puntuación.
