- from: El rey Ciro de Persia los sacó por medio de Mithredat[a], el tesorero, y los contó uno por uno a Sesbasar[b], el príncipe de Judá.
  to: El rey Ciro de Persia los sacó por medio de Mithredat[a], el tesorero, y los contó uno por uno para entregárselos a Sesbasar[b], el príncipe de Judá.
  rationale: Se conserva el contenido del borrador, pero se corrige la construcción verbal para que el español exprese con más naturalidad el conteo en función de la entrega, acorde con 'counted them out to'. También se limpia la redacción de la nota [a] sin cambiar su contenido esencial.
