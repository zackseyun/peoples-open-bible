- from: Entonces Jacob se levantó y puso a sus hijos y a sus esposas sobre los camellos[a].
  to: Entonces Jacob se levantó y puso a sus hijos varones y a sus esposas en los camellos[a].
  rationale: Se ajusta «hijos» a «hijos varones» para reflejar la decisión documentada de conservar el masculino específico de בָּנָיו, y se cambia «sobre los camellos» por «en los camellos» para una lectura más natural en español, conservando la otra posibilidad en nota.
