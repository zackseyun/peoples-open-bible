translation:
  language: es
  text: 'Esta fue la herencia de la tribu de los hijos de Isacar[a], según sus clanes: las ciudades y sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta es la herencia ...». El hebreo es una cláusula nominal sin verbo expreso; en español puede verterse con presente o pasado en esta fórmula de resumen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: Se trata de una cláusula nominal hebrea sin verbo explícito. En español, «Esta fue» conserva el valor retrospectivo del inventario territorial y sigue la opción de pasado adoptada en la auditoría inglesa, sin introducir información nueva.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la posesión
  - el reparto
  - la asignación
  lexicon: HALOT
  rationale: En Josué, נַחֲלָה designa la porción territorial recibida como herencia. «Herencia» comunica mejor ese valor de tierra recibida por asignación pactal que un término meramente administrativo como «asignación».
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  - grupo tribal
  lexicon: HALOT
  rationale: En contextos de repartición territorial, מַטֶּה funciona como el término estándar para una tribu. «Tribu» es la equivalencia natural y fiel en español.
- source_word: בְנֵי יִשָּׂשכָר
  english_pob_choice: the sons of Issachar
  chosen_spanish: los hijos de Isacar
  alternatives_spanish:
  - los descendientes de Isacar
  - el pueblo de Isacar
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica del hebreo. «Hijos de Isacar» reproduce con claridad el marco tribal de descendencia que la POB inglesa mantiene con «sons of Issachar».
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - por sus familias
  - de acuerdo con sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת aquí alude a subdivisiones tribales. «Clanes» preserva mejor esa unidad menor dentro de la tribu que «familias», y «según» refleja bien el לְ distributivo.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las poblaciones
  - los poblados
  lexicon: HALOT
  rationale: עָרִים se refiere a centros habitados. «Ciudades» sigue la convención de Josué y mantiene el tono de lista territorial.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: and their villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus pueblos
  - y sus asentamientos
  - y sus caseríos
  lexicon: HALOT
  rationale: חָצֵר en estas listas de territorio designa asentamientos rurales dependientes de la ciudad. «Aldeas» es una equivalencia clara y ampliamente entendible en español; aunque «aldeas» no es idéntico a cada posible matiz de «villages», comunica bien la distinción frente a «ciudades».
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y la auditoría inglesa: conserva la cláusula nominal, el lenguaje de herencia territorial, la fórmula tribal genealógica y la lista final de ciudades y aldeas. No se detectaron revisiones aplicadas en la fuente inglesa reciente.'
  spanish_consistency_notes:
  - Se mantiene «Isacar» como forma española normal del nombre propio.
  - Se usa «clanes» para מִשְׁפָּחוֹת por coherencia con lenguaje territorial bíblico, evitando reducirlo a «familias».
  - Se emplea «aldeas» para חַצְרֵי como término natural en español; la diferencia ciudad/aldea conserva la estructura contrastiva del hebreo.
