revisions:
- from: 'Y Yahvé me dijo[a]: «Levántate, baja rápidamente de aquí, porque tu pueblo, que tú sacaste de Egipto, se ha corrompido. Se han apartado rápidamente del camino que les mandé; se han hecho una imagen de fundición».'
  to: 'Y Yahvé me dijo: «Levántate, baja rápidamente de aquí, porque tu pueblo, que tú sacaste de Egipto, se ha corrompido. Se han apartado rápidamente del camino que les mandé; se han hecho para sí mismos una imagen de fundición[a]».'
  rationale: Se corrige la construcción de עָשׂוּ לָהֶם para expresar el sentido benefactivo reflexivo ('para sí mismos') sin introducir la ambigüedad de 'se han hecho una imagen'. También se mueve el anclaje de la nota al término que realmente explica, 'imagen de fundición'. No se requieren cambios adicionales.
  reviewer_model: gpt-5.4
