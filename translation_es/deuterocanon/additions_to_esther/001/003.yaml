translation:
  language: es
  text: Era de la cautividad[a] que Nabucodonosor, rey de Babilonia, había llevado al cautiverio desde Jerusalén, junto con Jeconías, rey de Judá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de entre los cautivos’ o ‘del cautiverio’. El griego dice literalmente ‘de la cautividad’.
    reason: lexical_alternative
  - marker: b
    text: ‘Judá’ refleja mejor el referente histórico-dinástico del texto; ‘Judea’ sería una forma más geográfica.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: from the captivity
  chosen_spanish: de entre la cautividad
  alternatives_spanish:
  - de la cautividad
  - entre los cautivos
  - de entre los exiliados
  lexicon: BDAG
  rationale: El griego usa ἐκ con αἰχμαλωσία, una expresión de procedencia ligada a la condición de cautiverio. 'De entre la cautividad' conserva la idea de origen/procedencia y evita borrar la fuerza nominal singular del término griego. 'Entre los cautivos' interpreta más libremente el conjunto, y 'exiliados' suaviza el matiz de cautiverio.
- source_word: ᾐχμαλώτευσεν
  english_pob_choice: had carried away
  chosen_spanish: había llevado cautiva
  alternatives_spanish:
  - había deportado
  - había llevado en cautiverio
  - había tomado cautivo
  lexicon: BDAG
  rationale: El verbo expresa la acción de hacer cautivos y llevarlos lejos por la fuerza. 'Había llevado cautiva' comunica el movimiento forzado sin introducir un tecnicismo moderno y mantiene el paralelismo con la 'cautividad' del miembro anterior.
- source_word: Ναβουχοδονόσορ
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nebucadrezar
  lexicon: tradición bíblica española
  rationale: Se conserva la forma castellana bíblica ampliamente reconocible. Aunque el griego presenta una transliteración, la tradición española admite 'Nabucodonosor' como forma clara y estable.
- source_word: μετὰ Ἰεχονίου
  english_pob_choice: with Jeconiah
  chosen_spanish: junto con Jeconías
  alternatives_spanish:
  - con Jeconías
  - acompañado de Jeconías
  lexicon: uso bíblico español
  rationale: μετά con genitivo indica acompañamiento. 'Junto con' transmite bien la asociación sin forzar una relación causal o jerárquica.
- source_word: τῆς Ἰουδαίας
  english_pob_choice: of Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - de Judea
  - de la tierra de Judá
  lexicon: BDAG
  rationale: Aunque el inglés auditado osciló entre 'Judea' y 'Judah', la revisión final favorece 'Judah' para este contexto real. En español, 'Judá' refleja mejor el referente dinástico/territorial del rey Jeconías que 'Judea', que suena más geográfico e histórico posterior.
theological_decisions:
- issue: Cómo traducir la condición de cautiverio sin diluir la violencia del exilio
  english_pob_reading: He was from the captivity ... had carried away
  chosen_spanish_reading: Estaba de entre la cautividad ... había llevado cautiva
  alternative_spanish_readings:
  - Estaba entre los exiliados ... había deportado
  - Procedía de la cautividad ... había tomado cautivo
  rationale: La frase es histórica y de identificación, no doctrinal. Se preserva el sentido de expulsión forzada y cautiverio sin interpretar más de lo que dice el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Posible ambigüedad entre 'Judah' y 'Judea' en el referente histórico
  english_pob_reading: king of Judah
  chosen_spanish_reading: rey de Judá
  alternative_spanish_readings:
  - rey de Judea
  - rey del reino de Judá
  rationale: El contexto del rey Jeconías y la genealogía real favorecen 'Judá' como forma más natural y fiel al referente bíblico. 'Judea' podría sonar anacrónica o demasiado geográfica para este pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: Se tomó en cuenta el pass de revisión más reciente, que prefirió 'Judah' frente a 'Judea' para τῆς Ἰουδαίας. La redacción española sigue esa decisión y conserva el tono histórico del griego, manteniendo también la literalidad controlada de ἐκ τῆς αἰχμαλωσίας y ᾐχμαλώτευσεν.
  spanish_consistency_notes:
  - Se mantiene 'cautividad' para αἰχμαλωσία, en línea con el énfasis del audit trail.
  - Se conserva el nombre bíblico 'Nabucodonosor' en forma castellana estándar.
  - '''Jeconías'' y ''Judá'' siguen el registro bíblico español más transparente para este contexto.'
  - Las notas a pie distinguen entre una alternativa lexical y una observación cultural/histórica, sin mezclar ambas.
