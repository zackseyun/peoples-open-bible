    text: Or 'guest-gifts' for 'hospitality'; the Greek ξένια can refer to hospitality shown to a guest or to gifts associated with guest-friendship.
    reason: lexical_alternative
  - marker: b
    text: '''Gifts'' here carries the sense of favors that can corrupt judgment; the Greek does not explicitly say ''bribes.'''
    reason: lexical_alternative
