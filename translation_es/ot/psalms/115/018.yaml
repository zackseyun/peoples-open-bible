translation:
  language: es
  text: Pero nosotros bendeciremos a Yah[a] desde ahora y para siempre. ¡Alaben a Yah![b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Yah», forma corta poética del nombre divino; algunas traducciones tradicionales lo representan como «el SEÑOR».
    reason: alternative_reading
  - marker: b
    text: Hebreo «¡Alaben a Yah!». Esta expresión es la fuente de la forma litúrgica transliterada «Aleluya».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנַחְנוּ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Y nosotros
  - Pero en cuanto a nosotros
  lexicon: HALOT
  rationale: La partícula conjuntiva con el pronombre independiente expresa contraste con el contexto anterior; «Pero nosotros» conserva ese contraste de manera natural en español y mantiene el sujeto explícito.
- source_word: נְבָרֵךְ
  english_pob_choice: will bless
  chosen_spanish: bendeciremos
  alternatives_spanish:
  - bendeciremos a
  - alabaremos
  - bendeciremos
  lexicon: HALOT
  rationale: El piel imperfecto en primera persona plural expresa resolución/futuro del grupo; «bendeciremos» reproduce ese valor de compromiso continuo de la comunidad.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yah
  - el SEÑOR
  lexicon: HALOT
  rationale: Aunque el inglés POB preserva la forma breve «Yah» para la transliteración, en español la forma litúrgica transparente y ya establecida es «Yahvé». Se mantiene la distinción respecto del tetragrama pleno en el marco del nombre abreviado poético, sin usar la máscara tradicional «SEÑOR».
- source_word: מֵעַתָּה
  english_pob_choice: from now
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de ahora en adelante
  - desde este momento
  lexicon: HALOT
  rationale: La expresión señala el punto presente como inicio de una continuidad; «desde ahora» es claro, actual y fiel al alcance temporal.
- source_word: וְעַד עוֹלָם
  english_pob_choice: and forever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y para eternidad
  - y para siempre jamás
  lexicon: HALOT
  rationale: El modismo expresa duración sin fin; «para siempre» comunica de forma idiomática y digna el horizonte ilimitado del hebreo.
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alabad a Yahvé!
  alternatives_spanish:
  - ¡Alaben a Yahvé!
  - ¡Aleluya!
  lexicon: HALOT
  rationale: El imperativo plural con el nombre breve es la base de «Hallelujah». Se traduce por un imperativo litúrgico castellano; «¡Alabad a Yahvé!» conserva la fuerza exhortativa y la referencia al nombre divino. Se evita «¡Aleluya!» porque en español es una forma litúrgica ya lexicalizada y menos transparente al hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino breve יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yah
  - el SEÑOR
  rationale: El texto hebreo usa la forma breve poética del nombre divino. La política general del proyecto favorece «Yahvé» para el nombre divino en español, y aquí se conserva esa referencia sin neutralizarla con «SEÑOR». Aunque la forma «Yah» sería más cercana como transliteración, «Yahvé» es la opción estable y reverente para lectura pública en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms table entry for יהוה / YHWH; policy for preserving divine-name transparency in Spanish'
- issue: Relación entre «bendecir» y la alabanza litúrgica final
  english_pob_reading: But we will bless Yah ... Praise Yah!
  chosen_spanish_reading: Pero nosotros bendeciremos a Yahvé ... ¡Alabad a Yahvé!
  alternative_spanish_readings:
  - Pero nosotros alabaremos a Yahvé ... ¡Alabad a Yahvé!
  - Pero nosotros bendeciremos a Yahvé ... ¡Aleluya!
  rationale: El primer verbo mantiene el valor de bendecir/prometer bendición; el cierre imperativo conserva la dimensión de exhortación litúrgica. Traducir ambos como «alabar» borraría la diferencia verbal del hebreo, por lo que se conserva «bendecir» en la primera cláusula y «alabad» en la segunda.
  doctrine_reference: 'DOCTRINE.md: preserve lexical distinctions in doxological formulas; translation philosophy on auditable lexical choices'
translation_notes:
  revision_awareness: Se revisó el borrador para asegurar que todo marcador de nota aparezca exactamente en el texto. También se evitó reproducir la coma innecesaria tras el nombre divino, siguiendo la revisión más reciente del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de nombre divino en español, conforme a las pautas del proyecto, sin sustituirlo por «SEÑOR».
  - Se conserva la distinción entre «bendeciremos» y «¡Alabad!» para reflejar la diferencia entre la bendición declarativa y la exhortación litúrgica final.
  - La frase temporal «desde ahora y para siempre» expresa con naturalidad el hebreo מֵעַתָּה וְעַד עוֹלָם.
  - La exclamación final se presenta como imperativo plural en registro culto y publicable.
