id: JDG.18.10
reference: Judges 18:10
source:
  edition: WLC
  text: כְּ/בֹאֲ/כֶ֞ם תָּבֹ֣אוּ אֶל עַ֣ם בֹּטֵ֗חַ וְ/הָ/אָ֨רֶץ֙ רַחֲבַ֣ת יָדַ֔יִם כִּֽי נְתָנָ֥/הּ אֱלֹהִ֖ים בְּ/יֶדְ/כֶ֑ם מָקוֹם֙ אֲשֶׁ֣ר אֵֽין שָׁ֣ם מַחְס֔וֹר כָּל דָּבָ֖ר אֲשֶׁ֥ר בָּ/אָֽרֶץ׀־־־־׃
translation:
  text: When you go[a], you will come to a secure people, and the land is broad; for God has given it into your hand[b], a place where there is no lack of anything that is in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a people dwelling securely' or 'an unsuspecting people.' The Hebrew describes a people living in a sense of safety.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'broad of hands,' a Hebrew idiom for a spacious land.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/בֹאֲ/כֶם ... תָּבֹאוּ
  chosen: When you go, you will come
  alternatives:
  - As you come, you will come
  - When you arrive, you will come
  lexicon: HALOT
  rationale: The construction combines an infinitive construct with suffix ('when/at your coming') and a finite verb ('you will come'). In English, 'When you go, you will come' preserves the sequential force without awkward literalism. Given the scouting/attack context, it signals the point of arrival.
- source_word: עַם בֹּטֵחַ
  chosen: a secure people
  alternatives:
  - a people dwelling securely
  - an unsuspecting people
  - a confident people
  lexicon: HALOT
  rationale: בֹּטֵחַ denotes security/trust. 'Secure people' captures their sense of safety without over-interpreting as moral confidence. 'Unsuspecting' is contextually possible but more interpretive than the Hebrew itself.
- source_word: וְהָאָרֶץ רַחֲבַת יָדַיִם
  chosen: and the land is broad on both sides
  alternatives:
  - and the land is spacious
  - and the land is wide of hands
  - and the land is broad
  lexicon: HALOT
  rationale: The idiom רַחֲבַת יָדַיִם literally means 'broad of hands,' an idiomatic expression for spaciousness or ample extent. 'Broad on both sides' preserves some of the concrete imagery of 'hands' while remaining natural English. 'Spacious' is possible but less image-rich.
- source_word: כִּי נְתָנָהּ אֱלֹהִים בְּיֶדְכֶם
  chosen: for God has given it into your hand
  alternatives:
  - for God has given it into your hands
  - for God is giving it into your hand
  lexicon: HALOT
  rationale: The perfect verb presents the gift as assured from the speakers' perspective. 'Has given' reflects that certainty. The singular 'your hand' follows the Hebrew idiom בְּיָד, often collective with a plural suffix in English either singular or plural; singular better preserves the idiom.
- source_word: מָקוֹם
  chosen: a place
  alternatives:
  - a region
  - a location
  lexicon: HALOT
  rationale: מָקוֹם is straightforwardly 'place' here, introducing an appositional description of the territory.
- source_word: אֲשֶׁר אֵין שָׁם מַחְסוֹר
  chosen: where there is no lack
  alternatives:
  - where there is no want
  - where nothing is lacking
  lexicon: HALOT
  rationale: מַחְסוֹר denotes lack, need, or deficiency. 'No lack' is concise and natural, preserving the abundance motif.
- source_word: כָּל דָּבָר אֲשֶׁר בָּאָרֶץ
  chosen: of anything that is in the land
  alternatives:
  - of any thing on the earth
  - of anything on earth
  - of anything in the הארץ
  lexicon: HALOT
  rationale: In context, הָאָרֶץ refers to the land/territory under discussion, not the whole earth. Thus 'in the land' is preferable. The phrase means there is no deficiency of anything found in that land.
