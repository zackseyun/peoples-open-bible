base_translation:
  language: en
  yaml_path: translation/ot/leviticus/017/004.yaml
  text: 'and has not brought it to the entrance of the tent of meeting to present it as an offering to Yahweh before the tabernacle of Yahweh[a], blood shall be imputed to that man: he has shed blood[c][b], and that man shall be cut off from among his people.'
  footnotes:
  - marker: a
    text: Hebrew literally, 'blood shall be counted to that man.' The phrase means liability for bloodshed, hence 'bloodguilt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'blood shall be imputed to that man.'
    reason: alternative_reading
  - marker: c
    text: '''Shall be cut off'' does not specify here whether the penalty is death, expulsion, or another form of covenantal removal.'
    reason: cultural_note
