review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: Husai/Hushai llega a la ciudad y Absalón llega a Jerusalén. También preserva correctamente ''amigo de David'' y ''la ciudad''. Sin embargo, la nota al pie actual no corresponde al texto español, porque presenta como alternativa exactamente la misma lectura que ya aparece en el cuerpo del texto, en vez de conservar la alternativa documentada en el audit trail inglés (''entró en / entró a Jerusalén'').'
  spanish_quality_summary: El español es claro, natural y legible. No obstante, conviene hispanizar el nombre propio como 'Husai', forma bíblica más normal en español, en lugar de mantener la transliteración inglesa 'Hushai'. Además, la nota debe corregirse para que aporte una alternativa real y no redundante.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. ''Amigo de David'', ''la ciudad'' y ''Jerusalén'' están bien alineados con las decisiones del POB. La principal mejora es onomástica: en español bíblico general, ''חוּשַׁי'' se lee mejor como ''Husai'' que como ''Hushai''.'
  issues:
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real
    rationale: El texto principal ya dice 'y Absalón llegó a Jerusalén', pero la nota repite esa misma formulación como si fuera variante. Según el audit trail inglés, la alternativa relevante es 'entró en/entró a Jerusalén'.
  - severity: low
    issue: Forma del nombre 'Hushai' poco natural en español
    rationale: Aunque comprensible, 'Hushai' sigue la transliteración inglesa. Para una Biblia en español de lectura eclesial amplia, 'Husai' resulta más idiomático y reconocible sin pérdida de fidelidad.
  revised_spanish_text: Así que Husai, amigo de David, llegó a la ciudad, y Absalón llegó a Jerusalén.[a]
  revised_footnotes:
  - marker: a
    text: O 'y Absalón entró en Jerusalén'. La conjunción hebrea puede leerse simplemente como 'y', y el verbo también puede verterse como pasado simple con el sentido de 'entró'.
    reason: alternative_reading
  revision_rationale: Se corrige la nota para que preserve una alternativa genuina documentada por el audit trail y se hispaniza el nombre propio a 'Husai' para mejorar la naturalidad y la convención bíblica en español. El resto del versículo permanece fiel al hebreo y al POB.
