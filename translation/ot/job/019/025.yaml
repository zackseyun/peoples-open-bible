theological_decisions:
- issue: Identity and function of Job's גֹּאֵל
  chosen_reading: Rendered broadly as 'my Redeemer' without specifying whether Job means God directly, a heavenly witness, or a messianically construed redeemer.
  alternative_readings:
  - my vindicator
  - my kinsman-redeemer
  rationale: The verse has been read christologically in Christian tradition, but the Hebrew itself does not explicitly identify the figure. The translation preserves the term's theological resonance while avoiding doctrinal over-resolution beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Eschatological force of וְאַחֲרוֹן ... יָקוּם
  chosen_reading: Translated as 'and afterward he will rise over the dust' rather than a more explicit resurrection formula.
  alternative_readings:
  - and at the last he will stand upon the earth
  - and as the last one he will stand over the dust
  rationale: This clause is syntactically and theologically contested. The chosen rendering stays close to the Hebrew and avoids importing a fully developed resurrection statement into the main text while preserving major alternatives in footnotes.
  doctrine_reference: Preserve theological tension rather than resolve it.
