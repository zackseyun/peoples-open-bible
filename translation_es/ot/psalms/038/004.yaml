translation:
  language: es
  text: No hay nada sano en mi carne a causa de tu indignación[a]; no hay paz[b] en mis huesos a causa de mi pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ira'.
    reason: lexical_alternative
  - marker: b
    text: O 'bienestar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְתֹם
  english_pob_choice: soundness
  chosen_spanish: sanidad
  alternatives_spanish:
  - integridad
  - salud
  lexicon: HALOT
  rationale: El hebreo expresa una condición de completo bienestar o estado sano. En español, 'sanidad' comunica bien esa idea en un contexto corporal y mantiene la fuerza de la imagen sin volverla técnica ni médica en exceso. 'Integridad' sería más abstracto; 'salud' es posible, pero algo menos preciso para la resonancia poética del verso.
- source_word: בִּבְשָׂרִי
  english_pob_choice: in my flesh
  chosen_spanish: en mi carne
  alternatives_spanish:
  - en mi cuerpo
  lexicon: HALOT
  rationale: '''Carne'' preserva el paralelismo y la imaginería concreta del hebreo בשר. ''Cuerpo'' sería más interpretativo y suavizaría la literalidad del texto. En español bíblico actual, ''carne'' sigue siendo claro y fiel.'
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: La preposición aquí marca causalidad. 'A causa de' es natural en español y mantiene el valor causal de manera explícita, como en el audit trail inglés.
- source_word: זַעְמֶךָ
  english_pob_choice: your indignation
  chosen_spanish: tu indignación
  alternatives_spanish:
  - tu ira
  - tu enojo
  lexicon: HALOT
  rationale: '''Indignación'' conserva el peso de זעם como enojo fuerte o disgusto severo y sigue la decisión auditada del inglés. ''Ira'' es una alternativa válida, pero ''indignación'' evita cargar el verso con un término más absolutizado cuando el hebreo puede expresar una reacción airada y judicial.'
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: El paralelo corporal permite 'paz' como traducción directa y recognoscible. En español, 'paz' conserva el valor relacional e interior del término, mientras que 'bienestar' explicita una dimensión contextual que el hebreo también puede implicar. Se mantiene la opción principal y la alternativa queda preservada en nota.
- source_word: בַּעֲצָמַי
  english_pob_choice: in my bones
  chosen_spanish: en mis huesos
  alternatives_spanish:
  - en mis osamentas
  lexicon: HALOT
  rationale: '''Huesos'' reproduce la imagen hebrea de manera natural y tradicional en español bíblico, sin perder el sentido de sufrimiento profundo. ''Osamentas'' sería demasiado marcado y menos idiomático.'
- source_word: חַטָּאתִי
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi culpa
  - mi ofensa
  lexicon: HALOT
  rationale: '''Pecado'' es la traducción más directa y fiel del sustantivo en este contexto de confesión causal. ''Culpa'' y ''ofensa'' pueden ser matices posibles, pero ''pecado'' conserva la conexión moral y teológica del hebreo.'
theological_decisions:
- issue: Relación entre la indignación divina y el sufrimiento del salmista
  english_pob_reading: The verse states that the psalmist's bodily distress is because of God's indignation and because of his own sin, without further explaining the mechanism.
  chosen_spanish_reading: El verso presenta el sufrimiento corporal del salmista como consecuencia tanto de la indignación de Dios como de su propio pecado, sin explicar más el mecanismo.
  alternative_spanish_readings:
  - El lenguaje podría entenderse solo como descripción poética de alejamiento sentido, no como afirmación doctrinal exhaustiva sobre todo sufrimiento.
  rationale: La redacción española conserva ambas cláusulas causales sin suavizar ni la indignación divina ni el pecado personal. Así se mantiene la tensión teológica presente en el hebreo, en lugar de resolverla o atenuarla en una formulación más general.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con la decisión inglesa auditada de conservar tanto la causalidad doble como la imaginería corporal. No se detectan cambios de revisión que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se usó 'carne' y 'huesos' para mantener el paralelismo corporal hebreo sin explicación interpretativa añadida.
  - '''Indignación'' se mantuvo como equivalente principal de זעם, en continuidad con la decisión inglesa auditada; la alternativa ''ira'' queda documentada en nota.'
  - '''Paz'' en el segundo hemistiquio conserva el paralelismo con ''sanidad'' del primero y admite la alternativa contextual ''bienestar''.'
  - No se introdujo 'SEÑOR' ni 'Cristo'; el verso no contiene esos términos.
  - El orden y la causalidad se mantuvieron simples y directos para reflejar la sintaxis poética del original.
