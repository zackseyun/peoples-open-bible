theological_decisions:
- issue: Contextual supplementation of the implied subject in the elliptical opening
  chosen_reading: Supplied 'son' in English ('as a third son was breathing his last')
  alternative_readings:
  - Left the phrase more literally as 'Nor a third breathing his last'
  rationale: The Greek omits the noun, but the surrounding context repeatedly concerns the mother's seven sons. Supplying 'son' clarifies the referent without adding a new claim beyond the discourse context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the bull imagery
  chosen_reading: Applied 'like bulls' to the sons' gaze
  alternative_readings:
  - Applied it more generally to their demeanor under torture
  rationale: Syntactically ταυρηδόν sits nearest the description of their eyes and seeing; rendering it with their gaze preserves the immediate Greek connection while leaving the broader connotation of courage intact.
  doctrine_reference: Translation philosophy §1, §6
