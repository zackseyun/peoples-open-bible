lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El imperativo de הלך expresa una orden directa de desplazarse para cumplir una comisión. «Ve» es breve, natural y conserva el tono mandativo sin añadir matiz innecesario.
- source_word: אֱמֹר
  english_pob_choice: say
  chosen_spanish: diles
  alternatives_spanish:
  - di
  - háblales
  lexicon: HALOT
  rationale: En español, con el complemento indirecto explícito, «diles» comunica de manera directa la orden de transmitir el mensaje. Mantiene el acto de habla sin volverlo más interpretativo que el hebreo.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellas
  lexicon: HALOT
  rationale: El sufijo de 3ª plural marca el destinatario de la orden. El clítico dativo «les» es la forma más natural y compacta en español.
- source_word: שׁוּבוּ
  english_pob_choice: Return
  chosen_spanish: Vuelvan
  alternatives_spanish:
  - Regresen
  - Dense la vuelta
  - Volver
  lexicon: HALOT
  rationale: El imperativo plural de שוב indica volver al lugar propio. «Vuelvan» conserva el sentido de retorno sin perder la naturalidad del español contemporáneo.
- source_word: לָכֶם
  english_pob_choice: to your
  chosen_spanish: a sus
  alternatives_spanish:
  - para sus
  - a vuestras
  lexicon: HALOT
  rationale: Aunque literalmente la construcción incluye «para ustedes / a ustedes», en español el movimiento de retorno se expresa idiomáticamente con «a sus» al marcar posesión del destino.
- source_word: לְאָהֳלֵיכֶם
  english_pob_choice: tents
  chosen_spanish: tiendas
  alternatives_spanish:
  - carpas
  - moradas
  lexicon: HALOT
  rationale: אָהֶל designa una tienda, no una casa. «Tiendas» preserva el escenario concreto del desierto y evita suavizar el referente histórico.
translation_notes:
  revision_awareness: Se siguió el hebreo consonante-vocalizado y el audit trail inglés sin cambios relevantes; la única variación española es una formulación más idiomática del mandato y la elección de «tiendas» para preservar el referente concreto.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de la segunda persona plural con imperativos de ustedes, acorde con el español bíblico moderno.
  - No se usa «SEÑOR» ni otros sustitutos porque el versículo no contiene el nombre divino.
  - «Tiendas» conserva el sentido histórico de Israel en el desierto y evita una actualización cultural excesiva.
