translation:
  language: es
  text: Por eso caerán sus jóvenes en sus calles, y todos sus guerreros serán silenciados[a] en aquel día —declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «perecerán». El verbo hebreo puede significar «ser silenciados» o, en este contexto, implicar que quedan inmóviles en la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce la consecuencia del juicio anterior. «Por eso» conserva la relación lógica sin sonar rígido en español actual.
- source_word: יִפְּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se desplomarán
  - serán derribados
  lexicon: HALOT
  rationale: El verbo básico es caer; en este contexto bélico implica muerte o derrota. «Caerán» mantiene la imagen hebrea sin explicitar de más.
- source_word: בַחוּרֶיהָ
  english_pob_choice: her young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus hombres jóvenes
  - sus muchachos
  lexicon: HALOT
  rationale: בחור denota hombres jóvenes en la plenitud de su fuerza, con matiz militar. «Sus jóvenes» es natural en español y conserva esa referencia general.
- source_word: בִּרְחֹבֹתֶיהָ
  english_pob_choice: in her streets
  chosen_spanish: en sus calles
  alternatives_spanish:
  - en sus plazas
  - en sus plazas públicas
  lexicon: HALOT
  rationale: רחובות se refiere a calles anchas o espacios urbanos abiertos. «Calles» es la equivalencia más directa y idiomática en español.
- source_word: אַנְשֵׁי מִלְחַמְתָּהּ
  english_pob_choice: her warriors
  chosen_spanish: sus hombres de guerra
  alternatives_spanish:
  - sus guerreros
  - sus soldados
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «los hombres de su guerra». «Hombres de guerra» conserva la formulación y el tono marcial sin suavizarla innecesariamente.
- source_word: יִדַּמּוּ
  english_pob_choice: will be silenced
  chosen_spanish: serán silenciados
  alternatives_spanish:
  - serán acallados
  - morirán
  lexicon: HALOT
  rationale: El nifal de דמם puede significar «callar/guardar silencio» y, en contexto de juicio, sugerir muerte. «Serán silenciados» mantiene esa tensión lexical y permite que el contexto bélico cargue el sentido pleno.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se vierte de manera natural como «en aquel día». Mantiene distancia discursiva y el valor escatológico/judicial del hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé
  alternatives_spanish:
  - —dice Yahvé
  - —oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es la fórmula profética de declaración/autorización. En español, «declara» comunica bien el tono oracular. יהוה se rinde como «Yahvé» según el estándar del proyecto.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrama. El estándar del proyecto en español es usar «Yahvé» para preservar el nombre propio del pacto, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Mantenimiento de la tensión semántica de יִדַּמּוּ
  english_pob_reading: will be silenced
  chosen_spanish_reading: serán silenciados
  alternative_spanish_readings:
  - perderán la vida
  - morirán
  - serán destruidos
  rationale: El hebreo permite tanto la idea de callar/ser puestos en silencio como la implicación contextual de muerte. «Serán silenciados» conserva la imagen verbal y no resuelve la ambigüedad más allá de lo que exige el contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo WLC y coincide con el audit trail inglés en las decisiones principales: inferencia causal, imagen de caída, matiz militar de «jóvenes/hombres de guerra», y preservación de la ambigüedad de יִדַּמּוּ. No se observan revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustitución editorial del nombre divino.
  - «Serán silenciados» mantiene la tensión lexical sin convertirla en paráfrasis interpretativa.
  - La puntuación con raya introduce correctamente la fórmula profética final en español.
  - «Sus jóvenes» y «sus hombres de guerra» conservan el paralelismo militar del hebreo.
