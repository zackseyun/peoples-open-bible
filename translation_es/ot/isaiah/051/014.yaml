  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: inminencia de liberación, preservación de la muerte en la fosa/calabozo y provisión de pan. Conserva adecuadamente el singular representativo. Sin embargo, «estaba humillado» se aleja de la imagen concreta de צֹעֶה («encorvado / doblado / abatido») y la lleva más al campo abstracto de deshonra social. También «no le faltará su pan» suena menos natural y algo redundante en español.'
  spanish_quality_summary: El texto es claro y eclesialmente legible, pero puede mejorarse para acercarse más a la imagen fuente y sonar más idiomático. «El que está encorvado» o «el que está doblado» preserva mejor la metáfora corporal de opresión. «No le faltará pan» es más natural que «no le faltará su pan». Las notas son útiles, aunque conviene quitar comillas externas innecesarias y mantener estilo limpio.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La decisión sobre שחת como «hoyo» es aceptable, con nota alternativa «calabozo». La principal corrección es léxica-estilística: ajustar צֹעֶה para conservar mejor la imagen de alguien abatido/bajo opresión, no simplemente «humillado».'
  issues:
  - severity: medium
    issue: «humillado» debilita la imagen concreta de צֹעֶה
    rationale: El participio difícil probablemente evoca a alguien encorvado o doblado bajo opresión; «humillado» desplaza el sentido hacia vergüenza o degradación abstracta y pierde la imaginería corporal que el inglés POB preservó con «bent low».
  - severity: low
    issue: «no le faltará su pan» suena poco natural
    rationale: Aunque formalmente posible, en español general y bíblico moderno «no le faltará pan» transmite el mismo sentido con mayor naturalidad y sin redundancia posesiva.
  - severity: low
    issue: Estilo de notas con comillas externas innecesarias
    rationale: Las notas comienzan con comillas que no hacen falta y entorpecen la presentación; conviene uniformarlas con estilo editorial limpio.
  revised_spanish_text: El que está encorvado[a] pronto será liberado; no morirá en el hoyo[b], y no le faltará pan.
