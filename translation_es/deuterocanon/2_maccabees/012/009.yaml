base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/012/009.yaml
  text: And making a night attack on the people of Jamnia[a], he set the harbor and the fleet on fire, so that the rays of the light were visible as far as Jerusalem[b], it being two hundred forty stadia away.
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of length; two hundred forty stadia is roughly 27–28 miles (43–45 km).
    reason: cultural_note
  - marker: b
    text: Literally, 'the gleams/rays of the light.' The translation 'the glow of the blaze' makes explicit that the visible light comes from the burning harbor and fleet.
    reason: lexical_alternative
