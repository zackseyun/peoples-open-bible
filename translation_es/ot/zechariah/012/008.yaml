translation:
  language: es
  text: En aquel día Yahvé amparará a los habitantes de Jerusalén, y el que tropiece entre ellos en aquel día será como David, y la casa de David como Dios[a], como el ángel de Yahvé delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como dioses' o 'como seres divinos' para 'como Dios'. El hebreo אֱלֹהִים puede abarcar estos sentidos en algunos contextos, aunque aquí la comparación en singular es probablemente la más natural.
    reason: alternative_reading
lexical_decisions:
- source_word: יָגֵן
  english_pob_choice: will shield
  chosen_spanish: protegerá
  alternatives_spanish:
  - amparará
  - escudará
  lexicon: HALOT
  rationale: El verbo tiene fuerza de defensa/protección. En español, 'protegerá' comunica claramente la acción sin sonar forzado; 'amparará' y 'escudará' son posibles, pero la primera puede resultar más arcaica y la segunda más metafórica de lo necesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio mediante transliteración, siguiendo la pauta del proyecto. 'Yahvé' es la forma española estable para el Tetragrámaton y evita la sustitución por un título.
- source_word: בְּעַד
  english_pob_choice: for
  chosen_spanish: a favor de / en favor de
  alternatives_spanish:
  - por
  - en defensa de
  lexicon: HALOT
  rationale: En combinación con יָגֵן, la preposición expresa protección en beneficio de alguien. En español esa relación queda bien resuelta por el verbo 'proteger'; por eso no se añade una expansión pesada en el texto principal.
- source_word: יוֹשֵׁב יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - el que habita en Jerusalén
  - los que habitan en Jerusalén
  lexicon: HALOT
  rationale: El participio singular funciona colectivamente. 'Los habitantes de Jerusalén' reproduce naturalmente ese sentido colectivo en español sin perder el referente poblacional.
- source_word: הַנִּכְשָׁל
  english_pob_choice: the one who stumbles
  chosen_spanish: el que tropiece
  alternatives_spanish:
  - el que tropieza
  - el débil
  lexicon: HALOT
  rationale: El matiz concreto de כשל es el de tropezar/flaquear. En español, 'el que tropiece' conserva la imagen y permite que se mantenga implícita la idea de debilidad o vacilación.
- source_word: בָּהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  lexicon: HALOT
  rationale: La preposición con pronombre tiene aquí un valor corporativo/social. 'Entre ellos' expresa de manera natural la pertenencia al grupo de los habitantes sin forzar la sintaxis.
- source_word: כְּדָוִיד
  english_pob_choice: like David
  chosen_spanish: como David
  alternatives_spanish:
  - igual que David
  lexicon: HALOT
  rationale: La comparación apunta a David como modelo. 'Como David' es la equivalencia más directa y sobria en español.
- source_word: בֵּית דָּוִיד
  english_pob_choice: the house of David
  chosen_spanish: la casa de David
  alternatives_spanish:
  - la dinastía de David
  - la familia de David
  lexicon: HALOT
  rationale: '''Casa de David'' preserva el valor dinástico y el eco bíblico tradicional del hebreo, sin reducirlo a una simple familia biológica.'
- source_word: כֵּאלֹהִים
  english_pob_choice: like God
  chosen_spanish: como Dios[b]
  alternatives_spanish:
  - como dioses
  - como seres divinos
  lexicon: HALOT
  rationale: El hebreo permite una tensión semántica entre singular y plural, pero el contexto cercano favorece la lectura singular exaltada. 'Como Dios' mantiene esa fuerza; la nota conserva las alternativas posibles sin resolver artificialmente la ambigüedad.
- source_word: כְּמַלְאַךְ יְהוָה
  english_pob_choice: like the angel of Yahweh
  chosen_spanish: como el ángel de Yahvé
  alternatives_spanish:
  - como el mensajero de Yahvé
  lexicon: HALOT
  rationale: En esta expresión fija, 'ángel' conserva la referencia sobrenatural habitual en español bíblico y mantiene la resonancia intertextual. 'Mensajero' sería posible, pero debilita el enlace con otros pasajes.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  lexicon: HALOT
  rationale: La frase puede sugerir presencia o liderazgo al frente. 'Delante de ellos' es claro, natural y suficientemente abierto para no cerrar indebidamente el matiz.
theological_decisions:
- issue: Sentido de אֱלֹהִים aplicado a la casa de David
  english_pob_reading: singular 'God' with note allowing 'divine beings' or 'gods'
  chosen_spanish_reading: singular 'Dios' con nota de alternativas
  alternative_spanish_readings:
  - dioses
  - seres divinos
  rationale: La proximidad con 'como el ángel de Yahvé' favorece una comparación elevada y singular, no una pluralidad genérica. Se mantiene la fuerza retórica del hebreo sin borrar la ambigüedad documentada; la nota registra las alternativas viables.
  doctrine_reference: Preservar la tensión lexical y teológica del texto; no neutralizar la imagen hebrea.
translation_notes:
  revision_awareness: 'La revisión más reciente del pasaje en el audit trail no introdujo cambios: se mantiene alta concordancia con la decisión anterior de traducir el verbo con un matiz protector, conservar el nombre divino como Yahvé y dejar abierta la tensión interpretativa de כֵּאלֹהִים mediante nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, coherente con la terminología del proyecto.
  - Se conserva 'ángel de Yahvé' en lugar de 'mensajero' para reflejar la expresión fija del texto bíblico.
  - Se usa 'casa de David' para preservar el valor dinástico tradicional.
  - La comparación de כֵּאלֹהִים queda explícitamente anotada para no borrar la ambigüedad documentada.
