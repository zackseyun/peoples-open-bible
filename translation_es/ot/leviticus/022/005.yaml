translation:
  language: es
  text: o un hombre que toca cualquier criatura que se arrastra[a], por la cual queda impuro, o una persona[b] por quien queda impuro, cualquiera que sea su impureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cualquier cosa que se arrastra'. El hebreo se refiere a pequeños seres que se mueven o se arrastran cerca del suelo.
    reason: lexical_alternative
  - marker: b
    text: O 'un ser humano'. El hebreo usa un singular masculino en sentido legal genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: HALOT
  rationale: Conjunción disyuntiva simple que continúa la lista del verso anterior.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el singular masculino del hebreo, que funciona en sentido legal genérico, sin borrar la forma explícita del texto base.
- source_word: יִגַּע
  english_pob_choice: touches
  chosen_spanish: toca
  alternatives_spanish:
  - entra en contacto con
  - palpa
  lexicon: HALOT
  rationale: '''Toca'' es la correspondencia natural y fiel para נגע en legislación de pureza.'
- source_word: בְּכָל שֶׁרֶץ
  english_pob_choice: any swarming thing
  chosen_spanish: cualquier cosa que se arrastra[a]
  alternatives_spanish:
  - cualquier criatura que se arrastra
  - cualquier cosa que pulula
  lexicon: HALOT
  rationale: שֶׁרֶץ en este contexto designa pequeños seres que se mueven cerca del suelo; en español 'cosa que se arrastra' comunica la categoría sin imponer una identificación zoológica excesiva. Se mantiene la nota alternativa porque el término admite 'creeping thing'/'swarming thing'.
- source_word: אֲשֶׁר יִטְמָא לוֹ
  english_pob_choice: by which he becomes unclean
  chosen_spanish: por la cual queda impuro
  alternatives_spanish:
  - por la que queda impuro
  - que lo hace impuro
  lexicon: HALOT
  rationale: 'Se conserva el valor instrumental o causal del relativo: el contacto con esa entidad produce impureza ritual. ''Queda impuro'' expresa el estado resultante de forma natural en español.'
- source_word: בְאָדָם
  english_pob_choice: a person
  chosen_spanish: una persona[b]
  alternatives_spanish:
  - un ser humano
  - un hombre
  lexicon: HALOT
  rationale: Aunque el hebreo usa forma masculina singular, aquí אָדָם es genérico; 'persona' refleja mejor ese sentido amplio en español y sigue la revisión inglesa que pasó de 'man' a 'person'.
- source_word: אֲשֶׁר יִטְמָא לוֹ לְכֹל טֻמְאָתוֹ
  english_pob_choice: by whom he becomes unclean, whatever his uncleanness
  chosen_spanish: por la cual queda impuro, cualquiera que sea su impureza
  alternatives_spanish:
  - por quien queda impuro, sea cual sea su impureza
  - por la cual queda impuro, en toda su impureza
  lexicon: HALOT
  rationale: La cláusula final es compacta y semíticamente densa; se mantiene la idea de que el contacto con un humano transmite impureza, sea cual sea su estado de impureza. 'Impureza' corresponde al campo léxico de טֻמְאָה.
- source_word: טֻמְאָה
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - impureza ritual
  - inmundicia
  lexicon: HALOT
  rationale: En español, 'impureza' comunica mejor el concepto ritual técnico que 'inmundicia'. Se conserva el valor cultual sin moralizar el término.
theological_decisions:
- issue: Lenguaje de pureza ritual versus moralidad
  english_pob_reading: Render טמא / טֻמְאָה as ritual 'unclean / uncleanness' rather than moralized language.
  chosen_spanish_reading: Traducir con 'impuro / impureza' en sentido ritual, no moral.
  alternative_spanish_readings:
  - inmundo / inmundicia
  - contaminado / contaminación
  rationale: El contexto es legislación sacerdotal sobre pureza. 'Impuro/impureza' preserva el valor técnico del pasaje sin cargarlo de una connotación ética que el hebreo aquí no exige.
  doctrine_reference: Levítico 22; legislación de pureza ritual
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió el segundo 'man' por 'person' para reflejar el sentido genérico de אָדָם; la redacción española sigue esa revisión al usar 'una persona' en el segundo miembro, mientras conserva 'un hombre' para אִישׁ. También se mantiene la tensión léxica de שֶׁרֶץ con una nota alternativa, sin reducirlo a una glosa zoológica más precisa de la que el texto permita.
  spanish_consistency_notes:
  - Se usa 'impuro/impureza' de manera consistente para טמא/טֻמְאָה dentro de este versículo.
  - Se evita 'SEÑOR' o 'inmundo' porque aquí no aparece el Nombre divino ni una exigencia de vocabulario tradicional que supere la evidencia léxica.
  - La estructura disyuntiva se conserva con repetición de 'o' para reflejar el paralelismo del hebreo.
