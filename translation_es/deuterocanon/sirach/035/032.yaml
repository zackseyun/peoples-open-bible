revisions:
- from: En el día en que se cumplan los días de tu vida, y al tiempo de tu muerte, reparte tu herencia[a].
  to: El día en que se cumplan los días de tu vida[a], y en el momento de tu muerte, reparte tu herencia.
  rationale: Se ajusta la frase temporal inicial para evitar un calco poco natural («En el día en que» → «El día en que»), y se mejora la fluidez de καιρῷ τελευτῆς con «en el momento de tu muerte». Se conserva la estructura formal del original, incluida la repetición «los días de tu vida», y se mantiene la nota léxica con una formulación ligeramente más precisa en español.
