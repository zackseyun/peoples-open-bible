translation:
  language: es
  text: ¡Cuán bueno es reprender en vez de enojarse, y el que confiesa[a] será librado de pérdida!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el que lo reconoce será librado de desventaja». El griego deja implícito el objeto de «confiesa/reconoce», y el sustantivo de la consecuencia puede significar pérdida, daño o desventaja.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς καλὸν
  english_pob_choice: How good it is
  chosen_spanish: ¡Cuán bueno es!
  alternatives_spanish:
  - ¡Qué bueno es!
  - ¡Cuán excelente es!
  lexicon: LSJ
  rationale: La exclamación griega introduce una valoración moral y proverbial. «¡Cuán bueno es!» preserva la fuerza exclamativa y suena natural en español bíblico contemporáneo.
- source_word: ἐλέγξαι
  english_pob_choice: to reprove
  chosen_spanish: reprender
  alternatives_spanish:
  - corregir
  - reprender severamente
  - amonestar
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa corrección o censura verbal. «Reprender» comunica bien la función sapiencial sin volverla más dura de lo que exige el griego.
- source_word: ἢ θυμοῦσθαι
  english_pob_choice: rather than to become angry
  chosen_spanish: antes que enojarse
  alternatives_spanish:
  - más que enojarse
  - antes que airarse
  - antes que ponerse iracundo
  lexicon: BDAG
  rationale: θυμοῦσθαι señala entrar en ira o enojo. «Antes que enojarse» conserva el contraste entre la corrección útil y la reacción pasional, con español natural.
- source_word: ὁ ἀνθομολογούμενος
  english_pob_choice: the one who confesses
  chosen_spanish: el que confiesa
  alternatives_spanish:
  - el que admite su falta
  - el que reconoce su culpa
  - el que lo confiesa
  lexicon: LSJ
  rationale: El participio puede significar confesar o reconocer abiertamente. «El que confiesa» sigue de cerca la lectura ética del POB inglés y deja implícito el objeto, como en griego.
- source_word: ἀπὸ ἐλαττώσεως
  english_pob_choice: from loss
  chosen_spanish: de pérdida
  alternatives_spanish:
  - de daño
  - de desventaja
  - de mengua
  lexicon: LSJ
  rationale: ἐλάττωσις puede abarcar pérdida, disminución o desventaja. «De pérdida» mantiene amplitud semántica en español sin fijar indebidamente el tipo de perjuicio.
- source_word: κωλυθήσεται
  english_pob_choice: will be kept from
  chosen_spanish: será librado de
  alternatives_spanish:
  - será impedido de
  - será preservado de
  - será guardado de
  lexicon: BDAG
  rationale: El pasivo futuro de κωλύω con ἀπό expresa quedar apartado o librado de algo. «Será librado de» es idiomático en español y conserva la idea de evitar un perjuicio.
translation_notes:
  revision_awareness: 'El texto griego coincide sustancialmente con el audit trail inglés, y la versión española sigue la misma decisión interpretativa: la sentencia sapiencial contrasta la reprensión con la ira, y luego presenta una cláusula general sobre la confesión/reconocimiento y su resultado evitador de pérdida. No se requieren revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «Cristo»/«Mesías» porque no hay lenguaje cristológico.
  - «Reprender» y «enojarse» reflejan el registro sapiencial sin cargar el texto con tono eclesiástico posterior.
  - La segunda cláusula conserva la ambigüedad del objeto confesado, como en el griego y en el POB inglés.
