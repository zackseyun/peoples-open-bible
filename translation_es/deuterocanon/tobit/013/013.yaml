translation:
  language: es
  text: ¡Alégrate y exulta por los hijos[a] de los justos! Porque serán reunidos y bendecirán al Señor de los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de los justos». El griego dice «hijos», que puede referirse más ampliamente a la descendencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρηθι
  english_pob_choice: Rejoice
  chosen_spanish: ¡Alégrate!
  alternatives_spanish:
  - ¡Regocíjate!
  - ¡Goza!
  lexicon: LSJ
  rationale: El imperativo exhortativo de χαίρω pide una alegría pública y expresa; en español, «alégrate» comunica bien ese tono sin sonar arcaico.
- source_word: ἀγαλλίασαι
  english_pob_choice: exult
  chosen_spanish: exulta
  alternatives_spanish:
  - regocíjate mucho
  - alégrate grandemente
  lexicon: LSJ
  rationale: La segunda forma intensifica la primera; «exulta» conserva mejor esa elevación jubilosa que repetir simplemente «alégrate».
- source_word: ἐπὶ τοῖς υἱοῖς
  english_pob_choice: over the sons
  chosen_spanish: por los hijos
  alternatives_spanish:
  - sobre los hijos
  - a causa de los hijos
  lexicon: LSJ
  rationale: Con dativo, ἐπί expresa ocasión u objeto de gozo. En español, «por» resulta natural para alegrarse con referencia a personas; «sobre» sonaría menos idiomático.
- source_word: τοῖς υἱοῖς τῶν δικαίων
  english_pob_choice: the sons of the righteous
  chosen_spanish: los hijos de los justos
  alternatives_spanish:
  - los hijos de los rectos
  - los hijos de los justos y rectos
  lexicon: LSJ
  rationale: Se conserva la referencia masculina plural de υἱοί, pero en español «hijos» funciona de modo transparente y puede abarcar descendencia. «Justos» sigue el valor habitual de δικαίων.
- source_word: συναχθήσονται
  english_pob_choice: they will be gathered together
  chosen_spanish: serán reunidos
  alternatives_spanish:
  - serán congregados
  - serán juntados
  lexicon: LSJ
  rationale: El pasivo futuro de συνάγω conserva la idea de reunión colectiva; «serán reunidos» es claro y suficientemente literal en español.
- source_word: εὐλογήσουσιν
  english_pob_choice: will bless
  chosen_spanish: bendecirán
  alternatives_spanish:
  - alabarán
  - bendecirán y alabarán
  lexicon: LSJ
  rationale: «Bendecirán» refleja el sentido léxico ordinario de εὐλογέω y mantiene el registro bíblico.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor
  - al maestro
  lexicon: LSJ
  rationale: Se conserva la forma reverencial de κύριος con mayúscula, siguiendo el valor divino/titular del contexto bíblico.
- source_word: τῶν δικαίων
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los fieles
  lexicon: LSJ
  rationale: El genitivo se mantiene de manera transparente en español. «Justos» preserva el vínculo de pertenencia o relación expresado en el griego sin forzar una paráfrasis.
theological_decisions:
- issue: Sexo gramatical en υἱοί
  english_pob_reading: the sons of the righteous
  chosen_spanish_reading: los hijos de los justos
  alternative_spanish_readings:
  - los niños de los justos
  - los descendientes de los justos
  rationale: El griego usa un plural masculino explícito. En español, «hijos» mantiene esa forma y a la vez puede leerse de manera amplia como descendencia; por eso se evita neutralizar sin necesidad en el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación de κύριος con τῶν δικαίων
  english_pob_reading: the Lord of the righteous
  chosen_spanish_reading: el Señor de los justos
  alternative_spanish_readings:
  - el Señor, el Justo
  - el Señor de los rectos
  rationale: 'La construcción más transparente es un genitivo relacional: el Señor vinculado con los justos. No se introduce una reinterpretación cristológica o atributiva que el griego no exige.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas en la última pasada; por eso la versión española sigue de cerca la estructura del original, manteniendo la doble exhortación, el pasivo futuro y la relación genitiva de «Señor de los justos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; aquí el texto usa κύριος y, en este contexto sapiencial/judicial, se conserva «Señor».
  - Se preserva la distinción entre los dos verbos de gozo mediante «alégrate» y «exulta» en lugar de colapsarlos en un solo término.
  - «Justos» traduce δικαίων con el sentido habitual de personas rectas delante de Dios, sin añadir una glosa doctrinal.
  - La puntuación exclamativa refleja el tono exhortativo de los imperativos griegos.
