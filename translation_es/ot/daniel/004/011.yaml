base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/011.yaml
  text: 'He cried aloud and said thus: ‘Cut down the tree[a], and chop off its branches; strip off its foliage, and scatter its fruit. Let the beasts flee from beneath it[b], and the birds from its branches.’'
  footnotes:
  - marker: a
    text: Or 'cut down the tree.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is elliptical in Aramaic; the sense is that the birds also are to flee from its branches.
    reason: lexical_alternative
