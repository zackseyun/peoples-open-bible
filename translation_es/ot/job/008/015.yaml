review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta bien la estructura paralela y la imagen de apoyo/inestabilidad del hebreo. «Se apoya en su casa» refleja adecuadamente יִשָּׁעֵן עַל בֵּיתוֹ, y «pero no se sostiene» comunica bien וְלֹא יַעֲמֹד. Sin embargo, «se aferra a ella» introduce un matiz más fuerte de dependencia obstinada que el hebreo יַחֲזִיק requiere; el sentido básico es tomar o agarrar. Además, la nota [a] altera el rastro de auditoría al proponer «su hogar», cuando la nota inglesa preserva la alternativa verbal («depende/confía en su casa»), no una alternativa para בַּיִת.
  spanish_quality_summary: 'El español es natural y legible, con buen ritmo proverbial. No obstante, puede mejorarse la precisión léxica y la coherencia imagística: «la toma» o «se agarra de ella» es más cercano a חזק que «se aferra a ella», y conviene ajustar la nota [a] para explicar la alternativa verbal documentada. «Pero no permanece» es aceptable, aunque «pero no perdura» refleja mejor la revisión inglesa final sin perder el paralelismo.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones clave son léxicas y poéticas: mantener «casa» para בֵּיתוֹ, conservar la imagen concreta de apoyo, y no sobreinterpretar חזק. Se deben alinear las notas españolas con las razones documentadas en el audit trail inglés.'
