translation:
  language: es
  text: Y pusieron a los levitas[a] desde los veinte años en adelante sobre las obras de Yahvé. Y se levantó Jesúa con sus hijos y hermanos, y Kadmiel su hermano, y los hijos de Jesúa hijo de Henadad[b], y los hijos de Judá hijo de Eliadún, junto con sus hijos y hermanos; todos los levitas, unidos, como supervisores de la obra[c], llevando adelante las obras[d] en la casa de Yahvé. Y los constructores edificaron el templo de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice Δαμαδιήλ; el paralelo de Esdras identifica a este levita como Kadmiel.
    reason: alternative_reading
  - marker: b
    text: La forma griega Ἡμαδαβούν probablemente refleja el nombre Henadad del paralelo hebreo.
    reason: alternative_reading
  - marker: c
    text: El término griego raro ἐργοδιῶκται designa a quienes dirigen o supervisan la labor.
    reason: lexical_alternative
  - marker: d
    text: El griego usa el plural ἔργα/ἔργων en dos lugares; algunas traducciones suavizan a singular «obra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησαν
  english_pob_choice: they appointed
  chosen_spanish: pusieron
  alternatives_spanish:
  - nombraron
  - designaron
  lexicon: LSJ
  rationale: En este contexto de asignar levitas a una función de responsabilidad, «pusieron» comunica la instalación o asignación al cargo sin sonar forzado; mantiene el valor funcional del verbo mejor que una mera postura física.
- source_word: ἀπὸ εἰκοσαετοῦς
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años en adelante
  alternatives_spanish:
  - a partir de los veinte años
  - desde los veinte años
  lexicon: LSJ
  rationale: Expresa claramente el umbral mínimo de edad con un español natural, equivalente a la fórmula idiomática inglesa «and upward».
- source_word: ἐπὶ τῶν ἔργων τοῦ κυρίου
  english_pob_choice: over the works of the Lord
  chosen_spanish: sobre las obras del Señor
  alternatives_spanish:
  - sobre la obra del Señor
  - encargados de las obras del Señor
  lexicon: LSJ
  rationale: Se conserva el plural «obras» porque el griego usa ἔργων en plural. «Sobre» refleja la idea de supervisión o cargo; «Señor» traduce κύριος conforme al contexto griego directo.
- source_word: ἔστη Ἰησοῦς
  english_pob_choice: Jeshua stood
  chosen_spanish: se levantó Jesúa
  alternatives_spanish:
  - se puso en pie Jesúa
  - Jesúa se levantó
  lexicon: LSJ
  rationale: «Se levantó» mantiene el valor de entrada/presentación al servicio y evita una literalidad rígida de «estuvo de pie». Se usa «Jesúa» como forma española del nombre.
- source_word: Δαμαδιὴλ
  english_pob_choice: Kadmiel
  chosen_spanish: Kadmiel
  alternatives_spanish:
  - Damadiel
  - Cadmiel
  lexicon: parallel Hebrew tradition / standard biblical name convention
  rationale: Aunque el griego conserva Δαμαδιήλ, el paralelo de Esdras/Nehemías identifica al personaje como Kadmiel; se adopta la forma estándar reconocible en español por fidelidad al referente subyacente.
- source_word: Ἡμαδαβούν
  english_pob_choice: Henadad
  chosen_spanish: Henadad
  alternatives_spanish:
  - Hemadabún
  - Hodavías
  lexicon: parallel Hebrew tradition / standard biblical name convention
  rationale: La forma griega corresponde al nombre semítico conocido en el paralelo; «Henadad» es la transliteración estándar más clara en español.
- source_word: Ἰούδα τοῦ Εἰλιαδοὺν
  english_pob_choice: Judah son of Eliadun
  chosen_spanish: Judá hijo de Eliadún
  alternatives_spanish:
  - Judá de Eliadún
  - Judas hijo de Eliadún
  lexicon: LSJ
  rationale: '«Hijo de» expresa correctamente la relación de filiación que marca τοῦ. Se mantiene el nombre con transliteración española coherente: «Eliadún».'
- source_word: ὁμοθυμαδόν
  english_pob_choice: united
  chosen_spanish: unidos
  alternatives_spanish:
  - de común acuerdo
  - con una sola voluntad
  lexicon: LSJ
  rationale: «Unidos» comunica la acción concertada y conjunta con naturalidad en español, reflejando el sentido de concordia del adverbio.
- source_word: ἐργοδιῶκται
  english_pob_choice: supervisors of the work
  chosen_spanish: supervisores de la obra
  alternatives_spanish:
  - inspectores de la obra
  - encargados de la obra
  lexicon: LSJ
  rationale: La expresión rara denota quienes dirigen u ओverseen el trabajo, no obreros manuales. «Supervisores de la obra» preserva el valor de dirección y evita connotaciones innecesarias de dureza.
- source_word: ποιοῦντες εἰς τὰ ἔργα
  english_pob_choice: carrying on the works
  chosen_spanish: llevando adelante las obras
  alternatives_spanish:
  - trabajando en las tareas
  - cumpliendo las obras
  lexicon: LSJ
  rationale: La frase griega es algo torpe; el sentido es actividad continua y eficaz en la labor del templo. «Llevando adelante» conserva el matiz progresivo y el plural «obras».
- source_word: οἰκοδόμησαν οἱ οἰκοδόμοι
  english_pob_choice: the builders built
  chosen_spanish: los constructores edificaron
  alternatives_spanish:
  - los albañiles edificaron
  - los constructores construyeron
  lexicon: LSJ
  rationale: Se conserva la repetición cognada en español para transparencia semántica, pero con «constructores» y «edificaron» para una lectura digna y fluida.
- source_word: ναὸν τοῦ κυρίου
  english_pob_choice: the temple of the Lord
  chosen_spanish: el templo del Señor
  alternatives_spanish:
  - el santuario del Señor
  - la casa del Señor
  lexicon: LSJ
  rationale: «Templo» traduce con precisión ναός y preserva la distinción con οἶκος, que ya aparece antes en la frase como «casa».
theological_decisions:
- issue: Tratamiento de κύριος en un contexto del griego LXX sin máscara del nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: Como la fuente inmediata es κύριος en griego, se sigue la convención del proyecto para traducirlo por «Señor». En este verso no hay una presión textual adicional para insertar «Yahvé» en el cuerpo principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Normalización de nombres propios con formas griegas posiblemente deformadas
  english_pob_reading: Use standard transliterated forms supported by the parallel Semitic tradition for Kadmiel and Henadad, while leaving less certain names closer to the Greek
  chosen_spanish_reading: Usar formas españolas estándar para Kadmiel y Henadad, manteniendo transliteraciones cercanas al griego en nombres menos seguros
  alternative_spanish_readings:
  - Transliterar literalmente todas las formas griegas
  - Reconstituir todos los nombres según el paralelo hebreo
  rationale: El paralelo de Esdras/Nehemías ayuda a recuperar referentes nominales reconocibles, pero sin sobre-reconstruir lo dudoso. Así se equilibra inteligibilidad y fidelidad auditable.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: Se siguió el anclaje principal del griego Swete 1909 y el paralelo hebreo como control para nombres propios. La redacción española preserva el plural de ἔργα/ἔργων, la relación de supervisión de ἐπί + genitivo y el matiz de ἐργοδιῶκται, sin depender mecánicamente del inglés auditado.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος y no «SEÑOR», conforme al marco del proyecto para el griego directo.
  - Se usó «obras» en plural en ambos lugares para reflejar el griego.
  - Se empleó «Jesúa» como forma española del nombre Ἰησοῦς en este contexto genealógico/levítico, evitando confusión con Jesús de Nazaret.
  - Se normalizaron Kadmiel y Henadad según el paralelo semítico, pero se conservaron Eliadún y Jesúa más cercanos a la tradición de transliteración española.
