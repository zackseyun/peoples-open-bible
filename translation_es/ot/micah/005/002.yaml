revisions:
- from: Por tanto, él los entregará[a] hasta el tiempo en que la que está de parto haya dado a luz[b]; entonces el resto de sus hermanos volverá[c] a los hijos de Israel.
  to: Por tanto, él los entregará[a] hasta el tiempo en que la que está de parto haya dado a luz[b]; entonces el resto de sus hermanos volverán a los hijos de Israel.
  rationale: Se corrige 'volverá' por 'volverán' para reflejar el plural del hebreo y del POB auditado. Se elimina la nota [c] porque repetía exactamente la misma expresión del texto principal y no aportaba una alternativa real. El resto del versículo puede mantenerse, ya que preserva bien la indeterminación interpretativa y la sintaxis temporal del original.
