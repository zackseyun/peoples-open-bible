translation:
  language: es
  text: 'Así[a] será mi palabra que sale de mi boca: no volverá a mí vacía[b], sino que cumplirá lo que yo deseo y prosperará[c] en aquello para lo cual la envié.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad de formulación es: «Así mi palabra que sale de mi boca será:».'
    reason: previous_rendering
  - marker: b
    text: O «sin resultado». El hebreo puede significar «vacía, sin efecto».
    reason: lexical_alternative
  - marker: c
    text: O «tendrá éxito»; también puede entenderse «prosperará en aquello para lo cual la envié».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de la misma manera
  lexicon: HALOT
  rationale: Expresa la comparación con la lluvia y la nieve del contexto inmediato sin sonar rígido. 'Así' conserva el valor correlativo de כֵּן en un español natural.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - habrá
  lexicon: HALOT
  rationale: Futuro simple claro y directo; mantiene la estructura de predicción del hebreo y la naturalidad en español.
- source_word: דְבָרִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi palabra dicha
  - mi mensaje
  lexicon: HALOT
  rationale: '''Palabra'' preserva el campo semántico de דָּבָר y el peso teológico del habla eficaz de Dios. ''Mensaje'' suavizaría demasiado el término.'
- source_word: אֲשֶׁר יֵצֵא מִפִּי
  english_pob_choice: that goes out from my mouth
  chosen_spanish: que sale de mi boca
  alternatives_spanish:
  - que sale de mi boca
  - que procede de mi boca
  lexicon: HALOT
  rationale: '''Sale'' reproduce la imagen concreta de salida sin elevarla innecesariamente a un registro más técnico como ''procede''.'
- source_word: לֹא יָשׁוּב אֵלַי רֵיקָם
  english_pob_choice: it will not return to me empty
  chosen_spanish: no volverá a mí vacía
  alternatives_spanish:
  - no volverá a mí vacía
  - no volverá a mí sin fruto
  - no volverá a mí vacía de efecto
  lexicon: HALOT
  rationale: '''Vacía'' conserva la literalidad y la amplitud de רֵיקָם, entendida como ''vacía, sin resultado''. El femenino concuerda con ''palabra''.'
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - sino
  lexicon: HALOT
  rationale: Después de la negación, 'sino que' expresa mejor la fuerte contraposición hebrea entre fracaso y eficacia.
- source_word: עָשָׂה
  english_pob_choice: it will accomplish
  chosen_spanish: hará
  alternatives_spanish:
  - cumplirá
  - realizará
  - llevará a cabo
  lexicon: HALOT
  rationale: El hebreo dice que la palabra produce eficazmente el resultado querido; en español, 'hará' es suficientemente fuerte y no sobreinterpreta el verbo.
- source_word: אֶת אֲשֶׁר חָפַצְתִּי
  english_pob_choice: what I desire
  chosen_spanish: lo que yo deseo
  alternatives_spanish:
  - lo que yo deseo
  - lo que me agrada
  - lo que yo quiero
  lexicon: HALOT
  rationale: '''Deseo'' conserva חפץ como voluntad/delight sin cargarlo con una formulación más técnica como ''propósito''.'
- source_word: וְהִצְלִיחַ
  english_pob_choice: and succeed
  chosen_spanish: y prosperará
  alternatives_spanish:
  - y tendrá éxito
  - y logrará su fin
  - y prosperará
  lexicon: HALOT
  rationale: '''Prosperará'' refleja bien la eficacia exitosa de הצלח y mantiene el paralelismo con la cláusula anterior. Aunque puede sonar material en otros contextos, aquí describe el éxito de la misión de la palabra.'
- source_word: אֲשֶׁר שְׁלַחְתִּיו
  english_pob_choice: in the purpose for which I sent it
  chosen_spanish: en aquello para lo cual la envié
  alternatives_spanish:
  - para aquello para lo cual la envié
  - en la tarea para la cual la envié
  - en el propósito para el cual la envié
  lexicon: HALOT
  rationale: La construcción relativa compacta se hace explícita en español como destino o cometido de la palabra. 'La envié' respeta el femenino de 'palabra' y el sentido de comisión.
theological_decisions:
- issue: Personificación de la palabra divina
  english_pob_reading: Render 'my word' as God's spoken word/effective utterance, not as an explicit personal title.
  chosen_spanish_reading: Traducir 'mi palabra' como el habla eficaz de Yahvé, no como un título personal explícito.
  alternative_spanish_readings:
  - mi Palabra
  - el Verbo
  rationale: El contexto inmediato compara el efecto de la palabra con lluvia y nieve y trata de la eficacia del dicho divino. La traducción evita introducir una identificación cristológica que el hebreo de este pasaje no exige.
  doctrine_reference: Affirmations; Translation philosophy 1 y 3
- issue: Eficacia divina sin carga doctrinal añadida
  english_pob_reading: Translate the verse to emphasize the certainty and effectiveness of God's word without adding deterministic theological language beyond the text.
  chosen_spanish_reading: Resaltar que la palabra de Dios cumple infaliblemente su encargo, sin añadir lenguaje doctrinal ajeno al pasaje.
  alternative_spanish_readings:
  - la palabra cumplirá inevitablemente un decreto
  - la palabra solo persuadirá
  rationale: El hebreo afirma que la palabra no vuelve vacía, sino que efectúa lo que Yahvé quiere y alcanza éxito en su envío. La versión española conserva esa certeza sin expandirla a fórmulas sistemáticas no presentes en el texto.
  doctrine_reference: Affirmations; Translation philosophy 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que invirtió el orden para hacer más natural la cláusula introductoria ('so will my word be...'); en español se adoptó una estructura igualmente natural con 'así será mi palabra...'. También se preservó la tensión lexical de רֵיקָם como 'vacía/sin resultado' y de הִצְלִיחַ como éxito efectivo de la misión.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino según el criterio del proyecto.
  - '''Palabra'' mantiene la terminología habitual para דָּבָר en contextos de revelación divina.'
  - Se prefirió 'sino que' para conservar la oposición fuerte de כִּי אִם.
  - El femenino 'vacía' y 'la envié' concuerdan con 'palabra'.
