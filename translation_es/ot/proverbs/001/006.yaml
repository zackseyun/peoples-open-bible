translation:
  language: es
  text: para entender un proverbio y una sentencia[a], las palabras de los sabios y sus enigmas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una interpretación» para מְלִיצָה; el hebreo puede referirse a una expresión aguda o artística, y en algunos contextos a una formulación interpretativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus dichos oscuros». El hebreo puede denotar enigmas o expresiones enigmáticas que requieren reflexión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהָבִין
  english_pob_choice: to understand
  chosen_spanish: para entender
  alternatives_spanish:
  - para comprender
  - para discernir
  lexicon: HALOT
  rationale: El infinitivo constructo con לְ expresa finalidad. "Para entender" reproduce con naturalidad la finalidad del hebreo y mantiene el matiz cognitivo básico de בין sin añadir una idea más fuerte que la del texto.
- source_word: מָשָׁל
  english_pob_choice: a proverb
  chosen_spanish: un proverbio
  alternatives_spanish:
  - una parábola
  - un dicho sapiencial
  lexicon: HALOT
  rationale: En Proverbios, מָשָׁל designa normalmente una sentencia proverbial o dicho sapiencial. "Proverbio" es la equivalencia más directa y reconoce el género del libro.
- source_word: מְלִיצָה
  english_pob_choice: a saying / an interpretation
  chosen_spanish: una sentencia
  alternatives_spanish:
  - una interpretación
  - una expresión elocuente
  - un dicho
  lexicon: HALOT
  rationale: El término es raro y puede abarcar una expresión aguda, artística o interpretativa. "Sentencia" conserva la idea de dicho formulado con fuerza y permite mantener la ambigüedad lexical sin reducirlo a un solo matiz técnico.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los dichos de
  - las expresiones de
  lexicon: HALOT
  rationale: El constructo plural de דבר se vierte de modo directo como "las palabras de", conservando la relación genitiva y la claridad sintáctica en español.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los expertos
  lexicon: HALOT
  rationale: El sustantivo adjetival se refiere a personas sabias. "Los sabios" preserva el valor substantivado del hebreo sin introducir una especificación innecesaria de género.
- source_word: חִידֹתָם
  english_pob_choice: their riddles / their dark sayings
  chosen_spanish: sus enigmas
  alternatives_spanish:
  - sus adivinanzas
  - sus dichos oscuros
  lexicon: HALOT
  rationale: חִידָה denota un enigma o dicho enigmático. "Sus enigmas" es conciso, transparente y preserva tanto el reto interpretativo como el sufijo pronominal de tercera persona plural.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene alta concordancia y no presenta revisiones aplicadas; la propuesta española sigue ese mismo estado estable, preservando las dos ambigüedades léxicas documentadas en מְלִיצָה y חִידֹתָם mediante notas alternativas.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético con una estructura breve y directa.
  - '"Sabios" se dejó sustantivado, en línea con el hebreo y con el inglés auditado.'
  - '"Enigmas" evita una traducción arcaizante de "dichos oscuros" en el texto principal, pero la alternativa queda documentada en nota.'
  - Se usó puntuación española estándar y minúsculas conforme al estilo de versículo en español.
