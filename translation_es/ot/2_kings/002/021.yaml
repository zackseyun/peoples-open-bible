  to: 'Entonces salió al manantial[a] del agua, echó allí sal y dijo: «Así dice Yahvé: He sanado esta agua. Ya no saldrán de ella muerte ni aborto espontáneo[b]».'
  rationale: Se corrige el término principal para מְשַׁכָּלֶת conforme a la decisión auditada del POB ('miscarriage' como lectura principal, con alternativas en nota), se restaura el matiz de procedencia en la cláusula final ('saldrán de ella'), se mejora la fórmula profética a un español más idiomático ('Así dice Yahvé'), y se simplifica el tratamiento del agua a singular masivo natural en español ('esta agua'), en línea con el expediente inglés.
