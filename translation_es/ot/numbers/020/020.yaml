    text: Literalmente, «con un pueblo pesado»; es un modismo que aquí significa una multitud grande o imponente.
    reason: lexical_alternative
  - marker: c
    text: O «con mano poderosa», es decir, con poder o fuerza.
    reason: lexical_alternative
  revision_rationale: La revisión corrige una connotación impropia en «a recibirlo», mejora la naturalidad de la expresión idiomática hebrea sobre la fuerza numérica, y hace más explícita la idea de paso por el territorio en la prohibición. También alinea las notas españolas con el aparato de alternativas conservado en el inglés POB, incluyendo la alternativa para לִקְרָאתוֹ y una nota separada para «mano fuerte».
