review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: expiación sacerdotal por toda la comunidad, resultado de perdón, carácter no intencional de la falta, y presentación de las ofrendas delante de Yahvé. Sin embargo, hay varios desajustes menores pero significativos: «les será perdonado» suena incompleto frente a וְנִסְלַח לָהֶם y conviene «serán perdonados»; «porque es» debilita el valor narrativo/legal de כִּי שְׁגָגָה הִוא, mejor «porque fue»; «ofrenda encendida» no reproduce con suficiente claridad אִשֶּׁה como ofrenda hecha por fuego; y la nota [a] no aporta una alternativa real, sino repite el texto.'
  spanish_quality_summary: El texto es legible y de registro digno, pero puede sonar más natural y preciso en español bíblico moderno. «Serán perdonados» y «fue una falta involuntaria» fluyen mejor. «Ofrenda hecha por fuego» es más clara que «ofrenda encendida». También conviene ordenar las notas para que respondan a verdaderas alternativas léxicas preservadas por el expediente inglés.
  glossary_alignment: Se mantiene correctamente «Yahvé» para יהוה. «Expiación» para כפר y «ofrenda por el pecado» para חַטָּאת son aceptables; la alternativa «ofrenda de purificación» debe conservarse en nota. Para אִשֶּׁה, el expediente inglés preserva explícitamente la alternativa «food offering»/«offering by fire», por lo que en español conviene una nota léxica equivalente. La nota actual [a] sobre «hijos de Israel» no sigue bien la práctica documentada.
  issues:
  - severity: medium
    issue: «y les será perdonado» es una formulación menos natural y algo imprecisa
    rationale: וְנִסְלַח לָהֶם expresa que el pueblo será perdonado; en español, «serán perdonados» o «se les perdonará» comunica mejor el sentido sin dejar implícito qué cosa es perdonada.
  - severity: medium
    issue: «porque es una falta involuntaria» usa presente donde el contexto pide mejor pasado
    rationale: כִּי שְׁגָגָה הִוא explica la situación del caso ya cometido; «porque fue una falta involuntaria» encaja mejor con la secuencia legal-narrativa y con la repetición final.
  - severity: medium
    issue: «una ofrenda encendida» no representa con suficiente fidelidad אִשֶּׁה
    rationale: La expresión española puede sugerir simplemente que la ofrenda está ardiendo, no que es una categoría sacrificial ofrecida por fuego. «Ofrenda hecha por fuego» o «ofrenda presentada por fuego» preserva mejor el valor cultual.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa textual o léxica útil
    rationale: Repite esencialmente la misma frase y comenta la preposición hebrea, mientras que el expediente inglés conserva una alternativa para אִשֶּׁה, no para «hijos de Israel».
  revised_spanish_text: El sacerdote hará expiación por toda la congregación de los hijos de Israel, y serán perdonados, porque fue una falta involuntaria, y ellos han traído su ofrenda, una ofrenda hecha por fuego[a] para Yahvé, y su ofrenda por el pecado delante de Yahvé[b], por su falta involuntaria.
  revised_footnotes:
  - marker: a
    text: O, «una ofrenda de alimento para Yahvé». El hebreo puede enfatizar una ofrenda hecha por fuego; «ofrenda de alimento» es una traducción contextual común.
    reason: lexical_alternative
  - marker: b
    text: O, «su ofrenda de purificación». El hebreo חַטָּאת en este contexto también puede entenderse como una ofrenda destinada a la purificación.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes puntuales para mejorar fidelidad y español natural: se cambió «les será perdonado» por «serán perdonados», «es» por «fue», y «ofrenda encendida» por «ofrenda hecha por fuego». Además, se sustituyó la nota impropia sobre «hijos de Israel» por una nota léxica sobre אִשֶּׁה, en línea con el expediente inglés, y se conservó la nota sobre «ofrenda de purificación».'
