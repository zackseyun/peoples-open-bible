theological_decisions:
- issue: Relation between the Hebrew wording and the fuller Greek parallel
  chosen_reading: Translate the extant Hebrew as primary, while allowing the Greek to inform the sense of temporal change without importing its explicit 'past and future' wording into the main text.
  alternative_readings:
  - He declares what has passed and what is to come, and reveals the traces of hidden things.
  rationale: Per project philosophy, the surviving Hebrew is primary for Sirach where extant. The Greek parallel is valuable as a consistency check and suggests that the Hebrew phrase concerns changing or successive events, but the Hebrew text in Zone 1 does not explicitly say 'past and future.' Therefore the main text stays anchored to the Hebrew, with the Greek-based alternative preserved in a footnote.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives; use Greek parallel as actual input without displacing Hebrew primacy.'
