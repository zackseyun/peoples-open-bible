translation:
  language: es
  text: 'Entonces el rey dijo a la mujer: «Ve a tu casa, y yo daré órdenes respecto de ti[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «daré órdenes por ti» o «daré órdenes en tu favor». La preposición hebrea también puede entenderse de esas maneras, pero el sentido es que el rey dará instrucciones acerca de su caso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «entonces» conserva la secuencia de la acción en un español natural y digno.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Correspondencia directa del sustantivo definido con artículo; en español no requiere ajuste adicional.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la mujer de Tecoa
  lexicon: HALOT
  rationale: Aquí la referencia es contextual; «mujer» reproduce el valor del hebreo sin añadir una identificación que el verso no expresa.
- source_word: לְכִי
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: Imperativo femenino singular de הלך; «ve» es la orden más natural y fiel en español.
- source_word: לְבֵיתֵךְ
  english_pob_choice: to your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  lexicon: HALOT
  rationale: בַּיִת puede ser «casa» o «hogar»; «casa» conserva mejor la concreción del hebreo y encaja con el mandato de regresar.
- source_word: וַאֲנִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y por mi parte yo
  - en cuanto a mí
  lexicon: HALOT
  rationale: El pronombre explícito conserva el énfasis del hebreo sin recargar la frase.
- source_word: אֲצַוֶּה
  english_pob_choice: I will give orders
  chosen_spanish: daré órdenes
  alternatives_spanish:
  - mandaré
  - daré instrucciones
  lexicon: HALOT
  rationale: La forma piel de צוה expresa dar órdenes o mandar; «daré órdenes» mantiene el matiz de autoridad real con buena naturalidad en español.
- source_word: עָלָיִךְ
  english_pob_choice: concerning you
  chosen_spanish: respecto de ti
  alternatives_spanish:
  - acerca de ti
  - sobre ti
  - por ti
  lexicon: HALOT
  rationale: Con צוה, עַל puede indicar el asunto/persona acerca de la cual se ordena. «Respecto de ti» conserva ese alcance de asunto o causa sin convertirlo en una frase de intercesión más fuerte de lo que exige el hebreo.
translation_notes:
  revision_awareness: 'Se siguió el sentido ya confirmado por el audit trail inglés: mandato de enviar a la mujer a su casa y promesa del rey de emitir órdenes acerca de su caso. No hubo cambios textuales ni necesidad de reequilibrar decisiones críticas.'
  spanish_consistency_notes:
  - Se mantuvo «rey» y no una perífrasis más interpretativa para conservar el registro narrativo.
  - «Respecto de ti» refleja el alcance de עָלַיִךְ sin sobretraducirlo como beneficio explícito.
  - La cita usa puntuación española y comillas angulares para formato publicable.
