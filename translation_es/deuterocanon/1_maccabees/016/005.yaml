translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que ajustó ἐπορεύοντο de «were going out» a «went» por naturalidad narrativa, y se mantuvo la equivalencia funcional en español con «fueron». También se conservó la decisión auditada de traducir χειμάρρους con un término geográfico del Cercano Oriente, reflejado aquí como «wadi».
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - «Fueron» sigue la revisión inglesa y evita sobrecargar el imperfecto griego con una perífrasis menos natural en español.
  - «Un wadi» se preserva como término técnico/geográfico con nota explicativa para lectores no familiarizados.
  - No se introdujeron mayúsculas devocionales ni equivalentes tradicionales no sustentados por el texto.
