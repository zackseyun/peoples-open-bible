id: 2TI.4.13
reference: 2 Timothy 4:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸν φαιλόνην, ὃν ⸀ἀπέλιπον ἐν Τρῳάδι παρὰ Κάρπῳ, ἐρχόμενος φέρε, καὶ τὰ βιβλία, μάλιστα τὰς μεμβράνας.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/013.yaml
  text: When you come, bring the cloak that I left in Troas with Carpus, and the books, especially the parchments.
translation:
  language: ko
  text: 그대가 올 때에는 내가 드로아의 가보 집에 두고 온 겉옷을 가져오고, 책들도, 특히 양피지 책들[a]을 가져오십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 μεμβράνας는 라틴어 차용어로, 양피지로 만든 책을 가리킨다. 당시 가장 귀중한 형태의 책이었다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν φαιλόνην
  english_pob_choice: the cloak
  chosen_korean: 겉옷
  alternatives_korean:
  - 외투
  - 망토
  lexicon: BDAG
  rationale: φαιλόνης는 두꺼운 겉옷·외투. 「겉옷」이 한국 성서 전통의 자연스러운 어휘이다.
- source_word: ἀπέλιπον
  english_pob_choice: I left
  chosen_korean: 두고 온
  alternatives_korean:
  - 남겨 둔
  - 놓아 둔
  lexicon: BDAG
  rationale: ἀπολείπω의 「남겨 두고 떠남」을 「두고 온」으로 자연스럽게 옮긴다.
- source_word: Τρῳάδι ... Κάρπῳ
  english_pob_choice: Troas ... Carpus
  chosen_korean: 드로아 ... 가보
  alternatives_korean:
  - 트로아스 ... 카르포스
  lexicon: BDAG
  rationale: 한국 성서 전통(개역개정)을 따른다.
- source_word: τὰ βιβλία, μάλιστα τὰς μεμβράνας
  english_pob_choice: the books, especially the parchments
  chosen_korean: 책들도, 특히 양피지 책들
  alternatives_korean:
  - 책들, 무엇보다 양피지들
  - 두루마리들과 특히 양피지 사본들
  lexicon: BDAG
  rationale: 「양피지 책」이 μεμβράνας의 구체적 가리킴을 분명히 드러내며, 단순한 「양피지」보다 자연스럽다.
