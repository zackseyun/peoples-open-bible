  yaml_path: translation/ot/joshua/018/014.yaml
  text: Then the border curved and turned on the west side southward from the mountain that faces Beth-horon on the south[a], and its end was at Kiriath-baal (that is, Kiriath-jearim), a city of the sons of Judah. This was the western side.
  footnotes:
