base_translation:
  language: en
  yaml_path: translation/ot/exodus/028/028.yaml
  text: They shall bind the breastpiece by its rings to the rings of the ephod with a cord of blue yarn[a], so that it may be on the skillfully woven band of the ephod[c][b], and the breastpiece shall not come loose from the ephod.
  footnotes:
  - marker: a
    text: Or 'the breastplate.' The Hebrew term here refers to the priestly chest piece attached to the ephod, not body armor.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a blue cord.' The Hebrew תְּכֵלֶת refers to the blue dyed material used in tabernacle and priestly textiles.
    reason: lexical_alternative
  - marker: c
    text: Or 'shall not be displaced from the ephod.'
    reason: lexical_alternative
