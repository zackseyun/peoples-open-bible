translation:
  language: es
  text: Hizo cincuenta presillas en la primera cortina, y hizo cincuenta presillas en el borde de la cortina que estaba en la segunda unión[a]; las presillas correspondían[b] una a otra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cortina que estaba en la segunda sección unida» o «en el segundo conjunto unido».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las presillas estaban correspondiéndose, una a otra».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלָאֹת
  english_pob_choice: loops
  chosen_spanish: presillas
  alternatives_spanish:
  - lazos
  - anillas
  - bucles
  lexicon: HALOT
  rationale: En el contexto de cortinas del tabernáculo, el término designa elementos de unión de tela. «Presillas» comunica bien esa función en español y evita la posible confusión de «anillas» con piezas metálicas; «lazos» es posible, pero menos preciso para una pieza preparada para empalmar cortinas.
- source_word: יְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: paño de tela
  alternatives_spanish:
  - cortina
  - panel
  - lienzo
  lexicon: HALOT
  rationale: Aquí se trata de una gran pieza textil del tabernáculo. «Paño de tela» mantiene la materialidad y evita que «cortina» sugiera un uso doméstico moderno. Se preserva así el sentido de una pieza tejida usada en el conjunto del santuario.
- source_word: בִּקְצֵה
  english_pob_choice: on the edge of
  chosen_spanish: en el borde de
  alternatives_spanish:
  - al extremo de
  - en la orilla de
  lexicon: HALOT
  rationale: «Borde» reproduce con claridad la idea de קָצֶה como margen o extremo de la pieza, y funciona naturalmente en español para la colocación de las presillas.
- source_word: מַחְבֶּרֶת
  english_pob_choice: set
  chosen_spanish: unión
  alternatives_spanish:
  - conjunto
  - ensamble
  - empalme
  lexicon: HALOT
  rationale: El hebreo refiere a la sección resultante de unir los paños. «Unión» conserva esa idea de conjunto enlazado sin forzar un término técnico ajeno al texto. También mantiene abierta la leve ambigüedad del original entre sección unida y acto de unir.
- source_word: הַשֵּׁנִית
  english_pob_choice: second
  chosen_spanish: segunda
  alternatives_spanish:
  - otra
  - segunda unida
  lexicon: HALOT
  rationale: Es un ordinal simple que señala la segunda sección enlazada. «Segunda» es la correspondencia directa y clara en español.
- source_word: מַקְבִּילֹת
  english_pob_choice: corresponded
  chosen_spanish: coincidían
  alternatives_spanish:
  - correspondían
  - estaban alineadas
  - quedaban frente a frente
  lexicon: HALOT
  rationale: La participio expresa que las presillas quedaban emparejadas para unirse. «Coincidían» comunica esa alineación funcional con naturalidad en español, sin perder la idea de correspondencia.
- source_word: אַחַת אֶל אֶחָת
  english_pob_choice: to one another
  chosen_spanish: una con otra
  alternatives_spanish:
  - una a otra
  - entre sí
  - una con la otra
  lexicon: HALOT
  rationale: La locución expresa reciprocidad. «Una con otra» es idiomática y precisa en español para la correspondencia mutua de las presillas.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: El verbo común עשה se traduce con el verbo básico «hacer». En este contexto de fabricación del tabernáculo, «hizo» es fiel y natural.
translation_notes:
  revision_awareness: 'El texto español sigue el estado revisado sin cambios del audit trail inglés (latest_revision_pass: unchanged=true; cross-check high_agreement). No se introdujeron alteraciones textuales ni decisiones doctrinales adicionales; solo se adaptaron con precisión los términos de costura y ensamblaje del hebreo al español.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se usó «presillas» para mantener la función textil de לֻלָאֹת sin confundirlas con sujetadores metálicos.
  - «Unión» conserva la ambigüedad útil de מַחְבֶּרֶת entre sección unida y acto de unión.
  - La estructura paralela del verso se mantuvo en español para reflejar el hebreo repetitivo.
