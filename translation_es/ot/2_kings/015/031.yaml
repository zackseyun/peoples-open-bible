translation:
  language: es
  text: Ahora el resto de los hechos de Pécaj[a], y todo lo que hizo—he aquí, están escritos en el Libro de las Crónicas de los reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los anales de los reyes de Israel’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Asú el resto de
  lexicon: HALOT
  rationale: יֶתֶר expresa ‘resto’ o ‘lo que queda’. El valor conjuntivo inicial se traduce de forma natural con ‘Ahora,’ para conservar el tono de transición de la fórmula regia sin sonar mecánico en español.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - asuntos
  - cosas
  lexicon: HALOT
  rationale: En esta fórmula historiográfica, דִּבְרֵי no alude solo a ‘palabras’, sino al conjunto de acciones y hechos del rey. ‘Hechos’ comunica bien ese alcance en español y evita una traducción demasiado literal que sería oscura.
- source_word: פֶקַח
  english_pob_choice: Pekah
  chosen_spanish: Pekaj
  alternatives_spanish:
  - Peka
  - Pekaj
  lexicon: standard transliteration from Hebrew
  rationale: Se translitera el nombre propio hebreo con una forma española legible. Se usa ‘Pekaj’ para reflejar con mayor fidelidad la consonante final gutural, manteniendo una ortografía adecuada para lectores hispanohablantes.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todas las cosas que hizo
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de manera directa y completa. ‘Todo lo que hizo’ preserva el sentido inclusivo de כָל sin añadir matices innecesarios.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: miren, están
  alternatives_spanish:
  - he aquí, están
  - ciertamente están
  - están
  lexicon: HALOT
  rationale: הִנֵּה con sufijo pronominal tiene fuerza presentativa. ‘Miren’ conserva el gesto de señalamiento y la solemnidad formularia, evitando una simple cópula que perdería énfasis.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: El participio pasivo se traduce con el sentido concreto de ‘escritos’, manteniendo el vínculo documental de la fórmula.
- source_word: סֵפֶר
  english_pob_choice: Book
  chosen_spanish: Libro
  alternatives_spanish:
  - rollo
  - documento
  lexicon: HALOT
  rationale: Aunque el hebreo puede referirse a un rollo, el español bíblico reconoce naturalmente ‘Libro’ como designación del registro citado. Aquí se conserva el tono documental sin forzar una imagen material específica.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los anales
  - los registros
  lexicon: HALOT
  rationale: Esta expresión apunta a registros anales reales. ‘Crónicas’ mantiene la equivalencia tradicional y transmite bien la idea de una obra histórica de archivo; por eso se capitaliza como título del documento citado.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de los monarcas de Israel
  lexicon: HALOT
  rationale: El ל inicial forma parte del título del registro y en español se expresa naturalmente con ‘de’. ‘Reyes de Israel’ preserva el sentido genitivo del encabezado documental.
translation_notes:
  revision_awareness: 'Se siguió el modelo de fórmula regia ya consolidado en la POB inglesa: transición inicial, mención resumida de los hechos del rey, y remisión al documento histórico citado. La revisión reciente no introdujo cambios sustantivos, así que se mantuvo la estructura y el tono documentales.'
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ o equivalentes porque aquí no aparece el nombre divino.
  - Se usó ‘reyes’ en minúscula porque funciona como título genérico dentro del nombre del registro, no como nombre propio independiente.
  - Se prefirió un español formal y fluido, conservando el tono de archivo histórico propio de la fórmula hebrea.
