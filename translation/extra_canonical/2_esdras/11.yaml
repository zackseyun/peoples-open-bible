translation:
  text: |-
    1 And it happened on the second night that I saw a dream, and behold, an eagle was coming up from the sea, and it had twelve feathered wings and three heads.
    2 And I looked, and behold, it spread its wings over all the earth, and all the winds of heaven were blowing upon it, and the clouds were gathering around it.
    3 And I looked, and from its feathers there grew opposing wings, and these became little pinions, small and slight.
    4 But its heads were at rest, and the middle head was larger than the other heads, yet it too was at rest with them.
    5 And I looked, and behold, the eagle flew on its wings to reign over the earth and over those who dwell in it.
    6 And I saw how everything under heaven was subjected to it, and no one contradicted it, not even one creature that is upon the earth.
    7 And I looked, and behold, the eagle rose up on its claws and sent out a voice to its wings, saying,
    8 “Do not all keep watch at once; sleep, each one in his own place, and keep watch in turn.
    9 But let the heads be reserved for the last.”
    10 And I looked, and behold, the voice did not come out from its heads, but from the midst of its body.
    11 And I counted its opposing wings, and behold, they were eight.
    12 And I looked, and behold, on the right side one wing rose up and reigned over all the earth.
    13 And it happened that when it reigned, its end came, and it disappeared, so that its place could not be seen; then the next rose up and reigned, and it held power for a long time.
    14 It held power for a long time. And it happened that when it reigned,
    15 its end was coming, so that it disappeared like the former. And behold, a voice was sent out to it, saying,
    16 “Hear, you who have held the earth for so long a time:
    17 this I announce to you before you begin to vanish. After you no one will hold your length of time, not even half of it.”
    18 Then the third rose up and held rule as the former ones had, and it too disappeared.
    19 And so it happened to all the wings one by one: they held rule, and then were nowhere to be seen again.
    20 And I looked, and behold, in due time the following wings were rising up on the right side, to hold rule; and among them were some that held it, but
    21 immediately disappeared. And some of them rose up,
    22 but did not hold rule. And after this I looked, and behold,
    23 the twelve wings and the two little pinions were no longer visible. And nothing remained on the eagle’s body except the three resting heads and six little pinions.
    24 And I looked, and behold, from the six little pinions two were separated and remained under the head that was on the right side; but
    25 four remained in their place. And I looked, and behold, these under-wings were planning to rise up and hold rule.
    26 And I looked, and behold, one rose up, but immediately disappeared; then the second, and it disappeared more quickly than the former.
    27 And I looked, and behold, the two that remained were planning among themselves to reign as well.
    28 And while they were planning, behold, one of the resting heads awoke, the one in the middle, for it was larger than the two other heads.
    29 And I saw how it drew the two heads to itself,
    30 and behold, the head turned with those that were with it,
    31 and it devoured the two under-wings that were planning to reign.
    32 And this head held sway over the whole earth and ruled those who inhabited it with much oppression, and it had dominion over the inhabited world more than all the wings that had been before it.
    33 And after this I looked, and behold, the middle head suddenly disappeared, and this happened as with the wings.
    34 But two heads remained, and they too reigned over the earth and over those who dwell in it.
    35 And I looked, and behold, the head on the right side devoured the one on the left.
    36 Then I heard a voice saying to me, “Look before you, and consider what you see.”
    37 And I looked, and behold, something like a lion roused from the forest, roaring; and I heard how it sent out a human voice to the eagle and said,
    38 “Hear, and I will speak to you. The Most High says this to you:
    39 Are you not the one that survived from the four beasts which I made to reign in my age, so that through them the end of my times might come?
    40 And the fourth that came overcame all the beasts that had passed before, and held the age in great trembling, and the whole world in most grievous oppression, and for so long inhabited the world with deceit.
    41 And you judged the earth not with truth.
    42 For you afflicted the meek and injured the peaceable; you hated those who speak truth and loved liars; you destroyed the dwellings of those who bore fruit, and pulled down the walls of those who had done you no harm.
    43 So your insolence has gone up to the Most High, and your pride to the Mighty One.
    44 And the Most High has looked upon his times, and behold, they are ended, and his ages are complete.
    45 Therefore disappear, so that you may not appear again—you, eagle, and your dreadful wings and your wicked little pinions and your evil heads and your wicked claws and all your worthless body—
    46 so that the whole earth may have rest and be relieved, delivered from your violence, and may hope for the judgment and mercy of him who made it.”
