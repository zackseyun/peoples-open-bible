translation:
  language: es
  text: 'Jesús respondió y dijo a los expertos en la ley[a] y a los fariseos: «¿Es lícito sanar en sábado, o no?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término griego se refiere a especialistas en la ley judía.
    reason: lexical_clarification
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι funciona idiomáticamente con un verbo de habla posterior. En español, «respondió» conserva la idea de réplica en un contexto de controversia y suena natural; se mantiene además el vínculo con el verbo siguiente en la formulación completa «respondió y dijo».
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: Es la traducción narrativa normal de λέγω en una introducción de discurso. «Dijo» preserva el doble giro griego sin añadir matiz interpretativo.
- source_word: νομικοὺς
  english_pob_choice: lawyers
  chosen_spanish: expertos en la ley
  alternatives_spanish:
  - maestros de la ley
  - juristas
  lexicon: BDAG
  rationale: En este contexto νομικός se refiere a especialistas en la ley mosaica, no a abogados civiles. Se evita «abogados» por su posible ambigüedad moderna; «expertos en la ley» comunica bien el sentido religioso-jurídico y armoniza con el pie de nota que conserva la alternativa lexical.
- source_word: Φαρισαίους
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Transliteración estándar del grupo judío. En español eclesiástico y bíblico es la forma estable y más clara.
- source_word: Ἔξεστιν
  english_pob_choice: Is it lawful
  chosen_spanish: ¿Es lícito
  alternatives_spanish:
  - ¿Está permitido?
  - ¿Es permitido?
  lexicon: BDAG
  rationale: ἔξεστιν expresa lo permitido o lícito en un marco legal/halájico. «Lícito» reproduce esa fuerza normativa mejor que un mero «permitido» y encaja con la controversia sobre el sábado.
- source_word: τῷ σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - en el sábado
  - en día de sábado
  lexicon: BDAG
  rationale: El dativo tiene valor temporal. «En sábado» es una expresión natural en español bíblico y conserva la referencia al día sagrado sin sobrecargarla.
- source_word: θεραπεῦσαι
  english_pob_choice: to heal
  chosen_spanish: sanar
  alternatives_spanish:
  - curar
  - restaurar
  lexicon: BDAG
  rationale: En los Evangelios, θεραπεύω alude al acto de sanar a una persona enferma. «Sanar» es claro, digno y de uso amplio en español; evita reducir el sentido a «curar» si se quiere conservar el matiz de acción sanadora.
- source_word: ἢ οὔ
  english_pob_choice: or not
  chosen_spanish: o no
  alternatives_spanish:
  - o no
  - o no?
  lexicon: BDAG
  rationale: La cola disyuntiva final se vierte de manera directa y idiomática. «O no» preserva la pregunta cerrada sin añadir explicaciones.
theological_decisions:
- issue: Conservar la fuerza legal y polémica de la pregunta sobre el sábado
  english_pob_reading: Is it lawful to heal on the Sabbath, or not?
  chosen_spanish_reading: ¿Es lícito sanar en sábado, o no?
  alternative_spanish_readings:
  - ¿Está permitido sanar en sábado, o no?
  rationale: La frase presenta una cuestión legal-teológica en un contexto de controversia. «Lícito» mantiene la carga normativa de ἔξεστιν y evita suavizar la tensión del pasaje o introducir una conclusión sobre misericordia que el texto aún no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla interpretativamente
translation_notes:
  revision_awareness: 'El texto griego, la traducción inglesa auditada y las decisiones léxicas concuerdan en lo esencial: se mantiene la estructura de «respondió y dijo», se conserva el valor legal de ἔξεστιν y se traduce el objeto del debate con lenguaje natural en español. No se requieren revisiones adicionales respecto del pass más reciente, que fue estable y de alta concordancia.'
  spanish_consistency_notes:
  - Se conserva el nombre divino no presente en este versículo, por lo que no aplica la convención Yahvé/SEÑOR.
  - Se mantiene «fariseos» como transliteración estable.
  - Se usa «sanar» para θεραπεῦσαι por ser el verbo más natural y eclesiásticamente claro en español para el contexto de curación evangelística.
  - La nota lexical marca la alternativa «expertos en la ley» para reflejar la ambigüedad semántica de νομικοὺς, sin usar «abogados», que sería potencialmente anacrónico.
