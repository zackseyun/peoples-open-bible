translation:
  language: es
  text: Mira[a], tú has oído lo que los reyes de Asiria han hecho a todas las tierras, destruyéndolas por completo[b]—¿y tú serás librado[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira bien»; la partícula hebrea es una llamada enfática de atención.
    reason: lexical_alternative
  - marker: b
    text: O «consagrándolas a la destrucción»; el verbo hebreo transmite la idea de destrucción total, ligada al concepto de חרם.
    reason: lexical_alternative
  - marker: c
    text: O «¿y escaparás?»; la línea es una burla y se entiende mejor como una pregunta retórica.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática de atención. «Mira» comunica bien el valor deíctico en español moderno sin sonar anticuado como «He aquí».
- source_word: שָׁמַעְתָּ
  english_pob_choice: you have heard
  chosen_spanish: has oído
  alternatives_spanish:
  - oíste
  - has escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo en segunda persona singular se refleja naturalmente con el pretérito perfecto compuesto, conservando que la información ya es conocida por el destinatario.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: what ... have done
  chosen_spanish: lo que ... han hecho
  alternatives_spanish:
  - lo que ... hicieron
  - que ... hicieron
  lexicon: HALOT
  rationale: La cláusula relativa introduce el contenido de lo oído; «lo que han hecho» mantiene la referencia amplia y el matiz de acción ya realizada.
- source_word: מַלְכֵי אַשּׁוּר
  english_pob_choice: the kings of Assyria
  chosen_spanish: los reyes de Asiria
  alternatives_spanish:
  - los reyes asirios
  - los monarcas de Asiria
  lexicon: HALOT
  rationale: Se conserva la construcción posesiva natural en español y el referente histórico-geopolítico del texto.
- source_word: לְכָל הָאֲרָצוֹת
  english_pob_choice: to all the lands
  chosen_spanish: a todas las tierras
  alternatives_spanish:
  - a todos los países
  - a todas las naciones
  lexicon: HALOT
  rationale: «Tierras» preserva el plural hebreo y el sentido de territorios conquistados, sin reducirlo indebidamente a «países».
- source_word: לְהַחֲרִימָם
  english_pob_choice: destroying them utterly
  chosen_spanish: destruyéndolas por completo
  alternatives_spanish:
  - devastándolas por completo
  - consagrándolas a la destrucción
  lexicon: HALOT
  rationale: El verbo חרם tiene el peso de destrucción total; en español «destruyéndolas por completo» transmite ese valor de manera legible. Se evita un tecnicismo cultual en el texto principal, pero se conserva la intensidad semántica.
- source_word: וְאַתָּה תִּנָּצֵל
  english_pob_choice: and will you be delivered?
  chosen_spanish: ¿y tú serás librado?
  alternatives_spanish:
  - ¿y tú escaparás?
  - ¿y tú serás rescatado?
  lexicon: HALOT
  rationale: El Niphal de נצל admite «ser librado/rescatado»; aquí se mantiene el tono de burla y desafío del contexto. «Ser librado» resulta más sobrio y bíblico en español contemporáneo.
theological_decisions:
- issue: Valor de חרם en contexto de juicio militar
  english_pob_reading: destroying them utterly
  chosen_spanish_reading: destruyéndolas por completo
  alternative_spanish_readings:
  - consagrándolas a la destrucción
  - destruyéndolas completamente
  rationale: El hebreo evoca destrucción total, no simple derrota militar. La formulación elegida conserva esa fuerza sin introducir en el texto principal un término técnico que podría oscurecer la lectura.
  doctrine_reference: Translation philosophy §1, §5
- issue: Pregunta retórica final en tono de amenaza
  english_pob_reading: and will you be delivered?
  chosen_spanish_reading: ¿y tú serás librado?
  alternative_spanish_readings:
  - ¿y tú escaparás?
  - ¿y tú serás rescatado?
  rationale: El contexto es una burla asiria, por lo que la cláusula final debe leerse como pregunta retórica. La puntuación interrogativa en español ayuda a reproducir esa fuerza discursiva.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'La redacción sigue el último estado del audit trail inglés: se adoptó la formulación más natural «destruyéndolas por completo» en lugar de una versión más técnica, sin perder el peso semántico de חרם, y se mantuvo la pregunta retórica final. También se preservó la estructura exhortativa y el contraste entre las naciones ya destruidas y la posible liberación de Judá.'
  spanish_consistency_notes:
  - Se mantiene «Asiria» para אַשּׁוּר y no «el imperio asirio», porque el hebreo presenta el gentilicio/entidad de forma directa.
  - «Tierras» conserva el plural de אֲרָצוֹת y evita homogeneizarlo como singular abstracto.
  - Se usa «librado» en vez de una paráfrasis más libre para conservar la resonancia bíblica del verbo נצל.
  - Los corchetes de notas aparecen solo en palabras o frases con alternativa relevante, sin sobrecargar el texto principal.
