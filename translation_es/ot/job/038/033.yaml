review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura interrogativa y el sentido general del hebreo: conocimiento de las disposiciones celestes y capacidad de imponer su régimen en la tierra. Sin embargo, ''estatutos'' para חֻקּוֹת suena demasiado legal-civil en español y pierde el matiz cósmico que el rastro inglés justificó con ''ordinances''. ''Ordenanzas'' o una expresión equivalente preserva mejor el orden fijado. El resto —''¿Conoces...?'', ''¿Puedes establecer...?'', ''su gobierno''/''sobre la tierra''— se alinea aceptablemente con las decisiones fuente y la nota sobre el sufijo singular.'
  spanish_quality_summary: El español es claro y legible, pero 'estatutos de los cielos' resulta algo rígido y poco idiomático para un contexto cósmico; evoca códigos escritos más que ordenanzas fijadas en la creación. 'Ordenanzas de los cielos' suena más natural en registro bíblico digno y mantiene mejor el sentido. La nota al pie está bien formulada y clara.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. La principal cuestión terminológica interna es חֻקּוֹת: conviene ajustar ''estatutos'' a ''ordenanzas'' para concordar mejor con la rationale documentada del POB. ''Su gobierno'' para מִשְׁטָרוֹ es defendible en español, con las alternativas ''su dominio'' y ''su autoridad'' ya conservadas en nota.'
  issues:
  - severity: medium
    issue: '''estatutos'' para חֻקּוֹת debilita el matiz cósmico'
    rationale: Aunque posible léxicamente, en español 'estatutos' suele asociarse a reglamentos institucionales o legales. En este contexto de orden establecido en los cielos, 'ordenanzas' refleja mejor disposiciones fijas de la creación y se ajusta más de cerca a la rationale inglesa de 'ordinances'.
  revised_spanish_text: ¿Conoces las ordenanzas de los cielos? ¿Puedes establecer su gobierno sobre la tierra?[a]
