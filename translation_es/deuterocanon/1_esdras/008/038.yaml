translation:
  language: es
  text: 'los hijos de Astad: Joanes, hijo de Akatan[a], y con él ciento diez hombres[b];'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de Esdras 8:10 difiere notablemente aquí, con otro orden de nombres y el número de ciento sesenta varones. Como 1 Esdras se traduce del testimonio griego, se conservan en el texto principal los nombres y el total griegos.
    reason: textual_variant
  - marker: b
    text: 'O posiblemente: «Joanes Akatan»; el griego puede leerse como dos nombres contiguos sin un «hijo de» explícito, aunque el contexto de lista genealógica favorece la relación patronímica.'
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - hijos de
  - los descendientes de
  lexicon: LSJ
  rationale: En una lista genealógica, υἱοὶ introduce un grupo familiar o clan. 'Los hijos de' conserva la relación de pertenencia y el estilo de registro, sin forzar una paráfrasis más amplia como 'descendientes'.
- source_word: Ἀστάδ
  english_pob_choice: Astad
  chosen_spanish: Astad
  alternatives_spanish:
  - Astad
  - Astat
  lexicon: transliteración del griego
  rationale: Se conserva la forma propia del testimonio griego, que es la fuente primaria para 1 Esdras en este versículo.
- source_word: Ἰωάνης
  english_pob_choice: Joanes
  chosen_spanish: Joanes
  alternatives_spanish:
  - Joannes
  - Juanes
  - Johanan
  lexicon: transliteración del griego
  rationale: El nombre se vierte directamente desde Ἰωάνης. 'Joanes' refleja el valor griego sin sustituirlo por una forma semítica no atestiguada en el texto base griego.
- source_word: Ἀκατάν
  english_pob_choice: Akatan
  chosen_spanish: Akatán
  alternatives_spanish:
  - Akatan
  - Hakatán
  - como segundo nombre en aposición
  lexicon: LSJ
  rationale: El griego permite entender la secuencia como un nombre propio o una designación patronímica. En español, 'hijo de Akatán' expresa con claridad el valor genealógico que el contexto sugiere, sin perder la forma del nombre.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  - y con ellos
  lexicon: LSJ
  rationale: El pronombre singular αὐτοῦ remite al personaje nombrado. 'Y con él' mantiene la referencia singular y la estructura de la lista.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - males
  lexicon: LSJ
  rationale: ἄνδρες designa aquí hombres en sentido común. 'Hombres' es el equivalente natural en español y preserva el recuento de personas sin introducir una literalidad biológica innecesaria.
- source_word: ἑκατὸν δέκα
  english_pob_choice: one hundred ten
  chosen_spanish: ciento diez
  alternatives_spanish:
  - ciento diez
  - ciento y diez
  lexicon: LSJ
  rationale: El cardinal griego se expresa de forma directa y natural como 'ciento diez'.
theological_decisions:
- issue: Variante textual frente al paralelo hebreo de Esdras 8:10
  english_pob_reading: The Hebrew parallel at Ezra 8:10 differs notably here ... Because 1 Esdras is translated from the Greek witness, the Greek names and total are retained in the main text.
  chosen_spanish_reading: El paralelo hebreo de Esdras 8:10 difiere notablemente aquí; como 1 Esdras se traduce del testimonio griego, se conservan en el texto principal los nombres y el total griegos.
  alternative_spanish_readings:
  - armonizar con el paralelo hebreo
  - reemplazar el número por la cifra del paralelo
  rationale: 'La decisión no es doctrinal sino textual: el pasaje de 1 Esdras debe reflejar el testimonio griego base. Mantener la lectura griega preserva la transparencia del proceso y evita nivelar diferencias reales entre tradiciones textuales.'
  doctrine_reference: Principio de crítica textual y prioridad del testimonio fuente
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego de Swete 1909 como ancla primaria. El audit trail inglés no requirió cambios de revisión; la traducción española reproduce la estructura de lista, conserva los nombres propios y explicita en nota la variante textual y la ambigüedad patronímica. '
  spanish_consistency_notes:
  - Se mantiene 'hijos de' para υἱοὶ, coherente con un encabezado de clan o familia.
  - '''Astad'', ''Joanes'' y ''Akatán'' conservan transliteración griega sin sustituir por formas hebreas no base.'
  - '''hombres'' se usa para ἄνδρες, no ''varones'', por naturalidad estilística en español.'
  - El número se expresa como 'ciento diez', en concordancia con el cardinal griego.
  - Se usa puntuación de lista con dos puntos tras 'Astad' para reflejar la organización sintáctica del griego y la práctica editorial del corpus.
