translation:
  language: es
  text: y que agraviar a los que habían confiado en la santidad del lugar, y en la majestad y la inviolabilidad[a] del templo honrado en todo el mundo, era totalmente imposible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el derecho de asilo" para la inmunidad sagrada del templo contra toda violación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδίκησαί
  english_pob_choice: to wrong
  chosen_spanish: hacer mal a
  alternatives_spanish:
  - perjudicar
  - tratar injustamente a
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa actuar injustamente contra alguien. En español, "hacer mal a" conserva la fuerza moral de agravio sin sonar excesivamente jurídico o físico.
- source_word: τοὺς πεπιστευκότας
  english_pob_choice: those who had trusted
  chosen_spanish: los que habían confiado
  alternatives_spanish:
  - los que habían puesto su confianza
  - los que habían creído
  lexicon: BDAG
  rationale: El participio perfecto señala una confianza ya establecida. "Habían confiado" reproduce bien ese valor y evita introducir un matiz doctrinal de "creer" que el contexto no exige.
- source_word: ἁγιωσύνῃ
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - holiness
  - sacralidad
  lexicon: BDAG
  rationale: '"Santidad" es el equivalente natural en español para la cualidad sagrada del lugar. Mantiene el sentido de carácter consagrado del sitio.'
- source_word: τετιμημένου
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - estimado
  - tenido en honor
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe al templo como objeto de honor reconocido. "Honrado" es claro, digno y fiel al tono del pasaje.
- source_word: κατὰ τὸν σύμπαντα κόσμον
  english_pob_choice: throughout the whole world
  chosen_spanish: en todo el mundo
  alternatives_spanish:
  - por todo el mundo
  - en el mundo entero
  lexicon: BDAG
  rationale: La expresión es amplia y retórica. "En todo el mundo" transmite con naturalidad el alcance universal sin sobrecargar el español.
- source_word: σεμνότητι
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - dignidad
  - solemnidad
  - venerabilidad
  lexicon: BDAG
  rationale: En contexto templario, el término apunta a una dignidad augusta y reverente. "Majestad" comunica mejor esa elevación que "solemnidad" en español actual.
- source_word: ἀσυλίᾳ
  english_pob_choice: inviolability
  chosen_spanish: inviolabilidad
  alternatives_spanish:
  - derecho de asilo
  - asilo
  - inmunidad
  lexicon: LSJ
  rationale: El término griego puede evocar el privilegio de asilo, pero aquí está coordinado con cualidades abstractas del templo. "Inviolabilidad" preserva la idea de protección sacra y legal sin estrechar el sentido; el matiz de asilo queda disponible en nota.
- source_word: παντελῶς ἀμήχανον εἶναι
  english_pob_choice: was utterly impossible
  chosen_spanish: era totalmente imposible
  alternatives_spanish:
  - era completamente imposible
  - no podía ser de ningún modo
  lexicon: LSJ
  rationale: La expresión intensifica la imposibilidad. "Totalmente imposible" reproduce bien la fuerza de παντελῶς ἀμήχανον en español corriente y solemne.
theological_decisions:
- issue: Cómo traducir ἀσυλία sin borrar el trasfondo de asilo sagrado
  english_pob_reading: inviolability
  chosen_spanish_reading: inviolabilidad
  alternative_spanish_readings:
  - derecho de asilo
  - asilo-status
  - asilo
  rationale: El texto coordina ἀσυλίᾳ con "santidad" y "majestad", lo que favorece una formulación abstracta. "Inviolabilidad" conserva la protección sagrada y jurídica sin resolver el término hacia una lectura demasiado estrecha; la nota preserva el posible trasfondo de asilo.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo con el control cruzado fue alto, así que se mantiene la solución de la POB inglesa con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - '"Templo" se conserva de forma directa por el contexto del santuario de Jerusalén.'
  - Se evita "Cristo"/"Mesías" porque no aparecen en el pasaje.
  - '"Santidad", "majestad" e "inviolabilidad" preservan la tríada conceptual del griego sin fusionarla.'
  - La nota a pie de página se ancla en "santidad del lugar" para reflejar el posible matiz de asilo del sustantivo ἀσυλίᾳ.
