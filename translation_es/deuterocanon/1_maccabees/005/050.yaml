    text: El griego dice «en sus manos» con pronombre singular («de él»), no plural. Algunos traductores lo suavizan a «en sus manos» refiriéndolo al grupo, pero el texto base aquí conserva el singular.
    reason: alternative_reading
  revision_rationale: Se ajusta la cláusula final para reflejar explícitamente el singular αὐτοῦ, conforme al rastro de auditoría del POB, sin cambiar el plural de «manos» presente en χερσίν. También se aclara la nota para que explique con precisión la tensión entre el singular griego y la posible suavización al plural en traducción.
