translation:
  language: es
  text: 'Por tanto así dice Yahvé de los ejércitos: He aquí[a], voy a castigarles. Los jóvenes morirán a espada; sus hijos y sus hijas morirán por hambre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «voy a traer juicio sobre ellos». El hebreo dice literalmente: «estoy visitando sobre ellos», usando un verbo que en contextos de juicio puede significar llamar a cuentas o castigar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca una conclusión inferida del contexto previo. «Por tanto» conserva el valor conclusivo con tono profético y es natural en español bíblico moderno.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - de esta manera dice
  lexicon: HALOT
  rationale: La fórmula profética se mantiene con cadencia formal. «Así dice» reproduce bien el registro solemne sin caer en un arcaísmo innecesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino revelado, en vez de ocultarlo tras un título genérico.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: La construcción divina tradicional en español más transparente es «de los ejércitos». Conserva la amplitud de la expresión y su fuerza titular.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am about to
  chosen_spanish: He aquí, voy a
  alternatives_spanish:
  - He aquí, estoy por
  - Miren, voy a
  lexicon: HALOT
  rationale: La partícula introduce inmediatez e intensidad. En español, «He aquí, voy a» preserva la solemnidad y la inminencia del acto anunciado.
- source_word: פֹקֵד עֲלֵיהֶם
  english_pob_choice: punish them
  chosen_spanish: castigarles
  alternatives_spanish:
  - traer juicio sobre ellos
  - visitarles en juicio
  lexicon: HALOT
  rationale: En este contexto judicial, פקד con עַל implica actuación punitiva o de rendición de cuentas. «Castigarles» comunica el sentido sin perder la referencia a juicio.
- source_word: הַבַּחוּרִים
  english_pob_choice: The young men
  chosen_spanish: Los jóvenes
  alternatives_spanish:
  - Los muchachos
  - Los varones jóvenes
  lexicon: HALOT
  rationale: El hebreo se refiere a hombres jóvenes, probablemente de edad apta para la guerra. «Los jóvenes» es natural en español; el contexto de la espada aclara el matiz masculino.
- source_word: יָמֻתוּ בַחֶרֶב
  english_pob_choice: will die by the sword
  chosen_spanish: morirán a espada
  alternatives_spanish:
  - morirán por la espada
  - serán muertos a espada
  lexicon: HALOT
  rationale: «A espada» es la forma idiomática natural en español para este juicio de muerte violenta y preserva la fórmula bíblica sin calco torpe.
- source_word: בְּנֵיהֶם וּבְנוֹתֵיהֶם
  english_pob_choice: their sons and their daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus hijos e hijas
  - su descendencia
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente entre varones y mujeres descendientes. «Sus hijos y sus hijas» mantiene esa especificidad sin neutralizarla.
- source_word: יָמֻתוּ בָּרָעָב
  english_pob_choice: will die by famine
  chosen_spanish: morirán de hambre
  alternatives_spanish:
  - morirán por el hambre
  - morirán en la hambruna
  lexicon: HALOT
  rationale: Aunque רָעָב puede referirse a una hambruna, en español «de hambre» expresa con claridad el efecto mortal del término y su fuerza de juicio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto contiene explícitamente el nombre del pacto. Se mantiene como «Yahvé» conforme al criterio del proyecto, evitando una sustitución por título que borre la forma original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza judicial de הִנְנִי פֹקֵד עֲלֵיהֶם
  english_pob_reading: Behold, I am about to punish them
  chosen_spanish_reading: He aquí, voy a castigarles
  alternative_spanish_readings:
  - He aquí, voy a visitarlos
  - He aquí, voy a traer juicio sobre ellos
  rationale: La expresión indica intervención judicial inminente. «Castigarles» conserva el valor punitivo sin añadir un tecnicismo ajeno al verso. El pronombre enclítico se ajusta al español sintácticamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern Spanish; preserve source plain sense'
translation_notes:
  revision_awareness: 'La versión española sigue el mismo sentido que el texto hebreo y el POB inglés: conclusión causal, fórmula profética, nombre divino explícito, anuncio de juicio inminente y paralelismo entre espada y hambre. Se optó por una redacción natural en español, manteniendo la tensión lexical de פקד con una nota alternativa en vez de neutralizarla.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton conforme al estándar del proyecto.
  - Se mantuvo el paralelismo «a espada / de hambre» como equivalencia directa de los dos instrumentos de muerte.
  - «Castigarles» refleja el valor judicial del participio hebreo sin perder el matiz de acción inminente.
  - La fórmula profética «Así dice Yahvé de los ejércitos» conserva el registro oracular del original.
