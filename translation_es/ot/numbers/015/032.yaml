revisions:
- from: Mientras los hijos de Israel estaban en el desierto[a], hallaron a un hombre recogiendo leña en día de sábado.
  to: Mientras los hijos de Israel estaban en el desierto[a], hallaron a un hombre recogiendo leña en el día de sábado.
  rationale: Se mantiene casi todo el borrador porque es fiel al hebreo y a la auditoría inglesa. Solo se corrige 'en día de sábado' a 'en el día de sábado' para cumplir con la sintaxis natural del español sin perder la explicitud de יוֹם ('día').
