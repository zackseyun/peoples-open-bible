translation:
  language: es
  text: Que sean avergonzados y confundidos[a] los que buscan mi vida; que vuelvan atrás y sean deshonrados los que se complacen en mi daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que buscan mi alma'. Aquí 'alma' (נפש) es un modismo para la vida o la persona misma, especialmente en un contexto de peligro mortal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: be put to shame
  chosen_spanish: sean avergonzados
  alternatives_spanish:
  - se avergüencen
  - sean puestos en vergüenza
  lexicon: HALOT
  rationale: בוש expresa la experiencia de vergüenza o quedar avergonzado. En español, 'sean avergonzados' conserva la pasiva deseada en el clamor imprecatorio y suena natural en registro bíblico.
- source_word: וְיַחְפְּרוּ
  english_pob_choice: confounded
  chosen_spanish: confundidos
  alternatives_spanish:
  - desconcertados
  - humillados
  lexicon: HALOT
  rationale: חפר en este uso transmite quedar deshonrado, abatido o avergonzado. 'Confundidos' mantiene la intensidad y acompaña bien a 'avergonzados' sin repetir exactamente la misma idea; el marcador textual permite reflejar la dobletía semántica del hebreo.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  english_pob_choice: those who seek my life
  chosen_spanish: los que buscan mi vida
  alternatives_spanish:
  - los que buscan mi alma
  - los que procuran mi vida
  lexicon: HALOT
  rationale: נפש aquí es un modismo de vida o yo mismo en contexto hostil. 'Mi vida' es la equivalencia más clara y fiel en español; 'mi alma' sería más literal pero menos natural y podría oscurecer el sentido amenazante.
- source_word: יִסֹּגוּ אָחוֹר
  english_pob_choice: turn back
  chosen_spanish: vuelvan atrás
  alternatives_spanish:
  - retrocedan
  - se den vuelta
  lexicon: HALOT
  rationale: סוג + אחר expresa retroceder o volver atrás. 'Vuelvan atrás' reproduce bien la imagen direccional y el tono de rechazo/imprecación.
- source_word: וְיִכָּלְמוּ
  english_pob_choice: be disgraced
  chosen_spanish: sean deshonrados
  alternatives_spanish:
  - queden avergonzados
  - sean afrentados
  lexicon: HALOT
  rationale: כלם refiere al deshonor público, la deshonra o la vergüenza social. 'Sean deshonrados' evita redundar con 'avergonzados' y conserva el matiz de afrenta pública.
- source_word: חֲפֵצֵי רָעָתִי
  english_pob_choice: those who delight in my harm
  chosen_spanish: los que se complacen en mi mal
  alternatives_spanish:
  - los que desean mi daño
  - los que se deleitan en mi mal
  lexicon: HALOT
  rationale: חפץ comunica deleite o complacencia. רעה con sufijo de primera persona aquí apunta a daño, calamidad o mal para el salmista, no a maldad moral propia. 'Mi mal' es breve, natural y suficientemente amplio para ese campo semántico.
theological_decisions:
- issue: Fuerza imprecatoria/jussiva de los verbos
  english_pob_reading: Render as a prayer/wish with repeated 'Let those who...'
  chosen_spanish_reading: 'Usar subjuntivo exhortativo: ''Sean...; vuelvan...; sean...'''
  alternative_spanish_readings:
  - Que sean...; que vuelvan...; que sean...
  - Serán...
  rationale: El hebreo expresa una petición imprecatoria, no una simple predicción. En español, el subjuntivo exhortativo reproduce mejor esa fuerza oracional que el futuro indicativo.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La versión anterior falló porque el marcador de nota no aparecía en el texto español. En esta revisión, el marcador [a] está colocado directamente sobre 'mi vida', que es precisamente el punto donde existe la alternativa lexical documentada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino conforme a las normas del proyecto; este versículo no contiene el Tetragrámaton.
  - 'Se prefirió ''mi vida'' a ''mi alma'' por la misma razón que en el audit trail inglés: el hebreo נפש en este contexto es idiomático y amenaza la vida del salmista.'
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no requeridas por la fuente.
  - 'El paralelismo poético se conservó con dos miembros de petición negativa: vergüenza/confusión y retroceso/deshonra.'
