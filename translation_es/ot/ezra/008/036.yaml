base_translation:
  language: en
  yaml_path: translation/ot/ezra/008/036.yaml
  text: And they delivered the king’s decrees to the king’s satraps and the governors Beyond the River[c][b][a], and they supported the people and the house of God.
  footnotes:
  - marker: a
    text: Or “helped” / “assisted”; the Hebrew verb literally means “lifted up” or “carried,” here in the sense of giving support.
    reason: lexical_alternative
  - marker: b
    text: “Beyond the River” is the Persian administrative term for the region west of the Euphrates.
    reason: cultural_note
  - marker: c
    text: Or “the temple of God.”
    reason: lexical_alternative
