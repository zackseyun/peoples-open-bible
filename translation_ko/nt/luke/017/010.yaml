id: LUK.17.10
reference: Luke 17:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς, ὅταν ποιήσητε πάντα τὰ διαταχθέντα ὑμῖν, λέγετε ὅτι Δοῦλοι ἀχρεῖοί ἐσμεν, ⸂ὃ ὠφείλομεν⸃ ποιῆσαι πεποιήκαμεν.
base_translation:
  language: en
  yaml_path: translation/nt/luke/017/010.yaml
  text: So also you[a], when you have done all that was commanded you, say, ‘We are unworthy slaves[b]; we have done what we were obligated to do.’
  footnotes:
  - marker: a
    text: Or 'unprofitable slaves' or 'worthless slaves.' The Greek adjective can carry the sense of being of no profit or having no claim to reward.
    reason: lexical_alternative
  - marker: b
    text: Or 'what was our duty to do.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이와 같이 여러분도 명령받은 모든 것을 행했을 때 이렇게 말하십시오. 「우리는 무익한 종입니다. 우리는 마땅히 해야 할 일을 했을 뿐입니다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀχρεῖοι
  english_pob_choice: unworthy
  chosen_korean: 무익한
  alternatives_korean:
  - 쓸모없는
  - 아무 공로 없는
  lexicon: BDAG
  rationale: ἀχρεῖος는 「공로를 주장할 수 없는」 무익함을 가리킨다. 「무익한」은 한국 전통 어휘를 유지하면서 「쓸모없는」의 모욕적 어감을 피한다.
