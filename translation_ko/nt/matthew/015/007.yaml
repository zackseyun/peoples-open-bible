lexical_decisions:
- source_word: ὑποκριταί
  english_pob_choice: Hypocrites
  chosen_korean: 위선자들아
  alternatives_korean:
  - 외식하는 자들아
  lexicon: BDAG
  rationale: 호격 복수. 「외식하는 자」는 한국 성경 전통의 정착어이나 「위선자」가 현대 한국어 독자에게 의미 부담 없이 정확하게 다가가며 본문의 도덕적 고발의 날카로움을 보존한다.
- source_word: καλῶς
  english_pob_choice: rightly
  chosen_korean: 옳게
  alternatives_korean:
  - 잘
  - 적절히
  lexicon: BDAG
  rationale: 이사야의 예언이 청중에 대해 「합당하게·옳게」 적용된다는 뜻. 「옳게」가 자연스럽다.
- source_word: ἐπροφήτευσεν
  english_pob_choice: prophesied
  chosen_korean: 예언하여
  lexicon: BDAG
  rationale: 부정과거. 이사야 인용을 도입한다. 정착어 「예언하다」로 옮긴다.
