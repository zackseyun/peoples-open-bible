theological_decisions:
- issue: Marriage/inheritance phrasing in a kinship-law context
  chosen_reading: because her inheritance falls to you, and you alone are from her family
  alternative_readings:
  - because you are entitled to inherit her
  - because the inheritance is incumbent on you as her kinsman
  rationale: The verse grounds the proposed marriage in kinship and inheritance custom. The translation preserves that legal-social logic without importing later doctrinal categories or overexplaining the custom in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning without paraphrase'
