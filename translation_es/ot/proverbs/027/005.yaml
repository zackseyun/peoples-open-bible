translation:
  language: es
  text: Mejor es la reprensión abierta que el amor oculto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘amor oculto’. El hebreo puede referirse al amor que no se expresa, más que a un amor que no existe.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹבָה
  english_pob_choice: better
  chosen_spanish: Mejor
  alternatives_spanish:
  - bueno
  - más bueno
  lexicon: HALOT
  rationale: En una construcción comparativa como esta, el hebreo expresa valoración relativa; en español, 'mejor' comunica de manera natural esa comparación sin perder el sentido proverbial.
- source_word: תּוֹכַחַת
  english_pob_choice: rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - reproche
  - corrección
  lexicon: HALOT
  rationale: El término abarca censura verbal o corrección. 'Reprensión' conserva la fuerza de una amonestación directa sin sonar excesivamente técnica. 'Reproche' es posible, pero algo más personal; 'corrección' resulta más amplia y suave.
- source_word: מְגֻלָּה
  english_pob_choice: open
  chosen_spanish: abierta
  alternatives_spanish:
  - revelada
  - descubierta
  - franca
  lexicon: HALOT
  rationale: El participio pasivo significa literalmente 'descubierta/revelada'. En español, 'reprensión abierta' comunica de forma idiomática una reprensión que no está oculta ni disimulada. 'Franca' enfatiza sinceridad, pero no reproduce tan bien la imagen de lo manifiesto.
- source_word: מִן
  english_pob_choice: than
  chosen_spanish: que
  alternatives_spanish:
  - más que
  - desde
  lexicon: HALOT
  rationale: La preposición funciona aquí comparativamente después de 'mejor'; en español, la construcción natural es 'mejor ... que ...'.
- source_word: אַהֲבָה
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - afecto
  - caridad
  lexicon: HALOT
  rationale: '''Amor'' es la equivalencia directa y más transparente para el sustantivo común. ''Afecto'' debilita el peso del término; ''caridad'' introduce un matiz posterior no requerido por el hebreo.'
- source_word: מְסֻתָּרֶת
  english_pob_choice: hidden
  chosen_spanish: oculto
  alternatives_spanish:
  - escondido
  - encubierto
  - secreto
  lexicon: HALOT
  rationale: 'El participio indica algo escondido o no visible. ''Oculto'' conserva la ambigüedad del hebreo: amor no expresado o no manifestado. ''Secreto'' podría sugerir romance ilícito, algo que el texto no exige.'
translation_notes:
  revision_awareness: El pasaje presenta un paralelismo breve y proverbial sin revisiones textuales relevantes en el audit trail; la traducción sigue de cerca el hebreo y mantiene la tensión entre reprensión visible y amor no manifestado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió 'reprensión' para conservar el tono de censura directa sin ampliar indebidamente el alcance semántico.
  - '''Oculto'' se prefirió a ''secreto'' para no introducir una implicación moral ajena al hebreo.'
