translation:
  language: es
  text: Sálvame[a], Dios, porque las aguas han llegado hasta mi cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a mi alma»; נֶפֶשׁ puede significar «alma», «vida», «ser» o, en contextos como este, la garganta o el cuello.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: Save me
  chosen_spanish: Sálvame
  alternatives_spanish:
  - Líbrame
  - Rescátame
  lexicon: HALOT
  rationale: El hiphil imperativo con sufijo de primera persona expresa una súplica directa de liberación. En español, «sálvame» es la equivalencia más natural y reconocible en lenguaje de oración, y conserva el tono urgente del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí funciona como vocativo en apelación directa. «Oh Dios» mantiene la invocación poética y el matiz de ruego urgente que el inglés POB marcó con «O God».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición. En español, «porque» expresa de forma clara y natural la relación causal del verso sin perder la concisión poética.
- source_word: בָאוּ
  english_pob_choice: have come up
  chosen_spanish: han llegado
  alternatives_spanish:
  - han venido
  - han subido
  lexicon: HALOT
  rationale: El hebreo presenta la llegada ascendente de las aguas en una imagen de ahogo. En español, «han llegado» funciona bien con la frase siguiente «hasta mi cuello»; la idea de ascenso queda implícita por el contexto, sin forzar una perífrasis poco natural.
- source_word: מַיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - aguas
  - las aguas de la inundación
  lexicon: HALOT
  rationale: El plural poético hebreo se conserva con «las aguas». Mantiene el tono imagístico y evita añadir una especificación como «inundación» que el texto hebreo no expresa de forma explícita.
- source_word: עַד נָפֶשׁ
  english_pob_choice: to my neck
  chosen_spanish: hasta mi cuello
  alternatives_spanish:
  - hasta mi alma
  - hasta mi vida
  - hasta mi garganta
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar «alma», «vida», «ser» y, en este contexto de ahogo, apunta al sentido corporal de garganta/cuello. «Hasta mi cuello» comunica la metáfora de peligro inminente con claridad moderna, mientras que la alternativa más literal se preserva en la nota.
theological_decisions:
- issue: Valor de נֶפֶשׁ en una imagen de naufragio/ahogo
  english_pob_reading: Concrete bodily sense ('neck') within the drowning metaphor
  chosen_spanish_reading: Sentido corporal concreto («cuello») dentro de la metáfora de ahogo
  alternative_spanish_readings:
  - 'Sentido antropológico más literal: «alma»'
  - 'Sentido existencial amplio: «vida»'
  rationale: El verso no hace una afirmación doctrinal sobre el alma, sino que usa imaginería poética de peligro extremo. Traducir por el sentido evidente de la imagen preserva la fuerza del texto; la alternativa más literal se conserva para no perder la amplitud semántica del hebreo.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión indicó alta coincidencia y ningún ajuste necesario. Se mantiene la solución publicada en inglés como base auditable para la elección española.
  spanish_consistency_notes:
  - Se conserva «Dios» en vocativo con «oh» para reflejar el tono de súplica.
  - Se mantiene el plural poético «las aguas» para seguir de cerca el hebreo.
  - La nota sobre נֶפֶשׁ preserva la tensión lexical entre el sentido corporal y el antropológico sin eliminarla.
  - No se introduce «SEÑOR» porque el texto hebreo aquí dice אֱלֹהִים y no el Tetragrámaton.
