translation:
  language: es
  text: Como un vencejo o una grulla[a], así gorjeo; gimo como una paloma. Mis ojos se debilitan mirando hacia lo alto. Señor, estoy oprimido; sé mi fiador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo una identificación tradicional, «Como una golondrina o una grulla». El nombre del primer ave es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּסוּס עָגוּר
  english_pob_choice: Like a swift or a crane
  chosen_spanish: Como un vencejo o una grulla
  alternatives_spanish:
  - Como una golondrina o una grulla
  lexicon: HALOT
  rationale: El hebreo presenta dos aves, y el primer término es incierto. “Vencejo” conserva la opción moderna que evita fijar indebidamente la identificación; “golondrina” queda como alternativa tradicional. “Grulla” corresponde bien al segundo término y mantiene el paralelismo poético.
- source_word: אֲצַפְצֵף
  english_pob_choice: I chirp
  chosen_spanish: gorjeo
  alternatives_spanish:
  - pío
  - trino
  lexicon: HALOT
  rationale: El verbo describe un sonido agudo de ave. “Gorjeo” es natural en español para un canto/sonido breve y agudo, y preserva el matiz aviar sin sonar demasiado coloquial.
- source_word: אֶהְגֶּה
  english_pob_choice: I moan
  chosen_spanish: gimo
  alternatives_spanish:
  - murmuro
  - gimo
  lexicon: HALOT
  rationale: En este lamento, el verbo expresa una vocalización baja de aflicción. “Gimo” comunica bien la queja dolorosa y complementa el contraste con “gorjeo”.
- source_word: כַּיּוֹנָה
  english_pob_choice: like a dove
  chosen_spanish: como una paloma
  alternatives_spanish:
  - como una tórtola
  lexicon: HALOT
  rationale: La comparación es directa. “Paloma” reproduce con claridad el ave mencionada; “tórtola” sería una opción contextual, pero el hebreo no la especifica.
- source_word: דַּלּוּ עֵינַי
  english_pob_choice: My eyes grow weak
  chosen_spanish: Mis ojos se debilitan
  alternatives_spanish:
  - Mis ojos desfallecen
  - Mis ojos se cansan
  lexicon: HALOT
  rationale: La expresión idiomática indica agotamiento visual. “Se debilitan” conserva la imagen y suena natural en español sin reducirla a una mera frase clínica.
- source_word: לַמָּרוֹם
  english_pob_choice: looking upward
  chosen_spanish: mirando hacia lo alto
  alternatives_spanish:
  - mirando al cielo
  - mirando arriba
  lexicon: HALOT
  rationale: El hebreo dice literalmente “hacia lo alto”. “Mirando hacia lo alto” respeta la dirección sin introducir “cielo” donde el texto sólo dice altura/lo alto.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Señor mío
  lexicon: HALOT
  rationale: Aquí es un vocativo divino. En español, “Señor” mantiene la función de título y la claridad litúrgica sin convertirlo en nombre propio.
- source_word: עָשְׁקָה לִּי
  english_pob_choice: I am oppressed
  chosen_spanish: estoy oprimido
  alternatives_spanish:
  - soy tratado con violencia
  - se me hace injusticia
  lexicon: HALOT
  rationale: La raíz expresa opresión, abuso o agravio. “Estoy oprimido” conserva el sentido de sufrimiento sufrido por el hablante y encaja bien con la súplica siguiente.
- source_word: עָרְבֵנִי
  english_pob_choice: be my pledge
  chosen_spanish: sé mi fiador
  alternatives_spanish:
  - hazte garante por mí
  - sé mi garante
  lexicon: HALOT
  rationale: El verbo tiene un trasfondo legal de garantía/aval. “Fiador” preserva esa relación de responsabilidad y evita diluir la imagen en un simple “ayúdame”.
theological_decisions:
- issue: Tratamiento del vocativo divino אֲדֹנָי
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - mi Señor
  rationale: Se trata de una dirección a Dios en forma de título, no del Tetragrámaton. “Señor” traduce el título con naturalidad y sigue la política de distinguirlo de Yahvé en el texto principal.
  doctrine_reference: 'DOCTRINE.md: translate titles; preserve distinction between divine name and title'
- issue: Mantenimiento de la ambigüedad en כְּסוּס עָגוּר
  english_pob_reading: Like a swift or a crane
  chosen_spanish_reading: Como un vencejo o una grulla
  alternative_spanish_readings:
  - Como una golondrina o una grulla
  rationale: La identificación zoológica del primer ave es incierta. El español principal conserva esa incertidumbre con una opción moderna; la lectura tradicional queda registrada como alternativa sin cerrar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension rather than resolve uncertainty prematurely'
translation_notes:
  revision_awareness: 'La versión actual coincide con la última revisión disponible: no se registran cambios pendientes y el consenso del control cruzado fue alto, con observaciones menores ya resueltas en el criterio léxico.'
  spanish_consistency_notes:
  - He mantenido «Señor» para אֲדֹנָי como vocativo, en coherencia con la distinción de Yahvé en el texto principal.
  - He preservado la incertidumbre del primer ave en el cuerpo y en la nota, sin sobreespecificar la especie.
  - «Fiador» conserva el matiz legal del verbo final mejor que una paráfrasis general.
  - El registro combina dignidad y español contemporáneo, evitando calcos innecesarios.
