revisions:
- from: Fue oprimido[a], y fue afligido, pero no abrió su boca; como cordero llevado al matadero, y como oveja muda delante de sus esquiladores, tampoco abrió su boca.
  to: Fue oprimido[a], y fue afligido, pero no abrió su boca; como cordero que es llevado al matadero, y como oveja silenciosa delante de sus esquiladores, así no abrió su boca.
  rationale: Se ajusta «muda» a «silenciosa» para reflejar mejor נֶאֱלָמָה; se mejora la naturalidad de la primera comparación con «que es llevado»; y se cambia el cierre a «así no abrió su boca» para reproducir mejor la fuerza conclusiva del paralelo hebreo y del POB inglés.
  reviewer_model: gpt-5.4
