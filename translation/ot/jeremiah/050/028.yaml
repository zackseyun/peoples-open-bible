id: JER.50.28
reference: Jeremiah 50:28
source:
  edition: WLC
  text: ק֥וֹל נָסִ֛ים וּ/פְלֵטִ֖ים מֵ/אֶ֣רֶץ בָּבֶ֑ל לְ/הַגִּ֣יד בְּ/צִיּ֗וֹן אֶת נִקְמַת֙ יְהוָ֣ה אֱלֹהֵ֔י/נוּ נִקְמַ֖ת הֵיכָלֽ/וֹ־׃
translation:
  text: The sound of fugitives and escapees from the land of Babylon[a], to declare in Zion the vengeance of Yahweh our God[c][b], the vengeance for his temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A voice of fugitives and escapees.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and survivors.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the vengeance of his temple'; the phrase likely means vengeance for the wrong done to his temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וֹל
  chosen: The sound of
  alternatives:
  - A voice of
  - The noise of
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound, voice, or noise. Here it introduces what is heard—namely fugitives and escapees coming from Babylon—so 'The sound of' best captures the auditory scene in natural English without overpersonalizing it as a single 'voice'.
- source_word: נָסִים
  chosen: fugitives
  alternatives:
  - those fleeing
  - refugees
  lexicon: HALOT
  rationale: From נוס, 'to flee.' The participial form denotes people in flight. 'Fugitives' is concise and preserves the sense of those who have fled, without importing modern legal connotations too strongly in context.
- source_word: וּפְלֵטִים
  chosen: and escapees
  alternatives:
  - and survivors
  - and those who have escaped
  lexicon: HALOT
  rationale: פלטים refers to those who have escaped or been delivered. 'Escapees' keeps the parallel with 'fugitives' and preserves the concrete sense of persons who got away. 'Survivors' is possible but slightly shifts emphasis from escape to mere continued life.
- source_word: מֵאֶרֶץ בָּבֶל
  chosen: from the land of Babylon
  alternatives:
  - from Babylon
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land' (אֶרֶץ), so it is retained for fuller formal correspondence and to emphasize departure from Babylonian territory.
- source_word: לְהַגִּיד
  chosen: to declare
  alternatives:
  - to tell
  - to announce
  - to proclaim
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the fugitives come out in order to report publicly in Zion what the LORD has done. ''Declare'' balances formality and clarity better than the more casual ''tell''.'
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - to Zion
  lexicon: HALOT
  rationale: The preposition is ב ('in'), not אֶל ('to'). The sense is that the declaration is made within Zion, not merely directed toward it.
- source_word: נִקְמַת
  chosen: the vengeance
  alternatives:
  - the vindication
  - the avenging
  lexicon: HALOT
  rationale: נקמה denotes vengeance or avenging. In this judgment context, 'vengeance' is the most direct lexical equivalent. 'Vindication' captures part of the theological effect but softens the punitive force present in the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: 'The suffix is first person plural, and the covenantal confession is important to preserve: this is not generic deity language but Israel''s confession, ''our God.'''
- source_word: נִקְמַת הֵיכָלוֹ
  chosen: the vengeance for his temple
  alternatives:
  - the vengeance of his temple
  - vengeance on behalf of his temple
  lexicon: HALOT
  rationale: 'The second construct phrase specifies the object or cause of the vengeance: it is vengeance connected with the wrong done to his temple. English idiom is best served by ''for his temple.'' A more wooden ''of his temple'' is ambiguous in English.'
- source_word: הֵיכָלוֹ
  chosen: his temple
  alternatives:
  - his palace-sanctuary
  - his sanctuary
  lexicon: HALOT
  rationale: הֵיכָל in this context refers to the Jerusalem temple. 'Temple' is the clear and standard rendering; 'palace' would be misleading here.
