translation:
  language: es
  text: Pero para la vida pide a una cosa muerta; por ayuda, suplica al más incapaz; y para un viaje[a], al que ni siquiera puede servirse de sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al que ni siquiera puede servirse de su base/pedestal'. El griego βάσις puede sugerir tanto pie/paso como base, y la línea se burla de la incapacidad del ídolo para moverse por sí mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζωῆς
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  - para vivir
  lexicon: LSJ
  rationale: περὶ + genitivo expresa aquí el asunto de la petición. En español, 'por la vida' conserva con naturalidad ese valor de finalidad/asunto sin recargar el verso.
- source_word: τὸ νεκρόν
  english_pob_choice: the dead thing
  chosen_spanish: una cosa muerta
  alternatives_spanish:
  - el muerto
  - lo muerto
  - un cadáver
  lexicon: LSJ
  rationale: El neutro singular apunta a un objeto inanimado, no a una persona. 'Una cosa muerta' preserva el carácter polémico contra la imagen sin personalizarla indebidamente.
- source_word: ἀξιοῖ
  english_pob_choice: asks
  chosen_spanish: pide
  alternatives_spanish:
  - solicita
  - demanda
  - considera digno
  lexicon: LSJ
  rationale: Aunque el verbo puede expresar 'considerar digno', el contexto satírico favorece el sentido de pedir algo al ídolo. 'Pide' refleja mejor la revisión inglesa y mantiene la ironía del contraste.
- source_word: ἐπικουρίας
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - auxilio
  - asistencia
  - socorro
  lexicon: LSJ
  rationale: '''Ayuda'' es la opción más natural en español moderno y conserva el paralelismo con las otras peticiones.'
- source_word: τὸν ἀπειρότατον
  english_pob_choice: the one most incapable
  chosen_spanish: al más incapaz
  alternatives_spanish:
  - al más inexperto
  - al totalmente inepto
  - al más inepto
  lexicon: LSJ
  rationale: Aunque el griego puede sugerir falta de experiencia, la revisión inglesa entendió aquí incapacidad. En español, 'más incapaz' transmite mejor la sátira sobre un ídolo sin poder alguno.
- source_word: ἱκετεύει
  english_pob_choice: implores
  chosen_spanish: suplica
  alternatives_spanish:
  - implora
  - ruega
  - entrega súplicas
  lexicon: LSJ
  rationale: El verbo denota ruego intenso. 'Suplica' conserva la fuerza reverente y encaja con el tono retórico del pasaje.
- source_word: ὁδοιπορίας
  english_pob_choice: a journey
  chosen_spanish: un viaje
  alternatives_spanish:
  - un camino
  - una travesía
  - un recorrido
  lexicon: LSJ
  rationale: '''Un viaje'' es una equivalencia natural y clara para el desplazamiento humano en contexto.'
- source_word: τὸ μηδὲ βάσει χρῆσθαι δυνάμενον
  english_pob_choice: the one unable even to use its foot
  chosen_spanish: al que ni siquiera puede usar su pie
  alternatives_spanish:
  - al que ni siquiera puede usar su base
  - al que ni siquiera puede servirse de un apoyo
  - al que no puede ni dar un paso
  lexicon: LSJ
  rationale: βάσις puede aludir a pie, paso o base/pedestal. La referencia en la revisión inglesa favorece la imagen de movilidad imposible; 'su pie' mantiene el golpe satírico y el sentido concreto, mientras la nota conserva la alternativa 'base'.
theological_decisions:
- issue: Referente neutro y cambios de género en el ridículo del ídolo
  english_pob_reading: Render the idol as an impersonal object ('the dead thing') but retain personal language where the Greek shifts to masculine forms ('the one most inexperienced').
  chosen_spanish_reading: Conservar el objeto impersonal ('una cosa muerta') y, donde el griego personifica por la forma gramatical, mantener la referencia al destinatario como ser incapaz ('al más incapaz').
  alternative_spanish_readings:
  - uniformar todo con 'lo'
  - uniformar todo con 'el ídolo'
  - personalizar plenamente el objeto
  rationale: El griego alterna expresiones para intensificar la burla sin resolver la ambigüedad del objeto tallado. El español debe reflejar esa tensión retórica sin corregirla ni suavizarla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'considers worthy' por 'asks', 'begs' por 'implores', y 'most inexperienced' por 'most incapable'. Esta versión española sigue esa línea revisada y evita volver a un sentido menos natural o más débil del texto satírico.
  spanish_consistency_notes:
  - Se mantiene 'vida' / 'ayuda' / 'viaje' como sustantivos directos y de registro bíblico moderno.
  - Se evita 'señor' o fórmulas eclesiásticas tradicionales porque el texto no las exige.
  - '''Una cosa muerta'' conserva el neutro despectivo del original sin convertirlo en persona.'
  - La nota de βάσις preserva la ambigüedad semántica relevante para la sátira.
