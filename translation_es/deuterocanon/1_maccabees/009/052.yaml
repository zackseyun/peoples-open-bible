  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. En topónimos, «Gazara» está bien alineado con la política de seguir la forma griega y explicarla en nota. «Bet-sur» es aceptable como transliteración española. El ajuste principal es léxico-contextual para ἄκραν: «la ciudadela» en texto principal con nota «el Acra».'
