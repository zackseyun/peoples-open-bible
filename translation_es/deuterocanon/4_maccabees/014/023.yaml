review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ἠγάπησεν μᾶλλον = «amó más», εὐσέβειαν = «piedad», τὴν σώζουσαν = «la piedad que salva», y mantiene la literalidad abierta de κατὰ θεόν. Sin embargo, «para vida eterna» suena menos fiel al valor direccional/meta de εἰς que «a la vida eterna», y en español la coma actual hace la frase algo trabada.'
  spanish_quality_summary: El español es comprensible y digno, pero puede leerse con más naturalidad si se elimina la coma explicativa y se ajusta «para vida eterna» a «a la vida eterna». Además, la nota léxica con «religiosidad» no ayuda tanto como «temor reverente» o mantener solo alternativas más cercanas; no obstante, no es un problema grave.
  glossary_alignment: «Piedad» para εὐσέβεια concuerda con la decisión auditada y funciona bien en español eclesial. No hay conflicto con la terminología base del proyecto. «Conforme a Dios» preserva adecuadamente la apertura de κατὰ θεόν, aunque «según Dios» sería demasiado duro en español.
  issues:
  - severity: medium
    issue: «para vida eterna» debilita el sentido de meta de εἰς αἰώνιον ζωὴν
    rationale: El inglés auditado fue revisado a «unto eternal life» para reflejar mejor εἰς. En español, «a la vida eterna» o «hacia la vida eterna» conserva mejor ese movimiento/resultado que «para vida eterna», que suena más final o utilitario.
  - severity: low
    issue: La puntuación con coma hace pesada la aposición
    rationale: '«Amó más la piedad, la piedad que salva…» es entendible, pero en español fluye mejor sin coma: «Amó más la piedad que salva…», ya que el relativo ya identifica y desarrolla el sustantivo.'
  - severity: low
    issue: La alternativa «religiosidad» en la nota léxica no es la mejor equivalencia contextual
    rationale: Aunque posible en abstracto, «religiosidad» en español moderno puede sonar sociológica o menos orientada a la devoción reverente hacia Dios que expresa εὐσέβεια.
  revised_spanish_text: Amó más la piedad[a] que salva[b] a la vida eterna, conforme a Dios.
  revised_footnotes:
  - marker: a
    text: O «devoción» para εὐσέβεια.
    reason: lexical_alternative
  - marker: b
    text: La frase «conforme a Dios» puede también entenderse como «según la voluntad de Dios» o «a juicio de Dios».
    reason: alternative_reading
  revision_rationale: Se ajusta εἰς αἰώνιον ζωὴν a «a la vida eterna» para reflejar mejor la meta o resultado expresados en el griego y en la auditoría inglesa. Se elimina la repetición aposicional con coma para dar un español más natural sin perder el vínculo atributivo de τὴν σώζουσαν con «piedad». Se simplifica la nota léxica para mantener una alternativa más cercana y útil.
