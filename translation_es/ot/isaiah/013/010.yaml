- from: Porque las estrellas de los cielos y sus constelaciones[a] no darán su luz; el sol será oscurecido al salir[b], y la luna no hará resplandecer su luz.
  to: Porque las estrellas de los cielos y sus constelaciones[a] no darán su luz; el sol se oscurecerá al salir, y la luna no hará resplandecer su luz.
  rationale: Se mejora la naturalidad del español con «se oscurecerá» sin alterar el sentido del hebreo ni la decisión del POB. Se elimina la nota b porque no está respaldada por el rastro de auditoría inglés y no hace falta para resolver una ambigüedad relevante en español. Se conserva la nota sobre «Orión» como alternativa lexical significativa.
