translation:
  language: es
  text: 'Entonces Balaam dijo a Balac: «Construye para mí aquí siete altares[a], y prepara para mí aquí siete toros y siete carneros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en este [lugar]» dos veces; se vierte con «aquí» en ambas ocasiones para conservar la repetición de la referencia espacial con una expresión natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» conserva bien la secuencia natural en español sin perder el valor narrativo.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de manera estándar.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición de dirección en discurso directo se expresa naturalmente con «a» en español.
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: convención onomástica
  rationale: Se usa la forma española tradicional del nombre propio, que es inteligible y estable en biblias en español.
- source_word: בְּנֵה
  english_pob_choice: Build
  chosen_spanish: Construye
  alternatives_spanish:
  - Edifica
  - Haz
  lexicon: HALOT
  rationale: El imperativo de בנה en contexto de altar se vierte con un verbo claro y digno; «construye» preserva el acto de edificar sin sonar excesivamente técnico.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - por mí
  - para mi uso
  lexicon: HALOT
  rationale: Marca beneficio/destino; «para mí» es la opción directa y natural.
- source_word: בָּזֶה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - en este sitio
  lexicon: HALOT
  rationale: La deixis espacial se expresa con «aquí»; en español suena natural y conserva la repetición enfática del original.
- source_word: שִׁבְעָה מִזְבְּחֹת
  english_pob_choice: seven altars
  chosen_spanish: siete altares
  alternatives_spanish:
  - siete altar(es)
  lexicon: HALOT
  rationale: Correspondencia léxica directa y precisa para el contexto sacrificial.
- source_word: וְהָכֵן
  english_pob_choice: and prepare
  chosen_spanish: y prepara
  alternatives_spanish:
  - y dispón
  - y alista
  lexicon: HALOT
  rationale: El causativo de כון se traduce con un imperativo simple; «prepara» es idiomático para animales destinados al sacrificio.
- source_word: פָרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  - toros jóvenes
  lexicon: HALOT
  rationale: En español bíblico moderno, «toros» comunica bien el animal sacrificial sin forzar una precisión etaria no explícita en el hebreo.
- source_word: וְשִׁבְעָה אֵילִים
  english_pob_choice: and seven rams
  chosen_spanish: y siete carneros
  alternatives_spanish:
  - y siete ramos
  lexicon: HALOT
  rationale: אֵילִים son carneros; «carneros» es preciso y natural en español en contexto de ofrenda.
theological_decisions:
- issue: Repetición de la deixis espacial
  english_pob_reading: '''here'' in both instances for natural English while preserving the repeated location emphasis'
  chosen_spanish_reading: «aquí» en ambas ocurrencias para conservar el énfasis locativo repetido
  alternative_spanish_readings:
  - «en este lugar» en ambas ocurrencias
  - omitir la repetición
  rationale: El hebreo repite בָּזֶה dos veces para enfatizar el lugar. En español conviene mantener ambas ocurrencias y no suavizar la repetición, porque forma parte de la instrucción ritual dada por Balaam.
  doctrine_reference: Observación textual/retórica, sin carga doctrinal directa
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español. No se modificó el sentido básico del versículo; solo se ancló la nota al término correspondiente.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico moderno y digno.
  - Se conservó la repetición de la deixis locativa para reflejar el hebreo.
  - Se evitaron términos eclesiásticos no requeridos por el contexto sacrificial.
