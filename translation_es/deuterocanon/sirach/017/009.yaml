- from: para que narren las obras magníficas de él[a].
  to: para que narren los hechos poderosos de sus obras[a].
  rationale: Se revisa para conservar la distinción del griego entre τὰ μεγαλεῖα ('hechos poderosos', 'grandes cosas', 'grandezas') y τῶν ἔργων αὐτοῦ ('de sus obras'). 'Los hechos poderosos de sus obras' refleja la revisión inglesa auditada y evita el español poco natural del borrador. Se mantiene 'narren' como opción natural para διηγῶνται.
