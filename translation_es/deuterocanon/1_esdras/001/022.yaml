translation:
  language: es
  text: Y lo referente a él también ha sido registrado en tiempos antiguos, sobre los que pecaron y obraron impíamente contra Yahvé más que toda nación y reino, y le entristecieron en gran manera[a]; y las palabras de Yahvé se alzaron contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmitido en «y le entristecieron» es difícil: la palabra que sigue en el texto, ἔστω, resulta extraña en este contexto. La traducción la toma como un refuerzo de intensidad; alternativamente, la línea puede preservar una pequeña perturbación textual.'
    reason: textual_variant
lexical_decisions:
- source_word: τὰ κατʼ αὐτόν
  english_pob_choice: the things concerning him
  chosen_spanish: las cosas acerca de él
  alternatives_spanish:
  - los asuntos acerca de él
  - las cosas relacionadas con él
  - las cosas concernientes a él
  lexicon: LSJ
  rationale: La frase es amplia y resumidora; en español, «las cosas acerca de él» conserva esa generalidad sin concretar indebidamente en «actos»."
- source_word: ἀναγέγραπται
  english_pob_choice: have been recorded
  chosen_spanish: han sido registradas
  alternatives_spanish:
  - han sido escritas
  - están registradas
  lexicon: LSJ
  rationale: El perfecto pasivo sugiere un registro ya concluido que sigue disponible. «Han sido registradas» mantiene el valor documental con español natural.
- source_word: ἐν τοῖς ἔμπροσθεν χρόνοις
  english_pob_choice: in former times
  chosen_spanish: en tiempos antiguos
  alternatives_spanish:
  - en tiempos pasados
  - en los tiempos anteriores
  lexicon: LSJ
  rationale: «En tiempos antiguos» reproduce la referencia temporal sin introducir un sustantivo como «registros» que no está explícito en el griego.
- source_word: περὶ τῶν ἡμαρτηκότων καὶ ἠσεβηκότων
  english_pob_choice: concerning those who sinned and acted wickedly
  chosen_spanish: acerca de los que pecaron y obraron impíamente
  alternatives_spanish:
  - acerca de los que pecaron y fueron impíos
  - acerca de los pecadores y los impíos
  lexicon: LSJ
  rationale: Se conserva la distinción entre ἡμαρτηκότων y ἠσεβηκότων. «Obraron impíamente» evita suavizar el matiz religioso de ἠσεβηκότων.
- source_word: εἰς τὸν κύριον
  english_pob_choice: against the Lord
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra el Señor
  - frente a Yahvé
  lexicon: LSJ
  rationale: En este contexto hostil, εἰς se rinde idiomáticamente como «contra». Se usa «Yahvé» conforme al criterio del proyecto para κύριος cuando remite al nombre divino.
- source_word: παρὰ ἅπαν ἔθνος καὶ βασιλείαν
  english_pob_choice: beyond every nation and kingdom
  chosen_spanish: más que toda nación y reino
  alternatives_spanish:
  - por encima de toda nación y reino
  - más allá de toda nación y reino
  lexicon: LSJ
  rationale: παρά con acusativo expresa comparación/exceso. «Más que» preserva de forma directa la idea de que su pecado excedió al de todas las naciones y reinos.
- source_word: ἐλύπησαν αὐτὸν
  english_pob_choice: grieved him
  chosen_spanish: le entristecieron
  alternatives_spanish:
  - le causaron dolor
  - le provocaron tristeza
  lexicon: LSJ
  rationale: Se conserva el valor afectivo de λυπέω. «Le entristecieron» es natural en español y mantiene la tensión antropopática sin resolverla.
- source_word: ἔστω
  english_pob_choice: greatly
  chosen_spanish: en gran manera
  alternatives_spanish:
  - mucho
  - de veras
  - — omitido por incertidumbre textual
  lexicon: LSJ
  rationale: La forma transmitida es difícil y posiblemente refleja perturbación textual o un intensificador preservado de modo irregular. «En gran manera» expresa el refuerzo sin forzar una literalidad artificial.
- source_word: οἱ λόγοι τοῦ κυρίου ἀνέστησαν ἐπʼ Ἰσραήλ
  english_pob_choice: the words of the Lord rose up against Israel
  chosen_spanish: las palabras de Yahvé se alzaron contra Israel
  alternatives_spanish:
  - las palabras de Yahvé se levantaron contra Israel
  - las palabras de Yahvé se alzaron sobre Israel
  lexicon: LSJ
  rationale: ἀνίστημι con ἐπί puede implicar levantarse contra. «Se alzaron contra Israel» conserva la imagen dinámica y el sentido adversativo.
theological_decisions:
- issue: Uso de Yahvé para κύριος en un contexto histórico-deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El criterio del proyecto evita la máscara convencional «SEÑOR» y, en un contexto donde κύριος remite al nombre divino, se mantiene «Yahvé» para transparencia textual y coherencia terminológica.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé'
- issue: 'Lenguaje antropopático: Dios es entristecido'
  english_pob_reading: grieved him
  chosen_spanish_reading: le entristecieron
  alternative_spanish_readings:
  - le causaron dolor
  - le provocaron tristeza
  rationale: El griego atribuye una reacción afectiva a Dios. La traducción preserva esa tensión sin neutralizarla en una formulación impersonal.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Valor intensificador de ἔστω en un pasaje textualmente difícil
  english_pob_reading: greatly
  chosen_spanish_reading: en gran manera
  alternative_spanish_readings:
  - mucho
  - de verdad
  - omitir la palabra por incertidumbre
  rationale: Se conserva el efecto intensificador que el audit trail entiende probable, pero en una frase española fluida. No se borra la dificultad textual, que queda documentada en nota.
  doctrine_reference: DOCTRINE.md §2 Textual uncertainty should be surfaced, not hidden
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje revisado del audit trail inglés, manteniendo la solución óptima-equivalente para τὰ κατʼ αὐτόν, ἀναγέγραπται, περὶ τῶν ἡμαρτηκότων καὶ ἠσεβηκότων, εἰς τὸν κύριον, παρὰ ἅπαν ἔθνος καὶ βασιλείαν, ἐλύπησαν αὐτόν/ἔστω y οἱ λόγοι τοῦ κυρίου ἀνέστησαν ἐπʼ Ἰσραήλ. Se adoptó «en tiempos antiguos» para reflejar la revisión inglesa a «former times», y se documentó la dificultad textual de ἔστω sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para κύριος en este versículo, de acuerdo con los lineamientos del proyecto.
  - Se conserva la tensión de que las acciones humanas entristecen a Dios, sin convertirla en una fórmula menos personal.
  - «Le entristecieron» y «se alzaron contra» mantienen el dinamismo verbal del griego y evitan una paráfrasis excesiva.
  - La nota a pie de página marca explícitamente la incertidumbre textual asociada con ἔστω, siguiendo la práctica de visibilizar variantes o dificultades textuales.
