revisions:
- from: Así les mostró la entrada de la ciudad[a], y atacaron la ciudad con filo de espada[b]; pero dejaron ir al hombre y a toda su familia.
  to: Así les mostró la entrada de la ciudad, y hirieron la ciudad a filo de espada[a]; pero dejaron ir al hombre y a toda su familia[b].
  rationale: Se corrige el anclaje de las notas para que correspondan a las palabras correctas del texto, se ajusta «atacaron» a «hirieron» para reflejar mejor וַיַּכּוּ sin absorber el modismo siguiente, y se mejora la naturalidad de לְפִי חָרֶב con la locución española «a filo de espada».
