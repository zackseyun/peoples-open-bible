translation:
  language: es
  text: Y sintieron gran temor a causa de él, y se turbaron por Jerusalén y por el templo de su Señor Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐφοβήθησαν σφόδρα σφόδρα
  english_pob_choice: they were greatly afraid
  chosen_spanish: tuvieron muchísimo miedo
  alternatives_spanish:
  - tuvieron gran temor
  - estuvieron muy, muy atemorizados
  - se llenaron de mucho temor
  lexicon: LSJ; BDAG
  rationale: La duplicación enfática de σφόδρα pide una intensificación visible en español. «Muchísimo miedo» comunica con naturalidad la fuerza del original sin perder la repetición enfática, y evita una fórmula demasiado rígida.
- source_word: ἀπὸ προσώπου αὐτοῦ
  english_pob_choice: because of him
  chosen_spanish: a causa de él
  alternatives_spanish:
  - por su presencia
  - ante él
  - por temor a él
  lexicon: LSJ
  rationale: El giro literal «desde su rostro/presencia» funciona como idiomático de temor provocado por su presencia o cercanía. «A causa de él» expresa bien la relación causal sin calco innecesario.
- source_word: ἐταράχθησαν
  english_pob_choice: they were troubled
  chosen_spanish: se turbaron
  alternatives_spanish:
  - se inquietaron
  - se agitaron
  - quedaron turbados
  lexicon: BDAG
  rationale: El verbo indica perturbación interior o agitación. «Se turbaron» conserva ese matiz con una forma breve y digna en español.
- source_word: περὶ Ἰερουσαλήμ
  english_pob_choice: about Jerusalem
  chosen_spanish: por Jerusalén
  alternatives_spanish:
  - con respecto a Jerusalén
  - acerca de Jerusalén
  - por causa de Jerusalén
  lexicon: LSJ
  rationale: Con περὶ en este contexto, la idea es preocupación o inquietud referente a Jerusalén. «Por Jerusalén» es una forma natural en español para expresar esa preocupación, sin introducir una explicación ajena al texto.
- source_word: τοῦ ναοῦ
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - la casa santa
  lexicon: LSJ
  rationale: ναός designa aquí el templo de Jerusalén como edificio sagrado. «Templo» es la equivalencia directa, clara y tradicionalmente inteligible.
- source_word: Κυρίου θεοῦ αὐτῶν
  english_pob_choice: the Lord their God
  chosen_spanish: del Señor su Dios
  alternatives_spanish:
  - de Yahvé su Dios
  - del Señor Dios de ellos
  lexicon: 'LSJ; DOCTRINE.md Contested terms: κύριος → Lord'
  rationale: Se conserva κύριος como «Señor», conforme al criterio documental del POB para este contexto de griego deuterocanónico. «Su Dios» refleja con naturalidad la relación genitiva y evita una reescritura más interpretativa.
theological_decisions:
- issue: Cómo traducir κύριος en un contexto griego deuterocanónico referido al Dios de Israel
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Soberano
  - Dueño
  rationale: El paquete de auditoría fija «Lord» para κύριος. En español, «Señor» mantiene ese título teológico sin introducir la convención de mayúsculas de YHWH, que aquí no está explícita en el griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El inglés auditable pasó de una redacción literalmente repetitiva («very, very afraid») a «greatly afraid» para σφόδρα σφόδρα. La presente versión española busca conservar esa intensificación sin sonar forzada, usando «muchísimo miedo» y manteniendo el resto de la cláusula con equivalencia cercana al original griego.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, coherente con el criterio de auditoría dado para este pasaje.
  - Se evita sustituir «templo» por «santuario», porque ναός en este contexto se refiere al edificio del templo en Jerusalén.
  - «Se turbaron» conserva el valor de perturbación interior de ἐταράχθησαν sin exagerar el matiz.
  - La frase «a causa de él» mantiene la fuerza causal del idiomatismo griego sin calco de «rostro/presencia».
