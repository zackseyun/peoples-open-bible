translation:
  language: es
  text: Abran para mí las puertas de rectitud[a]; entraré por ellas y daré gracias a Yah[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puertas de justicia»; el hebreo צֶדֶק puede expresar rectitud o justicia, y ambas posibilidades son viables aquí.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Yah», forma breve del nombre divino; algunas traducciones ponen «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: פִּתְחוּ
  english_pob_choice: Open
  chosen_spanish: Abran
  alternatives_spanish:
  - Ábranme
  - Abran para mí
  lexicon: HALOT
  rationale: Es un imperativo plural dirigido a varios oyentes; 'Abran' mantiene la fuerza directa y natural del mandato en español.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - por mí
  lexicon: HALOT
  rationale: Con verbos de acceso o apertura, 'para mí' suena natural en español y conserva la idea de beneficio/dirección implícita del ל con sufijo de primera persona.
- source_word: שַׁעֲרֵי
  english_pob_choice: the gates of
  chosen_spanish: las puertas de
  alternatives_spanish:
  - los portones de
  - las entradas de
  lexicon: HALOT
  rationale: '''שער'' puede ser ''puerta'' o ''portón''; en español, ''puertas de'' comunica con claridad el sentido poético sin volverlo áspero. ''Gates'' en contexto litúrgico se expresa bien como ''puertas''.'
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: HALOT
  rationale: El audit trail permite 'justice' como alternativa; en español 'justicia' es más natural que 'rectitud' aquí y preserva el campo semántico legal/covenantal del término.
- source_word: אָבֹא
  english_pob_choice: I will enter
  chosen_spanish: entraré
  alternatives_spanish:
  - yo entraré
  - entraré adentro
  lexicon: HALOT
  rationale: El imperfecto en este contexto expresa intención futura; 'entraré' es la equivalencia idiomática más directa y fluida en español.
- source_word: בָם
  english_pob_choice: through them
  chosen_spanish: por ellas
  alternatives_spanish:
  - por medio de ellas
  - a través de ellas
  lexicon: HALOT
  rationale: Con puertas/portones, 'por ellas' conserva el movimiento de paso señalado por ב sin recargar la línea con una expresión más larga.
- source_word: אוֹדֶה
  english_pob_choice: give thanks
  chosen_spanish: daré gracias
  alternatives_spanish:
  - te daré gracias
  - agradeceré
  lexicon: HALOT
  rationale: La revisión inglesa corrigió hacia 'give thanks'; en español 'daré gracias' refleja con precisión la idea de acción de gracias de ידה en este contexto.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yá
  - el Señor
  lexicon: HALOT
  rationale: Se conserva la forma breve del nombre divino tal como aparece en hebreo, sin sustituirla por una forma titular o por 'el Señor'.
theological_decisions:
- issue: Mantener la forma breve del nombre divino יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - el Señor
  - Yavé
  rationale: El hebreo no usa YHWH sino la forma abreviada יָהּ. Para no borrar esa distinción, se translitera como 'Yah' en lugar de convertirla en un título o en la forma completa del nombre.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; the YHWH masking convention applies specifically to יְהוָה, not to יָהּ'
- issue: צֶדֶק como 'justicia' en un contexto litúrgico
  english_pob_reading: gates of righteousness / justice
  chosen_spanish_reading: puertas de justicia
  alternative_spanish_readings:
  - puertas de rectitud
  - puertas de justicia divina
  rationale: El POB inglés preserva la tensión entre 'righteousness' y 'justice'. En español, 'justicia' mantiene esa amplitud sin imponer una lectura exclusivamente moralista; el contexto de acceso cultual también queda abierto.
  doctrine_reference: HALOT צֶדֶק; POB lexical note on righteousness/justice
- issue: אוֹדֶה como agradecimiento y no solo alabanza
  english_pob_reading: give thanks to Yah
  chosen_spanish_reading: daré gracias a Yah
  alternative_spanish_readings:
  - alabaré a Yah
  - te daré gracias, Yah
  rationale: 'La revisión auditada corrige una lectura demasiado general (''praise'') hacia el valor más preciso de la forma verbal en este versículo: acción de gracias dirigida a Yah.'
  doctrine_reference: Revision pass dated 2026-04-23T11:30:20Z
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada del inglés POB que cambió 'praise Yah' por 'give thanks to Yah' para reflejar con mayor precisión אוֹדֶה. También conserva la distinción del nombre divino abreviado יָהּ como 'Yah', en lugar de sustituirlo por un título.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de dos miembros: mandato de apertura + acción futura del hablante.'
  - Se evita 'SEÑOR' para יָהּ, porque el audit trail distingue la forma breve del nombre divino.
  - '''Justicia'' se usa como equivalente principal de צֶדֶק, con nota que preserva la alternativa ''rectitud''.'
  - '''Daré gracias'' refleja mejor el valor verbal de אוֹדֶה en este contexto que ''alabaré''.'
