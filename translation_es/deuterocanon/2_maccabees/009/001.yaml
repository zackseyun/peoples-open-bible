translation:
  language: es
  text: Por ese tiempo, Antíoco volvía vergonzosamente[a] desde las regiones alrededor de Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en desorden» o «de manera indecorosa»; el adverbio griego puede sugerir tanto desorden como ignominia o conducta impropia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ τὸν καιρὸν ἐκεῖνον
  english_pob_choice: Now about that time
  chosen_spanish: Ahora, por aquel tiempo
  alternatives_spanish:
  - Por aquel tiempo
  - En aquel tiempo
  lexicon: LSJ
  rationale: La expresión griega indica una referencia temporal aproximada y el δέ introduce transición narrativa. «Ahora, por aquel tiempo» conserva ese matiz de enlace discursivo sin volverlo demasiado rígido.
- source_word: ἐτύγχανεν
  english_pob_choice: happened to be
  chosen_spanish: resultó estar
  alternatives_spanish:
  - estaba
  - ocurrió que estaba
  lexicon: LSJ
  rationale: El verbo añade un matiz circunstancial, no solo copulativo. «Resultó estar» mantiene esa incidentalidad en español con naturalidad.
- source_word: ἀναλελυκὼς
  english_pob_choice: returning
  chosen_spanish: volviendo
  alternatives_spanish:
  - regresando
  - habiendo vuelto
  lexicon: LSJ
  rationale: El participio describe a Antíoco en el acto de volver desde la región persa. «Volviendo» expresa el movimiento narrativo de forma fluida en español.
- source_word: ἀκόσμως
  english_pob_choice: in disgrace
  chosen_spanish: en deshonra
  alternatives_spanish:
  - de manera deshonrosa
  - en desorden
  - de forma indecorosa
  lexicon: LSJ
  rationale: El adverbio puede sugerir desorden, impropiedad o ignominia. Dado el ajuste revisado en el audit trail inglés hacia una lectura vergonzosa o ignominiosa, «en deshonra» preserva esa tensión sin cerrarla solo al desorden militar.
- source_word: ἐκ τῶν περὶ τὴν Περσίδα τόπων
  english_pob_choice: from the regions around Persia
  chosen_spanish: desde las regiones alrededor de Persia
  alternatives_spanish:
  - desde los lugares alrededor de Persia
  - desde la región de Persia
  lexicon: LSJ
  rationale: La frase es amplia y geográfica. «Regiones alrededor de Persia» reproduce bien el valor territorial impreciso de τόποι con περὶ.
- source_word: Ἀντίοχος
  english_pob_choice: Antiochus
  chosen_spanish: Antíoco
  alternatives_spanish:
  - Antíoco
  lexicon: Transliteración onomástica
  rationale: Nombre propio transliterado al uso castellano estándar.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «in disorder» a «in disgrace» para reflejar mejor ἀκόσμως como retorno vergonzoso o ignominioso. La versión española sigue esa revisión y evita fijar demasiado el matiz, manteniendo la ambigüedad lexical documentada por el POB.
  spanish_consistency_notes:
  - Se usa «Antíoco» para el nombre propio, conforme a transliteración castellana habitual.
  - Se mantiene «Persia» con valor geográfico amplio, no como equivalencia técnica de un territorio delimitado.
  - No se introduce lenguaje eclesiástico ni terminología doctrinal ajena al contexto narrativo.
