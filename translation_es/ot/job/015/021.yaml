translation:
  language: es
  text: Un sonido de terrores está en sus oídos; en prosperidad[a] viene sobre él el destructor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en paz» o «en seguridad»; שָׁלוֹם puede denotar paz, bienestar o prosperidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: A sound
  chosen_spanish: Un sonido
  alternatives_spanish:
  - Una voz
  - El sonido
  lexicon: HALOT
  rationale: קוֹל puede significar ‘sonido’ o ‘voz’. Aquí el paralelo con פְּחָדִים indica una realidad auditiva, no un discurso articulado; por eso ‘sonido’ preserva mejor la imagen. El artículo indefinido refleja la ausencia de artículo hebreo.
- source_word: פְּחָדִים
  english_pob_choice: terrors
  chosen_spanish: terrores
  alternatives_spanish:
  - temores
  - cosas espantosas
  lexicon: HALOT
  rationale: El plural intensifica la idea de múltiples aterradores temores o alarmas. ‘Terrores’ mantiene ese peso y evita reducirlo a una emoción interna más débil como ‘temores’.
- source_word: בְּאָזְנָיו
  english_pob_choice: is in his ears
  chosen_spanish: está en sus oídos
  alternatives_spanish:
  - resuena en sus oídos
  - está en su oído
  lexicon: HALOT
  rationale: 'La imagen hebrea es literal: ‘en sus oídos’. ‘Está en sus oídos’ conserva esa concreción sin forzar una expansión idiomática que el texto no explicita.'
- source_word: בַּשָּׁלוֹם
  english_pob_choice: in prosperity
  chosen_spanish: en prosperidad
  alternatives_spanish:
  - en paz
  - en seguridad
  - cuando todo va bien
  lexicon: HALOT
  rationale: שָׁלוֹם puede abarcar paz, bienestar o prosperidad. En este contexto de aparente seguridad seguida por ruina, ‘en prosperidad’ expresa mejor el bienestar y la comodidad, sin excluir que ‘en paz’ sea una alternativa léxica válida.
- source_word: שׁוֹדֵד
  english_pob_choice: the destroyer
  chosen_spanish: el destructor
  alternatives_spanish:
  - el saqueador
  - el devastador
  - el plunderer
  lexicon: HALOT
  rationale: El participio denota a quien arrasa o saquea. ‘Destructor’ comunica bien la figura amenazante en español actual y encaja con el contexto de ruina; ‘saqueador’ sería más estrecho.
- source_word: יְבוֹאֶנּוּ
  english_pob_choice: comes upon him
  chosen_spanish: viene sobre él
  alternatives_spanish:
  - viene contra él
  - viene a él
  - vendrá sobre él
  lexicon: HALOT
  rationale: El verbo expresa ‘venir’ con sufijo objeto de 3ª masc. sing. En español, ‘viene sobre él’ transmite la irrupción hostil sin sobreinterpretar. Se mantiene el presente poético, aunque el contexto permite matiz futuro.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto hebreo y el audit trail inglés. Se mantuvo la imagen concreta de ‘oídos’ y el presente poético; la única tensión léxica relevante es שָׁלוֹם, para la cual se preservó en nota la alternativa ‘en paz/en seguridad’.
  spanish_consistency_notes:
  - Se prefirió ‘prosperidad’ para שָׁלוֹם por coherencia con la lectura contextual de bienestar/aparente seguridad ya documentada en el inglés POB.
  - Se usó ‘destructor’ como equivalente natural de שׁוֹדֵד, sin trasladar innecesariamente una terminología eclesiástica tradicional.
  - La nota mantiene la alternativa ‘en paz’ para no borrar la ambigüedad léxica documentada por el POB inglés.
