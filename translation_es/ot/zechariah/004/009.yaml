translation:
  language: es
  text: Las manos de Zorobabel echaron los cimientos de esta casa[b], y sus manos la terminarán. Entonces sabrás que Yahvé de los ejércitos[a] me ha enviado a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el SEÑOR de los ejércitos».
    reason: lexical_alternative
  - marker: b
    text: «Esta casa» se refiere al templo.
    reason: cultural_note
lexical_decisions:
- source_word: יְדֵי
  english_pob_choice: the hands of
  chosen_spanish: las manos de
  alternatives_spanish:
  - la mano de
  - las manos de
  lexicon: HALOT
  rationale: Mantiene el plural/dual hebreo y la imagen de agencia personal de Zorobabel, como en la auditoría inglesa, con una sintaxis natural en español.
- source_word: יִסְּדוּ
  english_pob_choice: laid the foundation of
  chosen_spanish: echaron los cimientos de
  alternatives_spanish:
  - pusieron el fundamento de
  - fundaron
  lexicon: HALOT
  rationale: El contexto de construcción del templo pide una expresión española idiomática que conserve la idea concreta de poner cimientos, sin volverla demasiado abstracta.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta casa
  lexicon: HALOT
  rationale: Como en el texto inglés, 'casa' preserva la literalidad de בַּיִת y su resonancia teológica; el contexto permite identificarla como el templo sin explicitarlo en el cuerpo del verso.
- source_word: וְיָדָיו
  english_pob_choice: and his hands
  chosen_spanish: y sus manos
  alternatives_spanish:
  - y sus manos
  - y él
  lexicon: HALOT
  rationale: Conserva la repetición de 'manos' que subraya continuidad entre el inicio y la culminación de la obra.
- source_word: תְּבַצַּעְנָה
  english_pob_choice: will complete it
  chosen_spanish: la terminarán
  alternatives_spanish:
  - la completarán
  - la acabarán
  lexicon: HALOT
  rationale: '''Terminarán'' comunica con claridad la idea de llevar la obra a su conclusión. El objeto ''la'' remite naturalmente a ''esta casa''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el valor del Tetragrama como nombre divino propio, con la forma española establecida por el proyecto: Yahvé, no una convención de sustitución.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: Se vierte el título por sentido, manteniendo el plural militar/potente del hebreo. 'Ejércitos' es claro y reverente en español.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me ha enviado
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa con perfecto compuesto español para conservar la fuerza vigente de la comisión del hablante.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: a vosotros
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El plural del destinatario se expresa explícitamente; 'vosotros' evita borrar el plural y mantiene un registro bíblico claro, aunque neutralmente comprensible.
theological_decisions:
- issue: Divine name יהוה in Spanish
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. La política del proyecto exige conservar el nombre divino en español como 'Yahvé', en lugar de ocultarlo con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Title צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de las huestes
  rationale: Se traduce el título para que el lector perciba su fuerza semántica. 'Ejércitos' conserva el carácter militar y soberano del epíteto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Reference of 'this house'
  english_pob_reading: This house refers to the temple.
  chosen_spanish_reading: esta casa
  alternative_spanish_readings:
  - este templo
  - esta casa
  rationale: Se mantiene la literalidad de 'casa' en el texto principal, dejando al contexto la identificación con el templo, como hace la auditoría inglesa.
  doctrine_reference: Source note / cultural note in English POB
- issue: Second-person plural address
  english_pob_reading: to you
  chosen_spanish_reading: a vosotros
  alternative_spanish_readings:
  - a ustedes
  - a vosotros
  rationale: El hebreo plural no debe perderse. 'Vosotros' lo marca de forma visible en español; es una opción bíblica correcta y auditable.
  doctrine_reference: Morphology for אֲלֵיכֶם
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el acuerdo fue alto y se mantuvo estable la lectura base. Se conservan en español las mismas decisiones nucleares del audit trail inglés: nombre divino explícito, título traducido por sentido, y la imagen repetida de las manos como marcación de continuidad.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה, conforme a la norma del proyecto.
  - Se traduce צְבָאוֹת por 'de los Ejércitos' para reflejar el sentido del título.
  - Se conserva la literalidad de 'casa' para הַבַּיִת y se aclara su referente en nota.
  - Se preserva la repetición de 'manos' para mantener el énfasis poético del hebreo.
  - Se hace explícito el plural de אֲלֵיכֶם con 'vosotros'.
