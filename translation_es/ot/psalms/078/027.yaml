translation:
  language: es
  text: Hizo llover sobre ellos carne como polvo[a], y aves aladas como la arena de los mares[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘carne’ en el sentido de ‘vianda’. El hebreo שְׁאֵר puede denotar carne o alimento cárnico; aquí se refiere a carne provista para comer en el desierto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘la arena de los mares’; muchas versiones suavizan esto a ‘la arena del mar’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְטֵר
  english_pob_choice: He rained
  chosen_spanish: Hizo llover
  alternatives_spanish:
  - llovió
  - derramó como lluvia
  - hizo caer como lluvia
  lexicon: HALOT
  rationale: El verbo causativo hebreo expresa ‘hacer llover’ o ‘llover sobre’. En español, ‘hizo llover’ conserva bien el matiz causativo y suena natural y digno en este contexto poético.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre
  lexicon: HALOT
  rationale: 'La preposición con sufijo indica dirección y contacto: ‘sobre ellos’ reproduce con claridad la relación espacial sin perder fluidez poética.'
- source_word: כֶּעָפָר
  english_pob_choice: like dust
  chosen_spanish: como polvo
  alternatives_spanish:
  - como polvo de tierra
  - igual que polvo
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige una comparación. ‘Como polvo’ es la forma natural en español y mantiene la imagen de abundancia.
- source_word: שְׁאֵר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne para comer
  - carne de animal
  - carne comestible
  lexicon: HALOT
  rationale: El término puede significar ‘carne’ o ‘carne/meat’ en sentido de alimento. En este contexto de provisión en el desierto, ‘carne’ preserva la fuerza lexical sin sobreexplicar; la nota aclara la alternativa ‘flesh’.
- source_word: וּכְחוֹל יַמִּים
  english_pob_choice: like the sand of the seas
  chosen_spanish: como la arena de los mares
  alternatives_spanish:
  - como la arena del mar
  - como la arena de los mares
  lexicon: HALOT
  rationale: El hebreo conserva el plural ‘mares’. En español, ‘mares’ mantiene mejor la forma idiomática hebrea y la amplitud hiperbólica del símil.
- source_word: עוֹף כָּנָף
  english_pob_choice: winged birds
  chosen_spanish: aves aladas
  alternatives_spanish:
  - aves de ala
  - aves voladoras
  - aves con alas
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente ‘ave de ala’, un giro idiomático para aves voladoras. ‘Aves aladas’ conserva la imagen y la sonoridad poética sin caer en calco torpe.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el audit trail en inglés. Se mantuvo el plural ‘mares’ y la comparación literal ‘como la arena de los mares’, mientras que שְׁאֵר se resolvió como ‘carne’ con nota para conservar la alternativa semántica ‘carne/flesh’.
  spanish_consistency_notes:
  - Se mantuvo el tono poético y sobrio propio del Salmo sin añadir explicaciones al cuerpo del versículo.
  - ‘Hizo llover’ conserva el valor causativo del hebreo mejor que un simple ‘llovió’.
  - ‘Aves aladas’ preserva el paralelismo con el hebreo y evita un giro demasiado moderno que debilite la imagen.
