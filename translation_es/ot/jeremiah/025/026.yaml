translation:
  language: es
  text: y todos los reyes del norte, tanto los cercanos como los lejanos, cada uno con su hermano, y todos los reinos de la tierra que están sobre la faz del suelo. Y el rey de Sesac[a] beberá después de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sesac suele entenderse como un nombre críptico de Babilonia, probablemente mediante un cifrado de tipo atbash.
