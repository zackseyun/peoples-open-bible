  to: Él fue tras el hombre israelita al cuarto[a] y atravesó a ambos —al hombre israelita y a la mujer— por su vientre[b]. Entonces la plaga se detuvo de sobre los hijos de Israel[c].
  rationale: Se corrigió la última cláusula para expresar fielmente el sentido de מֵעַל ('de sobre') y evitar una lectura engañosa en español. También se ajustó la colocación del marcador de nota [a] para no interrumpir artificialmente la frase. Se mantuvieron 'cuarto', 'atravesó', 'vientre' e 'hijos de Israel' por ser aceptables y alineados con las decisiones documentadas.
