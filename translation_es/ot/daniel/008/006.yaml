revisions:
- from: Él se acercó al carnero[a] que tenía dos cuernos, que yo había visto de pie delante del canal[b], y corrió contra él con el furor de su fuerza.
  to: Él llegó hasta el carnero que tenía dos cuernos, que yo había visto de pie delante del canal[a], y corrió contra él en el furor de su fuerza[b].
  rationale: 'Se corrige la alineación de notas con el expediente auditado: [a] ahora ancla «canal» y recoge la alternativa léxica correspondiente; se añade [b] para preservar la alternativa de la cláusula final. También se ajusta «se acercó» a «llegó hasta» para reflejar mejor ויבא עד, y «con el furor» a «en el furor» para mantener más de cerca la estructura nominal del hebreo.'
