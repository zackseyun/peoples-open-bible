  to: ¡Imítenme, hermanos —dijo—, en el potro[a]! No deserten[b] por abandonar la lucha cuando yo no la he abandonado, ni por causa de mí renuncien a la hermandad del valor. Lleven adelante la campaña santa y noble por la devoción a Dios[c].
  rationale: Se corrigieron los marcadores de notas para que coincidan exactamente con las palabras explicadas. Se eliminó la nota duplicada/confusa sobre εὐσέβεια y se adoptó «devoción a Dios» como texto principal, que comunica mejor el valor de εὐσέβεια en este libro, dejando «piedad» como alternativa en nota. También se ajustó «por medio de mí» a «por causa de mí» para una causalidad más natural en español, se mejoró «hermandad del valor» por fluidez, y se reforzó la metáfora militar con «Lleven adelante la campaña».
