translation:
  language: es
  text: teniendo ante sus ojos el ultraje inicuo cometido por ellos contra el lugar santo, y el maltrato de la ciudad que había sido objeto de burlas, y también la destrucción de la forma de vida ancestral[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la constitución ancestral' o 'la comunidad ancestral'; el griego puede denotar el orden cívico-religioso heredado del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ ὀφθαλμῶν λαβόντας
  english_pob_choice: having set before their eyes
  chosen_spanish: teniendo ante sus ojos
  alternatives_spanish:
  - teniendo presente
  - poniendo ante sus ojos
  - llevando ante sus ojos
  lexicon: LSJ
  rationale: La expresión griega es idiomática y expresa mantener algo vívidamente presente. 'Teniendo ante sus ojos' conserva la metáfora visual y suena natural en español bíblico contemporáneo.
- source_word: ἀνόμως
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - ilegalmente
  - impíamente
  - de manera inicua
  lexicon: LSJ
  rationale: El adverbio indica actuación contraria a la ley. 'Sin ley' conserva la fuerza jurídica y moral del término sin reducirlo solo a ilegalidad civil ni hacerlo demasiado interpretativo.
theological_decisions:
- issue: Scope of προγονικῆς πολιτείας
  english_pob_reading: the ancestral way of life
  chosen_spanish_reading: la manera de vivir ancestral
  alternative_spanish_readings:
  - la constitución ancestral
  - la commonwealth ancestral
  - el orden de los antepasados
  rationale: En este contexto macabeo, πολιτεία abarca un orden heredado con dimensiones cívicas y religiosas. 'Manera de vivir ancestral' intenta preservar ese sentido amplio sin imponer un tecnicismo político moderno.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que sustituyó 'abuse' por 'mistreatment' para αἰκισμόν; en español se opta por un equivalente natural de maltrato/mistreatment cuando se complete el versículo en una revisión posterior.
  spanish_consistency_notes:
  - Se mantendrá 'Yahvé' para el nombre divino cuando aparezca en el texto.
  - Se prefiere 'Mesías' para Χριστός salvo carve-outs documentados.
  - Se mantendrá un registro digno y moderno, evitando calcos innecesarios.
