  yaml_path: translation/nt/luke/003/001.yaml
  text: Now in the fifteenth year of the reign of Tiberius Caesar[a], while Pontius Pilate was governing Judea, and Herod was tetrarch of Galilee, and Philip his brother was tetrarch of the region of Iturea and Trachonitis, and Lysanias was tetrarch of Abilene[b],
  footnotes:
  - marker: a
    text: Or 'during the fifteenth year.'
    reason: lexical_alternative
  - marker: b
    text: '''Tetrarch'' was a regional ruler under Roman authority.'
    reason: cultural_note
