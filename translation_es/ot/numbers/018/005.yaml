translation:
  language: es
  text: Y ustedes estarán a cargo del cuidado del santuario y del cuidado del altar, para que ya no haya ira contra los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'. El hebreo dice 'los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: And you shall keep
  chosen_spanish: y guardarán
  alternatives_spanish:
  - y tendrán la custodia de
  - y observarán
  lexicon: HALOT
  rationale: שׁמר en este contexto sacerdotal expresa la conservación diligente de una responsabilidad sagrada. ‘Guardar’ comunica bien la idea de custodia/atención continua y suena natural en español bíblico contemporáneo.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: charge
  chosen_spanish: la custodia
  alternatives_spanish:
  - la carga
  - el deber
  - la responsabilidad
  lexicon: HALOT
  rationale: En lenguaje cultual, מִשְׁמֶרֶת combina encargo oficial y vigilancia. ‘Custodia’ mantiene el matiz de guardar algo sagrado y evita reducirlo solo a ‘deber’ o ‘responsabilidad’.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - las cosas santas
  - la santidad
  lexicon: HALOT
  rationale: En paralelo con ‘el altar’, el término apunta al ámbito sagrado/cultual. ‘Santuario’ es la forma más clara y natural en español para ese referente.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: HALOT
  rationale: Es el equivalente directo y contextual de הַמִּזְבֵּחַ.
- source_word: קֶצֶף
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - indignación
  lexicon: HALOT
  rationale: El contexto sacerdotal y judicial sugiere una ira de juicio. ‘Ira’ es idiomático en español y conserva la gravedad sin introducir una especificación no dicha en el hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del pueblo de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión masculina plural del hebreo. ‘Hijos de Israel’ es fiel y bíblicamente reconocible; no se neutraliza el término sin una razón textual explícita.
theological_decisions:
- issue: Relación entre la custodia sacerdotal y la ausencia de ira
  english_pob_reading: Proper priestly keeping prevents further wrath from falling on Israel.
  chosen_spanish_reading: La custodia fiel del santuario y del altar se presenta como el medio para que cese la ira.
  alternative_spanish_readings:
  - y ya no habrá ira contra Israel
  - para que no exista más ira
  rationale: 'La cláusula final tiene valor resultativo: el cumplimiento del encargo sacerdotal evita una nueva manifestación de juicio. ‘Para que’ expresa esa relación sin convertirla en una mera predicción.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Sujeto implícito de la ira
  english_pob_reading: Wrath is left implicit as divine wrath rather than explicitly adding 'God's wrath'.
  chosen_spanish_reading: La ‘ira’ queda sin sujeto explícito en la frase, como en el hebreo.
  alternative_spanish_readings:
  - la ira de Dios
  - la ira divina
  rationale: Aunque el contexto apunta claramente al juicio divino, el texto no nombra a Dios en esta cláusula. La traducción mantiene esa reserva y no añade un sujeto teológico que el hebreo no expresa.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El borrador sigue de cerca el análisis léxico y teológico del POB en inglés, manteniendo la repetición de ‘custodia’ para מִשְׁמֶרֶת, el referente cultual de ‘santuario’, y la relación resultativa expresada por ‘para que’. No se introdujeron cambios doctrinales ni se suavizó la intensidad de קֶצֶף.
  spanish_consistency_notes:
  - Se prefirió ‘custodia’ para reflejar el campo semántico sacerdotal de מִשְׁמֶרֶת.
  - Se mantuvo ‘santuario’ en lugar de ‘lugar santo’ porque el contexto del altar apunta al ámbito cultual.
  - Se conservó ‘hijos de Israel’ para reflejar fielmente la expresión masculina plural del hebreo.
  - La puntuación y la sintaxis buscan una lectura pública natural en español sin perder la estructura del original.
