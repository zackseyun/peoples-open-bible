translation:
  language: es
  text: y un macho cabrío para hacer expiación por ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׂעִיר
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabrío
  - chivo macho
  lexicon: HALOT
  rationale: En contexto sacrificial, שְׂעִיר designa un macho de la especie caprina. «Macho cabrío» comunica con claridad el valor animal y sacrificial sin sonar mecánico.
- source_word: עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - de cabras
  - cabro
  lexicon: HALOT
  rationale: La construcción especifica la clase animal («de cabras»), pero en español la combinación resulta más natural y precisa como «macho cabrío».
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - una
  lexicon: HALOT
  rationale: El numeral indica un solo animal; en español, por concordancia con el sustantivo implícito en la frase, se expresa naturalmente como «un» en la traducción fluida.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer expiación por
  - para expiar
  lexicon: HALOT
  rationale: כפר en lenguaje cultual puede verterse como «hacer expiación»; preserva mejor la función ritual que un verbo más interpretativo. Se opta por una formulación clara y bíblica en español.
- source_word: עֲלֵיכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - para ustedes
  - a favor de ustedes
  lexicon: HALOT
  rationale: Con כפר, עַל marca a las personas beneficiarias de la expiación. «Por ustedes» conserva ese matiz sin introducir una teoría específica.
theological_decisions:
- issue: Expresión del propósito expiatorio sin añadir la categoría sacrificial implícita
  english_pob_reading: The revision removed 'for a sin offering' because the Hebrew states only 'one male goat' plus the purpose clause 'to make atonement for you.'
  chosen_spanish_reading: No se añade «como sacrificio por el pecado»; se mantiene solo el propósito expiatorio explícito.
  alternative_spanish_readings:
  - y un macho cabrío como sacrificio por el pecado, para hacer expiación por ustedes
  - y un macho cabrío para expiar por ustedes
  rationale: El hebreo de este versículo es elíptico y no repite חטאת. La versión española debe seguir la revisión auditada y no suplir una categoría no expresada aquí, aunque el contexto cultual la sugiera.
  doctrine_reference: 'Translation philosophy: original-language primacy; no añadir contenido doctrinal o cultual no explícito en el verso.'
translation_notes:
  revision_awareness: La revisión más reciente del audit trail eliminó 'for a sin offering' del inglés porque el hebreo solo dice 'un macho cabrío' más la cláusula de propósito 'para hacer expiación por ustedes'. La redacción española sigue esa decisión y evita añadir una categoría sacrificial implícita.
  spanish_consistency_notes:
  - Se mantuvo la terminología cultual en un registro claro y sobrio.
  - No se usó «SEÑOR» ni nomenclatura litúrgica ajena al texto.
  - «Expiación» se eligió para reflejar el valor ritual de כפר sin expandir el sentido más allá del contexto inmediato.
