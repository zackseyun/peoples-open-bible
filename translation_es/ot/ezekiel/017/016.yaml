translation:
  language: es
  text: '«Vivo yo —declara Yahvé, el Señor—: ciertamente, en el lugar del rey que lo hizo rey, cuyo juramento[a] despreció y cuyo pacto[b] quebrantó, con él en medio de Babilonia morirá.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuya maldición-juramento despreció»; la palabra hebrea para «juramento» puede llevar la idea de un juramento acompañado de autoimprecación.
    reason: lexical_alternative
  - marker: b
    text: O «cuyo tratado quebrantó». La palabra hebrea que suele traducirse «pacto» también puede referirse a un acuerdo político entre reyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֗נִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Tan cierto como que vivo yo
  - Por mi vida
  lexicon: HALOT
  rationale: Es la fórmula hebrea de juramento divino. En español, «Vivo yo» conserva la estructura enfática y solemne sin añadir material ajeno al hebreo; «Tan cierto como que vivo yo» explicita la fuerza, pero es más expansivo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: —declara Yahvé, el Señor—
  alternatives_spanish:
  - —dice el Señor Yahvé—
  - —oráculo de Yahvé, el Señor—
  lexicon: HALOT
  rationale: El hebreo combina la fórmula profética נְאֻם con אֲדֹנָי יְהוִה. Se mantiene «declara» para נְאֻם y se traduce el nombre divino directamente como «Yahvé» según el criterio del proyecto, preservando además «el Señor» para אֲדֹנָי.
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - seguramente
  - sin duda
  lexicon: HALOT
  rationale: En contextos de juramento, la secuencia no funciona como condicional literal sino como afirmación enfática. «Ciertamente» transmite bien esa fuerza asseverativa en español natural.
- source_word: בִּמְקוֹם
  english_pob_choice: in the place of
  chosen_spanish: en el lugar del
  alternatives_spanish:
  - en el puesto de
  - en el sitio de
  lexicon: HALOT
  rationale: La expresión señala la posición/ubicación asociada con el rey que lo instaló. «En el lugar del» es la opción más directa y fluida para el español.
- source_word: הַמֶּלֶךְ הַמַּמְלִיךְ אֹתוֹ
  english_pob_choice: the king who made him king
  chosen_spanish: del rey que lo hizo rey
  alternatives_spanish:
  - del rey que lo entronizó
  - del rey que lo instaló como rey
  lexicon: HALOT
  rationale: El participio hiphil de מלך expresa «hacer reinar, hacer rey». «Lo hizo rey» preserva la relación causal y la dependencia política sin sobrecargar la frase.
- source_word: אֲשֶׁר בָּזָה אֶת אָלָתוֹ
  english_pob_choice: whose oath he despised
  chosen_spanish: cuyo juramento despreció
  alternatives_spanish:
  - cuyo juramento con maldición despreció
  - cuyo juramento jurado despreció
  lexicon: HALOT
  rationale: אָלָה puede implicar un juramento con autoimprecación, pero en el texto principal «juramento» comunica el hecho base con claridad. Se conserva la tensión semántica en nota para no perder la posible carga de maldición.
- source_word: וַאֲשֶׁר הֵפֵר אֶת בְּרִיתוֹ
  english_pob_choice: and whose covenant he broke
  chosen_spanish: y cuyo pacto quebrantó
  alternatives_spanish:
  - y cuyo pacto violó
  - y cuyo convenio quebrantó
  lexicon: HALOT
  rationale: En este contexto político, בְּרִית puede referirse a un pacto o tratado. «Pacto» mantiene la gravedad del término y permite un español claro; «quebrantó» reproduce bien la idea de violación de la alianza.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  - con ese rey
  lexicon: HALOT
  rationale: El pronombre remite al rey que lo instaló. «Con él» es suficiente y conserva la concisión del hebreo.
- source_word: בְתוֹךְ בָּבֶל
  english_pob_choice: in the midst of Babylon
  chosen_spanish: en medio de Babilonia
  alternatives_spanish:
  - dentro de Babilonia
  - en el corazón de Babilonia
  lexicon: HALOT
  rationale: בְתוֹךְ expresa interioridad o medio. «En medio de Babilonia» conserva la imagen espacial y el énfasis de que morirá allí, no fuera de ella.
- source_word: יָמוּת
  english_pob_choice: he will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá allí
  - ha de morir
  lexicon: HALOT
  rationale: El imperfecto profético se traduce naturalmente con futuro simple en español. «Morirá» es directo y fiel al valor predictivo.
theological_decisions:
- issue: Representación de יְהוָה en una fórmula profética con אֲדֹנָי
  english_pob_reading: Lord GOD / Yahweh
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé
  rationale: El texto hebreo contiene explícitamente el Tetragrama junto con אֲדֹנָי. Según la terminología del proyecto, se nombra a יְהוָה como «Yahvé» y se conserva «el Señor» para reflejar אֲדֹנָי, evitando el ocultamiento del nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אָלָה en un contexto de juramento roto
  english_pob_reading: whose oath he despised
  chosen_spanish_reading: cuyo juramento despreció
  alternative_spanish_readings:
  - cuya maldición-juramento despreció
  - cuyo juramento con autoimprecación despreció
  rationale: El sustantivo אָלָה puede incluir la dimensión de imprecación asociada al juramento. El texto principal conserva «juramento» por claridad, sin negar en la redacción la posible carga más fuerte del término; esa tensión se mantiene en la nota.
  doctrine_reference: 'HALOT: אָלָה as oath with possible curse-imprecation nuance'
- issue: Sentido de בְּרִית en una alianza internacional
  english_pob_reading: whose covenant he broke / treaty
  chosen_spanish_reading: cuyo pacto quebrantó
  alternative_spanish_readings:
  - cuyo tratado quebrantó
  - cuyo convenio quebrantó
  rationale: En el marco político de Ezequiel 17, בְּרִית puede equivaler a un pacto o tratado entre reyes. «Pacto» es suficientemente amplio en español y mantiene la seriedad del vínculo quebrantado.
  doctrine_reference: 'HALOT: בְּרִית in political treaty context'
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión inglesa aprobada, conservando el cierre sin coma antes de «morirá» por fluidez. Se ajustó la teología de la traducción del nombre divino al criterio español del proyecto («Yahvé») y se mantuvo la estructura enfática del juramento con una puntuación equivalente en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה y «el Señor» para אֲדֹנָי, conforme al estándar del proyecto.
  - Se prefirió «pacto» para בְּרִית en el texto principal, con la alternativa «tratado» reservada para la nota.
  - Se tradujo אָלָה como «juramento» en el cuerpo del texto, sin perder la posible nuance de maldición indicada en la nota.
  - La puntuación con rayas reproduce la incisión retórica del hebreo y del inglés auditado, manteniendo una lectura natural en español.
