translation:
  language: es
  text: Mira, sobre los montes están los pies del que trae buenas nuevas, del que anuncia paz. Celebra tus fiestas, Judá; cumple tus votos, porque el perverso[a] no volverá a pasar por ti; está completamente eliminado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Belial’; también puede entenderse como ‘el indigno’ o ‘el impío’.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La interjección introduce una escena vívida y deíctica. ‘Mira’ mantiene la fuerza atencional del hebreo con español natural y digno; ‘He aquí’ es posible, pero más arcaizante.
- source_word: עַל הֶהָרִים
  english_pob_choice: on the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - sobre las montañas
  - en los montes
  - por encima de los montes
  lexicon: HALOT
  rationale: Se conserva la imagen espacial y el plural del hebreo. ‘Montes’ suena más natural en español bíblico actual que ‘montañas’ sin perder el referente elevado.
- source_word: רַגְלֵי מְבַשֵּׂר
  english_pob_choice: the feet of one who brings good news
  chosen_spanish: los pies del que trae buenas nuevas
  alternatives_spanish:
  - los pies del mensajero de buenas nuevas
  - los pies de quien trae buenas nuevas
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de ‘pies’ y el sentido verbal de מְבַשֵּׂר como portador de buenas noticias. ‘Buenas nuevas’ conserva el registro bíblico sin forzar un tecnicismo.
- source_word: מַשְׁמִיעַ שָׁלוֹם
  english_pob_choice: who announces peace
  chosen_spanish: del que anuncia paz
  alternatives_spanish:
  - del que proclama paz
  - del que hace oír paz
  lexicon: HALOT
  rationale: El participio hifil de שמע tiene fuerza de ‘hacer oír/ anunciar’. ‘Anuncia paz’ es idiomático en español y preserva el tono de heraldo.
- source_word: חָגִּי יְהוּדָה חַגַּיִךְ
  english_pob_choice: Celebrate your festivals, Judah
  chosen_spanish: Celebra tus fiestas, Judá
  alternatives_spanish:
  - Celebra tus festivales, Judá
  - Guarda tus fiestas, Judá
  lexicon: HALOT
  rationale: El imperativo de חג se refleja mejor con una orden natural en español. ‘Fiestas’ comunica con claridad el sentido cultual del plural hebreo y evita una expresión demasiado técnica.
- source_word: שַׁלְּמִי נְדָרָיִךְ
  english_pob_choice: fulfill your vows
  chosen_spanish: cumple tus votos
  alternatives_spanish:
  - paga tus votos
  - cumple tus promesas votivas
  lexicon: HALOT
  rationale: El idiomático שׁלם נדרים se expresa de forma directa con ‘cumple tus votos’. ‘Votos’ conserva el campo religioso y la obligación pactal sin sonar mecánico.
- source_word: בְּלִיַּעַל
  english_pob_choice: the worthless one
  chosen_spanish: el indigno
  alternatives_spanish:
  - el perverso
  - el impío
  - Belial
  lexicon: HALOT
  rationale: En este contexto el término funciona mejor como descriptor del enemigo que como nombre propio. ‘Indigno’ recoge la idea de vileza/maldad con español más natural; se preserva la tensión interpretativa sin imponer la lectura de nombre propio.
- source_word: לֹא יוֹסִיף עוֹד לַעֲבוֹר בָּךְ
  english_pob_choice: will never again pass through you
  chosen_spanish: no volverá a pasar por ti
  alternatives_spanish:
  - ya no pasará por ti
  - no pasará otra vez por ti
  - no volverá a atravesarte
  lexicon: HALOT
  rationale: ‘Volverá a pasar’ reproduce el valor de no… עוד con fluidez. ‘Por ti’ mantiene la preposición y la imagen de tránsito hostil sin añadir interpretación excesiva.
- source_word: כֻּלֹּה נִכְרָת
  english_pob_choice: he is completely cut off
  chosen_spanish: está completamente exterminado
  alternatives_spanish:
  - está completamente cortado
  - ha sido totalmente eliminado
  - está del todo destruido
  lexicon: HALOT
  rationale: La pasiva verbal intensifica la eliminación total del enemigo. ‘Exterminado’ expresa el carácter absoluto de נִכְרָת con fuerza semántica; se prefiere aquí por la contundencia del juicio profético.
theological_decisions:
- issue: Cómo traducir בְּלִיַּעַל sin resolver indebidamente si es nombre propio o apelativo descriptivo
  english_pob_reading: Render as a descriptive title, 'the worthless one,' in the main text; 'Belial' remains a footnoted alternative
  chosen_spanish_reading: el indigno[a]
  alternative_spanish_readings:
  - el indigno
  - el perverso
  - el impío
  - Belial
  rationale: La lectura principal conserva el valor descriptivo del hebreo y evita importar una demonología posterior que el contexto no exige. La nota mantiene la alternativa ‘Belial’ para respetar la tensión textual y la tradición interpretativa.
  doctrine_reference: Primacía del hebreo y preservación de la tensión interpretativa sin sobreinterpretación doctrinal.
translation_notes:
  revision_awareness: 'La puntuación sigue la revisión más reciente del POB en inglés: se conserva la separación entre ‘paz’ y la exhortación siguiente con un punto, no con dos puntos, porque en español también resulta más natural y fiel al flujo del hebreo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino en este proyecto, pero en este versículo no aparece.
  - Se mantiene ‘Judá’ como nombre propio sin transliteración adicional.
  - Se traduce בְּלִיַּעַל de forma descriptiva en el cuerpo del texto para no fijar indebidamente una lectura teológica.
  - 'Se conserva el paralelismo imperativo con verbos en segunda persona singular: ‘Celebra... cumple...’.'
