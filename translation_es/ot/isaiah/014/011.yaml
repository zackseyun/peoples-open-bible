revisions:
- from: Tu pompa[a] ha sido derribada hasta el Seol[b]; la voz de tus arpas[c]. Debajo de ti se tenderán gusanos, y gusanos serán tu cobertura.
  to: Tu pompa[a] ha sido derribada hasta el Seol[b], junto con el sonido de tus arpas[c]; debajo de ti se extienden larvas, y los gusanos son tu cobertura.
  rationale: Se corrigió «la voz» por «el sonido» para reflejar הֶמְיַת, se reparó la sintaxis fragmentaria integrando la frase musical en la oración principal, se evitó el futuro «se tenderán» en favor de un presente descriptivo más fiel al valor del pasaje, y se distinguió רִמָּה de תּוֹלֵעָה con «larvas» y «gusanos», preservando mejor la fuerza grotesca y el paralelismo del original y del audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:16:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta el sentido general de descenso al Seol y la imagen funeraria de corrupción, y conserva bien «Seol» con nota apropiada. Sin embargo, falla en varios puntos significativos frente al hebreo y al audit trail inglés: «la voz de tus arpas» no refleja bien הֶמְיַת («sonido/ruido»), la puntuación crea una frase fragmentaria sin verbo explícito en español, «se tenderán» introduce futuro no presente en el texto, y el uso de «gusanos» para רִמָּה pierde la especificidad de «maggots».'
  spanish_quality_summary: El español es comprensible pero tiene tropiezos importantes de naturalidad y precisión. «Tu pompa» es aceptable en este contexto, aunque algo marcada; «ha sido derribada» funciona, pero «ha sido abatida» o «ha sido hundida» también podrían valer. El mayor problema estilístico es «la voz de tus arpas. Debajo de ti…», que suena truncado y poco idiomático. «Cobertura» es entendible pero menos natural que «cobija» o «cubierta»; aun así, puede mantenerse si se prioriza cercanía semántica.
  glossary_alignment: 'Buena alineación con la política del proyecto en «Seol». No hay términos de la lista principal comprometidos. Sí conviene alinear mejor con el audit trail léxico: רִמָּה debe distinguirse de תּוֹלֵעָה, por lo que «larvas» / «gusanos» o «gusanos de podredumbre» / «gusanos» funcionan mejor que repetir «gusanos» dos veces.'
  issues:
  - severity: high
    issue: «la voz de tus arpas» para הֶמְיַת נְבָלֶיךָ
    rationale: הֶמְיַת significa sonido/ruido, no «voz». En español musical, «el sonido de tus arpas» refleja mejor el hebreo y el POB inglés.
  - severity: high
    issue: «se tenderán» introduce futuro no presente
    rationale: יֻצַּע es pasivo declarativo en el mismo marco de humillación ya consumada; el inglés auditado usa presente descriptivo «are spread out». El futuro en español debilita la viveza y altera el aspecto.
  - severity: medium
    issue: Puntuación y sintaxis fragmentarias
    rationale: '«Tu pompa…; la voz de tus arpas.» deja una frase nominal suelta poco natural. Conviene integrarla en una sola oración coordinada: «… al Seol, junto con el sonido de tus arpas» o equivalente.'
  - severity: medium
    issue: No se distingue רִמָּה de תּוֹלֵעָה
    rationale: El audit trail distingue «maggots» y «worms». Repetir «gusanos» en ambas posiciones borra un matiz intencional de la imagen.
  - severity: low
    issue: «cobertura» es algo rígido
    rationale: No es incorrecto, pero suena técnico. «cubierta» sería más idiomático; no obstante, «cobertura» todavía es aceptable si se quiere mantener cercanía al sustantivo hebreo.
  revised_spanish_text: Tu pompa[a] ha sido derribada hasta el Seol[b], junto con el sonido de tus arpas[c]; debajo de ti se extienden larvas, y los gusanos son tu cobertura.
  revised_footnotes:
  - marker: a
    text: O «tu majestad» o «tu orgullo» para גְּאוֹנֶךָ. El término hebreo puede denotar esplendor exaltado, así como orgullo arrogante.
    reason: lexical_alternative
  - marker: b
    text: Seol es el ámbito de los muertos; alternativamente, «la tumba» o «el reino de los muertos».
    reason: lexical_alternative
  - marker: c
    text: O «liras» o, de manera más general, «instrumentos de cuerda».
    reason: lexical_alternative
  revision_rationale: Se corrigió «la voz» por «el sonido» para reflejar הֶמְיַת, se reparó la sintaxis fragmentaria integrando la frase musical en la oración principal, se evitó el futuro «se tenderán» en favor de un presente descriptivo más fiel al valor del pasaje, y se distinguió רִמָּה de תּוֹלֵעָה con «larvas» y «gusanos», preservando mejor la fuerza grotesca y el paralelismo del original y del audit trail inglés.
