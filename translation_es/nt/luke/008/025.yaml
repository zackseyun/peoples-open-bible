translation:
  language: es
  text: 'Entonces les dijo: «¿Dónde está su fe[a]?». Y tenían miedo y se maravillaban, diciéndose unos a otros: «¿Quién es entonces este, que aun a los vientos y al agua ordena, y le obedecen?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «confianza». La pregunta de Jesús también puede entenderse como: «¿Dónde está su confianza?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ποῦ
  english_pob_choice: Where
  chosen_spanish: ¿Dónde
  alternatives_spanish:
  - ¿En dónde
  - ¿Dónde está
  lexicon: BDAG
  rationale: La pregunta griega pide por la presencia o ubicación de la fe; «¿Dónde» conserva la forma directa sin convertirla en una paráfrasis explicativa.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: «Fe» es el equivalente español estándar y mantiene la decisión doctrinal de traducir πίστις con ese término, aunque el contexto también implica confianza.
- source_word: φοβηθέντες
  english_pob_choice: they were afraid
  chosen_spanish: llenos de temor
  alternatives_spanish:
  - teniendo miedo
  - asustados
  lexicon: BDAG
  rationale: El participio aoristo se vierte de modo circunstancial para expresar el estado que antecede a su asombro; «llenos de temor» suena natural en español y preserva la relación temporal sin volverlo demasiado mecánico.
- source_word: ἐθαύμασαν
  english_pob_choice: they marveled
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - se asombraron
  - quedaron maravillados
  lexicon: BDAG
  rationale: «Se maravillaron» refleja bien el sentido de θαυμάζω y conserva un tono narrativo elevado sin añadir matices no presentes en el griego.
- source_word: Τίς ἄρα οὗτός ἐστιν
  english_pob_choice: Who then is this
  chosen_spanish: ¿Quién es entonces este
  alternatives_spanish:
  - ¿Quién es este, entonces
  - ¿Quién es, pues, este
  lexicon: BDAG
  rationale: «Entonces» reproduce de manera natural el valor inferencial de ἄρα y mantiene el desconcierto de la pregunta.
- source_word: ἐπιτάσσει
  english_pob_choice: he commands
  chosen_spanish: da órdenes
  alternatives_spanish:
  - manda
  - ordena
  lexicon: BDAG
  rationale: El verbo indica autoridad para imponer órdenes; «da órdenes» evita una rigidez poco natural en español y conserva la idea de mandato directo.
- source_word: τοῖς ἀνέμοις ... καὶ τῷ ὕδατι
  english_pob_choice: the winds and the water
  chosen_spanish: aun a los vientos y al agua
  alternatives_spanish:
  - a los vientos y al agua
  - hasta a los vientos y al agua
  lexicon: BDAG
  rationale: Se conserva «vientos» y «agua» porque el griego dice literalmente eso; «aun» expresa la fuerza enfática de καὶ sin introducir «olas» u otra interpretación.
- source_word: ὑπακούουσιν αὐτῷ
  english_pob_choice: they obey him
  chosen_spanish: le obedecen
  alternatives_spanish:
  - lo obedecen
  - le hacen caso
  lexicon: BDAG
  rationale: «Le obedecen» es la forma más clara y natural en español para ὑπακούω en este contexto de obediencia personificada de la creación.
theological_decisions:
- issue: πίστις como fe o confianza
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  rationale: Se mantiene el equivalente doctrinal y de referencia común «fe», sin ocultar que en el contexto la pregunta de Jesús toca la confianza de los discípulos en medio del peligro.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις *pistis* → faith'
translation_notes:
  revision_awareness: 'La revisión reciente del inglés POB prefirió una formulación más directa para φοβηθέντες («they were afraid») en lugar de una construcción participial más literal. En español se reflejó ese valor con una frase participial natural («llenos de temor») que preserva el orden: temor primero, asombro después. También se mantuvo la lectura de «the winds and the water» sin reemplazarla por «olas» para seguir de cerca el texto griego y el audit trail inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde aquí porque el versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque el pasaje no usa Χριστός.
  - Se prefirió «fe» para πίστις, con nota de alternativa «confianza», en coherencia con la terminología POB.
  - «Vientos y agua» conserva la literalidad del griego frente a la posible influencia de paralelos sinópticos con «olas» o «mar».
  - La puntuación y comillas siguen la norma tipográfica española, con el marcador [a] anclado en el punto de habla.
