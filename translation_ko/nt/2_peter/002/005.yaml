id: 2PE.2.5
reference: 2 Peter 2:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἀρχαίου κόσμου οὐκ ἐφείσατο, ἀλλὰ ὄγδοον Νῶε δικαιοσύνης κήρυκα ἐφύλαξεν, κατακλυσμὸν κόσμῳ ἀσεβῶν ἐπάξας,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/005.yaml
  text: and if he did not spare the ancient world[a], but preserved Noah, an eighth person, a herald of righteousness, when he brought a flood upon a world of the ungodly[c][b],
  footnotes:
  - marker: a
    text: Or 'Noah, one of eight' or 'Noah the eighth'; the Greek expression ὄγδοον Νῶε is compressed and may mean that Noah was preserved along with seven others.
    reason: lexical_alternative
  - marker: b
    text: Or 'a preacher of righteousness'; the noun can denote a public proclaimer or herald.
    reason: lexical_alternative
  - marker: c
    text: Or 'justice' for 'righteousness' (δικαιοσύνη), though 'righteousness' is the default rendering here.
    reason: alternative_reading
translation:
  language: ko
  text: 옛 세상도 아끼지 아니하시고 의의 선포자 노아를 일곱 사람과 함께[a] 보존하시면서 불경건한 자들의 세상에 홍수를 내리셨으며,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ὄγδοον Νῶε는 「여덟째 자로서의 노아」로, 노아가 일곱 사람과 함께 보존되어 모두 여덟이 되었음을 압축적으로 표현한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄγδοον Νῶε
  english_pob_choice: Noah, an eighth person
  chosen_korean: 노아를 일곱 사람과 함께 (여덟째로)
  alternatives_korean:
  - 여덟째 사람 노아
  - 노아를 여덟 명 중 한 명으로
  lexicon: BDAG
  rationale: 본문은 노아를 여덟 명 중 한 사람으로 보존하셨다는 압축적 표현. 한국어 독자에게는 「일곱 사람과 함께」로 풀어주는 것이 명확.
- source_word: κήρυκα
  english_pob_choice: herald
  chosen_korean: 선포자
  alternatives_korean:
  - 전령
  - 설교자
  lexicon: BDAG
  rationale: 공적 선포자를 가리킨다.
- source_word: ἀσεβῶν
  english_pob_choice: ungodly
  chosen_korean: 불경건한 자들
  alternatives_korean:
  - 경건하지 않은 자들
  lexicon: BDAG
  rationale: εὐσεβής의 반대. 신약 표준 등가어.
