translation:
  language: es
  text: Y aconteció[a] que, cuando el hombre comenzó a multiplicarse sobre la faz del suelo y les nacieron hijas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad comenzó a multiplicarse». El hebreo הָאָדָם es singular, pero aquí tiene valor colectivo y se refiere a la humanidad en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa introduce un nuevo desarrollo en la historia. «Aconteció» conserva ese valor discursivo con dignidad y sin arcaísmo excesivo.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: que, cuando
  alternatives_spanish:
  - cuando
  - que
  lexicon: HALOT
  rationale: En este contexto temporal, el español fluye mejor con la combinación «que, cuando», que refleja la relación sintáctica sin endurecer el orden natural de la oración.
- source_word: הֵחֵל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: HALOT
  rationale: 'El valor es inceptivo: «comenzó» comunica con claridad el inicio del aumento numérico.'
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  - el hombre/la humanidad
  lexicon: HALOT
  rationale: El hebreo es singular con fuerza colectiva. «El hombre» mantiene la forma del original y su valor representativo; la nota preserva la alternativa inclusiva sin borrar la tensión lexical.
- source_word: לָרֹב
  english_pob_choice: to multiply
  chosen_spanish: a multiplicarse
  alternatives_spanish:
  - a aumentar
  - a hacerse muchos
  lexicon: HALOT
  rationale: Tras «comenzó», el infinitivo expresa proceso de crecimiento numérico. «Multiplicarse» conserva la imagen verbal del hebreo y su sentido poblacional.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the ground
  chosen_spanish: sobre la faz del suelo
  alternatives_spanish:
  - sobre la superficie de la tierra
  - sobre la faz de la tierra
  lexicon: HALOT
  rationale: «Faz» reproduce la metáfora de superficie. «Suelo» refleja con más precisión אֲדָמָה que «tierra» en español, manteniendo la imaginería hebrea.
- source_word: וּבָנוֹת
  english_pob_choice: and daughters
  chosen_spanish: y les nacieron hijas
  alternatives_spanish:
  - y hijas nacieron para ellos
  - y nacieron hijas
  lexicon: HALOT
  rationale: 'La frase española integra naturalmente la pasiva impersonal hebrea con el complemento dativo: la idea es que aparecieron hijas entre la humanidad.'
- source_word: יֻלְּדוּ לָהֶם
  english_pob_choice: were born to them
  chosen_spanish: les nacieron
  alternatives_spanish:
  - fueron nacidas para ellos
  - fueron dadas a luz para ellos
  lexicon: HALOT
  rationale: El hebreo pasivo de ילד con ל expresa nacimientos atribuidos al grupo humano. «Les nacieron» es natural en español y conserva el dato de recepción sin añadir agente.
theological_decisions:
- issue: Valor colectivo de הָאָדָם en contexto de humanidad general
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: Se mantiene una forma singular representativa, porque el hebreo es singular y colectivo a la vez. La nota en el texto preserva la alternativa inclusiva sin sustituir la lectura base que refleja la forma del original.
  doctrine_reference: 'DOCTRINE.md: género-preciso sobre neutralización automática; entrada de אָדָם como término disputado/colectivo'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. No se introdujeron revisiones previas porque el registro indica concordancia alta y sin cambios necesarios.
  spanish_consistency_notes:
  - Se conservó el inicio narrativo con una fórmula natural y solemne.
  - Se mantuvo la metáfora espacial «faz del suelo» para reflejar עַל פְּנֵי הָאֲדָמָה.
  - Se evitó sustituir sistemáticamente «hombre» por una neutralización no señalada por el original, pero se preservó la alternativa inclusiva en nota.
  - La clausula final quedó abierta con coma, siguiendo la continuación inmediata del contexto en el versículo siguiente.
