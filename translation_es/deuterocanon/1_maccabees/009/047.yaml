    rationale: Aunque no es incomprensible, «Bacquides» se siente menos natural en español actual. «Bacides» es una adaptación española más limpia del griego Βακχίδην y evita una grafía innecesariamente extraña.
  - severity: medium
    issue: 'Frase final poco natural: «se desvió de él hacia la retaguardia»'
    rationale: La combinación de «de él» + «hacia la retaguardia» resulta rígida y puede dificultar la lectura. El griego indica apartarse/torcerse de Jonatán hacia atrás; «se apartó de él hacia atrás» o «se desvió de él hacia atrás» comunica mejor el movimiento.
  - severity: low
    issue: Nota b podría reflejar mejor la alternativa militar
    rationale: Si el texto principal usa «hacia atrás» por claridad, la nota puede conservar «a la retaguardia» como alternativa para preservar el matiz militar del inglés POB y de εἰς τὰ ὀπίσω.
  revised_spanish_text: Y la batalla se intensificó[a], y Jonatán extendió su mano para golpear a Bacides[b], pero él se apartó de él hacia atrás.
