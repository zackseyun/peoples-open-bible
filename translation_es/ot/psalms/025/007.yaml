translation:
  language: es
  text: No recuerdes los pecados de mi juventud ni[a] mis transgresiones; conforme a tu amor fiel[b], acuérdate de mí, por causa de tu bondad, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y mis transgresiones»; la conjunción hebrea puede traducirse de cualquiera de las dos maneras según el idioma y la construcción.
    reason: lexical_alternative
  - marker: b
    text: «Amor fiel» traduce el hebreo hesed, término que a menudo lleva el sentido de amor leal o de pacto; alternativamente, «misericordia» o «amor de pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטֹּאות
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: HALOT
  rationale: El plural concreto de חטאות aquí se refiere a actos de pecado, no a una abstracción. «Pecados» es el equivalente natural y directo en español.
- source_word: נְעוּרַי
  english_pob_choice: of my youth
  chosen_spanish: de mi juventud
  alternatives_spanish:
  - desde mi juventud
  - de mis años mozos
  lexicon: HALOT
  rationale: La relación genitiva se conserva con «de mi juventud», manteniendo la idea de pecados asociados con esa etapa de la vida.
- source_word: וּפְשָׁעַי
  english_pob_choice: or my transgressions
  chosen_spanish: ni mis rebeliones
  alternatives_spanish:
  - y mis transgresiones
  - ni mis transgresiones
  - y mis ofensas
  lexicon: HALOT
  rationale: פשע expresa rebeldía o transgresión deliberada. En español, «rebeliones» comunica bien la fuerza moral del término; la coordinación negativa con «ni» refleja naturalmente la estructura del hebreo y la opción inglesa de separar los dos miembros.
- source_word: אַל תִּזְכֹּר
  english_pob_choice: Do not remember
  chosen_spanish: No recuerdes
  alternatives_spanish:
  - No tengas presentes
  - No traigas a la memoria
  lexicon: HALOT
  rationale: El ruego negativo a Dios se expresa de forma idiomática en español con «No recuerdes», conservando el matiz judicial/covenantal de no ponerlos en cuenta.
- source_word: כְּחַסְדְּךָ
  english_pob_choice: according to your steadfast love
  chosen_spanish: conforme a tu misericordia
  alternatives_spanish:
  - según tu amor fiel
  - conforme a tu amor leal
  - según tu misericordia
  lexicon: HALOT
  rationale: חסד tiene un campo semántico amplio de lealtad amorosa y favor covenantal. Aquí se opta por «misericordia» por su naturalidad litúrgica en español y porque el contexto de súplica por perdón lo sostiene; aun así, el equivalente inglés «steadfast love» queda representado en la nota como alternativa conceptual.
- source_word: זְכָר לִי אַתָּה
  english_pob_choice: remember me
  chosen_spanish: acuérdate de mí
  alternatives_spanish:
  - recuérdame
  - acuérdate tú de mí
  lexicon: HALOT
  rationale: El imperativo de זכר con objeto personal se vierte de manera natural como «acuérdate de mí». La presencia enfática de אַתָּה se mantiene implícita en el verbo español sin necesidad de sobrecargar el verso.
- source_word: לְמַעַן טוּבְךָ
  english_pob_choice: for the sake of your goodness
  chosen_spanish: por causa de tu bondad
  alternatives_spanish:
  - por tu bondad
  - a causa de tu bondad
  - por el bien de tu bondad
  lexicon: HALOT
  rationale: למען expresa base o motivo de la petición. «Por causa de tu bondad» conserva esa relación causal y mantiene el enfoque en el carácter bueno de Dios.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Se conserva el nombre divino personal en lugar de un sustituto titular.'
theological_decisions:
- issue: Valor de חסד en la petición de perdón
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor fiel
  - amor leal
  - misericordia
  rationale: El hebreo חסד abarca lealtad pactal y benevolencia. En español, «misericordia» comunica con claridad la base de una súplica de perdón; la amplitud teológica del término se preserva en la documentación auditada y puede indicarse como alternativa conceptual.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene el nombre propio del pacto divino según la directriz del proyecto, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios posteriores que afecten el sentido o la segmentación del verso. La redacción española sigue el paquete de fuente con equivalencia óptima y conserva las decisiones clave sobre חסד y el nombre divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva la petición paralela con dos imperativos negativos y dos súplicas positivas.
  - «Pecados» y «rebeliones» mantienen la distinción entre fallo moral general y transgresión deliberada.
  - La puntuación reproduce el paralelismo del hebreo con una pausa media antes de la segunda petición.
