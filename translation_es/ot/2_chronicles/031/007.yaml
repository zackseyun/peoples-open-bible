base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/031/007.yaml
  text: In the third month they began to lay the foundation of the heaps[b][a], and in the seventh month they finished them.
  footnotes:
  - marker: a
    text: Or 'the piles.' The Hebrew noun refers to accumulated heaps of contributed produce.
    reason: lexical_alternative
  - marker: b
    text: Literally 'they began the heaps to found [them],' an idiom meaning they started the heaps by laying their base.
    reason: lexical_alternative
