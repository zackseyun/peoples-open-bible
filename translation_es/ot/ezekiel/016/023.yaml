translation:
  language: es
  text: Y sucedió[a], después de toda tu maldad[b]—¡ay, ay de ti![c]—declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y aconteció». El hebreo introduce el siguiente desarrollo del discurso con una fórmula narrativa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «después de todo tu mal». El hebreo aquí expresa maldad moral, no solo desgracia.'
    reason: alternative_reading
  - marker: c
    text: El hebreo dice «¡ay, ay de ti!», con duplicación que intensifica el lamento y el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it came about
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y llegó a pasar
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el siguiente desarrollo del discurso. «Aconteció» mantiene ese avance de manera natural en español y conserva el tono bíblico sin caer en un calco rígido.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: Es la equivalencia temporal directa y clara en español para esta construcción.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo el
  - cada una de
  lexicon: HALOT
  rationale: «Toda» conserva la fuerza de totalidad de כָּל con concordancia natural con «maldad».
- source_word: רָעָתֵךְ
  english_pob_choice: your wickedness
  chosen_spanish: tu maldad
  alternatives_spanish:
  - tu perversidad
  - tu mal
  lexicon: HALOT
  rationale: En este contexto profético, רָעָה expresa culpa moral grave. «Maldad» comunica bien esa carga en español y evita suavizar el juicio. «Tu mal» sería posible, pero menos específico; «perversidad» suena más marcado pero menos natural.
- source_word: אוֹי אוֹי לָךְ
  english_pob_choice: woe, woe to you!
  chosen_spanish: ¡ay, ay de ti!
  alternatives_spanish:
  - ¡ay de ti, ay de ti!
  - ¡ay, ay para ti!
  lexicon: HALOT
  rationale: «Ay, ay de ti» reproduce el gemido profético duplicado y su fuerza de lamento/jucio. Mantiene la repetición intensificadora documentada en la nota inglesa.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: «Declara» es la fórmula profética idiomática en español y transmite de forma clara el acto de pronunciamiento solemne.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Señor Yahvé
  lexicon: HALOT
  rationale: Se preservan ambos elementos del título compuesto. «Yahvé» representa el nombre divino y «el Señor» traduce אֲדֹנָי; esta combinación evita la máscara convencional «SEÑOR» y mantiene la distinción del hebreo.
theological_decisions:
- issue: Representación del Tetragrámaton en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Señor Yahvé
  rationale: El texto hebreo combina el título אֲדֹנָי con el nombre divino יהוה. En español, «Yahvé, el Señor» permite conservar la doble referencia sin sustituir el nombre por una máscara litúrgica. También evita la ambigüedad de duplicar «Señor» y refleja la distinción auditada en el inglés POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés y no requiere cambios de fondo. La única adaptación importante en español es la representación explícita de אֲדֹנָי יְהוִה como «Yahvé, el Señor», para mantener visible la distinción entre nombre divino y título.
  spanish_consistency_notes:
  - Se conserva el tono profético de juicio con una formulación breve y solemne.
  - «Maldad» mantiene la fuerza ética de רָעָה en contexto.
  - La repetición «¡ay, ay de ti!» preserva la intensificación del original.
  - El nombre divino aparece como «Yahvé» conforme a la norma del proyecto, sin usar «SEÑOR» como máscara tipográfica.
