    rationale: El hebreo expresa declarar a alguien feliz/dichoso/bienaventurado. En español, «declarar feliz» suena más psicológico que valorativo-proverbial; «llames dichoso» o «tengas por dichoso» preserva mejor el acto de pronunciar una evaluación sobre el estado de alguien.
  - severity: medium
    issue: «porque en su fin un hombre es conocido» resulta algo forzado en español
    rationale: Aunque es formalmente cercano al inglés auditado, en español suena poco natural. «porque al final se conoce a un hombre» conserva el sentido de que solo en su desenlace llega a conocerse verdaderamente, y mantiene el tono proverbial sin sobreinterpretar.
  - severity: low
    issue: La nota b mezcla demasiadas alternativas y puede ordenarse mejor
    rationale: La nota actual combina «dichoso/afortunado» con «bendecido». Conviene priorizar las alternativas más cercanas al valor de אשר y dejar «bendecido» como matiz secundario, para no sugerir una bendición cultual que el contexto no exige.
  revised_spanish_text: Antes de la muerte[a], no llames dichoso[b] a un hombre, porque al final se conoce[c] a un hombre.
