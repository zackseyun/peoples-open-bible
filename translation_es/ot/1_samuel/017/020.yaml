  rationale: Se corrigieron los anclajes de las notas para que correspondan a los términos adecuados del texto fuente y del POB inglés. También se reemplazó una nota irrelevante por la alternativa literal documentada para el clamor de guerra. Se mantuvo la redacción principal casi intacta por su buena calidad general.
