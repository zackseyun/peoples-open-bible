  to: Hizo sus columnas de plata, su parte trasera[a] de oro, su asiento de púrpura[b]; su interior estaba incrustado con amor[c] por las hijas de Jerusalén.
  rationale: Se corrigen la ubicación y el contenido de las notas para que correspondan a los términos realmente inciertos del hebreo y a la auditoría inglesa. También se reemplaza «respaldo» por «parte trasera» para evitar una interpretación demasiado específica, y «de amor» por «con amor» para un español más natural sin perder la rareza poética del original.
