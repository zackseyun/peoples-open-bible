translation:
  language: es
  text: 'Y llamaron a Lot y le dijeron[a]: «¿Dónde están los hombres que vinieron a ti esta noche? Sácalos, para que los conozcamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente en contexto: «para tener relaciones sexuales con ellos». El hebreo dice literalmente «conocerlos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - gritaron
  - clamaron
  lexicon: HALOT
  rationale: קרא aquí describe una llamada dirigida a Lot; «llamaron» conserva la sencillez narrativa sin añadir intensidad que el hebreo no exige.
- source_word: אַיֵּה
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están...
  alternatives_spanish:
  - ¿Dónde está...
  lexicon: HALOT
  rationale: 'La pregunta es locativa. En español, el plural es necesario porque el sustantivo gobernado es plural: «los hombres».'
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y en este contexto refiere a visitantes varones; «hombres» preserva esa referencia.
- source_word: בָּאוּ אֵלֶיךָ הַלָּיְלָה
  english_pob_choice: who came to you tonight
  chosen_spanish: que vinieron a ti esta noche
  alternatives_spanish:
  - que llegaron a ti esta noche
  - que vinieron a ti anoche
  lexicon: HALOT
  rationale: בוא con אֶל expresa llegada a una persona; «vinieron a ti» conserva el movimiento hacia Lot. «Esta noche» refleja bien הַלָּיְלָה en español natural.
- source_word: הוֹצִיאֵם אֵלֵינוּ
  english_pob_choice: Bring them out to us
  chosen_spanish: Sácalos a nosotros
  alternatives_spanish:
  - Tráelos fuera a nosotros
  - Sácalos hacia nosotros
  lexicon: HALOT
  rationale: El hiphil de יצא expresa hacer salir. «Sácalos» mantiene la fuerza imperativa; «a nosotros» reproduce el complemento de dirección de forma idiomática en español, aunque suene menos elegante que «para nosotros».
- source_word: וְנֵדְעָה אֹתָם
  english_pob_choice: so that we may know them
  chosen_spanish: para que los conozcamos
  alternatives_spanish:
  - para conocerlos
  - para que tengamos relaciones con ellos
  lexicon: HALOT
  rationale: El verbo ידע se conserva como «conocer» en el texto principal para no adelantar la interpretación. El español permite mantener la misma tensión semántica que el hebreo.
theological_decisions:
- issue: Explicitar o no el sentido sexual de וְנֵדְעָה אֹתָם en el texto principal
  english_pob_reading: Retain the literal wording 'know them' in the main text and note the sexual sense in a footnote.
  chosen_spanish_reading: Mantener «los conozcamos» en el texto principal y señalar en nota la posible referencia a relaciones sexuales.
  alternative_spanish_readings:
  - Sácalos a nosotros para tener relaciones sexuales con ellos
  - Sácalos a nosotros para abusar sexualmente de ellos
  rationale: El hebreo dice literalmente «conocerlos». Dado que la intención sexual es muy probable por el contexto, pero no explícita en el verbo, la traducción principal conserva la forma literal y la nota documenta la lectura contextual más específica sin sustituirla por interpretación en el cuerpo del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje está en alto acuerdo con la revisión inglesa más reciente; no se registraron cambios aplicados. Esta versión española sigue ese mismo trazado: mantiene la literalidad de ידע en el texto principal, preserva la referencia masculina plural y traduce el imperativo causativo con un castellano natural y auditable.'
  spanish_consistency_notes:
  - Se mantiene «Lot» como forma propia del nombre.
  - Se usa un español neutro y publicado, sin calcos innecesarios.
  - La nota conserva la tensión lexical de ידע sin resolverla interpretativamente en el texto principal.
  - «Esta noche» se adopta como equivalente natural de הַלָּיְלָה en este contexto narrativo.
