revisions:
- from: Si ves el asno de uno que te odia caído bajo su carga[a], y te abstienes de ayudarle[b], ciertamente deberás ayudar con él.
  to: Si ves el asno de uno que te odia echado bajo su carga, y quisieras abstenerte de ayudarle[b], debes ayudarlo sin falta junto con él[a].
  rationale: Se ajusta רֹבֵץ a «echado» para evitar sobreinterpretación; se refleja mejor el matiz potencial de וְחָדַלְתָּ con «quisieras abstenerte»; se reubica la nota de ambigüedad al pronombre final, donde realmente corresponde; y se mejora la fluidez española de la cláusula final sin perder la lectura principal «with him».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:25:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y la lógica legal del hebreo, y mantiene la lectura principal de עִמּוֹ como referencia al dueño. También conserva correctamente la nota de ambigüedad del pronombre final y la nota léxica sobre עזב. Sin embargo, hay dos desajustes: «caído» sobreinterpreta רֹבֵץ, que es más bien «echado/tendido» o «recostado», y «te abstienes» suena más indicativo general que la inclinación/posibilidad expresada por «would refrain».'
  spanish_quality_summary: El español es claro y digno, pero «asno ... caído bajo su carga» puede sugerir colapso más que estar echado bajo la carga. Además, «ciertamente deberás ayudar con él» es comprensible pero algo rígido; una formulación más natural y fiel es «debes ayudarlo sin falta junto con él». Eso mantiene la obligación intensificada y el matiz interpersonal de עִמּוֹ.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Asno» es aceptable. «Uno que te odia» preserva bien la fuerza participial. La decisión principal «con él» concuerda con la rationale auditada, pero conviene mejorar la nota a «con él»/«con él[a]» para anclarla al lugar exacto de la ambigüedad.
  issues:
  - severity: medium
    issue: «caído» para רֹבֵץ
    rationale: רֹבֵץ describe al animal echado/recostado; «caído» añade la idea de desplome que el hebreo no exige.
  - severity: medium
    issue: «te abstienes» debilita el matiz potencial de וְחָדַלְתָּ מֵעֲזֹב לוֹ
    rationale: El inglés auditado escogió «would refrain» para reflejar mejor la inclinación o eventualidad en el caso legal. En español conviene «y quisieras abstenerte de ayudarle» o similar.
  - severity: low
    issue: La nota [a] está anclada a «carga» en vez de al pronombre final ambiguo
    rationale: La nota explica la ambigüedad de עִמּוֹ («con él / con ello»), no de «su carga». Debe marcarse en la frase final correspondiente.
  - severity: low
    issue: «ayudar con él» suena poco natural en español
    rationale: Aunque literal, en español resulta más claro «ayudarlo junto con él» o «ayudar junto con él», preservando la referencia principal al dueño.
  revised_spanish_text: Si ves el asno de uno que te odia echado bajo su carga, y quisieras abstenerte de ayudarle[b], debes ayudarlo sin falta junto con él[a].
  revised_footnotes:
  - marker: a
    text: O «con él» puede entenderse «con ello», es decir, ayudar al asno con su carga. El pronombre hebreo puede referirse tanto al dueño como al animal.
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo aquí suele significar «dejar» o «abandonar», pero en este contexto lleva el sentido de «ayudar, asistir».
    reason: lexical_alternative
  revision_rationale: Se ajusta רֹבֵץ a «echado» para evitar sobreinterpretación; se refleja mejor el matiz potencial de וְחָדַלְתָּ con «quisieras abstenerte»; se reubica la nota de ambigüedad al pronombre final, donde realmente corresponde; y se mejora la fluidez española de la cláusula final sin perder la lectura principal «with him».
