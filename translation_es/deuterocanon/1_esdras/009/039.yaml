translation:
  language: es
  text: Y le dijo a Esdras, el sacerdote y lector, que trajera la ley de Moisés, la cual había sido dada por el Dios de Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, 'lector público'. El término griego denota de manera directa a quien lee en voz alta; 'escriba' también es posible en algunos contextos, pero aquí el sentido más inmediato es el de lector.
    reason: lexical_alternative
  - marker: b
    text: O 'que había sido entregada por el Dios de Israel'. El participio griego puede sugerir tanto el acto de dar como el de transmitir o entregar.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: told
  chosen_spanish: le dijo
  alternatives_spanish:
  - le contó
  - le ordenó
  lexicon: BDAG
  rationale: El griego εἶπεν es el verbo común 'decir'; en español, 'le dijo' conserva la naturalidad sin intensificar indebidamente la fuerza como mandato formal.
- source_word: Ἔσρᾳ
  english_pob_choice: Ezra
  chosen_spanish: Esdras
  alternatives_spanish:
  - Ezra
  lexicon: Uso bíblico tradicional en español
  rationale: En español bíblico, el nombre se recibe normalmente como 'Esdras', forma transparente y reconocible para el lector eclesial.
- source_word: τῷ ἱερεῖ
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el presbítero
  lexicon: BDAG
  rationale: El término señala el oficio de Ezra; 'sacerdote' mantiene el valor funcional y es la forma bíblica habitual en español.
- source_word: ἀναγνώστῃ
  english_pob_choice: reader
  chosen_spanish: lector
  alternatives_spanish:
  - lector público
  - escriba
  lexicon: BDAG
  rationale: ἀναγνώστης designa literalmente a quien lee; 'lector' preserva esa función sin armonizarlo indebidamente con 'escriba'.
- source_word: κομίσαι
  english_pob_choice: to bring
  chosen_spanish: trajera
  alternatives_spanish:
  - llevara
  - presentara
  lexicon: BDAG
  rationale: En este contexto el infinitivo expresa traer/introducir la ley ante la asamblea; 'trajera' es idiomático en español y conserva la idea de llevar algo para su presentación.
- source_word: τὸν νόμον Μωυσέως
  english_pob_choice: the law of Moses
  chosen_spanish: la ley de Moisés
  alternatives_spanish:
  - la ley mosaica
  - la ley de Moisés
  lexicon: BDAG
  rationale: La construcción genitiva se mantiene de forma directa y clara en español con 'la ley de Moisés', que es fiel al griego y comprensible.
- source_word: τὸν παραδοθέντα
  english_pob_choice: that had been given
  chosen_spanish: la cual había sido dada
  alternatives_spanish:
  - la cual había sido entregada
  - la cual había sido transmitida
  lexicon: BDAG
  rationale: El participio puede implicar 'dada', 'entregada' o 'transmitida'; 'había sido dada' sigue bien la lectura elegida por la POB inglesa y mantiene la agencia divina sin añadir interpretaciones.
- source_word: ὑπὸ τοῦ θεοῦ Ἰσραήλ
  english_pob_choice: by the God of Israel
  chosen_spanish: por el Dios de Israel
  alternatives_spanish:
  - por el Dios de Israel
  - de parte del Dios de Israel
  lexicon: BDAG
  rationale: La pasiva con ὑπό señala agente; 'por el Dios de Israel' reproduce esa relación de forma directa en español.
theological_decisions:
- issue: Relación entre Moisés y Dios en la transmisión de la ley
  english_pob_reading: the law of Moses that had been given by the God of Israel
  chosen_spanish_reading: la ley de Moisés, la cual había sido dada por el Dios de Israel
  alternative_spanish_readings:
  - la ley de Moisés, la cual había sido transmitida por el Dios de Israel
  - la ley de Moisés, dada por el Dios de Israel
  rationale: 'El griego nombra tanto a Moisés como a Dios: la ley pertenece a Moisés en cuanto mediación/nominación, pero la agencia de la transmisión se atribuye a Dios. La redacción española conserva ambas referencias sin introducir ''por medio de Moisés'', que no aparece explícitamente.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete y concuerda con la nota de auditoría inglesa: preserva ''reader'' como ''lector'', mantiene la agencia divina en el participio παραδοθέντα y no armoniza la frase con el paralelo hebreo más amplio. No se reportan revisiones posteriores que alteren la decisión base.'
  spanish_consistency_notes:
  - '''Esdras'' se usa para el nombre propio en lugar de ''Ezra'', conforme al uso bíblico español.'
  - '''ley'' se emplea para νόμος siguiendo el estilo bíblico natural en español.'
  - '''Dios de Israel'' se mantiene con artículo definido para reflejar el griego τοῦ θεοῦ Ἰσραήλ y la referencia identificadora.'
  - '''lector'' se conserva por su valor lexical, evitando sustituirlo por ''escriba'' sin base en el griego de este versículo.'
