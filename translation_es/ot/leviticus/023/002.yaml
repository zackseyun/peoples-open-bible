  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם מוֹעֲדֵ֣י יְהוָ֔ה אֲשֶׁר תִּקְרְא֥וּ אֹתָ֖/ם מִקְרָאֵ֣י קֹ֑דֶשׁ אֵ֥לֶּה הֵ֖ם מוֹעֲדָֽ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/023/002.yaml
  text: 'Speak to the sons of Israel and say to them: The appointed times of Yahweh[c][b][a], which you shall proclaim as holy convocations—these are my appointed times.'
  footnotes:
  - marker: a
    text: Or 'appointed feasts' or 'festivals'; the Hebrew term can refer to fixed sacred occasions generally, not only feast meals.
    reason: lexical_alternative
  - marker: b
    text: Or 'sacred assemblies.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'sons of Israel,' a standard covenantal expression for the people of Israel.
    reason: lexical_alternative
