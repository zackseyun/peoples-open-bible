- from: Pues mirad[a], sería vergonzoso para nosotros si dejáramos pasar a una mujer así sin hablarle; porque si no la atraemos, se burlará de nosotros.
  to: Porque miren[a], sería vergonzoso para nosotros si dejáramos pasar a una mujer así sin hablar con ella; porque si no la atraemos hacia nosotros, se burlará de nosotros.
  rationale: Se ajusta el arranque para un español más natural, se precisa la interacción conversacional de ὁμιλήσαντες αὐτῇ con «hablar con ella», y se refuerza el valor de ἐπισπάσωμεθα con «atraemos hacia nosotros», en plena consonancia con la evidencia griega y la nota léxica del POB inglés.
