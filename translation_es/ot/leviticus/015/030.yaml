translation:
  language: es
  text: Entonces el sacerdote ofrecerá uno como ofrenda por el pecado[a] y el otro como holocausto, y el sacerdote hará expiación por ella delante de Yahvé a causa de su flujo menstrual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda de purificación' para חַטָּאת, destacando la función de limpieza del rito en el contexto levítico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: shall offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará
  - presentará
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo general 'hacer' funciona idiomáticamente como 'ofrecer' en español, porque los objetos directos son las ofrendas. Mantiene el sentido cultual sin perder naturalidad.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el ministro cultual
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente directo y claro para el agente ritual. ''Oficiante'' añadiría especificación no presente en el hebreo.'
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de purificación
  - ofrenda expiatoria
  lexicon: HALOT
  rationale: En Levítico, חַטָּאת nombra la categoría sacrificial. En español, 'ofrenda por el pecado' conserva la forma tradicional y la función expiatoria; la alternativa 'ofrenda de purificación' se preserva en nota por la tensión léxica del término.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda totalmente quemada
  lexicon: HALOT
  rationale: '''Holocausto'' es el término bíblico tradicional en español para la ofrenda totalmente quemada. Es más idiomático y reconocible que una paráfrasis descriptiva.'
- source_word: וְכִפֶּר עָלֶיהָ
  english_pob_choice: and the priest shall make atonement for her
  chosen_spanish: y el sacerdote hará expiación por ella
  alternatives_spanish:
  - y el sacerdote hará reparación por ella
  - y el sacerdote la purificará
  lexicon: HALOT
  rationale: '''Hará expiación'' preserva la fuerza cultual de כפר sin reducirlo a una sola explicación doctrinal. ''Expiación'' mantiene el registro bíblico y evita estrechar el sentido a mera limpieza ritual.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' según la norma del proyecto. 'Delante de' reproduce bien la fórmula cultual hebrea y su valor ceremonial.
- source_word: מִזּוֹב טֻמְאָתָהּ
  english_pob_choice: because of the discharge of her uncleanness
  chosen_spanish: a causa del flujo de su impureza
  alternatives_spanish:
  - a causa del flujo impuro
  - por el flujo de su impureza
  lexicon: HALOT
  rationale: '''Flujo'' refleja זוֹב como descarga o derrame corporal, y ''impureza'' preserva טֻמְאָה sin suavizarla. La construcción ''de su impureza'' sigue de cerca el hebreo y conserva el vínculo entre el flujo y el estado ritual.'
theological_decisions:
- issue: Renderización de חַטָּאת en ley sacrificial
  english_pob_reading: sin offering, with footnoted alternative 'purification offering'
  chosen_spanish_reading: ofrenda por el pecado, con nota alternativa 'ofrenda de purificación'
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: El hebreo permite ver tanto la asociación con el pecado como la función purificadora del rito. En español, 'ofrenda por el pecado' sigue siendo la forma más comprensible y estable; la nota preserva la tensión léxica sin borrarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto español usa 'Yahvé' para יְהוָה conforme a la política terminológica establecida, manteniendo el nombre de pacto en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido cultual de כפר
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer reparación
  - purificar
  rationale: '''Hacer expiación'' conserva el carácter sacrificial y teológico de כפר sin reducirlo únicamente a ''perdonar'' o ''limpiar''. En este contexto ritual, la fórmula es transparente y fiel.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue la última revisión del inglés auditado al reflejar la cláusula final como 'a causa del flujo de su impureza', manteniendo el registro formal y la relación causal más cercana al hebreo. También conserva la decisión del proyecto de traducir יְהוָה como Yahvé y de anotar la alternativa léxica de חַטָּאת sin borrar la lectura sacrificial principal.
  spanish_consistency_notes:
  - Se mantiene 'sacerdote' para הַכֹּהֵן en coherencia con el registro levítico.
  - '''Holocausto'' se usa como término bíblico asentado para עֹלָה, evitando una glosa excesiva.'
  - '''Expiación'' se conserva para כפר para no diluir la dimensión ritual y cultual del verbo.'
  - La nota de חַטָּאת se ancla en la palabra 'pecado' para reflejar la alternativa lexical preservada por el POB inglés.
