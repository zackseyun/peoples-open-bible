translation:
  language: es
  text: o un áspero estruendo de piedras que caían[a], o la carrera invisible de animales que saltaban[b], o el sonido del rugido de las bestias más salvajes, o un eco devuelto desde la cavidad de las montañas[c], los paralizaba con temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedras que eran arrojadas hacia abajo». El participio griego puede entenderse de forma más pasiva, aunque la frase también permite la idea más fuerte de un descenso violento.
    reason: lexical_alternative
  - marker: b
    text: Lit. «el curso no visto de animales que saltan».
    reason: lexical_alternative
  - marker: c
    text: Lit. «un eco devuelto desde la cavidad de las montañas».
    reason: lexical_alternative
lexical_decisions:
- source_word: κτύπος
  english_pob_choice: crash
  chosen_spanish: estruendo
  alternatives_spanish:
  - ruido
  - golpe
  - estallido
  lexicon: LSJ
  rationale: En este contexto de piedras que se desploman, κτύπος denota un sonido brusco y violento. «Estruendo» comunica bien el impacto sonoro sin volver la frase artificiosa en español.
- source_word: ἀπηνὴς
  english_pob_choice: harsh
  chosen_spanish: áspero
  alternatives_spanish:
  - cruel
  - fiero
  - duro
  lexicon: LSJ
  rationale: El adjetivo califica el sonido, no una acción moral. «Áspero» conserva la cualidad severa y desagradable del ruido mejor que «cruel» o «fiero» en español.
- source_word: καταρριπτομένων πετρῶν
  english_pob_choice: rocks falling down
  chosen_spanish: piedras que caían
  alternatives_spanish:
  - piedras arrojadas hacia abajo
  - piedras derribadas
  - rocas cayendo
  lexicon: LSJ
  rationale: El participio puede entenderse como caída descendente, y el audit trail inglés revisado prefirió «falling down». «Piedras que caían» mantiene esa lectura directa; «rocas» también sería posible, pero «piedras» sigue de cerca el griego.
- source_word: σκιρτώντων ζῴων δρόμος ἀθεώρητος
  english_pob_choice: the unseen rush of leaping animals
  chosen_spanish: el curso invisible de animales que saltaban
  alternatives_spanish:
  - la carrera invisible de animales que brincaban
  - el correr invisible de animales que saltaban
  - el raudo paso invisible de animales que saltaban
  lexicon: LSJ
  rationale: δρόμος puede ser «curso» o «carrera», y ἀθεώρητος significa «no visto». «Curso invisible» preserva la estructura más literalmente que «rush», mientras «animales que saltaban» conserva σκιρτώντων como movimiento vivo y no meramente correr.
- source_word: ὠρυομένων
  english_pob_choice: the roaring
  chosen_spanish: el rugido
  alternatives_spanish:
  - el bramido
  - el aullido
  - el rugir
  lexicon: LSJ
  rationale: El verbo alude al clamor de fieras. «Rugido» es natural en español para animales salvajes y mantiene la fuerza acústica del griego.
- source_word: ἀπηνεστάτων θηρίων
  english_pob_choice: most savage beasts
  chosen_spanish: las bestias más salvajes
  alternatives_spanish:
  - las bestias más feroces
  - los animales más salvajes
  - las fieras más crueles
  lexicon: LSJ
  rationale: El superlativo intensifica la dureza o ferocidad de las bestias. «Más salvajes» conserva bien esa fuerza y resulta idiomático en español bíblico moderno.
- source_word: ἀντανακλωμένη
  english_pob_choice: thrown back
  chosen_spanish: devuelto
  alternatives_spanish:
  - reflejado
  - rebotado
  - lanzado de vuelta
  lexicon: LSJ
  rationale: La imagen es de un sonido que rebota o es devuelto. «Devuelto» funciona bien con «eco» y evita un calco demasiado mecánico.
- source_word: ἐκ κοιλότητος ὀρέων
  english_pob_choice: from the hollow of the mountains
  chosen_spanish: desde la concavidad de las montañas
  alternatives_spanish:
  - desde el hueco de las montañas
  - desde la cavidad de los montes
  - desde la hondonada de las montañas
  lexicon: LSJ
  rationale: κοιλότης expresa holladura/cavidad. «Concavidad» conserva el sustantivo abstracto y sugiere el espacio resonante del que vuelve el eco; «de las montañas» da el plural natural del español.
- source_word: παρέλυεν αὐτοὺς ἐκφοβοῦντα
  english_pob_choice: paralyzed them with fear
  chosen_spanish: los paralizaba con temor
  alternatives_spanish:
  - los dejaba paralizados de miedo
  - los entumecía de terror
  - los paralizaba aterrorizándolos
  lexicon: LSJ
  rationale: παρέλυεν expresa inmovilizar o paralizar. ἐκφοβοῦντα indica el efecto de aterrar; «con temor» evita exagerar más allá del griego, aunque «de miedo» también sería posible.
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para simplificar «being hurled down» a «falling down» y «the voice of the roaring» a «the sound of the roaring». La redacción española sigue esa revisión, pero conserva la posibilidad semántica de un descenso violento mediante la nota a. También se mantuvo la estructura acumulativa del griego: cuatro miembros coordinados que culminan en el efecto de paralizar por el miedo.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otros términos no pertinentes; no hay vocabulario divino en este versículo.
  - Se prefirió «temor» sobre «miedo» para un registro bíblico sobrio, sin borrar el sentido de terror del contexto.
  - Se mantuvo «bestias» para θηρία, en lugar de «animales», porque el griego aquí enfatiza lo salvaje.
  - La puntuación conserva la serie de alternativas con «o», reflejando la acumulación retórica del original.
