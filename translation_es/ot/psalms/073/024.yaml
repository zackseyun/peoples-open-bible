translation:
  language: es
  text: Con tu consejo me guías[a], y después me recibirás en gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me recibirás con honor».
    reason: alternative_reading
lexical_decisions:
- source_word: בַּעֲצָתְךָ
  english_pob_choice: with your counsel
  chosen_spanish: con tu consejo
  alternatives_spanish:
  - por tu consejo
  - según tu consejo
  lexicon: HALOT
  rationale: עֵצָה designa consejo, plan o designio; el prefijo בַּ puede expresar medio o acompañamiento. En español, «con tu consejo» conserva la idea de que el consejo divino acompaña y guía como medio instrumental, con una preposición natural y digna.
- source_word: תַנְחֵנִי
  english_pob_choice: you guide me
  chosen_spanish: me guías
  alternatives_spanish:
  - me conduces
  - me llevas
  lexicon: HALOT
  rationale: El hifil de נחה significa guiar o conducir. «Me guías» es claro, idiomático y mantiene la imagen de dirección personal de Dios sin añadir matices no exigidos por el hebreo.
- source_word: וְאַחַר
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y más tarde
  lexicon: HALOT
  rationale: אַחַר funciona aquí como adverbio temporal. «Y después» reproduce bien la secuencia temporal en un español natural y sobrio.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: HALOT
  rationale: כָּבוֹד puede significar gloria u honor. En este contexto, «gloria» conserva el tono elevado y la posible proyección escatológica del versículo, sin cerrar la ambigüedad hacia una sola explicación.
- source_word: תִּקָּחֵנִי
  english_pob_choice: you will receive me to glory
  chosen_spanish: me recibirás para gloria
  alternatives_spanish:
  - me recibirás con honor
  - me tomarás para gloria
  lexicon: HALOT
  rationale: לקח puede significar tomar o recibir. Siguiendo la revisión inglesa que prefirió «receive», «me recibirás» refleja mejor el verbo sin introducir «tomar». La preposición «para» permite una relación final/destinada a gloria con mínimo añadido interpretativo.
theological_decisions:
- issue: Relación entre כָּבוֹד y la acción final de Dios
  english_pob_reading: 'an eschatologically open rendering: ''and afterward you will receive me to glory'''
  chosen_spanish_reading: y después me recibirás para gloria
  alternative_spanish_readings:
  - y después me recibirás con honor
  - y después me llevarás a la gloria
  rationale: 'El hebreo es compacto y admite tanto «gloria» como «honor». La redacción española principal conserva esa apertura sin resolverla en exceso: «para gloria» puede leerse como destino hacia la gloria o recepción en un estado glorioso. Se preserva así la tensión textual reconocida por el POB inglés.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente, que cambió «take me into glory» por «receive me to glory» para reflejar mejor el verbo hebreo y evitar añadir la idea interpretativa de «into». La versión española adopta esa misma preferencia con una equivalencia natural: «me recibirás para gloria».'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el pronombre verbal de segunda persona, sin añadir sujeto explícito.
  - «Gloria» se conserva para כָּבוֹד, mientras que la alternativa «honor» queda registrada en nota para preservar la ambigüedad lexical.
  - 'La estructura breve y paralela del verso se respeta con puntuación simple: dos miembros unidos por «y después».'
