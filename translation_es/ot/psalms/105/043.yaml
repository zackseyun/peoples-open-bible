translation:
  language: es
  text: Así sacó a su pueblo con alegría, a sus escogidos[b] con cantos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gritos de júbilo». El hebreo puede referirse también a un clamor jubiloso, no solo al canto.
    reason: lexical_alternative
  - marker: b
    text: O «sus elegidos».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיּוֹצִא
  english_pob_choice: he brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - hizo salir
  - sacó afuera
  lexicon: HALOT
  rationale: 'El Hiphil de יצא es causativo: “hacer salir”. En español, “sacó” comunica bien la acción de exodizar sin sonar forzado y conserva la iniciativa divina.'
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su nación
  - su gente
  lexicon: HALOT
  rationale: עַם designa un pueblo colectivo, especialmente el pueblo de pacto. “Su pueblo” es natural en español y mantiene ese valor comunitario.
- source_word: בְשָׂשׂוֹן
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  lexicon: HALOT
  rationale: El sustantivo expresa gozo/alegría. “Con alegría” es idiomático en español y transmite el adverbial de manera clara.
- source_word: בְּרִנָּה
  english_pob_choice: with singing
  chosen_spanish: con cántico
  alternatives_spanish:
  - con canto
  - con gritos de júbilo
  lexicon: HALOT
  rationale: רִנָּה puede referirse a un clamor jubiloso o a expresión cantada de júbilo. “Con cántico” preserva la idea de expresión sonora celebrativa y mantiene el paralelismo con “alegría”.
- source_word: בְּחִירָיו
  english_pob_choice: his chosen ones
  chosen_spanish: sus escogidos
  alternatives_spanish:
  - sus elegidos
  - los que él escogió
  lexicon: HALOT
  rationale: El sustantivo plural alude a los que Dios ha escogido. “Sus escogidos” es transparente en español y evita cargar el pasaje con el peso doctrinal posterior de “elegidos” como término técnico.
theological_decisions:
- issue: Cómo traducir בְּחִירָיו sin imponer un tecnicismo doctrinal
  english_pob_reading: his chosen ones
  chosen_spanish_reading: sus escogidos
  alternative_spanish_readings:
  - sus elegidos
  - los elegidos
  rationale: El paralelo con “su pueblo” en contexto del éxodo muestra selección divina, pero el hebreo no obliga a un tecnicismo soteriológico posterior. “Sus escogidos” conserva la referencia covenantal sin sobrecargar el término.
  doctrine_reference: Affirmations; Translation philosophy §3, §6
translation_notes:
  revision_awareness: El contexto inglés presenta una traducción ya revisada y con acuerdo alto; no se registran cambios pendientes en la revisión más reciente. La versión española sigue esa línea, manteniendo las alternativas léxicas documentadas en el audit trail sin introducir nuevas ambigüedades.
  spanish_consistency_notes:
  - 'Se mantiene el orden paralelo del hebreo: pueblo/escogidos; alegría/cántico.'
  - Se usa un registro bíblico claro y moderno, evitando calcos rígidos.
  - “Escogidos” preserva la tensión léxica entre selección divina y uso no técnico del término.
