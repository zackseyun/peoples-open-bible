lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el maestro de coro
  - Para el jefe musical
  - Al director
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término indica a la persona responsable de la dirección musical o interpretativa. En español, "director musical" conserva esa función con naturalidad y evita una calca demasiado eclesiástica. "Para" refleja de forma idiomática el valor del lamed en fórmulas de superscripción.
- source_word: בִּנְגִינֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - sobre instrumentos de cuerda
  - con música de cuerda
  - con instrumentos de cuerda pulsada
  lexicon: HALOT
  rationale: El término se refiere al acompañamiento o ejecución con instrumentos de cuerda. "Con instrumentos de cuerda" mantiene la referencia instrumental de manera clara y publicable en español. Se evita "sobre" por ser menos natural aquí, aunque sigue siendo una posibilidad literal.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Salmo
  lexicon: HALOT
  rationale: Como rótulo de género, en español bíblico "Salmo" funciona bien y preserva la designación sin añadir matiz innecesario. En una línea de encabezado, el artículo puede omitirse con naturalidad.
- source_word: שִׁיר
  english_pob_choice: A song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Un cántico
  - Un canto
  - Canción
  lexicon: HALOT
  rationale: Aunque literalmente significa "canto/canción", en registros bíblicos españoles "cántico" comunica mejor el valor de género y mantiene la distinción frente a מִזְמוֹר. Se evita "canción" por sonar demasiado moderno y menos litúrgico.
translation_notes:
  revision_awareness: La versión española sigue de cerca el valor genérico y litúrgico del encabezado hebreo, manteniendo la doble designación final "Salmo. Cántico." que la auditoría inglesa preserva como dos rótulos separados.
  spanish_consistency_notes:
  - Se conservó la distinción entre los dos términos genéricos finales, en lugar de fusionarlos.
  - '"Director musical" se eligió como equivalente funcional de superscripción, evitando un calco rígido.'
  - Se mantuvo "instrumentos de cuerda" como solución clara y neutral para el acompañamiento instrumental.
