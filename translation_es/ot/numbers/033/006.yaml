translation:
  language: es
  text: Salieron de Sucot y acamparon en Etam[a], que está al borde de la región desierta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al límite de la región desierta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Partieron
  lexicon: HALOT
  rationale: El hebreo expresa movimiento en la secuencia narrativa del itinerario. «Salieron» comunica de forma natural y fiel el avance desde un lugar hacia otro sin cargar con un tono excesivamente formal.
- source_word: מִסֻּכֹּת
  english_pob_choice: from Sukkoth
  chosen_spanish: de Sucot
  alternatives_spanish:
  - desde Sucot
  lexicon: HALOT
  rationale: Es un nombre de lugar; se translitera al español como «Sucot», conservando el referente geográfico del texto.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron el campamento
  lexicon: HALOT
  rationale: El verbo חנה indica acampar. «Acamparon» es la forma natural en español y mantiene el sentido de establecimiento temporal del viaje.
- source_word: בְאֵתָם
  english_pob_choice: at Etham
  chosen_spanish: en Etam
  alternatives_spanish:
  - en Etán
  - en Etham
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración estándar al español. La preposición hebrea admite bien «en» para señalar ubicación de campamento.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Introduce una relativa explicativa sobre Etam. En español, «que» es la solución más natural y no añade matices innecesarios.
- source_word: בִּקְצֵה
  english_pob_choice: at the edge of
  chosen_spanish: al borde de
  alternatives_spanish:
  - en el borde de
  - en el extremo de
  - al límite de
  lexicon: HALOT
  rationale: קצה expresa la idea de extremidad o límite. «Al borde de» reproduce bien la imagen espacial sin forzar un sentido jurídico de «frontera».
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto/ la tierra despoblada
  - el desierto salvaje
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar «wilderness», en español bíblico «desierto» comunica adecuadamente la zona árida o despoblada. Se evita «wilderness» por no ser idiomático; el contexto de itinerario hace clara la región fronteriza y deshabitada.
theological_decisions:
- issue: Valor de מִדְבָּר en el contexto del éxodo/itinerario
  english_pob_reading: the wilderness
  chosen_spanish_reading: el desierto
  alternative_spanish_readings:
  - el desierto yermo
  - la tierra despoblada
  rationale: 'No hay un debate doctrinal directo, pero sí una decisión semántica importante: en español, «desierto» es la forma más clara y reconocible para el lector, manteniendo la idea de zona inhóspita propia del relato del éxodo.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con el texto hebreo masorético (WLC) y con el audit trail inglés: viaje desde Sucot, llegada/campamento en Etam, y cláusula relativa de ubicación. Se siguió la revisión inglesa estable, sin cambios textuales relevantes. Se adaptó «wilderness» a «desierto» por naturalidad y claridad en español, sin perder el sentido geográfico del hebreo.'
  spanish_consistency_notes:
  - 'Se conserva la terminología toponímica de forma consistente: Sucot, Etam.'
  - Se mantiene el registro narrativo sobrio y directo propio de una lista de estaciones.
  - La nota al pie preserva la alternativa léxica entre «al borde» y «al borde del/desierto» sin introducir una lectura nueva.
