translation:
  language: es
  text: He borrado tus transgresiones como una nube[a], y tus pecados como una niebla. Vuelve a mí[c][b], porque te he redimido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he borrado tus transgresiones como una nube, y tus pecados como una nube/niebla». El hebreo usa dos términos relacionados para las nubes en paralelismo poético.
    reason: lexical_alternative
  - marker: b
    text: «Vuelve a mí» también puede verterse «Regresa a mí» o «Vuélvete a mí», con matices de retorno de pacto y arrepentimiento.
    reason: lexical_alternative
  - marker: c
    text: O posiblemente, en lenguaje profético, «Borraré ... te redimiré».
    reason: alternative_reading
lexical_decisions:
- source_word: מָחִיתִי
  english_pob_choice: I have wiped away
  chosen_spanish: Yo he borrado
  alternatives_spanish:
  - Yo he borrado por completo
  - Yo he borrado / he quitado
  lexicon: HALOT
  rationale: מחה expresa borrar, borrar del todo o quitar. «He borrado» es natural en español y conserva la imagen de eliminación. «He quitado» pierde la fuerza gráfica de borrar; «he borrado por completo» explicita más de lo que exige el hebreo.
- source_word: כָעָב
  english_pob_choice: like a cloud
  chosen_spanish: como una nube
  alternatives_spanish:
  - como nube
  - como una nube de vapor
  lexicon: HALOT
  rationale: כ introduce comparación directa. עָב designa nube, a menudo densa; «como una nube» es claro y fiel al símil.
- source_word: פְּשָׁעֶיךָ
  english_pob_choice: your transgressions
  chosen_spanish: tus transgresiones
  alternatives_spanish:
  - tus rebeliones
  - tus ofensas
  lexicon: HALOT
  rationale: פֶּשַׁע suele tener el matiz de transgresión o rebelión, no solo error general. «Transgresiones» conserva el peso moral y jurídico sin estrecharlo demasiado.
- source_word: וְכֶעָנָן
  english_pob_choice: and ... like a mist
  chosen_spanish: como una niebla
  alternatives_spanish:
  - como una nube
  - como vapor
  lexicon: HALOT
  rationale: עָנָן puede ser nube, pero en paralelismo con עָב conviene distinguir el segundo término para conservar la variación poética. «Niebla» comunica algo tenue y evanescente, acorde con la imagen de desaparición.
- source_word: חַטֹּאותֶיךָ
  english_pob_choice: your sins
  chosen_spanish: tus pecados
  alternatives_spanish:
  - tus pecados-ofensas
  - tus faltas
  lexicon: HALOT
  rationale: חַטֹּאות se traduce naturalmente como «pecados». En paralelo con «transgresiones», mantiene el ritmo y el sentido moral.
- source_word: שׁוּבָה אֵלַי
  english_pob_choice: Return to me
  chosen_spanish: Vuélvete a mí
  alternatives_spanish:
  - Regresa a mí
  - Vuelve a mí
  lexicon: HALOT
  rationale: שׁוּב en imperativo tiene la fuerza de volver/volver atrás, con tono de retorno pactal y arrepentimiento. «Vuélvete a mí» conserva esa dirección personal y el matiz relacional.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'כִּי introduce la base de la exhortación: el llamado a volver se apoya en una acción redentora ya declarada. «Porque» expresa mejor la causalidad explícita en español.'
- source_word: גְאַלְתִּיךָ
  english_pob_choice: I have redeemed you
  chosen_spanish: te he redimido
  alternatives_spanish:
  - te he rescatado
  - te he reclamado
  lexicon: HALOT
  rationale: גאל es un término clave de redención del pacto, relacionado con el rescatador o redentor familiar. «He redimido» preserva el peso teológico y la resonancia bíblica.
theological_decisions:
- issue: Aspecto de los perfectos y posible lectura profética
  english_pob_reading: Render both perfects as present-result perfects ('I have wiped away ... I have redeemed you')
  chosen_spanish_reading: Traducir ambos perfectos con perfecto compuesto de resultado presente («he borrado ... he redimido»), sin cerrar la posibilidad de una lectura profética implícita.
  alternative_spanish_readings:
  - «Borré ... redimí»
  - «Borraré ... redimiré»
  rationale: En el contexto, el versículo fundamenta el llamado a volver en la acción redentora de Yahvé ya declarada como eficaz. El perfecto compuesto español comunica acción completada con relevancia presente. A la vez, no se elimina del todo la tensión profética del hebreo.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, marcado como sin cambios y de alto acuerdo; no se requirieron ajustes frente al texto inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma normativa del Tetragrámaton en el proyecto, aunque en este versículo el nombre divino no aparece de forma explícita en el texto hebreo.
  - Se traduce פֶּשַׁע como «transgresiones» y חַטָּאת como «pecados» para reflejar la pareja poética sin homogeneizarla.
  - Se preserva la tensión entre una acción ya realizada y la posible fuerza profética del hebreo mediante el perfecto compuesto y la nota c.
