review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: énfasis en «él mismo», imagen de echar suertes, reparto medido, posesión perpetua y habitación continua. Sin embargo, en español «para ellos» en ambas ocurrencias suena menos preciso que «a ellas/a ellos» según los pronombres hebreos, y se pierde un matiz de concordancia importante del contexto inmediato. También «con la línea» es entendible, pero «con cordel» o «con la cuerda de medir» suena más natural en español bíblico; dado que la nota ya preserva «línea de medir», conviene mejorar el texto principal con una formulación más idiomática.'
  spanish_quality_summary: La redacción es clara y legible, pero requiere pequeños ajustes de naturalidad y precisión pronominal. «Echó la suerte» y «habitarán en ella» funcionan bien. El principal problema es la repetición de «para ellos», que en español suena torpe en un contexto de asignación y además no refleja la alternancia femenino/masculino del hebreo. «Su mano la repartió» puede mejorarse levemente con «la repartió a ellos», manteniendo fluidez.
  glossary_alignment: No hay conflictos con la terminología central del proyecto. El verso no contiene nombres divinos ni términos doctrinales sensibles del glosario. Las decisiones léxicas para גּוֹרָל, ירשׁ y שׁכן son adecuadas. La alternativa de קָו debe mantenerse en nota, pero el texto principal puede usar una expresión española más natural de agrimensura.
  issues:
  - severity: medium
    issue: «para ellos» no refleja bien los pronombres dativos del hebreo y suena poco natural en español
    rationale: לָהֶן es femenino plural y לָהֶם es masculino plural; aunque el español puede neutralizar el referente, «a ellas» / «a ellos» comunica mejor la asignación. «Para ellos» añade un matiz benefactivo que no es el mejor aquí.
  - severity: low
    issue: «con la línea» es algo rígido en español
    rationale: בַּקָּו alude a una línea/cuerda de medir en contexto de reparto territorial. En español corriente y eclesial, «con cordel» suena más idiomático, mientras la nota puede conservar la opción explícita «con la línea de medir».
  revised_spanish_text: Y él mismo echó la suerte[a] a ellas, y su mano la repartió a ellos con cordel; la poseerán para siempre[b]; de generación en generación habitarán en ella.
  revised_footnotes:
  - marker: a
    text: O «con la línea de medir».
    reason: lexical_alternative
  - marker: b
    text: O «la heredarán».
    reason: lexical_alternative
  revision_rationale: Se ajustan los pronombres para reflejar mejor el hebreo y mejorar la naturalidad española («a ellas / a ellos» en vez de «para ellos»). También se sustituye «con la línea» por «con cordel» como expresión más idiomática para el instrumento de medición territorial, mientras la alternativa más explícita queda en la nota. El resto del verso preserva fielmente el sentido y el tono del original y del audit trail inglés.
