translation:
  language: es
  text: Después de esto, Josué los hirió y les dio muerte, y los colgó[a] sobre cinco árboles; y permanecieron colgados en los árboles hasta el atardecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los suspendió». El verbo hebreo se refiere a colgar o suspender cuerpos sobre madera o árbol; «los empaló» es una posibilidad, pero menos segura aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּם
  english_pob_choice: struck them down
  chosen_spanish: los hirió
  alternatives_spanish:
  - los golpeó
  - los hirió de muerte
  - los derribó
  lexicon: HALOT
  rationale: El verbo de נכה en esta secuencia narrativa expresa un golpe o derrota inicial distinto del verbo siguiente que ya dice que murieron. En español, 'los hirió' mantiene esa acción violenta sin absorber por completo el matiz de ejecución que se expresa aparte en 'los hizo morir'.
- source_word: אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - después
  - luego de esto
  lexicon: HALOT
  rationale: Es una fórmula temporal simple de secuencia narrativa. 'Después de esto' es natural en español y conserva el orden del relato.
- source_word: וַיְמִיתֵם
  english_pob_choice: put them to death
  chosen_spanish: los hizo morir
  alternatives_spanish:
  - los mató
  - los dio muerte
  lexicon: HALOT
  rationale: El hifil de מות tiene valor causativo. 'Los hizo morir' conserva esa causatividad mejor que un simple 'los mató', y también respeta la distinción entre este verbo y el anterior.
- source_word: וַיִּתְלֵם
  english_pob_choice: hanged them
  chosen_spanish: los colgó
  alternatives_spanish:
  - los ahorcó
  - los suspendió
  - los colgó de un árbol
  lexicon: HALOT
  rationale: תלה describe colgar un cuerpo o persona de madera/árbol. 'Los colgó' es el equivalente más directo y evita especificar indebidamente el método como 'ahorcó'.
- source_word: עַל חֲמִשָּׁה עֵצִים
  english_pob_choice: on five trees
  chosen_spanish: sobre cinco árboles
  alternatives_spanish:
  - en cinco árboles
  - sobre cinco maderos
  - sobre cinco postes de madera
  lexicon: HALOT
  rationale: עֵץ puede significar 'árbol' o 'madera', pero el sentido más llano aquí es 'árboles'. 'Sobre cinco árboles' conserva la imagen del texto hebreo sin introducir un objeto de ejecución posterior como 'gallows'.
- source_word: וַיִּהְיוּ תְּלוּיִם
  english_pob_choice: they remained hanging
  chosen_spanish: y quedaron colgados
  alternatives_spanish:
  - y permanecieron colgados
  - y estuvieron colgados
  lexicon: HALOT
  rationale: La combinación verbal expresa un estado continuo. 'Quedaron colgados' transmite con naturalidad la permanencia del estado en español.
- source_word: עַל הָעֵצִים
  english_pob_choice: on the trees
  chosen_spanish: en los árboles
  alternatives_spanish:
  - sobre los árboles
  - de los árboles
  lexicon: HALOT
  rationale: La preposición puede describir ubicación literal sobre la madera/árboles. 'En los árboles' evita una repetición demasiado pesada de 'sobre' y sigue siendo fiel al contexto.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta el atardecer
  alternatives_spanish:
  - hasta la tarde
  - hasta la noche
  lexicon: HALOT
  rationale: הָעָרֶב señala el momento de la caída del día. 'Atardecer' comunica bien ese límite temporal en español contemporáneo y es suficientemente cercano al hebreo sin volverlo más interpretativo que 'anochecer' o 'puesta del sol'.
theological_decisions:
- issue: Método de ejecución y posible sobreespecificación
  english_pob_reading: '''hanged them'' with a footnote allowing ''hung them'' and noting that ''impaled them'' is possible but less certain'
  chosen_spanish_reading: '''los colgó'' sin concretar más el mecanismo'
  alternative_spanish_readings:
  - los ahorcó
  - los empaló
  - los suspendió
  rationale: El hebreo describe la suspensión de cuerpos en madera/árbol, pero no obliga a fijar el mecanismo como ahorcamiento o empalamiento. En español, 'los colgó' preserva la ambigüedad auditada por la POB inglesa y evita imponer una imagen no garantizada por el texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: עֵץ en contexto de exposición pública
  english_pob_reading: trees
  chosen_spanish_reading: árboles
  alternative_spanish_readings:
  - maderos
  - postes de madera
  rationale: No hay carga doctrinal especial; el sustantivo hebreo apunta primero a árboles/ madera. Mantener 'árboles' conserva la literalidad básica del relato y la tensión histórica del pasaje.
  doctrine_reference: HALOT; audit trail lexical note
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el audit trail inglés: mantiene la secuencia verbal distinguible (''hirió'' / ''hizo morir'' / ''colgó''), conserva ''árboles'' para עֵץ y expresa la duración con una construcción natural en español. No se aplicaron revisiones adicionales respecto del pasaje fuente revisado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo presente יהוה; este versículo no lo contiene.
  - Se mantiene la distinción entre un primer golpe y la ejecución posterior, porque el hebreo usa dos verbos diferentes.
  - '''Árboles'' se conserva conforme al texto fuente, sin sustituirlo por ''gallows'' o ''patíbulos''.'
  - La nota al pie marca únicamente la alternativa lexical documentada por la POB inglesa y no añade especulación innecesaria.
