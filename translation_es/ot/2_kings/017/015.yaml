  to: Ellos rechazaron sus estatutos y su pacto que había hecho con sus padres, y sus testimonios con los que los había amonestado.[c] Siguieron tras la vaciedad[a] y se volvieron vacíos[b], y tras las naciones que estaban alrededor de ellos, respecto de las cuales Yahvé les había mandado que no hicieran como ellas.
