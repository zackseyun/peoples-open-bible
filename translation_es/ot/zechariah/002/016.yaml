  to: Yahvé heredará[a] a Judá como su porción, en la tierra santa[b], y volverá a escoger a Jerusalén.
  rationale: Se ajusta la preposición a un español más natural y fiel a la decisión auditada («en la tierra santa») sin perder la literalidad, que se preserva en nota. También se añaden las dos notas léxicas ya documentadas en el POB inglés para mantener la trazabilidad exegética y lexical. No se requiere cambio en «Yahvé», «heredará», «como su porción» ni «volverá a escoger».
