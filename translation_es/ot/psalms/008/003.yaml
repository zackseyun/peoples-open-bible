translation:
  language: es
  text: De las bocas de los pequeños y de los niños de pecho has establecido fuerza[a], a causa de tus enemigos, para hacer callar al enemigo y al vengador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alabanza», siguiendo la tradición de la Septuaginta reflejada en Mateo 21:16; el texto hebreo dice «fuerza».
    reason: alternative_reading
lexical_decisions:
- source_word: מִפִּי
  english_pob_choice: From the mouths of
  chosen_spanish: De la boca de
  alternatives_spanish:
  - De las bocas de
  - Desde la boca de
  lexicon: HALOT
  rationale: La construcción hebrea con מִן + פֶּה expresa origen/ procedencia 'de la boca de'. En español, 'De la boca de' suena natural y conserva el singular distributivo que funciona bien con el paralelismo de los dos grupos siguientes.
- source_word: עוֹלְלִים
  english_pob_choice: infants
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los infantes
  - los bebés
  lexicon: HALOT
  rationale: El término describe a niños muy pequeños. 'Niños pequeños' mantiene claridad y dignidad en español contemporáneo; 'infantes' puede sonar técnico o menos transparente para lectores generales.
- source_word: יֹנְקִים
  english_pob_choice: nursing babies
  chosen_spanish: los que aún maman
  alternatives_spanish:
  - los bebés lactantes
  - los lactantes
  lexicon: HALOT
  rationale: El participio señala a los que toman leche materna. 'Los que aún maman' conserva la imagen concreta del hebreo y evita tecnicismos; además mantiene el paralelismo con 'niños pequeños'.
- source_word: יִסַּדְתָּ
  english_pob_choice: you have established
  chosen_spanish: has establecido
  alternatives_spanish:
  - has fundado
  - has puesto en su lugar
  - has dispuesto
  lexicon: HALOT
  rationale: El verbo יסד indica 'fundar/establecer'. 'Has establecido' transmite bien el valor perfecto dirigido a Dios y encaja con el sustantivo abstracto siguiente.
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - fortaleza
  - vigor
  lexicon: HALOT
  rationale: El hebreo lee 'fuerza/might'. 'Fuerza' es el equivalente más natural y directo en español. Se evita importar la lectura de la Septuaginta ('alabanza') al texto principal, pero se preserva en nota por su relevancia intertextual.
- source_word: לְמַעַן
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por causa de
  - para
  - con motivo de
  lexicon: HALOT
  rationale: En este contexto introduce la razón o el motivo relativo a los adversarios. 'A causa de' comunica adecuadamente la relación causal/purposiva sin sonar forzado en español.
- source_word: צוֹרְרֶיךָ
  english_pob_choice: your foes
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - tus opositores
  lexicon: HALOT
  rationale: El participio designa a los que hostilizan. 'Tus enemigos' es claro y encaja con el campo semántico del versículo; en español evita una alternancia demasiado rebuscada con el singular siguiente.
- source_word: לְהַשְׁבִּית
  english_pob_choice: to silence
  chosen_spanish: para hacer callar
  alternatives_spanish:
  - para hacer cesar
  - para poner fin a
  - para silenciar
  lexicon: HALOT
  rationale: El causativo significa 'hacer cesar'. 'Para hacer callar' conserva la imagen y es idiomático en español; 'silenciar' podría sonar más técnico o demasiado moderno en este contexto poético.
- source_word: א֝וֹיֵ֗ב
  english_pob_choice: the enemy
  chosen_spanish: al enemigo
  alternatives_spanish:
  - al adversario
  - al oponente
  lexicon: HALOT
  rationale: El sustantivo singular funciona como representante genérico. 'Al enemigo' mantiene el paralelismo con el siguiente término y su fuerza poética.
- source_word: וּ/מִתְנַקֵּם
  english_pob_choice: the avenger
  chosen_spanish: al vengador
  alternatives_spanish:
  - al que busca venganza
  - al vindicador
  lexicon: HALOT
  rationale: El participio reflexivo describe al que se venga. 'El vengador' es breve, natural y fiel a la fuerza del término sin añadir matices interpretativos no presentes en el hebreo.
theological_decisions:
- issue: עֹז leído como 'fuerza' frente a la tradición griega 'alabanza'
  english_pob_reading: Render עֹז as 'strength' in the main text, with a footnote for 'praise'.
  chosen_spanish_reading: Traducir עֹז como 'fuerza' en el texto principal y anotar la alternativa 'alabanza'.
  alternative_spanish_readings:
  - alabanza
  - poder
  rationale: El hebreo masorético dice claramente 'fuerza/might'. Por fidelidad a la fuente original, el texto principal conserva ese sentido. La lectura de la Septuaginta, reflejada en Mateo 21:16, es teológicamente importante y se mantiene en nota para no borrar la tensión textual documentada.
  doctrine_reference: Principios POB §1, §3; intertextualidad con Mt 21:16
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia con el auditorio inglés y no muestra cambios necesarios; por ello se conserva la decisión principal del hebreo, con la alternativa de la Septuaginta solo en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto en el proyecto, pero este versículo usa el pronombre de segunda persona y no requiere el nombre divino.
  - Se evitó 'SEÑOR' como máscara y también 'Cristo', ya que no aparecen en el texto.
  - '''Fuerza'' se eligió por su transparencia; ''alabanza'' queda restringida a la nota por la variante textual.'
  - Se prefirió 'el enemigo'/'el vengador' para conservar el paralelismo singular del hebreo.
  - La puntuación y el orden buscan un tono poético natural en español sin perder la estructura causal del verso.
