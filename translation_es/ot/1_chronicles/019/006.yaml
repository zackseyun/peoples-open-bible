  text: וַ/יִּרְאוּ֙ בְּנֵ֣י עַמּ֔וֹן כִּ֥י הִֽתְבָּאֲשׁ֖וּ עִם דָּוִ֑יד וַ/יִּשְׁלַ֣ח חָ֠נוּן וּ/בְנֵ֨י עַמּ֜וֹן אֶ֣לֶף כִּכַּר כֶּ֗סֶף לִ/שְׂכֹּ֣ר לָ֠/הֶם מִן אֲרַ֨ם נַהֲרַ֜יִם וּ/מִן אֲרַ֤ם מַעֲכָה֙ וּ/מִ/צּוֹבָ֔ה רֶ֖כֶב וּ/פָרָשִֽׁים־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/019/006.yaml
  text: When the Ammonites saw that they had become odious to David[a], Hanun and the Ammonites sent a thousand talents of silver to hire for themselves chariots and horsemen from Aram-naharaim, from Aram-maacah[b], and from Zobah.
  footnotes:
  - marker: a
    text: Aram-naharaim is traditionally understood as 'Aram of the Two Rivers,' that is, Mesopotamia.
    reason: cultural_note
  - marker: b
    text: 'Hebrew: ''had become odious''—literally, ''had made themselves stink'' to David, an idiom for becoming offensive or detestable.'
    reason: lexical_alternative
