  text: Τὰ τέκνα, ὑπακούετε τοῖς γονεῦσιν κατὰ πάντα, τοῦτο γὰρ ⸂εὐάρεστόν ἐστιν⸃ ἐν κυρίῳ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/020.yaml
  text: Children, obey your parents in everything, for this is pleasing in the Lord.
translation:
  language: ko
  text: 자녀들이여, 모든 일에 여러분의 부모에게 순종하십시오. 이는 주 안에서 기뻐하실 일이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Τὰ τέκνα
  english_pob_choice: Children
  chosen_korean: 자녀들
  alternatives_korean:
  - 어린이들
  lexicon: BDAG
  rationale: τέκνα는 「자녀」(성별 무관).
- source_word: ὑπακούετε
  english_pob_choice: obey
  chosen_korean: 순종하십시오
  alternatives_korean:
  - 복종하십시오
  lexicon: BDAG
  rationale: 부모-자녀 문맥에서 「순종」.
- source_word: τοῖς γονεῦσιν
  english_pob_choice: your parents
  chosen_korean: 여러분의 부모
  alternatives_korean:
  - 부모님
  lexicon: BDAG
  rationale: 「부모」 표준 등가어.
- source_word: κατὰ πάντα
  english_pob_choice: in everything
  chosen_korean: 모든 일에
  alternatives_korean:
  - 모든 것에
  - 매사에
  lexicon: BDAG
  rationale: κατά + 대격의 범위.
- source_word: τοῦτο γὰρ εὐάρεστόν ἐστιν
  english_pob_choice: for this is pleasing
  chosen_korean: 이는 ... 기뻐하실 일이기 때문입니다
  alternatives_korean:
  - 이것이 기뻐하실 만한 일이기 때문입니다
  lexicon: BDAG
  rationale: εὐάρεστος의 「기뻐하실 만함」을 살린다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주께
  lexicon: BDAG
  rationale: 한국 교회의 정립된 표현.
