translation:
  language: es
  text: Por tanto, vivo yo, declara el Señor Dios, Yahvé, yo te haré sangre[a], y la sangre te perseguirá. Ciertamente no has aborrecido la sangre[b], así que la sangre te perseguirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «yo te haré sangre»; el hebreo probablemente evoca a la vez derramamiento de sangre y culpa de sangre mediante un juego de palabras repetido con «sangre».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sangre»; aquí el sentido probablemente es «derramamiento de sangre» o culpa violenta de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: HALOT
  rationale: Marcador inferencial que introduce una sentencia derivada de la acusación previa. 'Por tanto' conserva la relación lógica sin sonar mecánico.
- source_word: חַי אָנִי
  english_pob_choice: as I live
  chosen_spanish: vivo yo
  alternatives_spanish:
  - tan cierto como que vivo
  - por mi vida
  lexicon: HALOT
  rationale: Fórmula juratoria profética. En español, 'vivo yo' mantiene la solemnidad y la primera persona enfática del hebreo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor Dios
  lexicon: HALOT
  rationale: נְאֻם funciona como fórmula de declaración profética. Se conserva 'Señor Yahvé' conforme al criterio del proyecto para יְהוָה, evitando el reemplazo por una convención de ocultamiento.
- source_word: לְדָם אֶעֶשְׂךָ
  english_pob_choice: I will make you blood
  chosen_spanish: yo te haré sangre
  alternatives_spanish:
  - te haré sangre
  - te convertiré en sangre
  - te haré sangriento
  lexicon: HALOT
  rationale: La construcción es breve y deliberadamente impactante. 'Yo te haré sangre' preserva el paralelismo y la repetición de דָם, dejando abierta la fuerza de sangre, derramamiento de sangre y culpa de sangre.
- source_word: דָם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - derramamiento de sangre
  - culpa de sangre
  lexicon: HALOT
  rationale: Se conserva el término repetido para mantener el juego verbal del hebreo. En una nota se reconoce la posible extensión semántica hacia 'derramamiento de sangre' o culpa de sangre.
- source_word: יִרְדֲּפֶךָ
  english_pob_choice: will pursue you
  chosen_spanish: te perseguirá
  alternatives_spanish:
  - te acosará
  - te dará caza
  lexicon: HALOT
  rationale: רדף expresa persecución/hostigamiento. 'Te perseguirá' es natural en español y adecuado al lenguaje de juicio.
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - de seguro
  - en verdad
  lexicon: HALOT
  rationale: La secuencia tiene valor enfático y no meramente condicional en este contexto. 'Ciertamente' reproduce el énfasis sin introducir una traducción explicativa excesiva.
- source_word: דָם שָׂנֵאתָ
  english_pob_choice: you have not hated blood
  chosen_spanish: no has aborrecido la sangre
  alternatives_spanish:
  - no has odiado la sangre
  - no has detestado la sangre
  lexicon: HALOT
  rationale: Se mantiene 'sangre' para respetar la repetición léxica. 'Aborrecer' recoge bien el verbo intenso שָׂנֵא en un registro bíblico claro y digno.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה dentro de אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD / Lord Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvé
  rationale: El proyecto pide renderizar יְהוָה como 'Yahvé' en el texto principal. Aquí la combinación אֲדֹנָי יְהוִה se traduce de forma directa como 'Señor Yahvé', preservando el nombre de pacto y evitando la convención de máscara 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió conservar la repetición de «blood»/«blood» en la cláusula final en lugar de introducir una explicación como 'bloodshed' en el cuerpo principal. Por eso el español mantiene 'sangre' en ambas apariciones y deja la ampliación semántica en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה según la terminología del proyecto.
  - Se conserva la repetición de 'sangre' para reflejar el juego léxico del hebreo.
  - '''Ciertamente'' refleja el valor enfático de אִם לֹא sin convertirlo en una condicional simple.'
  - El registro es profético y solemne, evitando una paráfrasis explicativa en el texto principal.
