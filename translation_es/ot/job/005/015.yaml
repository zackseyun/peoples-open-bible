translation:
  language: es
  text: Pero él salva al necesitado de la espada de la boca de ellos[a], y de la mano del fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él libró al necesitado de la espada, de la boca de ellos, y de la mano del fuerte». El hebreo es condensado, y algunos toman «de la boca de ellos» por separado en vez de unirlo con «la espada» como una sola imagen metafórica.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּשַׁע
  english_pob_choice: he saves
  chosen_spanish: salva
  alternatives_spanish:
  - rescata
  - libra
  lexicon: HALOT
  rationale: El verbo ישׁע expresa librar/salvar. En español, «salva» conserva la fuerza de rescate divino y encaja con el tono proverbial/poético del contexto. «Rescata» y «libra» quedan como alternativas válidas, pero «salva» es más directo y natural aquí.
- source_word: מֵחֶרֶב
  english_pob_choice: from the sword
  chosen_spanish: de la espada
  alternatives_spanish:
  - de una espada
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de חֶרֶב como «espada». El valor de separación de מִן se expresa naturalmente con «de» en español.
- source_word: מִפִּיהֶם
  english_pob_choice: of their mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de su boca, literalmente 'de su boca'
  - de la boca de ellos
  lexicon: HALOT
  rationale: La construcción hebrea es compacta y puede leerse como «la espada de su boca» o separadamente «de la espada, de su boca». En el texto principal, «de su boca» preserva el hebraísmo y el vínculo metafórico entre espada y habla, con un español natural.
- source_word: וּמִיַּד
  english_pob_choice: and from the hand of
  chosen_spanish: y de la mano de
  alternatives_spanish:
  - y del poder de
  lexicon: HALOT
  rationale: יַד se mantiene de forma literal como «mano», porque en español también funciona bien como imagen de poder o control. Así se conserva el paralelismo con la primera cola.
- source_word: חָזָק
  english_pob_choice: the strong
  chosen_spanish: el fuerte
  alternatives_spanish:
  - el poderoso
  - el violento
  lexicon: HALOT
  rationale: Como adjetivo sustantivado, חָזָק designa a una persona fuerte o poderosa. «El fuerte» es breve y mantiene el contraste con «el necesitado».
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el pobre
  - el afligido
  lexicon: HALOT
  rationale: «El necesitado» conserva el campo semántico de pobreza/vulnerabilidad social sin reducir el término solo a carencia económica. En español suena natural y corresponde al énfasis del verso.
theological_decisions:
- issue: Metáfora de la espada en la boca
  english_pob_reading: Retain the metaphor as destructive speech rather than flattening it to 'their words.'
  chosen_spanish_reading: Conservar la metáfora como «la espada de su boca», en vez de explicarla como «sus palabras».
  alternative_spanish_readings:
  - la espada, de su boca
  - sus palabras destructivas
  rationale: El hebreo es comprimido y yuxtapone «espada» y «boca» para transmitir el poder dañino del habla. El español principal conserva esa tensión metafórica, y la nota explica la alternativa de segmentar la frase de otra manera.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de WLC y la solución inglesa auditada. Se conserva la imagen poética sin sobreexplicarla, y la nota recoge la alternativa reconocida en el aparato inglés para la secuencia comprimida מֵחֶרֶב מִפִּיהֶם.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo subyacente remite explícitamente al nombre divino; aquí no aparece.
  - Se mantuvo «espada» y «boca» en sentido literal-metafórico para no neutralizar el vigor poético.
  - «Necesitado» y «fuerte» reflejan el contraste social y de poder del hebreo sin introducir términos eclesiásticos tradicionales.
