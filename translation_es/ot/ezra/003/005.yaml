translation:
  language: es
  text: Y después de eso vino el holocausto regular[a], y las ofrendas para las lunas nuevas[b] y para todas las fiestas señaladas de Yahvé[c] que eran consagradas, y para todo el que ofrecía voluntariamente una ofrenda voluntaria a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el holocausto continuo' o 'el holocausto diario'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'lunas nuevas', refiriéndose a las observancias sagradas mensuales al comienzo de cada mes.
    reason: cultural_note
  - marker: c
    text: O 'tiempos señalados' o 'festivales' de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: And after that
  chosen_spanish: Y después de eso
  alternatives_spanish:
  - Y después
  - Y luego de eso
  lexicon: HALOT
  rationale: Mantiene la relación temporal secuencial del hebreo con una solución natural en español. Se conserva el enlace conjuntivo inicial y la idea de continuidad con lo anterior.
- source_word: עֹלַת תָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: la ofrenda quemada regular
  alternatives_spanish:
  - la ofrenda quemada continua
  - la ofrenda quemada diaria
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda completamente quemada; en español, 'ofrenda quemada' comunica el valor sacrificial sin perder la fuerza cultual. תָּמִיד expresa regularidad/continuidad; 'regular' evita imponer 'diaria' donde el hebreo dice más bien 'continua' o 'recurrente'.
- source_word: וְלֶחֳדָשִׁים
  english_pob_choice: and for the new moons
  chosen_spanish: las ofrendas para las lunas nuevas
  alternatives_spanish:
  - las ofrendas para los novilunios
  - las ofrendas para el inicio de cada mes
  lexicon: HALOT
  rationale: En contexto cultual, חֳדָשִׁים alude a las observancias de luna nueva al comienzo de cada mes. 'Lunas nuevas' es idiomático y fiel; se añade 'ofrendas' por el marco sacrificial del versículo y por la coordinación con los demás elementos.
- source_word: מוֹעֲדֵי יְהוָה
  english_pob_choice: the appointed feasts of Yahweh
  chosen_spanish: las fiestas señaladas de Yahvé
  alternatives_spanish:
  - las citas señaladas de Yahvé
  - los tiempos señalados de Yahvé
  lexicon: HALOT
  rationale: מוֹעֲדִים son tiempos fijos/sacros, a menudo festivos. 'Fiestas señaladas' comunica bien el carácter calendárico y sagrado en un español amplio y eclesial. Se mantiene 'Yahvé' conforme a la terminología del proyecto.
- source_word: הַמְקֻדָּשִׁים
  english_pob_choice: that were consecrated
  chosen_spanish: que estaban consagradas
  alternatives_spanish:
  - que fueron consagradas
  - que eran santas
  lexicon: HALOT
  rationale: '''Consagradas'' refleja el sentido pasivo de ser apartadas para uso santo. El plural femenino concuerda con ''fiestas'' y evita la literalidad plana de ''santas''.'
- source_word: מִתְנַדֵּב
  english_pob_choice: everyone who willingly offered
  chosen_spanish: todo el que ofrecía voluntariamente
  alternatives_spanish:
  - todo el que se ofrecía voluntariamente
  - todo el que daba de buena voluntad
  lexicon: HALOT
  rationale: El participio hitpael enfatiza la disposición voluntaria. 'Ofrecía voluntariamente' conserva el acto sacrificial y el matiz de disposición interna, más naturalmente que un calco como 'voluntariaba'.
- source_word: נְדָבָה
  english_pob_choice: a freewill offering
  chosen_spanish: una ofrenda voluntaria
  alternatives_spanish:
  - una ofrenda de buena voluntad
  - una ofrenda libre
  lexicon: HALOT
  rationale: Es el término sacrificial técnico para una ofrenda dada libremente. 'Ofrenda voluntaria' es claro en español bíblico y preserva la relación con el verbo anterior.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. La preposición ''a'' reproduce el dativo de ofrenda en español de manera natural.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la norma del proyecto, se translitera como 'Yahvé' para preservar el nombre del pacto y evitar la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés, que añadió 'came' para completar el sentido y desarrolló los elementos paralelos como ofrendas. En español, el verso se formula de manera igualmente completa con 'las ofrendas' en plural para los elementos coordinados, manteniendo la secuencia cultual del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva el campo sacrificial con 'ofrenda quemada' y 'ofrenda voluntaria' sin sustituirlo por vocabulario eclesiástico más genérico.
  - Se evita traducir 'תָּמִיד' de manera restrictiva como 'diaria' para no borrar la amplitud semántica de continuidad/regularidad.
