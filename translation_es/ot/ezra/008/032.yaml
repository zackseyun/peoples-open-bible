translation:
  language: es
  text: Así llegamos a Jerusalén y permanecimos allí tres días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/נָּב֖וֹא
  english_pob_choice: So we came
  chosen_spanish: Así llegamos
  alternatives_spanish:
  - Y llegamos
  - Entonces llegamos
  lexicon: HALOT
  rationale: El wayyiqtol marca la continuación narrativa; en español, «así» conserva bien el enlace discursivo natural de la secuencia sin sonar forzado. «Llegamos» expresa el movimiento hacia el destino con claridad idiomática.
- source_word: יְרוּשָׁלִָ֑ם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalemme
  lexicon: N/A
  rationale: Se mantiene el nombre propio geográfico en su forma española estándar y ampliamente reconocible.
- source_word: וַ/נֵּ֥שֶׁב
  english_pob_choice: and stayed
  chosen_spanish: y permanecimos
  alternatives_spanish:
  - y nos quedamos
  - y residimos
  - y habitamos
  lexicon: HALOT
  rationale: El verbo ישב puede abarcar sentarse, morar, permanecer o quedarse. En este contexto de viaje, «permanecimos» transmite la estancia temporal con dignidad y sin la posible coloquialidad de «nos quedamos».
- source_word: שָׁ֖ם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple que retoma Jerusalén; «allí» es la equivalencia natural y sobria en español.
- source_word: יָמִ֥ים שְׁלֹשָֽׁה
  english_pob_choice: three days
  chosen_spanish: tres días
  alternatives_spanish:
  - por tres días
  - durante tres días
  lexicon: HALOT
  rationale: La expresión hebrea indica duración. En español, el sentido queda claro con «tres días» unido al verbo de permanencia; no hace falta añadir una preposición que altere el ritmo del enunciado.
translation_notes:
  revision_awareness: El texto inglés auditado ya fue considerado de alta concordancia con el hebreo; no hay revisiones aplicadas ni tensiones léxicas o teológicas que requieran nota adicional.
  spanish_consistency_notes:
  - Se mantuvo un estilo narrativo sobrio y directo, acorde con el registro histórico de Esdras.
  - No se introdujeron términos eclesiásticos interpretativos; se prefirieron equivalentes transparentes del hebreo.
  - La duración temporal se expresó de forma idiomática en español sin añadir matices no presentes en el original.
