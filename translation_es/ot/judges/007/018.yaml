    text: 'Las versiones tradicionales suelen leer: «¡La espada de Yahvé y de Gedeón!», influidas por la redacción cercana de Jueces 7:20. Pero el hebreo de este versículo dice sencillamente: «Por Yahvé y por Gedeón».'
    reason: alternative_reading
  revision_rationale: Se corrige la sintaxis para reflejar con fidelidad la 1ª singular del hebreo («yo toque») sin perder la mención de los hombres que acompañan a Gedeón. También se restituye la nota textual importante sobre la lectura tradicional armonizada con Jueces 7:20, manteniendo la nota cultural sobre שׁוֹפָר.
