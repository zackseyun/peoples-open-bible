translation:
  language: es
  text: Entonces Abraham se levantó de delante de su difunta esposa y habló a los hijos de Heth[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hititas»; hebreo, «los hijos de Heth».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: Then ... rose
  chosen_spanish: Entonces ... se levantó
  alternatives_spanish:
  - Y ... se levantó
  - Luego ... se puso de pie
  lexicon: HALOT
  rationale: La forma wayyiqtol marca avance narrativo; «entonces» conserva la secuencia natural en español sin perder la progresión del relato. «Se levantó» reproduce el valor básico de קום con un registro bíblico claro.
- source_word: מֵעַל פְּנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - de junto a
  lexicon: HALOT
  rationale: El giro hebreo expresa alejamiento desde la proximidad inmediata. «De delante de» mantiene el valor espacial/presencial sin forzar una paráfrasis interpretativa.
- source_word: מֵתוֹ
  english_pob_choice: his dead wife
  chosen_spanish: su muerta
  alternatives_spanish:
  - su difunta
  - su esposa muerta
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su muerto/su muerta» con sufijo posesivo; no repite el nombre. En español, «su muerta» conserva esa concisión y la referencia contextual a Sara queda implícita. Se evita añadir «esposa» en el texto principal porque el hebreo no lo expresa aquí.
- source_word: וַיְדַבֵּר
  english_pob_choice: and spoke
  chosen_spanish: y habló
  alternatives_spanish:
  - y dijo
  - y se dirigió
  lexicon: HALOT
  rationale: דבר con אֶל introduce discurso directo; «habló» mantiene el enlace formal con lo que sigue y deja que לֵאמֹר introduzca la cita en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - con
  lexicon: HALOT
  rationale: La preposición con דבר señala destinatario del habla. «A» es la correspondencia española más natural y precisa.
- source_word: בְּנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Heth
  alternatives_spanish:
  - los hititas
  - los descendientes de Heth
  lexicon: HALOT
  rationale: Se conserva la estructura literal hebrea y el nombre propio transliterado, acorde con la prioridad de la fuente original. «Hititas» es una identificación legítima, pero aquí se mantiene la forma del texto hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijo:'
  - al decir
  lexicon: HALOT
  rationale: La forma infinitiva introduce el contenido del discurso en el versículo siguiente. «Diciendo» conserva la conexión sintáctica sin cerrar prematuramente la cita.
translation_notes:
  revision_awareness: El inglés auditado pasó de «his dead» a «his dead wife» para naturalidad; en español se optó por mantener la literalidad hebrea («su muerta») en el texto principal, dejando la precisión contextual implícita y aclarando la alternativa identificativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva el orden narrativo sencillo del hebreo sin añadir glosas interpretativas.
  - La nota a explica la equivalencia etnónimica documentada en el audit trail inglés, sin sustituir la forma literal del texto principal.
