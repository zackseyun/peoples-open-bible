translation:
  language: es
  text: Entonces su amo lo llevará a Dios[a], y lo llevará a la puerta o al poste de la puerta, y su amo le horadará la oreja con un punzón; y le servirá para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los jueces». El hebreo אֱלֹהִים puede referirse en algunos contextos legales a jueces humanos o a una autoridad judicial.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִגִּישׁוֹ
  english_pob_choice: shall bring him
  chosen_spanish: lo llevará
  alternatives_spanish:
  - lo presentará
  - lo acercará
  lexicon: HALOT
  rationale: El hifil de נגשׁ expresa hacer que alguien comparezca ante una autoridad o lugar designado. En español, «lo llevará» comunica de forma natural ese acto procesal sin perder el matiz jurídico.
- source_word: אֲדֹנָיו
  english_pob_choice: his master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  lexicon: HALOT
  rationale: En la legislación sobre servidumbre por deuda, «amo» reproduce bien la relación sociojurídica del contexto. «Señor» sería ambiguo por posibles connotaciones divinas; «dueño» suena más posesivo que relacional.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - los jueces
  lexicon: HALOT
  rationale: La forma puede referirse a Dios o, en ciertos contextos jurídicos, a jueces humanos. Se conserva «Dios» como lectura principal, manteniendo la alternativa tradicional en nota para no borrar la tensión interpretativa.
- source_word: הַדֶּלֶת
  english_pob_choice: the door
  chosen_spanish: la puerta
  alternatives_spanish:
  - el panel de la puerta
  lexicon: HALOT
  rationale: «Puerta» es la equivalencia clara y natural en español para el elemento arquitectónico literal mencionado en el rito.
- source_word: הַמְּזוּזָה
  english_pob_choice: the doorpost
  chosen_spanish: el poste de la puerta
  alternatives_spanish:
  - el marco de la puerta
  lexicon: HALOT
  rationale: «Poste de la puerta» refleja con precisión la pieza arquitectónica y evita una paráfrasis excesiva. «Marco» es posible, pero menos exacto para el término hebreo.
- source_word: וְרָצַע
  english_pob_choice: shall pierce
  chosen_spanish: horadará
  alternatives_spanish:
  - perforará
  - atravesará
  lexicon: HALOT
  rationale: El verbo describe perforar o hacer un orificio en la oreja en este rito. «Horadar» conserva fuerza concreta y es fiel al acto material sin introducir una connotación médica ajena.
- source_word: אָזְנוֹ
  english_pob_choice: his ear
  chosen_spanish: la oreja
  alternatives_spanish:
  - el oído
  lexicon: HALOT
  rationale: Aquí se trata del órgano físico visible involucrado en el rito; «oreja» es más natural en español que «oído», que puede sonar más abstracto.
- source_word: בַּמַּרְצֵעַ
  english_pob_choice: with an awl
  chosen_spanish: con un punzón
  alternatives_spanish:
  - con una lezna
  - con una lezna de perforar
  lexicon: HALOT
  rationale: מרצע designa un útil puntiagudo para perforar. «Punzón» transmite bien la herramienta y resulta comprensible para el lector moderno; «lezna» es más técnica, pero menos transparente.
- source_word: וַעֲבָדוֹ
  english_pob_choice: and he shall serve him
  chosen_spanish: y lo servirá
  alternatives_spanish:
  - y le servirá
  - y será su esclavo
  lexicon: HALOT
  rationale: El verbo עבד aquí expresa servicio continuado. «Lo servirá» conserva la relación verbal sin convertirla en un sustantivo de estatus; «será su esclavo» sería más interpretativo que el hebreo en esta cláusula final.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - de por vida
  - permanentemente
  lexicon: HALOT
  rationale: En este contexto legal, עולם indica una permanencia duradera de por vida. «Para siempre» sigue de cerca la opción inglesa revisada y mantiene la fuerza total del término; «de por vida» explicita el sentido, pero es más interpretativo.
theological_decisions:
- issue: Sentido de הָאֱלֹהִים en un contexto legal
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los jueces
  rationale: Se mantiene «Dios» como lectura principal porque es el valor básico del sustantivo y encaja con una escena jurídica-cultual. La alternativa «los jueces» sigue siendo plausible y se conserva en nota para no resolver silenciosamente la tensión interpretativa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión menor en la última fase: se ajustó el cierre de לְעֹלָם desde una equivalencia más explicativa a «forever». En español se siguió esa misma dirección con «para siempre», manteniendo la lectura directa y sin debilitar el alcance legal del término. No hubo otras correcciones sustantivas en el inglés auditado.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» en el texto principal y la alternativa judicial en nota, conforme al tratamiento del inglés POB.
  - Se evitó «SEÑOR» para יהוה porque este versículo no contiene el tetragrámaton; tampoco se introdujo terminología cultual no presente en el hebreo.
  - Se eligieron verbos concretos y jurídicos («llevará», «horadará», «servirá») para conservar el carácter ritual y legal del pasaje.
  - «Para siempre» traduce el cierre temporal de manera natural y coherente con la revisión inglesa más reciente.
