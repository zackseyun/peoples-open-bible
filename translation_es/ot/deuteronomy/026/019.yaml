review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea de propósito/resultados: «ponerte en alto», «sobre todas las naciones», la tríada «alabanza / renombre / gloria», y el cierre «como él ha hablado». También respeta el nombre divino «Yahvé». Sin embargo, «un pueblo santo para Yahvé tu Dios» suena menos natural y algo ambiguo en español para el ל de pertenencia/relación; «consagrado a Yahvé tu Dios» o «un pueblo santo para Yahvé» con ajuste sería más claro. Además, la nota [a] introduce «creó», que no corresponde a la alternativa auditada principal del inglés, donde la alternativa relevante era más bien el matiz de «nombre/renombre», no «hizo/creó».'
  spanish_quality_summary: El español es mayormente claro y digno, pero puede mejorarse en naturalidad bíblica y precisión idiomática. «Pueblo santo para Yahvé» es comprensible, aunque «pueblo santo consagrado a Yahvé» fluye mejor y expresa mejor pertenencia. La redacción general es sólida; el cambio requerido es pequeño y no altera la fidelidad global.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה se traduce correctamente como «Yahvé»; no hay conflicto con otros términos doctrinales. La elección «renombre» para שֵׁם y «gloria» para תִפְאָרֶת concuerda con la revisión inglesa documentada. El único ajuste recomendado es representar mejor לַיהוָה con «consagrado a Yahvé» en vez de «para Yahvé».'
  issues:
  - severity: medium
    issue: «para Yahvé tu Dios» suena poco natural para expresar pertenencia/consagración
    rationale: 'El ל de לַיהוָה en «עַם קָדֹשׁ לַיהוָה» marca relación o pertenencia. En español eclesial natural, «consagrado a Yahvé» o «de Yahvé» comunica mejor esa fuerza que «para Yahvé». '
  - severity: low
    issue: La nota [a] sobre «creó» no refleja la alternativa prioritaria auditada en inglés
    rationale: El expediente inglés conserva la referencia principal a «that he has made» y las notas se concentran en otros términos. Añadir «creó» no es imposible, pero desplaza la atención de las alternativas realmente documentadas y puede sugerir un matiz más fuerte que עָשָׂה.
  revised_spanish_text: y para ponerte en alto sobre todas las naciones que él ha hecho, para alabanza y para renombre y para gloria[a], y para que seas un pueblo santo consagrado a Yahvé tu Dios, como él ha hablado[b].
  revised_footnotes:
  - marker: a
    text: O «esplendor» o «hermosura» para תִפְאָרֶת. «Gloria» conserva un registro bíblico natural en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O «como él prometió». Literalmente: «como él ha hablado».'
    reason: alternative_reading
  revision_rationale: 'Se ajusta «para Yahvé tu Dios» a «consagrado a Yahvé tu Dios» para expresar con más naturalidad y precisión en español la relación de pertenencia/consagración de לַיהוָה. Se eliminó la nota sobre «creó», ya que no aporta una alternativa necesaria según el expediente auditado y podía intensificar indebidamente עָשָׂה. Se conservan las decisiones principales del borrador: «Yahvé», «renombre», «gloria» y «como él ha hablado».'
