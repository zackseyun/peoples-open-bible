translation:
  language: es
  text: 'Entonces el rey dijo[a]: «Partan al niño vivo en dos, y den la mitad a la una y la mitad a la otra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa formas femeninas singulares («a la una ... a la otra») para referirse a las dos mujeres del relato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» conserva la secuencia de manera natural en español sin perder el valor discursivo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es la equivalencia directa y clara del sustantivo definido, manteniendo el referente explícito del contexto.
- source_word: גִּזְרוּ
  english_pob_choice: Cut
  chosen_spanish: Partan
  alternatives_spanish:
  - Corten
  - Dividan
  - Corten en dos
  lexicon: HALOT
  rationale: El imperativo plural exige una orden dirigida a varios. «Partan» comunica la acción de dividir físicamente al niño con naturalidad en español y preserva la crudeza del mandato; «dividan» suena menos concreto aquí.
- source_word: הַיֶּלֶד הַחַי
  english_pob_choice: the living child
  chosen_spanish: el niño vivo
  alternatives_spanish:
  - el niño que está vivo
  - el niño viviente
  lexicon: HALOT
  rationale: «Niño vivo» es la forma más natural y directa en español para distinguirlo del otro niño muerto en la escena, sin añadir explicación interpretativa.
- source_word: לִשְׁנָיִם
  english_pob_choice: in two
  chosen_spanish: en dos
  alternatives_spanish:
  - en dos partes
  - por la mitad
  lexicon: HALOT
  rationale: La preposición + numeral expresa división en dos partes; «en dos» sigue de cerca el hebreo y funciona bien con el verbo de partir.
- source_word: וּתְנוּ
  english_pob_choice: and give
  chosen_spanish: y den
  alternatives_spanish:
  - y entreguen
  - entonces den
  lexicon: HALOT
  rationale: Se conserva el segundo imperativo plural coordinado con el primero. «Den» es directo y mantiene el paralelo con la orden anterior.
- source_word: הַחֲצִי
  english_pob_choice: half
  chosen_spanish: la mitad
  alternatives_spanish:
  - una mitad
  - el medio
  lexicon: HALOT
  rationale: «La mitad» expresa con precisión la porción a repartir; el artículo definido es natural en español y refleja la partición específica del niño.
- source_word: לְאַחַת ... לְאֶחָת
  english_pob_choice: to the one ... to the other
  chosen_spanish: a la una ... a la otra
  alternatives_spanish:
  - a una ... a la otra
  - a una mujer ... a la otra
  lexicon: HALOT
  rationale: El hebreo usa formas femeninas singulares distributivas referidas a las dos mujeres del relato. En español, «a la una ... a la otra» mantiene esa alternancia sin introducir «mujer», que no está en el verso mismo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión del POB en inglés, que eliminó «woman» por no estar explícito en la fuente. En español se mantuvo esa misma cautela y se optó por la alternancia femenina implícita («a la una ... a la otra») sin añadir sustantivos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se preserva el tono narrativo y el orden de mandato doble del hebreo.
  - Se evita suavizar la orden violenta, ya que la fuente la expresa de forma directa.
  - La nota aclara la ambigüedad distributiva femenina sin sobretraducirla.
  - «Yahvé» no aparece en este versículo; no se requiere decisión terminológica sobre el nombre divino.
