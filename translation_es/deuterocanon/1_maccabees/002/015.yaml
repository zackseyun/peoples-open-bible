translation:
  language: es
  text: Y llegaron los enviados del rey, que estaban obligando a la apostasía, a Modeín.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἦλθον
  english_pob_choice: And ... came
  chosen_spanish: Y llegaron
  alternatives_spanish:
  - Y vinieron
  - Entonces llegaron
  lexicon: LSJ
  rationale: Conserva la secuencia narrativa del griego y su valor conjuntivo inicial. 'Llegaron' es natural en español y mantiene el movimiento hacia el lugar sin añadir matiz interpretativo.
- source_word: οἱ παρὰ τοῦ Βασιλέως
  english_pob_choice: the king’s agents
  chosen_spanish: los enviados del rey
  alternatives_spanish:
  - los agentes del rey
  - los representantes del rey
  - los hombres del rey
  lexicon: LSJ
  rationale: La expresión literal es 'los de parte del rey / los procedentes del rey', pero el contexto muestra funcionarios con autoridad delegada. 'Enviados' comunica esa delegación de forma clara y evita especificar un cargo que el griego no nombra.
- source_word: καταναγκάζοντες
  english_pob_choice: compelling
  chosen_spanish: obligando
  alternatives_spanish:
  - forzando
  - coaccionando
  - presionando
  lexicon: LSJ
  rationale: El participio expresa compulsión activa. 'Obligando' conserva la fuerza coercitiva con un español fluido y menos áspero que 'coaccionando', sin debilitar el sentido.
- source_word: τὴν ἀποστασίαν
  english_pob_choice: apostasy
  chosen_spanish: la apostasía
  alternatives_spanish:
  - la rebelión
  - la defección
  - el abandono de la fe
  lexicon: LSJ
  rationale: En este contexto macabeo la referencia es al abandono religioso forzado de la fidelidad pactal y de la práctica ancestral. 'Apostasía' preserva ese peso teológico mejor que una traducción política o explicativa.
- source_word: εἰς Μωδεείν
  english_pob_choice: to Modein
  chosen_spanish: a Modeín
  alternatives_spanish:
  - a Modein
  - a Modiín
  lexicon: LSJ
  rationale: Se mantiene la transliteración del topónimo. 'A' expresa el movimiento del griego εἰς. Se usa 'Modeín' como forma española legible y consistente.
theological_decisions:
- issue: Sentido de ἀποστασία en un contexto de persecución religiosa
  english_pob_reading: apostasy in the religious sense
  chosen_spanish_reading: apostasía en sentido religioso
  alternative_spanish_readings:
  - rebelión en sentido político
  - defección general
  rationale: El contexto inmediato trata de imponer abandono de la ley y de las prácticas del pueblo. Por eso conviene mantener 'apostasía' sin neutralizar su carga religiosa ni desplazarla hacia una lectura política.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete y concuerda con el audit trail inglés, sin necesidad de revisar lecturas textuales ni introducir notas de variante.
  spanish_consistency_notes:
  - Se preserva la secuencia narrativa con 'Y'.
  - '''Modeín'' mantiene la transliteración del nombre propio en forma natural para español.'
  - No se introduce 'Señor' ni otra sustitución devocional porque el versículo habla del rey humano, no del nombre divino.
