translation:
  language: es
  text: Bendeciré a Yahvé[a], que me aconseja; aun de noche mi ser interior me instruye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «mis riñones me instruyen». En la antropología hebrea, los riñones pueden simbolizar el centro más íntimo de la persona, incluida la conciencia y las emociones profundas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָרֵךְ
  english_pob_choice: I will bless
  chosen_spanish: Bendeciré
  alternatives_spanish:
  - alabaré
  - bendeciré
  lexicon: HALOT
  rationale: El piel de ברך suele expresar hablar bien de Dios, bendecirlo. En español, «bendeciré» conserva esa relación lexical y la forma volitiva/futura del imperfecto, mientras que «alabaré» sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, según la convención POB, en vez de sustituirlo por un título.
- source_word: יְעָצָנִי
  english_pob_choice: counsels me
  chosen_spanish: me aconseja
  alternatives_spanish:
  - me aconseja
  - me da consejo
  - me guía
  lexicon: HALOT
  rationale: יָעַץ expresa aconsejar, dar consejo. «Me aconseja» es el equivalente más directo y natural en español, sin diluir el sentido en un verbo más amplio como «guiar».
- source_word: אַף לֵילוֹת
  english_pob_choice: even at night
  chosen_spanish: aun de noche
  alternatives_spanish:
  - incluso de noche
  - también de noche
  - de noche
  lexicon: HALOT
  rationale: אַף aporta intensificación/addición; «aun» recoge bien ese matiz. La construcción adverbial «de noche» funciona de forma idiomática para el plural hebreo «noches».
- source_word: יִסְּרוּנִי
  english_pob_choice: instructs me
  chosen_spanish: me instruyen
  alternatives_spanish:
  - me instruye
  - me disciplinan
  - me corrigen
  lexicon: HALOT
  rationale: יסר puede significar instruir, disciplinar, amonestar o corregir. En este contexto reflexivo y sapiencial, «me instruyen» preserva el matiz formativo que eligió la POB en inglés, sin cargarlo de manera primaria con castigo.
- source_word: כִלְיוֹתַי
  english_pob_choice: my inner being
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mi ser interior
  - mis riñones
  - mi corazón
  lexicon: HALOT
  rationale: Literalmente es «mis riñones», pero en la antropología hebrea funciona como sede interior de conciencia y emociones profundas. «Mis entrañas» mantiene una metáfora corporal natural en español y conserva mejor la tensión lexical que una paráfrasis no corporal como «mi ser interior».
theological_decisions:
- issue: Metáfora antropológica de כִלְיוֹתַי
  english_pob_reading: Rendered functionally as 'my inner being' rather than literally 'my kidneys.'
  chosen_spanish_reading: Se vierte metafóricamente como «mis entrañas» en vez de literalizar «mis riñones».
  alternative_spanish_readings:
  - mis riñones
  - mi ser interior
  - mi mente
  rationale: La imagen hebrea apunta al centro de la vida interior, incluidas conciencia y afectos profundos. «Mis entrañas» es una metáfora comprensible en español bíblico y moderno, y evita reducir la antropología del verso a un órgano anatómico sin sentido para el lector actual.
  doctrine_reference: Translation philosophy §6; conservación de imágenes corporales cuando el español las entiende sin obscurecer el sentido
- issue: Valor de יִסְּרוּנִי en contexto sapiencial
  english_pob_reading: instructs me
  chosen_spanish_reading: «me instruyen» mantiene el carácter formativo e interior del verbo.
  alternative_spanish_readings:
  - me disciplinan
  - me corrigen
  - me amonestan
  rationale: El contexto no exige una idea primaria de castigo, sino de formación o enseñanza interior durante la noche. Traducirlo como «instruyen» preserva esa lectura positiva, sin negar que el verbo pueda abarcar disciplina en otros contextos.
  doctrine_reference: HALOT; contexto poético-devocional de Salmos 16:7
translation_notes:
  revision_awareness: 'Se siguió el criterio auditado de la POB inglesa: mantener Yahvé como nombre divino, traducir ברך con un verbo de bendición directa, conservar el matiz de consejo de יעץ, reflejar אַף con un intensificador natural en español, y preservar la metáfora antropológica de כִלְיוֹתַי mediante una imagen corporal comprensible. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el Tetragrámaton, coherente con el estándar del proyecto.
  - «Bendeciré» mantiene el paralelismo con la elección inglesa «I will bless» mejor que «alabaré».
  - «Mis entrañas» conserva la imaginería corporal hebrea con naturalidad en español; la nota aclara el literal original.
  - «Me instruyen» refleja la lectura positiva de יסר en este contexto, sin imponer «disciplinan» como sentido principal.
