id: 2CO.10.1
reference: '2 Corinthians 10:1'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ἐγὼ Παῦλος παρακαλῶ ὑμᾶς διὰ τῆς πραΰτητος καὶ ἐπιεικείας τοῦ Χριστοῦ, ὃς κατὰ πρόσωπον μὲν ταπεινὸς ἐν ὑμῖν, ἀπὼν δὲ θαρρῶ εἰς ὑμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/010/001.yaml
  text: Now I myself[a], Paul, appeal to you by the meekness and gentleness of Messiah—I who am humble face to face among you[c][b], but bold toward you when absent.
translation:
  language: ko
  text: 나 바울이 친히 메시아의 온유와 너그러우심으로 여러분에게 권면합니다—나는 여러분과 얼굴을 마주할 때는 비천하지만 떠나 있을 때에는 여러분을 향해 담대합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πραΰτης
  english_pob_choice: meekness
  chosen_korean: 온유
  lexicon: BDAG
  rationale: 산상수훈의 마카리즘과 호응하는 핵심 덕. 한국어 「온유」가 정착.
- source_word: ἐπιείκεια
  english_pob_choice: gentleness
  chosen_korean: 너그러우심
  lexicon: BDAG
  rationale: 엄격한 정의가 아니라 인간적 약점을 헤아리는 너그러움. 「너그러우심」이 자연스럽다.
  alternatives_korean:
  - 관용
  - 온화함
- source_word: ταπεινός
  english_pob_choice: humble
  chosen_korean: 비천한
  lexicon: BDAG
  rationale: 여기서는 적대자들이 바울을 깎아내리는 어조로 사용. 「비천한」이 그 부정적 평가를 그대로 전달한다.
  alternatives_korean:
  - 겸손한
  - 낮은
- source_word: θαρρῶ
  english_pob_choice: bold
  chosen_korean: 담대합니다
  lexicon: BDAG
  rationale: 현재 직설법. 한국어 「담대하다」가 표준.
