  text: καὶ εἶπεν πρὸς αὐτὸν Ἰουδείθ Καὶ τίς εἰμι ἐγὼ ἀντειποῦσα τῷ κυρίῳ μου; ὅτι πᾶν ὃ ἔσται ἐν τοῖς ὀφθαλμοῖς αὐτοῦ ἀρεστὸν σπεύσασα ποιήσω, καὶ ἔσται τοῦτό μοι ἀγαλλίαμα ἕως ἡμέρας θανάτου μου.
