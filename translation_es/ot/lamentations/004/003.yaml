base_translation:
  language: en
  yaml_path: translation/ot/lamentations/004/003.yaml
  text: Even jackals offer the breast[a]; they nurse their young. The daughter of my people has become cruel[b], like ostriches in the wilderness.
  footnotes:
  - marker: a
    text: Or 'sea monsters' or 'dragons' for תנין; here 'jackals' is preferred because the verse describes nursing their young, which fits a land animal comparison better in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'like owls in the wilderness'; the Hebrew ענים is traditionally understood as 'ostriches,' especially in light of Job 39:13–17.
    reason: lexical_alternative
