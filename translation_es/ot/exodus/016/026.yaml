translation:
  language: es
  text: Durante seis días lo recogerán, pero[a] el séptimo día, un sábado[b], no habrá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el séptimo día». La conjunción hebrea puede rendirse simplemente como «y», aunque aquí el contexto es contrastivo.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el séptimo día, sábado».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, no habrá maná en ese día.
    reason: cross_reference
lexical_decisions:
- source_word: שֵׁ֥שֶׁת יָמִ֖ים
  english_pob_choice: For six days
  chosen_spanish: Durante seis días
  alternatives_spanish:
  - Seis días
  - Por seis días
  lexicon: HALOT
  rationale: La expresión hebrea es un constructo temporal idiomático; en español, 'Durante seis días' comunica con naturalidad la duración de la instrucción sin añadir contenido ajeno.
- source_word: תִּלְקְטֻ֑הוּ
  english_pob_choice: you shall gather it
  chosen_spanish: lo recogerán
  alternatives_spanish:
  - lo gatherán
  - lo juntarán
  - lo recolectarán
  lexicon: HALOT
  rationale: El verbo לקט denota recoger, juntar o recolectar; 'recogerán' es idiomático en español y conserva la idea de reunir el maná. El sufijo de tercera persona singular se refleja con 'lo'.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: but on the seventh day
  chosen_spanish: pero en el séptimo día
  alternatives_spanish:
  - y en el séptimo día
  - mas en el séptimo día
  lexicon: HALOT
  rationale: La conjunción waw puede ser simplemente coordinante, pero aquí el contraste con los seis días previos es claro; 'pero' expresa ese valor adversativo sin forzarlo.
- source_word: שַׁבָּת
  english_pob_choice: a Sabbath
  chosen_spanish: un sábado
  alternatives_spanish:
  - un sábado de reposo
  - un sábado
  lexicon: HALOT
  rationale: Se preserva el sustantivo hebreo como término funcional en español. 'Un sábado' mantiene la apposición breve del hebreo ('el séptimo día, sábado') sin convertirlo en una explicación interpretativa como 'día de reposo'.
- source_word: לֹא יִהְיֶה בּֽ/וֹ
  english_pob_choice: there will be none
  chosen_spanish: no habrá[c]
  alternatives_spanish:
  - no habrá nada
  - no habrá en él
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'no יהיה בו', pero en contexto el referente implícito es el maná para ese día. 'No habrá' mantiene la brevedad del hebreo y evita añadir un objeto explícito que el texto aquí no nombra.
theological_decisions:
- issue: Identificación del séptimo día como Sabbath en un contexto pre-sinaítico
  english_pob_reading: a Sabbath
  chosen_spanish_reading: un sábado
  alternative_spanish_readings:
  - el sábado
  - un día de reposo
  rationale: El hebreo carece de artículo con שַׁבָּת y funciona en aposición con 'el séptimo día'. 'Un sábado' conserva la forma nominal y no sobrerresuelve la institución con una paráfrasis más desarrollada.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve lexical/theological tension rather than flatten it.'
- issue: Referencia implícita a la ausencia de maná
  english_pob_reading: there will be none
  chosen_spanish_reading: no habrá
  alternative_spanish_readings:
  - no habrá maná
  - no habrá nada
  rationale: 'La POB en inglés retuvo la elipsis y explicó el sentido en nota. En español se conserva la misma cautela: la ausencia se entiende por el contexto, sin insertar ''maná'' en el cuerpo del versículo.'
  doctrine_reference: Contextual implication from Exodus 16; maintain source-grounded restraint.
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'on it' porque no estaba justificado por el hebreo; por eso la versión española también evita añadir un complemento equivalente. Se conserva la elipsis del original y se aclara el sentido solo en nota.
  spanish_consistency_notes:
  - Se usa 'sábado' para שַׁבָּת, manteniendo el término breve y reconocible sin reemplazarlo por 'día de reposo'.
  - Se prefirió 'durante' para la duración temporal, en lugar de una construcción más literal pero menos natural.
  - La nota c explicita el referente implícito del contexto, siguiendo la cautela de la POB en inglés.
