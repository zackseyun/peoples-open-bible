translation:
  language: es
  text: Así que el mayordomo iba retirando la comida escogida[a] que les correspondía y el vino que debían beber, y les iba dando verduras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la porción que les correspondía de los manjares del rey». El hebreo פַּתְבָּגָם se refiere a la comida real especialmente asignada.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente «legumbres» o «semillas». El hebreo זֵרְעֹנִים se refiere a alimentos de plantas o semillas, probablemente verduras y legumbres.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלְצַר
  english_pob_choice: the steward
  chosen_spanish: el mayordomo
  alternatives_spanish:
  - el administrador
  - el encargado
  - el servidor
  lexicon: HALOT
  rationale: El término designa al funcionario encargado de las provisiones de los jóvenes; en español, «mayordomo» comunica bien la idea de quien administra y distribuye comida y bebida sin sonar demasiado técnico.
- source_word: נֹשֵׂא
  english_pob_choice: kept taking away
  chosen_spanish: iba retirando
  alternatives_spanish:
  - seguía quitando
  - retiraba
  - iba quitándoles
  lexicon: HALOT
  rationale: La forma participial con valor narrativo sugiere acción continua o repetida. «Iba retirando» conserva ese aspecto progresivo en un español natural.
- source_word: פַּתְבָּגָם
  english_pob_choice: their choice food
  chosen_spanish: su comida escogida
  alternatives_spanish:
  - su porción de los manjares del rey
  - sus delicadezas reales
  - su comida selecta
  lexicon: HALOT
  rationale: El hebreo se refiere a la ración asignada de comida real especial. «Comida escogida» preserva la idea de alimento selecto sin sobrecargar la frase, manteniendo la tensión entre ración asignada y delicadeza real.
- source_word: יֵין מִשְׁתֵּיהֶם
  english_pob_choice: the wine they were to drink
  chosen_spanish: el vino de su bebida
  alternatives_spanish:
  - el vino que debían beber
  - su vino para beber
  - el vino de su banquete
  lexicon: HALOT
  rationale: La construcción hebrea apunta al vino destinado a su bebida. «El vino de su bebida» refleja la relación posesiva/funcional del original, aunque es algo más literal que la alternativa dinámica; se conserva por fidelidad a la estructura semítica.
- source_word: וְנֹתֵן
  english_pob_choice: and kept giving
  chosen_spanish: y les iba dando
  alternatives_spanish:
  - y seguía dándoles
  - y daba
  - y les daba
  lexicon: HALOT
  rationale: Como con נֹשֵׂא, el participio indica acción continua o repetida. «Iba dando» preserva esa iteración de manera idiomática.
- source_word: זֵרְעֹנִים
  english_pob_choice: vegetables
  chosen_spanish: verduras
  alternatives_spanish:
  - legumbres
  - alimentos vegetales
  - pulses
  lexicon: HALOT
  rationale: El término denota comida procedente de semillas o plantas, probablemente verduras y legumbres. «Verduras» es la opción más clara y natural en español contemporáneo; «legumbres» estrecha demasiado el campo semántico.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y mantenido sin cambios; la versión española sigue de cerca sus decisiones léxicas y su lectura aspectual del hebreo, con adaptación idiomática a un español bíblico claro.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el verso no contiene el nombre divino ni κύριος.
  - Se mantuvo una distinción funcional entre la comida asignada y el vino destinado a beberse.
  - Se conservó el valor iterativo de los participios hebreos mediante perífrasis progresivas en español.
