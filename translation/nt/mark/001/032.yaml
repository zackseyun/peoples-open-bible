id: MRK.1.32
reference: Mark 1:32
source:
  edition: SBLGNT
  text: Ὀψίας δὲ γενομένης, ὅτε ⸀ἔδυ ὁ ἥλιος, ἔφερον πρὸς αὐτὸν πάντας τοὺς κακῶς ἔχοντας καὶ τοὺς δαιμονιζομένους·
translation:
  text: When evening came[a], when the sun had set[d][c][b], they brought to him all who were sick and those who were demon-possessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the sun set.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who were ill.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the demonized' or 'those oppressed by demons.'
    reason: lexical_alternative
  - marker: d
    text: Or 'all who were sick and those who were demon-possessed'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ὀψίας δὲ γενομένης
  chosen: When evening came
  alternatives:
  - When it became evening
  - At evening
  lexicon: BDAG
  rationale: Genitive absolute marking a temporal transition. 'When evening came' is natural modern English while preserving the temporal force.
- source_word: ὅτε ἔδυ ὁ ἥλιος
  chosen: after the sun had set
  alternatives:
  - when the sun set
  - once the sun had set
  lexicon: BDAG
  rationale: Although ὅτε can be rendered 'when,' in context it specifies the point after sunset, explaining why people waited until then. The pluperfect-style English 'had set' captures the sequence smoothly.
- source_word: ἔφερον
  chosen: they were bringing
  alternatives:
  - they brought
  - people were bringing
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing or repeated action, better reflected by 'were bringing' than simple past 'brought.' The subject is indefinite from context, so English leaves it implicit as 'they.'
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - before him
  - to Jesus
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward a person. 'To him' is the most direct rendering; 'Jesus' is not repeated in the Greek.
- source_word: πάντας
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: Retains the comprehensive force of the accusative plural with the following substantival participles.
- source_word: τοὺς κακῶς ἔχοντας
  chosen: who were sick
  alternatives:
  - who were ill
  - who were unwell
  - those having ailments
  lexicon: BDAG
  rationale: Idiomatic expression literally meaning 'those who were badly/unwell.' 'Who were sick' is clear, natural, and faithful to the sense without wooden literalism.
- source_word: τοὺς δαιμονιζομένους
  chosen: those who were demon-possessed
  alternatives:
  - the demonized
  - those oppressed by demons
  lexicon: BDAG
  rationale: The participle denotes persons under the power of demons. 'Demon-possessed' is the standard clear English rendering; 'demonized' is more literal in form but less idiomatic, while 'oppressed by demons' may understate the term's force.
