translation:
  language: es
  text: Sus crías se fortalecen; crecen en el campo abierto[a]; salen y no regresan a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la vida silvestre» o «en campo abierto».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְלְמוּ
  english_pob_choice: become strong
  chosen_spanish: se fortalecen
  alternatives_spanish:
  - crecen sanos
  - recobran fuerzas
  - se ponen robustos
  lexicon: HALOT
  rationale: El verbo en este contexto describe que las crías prosperan físicamente. «Se fortalecen» conserva la idea de vigor y madurez sin perder naturalidad en español.
- source_word: בְּנֵיהֶם
  english_pob_choice: their young ones
  chosen_spanish: sus crías
  alternatives_spanish:
  - sus hijos
  - su descendencia
  - sus pequeños
  lexicon: HALOT
  rationale: En el contexto de animales, «sus crías» comunica mejor el referente que «sus hijos» y evita una lectura exclusivamente humana o masculina.
- source_word: יִרְבּוּ
  english_pob_choice: grow up
  chosen_spanish: crecen
  alternatives_spanish:
  - se multiplican
  - aumentan
  - van creciendo
  lexicon: HALOT
  rationale: Aquí el hebreo no solo sugiere cantidad, sino desarrollo y florecimiento en el entorno abierto. «Crecen» mantiene esa progresión de manera natural; el matiz de multiplicación queda disponible en el contexto sin imponerse como único sentido.
- source_word: בַּבָּר
  english_pob_choice: in the open field
  chosen_spanish: en el campo abierto
  alternatives_spanish:
  - en la naturaleza
  - en el campo
  - en la vida silvestre
  lexicon: HALOT
  rationale: «Campo abierto» conserva la imagen de terreno no cultivado. «En la naturaleza» o «en la vida silvestre» serían más interpretativos; «campo abierto» es claro y fiel.
- source_word: יָצְאוּ
  english_pob_choice: they go out
  chosen_spanish: salen
  alternatives_spanish:
  - salen fuera
  - se van
  - van al exterior
  lexicon: HALOT
  rationale: Es una traducción directa y natural de יצא en este paralelo poético, sin añadir matices no expresados por el hebreo.
- source_word: וְלֹא שָׁבוּ לָמוֹ
  english_pob_choice: and do not return to them
  chosen_spanish: y no regresan a ellas
  alternatives_spanish:
  - y no vuelven a ellas
  - y no retornan a ellas
  - y no vuelven a sus padres
  lexicon: HALOT
  rationale: El complemento pronominal hebreo apunta a los animales parentales; en español, el plural femenino «a ellas» refleja «las» crías/las madres solo si el antecedente inmediato se entiende como los progenitores del rebaño o manada. Se conserva la tensión referencial de forma breve y poética, sin sobreespecificar.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del texto hebreo y el trazado auditado en inglés: vigor físico de las crías, crecimiento en terreno no cultivado y salida sin retorno al grupo parental. No se introducen cambios doctrinales ni amplificaciones.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino ni un sustituto reverencial.
  - «Crías» es más preciso que «hijos» en este marco zoológico.
  - Se mantiene una cadencia breve y paralela acorde con la poesía hebrea.
  - El pronombre final se deja deliberadamente general en femenino plural («a ellas») para no forzar una identificación que el hebreo no explicita con total claridad.
