translation:
  language: es
  text: ¡Mira, eres hermosa, mi amada; mira, eres hermosa! Tus ojos son palomas detrás de tu velo[a]. Tu cabello es como un rebaño de cabras que descienden desde el monte de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a través de tu velo». La expresión hebrea sugiere una visión parcial desde detrás de un cubrimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּךְ
  english_pob_choice: Look, you are
  chosen_spanish: ¡Mira! Eres
  alternatives_spanish:
  - He aquí, eres
  - Mira, eres
  lexicon: HALOT
  rationale: הִנֵּה con sufijo de 2ª femenina singular es una partícula deíctica y exclamativa. '¡Mira!' conserva la viveza poética y la fuerza de llamada; el verbo 'eres' mantiene la lectura directa sin calco pesado.
- source_word: יָפָה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - linda
  lexicon: HALOT
  rationale: Adjetivo simple de belleza física. 'Hermosa' es natural en español moderno, digna y fiel al valor básico del hebreo.
- source_word: רַעְיָתִי
  english_pob_choice: my darling
  chosen_spanish: mi amada
  alternatives_spanish:
  - mi querida
  - mi amor
  - mi compañera
  lexicon: HALOT
  rationale: El término de trato es íntimo y afectivo. 'Mi amada' conserva el cariño y la dignidad poética; evita el matiz demasiado coloquial de 'mi cariño' o 'mi amor' en ciertos contextos.
- source_word: עֵינַיִךְ יוֹנִים
  english_pob_choice: Your eyes are doves
  chosen_spanish: Tus ojos son palomas
  alternatives_spanish:
  - Tus ojos son como palomas
  - Tus ojos son palomas de paz
  lexicon: HALOT
  rationale: El hebreo es una metáfora nominal sin verbo. En español se suplió 'son' para mantener la imagen directa. 'Palomas' preserva la metáfora aviar sin explicarla más de lo que el texto permite.
- source_word: מִבַּעַד
  english_pob_choice: behind
  chosen_spanish: detrás de
  alternatives_spanish:
  - a través de
  - desde detrás de
  lexicon: HALOT
  rationale: La preposición puede sugerir visión parcial a través o desde detrás de un velo. 'Detrás de' es la opción más natural en español; la nota conserva la alternativa 'a través de' donde el contexto lo favorece.
- source_word: לְצַמָּתֵךְ
  english_pob_choice: your veil
  chosen_spanish: tu velo
  alternatives_spanish:
  - tu trenza
  - tu cabellera
  lexicon: HALOT
  rationale: En este contexto la referencia probable es un velo o cobertura femenina. 'Velo' encaja con la imagen de ojos vistos parcialmente y evita adelantar la posibilidad menos probable de 'trenza' o 'cabellera'.
- source_word: שַׂעְרֵךְ
  english_pob_choice: Your hair
  chosen_spanish: Tu cabello
  alternatives_spanish:
  - Tu pelo
  lexicon: HALOT
  rationale: Término sencillo para la cabellera. 'Cabello' ofrece un registro más digno y poético que 'pelo' en este verso.
- source_word: כְּעֵדֶר הָעִזִּים
  english_pob_choice: like a flock of goats
  chosen_spanish: como un rebaño de cabras
  alternatives_spanish:
  - como un hato de cabras
  - como un rebaño de chivas
  lexicon: HALOT
  rationale: עֵדֶר es colectivo pastoril; 'rebaño' es el equivalente natural. 'Cabras' mantiene la especie explícita del hebreo y evita la suavización de la imagen.
- source_word: שֶׁגָּלְשׁוּ
  english_pob_choice: streaming down
  chosen_spanish: que descienden
  alternatives_spanish:
  - que bajan
  - que se deslizan
  lexicon: HALOT
  rationale: El verbo describe un movimiento descendente y fluido. 'Descienden' es claro y digno en español; conserva el dinamismo sin forzar un giro excesivamente interpretativo.
- source_word: מֵהַר גִּלְעָד
  english_pob_choice: from Mount Gilead
  chosen_spanish: desde el monte de Galaad
  alternatives_spanish:
  - del monte de Galaad
  - desde el monte Galaad
  lexicon: HALOT
  rationale: Se mantiene el topónimo bíblico en forma española tradicional 'Galaad', y 'monte' reproduce la imagen geográfica sin sobreespecificar la topografía.
theological_decisions:
- issue: Tratamiento del nombre divino y ausencia de sustitución litúrgica
  english_pob_reading: No aparece el Tetragrámaton ni una cita directa del nombre divino en este verso.
  chosen_spanish_reading: No se introduce ningún equivalente litúrgico; el verso se traduce solo con sus imágenes poéticas.
  alternative_spanish_readings:
  - No aplica
  rationale: No hay una decisión teológica especial sobre el nombre divino en este pasaje. Se evita cualquier inserción ajena al texto.
  doctrine_reference: Ninguna requerida para este versículo
- issue: Valor metafórico de los ojos y el cabello
  english_pob_reading: The English preserves direct metaphor without expanding it into explicit symbolism.
  chosen_spanish_reading: 'Se conserva la metáfora directa: ''Tus ojos son palomas'' y ''Tu cabello es como un rebaño de cabras''.'
  alternative_spanish_readings:
  - Tus ojos parecen palomas
  - Tu cabello parece un rebaño de cabras
  rationale: El hebreo presenta imágenes poéticas, no explicaciones simbólicas. El español mantiene esa tensión imagética sin moralizar ni alegorizar.
  doctrine_reference: Poética bíblica; no una afirmación doctrinal
translation_notes:
  revision_awareness: 'El borrador inglés más reciente mantuvo la estructura del verso y ajustó solo el tratamiento de רַעְיָתִי en función del matiz afectivo. La versión española sigue ese estado del texto: conserva la doble exclamación, la metáfora directa de los ojos y el símil del cabello, y refleja el mismo equilibrio entre naturalidad moderna y fidelidad poética.'
  spanish_consistency_notes:
  - Se usa 'Galaad' para el topónimo bíblico con forma española estable.
  - Se usa 'cabello' en lugar de 'pelo' por registro poético.
  - Se mantiene 'velo' como elección principal, con nota que preserva la alternativa 'a través de'.
  - No se introduce 'Mesías', 'Cristo' ni vocabulario doctrinal ajeno al pasaje.
  - La puntuación reproduce el paralelismo y la repetición enfática del hebreo.
