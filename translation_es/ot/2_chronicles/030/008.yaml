base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/008.yaml
  text: Now do not stiffen your neck as your fathers did[a]. Give your hand to Yahweh, and come to his sanctuary, which he has consecrated forever, and serve Yahweh your God[b], so that his burning anger may turn away from you.
  footnotes:
  - marker: a
    text: Or 'Yield yourselves to the LORD' or 'Submit to the LORD.' The Hebrew literally reads 'give hand to the LORD,' an idiom of submission or pledge.
    reason: lexical_alternative
  - marker: b
    text: Or 'and his burning anger will turn away from you.'
    reason: alternative_reading
