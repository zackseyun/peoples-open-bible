revisions:
- from: Por tanto, el hombre dejará a su padre y a su madre, y se unirá[a] a su esposa, y serán una sola carne[b].
  to: Por tanto, un hombre dejará a su padre y a su madre, y se unirá[a] a su esposa, y llegarán a ser una sola carne[b].
  rationale: Se ajusta 'el hombre' a 'un hombre' para un español más natural en formulación proverbial; se cambia 'serán' por 'llegarán a ser' para reflejar mejor la fuerza resultativa de וְהָיוּ según la auditoría inglesa. Se conserva 'se unirá' con su nota léxica, ya que sigue siendo una opción española clara y digna, mientras la nota preserva la idea de adhesión fuerte de דבק.
  reviewer_model: gpt-5.4
