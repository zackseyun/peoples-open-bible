translation:
  language: es
  text: 'Y la tierra de Egipto llegará a ser una desolación y una ruina[a], y sabrán que yo soy Yahvé, porque dijo: «El Nilo[a] es mío, y yo lo hice».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el río es mío»; en el contexto de Egipto, «el río» se refiere específicamente al Nilo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will become
  chosen_spanish: llegará a ser
  alternatives_spanish:
  - será
  - se convertirá en
  lexicon: HALOT
  rationale: En el hebreo profético, la forma verbal expresa un futuro de estado resultante. «Llegará a ser» conserva la idea de transición hacia una condición nueva sin sonar demasiado mecánico en español.
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Se preserva el sentido concreto de אֶרֶץ como territorio o tierra, no solo el nombre del país en abstracto.
- source_word: לִשְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un desierto
  lexicon: HALOT
  rationale: El sustantivo español mantiene el valor de estado devastado que tiene שְׁמָמָה.
- source_word: וְחָרְבָּה
  english_pob_choice: and a waste
  chosen_spanish: y una ruina
  alternatives_spanish:
  - y un desperdicio
  - y ruinas
  lexicon: HALOT
  rationale: «Ruina» comunica devastación y conserva el paralelismo intensivo con שְׁמָמָה sin imponer una imagen demasiado específica. En español, «una ruina» funciona como equivalente natural de un estado arrasado.
- source_word: וְיָדְעוּ
  english_pob_choice: and they will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - y reconocerán
  lexicon: HALOT
  rationale: Se mantiene la fórmula de reconocimiento profético. «Sabrán» es la forma más natural y directa en español para este uso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para el Nombre divino. En español, «Yahvé» preserva la referencia personal del Tetragrámaton sin la convención de ocultamiento litúrgico.
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Introduce claramente la causa del juicio. «Porque» es la equivalencia más natural y transparente.
- source_word: יְאֹר
  english_pob_choice: The Nile
  chosen_spanish: El río
  alternatives_spanish:
  - El Nilo
  - el río Nilo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el río». Dado el contexto egipcio, el inglés POB aclara que se trata del Nilo; en español se conserva la forma literal en el texto principal, dejando la precisión contextual en nota.
- source_word: לִי
  english_pob_choice: is mine
  chosen_spanish: es mío
  alternatives_spanish:
  - me pertenece
  - es para mí
  lexicon: HALOT
  rationale: Expresa la pretensión posesiva en forma breve y directa, manteniendo el tono de arrogancia del hablante.
- source_word: וַאֲנִי עָשִׂיתִי
  english_pob_choice: and I made it
  chosen_spanish: y yo lo hice
  alternatives_spanish:
  - y yo lo hice yo mismo
  - y yo lo fabriqué
  lexicon: HALOT
  rationale: «Hacer» traduce con fidelidad עשה sin introducir la carga doctrinal de «crear». El pronombre explícito conserva el énfasis del hebreo.
theological_decisions:
- issue: Nombre divino en la cláusula final de reconocimiento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio divino en español para conservar la fuerza covenantal y la transparencia textual del proyecto POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Referencia de יְאֹר en contexto egipcio
  english_pob_reading: The Nile
  chosen_spanish_reading: El río
  alternative_spanish_readings:
  - El Nilo
  - el río Nilo
  rationale: Aunque el referente contextual es el Nilo, el hebreo emplea un término genérico. Se preserva esa literalidad en el texto principal y se explicita la identificación contextual en nota, evitando borrar la tensión entre forma y referente.
  doctrine_reference: 'POB lexical principle: preserve source form when the context can bear it; clarify contextual referents in footnotes'
translation_notes:
  revision_awareness: El audit trail en inglés no requirió cambios de revisión; la versión española sigue esa lectura estable y conserva la única nota léxica relevante sobre יְאֹר.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la norma del proyecto para יְהוָה.
  - 'Se mantuvo el paralelismo de juicio con sustantivos: «una desolación y una ruina».'
  - Se preservó la literalidad de «el río» en el cuerpo del texto y se aclaró su referente egipcio en nota.
  - Se evitó «Cristo», «SEÑOR» y «Jehová» por coherencia con la terminología editorial indicada.
