translation:
  language: es
  text: Entonces el Espíritu de Yahvé vino sobre Jefté[a], y él pasó por Galaad y por Manasés. Pasó por Mispá de Galaad, y desde Mispá de Galaad siguió hacia los amonitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cruzó hacia los amonitas». El verbo hebreo puede denotar pasar por, cruzar o avanzar, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּחַ יְהוָ֔ה
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el aliento de Yahvé
  lexicon: HALOT
  rationale: En este contexto narrativo, רוּחַ no es viento sino el Espíritu divino que capacita a Jefté. Se conserva la mayúscula en «Espíritu» por tratarse del Espíritu de Dios, y «Yahvé» sigue el criterio del proyecto para יְהוָה.
- source_word: וַ/תְּהִ֤י עַל
  english_pob_choice: came upon
  chosen_spanish: vino sobre
  alternatives_spanish:
  - estaba sobre
  - reposó sobre
  lexicon: HALOT
  rationale: La construcción expresa llegada/impulso de empowerment divino. «Vino sobre» mantiene el valor eventivo y suena natural en español sin perder la fuerza idiomática.
- source_word: יִפְתָּח
  english_pob_choice: Jephthah
  chosen_spanish: Jefté
  alternatives_spanish:
  - Yefté
  - Jeftah
  lexicon: transliteration conventionalizada
  rationale: Se usa la forma castellana habitual del nombre propio bíblico, suficiente para identificación pública y lectura eclesial.
- source_word: וַ/יַּעֲבֹ֥ר אֶת הַ/גִּלְעָ֖ד וְ/אֶת מְנַשֶּׁ֑ה
  english_pob_choice: he passed through Gilead and Manasseh
  chosen_spanish: pasó por Galaad y por Manasés
  alternatives_spanish:
  - cruzó Galaad y Manasés
  - atravesó Galaad y Manasés
  lexicon: HALOT
  rationale: עבר con nombres territoriales indica desplazamiento a través de regiones. «Pasó por» conserva el movimiento sin forzar un sentido militar explícito en esta primera cláusula.
- source_word: מִצְפֵּ֣ה גִלְעָ֔ד
  english_pob_choice: Mizpah of Gilead
  chosen_spanish: Mispá de Galaad
  alternatives_spanish:
  - Mizpá de Galaad
  - la atalaya de Galaad
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre de lugar. «Mispá/Mizpá» son variantes españolas; se elige «Mispá» para uniformidad fonética y se evita traducirlo como «atalaya» porque aquí funciona como topónimo fijo.
- source_word: וּ/מִ/מִּצְפֵּ֣ה גִלְעָ֔ד עָבַ֖ר בְּנֵ֥י עַמּֽוֹן
  english_pob_choice: from Mizpah of Gilead he passed on to the Ammonites
  chosen_spanish: desde Mispá de Galaad pasó a los amonitas
  alternatives_spanish:
  - desde Mispá de Galaad cruzó hacia los amonitas
  - desde Mispá de Galaad avanzó contra los amonitas
  lexicon: HALOT
  rationale: La partícula de origen y el verbo permiten varias relaciones de movimiento. «Pasó a» conserva la dirección hacia el grupo enemigo sin añadir agresión no explícita en la forma verbal; «amonitas» mantiene el nombre gentilicio colectivo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo nombra directamente al Dios del pacto con el Tetragrámaton. El proyecto pide «Yahvé» en español, por lo que se evita la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de la acción del Espíritu sobre Jefté
  english_pob_reading: The Spirit of Yahweh came upon Jephthah for empowerment.
  chosen_spanish_reading: El Espíritu de Yahvé vino sobre Jefté para capacitarlo.
  alternative_spanish_readings:
  - El Espíritu de Yahvé estaba sobre Jefté.
  - El Espíritu de Yahvé reposó sobre Jefté.
  rationale: En Jueces, esta fórmula marca empoderamiento para una acción específica. «Vino sobre» preserva el impulso narrativo sin convertirlo en una descripción estática ni en una explicación que exceda el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente inglés: no se requieren cambios adicionales. La redacción española mantiene la misma lectura de empowerment del Espíritu, el nombre divino Yahvé y la ambigüedad controlada del verbo עבר sin ampliarla.'
  spanish_consistency_notes:
  - Se mantienen «Yahvé» y «Espíritu» con mayúscula en sentido divino.
  - Se usa «Galaad» y «Manasés» como topónimos bíblicos en forma castellana tradicional.
  - Se conserva la alternancia de movimiento con «pasó por / desde ... pasó a» para reflejar el hebreo sin sobrerinterpretar la acción.
  - La nota textual queda anclada en el verbo final porque allí está la principal alternativa de sentido del original.
