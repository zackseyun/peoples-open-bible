    issue: Las notas al pie están mal ancladas y una nota explica la frase equivocada.
    rationale: La nota c en inglés corresponde al verbo final 'they dart about / race back and forth', pero en el borrador español está puesta sobre 'antorchas'. Eso rompe la trazabilidad de la decisión léxica y puede confundir al lector.
  - severity: medium
    issue: Se añadió una nota d sobre 'relámpagos' vs. 'rayos' sin necesidad suficiente.
    rationale: El original no presenta aquí una ambigüedad destacada que exija nota en español, y la auditoría inglesa no conserva tal alternativa. La nota desplaza la atención de una variante más importante, la del verbo final.
  - severity: medium
    issue: '''Resuenan con estrépito'' atenúa el valor onomatopéyico y dinámico de יִשְׁתַּקְשְׁקוּן.'
    rationale: El verbo raro sugiere sacudida ruidosa, traqueteo o tableteo; 'traquetean' conserva mejor ese efecto sonoro y cinético en español.
