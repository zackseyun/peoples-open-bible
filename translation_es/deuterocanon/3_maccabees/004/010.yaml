review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: el entablado superior fue dispuesto con el propósito de privarlos de visión y someterlos a un trato como el de conspiradores durante toda la travesía. Sin embargo, la nota [a] no preserva la alternativa documentada en la auditoría inglesa: allí la alternativa afecta la cláusula final (ἀγωγὴν ἐπιβόλων... κατάπλῳ), no καθύπερθε. Además, «de arriba» suena algo coloquial; «de encima» o «superior» sería más natural y preciso en registro bíblico.'
  spanish_quality_summary: 'El español es claro y legible, pero requiere un ajuste menor de naturalidad y de aparato crítico. «Entablado denso de arriba» resulta menos idiomático que «entablado denso de encima» o «entablado superior». El resto del verso funciona bien: «con los ojos oscurecidos por todos lados» y «un trato propio de conspiradores» son fieles y comprensibles.'
  glossary_alignment: 'No hay términos teológicos de glosario mayor implicados. Las decisiones léxicas principales son adecuadas: «entablado denso» para πυκνῷ σανιδώματι, «dispuesto» para διακειμένῳ, «conspiradores» para ἐπιβόλων, y «travesía» para κατάπλους. La excepción principal es la nota al pie, que debe alinearse con la alternativa léxica documentada en inglés.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada y redactada sobre el término equivocado.
    rationale: 'La auditoría inglesa conserva una alternativa para ἀγωγὴν ἐπιβόλων ἐν παντὶ τῷ κατάπλῳ (''conducción/traslado como la de conspiradores durante toda la travesía''), no para καθύπερθε (''above''). La nota española actual «También puede entenderse: “colocado por encima”» no corresponde al lugar significativo de variación.'
  - severity: low
    issue: «de arriba» suena algo coloquial y menos natural en este registro.
    rationale: Aunque comunica la idea espacial de καθύπερθε, en español bíblico claro y digno suena mejor «de encima» o «superior». Esto mejora la fluidez sin alterar el sentido.
  revised_spanish_text: y con el entablado denso de encima dispuesto de modo que, con los ojos oscurecidos por todos lados, recibieran un trato propio de conspiradores[a] durante toda la travesía.
  revised_footnotes:
