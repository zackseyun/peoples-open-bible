translation:
  language: es
  text: Y su ofrenda fue un plato[a] de plata, con un peso de ciento treinta siclos; un cuenco[b] de plata de setenta siclos, según el siclo del santuario; ambos estaban llenos de flor de harina mezclada con aceite, para ofrenda de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuente» para קַעֲרָה, un recipiente poco profundo.
    reason: lexical_alternative
  - marker: b
    text: O «vasija» para מִזְרָק, un recipiente ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרְבָּנוֹ
  english_pob_choice: And his offering was
  chosen_spanish: Y su ofrenda fue
  alternatives_spanish:
  - Y su regalo fue
  - Entonces su ofrenda fue
  lexicon: HALOT
  rationale: קָרְבָּן es un término cultual para una ofrenda presentada a Dios. «Ofrenda» conserva ese valor ritual y sigue de cerca el planteamiento del inglés auditado sin hacerlo mecánico.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: un plato de plata
  alternatives_spanish:
  - un cuenco de plata
  - un plato hondo de plata
  lexicon: HALOT
  rationale: קַעֲרָה designa un recipiente poco profundo. En español, «plato» comunica bien la forma general y la ligereza del objeto; «cuenco» queda como alternativa plausible por la ambigüedad del vaso, pero sugiere más hondura.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: de peso de ciento treinta siclos
  alternatives_spanish:
  - con un peso de ciento treinta siclos
  - pesaba ciento treinta siclos
  lexicon: HALOT
  rationale: La sintaxis hebrea pone primero el objeto y luego su peso. «De peso de» conserva esa relación nominal y mantiene el tono inventarial; «siclos» es la forma española establecida para la unidad.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver bowl
  chosen_spanish: un cuenco de plata
  alternatives_spanish:
  - un tazón de plata
  - una vasija de plata
  lexicon: HALOT
  rationale: מִזְרָק es un recipiente ritual; el inglés eligió «bowl» por claridad y no importó aquí una función más técnica. «Cuenco» ofrece una equivalencia natural en español y respeta mejor la idea de recipiente que «plato».
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - con un peso de setenta siclos
  lexicon: HALOT
  rationale: La frase continúa la especificación del peso del segundo recipiente. «De setenta siclos» mantiene la economía del original y del inglés auditado.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el patrón del siclo sagrado
  lexicon: HALOT
  rationale: La expresión fija un estándar de medida sacra. «Siclo del santuario» preserva la referencia cultual sin sustituirla por una paráfrasis explicativa.
- source_word: שְׁנֵיהֶם מְלֵאִים
  english_pob_choice: both of them were full
  chosen_spanish: ambos estaban llenos
  alternatives_spanish:
  - los dos estaban llenos
  - ambos iban llenos
  lexicon: HALOT
  rationale: El hebreo dual enfatiza los dos recipientes. «Ambos» preserva ese énfasis de forma natural en español.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es la equivalencia tradicional y precisa en español para סֹלֶת, conservando el carácter de harina muy refinada usada en ofrendas.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - batida con aceite
  lexicon: HALOT
  rationale: El participio pasivo expresa que la harina fue mezclada con aceite. «Amasada con aceite» mantiene una imagen natural en español y refleja bien la preparación de la ofrenda sin perder el sentido de mezcla.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para ofrenda vegetal
  alternatives_spanish:
  - para ofrenda de grano
  - para oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal se refiere a la ofrenda de cereal/grano. «Ofrenda vegetal» sigue una terminología bíblica usada en español para este tipo de sacrificio y evita reducirlo a una simple ofrenda genérica.
theological_decisions:
- issue: Nombre y categoría de la ofrenda cultual
  english_pob_reading: his offering ... for a grain offering
  chosen_spanish_reading: su ofrenda ... para ofrenda vegetal
  alternative_spanish_readings:
  - su don ... para ofrenda vegetal
  - su ofrenda ... para ofrenda de grano
  rationale: 'No hay una tensión doctrinal especial, pero sí una decisión terminológica: conservar el carácter técnico cultual de קָרְבָּן y מִנְחָה. «Ofrenda vegetal» mantiene la categoría sacrificial tradicional en español y no la diluye en un sentido meramente devocional.'
  doctrine_reference: Levítico 2; Números 7
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés, sin cambios relevantes frente al último pase revisado: se mantuvieron las dos piezas de vajilla ritual, sus pesos y la identificación cultual de la ofrenda. La principal decisión en español fue resolver la primera vasija como «plato» y la segunda como «cuenco», para conservar la distinción de los dos recipientes y el rango semántico de קַעֲרָה y מִזְרָק.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en el proyecto cuando corresponde, pero este versículo no contiene el nombre divino.
  - Se mantuvo «siclo» como unidad monetario-pesada cultual, coherente con otros pasajes del corpus.
  - «Ofrenda vegetal» se emplea aquí como término cultual para מִנְחָה, consistente con el estilo bíblico español del proyecto.
