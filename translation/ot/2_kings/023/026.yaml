theological_decisions:
- issue: Rendering anthropopathic anger language for God
  chosen_reading: Retain the Hebrew imagery of 'burning anger' rather than softening to an abstract term like 'displeasure' or over-systematizing as 'wrath.'
  alternative_readings:
  - the LORD did not relent from his great wrath
  - the LORD did not turn from his fierce anger
  rationale: The verse explicitly uses embodied anger idioms (חֲרוֹן אַף; חָרָה אַפּוֹ). Preserving this language respects the source text and does not import a doctrinal explanation beyond the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Divine name rendering
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms table for יְהוָה YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
