translation:
  language: es
  text: He visto la tarea que Dios ha dado a los hijos del hombre para ocuparse[a] de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para ser afligidos por ella» o «para laborar en ella». La expresión hebrea es difícil y puede destacar ya sea el estar ocupados con la tarea o el verse cargados por ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: El perfecto hebreo expresa observación ya realizada con vigencia para la reflexión del Qohelet. En español, el perfecto compuesto («he visto») conserva ese matiz de experiencia observada con relevancia actual mejor que un pretérito simple aislado.
- source_word: הָעִנְיָן
  english_pob_choice: the task
  chosen_spanish: la tarea
  alternatives_spanish:
  - el asunto
  - la ocupación
  - el trabajo
  lexicon: HALOT
  rationale: עִנְיָן en Eclesiastés suele señalar algo asignado, una ocupación o cometido. «Tarea» es natural en español y mantiene el valor de algo encomendado sin volverlo demasiado abstracto.
- source_word: אֲשֶׁר נָתַן
  english_pob_choice: that ... has given
  chosen_spanish: que ... ha dado
  alternatives_spanish:
  - que ... dio
  lexicon: HALOT
  rationale: La relativa introduce el contenido de lo visto. El presente perfecto en español refleja bien el efecto duradero de la acción divina y sigue de cerca el valor del hebreo en este contexto reflexivo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: La referencia es al Dios único en Qohelet; «Dios» es la equivalencia directa y estándar.
- source_word: לִבְנֵי הָאָדָם
  english_pob_choice: to the sons of man
  chosen_spanish: a los hijos del hombre
  alternatives_spanish:
  - a los hijos de los hombres
  - a la humanidad
  lexicon: HALOT
  rationale: Conservo la imagen masculina y representativa del hebreo sin neutralizarla. «Hijos del hombre» refleja mejor la forma idiomática que una generalización como «humanidad», que suavizaría la expresión documentada.
- source_word: לַעֲנוֹת בּוֹ
  english_pob_choice: to be occupied with
  chosen_spanish: para ocuparse en ella
  alternatives_spanish:
  - para laborar en ella
  - para ser afligidos por ella
  - para estar ocupados en ella
  lexicon: HALOT
  rationale: La construcción es difícil y admite el sentido de estar ocupados, ejercitados o incluso afligidos por la tarea. «Para ocuparse en ella» preserva la ambigüedad básica y el matiz de actividad humana encomendada, sin descartar la posible dureza que el contexto de Eclesiastés sugiere.
theological_decisions:
- issue: Carga semántica de לַעֲנוֹת בּוֹ
  english_pob_reading: to be occupied with / to be afflicted by it / to labor in it
  chosen_spanish_reading: para ocuparse en ella
  alternative_spanish_readings:
  - para ser afligidos por ella
  - para laborar en ella
  rationale: La frase hebrea es semánticamente difícil y el contexto permite más de una lectura. Mantengo una formulación abierta en el texto principal para no resolver en exceso la tensión entre ocupación y carga, siguiendo el tratamiento auditado del POB en inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Forma representativa de לִבְנֵי הָאָדָם
  english_pob_reading: to the sons of man
  chosen_spanish_reading: a los hijos del hombre
  alternative_spanish_readings:
  - a la humanidad
  - a los hijos de la humanidad
  rationale: El hebreo es formalmente masculino y con fuerza representativa. Se preserva la forma idiomática masculina en lugar de neutralizarla, conforme al criterio de precisión gramatical documentado en el POB inglés.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם *adam*'
translation_notes:
  revision_awareness: El borrador español sigue de cerca el audit trail inglés de POB para Eclesiastés 3:10 y no introduce revisiones textuales nuevas; conserva la ambigüedad de לַעֲנוֹת בּוֹ mediante nota y mantiene la forma masculina representativa de לִבְנֵי הָאָדָם.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, sin máscara reverencial.
  - «Hijos del hombre» preserva el paralelismo idiomático y la marcación masculina del hebreo.
  - «Ocuparse en ella» evita cerrar la frase hebrea difícil a una sola interpretación en el cuerpo principal.
  - La puntuación y el registro son de español bíblico moderno, sobrio y publicable.
