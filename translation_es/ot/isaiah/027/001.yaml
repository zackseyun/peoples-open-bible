  text: בַּ/יּ֣וֹם הַ/ה֡וּא יִפְקֹ֣ד יְהוָה֩ בְּ/חַרְב֨/וֹ הַ/קָּשָׁ֜ה וְ/הַ/גְּדוֹלָ֣ה וְ/הַֽ/חֲזָקָ֗ה עַ֤ל לִוְיָתָן֙ נָחָ֣שׁ בָּרִ֔חַ וְ/עַל֙ לִוְיָתָ֔ן נָחָ֖שׁ עֲקַלָּת֑וֹן וְ/הָרַ֥ג אֶת הַ/תַּנִּ֖ין אֲשֶׁ֥ר בַּ/יָּֽם־׃ס
