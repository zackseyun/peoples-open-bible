translation:
  language: es
  text: 'Porque esto es como las aguas de Noé[a] para mí: así como juré que las aguas de Noé no pasarían otra vez sobre la tierra, así he jurado no enojarme contigo ni reprenderte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Porque esto es para mí como las aguas de Noé». Algunas traducciones, influidas por versiones antiguas, leen «días de Noé», pero el hebreo dice «aguas de Noé».
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En español, «Porque» conserva la relación causal o explicativa que introduce la afirmación anterior y suena natural al inicio del versículo.
- source_word: מֵי נֹחַ
  english_pob_choice: the waters of Noah
  chosen_spanish: las aguas de Noé
  alternatives_spanish:
  - las aguas de Noé
  - las aguas del diluvio de Noé
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «aguas de Noé». «Las aguas de Noé» preserva el vínculo léxico con el texto hebreo y la alusión al diluvio sin añadir explicación interpretativa.
- source_word: זֹאת לִי
  english_pob_choice: this is like ... to me
  chosen_spanish: esto es para mí como
  alternatives_spanish:
  - esto es para mí
  - esto es como
  lexicon: HALOT
  rationale: El hebreo es elíptico; en español hace falta completar la comparación para que el sentido sea inteligible. «Como» refleja la relación comparativa sin desplazar el texto.
- source_word: אֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: HALOT
  rationale: «Así como» transmite con naturalidad la función comparativa que enlaza la primera cláusula con la segunda mitad del versículo.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I swore / I have sworn
  chosen_spanish: juré / he jurado
  alternatives_spanish:
  - lo juré
  - he hecho juramento
  lexicon: HALOT
  rationale: El verbo se refiere a jurar solemnemente. En español, el pretérito y el perfecto compuesto mantienen la solemnidad del acto jurado y la progresión retórica del versículo.
- source_word: מֵעֲבֹר
  english_pob_choice: would ... pass over
  chosen_spanish: pasarían
  alternatives_spanish:
  - cruzarían
  - volverían a pasar
  lexicon: HALOT
  rationale: El infinitivo con preposición expresa el hecho de que las aguas no volverían a atravesar la tierra. «Pasarían otra vez» comunica esa repetición negada de forma natural.
- source_word: עוֹד
  english_pob_choice: never again
  chosen_spanish: otra vez
  alternatives_spanish:
  - nunca más
  - ya no
  lexicon: HALOT
  rationale: En la estructura juramentaria hebrea, la negación de la repetición queda incorporada por el contexto. «Otra vez» mantiene la referencia a la repetición del evento; el sentido completo queda asegurado por la cláusula jurada.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre el mundo
  lexicon: HALOT
  rationale: «Tierra» preserva la referencia al ámbito afectado por el diluvio en el contexto de Noé y evita restringir indebidamente el alcance.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - por eso
  lexicon: HALOT
  rationale: «Así» mantiene la correlación entre la comparación y la conclusión del juramento divino.
- source_word: מִקְּצֹף עָלַיִךְ
  english_pob_choice: not to be angry with you
  chosen_spanish: no enojarme contigo
  alternatives_spanish:
  - no airarme contigo
  - no estar enojado contigo
  lexicon: HALOT
  rationale: El infinitivo indica apartarse de la ira. «Enojarme» es el verbo más natural y fiel en español contemporáneo; conserva la fuerza personal del sujeto divino sin suavizar el sentido.
- source_word: וּמִגְּעָר בָּךְ
  english_pob_choice: and not to rebuke you
  chosen_spanish: ni reprenderte
  alternatives_spanish:
  - ni reñirte
  - ni corregirte
  lexicon: HALOT
  rationale: «גער» significa reprender o amonestar con severidad. «Reprenderte» conserva esa fuerza verbal y el paralelo con la cláusula anterior.
theological_decisions:
- issue: Comparación elíptica con las aguas de Noé
  english_pob_reading: For this is like the waters of Noah to me
  chosen_spanish_reading: Porque esto es para mí como las aguas de Noé
  alternative_spanish_readings:
  - Porque esto es para mí como los días de Noé
  - Porque esto es para mí como las aguas del diluvio de Noé
  rationale: La lectura hebrea masorética dice «las aguas de Noé», no «los días de Noé». La traducción española conserva el dato textual y solo completa la comparación implícita para que sea comprensible.
  doctrine_reference: Transparencia textual y primacía del hebreo masorético
- issue: Fuerza negativa del juramento con infinitivos precedidos por מִן
  english_pob_reading: I have sworn not to be angry with you and not to rebuke you
  chosen_spanish_reading: he jurado no enojarme contigo ni reprenderte
  alternative_spanish_readings:
  - he jurado que no me enojaré contigo ni te reprenderé
  - he jurado no estar enojado contigo ni reprenderte
  rationale: El hebreo expresa el contenido del juramento mediante construcciones infinitivas. En español conviene explicitar la negación de manera natural sin añadir contenido doctrinal; la formulación elegida preserva el paralelo verbal y la solemnidad del juramento.
  doctrine_reference: Equivalencia óptima y claridad gramatical
translation_notes:
  revision_awareness: La base inglesa más reciente mantiene la lectura de alta concordancia y no introduce cambios respecto de la revisión anterior; esta versión española sigue esa misma decisión textual y mantiene la comparación elíptica con «aguas de Noé» en lugar de «días de Noé».
  spanish_consistency_notes:
  - Se mantiene «Noé» para el nombre propio y «Yahvé» no aparece en este versículo.
  - Se usa «tierra» para הָאָרֶץ en coherencia con el contexto del diluvio.
  - «Reprender» conserva el paralelo semántico con la ira divina sin sustituirlo por una atenuación como «corregir».
  - La nota al pie marca explícitamente la alternativa «días de Noé» porque es una variante textual conocida pero no la lectura hebrea base.
