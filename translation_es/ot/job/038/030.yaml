translation:
  language: es
  text: Las aguas se ocultan como piedra[a], y la superficie de la profundidad se congela[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Las aguas se esconden como piedra». El verbo hebreo es inusual aquí y probablemente describe las aguas retirándose a un estado endurecido o helado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la superficie de la profundidad queda trabada» o «se compacta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּאֶבֶן
  english_pob_choice: like stone
  chosen_spanish: como piedra
  alternatives_spanish:
  - como roca
  - como piedra sólida
  lexicon: HALOT
  rationale: La preposición כ expresa comparación; por eso «como» conserva mejor la imagen que una idea transformativa. «Piedra» es el equivalente más natural y directo en español para esta metáfora de endurecimiento/congelación.
- source_word: מַיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  - las aguas
  lexicon: HALOT
  rationale: El plural hebreo funciona aquí como sustantivo colectivo poético; «las aguas» preserva esa forma y encaja con el marco cósmico del pasaje.
- source_word: יִתְחַבָּאוּ
  english_pob_choice: are hidden
  chosen_spanish: se ocultan
  alternatives_spanish:
  - se esconden
  - quedan ocultas
  - se endurecen
  lexicon: HALOT
  rationale: El verbo hebreo normalmente significa «esconderse/ocultarse». Aunque el contexto sugiere el efecto de congelación, el POB inglés revisado decidió mantener la idea de ocultarse; en español «se ocultan» conserva esa lectura sin perder la rareza del hebreo.
- source_word: וּפְנֵי
  english_pob_choice: and the surface of
  chosen_spanish: y la superficie de
  alternatives_spanish:
  - y el rostro de
  - y la faz de
  lexicon: HALOT
  rationale: «Rostro/faz» sería más literal, pero en español «superficie» comunica de forma natural el uso idiomático de «caras de» aplicado al agua o al abismo.
- source_word: תְהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - el profundo
  - la profundidad
  - el océano primordial
  lexicon: HALOT
  rationale: En contextos cósmicos y acuáticos, תְהוֹם designa el abismo primigenio o las aguas profundas. «Abismo» es conciso, bíblico y fiel al campo semántico.
- source_word: יִתְלַכָּדוּ
  english_pob_choice: is frozen
  chosen_spanish: se congela
  alternatives_spanish:
  - queda unido
  - se entrelaza
  - se endurece
  lexicon: HALOT
  rationale: El hebreo sugiere estar preso/ligado o quedar compactado por el frío. «Se congela» expresa bien el resultado en español y armoniza con la imagen de las aguas y el abismo inmovilizados.
translation_notes:
  revision_awareness: El texto inglés del POB pasó de «become hard like stone» a «are hidden like stone» para reflejar con más precisión יִתְחַבָּאוּ; mantengo esa revisión con «se ocultan» y conservo la segunda cláusula en un español idiomático equivalente a «is frozen».
  spanish_consistency_notes:
  - Se usa «las aguas» para preservar el plural hebreo, pero con valor colectivo en español.
  - Se mantiene «abismo» para תְהוֹם, evitando una paráfrasis más interpretativa.
  - La imagen de congelación se expresa de forma natural en la segunda cláusula sin borrar la posible idea de quedar ligado o compactado.
