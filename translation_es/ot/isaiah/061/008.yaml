    issue: '''con maldad'' es menos preciso que ''con injusticia'' para בְּעוֹלָה en esta revisión'
    rationale: Dado el contraste inmediato con מִשְׁפָּט ('justicia'), 'injusticia' preserva mejor el eje ético-jurídico del versículo que 'maldad', que es más general.
  - severity: medium
