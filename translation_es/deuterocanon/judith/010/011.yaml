  to: Y seguían derecho por el patio, y una guardia de avanzada asiria[a] le salió al encuentro.
  rationale: 'Se ajusta la frase para mejorar la naturalidad del español y acercarla mejor al valor del griego y del audit trail inglés: «seguían derecho» expresa mejor εἰς εὐθεῖαν en contexto narrativo; «guardia de avanzada asiria» refleja con más precisión προφυλακή τῶν Ἀσσυρίων; y «le salió al encuentro» comunica de forma más idiomática el encuentro con Judit manteniendo el singular destacado por la nota.'
