revisions:
- from: Y los sacerdotes y los levitas que estaban en todo Israel se pusieron[a] con él, de todas sus regiones.
  to: Y los sacerdotes y los levitas que estaban en todo Israel se pusieron de parte de él[a] desde todos sus territorios.
  rationale: Se ajusta la cláusula verbal para que el español suene natural y exprese con claridad la alineación leal implícita en el hebreo idiomático, sin perder la alternativa preservada en la nota. También se cambia «regiones» por «territorios» para reflejar mejor גְּבוּלָם y mantener mayor cercanía con la decisión léxica auditada.
