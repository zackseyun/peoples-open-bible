translation:
  language: es
  text: Y vio Judas que Baquides y la fuerza principal[a] del campamento estaban a la derecha[b], y se agruparon junto a él todos los hombres valerosos de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la parte más fuerte del campamento». El griego στερέωμα se refiere al cuerpo firme o más sólido de las tropas de Baquides.
    reason: lexical_alternative
  - marker: b
    text: O «en el ala derecha». La expresión griega señala la posición a la derecha, con posible matiz militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - se dio cuenta
  lexicon: LSJ
  rationale: El aoristo de ὁράω se vierte naturalmente por «vio» en una narración militar; mantiene la acción directa sin convertirla en inferencia psicológica.
- source_word: τὸ στερέωμα τῆς παρεμβολῆς
  english_pob_choice: the main strength of the camp
  chosen_spanish: la parte más fuerte del campamento
  alternatives_spanish:
  - la fuerza principal del campamento
  - la fortaleza principal del campamento
  - el cuerpo más sólido del campamento
  lexicon: LSJ
  rationale: στερέωμα expresa firmeza, solidez o fuerza de sostén. En este contexto bélico, «la parte más fuerte» conserva la idea de un cuerpo compacto y robusto de tropas sin imponer una imagen arquitectónica.
- source_word: ἐν τοῖς δεξιοῖς
  english_pob_choice: on the right
  chosen_spanish: a la derecha
  alternatives_spanish:
  - en el lado derecho
  - en el ala derecha
  lexicon: LSJ
  rationale: La expresión indica ubicación en el lado derecho; «a la derecha» es la forma más natural en español y deja abierta la lectura militar del flanco.
- source_word: συνῆλθον αὐτῷ
  english_pob_choice: gathered around him
  chosen_spanish: se reunieron con él
  alternatives_spanish:
  - se juntaron con él
  - acudieron a él
  - se agruparon junto a él
  lexicon: LSJ
  rationale: El verbo sugiere reunirse o converger hacia una persona. «Se reunieron con él» preserva el movimiento colectivo hacia Judas y evita una reformulación demasiado interpretativa.
- source_word: πάντες οἱ εὔψυχοι τῇ καρδίᾳ
  english_pob_choice: all the men courageous in heart
  chosen_spanish: todos los hombres valerosos de corazón
  alternatives_spanish:
  - todos los valientes de corazón
  - todos los hombres de corazón valiente
  - todos los animosos de corazón
  lexicon: LSJ
  rationale: εὔψυχοι denota ánimo bueno, valentía o coraje; τῇ καρδίᾳ fija el rasgo interior. «Valerosos de corazón» conserva el giro semítico/helénico y el masculino plural del contexto militar.
theological_decisions:
- issue: Referencia masculina en contexto de combate
  english_pob_reading: all the men courageous in heart
  chosen_spanish_reading: todos los hombres valerosos de corazón
  alternative_spanish_readings:
  - todos los valientes de corazón
  - todos los animosos
  rationale: El masculino plural del griego apunta a combatientes varones en la escena, no a un grupo mixto genérico. Se mantiene la referencia de género para no suavizar el dato narrativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'main strength of the camp' y 'gathered around him'. La versión española adopta «la parte más fuerte del campamento» para reflejar στερέωμα con naturalidad y «se reunieron con él» para conservar el sentido de συνῆλθον αὐτῷ sin añadir una imagen espacial no requerida por el griego.
  spanish_consistency_notes:
  - Se mantuvo «Bacquides» como forma usual del nombre propio en español bíblico.
  - Se evitó «SEÑOR» o equivalentes no pertinentes, pues no aparece el nombre divino en el versículo.
  - «Corazón» traduce τῇ καρδίᾳ con el mismo valor interior/afectivo del original, sin modernizarlo a una paráfrasis psicológica.
