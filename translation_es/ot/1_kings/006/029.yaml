translation:
  language: es
  text: Talló todas las paredes de la casa[b] alrededor con figuras grabadas de querubines, palmeras y flores abiertas[a], en las paredes interiores y exteriores[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘flores en flor’ o ‘flores desplegadas’; la expresión hebrea se refiere a motivos decorativos florales, pero la forma artística exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘la casa’, designación común aquí para la estructura del templo.'
    reason: cultural_note
  - marker: c
    text: La frase final también puede entenderse de manera más general como ‘por dentro y por fuera’, aunque en este contexto probablemente se refiere a las paredes o superficies interiores y exteriores del santuario.
    reason: alternative_reading
lexical_decisions:
- source_word: קִירוֹת הַבַּיִת
  english_pob_choice: the walls of the house
  chosen_spanish: las paredes de la casa
  alternatives_spanish:
  - las paredes del templo
  lexicon: HALOT
  rationale: קִירוֹת es literalmente ‘paredes’, y בַּיִת se conserva como ‘casa’ para mantener el uso hebreo habitual en Reyes para el edificio del santuario. ‘Templo’ sería interpretativo; aquí se prefiere la correspondencia más cercana al hebreo y al audit trail inglés.
- source_word: מֵסַב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: El término expresa extensión envolvente. ‘Alrededor’ es natural en español y conserva la idea de cobertura completa de las paredes.
- source_word: קָלַע
  english_pob_choice: carved
  chosen_spanish: talló
  alternatives_spanish:
  - esculpió
  - grabó
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el verbo describe trabajo ornamental sobre la superficie. ‘Talló’ comunica bien la acción de labrar madera o relieve decorativo sin forzar una precisión técnica que el hebreo no exige aquí.
- source_word: פִּתּוּחֵי מִקְלְעוֹת
  english_pob_choice: engraved figures
  chosen_spanish: figuras grabadas
  alternatives_spanish:
  - carvados ornamentales
  - relieves grabados
  lexicon: HALOT
  rationale: La combinación intensifica la idea de ornamentación trabajada. ‘Figuras grabadas’ mantiene el sentido representacional y decorativo sin introducir tecnicismos innecesarios.
- source_word: כְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines celestiales
  lexicon: HALOT
  rationale: En español bíblico, ‘querubines’ preserva el registro sagrado y la forma reconocible del término, equivalente al inglés ‘cherubim’.
- source_word: תִמֹרֹת
  english_pob_choice: palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - árboles de palma
  - motivos de palma
  lexicon: HALOT
  rationale: El término alude a formas de palmera en decoración. ‘Palmeras’ es claro y natural en español, y conserva la imagen ornamental del hebreo.
- source_word: פְטוּרֵי צִצִּים
  english_pob_choice: open flowers
  chosen_spanish: flores abiertas
  alternatives_spanish:
  - capullos abiertos
  - flores desplegadas
  - floraciones abiertas
  lexicon: HALOT
  rationale: La expresión se refiere a motivos florales, probablemente flores abiertas o desplegadas. ‘Flores abiertas’ mantiene la imagen visual y deja abierta la incertidumbre botánica/artística documentada por el POB inglés.
- source_word: מִלִּפְנִים וְלַחִיצוֹן
  english_pob_choice: on the inner and outer walls
  chosen_spanish: en las paredes interiores y exteriores
  alternatives_spanish:
  - por dentro y por fuera
  - en lo interior y exterior
  lexicon: HALOT
  rationale: La revisión inglesa corrigió ‘rooms’ a ‘walls’ para ajustarse al hebreo. En español, ‘paredes interiores y exteriores’ refleja mejor el contraste espacial de las superficies decoradas y evita añadir ‘salas’ o ‘recintos’ que el texto no dice.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que corrigió ‘rooms’ por ‘walls’ para ajustarse al hebreo. La redacción española sigue esa decisión y evita interpretar el contraste como ‘salas/recintos’.
  spanish_consistency_notes:
  - Se mantiene ‘casa’ para בַּיִת en coherencia con el uso de POB, aunque el referente contextual sea el templo.
  - Se conserva ‘querubines’ como término bíblico estable y no se sustituye por ‘ángeles’ o ‘cherubs’.
  - ‘Flores abiertas’ preserva la ambigüedad botánica/artística señalada por el texto fuente.
  - 'El orden de los elementos ornamentales sigue el hebreo y el inglés auditado: querubines, palmeras y flores abiertas.'
