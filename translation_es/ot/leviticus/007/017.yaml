translation:
  language: es
  text: Pero lo que quede de la carne[a] del sacrificio al tercer día será quemado en el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Carne» traduce de manera más cercana el hebreo בָּשָׂר; la POB inglesa usa «meat» porque suena más natural en inglés, pero en español «carne» mantiene mejor la conexión léxica con el original. Alternativa posible: «la carne del sacrificio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  english_pob_choice: But what remains
  chosen_spanish: Pero lo que quede
  alternatives_spanish:
  - Y lo que quede
  - Y el resto
  lexicon: HALOT
  rationale: El participio sustantivado expresa lo que queda como sobrante. «Lo que quede» comunica con naturalidad ese resto preservando el valor resultativo sin añadir interpretación.
- source_word: מִבְּשַׂר
  english_pob_choice: of the meat
  chosen_spanish: de la carne
  alternatives_spanish:
  - de la carne del sacrificio
  - de la carne
  lexicon: HALOT
  rationale: בָּשָׂר significa literalmente «carne»; aunque en inglés POB optó por «meat» por claridad idiomática, en español «carne» conserva mejor la correspondencia léxica y sigue siendo natural en un contexto sacrificial.
- source_word: הַזָּבַח
  english_pob_choice: of the sacrifice
  chosen_spanish: del sacrificio
  alternatives_spanish:
  - de la ofrenda
  - del animal sacrificado
  lexicon: HALOT
  rationale: זֶבַח designa el sacrificio en contexto cúltico. «Sacrificio» es la equivalencia directa y clara en español, manteniendo el marco ritual.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: en el tercer día
  alternatives_spanish:
  - al tercer día
  - para el tercer día
  lexicon: HALOT
  rationale: La expresión temporal se rinde de forma literal y comprensible. «En el tercer día» preserva la estructura del hebreo; «al tercer día» sería una alternativa idiomática, pero aquí la forma literal sigue siendo natural.
- source_word: בָּאֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - por el fuego
  - con fuego
  lexicon: HALOT
  rationale: La preposición hebrea con אשׁ señala el medio o ámbito de la quema. «En el fuego» reproduce de manera directa la imagen de destrucción por combustión.
- source_word: יִשָּׂרֵף
  english_pob_choice: shall be burned
  chosen_spanish: será quemado
  alternatives_spanish:
  - debe ser quemado
  - ha de ser quemado
  lexicon: HALOT
  rationale: El nifal imperfecto funciona como prescripción. «Será quemado» mantiene el valor pasivo e instructivo sin endurecerlo con una obligación explícita que el hebreo no formula de manera inmediata.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo; no se registran revisiones aplicadas. La versión española mantiene ese consenso, conservando el valor prescriptivo del pasivo futuro y la imagen ritual de destrucción por fuego.
  spanish_consistency_notes:
  - Se mantiene «sacrificio» para זֶבַח y «carne» para בָּשָׂר, evitando sustituirlos por un solo término genérico.
  - Se conserva el tono normativo con «será quemado», sin convertir la instrucción en una paráfrasis exhortativa.
  - 'La nota de pie acompaña solo al término con tensión léxica real en español: carne/flesh frente a la opción idiomática inglesa meat.'
