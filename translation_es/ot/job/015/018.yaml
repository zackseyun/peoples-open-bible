revisions:
- from: lo que declaran[a] los sabios, y no han ocultado de sus padres—
  to: lo que declaran[a] los sabios, y no han ocultado lo recibido de sus padres—
  rationale: Se corrige una construcción no idiomática en español. La revisión hace explícito el objeto implícito («lo recibido») para expresar con claridad la lectura principal auditada —que la sabiduría proviene de sus padres y no fue escondida— sin intentar resolver por completo la ambigüedad hebrea, la cual permanece documentada en la nota. Se mantiene el tono digno y la cercanía al sentido fuente.
  reviewer_model: gpt-5.4
