  glossary_alignment: 'No hay conflictos con términos troncales del proyecto como Yahvé, Mesías, espíritu, etc. La principal cuestión de alineación es lexical/contextual: הָאָרֶץ debe reflejar mejor «la tierra/el país/el territorio» según el razonamiento auditado, y aquí conviene «la tierra» con nota mejorada o, preferiblemente, «la tierra» anclada a una nota que contraste con «la tierra entera/el mundo».'
  issues:
  - severity: medium
    issue: «la tierra» queda demasiado ambigua para הָאָרֶץ
    rationale: El expediente inglés documenta que «land» es preferible por el contexto inmediato de juicio sobre un territorio. En español, «la tierra» puede oírse como planeta/mundo; conviene aclararlo mejor en la nota.
  - severity: low
