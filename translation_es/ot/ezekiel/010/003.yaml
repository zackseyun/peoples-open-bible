translation:
  language: es
  text: Ahora los querubines estaban de pie a la derecha de la casa cuando el hombre entró[a], y la nube llenó el atrio interior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a la derecha de la casa». En la orientación del templo, esta expresión señala el lado sur.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּרֻבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubes
  lexicon: HALOT
  rationale: Conservo el plural transliterado establecido para estos seres celestiales. «Querubines» es natural en español y evita rebajar el término a una forma diminutiva o más informal.
- source_word: עֹמְדִים
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban parados
  - permanecían de pie
  lexicon: HALOT
  rationale: El participio hebreo expresa una postura en curso; «estaban de pie» comunica bien el estado durativo sin volverlo demasiado literario o rígido.
- source_word: מִימִין לַבַּיִת
  english_pob_choice: on the right side of the house
  chosen_spanish: a la derecha de la casa
  alternatives_spanish:
  - del lado derecho de la casa
  - en el lado derecho de la casa
  lexicon: HALOT
  rationale: 'Sigo la revisión más reciente del audit trail: el hebreo dice literalmente «a/desde la derecha», no «sur» de forma explícita. En español, «a la derecha de la casa» conserva la orientación sin añadir una localización interpretativa que el texto no dice aquí.'
- source_word: בְּבֹאוֹ הָאִישׁ
  english_pob_choice: when the man went in
  chosen_spanish: cuando el hombre entró
  alternatives_spanish:
  - al entrar el hombre
  - cuando el hombre se metió
  lexicon: HALOT
  rationale: La construcción temporal se vierte de modo natural como «cuando ... entró». Mantengo «el hombre» porque el hebreo no repite la identificación ampliada en este versículo.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  lexicon: HALOT
  rationale: El sustantivo con artículo es simplemente «el hombre». Evito expandirlo a «el hombre vestido de lino» para no importar información que no está explicitada en esta línea.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de gloria
  lexicon: HALOT
  rationale: Dejo el sustantivo en su sentido directo. El contexto sugiere la manifestación divina, pero el versículo dice solo «la nube».
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - había llenado
  - estaba llenando
  lexicon: HALOT
  rationale: El qatal avanza la narración como acción completada; «llenó» funciona con naturalidad en español y conserva el valor perfectivo del hebreo.
- source_word: הֶחָצֵר הַפְּנִימִית
  english_pob_choice: the inner court
  chosen_spanish: el atrio interior
  alternatives_spanish:
  - el patio interior
  - el patio interno
  lexicon: HALOT
  rationale: Para arquitectura del templo, «atrio» es un equivalente más preciso y eclesialmente reconocible que «patio». «Interior» mantiene la distinción frente a otros atrios o patios.
theological_decisions:
- issue: Dirección espacial de מִימִין en contexto del templo
  english_pob_reading: on the right side of the house
  chosen_spanish_reading: a la derecha de la casa
  alternative_spanish_readings:
  - del lado sur de la casa
  rationale: El audit trail inglés pasó de «south side» a «right side» por fidelidad lexical al hebreo. En español, «a la derecha» conserva esa fidelidad y evita introducir una aclaración direccional no expresada en el texto base. La nota explica que la referencia es espacial, no doctrinal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia de «el hombre»
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el hombre vestido de lino
  rationale: Mantengo la referencia simple del hebreo, tal como hace el POB inglés, para no ampliar la identificación con información contextual que no se repite en este versículo.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El texto español sigue la última revisión del audit trail en cuanto a la decisión de no traducir el hebreo como «sur» en el cuerpo principal. Se preserva la referencia simple a «el hombre» y el valor durativo de «estaban de pie».
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando aparezca el nombre divino; aquí no se requiere.
  - Mantuve terminología del templo como «atrio interior» para armonizar con el registro bíblico y evitar un coloquialismo excesivo.
  - Preferí «querubines» y no «querubes» por consistencia lexical y naturalidad en español.
  - La nota al pie conserva la tensión entre la orientación literal «a la derecha» y el valor contextual de «lado sur».
