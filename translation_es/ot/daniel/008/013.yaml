  to: 'Entonces oí a un santo que hablaba[a], y otro santo dijo al que hablaba: «¿Hasta cuándo la visión acerca del holocausto regular[b], y de la transgresión desoladora[c], y de la entrega tanto del santuario como de la hueste[d] al pisoteo?»'
  rationale: Se revisa para preservar mejor la ambigüedad de צָבָא mediante «hueste», alineándose con la decisión léxica inglesa. También se mejora la sintaxis final con «la entrega tanto del santuario como de la hueste al pisoteo», que refleja con más naturalidad el hebreo תֵּת ... מִרְמָס. Finalmente, se simplifica «ser santo» a «santo» por mayor naturalidad y legibilidad en español bíblico.
  reviewer_model: gpt-5.4
