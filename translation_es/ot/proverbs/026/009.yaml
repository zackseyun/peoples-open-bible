review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura comparativa y la mayoría de las decisiones léxicas del hebreo: חוֹחַ como ''espina'', בְּיַד como ''en la mano de'', מָשָׁל como ''proverbio'', y כְסִילִים como ''necios''. Sin embargo, no refleja suficientemente la revisión auditada del inglés sobre עָלָה + בְּיַד, que enfatiza el movimiento ''sube/va hacia dentro de la mano'' más que un simple ''se levanta en la mano''. Además, falta la nota equivalente a la nota inglesa sobre el verbo literal.'
  spanish_quality_summary: El español es claro y legible, con tono proverbial adecuado. 'Borracho' funciona en registro común y 'necios' es una buena elección sapiencial. No obstante, 'se levanta en la mano' suena algo impreciso y menos natural que una formulación que conserve el ascenso literal y la idea de irrupción peligrosa en la mano. También conviene ordenar y ampliar las notas para reflejar tanto la alternativa de חוֹחַ como la del verbo.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las elecciones ''proverbio'', ''necios'' y la ausencia de términos teológicos especiales son correctas. La principal corrección es de fidelidad léxica al hebreo y al rastro de auditoría: עָלָה debe representarse más explícitamente como ''sube''/''va subiendo'' y acompañarse con nota de alternativa léxica, no solo con ''se levanta''.'
  issues:
