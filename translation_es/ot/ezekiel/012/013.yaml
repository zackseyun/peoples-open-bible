translation:
  language: es
  text: Yo extenderé mi red sobre él[a], y será atrapado en mi trampa. Luego lo llevaré a Babilonia, la tierra de los caldeos; sin embargo, no la verá[b], y allí morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «mi trampa». El hebreo usa dos términos de caza relacionados: «mi red» y «mi trampa».'
    reason: lexical_alternative
  - marker: b
    text: La afirmación de que será llevado a Babilonia pero no la verá suele entenderse a la luz de 2 Reyes 25:7 y Jeremías 39:7; 52:11.
    reason: cross_reference
lexical_decisions:
- source_word: וּפָרַשְׂתִּי
  english_pob_choice: I will spread
  chosen_spanish: extenderé
  alternatives_spanish:
  - desplegaré
  - extenderé y tendré
  lexicon: HALOT
  rationale: פָּרַשׂ expresa la acción de desplegar o tender algo extendiéndolo. En español, «extenderé» comunica de manera natural la imagen de una red tendida sobre alguien sin sonar forzado.
- source_word: רִשְׁתִּי
  english_pob_choice: my net
  chosen_spanish: mi red
  alternatives_spanish:
  - mi malla
  - mi red de caza
  lexicon: HALOT
  rationale: רֶשֶׁת es el término normal para una red, especialmente en imagen de caza o captura. «Mi red» es claro, idiomático y conserva el valor metafórico.
- source_word: עָלָיו
  english_pob_choice: over him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre él mismo
  lexicon: HALOT
  rationale: La preposición עַל con sufijo pronominal aquí es espacial y presenta la red colocada por encima de la víctima. «Sobre él» reproduce bien esa relación.
- source_word: וְנִתְפַּשׂ
  english_pob_choice: he will be caught
  chosen_spanish: será atrapado
  alternatives_spanish:
  - será apresado
  - será capturado
  lexicon: HALOT
  rationale: 'El nifal comunica pasividad/resultativo: la persona cae en la trampa. «Será atrapado» encaja con la imagen de red y trampa y suena natural en español.'
- source_word: בִּמְצוּדָתִי
  english_pob_choice: in my snare
  chosen_spanish: en mi trampa
  alternatives_spanish:
  - en mi lazo
  - en mi cepo
  lexicon: HALOT
  rationale: מְצוּדָה puede significar trampa, lazo o red de caza. Como ya se traduce רִשְׁתִּי como «mi red», aquí conviene variar con «mi trampa» para mantener el paralelismo y evitar repetición excesiva.
- source_word: וְהֵבֵאתִי אֹתוֹ
  english_pob_choice: Then I will bring him
  chosen_spanish: Luego lo traeré
  alternatives_spanish:
  - Y lo traeré
  - Entonces lo haré venir
  lexicon: HALOT
  rationale: El hifil de בוא significa «hacer venir»/«traer». «Luego lo traeré» preserva la secuencia narrativa y la dirección del movimiento sin recargar la frase.
- source_word: בָבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Babilonia; en español normal se expresa con «a Babilonia».
- source_word: אֶרֶץ כַּשְׂדִּים
  english_pob_choice: the land of the Chaldeans
  chosen_spanish: la tierra de los caldeos
  alternatives_spanish:
  - la tierra de los babilonios
  lexicon: HALOT
  rationale: כַּשְׂדִּים se refiere a los caldeos. «La tierra de los caldeos» es la manera más directa de conservar el designador histórico-étnico del hebreo.
- source_word: וְאוֹתָהּ לֹא יִרְאֶה
  english_pob_choice: yet he will not see it
  chosen_spanish: pero no la verá
  alternatives_spanish:
  - y no la verá
  - aunque no la verá
  lexicon: HALOT
  rationale: El pronombre femenino retoma Babilonia/la tierra. «No la verá» conserva el referente femenino y el giro irónico del texto sin explicitar la causa en la traducción principal.
- source_word: וְשָׁם יָמוּת
  english_pob_choice: and there he will die
  chosen_spanish: y allí morirá
  alternatives_spanish:
  - y allí morirá él
  - allí morirá
  lexicon: HALOT
  rationale: Es una clausula final directa. «Y allí morirá» es fiel, conciso y mantiene el énfasis locativo del hebreo.
theological_decisions:
- issue: Ironía histórica de 'no la verá'
  english_pob_reading: Retain the literal statement without explicating the cause in the main text.
  chosen_spanish_reading: Mantener la afirmación literal sin explicar en el texto principal la causa de que no la verá.
  alternative_spanish_readings:
  - pero no la verá porque será cegado
  - y no la verá, es decir, Babilonia
  rationale: El verso dice solamente que será llevado a Babilonia pero no la verá. Aunque el contexto canónico ayuda a entender la referencia a la ceguera de Sedequías, la traducción debe preservar la tensión del texto y no resolverla interpretativamente en el cuerpo principal.
  doctrine_reference: 'Principio de traducción #3: preservar la tensión teológica e histórica del texto sin resolverla de antemano.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo masorético y concuerda con el contexto auditado en inglés. No se reportan revisiones aplicadas en el pasaje fuente; se mantiene el contraste entre la red, la trampa, Babilonia y la ironía de ‘no la verá’.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; en este versículo no aparece el nombre divino.
  - «Babilonia» conserva el nombre propio; «la tierra de los caldeos» preserva el complemento étnico del hebreo.
  - Se mantiene el referente femenino de «la» para Babilonia/la tierra, como en el texto fuente.
  - Se evita explicitar la ceguera en el cuerpo principal para conservar la tensión histórica señalada por el audit trail en inglés.
