translation:
  language: es
  text: Desde el extremo de la tierra te llamo; cuando mi corazón desfallece[a], llévame a una roca más alta que yo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando mi corazón está abrumado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «llévame a una roca que es demasiado alta para mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֵה הָאָרֶץ
  english_pob_choice: From the end of the earth
  chosen_spanish: Desde el extremo de la tierra
  alternatives_spanish:
  - Desde el fin de la tierra
  - Desde el borde de la tierra
  - Desde la parte más lejana de la tierra
  lexicon: HALOT
  rationale: קָצֶה expresa el extremo o fin de algo. En español, «extremo» conserva la idea de distancia y límite con naturalidad poética. «Tierra» reproduce bien הָאָרֶץ en este contexto, sin forzar «país» o «territorio».
- source_word: אֵלֶיךָ אֶקְרָא
  english_pob_choice: I call to you
  chosen_spanish: te llamo
  alternatives_spanish:
  - clamo a ti
  - te invoco
  - grito a ti
  lexicon: HALOT
  rationale: קרא puede significar llamar o clamar. «Te llamo» es sobrio y fiel; en el contexto de oración conserva la apelación personal sin sobredramatizar. «Clamo a ti» es una alternativa posible, pero en español puede sonar más intensa de lo que exige el hebreo.
- source_word: בַּעֲטֹף לִבִּי
  english_pob_choice: when my heart grows faint
  chosen_spanish: cuando mi corazón desfallece
  alternatives_spanish:
  - cuando mi corazón se siente abrumado
  - cuando mi corazón se desvanece
  - cuando mi corazón está abrumado
  lexicon: HALOT
  rationale: עטף en esta construcción comunica debilidad, flaqueza o desfallecimiento. «Desfallece» mantiene esa imagen de fuerzas interiores que se apagan, sin decidir de antemano entre «faint» y «overwhelmed». Así se preserva la tensión semántica documentada por la nota inglesa.
- source_word: בְּצוּר
  english_pob_choice: to a rock
  chosen_spanish: a una roca
  alternatives_spanish:
  - a un peñasco
  - a una peña
  - hacia una roca
  lexicon: HALOT
  rationale: צוּר es literalmente «roca» y suele funcionar como imagen de refugio y seguridad. «Roca» es el equivalente más directo y conserva el símbolo poético sin explicitarlo en el texto principal.
- source_word: יָרוּם מִמֶּנִּי
  english_pob_choice: higher than I
  chosen_spanish: más alta que yo
  alternatives_spanish:
  - demasiado alta para mí
  - más alta que yo
  - elevada sobre mí
  lexicon: HALOT
  rationale: רוּם expresa altura. La comparación con el hablante puede mantenerse naturalmente en español con «más alta que yo». La alternativa «demasiado alta para mí» interpreta la dificultad; aquí se prefiere la comparación literal, como en el inglés auditado.
- source_word: תַנְחֵנִי
  english_pob_choice: lead me
  chosen_spanish: llévame
  alternatives_spanish:
  - guíame
  - condúceme
  lexicon: HALOT
  rationale: נחה en hiphil significa llevar, conducir o guiar. «Llévame» funciona bien con el movimiento hacia la roca y suena fluido en español. «Guíame» también sería posible, pero «llevar» encaja mejor con la dirección concreta del verso.
theological_decisions:
- issue: Metáfora de la roca como refugio
  english_pob_reading: Retain 'rock' as a metaphor for secure refuge without explicating God as refuge in the main text.
  chosen_spanish_reading: Conservar «roca» como metáfora de seguridad y amparo sin explicitar en el texto principal que se trata de un refugio.
  alternative_spanish_readings:
  - llévame a un refugio más alto que yo
  - llévame a un lugar seguro
  - llévame a una fortaleza
  rationale: El hebreo usa la imagen concreta de צוּר. Mantener «roca» preserva la poesía y deja abierta la resonancia teológica, en lugar de resolverla por interpretación. Esto sigue la primacía del texto original y conserva la tensión literaria.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El examen comparado con el paquete fuente y el audit trail inglés muestra alta concordancia; no se requieren cambios respecto del sentido base. Se preservó la alternativa semántica de בַּעֲטֹף לִבִּי en una nota, y se mantuvo la metáfora de la roca sin interpretarla en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto en el proyecto, pero este versículo no lo contiene.
  - Se mantuvo la imagen de «roca» en singular, coherente con la metáfora del refugio.
  - La puntuación refleja dos miembros poéticos y conserva la pausa fuerte antes de la petición final.
