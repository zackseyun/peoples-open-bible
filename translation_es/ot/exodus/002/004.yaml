translation:
  language: es
  text: Y su hermana se quedó de pie a cierta distancia[a], para saber[b] qué se le haría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «desde lejos» o «de lejos».'
    reason: lexical_alternative
  - marker: b
    text: 'O bien: «para averiguar qué se le haría». El hebreo dice más literalmente: «para saber qué se le haría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּתַצַּב
  english_pob_choice: stood
  chosen_spanish: se quedó
  alternatives_spanish:
  - se puso de pie
  - se mantuvo
  - se plantó
  lexicon: HALOT
  rationale: El verbo expresa que ella tomó o mantuvo una posición firme de pie. En español, 'se quedó' comunica la permanencia en un lugar sin añadir un matiz más fuerte que el hebreo no exige en este contexto.
- source_word: אֲחֹתוֹ
  english_pob_choice: his sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de él
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular se expresa naturalmente en español con 'su hermana'; el antecedente se entiende por el contexto narrativo.
- source_word: מֵרָחֹק
  english_pob_choice: at a distance
  chosen_spanish: a distancia
  alternatives_spanish:
  - desde lejos
  - de lejos
  lexicon: HALOT
  rationale: La frase indica separación espacial. 'A distancia' es claro y sobrio en español; 'desde lejos' sería también posible, pero suena más interpretativo.
- source_word: לְדֵעָה
  english_pob_choice: to know
  chosen_spanish: para saber
  alternatives_spanish:
  - para conocer
  - para averiguar
  lexicon: HALOT
  rationale: El infinitivo de ידע expresa finalidad cognitiva. 'Para saber' conserva bien la sencillez del hebreo y suena natural en español; 'averiguar' enfatizaría más el matiz de indagación.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué cosa
  lexicon: HALOT
  rationale: Interrogativo directo en español; 'qué' reproduce la fuerza del hebreo sin sobrecargar la frase.
- source_word: יֵּעָשֶׂה
  english_pob_choice: would be done
  chosen_spanish: se le haría
  alternatives_spanish:
  - le harían
  - sería hecho
  lexicon: HALOT
  rationale: El nifal de עשה es pasivo. 'Se le haría' mantiene la pasividad y evita una traducción demasiado abstracta como 'sería hecho', que en español suena menos natural.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El complemento ל con pasivo aquí apunta a la persona afectada; en español, 'se le' integra bien con la construcción pasiva y conserva la referencia al niño.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hebreo y el auditable English POB: mantiene el valor espacial de מֵרָחֹק, la finalidad de לְדֵעָה y el pasivo de יֵּעָשֶׂה. No se detectaron revisiones aplicadas en el paquete fuente, y el cotejo indica alta concordancia con solo observaciones menores.'
  spanish_consistency_notes:
  - Se conserva el tono narrativo sobrio y literal propio de POB.
  - Se usa 'Dios' / 'Yahvé' sin necesidad en este versículo.
  - No se introduce una glosa doctrinal; la ambigüedad del pasivo se mantiene dentro de una nota alternativa.
