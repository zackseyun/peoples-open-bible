lexical_decisions:
- source_word: א֣וֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: HALOT
  rationale: En la serie de alternativas poéticas de Job, «o» reproduce con naturalidad la coordinación sin añadir matiz explicativo que no esté en el hebreo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  lexicon: HALOT
  rationale: La relación es de compañía o asociación con esos grandes hombres; «con» es la equivalencia más directa y idiomática en español.
- source_word: שָׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - nobles
  - gobernantes
  - jefes
  lexicon: HALOT
  rationale: «Príncipes» conserva el registro elevado del término y coincide con la decisión inglesa, sin convertir el cargo en una categoría demasiado administrativa.
- source_word: זָהָב לָהֶם
  english_pob_choice: who had gold
  chosen_spanish: que tenían oro
  alternatives_spanish:
  - a quienes pertenecía el oro
  - que poseían oro
  lexicon: HALOT
  rationale: El hebreo expresa posesión de riqueza; «tenían oro» transmite el sentido con naturalidad. «Oro» conserva el paralelo poético con la plata.
- source_word: הַמְמַלְאִים
  english_pob_choice: who filled
  chosen_spanish: que llenaban
  alternatives_spanish:
  - los que llenaban
  - que estaban llenando
  lexicon: HALOT
  rationale: El participio se integra bien en una relativa descriptiva. El imperfecto español «llenaban» comunica acción característica o habitual en el marco descriptivo del verso.
- source_word: בָּתֵּיהֶם
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus palacios
  lexicon: HALOT
  rationale: «Casas» es la correspondencia literal y suficiente; «palacios» sería más específico de lo que el texto hebreo afirma.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: HALOT
  rationale: En este contexto de riqueza material, «plata» preserva la imagen concreta del metal precioso y evita abstraerla como «dinero».
translation_notes:
  revision_awareness: Se mantiene el sentido y la estructura del texto hebreo conforme al audit trail inglés; no se introducen cambios de sentido ni se amplía el referente de «casas» a «palacios».
  spanish_consistency_notes:
  - Se prefirió «príncipes» para mantener el registro elevado documentado en el inglés POB.
  - Se conservó «oro/plata» como paralelismo material concreto, no como abstracción económica.
  - La sintaxis española sigue de cerca las relaciones del hebreo sin volverla calco rígido.
