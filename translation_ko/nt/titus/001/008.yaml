id: TIT.1.8
reference: Titus 1:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ φιλόξενον, φιλάγαθον, σώφρονα, δίκαιον, ὅσιον, ἐγκρατῆ,
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/008.yaml
  text: but hospitable[a], loving what is good, self-controlled, upright, holy, and disciplined[d][c][b],
  footnotes:
  - marker: a
    text: Or 'a lover of good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'just' or 'righteous' for 'upright.'
    reason: lexical_alternative
  - marker: c
    text: Or 'devout' for 'holy.'
    reason: lexical_alternative
  - marker: d
    text: "The Greek uses two related virtues here: one meaning sound-minded or self-controlled (σώφρονα), and another meaning exercising mastery over oneself (ἐγκρατῆ)."
    reason: lexical_alternative
translation:
  language: ko
  text: 도리어 손님을 잘 대접하고[a], 선한 것을 사랑하며, 신중하고, 의롭고[b], 거룩하고[c], 자제력이 있는 사람이라야 합니다[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「선을 사랑하는 자」 — φιλάγαθον에 대한 것이 아니라, 첫 어휘 φιλόξενος에 대한 대안은 「나그네를 사랑하는」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「공정한」, 「의로운」. 헬라어 δίκαιος는 양쪽 어감을 모두 담는다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「경건한」. ὅσιος는 신을 향한 합당한 경외의 어감을 지닌다.
    reason: lexical_alternative
  - marker: d
    text: 헬라어는 여기서 두 가지 관련 덕목을 쓴다 — 건전한 분별·신중함(σώφρονα)과 자기 통제(ἐγκρατῆ).
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλόξενον
  english_pob_choice: hospitable
  chosen_korean: 손님을 잘 대접하고
  alternatives_korean:
  - 나그네를 사랑하고
  - 손 대접을 즐기고
  lexicon: BDAG
  rationale: φιλόξενος는 문자적으로 「나그네/이방인을 사랑하는」. 1세기 환대 문화를 담아 「손님을 잘 대접하는」으로 옮긴다.
- source_word: φιλάγαθον
  english_pob_choice: loving what is good
  chosen_korean: 선한 것을 사랑하며
  alternatives_korean:
  - 선을 사랑하며
  - 좋은 것을 사랑하며
  lexicon: BDAG
  rationale: φιλο- + ἀγαθός. 「선한 것을 사랑한다」가 가장 충실하다.
- source_word: σώφρονα
  english_pob_choice: self-controlled
  chosen_korean: 신중하고
  alternatives_korean:
  - 분별 있고
  - 건전한 마음을 가지고
  - 절제하고
  lexicon: BDAG
  rationale: σώφρων은 건전한 분별·절제. 뒤에 오는 ἐγκρατῆ(자제력)와 구분하기 위해 「신중하고」로 옮긴다. 영어 POB가 σώφρονα를 「self-controlled」로, ἐγκρατῆ를 「disciplined」로 구분한 흐름과 다르게 한국어는 「신중/자제」 짝으로 자연스러움을 살린다.
- source_word: δίκαιον
  english_pob_choice: upright
  chosen_korean: 의롭고
  alternatives_korean:
  - 공정하고
  - 올바르고
  lexicon: BDAG
  rationale: δίκαιος의 표준 한국어 등가어 「의롭다」. 「공정」은 사회적 어감으로 좁다.
- source_word: ὅσιον
  english_pob_choice: holy
  chosen_korean: 거룩하고
  alternatives_korean:
  - 경건하고
  - 신실하고
  lexicon: BDAG
  rationale: ὅσιος는 하나님을 향한 합당한 헌신을 함의한다. 「거룩하다」가 가장 일반적이며, 각주로 「경건한」을 둔다.
- source_word: ἐγκρατῆ
  english_pob_choice: disciplined
  chosen_korean: 자제력이 있는
  alternatives_korean:
  - 절제하는
  - 자기를 다스리는
  lexicon: BDAG
  rationale: ἐγκρατής는 자기 자신에 대한 통제. 「자제력이 있는」이 σώφρων과 명확히 구분된다.
