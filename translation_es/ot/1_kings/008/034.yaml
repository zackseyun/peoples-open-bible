translation:
  language: es
  text: entonces escucha en el cielo y perdona el pecado de tu pueblo Israel[a][b][c], y tráelos de vuelta a la tierra que diste a sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “escucha desde el cielo.”
    reason: lexical_alternative
  - marker: b
    text: O “restáuralos a la tierra.”
    reason: lexical_alternative
  - marker: c
    text: Lit. “sus padres”; es decir, los antepasados a quienes Dios dio la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: תִּשְׁמַע הַשָּׁמַיִם
  english_pob_choice: hear in heaven
  chosen_spanish: oye tú en el cielo
  alternatives_spanish:
  - oye desde el cielo
  - escucha en el cielo
  lexicon: HALOT
  rationale: El hebreo une el verbo ‘oír’ con ‘los cielos’ como esfera de la acción divina. En español, ‘en el cielo’ conserva la construcción idiomática de oración y evita sobrecargar la relación con una preposición interpretativa como ‘desde’, aunque esa siga siendo una alternativa válida.
- source_word: וְסָלַחְתָּ
  english_pob_choice: and forgive
  chosen_spanish: y perdona
  alternatives_spanish:
  - y perdonarás
  - entonces perdona
  lexicon: HALOT
  rationale: סלח se refiere al perdón divino del pecado. ‘Perdona’ mantiene la coordinación simple del hebreo y suena natural en una súplica directa sin añadir matices no presentes en el texto.
- source_word: לְחַטַּאת
  english_pob_choice: the sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - la culpa
  - la ofensa
  lexicon: HALOT
  rationale: Aquí חטאת designa el pecado mismo, no una ofrenda por el pecado. ‘Pecado’ es la opción más clara y fiel para el español contemporáneo.
- source_word: עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - tu pueblo, Israel
  - tu pueblo, que es Israel
  lexicon: HALOT
  rationale: La cadena nominal identifica a Israel como pueblo de pacto de Dios. Se conserva la relación posesiva y el nombre propio sin añadir explicaciones que el hebreo no requiere.
- source_word: וַהֲשֵׁבֹתָם
  english_pob_choice: and bring them back
  chosen_spanish: y tráelos de vuelta
  alternatives_spanish:
  - y restáuralos
  - y vuélvelos
  lexicon: HALOT
  rationale: El hifil de שוב expresa causar el regreso. ‘Tráelos de vuelta’ comunica con claridad el retorno espacial al contexto de la tierra, sin perder el sentido causativo.
- source_word: אֶל הָאֲדָמָה
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra cultivable
  - al suelo
  lexicon: HALOT
  rationale: En este contexto אֲדָמָה tiene sentido territorial y pactal. ‘Tierra’ es la forma natural en español para ese destino prometido.
- source_word: אֲשֶׁר נָתַתָּ לַאֲבוֹתָם
  english_pob_choice: that you gave to their fathers
  chosen_spanish: que diste a sus padres
  alternatives_spanish:
  - que diste a sus antepasados
  lexicon: HALOT
  rationale: Se mantiene ‘padres’ para reflejar de forma precisa el hebreo masculino y la referencia a los patriarcas receptores de la promesa. ‘Antepasados’ sería una neutralización posible, pero debilita el eco covenantal del original.
theological_decisions:
- issue: Referencia patriarcal de לַאֲבוֹתָם
  english_pob_reading: their fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: El texto apunta a los padres fundacionales de Israel, no a una referencia genérica a ancestros. ‘Sus padres’ conserva el lenguaje del pacto y la memoria de la promesa de la tierra sin introducir una paráfrasis sociológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Retorno a la tierra en וַהֲשֵׁבֹתָם
  english_pob_reading: bring them back to the land
  chosen_spanish_reading: tráelos de vuelta a la tierra
  alternative_spanish_readings:
  - restáuralos a la tierra
  rationale: 'La súplica es concreta: regreso a la tierra prometida tras el juicio. ‘Tráelos de vuelta’ conserva la dimensión espacial y no diluye el sentido en una restauración abstracta.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Valor de la esfera divina en תִּשְׁמַע הַשָּׁמַיִם
  english_pob_reading: hear in heaven
  chosen_spanish_reading: oye tú en el cielo
  alternative_spanish_readings:
  - oye desde el cielo
  - escucha en el cielo
  rationale: El hebreo usa una construcción breve que sitúa la escucha en la esfera celestial. ‘En el cielo’ preserva ese rasgo sin convertirlo obligatoriamente en una preposición de origen, aunque esa lectura es viable en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'Coincide con la última revisión del texto fuente: no se registran cambios posteriores y el consenso de control cruzado fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como término por defecto para el nombre divino, pero este versículo no contiene el Tetragrámaton explícito en el texto hebreo transmitido.
  - Se usa ‘tierra’ para אֲדָמָה por el contexto de promesa territorial; ‘suelo’ o ‘tierra cultivable’ sonarían demasiado concretos o estrechos.
  - Se conserva el paralelismo directo de la súplica sin añadir conectores interpretativos más allá de la coordinación básica.
  - ‘Padres’ se retiene por fidelidad lexical y por el eco covenantal, aun cuando ‘antepasados’ sea una alternativa comprensible en español moderno.
