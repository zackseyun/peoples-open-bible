translation:
  language: es
  text: Y los hijos de José, que le nacieron en Egipto, fueron dos personas[a]. Todas las personas de la casa de Jacob que vinieron a Egipto fueron setenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo נֶפֶשׁ, aquí como término de conteo para personas en un registro genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos varones de
  - Y los hijos de
  lexicon: HALOT
  rationale: En español, «hijos de» conserva el sentido genealógico de בְּנֵי sin volver la frase artificial. «Hijos varones» sería más explícito, pero aquí el contexto ya señala a los descendientes masculinos de José.
- source_word: יֻלַּד לוֹ
  english_pob_choice: were born to him
  chosen_spanish: le nacieron
  alternatives_spanish:
  - fueron nacidos para él
  - nacieron de él
  lexicon: HALOT
  rationale: El pasivo hebreo con ל־ y sufijo se expresa de manera natural en español con «le nacieron», que mantiene el valor relacional y evita una construcción forzada.
- source_word: בְמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición ב con valor locativo se traduce directamente por «en». «Egipto» basta en español y conserva la concisión del hebreo.
- source_word: נֶפֶשׁ שְׁנָיִם
  english_pob_choice: two persons
  chosen_spanish: dos personas
  alternatives_spanish:
  - dos almas
  - dos seres
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona como término de conteo para individuos. «Personas» preserva el valor censal sin introducir el matiz teológico de «almas».
- source_word: כָּל הַנֶּפֶשׁ
  english_pob_choice: All the persons
  chosen_spanish: Todas las personas
  alternatives_spanish:
  - Todo el número de personas
  - Todas las almas
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular colectivo, el español natural requiere plural. «Personas» mantiene el mismo registro de conteo que en la primera cláusula.
- source_word: לְבֵית יַעֲקֹב
  english_pob_choice: of the house of Jacob
  chosen_spanish: de la casa de Jacob
  alternatives_spanish:
  - de la familia de Jacob
  - del linaje de Jacob
  lexicon: HALOT
  rationale: «Casa de Jacob» es una expresión transparente y fiel al sentido corporativo/familiar del hebreo, mejor que sustituirla por una paráfrasis más libre.
- source_word: הַבָּאָה
  english_pob_choice: who came
  chosen_spanish: que vinieron
  alternatives_spanish:
  - que llegaron
  - que habían venido
  lexicon: HALOT
  rationale: El participio con artículo funciona como relativo colectivo. «Que vinieron» reproduce ese valor de llegada al grupo sin sobreinterpretar el aspecto.
- source_word: מִצְרַיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  lexicon: HALOT
  rationale: El he direccional se vierte naturalmente con «a». En español bíblico actual es más idiomático que «egiptward» o un giro más literal.
- source_word: שִׁבְעִים
  english_pob_choice: were seventy
  chosen_spanish: fueron setenta
  alternatives_spanish:
  - sumaron setenta
  - totalizaron setenta
  lexicon: HALOT
  rationale: La cláusula nominal hebrea expresa el total. «Fueron setenta» conserva la sobriedad del enunciado y el valor de recuento.
theological_decisions:
- issue: Cómo rendir נֶפֶשׁ en un contexto genealógico/censal
  english_pob_reading: persons
  chosen_spanish_reading: personas
  alternative_spanish_readings:
  - almas
  - gentes
  rationale: El texto enumera miembros de una familia, no formula una doctrina sobre el alma. «Personas» evita cargar el versículo con un sentido antropológico que el hebreo aquí no pretende.
  doctrine_reference: Translation philosophy §1, §6
- issue: Mantener la expresión corporativa «casa de Jacob»
  english_pob_reading: house of Jacob
  chosen_spanish_reading: casa de Jacob
  alternative_spanish_readings:
  - familia de Jacob
  - linaje de Jacob
  rationale: La expresión conserva el carácter colectivo del conjunto que desciende a Egipto. Cambiarla por una paráfrasis más explicativa debilitaría la correspondencia textual.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El audit trail inglés mostró una oscilación entre «were two», «were two persons» y la restauración de «persons» para reflejar נֶפֶשׁ de manera consistente. En español se conserva explícitamente «dos personas» para mantener la equivalencia léxica y evitar perder el matiz censal que la revisión final quiso recuperar.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se prefirió «hijos de» sobre «niños de» o «descendientes de» por fidelidad genealógica y naturalidad.
  - Se usó «personas» de manera consistente en ambas cláusulas para reflejar el término de conteo hebreo נֶפֶשׁ.
  - La dirección «a Egipto» conserva la función del he direccional sin sobrerrepresentarla.
