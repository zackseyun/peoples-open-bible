translation:
  language: es
  text: Porque se burlaron y no tuvieron compasión, en ira y furor, con indignación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con resentimiento» o «con ira vengativa» para μηνίσεως.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: LSJ
  rationale: Introduce la causa o fundamento del enunciado previo. En español, «Porque» expresa con naturalidad la conexión causal manteniendo el valor explicativo del griego.
- source_word: ἐνέπαιξαν
  english_pob_choice: mocked
  chosen_spanish: se burlaron
  alternatives_spanish:
  - ridiculizaron
  - mofaron
  lexicon: LSJ
  rationale: El verbo comunica burla hostil o desprecio. «Se burlaron» es idiomático en español y conserva el tono de escarnio sin sobretraducir.
- source_word: οὐκ ἐφείσαντο
  english_pob_choice: did not spare
  chosen_spanish: no perdonaron
  alternatives_spanish:
  - no tuvieron piedad
  - no ahorraron
  - no se abstuvieron
  lexicon: LSJ
  rationale: El griego significa no ahorrar ni mostrar consideración. «No perdonaron» es una opción natural en español que conserva la dureza de la acción; se evita «tener piedad» porque puede desplazar el foco hacia compasión más que hacia el acto de ahorrar o spare.
- source_word: ἐν ὀργῇ
  english_pob_choice: in anger
  chosen_spanish: en ira
  alternatives_spanish:
  - con ira
  - en enojo
  lexicon: LSJ
  rationale: Mantiene el paralelismo preposicional del griego. «Ira» preserva un registro bíblico claro y el campo semántico de ὀργή.
- source_word: καὶ θυμῷ
  english_pob_choice: and wrath
  chosen_spanish: y furor
  alternatives_spanish:
  - y ira
  - y cólera
  lexicon: LSJ
  rationale: θυμός intensifica la reacción emocional. «Furor» comunica esa fuerza con un registro elevado y evita confundirlo con una mera repetición idéntica de «ira».
- source_word: μετὰ μηνίσεως
  english_pob_choice: with indignation
  chosen_spanish: con indignación
  alternatives_spanish:
  - con resentimiento
  - con rencor
  - con indignación vengativa
  lexicon: LSJ
  rationale: La revisión inglesa redujo la intensificación implícita para no añadir fuerza no explícita en μήνισις. «Indignación» refleja bien el resentimiento o enojo persistente sin exagerar el término.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «with fierce indignation» a «with indignation» para no atribuir a μήνισις una intensidad no explicitada. La traducción española sigue esa revisión y evita amplificar el adjetivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera, pero este versículo no lo contiene.
  - «Ira» y «furor» preservan la doble intensificación de ὀργῇ καὶ θυμῷ sin colapsarla en un solo término.
  - La nota de pie de página ofrece alternativas léxicas reales en español para μηνίσεως, en continuidad con el audit trail inglés.
