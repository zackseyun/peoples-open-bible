base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/002/042.yaml
  text: 'And the sons of Caleb the brother of Jerahmeel: Mesha his firstborn[a], who was the father of Ziph[b], and the sons of Mareshah the father of Hebron.'
  footnotes:
  - marker: a
    text: Hebrew syntax in the final clause is difficult. The Masoretic Text reads literally, 'and the sons of Mareshah, the father of Hebron.' Some understand this to mean 'Mareshah the father of Hebron,' while others retain the wording as translated.
    reason: alternative_reading
  - marker: b
    text: In Chronicles, 'father of' can denote not only a biological father but also an ancestor, clan head, or founder associated with a place.
    reason: cultural_note
