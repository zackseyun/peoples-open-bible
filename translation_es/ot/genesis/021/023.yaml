  text: וְ/עַתָּ֗ה הִשָּׁ֨בְעָ/ה לִּ֤/י בֵֽ/אלֹהִים֙ הֵ֔נָּה אִם תִּשְׁקֹ֣ר לִ֔/י וּ/לְ/נִינִ֖/י וּ/לְ/נֶכְדִּ֑/י כַּ/חֶ֜סֶד אֲשֶׁר עָשִׂ֤יתִי עִמְּ/ךָ֙ תַּעֲשֶׂ֣ה עִמָּדִ֔/י וְ/עִם הָ/אָ֖רֶץ אֲשֶׁר גַּ֥רְתָּה בָּֽ/הּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/021/023.yaml
  text: Now swear to me here by God that you will not deal falsely with me[a], or with my offspring, or with my posterity. According to the kindness that I have shown to you[c][b], you shall show to me and to the land where you have lived as a foreigner.
  footnotes:
  - marker: a
    text: Or 'you will not lie to me' / 'you will not break faith with me.' The Hebrew verb can denote false dealing in a broader relational sense, especially in oath contexts.
    reason: lexical_alternative
  - marker: b
    text: '''Kindness'' translates Hebrew hesed, which can also carry the sense of loyal love or covenant faithfulness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'where you have sojourned.' The Hebrew refers to living in a place as a resident foreigner.
    reason: lexical_alternative
