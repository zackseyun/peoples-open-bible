translation:
  language: es
  text: Y a toda persona judía que haya sido hecha cautiva de la tierra de Judá en cualquier parte de mi reino, la dejo en libertad, sin pago; y que todos también condonen los impuestos que recaen sobre ellos y sobre su ganado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también, “que todos condonen los impuestos y los de su ganado”. El griego puede entenderse como refiriéndose específicamente a impuestos cobrados sobre el ganado o, más ampliamente, a los impuestos sobre ellos y los gravámenes relacionados con sus bienes.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσαν ψυχὴν Ἰουδαίων
  english_pob_choice: every Jewish person
  chosen_spanish: toda persona judía
  alternatives_spanish:
  - todo judío
  - toda alma de los judíos
  lexicon: LSJ
  rationale: ψυχή en este tipo de contexto administrativo designa a la persona o individuo, no al alma en sentido interior. En español, 'persona judía' conserva el valor distributivo de πᾶσαν y evita una literalidad extraña como 'alma'.
- source_word: τὴν αἰχμαλωτισθεῖσαν
  english_pob_choice: who has been taken captive
  chosen_spanish: que haya sido hecha cautiva
  alternatives_spanish:
  - que haya sido capturada
  - que haya sido llevada cautiva
  lexicon: LSJ
  rationale: El participio expresa el estado de haber sido puesta en cautiverio. 'Hecha cautiva' comunica bien la pasividad y el resultado de la captura en español bíblico actual.
- source_word: ἀπὸ γῆς Ἰούδα
  english_pob_choice: from the land of Judah
  chosen_spanish: desde la tierra de Judá
  alternatives_spanish:
  - de la tierra de Judá
  - de Judea
  lexicon: LSJ
  rationale: γῆ es 'tierra' o 'territorio'. 'Judá' reproduce con mayor cercanía la forma griega que 'Judea', que sería más interpretativa.
- source_word: εἰς πᾶσαν βασιλείαν μου
  english_pob_choice: into any part of my kingdom
  chosen_spanish: hasta cualquier parte de mi reino
  alternatives_spanish:
  - en cualquier parte de mi reino
  - por todo mi reino
  lexicon: LSJ
  rationale: La expresión comunica dispersión o localización dentro del dominio real, no un movimiento hacia la institución de la realeza. 'Cualquier parte de mi reino' conserva ese alcance distributivo en español natural.
- source_word: ἀφίημι ἐλευθέραν δωρεάν
  english_pob_choice: I release as free, without payment
  chosen_spanish: la libero como libre, sin pago
  alternatives_spanish:
  - la dejo libre, gratuitamente
  - la pongo en libertad sin costo
  lexicon: LSJ
  rationale: ἀφίημι con ἐλευθέραν expresa manumisión o liberación; δωρεάν añade la idea de gratuidad. En español, 'la libero como libre' mantiene la repetición semántica del original y 'sin pago' hace explícita la ausencia de rescate o tarifa.
- source_word: πάντες ἀφιέτωσαν
  english_pob_choice: let all also remit
  chosen_spanish: que todos también condonen
  alternatives_spanish:
  - que todos también remitan
  - que todos también perdonen
  lexicon: LSJ
  rationale: En contexto fiscal, el verbo pide anular o dejar de exigir obligaciones. 'Condonen' funciona mejor que 'perdonen' para el registro de impuestos y evita la ambigüedad moral.
- source_word: τοὺς φόρους
  english_pob_choice: the taxes
  chosen_spanish: los impuestos
  alternatives_spanish:
  - los tributos
  - las cargas
  lexicon: LSJ
  rationale: '''φόροι'' alude a pagos fiscales o tributos. ''Impuestos'' es claro para el lector moderno y mantiene el sentido administrativo del decreto.'
- source_word: κτηνῶν αὐτῶν
  english_pob_choice: on their livestock
  chosen_spanish: sobre su ganado
  alternatives_spanish:
  - sobre sus animales
  - sobre su ganado y sus bestias
  lexicon: LSJ
  rationale: κτῆνος puede referirse a ganado o animales de carga. En este contexto, 'ganado' es una equivalencia natural en español; el plural posesivo singular ('su') refleja el valor colectivo.
translation_notes:
  revision_awareness: Esta redacción sigue el ajuste del POB inglés que amplía αὐτῶν para abarcar tanto a las personas como a su ganado, sin perder la posibilidad de una lectura más restringida del sintagma fiscal. Se mantuvo el tono administrativo del decreto y la gratuidad explícita de la liberación.
  spanish_consistency_notes:
  - Se conserva 'Judá' y no 'Judea' por fidelidad al griego γῆ Ἰούδα.
  - Se eligió 'impuestos' / 'condonen' para mantener el campo fiscal del contexto.
  - Se evitó 'alma' para ψυχή por la fuerza administrativa de la frase.
  - La expresión 'como libre' reproduce la redundancia semántica del original para no diluir el acto de manumisión.
