  to: El rey David ya era viejo[a], avanzado en días; y lo cubrieron con ropas, pero no podía entrar en calor.
  rationale: Se ajusta el tiempo verbal a la secuencia narrativa hebrea («lo cubrieron»), se mejora el registro con «ya era viejo», se reemplaza «vestidos» por «ropas» para un sentido más natural de בְּגָדִים, y se usa «entrar en calor» como español más idiomático para la incapacidad de calentarse. Se conserva «avanzado en días» con nota por trazabilidad al modismo hebreo y al audit trail inglés.
