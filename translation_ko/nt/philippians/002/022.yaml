id: PHP.2.22
reference: Philippians 2:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὴν δὲ δοκιμὴν αὐτοῦ γινώσκετε, ὅτι ὡς πατρὶ τέκνον σὺν ἐμοὶ ἐδούλευσεν εἰς τὸ εὐαγγέλιον.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/022.yaml
  text: 'But you know his proven character, that as a child with his father he served with me for the gospel.'
translation:
  language: ko
  text: 그러나 여러분은 그의 검증된 됨됨이[a]를 알고 있습니다. 자녀가 아버지와 함께하듯[b], 그는 나와 함께 복음을 위하여 섬겼습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「검증된 인격」. 헬라어 δοκιμή는 시련을 통해 입증된 성품을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 문자적으로는 「자녀가 아버지에게 하듯」.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_korean: 그러나
  alternatives_korean:
  - 그런데
  - 또한
  lexicon: BDAG
  rationale: 약한 대조·전환을 표시. 「그러나」가 자연스럽다.
- source_word: δοκιμὴν
  english_pob_choice: proven character
  chosen_korean: 검증된 됨됨이
  alternatives_korean:
  - 검증된 인격
  - 시련으로 입증된 성품
  - 됨됨이의 증거
  lexicon: BDAG
  rationale: 시련을 통해 입증된 성품을 가리킨다. 「됨됨이」가 한국어로 그 인격적 본질을 자연스럽게 담는다.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_korean: 그의
  lexicon: BDAG
  rationale: 디모데를 가리키는 소유 대명사.
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_korean: 알고 있다
  alternatives_korean:
  - 알다
  - 인지하다
  lexicon: BDAG
  rationale: 현재 직설법. 빌립보 성도가 이미 디모데에 대해 가지고 있는 앎을 「알고 있다」로 자연스럽게 표현한다.
- source_word: ὅτι
  english_pob_choice: that
  chosen_korean: ~ㅂ니다
  alternatives_korean:
  - 곧
  lexicon: BDAG
  rationale: 한국어로 자연스러운 흐름을 위해 새 문장으로 풀어 옮기고, 「알고 있다」 다음에 그 내용을 새 문장으로 제시한다.
- source_word: ὡς πατρὶ τέκνον
  english_pob_choice: like a child with his father
  chosen_korean: 자녀가 아버지와 함께하듯
  alternatives_korean:
  - 아들이 아버지와 하듯
  - 자녀가 아버지에게 하듯
  lexicon: BDAG
  rationale: τέκνον의 성중립적 의미를 보존하기 위해 「자녀」로 옮긴다. 「함께하듯」이 동행의 관계를 자연스럽게 담는다.
- source_word: σὺν ἐμοὶ
  english_pob_choice: with me
  chosen_korean: 나와 함께
  alternatives_korean:
  - 내 곁에서
  lexicon: BDAG
  rationale: 동역의 가까움을 「나와 함께」로 옮긴다.
- source_word: ἐδούλευσεν
  english_pob_choice: he served
  chosen_korean: 섬기다
  alternatives_korean:
  - 봉사하다
  - 종처럼 일하다
  lexicon: BDAG
  rationale: δοῦλος 어휘군과 연결되지만, 사역 문맥에서는 「섬기다」의 관용적 의미가 자연스럽다. 본 절은 1:1·2:7의 「노예」 결정과 달리 매임의 신학적 강조가 본문 흐름에 없으므로 「섬기다」를 택한다.
- source_word: εἰς τὸ εὐαγγέλιον
  english_pob_choice: for the gospel
  chosen_korean: 복음을 위하여
  alternatives_korean:
  - 복음을 향해
  - 복음의 일을 위하여
  lexicon: BDAG
  rationale: 목적·방향성을 자연스럽게 표현하면서 복음을 그 사역의 대상으로 분명히 한다.
