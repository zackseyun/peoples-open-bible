translation:
  language: es
  text: 'Y si él te dice[a]: «No saldré de ti», porque te ama y ama a tu familia[b], porque le va bien contigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «No me iré de ti» o «No me iré libre de ti». El hebreo dice literalmente: «No saldré de estar contigo».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «tu casa», en el sentido de tu unidad doméstica y las personas bajo tu cuidado, no solo el edificio.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y sucederá que, si
  - Y acontecerá que, si
  lexicon: HALOT
  rationale: La fórmula legal hebrea introduce una situación hipotética; en español jurídico y narrativo, 'Y si' comunica mejor la condición sin cargar con una calca incómoda de 'y sucederá que'.
- source_word: יֹאמַר אֵלֶיךָ
  english_pob_choice: he says to you
  chosen_spanish: él te dice
  alternatives_spanish:
  - te dijere
  - si él te dijera
  lexicon: HALOT
  rationale: En el marco casuístico, el imperfecto hebreo presenta un caso posible. 'Él te dice' mantiene la vivacidad directa del original y es natural en español bíblico contemporáneo.
- source_word: לֹא אֵצֵא
  english_pob_choice: I will not go out
  chosen_spanish: No saldré
  alternatives_spanish:
  - No saldré de
  - No me iré
  lexicon: HALOT
  rationale: La imagen literal es 'salir'; en este contexto legal se refiere a abandonar la condición y la casa del amo. 'No saldré' conserva el verbo base y permite que el contexto complete el sentido.
- source_word: מֵעִמָּךְ
  english_pob_choice: from you
  chosen_spanish: de junto a ti
  alternatives_spanish:
  - de ti
  - de tu lado
  lexicon: HALOT
  rationale: La preposición con עִם expresa separación de una relación de convivencia o cercanía, no solo distancia física. 'De junto a ti' conserva esa relación sin volverla demasiado explicativa.
- source_word: כִּי אֲהֵבְךָ
  english_pob_choice: because he loves you
  chosen_spanish: porque te ama a ti
  alternatives_spanish:
  - porque te quiere
  - ya que te ama
  lexicon: HALOT
  rationale: '''Amar'' es la correspondencia directa y digna para אֲהֵבְךָ. El pronombre explícito ''a ti'' refleja el énfasis del hebreo sin añadir información nueva.'
- source_word: וְאֶת בֵּיתֶךָ
  english_pob_choice: and your household
  chosen_spanish: y a tu casa
  alternatives_spanish:
  - y a tu hogar
  - y a tu familia
  lexicon: HALOT
  rationale: Aunque 'household' es la interpretación cultural del POB inglés, el hebreo dice literalmente 'tu casa'. En español, 'tu casa' puede abarcar la esfera doméstica y relacional; se mantiene la metáfora base sin forzar una glosa.
- source_word: כִּי טוֹב לוֹ עִמָּךְ
  english_pob_choice: because it is good for him with you
  chosen_spanish: porque le va bien contigo
  alternatives_spanish:
  - porque está bien contigo
  - porque le es bueno estar contigo
  lexicon: HALOT
  rationale: La construcción hebrea expresa bienestar o prosperidad en la relación. 'Le va bien contigo' reproduce ese valor idiomático de forma natural en español, sin perder la idea de beneficio y contentamiento.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés al preferir un equivalente más natural para לֹא אֵצֵא, evitando una paráfrasis excesiva. También conserva la tensión lexical de ‘salir’ como imagen legal y añade nota donde el hebreo admite una lectura más idiomática.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa un español bíblico moderno y sobrio, sin recurrir a fórmulas eclesiásticas tradicionales innecesarias.
  - Se conserva la metáfora de ‘salir’ con una nota explicativa, en línea con el audit trail inglés.
  - '''Casa'' se deja sin expandir en el texto principal para respetar la literalidad del hebreo, con aclaración cultural en nota.'
