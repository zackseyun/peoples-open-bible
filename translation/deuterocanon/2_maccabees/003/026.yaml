id: 2MA.3.26
reference: 2 Maccabees 3:26
source:
  edition: lxx-swete-1909
  text: ἕτεροι δὲ δύο ἐφάνησαν αὐτῷ νεανίαι τῇ ῥώμῃ μὲν ἐκπρεπεῖς, κάλλιστοι δὲ τὴν δόξαν, διαπρεπεῖς δὲ τὴν περιβολήν· οἵ καὶ παραστάντες ἐξ ἑκατέρου μέρους ἐμαστίγουν αὐτὸν ἀδιαλείπτως, πολλὰς ἐπιρριπτοῦντες αὐτῷ πληγάς.
  language: Greek
  pages:
  - 692
  confidence: high
  validation: agree
translation:
  text: But two other young men appeared to him[a], outstanding in strength, most handsome in appearance, and splendid in clothing; and standing on either side of him, they kept scourging him without stopping, landing many blows on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'most beautiful in bearing.' The Greek phrase literally links beauty with visible glory/appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι δὲ δύο
  chosen: But two other
  alternatives:
  - And two others
  - Then two other
  lexicon: LSJ
  rationale: ἕτεροι with δύο indicates two additional figures distinct from the horseman already described; δέ is rendered with a mild adversative/sequential 'But' that fits the narrative turn.
- source_word: ἐφάνησαν αὐτῷ
  chosen: appeared to him
  alternatives:
  - were seen by him
  - showed themselves to him
  lexicon: LSJ
  rationale: Aorist passive/deponent of φαίνω here has the common intransitive sense 'appeared.' 'To him' preserves αὐτῷ.
- source_word: νεανίαι
  chosen: young men
  alternatives:
  - youths
  - young warriors
  lexicon: LSJ
  rationale: The term denotes young men/youths. 'Young men' is natural modern English and avoids adding a military nuance not explicit in the noun itself.
- source_word: τῇ ῥώμῃ μὲν ἐκπρεπεῖς
  chosen: outstanding in strength
  alternatives:
  - distinguished in might
  - conspicuous in vigor
  lexicon: LSJ
  rationale: ῥώμη denotes bodily strength or might; ἐκπρεπής conveys being remarkable or outstanding. The phrase describes their impressive power.
- source_word: κάλλιστοι δὲ τὴν δόξαν
  chosen: most handsome in appearance
  alternatives:
  - very beautiful in splendor
  - most beautiful in bearing
  lexicon: LSJ
  rationale: Though δόξα often means glory/reputation, in this descriptive context with bodily and clothing features it refers to outward appearance or bearing. 'Most handsome in appearance' captures the superlative κάλλιστοι and the visible sense of the phrase.
- source_word: διαπρεπεῖς δὲ τὴν περιβολήν
  chosen: splendid in clothing
  alternatives:
  - distinguished in attire
  - magnificent in dress
  lexicon: LSJ
  rationale: περιβολή refers to clothing/attire; διαπρεπής means eminent or splendid. The phrase highlights their striking dress.
- source_word: οἵ καὶ παραστάντες ἐξ ἑκατέρου μέρους
  chosen: and standing on either side of him
  alternatives:
  - who also, having taken their stand on each side
  - and after stationing themselves on both sides
  lexicon: LSJ
  rationale: The participle παραστάντες is rendered adverbially. ἐξ ἑκατέρου μέρους means from each side, idiomatically 'on either side of him.' 'Of him' is supplied from context since αὐτόν follows immediately as the object of the beating.
- source_word: ἐμαστίγουν αὐτὸν ἀδιαλείπτως
  chosen: they kept scourging him without stopping
  alternatives:
  - they were whipping him continually
  - they flogged him incessantly
  lexicon: LSJ
  rationale: Imperfect ἐμαστίγουν suggests ongoing action; μαστιγόω is stronger than a generic 'beat,' hence 'scourging.' ἀδιαλείπτως is 'unceasingly/without stopping.'
- source_word: πολλὰς ἐπιρριπτοῦντες αὐτῷ πληγάς
  chosen: landing many blows on him
  alternatives:
  - inflicting many strokes on him
  - hurling many lashes upon him
  lexicon: LSJ
  rationale: The participle explains the manner of the scourging. πληγαί are blows/strokes. ἐπιρρίπτω literally 'throw upon' is idiomatically rendered 'landing' or 'inflicting' in English.
