translation:
  language: es
  text: '¿Cómo pueden decir: «Nosotros somos sabios, y la ley de Yahvé está con nosotros»? Pero, miren, la pluma mentirosa de los escribas la ha convertido en mentira[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente, he aquí, la pluma de los escribas ha producido falsedad», o «la pluma falsa de los escribas ha obrado falsamente». El hebreo es compacto y permite más de una manera de expresar la falsificación de los escribas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  english_pob_choice: How can
  chosen_spanish: ¿Cómo pueden decir
  alternatives_spanish:
  - ¿Cómo pueden
  - ¿Por qué pueden decir
  lexicon: HALOT
  rationale: La forma hebrea introduce una pregunta retórica de reproche e incredulidad. En español, «¿Cómo pueden decir...?» conserva ese tono natural y explícito sin volverla más interpretativa de lo que exige el hebreo.
- source_word: חֲכָמִים אֲנַחְנוּ
  english_pob_choice: We are wise
  chosen_spanish: «Nosotros somos sabios»
  alternatives_spanish:
  - «Somos sabios»
  - «Nos consideramos sabios»
  lexicon: HALOT
  rationale: חכמים afirma una pretensión de sabiduría. «Somos sabios» reproduce el reclamo de manera directa y sobria; no se introduce matiz reflexivo que el hebreo no requiere.
- source_word: תּוֹרַת יְהוָה
  english_pob_choice: the law of Yahweh
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la instrucción de Yahvé
  - la ley de Yahveh
  lexicon: HALOT
  rationale: En Jeremías, תּוֹרָה puede abarcar «ley» e «instrucción», pero aquí el contexto polémico sobre la posesión y manipulación del texto favorece «ley» por su fuerza covenantal y reconocibilidad. Se mantiene «Yahvé» por la norma del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se preserva el nombre divino en la forma base del proyecto. «Yahvé» es la opción establecida para el Tetragrámaton en el texto principal, no una sustitución por título.
- source_word: אָכֵן הִנֵּה
  english_pob_choice: But behold
  chosen_spanish: 'Pero, mirad:'
  alternatives_spanish:
  - 'Pero, ved:'
  - 'Pero, ciertamente, mirad:'
  lexicon: HALOT
  rationale: La secuencia marca un giro enfático y deíctico. «Pero, mirad» comunica la corrección enfática del original con un registro claro y publicable en español; el dos puntos ayuda a marcar el golpe retórico.
- source_word: לַשֶּׁקֶר עָשָׂה
  english_pob_choice: has made it a lie
  chosen_spanish: la ha convertido en mentira
  alternatives_spanish:
  - la ha hecho mentira
  - la ha hecho un engaño
  lexicon: HALOT
  rationale: El resultado del acto scribal se expresa en español de manera natural con «ha convertido ... en mentira», conservando el valor resultativo de עשה sin forzar una estructura poco idiomática.
- source_word: עֵט
  english_pob_choice: pen
  chosen_spanish: la pluma
  alternatives_spanish:
  - el cálamo
  - el instrumento de escribir
  lexicon: HALOT
  rationale: El término designa un utensilio de escritura. «Pluma» es el equivalente accesible y digno en español; «cálamo» sería más técnico, pero menos transparente para lectura general.
- source_word: שֶׁקֶר סֹפְרִים
  english_pob_choice: the lying pen of the scribes
  chosen_spanish: la pluma mentirosa de los escribas
  alternatives_spanish:
  - la pluma falsa de los escribas
  - la pluma de los escribas, falsa
  lexicon: HALOT
  rationale: Se toma שקר como adjetivo caracterizador de la pluma, siguiendo la lectura principal de la POB inglesa. «Mentirosa» conserva la personificación retórica y el juego de repetición con «mentira» al final del versículo.
theological_decisions:
- issue: Representación del Tetragrámaton en un dicho profético de denuncia
  english_pob_reading: the law of Yahweh
  chosen_spanish_reading: la ley de Yahvé
  alternative_spanish_readings:
  - la instrucción de Yahvé
  rationale: 'Se mantiene el nombre divino en lugar de una sustitución por título, conforme al criterio del proyecto. «Ley» preserva mejor el peso pactual y polémico del contexto: el pueblo afirma tener la תורה de Yahvé mientras la escritura de los escribas la desfigura.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Traducción del cierre sobre la falsificación scribal
  english_pob_reading: the lying pen of the scribes has made it a lie
  chosen_spanish_reading: la pluma mentirosa de los escribas la ha convertido en mentira
  alternative_spanish_readings:
  - la pluma falsa de los escribas la ha hecho mentira
  - la pluma de los escribas ha obrado falsamente
  rationale: 'El hebreo es compacto y permite varias disposiciones sintácticas. La lectura elegida conserva la acusación contra los escribas y el efecto resultativo sobre el objeto implícito del discurso: lo que debía ser la ley termina convertido en mentira.'
  doctrine_reference: POB lexical policy on compressed Hebrew constructions and textual falsification
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una redacción más libre («But look... has made it into a lie») a una forma más literal y formal («But behold... has made it a lie»). El español sigue esa revisión con un giro enfático equivalente («Pero, mirad:») y mantiene el resultado simple «la ha convertido en mentira», evitando una expansión innecesaria. También se preserva la tensión textual entre una traducción resultativa directa y la posibilidad alternativa de leer la sintaxis hebrea de manera ligeramente distinta.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, según el estándar del proyecto.
  - Se prefiere «ley» para תּוֹרָה en este contexto polémico, sin anular el valor de «instrucción» que queda consignado como alternativa.
  - «Escribas» se mantiene por ser el término natural y contextual en español para סֹפְרִים.
  - La imagen final conserva el contraste semántico entre «mentirosa» y «mentira», reproduciendo el juego de שקר del hebreo.
