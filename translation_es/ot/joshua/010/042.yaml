translation:
  language: es
  text: Josué capturó a todos estos reyes y sus tierras en una sola ocasión[a], porque Yahvé, el Dios de Israel, combatió por Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en una sola campaña». El hebreo dice literalmente «en una sola ocasión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכַד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  - conquistó
  lexicon: HALOT
  rationale: El verbo expresa tomar o apoderarse militarmente. «Capturó» conserva ese sentido sin ir más allá y sin convertir el resultado en algo más interpretativo que el verbo hebreo.
- source_word: וְאֵת כָּל הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: all these kings
  chosen_spanish: a todos estos reyes
  alternatives_spanish:
  - a todos estos reyes aquí
  - a todos los reyes éstos
  lexicon: HALOT
  rationale: La frase marcada de objeto directo se rinde de manera natural en español con el acusativo personal ante seres animados. «Estos» refleja el demostrativo sin añadir énfasis extraño.
- source_word: וְאֶת אַרְצָם
  english_pob_choice: and their land
  chosen_spanish: y su tierra
  alternatives_spanish:
  - y su país
  - y su territorio
  lexicon: HALOT
  rationale: «Tierra» reproduce el rango semántico amplio de אֶרֶץ y funciona mejor que «país» en este contexto militar y territorial. «Su» conserva la referencia colectiva a los reyes.
- source_word: פַּעַם אֶחָת
  english_pob_choice: at one time
  chosen_spanish: de una sola vez
  alternatives_spanish:
  - en una sola campaña
  - de una vez
  - en una ocasión
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «una vez». En el contexto narrativo puede entenderse como una sola acción/campaña. «De una sola vez» mantiene el idiomático sin forzar una paráfrasis más amplia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en hebreo se vierte de forma directa e idiomática. «Dios» corresponde al sustantivo teológico central sin necesidad de matices adicionales.
- source_word: נִלְחָם לְיִשְׂרָאֵל
  english_pob_choice: fought for Israel
  chosen_spanish: peleó por Israel
  alternatives_spanish:
  - luchó por Israel
  - combatió por Israel
  - estuvo peleando por Israel
  lexicon: HALOT
  rationale: El verbo en esta construcción expresa combatir en favor de alguien. «Peleó por Israel» es claro, natural y mantiene el sentido de acción bélica en beneficio de Israel sin volverlo más formal de lo necesario.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. En español se mantiene el nombre propio divino como «Yahvé», según la convención del proyecto, para no ocultarlo tras una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Sentido de la victoria: acción humana con apoyo divino'
  english_pob_reading: Joshua captured ... because Yahweh ... fought for Israel.
  chosen_spanish_reading: Josué capturó ... porque Yahvé ... peleó por Israel.
  alternative_spanish_readings:
  - Josué conquistó ... porque Yahvé ... peleó por Israel.
  - Josué tomó ... porque Yahvé ... luchó por Israel.
  rationale: La forma hebrea atribuye la captura a Josué y, a la vez, fundamenta el éxito en la intervención de Yahvé. La traducción conserva ambas afirmaciones sin fusionarlas ni desplazar el agente humano.
  doctrine_reference: Narrative agency in Joshua 10:42
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con la revisión más reciente; no se documentaron cambios necesarios en la auditoría inglesa, y la propuesta española sigue de cerca esa lectura sin introducir variantes interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme a la terminología base del proyecto.
  - «Tierra» se usa en sentido territorial amplio, no como simple suelo físico.
  - «Peleó» conserva el matiz de combate en favor de Israel y evita suavizar la fuerza militar del hebreo.
  - La nota textual/lexical en la marca [a] preserva la alternativa inglesa «in one campaign» como posibilidad interpretativa válida.
