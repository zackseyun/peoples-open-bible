revisions:
- from: Ahora bien, después de la muerte de Saúl, cuando David había vuelto de derribar[a] a Amalec, David se quedó en Siclag dos días.
  to: Ahora bien, después de la muerte de Saúl, cuando David volvió de derrotar[a] a Amalec, David se quedó en Siclag dos días.
  rationale: Se ajusta la sintaxis temporal a un español más natural y se reemplaza «derribar» por «derrotar» para evitar una expresión poco idiomática con objeto colectivo humano. Se conserva «Amalec» con nota para respetar la decisión documentada sobre el etnónimo singular colectivo, y se mantiene «Siclag» como forma española aceptable.
