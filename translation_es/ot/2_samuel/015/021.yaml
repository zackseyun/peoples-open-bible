translation:
  language: es
  text: 'Entonces Ittai respondió al rey y dijo[a]: «Tan cierto como que vive Yahvé, y como que vive mi señor el rey, ciertamente dondequiera que esté mi señor el rey, sea para muerte o para vida, allí estará tu siervo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Fórmula hebrea de juramento: «Tan cierto como que vive Yahvé, y como que vive mi señor el rey».'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En español, «respondió» mantiene el valor narrativo de réplica inmediata en diálogo formal. «Contestó» también sería posible, pero «respondió» suena más sobrio y se ajusta bien al tono del relato.
- source_word: אִתַּי
  english_pob_choice: Ittai
  chosen_spanish: Ittai
  alternatives_spanish:
  - Itai
  lexicon: transliteración propia
  rationale: Se conserva el nombre personal en transliteración, siguiendo la política del proyecto y la forma establecida en el contexto auditado.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El título real definido se traduce literalmente como «el rey», que es natural y preciso en español bíblico.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Tan cierto como vive Yahvé
  - Por la vida de Yahvé
  lexicon: HALOT
  rationale: La fórmula hebrea de juramento se expresa con el sentido vivo y solemne del original. «Vive Yahvé» preserva la estructura breve del juramento sin ocultar el nombre divino.
- source_word: וְחֵי אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: and as my lord the king lives
  chosen_spanish: y vive mi señor el rey
  alternatives_spanish:
  - y por la vida de mi señor el rey
  - y vive el rey, mi señor
  lexicon: HALOT
  rationale: Se conserva el paralelismo juramentario. «Mi señor el rey» refleja el hebreo אֲדֹנִי הַמֶּלֶךְ con la relación de deferencia del hablante hacia el rey.
- source_word: כִּי אִם
  english_pob_choice: surely
  chosen_spanish: que
  alternatives_spanish:
  - ciertamente
  - seguramente
  lexicon: HALOT
  rationale: En este contexto la secuencia funciona como introducción enfática de la declaración; en español se integra de forma fluida con «que», evitando forzar un adverbio que no añade claridad. La fuerza asseverativa queda sostenida por el juramento previo.
- source_word: בִּמְקוֹם אֲשֶׁר יִהְיֶה שָּׁם
  english_pob_choice: in whatever place ... may be
  chosen_spanish: en el lugar donde esté
  alternatives_spanish:
  - dondequiera que esté
  - en cualquier lugar donde esté
  lexicon: HALOT
  rationale: El hebreo expresa localización abierta. «En el lugar donde esté» es fiel y natural; el sentido de cualquier ubicación queda claro por el contexto.
- source_word: אִם לְמָוֶת אִם לְחַיִּים
  english_pob_choice: whether for death or for life
  chosen_spanish: sea para muerte o para vida
  alternatives_spanish:
  - ya sea para muerte o para vida
  - tanto para muerte como para vida
  lexicon: HALOT
  rationale: La pareja hebrea abarca ambos resultados posibles. «Sea para muerte o para vida» conserva el giro disyuntivo y la amplitud de compromiso del original.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí el término es una auto-designación deferente ante el rey. «Tu siervo» mantiene el registro reverencial del español bíblico sin introducir la dureza de «esclavo», que no es el matiz dominante en este contexto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto en español, se traduce como «Yahvé» para preservar el nombre del pacto y evitar la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de juramento con paralelismo teológico-reverencial
  english_pob_reading: As Yahweh lives, and as my lord the king lives
  chosen_spanish_reading: Vive Yahvé, y vive mi señor el rey
  alternative_spanish_readings:
  - Tan cierto como vive Yahvé, y como vive mi señor el rey
  - Por la vida de Yahvé, y por la vida de mi señor el rey
  rationale: La fórmula hebrea no es una simple afirmación, sino un juramento. La versión española preserva esa función solemne y el paralelismo entre Dios y el rey, sin homogeneizarlo a una paráfrasis más débil.
  doctrine_reference: 'DOCTRINE.md: Oaths and solemn formulas'
- issue: עַבְדֶּךָ como auto-designación ante autoridad
  english_pob_reading: your servant
  chosen_spanish_reading: tu siervo
  alternative_spanish_readings:
  - tu esclavo
  - tu servidor
  rationale: En este contexto el hablante se presenta con deferencia ante el rey. «Siervo» mantiene la cortesía reverencial propia del pasaje y evita una lectura excesivamente fuerte de estatus servil.
  doctrine_reference: 'DOCTRINE.md: Context-sensitive rendering of δοῦλος/עבד'
translation_notes:
  revision_awareness: La revisión auditada indica que el texto base no requirió cambios sustanciales; esta versión española sigue de cerca el hebreo y conserva el paralelismo juramentario y la referencia explícita a Yahvé conforme al criterio doctrinal del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, coherente con el estándar español del proyecto.
  - Se conserva el nombre propio «Ittai» sin adaptar a grafía castellana alternativa, por consistencia con el contexto auditado.
  - Se mantiene «tu siervo» para עַבְדֶּךָ, en línea con el valor deferente del pasaje y con el tratamiento contextual del término.
  - La puntuación reproduce una cita directa con inciso narrativo, manteniendo claridad y reverencia.
  - No se introducen equivalentes litúrgicos tradicionales como «SEÑOR», para evitar ocultar el nombre divino presente en el hebreo.
