translation:
  language: es
  text: Hemos pecado con nuestros padres[a]; hemos hecho mal[b]; hemos obrado perversamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con nuestros antepasados'. El hebreo dice literalmente 'nuestros padres'.
    reason: lexical_alternative
  - marker: b
    text: O 'hemos cometido iniquidad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאנוּ
  english_pob_choice: we have sinned
  chosen_spanish: Hemos pecado
  alternatives_spanish:
  - Hemos cometido pecado
  - Hemos pecado contra Dios
  lexicon: HALOT
  rationale: El perfecto hebreo confiesa una acción completa con vigencia presente; en español, el pretérito perfecto compuesto expresa bien esa confesión penitencial. 'Pecar' mantiene el valor moral y es natural en registro bíblico-culto.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - al lado de
  lexicon: HALOT
  rationale: La preposición indica asociación/solidaridad con los padres en la culpa. 'Con' es la opción más directa y formal en español, sin añadir matices que el hebreo no exige.
- source_word: אֲבוֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros ancestros
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'nuestros padres'. Se conserva el parentesco masculino por fidelidad lexical; 'antepasados' es posible por sentido, pero atenúa la literalidad del término.
- source_word: הֶעֱוִינוּ
  english_pob_choice: we have done wrong
  chosen_spanish: hemos hecho lo malo
  alternatives_spanish:
  - hemos cometido iniquidad
  - hemos obrado mal
  lexicon: HALOT
  rationale: El verbo expresa torcerse o actuar perversamente/incorrectamente. 'Hacer lo malo' comunica la fuerza moral en español actual sin cargar el texto con tecnicismos; también preserva la progresión confesional.
- source_word: הִרְשָׁעְנוּ
  english_pob_choice: we have acted wickedly
  chosen_spanish: hemos obrado perversamente
  alternatives_spanish:
  - hemos obrado malvadamente
  - hemos actuado impíamente
  lexicon: HALOT
  rationale: Este verbo intensifica la culpa hacia la impiedad o perversidad. 'Obrado perversamente' mantiene la fuerza verbal y la escalada retórica del paralelismo final.
theological_decisions:
- issue: Solidaridad corporativa en la confesión
  english_pob_reading: 'The speaker confesses sin in continuity with prior generations: ''with our fathers.'''
  chosen_spanish_reading: La confesión incluye a la generación presente en continuidad y solidaridad con los padres.
  alternative_spanish_readings:
  - Como nuestros padres
  - igual que nuestros padres
  rationale: '''Con nuestros padres'' refleja asociación compartida, no solo comparación. La traducción preserva la confesión corporativa y transgeneracional sin convertirla en una tesis doctrinal externa al versículo.'
  doctrine_reference: Translation philosophy §§3–4
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas al texto mediante [a] y [b], manteniendo la tríada confesional y la lectura directa de עִם como 'con'.
  spanish_consistency_notes:
  - Se mantuvo 'padres' para reflejar el hebreo literal, con alternativa explicada en nota.
  - Se evitó 'SEÑOR' y cualquier sustitución litúrgica porque no aparece el Tetragrámaton en este versículo.
  - '''Pecado'', ''hacer lo malo'' y ''obrar perversamente'' conservan la progresión intensiva de tres verbos distintos.'
  - El registro es bíblico pero moderno, apto para lectura pública en español.
