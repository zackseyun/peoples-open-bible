revisions:
- from: Pero los ojos de los impíos se agotarán[a], y el refugio perecerá de ellos, y su esperanza será el exhalar de la vida.
  to: Pero los ojos de los impíos se agotarán[a], el refugio les desaparecerá, y su esperanza será la exhalación de la vida.
  rationale: Se ajusta la sintaxis de מִנְהֶם para un español natural y fiel ('les desaparecerá'), y se sustituye 'el exhalar de la vida' por 'la exhalación de la vida' para preservar la imagen hebrea con mejor legibilidad. Se mantiene 'refugio' conforme a la revisión inglesa documentada y la nota recoge la alternativa principal para el verbo con 'ojos'.
