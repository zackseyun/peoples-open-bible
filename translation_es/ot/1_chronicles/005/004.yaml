translation:
  language: es
  text: 'Los hijos de Joel: Semaías su hijo[a], Gog su hijo, Simei su hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Joel». La fórmula genealógica hebrea a veces puede señalar una descendencia más amplia, pero la cadena repetida de «su hijo» aquí favorece una línea directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, el plural constructo de בֵּן se vierte de manera directa como «hijos de». Mantiene el valor genealógico inmediato que el audit trail inglés también privilegia, sin ampliar innecesariamente a «descendientes».
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  lexicon: Nombre propio
  rationale: Nombre propio transliterado en su forma bíblica establecida en español.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Semaia
  lexicon: Nombre propio
  rationale: Se usa la forma bíblica tradicional en español, «Semaías», que corresponde al nombre hebreo y es más reconocible en lectura eclesial que una transliteración más cercana al inglés.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona masculina singular expresa filiación directa. En español, «su hijo» conserva esa relación con naturalidad y sin perder la fuerza genealógica.
- source_word: גּוֹג
  english_pob_choice: Gog
  chosen_spanish: Gog
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de forma directa.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simei
  alternatives_spanish:
  - Shimei
  lexicon: Nombre propio
  rationale: Se adopta la forma bíblica usual en español, «Simei», por consistencia con el uso hispano de nombres propios bíblicos.
theological_decisions:
- issue: Alcance de la fórmula genealógica «hijos de»
  english_pob_reading: The sons of Joel ... with repeated 'his son' supporting a direct line, though 'descendants of' is possible in some genealogies.
  chosen_spanish_reading: Los hijos de Joel ... con la repetición de «su hijo» que apoya una línea genealógica directa.
  alternative_spanish_readings:
  - Los descendientes de Joel ...
  rationale: La repetición de los vínculos filiativos en el hebreo favorece una lectura de descendencia inmediata. Por eso se conserva «hijos de» en el encabezado y «su hijo» en la cadena, sin diluir la relación en una noción más amplia.
  doctrine_reference: Ninguna; decisión de alcance genealógico y semántico.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: no se registran revisiones textuales ni variantes en la edición de trabajo. La traducción conserva la secuencia genealógica inmediata y la lectura directa de la filiación.'
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico breve y paratáctico propio del versículo.
  - Se emplean nombres bíblicos estándar en español para facilitar la lectura eclesial sin perder correspondencia con el hebreo.
  - 'La nota a pie de página marca la única ambigüedad lexical documentada: «hijos» frente a «descendientes».'
