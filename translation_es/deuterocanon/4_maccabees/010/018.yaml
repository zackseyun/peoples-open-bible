translation:
  language: es
  text: 'Pero él dijo[a]: «Aunque quites el instrumento de la voz, Dios escucha a los que guardan silencio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el instrumento de la voz». La expresión probablemente se refiere al órgano corporal usado para hablar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἂν ἀφέλῃς
  english_pob_choice: Even if you take away
  chosen_spanish: Aunque quites
  alternatives_spanish:
  - Incluso si quitas
  - Aunque retires
  lexicon: LSJ
  rationale: Κἂν introduce una concesión; en español, «aunque» comunica bien la relación concesiva sin sonar forzado. ἀφέλῃς expresa quitar o remover algo, y «quites» mantiene la fuerza de privación en un registro natural.
- source_word: τὸ τῆς φωνῆς ὄργανον
  english_pob_choice: the instrument of speech
  chosen_spanish: el instrumento de la voz
  alternatives_spanish:
  - el órgano de la voz
  - el instrumento del habla
  - el órgano del habla
  lexicon: LSJ
  rationale: ὄργανον es literalmente «instrumento» o «herramienta», y φωνή aquí apunta a la capacidad de emitir voz. «Instrumento de la voz» preserva la metáfora y el carácter corporal sin precisar indebidamente qué órgano se tiene en vista.
- source_word: φωνή
  english_pob_choice: speech
  chosen_spanish: la voz
  alternatives_spanish:
  - el habla
  - la palabra
  lexicon: LSJ
  rationale: Aunque el inglés POB optó por «speech» para aclarar la función, en español «voz» conserva mejor la imagen del texto griego dentro de «instrumento de la voz». Aquí no se debe normalizar a «habla» porque el original mantiene una expresión corporal/metafórica.
- source_word: σιωπώντων
  english_pob_choice: those who are silent
  chosen_spanish: los que guardan silencio
  alternatives_spanish:
  - los silenciosos
  - los que callan
  - los que están callados
  lexicon: LSJ
  rationale: El participio sustantivado significa los que están en silencio o callan. «Los que guardan silencio» es idiomático, claro y conserva la idea de una condición real de silencio, no una cualidad abstracta.
- source_word: ἀκούει
  english_pob_choice: hears those who are silent
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - escucha a
  lexicon: LSJ
  rationale: El verbo griego es ἀκούει, «oír/escuchar». En español, «escucha» funciona con naturalidad y puede regir implícitamente el complemento humano; aquí se completa con «a los que guardan silencio» para evitar ambigüedad.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: LSJ
  rationale: La referencia es al sujeto teísta estándar; «Dios» es la forma normal y fiel en español, sin necesidad de añadir artículo.
theological_decisions:
- issue: Si el griego afirma que Dios oye a personas silenciosas o una oración no pronunciada
  english_pob_reading: God hears those who are silent
  chosen_spanish_reading: Dios escucha a los que guardan silencio
  alternative_spanish_readings:
  - Dios escucha el silencio
  - Dios escucha aun las oraciones silenciosas
  rationale: El griego dice explícitamente «de los que callan / están en silencio» (σιωπώντων), no «oraciones». La traducción conserva esa afirmación directa y deja la implicación devocional sin convertirla en paráfrasis.
  doctrine_reference: Preservar la tensión teológica del original y no introducir una explicación interpretativa no presente en el griego.
translation_notes:
  revision_awareness: 'El draft sigue la última revisión del POB inglés: se conserva la afirmación directa sobre los que guardan silencio, sin añadir un segundo «incluso» o una glosa sobre oraciones silenciosas. La solución española mantiene la concesión inicial con «Aunque» y la clausula final con una relación natural entre Dios y los que callan.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el texto griego nombra a ὁ θεός y no a κύριος.
  - Se prefirió «Dios» sin artículo por naturalidad y fidelidad.
  - «Instrumento de la voz» conserva la metáfora corporal sin sobreespecificar «lengua» o «garganta».
  - «Los que guardan silencio» mantiene el participio sustantivado de manera comprensible y sobria.
