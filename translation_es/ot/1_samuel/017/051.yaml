  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Campeón» concuerda con la decisión auditada para גִּבּוֹרָם; «filisteo», «espada», «vaina», «mató» y «huyeron» están bien. No hay términos teológicos sensibles en este versículo.
