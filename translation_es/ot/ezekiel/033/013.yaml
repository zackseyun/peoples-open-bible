  text: בְּ/אָמְרִ֤/י לַ/צַּדִּיק֙ חָיֹ֣ה יִֽחְיֶ֔ה וְ/הֽוּא בָטַ֥ח עַל צִדְקָת֖/וֹ וְ/עָ֣שָׂה עָ֑וֶל כָּל צדקת/ו לֹ֣א תִזָּכַ֔רְנָה וּ/בְ/עַוְל֥/וֹ אֲשֶׁר עָשָׂ֖ה בּ֥/וֹ יָמֽוּת־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/013.yaml
  text: When I say to the righteous man[a], ‘He shall surely live,’ and he trusts in his righteousness and does injustice, none of his righteous deeds will be remembered[b], but by the injustice that he has done he shall die.
  footnotes:
  - marker: a
    text: Or, 'all his righteousness shall not be remembered.' The Hebrew plural can denote his righteous acts collectively.
    reason: lexical_alternative
  - marker: b
    text: Or, 'in it he shall die' or 'because of it he shall die,' referring to the injustice he has done.
    reason: lexical_alternative
