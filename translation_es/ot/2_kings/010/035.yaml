review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la fórmula regia de muerte, el entierro en Samaria y la sucesión filial. Sin embargo, «reinó en su lugar» debilita la decisión documentada de וַיִּמְלֹךְ como aviso de acceso al trono («became king») más que de duración del reinado. El resto de los elementos fuente están bien preservados.
  spanish_quality_summary: 'El español es claro y digno, pero la conjunción inicial repetida «Y» suena algo calcada en español moderno; aun así no es un error grave. El ajuste principal es preferir una formulación de acceso al trono más precisa y natural: «llegó a ser rey» o «se convirtió en rey». Se conserva bien «se acostó con sus padres» dentro de la fórmula tradicional.'
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo nombres propios. «Jehú» y «Joacaz» son aceptables en español bíblico. La principal desalineación no es de glosario sino de decisión léxica auditada: וַיִּמְלֹךְ debe reflejar acceso al trono, no simplemente «reinó».'
  issues:
  - severity: medium
    issue: «reinó en su lugar» para וַיִּמְלֹךְ תַּחְתָּיו
    rationale: El hebreo en esta fórmula sucesoria señala la entronización/acceso al trono. La auditoría inglesa lo documenta explícitamente como «became king in his place». «Reinó» puede leerse como resumen de todo el período de gobierno y atenúa la transición inmediata.
  - severity: low
    issue: Calco sintáctico con doble «Y» inicial
    rationale: No es infiel, pero en español bíblico moderno puede leerse con más naturalidad omitiendo la segunda conjunción inicial sin pérdida de sentido ni de solemnidad.
  revised_spanish_text: Y Jehú se acostó con sus padres, y lo sepultaron en Samaria. Joacaz, su hijo, llegó a ser rey en su lugar.
  revision_rationale: Se cambia «reinó» por «llegó a ser rey» para preservar la fuerza de acceso al trono de וַיִּמְלֹךְ en una fórmula de sucesión. También se alisa levemente el español suprimiendo la segunda «Y» inicial, sin afectar el sentido fuente. No se requieren notas al pie.
