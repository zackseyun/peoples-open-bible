translation:
  language: es
  text: 'Salgan de Babilonia[a]; huyan de los caldeos. Declaren esto con grito de júbilo; háganlo oír; publíquenlo hasta el fin de la tierra. Digan[b]: «Yahvé ha redimido a su siervo Jacob».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Caldea»; el hebreo nombra al pueblo, «los caldeos».
    reason: lexical_alternative
  - marker: b
    text: O «hasta los confines de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: צְאוּ
  english_pob_choice: Go out
  chosen_spanish: Salgan
  alternatives_spanish:
  - Salgan afuera
  - Salgan de allí
  lexicon: HALOT
  rationale: El imperativo plural de יצא pide salida efectiva. «Salgan» es natural en español y conserva la dirección del mandato sin añadir matices ajenos.
- source_word: מִבָּבֶל
  english_pob_choice: from Babylon
  chosen_spanish: de Babilonia
  alternatives_spanish:
  - desde Babilonia
  lexicon: HALOT
  rationale: La preposición expresa el punto de salida. «De Babilonia» es la forma más directa y pública en español.
- source_word: בִּרְחוּ
  english_pob_choice: flee
  chosen_spanish: huyan
  alternatives_spanish:
  - escapen
  - corran
  lexicon: HALOT
  rationale: ברח implica huida urgente. «Huyan» conserva mejor la fuerza imperativa que alternativas más suaves como «salgan» o «aléjense».
- source_word: מִכַּשְׂדִּים
  english_pob_choice: from the Chaldeans
  chosen_spanish: de los caldeos
  alternatives_spanish:
  - de Caldea
  lexicon: HALOT
  rationale: El hebreo nombra al pueblo, no a la tierra. «De los caldeos» sigue con precisión la forma plural del original; se mantiene así la referencia étnica/geopolítica del texto.
- source_word: בְּקוֹל רִנָּה
  english_pob_choice: with a shout of joy
  chosen_spanish: con grito de júbilo
  alternatives_spanish:
  - con voz de alegría
  - con exclamación gozosa
  lexicon: HALOT
  rationale: La expresión denota proclamación audible y festiva. «Grito de júbilo» mantiene el componente vocal y celebratorio sin sonar arcaico.
- source_word: הַגִּידוּ
  english_pob_choice: Declare
  chosen_spanish: Declárenlo
  alternatives_spanish:
  - Anúncienlo
  - Díganlo
  lexicon: HALOT
  rationale: El verbo exige proclamación pública. «Declárenlo» conserva el registro profético y el objeto implícito del anuncio en el contexto.
- source_word: הַשְׁמִיעוּ
  english_pob_choice: make it heard
  chosen_spanish: háganlo oír
  alternatives_spanish:
  - háganlo escuchar
  - proclámenlo
  lexicon: HALOT
  rationale: El hiphil de שמע es causativo. «Háganlo oír» preserva esa fuerza de hacer llegar el mensaje, en paralelo con el inglés auditado.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: lo
  alternatives_spanish:
  - esto
  lexicon: HALOT
  rationale: Aunque el hebreo usa demostrativo femenino, en español la referencia inmediata al mensaje se expresa con pronombre neutro/objetual según el flujo idiomático. El contexto deja claro que se trata del anuncio.
- source_word: הוֹצִיאוּהָ
  english_pob_choice: send it out
  chosen_spanish: llévenlo
  alternatives_spanish:
  - sáquenlo
  - difúndanlo
  lexicon: HALOT
  rationale: El verbo hiphil de יצא con sufijo femenino apunta a la difusión del mensaje. «Llévenlo» funciona como español natural para la circulación pública de la noticia, manteniendo el impulso de extenderla ampliamente.
- source_word: עַד קְצֵה הָאָרֶץ
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el fin de la tierra
  alternatives_spanish:
  - hasta los confines de la tierra
  - hasta el extremo de la tierra
  lexicon: HALOT
  rationale: Se conserva la singularidad del hebreo («fin/extremo») con una construcción natural en español. «Tierra» mantiene el alcance universal del anuncio.
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Digan
  alternatives_spanish:
  - Digan esto
  - Declaren
  lexicon: HALOT
  rationale: Introduce la fórmula citada de manera directa y simple. «Digan» respeta el tono imperativo y abre con claridad el contenido de la proclamación.
- source_word: גָּאַל
  english_pob_choice: has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - ha rescatado
  - ha librado
  lexicon: HALOT
  rationale: גאל lleva peso de liberación redentora y de rescate covenantal. «Ha redimido» conserva ese valor teológico sin desplazarlo a un mero «liberar».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando la identidad personal del nombre revelado en lugar de reemplazarlo por un título.'
- source_word: עַבְדּוֹ יַעֲקֹב
  english_pob_choice: his servant Jacob
  chosen_spanish: a su siervo Jacob
  alternatives_spanish:
  - a Jacob, su siervo
  - a su esclavo Jacob
  lexicon: HALOT
  rationale: La construcción posesiva se expresa naturalmente como «a su siervo Jacob». «Siervo» aquí sigue la formulación del contexto profético y evita una dureza innecesaria, aunque el término base pueda tener una fuerza servil más amplia.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. Conforme a la convención del POB español, se translitera el nombre en vez de sustituirlo por un título, para conservar la referencia al nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: גָּאַל en contexto de liberación del exilio
  english_pob_reading: has redeemed
  chosen_spanish_reading: ha redimido
  alternative_spanish_readings:
  - ha rescatado
  - ha librado
  rationale: El anuncio no es solo salida geográfica, sino acto de rescate de Yahvé para su pueblo. «Ha redimido» preserva la resonancia covenantal y redentora del verbo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo consonante-vocalizado de WLC y el auditrail inglés de POB. No hubo revisiones aplicadas en el registro fuente; la redacción española conserva las decisiones auditablemente atestiguadas: imperativos encadenados, nombre divino transliterado, y matiz redentor de גָּאַל.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de acuerdo con la terminología por defecto del proyecto.
  - Se respetó el pueblo «caldeos» en vez de territorializarlo como «Caldea», con nota alternativa.
  - Se prefirió un español público y solemne, sin calco rígido, pero sin ampliar el sentido más allá del hebreo.
  - El pronombre objeto de «háganlo oír» y «llévenlo» refleja la referencia al mensaje implícito en el contexto, como en el inglés auditado.
