translation:
  language: es
  text: 'Entonces ella ensilló la asna y dijo a su sirviente[a]: «Guía y sigue adelante; no te detengas por mí[b] a menos que yo te lo diga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su joven/ayudante»; el contexto apunta a un sirviente o asistente masculino.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no me retengas/detengas para montar»; el sentido es no frenar ni detener el avance por causa mía mientras voy montada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּחֲבֹשׁ הָאָתוֹן
  english_pob_choice: Then she saddled the donkey
  chosen_spanish: Entonces ella enalbardó la asna
  alternatives_spanish:
  - Entonces ella ensilló la asna
  - Entonces ella aparejó la asna
  - Entonces ella ensilló la burra
  lexicon: HALOT
  rationale: חבש aquí se refiere a preparar el animal para montar; en español, 'enalbardó' comunica de manera precisa y digna la acción de aparejar para el viaje. אָתוֹן nombra una hembra de asno; por eso se conserva 'asna' en vez de neutralizarlo como 'burro' o 'asno'.
- source_word: נַעֲרָהּ
  english_pob_choice: her servant
  chosen_spanish: su servidor
  alternatives_spanish:
  - su sirviente
  - su criado
  - su joven
  lexicon: HALOT
  rationale: נַעַר puede referirse a un ayudante o sirviente joven; el contexto funcional favorece 'servidor'. 'Su servidor' conserva la relación de dependencia sin forzar una edad o una categoría social que el español no necesita explicitar aquí.
- source_word: נְהַג וָלֵךְ
  english_pob_choice: Drive on and go
  chosen_spanish: Apresura el paso y sigue
  alternatives_spanish:
  - Guía y avanza
  - Arrea y sigue
  - Sigue adelante y ve
  lexicon: HALOT
  rationale: נְהַג tiene la idea de conducir o hacer avanzar; junto con וָלֵךְ expresa impulso continuo. 'Apresura el paso y sigue' transmite la urgencia del mandato en español natural, sin perder la noción de movimiento sostenido.
- source_word: אַל תַּעֲצָר לִי לִרְכֹּב
  english_pob_choice: do not slow down for me
  chosen_spanish: no te detengas por mí
  alternatives_spanish:
  - no me hagas detenerme
  - no me retengas para montar
  - no aminorres por mi causa
  lexicon: HALOT
  rationale: עצר aquí no es solo 'retener' en abstracto, sino impedir o frenar el avance mientras ella va montada. Siguiendo el ajuste revisionado del inglés, 'no te detengas por mí' expresa la prohibición de frenar el viaje por su cuenta sin añadir una formulación pesada.
- source_word: כִּי אִם אָמַרְתִּי לָךְ
  english_pob_choice: unless I tell you
  chosen_spanish: sino hasta que yo te lo diga
  alternatives_spanish:
  - a menos que yo te lo diga
  - excepto que yo te lo diga
  - si no te lo digo
  lexicon: HALOT
  rationale: Después de una prohibición, כִּי אִם introduce la excepción. En español, 'sino hasta que yo te lo diga' reproduce bien el límite temporal implícito y mantiene la fuerza idiomática del hebreo, equivalente al 'unless I tell you' del audit trail.
theological_decisions:
- issue: Tratamiento del sexo del animal (אָתוֹן)
  english_pob_reading: The donkey
  chosen_spanish_reading: la asna
  alternative_spanish_readings:
  - la burra
  - la asna
  rationale: 'No hay conflicto doctrinal, pero sí una decisión léxica relevante: el hebreo especifica una hembra. En español, ''asna'' preserva ese dato mejor que el genérico ''asno'' o el coloquial ''burra''.'
  doctrine_reference: Fidelidad lexical al texto hebreo
- issue: Sentido de אַל תַּעֲצָר לִי לִרְכֹּב
  english_pob_reading: do not slow down for me
  chosen_spanish_reading: no te detengas por mí
  alternative_spanish_readings:
  - no me retengas para montar
  - no aminorres por mi causa
  rationale: La nota inglesa explica que el sentido es no frenar ni parar por su causa mientras viaja. El español adopta una forma natural que conserva esa tensión entre 'detener' y 'hacer más lento' sin resolverla de modo más estrecho de lo que el hebreo permite.
  doctrine_reference: Precisión semántica del mandato narrativo
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés en el punto semántico clave: el mandato se vierte de modo natural como una prohibición de detenerse o frenarse por ella, evitando una paráfrasis pesada. También conserva la especificidad del hebreo para el animal hembra y para la urgencia del doble imperativo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de 'SEÑOR' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene un registro moderno y reverente, evitando arcaísmos innecesarios.
  - '''Enalbardó'' y ''asna'' preservan la especificidad del hebreo sin caer en calco tosco.'
  - La estructura de la excepción final se ajusta al español natural con 'sino hasta que', equivalente funcional de 'unless' en este contexto.
