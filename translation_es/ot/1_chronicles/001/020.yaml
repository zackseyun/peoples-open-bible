review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura genealógica hebrea: ''Yoqtán/Joktán'' como sujeto, יָלַד con sentido de paternidad genealógica, y la lista de cuatro descendientes. La nota sobre el verbo también conserva bien la alternativa del audit trail inglés. Sin embargo, varias transliteraciones de nombres en español se apartan innecesariamente tanto del rastro auditado como de formas más estables y legibles en español bíblico: ''Shelef'', ''Hazarmavet'' y especialmente ''Yéraj'' introducen adaptaciones poco justificadas.'
  spanish_quality_summary: El español es claro y natural en la fórmula genealógica; 'engendró' funciona bien en este contexto. No obstante, la nota está anclada al nombre 'Joktán' cuando semánticamente corresponde al verbo 'engendró'. Además, algunas formas onomásticas suenan idiosincráticas y menos eclesialmente legibles de lo deseable para una edición bíblica amplia.
  glossary_alignment: 'No hay términos del glosario mayor en juego aparte del manejo de nombres propios y del verbo genealógico. ''Engendró'' está alineado con la decisión inglesa ''fathered''. En nombres propios, conviene una transliteración más conservadora y trazable: mantener Almodad; preferir Selef/Shelef de manera consistente; y evitar ''Yéraj'', que parece una transcripción fonética ad hoc más que una forma bíblica española estable.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a 'Joktán' en lugar de al verbo 'engendró'.
    rationale: La nota explica alternativas para יָלַד ('engendró' / 'fue padre de' / 'begot'), no para el nombre propio. El anclaje debe aparecer sobre la palabra o frase relevante.
  - severity: medium
    issue: La forma 'Yéraj' es una transliteración poco natural y escasamente estable en español bíblico.
    rationale: Aunque intenta acercarse al hebreo, introduce una acentuación y una terminación en -j finales poco habituales y potencialmente confusas para lectores hispanohablantes. 'Jérah' conserva mejor la trazabilidad al audit trail inglés 'Jerah' y resulta más legible.
  - severity: low
    issue: '''Hazarmavet'' elimina la h final del audit trail sin necesidad clara.'
    rationale: La pérdida de -h no mejora significativamente la legibilidad en español y debilita la correspondencia con la forma auditada 'Hazarmaveth'. Una forma como 'Hazarmavéth' tampoco sería ideal; conviene usar 'Hazarmaveth' para consistencia transliteracional.
  - severity: low
    issue: '''Shelef'' es posible, pero una forma más hispanizada y simple como ''Selef'' puede leerse mejor.'
    rationale: No es error de significado, pero 'Selef' evita el dígrafo inglés 'Sh' si el proyecto desea una lectura española más natural. Dado que el borrador ya adapta otros nombres, conviene una política más consistente. Aun así, este punto no es tan grave como 'Yéraj'.
  revised_spanish_text: Joktán engendró[a] a Almodad, a Selef, a Hazarmaveth y a Jérah.
