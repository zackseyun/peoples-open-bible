translation:
  language: es
  text: 'Pero Jesús los llamó a su lado[a] y dijo: «Dejen que los niños vengan a mí, y no les impidan venir, porque a personas como estas les pertenece el reino de Dios[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los llamó hacia él». El griego puede expresarse más literalmente como que Jesús los llamó hacia sí o a su lado.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, «porque de tales es el reino de Dios». La expresión puede referirse a personas de ese tipo, no solo a estos niños concretos.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεκαλέσατο
  english_pob_choice: called them to him
  chosen_spanish: los llamó hacia sí
  alternatives_spanish:
  - los llamó
  - los llamó a sí
  - los hizo llamar
  lexicon: BDAG
  rationale: El verbo medio de προσκαλέομαι expresa llamar o convocar hacia uno mismo. «Hacia sí» conserva la dirección implícita del griego y evita hacer más explícita de lo que el texto dice la idea de que Jesús los reunió físicamente.
- source_word: αὐτὰ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a los niños
  - a esas personas
  lexicon: BDAG
  rationale: El pronombre remite a los niños. En español, el objeto directo masculino plural «los» mantiene la referencia pronominal y la fluidez del verbo sin repetir innecesariamente el sustantivo.
- source_word: Ἄφετε
  english_pob_choice: Let
  chosen_spanish: Dejen que
  alternatives_spanish:
  - Permitan que
  - Dejen
  - Permitan
  lexicon: BDAG
  rationale: El imperativo de ἀφίημι aquí significa permitir o dejar. «Dejen que» funciona de manera natural con infinitivo en español y conserva el tono directo de la orden de Jesús.
- source_word: τὰ παιδία
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los pequeños
  - los niños pequeños
  - los niños de corta edad
  lexicon: BDAG
  rationale: παιδία nombra a niños, con frecuencia de edad temprana. «Los niños» es la equivalencia más directa; no se añadió «pequeños» para no cargar el término con un matiz que el griego no exige por sí solo.
- source_word: ἔρχεσθαι πρός με
  english_pob_choice: come to me
  chosen_spanish: vengan a mí
  alternatives_spanish:
  - vengan hacia mí
  - se acerquen a mí
  - vengan a verme
  lexicon: BDAG
  rationale: La construcción con πρός me expresa movimiento hacia Jesús. «Vengan a mí» es la formulación más natural en español y reproduce bien la dirección del verbo sin sobreexplicar cercanía física.
- source_word: μὴ κωλύετε
  english_pob_choice: do not hinder
  chosen_spanish: no se lo impidan
  alternatives_spanish:
  - no los estorben
  - no los detengan
  - no se lo impidan venir
  lexicon: BDAG
  rationale: κωλύω significa impedir, estorbar o prohibir. «No se lo impidan» reproduce la prohibición directa en español y evita que el mandato suene demasiado técnico o débil; el objeto indirecto refleja la relación con la acción de dejar venir.
- source_word: τῶν ... τοιούτων
  english_pob_choice: such as these
  chosen_spanish: de los tales
  alternatives_spanish:
  - de personas como estas
  - de gente como estas
  - de quienes son como estos
  lexicon: BDAG
  rationale: La expresión genitiva señala una clase representada por los niños presentes. «De los tales» conserva una formulación breve y algo formal que mantiene abierta la referencia a personas caracterizadas de modo semejante, sin restringirla solo a esos niños.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God belongs to
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios les pertenece
  - el reino de Dios es de los tales
  - el reino de Dios pertenece a los tales
  lexicon: BDAG
  rationale: El griego dice literalmente «de tales es el reino de Dios». En español, la construcción nominal «de los tales es el reino de Dios» conserva mejor la relación posesiva/pertinencial que una paráfrasis más interpretativa; por eso no se expandió en el texto principal.
theological_decisions:
- issue: Alcance de τῶν τοιούτων
  english_pob_reading: Jesus speaks not only of the specific children present but of persons characterized by childlike status or quality.
  chosen_spanish_reading: Jesús no se limita necesariamente a los niños presentes, sino que habla de personas caracterizadas por ser como ellos.
  alternative_spanish_readings:
  - Jesús se refiere solo a los niños literales que le están llevando.
  - Jesús habla únicamente de los niños presentes.
  rationale: 'La expresión griega funciona de manera representativa: los niños presentes encarnan una clase de personas. «De los tales» preserva esa apertura sin resolver la tensión interpretativa sobre cuáles rasgos infantiles están en vista.'
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en vez de resolverla)
- issue: Forma de expresar la relación del reino con «tales»
  english_pob_reading: the kingdom of God belongs to such as these
  chosen_spanish_reading: de los tales es el reino de Dios
  alternative_spanish_readings:
  - el reino de Dios pertenece a los tales
  - el reino de Dios es para ellos
  rationale: 'El griego presenta una construcción copulativa con genitivo: «de tales es el reino de Dios». Mantenerla ayuda a no fijar prematuramente si la idea principal es pertenencia, inclusión o cualidad de los herederos del reino.'
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en vez de resolverla)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: se prefirió una formulación que refleje con más naturalidad προσεκαλέσατο αὐτὰ como «los llamó hacia sí», en línea con la corrección reciente del texto inglés de «called for them» a «called them to him». También se preservó la opción de no resolver en el texto principal el matiz de τῶν τοιούτων, manteniendo la tensión interpretativa documentada en el auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «reino de Dios» para θεοῦ, sin mascarlo como «SEÑOR».
  - Se usó «niños» para παιδία por ser la equivalencia directa y natural en español.
  - Se evitó introducir «Cristo» o «Mesías», porque el versículo no contiene Χριστός.
  - La construcción «de los tales» conserva la ambigüedad representativa del griego y el valor auditado del inglés POB.
  - El registro es reverente pero contemporáneo, apto para lectura eclesial amplia.
