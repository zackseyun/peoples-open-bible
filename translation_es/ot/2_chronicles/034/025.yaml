translation:
  language: es
  text: Porque me han abandonado y han quemado incienso a otros dioses[a], para enojarme por todas las obras de sus manos[b], mi furor será derramado sobre este lugar y no se apagará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dioses extraños». El hebreo dice más literalmente «otros dioses».
    reason: lexical_alternative
  - marker: b
    text: La frase «las obras de sus manos» puede referirse ampliamente a lo que hicieron o fabricaron, especialmente ídolos hechos por ellos y actos relacionados.
    reason: cultural_note
lexical_decisions:
- source_word: תַּ֣חַת אֲשֶׁ֣ר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: La expresión introduce la causa del juicio anunciado. «Porque» conserva la relación causal de manera natural en español y evita una literalidad pesada.
- source_word: עֲזָב֗וּ/נִי
  english_pob_choice: they have forsaken me
  chosen_spanish: me han abandonado
  alternatives_spanish:
  - me han dejado
  - me han desamparado
  lexicon: HALOT
  rationale: עזב puede significar abandonar o dejar. «Me han abandonado» mantiene el peso relacional y pactual sin forzar un calco arcaizante.
- source_word: ו/יקטירו
  english_pob_choice: and burned incense
  chosen_spanish: han quemado incienso
  alternatives_spanish:
  - han ofrecido incienso
  - han hecho humo de incienso
  lexicon: HALOT
  rationale: En este contexto idolátrico, קטר se refiere a quemar incienso. «Han quemado incienso» reproduce con claridad el acto cultual sin perder precisión.
- source_word: לֵֽ/אלֹהִ֣ים אֲחֵרִ֔ים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - a dioses extraños
  - a dioses ajenos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «otros dioses». Se conserva esa forma porque la POB inglesa la documenta como preferida y porque «otros dioses» es transparente en español.
- source_word: לְמַ֨עַן֙ הַכְעִיסֵ֔/נִי
  english_pob_choice: so as to provoke me to anger
  chosen_spanish: para provocar mi ira
  alternatives_spanish:
  - para irritarme
  - para hacerme enojar
  lexicon: HALOT
  rationale: El verbo en hiphil expresa provocar enojo. «Provocar mi ira» mantiene el tono judicial y solemne; la expresión es natural en español bíblico moderno.
- source_word: בְּ/כֹ֖ל מַעֲשֵׂ֣י יְדֵי/הֶ֑ם
  english_pob_choice: by all the works of their hands
  chosen_spanish: por todas las obras de sus manos
  alternatives_spanish:
  - con todo lo que sus manos han hecho
  - por todas las cosas hechas por sus manos
  lexicon: HALOT
  rationale: La frase puede aludir a ídolos hechos por ellos y, más ampliamente, a sus obras. «Obras de sus manos» preserva el modismo y su posible alcance cultural.
- source_word: וְ/תִתַּ֧ךְ חֲמָתִ֛/י
  english_pob_choice: my wrath will be poured out
  chosen_spanish: mi furor será derramado
  alternatives_spanish:
  - mi ira será derramada
  - mi indignación será derramada
  lexicon: HALOT
  rationale: נתך con חמה expresa una imagen de derramamiento. «Será derramado» conserva la metáfora; «furor» refleja bien חֵמָה en un contexto de juicio.
- source_word: בַּ/מָּק֥וֹם הַ/זֶּ֖ה
  english_pob_choice: on this place
  chosen_spanish: sobre este lugar
  alternatives_spanish:
  - en este lugar
  - contra este lugar
  lexicon: HALOT
  rationale: Con lenguaje de juicio derramado, «sobre este lugar» comunica dirección del castigo mejor que «en».
- source_word: וְ/לֹ֥א תִכְבֶּֽה
  english_pob_choice: and will not be quenched
  chosen_spanish: y no se apagará
  alternatives_spanish:
  - y no será extinguido
  - y no se extinguirá
  lexicon: HALOT
  rationale: כבה conserva la imagen de fuego que no se apaga. «No se apagará» es idiomático y mantiene la metáfora viva en español.
theological_decisions:
- issue: Mantener el habla divina en primera persona sin sustituirla por un título editorial
  english_pob_reading: me / my
  chosen_spanish_reading: me / mi
  alternative_spanish_readings:
  - del Señor
  - de Yahvé
  rationale: El verso es discurso directo de Dios; conservar la primera persona refleja el hebreo sin mediación innecesaria. No se introduce un nombre o título donde el texto habla directamente en primera persona.
  doctrine_reference: Original-language primacy; contested terms table for יְהוָה
- issue: Preservar la metáfora de juicio como fuego derramado
  english_pob_reading: my wrath will be poured out ... and will not be quenched
  chosen_spanish_reading: mi furor será derramado ... y no se apagará
  alternative_spanish_readings:
  - mi ira será derramada ... y no será extinguida
  - mi furor se derramará ... y no se extinguirá
  rationale: La imagen no se suaviza ni se sustituye por una abstracción. «Derramado» y «no se apagará» conservan el campo semántico de fuego/jucio y la fuerza del anuncio.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La revisión auditada más reciente no introdujo cambios: el texto fuente y la decisión inglesa permanecen estables. La redacción española sigue de cerca esas decisiones documentadas, con ajuste natural de sintaxis para publicación en español.'
  spanish_consistency_notes:
  - Se mantiene «otros dioses» por fidelidad al hebreo y coherencia con la POB inglesa.
  - '«Furor» y «ira» se distinguen: se eligió «furor» para חֵמָה y «ira» en la frase verbal para una lectura natural del hipérbaton en español.'
  - La metáfora final se traduce con un verbo intransitivo («no se apagará») para conservar la imagen de fuego sin añadir agentes implícitos.
  - Se evita «SEÑOR» dentro del discurso directo porque el hebreo presenta primera persona divina, no una sustitución editorial.
