  text: הֲ/לֹ֨א יִמְצְא֜וּ יְחַלְּק֣וּ שָׁלָ֗ל רַ֤חַם רַחֲמָתַ֨יִם֙ לְ/רֹ֣אשׁ גֶּ֔בֶר שְׁלַ֤ל צְבָעִים֙ לְ/סִ֣יסְרָ֔א שְׁלַ֥ל צְבָעִ֖ים רִקְמָ֑ה צֶ֥בַע רִקְמָתַ֖יִם לְ/צַוְּארֵ֥י שָׁלָֽל׃
base_translation:
  language: en
  yaml_path: translation/ot/judges/005/030.yaml
  text: ‘Are they not finding and dividing the spoil? A womb[a], two wombs for each man; spoil of dyed cloths for Sisera, spoil of dyed cloths, embroidered cloth, dyed cloth[b], two embroideries for the necks of the spoil.’
  footnotes:
  - marker: a
    text: Hebrew literally, “a womb, two wombs,” a harsh metonymy for women taken as sexual spoil.
    reason: lexical_alternative
  - marker: b
    text: Or “for the necks of the captives / those taken as spoil.” The Hebrew of the final phrase is difficult and may refer to embroidered cloths worn by captive women.
    reason: alternative_reading
