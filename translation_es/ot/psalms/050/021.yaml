  text: אֵ֤לֶּה עָשִׂ֨יתָ וְֽ/הֶחֱרַ֗שְׁתִּי דִּמִּ֗יתָ הֱֽיוֹת אֶֽהְיֶ֥ה כָמ֑וֹ/ךָ אוֹכִיחֲ/ךָ֖ וְ/אֶֽעֶרְכָ֣ה לְ/עֵינֶֽי/ךָ׀־׃
base_translation:
