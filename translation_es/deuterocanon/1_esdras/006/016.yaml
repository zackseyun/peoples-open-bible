revisions:
- from: Ahora, en el primer año de Ciro, que reinaba sobre la tierra de Babilonia, el rey Ciro escribió para edificar esta casa[a].
  to: Ahora bien, en el primer año, cuando Ciro reinaba sobre la tierra de Babilonia, el rey Ciro escribió para edificar esta casa[a][b].
  rationale: 'Se ajusta ligeramente la sintaxis para un español más natural («cuando Ciro reinaba») y se añade la nota faltante sobre el referente de «esta casa», conservando las decisiones léxicas centrales del POB: «escribió», «edificar» y «esta casa».'
