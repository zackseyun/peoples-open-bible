translation:
  language: es
  text: Puso las varas que había pelado en los abrevaderos, en los canales de abrevadero[a] donde venía el rebaño a beber, delante del rebaño[b]; y se aparearon[c] cuando venían a beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los dos términos de lugar («abrevaderos» y «canales de abrevadero») probablemente describen la zona de bebida con más detalle, no necesariamente dos sitios separados.
    reason: lexical_alternative
  - marker: b
    text: 'O: «frente al rebaño».'
    reason: previous_rendering
  - marker: c
    text: 'O: «estaban en celo cuando venían a beber». El hebreo puede referirse más literalmente a que los animales se calentaron o estaban en celo, con el apareamiento implícito por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּג
  english_pob_choice: He set
  chosen_spanish: Puso
  alternatives_spanish:
  - Colocó
  - Puso en posición
  lexicon: HALOT
  rationale: El verbo indica colocar algo en una posición determinada. «Puso» es natural en español y conserva la acción concreta sin añadir interpretación.
- source_word: הַמַּקְלוֹת
  english_pob_choice: the rods
  chosen_spanish: las varas
  alternatives_spanish:
  - los palos
  - las varas
  lexicon: HALOT
  rationale: En este contexto narrativo de ganado, «varas» comunica mejor que «palos» la idea de ramas preparadas y mantiene una expresión digna y clara.
- source_word: אֲשֶׁר פִּצֵּל
  english_pob_choice: that he had peeled
  chosen_spanish: que había pelado
  alternatives_spanish:
  - que había descortezado
  - que había mondado
  lexicon: HALOT
  rationale: El verbo describe quitar la corteza para dejar la madera más clara. «Había pelado» refleja bien la acción, aunque «descortezado» también sería posible pero más técnico.
- source_word: בָּרֳהָטִים
  english_pob_choice: in the troughs
  chosen_spanish: en los abrevaderos
  alternatives_spanish:
  - en los troughs
  - en las pilas de agua
  lexicon: HALOT
  rationale: Este término se refiere a lugares o estructuras de agua para beber. «Abrevaderos» es idiomático en español y conserva el sentido pastoral.
- source_word: בְּשִׁקֲת֣וֹת הַמָּיִם
  english_pob_choice: in the watering channels
  chosen_spanish: en los canales de agua
  alternatives_spanish:
  - en los canales de abrevadero
  - en los lugares de agua
  lexicon: HALOT
  rationale: La expresión segunda complementa o detalla la primera, sin necesariamente introducir un lugar totalmente distinto. «Canales de agua» preserva la imagen concreta y permite la doble referencia espacial.
- source_word: אֲשֶׁר תָּבֹאןָ הַצֹּאן לִשְׁתּוֹת
  english_pob_choice: where the flock came to drink
  chosen_spanish: de donde venía el rebaño a beber
  alternatives_spanish:
  - donde venía el rebaño a beber
  - a donde venía el rebaño a beber
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor; «rebaño» funciona bien en español. La idea de procedencia/lugar de agua puede expresarse con «de donde» sin alterar el flujo narrativo.
- source_word: לְנֹכַח הַצֹּאן
  english_pob_choice: in front of the flock
  chosen_spanish: delante del rebaño
  alternatives_spanish:
  - en frente del rebaño
  - ante el rebaño
  lexicon: HALOT
  rationale: La preposición indica colocación directamente opuesta o enfrente de los animales. «Delante del rebaño» es claro, natural y fiel.
- source_word: וַיֵּחַמְנָה
  english_pob_choice: they mated
  chosen_spanish: se aparearon
  alternatives_spanish:
  - estaban en celo
  - se calentaron
  lexicon: HALOT
  rationale: El verbo puede aludir más literalmente a estar en calor/celo, pero en este contexto de reproducción el sentido narrativo es el apareamiento. «Se aparearon» comunica el acto sin perder la base biológica del término.
- source_word: בְּבֹאָן לִשְׁתּוֹת
  english_pob_choice: when they came to drink
  chosen_spanish: cuando venían a beber
  alternatives_spanish:
  - al venir a beber
  - cuando llegaron a beber
  lexicon: HALOT
  rationale: La construcción temporal expresa circunstancia al llegar para beber. «Cuando venían a beber» suena natural en español y conserva el valor temporal habitual.
theological_decisions:
- issue: Interpretación de וַיֵּחַמְנָה en contexto reproductivo
  english_pob_reading: they mated, with a footnote noting the more literal idea of animals becoming heated/in heat
  chosen_spanish_reading: se aparearon, con nota que recuerda la posibilidad literal de estar en celo / calentarse
  alternative_spanish_readings:
  - estuvieron en celo
  - se calentaron
  rationale: El hebreo permite una referencia más literal al estado de celo/calor, pero el contexto inmediato apunta al resultado reproductivo. En español, «se aparearon» mantiene la acción narrativa, mientras la nota conserva la tensión léxica.
  doctrine_reference: No aplica; decisión léxico-narrativa, no doctrinal.
- issue: Relación entre בָּרֳהָטִים y בְּשִׁקֲת֣וֹת הַמָּיִם
  english_pob_reading: likely to describe the watering area in fuller detail rather than two entirely separate places
  chosen_spanish_reading: «abrevaderos» y «canales de agua» como descripciones complementarias del área de agua
  alternative_spanish_readings:
  - dos lugares distintos
  - una sola mención simplificada
  rationale: La repetición de términos espaciales probablemente amplía la misma zona de abrevar. Mantener ambas expresiones evita aplanar el hebreo y preserva la estructura descriptiva.
  doctrine_reference: No aplica; decisión de precisión textual.
translation_notes:
  revision_awareness: 'La redacción española sigue el sentido confirmado por la última revisión inglesa: la escena se desarrolla en el área de abrevadero, con una doble descripción espacial, y el último miembro verbal conserva el sentido reproductivo del hebreo sin ocultar la ambigüedad léxica del verbo. Se evitó traducir mecánicamente desde el inglés cuando el español requería una formulación más natural, pero se mantuvieron las tensiones documentadas del original.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Rebaño» traduce צֹאן como colectivo pastoral, coherente con el contexto de ganado menor.
  - Se prefirieron términos españoles transparentes («abrevaderos», «canales de agua», «se aparearon») que conservan el cuadro narrativo sin introducir un registro eclesiástico ajeno al hebreo.
