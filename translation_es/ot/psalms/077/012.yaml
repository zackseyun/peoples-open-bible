  to: Recordaré los hechos de Yah[a], porque recordaré tus maravillas de antaño[b].
  rationale: Se ajusta la primera cola para un español más natural y para reflejar más claramente la repetición del verbo זכר en ambas mitades del verso. También se cambia «obras» por «hechos» para corresponder mejor a מַעַלְלֵי, y se añade la nota de alternativa temporal documentada en el POB inglés para מִקֶּדֶם.
