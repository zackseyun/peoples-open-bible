translation:
  language: es
  text: No permitas que tu corazón se desvíe hacia sus caminos[a]; no te extravíes en sus senderos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «se aparte».
    reason: lexical_alternative
  - marker: b
    text: O bien, «no vayas por mal camino en sus senderos».
    reason: lexical_alternative

lexical_decisions:
- source_word: יֵשְׂטְ
  english_pob_choice: turn aside
  chosen_spanish: se desvíe
  alternatives_spanish:
  - se aparte
  - se tuerza
  - se incline
  lexicon: HALOT
  rationale: שׂטה expresa apartarse o desviarse de un curso; «se desvíe» conserva la imagen de una desviación moral sin sonar mecánico en español.
- source_word: דְּרָכֶיהָ
  english_pob_choice: her ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su conducta
  - sus senderos
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino literal y también modo de vivir; «sus caminos» preserva ambas capas y es natural en español bíblico contemporáneo.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  - tu ser interior
  lexicon: HALOT
  rationale: לֵב abarca el centro de pensamiento y deseo; «corazón» mantiene esa amplitud y es el equivalente más estable en literatura sapiencial.
- source_word: תֵּתַע
  english_pob_choice: stray
  chosen_spanish: te extravíes
  alternatives_spanish:
  - te apartes
  - vagues
  - te pierdas
  lexicon: HALOT
  rationale: תעה sugiere errar o perder el rumbo; «te extravíes» conserva la advertencia de desorientación moral y evita repetir el mismo matiz de la primera cláusula.
- source_word: בִּנְתִיבוֹתֶיהָ
  english_pob_choice: into her paths
  chosen_spanish: en sus senderos
  alternatives_spanish:
  - en sus caminos
  - por sus senderos
  - en sus huellas
  lexicon: HALOT
  rationale: נְתִיבָה es senda o sendero; «senderos» mantiene la imaginería de ruta. Con la preposición, el español fluye mejor como «en sus senderos» que una versión más literal pero menos idiomática.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: No permitas
  alternatives_spanish:
  - 'No'
  - No dejes que
  lexicon: HALOT
  rationale: El prohibitivo con jussivo se expresa de forma natural como «No permitas» al dirigirse al corazón/voluntad; preserva el tono exhortativo y la relación entre voluntad e inclinación interna.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el hebreo y el control auditado en inglés: primero la desviación del corazón hacia los caminos de la mujer, luego el mandato paralelo de no desviarse/extraviarse en sus senderos. Se optó por distinguir los dos verbos hebreos con dos verbos españoles cercanos pero no idénticos.'
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב conforme al uso sapiencial.
  - Se conserva la imaginería de camino/senda sin convertirla en una paráfrasis abstracta.
  - Los dos miembros negativos se distinguen para reflejar la paralelismo hebreo y evitar una repetición plana.
