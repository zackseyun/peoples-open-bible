base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/009/001.yaml
  text: 'For I laid all this to my heart[a], even to examine all this: that the righteous and the wise and their works are in the hand of God. Whether love or hate, man does not know[b]; everything is before them.'
  footnotes:
  - marker: a
    text: Or 'their servants.' The Hebrew form can be read that way, but many understand it here as 'their deeds' or 'works.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew of the final clause is difficult. It may mean that a person does not know in advance whether love or hate awaits them, or that present circumstances do not reveal whether one is loved or hated.
    reason: alternative_reading
