revisions:
- from: Pues las naciones insultaron a Jerusalén en su humillación; derribaron su esplendor del trono de gloria[a][b].
  to: Pues las naciones insultaron a Jerusalén en su pisoteo[a]; derribó su esplendor del trono de gloria[b].
  rationale: Se reemplaza 'humillación' por 'pisoteo' para conservar la imagen concreta de ἐν καταπατήσει y se ajusta la segunda cláusula a singular ('derribó') para no introducir un sujeto plural que el griego no expresa. También se simplifican y reordenan las notas para que el anclaje corresponda mejor al texto revisado.
