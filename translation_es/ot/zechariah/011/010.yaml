  to: Entonces tomé mi bastón Favor y lo corté en dos,[a] para romper mi pacto que había hecho con todos los pueblos.
  rationale: Se quitó la nota de «Favor» y se ancló correctamente en la frase final correspondiente a la alternativa léxica de «todos los pueblos / todas las naciones», siguiendo el audit trail inglés. Además, «lo corté en dos» refleja con mayor fidelidad la acción física de גדע documentada en la POB inglesa. Se mantiene «mi pacto» como español bíblico natural y claro.
