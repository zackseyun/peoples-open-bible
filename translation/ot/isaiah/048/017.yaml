theological_decisions:
- issue: Rendering of the divine self-identification with repeated יְהוָה
  chosen_reading: I am Yahweh your God
  alternative_readings:
  - I, the LORD, am your God
  rationale: Both are possible in English. The chosen wording is natural and preserves the emphatic self-identification without adding theological content beyond the Hebrew.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of divine instruction and guidance
  chosen_reading: teaches you for your benefit ... leads you in the way you should go
  alternative_readings:
  - teaches you to profit ... guides you in the way you go
  rationale: The verse presents God as beneficial instructor and guide. The chosen rendering preserves that theological emphasis while avoiding archaic English and avoiding a deterministic reading that the Hebrew does not require.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Readable modern English, not archaic or academic'
