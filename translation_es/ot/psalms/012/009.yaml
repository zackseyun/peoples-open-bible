translation:
  language: es
  text: Los impíos andan por todas partes[a][b], cuando la vileza es exaltada entre los hijos del hombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «merodean». El hebreo puede sugerir que los impíos se mueven de un lado a otro o rondan continuamente.
    reason: alternative_reading
  - marker: b
    text: O «alrededor» / «en derredor». La expresión hebrea סָבִיב indica un movimiento o presencia alrededor, por todos lados.
    reason: lexical_alternative
  - marker: c
    text: O «entre la humanidad» / «entre los seres humanos». El hebreo dice literalmente «entre los hijos del hombre», una expresión masculina con referencia humana genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: en derredor
  alternatives_spanish:
  - por todas partes
  - alrededor
  lexicon: HALOT
  rationale: El adverbio hebreo expresa movimiento o presencia circundante. «En derredor» conserva la imagen de rodear y resulta natural en español bíblico sin endurecer la sintaxis.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El plural sustantivado designa a personas moralmente perversas. «Impíos» mantiene el registro bíblico y la fuerza ética del término.
- source_word: יִתְהַלָּכ֑וּ/ן
  english_pob_choice: walk
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  - deambulan
  - merodean
  lexicon: HALOT
  rationale: El hitpael de הלך expresa ir y venir, moverse de un lado a otro. «Andan» comunica ese movimiento continuo de forma breve y fiel; «merodean» sería más interpretativo y más fuerte.
- source_word: כְּ/רֻם
  english_pob_choice: when ... is exalted
  chosen_spanish: cuando ... es exaltada
  alternatives_spanish:
  - como ... es exaltada
  - al ser exaltada
  lexicon: HALOT
  rationale: La partícula con la forma verbal plantea una relación circunstancial difícil. «Cuando» reproduce bien el valor circunstancial adoptado por la POB inglesa y encaja con la cláusula resultante en español.
- source_word: זֻלּוּת
  english_pob_choice: vileness
  chosen_spanish: la vileza
  alternatives_spanish:
  - la bajeza
  - la vileza moral
  - la bajeza moral
  lexicon: HALOT
  rationale: El sustantivo denota lo vil, bajo o despreciable. «Vileza» preserva el juicio moral fuerte del texto y es transparente en español.
- source_word: לִ/בְנֵ֥י אָדָֽם
  english_pob_choice: among the sons of man
  chosen_spanish: entre los hijos de Adán
  alternatives_spanish:
  - entre los hijos del hombre
  - entre la humanidad
  - entre los seres humanos
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea masculina representativa sin neutralizarla en el texto principal. «Hijos de Adán» hace visible el hebraísmo y mantiene el paralelismo con la forma fuente.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: Adán
  alternatives_spanish:
  - hombre
  - humanidad
  lexicon: HALOT
  rationale: En esta construcción el hebreo tiene valor colectivo humano, pero la metáfora literal «hijos de Adán» conserva mejor la forma del original en español y evita perder la tensión expresiva del hebraísmo.
theological_decisions:
- issue: Expresión antropológica masculina representativa en לִבְנֵי אָדָם
  english_pob_reading: among the sons of man
  chosen_spanish_reading: entre los hijos de Adán
  alternative_spanish_readings:
  - entre la humanidad
  - entre los seres humanos
  rationale: Se mantiene la forma masculina del hebreo en el cuerpo del texto para no borrar el giro idiomático ni la tensión documentada. La referencia es genérica y representa a la humanidad, pero la traducción principal preserva el hebraísmo visible.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'El texto inglés auditado mantuvo «the wicked walk all around» y preservó en nota la alternativa intensiva «prowl on every side», además de conservar el hebraísmo genérico «sons of man». La versión española sigue esa misma línea: mantiene el movimiento circundante en el texto principal, recoge las dos alternativas de matiz en notas, y conserva la expresión masculina representativa sin neutralizarla en el cuerpo del versículo.'
  spanish_consistency_notes:
  - Se usa «impíos» como equivalente bíblico natural de רְשָׁעִים, coherente con el registro del POB.
  - «En derredor» mantiene la imagen de סביב sin volverla una paráfrasis.
  - «Hijos de Adán» preserva el hebraísmo de לִבְנֵי אָדָם y evita sustituirlo por una forma más abstracta en el texto principal.
  - Las notas se anclan exactamente en el texto con [a] y [b], sin notas huérfanas.
