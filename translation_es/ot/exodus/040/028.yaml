revisions:
- from: Y puso el velo[a] de la entrada del tabernáculo.
  to: Y puso la cortina en la entrada del tabernáculo[a].
  rationale: Se reemplaza 'velo' por 'cortina' para reflejar mejor מָסַךְ y evitar confusión con otros velos del santuario; se añade 'en' para expresar con claridad la instalación en la entrada, conforme al sentido del hebreo y a la auditoría inglesa. La nota conserva alternativas léxicas viables sin introducir ambigüedad innecesaria.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo dice literalmente ''y puso el masak de la entrada al tabernáculo''. La draft acierta con ''Y puso'' y con ''la entrada'', pero ''velo'' no preserva bien la distinción léxica documentada entre מָסָךְ (''screen/curtain'' de entrada) y פָּרֹכֶת (''veil''). Además, en español falta una preposición explícita equivalente a la relación locativa de la traducción auditada: ''en/a la entrada del tabernáculo''.'
  spanish_quality_summary: 'La frase actual suena algo incompleta en español: ''puso el velo de la entrada'' puede leerse como genitivo posesivo, no como instalación en el acceso. ''Cortina'' o ''cortina de entrada'' es más claro y eclesialmente legible que ''velo'' en este contexto. La redacción revisada mejora naturalidad sin apartarse del hebreo.'
  glossary_alignment: No hay términos del glosario principal implicados salvo 'tabernáculo', que está bien. La decisión 'velo' entra en tensión con la racionalidad lexical del POB, que busca distinguir מָסָךְ de 'veil/velo'. Conviene usar 'cortina' en el texto principal y mantener 'pantalla' o formulación semejante fuera del texto solo si fuera necesario; aquí basta con la alternativa 'cortina para la entrada del tabernáculo'/'cortina de la entrada del tabernáculo'.
  issues:
  - severity: high
    issue: '''velo'' para מָסַךְ'
    rationale: El English POB eligió 'screen' precisamente para no confundirlo con otros colgantes del santuario, especialmente el 'veil'. En español, 'velo' intensifica esa confusión y no refleja bien la distinción léxica.
  - severity: medium
    issue: Relación sintáctica poco natural en 'de la entrada del tabernáculo'
    rationale: Sin 'en' o 'a' la frase puede sonar como si el objeto perteneciera a la entrada, no como si fuera puesto en ella. La auditoría inglesa resolvió esto con 'at the entrance to the tabernacle'.
  - severity: low
    issue: Nota al pie no compensa la elección principal deficiente
    rationale: La alternativa 'cortina' aparece en nota, pero la política pide que el texto principal preserve mejor el sentido fuente; la nota debe reservar alternativas reales, no corregir un principal equívoco.
  revised_spanish_text: Y puso la cortina en la entrada del tabernáculo[a].
  revised_footnotes:
  - marker: a
    text: O «la cortina para la entrada del tabernáculo» o «el colgante de la entrada del tabernáculo».
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'velo' por 'cortina' para reflejar mejor מָסַךְ y evitar confusión con otros velos del santuario; se añade 'en' para expresar con claridad la instalación en la entrada, conforme al sentido del hebreo y a la auditoría inglesa. La nota conserva alternativas léxicas viables sin introducir ambigüedad innecesaria.
