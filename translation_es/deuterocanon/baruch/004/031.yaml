translation:
  language: es
  text: ¡Desdichados los que te hicieron daño y se alegraron de tu caída![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se jactaron de tu caída». El griego dice literalmente «se alegraron de tu caída».
    reason: lexical_alternative
lexical_decisions:
- source_word: δείλαιοι
  english_pob_choice: Wretched
  chosen_spanish: ¡Desdichados!
  alternatives_spanish:
  - Miserables
  - Pobres de ellos
  - Malaventurados
  lexicon: LSJ
  rationale: En este contexto de lamento, «desdichados» comunica bien el tono de desgracia y compasión/ay de la invectiva sin convertir la palabra en una maldición más fuerte de lo que el griego exige.
- source_word: οἱ σε κακώσαντες
  english_pob_choice: those who harmed you
  chosen_spanish: los que te hicieron daño
  alternatives_spanish:
  - los que te maltrataron
  - los que te afligieron
  - los que te perjudicaron
  lexicon: BDAG
  rationale: κακόω expresa hacer daño o tratar mal. «Hicieron daño» es natural en español, amplio y fiel, y conserva la fuerza general del daño sin estrecharlo a una sola clase de abuso.
- source_word: ἐπιχαρέντες
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - se ufanaron
  - se gozaron
  lexicon: BDAG
  rationale: El verbo significa alegrarse por algo; el matiz hostil queda reforzado por el complemento «de tu caída». «Se alegraron» es la equivalencia directa y clara en español.
- source_word: τῇ σῇ πτώσει
  english_pob_choice: at your fall
  chosen_spanish: de tu caída
  alternatives_spanish:
  - por tu caída
  - ante tu caída
  - por tu derrumbe
  lexicon: LSJ
  rationale: πτῶσις es literalmente «caída». En español, «de tu caída» suena natural con «alegrarse de» y mantiene la metáfora del griego sin sobreinterpretarla como «derrumbe».
translation_notes:
  revision_awareness: El texto griego de la edición Swete 1909 concuerda con el testimonio adjudicado de alta confianza; no se registran revisiones aplicadas en el audit trail inglés, así que la redacción española sigue de cerca el sentido directo del original sin añadir matices no documentados.
  spanish_consistency_notes:
  - Se mantiene el tono de lamento/invective con una exclamación inicial, coherente con δείλαιοι.
  - «Hicieron daño» preserva la amplitud semántica de κακόω sin introducir un juicio técnico adicional.
  - «De tu caída» conserva la imagen literal de πτῶσις y encaja con la construcción española «alegrarse de».
  - La nota al pie recoge la alternativa hostil «jactarse» porque en español puede transmitir mejor el matiz de gloating que la simple alegría.
