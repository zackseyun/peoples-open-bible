    text: 'O: «Yo te unjo rey sobre el pueblo de Yahvé, sobre Israel». El perfecto hebreo puede entenderse de manera performativa en esta fórmula de unción.'
    reason: alternative_reading
  revision_rationale: 'Se quita la nota innecesaria sobre «entró en la casa» y se restaura la alternativa textual realmente importante según el audit trail: la fuerza performativa de מְשַׁחְתִּיךָ. También se ajusta «como rey» a «rey» para reflejar mejor la construcción hebrea y mejorar la naturalidad del español sin cambiar el sentido.'
