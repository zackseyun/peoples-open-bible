- from: ¿Quién entre todos los dioses de estas tierras ha librado[a] su tierra de mi mano, para que Yahvé[b] libre Jerusalén de mi mano?
  to: ¿Quién entre todos los dioses de estas tierras ha librado su tierra de mi mano, que Yahvé[a] libre Jerusalén de mi mano?
