review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura binaria del hebreo y la alternativa legal introducida por אוֹ. «Un espíritu de celos» para רוּחַ קִנְאָה y «o si» para אוֹ son adecuados. Sin embargo, «se ha contaminado» para נִטְמָאָה no sigue bien la decisión auditada en inglés («has defiled herself») ni el matiz moral-ritual específico del contexto de sospecha sexual; en español suena demasiado físico/sanitario y atenúa la fuerza de mancillamiento/impureza sexual del pasaje.
  spanish_quality_summary: 'El español es generalmente claro y legible, pero tiene varias asperezas idiomáticas: el verso hebreo no empieza con «si», así que «y si» distorsiona la primera cláusula; «está celoso de su esposa» suena menos natural que «tiene celos de su esposa» o «siente celos de su esposa» en registro bíblico moderno; y «se ha contaminado» no es la mejor opción estilística ni semántica aquí. La frase revisada mejora naturalidad sin alejarse del original.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión principal relevante es נִטְמָאָה: conviene alinearla con la rationale del POB como «se ha mancillado» o similar, preservando la superposición moral-ritual mejor que «se ha contaminado». «Espíritu» para רוּחַ está bien en este contexto.'
  issues:
  - severity: high
    issue: Inicio con «y si» en la primera cláusula
    rationale: El hebreo comienza con וְעָבַר... «y/pues pasa/viene sobre él», no con una condicional explícita. Añadir «si» en la primera rama cambia la sintaxis y presenta como condicional lo que en el original es la primera formulación del caso legal.
  - severity: high
    issue: «Se ha contaminado» para נִטְמָאָה
    rationale: La evidencia fuente y el audit trail favorecen «has defiled herself», es decir, lenguaje de impureza ligado específicamente a sospecha de infidelidad sexual. «Contaminado» en español suena demasiado general o físico y debilita el matiz moral-ritual del contexto.
  - severity: medium
    issue: «Está celoso de su esposa» es menos idiomático
    rationale: Aunque comprensible, en español bíblico moderno suena más natural «tiene celos de su esposa» o «siente celos de su esposa». Esto representa bien וְקִנֵּא sin calco rígido.
  - severity: low
    issue: Falta nota alternativa para el primer נִטְמָאָה
    rationale: El inglés conserva una nota léxica en la primera ocurrencia sobre «has become unclean». En la revisión española conviene mantener una nota equivalente anclada a la primera ocurrencia por consistencia con el audit trail.
