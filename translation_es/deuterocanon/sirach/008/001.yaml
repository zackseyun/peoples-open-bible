translation:
  language: es
  text: No riñas con un hombre poderoso[a], no sea que caigas en sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo puede leerse más literalmente: «¿por qué habrías de ser puesto en su mano?». El paralelo griego apoya el sentido más fluido: «no sea que caigas en sus manos».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תָּרִיב
  english_pob_choice: Do not quarrel
  chosen_spanish: No entables disputa
  alternatives_spanish:
  - No riñas
  - No contiendas
  - No discutas
  lexicon: HALOT
  rationale: El hebreo prohibe entrar en conflicto; «entables disputa» conserva el matiz de iniciar o ponerse en pleito, y suena natural en español bíblico moderno sin suavizar la advertencia.
- source_word: עִם אִישׁ גָּדוֹל
  english_pob_choice: with a great man
  chosen_spanish: con un hombre poderoso
  alternatives_spanish:
  - con un hombre grande
  - con un hombre importante
  - con un hombre poderoso
  lexicon: HALOT
  rationale: Aunque גָּדוֹל es literalmente «grande», el contexto sapiencial y el paralelo griego δυνάστου apuntan a una persona de rango o poder; «poderoso» transmite mejor esa fuerza social o política en español.
- source_word: לָמָּה תִשּׁוֹם עַל יָדוֹ
  english_pob_choice: lest you fall into his hands
  chosen_spanish: para que no caigas en sus manos
  alternatives_spanish:
  - no sea que caigas en sus manos
  - para que no vayas a caer en sus manos
  - para que no caigas bajo su mano
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil y literalmente pregunta «¿por qué...?»; la tradición griega aclara el sentido como advertencia de evitar caer bajo el poder del hombre. En español, «para que no caigas en sus manos» sigue ese sentido sin perder la imagen.
theological_decisions:
- issue: Relación entre el hebreo difícil y el paralelo griego
  english_pob_reading: Hebrew reads more literally, 'why should you be placed in his hand?' The Greek parallel supports the smoother sense, 'lest you fall into his hands.'
  chosen_spanish_reading: Se conserva el sentido advertido por el griego, sin ocultar que el hebreo es más literal y algo enigmático.
  alternative_spanish_readings:
  - ¿por qué habrías de ser puesto en su mano?
  - no sea que seas puesto en su mano
  rationale: La lectura española principal debe ser inteligible y fiel al consejo sapiencial. Como el testimonio griego apoya la imagen de caer en manos de otro, se privilegia esa línea, manteniendo implícita la tensión textual del hebreo.
  doctrine_reference: Textual criticism / wisdom literature parallel tradition
translation_notes:
  revision_awareness: El texto español sigue la revisión inglesa más reciente que pasó de «powerful man» a «great man» para acercarse más a גָּדוֹל, pero aquí se opta por «poderoso» porque el paralelo griego δυνάστου hace explícita la idea de poder o dominio. Se mantiene, no obstante, la advertencia sapiencial y el cierre con la imagen de caer en sus manos.
  spanish_consistency_notes:
  - Se usa «manos» en plural para reflejar el giro idiomático del griego y del español natural, aunque el hebreo conserve «mano» en singular.
  - «Hombre poderoso» se eligió por claridad contextual; no se traduce mecánicamente como «gran hombre» para evitar una lectura moralizante o ambigua en español.
  - Se mantiene el registro sapiencial sobrio y directo, sin añadir explicaciones no presentes en el verso.
