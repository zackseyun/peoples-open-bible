theological_decisions:
- issue: Referent of the third-person singular subject throughout the verse
  chosen_reading: he = the LORD, continuing the divine subject from context
  alternative_readings:
  - implicit generic subject
  rationale: The verse recalls the LORD's wilderness provision for his people. English retains the pronoun 'he' rather than inserting 'the LORD,' since the Hebrew uses verbal forms without an explicit noun here and the antecedent is clear from context.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Intertextual echo of the exodus/wilderness rock miracle
  chosen_reading: Preserved as historical-poetic allusion without expanding the text
  alternative_readings:
  - explicitly interpret as a typological or sacramental statement
  rationale: The verse clearly echoes the wilderness narratives of water from the rock, but the translation should not import later theological interpretations into the main text. The imagery is preserved plainly.
  doctrine_reference: Translation philosophy §1 and §3
