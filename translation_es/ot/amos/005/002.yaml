review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el audit trail inglés en casi todos los puntos: conserva el arranque abrupto de נָפְלָה, la personificación «virgen Israel», la finalidad de לֹא תוֹסִיף קוּם, el abandono en su tierra y la ausencia de quien la levante. Sin embargo, la nota [a] no refleja fielmente la alternativa inglesa preservada; presenta como alternativa una formulación redundante en español («no volverá a levantarse otra vez») y además explica de forma demasiado literalista un modismo hebreo de manera poco natural.'
  spanish_quality_summary: El texto principal es claro, digno y ampliamente legible. «Caída, virgen Israel» funciona bien en español poético. La coma vocativa/apositiva ayuda a la lectura. «Abandonada sobre su propia tierra» es comprensible, aunque «en su propia tierra» también sería posible; no requiere cambio. La principal deficiencia está en la calidad de la nota [a], no en el cuerpo del versículo.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos de glosario sensibles. «Virgen Israel» preserva correctamente la decisión teológica documentada.
  issues:
  - severity: medium
    issue: La nota [a] no preserva bien la alternativa léxica documentada en el POB inglés.
    rationale: El inglés conserva como alternativa «will rise no more». La nota española ofrece «no volverá a levantarse otra vez», que no es una alternativa estilística válida en español porque duplica el sentido de repetición. Conviene usar una alternativa natural y equivalente, como «no se levantará más» o «no volverá a levantarse» según el texto principal.
  - severity: low
    issue: La explicación literal de la nota [a] suena poco idiomática en español.
    rationale: «No añadirá volver a levantarse» intenta calcar el hebreo más de lo necesario. Una explicación como «literalmente, ‘no volverá a levantarse de nuevo’ / ‘no volverá a levantarse otra vez’» o una descripción breve del modismo sería más clara para lectores en español.
  revised_spanish_text: Caída[a], virgen Israel, no volverá a levantarse; abandonada sobre su propia tierra[b], no tiene quien la levante.
  revised_footnotes:
  - marker: a
    text: 'O: «no se levantará más». El modismo hebreo dice literalmente: «no volverá a levantarse», con sentido de irreversibilidad.'
    reason: lexical_alternative
  - marker: b
    text: «Virgen Israel» es una personificación poética de la nación, no una afirmación sobre estado sexual literal.
    reason: cultural_note
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Se corrige únicamente la nota [a] para que refleje una alternativa española idiomática y alineada con la alternativa documentada en inglés, evitando la redundancia «volver... otra vez».
