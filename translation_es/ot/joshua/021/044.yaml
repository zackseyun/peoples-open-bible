translation:
  language: es
  text: Yahvé les dio descanso por todos lados[a], conforme a todo lo que había jurado a sus padres. Ningún hombre de entre todos sus enemigos se mantuvo en pie delante de ellos; Yahvé entregó a todos sus enemigos en manos de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les concedió reposo»; el hebreo expresa dar descanso o reposo en sentido de seguridad lograda.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en su mano», un modismo común para indicar que los puso bajo su poder. En español se expresa naturalmente como «en manos de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּנַח
  english_pob_choice: gave them rest
  chosen_spanish: les dio descanso
  alternatives_spanish:
  - les concedió descanso
  - les dio reposo
  lexicon: HALOT
  rationale: El verbo hebreo expresa causar descanso o reposo en un contexto de cumplimiento del pacto. «Les dio descanso» conserva la idea básica y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo como «Yahvé», de acuerdo con la terminología del proyecto y para no sustituirlo por un título.
- source_word: מִסָּבִיב
  english_pob_choice: all around
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor
  - en derredor
  lexicon: HALOT
  rationale: La expresión indica seguridad total frente a amenazas circundantes. «Por todos lados» comunica con naturalidad el sentido espacial completo.
- source_word: כְּכֹל אֲשֶׁר נִשְׁבַּע
  english_pob_choice: according to all that he had sworn
  chosen_spanish: conforme a todo lo que había jurado
  alternatives_spanish:
  - según todo lo que había jurado
  - de acuerdo con todo lo que había jurado
  lexicon: HALOT
  rationale: «Conforme a» conserva la idea de correspondencia exacta con lo jurado, y «todo lo que había jurado» mantiene la totalidad del cumplimiento.
- source_word: לַאֲבוֹתָם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a sus padres». En español, «padres» preserva el parentesco masculino explícito y resulta comprensible sin forzar una formulación más amplia.
- source_word: וְלֹא עָמַד אִישׁ בִּפְנֵיהֶם
  english_pob_choice: Not one man stood before them
  chosen_spanish: Ningún hombre ... se mantuvo en pie delante de ellos
  alternatives_spanish:
  - No pudo resistirles nadie
  - No se sostuvo hombre alguno delante de ellos
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de «estar en pie delante» como modo de decir resistir con éxito. «Ningún hombre» conserva el singular distributivo de אִישׁ.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - nadie
  lexicon: HALOT
  rationale: El sustantivo masculino singular se conserva con «hombre», respetando la forma del hebreo y la precisión lexical.
- source_word: מִכָּל אֹיְבֵיהֶם
  english_pob_choice: from all their enemies
  chosen_spanish: de entre todos sus enemigos
  alternatives_spanish:
  - entre todos sus enemigos
  - de todos sus enemigos
  lexicon: HALOT
  rationale: 'La partícula מן después de la negación puede funcionar con sentido de extracción: «de entre». Esta opción suena natural y refleja que ni uno solo salió del conjunto de sus enemigos para oponerse.'
- source_word: נָתַן ... בְּיָדָם
  english_pob_choice: gave ... into their hand
  chosen_spanish: entregó ... en su mano
  alternatives_spanish:
  - entregó ... en su poder
  - los puso en su mano
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de la «mano» como poder/posesión. «Entregó ... en su mano» mantiene el idiomismo bíblico sin perder inteligibilidad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción sigue la política del proyecto de transcribir el nombre divino como «Yahvé», en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: La idiomática «estar en pie delante de»
  english_pob_reading: stood before them
  chosen_spanish_reading: se mantuvo en pie delante de ellos
  alternative_spanish_readings:
  - resistió delante de ellos
  - pudo mantenerse frente a ellos
  rationale: La frase hebrea es un modismo militar-jurídico de resistencia exitosa. Se conserva la imagen física para no diluir la fuerza idiomática del texto.
  doctrine_reference: HALOT, lema עמד; uso idiomático en contexto bélico
- issue: La metáfora «en su mano»
  english_pob_reading: into their hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - en su poder
  - en sus manos
  rationale: La «mano» singular es un idiomismo hebreo para dominio o control. Se mantiene la metáfora y el singular, tal como en el hebreo.
  doctrine_reference: HALOT, lema יד; idiomática de entrega/poder
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la revisión más reciente del audit trail inglés: mantiene «descanso» en lugar de una paráfrasis más libre, conserva el orden natural de «de entre todos sus enemigos» con el sujeto negativo, y preserva la idiomática «en su mano» sin convertirla en explicación explícita dentro del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma fija del nombre divino, conforme al estándar del proyecto.
  - Se mantiene el registro bíblico sobrio y moderno, evitando calcos innecesarios pero preservando las metáforas hebreas relevantes.
  - La frase «de entre todos sus enemigos» busca reflejar la partitiva del hebreo sin perder fluidez en español.
  - «Padres» conserva el masculino explícito del texto fuente, conforme a la política de precisión de género cuando el hebreo lo requiere.
