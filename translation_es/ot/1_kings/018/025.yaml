translation:
  language: es
  text: 'Entonces Elías dijo a los profetas de Baal: «Elijan para ustedes un toro y prepárenlo primero, porque son muchos; luego invoquen el nombre de su dios[a], pero no pongan fuego[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «invocar el nombre de su dios»; el giro idiomático significa invocar o apelar a la deidad.'
    reason: lexical_alternative
  - marker: b
    text: O «no pongan fuego debajo de él»; el hebreo no dice explícitamente «debajo de él», aunque eso está implícito en el contexto sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces» conserva la secuencia de manera natural en español sin perder el valor de progresión.
- source_word: לִנְבִיאֵי הַבַּעַל
  english_pob_choice: to the prophets of Baal
  chosen_spanish: a los profetas de Baal
  alternatives_spanish:
  - a los profetas de Baal
  lexicon: HALOT
  rationale: 'La cadena constructa se expresa de forma directa y clara en español como pertenencia o relación: «profetas de Baal».'
- source_word: בַּחֲרוּ לָכֶם הַפָּר הָאֶחָד
  english_pob_choice: Choose one bull for yourselves
  chosen_spanish: Elijan para ustedes un toro
  alternatives_spanish:
  - Elijan uno de los toros para ustedes
  - Elijan el toro para ustedes
  lexicon: HALOT
  rationale: «Toro» refleja el animal sacrificial con naturalidad en español; el artículo más numeral alude a uno de los dos toros del contexto. «Para ustedes» conserva לָכֶם.
- source_word: וַעֲשׂוּ
  english_pob_choice: prepare it
  chosen_spanish: prepárenlo
  alternatives_spanish:
  - préparenlo para el sacrificio
  - háganlo
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה se refiere a dejar el animal listo para la ofrenda; «prepárenlo» evita la vaguedad de «háganlo» y no añade más de lo que el texto dice.
- source_word: רִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  lexicon: HALOT
  rationale: La forma adverbial indica prioridad temporal; «primero» es la equivalencia más natural.
- source_word: כִּי אַתֶּם הָרַבִּים
  english_pob_choice: because you are many
  chosen_spanish: porque son muchos
  alternatives_spanish:
  - porque son más numerosos
  - porque ustedes son muchos
  lexicon: HALOT
  rationale: La cláusula da la razón para actuar antes que Elías. «Son muchos» conserva la idea de número sin sobreexplicar una comparación que el hebreo no formula explícitamente.
- source_word: וְקִרְאוּ בְּשֵׁם אֱלֹהֵיכֶם
  english_pob_choice: then call on the name of your god
  chosen_spanish: luego invoquen el nombre de su dios
  alternatives_spanish:
  - luego llamen en el nombre de su dios
  - luego clamen al nombre de su dios
  lexicon: HALOT
  rationale: «Invocar el nombre» mantiene el giro idiomático hebreo sin perder naturalidad. «Su dios» sigue el contexto singular de Baal y evita una pluralidad no requerida en el español.
- source_word: וְאֵשׁ לֹא תָשִׂימוּ
  english_pob_choice: but put no fire under it
  chosen_spanish: pero no pongan fuego
  alternatives_spanish:
  - pero no pongan fuego debajo
  - pero no le pongan fuego
  lexicon: HALOT
  rationale: En español, «poner fuego» comunica adecuadamente la prohibición. No se añade «debajo» en el texto principal porque el hebreo no lo expresa de forma explícita; el contexto sacrificial lo sugiere.
theological_decisions:
- issue: אֱלֹהֵיכֶם con referencia a Baal
  english_pob_reading: your god
  chosen_spanish_reading: su dios
  alternative_spanish_readings:
  - sus dioses
  rationale: Aunque morfológicamente אֱלֹהִים puede ser plural, el referente inmediato es Baal en singular. «Su dios» refleja esa referencia contextual y evita sugerir una pluralidad teológica que el pasaje aquí no enfatiza.
  doctrine_reference: Monoteísmo bíblico y uso contextual de אֱלֹהִים
- issue: מַחֲשָׁבָה implícita en la orden de actuar primero
  english_pob_reading: because you are many
  chosen_spanish_reading: porque son muchos
  alternative_spanish_readings:
  - porque ustedes son los más numerosos
  rationale: La motivación del mandato es práctica y narrativa, no doctrinal; la traducción preserva el motivo de número sin añadir una comparación explícita que el hebreo no formula.
  doctrine_reference: Precisión semántica del texto narrativo
translation_notes:
  revision_awareness: 'El contexto y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas. La única tensión relevante es la frase final: el inglés explicita «under it» por inferencia contextual, mientras que el hebreo solo dice «no pongan fuego». Se optó por una formulación española que conserva la prohibición sin introducir el complemento implícito en el cuerpo del texto, dejando la decisión abierta en la nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el tetragrámaton; aquí no ocurre.
  - «Dios»/«dios» se reserva según el contexto singular de Baal; en este verso el referente es singular.
  - Se evita «Señor» y «Cristo» porque no corresponden al material léxico de este pasaje.
  - 'El imperativo plural se expresa con forma formal de ustedes: «Elijan», «prepárenlo», «invoquen», «pongan».'
