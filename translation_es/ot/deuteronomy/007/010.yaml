translation:
  language: es
  text: y retribuye a los que lo odian en su cara[a], para destruirlos. No se demora con el que lo odia; le retribuirá en su cara[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a su cara/rostro»; el giro también puede entenderse como «ante él/ellos» o «en su presencia». Aquí comunica una retribución directa y personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְשַׁלֵּם
  english_pob_choice: and repays
  chosen_spanish: y paga
  alternatives_spanish:
  - y repaga
  - y recompensa
  lexicon: HALOT
  rationale: El piel de שׁלם expresa aquí retribución o pago de vuelta. En español, «paga» comunica de forma natural la reciprocidad retributiva; «repaga» suena menos idiomático y «recompensa» puede desviar hacia una idea más positiva o general.
- source_word: לְשֹׂנְאָיו
  english_pob_choice: those who hate him
  chosen_spanish: a los que lo odian
  alternatives_spanish:
  - a sus odiadores
  - a sus enemigos
  lexicon: HALOT
  rationale: El participio de שׂנא describe a personas caracterizadas por odio hacia él. «Los que lo odian» conserva esa relación personal y es más claro que «sus odiadores»; «enemigos» amplía demasiado el alcance semántico.
- source_word: אֶל־פָּנָיו
  english_pob_choice: to their face
  chosen_spanish: delante de su rostro
  alternatives_spanish:
  - en su presencia
  - ante su rostro
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «a su rostro». En español, «delante de su rostro» mantiene la fuerza directa del giro y el carácter personal del castigo; «en su presencia» suaviza demasiado la imagen.
- source_word: לְהַאֲבִידוֹ
  english_pob_choice: to destroy them
  chosen_spanish: para destruirlos
  alternatives_spanish:
  - para hacerlos perecer
  - para arruinarlos
  lexicon: HALOT
  rationale: El infinitivo causativo de אבד expresa destrucción/ruina total. «Para destruirlos» sigue de cerca la estructura final de propósito y conserva la intensidad del original; las otras opciones o son más perifrásticas o menos precisas.
- source_word: לֹא יְאַחֵר
  english_pob_choice: he does not delay
  chosen_spanish: No tarda
  alternatives_spanish:
  - No se demora
  - No se retrasa
  lexicon: HALOT
  rationale: El verbo אחר significa demorar o tardar. «No tarda» es breve, natural y preserva el tono gnómico del enunciado; «no se demora» también sería válido, pero un poco más explicativo.
- source_word: לְשֹׂנְאוֹ
  english_pob_choice: with the one who hates him
  chosen_spanish: con el que lo odia
  alternatives_spanish:
  - con el que lo aborrece
  - respecto del que lo odia
  lexicon: HALOT
  rationale: Aquí la lamed marca relación o referencia respecto al sujeto de odio. En español, «con el que lo odia» funciona como equivalente idiomático para la idea de trato/pedido diferido hacia esa persona, sin añadir matices ajenos.
- source_word: יְשַׁלֶּם לוֹ
  english_pob_choice: he will repay him
  chosen_spanish: le pagará
  alternatives_spanish:
  - le repagará
  - le recompensará
  lexicon: HALOT
  rationale: El verbo retoma la raíz de la primera cláusula y refuerza la reciprocidad. «Le pagará» mantiene la conexión léxica con «paga» y suena natural; el objeto indirecto «le» evita repetir innecesariamente el pronombre expreso.
theological_decisions:
- issue: Retribución divina directa contra los que odian a Dios
  english_pob_reading: Direct personal repayment by God against those who hate him
  chosen_spanish_reading: Dios paga y destruye de manera directa a los que lo odian
  alternative_spanish_readings:
  - Dios hace que sufran las consecuencias
  - Dios retribuye de forma impersonal
  rationale: El hebreo presenta a Yahvé como sujeto activo de la retribución, no como una mera causa secundaria. La traducción conserva esa agencia directa y la tensión teológica del juicio personal sin suavizarla en consecuencias impersonales.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: La expresión idiomática de «a la vista / delante del rostro»
  english_pob_reading: Literally, 'to his/their face'; the idiom can also be understood as 'before him/them' or 'in his/their presence.'
  chosen_spanish_reading: delante de su rostro
  alternative_spanish_readings:
  - ante él
  - en su presencia
  - a la vista de él
  rationale: La expresión hebrea es difícil de naturalizar sin perder su viveza. «Delante de su rostro» conserva la imagen corporal y la inmediatez del castigo; las alternativas son interpretativas y menos transparentes respecto del original.
  doctrine_reference: source transparency and idiom preservation
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético de Deuteronomio 7:10 junto con el audit trail inglés. Se mantuvo la idea de retribución directa («paga», «le pagará») y la finalidad del infinitivo («para destruirlos»), evitando suavizar el juicio divino. La nota conserva la ambigüedad idiomática de אֶל־פָּנָיו, tal como hizo la POB inglesa.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo explícitamente lo exigiera; en este versículo el sujeto está implícito en el contexto inmediato y no se añadió un nombre divino en el texto español.
  - Se prefirió «odian» frente a opciones más suaves para conservar la fuerza relacional del participio hebreo.
  - Se mantuvo «rostro» en la expresión idiomática para reflejar el paralelismo y la literalidad del hebreo, aunque el español común admita «presencia».
