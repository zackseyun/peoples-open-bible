  text: בְּ/דֵ֤י שֹׁפָ֨ר יֹ֘אמַ֤ר הֶאָ֗ח וּֽ֭/מֵ/רָחוֹק יָרִ֣יחַ מִלְחָמָ֑ה רַ֥עַם שָׂ֝רִים וּ/תְרוּעָֽה׀׃
base_translation:
  language: en
  yaml_path: translation/ot/job/039/025.yaml
  text: At the blast of the trumpet he says[a], ‘Aha!’ From far away he smells the battle[c][b], the thunder of commanders and the war cry.
  footnotes:
  - marker: a
    text: Or 'at the sound of the trumpet'; the Hebrew idiom בְּדֵי שֹׁפָר marks the occasion of the trumpet's sounding.
    reason: lexical_alternative
  - marker: b
    text: '''Aha!'' is an exclamation of eager excitement, depicting the horse''s readiness for battle.'
    reason: cultural_note
  - marker: c
    text: Or 'the roar of commanders and the shouting'; רַעַם is literally 'thunder,' used metaphorically for loud battle noise, and תְּרוּעָה can denote a battle shout or signal blast.
    reason: lexical_alternative
