review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura verbal del hebreo: distingue בחן («Examíname») de נסה («pruébame»), mantiene יְהוָה como «Yahvé» y conserva «corazón» para לִבִּי. Sin embargo, «mis entrañas» no preserva con suficiente precisión la imagen fuente de כִלְיוֹתַי ni la decisión léxica documentada en la auditoría inglesa, que retuvo la imaginería corporal de «kidneys» con nota explicativa. En español, «entrañas» desplaza la metáfora a otro campo corporal y añade una carga idiomática distinta.'
  spanish_quality_summary: El texto es legible y digno, pero «oh Yahvé» suena algo menos natural en español bíblico actual que la invocación directa sin «oh». Además, el anclaje de la nota en «refina[a]» no señala claramente el término explicado; debe anclarse en el equivalente de כִלְיוֹתַי. «Riñones» puede sonar extraño, pero es comprensible con nota y es más fiel al hebreo y a la rationale del proyecto.
  glossary_alignment: 'Alinea bien con «Yahvé». No hay conflicto con otros términos base del glosario. La principal desalineación es antropológica/lexical: el proyecto auditado justificó conservar la imagen corporal literal («kidneys»), mientras que el borrador la sustituye por «entrañas», que no es el mismo órgano ni la misma transparencia al texto fuente.'
  issues:
  - severity: medium
    issue: «entrañas» sustituye la imagen de «riñones»
    rationale: El hebreo כִלְיוֹתַי significa literalmente «mis riñones». Aunque la nota menciona el literal, el texto principal cambia la metáfora corporal a otra diferente. Dado que la auditoría inglesa documentó la preservación de la imagen corporal concreta, conviene usar «riñones» con nota para mantener transparencia al hebreo.
  - severity: low
    issue: La nota está anclada en «refina» en vez del término explicado
    rationale: La nota explica כִלְיוֹתַי, no el verbo צרופה. El marcador debe aparecer sobre «riñones» para que el lector identifique correctamente qué elemento requiere aclaración.
  - severity: low
    issue: «oh Yahvé» es menos natural en español contemporáneo
    rationale: No es incorrecto, pero «Examíname, Yahvé» suena más natural y digno en español neutral moderno sin pérdida de sentido.
  revised_spanish_text: Examíname, Yahvé, y pruébame; refina mis riñones[a] y mi corazón.
