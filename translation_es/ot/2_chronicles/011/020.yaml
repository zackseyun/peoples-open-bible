translation:
  language: es
  text: 'Después de ella[a], tomó a Maacá, la hija de Absalón, y le dio hijos: Abías, Atai, Zizá y Seloomit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''hija de Absalón''. En algunos contextos genealógicos, el término puede designar a una nieta o a una descendiente femenina más remota; por eso algunos entienden ''nieta de Absalón''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַחֲרֶיהָ
  english_pob_choice: After her
  chosen_spanish: Después de ella
  alternatives_spanish:
  - Después de eso
  - Más tarde
  lexicon: HALOT
  rationale: La expresión combina la idea de 'después de' con un sufijo femenino de tercera persona que remite a la esposa mencionada antes. En español, 'Después de ella' conserva esa referencia directa sin perder naturalidad.
- source_word: לָקַח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - recibió
  lexicon: HALOT
  rationale: En contexto matrimonial, el verbo hebreo literalmente significa 'tomar'. 'Tomó' mantiene la forma fuente y evita cerrar el sentido interpretativo con 'se casó con'.
- source_word: מַעֲכָה
  english_pob_choice: Maacah
  chosen_spanish: Maacá
  alternatives_spanish:
  - Maaca
  - Maakah
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio con grafía española consistente y legible. La acentuación ayuda a la pronunciación en español.
- source_word: בַּת אַבְשָׁלוֹם
  english_pob_choice: the daughter of Absalom
  chosen_spanish: la hija de Absalón
  alternatives_spanish:
  - la nieta de Absalón
  - la descendiente de Absalón
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente 'hija de Absalón'. Se mantiene esa redacción en el texto principal y se deja abierta la posibilidad genealógica amplia en nota.
- source_word: וַתֵּלֶד לוֹ
  english_pob_choice: and she bore him
  chosen_spanish: y ella le dio a luz
  alternatives_spanish:
  - y le dio hijos
  - y parió para él
  lexicon: HALOT
  rationale: '''Dar a luz'' comunica el evento de nacimiento de manera natural en español y conserva el sujeto femenino explícito del hebreo. Se evita suavizarlo con una expresión más interpretativa.'
- source_word: אֶת אֲבִיָּה וְאֶת עַתַּי וְאֶת זִיזָא וְאֶת שְׁלֹמִית
  english_pob_choice: Abijah, Attai, Ziza, and Shelomith
  chosen_spanish: Abías, Atai, Zizá y Seloomit
  alternatives_spanish:
  - Abías, Atai, Zizá y Selomit
  - Abías, Attai, Zizá y Shelomith
  lexicon: Transliteración de nombres propios
  rationale: Los nombres propios se transliteran de forma reconocible para lectores en español. Se conserva la secuencia y el juego de nombres sin añadir interpretación.
theological_decisions:
- issue: Designación genealógica de Maacá como 'hija de Absalón'
  english_pob_reading: Retain the literal wording 'the daughter of Absalom' in the main text; note that the term may sometimes denote granddaughter or more remote descendant.
  chosen_spanish_reading: Mantener 'la hija de Absalón' en el texto principal y señalar que también puede entenderse como 'nieta' o descendiente más remota.
  alternative_spanish_readings:
  - la nieta de Absalón
  - la descendiente de Absalón
  rationale: El hebreo dice explícitamente 'hija'. La traducción principal preserva esa forma y la nota evita resolver de antemano la cuestión genealógica, respetando la tensión documentada por el POB inglés.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El audit trail inglés indica acuerdo alto y sin revisiones aplicadas; por tanto, este borrador sigue de cerca la solución ya validada, adaptándola al español con mínima intervención y manteniendo la nota genealógica relevante.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene el verbo literal 'tomó' para conservar la fuerza del hebreo en un contexto matrimonial.
  - Los nombres propios se transliteran de manera uniforme y sin intentar harmonizarlos con formas tradicionales eclesiásticas.
  - La nota al pie se ancla solo en 'ella[a]' para señalar la ambigüedad genealógica sin recargar el texto principal.
