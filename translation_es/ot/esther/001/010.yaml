translation:
  language: es
  text: El séptimo día[a], cuando el corazón del rey estaba alegre con el vino, dijo a Mehumán, Bizta, Jarboná, Bigta, Abagta, Zetar[b] y Carcas—los siete eunucos que atendían al rey Asuero—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando el rey estaba de buen ánimo por el vino». El hebreo emplea un modismo que habla del corazón del rey alegrado por el vino, sin decir de manera explícita que estuviera borracho.'
    reason: lexical_alternative
  - marker: b
    text: «Eunucos» puede, en algunos contextos, referirse de manera más amplia a funcionarios de la corte; sin embargo, aquí se conserva el sentido léxico más directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: On the seventh day
  chosen_spanish: Al séptimo día
  alternatives_spanish:
  - En el séptimo día
  - El séptimo día
  lexicon: HALOT
  rationale: La frase temporal hebrea se vierte de modo natural y breve con una preposición en español. ‘Al séptimo día’ conserva la relación temporal sin añadir información no explícita en el versículo.
- source_word: כְּטוֹב לֵב הַמֶּלֶךְ בַּיָּיִן
  english_pob_choice: when the king’s heart was merry with wine
  chosen_spanish: cuando el corazón del rey estaba alegre con el vino
  alternatives_spanish:
  - cuando el rey estaba de buen ánimo por el vino
  - cuando el rey estaba ebrio
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo del ‘corazón’ y la idea de alegría producida por el vino. ‘Alegre con el vino’ mantiene la fuerza idiomática sin afirmar más de lo que dice el texto, mientras que ‘ebrio’ sería más fuerte de lo que exige la expresión.
- source_word: אָמַר
  english_pob_choice: he told
  chosen_spanish: dijo a
  alternatives_spanish:
  - le dijo
  - ordenó a
  lexicon: HALOT
  rationale: אָמַר es el verbo común ‘decir’. En español, ‘dijo a’ es la forma directa y sobria que mantiene abierta la relación con el mandato implícito que continúa en el versículo siguiente.
- source_word: לִמְהוּמָן בִּזְּתָא חַרְבוֹנָא בִּגְתָא וַאֲבַגְתָא זֵתַר וְכַרְכַּס
  english_pob_choice: Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar, and Karkas
  chosen_spanish: Mehumán, Bizta, Jarboná, Bigta, Abagta, Zetar y Carcas
  alternatives_spanish:
  - Mehumán, Bizta, Harboná, Bigta, Abagta, Zetar y Carcas
  - Mehumán, Bizta, Jarboná, Bigta, Abagta, Zetar y Karkas
  lexicon: HALOT
  rationale: Son nombres propios persas/hebreos transliterados. Se prefieren formas españolas legibles y consistentes con la tradición de transliteración en castellano, sin intentar reinterpretarlos.
- source_word: שִׁבְעַת הַסָּרִיסִים
  english_pob_choice: the seven eunuchs
  chosen_spanish: los siete eunucos
  alternatives_spanish:
  - los siete oficiales
  - los siete cortesanos
  lexicon: HALOT
  rationale: Se conserva el sentido léxico más directo de סָרִיס como ‘eunuco’, tal como hace la POB en inglés. ‘Oficiales’ sería una atenuación interpretativa no requerida por el texto aquí.
- source_word: הַמְשָׁרְתִים אֶת פְּנֵי
  english_pob_choice: who attended
  chosen_spanish: que atendían
  alternatives_spanish:
  - que servían en presencia de
  - que asistían
  lexicon: HALOT
  rationale: El participio con ‘ante el rostro de’ expresa servicio de presencia/corte. ‘Atendían’ comunica de forma natural la idea de estar al servicio personal del rey sin perder el matiz cortesano.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: al rey Asuero
  alternatives_spanish:
  - al rey Ahasuero
  - al rey Ahasuerus
  lexicon: HALOT
  rationale: Se preserva el título real con el nombre propio tradicional en español, ‘Asuero’. El orden ‘al rey Asuero’ fluye de manera natural en castellano y mantiene la aposición del original.
theological_decisions:
- issue: La expresión idiomática sobre el estado del rey con el vino puede sonar a embriaguez o solo a alegría/animación.
  english_pob_reading: The Hebrew idiom speaks of the king’s heart being glad because of wine, without explicitly stating drunkenness.
  chosen_spanish_reading: '‘cuando el corazón del rey estaba alegre con el vino’ mantiene la ambigüedad: sugiere animación producida por el vino, pero no afirma embriaguez explícita.'
  alternative_spanish_readings:
  - ‘cuando el rey estaba de buen ánimo por el vino’
  - ‘cuando el rey estaba ebrio’
  rationale: 'La POB en inglés retiene la tensión semántica del hebreo y evita sobretraducir. En español, conviene preservar esa misma cautela: el texto indica alegría asociada al vino, pero no obliga a traducirlo como intoxicación plena.'
  doctrine_reference: Lexical/theological restraint; evitar inferencias no explicitadas por el texto.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el ‘to’ final porque el versículo termina con la identificación de los siete eunucos y no incluye todavía el contenido del mandato. En español se ha dejado la frase abierta con raya final para reflejar el corte del versículo y no anticipar el infinitivo del versículo siguiente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como convención del proyecto cuando aparezca el nombre divino; aquí no aparece en el versículo.
  - Se mantiene ‘Asuero’ como forma española establecida para אֲחַשְׁוֵרוֹשׁ.
  - Se conserva ‘eunucos’ por fidelidad léxica, sin sustituirlo por ‘oficiales’ en el texto principal.
  - Los nombres propios se transliteran de manera legible y uniforme para lectura pública en español.
