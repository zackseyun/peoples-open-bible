  rationale: 'La revisión corrige el problema principal del borrador: los marcadores de notas ahora están anclados exactamente en las expresiones pertinentes y ya no hay duplicación innecesaria sobre מֵעֵת הֱיוֹתָהּ. También se suaviza «su venir a ser» a «en que llegó a ser» para mejorar la naturalidad del español sin perder el matiz verbal del hebreo. Se conserva «el Señor Yahvé» por alineación con la política del proyecto respecto de יהוה y se mantienen las notas teológicas necesarias sobre la identidad implícita del hablante y la ambigüedad de «su Espíritu».'
