  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: ''sus casas'', seguridad/liberación del temor, y la metáfora abierta de ''la vara de Dios''. Sin embargo, en la segunda cláusula el pronombre ''ellas'' desplaza indebidamente el referente hacia ''casas'', mientras que עֲלֵיהֶם en contexto apunta naturalmente a las personas impías descritas en el pasaje (''ellos''), no a las casas mismas. Además, ''seguras de temor'' suena poco idiomático en español; conviene ajustar sin perder la cercanía a מִפָּחַד.'
  spanish_quality_summary: El español es en general claro y digno, pero 'están seguras de temor' resulta forzado; 'están a salvo del temor' o 'están seguras, sin temor' suena más natural. También 'sobre ellas' es menos natural y semánticamente más débil que 'sobre ellos' en esta línea poética. La nota alternativa puede mantenerse con mejor formulación.
  glossary_alignment: 'Alineado con la terminología del proyecto: אֱלוֹהַּ -> ''Dios''; שֵׁבֶט -> ''vara'' preservando la tensión teológica; no hay conflicto con términos clave del glosario. La única corrección relevante es pronominal/contextual, no terminológica.'
  issues:
  - severity: medium
    issue: 'Expresión poco idiomática: ''están seguras de temor'''
    rationale: Aunque intenta calcar 'from fear', en español esa construcción suena antinatural. El hebreo expresa libertad o resguardo frente al temor; 'están a salvo del temor' lo comunica con fidelidad y buena legibilidad.
  - severity: high
    issue: Referente incorrecto en 'sobre ellas'
    rationale: El borrador hace concordar עֲלֵיהֶם con 'casas', pero la cláusula 'la vara de Dios no está sobre ellos' en contexto se refiere a las personas/casas como unidad vivencial de los impíos, y en español el referente más fiel y natural es 'ellos'. Traducir 'ellas' sugiere que la vara recae literalmente sobre las casas, debilitando el sentido del original.
  - severity: low
    issue: Nota alternativa mejorable
    rationale: La nota 'sus hogares están seguros de temor' conserva la misma torpeza idiomática del texto principal. Debe ajustarse a una alternativa natural en español.
  revised_spanish_text: Sus casas están a salvo del temor[a], y la vara[b] de Dios no está sobre ellos.
