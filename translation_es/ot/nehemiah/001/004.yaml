translation:
  language: es
  text: Y cuando oí[a] estas palabras, me senté y lloré, y estuve de duelo durante días[b], y estaba ayunando y orando delante del Dios del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘estas cosas’. El hebreo דְּבָרִים puede significar ‘palabras’, ‘asuntos’ o ‘cosas’.
    reason: lexical_alternative
  - marker: b
    text: O ‘ayuné y oré’. La forma hebrea puede traducirse de manera más simple, pero ‘estaba ayunando y orando’ refleja mejor el sentido continuo de הָיָה con participios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּשָׁמְעִי
  english_pob_choice: And when I heard
  chosen_spanish: Y aconteció que, cuando oí
  alternatives_spanish:
  - Y cuando oí
  - Y sucedió que, cuando oí
  lexicon: HALOT
  rationale: La construcción narrativa con וַיְהִי + כְּ + infinitivo se expresa de manera natural en español con una fórmula temporal que mantenga la secuencia sin volverse pesada. 'Y aconteció que' conserva el valor introductorio de la cláusula y 'cuando oí' reproduce la relación temporal de forma fluida.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos asuntos
  - este informe
  lexicon: HALOT
  rationale: דְּבָרִים puede significar 'palabras', 'cosas' o 'asuntos'. Aquí Nehemías reacciona a lo que acaba de oír; 'estas palabras' es una forma fiel y natural en español, sin cerrar indebidamente el alcance semántico.
- source_word: יָשַׁבְתִּי
  english_pob_choice: I sat down
  chosen_spanish: me senté
  alternatives_spanish:
  - me senté allí
  - me senté
  lexicon: HALOT
  rationale: ישׁב en este contexto describe la respuesta física inmediata de sentarse. 'Me senté' es la expresión española más directa y natural para el impacto emocional del pasaje.
- source_word: וָאֶבְכֶּה
  english_pob_choice: and wept
  chosen_spanish: y lloré
  alternatives_spanish:
  - y me eché a llorar
  - y lloraba
  lexicon: HALOT
  rationale: בכה significa 'llorar/llorar de pena'. 'Lloré' transmite con precisión la acción, y en español resulta más natural y sobrio que 'lloré' como calco de una fórmula verbal más marcada.
- source_word: וָאֶתְאַבְּלָה
  english_pob_choice: and mourned
  chosen_spanish: y me lamenté
  alternatives_spanish:
  - y guardé duelo
  - y me dolí
  lexicon: HALOT
  rationale: אבל denota duelo o lamento sostenido. 'Me lamenté' conserva el tono de duelo y funciona bien en paralelo con 'lloré'; 'guardé duelo' sería posible, pero suena más técnico y menos inmediato en esta oración.
- source_word: יָמִים
  english_pob_choice: for days
  chosen_spanish: por días
  alternatives_spanish:
  - durante días
  - muchos días
  lexicon: HALOT
  rationale: '''Días'' funciona adverbialmente para expresar duración. ''Por días'' reproduce el sentido sin añadir una cuantificación que el hebreo no especifica.'
- source_word: וָאֱהִי צָם וּמִתְפַּלֵּל
  english_pob_choice: and I was fasting and praying
  chosen_spanish: y estaba ayunando y orando
  alternatives_spanish:
  - y ayuné y oré
  - y seguía ayunando y orando
  lexicon: HALOT
  rationale: La construcción con הָיָה + participios sugiere acción continua o durativa. 'Estaba ayunando y orando' refleja ese aspecto progresivo mejor que un pretérito simple.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: לִפְנֵי expresa 'delante de' / 'en presencia de'. 'Delante de' mantiene la relación espacial y oracional sin sonar demasiado formal en español.
- source_word: אֱלֹהֵי הַשָּׁמָיִם
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios de los cielos
  alternatives_spanish:
  - el Dios del cielo
  - el Dios celestial
  lexicon: HALOT
  rationale: La expresión en hebreo es un título fijo de Dios en Esdras-Nehemías. 'Dios de los cielos' conserva el plural hebreo de שָׁמַיִם y su formulación tradicional en español bíblico, sin sustituir el título por el nombre divino.
theological_decisions:
- issue: Título divino אֱלֹהֵי הַשָּׁמָיִם
  english_pob_reading: the God of heaven
  chosen_spanish_reading: el Dios de los cielos
  alternative_spanish_readings:
  - el Dios del cielo
  - Dios de los cielos
  rationale: El hebreo presenta un título, no el nombre propio YHWH. Mantener 'el Dios de los cielos' respeta el valor titular del hebreo y evita introducir 'Yahvé' donde el texto no lo emplea. La forma con artículo es natural en español y conserva la referencia al Dios de Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5; contested-term policy for YHWH
- issue: Aspecto progresivo de הָיָה + participios en וָאֱהִי צָם וּמִתְפַּלֵּל
  english_pob_reading: I was fasting and praying
  chosen_spanish_reading: estaba ayunando y orando
  alternative_spanish_readings:
  - ayuné y oré
  - seguía ayunando y orando
  rationale: La forma hebrea comunica acción en curso. En español, el imperfecto progresivo 'estaba ayunando y orando' preserva mejor esa continuidad que el pretérito simple, sin exagerar el matiz durativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 2
translation_notes:
  revision_awareness: 'Coincide con el consenso del audit trail en inglés: se mantiene la lectura temporal natural de וַיְהִי כְּשָׁמְעִי, la amplitud semántica de דְּבָרִים, el carácter durativo de הָיָה + participios, y el título fijo ''Dios de los cielos'' sin introducir el nombre divino. No se documentan revisiones posteriores que exijan cambios.'
  spanish_consistency_notes:
  - Se usó 'ayunando y orando' para reflejar el aspecto progresivo, en paralelo con el inglés auditado.
  - Se evitó 'SEÑOR' porque el hebreo dice אֱלֹהֵי הַשָּׁמָיִם, un título y no el tetragrámaton.
  - La puntuación mantiene el flujo narrativo y el paralelismo del hebreo sin añadir contenido interpretativo.
