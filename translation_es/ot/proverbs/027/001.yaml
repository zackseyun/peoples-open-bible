review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del hebreo: prohibición de la autojactancia respecto al futuro y razón basada en la ignorancia humana sobre lo que traerá el día. Sin embargo, «del día de mañana» suena menos natural que opciones más idiomáticas para בְּיוֹם מָחָר, y la nota al pie incluye comillas innecesarias dentro del texto de la nota.'
  spanish_quality_summary: El español es claro y mayormente fiel, pero puede mejorarse la naturalidad proverbial. «No te jactes de mañana» es más idiomático y conciso que «del día de mañana» sin perder el matiz prospectivo. El resto del versículo fluye bien y mantiene tono sapiencial moderno y digno.
  glossary_alignment: No hay términos del glosario mayor en juego. «Jactes» refleja bien תִּתְהַלֵּל. «No sabes» corresponde correctamente a תֵדַע. «Qué producirá un día» es aceptable para מַה יֵּלֶד יוֹם, y la alternativa más literal debe conservarse en nota.
  issues:
  - severity: medium
    issue: «del día de mañana» es poco natural en español actual
    rationale: Aunque es comprensible y cercano a la literalidad, suena algo rígido. El hebreo expresa referencia prospectiva; «de mañana» o «acerca de mañana» comunica mejor el sentido proverbial en español.
  - severity: low
    issue: La nota al pie tiene puntuación y comillas internas innecesarias
    rationale: La formulación actual empieza con una comilla simple sobrante. Conviene normalizarla para legibilidad editorial.
  revised_spanish_text: No te jactes de mañana[a], porque no sabes qué producirá un día.
