translation:
  language: es
  text: El temor de Yahvé es gloria y exultación, y gozo y una corona de júbilo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una corona de jubilación». El griego acumula casi sinónimos para honor y gozo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - reverencia
  - awe
  lexicon: BDAG
  rationale: Conserva la fórmula sapiencial estable «temor de Yahvé» y mantiene el rango semántico de respeto obediente y temor real que el griego puede abarcar. «Reverencia» suaviza demasiado el término; «miedo» suena más estrecho y menos idiomático en esta expresión bíblica.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Siguiendo el criterio del proyecto, el griego κύριος en un contexto que corresponde al nombre divino se vierte como «Yahvé», no como máscara litúrgica «Señor». Esto preserva la referencia al nombre divino en la sabiduría bíblica.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» es la correspondencia natural y tradicional para δόξα en este contexto de honor atribuido por la piedad. Mantiene el peso retórico del paralelismo.
- source_word: καύχημα
  english_pob_choice: exultation
  chosen_spanish: exultación
  alternatives_spanish:
  - alabanza gozosa
  - regocijo
  - motivo de orgullo
  lexicon: BDAG
  rationale: La revisión inglesa optó por «exultation» para reflejar mejor el matiz positivo de καύχημα. «Exultación» conserva esa elevación jubilosa sin introducir la connotación negativa que puede tener «orgullo» o «presunción» en español.
- source_word: εὐφροσύνη
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - contentamiento
  lexicon: BDAG
  rationale: En español, «alegría» comunica con claridad el gozo general del paralelismo y evita una repetición demasiado cercana con «exultación». Aunque «gozo» también es posible, «alegría» resulta más transparente en una lista poética.
- source_word: στέφανος
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - cetro
  lexicon: BDAG
  rationale: «Corona» es el equivalente más natural para στέφανος y conserva la imagen de premio/honor. «Guirnalda» sería posible, pero en español bíblico puede sonar más restringida que el símbolo de honor victorioso.
- source_word: ἀγαλλιάματος
  english_pob_choice: rejoicing
  chosen_spanish: júbilo
  alternatives_spanish:
  - regocijo
  - exultación
  - alegría
  lexicon: BDAG
  rationale: La forma genitiva califica a «corona» como una corona caracterizada por júbilo. «Júbilo» preserva el tono festivo y distingue este término de la «alegría» anterior, manteniendo la acumulación poética del griego.
theological_decisions:
- issue: Fórmula sapiencial «φόβος κυρίου»
  english_pob_reading: The fear of the Lord
  chosen_spanish_reading: El temor de Yahvé
  alternative_spanish_readings:
  - El temor del Señor
  - La reverencia por Yahvé
  rationale: 'Se preserva la fórmula bíblica clásica y su densidad teológica: no se reduce a una mera actitud afectiva, sino que incluye respeto, sumisión y reconocimiento de la santidad divina. Dado que el contexto griego apunta al nombre divino, «Yahvé» es preferible a la máscara «Señor».'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5; Contested terms table for κύριος'
translation_notes:
  revision_awareness: La traducción sigue la última revisión inglesa al evitar un equivalente peyorativo para καύχημα y optar por una palabra positiva de exaltación. También integra la decisión del proyecto de traducir κύριος relacionado con el nombre divino como «Yahvé» en lugar de «Señor».
  spanish_consistency_notes:
  - Se mantuvo la fórmula «temor de Yahvé» por su fuerza bíblica y coherencia con el léxico sapiencial.
  - Se evitó «Cristo» por no corresponder al texto de Sirácides.
  - «Gloria / exultación / alegría / júbilo» preserva el paralelismo de acumulación sin forzar sinonimia exacta.
  - La nota alternativa refleja la posibilidad semántica de ἀγαλλιάματος como «jubilación», pero se prefirió «júbilo» por naturalidad en español bíblico.
