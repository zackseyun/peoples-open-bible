revisions:
- from: Así ha hecho Betel[a] con ustedes por causa de la gran maldad[b] de ustedes. Al amanecer, el rey de Israel será completamente cortado[c].
  to: Así les ha hecho Betel[a] por causa de su gran maldad[b]. Al amanecer, el rey de Israel será totalmente destruido[c].
  rationale: Se ajusta la sintaxis para un español más natural («Así les ha hecho Betel»), se mejora la fluidez con «su gran maldad», y se reemplaza «será completamente cortado» por «será totalmente destruido», que comunica mejor en español el sentido principal documentado por el POB para נִדְמֹה נִדְמָה, manteniendo en nota las alternativas semánticas preservadas por la auditoría inglesa.
