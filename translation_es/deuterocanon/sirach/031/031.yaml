translation:
  language: es
  text: Escucha, hijo mío, y acepta mis palabras; no te burles de mí[a], y al final hallarás mis palabras.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo תלעיז puede significar también «me pongas en ridículo» o «te mofes de mí», no solo «me rechaces».
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego en esta numeración presenta otra sentencia: «Así también un hombre que ayuna por sus pecados y vuelve a hacer las mismas cosas: ¿quién escuchará su oración? ¿Y qué aprovechó al humillarse?». Esto refleja una discrepancia textual importante en la alineación o el contenido del versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: שמע
  english_pob_choice: Listen
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  lexicon: HALOT
  rationale: 'Imperativo de שמע: en español, ''escucha'' comunica atención obediente y suena natural en un exhorto sapiencial.'
- source_word: בני
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío querido
  lexicon: HALOT
  rationale: Conserva el vocativo filial masculino y el tono afectuoso/directivo del hebreo sin neutralizar el género.
- source_word: וקח
  english_pob_choice: accept
  chosen_spanish: acepta
  alternatives_spanish:
  - recibe
  - toma
  lexicon: HALOT
  rationale: Aunque literalmente es 'toma', en la instrucción sapiencial 'acepta' expresa mejor la recepción obediente de la enseñanza.
- source_word: אמרי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mi enseñanza
  lexicon: HALOT
  rationale: Reproduce el plural posesivo del hebreo y mantiene la repetición retórica al final del verso.
- source_word: תלעיז
  english_pob_choice: mock me
  chosen_spanish: me tomes a burla
  alternatives_spanish:
  - me burles
  - me menosprecies
  - me pongas en ridículo
  lexicon: HALOT
  rationale: La raíz admite 'burlarse/scoff/mock'; 'tomar a burla' transmite mejor el matiz de desprecio o mofa que un simple 'rechazar'.
- source_word: עליי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - contra mí
  - a mí
  lexicon: HALOT
  rationale: Mantiene el objeto personal del verbo de burla/contempto en una construcción natural en español.
- source_word: ובאחרית
  english_pob_choice: and in the end
  chosen_spanish: y al final
  alternatives_spanish:
  - y al cabo
  - y después
  lexicon: HALOT
  rationale: La expresión denota el desenlace o resultado final; 'al final' es la forma más clara y idiomática.
- source_word: תמצא
  english_pob_choice: you will find
  chosen_spanish: hallarás
  alternatives_spanish:
  - encontrarás
  - descubrirás
  lexicon: HALOT
  rationale: '''Hallarás'' es una equivalente idiomática formal y clara para מצא en este contexto sapiencial.'
- source_word: דברי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mi enseñanza
  lexicon: HALOT
  rationale: Conserva la referencia al discurso del maestro y la repetición enfática del hebreo.
theological_decisions:
- issue: Texto hebreo extante frente a paralelo griego distinto en la numeración de Sirácides 31:31
  english_pob_reading: Translate the extant Hebrew witness as the main text, with the Greek divergence disclosed as a textual mismatch in a note.
  chosen_spanish_reading: Traducir el testimonio hebreo disponible como texto principal; señalar en nota que el paralelo griego de esta numeración contiene otra sentencia.
  alternative_spanish_readings:
  - Adoptar la sentencia griega sobre el ayuno y el pecado como texto principal
  - Armonizar ambos testimonios en una sola redacción
  rationale: La política del proyecto para Sirácides es traducir desde el hebreo donde se conserva. Aquí el griego no ofrece una variante menor sino otro dicho completamente distinto; por integridad textual, se mantiene el hebreo y se informa la discrepancia sin fusionarla con el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; exponer honestamente las incertidumbres y divergencias textuales.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior colocando los marcadores [a] y [b] exactamente en el texto principal y añadiendo una nota [c] anclada a la repetición final de «mis palabras». La redacción sigue el hebreo extante como texto base y expone en nota la divergencia griega.
  spanish_consistency_notes:
  - Se mantuvo 'hijo mío' para conservar el vocativo masculino explícito del hebreo.
  - Se eligió 'me tomes a burla' para reflejar mejor el matiz de תלעיז que un simple 'rechaces'.
  - '''Hallarás'' preserva el registro sapiencial y el valor de מצא sin resultar arcaico en exceso.'
  - La nota [b] no armoniza el griego con el hebreo; solo documenta el desajuste textual en la numeración del versículo.
