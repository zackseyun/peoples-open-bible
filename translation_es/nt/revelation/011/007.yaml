review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: terminación futura de la μαρτυρία, identificación de la bestia que sube del abismo, y la secuencia hará guerra / vencerá / matará. La principal desviación está en la nota al pie: el texto español ya usa «contra ellos», pero la nota ofrece exactamente la misma lectura como alternativa, mientras que el rastro POB inglés preserva como alternativa la formulación más literal equivalente a «con ellos».'
  spanish_quality_summary: El español es claro, natural y digno. «Y cuando terminen su testimonio, la bestia que sube del abismo hará guerra contra ellos, los vencerá y los matará» suena idiomático y fiel. Solo requiere corregir la nota para que no duplique el texto principal y para que preserve la alternativa lexical pertinente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Bestia», «abismo», «testimonio» y «matará» están bien alineados con las decisiones del POB y con el uso apocalíptico en español. La elección principal «hará guerra contra ellos» es una adaptación idiomática española aceptable del griego ποιήσει μετ’ αὐτῶν πόλεμον, siempre que la nota preserve la alternativa más literal «con ellos».
  issues:
  - severity: medium
    issue: La nota al pie [a] repite la lectura del texto principal en lugar de dar una alternativa real.
    rationale: 'El texto principal dice «hará guerra contra ellos», y la nota dice «O: ‘hará guerra contra ellos’». Esto no aporta información y no preserva la alternativa documentada en el POB inglés.'
  - severity: low
    issue: La alternativa lexical relevante del griego μετά + genitivo no quedó representada en la nota española.
    rationale: Dado que el español principal opta por la forma idiomática «contra ellos», la nota debería conservar la posibilidad más literal «con ellos», tal como el audit trail inglés preserva la tensión entre literalidad y sentido hostil.
  revised_spanish_text: Y cuando terminen su testimonio[a], la bestia que sube del abismo hará guerra contra ellos, los vencerá y los matará.
  revised_footnotes:
  - marker: a
    text: 'O: «hará guerra con ellos».'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, claro e idiomático en español. Solo se corrige la nota al pie para que preserve una alternativa real y refleje la construcción griega más literal con μετά + genitivo.
