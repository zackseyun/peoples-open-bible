translation:
  language: es
  text: Un látigo para el caballo[a], una brida para el asno[b], y una vara para la espalda de los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un azote» para שׁוֹט.
    reason: lexical_alternative
  - marker: b
    text: מֶתֶג también puede traducirse «freno», aunque «brida» refleja mejor el conjunto del aparejo de control.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹט
  english_pob_choice: whip
  chosen_spanish: látigo
  alternatives_spanish:
  - azote
  - látigo
  lexicon: HALOT
  rationale: El hebreo designa un instrumento para azotar o impulsar; «látigo» es el equivalente natural en español moderno y conserva la fuerza disciplinaria del término. «Azote» también es posible, pero suena más abstracto o más vinculado al acto que al instrumento.
- source_word: לַסּוּס
  english_pob_choice: for the horse
  chosen_spanish: para el caballo
  alternatives_spanish:
  - para un caballo
  - para el caballo
  lexicon: HALOT
  rationale: 'La preposición ל expresa destino o adecuación: el látigo está destinado al caballo. El artículo definido en español mantiene bien el carácter proverbial del hebreo.'
- source_word: מֶתֶג
  english_pob_choice: bridle
  chosen_spanish: freno
  alternatives_spanish:
  - bridón
  - brida
  - freno
  lexicon: HALOT
  rationale: Aunque la POB inglesa prefirió «bridle» frente a «bit», en español «freno» comunica de forma clara el conjunto de aparejo que controla al animal. «Brida» sería más técnico, pero menos natural; «bridón» es demasiado especializado.
- source_word: לַחֲמוֹר
  english_pob_choice: for the donkey
  chosen_spanish: para el asno
  alternatives_spanish:
  - para el burro
  - para el asno
  lexicon: HALOT
  rationale: «Asno» es fiel, sobrio y bíblicamente reconocible. «Burro» sería más coloquial; «asno» conserva mejor el registro sapiencial.
- source_word: וְשֵׁבֶט
  english_pob_choice: and a rod
  chosen_spanish: y una vara
  alternatives_spanish:
  - y un bastón
  - y una vara
  lexicon: HALOT
  rationale: En Proverbios שֵׁבֶט suele referirse a una vara o vara de disciplina. «Vara» reproduce mejor ese valor que «bastón» o «palo».
- source_word: לְגֵו
  english_pob_choice: for the back
  chosen_spanish: para la espalda
  alternatives_spanish:
  - para la espalda
  - para el cuerpo
  lexicon: HALOT
  rationale: גֵו apunta al dorso o espalda, especialmente como lugar de golpe. «Espalda» es la opción más clara en español y evita la ambigüedad de «cuerpo».
- source_word: כְּסִילִים
  english_pob_choice: of fools
  chosen_spanish: de los necios
  alternatives_spanish:
  - de los necios
  - de los insensatos
  lexicon: HALOT
  rationale: En la sabiduría bíblica, כְּסִילִים denota necedad moral y espiritual; «necios» mantiene ese campo semántico sin perder naturalidad. «Insensatos» también es posible, pero «necios» preserva mejor el tono proverbial.
translation_notes:
  revision_awareness: La versión inglesa auditada está en estado estable (unchanged = true) y con acuerdo alto; esta propuesta sigue de cerca sus decisiones léxicas, ajustándolas al español natural sin introducir paráfrasis no sustentadas.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de tres miembros con sintaxis breve y proverbial.
  - Se conserva «necios» para כְּסִילִים en coherencia con el registro sapiencial.
  - No se usa «SEÑOR» ni terminología cultual ajena al versículo.
  - Las notas distinguen entre alternativas léxicas reales y no agregan matices doctrinales inexistentes en el texto.
