  rationale: 'Se ajusta el español para reflejar mejor el sentido del hebreo y del POB auditado: «aposento alto» por naturalidad y registro; «lamparero» por la especificidad de מְנוֹרָה; «venga a visitarnos» por español idiomático; y «podrá hospedarse allí» para comunicar claramente el valor de סוּר en contexto de alojamiento, conservando en nota la alternativa más literal.'
