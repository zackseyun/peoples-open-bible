base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/017/013.yaml
  text: O Yahweh[a], the hope of Israel, all who forsake you will be put to shame; those who turn away from you will be written in the earth, because they have forsaken Yahweh[c][b], the fountain of living waters.
  footnotes:
  - marker: a
    text: Or 'those who turn away from you.' The Hebrew here is textually difficult; the main text follows the Masoretic first-person reading.
    reason: textual_variant
  - marker: b
    text: Or 'written in the land.' The phrase may suggest a fleeting inscription in the soil, in contrast to enduring remembrance.
    reason: lexical_alternative
  - marker: c
    text: '''Living water'' refers to fresh, flowing water from a spring, not stagnant water.'
    reason: cultural_note
