  to: Berequías y Elcaná fueron porteros del arca[a].
  rationale: Se cambia «guardianes» por «porteros» para reflejar con mayor fidelidad el sentido específico de שֹׁעֲרִים como quienes custodian el acceso. Se mantiene «del arca» como complemento relacional natural en español, y la nota conserva la alternativa locativa documentada en el inglés POB.
