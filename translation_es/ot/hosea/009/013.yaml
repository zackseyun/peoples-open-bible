base_translation:
  language: en
  yaml_path: translation/ot/hosea/009/013.yaml
  text: Ephraim[a], as I have seen, is planted in a pleasant place like Tyre[c][b]; but Ephraim must bring out his children to the slayer.
  footnotes:
  - marker: a
    text: Or "as I saw, Ephraim was planted like Tyre in a pleasant place." The Hebrew syntax of the comparison is compressed.
    reason: alternative_reading
  - marker: b
    text: Or "to the slayer" or "to slaughter." The Hebrew says literally "to the killer/slayer."
    reason: lexical_alternative
  - marker: c
    text: Hebrew "his sons"; translated "his children" here to reflect the likely collective sense.
    reason: lexical_alternative
