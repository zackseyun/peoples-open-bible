translation:
  language: es
  text: 'Y ellos les dijeron: «Infórmennos de lo que está escrito». Y el primero, que había hablado acerca de la fuerza del vino[a], comenzó y dijo así:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «acerca del poder del vino», porque ἰσχύς puede significar fuerza, poder o vigor.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπαγγείλατέ
  english_pob_choice: Report
  chosen_spanish: Denos noticia
  alternatives_spanish:
  - Repórtennos
  - Cuéntennos
  - Declárennos
  lexicon: LSJ
  rationale: El imperativo plural pide un acto formal de comunicación. «Denos noticia» mantiene el tono de informe/manifestación pública mejor que un simple «díganos», sin introducir una paráfrasis excesiva.
- source_word: περὶ τῶν γεγραμμένων
  english_pob_choice: what has been written
  chosen_spanish: de lo que está escrito
  alternatives_spanish:
  - acerca de lo escrito
  - sobre lo que ha sido escrito
  lexicon: LSJ
  rationale: 'El participio perfecto pasivo γεγραμμένων tiene valor resultativo: aquello que permanece escrito. «De lo que está escrito» conserva ese estado y suena natural en español.'
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: LSJ
  rationale: Verbo narrativo inceptivo. «Comenzó» es la equivalencia formal y natural en español.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primer hombre
  - el primero de ellos
  lexicon: LSJ
  rationale: Referencia ordinal directa al primer orador; «el primero» reproduce la secuencia sin añadir elementos no presentes.
- source_word: ὁ εἴπας
  english_pob_choice: who had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que habló
  - el que había dicho
  lexicon: LSJ
  rationale: El participio aoristo remite a una intervención previa. «Que había hablado» mantiene la anterioridad relativa que la revisión inglesa aclaró con un pluperfecto.
- source_word: περὶ τῆς ἰσχύος τοῦ οἴνου
  english_pob_choice: about the strength of wine
  chosen_spanish: acerca de la fuerza del vino
  alternatives_spanish:
  - acerca del poder del vino
  - sobre la potencia del vino
  lexicon: LSJ
  rationale: ἰσχύς puede significar fuerza, poder o vigor. «Fuerza» conserva el rango semántico documentado y funciona bien en el contexto de comparación de eficacia o potencia, sin borrar la tensión léxica.
- source_word: οὕτως
  english_pob_choice: said thus
  chosen_spanish: dijo así
  alternatives_spanish:
  - dijo de este modo
  - habló así
  lexicon: LSJ
  rationale: La fórmula introductoria de discurso directa se vierte con naturalidad en español como «dijo así», que mantiene el valor de οὕτως sin sobrecargar el estilo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete LXX y el ajuste auditado del inglés POB, especialmente en la relación entre el participio previo («que había hablado») y la fórmula final «dijo así». Se evitó traducir mecánicamente desde el inglés, pero se respetó su decisión de distinguir ἰσχύς como un término con posible alcance de «fuerza/poder».
  spanish_consistency_notes:
  - Se usa «vino» en minúscula por tratarse del sustantivo común, no de un nombre propio o título.
  - 'Se mantiene el orden narrativo del griego: mandato, descripción del primer orador y fórmula de introducción al discurso.'
  - Se prefirió «fuerza» como opción principal, con nota de alternativa, para conservar la tensión semántica de ἰσχύς sin neutralizarla.
