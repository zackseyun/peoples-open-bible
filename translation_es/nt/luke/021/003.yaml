translation:
  language: es
  text: 'Y dijo: «En verdad les digo que esta viuda pobre echó[a] más que todos ellos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «echó dentro más que todos ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀληθῶς
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Verdaderamente
  - Ciertamente
  - Amén, les digo
  lexicon: BDAG
  rationale: Introduce una afirmación solemne y enfática. «En verdad» conserva bien el peso discursivo de Jesús en español moderno, con naturalidad y dignidad.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les hablo
  - les aseguro
  lexicon: BDAG
  rationale: Es una fórmula directa y autoritativa. «Les digo» mantiene la función idiomática sin volverse rígido; el plural de cortesía no aplica aquí porque el griego es plural de segunda persona.
- source_word: χήρα
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: BDAG
  rationale: Término estándar y preciso para una mujer cuyo esposo ha muerto.
- source_word: πτωχὴ
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitada
  - indigente
  - desamparada
  lexicon: BDAG
  rationale: «Pobre» es la equivalencia natural y fiel para la pobreza mencionada en el texto. No se especifica un grado mayor en el verso mismo; por eso no se intensifica más en la línea principal.
- source_word: αὕτη
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  lexicon: BDAG
  rationale: 'Conserva el valor deíctico: señala a la viuda concreta que Jesús tiene delante.'
- source_word: πλεῖον
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - una cantidad mayor
  - más cantidad
  lexicon: BDAG
  rationale: Es el comparativo cuantitativo natural en español y preserva la brevedad del griego.
- source_word: πάντων
  english_pob_choice: than all of them
  chosen_spanish: que todos
  alternatives_spanish:
  - que todos ellos
  - que los demás
  lexicon: BDAG
  rationale: En contexto se compara con los otros que daban ofrendas. «Que todos» es idiomático en español y transmite la comparación sin añadir explicación que el verso no da todavía.
- source_word: ἔβαλεν
  english_pob_choice: put in
  chosen_spanish: echó
  alternatives_spanish:
  - depositó
  - puso
  - metió
  lexicon: BDAG
  rationale: Aquí el verbo griego puede tener el sentido de introducir una ofrenda. El español «echó» conserva con naturalidad la imagen de «echar dentro» y permite mantener la alternativa léxica tradicional «cast/cast in» sin sonar arcaico. En la nota se explicita que también puede entenderse como «echar/cast in».
theological_decisions:
- issue: Comparación cuantitativa del don de la viuda
  english_pob_reading: 'Rendered as a quantitative comparison in context: ''put in more than all of them.'''
  chosen_spanish_reading: «echó más que todos» como comparación cuantitativa simple y no como explicación proporcional desarrollada
  alternative_spanish_readings:
  - echó más que todos ellos
  - echó una cantidad mayor que todos
  - echó más que cualquiera de ellos
  rationale: El griego expresa una comparación inmediata; el verso no explica aún la razón teológica o proporcional del valor del don. La traducción debe conservar esa tensión y no anticipar el comentario que vendrá después.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import claims the text does not yet make.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido y la evaluación del audit trail inglés, pero ajusta la imagen verbal para que suene natural en español sin perder la alternativa léxica de ἔβαλεν. No se introduce una explicación proporcional que el versículo no contiene.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma de proyecto solo cuando corresponda; este versículo no la requiere.
  - «En verdad» y «les digo» mantienen el tono solemne de una declaración de Jesús sin caer en arcaismo.
  - «Viuda pobre» conserva la tensión lexical entre estado social y pobreza, sin intensificarla más allá del texto.
  - La comparación final queda abierta para el contexto inmediato del versículo siguiente.
