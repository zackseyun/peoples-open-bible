translation:
  language: es
  text: 'Y aconteció en el año duodécimo, el día quince del mes, que la palabra de Yahvé[a] vino a mí, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». Algunas traducciones sustituyen el nombre divino por «el SEÑOR», pero aquí se conserva explícitamente.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un aviso profético fechado. «Aconteció» conserva ese valor discursivo sin caer en una paráfrasis libre; «sucedió» también sería posible, pero «aconteció» mantiene un tono más bíblico y fluido en español.
- source_word: בִּשְׁתֵּי עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the twelfth year
  chosen_spanish: en el año duodécimo
  alternatives_spanish:
  - en el año doce
  - en el año decimosegundo
  lexicon: HALOT
  rationale: La fórmula de datación pide un ordinal en español. «Año duodécimo» reproduce la estructura natural y precisa del hebreo; «año doce» sería menos idiomático en registro bíblico.
- source_word: בַּחֲמִשָּׁה עָשָׂר לַחֹדֶשׁ
  english_pob_choice: on the fifteenth day of the month
  chosen_spanish: el día quince del mes
  alternatives_spanish:
  - el quince del mes
  - en el decimoquinto día del mes
  lexicon: HALOT
  rationale: El hebreo literalmente dice «en el quince del mes». En español conviene explicitar «día» para claridad y naturalidad. Se conserva la forma fechada sin añadir elementos no presentes en el texto fuente.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahweh
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: «Yahvé». «Palabra» mantiene el sustantivo profético estándar y evita sustituirlo por una fórmula eclesiástica de ocultamiento del nombre divino.'
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona se vierte de manera directa y natural. «A mí» expresa adecuadamente el destinatario de la palabra divina.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'que dijo:'
  lexicon: HALOT
  rationale: La construcción infinitiva introduce discurso directo. En español, «diciendo:» conserva el valor aperturante de la fórmula profética y prepara la cita que sigue.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. En español se adopta «Yahvé», conforme al estándar del proyecto, para preservar el nombre pactal sin enmascararlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El audio de revisión indica alta concordancia y sin cambios requeridos; por ello se conserva la estructura de datación y la fórmula profética de manera estable, con ajuste al estándar español del nombre divino.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa profética con «Y aconteció», coherente con un estilo bíblico moderno y legible.
  - «Yahvé» se usa de forma consistente con la política terminológica del proyecto para el Tetragrámaton.
  - La fecha se expresa con ordinales naturales en español, sin perder la estructura del hebreo.
  - «Diciendo:» deja abierta la cita directa, como en la fórmula profética hebrea.
