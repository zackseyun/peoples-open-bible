translation:
  language: es
  text: Pues, en efecto, no permitir que los que actúan impíamente sigan por mucho tiempo, sino hacer que les sobrevengan enseguida los castigos, es señal de gran bondad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ μὴ πολὺν χρόνον ἐᾶσθαι
  english_pob_choice: not allowing those who act impiously to go on for a long time
  chosen_spanish: no permitir que los que actúan impíamente sigan por mucho tiempo
  alternatives_spanish:
  - no dejar que los impíos continúen por mucho tiempo
  - no tolerar por mucho tiempo a los que obran impíamente
  lexicon: LSJ
  rationale: 'Mantiene la construcción de infinitivo sustantivado como una idea general: no se trata de una acción puntual, sino de la no-permisión de una prolongación. «Seguir por mucho tiempo» conserva el valor de duración del griego.'
- source_word: τοὺς δυσσεβοῦντας
  english_pob_choice: those who act impiously
  chosen_spanish: los que actúan impíamente
  alternatives_spanish:
  - los impíos
  - los que obran con irreverencia
  - los que hacen el mal
  lexicon: LSJ
  rationale: 'Se conserva el matiz verbal del participio δυσσεβοῦντας: no solo una etiqueta estática, sino gente que se comporta de manera impía. «Actúan impíamente» refleja mejor esa fuerza que un sustantivo fijo.'
- source_word: ἀλλʼ εὐθέως
  english_pob_choice: but immediately
  chosen_spanish: sino ... inmediatamente
  alternatives_spanish:
  - sino ... al instante
  - antes bien ... de inmediato
  lexicon: LSJ
  rationale: «Sino» mantiene el contraste con la demora previa; «inmediatamente» expresa la prontitud de la retribución sin añadir matices no presentes.
- source_word: περιπίπτειν τοῖς ἐπιτιμίοις
  english_pob_choice: immediately bringing punishments upon them
  chosen_spanish: hacerles caer inmediatamente en los castigos
  alternatives_spanish:
  - hacerles incurrir inmediatamente en castigos
  - hacer que caigan de inmediato bajo castigos
  lexicon: LSJ
  rationale: περιπίπτειν sugiere caer dentro o sobre algo; en español, «hacerles caer en los castigos» preserva la imagen de venirse encima una pena. «Castigos» mantiene el peso judicial/punitivo de ἐπιτιμίοις.
- source_word: μεγάλης εὐεργεσίας
  english_pob_choice: great kindness
  chosen_spanish: gran benevolencia
  alternatives_spanish:
  - gran bondad
  - gran beneficencia
  - gran misericordia
  lexicon: LSJ
  rationale: εὐεργεσία nombra un beneficio o acto de benevolencia. «Benevolencia» comunica el sentido de un bien hecho al prójimo sin reducirlo a simple emoción ni desplazarlo hacia un término teológico más específico como «misericordia».
- source_word: σημεῖόν ἐστιν
  english_pob_choice: is a sign
  chosen_spanish: es señal
  alternatives_spanish:
  - es indicio
  - es prueba
  lexicon: LSJ
  rationale: La traducción literal y clara de σημεῖον como «señal» conserva el valor evidencial del enunciado.
theological_decisions:
- issue: Cómo expresar la lógica teológica de que el castigo inmediato es un acto benevolente
  english_pob_reading: 'Render εὐεργεσία as ''kindness'' and keep the statement direct: prompt punishment is a sign of great kindness.'
  chosen_spanish_reading: 'Traducir εὐεργεσία como «benevolencia» y mantener la afirmación directa: el castigo inmediato es señal de gran benevolencia.'
  alternative_spanish_readings:
  - traducir εὐεργεσία como «misericordia»
  - suavizar ἐπιτίμια como «disciplina»
  rationale: 'El texto afirma una tensión teológica: la retribución pronta no es crueldad, sino un bien. «Benevolencia» preserva ese valor positivo sin borrar el carácter punitivo de ἐπιτίμια ni sustituirlo por una formulación más suave que altere el argumento.'
  doctrine_reference: Preservar la tensión entre juicio y benevolencia divina sin resolverla artificialmente; fidelidad conceptual al griego y al audit trail inglés.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota sin anclaje en el texto. Esta versión no incluye marcas de nota a pie, por lo que no hay riesgo de desalineación entre texto y footnotes.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y bíblico, con «impíamente», «castigos» y «benevolencia» para respetar el tono judicial del griego.
  - Se prefirió «sino» para el contraste adversativo, más natural y preciso en español contemporáneo.
