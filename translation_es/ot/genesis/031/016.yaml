revisions:
- from: Porque toda la riqueza[a] que Dios ha tomado de nuestro padre es nuestra y de nuestros hijos. Así que ahora, todo lo que Dios te ha dicho, hazlo.
  to: Pues toda la riqueza[a] que Dios ha tomado de nuestro padre es nuestra y de nuestros hijos. Así que ahora, todo lo que Dios te ha dicho, hazlo.
  rationale: Se cambia «Porque» por «Pues» para reflejar mejor el valor explicativo de כִּי en este contexto de discurso directo, sin alterar el sentido. El resto del versículo se conserva porque es fiel al hebreo, natural en español y coherente con la auditoría inglesa.
