translation:
  language: es
  text: Y Joaquín, el sumo sacerdote[a], que estaba en Jerusalén en aquellos días, escribió a los que habitaban en Betulia y Betomestaim; Betulia está enfrente de Esdrelón, frente a la llanura cercana a Dotáin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el sacerdote, el grande».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió una carta
  - envió escrito
  lexicon: BDAG
  rationale: El aoristo de γράφω se conserva con el sentido simple de 'escribir'. En español, 'escribió' es natural y no añade 'carta', que el griego no expresa de forma explícita.
- source_word: ἱερεὺς ὁ μέγας
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el alto sacerdote
  lexicon: LSJ
  rationale: Aunque la POB inglesa terminó optando por 'high priest', el griego literalmente dice 'el sacerdote, el grande'. En español, 'sumo sacerdote' es la equivalencia idiomática y transparente para esa función institucional; 'gran sacerdote' sonaría menos natural y 'alto sacerdote' no es idiomático.
- source_word: ὃς ἦν ἐν ταῖς ἡμέραις ἐν Ἰερουσαλήμ
  english_pob_choice: who was in Jerusalem in those days
  chosen_spanish: que estaba en Jerusalén en aquellos días
  alternatives_spanish:
  - que estaba entonces en Jerusalén
  - que estaba en Jerusalén en ese tiempo
  lexicon: BDAG
  rationale: La frase temporal se mantiene de modo directo. 'En aquellos días' refleja ταῖς ἡμέραις sin sobreinterpretación y suena natural en español bíblico contemporáneo.
- source_word: τοῖς κατοικοῦσι
  english_pob_choice: to those living
  chosen_spanish: a los que habitaban
  alternatives_spanish:
  - a los habitantes
  - a los que vivían
  lexicon: BDAG
  rationale: El participio expresa a los residentes de esas ciudades. 'Habitaban' conserva mejor el matiz de residencia estable que una simple referencia ocasional a 'vivían'.
- source_word: Βαιτουλουὰ
  english_pob_choice: Bethulia
  chosen_spanish: Betulia
  alternatives_spanish:
  - Bethulia
  lexicon: transliteration
  rationale: Se adapta la transliteración al uso español corriente para topónimos bíblicos, manteniendo la identificación del lugar.
- source_word: Βαιτομεσθαίμ
  english_pob_choice: Betomesthaim
  chosen_spanish: Betomestaim
  alternatives_spanish:
  - Betomestáin
  - Baitomestaim
  lexicon: transliteration
  rationale: Se conserva la forma transliterada con ortografía española fluida, cercana al griego y legible para el lector hispano.
- source_word: ἀπέναντι
  english_pob_choice: opposite
  chosen_spanish: enfrente de
  alternatives_spanish:
  - opuesta a
  - frente a
  lexicon: LSJ
  rationale: El valor espacial de ἀπέναντι se expresa naturalmente como 'enfrente de' o 'opuesta a'. 'Enfrente de' funciona bien en español sin perder el matiz geográfico.
- source_word: κατὰ πρόσωπον
  english_pob_choice: facing
  chosen_spanish: frente a
  alternatives_spanish:
  - mirando hacia
  - de cara a
  lexicon: LSJ
  rationale: La expresión indica orientación espacial. 'Frente a' conserva el sentido de 'en dirección a' de manera clara y sobria.
- source_word: τοῦ πεδίου
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - el campo llano
  lexicon: LSJ
  rationale: πέδιον alude a una extensión llana; 'llanura' es la forma natural en español para esta descripción topográfica.
- source_word: τοῦ πλησίον Δωθάειμ
  english_pob_choice: near Dothaim
  chosen_spanish: cercana a Dotáin
  alternatives_spanish:
  - cerca de Dotáin
  - próxima a Dotáin
  lexicon: BDAG
  rationale: La cercanía se expresa con un adjetivo concordante con 'llanura' para evitar una secuencia demasiado pesada. Se conserva el topónimo con transliteración española.
theological_decisions:
- issue: Título sacerdotal de ἱερεὺς ὁ μέγας
  english_pob_reading: the high priest
  chosen_spanish_reading: el sumo sacerdote
  alternative_spanish_readings:
  - el gran sacerdote
  - el alto sacerdote
  rationale: La frase designa una función sacerdotal de máximo rango. Aunque el griego es literalmente 'el sacerdote, el grande', en español la forma estable y correctamente entendida es 'sumo sacerdote'. Se evita 'SEÑOR' u այլ sustitución no pertinente y se mantiene la transparencia del oficio sin forzar una literalidad extraña.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 y #5'
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, incluida la revisión que prefirió 'high priest' por claridad idiomática. Para el español, se optó por 'sumo sacerdote' porque es la equivalencia institucional natural y no oculta la función del cargo; la literalidad griega queda preservada en la nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - 'Los topónimos se transliteran de forma española coherente: Betulia, Betomestaim, Esdrelón, Dotáin.'
  - 'Se conserva la relación espacial completa del texto: ''enfrente de... frente a...'' para reflejar ἀπέναντι y κατὰ πρόσωπον sin simplificar en exceso.'
