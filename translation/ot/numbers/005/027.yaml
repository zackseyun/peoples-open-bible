theological_decisions:
- issue: Rendering the bodily affliction in the ordeal formula without importing a specific medical or reproductive interpretation
  chosen_reading: Retain 'her belly will swell and her thigh will waste away' in the main text
  alternative_readings:
  - her womb will miscarry and her abdomen swell
  - her belly will swell and her genitals/shame will shrivel
  rationale: The Hebrew uses concrete but partly euphemistic language whose exact physiological referent is debated. To preserve theological and interpretive tension rather than resolve it, the main text stays close to the Hebrew while using intelligible English; more specific reproductive interpretations are preserved as alternatives rather than asserted.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
