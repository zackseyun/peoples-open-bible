translation:
  language: es
  text: Y Serón, el comandante del ejército de Siria, oyó que Judas había reunido un grupo reunido[a] y una asamblea de los fieles[b] con él, y de los que salían a la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una banda'; el griego ἄθροισμα denota un grupo reunido y en este contexto puede llevar un matiz más marcial.
    reason: lexical_alternative
  - marker: b
    text: O 'los leales', destacando la lealtad a la causa de Judas además de la fidelidad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: LSJ
  rationale: En narración española, 'oyó' conserva el valor básico de ἀκούω sin volverlo demasiado interpretativo; también puede abarcar recibir noticia, como en el inglés auditado 'heard'.
- source_word: ὁ ἄρχων τῆς δυνάμεως Συρίας
  english_pob_choice: the commander of the army of Syria
  chosen_spanish: el comandante del ejército de Siria
  alternatives_spanish:
  - el jefe de la fuerza de Siria
  - el comandante de la fuerza siria
  lexicon: LSJ
  rationale: ἄρχων aquí es un mando militar; 'comandante' preserva ese rasgo. δύναμις en este contexto es fuerza armada, y 'ejército' comunica mejor la función militar que una traducción más abstracta de 'fuerza'.
- source_word: ἤθροισεν
  english_pob_choice: had gathered
  chosen_spanish: había reunido
  alternatives_spanish:
  - había congregado
  - había juntado
  lexicon: LSJ
  rationale: El aoristo en discurso indirecto queda bien en español como pluscuamperfecto; 'reunido' expresa el acto de juntar personas sin añadir matiz excesivo.
- source_word: ἄθροισμα
  english_pob_choice: a company
  chosen_spanish: una compañía
  alternatives_spanish:
  - una banda
  - un grupo reunido
  - una fuerza
  lexicon: LSJ
  rationale: '''Compañía'' conserva la idea de un cuerpo reunido sin imponer todavía la idea de ejército formal, en línea con la nota inglesa sobre posible matiz marcial.'
- source_word: ἐκκλησίαν
  english_pob_choice: an assembly
  chosen_spanish: una asamblea
  alternatives_spanish:
  - una congregación
  - la iglesia
  lexicon: LSJ
  rationale: En este contexto judío precristiano, 'asamblea' es el equivalente natural y evita importar el sentido eclesial posterior de 'iglesia'.
- source_word: πιστῶν
  english_pob_choice: the faithful
  chosen_spanish: de los fieles
  alternatives_spanish:
  - de los leales
  - de los fieles a él
  lexicon: LSJ
  rationale: '''Fieles'' mantiene la ambigüedad útil entre lealtad política y fidelidad de pacto, reflejando la nota inglesa que permite ambas lecturas.'
- source_word: μεθʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: LSJ
  rationale: Traducción directa y natural del acompañamiento expresado por μεθʼ αὐτοῦ.
- source_word: ἐκπορευομένων εἰς πόλεμον
  english_pob_choice: going out to war
  chosen_spanish: de los que salían a la guerra
  alternatives_spanish:
  - que salían a la guerra
  - que iban a la guerra
  - marchando a la guerra
  lexicon: LSJ
  rationale: La forma participial griega añade un segundo grupo o una descripción adicional; en español, 'de los que salían a la guerra' mantiene esa relación sin hacer que modifique solo a 'los fieles'.
theological_decisions:
- issue: ἐκκλησίαν en un contexto judío precristiano
  english_pob_reading: an assembly
  chosen_spanish_reading: una asamblea
  alternative_spanish_readings:
  - una congregación
  - la iglesia
  rationale: '''Asamblea'' conserva el sentido del término griego sin introducir una lectura eclesiológica cristiana ajena al contexto macabeo.'
  doctrine_reference: 'DOCTRINE.md: traducir según el sentido llano del texto fuente; evitar importación doctrinal fuera del contexto.'
- issue: 'πιστῶν: fidelidad religiosa o lealtad política'
  english_pob_reading: the faithful; may also be understood as the loyal
  chosen_spanish_reading: los fieles
  alternative_spanish_readings:
  - los leales
  - los fieles a la causa
  rationale: '''Los fieles'' deja abierta la doble resonancia documentada por el POB inglés: fidelidad de pacto y lealtad al grupo o causa de Judas.'
  doctrine_reference: 'DOCTRINE.md: preservar tensiones léxicas o teológicas documentadas cuando el texto las permite.'
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente que separa claramente la frase final ''and of those going out to war'', por lo que el español la expresa como una segunda descripción: ''y de los que salían a la guerra'', evitando que se lea solo como modificación de ''los fieles''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí; no hay nombre divino en el versículo.
  - '''Asamblea'' se usa de forma coherente con el tratamiento POB de ἐκκλησία en contexto judío precristiano.'
  - '''Fieles'' conserva la ambigüedad semántica documentada por el audit trail inglés.'
  - El orden español se ajusta para sonar natural sin perder la estructura de informe indirecto del griego.
