translation:
  language: es
  text: Puso la mesa en la tienda de reunión, en el lado norte del tabernáculo, fuera del velo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fuera de la cortina». El hebreo פָּרֹכֶת se refiere a la cortina interna que separaba el Lugar Santísimo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He put
  chosen_spanish: Puso
  alternatives_spanish:
  - colocó
  - puso en su lugar
  - situó
  lexicon: HALOT
  rationale: El verbo נתן en este contexto espacial expresa la acción de ubicar un objeto. «Puso» es natural en español y conserva la sencillez del movimiento de colocación sin añadir matices no presentes en el hebreo.
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa de los panes
  - la mesa de la Presencia
  - la mesa
  lexicon: HALOT
  rationale: El hebreo aquí dice simplemente «la mesa». En español, «mesa» transmite el objeto de forma directa; no se introduce una identificación más específica en el cuerpo del versículo porque el texto inmediato no la explicita.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en el tabernáculo de encuentro
  lexicon: HALOT
  rationale: «אֹהֶל מוֹעֵד» es el nombre técnico del santuario. «Tabernáculo de reunión» conserva el valor formal del título y resulta claramente comprensible para lectura eclesial en español.
- source_word: עַל יֶרֶךְ הַמִּשְׁכָּן צָפֹנָה
  english_pob_choice: on the north side of the tabernacle
  chosen_spanish: al lado norte del tabernáculo
  alternatives_spanish:
  - en el lado norte del tabernáculo
  - sobre el flanco norte del tabernáculo
  - junto al lado norte del tabernáculo
  lexicon: HALOT
  rationale: יֶרֶךְ señala un costado o flanco. En español, «lado norte» comunica con claridad la orientación espacial; «al lado norte» mantiene la relación locativa sin sonar forzado.
- source_word: מִחוּץ לַפָּרֹכֶת
  english_pob_choice: outside the veil
  chosen_spanish: fuera del velo
  alternatives_spanish:
  - fuera del cortinaje
  - fuera del cortinado
  - fuera de la cortina
  lexicon: HALOT
  rationale: פָּרֹכֶת designa la cortina interna que separa el lugar santo del santísimo. «Velo» sigue la decisión auditada en inglés y funciona bien en español bíblico; mantiene la referencia al separador sagrado sin ampliar el texto.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alto acuerdo con el control cruzado; por eso la redacción española sigue de cerca la distribución espacial del hebreo y conserva la terminología técnica estable del POB.
  spanish_consistency_notes:
  - Se mantuvo «tabernáculo» para מִשְׁכָּן por consistencia con el uso técnico en Éxodo.
  - Se evitó «SEÑOR» u otro sustituto teológico porque el versículo no contiene el nombre divino.
  - «Velo» se conserva por coherencia con la nota auditada sobre פָּרֹכֶת, y la nota española aclara la equivalencia posible con «cortina».
