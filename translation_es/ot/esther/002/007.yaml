  yaml_path: translation/ot/esther/002/007.yaml
  text: He was bringing up Hadassah—that is[a], Esther—the daughter of his uncle, because she had neither father nor mother. The young woman was beautiful in form and attractive in appearance, and when her father and her mother died[b], Mordecai took her as his own daughter.
  footnotes:
