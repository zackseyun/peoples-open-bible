translation:
  language: es
  text: Frente a los enemigos dejó un vengador[a], y para los amigos uno que corresponde al favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un vindicador» o «un defensor»; el término griego puede denotar a quien hace justicia o venganza en nombre de otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐναντίον
  english_pob_choice: before
  chosen_spanish: frente a
  alternatives_spanish:
  - ante
  - delante de
  lexicon: LSJ
  rationale: ἐναντίον introduce la relación del hijo con los enemigos. «Frente a» conserva la idea de estar en la esfera visible/opuesta de los enemigos sin volverla más hostil de lo que el griego exige.
- source_word: ἐχθρῶν
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - f o e s
  lexicon: LSJ
  rationale: El genitivo plural se rinde de manera directa como «enemigos», que es claro y natural en español y mantiene el contraste familiar y social del dicho.
- source_word: κατέλιπεν
  english_pob_choice: left behind
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó atrás
  - dejó en herencia
  lexicon: LSJ
  rationale: El verbo expresa lo que alguien deja tras de sí. «Dejó» es suficiente en español y evita añadir la explicitación sucesoria del contexto más de lo que el verso requiere.
- source_word: ἔκδικον
  english_pob_choice: an avenger
  chosen_spanish: un vengador
  alternatives_spanish:
  - un vindicador
  - un defensor
  - uno que hace justicia
  lexicon: LSJ
  rationale: ἔκδικος/ἔκδικον puede denotar quien ejecuta venganza o justicia. Aquí se preserva la fuerza retaliatoria con «vengador», sin suavizarla a «defensor» ni desplazarla a un matiz meramente jurídico.
- source_word: τοῖς φίλοις
  english_pob_choice: for friends
  chosen_spanish: para los amigos
  alternatives_spanish:
  - a los amigos
  - en favor de los amigos
  lexicon: LSJ
  rationale: El dativo marca el contrapunto relacional respecto de los enemigos. «Para los amigos» mantiene esa relación de beneficio y suena natural en español.
- source_word: ἀνταποδιδόντα
  english_pob_choice: one who repays
  chosen_spanish: uno que devuelve
  alternatives_spanish:
  - uno que retribuye
  - uno que recompone
  lexicon: LSJ
  rationale: La idea central es devolución recíproca. «Devuelve» conserva la acción de responder con un bien correspondiente y permite unirla con χάριν sin forzar un registro demasiado técnico.
- source_word: χάριν
  english_pob_choice: kindness
  chosen_spanish: la bondad
  alternatives_spanish:
  - el favor
  - la gracia
  - el bien
  lexicon: LSJ
  rationale: En este contexto social, χάρις apunta a un beneficio amable recibido y devuelto. «La bondad» comunica ese valor interpersonal con claridad en español; «gracia» sonaría más teológico y «favor» puede sonar más abstracto.
theological_decisions:
- issue: Fuerza moral de ἔκδικον en un contexto sapiencial y de honra familiar
  english_pob_reading: an avenger
  chosen_spanish_reading: un vengador
  alternative_spanish_readings:
  - un defensor
  - un vindicador
  rationale: El griego presenta al hijo como quien responde contra los enemigos del padre. La traducción conserva ese peso retaliatorio en vez de atenuarlo, porque el texto no lo corrige ni lo espiritualiza.
  doctrine_reference: Preservar la tensión textual; primacía del original sobre la suavización traductora.
- issue: Relación entre χάρις y lenguaje teológico cristiano
  english_pob_reading: kindness
  chosen_spanish_reading: bondad
  alternative_spanish_readings:
  - gracia
  - favor
  - gratitud
  rationale: Aquí χάρις describe un bien interpersonal, no necesariamente la categoría teológica de «gracia». «Bondad» evita una lectura doctrinal no requerida por el verso y conserva la reciprocidad del dicho.
  doctrine_reference: Mantener el sentido contextual de χάρις sin imponer terminología eclesiástica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió un equivalente más directo de ἐναντίον y una formulación natural para el dativo con φίλοις. La versión española sigue esa orientación, manteniendo la fuerza del original y la relación paralela entre enemigos y amigos.
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde aquí porque el verso no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se mantuvo «vengador» para ἔκδικον, coherente con la opción inglesa y con el campo semántico de justicia/represalia documentado en la nota.
  - «Bondad» se eligió para χάριν por claridad contextual; no se usó «gracia» para evitar una carga teológica ajena al paralelismo social del verso.
