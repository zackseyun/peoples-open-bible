translation:
  language: es
  text: Quedamos llenos de senderos de desenfreno y destrucción[a], y atravesamos desiertos sin sendero[b]; pero no conocimos el camino del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «senderos de falta de ley y destrucción». El griego puede leerse de manera más literal con los sustantivos abstractos modificando a «senderos».
    reason: lexical_alternative
  - marker: b
    text: O «desiertos sin huella» o «parajes sin camino».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνομίας
  english_pob_choice: lawlessness / paths of lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - desobediencia
  - maldad
  lexicon: LSJ
  rationale: 'El genitivo λειτουργa de manera atributiva con «senderos»: no se trata de senderos hechos de iniquidad en sentido material, sino caracterizados por ella. «Iniquidad» conserva la carga moral y permite una construcción natural en español con «senderos de…».'
- source_word: ἐνεπλήσθημεν
  english_pob_choice: we were filled
  chosen_spanish: fuimos llenados
  alternatives_spanish:
  - fuimos colmados
  - estuvimos llenos
  lexicon: LSJ
  rationale: El aoristo pasivo pide una voz pasiva en español. «Fuimos llenados» conserva la imagen de saturación/ocupación expresada por el griego y mantiene el tono confesional del verso.
- source_word: τρίβοις
  english_pob_choice: paths
  chosen_spanish: senderos
  alternatives_spanish:
  - caminos
  - sendas
  - rutas
  lexicon: LSJ
  rationale: τρίβος es un camino o huella abierta por el uso. «Senderos» suena natural en español y permite distinguirlo de ὁδός, que más adelante se rinde como «camino».
- source_word: ἀπωλείας
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: «Destrucción» reproduce bien el valor grave del sustantivo y mantiene el paralelismo con «iniquidad» sin introducir una explicación doctrinal adicional.
- source_word: διωδεύσαμεν
  english_pob_choice: we traveled through
  chosen_spanish: atravesamos
  alternatives_spanish:
  - recorrimos
  - pasamos por
  - viajamos por
  lexicon: LSJ
  rationale: El verbo expresa atravesar o recorrer un espacio. «Atravesamos» es conciso, idiomático y conserva el movimiento a través de un territorio difícil.
- source_word: ἐρήμους ἀβάτους
  english_pob_choice: trackless deserts
  chosen_spanish: desiertos sin sendero
  alternatives_spanish:
  - desiertos sin huella
  - tierras baldías intransitables
  - parajes sin camino
  lexicon: LSJ
  rationale: ἐρήμους señala desierto/wilderness y ἀβάτους, inaccesible o sin paso. «Desiertos sin sendero» comunica tanto la aridez como la falta de ruta transitable, de modo cercano a la elección inglesa sin sonar arcaico.
- source_word: ὁδὸν Κυρίου
  english_pob_choice: the way of the Lord
  chosen_spanish: el camino del Señor
  alternatives_spanish:
  - la senda del Señor
  - el camino de Yahvé
  - el camino del Señor
  lexicon: LSJ
  rationale: ὁδός en este contraste es la vía moral y espiritual correcta. «Camino» es el equivalente más natural en español bíblico; «Señor» se usa aquí para κύριος siguiendo el contexto de la expresión establecida del texto griego, sin borrar la referencia divina.
- source_word: ἔγνωμεν
  english_pob_choice: we did not know
  chosen_spanish: no conocimos
  alternatives_spanish:
  - no supimos
  - no reconocimos
  - no llegamos a conocer
  lexicon: LSJ
  rationale: El aoristo de γινώσκω permite «conocer» en sentido de reconocer/estar familiarizados. «No conocimos» mantiene la sobriedad del griego y el ritmo de confesión del verso.
theological_decisions:
- issue: Sentido de «el camino del Señor»
  english_pob_reading: A moral-spiritual way of life aligned with the Lord, contrasted with wicked and destructive paths
  chosen_spanish_reading: Un modo de vivir y orientar la conducta conforme al Señor, en contraste con senderos de iniquidad y destrucción
  alternative_spanish_readings:
  - Una ruta literal o itinerario provisto por el Señor
  - La enseñanza del Señor como camino
  rationale: La estructura del verso contrasta rutas figuradas de maldad con una única vía correcta. En español, «camino del Señor» conserva la metáfora bíblica sin fijarla prematuramente a una explicación más estrecha que el griego no exige.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y traducir títulos divinos sin ocultarlos'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que afinó la construcción genitiva para reflejar con más naturalidad «paths of lawlessness and destruction». En español se preserva esa relación atributiva con «senderos de iniquidad y de destrucción», evitando una paráfrasis que diluya el vínculo sintáctico del griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en esta frase establecida del texto griego, sin sustituirlo por una máscara tipográfica.
  - «Camino» se reserva para ὁδός, mientras «senderos» rinde τρίβοις para conservar contraste léxico.
  - No se introduce una explicación doctrinal adicional en el cuerpo del verso; la ambigüedad entre camino literal y moral queda abierta como en el original.
