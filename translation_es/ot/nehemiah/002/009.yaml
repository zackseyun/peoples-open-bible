    text: Or “to the governors Beyond the River.” The Hebrew expression likely refers to the Persian administrative region west of the Euphrates, often called Trans-Euphrates.
    reason: cultural_note
  - marker: b
    text: Or “military officers and cavalry.”
    reason: lexical_alternative
