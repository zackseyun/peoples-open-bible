review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: כִּי como conector de fundamento, יָשׁוּב como retorno, y וְאַחֲרָיו con sentido idiomático de seguimiento. Sin embargo, la elección de «justicia» para צֶדֶק debilita la distinción documentada entre מִשְׁפָּט y צֶדֶק, que el English POB preservó como ''judgment'' / ''righteousness''. En español, «juicio volverá a la justicia» suena menos nítido y corre el riesgo de aplanar los dos términos. «Rectitud» o «justicia» como alternativa en nota resuelve mejor la relación semántica.'
  spanish_quality_summary: El español es legible y digno, pero «volverá a la justicia» resulta algo abstracto y menos natural que «volverá a la rectitud» en este contexto poético-jurídico. «Y tras él seguirán todos los rectos de corazón» es aceptable, aunque una formulación más natural y cercana al English POB audit trail es «y todos los rectos de corazón irán tras él». Esto mantiene el matiz de אַחֲרָיו sin forzar una sintaxis ligeramente invertida.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. El punto clave es la distinción léxica interna del verso: מִשְׁפָּט debe mantenerse como «juicio», mientras צֶדֶק conviene verterlo como «rectitud» aquí para no colapsarlo con «justicia». «Rectos de corazón» está bien alineado con יִשְׁרֵי לֵב.'
  issues:
  - severity: medium
    issue: צֶדֶק se tradujo como «justicia» en el texto principal.
    rationale: La documentación inglesa escogió 'righteousness' precisamente para distinguirlo de מִשְׁפָּט. En español, «rectitud» preserva mejor esa distinción sin perder claridad.
  - severity: low
    issue: La nota [a] justifica «justicia» diciendo que así se distingue de מִשְׁפָּט.
    rationale: La explicación entra en tensión con el efecto real en español, donde «juicio» / «justicia» no preserva tan bien la diferencia conceptual como «juicio» / «rectitud».
  - severity: low
    issue: El orden «y tras él seguirán todos los rectos de corazón» es correcto pero algo menos natural.
    rationale: «Y todos los rectos de corazón irán tras él» suena más fluido en español contemporáneo y conserva el matiz de seguimiento/alineación.
