translation:
  language: es
  text: 'Entonces el rey mandó llamar a Simei y le dijo[a]: «¿No te hice jurar por Yahvé y te advertí, diciendo: “El día que salgas y vayas a donde sea[b], sabe con toda certeza que ciertamente morirás”? Y tú me dijiste: “La palabra es buena[c]; he oído”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «testifiqué contra ti» o «te amonesté solemnemente» para «te advertí».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «vayas aquí o allá», un modismo que significa «vayas a cualquier parte».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «El asunto es bueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבַּעְתִּיךָ בַיהוָה
  english_pob_choice: make you swear by the LORD
  chosen_spanish: te hice jurar por Yahvé
  alternatives_spanish:
  - te puse bajo juramento por Yahvé
  - te adjuré por Yahvé
  lexicon: HALOT
  rationale: El hifil de שבע expresa causar que otro jure o ponerlo bajo juramento. «Te hice jurar» conserva esa causatividad de modo natural en español, y «por Yahvé» mantiene el nombre divino según la política del proyecto.
- source_word: וָאָעִד בְּךָ
  english_pob_choice: warn you
  chosen_spanish: te advertí
  alternatives_spanish:
  - testifiqué contra ti
  - te amonesté solemnemente
  lexicon: HALOT
  rationale: עוד en hifil puede significar advertir, testificar contra o amonestar formalmente. En este contexto remite a una advertencia ligada a un juramento, y «te advertí» comunica bien el sentido inmediato sin perder el tono forense.
- source_word: בְּיוֹם צֵאתְךָ
  english_pob_choice: On the day you go out
  chosen_spanish: El día que salgas
  alternatives_spanish:
  - En el día de tu salida
  - El día de tu partida
  lexicon: HALOT
  rationale: 'La construcción temporal se vierte con naturalidad en español como una subordinada temporal: «el día que salgas». Mantiene el valor del hebreo sin sobrecargarlo con una fórmula más rígida.'
- source_word: וְהָלַכְתָּ אָנֶה וָאָנָה
  english_pob_choice: and go anywhere at all
  chosen_spanish: y vayas adonde sea
  alternatives_spanish:
  - y vayas de aquí para allá
  - y vayas aquí o allá
  lexicon: HALOT
  rationale: אָנֶה וָאָנָה expresa destino indeterminado, literalmente «aquí o allá». «Adonde sea» conserva la amplitud idiomática y la fuerza de indefinición en un español fluido.
- source_word: יָדֹעַ תֵּדַע
  english_pob_choice: know for certain
  chosen_spanish: debes saber con toda certeza
  alternatives_spanish:
  - sabrás ciertamente
  - sabe con certeza
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la certeza. «Debes saber con toda certeza» reproduce esa solemnidad y evita una repetición demasiado mecánica.
- source_word: מוֹת תָּמוּת
  english_pob_choice: you shall surely die
  chosen_spanish: ciertamente morirás
  alternatives_spanish:
  - morirás sin falta
  - de cierto morirás
  lexicon: HALOT
  rationale: La intensificación hebrea se expresa de manera natural con «ciertamente morirás». Se preserva el énfasis sin forzar un calco idiomático.
- source_word: טוֹב הַדָּבָר
  english_pob_choice: The word is good
  chosen_spanish: La palabra es buena
  alternatives_spanish:
  - La cosa está bien
  - El asunto es bueno
  lexicon: HALOT
  rationale: דבר puede ser «palabra», «asunto» o «cosa». Dado que Simei responde a la declaración verbal del rey, «palabra» conserva el matiz de dicho/expresión, aunque «asunto» sigue siendo posible.
- source_word: שָׁמָעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - he escuchado
  - lo he oído y acepto
  lexicon: HALOT
  rationale: El texto hebreo dice literalmente «he oído». La traducción mantiene esa formulación y no añade una implicación más fuerte que no esté explícita en el versículo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente; conforme a la política del proyecto, se lo vierte como «Yahvé» en el texto principal para mantener visible el nombre del pacto y evitar el ocultamiento convencional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la revisión más reciente: no se requieren cambios sustantivos respecto del audit trail en inglés, salvo la adaptación al español y la decisión consistente de usar Yahvé en lugar de la forma de ocultamiento.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה conforme a la política del proyecto.
  - Se conservó el paralelismo enfático del hebreo con «debes saber con toda certeza» y «ciertamente morirás».
  - «La palabra es buena» preserva el valor posible de דבר sin cerrar la lectura a «asunto»; la alternativa queda en nota.
  - «He oído» se deja literal, evitando sobretraducirlo como obediencia o aceptación.
