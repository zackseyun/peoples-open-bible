  to: antes de que el cordón de plata[a] se rompa, y el cuenco de oro sea hecho pedazos, y la jarra[b] se rompa junto al manantial, y la rueda[c] sea aplastada junto a la fosa[d].
  rationale: 'La revisión corrige dos puntos clave de fidelidad léxica: «cuenco de oro» refleja mejor גֻּלַּת que «copa de oro», y «fosa» preserva mejor la amplitud de בּוֹר y la decisión auditada de no reducirlo a un simple pozo. También se arregla la nota d, que era errónea, y se ajustan las notas a y b para alinearlas mejor con las alternativas documentadas. Se suaviza levemente la sintaxis con «se rompa» para mayor naturalidad en español sin perder el paralelismo poético.'
