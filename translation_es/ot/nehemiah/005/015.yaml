  text: But the former governors who were before me laid heavy burdens on the people[a], and took from them bread and wine, besides forty shekels of silver. Even their servants ruled over the people. But I did not do so[c][b], because of the fear of God.
  footnotes:
  - marker: a
    text: Or 'in addition to forty shekels of silver.' The Hebrew phrase may indicate an added monetary levy on top of the bread and wine.
    reason: lexical_alternative
  - marker: b
    text: Or 'attendants' or 'young men' for 'servants.' The Hebrew can refer to subordinate officials in service to the governors.
    reason: lexical_alternative
  - marker: c
    text: Or 'out of reverence for God.' The Hebrew idiom is literally 'because of the fear of God.'
    reason: lexical_alternative
