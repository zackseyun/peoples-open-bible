translation:
  language: es
  text: 'Digan a sus hermanos[a]: «Mi pueblo», y a sus hermanas[b]: «Compadecida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘Ammi’, nombre simbólico que significa «mi pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘Ruhamah’, nombre simbólico que significa «compadecida», o «mostrada misericordia» / «mostrada compasión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Decid
  alternatives_spanish:
  - Di
  - Hablad
  - Decidle
  lexicon: HALOT
  rationale: Es el imperativo plural de אמר; «Decid» conserva con naturalidad la fuerza directiva y el carácter plural del mandato, sin añadir contenido.
- source_word: לַאֲחֵיכֶם
  english_pob_choice: to your brothers
  chosen_spanish: a vuestros hermanos
  alternatives_spanish:
  - a vuestros hermanos y hermanas
  - a vuestros parientes
  - a vuestra familia
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino explícito, y el contexto paralelo con «hermanas» permite mantener la distinción de género marcada en el texto original.
- source_word: עַמִּי
  english_pob_choice: My people
  chosen_spanish: Mi pueblo
  alternatives_spanish:
  - Ammi
  - Pueblo mío
  lexicon: HALOT
  rationale: La forma significa literalmente «mi pueblo» y, al mismo tiempo, evoca el nombre simbólico Ammi. En español, «Mi pueblo» comunica el sentido semántico central con claridad y dignidad.
- source_word: וְלַאֲחוֹתֵיכֶם
  english_pob_choice: and to your sisters
  chosen_spanish: y a vuestras hermanas
  alternatives_spanish:
  - y a vuestras hermanas mujeres
  - y a vuestras consanguíneas
  lexicon: HALOT
  rationale: El plural femenino está explícito en hebreo; «hermanas» preserva esa marca sin neutralizarla.
- source_word: רֻחָמָה
  english_pob_choice: Shown mercy
  chosen_spanish: Mostrada misericordia
  alternatives_spanish:
  - Mostrada compasión
  - Recibida misericordia
  - Ruhamá
  lexicon: HALOT
  rationale: La forma pasiva de רחם expresa haber sido objeto de misericordia/compasión. «Mostrada misericordia» conserva el valor pasivo y suena más natural en español que un calco rígido como «misericordiada».
theological_decisions:
- issue: Si mantener o traducir los nombres simbólicos Ammi y Ruhamah en el texto principal
  english_pob_reading: Translate the names semantically in the main text and preserve the transliterated forms in footnotes
  chosen_spanish_reading: Traducir su sentido en el texto principal y preservar la forma nominal simbólica en nota
  alternative_spanish_readings:
  - Usar «Ammi» y «Ruhamá» directamente en el texto principal
  - Dejar los nombres sin traducir
  rationale: En Oseas, estos nombres funcionan como señales proféticas con significado teológico. Traducir su contenido en el texto principal permite que el lector perciba inmediatamente la reversión anunciada, mientras la nota mantiene la forma histórica del nombre.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve significant alternatives in footnotes'
- issue: Cómo reflejar el par hermano/hermana sin borrar la distribución sexual del hebreo
  english_pob_reading: The masculine plural noun is rendered 'brothers' rather than a gender-neutral collective; the feminine plural follows explicitly
  chosen_spanish_reading: Mantener «hermanos» y «hermanas» como dos destinatarios distintos
  alternative_spanish_readings:
  - Hermanos y hermanas
  - Familia
  - Parientes
  rationale: El hebreo nombra explícitamente ambos grupos, y el paralelo literario refuerza la inclusión de las dos formas. En español, la distinción sigue siendo clara y fiel al marcado gramatical del original.
  doctrine_reference: Gender-marked source language; lexical transparency
translation_notes:
  revision_awareness: El pasaje fue revisado y el último pase indicó que no se necesitaban cambios; se conserva esa lectura sin enmiendas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferente en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva la distinción de género plural del hebreo con «hermanos» y «hermanas».
  - La traducción principal comunica el sentido de los nombres simbólicos sin perder su referencia histórica, que queda en nota.
