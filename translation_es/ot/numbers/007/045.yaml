translation:
  language: es
  text: un toro del ganado vacuno, un carnero, un cordero macho de un año, para holocausto;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: novillo
  alternatives_spanish:
  - toro
  - buey
  lexicon: HALOT
  rationale: En contexto sacrificial, פַּר denota un bovino macho para ofrenda. “Novillo” comunica bien la idea de un animal joven de la res y evita la dureza de “toro” o la imprecisión de “buey”.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El hebreo repite el numeral para cada animal; “un” conserva la enumeración individual de la lista sacrificial.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: novillo
  alternatives_spanish:
  - de la vacada
  - de ganado vacuno
  lexicon: HALOT
  rationale: La construcción hebrea especifica un animal bovino de la manada. En español, “novillo” integra de manera natural esa distinción sin necesidad de una frase explicativa más pesada en el cuerpo del versículo.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  lexicon: HALOT
  rationale: “Carnero” es el equivalente natural y preciso en español para el macho adulto de la oveja usado en sacrificios.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  lexicon: HALOT
  rationale: El hebreo especifica un cordero macho; “cordero macho” preserva esa fuerza léxica que la forma española breve “cordero” no siempre explicita.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de su primer año
  - de un año de edad
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para indicar la edad. “De un año” es la formulación española más clara y fiel al valor sacrificial.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para una ofrenda quemada
  lexicon: HALOT
  rationale: “Holocausto” reproduce el término técnico de la ofrenda totalmente quemada. Se mantiene como palabra cultual estable en español bíblico, sin sustituirla por una paráfrasis.
translation_notes:
  revision_awareness: El inglés POB adopta una equivalencia óptima y no añade notas; el español sigue esa misma línea, manteniendo la secuencia enumerativa y el término cultual técnico sin ampliar ni suavizar el sentido del texto base.
  spanish_consistency_notes:
  - Se conserva el paralelismo de la lista sacrificial con artículo indefinido singular en cada elemento.
  - Se mantiene el registro bíblico sobrio y culto, con terminología sacrificial reconocible en español.
  - No se introducen notas porque el hebreo y el audit trail no plantean una variante significativa ni una tensión doctrinal en este versículo.
