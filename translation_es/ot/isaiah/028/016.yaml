base_translation:
  language: en
  yaml_path: translation/ot/isaiah/028/016.yaml
  text: 'Therefore thus says the Lord GOD: Behold[a], I am laying in Zion a stone, a tested stone, a precious cornerstone, a sure foundation[c][b]; the one who believes will not be in haste.'
  footnotes:
  - marker: a
    text: Or 'the one who trusts.' The Hebrew participle can carry the sense of trusting reliance as well as believing.
    reason: lexical_alternative
  - marker: b
    text: Or 'will not hurry'; some understand the sense more interpretively as 'will not panic.'
    reason: lexical_alternative
  - marker: c
    text: This 'stone' is later applied to the Messiah in Romans 9:33 and 1 Peter 2:6.
    reason: cross_reference
