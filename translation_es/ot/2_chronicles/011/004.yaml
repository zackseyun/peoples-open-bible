base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/011/004.yaml
  text: 'Thus says Yahweh: You must not go up or fight against your brothers[a]. Return, each man to his house, for this thing has come from me[c][b]. So they listened to the words of Yahweh and turned back from going against Jeroboam.'
  footnotes:
