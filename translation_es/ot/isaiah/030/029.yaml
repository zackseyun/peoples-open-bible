  language: en
  yaml_path: translation/ot/isaiah/030/029.yaml
  text: The song will be for you as in the night when a feast is consecrated[a], and gladness of heart as when one goes with the flute to come to the mountain of Yahweh[d][c][b], to the Rock of Israel.
  footnotes:
  - marker: a
    text: Or 'as on the night when a feast is consecrated.' The Hebrew comparison may point specifically to a festival night, likely in a pilgrimage setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'with a flute' or 'with pipe music.' The Hebrew noun refers to a wind instrument used in festive procession.
    reason: lexical_alternative
  - marker: c
    text: '''The LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
  - marker: d
    text: Or 'to Israel's Rock.' 'Rock' is a divine title emphasizing strength and refuge.
    reason: lexical_alternative
