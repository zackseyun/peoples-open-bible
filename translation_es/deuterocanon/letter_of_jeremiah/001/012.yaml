review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general: limpiar el rostro de los ídolos por causa del polvo procedente de la casa, y conserva la nota sobre la literalidad de πλείω. Sin embargo, la redacción principal ''Se limpian el rostro'' en español suena como si los ídolos se limpiaran a sí mismos, lo cual debilita la decisión exegética documentada de que otros les limpian el rostro. Además, ''que cae sobre ellos'' introduce la idea de caída del polvo, no de polvo que simplemente está/acumula sobre ellos.'
  spanish_quality_summary: El español es mayormente claro, pero la oración principal resulta poco natural y ambiguamente reflexiva. 'Les limpian el rostro' expresa mejor el sentido en español y la sátira del contexto. También conviene pluralizar 'rostros' para concordar idiomáticamente con αὐτῶν y evitar el singular colectivo aquí, que suena forzado. La cláusula final debe hablar de polvo 'acumulado' o 'en mayor cantidad', no de polvo que 'cae'.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto en este versículo. Las decisiones léxicas clave ''polvo'' para κονιορτός y ''casa'' para οἰκίας están bien alineadas. El ajuste principal es sintáctico-semántico: evitar un reflexivo español que contradiga la rationale documentada sobre la falta de agencia de los ídolos.'
  issues:
  - severity: high
    issue: '''Se limpian el rostro'' atribuye agencia reflexiva a los ídolos'
    rationale: El expediente inglés y la decisión teológica indican que los ídolos no actúan; otros les limpian el rostro. En español, el borrador comunica naturalmente que ellos mismos se limpian.
  - severity: medium
    issue: '''el rostro'' suena menos idiomático que ''los rostros'' en este contexto'
    rationale: Aunque el singular colectivo puede ser posible, aquí 'les limpian los rostros' es más natural y refleja mejor la referencia distributiva a las imágenes.
  - severity: medium
    issue: '''que cae sobre ellos en mayor cantidad'' añade un matiz no presente en el griego'
    rationale: ὃς ἐστιν πλείω ἐπʼ αὐτοῖς describe cantidad de polvo sobre ellos, no el acto de caer. 'Acumulado' o 'en mayor cantidad sobre ellos' es más fiel.
  revised_spanish_text: Les limpian los rostros a causa del polvo de la casa[a], que está sobre ellos en mayor cantidad.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «que está más sobre ellos»; esto es, polvo acumulado en mayor cantidad sobre ellos.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa la cláusula inicial para reflejar la lectura contextual aprobada en el POB: los ídolos no se limpian a sí mismos, sino que otros les limpian los rostros. Se mejora la naturalidad del español con ''los rostros'' y se corrige la cláusula final para evitar el añadido interpretativo ''cae'', conservando el sentido cuantitativo de πλείω y la alternativa literal en nota.'
