  source_alignment_summary: El borrador español no sigue la fuente primaria hebrea ni la traducción POB auditada. Sustituye el contenido del hebreo («No comas con su marido…») por la lectura del paralelo griego, cuando el expediente y la decisión teológica inglesa establecen que en Sirácida debe darse primacía al hebreo conservado y relegar el griego a nota.
  spanish_quality_summary: El español del borrador es natural, pero traduce el pasaje equivocado. Conviene ajustar además «con su marido» a «con el marido de ella» para evitar ambigüedad en español. «No te sientes a beber con él estando ebrio» comunica bien el valor contextual de וְאַל תָּסֵב ... שִׁכּוֹר.
  glossary_alignment: 'No hay términos del glosario mayor en juego, pero sí hay incumplimiento de la racionalidad léxica documentada: בַּעְלָהּ = «su marido / el marido de ella», תִּטְעָם = «no comas / no cenes», תָּסֵב = «no te sientes a beber», שִׁכּוֹר = «ebrio / embriagado». La nota debe preservar la alternativa griega, no invertir la relación entre texto principal y nota.'
  issues:
