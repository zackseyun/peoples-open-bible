translation:
  language: es
  text: Este día es santo para Yahvé[a], y todos lloraban al oír la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo en Nehemías 8 incluye la continuación con una exhortación a comer, beber, repartir porciones y no entristecerse; 1 Esdras conserva aquí una redacción griega más breve.
    reason: cross_reference
lexical_decisions:
- source_word: Ἡ ἡμέρα αὕτη
  english_pob_choice: This day
  chosen_spanish: Este día
  alternatives_spanish:
  - Este día aquí
  - Éste es el día
  lexicon: LSJ
  rationale: La frase demostrativa es directa; «Este día» conserva la deixis sin añadir elementos que el griego no expresa.
- source_word: ἁγία
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: LSJ
  rationale: «Santo» es la equivalencia natural y bíblica en español para la cualidad religiosa del día. «Sagrado» es posible, pero suena algo más general; «consagrado» sería más interpretativo.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - al Señor
  - para el Señor
  lexicon: LSJ
  rationale: Se sigue el lineamiento del proyecto para יהוה/YHWH como «Yahvé». Aunque el griego usa κύριος, en este contexto el audit trail y el paralelo hebreo muestran que se trata del nombre divino; por eso se evita la máscara «SEÑOR» y se vierte con el nombre propio divino en español.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - toda la gente
  lexicon: LSJ
  rationale: «Todos» reproduce el sentido colectivo conciso del griego sin introducir un sustantivo no explícito.
- source_word: ἔκλαιον
  english_pob_choice: were weeping
  chosen_spanish: lloraban
  alternatives_spanish:
  - estaban llorando
  - lloraron
  lexicon: LSJ
  rationale: El imperfecto griego marca una acción en curso; «lloraban» la refleja de modo natural en español mejor que un pretérito puntual.
- source_word: ἐν τῷ ἀκοῦσαι
  english_pob_choice: when they heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - al escuchar
  lexicon: LSJ
  rationale: La construcción temporal del infinitivo articular se expresa con naturalidad en español mediante «al oír», que preserva la relación temporal y evita una sobreexplicación.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la instrucción
  lexicon: LSJ
  rationale: «Ley» es la traducción directa y natural del griego νόμος en este contexto de lectura pública. Se evita capitalizar para no imponer una decisión interpretativa adicional; «instrucción» reflejaría mejor תורה, pero el testimonio primario aquí es griego.
theological_decisions:
- issue: Si armonizar la frase con el paralelo hebreo de Nehemías 8, que añade otros detalles y una exhortación posterior
  english_pob_reading: 'Retain only the Greek wording: ''This day is holy to the Lord, and all were weeping when they heard the law.'''
  chosen_spanish_reading: 'Mantener solo la redacción griega: «Este día es santo para Yahvé, y todos lloraban al oír la ley».'
  alternative_spanish_readings:
  - Expandir con el paralelo hebreo y añadir «nuestro Dios» o la exhortación a comer, beber y no entristecerse
  - Ajustar la frase para hacerla coincidir más estrechamente con Nehemías 8
  rationale: La fuente primaria es el griego de 1 Esdras; el paralelo hebreo sirve como control de contexto, no como base para armonizar el texto. Por eso no se importan las ampliaciones de Nehemías 8 al cuerpo principal.
  doctrine_reference: Translation philosophy §1, primacía del texto original sobre la armonización con pasajes paralelos
- issue: Cómo reflejar κύριος en un contexto donde el paralelo hebreo apunta al nombre divino
  english_pob_reading: The Hebrew parallel in Nehemiah 8 includes 'our Lord' ... 1 Esdras here preserves a shorter Greek wording.
  chosen_spanish_reading: Traducir con «Yahvé» en el texto principal y explicar la relación con el paralelo en nota.
  alternative_spanish_readings:
  - «el Señor»
  - «nuestro Señor»
  rationale: El proyecto especifica «Yahvé» para יהוה/YHWH. Dado que el griego κύριος aquí traduce la referencia divina y el paralelo hebreo confirma la identidad del referente, se opta por el nombre divino en español, manteniendo la auditabilidad de la decisión.
  doctrine_reference: Terminología del proyecto para el nombre divino y uso de paralelos hebreos como apoyo contextual
translation_notes:
  revision_awareness: 'El borrador sigue el estado de revisión más reciente marcado como unchanged: true; no se detectaron cambios pendientes respecto del último pase auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto cuando el griego κύριος refiere al nombre divino en este contexto.
  - Se usa «ley» en minúscula para respetar el griego νόμος sin imponer una capitalización interpretativa.
  - El imperfecto «lloraban» conserva el valor aspectual del griego ἔκλαιον.
  - La nota al pie preserva la referencia cruzada con el paralelo hebreo sin armonizar el texto principal.
