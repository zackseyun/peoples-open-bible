id: HOS.1.9
reference: Hosea 1:9
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר קְרָ֥א שְׁמ֖/וֹ לֹ֣א עַמִּ֑י כִּ֤י אַתֶּם֙ לֹ֣א עַמִּ֔/י וְ/אָנֹכִ֖י לֹֽא אֶהְיֶ֥ה לָ/כֶֽם־׃ס
translation:
  text: And he said[a], “Call his name Not-My-People, for you are not my people, and I am not yours.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “and I will not be yours,” with many understanding the covenant sense as “and I will not be your God.”
    reason: alternative_reading
lexical_decisions:
- source_word: קְרָא שְׁמוֹ
  chosen: Call his name
  alternatives:
  - Name him
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'call his name.' Retaining it preserves the naming formula common in prophetic birth-sign passages, while remaining understandable in English.
- source_word: לֹא עַמִּי
  chosen: Not-My-People
  alternatives:
  - Lo-ammi
  - Not My People
  lexicon: HALOT
  rationale: This is the symbolic personal name given to the child. Translating the meaning rather than transliterating fits the book's rhetorical force, while hyphenation signals that it functions as a proper name.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the symbolic name. 'For' is concise and natural in English while preserving the causal sense.
- source_word: אַתֶּם לֹא עַמִּי
  chosen: you are not my people
  alternatives:
  - you are not my own people
  lexicon: HALOT
  rationale: A direct covenantal reversal formula. 'My people' is the standard and most transparent rendering of עַם with first-person suffix in this context.
- source_word: וְאָנֹכִי לֹא אֶהְיֶה לָכֶם
  chosen: and I am not for you
  alternatives:
  - and I will not be yours
  - and I will not be your God
  - and I am not yours
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally, ''and I, not will-be to/for you.'' It intentionally echoes covenant formula language without explicitly supplying ''God.'' ''I am not for you'' preserves the terseness and avoids importing words not present in the text. The future nuance of אֶהְיֶה is possible, but present English here best conveys the covenant rupture in a natural way while preserving the ambiguity in a footnote.'
