translation:
  language: es
  text: Andaré[a] ante Yahvé en las tierras[b] de los vivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Viviré». El hebreo de «andar/caminar ante» también puede expresar el modo de vida.'
    reason: alternative_reading
  - marker: b
    text: O también, de forma más general, «tierra» o «reino».
    reason: alternative_reading
lexical_decisions:
- source_word: אֶתְהַלֵּךְ
  english_pob_choice: I will walk
  chosen_spanish: Andaré
  alternatives_spanish:
  - Iré caminando
  - Me conduciré
  - Viviré
  lexicon: HALOT
  rationale: El hitpael imperfecto 1cs de הלך conserva el idioma concreto de caminar, pero en español "andaré" puede mantener a la vez el matiz de conducta o modo de vida sin volverlo demasiado explicativo. Así se preserva la imagen hebrea sin perder naturalidad.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en la presencia de
  lexicon: HALOT
  rationale: '"Ante" reproduce bien la relación espacial y relacional de לִפְנֵי y suena natural en español bíblico moderno. "En la presencia de" explicita más de lo que exige el hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en forma transliterada según la convención del proyecto. "Yahvé" corresponde al Tetragrámaton y evita sustituir el nombre por un título.
- source_word: בְּאַרְצוֹת
  english_pob_choice: in the lands
  chosen_spanish: en las tierras
  alternatives_spanish:
  - en la tierra
  - en el país
  - en las regiones
  lexicon: HALOT
  rationale: El plural hebreo se conserva con "tierras". Aunque en español la expresión sea menos idiomática que el singular, el plural es parte del dato textual y del matiz del original.
- source_word: הַחַיִּים
  english_pob_choice: the living
  chosen_spanish: de los vivos
  alternatives_spanish:
  - de los que viven
  - de la vida
  lexicon: HALOT
  rationale: '"Los vivos" transmite de forma natural el sustantivo/adjetivo plural hebreo. En combinación con "tierras" resulta una expresión comprensible y cercana al poema hebreo.'
theological_decisions:
- issue: Si resolver la frase como mera supervivencia física, como conducta ética, o conservar la tensión entre ambas
  english_pob_reading: Retain the walking idiom without resolving it to either mere continued life or moral conduct alone
  chosen_spanish_reading: Conservar el verbo de caminar/andar sin reducirlo ni a simple supervivencia ni a una sola idea moral
  alternative_spanish_readings:
  - Viviré ante Yahvé en la tierra de los vivos
  - Me conduciré ante Yahvé en las tierras de los vivos
  rationale: El hebreo permite tanto la idea de seguir vivo tras la liberación como la de vivir delante de Dios con toda la existencia. "Andaré" mantiene abierta esa tensión, como hace la lectura inglesa de POB.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se registran revisiones posteriores que alteren la lectura; el pasaje mantiene el mismo enfoque auditado en la versión inglesa, con la misma tensión entre caminar, vivir y la expresión territorial plural.
  spanish_consistency_notes:
  - Se conserva el nombre divino «Yahvé» de manera consistente con las pautas del proyecto.
  - La elección de «andaré» intenta sostener el idioma hebreo sin forzar una paráfrasis explicativa.
  - «Tierras de los vivos» respeta el plural hebreo y la imagen poética del texto fuente.
