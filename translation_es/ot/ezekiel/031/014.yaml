translation:
  language: es
  text: para que todos los árboles junto a las aguas no crezcan en altura, ni pongan su copa entre las nubes[a], ni que ninguno de los que beben agua se yerga por encima de ellos en su altura[b]; porque todos han sido entregados a la muerte, a la tierra de abajo, entre los hijos de Adán, con los que descienden a la fosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “en medio de la espesura” o “entre las ramas densas”. El hebreo עֲבֹתִים puede entenderse como crecimiento espeso más que como nubes.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula hebrea “que ninguno de los que beben agua se yerga por encima de ellos en su altura” es difícil; también puede significar que ningún otro árbol bien regado se exalte junto a ellos o por encima de ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן אֲשֶׁר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Expresa bien el valor de propósito/resultativo sin volver la frase pesada. Mantiene la relación causal-final del hebreo y encaja con el español bíblico moderno.
- source_word: יִגְבְּהוּ בְקוֹמָתָם
  english_pob_choice: may not grow tall in their height
  chosen_spanish: no crezcan en altura
  alternatives_spanish:
  - no se eleven en su estatura
  - no crezcan altos en su altura
  lexicon: HALOT
  rationale: El hebreo combina el verbo de hacerse alto con el sustantivo de altura. En español, 'crezcan en altura' conserva la imagen arbórea y la idea de elevación sin sonar forzado.
- source_word: כָּל עֲצֵי מַיִם
  english_pob_choice: all the trees by the waters
  chosen_spanish: todos los árboles junto a las aguas
  alternatives_spanish:
  - todos los árboles de las aguas
  - todos los árboles regados por las aguas
  lexicon: HALOT
  rationale: '''Junto a las aguas'' refleja el hebreo sin interpretarlo demasiado. ''Las aguas'' mantiene el plural del original y la imaginería de vegetación abundante.'
- source_word: יִתְּנוּ אֶת צַמַּרְתָּם
  english_pob_choice: may not set their treetop
  chosen_spanish: pongan su copa
  alternatives_spanish:
  - levanten su copa
  - coloquen su copa
  lexicon: HALOT
  rationale: צַמֶּרֶת es la parte superior del árbol. 'Copa' es un equivalente natural en español para esta imagen y conserva el sentido de la cima del árbol.
- source_word: אֶל בֵּין עֲבֹתִים
  english_pob_choice: among the clouds
  chosen_spanish: entre las nubes
  alternatives_spanish:
  - entre la espesura
  - entre las ramas densas
  lexicon: HALOT
  rationale: La POB inglesa opta por 'clouds', leyendo עֲבֹתִים como imagen de altura. 'Entre las nubes' transmite esa lectura en español; la alternativa vegetal se preserva en la nota.
- source_word: וְלֹא יַעַמְדוּ אֵלֵיהֶם בְּגָבְהָם כָּל שֹׁתֵי מָיִם
  english_pob_choice: and that none of the water-drinkers may stand over them in their height
  chosen_spanish: y para que ninguno de los que beben agua se yerga ante ellos en su altura
  alternatives_spanish:
  - y para que ninguno de los que beben agua permanezca junto a ellos en su altura
  - y para que no se levante ninguno de los que beben agua por encima de ellos
  lexicon: HALOT
  rationale: La cláusula es difícil. 'Se yerga ante ellos en su altura' intenta conservar el paralelo con el original y la ambigüedad entre estar junto a o por encima de los otros árboles bien regados. 'Yerga' mantiene el matiz de elevarse, no solo de ponerse en pie.
- source_word: שֹׁתֵי מָיִם
  english_pob_choice: the water-drinkers
  chosen_spanish: los que beben agua
  alternatives_spanish:
  - los bebedores de agua
  - los bien regados
  lexicon: HALOT
  rationale: La forma literal preserva la metáfora sin resolver de antemano si se trata de árboles, reyes o naciones. En español, 'los que beben agua' es claro y suficientemente formal.
- source_word: כִּי כֻלָּם נִתְּנוּ לַמָּוֶת
  english_pob_choice: for all of them are given over to death
  chosen_spanish: porque todos han sido entregados a la muerte
  alternatives_spanish:
  - porque todos han sido puestos en manos de la muerte
  - pues todos están consignados a la muerte
  lexicon: HALOT
  rationale: '''Han sido entregados'' reproduce bien el valor pasivo del nifal de נתן. ''A la muerte'' refleja el objeto directo del hebreo y su tono solemne.'
- source_word: אֶל אֶרֶץ תַּחְתִּית
  english_pob_choice: to the land below
  chosen_spanish: a la tierra de abajo
  alternatives_spanish:
  - a la tierra inferior
  - al país de abajo
  lexicon: HALOT
  rationale: La imagen espacial de descenso se conserva con una expresión natural en español. 'Tierra de abajo' evita introducir una terminología técnica ajena al texto.
- source_word: בְּתוֹךְ בְּנֵי אָדָם
  english_pob_choice: among the sons of man
  chosen_spanish: entre los hijos de hombre
  alternatives_spanish:
  - entre los hijos de los hombres
  - entre la humanidad
  lexicon: HALOT
  rationale: Se conserva la forma hebrea y su contraste con la elevación de los árboles. Aunque suena poco usual, es una equivalencia transparente y auditable; 'hombre' permanece singular como en el hebreo.
- source_word: יֹרְדֵי בוֹר
  english_pob_choice: those who go down to the pit
  chosen_spanish: los que descienden a la fosa
  alternatives_spanish:
  - los que bajan al pozo
  - los que descienden al sepulcro
  lexicon: HALOT
  rationale: '''Fosa'' mantiene la imagen de בּוֹר como lugar de caída y muerte. Es más natural en español que ''pozo'' y conserva la resonancia funeraria del hebreo.'
theological_decisions:
- issue: Imagen de los árboles altivos como metáfora de orgullo y caída
  english_pob_reading: all the trees by the waters may not grow tall ... for all of them are given over to death
  chosen_spanish_reading: todos los árboles junto a las aguas no crezcan en altura ... porque todos han sido entregados a la muerte
  alternative_spanish_readings:
  - todos los árboles de las aguas no se eleven
  - todos han sido destinados a la muerte
  rationale: La metáfora debe permanecer como juicio sobre la altivez. La traducción evita moralizar o aclarar de más, conservando la humillación de los que parecían más prósperos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: La frase difícil 'stand over them in their height'
  english_pob_reading: may not stand over them in their height
  chosen_spanish_reading: se yerga ante ellos en su altura
  alternative_spanish_readings:
  - se ponga por encima de ellos en su altura
  - permanezca junto a ellos en su altura
  rationale: La sintaxis es comprimida y debatida. 'Se yerga ante ellos' deja abierta la relación espacial/superior sin resolverla de manera excesiva, reflejando la cautela de la POB inglesa.
  doctrine_reference: Ezekiel 31:14 audit trail, footnote b
- issue: بְּנֵי אָדָם como expresión de humanidad mortal
  english_pob_reading: among the sons of man
  chosen_spanish_reading: entre los hijos de hombre
  alternative_spanish_readings:
  - entre la humanidad
  - entre los mortales
  rationale: Se preserva la forma masculina singular de la expresión hebrea, porque funciona como contraste literario con los árboles elevados y no como referencia exclusiva a varones.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales; se mantiene la lectura poética de los árboles elevados y la cautela ante la cláusula final difícil.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en este texto.
  - Se conservó 'fosa' para בּוֹר por coherencia con el campo semántico de caída/muerte en Ezequiel.
  - Se mantuvo la metáfora arbórea completa sin reinterpretarla como explicación alegórica.
  - La nota a preserva la alternativa vegetal de עֲבֹתִים, como en el audit trail inglés.
