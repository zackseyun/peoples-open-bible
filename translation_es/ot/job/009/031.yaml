translation:
  language: es
  text: entonces me sumergirías en la fosa[a], y mis propias vestiduras me aborrecerían[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el pozo» o «en el hoyo». El hebreo שַׁחַת puede significar «fosa», «pozo», «hoyo» y, en algunos contextos, «destrucción».
    reason: lexical_alternative
