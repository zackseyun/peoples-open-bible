    issue: «tu mano lo soltará» añade un objeto no expreso y suena poco natural
    rationale: El hebreo תַּשְׁמֵט יָדֶךָ es literalmente «tu mano soltará/dejará caer»; el inglés auditado preserva la imagen con «your hand shall release». En español, «tu mano soltará» conserva mejor el modismo que «tu mano lo soltará», que introduce un referente singular artificial.
  - severity: low
    issue: Orden y enlace algo pesados en «de lo que sea tuyo que esté con tu hermano»
    rationale: La secuencia es fiel, pero «pero cualquier cosa tuya que esté en manos de tu hermano, tu mano soltará» sería peor por interpretación. Una mejora mínima como «pero lo que sea tuyo que esté con tu hermano» mantiene la apertura de la cláusula y lee con más soltura.
