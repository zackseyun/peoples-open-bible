- from: Mi Dios los rechazará[a] porque no le han escuchado, y serán vagabundos entre las naciones.
  to: Mi Dios los rechazará[a] porque no le han escuchado, y serán errantes entre las naciones.
  rationale: Se mantiene casi todo el borrador por su buena fidelidad al hebreo y al rastro de auditoría en inglés. Solo se cambia «vagabundos» por «errantes» para evitar connotaciones sociales o morales ajenas al texto y reflejar mejor la idea de dispersión y errancia entre las naciones.
