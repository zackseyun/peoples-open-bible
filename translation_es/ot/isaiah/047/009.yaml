translation:
  language: es
  text: 'Pero estas dos cosas te vendrán en un momento, en un solo día: duelo por hijos y viudez. En plena medida[a] vendrán sobre ti[b], a pesar de tus muchas hechicerías y del gran poder de tus encantamientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''completamente'' / ''por completo''.'
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede entenderse como 'a causa de tus muchas hechicerías y del gran poder de tus encantamientos' o 'con tus muchas hechicerías y con el gran poder de tus encantamientos'.
    reason: alternative_reading
lexical_decisions:
- source_word: וְתָבֹאנָה
  english_pob_choice: will come
  chosen_spanish: te vendrán
  alternatives_spanish:
  - vendrán sobre ti
  - te sobrevendrán
  lexicon: HALOT
  rationale: El verbo plural femenino expresa la llegada futura de las dos calamidades. En español, 'te vendrán' conserva la idea de movimiento hacia la destinataria y suena natural en registro profético.
- source_word: שְׁתֵּי אֵלֶּה
  english_pob_choice: these two things
  chosen_spanish: estas dos cosas
  alternatives_spanish:
  - estas dos
  - ambas cosas
  lexicon: HALOT
  rationale: El hebreo señala dos realidades concretas. 'Cosas' hace explícito el sustantivo implícito en español sin añadir interpretación doctrinal.
- source_word: רֶגַע
  english_pob_choice: in a moment
  chosen_spanish: en un momento
  alternatives_spanish:
  - de repente
  - instantáneamente
  lexicon: HALOT
  rationale: רֶגַע indica brevedad e inmediatez. 'En un momento' preserva ese valor temporal con una formulación natural en español.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un mismo día
  lexicon: HALOT
  rationale: La expresión enfatiza que ambos juicios llegan comprimidos en el mismo marco temporal. 'Un solo día' reproduce ese énfasis con claridad.
- source_word: שְׁכֹל
  english_pob_choice: bereavement
  chosen_spanish: desolación
  alternatives_spanish:
  - duelo
  - pérdida de hijos
  lexicon: HALOT
  rationale: El término puede referirse a la condición de estar privado de hijos o, más ampliamente, a la aflicción de la pérdida familiar. 'Desolación' comunica la ruina relacional y afectiva sin restringirlo indebidamente a un detalle no explicitado en la línea española principal.
- source_word: וְאַלְמֹן
  english_pob_choice: widowhood
  chosen_spanish: viudez
  alternatives_spanish:
  - ser viuda
  - estado de viuda
  lexicon: HALOT
  rationale: El sustantivo designa el estado de viuda. 'Viudez' es la equivalencia española más directa y concisa.
- source_word: כְּתֻמָּם
  english_pob_choice: in full measure
  chosen_spanish: en plena medida
  alternatives_spanish:
  - completamente
  - en su plenitud
  lexicon: HALOT
  rationale: La forma comunica totalidad/completitud. 'En plena medida' conserva el matiz adverbial y la idea de que el juicio llega sin reducción.
- source_word: בָּאוּ עָלַיִךְ
  english_pob_choice: they will come upon you
  chosen_spanish: vendrán sobre ti
  alternatives_spanish:
  - han venido sobre ti
  - te han sobrevenido
  lexicon: HALOT
  rationale: El perfecto hebreo funciona como perfecto profético. En español, el futuro expresa mejor la certeza del anuncio y el movimiento del juicio 'sobre' la destinataria.
- source_word: בְּרֹב כְּשָׁפַיִךְ
  english_pob_choice: in spite of your many sorceries
  chosen_spanish: en medio de tus muchas hechicerías
  alternatives_spanish:
  - pese a tus muchas hechicerías
  - a pesar de tus muchas hechicerías
  lexicon: HALOT
  rationale: 'La preposición ב puede entenderse de varias maneras. Se eligió una redacción que mantiene la tensión textual: el juicio irrumpe incluso rodeado de la abundancia de prácticas mágicas, sin forzar solo una lectura causal o concesiva en el cuerpo principal.'
- source_word: בְּעָצְמַת חֲבָרַיִךְ מְאֹד
  english_pob_choice: and the great power of your spells
  chosen_spanish: del gran poder de tus encantamientos
  alternatives_spanish:
  - de la gran fuerza de tus hechizos
  - del enorme poder de tus conjuros
  lexicon: HALOT
  rationale: עָצְמָה aporta la idea de fuerza/poder, y חֲבָרִים en este contexto apunta a encantamientos o conjuros. 'Encantamientos' conserva el campo semántico de magia ritual, mientras que 'gran poder' reproduce la intensificación del hebreo.
theological_decisions:
- issue: Valor de ב en las dos frases finales
  english_pob_reading: concessive ('in spite of your many sorceries ... in spite of the great power of your spells')
  chosen_spanish_reading: no se fija de manera exclusiva como concesiva en el texto principal; se mantiene una formulación compatible con la irrupción del juicio en medio de la práctica mágica
  alternative_spanish_readings:
  - a pesar de tus muchas hechicerías y del gran poder de tus encantamientos
  - por causa de tus muchas hechicerías y del gran poder de tus encantamientos
  - con tus muchas hechicerías y con el gran poder de tus encantamientos
  rationale: El hebreo permite más de una relación semántica para ב. La lectura principal inglesa privilegia la fuerza retórica concesiva; en español se optó por una redacción que no elimina esa posibilidad, pero evita cerrarla por completo en el texto principal, dado que la frase también puede oírse como contexto acompañante del juicio.
  doctrine_reference: Isaías 47:9; cf. Isaías 47:12-13
- issue: Tratamiento del perfecto profético בָּאוּ
  english_pob_reading: future in English ('they will come upon you')
  chosen_spanish_reading: futuro ('vendrán sobre ti')
  alternative_spanish_readings:
  - han venido sobre ti
  - llegarán sobre ti
  rationale: El perfecto hebreo presenta el juicio como seguro. El futuro español comunica mejor la orientación profética sin perder la certeza del acontecimiento.
  doctrine_reference: Isaías 46:10; Isaías 47:9
translation_notes:
  revision_awareness: Se siguió el sentido del texto hebreo y del audit trail inglés, pero se ajustó la redacción española para mantener fluidez natural y preservar la ambigüedad controlada de la preposición ב en las dos últimas expresiones. También se evitó una equivalencia demasiado rígida de 'sorceries/spells' optando por 'hechicerías/encantamientos', que refleja el campo léxico mágico del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando el hebreo contiene el nombre divino; este versículo no lo incluye.
  - Se eligió 'hechicerías' para כשפים y 'encantamientos' para חברים, distinguiendo dos términos del campo mágico sin borrarlos en una sola palabra.
  - '''Desolación'' y ''viudez'' conservan el paralelismo de dos calamidades femeninas en estilo formal y legible.'
  - La puntuación con dos puntos y la cadencia paralelística siguen la estructura retórica del hebreo y del texto auditado en inglés.
