translation:
  language: es
  text: Pero cuando el demonio percibió el olor[a], huyó a las regiones más remotas de Egipto, y el ángel lo ató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a las regiones más lejanas de Egipto»; la expresión también puede entenderse geográficamente como «a Alto Egipto».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὠσφράνθη
  english_pob_choice: smelled
  chosen_spanish: percibió el olor
  alternatives_spanish:
  - olió
  - sintió el olor
  lexicon: LSJ
  rationale: El griego indica que el ser demoníaco detecta el olor; en español, 'percibió el olor' evita una repetición áspera con 'olor' y conserva la acción sensorial sin perder naturalidad.
- source_word: τὸ δαιμόνιον
  english_pob_choice: the demon
  chosen_spanish: el demonio
  alternatives_spanish:
  - el demonio maligno
  - el espíritu malo
  lexicon: LSJ
  rationale: '''Demonio'' es el equivalente más directo y natural para δαιμόνιον en este contexto narrativo de un agente espiritual personal y hostil.'
- source_word: τῆς ὀσμῆς
  english_pob_choice: the odor
  chosen_spanish: el olor
  alternatives_spanish:
  - el aroma
  - la fragancia
  lexicon: LSJ
  rationale: ὀσμή denota olor/hedor/aroma según el contexto; 'olor' mantiene la referencia concreta sin sugerir agradableza.
- source_word: ἔφυγεν
  english_pob_choice: it fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: LSJ
  rationale: '''Huyó'' expresa con concisión la idea de escapar por temor o peligro, y funciona bien en español bíblico contemporáneo.'
- source_word: εἰς τὰ ἀνώτατα Αἰγύπτου
  english_pob_choice: to the remotest parts of Egypt
  chosen_spanish: a las regiones más remotas de Egipto
  alternatives_spanish:
  - a los confines de Egipto
  - a la parte más alta de Egipto
  - a Egipto, en sus regiones superiores
  lexicon: LSJ
  rationale: La revisión inglesa prefirió una lectura geográfica natural ('remotest parts'). En español, 'regiones más remotas' comunica esa lejanía sin forzar el tecnicismo 'Alto Egipto', que podría sobreespecificar el pasaje.
- source_word: ἔδησεν
  english_pob_choice: bound
  chosen_spanish: lo ató
  alternatives_spanish:
  - lo sujetó
  - lo restringió
  lexicon: LSJ
  rationale: '''Ató'' conserva el acto de sujetar/bind de modo directo y claro; aquí no se necesita ampliar a una interpretación más abstracta.'
- source_word: ὁ ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  - el ángel de Dios
  lexicon: LSJ
  rationale: Se mantiene la forma simple del griego; el contexto identifica al ángel sin añadir un nombre o explicación que el texto no da.
theological_decisions:
- issue: Naturaleza del τὸ δαιμόνιον en el relato
  english_pob_reading: the term denotes a personal hostile spiritual being ('demon')
  chosen_spanish_reading: el término designa un ser espiritual personal y hostil ('demonio')
  alternative_spanish_readings:
  - espíritu maligno
  - espíritu malo
  rationale: El pasaje presenta a este ser como agente activo que percibe, huye y es atado. 'Demonio' mantiene la afirmación sobrenatural sin suavizarla.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza geográfica de εἰς τὰ ἀνώτατα Αἰγύπτου
  english_pob_reading: retain a relatively literal expression rather than resolve it to a technical place-name
  chosen_spanish_reading: 'preservar una referencia geográfica amplia: ''las regiones más remotas de Egipto'''
  alternative_spanish_readings:
  - Alto Egipto
  - los confines de Egipto
  rationale: El griego permite una lectura de lejanía o de región superior. En español, 'regiones más remotas' respeta la amplitud semántica sin fijar indebidamente un topónimo técnico.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que corrigió la traducción de τὰ ἀνώτατα Αἰγύπτου desde una lectura demasiado literal ('uppermost parts') hacia una lectura geográfica más natural ('remotest parts'). Por eso el español adopta 'las regiones más remotas de Egipto' y evita una solución demasiado técnica o rígida.
  spanish_consistency_notes:
  - Se conserva 'demonio' para δαιμόνιον, en línea con la decisión inglesa y con el carácter personal del agente en la escena.
  - Se traduce ἔδησεν con 'lo ató' para mantener la imagen concreta de restricción física/simbólica.
  - La puntuación sigue un orden natural en español, sin alterar la secuencia causal del griego.
