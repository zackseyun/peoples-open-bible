translation:
  language: es
  text: Solo los sacerdotes eran demasiado pocos, y no podían desollar todos los holocaustos, así que sus hermanos los levitas los apoyaron[a] hasta que se terminó la obra y hasta que los sacerdotes se consagraron. Porque los levitas eran más rectos de corazón[b] para consagrarse que los sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ayudaron»; el verbo hebreo es literalmente «los fortalecieron», pero en contexto puede referirse a apoyo práctico.
    reason: lexical_alternative
  - marker: b
    text: O «más íntegros de corazón», «más sinceros de corazón» o «más de todo corazón»; el hebreo enfatiza la rectitud o sinceridad interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: HALOT
  rationale: Marca una restricción o contraste inicial. En español, «Solo» conserva el valor limitativo de la cláusula sin introducir una oposición más fuerte de la que el hebreo exige.
- source_word: לִמְעָט
  english_pob_choice: too few
  chosen_spanish: eran pocos
  alternatives_spanish:
  - eran demasiado pocos
  - eran de escaso número
  lexicon: HALOT
  rationale: Con היה, la expresión señala insuficiencia numérica contextual. «Eran pocos» comunica la idea sin forzar una formulación demasiado interpretativa; el contexto ya muestra que esa cantidad resultó insuficiente.
- source_word: לְהַפְשִׁיט
  english_pob_choice: to skin
  chosen_spanish: desollar
  alternatives_spanish:
  - quitar la piel
  - despellejar
  lexicon: HALOT
  rationale: Se refiere al acto técnico de retirar la piel de los animales sacrificiales. «Desollar» es preciso y natural en español bíblico contemporáneo.
- source_word: הָעֹלוֹת
  english_pob_choice: the burnt offerings
  chosen_spanish: los holocaustos
  alternatives_spanish:
  - los sacrificios totalmente quemados
  - las ofrendas quemadas enteras
  lexicon: HALOT
  rationale: Para el término sacrificial, «holocaustos» conserva el sentido técnico tradicional de la ofrenda completamente quemada. En español eclesial es claro y corresponde al uso bíblico del género.
- source_word: וַיְחַזְּקוּם
  english_pob_choice: supported them
  chosen_spanish: los sostuvieron
  alternatives_spanish:
  - los ayudaron
  - los fortalecieron
  lexicon: HALOT
  rationale: El verbo puede llevar la fuerza literal de «fortalecer», pero en contexto describe apoyo práctico durante una tarea ritual. «Los sostuvieron» conserva la ayuda concreta sin perder del todo la imagen de sostén.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  lexicon: HALOT
  rationale: La expresión es literalmente fraternal y, en contexto cultual, alude a los levitas como miembros del mismo pueblo y servicio. Se mantiene el parentesco textual con «sus hermanos».
- source_word: עַד כְּלוֹת הַמְּלָאכָה
  english_pob_choice: until the work was finished
  chosen_spanish: hasta que se terminó la obra
  alternatives_spanish:
  - hasta que concluyó el trabajo
  - hasta que quedó terminada la tarea
  lexicon: HALOT
  rationale: La construcción indica duración hasta completarse una labor concreta. «La obra» funciona bien en un marco litúrgico y mantiene el carácter general del proceso sacrificial.
- source_word: יִתְקַדְּשׁוּ
  english_pob_choice: had consecrated themselves
  chosen_spanish: se consagraron
  alternatives_spanish:
  - se santificaron
  - se purificaron ritualmente
  lexicon: HALOT
  rationale: En contexto sacerdotal/templo, el hitpael de קדשׁ señala auto-consagración para servicio sagrado. «Se consagraron» es una opción clara y fiel para español. La idea de resultado previo se expresa en el contexto con «hasta que».
- source_word: יִשְׁרֵי לֵבָב
  english_pob_choice: more upright in heart
  chosen_spanish: más rectos de corazón
  alternatives_spanish:
  - más íntegros de corazón
  - más sinceros de corazón
  - más rectos en su interior
  lexicon: HALOT
  rationale: La frase enfatiza rectitud/sinceridad interior. «Rectos de corazón» preserva el hebraísmo y su valor ético, sin reducirlo solo a diligencia externa.
- source_word: לְהִתְקַדֵּשׁ מֵהַכֹּהֲנִים
  english_pob_choice: to consecrate themselves than the priests
  chosen_spanish: para consagrarse que los sacerdotes
  alternatives_spanish:
  - para santificarse más que los sacerdotes
  - para consagrarse antes que los sacerdotes
  lexicon: HALOT
  rationale: El מן comparativo exige una comparación con «que». La redacción española conserva la comparación y la relación de propósito/disposición del verbo sin introducir un matiz temporal que el hebreo no demanda.
theological_decisions:
- issue: Comparación moral/espiritual entre levitas y sacerdotes
  english_pob_reading: The Levites were more upright in heart to consecrate themselves than the priests.
  chosen_spanish_reading: Los levitas eran más rectos de corazón para consagrarse que los sacerdotes.
  alternative_spanish_readings:
  - Los levitas estaban más dispuestos a consagrarse que los sacerdotes.
  - Los levitas eran más sinceros al consagrarse que los sacerdotes.
  rationale: El hebreo destaca la rectitud interior, no solo la rapidez operativa. La traducción mantiene la comparación sin convertirla en una acusación doctrinal general contra el sacerdocio; el contraste queda limitado a esta situación narrada.
  doctrine_reference: Preservar la tensión textual sin ampliarla más allá del contexto inmediato.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió un verbo de apoyo más natural en contexto («supported them») frente a la opción más literal «strengthened them». En español se optó por «los sostuvieron» para conservar la imagen de apoyo y la cercanía semántica al hebreo, sin perder naturalidad. También se respetó la decisión revisada de mantener el énfasis comparativo en la rectitud interior de los levitas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - 'Se prefirió una terminología sacrificial y sacerdotal estable: «holocaustos», «sacerdotes», «levitas», «consagraron».'
  - La comparación final conserva el paralelo entre las dos clases de servidores sin sobreinterpretarlo como juicio global.
  - Las notas al pie se limitaron a alternativas lexicales reales atestiguadas por el hebreo y el audit trail inglés.
