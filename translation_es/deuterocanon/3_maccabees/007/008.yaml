  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: una orden ya emitida para que todos regresen, con prohibición total de dañarlos o insultarlos por los hechos ocurridos. Sin embargo, dos decisiones no reflejan tan bien la evidencia y el rastro POB: «a lo suyo» debilita el valor contextual de εἰς τὰ ἴδια, que aquí en contexto de retorno y reinstalación se entiende mejor como «a su casa» o «a su propio lugar»; y «contra razón» suena poco idiomático en español actual, cuando «contrarias a la razón» o «contra toda razón» preserva mejor παρὰ λόγον.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «vuelva a lo suyo» puede sonar ambiguo o coloquial, y «contra razón» resulta forzado en español e incluso puede entorpecer la comprensión. Además, la nota b del borrador no corresponde al lugar donde el inglés POB conserva la alternativa; la alternativa documentada se refiere a παρὰ λόγον, no a «hacer daño».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La revisión propuesta mantiene terminología neutral y fiel al proyecto. Se respeta la fuerza oficial de προστετάχαμεν con «hemos ordenado» y la prohibición enfática con «de ningún modo» / «nadie les haga daño».
  issues:
  - severity: medium
    issue: «a lo suyo» para εἰς τὰ ἴδια
    rationale: Aunque léxicamente posible, en español moderno es ambiguo y menos natural en este contexto. El inglés POB priorizó «his own home» con nota alternativa. «A su casa» comunica mejor el sentido principal sin perder la nota sobre «sus propios lugares».
  - severity: medium
    issue: La nota [b] está anclada al daño en vez de a παρὰ λόγον
    rationale: En el rastro inglés, la nota alternativa relevante en este punto explica «contrary to reason», no el verbo de dañar. La anotación española debería preservar esa misma decisión auditada.
  - severity: medium
    issue: «contra razón» suena poco idiomático
    rationale: Aunque literal, no es una formulación natural ni clara en español eclesial moderno. «Contrarias a la razón» preserva la evaluación del griego παρὰ λόγον con mejor legibilidad.
