    issue: «Fiesta de las Cabañas» como traducción de τῆς σκηνοπηγίας
    rationale: Aunque es semánticamente cercana, en español bíblico «Fiesta de las Enramadas» comunica mejor la festividad judía de las chozas/booths y suena más natural que «Cabañas», que puede evocar viviendas normales más que refugios festivos temporales.
  - severity: medium
    issue: Uso de «Quisleu» para Χασελεὺ
    rationale: La forma «Quisleu» no es incorrecta, pero «Kislev» es mucho más reconocible en el uso bíblico y judío en español contemporáneo. Dado que el inglés ya añadió una nota cultural, conviene maximizar la identificación del mes en el texto principal.
  revised_spanish_text: Y ahora[a], celebren los días de la Fiesta de las Enramadas[b] en el mes de Kislev[c].
