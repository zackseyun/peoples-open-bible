translation:
  language: es
  text: 'Después de la muerte de Moisés, siervo de Yahvé, Yahvé dijo a Josué, hijo de Nun, asistente[a] de Moisés, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «asistente de Moisés»; alternativamente, «servidor de Moisés» o «ministro de Moisés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now
  chosen_spanish: Aconteció
  alternatives_spanish:
  - Ahora
  - Y sucedió
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי introduce un cambio de escena. En español, 'Aconteció' conserva ese arranque narrativo sin sonar tan coloquial como 'Ahora' ni tan arcaico como una calca rígida.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: La preposición temporal se vierte de manera directa y natural como 'después de'.
- source_word: מ֥וֹת מֹשֶׁ֖ה
  english_pob_choice: the death of Moses
  chosen_spanish: la muerte de Moisés
  alternatives_spanish:
  - el morir de Moisés
  lexicon: HALOT
  rationale: El constructo nominal se expresa con el sustantivo natural en español, 'la muerte', preservando el valor temporal de la frase.
- source_word: עֶ֣בֶד יְהוָ֑ה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: siervo de Yahvé
  alternatives_spanish:
  - esclavo de Yahvé
  - servidor de Yahvé
  lexicon: HALOT
  rationale: Aquí el título de Moisés es honorífico y de servicio pactal. 'Siervo' refleja mejor ese registro que 'esclavo', que sería demasiado fuerte, y evita el sabor eclesiástico de 'servidor'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio transliterado, siguiendo la norma del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: וַיֹּ֤אמֶר
  english_pob_choice: said
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: En una fórmula de discurso divino, 'habló' funciona bien en español y preserva el carácter formal de la comunicación directa. 'Dijo' también es posible, pero 'habló' encaja bien con el registro bíblico.
- source_word: יְהוֹשֻׁ֣עַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre propio bíblico.
- source_word: בִּן נ֔וּן
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - el hijo de Nun
  lexicon: HALOT
  rationale: El patronímico se vierte de forma natural como 'hijo de Nun'.
- source_word: מְשָׁרֵ֥ת מֹשֶׁ֖ה
  english_pob_choice: the attendant of Moses
  chosen_spanish: asistente de Moisés
  alternatives_spanish:
  - servidor de Moisés
  - ayudante de Moisés
  - ministro de Moisés
  lexicon: HALOT
  rationale: El participio indica a alguien que atiende o sirve en apoyo directo. 'Asistente' conserva esa relación funcional sin introducir de antemano un tecnicismo eclesiástico ('ministro') ni forzar el matiz de 'siervo'.
- source_word: לֵ/אמֹֽר
  english_pob_choice: ':'
  chosen_spanish: diciendo
  alternatives_spanish:
  - ':'
  lexicon: HALOT
  rationale: Se mantiene la función introductoria del infinitivo לֵאמֹר con la forma española 'diciendo', que es natural y explícita en una frase de discurso.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se conserva como 'Yahvé' para mantener el nombre pactal y evitar el reemplazo por un título, en coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (aplicado al español como Yahvé)'
- issue: 'Título de Moisés: עֶבֶד יְהוָה'
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: siervo de Yahvé
  alternative_spanish_readings:
  - esclavo de Yahvé
  rationale: Aunque el término base puede tener fuerza de 'esclavo', aquí funciona como título honorífico de servicio a Dios. 'Siervo' preserva esa tensión sin degradar el tono ni borrar el vínculo de pertenencia y obediencia.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contención contextual de términos de servicio/bondad
- issue: Función de לֵאמֹר al final del versículo
  english_pob_reading: saying
  chosen_spanish_reading: diciendo
  alternative_spanish_readings:
  - ':'
  rationale: Se mantiene la apertura del discurso siguiente sin eliminar la marca sintáctica hebrea. 'Diciendo' es la forma más transparente en español; el signo de dos puntos también sería posible, pero aquí se privilegia la explicitud léxica.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: El inglés auditado pasó de una versión más condensada ('Now after the death of Moses...') a una que añadió explícitamente el participio de לֵאמֹר ('saying') y ajustó la apposición de מְשָׁרֵת מֹשֶׁה para hacerla más formal ('the attendant of Moses'). La versión española sigue esa revisión al explicitar 'diciendo' y optar por un sintagma claro para מְשָׁרֵת מֹשֶׁה.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma constante del nombre divino.
  - Se evita 'Señor' para no ocultar el Tetragrámaton.
  - '''Siervo'' se reserva para el título honorífico de Moisés en este contexto; no se usa ''esclavo'' porque el español lo haría sonar excesivamente duro aquí.'
  - '''Josué'' sigue la forma bíblica española estándar.'
  - '''diciendo'' conserva la relación sintáctica de לֵאמֹר sin necesidad de calco.'
  - La puntuación con coma y dos puntos respeta el arranque narrativo y la introducción del discurso directo.
