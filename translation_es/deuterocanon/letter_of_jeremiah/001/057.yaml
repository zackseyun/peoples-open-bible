translation:
  language: es
  text: De ellos, los fuertes quitarán el oro y la plata[a], y se irán con la vestidura que llevan puesta, pero de ningún modo se ayudarán a sí mismos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los poderosos» para «los fuertes».
    reason: lexical_alternative
  - marker: b
    text: 'El griego tiene una negación enfática: «de ningún modo se ayudarán a sí mismos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἰσχύοντες
  english_pob_choice: the strong
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los poderosos
  - los que son fuertes
  lexicon: LSJ
  rationale: ἰσχύοντες funciona aquí como participio sustantivado; «los fuertes» conserva esa fuerza nominal y resulta natural en español. «Los poderosos» es posible, pero desplaza el matiz hacia autoridad más que fuerza/poder físico o efectivo.
- source_word: περιελοῦνται
  english_pob_choice: will take away
  chosen_spanish: quitarán
  alternatives_spanish:
  - llevarán
  - arrancarán
  lexicon: LSJ
  rationale: El verbo expresa quitar o remover algo de encima o de alrededor. «Quitarán» es directo y fiel, sin cargar el texto con una imagen más fuerte de la que el contexto exige.
- source_word: τὸ χρυσίον καὶ τὸ ἀργύριον
  english_pob_choice: the gold and the silver
  chosen_spanish: el oro y la plata
  alternatives_spanish:
  - su oro y su plata
  - el oro y la plata de ellos
  lexicon: LSJ
  rationale: El griego presenta los objetos con artículos, sin posesivo explícito. En español, «el oro y la plata» reproduce bien la referencia concreta sin añadir posesión no expresada.
- source_word: τὸν ἱματισμὸν τὸν περικείμενον αὐτοῖς
  english_pob_choice: the clothing that is around them
  chosen_spanish: la ropa que está alrededor de ellos
  alternatives_spanish:
  - el vestido que está alrededor de ellos
  - la vestidura que los rodea
  lexicon: LSJ
  rationale: ἱματισμός puede ser ropa o vestidura, y περικείμενον sugiere algo colocado alrededor. «La ropa que está alrededor de ellos» mantiene la imagen sin introducir más interpretación de la necesaria; en este contexto de ídolos, alude a su adorno o revestimiento.
- source_word: ἀπελεύσονται ἔχοντες
  english_pob_choice: they will go away with
  chosen_spanish: se irán con
  alternatives_spanish:
  - se marcharán con
  - se irán llevando
  lexicon: LSJ
  rationale: La combinación verbal indica partida en posesión de lo robado. «Se irán con» es idiomático en español y conserva la idea de llevarse los objetos sin sobreexplicarla.
- source_word: οὔτε ἑαυτοῖς οὐ μὴ βοηθήσωσιν
  english_pob_choice: yet they certainly will not help themselves
  chosen_spanish: pero de ningún modo se ayudarán a sí mismos
  alternatives_spanish:
  - y de ningún modo se ayudarán a sí mismos
  - ni siquiera podrán ayudarse a sí mismos
  lexicon: LSJ
  rationale: 'La doble negación griega es enfática; «de ningún modo» expresa esa fuerza. «Ayudarse a sí mismos» conserva el reflexivo y la ironía del pasaje: los ídolos no pueden socorrerse ni protegerse.'
theological_decisions:
- issue: Referente de la incapacidad final
  english_pob_reading: The clause refers to the idols' inability to help themselves.
  chosen_spanish_reading: 'La cláusula se entiende de los ídolos mismos: no pueden ayudarse ni salvarse.'
  alternative_spanish_readings:
  - Podría leerse más generalizadamente como una declaración sobre su impotencia.
  - Podría entenderse como una observación irónica sobre quienes los despojan.
  rationale: El contexto inmediato del pasaje de la Letra de Jeremías polemiza contra los ídolos. Mantener el reflexivo «a sí mismos» preserva la ironía y la impotencia atribuida a esas imágenes, sin suavizar la tensión teológica del texto.
  doctrine_reference: Primacía del contexto original; preservar la polemización contra la idolatría sin armonizarla con formulaciones tradicionales.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir un verbo más directo para περιελοῦνται y una formulación formal para la cláusula final, evitando sobretraducir περικείμενον con una imagen excesivamente concreta.
  spanish_consistency_notes:
  - Se mantiene «los fuertes» para οἱ ἰσχύοντες, coherente con el valor sustantivado del participio.
  - Se conserva «oro y plata» sin posesivos añadidos, por fidelidad al griego.
  - La cláusula final preserva la negación enfática y el reflexivo, evitando suavizar la impotencia de los ídolos.
  - El registro es digno y publicable, con sintaxis natural en español latinoamericano.
