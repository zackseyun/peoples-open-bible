translation:
  text: |-
    “Listen now about the stones that go into the building. The stones, then, that are square and white and that fit together at their joints [a]—these are the apostles and bishops [b] and teachers and deacons [c], who walked in the reverent dignity of God [d] and who oversaw and taught and served God’s elect with purity and reverence [e]—some have fallen asleep [f], and some are still alive. They were always in agreement with one another, had peace among themselves, and listened to each other; for this reason their joints fit in the building of the tower.
    
    “And the ones drawn up from the deep [g] and set into the building and fitting together at their joints with the other stones already built—who are they?” “These are the ones who suffered on account of the name of the Lord [h].”
    
    “I want to know who the other stones are that are being carried from the dry land [i], lady.” She said, “Those that go into the building without being hewn [j]—the Lord approved these, because they walked in the uprightness of the Lord [k] and accomplished his commandments [l].”
    
    “And the ones being brought and set into the building—who are they?” “They are new in the faith and faithful [m]. But they are being admonished [n] by the angels to do good, because evil was found in them.”
    
    “And those whom they were casting away and throwing aside [o]—who are they?” “These are people who have sinned and want to repent [p]. For this reason they were not flung far away outside the tower, because they will be useful for the building [q], if they repent. Therefore those who are going to repent—if they repent—will be strong in the faith, if they repent now, while the tower is being built. But if the building is completed, they no longer have a place, but will be cast out [r]. But they have only this: to lie beside the tower [s].”
