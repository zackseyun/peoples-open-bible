translation:
  language: es
  text: Y después de ayunar cuarenta días y cuarenta noches[a], tuvo hambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo ayunado cuarenta días y cuarenta noches, después tuvo hambre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: Conserva la conexión narrativa simple de καί sin añadir matiz interpretativo. En español, «Y» mantiene el flujo directo del relato.
- source_word: νηστεύσας
  english_pob_choice: after fasting
  chosen_spanish: después de ayunar
  alternatives_spanish:
  - habiendo ayunado
  - cuando hubo ayunado
  lexicon: BDAG
  rationale: El participio aoristo antecedente se expresa naturalmente en español como acción previa. «Después de ayunar» comunica la anterioridad sin sonar rígido ni demasiado literal.
- source_word: ἡμέρας τεσσεράκοντα καὶ νύκτας τεσσεράκοντα
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  alternatives_spanish:
  - por cuarenta días y cuarenta noches
  lexicon: BDAG
  rationale: El acusativo de extensión de tiempo indica duración. En español, la duración queda clara sin necesidad de añadir una preposición, y la fórmula conserva el eco bíblico natural.
- source_word: ὕστερον
  english_pob_choice: after
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - más tarde
  lexicon: BDAG
  rationale: El valor temporal posterior de ὕστερον puede integrarse en la frase española con «después», que resulta fluido y refleja la secuencia del texto.
- source_word: ἐπείνασεν
  english_pob_choice: he was hungry
  chosen_spanish: tuvo hambre
  alternatives_spanish:
  - se sintió hambriento
  - llegó a tener hambre
  lexicon: BDAG
  rationale: El aoristo de πεινάω expresa el inicio o surgimiento del hambre. «Tuvo hambre» es una expresión natural en español y comunica bien el estado real de necesidad física.
theological_decisions:
- issue: Expresar la humanidad real de Jesús sin sobreinterpretar el verbo
  english_pob_reading: he was hungry
  chosen_spanish_reading: tuvo hambre
  alternative_spanish_readings:
  - se quedó con hambre
  - se sintió hambriento
  rationale: La lectura debe comunicar hambre genuina y corporal, conforme al sentido lexical del verbo, sin cargar la frase con una explicación doctrinal añadida. «Tuvo hambre» preserva esa realidad de manera clara y sobria.
  doctrine_reference: Cristología clásica; afirmación de la verdadera humanidad de Cristo (p. ej., Calcedonia)
translation_notes:
  revision_awareness: 'El texto griego y la traducción inglesa POB coinciden en la secuencia temporal: ayuno previo, luego hambre. No se detectan cambios textuales relevantes; la versión española conserva esa relación temporal y el matiz verbal del aoristo de πεινάω con una construcción idiomática natural.'
  spanish_consistency_notes:
  - Se usa «Jesús» implícitamente solo si el contexto inmediato lo requiere; este versículo no lo nombra.
  - Se mantiene «tuvo hambre» como fórmula natural y suficientemente precisa para el valor ingresivo de ἐπείνασεν.
  - No se introduce terminología eclesiástica que el griego no exige.
  - La nota al pie ofrece la alternativa de estructura participial para preservar la opción visible en el audit trail inglés.
