translation:
  language: es
  text: Yo no he pecado contra ti[a], pero tú me haces injusticia al hacer guerra contra mí. Yahvé, el Juez, juzgue hoy entre los hijos de Israel y los hijos de Amón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre los israelitas y los amonitas». El hebreo dice literalmente: «entre los hijos de Israel y los hijos de Amón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  english_pob_choice: have not sinned
  chosen_spanish: no he pecado
  alternatives_spanish:
  - no te he hecho mal
  - no he obrado mal
  lexicon: HALOT
  rationale: El verbo חטא en este contexto judicial puede expresar 'pecar' o 'hacer mal'. En español, 'no he pecado contra ti' conserva la fuerza moral y legal del reclamo, y sigue de cerca la decisión inglesa de mantener 'sinned' para no diluir el peso de la acusación.
- source_word: לָךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: Con חטא, el ל se entiende idiomáticamente como 'contra'. 'Contra ti' comunica mejor la relación de ofensa o transgresión que un simple 'a ti'.
- source_word: עֹשֶׂה אִתִּי רָעָה
  english_pob_choice: are doing me wrong
  chosen_spanish: me estás haciendo mal
  alternatives_spanish:
  - me estás tratando mal
  - me haces lo malo
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'hacer mal' o 'hacer lo malo' conmigo/a mí. 'Me estás haciendo mal' conserva la acusación jurídica sin forzar una paráfrasis más amplia.
- source_word: לְהִלָּחֶם בִּי
  english_pob_choice: by making war against me
  chosen_spanish: al hacer guerra contra mí
  alternatives_spanish:
  - al pelear contra mí
  - por hacer guerra contra mí
  lexicon: HALOT
  rationale: El infinitivo לְהִלָּחֶם describe la acción concreta del agravio en contexto inter-nacional. 'Hacer guerra' mantiene el registro formal y el trasfondo bélico mejor que un genérico 'pelear'.
- source_word: יִשְׁפֹּט ... הַשֹּׁפֵט
  english_pob_choice: May ... judge ... the Judge
  chosen_spanish: juzgue ... el Juez
  alternatives_spanish:
  - haga justicia ... el que juzga
  - juzgará ... el Juez
  lexicon: HALOT
  rationale: Se preserva la repetición del verbo y del título desde la raíz שפט. En español, 'juzgue' recoge el valor de súplica/jussivo, y 'el Juez' mantiene el título nominal sin perder solemnidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde con el nombre divino 'Yahvé', conforme al estándar del proyecto. Se evita la sustitución por un título genérico para conservar el nombre propio del pacto.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: '''Hoy'' es la equivalencia natural y directa en español moderno, y expresa la inmediatez de la apelación judicial.'
- source_word: בֵּין בְּנֵי יִשְׂרָאֵל וּבֵין בְּנֵי עַמּוֹן
  english_pob_choice: between the sons of Israel and the sons of Ammon
  chosen_spanish: entre los hijos de Israel y los hijos de Amón
  alternatives_spanish:
  - entre los israelitas y los amonitas
  - entre el pueblo de Israel y el pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva el paralelo literal de 'hijos de' porque el texto hebreo usa esa expresión corporativa masculina. 'Hijos de Israel' y 'hijos de Amón' mantienen la forma del original y la tensión de género/etnicidad que el POB inglés también preserva.
theological_decisions:
- issue: Nombre divino יְהוָה en una apelación judicial
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La referencia al Dios de Israel aparece como nombre propio, no como título genérico. 'Yahvé' preserva la identidad pactal y la intención del texto, en continuidad con la decisión del POB en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión corporativa masculina בְּנֵי
  english_pob_reading: sons of Israel ... sons of Ammon
  chosen_spanish_reading: los hijos de Israel ... los hijos de Amón
  alternative_spanish_readings:
  - los israelitas ... los amonitas
  - el pueblo de Israel ... el pueblo de Amón
  rationale: Se mantiene la expresión masculina plural del hebreo en lugar de neutralizarla, siguiendo la política de precisión de género del proyecto y la conservación del paralelismo formal del verso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hubo alto acuerdo con la traducción auditada en inglés; por eso el borrador español sigue de cerca las decisiones léxicas y teológicas ya validadas, sin introducir innovaciones innecesarias.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה según la terminología del proyecto.
  - Se conserva el paralelismo de 'hijos de Israel' / 'hijos de Amón' por fidelidad al hebreo.
  - La puntuación refleja un tono judicial-formal, coherente con la súplica del versículo.
