- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Jesúa
  lexicon: HALOT
  rationale: En español, el nombre postexílico puede representarse como «Jesúa» para reflejar la convención bíblica y la vocalización hebrea. Se evita «Josué» porque aquí el nombre funciona como forma breve postexílica propia del contexto.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  alternatives_spanish:
  - Yoab
  - Joab
  lexicon: HALOT
  rationale: Transliteración estándar del nombre propio, ampliamente reconocible en español bíblico.
- source_word: אַלְפַּיִם שְׁמֹנֶה מֵאוֹת וּשְׁנֵים עָשָׂר
  english_pob_choice: 2,812
