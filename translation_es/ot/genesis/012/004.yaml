translation:
  language: es
  text: Abram se fue, tal como Yahvé le había hablado, y Lot fue con él. Abram tenía setenta y cinco años cuando salió de Harán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - partió
  - salió
  lexicon: HALOT
  rationale: El hebreo narra movimiento simple en pasado. En español, «fue» conserva la naturalidad narrativa sin añadir el matiz de inicio de viaje que tendría «partió» o «salió».
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  - según
  lexicon: HALOT
  rationale: «Tal como» comunica conformidad con lo dicho por Yahvé, manteniendo la idea de correspondencia obediente sin volver la frase artificiosamente literal.
- source_word: דִּבֶּר אֵלָיו
  english_pob_choice: had spoken to him
  chosen_spanish: le había hablado
  alternatives_spanish:
  - le había dicho
  - le habló
  lexicon: HALOT
  rationale: El perfecto pluscuamperfecto español refleja que la palabra divina precede a la acción de Abram. «Hablado» preserva el valor verbal de דבר, mientras que «dicho» sería aceptable pero menos cercano al verbo fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la decisión POB para יְהוָה. En español, «Yahvé» es la forma natural y reverente; se evita la sustitución por título para no enmascarar el nombre del pacto.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: Es la equivalencia directa y natural del sintagma preposicional con sufijo pronominal. «Con él» mantiene la sencillez narrativa del hebreo.
- source_word: בֶּן חָמֵשׁ שָׁנִים וְשִׁבְעִים שָׁנָה
  english_pob_choice: seventy-five years old
  chosen_spanish: setenta y cinco años
  alternatives_spanish:
  - de setenta y cinco años
  - setenta y cinco años de edad
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de edad; el español moderno lo expresa de forma natural sin necesidad de añadir «de edad», porque el contexto verbal ya establece la referencia temporal.
- source_word: בְּצֵאתוֹ
  english_pob_choice: when he departed
  chosen_spanish: cuando salió
  alternatives_spanish:
  - cuando partió
  - al salir
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca el tiempo de la salida. «Cuando salió» conserva la relación temporal y resulta idiomático en español.
- source_word: מֵחָרָן
  english_pob_choice: from Haran
  chosen_spanish: de Harán
  alternatives_spanish:
  - desde Harán
  lexicon: HALOT
  rationale: Se translitera el topónimo de manera estable en español bíblico. «De Harán» reproduce la preposición מ sin forzar una especificación espacial adicional.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB inglés opta por preservar el nombre propio divino. En español, «Yahvé» mantiene esa decisión y evita la sustitución tradicional por un título, que diluiría el dato textual del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre la palabra previa de Yahvé y la acción de Abram
  english_pob_reading: just as Yahweh had spoken to him
  chosen_spanish_reading: tal como Yahvé le había hablado
  alternative_spanish_readings:
  - como Yahvé le había hablado
  - según Yahvé le había hablado
  rationale: La formulación conserva la idea de conformidad obediente sin convertir el verso en una explicación doctrinal adicional. La obediencia se desprende del propio paralelismo entre hablar y caminar.
  doctrine_reference: Génesis 12:4, obediencia narrativa al llamado divino
translation_notes:
  revision_awareness: 'Se mantuvo la lectura óptima de la POB inglesa: narración simple, nombre divino explícito y edad expresada idiomáticamente. No se introdujeron cambios textuales ni notas de variantes porque el pasaje presenta alta concordancia entre hebreo, audit trail inglés y español natural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió un pasado narrativo simple («fue», «salió») para respetar el flujo hebreo sin sobretraducir.
  - La edad se expresa de forma idiomática en español, manteniendo el valor exacto de setenta y cinco años.
  - 'Los topónimos se transliteran con ortografía española habitual: «Abram», «Lot», «Harán».'
