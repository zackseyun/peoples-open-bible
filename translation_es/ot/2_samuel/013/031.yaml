translation:
  language: es
  text: Entonces el rey se levantó[a], rasgó sus vestidos y se tendió en tierra; y todos sus siervos estaban de pie con sus vestidos rasgados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rasgar las vestiduras era una expresión habitual de dolor, horror o luto en la Biblia hebrea.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El hebreo narra una acción sucesiva en forma wayyiqtol. En español, 'se levantó' comunica el movimiento del rey con naturalidad narrativa y mantiene el tono formal sin sonar arcaico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El sustantivo está en forma definida y funciona como título conocido en el contexto; 'el rey' es la equivalencia directa y la más natural en español bíblico contemporáneo.
- source_word: וַיִּקְרַע אֶת־בְּגָדָיו
  english_pob_choice: tore his garments
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó sus ropas
  - desgarró sus vestidos
  lexicon: HALOT
  rationale: El verbo קרע con 'vestidos' es el gesto idiomático de duelo o conmoción. 'Rasgó' expresa bien el acto y conserva la imagen hebrea; 'vestidos' mantiene el registro bíblico y la referencia al atuendo exterior.
- source_word: וַיִּשְׁכַּב אַרְצָה
  english_pob_choice: lay on the ground
  chosen_spanish: se tendió en tierra
  alternatives_spanish:
  - se acostó en el suelo
  - se echó en tierra
  lexicon: HALOT
  rationale: La expresión hebrea indica ponerse hacia el suelo/tierra como gesto de aflicción. 'Se tendió en tierra' preserva la dirección y la solemnidad sin reducirla a una simple descripción física.
- source_word: וְכָל־עֲבָדָיו
  english_pob_choice: and all his servants
  chosen_spanish: y todos sus siervos
  alternatives_spanish:
  - y todos sus servidores
  - y todos sus servidores de palacio
  lexicon: HALOT
  rationale: POB suele reservar 'esclavo' para δοῦλος cuando hay fuerza léxica específica; כאן el hebreo עֲבָדָיו en contexto cortesano puede ser 'siervos' o 'servidores'. Se elige 'siervos' para conservar la relación de dependencia sin sobrecargar con 'esclavos'.
- source_word: נִצָּבִים
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban parados
  - permanecían de pie
  lexicon: HALOT
  rationale: El participio sugiere estado durativo. 'Estaban de pie' reproduce ese estado en español de forma clara y digna.
- source_word: קְרֻעֵי בְגָדִים
  english_pob_choice: with their garments torn
  chosen_spanish: con sus vestidos rasgados
  alternatives_spanish:
  - con sus ropas rasgadas
  - con los vestidos rasgados
  lexicon: HALOT
  rationale: La construcción participial indica una condición resultante. 'Vestidos rasgados' conserva la imagen y la correspondencia con el gesto de duelo mencionado en la primera mitad del versículo.
theological_decisions:
- issue: El gesto de rasgar las vestiduras como señal cultural de duelo, horror o aflicción.
  english_pob_reading: Tearing one's garments was a customary expression of grief, horror, or mourning in the Hebrew Bible.
  chosen_spanish_reading: Rasgar las vestiduras era una expresión habitual de dolor, horror o luto en la Biblia hebrea.
  alternative_spanish_readings:
  - era una costumbre de duelo
  - era una señal de aflicción
  rationale: No se debe explicar el gesto como si fuera literalista o meramente temperamental; el texto muestra una señal cultural reconocible. La nota conserva el alcance semántico de la observación auditada en inglés.
  doctrine_reference: Trasfondo cultural bíblico; cf. Gn 37:29, Jue 11:35, 2 R 22:11.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto fuente y con la audit trail inglesa. No se documentan revisiones textuales o teológicas que exijan variantes adicionales; se conserva la secuencia narrativa y el paralelismo entre el rey y sus siervos.
  spanish_consistency_notes:
  - Se mantiene 'vestidos' para conservar el paralelismo con 'vestidos rasgados' y el registro bíblico formal.
  - '''Siervos'' se usa aquí por el contexto cortesano; no implica una normalización automática de δοῦλος en otros pasajes.'
  - La nota cultural se ancla en el primer gesto del versículo, que es el punto donde el lector puede necesitar aclaración de trasfondo.
