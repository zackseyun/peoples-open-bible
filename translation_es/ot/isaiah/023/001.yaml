base_translation:
  language: en
  yaml_path: translation/ot/isaiah/023/001.yaml
  text: 'An oracle concerning Tyre: Wail[a], ships of Tarshish, for it is destroyed, without house or harbor[b]. From the land of Kittim it is revealed to them.'
  footnotes:
  - marker: a
    text: Or 'without house or entry'; the Hebrew likely means that Tyre is so devastated that there is no house and no harbor/access left.
    reason: lexical_alternative
  - marker: b
    text: Kittim likely refers to Cyprus or nearby western coastlands.
    reason: cultural_note
