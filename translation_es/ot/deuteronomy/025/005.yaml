translation:
  language: es
  text: Si hermanos habitan juntos, y uno de ellos muere y no tiene hijo[a], la esposa del muerto no será dada en matrimonio fuera, a un hombre extraño[b]. Su cuñado[c] se llegará a ella[d] y la tomará para sí como esposa, y cumplirá para con ella el deber de cuñado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «no tiene hijo alguno»; el hebreo dice de forma específica «hijo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no estará fuera para un hombre extraño», es decir, no debe casarse fuera de esta obligación familiar.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el hermano de su marido»; tradicionalmente, esta obligación más tarde se llamó levirato.'
    reason: cultural_note
  - marker: d
    text: «Se llegará a ella» es un eufemismo hebreo para la unión sexual matrimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחִים
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - hermanos varones
  lexicon: HALOT
  rationale: «Hermanos» conserva el sentido ordinario del hebreo y mantiene clara la relación legal que sigue en el versículo. «Parientes» sería demasiado amplio; «hermanos varones» es más explícito, pero no necesario en español.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en la misma casa
  - a la vez
  lexicon: HALOT
  rationale: «Juntos» comunica de manera natural la condición de convivencia o cohabitación cercana que presupone el texto, sin añadir más de lo que dice el hebreo.
- source_word: וּבֵן אֵין לוֹ
  english_pob_choice: has no son
  chosen_spanish: sin tener hijo
  alternatives_spanish:
  - sin tener hijo varón
  - sin tener hijo ninguno
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no hay para él hijo», y el inglés POB optó por preservar la restricción léxica de «son» pero señaló la posibilidad más amplia. En español, «sin tener hijo» mantiene la forma del texto y deja abierta la observación de la nota.
- source_word: אֵשֶׁת הַמֵּת
  english_pob_choice: the wife of the dead man
  chosen_spanish: la esposa del muerto
  alternatives_spanish:
  - la mujer del muerto
  - la viuda
  lexicon: HALOT
  rationale: «La esposa del muerto» sigue de cerca la construcción hebrea y evita sustituir el giro por «la viuda», que es correcto por implicación pero menos literal.
- source_word: הַחוּצָה לְאִישׁ זָר
  english_pob_choice: shall not be married outside to a strange man
  chosen_spanish: no saldrá fuera a un hombre extraño
  alternatives_spanish:
  - no será dada fuera a un hombre extraño
  - no se casará fuera con un extraño
  lexicon: HALOT
  rationale: El hebreo usa una expresión espacial que el inglés POB conservó con una nota explicativa. «No saldrá fuera a un hombre extraño» conserva ese movimiento literal y la tensión legal; «extraño» mantiene el valor social de outsider sin convertirlo en «forastero» o «extranjero» nacional.
- source_word: יְבָמָהּ
  english_pob_choice: her husband's brother
  chosen_spanish: su cuñado
  alternatives_spanish:
  - el hermano de su marido
  - su hermano político
  lexicon: HALOT
  rationale: Aunque el hebreo especifica «el hermano de su esposo», en español «cuñado» es el equivalente relacional natural. La nota preserva la relación técnica implícita en la ley; «hermano de su marido» sería más analítico, pero menos fluido.
- source_word: יָבֹא עָלֶיהָ
  english_pob_choice: shall go in to her
  chosen_spanish: se llegará a ella
  alternatives_spanish:
  - entrará a ella
  - se unirá sexualmente a ella
  lexicon: HALOT
  rationale: «Se llegará a ella» conserva el eufemismo hebreo de unión sexual con sobriedad bíblica y en un español comprensible. La alternativa explícita aclara el sentido, pero el texto principal puede mantener el giro idiomático.
- source_word: וּלְקָחָהּ לוֹ לְאִשָּׁה
  english_pob_choice: take her to himself as a wife
  chosen_spanish: la tomará para sí como esposa
  alternatives_spanish:
  - la tomará por esposa
  - se casará con ella
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «tomarla para sí por esposa». «La tomará para sí como esposa» refleja bien esa estructura y conserva el tono legal del pasaje.
- source_word: וְיִבְּמָהּ
  english_pob_choice: perform the duty of a husband's brother to her
  chosen_spanish: cumplirá con ella el deber de cuñado
  alternatives_spanish:
  - cumplirá con ella el deber de hermano del marido
  - hará con ella el levirato
  lexicon: HALOT
  rationale: El verbo designa la obligación específica del levirato. «Deber de cuñado» comunica la función legal sin tecnicismo excesivo en el texto principal; la alternativa más técnica queda disponible si se desea explicitar la institución.
theological_decisions:
- issue: Alcance de «sin tener hijo»
  english_pob_reading: Retain the specific wording 'son' in the main text.
  chosen_spanish_reading: Mantener en el texto principal «sin tener hijo», con nota que recuerda que el hebreo dice «hijo» de manera específica.
  alternative_spanish_readings:
  - sin tener hijo varón
  - sin tener descendencia
  rationale: El hebreo usa el sustantivo concreto «hijo», y el POB inglés preserva esa restricción mientras registra la posibilidad interpretativa de «child». En español, «sin tener hijo» deja visible la forma del texto y permite que la nota explique la precisión léxica sin resolverla indebidamente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Terminología del levirato
  english_pob_reading: Use plain relational and duty language in the main text rather than technical jargon.
  chosen_spanish_reading: Usar «cuñado» y «deber de cuñado» en el texto principal, reservando la identificación institucional para nota.
  alternative_spanish_readings:
  - levirar / levirato
  - hermano político
  rationale: La ley es jurídica y culturalmente específica, pero el español puede transmitirla claramente sin imponer de entrada el tecnicismo «levirato». La traducción mantiene la relación familiar y la obligación legal, y la nota puede nombrar la institución si hace falta.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción española sigue de cerca la última revisión inglesa, especialmente en el giro espacial «no saldrá fuera», el tratamiento relacional de יְבָמָהּ y la formulación legal de la obligación final. Se evitó introducir «familia» en el cuerpo del texto, como hizo la revisión final inglesa al corregir un añadido interpretativo. La nota del hijo conserva la tensión entre el hebreo literal «hijo» y la implicación más amplia de ausencia de descendencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma predeterminada solo cuando el pasaje lo requiera; este versículo no contiene el Tetragrámaton.
  - Se mantiene «hijo» en singular en la nota porque la base hebrea es singular; no se normaliza a «hijos» ni a «descendencia» en el texto principal.
  - «Cuñado» se usa como equivalente relacional de יְבָמָהּ, sin sustituir la explicación institucional de levirato.
  - Se conserva la imagen verbal de movimiento («saldrá fuera», «se llegará») para reflejar la legalidad formulada con eufemismo en hebreo.
