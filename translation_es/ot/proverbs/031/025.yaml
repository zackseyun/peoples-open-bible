translation:
  language: es
  text: Fuerza y dignidad son su vestidura[a], y se ríe de los días por venir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del futuro»; literalmente, «del último/postrer día».'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹז
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: HALOT
  rationale: עֹז denota fuerza o poder. En español, «fuerza» es la equivalencia más natural y sobria en este retrato de carácter, y mantiene bien el paralelismo con el término siguiente.
- source_word: וְהָדָר
  english_pob_choice: dignity
  chosen_spanish: dignidad
  alternatives_spanish:
  - majestad
  - esplendor
  - honor
  lexicon: HALOT
  rationale: הָדָר puede expresar esplendor, majestad u honor. «Dignidad» comunica de forma idiomática una presencia honorable y grave sin cargar el verso con un matiz regio que el contexto no exige.
- source_word: לְבוּשָׁהּ
  english_pob_choice: are her clothing
  chosen_spanish: son su vestidura
  alternatives_spanish:
  - son su ropa
  - son su vestido
  - la visten
  lexicon: HALOT
  rationale: 'El sustantivo con sufijo femenino singular funciona metafóricamente: estas cualidades son lo que la cubre o viste. «Son su vestidura» conserva la metáfora de manera natural y solemne en español.'
- source_word: וַתִּשְׂחַק
  english_pob_choice: she laughs
  chosen_spanish: se ríe
  alternatives_spanish:
  - ríe
  - se burla
  - sonríe
  lexicon: HALOT
  rationale: El verbo שׂחק en este contexto expresa risa. «Se ríe» mantiene la vivacidad y la confianza del hebreo, sin suavizarlo demasiado ni convertirlo en una paráfrasis afectiva.
- source_word: לְיוֹם אַחֲרוֹן
  english_pob_choice: at the days to come
  chosen_spanish: del día venidero
  alternatives_spanish:
  - del futuro
  - del último día
  - de los días por venir
  lexicon: HALOT
  rationale: La frase puede entenderse como referencia al futuro cercano o venidero. «Del día venidero» conserva el carácter temporal y evita imponer una lectura escatológica no requerida por el contexto sapiencial.
theological_decisions:
- issue: Posible sentido escatológico de אַחֲרוֹן
  english_pob_reading: 'Temporal future in a wisdom-context sense: ''the days to come'''
  chosen_spanish_reading: 'Referencia temporal al porvenir: «el día venidero»'
  alternative_spanish_readings:
  - «el último día»
  - «el día final»
  - «el futuro»
  rationale: En Proverbios 31 el foco está en la seguridad y prudencia de la mujer virtuosa respecto de lo que viene. Aunque אַחֲרוֹן puede significar «último» o «postrero», aquí el contexto sapiencial favorece el futuro ordinario; la nota preserva la alternativa sin resolverla de forma indebida.
  doctrine_reference: Mantener la tensión textual sin forzar una lectura doctrinal escatológica donde el contexto inmediato no la desarrolla.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la lectura auditada en inglés, preservando la metáfora de vestidura y la ambigüedad de אַחֲרוֹן mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Fuerza» y «dignidad» conservan el paralelismo nominal del hebreo.
  - «Vestidura» mantiene el tono elevado y metafórico mejor que una opción más cotidiana como «ropa».
  - La nota a evita cerrar la tensión entre «día venidero» y posibles lecturas de «último día».
