translation:
  language: es
  text: Él esparce la escarcha como sal[c][b][a], y brota como retoños de palmera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de Kahana dice literalmente algo como «niebla/escarcha ... habita como sal»; el paralelo griego dice «derrama escarcha como sal sobre la tierra». La línea es textualmente incierta, y la traducción refleja el sentido compartido más que una lectura estrictamente literal del hebreo dañado.
    reason: textual_variant
  - marker: b
    text: La imagen final también puede traducirse «y florece como flores de palmera» o, teniendo en cuenta el paralelo griego, puede referirse a formaciones heladas puntiagudas.
    reason: lexical_alternative
  - marker: c
    text: Masada conserva una lectura distinta en esta parte del versículo frente al texto de la Guenizá de El Cairo representado por Kahana, lo que indica disturbio textual en la tradición hebrea aquí.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ / implied subject; אד
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Derrama
  - Vierte
  - La escarcha
  lexicon: HALOT; Swete LXX 1909
  rationale: El hebreo transmitido es textualmente inestable, y el paralelo griego presenta una acción atribuida implícitamente a Dios. Por eso el español conserva el sujeto implícito de tercera persona singular con «Él», en vez de traducir mecánicamente el sustantivo aislado como sujeto principal. Mantiene la lectura teológica coherente del himno sin forzar el hebreo.
- source_word: כפור / πάχνην
  english_pob_choice: frost
  chosen_spanish: la escarcha
  alternatives_spanish:
  - el hielo
  - la helada
  lexicon: HALOT
  rationale: «Escarcha» es la forma natural y precisa en español para כפור / πάχνην. Evita la ambigüedad de «hielo» y conserva el valor meteorológico de «frost/hoarfrost».
- source_word: כמלח / ὡς ἅλα
  english_pob_choice: like salt
  chosen_spanish: como sal
  alternatives_spanish:
  - igual que la sal
  - como si fuera sal
  lexicon: HALOT
  rationale: La comparación es directa y se expresa de manera natural en español con «como sal». Conserva la imagen de semejanza visual o de distribución sin añadir interpretación.
- source_word: ישכון / χέει
  english_pob_choice: spreads
  chosen_spanish: derrama
  alternatives_spanish:
  - esparce
  - deja caer
  - vierte
  lexicon: HALOT; LXX lexeme χέω
  rationale: El hebreo Kahana sugiere «habitar/posarse», pero el griego paralelo usa χέω, «derramar». En español, «derrama» conserva mejor el movimiento de extensión y permite reflejar la tensión textual sin optar por una paráfrasis interpretativa demasiado suave. También armoniza con la imagen de nieve/escarcha distribuida sobre la tierra.
- source_word: ויציץ / παγεῖσα γίνεται
  english_pob_choice: it sprouts
  chosen_spanish: brota
  alternatives_spanish:
  - florece
  - retoña
  - se yergue
  lexicon: HALOT; Swete LXX 1909
  rationale: La línea final es una imagen vegetal aplicada a formaciones de hielo. «Brota» es breve, poético y suficientemente amplio para conservar la ambigüedad entre crecimiento vegetal y protrusión cristalina. No se eligió un término más interpretativo como «se yergue» porque borraría el matiz de crecimiento presente en el verbo.
- source_word: כתמר / σκολόπων ἄκρα
  english_pob_choice: like palm shoots
  chosen_spanish: como retoños de palmera
  alternatives_spanish:
  - como flores de palmera
  - como puntas de hielo
  - como brotes de palmera
  lexicon: HALOT; Swete LXX 1909
  rationale: El hebreo tiene imagen de palmera y «ציצים»; el griego, en cambio, presenta una lectura más áspera («puntas de espinos» / formaciones puntiagudas). «Retoños de palmera» preserva la metáfora vegetal del hebreo y a la vez mantiene la idea de brote joven. Se evita «puntas de hielo» como texto principal porque desplaza demasiado la imagen hebrea, aunque la nota reconoce la tensión textual.
theological_decisions:
- issue: Tensión textual entre el hebreo transmitido y el paralelo griego
  english_pob_reading: The English POB reflects the shared sense rather than a strictly literal rendering of the damaged Hebrew.
  chosen_spanish_reading: 'La traducción española sigue una solución de sentido compartido: «derrama la escarcha como sal» y conserva la imagen vegetal final.'
  alternative_spanish_readings:
  - «La escarcha se posa como sal»
  - «Vierte escarcha como sal»
  - «… y se vuelve puntas de hielo»
  rationale: El versículo presenta una transmisión problemática; el hebreo y el griego no coinciden plenamente. En español, una versión demasiado literal del hebreo oscurecería el sentido, y una versión demasiado dependiente del griego eliminaría la imagen poética de la palmera. La redacción elegida equilibra ambas tradiciones y mantiene la tensión textual visible.
  doctrine_reference: Principio de primacía de las fuentes originales; preservación honesta de variantes textuales
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del borrador inglés, que había preferido «spreads frost» para acercarse más al hebreo. Sin embargo, dado que el paralelo griego de Swete aporta con claridad la acción de «derramar» y el contexto textual está marcado como inestable, opté por una solución española que deja visible esa tensión y evita fijar una sola reconstrucción como si fuera segura.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando fuera necesario; en este versículo el sujeto es implícito en tercera persona y no se necesita el nombre divino explícito.
  - Preferí «escarcha» para כפור / πάχνην por ser el equivalente meteorológico más natural en español.
  - Conservé una imagen vegetal final en lugar de sustituirla por una explicación prosaica, para respetar la poesía del texto y la ambigüedad textual.
  - Mantuve el registro moderno y reverente sin recurrir a formulaciones arcaizantes innecesarias.
