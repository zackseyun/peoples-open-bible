translation:
  language: es
  text: Porque consideramos que tu piedad por salvarnos de manera ilícita[a] es más dura que la muerte misma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedad por nuestra preservación ilícita» o «compasión orientada a salvarnos de manera ilícita».
    reason: lexical_alternative
lexical_decisions:
- source_word: χαλεπώτερον
  english_pob_choice: harsher
  chosen_spanish: más dura
  alternatives_spanish:
  - más severa
  - más gravosa
  - más cruel
  lexicon: LSJ
  rationale: El comparativo expresa mayor severidad o dureza. «Más dura» comunica bien la fuerza comparativa en español sin introducir una connotación excesivamente emocional o física que el contexto no exige.
- source_word: νομίζομεν
  english_pob_choice: we consider
  chosen_spanish: consideramos
  alternatives_spanish:
  - pensamos
  - estimamos
  - juzgamos
  lexicon: LSJ
  rationale: El verbo indica una valoración o juicio deliberado. «Consideramos» mantiene el matiz reflexivo y es natural en español contemporáneo.
- source_word: ἔλεον
  english_pob_choice: pity
  chosen_spanish: compasión
  alternatives_spanish:
  - piedad
  - misericordia
  - lástima
  lexicon: LSJ
  rationale: Aquí se trata de un sentimiento de indulgencia o de querer preservar la vida. «Compasión» conserva el tono humano y evita cargar el pasaje con el peso teológico de «misericordia», aunque esta sigue siendo una alternativa válida.
- source_word: παρανόμῳ
  english_pob_choice: unlawful
  chosen_spanish: ilícita
  alternatives_spanish:
  - ilegal
  - contraria a la ley
  - sin ley
  lexicon: LSJ
  rationale: El adjetivo significa contrario a la ley. «Ilícita» es breve, clara y adecuada en español para una acción fuera de la ley, sin perder el valor normativo del término.
- source_word: σωτηρίᾳ
  english_pob_choice: deliverance
  chosen_spanish: liberación
  alternatives_spanish:
  - salvación
  - preservación
  - escape
  lexicon: LSJ
  rationale: El contexto habla de ser librados de la muerte mediante un compromiso ilegal, no de salvación en sentido doctrinal. «Liberación» preserva la idea de rescate físico o salida de peligro.
- source_word: ἐπὶ τῇ παρανόμῳ σωτηρίᾳ ἡμῶν
  english_pob_choice: for our unlawful deliverance
  chosen_spanish: por nuestra liberación ilícita
  alternatives_spanish:
  - a favor de nuestra liberación ilícita
  - con miras a nuestra liberación ilícita
  - para nuestra liberación ilícita
  lexicon: LSJ
  rationale: 'La frase preposicional modifica la compasión/piedad: una compasión orientada a rescatarlos por medios prohibidos. «Por nuestra liberación ilícita» conserva la relación sintáctica y el carácter moralmente problemático del rescate.'
theological_decisions:
- issue: Sentido de σωτηρία en un contexto no doctrinal
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - preservación
  rationale: El pasaje se refiere a ser salvados físicamente de la muerte mediante una concesión ilegal. En español, «liberación» evita leer aquí una salvación religiosa o soteriológica que el texto no está afirmando.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de ἔλεος como sentimiento hacia una acción ilícita
  english_pob_reading: pity
  chosen_spanish_reading: compasión
  alternative_spanish_readings:
  - misericordia
  - piedad
  rationale: La intención es describir la benevolencia del tirano hacia los mártires, pero en un marco de compromiso con la ley. «Compasión» conserva la dimensión afectiva sin convertirla automáticamente en una virtud teológica.
  doctrine_reference: LSJ lexical range; POB consistency on context-sensitive mercy language
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran acuerdo alto y sin revisiones pendientes; no se detectan cambios textuales ni necesidad de ajustar la lectura base.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico sin arcaísmos innecesarios.
  - «Yahvé», «Mesías» y otras terminologías del proyecto no aplican aquí; no se introducen equivalentes doctrinales ajenos al contexto.
  - La puntuación conserva la estructura causal del griego con «Porque», y la nota al pie queda anclada en «liberación ilícita» para reflejar las alternativas léxicas documentadas.
