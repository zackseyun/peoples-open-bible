translation:
  language: es
  text: Así que guarden[a] todo el mandamiento que hoy les estoy mandando, para que se fortalezcan[b], entren y posean[c] la tierra a la que van a cruzar para poseerla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo el mandamiento»; el singular funciona colectivamente, con el sentido del conjunto completo de mandamientos.'
    reason: lexical_alternative
  - marker: b
    text: O «sean fortalecidos». El verbo hebreo puede denotar volverse fuertes o ser fortalecidos en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «hereden» / «tomen posesión de» para «posean» en ambas ocurrencias del verbo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: So keep
  chosen_spanish: Así que guarden
  alternatives_spanish:
  - Y guarden
  - Por tanto, guarden
  - Observen
  lexicon: HALOT
  rationale: שׁמר en contextos de pacto y obediencia legal significa guardar/observar. «Guardar» es natural en español bíblico y conserva la idea de custodiar fielmente los mandamientos. «Así que» refleja la continuidad inferencial del waw inicial sin volver la frase pesada.
- source_word: כָּל הַמִּצְוָה
  english_pob_choice: every commandment
  chosen_spanish: todo el mandamiento
  alternatives_spanish:
  - cada mandamiento
  - toda la ley
  - el conjunto de mandamientos
  lexicon: HALOT
  rationale: 'El hebreo usa el singular colectivo con כָּל. «Todo el mandamiento» preserva esa tensión: singular en la forma, total en el alcance. Evita diluir el sustantivo singular en una paráfrasis más explícita de lo que permite el texto.'
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que hoy les estoy mandando
  alternatives_spanish:
  - que hoy les mando
  - que hoy les ordeno
  - que hoy les estoy ordenando
  lexicon: HALOT
  rationale: El participio expresa acción en curso; «les estoy mandando» reproduce bien esa fuerza presente. Se usa «les» por el destinatario corporativo de Israel, coherente con el plural verbal, aunque el sufijo hebreo sea singular en la forma.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  - de modo que
  lexicon: HALOT
  rationale: Marcador de propósito/resultdo. «Para que» es claro, natural y mantiene la relación causal-final sin añadir interpretación.
- source_word: תֶּחֶזְקוּ
  english_pob_choice: you may be strong
  chosen_spanish: se fortalezcan
  alternatives_spanish:
  - sean fuertes
  - se hagan fuertes
  - cobren fuerzas
  lexicon: HALOT
  rationale: La raíz חזק puede referirse a volverse fuerte o ser fortalecido. «Se fortalezcan» permite esa ambigüedad productiva en español y evita restringir indebidamente el sentido a fuerza meramente física o militar.
- source_word: וּבָאתֶם
  english_pob_choice: and go in
  chosen_spanish: entren
  alternatives_spanish:
  - y entren
  - y vayan adentro
  - y lleguen
  lexicon: HALOT
  rationale: בוא en el contexto de entrada a la tierra se rinde naturalmente como «entrar». «Entren» funciona bien con el movimiento hacia la tierra y prepara el paralelismo con el verbo siguiente.
- source_word: וִירִשְׁתֶּם
  english_pob_choice: and possess
  chosen_spanish: posean
  alternatives_spanish:
  - tomen posesión
  - hereden
  - posean como herencia
  lexicon: HALOT
  rationale: ירשׁ puede significar heredar o tomar posesión, pero aquí la secuencia con la entrada a la tierra enfatiza la apropiación efectiva. «Posean» conserva la brevedad del hebreo y el paralelo con el infinitivo final.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  - la región
  lexicon: HALOT
  rationale: Aunque «la tierra» puede sonar más general que «la tierra prometida», aquí mantiene el término covenantal-geográfico sin añadir un calificativo no presente en el versículo. En español bíblico es una opción muy transparente y fiel.
- source_word: אֲשֶׁר אַתֶּם עֹבְרִים שָׁמָּה
  english_pob_choice: that you are crossing over to possess
  chosen_spanish: que ustedes cruzan
  alternatives_spanish:
  - a la cual ustedes cruzan
  - que ustedes están cruzando allá
  - por donde ustedes pasan
  lexicon: HALOT
  rationale: עֹבְרִים con dirección espacial aquí alude al cruce hacia la tierra. «Cruzan» conserva el verbo de paso/cruce; el adverbio «allá/ahí» se omite por fluidez en español, ya que la referencia direccional queda suficientemente clara en el contexto.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para tomar posesión de ella
  - para heredarlа
  - para conquistarla
  lexicon: HALOT
  rationale: El infinitivo de ירשׁ retoma el verbo anterior y marca la finalidad. «Poseerla» conserva la repetición léxica y el objeto explícito femenino concordante con «la tierra». «Conquistarla» introduciría una connotación más fuerte de la que exige el verbo.
theological_decisions:
- issue: Mandato colectivo con forma singular en «todo el mandamiento»
  english_pob_reading: The singular 'commandment' functions collectively, meaning the full body of commands.
  chosen_spanish_reading: «Todo el mandamiento» mantiene la forma singular colectiva y comunica la totalidad del deber sin convertirlo en una paráfrasis expansiva.
  alternative_spanish_readings:
  - «cada mandamiento»
  - «el conjunto de mandamientos»
  - «toda la ley»
  rationale: El texto hebreo presenta singularidad formal con alcance total. En español conviene conservar esa tensión para no perder el efecto retórico y jurídico del original.
  doctrine_reference: Principios de fidelidad formal y semántica; § sobre singular colectivo
- issue: Fortaleza como resultado de la obediencia
  english_pob_reading: so that you may be strong / be strengthened
  chosen_spanish_reading: «para que se fortalezcan» deja abierta la lectura de fortalecimiento recibido o de fortalecerse en la práctica obediente.
  alternative_spanish_readings:
  - «para que sean fuertes»
  - «para que reciban fuerzas»
  - «para que prevalezcan»
  rationale: La raíz חזק admite más de una matización. La traducción debe preservar esa amplitud sin forzar una lectura exclusivamente militar o interior.
  doctrine_reference: Lexema חזק en contexto exhortativo; nota léxica b de POB
- issue: Entrada y posesión de la tierra como dos fases distintas
  english_pob_reading: go in and possess the land
  chosen_spanish_reading: «entren y posean la tierra» distingue claramente el movimiento de entrada del acto de posesión.
  alternative_spanish_readings:
  - «entren y tomen posesión de la tierra»
  - «vayan y hereden la tierra»
  rationale: 'El hebreo coordina dos verbos distintos. Mantenerlos separados ayuda a ver la progresión: cruzar, entrar, poseer. «Poseer» conserva además el vínculo léxico con el infinitivo final.'
  doctrine_reference: Uso aspectual y lexical de בוא / ירשׁ
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB inglés, que eliminó el «there» final por ser innecesario en inglés. En español no se requiere un equivalente explícito aquí; se preserva la relación direccional mediante «cruzan» y el infinitivo final «poseerla», sin añadir un adverbio espacial artificial. También se conserva la separación entre entrar y poseer, conforme a la revisión y al paralelo verbal del hebreo.
  spanish_consistency_notes:
  - Se usa «mandamiento» en singular colectivo, coherente con la terminología POB y con el hebreo.
  - Se prefiere «poseer»/«posean» para ירשׁ, manteniendo el registro jurídico-covenantal más que una mera noción de «tener».
  - «La tierra» se mantiene sin añadir «prometida» porque el versículo no lo dice explícitamente.
  - «Se fortalezcan» deja abierta la nota de posibilidad de ser fortalecidos, evitando cerrar la ambigüedad de חזק.
  - Se emplea «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
