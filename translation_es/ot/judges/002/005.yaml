translation:
  language: es
  text: Así que llamaron a aquel lugar Boquim[a], y allí sacrificaron a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Boquim suena al hebreo para «los que lloran» o «lloradores».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - dieron el nombre de
  - nombraron
  lexicon: HALOT
  rationale: El hebreo usa קרא con שֵׁם en una construcción idiomática de poner nombre. En español, «llamaron» conserva bien esa estructura sin sobrecargarla.
- source_word: שֵׁם
  english_pob_choice: the name
  chosen_spanish: al nombre
  alternatives_spanish:
  - el nombre
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «llamaron nombre de...». En español, «llamaron al nombre de» reproduce esa textura sin sonar extraña.
- source_word: הַמָּקוֹם הַהוּא
  english_pob_choice: that place
  chosen_spanish: aquel lugar
  alternatives_spanish:
  - ese lugar
  - el lugar aquel
  lexicon: HALOT
  rationale: El demostrativo הַהוּא señala una ubicación ya identificada; «aquel» conserva la distancia referencial del hebreo de forma natural en español.
- source_word: בֹּכִים
  english_pob_choice: Bochim
  chosen_spanish: Boquim
  alternatives_spanish:
  - Bojim
  - Weepers
  lexicon: HALOT
  rationale: Como nombre propio de lugar, se translitera con adaptación ortográfica española a «Boquim». El sentido asociado a llanto se preserva en la nota, siguiendo la decisión auditada de tratarlo como topónimo.
- source_word: וַיִּזְבְּחוּ
  english_pob_choice: they sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - ofrecieron sacrificios
  lexicon: HALOT
  rationale: זבח expresa el acto de sacrificar. «Sacrificaron» es conciso y fiel; evita expandir el verbo más allá de lo que el hebreo exige.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» conforme al estándar del proyecto en español, evitando el sustituto reverencial «Señor» que ocultaría el Tetragrámaton.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El versículo contiene יהוה directamente. En español, el equivalente de proyecto es «Yahvé», que preserva el nombre pactal en vez de enmascararlo con un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento de בֹּכִים como nombre de lugar
  english_pob_reading: Bochim
  chosen_spanish_reading: Boquim
  alternative_spanish_readings:
  - los que lloran
  - Lloradores
  rationale: La forma funciona como topónimo, por lo que se traslada como nombre propio. El valor lexical relacionado con el llanto se deja para la nota, sin convertirlo en traducción principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2: Translate titles; transliterate names'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto hebreo y con la auditoría inglesa: se conserva la construcción nominal, se translitera el topónimo con nota lexical, y se traduce el nombre divino conforme al estándar español del proyecto.'
  spanish_consistency_notes:
  - Se evitó «Señor» para YHWH, en coherencia con el estándar español del proyecto.
  - «Boquim» mantiene la función de nombre propio y deja el sentido etimológico en nota.
  - El orden y la puntuación siguen una prosa bíblica moderna y clara, sin añadir elementos inexistentes en el hebreo.
