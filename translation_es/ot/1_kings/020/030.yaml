translation:
  language: es
  text: Los sobrevivientes huyeron a Afec, a la ciudad, y la muralla cayó sobre veintisiete mil de los hombres que quedaron. Ben-adad también huyó y entró en la ciudad, en un aposento interior[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un cuarto dentro de un cuarto», un modismo para una cámara interior o la parte más recóndita de la casa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנּוֹתָרִים
  english_pob_choice: the survivors / the remaining
  chosen_spanish: los sobrevivientes / los que quedaron
  alternatives_spanish:
  - los que permanecieron
  - el remanente
  lexicon: HALOT
  rationale: El término procede de יתר/נותר y aquí designa a los que quedaron vivos tras la batalla. En la primera aparición, «sobrevivientes» comunica con naturalidad el valor contextual; en la segunda, «los que quedaron» evita una repetición pesada y conserva la idea de quienes aún estaban presentes.
- source_word: אֲפֵקָה
  english_pob_choice: to Aphek
  chosen_spanish: a Afec
  alternatives_spanish:
  - a Aphec
  - hacia Afec
  lexicon: topónimo bíblico
  rationale: La he hebrea marca movimiento hacia el lugar; en español se conserva el nombre propio con transliteración sobria. «Afec» es la forma más breve y legible para una traducción bíblica en español.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - esa ciudad
  - la urbe
  lexicon: HALOT
  rationale: 'Se mantiene el sustantivo definido para preservar la progresión narrativa: primero entran en la ciudad, luego Ben-adad entra en la ciudad.'
- source_word: וַתִּפֹּל הַחוֹמָה
  english_pob_choice: the wall fell
  chosen_spanish: el muro cayó
  alternatives_spanish:
  - la muralla cayó
  - el muro se derrumbó
  lexicon: HALOT
  rationale: Aunque el hebreo usa el artículo, en español «el muro» suena natural y no fuerza una especificación innecesaria. «Cayó» mantiene la sencillez del hebreo y la acción súbita del juicio narrado.
- source_word: עֶשְׂרִים וְשִׁבְעָה אֶלֶף אִישׁ
  english_pob_choice: twenty-seven thousand ... men
  chosen_spanish: veintisiete mil de los hombres
  alternatives_spanish:
  - veintisiete mil hombres
  - veintisiete mil personas
  lexicon: HALOT
  rationale: La cifra se expresa de modo idiomático en español. «Hombres» conserva el matiz militar de אִישׁ en este contexto, y la preposición «de» ayuda a reproducir la relación cuantitativa del hebreo sin sonar rígida.
- source_word: וּבֶן הֲדַד
  english_pob_choice: Ben-hadad also
  chosen_spanish: Ben-adad también
  alternatives_spanish:
  - y Ben-adad
  - Ben-hadad asimismo
  lexicon: nombre propio bíblico
  rationale: Se translitera el nombre en una forma fluida para español. «También» refleja la coordinación aditiva del relato, señalando que Ben-adad comparte la acción de huir.
- source_word: נָס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - fue puesto en fuga
  lexicon: HALOT
  rationale: Se conserva el mismo campo semántico que al inicio del versículo. «Huyó» es natural en español y mantiene la urgencia del verbo hebreo.
- source_word: חֶדֶר בְּחָדֶר
  english_pob_choice: into an inner room
  chosen_spanish: en un aposento interior
  alternatives_spanish:
  - en una habitación interior
  - en un cuarto dentro de otro cuarto
  lexicon: HALOT
  rationale: El hebreo es literalmente «un cuarto dentro de un cuarto», un giro idiomático para un espacio interior o recóndito. «Aposento interior» comunica bien la idea de un refugio más interno sin volverse demasiado técnico o arcaizante.
theological_decisions:
- issue: El grado de literalidad del idiomático חֶדֶר בְּחָדֶר
  english_pob_reading: 'Hebrew: ''a room within a room,'' an idiom for an inner or innermost chamber.'
  chosen_spanish_reading: «Aposento interior», con nota que explica literalmente «un cuarto dentro de otro cuarto».
  alternative_spanish_readings:
  - «cámara interior»
  - «cuarto dentro de un cuarto»
  rationale: No hay tensión doctrinal, pero sí una tensión de registro y claridad. La frase española principal debe ser natural; la nota preserva la imagen hebrea y evita perder el carácter idiomático del original.
  doctrine_reference: N/A
- issue: Representación del nombre divino no pertinente en este versículo
  english_pob_reading: No divine-name issue in the verse
  chosen_spanish_reading: No se introduce ningún equivalente teológico adicional.
  alternative_spanish_readings:
  - N/A
  rationale: El versículo no contiene el tetragrámaton ni un título divino que requiera decisión terminológica especial. Se evita introducir lenguaje eclesiástico ajeno al texto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El cotejo de revisión indica alta concordancia y sin cambios sustantivos; por eso la versión española sigue de cerca el texto hebreo y la solución auditada en inglés, con solo ajustes de naturalidad en español.
  spanish_consistency_notes:
  - Se mantuvo «huyó» para conservar el enlace verbal entre la fuga de los sobrevivientes y la de Ben-adad.
  - Se usó «Afec» como transliteración uniforme del topónimo.
  - «Los hombres que quedaron» refleja el segundo הַנּוֹתָרִים sin repetir mecánicamente «sobrevivientes».
  - «Aposento interior» evita arcaísmos fuertes pero conserva la idea de interioridad creciente marcada por el hebreo.
