id: 1PE.1.2
reference: 1 Peter 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κατὰ πρόγνωσιν θεοῦ πατρός, ἐν ἁγιασμῷ πνεύματος, εἰς ὑπακοὴν καὶ ῥαντισμὸν αἵματος Ἰησοῦ Χριστοῦ· χάρις ὑμῖν καὶ εἰρήνη πληθυνθείη.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/002.yaml
  text: 'according to the foreknowledge of God the Father, in the sanctification of the Spirit, for obedience and sprinkling with the blood of Jesus Messiah: Grace to you and peace be multiplied.'
translation:
  language: ko
  text: '곧 아버지 하나님의 미리 아심을 따라, 성령의 거룩하게 하심으로[a], 순종함과 메시아 예수의 피 뿌림을 위하여 택하심을 받은 자들입니다. 은혜와 평강이 여러분에게 더욱 풍성하기를 빕니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「피 뿌림」은 출애굽기 24:8 등 구약 언약 체결과 정결 의식의 심상을 환기한다.
    reason: cross_reference
lexical_decisions:
- source_word: κατὰ πρόγνωσιν
  english_pob_choice: according to the foreknowledge
  chosen_korean: 미리 아심을 따라
  alternatives_korean:
  - 예지를 따라
  - 미리 정하심을 따라
  lexicon: BDAG
  rationale: πρόγνωσις의 본의(미리 앎)를 보존하되 한국어로 자연스럽게 풀고, 특정 교리(예정)를 본문에 박지 않는다.
- source_word: θεοῦ πατρός
  english_pob_choice: of God the Father
  chosen_korean: 아버지 하나님의
  alternatives_korean:
  - 하나님 아버지의
  lexicon: BDAG
  rationale: 한국어 관용으로 「아버지 하나님」 또는 「하나님 아버지」 둘 다 가능하나, 본문에서는 πατρός가 동위격적으로 θεοῦ를 한정하므로 「아버지 하나님」으로 옮긴다.
- source_word: ἐν ἁγιασμῷ πνεύματος
  english_pob_choice: in the sanctification of the Spirit
  chosen_korean: 성령의 거룩하게 하심으로
  alternatives_korean:
  - 성령으로 거룩하게 되심 가운데
  - 성령의 성화로
  lexicon: BDAG
  rationale: 삼위 구조 안에서 πνεύματος는 성령을 가리키며, ἁγιασμός의 행위적 의미(거룩하게 만드는 일)를 「거룩하게 하심」으로 보존한다.
- source_word: εἰς ὑπακοὴν
  english_pob_choice: for obedience
  chosen_korean: 순종함을 위하여
  alternatives_korean:
  - 순종에 이르도록
  lexicon: BDAG
  rationale: εἰς의 목적·결과 의미를 「위하여」로 살리고, 피 뿌림과 병치되는 구조를 그대로 보존한다.
- source_word: ῥαντισμὸν αἵματος
  english_pob_choice: sprinkling with the blood
  chosen_korean: 피 뿌림
  alternatives_korean:
  - 피의 뿌려짐
  lexicon: BDAG
  rationale: 출 24:8의 언약 의식을 환기하는 표현으로, 「피 뿌림」이 한국 성서 전통에서 가장 분명한 등가어다.
- source_word: πληθυνθείη
  english_pob_choice: be multiplied
  chosen_korean: 더욱 풍성하기를 빕니다
  alternatives_korean:
  - 풍성하시기를
  - 더하시기를
  lexicon: BDAG
  rationale: 기원형(optative) 축복 표현을 합쇼체 기도문 어조로 옮긴다.
theological_decisions:
- issue: πρόγνωσις의 교리적 폭
  chosen_reading: 미리 아심
  alternative_readings:
  - 예정
  - 미리 정하심
  rationale: 「미리 아심」은 본문의 어휘에 충실하면서 예정 교리 논쟁을 본문에 박지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장 보존'
- issue: πνεύματος의 지시 대상
  chosen_reading: 성령
  alternative_readings:
  - 영
  rationale: 아버지-성령-메시아 예수의 삼위 구조 안에서 πνεῦμα는 성령을 가리키므로 「성령」으로 명시한다.
  doctrine_reference: 'DOCTRINE.md: Affirmations'
