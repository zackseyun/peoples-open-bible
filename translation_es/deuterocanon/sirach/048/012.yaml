revisions:
- from: Elías, que fue escondido en el almacén[a], y Eliseo fue lleno de su espíritu. Dos veces más señales[b], y muchas maravillas, salieron de su boca.
  to: Elías fue escondido en el depósito[a], y Eliseo fue lleno de su espíritu. El doble de señales[b], y muchas maravillas, salieron de su boca.
  rationale: Se corrigió la apertura para ajustarla más estrechamente al hebreo y mejorar la naturalidad del español. Se cambió «almacén» por «depósito», que preserva mejor el matiz de אוצר sin sonar demasiado cotidiano. Se reemplazó «Dos veces más señales» por «El doble de señales», una formulación más idiomática y fiel a la elipsis cuantitativa de פי שנים. Se conservaron la variante griega en nota y la referencia a «su espíritu» como el espíritu de Elías.
