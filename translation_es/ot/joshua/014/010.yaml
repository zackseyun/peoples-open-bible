  - severity: low
    issue: '''Mira'' suena más coloquial de lo deseable para הִנֵּה'
    rationale: Aunque no es incorrecto, el objetivo estilístico pide español moderno pero digno. 'He aquí' o 'miren' según contexto conservan mejor el matiz enfático sin bajar el registro. Aquí 'he aquí' funciona bien y sigue siendo inteligible.
