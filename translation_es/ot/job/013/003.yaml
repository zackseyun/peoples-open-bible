translation:
  language: es
  text: Pero yo hablaría al Todopoderoso[a], y deseo argumentar con Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "razonar con Dios" o "presentar mi caso ante Dios". El verbo hebreo tiene un matiz forense de argumentar, probar o disputar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Mas
  lexicon: HALOT
  rationale: Marca el contraste fuerte con el reproche anterior; 'Pero' es natural en español moderno y conserva el valor adversativo.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: El pronombre explícito mantiene el énfasis del hebreo, aunque en español puede omitirase; aquí se conserva por fuerza enfática y ritmo.
- source_word: אֶל שַׁדַּי
  english_pob_choice: to the Almighty
  chosen_spanish: al Todopoderoso
  alternatives_spanish:
  - a Shaddai
  - al Omnipotente
  lexicon: HALOT
  rationale: Se traduce el título divino según el valor semántico, no por transliteración. 'Todopoderoso' es la equivalencia española usual y transparente.
- source_word: אֲדַבֵּר
  english_pob_choice: would speak
  chosen_spanish: hablaría
  alternatives_spanish:
  - hablaré
  - hablar
  lexicon: HALOT
  rationale: El imperfecto expresa intención o resolución, no simple futuro; 'hablaría' reproduce bien esa disposición volitiva en español.
- source_word: וְהוֹכֵחַ
  english_pob_choice: argue with God
  chosen_spanish: discutir
  alternatives_spanish:
  - razonar
  - presentar mi caso
  - contender
  lexicon: HALOT
  rationale: El verbo tiene matiz forense de argumentar, disputar o demostrar. 'Discutir' mantiene la idea de controversia formal, sin añadir 'mi caso' que no está explícito en el hebreo.
- source_word: אֶל אֵל
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - ante Dios
  - a Dios
  lexicon: HALOT
  rationale: En la segunda mitad del versículo el vínculo relacional y polémico se expresa naturalmente en español con 'con Dios', conservando el paralelo con la primera línea.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como nombre/título divino y el paralelo con שַׁדַּי señala claramente a Dios.
- source_word: אֶחְפָּץ
  english_pob_choice: I desire
  chosen_spanish: deseo
  alternatives_spanish:
  - quiero
  - me complazco en
  lexicon: HALOT
  rationale: Expresa volición y deseo decidido; 'deseo' es directo y conserva el tono solemne del hebreo.
theological_decisions:
- issue: Cómo traducir los dos títulos divinos distintos, שַׁדַּי y אֵל
  english_pob_reading: Translate as 'the Almighty' and 'God' rather than transliterating or harmonizing both as the same English term
  chosen_spanish_reading: Traducir como 'el Todopoderoso' y 'Dios', manteniendo la distinción entre ambos títulos
  alternative_spanish_readings:
  - Shaddai ... Dios
  - el Todopoderoso ... el Poderoso
  rationale: El hebreo usa dos designaciones diferentes en paralelo. La traducción española debe conservar esa variación estilística y semántica sin fundirlas innecesariamente.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres solo cuando corresponda.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al evitar cualquier adición como 'mi caso' en el cuerpo principal, pero se preservó la tensión forense del verbo en una nota alternativa. La opción española mantiene la distinción entre el tono de resolución ('hablaría') y el matiz jurídico de וְהוֹכֵחַ.
  spanish_consistency_notes:
  - Se usó 'Todopoderoso' para שַׁדַּי conforme al valor del título divino.
  - Se usó 'Dios' para אֵל en paralelo, sin transliterar.
  - '''Discutir'' se eligió por su capacidad de expresar controversia formal; la nota preserva alternativas más cercanas al campo forense.'
  - El registro es bíblico contemporáneo, claro y digno, sin arcaísmos innecesarios.
