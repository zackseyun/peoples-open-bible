lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón o explicación del lamento precedente. «Porque» conserva bien ese valor explicativo en español natural y bíblico-poético.
- source_word: אָכַל
  english_pob_choice: have devoured
  chosen_spanish: devoraron
  alternatives_spanish:
  - comieron
  - consumieron
  lexicon: HALOT
  rationale: En el contexto de agresión contra un pueblo, el verbo tiene fuerza de consumir con violencia. «Devoraron» mantiene la imagen vívida de la versión inglesa y evita aplanarla con «comieron».
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  - los descendientes de Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre poético del pacto tal como aparece en hebreo, sin interpretarlo como «Israel» ni expandirlo de manera explicativa.
- source_word: נָוֵהוּ
  english_pob_choice: his dwelling place
  chosen_spanish: su morada
  alternatives_spanish:
  - su habitación
  - su vivienda
  - su pasto
  lexicon: HALOT
  rationale: El sustantivo puede abarcar morada, habitación o pastizal según el contexto. «Su morada» es claro en español y mantiene el sentido locativo amplio sin restringirlo innecesariamente a un lugar específico.
- source_word: הֵשַׁמּוּ
  english_pob_choice: laid waste
  chosen_spanish: asolaron
  alternatives_spanish:
  - devastaron
  - dejaron desolada
  lexicon: HALOT
  rationale: El causativo expresa hacer desolado. «Asolaron» transmite bien la destrucción total en registro poético y evita una construcción más pesada.
theological_decisions:
- issue: Alcance de «su morada»
  english_pob_reading: Understood corporately of Jacob/Israel's habitation, not narrowly as the temple alone.
  chosen_spanish_reading: Se entiende de manera corporativa como la morada de Jacob/Israel, sin reducirla solo al templo.
  alternative_spanish_readings:
  - el templo específicamente
  - la tierra en general
  rationale: La referencia pronominal puede abarcar la habitación del pueblo en sentido amplio. La traducción mantiene esa amplitud para no cerrar una tensión interpretativa que el hebreo no resuelve aquí.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el análisis léxico del original hebreo y la opción inglesa auditada, manteniendo el paralelismo poético y la amplitud semántica de נָוֵהוּ sin especificar más de lo que el texto exige.
  spanish_consistency_notes:
  - Se usa «Jacob» de forma consistente como nombre poético del pueblo, siguiendo la decisión inglesa auditada.
  - «Morada» se eligió por su amplitud y buena inteligibilidad; no se sustituyó por «templo» para no interpretar en exceso.
  - «Asolaron» conserva el tono poético y el valor de destrucción causado por el verbo hebreo.
  - La nota al pie ofrece una alternativa cercana al inglés auditado y marca la otra posibilidad de lectura verbal.
