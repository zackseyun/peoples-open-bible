id: EST.6.2
reference: Esther 6:2
source:
  edition: WLC
  text: וַ/יִּמָּצֵ֣א כָת֗וּב אֲשֶׁר֩ הִגִּ֨יד מָרְדֳּכַ֜י עַל בִּגְתָ֣נָא וָ/תֶ֗רֶשׁ שְׁנֵי֙ סָרִיסֵ֣י הַ/מֶּ֔לֶךְ מִ/שֹּׁמְרֵ֖י הַ/סַּ֑ף אֲשֶׁ֤ר בִּקְשׁוּ֙ לִ/שְׁלֹ֣חַ יָ֔ד בַּ/מֶּ֖לֶךְ אֲחַשְׁוֵרֽוֹשׁ־׃
translation:
  text: And it was found written that Mordecai had reported concerning Bigthana and Teresh[a], two of the king’s eunuchs, among those who guarded the threshold[b], who had sought to lay a hand on King Ahasuerus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bigthana is rendered from the Hebrew form in this verse; elsewhere the name appears as Bigthan.
    reason: alternative_reading
  - marker: b
    text: Or 'two of the king’s court officials'; the Hebrew term can denote eunuchs specifically or royal officers more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּצֵא כָתוּב
  chosen: it was found written
  alternatives:
  - it was found recorded
  - it was found in writing
  lexicon: HALOT
  rationale: The passive construction plus participle naturally yields an impersonal English expression. 'Found written' preserves the formal sense that the matter was discovered in the written records.
- source_word: הִגִּיד
  chosen: had reported
  alternatives:
  - had told
  - had made known
  lexicon: HALOT
  rationale: In context of an official court record, 'reported' fits better than the more generic 'told' while remaining faithful to the verb 'made known/declared'.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  lexicon: HALOT
  rationale: Here the preposition introduces the subject matter of Mordecai's report. 'Concerning' is slightly more formal and suits the archival context. 'Against' is possible because the report implicated them, but the Hebrew more directly marks topic.
- source_word: בִּגְתָנָא וָתֶרֶשׁ
  chosen: Bigthana and Teresh
  alternatives:
  - Bigthan and Teresh
  lexicon: HALOT
  rationale: The WLC form here is בִּגְתָנָא, so 'Bigthana' follows the consonantal form of this verse. The alternate name form 'Bigthan' appears elsewhere and is worth preserving in a footnote because readers may notice the variation.
- source_word: שְׁנֵי סָרִיסֵי הַמֶּלֶךְ
  chosen: two of the king’s eunuchs
  alternatives:
  - two of the king’s officials
  - two of the king’s court officers
  lexicon: HALOT
  rationale: סָרִיס often denotes a eunuch, especially in royal court settings, though it can broaden to court official. Since the Persian court context supports the more concrete sense, 'eunuchs' is preferred; the broader alternative is preserved in a footnote.
- source_word: מִשֹּׁמְרֵי הַסַּף
  chosen: from those who guarded the threshold
  alternatives:
  - keepers of the door
  - guards of the entrance
  lexicon: HALOT
  rationale: The phrase identifies them as belonging to the group responsible for guarding the threshold/entrance. 'Threshold' is more literal for סַף, while 'from those who guarded' reflects the partitive מִן.
- source_word: בִּקְשׁוּ
  chosen: had sought
  alternatives:
  - had planned
  - had attempted
  lexicon: HALOT
  rationale: The verb means 'sought' or 'desired.' In conspiracy context it implies intent toward action; 'had sought' preserves the lexical form without over-interpreting success or mere planning.
- source_word: לִשְׁלֹחַ יָד
  chosen: to lay a hand on
  alternatives:
  - to attack
  - to strike
  lexicon: HALOT
  rationale: This idiom literally means 'to send/stretch out a hand' against someone, often with hostile intent. 'Lay a hand on' preserves the idiomatic force in natural English without flattening it to a single specific action.
- source_word: בַּמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  chosen: on King Ahasuerus
  alternatives:
  - against King Ahasuerus
  lexicon: HALOT
  rationale: With the preceding idiom, English normally says 'lay a hand on.' The object is therefore rendered smoothly as 'on King Ahasuerus,' while the hostile sense remains clear from the idiom.
