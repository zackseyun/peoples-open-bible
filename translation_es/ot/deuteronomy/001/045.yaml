translation:
  language: es
  text: Entonces ustedes volvieron y lloraron delante de Yahvé[a], pero Yahvé no escuchó su voz ni les prestó atención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘no oyó su voz ... ni les dio oído’. El hebreo usa dos verbos casi paralelos para oír/escuchar, subrayando que Yahvé no respondió a su ruego.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשֻׁבוּ
  english_pob_choice: Then you returned
  chosen_spanish: Entonces ustedes volvieron
  alternatives_spanish:
  - Entonces ustedes regresaron
  - Así volvieron ustedes
  lexicon: HALOT
  rationale: שׁוּב normalmente significa 'volver/regresar'. 'Volvieron' conserva el movimiento narrativo después del intento fallido, y 'Entonces' refleja la secuencia del waw consecutivo sin añadir interpretación.
- source_word: וַתִּבְכּוּ
  english_pob_choice: and wept
  chosen_spanish: y lloraron
  alternatives_spanish:
  - y se lamentaron
  - y lloraron amargamente
  lexicon: HALOT
  rationale: בכה significa 'llorar/llorar por'. 'Lloraron' es natural en español y mantiene el tono sobrio del hebreo sin intensificar la emoción más de lo que el texto indica.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי literalmente es 'delante de / en la presencia de'. 'Delante de Yahvé' es fiel y fluido en español, y conserva el marco relacional y cultual del pasaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El Tetragrámaton se translitera en español como 'Yahvé', preservando el nombre divino en lugar de sustituirlo por un título. Se mantiene la decisión doctrinal de no ocultar el nombre propio de Dios.
- source_word: שָׁמַע ... בְּקֹלְכֶם
  english_pob_choice: did not listen to your voice
  chosen_spanish: no escuchó su voz
  alternatives_spanish:
  - no oyó su voz
  - no prestó oído a su voz
  lexicon: HALOT
  rationale: שׁמע con בְּקוֹל puede implicar oír con atención o escuchar/hear heed. 'No escuchó su voz' preserva esa relación sin volver la frase demasiado literal o extraña en español.
- source_word: הֶאֱזִין אֲלֵיכֶם
  english_pob_choice: or pay attention to you
  chosen_spanish: ni les prestó atención
  alternatives_spanish:
  - ni les dio oído
  - ni los atendió
  lexicon: HALOT
  rationale: האזין añade la idea de 'dar oído, atender con atención'. 'Les prestó atención' mantiene la intensificación paralela con שׁמע y evita una repetición rígida en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino como transliteración reverente y auditable. En español de uso bíblico, 'Yahvé' es la forma que mejor refleja la política editorial de no sustituir el Tetragrámaton por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo masorético y el auditorio de revisión en inglés, sin cambios sustantivos respecto al sentido: la secuencia narrativa, el llanto delante de Yahvé y el doble rechazo auditivo se conservan en español con equivalencia óptima. No se detectaron variantes textuales que requirieran nota aparte.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para el Tetragrámaton.
  - Se evita 'escuchó/oyó' duplicado con un solo verbo en la primera cola y una nota que preserva el paralelo hebreo.
  - '''Delante de'' conserva el valor espacial-relacional de לִפְנֵי sin forzar un calco innecesario.'
