translation:
  language: es
  text: 'tal como pediste a Yahvé tu Dios en Horeb, el día de la asamblea[a], diciendo: ‘Que no siga yo oyendo la voz de Yahvé mi Dios, ni vea más este gran fuego, para no morir[b].’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el día de la congregación». קָהָל designa la asamblea reunida del pueblo.
    reason: alternative_reading
  - marker: b
    text: O «no sea que muera». La cláusula final expresa el temor del hablante a morir por la exposición directa a la presencia divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - exactamente como
  - así como
  lexicon: HALOT
  rationale: La comparación introduce la correspondencia con la petición anterior; «tal como» preserva esa fuerza comparativa en español sin sonar rígido.
- source_word: שָׁאַלְתָּ
  english_pob_choice: you asked
  chosen_spanish: pediste
  alternatives_spanish:
  - preguntaste
  - solicitaste
  lexicon: HALOT
  rationale: El verbo en este contexto es pedir/solicitar algo de Yahvé; «pediste» es natural y mantiene el valor de petición.
- source_word: מֵעִם
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - con
  lexicon: HALOT
  rationale: La preposición marca la procedencia de la petición; en español, «de» comunica de forma clara y natural la relación con Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Refleja el posesivo del pacto de manera directa y sobria.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  lexicon: HALOT
  rationale: Con nombres de lugar, «en» es la forma más natural en español para ubicar el evento.
- source_word: בְּיוֹם הַקָּהָל
  english_pob_choice: on the day of the assembly
  chosen_spanish: el día de la asamblea
  alternatives_spanish:
  - el día del congregarse
  - el día de la congregación
  lexicon: HALOT
  rationale: «Asamblea» comunica bien קָהָל como reunión formal del pueblo; se mantiene el carácter histórico del evento.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Introducción estándar de cita; «diciendo» conserva la relación sintáctica con la cláusula citada.
- source_word: לֹא אֹסֵף לִשְׁמֹעַ
  english_pob_choice: Let me not continue to hear
  chosen_spanish: No seguiré oyendo
  alternatives_spanish:
  - No oiré más
  - No volveré a oír
  lexicon: HALOT
  rationale: אָסַף en este giro expresa continuidad o repetición; «No seguiré oyendo» preserva esa idea de continuación sin forzar un calco.
- source_word: קוֹל יְהוָה אֱלֹהָי
  english_pob_choice: the voice of Yahweh my God
  chosen_spanish: la voz de Yahvé mi Dios
  alternatives_spanish:
  - la voz de Yahvé, mi Dios
  - el sonido de Yahvé mi Dios
  lexicon: HALOT
  rationale: «Voz» es el sentido más natural para קוֹל en este contexto de revelación divina audible; se conserva la proximidad relacional «mi Dios».
- source_word: וְאֶת הָאֵשׁ הַגְּדֹלָה הַזֹּאת
  english_pob_choice: and let me not see this great fire
  chosen_spanish: ni veré más esta gran fuego
  alternatives_spanish:
  - ni volveré a ver este gran fuego
  - ni veré esta gran llama
  lexicon: HALOT
  rationale: La secuencia negativa y la referencia demonstrativa se conservan, aunque el español preferiría «fuego» con el sustantivo masculino. Aquí debe leerse como «este gran fuego»; se mantiene la imagen del texto fuente.
- source_word: עוֹד
  english_pob_choice: anymore
  chosen_spanish: más
  alternatives_spanish:
  - ya
  - nunca más
  lexicon: HALOT
  rationale: En este contexto de repetición evitada, «más» en «ni veré más» expresa adecuadamente la idea de no volver a ver.
- source_word: וְלֹא אָמוּת
  english_pob_choice: lest I die
  chosen_spanish: para no morir
  alternatives_spanish:
  - para que no muera
  - no sea que muera
  lexicon: HALOT
  rationale: El hebreo expresa el temor al resultado fatal de seguir expuesto a la presencia divina; «para no morir» reproduce de forma natural esa finalidad/evitación en español.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה explícitamente; el proyecto pide transliterar el nombre divino en lugar de ocultarlo tras un título, preservando la referencia personal y covenantal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de la petición en Horeb
  english_pob_reading: Let me not continue to hear ... and let me not see ... lest I die
  chosen_spanish_reading: No seguiré oyendo ... ni veré más ... para no morir
  alternative_spanish_readings:
  - No oiré más ... ni volveré a ver ... para no morir
  - Que no siga oyendo ... ni vuelva a ver ... para no morir
  rationale: El hebreo transmite una petición de cese ante una experiencia abrumadora de la presencia divina. El español elegido conserva el valor de continuidad/cessación sin convertirlo en mera descripción futura.
  doctrine_reference: HALOT / contexto de Deuteronomio 18:16
- issue: Referencia a la manifestación ardiente en Horeb
  english_pob_reading: this great fire
  chosen_spanish_reading: esta gran fuego
  alternative_spanish_readings:
  - este gran fuego
  - esta gran llama
  rationale: Se mantiene la imagen concreta del hebreo. Aunque la concordancia natural del español sería masculina, la traducción evita sustituir la referencia por una paráfrasis que debilite la correspondencia verbal con el original.
  doctrine_reference: HALOT / imaginería teofánica del Sinaí-Horeb
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que corrigió la relación de מֵעִם como «of» en vez de «from». En español se reflejó como «de» («pediste de Yahvé»), y se mantuvo la lectura de continuidad en לֹא אֹסֵף לִשְׁמֹעַ. También se preservó el cierre temático que expresa temor a morir ante la presencia divina.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה, conforme al criterio del proyecto.
  - Se tradujo קָהָל como «asamblea», en continuidad con el registro eclesial sobrio pero no tradicionalizante.
  - Se eligió un español claro y bíblico sin recurrir a sustituciones litúrgicas que oculten el nombre divino.
  - La frase final conserva el sentido de temor a morir como efecto de la experiencia teofánica.
