translation:
  language: es
  text: 'Pero el rey dijo[a]: «Ciertamente morirás, Ahimelec[b], tú y toda la casa de tu padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Morirás ciertamente» / «Debes morir». El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la sentencia.'
    reason: lexical_alternative
  - marker: b
    text: «La casa de tu padre» se refiere al hogar paterno o a la línea familiar de Ahimelec.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se rinde de forma natural en español con 'dijo', que conserva el avance narrativo sin añadir matices no presentes en el hebreo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El artículo definido identifica al hablante; 'rey' es la forma normal y fiel en español.
- source_word: מ֥וֹת תָּמ֖וּת
  english_pob_choice: You shall surely die
  chosen_spanish: Ciertamente morirás
  alternatives_spanish:
  - Morirás ciertamente
  - Sin duda morirás
  - Debes morir
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito expresa énfasis fuerte. 'Ciertamente morirás' conserva la fuerza judicial y la certeza sin sonar forzado en español. Se evita 'debes morir' porque introduce obligación más que certeza de sentencia.
- source_word: אֲחִימֶלֶךְ
  english_pob_choice: Ahimelech
  chosen_spanish: Ahimelec
  alternatives_spanish:
  - Ahimelec
  lexicon: onoma transliteration policy
  rationale: Se translitera el nombre propio con la forma española habitual de transliteración bíblica, manteniendo la identificación del personaje.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - vosotros
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis; se conserva con 'tú' después del nombre para reflejar la aposición enfática del hebreo.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y toda
  alternatives_spanish:
  - y toda la
  - y toda la casa
  lexicon: HALOT
  rationale: '''וְכָל'' introduce la extensión de la sentencia; ''y toda'' permite unir naturalmente con ''casa'' y evitar una repetición pesada en español.'
- source_word: בֵּית אָבִיךָ
  english_pob_choice: your father's house
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - tu casa paterna
  - tu familia paterna
  - tu linaje paterno
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático hebreo en una forma clara y natural en español. 'Casa de tu padre' conserva el valor de casa/linaje familiar sin desplazarlo a un solo equivalente interpretativo.
translation_notes:
  revision_awareness: El texto inglés revisado sustituyó el guion por una coma para una puntuación más natural, manteniendo la intensidad de 'You shall surely die'. La versión española sigue esa decisión con una coma antes de la aposición y conserva la fuerza del hebreo mediante 'Ciertamente morirás'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva el orden narrativo simple del hebreo sin añadir conectores interpretativos extra.
  - La elección de 'Ahimelec' sigue la transliteración bíblica usual en español, coherente con el estándar del proyecto para nombres propios.
