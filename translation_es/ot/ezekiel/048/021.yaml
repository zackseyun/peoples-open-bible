    text: 'Hebreo: «veinticinco mil»; la unidad de medida se entiende por el contexto de las medidas de tierra en Ezequiel.'
    reason: cultural_note
  revision_rationale: Se corrige una literalidad poco clara ('santuario de la casa' → 'santuario del templo'), se fortalece la precisión espacial ('en correspondencia con' → 'paralelo a'), y se reubica la nota al pie al elemento que realmente explica, sin alterar el sentido general bien preservado del borrador.
