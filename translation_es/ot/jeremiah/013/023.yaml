translation:
  language: es
  text: ¿Puede un cushita[a] cambiar su piel, o un leopardo sus manchas? Entonces también ustedes podrán hacer el bien, ustedes que están entrenados en el mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "etíope". El hebreo dice "cushita", es decir, una persona de Cush.'
    reason: lexical_alternative
  - marker: b
    text: Lit. "enseñados/aprendidos en el mal"; es decir, habituados o formados en el mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוּשִׁי
  english_pob_choice: Cushite
  chosen_spanish: cushita
  alternatives_spanish:
  - etíope
  lexicon: HALOT
  rationale: Se conserva el etnónimo directo del hebreo para reflejar la precisión del texto fuente. "Etíope" sigue siendo una alternativa posible en español, pero puede introducir una identificación geográfica posterior que el hebreo no explicita.
- source_word: הֲיַהֲפֹךְ
  english_pob_choice: Can ... change
  chosen_spanish: ¿Puede ... cambiar?
  alternatives_spanish:
  - ¿Puede ... volverse diferente?
  - ¿Puede ... trastornar?
  lexicon: HALOT
  rationale: '"Cambiar" comunica en español la alteración de una condición natural en esta pregunta retórica, sin forzar un calco innecesario.'
- source_word: עוֹרוֹ
  english_pob_choice: his skin
  chosen_spanish: su piel
  alternatives_spanish:
  - su piel
  - su cuero
  lexicon: HALOT
  rationale: En español, "piel" es el equivalente natural y claro para el cuerpo humano en este paralelo; "cuero" sonaría menos adecuado aquí.
- source_word: נָמֵר
  english_pob_choice: leopard
  chosen_spanish: leopardo
  alternatives_spanish:
  - pantera
  lexicon: HALOT
  rationale: Equivalente léxico estándar y transparente en español.
- source_word: חֲבַרְבֻּרֹתָיו
  english_pob_choice: its spots
  chosen_spanish: sus manchas
  alternatives_spanish:
  - sus motas
  - sus marcas
  lexicon: HALOT
  rationale: '"Manchas" es el equivalente más idiomático y preciso para las marcas características del leopardo.'
- source_word: גַּם אַתֶּם תּוּכְלוּ
  english_pob_choice: Then you also can
  chosen_spanish: Entonces también ustedes podrán
  alternatives_spanish:
  - Así también ustedes podrán
  - Y ustedes también podrán
  lexicon: HALOT
  rationale: '"Entonces también" conserva el enlace inferencial e irónico del hebreo, manteniendo la fuerza del razonamiento: sólo si lo imposible fuera posible, ustedes podrían hacer el bien.'
- source_word: לְהֵיטִיב
  english_pob_choice: do good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - actuar bien
  - hacer lo bueno
  lexicon: HALOT
  rationale: '"Hacer el bien" es natural en español y reproduce de forma fiel y breve el sentido moral del infinitivo.'
- source_word: לִמֻּדֵי הָרֵעַ
  english_pob_choice: trained in evil
  chosen_spanish: entrenados en el mal
  alternatives_spanish:
  - acostumbrados al mal
  - instruidos en el mal
  - aprendidos en el mal
  lexicon: HALOT
  rationale: La idea es de habituación/condicionamiento moral. "Entrenados" conserva el matiz de formación repetida que la POB inglesa quiso resaltar, y "en el mal" mantiene la concisión y el paralelismo del hebreo.
theological_decisions:
- issue: Incapacidad moral expresada por analogía retórica
  english_pob_reading: The verse states Judah's entrenched habituation to evil by means of an analogy of impossibility, without making a broader systematic-theology claim beyond the immediate context.
  chosen_spanish_reading: El verso expresa la habituación arraigada de Judá al mal mediante una comparación de imposibilidad, sin convertirla en una formulación doctrinal más amplia que el contexto inmediato no exige.
  alternative_spanish_readings:
  - Una afirmación universal sobre la incapacidad humana en todo sentido
  - Una simple hipérbole sin afirmación real de incapacidad moral
  rationale: El hebreo compara cambiar una condición natural fija con cambiar una práctica moral ya arraigada. La traducción conserva esa tensión sin resolverla en una doctrina sistemática que el verso no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica del texto sin ampliarla ni suavizarla.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al preferir una formulación breve y formal para לִמֻּדֵי הָרֵעַ, equivalente a "trained in evil" más que "trained in doing evil". También conserva el paralelismo retórico completo del versículo y la alternativa etnónima documentada para כּוּשִׁי.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" en el proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa "mal" en lugar de una paráfrasis más amplia para respetar la concentración del hebreo en la condición moral mencionada.
  - '"Cushita" se escribe en minúscula porque funciona como etnónimo común en español dentro de la oración.'
