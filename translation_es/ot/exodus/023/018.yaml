translation:
  language: es
  text: No ofrecerás la sangre de mi sacrificio con nada leudado[a], ni el sebo de mi fiesta[b] permanecerá hasta la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con levadura» / «sobre levadura». El hebreo usa literalmente la preposición «sobre», pero en este contexto sacrificial probablemente significa que el sacrificio no debe ofrecerse en asociación con algo leudado.
    reason: lexical_alternative
  - marker: b
    text: O «festival» para «fiesta». El término hebreo se refiere a una celebración sagrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִזְבַּח
  english_pob_choice: you shall not sacrifice
  chosen_spanish: No ofrecerás sobre...
  alternatives_spanish:
  - No sacrificarás...
  - No presentarás como sacrificio...
  lexicon: HALOT
  rationale: El Qal imperfecto con לֹא funciona como prohibición directa. En español, «ofrecer» conserva el sentido cultual de presentar una víctima en sacrificio y suena natural en este contexto legal.
- source_word: עַל חָמֵץ
  english_pob_choice: with anything leavened
  chosen_spanish: sobre levadura
  alternatives_spanish:
  - con algo leudado
  - con levadura
  lexicon: HALOT
  rationale: Se conserva el valor básico de עַל como «sobre», ya que el hebreo lo dice literalmente; el contexto sacrificial hace claro que se trata de no presentar el sacrificio en asociación con levadura. «Levadura» es más natural en español bíblico que «leudado».
- source_word: דַּם זִבְחִי
  english_pob_choice: the blood of my sacrifice
  chosen_spanish: la sangre de mi sacrificio
  alternatives_spanish:
  - la sangre de mi ofrenda sacrificial
  - la sangre de mi víctima
  lexicon: HALOT
  rationale: Se mantiene «sangre» porque el hebreo la menciona explícitamente. «Sacrificio» conserva la cadena nominal sin suavizarla, y el posesivo de primera persona se preserva como en el texto fuente.
- source_word: יָלִין
  english_pob_choice: shall not remain until morning
  chosen_spanish: permanecerá hasta la mañana
  alternatives_spanish:
  - pasará la noche hasta la mañana
  - quedará hasta la mañana
  lexicon: HALOT
  rationale: Aunque el POB inglés evitó «overnight» por redundante, el verbo לין sí expresa permanecer durante la noche. En español, «permanecerá hasta la mañana» transmite el límite temporal sin agregar más que el hebreo.
- source_word: חֵלֶב
  english_pob_choice: the fat
  chosen_spanish: el sebo
  alternatives_spanish:
  - la grasa
  - la parte grasa
  lexicon: HALOT
  rationale: En contexto sacrificial, חֵלֶב suele referirse al sebo o grasa grasa reservada para Yahvé. «Sebo» mantiene mejor el matiz cultual y distingue este término del uso culinario general de «grasa».
- source_word: חַגִּי
  english_pob_choice: my feast
  chosen_spanish: mi fiesta
  alternatives_spanish:
  - mi fiesta sagrada
  - mi festival
  lexicon: HALOT
  rationale: «Fiesta» refleja bien חַג en español eclesial contemporáneo y preserva el posesivo divino. Aunque «festival» es posible, «fiesta» es más natural y sigue el valor festivo-sacrificial del contexto.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta por la mañana
  lexicon: HALOT
  rationale: La expresión temporal se traduce de manera directa y clara. «Mañana» con artículo es idiomático en español y mantiene la referencia temporal exacta.
theological_decisions:
- issue: Referencia de los sufijos posesivos de primera persona
  english_pob_reading: Retain the first-person divine speech as 'my sacrifice' and 'my feast' without interpretive expansion.
  chosen_spanish_reading: «mi sacrificio» y «mi fiesta» se mantienen como posesivos de primera persona, sin expandir a «del SEÑOR» ni a otras paráfrasis.
  alternative_spanish_readings:
  - «el sacrificio para mí»
  - «la fiesta de Yahvé»
  rationale: El hebreo expresa explícitamente posesión en primera persona, y el registro español debe conservar esa voz directa de Yahvé. Expandirla interpretativamente debilitaría la transparencia del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido sacrificial de חֵלֶב
  english_pob_reading: the fat
  chosen_spanish_reading: el sebo
  alternative_spanish_readings:
  - la grasa
  - las porciones grasas
  rationale: En leyes sacrificiales, el término apunta al material ritual reservado, no a grasa en sentido culinario. «Sebo» comunica mejor la carga cultual sin borrar la tensión terminológica.
  doctrine_reference: Levítico 3; Éxodo 29
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del POB inglés: se evita agregar «overnight» como redundancia y se mantiene el límite temporal explícito «hasta la mañana». La solución española conserva la prohibición cultual y la posesión divina, con una ligera adaptación idiomática en «ofrecerás» y «hasta la mañana».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto cuando el texto pide el nombre divino; aquí la cita directa no requiere expandirlo, pero la posesión de primera persona lo presupone.
  - Se mantiene un registro bíblico contemporáneo y no arcaizante, con términos cultuales transparentes.
  - No se sustituye sistemáticamente el lenguaje sacrificial por paráfrasis explicativas; la estructura del hebreo se conserva en lo posible.
