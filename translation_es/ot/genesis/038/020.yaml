translation:
  language: es
  text: Entonces Judá envió el cabrito[a] por medio de su amigo[b] adulamita[c] para recuperar la prenda[d] de la mano[e] de la mujer, pero no la encontró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cabrito de las cabras», un giro idiomático para un cabrito joven.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por la mano de», un modismo que significa «por medio de» o «a través de».'
    reason: lexical_alternative
  - marker: c
    text: Gentilicio de Adulam.
    reason: source_note
  - marker: d
    text: 'También: «la garantía» o «el depósito».'
    reason: lexical_alternative
  - marker: e
    text: 'Hebreo: «de la mano de la mujer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Así que ... envió
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; "Entonces" conserva la secuencia narrativa con español natural y digno.
- source_word: גְּדִי הָעִזִּים
  english_pob_choice: the young goat
  chosen_spanish: el cabrito
  alternatives_spanish:
  - el cabrito de las cabras
  - el cabrito joven
  lexicon: HALOT
  rationale: La expresión denota un animal joven; "cabrito" comunica de modo claro y natural la misma referencia sin añadir información ajena.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - a través de
  lexicon: HALOT
  rationale: La idiomática hebrea expresa agencia/instrumentalidad. En español, "por medio de" preserva el sentido sin sonar forzado, mientras la nota conserva la literalidad.
- source_word: רֵעֵהוּ
  english_pob_choice: his ... friend
  chosen_spanish: su amigo
  alternatives_spanish:
  - su compañero
  - su allegado
  lexicon: HALOT
  rationale: El sustantivo indica un asociado o compañero social. "Amigo" es natural en el contexto narrativo y coincide con la elección inglesa.
- source_word: הָעֲדֻלָּמִי
  english_pob_choice: Adullamite
  chosen_spanish: adulamita
  alternatives_spanish:
  - de Adulam
  - adulámita
  lexicon: HALOT
  rationale: El gentilicio se vierte con la forma castellana habitual "adulamita", transparente y reconocible.
- source_word: לָקַחַת
  english_pob_choice: to take back
  chosen_spanish: para tomar de vuelta
  alternatives_spanish:
  - para recuperar
  - para volver a tomar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. Aquí se conserva el valor de recuperación de algo dejado en prenda, sin convertirlo en una paráfrasis más libre.
- source_word: הָעֵרָבוֹן
  english_pob_choice: the pledge
  chosen_spanish: la prenda
  alternatives_spanish:
  - el prenda
  - la garantía
  - el depósito
  lexicon: HALOT
  rationale: El término designa el objeto dado como seguridad. En español, "prenda" comunica bien la función legal/comercial del objeto en este contexto.
- source_word: מִיַּד הָאִשָּׁה
  english_pob_choice: from the woman's hand
  chosen_spanish: de la mano de la mujer
  alternatives_spanish:
  - de la mujer
  - de entre las manos de la mujer
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de "mano", que el inglés revisado también preservó, porque forma parte del registro formal y del tejido idiomático del hebreo.
- source_word: וְלֹא מְצָאָהּ
  english_pob_choice: but he did not find her
  chosen_spanish: pero no la encontró
  alternatives_spanish:
  - y no la encontró
  - mas no la halló
  lexicon: HALOT
  rationale: La cláusula indica fracaso del intento. "Pero" marca mejor el contraste narrativo que "y" en español moderno.
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió explícitamente «the woman's hand» para reflejar con mayor plenitud la frase hebrea מִיַּד הָאִשָּׁה. Por eso la versión española conserva «de la mano de la mujer» y no la reduce a «de la mujer». También se mantuvo la nota idiomática de בְּיַד para no ocultar el matiz literal del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma, aunque este versículo no contiene el nombre divino.
  - Se eligió «prenda» para הָעֵרָבוֹן por su valor de garantía/collateral en el contexto inmediato.
  - Se preserva la imagen de «mano» en dos lugares para reflejar la formulación hebrea y la revisión auditada del inglés.
  - El gentilicio se normaliza como «adulamita», forma natural en español bíblico.
  - No se introdujo un tono arcaizante innecesario; el registro busca ser bíblico, claro y publicable.
