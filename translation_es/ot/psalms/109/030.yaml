translation:
  language: es
  text: Daré muchas gracias a Yahvé con mi boca; en medio de muchos[a] lo alabaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “en medio de muchos”; es decir, públicamente, delante de una multitud.'
    reason: cultural_note
lexical_decisions:
- source_word: א֘וֹדֶ֤ה
  english_pob_choice: I will give thanks
  chosen_spanish: Daré gracias
  alternatives_spanish:
  - Le daré gracias
  - Agradeceré
  lexicon: HALOT
  rationale: El verbo hifil de ידה en este contexto salmódico expresa acción de gracias y alabanza. En español, “daré gracias” conserva el valor litúrgico y evita una formulación demasiado abstracta.
- source_word: יְהוָ֣ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según el criterio del proyecto, se vierte como “Yahvé” en español, manteniendo el nombre del pacto sin sustituirlo por un título.
- source_word: מְאֹ֣ד
  english_pob_choice: great
  chosen_spanish: con toda
  alternatives_spanish:
  - mucho
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: El adverbio intensifica la acción de gracias. En español, “con toda mi boca” comunica bien la intensidad sin sonar forzado, y evita duplicar una intensificación poco natural junto a “daré gracias”.
- source_word: בְּ/פִ֑/י
  english_pob_choice: with my mouth
  chosen_spanish: con toda mi boca
  alternatives_spanish:
  - con mi boca
  - por mi boca
  lexicon: HALOT
  rationale: La preposición con “boca” expresa instrumento o medio. “Con mi boca” sería literal, pero “con toda mi boca” refleja mejor la fuerza intensiva del hebreo al combinarse con מְאֹד, manteniendo la concreción corporal.
- source_word: וּ/בְ/ת֖וֹךְ רַבִּ֣ים
  english_pob_choice: in the midst of many
  chosen_spanish: en medio de muchos
  alternatives_spanish:
  - entre muchos
  - en la asamblea de muchos
  lexicon: HALOT
  rationale: 'La expresión hebrea es espacial y pública: literalmente “en medio de muchos”. “En medio de muchos” conserva esa imagen sin introducir “asamblea”, que no está explícito en el texto.'
- source_word: אֲהַֽלְלֶֽ/נּוּ
  english_pob_choice: I will praise him
  chosen_spanish: lo alabaré
  alternatives_spanish:
  - lo elogiaré
  - lo exaltaré
  lexicon: HALOT
  rationale: El piel de הלל aquí significa alabar. En español, “alabaré” es la correspondencia más directa y natural en lenguaje de salmos; el pronombre “lo” retoma a Yahvé.
theological_decisions:
- issue: Nombre divino para יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo presenta el nombre propio divino, no un título. La línea editorial del proyecto exige conservarlo como “Yahvé” para mantener visible el nombre del pacto y la transparencia ante el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión en inglés quedó sin cambios tras el último pase; la versión española sigue el mismo juicio de alta concordancia y mantiene las decisiones clave del audit trail: thanks/praise, the divine name, y la imagen pública de “in the midst of many”.'
  spanish_consistency_notes:
  - Se conserva “Yahvé” de forma consistente para יְהוָה.
  - “Daré gracias” y “lo alabaré” mantienen la doble acción de agradecimiento y alabanza del paralelismo hebreo.
  - “En medio de muchos” preserva la visibilidad pública del gesto, sin explicitar “asamblea” en el texto principal.
