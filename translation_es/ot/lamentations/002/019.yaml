translation:
  language: es
  text: Levántate, clama en la noche, al comenzar las vigilias; derrama tu corazón como agua delante del rostro del Señor. Alza hacia él tus manos por la vida de tus pequeños hijos, que desfallecen de hambre al comienzo de cada calle[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «en la esquina de cada calle».
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וּמִי
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Álzate
  - Levantate
  - Ponte de pie
  lexicon: HALOT
  rationale: Imperativo femenino singular de קום, dirigido a Sion/Jerusalén personificada. «Levántate» es natural en español y conserva la fuerza urgente del llamado.
- source_word: רֹ֣נִּי
  english_pob_choice: cry out
  chosen_spanish: da voces
  alternatives_spanish:
  - clama
  - grita
  - prorrumpe en lamento
  lexicon: HALOT
  rationale: En este contexto de lamento, רן expresa un clamor intenso más que canto gozoso. «Da voces» transmite el grito/lamento sin sugerir alegría.
- source_word: ב/ליל
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - durante la noche
  lexicon: HALOT
  rationale: Equivalente temporal directo, claro y natural en español.
- source_word: לְ/רֹאשׁ אַשְׁמֻר֔וֹת
  english_pob_choice: at the beginning of the watches
  chosen_spanish: al comenzar las vigilias
  alternatives_spanish:
  - al inicio de las vigilias de la noche
  - al principio de las guardias
  lexicon: HALOT
  rationale: רֹאשׁ aquí es «comienzo» y אַשְׁמֻרוֹת se refiere a las divisiones nocturnas de guardia. «Al comenzar las vigilias» conserva la imagen y su valor temporal.
- source_word: שִׁפְכִ֤י
  english_pob_choice: pour out
  chosen_spanish: derrama
  alternatives_spanish:
  - vacía
  - suelta
  - derramar
  lexicon: HALOT
  rationale: Metáfora habitual de una oración o lamento desbordado. «Derrama» mantiene la imagen de vaciar el interior.
- source_word: כַ/מַּ֨יִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - igual que el agua
  - cual agua
  lexicon: HALOT
  rationale: Conserva la comparación de un derramamiento sin reservas.
- source_word: לִבֵּ֔/ךְ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu ser
  lexicon: HALOT
  rationale: Equivalente idiomático y literal en español para el centro de los afectos y la vida interior.
- source_word: נֹ֖כַח פְּנֵ֣י אֲדֹנָ֑/י
  english_pob_choice: before the face of the Lord
  chosen_spanish: delante del rostro del Señor
  alternatives_spanish:
  - delante del Señor
  - en presencia del Señor
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de nôkaj/pene. «Rostro» preserva la concreción del original; «Señor» refleja el título divino en esta forma.
- source_word: שְׂאִ֧י
  english_pob_choice: Lift up
  chosen_spanish: Alza
  alternatives_spanish:
  - Levanta
  - Eleva
  lexicon: HALOT
  rationale: Imperativo de נשׂא; «Alza» es la colocación natural con «las manos» en oración.
- source_word: אֵלָ֣י/ו
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: La dirección del gesto de oración se expresa bien con «hacia él» y conserva el matiz relacional.
- source_word: כַּפַּ֗יִ/ךְ
  english_pob_choice: your hands
  chosen_spanish: tus manos
  alternatives_spanish:
  - tus palmas
  - tus manos abiertas
  lexicon: HALOT
  rationale: El dual de «palmas/manos» en contexto de oración se vierte naturalmente como «manos» en español.
- source_word: עַל נֶ֨פֶשׁ֙ עֽוֹלָלַ֔יִ/ךְ
  english_pob_choice: for the lives of your little children
  chosen_spanish: por la vida de tus hijitos
  alternatives_spanish:
  - por la vida de tus pequeños niños
  - por la vida de tus niños pequeños
  - por las vidas de tus hijitos
  lexicon: HALOT
  rationale: עַל aquí tiene sentido intercesor «por». נֶפֶשׁ se entiende como «vida», no como un uso abstracto de «alma». עוֹלָלִים denota niños muy pequeños; «hijitos» conserva ternura y pathos.
- source_word: הָ/עֲטוּפִ֥ים
  english_pob_choice: who are faint
  chosen_spanish: que desfallecen
  alternatives_spanish:
  - que se desmayan
  - que languidecen
  - que están exhaustos
  lexicon: HALOT
  rationale: El participio expresa debilitamiento o colapso físico. «Desfallecen» es preciso y solemne.
- source_word: בְּ/רָעָ֖ב
  english_pob_choice: with hunger
  chosen_spanish: de hambre
  alternatives_spanish:
  - por hambre
  - a causa del hambre
  lexicon: HALOT
  rationale: La preposición expresa causa o circunstancia; en español, «de hambre» es idiomático con «desfallecer».
- source_word: בְּ/רֹ֥אשׁ כָּל חוּצֽוֹת
  english_pob_choice: at the head of every street
  chosen_spanish: en la esquina de cada calle
  alternatives_spanish:
  - al comienzo de cada calle
  - en el arranque de cada calle
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente «en la cabeza de todas las calles». Como el español moderno entiende esa imagen de forma menos natural, se adopta la opción idiomática preservada por la nota inglesa: una esquina o cruce prominente de calle.'
theological_decisions:
- issue: Rendering of אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - el Dueño
  rationale: Se sigue la lectura de título divino en esta forma de אֲדֹנָי, sin usar la convención de máscara del Tetragrámaton. «El Señor» es el equivalente español claro y reverente.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος / YHWH'
translation_notes:
  revision_awareness: El auditrail inglés no requirió cambios sustanciales; se mantuvieron las decisiones de fondo (llamado urgente, lamento nocturno, oración intercesora y la imagen de las calles) con adaptación idiomática al español. La única variación relevante fue hacer más natural la clausula final mediante «en la esquina de cada calle», preservada también como alternativa anotada.
  spanish_consistency_notes:
  - Se usa «Señor» para אֲדֹנָי según la pauta doctrinal del proyecto, no «SEÑOR».
  - Se prefirió «hijitos» para reflejar עוֹלָלַיִךְ con ternura y cercanía, sin perder el sentido de niños muy pequeños.
  - «Desfallecen de hambre» conserva el matiz físico del participio y la causalidad de בְּרָעָב.
  - La nota [a] corresponde solo a la frase final y mantiene la alternativa más idiomática señalada por el POB inglés.
