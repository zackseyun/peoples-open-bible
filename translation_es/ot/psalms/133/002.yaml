translation:
  language: es
  text: Es como el buen aceite[a] sobre la cabeza, que desciende sobre la barba, sobre la barba de Aarón, que desciende sobre el cuello[b] de sus vestiduras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aceite precioso'. Muchas versiones usan 'precioso' para subrayar su valor, pero el hebreo dice más literalmente 'buen aceite'.
    reason: lexical_alternative
  - marker: b
    text: O 'el borde' o 'la abertura' de sus vestiduras. La expresión hebrea dice literalmente 'la boca' de las vestiduras y puede referirse al cuello o a la abertura superior.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּשֶּׁמֶן
  english_pob_choice: like the ... oil
  chosen_spanish: Es como el ... aceite
  alternatives_spanish:
  - como el ... aceite
  - cual el ... aceite
  lexicon: HALOT
  rationale: La partícula comparativa כ exige en español una construcción de semejanza natural. 'Es como' comunica bien el valor comparativo y mantiene el tono poético sin añadir interpretación.
- source_word: הַטּוֹב
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - bueno
  - precioso
  - fino
  lexicon: HALOT
  rationale: '''טוֹב'' se refleja con ''buen'', que en español suena natural en la frase fija ''buen aceite'' y preserva el sentido básico de ''good'' sin imponer ''precioso'' como traducción interpretativa.'
- source_word: יֹרֵד
  english_pob_choice: running down
  chosen_spanish: desciende
  alternatives_spanish:
  - baja
  - corre hacia abajo
  - va descendiendo
  lexicon: HALOT
  rationale: El participio expresa movimiento hacia abajo. 'Desciende' es fiel, sobrio y poético en español; evita la posible sobreexplicación de 'corre' y conserva la imagen verbal continua.
- source_word: הָרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza
  - el cráneo
  lexicon: HALOT
  rationale: Es un referente anatómico directo; 'la cabeza' es la equivalencia natural en español.
- source_word: הַזָּקָן
  english_pob_choice: the beard
  chosen_spanish: la barba
  alternatives_spanish:
  - la barba
  lexicon: HALOT
  rationale: '''זָקָן'' corresponde a ''barba''. En español, ''barba'' es la opción directa y clara para mantener la imagen corporal del poema.'
- source_word: זְקַן אַהֲרֹן
  english_pob_choice: Aaron’s beard
  chosen_spanish: la barba de Aarón
  alternatives_spanish:
  - la barba de Aarón
  - la barba de Aaron
  lexicon: HALOT
  rationale: Se conserva el paralelo poético con la repetición de 'barba'. La construcción posesiva es la más natural en español y reproduce la relación constructa sin perder claridad.
- source_word: שֶׁיֹּרֵד
  english_pob_choice: which runs down
  chosen_spanish: que desciende
  alternatives_spanish:
  - que baja
  - que corre hacia abajo
  - descendiendo
  lexicon: HALOT
  rationale: La relativa retoma e intensifica la imagen. 'Que desciende' mantiene el enlace relativo y el paralelismo con el verbo anterior sin forzar un giro menos natural.
- source_word: פִּי
  english_pob_choice: the collar
  chosen_spanish: el borde
  alternatives_spanish:
  - la abertura
  - el cuello
  - el borde
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'la boca' de las vestiduras; en este contexto la imagen apunta al borde o abertura superior. 'El borde' preserva la ambigüedad espacial y evita limitar demasiado el término.
- source_word: מִדּוֹתָיו
  english_pob_choice: his robes
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus ropas
  - sus vestiduras
  - sus ropajes
  lexicon: HALOT
  rationale: '''מִדּוֹת'' se entiende aquí como prendas o vestiduras, en el marco sacerdotal de Aarón. ''Vestiduras'' conserva el registro solemne y la referencia ceremonial mejor que un término más general.'
theological_decisions:
- issue: Naturaleza de la imagen del aceite
  english_pob_reading: Rendered as a simile of abundant, consecrating oil associated with Aaron, without importing later doctrinal symbolism into the main text.
  chosen_spanish_reading: La versión presenta la comparación poética del aceite abundante vinculado con Aarón, sin convertirla en una explicación doctrinal explícita dentro del verso.
  alternative_spanish_readings:
  - Interpretar el aceite explícitamente como aceite de unción en el texto principal
  - Añadir una glosa doctrinal sobre la consagración sacerdotal
  rationale: El hebreo ofrece una imagen poética y alusiva; la traducción debe preservar esa imagen sin sobrecargar el verso con una interpretación que el texto no formula de manera explícita.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El paquete de origen indica que no hubo revisiones aplicadas en el último pase; el texto inglés quedó sin cambios tras la revisión más reciente, con observaciones menores. La redacción española sigue ese estado estable y conserva las dos tensiones léxicas documentadas: טוֹב como ''bueno'' y פִּי מִדּוֹתָיו como ''borde/abertura'' de las vestiduras.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - '''Aarón'' se conserva con la forma hispana estándar del nombre propio.'
  - Se preserva la repetición de 'barba' para reflejar el paralelismo hebreo.
  - No se introduce 'Cristo', 'Señor' ni otra terminología litúrgica no presente en el verso.
