lexical_decisions:
- source_word: לְ/מַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de parte de la tribu de
  - perteneciente a la tribu de
  lexicon: HALOT
  rationale: El hebreo con לְ + מַטֶּה introduce aquí la procedencia tribal del representante en la lista. En español, «de la tribu de» expresa con naturalidad esa relación de pertenencia/procedencia sin añadir una paráfrasis excesiva.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Asher
  lexicon: HALOT
  rationale: Nombre propio tribal. En español bíblico, «Aser» es la forma tradicional y clara del nombre, manteniendo la referencia al patriarca/tribu sin adoptar la grafía inglesa.
- source_word: סְתוּר
  english_pob_choice: Sethur
  chosen_spanish: Setur
  alternatives_spanish:
  - Setur
  - Sethur
  lexicon: HALOT
  rationale: Nombre propio. Se prefiere «Setur» como transliteración española breve y transparente, acorde con el valor consonántico del hebreo y con la inteligibilidad en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La construcción patronímica בֶּן + nombre propio se rinde de forma directa como «hijo de», que es natural en español y conserva el parentesco inmediato sin añadir artículo innecesario.
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Micael
  - Michael
  lexicon: HALOT
  rationale: Nombre propio. En español, «Miguel» es la forma bíblica y eclesial establecida para מִיכָאֵל/Michael, por lo que comunica mejor al lector hispanohablante sin perder la identificación del nombre.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta notas ni variantes textuales; la revisión reciente indica sin cambios y acuerdo alto. La versión española sigue de cerca el valor del hebreo y la equivalencia óptima del inglés sin introducir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantienen nombres propios en formas habituales del español bíblico cuando existen (Aser, Miguel).
  - No se añade artículo al patronímico, en paralelo al estilo de lista del original.
  - La preposición «de» conserva la relación tribal indicada por לְ/מַטֶּה sin sobreexplicarla.
