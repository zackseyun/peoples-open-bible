translation:
  language: es
  text: Pero escucha, por favor, esta palabra que te digo[a], para que tú y todo el pueblo la oigan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «en tus oídos y en los oídos de todo el pueblo»; es un modismo que significa «para que tú y todo el pueblo la oigan».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Y sin embargo
  lexicon: HALOT
  rationale: En este contexto discursivo marca contraste con lo anterior; en español, 'Pero' transmite bien el giro adversativo sin sobrecargar el estilo.
- source_word: שְׁמַע נָא
  english_pob_choice: please hear
  chosen_spanish: por favor, escucha
  alternatives_spanish:
  - oye, por favor
  - escucha, por favor
  - te ruego que escuches
  lexicon: HALOT
  rationale: El imperativo con נָא añade cortesía y urgencia. 'Por favor, escucha' conserva el matiz apelativo y suena natural en español contemporáneo.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este asunto
  - este mensaje
  - esta cosa
  lexicon: HALOT
  rationale: En discurso profético דָּבָר puede ser 'palabra', 'asunto' o 'mensaje'. 'Palabra' preserva mejor la fuerza verbal y profética del hebreo, y en español 'esta palabra' es claro y fiel.
- source_word: אֲשֶׁר אָנֹכִי דֹּבֵר
  english_pob_choice: that I am speaking
  chosen_spanish: que estoy hablando
  alternatives_spanish:
  - que hablo
  - que estoy diciendo
  - que pronuncio
  lexicon: HALOT
  rationale: El participio expresa acción en curso. 'Estoy hablando' refleja bien la inmediatez de la declaración, aunque 'hablando' suena más oral que 'diciendo' en este contexto de audición pública.
- source_word: בְּאָזְנֶיךָ
  english_pob_choice: in your hearing
  chosen_spanish: en tus oídos
  alternatives_spanish:
  - en tu oído
  - ante ti
  - para que lo oigas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'en tus oídos'. Aquí se conserva la imagen corporal del original, que es natural en español bíblico y mantiene el paralelo con la siguiente cláusula. La nota explica el sentido idiomático.
- source_word: וּבְאָזְנֵי כָּל הָעָם
  english_pob_choice: and in the hearing of all the people
  chosen_spanish: y en los oídos de todo el pueblo
  alternatives_spanish:
  - y delante de todo el pueblo
  - y para que todo el pueblo lo oiga
  - y en la audiencia de todo el pueblo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y la literalidad idiomática del hebreo. Aunque 'oídos' es más figurado en español, preserva el recurso hebreo para la explicación textual.
translation_notes:
  revision_awareness: La versión anterior omitió anclar la nota con [a] en el texto. Esta revisión conserva la nota y coloca el marcador exactamente en la frase afectada. También ajusta el final para sostener la imagen literal del hebreo sin perder claridad.
  spanish_consistency_notes:
  - Se conservó 'Yahvé' por defecto proyectual; este versículo no lo contiene.
  - Se prefirió 'palabra' para דָּבָר por su fuerza profética.
  - Se mantuvo la imagen de 'oídos' para reflejar el hebreo idiomático, con explicación en la nota.
  - No se introdujeron términos eclesiásticos añadidos que atenúen el contraste discursivo del texto.
