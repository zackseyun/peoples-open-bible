review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo y mantiene correctamente «Yahvé», «Dios de Israel», la incomparable unicidad divina, el modismo «andar delante de ti» y «con todo su corazón». Sin embargo, dos puntos requieren ajuste: 1) «que guardas» después de punto y coma suena sintácticamente forzado; el participio שֹׁמֵר funciona mejor en aposición vocativa («tú que guardas» o «que guardas» sin la puntuación actual). 2) חֶסֶד en pareja con «el pacto» pide una opción más cercana al inglés auditado («amor constante» / «amor fiel») que «misericordia», porque esta última debilita el matiz pactual que la nota inglesa quiso preservar.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero presenta detalles de estilo y puntuación mejorables: «Oh» puede simplificarse a «oh» tras dos puntos y dentro del discurso directo; hay un espacio indebido antes del punto final; y la secuencia «; que guardas» suena poco natural en español. Una leve reformulación produce un español más fluido y fiel.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto en «Yahvé», «Dios», «siervos» y el modismo de caminar delante de Dios. La principal desviación está en חֶסֶד: el rastro inglés documenta «steadfast love» con alternativa «covenant faithfulness», por lo que «misericordia» no es la mejor equivalencia aquí. Conviene usar «amor constante» y conservar en nota la alternativa «fidelidad pactual».'
  issues:
  - severity: medium
    issue: «la misericordia» para חֶסֶד
    rationale: Aunque posible en abstracto, aquí חֶסֶד aparece emparejado con «el pacto», y el audit trail inglés prioriza «steadfast love» precisamente para retener el matiz de lealtad pactual. «Misericordia» estrecha o desplaza ese matiz.
  - severity: medium
    issue: Construcción «; que guardas»
    rationale: Después de «en los cielos ni en la tierra», el español necesita una unión más natural con el participio atributivo hebreo. «Tú que guardas» integra mejor la descripción de Yahvé.
  - severity: low
    issue: Puntuación y formato
    rationale: 'Hay un espacio antes del punto final y la capitalización/interjección puede normalizarse para mejor estilo: «oh Yahvé».'
