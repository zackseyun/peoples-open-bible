base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/003/018.yaml
  text: I have gathered those grieving over the appointed festival from you[a]; they were a reproach upon her[c][b], a burden.
  footnotes:
  - marker: a
    text: Or 'those afflicted from the appointed assembly'; the Hebrew is difficult, and the phrase may refer either to people grieving because they are deprived of the festival or to those removed from the festal gathering.
    reason: alternative_reading
  - marker: b
    text: Or 'I gathered' or, in prophetic context, 'I will gather.'
    reason: lexical_alternative
  - marker: c
    text: The pronoun 'her' likely refers to Zion/Jerusalem.
    reason: cross_reference
