- from: Lo puso de inmediato en su propio lugar[a]. Entonces el rey vino el séptimo día para hacer duelo por Daniel, y llegó al pozo[b], miró dentro, y he aquí, Daniel estaba sentado allí.
  to: Lo puso de inmediato en su propio lugar[a]. Entonces el rey vino el séptimo día para hacer duelo por Daniel, y llegó al foso[b], miró dentro, y he aquí que Daniel estaba sentado allí.
  rationale: Se ajusta λάκκος de «pozo» a «foso» para reflejar mejor el valor amplio del griego en este contexto narrativo, evitando la asociación más estrecha de «pozo» con un pozo de agua. También se suaviza la construcción con «he aquí» para una lectura más natural en español sin perder el efecto de descubrimiento repentino.
