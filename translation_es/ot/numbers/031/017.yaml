revisions:
- from: Así que ahora[a], maten a todo varón entre los pequeños, y maten a toda mujer que haya conocido varón al acostarse con él.
  to: Y ahora[a], maten a todo varón entre los pequeños, y maten a toda mujer que haya conocido a un hombre al acostarse con él.
  rationale: Se cambia «Así que ahora» por «Y ahora» para reflejar mejor וְעַתָּה en español natural sin añadir inferencia causal. Se ajusta «que haya conocido varón» a «que haya conocido a un hombre» para corregir la sintaxis idiomática española. Se conserva «al acostarse con él» por claridad y fidelidad al sentido sexual explicitado en el hebreo, y se mejora la nota al pie para preservar la alternativa más literal documentada en la auditoría inglesa.
