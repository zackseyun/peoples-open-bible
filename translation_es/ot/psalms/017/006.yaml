translation:
  language: es
  text: Yo te invoco, pues tú me respondes, oh Dios; inclina tu oído hacia mí[a]; oye mis palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «inclina tu oído hacia mí»; es un modismo que pide atención especial y escucha cuidadosa.'
    reason: cultural_note
lexical_decisions:
- source_word: קְרָאתִיךָ
  english_pob_choice: I call on you
  chosen_spanish: Yo te invoco
  alternatives_spanish:
  - Yo te he invocado
  - Yo te llamo
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía puede expresar una acción de súplica presente o una apelación confiada. «Invocar» comunica bien la dirección orante del verbo קרא en este contexto y evita un calco demasiado mecánico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica. «Porque» mantiene la fuerza causal y es natural en español bíblico moderno.
- source_word: תַעֲנֵנִי
  english_pob_choice: you answer me
  chosen_spanish: tú me respondes
  alternatives_spanish:
  - tú me responderás
  - tú me has respondido
  lexicon: HALOT
  rationale: El imperfecto puede expresar confianza en la respuesta divina. «Me respondes» conserva esa seguridad sin fijar indebidamente un tiempo estrictamente futuro.
- source_word: אֵל
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh Poderoso
  lexicon: HALOT
  rationale: Uso vocativo de אֵל. «Oh Dios» es la equivalencia más natural y reverente en español de oración.
- source_word: הַט אָזְנְךָ לִי
  english_pob_choice: incline your ear to me
  chosen_spanish: Inclina tu oído hacia mí
  alternatives_spanish:
  - Inclina tu oreja hacia mí
  - Vuelve tu oído hacia mí
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de escuchar con atención. «Oído» funciona bien en español y mantiene la metáfora sin explicarla demasiado.
- source_word: שְׁמַע אִמְרָתִי
  english_pob_choice: hear my words
  chosen_spanish: oye mis palabras
  alternatives_spanish:
  - escucha mis palabras
  - oye mi palabra
  lexicon: HALOT
  rationale: La revisión inglesa refleja el plural/sentido colectivo del hebreo. En español, «palabras» comunica mejor ese valor que un singular, y «oye» preserva la correspondencia con el imperativo breve del hebreo.
theological_decisions:
- issue: Tiempo verbal en la oración confiada
  english_pob_reading: I call on you / you answer me can bear present, past, or confident future nuance
  chosen_spanish_reading: Yo te invoco; porque tú me respondes
  alternative_spanish_readings:
  - Yo te he invocado; porque tú me responderás
  - Yo te invoco; porque tú me has respondido
  rationale: No se fija un tiempo único donde el hebreo poético permite una gama de matices. La forma presente en español expresa bien la súplica viva y la confianza inmediata del salmista.
  doctrine_reference: Poética hebrea; uso aspectual/temporal flexible del perfecto e imperfecto en oración
translation_notes:
  revision_awareness: El texto hebreo tiene una combinación poética de perfectos e imperfectos que admite matiz de presente, pasado o futuro confiado. La revisión inglesa reciente ajustó «my word» a «my words» para reflejar mejor el plural/sentido colectivo de אִמְרָתִי; por eso el español usa «mis palabras».
  spanish_consistency_notes:
  - Se mantiene «Dios» en el vocativo de אֵל, conforme al uso POB para אֱלֹהִים/אֵל en dirección directa.
  - Se evita «Señor» porque el hebreo aquí no emplea el tetragrámaton ni una sustitución necesaria.
  - «Oído» conserva la imagen idiomática sin modernizarla a «atención», para no perder el color semítico del verso.
