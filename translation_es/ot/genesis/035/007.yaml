translation:
  language: es
  text: Allí edificó un altar y llamó al lugar El-betel[a], porque allí Dios se le había revelado cuando huyó de su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El-betel» probablemente significa «Dios de Betel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: he built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: בנה en este contexto narrativo se refiere a la construcción de un altar. «Edificó» conserva el tono formal y bíblico sin sonar tan técnico como «construyó».
- source_word: מִזְבֵּחַ
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un altar sacrificial
  lexicon: HALOT
  rationale: La equivalencia directa es clara en español. Se mantiene el artículo indefinido como en inglés y como exige el español natural.
- source_word: וַיִּקְרָא לַמָּקוֹם
  english_pob_choice: called the place
  chosen_spanish: llamó al lugar
  alternatives_spanish:
  - nombró el lugar
  lexicon: HALOT
  rationale: קרא + לְ en fórmulas de nombrar se traduce de manera natural como «llamó al lugar». Mantiene la acción de asignar nombre sin sobrerinterpretar.
- source_word: אֵל בֵּית אֵל
  english_pob_choice: El-bethel
  chosen_spanish: El-betel
  alternatives_spanish:
  - Dios de Betel
  lexicon: HALOT
  rationale: Se conserva la forma de nombre propio transliterada, como en el POB inglés. En español, «Betel» es la forma habitual del topónimo, por lo que la adaptación «El-betel» mantiene la función de nombre y la transparencia del sentido.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la causa del nombre; «porque» es la forma más natural y clara en español moderno.
- source_word: נִגְלוּ
  english_pob_choice: had revealed himself
  chosen_spanish: se le había revelado
  alternatives_spanish:
  - se le apareció
  - fue revelado a él
  lexicon: HALOT
  rationale: El nifal de גלה aquí expresa auto-manifestación divina. En español, el reflejo «se le había revelado» preserva esa iniciativa divina y el matiz retrospectivo del pluscuamperfecto.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - los dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, el contexto exige sentido singular para el Dios de Israel. «Dios» evita cualquier lectura politeísta.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El complemento pronominal se integra de forma natural con el dativo ético/indirecto en español. «Se le» suena más fluido que repetir «a él».
- source_word: בְּבָרְחוֹ
  english_pob_choice: when he fled
  chosen_spanish: cuando huía
  alternatives_spanish:
  - al huir
  - cuando escapó
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal. «Cuando huía» mantiene la simultaneidad y el proceso narrativo, además de sonar más idiomático que una traducción demasiado literal.
- source_word: מִפְּנֵי אָחִיו
  english_pob_choice: from his brother
  chosen_spanish: de su hermano
  alternatives_spanish:
  - lejos de su hermano
  - de delante de su hermano
  lexicon: HALOT
  rationale: En contextos de huida, מִפְּנֵי significa simplemente separación o alejamiento. «De su hermano» comunica el sentido sin calco innecesario.
theological_decisions:
- issue: Tratamiento de אֱלֹהִים con verbo plural en referencia al Dios único
  english_pob_reading: 'Render as singular: ''God had revealed himself to him'''
  chosen_spanish_reading: «Dios se le había revelado»
  alternative_spanish_readings:
  - «Dios se había aparecido a él»
  - «los dioses se le habían revelado»
  rationale: El hebreo usa la forma plural morfológica אֱלֹהִים con verbo plural, pero en este contexto narra la manifestación del Dios único de Jacob. El español debe reflejar el referente singular sin perder el carácter verbal de la auto-revelación.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Función de אֵל בֵּית אֵל como nombre propio frente a sentido semántico
  english_pob_reading: Transliterate as the place-name 'El-bethel' in the main text
  chosen_spanish_reading: 'Transliterar como nombre propio: «El-betel»'
  alternative_spanish_readings:
  - «Dios de Betel»
  rationale: La frase funciona como el nombre que Jacob da al lugar, así que conviene mantenerla como nombre propio. La nota conserva el sentido probable ('Dios de Betel') sin sustituir el acto de nombrar por una paráfrasis.
  doctrine_reference: Translation philosophy 2
translation_notes:
  revision_awareness: No se requirieron cambios respecto del control de revisión más reciente; la redacción sigue el acuerdo alto del audit trail y mantiene la decisión de transliterar el nombre del lugar, mientras preserva en español el sentido de la revelación divina singular.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el hebreo usa אֱלֹהִים y el referente es singular, por lo que corresponde «Dios».
  - Se preserva la transliteración del topónimo/nombre compuesto como «El-betel», coherente con el tratamiento de nombres propios del POB.
  - Se evita el calco «de delante de su hermano» porque en español moderno suena forzado y no añade precisión.
  - El pluscuamperfecto «se le había revelado» refleja el valor retrospectivo de la cláusula causal, en línea con el inglés auditado.
