  glossary_alignment: 'Se alinea correctamente con la política del proyecto al usar ''Yahvé'' para יְהוָה. No hay otros términos-glosario mayores en disputa. La mejora principal es lexical y estilística: preferir ''asunto'' sobre ''cosa'' para דָּבָר en este contexto, manteniendo la nota sobre la amplitud semántica.'
  issues:
