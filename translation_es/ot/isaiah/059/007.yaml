    text: O "para hacer el mal"; el hebreo expresa dirección u orientación hacia el mal y también puede entenderse de manera más explícitamente activa.
    reason: lexical_alternative
  - marker: b
    text: O "en sus caminos"; el término hebreo designa literalmente calzadas o caminos principales, y aquí también sugiere el curso de su conducta.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [a] para que ofrezca una alternativa genuina y se ajusta 'se apresuran a derramar' para mejor naturalidad en español. Además, se reemplaza 'caminos' por 'calzadas' en el texto principal para conservar mejor la especificidad léxica de בִּמְסִלּוֹתָם y dejar 'caminos' como alternativa en nota, en línea con el audit trail inglés y con la evidencia hebrea.
