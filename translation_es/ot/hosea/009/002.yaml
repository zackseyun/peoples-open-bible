translation:
  language: es
  text: La era y el lagar no los alimentarán, y el vino nuevo le fallará[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la defraudará» o «le resultará falso». El hebreo puede transmitir la idea de no cumplir lo esperado, con matiz de frustración de la expectativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּרֶן
  english_pob_choice: threshing floor
  chosen_spanish: era
  alternatives_spanish:
  - era de trilla
  - lugar de trilla
  lexicon: HALOT
  rationale: El hebreo designa la era de trilla, imagen agrícola concreta del sustento. En español, «era» conserva esa imagen de forma natural y breve, sin volverla abstracta.
- source_word: יֶקֶב
  english_pob_choice: winepress
  chosen_spanish: lagar
  alternatives_spanish:
  - prensa de vino
  - lagar de uvas
  lexicon: HALOT
  rationale: El término se refiere al lugar o aparato para prensar uvas. «Lagar» es el equivalente español tradicional y claro, y mantiene el paralelismo con «era».
- source_word: יִרְעֵם
  english_pob_choice: will not feed them
  chosen_spanish: no los alimentarán
  alternatives_spanish:
  - no los apacentarán
  - no les darán sustento
  lexicon: HALOT
  rationale: Con sujetos inanimados como la era y el lagar, el verbo conservado en español debe expresar provisión/sustento, no pastoreo literal. «Alimentarán» comunica bien la metáfora de provisión frustrada.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino fresco
  - mosto
  lexicon: HALOT
  rationale: El hebreo denota vino nuevo o recién producido, no vino en general. «Vino nuevo» preserva la referencia agrícola y es la forma más transparente en español bíblico actual.
- source_word: יְכַחֶשׁ
  english_pob_choice: will fail
  chosen_spanish: le faltará
  alternatives_spanish:
  - fallará
  - resultará falso para ella
  - la defraudará
  lexicon: HALOT
  rationale: El verbo puede expresar mentir, fallar o defraudar. Aquí, con «vino nuevo» como sujeto, la idea es que no cumplirá la expectativa de abundancia; «le faltará» expresa bien esa decepción sin perder la tensión del hebreo.
- source_word: בָּהּ
  english_pob_choice: her
  chosen_spanish: a ella
  alternatives_spanish:
  - para ella
  - contra ella
  lexicon: HALOT
  rationale: El sufijo es femenino singular y en contexto remite a Israel/Efraín personificada. «A ella» conserva la personificación femenina y evita suavizarlo a un plural impersonal.
theological_decisions:
- issue: Referente del sufijo femenino singular בָּהּ
  english_pob_reading: 'The suffix refers to Israel/Ephraim personified as a feminine singular entity: ''her.'''
  chosen_spanish_reading: 'El sufijo se refiere a Israel/Efraín personificada como entidad femenina singular: «a ella».'
  alternative_spanish_readings:
  - a ellos
  - a la tierra
  - para ella
  rationale: Se preserva la personificación profética frecuente en Oseas y se evita aplanar la imagen a un plural colectivo. La elección es literaria y contextual, no doctrinal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y la lectura auditada en inglés. Se conserva el paralelismo agrícola («era» / «lagar») y la personificación femenina de Israel/Efraín, sin introducir abstracciones que borren la imagen profética.
  spanish_consistency_notes:
  - Se mantuvo «vino nuevo» para תִּירוֹשׁ por consistencia con el valor agrícola del término.
  - «Era» y «lagar» preservan el par concreto del hebreo y son idiomáticos en español bíblico.
  - La forma verbal en plural («alimentarán») sigue la concordancia implícita con el sujeto compuesto «la era y el lagar».
