revisions:
- from: 'Y el resto de Galaad[a], y todo Basán, el reino de Og, lo di a la media tribu de Manasés: todo el territorio de Argob, es decir, todo Basán. Ese es llamado la tierra de los refaítas.'
  to: 'Y el resto de Galaad, y todo Basán, el reino de Og, lo di a la media tribu de Manasés: todo el territorio de Argob, es decir, todo Basán. Esa tierra se llama la tierra de los refaítas[a].'
  rationale: Se reubica la nota al término correcto («refaítas») para que corresponda al valor léxico de רְפָאִים, y se sustituye «Ese es llamado» por «Esa tierra se llama» para lograr un español natural sin perder el sentido descriptivo del hebreo. Se conserva el resto del contenido porque refleja fielmente la evidencia fuente y las decisiones del POB.
