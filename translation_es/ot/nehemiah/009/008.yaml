translation:
  language: es
  text: Hallaste su corazón fiel delante de ti, e hiciste un pacto con él para dar la tierra del cananeo, del hitita, del amorreo, del ferezeo, del jebuseo y del gergeseo, para dársela a su descendencia[a]. Y has cumplido tus palabras[b], porque tú eres recto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a su simiente»; hebreo: singular colectivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «has establecido tus palabras» o «has confirmado tus palabras».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «porque tú eres justo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמָצָאתָ
  english_pob_choice: You found
  chosen_spanish: Hallaste
  alternatives_spanish:
  - Encontraste
  - Viste
  lexicon: HALOT
  rationale: מצא en qal expresa 'hallar/encontrar'. 'Hallaste' conserva la inmediatez del hebreo y suena natural en español bíblico sin endurecerse en un calco.
- source_word: לְבָבוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - su mente
  lexicon: HALOT
  rationale: לֵבָב designa el centro interior de la persona. 'Corazón' es la equivalencia bíblica más transparente y amplia en español.
- source_word: נֶאֱמָן
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - constante
  lexicon: HALOT
  rationale: נֶאֱמָן comunica confiabilidad y lealtad. 'Fiel' reproduce bien la valoración del texto y la relación de pacto.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: La frase preposicional conserva el sentido relacional y evaluativo de estar ante Dios. 'Delante de ti' es natural y fiel.
- source_word: וְכָרוֹת עִמּוֹ הַבְּרִית
  english_pob_choice: and made a covenant with him
  chosen_spanish: e hiciste un pacto con él
  alternatives_spanish:
  - y cortaste un pacto con él
  - y estableciste el pacto con él
  lexicon: HALOT
  rationale: כרת ברית es el modismo hebreo de 'hacer/cortar pacto'. 'Hiciste un pacto' conserva el sentido idiomático sin introducir una expresión poco natural en español.
- source_word: לָתֵת
  english_pob_choice: to give
  chosen_spanish: para dar
  alternatives_spanish:
  - para conceder
  lexicon: HALOT
  rationale: El infinitivo expresa el propósito del pacto. 'Para dar' mantiene la repetición del hebreo y la sencillez del enunciado.
- source_word: אֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  lexicon: HALOT
  rationale: En este contexto, אֶרֶץ se refiere a la tierra prometida. 'La tierra' es la equivalencia bíblica directa y fluida en español.
- source_word: הַכְּנַעֲנִי ... הַגִּרְגָּשִׁי
  english_pob_choice: the Canaanite, the Hittite, the Amorite, the Perizzite, the Jebusite, and the Girgashite
  chosen_spanish: el cananeo, del hitita, del amorreo, del ferezeo, del jebuseo y del gergeseo
  alternatives_spanish:
  - el cananeo, el hitita, el amorreo, el perezeo, el jebuseo y el gergeseo
  lexicon: HALOT
  rationale: Se conservan los etnónimos en singular colectivo como en hebreo. 'Ferezeo' sigue la forma usual en español bíblico para פרִזִּי; se evita 'perezeo' por ser menos estable en el uso tradicional y menos claro.
- source_word: לְזַרְעוֹ
  english_pob_choice: to his offspring
  chosen_spanish: a su descendencia
  alternatives_spanish:
  - a su simiente
  - a su progenie
  lexicon: HALOT
  rationale: זֶרַע es un singular colectivo. 'Descendencia' transmite bien la colectividad y es comprensible en español actual; 'simiente' sería más literal pero menos transparente.
- source_word: וַתָּקֶם
  english_pob_choice: you have fulfilled
  chosen_spanish: has cumplido
  alternatives_spanish:
  - has establecido
  - has confirmado
  lexicon: HALOT
  rationale: En este contexto, קום con 'palabras' expresa hacerlas realidad / cumplirlas. 'Has cumplido' comunica el resultado consumado en lenguaje natural y fiel.
- source_word: דְּבָרֶיךָ
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tu palabra
  - tus promesas
  lexicon: HALOT
  rationale: El hebreo está en plural, por eso 'palabras'. Aunque 'promesas' explicita el sentido, el texto dice literalmente 'palabras'.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: '''Porque'' expresa bien la explicación causal del último hemistiquio y suena natural en español culto.'
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - recto y justo
  lexicon: HALOT
  rationale: צַדִּיק puede ser 'justo' o 'recto/righteous'. Aquí, al afirmar la fidelidad de Dios a su palabra, 'justo' funciona muy bien en español y conserva el peso moral/jurídico sin perder la base de pacto.
theological_decisions:
- issue: Valor de צַדִּיק aplicado a Dios
  english_pob_reading: for you are righteous
  chosen_spanish_reading: porque eres justo
  alternative_spanish_readings:
  - porque eres recto
  - porque eres justo y recto
  rationale: La línea final fundamenta el cumplimiento del pacto en la justicia moral de Dios. 'Justo' preserva ese sentido y evita estrechar la afirmación a un tecnicismo forense; en español, también responde bien al paralelismo con el cumplimiento de sus palabras.
  doctrine_reference: 'DOCTRINE.md: justicia/righteousness language; mantener la amplitud moral y de pacto cuando el contexto es la fidelidad divina.'
- issue: Sujeto implícito en la segunda mitad del verso
  english_pob_reading: you have fulfilled your words
  chosen_spanish_reading: has cumplido tus palabras
  alternative_spanish_readings:
  - has establecido tus palabras
  - has confirmado tus palabras
  rationale: Se mantiene el cambio de segunda persona directa hacia Dios, como en el hebreo. 'Cumplido' expresa la realización efectiva de la palabra divina sin suavizar la fuerza del verbo.
  doctrine_reference: 'DOCTRINE.md: preservar el énfasis en la fidelidad de Dios a sus promesas.'
translation_notes:
  revision_awareness: Se revisó la coherencia con el audit trail en inglés y no se detectaron cambios sustanciales necesarios respecto de la decisión previa aprobada. Se mantuvo la estructura del verso, el paralelismo final y la distinción entre 'palabras' y 'descendencia' sin borrar las alternativas documentadas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo, según el audio trail provisto, usa segunda persona directa sin el tetragrámaton explícito.
  - Se evitó 'SEÑOR' como sustituto editorial; la referencia a Dios queda por el pronombre de segunda persona, fiel al hebreo.
  - 'Se eligió ''fiel'' para נֶאֱמָן y ''justo'' para צַדִּיק, conservando dos matices distintos: lealtad de corazón y rectitud divina.'
  - '''Descendencia'' se usa como singular colectivo para זֶרַע; no se colapsa en un plural interpretativo dentro del texto principal.'
