revisions:
- from: Y la propuesta agradó al rey y a los gobernantes[a], y él les envió para hacer la paz[b][c], y la aceptaron.
  to: Y la propuesta agradó al rey y a los gobernantes[a], y él envió a ellos[b] para hacer la paz, y aceptaron[c].
  rationale: Se revisa la cláusula central para evitar la forma poco natural «les envió» sin objeto explícito, preservando al mismo tiempo la indeterminación del griego mediante «envió a ellos» apoyado por la nota literal. También se elimina el pronombre «la» en la última cláusula para reflejar mejor el objeto implícito de ἐπεδέξαντο.
