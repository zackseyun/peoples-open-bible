- from: Y después de bajar debajo del monte[a], ataron a Ajior y lo dejaron tendido al pie del monte, y se fueron a su señor.
  to: Y después de bajar al pie del monte, ataron a Ajior y lo dejaron tendido[a] al pie del monte, y se fueron a su señor.
  rationale: Se reemplaza «bajar debajo del monte» por «bajar al pie del monte» para expresar de manera idiomática la bajada a la parte inferior del monte. Se mueve la nota al término «tendido», porque la alternativa documentada corresponde a ἐρριμμένον, no a «monte». No se requieren cambios doctrinales ni una adjudicación adicional.
