- from: 'Los hijos de Gad, por sus clanes: de Zefón, el clan de los zefonitas[a]; de Hagui, el clan de los haggitas; de Shuni, el clan de los shunitas.'
  to: 'Los hijos de Gad, por sus clanes: de Zefón[a], el clan de los zefonitas; de Hagui, el clan de los haguítas; de Suni, el clan de los sunitas.'
  rationale: 'Se mantiene la estructura y el sentido del hebreo, así como la decisión textual de conservar «Zefón». Se ajustan las transliteraciones para un español más natural y consistente: «haguítas» evita el calco extraño «haggitas», y «Suni/sunitas» evita la grafía anglicada con sh. No se requiere nota adicional porque el cambio es estilístico/ortográfico, no textual ni teológico.'
