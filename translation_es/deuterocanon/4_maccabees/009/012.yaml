revisions:
- from: Pero cuando se cansaron de golpearlo con azotes[a], sin conseguir nada[b], lo subieron al rueda de tortura.
  to: Pero cuando se cansaron de golpearlo con azotes, sin conseguir nada, lo subieron a la rueda de tortura[a].
