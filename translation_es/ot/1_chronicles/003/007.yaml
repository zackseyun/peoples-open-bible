  spanish_consistency_notes:
  - 'Se mantiene el orden de la lista del hebreo y del POB inglés: Nogá, Néfeg y Jafía.'
  - No se añade glosa semántica porque el contexto es puramente onomástico.
  - La nota al pie conserva las alternativas documentadas para los nombres propios, sin introducir formas no atestiguadas por el audit trail.
