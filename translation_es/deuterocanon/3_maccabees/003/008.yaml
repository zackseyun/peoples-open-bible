base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/003/008.yaml
  text: But the Greeks in the city[a], having suffered no wrong, seeing the unexpected turmoil concerning the men and the sudden gatherings taking place, were not able to help; for their disposition was calling for an appeal[b], and some also were in a state of agitation and supposed that these things would change.
  footnotes:
  - marker: a
    text: Or 'their inclination prompted entreaty/encouragement.' The clause παρακλῆσιν γὰρ ἡ διάθεσις παρεκάλουν is syntactically compressed, so the exact nuance of παράκλησις is difficult to represent in smooth English.
    reason: lexical_alternative
  - marker: b
    text: Or 'some also were caught up in the commotion.' The rare adverb συνδρόμως may point either to inner agitation or to being swept along with the crowd activity.
    reason: lexical_alternative
