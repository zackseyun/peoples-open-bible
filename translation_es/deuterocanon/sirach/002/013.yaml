revisions:
- from: ¡Ay del corazón que no confía[a], porque tampoco se mantendrá en pie!
  to: ¡Ay del corazón que no confía[a], pues tampoco se mantendrá en pie!
  rationale: 'Se hace una reparación menor para mejorar la naturalidad y precisión: «pues tampoco» refleja mejor el enlace enfático del hebreo en español, y la nota cambia «flojo» por «decaído» y simplifica la variante griega a «no será protegido», más idiomático y fiel al sentido auditado.'
