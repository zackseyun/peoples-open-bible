    text: Or “no human voice.” The Hebrew phrase can refer specifically to voice or more broadly to any human sound.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the camp of Aram”; traditionally “the camp of the Syrians.”
    reason: alternative_reading
