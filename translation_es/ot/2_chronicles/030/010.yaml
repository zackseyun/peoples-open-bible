base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/010.yaml
  text: So the couriers passed from city to city in the land of Ephraim and Manasseh[a], as far as Zebulun[b]; but they laughed at them and mocked them.
  footnotes:
  - marker: a
    text: Or 'the runners' or 'the messengers.' The Hebrew term refers to official bearers of a message, likely traveling quickly.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew expression combines two verbs of contempt: they were ''laughing at'' the couriers and ''mocking'' them.'
    reason: lexical_alternative
