id: LUK.16.21
reference: Luke 16:21
source:
  edition: SBLGNT
  text: καὶ ἐπιθυμῶν χορτασθῆναι ⸀ἀπὸ τῶν πιπτόντων ἀπὸ τῆς τραπέζης τοῦ πλουσίου· ἀλλὰ καὶ οἱ κύνες ἐρχόμενοι ⸀ἐπέλειχον τὰ ἕλκη αὐτοῦ.
translation:
  text: and longing to be fed from what fell from the rich man's table[a]. But even the dogs came and licked his sores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the scraps that fell from the rich man's table.' The Greek says literally 'from what was falling,' with 'scraps' inferred from the meal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμῶν
  chosen: longing
  alternatives:
  - desiring
  - wanting
  lexicon: BDAG
  rationale: Present participle modifying Lazarus, expressing ongoing strong desire. 'Longing' conveys sustained yearning more naturally than the flatter 'wanting' while avoiding overstatement.
- source_word: χορτασθῆναι
  chosen: to be fed
  alternatives:
  - to be filled
  - to be satisfied
  lexicon: BDAG
  rationale: The passive infinitive here refers to receiving enough food. 'To be fed' fits the immediate food context better in English than the more abstract 'to be filled,' while preserving the passive sense.
- source_word: ἀπὸ τῶν πιπτόντων
  chosen: from what was falling
  alternatives:
  - from the things falling
  - from the scraps that fell
  lexicon: BDAG
  rationale: The participle with article functions substantivally. 'What was falling' is a transparent rendering of the Greek. 'Scraps' is interpretive and likely implied by context, but not explicit in the wording, so it is preserved only as an alternative.
- source_word: τράπεζης
  chosen: table
  lexicon: BDAG
  rationale: Standard sense in context of dining furniture/table fellowship.
- source_word: τοῦ πλουσίου
  chosen: the rich man's
  alternatives:
  - the wealthy man's
  - the rich one's
  lexicon: BDAG
  rationale: The adjective is substantival, referring back to the rich man in the parable. 'Rich man's' is idiomatic and contextually precise.
- source_word: ἀλλὰ καὶ
  chosen: But even
  alternatives:
  - but also
  - indeed even
  lexicon: BDAG
  rationale: This combination marks a contrast with an added surprising element. 'But even' captures both the adversative and the emphatic addition.
- source_word: οἱ κύνες
  chosen: the dogs
  lexicon: BDAG
  rationale: Literal plural noun. No contextual basis for softening or specifying beyond 'dogs.'
- source_word: ἐρχόμενοι
  chosen: came
  alternatives:
  - coming
  - as they came
  lexicon: BDAG
  rationale: 'The participle is attendant/circumstantial to the main verb and is best rendered idiomatically in English as a finite verb: ''came and were licking.'''
- source_word: ἐπέλειχον
  chosen: were licking
  alternatives:
  - licked
  lexicon: BDAG
  rationale: Imperfect tense suggests repeated or ongoing action. 'Were licking' preserves the imperfective aspect better than simple past 'licked.'
- source_word: τὰ ἕλκη αὐτοῦ
  chosen: his sores
  alternatives:
  - his ulcers
  - his wounds
  lexicon: BDAG
  rationale: ἕλκη refers to ulcerous sores or open lesions. 'Sores' is accurate and readable modern English; 'ulcers' is more clinical, and 'wounds' is broader than the Greek.
