translation:
  language: es
  text: Entonces le escupieron en el rostro y lo golpearon con los puños[a][b], y otros le dieron bofetadas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le escupieron en la cara». La expresión griega dice literalmente que escupieron «en el rostro» de él, un giro idiomático para escupirle directamente.
    reason: lexical_alternative
  - marker: b
    text: O «lo golpearon» o «le dieron puñetazos». El verbo indica específicamente golpes con el puño.
    reason: lexical_alternative
  - marker: c
    text: O «otros le dieron golpes» o «otros lo golpearon con la mano abierta». El verbo suele referirse a una bofetada.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca avance narrativo temporal; «Entonces» conserva la secuencia natural en español sin añadir matiz interpretativo.
- source_word: ἐνέπτυσαν εἰς τὸ πρόσωπον αὐτοῦ
  english_pob_choice: spat in his face
  chosen_spanish: le escupieron en el rostro
  alternatives_spanish:
  - le escupieron en la cara
  - escupieron en su rostro
  lexicon: BDAG
  rationale: El griego expresa un acto directo de desprecio mediante escupir hacia/el rostro; «le escupieron en el rostro» mantiene la fuerza y la dirección del gesto sin calcar de forma extraña.
- source_word: ἐκολάφισαν αὐτόν
  english_pob_choice: struck him with their fists
  chosen_spanish: lo golpearon con los puños
  alternatives_spanish:
  - lo golpearon
  - lo aporrearon con los puños
  - lo dieron puñetazos
  lexicon: BDAG
  rationale: κολαφίζω indica golpes dados con el puño; «con los puños» conserva la precisión lexical del inglés POB y resulta natural en español.
- source_word: οἱ δὲ ἐράπισαν
  english_pob_choice: and others slapped him
  chosen_spanish: y otros le dieron bofetadas
  alternatives_spanish:
  - y otros lo abofetearon
  - y otros le pegaron con la mano abierta
  lexicon: BDAG
  rationale: El artículo con δέ funciona sustantivamente como «otros»; ῥαπίζω sugiere golpe con la mano abierta, por eso «bofetadas» preserva el matiz sin perder inteligibilidad.
theological_decisions:
- issue: Violencia y humillación infligidas a Jesús
  english_pob_reading: 'Render the actions concretely and without softening: spitting, fist-striking, and slapping.'
  chosen_spanish_reading: 'Presentar las acciones de manera concreta y sin suavizarlas: escupir, golpear con los puños y dar bofetadas.'
  alternative_spanish_readings:
  - mistretáronlo
  - lo maltrataron
  - lo golpearon
  rationale: La escena resalta la humillación pública de Jesús; una traducción concreta preserva el peso narrativo y evita diluir la violencia con términos demasiado generales.
  doctrine_reference: 'Translation philosophy: primacía del texto original, con español claro y digno.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail en inglés. Se conserva la secuencia temporal, el desprecio expresado por el escupitajo, la precisión de κολαφίζω como golpes con los puños y el valor de ῥαπίζω como bofetadas. No se detectaron revisiones previas aplicadas en el expediente.
  spanish_consistency_notes:
  - Se usa «rostro» para mantener un registro digno y bíblico, sin perder la naturalidad del español.
  - Se distingue entre «golpear con los puños» y «dar bofetadas» para reflejar la diferencia entre κολαφίζω y ῥαπίζω.
  - Se evita «SEÑOR» u otra convención no pertinente; este versículo no contiene el nombre divino ni cristológicos titulados.
  - Los marcadores de nota aparecen en el texto exactamente donde corresponde al matiz léxico.
