translation:
  language: es
  text: 'Cuando Húsai vino a Absalón, Absalón le dijo: «Ahitofel ha hablado de esta manera. ¿Debemos hacer como él dice?[a] Si no, habla tú»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «¿Debemos hacer según su palabra?». El hebreo es más literal: «¿Debemos hacer su palabra?», es decir, poner en práctica el consejo de Ahitofel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: En este contexto narrativo, el movimiento es hacia Absalón; «llegó» comunica con naturalidad la llegada sin perder el avance de la acción.
- source_word: חוּשַׁי
  english_pob_choice: Hushai
  chosen_spanish: Húsai
  alternatives_spanish:
  - Jusai
  - Hushai
  lexicon: Transliteración propia
  rationale: Se conserva el nombre propio con una transliteración española sobria y publicable; la acentuación ayuda a la lectura en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - ante
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección se expresa de manera natural en español con «a».
- source_word: וַיֹּאמֶר ... לֵאמֹר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - habló
  - le habló diciendo
  lexicon: HALOT
  rationale: En español, la fórmula narrativa se reduce con naturalidad a «le dijo»; mantiene la introducción del discurso sin sobrecargar la sintaxis.
- source_word: כַּדָּבָר הַזֶּה
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - según esta palabra
  - como esto
  lexicon: HALOT
  rationale: «De esta manera» preserva el sentido de modo/correspondencia con lo dicho por Ahitofel, evitando calcar «palabra» de forma rígida.
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  - ha dicho
  lexicon: HALOT
  rationale: El perfecto español expresa adecuadamente una acción verbal previa con relevancia inmediata en el diálogo.
- source_word: הֲנַעֲשֶׂה
  english_pob_choice: Should we do
  chosen_spanish: ¿Haremos
  alternatives_spanish:
  - ¿Debemos hacer
  - ¿Hemos de hacer
  lexicon: HALOT
  rationale: La pregunta deliberativa admite una formulación directa en futuro interrogativo; en español suena natural en el contexto de consulta y decisión.
- source_word: אֶת דְּבָרוֹ
  english_pob_choice: as he says / what he says
  chosen_spanish: según lo que él dice
  alternatives_spanish:
  - según su palabra
  - lo que él dice
  lexicon: HALOT
  rationale: Se preserva la fuerza idiomática de «su palabra» sin sonar forzado en español; la decisión hace explícito el valor de consejo/propuesta que el hebreo puede implicar.
- source_word: אִם אַיִן
  english_pob_choice: If not
  chosen_spanish: Si no
  alternatives_spanish:
  - Pero si no
  - En caso contrario
  lexicon: HALOT
  rationale: Es la contraparte condicional breve y natural del hebreo en el diálogo deliberativo.
- source_word: אַתָּה דַבֵּר
  english_pob_choice: you speak
  chosen_spanish: tú habla
  alternatives_spanish:
  - habla tú
  - tú di
  lexicon: HALOT
  rationale: El pronombre enfático se mantiene con «tú», y el imperativo conserva el contraste del hebreo entre la alternativa propuesta y la orden a Húsai.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión del inglés POB que prefirió «do as he says» frente a «do what he says». Por eso la traducción española evita una expresión demasiado literal y opta por una formulación idiomática de correspondencia: «según lo que él dice» / «de esta manera», manteniendo el matiz de seguir el consejo de Ahitofel. También se preservó la tensión léxica entre la literalidad de דְּבָרוֹ («su palabra») y su sentido contextual de propuesta o consejo, sin convertirlo en una paráfrasis amplia.'
  spanish_consistency_notes:
  - Se emplea «Húsai» y «Absalón» de forma consistente con la tradición de nombres bíblicos en español, manteniendo una transliteración clara.
  - «Ahitofel» se escribe sin h inicial, de acuerdo con el uso español corriente y la transliteración del nombre hebreo.
  - La puntuación mantiene comillas latinas y diálogo directo en estilo editorial español.
  - No se introduce «SEÑOR» ni terminología teológica ajena al versículo; la decisión es puramente narrativa y lexical.
