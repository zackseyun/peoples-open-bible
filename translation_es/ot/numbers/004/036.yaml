lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: And ... were
  chosen_spanish: fueron
  alternatives_spanish:
  - y fueron
  - y resultaron ser
  lexicon: HALOT
  rationale: El hebreo con waw consecutiva sobre היה introduce el resultado del conteo; en español, 'fueron' comunica de forma natural ese valor copulativo/resultativo sin añadir énfasis innecesario.
- source_word: פְקֻדֵיהֶם
  english_pob_choice: those counted from them
  chosen_spanish: los contados de ellos
  alternatives_spanish:
  - los contados entre ellos
  - sus contados
  - los registrados de ellos
  lexicon: HALOT
  rationale: Con פקד en contexto censal, la forma nominal refiere a los que fueron contados o registrados. 'Los contados de ellos' conserva la relación partitiva/resultativa del hebreo y evita introducir 'varones' que aquí no está explícito.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה designa una unidad familiar/clánica dentro de la organización israelita. 'Por sus clanes' es claro en español y mantiene el sentido clasificatorio del texto censal.
- source_word: אַלְפַּיִם שְׁבַע מֵאוֹת וַחֲמִשִּׁים
  english_pob_choice: two thousand seven hundred and fifty
  chosen_spanish: dos mil setecientos cincuenta
  alternatives_spanish:
  - '2.750'
  - dos mil 700 y cincuenta
  lexicon: HALOT
  rationale: El hebreo expresa una suma cardinal exacta; en español normativo, 'dos mil setecientos cincuenta' preserva el total con máxima claridad y naturalidad.
