translation:
  language: es
  text: Aún los hijos de Nof[a][b] y de Tahpanhés te han rapado[c] la coronilla[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de» también puede significar «habitantes de» o «gente de» una ciudad.
    reason: lexical_alternative
  - marker: b
    text: Nof suele identificarse con Menfis, en Egipto.
    reason: cultural_note
  - marker: c
    text: El verbo hebreo literalmente puede significar «han pastoreado», «han apacentado» o «se han alimentado de»; algunas traducciones lo interpretan como «han quebrantado» o «han aplastado». Aquí se traduce «rapado» para expresar el resultado humillante de la imagen en este contexto.
    reason: lexical_alternative
  - marker: d
    text: O «la corona de tu cabeza» o «tu cuero cabelludo».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Aun
  alternatives_spanish:
  - También
  lexicon: HALOT
  rationale: El hebreo añade énfasis; en español «Aun» conserva ese matiz enfático mejor que «también» en este contexto adversativo.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: «Hijos de» reproduce el giro hebreo de manera natural en español y mantiene la posibilidad de referencia poblacional sin perder la forma literal del original.
- source_word: נֹף
  english_pob_choice: Noph
  chosen_spanish: Nof
  alternatives_spanish:
  - Memfis
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. «Nof» sigue de cerca la forma hebrea; «Memfis» sería una identificación cultural, no el nombre del texto.
- source_word: תחפנס
  english_pob_choice: Tahpanhes
  chosen_spanish: Tahpanhés
  alternatives_spanish:
  - Dafne
  - Dafnas
  lexicon: HALOT
  rationale: Se translitera el topónimo. La acentuación final ayuda a la lectura en español sin alterar la identificación del lugar.
- source_word: יִרְעוּךְ
  english_pob_choice: have shaved
  chosen_spanish: te han rapado
  alternatives_spanish:
  - te han rasurado
  - te han pastoreado
  lexicon: HALOT
  rationale: Aunque el verbo base puede significar «pastorear/apacentar», el contexto y la revisión inglesa favorecen la imagen de rapar/rasurar como resultado humillante sobre la cabeza. «Rapado» es idiomático y preserva la violencia de la metáfora.
- source_word: קָדְקֹד
  english_pob_choice: your crown
  chosen_spanish: la coronilla
  alternatives_spanish:
  - tu corona
  - el vértice de tu cabeza
  - tu cuero cabelludo
  lexicon: HALOT
  rationale: «קָדְקֹד» designa la parte alta de la cabeza. «Coronilla» comunica bien la referencia corporal en español y evita confundir la metáfora con una corona literal.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «have grazed» por «have shaved» para reflejar mejor el sentido contextual del verbo. La traducción española sigue esa revisión y evita suavizar la imagen. También se conserva el topónimo transliterado y se mantiene la ambigüedad poblacional de «hijos de» mediante nota.
  spanish_consistency_notes:
  - Se usa «Aun» para el énfasis inicial, en línea con el «Even» del audit trail.
  - Se prefieren transliteraciones de topónimos conforme a la práctica POB documentada.
  - Se mantiene el valor corporal concreto de קָדְקֹד con «coronilla» para no generalizar a «cabeza».
