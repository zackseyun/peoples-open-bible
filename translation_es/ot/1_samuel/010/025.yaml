translation:
  language: es
  text: Entonces Samuel expuso al pueblo la norma de la realeza[a], y la escribió en el libro y la puso delante de Yahvé. Luego Samuel despidió a todo el pueblo[b], cada hombre a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la costumbre de la realeza». La frase hebrea puede referirse a una norma, procedimiento o práctica establecida del gobierno real.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre a su casa», expresión distributiva que significa que el pueblo se fue por separado a sus respectivas casas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: told
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - les habló
  lexicon: HALOT
  rationale: El verbo דבר con אֶל y un contenido específico admite la idea de dirigirse al pueblo con una comunicación concreta. En español, «habló» conserva el acto de comunicación sin forzar un calco; «dijo» sería posible, pero menos natural con el objeto conceptual que sigue.
- source_word: מִשְׁפַּט הַמְּלֻכָה
  english_pob_choice: the custom of the kingship
  chosen_spanish: el estatuto de la monarquía
  alternatives_spanish:
  - la costumbre de la monarquía
  - la norma de la monarquía
  - el procedimiento de la monarquía
  lexicon: HALOT
  rationale: מִשְׁפַּט puede abarcar ordenanza, norma establecida o disposición legal. «Estatuto» comunica mejor ese contenido regulador en español que «costumbre», sin reducirlo a mera práctica social. «Monarquía» refleja mejor el oficio/institución que «reino».
- source_word: וַיִּכְתֹּב בַּסֵּפֶר
  english_pob_choice: he wrote it in the book
  chosen_spanish: lo escribió en el libro
  alternatives_spanish:
  - lo escribió en un libro
  - lo escribió en el rollo
  lexicon: HALOT
  rationale: El objeto es singular y queda implícito por el contexto inmediato; por eso «lo» sigue la revisión auditada. «Libro» mantiene la indeterminación del hebreo סֵפֶר sin especificar material o forma.
- source_word: וַיַּנַּח לִפְנֵי יְהוָה
  english_pob_choice: laid it before Yahweh
  chosen_spanish: lo puso delante de Yahvé
  alternatives_spanish:
  - lo colocó delante de Yahvé
  - lo depositó delante de Yahvé
  lexicon: HALOT
  rationale: וַיַּנַּח expresa poner o dejar algo en un lugar. «Puso delante de Yahvé» es natural en español y conserva el sentido cultual de depositar el documento ante la presencia divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino según el criterio POB para el Tetragrámaton, evitando la sustitución por un título. «Yahvé» es la forma española estable para este propósito.
- source_word: וַיְשַׁלַּח
  english_pob_choice: sent all the people away
  chosen_spanish: despidió a todo el pueblo
  alternatives_spanish:
  - envió a todo el pueblo
  - mandó irse a todo el pueblo
  lexicon: HALOT
  rationale: En contexto no es un envío misionero sino una despedida/dispensa para que se retiren. «Despidió» reproduce bien esa fuerza en español y evita ambigüedad.
- source_word: אִישׁ לְבֵיתוֹ
  english_pob_choice: each man to his house
  chosen_spanish: cada hombre a su casa
  alternatives_spanish:
  - cada uno a su casa
  - cada hombre a su hogar
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y masculina singular. «Cada hombre» preserva esa forma, conforme al criterio de precisión formal; «casa» mantiene la correspondencia con בַּיִת.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa directamente el Tetragrámaton. La forma elegida preserva el nombre propio del pacto en vez de reemplazarlo por un título, siguiendo la política POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión distributiva masculina אִישׁ לְבֵיתוֹ
  english_pob_reading: each man to his house
  chosen_spanish_reading: cada hombre a su casa
  alternative_spanish_readings:
  - cada uno a su casa
  rationale: El hebreo usa singular masculino distributivo; se mantiene en la traducción principal para no neutralizar la forma del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión auditada: se mantiene el objeto singular implícito («lo»), se refleja מִשְׁפַּט הַמְּלֻכָה con un término regulador más preciso en español, y se conserva la decisión doctrinal de renderizar el Tetragrámaton como Yahvé/Yahvé en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - «Monarquía» evita la ambigüedad de «reino» cuando el hebreo alude a la institución real.
  - La frase final conserva la fuerza distributiva masculina del hebreo sin paráfrasis innecesaria.
  - El texto principal evita arcaísmos fuertes y usa español bíblico actual, con registro digno.
