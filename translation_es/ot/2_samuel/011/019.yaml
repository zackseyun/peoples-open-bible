translation:
  language: es
  text: 'Y él mandó al mensajero[a], diciendo: «Cuando hayas terminado de hablarle al rey todas las palabras de la guerra»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «todos los asuntos de la guerra», es decir, el informe completo acerca de la batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: And he commanded
  chosen_spanish: Y él mandó
  alternatives_spanish:
  - Y él ordenó
  - Y él dio instrucciones
  lexicon: HALOT
  rationale: צוה expresa una acción de autoridad; «mandó» conserva ese tono y suena natural en español narrativo sin debilitar la fuerza del verbo.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: al mensajero
  alternatives_spanish:
  - al enviado
  - al mensajero (humano)
  lexicon: HALOT
  rationale: En este contexto de informe militar, מַלְאָךְ designa a un mensajero humano, no a un ángel. «Mensajero» es la opción más directa y fiel.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'y le dijo:'
  - así
  lexicon: HALOT
  rationale: La forma introductoria de discurso directo se conserva con «diciendo», que reproduce de manera estándar la función narrativa del hebreo.
- source_word: כְּכַלּוֹתְךָ
  english_pob_choice: When you have finished
  chosen_spanish: Cuando hayas terminado
  alternatives_spanish:
  - Al terminar
  - Después de que hayas terminado
  lexicon: HALOT
  rationale: El valor temporal se expresa con naturalidad mediante una cláusula con subjuntivo perfecto en español, sin añadir una interpretación de inmediatez que el hebreo no exige.
- source_word: כָל דִּבְרֵי הַמִּלְחָמָה
  english_pob_choice: all the words of the battle
  chosen_spanish: todas las palabras de la guerra
  alternatives_spanish:
  - todos los asuntos de la guerra
  - todo el relato de la guerra
  - todas las cosas de la guerra
  lexicon: HALOT
  rationale: Se conserva la tensión literal entre דִּבְרֵי («palabras/materias») y el contexto de reporte militar. «Palabras de la guerra» mantiene el paralelo fuente; una paráfrasis como «relato» explicaría demasiado. El inglés revisado también retrocedió desde «news» hacia una formulación más cercana al hebreo, lo que favorece preservar la literalidad aquí.
- source_word: לְדַבֵּר אֶל הַמֶּלֶךְ
  english_pob_choice: speaking to the king
  chosen_spanish: hablar al rey
  alternatives_spanish:
  - hablar con el rey
  - dirigirse al rey
  - informar al rey
  lexicon: HALOT
  rationale: דַּבֵּר con אֶל indica el acto de hablar dirigido al rey. «Hablar al rey» conserva esa dirección y evita introducir el matiz interpretativo de «informar», que no está explícito en el hebreo.
translation_notes:
  revision_awareness: El texto inglés de referencia fue revisado desde una paráfrasis más interpretativa («news of the battle») hacia una formulación más cercana al hebreo («all the words of the battle»). La traducción española sigue esa revisión y conserva la tensión literal de דִּבְרֵי sin resolverla del todo en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «mensajero» para מַלְאָךְ por coherencia con el contexto humano/militar.
  - Se evita «informar» en el texto principal para no cerrar indebidamente el alcance de דִּבְרֵי הַמִּלְחָמָה.
  - La puntuación introduce el discurso directo de forma natural en español.
  - La nota conserva la alternativa semántica relevante que el inglés POB también documenta.
