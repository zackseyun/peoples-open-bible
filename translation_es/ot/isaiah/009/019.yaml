translation:
  language: es
  text: Corta por la derecha[a], pero tiene hambre; come por la izquierda, pero no se sacia. Cada uno come la carne de su propio brazo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arrebata por la derecha ... devora por la izquierda». La imagen hebrea puede sugerir un acto violento de apoderarse de alimento, no solo comer de manera ordinaria.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «Cada uno come la carne de su brazo». Esto probablemente describe una lucha interna extrema o autodestrucción, con imaginería canibalística.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּגְזֹר
  english_pob_choice: He cuts
  chosen_spanish: Corta
  alternatives_spanish:
  - Corta de golpe
  - Arrebata
  lexicon: HALOT
  rationale: גזר expresa la acción concreta de cortar; en este contexto de hambre y violencia, 'corta' conserva la imagen corporal y permite la posibilidad de un matiz de apoderarse violentamente sin abandonar el sentido básico.
- source_word: עַל יָמִין
  english_pob_choice: on the right
  chosen_spanish: por la derecha
  alternatives_spanish:
  - a la derecha
  - del lado derecho
  lexicon: HALOT
  rationale: La relación espacial del hebreo se mantiene con una expresión natural en español que preserve el paralelismo con 'por la izquierda'.
- source_word: וְרָעֵב
  english_pob_choice: but is hungry
  chosen_spanish: pero tiene hambre
  alternatives_spanish:
  - pero sigue hambriento
  - y tiene hambre
  lexicon: HALOT
  rationale: 'Se conserva el sentido resultante: a pesar de la acción, permanece el hambre. ''Tiene hambre'' es idiomático y claro en español.'
- source_word: וַיֹּאכַל
  english_pob_choice: he eats
  chosen_spanish: come
  alternatives_spanish:
  - devora
  - consume
  lexicon: HALOT
  rationale: אכל es el verbo común 'comer'; 'come' evita intensificar más allá del hebreo, dejando que el contexto cargue la dureza de la escena.
- source_word: עַל שְׂמֹאול
  english_pob_choice: on the left
  chosen_spanish: por la izquierda
  alternatives_spanish:
  - a la izquierda
  - del lado izquierdo
  lexicon: HALOT
  rationale: Se traduce en paralelo con la primera mitad del verso para conservar la estructura retórica del hebreo.
- source_word: וְלֹא שָׂבֵעוּ
  english_pob_choice: but is not satisfied
  chosen_spanish: pero no se sacia
  alternatives_spanish:
  - pero no queda satisfecho
  - pero no queda saciado
  lexicon: HALOT
  rationale: שׂבע comunica saciedad; 'no se sacia' es una forma natural que mantiene la imagen de apetito no satisfecho y respeta el ajuste singular documentado en la revisión inglesa.
- source_word: אִישׁ
  english_pob_choice: Each one
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Cada hombre
  - Uno tras otro
  lexicon: HALOT
  rationale: Aunque la forma es singular masculina, el valor es distributivo; 'Cada uno' conserva ese alcance sin volverlo genérico de manera opaca.
- source_word: בְּשַׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carnecilla
  - la carne
  lexicon: HALOT
  rationale: '''Carne'' reproduce el lenguaje corporal y mantiene la crudeza de la imagen, sin suavizarla con términos menos literales.'
- source_word: זְרֹעוֹ
  english_pob_choice: his own arm
  chosen_spanish: de su propio brazo
  alternatives_spanish:
  - de su propio brazo
  - de su brazo
  lexicon: HALOT
  rationale: זְרוֹעַ puede significar 'brazo'; en esta expresión se conserva el sentido físico literal, como hace el inglés auditado, y 'propio' explicita el valor reflexivo.
- source_word: יֹאכֵלוּ
  english_pob_choice: eats
  chosen_spanish: come
  alternatives_spanish:
  - comen
  lexicon: HALOT
  rationale: 'Se sigue la concordancia distributiva: aunque el hebreo usa plural, el español puede naturalizarlo con ''Cada uno come'' para preservar el sentido sin perder el sujeto distributivo.'
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del inglés POB: singular coherente en ''no se sacia'' y en el distributivo ''Cada uno''. También conserva la alternativa lexical violenta documentada para גזר, sin convertirla en la lectura principal.'
  spanish_consistency_notes:
  - Se prefirió 'brazo' para זְרוֹעַ porque la expresión es literal y el contexto no exige una metáfora de fuerza.
  - Se mantuvo el paralelismo 'por la derecha / por la izquierda' para reflejar la simetría hebrea.
  - '''Carne'' se conserva por su fuerza corporal y por coherencia con el uso bíblico de בשר.'
