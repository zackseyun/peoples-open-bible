translation:
  language: es
  text: Yahvé entregó a Laquis en manos de Israel[a], y la capturó al segundo día, y la golpeó al filo de la espada, junto con toda persona que había en ella, tal como había hecho con Libna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “toda alma que había en ella”; un modismo que significa toda persona de la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para el nombre divino del pacto. 'Yahvé' preserva la referencia al tetragrámaton sin ocultarlo como 'SEÑOR', y mantiene un registro bíblico claro y reverente en español.
- source_word: וַיִּתֵּן ... בְּיַד
  english_pob_choice: gave ... into the hand of
  chosen_spanish: entregó ... en mano de
  alternatives_spanish:
  - dio ... en mano de
  - lo puso en poder de
  lexicon: HALOT
  rationale: El giro hebreo expresa transferencia a la autoridad o poder de otro. 'Entregó ... en mano de' conserva la imagen idiomática y su fuerza militar, y funciona de manera natural en español bíblico.
- source_word: לָכִישׁ
  english_pob_choice: Lachish
  chosen_spanish: Laquis
  alternatives_spanish:
  - Lachis
  lexicon: Topónimo tradicional en español bíblico
  rationale: '''Laquis'' es la forma asentada en español y resulta más reconocible para lectores bíblicos que una transliteración más cercana al inglés.'
- source_word: וַיִּלְכְּדָהּ
  english_pob_choice: captured it
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la apresó
  lexicon: HALOT
  rationale: El verbo refiere la toma militar de la ciudad. 'La capturó' comunica bien el acto sin añadir matices no presentes en el hebreo.
- source_word: בַּיּוֹם הַשֵּׁנִי
  english_pob_choice: on the second day
  chosen_spanish: al segundo día
  alternatives_spanish:
  - en el segundo día
  - el segundo día
  lexicon: HALOT
  rationale: La expresión española 'al segundo día' reproduce con naturalidad la secuencia temporal del hebreo y es idiomática en narración bíblica.
- source_word: וַיַּכֶּהָ לְפִי חֶרֶב
  english_pob_choice: struck it with the edge of the sword
  chosen_spanish: la hirió a filo de espada
  alternatives_spanish:
  - la golpeó con el filo de la espada
  - la hirió con la espada
  lexicon: HALOT
  rationale: '''A filo de espada'' conserva la imagen del hebreo ''a la boca de la espada'' tal como la POB inglesa la reflejó con ''the edge of the sword''. ''Hirió'' mantiene el verbo de acción violenta sin suavizarlo.'
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  english_pob_choice: every person who was in it
  chosen_spanish: toda persona que había en ella
  alternatives_spanish:
  - todo ser viviente que había en ella
  - toda alma que había en ella
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa a las personas de la ciudad, no una oposición antropológica entre cuerpo y alma. 'Toda persona' evita ambigüedad doctrinal en español y preserva el sentido colectivo humano del original.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה לְלִבְנָה
  english_pob_choice: just as he had done to Libnah
  chosen_spanish: tal como había hecho a Libna
  alternatives_spanish:
  - como había hecho a Libna
  - tal como se había hecho a Libna
  lexicon: HALOT
  rationale: La comparación retoma el precedente narrativo. Se conserva el sujeto singular implícito del hebreo y la relación con el tratamiento previo de Libna, siguiendo la lectura auditada de la POB inglesa.
theological_decisions:
- issue: Rendición del nombre divino en un relato de conquista
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La decisión mantiene la identificación explícita del nombre del pacto y evita la sustitución litúrgica por 'SEÑOR'. Esto es coherente con la política del proyecto y con la transparencia textual exigida por la fuente hebrea.
  doctrine_reference: DOCTRINE.md / políticas de transliteración del nombre divino
- issue: Mención de la destrucción de los habitantes mediante נֶפֶשׁ
  english_pob_reading: every person who was in it
  chosen_spanish_reading: toda persona que había en ella
  alternative_spanish_readings:
  - toda alma que había en ella
  - cada persona que estaba en ella
  rationale: Se evita traducir literalmente por 'alma', porque en este contexto el hebreo usa נֶפֶשׁ como referencia colectiva a los habitantes. 'Persona' preserva el alcance humano sin introducir una antropología ajena al pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Causa/autoridad de la conquista en singular final
  english_pob_reading: just as he had done to Libnah
  chosen_spanish_reading: tal como había hecho a Libna
  alternative_spanish_readings:
  - tal como ellos habían hecho a Libna
  - tal como se había hecho a Libna
  rationale: Se conserva el singular del verbo hebreo, que la POB inglesa también retuvo. En español, esta forma respeta la sintaxis narrativa y la agencia representativa del líder sin forzar una pluralización explicativa.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La revisión más reciente indicó alto acuerdo y no requirió cambios sustanciales. Se mantuvo la línea auditada de la POB inglesa en los puntos sensibles: nombre divino, idiomática militar de ''en mano de'', y el modismo de נֶפֶשׁ como referencia a personas. La principal adaptación al español consistió en usar formas naturales y asentadas (''Laquis'', ''al segundo día'', ''a filo de espada'') sin perder la estructura del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה, conforme al estándar del proyecto.
  - '''Laquis'' sigue la forma española bíblica habitual, no la transliteración inglesa.'
  - '''Toda persona'' conserva el valor colectivo de נֶפֶשׁ y evita un calco doctrinalmente cargado.'
  - El sujeto implícito del último verbo queda en singular para respetar el hebreo y la auditoría inglesa.
  - La nota al pie marca la equivalencia idiomática de נֶפֶשׁ sin deshacer la solemnidad del juicio narrado.
