translation:
  language: es
  text: Y le tocó la mano, y la fiebre la dejó, y ella se levantó y le sirvió.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - tomó la mano de
  - se puso en contacto con
  lexicon: BDAG
  rationale: ἅπτομαι aquí expresa contacto físico sencillo en un contexto de sanidad. «Tocó» es el equivalente natural y directo en español, sin sobrecargar el gesto.
- source_word: τῆς χειρὸς αὐτῆς
  english_pob_choice: her hand
  chosen_spanish: la mano[a]
  alternatives_spanish:
  - su mano
  - la mano de ella
  lexicon: BDAG
  rationale: χείρ significa normalmente «mano». En español, el objeto directo natural es «la mano»; el posesivo se entiende por el contexto y por la referencia previa a la mujer.
- source_word: ἀφῆκεν αὐτὴν ὁ πυρετός
  english_pob_choice: the fever left her
  chosen_spanish: la fiebre la dejó
  alternatives_spanish:
  - la fiebre se apartó de ella
  - la fiebre se fue de ella
  lexicon: BDAG
  rationale: ἀφίημι en esta construcción puede rendirse como «dejó» o «abandonó». «La fiebre la dejó» conserva la personificación del griego y suena natural en español.
- source_word: πυρετός
  english_pob_choice: fever
  chosen_spanish: fiebre
  alternatives_spanish:
  - enfermedad febril
  - calentura
  lexicon: BDAG
  rationale: πυρετός denota fiebre de manera directa; no hace falta ampliar el sentido.
- source_word: ἠγέρθη
  english_pob_choice: she got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: ἐγείρω en pasivo aquí describe que se incorporó después de sanar. «Se levantó» expresa el hecho sin introducir un matiz de resurrección que el contexto inmediato no exige.
- source_word: διηκόνει αὐτῷ
  english_pob_choice: she served him
  chosen_spanish: le servía
  alternatives_spanish:
  - le sirvió
  - le atendía
  - le ministraba
  lexicon: BDAG
  rationale: διακονέω significa servir o atender. El imperfecto español «servía» reproduce mejor la acción continua o habitual que el simple perfecto, sin añadir «comenzó» que no está en el griego.
theological_decisions:
- issue: Posible sobrelectura de ἠγέρθη como lenguaje de resurrección
  english_pob_reading: Render as 'she got up' in ordinary narrative sense
  chosen_spanish_reading: «se levantó» en sentido narrativo ordinario
  alternative_spanish_readings:
  - «resucitó»
  - «fue levantada»
  rationale: Aunque ἐγείρω puede tener resonancias de resurrección en otros contextos, aquí solo indica que la mujer se incorporó tras la sanidad. «Se levantó» evita importar una carga teológica ajena al pasaje.
  doctrine_reference: 'Principio de traducción POB: no introducir teología no exigida por el texto; lectura narrativa inmediata de ἐγείρω'
- issue: Valor aspectual del imperfecto διηκόνει
  english_pob_reading: ‘served him’ rather than ‘began serving him’ after revision
  chosen_spanish_reading: «le servía»
  alternative_spanish_readings:
  - «le sirvió»
  - «empezó a servirle»
  rationale: El griego imperfecto puede señalar acción continua o en desarrollo. «Le servía» preserva ese matiz sin añadir una iniciación explícita que la revisión inglesa retiró por no estar expresada en el texto.
  doctrine_reference: Principio de fidelidad aspectual y sobriedad exegética del POB
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó «began» de «began serving him» porque no está expresado en el griego. La presente propuesta sigue esa decisión: conserva el imperfecto con «le servía» y evita añadir un inicio explícito. También mantiene el tono narrativo simple de la secuencia sin introducir lecturas teológicas adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «servía» para reflejar el imperfecto de διηκόνει y evitar una simplificación al pretérito puntual.
  - «Se levantó» se elige por claridad narrativa y para no cargar ἠγέρθη con resonancias de resurrección.
  - El apóstrofo de la nota se ancla en «mano» para señalar la alternativa de traducción de διηκόνει en español, siguiendo la nota inglesa de equivalente funcional.
