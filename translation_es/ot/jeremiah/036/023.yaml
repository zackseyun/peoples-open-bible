base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/036/023.yaml
  text: And whenever Yehudi had read three or four columns[a], he would cut it off with the scribe’s knife and throw it into the fire that was in the brazier[b], until the entire scroll was consumed in the fire that was in the brazier.
  footnotes:
  - marker: a
    text: Hebrew 'three or four doors'; here the term refers to divisions of the scroll, likely its columns or panels.
    reason: lexical_alternative
  - marker: b
    text: Or 'firepot' or 'hearth' for 'brazier.'
    reason: lexical_alternative
