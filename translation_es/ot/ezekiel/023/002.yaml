lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Hijo de Adán
  lexicon: HALOT
  rationale: Se conserva el giro vocativo propio de Ezequiel y su fuerza profética. "Hijo de hombre" es la equivalencia más directa del hebreo y mantiene el eco bíblico tradicional sin convertirlo en una paráfrasis interpretativa.
- source_word: שְׁתַּיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - '2'
  lexicon: HALOT
  rationale: Número cardinal simple; en español debe ir en forma plena y natural.
- source_word: נָשִׁים
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  lexicon: HALOT
  rationale: El sentido básico aquí es "mujeres". "Esposas" introduciría una identificación relacional que el versículo todavía no explicita.
- source_word: בְּנוֹת
  english_pob_choice: daughters
  chosen_spanish: hijas
  alternatives_spanish:
  - descendientes
  lexicon: HALOT
  rationale: 'La construcción nominal con "madre" pide el sentido literal de filiación femenina: "hijas".'
- source_word: אֵם אַחַת
  english_pob_choice: of one mother
  chosen_spanish: de una misma madre
  alternatives_spanish:
  - de una madre
  - de la misma madre
  lexicon: HALOT
  rationale: En español, "de una misma madre" comunica con claridad la unidad materna y conserva la idea del hebreo sin sonar forzado. La alternativa "de la misma madre" es válida, pero "de una misma madre" sigue más de cerca la formulación del texto fuente.
- source_word: הָיוּ
  english_pob_choice: there were
  chosen_spanish: había
  alternatives_spanish:
  - eran
  lexicon: HALOT
  rationale: 'Se opta por el existencial natural en español: "había dos mujeres". Mantiene el valor de existencia del verbo hebreo y evita un calco menos idiomático.'
translation_notes:
  revision_awareness: El contexto auditado en inglés no mostró revisiones pendientes ni cambios aplicados; la versión española sigue de cerca las decisiones consolidadas del registro inglés, ajustándolas a un español natural y transparente.
  spanish_consistency_notes:
  - Se conserva el vocativo profético "Hijo de hombre" como fórmula estable en Ezequiel.
  - '"Había" refleja el valor existencial de הָיוּ en español idiomático.'
  - No se anticipa la lectura alegórica posterior; el versículo presenta solo la relación de parentesco entre las dos mujeres.
