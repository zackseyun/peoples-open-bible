review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: demostrativo resumidor («Esta es»), reparto/asignación de la tierra como herencia a las tribus de Israel, identificación final de las porciones/allotments, y fórmula profética final. La nota sobre מַחְלְקוֹתָם preserva adecuadamente las alternativas léxicas. El punto principal a corregir es el título divino אֲדֹנָי יְהוִה: según la política del proyecto, debe preservarse «Yahvé», pero «el Señor Yahvé» suena menos natural y menos preciso que «el Señor Dios, Yahvé» o «el Señor Yahvé» según contexto; aquí conviene una solución que exprese ambos elementos con dignidad y claridad. Además, en español bíblico natural «repartirán» funciona algo mejor que «asignarán» en un contexto territorial, aunque «asignarán» no es incorrecto.'
  spanish_quality_summary: El español es claro, legible y digno. Sin embargo, «el Señor Yahvé» queda algo rígido y poco idiomático para un título compuesto; «el Señor Dios, Yahvé» comunica mejor el doble elemento del hebreo sin ocultar el nombre divino. También puede pulirse «sus porciones» a «sus repartos» o «sus porciones»; la actual es aceptable. El resto del versículo fluye bien.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה se conserva como «Yahvé», נַחֲלָה como «herencia», and מַחְלְקוֹתָם con nota léxica adecuada. La única tensión es cómo representar אֲדֹנָי יְהוִה de manera fiel al hebreo y al criterio del proyecto; se recomienda evitar una formulación española poco natural cuando puede aclararse mejor manteniendo «Yahvé».'
  issues:
  - severity: medium
    issue: Renderizado del título divino אֲדֹנָי יְהוִה como «el Señor Yahvé»
    rationale: Aunque preserva «Yahvé», la combinación suena algo dura en español y no explicita con suficiente claridad el valor de אֲדֹנָי + יְהוִה. Una formulación como «el Señor Dios, Yahvé» mantiene el nombre divino visible y refleja mejor el título compuesto en registro bíblico legible.
  - severity: low
    issue: «asignarán» puede sonar administrativo en un contexto de reparto tribal de tierra
    rationale: No es infiel, pero «repartirán» o «distribuirán» puede sonar más natural en español para el contexto territorial. Aun así, esto es una mejora estilística menor, no una corrección obligatoria.
  revised_spanish_text: Esta es la tierra que ustedes repartirán como herencia a las tribus de Israel[a], y estas son sus porciones, declara el Señor Dios, Yahvé.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «sus divisiones» o «sus repartos»; «sus porciones» expresa la idea de las partes de tierra asignadas a cada tribu.'
    reason: lexical_alternative
