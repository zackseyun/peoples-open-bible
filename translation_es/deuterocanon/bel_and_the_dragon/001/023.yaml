translation:
  language: es
  text: Y había un gran dragón[a], y los babilonios lo adoraban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «veneraban» o «rendían reverencia»; el verbo griego puede denotar reverencia religiosa y, en este contexto, probablemente culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: δράκων
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - serpiente
  lexicon: LSJ
  rationale: «Dragón» reproduce el sentido de un gran ser serpentiforme y conserva el tono narrativo del pasaje. «Serpiente» sería posible, pero debilita la imagen literaria que el texto griego presenta y que la tradición de Bel y el Dragón espera.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grande y formidable
  - enorme
  lexicon: LSJ
  rationale: «Grande» expresa tanto tamaño como importancia narrativa, sin forzar una intensificación innecesaria. «Grane y formidable» o «enorme» añadirían matices que el griego no exige.
- source_word: ἐσέβοντο
  english_pob_choice: worshiped
  chosen_spanish: adoraban
  alternatives_spanish:
  - veneraban
  - mostraban reverencia
  lexicon: BDAG
  rationale: El verbo puede abarcar reverencia religiosa o culto; en este contexto, con el dragón como objeto de devoción, «adoraban» comunica mejor la fuerza cultual que «veneraban» o «mostraban reverencia».
- source_word: οἱ Βαβυλώνιοι
  english_pob_choice: the Babylonians
  chosen_spanish: los babilonios
  alternatives_spanish:
  - los habitantes de Babilonia
  lexicon: LSJ
  rationale: Es la designación étnica directa del griego y la forma más natural en español. «Los habitantes de Babilonia» sería más descriptivo, pero menos preciso como gentilicio.
theological_decisions:
- issue: Fuerza cultual de ἐσέβοντο aplicada al dragón
  english_pob_reading: The verb is rendered as explicit religious worship.
  chosen_spanish_reading: 'El verbo se traduce con un término de culto explícito: «adoraban».'
  alternative_spanish_readings:
  - «veneraban»
  - «rendían reverencia»
  rationale: La escena presenta al dragón como objeto de devoción religiosa, no solo de respeto social. Mantener un verbo de culto preserva la tensión teológica del relato sin suavizarla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: La revisión más reciente no cambió la propuesta; el borrador sigue alineado con la extracción griega normalizada y con el juicio de alta concordancia del control cruzado.
  spanish_consistency_notes:
  - Se mantiene «dragón» para δράκων, coherente con el título tradicional de la perícopa y con la decisión inglesa auditada.
  - Se usa «adoraban» para preservar el peso cultual de ἐσέβοντο, en paralelo con la elección inglesa.
  - El estilo es moderno y publicable en español, sin calcos innecesarios ni sustituciones eclesiásticas no sustentadas por el griego.
