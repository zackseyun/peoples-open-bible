translation:
  language: es
  text: y Bet-peor[a], y las laderas de Pisga, y Bet-jesimot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los manantiales/estribaciones de Pisga». El término hebreo puede entenderse en más de un sentido topográfico.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵית פְּעוֹר
  english_pob_choice: Beth-peor
  chosen_spanish: Bet-peor
  alternatives_spanish:
  - Bet Peor
  - casa de Peor
  lexicon: HALOT
  rationale: Se trata de un nombre de lugar. En español bíblico es natural transliterarlo como topónimo con guion. 'Casa de Peor' sería más transparente literalmente, pero no conserva tan bien la función de lista geográfica.
- source_word: אַשְׁדּוֹת
  english_pob_choice: slopes
  chosen_spanish: laderas
  alternatives_spanish:
  - pendientes
  - falda
  - declives
  lexicon: HALOT
  rationale: En este contexto topográfico, el término describe una zona de laderas o declives de la montaña, no necesariamente manantiales. 'Laderas' comunica bien la imagen geográfica en español y mantiene la amplitud semántica del hebreo.
- source_word: הַפִּסְגָּה
  english_pob_choice: Pisgah
  chosen_spanish: Pisgá
  alternatives_spanish:
  - la Pisgá
  - Pisga
  lexicon: HALOT
  rationale: Se conserva como nombre geográfico propio. Se adapta a la acentuación española para lectura fluida. No se traduce como 'cumbre' porque el contexto de la lista de lugares favorece el valor toponímico.
- source_word: בֵית הַיְשִׁמוֹת
  english_pob_choice: Beth-jeshimoth
  chosen_spanish: Bet-jesimot
  alternatives_spanish:
  - Bet Jesimot
  - casa de las desolaciones
  lexicon: HALOT
  rationale: También es un topónimo, por lo que se translitera. La forma literal 'casa de las desolaciones' no se privilegia aquí porque la enumeración funciona como delimitación territorial.
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantuvo sin cambios en esta sección: la única nota relevante es la ambigüedad topográfica de אַשְׁדּוֹת, que en español también admite más de una solución. Se preservó el valor de lista de lugares y la transliteración de los topónimos, siguiendo el criterio del POB en inglés.'
  spanish_consistency_notes:
  - Se usa 'Bet-' para reflejar la transliteración de בֵית en topónimos bíblicos, manteniendo consistencia interna.
  - '''Pisgá'' lleva acento gráfico para adecuarse a la prosodia española, sin alterar el nombre propio.'
  - La nota sobre אַשְׁדּוֹת se ancla en el texto para conservar la ambigüedad topográfica documentada por el POB en inglés.
