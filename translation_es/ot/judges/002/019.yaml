translation:
  language: es
  text: Y cuando murió el juez, volvieron atrás y se corrompieron más que sus padres, yendo tras otros dioses para servirles y postrarse ante ellos. No cesaron[a] de sus obras ni de su camino obstinado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No abandonaron sus prácticas ni su camino obstinado». El hebreo dice literalmente que no las «dejaron caer»; por eso también puede entenderse como que no las abandonaron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה בְּמוֹת
  english_pob_choice: And when ... died
  chosen_spanish: Y cuando murió
  alternatives_spanish:
  - Y aconteció cuando murió
  - Ahora bien, cuando murió
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se vierte de manera temporal natural en español con «Y cuando murió», conservando la secuencia sin calco excesivo.
- source_word: הַשּׁוֹפֵט
  english_pob_choice: the judge
  chosen_spanish: el juez
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: En Jueces, שֹׁפֵט mantiene la terminología propia del libro; «juez» preserva mejor ese título histórico-literario que opciones más generales.
- source_word: יָשֻׁבוּ
  english_pob_choice: they turned back
  chosen_spanish: volvían atrás
  alternatives_spanish:
  - volvían
  - se volvían atrás
  lexicon: HALOT
  rationale: La idea es de recaída o retorno a la conducta anterior; «volvían atrás» comunica la reanudación del mal camino con una imagen clara en español.
- source_word: וְהִשְׁחִיתוּ
  english_pob_choice: acted more corruptly
  chosen_spanish: se corrompían más
  alternatives_spanish:
  - se corrompieron más
  - actuaban más corruptamente
  - se pervertían más
  lexicon: HALOT
  rationale: El hebreo expresa deterioro moral comparativo; «se corrompían más» conserva el sentido moral y el aumento respecto de sus padres.
- source_word: מֵאֲבוֹתָם
  english_pob_choice: than their fathers
  chosen_spanish: que sus padres
  alternatives_spanish:
  - que sus antepasados
  - más que sus padres
  lexicon: HALOT
  rationale: La comparación se entiende de forma directa en español con «que sus padres». «Padres» conserva el paralelismo generacional del hebreo.
- source_word: לָלֶכֶת אַחֲרֵי
  english_pob_choice: going after
  chosen_spanish: yendo tras
  alternatives_spanish:
  - siguiendo tras
  - para ir tras
  lexicon: HALOT
  rationale: La expresión hebrea indica persecución/alineación con otros dioses; «yendo tras» mantiene la imagen y el valor de adhesión.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: «Otros dioses» es la equivalencia directa y conserva el contraste del pacto sin introducir matices no exigidos por el hebreo.
- source_word: לְעָבְדָם
  english_pob_choice: to serve them
  chosen_spanish: para servirles
  alternatives_spanish:
  - para servirlos
  - para rendirles servicio
  lexicon: HALOT
  rationale: עבד aplicado a deidades incluye servicio cultual; «servirles» mantiene la relación de dependencia y preserva la distinción con el verbo siguiente.
- source_word: וּלְהִשְׁתַּחֲוֹת לָהֶם
  english_pob_choice: and to bow down to them
  chosen_spanish: y postrarse ante ellos
  alternatives_spanish:
  - y adorarlos
  - y arrodillarse ante ellos
  lexicon: HALOT
  rationale: הִשְׁתַּחֲוָה denota prostración física en homenaje; «postrarse ante ellos» conserva mejor esa concreción que «adorar».
- source_word: לֹא הִפִּילוּ
  english_pob_choice: They did not cease
  chosen_spanish: No cesaron[a]
  alternatives_spanish:
  - No abandonaron
  - No dejaron de
  - No cesaron de
  lexicon: HALOT
  rationale: La negativa con הִפִּילוּ comunica no soltar ni abandonar; «No cesaron de» recoge bien el sentido idiomático de persistencia, y la nota preserva la alternativa literal de «no abandonaron».
- source_word: מִמַּעַלְלֵיהֶם
  english_pob_choice: from their deeds
  chosen_spanish: de sus obras
  alternatives_spanish:
  - de sus hechos
  - de sus acciones
  - de sus prácticas
  lexicon: HALOT
  rationale: מַעֲלָלִים puede referirse a actos con carga moral; «obras» es natural en español bíblico y suficientemente amplio para el contexto.
- source_word: וּמִדַּרְכָּם הַקָּשָׁה
  english_pob_choice: or from their stubborn way
  chosen_spanish: ni de su camino duro
  alternatives_spanish:
  - ni de su camino obstinado
  - ni de su conducta endurecida
  - ni de su proceder terco
  lexicon: HALOT
  rationale: דֶּרֶךְ funciona como modo de vida; קָשֶׁה aquí alude a dureza/obstinación. «Camino duro» conserva la literalidad y la tensión semántica, aunque «obstinado» sería una glosa interpretativa posible.
theological_decisions:
- issue: Cómo expresar אֱלֹהִים אֲחֵרִים en un contexto de apostasía
  english_pob_reading: other gods
  chosen_spanish_reading: otros dioses
  alternative_spanish_readings:
  - dioses ajenos
  - dioses extraños
  rationale: El pasaje contrasta la fidelidad a Yahvé con la infidelidad del pueblo; «otros dioses» mantiene el contraste del pacto sin añadir una especificación étnica que el hebreo no exige.
  doctrine_reference: Ex 20:3; Dt 6:14
- issue: Cómo reflejar la diferencia entre servir y postrarse
  english_pob_reading: to serve them and to bow down to them
  chosen_spanish_reading: para servirles y postrarse ante ellos
  alternative_spanish_readings:
  - para servirlos y adorarlos
  - para rendirles servicio y adorarlos
  rationale: El hebreo distingue entre servicio cultual y prostración física/ritual; la traducción mantiene ambos verbos separados para no diluir la progresión de la idolatría.
  doctrine_reference: Ex 20:5; Jos 24:14
- issue: Valor de לֹא הִפִּילוּ con מן
  english_pob_reading: They did not cease from their deeds or from their stubborn way.
  chosen_spanish_reading: No cesaron de sus obras ni de su camino duro.
  alternative_spanish_readings:
  - No abandonaron sus obras ni su camino duro.
  - No dejaron sus obras ni su camino duro.
  rationale: La construcción hebrea sugiere no dejar caer/soltar; en español, «no cesaron de» transmite de forma idiomática la persistencia sin borrar la posibilidad literal de abandono que el POB inglés dejó en nota.
  doctrine_reference: Jue 2:19; cf. 2 R 17:34
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del POB inglés que reemplazó «drop any of» por «cease from» para לֹא הִפִּילוּ, manteniendo además la estructura comparativa y la frase final con «stubborn way». La versión española conserva esa decisión idiomática, pero anota la alternativa más literal de «abandonar» para reflejar la fuerza del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «juez» para שֹׁפֵט, coherente con el léxico de Jueces.
  - Se usó «otros dioses» en lugar de «dioses ajenos» porque el contraste covenantal es el foco principal.
  - Se conservaron dos verbos distintos, «servirles» y «postrarse ante ellos», para respetar la distinción del hebreo.
  - «Camino duro» mantiene la tensión semántica de הַקָּשָׁה; no se suavizó a una mera descripción moral si no fuera necesario.
  - La nota a pie de página se ancla en «No cesaron[a]» para preservar la alternativa lexical sin duplicar marcadores.
