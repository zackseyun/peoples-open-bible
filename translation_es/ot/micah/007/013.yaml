translation:
  language: es
  text: Pero la tierra[a] será una desolación a causa de sus habitantes, a causa del fruto de sus obras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el territorio». El hebreo אֶרֶץ puede significar «tierra», «territorio» o «mundo»; aquí «tierra» se refiere mejor al territorio bajo juicio que a la tierra entera.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «del fruto de sus obras», una expresión hebrea que señala las consecuencias producidas por lo que han hecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will become
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - se convertirá en
  lexicon: HALOT
  rationale: En español, el futuro simple aquí comunica de manera natural el resultado futuro de juicio sin forzar una perífrasis; mantiene el valor prospectivo del perfecto profético en contexto oracular.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: Aunque la nota inglesa prefiere 'land' por el contexto de juicio, en español 'la tierra' funciona de modo amplio y reverente, y puede referirse al territorio bajo juicio sin perder la referencia concreta.
- source_word: לִשְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un desastre
  - ruina
  lexicon: HALOT
  rationale: El sustantivo conserva mejor la fuerza nominal del hebreo que un adjetivo; 'desolación' mantiene el tono de juicio y devastación.
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por causa de
  - por
  - a cuenta de
  lexicon: HALOT
  rationale: La preposición expresa causa, no localización; 'a causa de' es la equivalencia más clara y natural en español.
- source_word: יֹשְׁבֶיהָ
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitan en ella
  - sus moradores
  lexicon: HALOT
  rationale: '''Habitantes'' reproduce con naturalidad el referente humano colectivo del participio con sufijo, sin añadir matices innecesarios.'
- source_word: מִפְּרִי
  english_pob_choice: because of the fruit of
  chosen_spanish: por el fruto de
  alternatives_spanish:
  - a causa del fruto de
  - desde el fruto de
  lexicon: HALOT
  rationale: Conserva la imagen metafórica de 'fruto' y el valor causal de la preposición; en español 'por el fruto de' suena idiomático y fiel.
- source_word: מַעַלְלֵיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  - sus obras
  lexicon: HALOT
  rationale: '''Obras'' es una traducción sobria y bíblica para actos humanos con peso moral; en este contexto evita un registro demasiado general y mantiene la idea de conductas que producen consecuencias.'
theological_decisions:
- issue: Estructura causal del juicio
  english_pob_reading: The land's desolation is presented as a consequence of the inhabitants and of the outcome of their deeds.
  chosen_spanish_reading: La desolación de la tierra se presenta como consecuencia de sus habitantes y del fruto de sus obras.
  alternative_spanish_readings:
  - La tierra será desolada por sus habitantes y por el fruto de sus obras.
  - La tierra será una desolación a causa de sus habitantes, a causa del fruto de sus obras.
  rationale: El hebreo acumula dos expresiones causales. La versión española conserva esa causalidad sin suavizarla, manteniendo el peso moral del juicio y la relación entre conducta y consecuencia.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El texto inglés auditado ya pasó revisión sin cambios; esta propuesta sigue esa lectura estable y conserva las dos aclaraciones léxicas del aparato inglés, adaptándolas al español sin añadir variantes textuales nuevas.
  spanish_consistency_notes:
  - 'Se mantuvo el orden causal principal del hebreo: desolación de la tierra -> causa en sus habitantes -> causa en el fruto de sus obras.'
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque el versículo no contiene el nombre divino.
  - '''Fruto'' se conservó como metáfora de consecuencias, no como resultado agrícola literal.'
  - '''Obras'' mantiene el tono moral del juicio profético mejor que un término neutral como ''acciones''.'
