translation:
  language: es
  text: 'Ve y proclama estas palabras hacia el norte[a], y di: «Vuelve, Israel infiel, declara Yahvé. No pondré mi rostro contra ustedes, porque soy misericordioso[b], declara Yahvé; no guardaré enojo para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al norte». La forma hebrea indica dirección más que un punto exacto de llegada.
    reason: lexical_alternative
  - marker: b
    text: O «bondadoso» o «leal». El término hebreo puede implicar misericordia, bondad o lealtad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלֹךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve y sigue
  lexicon: HALOT
  rationale: El infinitivo absoluto con valor imperatival transmite urgencia; «Ve» es breve, natural y conserva el mandato enfático sin sobrecargar el español.
- source_word: וְקָרָאתָ
  english_pob_choice: and proclaim
  chosen_spanish: proclama
  alternatives_spanish:
  - anuncia
  - clama
  lexicon: HALOT
  rationale: En contexto profético, קרא tiene sentido de anunciar públicamente. «Proclama» mantiene el carácter formal y público del encargo.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - este mensaje
  - estas cosas
  lexicon: HALOT
  rationale: «Palabras» reproduce con concreción el objeto directo del hebreo y suena natural en español bíblico contemporáneo.
- source_word: צָפוֹנָה
  english_pob_choice: toward the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - rumbo al norte
  lexicon: HALOT
  rationale: La partícula direccional indica orientación. «Hacia el norte» conserva el movimiento sin fijar indebidamente un destino puntual.
- source_word: שׁוּבָה
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Regresa
  - Vuélvanse
  lexicon: HALOT
  rationale: שׁוב en este llamamiento profético implica volver, con matiz relacional y de conversión. «Vuélvete» mantiene esa fuerza exhortativa en segunda persona singular.
- source_word: מְשֻׁבָה
  english_pob_choice: faithless
  chosen_spanish: rebelde
  alternatives_spanish:
  - infiel
  - apóstata
  - apegada a la rebelión
  lexicon: HALOT
  rationale: El sustantivo expresa deslealtad/apostasía. «Rebelde» comunica bien la ruptura del pacto en un español claro y sobrio; se evita suavizarla con «infiel» si no se quiere perder la veta de rebeldía.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética estándar se vierte con solemnidad como «declara Yahvé», manteniendo el nombre divino según el criterio del proyecto.
- source_word: לֹא אַפִּיל פָּנַי בָּכֶם
  english_pob_choice: I will not set my face against you
  chosen_spanish: No pondré mi rostro contra ustedes
  alternatives_spanish:
  - No haré caer mi rostro sobre ustedes
  - No apartaré mi rostro contra ustedes
  lexicon: HALOT
  rationale: El hebreo usa una imagen de rostro/carácter hostil. «Poner mi rostro contra ustedes» conserva la metáfora y la dirección adversativa sin desfigurarla con una explicación excesiva.
- source_word: חָסִיד אֲנִי
  english_pob_choice: I am merciful
  chosen_spanish: soy benigno
  alternatives_spanish:
  - soy misericordioso
  - soy fiel
  - soy leal
  lexicon: HALOT
  rationale: La POB inglesa dejó abierta la tensión entre misericordia y lealtad del pacto. «Benigno» es suficientemente amplio en español para incluir misericordia, bondad y benevolencia sin reducir el término a una sola faceta.
- source_word: לֹא אֶטּוֹר לְעוֹלָם
  english_pob_choice: I will not stay angry forever
  chosen_spanish: no guardaré enojo para siempre
  alternatives_spanish:
  - no retendré enojo para siempre
  - no estaré enojado para siempre
  - no guardaré rencor para siempre
  lexicon: HALOT
  rationale: נטר puede significar guardar resentimiento/enojo. «Guardar enojo» mantiene la imagen de retener ira; «para siempre» reproduce לְעוֹלָם con precisión temporal.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - declara Dios
  rationale: Se conserva el nombre propio del pacto, en línea con el estándar del proyecto, en vez de ocultarlo tras un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de חָסִיד aplicado a Yahvé
  english_pob_reading: I am merciful
  chosen_spanish_reading: soy benigno
  alternative_spanish_readings:
  - soy misericordioso
  - soy fiel
  - soy leal
  rationale: Se preserva la tensión lexical entre misericordia, bondad y lealtad del pacto. «Benigno» evita resolverla demasiado pronto y sigue siendo teológicamente compatible con el contexto de restauración.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma en cuenta la revisión inglesa más reciente: conserva el mandato enfático, mantiene la metáfora de «rostro» en lugar de sustituirla por una explicación interpretativa, y refleja la tensión de חָסִיד con una solución española amplia en vez de fijarla solo como «misericordioso» o solo como «fiel».'
  spanish_consistency_notes:
  - Yahvé se usa para יְהוָה de forma consistente con el criterio del proyecto.
  - 'Se preserva el paralelismo imperativo-profético: «Ve y proclama… y di».'
  - «Vuélvete» mantiene el imperativo singular dirigido a Israel como personificación colectiva.
  - «No pondré mi rostro contra ustedes» conserva la imagen corporal del hebreo.
  - «Benigno» se eligió para no cerrar indebidamente el campo semántico de חָסִיד.
