translation:
  language: es
  text: el que da salvación a los reyes[a], el que rescata a David su siervo, de una espada mala[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'liberación' o 'victoria' para 'salvación'.
    reason: lexical_alternative
  - marker: b
    text: O 'de la espada mortal'. El hebreo dice literalmente 'de una espada mala'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנּוֹתֵן
  english_pob_choice: the one who gives
  chosen_spanish: el que da
  alternatives_spanish:
  - el que da
  - el que otorga
  - quien da
  lexicon: HALOT
  rationale: El participio con artículo funciona sustantivamente; en español, 'el que da' conserva bien ese valor y mantiene el estilo participial del hebreo sin volverlo una oración finita innecesaria.
- source_word: תְּשׁוּעָה
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - victoria
  lexicon: HALOT
  rationale: '''Salvación'' preserva el alcance teológico amplio del término, aunque el contexto inmediato sea real y militar. ''Liberación'' o ''victoria'' estrechan demasiado el sentido.'
- source_word: לַמְּלָכִים
  english_pob_choice: to kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - para los reyes
  lexicon: HALOT
  rationale: La preposición ל marca destinatario indirecto; en español, 'a los reyes' es la forma más directa y natural con 'da salvación'.
- source_word: הַפּוֹצֶה
  english_pob_choice: who rescues
  chosen_spanish: el que rescata
  alternatives_spanish:
  - el que libra
  - el que salva
  lexicon: HALOT
  rationale: '''Rescata'' comunica con claridad la acción de sacar a alguien del peligro y mantiene el paralelo con ''da salvación'' mejor que una traducción más abstracta.'
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su servidor
  - su esclavo
  lexicon: HALOT
  rationale: En este contexto davídico y pactal, 'siervo' es el equivalente más natural y fiel al uso bíblico; 'esclavo' introduciría una dureza no exigida por el pasaje.
- source_word: מֵחֶרֶב רָעָה
  english_pob_choice: from the evil sword
  chosen_spanish: de la espada mala
  alternatives_spanish:
  - de la espada malvada
  - de la espada dañina
  - de la espada mortal
  lexicon: HALOT
  rationale: '''Mala'' traduce de forma directa el adjetivo hebreo רָעָה y conserva la tensión lexical del original. ''Mortal'' o ''dañina'' interpretan más de lo que dice el texto; ''malvada'' moraliza la espada de manera más fuerte que el hebreo.'
theological_decisions:
- issue: Alcance de תְּשׁוּעָה en un contexto real y bélico
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  - victoria
  rationale: Aunque el verso habla de reyes y de rescate de la espada, el término hebreo tiene una amplitud que incluye ayuda divina salvadora en sentido más pleno. 'Salvación' conserva esa densidad sin reducir el texto a un mero informe militar.
  doctrine_reference: 'Translation philosophy: preserve theological weight without flattening to mere paraphrase.'
- issue: Siervo de David como designación de pacto y honor
  english_pob_reading: his servant
  chosen_spanish_reading: su siervo
  alternative_spanish_readings:
  - su esclavo
  rationale: La relación no está presentada aquí con el énfasis de servidumbre forzada, sino como designación real y pactal. 'Siervo' respeta ese registro y evita importar un matiz que el pasaje no subraya.
  doctrine_reference: 'Contested terms table: δοῦλος servant/slave context-dependent; analogous principle applied to Hebrew עבד.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no fueron necesarios cambios; el borrador sigue alineado con el pasaje hebreo y con el expediente auditado en inglés, con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca explícitamente en este versículo, sino porque el poema continúa el marco salmódico de acción divina; aquí, sin embargo, el texto hebreo usa un participio sin sujeto explícito y la traducción lo deja implícito de forma natural.
  - Se prefirió 'siervo' sobre 'esclavo' por el uso davídico-covenantal del término עבד; esta decisión sigue la lógica auditada del POB para términos de subordinación no forzada.
  - '''Espada mala'' conserva la literalidad del adjetivo רָעָה y evita suavizar o moralizar el sustantivo más allá de lo que permite el hebreo.'
