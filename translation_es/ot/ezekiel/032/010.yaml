revisions:
- from: Yo haré que muchos pueblos queden [a] sobrecogidos por ti, y sus reyes se estremecerán sobre ti cuando blandiré mi espada ante ellos; y temblarán a cada momento, cada hombre por su propia vida[c][b], en el día de tu caída.
  to: Yo haré que muchos pueblos queden sobrecogidos por ti, y sus reyes se estremecerán por ti[a] cuando blanda mi espada ante ellos; y temblarán a cada momento, cada hombre por su propia vida[c][b], en el día de tu caída.
  rationale: Se corrigió un futuro no idiomático ('cuando blandiré') por el subjuntivo temporal natural ('cuando blanda'), se reemplazó el calco poco natural 'sobre ti' por 'por ti', que comunica mejor en español el efecto que produce Egipto en los reyes, y se reubicó/reescribió la nota [a] para que corresponda a la expresión hebrea intensiva יִשְׂעֲרוּ ... שַׂעַר. Se mantuvo el resto del phrasing porque es fiel al hebreo y al expediente inglés.
  reviewer_model: gpt-5.4
