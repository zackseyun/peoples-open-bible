translation:
  language: es
  text: Y en toda la tierra de vuestra posesión[a], concederéis redención[b] para la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Posesión'' se refiere a propiedad o tenencia territorial dentro de la heredad asignada a Israel.'
    reason: cultural_note
  - marker: b
    text: O 'permitiréis el derecho de redención para la tierra'. El hebreo dice literalmente 'daréis redención', pero en español 'concederéis' expresa mejor el sentido legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכֹל
  english_pob_choice: And in all
  chosen_spanish: Y en toda
  alternatives_spanish:
  - Y en todo
  - Y por toda
  - Y en cada
  lexicon: HALOT
  rationale: El hebreo introduce una regla general con la preposición 'en/por' y el cuantificador 'todo'. 'Y en toda' transmite con naturalidad la amplitud de la norma sin añadir matices no presentes.
- source_word: אֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - el terreno
  lexicon: HALOT
  rationale: En este contexto jurídico de propiedad hereditaria, 'tierra' comunica bien el territorio poseído. 'País' sería menos exacto y 'terreno' demasiado limitado.
- source_word: אֲחֻזַּתְכֶם
  english_pob_choice: of your possession
  chosen_spanish: de vuestra posesión
  alternatives_spanish:
  - de vuestra heredad
  - de vuestro patrimonio
  - de vuestra propiedad
  lexicon: HALOT
  rationale: '''Posesión'' conserva el sentido legal de tenencia/holding dentro de la asignación heredada. ''Heredad'' sería posible, pero puede sonar más interpretativa; ''propiedad'' es más genérica.'
- source_word: גְּאֻלָּה
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - rescate
  - derecho de redención
  - recompra
  lexicon: HALOT
  rationale: '''Redención'' reproduce el término jurídico-covenantal de la POB y evita reducirlo a una mera compra. La alternativa ''derecho de redención'' se mantiene como lectura interpretativa posible.'
- source_word: תִּתְּנ֥וּ
  english_pob_choice: you shall grant
  chosen_spanish: daréis
  alternatives_spanish:
  - concederéis
  - otorgaréis
  - daréis
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente 'dar'. En español jurídico, 'daréis' mantiene la cercanía formal al texto; 'concederéis' u 'otorgaréis' añadirían una formalidad más interpretativa.
- source_word: לָ/אָֽרֶץ
  english_pob_choice: for the land
  chosen_spanish: para la tierra
  alternatives_spanish:
  - a la tierra
  - por la tierra
  - para la tierra
  lexicon: HALOT
  rationale: Con גְּאֻלָּה y נתן, la expresión indica provisión de redención en relación con la tierra. 'Para la tierra' refleja esa relación de beneficio/provisión con claridad.
theological_decisions:
- issue: Naturaleza de la provisión de redención para la tierra vendida
  english_pob_reading: The verse requires that provision be made for the redemption of land within Israel's inherited holdings.
  chosen_spanish_reading: El versículo requiere que se provea redención para la tierra dentro de la posesión heredada de Israel.
  alternative_spanish_readings:
  - El versículo solo afirma que existe redención para la tierra.
  - 'El versículo podría traducirse de modo más literal: ''daréis redención a la tierra''.'
  rationale: La forma española debe reflejar el valor legal de la cláusula sin introducir doctrinas ajenas. 'Se provea redención' comunica la institución de una posibilidad o derecho dentro del marco de la heredad.
  doctrine_reference: Levítico 25:23-28; derecho de rescate de la tierra en el marco de la heredad de Israel
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios; el texto objetivo mantiene la misma lectura legal del hebreo: una provisión de redención relacionada con la tierra dentro de la posesión heredada.'
  spanish_consistency_notes:
  - Se preservó el registro jurídico-covenantal de 'redención' en lugar de parafrasearlo como simple recompra.
  - '''Tierra'' se usó para אֶרֶץ en coherencia con el contexto legal de Levítico 25.'
  - Se mantuvo un español neutral y eclesialmente legible, evitando calcos innecesarios.
