translation:
  language: es
  text: Así que el rey de Asiria lo escuchó[a], y el rey de Asiria marchó contra Damasco y la capturó, y deportó a sus habitantes a Kir[b], y mató a Rezín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le hizo caso». El hebreo puede implicar escuchar con respuesta efectiva.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la deportó a Kir», con la ciudad representando a sus habitantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע אֵלָיו
  english_pob_choice: listened to him
  chosen_spanish: lo escuchó
  alternatives_spanish:
  - le hizo caso
  - lo atendió
  lexicon: HALOT
  rationale: שׁמע con אֶל puede expresar oír con respuesta efectiva, no solo percepción auditiva. En español, «lo escuchó» conserva esa ambigüedad funcional y permite que el contexto militar posterior especifique la respuesta.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  lexicon: HALOT
  rationale: Se mantiene la cadena posesiva simple del hebreo y la repetición retórica del título. «De Asiria» es la forma más natural y clara en español bíblico contemporáneo.
- source_word: וַיַּעַל ... אֶל דַּמֶּשֶׂק
  english_pob_choice: went up against Damascus
  chosen_spanish: subió contra Damasco
  alternatives_spanish:
  - marchó contra Damasco
  - subió a Damasco
  lexicon: HALOT
  rationale: עלה en relato militar suele implicar avance hostil. «Subió contra» conserva la imagen direccional del hebreo y el matiz bélico que el contexto exige.
- source_word: וַיִּתְפְּשֶׂהָ
  english_pob_choice: captured it
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la apresó
  lexicon: HALOT
  rationale: El verbo expresa tomar control de la ciudad; «la capturó» es el equivalente natural y preciso para una acción militar sobre Damasco.
- source_word: וַיַּגְלֶהָ קִירָה
  english_pob_choice: he deported its people to Kir
  chosen_spanish: deportó a sus habitantes a Kir
  alternatives_spanish:
  - exilió a sus habitantes a Kir
  - llevó en cautiverio a sus habitantes a Kir
  lexicon: HALOT
  rationale: El sufijo hebreo recae formalmente sobre la ciudad, pero el sentido idiomático apunta a sus habitantes. En español se explicita la metonimia con «sus habitantes» para evitar una traducción literal poco natural y preservar el valor histórico del deportar/exiliar.
- source_word: קִירָה
  english_pob_choice: Kir
  chosen_spanish: Kir
  alternatives_spanish:
  - Quir
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme a la práctica del proyecto.
- source_word: וְאֶת רְצִין הֵמִית
  english_pob_choice: and he put Rezin to death
  chosen_spanish: y mató a Rezín
  alternatives_spanish:
  - y dio muerte a Rezín
  - y puso a Rezín a muerte
  lexicon: HALOT
  rationale: הֵמִית significa causar la muerte. «Mató a Rezín» es directo y fiel; se evita una perífrasis más larga que no añade claridad en español.
theological_decisions:
- issue: Si la forma verbal שׁמע debe suavizarse como simple oír o conservar un matiz de respuesta obediente.
  english_pob_reading: The Hebrew verb can denote listening with responsive action.
  chosen_spanish_reading: «Lo escuchó» mantiene la posibilidad de una respuesta eficaz, sin convertirla en obediencia explícita.
  alternative_spanish_readings:
  - le hizo caso
  - lo obedeció
  rationale: El contexto inmediato ya describe la acción resultante del rey de Asiria. En español, «lo escuchó» conserva la tensión entre oír y responder, sin sobreinterpretar el grado de sumisión del rey asirio.
  doctrine_reference: Uso semántico del verbo שׁמע en narrativa hebrea; no implica una decisión doctrinal.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés: se mantuvo la repetición de «el rey de Asiria», se preservó el matiz militar de עלה con «subió contra», y se explicitó la metonimia en «deportó a sus habitantes a Kir» para reflejar el sentido idiomático del hebreo. No hubo revisiones posteriores en el pasaje de referencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantuvo «Asiria»/«Damasco»/«Kir» como nombres propios transliterados o establecidos en español.
  - Se prefirió el verbo «deportó» para conservar el campo semántico de exilio forzado del hebreo.
  - Se evitó el calco «subió a» porque el contexto bélico favorece «subió contra».
