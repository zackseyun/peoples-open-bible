translation:
  language: es
  text: Y edificó su santuario como las alturas[a], como la tierra que estableció[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cielos altos» o «las alturas elevadas». La expresión hebrea es poética y puede evocar imaginería celeste o montañosa.
    reason: lexical_alternative
  - marker: b
    text: O «que fundó para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: And he built
  chosen_spanish: Y edificó
  alternatives_spanish:
  - Y construyó
  - Entonces edificó
  lexicon: HALOT
  rationale: El verbo בנה en este contexto narrativo expresa la acción de construir/edificar. «Edificó» conserva el valor verbal directo y suena natural en español bíblico contemporáneo sin volverlo mecánico.
- source_word: כְּמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - cual
  lexicon: HALOT
  rationale: La partícula introduce comparación; «como» es la equivalencia normal en español y mantiene la comparación poética sin añadir matices.
- source_word: רָמִים
  english_pob_choice: the heights
  chosen_spanish: las alturas
  alternatives_spanish:
  - los cielos altos
  - los lugares altos
  - las alturas celestiales
  lexicon: HALOT
  rationale: Rָמִים apunta a alturas elevadas de manera poética. «Las alturas» preserva la imagen abierta y la tensión poética del hebreo sin decidir prematuramente entre cielo o monte.
- source_word: מִקְדָּשׁוֹ
  english_pob_choice: his sanctuary
  chosen_spanish: su santuario
  alternatives_spanish:
  - su lugar santo
  - su templo
  lexicon: HALOT
  rationale: מקדש designa un santuario o lugar santo. «Santuario» mantiene amplitud referencial y no restringe innecesariamente el sentido al edificio del templo.
- source_word: כְּאֶרֶץ
  english_pob_choice: like the earth
  chosen_spanish: como la tierra
  alternatives_spanish:
  - como la tierra firme
  - como el mundo
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «earth», en español «la tierra» comunica mejor la realidad estable y cósmica del paralelismo. Se conserva el sentido de solidez de la comparación.
- source_word: יְסָדָהּ
  english_pob_choice: that he established
  chosen_spanish: que estableció
  alternatives_spanish:
  - que fundó
  - que asentó
  lexicon: HALOT
  rationale: יסד significa fundar/establecer. «Estableció» fluye con naturalidad en español y conserva la idea de fijar con firmeza; el sufijo femenino se refiere a «la tierra».
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: La expresión comunica permanencia duradera. «Para siempre» es idiomática en español y mantiene la fuerza poética del hebreo.
theological_decisions:
- issue: Imagen de las «alturas» en la comparación del santuario
  english_pob_reading: The verse compares God's sanctuary to exalted heights and to the earth as something firmly established and enduring.
  chosen_spanish_reading: El versículo compara el santuario de Dios con las alturas y con la tierra como realidad firmemente establecida y permanente.
  alternative_spanish_readings:
  - El santuario se compara específicamente con los cielos.
  - El santuario se compara con alturas montañosas.
  rationale: El hebreo es poético y comprimido. «Las alturas» conserva la ambigüedad productiva entre elevación celeste y montañosa, evitando imponer una interpretación más específica que el texto no obliga a tomar.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura auditada del inglés POB y del hebreo, manteniendo la secuencia narrativa, la comparación poética y la permanencia final sin resolver la imagen de רָמִים más allá de lo que el source packet permite.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda al nombre divino, pero en este versículo no aparece el Tetragrámaton explícito.
  - Se conserva «santuario» para מִקְדָּשׁ en lugar de «templo» por amplitud semántica.
  - Se prefiere «las alturas» para רָמִים, manteniendo la tensión poética que el audit trail señala.
  - «Para siempre» reproduce la noción de permanencia de לְעוֹלָם con español natural y digno.
