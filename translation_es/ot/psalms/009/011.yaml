translation:
  language: es
  text: Y confiarán en ti los que conocen tu nombre[a], porque tú, Yahvé[c], no has abandonado[b] a los que te buscan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los que conocen tu nombre»; «nombre» aquí expresa el carácter revelado y la reputación de Yahvé, no solo la pronunciación del nombre.'
    reason: cultural_note
  - marker: b
    text: O «no has desamparado».
    reason: lexical_alternative
  - marker: c
    text: Hebreo YHWH, traducido aquí «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִבְטְחוּ
  english_pob_choice: And ... will trust
  chosen_spanish: Y confiarán
  alternatives_spanish:
  - Y confiarán en ti
  - Y pondrán su confianza en ti
  lexicon: HALOT
  rationale: El imperfecto qal en poesía expresa una acción futura o general; en español, «confiarán» comunica con naturalidad la continuidad del versículo anterior. Mantengo la conjunción inicial «Y» para conservar el enlace poético.
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - en ti mismo
  - sobre ti
  lexicon: HALOT
  rationale: La preposición ב con בטח marca el objeto de la confianza; «confiar en ti» es la equivalencia idiomática natural en español y conserva la relación personal del hebreo.
- source_word: יוֹדְעֵי שְׁמֶךָ
  english_pob_choice: those who know your name
  chosen_spanish: los que conocen tu nombre
  alternatives_spanish:
  - los que saben tu nombre
  - los que reconocen tu nombre
  lexicon: HALOT
  rationale: El participio plural funciona como un grupo caracterizado por conocer el nombre de Dios. «Conocen tu nombre» mantiene la forma literal y, en contexto bíblico, también su valor de conocimiento relacional y de pacto.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre revelado
  - reputación
  lexicon: HALOT
  rationale: Conservo «nombre» en el texto principal porque el hebreo bíblico usa esta palabra con carga teológica sobre el carácter revelado de Yahvé; explicarlo dentro del cuerpo del versículo sería más interpretativo de lo que el verso exige.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la confianza; «porque» es claro y natural en español bíblico contemporáneo.
- source_word: לֹא עָזַבְתָּ
  english_pob_choice: have not forsaken
  chosen_spanish: no has abandonado
  alternatives_spanish:
  - no has dejado
  - no has desamparado
  lexicon: HALOT
  rationale: עָזַב significa dejar, abandonar, forsake. En español, «abandonado» transmite bien la fuerza relacional del verbo sin sonar arcaico; mantengo el perfecto con relevancia presente, como en el inglés auditado.
- source_word: דֹרְשֶׁיךָ
  english_pob_choice: those who seek you
  chosen_spanish: a los que te buscan
  alternatives_spanish:
  - a los que te buscan de corazón
  - a los que te procuran
  lexicon: HALOT
  rationale: דרש, cuando se refiere a Dios, suele implicar buscarlo con devoción. «Buscarte» es la equivalencia estable y más natural en español; conservo el objeto directo introducido por «a».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Sigo el estándar del proyecto para el Tetragrámaton: «Yahvé», no la sustitución «el SEÑOR». Esto preserva el nombre divino propio que aparece explícitamente en el hebreo.'
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo trae el Tetragrámaton directamente. La política del proyecto pide traducirlo por «Yahvé» para conservar el nombre personal de Dios en el texto principal, en vez de ocultarlo con una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: «Conocen tu nombre» como expresión de pacto
  english_pob_reading: name carries the sense of the LORD's revealed character and reputation
  chosen_spanish_reading: «tu nombre» conserva la carga de carácter revelado y reputación de Dios
  alternative_spanish_readings:
  - explicar como «tu carácter» en el texto
  - explicitar «tu nombre revelado»
  rationale: 'No amplío el texto principal con una glosa interpretativa, pero mantengo «nombre» porque en hebreo bíblico señala más que un sonido: implica la persona, el carácter y la reputación revelados de Yahvé.'
  doctrine_reference: Salmos 9:11; uso bíblico de שֵׁם
- issue: «No has abandonado» frente a otras posibilidades
  english_pob_reading: have not forsaken / have not abandoned
  chosen_spanish_reading: no has abandonado
  alternative_spanish_readings:
  - no has forsaken
  - no has desamparado
  rationale: El verso afirma la fidelidad continua de Yahvé hacia quienes lo buscan. «Abandonado» conserva la fuerza de עזב con buena naturalidad en español; «desamparado» también sería válido, pero suena más tradicional.
  doctrine_reference: Salmos 9:11; fidelidad de Yahvé a los que le buscan
translation_notes:
  revision_awareness: Concordancia alta con el audit trail inglés; se mantiene la estructura poética, la expresión literal «conocen tu nombre» y la decisión doctrinal de verter el Tetragrámaton como «Yahvé». No se incorporaron expansiones interpretativas en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de la segunda persona singular («tu», «ti», «te») para el discurso directo a Dios.
  - 'Se conserva el paralelismo hebreo: confianza de los que conocen el nombre de Yahvé / fidelidad de Yahvé hacia los que lo buscan.'
  - 'La terminología sigue el estándar del proyecto: «Yahvé» para יְהוָה, «nombre» para שֵׁם, «buscar» para דרש en sentido devocional.'
