translation:
  language: es
  text: Lávense[a]; límpiense. Quiten de delante de mis ojos[b] el mal de sus obras. Dejen de hacer el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «purifíquense». El hebreo puede expresar el sentido de volverse limpio o puro.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de delante de mis ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַחֲצוּ
  english_pob_choice: Wash yourselves
  chosen_spanish: Lávense
  alternatives_spanish:
  - Lavense
  - Lávense a sí mismos
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural con valor reflexivo moral. En español, «Lávense» conserva la imagen y la fuerza imperativa sin sonar forzado; el contexto permite entender el matiz de limpieza ética.
- source_word: הִזַּכּוּ
  english_pob_choice: make yourselves clean
  chosen_spanish: purifíquense
  alternatives_spanish:
  - háganse limpios
  - límpiense
  lexicon: HALOT
  rationale: La forma hitpael expresa hacerse limpio o puro. «Purifíquense» comunica bien el matiz de limpieza moral y corresponde al alternativo documentado en la nota inglesa, sin volver el verso técnico o ritualista.
- source_word: הָסִירוּ
  english_pob_choice: Remove
  chosen_spanish: Aparten
  alternatives_spanish:
  - Quiten
  - Remuevan
  lexicon: HALOT
  rationale: El imperativo causativo pide retirar o apartar algo. «Aparten» funciona naturalmente con el objeto moral que sigue y mantiene el tono profético directo.
- source_word: רֹעַ
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - el malvado
  lexicon: HALOT
  rationale: El sustantivo denota maldad/evil. En español, «el mal» es la forma más directa y amplia; mantiene la abstracción moral del hebreo sin añadir concreción indebida.
- source_word: מַעַלְלֵיכֶם
  english_pob_choice: your deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: El término se refiere a actos o obras, con carga moral según el contexto profético. «Obras» suena natural en español bíblico actual y preserva la idea de conducta observable.
- source_word: מִנֶּגֶד עֵינַי
  english_pob_choice: from before my eyes
  chosen_spanish: de delante de mis ojos
  alternatives_spanish:
  - de mi vista
  - fuera de mi vista
  lexicon: HALOT
  rationale: «De delante de mis ojos» reproduce de manera transparente la imagen hebrea de algo colocado enfrente de la mirada divina. Se prefiere sobre una versión más idiomática para no perder la concreción original.
- source_word: חִדְלוּ
  english_pob_choice: Stop
  chosen_spanish: Dejen de
  alternatives_spanish:
  - Cesen de
  - Paren de
  lexicon: HALOT
  rationale: El imperativo de חדל es «cesar, detenerse». «Dejen de» expresa el mandato de forma clara y natural en español contemporáneo.
- source_word: הָרֵעַ
  english_pob_choice: doing evil
  chosen_spanish: hacer el mal
  alternatives_spanish:
  - practicar el mal
  - obrar mal
  lexicon: HALOT
  rationale: 'La construcción verbal pide una acción continua: dejar de practicar el mal. «Hacer el mal» transmite esa verbalidad sin forzar el texto ni moralizarlo más de la cuenta.'
theological_decisions:
- issue: Lenguaje de lavado y purificación como metáfora moral
  english_pob_reading: Retained the imperative imagery of washing and cleansing as ethical repentance language, not as a sacramental or ritual technical term.
  chosen_spanish_reading: Se conserva la imagen imperativa de lavarse y purificarse como exhortación moral al cambio de conducta, no como término sacramental o ritual técnico.
  alternative_spanish_readings:
  - Lávense; háganse puros
  - Purifíquense ritualmente
  rationale: El contexto de Isaías denuncia la conducta pecaminosa y llama a la reforma moral. La traducción mantiene la metáfora corporal sin introducir asociaciones litúrgicas posteriores que el pasaje no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto base muestra alto acuerdo y no registra revisiones aplicadas; la formulación española sigue de cerca el análisis léxico del hebreo y el audit trail inglés, manteniendo las dos imágenes principales: lavado/purificación y separación del mal.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada cuando corresponde; aquí el versículo no contiene el nombre divino explícito, por lo que aparece la primera persona divina («mis ojos»).
  - Se evitó «SEÑOR» porque el hebreo no presenta כאן un sustituto nominal, sino habla directa de Dios en primera persona.
  - «el mal» se mantuvo como abstracción moral para conservar la tensión léxica del hebreo, en vez de concretarla como «maldad» sin necesidad.
