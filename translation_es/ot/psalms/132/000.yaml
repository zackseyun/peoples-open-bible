review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: título, imperativo a Yahvé, לְדָוִד como relación abierta, y כָּל עֻנּוֹתוֹ como totalidad de la aflicción de David. Sin embargo, ''Cántico de ascenso'' suena menos natural para el título fijo שִׁיר הַמַּעֲלוֹת, y ''para David'' en esta súplica resulta algo forzado en español. Además, la nota b arrastra el inglés ''hardship'' sin traducir.'
  spanish_quality_summary: 'La redacción es comprensible, pero necesita pequeños ajustes para sonar más idiomática y digna en español bíblico: ''Cántico de las subidas'' funciona mejor como título tradicional; ''por David'' conserva mejor la amplitud de לְדָוִד en esta oración; y ''aflicción'' refleja con más precisión el registro poético del singular hebreo que ''sufrimiento''. También debe corregirse la mezcla de idiomas en la nota b.'
  glossary_alignment: 'Se alinea correctamente con el glosario del proyecto al usar ''Yahvé'' para יהוה. No hay otros términos de glosario mayor aquí. El ajuste principal es estilístico-lexical: preferir una formulación española más natural y más cercana al valor poético de עֻנּוֹתוֹ.'
  issues:
  - severity: medium
    issue: Título 'Cántico de ascenso' poco natural para שִׁיר הַמַּעֲלוֹת
    rationale: Aunque es defendible léxicamente, en español suena singularizado y menos idiomático que 'Cántico de las subidas', que además preserva mejor el carácter conocido del encabezado litúrgico.
  - severity: medium
    issue: '''para David'' suena forzado en la súplica'
    rationale: La revisión inglesa retuvo 'for David' por cercanía formal, pero en español 'Recuerda, Yahvé, para David...' no fluye bien. 'Por David' mantiene la amplitud semántica de לְ sin sobreinterpretar y resulta mucho más natural.
  - severity: medium
    issue: '''todo su sufrimiento'' debilita el matiz poético-formal de עֻנּוֹתוֹ'
    rationale: El inglés auditado conservó 'all his affliction'. En español, 'toda su aflicción' refleja mejor el singular colectivo y el registro del salmo. 'Sufrimiento' es posible, pero más genérico.
  - severity: low
    issue: Nota b mezcla español e inglés
    rationale: La frase 'hardship' debe traducirse para mantener coherencia editorial en español.
