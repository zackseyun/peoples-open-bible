review_pass:
  verdict: revise
  source_alignment_summary: 'La cláusula principal está mayormente alineada con el hebreo: בְּנֵי יַעֲקֹב = «Los hijos de Jacob», וַיָּבֹזּוּ הָעִיר = «saquearon la ciudad». Sin embargo, hay dos problemas importantes. Primero, הַחֲלָלִים significa específicamente «los caídos / los muertos por la matanza / los muertos violentamente», más preciso que «los muertos». Segundo, y más grave, «porque habían deshonrado a su hermana» deja en español un antecedente natural ambiguo para «habían», que fácilmente se entiende como «los hijos de Jacob», repitiendo el problema señalado en el historial inglés. La revisión debe evitar atribuir la deshonra a Jacob y sus hijos, aunque el hebreo sea comprimido.'
  spanish_quality_summary: 'El borrador es legible, pero «vinieron sobre los muertos» suena rígido y poco idiomático en español bíblico natural. «Llegaron adonde estaban los caídos» o «vinieron sobre los caídos» mejora algo, pero conviene mantener la nota alternativa para el matiz de עַל. Además, la nota b actual es defectuosa: presenta como alternativa «saquearon» siendo esa misma la lectura del texto. La cláusula final también necesita una formulación española que quite la ambigüedad del sujeto.'
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Sí hay una desviación léxica respecto del razonamiento auditado: טִמְּאוּ se justificó en inglés como «had defiled», y «deshonrado» estrecha el sentido hacia honra social, perdiendo parte de la fuerza de contaminación moral/ritual. En español «habían contaminado» sería poco natural aquí; «habían mancillado» o una pasiva como «porque su hermana había sido mancillada» preserva mejor el campo semántico y evita la ambigüedad.'
  issues:
  - severity: high
    issue: Ambigüedad grave en «porque habían deshonrado a su hermana»
    rationale: En español, el sujeto tácito de «habían deshonrado» se asocia de forma natural con «Los hijos de Jacob», lo que invierte el sentido narrativo. El historial de revisión en inglés ya identificó este riesgo como severo.
  - severity: medium
    issue: «deshonrado» no refleja tan bien טִמְּאוּ como «mancillado/contaminado/profanado»
    rationale: El verbo hebreo en piel conserva fuerza de profanación/contaminación además del agravio sexual. «Deshonrar» comunica la ofensa, pero reduce el matiz semántico documentado en la auditoría.
  - severity: medium
    issue: «vinieron sobre los muertos» suena poco natural en español
    rationale: Aunque formalmente cercano al hebreo, la expresión es dura y poco idiomática. Puede conservarse el sentido con una formulación más natural y una nota que preserve la alternativa «vinieron contra».
  - severity: low
    issue: La nota b no ofrece una verdadera alternativa
    rationale: 'La nota dice «O: ''saquearon''» cuando esa ya es la lectura del texto. Debe reemplazarse por una nota útil o eliminarse.'
  revised_spanish_text: Los hijos de Jacob llegaron a los caídos[a] y saquearon la ciudad[b], porque su hermana había sido mancillada.
  revised_footnotes:
  - marker: a
    text: 'O: «vinieron contra los caídos». El hebreo puede sugerir movimiento sobre ellos o contra ellos, aunque ya estaban muertos.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la ciudad que habían mancillado a su hermana». La cláusula relativa hebrea es condensada; aquí se expresa su sentido causal para evitar ambigüedad en español.
    reason: lexical_alternative
  revision_rationale: Se revisa para eliminar la ambigüedad severa del sujeto en la cláusula causal, preservar mejor el valor de טִמְּאוּ con «mancillada», mejorar la naturalidad de בָּאוּ עַל en español, y corregir las notas para que reflejen alternativas reales y el carácter comprimido de la sintaxis hebrea.
