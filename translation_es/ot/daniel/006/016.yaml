translation:
  language: es
  text: 'Entonces estos hombres vinieron de común acuerdo ante el rey[a] y dijeron al rey: «Sepa, oh rey, que es una ley de los medos y de los persas que ningún mandato[b] ni estatuto que el rey establezca puede ser modificado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vinieron de común acuerdo contra el rey». El verbo arameo puede sugerir una acción coordinada e insistente, no solo una aproximación.
    reason: lexical_alternative
  - marker: b
    text: O «decreto» por «mandato» y «ordenanza» por «estatuto». La pareja enfatiza toda la gama de disposiciones reales jurídicamente vinculantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo que introduce la secuencia narrativa; «Entonces» es natural en español y conserva el valor temporal y consecutivo.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estos varones
  - estas personas
  lexicon: HALOT
  rationale: El sustantivo arameo es masculino plural y se refiere a los funcionarios hostiles ya identificados; «hombres» es directo y fiel.
- source_word: הַרְגִּשׁוּ עַל
  english_pob_choice: came by agreement to
  chosen_spanish: vinieron de común acuerdo a
  alternatives_spanish:
  - se reunieron contra
  - vinieron concertadamente a
  lexicon: HALOT
  rationale: La expresión aramea sugiere acción concertada o conspirativa, no mera aproximación física. «De común acuerdo» conserva esa coordinación sin sobretraducirla.
- source_word: וְאָמְרִין לְמַלְכָּא
  english_pob_choice: and said to the king
  chosen_spanish: y dijeron al rey
  alternatives_spanish:
  - y le dijeron al rey
  - y dijeron al monarca
  lexicon: HALOT
  rationale: Continuación narrativa simple; el español estándar prefiere el pretérito perfecto simple en este contexto.
- source_word: דַּע מַלְכָּא
  english_pob_choice: Know, O king
  chosen_spanish: Sabe, oh rey
  alternatives_spanish:
  - Sepa, oh rey
  - Sepa, rey
  lexicon: HALOT
  rationale: El imperativo arameo y el vocativo se conservan con una forma respetuosa y natural; «oh rey» mantiene el tono cortesano.
- source_word: דִּי דָת לְמָדַי וּפָרַס
  english_pob_choice: that it is a law of the Medes and Persians
  chosen_spanish: que es una ley de los medos y de los persas
  alternatives_spanish:
  - que hay una ley de los medos y de los persas
  - que la ley de los medos y de los persas
  lexicon: HALOT
  rationale: Se expresa la norma imperial como ley vigente y establecida; «es una ley» es idiomático y conserva el sentido jurídico.
- source_word: כָל אֱסָר
  english_pob_choice: any injunction
  chosen_spanish: ningún decreto
  alternatives_spanish:
  - ninguna prohibición
  - ninguna orden
  lexicon: HALOT
  rationale: אֱסָר puede denotar una restricción o mandato vinculante. «Decreto» funciona bien en registro jurídico español y evita estrechar indebidamente el sentido.
- source_word: וּקְיָם
  english_pob_choice: or statute
  chosen_spanish: ni estatuto
  alternatives_spanish:
  - ni ordenanza
  - ni disposición
  lexicon: HALOT
  rationale: El segundo término legal apunta a algo establecido o fijado. «Estatuto» mantiene la distinción legal con el primer término.
- source_word: דִּי מַלְכָּא יְהָקֵים
  english_pob_choice: that the king establishes
  chosen_spanish: que el rey establezca
  alternatives_spanish:
  - que el rey promulgue
  - que el rey instituya
  lexicon: HALOT
  rationale: El verbo expresa establecer o poner en vigor; el subjuntivo en español reproduce bien la cláusula relativa en sentido general.
- source_word: לָא לְהַשְׁנָיָה
  english_pob_choice: cannot be changed
  chosen_spanish: puede ser cambiado
  alternatives_spanish:
  - puede ser alterado
  - debe ser cambiado
  lexicon: HALOT
  rationale: La forma negativa se expresa en la oración completa con «ningún... puede ser cambiado», una construcción natural que conserva la irrevocabilidad legal.
theological_decisions:
- issue: Carácter vinculante e irrevocable de la ley persa
  english_pob_reading: any injunction or statute that the king establishes cannot be changed
  chosen_spanish_reading: ningún decreto ni estatuto que el rey establezca puede ser cambiado
  alternative_spanish_readings:
  - ningún decreto o estatuto que el rey establezca puede ser cambiado
  - ninguna disposición que el rey establezca puede ser alterada
  rationale: El texto subraya la rigidez jurídica del edicto real y la imposibilidad de revocación. Se conserva la doblet legal para no perder el matiz acumulativo del arameo.
  doctrine_reference: Dan 6:8, 12, 15-16; cf. la narrativa del decreto inmutable en Daniel 6
- issue: Tono de conspiración o acción concertada
  english_pob_reading: came by agreement to the king
  chosen_spanish_reading: vinieron de común acuerdo al rey
  alternative_spanish_readings:
  - se concertaron contra el rey
  - vinieron concertadamente al rey
  rationale: La frase puede sugerir conspiración más que simple llegada. «De común acuerdo» conserva la acción coordinada sin introducir un término más fuerte de lo que el texto exige.
  doctrine_reference: Dan 6:6-7, 11-13, 16
translation_notes:
  revision_awareness: Se ha seguido el último pasaje revisado del inglés POB, que corrigió una traducción demasiado física de הַרְגִּשׁוּ por una lectura de acción concertada. La versión española refleja esa revisión con «vinieron de común acuerdo».
  spanish_consistency_notes:
  - Se mantiene «ley» para דָת y se distinguen con dos términos jurídicos («decreto» / «estatuto») para reproducir la pareja legal del arameo.
  - Se conserva «medos y persas» en minúsculas por uso común de etnónimos en español, sin perder el referente histórico.
  - El marcador de nota [a] aparece en el lugar exacto al que se refiere la alternativa de traducción.
