book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Διὰ πίστιν καὶ φιλοξενίαν ἐσώθη Ῥαὰβ ἡ πόρνη. 2. ἐκπεμφθέντων γὰρ ὑπὸ Ἰησοῦ τοῦ τοῦ Ναυὴ κατασκόπων εἰς τὴν Ἰεριχώ, ἔγνω ὁ βασιλεὺς τῆς γῆς, ὅτι ἥκασιν κατασκοπεῦσαι τὴν χώραν αὐτῶν, καὶ ἐξέπεμψεν ἄνδρας τοὺς συλλημψομένους αὐτούς, ὅπως συλληφθέντες θανατωθῶσιν. 3. ἡ οὖν φιλόξενος Ῥαὰβ εἰσδεξαμένη αὐτοὺς ἔκρυψεν εἰς τὸ ὑπερῷον ὑπὸ τὴν λινοκαλάμην. . ἐπισταθέντων δὲ τῶν περὶ τοῦ βασιλέως καὶ λεγόντων· Πρὸς σὲ εἰσῆλθον οἱ κατάσκοποι τῆς γῆς ἡμῶν· ἐξάγαγε αὐτούς, ὁ γὰρ βασιλεὺς οὕτως κελεύει, ἥδε ἀπεκρίθη· Εἰσῆλθον μέν οἱ ἄνδρες, οὓς ζητεῖτε, πρὸς με, ἀλλʼ εὐθέως ἀπῆλθον καὶ πορεύονται τῇ ὁδῷ ὑποδεικνύουσα αὐτοῖς ἐνλλάξις. 5. καὶ εἶπεν πρὸς τοὺς ἄνδρας· Γινώσκουσα γινώσκω ἐγώ, ὅτι κύριος ὁ θεὸς παραδίδωσιν ὑμῖν τὴν γῆν ταύτην· ὁ γὰρ φόβος καὶ ὁ τρόμος ὑμῶν ἐπέπεσεν τοῖς κατοικοῦσιν αὐτήν. ὡς ἐὰν οὖν γένηται λαβεῖν αὐτὴν ὑμᾶς, διασώσατέ με καὶ τὸν οἶκον τοῦ πατρός μου. 6. καὶ εἶπαν αὐτῇ· Ἔσται οὕτως, ὡς ἐλάλησας ἡμῖν. ὡς δʼ ἂν γνῷς παραγινομένους ἡμᾶς, συνάξεις πάντας τοὺς σοὺς ὑπὸ τὸ στέγος σου, καὶ διασωθήσονται· ὅσοι γὰρ ἐὰν εὑρεθῶσιν ἔξω τῆς οἰκίας, ἀπολοῦνται. 7. καὶ προσέθεντο αὐτῇ δοῦναι σημεῖον, ὅπως ἐκκρεμάσῃ ἐκ τοῦ οἴκου αὐτῆς κόκκινον, πρόδηλον ποιοῦντες, ὅτι διὰ τοῦ αἵματος τοῦ κυρίου λύτρωσις ἔσται πᾶσι τοῖς πιστεύουσιν καὶ ἐλπίζουσιν ἐπὶ τὸν θεόν. 8. ὁρᾶτε, ἀγαπητοί, ὅτι οὐ μόνον πίστις, ἀλλὰ καὶ προφητεία ἐν τῇ γυναικὶ γέγονεν.
