translation:
  language: es
  text: Porque la marca[a] de Dios está sobre los justos[b] para salvación; el hambre y la espada y la muerte[c] están lejos de los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señal de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «los rectos».
    reason: lexical_alternative
  - marker: c
    text: En listas de juicio, «muerte» a veces puede aludir más específicamente a una mortandad o peste; aquí se conserva el sentido más amplio del griego.
    reason: alternative_reading
lexical_decisions:
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: signo
  alternatives_spanish:
  - marca
  - señal
  lexicon: BDAG
  rationale: «Signo» conserva el sentido concreto de un indicador visible o reconocible de la acción divina, sin reducirlo a una mera marca física. «Señal» también sería posible, pero «signo» suena más natural en este registro y mantiene mejor el paralelo temático con el mismo término en el contexto cercano.
- source_word: δικαίους / δικαίων
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: BDAG
  rationale: El griego designa una clase de personas caracterizada por su justicia. «Los justos» es la opción natural en español y preserva el valor colectivo mejor que fórmulas más explicativas.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - para liberación
  - con miras a salvación
  lexicon: BDAG
  rationale: «Para salvación» mantiene la dirección final de εἰς y conserva el peso teológico del término. «Liberación» sería posible, pero atenuaría esa carga teológica.
- source_word: λιμός
  english_pob_choice: famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - el hambre devastadora
  lexicon: BDAG
  rationale: Aunque «hambruna» es más técnico, «el hambre» encaja mejor en español bíblico breve y conserva la idea de carestía en una lista de juicios. La formulación no pretende suavizar el término, sino mantener el tono conciso del original.
- source_word: ῥομφαία
  english_pob_choice: sword
  chosen_spanish: la espada
  alternatives_spanish:
  - la espada larga
  - la hoja
  lexicon: BDAG
  rationale: «Espada» es la equivalencia estándar y suficientemente precisa; evita sobreespecificar el tipo de arma en un catálogo de calamidades.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - la pestilencia
  - la mortandad
  lexicon: BDAG
  rationale: Se mantiene «muerte» porque el expediente inglés revisado volvió a la lectura léxicamente más directa, y el griego por sí solo no obliga a concretarlo como peste. En español, «muerte» preserva la amplitud del término y no introduce una especificación no garantizada por el texto base.
- source_word: μακράν
  english_pob_choice: far from
  chosen_spanish: están lejos de
  alternatives_spanish:
  - están apartados de
  - quedan lejos de
  lexicon: BDAG
  rationale: «Están lejos de» reproduce con naturalidad la idea de distancia/separación y funciona bien en la predicación nominal del verso.
theological_decisions:
- issue: Contraste deliberado entre el signo de Dios sobre los justos y la exclusión de calamidades
  english_pob_reading: The sign of God is upon the righteous for salvation; famine and sword and death are far from the righteous.
  chosen_spanish_reading: El signo de Dios está sobre los justos para salvación; el hambre, la espada y la muerte están lejos de los justos.
  alternative_spanish_readings:
  - La señal de Dios está sobre los justos para salvación; el hambre, la espada y la muerte están lejos de los justos.
  - La marca de Dios está sobre los justos para salvación; el hambre, la espada y la muerte están lejos de los justos.
  rationale: Se conserva el contraste entre la presencia protectora de Dios y la distancia de las calamidades. «Signo» mantiene el valor general del término sin fijarlo prematuramente en una «marca» física; eso respeta el expediente, que documenta la tensión entre ambas posibilidades y la usa para un paralelismo con el contexto inmediato.
  doctrine_reference: Protección divina y lenguaje de signo/juicio en tradición bíblica; cf. Ezequiel 9:4 como trasfondo conceptual.
translation_notes:
  revision_awareness: 'El expediente inglés muestra una revisión importante: el primer intento alternó entre «sign» y «mark» para reflejar el contraste con 15:10, pero la revisión más reciente volvió a «sign» por mayor naturalidad formal; también se descartó «pestilence» para θάνατος y se dejó «death». La versión española sigue esa revisión reciente y, a la vez, deja abierta en nota la alternativa «marca» para no borrar la tensión lexical documentada entre signo visible y marca protectora.'
  spanish_consistency_notes:
  - Se mantiene el mismo núcleo léxico para σημεῖον como «signo» en el texto principal, con «marca» solo como alternativa anotada.
  - Se conserva la secuencia de calamidades con artículos definidos por claridad y fluidez en español.
  - «Los justos» se usa de forma colectiva y concordante con el griego plural.
  - La puntuación separa claramente la afirmación positiva de la lista de calamidades, como en el original griego.
