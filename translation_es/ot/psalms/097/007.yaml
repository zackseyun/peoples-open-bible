translation:
  language: es
  text: Sean avergonzados[a] todos los que sirven imágenes talladas, los que se jactan de los ídolos; póstrense ante él, todos los dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘todos los seres celestiales’ o ‘todos los ángeles’. El hebreo dice ‘todos los dioses’, lo cual puede ser una referencia polémica a los dioses de las naciones o a seres celestiales en presencia de Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: be put to shame
  chosen_spanish: sean avergonzados
  alternatives_spanish:
  - sean puestos en vergüenza
  - sean confundidos
  lexicon: HALOT
  rationale: El verbo expresa vergüenza pública, deshonra o confusión. En español, ‘sean avergonzados’ conserva el matiz de humillación pública y funciona bien como jussivo/imprecación poética.
- source_word: עֹבְדֵי
  english_pob_choice: who serve
  chosen_spanish: que sirven
  alternatives_spanish:
  - adoradores de
  - que adoran
  lexicon: HALOT
  rationale: El participio de עבד mantiene la idea de servicio/culto. ‘Sirven’ preserva el vínculo léxico sin forzar una paráfrasis más interpretativa.
- source_word: פֶסֶל
  english_pob_choice: carved images
  chosen_spanish: imágenes talladas
  alternatives_spanish:
  - ídolos tallados
  - imágenes esculpidas
  lexicon: HALOT
  rationale: El término señala una imagen fabricada por talla o talla escultórica. ‘Imágenes talladas’ es preciso, natural en español y menos arcaico que ‘imagen de talla’.
- source_word: הַמִּתְהַלְלִים
  english_pob_choice: those who boast
  chosen_spanish: los que se jactan
  alternatives_spanish:
  - los que se glorían
  - los que presumen
  lexicon: HALOT
  rationale: El hitpael de הלל aquí comunica autoexaltación o jactancia. ‘Se jactan’ reproduce bien ese matiz sin suavizarlo.
- source_word: בָּאֱלִילִים
  english_pob_choice: in idols
  chosen_spanish: en ídolos
  alternatives_spanish:
  - en vanidades
  - en dioses falsos
  lexicon: HALOT
  rationale: Aunque אֱלִילִים puede tener fuerza despectiva, el referente básico es ‘ídolos’. ‘En ídolos’ conserva la concisión y el tono polémico del hebreo.
- source_word: הִשְׁתַּחֲווּ
  english_pob_choice: bow down
  chosen_spanish: póstrense
  alternatives_spanish:
  - bájense en reverencia
  - inclinense
  lexicon: HALOT
  rationale: El imperativo implica postración física y homenaje cultual. ‘Póstrense’ expresa ese gesto con claridad y dignidad litúrgica en español.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: ante él
  alternatives_spanish:
  - a él
  - delante de él
  lexicon: HALOT
  rationale: En el acto de postración, לֹו puede entenderse como dirección/relación hacia la persona. ‘Ante él’ integra el gesto corporal con el sentido de homenaje, sin perder fidelidad.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres celestiales
  - ángeles
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘dioses’. Mantener ‘dioses’ preserva la tensión teológica y la posible alusión polémica o celestial, como en la tradición de audit trail en inglés.
theological_decisions:
- issue: Referente de כָּל אֱלֹהִים
  english_pob_reading: all gods
  chosen_spanish_reading: todos los dioses
  alternative_spanish_readings:
  - todos los seres celestiales
  - todos los ángeles
  rationale: La lectura principal debe reproducir el hebreo literal para no resolver prematuramente la ambigüedad. El contexto puede aludir polémicamente a deidades de las naciones o, en lectura secundaria, a seres celestiales; por eso se conserva la tensión en la traducción principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota al pie, [a], aparece exactamente en el texto español y que no existen notas sin ancla. La redacción principal sigue de cerca el hebreo y la auditoría inglesa, sin introducir marcadores adicionales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ en coherencia con los lineamientos del proyecto cuando el contexto lo requiera, aunque en este versículo el referente aparece por la fórmula poética ‘él’.
  - Se usa ‘dioses’ para אַלֹהִים en plural, preservando la tensión teológica documentada.
  - Se evita ‘adorar’ para עבד y ‘postrarse’ para שחה cuando el español puede expresar mejor el contraste cultual con ‘servir’ y ‘póstrense’.
