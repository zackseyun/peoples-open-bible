translation:
  language: es
  text: En el año seiscientos de la vida de Noé, en el segundo mes, el día diecisiete del mes, en aquel día reventaron todos los manantiales[a] del gran abismo, y se abrieron las ventanas de los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fuentes del gran abismo'.
    reason: lexical_alternative
  - marker: b
    text: O 'compuertas de los cielos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת שֵׁשׁ מֵא֤וֹת שָׁנָה לְ/חַיֵּי נֹחַ
  english_pob_choice: In the six hundredth year of Noah’s life
  chosen_spanish: En el año seiscientos de la vida de Noé
  alternatives_spanish:
  - En el seiscientos año de la vida de Noé
  - En el año seiscientos de Noé
  lexicon: HALOT
  rationale: La construcción hebrea con לְ/חַיֵּי marca la fecha por la duración de la vida de Noé; en español, 'de la vida de Noé' reproduce esa relación con naturalidad y fidelidad. 'Año seiscientos' conserva el valor ordinal sin forzar una perífrasis menos idiomática.
- source_word: בַּ/חֹדֶשׁ הַ/שֵּׁנִי
  english_pob_choice: in the second month
  chosen_spanish: en el segundo mes
  alternatives_spanish:
  - en mes dos
  lexicon: HALOT
  rationale: Es una fórmula temporal directa y el equivalente formal normal en español. 'Segundo mes' mantiene la secuencia de datación del hebreo sin añadir nada.
- source_word: בְּ/שִׁבְעָה עָשָׂר יֹום לַ/חֹדֶשׁ
  english_pob_choice: on the seventeenth day of the month
  chosen_spanish: el día diecisiete del mes
  alternatives_spanish:
  - el diecisiete día del mes
  lexicon: HALOT
  rationale: En español, para una fecha narrativa, el numeral cardinal funciona naturalmente como fecha ordinal. Se omite una preposición redundante porque la construcción ya queda marcada por el contexto temporal de la oración.
- source_word: בַּ/יּוֹם הַ/זֶּה
  english_pob_choice: on that day
  chosen_spanish: en ese mismo día
  alternatives_spanish:
  - en aquel día
  - en ese día
  lexicon: HALOT
  rationale: El hebreo añade énfasis de inmediatez y especificación; 'ese mismo día' conserva mejor ese énfasis que un simple 'ese día'. Se evita 'este' para no desplazar el deíctico narrativo.
- source_word: נִבְקְעוּ
  english_pob_choice: burst open
  chosen_spanish: se rompieron
  alternatives_spanish:
  - se abrieron con fuerza
  - se hendieron
  lexicon: HALOT
  rationale: נִבְקְעוּ expresa una ruptura violenta de las fuentes. 'Se rompieron' conserva la idea de fractura/cizalla sin introducir una interpretación moderna excesiva; la nota explica la alternativa más imagética que el inglés preservó con 'burst open'.
- source_word: כָּל מַעְיְנֹת
  english_pob_choice: all the springs
  chosen_spanish: todos los manantiales
  alternatives_spanish:
  - todas las fuentes
  - todos los ojos de agua
  lexicon: HALOT
  rationale: מַעְיָן puede referirse a manantial o fuente. 'Manantiales' es claro y evita el falso amigo 'fountains' en español; además, es más preciso y natural en registro bíblico contemporáneo.
- source_word: תְּהוֹם רַבָּה
  english_pob_choice: the great deep
  chosen_spanish: el gran abismo
  alternatives_spanish:
  - la gran profundidad
  - el gran océano primordial
  lexicon: HALOT
  rationale: תְּהוֹם nombra la masa primordial de aguas profundas; 'abismo' preserva el peso cósmico y la profundidad del término. 'Gran abismo' mantiene el carácter antiguo del imaginario bíblico sin convertirlo en una explicación científica.
- source_word: וַ/אֲרֻבֹּת הַ/שָּׁמַיִם
  english_pob_choice: and the windows of the heavens
  chosen_spanish: y se abrieron las ventanas de los cielos
  alternatives_spanish:
  - y se abrieron las compuertas de los cielos
  - y se abrieron las ventanas del cielo
  lexicon: HALOT
  rationale: אֲרֻבּוֹת designa aperturas/ventanas; 'ventanas' conserva la imagen original. 'De los cielos' respeta el plural hebreo שָׁמַיִם y mantiene el tono elevado del texto.
- source_word: נִפְתָּחוּ
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertas
  lexicon: HALOT
  rationale: El nifal pasivo se refleja de manera natural con 'se abrieron'. Esta forma es más idiomática en español que un pasivo perifrástico, sin perder la voz pasiva del evento.
theological_decisions:
- issue: Imágenes cósmicas antiguas del diluvio
  english_pob_reading: Retain the phenomenological/cosmic language of 'the great deep' and 'the windows of the heavens' without naturalizing it into modern scientific description.
  chosen_spanish_reading: 'Conservar el lenguaje cósmico: ''el gran abismo'' y ''las ventanas de los cielos'', sin convertirlo en una explicación meteorológica o geológica moderna.'
  alternative_spanish_readings:
  - '''aguas subterráneas'' y ''compuertas del cielo'''
  - '''las profundidades'' y ''las aperturas del cielo'''
  rationale: El hebreo presenta el diluvio con imaginería antigua integrada al relato. La traducción debe mantener esa fuerza y no reemplazarla por una paráfrasis explicativa que desdibuje la tensión literaria y teológica del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se reportan cambios aplicados y la lectura permanece en alta concordancia con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Noé' como forma estándar del nombre propio.
  - Se conserva el plural 'cielos' para reflejar שָׁמַיִם y la formulación del POB inglés.
  - Se evita 'SEÑOR' o equivalentes porque el versículo no contiene el tetragrámaton ni κύριος.
  - La elección 'manantiales'/'abismo'/'ventanas' preserva el registro cósmico del hebreo con español natural y publicable.
