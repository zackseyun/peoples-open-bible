revisions:
- from: 'Y yo dije[a]: «He sido arrojado[b] de delante de tus ojos; sin embargo, todavía miraré hacia tu santo templo».'
  to: 'Y yo dije: «He sido arrojado de delante de tus ojos[a]; sin embargo, volveré a mirar hacia tu santo templo».'
  rationale: Se corrige el valor de אוֹסִיף a «volveré a mirar», que representa mejor la idea de mirar de nuevo. Se reubica la nota léxica para que ancle correctamente la expresión «de delante de tus ojos», y se elimina la nota innecesaria sobre «arrojado» para mantener el aparato limpio y alineado con el audit trail inglés.
  reviewer_model: gpt-5.4
