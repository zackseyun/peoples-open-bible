    text: O «como una cosa menstruosa» o «como un trapo inmundo de menstruación». La comparación hebrea evoca explícitamente la impureza menstrual.
    reason: lexical_alternative
  revision_rationale: Se unificó toda la oración en segunda persona singular para evitar la alternancia abrupta de número del borrador y, al mismo tiempo, conservar la decisión auditada de mantener el pronombre final singular («le»). Se cambió «profanarás/profanaréis» por «contaminarás» para reflejar mejor el sentido de טמא como hacer impuro en un contexto cultual. Se simplificó «¡Sal fuera!» a «¡Sal!» por naturalidad y fidelidad al imperativo hebreo. Se conservó la nota sobre la referencia menstrual explícita.
