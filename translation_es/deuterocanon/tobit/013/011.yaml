translation:
  language: es
  text: Muchas naciones vendrán desde lejos al nombre de Yahvé Dios[a], trayendo dones en sus manos, y dones para el Rey del cielo; generaciones de generaciones te traerán regocijo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la fama de Yahvé Dios». El griego dice literalmente «al nombre»; se conserva el giro direccional para no reducirlo a una sola explicación.'
    reason: alternative_reading
  - marker: b
    text: 'O: «de generación en generación te traerán regocijo». El griego dice literalmente «generaciones de generaciones te darán exultación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη πολλὰ
  english_pob_choice: Many nations
  chosen_spanish: Muchas naciones
  alternatives_spanish:
  - Muchos pueblos
  - Muchas gentes
  lexicon: LSJ
  rationale: ἔθνη aquí conserva mejor el alcance internacional y colectivo; «naciones» sigue de cerca el audit trail en inglés y es natural en español bíblico actual.
- source_word: μακρόθεν
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - de lejos
  - desde muy lejos
  lexicon: LSJ
  rationale: La idea central es distancia espacial; «desde lejos» es claro y fiel al movimiento de procedencia.
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrá
  - llegarán
  lexicon: LSJ
  rationale: El plural concuerda con «naciones» y en español «vendrán» expresa bien la llegada peregrina sin recargar el verbo.
- source_word: πρὸς τὸ ὄνομα Κυρίου τοῦ θεοῦ
  english_pob_choice: to the name of the Lord God
  chosen_spanish: al nombre de Yahvé, el Dios
  alternatives_spanish:
  - al nombre del Señor Dios
  - ante el nombre de Yahvé, el Dios
  - para el nombre de Yahvé, el Dios
  lexicon: LSJ
  rationale: Se mantiene el giro literal «al nombre» para no diluir la idiomaticidad bíblica. «Yahvé» sigue el criterio del proyecto para יהוה, y «el Dios» reproduce la apposición de τοῦ θεοῦ sin forzarla a una fórmula devocional más tradicional.
- source_word: δῶρα ἐν χερσὶν ἔχοντες
  english_pob_choice: carrying gifts in their hands
  chosen_spanish: trayendo dones en sus manos
  alternatives_spanish:
  - llevando dones en sus manos
  - portando dones en sus manos
  lexicon: LSJ
  rationale: «Trayendo» conserva el matiz de ofrenda llevada al destinatario; «dones» es una opción más culta y bíblica que «regalos», adecuada al contexto de homenaje.
- source_word: καὶ δῶρα τῷ βασιλεῖ τοῦ οὐρανοῦ
  english_pob_choice: gifts for the King of heaven
  chosen_spanish: dones para el Rey del cielo
  alternatives_spanish:
  - ofrendas para el Rey del cielo
  - dones al Rey del cielo
  lexicon: LSJ
  rationale: Se conserva la repetición de δῶρα y el título real/divino. «Rey del cielo» sigue de cerca el griego y suena natural en español reverente.
- source_word: γενεαὶ γενεῶν
  english_pob_choice: generations of generations
  chosen_spanish: generación tras generación
  alternatives_spanish:
  - generaciones de generaciones
  - de generación en generación
  - all generations
  lexicon: LSJ
  rationale: La repetición semítica se puede verter de modo más idiomático en español sin perder la idea de continuidad enfática. Aquí la forma natural «generación tras generación» transmite mejor el valor durativo.
- source_word: δώσουσίν σοι ἀγαλλίαμα
  english_pob_choice: will give you exultation
  chosen_spanish: te dará exultación
  alternatives_spanish:
  - te dará regocijo
  - te dará alegría
  - te traerá regocijo
  lexicon: LSJ
  rationale: Se mantiene «exultación» para reflejar ἀγαλλίαμα con la misma fuerza lexical que el audit trail inglés. El singular verbal sigue el patrón poético de la construcción colectiva y preserva la tensión sin resolverla artificialmente.
theological_decisions:
- issue: Destino de la expresión «al nombre de Yahvé, el Dios»
  english_pob_reading: Retain the biblical idiom of pilgrimage/reverence toward God's name
  chosen_spanish_reading: Mantener el giro literal hacia el nombre divino, sin sustituirlo por una paráfrasis de adoración
  alternative_spanish_readings:
  - al honor de Yahvé, el Dios
  - para adorar a Yahvé, el Dios
  - al renombre de Yahvé, el Dios
  rationale: 'La frase griega es direccional y la traducción al español conserva esa tensión: acercamiento reverente al nombre, no solo fama u honra. Esto mantiene la primacía del texto fuente y evita resolver interpretativamente el sentido.'
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Referente de «te» en la clausula final
  english_pob_reading: Addressed to Jerusalem/Zion personified
  chosen_spanish_reading: Mantener el pronombre de segunda persona sin explicitar el referente
  alternative_spanish_readings:
  - te dará exultación, Jerusalén
  - te dará exultación, Sión
  - les dará exultación
  rationale: El discurso poético personifica a Jerusalén/Sión; en español, dejar «te» conserva la fuerza de la apelación directa sin añadir un nombre que el versículo no dice.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import claims beyond the text.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto español junto a «Dios». La revisión mantiene el mismo sentido del audit trail inglés y conserva la alternativa lexical sobre «al nombre».'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el criterio del proyecto para el nombre divino.
  - Se conserva «dones» y «exultación» para seguir la fuerza del griego y del audit trail en inglés.
  - Se evita «Señor» como máscara para el nombre divino en el texto principal.
  - La repetición poética final se naturaliza como «generación tras generación» sin perder la continuidad semítica.
