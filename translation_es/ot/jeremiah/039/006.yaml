  - severity: low
    issue: La nota [a] está bien, pero su redacción puede mantenerse tal cual con el texto revisado.
    rationale: La alternativa «oficiales de Judá» sigue correspondiendo a חֹרֵי יְהוּדָה y no depende del cambio principal.
