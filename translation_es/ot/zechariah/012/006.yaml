translation:
  language: es
  text: En aquel día haré de los clanes de Judá como un brasero entre leña[a], y como una antorcha llameante entre gavillas; y consumirán a todos los pueblos de alrededor, a la derecha y a la izquierda. Y Jerusalén volverá a habitar en su propio lugar[b], en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los líderes de Judá' o 'los jefes de Judá'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente 'bajo ella misma', un modismo que significa 'en su propio lugar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלֻּפֵי יְהוּדָה
  english_pob_choice: the clans of Judah
  chosen_spanish: los clanes de Judá
  alternatives_spanish:
  - los líderes de Judá
  - los jefes de Judá
  lexicon: HALOT
  rationale: אַלּוּף puede designar jefe o unidad/clan según el contexto. La imagen bélica y colectiva del pasaje favorece una referencia corporativa; en español, 'clanes' conserva ese sentido grupal sin restringirlo a individuos de rango.
- source_word: כְּכִיּוֹר אֵשׁ בְּעֵצִים
  english_pob_choice: like a firepot among wood
  chosen_spanish: como un brasero entre leña
  alternatives_spanish:
  - como un recipiente de fuego entre leña
  - como un brasero de fuego entre madera
  lexicon: HALOT
  rationale: כִּיּוֹר remite a un recipiente/bacía, pero aquí la imagen es de algo con fuego capaz de encender la leña. 'Brasero' comunica de forma natural ese objeto ardiente en español y conserva la fuerza visual de la comparación.
- source_word: וּכְלַפִּיד אֵשׁ בְּעָמִיר
  english_pob_choice: and like a flaming torch among sheaves
  chosen_spanish: y como una antorcha llameante entre gavillas
  alternatives_spanish:
  - y como una antorcha de fuego entre rastrojo
  - y como una tea encendida entre gavillas
  lexicon: HALOT
  rationale: לַפִּיד אֵשׁ es 'antorcha/tea llameante'; עָמִיר alude a haces o gavillas de cereal. 'Antorcha llameante entre gavillas' mantiene la imagen agrícola y el contraste destructivo sin volverla demasiado explicativa.
- source_word: וְאָכְלוּ
  english_pob_choice: they will consume
  chosen_spanish: consumirán
  alternatives_spanish:
  - devorarán
  - se comerán
  lexicon: HALOT
  rationale: El verbo hebreo usa el comer como metáfora de destrucción. 'Consumirán' preserva la imagen de fuego/aniquilación mejor que una opción más coloquial, y evita endurecer el giro con 'devorarán' donde el contexto ya está fuertemente figurado.
- source_word: עַל יָמִין וְעַל שְׂמֹאול
  english_pob_choice: on the right and on the left
  chosen_spanish: a la derecha y a la izquierda
  alternatives_spanish:
  - a un lado y al otro
  - por la derecha y por la izquierda
  lexicon: HALOT
  rationale: La traducción mantiene el paralelismo direccional del hebreo. En español, 'a la derecha y a la izquierda' es la forma más natural y fiel para expresar el alcance total del ataque.
- source_word: כָּל הָעַמִּים סָבִיב
  english_pob_choice: all the surrounding peoples
  chosen_spanish: todos los pueblos de alrededor
  alternatives_spanish:
  - todos los pueblos circundantes
  - todas las naciones de alrededor
  lexicon: HALOT
  rationale: עַמִּים es más amplio que 'naciones' y puede referirse a pueblos/etnias. 'De alrededor' conserva el matiz espacial de סָבִיב sin introducir una abstracción innecesaria.
- source_word: וְיָשְׁבָה יְרוּשָׁלַם
  english_pob_choice: And Jerusalem will again dwell
  chosen_spanish: Y Jerusalén volverá a habitar
  alternatives_spanish:
  - Y Jerusalén volverá a morar
  - Y Jerusalén volverá a estar habitada
  lexicon: HALOT
  rationale: El hebreo personifica a Jerusalén como sujeto que 'habita'. En español, 'volverá a habitar' mantiene ese valor activo y profético mejor que una pasiva impersonal.
- source_word: עוֹד תַּחְתֶּיהָ
  english_pob_choice: in her own place
  chosen_spanish: en su propio lugar
  alternatives_spanish:
  - bajo sí misma
  - en su lugar
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'bajo ella misma', un modismo de permanencia/estabilidad en el sitio propio. 'En su propio lugar' transmite ese sentido idiomático de manera clara y reverente.
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: Se conserva la repetición final del hebreo. Aunque suene enfático en español, esa reiteración refuerza el cierre retórico del verso y debe mantenerse.
theological_decisions:
- issue: Sentido corporativo de אַלֻּפֵי יְהוּדָה
  english_pob_reading: corporate 'clans of Judah' rather than only individual military leaders
  chosen_spanish_reading: 'sentido corporativo: ''los clanes de Judá'' más que solo dirigentes individuales'
  alternative_spanish_readings:
  - los líderes de Judá
  - los jefes de Judá
  rationale: El verso presenta a Judá como fuerza colectiva en una escena de victoria, no solo a una élite de mando. La traducción corporativa evita reducir el alcance de la promesa y coincide con la lectura auditada del texto fuente.
  doctrine_reference: Interpretación semántica del sustantivo אַלּוּף en contexto profético-colectivo
- issue: Idiomática de תַּחְתֶּיהָ
  english_pob_reading: Hebrew literally 'under herself,' an idiom meaning 'in her own place.'
  chosen_spanish_reading: '''en su propio lugar'' como equivalente idiomático de ''bajo sí misma'''
  alternative_spanish_readings:
  - bajo sí misma
  - donde está
  rationale: La frase no describe una localización física extraña, sino permanencia/restauración estable. Traducirla idiomáticamente evita oscurecer el sentido y preserva el cierre teológico de seguridad y restablecimiento.
  doctrine_reference: Valor idiomático de תַּחְתֶּיהָ en la sintaxis profética
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin cambios aplicados en la última revisión. Se mantuvo la estructura del verso, la repetición final de 'en Jerusalén' y el contraste imagístico (brasero/antorcha) sin suavizar la fuerza bélica del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma del proyecto solo cuando el texto lo requiriera explícitamente; este versículo no contiene el nombre divino en la superficie del texto.
  - Se mantuvo 'clanes' para אַלֻּפֵי por coherencia con la decisión inglesa auditada y con el sentido corporativo del contexto.
  - Se evitó 'SEÑOR' o 'Cristo' porque no corresponden a este versículo ni al testimonio textual dado.
  - La repetición final 'en Jerusalén' se conservó por fidelidad retórica al hebreo y al audit trail inglés.
