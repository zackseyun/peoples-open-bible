  text: 'You shall measure outside the city: the east side[a], two thousand cubits; the south side, two thousand cubits; the west side, two thousand cubits; and the north side, two thousand cubits, with the city in the middle[b]. This shall be for them the pasture lands of the cities.'
  footnotes:
