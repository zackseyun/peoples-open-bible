review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego y sigue de cerca la auditoría inglesa: condición sobre asuntos que deben llevarse al rey, envío inmediato de alguien, investigación de esos asuntos, propósito de proceder de manera apropiada, y explicación de que ellos van hacia Antioquía. Sin embargo, hay dos puntos mejorables: «examinar estas cosas» suena algo literal frente a περὶ τούτων (‘sobre estos asuntos’), y «para que tengamos cómo obrar conforme a lo que conviene» resulta algo forzado y menos natural que una formulación que exprese claramente la finalidad práctica de ἵνʼ ἔχωμεν ὡς καθήκει ἡμῖν.'
  spanish_quality_summary: El texto es legible y digno, pero puede pulirse para mayor naturalidad en español eclesial general. «Presentados al rey» y «envíen a alguien de inmediato» están bien. En cambio, «examinar estas cosas» y sobre todo «tengamos cómo obrar conforme a lo que conviene» suenan rígidos. Una redacción más fluida puede conservar el mismo contenido sin añadir paráfrasis indebida.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. La terminología principal es adecuada: «rey», «Antioquía», «asuntos». La nota léxica [a] preserva correctamente la alternativa más literal sobre la construcción comprimida de ἔκρινεν.'
  issues:
  - severity: medium
    issue: «para examinar estas cosas» calca de forma algo rígida ἐπισκεψόμενον περὶ τούτων
    rationale: El griego expresa investigar o informarse ‘sobre estas cosas/asuntos’, no tanto examinar objetos concretos. En español natural, «examinar estos asuntos» o «investigar estos asuntos» transmite mejor la referencia abstracta ya establecida por «asuntos».
  - severity: medium
    issue: «para que tengamos cómo obrar conforme a lo que conviene» es poco natural y algo opaco
    rationale: Aunque intenta conservar la elipsis de ἵνʼ ἔχωμεν, en español suena trabado. La auditoría inglesa ya justificó explicitar el sentido práctico como ‘act’. «para que podamos actuar como corresponde» preserva mejor el significado de ἵνʼ ἔχωμεν ὡς καθήκει ἡμῖν sin pérdida semántica relevante.
  revised_spanish_text: Pero si hay asuntos que deben ser presentados al rey[a], envíen a alguien de inmediato para investigar estos asuntos, para que podamos actuar como corresponde; porque nosotros vamos camino de Antioquía.
  revised_footnotes:
