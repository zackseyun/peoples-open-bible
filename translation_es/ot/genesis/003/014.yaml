  yaml_path: translation/ot/genesis/003/014.yaml
  text: Then Yahweh God said to the serpent[a], “Because you have done this, cursed are you above all livestock and above every beast of the field. On your belly you shall go[b], and dust you shall eat all the days of your life.”
  footnotes:
