revisions:
- from: Apártense de mí[a], todos ustedes, hacedores de maldad[b], porque Yahvé ha oído la voz de mi llanto.
  to: Apártense de mí[a], todos los que hacen maldad, porque Yahvé ha oído el sonido[b] de mi llanto.
  rationale: Se corrige la desalineación de notas para que el aparato crítico corresponda al texto auditado y al hebreo. También se mejora la naturalidad y fidelidad de קוֹל בִּכְיִי con 'el sonido de mi llanto', y se aligera el vocativo con 'todos los que hacen maldad', que conserva la imagen verbal de פֹּעֲלֵי אָוֶן sin la rigidez de 'hacedores'.
