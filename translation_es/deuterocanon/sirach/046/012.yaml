base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/046/012.yaml
  text: May their bones blossom like a lily[c][b][a], and may their name be renewed in their sons.
  footnotes:
  - marker: a
    text: 'Hebrew: ''like a lily''; some have rendered the flower more generally or as ''rose,'' but ''lily'' is the more likely sense of שושנה.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel explicitly reads 'from their place' after 'their bones blossom'; this likely clarifies the Hebrew image of their memory flourishing from where they rest.
    reason: alternative_reading
  - marker: c
    text: Or 'their name be passed on through their sons.' The Hebrew verb can suggest renewal or succession, and the Greek likewise points to a name continuing in honored descendants.
    reason: lexical_alternative
