revisions:
- from: También sucedió que siete hermanos[a], junto con su madre, habiendo sido गिरफ्तारados, eran obligados por el rey a participar[b] de la carne ilícita de los cerdos, mientras eran torturados con látigos y cuerdas.
  to: También sucedió que siete hermanos, junto con su madre, después de haber sido arrestados, eran obligados por el rey a comer[a] de la carne prohibida de cerdo, mientras eran torturados con látigos y cuerdas[b].
  rationale: Se corrigió un error tipográfico grave, se reemplazó «participar de» por «comer de» para expresar con claridad el sentido contextual de ἐφάπτεσθαι en un entorno de consumo forzado, y se ajustó «carne ilícita de los cerdos» a «carne prohibida de cerdo» por mayor naturalidad en español sin perder la fuerza legal-religiosa del griego. También se eliminaron notas no necesarias y se conservaron solo las alternativas léxicas útiles y correctamente ancladas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:45:42Z'
