translation:
  language: es
  text: 'Los hijos de Ezrah: Jéter[a], Mered, Éfer y Jalón; y ella concibió a Miriam, Samái e Isbáh[b][c], el padre de Eshtemoa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Y el hijo de Ezrah». Como siguen varios nombres, la frase suele entenderse colectivamente como «los hijos de Ezrah».'
    reason: textual_variant
  - marker: b
    text: El hebreo dice solo «y ella concibió»; la mujer no está identificada en esta cláusula.
    reason: lexical_alternative
  - marker: c
    text: O «fundador de Eshtemoa», si Eshtemoa se entiende como clan o asentamiento más que como individuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֶן
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y el hijo de
  - Y Ben de
  lexicon: HALOT
  rationale: Aunque el hebreo tiene la forma singular «hijo», la lista que sigue contiene varios nombres. En una genealogía española, «Los hijos de» comunica mejor el valor colectivo sin perder el vínculo con la construcción hebrea; la lectura singular queda implícitamente reconocible por la nota textual.
- source_word: עֶזְרָה
  english_pob_choice: Ezrah
  chosen_spanish: Ezra
  alternatives_spanish:
  - Esra
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de manera directa y auditable. «Ezra» conserva la forma breve y reconocible del hebreo en español.
- source_word: יֶתֶר
  english_pob_choice: Jether
  chosen_spanish: Jéter
  alternatives_spanish:
  - Jéter
  - Yéter
  lexicon: Nombre propio
  rationale: Nombre propio. Se acentúa para reflejar la pronunciación española natural y evitar lectura llana indebida.
- source_word: וּמֶרֶד
  english_pob_choice: Mered
  chosen_spanish: Mered
  alternatives_spanish:
  - Mérede
  lexicon: Nombre propio
  rationale: Nombre propio transliterado sin alterar la forma base.
- source_word: וְעֵפֶר
  english_pob_choice: Epher
  chosen_spanish: Éfer
  alternatives_spanish:
  - Efer
  lexicon: Nombre propio
  rationale: Nombre propio; se marca el acento gráfico para favorecer la lectura española y reflejar el patrón prosódico.
- source_word: וְיָלוֹן
  english_pob_choice: Jalon
  chosen_spanish: Jalón
  alternatives_spanish:
  - Yalón
  lexicon: Nombre propio
  rationale: Nombre propio transliterado con acento gráfico para lectura natural en español.
- source_word: וַתַּהַר
  english_pob_choice: and she conceived
  chosen_spanish: y ella concibió
  alternatives_spanish:
  - y quedó encinta
  - y quedó embarazada
  - y dio a luz
  lexicon: HALOT
  rationale: El verbo הרה se traduce de forma directa como «concebió». Se conserva el sujeto femenino explícito porque el hebreo lo exige gramaticalmente, aunque la mujer no esté identificada en esta cláusula.
- source_word: מִרְיָם
  english_pob_choice: Miriam
  chosen_spanish: Miriam
  alternatives_spanish:
  - María
  lexicon: Nombre propio
  rationale: Nombre propio transliterado conforme al hebreo del pasaje, no identificado aquí con la figura conocida del éxodo.
- source_word: שַׁמַּי
  english_pob_choice: Shammai
  chosen_spanish: Samai
  alternatives_spanish:
  - Shammai
  - Samay
  lexicon: Nombre propio
  rationale: Nombre propio adaptado a ortografía española; se suaviza la grafía inicial para una lectura natural, sin cambiar el referente.
- source_word: יִשְׁבָּח
  english_pob_choice: Ishbah
  chosen_spanish: Isbáh
  alternatives_spanish:
  - Ishbah
  - Isbah
  lexicon: Nombre propio
  rationale: Nombre propio transliterado con acento gráfico para lectura española. Se conserva la aspiración final como aproximación ortográfica a la forma hebrea.
- source_word: אֲבִי אֶשְׁתְּמֹעַ
  english_pob_choice: the father of Eshtemoa
  chosen_spanish: padre de Eshtemoa
  alternatives_spanish:
  - fundador de Eshtemoa
  - antepasado de Eshtemoa
  lexicon: HALOT
  rationale: En contexto genealógico, אָב puede significar paternidad inmediata o fundación/clan. La forma principal «padre de» reproduce la ambigüedad del hebreo con transparencia; la nota mantiene la alternativa de «fundador».
theological_decisions:
- issue: Ambigüedad genealógica de אָב ('padre de') aplicado a Eshtemoa
  english_pob_reading: the father of Eshtemoa
  chosen_spanish_reading: padre de Eshtemoa
  alternative_spanish_readings:
  - fundador de Eshtemoa
  - antepasado de Eshtemoa
  rationale: No se resuelve artificialmente si Eshtemoa es individuo, clan o asentamiento. El español mantiene la misma amplitud semántica que la versión inglesa auditada, preservando la tensión documental del hebreo.
  doctrine_reference: Genealogía bíblica y uso flexible de אָב en contextos de linaje/establecimiento.
- issue: Identificación del sujeto de וַתַּהַר
  english_pob_reading: and she conceived
  chosen_spanish_reading: y ella concibió
  alternative_spanish_readings:
  - y concibió
  - y quedó encinta
  rationale: Se mantiene el pronombre femenino porque el hebreo lo contiene, aunque no nombre a la mujer. No se añade ninguna identificación extratextual.
  doctrine_reference: Principio de sobriedad textual y no suplementación del sujeto no explicitado.
translation_notes:
  revision_awareness: Se mantuvo el acuerdo alto del borrador inglés sin cambios sustantivos. La única zona de tensión relevante sigue siendo la lectura colectiva de «hijo»/«hijos» y la ambigüedad de «padre de Eshtemoa», ambas preservadas en español con notas explícitas.
  spanish_consistency_notes:
  - Se usaron acentos gráficos en nombres propios cuando ayudan a la lectura española, sin introducir formas tradicionales ajenas al hebreo.
  - Se evitó reemplazar la ambigüedad genealógica por una explicación interpretativa en el texto principal.
  - 'La puntuación conserva el ritmo genealógico del original: lista nominal, punto y coma, y cláusula final con complemento identificativo.'
