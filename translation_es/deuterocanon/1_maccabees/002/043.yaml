lexical_decisions:
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - todos ellos
  lexicon: LSJ
  rationale: El adjetivo funciona de modo sustantivado con el artículo y el participio; en español, «todos» conserva la amplitud colectiva sin añadir matices innecesarios.
- source_word: οἱ φυγαδεύοντες
  english_pob_choice: those fleeing
  chosen_spanish: los que huían
  alternatives_spanish:
  - los fugitivos
  - los que habían huido
  - los que se refugiaban
  lexicon: LSJ
  rationale: El participio presente con artículo pide una solución sustantivada. «Los que huían» preserva el valor procesual del presente y suena natural en español; «fugitivos» puede sugerir culpabilidad o condición legal más fuerte de la que el griego exige.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - lejos de
  lexicon: LSJ
  rationale: En español, la construcción más natural con un participio de huida es «huir de». Aunque ἀπὸ marca separación/origen, «de» comunica bien esa relación en español sin forzar la sintaxis.
- source_word: τῶν κακῶν
  english_pob_choice: the evils
  chosen_spanish: los males
  alternatives_spanish:
  - los males malos
  - las maldades
  - las desgracias
  - las injusticias
  lexicon: LSJ
  rationale: El plural neutro griego puede abarcar males, maldades o situaciones malas. «Los males» mantiene la amplitud semántica del griego y evita restringir prematuramente el referente.
theological_decisions:
- issue: Alcance de τῶν κακῶν en un fragmento aislado
  english_pob_reading: the evils
  chosen_spanish_reading: los males
  alternative_spanish_readings:
