translation:
  language: es
  text: 'Ahora la palabra de Yahvé había llegado a Jeremías mientras estaba confinado en el patio de la guardia[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra de Yahvé vino a Jeremías mientras estaba confinado en el patio de la guardia»; también «en el patio de la guardia» puede traducirse «en el atrio de la guardia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  english_pob_choice: Now ... to
  chosen_spanish: Ahora ... a
  alternatives_spanish:
  - Y ... a
  - Y además ... a
  lexicon: HALOT
  rationale: La partícula introduce una nueva nota narrativa dirigida a Jeremías. En español, «Ahora» conserva el avance del relato sin sonar forzado, y la dirección implícita queda en «a Jeremías».
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española estándar del nombre del profeta.
- source_word: הָיָה דְבַר יְהוָה
  english_pob_choice: the word of Yahweh had come
  chosen_spanish: la palabra de Yahvé había venido
  alternatives_spanish:
  - la palabra de Yahvé vino
  - vino la palabra de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con valor de revelación recibida. «Había venido» conserva el matiz retrospectivo del contexto narrativo, y «palabra» preserva el peso formal y teológico del hebreo דְבַר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: 'Se sigue la pauta del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en lugar de sustituirlo por un título.'
- source_word: בִּֽ/הְיֹת֣/וֹ עָצ֔וּר
  english_pob_choice: while he was confined
  chosen_spanish: mientras estaba confinado
  alternatives_spanish:
  - cuando estaba confinado
  - mientras estaba detenido
  lexicon: HALOT
  rationale: La construcción temporal expresa una condición en curso. «Confinado» refleja la restricción de custodia sin volverla más específica de lo que exige el hebreo.
- source_word: בַּ/חֲצַ֥ר הַ/מַּטָּרָ֖ה
  english_pob_choice: in the court of the guard
  chosen_spanish: en el patio[a] de la guardia
  alternatives_spanish:
  - en el patio de la guardia
  - en el atrio de la guardia
  - en el patio de la prisión
  lexicon: HALOT
  rationale: חָצֵר puede ser «patio» o «atrio»; aquí «patio» es natural y fiel. «De la guardia» reproduce מַטָּרָה en su sentido de custodia/guardia, sin desplazarlo a «prisión» más de lo que el hebreo especifica.
- source_word: לֵ/אמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - diciendo,
  - 'y dijo:'
  - 'así diciendo:'
  lexicon: HALOT
  rationale: Es la introducción estándar del discurso directo y se mantiene en forma breve y natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión doctrinal del proyecto es conservar el nombre propio divino en transliteración. «Yahvé» evita la sustitución por un título y mantiene visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética דְבַר יְהוָה
  english_pob_reading: the word of Yahweh had come
  chosen_spanish_reading: la palabra de Yahvé había venido
  alternative_spanish_readings:
  - la palabra de Yahvé vino
  - vino la palabra de Yahvé
  - la palabra de Yahvé llegó
  rationale: Se conserva la fórmula de revelación profética sin reducirla a una simple «comunicación». El imperfecto compuesto en español expresa bien el trasfondo narrativo de la escena.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto español, anclado a la expresión equivalente que admite la variante lexical documentada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se preservó la fórmula profética con «la palabra de Yahvé había venido».
  - «Patio» se eligió como equivalente natural de חָצֵר, evitando un calco rígido.
  - La nota al pie se ancla solo una vez y su marcador aparece exactamente en el texto.
