translation:
  language: es
  text: Por tanto, aún contenderé con ustedes[a] —declara Yahvé— y con los hijos de sus hijos contenderé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contenderé contra ustedes ... y contra los hijos de sus hijos»
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Expresa con naturalidad la conclusión inferencial del contexto previo y conserva el tono formal del juicio profético.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - otra vez
  - siempre
  lexicon: HALOT
  rationale: Mantiene la idea de continuidad/persistencia de la acción de contender, más que una mera repetición temporal.
- source_word: אָרִיב
  english_pob_choice: I will contend
  chosen_spanish: contenderé
  alternatives_spanish:
  - litigaré
  - pleitearé
  - reclamaré
  lexicon: HALOT
  rationale: ‘Contender’ conserva el campo jurídico-adversarial de ריב sin cargar el texto con tecnicismos más estrechos que el hebreo.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - contra ustedes
  lexicon: HALOT
  rationale: La preposición literal con ריב puede expresar confrontación adversarial; en español se deja en ‘con’ porque el verbo ‘contender’ ya comunica la oposición. La lectura ‘contra ustedes’ queda preservada implícitamente y en nota.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética estándar con el nombre divino según la terminología del proyecto: ‘Yahvé’.'
- source_word: בְּנֵי בְנֵיכֶם
  english_pob_choice: your children's children
  chosen_spanish: los hijos de sus hijos
  alternatives_spanish:
  - sus nietos
  - los hijos de los hijos de ustedes
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea literal para reproducir su solemnidad y alcance generacional, evitando reducirla a un equivalente más coloquial.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se traslada como ‘Yahvé’ para preservar el nombre del pacto, no como una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el sentido del hebreo y con la auditoría inglesa en el marco del juicio profético: continuidad de la contienda divina, fórmula profética y nombre propio de Yahvé. No se detectan revisiones textuales relevantes en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente con la convención del proyecto para יְהוָה.
  - Se preserva el paralelismo y la repetición de ‘contenderé’ para reflejar el énfasis del hebreo.
  - ‘Con ustedes’ mantiene una sintaxis natural en español, mientras la nota conserva la alternativa adversarial ‘contra ustedes’.
