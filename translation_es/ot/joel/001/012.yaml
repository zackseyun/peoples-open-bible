revisions:
- from: La vid se ha secado[a], y la higuera se ha marchitado; la granada, también la palmera y el manzano[b]—todos los árboles del campo se han secado. En verdad, la alegría se ha secado de entre los hijos de los hombres[c].
  to: La vid se ha secado, y la higuera se ha marchitado; el granado, también la palmera y el manzano[a]—todos los árboles del campo se han secado. En verdad, la alegría se ha secado entre los hijos de los hombres[b].
  rationale: Se elimina la nota no respaldada sobre 'se ha secado', se reancla la nota léxica documentada a 'manzano', se mejora la naturalidad de la frase final con 'entre los hijos de los hombres', y se ajusta 'granada' a 'granado' para mayor precisión en una enumeración de árboles, sin apartarse del sentido fuente ni de la auditoría inglesa.
