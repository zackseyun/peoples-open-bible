revisions:
- from: La altura del [a] primer querubín era de diez codos, y así era también la del segundo querubín.
  to: La altura de un querubín era de diez codos[a], y así era también la del segundo querubín.
  rationale: Se revisa «primer» a «un» para evitar el matiz interpretativo de ordinalidad y acercarse mejor a הָאֶחָד según el audit trail. Se mueve el marcador [a] a «codos» para que la nota cultural quede anclada al término que explica. La redacción resultante mantiene buen español, fidelidad al hebreo y la simetría del versículo.
