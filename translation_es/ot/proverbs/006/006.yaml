translation:
  language: es
  text: Ve a la hormiga, perezoso[a]; considera sus caminos y hazte sabio.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La hormiga es gramaticalmente femenina en hebreo; por eso, literalmente, el texto habla de «sus caminos», es decir, «los caminos de ella».
    reason: cultural_note
  - marker: b
    text: 'Hebreo literalmente: «mira sus caminos y sé sabio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve a
  lexicon: HALOT
  rationale: Imperativo qal masculino singular de הלך. «Ve» comunica con naturalidad la exhortación directa y conserva la fuerza imperativa sin añadir matices innecesarios.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición de dirección se expresa de forma natural en español con «a» en esta construcción exhortativa.
- source_word: נְמָלָה
  english_pob_choice: the ant
  chosen_spanish: la hormiga
  alternatives_spanish:
  - la ant
  - una hormiga
  lexicon: HALOT
  rationale: El sustantivo refiere a la hormiga como ejemplo de instrucción sapiencial. «La hormiga» conserva bien el valor genérico y suena natural en español.
- source_word: עָצֵל
  english_pob_choice: you sluggard
  chosen_spanish: perezoso
  alternatives_spanish:
  - holgazán
  - vaga
  lexicon: HALOT
  rationale: Vocativo de reproche dirigido al indolente. En español, «perezoso» conserva el tono directo y la dureza del apelativo; se omite «tú» porque el vocativo ya funciona con ese valor.
- source_word: רְאֵה
  english_pob_choice: consider
  chosen_spanish: considera
  alternatives_spanish:
  - ve
  - mira
  - observa
  lexicon: HALOT
  rationale: Aunque literalmente es «ve», en este contexto sapiencial el mandato exige atención reflexiva; «considera» reproduce mejor la fuerza de aprender observando.
- source_word: דְרָכֶיהָ
  english_pob_choice: her ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su manera de obrar
  lexicon: HALOT
  rationale: «Caminos» es el equivalente habitual de דרכים en literatura sapiencial para patrones de conducta. Se usa «sus» porque el poseedor es la hormiga, que en hebreo es gramaticalmente femenino; en español esto no necesita marcarse con «suya».
- source_word: וַחֲכָם
  english_pob_choice: and become wise
  chosen_spanish: y hazte sabio
  alternatives_spanish:
  - y sé sabio
  - y aprende sabiduría
  lexicon: HALOT
  rationale: El imperativo final invita a llegar a ser sabio a partir de la observación. «Hazte sabio» conserva el matiz transformativo mejor que un simple estado («sé sabio»).
theological_decisions:
- issue: La personificación pedagógica de la hormiga como modelo de sabiduría
  english_pob_reading: Go to the ant... consider her ways and become wise.
  chosen_spanish_reading: Ve a la hormiga... considera sus caminos y hazte sabio.
  alternative_spanish_readings:
  - Ve a la hormiga... mira sus caminos y sé sabio.
  - Ve a la hormiga... observa sus caminos y aprende sabiduría.
  rationale: El verso presenta a la hormiga como ejemplo observable de conducta diligente dentro de la instrucción sapiencial. La traducción mantiene el imperativo moral y el vínculo causal entre observar y adquirir sabiduría, sin suavizar la reprensión al perezoso.
  doctrine_reference: Sabiduría bíblica; Proverbios 1–9
- issue: El vocativo masculino singular en español
  english_pob_reading: you sluggard
  chosen_spanish_reading: perezoso
  alternative_spanish_readings:
  - holgazán
  - hombre perezoso
  rationale: El hebreo dirige un vocativo masculino singular. En español, el sustantivo/adjetivo en vocativo puede funcionar sin pronombre explícito; «perezoso» preserva la brevedad y el tono de reproche.
  doctrine_reference: Uso gramatical y retórico del vocativo
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la traducción inglesa auditada; no se registran revisiones posteriores ni variantes textuales relevantes en el paquete proporcionado.
  spanish_consistency_notes:
  - Se mantiene «sabio» para conservar el campo semántico de חכם.
  - «Hormiga» y «caminos» siguen la idiomática sapiencial del hebreo y del inglés POB.
  - No se introduce «SEÑOR» ni terminología confesional ajena al versículo.
