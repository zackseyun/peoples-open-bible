translation:
  language: es
  text: Y todo lo que habían dedicado Samuel el vidente, Saúl hijo de Quis, Abner hijo de Ner y Joab hijo de Zeruía—todo lo que cualquiera había dedicado—estaba bajo el cuidado[a] de Selomit y sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba a cargo de Selomit y sus hermanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And all that
  chosen_spanish: Y todo lo que
  alternatives_spanish:
  - Y todo
  - Y todo aquello que
  lexicon: HALOT
  rationale: El hebreo כֹּל introduce un totalizador inclusivo; en español, «todo lo que» conserva la amplitud referida a los dones dedicados sin sonar artificiosamente abstracto.
- source_word: הַהִקְדִּישׁ
  english_pob_choice: had dedicated
  chosen_spanish: habían dedicado
  alternatives_spanish:
  - habían consagrado
  - habían apartado para uso sagrado
  lexicon: HALOT
  rationale: קדשׁ en hifil aquí se refiere a dedicar bienes para uso sagrado. «Habían dedicado» mantiene el valor retrospectivo y evita cargar el verbo con un matiz más técnico que el contexto no exige.
- source_word: שְׁמוּאֵל הָרֹאֶה
  english_pob_choice: Samuel the seer
  chosen_spanish: Samuel, el vidente
  alternatives_spanish:
  - Samuel, el que ve
  - Samuel, el profeta
  lexicon: HALOT
  rationale: רֹאֶה es el título específico hebreo para una figura profética antigua. «Vidente» preserva ese término distintivo mejor que «profeta», que lo nivelaría.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La fórmula genealógica es directa y en español bíblico contemporáneo «hijo de» es la equivalencia más clara y fiel.
- source_word: צְרוּיָה
  english_pob_choice: Zeruiah
  chosen_spanish: Sarvia
  alternatives_spanish:
  - Zeruía
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional «Sarvia», bien establecida en uso bíblico en español y reconocible para lectores eclesiales; el nombre propio no requiere transliteración rígida aquí.
- source_word: כֹּל הַמַּקְדִּישׁ
  english_pob_choice: everything that anyone had dedicated
  chosen_spanish: todo lo que cualquiera había dedicado
  alternatives_spanish:
  - todo lo dedicado
  - toda cosa que alguien había dedicado
  lexicon: HALOT
  rationale: El participio singular colectivo hebreo no se vierte bien con una repetición literal en español. «Todo lo que cualquiera había dedicado» reproduce el alcance general y la colectividad sin perder el valor distributivo del giro hebreo.
- source_word: עַל יַד
  english_pob_choice: was under the care of
  chosen_spanish: estaba bajo el cuidado de
  alternatives_spanish:
  - estaba bajo la responsabilidad de
  - estaba en manos de
  lexicon: HALOT
  rationale: La locución administrativa עַל־יַד indica supervisión o custodia. «Bajo el cuidado de» comunica con naturalidad la idea de administración/encargo en español moderno.
- source_word: שְׁלֹמִית
  english_pob_choice: Shelomith
  chosen_spanish: Selomit
  alternatives_spanish:
  - Selomit
  lexicon: HALOT
  rationale: Se usa una transliteración española estable y pronunciable. «Selomit» preserva la forma del nombre sin excesiva anglicización.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes cercanos
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular remite de modo más natural a sus hermanos. «Hermanos» mantiene la relación familiar directa que sugiere el contexto administrativo.
translation_notes:
  revision_awareness: 'La redacción sigue el giro revisado del audit trail en inglés: «all that ... had dedicated—everything that anyone had dedicated—». En español, la primera cláusula se vuelve «todo lo que habían dedicado» para naturalidad formal, y la segunda se explicita como «todo lo que cualquiera había dedicado» para reflejar el participio colectivo sin sonar redundante ni mecánico.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «hijo de» para la fórmula genealógica porque el hebreo es literal y el contexto es listados de nombres.
  - «Vidente» se reserva para el título רֹאֶה y no se sustituye por «profeta» para no borrar la distinción léxica documentada.
  - «Sarvia» se emplea como forma española bíblica tradicional del nombre propio צְרוּיָה; esto mantiene legibilidad eclesial sin perder la referencia original.
