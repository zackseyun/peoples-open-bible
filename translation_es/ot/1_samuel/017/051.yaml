base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/051.yaml
  text: Then David ran and stood over the Philistine[a], took his sword, drew it from its sheath, and killed him; then he cut off his head with it. When the Philistines saw that their champion was dead[b], they fled.
  footnotes:
  - marker: a
    text: Or 'stood by the Philistine.' The Hebrew expression can denote taking one's position near him; 'stood over' reflects the likely scene of David standing above the fallen Goliath.
    reason: lexical_alternative
  - marker: b
    text: Or 'their mighty man' or 'their warrior.' The translation 'champion' reflects Goliath's role in representative combat earlier in the chapter.
    reason: lexical_alternative
