translation:
  language: es
  text: 'Muchos están diciendo[a]: «¿Quién nos mostrará[b] el bien? Levanta sobre nosotros la luz de tu rostro, Yahvé[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «están preguntando»; el participio hebreo expresa una acción en curso o característica.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nos hará ver» o «nos dejará ver»; el verbo hebreo es causativo y puede entenderse como «mostrar» o «hacer ver».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: YHWH, el nombre divino del pacto.'
    reason: alternative_reading
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Mucha gente
  - Los muchos
  lexicon: HALOT
  rationale: Se usa de manera sustantiva para un grupo indefinido. «Muchos» es natural en español y conserva la amplitud colectiva del hebreo sin especificar más de lo que el texto dice.
- source_word: אֹמְרִים
  english_pob_choice: are saying
  chosen_spanish: están diciendo
  alternatives_spanish:
  - dicen
  - siguen diciendo
  lexicon: HALOT
  rationale: El participio expresa acción continua o habitual. «Están diciendo» conserva ese matiz durativo mejor que un simple presente gnómico.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  lexicon: HALOT
  rationale: Interrogativo directo y sencillo que reproduce la apertura de la cita.
- source_word: יַרְאֵנוּ
  english_pob_choice: will show us
  chosen_spanish: nos mostrará
  alternatives_spanish:
  - nos dejará ver
  - nos hará ver
  lexicon: HALOT
  rationale: El causativo de ראה puede significar «hacer ver / mostrar». En español, «nos mostrará» es idiomático y mantiene la fuerza causativa sin sonar forzado.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - bondad
  - algo bueno
  - prosperidad
  lexicon: HALOT
  rationale: Aquí el sustantivo es amplio y puede abarcar bienestar, beneficio o bien en general. «El bien» conserva esa amplitud mejor que restringirlo a prosperidad o bondad moral.
- source_word: נְסָה
  english_pob_choice: Lift up
  chosen_spanish: Levanta
  alternatives_spanish:
  - Alza
  - Eleva
  - Muestra
  lexicon: HALOT
  rationale: Se conserva el gesto imperativo de elevar o alzar, que en la imagen poética apunta a la manifestación favorable de Dios. «Levanta» mantiene la metáfora sin sobreinterpretarla.
- source_word: עָלֵינוּ
  english_pob_choice: upon us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - encima de nosotros
  - por encima de nosotros
  lexicon: HALOT
  rationale: «Sobre nosotros» refleja de modo natural la relación espacial de la imagen y funciona bien con la metáfora de la luz que reposa o se extiende sobre el pueblo.
- source_word: א֨וֹר
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: Se mantiene el sustantivo con artículo, porque forma parte de la expresión poética definida en contexto.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  - tu semblante
  lexicon: HALOT
  rationale: «Rostro» conserva la metáfora antropomórfica del hebreo y es más digno y natural en español bíblico contemporáneo que «cara».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino. «Yahvé» preserva el nombre propio del pacto en lugar de reemplazarlo por un título.
theological_decisions:
- issue: La expresión metafórica «la luz de tu rostro»
  english_pob_reading: Retain the metaphor rather than interpret it as 'favor' or 'presence' in the main text
  chosen_spanish_reading: Conservar la metáfora «la luz de tu rostro» en el cuerpo del texto
  alternative_spanish_readings:
  - la luz de tu presencia
  - tu favor
  rationale: El hebreo presenta una imagen poética que comunica benevolencia divina sin explicarla. Mantenerla evita aplanar el texto y deja visible la textura teológica del salmo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 y #6'
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se adopta la forma establecida por el proyecto para el Tetragrámaton, preservando el nombre personal de Dios en lugar de sustituirlo por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción española sigue la revisión que eliminó el matiz añadido de «any» en la pregunta, por lo que no se ha introducido ningún equivalente a «algún» o «cualquier». También se conserva la cita directa dentro de la frase para reflejar la puntuación revisada del inglés POB.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: Yahvé para YHWH, rostro para פָּנֶיךָ y la metáfora de luz sin interpretarla en el texto principal.'
  - La puntuación de cita sitúa la oración directa completa dentro de las comillas, en paralelo con la revisión auditada del inglés.
  - El registro es bíblico contemporáneo, claro y digno, sin recurrir a formulaciones arcaizantes innecesarias.
