review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Yahvé habló respecto de esa generación, morirían en el desierto, y no quedó ninguno salvo Caleb y Josué. Sin embargo, la nota al pie está anclada en «ellos» cuando en realidad explica la construcción enfática מוֹת יָמֻתוּ; además, el inglés POB conserva dos notas alternativas y la española solo preserva una.'
  spanish_quality_summary: 'El español es claro y digno. «Porque Yahvé había dicho de ellos» y «no quedó de ellos un solo hombre» suenan naturales. El principal problema es técnico-editorial: la nota [a] está colocada en el lugar equivocado. Conviene también preservar la alternativa de «no quedó nadie de ellos / literalmente, no quedó de ellos un hombre» mediante una segunda nota, ya que el audit trail inglés la mantiene.'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; nombres propios y patronímicos están bien resueltos. No hay conflicto doctrinal. «Desierto» es aceptable para בַּמִּדְבָּר en este contexto. «Sin duda morirán» comunica adecuadamente la intensidad de מוֹת יָמֻתוּ.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «ellos» pero explica «Sin duda morirán».
    rationale: Las notas deben aparecer exactamente en la palabra o frase relevante. Aquí la explicación del infinitivo absoluto hebreo corresponde a la cláusula verbal, no al pronombre/preposición.
  - severity: medium
    issue: Falta la segunda nota léxica que el English POB conserva para וְלֹא נוֹתַר מֵהֶם אִישׁ.
    rationale: 'El rastro de auditoría inglés preserva una alternativa significativa: «and no one remained of them», con la literalidad «and not a man was left from them». La revisión española debe conservar esa alternativa o su equivalente natural.'
  revised_spanish_text: 'Porque Yahvé había dicho de ellos: «Sin duda morirán[a] en el desierto», y no quedó de ellos un solo hombre[b], excepto Caleb hijo de Jefone y Josué hijo de Nun.'
  revised_footnotes:
