    rationale: Aunque el hebreo usa singular adjetival con valor colectivo, en español neutral de lectura pública suele sonar más natural «los ciegos / los cojos» sin perder el sentido colectivo ni la metáfora.
  - severity: low
    issue: Nota al pie con formulación algo forzada
    rationale: La alternativa «Yo era como ojos para el ciego y como pies para el cojo» refleja el sentido, pero puede expresarse de forma más natural con plural colectivo y sin comillas internas sobrantes.
  revised_spanish_text: Yo fui ojos para los ciegos[a] y pies para los cojos.
