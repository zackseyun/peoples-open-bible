translation:
  language: es
  text: Y soñó, y he aquí una escalera[a] estaba puesta sobre la tierra, y su parte superior llegaba al cielo; y he aquí los ángeles de Dios subían y bajaban por ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escalera». El término hebreo puede referirse más generalmente a una estructura para subir.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente «en él», aunque el antecedente más natural en el contexto es la escalera.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּחֲלֹם
  english_pob_choice: And he dreamed
  chosen_spanish: Y soñó
  alternatives_spanish:
  - Entonces soñó
  - Y tuvo un sueño
  lexicon: HALOT
  rationale: El imperfecto narrativo con waw consecutiva avanza la acción; «Y soñó» conserva la secuencia narrativa sin añadir explicaciones.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: La partícula introduce una escena vívida dentro del sueño; «he aquí» conserva ese efecto presentacional en español bíblico digno.
- source_word: סֻלָּם
  english_pob_choice: ladder
  chosen_spanish: escalera
  alternatives_spanish:
  - ladder
  - rampa
  - escalera de acceso
  lexicon: HALOT
  rationale: El término hebreo designa una estructura para subir y bajar, sin exigir la imagen específica de una escalera de mano; «escalera» comunica bien la escena y evita un anglicismo de calco.
- source_word: מֻצָּב
  english_pob_choice: was set up
  chosen_spanish: estaba apoyada
  alternatives_spanish:
  - estaba puesta
  - estaba colocada
  - estaba erigida
  lexicon: HALOT
  rationale: El participio pasivo indica una estructura firmemente posicionada. En español, «estaba apoyada» resulta natural para una escalera y mantiene la idea de estar fijada en la tierra.
- source_word: אַרְצָה
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  - en tierra
  lexicon: HALOT
  rationale: La forma direccional señala relación con la tierra; «sobre la tierra» conserva el contraste cósmico con «el cielo» y suena idiomático.
- source_word: וְרֹאשׁוֹ
  english_pob_choice: and its top
  chosen_spanish: su extremo
  alternatives_spanish:
  - su cabeza
  - su punta
  - su parte superior
  lexicon: HALOT
  rationale: «Cabeza» en hebreo puede significar cima o extremo, pero en español «su extremo» es más natural en una escalera y evita una imagen poco transparente.
- source_word: מַגִּיעַ
  english_pob_choice: reached
  chosen_spanish: tocaba
  alternatives_spanish:
  - llegaba
  - alcanzaba
  - se extendía hasta
  lexicon: HALOT
  rationale: El participio expresa extensión hasta el cielo; «tocaba» transmite el contacto en la visión con concisión y naturalidad.
- source_word: הַשָּׁמָיְמָה
  english_pob_choice: to heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  - el cielo arriba
  lexicon: HALOT
  rationale: La forma direccional apunta al cielo; en español «el cielo» comunica la referencia vertical sin perder solemnidad.
- source_word: מַלְאֲכֵי אֱלֹהִים
  english_pob_choice: the angels of God
  chosen_spanish: los ángeles de Dios
  alternatives_spanish:
  - los mensajeros de Dios
  - los ángeles de Yahvé
  lexicon: HALOT
  rationale: En este contexto visionario se trata claramente de seres celestiales; «ángeles de Dios» es la equivalencia más directa y clara.
- source_word: עֹלִים וְיֹרְדִים
  english_pob_choice: were ascending and descending
  chosen_spanish: subían y bajaban
  alternatives_spanish:
  - ascendían y descendían
  - iban subiendo y bajando
  lexicon: HALOT
  rationale: Los participios presentan movimiento continuo en la visión; el par «subían y bajaban» es natural en español y conserva el dinamismo.
- source_word: בּוֹ
  english_pob_choice: on it
  chosen_spanish: por ella
  alternatives_spanish:
  - sobre ella
  - en ella
  - por él
  lexicon: HALOT
  rationale: El antecedente más natural es la escalera; «por ella» expresa el movimiento a lo largo de la estructura y evita forzar un antecedente personal alternativo.
theological_decisions:
- issue: Imagen de סֻלָּם
  english_pob_reading: ladder
  chosen_spanish_reading: escalera
  alternative_spanish_readings:
  - ladder
  - rampa
  - escalera de acceso
  rationale: La decisión es lexical e imagética, no doctrinal. El hebreo permite una estructura de acceso en general; en español «escalera» es el término más comprensible y cercano al audit trail, sin imponer un detalle técnico no garantizado por el texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referente de בּוֹ
  english_pob_reading: on it
  chosen_spanish_reading: por ella
  alternative_spanish_readings:
  - sobre ella
  - por él
  rationale: Se mantiene el referente inmediato de la escalera. No se introduce una lectura cristológica o alegórica en el texto principal, porque el contexto favorece la estructura soñada como antecedente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que favoreció la forma más tradicional ‘ladder’ en inglés, pero en español se prefirió ‘escalera’ por ser la equivalencia más natural y transparente sin perder la amplitud semántica del hebreo. La redacción mantiene el paralelismo de las dos partículas וְהִנֵּה y la imagen de ascenso/descenso con movimiento continuo.
  spanish_consistency_notes:
  - Se emplea ‘Dios’ para אֱלֹהִים conforme al estándar del proyecto.
  - Se evita ‘SEÑOR’ porque aquí no aparece el Tetragrámaton.
  - Se conserva el registro bíblico con ‘he aquí’, útil para reproducir la fuerza presentacional de וְהִנֵּה.
  - Se usa ‘cielo’ en singular para הַשָּׁמָיִם, en continuidad con el contraste vertical del versículo.
