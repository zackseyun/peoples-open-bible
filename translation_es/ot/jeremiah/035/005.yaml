translation:
  language: es
  text: 'Entonces puse delante de los hijos de la casa de los recabitas[a] cuencos llenos de vino y copas, y les dije: «Beban vino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Recabitas» es una transliteración más directa del hebreo; «rechabitas» conserva la grafía tradicional en algunas Biblias y obras antiguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  english_pob_choice: Then I set
  chosen_spanish: Entonces puse
  alternatives_spanish:
  - Y puse
  - Entonces coloqué
  lexicon: HALOT
  rationale: נתן aquí tiene el sentido concreto de poner o colocar delante de alguien. En español, «puse» comunica mejor la acción física que «di», y «Entonces» refleja bien la secuencia narrativa del waw consecutivo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: Con un objeto físico y una acción de colocar, «delante de» es más natural en español que una traducción más abstracta. Conserva el valor espacial de la expresión hebrea.
- source_word: בְּנֵי בֵית
  english_pob_choice: the sons of the house of
  chosen_spanish: los hijos de la casa de
  alternatives_spanish:
  - los miembros de la casa de
  - la familia de
  lexicon: HALOT
  rationale: La formulación hebrea es literalmente «los hijos de la casa de». Se mantiene esa estructura para no aplanar el matiz de linaje/linaje-hogar que lleva la expresión.
- source_word: הָרֵכָבִים
  english_pob_choice: the Rekabites
  chosen_spanish: los recabitas
  alternatives_spanish:
  - los rechabitas
  lexicon: HALOT
  rationale: Se adopta una transliteración española cercana al hebreo, con forma natural para lector hispanohablante. «Recabitas» conserva la consonante inicial y evita imponer una grafía tradicional inglesa.
- source_word: גְּבִעִים
  english_pob_choice: bowls
  chosen_spanish: copas
  alternatives_spanish:
  - cuencos
  - vasos
  lexicon: HALOT
  rationale: El término puede referirse a recipientes de bebida de forma algo amplia. Aquí, junto con כּוֹסוֹת, «copas» funciona como un recipiente mayor o más general, mientras que «vasos» permite conservar la segunda clase de recipiente sin sobrecargar la imagen con un lujo que el contexto no exige.
- source_word: מְלֵאִים יַיִן
  english_pob_choice: full of wine
  chosen_spanish: llenas de vino
  alternatives_spanish:
  - colmadas de vino
  - llenas de vino
  lexicon: HALOT
  rationale: Se reproduce la construcción adjetival de modo directo y natural en español. «Llenas de vino» comunica con claridad el estado de las copas.
- source_word: וְכֹסוֹת
  english_pob_choice: and cups
  chosen_spanish: y vasos
  alternatives_spanish:
  - y copas
  - y tazas
  lexicon: HALOT
  rationale: כּוֹס suele ser «copa» o «vaso» según contexto. Para distinguirlo del término anterior y mantener una pareja de recipientes en español, «vasos» es una opción clara y neutra.
- source_word: וָאֹמַר אֲלֵיהֶם
  english_pob_choice: and I said to them
  chosen_spanish: y les dije
  alternatives_spanish:
  - y les hablé
  - y les dije a ellos
  lexicon: HALOT
  rationale: «Les dije» es la forma natural y breve en español para אמר con dativo de persona. Evita la redundancia de «a ellos».
- source_word: שְׁתוּ יָיִן
  english_pob_choice: Drink wine
  chosen_spanish: «Beban vino»
  alternatives_spanish:
  - «Tomen vino»
  - «Beban del vino»
  lexicon: HALOT
  rationale: El imperativo plural se refleja con «Beban». «Vino» conserva el objeto directo simple del hebreo sin añadir partitivo ni suavizar el mandato.
translation_notes:
  revision_awareness: El texto hebreo y el testimonio inglés coinciden ampliamente; no se detectan cambios de revisión relevantes que afecten la traducción española de este versículo.
  spanish_consistency_notes:
  - Se mantiene «vino» como sustantivo simple sin añadir especificación interpretativa.
  - Se conserva la estructura narrativa directa de la frase hebrea con un orden natural para el español.
  - La doble mención de recipientes se traduce con dos términos diferentes para reflejar la distinción del original.
