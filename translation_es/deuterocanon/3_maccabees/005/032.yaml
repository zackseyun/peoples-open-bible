translation:
  language: es
  text: Sin embargo, si no fuera por tu afecto por la reunión[a] y por la necesidad[b], habrías sido privado de la vida en lugar de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu afecto por la multitud». El griego συστροφή puede denotar una reunión, un agrupamiento o una masa reunida; el matiz exacto depende del contexto.
    reason: lexical_alternative
  - marker: b
    text: La expresión también puede entenderse como «y la necesidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: καίπερ
  english_pob_choice: Yet, if it were not
  chosen_spanish: Sin embargo, si no fuera
  alternatives_spanish:
  - Aunque
  - Aun cuando
  lexicon: LSJ
  rationale: καίπερ introduce concesión; unido a εἰ μή funciona como una condición concesiva. En español, «Sin embargo, si no fuera» conserva esa fuerza sin sonar forzado.
- source_word: διὰ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: Con acusativo, διὰ expresa causa o razón. «Por» es natural en español y mantiene la relación causal.
- source_word: τὴν τῆς συστροφῆς στοργὴν
  english_pob_choice: your affection because of the gathering together
  chosen_spanish: tu afecto por el agrupamiento
  alternatives_spanish:
  - tu afecto por la reunión
  - tu apego a la multitud
  - tu afecto por la congregación
  lexicon: LSJ
  rationale: στοργή denota afecto o apego natural. συστροφή puede significar reunión, agrupamiento o masa reunida; «agrupamiento» conserva el sentido concreto sin decidir innecesariamente entre matices más interpretativos como «congregación» o «multitud».
- source_word: καὶ τῆς χρείας
  english_pob_choice: and for need
  chosen_spanish: y la necesidad
  alternatives_spanish:
  - y por necesidad
  - y la urgencia
  lexicon: LSJ
  rationale: χρεία significa necesidad o necesidad imperiosa. Dado el paralelismo causal de la frase, «y la necesidad» mantiene la brevedad del griego y la relación semántica con el miembro anterior.
- source_word: τὸ ζῆν
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - el vivir
  - vivir
  lexicon: BDAG
  rationale: El infinitivo articular equivale literalmente a «el vivir», pero en español «la vida» reproduce mejor la idiomaticidad de «ser privado de la vida».
- source_word: ἀντὶ τούτων
  english_pob_choice: instead of these things
  chosen_spanish: en lugar de estas cosas
  alternatives_spanish:
  - en vez de estas cosas
  - a cambio de estas cosas
  lexicon: BDAG
  rationale: ἀντί marca sustitución o intercambio. «En lugar de estas cosas» refleja la comparación y conserva el plural demostrativo.
- source_word: ἐστερήθης
  english_pob_choice: you would have been deprived
  chosen_spanish: habrías sido privado
  alternatives_spanish:
  - habrías sido despojado
  - habrías quedado sin
  lexicon: BDAG
  rationale: στερέω en pasivo significa ser privado de algo. «Habrías sido privado» preserva la fuerza pasiva y el tono severo del original.
translation_notes:
  revision_awareness: Tomé como base la revisión más reciente del inglés, que afinó la relación causal de συστροφή y χρεία hacia una formulación más natural y más cercana al griego. Por eso elegí una estructura española igualmente causal, manteniendo la tensión entre afecto, agrupamiento y necesidad sin reducirla a un solo matiz interpretativo.
  spanish_consistency_notes:
  - He mantenido un registro sobrio y bíblico, pero en español moderno, evitando un calco rígido.
  - Conservé «Yahvé» como norma del proyecto en otros contextos, pero aquí no aparece el Tetragrámaton.
  - No sustituí el matiz de στερέω por un verbo más suave; «privado» conserva la severidad pasiva.
  - Las notas al pie conservan la ambigüedad documental del par συστροφή/χρεία sin resolverla de forma arbitraria.
