translation:
  language: es
  text: En aquel día saldrán mensajeros[a] de delante de mí en barcos, para aterrar a Cus[b], que está segura; y vendrá temblor sobre ellos en el día de Egipto[c], porque, he aquí, ya viene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'enviados'; el hebreo puede también significar 'ángeles', pero en este contexto probablemente se refiere a mensajeros humanos enviados con la noticia de la caída de Egipto.
    reason: lexical_alternative
  - marker: b
    text: O 'Etiopía'. El nombre hebreo es Cus.
    reason: alternative_reading
  - marker: c
    text: Literalmente 'en el día de Egipto', es decir, el día en que llega el juicio sobre Egipto.
    reason: cultural_note
lexical_decisions:
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - ángeles
  lexicon: HALOT
  rationale: El contexto es de anuncio político-judicial, así que 'mensajeros' conserva el valor humano probable que documenta el audit trail inglés. 'Ángeles' sería demasiado sobrenatural aquí, y 'enviados' es posible pero menos natural como término general en español.
- source_word: מִלְּפָנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - de mí
  lexicon: HALOT
  rationale: '''De delante de mí'' mantiene la imagen de procedencia desde la presencia de Yahvé, sin diluir la fuerza espacial del hebreo. ''De mi presencia'' es válido pero algo más explicativo; ''de mí'' perdería la metáfora.'
- source_word: בַּצִּים
  english_pob_choice: in ships
  chosen_spanish: en barcos
  alternatives_spanish:
  - en naves
  - por barcos
  lexicon: HALOT
  rationale: El término se refiere a embarcaciones de navegación. 'En barcos' es claro y natural en español; 'naves' también es posible, pero puede sonar más literario o ambiguo.
- source_word: לְהַחֲרִיד
  english_pob_choice: to terrify
  chosen_spanish: para aterrar
  alternatives_spanish:
  - para hacer temblar
  - para infundir terror
  lexicon: HALOT
  rationale: El causativo expresa provocar terror o pánico. 'Aterrar' transmite bien esa fuerza verbal en español. 'Hacer temblar' sería más literal pero menos directo; 'infundir terror' es correcto pero más perifrástico.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Etiopía
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico transliterado según la práctica del proyecto. 'Etiopía' sería una equivalencia interpretativa tradicional, pero el audit trail inglés prefiere 'Cush' para mantener la forma del lugar bíblico.
- source_word: בֶּטַח
  english_pob_choice: secure as she is
  chosen_spanish: que está segura
  alternatives_spanish:
  - en seguridad
  - confiada
  lexicon: HALOT
  rationale: 'La frase modifica a Cus y subraya la ironía: precisamente estando segura, será aterrada. ''Que está segura'' preserva esa relación con una forma natural en español. ''En seguridad'' o ''confiada'' son posibles, pero menos fluidas aquí.'
- source_word: חַלְחָלָה
  english_pob_choice: trembling
  chosen_spanish: temblor
  alternatives_spanish:
  - tremor
  - angustia
  - pánico
  lexicon: HALOT
  rationale: El sustantivo denota temblor, sacudida o estremecimiento de angustia. 'Temblor' conserva el efecto físico-emocional del hebreo y corresponde al audit trail inglés. 'Angustia' o 'pánico' trasladan más el estado interno que la imagen verbal.
- source_word: בָהֶם
  english_pob_choice: upon them
  chosen_spanish: en ellos
  alternatives_spanish:
  - sobre ellos
  - entre ellos
  lexicon: HALOT
  rationale: Aunque 'upon them' en inglés sugiere una irrupción abrumadora, en español 'en ellos' conserva la idea de que el temblor recae sobre el pueblo y resulta más idiomático en esta construcción.
- source_word: בְּיוֹם מִצְרַיִם
  english_pob_choice: on the day of Egypt
  chosen_spanish: en el día de Egipto
  alternatives_spanish:
  - el día de Egipto
  - cuando Egipto reciba su juicio
  lexicon: HALOT
  rationale: Se mantiene la forma compacta del hebreo. El audit trail inglés explica que se trata del día del juicio contra Egipto; en español conviene conservar la expresión literal y dejar la interpretación contextual implícita.
- source_word: כִּי הִנֵּה בָּאָה
  english_pob_choice: for behold, it is coming
  chosen_spanish: porque, miren, viene
  alternatives_spanish:
  - porque he aquí, viene
  - porque, he aquí, se acerca
  lexicon: HALOT
  rationale: El hebreo usa una fórmula de inmediatez y énfasis. 'Miren' comunica el valor exhortativo de הִנֵּה de manera natural en español contemporáneo, y 'viene' refleja bien el presente de inminencia del verbo.
theological_decisions:
- issue: Presencia divina en el envío de mensajeros
  english_pob_reading: The verse speaks of messengers going out 'from before me,' preserving Yahweh as the direct speaker behind the oracle.
  chosen_spanish_reading: La versión conserva 'de delante de mí', manteniendo a Yahvé como quien envía desde su propia presencia.
  alternative_spanish_readings:
  - de mí
  - desde mí
  rationale: La formulación espacial del hebreo no es meramente ornamental; comunica que el anuncio de juicio procede de la presencia activa de Yahvé. Traducirlo con una forma más breve perdería esa tensión teológica.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nombre geográfico y referencia histórica de Cush
  english_pob_reading: Or 'Ethiopia.' The Hebrew place-name is Cush.
  chosen_spanish_reading: Se conserva 'Cus' como transliteración del topónimo bíblico.
  alternative_spanish_readings:
  - Etiopía
  - Cush
  rationale: El proyecto privilegia la forma bíblica transliterada para no sustituir el término fuente por una equivalencia geográfica posterior. 'Etiopía' puede ayudar a algunos lectores, pero borra la forma textual hebrea.
  doctrine_reference: 'Terminology policy: transliterated place names'
- issue: '''Day of Egypt'' as judgment formula'
  english_pob_reading: Literally 'on the day of Egypt,' that is, the day when judgment comes upon Egypt.
  chosen_spanish_reading: '''En el día de Egipto'' se conserva literalmente y se entiende como el día de juicio sobre Egipto.'
  alternative_spanish_readings:
  - el día de Egipto
  - el día en que Egipto es juzgado
  rationale: La literalidad mantiene la cadencia profética y deja visible la fórmula bíblica. La aclaración interpretativa puede darse en notas, pero no debe reemplazar la expresión del texto.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'El audit trail inglés indica acuerdo alto y ningún cambio sustantivo en la última pasada; por ello, la redacción española sigue de cerca las decisiones auditadas, manteniendo las tres notas críticas: mensajeros humanos probables, topónimo Cus, y la fórmula ''el día de Egipto'' como expresión de juicio inminente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferida del nombre divino en el proyecto, aunque en este versículo el sujeto explícito aparece solo por el pronombre de primera persona.
  - '''Mensajeros'' se usa en coherencia con otros pasajes proféticos donde מַלְאָכִים denota emisarios humanos, reservando ''ángeles'' para contextos claramente celestiales.'
  - '''Cus'' conserva la transliteración del topónimo bíblico; no se sustituye por ''Etiopía'' en el cuerpo principal.'
  - '''Temblor'' reproduce el sustantivo de estremecimiento y evita suavizar la imagen a una mera emoción interior.'
