- from: Entonces hizo acercar el carnero del holocausto[a], y Aarón y sus hijos pusieron[b] sus manos sobre la cabeza del carnero.
  to: Entonces presentó el carnero del holocausto[a], y Aarón y sus hijos pusieron[b] sus manos sobre la cabeza del carnero.
  rationale: Se reemplaza 'hizo acercar' por 'presentó' para lograr un español más natural y cultualmente adecuado, manteniendo el mismo sentido básico documentado por el POB para וַיַּקְרֵב. También se corrige la nota léxica para que sus alternativas sean idiomáticas en español.
