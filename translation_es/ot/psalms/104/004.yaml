revisions:
- from: Él hace de sus mensajeros vientos[a][b], de sus ministros fuego abrasador.
  to: Él hace de sus mensajeros vientos[a][b], y de sus ministros, un fuego llameante.
  rationale: La revisión mantiene la lectura principal aprobada por el expediente, pero mejora la naturalidad del español y la fidelidad imagética de לֹהֵט con 'fuego llameante'. También restaura en la nota la alternativa tradicional completa documentada por el POB inglés y su relación con Hebreos 1:7.
  reviewer_model: gpt-5.4
