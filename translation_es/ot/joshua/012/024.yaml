  lexicon: HALOT
  rationale: En la lista enumerativa de reyes derrotados, el constructo hebreo se vierte de forma natural como 'el rey de' en español, preservando el valor identificador del título sin añadir matices.
- source_word: תִּרְצָה
  english_pob_choice: Tirzah
  chosen_spanish: Tirsa
  alternatives_spanish:
  - Tirzah
  lexicon: HALOT
  rationale: Es nombre propio de lugar. En español bíblico, 'Tirsa' es la forma transliterada más establecida y legible, sin alterar la referencia geográfica.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - una
  lexicon: HALOT
  rationale: 'El numeral retoma el formato sucinto de la lista: ''uno'' funciona de modo natural en español para indicar un rey correspondiente a esa ciudad.'
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - el total de
  lexicon: HALOT
  rationale: El valor sumativo de la cláusula final se expresa con 'todos', que en español resulta directo y mantiene la idea de totalidad del conjunto enumerado.
- source_word: מְלָכִים
  english_pob_choice: the kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - reyes
  lexicon: HALOT
  rationale: La frase final se refiere al conjunto ya listado; el artículo ayuda a marcar ese grupo específico en la suma final, como en el inglés auditado.
- source_word: שְׁלֹשִׁים וְאֶחָד
  english_pob_choice: thirty-one
  chosen_spanish: treinta y uno
  alternatives_spanish:
  - treinta y una
  lexicon: HALOT
  rationale: El número compuesto se vierte con la forma estándar española 'treinta y uno', equivalente directo del total hebreo.
