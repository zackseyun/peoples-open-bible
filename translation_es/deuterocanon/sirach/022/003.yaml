    text: 'Griego, literalmente: ''La vergüenza de un padre es el engendrar a un [hijo] indisciplinado''. ''Hijo'' se infiere del adjetivo masculino.'
    reason: lexical_alternative
  - marker: b
    text: O 'para disminución', 'para menoscabo' o 'para pérdida de su padre'; la expresión griega apunta a reducción o pérdida, pero su matiz exacto queda comprimido.
    reason: alternative_reading
  revision_rationale: 'Se conserva intacto el texto principal porque es fiel, natural y bien alineado con el griego y la audit trail inglesa. Solo se corrigen las notas para preservar la distinción filológica documentada: la nota [a] ahora sí refleja la literalidad de ''engendrar'' y el hijo implícito, y la nota [b] se pule para mejor español.'
