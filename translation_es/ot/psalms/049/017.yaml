translation:
  language: es
  text: No temas cuando un hombre se enriquezca[a], cuando aumente la gloria de su casa;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su familia' o 'su hacienda'; el hebreo 'su casa' puede referirse a la familia o al patrimonio, además de la casa física.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - No vayas a
  lexicon: HALOT
  rationale: אַל con verbo jussivo expresa prohibición; en español, la negación simple con imperativo implícito comunica de forma natural y fiel la fuerza prohibitiva.
- source_word: תִּירָא
  english_pob_choice: fear
  chosen_spanish: temas
  alternatives_spanish:
  - tengas miedo
  - receles
  lexicon: HALOT
  rationale: ירא expresa el temor como reacción interna; 'temas' conserva el registro poético y la concisión del hebreo.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia que no debe producir temor, no una causa en sentido explicativo. 'Cuando' reproduce mejor el valor situacional.
- source_word: יַעֲשִׁר
  english_pob_choice: becomes rich
  chosen_spanish: se enriquezca
  alternatives_spanish:
  - se haga rico
  - gane riquezas
  lexicon: HALOT
  rationale: El hiphil de עשר expresa hacerse rico o llegar a ser rico; 'se enriquezca' mantiene el matiz intransitivo y el tono sobrio del verso.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: HALOT
  rationale: Se conserva el masculino singular del hebreo, de uso proverbial y genérico, sin neutralizar indebidamente la forma del original.
- source_word: יִרְבֶּה
  english_pob_choice: increases
  chosen_spanish: aumente
  alternatives_spanish:
  - crezca
  - se multiplique
  lexicon: HALOT
  rationale: רבה con כְּבוֹד indica aumento o crecimiento. 'Aumente' es natural en español y conserva la progresión del paralelo hebreo.
- source_word: כְּבוֹד
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - el esplendor
  - la riqueza
  lexicon: HALOT
  rationale: כבוד puede abarcar honra, prestigio o esplendor; en este contexto se mantiene 'gloria' para conservar la metáfora hebrea y no reducirla de antemano a dinero o posesión.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - de su familia
  - de su hogar
  - de su casa y hacienda
  lexicon: HALOT
  rationale: '''Casa'' mantiene la imagen hebrea. En español puede abarcar familia, casa-hogar o patrimonio, sin perder la amplitud semántica que documenta la nota inglesa.'
translation_notes:
  revision_awareness: 'Coincide con la lectura de la fuente hebrea y con la auditoría inglesa: prohibición directa, dos cláusulas temporales con כִּי, y ''casa'' conservado por su amplitud semántica. No se registran revisiones aplicadas en el expediente; el pasaje quedó sin cambios en el último pase.'
  spanish_consistency_notes:
  - Se mantiene 'gloria' para כְּבוֹד, en línea con la decisión inglesa de no reducirlo a riqueza.
  - '''Un hombre'' conserva el singular genérico del hebreo.'
  - La nota sobre 'casa' recoge la misma alternativa documentada en el texto inglés, adaptada al español.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; el verso no contiene el nombre divino.
