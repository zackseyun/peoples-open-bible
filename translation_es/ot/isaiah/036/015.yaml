translation:
  language: es
  text: 'Y no dejen que Ezequías los haga confiar en Yahvé, diciendo: «Yahvé nos librará ciertamente[a]; esta ciudad no será entregada en poder[b] del rey de Asiria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «librando librará»; construcción enfática que significa «nos librará ciertamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en mano del rey de Asiria»; la imagen hebrea también puede conservarse como «en manos de» o explicarse como «en poder de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל
  english_pob_choice: And do not
  chosen_spanish: Y no
  alternatives_spanish:
  - Y no permitáis
  - Pero no
  lexicon: HALOT
  rationale: La combinación de conjunción + prohibición se expresa de forma natural en español con «Y no», conservando el flujo del discurso sin endurecerlo artificialmente.
- source_word: יַבְטַח
  english_pob_choice: let ... make you trust
  chosen_spanish: os haga confiar
  alternatives_spanish:
  - haga que confiéis
  - os lleve a confiar
  - os engañe para que confiéis
  lexicon: HALOT
  rationale: El hiphil es causativo; «os haga confiar» conserva la fuerza causativa mejor que un simple «confiar» y evita añadir la idea de engaño que no está explícita en el verbo.
- source_word: אֶתְ/כֶם
  english_pob_choice: you
  chosen_spanish: os
  alternatives_spanish:
  - a vosotros
  - les
  lexicon: HALOT
  rationale: El pronombre de objeto directo se traduce naturalmente por «os» en español peninsular neutro de registro bíblico; mantiene la segunda persona plural del hebreo.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezekías
  lexicon: onoma
  rationale: Nombre bíblico tradicional y reconocible en español; es la forma estándar en lectura eclesial y académica.
- source_word: אֶל יְהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en el SEÑOR
  - hacia Yahvé
  lexicon: HALOT
  rationale: Con בטח, el español idiomático pide «confiar en». Se mantiene el nombre divino «Yahvé» según el criterio del proyecto, en vez de mascarlo con «SEÑOR».
- source_word: לֵ/אמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y diciendo
  lexicon: HALOT
  rationale: Introducción estándar de cita directa; «diciendo» conserva la relación sintáctica sin sobrecargar la frase.
- source_word: הַצֵּל יַצִּילֵ/נוּ
  english_pob_choice: will surely deliver us
  chosen_spanish: nos librará ciertamente
  alternatives_spanish:
  - nos rescatará ciertamente
  - nos salvará sin falta
  - seguramente nos librará
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto exige énfasis. «Ciertamente» reproduce la certeza enfática sin introducir un giro más interpretativo que «sin falta».
- source_word: לֹא תִנָּתֵן
  english_pob_choice: will not be given
  chosen_spanish: no será entregada
  alternatives_spanish:
  - no será dada
  - no será puesta
  - no será abandonada
  lexicon: HALOT
  rationale: El pasivo de נתן en contexto bélico suele equivaler a «entregar»; en español «ser entregada» conserva mejor el matiz de rendición o cesión que un simple «ser dada».
- source_word: הָ/עִיר הַ/זֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - esta misma ciudad
  lexicon: HALOT
  rationale: Equivalencia directa y natural del demostrativo con el sustantivo definido.
- source_word: בְּ/יַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en manos de
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» se conserva en español con un giro breve y bíblico. «En mano de» mantiene la metáfora sin perder claridad.
- source_word: מֶ֥לֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  - el rey de los asirios
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma estándar y clara en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» en el texto principal, preservando el nombre pactal sin la convención de sustitución por mayúsculas.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Degree of emphasis in הַצֵּל יַצִּילֵנוּ
  english_pob_reading: will surely deliver us
  chosen_spanish_reading: nos librará ciertamente
  alternative_spanish_readings:
  - nos rescatará ciertamente
  - nos salvará ciertamente
  rationale: La combinación de infinitivo absoluto + imperfecto expresa énfasis. «Ciertamente» reproduce esa intensificación sin alargar innecesariamente el enunciado.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Rendering of בְּיַד in a military context
  english_pob_reading: into the hand of
  chosen_spanish_reading: en mano de
  alternative_spanish_readings:
  - en poder de
  - entregado a
  rationale: Se conserva la metáfora corporal del hebreo, importante en lenguaje bíblico, sin oscurecer el sentido de dominio o captura.
  doctrine_reference: HALOT; project style on idiomatic biblical imagery
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente marcada como sin cambios y de alto acuerdo; no se aplicaron cambios sustantivos respecto al análisis auditado, solo se trasladaron las decisiones léxicas al español con ajuste natural de sintaxis y preservación del énfasis hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé en lugar de SEÑOR conforme al estándar del proyecto.
  - Se conserva el valor causativo del hiphil con «hacer confiar».
  - Se traduce el pasivo de נתן con «ser entregada» para reflejar mejor el contexto militar.
  - Se usa terminología bíblica natural y reconocible para la audiencia hispanohablante sin diluir la imagen hebrea.
