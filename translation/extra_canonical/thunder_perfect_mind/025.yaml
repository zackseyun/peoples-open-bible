  (status vs essence tension); war/peace (explicit antithesis). Repetition of “I am”
  is retained across lines to keep the poem’s cadence and parallel structure. The
  interiority clause “within me they are” mirrors the Coptic placement after war/peace.'
voice_check: First-person divine/primordial voice is maintained with repeated “I am”
  assertions and a concluding imperative address (“heed me”), matching Thunder’s commanding,
  paradox-embracing tone.
