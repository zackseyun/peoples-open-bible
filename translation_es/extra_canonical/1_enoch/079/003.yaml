translation:
  language: es
  text: Y la luna mengua[a], lo cual acontece por la sexta puerta; pues en esta sexta puerta su luz se completa[c][b], y de ella proviene el comienzo de su mengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mengua por la sexta puerta». El giro ge''ez es formal y procedimental más que puramente observacional.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la cabeza de la disminución», un modismo que significa el comienzo o inicio del decrecimiento de la luna.
    reason: lexical_alternative
  - marker: c
    text: 'O: «Y la luna hace su mengua, la cual es efectuada».'
    reason: previous_rendering
lexical_decisions:
- source_word: ሐጸጸ
  english_pob_choice: wanes / makes its waning
  chosen_spanish: mengua
  alternatives_spanish:
  - disminuye
  - va menguando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo ge'ez es un verbo simple de disminución; en español, «mengua» conserva esa acción verbal directa sin convertirla en una perífrasis innecesaria.
- source_word: ወርኅ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  - el astro lunar
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Es el término estándar y natural en español para el cuerpo celeste aludido en este contexto astronómico.
- source_word: ይትገበር
  english_pob_choice: takes place / is effected
  chosen_spanish: acontece
  alternatives_spanish:
  - se efectúa
  - tiene lugar
  - se produce
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El ge'ez expresa un proceso pasivo/reflexivo. «Acontece» mantiene el matiz de suceso ordenado sin sonar técnico en exceso, y evita una construcción demasiado rígida en español.
- source_word: በሳድስት ኆኅት
  english_pob_choice: through the sixth gate
  chosen_spanish: por la sexta puerta
  alternatives_spanish:
  - a través de la sexta puerta
  - mediante la sexta puerta
  - en la sexta puerta
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: En español, «por» expresa bien el canal o medio por el que ocurre el proceso celeste, manteniendo la imagen de portal sin forzar una literalidad poco natural.
- source_word: ይትፌጸም
  english_pob_choice: is completed
  chosen_spanish: se completa
  alternatives_spanish:
  - se termina
  - alcanza su plenitud
  - queda completo
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La idea es de llegar a su medida plena. «Se completa» conserva la noción de totalidad alcanzada y funciona bien en español contemporáneo.
- source_word: ብርሃኑ ዚአሁ
  english_pob_choice: its light
  chosen_spanish: su luz
  alternatives_spanish:
  - su claridad
  - su resplandor
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: «Luz» es la equivalencia directa y más transparente para la referencia lunar del pasaje.
- source_word: እምኔሁ
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de allí
  - a partir de ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El antecedente inmediato es «la sexta puerta»; en español, «de ella» conserva con claridad la referencia al punto de origen del siguiente proceso.
- source_word: ርእሰ ታሕጻጼት
  english_pob_choice: the beginning of the waning
  chosen_spanish: el comienzo de su mengua
  alternatives_spanish:
  - el principio de la disminución
  - la cabeza de la disminución
  - el inicio de su declive
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'La expresión es idiomática: literalmente «la cabeza/beginning de la disminución». «El comienzo de su mengua» preserva el sentido de inicio y mantiene la relación con el proceso lunar descrito.'
theological_decisions:
- issue: Preservar la cosmología procedimental del Libro Astronómico sin volverla una observación moderna
  english_pob_reading: 'Retain procedural cosmic imagery: the moon wanes through the sixth gate, and its light is completed there.'
  chosen_spanish_reading: Mantener el lenguaje de proceso y de puertas celestes, sin reducirlo a una explicación astronómica moderna.
  alternative_spanish_readings:
  - La luna disminuye en la sexta puerta.
  - La luna pasa por la sexta puerta y entonces mengua.
  rationale: El texto no describe solo un fenómeno visual, sino un orden cósmico estructurado. La versión española conserva esa secuencia formal de paso, completitud y comienzo de la disminución.
  doctrine_reference: 'Translation philosophy: preserve apocalyptic imagery; do not paraphrase beyond the witness.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente que corrigió el verbo principal a un simple «wanes»/«takes place». Por eso el español evita una perífrasis como «hace su mengua» y opta por verbos directos: «mengua» y «acontece». También conserva la noción de completitud en lugar de una paráfrasis explicativa, respetando el carácter procedimental del ge''ez.'
  spanish_consistency_notes:
  - Se mantiene «luna» y no «mes» o «astro» para la coherencia terminológica con los pasajes astronómicos del libro.
  - Se evita «SEÑOR» u այլ terminología de sustitución porque el pasaje no contiene el nombre divino.
  - «Puerta» se conserva literalmente para mantener la imagen cosmológica del original.
  - Se usa «mengua» en vez de «disminuye» para dar más naturalidad sin perder el valor lexical del verbo ge'ez.
