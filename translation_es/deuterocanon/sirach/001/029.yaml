translation:
  language: es
  text: Ama el temor de Yahvé[a], y alegra tu corazón en ello[b]; y no temas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego tiene un texto sustancialmente distinto: «El corazón del inteligente reflexionará sobre un proverbio, y el oído del oyente es el deseo de un sabio». Este versículo es textualmente incierto.'
    reason: alternative_reading
  - marker: b
    text: El hebreo dice literalmente algo como «bendice tu corazón en ello», una expresión idiomática e incierta; puede tener el sentido de tener tu corazón por dichoso en el temor de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱהַב
  english_pob_choice: Love
  chosen_spanish: Ama
  alternatives_spanish:
  - Ama
  - QuierE
  lexicon: HALOT
  rationale: Imperativo de אהב; en español bíblico y moderno, 'amar' conserva la fuerza volitiva directa sin suavizar el mandato.
- source_word: יִרְאַת יְהֹוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor de Yahvé
  - el temor del Señor
  - la reverencia de Yahvé
  lexicon: HALOT
  rationale: '''Temor'' preserva la tensión sapiencial del hebreo y no la reduce a mera ''reverencia''. Se usa ''Yahvé'' según el estándar del proyecto para יהוה.'
- source_word: וְאַשֵּׁר
  english_pob_choice: make happy
  chosen_spanish: alegra
  alternatives_spanish:
  - haz feliz
  - bendice
  - considera dichoso
  lexicon: HALOT
  rationale: El valor idiomático aquí apunta a causar gozo/dicha en el corazón; 'alegra' comunica bien la idea sin perder el matiz de bienestar interior. Evita una calca demasiado extraña como 'bendice tu corazón'.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu corazón
  - tu interior
  - tu mente
  lexicon: HALOT
  rationale: '''Corazón'' mantiene la antropología hebrea del centro de la persona y su vida interior.'
- source_word: בָּהּ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en ella
  - por él
  - con él
  lexicon: HALOT
  rationale: El pronombre remite a 'el temor' (sustantivo masculino en español) y el sentido locativo 'en él' reproduce bien la relación del mandato con la esfera del temor de Yahvé.
- source_word: וְאַל תִּירָא
  english_pob_choice: and do not fear
  chosen_spanish: y no temas
  alternatives_spanish:
  - y no tengas miedo
  - y no temas nada
  lexicon: HALOT
  rationale: Imperativo negativo de ירא; 'no temas' conserva el enlace verbal con 'temor' del inicio del verso, manteniendo la figura retórica.
theological_decisions:
- issue: Mantenimiento del tetragrámaton como nombre divino
  english_pob_reading: the fear of Yahweh
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - el temor del Señor
  - la reverencia de Yahvé
  rationale: Se conserva el nombre divino en forma explícita, según la política del proyecto, en vez de sustituirlo por una máscara devocional. Esto mantiene la transparencia del texto fuente y la coherencia con el POB inglés.
  doctrine_reference: 'PHILOSOPHY.md: render YHWH as Yahvé in Spanish, not as SEÑOR masking convention'
- issue: Tensión textual entre hebreo y griego en Sirácides
  english_pob_reading: Translate the extant Hebrew as the primary text, while acknowledging that the Greek parallel reflects a substantially different verse.
  chosen_spanish_reading: Seguir el hebreo transmitido y señalar la divergencia griega en nota.
  alternative_spanish_readings:
  - 'Una versión basada en el griego: ''El corazón del inteligente reflexionará sobre un proverbio, y el oído del que escucha es el deseo de un sabio.'''
  rationale: La traducción principal sigue el hebreo disponible, pero el testimonio griego presenta una forma sustancialmente distinta y textualmente inestable. La nota preserva esa tensión sin borrar ninguna de las dos tradiciones.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: El borrador inglés más reciente pasó de una calca más literal (“bless your heart in it”) a una expresión más natural (“make your heart happy in it”). Esta versión española adopta ese ajuste semántico con un equivalente idiomático natural (“alegra tu corazón en él”) sin perder la relación con el hebreo ni la repetición de 'temor'/'temas'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה.
  - Se mantiene 'temor' y 'no temas' para conservar la repetición léxica del hebreo.
  - '''Corazón'' se conserva como centro interior de la persona, no como mero órgano físico.'
  - La nota a integra la divergencia con el griego sin desplazar el hebreo como texto principal.
