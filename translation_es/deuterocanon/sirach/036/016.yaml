translation:
  language: es
  text: Llena Sion[a] con tus alabanzas, y[a?] a tu pueblo[b] con tu gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con la proclamación de tus obras poderosas», o «con tus excelencias». El sustantivo griego puede denotar alabanza o la proclamación de hechos o excelencias dignos de alabanza.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «y a tu pueblo de tu gloria». En español se expresa de manera natural como «y a tu pueblo con tu gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: πλῆσον
  english_pob_choice: Fill
  chosen_spanish: Llena
  alternatives_spanish:
  - Haz plena
  - Lena
  lexicon: LSJ
  rationale: El imperativo aoristo expresa una acción directa de colmar o hacer lleno. En español, «llena» transmite con naturalidad esa petición imperativa y conserva la imagen concreta.
- source_word: Σιὼν
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: LSJ
  rationale: Se conserva el topónimo bíblico tradicional en español. «Sion» es la forma más asentada y legible en español bíblico.
- source_word: ἀρεταλογίας
  english_pob_choice: praises
  chosen_spanish: alabanzas
  alternatives_spanish:
  - proclamación de tus obras poderosas
  - proclamación de tus excelencias
  - obras poderosas
  - excelencias
  - alabanzas
  lexicon: LSJ
  rationale: El término puede referirse al elogio o a la proclamación de hechos/excelencias dignas de alabanza. En este contexto de oración, «alabanzas» funciona de modo natural en español y conserva el valor de celebración; se mantienen alternativas más específicas por la ambigüedad léxica del griego.
- source_word: ἀπὸ τῆς δόξης σου
  english_pob_choice: with your glory
  chosen_spanish: con tu gloria
  alternatives_spanish:
  - desde tu gloria
  - de tu gloria
  lexicon: LSJ
  rationale: Aunque ἀπό puede ser literalmente «desde/de», con un verbo de llenado el sentido natural en español es el contenido con que se llena. «Con tu gloria» comunica bien el resultado sin perder que la gloria procede de Dios.
- source_word: τὸν λαόν σου
  english_pob_choice: your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - tu pueblo
  lexicon: LSJ
  rationale: El acusativo griego como objeto directo se expresa naturalmente en español con «a tu pueblo» en esta construcción verbal.
theological_decisions:
- issue: Valor de ἀρεταλογίας en una súplica de restauración
  english_pob_reading: '''praises'' in the main text, with footnote alternatives such as ''the proclamation of your mighty deeds'' and ''your excellencies'''
  chosen_spanish_reading: «alabanzas» en el texto principal, con alternativas en nota para la proclamación de obras/excelencias
  alternative_spanish_readings:
  - proclamación de tus obras poderosas
  - proclamación de tus excelencias
  - obras poderosas
  - excelencias
  rationale: El griego admite tanto el acto de alabar como la celebración de actos o excelencias dignas de alabanza. En español, «alabanzas» es claro y reverente, y la nota preserva la tensión lexical sin resolverla de forma excesiva.
  doctrine_reference: Principio de equivalencia óptima; conservar alternativas significativas cuando el término fuente es ambiguo.
- issue: Sentido de ἀπό tras un verbo de llenar
  english_pob_reading: Expressed naturally as 'with your glory'
  chosen_spanish_reading: Expresado naturalmente como «con tu gloria»
  alternative_spanish_readings:
  - desde tu gloria
  - de tu gloria
  rationale: Una traducción rígida con «de» o «desde» sería menos natural en español y podría oscurecer el sentido de llenado. «Con tu gloria» conserva la procedencia divina implícita y la imagen de plenitud.
  doctrine_reference: Equivalencia óptima y claridad idiomática sin borrar el matiz de origen.
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del audit trail en inglés, que ajustó 'praise' a 'praises' para reflejar mejor el plural lexical de ἀρεταλογίας. En español se optó por «alabanzas», que recoge ese valor plural sin forzar una construcción poco natural.
  spanish_consistency_notes:
  - Se mantiene «Sion» como forma bíblica española estándar, coherente con un registro eclesial moderno.
  - Se usa «alabanzas» en plural para respetar el matiz del audit trail inglés y la posible pluralidad semántica del sustantivo griego.
  - «Con tu gloria» reproduce la naturalidad española del verbo de llenado y respeta el origen divino de la gloria.
  - La estructura con objeto personal «a tu pueblo» refleja bien el griego y suena idiomática en español.
