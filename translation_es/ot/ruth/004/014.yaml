translation:
  language: es
  text: 'Entonces las mujeres dijeron a Noemí: «Bendito sea Yahvé, que no te ha dejado sin redentor[a] hoy, y que su nombre sea renombrado en Israel[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pariente-redentor» o «guardián-redentor», destacando la función jurídico-familiar de un pariente cercano que actúa para restaurar y proteger una línea familiar. El «redentor» puede referirse específicamente al niño recién nacido como restaurador de Noemí, aunque algunos lo entienden de manera más amplia a la luz del papel de Booz como redentor en el capítulo.
    reason: lexical_alternative_and_alternative_reading
  - marker: b
    text: 'Hebreo literalmente: «y que su nombre sea llamado en Israel»; la expresión significa que su nombre será conocido, invocado u honrado en Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמַרְנָה
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: HALOT
  rationale: El wayyiqtol marca secuencia narrativa; «Entonces» reproduce bien ese avance en español sin forzar un calco.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las damas
  - las mujeres de la ciudad
  lexicon: HALOT
  rationale: Es el sustantivo plural definido normal y el referente comunitario más directo en el contexto.
- source_word: בָּרוּךְ יְהוָה
  english_pob_choice: Blessed be Yahweh
  chosen_spanish: Bendito sea Yahvé
  alternatives_spanish:
  - Bendito es Yahvé
  - Alabado sea Yahvé
  lexicon: HALOT
  rationale: La fórmula hebrea es benedictiva; «Bendito sea» conserva mejor esa forma optativa/clamativa. Se usa «Yahvé» según la norma del proyecto para יְהוָה.
- source_word: אֲשֶׁר לֹא הִשְׁבִּית לָךְ
  english_pob_choice: who has not left you without
  chosen_spanish: que no te ha dejado sin
  alternatives_spanish:
  - que no ha dejado de darte
  - que no te ha privado de
  lexicon: HALOT
  rationale: El hifil de שבת expresa hacer cesar o dejar falto; en este contexto con גֹּאֵל, el sentido idiomático es no haberla dejado carente de redentor.
- source_word: גֹּאֵל
  english_pob_choice: redeemer
  chosen_spanish: redentor
  alternatives_spanish:
  - pariente-redentor
  - goel
  lexicon: HALOT
  rationale: «Redentor» comunica la función legal-familiar de גֹּאֵל en un español natural. Se evita sustituirlo por una palabra eclesiástica más amplia que diluya el matiz jurídico-familiar.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Adverbio temporal directo e idiomático.
- source_word: וְיִקָּרֵא שְׁמוֹ
  english_pob_choice: and may his name be renowned
  chosen_spanish: y que su nombre sea celebrado
  alternatives_spanish:
  - y que su nombre sea llamado
  - y que su nombre sea conocido
  lexicon: HALOT
  rationale: El niphal de קרא con «nombre» en este contexto expresa que el nombre llegue a ser reconocido y honrado. «Celebrado» preserva el valor de honor/proclamación sin el literalismo engañoso de «llamado».
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  lexicon: HALOT
  rationale: Mantiene la esfera comunitaria donde ese nombre será reconocido y honrado.
theological_decisions:
- issue: Referente de גֹּאֵל en la cláusula de «redentor»
  english_pob_reading: The term is left as 'redeemer' without specifying in the main text whether it refers directly to the newborn child as Naomi's restorer or more broadly to Boaz's redemptive provision through the child.
  chosen_spanish_reading: Se deja «redentor» sin precisar en el texto principal si se refiere de manera inmediata al niño recién nacido como restaurador de Noemí, o de forma más amplia a la provisión redentora de Booz mediante el niño.
  alternative_spanish_readings:
  - Se refiere específicamente a Obed, el niño recién nacido.
  - Se refiere retrospectivamente a Booz como el pariente-redentor que actúa.
  rationale: El contexto inmediato favorece al niño como referente proximal, pero el marco jurídico-redentor del libro mantiene visible el papel de Booz. La traducción conserva esa tensión en vez de resolverla más allá de lo que el hebreo exige.
  doctrine_reference: Preservar la tensión interpretativa del texto en vez de cerrarla prematuramente.
- issue: Fórmula benedictiva con el nombre divino
  english_pob_reading: Blessed be Yahweh
  chosen_spanish_reading: Bendito sea Yahvé
  alternative_spanish_readings:
  - Bendito es Yahvé
  - Alabado sea Yahvé
  rationale: La doxología corresponde a una bendición dirigida al Dios de Israel; se mantiene el nombre divino con la transliteración del proyecto y la forma benedictiva española más natural.
  doctrine_reference: Norma POB para יְהוָה como Yahvé.
translation_notes:
  revision_awareness: La presente redacción sigue de cerca el texto hebreo y coincide con la auditoría inglesa sin cambios necesarios en la revisión más reciente; se preserva la ambigüedad referente de גֹּאֵל y la fuerza benedictiva de la fórmula inicial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton.
  - Se usa «redentor» como término principal para גֹּאֵל, con nota de alternativa jurídico-familiar.
  - Se vierte la cláusula final como deseo/jussivo español («que su nombre sea celebrado») para reflejar el valor del niphal hebreo.
  - Se usa Noemí, con acento, según la forma española habitual y clara.
  - Se conserva el nombre «Booz» en la nota como transliteración española estándar para Boaz.
