review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: mandato real de convocar a cuatro grupos de especialistas, propósito de comunicar los sueños del rey, y su comparecencia ante él. Sin embargo, omite en las notas la ambigüedad documentada de «caldeos» y en un punto suaviza innecesariamente la correspondencia verbal con «declararan», donde «contaran» o «dijeran» encaja mejor con «hacer saber sus sueños».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «para que le declararan al rey sus sueños» suena algo forzado y redundante por la combinación «le ... al rey». «Se pusieron delante del rey» es comprensible, aunque «estuvieron ante el rey» o «comparecieron ante el rey» sería más natural; con todo, una opción más literal como «estuvieron delante del rey» mantiene bien el sentido. También falta trasladar la nota inglesa sobre «caldeos».
  glossary_alignment: No hay términos del glosario principal en juego salvo la necesidad de conservar «caldeos» por la ambigüedad léxica documentada. El borrador ya usa «caldeos», pero debe añadir la nota correspondiente. Las demás decisiones léxicas son compatibles con la auditoría inglesa, aunque conviene ajustar «declararan» a una opción española más natural y cercana al sentido.
  issues:
  - severity: medium
    issue: Falta la nota sobre «caldeos».
    rationale: La auditoría inglesa preserva explícitamente la ambigüedad de כַּשְׂדִּים entre etnónimo y clase de sabios de corte. El español conserva el término, pero sin la nota se pierde una decisión léxica documentada.
  - severity: medium
    issue: «para que le declararan al rey sus sueños» suena poco natural y algo pesado.
    rationale: Aunque «declararan» no es imposible, en español bíblico legible resulta más natural «para contarle al rey sus sueños» o «para decirle al rey sus sueños». Esto mantiene el sentido de לְהַגִּיד sin rigidez innecesaria.
  - severity: low
    issue: «se pusieron delante del rey» es menos idiomático que otras opciones.
    rationale: La frase es entendible, pero en español suena algo mecánica. «Estuvieron delante del rey» conserva la literalidad y mejora la fluidez; «comparecieron ante el rey» sería más idiomático, aunque algo más interpretativo.
  revised_spanish_text: Entonces el rey ordenó llamar[a] a los magos, a los encantadores, a los hechiceros y a los caldeos[b], para contarle al rey sus sueños. Y vinieron y estuvieron delante del rey.
  revised_footnotes:
