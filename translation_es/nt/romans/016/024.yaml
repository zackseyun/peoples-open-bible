translation:
  language: es
  text: La gracia de nuestro Señor Jesús Mesías esté con todos ustedes[b][a]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesús Cristo». El griego Χριστός puede representarse con la transliteración tradicional «Cristo»; aquí se traduce como «Mesías» para conservar el sentido del título.'
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos incluyen este versículo, mientras que otros lo omiten; muchas ediciones modernas lo ponen entre corchetes al final de Romanos como variante textual.
    reason: textual_variant
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En una bendición paulina, χάρις conserva su sentido teológico y relacional como ‘gracia’; ‘favor’ estrecha el campo semántico y pierde el peso habitual del término en este contexto.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: κύριος aquí funciona como título cristológico y en español ‘Señor’ es la equivalencia natural y reverente; ‘Maestro’ no expresa adecuadamente la relación de señorío.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Siguiendo la preferencia del proyecto por traducir Χριστός como ‘Mesías’ cuando actúa como título, ‘Jesús Mesías’ preserva mejor el sentido titular que la forma tradicionalizada ‘Cristo’.
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: with all of you
  chosen_spanish: con todos ustedes
  alternatives_spanish:
  - con todos vosotros
  - con todos ustedes y vosotros
  lexicon: BDAG
  rationale: μετά con genitivo expresa compañía; ‘con todos ustedes’ es natural en español neutral latinoamericano y comunica el alcance inclusivo de πάντων ὑμῶν.
- source_word: Ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amen
  lexicon: BDAG
  rationale: Se conserva la forma litúrgica tradicional en español, con acento gráfico conforme al uso estándar.
theological_decisions:
- issue: Cómo verter Χριστός en la fórmula benedictoria
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La lectura auditada entiende Χριστός como título y no como mero apellido fijo; ‘Mesías’ mantiene el trasfondo hebraico y evita perder la carga semántica del título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Tratamiento del posible estatuto textual del versículo
  english_pob_reading: Some manuscripts include this verse, while others omit it; many modern editions bracket it as a textual variant in the closing of Romans.
  chosen_spanish_reading: No se incorpora nota en el texto principal, pero se preserva en la conciencia de revisión como variante textual reconocida.
  alternative_spanish_readings:
  - Incluir una nota textual explícita en el texto principal
  - Suprimir toda mención de la variante
  rationale: Dado que el encargo pide un solo versículo para un borrador publicable, el texto principal se formula con fluidez; la decisión textual sigue siendo auditable en el registro de revisión y no se oculta la variante en la documentación interna.
  doctrine_reference: Principio editorial POB sobre variantes textuales auditables
translation_notes:
  revision_awareness: El pasaje griego corresponde a una bendición breve y existe una variación textual conocida en su ubicación final en Romanos. La redacción española sigue el texto griego dado y conserva la fórmula de bendición con el tratamiento del título Χριστός como ‘Mesías’, en línea con la auditoría inglesa y la preferencia terminológica del proyecto.
  spanish_consistency_notes:
  - Se usa ‘gracia’ para χάρις por su valor paulino estable.
  - Se usa ‘Señor’ para κύριος en referencia a Jesús, sin ocultar el título.
  - Se evita ‘Cristo’ en el texto principal porque el audit trail inglés documenta la opción titular ‘Messiah’; la nota ofrece la alternativa tradicional.
  - ‘Amén’ se mantiene como transliteración litúrgica estándar en español.
  - ‘Con todos ustedes’ preserva la inclusividad del plural griego y suena natural en español neutral latinoamericano.
