translation:
  language: es
  text: No mires el vino cuando enrojece, cuando brilla en la copa[a], cuando se desliza suavemente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «cuando da su ojo en la copa», un modismo hebreo para el atractivo visual del vino.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando va en rectitud»; aquí el sentido es que el vino pasa con facilidad, o suavemente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / תֵּרֶא
  english_pob_choice: Do not look at
  chosen_spanish: No mires
  alternatives_spanish:
  - No veas
  - No fijes tus ojos en
  lexicon: HALOT
  rationale: אַל con el imperfecto expresa prohibición. En español, «No mires» conserva el tono directo y volitivo del aviso mejor que una forma más explicativa.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: El sustantivo común יַיִן se traduce de manera estándar como «vino».
- source_word: כִּי יִתְאַדָּם
  english_pob_choice: when it is red
  chosen_spanish: cuando enrojece
  alternatives_spanish:
  - cuando se pone rojo
  - cuando está rojo
  lexicon: HALOT
  rationale: El verbo hitpael de אדם describe el volverse rojo. «Cuando enrojece» preserva el proceso visual sin sonar forzado en español.
- source_word: כִּי יִתֵּן בַּכּוֹס עֵינוֹ
  english_pob_choice: when it sparkles in the cup
  chosen_spanish: cuando brilla en la copa
  alternatives_spanish:
  - cuando da su ojo en la copa
  - cuando muestra su color en la copa
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude al atractivo visual del vino en la copa. «Brilla en la copa» comunica el efecto perceptible sin borrar la imagen figurada, que queda documentada en nota.
- source_word: יִתְהַלֵּךְ בְּמֵישָׁרִים
  english_pob_choice: it goes down smoothly
  chosen_spanish: se desliza suavemente
  alternatives_spanish:
  - avanza rectamente
  - va con suavidad
  lexicon: HALOT
  rationale: El hitpael de הלך aquí es idiomático para el paso fácil del vino al beberlo. «Se desliza suavemente» reproduce la idea de facilidad y fluidez; la alternativa más literal «rectamente» se conserva en nota como posibilidad de lectura.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés. No hay revisiones aplicadas en el registro inglés; por eso se mantiene la solución óptima ya aprobada, con equivalencias naturales en español y notas para los modismos semíticos difíciles.
  spanish_consistency_notes:
  - Se mantuvo «vino» para יַיִן como término estándar.
  - Se evitó «SEÑOR» u otros términos irrelevantes; no hay léxico divino en este versículo.
  - Se conservó la fuerza prohibitiva con un imperativo negativo breve.
  - Las imágenes poéticas se adaptaron a un español natural sin perder el carácter idiomático documentado en las notas.
