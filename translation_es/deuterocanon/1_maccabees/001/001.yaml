translation:
  language: es
  text: Y aconteció, después de que Alejandro el Macedonio, hijo de Filipo, que había salido de la tierra de Kittim[a], hirió a Darío, rey de los persas y medos, reinó él en su lugar[b], habiendo reinado primero sobre Grecia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kittim es un nombre bíblico tradicional. Según el contexto, puede referirse más específicamente a Chipre o, en sentido más amplio, a tierras occidentales.
    reason: cultural_note
  - marker: b
    text: 'O: «derrotó a Darío». El verbo griego literalmente significa «hirió» o «golpeó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue así que
  lexicon: BDAG
  rationale: La fórmula narrativa griega se conserva con un giro natural en español bíblico actual. «Aconteció» mantiene el tono historiográfico sin caer en una calca dura.
- source_word: μετὰ τὸ πατάξαι
  english_pob_choice: after ... struck down
  chosen_spanish: después que ... hirió
  alternatives_spanish:
  - después de que ... derrotó
  - tras ... derribó
  lexicon: BDAG
  rationale: La preposición temporal se expresa con naturalidad en español. Para πατάσσω, «hirió» conserva la fuerza física del verbo sin sobretraducirlo como mera victoria estratégica; el matiz de derrota queda en el contexto.
- source_word: Ἀλέξανδρον τὸν Φιλίππου τὸν Μακεδόνα
  english_pob_choice: Alexander the Macedonian, the son of Philip
  chosen_spanish: Alejandro el macedonio, hijo de Filipo
  alternatives_spanish:
  - Alejandro, el macedonio, hijo de Filipo
  - Alejandro, hijo de Filipo, el macedonio
  lexicon: BDAG
  rationale: 'Se mantienen los dos identificadores: filiación y procedencia/etnicidad. El orden elegido suena natural en español y no pierde ninguno de los rasgos del griego.'
- source_word: ἐξῆλθεν ἐκ τῆς γῆς Χεττιείμ
  english_pob_choice: had come out from the land of Kittim
  chosen_spanish: que había salido de la tierra de Kittim
  alternatives_spanish:
  - que había salido del país de Kittim
  - que vino de la tierra de Kittim
  lexicon: BDAG
  rationale: «Había salido» refleja bien el valor retrospectivo dentro de la cláusula relativa y mantiene el sentido direccional de ἐξέρχομαι. «Tierra» reproduce la amplitud del hebraísmo geográfico.
- source_word: Χεττιείμ
  english_pob_choice: Kittim
  chosen_spanish: Kittim
  alternatives_spanish:
  - Citim
  - Chipre
  lexicon: LSJ
  rationale: Se conserva la transliteración tradicional del topónimo bíblico, como en el audit trail inglés, porque el texto griego usa el nombre tradicional y no obliga a identificarlo de modo restrictivo.
- source_word: ἐπάταξεν
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derrotó
  - derribó
  lexicon: BDAG
  rationale: Se mantiene la misma familia semántica que en πατάξαι. «Hirió» permite conservar la energía verbal del original; no se diluye en una formulación demasiado abstracta.
- source_word: τὸν Δαρεῖον βασιλέα Περσῶν καὶ Μήδων
  english_pob_choice: Darius king of the Persians and Medes
  chosen_spanish: al rey Darío de los persas y de los medos
  alternatives_spanish:
  - al rey Darío, rey de los persas y de los medos
  - al rey Darío, de los persas y de los medos
  lexicon: BDAG
  rationale: Se preserva la estructura titulativa del griego con un español fluido. «De los persas y de los medos» traduce el genitivo de pertenencia sin forzar una construcción más pesada.
- source_word: ἐβασίλευσεν ἀντʼ αὐτοῦ
  english_pob_choice: he reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó en su lugar
  - gobernó en su lugar
  lexicon: BDAG
  rationale: La expresión española reproduce la sucesión monárquica indicada por ἀντʼ αὐτοῦ. «Reinó» conserva el léxico real del verbo βασιλεύω.
- source_word: πρότερον ἐπὶ τὴν Ἑλλάδα
  english_pob_choice: having first reigned over Greece
  chosen_spanish: habiendo reinado primero sobre Grecia
  alternatives_spanish:
  - habiendo gobernado antes sobre Grecia
  - primero reinó sobre Grecia
  lexicon: BDAG
  rationale: Se refleja el valor adverbial de πρότερον como prioridad temporal anterior a la sucesión implícita. «Habiendo reinado primero» transmite la relación temporal de la cláusula participial con suficiente claridad en español.
theological_decisions:
- issue: Nombre histórico-geográfico Χεττιείμ
  english_pob_reading: Kittim is a traditional biblical place-name; it can refer more specifically to Cyprus or more broadly to western lands depending on context.
  chosen_spanish_reading: Kittim se conserva como topónimo bíblico tradicional, sin identificarlo de manera cerrada en el texto principal.
  alternative_spanish_readings:
  - Chipre
  - las tierras occidentales
  - Citim
  rationale: No hay disputa doctrinal, pero sí una cuestión interpretativa. Como en el audit trail inglés, se preserva el nombre tradicional para respetar el testimonio del griego y no resolver prematuramente su referencia histórica.
  doctrine_reference: Principio de prioridad del texto fuente y de preservación de ambigüedad histórica cuando el original la mantiene.
- issue: Valor de πατάσσω en un relato militar
  english_pob_reading: Or 'defeated Darius.' The Greek verb literally means 'struck down.'
  chosen_spanish_reading: Se traduce con un verbo fuerte («hirió») que puede llevar implícita derrota, sin borrar el matiz físico del original.
  alternative_spanish_readings:
  - derrotó
  - derribó
  - abatió
  rationale: El español necesita un verbo natural que no suavice demasiado la violencia de la acción. «Hirió» conserva la literalidad básica del gesto verbal; el contexto histórico-militar completa el sentido de victoria.
  doctrine_reference: Principio de equivalencia óptima con atención al matiz léxico del verbo griego.
translation_notes:
  revision_awareness: 'El audit trail inglés ajustó la cláusula final para reflejar πρότερον de manera más completa: «having first reigned over Greece». La versión española sigue ese ajuste con «habiendo reinado primero sobre Grecia».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Kittim» se translitera de forma consistente con el record inglés para conservar el topónimo tradicional.
  - Se evita «Cristo», «SEÑOR» y otras sustituciones no presentes en el texto fuente.
  - La sintaxis procura ser readable en español sin perder la secuencia histórica del griego.
