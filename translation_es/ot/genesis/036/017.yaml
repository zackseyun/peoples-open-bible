translation:
  language: es
  text: 'Y estos son los hijos de Reuel, el hijo de Esaú: jefe Nahat[a], jefe Zera, jefe Samma, jefe Miza. Estos son los jefes de Reuel en la tierra de Edom. Estos son los hijos de Basemat, la esposa de Esaú.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “caudillo” para el hebreo repetido אַלּוּף, término que designa un líder tribal edomita.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Estos son
  - Ahora bien, estos son
  lexicon: HALOT
  rationale: La fórmula genealógica se expresa de manera natural en español con la misma conexión narrativa y demostrativa.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos
  lexicon: HALOT
  rationale: En español, dentro de una genealogía, 'hijos de' mantiene la relación familiar directa y funciona de modo idiomático; se evita forzar 'descendientes' donde el hebreo enumera linaje.
- source_word: רְעוּאֵל בֶּן עֵשָׂו
  english_pob_choice: Reuel, the son of Esau
  chosen_spanish: Reuel, el hijo de Esaú
  alternatives_spanish:
  - Reuel, hijo de Esaú
  lexicon: HALOT
  rationale: Se conserva la aposición genealógica con la coma, siguiendo el ajuste del expediente en inglés y la sintaxis natural del español.
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - líder de clan
  - príncipe
  lexicon: HALOT
  rationale: '''Jefe'' comunica el valor de líder tribal/edómico sin introducir un término más interpretativo como ''caudillo'' o uno más eclesiástico como ''príncipe''.'
- source_word: נַחַת
  english_pob_choice: Nahath
  chosen_spanish: Nahat
  alternatives_spanish:
  - Nahat
  lexicon: transliteration
  rationale: Se adapta la transliteración al uso español eliminando la aspiración final no necesaria para la lectura en español.
- source_word: זֶרַח
  english_pob_choice: Zerah
  chosen_spanish: Zérah
  alternatives_spanish:
  - Zera
  - Zerah
  lexicon: transliteration
  rationale: Se usa una forma legible en español que conserva el valor del nombre propio hebreo y evita una lectura demasiado anglicada.
- source_word: שַׁמָּה
  english_pob_choice: Shammah
  chosen_spanish: Samaa
  alternatives_spanish:
  - Shamma
  - Samma
  lexicon: transliteration
  rationale: Se vierte el nombre propio con una transliteración española simplificada y pronunciable, manteniendo la identidad del nombre sin cargarlo de ortografía inglesa.
- source_word: מִזָּה
  english_pob_choice: Mizzah
  chosen_spanish: Mizzá
  alternatives_spanish:
  - Mizá
  - Mizza
  lexicon: transliteration
  rationale: Se conserva la geminación representada por 'zz' y se adapta el acento prosódico al español.
- source_word: אֵלֶּה אַלּוּפֵי רְעוּאֵל
  english_pob_choice: These are the chiefs of Reuel
  chosen_spanish: Estos son los jefes de Reuel
  alternatives_spanish:
  - Estos son los caudillos de Reuel
  - Estos son los jefes clan de Reuel
  lexicon: HALOT
  rationale: Se mantiene el plural resumitivo y el valor tribal del término en una forma clara y sobria para el español moderno.
- source_word: בְּאֶרֶץ אֱדוֹם
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en Edom
  lexicon: HALOT
  rationale: Se conserva explícitamente 'tierra' porque el hebreo la incluye y aporta el marco geográfico del linaje.
- source_word: בָשְׂמַת אֵשֶׁת עֵשָׂו
  english_pob_choice: Basemath, Esau’s wife
  chosen_spanish: Basemat, la esposa de Esaú
  alternatives_spanish:
  - Basemat, mujer de Esaú
  lexicon: HALOT
  rationale: Se traduce el complemento explicativo con 'la esposa de Esaú', una forma natural en español que preserva la relación familiar indicada por el hebreo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca anclado en el texto español junto a uno de los términos que traduce אַלּוּף. El resto de la redacción se mantuvo alineada con la lógica genealógica del hebreo y con el expediente en inglés.
  spanish_consistency_notes:
  - Se usa 'hijos de' para el encabezado genealógico, pero 'jefe' para אַלּוּף siguiendo el valor técnico edomita del término.
  - Los nombres propios se han ajustado a una grafía española legible sin alterar la identificación de cada forma hebrea.
  - Se conserva 'la tierra de Edom' porque el sustantivo 'tierra' está explícito en el hebreo.
  - No se introduce terminología eclesiástica ni se suaviza la estructura repetitiva del versículo.
