translation:
  language: es
  text: Entonces el rey Acaz cortó los marcos de las bases y quitó la pila[a] de encima de ellas, y bajó el Mar[b] de sobre los bueyes de bronce[c] que estaban debajo de él, y lo puso sobre un pavimento de piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el lavatorio'. El hebreo כִּיּוֹר se refiere a un recipiente de lavado usado en el servicio del templo; 'pila' se escoge aquí como una opción moderna y natural.
    reason: lexical_alternative
  - marker: b
    text: '''El Mar'' es el nombre del gran recipiente hecho para el templo de Salomón (véase 1 Reyes 7:23–26).'
    reason: cross_reference
  - marker: c
    text: O 'los toros de bronce'. El término hebreo puede referirse de manera amplia al ganado; 'bueyes' es la traducción convencional en este contexto del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַצֵּץ
  english_pob_choice: cut off
  chosen_spanish: cortó
  alternatives_spanish:
  - cortó de raíz
  - cortó aparte
  - desgajó
  lexicon: HALOT
  rationale: קצץ expresa cortar o seccionar algo; en español, 'cortó' es natural y suficientemente fuerte en este contexto de desmantelamiento de objetos del templo.
- source_word: הַמִּסְגְּרוֹת
  english_pob_choice: the frames
  chosen_spanish: los marcos
  alternatives_spanish:
  - las molduras
  - los bordes
  - los encuadres
  lexicon: HALOT
  rationale: מִסְגְּרוֹת alude a partes enmarcadas o con borde; 'marcos' conserva esa idea sin cargarla con terminología técnica innecesaria.
- source_word: הַמְּכֹנוֹת
  english_pob_choice: the stands
  chosen_spanish: las bases
  alternatives_spanish:
  - los soportes
  - los pedestales
  - los stands
  lexicon: HALOT
  rationale: En el contexto del mobiliario del templo, מְכֹנוֹת son las bases/soportes de las pilas. 'Bases' comunica la función en español con claridad.
- source_word: וַיָּסַר מֵעֲלֵיהֶם וְאֶת הַכִּיּוֹר
  english_pob_choice: removed the basin from them
  chosen_spanish: quitó la pileta de encima de ellas
  alternatives_spanish:
  - quitó el lavatorio de encima de ellas
  - retiró la pila de encima de ellas
  - removió la pileta de ellas
  lexicon: HALOT
  rationale: כִּיּוֹר nombra una vasija de lavado para servicio cultual; 'pileta' es un equivalente moderno comprensible. 'De encima de ellas' sigue la relación espacial del hebreo con naturalidad.
- source_word: הַכִּיּוֹר
  english_pob_choice: the basin
  chosen_spanish: la pileta
  alternatives_spanish:
  - el lavabo
  - el lavatorio
  - la vasija de lavar
  lexicon: HALOT
  rationale: Aunque 'laver' es tradicional, 'pileta' transmite el objeto de lavado sin sonar arcaico. Se mantiene la concreción cultual sin sobretraducir.
- source_word: הַיָּם
  english_pob_choice: the Sea
  chosen_spanish: el Mar
  alternatives_spanish:
  - el Mar de bronce
  - el gran mar
  - la gran pileta
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicional del objeto, pero en español puede sonar más transparente como 'Mar' con mayúscula. Mantiene su carácter de denominación establecida.
- source_word: הוֹרִד
  english_pob_choice: took down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - derribó
  - hizo bajar
  lexicon: HALOT
  rationale: El hifil de ירד aquí indica hacer descender de su soporte. 'Bajó' reproduce el movimiento con sencillez; el contexto ya implica desmontaje.
- source_word: הַבָּקָר הַנְּחֹשֶׁת
  english_pob_choice: the bronze oxen
  chosen_spanish: los bueyes de bronce
  alternatives_spanish:
  - los toros de bronce
  - el ganado de bronce
  - los bueyes broncíneos
  lexicon: HALOT
  rationale: בָּקָר puede referirse a ganado, pero en este contexto arquitectónico la imagen de bueyes es la más probable y tradicional. 'De bronce' traduce נְחֹשֶׁת de forma directa.
- source_word: אֲשֶׁר תַּחְתֶּיהָ
  english_pob_choice: that were under it
  chosen_spanish: que estaban debajo de él
  alternatives_spanish:
  - que estaban bajo él
  - que estaban debajo de ella
  - que estaban bajo eso
  lexicon: HALOT
  rationale: El antecedente es 'el Mar', masculino en español, por lo que 'debajo de él' evita confusión y sigue el referente natural del texto.
- source_word: וַיִּתֵּן אֹתוֹ
  english_pob_choice: put it
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo asentó
  - lo dejó
  lexicon: HALOT
  rationale: '''Poner'' es la forma más directa y fiel para indicar colocación; ''lo puso'' conserva la simplicidad del hebreo.'
- source_word: עַל מַרְצֶפֶת אֲבָנִים
  english_pob_choice: on a stone pavement
  chosen_spanish: sobre un pavimento de piedras
  alternatives_spanish:
  - sobre un pavimento de piedra
  - sobre un piso de piedra
  - sobre un empedrado
  lexicon: HALOT
  rationale: מַרְצֶפֶת designa una superficie pavimentada. 'Pavimento de piedras' comunica bien el material y la función sin introducir elementos no presentes.
theological_decisions:
- issue: Nombre establecido del objeto llamado "the Sea"
  english_pob_reading: The Sea is the name of the large basin made for Solomon's temple.
  chosen_spanish_reading: Mar con mayúscula como nombre propio del gran recipiente del templo.
  alternative_spanish_readings:
  - el Mar de bronce
  - la gran pileta
  - el gran mar
  rationale: No se traduce como un mar literal; se preserva el nombre tradicional del objeto cultual. La mayúscula ayuda a señalar su carácter propio.
  doctrine_reference: 1 Reyes 7:23-26
translation_notes:
  revision_awareness: Se revisó el pasaje con acuerdo alto en la fuente inglesa auditada. No se detectaron revisiones sustantivas posteriores; la redacción española sigue el sentido base sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo subyacente es el nombre divino; aquí no aparece.
  - 'Se mantiene la distinción entre objetos cultuales: ''pileta'' para כִּיּוֹר y ''Mar'' como nombre propio para הַיָּם.'
  - Se preserva la referencia espacial del hebreo ('de encima', 'debajo') para evitar suavizar el desmontaje físico descrito.
