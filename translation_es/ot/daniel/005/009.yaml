  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del arameo: secuencia narrativa («Entonces»), intensificación del temor, cambio visible del semblante/color, y confusión de los dignatarios. Sin embargo, «cambió su color» suena poco natural en español y desajusta el valor idiomático de וְזִיוֹהִי שָׁנַיִן עֲלוֹהִי, que apunta al semblante/color del rostro más que a un ''color'' abstracto.'
  spanish_quality_summary: El texto es claro y digno, pero «cambió su color» resulta torpe en español bíblico contemporáneo. Una formulación como «se le cambió el color del rostro» preserva mejor el modismo semítico y su legibilidad natural. El resto del versículo lee bien.
  glossary_alignment: No hay términos del glosario mayor en juego. «Belsasar», «nobles» y «perplejos» son compatibles con la línea del proyecto. La revisión propuesta mantiene la fuerza de «greatly alarmed» con «se alarmó mucho» y mejora la naturalidad del segmento sobre el semblante.
  issues:
