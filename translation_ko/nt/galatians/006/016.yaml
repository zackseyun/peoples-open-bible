  rationale: 글로사리에 따라 ἔλεος는 「자비」, ἀγάπη는 「사랑」으로 구분.
- source_word: τὸν Ἰσραὴλ τοῦ θεοῦ
  english_pob_choice: the Israel of God
  chosen_korean: 하나님의 이스라엘
  alternatives_korean: []
  lexicon: BDAG
  rationale: 해석 논쟁(=교회 vs 믿는 유대인 vs 전체 하나님 백성)을 본문이 미해결로 두므로 직역 보존.
