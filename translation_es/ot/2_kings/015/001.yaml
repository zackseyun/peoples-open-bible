translation:
  language: es
  text: En el año veintisiete[a] de Jeroboam, rey de Israel, comenzó a reinar Azarías, hijo de Amasías, rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse 'vigésimo séptimo año'; se ha preferido una formulación más directa en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת עֶשְׂרִים וָ/שֶׁבַע שָׁנָה
  english_pob_choice: In the twenty-seventh year
  chosen_spanish: En el año veintisiete
  alternatives_spanish:
  - En el año vigésimo séptimo
  - En el año veintisiete de
  lexicon: HALOT
  rationale: La fórmula hebrea es una datación regnal estándar. En español, 'en el año veintisiete' conserva la estructura natural y evita una forma demasiado latina o arcaizante; 'vigésimo séptimo' sería igualmente posible, pero aquí la forma cardinal es clara y fiel al hebreo.
- source_word: לְ/יָרָבְעָם
  english_pob_choice: of Jeroboam
  chosen_spanish: de Jeroboam
  alternatives_spanish:
  - perteneciente a Jeroboam
  - en tiempos de Jeroboam
  lexicon: HALOT
  rationale: La preposición ל en este contexto marca el año de referencia del reinado. 'De Jeroboam' reproduce la relación cronológica de manera sobria y transparente.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: Título real estándar; 'rey de Israel' es la correspondencia natural y exacta en español.
- source_word: מָלַךְ
  english_pob_choice: began to reign
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - reinó
  - llegó a reinar
  - fue proclamado rey
  lexicon: HALOT
  rationale: En avisos de ascensión, el verbo hebreo señala el inicio del reinado. 'Comenzó a reinar' comunica esa función narrativa sin añadir información no explícita.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azaria
  - Azarías
  lexicon: standard onomastics
  rationale: Se usa la forma española tradicional del nombre propio, que es el equivalente habitual y reconocible en lectura bíblica en español.
- source_word: בֶן אֲמַצְיָה
  english_pob_choice: son of Amaziah
  chosen_spanish: hijo de Amasías
  alternatives_spanish:
  - hijo de Amazías
  - descendiente de Amasías
  lexicon: HALOT
  rationale: La relación filial es directa; 'hijo de' mantiene el vínculo genealógico. 'Amasías' es la forma española estable del nombre propio.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real estándar y claro; 'rey de Judá' preserva la designación política sin variación interpretativa.
translation_notes:
  revision_awareness: El texto inglés POB ya presenta una solución óptima y no requiere ajustes de sentido; la draft española sigue de cerca esa decisión, manteniendo la fórmula regnal y el valor ingesivo de מָלַךְ. No se observan variantes textuales ni tensiones teológicas en este versículo.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera del versículo porque no aparece el Tetragrámaton ni equivalentes.
  - Se emplean formas españolas establecidas de nombres propios bíblicos ('Azarías', 'Amasías', 'Judá', 'Israel', 'Jeroboam').
  - La datación regnal se formula con español natural sin perder la relación cronológica del hebreo.
