  source_alignment_summary: 'El borrador sigue bien el sentido fuente y el audit trail inglés en los puntos clave: «el hijo de David» como lectura mesiánica definida, «escogiste» para ἴδες según la adjudicación del proyecto, y «tu siervo» para παῖδά σου. No hay desviaciones semánticas mayores. Sin embargo, hay un problema formal en el texto español: el marcador [a] está mal colocado («Mira, [a]oh Señor»), y la nota no refleja con precisión que el inglés también preserva una alternativa léxica («O “un hijo de David”»).'
  spanish_quality_summary: 'El español es claro y digno, pero «Mira, [a]oh Señor» es tipográficamente defectuoso y poco natural. Conviene mover el marcador al sintagma pertinente («el hijo de David[a]») y ajustar la puntuación a un vocativo fluido: «Mira, oh Señor…». El resto del verso lee bien en español eclesial moderno.'
  glossary_alignment: No hay conflicto con los términos base del proyecto. «Señor» para Κύριε es correcto aquí, ya que no se trata de יהוה en texto fuente hebreo sino de un vocativo griego directo. «el hijo de David», «Israel tu siervo» y «escogiste» están alineados con las decisiones auditadas.
  issues:
  - severity: medium
    issue: Marcador de nota mal anclado en el texto
    rationale: La nota trata sobre «el hijo de David», pero el marcador aparece antes de «oh Señor», lo que incumple la disciplina de anclar la nota en la palabra o frase pertinente.
  - severity: low
    issue: Puntuación/espaciado defectuoso en el vocativo
    rationale: «Mira, [a]oh Señor» introduce una pausa y espaciado poco naturales. La forma normal es «Mira, oh Señor…».
  - severity: low
    issue: La nota puede reflejar mejor la alternativa preservada en el audit trail
    rationale: El inglés conserva la posibilidad de oír la frase con fuerza mesiánica más marcada y también registra la alternativa «un hijo de David». La nota española puede expresarlo de forma más precisa y útil.
  revised_spanish_text: Mira, oh Señor, y levanta para ellos su rey, el hijo de David[a], en el tiempo que tú escogiste, oh Dios, para que reine sobre Israel tu siervo.
  revised_footnotes:
  - marker: a
    text: O «un hijo de David». La expresión griega también puede oírse con fuerza mesiánica más marcada; por eso aquí se mantiene «el hijo de David» como lectura principal.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción sustancialmente correcta, pero se repara la ubicación del marcador, la puntuación del vocativo y la precisión de la nota para que el registro YAML cumpla mejor con la disciplina de notas y con el audit trail inglés.
