translation:
  language: es
  text: El pueblo andaba de un lado a otro y lo recogía; lo molían con las piedras de molino o lo machacaban en el mortero, lo cocían en la olla y hacían tortas con ello; y su sabor era como el sabor del aceite sustancioso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aceite fresco». La expresión hebrea לְשַׁד הַשָּׁמֶן es difícil; probablemente alude a la sustancia rica, jugosa o fresca del aceite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁטוּ הָעָם
  english_pob_choice: The people would roam about
  chosen_spanish: El pueblo se dispersaba
  alternatives_spanish:
  - El pueblo andaba de un lado a otro
  - El pueblo vagaba
  lexicon: HALOT
  rationale: El verbo hebreo expresa moverse de un lado a otro en búsqueda. En español, 'se dispersaba' conserva la idea de desplazamiento continuo y colectivo sin sonar artificial; 'andaba de un lado a otro' mantiene más el movimiento, pero resulta más pesado.
- source_word: וְלָקְטוּ
  english_pob_choice: and gather it
  chosen_spanish: y lo recogía
  alternatives_spanish:
  - y lo juntaba
  - y lo recolectaba
  lexicon: HALOT
  rationale: El verbo de recolección se rinde mejor con 'recoger' en un contexto de maná. El imperfecto habitual del hebreo se refleja con un valor costumbre/habitual en español.
- source_word: וְטָחֲנוּ בָרֵחַיִם
  english_pob_choice: and grind it with the millstones
  chosen_spanish: lo molían con las piedras de molino
  alternatives_spanish:
  - lo molían en el molino
  - lo trituraban con las piedras de molino
  lexicon: HALOT
  rationale: רֵחַיִם designa el par de piedras de molino; por eso se conserva el instrumento concreto. 'Con las piedras de molino' sigue la fuerza instrumental del hebreo y el ajuste auditado del inglés.
- source_word: א֤וֹ דָכוּ֙ בַּמְּדֹכָ֔ה
  english_pob_choice: or crush it in the mortar
  chosen_spanish: o lo machacaban en el mortero
  alternatives_spanish:
  - o lo trituraban en el mortero
  - o lo golpeaban en el mortero
  lexicon: HALOT
  rationale: דָךְ expresa machacar o triturar. 'Machacar' es claro y natural en español, y conserva el matiz de desmenuzar mediante golpe.
- source_word: וּבִשְּׁלוּ בַּפָּרוּר
  english_pob_choice: and boil it in the pot
  chosen_spanish: lo cocían en la olla
  alternatives_spanish:
  - lo hervían en la olla
  - lo cocinaban en la olla
  lexicon: HALOT
  rationale: El verbo puede significar cocinar o hervir según el contexto. 'Cocían' es suficientemente amplio y fiel; 'olla' comunica el recipiente sin introducir un matiz más técnico de lo que el hebreo exige.
- source_word: וְעָשׂוּ אֹתוֹ עֻגוֹת
  english_pob_choice: and make it into cakes
  chosen_spanish: y lo hacían tortas
  alternatives_spanish:
  - y lo hacían pasteles
  - y preparaban tortas con él
  lexicon: HALOT
  rationale: עֻגוֹת son tortas o pasteles planos. 'Tortas' mantiene la forma tradicional y el sentido de alimento cocido en pieza plana; es más preciso que 'pasteles' en este contexto.
- source_word: טַעְמוֹ
  english_pob_choice: its taste
  chosen_spanish: su sabor
  alternatives_spanish:
  - su gusto
  - su gusto/sabor
  lexicon: HALOT
  rationale: '''Sabor'' es la equivalencia más natural en español para טַעַם en un contexto alimentario, sin perder la referencia sensorial directa.'
- source_word: לְשַׁד הַשָּׁמֶן
  english_pob_choice: rich oil
  chosen_spanish: el aceite rico
  alternatives_spanish:
  - el aceite fresco
  - la riqueza del aceite
  - la esencia rica del aceite
  lexicon: HALOT
  rationale: La expresión es difícil y el inglés POB opta por 'rich oil' con nota alternativa. En español, 'aceite rico' conserva la ambigüedad semántica de לְשַׁד (riqueza, sustancia, jugo, esencia) sin cerrar prematuramente el sentido; se deja la alternativa 'aceite fresco' en nota para reflejar el rango lexical.
translation_notes:
  revision_awareness: Se siguió el ajuste revisado del inglés POB que preserva el sentido instrumental de בָּרֵחַיִם ('with the millstones'), y se mantuvo la nota léxica sobre לְשַׁד הַשָּׁמֶן por su dificultad semántica documentada en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aplica.
  - Se evitó 'SEÑOR' y 'Cristo' por no corresponder al texto.
  - Se conservó un registro léxico concreto ('piedras de molino', 'mortero', 'olla', 'tortas') para reflejar la secuencia de preparación del alimento.
  - La puntuación sigue el flujo enumerativo del hebreo y del inglés auditado, con una sola nota al pie vinculada al sintagma difícil final.
