translation:
  language: es
  text: Refréname[a], oh Dios, del pecado malo y de toda mujer mala que hace tropezar a un hombre insensato.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hazte cargo de mí, oh Dios, apartándome de».

      '
