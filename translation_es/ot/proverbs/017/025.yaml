translation:
  language: es
  text: Un hijo necio causa tristeza a su padre[a], y amargura a la mujer que lo dio a luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “vexación a su padre”. El sustantivo hebreo puede denotar ira, vexación o tristeza; aquí probablemente se refiere al dolor que el hijo causa a su padre.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: “a la mujer que lo dio a luz”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּעַס
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - pesar
  - aflicción
  - enojo
  - vexación
  lexicon: HALOT
  rationale: El hebreo puede abarcar ira, vexación o dolor causado. Aquí, siguiendo la decisión inglesa de centrar el efecto emocional en el padre, 'tristeza' comunica bien el resultado afectivo sin reducirlo solo a una reacción de enojo.
- source_word: לְאָבִיו
  english_pob_choice: to his father
  chosen_spanish: para su padre
  alternatives_spanish:
  - a su padre
  - en su padre
  lexicon: HALOT
  rationale: La ל expresa relación o efecto. 'Para su padre' conserva el sentido de perjuicio o carga sufrida por el padre en un español natural y conciso.
- source_word: בֵּן כְּסִיל
  english_pob_choice: a foolish son
  chosen_spanish: un hijo necio
  alternatives_spanish:
  - un hijo insensato
  - un hijo estúpido
  - un hijo que es necio
  lexicon: HALOT
  rationale: כְּסִיל en Proverbios es una categoría sapiencial moral, no mera falta de inteligencia. 'Necio' mantiene mejor ese matiz tradicional y bíblico en español.
- source_word: וּמֶמֶר
  english_pob_choice: and bitterness
  chosen_spanish: amargura
  alternatives_spanish:
  - amargor
  - amargura de espíritu
  - dolor
  lexicon: HALOT
  rationale: El término es raro y el contexto favorece una idea de amargura o pesar paralelo a כַּעַס. 'Amargura' reproduce bien la fuerza del paralelo y suena natural en español.
- source_word: לְיוֹלַדְתּוֹ
  english_pob_choice: to the woman who bore him
  chosen_spanish: para la mujer que lo dio a luz
  alternatives_spanish:
  - para su madre
  - para la que lo engendró
  - para la mujer que lo parió
  lexicon: HALOT
  rationale: La forma literal es 'la que lo dio a luz'. Se conserva esa especificidad materna, como en la auditoría inglesa, en vez de simplificar a 'su madre'.
translation_notes:
  revision_awareness: 'La versión inglesa auditada no requirió cambios recientes; se conserva la lectura óptima equivalente con el mismo perfil semántico: כַּעַס como dolor/tristeza causada al padre, y וּמֶמֶר como amargura paralela respecto de la madre.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones teológicas porque el versículo no contiene el tetragrámaton ni títulos divinos.
  - '''Necio'' se usa como término sapiencial estable para כְּסִיל, en continuidad con el registro de Proverbios.'
  - Se mantiene la estructura paralela del hebreo con dos miembros coordinados y sin añadir verbos innecesarios.
