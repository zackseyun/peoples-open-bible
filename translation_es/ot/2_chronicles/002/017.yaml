translation:
  language: es
  text: Hizo de entre ellos setenta mil cargadores[a], ochenta mil cortadores de piedra en la región montañosa, y tres mil seiscientos supervisores para hacer trabajar al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «canteros en la montaña». El hebreo dice literalmente «cortadores/talladores en la montaña o región montañosa», con el objeto implícito por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ מֵהֶם
  english_pob_choice: From them he made
  chosen_spanish: De entre ellos hizo
  alternatives_spanish:
  - Hizo de entre ellos
  - Tomó de entre ellos para hacer
  lexicon: HALOT
  rationale: La construcción hebrea expresa selección/apartamiento desde un grupo. «De entre ellos hizo» conserva ese valor sin volver la frase artificial en español.
- source_word: סַבָּל
  english_pob_choice: burden-bearers
  chosen_spanish: cargadores
  alternatives_spanish:
  - portadores de cargas
  - porteros
  - trabajadores
  lexicon: HALOT
  rationale: El término designa a quienes llevan cargas. «Cargadores» transmite la función de forma natural y concreta en español; «trabajadores» sería demasiado general.
- source_word: חֹצֵב בָּהָר
  english_pob_choice: stonecutters in the hill country
  chosen_spanish: cortadores de piedra en la región montañosa
  alternatives_spanish:
  - canteros en la montaña
  - talladores de piedra en la montaña
  - cortadores de piedra en el monte
  lexicon: HALOT
  rationale: חצב se refiere a cortar/ahuecar piedra en este contexto constructivo. «Cortadores de piedra» refleja el oficio; «región montañosa» evita fijar indebidamente una sola montaña cuando el hebreo admite el sentido de zona montañosa.
- source_word: מְנַצְּחִים
  english_pob_choice: overseers
  chosen_spanish: capataces
  alternatives_spanish:
  - supervisores
  - inspectores
  - mandos
  lexicon: HALOT
  rationale: En este marco administrativo-laboral, el participio señala a quienes dirigen la faena. «Capataces» es una equivalencia clara y de fuerza laboral, compatible con el contexto de trabajo forzado o dirigido.
- source_word: לְהַעֲבִיד אֶת הָעָם
  english_pob_choice: to make the people work
  chosen_spanish: para hacer trabajar al pueblo
  alternatives_spanish:
  - para poner al pueblo a trabajar
  - para obligar al pueblo a trabajar
  - para hacer laborar al pueblo
  lexicon: HALOT
  rationale: El causativo de עבד es «hacer trabajar» o «poner a trabajar». Se mantiene la fuerza causativa sin añadir más coerción de la que el hebreo exige.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los trabajadores
  lexicon: HALOT
  rationale: Aunque el contexto los define como fuerza laboral, el hebreo dice simplemente «el pueblo». «Pueblo» conserva esa amplitud y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el esquema interpretativo del POB inglés, especialmente en la selección de oficio para סַבָּל y en la resolución contextual de חֹצֵב בָּהָר. No se detectan revisiones sustantivas en el pasaje fuente aportado.
  spanish_consistency_notes:
  - Se mantiene Yahvé en otros pasajes cuando corresponde; este versículo no contiene el nombre divino.
  - «Pueblo» conserva el valor colectivo del hebreo sin convertirlo en un tecnicismo administrativo.
  - Se prefieren equivalencias funcionales naturales en español, pero sin suavizar la referencia a trabajo dirigido por capataces.
