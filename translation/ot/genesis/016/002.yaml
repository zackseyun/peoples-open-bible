theological_decisions:
- issue: Rendering of Sarai's statement about the LORD's role in her barrenness
  chosen_reading: the LORD has kept me from bearing children
  alternative_readings:
  - the LORD has restrained me from bearing
  - the LORD has prevented me from giving birth
  rationale: The text explicitly attributes Sarai's barrenness to the LORD's action. The translation preserves that claim without softening or expanding it into a broader theological explanation.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: How explicitly to render the euphemism for sexual union
  chosen_reading: Please go in to my female slave
  alternative_readings:
  - Please have relations with my female slave
  rationale: The Hebrew uses a conventional euphemism. Preserving the euphemism respects the source text's register while remaining clear enough in context.
  doctrine_reference: Translation philosophy §1 and §6
