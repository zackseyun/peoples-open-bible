translation:
  language: es
  text: y la pendiente de los wadis[a] que se extiende hasta el sitio de Ar[b] y se apoya contra la frontera de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los valles» o «las quebradas»; נְחָלִים suele referirse a cauces estacionales.
    reason: lexical_alternative
  - marker: b
    text: O «hasta la morada de Ar» o «hasta el asiento de Ar». La frase hebrea es difícil y puede referirse a la ubicación o al asentamiento de Ar.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶשֶׁד
  english_pob_choice: slope
  chosen_spanish: pendiente
  alternatives_spanish:
  - declive
  - ladera
  - slope
  lexicon: HALOT
  rationale: El sustantivo describe una bajada o inclinación del terreno. «Pendiente» comunica bien la imagen topográfica en español sin añadir interpretación.
- source_word: הַנְּחָלִים
  english_pob_choice: the wadis
  chosen_spanish: los wadis
  alternatives_spanish:
  - los valles
  - las quebradas
  - los cauces de torrente
  lexicon: HALOT
  rationale: נחל suele referirse a cauces estacionales o wadis, no simplemente a valles. Se mantiene el préstamo «wadis» para conservar con precisión el referente geográfico, como en la decisión inglesa, y se anota la alternativa más familiar.
- source_word: אֲשֶׁר נָטָה
  english_pob_choice: that extends
  chosen_spanish: que se extiende
  alternatives_spanish:
  - que se inclina
  - que se alarga
  - que se desvía
  lexicon: HALOT
  rationale: Aquí נטה expresa continuidad espacial. «Se extiende» es natural en español y preserva el sentido direccional/topográfico.
- source_word: לְשֶׁבֶת עָר
  english_pob_choice: to the site of Ar
  chosen_spanish: hasta la sede de Ar
  alternatives_spanish:
  - hasta el sitio de Ar
  - hasta el lugar de Ar
  - hasta la morada de Ar
  lexicon: HALOT
  rationale: La construcción puede señalar ubicación o asentamiento. Se eligió «sede» para reflejar la posible idea de lugar establecido/sede, manteniendo la ambigüedad documentada por la nota inglesa; «sitio» o «lugar» serían opciones más neutras.
- source_word: וְנִשְׁעַן
  english_pob_choice: and leans against
  chosen_spanish: y se apoya contra
  alternatives_spanish:
  - y se inclina contra
  - y descansa sobre
  - y se recuesta sobre
  lexicon: HALOT
  rationale: שען conserva una imagen de apoyo físico. «Se apoya contra» es idiomático en español y retiene la metáfora de contacto/borde territorial.
- source_word: לִגְבוּל מוֹאָב
  english_pob_choice: the border of Moab
  chosen_spanish: la frontera de Moab
  alternatives_spanish:
  - el límite de Moab
  - la frontera de Moab
  - el borde de Moab
  lexicon: HALOT
  rationale: גבול denota frontera o límite. «Frontera» es claro y fluido en español; «límite» también es posible, pero «frontera» conserva mejor la imagen territorial.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo base y el audit trail inglés sin cambios de revisión pendientes; se conserva la ambigüedad topográfica de לְשֶׁבֶת עָר y el valor geográfico de נְחָלִים.
  spanish_consistency_notes:
