translation:
  language: es
  text: Y serán para mí hombres santos[a]. No comerán carne despedazada en el campo[b]; la arrojarán a los perros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hombres santos’. La expresión hebrea es masculina plural explícita, pero puede funcionar representativamente para la comunidad del pacto.
    reason: lexical_alternative
  - marker: b
    text: O ‘carne despedazada por bestias en el campo’. El hebreo dice solo ‘carne ... despedazada’, y el agente queda implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי קֹדֶשׁ
  english_pob_choice: holy men
  chosen_spanish: hombres santos
  alternatives_spanish:
  - personas santas
  - gente santa
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente ‘hombres de santidad’ / ‘hombres santos’. En español, ‘hombres santos’ conserva la forma masculina plural explícita y la fuerza de consagración sin suavizarla a un término más inclusivo que diluya la marca gramatical del hebreo.
- source_word: תִּהְיוּן לִי
  english_pob_choice: you shall be ... to me
  chosen_spanish: serán ... para mí
  alternatives_spanish:
  - deberán ser ... para mí
  - serán ... míos
  lexicon: HALOT
  rationale: El imperfecto con לִי expresa estado/obligación relacional de pertenencia. ‘Serán ... para mí’ suena natural en español y mantiene la dirección de la relación covenantal sin añadir matices no presentes.
- source_word: בָשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - carne animal
  - carne
  lexicon: HALOT
  rationale: ‘Carne’ es el equivalente normal y preserva el valor léxico concreto. ‘Carne’ también mantiene la diferencia con ‘comida’ o ‘carne para comer’, evitando el desplazamiento a ‘carne’ en sentido culinario exclusivamente.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el campo
  lexicon: HALOT
  rationale: ‘Campo’ traduce de forma directa שָׂדֶה y funciona bien en español actual. ‘En el campo’ conserva la imagen espacial concreta del texto.
- source_word: טְרֵפָה
  english_pob_choice: torn
  chosen_spanish: despedazada
  alternatives_spanish:
  - rasgada
  - destrozada
  - tornada
  lexicon: HALOT
  rationale: El adjetivo hebreo indica algo arrancado o desgarrado, típicamente por bestias. ‘Despedazada’ comunica con claridad el resultado físico y es idiomático en español; en el contexto, evita una formulación demasiado técnica o ambigua.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: you shall not eat
  chosen_spanish: No comerán
  alternatives_spanish:
  - No comeréis
  - No han de comer
  lexicon: HALOT
  rationale: La prohibición legal se expresa con futuro negativo en español, conservando el tono normativo. ‘No comerán’ es claro, solemne y fiel al valor jussivo/prohibitivo del hebreo.
- source_word: לַכֶּלֶב
  english_pob_choice: to the dogs
  chosen_spanish: a los perros
  alternatives_spanish:
  - a los perros
  - al perro
  lexicon: HALOT
  rationale: Aunque el hebreo tiene singular genérico, en español ‘a los perros’ es el equivalente distributivo natural y refleja los animales carroñeros de manera idiomática.
- source_word: תַּשְׁלִיכוּן אֹתוֹ
  english_pob_choice: you shall throw it
  chosen_spanish: la arrojarán
  alternatives_spanish:
  - la echarán
  - la tirarán
  lexicon: HALOT
  rationale: El verbo hebreo significa arrojar/lançar. ‘Arrojar’ conserva más dignidad y precisión legal que ‘tirar’, y se adecua al mandato de disposición del resto incomible.
theological_decisions:
- issue: Santificación del pueblo en una ley alimentaria
  english_pob_reading: Rendered the command as 'you shall be holy men to me' to preserve both covenant belonging and ethical consecration.
  chosen_spanish_reading: Se expresa como ‘hombres santos para mí’ para mantener el vínculo de pertenencia a Yahvé y la consagración ética exigida por la ley.
  alternative_spanish_readings:
  - hombres consagrados para mí
  - pueblo santo para mí
  rationale: La santidad aquí no es solo pureza ritual abstracta, sino identidad pactal que fundamenta la prohibición. ‘Santos’ es el equivalente más directo de קֹדֶשׁ y preserva la tensión entre estado y conducta.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3-4
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota con su marcador correspondiente en el texto español. La redacción principal mantiene la lectura auditada del hebreo y conserva la ambigüedad del agente en ‘despedazada’.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo donde el marco contextual exige el nombre divino y no una máscara reverencial.
  - Se mantuvo el plural masculino explícito (‘hombres’) por fidelidad al hebreo, evitando neutralización no documentada.
  - ‘Carne’ preserva el valor léxico de בָשָׂר sin convertirlo en ‘comida’ o ‘alimento’.
  - ‘Arrojar’ refleja mejor la acción de disposición que ‘tirar’ en un contexto legal.
  - Las notas al pie están ancladas y corresponden a alternativas reales atestiguadas por el expediente inglés.
