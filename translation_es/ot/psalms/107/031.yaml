translation:
  language: es
  text: Den gracias a Yahvé por su amor constante y por sus obras maravillosas para los hijos del hombre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «para la humanidad» o «para el género humano»; hebreo: «para los hijos del hombre».'
    reason: lexical_alternative
  - marker: b
    text: «Yahvé» representa el nombre divino YHWH; alternativamente, «Yahweh».
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹדוּ
  english_pob_choice: Let them give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Que den gracias
  - Que agradezcan
  - Den gracias a
  lexicon: HALOT
  rationale: El imperfecto jussivo en este contexto poético funciona como exhortación. En español, «Den gracias» comunica de forma natural y solemne la llamada litúrgica sin volverse mecánica.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la norma del proyecto para יְהוָה, y la preposición ל se expresa naturalmente con «a» en esta fórmula de dar gracias.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su amor fiel
  - su misericordia
  - su amor leal
  lexicon: HALOT
  rationale: חֶסֶד combina lealtad, bondad y amor de pacto. «Amor constante» mantiene la idea de firmeza y fidelidad relacional sin reducirla a «misericordia» ni sonar arcaico.
- source_word: וְנִפְלְאוֹתָיו
  english_pob_choice: and for his wondrous deeds
  chosen_spanish: y por sus obras maravillosas
  alternatives_spanish:
  - y por sus maravillas
  - y por sus actos maravillosos
  - y por sus hechos portentosos
  lexicon: HALOT
  rationale: נִפְלָאוֹת se refiere a actos que causan asombro; «obras maravillosas» conserva el carácter de acción divina y el matiz de maravilla. Se mantiene la coordinación con «por» para reflejar el valor preposicional del hebreo en español natural.
- source_word: לִבְנֵי אָדָם
  english_pob_choice: to the children of man
  chosen_spanish: para los hijos de los hombres
  alternatives_spanish:
  - para la humanidad
  - para los hijos del hombre
  - para el género humano
  lexicon: HALOT
  rationale: בְּנֵי אָדָם tiene fuerza literal de «hijos de los hombres» con referencia representativa a la humanidad. Se conserva la formulación masculina colectiva en el texto principal, con nota para la alternativa inclusiva o genérica.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton, por lo que se preserva el nombre del pacto en español como «Yahvé», evitando el sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de חֶסֶד en contexto de alabanza
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su amor constante
  alternative_spanish_readings:
  - su amor fiel
  - su misericordia
  - su amor leal
  rationale: La frase alaba el carácter estable y covenantal de Dios; «amor constante» expresa mejor la permanencia y fidelidad que un término más genérico como «misericordia».
  doctrine_reference: 'DOCTRINE.md Contested terms: חֶסֶד'
- issue: Representación de בְּנֵי אָדָם
  english_pob_reading: the children of man
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - el género humano
  rationale: La expresión hebrea es masculina y representativa. Se conserva la forma literal en el texto principal para no perder la resonancia poética y la huella del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'El audit trail en inglés muestra una revisión reciente en la frase de בני אדם: de una formulación más literal a «children of man» por naturalidad. En español se optó por una solución intermedia fiel y publicable («los hijos de los hombres»), manteniendo la marca semítica del hebreo y ofreciendo en nota la alternativa más inclusiva. También se siguió la decisión final de usar el nombre divino en forma transliterada en lugar de un sustituto.'
  spanish_consistency_notes:
  - Se preserva Yahvé para יְהוָה, conforme a la terminología base del proyecto.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - «Obras maravillosas» mantiene el paralelismo poético con «amor constante».
  - La expresión «los hijos de los hombres» conserva el valor representativo de בְּנֵי אָדָם sin introducir una paráfrasis interpretativa en el texto principal.
