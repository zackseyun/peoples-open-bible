revisions:
- from: Pero maldito[a] el engañador, que tiene un macho en su rebaño, y lo promete, pero sacrifica a Yahvé una víctima defectuosa. Porque yo soy un gran Rey —dice Yahvé de los Ejércitos—, y mi nombre es temido entre las naciones.
