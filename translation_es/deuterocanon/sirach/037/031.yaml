translation:
  language: es
  text: Un hombre sabio entre su pueblo heredará honor, y su nombre permanecerá para siempre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "su nombre está en la vida de eternidad". El hebreo dice literalmente "su nombre está en la vida de eternidad", una expresión que puede denotar memoria perdurable y también puede tener resonancias de vida eterna.'
    reason: lexical_alternative
  - marker: b
    text: 'El griego paralelo difiere de manera sustancial: "Por la avaricia muchos han muerto, pero el que está atento añadirá vida". La traducción principal sigue el testimonio hebreo conservado, con el griego en vista como fuente paralela de control.'
    reason: alternative_reading
lexical_decisions:
- source_word: חכם
  english_pob_choice: wise man
  chosen_spanish: hombre sabio
  alternatives_spanish:
  - sabio
  - sabio varón
  lexicon: HALOT
  rationale: El hebreo nombra a una persona sabia; en español, 'hombre sabio' conserva el singular masculino representativo y suena natural en un proverbio sapiencial.
- source_word: עם
  english_pob_choice: his people
  chosen_spanish: entre su pueblo
  alternatives_spanish:
  - con su pueblo
  - de su pueblo
  lexicon: HALOT
  rationale: La relación es social/corporativa más que meramente posesiva; 'entre su pueblo' expresa bien el marco comunitario del honor.
- source_word: ינחל
  english_pob_choice: will inherit
  chosen_spanish: heredará
  alternatives_spanish:
  - obtendrá
  - recibirá como posesión
  lexicon: HALOT
  rationale: '''Heredará'' mantiene la metáfora concreta de recibir honor como posesión durable, de modo más fiel que un simple ''obtendrá''.'
- source_word: כבוד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - gloria
  - estima
  lexicon: HALOT
  rationale: En este contexto sapiencial, 'honra' comunica mejor la reputación pública y el reconocimiento social que 'gloria'.
- source_word: שמו
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su fama
  - su memoria
  lexicon: HALOT
  rationale: Se conserva la expresión literal 'su nombre', que en sabiduría puede implicar reputación o memoria sin explicitarla de más.
- source_word: עומד
  english_pob_choice: will endure
  chosen_spanish: permanecerá
  alternatives_spanish:
  - durará
  - se mantendrá
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'estará en pie', en español 'permanecerá' transmite la idea de continuidad duradera con naturalidad.
- source_word: בחיי עולם
  english_pob_choice: for all time
  chosen_spanish: por todo tiempo
  alternatives_spanish:
  - para siempre
  - en vida eterna
  - por toda la eternidad
  lexicon: HALOT
  rationale: Se mantiene la ambigüedad del hebreo entre permanencia duradera y posible resonancia de 'vida de eternidad', sin imponer una lectura dogmática.
theological_decisions:
- issue: Sentido de בחיי עולם
  english_pob_reading: enduring permanence / enduring renown, without forcing a doctrine of personal everlasting life
  chosen_spanish_reading: permanencia duradera del nombre, con lenguaje de vida sin resolverlo en una sola dirección
  alternative_spanish_readings:
  - para siempre
  - en vida eterna
  - por toda la eternidad
  rationale: El hebreo puede referirse a memoria perdurable o insinuar vida eterna; en español conviene conservar esa tensión y no cerrarla prematuramente.
  doctrine_reference: Preservar la tensión textual y no resolverla más allá de la evidencia del versículo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una frase de duración idiomática ('for all time') sobre una formulación más teológica, para reflejar mejor el hebreo sin importar una doctrina no explícita.
  spanish_consistency_notes:
  - Se mantuvo 'honra' para כבוד y no 'gloria', en coherencia con el registro sapiencial.
  - Se conservó 'su nombre' como expresión literal, útil para la posible fuerza de reputación/memoria.
  - La clausula final evita 'vida eterna' como traducción cerrada, para no borrar la tensión observada en el audit trail.
  - El paralelo griego se registra en nota sin desplazar el texto base hebreo, conforme al material auditado.
