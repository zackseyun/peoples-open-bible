translation:
  language: es
  text: 'Yahvé dijo[a]: «Si encuentro cincuenta personas justas dentro de la ciudad de Sodoma, le perdonaré a todo ese lugar por causa de ellas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dejaré sin castigo todo ese lugar por causa de ellas». El verbo hebreo puede expresar quitar culpa o retener el juicio; aquí «le perdonaré a todo ese lugar» conserva ese matiz en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino personal del Tetragrámaton con la forma ya establecida en el proyecto para español. 'Yahvé' evita la sustitución por un título y sigue la decisión doctrinal del POB en inglés.
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: En español narrativo, la simple forma verbal comunica con naturalidad la secuencia hebrea wayyiqtol sin forzar una conjunción inicial redundante.
- source_word: אִם אֶמְצָא
  english_pob_choice: If I find
  chosen_spanish: Si encuentro
  alternatives_spanish:
  - Si llego a encontrar
  - Si hallo
  lexicon: HALOT
  rationale: La condicional expresa con claridad la apertura hipotética de la declaración divina. 'Encuentro' es natural en español y conserva el valor de condición directa.
- source_word: בִסְדֹם
  english_pob_choice: in/within the city of Sodom
  chosen_spanish: dentro de la ciudad de Sodoma
  alternatives_spanish:
  - en Sodoma
  - en la ciudad de Sodoma
  lexicon: HALOT
  rationale: Se mantiene la precisión espacial del contexto inmediato ('within the city') y se explicita 'Sodoma' como localidad bajo consideración, en lugar de reducirlo a un simple nombre de lugar.
- source_word: חֲמִשִּׁים צַדִּיקִם
  english_pob_choice: fifty righteous people
  chosen_spanish: cincuenta personas justas
  alternatives_spanish:
  - cincuenta justos
  - cincuenta hombres justos
  lexicon: HALOT
  rationale: '''Personas justas'' evita restringir innecesariamente el hebreo a varones y conserva el valor colectivo de צַדִּיקִם. ''Justas'' reproduce la cualidad moral/legal del término.'
- source_word: בְּתוֹךְ הָעִיר
  english_pob_choice: within the city
  chosen_spanish: dentro de la ciudad
  alternatives_spanish:
  - en medio de la ciudad
  - en el interior de la ciudad
  lexicon: HALOT
  rationale: '''Dentro de la ciudad'' es un equivalente idiomático y claro que conserva la localización interna del hebreo בלי calco excesivo.'
- source_word: וְנָשָׂאתִי
  english_pob_choice: I will spare
  chosen_spanish: perdonaré
  alternatives_spanish:
  - eximiré
  - ahorraré
  lexicon: HALOT
  rationale: La raíz נָשָׂא puede implicar cargar/levantar o, en este contexto, apartar el juicio. Dado que el español debe reflejar esa tensión semántica sin oscurecerla, 'perdonaré' captura la posibilidad de condonación/retención del juicio; se deja constancia en nota de que también puede entenderse como 'ahorraré' o 'eximiré'.
- source_word: לְכָל הַמָּקוֹם
  english_pob_choice: the whole place
  chosen_spanish: todo el lugar
  alternatives_spanish:
  - todo el sitio
  - la totalidad del lugar
  lexicon: HALOT
  rationale: '''Lugar'' conserva el alcance colectivo del juicio sobre la región o localidad entera. ''Todo'' reproduce la cobertura completa del original.'
- source_word: בַּעֲבוּרָם
  english_pob_choice: for their sake
  chosen_spanish: por causa de ellas
  alternatives_spanish:
  - por ellos
  - en atención a ellos
  lexicon: HALOT
  rationale: La expresión indica beneficio o consideración en favor de los justos. 'Por causa de ellas' mantiene el sentido causal/benefactivo y permite la referencia colectiva sin masculinizar indebidamente el grupo.
theological_decisions:
- issue: Cómo reflejar וְנָשָׂאתִי en un contexto de juicio divino
  english_pob_reading: I will spare; footnote allows 'I will forgive the whole place for their sake.'
  chosen_spanish_reading: perdonaré todo el lugar por causa de ellas
  alternative_spanish_readings:
  - ahorraré todo el lugar por causa de ellas
  - eximiré todo el lugar por causa de ellas
  - perdonaré/ahorraré el lugar
  rationale: El hebreo puede expresar tanto el apartamiento del castigo como la remisión del juicio, y el POB inglés eligió 'spare' con nota de 'forgive'. En español, 'perdonaré' mantiene esa tensión entre perdonar y dejar de castigar, mientras que la nota preserva la alternativa de 'ahorraré' como lectura contextual.
  doctrine_reference: HALOT; note on lexical tension in נָשָׂא within judgment contexts
translation_notes:
  revision_awareness: 'El pasaje muestra un alto grado de acuerdo con el texto fuente y con la revisión inglesa más reciente (sin cambios sustantivos). La única tensión relevante es léxica: נָשָׂא en contexto judicial puede significar ''perdonar'' o ''ahorrar/suavizar el juicio''. La versión española conserva esa tensión en la nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del Nombre divino, conforme a la terminología del proyecto.
  - Se usa 'personas justas' para evitar una lectura sexista no requerida por el hebreo.
  - Se evita 'SEÑOR' como sustituto del Nombre divino.
  - La puntuación reproduce un estilo bíblico moderno y claro, con comillas españolas y nota al pie vinculada al verbo clave.
