translation:
  text: Whoever does not hate his father and his mother as I do cannot become my disciple[as
    I do]; and whoever does not love his father and his mother as I do cannot become
    my disciple. For my mother [...][true][[...]], but my true [mother] gave me life.
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:57:25Z'
  footnotes:
  - marker: as I do
    text: Lit. 'in my manner' or 'like me' (ⲛ̄ⲧⲁϩⲉ).
    reason: lexical_alternative
  - marker: '[...]'
    text: The manuscript is damaged here (ⲛ̄ⲧⲁⲥ̣[.........] [..]ⲟ̣ⲗ̣). Scholars often
      reconstruct the missing text to mean something like 'bore me unto death' or
      'gave me falsehood,' contrasting with the true mother who gave life.
    reason: textual_variant
  - marker: 'true'
    text: Lit. 'of truth' (ⲙ̄ⲙⲉ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲉⲥⲧⲉ
  chosen: hate
  rationale: Standard Sahidic verb for 'to hate'.
  lexicon: Crum 185a
  alternatives: []
  entry: ⲙⲟⲥⲧⲉ
- source_word: ⲙⲣ̄ⲣⲉ
  chosen: love
  rationale: Status constructus of ⲙⲉ ('to love').
  lexicon: Crum 155b
  alternatives: []
  entry: ⲙⲉ
- source_word: ϩⲉ
  chosen: as I do
  rationale: The phrase ⲛ̄ⲧⲁϩⲉ (ⲛ-ⲧⲁ-ϩⲉ) literally means 'in my manner' or 'like me'.
    'As I do' captures the verbal action clearly in English.
  lexicon: Crum 651a
  alternatives:
  - like me
  - in my manner
  entry: ϩⲉ
- source_word: ϣ
  chosen: cannot
  rationale: The auxiliary ϣ ('to be able') combined with the negative particle ⲁⲛ
    translates to 'cannot' or 'will not be able to'.
  lexicon: Crum 549a
  alternatives:
  - will not be able to
  entry: ϣ
- source_word: ⲙ̄ⲙⲉ
  chosen: 'true'
  rationale: The phrase ⲙ̄ⲙⲉ (ⲛ-ⲙⲉ) literally means 'of truth', functioning attributively
    as 'true'.
  lexicon: Crum 157b
  alternatives:
  - of truth
  entry: ⲙⲉ
- source_word: ⲱⲛϩ
  chosen: life
  rationale: Standard Sahidic noun for 'life'.
  lexicon: Crum 512a
  alternatives: []
  entry: ⲱⲛϩ
theological_decisions:
- issue: The contrast between the biological mother and the 'true' mother.
  chosen_reading: For my mother [...], but my true [mother] gave me life.
  rationale: The text explicitly contrasts the biological mother (who presumably gave
    something negative, lost in the lacuna) with the 'true' mother (often understood
    as the Holy Spirit or divine wisdom) who gave life. This reflects Thomasine theology
    where spiritual birth supersedes biological birth.
  alternatives_noted: []
drafter_notes: This saying combines the 'hating' of family from Luke 14:26 with the
  'loving' of family (implied in Matthew 10:37), but adds the crucial Thomasine phrase
  'as I do' (ⲛ̄ⲧⲁϩⲉ). Jesus becomes the exemplar of both hating the biological family
  and loving the spiritual family. The lacuna unfortunately obscures exactly what
  the biological mother gave, but the contrast with the 'true' mother giving life
  is clear.
