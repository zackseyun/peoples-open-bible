revisions:
- from: Habla al corazón[a] de Jerusalén, y clámale que su duro servicio ha terminado, que su iniquidad ha sido perdonada, que ha recibido de la mano de Yahvé el doble por todos sus pecados.
  to: Hablen al corazón[a] de Jerusalén, y proclámenle que su duro servicio[b] ha terminado, que su iniquidad ha sido perdonada[c], que ha recibido de la mano de Yahvé el doble[d] por todos sus pecados.
  rationale: Se corrige el singular a plural para ajustarse al hebreo y al POB auditado. Se sustituye «clámale» por «proclámenle» para mejorar la naturalidad en español sin perder la fuerza de proclamación. Se añaden las notas léxicas y culturales principales ya documentadas en el inglés para preservar la justificación traductológica y la ambigüedad significativa del original.
