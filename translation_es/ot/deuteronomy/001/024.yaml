translation:
  language: es
  text: Así que se volvieron y subieron a la región montañosa[a], y llegaron hasta el Valle de Eshcol, y la reconocieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el wadi de Eshcol» o «el arroyo de Eshcol»; el término hebreo puede denotar un valle con un curso de agua estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: they turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - giraron
  - se desviaron
  lexicon: HALOT
  rationale: El hebreo narra un cambio de dirección en secuencia narrativa. En español, «se volvieron» comunica ese giro de manera natural y conserva el movimiento del relato sin endurecerlo con una forma más técnica.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - subieron hacia arriba
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. «Subieron» es la forma más natural en español y conserva la imagen direccional del original.
- source_word: הָהָרָה
  english_pob_choice: into the hill country
  chosen_spanish: a la región montañosa
  alternatives_spanish:
  - al país montañoso
  - al monte
  - a los montes
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia la zona montañosa. «Región montañosa» mantiene el sentido geográfico amplio de הָהָרָה sin sonar demasiado literal ni restringirlo a una sola montaña.
- source_word: וַיָּבֹאוּ עַד
  english_pob_choice: came as far as
  chosen_spanish: llegaron hasta
  alternatives_spanish:
  - vinieron hasta
  - alcanzaron
  lexicon: HALOT
  rationale: La combinación marca llegada hasta un punto límite. «Llegaron hasta» expresa con claridad esa delimitación en español.
- source_word: נַחַל אֶשְׁכֹּל
  english_pob_choice: the Valley of Eshcol
  chosen_spanish: el Valle de Eshcol
  alternatives_spanish:
  - el Wadi de Eshcol
  - el Arroyo de Eshcol
  - el Torrente de Eshcol
  lexicon: HALOT
  rationale: נחל puede referirse a valle, wadi o cauce estacional. Se conserva el nombre tradicional en forma comprensible para el lector en español, sin cerrar la posibilidad semántica que el propio término permite.
- source_word: וַיְרַגְּלוּ
  english_pob_choice: spied out
  chosen_spanish: la exploraron
  alternatives_spanish:
  - la espiaron
  - la reconocieron
  lexicon: HALOT
  rationale: El piel de רגל tiene el matiz de reconocimiento/investigación de espías. «La exploraron» es idiomático en español y transmite la acción de reconocimiento sin perder del todo la fuerza de inspección del contexto; «la espiaron» sonaría más duro y podría sugerir un espionaje menos neutro.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - esa tierra
  - esa región
  - la
  lexicon: HALOT
  rationale: El pronombre femenino singular retoma una referencia implícita femenina en español. «La» mantiene la concordancia y deja el antecedente implícito como en el hebreo.
translation_notes:
  revision_awareness: La versión inglesa POB usa «the Valley of Eshcol» y anota la alternativa «Wadi/Brook of Eshcol». Se mantuvo esa misma apertura semántica en español mediante «Valle de Eshcol» con nota alternativa, sin forzar una sola imagen geográfica.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y directo del texto fuente.
  - Se conserva «Eshcol» como nombre propio transliterado para no introducir una adaptación no atestiguada.
  - La elección de «la exploraron» busca equilibrio entre naturalidad española y el matiz de reconocimiento militar del verbo hebreo.
