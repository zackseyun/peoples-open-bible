translation:
  text: I am the honored one and the one they bless[a], and the one they despise with
    contempt. I am Peace, and because of me there is War. I am Peace[e][d][c][b],
    and because of me there is War.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The word-final ⲣⲟⲥ is taken as the tail of ⲡⲣⲱⲧⲟⲥ (‘the First’); the beginning
      of the word is not visible in this OCR slice.
    reason: alignment_note
  - marker: b
    text: ⲛⲧⲁ- can mark ‘because of (me/us/etc.)’; an alternative reconstruction would
      yield ‘and I am War,’ which also appears in some translations of Thunder’s paradoxes.
    reason: alternative_reading
  - marker: c
    text: ϩⲛ ⲟⲩϣⲱⲥ may mean ‘in insolence’ or ‘in shamelessness’; due to uncertainty
      it is not rendered in the main line.
    reason: lexical_alternative
  - marker: d
    text: 'Parallels: elsewhere in Thunder the speaker says ‘I am peace, and because
      of me there is war,’ maintaining the paradoxical self-revelation motif.'
    reason: cross_reference
  - marker: e
    text: Or 'I have come, and they call me the First — and they despise me.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲧⲁⲉⲓⲏⲟⲩ
  chosen: I have come
  alternatives:
  - I know
  lexicon: Crum; Layton, Coptic Grammar (ⲧⲁ- perfect + ⲉⲓ ‘come’)
  rationale: Read as ⲧⲁ- (1sg perfect) + ⲉⲓ ‘to come’; the alternative “I know” is
    less likely here given common Thunder formulas.
- source_word: ⲧⲉⲧⲟⲩⲥⲙⲟⲩⲧ
  chosen: they call me
  alternatives:
  - they bless me
  lexicon: Crum (ⲥⲙⲟⲩⲧ ‘to call/name’; cf. ⲥⲙⲟⲩ ‘to bless’ without final ⲧ)
  rationale: Thunder repeatedly uses “they call me …”; the final ⲧ is likely split
    by the line break, favoring ‘call’ over ‘bless’.
- source_word: ⲣⲟⲥ (reconstructed as ⲡⲣⲱⲧⲟⲥ)
  chosen: the First
  alternatives:
  - a first one
  - first
  lexicon: Greek loan (πρῶτος) in Sahidic orthography
  rationale: Only the tail ⲣⲟⲥ is visible; given context and common Thunder motifs,
    ‘the First’ is the most plausible completion, but marked as tentative.
- source_word: ⲧⲉⲧⲟⲩⲕⲁⲧⲁⲫⲣⲟⲛⲓⲛ ⲙⲙⲟⲥ
  chosen: they despise me
  alternatives:
  - they scorn me
  lexicon: Greek καταφρονεῖν ‘despise’
  rationale: Standard loanword; object marker ⲙⲙⲟⲥ indicates ‘me’ as object.
- source_word: ϩⲛ ⲟⲩϣⲱⲥ
  chosen: —
  alternatives:
  - in insolence
  - in shamelessness
  lexicon: Uncertain; possible abstract noun ‘insolence/shamelessness’
  rationale: The phrase likely modifies ‘despise’; due to uncertainty it is not carried
    into the main line, but alternatives are noted.
- source_word: ϯⲣⲏⲛⲏ
  chosen: Peace
  alternatives: []
  lexicon: Greek εἰρήνη
  rationale: Well-attested loan; capitalized to retain titular tone.
- source_word: ⲛⲧⲁ ⲡⲡⲟⲗⲉⲙⲟⲥ
  chosen: because of me there is War
  alternatives:
  - and I am War
  lexicon: ⲛⲧⲁ- ‘because of’ (with pronominal suffix, likely lost) + Greek πόλεμος
    ‘war’
  rationale: Thunder elsewhere pairs ‘I am Peace’ with ‘because of me there is war’;
    given partial form, we render causative but note the alternative.
parallelism_check: 'The couplet preserves the paradox: first clause juxtaposes public
  naming with contempt; second clause is the classic antithesis ‘I am Peace // because
  of me there is War.’ No contradictory pair is smoothed; ‘I am’ is retained.'
voice_check: First-person, declarative Thunder-voice is maintained with ‘I have come’
  and ‘I am Peace’; naming by others and despising retain the confrontational tone.
alignment_risk_note: Alignment is only medium; the OCR shows fragments (e.g., only
  the tail ⲣⲟⲥ likely from ⲡⲣⲱⲧⲟⲥ, and ‘ⲛⲧⲁ’ without a visible pronominal suffix).
  The consult block mentions ‘I know the first ones…’, which does not match the visible
  Coptic here. I therefore prioritized the legible loans (ϯⲣⲏⲛⲏ, ⲡⲡⲟⲗⲉⲙⲟⲥ) and the
  likely ⲥⲙⲟⲩⲧ/ⲕⲁⲧⲁⲫⲣⲟⲛⲓⲛ pattern, marking the ‘First’ and ‘because of me’ readings
  as tentative.
