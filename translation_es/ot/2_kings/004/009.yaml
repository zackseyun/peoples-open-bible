revisions:
- from: 'Y ella dijo a su marido[a]: «Mira ahora, yo sé que este es un hombre de Dios santo[b], que pasa continuamente por nosotros».'
  to: 'Y ella dijo a su marido[a]: «Mira ahora, yo sé que este es un santo hombre de Dios, que pasa continuamente por aquí».'
  rationale: Se ajusta la redacción para reflejar el sentido de tránsito habitual cerca de la casa («por aquí») y para hacer natural en español la combinación del título con el adjetivo («un santo hombre de Dios»). Se mantiene la fidelidad al hebreo y al razonamiento léxico del POB sin añadir notas innecesarias.
