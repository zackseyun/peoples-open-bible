translation:
  language: es
  text: Hazme justicia conforme a tu rectitud[a], Yahvé, mi Dios, y no permitas que se alegren de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conforme a tu justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁפְטֵנִי
  english_pob_choice: Vindicate me
  chosen_spanish: Hazme justicia
  alternatives_spanish:
  - Vindicame
  - Júzgame
  - Dame un juicio favorable
  lexicon: HALOT
  rationale: En el contexto de súplica, שׁפט con objeto personal pide que Dios emita un fallo favorable en favor del salmista. En español, «hazme justicia» comunica bien la petición forense y devocional sin sonar tan técnico como «vindicame» ni tan neutral como «júzgame».
- source_word: כְצִדְקְךָ
  english_pob_choice: according to your righteousness
  chosen_spanish: conforme a tu justicia
  alternatives_spanish:
  - según tu justicia
  - conforme a tu rectitud
  - según tu rectitud
  lexicon: HALOT
  rationale: צדק puede expresar «justicia» o «rectitud». Dado que el hebreo permite el matiz tanto moral como judicial, «conforme a tu justicia» mantiene la fuerza forense y la tensión lexical preservada por la POB inglesa, sin cerrar la opción semántica de «rectitud».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según el criterio terminológico del proyecto en español, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona se conserva de manera natural en español con «mi Dios», una forma clara y reverente que refleja la relación personal explícita del hebreo.
- source_word: וְאַל
  english_pob_choice: and do not let
  chosen_spanish: y no permitas
  alternatives_spanish:
  - y no dejes
  - y no permitas que
  lexicon: HALOT
  rationale: La partícula negativa con imperfecto expresa una petición dirigida a Dios respecto de la acción de los adversarios. «Y no permitas» reproduce bien la fuerza de la súplica en español.
- source_word: יִשְׂמְחוּ
  english_pob_choice: rejoice
  chosen_spanish: se alegren
  alternatives_spanish:
  - se regocijen
  - triunfen
  - se llenen de gozo
  lexicon: HALOT
  rationale: שמח puede ser «alegrarse / regocijarse». En este marco hostil, «se alegren» comunica el gozo adversario sin forzar un registro excesivamente elevado; el contexto hace claro que se trata de júbilo malicioso.
- source_word: לִי
  english_pob_choice: over me
  chosen_spanish: por mí
  alternatives_spanish:
  - a costa de mí
  - sobre mí
  - a mi costa
  lexicon: HALOT
  rationale: Con שמח en contexto adversarial, el sentido es regocijarse a expensas del salmista. «Por mí» suena natural en español y puede expresar ese triunfo hostil, aunque no descarta el matiz de «a costa de mí».
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se preserva el nombre propio divino como forma transliterada en español, evitando la sustitución tradicional por un título. Esto mantiene visible el dato del texto hebreo y la continuidad con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si כְצִדְקְךָ debe inclinarse por «justicia» o «rectitud»
  english_pob_reading: according to your righteousness
  chosen_spanish_reading: conforme a tu justicia
  alternative_spanish_readings:
  - conforme a tu rectitud
  - según tu justicia
  - según tu rectitud
  rationale: El hebreo צדק conserva una amplitud entre justicia, rectitud y orden conforme al pacto. «Justicia» mantiene la claridad judicial del clamor del salmista, mientras que «rectitud» sigue siendo una alternativa válida que no se elimina, para no aplanar la tensión semántica del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
translation_notes:
  revision_awareness: 'El borrador sigue el último pass sin cambios necesarios y conserva la decisión revisada de la POB inglesa: una petición forense favorable, el nombre divino en transliteración y la alternativa semántica de צדק en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se evita «SEÑOR» porque el original nombra explícitamente a Dios.
  - «Hazme justicia» conserva el tono de súplica judicial sin introducir una paráfrasis más amplia.
  - La nota al pie preserva la alternativa lexical relevante de צדק sin duplicar marcadores.
  - «Por mí» mantiene una lectura idiomática del gozo hostil en español, coherente con el contexto del salmo.
