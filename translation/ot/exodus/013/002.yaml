id: EXO.13.2
reference: Exodus 13:2
source:
  edition: WLC
  text: קַדֶּשׁ לִ֨/י כָל בְּכ֜וֹר פֶּ֤טֶר כָּל רֶ֨חֶם֙ בִּ/בְנֵ֣י יִשְׂרָאֵ֔ל בָּ/אָדָ֖ם וּ/בַ/בְּהֵמָ֑ה לִ֖/י הֽוּא־־־׃
translation:
  text: Consecrate to me every firstborn[a], the first to open every womb among the sons of Israel, among man and among beast; it is mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among humankind and among beast.' The Hebrew uses 'man' representatively here in contrast with animals.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַדֶּשׁ
  chosen: Consecrate
  alternatives:
  - Set apart as holy
  - Sanctify
  lexicon: HALOT
  rationale: Imperative of קדשׁ calling for setting something apart to God as holy. 'Consecrate' is natural modern English and preserves the cultic force better than the more archaic 'sanctify.'
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition ל marks dedication or belonging directed toward God. 'To me' fits the imperative 'Consecrate' idiomatically in English.
- source_word: כָל בְּכוֹר
  chosen: every firstborn
  alternatives:
  - every firstborn male
  lexicon: HALOT
  rationale: בכור means 'firstborn.' Although the legal context often concerns male firstborns, the Hebrew here does not explicitly add 'male,' so it should not be imported into the main text.
- source_word: פֶּטֶר כָּל רֶחֶם
  chosen: the first to open every womb
  alternatives:
  - whatever opens every womb
  - every opener of the womb
  lexicon: HALOT
  rationale: This construct phrase defines 'firstborn' more specifically as the one that first opens the womb. 'The first to open every womb' is clear, idiomatic, and preserves the explanatory apposition.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - among the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'among the sons of Israel.' In keeping with gender-accurate policy and the source form, 'sons of Israel' is retained rather than flattening to 'Israelites,' while still functioning corporately.
- source_word: בָּאָדָם
  chosen: among man
  alternatives:
  - from man
  - among humankind
  lexicon: HALOT
  rationale: אָדָם here contrasts human beings with animals. Because the phrase is paired with 'among beast' and the doctrine prefers gender-accurate renderings, 'man' is retained in a representative sense rather than generalized to 'humankind' in the main text.
- source_word: וּבַבְּהֵמָה
  chosen: and among beast
  alternatives:
  - and among livestock
  - and among animals
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beast/animal, often domestic animals in legal contexts. 'Beast' preserves the singular collective force and matches the human/animal contrast of the Hebrew. 'Livestock' is possible but narrower than the term itself.
- source_word: לִי הוּא
  chosen: it is mine
  alternatives:
  - it belongs to me
  - it is for me
  lexicon: HALOT
  rationale: This closing clause states divine ownership. 'It is mine' is concise, natural, and preserves the emphatic claim of possession.
