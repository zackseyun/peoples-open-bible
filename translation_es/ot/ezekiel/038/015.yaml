translation:
  language: es
  text: 'Y vendrás desde tu lugar[a], desde el lejano norte; tú y muchos pueblos contigo, todos ellos montados a caballo: una gran asamblea y un ejército poderoso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde las partes más remotas del norte» o «desde el extremo norte». El hebreo usa un modismo que señala las regiones más lejanas del norte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתָ
  english_pob_choice: And you will come
  chosen_spanish: Y vendrás
  alternatives_spanish:
  - Y llegarás
  - Entonces vendrás
  lexicon: HALOT
  rationale: El verbo con fuerza futura profética se vierte naturalmente con futuro simple en español. Se conserva la conexión del hebreo con «Y», sin volverlo más interpretativo de lo que pide el texto.
- source_word: מִמְּקוֹמְךָ
  english_pob_choice: from your place
  chosen_spanish: desde tu lugar
  alternatives_spanish:
  - desde tu ubicación
  - desde tu sitio
  lexicon: HALOT
  rationale: מָקוֹם es «lugar» en sentido amplio. «Desde tu lugar» es claro, digno y fiel, sin estrechar innecesariamente el sentido.
- source_word: מִיַּרְכְּתֵי צָפוֹן
  english_pob_choice: from the far north
  chosen_spanish: desde las partes más lejanas del norte
  alternatives_spanish:
  - desde el remoto norte
  - desde los confines del norte
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala la lejanía extrema del norte. En español, «las partes más lejanas del norte» mantiene la imagen sin perder legibilidad; evita un calco duro y conserva la amplitud geográfica.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, «tú» antes del resto de la coordinación reproduce suficientemente ese énfasis sin sobrerrecalcarlo.
- source_word: וְעַמִּים רַבִּים אִתָּךְ
  english_pob_choice: you and many peoples with you
  chosen_spanish: tú y muchos pueblos contigo
  alternatives_spanish:
  - tú y muchas naciones contigo
  - y muchos pueblos contigo
  lexicon: HALOT
  rationale: עַמִּים es literalmente «pueblos», no «naciones». Se conserva esa forma para respetar la pluralidad de grupos asociados. «Contigo» mantiene la relación sintáctica del hebreo y la presencia colectiva.
- source_word: רֹכְבֵי סוּסִים
  english_pob_choice: riding horses
  chosen_spanish: todos montados a caballo
  alternatives_spanish:
  - jineteando caballos
  - cabalgando caballos
  - jinetes
  lexicon: HALOT
  rationale: La expresión es literalmente «jinetes de caballos». En español, «montados a caballo» preserva la imagen de caballería con naturalidad. «Jinetes» sería más breve, pero menos transparente respecto de la construcción hebrea.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno de ellos
  lexicon: HALOT
  rationale: El colectivo ya está claro por el contexto; «todos» funciona con naturalidad en español. Se evita redundancia innecesaria.
- source_word: קָהָל גָּדוֹל
  english_pob_choice: a great assembly
  chosen_spanish: una gran asamblea
  alternatives_spanish:
  - una gran compañía
  - una gran congregación
  lexicon: HALOT
  rationale: קָהָל denota un grupo reunido. «Asamblea» conserva esa idea sin cargar el término con un matiz eclesiástico que en español podría sugerir «congregación».
- source_word: וְחַיִל רָב
  english_pob_choice: and a mighty army
  chosen_spanish: y un ejército poderoso
  alternatives_spanish:
  - y un gran ejército
  - y una fuerza poderosa
  lexicon: HALOT
  rationale: En contexto militar, חַיִל puede ser «ejército» o «fuerza». «Ejército poderoso» expresa bien el campo semántico bélico y el valor de רָב como magnitud/fortaleza, sin perder claridad.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el rastro auditado en inglés. Se conservó la progresión sintáctica, el énfasis del pronombre independiente y la imagen militar, evitando tanto calcos innecesarios como paráfrasis expansivas. No hubo revisiones textuales aplicadas en el tramo auditado; el acuerdo de revisión fue alto y sin cambios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Pueblos» se preserva para עַמִּים, siguiendo la decisión auditada en inglés de no reducirlo a «naciones» sin necesidad.
  - «Asamblea» y «ejército» se eligieron por su transparencia semántica y por evitar asociaciones eclesiales o excesivamente libres.
