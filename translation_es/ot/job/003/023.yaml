translation:
  language: es
  text: a un hombre cuyo camino está oculto[a], y a quien Dios ha rodeado de un cerco[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuyo sendero está oculto».
    reason: lexical_alternative
  - marker: b
    text: O «a quien Dios ha cercado» o «ha encerrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְגֶבֶר
  english_pob_choice: to a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - para un hombre
  - al hombre
  lexicon: HALOT
  rationale: El ל introductorio mantiene aquí el complemento indirecto del cuestionamiento retórico previo; en español, «a un hombre» reproduce de forma natural esa relación sin neutralizar el rasgo masculino singular de גֶבֶר.
- source_word: אֲשֶׁר
  english_pob_choice: whose
  chosen_spanish: cuyo
  alternatives_spanish:
  - de quien
  - que tiene
  lexicon: HALOT
  rationale: La relativa posesiva española «cuyo» expresa con claridad la relación entre el hombre y su camino, conservando la concisión del hebreo y la fluidez idiomática.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - curso
  - sendero
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora hebrea del curso de vida sin forzar una interpretación demasiado abstracta; el posesivo queda implícito en «cuyo».
- source_word: נִסְתָּרָה
  english_pob_choice: is hidden
  chosen_spanish: está oculto
  alternatives_spanish:
  - está escondido
  - ha sido ocultado
  - está velado
  lexicon: HALOT
  rationale: El nifal expresa estado/pasividad; «está oculto» comunica bien la condición resultante y mantiene la ambigüedad entre oculto para él o simplemente oculto en general, como en el inglés auditado.
- source_word: וַיָּסֶךְ
  english_pob_choice: has hedged in
  chosen_spanish: ha cercado
  alternatives_spanish:
  - ha cercado con un seto
  - ha cercado por completo
  - ha encerrado
  lexicon: HALOT
  rationale: El verbo sugiere cercar, bloquear o rodear. «Ha cercado» conserva la imagen de delimitación/enclaustramiento sin añadir demasiado comentario interpretativo. No se usa «señor» ni términos eclesiásticos; se mantiene la agencia divina explícita.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַּ es el término poético singular para Dios en Job; en español la equivalencia directa y más sobria es «Dios».
- source_word: בַּעֲדוֹ
  english_pob_choice: whom God has hedged in
  chosen_spanish: a quien Dios ha cercado
  alternatives_spanish:
  - alrededor de quien Dios ha cercado
  - a quien Dios ha encerrado
  lexicon: HALOT
  rationale: La preposición בעד, con este verbo, expresa el rodeo/envolvimiento de la persona. La formulación relativa preserva la sintaxis del hebreo y la continuidad con la cláusula anterior.
theological_decisions:
- issue: Agencia divina en la queja de Job
  english_pob_reading: God is presented as the one who has enclosed the man.
  chosen_spanish_reading: Dios es presentado como quien ha cercado al hombre.
  alternative_spanish_readings:
  - se deja un sentido impersonal de encierro
  - se atenúa la agencia divina
  rationale: El hebreo nombra explícitamente a אֱלוֹהַּ como sujeto; la traducción debe conservar esa acusación/lamento sin suavizarla. «Ha cercado» mantiene la atribución directa a Dios, como en el POB inglés.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Esta versión sigue el pasaje auditado del POB en inglés, incorporando la revisión que añadió la conjunción entre las dos cláusulas y manteniendo la agencia divina explícita. Se prefirió una equivalencia idiomática sobria en español sin perder la metáfora del camino oculto y del cerco divino.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלוֹהַּ, en coherencia con el estándar del proyecto para el término poético singular.
  - Se mantiene «ha cercado» para conservar la imagen de enclaustramiento/limitación, paralela a «has hedged in» del inglés auditado.
  - La nota a conserva una alternativa léxica real en español para el adjetivo participial «oculto», y la nota b preserva la variación semántica entre cercar y encerrar.
