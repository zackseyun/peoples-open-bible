translation:
  language: es
  text: 'Jonadab le dijo: “Acuéstate en tu cama y finge estar enfermo. Cuando tu padre venga a verte, dile: ‘Por favor, que venga Tamar, mi hermana, y me prepare comida, y que prepare la comida[a] ante mis ojos, para que yo la vea y coma de su mano.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘la comida preparada para un enfermo o convaleciente’.'
    reason: cultural_note
lexical_decisions:
- source_word: שְׁכַב עַל מִשְׁכָּבְךָ
  english_pob_choice: Lie down on your bed
  chosen_spanish: Acuéstate en tu cama
  alternatives_spanish:
  - Llégate a tu cama
  - Tiéndete en tu cama
  lexicon: HALOT
  rationale: שׁכב con עַל + מִשְׁכָּב pide una imagen natural de recostarse en la cama. ‘Acuéstate’ comunica la instrucción con claridad y dignidad en español.
- source_word: וְהִתְחָל
  english_pob_choice: pretend to be sick
  chosen_spanish: finge estar enfermo
  alternatives_spanish:
  - finge una enfermedad
  - hazte pasar por enfermo
  lexicon: HALOT
  rationale: El hitpael de חלה aquí no indica enfermarse realmente, sino simular enfermedad. ‘Finge estar enfermo’ preserva esa fuerza pretensiva de manera idiomática.
- source_word: וּבָא אָבִיךָ לִרְאוֹתֶךָ
  english_pob_choice: When your father comes to see you
  chosen_spanish: Cuando tu padre venga a verte
  alternatives_spanish:
  - Y cuando tu padre venga a verte
  - Cuando tu padre venga para verte
  lexicon: HALOT
  rationale: La secuencia narrativa se expresa naturalmente en español con una cláusula temporal. ‘Venga a verte’ conserva el valor de לִרְאוֹתֶךָ sin sonar forzado.
- source_word: תָּבֹא נָא תָמָר אֲחוֹתִי
  english_pob_choice: Please let Tamar my sister come
  chosen_spanish: que venga Tamar, mi hermana
  alternatives_spanish:
  - que venga, por favor, Tamar, mi hermana
  - permite que venga Tamar, mi hermana
  lexicon: HALOT
  rationale: El tono de súplica de נָא se integra de forma natural en la petición indirecta española. El orden ‘Tamar, mi hermana’ reproduce la aposición del hebreo.
- source_word: וְתַבְרֵנִי לֶחֶם
  english_pob_choice: prepare food for me
  chosen_spanish: me prepare comida
  alternatives_spanish:
  - me prepare alimento
  - me prepare pan
  lexicon: HALOT
  rationale: El verbo ברה en este contexto se refiere a preparar/proveer alimento para un enfermo. ‘Comida’ expresa bien el sentido amplio de לֶחֶם sin reducirlo innecesariamente a ‘pan’.
- source_word: וְעָשְׂתָה לְעֵינַי אֶת הַבִּרְיָה
  english_pob_choice: let her prepare the meal in my sight
  chosen_spanish: que prepare el plato[a] delante de mí
  alternatives_spanish:
  - que prepare la comida delante de mí
  - que haga el alimento ante mis ojos
  lexicon: HALOT
  rationale: הַבִּרְיָה parece referirse a una preparación especial de comida para un convaleciente. ‘Plato’ mantiene la concreción del alimento preparado, mientras ‘delante de mí’ conserva לְעֵינַי.
- source_word: לְמַעַן אֲשֶׁר אֶרְאֶה
  english_pob_choice: so that I may see it
  chosen_spanish: para que yo lo vea
  alternatives_spanish:
  - a fin de que yo lo vea
  - para que lo observe
  lexicon: HALOT
  rationale: El objeto explícito de אֶרְאֶה se conserva con el pronombre ‘lo’. Esto evita la ambigüedad de ‘verlo’ en español y refleja que Amnón quiere observar la preparación.
- source_word: וְאָכַלְתִּי מִיָּדָהּ
  english_pob_choice: eat from her hand
  chosen_spanish: coma de su mano[b]
  alternatives_spanish:
  - coma de la mano de ella
  - coma lo que ella le dé de su mano
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene casi literalmente porque es importante para la escena y para la cercanía física que la narración subraya. ‘De su mano’ suena natural y fiel.
theological_decisions:
- issue: No hay una cuestión doctrinal principal; el punto interpretativo es narrativo y lexical.
  english_pob_reading: The verse is read as an instruction to simulate sickness and stage a private meal preparation.
  chosen_spanish_reading: El versículo se entiende como instrucción para simular una enfermedad y preparar una escena privada de comida.
  alternative_spanish_readings:
  - El versículo podría leerse más débilmente como simplemente ‘ponte enfermo’
  - Podría suavizarse ‘delante de mí’ como ‘ante mis ojos’
  rationale: El hebreo de חלה en hitpael aquí es pretensivo, no causal. Además, la preparación ‘delante de mí’ y el ‘comer de su mano’ forman parte del plan narrativo y deben mantenerse visibles en español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés POB revisó ‘give me food’ por ‘prepare food for me’ y aclaró ‘so that I may see it’; la presente versión española sigue esa revisión al usar ‘me prepare comida’ y ‘para que yo lo vea’. También conserva el valor pretensivo de וְהִתְחָל con ‘finge estar enfermo’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ no porque aparezca en este versículo, sino porque es el término base del proyecto cuando corresponda.
  - Se usa ‘mi hermana’ como aposición directa para reflejar la estructura del hebreo.
  - La elección de ‘comida’ evita un calco rígido de ‘pan’ en un contexto donde el sentido es alimento preparado.
  - ‘Delante de mí’ conserva la dimensión visual de לְעֵינַי sin sonar arcaico.
