  text: וּ/בְנֵ֥י זִלְפָּ֛ה שִׁפְחַ֥ת לֵאָ֖ה גָּ֣ד וְ/אָשֵׁ֑ר אֵ֚לֶּה בְּנֵ֣י יַעֲקֹ֔ב אֲשֶׁ֥ר יֻלַּד ל֖/וֹ בְּ/פַדַּ֥ן אֲרָֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/035/026.yaml
  text: 'And the sons of Zilpah[a], Leah’s servant: Gad and Asher[b]. These are the sons of Jacob who were born to him in Paddan-aram.'
  footnotes:
  - marker: a
    text: Hebrew 'female servant' could also be rendered 'maidservant' or, more starkly, 'slave woman/slave-girl,' depending on how one chooses to represent the social status denoted by שִׁפְחָה.
    reason: lexical_alternative
  - marker: b
    text: Although the verse says these sons were born to Jacob 'in Paddan-aram,' Benjamin was born later in Canaan (vv. 16–18). The statement summarizes the sons associated with Jacob's Aramean household period and excludes Benjamin from this location note.
    reason: cross_reference
