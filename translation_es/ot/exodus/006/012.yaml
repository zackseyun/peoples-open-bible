base_translation:
  language: en
  yaml_path: translation/ot/exodus/006/012.yaml
  text: But Moses spoke before Yahweh[a], saying, “Behold, the sons of Israel have not listened to me; so how will Pharaoh listen to me[b], since I am uncircumcised in lips?”
  footnotes:
  - marker: a
    text: 'Hebrew: ''uncircumcised in/of lips,'' an idiom expressing impeded or inadequate speech; compare Exod 4:10.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
