- from: cuando su lámpara brillaba sobre mi cabeza[a], y por su luz caminaba en tinieblas.
  to: cuando su lámpara brillaba sobre mi cabeza, y por su luz[a] caminaba por la oscuridad.
  rationale: Se conserva la traducción principal del borrador en casi todo, pero se ajusta «en tinieblas» a «por la oscuridad» para reflejar mejor el matiz dinámico documentado para חֹשֶׁךְ y se reubica/corrige la nota al pie para que ancle la ambigüedad real de לְאוֹרוֹ. No se requiere adjudicación adicional; es una reparación menor y clara.
