translation:
  language: es
  text: Sus siervos lo llevaron a Jerusalén y lo sepultaron en su sepulcro, con sus padres, en la ciudad de David.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo transportaron a Jerusalén'; el verbo hebreo literalmente significa 'lo hicieron montar' o 'hicieron que lo llevaran'.
    reason: lexical_alternative
  - marker: b
    text: '''Con sus padres'' es un modismo hebreo de sepultura que significa entre sus antepasados reales.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְכִּבוּ
  english_pob_choice: carried
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo transportaron
  - lo hicieron llevar
  lexicon: HALOT
  rationale: El hiphil de רכב tiene el sentido literal de 'hacer montar' o 'hacer transportar'. En este contexto funerario, el español natural 'lo llevaron' comunica el traslado del cadáver sin sugerir que el rey estuviera vivo y montando un animal. Mantiene la equivalencia óptima con la decisión inglesa de evitar una calca demasiado mecánica.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus siervos
  - sus servidores/funcionarios
  lexicon: HALOT
  rationale: עבד puede referirse a siervos, servidores o funcionarios reales. 'Servidores' funciona bien en español contemporáneo y preserva el referente cortesano sin forzar una lectura demasiado servil en este contexto narrativo.
- source_word: יְרוּשָׁלָמָה
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Jerusalén. En español, 'a Jerusalén' expresa de forma natural la dirección del traslado.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: and buried him
  chosen_spanish: y lo sepultaron
  alternatives_spanish:
  - y lo enterraron
  lexicon: HALOT
  rationale: '''Sepultar'' conserva un registro digno y bíblico en español, y es apropiado para un entierro real. ''Enterrar'' es posible, pero ''sepultar'' suele resonar mejor con el contexto y la tradición bíblica sin perder claridad.'
- source_word: בִּקְבֻרָתוֹ
  english_pob_choice: in his tomb
  chosen_spanish: en su sepulcro
  alternatives_spanish:
  - en su tumba
  - en su lugar de sepultura
  lexicon: HALOT
  rationale: El sustantivo designa el lugar de entierro. 'Sepulcro' mantiene el tono solemne y corresponde bien al contexto dinástico; 'tumba' sería más cotidiano.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - entre sus padres
  - con sus antepasados
  lexicon: HALOT
  rationale: En español, 'con sus padres' preserva de forma literal la idiomática hebrea de ser sepultado entre los antepasados reales. Se evita sustituirla por 'antepasados' en el texto principal para no borrar la tensión idiomática documentada por la POB inglesa. La nota aclara el sentido funerario de la expresión.
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la Ciudad de David
  lexicon: HALOT
  rationale: Se conserva la forma tradicional y transparente del topónimo histórico. 'Ciudad' va en minúscula porque es un sustantivo común dentro del nombre geográfico tradicional.
theological_decisions:
- issue: Idioma funerario hebreo 'con sus padres'
  english_pob_reading: '''With his fathers'' is a Hebrew burial idiom meaning among his royal forefathers.'
  chosen_spanish_reading: '''Con sus padres'' conserva el hebraísmo y remite al entierro entre sus antepasados reales.'
  alternative_spanish_readings:
  - '''con sus antepasados'''
  - '''entre sus padres'''
  rationale: La POB inglesa opta por mantener la expresión idiomática en el texto y explicarla en nota. En español se sigue el mismo patrón para no neutralizar el rasgo cultural del hebreo ni sustituirlo por una paráfrasis interpretativa en la línea principal.
  doctrine_reference: Uso idiomático bíblico y práctica sepulcral real en el contexto davídico
- issue: Referente cortesano de עֲבָדָיו
  english_pob_reading: servants can denote royal servants or officials
  chosen_spanish_reading: '''servidores'' como servicio real o cortesano'
  alternative_spanish_readings:
  - '''siervos'''
  - '''funcionarios'''
  rationale: 'No hay una decisión doctrinal, pero sí una decisión de registro: ''servidores'' evita una lectura excesivamente esclavista o demasiado burocrática y deja abierta la referencia a personal de la corte que se ocupó del cadáver del rey.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se revisó el pasaje con alta concordancia respecto del auditorio inglés: no se detectaron cambios sustanciales en el sentido. La única tensión relevante es la metáfora verbal de רכב y el hebraísmo funerario עִם אֲבֹתָיו; ambos se conservan de forma reconocible en español con notas explicativas.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente y sobrio propio de un relato real funerario.
  - Se evitó 'SEÑOR' porque el verso no contiene el Tetragrámaton ni un sustituto divino.
  - '''Sepulcro'' y ''sepultaron'' armonizan bien con el registro bíblico y con la referencia a la tumba real.'
  - La puntuación con dos notas al pie sigue el patrón del audit trail inglés y coloca los marcadores junto a las expresiones relevantes.
