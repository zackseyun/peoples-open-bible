translation:
  language: es
  text: Y Shupim[a] y Hupim[a] fueron hijos de Ir; Husim fue hijo de Aher[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas tradiciones traducen estos nombres como «Sefufam» y «Hufam» a la luz de genealogías paralelas relacionadas.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «hijos de Aher». La construcción es sintácticamente difícil: el plural «hijos» aparece con el nombre singular Husim. Algunos entienden a Aher como nombre propio; otros lo toman como «otro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שֻׁפִּם
  english_pob_choice: And Shuppim
  chosen_spanish: Y Shupim
  alternatives_spanish:
  - Y Shefupam
  - Y Shefufam
  lexicon: HALOT
  rationale: Nombre propio transliterado; en español se conserva la forma breve cercana al hebreo consonántico, manteniendo la conjunción inicial. No se traduce el nombre.
- source_word: וְ/חֻפִּם
  english_pob_choice: and Huppim
  chosen_spanish: y Hupim
  alternatives_spanish:
  - y Hupam
  - y Jupim
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se preserva la continuidad nominal de la lista genealógica sin añadir interpretación.
- source_word: בְּנֵי
  english_pob_choice: were the sons of
  chosen_spanish: fueron hijos de
  alternatives_spanish:
  - fueron descendientes de
  - eran hijos de
  lexicon: HALOT
  rationale: En una lista genealógica, el hebreo nominal se vierte de forma predicativa natural en español como 'fueron hijos de', que mantiene el sentido filial inmediato sin volverlo más abstracto que 'descendientes'.
- source_word: עִיר
  english_pob_choice: Ir
  chosen_spanish: Ir
  alternatives_spanish:
  - Iri
  lexicon: HALOT
  rationale: Nombre propio transliterado desde la forma consonántica del texto masorético. Se evita ampliar a otra forma tradicional no atestiguada aquí.
- source_word: חֻשִׁם
  english_pob_choice: Hushim
  chosen_spanish: Husim
  alternatives_spanish:
  - Jusim
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español se ajusta la grafía para reflejar la pronunciación aproximada sin añadir una forma interpretativa.
- source_word: בְּנֵי אַחֵר
  english_pob_choice: was the son of Aher
  chosen_spanish: fue hijo de Aher
  alternatives_spanish:
  - fueron hijos de Aher
  - fue hijo de otro
  lexicon: HALOT
  rationale: Aunque el hebreo tiene plural morfológico ('hijos de'), el contexto genealógico y la sintaxis comprimida permiten entender a Husim como sujeto singular en español, siguiendo la resolución del POB inglés. 'Aher' se conserva como nombre propio; no se expande a 'otro' sin una base más fuerte.
