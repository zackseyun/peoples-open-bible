translation:
  language: es
  text: para que tu camino sea conocido en la tierra[a], tu salvación entre todas las naciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en el país', si la referencia se toma de manera más local; el paralelismo con 'entre todas las naciones' favorece el sentido más amplio, 'en la tierra'.
    reason: lexical_alternative
  - marker: b
    text: O 'tu liberación'. El término hebreo puede denotar rescate o salvación en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָדַעַת
  english_pob_choice: that your way may be known
  chosen_spanish: para que sea conocido
  alternatives_spanish:
  - para que se conozca
  - a fin de que se conozca
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. En español, 'para que sea conocido' conserva el sentido purposivo y la pasiva implícita del hebreo, de manera natural y fiel.
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el país
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'earth' por el alcance universal del paralelismo, en español 'en la tierra' comunica bien esa amplitud sin sonar forzado. 'País' sería demasiado local.
- source_word: דַּרְכֶּךָ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu manera
  - tu proceder
  lexicon: HALOT
  rationale: '''Camino'' mantiene la metáfora hebrea de דֶּרֶךְ y en español puede abarcar tanto la senda como el modo de actuar de Dios. Aunque el inglés conserva ''way'', ''camino'' es la correspondencia más natural y tradicionalmente comprensible.'
- source_word: בְּכָל גּוֹיִם
  english_pob_choice: among all nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - entre todos los pueblos
  - en todas las naciones
  lexicon: HALOT
  rationale: '''Entre'' reproduce bien el valor distributivo del prefijo בְּ en este contexto y evita sugerir mero lugar estático. ''Naciones'' conserva el matiz colectivo e internacional de גּוֹיִם.'
- source_word: יְשׁוּעָתֶךָ
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu liberación
  - tu rescate
  lexicon: HALOT
  rationale: '''Salvación'' es la traducción que mejor preserva la amplitud teológica de יְשׁוּעָה en un salmo universal, sin reducirla a un solo acto de rescate concreto.'
theological_decisions:
- issue: Alcance de בָּאָרֶץ en un salmo de horizonte universal
  english_pob_reading: universal 'earth' rather than local 'land'
  chosen_spanish_reading: '''en la tierra'' con sentido amplio y universal'
  alternative_spanish_readings:
  - '''en el país'' con sentido local'
  - '''en la tierra'' entendido estrechamente'
  rationale: El paralelismo con 'entre todas las naciones' favorece una lectura de alcance mundial. En español, 'en la tierra' comunica ese marco universal sin necesidad de forzar una glosa local.
  doctrine_reference: Translation philosophy §1, §3
- issue: Mantener la amplitud semántica de יְשׁוּעָה
  english_pob_reading: '''salvation'''
  chosen_spanish_reading: '''salvación'''
  alternative_spanish_readings:
  - '''liberación'''
  - '''rescate'''
  rationale: '''Salvación'' preserva la amplitud del término hebreo, que puede incluir rescate concreto pero no se limita a él. Esta opción respeta el uso teológico del salmo sin restringirlo innecesariamente.'
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; el borrador mantiene el acuerdo alto con el texto fuente y con el análisis inglés auditado.
  spanish_consistency_notes:
  - Se mantiene 'salvación' como término teológico amplio, coherente con el uso POB de יְשׁוּעָה.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - '''Naciones'' se conserva para גּוֹיִם por su valor internacional y colectivo.'
  - La nota [a] conserva la alternativa local para reflejar la tensión lexical documentada en el audit trail.
