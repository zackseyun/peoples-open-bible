translation:
  language: es
  text: 'Y Moisés dijo[a]: «Porque no se comió, la ofrenda por el pecado fue consumida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la cosa relacionada con el pecado». La expresión griega es un modismo bíblico estándar para una ofrenda por el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν Μωυσῆς
  english_pob_choice: And Moses said
  chosen_spanish: Y Moisés dijo
  alternatives_spanish:
  - Entonces Moisés dijo
  lexicon: LSJ
  rationale: La narración griega usa una coordinación simple con καί, así que «Y» conserva esa conexión sin introducir una secuencia interpretativa más fuerte. «Dijo» mantiene el registro directo y natural en español.
- source_word: Διὰ τὸ μὴ βεβρῶσθαι
  english_pob_choice: Because it was not eaten
  chosen_spanish: Porque no fue comido
  alternatives_spanish:
  - Ya que no fue comido
  - Por no haber sido comido
  lexicon: LSJ
  rationale: El infinitivo causal con διά expresa motivo. En español, «Porque no fue comido» conserva la causalidad y refleja el pasivo del griego de manera clara y sobria.
- source_word: τὸ περὶ τῆς ἁμαρτίας
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda del pecado
  - la cosa acerca del pecado
  lexicon: LSJ
  rationale: La expresión es un modismo sacrificial bíblico. En español, «ofrenda por el pecado» comunica el referente cultual de forma comprensible sin perder la base literal del giro griego.
- source_word: ἀνηλώθη
  english_pob_choice: was consumed
  chosen_spanish: fue consumida
  alternatives_spanish:
  - fue consumido
  - se consumió
  - fue destruida
  lexicon: LSJ
  rationale: El pasivo de ἀναλίσκω puede significar «ser consumido» o «ser usado por completo». En contexto sacrificial, «fue consumida» preserva la idea de consumo total sin especificar más de lo que el griego dice.
theological_decisions:
- issue: Interpretación cultual de τὸ περὶ τῆς ἁμαρτίας
  english_pob_reading: the sin offering
  chosen_spanish_reading: la ofrenda por el pecado
  alternative_spanish_readings:
  - la cosa acerca del pecado
  - la ofrenda del pecado
  rationale: 'Sigo la lectura sacrificial establecida por el POB inglés: no se trata de un giro general sobre el pecado, sino de una ofrenda específica. «Ofrenda por el pecado» expresa esa función cultual en español y evita una literalidad opaca.'
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no muestra revisiones textuales; el último pase indica que no hubo cambios necesarios. La versión española sigue esa lectura estable y conserva el único punto lexical relevante: el modismo sacrificial τὸ περὶ τῆς ἁμαρτίας.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Moisés» y el pasado simple narrativo para ajustar el ritmo breve del versículo.
  - «Ofrenda por el pecado» evita el calco oscuro y sigue el valor técnico del modismo, coherente con el POB inglés.
  - «Fue consumida» conserva el pasivo y no añade explícitamente la modalidad de consumo, ya que el griego no la especifica.
