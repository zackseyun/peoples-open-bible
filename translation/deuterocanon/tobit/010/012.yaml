id: TOB.10.12
reference: Tobit 10:12
source:
  edition: lxx-swete-1909
  text: καὶ εἶπεν τῇ θυγατρὶ αὐτοῦ Τίμα τοὺς πενθερούς σου, αὐτοὶ νῦν γονεῖς σού εἰσιν· ἀκούσαιμί σου ἀκοὴν καλήν. καὶ ἐφίλησεν αὐτήν. καὶ Ἔδνα εἶπεν πρὸς Τωβείαν Ἀδελφὲ ἀγαπητέ, ἀποκαταστήσει σε ὁ κύριος τοῦ οὐρανοῦ, καὶ δῴη μοι ἰδεῖν σου παιδία ἐκ Σάρρας τῆς θυγατρός μου, ἵνα εὐφρανθῶ ἐνώπιον τοῦ κυρίου· καὶ ἰδοὺ παρατίθεμαί σοι τὴν θυγατέρα μου ἐν παρακαταθήκῃ, μὴ λυπήσῃς αὐτήν.
  language: Greek
  pages:
  - 832
  - 835
  - 852
  - 853
  - 854
  - 855
  - 856
  - 857
  confidence: high
  validation: agree
translation:
  text: And he said to his daughter[a], “Honor your parents-in-law; they are now your parents. May I hear a good report about you.” And he kissed her. And Edna said to Tobiah, “Beloved brother, may the Lord of heaven restore you, and may he grant me to see children from you and from Sarah my daughter, so that I may rejoice before the Lord. And look, I entrust my daughter to you as a deposit[b]; do not grieve her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I place my daughter in your trust'; the Greek says literally, 'I entrust my daughter to you as a deposit.'
    reason: lexical_alternative
  - marker: b
    text: '''Restore you'' may also carry the sense ''bring you back safely'' in this travel context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίμα
  chosen: Honor
  alternatives:
  - Respect
  - Esteem
  lexicon: LSJ
  rationale: τιμάω commonly means to honor or show due regard. 'Honor' preserves the ethical weight and echoes familial duty language better than the weaker 'respect.'
- source_word: τοὺς πενθερούς σου
  chosen: your parents-in-law
  alternatives:
  - your in-laws
  - your father-in-law and mother-in-law
  lexicon: LSJ
  rationale: The plural refers to the spouse's parents collectively. 'Parents-in-law' is precise and natural in English; 'in-laws' is broader and less exact.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: LSJ
  rationale: The Greek plural is collective and straightforwardly means 'parents.'
- source_word: ἀκούσαιμί σου ἀκοὴν καλήν
  chosen: May I hear a good report about you
  alternatives:
  - May I hear good news of you
  - May I hear a favorable report concerning you
  lexicon: LSJ
  rationale: This idiom expresses the wish to hear well of someone. 'Good report about you' is idiomatic modern English while preserving the sense of reputation/news.
- source_word: ἀδελφὲ ἀγαπητέ
  chosen: Beloved brother
  alternatives:
  - Dear brother
  - Brother, beloved one
  lexicon: LSJ
  rationale: A warm familial address. 'Beloved brother' preserves both terms and the affectionate tone without sounding overly stiff.
- source_word: ἀποκαταστήσει σε
  chosen: restore you
  alternatives:
  - bring you back safely
  - reestablish you
  lexicon: LSJ
  rationale: The verb can mean restore or bring back. In this departure context it likely includes safe return and well-being, but 'restore you' stays closer to the Greek and leaves the fuller sense open.
- source_word: ὁ κύριος τοῦ οὐρανοῦ
  chosen: the Lord of heaven
  alternatives:
  - the Lord from heaven
  - the heavenly Lord
  lexicon: LSJ
  rationale: A reverential divine title. 'Lord' follows project policy for κύριος, and 'of heaven' is the natural genitival rendering.
- source_word: δῴη μοι ἰδεῖν σου παιδία ἐκ Σάρρας τῆς θυγατρός μου
  chosen: may he grant me to see children from you and from Sarah my daughter
  alternatives:
  - may he grant me to see your children by Sarah my daughter
  - may he let me see children born to you through Sarah my daughter
  lexicon: LSJ
  rationale: The Greek literally asks to see 'your children from Sarah.' English needs slight expansion to make the parentage clear. 'From you and from Sarah my daughter' preserves the bilateral sense.
- source_word: ἵνα εὐφρανθῶ ἐνώπιον τοῦ κυρίου
  chosen: so that I may rejoice before the Lord
  alternatives:
  - that I may be gladdened before the Lord
  - so that I may rejoice in the Lord's presence
  lexicon: LSJ
  rationale: εὐφραίνω here is best rendered 'rejoice.' 'Before the Lord' preserves the formal religious orientation of the phrase.
- source_word: παρατίθεμαί σοι
  chosen: I entrust ... to you
  alternatives:
  - I place ... in your care
  - I commit ... to you
  lexicon: LSJ
  rationale: The middle voice here conveys committing something to another's care. 'Entrust' is clear and faithful.
- source_word: ἐν παρακαταθήκῃ
  chosen: as a deposit
  alternatives:
  - in trust
  - for safekeeping
  lexicon: LSJ
  rationale: The noun denotes something entrusted, a deposit or trust. 'As a deposit' is more formally literal and preserves the metaphor of entrusted custody; the more idiomatic sense is clear from context.
- source_word: μὴ λυπήσῃς αὐτήν
  chosen: do not grieve her
  alternatives:
  - do not distress her
  - do not cause her sorrow
  lexicon: LSJ
  rationale: λυπέω means to cause grief, pain, or distress. 'Do not grieve her' is concise and close to the Greek, though it carries the causative sense in context.
