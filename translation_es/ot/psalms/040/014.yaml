review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura de súplica urgente del hebreo y preserva correctamente «Yahvé» por יְהוָה. «para librarme» refleja bien לְהַצִּילֵנִי, y «date prisa en ayudarme» transmite adecuadamente la urgencia de לְעֶזְרָתִי חוּשָׁה. Sin embargo, «Sé propicio» no refleja de manera suficientemente fiel ni natural el imperativo רְצֵה en este contexto, que expresa voluntad favorable o complacencia para actuar, no simplemente ser propicio en abstracto.
  spanish_quality_summary: El español es mayormente claro y digno, pero «Sé propicio» suena algo rígido y menos idiomático en español moderno eclesial que «Ten a bien». Además, la nota «Quiere agradarte» es poco natural y semánticamente desacertada, y «hazte rápido en ayudarme» no es una alternativa española aceptable. Conviene ajustar tanto el texto principal como las notas para mejorar fidelidad y legibilidad.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto en «Yahvé». No hay conflictos con otros términos doctrinales. La principal desviación está en la decisión lexical para רְצֵה: el español debería reflejar mejor el matiz volitivo documentado en el audit trail inglés.'
  issues:
