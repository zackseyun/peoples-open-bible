- from: Sus polluelos [a] chupan sangre [b], y donde están los muertos, allí está él.
  to: Sus polluelos chupan[a] sangre, y donde están los caídos[b], allí está.
  rationale: La revisión conserva el sentido del hebreo y del POB inglés, mejora la naturalidad del español y corrige las notas. 'Sus polluelos' se mantiene como buena elección contextual. Se añade nota en 'chupan' para reflejar la amplitud semántica documentada de יְעַלְעוּ. Se cambia 'los muertos' por 'los caídos' para preservar el matiz de חֲלָלִים. Se elimina el pronombre 'él' en la cláusula final porque en español resulta más natural 'allí está' para el ave en descripción poética genérica.
