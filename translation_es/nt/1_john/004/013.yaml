    text: Or 'In this we know …' The Greek phrase can be rendered more formally that way.
    reason: lexical_alternative
  - marker: b
    text: Or 'abide in him.' The Greek verb μένω is a key Johannine term for continuing relationally in union with God.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from his Spirit,' emphasizing source; many English versions simplify to 'his Spirit.'
    reason: lexical_alternative
