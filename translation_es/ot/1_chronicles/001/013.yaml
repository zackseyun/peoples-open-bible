lexical_decisions:
- source_word: וּ/כְנַ֗עַן
  english_pob_choice: And Canaan
  chosen_spanish: Y Canaán
  alternatives_spanish:
  - Ahora Canaán
  - Canaán
  lexicon: HALOT
  rationale: El nombre propio se translitera al español como Canaán. La conjunción inicial se conserva con «Y» para reflejar la secuencia genealógica del hebreo.
- source_word: יָלַ֛ד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró
  lexicon: HALOT
  rationale: En contexto genealógico, el verbo expresa paternidad/begat. «Engendró» es natural en español bíblico moderno y mantiene el sentido genealógico con precisión.
- source_word: צִיד֥וֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Zidón
  lexicon: HALOT
  rationale: Se usa la forma habitual en español, Sidón, que corresponde al nombre propio estándar en la tradición bíblica y sigue de cerca la transliteración moderna.
- source_word: בְּכֹר֖/וֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo primogénito
  - su primer hijo
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo señala al hijo nacido primero. «Primogénito» comunica la relación de orden de nacimiento con naturalidad en español.
- source_word: חֵֽת
  english_pob_choice: Heth
  chosen_spanish: Het
  alternatives_spanish:
  - Heth
  lexicon: HALOT
  rationale: El hebreo presenta el nombre personal חֵת como antepasado en la genealogía. En español se adapta fonéticamente como «Het», sin convertirlo en un etnónimo.
