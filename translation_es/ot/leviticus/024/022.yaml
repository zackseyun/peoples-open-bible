translation:
  language: es
  text: Un solo juicio[a] habrá para ustedes; como para el residente extranjero, así para el nativo, porque yo soy Yahvé, el Dios de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una sola ley habrá para ustedes; como para el residente extranjero, así para el nativo». El hebreo מִשְׁפָּט puede referirse a juicio, norma judicial o criterio legal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפָּט
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - juicio legal
  - norma de juicio
  lexicon: HALOT
  rationale: En este contexto jurídico, מִשְׁפָּט señala el estándar o decisión judicial que debe aplicarse por igual. 'Juicio' mantiene la amplitud semántica de la decisión/criterio legal sin ampliar indebidamente a 'ley' como si fuera תּוֹרָה.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - único
  - el mismo
  - solo uno
  lexicon: HALOT
  rationale: El adjetivo enfatiza igualdad y unidad del criterio aplicado. 'Uno' es la opción más directa y natural en español en una formulación legal.
- source_word: יִהְיֶה
  english_pob_choice: There shall be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  - deberá haber
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa aquí una disposición normativa. 'Habrá' funciona bien en español jurídico y conserva el valor prescriptivo sin forzar una perífrasis innecesaria.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - para ti
  - a ustedes
  lexicon: HALOT
  rationale: Se conserva el destinatario plural de la norma. 'Para ustedes' ofrece español neutral latinoamericano y refleja la aplicación comunitaria de la disposición.
- source_word: גֵּר
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente extranjero
  - extranjero residente
  - forastero residente
  lexicon: HALOT
  rationale: גֵּר designa al no nativo que vive entre Israel bajo un marco de protección y sujeción a la ley. 'Forastero' es más natural en español que 'sojourner' y, aunque algo más amplio, evita términos jurídicamente cargados o demasiado técnicos.
- source_word: אֶזְרָח
  english_pob_choice: native
  chosen_spanish: nativo
  alternatives_spanish:
  - nacido en la tierra
  - nativo de la tierra
  - ciudadano
  lexicon: HALOT
  rationale: El contraste con גֵּר pide una forma breve y paralela. 'Nativo' preserva la oposición léxica y mantiene el tono del par contrastivo.
- source_word: כַּגֵּר כָּאֶזְרָח
  english_pob_choice: as for the sojourner, so for the native
  chosen_spanish: como para el forastero, así para el nativo
  alternatives_spanish:
  - para el forastero como para el nativo
  - igual para el forastero que para el nativo
  - así para el forastero como para el nativo
  lexicon: HALOT
  rationale: La doble comparativa hebrea expresa igualdad de aplicación. La construcción 'como... así...' reproduce bien el paralelismo y la fuerza distributiva del texto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque yo soy
  lexicon: HALOT
  rationale: Aquí introduce la fundamentación teológica de la norma. 'Porque' comunica la razón de manera clara y solemne en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de verter el Tetragrama como 'Yahvé' en el texto principal, preservando el nombre divino y evitando la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  - su Dios
  lexicon: HALOT
  rationale: 'Con YHWH el sustantivo funciona en singular teológico: ''Dios''. En español, ''su Dios'' conserva la relación de pertenencia/covenio; se evita ''sus dioses'' por ser incompatible con el contexto.'
theological_decisions:
- issue: Alcance de la igualdad legal entre forastero y nativo
  english_pob_reading: one judgment for you; as for the sojourner, so for the native
  chosen_spanish_reading: un solo juicio habrá para ustedes; como para el forastero, así para el nativo
  alternative_spanish_readings:
  - una sola ley habrá para ustedes; como para el forastero, así para el nativo
  - un solo juicio para ustedes, tanto para el forastero como para el nativo
  rationale: El hebreo usa מִשְׁפָּט, no תּוֹרָה. Por eso conviene mantener el énfasis en un mismo criterio/juicio aplicable a ambos grupos, sin expandirlo a 'ley' en sentido más amplio.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; preserve lexical specificity of source terms'
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el Nombre divino directamente. La política del proyecto pide 'Yahvé' como forma principal en español para mantener auditable la presencia del Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Seguí la revisión auditada del inglés: se prefirió una forma más directa para מִשְׁפָּט y se conservó el paralelismo breve de ''como para el forastero, así para el nativo''. En español, ''juicio'' resulta más natural que una expansión como ''estándar de juicio'', y evita importar ''ley'' donde el hebreo usa específicamente מִשְׁפָּט.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al criterio de nombre divino del proyecto.
  - Se mantuvo 'forastero' para גֵּר y 'nativo' para אֶזְרָח, conservando el contraste breve del hebreo.
  - '''Porque yo soy Yahvé, su Dios'' refleja la cláusula de fundamento teológico sin añadir matices ajenos al texto.'
  - La nota al pie marca la alternativa 'ley' sólo como opción lexical, no como lectura principal.
