translation:
  language: es
  text: Y el que había asumido pagar tributo a los romanos con el cautiverio[a] de los de Jerusalén seguía proclamando que los judíos tenían como defensor[b] a uno que luchaba por ellos, y que por este motivo los judíos eran invulnerables, porque seguían las leyes que les habían sido prescritas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cautividad»; el griego alude a la captura o cautiverio de los habitantes de Jerusalén como la fuente esperada del tributo.
    reason: lexical_alternative
  - marker: b
    text: O «campeón»; el griego ὑπέρμαχον designa a alguien que pelea en favor de otro. El defensor no se nombra explícitamente aquí; el contexto sugiere a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ... ἀναδεξάμενος
  english_pob_choice: the one who had undertaken
  chosen_spanish: el que había asumido
  alternatives_spanish:
  - el que había emprendido
  - el que había tomado sobre sí
  lexicon: BDAG
  rationale: El participio articular aoristo medio funciona como sustantivo. «Había asumido» conserva la idea de aceptar una obligación o carga sin introducir innecesariamente la idea de un contrato comercial.
- source_word: φόρον
  english_pob_choice: tribute
  chosen_spanish: el tributo
  alternatives_spanish:
  - el impuesto
  - el pago
  lexicon: LSJ
  rationale: «Tributo» preserva el tono político y de subordinación imperial del griego, mejor que un «impuesto» genérico.
- source_word: ἀπὸ τῆς τῶν ἐν Ἱεροσολύμοις αἰχμαλωσίας
  english_pob_choice: from the captivity of those in Jerusalem
  chosen_spanish: a partir de la cautividad de los de Jerusalén
  alternatives_spanish:
  - a partir del cautiverio de los de Jerusalén
  - desde la captura de los de Jerusalén
  lexicon: LSJ
  rationale: «Αἰχμαλωσία» expresa cautividad/captura. «Cautividad» mantiene la amplitud del término y deja abierta la referencia al resultado esperado de esa captividad, tal como refleja la nota inglesa.
- source_word: κατορθώσασθαι
  english_pob_choice: to pay
  chosen_spanish: asumido
  alternatives_spanish:
  - pagar
  - realizar
  lexicon: LSJ
  rationale: En este contexto financiero, el verbo apunta a cumplir o hacer efectivo lo prometido. En español, la obligación ya queda expresada por «haber asumido el tributo», por lo que no conviene forzar un segundo verbo literal que suene duro o redundante.
- source_word: κατήγγελλεν
  english_pob_choice: kept proclaiming
  chosen_spanish: seguía proclamando
  alternatives_spanish:
  - continuaba proclamando
  - proclamaba repetidamente
  lexicon: BDAG
  rationale: El imperfecto indica acción continuada o repetida. «Seguía proclamando» conserva bien ese valor aspectual.
- source_word: ὑπέρμαχον ἔχειν
  english_pob_choice: had as their champion one who fought for them
  chosen_spanish: tenían como su campeón a uno que luchaba por ellos
  alternatives_spanish:
  - tenían como su defensor a uno que luchaba por ellos
  - tenían por campeón a uno que peleaba por ellos
  lexicon: LSJ
  rationale: «Ὑπέρμαχος» no es solo un protector pasivo, sino alguien que combate a favor de otro. «Campeón» funciona en español como equivalente natural y vigoroso, manteniendo la imagen de alguien que pelea por ellos.
- source_word: ἀτρώτους
  english_pob_choice: invulnerable
  chosen_spanish: invulnerables
  alternatives_spanish:
  - inexpugnables
  - inalcanzables
  lexicon: LSJ
  rationale: «Invulnerables» expresa con naturalidad la idea de no poder ser heridos o alcanzados en combate.
- source_word: διὰ τὸ ἀκολουθεῖν
  english_pob_choice: because they followed
  chosen_spanish: porque seguían
  alternatives_spanish:
  - porque obedecían
  - ya que seguían
  lexicon: BDAG
  rationale: La construcción causal con infinitivo se vierte bien con «porque seguían», que es natural y mantiene la causa del enunciado.
- source_word: τοῖς ἑαυτῶν προστεταγμένοις νόμοις
  english_pob_choice: the laws that had been commanded to them
  chosen_spanish: las leyes que les habían sido prescritas
  alternatives_spanish:
  - las leyes que les habían sido mandadas
  - sus leyes preceptuadas
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica leyes prescritas con autoridad. «Les habían sido prescritas» conserva la pasiva y la fuerza normativa sin sonar arcaico.
theological_decisions:
- issue: Identidad implícita del defensor en ὑπέρμαχον ἔχειν
  english_pob_reading: an implicit reference to God as the one fighting for the Jews
  chosen_spanish_reading: una referencia implícita a Dios como quien lucha por los judíos
  alternative_spanish_readings:
  - una protección divina implícita
  - un defensor celestial no especificado
  rationale: El griego no nombra explícitamente a Dios en la cláusula, pero el contexto sugiere una ayuda trascendente. La traducción principal conserva la indirecta al dejar «campeón» sin explicitarlo en el texto, mientras la nota permite la lectura implícita.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma indebida.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se prefirió «captivity» frente a «capture» para αἰχμαλωσίας, y «champion» frente a «defender» para ὑπέρμαχον. En español se refleja esa decisión con «cautividad» y «campeón», manteniendo el sentido de lucha activa y la ambigüedad teológica del sujeto implícito.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino en la superficie del versículo.
  - Se conserva «judíos» como etnónimo histórico del pasaje, sin suavizarlo.
  - «Leyes» se traduce con sentido normativo/prescriptivo, no como costumbre general.
  - La estructura del período intenta reflejar el encadenamiento causal del griego sin volverlo en exceso literal.
