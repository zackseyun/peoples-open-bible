  text: Toda la humanidad lo ha contemplado[a][b]; el hombre contempla desde lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda la humanidad lo ha contemplado a él»; el pronombre hebreo es masculino singular y podría entenderse de manera personal, aunque el contexto favorece una referencia a la obra o acción de Dios.'
