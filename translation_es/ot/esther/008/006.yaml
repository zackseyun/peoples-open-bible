translation:
  language: es
  text: Porque ¿cómo podría yo soportar ver la desgracia que vendrá sobre mi pueblo? ¿Y cómo podría yo soportar ver la destrucción de mis parientes?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la aniquilación de los de mi nacimiento» / «mi parentela». El hebreo מוֹלַדְתִּי puede referirse a los de su nacimiento o a sus parientes, no solo a un lugar de nacimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica anterior; en español, «Porque» conserva con naturalidad el valor causal del hebreo sin sonar forzado.
- source_word: אֵיכָכָה
  english_pob_choice: how
  chosen_spanish: ¿cómo podría yo... ?
  alternatives_spanish:
  - ¿cómo puedo... ?
  - ¿de qué modo podría yo... ?
  lexicon: HALOT
  rationale: La partícula expresa incredulidad y la pregunta retórica se vuelve natural en español con «¿cómo podría yo...?».
- source_word: אוּכַל
  english_pob_choice: could I bear
  chosen_spanish: podría yo
  alternatives_spanish:
  - podría soportar
  - sería capaz de
  lexicon: HALOT
  rationale: El inglés POB entiende la fuerza emocional como «could I bear». En español, el verbo modal «podría» conserva la capacidad/imposibilidad implícita; la idea de soportar queda sugerida por el contexto de ver una catástrofe.
- source_word: וְרָאִיתִי
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - mirar
  - presenciar
  lexicon: HALOT
  rationale: Después de una pregunta de capacidad, el infinitivo español «ver» reproduce bien el complemento idiomático del inglés POB y el hebreo, sin añadir paráfrasis.
- source_word: בָּרָעָה
  english_pob_choice: the disaster
  chosen_spanish: la desgracia
  alternatives_spanish:
  - la calamidad
  - el desastre
  lexicon: HALOT
  rationale: Aquí רָעָה no es mal moral, sino calamidad que sobrevendrá al pueblo. «Desgracia» comunica el daño inminente de forma natural y sobria en español.
- source_word: אֲשֶׁר יִמְצָא
  english_pob_choice: that will come upon
  chosen_spanish: que vendrá sobre
  alternatives_spanish:
  - que le sobrevendrá a
  - que alcanzará a
  lexicon: HALOT
  rationale: El hebreo usa el modismo de «encontrar» para un mal que sobreviene; «vendrá sobre» preserva la idea de aflicción que cae sobre el pueblo de manera idiomática en español.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi nación
  - mi gente
  lexicon: HALOT
  rationale: «Pueblo» es el equivalente más directo y natural para עַם con sufijo posesivo, y mantiene la identificación de Ester con su pueblo judío.
- source_word: בְּאָבְדַן
  english_pob_choice: the destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - el exterminio
  - la ruina
  lexicon: HALOT
  rationale: El sustantivo derivado de אבד denota destrucción/perdición. «La destrucción» sigue de cerca la semántica del texto fuente y del inglés POB.
- source_word: מוֹלַדְתִּי
  english_pob_choice: my kindred
  chosen_spanish: mi parentela
  alternatives_spanish:
  - mis parientes
  - mi familia de nacimiento
  lexicon: HALOT
  rationale: El hebreo puede referirse a los de su nacimiento o a sus parientes. «Parentela» conserva el campo semántico de parentesco/linaje sin reducirlo solo a familia inmediata ni a un lugar de origen.
translation_notes:
  revision_awareness: El texto español sigue el sentido y la puntuación del tramo interrogativo del hebreo y del inglés POB, conservando la repetición retórica de «¿cómo podría yo ver...?». No se detectaron revisiones aplicadas en el antecedente inglés; la versión permanece estable.
  spanish_consistency_notes:
  - Se mantiene «mi pueblo» para עַמִּי y «mi parentela» para מוֹלַדְתִּי, evitando mezclar los dos referentes.
  - Se usa lenguaje sobrio y no arcaizante, con una sola nota para preservar la ambigüedad lexical del término final.
  - La elección «desgracia» evita una lectura moralizante de רָעָה y encaja con el contexto de peligro nacional.
