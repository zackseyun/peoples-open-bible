id: ACT.15.1
reference: Acts 15:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καί τινες κατελθόντες ἀπὸ τῆς Ἰουδαίας ἐδίδασκον τοὺς ἀδελφοὺς ὅτι Ἐὰν μὴ ⸀περιτμηθῆτε τῷ ἔθει ⸀τῷ Μωϋσέως, οὐ δύνασθε σωθῆναι.
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/001.yaml
  text: And some men came down from Judea and were teaching the brothers[a], “Unless you are circumcised according to the custom of Moses, you cannot be saved.”
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'brothers' and likely refers to the believing community inclusively.
    reason: lexical_alternative
translation:
  language: ko
  text: 어떤 사람들이 유대로부터 내려와 형제들을 가르치며 「여러분이 모세의 관습을 따라 할례를 받지 않으면 구원을 얻을 수 없습니다」 하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: περιτμηθῆτε
  english_pob_choice: you are circumcised
  chosen_korean: 할례를 받지
  alternatives_korean:
  - 할례를 행하지
  lexicon: BDAG
  rationale: 수동태 부정과거 가정법. 한국어에서는 「할례를 받다」가 자연스러운 표현이다.
- source_word: σωθῆναι
  english_pob_choice: be saved
  chosen_korean: 구원을 얻을
  alternatives_korean:
  - 구원받을
  lexicon: BDAG
  rationale: 예루살렘 공의회 본문 맥락에서 σῴζω는 단순 구출이 아니라 종말론적 구원을 가리킨다.
theological_decisions:
- issue: 예루살렘 공의회 논쟁에서 σωθῆναι의 의미
  chosen_reading: 구원을 얻을
  alternative_readings:
  - 구출될
  rationale: 본문은 하나님 백성에 포함되는 조건과 할례가 구원에 필수적인지 여부를 다루므로 「구원」으로 옮겨 분쟁의 구원론적 무게를 보존한다.
  doctrine_reference: DOCTRINE.md §1, §3
