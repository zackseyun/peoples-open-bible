revisions:
- from: 'Por tanto, di a la casa de Israel: Así dice el Señor Yahvé: ¿Se están volviendo impuros[a] en el camino de sus padres, y prostituyéndose tras sus cosas detestables[b]?'
  to: 'Por tanto, di a la casa de Israel: Así dice el Señor Yahvé: ¿Se están contaminando[a] en el camino de sus padres, y prostituyéndose tras sus cosas abominables[b]?'
  rationale: Se ajusta נִטְמְאִים a una formulación principal más cercana a la decisión léxica del POB inglés y al contexto de agencia idolátrica; se pule la naturalidad de «cosas detestables» y se corrigen los problemas formales de la nota, manteniendo intacta la terminología doctrinal «Señor Yahvé».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:04:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: לָכֵן = «Por tanto», fórmula profética completa, «casa de Israel», «en el camino de sus padres», y la metáfora de זֹנִים con sentido de infidelidad idolátrica. Sin embargo, נִטְמְאִים en este contexto, según el propio rastro inglés, se inclinó a «defiling yourselves» como valor reflexivo activo con fuerza retórica; «se están volviendo impuros» es posible, pero atenúa la agencia presente del hebreo en contexto. También «cosas detestables» es comprensible, pero suena algo torpe en español bíblico; «cosas abominables» o «abominaciones» es más natural, aunque conviene conservar la amplitud léxica en nota.'
  spanish_quality_summary: 'El español es legible y digno, pero tiene detalles mejorables. «Se están volviendo impuros» suena algo pesado y menos directo que «se están contaminando» o «se hacen impuros». «Prostituyéndose tras sus cosas detestables» conserva la metáfora, pero la combinación resulta algo áspera; «prostituyéndose tras sus cosas abominables» mejora la fluidez sin perder fuerza. Además, la nota a contiene un error ortográfico/gramatical: «defilinándose» debe corregirse, y «haciendo impuros» necesita forma reflexiva o mejor formulación.'
  glossary_alignment: 'Alineado en lo principal con la terminología del proyecto: יְהוָה → «Yahvé», אֲדֹנָי → «Señor», «casa de Israel» preservada, y se mantiene la metáfora sexual de זנה. La única desviación relevante es que el inglés POB privilegió una lectura activa/reflexiva para נִטְמְאִים; conviene reflejarla mejor en el texto principal y dejar «volviéndose impuros» o «llegando a ser impuros» como alternativa si se desea.'
  issues:
  - severity: medium
    issue: נִטְמְאִים está demasiado suavizado como «se están volviendo impuros».
    rationale: Aunque el hebreo permite matiz estativo/resultativo, el expediente inglés escogió como principal «Are you defiling yourselves» por la agencia reflexiva contextual. En español, «se están contaminando» preserva mejor esa fuerza.
  - severity: low
    issue: «cosas detestables» es menos natural en español que alternativas cercanas.
    rationale: No es incorrecto, pero suena algo calcado. «Cosas abominables» mantiene amplitud semántica y suena más idiomático; la nota puede seguir mencionando «abominaciones» e «ídolos».
  - severity: medium
    issue: La nota [a] contiene errores de forma.
    rationale: «defilinándose» es erróneo; además, «haciendo impuros» no expresa bien el reflexivo. Debe corregirse a «contaminándose» o «haciéndose impuros».
  revised_spanish_text: 'Por tanto, di a la casa de Israel: Así dice el Señor Yahvé: ¿Se están contaminando[a] en el camino de sus padres, y prostituyéndose tras sus cosas abominables[b]?'
  revised_footnotes:
  - marker: a
    text: 'O: «¿Se están volviendo impuros en el camino de sus padres?». El verbo hebreo también puede entenderse con sentido más activo/reflexivo: «¿se están contaminando?» o «¿se hacen impuros?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus abominaciones»; en contexto, también puede referirse a «sus ídolos».'
    reason: lexical_alternative
  revision_rationale: Se ajusta נִטְמְאִים a una formulación principal más cercana a la decisión léxica del POB inglés y al contexto de agencia idolátrica; se pule la naturalidad de «cosas detestables» y se corrigen los problemas formales de la nota, manteniendo intacta la terminología doctrinal «Señor Yahvé».
