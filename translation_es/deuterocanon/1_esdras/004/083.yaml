translation:
  language: es
  text: Y tomó las cartas, y partió hacia Babilonia, y comunicó[a] a todos sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «informó a todos sus hermanos»; el griego no expresa de manera explícita el contenido de «comunicó», sino que lo deja implícito por el contexto inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  lexicon: BDAG
  rationale: Aoristo de λαμβάνω en narrativa; en español, «tomó» mantiene la secuencia de acciones sin añadir matiz que el griego no explicita.
- source_word: τὰς ἐπιστολάς
  english_pob_choice: the letters
  chosen_spanish: las cartas
  alternatives_spanish:
  - las cartas escritas
  - los documentos
  - los mensajes escritos
  lexicon: BDAG
  rationale: ἐπιστολή designa una carta o escrito enviado. «Cartas» es la equivalencia más natural y directa en español para comunicación escrita oficial o personal.
- source_word: ἐξῆλθεν εἰς Βαβυλῶνα
  english_pob_choice: went out to Babylon
  chosen_spanish: salió a Babilonia
  alternatives_spanish:
  - partió para Babilonia
  - fue a Babilonia
  lexicon: BDAG
  rationale: Se preserva el valor verbal de ἐξῆλθεν con «salió». En español, «salió a Babilonia» suena más natural que una calca literal, sin perder el movimiento de salida hacia el destino.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: se lo informó
  alternatives_spanish:
  - lo anunció
  - lo reportó
  - dio aviso
  lexicon: BDAG
  rationale: ἀπαγγέλλω significa informar, anunciar o dar parte. Como el griego no expresa objeto directo, «se lo informó» comunica el contenido implícito de forma idiomática en español y mantiene la referencia al mensaje previo.
- source_word: τοῖς ἀδελφοῖς αὐτοῦ πᾶσιν
  english_pob_choice: to all his brothers
  chosen_spanish: a todos sus hermanos
  alternatives_spanish:
  - a todos sus hermanos de sangre
  - a todos sus parientes
  - a todos sus compatriotas
  lexicon: BDAG
  rationale: ἀδελφοί se traduce de manera literal como «hermanos». En este contexto puede abarcar a sus correligionarios o parientes, pero el español conserva mejor la correspondencia directa con el griego mediante «hermanos».
translation_notes:
  revision_awareness: 'El texto griego coincide estrechamente con la auditoría inglesa: se mantuvo la secuencia narrativa simple («tomó... salió... informó»), se evitó añadir un objeto explícito que el griego no da, y se prefirió una solución española natural para ἐξῆλθεν εἰς Βαβυλῶνα sin perder el sentido de «salió».'
  spanish_consistency_notes:
  - Se usó «Babilonia» como topónimo estándar en español.
  - Se evitó «SEÑOR» u այլ terminología teológica porque el versículo no contiene vocabulario divino.
  - El pronombre enclítico en «se lo informó» refleja el objeto implícito de la acción y la relación con el contenido anterior, en línea con la nota textual del inglés.
