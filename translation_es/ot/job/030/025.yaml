translation:
  language: es
  text: ¿No lloré por aquel cuyo día era duro[a]? ¿No se afligió mi alma por el pobre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por uno en un día de dificultad» / «por el que estaba en aflicción». El hebreo dice literalmente «el duro/severo de día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: Did I not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No fue que ...?
  lexicon: HALOT
  rationale: En esta pregunta retórica, el hebreo introduce una afirmación apelativa más que una condición. El español natural y fiel es una interrogación con '¿No ...?', que conserva el valor de autojustificación de Job.
- source_word: בָכִיתִי
  english_pob_choice: weep
  chosen_spanish: lloré
  alternatives_spanish:
  - lloraba
  - laménté
  lexicon: HALOT
  rationale: '''Lloré'' reproduce el sentido de llorar/llanto con un registro natural en español y mantiene la fuerza emotiva del verbo hebreo.'
- source_word: לִקְשֵׁה יוֹם
  english_pob_choice: for the one whose day was hard
  chosen_spanish: por el que tenía un día duro
  alternatives_spanish:
  - por el que tenía un día de dificultad
  - por uno en día de aflicción
  - por el que estaba en trouble
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente ''el duro de día''. En español, ''tenía un día duro'' conserva la imagen del ''día duro'' sin volverse artificial, y el relativo ''el que'' mantiene el referente humano representativo.'
- source_word: עָגְמָה
  english_pob_choice: was grieved
  chosen_spanish: se afligía
  alternatives_spanish:
  - se entristecía
  - estaba afligida
  - se dolía
  lexicon: HALOT
  rationale: El verbo expresa dolor, pena o aflicción. 'Se afligía' funciona bien en paralelo con 'lloré' y preserva el tono poético sin reducirlo a mera tristeza.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi interior
  - mi vida
  lexicon: HALOT
  rationale: '''Mi alma'' conserva la expresión hebrea de la persona interior y respeta el registro poético. No se neutraliza a ''yo'' porque el texto mantiene la imagen antropológica.'
- source_word: לָאֶבְיוֹן
  english_pob_choice: for the poor
  chosen_spanish: por el pobre
  alternatives_spanish:
  - por el necesitado
  - por el desvalido
  - por el indigente
  lexicon: HALOT
  rationale: '''El pobre'' es la forma más directa y natural para אֶבְיוֹן en singular representativo. Mantiene la concisión del hebreo y la legibilidad en español.'
theological_decisions:
- issue: Uso de 'alma' para נַפְשִׁי
  english_pob_reading: Rendered as 'my soul' as a poetic expression for Job's inner self, without implying a technical doctrine of the soul.
  chosen_spanish_reading: '''mi alma'' como expresión poética del yo interior de Job, sin cargarla con una definición doctrinal técnica.'
  alternative_spanish_readings:
  - '''yo'''
  - '''mi interior'''
  - '''mi vida'''
  rationale: El contexto es poético y de autoafirmación. 'Mi alma' preserva la textura hebrea y evita desdibujar la metáfora personal, sin convertirla en una tesis antropológica.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo el marcador [a] en el texto principal exactamente donde corresponde, junto a 'el pobre'. El resto de la redacción mantiene la lectura acordada del auditoria inglesa y la metáfora hebrea del 'día duro'.
  spanish_consistency_notes:
  - Se preserva la pregunta retórica con '¿No ...?' para reflejar אִם לֹא.
  - '''Lloré'' y ''se afligía'' conservan el paralelismo emocional del verso.'
  - '''Mi alma'' mantiene el registro poético y antropológico sin explicitar una doctrina ajena al contexto.'
  - La nota al pie usa una alternativa de lectura legítima sin desplazar la traducción principal.
