translation:
  language: es
  text: Y a lo largo del límite de Dan, desde el lado oriental hasta el lado occidental[a], Aser, una porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el lado del mar». Aquí «mar» funciona como término direccional que indica el oeste.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And along
  chosen_spanish: Y junto al
  alternatives_spanish:
  - Y al
  - Y a lo largo de
  lexicon: HALOT
  rationale: La combinación de conjunción y preposición introduce la siguiente franja territorial; «junto al» comunica proximidad al límite sin sonar forzado en español.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: En un reparto de tierras, גְּבוּל designa la línea o demarcación territorial; «límite» es natural y preciso en español.
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  lexicon: N/A (nombre propio)
  rationale: Nombre propio de la tribu, conservado por transliteración.
- source_word: מִפְּאַת קָדִים
  english_pob_choice: from the eastern side
  chosen_spanish: desde el lado oriental
  alternatives_spanish:
  - desde el lado del este
  - desde el extremo oriental
  lexicon: HALOT
  rationale: פֵּאָה expresa lado/extremo; קָדִים indica oriente. «Lado oriental» conserva el valor direccional y suena natural en español.
- source_word: עַד פְּאַת יָמָּה
  english_pob_choice: to the western side
  chosen_spanish: hasta el lado del mar
  alternatives_spanish:
  - hasta el lado occidental
  - hasta el lado del mar
  lexicon: HALOT
  rationale: La lectura más literal es «lado del mar», que en este contexto funciona direccionalmente como oeste. Mantener «mar» deja visible la base léxica hebrea y respeta la nota auditada del inglés POB.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Asher
  alternatives_spanish:
  - Aser
  lexicon: N/A (nombre propio)
  rationale: Se conserva la forma del nombre tribal según la transliteración habitual en el proyecto.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una
  - una sola porción
  lexicon: HALOT
  rationale: Aquí el numeral funciona elípticamente para la porción/asignación tribal; «una porción» explicita el sentido sin ampliar más allá del contexto de reparto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español junto a la frase correspondiente.
  spanish_consistency_notes:
  - 'Se mantuvo el orden procesional del hebreo: conjunción + relación espacial + tribu + límites direccionales + tribu + cantidad elíptica.'
  - Se evitó sustituir «mar» por «occidental» en el texto principal para preservar la tensión léxica auditada por el POB inglés; la aclaración queda en nota.
  - «Porción» se añadió por exigencia contextual del reparto tribal en el capítulo, en línea con la decisión inglesa auditada.
