translation:
  language: es
  text: Y si la tierra es fértil o pobre, si hay árboles[a] en ella o no; sed fuertes y tomad del fruto de la tierra. Y aquellos días eran los días de las primeras uvas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «si hay madera en ella o no»; el hebreo puede significar «árbol» o «madera».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los días eran los días de las primeras uvas», es decir, el comienzo de la temporada de la cosecha de uvas.
    reason: cultural_note
lexical_decisions:
- source_word: הָאָרֶץ הַשְּׁמֵנָה ... רָזָה
  english_pob_choice: fertile or lean
  chosen_spanish: fértil o estéril
  alternatives_spanish:
  - fértil o delgada
  - rica o pobre
  lexicon: HALOT
  rationale: Para la tierra, el hebreo usa una oposición de productividad agrícola; 'fértil' comunica היטב שְׁמֵנָה, y 'estéril' expresa con naturalidad la idea de רָזָה como tierra improductiva. Evita el calco 'gorda/delgada' y conserva el contraste semántico.
- source_word: הֲיֵשׁ בָּהּ עֵץ אִם אַיִן
  english_pob_choice: whether there are trees in it or not
  chosen_spanish: si hay en ella árbol o no
  alternatives_spanish:
  - si hay en ella árboles o no
  - si tiene árbol o no
  - si hay madera en ella o no
  lexicon: HALOT
  rationale: עֵץ puede significar 'árbol' o 'madera'. En el contexto de reconocimiento de la tierra, 'árbol' es la lectura primaria y más natural en español. Se conserva la posible ambigüedad de recurso maderable sin fijarla en el texto principal.
- source_word: וְהִתְחַזַּקְתֶּם
  english_pob_choice: be strong
  chosen_spanish: cobraos ánimo
  alternatives_spanish:
  - fortaleceos
  - sed fuertes
  - tened ánimo
  lexicon: HALOT
  rationale: El verbo en hitpael tiene un matiz de fortalecerse para la tarea. 'Cobraos ánimo' transmite esa exhortación activa en español y evita la dureza de un calco demasiado literal, a la vez que mantiene la fuerza del mandato.
- source_word: וּלְקַחְתֶּם מִפְּרִי הָאָרֶץ
  english_pob_choice: take some of the fruit of the land
  chosen_spanish: tomad del fruto de la tierra
  alternatives_spanish:
  - tomad algo del fruto de la tierra
  - tomad parte del fruto de la tierra
  - tomad de los frutos de la tierra
  lexicon: HALOT
  rationale: El prefijo מִן permite 'de' sin explicitar 'some' en español; el contexto ya implica una muestra. 'Fruto de la tierra' mantiene la formulación bíblica y el carácter concreto de la instrucción.
- source_word: וְהַיָּמִים יְמֵי בִּכּוּרֵי עֲנָבִים
  english_pob_choice: Now the days were the days of the first-ripe grapes
  chosen_spanish: Y los días eran los días de las primicias de las uvas
  alternatives_spanish:
  - Y aquellos días eran los días de las uvas tempranas
  - Y el tiempo era el de las primeras uvas
  - Y eran los días de la cosecha temprana de las uvas
  lexicon: HALOT
  rationale: בִּכּוּרִים puede referirse a primicias/primer fruto. En este contexto temporal, 'primicias de las uvas' conserva el giro hebreo y la nota estacional, sin forzar una lectura cultual en el texto principal.
translation_notes:
  revision_awareness: 'La redacción sigue el patrón del texto inglés auditado, pero corrige el orden para reflejar mejor la sintaxis hebrea: pregunta condicional sobre la tierra, luego la presencia de árbol, exhortación a fortalecerse y tomar fruto, y finalmente la nota temporal sobre las uvas. Se conserva la tensión lexical de עֵץ con una nota alternativa implícita en la decisión léxica.'
  spanish_consistency_notes:
  - Se usa 'tierra' para אֶרֶץ en consonancia con el resto del proyecto.
  - '''Fruto de la tierra'' mantiene la terminología bíblica sin sobreexplicar la finalidad del muestreo.'
  - '''Primicias de las uvas'' conserva el hebraísmo temporal y deja abierta la referencia estacional sin añadir más interpretación en el cuerpo del texto.'
