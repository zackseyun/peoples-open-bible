lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  english_pob_choice: And for the tribe of
  chosen_spanish: Y para la tribu de
  alternatives_spanish:
  - Y para el bastón de
  - Y para la vara de
  lexicon: HALOT
  rationale: En este contexto administrativo de repartición tribal, מַטֵּה no debe entenderse literalmente como un objeto (bastón/vara), sino como la unidad tribal. En español, 'tribu de' reproduce bien el valor idiomático del hebreo y mantiene la naturalidad de la frase.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos
  - los descendientes de
  lexicon: HALOT
  rationale: La fórmula tribal hebrea preserva la expresión filial. 'Los hijos de' es fiel y plenamente comprensible en español, sin perder la estructura del hebreo.
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simeón
  lexicon: Transliteración tradicional del nombre hebreo
  rationale: Se usa la forma establecida en español bíblico para el nombre tribal/persona, que es clara y reconocible para lectores hispanohablantes.
- source_word: שְׁמוּאֵל
  english_pob_choice: Shemuel
  chosen_spanish: Shemuel
  alternatives_spanish:
  - Samuel
  lexicon: Transliteración del nombre propio
  rationale: Se conserva la transliteración más cercana al hebreo de este versículo. 'Samuel' es la forma tradicional, pero aquí se mantiene la correspondencia con la grafía מקור/hebrea documentada en el texto fuente.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una lista genealógica, 'hijo de' es la equivalencia directa y más natural en español, conservando el patrón del hebreo.
- source_word: עַמִּיהוּד
  english_pob_choice: Ammihud
  chosen_spanish: Ammihud
  alternatives_spanish:
  - Ammihud
  lexicon: Transliteración del nombre propio
  rationale: Se mantiene la transliteración del nombre propio según el registro fuente y el audit trail inglés.
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del control cruzado: no se requieren cambios respecto al trazado auditado en inglés; la principal decisión es conservar la transliteración hebrea de Shemuel y adecuar la sintaxis a un español natural.'
  spanish_consistency_notes:
  - Se mantiene «Shemuel» como transliteración del hebreo, en línea con el criterio auditado.
  - Se usa «Simeón» como forma española tradicional del nombre tribal.
  - La construcción «Y para la tribu de los hijos de» conserva la fórmula administrativa del texto fuente sin sonar forzada en español.
