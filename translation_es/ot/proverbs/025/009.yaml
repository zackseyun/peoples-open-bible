translation:
  language: es
  text: Defiende tu caso con tu vecino[a], y no reveles el secreto de otro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vecino» traduce aquí רֵעַ; también puede significar «prójimo», «amigo» o «compañero» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el secreto de otro», es decir, información confidencial que pertenece a otra persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִיבְךָ
  english_pob_choice: your case
  chosen_spanish: tu caso
  alternatives_spanish:
  - tu disputa
  - tu pleito
  - tu querella
  lexicon: HALOT
  rationale: רִיב puede referirse al conflicto mismo o al asunto litigioso. En español, «caso» conserva la idea de un asunto concreto que debe tratarse sin cargar innecesariamente el texto con lenguaje judicial técnico.
- source_word: רִיב
  english_pob_choice: argue
  chosen_spanish: discute
  alternatives_spanish:
  - argumenta
  - pleitea
  - contiende
  lexicon: HALOT
  rationale: El imperativo de ריב pide tomar y tratar el asunto en disputa. «Discute» suena natural en español moderno y mantiene la idea de enfrentar el problema de manera directa, sin volverlo más forense que el hebreo.
- source_word: אֶת רֵעֶךָ
  english_pob_choice: with your neighbor
  chosen_spanish: con tu prójimo
  alternatives_spanish:
  - con tu vecino
  - con tu amigo
  - con tu compañero
  lexicon: HALOT
  rationale: רֵעַ abarca vecino, compañero o amigo. «Prójimo» es amplio, bíblicamente reconocible y adecuado para un lector eclesial; «con» conserva la relación directa que exige el proverbio.
- source_word: וְסוֹד
  english_pob_choice: and ... secret
  chosen_spanish: y el secreto
  alternatives_spanish:
  - y el asunto confidencial
  - y el consejo
  - y la confidencia
  lexicon: HALOT
  rationale: סוֹד puede significar secreto, confidencia o consejo íntimo. Aquí la prohibición de divulgar favorece «secreto», que expresa con claridad la confidencialidad protegida.
- source_word: אַחֵר
  english_pob_choice: another person's
  chosen_spanish: de otro
  alternatives_spanish:
  - de otra persona
  - ajeno
  - de alguien más
  lexicon: HALOT
  rationale: אַחֵר modifica el secreto como perteneciente a otra persona. «De otro» mantiene brevedad y fidelidad, y el contexto deja claro que no se trata del propio secreto.
- source_word: אַל תְּגָל
  english_pob_choice: do not reveal
  chosen_spanish: no reveles
  alternatives_spanish:
  - no descubras
  - no divulges
  - no destapes
  lexicon: HALOT
  rationale: גלה en esta prohibición significa descubrir o divulgar lo oculto. «Reveles» es idiomático en español y conserva la fuerza del mandato negativo.
- source_word: implicit directness in רִיב ... אֶת רֵעֶךָ
  english_pob_choice: your neighbor himself
  chosen_spanish: con tu prójimo
  alternatives_spanish:
  - directamente con tu prójimo
  - solo con tu prójimo
  - cara a cara con tu prójimo
  lexicon: HALOT
  rationale: El inglés POB subrayó la idea de tratar el asunto directamente; en español esa implicatura se logra de forma natural con «con tu prójimo» sin añadir una palabra equivalente a «himself» que sonaría artificial.
translation_notes:
  revision_awareness: 'El texto sigue el sentido confirmado por el audit trail inglés: tratar el asunto directamente con la persona involucrada y no divulgar información confidencial ajena. No se requirieron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «pleito» para no forzar un matiz jurídico más fuerte que el sustentado por רִיב en este proverbio.
  - «Prójimo» se eligió por claridad eclesial y amplitud semántica, aunque «vecino» sigue siendo una alternativa válida en nota.
