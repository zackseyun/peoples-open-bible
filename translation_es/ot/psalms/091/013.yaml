translation:
  language: es
  text: Pisarás al león y a la cobra[a][b]; hollarás al león joven y a la serpiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘dragón’ para el término final; en otros contextos el hebreo puede designar un gran reptil o una criatura marina, pero aquí ‘serpiente’ encaja mejor con la lista de depredadores terrestres.
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente ‘áspid’ para ‘cobra’.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre ellos
  lexicon: HALOT
  rationale: La preposición introduce aquello que será pisado; en español, con el verbo 'pisar', 'sobre' mantiene la relación espacial y el registro poético sin sonar forzado.
- source_word: שַׁחַל
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - león feroz
  lexicon: HALOT
  rationale: Es un término poético para 'león'. 'León' expresa el sentido básico con naturalidad en español; la matización de fiereza queda sugerida por el paralelismo del versículo.
- source_word: פֶתֶן
  english_pob_choice: cobra
  chosen_spanish: cobra
  alternatives_spanish:
  - áspid
  - serpiente venenosa
  lexicon: HALOT
  rationale: El valor semántico es el de una serpiente venenosa. 'Cobra' conserva la imagen concreta y es inteligible para lectores actuales; se mantiene la alternativa tradicional en nota.
- source_word: תִּדְרֹךְ
  english_pob_choice: you will tread
  chosen_spanish: pisarás
  alternatives_spanish:
  - pisarás sobre
  - hollarás
  lexicon: HALOT
  rationale: El verbo denota poner el pie sobre algo. 'Pisarás' es el equivalente más natural en español; la forma verbal futura conserva el tono de promesa del hebreo.
- source_word: תִּרְמֹס
  english_pob_choice: you will trample
  chosen_spanish: hollarás
  alternatives_spanish:
  - aplastarás
  - pisotearás
  lexicon: HALOT
  rationale: Este verbo intensifica la acción anterior. 'Hollarás' mantiene un registro elevado y comunica mejor la fuerza de 'trample' que un simple repetido 'pisarás'.
- source_word: כְּפִיר
  english_pob_choice: young lion
  chosen_spanish: leoncillo
  alternatives_spanish:
  - león joven
  lexicon: HALOT
  rationale: '''כְּפִיר'' designa con frecuencia un león joven y vigoroso. ''Leoncillo'' comunica la edad relativa, aunque en español suena algo más afectivo; se ofrece ''león joven'' como alternativa más literal.'
- source_word: תַנִּין
  english_pob_choice: serpent
  chosen_spanish: serpiente
  alternatives_spanish:
  - dragón
  - monstruo marino
  lexicon: HALOT
  rationale: En este paralelismo con león, cobra y leoncillo, el término encaja mejor como una gran serpiente terrestre que como criatura mítica o marina. 'Serpiente' evita importar una imaginería no exigida por el contexto inmediato.
theological_decisions:
- issue: 'Valor de תַנִּין: lectura zoológica frente a tradicional ''dragón'''
  english_pob_reading: serpent
  chosen_spanish_reading: serpiente
  alternative_spanish_readings:
  - dragón
  rationale: El verso enumera depredadores peligrosos sometidos por la persona protegida. En ese contexto, 'serpiente' refleja mejor la serie de animales que 'dragón', aunque se conserva la alternativa tradicional como posibilidad histórica.
  doctrine_reference: Primacía del contexto léxico inmediato y de la evidencia del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Sin cambios respecto al último pase de revisión: el consenso de auditoría sigue siendo alto y no se identificaron ajustes necesarios.'
  spanish_consistency_notes:
  - Se mantuvo la segunda persona singular futura para reflejar el hebreo (tide/ tramos).
  - Se preservó la progresión verbal 'pisarás / hollarás' para diferenciar los dos verbos hebreos y no aplanar la intensificación poética.
  - Se usó vocabulario bíblico claro pero no arcaizante en exceso; 'leoncillo' equilibra precisión y legibilidad.
  - Las notas preservan la tensión entre la lectura zoológica principal y la alternativa tradicional 'dragón'.
