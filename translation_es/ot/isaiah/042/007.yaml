translation:
  language: es
  text: para abrir ojos ciegos[a], para sacar del encierro[b] a un preso, de la casa de prisión a los que habitan en tinieblas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los ojos de los ciegos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «del calabozo» o «de la cárcel»; el hebreo puede referirse al encierro o al lugar de restricción.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los que moran en tinieblas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְקֹחַ
  english_pob_choice: to open
  chosen_spanish: abrir
  alternatives_spanish:
  - desocupar
  - despegar
  lexicon: HALOT
  rationale: El infinitivo de propósito se rinde naturalmente con 'para abrir'. Conserva la imagen directa de abrir los ojos, sin añadir interpretación.
- source_word: עֵינַיִם עִוְרוֹת
  english_pob_choice: blind eyes
  chosen_spanish: ojos ciegos
  alternatives_spanish:
  - los ojos del ciego
  - ojos de ciego
  lexicon: HALOT
  rationale: El hebreo califica directamente a 'ojos'; 'ojos ciegos' preserva esa relación más de cerca que una perífrasis con 'el ciego'.
- source_word: לְהוֹצִיא
  english_pob_choice: to bring out
  chosen_spanish: sacar
  alternatives_spanish:
  - hacer salir
  - conducir afuera
  lexicon: HALOT
  rationale: '''Sacar'' comunica bien el valor causativo de ''hacer salir'' y es idiomático en español contemporáneo.'
- source_word: מִמַּסְגֵּר
  english_pob_choice: from confinement
  chosen_spanish: de la confinación
  alternatives_spanish:
  - del encierro
  - de la prisión
  - del cautiverio
  lexicon: HALOT
  rationale: Se conserva el sentido amplio de restricción/confinamiento que documenta el análisis inglés, sin reducirlo de entrada a una arquitectura específica. 'Confinación' es menos usual, pero mantiene la abstracción del hebreo; se añade 'preso' para naturalidad contextual.
- source_word: אַסִּיר
  english_pob_choice: a prisoner
  chosen_spanish: un preso
  alternatives_spanish:
  - un prisionero
  - un cautivo
  lexicon: HALOT
  rationale: '''Preso'' expresa bien la condición de alguien retenido. ''Prisionero'' también sería posible, pero ''preso'' fluye mejor con ''sacar de la confinación''.'
- source_word: מִבֵּית כֶּלֶא
  english_pob_choice: from the prison house
  chosen_spanish: de la casa de prisión
  alternatives_spanish:
  - de la casa de encierro
  - del calabozo
  - de la cárcel
  lexicon: HALOT
  rationale: La expresión conserva la metáfora hebrea de 'casa' + 'prisión'. Se evita simplificarla a 'cárcel' para no borrar la imagen poética.
- source_word: יֹשְׁבֵי חֹשֶׁךְ
  english_pob_choice: those who sit in darkness
  chosen_spanish: los que habitan en tinieblas
  alternatives_spanish:
  - los que están sentados en tinieblas
  - los que viven en tinieblas
  lexicon: HALOT
  rationale: En español, 'habitan en tinieblas' comunica bien el valor durativo/poético de יֹשְׁבֵי sin sonar forzado. 'Tinieblas' preserva el registro bíblico y la imagen de oscuridad.
theological_decisions:
- issue: Alcance literal y metafórico de ceguera, confinamiento y tinieblas
  english_pob_reading: Retain the concrete imagery ('blind eyes,' 'prisoner,' 'darkness') without explicating spiritual meaning in the main text.
  chosen_spanish_reading: Conservar la imaginería concreta de ojos ciegos, preso, confinación y tinieblas, sin explicitar en el texto principal una lectura exclusivamente espiritual.
  alternative_spanish_readings:
  - Interpretar de manera explícita la ceguera como ignorancia espiritual
  - Interpretar la prisión como esclavitud espiritual
  rationale: Isaías 42 presenta la misión del siervo con imágenes concretas que pueden resonar literal y metafóricamente. El español mantiene esa tensión sin resolverla, siguiendo el testimonio del hebreo y del audit trail inglés.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto hebreo y el audit trail inglés; no hubo revisiones sustantivas en el último pase, por lo que se conserva la decisión de mantener la imaginería concreta sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'tinieblas' para conservar el tono bíblico y la correspondencia con חֹשֶׁךְ.
  - Se usa 'preso' en lugar de 'prisionero' por fluidez con 'sacar de la confinación', sin cambiar el sentido.
  - '''Confinación'' se emplea para reflejar el alcance amplio de מַסְגֵּר sin fijarlo prematuramente a una sola imagen edilicia.'
