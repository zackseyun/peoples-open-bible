translation:
  language: es
  text: De Zabulón, cincuenta mil hombres aptos para el servicio militar, preparados para la batalla con toda clase de armas de guerra, para ayudar[a] sin corazón dividido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para unirse a las filas» / «para apoyar»; el verbo hebreo es poco común aquí, y el sentido es que vinieron en apoyo unido a David.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «sin corazón y corazón», un modismo hebreo que significa sin lealtad dividida o sin doble ánimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְּבֻלוּן
  english_pob_choice: From Zebulun
  chosen_spanish: De Zabulón
  alternatives_spanish:
  - Desde Zabulón
  - Procedentes de Zabulón
  lexicon: HALOT
  rationale: El prefijo מִ indica procedencia/origen. En español, «De Zabulón» comunica de manera natural que el contingente proviene de esa tribu/región.
- source_word: יוֹצְאֵי צָבָא
  english_pob_choice: men fit for military service
  chosen_spanish: hombres aptos para el servicio militar
  alternatives_spanish:
  - hombres que salían para el ejército
  - hombres capaces de ir a la guerra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se refiere a los aptos o disponibles para el servicio militar. «Aptos para el servicio militar» conserva ese sentido sin volverlo artificiosamente técnico.
- source_word: עֹרְכֵי מִלְחָמָה
  english_pob_choice: prepared for battle
  chosen_spanish: preparados para la batalla
  alternatives_spanish:
  - formados para la batalla
  - ordenados para la guerra
  lexicon: HALOT
  rationale: El participio de ערך con מלחמה apunta a la disposición/puesta en orden para el combate. «Preparados para la batalla» es claro y fiel al valor militar del giro.
- source_word: בְּכָל כְּלֵי מִלְחָמָה
  english_pob_choice: with every kind of weapon of war
  chosen_spanish: con toda clase de armas de guerra
  alternatives_spanish:
  - con todas las armas de guerra
  - con cada tipo de arma de guerra
  lexicon: HALOT
  rationale: כְלֵי מִלְחָמָה denota armamento o equipo militar. «Toda clase de armas de guerra» transmite la amplitud de בְּכָל y mantiene el registro bélico.
- source_word: חֲמִשִּׁים אָלֶף
  english_pob_choice: fifty thousand
  chosen_spanish: cincuenta mil
  alternatives_spanish:
  - cincuenta millares
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad. «Cincuenta mil» es la forma natural en español.
- source_word: וְלַעֲדֹר
  english_pob_choice: to help
  chosen_spanish: para ayudar
  alternatives_spanish:
  - para unirse
  - para apoyar
  - para alistarse
  lexicon: HALOT
  rationale: El verbo es poco frecuente y su sentido exacto aquí es discutido; el POB inglés lo entendió funcionalmente como ayuda/apoyo unido a David. «Para ayudar» conserva esa lectura sin exagerar la precisión léxica.
- source_word: בְּלֹא לֵב וָלֵב
  english_pob_choice: without a divided heart
  chosen_spanish: sin doble corazón
  alternatives_spanish:
  - sin corazón dividido
  - sin doble ánimo
  - sin duplicidad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sin corazón y corazón», un modismo de lealtad no dividida. «Sin doble corazón» mantiene la imagen del corazón y la tensión idiomática mejor que una mera paráfrasis.
theological_decisions:
- issue: Idiom of divided loyalty in the final phrase
  english_pob_reading: without a divided heart
  chosen_spanish_reading: sin doble corazón
  alternative_spanish_readings:
  - sin corazón dividido
  - sin doble ánimo
  - sin duplicidad
  rationale: La frase hebrea es un modismo que expresa lealtad indivisa. Se preserva la metáfora del corazón para no perder la fuerza semítica, aunque el español requiere aclaración idiomática.
  doctrine_reference: Lealtad indivisa / fidelidad del corazón en el servicio a Yahvé y al rey ungido
translation_notes:
  revision_awareness: 'Se siguió el dictamen de alta concordancia del expediente inglés: no hubo revisiones aplicadas y el texto quedó estable. La redacción española conserva los dos puntos de tensión documentados: la procedencia tribal y el modismo final de lealtad no dividida.'
  spanish_consistency_notes:
  - Se usa «Zabulón» como forma española del nombre tribal.
  - Se mantiene «Yahvé» en otros contextos del proyecto; este versículo no lo contiene.
  - Se prefirió «servicio militar» y «armas de guerra» para conservar el registro bélico sin arcaísmos.
  - «Doble corazón» se eligió por su transparencia idiomática en español y por mantener la imagen hebrea.
