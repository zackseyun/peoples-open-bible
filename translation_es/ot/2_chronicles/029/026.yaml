translation:
  language: es
  text: Entonces los levitas tomaron su puesto con los instrumentos de David[a], y los sacerdotes con las trompetas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea puede significar instrumentos pertenecientes a David, mandados por él o asociados con él.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las trompetas cultuales usadas por los sacerdotes; en otros contextos se especifican como de plata, pero aquí ese detalle no aparece.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  english_pob_choice: Then ... stood
  chosen_spanish: se pusieron
  alternatives_spanish:
  - se mantuvieron
  - tomaron su lugar
  lexicon: HALOT
  rationale: El hebreo waw-consecutivo avanza la narración; en español, «se pusieron» comunica con naturalidad la acción de colocarse/estar de pie para el servicio, sin perder el valor de עמד de tomar posición.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Es el equivalente normal y claro en español para el grupo cultual/tribal definido por el artículo.
- source_word: בִּכְלֵי דָוִיד
  english_pob_choice: with the instruments of David
  chosen_spanish: con los instrumentos de David
  alternatives_spanish:
  - con los instrumentos de David[a]
  - con los instrumentos de David
  lexicon: HALOT
  rationale: כְּלִי es semánticamente amplio, pero aquí el contexto cultual-musical exige «instrumentos». «De David» conserva la relación genitiva sin decidir en español si son instrumentos pertenecientes, instituidos o asociados con David.
- source_word: וְהַכֹּהֲנִים
  english_pob_choice: and the priests
  chosen_spanish: y los sacerdotes
  alternatives_spanish:
  - y los presbíteros
  lexicon: HALOT
  rationale: «Sacerdotes» es la equivalencia directa y cultualmente apropiada para כֹּהֲנִים; no se requiere un término alternativo en español.
- source_word: בַּחֲצֹצְרוֹת
  english_pob_choice: with the trumpets
  chosen_spanish: con las trompetas
  alternatives_spanish:
  - con las trompetas de plata
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת designa las trompetas litúrgicas. Se evita añadir «de plata» en el texto principal porque el hebreo de este versículo no lo expresa explícitamente.
theological_decisions:
- issue: Naturaleza de los instrumentos de David
  english_pob_reading: The Hebrew phrase may mean instruments belonging to, commissioned by, or associated with David.
  chosen_spanish_reading: La frase puede significar instrumentos de David, es decir, pertenecientes a él, instituidos por él o asociados con él.
  alternative_spanish_readings:
  - instrumentos que David mandó hacer
  - instrumentos asociados con David
  rationale: El texto hebreo mantiene una relación abierta entre David y los instrumentos; la traducción principal conserva esa ambigüedad sin resolverla artificialmente. La nota explica el rango semántico sin sobreinterpretar.
  doctrine_reference: Principio de fidelidad léxica y de preservación de ambigüedades textuales
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios y el cotejo cruzado marcó alta concordancia; por eso se mantiene la solución breve y directa, sin expandir el texto más allá de lo que el hebreo expresa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el hebreo lo exija explícitamente; aquí no aparece el Nombre divino.
  - «Levitas», «sacerdotes» e «instrumentos» siguen el vocabulario cultual estándar del proyecto sin introducir tecnicismos ajenos.
  - La preposición «con» respeta el paralelismo de los dos grupos instrumentales en hebreo.
