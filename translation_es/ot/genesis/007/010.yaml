translation:
  language: es
  text: Y después de siete días[a], las aguas del diluvio vinieron sobre la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «y aconteció después de siete días, y las aguas del diluvio estaban sobre la tierra».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra/el país». El hebreo אֶרֶץ puede significar «tierra» o «país», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And after
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y fue que
  lexicon: HALOT
  rationale: La forma narrativa waw-consecutiva introduce el siguiente acontecimiento. En español, «Y aconteció que» conserva el tono narrativo y el valor de secuencia sin sonar tan rígido como una traducción mecánica.
- source_word: לְשִׁבְעַת הַיָּמִים
  english_pob_choice: seven days
  chosen_spanish: al cabo de siete días
  alternatives_spanish:
  - después de siete días
  - al terminar siete días
  lexicon: HALOT
  rationale: La preposición ל con una expresión temporal indica el punto alcanzado tras el período. «Al cabo de siete días» expresa con naturalidad ese cierre temporal en español y mantiene la relación temporal del hebreo.
- source_word: וּמֵי
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - y las aguas
  - las aguas del
  lexicon: HALOT
  rationale: מַיִם en plural constructo se traduce naturalmente como «aguas». En español, el artículo definido hace fluir la frase como sujeto narrativo.
- source_word: הַמַּבּוּל
  english_pob_choice: the flood
  chosen_spanish: del diluvio
  alternatives_spanish:
  - del flood
  - de la inundación
  lexicon: HALOT
  rationale: מַבּוּל designa el diluvio de Noé. «Diluvio» es el equivalente más fiel y natural en español bíblico contemporáneo.
- source_word: הָיוּ עַל
  english_pob_choice: came upon
  chosen_spanish: vinieron[a] sobre
  alternatives_spanish:
  - estaban sobre
  - cayeron sobre
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «estuvieron sobre» la tierra, pero el contexto describe la irrupción de las aguas. «Vinieron sobre» preserva el movimiento eventivo que la POB inglesa también captó con «came upon».
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra[b]
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: אֶרֶץ puede significar «tierra» o «país/territorio», y en este pasaje el alcance puede ser amplio. «La tierra» mantiene la ambigüedad contextual de forma natural en español y evita decidir innecesariamente entre «tierra» y «mundo».
theological_decisions:
- issue: Alcance de אֶרֶץ en el relato del diluvio
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - la tierra/país
  rationale: La POB inglesa opta por «the earth» por el contexto global del relato. En español, «la tierra» es la forma más natural y sigue permitiendo un alcance amplio sin forzar una interpretación localista.
  doctrine_reference: Génesis 7:10; uso contextual de אֶרֶץ en narrativas del diluvio
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español. La redacción mantiene el valor narrativo de וַיְהִי, expresa la clausura temporal de לְשִׁבְעַת הַיָּמִים con una fórmula idiomática, y conserva la tensión de אֶרֶץ sin introducir una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se prefirió «diluvio» por coherencia con el registro bíblico y con el término técnico del relato.
  - Se usó «la tierra» en lugar de «el mundo» para mantener una correspondencia más directa con אֶרֶץ y evitar sobredeterminar el alcance.
  - Los marcadores de nota están anclados exactamente en las palabras relevantes del texto para cumplir la validación del registro.
