base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/023.yaml
  text: And he entered it in its sixth year[5:23], in the second month, on the new moon of the second month, until the sixteenth; and he entered, he and all that we brought to him, into the ark, and the Lord shut it from outside on the seventeenth evening.
  footnotes:
  - marker: '5:23'
    text: The date line is difficult in this verse. 'On the new moon of the second month, until the sixteenth ... on the seventeenth evening' likely marks entry into the ark and the Lord's shutting it immediately before the onset of the Flood.
    reason: segmentation_note
  - marker: a
    text: Or 'in its six hundredth year'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:25Z'
    unchanged: false
    changes_summary: Corrected 'in the sixth year thereof' to 'in its six hundredth year' and 'on the new moon of the second month' to 'on the first day of the second month' for lexical accuracy; otherwise retained the draft structure.
translation:
  language: es
  text: Y entró en su sexto año[a], en el segundo mes, en la luna nueva del segundo mes, hasta el día dieciséis; y entró él, y todo lo que le habíamos traído, en el arca, y Yahvé la cerró desde afuera en la tarde del día diecisiete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La línea de fecha en este versículo es difícil. «En la luna nueva del segundo mes, hasta el día dieciséis... en la tarde del día diecisiete» probablemente marca la entrada en el arca y el momento en que Yahvé la cerró, inmediatamente antes del comienzo del diluvio.
    reason: segmentation_note
lexical_decisions:
- source_word: በሳድስ
  english_pob_choice: in its sixth year
  chosen_spanish: en su sexto año
  alternatives_spanish:
  - en su sexta año
  - en su año sexto
  lexicon: chronological expression
  rationale: El ge'ez indica una numeración ordinal ('sexto'), no el año 600 de Noé; por eso se conserva la cronología propia de Jubileos con una formulación natural en español.
- source_word: በሠርቅ
  english_pob_choice: on the new moon of the second month
  chosen_spanish: en la luna nueva del segundo mes
  alternatives_spanish:
  - el primer día del segundo mes
  - en la novilunio del segundo mes
  lexicon: calendrical term
  rationale: La revisión crítica señala que el término calendárico se debe mantener como 'luna nueva'; 'primer día' sería interpretativo y borraría la terminología específica del texto.
- source_word: ውስተ፡ ታቦት
  english_pob_choice: into the ark
  chosen_spanish: en el arca
  alternatives_spanish:
  - dentro del arca
  - al arca
  lexicon: spatial preposition
  rationale: Aunque el inglés usa 'into', en español 'entró en el arca' expresa con claridad el ingreso al interior sin sobrecargar la frase.
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: divine_name
  rationale: Siguiendo el criterio del proyecto, se nombra explícitamente el Tetragrámaton como 'Yahvé', no como un reemplazo reverencial genérico.
theological_decisions:
- issue: Cronología propia de Jubileos frente a la armonización con Génesis
  english_pob_reading: in its sixth year
  chosen_spanish_reading: en su sexto año
  alternative_spanish_readings:
  - en su año 600
  rationale: La evidencia ge'ez y la revisión del texto muestran que Jubileos sigue su propio cómputo anual; no debe armonizarse con la edad 600 de Noé de Génesis.
  doctrine_reference: consistencia textual y cronológica
- issue: Terminología calendárica de la fecha
  english_pob_reading: on the new moon of the second month
  chosen_spanish_reading: en la luna nueva del segundo mes
  alternative_spanish_readings:
  - el primer día del segundo mes
  rationale: La lectura 'luna nueva' conserva la expresión del texto y la tensión terminológica del sistema calendárico de Jubileos; 'primer día' explicaría, pero también interpretaría de más.
  doctrine_reference: precisión histórica-literaria
- issue: Cierre del arca por acción divina
  english_pob_reading: the Lord shut it from outside
  chosen_spanish_reading: Yahvé la cerró desde afuera
  alternative_spanish_readings:
  - Yahvé cerró la puerta desde afuera
  - el Señor la cerró desde afuera
  rationale: La acción divina se preserva sin suavizar el verbo; 'desde afuera' mantiene el detalle locativo del original.
  doctrine_reference: soberanía divina en el relato
translation_notes:
  revision_awareness: La versión revisada corrigió erróneamente el pasaje a ‘su año 600’ y a ‘el primer día’; el control posterior restableció la lectura ge'ez de ‘sexto año’ y ‘luna nueva’. La presente traducción sigue esa lectura corregida por la revisión crítica, manteniendo el valor calendárico distintivo de Jubileos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en coherencia con el proyecto.
  - Se preserva 'luna nueva' como término calendárico técnico, no como simple equivalencia de fecha.
  - Se usa 'arca' en singular y el pronombre átono 'la' para referirse a la puerta/entrada del arca según el español natural de la frase.
  - La puntuación conserva la larga secuencia temporal del original sin añadir segmentación interpretativa.
