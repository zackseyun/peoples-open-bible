  source_alignment_summary: 'El borrador refleja bien la tríada metafórica del griego (corazón / esperanza / vida) y mantiene las metáforas directas sin suavizarlas en comparaciones. Sin embargo, hay dos problemas: (1) la nota [a] está mal anclada, porque comenta γῆς pero aparece sobre «ceniza»; (2) «más vil» introduce un matiz moral más fuerte que εὐτελεστέρα, que en el expediente inglés se orienta a «más carente de valor / más despreciable» en sentido de bajeza de valor, no de vileza ética.'
  spanish_quality_summary: El español es claro y digno. «Su corazón es ceniza» suena natural, aunque «cenizas» también sería posible. «Más deshonrada que el barro» es comprensible, pero «despreciable» o «menos honorable» sería más idiomático para algunos lectores; aun así, «deshonrada» preserva aceptablemente el matiz de honor/estima. La reparación principal es de precisión léxica y de colocación de nota.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones «corazón», «esperanza» y «vida» están bien alineadas. Conviene ajustar εὐτελεστέρα de «más vil» a «más despreciable» para seguir mejor la racionalidad documentada de escaso valor sin cargar tanto el texto con condena moral adicional.
  issues:
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: La nota [a] explica una alternativa para γῆς («tierra/soil»), pero en el borrador está anclada a «ceniza». Esto rompe la correspondencia exigida entre ancla y nota y puede confundir al lector.
  - severity: medium
    issue: «Más vil» sobreinterpreta εὐτελεστέρα.
    rationale: Aunque puede sugerir bajeza, «vil» en español suele oírse fuertemente moral. El expediente inglés prioriza la idea comparativa de escaso valor o despreciabilidad, no tanto perversidad moral.
  - severity: low
    issue: La nota [a] usa «γῆς» en una nota visible para lector general sin necesidad.
    rationale: No es incorrecto, pero una nota más natural en español puede referirse simplemente a «tierra»/«suelo» sin depender del griego citado de forma técnica.
  revised_spanish_text: Su corazón es ceniza, y su esperanza es más despreciable que la tierra[a], y su vida más deshonrada que el barro[b].
  revised_footnotes:
