review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: sufrimiento + ὑπομονή como medio, énfasis discursivo, y la metáfora de premios/virtud. Sin embargo, «esta perseverancia» añade un demostrativo no presente en ὑπομονῆς y hace menos ceñida la coordinación griega. Además, la nota al pie desplaza innecesariamente el enfoque desde la alternativa documentada en inglés.'
  spanish_quality_summary: 'El español es claro y natural, pero puede afinarse para sonar más idiomático y más fiel al original: «Porque por» es algo pesado, y «nos llevaremos los premios» funciona mejor sin el pie forzado en «perseverancia». La frase revisada mejora fluidez y mantiene dignidad moderna.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Virtud» para ἀρετή está bien justificado. «Perseverancia» es aceptable para ὑπομονή, aunque la nota debe preservar mejor la alternativa «paciencia/endurance» sin sobreexplicar.
  issues:
  - severity: medium
    issue: Redundancia y peso en «Porque por este sufrimiento...»
    rationale: Aunque no es incorrecto, la secuencia «Porque por» suena torpe en español. «Pues por» o una reestructuración ligera conserva γάρ con mejor fluidez.
  - severity: medium
    issue: «esta perseverancia» sobredetermina el segundo sustantivo
    rationale: El griego tiene un solo demostrativo explícito con κακοπαθείας; repetir «esta» antes de «perseverancia» puede sugerir una deixis no marcada en el original.
  - severity: low
    issue: La nota al pie no sigue de cerca la alternativa preservada en el rastro inglés
    rationale: El inglés conserva una alternativa de sentido para toda la expresión de premio/virtud, no para ὑπομονή. Aquí no es necesario mantener una nota léxica nueva; si se conserva, debe ser porque el español realmente la necesita, y no parece necesario.
  revised_spanish_text: Pues por este sufrimiento y perseverancia, ciertamente nos llevaremos los premios de la virtud.
  revision_rationale: Se elimina la nota innecesaria, se mejora la fluidez de γάρ con «Pues», y se evita añadir un segundo demostrativo no expreso en el griego. La revisión conserva la metáfora agonística de ἆθλα / οἴσομεν con «nos llevaremos los premios» y mantiene «virtud» como término clave de ἀρετή.
