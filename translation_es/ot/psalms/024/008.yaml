lexical_decisions:
- source_word: מִי זֶה
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es este?
  alternatives_spanish:
  - ¿Quién es él, este?
  - ¿Quién es este que...?
  lexicon: HALOT
  rationale: La forma interrogativa con demostrativo expresa una pregunta directa y litúrgica. En español, «¿Quién es este?» conserva la estructura natural y el tono responsorial sin añadir elementos no presentes.
- source_word: מֶלֶךְ הַכָּבוֹד
  english_pob_choice: King of glory
  chosen_spanish: Rey de gloria
  alternatives_spanish:
  - Rey glorioso
  - Rey de honor
  lexicon: HALOT
  rationale: La cadena constructa se mantiene de manera literal para conservar el título y su repetición en el salmo. «De gloria» refleja mejor el sustantivo hebreo que un adjetivo como «glorioso».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino propio, no una sustitución por título. «Yahvé» sigue el estándar del proyecto en español y preserva el Tetragrámaton como nombre personal de Dios.
- source_word: עִזּוּז
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - fuerte
  - valiente
  - poderoso
  lexicon: HALOT
  rationale: Este adjetivo denota fuerza o vigor. «Fuerte» comunica el valor básico sin duplicar demasiado el siguiente término paralelo, y suena natural en español.
- source_word: וְגִבּוֹר
  english_pob_choice: and mighty
  chosen_spanish: y poderoso
  alternatives_spanish:
  - y fuerte
  - y valiente
  - y guerrero
  lexicon: HALOT
  rationale: El primer גִּבּוֹר se vierte con un término amplio que mantiene el paralelismo con «fuerte» y evita adelantar demasiado la idea bélica que se explicita en la última cola.
- source_word: גִּבּוֹר מִלְחָמָה
  english_pob_choice: mighty in battle
  chosen_spanish: poderoso en batalla
  alternatives_spanish:
  - poderoso en guerra
  - un guerrero poderoso
  - mighty in war
  lexicon: HALOT
  rationale: La construcción combina un adjetivo con un sustantivo de combate. «Poderoso en batalla» es idiomático en español y conserva la fuerza marcial sin introducir «guerrero» donde el hebreo no lo dice de forma explícita.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el nombre divino revelado, tal como exige la política doctrinal del proyecto, en vez de ocultarlo tras un sustituto como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; el español sigue esa lectura estable, manteniendo el paralelismo y la distinción entre los dos miembros con גִּבּוֹר y la cola final «en batalla».
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar del proyecto.
  - «Rey de gloria» mantiene la cadena constructa sin volverla adjetival.
  - Se evita duplicar «fuerte»/«poderoso» de forma mecánica para preservar el paralelismo semántico.
  - La nota al pie refleja la alternativa léxica entre «batalla» y «guerra», ambas posibles según el contexto hebreo.
