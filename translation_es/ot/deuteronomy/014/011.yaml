lexical_decisions:
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - toda
  - cada
  lexicon: HALOT
  rationale: El cuantificador es inclusivo dentro de la categoría permitida. En español, «cualquier» comunica bien la amplitud de la autorización sin volver la frase pesada o distributiva de forma artificial.
- source_word: צִפּוֹר
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - ave alada
  lexicon: HALOT
  rationale: El hebreo designa un ave en sentido general. «Ave» conserva ese alcance de manera natural en español y suena apropiado en un contexto legal-dietario.
- source_word: טְהֹרָה
  english_pob_choice: clean
  chosen_spanish: limpia
  alternatives_spanish:
  - pura
  - ritualmente limpia
  lexicon: HALOT
  rationale: En leyes rituales, el contraste es ceremonial/categorial. «Limpia» sigue el uso bíblico tradicional en español y evita sustituir la categoría por una idea moral de pureza.
- source_word: תֹּאכֵלוּ
  english_pob_choice: you may eat
  chosen_spanish: pueden comer
  alternatives_spanish:
  - podrán comer
  - comerán
  lexicon: HALOT
  rationale: La forma imperfecta funciona aquí como permiso legal. «Pueden comer» expresa bien la autorización en español moderno y conserva el valor normativo del texto.
theological_decisions:
- issue: Permiso legal en una ley alimentaria
  english_pob_reading: You may eat
  chosen_spanish_reading: Pueden comer
  alternative_spanish_readings:
  - Comerán
  - Deberán comer
  rationale: El hebreo no impone obligación, sino permiso dentro de la regulación de alimentos limpios. El español elegido mantiene esa lectura jurídica sin añadir fuerza indebida.
  doctrine_reference: Ley dietaria en Deuteronomio 14
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene sin cambios la solución óptima: la frase es breve, normativa y sin variantes textuales relevantes. La nota conserva las alternativas más formales documentadas en el POB inglés.'
  spanish_consistency_notes:
