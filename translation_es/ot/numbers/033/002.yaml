translation:
  language: es
  text: Moisés escribió sus puntos de partida[b] por sus jornadas, por mandato de Yahvé[a][c], y estas fueron sus jornadas por sus puntos de partida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «por la boca de Yahvé», un modismo que significa «por mandato de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: «Puntos de partida» también puede entenderse como «salidas» o «partidas».
    reason: lexical_alternative
  - marker: c
    text: 'El verso invierte intencionalmente los términos: «sus puntos de partida por sus jornadas» ... «sus jornadas por sus puntos de partida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote down
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió por escrito
  - registró
  lexicon: HALOT
  rationale: El verbo narra una acción pasada de escritura. En español, «escribió» es natural y suficiente; el contexto de itinerario ya comunica que se trata de un registro.
- source_word: מוֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: מוֹצָאֵיהֶם
  english_pob_choice: their starting points
  chosen_spanish: sus puntos de partida
  alternatives_spanish:
  - sus salidas
  - sus partidas
  - sus puntos de salida
  lexicon: HALOT
  rationale: El sustantivo puede expresar el hecho o lugar de salida. En este contexto itinerante, «puntos de partida» conserva la referencia concreta y evita reducir el término solo a un acto abstracto de salir.
- source_word: לְמַסְעֵיהֶם
  english_pob_choice: by their journeys
  chosen_spanish: según sus jornadas
  alternatives_spanish:
  - por sus jornadas
  - conforme a sus jornadas
  - de acuerdo con sus jornadas
  lexicon: HALOT
  rationale: מַסָּע designa una etapa de marcha o jornada. «Según» mantiene bien la relación formal del hebreo y el paralelismo invertido sin volver la frase pesada en español.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: por mandato de Yahvé
  alternatives_spanish:
  - al mandato de Yahvé
  - por la orden de Yahvé
  - según el mandato de Yahvé
  lexicon: HALOT
  rationale: El hebreo es un modismo literal de «sobre la boca de», con sentido de mandato o dirección. «Por mandato de Yahvé» comunica la fuerza idiomática sin calco innecesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el término propio del proyecto para el Nombre divino, manteniéndolo visible en el texto principal en vez de enmascararlo como «SEÑOR».
- source_word: וְאֵלֶּה
  english_pob_choice: and these were
  chosen_spanish: y estas fueron
  alternatives_spanish:
  - y estas son
  - ahora bien, estas fueron
  lexicon: HALOT
  rationale: El demostrativo introduce retrospectivamente el encabezado de la lista; el pasado español es natural y fiel al marco narrativo.
- source_word: מַסְעֵיהֶם
  english_pob_choice: their journeys
  chosen_spanish: sus jornadas
  alternatives_spanish:
  - sus viajes
  - sus marchas
  - sus etapas
  lexicon: HALOT
  rationale: «Jornadas» conserva el valor de etapas del trayecto y mantiene la simetría con el término anterior sin perder inteligibilidad en español.
- source_word: לְמוֹצָאֵיהֶם
  english_pob_choice: according to their starting points
  chosen_spanish: según sus puntos de partida
  alternatives_spanish:
  - por sus puntos de partida
  - desde sus puntos de partida
  lexicon: HALOT
  rationale: La segunda mitad invierte deliberadamente el orden de los términos. «Según sus puntos de partida» preserva esa inversión y el paralelismo señalado en el audit trail.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragrama de forma explícita. Conforme al criterio del proyecto, se conserva el Nombre en forma audible y no se sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Modismo עַל פִּי יְהוָה
  english_pob_reading: at the command of Yahweh
  chosen_spanish_reading: por mandato de Yahvé
  alternative_spanish_readings:
  - según el mandato de Yahvé
  - por la orden de Yahvé
  rationale: No se traduce de manera literal «por la boca de Yahvé», porque en español esa forma sería poco natural y oscurecería el sentido de dirección/mandato que el audit trail ya identifica.
  doctrine_reference: HALOT / audit trail lexical note on the idiom
- issue: Paralelismo invertido entre מוֹצָאֵיהֶם y מַסְעֵיהֶם
  english_pob_reading: their starting points ... their journeys ... their journeys ... their starting points
  chosen_spanish_reading: sus puntos de partida ... sus jornadas ... sus jornadas ... sus puntos de partida
  alternative_spanish_readings:
  - sus salidas ... sus marchas ... sus marchas ... sus salidas
  rationale: Se preserva en español la inversión deliberada del hebreo, porque forma parte del efecto retórico del versículo y fue destacada en el audit trail.
  doctrine_reference: English footnote c / revision awareness
translation_notes:
  revision_awareness: La redacción sigue el ajuste revisado del audit trail, que favorece una relación más directa con el hebreo mediante «por»/«según» en vez de fórmulas más interpretativas. Se mantuvo el paralelismo invertido y el Nombre divino visible en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva la diferencia entre «puntos de partida» y «jornadas» para reflejar el juego de términos del hebreo.
  - «Según» se emplea aquí como preposición relacional, no como atenuación del mandato divino.
  - Las notas al pie se anclan en «puntos de partida», «Yahvé» y la cláusula final para corresponder con las alternativas y el paralelismo del original.
