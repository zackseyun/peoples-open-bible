translation:
  language: es
  text: En respuesta a esto, ustedes, oh hijos de Abraham, mueran noblemente por causa de la devoción a Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por causa de la piedad». El griego εὐσέβεια denota devoción reverente a Dios expresada en conducta fiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς ταῦτα
  english_pob_choice: In response to this
  chosen_spanish: En respuesta a esto
  alternatives_spanish:
  - A esto
  - Con respecto a esto
  - A la vista de esto
  lexicon: LSJ
  rationale: La expresión introduce una reacción directa a lo dicho antes; «En respuesta a esto» conserva la función discursiva sin sonar forzada en español.
- source_word: ὑμεῖς μέν
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes, por su parte
  - ustedes, ciertamente
  - ustedes mismos
  lexicon: BDAG
  rationale: El griego es enfático y contrastivo, pero el matiz puede quedar suficientemente marcado por el contexto y la vocatividad; «ustedes» mantiene la dirección retórica en español neutral.
- source_word: ὦ Ἀβραὰμ παῖδες
  english_pob_choice: O children of Abraham
  chosen_spanish: oh hijos de Abraham
  alternatives_spanish:
  - oh hijos de Abraham
  - oh descendientes de Abraham
  - oh hijos de Abrahán
  lexicon: BDAG
  rationale: «Hijos» preserva la resonancia familiar y de pacto de παῖδες; se conserva el vocativo con «oh» para el tono solemne. Se evita «descendientes» por ser más explicativo que el griego.
- source_word: εὐγενῶς
  english_pob_choice: nobly
  chosen_spanish: noblemente
  alternatives_spanish:
  - de manera noble
  - con nobleza
  - dignamente
  lexicon: LSJ
  rationale: El adverbio expresa una muerte honorable y de alta calidad moral; «noblemente» reproduce con concisión el elogio del griego.
- source_word: ὑπὲρ τῆς εὐσεβείας
  english_pob_choice: for the sake of godliness
  chosen_spanish: por causa de la piedad
  alternatives_spanish:
  - por causa de la devoción a Dios
  - por causa de la reverencia a Dios
  - por causa de la piedad religiosa
  lexicon: BDAG
  rationale: εὐσέβεια en este contexto judío-griego apunta a piedad/devoción reverente hacia Dios. En español, «piedad» es una opción fiel y breve; se evita «devoción» como más interpretativo y «religión» por ser demasiado amplio.
- source_word: τελευτᾶτε
  english_pob_choice: die
  chosen_spanish: mueren
  alternatives_spanish:
  - mueren
  - llegan a su fin
  - mueren enfrentando la muerte
  lexicon: BDAG
  rationale: El verbo es un eufemismo solemne para morir; «mueren» es claro y natural en español, sin perder la gravedad del contexto martirial.
theological_decisions:
- issue: Renderización de εὐσέβεια en un contexto de martirio
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - reverencia hacia Dios
  rationale: La traducción española opta por «piedad» porque comunica la devoción reverente requerida por el contexto y corresponde al abanico semántico señalado en el auditorio en inglés. «Devoción a Dios» es válida, pero suena más explicativa que el sustantivo breve del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: El pasaje no presenta revisiones aplicadas en el expediente inglés; la propuesta española sigue el texto griego y el audit trail sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene el vocativo solemne con «oh».
  - Se conserva «hijos de Abraham» para reflejar παῖδες sin restringirlo a un género específico.
  - «Piedad» se usa como equivalente de εὐσέβεια de modo consistente con el glosario y la nota alternativa.
  - El registro es sobrio y martirial, acorde con la breve sentencia griega.
