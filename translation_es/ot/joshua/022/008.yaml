translation:
  language: es
  text: 'Y les dijo: «Vuelvan a sus tiendas con muchas posesiones, con muchísimo ganado, con plata y oro, con bronce[c] e hierro, y con muchísimas vestiduras. Repartan el botín[a] de sus enemigos con sus hermanos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despojo» de sus enemigos.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» se refiere aquí a sus compatriotas israelitas de las otras tribus.
    reason: cultural_note
  - marker: c
    text: O «cobre».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּנְכָסִים רַבִּים
  english_pob_choice: with great wealth
  chosen_spanish: con muchas posesiones
  alternatives_spanish:
  - con gran riqueza
  - con abundantes bienes
  lexicon: HALOT
  rationale: נְכָסִים abarca bienes, posesiones o riqueza. «Posesiones» conserva la amplitud semántica sin reducirlo solo a dinero, y «muchas» refleja el plural/abundancia del hebreo.
- source_word: שׁוּבוּ אֶל אָהֳלֵיכֶם
  english_pob_choice: Return to your tents
  chosen_spanish: vuelvan a sus tiendas
  alternatives_spanish:
  - regresen a sus tiendas
  - vuelvan a sus hogares
  lexicon: HALOT
  rationale: «Tiendas» mantiene la imagen histórica del texto y evita interpretar demasiado como «hogares». El imperativo plural se refleja naturalmente en español con «vuelvan».
- source_word: וּבְמִקְנֶה רַב מְאֹד
  english_pob_choice: with very much livestock
  chosen_spanish: con muchísimo ganado
  alternatives_spanish:
  - con muchísimas cabezas de ganado
  - con abundante ganado
  lexicon: HALOT
  rationale: מִקְנֶה es un término colectivo para ganado/livestock. «Ganado» es natural en español y no restringe indebidamente la referencia a una especie; «muchísimo» expresa la intensificación de מְאֹד.
- source_word: בְּכֶסֶף וּבְזָהָב
  english_pob_choice: with silver and gold
  chosen_spanish: con plata y oro
  alternatives_spanish:
  - con dinero y oro
  - con plata y con oro
  lexicon: HALOT
  rationale: Los metales preciosos se traducen de forma directa y convencional en español. Se conserva la simple enumeración material del hebreo.
- source_word: וּבִנְחֹשֶׁת וּבְבַרְזֶל
  english_pob_choice: with bronze and iron
  chosen_spanish: con bronce e hierro
  alternatives_spanish:
  - con cobre e hierro
  - con bronce y hierro
  lexicon: HALOT
  rationale: נְחֹשֶׁת puede ser «cobre» o «bronce». Siguiendo el juicio de la POB inglesa y el uso habitual en listas metálicas bíblicas, se opta por «bronce»; la coordinación exige «e hierro» por eufonía.
- source_word: וּבִשְׂלָמוֹת הַרְבֵּה מְאֹד
  english_pob_choice: and with very many garments
  chosen_spanish: y con muchísimas vestiduras
  alternatives_spanish:
  - y con muchas vestiduras
  - y con muchísimos vestidos
  lexicon: HALOT
  rationale: שְׂלָמוֹת designa prendas/vestiduras, a veces mantos o cloaks. «Vestiduras» es digno y suficientemente amplio; el doble intensificador se vierte con «muchísimas».
- source_word: חִלְקוּ
  english_pob_choice: Divide
  chosen_spanish: Repartan
  alternatives_spanish:
  - Dividan
  - Distribuyan
  lexicon: HALOT
  rationale: El imperativo plural pide una acción de distribuir una porción. «Repartan» comunica bien la idea de compartir/aportar lotes del botín en español natural.
- source_word: שְׁלַל אֹיְבֵיכֶם
  english_pob_choice: the plunder of your enemies
  chosen_spanish: el botín de sus enemigos
  alternatives_spanish:
  - el despojo de sus enemigos
  - el saqueo de sus enemigos
  lexicon: HALOT
  rationale: שָׁלָל es botín de guerra/plunder. «Botín» es el equivalente más idiomático y preciso en español. Se mantiene el valor bélico del término.
- source_word: עִם אֲחֵיכֶם
  english_pob_choice: with your brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - con sus hermanos varones
  - con sus parientes
  - con sus compatriotas
  lexicon: HALOT
  rationale: El hebreo usa el kinship masculino plural. Se conserva «hermanos» como en la POB inglesa para no neutralizar el término; en contexto se entiende como los demás israelitas de las otras tribus.
theological_decisions:
- issue: Tratamiento del término de parentesco masculino אֲחֵיכֶם
  english_pob_reading: with your brothers
  chosen_spanish_reading: con sus hermanos
  alternative_spanish_readings:
  - con sus hermanos y hermanas
  - con sus compatriotas
  - con sus parientes
  rationale: El plural masculino funciona como referencia representativa al resto de Israel. Se mantiene «hermanos» para preservar la forma léxica y la señalación de la relación tribal/covenantal sin diluirla en un colectivo genérico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: שְׁלַל como botín de guerra
  english_pob_reading: the plunder of your enemies
  chosen_spanish_reading: el botín de sus enemigos
  alternative_spanish_readings:
  - el despojo de sus enemigos
  - el saqueo de sus enemigos
  rationale: El contexto es militar y el término hebreo remite a botín obtenido del enemigo. «Botín» conserva ese matiz jurídico-militar mejor que un término más general.
  doctrine_reference: HALOT; contexto narrativo de conquista y reparto
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la redacción para eliminar la redundancia de «saying» y mantener una formulación más natural sin perder la transparencia. La versión española sigue esa línea: conserva la fórmula narrativa básica, pero evita una calca innecesaria. También mantiene las decisiones léxicas documentadas para נְכָסִים, מִקְנֶה, נְחֹשֶׁת y שְׁלַל.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Tiendas» se conserva por fidelidad histórica, no como metáfora de viviendas modernas.
  - «Botín» es preferido frente a «despojo» en el cuerpo principal por naturalidad española, dejando la alternativa en nota.
  - Se usa «hermanos» en sentido tribal/covenantal, coherente con la política de precisión de género del proyecto.
