revisions:
- from: Después de esto, se levantará y les pagará[a], y hará recaer sobre su cabeza[b] su paga.
  to: Después de esto, se levantará y les retribuirá, y hará recaer sobre su cabeza[a] su retribución.
  rationale: Se reemplazó 'les pagará' por 'les retribuirá' y 'su paga' por 'su retribución' para reflejar con mayor fidelidad el campo semántico de ἀνταποδώσει / ἀνταπόδομα y evitar connotaciones de salario o pago económico. Se mantuvo 'se levantará' por su fuerza antropomórfica y 'hará recaer sobre su cabeza' por conservar el modismo bíblico. Se eliminó la nota léxica redundante y se conservó solo la nota cultural necesaria.
