  yaml_path: translation/ot/1_samuel/009/026.yaml
  text: They rose early[a], and when the dawn was breaking, Samuel called to Saul on the roof, saying, “Get up, and I will send you on your way.” So Saul got up, and the two of them, he and Samuel[b], went outside.
