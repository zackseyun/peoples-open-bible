lexical_decisions:
- source_word: προφυῶσαι
  english_pob_choice: to fortify
  chosen_spanish: fortificar
  alternatives_spanish:
  - reforzar
  - levantar defensas en torno a
  lexicon: LSJ
  rationale: El verbo sugiere añadir o fortalecer defensas; «fortificar» transmite con claridad la acción militar-construccional sin forzar un detalle técnico que el griego no explicita.
- source_word: τείχη
  english_pob_choice: walls
  chosen_spanish: muros
  alternatives_spanish:
  - murallas
  - paredes
  lexicon: LSJ
  rationale: En contexto urbano y militar, «muros» es natural en español y conserva el sentido material de los τείχη de Jerusalén.
- source_word: ὑψῶσαι ὕψος μέγα
  english_pob_choice: to raise a great barrier
  chosen_spanish: levantar una gran barrera
  alternatives_spanish:
  - levantar una gran altura
  - erigir una gran separación
  lexicon: LSJ
  rationale: La expresión griega es intensiva y algo pleonástica. La versión inglesa revisada entiende un elemento separador; en español «barrera» comunica mejor esa función que una traducción literal de «altura».
- source_word: ἄκρας
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - el Acra
  - la fortaleza
  lexicon: LSJ
  rationale: Ἄκρα designa la fortaleza jerusalemita. «Ciudadela» preserva la función defensiva y resulta más transparente que el nombre técnico «Acra» en el texto principal.
- source_word: εἰς τὸ διαχωρίσαι
  english_pob_choice: so as to separate
  chosen_spanish: para separarla
  alternatives_spanish:
  - a fin de separarla
  - con el fin de dividirla
  lexicon: LSJ
  rationale: La construcción expresa propósito; «para separarla» es natural en español y mantiene el vínculo con la barrera entre la ciudadela y la ciudad.
- source_word: αὐτὴν τῆς πόλεως
  english_pob_choice: it from the city
  chosen_spanish: separarla de la ciudad
  alternatives_spanish:
  - separarla de la población
  - separar a la ciudadela de la ciudad
  lexicon: LSJ
  rationale: El pronombre se refiere a la ciudadela, de género femenino en griego; en español se mantiene la referencia con «la» y no con un neutro inexistente.
- source_word: κατὰ μόνας
  english_pob_choice: by itself
  chosen_spanish: sola
  alternatives_spanish:
  - por sí sola
  - aislada
  lexicon: LSJ
  rationale: La frase indica aislamiento o independencia resultante. «Quedara sola» resume ese efecto de separación de modo idiomático.
- source_word: μήτε ἀγοράζωσιν μήτε πωλῶσιν
  english_pob_choice: neither buy nor sell
  chosen_spanish: ni comprar ni vender
  alternatives_spanish:
  - ni compraran ni vendieran
  - ni comerciar
  lexicon: LSJ
  rationale: La pareja verbal expresa actividad comercial prohibida. «Ni comprar ni vender» sigue de cerca el valor del griego y el uso tradicional en español sin añadir matices no presentes.
theological_decisions:
- issue: Identificación histórica de ἄκρα
  english_pob_reading: Rendered functionally as 'the citadel' in the main text, with a footnote preserving the historical name 'the Acra.'
  chosen_spanish_reading: «la ciudadela» en el texto principal, con nota que preserva «el Acra» como alternativa histórica
  alternative_spanish_readings:
  - el Acra
  - la fortaleza
  rationale: No es una cuestión doctrinal, pero sí histórica y lexical. «Ciudadela» hace inteligible la referencia; la nota conserva el nombre propio técnico para lectores que quieran la designación histórica precisa.
  doctrine_reference: Transparencia textual y documentación de opciones históricas sin ocultar el término especializado.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «a great barrier» sobre «a great height» para comunicar mejor el sentido separador de la estructura. En español se reflejó con «una gran barrera», manteniendo la función defensiva y separadora del pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «ciudadela» para ἄκρα en el cuerpo, reservando «Acra» para la nota.
  - El orden de los infinitivos y propósitos sigue el flujo del griego y de la POB inglesa revisada.
  - No se introducen términos eclesiásticos ajenos al contexto militar-político del pasaje.
