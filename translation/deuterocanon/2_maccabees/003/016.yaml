theological_decisions:
- issue: Anthropological language of ψυχή
  chosen_reading: soul
  alternative_readings:
  - inner being
  - self
  rationale: The verse uses ψυχή in a way that denotes the person's inward life or inner distress. 'Soul' preserves the source wording and theological resonance, while the context makes clear this is visible emotional agony rather than a technical doctrinal statement about human constitution.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
