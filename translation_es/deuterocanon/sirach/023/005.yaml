translation:
  language: es
  text: Y aparta de mí todo deseo;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ansia» o «lujuria». El término griego puede denotar un deseo fuerte en un sentido moralmente negativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμίαν
  english_pob_choice: desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - la pasión
  - la concupiscencia
  - el ansia
  - el apetito
  lexicon: BDAG
  rationale: El término griego puede expresar deseo en sentido amplio, a veces con carga moral negativa según el contexto. ‘El deseo’ conserva ese alcance sin reducirlo de entrada a un matiz exclusivamente sexual o ascético, y permite que el contexto determine la valoración ética.
- source_word: ἀπόστρεψον
  english_pob_choice: turn away
  chosen_spanish: aparta
  alternatives_spanish:
  - aleja
  - haz volver
  - desvía
  - vuelve aparte
  lexicon: LSJ
  rationale: El imperativo pide una acción decisiva de separar o desviar algo del hablante. ‘Aparta’ es natural en español, conserva la imagen de alejar algo de uno y evita una paráfrasis más interpretativa.
- source_word: ἀπʼ ἐμοῦ
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - lejos de mí
  - fuera de mí
  lexicon: BDAG
  rationale: La preposición marca separación respecto del hablante. En español, ‘de mí’ basta para conservar esa relación sin añadir una precisión que el griego no exige.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - E incluso
  lexicon: BDAG
  rationale: La conjunción enlaza con la súplica anterior; ‘Y’ mantiene la continuidad oracional de forma simple y fiel.
theological_decisions:
- issue: Alcance moral de ἐπιθυμία
  english_pob_reading: Traducción amplia como 'desire' en vez de 'lust'.
  chosen_spanish_reading: Traducción amplia como 'deseo' en vez de 'lujuria'.
  alternative_spanish_readings:
  - lujuria
  - codicia
  - apetito desordenado
  rationale: La palabra griega puede implicar deseo moralmente desordenado, pero no se limita por sí sola a la lujuria sexual. ‘Deseo’ preserva el alcance léxico y deja que el contexto determine la orientación negativa.
  doctrine_reference: Principio de primacía del idioma original; mantener el rango semántico salvo que el contexto obligue a estrecharlo.
translation_notes:
  revision_awareness: La versión inglesa revisada conservó el contenido sin cambios léxicos, añadiendo solo el punto y coma final para reflejar la puntuación del griego. La versión española reproduce esa misma puntuación con un cierre semicolon, manteniendo la brevedad imperativa del texto.
  spanish_consistency_notes:
  - Se usó ‘deseo’ como término base por coherencia con el rango semántico del griego y con la decisión auditada en inglés.
  - Se prefirió ‘aparta’ por ser un imperativo natural y fiel al valor separativo de ἀπόστρεψον.
  - Se mantuvo el orden sintáctico breve para reflejar el carácter de petición directa del original.
  - No se añadieron notas al pie porque la ambigüedad lexical queda suficientemente explicada en las decisiones léxicas y no hay un ancla textual necesaria.
