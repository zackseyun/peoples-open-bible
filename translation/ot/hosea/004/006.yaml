theological_decisions:
- issue: Sense of 'knowledge' in Hosea's covenant lawsuit
  chosen_reading: Rendered simply as 'knowledge' without expanding to 'knowledge of God' in the main text
  alternative_readings:
  - knowledge of God
  rationale: Although Hosea often speaks specifically of knowledge of God, this verse's immediate Hebrew says only 'knowledge.' The broader covenantal sense is preserved without importing additional words not present in the clause.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of the second-person singular accusations
  chosen_reading: Addressed to the priestly representative as singular 'you'
  alternative_readings:
  - collective singular for Israel more broadly
  rationale: The phrase 'from serving as priest to me' strongly supports a priestly addressee, likely representative of the priesthood. The English keeps the singular without resolving beyond what the text states.
  doctrine_reference: Translation philosophy §3
- issue: Gender rendering of בָּנֶיךָ
  chosen_reading: your children
  alternative_readings:
  - your sons
  rationale: The Hebrew masculine plural may function generically for offspring. Following the gender-accurate principle, English should reflect intended referent rather than grammatical form alone; here 'children' best fits the likely scope of judgment on descendants.
  doctrine_reference: Translation philosophy §4
