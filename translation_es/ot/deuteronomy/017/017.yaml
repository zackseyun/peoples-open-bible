    text: 'O: «y su corazón no se desvíe». El hebreo puede leerse como una prohibición coordinada más que como una cláusula de advertencia o resultado.'
    reason: alternative_reading
  revision_rationale: Se cambia «mujeres» por «esposas» para reflejar el sentido contextual de נָשִׁים en la ley sobre el rey y alinearse con la decisión léxica auditada. Se reemplaza «para que no» por «no sea que» para expresar mejor la advertencia implícita que el inglés POB fijó con «lest». Se ajusta «en gran manera» a «excesivamente» por mayor naturalidad en español actual sin perder el matiz de exceso de מְאֹד. La nota se conserva y se afina para describir la alternativa como prohibición coordinada.
