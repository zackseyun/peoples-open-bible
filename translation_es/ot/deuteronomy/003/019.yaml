    rationale: Esto crea una discordancia material entre texto y nota. La nota sobre «vuestros hijos» debe anclarse en «pequeños» o reformularse para el término correcto.
  - severity: medium
    issue: Registro pronominal poco alineado con español neutral latinoamericano
    rationale: «Vuestras… os he dado» suena peninsular. La guía del proyecto pide español neutral LATAM/broadly church-readable; «sus… les he dado» o formulación equivalente es preferible.
  - severity: low
    issue: La nota sobre «ciudades/pueblos» debe anclarse de forma más transparente al término traducido
    rationale: Actualmente [c] está al final de la oración. Es mejor colocarla directamente sobre «ciudades» para que el lector vea que la alternativa afecta a עָרֵיכֶם.
