translation:
  language: es
  text: Sobre él[a] retumba el carcaj, el resplandor[b] de la lanza y la jabalina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra él»; la preposición hebrea permite un matiz espacial y auditivo ligeramente distinto.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «la llama» o «la hoja» de la lanza y la jabalina; expresión poética para su brillo fulgurante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָיו
  english_pob_choice: over him
  chosen_spanish: Sobre él
  alternatives_spanish:
  - contra él
  - sobre su cuerpo
  lexicon: HALOT
  rationale: La preposición עַל con sufijo de 3ª persona singular admite un matiz espacial que puede ser 'sobre' o 'contra'. 'Sobre él' conserva la imagen poética sin forzar una lectura exclusivamente hostil.
- source_word: תִּרְנֶה
  english_pob_choice: rattles
  chosen_spanish: retumba
  alternatives_spanish:
  - resuena
  - clama
  - repica
  lexicon: HALOT
  rationale: El verbo poético describe un sonido agudo y perceptible. Con 'carcaj' como sujeto, 'retumba' comunica el efecto sonoro en español natural sin perder la fuerza acústica del hebreo.
- source_word: אַשְׁפָּה
  english_pob_choice: the quiver
  chosen_spanish: carcaj
  alternatives_spanish:
  - aljaba
  - quiver
  lexicon: HALOT
  rationale: El término normal en español para el recipiente de flechas es 'carcaj'. 'Aljaba' es posible, pero 'carcaj' es más directo y actual; 'quiver' no se prefiere por ser un anglicismo.
- source_word: לַהַב
  english_pob_choice: the flashing
  chosen_spanish: el resplandor
  alternatives_spanish:
  - la llama
  - la hoja
  - el fulgor
  lexicon: HALOT
  rationale: En construcción con las armas, לַהַב puede expresar brillo o fulgor poético. 'El resplandor' mantiene el valor imagético sin convertir la expresión en una simple denominación técnica.
- source_word: חֲנִית
  english_pob_choice: spear
  chosen_spanish: lanza
  alternatives_spanish:
  - spear
  - jabalina
  lexicon: HALOT
  rationale: En español, 'lanza' es un equivalente natural y amplio para חֲנִית. 'Spear' se evita por ser inglés; 'jabalina' se reserva para el segundo término para preservar la distinción del texto.
- source_word: כִידוֹן
  english_pob_choice: javelin
  chosen_spanish: jabalina
  alternatives_spanish:
  - dardo
  - lanza ligera
  lexicon: HALOT
  rationale: כִידוֹן suele designar un arma arrojadiza más ligera que חֲנִית. 'Jabalina' preserva esa diferencia mejor que repetir 'lanza'.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo WLC y el audit trail inglés. La principal decisión fue mantener el valor sonoro de תִּרְנֶה con un verbo español natural y conservar la posible ambigüedad de עָלָיו en nota. También se preservó la imagen poética de לַהַב como brillo, no como simple término técnico de arma.
  spanish_consistency_notes:
  - Se usó 'carcaj' para אַשְׁפָּה por ser el equivalente castellano más claro y vigente.
  - Se prefirió 'lanza' para חֲנִית y 'jabalina' para כִידוֹן para sostener la distinción léxica del hebreo.
  - No se empleó 'SEÑOR' ni terminología teológica ajena al versículo; el texto es puramente poético y descriptivo.
  - El marcador [b] se colocó sobre 'carcaj' porque la nota explica la imagen completa del brillo de las armas, y [a] sobre el sustantivo para capturar la alternativa preposicional.
