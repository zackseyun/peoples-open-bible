translation:
  language: es
  text: para hacerte saber la certeza de palabras de verdad[a], para que respondas palabras de verdad[b] a los que te enviaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la verdad de palabras de verdad». קֹשְׁט también puede entenderse como «verdad», «corrección» o «fiabilidad»; aquí se conserva «certeza» para no borrar la distinción con אֱמֶת.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que respondas con palabras verdaderas a los que te enviaron».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְהוֹדִיעֲךָ
  english_pob_choice: to make known to you
  chosen_spanish: para darte a conocer
  alternatives_spanish:
  - para hacerte saber
  - para enseñarte
  lexicon: HALOT
  rationale: El infinitivo causativo de ידע expresa hacer que alguien llegue a saber. «Darte a conocer» conserva esa fuerza causativa en un español natural y digno.
- source_word: קֹשְׁט
  english_pob_choice: certainty
  chosen_spanish: certeza
  alternatives_spanish:
  - verdad
  - corrección
  - fiabilidad
  lexicon: HALOT
  rationale: Como אמת aparece dos veces en el verso con el sentido explícito de «verdad», conviene no duplicar ese matiz en קֹשְׁט. «Certeza» preserva la idea de exactitud / confiabilidad sin borrar la distinción retórica.
- source_word: אִמְרֵי אֱמֶת
  english_pob_choice: words of truth
  chosen_spanish: palabras de verdad
  alternatives_spanish:
  - palabras verdaderas
  - dichos de verdad
  lexicon: HALOT
  rationale: La construcción en genitivo se refleja de modo natural como «palabras de verdad», manteniendo el paralelismo con la segunda mitad del verso.
- source_word: לְהָשִׁיב
  english_pob_choice: so that you may return
  chosen_spanish: para que respondas
  alternatives_spanish:
  - para que devuelvas
  - para que contestes
  lexicon: HALOT
  rationale: En contexto sapiencial la forma verbal apunta a dar una respuesta. «Responder» capta el sentido funcional del hebreo sin perder el matiz de contestación a quienes consultan.
- source_word: אֲמָרִים
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  lexicon: HALOT
  rationale: El plural de אמר designa expresiones dichas; «palabras» es el equivalente más general y mantiene el eco con la primera mitad del verso.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - veracidad
  lexicon: HALOT
  rationale: En este proverbio sapiencial, אמת se lee de manera natural como «verdad», en paralelo con la primera aparición del término y con la finalidad didáctica del verso.
- source_word: לְשֹׁלְחֶיךָ
  english_pob_choice: to those who sent you
  chosen_spanish: a los que te enviaron
  alternatives_spanish:
  - a tus enviados
  - a quienes te mandaron
  lexicon: HALOT
  rationale: El participio plural con sufijo de segunda persona masculina singular refiere a los remitentes. «A los que te enviaron» es claro, fiel e idiomático en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión vigente sin cambios; la solución española conserva la distinción entre קֹשְׁט y אֱמֶת y adopta un verbo de respuesta más natural en español para לְהָשִׁיב.
  spanish_consistency_notes:
  - Se mantiene «verdad» para אֱמֶת y «certeza» para קֹשְׁט, evitando colapsar ambas palabras en un solo término.
  - «Responder» traduce el valor pragmático de לְהָשִׁיב sin sobrecargar el verso con una paráfrasis.
  - La preposición inicial «para» reproduce la finalidad de los infinitivos hebreos en una sola estructura fluida.
