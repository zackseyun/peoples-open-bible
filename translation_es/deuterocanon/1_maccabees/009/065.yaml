translation:
  language: es
  text: Y Jonatán dejó a su hermano Simón en la ciudad[a], y salió al campo, y llegó con un grupo de hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «llegó con un número». La expresión es elíptica y probablemente significa que llegó con un grupo o compañía de hombres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó atrás
  - dejó a
  lexicon: LSJ
  rationale: El aoristo de ἀπολείπω aquí indica que Jonatán deja a Simón en un lugar mientras él mismo parte. «Dejó» expresa la acción de modo natural en español sin añadir matices no presentes en el griego.
- source_word: Σίμωνα τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: Simon his brother
  chosen_spanish: su hermano Simón
  alternatives_spanish:
  - Simón, su hermano
  - Simón, el hermano de él
  lexicon: LSJ
  rationale: La frase apposicional identifica a Simón como hermano de Jonatán. En español, «su hermano Simón» mantiene la relación familiar de forma clara y fluida.
- source_word: ἐν τῇ πόλει
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - en el pueblo
  lexicon: LSJ
  rationale: πόλις puede significar ciudad o pueblo; «ciudad» conserva el contraste con χώρα y coincide con la opción inglesa documentada.
- source_word: ἐξῆλθεν εἰς τὴν χώραν
  english_pob_choice: went out into the country
  chosen_spanish: salió al campo
  alternatives_spanish:
  - salió al país
  - salió a la región
  - salió al campo abierto
  lexicon: LSJ
  rationale: χώρα denota el territorio fuera de la ciudad, el campo o la región. «Salió al campo» comunica bien el contraste espacial con «en la ciudad» y suena natural en español.
- source_word: ἦλθεν ἀρίθμῳ
  english_pob_choice: came with a number of men
  chosen_spanish: llegó con un grupo numeroso
  alternatives_spanish:
  - llegó con una compañía numerosa
  - llegó con un número de hombres
  - llegó en número
  lexicon: LSJ
  rationale: La expresión es elíptica en griego. En contexto militar, comunica que llegó acompañado por una compañía numerosa; «grupo numeroso» preserva la idea sin forzar una explicitación excesiva de «hombres».
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó por una revisión que hizo explícito el sentido elíptico de ἦλθεν ἀρίθμῳ añadiendo «of men». En español, mantengo esa lectura contextual sin introducir una paráfrasis demasiado específica, usando «grupo numeroso» para reflejar la compañía implícita.
  spanish_consistency_notes:
  - Se conserva «Y» al inicio para reflejar la coordinación narrativa del griego.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque no hay vocabulario divino en el versículo.
  - «Ciudad» y «campo» mantienen el contraste espacial del original.
  - La nota al pie marca la elipsis de ἦλθεν ἀρίθμῳ sin sobrecargar el texto principal.
