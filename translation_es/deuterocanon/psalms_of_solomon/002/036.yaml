revisions:
- from: Y ahora vean[a], nobles de la tierra, el juicio del Señor, que él es un gran rey y justo[b], juzgando lo que está bajo el cielo.
  to: Y ahora vean[a], nobles de la tierra, el juicio de Yahvé, que él es un rey grande y justo, juzgando lo que está bajo el cielo[b].
  rationale: 'Se reemplazó «Señor» por «Yahvé» para ajustarse a la terminología del proyecto. Se mejoró «un gran rey y justo» a «un rey grande y justo» para que el español sea natural y siga mostrando que ambos adjetivos describen a «rey». También se repararon las notas: la de «vean» ahora preserva las alternativas documentadas para μεγιστᾶνες, y la nota final explica de verdad la elipsis de τὴν ὑπʼ οὐρανόν.'
