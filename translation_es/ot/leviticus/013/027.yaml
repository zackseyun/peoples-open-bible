translation:
  language: es
  text: Y el sacerdote lo examinará el séptimo día. Si ciertamente se ha extendido en la piel[a], el sacerdote lo declarará impuro; es una plaga de lepra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente se traduce ‘lepra’. El término hebreo se refiere de manera más amplia a una afección cutánea grave en las leyes de pureza de Israel, no necesariamente a la lepra moderna (enfermedad de Hansen).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָהוּ
  english_pob_choice: shall examine him
  chosen_spanish: lo examinará
  alternatives_spanish:
  - lo verá
  - lo inspeccionará
  lexicon: HALOT
  rationale: En el contexto sacerdotal de Levítico, el verbo de 'ver' tiene valor técnico de examen diagnóstico; 'examinar' conserva ese sentido procedimental en español sin quedarse en la mera percepción visual.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiantel
  - el presbítero
  lexicon: HALOT
  rationale: En Levítico, כֹּהֵן corresponde al oficio ritual de sacerdote; 'sacerdote' es el equivalente natural y fiel en español.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: en el séptimo día
  alternatives_spanish:
  - al séptimo día
  - en día séptimo
  lexicon: HALOT
  rationale: La frase temporal es directa; 'en el séptimo día' suena natural y mantiene la referencia calendárica exacta.
- source_word: אִם פָּשֹׂה תִפְשֶׂה
  english_pob_choice: if it has indeed spread
  chosen_spanish: si se ha extendido de verdad
  alternatives_spanish:
  - si ciertamente se ha extendido
  - si se ha extendido mucho más
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la idea de propagación. 'De verdad' comunica esa fuerza enfática de modo idiomático sin exagerar el matiz.
- source_word: בָּעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - en la piel misma
  - en la carne
  lexicon: HALOT
  rationale: עוֹר puede significar piel/hide; aquí la locución diagnóstica se expresa con 'en la piel', que en español comunica mejor la localización de la afección que 'en el cuero' o una literalidad torpe.
- source_word: וְטִמֵּא ... אֹתוֹ
  english_pob_choice: the priest shall pronounce him unclean
  chosen_spanish: el sacerdote lo declarará impuro
  alternatives_spanish:
  - el sacerdote lo pronunciará impuro
  - el sacerdote lo hará impuro
  lexicon: HALOT
  rationale: En la legislación de pureza, el sacerdote emite un veredicto ritual; 'declarará impuro' preserva esa función jurídica y evita sugerir que el sacerdote causa la impureza.
- source_word: נֶגַע
  english_pob_choice: infection
  chosen_spanish: plaga
  alternatives_spanish:
  - infección
  - aflicción
  - mancha
  lexicon: HALOT
  rationale: נֶגַע designa una lesión o afección visible. 'Plaga' mantiene el alcance amplio y la fuerza de término técnico tradicional en español bíblico; 'infección' sería más médico moderno pero puede estrechar indebidamente el sentido.
- source_word: צָרַעַת
  english_pob_choice: leprosy
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - afección cutánea
  lexicon: HALOT
  rationale: Sigo la revisión más reciente del POB inglés, que volvió a 'leprosy' por reflejar mejor צָרַעַת en la tradición de traducción. En español, 'lepra' conserva esa correspondencia tradicional, aunque en nota debe entenderse en el marco amplio de las leyes de pureza y no como diagnóstico médico moderno exacto.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es una
  alternatives_spanish:
  - esto es una
  - se trata de una
  lexicon: HALOT
  rationale: La cópula identificativa en español fluye naturalmente como 'es una', con el antecedente implícito retomando la afección descrita.
theological_decisions:
- issue: Alcance de צָרַעַת en la legislación de pureza
  english_pob_reading: leprosy
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección cutánea
  rationale: La tradición de traducción usa 'lepra', y el audit trail inglés decidió volver a esa forma para reflejar mejor el término fuente. En español se conserva 'lepra' por fidelidad terminológica, sin afirmar que el texto describa exactamente la lepra moderna (enfermedad de Hansen).
  doctrine_reference: Translation philosophy §1; §6
- issue: Función sacerdotal de declarar impuro
  english_pob_reading: the priest shall pronounce him unclean
  chosen_spanish_reading: el sacerdote lo declarará impuro
  alternative_spanish_readings:
  - el sacerdote lo hará impuro
  - el sacerdote lo pronunciará impuro
  rationale: La legislación presenta al sacerdote como examinador y juez ritual. 'Declarará impuro' mantiene el carácter veredictivo del acto y evita una lectura causal que no está exigida por el hebreo.
  doctrine_reference: Purity-law context of Leviticus 13
translation_notes:
  revision_awareness: La revisión más reciente del POB inglés cambió de 'skin disease' a 'leprosy' para reflejar mejor צָרַעַת y evitar una frase poco natural. Esta versión española sigue esa decisión, conservando 'lepra' en el texto principal y explicando en nota su alcance semántico más amplio.
  spanish_consistency_notes:
  - Se mantiene 'sacerdote' para כֹּהֵן en todo el registro.
  - '''Declarará impuro'' preserva el valor veredictivo de וְטִמֵּא sin convertirlo en causa física de impureza.'
  - '''En la piel'' traduce בָּעוֹר de forma natural en español y evita una literalidad extraña.'
  - '''Lepra'' queda anotada para evitar una identificación médica anacrónica.'
