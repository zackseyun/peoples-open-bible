translation:
  language: es
  text: El rey Asuero impuso un tributo al territorio y a las islas del mar[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «costas» para «islas del mar». El hebreo puede designar islas o regiones costeras marítimas.
    reason: lexical_alternative
  - marker: b
    text: O «impuesto» o «gravamen». El hebreo también puede referirse, en algunos contextos, a trabajo forzado o servicio de corvea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: imposed
  chosen_spanish: impuso
  alternatives_spanish:
  - estableció
  - puso
  lexicon: HALOT
  rationale: En la construcción idiomática שׂוּם מַס עַל, el verbo expresa la acción administrativa de imponer un tributo. «Impuso» reproduce bien esa fuerza en español natural sin perder el matiz fiscal.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: 'Se conserva el título real con artículo, como corresponde al español cuando se nombra a un soberano concreto: «el rey Asuero».'
- source_word: אחשרש
  english_pob_choice: Ahasuerus
  chosen_spanish: Asuero
  alternatives_spanish:
  - Ahasuero
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma bíblica asentada en español «Asuero», que identifica de manera clara al personaje sin introducir una transliteración innecesaria.
- source_word: מַס
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - impuesto
  - tributo fiscal
  - contribución
  lexicon: HALOT
  rationale: El hebreo מַס puede referirse a tributo, impuesto o trabajo forzado. Aquí, por el alcance sobre la tierra y las islas del mar, «tributo» conserva mejor el sentido imperial/político que «impuesto» y evita forzar la idea de corvea.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - contra
  lexicon: HALOT
  rationale: «Sobre» refleja con naturalidad la relación de imposición en español y reproduce la preposición hebrea sin rigidizarla.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: Aquí הָאָרֶץ puede ser el territorio sometido al imperio. «La tierra» mantiene la amplitud geográfica del hebreo sin restringirlo a «país».
- source_word: וְאִיֵּי הַיָּם
  english_pob_choice: and the islands of the sea
  chosen_spanish: y las islas del mar
  alternatives_spanish:
  - y las costas del mar
  - y las costas marítimas
  lexicon: HALOT
  rationale: Se conserva la expresión literal «islas del mar» porque el hebreo permite tanto islas como regiones costeras. En el texto principal se mantiene la imagen geográfica amplia; la alternativa se documenta en nota.
theological_decisions:
- issue: 'Alcance de מַס: tributo, impuesto o trabajo forzado'
  english_pob_reading: tribute, with note that the Hebrew can also refer to tax, levy, or forced labor/corvée in some contexts
  chosen_spanish_reading: tributo
  alternative_spanish_readings:
  - impuesto
  - tributo con matiz de servicio forzado
  - levo/levy
  rationale: El contexto imperial y geográfico favorece un cargo económico/político general. «Tributo» conserva la amplitud semántica que el inglés POB deja abierta, sin decidir innecesariamente por «trabajo forzado» en este versículo.
  doctrine_reference: Ninguna; decisión léxico-contextual.
translation_notes:
  revision_awareness: El texto fuente y el audit trail en inglés muestran alta concordancia y sin revisiones aplicadas; esta versión española sigue esa lectura estable sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Asuero» es la forma española bíblica establecida para el nombre propio.
  - Se conserva la ambigüedad documentada de מַס mediante nota, sin reducirla a un solo sentido técnico.
  - La expresión «islas del mar» se mantiene literal por fidelidad al hebreo y por concordancia con el POB inglés.
