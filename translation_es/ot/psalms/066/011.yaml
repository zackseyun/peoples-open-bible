review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y la teología del hebreo: mantiene la segunda persona dirigida a Dios, la entrada en un lugar de captura/confinamiento, y la imposición de sufrimiento sobre el cuerpo. Sin embargo, «has llevado» no es la mejor equivalencia para הֲבֵאתָנוּ en este contexto; «nos metiste» o «nos hiciste entrar» expresa mejor el sentido causativo de introducir en una trampa/red. Además, el perfecto compuesto suena menos natural en este salmo que el pretérito simple.'
  spanish_quality_summary: El texto es legible y digno, pero «Tú nos has llevado a la red» suena algo calcado y menos idiomático en español bíblico/literario. «Nos metiste en la red» fluye mejor y conserva la fuerza de agencia divina. «Sobre nuestros lomos» es entendible y formal, aunque la nota actual para [b] no añade una verdadera alternativa; conviene enfocarla en el valor corporal de «lomos».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección de «aflicción» es adecuada para מוּעָקָה, y «lomos» preserva bien מָתְנֵינוּ en línea con la revisión inglesa a «loins». La alternativa de מְצוּדָה como «fortaleza/trampa» está bien documentada en nota.
  issues:
  - severity: medium
    issue: «has llevado» debilita el sentido de introducir/causar entrada de הֲבֵאתָנוּ
    rationale: El hifil de בוא aquí, con בַמְּצוּדָה, se entiende mejor como ‘meter/hacer entrar’ en una red o trampa, no simplemente ‘llevar’. En español, «nos metiste en la red» reproduce mejor la imagen de captura.
  - severity: low
    issue: Uso del perfecto compuesto («has llevado / has puesto») en lugar del pretérito simple
    rationale: 'En el registro poético bíblico en español, el pretérito simple suele sonar más natural y más ajustado a la secuencia narrativa del salmo: «nos metiste… pusiste…».'
  - severity: low
    issue: La nota [b] puede formularse con mayor precisión
    rationale: La nota actual repite la imagen general, pero puede aclarar mejor que «lomos» traduce el hebreo de la zona lumbar/cintura y preserva la imagen corporal tradicional.
  revised_spanish_text: Tú nos metiste en la red[a]; pusiste aflicción sobre nuestros lomos[b].
  revised_footnotes:
