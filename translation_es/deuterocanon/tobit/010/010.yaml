revisions:
- from: 'Y Tobías dijo[a]: «Envíame a mi padre».'
  to: 'Y Tobías dijo[a]: «Déjame partir hacia mi padre»'
  rationale: Se sustituye «Envíame a mi padre» por «Déjame partir hacia mi padre» para eliminar una ambigüedad idiomática del español y expresar con mayor claridad la petición de ser enviado/dejado ir en dirección al padre, sin añadir «casa» ni «de vuelta».
