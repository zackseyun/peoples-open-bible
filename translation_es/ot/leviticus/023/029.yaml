translation:
  language: es
  text: Porque toda persona que no se humille[a] en este mismo día será cortada[b] de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se aflija». El hebreo alude a la autohumillación o autoaflicción, tradicionalmente asociada con el ayuno.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa la fórmula legal de «ser cortado», sin precisar el mecanismo de la sanción.
    reason: theological_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto legal-explicativo, כִּי introduce la razón o fundamento de la norma anterior. «Porque» conserva bien esa relación causal/expositiva en español sin añadir matices ajenos.
- source_word: כָל הַנֶּפֶשׁ
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - toda alma
  - todo individuo
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa a la persona completa, no a una entidad técnica separable del cuerpo. «Toda persona» evita cargar «alma» con un sentido antropológico posterior y es natural en español jurídico.
- source_word: אֲשֶׁר לֹא תְעֻנֶּה
  english_pob_choice: who does not humble himself
  chosen_spanish: que no se humille
  alternatives_spanish:
  - que no se aflija
  - que no practique la autoaflicción
  lexicon: HALOT
  rationale: El verbo ענה en este contexto de Levítico alude a humillarse/afligirse en actitud de penitencia y negación de sí, tradicionalmente vinculada con el ayuno. «Se humille» comunica bien el sentido de auto-humillación sin reducirlo solo a sufrimiento físico; «se aflija» queda como alternativa formal fiel al matiz más literal.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on this very day
  chosen_spanish: en este mismo día
  alternatives_spanish:
  - en este día mismo
  - en ese mismo día
  lexicon: HALOT
  rationale: עֶצֶם intensifica la expresión temporal. «Este mismo día» reproduce la fuerza enfática de «very day» con naturalidad en español.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será eliminada
  - será excluida
  lexicon: HALOT
  rationale: El nifal de כרת en lenguaje de pacto conserva la fórmula tradicional «ser cortado». En español, «será cortada» mantiene esa imagen jurídica y teológica sin especificar el mecanismo del juicio.
- source_word: מֵעַמֶּיהָ
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su pueblo
  - de en medio de su pueblo
  lexicon: HALOT
  rationale: Aunque el sufijo concuerda gramaticalmente con נֶפֶשׁ (femenino), el referente es genérico. «De entre su pueblo» expresa mejor la separación/corte implícita en כרת y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Sentido del mandato de «afligirse/humillarse» en el Día de la Expiación
  english_pob_reading: Render the idiom as 'humble himself' in the main text.
  chosen_spanish_reading: «se humille» en el texto principal.
  alternative_spanish_readings:
  - «se aflija»
  - «se niegue a sí mismo»
  rationale: La expresión hebrea en Levítico 16:29; 23:27, 29, 32 apunta a una práctica de auto-humillación asociada con ayuno y penitencia. «Se humille» transmite mejor la postura espiritual general en español moderno, sin reducir el mandato a una sola práctica corporal. La alternativa más formal «se aflija» se conserva como opción semántica legítima.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de la sanción «ser cortado»
  english_pob_reading: Retain the traditional legal formula 'shall be cut off' without defining whether the sanction is death, expulsion, or divine judgment.
  chosen_spanish_reading: Mantener la fórmula legal «será cortada» sin precisar el mecanismo de la sanción.
  alternative_spanish_readings:
  - será excluida
  - será removida
  rationale: El hebreo no determina aquí si la sanción implica ejecución humana, expulsión, esterilidad o juicio directo de Dios. Conservar la fórmula deja abierta esa tensión interpretativa en lugar de resolverla prematuramente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios en la lectura base inglesa ni necesidad de ajustes adicionales; la redacción española conserva la misma equivalencia óptima y la misma tensión interpretativa sobre ''ser cortado''.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «alma» en el texto principal para respetar el valor antropológico de נֶפֶשׁ en este contexto.
  - La fórmula «será cortada» conserva la carga jurídica tradicional sin especificar el tipo de juicio.
  - La voz reflexiva «se humille» refleja mejor el matiz de autoaflicción/penitencia que una simple pasiva impersonal.
