translation:
  language: es
  text: Por tanto, tú eres grande[a], Señor Yahvé, porque no hay nadie como tú y no hay Dios aparte de ti[b], conforme a todo lo que hemos oído con nuestros oídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Señor Yahvé». En este proyecto se conserva el nombre divino en español para reflejar el Tetragrámaton y evitar la convención de sustituirlo por «SEÑOR».'
    reason: source_note
  - marker: b
    text: O «y no hay Dios fuera de ti» / «no hay otro Dios sino tú».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Entonces
  lexicon: HALOT
  rationale: La expresión introduce una conclusión inferida de la oración anterior; «Por tanto» conserva el valor lógico y suena natural en español bíblico contemporáneo.
- source_word: גָּדַ֖לְתָּ
  english_pob_choice: you are great
  chosen_spanish: eres grande
  alternatives_spanish:
  - has mostrado tu grandeza
  - eres exaltado
  lexicon: HALOT
  rationale: El perfecto hebreo aquí funciona como afirmación doxológica del estado o reconocimiento de grandeza. «Eres grande» es idiomático y evita sobreexplicar el matiz.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Yahweh
  - Señor el Yahvé
  lexicon: HALOT
  rationale: Se conserva la combinación del título de soberanía con el nombre divino. El POB en español debe reflejar el nombre propio divino como «Yahvé», no ocultarlo con una convención tipográfica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la afirmación anterior; «porque» es la forma más natural y transparente en español.
- source_word: אֵין כָּמוֹךָ
  english_pob_choice: there is none like you
  chosen_spanish: no hay nadie como tú
  alternatives_spanish:
  - no hay nadie semejante a ti
  - no existe otro como tú
  lexicon: HALOT
  rationale: La fórmula hebrea de incomparabilidad se expresa con una negación personal natural en español, manteniendo el sentido sin hacerlo más abstracto de lo necesario.
- source_word: וְאֵין אֱלֹהִים זֽוּלָתֶךָ
  english_pob_choice: and there is no God besides you
  chosen_spanish: y no hay Dios fuera de ti
  alternatives_spanish:
  - y no hay Dios aparte de ti
  - y no hay otro Dios que tú
  lexicon: HALOT
  rationale: «Fuera de ti» reproduce bien el valor excluyente de זולתך y mantiene la confesión monoteísta sin suavizarla. Se conserva «Dios» con mayúscula por referencia al único Dios verdadero.
- source_word: בְּכֹל אֲשֶׁר שָׁמַעְנוּ בְּאָזְנֵינוּ
  english_pob_choice: according to all that we have heard with our ears
  chosen_spanish: conforme a todo lo que hemos oído con nuestros oídos
  alternatives_spanish:
  - según todo lo que hemos oído con nuestros oídos
  - de acuerdo con todo lo que hemos oído con nuestros oídos
  lexicon: HALOT
  rationale: Se conserva el valor preposicional y la expresión enfática «con nuestros oídos», que en español suena natural y refleja la fuente recibida por testimonio.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Yahweh
  - Señor el Señor
  rationale: El texto hebreo usa explícitamente el nombre YHWH. Siguiendo la línea doctrinal del proyecto, se preserva el nombre «Yahvé» en español para no enmascarar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Confesión de exclusividad divina en אֵין אֱלֹהִים זֽוּלָתֶךָ
  english_pob_reading: there is no God besides you
  chosen_spanish_reading: no hay Dios fuera de ti
  alternative_spanish_readings:
  - no hay Dios aparte de ti
  - no hay otro Dios que tú
  rationale: La formulación expresa exclusividad sin añadir explicación filosófica. «Fuera de ti» conserva el matiz excluyente de זולתי y mantiene la tensión monoteísta del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: el texto permanece sin cambios respecto del último pase auditado, con acuerdo alto entre revisiones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה, en coherencia con la terminología del proyecto.
  - «Dios» se usa en singular y con mayúscula cuando el contexto es confesional y exclusivo.
  - La sintaxis conserva la relación lógica causal/inferencial del hebreo sin ampliar el contenido.
  - No se introduce vocabulario eclesiástico tradicional donde el hebreo pide una confesión directa y sobria.
