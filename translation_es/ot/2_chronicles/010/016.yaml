translation:
  language: es
  text: 'Y todo Israel, porque el rey no les escuchó, respondió al rey, diciendo: «¿Qué parte tenemos nosotros en David? No tenemos herencia en el hijo de Isaí. ¡Cada hombre[a] a tus tiendas[b], oh Israel! Ahora mira por tu casa, David». Así se fue todo Israel a sus tiendas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «Cada hombre a tus tiendas, oh Israel» usa un sustantivo singular masculino de modo distributivo.
    reason: cultural_note
  - marker: b
    text: 'O, de manera más dinámica: «a tus hogares». El hebreo dice literalmente «a tus tiendas», un modismo para dispersarse a su propio lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  english_pob_choice: listen to
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  lexicon: HALOT
  rationale: En este contexto no es mera percepción auditiva, sino atender o hacer caso a la petición del pueblo; «escuchó» conserva ese valor de oír con atención y respuesta implícita.
- source_word: וַיָּשִׁיבוּ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - les respondió
  lexicon: HALOT
  rationale: El hebreo usa una forma de «volver» con el sentido idiomático de dar respuesta. En español, «respondió» expresa con naturalidad la acción sin perder el valor de réplica formal.
- source_word: חֵלֶק
  english_pob_choice: share
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - participación
  lexicon: HALOT
  rationale: '«Parte» reproduce bien la pregunta política de afiliación o pertenencia: «¿Qué parte tenemos nosotros en David?». Mantiene la metáfora de participación asignada sin volverla abstracta.'
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - herencia patrimonial
  - posesión heredada
  lexicon: HALOT
  rationale: «Herencia» preserva el matiz de posesión transmitida por linaje y derecho de familia; en este verso conviene mantener la resonancia dinástica que el contexto exige.
- source_word: בְּבֶן יִשַׁי
  english_pob_choice: in the son of Jesse
  chosen_spanish: en el hijo de Isaí
  alternatives_spanish:
  - con el hijo de Isaí
  lexicon: HALOT
  rationale: Se mantiene la preposición «en» porque el hebreo expresa pertenencia o participación en la línea de David, no simple asociación externa.
- source_word: אִישׁ
  english_pob_choice: Each man
  chosen_spanish: Cada hombre
  alternatives_spanish:
  - Cada uno
  - Cada cual
  lexicon: HALOT
  rationale: El sustantivo masculino singular tiene fuerza distributiva. «Cada hombre» conserva esa forma y el tono vocativo tradicional del pasaje sin neutralizar el marcaje del original.
- source_word: לְאֹהָלֶיךָ
  english_pob_choice: to your tents
  chosen_spanish: a tus tiendas
  alternatives_spanish:
  - a vuestras tiendas
  - a vuestros hogares
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «tiendas», que en el contexto funciona como fórmula idiomática de dispersión y retirada política. Esto mantiene la textura histórica del hebreo.
- source_word: רְאֵה בֵיתְךָ
  english_pob_choice: see to your own house
  chosen_spanish: mira por tu casa
  alternatives_spanish:
  - cuida de tu casa
  - atiende tu casa
  lexicon: HALOT
  rationale: 'La expresión es idiomática y despectiva en el contexto: se ordena a David atender sus propios asuntos dinásticos. «Mira por tu casa» conserva el imperativo y la carga pragmática sin sobreexplicar.'
- source_word: לְאֹהָלָיו
  english_pob_choice: to their tents
  chosen_spanish: a sus tiendas
  alternatives_spanish:
  - a sus hogares
  - a sus casas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular morfológico con sentido colectivo, el español natural exige el distributivo plural. «A sus tiendas» preserva tanto la imagen como el sentido colectivo.
theological_decisions:
- issue: Término distributivo masculino אִישׁ
  english_pob_reading: Each man
  chosen_spanish_reading: Cada hombre
  alternative_spanish_readings:
  - Cada uno
  - Todos
  rationale: Se conserva la referencia masculina singular/distributiva del hebreo en vez de suavizarla a una forma neutral. La traducción sigue la forma explícita del texto fuente y evita perder el relieve gramatical.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Fórmula de repudio político-covenantal
  english_pob_reading: What share do we have in David? We have no inheritance in the son of Jesse.
  chosen_spanish_reading: ¿Qué parte tenemos nosotros en David? No tenemos herencia en el hijo de Isaí.
  alternative_spanish_readings:
  - ¿Qué participación tenemos en David? No tenemos porción en el hijo de Isaí.
  rationale: Se mantiene la formulación retórica y de alianza dinástica del hebreo, evitando convertirla en una paráfrasis política moderna. La combinación «parte / herencia» conserva la tensión entre participación y derecho heredado.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Sin cambios respecto al pasaje de control en inglés: la revisión más reciente indicó que no hacía falta modificar la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no se presenta.
  - Se conserva la imagen concreta de «tiendas» por fidelidad al modismo hebreo y para alinearse con la política POB de no sustituir automáticamente el tropo por «hogares».
  - «Hijo de Isaí» sigue el patrón onomástico esperado para David y conserva la referencia dinástica del original.
