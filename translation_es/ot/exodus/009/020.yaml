    text: 'O: «Quien entre los siervos de Faraón temía la palabra de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hizo huir»; es decir, los puso rápidamente bajo resguardo.'
    reason: lexical_alternative
  revision_rationale: 'La revisión mejora la naturalidad del español y refleja con más precisión el partitivo hebreo («de entre los siervos de Faraón») y el participio sustantivado («el que temía»). También ajusta el verbo principal para conservar la urgencia de הֵנִיס sin duplicar torpemente la idea de movimiento ya expresada por «en las casas». Se mantienen intactos los términos doctrinales y léxicos clave: «Yahvé», «la palabra de Yahvé», «sus siervos», «su ganado» y «las casas».'
