    issue: «la casa» para הַבַּיִת en el texto principal
    rationale: Aunque es literal, en Ezequiel 41 el referente arquitectónico específico es el templo. El audit trail inglés documenta que debe aclararse en el texto principal para evitar ambigüedad moderna.
  - severity: medium
    issue: Notas [a] y [b] mal ancladas
    rationale: El marcador [a] está puesto en «casa» pero la nota [a] habla de «ancho/anchura»; el marcador [b] está en «área separada» pero la nota [b] explica «la casa». Esto rompe la correspondencia exigida entre texto y notas.
  - severity: low
