translation:
  language: es
  text: 'El nombre de la esposa de Abisur era Abihail[a][b], y ella le dio hijos: Ahban y Molid.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La conjunción inicial hebrea puede reflejarse literalmente como ‘Y el nombre...’; en español genealógico puede omitirse sin pérdida de sentido.
    reason: lexical_alternative
  - marker: b
    text: Abihail también puede transliterarse ‘Abihayil’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  english_pob_choice: The name
  chosen_spanish: El nombre
  alternatives_spanish:
  - Y el nombre
  - Ahora bien, el nombre
  lexicon: HALOT
  rationale: שֵׁם significa ‘nombre’. En español, como en el inglés POB, el conjunto introducido por וְ puede expresarse de forma natural sin repetir una conjunción explícita pesada; ‘El nombre’ conserva el arranque nominal de la cláusula genealógica.
- source_word: אֵשֶׁת
  english_pob_choice: wife of
  chosen_spanish: la esposa de
  alternatives_spanish:
  - la mujer de
  - la esposa
  lexicon: HALOT
  rationale: La forma constructa aquí indica relación conyugal; ‘esposa de’ es preciso y natural en español genealógico.
- source_word: אֲבִישׁוּר
  english_pob_choice: Abishur
  chosen_spanish: Abisur
  alternatives_spanish:
  - Abishur
  lexicon: transliteración de nombre propio
  rationale: Se translitera el nombre propio de manera coherente con el español bíblico, adaptando la secuencia consonántica al uso español. La forma ‘Abisur’ evita una grafía híbrida innecesaria.
- source_word: אֲבִיהָיִל
  english_pob_choice: Abihail
  chosen_spanish: Abihail
  alternatives_spanish:
  - Abihayil
  lexicon: transliteración de nombre propio
  rationale: Se conserva la transliteración tradicional de este nombre propio; la variante más fonética ‘Abihayil’ queda como alternativa posible, pero ‘Abihail’ es más reconocible y estable.
- source_word: וַתֵּלֶד
  english_pob_choice: she bore
  chosen_spanish: ella le dio a luz a
  alternatives_spanish:
  - ella dio a luz
  - ella parió
  lexicon: HALOT
  rationale: En genealogías, el hebreo ילד puede renderizarse con naturalidad como ‘dio a luz’. Se añade ‘le’ para reflejar que el nacimiento se atribuye a Abisur mediante el dativo לוֹ.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El sufijo pronominal indica que los hijos fueron nacidos para Abisur; en español ‘le’ reproduce ese dativo de manera idiomática.
- source_word: אֶת אַחְבָּן וְאֶת מוֹלִיד
  english_pob_choice: Ahban and Molid
  chosen_spanish: a Ahbán y Mólid
  alternatives_spanish:
  - a Ahban y Molid
  lexicon: transliteración de nombres propios
  rationale: Los dos nombres propios se transliteran; se mantiene la preposición ‘a’ por ser natural en español tras ‘dio a luz’, aunque el marcador hebreo אֶת no se traduzca literalmente.
translation_notes:
  revision_awareness: El inglés POB corrigió ‘bore to him’ a ‘bore him’ para naturalidad. El español sigue esa decisión con ‘le dio a luz’, manteniendo el dativo sin sobrecargar la frase.
  spanish_consistency_notes:
  - Se mantiene un registro genealógico sobrio y publicable.
  - Se preserva la relación conyugal explícita con ‘esposa’.
  - Se transliteran los nombres propios de forma consistente y sin inventar léxico.
  - No se introduce ‘SEÑOR’ ni terminología teológica ajena al versículo.
