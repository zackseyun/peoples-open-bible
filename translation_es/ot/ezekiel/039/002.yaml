translation:
  language: es
  text: Yo te haré volver, te llevaré adelante[a], te haré subir desde el extremo norte[b] y te traeré contra los montes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo difícil también ha sido entendido por algunas traducciones como «dejar solo la sexta parte de ti».
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, «desde las partes más remotas del norte».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֹׁבַבְתִּיךָ
  english_pob_choice: I will turn you around
  chosen_spanish: Yo te haré volver
  alternatives_spanish:
  - Yo te haré dar la vuelta
  - Yo te haré volver atrás
  lexicon: HALOT
  rationale: El hebreo expresa una acción causativa de giro o retorno dirigida por Yahvé. En español, «te haré volver» comunica bien la idea de reorientar el movimiento de Gog sin forzar una localización previa específica. Conserva el matiz de control divino sobre su rumbo.
- source_word: וְשִׁשֵּׁאתִיךָ
  english_pob_choice: lead you on
  chosen_spanish: te llevaré adelante
  alternatives_spanish:
  - te conduciré adelante
  - te impulsaré adelante
  - te haré avanzar
  lexicon: HALOT
  rationale: El verbo es difícil y el audit trail inglés favorece una lectura de movimiento, no la alternativa numérica de «dejar solo la sexta parte». «Te llevaré adelante» mantiene la secuencia de acciones de desplazamiento y suena natural en español, sin introducir una reducción numérica no exigida por el contexto inmediato.
- source_word: וְהַעֲלִיתִיךָ
  english_pob_choice: bring you up
  chosen_spanish: te haré subir
  alternatives_spanish:
  - te llevaré arriba
  - te haré ascender
  lexicon: HALOT
  rationale: El hifil de עלה suele significar hacer subir o traer arriba. «Te haré subir» conserva la direccionalidad ascendente y es una equivalencia directa y clara para lectura pública.
- source_word: מִיַּרְכְּתֵי צָפוֹן
  english_pob_choice: from the far north
  chosen_spanish: desde las partes más lejanas del norte
  alternatives_spanish:
  - desde el extremo del norte
  - desde los confines del norte
  lexicon: HALOT
  rationale: La expresión hebrea señala las extremidades/remotos confines del norte. «Las partes más lejanas del norte» preserva la amplitud geográfica y el tono profético; evita simplificar demasiado la imagen y permite reflejar la nota lexical inglesa sobre una traducción más literal.
- source_word: וַהֲבִאוֹתִיךָ עַל
  english_pob_choice: and bring you against
  chosen_spanish: y te traeré contra
  alternatives_spanish:
  - y te traeré a
  - y te llevaré contra
  lexicon: HALOT
  rationale: Con עַל en un contexto militar, la idea es hostil o adversativa. «Contra» reproduce esa fuerza mejor que un simple «a» y mantiene el sentido de confrontación con los montes de Israel.
- source_word: הָרֵי יִשְׂרָאֵל
  english_pob_choice: the mountains of Israel
  chosen_spanish: los montes de Israel
  alternatives_spanish:
  - las montañas de Israel
  - los montes de Isra’el
  lexicon: HALOT
  rationale: «Montes» es una opción bíblica natural en español para la fórmula territorial de Ezequiel. Conserva el registro profético y la referencia geográfica establecida.
theological_decisions:
- issue: Interpretación de וְשִׁשֵּׁאתִיךָ en una cláusula difícil
  english_pob_reading: 'A movement verb: ''lead you on'''
  chosen_spanish_reading: 'Un verbo de movimiento: «te llevaré adelante»'
  alternative_spanish_readings:
  - «dejaré solo la sexta parte de ti»
  - «te reduciré a una sexta parte»
  rationale: 'El contexto inmediato encadena acciones divinas de desplazamiento: volver, conducir, subir, traer contra. Por eso, la lectura de movimiento encaja mejor que una interpretación numérica. Se preserva la tensión textual sin imponer una solución aritmética incierta.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La base inglesa revisada pasó de «drive you on» a «lead you on» para וְשִׁשֵּׁאתִיךָ. La versión española sigue esa revisión, optando por una formulación de movimiento natural y no violenta («te llevaré adelante») que mantiene la cadena de acciones del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino según el estándar del proyecto, aunque este versículo no lo explicita en la línea textual.
  - «Montes de Israel» se conserva de manera uniforme como fórmula geográfica profética.
  - Se evita «Cristo» o vocabulario litúrgico no presente en el texto.
  - No se introduce una lectura de remanente numérico como texto principal, pues la evidencia favorece el flujo de movimiento.
