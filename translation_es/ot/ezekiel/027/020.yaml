translation:
  language: es
  text: Dedán comerciaba contigo en paños de montura para montar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Dedán era tu comerciante en prendas para montar», pero el sentido exacto del término textil es incierto.'
