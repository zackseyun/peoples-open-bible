translation:
  language: es
  text: Y Judas estaba acampado en Alasá, y tres mil hombres escogidos estaban con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρεβεβληκὼς
  english_pob_choice: was encamped
  chosen_spanish: estaba acampado
  alternatives_spanish:
  - había acampado
  - se hallaba acampado
  lexicon: LSJ
  rationale: 'El participio perfecto en contexto militar expresa un estado resultante: Judas ya se encontraba en posición de campamento. ''Estaba acampado'' conserva ese valor estativo y suena natural en español.'
- source_word: ἐν Ἀλασά
  english_pob_choice: at Alasa
  chosen_spanish: en Alasá
  alternatives_spanish:
  - en Alasa
  lexicon: LSJ
  rationale: El griego usa la preposición locativa ἐν; en español, con un topónimo, 'en' es la correspondencia más directa. Se conserva el nombre transliterado, con acento gráfico para lectura española.
- source_word: τρισχίλιοι
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres mil hombres
  lexicon: LSJ
  rationale: Número cardinal directo y transparente; en español se expresa naturalmente como 'tres mil'.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - soldados
  lexicon: LSJ
  rationale: El griego dice literalmente 'hombres'. Aunque el contexto es militar, 'hombres' evita añadir una especificación no presente en el texto.
- source_word: ἐκλεκτοὶ
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - seleccionados
  lexicon: LSJ
  rationale: '''Escogidos'' reproduce bien la idea de hombres seleccionados y es idiomático en español bíblico sin perder el matiz de elección específica.'
- source_word: μετʼ αὐτοῦ
  english_pob_choice: were with him
  chosen_spanish: con él había
  alternatives_spanish:
  - estaban con él
  - lo acompañaban
  lexicon: LSJ
  rationale: La construcción griega indica simple presencia junto a Judas. En español, 'con él había' expresa de forma natural que esos hombres estaban junto a él, sin agregar una relación causal o de acompañamiento más fuerte que la del original.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios sustanciales; la revisión más reciente lo confirma. La versión española sigue de cerca el valor aspectual del participio perfecto y la literalidad de la enumeración militar, sin introducir glosas interpretativas.
  spanish_consistency_notes:
  - Se conserva 'Alasá' como transliteración del topónimo, alineada con la política del proyecto.
  - Se prefirió 'escogidos' para mantener el sentido de selección militar sin tecnicismos adicionales.
  - Se evitó 'soldados' porque el griego dice 'hombres' y la POB inglesa también mantuvo esa precisión.
