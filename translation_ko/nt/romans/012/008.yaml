id: ROM.12.8
reference: Romans 12:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴτε ὁ παρακαλῶν ἐν τῇ παρακλήσει, ὁ μεταδιδοὺς ἐν ἁπλότητι, ὁ προϊστάμενος ἐν σπουδῇ, ὁ ἐλεῶν ἐν ἱλαρότητι.
base_translation:
  language: en
  yaml_path: translation/nt/romans/012/008.yaml
  text: if exhorting[a], in exhortation; the one who shares, with generosity; the one who leads, with diligence; the one who shows mercy[e][d][c][b], with cheerfulness.
  footnotes:
  - marker: a
    text: Or 'encouraging … in encouragement.' The Greek παρακαλέω / παράκλησις pair can carry both exhorting and encouraging senses.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who gives' or 'the one who contributes.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with sincerity' or 'with simplicity.' The Greek ἁπλότης can denote simplicity/singleness or generosity, depending on context.
    reason: lexical_alternative
  - marker: d
    text: Or 'the one who governs/manages' for 'the one who leads.'
    reason: lexical_alternative
  - marker: e
    text: Or 'with zeal' or 'with earnestness' for 'with diligence.'
    reason: lexical_alternative
translation:
  language: ko
  text: 권면하는 자이면 권면으로, 나누어 주는 자는 후하게, 인도하는 자는 부지런히, 자비를 베푸는 자는 즐거이 할 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἁπλότητι
  english_pob_choice: generosity
  chosen_korean: 후하게
  alternatives_korean:
