translation:
  language: es
  text: Al pueblo de los judíos[a], nuestros amigos, que también mantienen lo justo respecto de nosotros, hemos resuelto hacer el bien, en atención a su buena voluntad hacia nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que también cumplen lo que es justo hacia nosotros». El griego dice literalmente «las cosas justas hacia nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ ἔθνει τῶν Ἰουδαίων
  english_pob_choice: to the nation of the Jews
  chosen_spanish: al pueblo de los judíos
  alternatives_spanish:
  - a la nación de los judíos
  - al pueblo judío
  - a la nación judía
  lexicon: LSJ
  rationale: ἔθνος puede significar 'nación' o 'pueblo'. En español, 'pueblo de los judíos' conserva la referencia colectiva sin sonar tan administrativo o moderno como 'nación de los judíos', y sigue de cerca el dativo destinatario del griego.
- source_word: φίλοις ἡμῶν
  english_pob_choice: our friends
  chosen_spanish: nuestros amigos
  alternatives_spanish:
  - amigos nuestros
  - los que nos son favorables
  lexicon: LSJ
  rationale: La frase funciona como apposición descriptiva. 'Nuestros amigos' reproduce con naturalidad el valor relacional y amistoso del griego.
- source_word: συντηροῦσι
  english_pob_choice: who also maintain
  chosen_spanish: que también mantienen
  alternatives_spanish:
  - que también guardan
  - que también conservan
  - que también observan
  lexicon: LSJ
  rationale: El participio expresa continuidad de conducta. 'Mantienen' comunica la idea de sostener o conservar una actitud u obligación, sin forzar un sentido técnico que el contexto no exige.
- source_word: τὰ πρὸς ἡμᾶς δίκαια
  english_pob_choice: what is right toward us
  chosen_spanish: lo justo respecto de nosotros
  alternatives_spanish:
  - lo que es justo con nosotros
  - sus obligaciones respecto de nosotros
  - lo debido hacia nosotros
  lexicon: LSJ
  rationale: La expresión griega literalmente es 'las cosas justas hacia nosotros'. 'Lo justo respecto de nosotros' preserva la ambigüedad entre rectitud moral y deber relacional, como en la nota inglesa.
- source_word: ἐκρίναμεν
  english_pob_choice: we have decided
  chosen_spanish: hemos resuelto
  alternatives_spanish:
  - hemos decidido
  - hemos determinado
  - hemos juzgado
  lexicon: LSJ
  rationale: En estilo oficial o epistolar, el verbo expresa una determinación formal. 'Hemos resuelto' suena natural en español y mantiene el tono de decreto.
- source_word: ἀγαθοποιῆσαι
  english_pob_choice: to do good
  chosen_spanish: hacerles bien
  alternatives_spanish:
  - hacer el bien
  - beneficiarlos
  - mostrarles favor
  lexicon: LSJ
  rationale: El infinitivo significa hacer bien o actuar con benevolencia. En este contexto, 'hacerles bien' transmite el beneficio concreto hacia el destinatario con buen español.
- source_word: χάριν
  english_pob_choice: because of
  chosen_spanish: en atención a
  alternatives_spanish:
  - a causa de
  - por causa de
  - por
  lexicon: LSJ
  rationale: La partícula introduce la razón de la decisión favorable. 'En atención a' refleja un motivo considerado y formal, apropiado para el registro de una carta real o decreto.
- source_word: τῆς ἑαυτῶν εὐνοίας πρὸς ἡμᾶς
  english_pob_choice: their goodwill toward us
  chosen_spanish: su buena voluntad hacia nosotros
  alternatives_spanish:
  - su benevolencia hacia nosotros
  - su favor hacia nosotros
  - su leal disposición hacia nosotros
  lexicon: LSJ
  rationale: εὔνοια denota buena voluntad, favor o disposición benévola. 'Buena voluntad' es la equivalencia más directa y clara en español, manteniendo el matiz relacional/político del término.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete (1909) y conserva la misma ambigüedad semántica que la nota auditada en inglés para τὰ πρὸς ἡμᾶς δίκαια. No se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió 'hacerles bien' y no una formulación más interpretativa para conservar el tono benévolo oficial del pasaje.
  - Se mantuvo 'nuestros amigos' como apposición natural y fiel al griego, sin convertirlo en una relación técnica o jurídica.
