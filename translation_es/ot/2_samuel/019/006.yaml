review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la secuencia narrativa, el sentido de הֹבַשְׁתָּ como vergüenza pública, y נֶפֶשׁ como vida física preservada. También mantiene correctamente 'casa' y 'concubinas'. Sin embargo, añade una nota en 'dijo' que no responde a una necesidad del lector, y omite en notas el matiz cultural de 'la casa' que sí está documentado en la auditoría inglesa. Además, el anclaje actual de la nota [b] sobre nephesh solo al final puede crear ambigüedad sobre su alcance; conviene reanclarla al primer uso relevante.
  spanish_quality_summary: El español es claro, natural y digno. 'Entonces Joab vino a la casa del rey' suena aceptable, pero 'entró' es más idiomático con 'a la casa'. 'Tus mujeres' para נָשֶׁיךָ es literalmente posible, pero en español bíblico general aquí 'tus esposas' es más claro y evita una ambigüedad moderna innecesaria, mientras que 'concubinas' preserva la distinción social del hebreo. La puntuación y el flujo general son buenos.
  glossary_alignment: 'No hay conflicto con los términos teológicos del proyecto. ''Siervos'' encaja contextualmente para עֲבָדֶיךָ. ''Vida/vidas'' para נֶפֶשׁ sigue la decisión auditada. ''Concubinas'' está bien preservado. La mejora principal es léxica-estilística: ''esposas'' en vez de ''mujeres'' en este contexto doméstico-real.'
  issues:
  - severity: medium
    issue: '''vino a la casa'' suena menos natural que ''entró en la casa'''
    rationale: וַיָּבֹא אֶל ... הַבָּיִת describe entrada al lugar; en español narrativo 'entró en la casa' reproduce mejor el movimiento sin pérdida de sentido.
  - severity: medium
    issue: '''tus mujeres'' es potencialmente ambiguo en español contemporáneo'
    rationale: נָשֶׁיךָ en esta lista de miembros del hogar real se refiere a las esposas. 'Tus esposas' comunica mejor el referente y preserva la distinción con 'concubinas'.
  - severity: low
    issue: La nota [a] sobre 'dijo' es innecesaria y poco útil para el lector
    rationale: La secuencia narrativa wayyiqtol ya está bien representada en el texto principal; una nota explicando 'dijo' no añade información relevante para comprensión o fidelidad.
  - severity: medium
    issue: Falta en notas el matiz contextual de 'la casa' como posible residencia real
    rationale: La auditoría inglesa preserva 'the house' en texto y explica en nota que probablemente se refiere a la residencia real o palacio. Esa ayuda contextual también beneficia al lector español.
  - severity: low
    issue: La nota sobre nephesh está anclada solo al final de la oración
    rationale: Como נֶפֶשׁ aparece primero en 'tu vida' y luego repetidamente, es más claro anclar la nota al primer uso relevante para indicar el alcance semántico.
  revised_spanish_text: 'Entonces Joab entró en la casa del rey[a] y dijo: «Hoy has avergonzado a todos tus siervos, que hoy salvaron tu vida[b], y las vidas de tus hijos y de tus hijas, y las vidas de tus esposas y de tus concubinas».

