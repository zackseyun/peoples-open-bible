revisions:
- from: Y de la ciudad tomó a un oficial[a] que estaba puesto sobre los hombres de guerra, y a siete hombres de entre los que veían el rostro del rey, que se hallaron en la ciudad, y al escriba del jefe del ejército, que alistaba al pueblo de la tierra, y a sesenta hombres del pueblo de la tierra que se hallaban dentro de la ciudad.
  to: Y de la ciudad tomó a un funcionario de la corte[a] que había sido puesto al frente de los hombres de guerra, y a siete hombres de entre los que veían el rostro del rey[b], que se hallaron en la ciudad, y al escriba del jefe del ejército, que alistaba al pueblo de la tierra, y a sesenta hombres del pueblo de la tierra que se hallaban dentro de la ciudad.
  rationale: La revisión afina la fidelidad al hebreo y al expediente inglés sin perder naturalidad en español. 'Funcionario de la corte' refleja mejor סָרִיס en este contexto que el más genérico 'oficial'; 'había sido puesto al frente de' mejora la fluidez de פָקִיד; y se añade la nota requerida para el modismo 'los que veían el rostro del rey', preservando la alternativa explicativa del POB inglés.
