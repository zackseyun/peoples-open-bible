translation:
  language: es
  text: Pero igualmente, aunque la naturaleza y la costumbre y los rasgos de la virtud estaban estrechando para ellos los lazos de la fraternidad[a], los que habían quedado[b] soportaron, por la piedad, al ver a sus hermanos, compadecidos, torturados hasta la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los afectos de la fraternidad», para el griego τὰ τῆς ἀδελφότητος φίλτρα.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «los que habían quedado soportaron por la piedad, al ver a sus hermanos siendo compadecidos y torturados hasta la muerte». El griego concentra varios participios en una sola frase.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φύσεως
  english_pob_choice: nature
  chosen_spanish: la naturaleza
  alternatives_spanish:
  - la condición natural
  - la naturaleza humana
  lexicon: LSJ
  rationale: Naturaleza es el equivalente más directo y transparente para φύσις en este contexto de fuerzas que inclinan afectivamente a los hermanos.
- source_word: συνηθείας
  english_pob_choice: custom
  chosen_spanish: la costumbre
  alternatives_spanish:
  - el hábito
  - la práctica
  lexicon: LSJ
  rationale: La costumbre conserva el matiz de uso adquirido y evita repetir 'hábito' en un pasaje donde ya aparece otro sustantivo abstracto cercano.
- source_word: τῶν τῆς ἀρετῆς ἠθῶν
  english_pob_choice: traits of virtue
  chosen_spanish: los rasgos de la virtud
  alternatives_spanish:
  - las disposiciones de la virtud
  - los hábitos morales de la virtud
  lexicon: LSJ
  rationale: Rasgos de la virtud comunica de modo natural el conjunto de cualidades morales; evita la dureza de 'hábitos morales' y mantiene el paralelismo de los abstractos griegos.
- source_word: τὰ τῆς ἀδελφότητος φίλτρα
  english_pob_choice: the bonds of brotherhood
  chosen_spanish: los lazos de la fraternidad
  alternatives_spanish:
  - los afectos de la fraternidad
  - los vínculos fraternales
  lexicon: LSJ
  rationale: El griego expresa afecto/vínculo fraternal; 'lazos de la fraternidad' preserva la fuerza relacional sin sonar demasiado técnico. Se evita 'afectos' por posible ambigüedad emocional en español.
- source_word: ἀνέσχοντο
  english_pob_choice: endured
  chosen_spanish: resistieron
  alternatives_spanish:
  - soportaron
  - aguantaron
  - perseveraron
  lexicon: LSJ
  rationale: En este marco martirial, resistieron comunica la firmeza activa bajo presión y mantiene el tono de perseverancia del verbo sin volverlo demasiado genérico.
- source_word: διὰ τὴν εὐσέβειαν
  english_pob_choice: because of piety
  chosen_spanish: por la piedad
  alternatives_spanish:
  - a causa de la piedad
  - por su piedad
  - por devoción a Dios
  lexicon: LSJ
  rationale: Piedad reproduce el vocabulario teológico clave de 4 Macabeos para la devoción reverente a Dios, sin desplazar el término hacia una explicación más larga.
- source_word: οἱ ὑπολελειμμένοι
  english_pob_choice: those who were left behind
  chosen_spanish: los que habían quedado
  alternatives_spanish:
  - los que quedaron
  - los sobrevivientes
  lexicon: LSJ
  rationale: '''Los que habían quedado'' es natural en español y conserva la referencia a quienes permanecen vivos en ese momento, sin implicar una conclusión final como ''sobrevivientes''.'
- source_word: τοὺς κατοικτιζομένους
  english_pob_choice: who were being pitied
  chosen_spanish: que estaban siendo dignos de compasión
  alternatives_spanish:
  - que eran compadecidos
  - que estaban siendo compadecidos
  lexicon: LSJ
  rationale: 'El participio admite una lectura pasiva: los hermanos eran objeto de compasión mientras sufrían. ''Dignos de compasión'' preserva la idea sin forzar una construcción poco idiomática.'
- source_word: μέχρι θανάτου βασανιζομένους
  english_pob_choice: being tortured to death
  chosen_spanish: torturados hasta la muerte
  alternatives_spanish:
  - siendo torturados hasta morir
  - torturados hasta morir
  lexicon: LSJ
  rationale: La frase transmite duración del tormento hasta el punto de la muerte; 'torturados hasta la muerte' es claro y fiel, y mantiene el peso trágico del giro griego.
theological_decisions:
- issue: Renderizar εὐσέβεια en contexto de martirio
  english_pob_reading: piety
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - reverencia
  - piedad para con Dios
  rationale: 4 Macabeos usa εὐσέβεια como virtud central de fidelidad a Dios. 'Piedad' conserva el término-teología del libro y evita sobreexplicar con una perífrasis más interpretativa.
  doctrine_reference: 'DOCTRINE.md: key-term consistency; martyrdom piety vocabulary'
- issue: Mantener el lenguaje fraternal del griego
  english_pob_reading: their brothers / bonds of brotherhood
  chosen_spanish_reading: sus hermanos / los lazos de la fraternidad
  alternative_spanish_readings:
  - sus hermanos / los vínculos fraternos
  - sus hermanos / la hermandad
  rationale: El texto griego insiste en ἀδελφός/ἀδελφότης. En español, 'hermanos' y 'fraternidad' preservan ese campo semántico sin neutralizarlo.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir 'lazos de la fraternidad' para φίλτρα, 'costumbre' para συνηθείας y una solución que preserve el participio κατοικτιζομένους como lectura pasiva. En español, se optó por una sintaxis más fluida, pero sin perder la acumulación de abstracciones ni el orden causal del original.
  spanish_consistency_notes:
  - Se mantiene 'piedad' como término teológico estable para εὐσέβεια en 4 Macabeos.
  - Se traduce τὸ ἀδελφότητος con 'fraternidad' y ἀδελφοὺς con 'hermanos' para conservar el campo léxico fraternal.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; el verso no contiene un nombre divino explícito.
  - '''Torturados hasta la muerte'' conserva el valor intensivo de μέχρι θανάτου βασανιζομένους sin suavizarlo.'
