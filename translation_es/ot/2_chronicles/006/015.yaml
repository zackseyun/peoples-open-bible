  - severity: low
    issue: La puntuación en «David, mi padre» puede sonar algo más parentética de lo necesario.
    rationale: «David mi padre» o «mi padre David» fluye con más naturalidad en español continuo. No es un error de sentido, pero una leve mejora estilística ayuda a la legibilidad.
