revisions:
- from: Yahvé está exaltado[a], porque mora en las alturas; ha llenado a Sion con justicia y rectitud.
  to: Yahvé está exaltado, porque mora en las alturas[a]; ha llenado Sion con justicia y rectitud.
  rationale: Se revisa para corregir la ubicación del marcador de nota, de modo que la alternativa léxica se aplique a שֹׁכֵן מָרוֹם y no a «exaltado». También se mejora levemente la naturalidad del español eliminando la preposición personal en «ha llenado Sion». La nota se formula como verdadera alternativa breve en español para la expresión espacial hebrea.
