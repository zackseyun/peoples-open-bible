translation:
  language: es
  text: Y tú[a], hijo de hombre, toma para ti un ladrillo, ponlo delante de ti y graba en él una ciudad, Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inscribe en él» o «dibuja en él». El verbo hebreo puede referirse a grabar o inscribir; aquí describe la creación de una representación de Jerusalén en el ladrillo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Mantiene la forma literal del hebreo, como hace la POB en inglés, y conserva el valor vocativo recurrente en Ezequiel sin suavizarlo a una paráfrasis interpretativa.
- source_word: לְבֵנָה
  english_pob_choice: a brick
  chosen_spanish: un ladrillo
  alternatives_spanish:
  - una baldosa de barro
  - un bloque de barro
  lexicon: HALOT
  rationale: El término designa una pieza de adobe o ladrillo; en español, 'ladrillo' es el equivalente más directo y natural. 'Baldosa' o 'bloque' introducirían una especificación no exigida por el hebreo.
- source_word: וְנָתַתָּה אוֹתָהּ לְפָנֶיךָ
  english_pob_choice: set it before you
  chosen_spanish: ponlo delante de ti
  alternatives_spanish:
  - colócalo delante de ti
  - ponlo enfrente de ti
  lexicon: HALOT
  rationale: La idea es colocar el objeto ante el profeta. 'Ponlo delante de ti' reproduce bien la fuerza espacial del hebreo y suena natural en español.
- source_word: וְחַקּוֹתָ עָלֶיהָ
  english_pob_choice: engrave on it
  chosen_spanish: graba sobre él
  alternatives_spanish:
  - inscribe sobre él
  - dibuja sobre él
  lexicon: HALOT
  rationale: El verbo puede abarcar grabar o inscribir. Como el soporte es un ladrillo, 'graba' conserva mejor la fuerza concreta del gesto que 'dibuja', sin excluir la posibilidad de una representación inscrita.
- source_word: עִיר אֶת יְרוּשָׁלִָם
  english_pob_choice: a city, Jerusalem
  chosen_spanish: una ciudad, Jerusalén
  alternatives_spanish:
  - la ciudad, Jerusalén
  - una ciudad llamada Jerusalén
  lexicon: HALOT
  rationale: 'El hebreo presenta una apposición: ''ciudad, Jerusalén''. En español, la coma refleja de modo natural esa relación sin añadir un artículo no presente en el sustantivo hebreo.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó la puntuación de una apposición ('city, Jerusalem') sin cambiar el contenido léxico. La versión española refleja esa misma relación appositiva con coma, manteniendo el valor verbal concreto de 'grabar'.
  spanish_consistency_notes:
  - Se conserva 'hijo de hombre' para el vocativo profético recurrente en Ezequiel.
  - '''Jerusalén'' queda en aposición con ''una ciudad'' mediante coma, de acuerdo con la relación del hebreo y la revisión inglesa.'
  - Se usa un registro sobrio y directo, compatible con lectura eclesial contemporánea.
