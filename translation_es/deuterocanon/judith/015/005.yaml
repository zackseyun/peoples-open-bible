translation:
  language: es
  text: Pero cuando los hijos de Israel[a] oyeron esto, todos juntos cayeron sobre ellos y siguieron golpeándolos hasta Choba. Del mismo modo, también llegaron los de Jerusalén y los de toda la región montañosa, porque les habían anunciado lo que había ocurrido en el campamento de sus enemigos; y los de Galaad y los de Galilea los rebasaron[b] con una gran matanza[c], hasta que pasaron Damasco y sus fronteras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El griego dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «los flanquearon». El verbo militar también puede sugerir que fueron más allá de ellos o que les cortaron el paso durante la persecución.
    reason: lexical_alternative
  - marker: c
    text: O «con un gran golpe» / «con un gran azote». En este contexto de batalla, la frase probablemente se refiere a una matanza intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: Conservo el giro literal y transparente del griego, que expresa la identidad colectiva con un genitivo familiar. En español, «los hijos de Israel» es natural, fiel y mantiene el paralelismo semítico sin aplanarlo a «israelitas».
- source_word: ὁμοθυμαδόν
  english_pob_choice: all together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - con un mismo ánimo
  - unánimemente
  lexicon: BDAG
  rationale: La idea principal es la acción unida y simultánea. «Todos juntos» es claro en español moderno y conserva el sentido colectivo sin introducir una formulación demasiado interpretativa.
- source_word: ἐπέπεσον ἐπʼ αὐτούς
  english_pob_choice: fell upon them
  chosen_spanish: cayeron sobre ellos
  alternatives_spanish:
  - atacaron contra ellos
  - se lanzaron sobre ellos
  lexicon: LSJ
  rationale: El verbo conserva la imagen violenta del ataque súbito. «Cayeron sobre ellos» reproduce bien el valor idiomático del griego en un registro bíblico natural.
- source_word: ἔκοπτον αὐτούς
  english_pob_choice: kept striking them down
  chosen_spanish: siguieron golpeándolos
  alternatives_spanish:
  - siguieron derribándolos
  - los iban derribando
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua. Opto por «siguieron golpeándolos» para mantener la reiteración del ataque sin forzar un matiz demasiado específico de arma o ejecución, que el griego no exige de forma exclusiva.
- source_word: ἕως Χωβά
  english_pob_choice: as far as Choba
  chosen_spanish: hasta Choba
  alternatives_spanish:
  - hasta Chobá
  - hasta llegar a Choba
  lexicon: LSJ
  rationale: El topónimo se translitera desde el testimonio griego. En español, «hasta Choba» comunica la extensión geográfica del avance; no añado acento porque la forma de uso bíblico puede variar y la fuente aquí es la transliteración griega.
- source_word: οἱ ἐξ Ἰερουσαλήμ
  english_pob_choice: those from Jerusalem
  chosen_spanish: los de Jerusalén
  alternatives_spanish:
  - los que vinieron de Jerusalén
  - los hombres de Jerusalén
  lexicon: LSJ
  rationale: La construcción griega identifica procedencia, no un cargo ni una función. «Los de Jerusalén» es idiomático en español y conserva la referencia de origen de forma sobria.
- source_word: ἐκ πάσης τῆς ὀρεινῆς
  english_pob_choice: from all the hill country
  chosen_spanish: de toda la región montañosa
  alternatives_spanish:
  - de todo el país montañoso
  - de toda la zona montañosa
  lexicon: LSJ
  rationale: «Ὀρεινή» señala una zona alta o montañosa. «Región montañosa» preserva el valor geográfico con claridad; «colinas» sería posible, pero aquí la amplitud regional del contexto favorece esta formulación.
- source_word: ἀνήγγειλαν γὰρ αὐτοῖς τὰ γεγονότα
  english_pob_choice: for the things that had happened had been reported to them
  chosen_spanish: porque les habían anunciado lo que había ocurrido
  alternatives_spanish:
  - porque les habían comunicado los hechos
  - pues les habían contado lo sucedido
  lexicon: LSJ
  rationale: El griego explica la llegada por una noticia previa. «Les habían anunciado lo que había ocurrido» conserva la causalidad y la referencia a hechos ya sucedidos sin perder naturalidad en español.
- source_word: τῇ παρεμβολῇ τῶν ἐχθρῶν αὐτῶν
  english_pob_choice: the camp of their enemies
  chosen_spanish: el campamento de sus enemigos
  alternatives_spanish:
  - el campamento de los enemigos de ellos
  - el campamento enemigo
  lexicon: LSJ
  rationale: «Campamento» en español moderno comunica mejor el sentido militar de παρεμβολή en este contexto que «campo». Mantengo el posesivo «sus enemigos» porque está en el griego y precisa la referencia.
- source_word: ὑπερεκέρασαν αὐτούς
  english_pob_choice: outflanked them
  chosen_spanish: los superaron
  alternatives_spanish:
  - los flanquearon
  - los envolvieron
  - los cortaron
  lexicon: LSJ
  rationale: El verbo compuesto expresa ir más allá de ellos o sobrepasarlos en la persecución. En español, «los superaron» deja abierto el matiz táctico sin añadir una imagen militar más concreta de la que el texto obliga.
- source_word: πληγῇ μεγάλῃ
  english_pob_choice: with a great slaughter
  chosen_spanish: con una gran matanza
  alternatives_spanish:
  - con un gran golpe
  - con una severa derrota
  - con un gran estrago
  lexicon: LSJ
  rationale: En contexto bélico, πλήγη puede apuntar al resultado devastador del combate. «Gran matanza» expresa el efecto de destrucción masiva que el POB inglés entendió como lectura probable en este pasaje.
- source_word: ἕως οὗ παρῆλθον Δαμασκὸν καὶ τὰ ὅρια αὐτῆς
  english_pob_choice: until they had passed Damascus and its borders
  chosen_spanish: hasta que pasaron Damasco y sus fronteras
  alternatives_spanish:
  - hasta que rebasaron Damasco y sus fronteras
  - hasta pasar Damasco y sus fronteras
  lexicon: LSJ
  rationale: «Pasaron Damasco» reproduce el valor de παρῆλθον como ir más allá de un límite geográfico. «Fronteras» traduce τὰ ὅρια con un término claro y fiel; no lo reduzco a una sola ciudad, porque el texto incluye también su territorio delimitado.
theological_decisions:
- issue: Identidad colectiva de «οἱ υἱοὶ Ἰσραήλ»
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: No hay motivo para suavizar la expresión familiar del griego. Mantenerla ayuda a preservar la forma semítica del texto y evita borrar la tensión entre literalidad e idiomaticidad que el POB documenta en inglés.
  doctrine_reference: Uso bíblico de designaciones étnicas/covenantales en el lenguaje narrativo del AT/Deuterocanónicos
- issue: Sentido militar de πληγῇ μεγάλῃ
  english_pob_reading: with a great slaughter
  chosen_spanish_reading: con una gran matanza
  alternative_spanish_readings:
  - con un gran golpe
  - con una gran herida
  - con una severa derrota
  rationale: En este contexto narrativo de persecución y derrota, la opción más fiel al efecto total del combate es «matanza». Otras opciones son posibles léxicamente, pero debilitan el impacto bélico que el POB inglés ya interpretó.
  doctrine_reference: Lectura narrativa literal de violencia bélica en los libros deuterocanónicos
translation_notes:
  revision_awareness: Se corrigió la validación previa incorporando el marcador [a] directamente en el texto español y manteniendo [b] anclado en la frase correspondiente. No se dejaron notas sueltas sin ancla.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino fuera de este versículo, ya que no aparece en el texto fuente.
  - 'Se preservó el orden narrativo del griego: oído de Israel, ataque conjunto, llegada de Jerusalén y la región montañosa, y luego la expansión de la persecución hasta Damasco.'
  - Se evitó introducir terminología eclesiástica ajena al registro narrativo; se conservó un español bíblico sobrio y publicable.
