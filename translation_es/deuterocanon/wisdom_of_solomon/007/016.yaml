translation:
  language: es
  text: Porque en su mano estamos tanto nosotros como nuestras palabras, y toda prudencia[a] y conocimiento[b] de oficios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo entendimiento'; el griego φρόνησις puede denotar sabiduría práctica o entendimiento prudente.
    reason: lexical_alternative
  - marker: b
    text: O 'de habilidades', 'de artes' o 'de trabajos'; el griego se refiere al conocimiento vinculado con el trabajo especializado o la destreza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ... χειρὶ αὐτοῦ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - bajo su control
  - en su poder
  lexicon: LSJ
  rationale: Conserva el modismo bíblico de dependencia y dominio sin explicitar más de lo que el griego dice. En español, 'en su mano' es natural y mantiene la imagen.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre sujeto explícito preserva el paralelo con 'nuestras palabras' y evita añadir énfasis que el griego no exige.
- source_word: οἱ λόγοι ἡμῶν
  english_pob_choice: our words
  chosen_spanish: nuestras palabras
  alternatives_spanish:
  - nuestro discurso
  - nuestras expresiones
  lexicon: BDAG
  rationale: '''Palabras'' es la correspondencia más directa y amplia para λόγοι en este contexto de habla humana.'
- source_word: πᾶσά τε φρόνησις
  english_pob_choice: all prudence
  chosen_spanish: toda prudencia
  alternatives_spanish:
  - todo entendimiento
  - toda sabiduría práctica
  - todo discernimiento
  lexicon: LSJ
  rationale: '''Prudencia'' refleja mejor el matiz de φρόνησις, como se decidió en el audit trail; ''entendimiento'' sería posible, pero menos preciso para la dimensión práctica de la palabra griega.'
- source_word: ἐργατειῶν
  english_pob_choice: of crafts
  chosen_spanish: de oficios
  alternatives_spanish:
  - de artes
  - de habilidades
  - de trabajos
  lexicon: LSJ
  rationale: '''Oficios'' comunica bien el ámbito de trabajo manual o especializado que sugiere el término griego y suena natural en español bíblico contemporáneo.'
- source_word: ἐπιστήμη
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - experticia
  - pericia
  lexicon: BDAG
  rationale: '''Conocimiento'' es la opción general más fiel y clara aquí; evita tecnicismos y mantiene la coordinación con ''prudencia'' y ''oficios''.'
theological_decisions:
- issue: Referente de αὐτοῦ
  english_pob_reading: his = God
  chosen_spanish_reading: su = Dios (inferido por el contexto)
  alternative_spanish_readings:
