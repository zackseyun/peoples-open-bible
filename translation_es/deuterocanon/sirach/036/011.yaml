translation:
  language: es
  text: En la ira del fuego sea consumido el que escapa[a], y los que cometen injusticia contra tu pueblo encuentren destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el que está siendo salvado» o «preservado». La frase griega es difícil en este contexto y puede referirse a cualquier enemigo que hasta ahora haya escapado de la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ὀργῇ πυρὸς
  english_pob_choice: In the wrath of fire
  chosen_spanish: En la ira del fuego
  alternatives_spanish:
  - en la ira ígnea
  - en el ardor de la ira
  - en fuego de ira
  lexicon: LSJ
  rationale: Conservo la imagen genitiva de πυρὸς como complemento de ὀργῇ, sin convertirla en una mera emoción abstracta. 'Ira del fuego' mantiene la fuerza imagética de una ira destructora ligada al fuego, de modo más literal que 'ira ígnea' y más natural en español que un calco rígido.
- source_word: καταβρωθήτω
  english_pob_choice: let the one who escapes be consumed
  chosen_spanish: sea consumido
  alternatives_spanish:
  - sea devorado
  - sea tragado
  - sea consumido por completo
  lexicon: LSJ
  rationale: El imperativo pasivo pide una acción de juicio sufrida por el sujeto. 'Sea consumido' comunica bien la imagen de ser devorado o destruido por el fuego sin sobrecargar el español con una expresión poco idiomática.
- source_word: ὁ σωζόμενος
  english_pob_choice: the one who escapes
  chosen_spanish: el que escapa
  alternatives_spanish:
  - el sobreviviente
  - el que está siendo salvado
  - el preservado
  lexicon: LSJ
  rationale: Sigo la revisión inglesa que prefirió 'the one who escapes' por ajustarse mejor al contexto hostil. En español, 'el que escapa' conserva esa tensión contextual y evita fijar de antemano un matiz salvífico que aquí resulta ambiguo.
- source_word: οἱ ἀδικοῦντες
  english_pob_choice: those who do injustice
  chosen_spanish: los que hacen injusticia
  alternatives_spanish:
  - los injustos
  - los que obran injustamente
  - los que oprimen
  lexicon: LSJ
  rationale: '''Hacen injusticia'' conserva la fuerza verbal del participio presente y evita especificar más de lo que el griego dice. Es una opción cercana al inglés auditado y suficientemente clara en español.'
- source_word: εὕροισαν ἀπώλειαν
  english_pob_choice: meet destruction
  chosen_spanish: encuentren destrucción
  alternatives_spanish:
  - hallen destrucción
  - sufran ruina
  - encuentren ruina
  lexicon: LSJ
  rationale: El valor optativo/imprecatorio se expresa en español con un subjuntivo exhortativo. 'Encuentren destrucción' reproduce el matiz de 'meet destruction' sin suavizarlo a una mera predicción.
theological_decisions:
- issue: Fuerza imprecatoria de la frase
  english_pob_reading: Retain the prayer for judgment as a direct petition
  chosen_spanish_reading: Mantener la petición de juicio como una súplica directa
  alternative_spanish_readings:
  - Suavizarla como anuncio profético
  - Convertirla en una descripción neutral del destino de los enemigos
  rationale: Tanto el imperativo pasivo como el optativo apuntan a una imprecación. No conviene atenuar el tono de juicio en español; la traducción debe conservar esa tensión teológica y retórica.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla; español moderno legible sin aplanar la gravedad.'
- issue: Sentido de ὁ σωζόμενος en el contexto
  english_pob_reading: The one who escapes / the one being saved/preserved
  chosen_spanish_reading: El que escapa, sin cerrar totalmente la ambigüedad del participio
  alternative_spanish_readings:
  - El sobreviviente
  - El que está siendo salvado
  - El preservado
  rationale: El contexto hostil favorece la idea de alguien que hasta ahora se ha librado. La formulación española conserva la ambigüedad útil del griego, sin imponer una lectura devocional que el contexto no exige.
  doctrine_reference: Sirach 36:11 audit trail; lexical ambiguity preserved where the source is difficult in context.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó la primera cláusula de 'fiery wrath' a 'the wrath of fire' y prefirió 'the one who escapes' frente a 'the survivor'. La versión española refleja esa actualización al mantener la relación literal entre ira y fuego y al traducir ὁ σωζόμενος por 'el que escapa'.
  spanish_consistency_notes:
  - Se usa 'Dios/Yahvé' solo cuando el contexto lo requiera; aquí no aparece el nombre divino en el versículo.
  - Se mantiene 'injusticia' para οἱ ἀδικοῦντες sin cargar el texto con una especificación interpretativa como 'opresión'.
  - El tono exhortativo/subjuntivo en español preserva el carácter imprecatorio del griego.
  - La nota a pie de página marca una alternativa literal que el texto principal conserva implícita en la elección 'ira del fuego'.
