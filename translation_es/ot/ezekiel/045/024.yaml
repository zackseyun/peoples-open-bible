translation:
  language: es
  text: Y como ofrenda de grano[a], hará una efa por cada toro y una efa por cada carnero, y un hin de aceite por cada efa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «preparará» o «proveerá»; el verbo hebreo es literalmente «hará» y, en contexto sacrificial, puede referirse a preparar o proporcionar la ofrenda requerida.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda vegetal
  - ofrenda de cereal
  - oblación
  lexicon: HALOT
  rationale: Aquí מִנְחָה funciona en contexto cultual como ofrenda prescrita, pero en español «ofrenda» comunica con naturalidad sin introducir un término demasiado interpretativo. «Ofrenda vegetal» o «de cereal» sería más explícito, pero el hebreo del versículo no lo especifica; por eso se evita añadir ese matiz en el texto principal.
- source_word: אֵיפָה
  english_pob_choice: ephah
  chosen_spanish: efa
  alternatives_spanish:
  - efa
  - medida efa
  lexicon: HALOT
  rationale: Se conserva la unidad técnica de medida. «Efa» es la forma española habitual y transparente para el lector bíblico; no se reemplaza por una equivalencia moderna aproximada para no perder precisión cultual.
- source_word: לַפָּר
  english_pob_choice: for each bull
  chosen_spanish: por cada toro
  alternatives_spanish:
  - para cada toro
  - por el toro
  lexicon: HALOT
  rationale: El valor distributivo de ל se expresa mejor en español con «por cada». «Toro» traduce el animal sacrificial de forma natural y clara; «para cada toro» también es posible, pero resulta menos fluido aquí.
- source_word: לָאַיִל
  english_pob_choice: for each ram
  chosen_spanish: por cada carnero
  alternatives_spanish:
  - para cada carnero
  - por el carnero
  lexicon: HALOT
  rationale: Se mantiene la misma estructura distributiva que para פָּר. «Carnero» es el equivalente natural de אַיִל en contexto sacrificial y evita ambigüedad.
- source_word: יַעֲשֶׂה
  english_pob_choice: he shall provide
  chosen_spanish: la hará
  alternatives_spanish:
  - la preparará
  - la proveerá
  - la ofrecerá
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hará». En contexto sacrificial puede implicar preparar o proveer la ofrenda requerida, pero el verbo queda aquí más cerca de la forma fuente que en una paráfrasis como «proveerá». El antecedente femenino permite referirlo a «la ofrenda».
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: El hebreo dice simplemente «aceite». «Aceite» es la traducción directa y sobria; no se especifica «de oliva» porque el texto no lo dice.
- source_word: הִין
  english_pob_choice: hin
  chosen_spanish: hin
  alternatives_spanish:
  - medida de hin
  lexicon: HALOT
  rationale: Se conserva la unidad de medida líquida como tecnicismo bíblico. Esto mantiene la correspondencia con el texto fuente y con el audit trail inglés.
- source_word: לָאֵיפָה
  english_pob_choice: for each ephah
  chosen_spanish: por cada efa
  alternatives_spanish:
  - por efa
  - para cada efa
  lexicon: HALOT
  rationale: Se repite la relación distributiva en español para mantener la proporción exacta entre el aceite y la efa. «Por cada efa» es idiomático y refleja bien la estructura del hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo directamente y coincide con el audit trail inglés en las decisiones léxicas principales: מִנְחָה como ofrenda cultual, las unidades técnicas efa y hin, y el verbo עשה mantenido con un pie de nota que conserva la tensión entre la literalidad («hará») y el sentido contextual («preparará/proveerá»). No se aplicaron revisiones posteriores en el expediente inglés.'
  spanish_consistency_notes:
  - Se conserva un registro sobrio y cultual, sin introducciones explicativas que el hebreo no exige.
  - La repetición de «por cada» mantiene la distribución del original y evita ambigüedad.
  - «Efa» y «hin» quedan sin equivalentes modernos para preservar precisión y coherencia terminológica en toda la obra.
  - La nota al pie está anclada en «hará» para reflejar la tensión lexical del verbo hebreo sin ocultarla.
