id: PRO.15.4
reference: Proverbs 15:4
source:
  edition: WLC
  text: מַרְפֵּ֣א לָ֭שׁוֹן עֵ֣ץ חַיִּ֑ים וְ/סֶ֥לֶף בָּ֝֗/הּ שֶׁ֣בֶר בְּ/רֽוּחַ׃
translation:
  text: A healing tongue is a tree of life[b][a], but perverseness in it is a breaking of the spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A wholesome tongue is a tree of life'; מַרְפֵּא can denote healing, health, or wholesomeness.
    reason: lexical_alternative
  - marker: b
    text: Or 'crookedness in it is a fracture to the spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְפֵּא
  chosen: healing
  alternatives:
  - wholesome
  - gentle
  - health-giving
  lexicon: HALOT
  rationale: The noun denotes healing, remedy, or health. 'Healing' preserves the concrete restorative sense without overinterpreting it as merely 'gentle.'
- source_word: לָשׁוֹן
  chosen: tongue
  alternatives:
  - speech
  - language
  lexicon: HALOT
  rationale: Literally 'tongue,' often metonymic for speech. Retaining 'tongue' preserves the Hebrew imagery and proverbial style while remaining clear in English.
- source_word: עֵץ חַיִּים
  chosen: a tree of life
  alternatives:
  - the tree of life
  - a life-giving tree
  lexicon: HALOT
  rationale: The construct phrase is a familiar wisdom expression. 'A tree of life' fits the anarthrous Hebrew and preserves the intertextual resonance with Proverbs and Genesis without forcing identification with the singular Edenic tree.
- source_word: סֶלֶף
  chosen: perverseness
  alternatives:
  - crookedness
  - deceit
  - corruption
  lexicon: HALOT
  rationale: The term conveys distortion or crookedness in speech. 'Perverseness' captures moral and verbal twistedness better than the narrower 'deceit.'
- source_word: בָּהּ
  chosen: in it
  alternatives:
  - in the tongue
  - therein
  lexicon: HALOT
  rationale: The feminine singular suffix most naturally refers back to 'tongue.' 'In it' is concise and preserves the Hebrew pronominal linkage.
- source_word: שֶׁבֶר
  chosen: a breaking
  alternatives:
  - fracture
  - crushing
  - brokenness
  lexicon: HALOT
  rationale: The noun denotes a break, fracture, or collapse. 'A breaking' keeps the metaphor vivid and aligns with the nominal style of the Hebrew clause.
- source_word: בְּרוּחַ
  chosen: of the spirit
  alternatives:
  - in the spirit
  - of the רוח
  - of one's spirit
  lexicon: HALOT
  rationale: In wisdom literature רוּחַ here most naturally refers to the inner spirit rather than wind or the Holy Spirit. 'Of the spirit' expresses the result on a person's inner life in idiomatic English.
