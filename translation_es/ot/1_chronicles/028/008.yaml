base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/028/008.yaml
  text: And now[a], in the sight of all Israel, the assembly of Yahweh, and in the hearing of our God, keep and seek all the commandments of Yahweh your God[b], so that you may possess the good land and leave it as an inheritance to your sons after you forever.
  footnotes:
  - marker: a
    text: Or 'inherit the good land.' The Hebrew verb can carry the sense of inheriting or possessing, depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons'; the term is masculine plural, not the more general 'children.'
    reason: lexical_alternative
