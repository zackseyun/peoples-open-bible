translation:
  language: es
  text: 'Y Finees, hijo de Eleazar, hijo de Aarón, estaba delante de él[a] en aquellos días, diciendo: «¿Volveré otra vez a salir a la guerra contra los hijos de Benjamín, mi hermano, o dejaré de hacerlo?». Y Yahvé dijo: «Sube, porque mañana lo entregaré en tu mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba delante de ella», entendiendo que el pronombre se refiere al arca mencionada en el versículo anterior, y no a Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: וּפִינְחָס
  english_pob_choice: And Phinehas
  chosen_spanish: Y Finees
  alternatives_spanish:
  - Ahora Finees
  lexicon: WLC / HALOT
  rationale: Se conserva la continuidad narrativa del ו con «Y», y el nombre propio se translitera de forma estándar en español bíblico como «Finees».
- source_word: בֶּן אֶלְעָזָר בֶּן אַהֲרֹן
  english_pob_choice: the son of Eleazar, son of Aaron
  chosen_spanish: hijo de Eleazar, hijo de Aarón
  alternatives_spanish:
  - hijo de Eleazar, el hijo de Aarón
  lexicon: WLC / HALOT
  rationale: La genealogía se mantiene doble para conservar el énfasis sacerdotal del hebreo, sin añadir conectores que suavicen la apposición original.
- source_word: עֹמֵד לְפָנָיו
  english_pob_choice: stood before him
  chosen_spanish: estaba de pie delante de él
  alternatives_spanish:
  - estaba delante de él
  - se mantenía de pie delante de él
  lexicon: WLC / HALOT
  rationale: «Estaba de pie delante de él» conserva la postura de atención/comparecencia expresada por el participio, con español natural. Se evita «ministraba» porque el hebreo aquí no obliga a una función técnica, y se respeta el pronombre singular conforme al audit trail inglés.
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en ese tiempo
  lexicon: WLC / HALOT
  rationale: Se mantiene la fórmula temporal narrativa habitual y transparente en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: WLC / HALOT
  rationale: El infinitivo constructo se vierte de forma directa con «diciendo» para introducir el discurso sin añadir una coordinación no necesaria.
- source_word: הַאוֹסִף עוֹד
  english_pob_choice: Shall I yet again
  chosen_spanish: ¿Volveré todavía
  alternatives_spanish:
  - ¿Seguiré todavía
  - ¿Me tocará volver
  lexicon: HALOT
  rationale: La idea repetitiva de יסף + עוד se expresa con «volveré todavía», que es idiomático y conserva el matiz de reanudar otra acción tras intentos previos.
- source_word: לָצֵאת לַמִּלְחָמָה
  english_pob_choice: go out to battle
  chosen_spanish: salir a la guerra
  alternatives_spanish:
  - salir al combate
  - marchar a la guerra
  lexicon: WLC / HALOT
  rationale: «Salir a la guerra» comunica bien el idiomático לָצֵאת לַמִּלְחָמָה en español moderno y mantiene el tono militar del pasaje.
- source_word: עִם בְּנֵי בִנְיָמִן
  english_pob_choice: against the sons of Benjamin
  chosen_spanish: contra los hijos de Benjamín
  alternatives_spanish:
  - contra la tribu de Benjamín
  - frente a los hijos de Benjamín
  lexicon: WLC / HALOT
  rationale: Se vierte עִם con valor hostil en contexto bélico como «contra», y se conserva «hijos de Benjamín» para mantener el lenguaje tribal/familiar del original.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi pariente
  - mi hermano de sangre
  lexicon: WLC / HALOT
  rationale: Se preserva la apelación de parentesco en singular, importante para el matiz de guerra civil y de fraternidad israelita.
- source_word: אִם אֶחְדָּל
  english_pob_choice: or shall I stop?
  chosen_spanish: o dejaré de hacerlo
  alternatives_spanish:
  - o cesaré
  - o me detendré
  lexicon: HALOT
  rationale: חדל se expresa con una fórmula natural en español que evita una literalidad pesada. «Dejaré de hacerlo» mantiene el valor de cesación en relación con la acción previa.
- source_word: וַיֹּאמֶר יְהוָה
  english_pob_choice: And Yahweh said
  chosen_spanish: Y Yahvé dijo
  alternatives_spanish:
  - Entonces Yahvé dijo
  lexicon: WLC / POB default
  rationale: Se sigue el criterio del proyecto para el Nombre divino, usando «Yahvé» y conservando la conexión narrativa con «Y».
- source_word: עֲלוּ
  english_pob_choice: Go up
  chosen_spanish: Suban
  alternatives_spanish:
  - Suban allá
  - Avancen
  lexicon: HALOT
  rationale: עלה en contexto militar se traduce de manera dinámica pero fiel con «Suban», que mantiene la dirección idiomática sin perder naturalidad en español.
- source_word: כִּי מָחָר
  english_pob_choice: for tomorrow
  chosen_spanish: porque mañana
  alternatives_spanish:
  - pues mañana
  - ya que mañana
  lexicon: HALOT
  rationale: כִּי introduce aquí la razón o garantía del mandato; «porque» expresa esa relación de forma clara en español.
- source_word: אֶתְּנֶנּוּ בְיָדֶךָ
  english_pob_choice: I will give him into your hand
  chosen_spanish: lo entregaré en tu mano
  alternatives_spanish:
  - lo pondré en tu mano
  - lo daré en tu poder
  lexicon: HALOT
  rationale: La expresión idiomática de entregar en la mano se conserva como acto de victoria/entrega. Se usa el singular «lo» para reflejar el sufijo singular del hebreo, que el audit trail inglés también preserva como colectivo para Benjamín.
theological_decisions:
- issue: Referente de לְפָנָיו
  english_pob_reading: The suffix refers to the ark of the covenant mentioned in the previous verse, rendered 'before it.' The revision pass later preferred 'before him' as more natural for the singular suffix, while preserving the tension in context.
  chosen_spanish_reading: «delante de él», con nota alternativa sobre la posibilidad de entender el referente como el arca.
  alternative_spanish_readings:
  - delante de ella, entendiendo el arca
  - delante del arca
  - delante de Yahvé
  rationale: El hebreo permite más de una resolución pronominal en el contexto inmediato. En el texto principal se mantiene el singular personal «él», coherente con la revisión inglesa final; la nota conserva la alternativa cultual/teológica sin resolver dogmáticamente la referencia.
  doctrine_reference: Preservar la tensión interpretativa del texto
- issue: Renderizado del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se aplica el término rector del proyecto para el Tetragrámaton, evitando el reemplazo litúrgico por «SEÑOR» y manteniendo transparencia textual.
  doctrine_reference: 'Contested terms: יהוה / YHWH'
- issue: Unidad colectiva en אֶתְּנֶנּוּ
  english_pob_reading: I will give him into your hand
  chosen_spanish_reading: lo entregaré en tu mano
  alternative_spanish_readings:
  - los entregaré en tu mano
  - lo pondré en tu mano
  rationale: El singular del hebreo se conserva sin forzar una pluralización en español. La lectura colectiva de Benjamín queda implícita, como en el audit trail inglés.
  doctrine_reference: Colectivo singular en discurso de guerra
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «stood before it» a «stood before him» en una revisión posterior para reflejar con más naturalidad el sufijo pronominal singular. La versión española sigue esa decisión principal con «delante de él», pero conserva en nota la alternativa contextual de entender el referente como el arca del pacto. También se mantuvo la opción de tratar Benjamín como singular colectivo en la cláusula final, conforme al audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Nombre divino según el estándar del proyecto.
  - Se conserva el lenguaje tribal «hijos de Benjamín» / «mi hermano» para reflejar el tono de guerra civil y parentesco.
  - Se evitó «SEÑOR» por ser una convención de sustitución que el proyecto no usa en el texto principal.
  - «Lo entregaré en tu mano» mantiene el idioma hebreo de victoria/entrega sin hacerlo más expansivo.
  - La nota de pie a diferencia el referente posible del pronombre sin cerrar la ambigüedad textual.
