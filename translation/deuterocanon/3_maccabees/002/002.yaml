id: 3MA.2.2
reference: 3 Maccabees 2:2
source:
  edition: lxx-swete-1909
  text: σὺ γὰρ εἶ ὁ κτίσας τὰ πάντα, καὶ τῶν ὅλων ἐπικρατῶν· δυνάστης δίκαιος εἶ, καὶ τοὺς ὕβρει καὶ ἀγερωχίᾳ τι πράσσοντας κρίνεις.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: major_mismatch
translation:
  text: For you are the one who created all things and rules over all; you are a righteous sovereign[a], and you judge those who do anything in insolence and arrogance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are a just ruler.' The Greek can support either 'righteous' or 'just' for δίκαιος, and δυνάστης can be rendered 'ruler' or 'sovereign.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ γὰρ εἶ
  chosen: For you are
  alternatives:
  - For you yourself are
  - Because you are
  lexicon: LSJ
  rationale: γάρ is best carried forward as explanatory 'for,' linking this verse to the prayer's reasoning. The explicit σὺ gives emphasis, but natural English can preserve that without an overly wooden 'you yourself.'
- source_word: ὁ κτίσας
  chosen: the one who created
  alternatives:
  - the creator of
  - the one who made
  lexicon: LSJ
  rationale: The aorist participle with article functions substantivally. 'The one who created' preserves both the verbal force and the direct address better than the more title-like 'the creator of.'
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole universe
  lexicon: LSJ
  rationale: A standard comprehensive expression meaning the totality of created things. 'All things' is slightly more formal and suits the elevated prayer context.
- source_word: τῶν ὅλων ἐπικρατῶν
  chosen: rules over all
  alternatives:
  - prevails over all
  - has power over all
  - is sovereign over all things
  lexicon: LSJ
  rationale: ἐπικρατέω denotes exercising power or mastery over. 'Rules over all' is clear modern English and captures active dominion without overloading the phrase with later theological terminology.
- source_word: δυνάστης
  chosen: sovereign
  alternatives:
  - ruler
  - mighty one
  - potentate
  lexicon: LSJ
  rationale: The noun denotes one who holds power or dominion. 'Sovereign' conveys legitimate supreme rule in elevated but still readable English; 'potentate' is too archaic, and 'mighty one' underplays the governing sense.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: LSJ
  rationale: In this context the term qualifies God's moral character in judgment. 'Righteous' fits the prayer register and avoids narrowing the sense merely to judicial fairness, though 'just' remains a viable alternative.
- source_word: τοὺς ... πράσσοντας
  chosen: those who do anything
  alternatives:
  - those who act
  - those who practice such things
  lexicon: LSJ
  rationale: The participle refers to people engaging in the described conduct. τι with πράσσω is indefinite, so 'do anything' preserves the breadth of the accusation.
- source_word: ὕβρει
  chosen: in insolence
  alternatives:
  - with violence
  - in outrage
  - in hubris
  lexicon: LSJ
  rationale: ὕβρις often includes arrogant, abusive outrage. Here, paired with ἀγερωχία, the emphasis is proud insolence rather than physical violence alone. 'Insolence' captures the moral tone in accessible English.
- source_word: ἀγερωχίᾳ
  chosen: arrogance
  alternatives:
  - haughtiness
  - pride
  lexicon: LSJ
  rationale: The word denotes haughty bearing or overbearing pride. 'Arrogance' is natural modern English and pairs well with 'insolence' without sounding archaic.
- source_word: κρίνεις
  chosen: you judge
  alternatives:
  - you condemn
  - you bring to judgment
  lexicon: LSJ
  rationale: κρίνω here is broad judicial evaluation and sentencing. 'You judge' preserves the lexical core without importing a stronger result than the Greek explicitly states.
