id: EXO.12.38
reference: Exodus 12:38
source:
  edition: WLC
  text: וְ/גַם עֵ֥רֶב רַ֖ב עָלָ֣ה אִתָּ֑/ם וְ/צֹ֣אן וּ/בָקָ֔ר מִקְנֶ֖ה כָּבֵ֥ד מְאֹֽד־׃
translation:
  text: A mixed multitude also went up with them[a], and flocks and herds—a very great amount of livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great mixed company' or 'a mixed crowd.' The Hebrew phrase עֵרֶב רַב denotes a heterogeneous group accompanying Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/גַם
  chosen: also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: The conjunction-plus-adverb adds information to the preceding narrative. 'Also' is concise and natural in English while preserving the additive force.
- source_word: עֵרֶב רַב
  chosen: a mixed multitude
  alternatives:
  - a great mixed company
  - a mixed crowd
  lexicon: HALOT
  rationale: The phrase denotes a heterogeneous group accompanying Israel, not necessarily ethnically specified in the phrase itself. 'Mixed multitude' preserves the established sense and the quantitative adjective רַב, while remaining readable. 'Crowd' is possible but weaker than the collective sense of a substantial company.
- source_word: עָלָה
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה is the standard verb here for movement in the exodus journey. 'Went up' preserves the Hebrew idiom and narrative diction better than the more wooden 'ascended.'
- source_word: אִתָּם
  chosen: with them
  lexicon: HALOT
  rationale: Straightforward comitative preposition with 3mp suffix, referring to the Israelites mentioned in context.
- source_word: וְ/צֹאן וּ/בָקָר
  chosen: along with flocks and herds
  alternatives:
  - and sheep and cattle
  - and small livestock and cattle
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock (sheep/goats), and בָקָר to herd animals/cattle. 'Flocks and herds' is idiomatic English that preserves the distinction without over-specifying species.
- source_word: מִקְנֶה
  chosen: livestock
  alternatives:
  - property in animals
  - cattle
  lexicon: HALOT
  rationale: מִקְנֶה is the broad collective term for domesticated animals/possessions in livestock. 'Livestock' best captures the collective sense in modern English.
- source_word: כָּבֵד מְאֹד
  lemma: כָּבֵד
  chosen: a very large amount of
  alternatives:
  - very numerous
  - very substantial
  - exceedingly heavy
  lexicon: HALOT
  rationale: כָּבֵד literally means 'heavy,' but with מִקְנֶה it idiomatically conveys abundance or great quantity. 'A very large amount of livestock' communicates the sense naturally in English while reflecting the intensifier מְאֹד.
