translation:
  language: es
  text: 'Miqueas el morasteo profetizó en los días de Ezequías, rey de Judá, y dijo a todo el pueblo de Judá: «Así dice Yahvé de los ejércitos[a]: “Sión será arada como un campo, y Jerusalén quedará en ruinas, y el monte de la Casa[b] será alturas boscosas[c]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé de las huestes».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el monte del templo.
    reason: cultural_note
  - marker: c
    text: 'O: «será lugares altos boscosos» o «será alturas de bosque».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מיכיה / Micah
  english_pob_choice: Micah
  chosen_spanish: Miqueas
  alternatives_spanish:
  - Micaías
  lexicon: HALOT
  rationale: El nombre del profeta se vierte con la forma habitual en español bíblico para Miqueas. Aunque el hebreo permite confusión con Micaías, el contexto identifica al profeta de Miqueas, y la forma española tradicional inteligible conserva esa identificación.
- source_word: הַמּוֹרַשְׁתִּי
  english_pob_choice: the Morashtite
  chosen_spanish: el morastita
  alternatives_spanish:
  - el de Moréset
  - el hombre de Moréset
  lexicon: HALOT
  rationale: El hebreo es un gentilicio/adjetivo de procedencia. 'Morastita' preserva la fuerza adjetival del original y es natural en español; 'de Moréset' explicita el origen pero suaviza el valor gentilicio.
- source_word: הָיָה נִבָּא
  english_pob_choice: prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - estaba profetizando
  - ejercía como profeta
  lexicon: HALOT
  rationale: La construcción hebrea indica acción pasada con posible valor durativo. En español, 'profetizó' comunica con naturalidad el hecho histórico sin forzar una perífrasis menos idiomática; la duratividad queda implícita por el contexto narrativo.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el reinado de
  lexicon: HALOT
  rationale: La expresión temporal se mantiene de forma directa y natural. 'En los días de' sigue de cerca el hebreo y funciona bien en registro bíblico sin necesidad de explicitar 'reinado'.
- source_word: עַם יְהוּדָה
  english_pob_choice: the people of Judah
  chosen_spanish: el pueblo de Judá
  alternatives_spanish:
  - todo el pueblo de Judá
  - la gente de Judá
  lexicon: HALOT
  rationale: עַם en este contexto es 'pueblo'. El español 'el pueblo de Judá' es claro y fiel; 'gente' sería demasiado coloquial y 'nación' desviaría el sentido del discurso dirigido a una colectividad concreta.
- source_word: כֹּה אָמַר יְהוָה צְבָאוֹת
  english_pob_choice: Thus says Yahweh of Armies
  chosen_spanish: Así dice Yahvé de los ejércitos
  alternatives_spanish:
  - Así dice Yahvé de los ejércitos celestiales
  - Así dice Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según la terminología del proyecto. צְבָאוֹת se traduce como 'de los ejércitos' para mantener el valor concreto y evitar la sustitución tradicional sin necesidad; 'huestes' queda como alternativa más litúrgica pero menos transparente.
- source_word: צִיּוֹן שָׂדֶה תֵחָרֵשׁ
  english_pob_choice: Zion will be plowed like a field
  chosen_spanish: Sión será arada como un campo
  alternatives_spanish:
  - Sión será arada como campo
  - Sión será arada, como un campo
  lexicon: HALOT
  rationale: La imagen compara Sión con un terreno cultivable. 'Como un campo' refleja la comparación de manera natural en español y conserva el choque entre el lugar santo y el campo arado.
- source_word: עִיִּים תִּהְיֶה
  english_pob_choice: Jerusalem will become ruins
  chosen_spanish: Jerusalén se volverá ruinas
  alternatives_spanish:
  - Jerusalén se convertirá en ruinas
  - Jerusalén quedará en ruinas
  lexicon: HALOT
  rationale: עִיִּים designa ruinas o montones de ruinas. 'Se volverá ruinas' reproduce el cambio de estado del hebreo sin añadir una glosa interpretativa; el plural 'ruinas' conserva la densidad del sustantivo.
- source_word: וְהַר הַבַּיִת
  english_pob_choice: the mountain of the house
  chosen_spanish: el monte de la Casa
  alternatives_spanish:
  - el monte de la casa
  - el monte del templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el monte de la casa', expresión que alude al monte del templo. Se mantiene la mayúscula en 'Casa' para reflejar la referencia cultual sin sustituir de inmediato por una explicación, preservando la metáfora del original.
- source_word: לְבָמוֹת יָעַר
  english_pob_choice: wooded heights
  chosen_spanish: alturas boscosas
  alternatives_spanish:
  - alturas forestadas
  - lugares altos boscosos
  - alturas de bosque
  lexicon: HALOT
  rationale: La frase combina 'alturas/lugares altos' con la idea de bosque. 'Alturas boscosas' preserva ambas piezas en español natural y deja abierta la tensión entre elevación cultual y vegetación salvaje; 'forestadas' sería más técnico y menos idiomático.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama. Se traduce con 'Yahvé' conforme al criterio del proyecto para no ocultar el nombre del pacto ni reemplazarlo por un título. Esto mantiene la visibilidad del nombre divino en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de צְבָאוֹת en el título divino
  english_pob_reading: of Armies
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos celestiales
  rationale: Se conserva el sentido concreto y militar del término hebreo. 'De los ejércitos' comunica con claridad al lector moderno, mientras que 'huestes' resulta más tradicional pero menos transparente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: La cláusula final elíptica sobre el monte de la Casa
  english_pob_reading: the mountain of the house wooded heights
  chosen_spanish_reading: el monte de la Casa, alturas boscosas
  alternative_spanish_readings:
  - el monte de la Casa se volverá alturas boscosas
  - el monte de la Casa, alturas de bosque
  rationale: El hebreo es conciso y la construcción final queda elíptica también en el audit trail inglés. Se mantiene esa tensión sin expandirla demasiado; la coma permite leer la frase como una predicación nominal o como una descripción resultante.
  doctrine_reference: DOCTRINE.md Principle of source-visible tension
translation_notes:
  revision_awareness: El español sigue la revisión más reciente del audit trail, que favorece una redacción más directa y natural en el verbo principal y mantiene una traducción concisa para la cláusula final. A diferencia del inglés auditado, aquí se conserva la visibilidad del nombre divino como 'Yahvé', conforme a la política terminológica del proyecto en español.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה, no 'SEÑOR'.
  - Se prefirió 'ejércitos' para צְבָאוֹת, con nota alternativa 'huestes'.
  - Se mantuvo 'Casa' con mayúscula en 'monte de la Casa' para reflejar el referente cultual.
  - La frase final conserva cierta elipsis, evitando sobrerrepetir una explicación que el hebreo no expresa explícitamente.
