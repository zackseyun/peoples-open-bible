translation:
  language: es
  text: Porque la casa de Israel y la casa de Judá han actuado muy traidoramente contra mí[a], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “seguramente han actuado traidoramente contra mí” o “me han traicionado por completo”. El hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del juicio que sigue; 'Porque' conserva la fuerza explicativa del hebreo en un español natural y sobrio.
- source_word: בָגֹוד בָּגְדוּ
  english_pob_choice: have dealt very treacherously
  chosen_spanish: han obrado con gran traición
  alternatives_spanish:
  - han tratado con mucha traición
  - han sido por completo traidores
  - han traicionado gravemente
  lexicon: HALOT
  rationale: El hebreo usa infinitivo absoluto + verbo finito para intensificar בגד, con sentido de actuar traicioneramente/faltar a la lealtad del pacto. 'Han obrado con gran traición' comunica la intensidad y mantiene un registro formal sin sonar rígido.
- source_word: בִּי
  english_pob_choice: to me
  chosen_spanish: contra mí
  alternatives_spanish:
  - a mí
  - para conmigo
  lexicon: HALOT
  rationale: Con בגד y el objeto preposicional, el sentido es una deslealtad dirigida a la persona ofendida; en español 'contra mí' expresa mejor el daño relacional y la carga de hostilidad implícita.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión colectiva y covenantal del hebreo, en vez de reducirla al nombre propio, para reflejar la formulación profética.
- source_word: וּבֵית יְהוּדָה
  english_pob_choice: and the house of Judah
  chosen_spanish: y la casa de Judá
  alternatives_spanish:
  - y Judá
  - y el pueblo de Judá
  lexicon: HALOT
  rationale: Se mantiene el paralelismo y la distinción entre las dos comunidades del pacto.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para יְהוָה como 'Yahvé' y se conserva la fórmula profética solemne con 'declara'.
theological_decisions:
- issue: Intensificación de la infidelidad del pacto en בגד
  english_pob_reading: have dealt very treacherously
  chosen_spanish_reading: han obrado con gran traición
  alternative_spanish_readings:
  - han traicionado gravemente
  - han sido por completo infieles
  rationale: La construcción hebrea enfatiza la traición/infidelidad por duplicación verbal. 'Gran traición' mantiene la intensidad sin suavizar el matiz de deslealtad pactual.
  doctrine_reference: Jeremías 5:11; fidelidad e infidelidad del pacto en el lenguaje profético
- issue: Nombre divino en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto fuente usa explícitamente el Tetragrama; el español debe preservarlo como nombre propio y no sustituirlo por un título.
  doctrine_reference: Éxodo 3:15; tradición de la traducción POB para יהוה
translation_notes:
  revision_awareness: El audit trail inglés revisó la elección desde una paráfrasis de 'utterly unfaithful' hacia una formulación más cercana a la repetición enfática del hebreo ('have dealt very treacherously'). La versión española sigue esa revisión y conserva el énfasis verbal sin diluirlo en un término meramente moral.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'casa de Israel' y 'casa de Judá' por fidelidad a la expresión colectiva del hebreo.
  - '''Contra mí'' se eligió para reflejar la dirección hostil de בגד con objeto preposicional, aunque la nota permite la alternativa más literal ''contra'' o ''a'' según matiz.'
  - No se introduce 'Cristo', 'SEÑOR' ni otras sustituciones tradicionales ajenas al texto fuente.
