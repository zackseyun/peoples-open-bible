lexical_decisions:
- source_word: אֲחִיטוּב
  english_pob_choice: Ahitub
  chosen_spanish: Ahitub
  alternatives_spanish:
  - Ahitub
  lexicon: nombre propio
  rationale: Es un nombre personal propio; se translitera para conservar la identificación genealógica y mantener transparencia frente al hebreo y al texto inglés auditado.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: ילד (Hiphil)
  rationale: En genealogías, el verbo expresa la generación de descendencia. 'Engendró' conserva el valor genealógico de forma natural en español y evita un giro explicativo más largo.
- source_word: אֶת
  english_pob_choice: '[not translated]'
  chosen_spanish: '[no se traduce]'
  alternatives_spanish:
  - —
  lexicon: partícula de objeto directo
  rationale: Es un marcador sintáctico sin equivalente léxico independiente en español; su función queda representada por el orden de palabras y la construcción verbal.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Zadoc
  alternatives_spanish:
  - Sadoc
  lexicon: nombre propio
  rationale: Se mantiene la transliteración cercana al hebreo y al inglés POB. 'Sadoc' es la forma tradicional española, pero aquí 'Zadoc' preserva mejor la correspondencia auditada con el texto fuente.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  lexicon: conjunción copulativa
  rationale: La simple conjunción une la segunda cláusula genealógica. 'Y' es la opción más directa y fiel al valor coordinante del hebreo.
- source_word: אֲחִימָעַץ
  english_pob_choice: Ahimaaz
  chosen_spanish: Ahimaaz
  alternatives_spanish:
  - Ahimaas
  lexicon: nombre propio
  rationale: Nombre propio transliterado; se conserva la forma cercana al inglés auditado para evitar introducir una variante no sustentada por el expediente fuente.
translation_notes:
  revision_awareness: El texto inglés POB mantiene una traducción genealógica simple y sin notas. No hay revisiones aplicadas en el expediente; por eso el español sigue la misma estructura breve y transparente, con una sola nota para aclarar la transliteración del primer nombre propio.
  spanish_consistency_notes:
  - Se evitó 'CRISTO/Mesías' porque el pasaje es puramente genealógico y no contiene título mesiánico.
  - Se prefirió 'engendró' por su concisión y transparencia genealógica frente a perífrasis más largas.
  - Se mantuvo 'Zadoc' y 'Ahimaaz' como transliteraciones coherentes con el expediente auditado.
