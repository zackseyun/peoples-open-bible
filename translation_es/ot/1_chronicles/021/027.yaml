translation:
  language: es
  text: Yahvé habló al ángel[a], y él devolvió su espada a la vaina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dijo al ángel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «metió de nuevo su espada en la vaina».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se representa con el nombre propio divino en español como 'Yahvé', siguiendo la decisión auditada del POB inglés de transliterar el nombre y no sustituirlo por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: El verbo אמר admite 'decir/hablar'. 'Habló al ángel' conserva el acto verbal sin forzar una formulación más específica que el hebreo no exige; además suena natural en español con el complemento indirecto introducido por 'a/al'.
- source_word: לַמַּלְאָךְ
  english_pob_choice: to the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - al mensajero
  lexicon: HALOT
  rationale: En este contexto narrativo, con la espada desenvainada y la figura celestial implícita, 'ángel' es el sentido contextual claro de מַלְאָךְ.
- source_word: וַיָּשֶׁב
  english_pob_choice: he returned
  chosen_spanish: volvió
  alternatives_spanish:
  - devolvió
  - puso de nuevo
  lexicon: HALOT
  rationale: El hiphil de שוב tiene valor causativo ('hacer volver', 'traer de vuelta'). En español, 'volvió su espada' comunica de manera natural el acto de regresar la espada a su lugar, sin perder la idea de retorno.
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - la espada de él
  lexicon: HALOT
  rationale: La posesión es directa y se expresa naturalmente en español con 'su espada'; el referente se entiende por el contexto inmediato del ángel.
- source_word: אֶל נְדָנָהּ
  english_pob_choice: to its sheath
  chosen_spanish: a su vaina
  alternatives_spanish:
  - en su vaina
  - a su funda
  lexicon: HALOT
  rationale: נְדָן designa una vaina o funda para espada. 'Vaina' es el término idiomático y preciso en español; 'a su vaina' conserva bien el movimiento de retorno indicado por אֶל.
theological_decisions:
- issue: Sujeto implícito de וַיָּשֶׁב
  english_pob_reading: The subject is the angel, implied from the immediately preceding phrase 'to the angel.'
  chosen_spanish_reading: 'Se entiende que el sujeto es el ángel: ''Yahvé habló al ángel, y él volvió su espada a su vaina.'''
  alternative_spanish_readings:
  - '''Yahvé habló al ángel, y volvió su espada a su vaina'' (con sujeto implícito ambiguo)'
  - '''Yahvé habló al ángel, y Yahvé volvió su espada a su vaina'''
  rationale: El contexto inmediato favorece al ángel como sujeto de la acción física de volver la espada. Mantener 'él' en español hace explícita la referencia contextual sin resolver indebidamente una ambigüedad que el hebreo mismo deja apoyada en el contexto.
  doctrine_reference: Preservar la tensión textual y la referencia contextual inmediata sin sobreexplicar donde el original es elíptico.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alta concordancia; no se registran revisiones que alteren la lectura base. La versión española sigue de cerca el sentido del original y las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - '''Ángel'' conserva el sentido contextual de מַלְאָךְ en una escena celestial narrativa.'
  - '''Vaina'' mantiene el campo semántico de נְדָן y es más natural que un calco como ''escapulario'' o un tecnicismo innecesario.'
  - Se evita 'SEÑOR' para no ocultar el nombre divino según la política del proyecto.
