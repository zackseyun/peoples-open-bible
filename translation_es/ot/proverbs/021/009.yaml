review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la comparación sapiencial del hebreo: mejor vivir en un lugar incómodo de la azotea que convivir con una mujer caracterizada por contiendas. También preserva adecuadamente el sentido de וּבֵית חָבֶר como una vivienda compartida/común, con nota para la literalidad.'
  spanish_quality_summary: El español es claro y natural, pero «pendenciera» puede sonar algo regional o más agresivo que el hebreo y menos directamente ligado a la idea de contención doméstica. «Conflictiva» sería demasiado moderno/psicologizante; «contenciosa» suena jurídico. «Quejumbrosa» no corresponde. Una mejora mínima es usar «contenciosa», aunque es algo formal; mejor aún «peleadora» sería más coloquial. Sin embargo, para un registro bíblico digno y ampliamente legible, «discutidora» o «contenciosa» funcionan mejor que «pendenciera». También conviene hacer explícito en la nota que la casa es compartida con otros, como ya hace el inglés.
  glossary_alignment: No hay términos teológicos del glosario principal implicados. Las decisiones léxicas clave siguen el rastro del POB inglés. Se mantiene correctamente «azotea» para גָּג y «casa compartida» para וּבֵית חָבֶר. Se recomienda ajustar מִדְיָנִים de «pendenciera» a «contenciosa» para una equivalencia más precisa y tono más estable en español bíblico moderno.
  issues:
  - severity: medium
    issue: «Pendenciera» para מִדְיָנִים puede sonar regional o excesivamente bronco.
    rationale: El hebreo apunta a una mujer dada a contiendas/quarrelsome. «Pendenciera» es posible, pero en español amplio puede evocar a alguien busca-pleitos de forma más callejera. «Contenciosa» conserva mejor la idea de contienda habitual en registro digno.
  - severity: low
    issue: La nota al pie podría reflejar más claramente «casa compartida con otros».
    rationale: El inglés auditado explica explícitamente «shared with others». La nota española actual es aceptable, pero una formulación algo más clara ayuda a preservar el matiz social de חָבֶר.
  revised_spanish_text: Mejor vivir en un rincón de la azotea que con una mujer contenciosa en una casa compartida[a].
  revised_footnotes:
  - marker: a
    text: O «en una casa compartida con otros»; el hebreo dice literalmente «y una casa de compañía/asociación».
    reason: lexical_alternative
  revision_rationale: 'Se realiza una reparación menor para mejorar la precisión y la legibilidad panhispánica: «contenciosa» representa mejor la idea de una mujer dada a contiendas en un registro bíblico digno, y la nota aclara más directamente el sentido de una casa compartida con otros.'
