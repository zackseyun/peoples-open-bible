id: ROM.9.11
reference: Romans 9:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μήπω γὰρ γεννηθέντων μηδὲ πραξάντων τι ἀγαθὸν ἢ ⸀φαῦλον, ἵνα ἡ κατ’ ἐκλογὴν πρόθεσις τοῦ θεοῦ μένῃ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/011.yaml
  text: For before they had yet been born or had done anything good or bad[a], so that God’s purpose according to election might remain[c][b],
  footnotes:
  - marker: a
    text: Or 'anything good or evil.' The Greek φαῦλον can denote what is bad, base, or morally evil; 'bad' is used in the main text as the more idiomatic counterpart to 'good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'God’s electing purpose' / 'the purpose of God according to election.'
    reason: lexical_alternative
  - marker: c
    text: Or 'might stand.' The Greek verb means 'remain' or 'continue,' and in this context may carry the sense of standing firm.
    reason: lexical_alternative
translation:
  language: ko
  text: 그 아이들이 아직 태어나지도 않았고, 무슨 선이나 악도 행하지 않았을 때에 — 택하심을 따른 하나님의 뜻이 그대로 서게 하시려고,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκλογή
  english_pob_choice: election
  chosen_korean: 택하심
  alternatives_korean:
  - 선택
  lexicon: BDAG
  rationale: 정책상 ἐκλογή는 「택하심」으로 옮긴다.
- source_word: πρόθεσις
  english_pob_choice: purpose
  chosen_korean: 뜻
  alternatives_korean:
  - 계획
  - 작정
  lexicon: BDAG
  rationale: 하나님의 결정적 의지를 가리키는 「뜻」이 가장 자연스럽다.
