review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico de וַיִּצְבְּרוּ, חֳמָרִם חֳמָרִם, וַתִּבְאַשׁ y הָאָרֶץ: amontonar, múltiples montones, hedor fuerte, y el territorio/la tierra afectada. Sin embargo, falla de manera importante en אֹתָם: el texto español dice ''a[a]'' en lugar de un objeto directo válido, omitiendo de forma no gramatical la referencia a las ranas. Eso rompe la fidelidad y la legibilidad.'
  spanish_quality_summary: 'La frase principal es natural salvo por el error grave ''a[a]''. ''Y amontonaron las ranas en montones'' es español claro y digno. ''Y la tierra apestó'' es idiomático y conserva la viveza del hebreo. La nota actual también está mal anclada: el marcador está puesto sobre el objeto directo defectuoso, cuando debe ir en la expresión que refleja la repetición hebrea de ''montón''.'
  glossary_alignment: 'No hay conflicto con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas: ''amontonaron'' para צבר y ''apestó'' para באש. Conviene ajustar אֹתָם a ''las ranas'' o ''las'' según claridad contextual; aquí ''las ranas'' mejora la legibilidad en español. Para חֳמָרִם חֳמָרִם, puede mantenerse ''en montones[a]'' con nota que preserve ''montón tras montón'' como alternativa más explícita de la repetición.'
  issues:
  - severity: high
    issue: 'Objeto directo mal formado: ''a[a]''.'
    rationale: אֹתָם exige un referente directo ('them'), aquí las ranas del contexto. 'a' no es un pronombre válido en español y produce una oración agramatical y no fiel al texto fuente.
  - severity: medium
    issue: Anclaje de nota al lugar equivocado.
    rationale: La nota explica la repetición de חֳמָרִם חֳמָרִם, por lo que el marcador debe ir en 'montones' o en la frase equivalente, no en el objeto directo.
  revised_spanish_text: Y amontonaron las ranas en montones[a], y la tierra apestó.
  revised_footnotes:
  - marker: a
    text: O ‘montón tras montón’; el hebreo repite el sustantivo para dar énfasis.
    reason: lexical_alternative
