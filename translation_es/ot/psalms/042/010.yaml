review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro POB en casi todos los puntos: «a Dios, mi roca», «¿por qué me has olvidado?» y «bajo la opresión del enemigo» son fieles. El problema principal está en las notas: la nota [a] fue colocada sobre «Dios», pero su contenido corresponde a la alternativa de קֹדֵר/אֵלֵךְ («ando en tinieblas / en luto»), no a «Dios». Además, el inglés POB solo conserva una nota léxica para la alternativa de «mourning / in gloom»; la versión española duplicó innecesariamente esa información en dos notas separadas.'
  spanish_quality_summary: 'El español es claro, digno y natural. «Ando enlutado» es comprensible, aunque algo menos común que «ando de luto» o «ando en duelo»; aun así, es aceptable. La reparación necesaria es principalmente editorial: mover la nota al segmento correcto y evitar duplicación de notas. También conviene suprimir el pronombre explícito «Yo» por naturalidad, sin afectar el sentido.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios», «mi roca» y «enemigo» están bien alineados. No aparece el nombre divino Yahvé en este versículo. La elección «enlutado» para קֹדֵר entra dentro del rango semántico documentado, siempre que la alternativa «en tinieblas / sombrío» quede en una sola nota bien anclada.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «Dios», pero su contenido trata la alternativa de «ando enlutado».
    rationale: Esto rompe la correspondencia exigida entre marcador y palabra/frase relevante, y puede confundir al lector sobre qué elemento del texto tiene variante léxica.
  - severity: medium
    issue: Hay duplicación de notas para la misma decisión léxica de קֹדֵר.
    rationale: El POB inglés preserva una sola alternativa principal («in gloom»). Mantener dos notas separadas en español añade peso innecesario y dispersa la misma información.
  - severity: low
    issue: «Yo digo» suena ligeramente más marcado de lo necesario en español.
    rationale: «Digo» preserva el mismo valor discursivo y suena más natural en español bíblico moderno, salvo que se quiera enfatizar el sujeto, cosa no exigida por el hebreo aquí.
  revised_spanish_text: 'Digo a Dios, mi roca: «¿Por qué me has olvidado? ¿Por qué ando enlutado[a] bajo la opresión del enemigo?»'
  revised_footnotes:
