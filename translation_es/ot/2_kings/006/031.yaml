translation:
  language: es
  text: 'Y dijo[a]: «Que Dios me haga lo mismo, y aun más, si la cabeza de Eliseo, hijo de Safat, permanece sobre él hoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «si la cabeza de Eliseo hijo de Safat permanece sobre él hoy»; es decir, si la cabeza de Eliseo permanece unida a su cuerpo hoy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y dijo, además
  - Entonces dijo
  lexicon: HALOT
  rationale: El hebreo introduce una continuación narrativa simple. En español, «Y dijo» conserva la secuencia sin añadir matices no requeridos por el texto.
- source_word: כֹּה יַעֲשֶׂה לִּי אֱלֹהִים וְכֹה יוֹסִף
  english_pob_choice: May God do so to me, and more also
  chosen_spanish: Que Dios me haga así, y aun me añada más
  alternatives_spanish:
  - Así me haga Dios, y aun más añada
  - Que Dios me haga esto, y aun me añada más
  lexicon: HALOT
  rationale: Se preserva la fórmula de juramento/imprecación sin volverla una paráfrasis libre. «Que Dios me haga así, y aun me añada más» reproduce la fuerza del hebreo y su carácter elíptico en español natural.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, aquí funciona con referencia singular dentro de la fórmula juramentaria. «Dios» es la lectura correcta en español.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si no
  - ciertamente no
  lexicon: HALOT
  rationale: En juramentos hebreos, אִם puede implicar una amenaza elíptica; el POB inglés conserva «if» y el español mantiene «si» para respetar la forma del juramento.
- source_word: יַעֲמֹד
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - se mantiene
  - sigue sobre
  lexicon: HALOT
  rationale: El verbo literalmente es «estar de pie / permanecer». Con «la cabeza» como sujeto, «permanece» comunica la idea de que la cabeza continúa sobre el cuerpo sin añadir interpretación innecesaria.
- source_word: רֹאשׁ אֱלִישָׁע
  english_pob_choice: the head of Elisha
  chosen_spanish: la cabeza de Eliseo
  alternatives_spanish:
  - la cabeza de Eliseo
  - la cabeza de Eliseo
  lexicon: HALOT
  rationale: «Cabeza» conserva la crudeza y la estructura del hebreo. El nombre propio se adapta a la forma española habitual «Eliseo».
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - sobre su cuerpo
  lexicon: HALOT
  rationale: «Sobre él» mantiene la tersura del hebreo y deja que el contexto aclare que la referencia es corporal, como señala la nota.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la forma natural y directa en español, manteniendo la urgencia inmediata del juramento.
theological_decisions:
- issue: Fuerza del juramento imprecatorio
  english_pob_reading: 'A self-imprecatory oath invoking God: the speaker calls down divine judgment on himself if Elisha is not executed that day.'
  chosen_spanish_reading: 'Un juramento imprecatorio sobre sí mismo: el hablante invoca a Dios para que le haga daño si Eliseo no es ejecutado ese mismo día.'
  alternative_spanish_readings:
  - Una exclamación intensa sin fuerza juramentaria plena
  - Una simple amenaza sin invocación formal
  rationale: La fórmula hebrea es una imprecación real, no solo una exclamación de enojo. La traducción española debe conservar su carácter solemne y peligroso.
  doctrine_reference: Éxodo 20:7; 1 Samuel 3:17; 2 Reyes 6:30-31
- issue: Ambigüedad de la construcción hebrea con la cabeza sobre él
  english_pob_reading: Hebrew literally, 'if the head of Elisha son of Shaphat stands on him today'—that is, if Elisha's head remains on his body today.
  chosen_spanish_reading: La cabeza de Eliseo permanece sobre él hoy; es decir, sigue unida a su cuerpo hasta hoy.
  alternative_spanish_readings:
  - La cabeza de Eliseo queda sobre él hoy
  - Eliseo sigue con vida hoy
  rationale: 'Se conserva la imagen violenta del hebreo y, a la vez, se reconoce en la nota que el sentido es corporal: la cabeza permanece unida al cuerpo.'
  doctrine_reference: 2 Reyes 6:31; 2 Reyes 10:7
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones en la última pasada; la versión española sigue de cerca la lectura estable del POB, conservando la fórmula juramentaria y la nota explicativa sobre la imagen idiomática del hebreo.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en la fórmula de juramento, conforme al uso singular contextual.
  - Se mantiene «hoy» para הַיּוֹם y «permanece» para יַעֲמֹד, evitando una paráfrasis que atenúe la amenaza.
  - Se adopta la forma española habitual «Eliseo» y el orden natural «hijo de Safat» para el nombre propio.
  - La nota a pie de página preserva la lectura literal y explica la elipsis corporal sin sustituir el texto principal.
