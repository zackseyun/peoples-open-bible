revisions:
- from: Y lo pondré[a] en mano de extranjeros para saqueo, y a los perversos[b] de la tierra para botín; y lo profanarán.
  to: Y lo entregaré en manos de extranjeros para saqueo, y a los malvados de la tierra[a] para botín; y lo profanarán.
  rationale: Se corrige la colocación idiomática principal a 'lo entregaré en manos de' para reflejar mejor נתן + ביד y mejorar la naturalidad en español. Se reubica la única nota necesaria al sintagma 'de la tierra', preservando la ambigüedad documentada de הָאָרֶץ. Se elimina la nota innecesaria sobre 'perversos' y se usa 'malvados' por mayor claridad general, sin alterar el sentido moral fuerte del original. No se requiere nota adicional para חלל porque 'profanarán' ya comunica adecuadamente el sentido teológico principal en español.
