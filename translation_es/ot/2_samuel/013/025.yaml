translation:
  language: es
  text: 'Pero el rey dijo a Absalón[a]: «No, hijo mío, por favor, no vayamos todos, para no ser una carga para ti». Y lo instó[b], pero no estuvo dispuesto a ir[c]; así que lo bendijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y no vayamos a ser pesados para ti», expresando la preocupación de que el grupo real le impusiera una carga a Absalón en su banquete.
    reason: lexical_alternative
  - marker: b
    text: O, «lo urgió con insistencia» / «insistió», para el modismo hebreo que literalmente dice «lo presionó».
    reason: lexical_alternative
  - marker: c
    text: O, «rehusó ir». El hebreo puede enfatizar tanto la falta de voluntad como la negativa a ir.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No, pues
  - De ninguna manera
  lexicon: HALOT
  rationale: El primer אַל funciona aquí como rechazo inmediato de la invitación, más que como prohibición jurídica. En español, «No» reproduce mejor esa fuerza discursiva breve y natural.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío
  lexicon: HALOT
  rationale: La forma de tratamiento filial conserva el tono afectivo y relacional de David hacia Absalón. «Hijo mío» suena natural en español bíblico sin perder cercanía.
- source_word: אַל נָא נֵלֵךְ כֻּלָּנוּ
  english_pob_choice: please let us not all go
  chosen_spanish: por favor no vayamos todos
  alternatives_spanish:
  - por favor no vayamos todos
  - por favor, no vayamos todos
  - no vayamos todos, por favor
  lexicon: HALOT
  rationale: 'La partícula de ruego נָא se expresa con «por favor». El cohortativo plural se vierte de modo directo y claro: «no vayamos todos». Mantiene la inclusión de כֻּלָּנוּ sin forzar una estructura poco natural.'
- source_word: וְלֹא נִכְבַּד עָלֶיךָ
  english_pob_choice: lest we be a burden on you
  chosen_spanish: para no ser una carga para ti
  alternatives_spanish:
  - para no ser una carga para ti
  - y no pesar sobre ti
  - para no agobiarte
  lexicon: HALOT
  rationale: El verbo כבד aquí comunica la idea de resultar pesado o gravoso. «Ser una carga para ti» preserva bien la imagen semítica y es idiomático en español; evita diluir la metáfora con una paráfrasis excesiva.
- source_word: וַיִּפְרָץ בּוֹ
  english_pob_choice: And he urged him
  chosen_spanish: Y lo instó
  alternatives_spanish:
  - Y lo instó
  - Y lo presionó
  - Y lo apremió
  lexicon: HALOT
  rationale: El verbo פרץ con ב expresa presión o insistencia fuerte. «Lo instó» comunica esa insistencia de forma digna y natural en español, manteniendo la intensidad sin sonar mecánico.
- source_word: וְלֹא אָבָה לָלֶכֶת
  english_pob_choice: but he was not willing to go
  chosen_spanish: pero no quiso ir
  alternatives_spanish:
  - pero no quiso ir
  - pero no estaba dispuesto a ir
  - pero no aceptó ir
  lexicon: HALOT
  rationale: אָבָה denota voluntad/consentimiento. «No quiso ir» preserva la negación de voluntad de manera clara y fluida; en contexto, puede implicar tanto falta de disposición como negativa concreta.
- source_word: וַיְבָרֲכֵהוּ
  english_pob_choice: so he blessed him
  chosen_spanish: así que lo bendijo
  alternatives_spanish:
  - así que lo bendijo
  - y lo bendijo
  - por lo cual lo bendijo
  lexicon: HALOT
  rationale: ברך se traduce de forma directa como «bendecir». La secuencia narrativa sugiere un gesto de despedida favorable; «así que» conserva la conexión lógica del hebreo sin añadir contenido ajeno.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el cierre revisado de la POB en inglés, especialmente en la naturalidad de «ser una carga para ti» y en el valor de insistencia de וַיִּפְרָץ. También conserva la posibilidad semántica de אָבָה como falta de voluntad o negativa concreta.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no lo contiene.
  - Se evita «Cristo» porque no aparece terminología mesiánica en el pasaje.
  - «Bendijo» se conserva por fidelidad narrativa y coherencia con el verbo ברך.
  - La forma «No, hijo mío» refleja el diálogo directo sin elevar el registro a una fórmula arcaizante.
