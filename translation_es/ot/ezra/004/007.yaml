  yaml_path: translation/ot/ezra/004/007.yaml
  text: And in the days of Artaxerxes[a], Bishlam, Mithredath, Tabeel, and the rest of his associates wrote to Artaxerxes king of Persia[b]. The text of the letter was written in Aramaic and translated from Aramaic.
  footnotes:
  - marker: a
    text: Or 'The document was written in the Aramaic script and translated into Aramaic.' The Hebrew/Aramaic wording is difficult, and interpreters differ on whether the distinction is between script and language or between writing and translation.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the rest of their associates.' The suffix in 'his associates' is singular in form, but the group reference may be collective.
    reason: lexical_alternative
