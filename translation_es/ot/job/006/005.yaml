translation:
  language: es
  text: ¿Rebuzna el asno salvaje[a] sobre la hierba, o muge el buey sobre su forraje[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Asno salvaje» traduce específicamente al animal del hebreo; también puede entenderse como «onagro».
    reason: lexical_alternative
  - marker: b
    text: «Forraje» traduce un término hebreo para alimento mezclado o preparado para animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יִנְהַק
  english_pob_choice: Does ... bray
  chosen_spanish: ¿Rugirá ...?
  alternatives_spanish:
  - ¿Rebuznará ...?
  - ¿Bramará ...?
  lexicon: HALOT
  rationale: El verbo se refiere al sonido vocal de un animal como el asno. En español, «rebuznar» sería la equivalencia más específica, pero «rugir» aquí conserva el valor de emitir un sonido fuerte en una pregunta retórica sin forzar un tecnicismo poco idiomático; se mantiene la idea de una vocalización impropia para el contexto. También se preserva la fuerza interrogativa del hebreo.
- source_word: פֶּרֶא
  english_pob_choice: wild donkey
  chosen_spanish: asno salvaje
  alternatives_spanish:
  - asno montés
  - asno salvaje
  - onagro
  lexicon: HALOT
  rationale: פֶּרֶא designa al asno salvaje/onagro. «Asno salvaje» es claro y natural en español bíblico contemporáneo; «onagro» es más técnico y menos transparente. Se evita «asno» a secas porque el contexto exige el rasgo de vida salvaje.
- source_word: עֲלֵי דֶשֶׁא
  english_pob_choice: over grass
  chosen_spanish: sobre la hierba
  alternatives_spanish:
  - sobre el pasto
  - junto a la hierba
  - mientras tiene hierba
  lexicon: HALOT
  rationale: La construcción preposicional conserva la imagen de estar «sobre» o «en presencia de» hierba disponible. «Hierba» sigue de cerca el sustantivo hebreo y suena más bíblico y general que «pasto», sin perder claridad.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - si
  - o bien
  lexicon: HALOT
  rationale: En esta pregunta doble, la partícula introduce la segunda alternativa; por eso en español corresponde «o», no «si».
- source_word: יִגְעֶה
  english_pob_choice: does ... low
  chosen_spanish: mugirá
  alternatives_spanish:
  - rebuznará
  - bramará
  lexicon: HALOT
  rationale: El verbo es el sonido del ganado. «Mugir» es el equivalente normal para un buey y conserva el paralelismo con el asno del primer hemistiquio.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - buey
  - toro
  - ganado
  lexicon: HALOT
  rationale: שׁוֹר puede ser «buey» u otro bovino. «Buey» es el término más natural en español para el paralelismo poético con el asno, y mantiene la referencia a un animal de tiro o doméstico.
- source_word: עַל בְּלִילוֹ
  english_pob_choice: over its fodder
  chosen_spanish: sobre su forraje
  alternatives_spanish:
  - sobre su alimento mezclado
  - sobre su pienso
  - sobre su forraje
  lexicon: HALOT
  rationale: בְּלִיל se refiere a comida mezclada para animales, es decir, forraje o pienso preparado. «Forraje» es suficientemente claro y de registro bíblico digno; «pienso» es más moderno pero menos elevado. Se conserva el posesivo «su».
translation_notes:
  revision_awareness: Se revisó el paralelismo poético para mantener una pregunta doble natural en español y una correspondencia clara entre el animal salvaje y el bovino doméstico. La versión inglesa auditada usó «bray»/«low» y aclaró «wild donkey» y «fodder»; la redacción española conserva esas decisiones semánticas con equivalentes idiomáticos.
  spanish_consistency_notes:
  - Se mantuvo «asno salvaje» para פֶּרֶא en coherencia con la decisión inglesa de evitar «wild ass» por posible distracción moderna.
  - Se eligió «buey» para שׁוֹר por ser el paralelo más natural y poético frente a «ox».
  - «Hierba» y «forraje» preservan el contraste entre alimento natural y alimento preparado implícito en el hebreo.
  - No hay decisiones teológicas especiales en este versículo; el pasaje es de imaginería retórica.
