translation:
  language: es
  text: Ahora emitan un decreto para hacer cesar[a] a estos hombres, y esta ciudad no será reedificada hasta que yo emita un decreto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «proclamen un decreto», o «den una orden». El arameo dice literalmente «pongan/establezcan un decreto».
    reason: lexical_alternative
  - marker: b
    text: O «hasta que por mí se emita un decreto». Literalmente, «hasta que de mí se establezca un decreto».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - En este momento
  lexicon: HALOT
  rationale: La partícula aramea introduce una orden inmediata; «Ahora» conserva la urgencia sin añadir una relación lógica más fuerte que la del contexto administrativo.
- source_word: שִׂימוּ טְּעֵם
  english_pob_choice: issue a decree
  chosen_spanish: emitan un decreto
  alternatives_spanish:
  - promulguen un decreto
  - den una orden
  lexicon: HALOT
  rationale: La expresión es idiomática en arameo, literalmente ‘poner/establecer un decreto’. «Emitan un decreto» mantiene el carácter formal y jurídico del mandato mejor que una paráfrasis más libre.
- source_word: לְבַטָּלָא
  english_pob_choice: to make ... stop
  chosen_spanish: hacer que ... cesen
  alternatives_spanish:
  - detener a ...
  - hacer cesar a ...
  lexicon: HALOT
  rationale: 'El infinitivo tiene fuerza causativa: no solo ‘parar’, sino ‘hacer cesar’. «Hacer que ... cesen» refleja esa causatividad en español natural y digna.'
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  - estos varones
  lexicon: HALOT
  rationale: El sustantivo es masculino plural y el contexto alude a los opositores concretos. «Estos hombres» conserva la referencia exacta sin neutralizar el género del término fuente.
- source_word: וְקִרְיְתָא דָךְ
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - y esta ciudad
  lexicon: HALOT
  rationale: En español, la conjunción puede omitirse para evitar dureza sintáctica; el referente se mantiene claramente. El texto arameo enlaza una segunda cláusula administrativa.
- source_word: לָא תִתְבְּנֵא
  english_pob_choice: shall not be rebuilt
  chosen_spanish: no será reedificada
  alternatives_spanish:
  - no debe ser reedificada
  - no podrá ser reedificada
  lexicon: HALOT
  rationale: El pasivo de mandato/prohibición en este contexto se expresa bien con futuro pasivo formal. «Reedificada» conserva el sentido de reconstrucción urbana sin necesidad de explicar más de lo que dice el texto.
- source_word: עַד מִנִּי טַעְמָא יִתְּשָׂם
  english_pob_choice: until a decree is issued by me
  chosen_spanish: hasta que por mí se emita un decreto
  alternatives_spanish:
  - hasta que yo emita un decreto
  - hasta que se emita un decreto por mí
  lexicon: HALOT
  rationale: La frase literal es ‘hasta que de mí/por mí se establezca un decreto’. La pasiva con complemento agente preserva el tono formal y la procedencia real del decreto, como en la lectura inglesa revisada.
theological_decisions:
- issue: Agente implícito del decreto final
  english_pob_reading: until a decree is issued by me
  chosen_spanish_reading: hasta que por mí se emita un decreto
  alternative_spanish_readings:
  - hasta que yo emita un decreto
  - hasta que se emita un decreto
  rationale: El arameo expresa literalmente que el decreto procede ‘de mí’. En español, la pasiva con agente explícito evita perder esa procedencia y mantiene el registro administrativo sin convertirlo necesariamente en una orden directa en primera persona.
  doctrine_reference: No aplica; decisión de sintaxis y voz verbal, no de doctrina.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó una cláusula final más explicativa por una formulación directa: ‘and this city shall not be rebuilt until a decree is issued by me’. La versión española sigue esa estructura más directa y formal, evitando agregar un matiz final que el hebreo/arameo no exige.'
  spanish_consistency_notes:
  - Se mantuvo «decreto» para טְּעֵם/טַעְמָא, coherente con la elección inglesa de POB y con el registro real-administrativo del pasaje.
  - Se conservó «cesen» para לְבַטָּלָא, porque el valor principal es causativo (‘hacer cesar’) y no meramente reflexivo.
  - Se prefirió «reedificada» para תִתְבְּנֵא, que comunica reconstrucción de una ciudad con tono formal y bíblico sin forzar un calco.
  - No se añadió una conjunción explícita antes de «esta ciudad» porque el español fluye mejor así y la coordinación ya queda implícita en la estructura de decreto.
