revisions:
- from: Y el número de ellos fue de veintitrés mil[a], todo varón desde un mes de edad y arriba; porque no fueron contados[b] entre los hijos de Israel, porque no se les dio herencia entre los hijos de Israel.
  to: Y los contados entre ellos fueron veintitrés mil, todo varón de un mes de edad en adelante, porque no fueron contados entre los hijos de Israel[a], porque no se les dio herencia entre los hijos de Israel[a].
  rationale: Se ajusta פְקֻדֵיהֶם a una expresión personal y censal más fiel ('los contados entre ellos'), se mejora la naturalidad de la frase de edad con 'en adelante', se corrige el anclaje de la nota léxica al lugar pertinente, y se elimina una nota secundaria no respaldada por el aparato inglés auditado.
