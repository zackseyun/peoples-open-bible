translation:
  language: es
  text: Y sucederá que cualquiera que salga desde las puertas de tu casa hacia afuera, su sangre estará sobre su propia cabeza[a], y nosotros quedaremos inocentes. Pero todo el que esté contigo en la casa, su sangre estará sobre nuestras cabezas, si se le pone la mano encima[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: "él cargará con la responsabilidad de su propia muerte". El hebreo dice literalmente: "su sangre estará sobre su cabeza".'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "si una mano está sobre él", un modismo que significa que se le hace daño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: Conserva el tono formal de apertura de una cláusula estipulativa/jurídica, pero en español fluye mejor como fórmula introductoria natural sin perder solemnidad.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: anyone who
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: HALOT
  rationale: Expresa el valor distributivo de la construcción hebrea en forma idiomática y clara para una sola persona indeterminada.
- source_word: יֵצֵא מִדַּלְתֵי בֵיתֵךְ הַחוּצָה
  english_pob_choice: goes out from the doors of your house to the outside
  chosen_spanish: salga por las puertas de tu casa hacia afuera
  alternatives_spanish:
  - salga de las puertas de tu casa al exterior
  - salga de tu casa hacia fuera
  lexicon: HALOT
  rationale: Mantiene la imagen concreta de salir por las puertas y el movimiento hacia el exterior, sin añadir 'calle' ni suavizar la referencia espacial del hebreo.
- source_word: דָּמוֹ בְרֹאשׁוֹ
  english_pob_choice: his blood shall be on his own head
  chosen_spanish: su sangre caerá sobre su propia cabeza
  alternatives_spanish:
  - su sangre estará sobre su cabeza
  - él cargará con la culpa de su muerte
  lexicon: HALOT
  rationale: Preserva la metáfora hebrea de sangre/cabeza y su valor de responsabilidad o culpa por la propia muerte, sin convertirla del todo en explicación interpretativa.
- source_word: וַאֲנַחְנוּ נְקִיִּם
  english_pob_choice: and we shall be innocent
  chosen_spanish: y nosotros quedaremos inocentes
  alternatives_spanish:
  - y nosotros seremos inocentes
  - y quedaremos libres de culpa
  lexicon: HALOT
  rationale: '''Inocentes'' comunica bien la exención de culpa o responsabilidad. ''Quedaremos'' refleja el resultado legal de la condición, algo natural en español.'
- source_word: וְכֹל אֲשֶׁר יִהְיֶה אִתָּךְ בַּבַּיִת
  english_pob_choice: But everyone who is with you in the house
  chosen_spanish: Pero todo el que esté contigo en la casa
  alternatives_spanish:
  - Y todo el que esté contigo en la casa
  - Pero cualquiera que esté contigo dentro de la casa
  lexicon: HALOT
  rationale: '''Todo el que'' reproduce bien el distributivo y ''contigo en la casa'' conserva la cercanía personal y el lugar. Se mantiene el contraste con la cláusula anterior mediante ''Pero''.'
- source_word: דָּמוֹ בְרֹאשֵׁנוּ
  english_pob_choice: his blood shall be on our heads
  chosen_spanish: su sangre caerá sobre nuestra cabeza
  alternatives_spanish:
  - su sangre estará sobre nuestra cabeza
  - cargaremos con la culpa de su sangre
  lexicon: HALOT
  rationale: Conserva el mismo modismo de sangre/cabeza en plural colectivo, y mantiene la solemnidad legal del paralelo anterior.
- source_word: אִם יָד תִּהְיֶה בוֹ
  english_pob_choice: if a hand is laid on him
  chosen_spanish: si le ponen una mano encima
  alternatives_spanish:
  - si se le pone la mano encima
  - si alguien le pone la mano encima
  lexicon: HALOT
  rationale: Reproduce el modismo hebreo con una expresión natural en español. 'Le ponen' mantiene el sentido indefinido/impersonal del texto sin forzar una voz pasiva pesada.
theological_decisions:
- issue: Idiom of bloodguilt / responsibility
  english_pob_reading: Preserve 'his blood shall be on his own head / on our heads' in the main text
  chosen_spanish_reading: Preservar el modismo 'su sangre caerá sobre su propia cabeza / sobre nuestra cabeza'
  alternative_spanish_readings:
  - él será responsable de su propia muerte / nosotros seremos responsables de su muerte
  - su muerte recaerá sobre él / sobre nosotros
  rationale: El hebreo presenta una fórmula legal de culpa o responsabilidad por muerte, no solo una explicación abstracta. Mantener la imagen conserva la textura solemne y jurídica del pacto con Rahab.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Impersonal/human-agent ambiguity in harm idiom
  english_pob_reading: if a hand is laid on him
  chosen_spanish_reading: si le ponen una mano encima
  alternative_spanish_readings:
  - si le ponen la mano encima
  - si alguien le pone la mano encima
  rationale: El hebreo no especifica agente y usa un modismo de daño violento. La redacción elegida conserva esa vaguedad y el valor idiomático sin introducir un sujeto no presente.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El registro inglés más reciente no introdujo cambios textuales; el consenso de revisión es alto y solo señala cuestiones menores. La versión española sigue de cerca las decisiones léxicas estables del POB inglés, preservando los dos modismos jurídicos centrales y la ambigüedad impersonal del último miembro.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva el singular distributivo ('cualquiera que', 'todo el que') porque el hebreo usa formas singulares genéricas.
  - '''Inocentes'' traduce נְקִיִּם en sentido forense, no moralista; por eso no se amplía a ''sin culpa'' en el texto principal.'
  - El paralelismo entre 'su propia cabeza' y 'nuestra cabeza' se preserva para reflejar la simetría legal del hebreo.
  - Se evita 'Cristo', 'SEÑOR' u otras sustituciones no motivadas por el texto fuente.
