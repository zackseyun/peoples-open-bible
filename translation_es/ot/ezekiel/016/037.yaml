  to: Por tanto, he aquí que estoy reuniendo a todos tus amantes, con quienes hallaste placer[a], y a todos los que amaste, junto con todos los que aborreciste; y los reuniré contra ti de todas partes, y descubriré tu desnudez[b] delante de ellos[c], y verán toda tu desnudez.
