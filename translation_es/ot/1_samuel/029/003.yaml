  yaml_path: translation/ot/1_samuel/029/003.yaml
  text: Then the Philistine commanders said[a], “What are these Hebrews?” And Achish said to the Philistine commanders, “Is this not David, the servant of Saul king of Israel, who has been with me these days or these years? And I have found nothing in him from the day of his defecting until this very day.”
  footnotes:
