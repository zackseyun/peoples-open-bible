translation:
  text: 'Jesus said, "Behold, the sower went out; he filled his hand and cast seed.
    Some indeed fell on the path; the birds came and gathered them. Others fell on
    the rock, and they did not cast root down to the ground, and they did not send
    ears of grain up to the sky. And others fell on the thorns; they gathered them,
    choked the seed, and the worm ate them. And others fell on the good ground, and
    it gave good fruit up to the sky: it yielded sixty measures and one hundred twenty
    measures."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:47:02Z'
  footnotes:
  - marker: he filled his hand
    text: Thomas adds this physical detail of the sower filling his hand, which is
      absent from the synoptic parallels.
    reason: textual_variant
  - marker: they gathered them
    text: Thomas uses the verb ⲕⲱⲧϥ ('gather, pluck') rather than 'devour' as found
      in the canonical gospels.
    reason: textual_variant
  - marker: cast root down... send ears of grain up
    text: This vertical imagery (down to the ground, up to the sky) is unique to Thomas's
      version of the parable.
    reason: textual_variant
  - marker: the worm ate them
    text: A detail unique to Thomas, adding an extra layer of destruction to the seed
      among the thorns.
    reason: textual_variant
  - marker: sixty measures and one hundred twenty measures
    text: Coptic ⲉⲥⲟⲧⲉ means 'measure' or 'yield'. Thomas diverges from the synoptic
      thirty/sixty/hundredfold, using specific measures and doubling the sixty to
      one hundred twenty.
    reason: textual_variant
lexical_decisions:
- source_word: ⲕⲱⲧϥ
  chosen: gathered
  rationale: The Coptic verb ⲕⲱⲧϥ means 'to gather' or 'to pluck', contrasting with
    the synoptic parallels which use 'devour' (ⲟⲩⲱⲙ / καταφαγεῖν).
  lexicon: Crum 128b
  alternatives:
  - plucked
  - collected
- source_word: ⲧⲉⲩⲉϩⲙⲥ
  chosen: send ears of grain
  rationale: A compound of ⲧⲁⲩⲟ ('send forth') and ⲉϩⲙⲥ ('ear of grain'). This creates
    a vivid vertical contrast with 'cast root down to the ground' that is unique to
    Thomas.
  lexicon: Crum 436a, 60b
  alternatives:
  - produce ears
  - yield grain
- source_word: ⲱϭⲧ
  chosen: choked
  rationale: Standard meaning 'to choke' or 'crush'.
  lexicon: Crum 509a
  alternatives:
  - crushed
- source_word: ϥⲛⲧ
  chosen: worm
  rationale: Standard meaning 'worm'. This is a detail entirely unique to Thomas's
    version of the parable.
  lexicon: Crum 624a
  alternatives:
  - grub
- source_word: ⲉⲥⲟⲧⲉ
  chosen: measures
  rationale: The noun ⲉⲥⲟⲧⲉ means 'measure' or 'yield'. While often translated dynamically
    as 'per measure' or 'fold' to match the synoptics, the literal Coptic reads 'sixty
    measures' (ⲥⲉ ⲉⲥⲟⲧⲉ).
  lexicon: Crum 60b
  alternatives:
  - per measure
  - fold
theological_decisions:
- issue: Harmonization with Synoptic Parable of the Sower
  chosen_reading: Preserved all Thomasine divergences literally.
  rationale: Thomas's version of the parable has distinct narrative and theological
    emphases (e.g., the verticality of roots and sky, the specific yields). Harmonizing
    these to match Matthew or Mark would obscure the author's unique presentation
    of the saying.
  alternatives_noted:
  - devoured (for gathered)
  - sixtyfold and a hundredfold (for sixty measures and one hundred twenty measures)
drafter_notes: 'Saying 9 is Thomas''s version of the Parable of the Sower. While structurally
  similar to the synoptic versions (Mark 4:3-8, Matt 13:3-8, Luke 8:5-8), it contains
  several striking divergences: the sower filling his hand, the birds ''gathering''
  rather than devouring, the explicit vertical imagery of roots going down and ears
  going up to the sky, the addition of the worm eating the seed, and the altered final
  yield (60 and 120 measures). The translation strictly preserves these Thomasine
  distinctives rather than harmonizing them to the familiar canonical wording.'
