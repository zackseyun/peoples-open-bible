  to: ¡Levántense, suban contra una nación tranquila[a], que habita confiada, declara Yahvé, que no tiene puertas ni cerrojo[b]; habitan solas.
  rationale: Se corrigió el anclaje de la nota léxica para que recaiga sobre «tranquila», que es el término realmente explicado. También se reemplazó «habitan solitaria y aparte» por «habitan solas» para reflejar con precisión y naturalidad בָּדָד יִשְׁכֹּנוּ, evitando la discordancia gramatical y la sobreexpansión del sentido. Se mantuvieron «Yahvé», la fórmula profética y la imagen de falta de defensas.
