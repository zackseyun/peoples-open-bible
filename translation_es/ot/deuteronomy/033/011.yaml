  glossary_alignment: 'Alineado en general con la terminología del proyecto: יְהוָה -> ''Yahvé'', חֵילוֹ -> ''su fuerza'', מָתְנַיִם -> ''los lomos''. No hay conflictos mayores de glosario; la reparación requerida afecta sobre todo a las notas y a un pequeño ajuste estilístico de puntuación.'
