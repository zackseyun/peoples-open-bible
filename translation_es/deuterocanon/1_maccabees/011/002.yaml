  rationale: Se corrige el anclaje de la nota sobre ἤνοιγον αὐτῷ y se restaura en el texto principal el sentido de encuentro de συναντᾷν αὐτῷ con «salieran a su encuentro». Así el español sigue más de cerca el griego y la lógica de las notas del POB, sin perder naturalidad.
