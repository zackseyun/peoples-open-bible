  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: advertencia preventiva, lista escalonada de individuo/grupo, apartarse de Yahvé, ir a servir a otros dioses, y la metáfora de una raíz que produce veneno y ajenjo. También preserva correctamente Yahvé y la imagen de ''ajenjo''. Sin embargo, dos elecciones debilitan la fidelidad fina al audit trail: ''para que no'' suena más final que cautelar para פֶּן, y ''familia'' reduce el alcance social de מִשְׁפָּחָה, que en este contexto se acerca más a ''clan''.'
  spanish_quality_summary: 'El español es claro y legible, con buen registro bíblico moderno. Aun así, ''no sea que'' encaja mejor en español bíblico-natural para una advertencia repetida, y ''clan'' evita una lectura doméstica demasiado estrecha. El resto del verso fluye bien: ''cuyo corazón se aparta hoy'', ''para ir y servir'', y ''una raíz que produzca veneno y ajenjo'' son naturales y dignos.'
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé', 'Dios', y la preservación de categorías sociales explícitas. Hay una desviación menor respecto al razonamiento léxico auditado al usar 'familia' donde el inglés documentó 'clan' precisamente para evitar el sentido moderno de hogar nuclear. No hay conflicto doctrinal serio.
  issues:
  - severity: medium
    issue: פֶּן traducido como 'para que no'
    rationale: Aunque posible en algunos contextos, aquí la partícula introduce una advertencia cautelar repetida ('lest ... lest'). En español, 'no sea que' o 'no vaya a haber' conserva mejor la fuerza preventiva que 'para que no', que puede sonar a propósito/finalidad.
  - severity: medium
    issue: מִשְׁפָּחָה traducido como 'familia'
    rationale: El audit trail inglés eligió 'clan' para señalar una unidad de parentesco mayor que la familia moderna. 'Familia' en español puede estrechar indebidamente el referente; 'clan' comunica mejor la realidad social del hebreo en este contexto pactual.
  revised_spanish_text: no sea que haya entre ustedes un hombre o una mujer[a], o un clan o una tribu, cuyo corazón se aparta hoy de Yahvé nuestro Dios para ir y servir a los dioses de esas naciones; no sea que haya entre ustedes una raíz que produzca veneno y ajenjo.
  revised_footnotes:
