translation:
  language: es
  text: 'No tomará a ninguna de estas mujeres por esposa: viuda, ni divorciada, ni profanada[a], ni prostituta. Más bien, tomará por esposa a una virgen de entre su pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'deshonrada' o 'desecrada'; el término hebreo se refiere a una mujer cuyo estado se considera impropio según la ley de santidad sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָנָה
  english_pob_choice: a widow
  chosen_spanish: viuda
  alternatives_spanish:
  - una viuda
  lexicon: HALOT
  rationale: Conserva el sentido léxico básico y el valor legal de la lista de impedimentos matrimoniales; en español, el sustantivo desnudo funciona naturalmente en la enumeración.
- source_word: גְרוּשָׁה
  english_pob_choice: a divorced woman
  chosen_spanish: divorciada
  alternatives_spanish:
  - una mujer divorciada
  - repudiada
  lexicon: HALOT
  rationale: El participio pasivo hebreo describe a la mujer que ha sido divorciada; 'divorciada' es claro y mantiene el matiz jurídico-marital sin añadir más de lo debido.
- source_word: חֲלָלָה
  english_pob_choice: a defiled woman
  chosen_spanish: profanada
  alternatives_spanish:
  - definada
  - desacralizada
  - desecrada
  lexicon: HALOT
  rationale: Se preserva la tensión léxica de la raíz vinculada con profanación/contaminación en contexto de santidad sacerdotal. 'Profanada' es más cercano al eje semántico del hebreo que 'definada' y evita reducir el término solo a inmundicia física.
- source_word: זֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  lexicon: HALOT
  rationale: Equivalente léxico directo y contemporáneo; evita arcaísmos y conserva la fuerza moral/legal del término.
- source_word: לֹא יִקָּח
  english_pob_choice: he shall not take
  chosen_spanish: No tomará
  alternatives_spanish:
  - no deberá tomar
  - no podrá tomar
  lexicon: HALOT
  rationale: Reproduce el idiomático 'tomar' esposa en español bíblico-readable, manteniendo el registro legal de la prohibición sin convertirlo innecesariamente en una paráfrasis.
- source_word: כִּי אִם
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - sino que
  - excepto que
  lexicon: HALOT
  rationale: Introduce de manera natural la excepción permitida; 'más bien' conserva la oposición normativa y suena fluido en español.
- source_word: בְּתוּלָה
  english_pob_choice: a virgin
  chosen_spanish: una virgen
  alternatives_spanish:
  - doncella
  lexicon: HALOT
  rationale: En este contexto matrimonial y de ley sacerdotal, 'virgen' es la correspondencia precisa y más inteligible.
- source_word: מֵעַמָּיו
  english_pob_choice: from his own people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su propio pueblo
  - entre su pueblo
  lexicon: HALOT
  rationale: La preposición con el sustantivo de pueblo indica procedencia interna al grupo; 'de entre su pueblo' comunica bien la restricción comunitaria sin sobretraducir 'own'.
- source_word: אִשָּׁה
  english_pob_choice: as wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - como esposa
  - como mujer
  lexicon: HALOT
  rationale: Después de 'tomará', 'por esposa' es la expresión española más natural para el valor marital de אִשָּׁה en este tipo de fórmula legal.
theological_decisions:
- issue: Renderizar חֲלָלָה en una prohibición de matrimonio sacerdotal
  english_pob_reading: a defiled woman
  chosen_spanish_reading: profanada
  alternative_spanish_readings:
  - definada
  - desecrada
  - desacralizada
  rationale: La lectura de la POB inglesa retiene la fuerza de profanación en contexto de santidad. En español, 'profanada' preserva mejor la relación con lo santo/lo impuro que un término meramente higiénico o moralizante, y evita borrar la tensión léxica documentada en el hebreo.
  doctrine_reference: Ley de santidad sacerdotal; cf. principios de Levítico 21 sobre pureza y aptitud matrimonial.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés de la POB. Se conserva la secuencia prohibitiva y la excepción permitida, y se mantiene la tensión léxica de חֲלָלָה con una nota alternativa en español para no ocultar el rango semántico documentado.
  spanish_consistency_notes:
  - Se usó 'Yahvé' donde el texto base no introduce el nombre divino en este versículo; por tanto, no aparece aquí.
  - '''Virgen'' se mantuvo en sentido legal-marital, no como comentario sobre valor moral general.'
  - '''Profanada'' se eligió para reflejar el campo semántico sacerdotal de חֲלָלָה y evitar la banalización de la restricción.'
  - La construcción 'tomará por esposa' conserva el idiomático hebreo de tomar mujer/esposa con claridad natural en español.
