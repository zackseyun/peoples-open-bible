review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del griego: una repulsa enfática a abandonar la ley y las disposiciones pactales. «Lejos de nosotros abandonar…» refleja adecuadamente el idiomatismo ἵλεως ἡμῖν + infinitivo, y «abandonar la ley» corresponde bien a καταλεῖπειν νόμον. Sin embargo, «decretos» para δικαιώματα se aleja del matiz de prescripciones/estatutos y suena más a edictos emitidos por una autoridad; «ordenanzas» o «estatutos» preservan mejor la rationale auditada en inglés.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse ligeramente. En registro bíblico eclesial, «Lejos esté de nosotros abandonar…» suena más idiomático y completo que «¡Lejos de nosotros abandonar…!», aunque ambas son comprensibles. Además, la nota actual tiene una alternativa española poco natural por la puntuación y la sintaxis. Conviene ajustar la nota para que explique el literal con mejor español.
  glossary_alignment: 'Sin conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé/Mesías. La principal cuestión léxica es δικαιώματα: el inglés POB eligió «ordinances», y en español «ordenanzas» alinea mejor que «decretos» con esa decisión y con la carga legal pactal del contexto.'
  issues:
  - severity: medium
    issue: «decretos» para δικαιώματα
    rationale: Aunque posible en abstracto, «decretos» en español suele sugerir disposiciones promulgadas por un gobernante, mientras que aquí el campo semántico y la auditoría inglesa favorecen «ordenanzas» o «estatutos» como requerimientos legales/cultuales pactales.
  - severity: low
    issue: Construcción principal algo rígida
    rationale: «¡Lejos de nosotros abandonar…!» es entendible, pero «¡Lejos esté de nosotros abandonar…!» fluye mejor en español bíblico moderno y expresa con mayor naturalidad la fórmula de rechazo enfático.
  - severity: low
    issue: Nota alternativa con redacción poco natural
    rationale: «¡Que la misericordia esté lejos de nosotros, abandonar…!» no suena idiomático en español. La alternativa debe reformularse para explicar el literal sin producir una frase española torpe o confusa.
  revised_spanish_text: ¡Lejos esté de nosotros abandonar la ley y las ordenanzas![a]
  revised_footnotes:
