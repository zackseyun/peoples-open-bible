translation:
  language: es
  text: Pero los levitas no fueron contados entre los hijos de Israel[a], según había mandado Yahvé a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o, tradicionalmente, 'los hijos de Israel'. El hebreo dice 'los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/לְוִיִּם
  english_pob_choice: But the Levites
  chosen_spanish: Pero los levitas
  alternatives_spanish:
  - Y los levitas
  - Ahora bien, los levitas
  lexicon: HALOT
  rationale: El ו inicial marca contraste con el censo anterior; en español, 'Pero' expresa mejor esa oposición que un simple 'Y'. 'Levitas' conserva el nombre tribal con claridad y naturalidad.
- source_word: לֹא הָתְפָּקְדוּ
  english_pob_choice: were not counted
  chosen_spanish: no fueron contados
  alternatives_spanish:
  - no fueron registrados
  - no fueron numerados
  - no fueron empadronados
  lexicon: HALOT
  rationale: El hitpael de פקד en este contexto de censo indica ser incluido en el recuento. 'Fueron contados' refleja bien la voz pasiva y es natural en español; 'registrados' o 'empadronados' son posibles, pero menos directos aquí.
- source_word: בְּ/תוֹךְ
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - dentro de
  - entre los
  lexicon: HALOT
  rationale: La preposición señala inclusión dentro del conjunto de Israel. 'Entre' comunica adecuadamente esa pertenencia sin forzar un calco.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea בני ישראל. En español bíblico y contemporáneo, 'hijos de Israel' es transparente y respeta la forma del original; se evita sustituirla sin necesidad por 'israelitas'.
- source_word: כַּ/אֲשֶׁר
  english_pob_choice: as
  chosen_spanish: según
  alternatives_spanish:
  - como
  - tal como
  lexicon: HALOT
  rationale: Aquí la comparación remite al mandato previo. 'Según' transmite bien la conformidad con una orden anterior y suena natural en español formal.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había dispuesto
  lexicon: HALOT
  rationale: El perfecto señala una orden previa al reporte del censo. 'Había mandado' conserva el valor de mandato divino y evita suavizar la fuerza del verbo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: ''Yahvé'' como forma española del nombre divino, en lugar de sustituirlo por un título.'
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - a Moisés
  lexicon: HALOT
  rationale: El marcador de objeto directo introduce al destinatario del mandato. En español se expresa naturalmente con la preposición 'a' ante el nombre propio.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La tradición POB preserva el nombre propio de Dios en transliteración; en español, 'Yahvé' es la forma elegida para mantener esa transparencia y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el texto inglés más reciente se mantuvo sin cambios y el control cruzado indica alta concordancia. La versión española sigue esa lectura estable, conservando el contraste inicial y la estructura causal/conforme del mandato divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la expresión 'hijos de Israel' por transparencia formal, con nota léxica donde el español admite 'israelitas'.
  - '''No fueron contados'' se adapta a un pasivo natural en español sin perder el valor censal del hebreo.'
