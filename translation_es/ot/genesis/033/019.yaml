review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: Jacob compra una porción del campo, desde posesión de los hijos de Hamor, padre de Siquem, por un precio especificado. Sin embargo, «había plantado su tienda» no corresponde bien al modismo נָטָה ... אָהֳלוֹ, que significa ‘tender/instalar/levantar la tienda’, no ‘plantarla’. Además, la nota al pie está anclada en «tienda[a]» cuando su contenido explica «qesitah», por lo que el anclaje debe moverse al término monetario transliterado.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «plantado su tienda» suena impropio en español bíblico natural para una tienda/campamento. «Había instalado su tienda» o «había levantado su tienda» lee mejor y preserva el sentido. También conviene ajustar «qesitás» a una forma singular transliterada invariable con numeral para evitar una pluralización española poco asentada del préstamo.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Los nombres «Hamor» y «Siquem» son aceptables en este contexto. La transliteración de קְשִׂיטָה debe mantenerse en vez de una equivalencia falsa; en español conviene «qesitah» con nota explicativa, y con numeral puede dejarse invariable.
  issues:
  - severity: high
    issue: «había plantado su tienda» traduce mal el modismo hebreo de tender/instalar una tienda
    rationale: נטה con אֹהֶל se usa para ‘tender’, ‘instalar’ o ‘levantar’ una tienda. «Plantar» no es la colocación natural en español para una tienda y puede desviar la imagen.
  - severity: medium
    issue: La nota al pie está anclada en «tienda[a]», pero explica «qesitah»
    rationale: El marcador debe aparecer sobre la palabra o frase relevante. Tal como está, induce a pensar que la nota comenta «tienda» en vez del término monetario transliterado.
  - severity: medium
    issue: «qesitás» pluraliza un préstamo no asentado
    rationale: Dado que la nota explica el término hebreo exacto, es más prudente mantener «qesitah» como transliteración invariable tras el numeral, evitando una adaptación plural incierta.
  revised_spanish_text: Y compró la porción del campo donde había instalado su tienda, de mano de los hijos de Hamor, padre de Siquem, por cien qesitah[a].
  revised_footnotes:
  - marker: a
    text: Hebreo qesitah; una unidad o artículo de pago antiguo de valor exacto incierto, tradicionalmente vertido de diversas maneras como «piezas de dinero».
    reason: lexical_alternative
  revision_rationale: Se corrige el modismo de la tienda para reflejar fielmente נָטָה ... אָהֳלוֹ en español natural, y se mueve la nota al término monetario que realmente explica. También se normaliza la transliteración como forma invariable tras el numeral para evitar una pluralización española dudosa del hebreo.
