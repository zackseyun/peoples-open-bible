    text: 'Hebreo: «hasta que se terminó todo el asunto»; la frase resume la culminación de todo lo que Yahvé había mandado que se hablara al pueblo.'
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar con mayor precisión לְדַבֵּר como 'hablar' en vez de 'decir', y para mejorar el español idiomático de עַד תֹּם כָּל הַדָּבָר con 'hasta que se cumplió todo'. Se conserva 'Yahvé' según la política terminológica del proyecto y se mantiene la nota léxica, ajustada al nuevo texto.
