translation:
  language: es
  text: Para el director musical[a]. De David, el siervo[b] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Para el director de música». El término hebreo se refiere al responsable musical en el templo o en un contexto litúrgico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «esclavo». En esta superscripción, el hebreo עֶבֶד funciona como un título honorífico de relación con Yahvé; por eso «siervo» expresa mejor el sentido que «esclavo» en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el maestro de coro
  - Para el líder musical
  lexicon: HALOT
  rationale: En un encabezamiento de salmo, la función es la de dirigir la música o la ejecución litúrgica. «Director musical» comunica bien esa función en español contemporáneo y mantiene el valor litúrgico sin sonar demasiado eclesiástico o técnico.
- source_word: לְעֶבֶד
  english_pob_choice: servant
  chosen_spanish: servidor
  alternatives_spanish:
  - siervo
  - esclavo
  lexicon: HALOT
  rationale: En esta superscripción, עֶבֶד es un título honorífico vinculado a Yahvé. «Servidor» conserva la idea de servicio personal y suena natural en español, sin la dureza de «esclavo» ni el tono más tradicional de «siervo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» como forma española estable y reverente del nombre divino, preservando el nombre propio en vez de sustituirlo por un título.'
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  - Perteneciente a David
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, לְדָוִד admite una atribución amplia. «De David» conserva esa ambigüedad sin forzar autoría exclusiva ni una relación más estrecha de la que el hebreo exige.
theological_decisions:
- issue: Tratamiento del nombre divino en la superscripción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En coherencia con el criterio doctrinal del proyecto, se conserva el nombre propio divino y no se lo sustituye por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עֶבֶד en un título de salmo
  english_pob_reading: servant
  chosen_spanish_reading: servidor
  alternative_spanish_readings:
  - siervo
  - esclavo
  rationale: Aquí el término funciona como designación de honor y pertenencia a Yahvé, no como énfasis en servidumbre coercitiva. «Servidor» preserva la relación de servicio sin introducir una carga semántica excesiva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1; Contested terms: δοῦλος servant/slave (context-dependent)'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente que reorganiza la atribución como «de David, el servidor de Yahvé» y conserva el carácter de una sola superscripción. También refleja la decisión de mantener el nombre divino en forma explícita y de evitar una repetición innecesaria de preposiciones que sonaría forzada en español.
  spanish_consistency_notes:
  - 'Se conserva la puntuación breve propia de los encabezamientos de salmos: una primera cláusula funcional y luego la atribución.'
  - Se mantiene «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - «Servidor» se usa aquí como término honorífico y no como sustituto universal de «siervo» en todo el corpus.
  - No se introduce «Cristo» ni otra terminología ajena al hebreo del versículo.
