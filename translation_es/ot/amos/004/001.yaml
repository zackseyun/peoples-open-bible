  text: שִׁמְע֞וּ הַ/דָּבָ֣ר הַ/זֶּ֗ה פָּר֤וֹת הַ/בָּשָׁן֙ אֲשֶׁר֙ בְּ/הַ֣ר שֹֽׁמְר֔וֹן הָ/עֹשְׁק֣וֹת דַּלִּ֔ים הָ/רֹצְצ֖וֹת אֶבְיוֹנִ֑ים הָ/אֹמְרֹ֥ת לַ/אֲדֹֽנֵי/הֶ֖ם הָבִ֥יאָ/ה וְ/נִשְׁתֶּֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/amos/004/001.yaml
  text: Hear this word[a], you cows of Bashan, who are on the mountain of Samaria, who oppress the poor, who crush the needy, who say to their masters, “Bring[b], that we may drink.”
  footnotes:
  - marker: a
    text: Or “their husbands.” The Hebrew אֲדֹנֵיהֶם can refer to masters, lords, or husbands depending on context.
    reason: alternative_reading
  - marker: b
    text: Bashan was a fertile region east of the Jordan, famous for well-fed cattle; the image is a biting insult aimed at the luxurious and oppressive.
    reason: cultural_note
