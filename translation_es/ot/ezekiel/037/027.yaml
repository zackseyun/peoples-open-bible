translation:
  language: es
  text: Mi morada[a] estará sobre ellos, y yo seré su Dios, y ellos serán mi pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi tabernáculo estará sobre ellos» o «Mi morada estará sobre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁכָּנִי
  english_pob_choice: my dwelling place
  chosen_spanish: mi morada
  alternatives_spanish:
  - mi tabernáculo
  - mi lugar de morada
  - mi habitación
  lexicon: HALOT
  rationale: מִשְׁכָּן nombra un lugar de residencia o morada; en este contexto profético, «morada» comunica la idea concreta sin restringirla indebidamente al tabernáculo mosaico. «Mi tabernáculo» se conserva como alternativa legítima porque la POB inglesa la documenta, pero en español puede sonar más técnico o más ligado a una institución específica.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre
  - con ellos
  lexicon: HALOT
  rationale: La preposición עַל conserva su fuerza locativa/relacional en «sobre». Evita suavizar la imagen a «con ellos», que perdería el matiz del texto fuente y el sentido protector/cobertor que el hebreo permite.
- source_word: וְהָיִיתִי לָהֶם לֵאלֹהִים
  english_pob_choice: I will be their God
  chosen_spanish: yo seré para ellos Dios
  alternatives_spanish:
  - seré su Dios
  - yo seré su Dios
  - seré Dios para ellos
  lexicon: HALOT
  rationale: 'La fórmula de pacto se conserva sin ocultar la construcción hebrea: לָהֶם לֵאלֹהִים expresa relación de pertenencia/covenantal. «Seré para ellos Dios» mantiene esa estructura con claridad en español; «seré su Dios» es más idiomático, pero atenúa la forma hebrea que la POB inglesa decidió preservar de modo reconocible.'
- source_word: וְהֵמָּה יִהְיוּ לִי לְעָם
  english_pob_choice: they will be my people
  chosen_spanish: ellos serán para mí pueblo
  alternatives_spanish:
  - serán mi pueblo
  - ellos serán mi pueblo
  - serán para mí un pueblo
  lexicon: HALOT
  rationale: Se preserva la fórmula de pacto paralelo a la anterior. «Serán para mí pueblo» refleja el dativo hebreo לִי y la relación de pertenencia; se omite el artículo porque el hebreo usa «pueblo» sin artículo en esta construcción. «Serán mi pueblo» es una alternativa natural, pero la opción elegida deja más visible la relación verbal del original.
- source_word: וְהָיָה
  english_pob_choice: will be
  chosen_spanish: estará / seré / serán
  alternatives_spanish:
  - y será
  - y acontecerá
  lexicon: HALOT
  rationale: El prefijo conjuntivo con el verbo en discurso profético se rinde con futuros simples en español. La repetición de futuros en la frase completa mantiene la progresión del hebreo sin añadir una fórmula explicativa como «y acontecerá».
theological_decisions:
- issue: Fórmula de pacto «yo seré para ellos Dios / ellos serán para mí pueblo»
  english_pob_reading: Retain the classic covenant wording 'I will be their God, and they will be my people.'
  chosen_spanish_reading: 'Conservar la fórmula de pacto en español con la relación recíproca explícita: «yo seré para ellos Dios, y ellos serán para mí pueblo».'
  alternative_spanish_readings:
  - seré su Dios, y ellos serán mi pueblo
  - seré Dios para ellos, y serán mi pueblo
  rationale: El hebreo emplea una fórmula de pacto establecida, y la POB inglesa decide mantener su forma reconocible. En español, conservar la reciprocidad «para ellos / para mí» ayuda a no diluir la estructura relacional del original, aunque la redacción sea menos idiomática que «seré su Dios, y ellos serán mi pueblo».
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto base en inglés no requirió revisiones en el último pase; la lectura del hebreo y el auditorial coinciden en alto grado, con la única tensión principal en מִשְׁכָּן, donde se mantiene la opción de morada y se preserva la alternativa tabernáculo en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma editorial cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - «Dios» se usa para אֱלֹהִים conforme al valor de fórmula de pacto.
  - Se evita «SEÑOR» como sustituto del nombre divino, porque no corresponde a este texto.
  - La puntuación en español conserva la coordinación del hebreo con dos comas internas y una cláusula final paralela.
