translation:
  language: es
  text: Entonces lo pusieron bajo custodia, para aclararles[a] conforme a la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para aclarar»; o «para declararles con claridad». El verbo hebreo puede denotar hacer explícito un asunto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנִּיחֻהוּ
  english_pob_choice: So they put him
  chosen_spanish: Entonces lo pusieron
  alternatives_spanish:
  - Y lo pusieron
  - Así que lo colocaron
  lexicon: HALOT
  rationale: El verbo tiene valor causativo de poner/colocar. «Entonces» refleja el avance narrativo del waw consecutivo sin forzar una equivalencia mecánica.
- source_word: בַּמִּשְׁמָר
  english_pob_choice: in custody
  chosen_spanish: bajo custodia
  alternatives_spanish:
  - bajo vigilancia
  - en detención
  lexicon: HALOT
  rationale: En este contexto judicial, מִשְׁמָר no es simplemente ‘vigilancia’, sino un estado de retención bajo control legal. «Bajo custodia» es claro y natural en español.
- source_word: לִפְרֹשׁ
  english_pob_choice: to clarify
  chosen_spanish: para aclararles
  alternatives_spanish:
  - para aclarar
  - para declararles con claridad
  - para explicarles
  lexicon: HALOT
  rationale: פרשׁ puede significar ‘hacer claro, explicar, declarar distintamente’. «Aclararles» conserva el sentido de clarificación sin añadir una noción interpretativa no explícita en el hebreo.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: El pronombre objeto se integra naturalmente en el dativo español con «les», manteniendo la referencia a los destinatarios de la aclaración.
- source_word: עַל פִּי
  english_pob_choice: according to the word of
  chosen_spanish: conforme a la palabra de
  alternatives_spanish:
  - según la palabra de
  - de acuerdo con la palabra de
  lexicon: HALOT
  rationale: El modismo expresa conformidad con una palabra/mandato autoritativo. «Conforme a la palabra de» preserva el matiz verbal sin reemplazarlo por una formulación más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino revelado en el texto hebreo. En español, «Yahvé» es la forma adoptada en el proyecto para preservar el nombre propio y no sustituirlo por un título.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. La traducción conserva el nombre personal del pacto, evitando la sustitución por un título general.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of לִפְרֹשׁ in a legal setting
  english_pob_reading: to clarify
  chosen_spanish_reading: para aclararles
  alternative_spanish_readings:
  - para explicarles
  - para declararles con claridad
  rationale: En contexto judicial, el verbo no añade por sí mismo el contenido de la resolución; expresa que algo debía quedar claro o ser declarado distintamente. «Aclararles» conserva esa tensión sin sobreinterpretar.
  doctrine_reference: HALOT, פרשׁ
translation_notes:
  revision_awareness: La pauta inglesa pasó de ‘to make the decision clear to them’ a ‘to clarify for them’ para evitar añadir ‘the decision’. La versión española sigue esa revisión y no introduce ‘la decisión’; mantiene el valor de aclaración/explicación del verbo hebreo en un marco judicial.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma española del nombre divino, coherente con el criterio del proyecto.
  - «Bajo custodia» se usa en sentido legal, acorde con el contexto de retención del acusado.
  - «Aclararles» respeta el matiz de declaración explícita sin convertir el verbo en una paráfrasis interpretativa.
