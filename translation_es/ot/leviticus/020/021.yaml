    reason: lexical_alternative
  - marker: b
    text: Lit. «serán sin hijos». El hebreo no especifica el medio del juicio, solo el resultado.
    reason: alternative_reading
  revision_rationale: Se mejora la naturalidad del español al cambiar «Serán sin hijos» por «Quedarán sin hijos», preservando la misma decisión exegética del POB inglés. Se eliminó la nota innecesaria sobre «tomar en matrimonio» y se ajustaron las notas restantes para reflejar mejor las alternativas léxicas y la ambigüedad preservada en el original sin sobreexplicar.
