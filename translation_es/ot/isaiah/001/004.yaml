translation:
  language: es
  text: ¡Ah[a], nación pecadora, pueblo cargado de iniquidad[b], descendencia de malhechores, hijos que actúan corruptamente[c]! Han abandonado a Yahvé[d]; han despreciado al Santo de Israel; se han vuelto atrás[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La interjección hebrea puede expresar lamento o denuncia: «¡Ah!», «¡Ay!» o «¡Ay de...!».'
    reason: lexical_alternative
  - marker: b
    text: O «pueblo cargado con iniquidad».
    reason: lexical_alternative
  - marker: c
    text: O «hijos que obran corruptamente».
    reason: lexical_alternative
  - marker: d
    text: El hebreo usa el nombre divino YHWH, representado tradicionalmente en muchas versiones como «el SEÑOR».
    reason: alternative_reading
  - marker: e
    text: O «han vuelto la espalda» o «se han extrañado y se han echado atrás».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Ah
  chosen_spanish: ¡Ah[a]!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de...!
  - ¡Ay, nación pecadora!
  lexicon: HALOT
  rationale: La interjección hebrea puede expresar lamento o denuncia. «¡Ah!» conserva la exclamación sin cerrar indebidamente el matiz en una sola dirección; se mantiene la ambigüedad auditada por la POB inglesa.
- source_word: גּוֹי חֹטֵא
  english_pob_choice: sinful nation
  chosen_spanish: nación pecadora
  alternatives_spanish:
  - nación que peca
  - nación culpable
  lexicon: HALOT
  rationale: El participio funciona adjetivalmente y describe a la nación como caracterizada por el pecado. «Nación pecadora» es natural en español y preserva la imputación moral corporativa.
- source_word: עַם כֶּבֶד עָוֺן
  english_pob_choice: a people heavy with iniquity
  chosen_spanish: pueblo cargado de iniquidad
  alternatives_spanish:
  - pueblo pesado de iniquidad
  - pueblo agobiado de iniquidad
  - pueblo cargado de culpa
  lexicon: HALOT
  rationale: «כֶּבֶד» comunica peso/carga. En español, «cargado de iniquidad» comunica bien la metáfora de peso moral y resulta idiomático; se conserva el valor teológico de עָוֺן como iniquidad, no solo culpa subjetiva.
- source_word: זֶרַע מְרֵעִים
  english_pob_choice: offspring of evildoers
  chosen_spanish: descendencia de malhechores
  alternatives_spanish:
  - simiente de malhechores
  - descendencia de los que hacen mal
  - hijos de malhechores
  lexicon: HALOT
  rationale: זֶרַע es colectivo y genealógico. «Descendencia de malhechores» conserva el lenguaje familiar/corporal del reproche profético sin sonar forzado en español.
- source_word: בָּנִים מַשְׁחִיתִים
  english_pob_choice: children who act corruptly
  chosen_spanish: hijos que actúan corruptamente
  alternatives_spanish:
  - hijos que se corrompen
  - hijos corruptos
  - hijos que obran perversamente
  lexicon: HALOT
  rationale: El participio hiphil aquí describe conducta corrupta. «Actúan corruptamente» sigue de cerca el sentido verbal sin sugerir principalmente destrucción física; mantiene el paralelismo con la cláusula anterior.
- source_word: עָזְב֣וּ אֶת יְהוָ֗ה
  english_pob_choice: They have forsaken Yahweh
  chosen_spanish: Han abandonado a Yahvé
  alternatives_spanish:
  - Han dejado a Yahvé
  - Han desamparado a Yahvé
  lexicon: HALOT
  rationale: El verbo עָזַב admite «abandonar / dejar / forsake». Se usa «Han abandonado» por ser claro y fiel; se mantiene «Yahvé» según la terminología base del proyecto para el Tetragrámaton.
- source_word: נִֽאֲצ֛וּ
  english_pob_choice: despised
  chosen_spanish: han despreciado
  alternatives_spanish:
  - han despreciado con desprecio
  - han desechado
  - han tratado con desprecio
  lexicon: HALOT
  rationale: El verbo expresa rechazo despectivo, no solo desatención. «Han despreciado» es fuerte, breve y conserva la carga de ofensa pactual.
- source_word: קְד֥וֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel[a]
  lexicon: HALOT
  rationale: Es un título fijo isaiano. «El Santo de Israel» preserva el carácter titular y la referencia divina sin introducir una equivalencia interpretativa ajena al hebreo.
- source_word: נָזֹ֥רוּ אָחֽוֹר
  english_pob_choice: they have turned backward
  chosen_spanish: se han vuelto hacia atrás
  alternatives_spanish:
  - han retrocedido
  - se han apartado hacia atrás
  - se han vuelto atrás
  lexicon: HALOT
  rationale: El hebreo expresa retroceso/tornar atrás. «Se han vuelto hacia atrás» conserva la imagen direccional y la lectura revisada de la POB inglesa, con español natural.
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la convención del proyecto, se traduce como «Yahvé» para preservar el nombre propio del Dios del pacto y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Conservación del doble marco de acusación: nacional y familiar'
  english_pob_reading: nation / people / offspring / children
  chosen_spanish_reading: nación / pueblo / descendencia / hijos
  alternative_spanish_readings:
  - solo nación
  - solo pueblo
  - solo hijos
  rationale: El versículo intensifica la denuncia combinando metáforas corporativas y familiares. Se preservan ambas para no aplanar el peso teológico de la rebelión de Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Matiz de נִאֲצוּ
  english_pob_reading: despised
  chosen_spanish_reading: han despreciado
  alternative_spanish_readings:
  - han desdeñado
  - han tratado con desprecio
  - han desechado
  rationale: El verbo no solo indica falta de respeto sino rechazo despectivo. «Han despreciado» comunica bien la gravedad del agravio contra el Santo de Israel.
  doctrine_reference: HALOT; Isaías 1:4 context
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada de la POB inglesa que prefirió «they have turned backward» por encima de una paráfrasis más pesada. Por eso el cierre español usa «se han vuelto hacia atrás», que es natural y mantiene la direccionalidad y el tono de reproche del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evitó el calco rígido «pesado de iniquidad» en favor de una metáfora española transparente.
  - 'Se preservó la sucesión de cuatro imputaciones: nación, pueblo, descendencia, hijos.'
  - «El Santo de Israel» se dejó sin expansión para conservar el título isaiano fijo.
