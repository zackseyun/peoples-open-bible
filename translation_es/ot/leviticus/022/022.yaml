base_translation:
  language: en
  yaml_path: translation/ot/leviticus/022/022.yaml
  text: Anything blind[a], broken, mutilated, or with a wart, scab, or skin disease, these you shall not present to Yahweh; and you shall not place any of them on the altar as a food offering to Yahweh.
  footnotes:
