  glossary_alignment: Se alinea correctamente con la terminología del proyecto en «Yahvé», «Moisés», «Dios» implícito y el tratamiento de שִׁחֵת. No hay conflicto teológico. Conviene retirar la nota explicativa sobre «Yahvé» para ajustarse a la práctica del proyecto de no añadir notas no sustentadas por el expediente inglés o por una ambigüedad nueva en español.
