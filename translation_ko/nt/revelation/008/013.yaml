  text: '또 내가 보고 들었습니다. 한 독수리가 공중 한복판을 날며 큰 음성으로 말하기를, 「화 있다, 화 있다, 화 있다, 땅에 거하는 자들이여. 아직 나팔을 불려고 하는 세 천사의 남은 나팔 소리 때문이라」 하였습니다.'
