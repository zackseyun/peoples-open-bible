translation:
  language: es
  text: 'Entonces Yahvé envió a un hombre, un profeta, a los hijos de Israel[a], y les dijo: «Así dice Yahvé, el Dios de Israel: Yo los hice subir de Egipto, y los saqué de la casa de esclavitud[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los israelitas».
    reason: lexical_alternative
  - marker: b
    text: O «de la casa de esclavos». El hebreo es literalmente «de la casa de esclavos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrama, de acuerdo con la práctica del proyecto, en vez de sustituirlo por un título. 'Yahvé' es la forma española establecida para ese nombre.
- source_word: אִישׁ נָבִיא
  english_pob_choice: a man, a prophet
  chosen_spanish: un hombre, un profeta
  alternatives_spanish:
  - un profeta
  - un hombre profeta
  lexicon: HALOT
  rationale: El hebreo coloca dos sustantivos en aposición. Mantener ambos evita aplanar el matiz de que fue enviado un hombre que era profeta, no solo 'un profeta'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se preserva la designación corporativa y masculina del hebreo. 'Los hijos de Israel' corresponde bien al valor formal del original y sigue siendo inteligible en español.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. 'Así dice' mantiene el presente formular sin sobretraducir ni volverlo arcaizante.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los hijos de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se conserva el título de pacto con formulación clara y directa en español.
- source_word: הֶעֱלֵיתִי
  english_pob_choice: I brought you up
  chosen_spanish: yo los hice subir
  alternatives_spanish:
  - yo los subí
  - yo los saqué
  lexicon: HALOT
  rationale: עלה en causativo remite al éxodo como 'hacer subir' desde Egipto. En español, 'hice subir' preserva mejor esa imagen que un simple 'saqué'.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: La preposición española 'de' expresa con naturalidad el origen geográfico del movimiento.
- source_word: וָאֹצִיא
  english_pob_choice: and I brought you out
  chosen_spanish: y los saqué
  alternatives_spanish:
  - y los hice salir
  - y los conduje fuera
  lexicon: HALOT
  rationale: יצא en causativo se expresa con naturalidad como 'sacar'. Se conserva el paralelismo con el verbo anterior sin perder la fuerza de liberación.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: from the house of slavery
  chosen_spanish: de la casa de servidumbre
  alternatives_spanish:
  - de la casa de esclavitud
  - de la casa de esclavos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'casa de esclavos/siervos'. En español, 'casa de servidumbre' comunica la condición de opresión con dignidad formal y evita una construcción demasiado extraña; se mantiene la imagen de una casa asociada a servidumbre.
theological_decisions:
- issue: Nombre divino יְהוָה en el discurso profético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La referencia es al Tetragrama, no a un título genérico. Se preserva el nombre propio del pacto para mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Designación corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se mantiene el valor masculino plural del hebreo conforme a la política de precisión de género del proyecto. 'Los israelitas' es una alternativa idiomática, pero neutraliza la forma original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se siguió el estado revisado del inglés POB, especialmente la preferencia por 'house of slavery' en lugar de 'house of slaves'. Para el español, se evitó una traducción demasiado literal que sonaría extraña; 'casa de servidumbre' conserva la imagen de opresión y mantiene el registro bíblico sin perder inteligibilidad.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, coherente con el estándar del proyecto.
  - 'Se conservó el paralelismo verbal del éxodo: ''hice subir'' / ''saqué''.'
  - El marcador [a] está anclado en 'un hombre' para reflejar la alternativa de traducción de אִישׁ נָבִיא.
  - El marcador [b] está anclado en 'casa de servidumbre' para señalar la alternativa léxica del sintagma בית עבדים.
  - Se prefirió 'hijos de Israel' por consistencia con el tratamiento formal y masculino del plural hebreo.
