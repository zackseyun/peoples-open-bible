translation:
  language: es
  text: Cuando se informó al rey de lo ocurrido, concluyó que Judea estaba en rebelión; así que, después de partir de Egipto, feroz en su ánimo, tomó la ciudad por fuerza de armas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «capturada por la lanza», un modismo militar griego para indicar que una ciudad fue tomada en un asalto armado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προεστώτων
  english_pob_choice: was informed
  chosen_spanish: se informó al rey
  alternatives_spanish:
  - le fueron presentadas las noticias
  - le llegaron informes
  lexicon: LSJ
  rationale: El genitivo absoluto indica que el rey recibe conocimiento de los hechos. En español, la pasiva refleja conserva esa recepción de información sin añadir agentes no expresados en el griego.
- source_word: διέλαβεν
  english_pob_choice: he concluded
  chosen_spanish: concluyó
  alternatives_spanish:
  - entendió
  - dedujo
  - supuso
  lexicon: LSJ
  rationale: El verbo expresa una inferencia o juicio formado a partir de la noticia recibida. «Concluyó» mantiene ese matiz inferencial con naturalidad en español.
- source_word: ἀποστατεῖν
  english_pob_choice: was in revolt
  chosen_spanish: estaba en rebelión
  alternatives_spanish:
  - se había rebelado
  - estaba rebelándose
  - había apostatado
  lexicon: LSJ
  rationale: Aquí el contexto es político-militar, no principalmente religioso. «Rebelión» preserva el sentido de alzamiento contra la autoridad real y evita imponer «apostasía» como lectura principal.
- source_word: ἀναζεύξας
  english_pob_choice: after setting out
  chosen_spanish: después de partir
  alternatives_spanish:
  - después de ponerse en marcha
  - después de emprender el regreso
  lexicon: LSJ
  rationale: El participio describe la acción de levantar campamento o salir en marcha. «Partir» comunica bien el movimiento inicial sin cargar el texto con una precisión militar no explícita en la frase española.
- source_word: θηριωμένος τῇ ψυχῇ
  english_pob_choice: savage in spirit
  chosen_spanish: feroz en su ánimo
  alternatives_spanish:
  - salvaje en espíritu
  - brutal en el alma
  - como bestia en su interior
  lexicon: LSJ
  rationale: La imagen compara la disposición interior con una fiera. «Feroz en su ánimo» conserva la metáfora y suena natural en español culto; «ánimo» permite reflejar la dimensión interior del griego ψυχή.
- source_word: δοριαλώτον
  english_pob_choice: by force of arms
  chosen_spanish: por fuerza de armas
  alternatives_spanish:
  - por la lanza
  - como botín de lanza
  - mediante asalto armado
  lexicon: LSJ
  rationale: Es un modismo militar que literalmente alude a la captura por la lanza. «Por fuerza de armas» transmite el sentido idiomático de conquista violenta sin oscurecerlo con una literalidad poco transparente.
- source_word: ἔλαβεν τὴν μὲν πόλιν
  english_pob_choice: he took the city
  chosen_spanish: tomó la ciudad
  alternatives_spanish:
  - capturó la ciudad
  - se apoderó de la ciudad
  lexicon: LSJ
  rationale: «Tomó» es un equivalente militar breve y fiel; la frase siguiente ya especifica el modo de la captura, por lo que no hace falta repetirlo con otro verbo más fuerte.
theological_decisions:
- issue: ἀποστατεῖν en contexto político vs. religioso
  english_pob_reading: was in revolt
  chosen_spanish_reading: estaba en rebelión
  alternative_spanish_readings:
  - se había rebelado
  - había apostatado
  rationale: El pasaje habla del rey interpretando los hechos respecto de Judea como alzamiento político. Mantener «rebelión» evita desplazar el sentido hacia una carga confesional que el contexto inmediato no exige.
  doctrine_reference: 2 Macabeos 5:11; distinción entre rebelión política y apostasía religiosa en contexto narrativo
translation_notes:
  revision_awareness: 'El texto griego coincide sustancialmente con la base auditada en inglés. Se mantuvieron las mismas decisiones centrales: recepción de informes, inferencia del rey, rebelión de Judea, salida de Egipto, disposición feroz interior y conquista militar de la ciudad. La nota sobre δοριαλώτον se conserva como aclaración idiomática porque el español necesita explicitar el modismo militar.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «rebelión» sobre «apostasía» porque el contexto del verso es político-militar.
  - «Ánimo» se eligió para ψυχή por su capacidad de expresar la disposición interior sin introducir una antropología ajena al pasaje.
