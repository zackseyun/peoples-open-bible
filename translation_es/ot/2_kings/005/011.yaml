base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/011.yaml
  text: But Naaman became angry and went away[a], and he said, “Look, I said to myself, ‘Surely he will come out to me and stand and call on the name of Yahweh his God[b], and wave his hand over the place and heal the leprous person.’”
  footnotes:
  - marker: a
    text: Or, more traditionally, “and cure the leprosy” or “and heal the leper.” The Hebrew verb literally means “gather in/remove,” and the final term refers to a leprous condition or the one afflicted by it.
    reason: lexical_alternative
  - marker: b
    text: Or 'gather in the leprous skin disease'.
    reason: previous_rendering
