translation:
  language: es
  text: 'Entonces Sanbalat y Gesem me enviaron un mensaje, diciendo: «Ven, y reunámonos en las aldeas[a] de la llanura[b] de Ono». Pero ellos planeaban hacerme daño.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «en Chefirim», si el hebreo se toma como un nombre de lugar y no como «las aldeas».
    reason: alternative_reading
  - marker: b
    text: «Llanura» también puede traducirse «valle».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: me enviaron
  alternatives_spanish:
  - enviaron
  - mandaron decir
  lexicon: HALOT
  rationale: El verbo hebreo expresa envío de una delegación o mensaje; en español, con complemento indirecto explícito, «me enviaron» comunica con naturalidad el hecho narrativo sin añadir contenido ajeno.
- source_word: סַנְבַלַּט וְגֶשֶׁם
  english_pob_choice: Sanballat and Geshem
  chosen_spanish: Sanbalat y Gesem
  alternatives_spanish:
  - Sanballat y Geshem
  lexicon: Transliteración estándar
  rationale: Se conservan los nombres propios en transliteración. «Sanbalat» y «Gesem» reflejan una adaptación ortográfica española amplia y legible, sin alterar la identificación de los personajes.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: a decir
  alternatives_spanish:
  - diciendo
  - con este mensaje
  lexicon: HALOT
  rationale: La fórmula introduciendo discurso directo puede expresarse en español como «a decir», que es natural y conserva la dependencia del habla citada.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven ahora
  - Vamos
  lexicon: HALOT
  rationale: En una invitación directa, el imperativo idiomático corresponde mejor a «Ven» que a un calco de «ve». Mantiene el tono convocatorio del hebreo.
- source_word: וְנִוָּעֲדָה יַחְדָּו
  english_pob_choice: let us meet together
  chosen_spanish: reunámonos juntos
  alternatives_spanish:
  - reunámonos
  - congreguémonos juntos
  - concertemos una reunión juntos
  lexicon: HALOT
  rationale: El niphal de יעד expresa concertar un encuentro o reunirse por cita. «Reunámonos juntos» preserva el sentido recíproco y el matiz de encuentro acordado; aunque «juntos» es redundante en español, refleja el יחדו del hebreo y el énfasis del texto.
- source_word: בַּכְּפִירִים
  english_pob_choice: in the villages
  chosen_spanish: en las aldeas
  alternatives_spanish:
  - en los pueblos
  - en Chefirim
  lexicon: HALOT
  rationale: La lectura más probable entiende el término como sustantivo común plural, no como topónimo. «Aldeas» conserva el sentido de pequeños poblados y suena natural en español. Se preserva la alternativa toponímica en nota implícita mediante el registro de alternativas.
- source_word: בְּבִקְעַת אוֹנוֹ
  english_pob_choice: in the plain of Ono
  chosen_spanish: de la llanura de Ono
  alternatives_spanish:
  - del valle de Ono
  - en la llanura de Ono
  lexicon: HALOT
  rationale: בִּקְעָה designa una depresión amplia, llanura o valle. «Llanura» es una opción clara y natural en español; «valle» queda como alternativa válida por el rango semántico del hebreo.
- source_word: וְהֵמָּה חֹשְׁבִים
  english_pob_choice: But they were planning
  chosen_spanish: Pero ellos pensaban
  alternatives_spanish:
  - Pero ellos planeaban
  - Y ellos estaban pensando
  lexicon: HALOT
  rationale: El participio aquí expresa intención o maquinación, no mera actividad mental. «Pensaban» mantiene la idea de propósito oculto; el contexto adversativo queda reforzado con «Pero».
- source_word: לַעֲשׂוֹת לִי רָעָה
  english_pob_choice: to do me harm
  chosen_spanish: hacerme mal
  alternatives_spanish:
  - hacerme daño
  - hacerme maldad
  - causarme daño
  lexicon: HALOT
  rationale: רָעָה en este contexto indica daño hostil. «Hacerme mal» es idiomático en español y comunica la intención adversa sin imponer una especificación que el hebreo no exige.
theological_decisions:
- issue: Término de hostilidad intencional sin moralización excesiva
  english_pob_reading: to do me harm
  chosen_spanish_reading: hacerme mal
  alternative_spanish_readings:
  - hacerme daño
  - hacerme maldad
  rationale: El pasaje describe una trama de agresión contra Nehemías. Se evita introducir una moralización abstracta («maldad») en el texto principal para no desplazar el sentido concreto de perjuicio personal que tiene רָעָה aquí.
  doctrine_reference: Lectura contextual del hebreo narrativo; sin implicación doctrinal directa.
translation_notes:
  revision_awareness: El audit trail en inglés se mantiene en alto acuerdo y sin revisiones aplicadas; la versión española sigue la lectura principal del POB, conservando la alternativa toponímica de בַּכְּפִירִים y la alternativa léxica de בְּבִקְעַת como nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero en este versículo no aparece el nombre divino.
  - «Jesús», «Mesías» y otros términos proyectuales no intervienen aquí.
  - Se prefirió «hacerme mal» por ser natural y fiel al valor contextual de רָעָה, sin borrar la intención dañina del pasaje.
