translation:
  language: es
  text: Nadie tiene poder sobre el viento[a] para retener el viento, y no hay autoridad sobre el día de la muerte; tampoco hay baja en la guerra, y la maldad no librará a su dueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “espíritu”: “Nadie tiene poder sobre el espíritu para retener el espíritu”. El hebreo רוּחַ puede significar viento, espíritu o aliento.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: ser humano
  alternatives_spanish:
  - hombre
  - persona
  lexicon: HALOT
  rationale: El hebreo usa un singular genérico para un ser humano en general. En español, 'ser humano' conserva el alcance inclusivo sin forzar un masculino genérico donde puede sonar menos natural que en inglés.
- source_word: שַׁלִּיט
  english_pob_choice: has power
  chosen_spanish: tiene poder
  alternatives_spanish:
  - tiene autoridad
  - es dueño de
  lexicon: HALOT
  rationale: La idea es de dominio o capacidad efectiva. 'Tiene poder' comunica bien la fuerza del verbo en una construcción natural en español.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: 'El contexto inmediato favorece el fenómeno natural: una realidad que el ser humano no puede controlar, en paralelo con muerte y guerra. Se preserva la alternativa ''espíritu'' en nota porque el término hebreo es polisémico.'
- source_word: לִכְלוֹא
  english_pob_choice: to restrain
  chosen_spanish: retener
  alternatives_spanish:
  - restringir
  - contener
  - encerrar
  lexicon: HALOT
  rationale: Con 'viento', 'retener' expresa bien la idea de impedir su curso o detenerlo. Evita el matiz demasiado físico de 'encerrar' y el tono más técnico de 'restringir'.
- source_word: שִׁלְטוֹן
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  lexicon: HALOT
  rationale: Se conserva la distinción semántica respecto a 'poder' en la cláusula anterior. 'Autoridad' es el equivalente español más natural para la noción de gobierno o control efectivo.
- source_word: בְּיוֹם הַמָּוֶת
  english_pob_choice: over the day of death
  chosen_spanish: sobre el día de la muerte
  alternatives_spanish:
  - en el día de la muerte
  - contra el día de la muerte
  lexicon: HALOT
  rationale: '''Sobre'' refleja la idea de control o señorío que niega el texto: nadie tiene autoridad respecto de ese día.'
- source_word: מִשְׁלַחַת
  english_pob_choice: discharge
  chosen_spanish: dispensa
  alternatives_spanish:
  - liberación
  - exención
  - licencia
  lexicon: HALOT
  rationale: En contexto militar, la palabra apunta a ser despedido o liberado del servicio. 'Dispensa' comunica de forma breve y digna la ausencia de una salida o liberación en la guerra.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - impiedad
  - maldad moral
  - mal
  lexicon: HALOT
  rationale: Se mantiene el sustantivo abstracto. 'Maldad' preserva la fuerza proverbial sin convertirlo en un plural personal ('los malvados'), cosa que el hebreo no exige aquí.
- source_word: יְמַלֵּט
  english_pob_choice: will not deliver
  chosen_spanish: librará
  alternatives_spanish:
  - salvará
  - rescatará
  - liberará
  lexicon: HALOT
  rationale: '''Librará'' es una forma natural y bíblica en español para ''sacar de peligro'' o ''rescatar''. Evita sobrecargar el verbo con matices teológicos ajenos al proverbio.'
- source_word: בְּעָלָיו
  english_pob_choice: its master
  chosen_spanish: su dueño
  alternatives_spanish:
  - su amo
  - su señor
  - quien la practica
  lexicon: HALOT
  rationale: El hebreo puede designar dueño/amo/señor. Dado que 'maldad' está personificada, 'su dueño' conserva el vínculo con la idea de posesión o pertenencia que el POB inglés expresó como 'its master'.
theological_decisions:
- issue: Sentido de רוּחַ en la primera cláusula
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: La secuencia proverbial de realidades incontrolables (viento, muerte, guerra) hace preferible el sentido concreto 'viento'. Se mantiene la ambigüedad legítima del hebreo en nota, porque 'espíritu' también es posible lexicológicamente.
  doctrine_reference: Translation philosophy §3 (preservar la tensión léxica sin resolverla prematuramente)
- issue: Relación entre 'maldad' y su agente
  english_pob_reading: wickedness will not deliver its master
  chosen_spanish_reading: la maldad no librará a su dueño
  alternative_spanish_readings:
  - el malvado no se librará con su maldad
  - la maldad no salvará a quien la practica
  rationale: La lectura personifica la maldad como algo que no puede rescatar a quien le pertenece o la practica. Esta formulación conserva la ambigüedad del hebreo y evita reinterpretarlo como una simple afirmación sobre 'los malvados' en plural.
  doctrine_reference: Translation philosophy §3 (preservar tensión semántica y personificación retórica)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de Qohélet 8:8 y el aparato auditado en inglés, sin cambios de sentido relevantes respecto de la última revisión inglesa. Se preserva la ambigüedad de רוּחַ mediante nota, y se mantiene la personificación de רֶשַׁע como en el POB inglés.
  spanish_consistency_notes:
  - Se usa 'viento' en el texto principal y no 'espíritu', conforme al contexto inmediato y al POB inglés; la alternativa se documenta en nota.
  - '''Maldad'' se conserva como sustantivo abstracto y no se sustituye por ''los malvados'', para respetar la personificación hebrea.'
  - '''Dispensa'' refleja el sustantivo militar sin introducir una explicación más interpretativa que el hebreo.'
  - '''Su dueño'' mantiene la relación posesiva de בְּעָלָיו y armoniza con la personificación del sustantivo anterior.'
