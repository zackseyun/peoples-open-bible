  text: נַ֤עַר הָיִ֗יתִי גַּם זָ֫קַ֥נְתִּי וְֽ/לֹא רָ֭אִיתִי צַדִּ֣יק נֶעֱזָ֑ב וְ֝/זַרְע֗/וֹ מְבַקֶּשׁ לָֽחֶם׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/037/025.yaml
  text: I was young[a], and now I am old[b], yet I have not seen the righteous forsaken or his offspring begging for bread.
  footnotes:
  - marker: a
    text: Or 'seeking bread.' The Hebrew verb literally means 'seeking' or 'asking for,' but here likely refers to begging for basic food.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his seed,' that is, his offspring or descendants.
    reason: lexical_alternative
