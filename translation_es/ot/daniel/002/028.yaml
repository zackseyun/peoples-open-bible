review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el arameo y el rastro de auditoría inglés en la mayor parte del versículo: preserva bien el contraste inicial, la afirmación existencial, la revelación de misterios, el dativo con el título real, y la cláusula futura «lo que será». Sin embargo, no reproduce con precisión la decisión auditada para בְּאַחֲרִית יוֹמַיָּא, donde el inglés POB eligió «in the latter days» y preservó «in the last days» como alternativa en nota. El español puso «en los últimos días» en el texto y repitió exactamente lo mismo en la nota, perdiendo la distinción entre lectura principal y alternativa. Además, «en los cielos» es posible, pero «en el cielo» suena más natural en español bíblico y sigue siendo fiel al singular colectivo del referente celestial.'
  spanish_quality_summary: El texto es claro y legible, pero tiene dos detalles mejorables. Primero, «en los últimos días» introduce una formulación más fijada escatológicamente en español que la decisión inglesa quiso evitar como lectura principal; «en los días postreros» o «en los días venideros» resuelve mejor, y «en los días postreros» conserva la tensión tradicional sin ser arcaísmo excesivo. Segundo, «sobre tu cama» es entendible, pero «sobre tu lecho» armoniza mejor con el tono digno del pasaje y evita una expresión demasiado cotidiana junto a «visiones de tu cabeza».
  glossary_alignment: 'No hay conflicto con las directrices mayores del glosario. «Dios», «revela», «misterios» y el tratamiento de la forma indefinida de אֱלָהּ están bien encaminados. La principal desalineación está en la decisión temporal: el proyecto inglés privilegió una formulación equivalente a «latter days», no «last days» como texto principal. También conviene ajustar la nota a esa decisión para que la alternativa sea real y no idéntica al texto.'
  issues:
  - severity: high
    issue: La frase principal «en los últimos días» no corresponde a la decisión auditada «in the latter days».
    rationale: El inglés POB hizo una decisión teológica y léxica deliberada para mantener apertura semántica y evitar que «last days» fuera la lectura principal. El español actual borra esa distinción y endurece innecesariamente el matiz escatológico.
  - severity: high
    issue: La nota [b] repite exactamente la misma redacción que aparece en el texto principal.
    rationale: Una nota de alternativa no puede ofrecer como variante la misma frase del texto. Esto invalida la función explicativa de la nota y contradice el rastro de auditoría.
  - severity: medium
    issue: «En los cielos» es menos natural que «en el cielo» en este contexto.
    rationale: Aunque formalmente defendible, en español bíblico corriente «hay un Dios en el cielo» suena más idiomático y digno sin sacrificar el sentido del arameo בִּשְׁמַיָּא.
  - severity: low
    issue: «Sobre tu cama» resulta algo cotidiano para el registro buscado.
    rationale: «Sobre tu lecho» mantiene mejor el tono literario y eclesial del pasaje, sin añadir interpretación.
  revised_spanish_text: 'Pero hay un Dios en el cielo que revela misterios[a], y ha dado a conocer al rey Nabucodonosor lo que será en los días postreros[b]. Tu sueño, y las visiones de tu cabeza sobre tu lecho[c], fueron estas:'
  revised_footnotes:
