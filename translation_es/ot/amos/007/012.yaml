    text: 'O: «gana allí tu sustento» / «gánate allí la vida»; la expresión «come pan» probablemente lleva el sentido de ganarse allí la vida.'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al hebreo y a la decisión del POB de conservar el modismo literal «come allí pan». Solo se corrige la nota para expresar con español natural y preciso la alternativa idiomática documentada en inglés.
