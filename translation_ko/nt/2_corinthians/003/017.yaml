id: 2CO.3.17
reference: 2 Corinthians 3:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ δὲ κύριος τὸ πνεῦμά ἐστιν· οὗ δὲ τὸ πνεῦμα ⸀κυρίου, ἐλευθερία.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/017.yaml
  text: Now the Lord is the Spirit, and where the Spirit of the Lord is, there is freedom.
  footnotes:
  - marker: a
    text: Or, "Now the Lord is the Spirit" may be understood as a close contextual identification without specifying how the relationship should be defined theologically.
    reason: alternative_reading
translation:
  language: ko
  text: 주는 영이십니다. 주의 영이 계신 곳에는 자유가 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '본 절의 「주」(ὁ κύριος)와 「영」(τὸ πνεῦμα)의 동일시는 해석사에서 여러 층위로 읽혀 왔다: (1) 출 34장의 야훼-기독론적 동일시 — 모세가 돌아선 야훼가 곧 부활하신 메시아이다, (2) 메시아의 영-부여 사역에 대한 진술 — 부활하신 주는 영을 통해 일하신다, (3) 신학적·기능적 동일시 — 주와 영은 자유를 가져오시는 동일한 신적 행위자이다. 한국 전통 번역은 「영」을 「성령」으로 자동 격상해 왔으나, 본 절의 πνεῦμα는 야훼·메시아·성령이 어떻게 한 신적 작동으로 수렴하는지를 가리키는 다층적 표현이다. DOCTRINE.md의 비-대문자화 원칙에 따라 「영」으로 보존하여 해석의 폭을 닫지 않는다.'
    reason: theological_note
lexical_decisions:
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  lexicon: BDAG
  rationale: 합쇼체 단음절 「주」. 본 절의 다층적 동일시 때문에 「야훼」/「예수」 어느 쪽으로도 환원하지 않는다.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_korean: 영
  alternatives_korean:
  - 성령
  lexicon: BDAG
  rationale: 3:6과 일관성 유지. 본 절의 신학적 의미는 footnote와 theological_decisions에서 다룬다.
- source_word: ἐλευθερία
  english_pob_choice: freedom
  chosen_korean: 자유
  alternatives_korean:
  - 해방
  lexicon: BDAG
  rationale: 바울 신학의 정립 어휘.
theological_decisions:
- issue: 3:17 ὁ δὲ κύριος τὸ πνεῦμά ἐστιν의 신학적 함의
  chosen_reading: 주는 영이십니다 (다층적 동일시를 보존; 「주」와 「영」 모두 환원하지 않음)
  alternative_readings:
  - 주는 곧 성령이십니다
  - 그 주는 그 영이시다 (출 34장 인유 — 야훼=영)
  - 주(예수)는 영을 통해 일하시는 분이다
  rationale: 바울의 진술은 (a) 출 34:34에서 모세가 돌아선 야훼를 부활하신 메시아와 동일시하는 기독론적 진술, (b) 메시아의 영-부여 사역에 대한 기능적 진술, (c) 야훼-메시아-영의 신적 작동의 통일성에 대한 진술 등으로 읽힌다. 한국 전통은 「주는 곧 성령이시다」로 옮겨 삼위일체 신학 안에서 위격 동일시 위험을 안고 있다. 「주는 영이십니다」로 옮기되, 「영」을 「성령」으로 격상하지 않고 footnote로 해석사를 제시한다.
  doctrine_reference: DOCTRINE.md §1 source-primacy; preserve theological ambiguity; non-capitalization of πνεῦμα
