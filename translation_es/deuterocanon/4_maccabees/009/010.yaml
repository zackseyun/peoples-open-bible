  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: genitivo absoluto temporal («Cuando dijeron estas cosas»), sujeto evaluativo «el tirano», correlación «no solo ... sino también», y las dos caracterizaciones «desobedientes» e «ingratos». Sin embargo, «como contra» suena demasiado calcado para ὡς κατὰ y no comunica bien en español la idea de percepción o trato hostil. Además, «se enojó» es algo coloquial y debilita el registro frente a ἐχαλέπαινεν.'
