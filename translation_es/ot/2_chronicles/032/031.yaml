base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/031.yaml
  text: And so[a], in the matter of the envoys of the princes of Babylon, who had been sent to him to inquire about the sign that had happened in the land, God left him, to test him[b], to know all that was in his heart.
  footnotes:
  - marker: a
    text: Or 'the wonder' or 'the portent' for 'the sign.'
    reason: lexical_alternative
  - marker: b
    text: The wording 'to know all that was in his heart' is retained as written, preserving the narrative's tension; some understand it as 'to reveal' or 'to expose' what was in his heart.
    reason: alternative_reading
