translation:
  language: es
  text: Y dejó a José, hijo de Zacarías, y a Azarías, líderes del pueblo, con el resto de las fuerzas en Judea para la defensa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para guardia» o «para protección». La expresión griega εἰς τήρησιν subraya la idea de vigilar o guardar.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέλιπεν
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - lo dejó
  - dejó atrás
  lexicon: LSJ
  rationale: El verbo expresa la acción de dejar a alguien en un lugar o cargo. «Dejó» es natural en español y conserva la idea de permanecer encargados sin sobretraducir como «nombró».
- source_word: Ἰώσηφον τὸν τοῦ Ζαχαρίου
  english_pob_choice: Joseph son of Zechariah
  chosen_spanish: José, hijo de Zacarías
  alternatives_spanish:
  - José, el hijo de Zacarías
  lexicon: LSJ
  rationale: La construcción griega indica filiación. «Hijo de» reproduce de manera clara y fiel el parentesco.
- source_word: Ἀζαρίαν
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  lexicon: Standard transliteration
  rationale: Nombre propio bíblico usual en español; se mantiene la forma habitual y reconocible.
- source_word: ἡγούμενον τοῦ λαοῦ
  english_pob_choice: leaders of the people
  chosen_spanish: líderes del pueblo
  alternatives_spanish:
  - gobernantes del pueblo
  - caudillos del pueblo
  lexicon: LSJ
  rationale: El participio con sentido de conducción puede abarcar liderazgo u oficio de mando. Dado el ajuste del texto inglés revisado, el plural español refleja que José y Azarías quedan ambos en esa función.
- source_word: μετὰ τῶν ἐπιλοίπων τῆς δυνάμεως
  english_pob_choice: with the rest of the forces
  chosen_spanish: con el resto de las fuerzas
  alternatives_spanish:
  - con el resto del ejército
  - con los demás de la fuerza
  lexicon: LSJ
  rationale: «Fuerzas» comunica bien el sentido militar de δύναμις en este contexto y sigue de cerca la elección inglesa.
- source_word: ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: in Judea
  chosen_spanish: en Judea
  alternatives_spanish:
  - en Judea
  lexicon: LSJ
  rationale: Topónimo estándar en español para el territorio judío.
- source_word: εἰς τήρησιν
  english_pob_choice: for defense
  chosen_spanish: para defensa
  alternatives_spanish:
  - para guardia
  - para proteger
  lexicon: LSJ
  rationale: La frase conserva la idea de vigilancia/guardia, pero en este contexto militar el sustantivo «defensa» expresa bien la finalidad sin perder la nota de custodia.
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que cambió el singular inglés «leader of the people» a plural «leaders of the people». Por eso la redacción española usa «líderes del pueblo» para José y Azarías, evitando una lectura singular indebida.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con puntuación española estándar.
  - Se conservó la filiación «hijo de Zacarías» sin expandirla en explicación adicional.
  - La nota al pie está anclada correctamente en «Azarías[a]» y corresponde a la alternativa semántica de εἰς τήρησιν.
