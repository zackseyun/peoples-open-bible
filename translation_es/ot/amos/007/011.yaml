translation:
  language: es
  text: 'Porque esto es lo que ha dicho Amós: «Jeroboam morirá a espada, e Israel ciertamente irá al exilio[a] de su tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciertamente será exiliado» o «sin duda será llevado al exilio». El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la afirmación.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: HALOT
  rationale: Introduce la explicación o reporte de la acusación anterior. «Porque» reproduce bien la conexión discursiva causal/explicativa del hebreo en un español natural y solemne.
- source_word: כֹה אָמַר
  english_pob_choice: this is what ... has said
  chosen_spanish: esto es lo que ha dicho
  alternatives_spanish:
  - así ha dicho
  - esto es lo que dijo
  lexicon: HALOT
  rationale: Conserva la fórmula reportativa del hebreo sin calcar rígidamente «así dice». Como aquí se transmite una declaración ya atribuida a Amos, el pretérito perfecto «ha dicho» suena natural y mantiene el valor de cita reportada.
- source_word: עָמוֹס
  english_pob_choice: Amos
  chosen_spanish: Amos
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio con la transliteración usual en español.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: El hebreo usa un instrumento de muerte violenta. En español, «a espada» es la expresión más natural y fiel para muerte causada por ese medio, sin perder la fuerza del instrumento.
- source_word: יָמוּת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  lexicon: HALOT
  rationale: Corresponde al futuro simple del verbo מות en este contexto.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  lexicon: transliteración estándar
  rationale: Se mantiene la forma habitual del nombre del rey en español.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: and Israel
  chosen_spanish: e Israel
  alternatives_spanish:
  - y Israel
  lexicon: HALOT
  rationale: Se conserva el sujeto colectivo nacional «Israel». La forma «e» es la adaptación fonética correcta antes de vocal inicial.
- source_word: גָּלֹה יִגְלֶה
  english_pob_choice: will surely go into exile
  chosen_spanish: ciertamente será llevado en cautiverio
  alternatives_spanish:
  - ciertamente irá al exilio
  - será deportado con certeza
  - será llevado sin duda al exilio
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. En español, «ciertamente» transmite esa intensificación. «Ser llevado en cautiverio» expresa el exilio/deportación con una formulación fluida y suficientemente amplia; se evita suavizar el movimiento forzado implícito en el hebreo.
- source_word: מֵעַל אַדְמָתוֹ
  english_pob_choice: from its land
  chosen_spanish: lejos de su tierra
  alternatives_spanish:
  - de su tierra
  - fuera de su tierra
  - de su suelo
  lexicon: HALOT
  rationale: «מֵעַל» aporta la idea de separación «de sobre»; en español, «lejos de» comunica la expulsión/alejamiento resultante de forma natural. «Tierra» preserva el valor territorial/corporativo de אַדְמָה mejor que «suelo» en este contexto.
theological_decisions:
- issue: Valor colectivo de «Israel» y posesivo implícito
  english_pob_reading: Corporate/national Israel, rendered with neuter singular 'its land'
  chosen_spanish_reading: Israel como entidad colectiva/nacional, con «su tierra»
  alternative_spanish_readings:
  - su país
  - la tierra de Israel
  - su tierra natal
  rationale: El hebreo trata a Israel como singular colectivo. En español, «su tierra» mantiene el referente corporativo sin forzar una interpretación individual ni añadir explicaciones ajenas al texto.
  doctrine_reference: Principios de consistencia terminológica y claridad pública del POB
- issue: Sentido de la acusación transmitida por Amos
  english_pob_reading: Reported prophetic statement preserved as accusation content
  chosen_spanish_reading: Cita reportada de una profecía atribuida a Amos
  alternative_spanish_readings:
  - declaración profética
  - denuncia atribuida a Amos
  rationale: El versículo funciona como formulación de una acusación contra Amos basada en su dicho previo. Mantener el carácter de cita reportada preserva la tensión del pasaje sin adelantar juicio interpretativo.
  doctrine_reference: Lectura contextual y preservación de la función discursiva del texto
translation_notes:
  revision_awareness: La versión española sigue la última revisión del inglés POB al reflejar «from its land» de manera más directa y natural. Se mantuvo la intensificación hebrea de גָּלֹה יִגְלֶה con un adverbio español equivalente («ciertamente»), y se evitó una paráfrasis que diluyera la fuerza del enunciado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como traducción por defecto del nombre divino, aunque este versículo no lo contiene.
  - «Israel» conserva el valor colectivo/nacional del hebreo; por eso se usa el posesivo singular «su».
  - «A espada» preserva el medio de muerte violenta sin introducir una construcción más interpretativa.
