    reason: lexical_alternative
  - marker: b
    text: Literalmente, «le asignamos la autoridad del liderazgo/gobierno».
    reason: lexical_alternative
  revision_rationale: Se corrigen las notas para que correspondan a las alternativas preservadas en la auditoría inglesa y a sus lugares correctos en el texto. También se ajusta la frase final a «la autoridad del liderazgo» para reflejar mejor ἡγεμονία + ἐξουσία, y «como corresponde» mejora la naturalidad de προσηκόντως sin alterar el sentido.
