translation:
  language: es
  text: Ahora júrame por Yahvé que no cortarás mi descendencia[b] después de mí, ni harás desaparecer mi nombre[a] de la casa de mi padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mi nombre» aquí se refiere a la línea familiar recordada de Saúl o a su posición dentro de su clan.
    reason: cultural_note
  - marker: b
    text: O «mi posteridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Es un marcador discursivo que introduce la petición final de Saúl. En español, «Ahora» suena natural y conserva el valor de transición sin añadir contenido.
- source_word: הִשָּׁבְעָה לִּי
  english_pob_choice: swear to me
  chosen_spanish: júrame
  alternatives_spanish:
  - hazme un juramento
  - júrame a mí
  lexicon: HALOT
  rationale: El imperativo nifal de שבע en este contexto pide una fórmula de juramento. «Júrame» es idiomático en español y mantiene la relación directa con el objeto indirecto «a mí» implícito en el verbo.
- source_word: בַּיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por el SEÑOR
  - por Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la convención del proyecto, ya que el hebreo usa el Tetragrámaton de manera explícita en la fórmula de juramento.
- source_word: אִם
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: En la fórmula de juramento, אִם introduce el contenido comprometido. En español, «que» expresa mejor la cláusula jurada que un literal «si».
- source_word: זַרְעִי
  english_pob_choice: my descendants
  chosen_spanish: mi descendencia
  alternatives_spanish:
  - mi descendencia
  - mis hijos
  - mi linaje
  lexicon: HALOT
  rationale: זֶרַע aquí tiene sentido dinástico/descendencial. «Mi descendencia» conserva ese valor sin sonar arcaico; también deja abierta la posible referencia colectiva del término.
- source_word: תַּכְרִית
  english_pob_choice: you will not cut off
  chosen_spanish: no cortarás
  alternatives_spanish:
  - no exterminarás
  - no extirparás
  lexicon: HALOT
  rationale: El verbo hebreo lleva la idea de cortar/eliminar una línea. «No cortarás» preserva la imagen verbal y evita suavizar la fuerza del original.
- source_word: אַחֲרָי
  english_pob_choice: after me
  chosen_spanish: después de mí
  alternatives_spanish:
  - cuando yo haya muerto
  - tras de mí
  lexicon: HALOT
  rationale: La referencia temporal es clara en el contexto sucesorio. «Después de mí» es natural y conserva la perspectiva de posterioridad sin explicitar más de lo que el texto dice.
- source_word: וְאִם
  english_pob_choice: and that
  chosen_spanish: ni
  alternatives_spanish:
  - y que
  - ni tampoco
  lexicon: HALOT
  rationale: La segunda cláusula coordina otra petición negativa. «Ni» enlaza con la primera negación y da una estructura fluida en español sin perder la coordinación del hebreo.
- source_word: תַּשְׁמִיד
  english_pob_choice: you will not wipe out
  chosen_spanish: borrarás
  alternatives_spanish:
  - destruirás
  - aniquilarás
  lexicon: HALOT
  rationale: El hiphil de שמד expresa destrucción/aniquilación. En relación con el «nombre», «borrarás» comunica bien la eliminación de la memoria o la identidad familiar, como en el audit trail inglés.
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi fama
  - mi memoria
  lexicon: HALOT
  rationale: Se mantiene literalmente «mi nombre», porque en hebreo puede incluir identidad recordada y reputación familiar. Esa literalidad es importante aquí por su valor social y dinástico.
- source_word: מִבֵּית אָבִי
  english_pob_choice: from my father's house
  chosen_spanish: de la casa de mi padre
  alternatives_spanish:
  - de la casa de mi padre
  - de mi casa paterna
  - de mi familia
  lexicon: HALOT
  rationale: La expresión hebrea refiere al hogar/linaje paterno. «Casa de mi padre» preserva la estructura familiar y su resonancia genealógica en español.
theological_decisions:
- issue: Renderización del nombre divino יהוה en una fórmula de juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton de forma directa en la fórmula de juramento. En coherencia con la política del proyecto, se traduce como «Yahvé» para conservar el nombre divino y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la negativa en la petición juramentada
  english_pob_reading: that you will not cut off ... and that you will not wipe out ...
  chosen_spanish_reading: que no cortarás ... ni borrarás ...
  alternative_spanish_readings:
  - que no cortarás ... y que no borrarás ...
  - si no cortas ... ni borras ...
  rationale: En hebreo, אִם en juramentos introduce el contenido del compromiso, no una condición ordinaria. El español usa «que» y coordina con «ni» para mantener el valor de promesa negativa sin volverla condicional.
  doctrine_reference: Gramática hebrea de fórmulas de juramento en contexto narrativo
- issue: Sentido de זֶרַע en contexto dinástico
  english_pob_reading: my descendants
  chosen_spanish_reading: mi descendencia
  alternative_spanish_readings:
  - mi linaje
  - mi posteridad
  rationale: La cuestión no es biológica en sentido estrecho, sino la continuidad de la casa de Saúl. «Mi descendencia» comunica la posteridad dinástica y deja visible la tensión entre lo literal y lo genealógico.
  doctrine_reference: HALOT, entrada זרע; contexto de sucesión real
translation_notes:
  revision_awareness: 'El contexto auditado en inglés coincide plenamente con el sentido del hebreo: el marcador de juramento con אִם se expresa en español como cláusula introducida por «que», y las dos negaciones se conservan con fuerza directa. No hubo cambios relevantes en las revisiones inglesas, por lo que se mantiene la lectura estable de Yahvé, la descendencia y el nombre familiar.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma principal del nombre divino, consistente con la terminología del proyecto.
  - «Descendencia» se usa para זֶרַע por claridad natural en español, sin perder el matiz dinástico.
  - «Casa de mi padre» preserva la imagen genealógica del hebreo y evita una paráfrasis excesiva.
  - La segunda negativa se integró con «ni» para respetar la coordinación hebrea y la fluidez del español.
