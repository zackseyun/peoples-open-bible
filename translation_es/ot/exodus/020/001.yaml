translation:
  language: es
  text: Y Dios habló[a] todas estas palabras, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dijo». El verbo hebreo puede traducirse de manera más general, pero «habló» encaja mejor aquí y con la solemne introducción de los mandamientos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: El verbo דבר introduce un acto solemne de habla. En español, «habló» conserva la forma narrativa y la dignidad del contexto, mientras que «dijo» es más general y «pronunció» resulta más marcado. Como el inglés POB eligió «spoke» frente a «said», «habló» sigue mejor ese valor verbal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - la Deidad
  lexicon: HALOT
  rationale: En este contexto el sustantivo plural toma valor singular y designa al Dios de Israel. «Dios» es la forma española natural y fiel; «el Dios» sería innecesariamente pesada y «la Deidad» no refleja bien el registro del texto.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: El cuantificador concuerda con «palabras» en español. «Todas» mantiene el alcance total de כָּל sin añadir matiz interpretativo.
- source_word: הַדְּבָרִים
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - cosas
  - declaraciones
  lexicon: HALOT
  rationale: Aunque דברים puede significar «cosas» o «asuntos», aquí la fórmula prepara el Decálogo y conviene reflejar el campo verbal con «palabras», como en el inglés POB. «Declaraciones» es posible, pero menos directo.
- source_word: הָאֵלֶּה
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - estas mismas
  lexicon: HALOT
  rationale: El demostrativo señala inmediatamente el contenido referido. «Estas» es la equivalencia natural y suficiente en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: La partícula quotativa introduce discurso directo. «Diciendo» conserva la estructura formal del hebreo y corresponde al inglés POB «saying,».
theological_decisions:
- issue: Identidad del hablante divino sin sustituir el sustantivo del texto
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El hebreo aquí dice אֱלֹהִים y no el nombre YHWH. Por fidelidad al fuente, el texto español mantiene «Dios» y no introduce «Yahvé» ni una sustitución devocional. Esto preserva la observación del POB en inglés sobre el primado del original.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; YHWH default applies only where the divine name appears.'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la puntuación después de «saying» de dos puntos a coma. El español adopta una coma final («diciendo,»), manteniendo el valor quotativo y una cadencia natural para introducir el discurso siguiente.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al texto fuente y al criterio POB de no importar el nombre divino donde no aparece.
  - Se usa «palabras» para דברים porque esta fórmula prepara la sección del Decálogo y conserva el paralelismo con el inglés auditado.
  - La puntuación final con coma tras «diciendo» deja la frase lista para la continuación inmediata, en consonancia con la revisión inglesa.
