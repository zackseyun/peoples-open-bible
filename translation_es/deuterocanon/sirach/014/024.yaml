    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor de estilo y claridad: «en el muro de su casa» evita la ambigüedad leve de la doble posesión con «su muro», mientras conserva el mismo referente femenino, la imagen concreta del hebreo y la alternativa griega documentada en la nota. No se requieren cambios doctrinales ni de terminología del proyecto.'
