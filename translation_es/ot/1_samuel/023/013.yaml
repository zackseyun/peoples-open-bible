    reason: lexical_alternative
  - marker: b
    text: Es decir, Saúl dejó de salir en persecución de David después de enterarse de que David había escapado de Keila.
    reason: cultural_note
  revision_rationale: La revisión elimina una repetición pesada en español y fortalece la representación del verbo iterativo hebreo con una expresión más idiomática y clara, sin apartarse del sentido documentado por el POB inglés. Se mantienen la nota de alternativa léxica y la explicación contextual sobre la acción de Saúl.
