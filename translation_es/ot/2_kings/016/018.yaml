translation:
  language: es
  text: Y el pasadizo cubierto para el sábado[a], que habían construido en la casa, y la entrada exterior del rey[b], los desvió[c] de la casa de Yahvé, a causa del rey de Asiria[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la estructura cubierta para el sábado», «el pabellón del sábado» o «el pórtico del sábado». El sentido arquitectónico exacto del término hebreo es incierto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la entrada exterior para el rey» o «la entrada externa del rey».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los apartó», «los hizo cambiar de lugar» o «los reubicó». El verbo hebreo puede implicar desviar, apartar o cambiar la colocación de algo, no solo quitarlo.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «por causa del rey de Asiria», posiblemente «por temor al rey de Asiria».'
    reason: alternative_reading
lexical_decisions:
- source_word: מיסך הַשַּׁבָּת
  english_pob_choice: the covered way for the Sabbath
  chosen_spanish: el corredor cubierto para el sábado
  alternatives_spanish:
  - el recinto cubierto para el sábado
  - el pórtico cubierto para el sábado
  - la estructura cubierta para el sábado
  lexicon: HALOT
  rationale: מיסך es un término arquitectónico raro y de sentido incierto. En español, "corredor cubierto" comunica una construcción techada o protegida sin fijar indebidamente la forma exacta. Se conserva la referencia funcional a "el sábado" porque el hebreo la expresa con el artículo y el sustantivo, y no hay base suficiente para simplificarla a una interpretación más específica.
- source_word: אֲשֶׁר בָּנוּ בַבַּיִת
  english_pob_choice: that they had built in the house
  chosen_spanish: que habían construido en la casa
  alternatives_spanish:
  - que habían edificado en la casa
  - que se había construido en la casa
  lexicon: HALOT
  rationale: Se mantiene el relativo y el sujeto plural implícito de בָּנוּ. "En la casa" conserva la referencia al recinto del templo sin añadir "templo" al texto principal, ya que el hebreo dice literalmente "la casa".
- source_word: מְבוֹא הַמֶּלֶךְ הַחִיצוֹנָה
  english_pob_choice: the outer entrance of the king
  chosen_spanish: la entrada exterior del rey
  alternatives_spanish:
  - el acceso exterior del rey
  - la entrada externa para el rey
  - el ingreso exterior del rey
  lexicon: HALOT
  rationale: מְבוֹא designa una entrada o acceso. "Entrada exterior" sigue de cerca la estructura hebrea y resulta natural en español. Se evita precisar si era "para" el rey o "del" rey, porque el hebreo permite esa tensión y la evidencia no obliga a cerrarla.
- source_word: הֵסֵב
  english_pob_choice: he turned away
  chosen_spanish: la desvió
  alternatives_spanish:
  - la apartó
  - la desvió hacia otro lado
  - la hizo cambiar de lugar
  lexicon: HALOT
  rationale: El hiphil de סבב puede expresar girar, desviar, apartar o cambiar de posición. "La desvió" conserva la idea de reorientación o alteración sin afirmar más de lo que el contexto arquitectónico exige. Se evita "removió" como cierre excesivo del sentido.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahweh
  lexicon: HALOT
  rationale: 'Se mantiene el equivalente del nombre divino según la norma del proyecto: "Yahvé". "Casa" preserva el idiomatismo hebreo בית יהוה, mientras que "templo" se deja como alternativa interpretativa, no como reemplazo principal.'
- source_word: מִפְּנֵי מֶלֶךְ אַשּׁוּר
  english_pob_choice: because of the king of Assyria
  chosen_spanish: a causa del rey de Asiria
  alternatives_spanish:
  - por causa del rey de Asiria
  - por temor al rey de Asiria
  - ante el rey de Asiria
  lexicon: HALOT
  rationale: מִפְּנֵי puede indicar causa o motivo reactivo. "A causa de" mantiene la lectura amplia del POB y evita decidir en el texto principal si el matiz es simple causalidad o miedo. La opción "por temor" queda como alternativa posible en una nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se translitera el Tetragrámaton como "Yahvé" según la terminología del proyecto, para conservar el nombre personal divino sin sustitución por un título.
theological_decisions:
- issue: La motivación de la acción de Ahaz/Acaz y el alcance exacto del cambio arquitectónico.
  english_pob_reading: Use a minimally interpretive rendering that preserves uncertainty in the temple features and Ahaz's motive.
  chosen_spanish_reading: Usar una redacción mínimamente interpretativa que preserve la incertidumbre sobre las estructuras del templo y el motivo del rey.
  alternative_spanish_readings:
  - hacer explícito 'por temor al rey de Asiria'
  - traducir הֵסֵב como 'eliminó' o 'quitó'
  rationale: El versículo narra una modificación concreta del recinto sagrado bajo presión asiria, pero el hebreo no obliga a definir con precisión la forma arquitectónica ni a cerrar el matiz motivacional. La traducción conserva esa tensión sin sobreinterpretar.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: mantiene dos objetos arquitectónicos, conserva el matiz de הֵסֵב como desviar/volver aparte en lugar de ''remover'', y refleja la preferencia revisada por una expresión más precisa para מיסך sin forzar una identificación arquitectónica cerrada. También conserva la ambigüedad de מִפְּנֵי con una formulación causal amplia.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה.
  - Se mantiene "casa" en la expresión בית יְהוָה para conservar el hebraísmo, con nota de alternativa 'templo'.
  - Se evita sustituir el término arquitectónico raro por una interpretación más concreta de la que permite el hebreo.
  - Se conserva el paralelismo de dos objetos afectados por la acción verbal, como en el texto fuente.
  - La puntuación y el orden de las frases buscan una cadencia bíblica natural en español sin calcar el inglés.
