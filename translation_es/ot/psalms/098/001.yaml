- from: Un salmo. Canten a Yahvé un canto nuevo[a], porque ha hecho maravillas; su mano derecha y su brazo santo han obrado salvación para él.
  to: Un salmo. Canten a Yahvé un canto nuevo, porque ha hecho maravillas; su mano derecha y su brazo santo le han traído salvación[a].
  rationale: Se reemplaza «han obrado salvación para él» por «le han traído salvación» para lograr un español más natural y claro, manteniendo el sentido de que la mano y el brazo de Yahvé producen salvación para él. También se elimina la nota innecesaria sobre «canto/cántico» y se restaura una nota alineada con el expediente inglés sobre las alternativas de הוֹשִׁיעָה לּוֹ.
