translation:
  language: es
  text: y Jocmeam[a] con sus tierras de pasto[b], y Bet-horón con sus tierras de pasto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Jocmeam»; algunas tradiciones en inglés leen «Jokneam» por relación con otros pasajes y tradiciones de nombres de lugares.'
    reason: alternative_reading
  - marker: b
    text: También puede entenderse como «tierras comunes» o «tierras alrededor», es decir, el terreno asociado a cada ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקְמְעָם
  english_pob_choice: Jokmeam
  chosen_spanish: Jocmeam
  alternatives_spanish:
  - Jokmeam
  - Jocneam
  lexicon: HALOT
  rationale: El hebreo masorético de Crónicas apoya la forma con -meam; en español se mantiene la transliteración del topónimo como nombre propio. Se prefiere «Jocmeam» para reflejar más de cerca la forma consonántica del texto fuente y la decisión auditada del POB en inglés.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus tierras comunes
  - sus tierras alrededor
  - sus pastizales
  lexicon: HALOT
  rationale: En contexto de ciudades levíticas, מִגְרָשׁ designa el terreno abierto asociado a la ciudad, usado como pasto o espacio contiguo. «Tierras de pasto» comunica bien esa función en español sin perder el matiz territorial; «tierras comunes» o «tierras alrededor» son posibles, pero menos transparentes para el lector actual.
- source_word: בֵּית חוֹרוֹן
  english_pob_choice: Beth-horon
  chosen_spanish: Bet-horón
  alternatives_spanish:
  - Beth-horon
  - Bet Horón
  lexicon: HALOT
  rationale: Se conserva el topónimo compuesto con adaptación ortográfica española habitual en nombres bíblicos. La forma con guion ayuda a reconocer el compuesto hebreo y mantiene la lectura natural en español.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: En una lista de lugares, el marcador de objeto con conjunción se vierte naturalmente como coordinación simple. Se usa «y» por claridad y fluidez; «e» no es necesaria aquí porque la siguiente palabra no comienza con sonido /i/.
translation_notes:
  revision_awareness: El texto inglés POB sigue de cerca el hebreo masorético y no introduce revisiones sustantivas; se mantiene la misma decisión toponímica para יָקְמְעָם y el mismo valor contextual de מִגְרָשׁ como terreno asociado a la ciudad. No se detectan cambios de revisión que alteren el sentido.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo, con toponimia transliterada de manera consistente.
  - Se conserva la estructura coordinada de la lista sin añadir verbos ni explicaciones ajenas al versículo.
  - «Tierras de pasto» busca equilibrar fidelidad léxica y claridad para el lector hispanohablante.
