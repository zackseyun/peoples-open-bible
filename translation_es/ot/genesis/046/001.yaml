revisions:
- from: Así que Israel partió con todo lo que le pertenecía y llegó a Beerseba[a], y ofreció sacrificios al Dios de su padre Isaac.
  to: Entonces Israel partió con todo lo que le pertenecía y llegó a Beerseba[a], y ofreció sacrificios al Dios de su padre Isaac.
  rationale: Se reemplaza «Así que» por «Entonces» para evitar un matiz consecutivo no exigido por el hebreo y mantener un enlace narrativo simple. También se pule la redacción de la nota para que suene más natural en español, preservando la justificación léxica del POB.
