translation:
  language: es
  text: Y actuaron los hijos de Israel, los sacerdotes, los levitas y los demás de la cautividad que habían sido traídos de regreso[a], conforme a lo que está en el libro de Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que habían sido devueltos del cautiverio». El griego puede leerse con un matiz más literal de pasividad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  lexicon: LSJ
  rationale: Conservo la expresión bíblica tradicional y cercana al griego, que nombra al pueblo como colectivo de pacto. En español, «hijos de Israel» es natural y fiel; «israelitas» sería más idiomático pero menos cercano a la formulación del texto.
- source_word: οἱ λοιποί
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los restantes
  lexicon: LSJ
  rationale: La forma sustantivada indica el grupo sobrante respecto de los ya nombrados. «Los demás» es natural en español y evita una rigidez innecesaria; mantiene la distinción de este grupo dentro de la comunidad.
- source_word: οἱ ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: from the captivity
  chosen_spanish: de entre los cautivos
  alternatives_spanish:
  - de la cautividad
  - de la cautividad/exilio
  lexicon: LSJ
  rationale: El griego remite a los asociados con la cautividad/exilio. En español, «cautivos» comunica la condición histórica sin sonar arcaico, y «de entre» expresa con claridad el origen/grupo al que pertenecen.
- source_word: οἱ προσενεχθέντες
  english_pob_choice: who had been brought back
  chosen_spanish: que habían sido traídos de regreso
  alternatives_spanish:
  - que habían sido devueltos
  - que habían regresado
  lexicon: LSJ
  rationale: 'Sigo el matiz pasivo que el audit trail inglés preserva: el participio sugiere ser llevados o traídos, no simplemente volver por cuenta propia. «Traídos de regreso» mantiene esa fuerza pasiva y encaja bien con el contexto de restauración.'
- source_word: ἀκολούθως
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: LSJ
  rationale: La adverbialidad exige una relación de conformidad con un estándar. «Conforme a» reproduce bien esa idea en español formal y bíblico sin sonar rígido.
- source_word: τοῖς ἐν τῇ Μωσέως βίβλῳ
  english_pob_choice: to what is in the book of Moses
  chosen_spanish: a lo que está en el libro de Moisés
  alternatives_spanish:
  - según lo que está en el libro de Moisés
  - a las cosas que están en el libro de Moisés
  lexicon: LSJ
  rationale: Mantengo el contenido literal de «lo que está en el libro de Moisés» porque el griego habla del escrito mosaico como norma. «A lo que está» conserva el vínculo de conformidad sin introducir «ley» donde el texto dice «libro».
theological_decisions:
- issue: Cómo expresar el grupo restaurado desde el cautiverio/exilio
  english_pob_reading: '''from the captivity'' means from the exile; the participle is rendered in restoration sense while preserving a passive nuance.'
  chosen_spanish_reading: «de entre los cautivos, que habían sido traídos de regreso» conserva tanto la pertenencia al grupo restaurado como la pasividad del traslado.
  alternative_spanish_readings:
  - «de la cautividad, que habían regresado»
  - «del exilio, que habían sido devueltos»
  rationale: El verso enumera a los participantes de la comunidad restaurada. En español, la combinación de «cautivos» y «traídos de regreso» mantiene el sentido de restauración y el matiz pasivo que el inglés auditado resalta, sin diluir la referencia histórica al exilio.
  doctrine_reference: 'Translational theology: preserve restoration-from-exile context and passive nuance of participle.'
translation_notes:
  revision_awareness: El inglés auditado corrigió una formulación más libre para acercarse al pasivo de οἱ προσενεχθέντες. La versión española sigue ese ajuste y evita una lectura meramente activa como «regresaron»; también conserva la estructura enumerativa del versículo y el referente normativo al libro de Moisés.
  spanish_consistency_notes:
  - He usado «hijos de Israel» para mantener la fórmula bíblica y la continuidad con el lenguaje del corpus.
  - He evitado «SEÑOR» y no hay términos divinos directos en el verso.
  - He preferido «traídos de regreso» frente a «regresados» para conservar el pasivo documentado.
  - «Libro de Moisés» se mantiene literal, sin expandir a «ley», porque el griego dice βίβλῳ y no nomos.
