  rationale: Se reubica la nota al sintagma que realmente comenta ('un poderoso de las naciones') y se sustituye 'actuará contra él' por 'lo tratará' para reflejar mejor el hebreo intensificado sin añadir un matiz más interpretativo que el del POB inglés. También se omite el pronombre inicial 'Yo' por fluidez natural en español.
