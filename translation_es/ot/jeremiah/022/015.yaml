revisions:
- from: ¿Reinarás porque compites en cedro? ¿Acaso no comía y bebía tu padre, y hacía justicia y rectitud? Entonces le iba bien[a][b].
  to: ¿Reinas porque rivalizas por cedro? ¿Acaso no comió y bebió tu padre, e hizo justicia y rectitud? Entonces le iba bien[a][b].
  rationale: Se ajusta el presente retórico («¿Reinas?») para reflejar mejor הֲתִמְלֹךְ en contexto; se reemplaza «compites en cedro» por «rivalizas por cedro» para lograr español natural sin perder el sentido de competencia/afán ligado al cedro; y se pasan los verbos del padre a pretérito («comió… hizo») para corresponder mejor a los perfectos hebreos en la pregunta retórica. Se conservan «justicia y rectitud» y «Entonces le iba bien» por fidelidad semántica y buena legibilidad.
