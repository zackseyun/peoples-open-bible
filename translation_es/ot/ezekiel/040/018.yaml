translation:
  language: es
  text: 'Y el pavimento estaba al lado de las puertas, correspondiente[a] a la longitud de las puertas: el pavimento inferior.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «frente a la longitud de las puertas»; el hebreo לְעֻמַּת puede expresar correspondencia espacial o posición opuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִצְפָה
  english_pob_choice: the pavement
  chosen_spanish: el pavimento
  alternatives_spanish:
  - el piso
  - el área pavimentada
  - el enlosado
  lexicon: HALOT
  rationale: רִצְפָה designa una superficie pavimentada. «Pavimento» conserva la imagen arquitectónica y suena natural en español bíblico contemporáneo.
- source_word: אֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  - hacia
  lexicon: HALOT
  rationale: En esta descripción espacial, אֶל indica proximidad/adyacencia, no movimiento. «Junto a» expresa bien esa relación sin sobretraducción.
- source_word: כֶּתֶף
  english_pob_choice: the side
  chosen_spanish: el lado
  alternatives_spanish:
  - el costado
  - el hombro
  - el flanco
  lexicon: HALOT
  rationale: Aunque literalmente es «hombro», en uso arquitectónico/topográfico refiere un lado o costado. «Lado» es la opción más clara y fiel al contexto.
- source_word: הַשְּׁעָרִים
  english_pob_choice: the gates
  chosen_spanish: las puertas
  alternatives_spanish:
  - los portones
  - las entradas
  - los pórticos de las puertas
  lexicon: HALOT
  rationale: En español, «puertas» comunica el elemento arquitectónico del complejo de acceso. Se mantiene el plural del hebreo y la referencia al conjunto de accesos.
- source_word: לְעֻמַּת
  english_pob_choice: corresponding to
  chosen_spanish: correspondiente a
  alternatives_spanish:
  - en oposición a
  - frente a
  - alineado con
  lexicon: HALOT
  rationale: El término puede señalar correspondencia espacial o posición opuesta. «Correspondiente a» preserva la idea de alineación/relación medida sin imponer solo un sentido de oposición.
- source_word: אֹרֶךְ
  english_pob_choice: the length
  chosen_spanish: la longitud
  alternatives_spanish:
  - el largo
  - la extensión
  lexicon: HALOT
  rationale: «Longitud» es el equivalente más preciso en un contexto de medidas arquitectónicas y evita ambigüedad.
- source_word: הָרִצְפָה הַתַּחְתּוֹנָה
  english_pob_choice: the lower pavement
  chosen_spanish: el pavimento inferior
  alternatives_spanish:
  - el pavimento de abajo
  - el enlosado inferior
  - el pavimento más bajo
  lexicon: HALOT
  rationale: La frase distingue este pavimento de otro en la visión arquitectónica. «Inferior» conserva la relación de nivel de modo natural en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta el texto hebreo masorético y el auditoría inglesa existente, que lee la frase con un matiz espacial de adyacencia y correspondencia. La revisión previa no introdujo cambios textuales, así que la versión española mantiene ese mismo perfil semántico.
  spanish_consistency_notes:
  - Se mantiene «pavimento» para רִצְפָה en coherencia con un término arquitectónico claro.
  - Se usa «puertas» para הַשְּׁעָרִים como equivalente natural en español, sin borrar el plural del hebreo.
  - «Correspondiente a» preserva la ambigüedad útil de לְעֻמַּת entre alineación y oposición espacial.
  - «Pavimento inferior» refleja el contraste de nivel implícito en הַתַּחְתּוֹנָה.
