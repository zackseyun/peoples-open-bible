translation:
  language: es
  text: En Yahvé todos los descendientes[b] de Israel serán justificados[a] y se gloriarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vindicados'. El verbo hebreo puede significar ser mostrados como en lo correcto, además de ser justificados.
    reason: alternative_reading
  - marker: b
    text: Literalmente, 'la simiente de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיהוָה
  english_pob_choice: In Yahweh
  chosen_spanish: En Yahvé
  alternatives_spanish:
  - Por Yahvé
  - Con Yahvé
  lexicon: HALOT
  rationale: 'El ב con יהוה aquí expresa relación/esfera o fundamento: la justificación y el orgullo de Israel ocurren en relación con Yahvé. Se conserva el nombre divino en la forma base del proyecto, ''Yahvé'', en lugar de una máscara como ''SEÑOR''. ''En Yahvé'' mantiene la concisión y el sentido teológico del hebreo.'
- source_word: יִצְדְּקוּ
  english_pob_choice: will be justified
  chosen_spanish: serán justificados
  alternatives_spanish:
  - serán vindicados
  - serán declarados justos
  lexicon: HALOT
  rationale: La forma puede significar estar en lo correcto, ser justificado o ser vindicado. En español, 'serán justificados' conserva el peso declarativo/resultativo y suena natural en este contexto; 'serán vindicados' queda como alternativa semántica válida.
- source_word: וְיִתְהַלְל֖וּ
  english_pob_choice: and will boast
  chosen_spanish: y se gloriarán
  alternatives_spanish:
  - y se jactarán
  - y se alabarán
  lexicon: HALOT
  rationale: El hitpael de הלל es reflexivo y puede expresar gloriarse o jactarse. 'Se gloriarán' es idiomático en español bíblico y conserva el matiz de tomar orgullo/boast en Yahvé sin volverlo meramente ornamental.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: כָּל indica totalidad; en español, 'todos' fluye de modo natural con el sustantivo plural siguiente.
- source_word: זֶרַע יִשְׂרָאֵל
  english_pob_choice: the offspring of Israel
  chosen_spanish: los descendientes de Israel
  alternatives_spanish:
  - la descendencia de Israel
  - la simiente de Israel
  lexicon: HALOT
  rationale: זֶרַע significa literalmente 'semilla', pero aquí designa colectivamente a la posteridad. 'Descendientes' comunica bien el sentido y evita un calco poco natural; se preserva en nota la literalidad 'simiente' como eco bíblico.
theological_decisions:
- issue: Forma del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrammaton. Siguiendo la política del proyecto, se traduce con el nombre divino explícito 'Yahvé' y no con una sustitución reverencial. Se evita 'el SEÑOR' porque oscurece la evidencia textual y no es la forma base elegida para el español del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido de צדק en contexto salvífico
  english_pob_reading: will be justified
  chosen_spanish_reading: serán justificados
  alternative_spanish_readings:
  - serán vindicados
  - serán declarados justos
  rationale: En este contexto, el verbo puede apuntar tanto a justificación como a vindicación. 'Serán justificados' mantiene la tensión teológica sin resolverla de modo reductivo; la alternativa 'serán vindicados' queda disponible porque el hebreo admite el matiz de ser mostrados como en lo correcto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje coincide con la revisión reciente sin cambios pendientes; la redacción española sigue de cerca el hebreo y el audit trail inglés, conservando la ambigüedad documentada de צדק y la literalidad subyacente de זרע mediante nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con la terminología base del proyecto en español.
  - '''Se gloriarán'' conserva el matiz reflexivo del hitpael y evita una paráfrasis demasiado libre.'
  - '''Descendientes de Israel'' es natural en español y no borra la imagen literal de ''semilla'', que queda documentada en nota.'
