translation:
  language: es
  text: Los cielos revelarán su iniquidad[a], y la tierra[b] se alzará contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Iniquidad» también puede entenderse como «culpa»; el hebreo puede abarcar la falta moral o la culpa que de ella resulta.
    reason: lexical_alternative
  - marker: b
    text: O «el país»; «la tierra» preserva mejor el paralelismo con «los cielos» en este contexto poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְגַלּוּ
  english_pob_choice: will reveal
  chosen_spanish: revelarán
  alternatives_spanish:
  - descubrirán
  - harán evidente
  lexicon: HALOT
  rationale: El piel imperfecto de גלה aquí expresa hacer algo conocido o expuesto. «Revelarán» mantiene el sentido forense de exposición y funciona con naturalidad en español.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El plural hebreo puede funcionar de modo colectivo. «Los cielos» conserva el registro poético elevado y el paralelismo cósmico con «la tierra».
- source_word: עֲוֺנוֹ
  english_pob_choice: his iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su pecado
  - su maldad
  lexicon: HALOT
  rationale: עָוֹן puede denotar iniquidad, culpa o castigo por la culpa. Aquí el énfasis recae en la perversidad moral expuesta, por lo que «iniquidad» conserva mejor el peso moral del término.
- source_word: וְאֶרֶץ
  english_pob_choice: and the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y el país
  - y el suelo
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede significar «tierra» o «país», el paralelismo con «los cielos» en un contexto personificado y cósmico favorece «la tierra».
- source_word: מִתְקוֹמָמָה
  english_pob_choice: will rise up
  chosen_spanish: se alzará
  alternatives_spanish:
  - se levantará
  - se pondrá en contra
  - se alzará en oposición
  lexicon: HALOT
  rationale: La forma expresa levantarse con matiz de oposición. «Se alzará» conserva la imagen verbal y, en coordinación con el siguiente complemento, comunica la hostilidad implicada.
- source_word: לוֹ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - para él
  - a él
  lexicon: HALOT
  rationale: Con verbos de levantarse hostilmente, ל adquiere valor adversativo. «Contra él» expresa con precisión el sentido idiomático del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el audit trail inglés; no se detectaron revisiones textuales que requieran ajuste en esta entrega.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el nombre divino; aquí no está presente.
  - Se usa «cielos/tierra» para conservar el paralelismo cósmico y el registro poético.
  - Se traduce עָוֹן con «iniquidad» por ser la opción más precisa en este contexto judicial y moral.
  - Se vierte el valor adversativo de ל con «contra», evitando una lectura neutral de «a/para».
