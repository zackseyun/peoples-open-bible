review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del hebreo: la porción del rey procedía de sus bienes y se destinaba a los holocaustos diarios y calendáricos, conforme a la Ley de Yahvé. Conserva correctamente יְהוָה como ''Yahvé'', עֹלוֹת como ''holocaustos'', חֳדָשִׁים como ''lunas nuevas'' y מוֹעֲדִים con sentido cultual. Sin embargo, ''tomada de sus propias posesiones'' introduce una formulación algo interpretativa y pesada donde el hebreo solo expresa origen (''de sus bienes/posesiones''), y conviene reflejar mejor la nota léxica preservada por el inglés para ''porción''.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y directo. 'Tomada de sus propias posesiones' resulta innecesariamente perifrástico; 'de sus propios bienes' fluye mejor. También es preferible simplificar 'conforme a lo que está escrito' a 'como está escrito', que es más bíblico-natural y fiel a כַּכָּתוּב. El resto de la sintaxis es buena y legible.
  glossary_alignment: 'La terminología del proyecto está mayormente bien alineada: ''Yahvé'' para יְהוָה, ''holocaustos'' para עֹלוֹת, ''lunas nuevas'' para חֳדָשִׁים, y ''Ley de Yahvé'' para בְּתוֹרַת יְהוָה. No hay conflicto doctrinal. Se añade una nota léxica útil para מְנָה, en continuidad con el rastro de auditoría inglés.'
  issues:
  - severity: medium
    issue: Expresión pesada en 'tomada de sus propias posesiones'
    rationale: מִן רְכוּשׁוֹ solo marca procedencia desde los bienes del rey. La pasiva perifrástica 'tomada de' no es incorrecta, pero es menos natural y añade sensación de extracción material no explicitada por el hebreo.
  - severity: low
    issue: Falta nota léxica para 'porción'
    rationale: El inglés preservó alternativas significativas para מְנָה ('allotment/share'). Dado que en español 'porción' también admite matices como 'asignación' o 'parte', conviene conservar esa información en nota.
  - severity: low
    issue: '''Conforme a lo que está escrito'' es más largo de lo necesario'
    rationale: '''Como está escrito'' refleja bien כַּכָּתוּב y suena más natural en español bíblico contemporáneo sin pérdida semántica.'
  revised_spanish_text: 'La porción[a] del rey, de sus propios bienes, era para los holocaustos: los holocaustos de la mañana y de la tarde, y los holocaustos para los sábados, las lunas nuevas y las fiestas señaladas, como está escrito en la Ley de Yahvé.'
  revised_footnotes:
  - marker: a
    text: O 'la asignación del rey' o 'la parte del rey'.
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase de procedencia para un español más natural y más ceñido al hebreo, se simplifica la fórmula escritural, y se preserva en nota la alternativa léxica principal documentada en el rastro inglés para מְנָה. No se requieren cambios doctrinales ni estructurales mayores.
