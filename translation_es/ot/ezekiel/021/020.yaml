review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo y del POB inglés en la mayor parte del versículo: «para que», «el corazón se derrita», «a todas sus puertas», «he puesto», «el fulgor/destello de la espada» y la interjección «¡Ah!». Sin embargo, dos puntos no preservan fielmente el sentido auditado: (1) «para relámpago» es español poco natural y no comunica bien «made for lightning/flash»; conviene explicitar la idea de resplandor/centelleo. (2) «afilada para la matanza» cambia la decisión principal del POB inglés («drawn for slaughter») por una alternativa relegada allí a posibilidad secundaria; además la nota actual no incluye esa alternativa principal. También la nota [a] puede alinearse mejor con la explicación inglesa al expresar «y muchos tropiecen/caigan».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Está hecha para relámpago» suena forzado y no idiomático. «A todas sus puertas» funciona, aunque «en todas sus puertas» también sería posible; no requiere cambio. «Los tropiezos sean muchos» es aceptable, aunque algo abstracto; se sostiene si la nota conserva la alternativa interpretativa. La línea final necesita una formulación más natural y coherente con la auditoría inglesa.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Las decisiones léxicas clave del hebreo se respetan en general. La principal desviación está en מְעֻטָּה לְטָבַח, donde el español debe reflejar la opción principal documentada por la POB inglesa («desenvainada/preparada para la matanza») y no sustituirla por «afilada» como texto base. Para עֲשׂוּיָה לְבָרָק, un español como «hecha para centellear» preserva la imagen sin calco extraño.
  issues:
  - severity: high
    issue: «afilada para la matanza» no sigue la opción principal auditada del POB inglés
    rationale: La traducción inglesa eligió «drawn for slaughter» como texto principal y dejó otras posibilidades en nota. El borrador español eleva una alternativa distinta al texto principal sin justificación suficiente y altera el matiz de preparación/lista para matar.
  - severity: medium
    issue: «Está hecha para relámpago» es poco idiomático en español
    rationale: Aunque intenta conservar la literalidad de «for lightning», en español suena antinatural y opaca la imagen. Una formulación como «hecha para centellear» o «hecha para fulgurar» comunica mejor el sentido preservando el campo semántico.
  - severity: low
    issue: La nota [a] no refleja del todo la alternativa inglesa «and many may stumble»
    rationale: «Los que tropiezan» es cercano, pero el contraste auditado es entre el sustantivo abstracto/concreto y el evento verbal de tropezar/caer. Conviene formular la alternativa como «y muchos tropiecen».
  revised_spanish_text: para que el corazón se derrita y los tropiezos[a] sean muchos. A todas sus puertas he puesto el fulgor de la espada. ¡Ah! Está hecha para centellear, desenvainada[b] para la matanza.
  revised_footnotes:
