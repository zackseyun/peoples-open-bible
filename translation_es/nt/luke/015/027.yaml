revisions:
- from: 'Él le dijo[a]: «Tu hermano ha llegado, y tu padre ha sacrificado el ternero engordado, porque lo ha recibido de vuelta sano y salvo».[b]'
  to: 'Le dijo: «Tu hermano ha llegado, y tu padre mandó matar el ternero engordado, porque lo ha recibido de vuelta sano y salvo[a]».'
  rationale: Se revisa «ha sacrificado» a «mandó matar» para reflejar ἔθυσεν en contexto de preparación festiva sin sugerir un sacrificio cultual, en línea con la decisión inglesa documentada. Se elimina la nota duplicada y se reubica la única nota lexical en «sano y salvo», donde realmente pertenece. También se suprime el pronombre explícito inicial para un español más natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:01:40Z'
- from: 'Le dijo: «Tu hermano ha llegado, y tu padre mandó matar el ternero engordado, porque lo ha recibido de vuelta sano y salvo[a]».'
  to: 'Le dijo: «Tu hermano ha llegado, y tu padre mató el ternero engordado, porque lo ha recibido de vuelta sano y salvo[a]».'
  rationale: 'Se corrige «mandó matar» a «mató» para alinear con el sujeto directo del griego: ἔθυσεν ὁ πατήρ σου (aorist active, el padre mismo como sujeto). «Mandó matar» introduce un intermediario no atestado en el texto. «Mató» es directo y fiel al aorist activo, evita el matiz cultual de «sacrificó» y preserva la agencia directa del padre como en el inglés auditado «slaughtered».'
