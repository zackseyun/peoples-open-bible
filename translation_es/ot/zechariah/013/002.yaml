    rationale: La auditoría inglesa preservó una nota explicando que «los profetas» se refiere contextualmente a profetas ilegítimos vinculados con idolatría e impureza. No es imprescindible para entender el español, pero sí ayuda a conservar la racionalidad documentada del POB.
