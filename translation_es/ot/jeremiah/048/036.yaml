    rationale: El expediente inglés decidió explícitamente ‘Kir-heres’ como transliteración principal, dejando ‘Kir-hareseth/Kir-hereseth’ para nota. La forma con acento y mayúscula interna introduce una adaptación no documentada y reduce la consistencia del proyecto.
  - severity: low
