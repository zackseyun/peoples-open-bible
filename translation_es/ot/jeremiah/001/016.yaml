revisions:
- from: Y hablaré mis juicios contra ellos por toda su maldad[a], porque me abandonaron, quemaron incienso a otros dioses[b], y se postraron ante la obra de sus propias manos.
  to: Y pronunciaré mis juicios contra ellos por toda su maldad[a], porque me abandonaron, quemaron incienso a otros dioses[b], y se postraron ante las obras de sus propias manos.
  rationale: Se corrige el verbo inicial para reflejar el sentido jurídico-formal documentado en la auditoría inglesa y se ajusta el objeto final al plural hebreo para mayor fidelidad y naturalidad en español. También se actualiza la nota textual para que corresponda al texto revisado.
