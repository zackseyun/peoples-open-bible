translation:
  language: es
  text: Hizo que cayera en medio de su campamento[a], alrededor de sus moradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «su campamento» y «sus moradas»; los sufijos singulares del hebreo probablemente se refieren colectivamente a Israel como pueblo. En español se conserva «su» por fidelidad formal, con sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפֵּל
  english_pob_choice: He made it fall
  chosen_spanish: Hizo que cayera
  alternatives_spanish:
  - Lo hizo caer
  - Hizo caer
  lexicon: HALOT
  rationale: El hifil de נפל expresa causación; en español, «hizo que cayera» comunica con naturalidad esa causalidad sin añadir un objeto explícito que el hebreo deja implícito en el contexto inmediato.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - dentro de
  lexicon: HALOT
  rationale: La frase señala ubicación interior o central. «En medio de» preserva bien la fuerza espacial y funciona de manera fluida en español bíblico contemporáneo.
- source_word: מַחֲנֵהוּ
  english_pob_choice: their camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su campamento colectivo
  - el campamento de ellos
  lexicon: HALOT
  rationale: El sufijo hebreo es singular («su»), aunque el POB inglés lo vierte colectivamente como «their» por el referente corporativo de Israel. En español, «su campamento» mantiene el dato morfológico del original y sigue siendo natural; el referente colectivo queda implícito por el contexto.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor de
  alternatives_spanish:
  - alrededor de
  - rodeando
  lexicon: HALOT
  rationale: «Todo alrededor de» reproduce el énfasis de distribución completa que tiene el adverbio, sin sonar rígido en español.
- source_word: לְמִשְׁכְּנֹתָיו
  english_pob_choice: their dwellings
  chosen_spanish: sus moradas
  alternatives_spanish:
  - sus viviendas
  - sus tiendas
  lexicon: HALOT
  rationale: מִשְׁכְּנֹתָיו designa habitáculos o lugares de residencia. «Moradas» es amplio y digno; evita restringir indebidamente a tiendas y mantiene la imagen poética del texto.
translation_notes:
  revision_awareness: El hebreo presenta sufijos posesivos singulares, mientras que la versión inglesa POB los resuelve de manera colectiva («their»). La redacción española conserva la referencia colectiva por el contexto, pero sin perder la transparencia sobre la forma hebrea.
  spanish_consistency_notes:
  - Se mantuvo «moradas» para מִשְׁכְּנֹתָיו por su amplitud semántica y por coherencia con un registro bíblico moderno.
  - No se introdujo «SEÑOR» ni otra máscara para el nombre divino, porque este versículo no contiene el tetragrámaton.
  - Se evitó «él»/«ellos» explícitos en el texto principal para no añadir un referente que el hebreo deja implícito en el contexto inmediato.
