revisions:
- from: El producto de su casa será llevado; fluyendo, en el día de su enojo[a][b].
  to: El producto de su casa será llevado,[b] corriendo como agua en el día de su ira[a].
  rationale: Se reparó la sintaxis española para que la imagen de נִגָּרוֹת sea natural y literaria («corriendo como agua»), se mantuvo la ambigüedad teológica del pronombre en אַפּוֹ con una nota clara, y se ajustó la nota léxica para reflejar mejor la alternativa documentada para גלה. También se prefirió «ira» por tono y precisión contextual.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:31:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: pérdida del rendimiento de la casa, imagen de algo que corre/fluye, y mantenimiento de la ambigüedad en «su enojo». Sin embargo, «fluyendo» queda sintácticamente suelto y no expresa bien el valor predicativo/imaginativo de נִגָּרוֹת en español natural. Además, la nota léxica alternativa no refleja la alternativa principal documentada en inglés («irá al exilio» / «se irá»), y el orden de marcadores no sigue la secuencia del audit trail inglés aunque en español eso no es obligatorio; conviene simplificar y ordenar mejor.'
  spanish_quality_summary: El español es comprensible pero poco natural por «será llevado; fluyendo». En registro bíblico moderno suena más claro y digno «será llevado, corriendo como agua» o «se irá, fluyendo». Dado que el inglés POB ya optó por una formulación de resultado pasivo para יִגֶל, lo más fiel y legible en español es mantener «será llevado» y convertir נִגָּרוֹת en una expresión adverbial/imaginativa natural. «Enojo» es aceptable, pero «ira» encaja mejor con el tono solemne de Job y con אַף en contexto de juicio.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La preservación de la ambigüedad de אַפּוֹ está bien. No intervienen Yahvé/Mesías/etc. La mejora principal es estilística y de precisión semántica: hacer que נִגָּרוֹת suene idiomático en español y ajustar la nota léxica alternativa.'
  issues:
  - severity: medium
    issue: «fluyendo» queda colgado y no funciona como español natural en esta oración
    rationale: El participio hebreo predica una imagen de desbordarse/correr; en español «fluyendo» tras punto y coma suena fragmentario y poco literario. Debe integrarse como «corriendo como agua» o equivalente.
  - severity: medium
    issue: La nota b no conserva la alternativa léxica más destacada del audit trail inglés
    rationale: El inglés preserva explícitamente «will go into exile». La nota española ofrece «será removido» pero omite la alternativa más característica de גלה, útil para transparencia léxica.
  - severity: low
    issue: «enojo» es posible, pero «ira» refleja mejor el tono de juicio sapiencial
    rationale: Ambas son válidas; «ira» suena más solemne y bíblico sin caer en arcaísmo, y armoniza mejor con «en el día de...».
  revised_spanish_text: El producto de su casa será llevado,[b] corriendo como agua en el día de su ira[a].
  revised_footnotes:
  - marker: a
    text: Probablemente se refiere a la ira de Dios, aunque el hebreo deja implícito el referente.
    reason: theological_note
  - marker: b
    text: O «se irá al exilio»; el verbo puede denotar irse o ser removido, aquí del producto o riqueza de la casa del malvado.
    reason: lexical_alternative
  revision_rationale: Se reparó la sintaxis española para que la imagen de נִגָּרוֹת sea natural y literaria («corriendo como agua»), se mantuvo la ambigüedad teológica del pronombre en אַפּוֹ con una nota clara, y se ajustó la nota léxica para reflejar mejor la alternativa documentada para גלה. También se prefirió «ira» por tono y precisión contextual.
