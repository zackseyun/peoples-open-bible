translation:
  language: es
  text: Y dijo a los que hacían la obra que construyeran las murallas y el monte Sión alrededor con piedras cuadradas para fortificación, y así lo hicieron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἶπεν πρὸς
  english_pob_choice: told
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les ordenó
  - les mandó
  lexicon: BDAG
  rationale: En español, 'les dijo' conserva el acto de habla sin cargar innecesariamente el matiz de mandato fuerte que tendría 'ordenó' o 'mandó'. El contexto implica dirección, pero el griego base es εἶπεν πρὸς, no un imperativo explícito.
- source_word: τοὺς ποιοῦντας τὰ ἔργα
  english_pob_choice: those doing the work
  chosen_spanish: a los que hacían la obra
  alternatives_spanish:
  - a los obreros
  - a los que realizaban la obra
  - a los constructores
  lexicon: BDAG
  rationale: '''Los que hacían la obra'' reproduce bien el participio con una forma natural en español y evita añadir una categoría laboral más específica de la que ofrece el griego. ''Obreros'' o ''constructores'' son posibles, pero introducen mayor interpretación.'
- source_word: οἰκοδομεῖν
  english_pob_choice: to build
  chosen_spanish: construyeran
  alternatives_spanish:
  - edificaran
  - reconstruyeran
  - levantaran
  lexicon: BDAG
  rationale: 'Como infinitivo de contenido dentro de un discurso indirecto, en español resulta natural usar subjuntivo: ''que construyeran''. ''Reconstruyeran'' podría reflejar mejor el marco narrativo, pero el verbo griego por sí solo no lo explicita.'
- source_word: τὰ τείχη
  english_pob_choice: the walls
  chosen_spanish: las murallas
  alternatives_spanish:
  - los muros
  - las paredes
  - las murallas de la ciudad
  lexicon: BDAG
  rationale: En este contexto defensivo, 'murallas' comunica mejor que 'paredes' o un 'muros' más genérico. No añado 'de la ciudad' porque el texto griego no lo dice explícitamente.
- source_word: τὸ ὄρος Σιὼν
  english_pob_choice: the hill of Zion
  chosen_spanish: la colina de Sión
  alternatives_spanish:
  - el monte Sión
  - el monte de Sión
  - la colina de Zion
  lexicon: BDAG
  rationale: El griego dice literalmente 'el monte/cerro Sión'. Dado que la revisión inglesa prefirió 'the hill of Zion' para mayor precisión, en español 'la colina de Sión' conserva ese valor topográfico sin forzar el título más solemne 'monte'.
- source_word: κυκλόθεν
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - en derredor
  - por todos lados
  lexicon: BDAG
  rationale: '''Todo alrededor'' expresa con claridad el sentido de circundar completamente y suena natural en español contemporáneo.'
- source_word: ἐκ λίθων τετραγώνων
  english_pob_choice: with squared stones
  chosen_spanish: con piedras cuadradas
  alternatives_spanish:
  - con piedras labradas en cuadro
  - con piedras talladas en forma cuadrada
  - con sillares
  lexicon: LSJ
  rationale: La frase describe piedras trabajadas en forma cuadrangular. 'Piedras cuadradas' es una forma directa y comprensible; 'sillares' sería más técnico, pero menos transparente para una lectura amplia.
- source_word: εἰς ὀχύρωσιν
  english_pob_choice: for fortification
  chosen_spanish: para fortificación
  alternatives_spanish:
  - para defensa
  - como fortificación
  - para fortalecer
  lexicon: LSJ
  rationale: '''Fortificación'' mantiene el sustantivo abstracto del griego y el propósito defensivo del proyecto. ''Para defensa'' sería más explicativo, pero menos cercano al sustantivo ὀχύρωσις.'
- source_word: ἐποίησαν οὕτως
  english_pob_choice: and they did so
  chosen_spanish: y así lo hicieron
  alternatives_spanish:
  - y lo hicieron así
  - y procedieron de ese modo
  - y lo hicieron
  lexicon: BDAG
  rationale: La fórmula conclusiva se expresa de manera idiomática con 'y así lo hicieron', que reproduce la aceptación y ejecución de la instrucción sin añadir matices.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego de Swete y toma en cuenta la auditoría inglesa: conserva la distinción entre ''build'' y una posible lectura de ''rebuild'' sin introducirla, y refleja la revisión que precisó ὄρος Σιὼν como referencia topográfica (''the hill of Zion'') en lugar de un título más solemne.'
  spanish_consistency_notes:
  - Se mantiene 'Sión' como topónimo bíblico estándar en español.
  - Se usa un registro digno y claro, sin calco excesivamente literal.
  - '''Murallas'' y ''fortificación'' preservan el campo semántico defensivo del pasaje.'
  - No se introduce 'reconstruyeran' porque el griego no lo explicita en esta unidad.
  - No se requieren notas de pie porque no hay una variante textual o lectura alternativa necesaria para la publicación.
