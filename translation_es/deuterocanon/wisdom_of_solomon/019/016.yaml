translation:
  language: es
  text: Pero los que los habían recibido con fiestas[a], a aquellos que ya habían compartido los mismos derechos[b], los afligieron con sufrimientos terribles[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «con fiestas» o «con celebraciones»; el plural conserva el tono de recepción festiva.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego más literalmente: «los que ya habían compartido las mismas cosas justas» o posiblemente «las mismas provisiones»; la frase probablemente se refiere a un mismo estatus o beneficios compartidos.'
    reason: lexical_alternative
  - marker: c
    text: 'El griego aquí usa una palabra que normalmente significa «comidas» o «banquetes» («con comidas», «en banquetes», «a la mesa»), pero la oración es difícil; la traducción expresa el sentido probable en contexto: después los maltrataron.'
    reason: textual_variant
lexical_decisions:
- source_word: μετὰ ἑορτασμάτων
  english_pob_choice: with festivities
  chosen_spanish: con fiestas
  alternatives_spanish:
  - con celebraciones
  - con festejos
  lexicon: LSJ
  rationale: ἑορτασμάτων expresa un recibimiento festivo y plural; «con fiestas» conserva la idea de celebración pública y suena natural en español bíblico contemporáneo.
- source_word: εἰσδεξάμενοι
  english_pob_choice: had welcomed
  chosen_spanish: los habían recibido
  alternatives_spanish:
  - los habían acogido
  - los habían admitido
  lexicon: LSJ
  rationale: El participio aoristo medio apunta a una recepción hospitalaria. «Recibido» mantiene el hecho de acoger sin suavizar la fuerza relacional del verbo.
- source_word: τοὺς ἤδη τῶν αὐτῶν μετεσχηκότας δικαίων
  english_pob_choice: those who had already shared in the same rights
  chosen_spanish: a aquellos que ya habían compartido de las mismas cosas justas
  alternatives_spanish:
  - a los que ya habían participado de las mismas cosas justas
  - a aquellos que ya habían compartido de los mismos derechos
  lexicon: LSJ
  rationale: El griego es difícil y el audit trail inglés opta por «rights» para la fuerza social-ética, pero el sustantivo griego conserva literalmente el matiz de «cosas justas». En español se preserva esa tensión con una formulación cercana al original, dejando abierta la lectura social implícita.
- source_word: ἐκάκωσαν
  english_pob_choice: afflicted
  chosen_spanish: los afligieron
  alternatives_spanish:
  - los maltrataron
  - los hicieron sufrir
  - los oprimieron
  lexicon: LSJ
  rationale: El verbo puede significar hacer daño, maltratar o afligir. «Afligieron» mantiene la gravedad del acto sin introducir una interpretación más específica que el contexto no obliga a fijar.
- source_word: πόνοις
  english_pob_choice: with terrible sufferings
  chosen_spanish: con sufrimientos terribles
  alternatives_spanish:
  - con dolores terribles
  - con trabajos terribles
  - con penas terribles
  lexicon: LSJ
  rationale: πόνοις cubre dolor, sufrimiento y penuria. «Sufrimientos terribles» comunica bien la severidad del castigo en un español claro y digno.
theological_decisions:
- issue: Cómo reflejar el sentido de δικαίων en una frase difícil
  english_pob_reading: shared in the same rights / socially and ethically shared status, not merely shared food
  chosen_spanish_reading: compartido de las mismas cosas justas, manteniendo abierta la lectura de un status justo compartido
  alternative_spanish_readings:
  - compartido de los mismos derechos
  - compartido de las mismas provisiones
  - compartido de las mismas cosas
  rationale: El texto griego y la nota inglesa muestran una tensión entre un sentido literal («cosas justas») y uno contextual-social («derechos»). En español se conserva la ambigüedad del original sin borrar la fuerza moral de la acusación.
  doctrine_reference: Translation philosophy §1, §5
- issue: Manejo de la forma δύσκολη δείπνοις en un versículo con desajuste textual
  english_pob_reading: translate the apparent sense of subsequent mistreatment and preserve the meal-related literal alternative in a footnote
  chosen_spanish_reading: traducir el sentido general de la oposición entre recepción festiva y posterior aflicción, dejando en nota la posibilidad literal ligada a comidas/banquetes
  alternative_spanish_readings:
  - en banquetes
  - con comidas
  - a la mesa
  rationale: El estado del texto es difícil y el propio audit trail inglés marca una discrepancia mayor. La traducción principal prioriza la coherencia contextual, mientras la nota preserva la alternativa más literal para transparencia.
  doctrine_reference: PHILOSOPHY.md transparency section; Translation philosophy optimal equivalence
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail, evitando añadidos no sustentados como «gente» y cualquier idea de que el adverbio temporal perteneciera explícitamente al grupo recibido. La redacción final busca acercarse más al griego, pero conserva en nota la tensión textual y léxica documentada.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera del versículo porque no aparecen en el texto.
  - Se usa un registro bíblico moderno y sobrio, sin depender de fórmulas eclesiásticas fijas.
  - Se conserva la ambigüedad de δικαίων en vez de resolverla de modo excesivamente interpretativo.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
