translation:
  language: es
  text: Como nubes y viento sin lluvia es un hombre que se jacta de un regalo falso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como nubes y viento pero sin lluvia, así es un hombre que se jacta de un regalo que no da».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְשִׂיאִים
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - vapores
  - neblinas
  lexicon: HALOT
  rationale: En este proverbio la imagen es meteorológica y apunta a nubes que prometen lluvia; «nubes» es la equivalencia natural y clara en español.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: El contexto inmediato incluye nubes y lluvia, así que el sentido es claramente meteorológico; «viento» conserva esa imagen.
- source_word: גֶשֶׁם
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - aguacero
  - precipitación
  lexicon: HALOT
  rationale: El término designa lluvia en sentido normal; «lluvia» es la forma más natural y fiel en español.
- source_word: אָיִן
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin que haya
  - careciendo de
  lexicon: HALOT
  rationale: 'Se vierte de manera idiomática como complemento de ausencia: «sin lluvia», manteniendo la compactación proverbial del hebreo.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El singular masculino funciona de modo genérico en el proverbio; «el hombre» conserva esa referencia representativa sin forzar una abstracción.
- source_word: מִתְהַלֵּל
  english_pob_choice: boasts
  chosen_spanish: se jacta
  alternatives_spanish:
  - se gloría
  - presume
  lexicon: HALOT
  rationale: El hitpael expresa autoexaltación o alarde; «se jacta» comunica ese matiz con naturalidad en español.
- source_word: בְּמַתַּת
  english_pob_choice: of a gift
  chosen_spanish: de un regalo
  alternatives_spanish:
  - de un don
  - de una dádiva
  lexicon: HALOT
  rationale: La preposición introduce el objeto del jactarse; «de un regalo» conserva la referencia a una entrega o dádiva prometida.
- source_word: שָׁקֶר
  english_pob_choice: 'false'
  chosen_spanish: falso
  alternatives_spanish:
  - engañoso
  - mentiroso
  lexicon: HALOT
  rationale: El sustantivo califica el regalo como falso, es decir, no real o no cumplido; en español «falso» mantiene la concisión y la tensión del hebreo.
translation_notes:
  revision_awareness: El pasaje presenta una imagen proverbial estable; la versión española sigue de cerca la metáfora hebrea y la solución auditada en inglés, sin cambios de sentido respecto del texto base.
  spanish_consistency_notes:
  - Se prefirió «nubes» y «viento» por el contexto meteorológico inmediato.
  - «Se jacta» refleja el valor reflexivo/intensivo del verbo hebreo.
  - «De un regalo» preserva la construcción breve del original; la nota recoge la alternativa interpretativa de un don no concedido.
  - Se evitó «SEÑOR» u otra terminología teológica porque el verso no contiene el nombre divino ni un título teológico relevante.
