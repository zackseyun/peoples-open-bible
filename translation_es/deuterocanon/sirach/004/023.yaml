review_pass:
  verdict: revise
  source_alignment_summary: El borrador español no sigue fielmente la evidencia fuente principal ni el propio razonamiento documentado. El hebreo extante dice בָּעוֹלָם, literalmente «en el mundo», y el POB inglés preserva esa divergencia en nota aun cuando una revisión posterior cambió indebidamente el texto principal a «at the right time». Dado que la política explícita del expediente dice seguir el hebreo sobreviviente en el texto principal y conservar la alternativa griega en nota, el español «en el momento oportuno» no preserva la tensión fuente ni la decisión lexical original.
  spanish_quality_summary: El español es claro y natural, pero la nota y el texto principal quedan invertidos respecto de la base hebrea. Además, la colocación del marcador es mejor sin espacio antes de la nota. «No retengas una palabra en el mundo» suena algo extraño, pero precisamente refleja la rareza del hebreo y es preferible a una suavización interpretativa.
  glossary_alignment: 'No hay conflictos con terminología doctrinal mayor. «No retengas», «una palabra», «ocultes», «tu sabiduría» están bien. El problema principal es de alineación textual: se debe conservar «en el mundo» en el texto principal y dejar «en un tiempo de salvación/liberación» como variante griega en nota.'
  issues:
  - severity: high
    issue: La frase «en el momento oportuno» sustituye la lectura hebrea principal «en el mundo».
    rationale: El expediente fuente y las decisiones léxicas indican que el hebreo extante debe regir el texto principal, aunque sea difícil o inusual; la lectura griega debe ir en nota, no absorberse en el cuerpo del texto.
  - severity: medium
    issue: La explicación teológica/lexical del borrador afirma seguir el hebreo, pero el texto principal en realidad sigue una reinterpretación funcional.
    rationale: Esto crea inconsistencia interna entre la justificación y la traducción resultante.
  - severity: low
    issue: Espaciado del marcador de nota.
    rationale: 'En español bíblico editado conviene anclar el marcador sin espacio: «palabra[a]».'
  revised_spanish_text: No retengas una palabra[a] en el mundo, y no ocultes tu sabiduría.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «No impidas una palabra en un tiempo de salvación» (o «de liberación»). El testimonio hebreo, en cambio, lee «en el mundo».'
    reason: alternative_reading
  revision_rationale: Se restituye la lectura hebrea principal «en el mundo» en conformidad con la evidencia fuente y la filosofía declarada del proyecto para Sirácida. Se conserva en nota la variante/paralelo griego «en un tiempo de salvación/liberación». El resto del español ya era natural y fiel.
