translation:
  language: es
  text: Entonces Samuel tomó el cuerno de aceite y lo ungió en medio de sus hermanos. Y el Espíritu[a] de Yahvé se abalanzó[b] sobre David desde aquel día en adelante. Entonces Samuel se levantó y se fue a Ramá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el espíritu de Yahvé’. El hebreo no distingue por mayúsculas entre ‘Espíritu’ y ‘espíritu’.
    reason: alternative_reading
  - marker: b
    text: O ‘vino poderosamente sobre David’. El verbo hebreo puede expresar una venida enérgica y capacitadora del Espíritu.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶרֶן הַשֶּׁמֶן
  english_pob_choice: the horn of oil
  chosen_spanish: el cuerno del aceite
  alternatives_spanish:
  - el cuerno del óleo
  - el recipiente de aceite
  lexicon: HALOT
  rationale: קֶרֶן significa literalmente 'cuerno'; conservarlo mantiene la imagen concreta. הַשֶּׁמֶן se expresa de forma natural como 'el aceite'. Evito 'recipiente' porque suaviza la imaginería y borra el detalle material que el hebreo preserva.
- source_word: וַיִּמְשַׁח
  english_pob_choice: anointed
  chosen_spanish: lo ungió
  alternatives_spanish:
  - lo consagró
  - lo frotó con aceite
  lexicon: HALOT
  rationale: מָשַׁח es el verbo técnico de unción ritual y real. 'Ungió' conserva tanto el acto físico como su peso teológico sin explicarlo en exceso.
- source_word: בְּקֶרֶב אֶחָיו
  english_pob_choice: in the midst of his brothers
  chosen_spanish: en medio de sus hermanos
  alternatives_spanish:
  - entre sus hermanos
  - en presencia de sus hermanos
  lexicon: HALOT
  rationale: '''En medio de'' reproduce bien בְּקֶרֶב y mantiene la escena fraternal y pública. ''Sus hermanos'' es el referente natural y más preciso en español.'
- source_word: וַתִּצְלַח רוּחַ יְהוָה אֶל דָּוִד
  english_pob_choice: the Spirit of Yahweh rushed upon David
  chosen_spanish: el Espíritu de Yahvé se abalanzó sobre David
  alternatives_spanish:
  - el Espíritu de Yahvé vino poderosamente sobre David
  - el espíritu de Yahvé se abalanzó sobre David
  lexicon: HALOT
  rationale: צלח con רוּחַ יְהוָה en este tipo de relato comunica un venir enérgico y eficaz. 'Se abalanzó sobre' conserva la fuerza verbal y la vividez de la acción; uso 'Espíritu' con mayúscula para reflejar el referente divino en este contexto narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según la norma del proyecto, en vez de sustituirlo por un título. Esto mantiene visible el Tetragrámaton y su valor propio.
- source_word: מֵהַיּוֹם הַהוּא וָמָעְלָה
  english_pob_choice: from that day onward
  chosen_spanish: desde aquel día en adelante
  alternatives_spanish:
  - desde aquel día y más allá
  - desde aquel día para adelante
  lexicon: HALOT
  rationale: La expresión marca continuidad a partir de un punto inicial. 'En adelante' conserva el matiz durativo y suena natural en español moderno.
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: En secuencia narrativa, קום suele expresarse naturalmente como 'se levantó'. Es claro, sobrio y adecuado al registro bíblico.
- source_word: הָרָמָתָה
  english_pob_choice: to Ramah
  chosen_spanish: a Ramá
  alternatives_spanish:
  - a Ramata
  - a la Ramá
  lexicon: HALOT
  rationale: La forma española estándar del topónimo es 'Ramá'. La preposición de movimiento está implícita en 'se fue a'.
theological_decisions:
- issue: Naturaleza de רוּחַ יְהוָה
  english_pob_reading: the Spirit of Yahweh rushed upon David
  chosen_spanish_reading: el Espíritu de Yahvé se abalanzó sobre David
  alternative_spanish_readings:
  - el espíritu de Yahvé se abalanzó sobre David
  - el Espíritu de Yahvé vino poderosamente sobre David
  rationale: El contexto de Samuel presenta una acción divina eficaz y capacitadora. La mayúscula en 'Espíritu' refleja la lectura personal/divina sin forzar una capitalización que el hebreo no marca; la alternativa en minúscula queda conceptualmente abierta.
  doctrine_reference: Mantener la tensión léxica y teológica del original; no resolverla por convención tipográfica
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, preservando la imaginería concreta del cuerno y la fuerza verbal de צלח. No se incorporaron revisiones adicionales; el estado de revisión más reciente indica estabilidad del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme a la norma del proyecto.
  - Se mantiene 'Espíritu' con mayúscula en el texto principal por el referente divino del contexto, dejando abierta la alternativa en nota.
  - El topónimo se normaliza como 'Ramá', forma habitual en español bíblico.
  - La estructura narrativa conserva el orden de acciones del hebreo sin añadir explicaciones interpretativas.
