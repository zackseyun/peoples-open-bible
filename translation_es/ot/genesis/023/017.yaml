translation:
  language: es
  text: Así quedó confirmado el campo de Efrón en Macpela[a], que estaba frente a Mamré —el campo, la cueva que estaba en él, y todos los árboles del campo, dentro de todos sus linderos alrededor—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedó establecido» o «fue transferido»; el verbo hebreo aquí probablemente lleva un sentido legal de confirmación de propiedad en el contexto de la venta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: was confirmed
  chosen_spanish: quedó confirmado
  alternatives_spanish:
  - quedó establecido
  - fue transferido
  - quedó asentado
  lexicon: HALOT
  rationale: En este contexto de compraventa, קום no describe una acción física sino la confirmación legal de la propiedad. «Quedó confirmado» conserva esa fuerza jurídica en un español natural.
- source_word: שְׂדֵה עֶפְרוֹן
  english_pob_choice: Ephron’s field
  chosen_spanish: el campo de Ephrón
  alternatives_spanish:
  - el campo de Efrón
  - el terreno de Ephrón
  lexicon: HALOT
  rationale: La cadena constructa se expresa de manera natural en español como posesión. Se mantiene el nombre propio con transliteración bíblica estándar en español.
- source_word: בַּמַּכְפֵּלָה
  english_pob_choice: at Machpelah
  chosen_spanish: en Macpela
  alternatives_spanish:
  - en la Macpela
  - en Machpelá
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre de lugar. «En» refleja mejor la localización del terreno que «at» en inglés y no añade más precisión de la que ofrece el hebreo.
- source_word: לִפְנֵי מַמְרֵא
  english_pob_choice: before Mamre
  chosen_spanish: frente a Mamré
  alternatives_spanish:
  - ante Mamré
  - delante de Mamré
  - cerca de Mamré
  lexicon: HALOT
  rationale: לִפְנֵי indica literalmente «delante de / frente a». «Frente a» mantiene la relación espacial sin interpretar de más la dirección exacta.
- source_word: הַשָּׂדֶה וְהַמְּעָרָה אֲשֶׁר בּוֹ
  english_pob_choice: the field, the cave that was in it
  chosen_spanish: el campo, la cueva que estaba en él
  alternatives_spanish:
  - el campo y la cueva que estaba en él
  - el campo, incluyendo la cueva que estaba en él
  lexicon: HALOT
  rationale: 'La enumeración legal del hebreo se reproduce como inventario: campo, cueva y sus elementos incluidos. «Que estaba en él» preserva el referente del pronombre sin sobreexplicarlo.'
- source_word: וְכָל הָעֵץ אֲשֶׁר בַּשָּׂדֶה
  english_pob_choice: and every tree in the field
  chosen_spanish: y todos los árboles del campo
  alternatives_spanish:
  - y cada árbol del campo
  - y todo árbol del campo
  lexicon: HALOT
  rationale: Aunque el inglés optó por «every tree», en español el plural «todos los árboles» suena más natural en una lista de bienes y conserva el sentido distributivo/colectivo del hebreo.
- source_word: אֲשֶׁר בְּכָל גְּבֻלוֹ סָבִיב
  english_pob_choice: within all its surrounding border
  chosen_spanish: dentro de todo su límite alrededor
  alternatives_spanish:
  - dentro de todo su linde alrededor
  - dentro de todo su contorno alrededor
  - dentro de todo su límite circundante
  lexicon: HALOT
  rationale: La frase subraya la totalidad del perímetro. «Dentro de todo su límite alrededor» conserva el alcance legal y la repetición del movimiento envolvente sin introducir un término demasiado técnico o ajeno al español bíblico.
translation_notes:
  revision_awareness: 'El inglés POB fue revisado para preferir una formulación más cercana al hebreo («within all its surrounding border») sin perder naturalidad. La versión española sigue esa misma línea: mantiene la enumeración jurídica y la referencia perimetral completa, evitando una paráfrasis interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; en este versículo no se aplica.
  - Se usa «Mesías/Cristo» según contexto; aquí no aparece ninguna de las dos formas.
  - Se conserva el estilo de inventario jurídico del hebreo, con repeticiones deliberadas en vez de simplificar la enumeración.
  - 'Los nombres propios se transliteran de forma consistente: Ephrón/Macpela/Mamré.'
