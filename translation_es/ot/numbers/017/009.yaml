  source_alignment_summary: 'El borrador español refleja fielmente la fórmula hebrea: וַיְדַבֵּר = «habló», אֶל = «a», מֹשֶׁה = «Moisés», לֵאמֹר = «diciendo». También preserva correctamente יְהוָה como «Yahvé», en línea con la política del proyecto.'
