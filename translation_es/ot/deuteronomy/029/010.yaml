review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura inclusiva del hebreo: «tus pequeños», «tus esposas», «el extranjero residente ... en medio de tu campamento», y el rango «desde ... hasta ...». Sin embargo, la nota b está anclada al término equivocado: la alternativa inglesa «the resident foreigner among you» corresponde a גֵּר, mientras que el texto español ya traduce גֵּר como «extranjero residente» y el matiz alternativo «entre ustedes» pertenece a la frase locativa, no al sustantivo. Conviene reparar la nota para que preserve fielmente la evidencia fuente y la auditoría inglesa.'
  spanish_quality_summary: El español es claro, digno y natural. «Tus pequeños» funciona bien con la nota. «Tus esposas» y «en medio de tu campamento» son adecuados. «Saca tu agua» es comprensible, pero «extrae tu agua» o «recoge tu agua» sonarían menos coloquiales; aun así, no es un problema suficiente para exigir cambio. La reparación necesaria es principalmente de precisión y legibilidad de la nota b.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección «extranjero residente» para גֵּר está bien alineada con la explicación léxica. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La única desalineación está en la formulación de la nota alternativa, no en el texto principal.
  issues:
  - severity: medium
    issue: La nota b no corresponde exactamente al elemento fuente ni al texto principal.
    rationale: La nota dice «O “el residente extranjero entre ustedes”», pero el texto principal ya tiene «el extranjero residente». La diferencia real en la auditoría inglesa no es solo el orden de palabras, sino la alternativa completa para גֵּר y su relación con la frase «que está en medio de tu campamento». En español, la nota actual mezcla el sustantivo con una locación distinta («entre ustedes»), creando una alternativa poco precisa respecto del hebreo y del POB inglés.
  revised_spanish_text: tus pequeños[a], tus esposas, y el extranjero residente[b] que está en medio de tu campamento, desde el que corta tu leña hasta el que saca tu agua,
  revised_footnotes:
  - marker: a
    text: O «tus hijos». El hebreo טַף se refiere especialmente a niños pequeños o dependientes.
    reason: lexical_alternative
  - marker: b
    text: O «el forastero». El hebreo גֵּר designa a un extranjero residente que vive dentro de la comunidad.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y natural. Solo se corrige la nota b para que la alternativa recaiga propiamente sobre גֵּר, sin introducir una locación distinta que en el hebreo pertenece a la frase siguiente. Así la nota española preserva mejor la evidencia fuente y la lógica de la auditoría inglesa.
