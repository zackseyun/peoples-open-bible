base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/002/003.yaml
  text: For the vision is still for the appointed time[a]; it hastens toward the end and will not lie. If it delays, wait for it, for it will surely come[b]; it will not be late.
  footnotes:
  - marker: a
    text: Or 'If he delays, wait for him.' The Hebrew pronoun can be rendered personally, though in context it most naturally refers to 'the vision.' Hebrews 10:37 applies the line in a personal way.
    reason: alternative_reading
  - marker: b
    text: Or 'it pants toward the end' / 'it speaks of the end.' The Hebrew verb is difficult; the main text conveys the sense that the vision moves urgently toward its appointed fulfillment.
    reason: lexical_alternative
