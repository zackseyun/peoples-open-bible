- from: Cuando sus hermanos vieron que su padre lo amaba más que a todos sus hermanos[a], lo odiaron y no podían hablarle en paz.
  to: Cuando sus hermanos vieron que su padre lo amó más que a todos sus hermanos,[a] lo odiaron y no pudieron hablarle en paz.
  rationale: Se ajustan los tiempos verbales a un pasado narrativo más natural y más cercano a la secuencia hebrea y al audit trail inglés. Se conserva 'en paz' en el texto por fidelidad al hebreo לְשָׁלוֹם, pero la nota se corrige para ofrecer una alternativa explicativa real y útil en español. No se requiere adjudicación adicional.
