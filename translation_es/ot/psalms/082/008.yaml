lexical_decisions:
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Alzate!
  - ¡Ponte en pie!
  - ¡Levántate, Dios!
  lexicon: HALOT
  rationale: Imperativo de קום en un ruego dirigido a Dios. «Levántate» es natural en español y conserva la urgencia de la petición; el tono exclamativo refleja mejor la apelación directa del hebreo que una forma más fría.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh, Dios
  lexicon: HALOT
  rationale: El destinatario es singular por los imperativos y el pronombre siguientes. En español, «oh Dios» expresa la invocación directa sin introducir una formulación litúrgica ajena al registro del pasaje.
- source_word: שָׁפְטָה
  english_pob_choice: judge
  chosen_spanish: juzga
  alternatives_spanish:
  - sostén juicio sobre
  - gobierna
  lexicon: HALOT
  rationale: El imperativo de שׁפט aquí conserva sentido forense y real. «Juzga» es el equivalente más directo y no reduce la palabra a «gobierna» ni la amplía a «vindica» sin base explícita.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el país
  lexicon: HALOT
  rationale: En paralelo con «todas las naciones», el alcance es global; «la tierra» reproduce bien ese campo semántico en español y evita un sesgo local de «el país».
- source_word: תִנְחַל
  english_pob_choice: will inherit
  chosen_spanish: heredarás
  alternatives_spanish:
  - poseerás
  - tomarás posesión de
  lexicon: HALOT
  rationale: El verbo נחל conserva una carga de herencia/posesión legítima. «Heredarás» mantiene ese matiz teológico y jurídico mejor que «poseerás», que suena más plano.
- source_word: בְּכָל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - entre todas las naciones
  - sobre todas las naciones
  lexicon: HALOT
  rationale: La construcción comunica el alcance universal de la herencia. En español, «a todas las naciones» funciona de manera idiomática con «heredar» y conserva el sentido colectivo de גויים.
theological_decisions:
- issue: Relación de Dios con las naciones en תִנְחַל בְּכָל הַגּוֹיִם
  english_pob_reading: for you will inherit all the nations
  chosen_spanish_reading: porque tú heredarás a todas las naciones
  alternative_spanish_readings:
  - porque tú poseerás a todas las naciones
  - porque todas las naciones te pertenecen
  rationale: La línea fundamenta el ruego de que Dios juzgue la tierra en su derecho sobre las naciones. «Heredarás» conserva la idea bíblica de posesión legítima y la dimensión dinástica/covenantal que el POB quiso mantener con «inherit».
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El pasaje no muestra revisiones aplicadas en el paquete; el pass más reciente indica que no hubo cambios necesarios y el control cruzado reporta alta concordancia con solo observaciones menores.
  spanish_consistency_notes:
  - Se conservó «Dios» para אֱלֹהִים como vocativo singular, en consonancia con el contexto.
  - Se eligió «tierra» para הָאָרֶץ por el paralelo con «todas las naciones», evitando «tierra» en sentido de territorio local.
  - Se mantuvo la distinción de «heredar» para נחל, en línea con el valor covenantal/posesivo documentado por el POB.
