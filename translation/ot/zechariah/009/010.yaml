id: ZEC.9.10
reference: Zechariah 9:10
source:
  edition: WLC
  text: וְ/הִכְרַתִּי רֶ֣כֶב מֵ/אֶפְרַ֗יִם וְ/סוּס֙ מִ/יר֣וּשָׁלִַ֔ם וְ/נִכְרְתָה֙ קֶ֣שֶׁת מִלְחָמָ֔ה וְ/דִבֶּ֥ר שָׁל֖וֹם לַ/גּוֹיִ֑ם וּ/מָשְׁל/וֹ֙ מִ/יָּ֣ם עַד יָ֔ם וּ/מִ/נָּהָ֖ר עַד אַפְסֵי אָֽרֶץ־־־־׃
translation:
  text: And I will cut off the chariot from Ephraim and the horse from Jerusalem[a], and the battle bow will be cut off; and he will speak peace to the nations, and his dominion will be from sea to sea[b], and from the River to the ends of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his dominion will be from sea to sea.'
    reason: lexical_alternative
  - marker: b
    text: '''The River'' likely refers to the Euphrates.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִכְרַתִּי
  chosen: And I will cut off
  alternatives:
  - And I will destroy
  - And I will remove
  lexicon: HALOT
  rationale: הכרת in the Hiphil commonly means to cut off, remove, or eliminate. 'Cut off' preserves the concrete force and prophetic diction without over-specifying the means of destruction.
- source_word: רֶכֶב
  chosen: the chariot
  alternatives:
  - the chariotry
  - the war chariot
  lexicon: HALOT
  rationale: The singular collective can denote chariot forces. 'The chariot' is a natural English singular with collective force and pairs well with the following singular 'horse.'
- source_word: מֵאֶפְרַיִם
  chosen: from Ephraim
  alternatives:
  - out of Ephraim
  lexicon: HALOT
  rationale: Ephraim here stands for the northern kingdom/region. 'From Ephraim' is the most direct rendering and preserves the geographic-political reference.
- source_word: וְסוּס מִירוּשָׁלִַם
  chosen: and the horse from Jerusalem
  alternatives:
  - and the horses from Jerusalem
  lexicon: HALOT
  rationale: The singular likely has collective force, but retaining 'horse' mirrors the Hebrew form and the parallelism with 'chariot.' Jerusalem represents the southern center, balancing Ephraim.
- source_word: וְנִכְרְתָה
  chosen: will be cut off
  alternatives:
  - will be destroyed
  - will be removed
  lexicon: HALOT
  rationale: The Niphal continues the same root as the first clause. 'Will be cut off' preserves the lexical repetition and the passive/resultative sense.
- source_word: קֶשֶׁת מִלְחָמָה
  chosen: the battle bow
  alternatives:
  - the bow of war
  - the war bow
  lexicon: HALOT
  rationale: A construct phrase meaning a bow used for warfare. 'Battle bow' is concise, natural, and preserves the military image.
- source_word: וְדִבֶּר
  chosen: and he will speak
  alternatives:
  - and he will proclaim
  - and he will declare
  lexicon: HALOT
  rationale: The Piel of דבר often means speak or declare. 'Speak' is the most direct rendering; the object 'peace' supplies the content without requiring a more expansive verb.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - peace and wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard rendering and fits the royal-messianic context. Broader connotations of wholeness are present but should not be paraphrastically expanded in the main text.'
- source_word: לַגּוֹיִם
  chosen: to the nations
  alternatives:
  - to the Gentiles
  - to the peoples
  lexicon: HALOT
  rationale: גוים here refers broadly to the nations, not specifically non-Jews in a later technical sense. 'Nations' best fits the prophetic universal horizon.
- source_word: וּמָשְׁלוֹ
  chosen: and his rule will be
  alternatives:
  - and his dominion will be
  - and he will rule
  lexicon: HALOT
  rationale: The form is a noun with pronominal suffix, 'his rule/dominion,' not a finite verb. 'His rule will be' preserves the nominal construction while reading smoothly in English.
- source_word: מִיָּם עַד יָם
  chosen: from sea to sea
  alternatives:
  - from one sea to another sea
  lexicon: HALOT
  rationale: This is a standard idiom for expansive dominion. 'From sea to sea' is both literal and idiomatic in English.
- source_word: וּמִנָּהָר
  chosen: and from the River
  alternatives:
  - and from the Euphrates River
  - and from the river
  lexicon: HALOT
  rationale: With the article-like definiteness implied by the context, 'the River' likely refers to the Euphrates as a known geographic marker. The capitalized 'River' preserves the conventional biblical shorthand without over-clarifying in the main text.
- source_word: עַד אַפְסֵי אָרֶץ
  chosen: to the ends of the earth
  alternatives:
  - to the farthest parts of the earth
  - to earth's extremities
  lexicon: HALOT
  rationale: A common biblical expression for the remotest reaches of the world. 'The ends of the earth' is the clearest and most established natural equivalent.
