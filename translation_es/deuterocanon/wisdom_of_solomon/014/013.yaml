review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del griego: cláusula explicativa con γάρ, sujeto implícito conservado, contraste temporal entre origen y duración futura. Sin embargo, la formulación española ''no era desde el principio'' suena menos natural y menos precisa para ἦν ἀπ'' ἀρχῆς que una expresión existencial como ''no existía desde el principio'' o una reestructuración equivalente. Dado que el inglés auditado deja un ''it'' explícito y el griego solo lo implica, en español conviene mantener la elipsis pero con un verbo más idiomático.'
  spanish_quality_summary: La frase actual es comprensible, pero 'era desde el principio' resulta torpe en español y puede leerse como descripción de estado más que de existencia/origen. 'Porque no existía desde el principio[a], ni existirá para siempre.' suena más natural, conserva la elipsis del sujeto y mantiene el paralelismo verbal. La nota al pie está bien redactada y útil.
  glossary_alignment: No hay términos del glosario principal en juego. La decisión teológica de no explicitar 'ídolos' o 'idolatría' en el texto principal está bien alineada con el expediente inglés. El cambio recomendado es estilístico-lexical para reflejar mejor εἰμί en este contexto existencial.
  issues:
  - severity: medium
    issue: '''no era desde el principio'' es poco idiomático en español'
    rationale: Aunque refleja formalmente 'it was', en español bíblico y general esta combinación suena forzada. El contexto pide existencia/origen temporal; 'no existía desde el principio' comunica mejor ἦν ἀπ' ἀρχῆς sin sobreespecificar el sujeto.
  - severity: low
    issue: El paralelismo verbal puede mejorarse con 'existía / existirá'
    rationale: El inglés privilegia 'was / will be' por elegancia, pero en español el mismo paralelismo con 'ser' no suena natural aquí. 'Existía / existirá' preserva la simetría y mejora la legibilidad.
  revised_spanish_text: Porque no existía desde el principio[a], ni existirá para siempre.
