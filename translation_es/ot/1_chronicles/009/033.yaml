translation:
  language: es
  text: Estos eran los cantores[a], jefes de casas paternas de los levitas, en los aposentos, libres de otras tareas, porque día y noche estaban encargados del trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exentos» o «liberados»; el término hebreo es raro y probablemente significa que fueron liberados de otras tareas porque tenían la responsabilidad continua del servicio de canto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores
  - los cantantes
  - los músicos
  lexicon: HALOT
  rationale: El participio se refiere a los que cantan en servicio. «Cantores» comunica bien esa función cultual en español y evita ampliar indebidamente a «músicos», que es más general.
- source_word: רָאשֵׁי אָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: jefes de casas paternas
  alternatives_spanish:
  - jefes de casas paternas
  - cabezas de casas paternas
  - jefes de clanes
  lexicon: HALOT
  rationale: La expresión genealógica de Crónicas conviene conservarla con una estructura cercana al hebreo. «Casas paternas» mantiene la organización familiar/clánica sin sustituirla por un equivalente más interpretativo.
- source_word: לַלְוִיִּם
  english_pob_choice: of the Levites
  chosen_spanish: de los levitas
  alternatives_spanish:
  - de los levitas
  - entre los levitas
  lexicon: HALOT
  rationale: La relación genitiva indica pertenencia o adscripción. «De los levitas» es la forma más directa y natural en español.
- source_word: בַּלְּשָׁכוֹת
  english_pob_choice: in the chambers
  chosen_spanish: en las cámaras
  alternatives_spanish:
  - en las cámaras
  - en los aposentos
  - en los cuartos
  lexicon: HALOT
  rationale: «Cámaras» preserva el matiz institucional y arquitectónico del término hebreo, frecuente en contextos del complejo sagrado. «Aposentos» o «cuartos» suenan menos precisos aquí.
- source_word: פטירים
  english_pob_choice: free from other duties
  chosen_spanish: libres de otras tareas
  alternatives_spanish:
  - libres de otras tareas
  - exentos de otras tareas
  - liberados de otras tareas
  lexicon: HALOT
  rationale: La forma rara sugiere exención o liberación. «Libres de otras tareas» expresa esa idea en español sin forzar un tecnicismo; se conserva la tensión entre exención y liberación implícita en el hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de su exención/condición. «Porque» es natural y claro en español contemporáneo.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - día y noche
  - de día y de noche
  - continuamente
  lexicon: HALOT
  rationale: La pareja temporal debe mantenerse idiomáticamente. «Día y noche» reproduce el alcance continuo sin convertirlo en un adverbio más interpretativo como «continuamente».
- source_word: עֲלֵיהֶם
  english_pob_choice: they were occupied in
  chosen_spanish: estaban encargados de
  alternatives_spanish:
  - estaban encargados de
  - tenían a su cargo
  - recaía sobre ellos
  lexicon: HALOT
  rationale: La preposición hebrea literalmente es «sobre ellos», pero en contexto expresa responsabilidad. «Estaban encargados de» comunica bien esa carga de servicio continua sin perder el sentido obligatorio.
- source_word: בַּמְּלָאכָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - la obra
  - el trabajo
  - el servicio
  lexicon: HALOT
  rationale: «Melaḵáh» puede ser trabajo, labor u obra. «La obra» funciona en registro bíblico-español y deja abierta la referencia a la labor litúrgica sin reducirla a simple trabajo manual.
theological_decisions:
- issue: Alcance de la exención de las tareas
  english_pob_reading: free from other duties
  chosen_spanish_reading: libres de otras tareas
  alternative_spanish_readings:
  - exentos de otras tareas
  - liberados de otras tareas
  rationale: El hebreo raro se entiende mejor como exención por razón de una responsabilidad continua. «Libres de otras tareas» conserva la ambigüedad entre exención formal y liberación práctica, sin decidir más de lo que el texto exige.
  doctrine_reference: 1 Crónicas 9:33; comparación léxica con el valor de פטירים en contexto
- issue: Relación entre la ubicación y la exención
  english_pob_reading: in the chambers, free from other duties
  chosen_spanish_reading: en las cámaras, libres de otras tareas
  alternative_spanish_readings:
  - libres de otras tareas en las cámaras
  - en las cámaras, exentos de otras tareas
  rationale: 'La colocación sigue la revisión inglesa: primero la ubicación, luego la exención. En español se mantiene el mismo orden para reflejar mejor la sintaxis hebrea y la lectura contextual.'
  doctrine_reference: 1 Crónicas 9:33; revisión textual/audit trail
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa que reordenó la frase para dejar claro que los jefes de las casas paternas de los levitas estaban en las cámaras y, por ello, libres de otras tareas, porque estaban dedicados día y noche a la obra. Se preservó esa secuencia y se evitó convertirla en una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantuvo «cámaras» para בַּלְּשָׁכוֹת, en coherencia con el registro institucional del texto.
  - Se prefirió «cantores» a «músicos» para no ampliar el ámbito semántico del participio hebreo.
  - «Obra» se dejó suficientemente general para no sobreespecificar el tipo de labor, aunque el contexto es levítico/cultual.
  - Se conservó una nota sobre פטירים porque el español también permite varias soluciones legítimas y el hebreo sigue siendo raro y discutido.
