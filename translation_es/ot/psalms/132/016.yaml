translation:
  language: es
  text: Y vestiré a sus sacerdotes de salvación[a], y sus fieles[c] gritarán[b] de júbilo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De salvación» conserva el sustantivo amplio del hebreo יֶשַׁע; también puede implicar liberación o victoria.
    reason: lexical_alternative
  - marker: b
    text: 'La construcción hebrea intensifica la acción: literalmente, algo como «gritando, gritarán» o «gritarán con gran júbilo».'
    reason: lexical_alternative
  - marker: c
    text: «Fieles» traduce el matiz de חסיד como personas caracterizadas por lealtad de pacto y devoción; puede entenderse también como «santos» o «piadosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹהֲנֶיהָ
  english_pob_choice: her priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus sacerdotes de ella
  - los sacerdotes de ella
  lexicon: HALOT
  rationale: El hebreo es un sustantivo plural con sufijo femenino de 3.ª persona, referido a Sion/Zion personificada. En español, "sus sacerdotes" comunica de manera natural la pertenencia implícita sin forzar un posesivo redundante con "de ella". Se conserva el referente femenino en el contexto, aunque el español no lo repita explícitamente.
- source_word: אַלְבִּישׁ
  english_pob_choice: I will clothe
  chosen_spanish: vestiré
  alternatives_spanish:
  - revestiré
  - pondré sobre
  lexicon: HALOT
  rationale: El hiphil de לבשׁ expresa hacer que alguien se vista o vestir. "Vestiré" es natural en español y mantiene la imagen verbal. "Revestiré" sería posible, pero aquí suena más marcado y menos directo para una acción concreta de vestir a personas.
- source_word: יֶשַׁע
  english_pob_choice: with salvation
  chosen_spanish: de salvación
  alternatives_spanish:
  - de liberación
  - de victoria
  lexicon: HALOT
  rationale: La construcción hebrea presenta la realidad salvadora como aquello con que se viste a los sacerdotes. En español, "de salvación" conserva el sustantivo teológico amplio que el proyecto inglés eligió, sin excluir los matices de liberación o victoria. La preposición "de" comunica bien la idea de vestir con ese don o condición.
- source_word: חֲסִידֶיהָ
  english_pob_choice: her faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - sus santos
  - sus piadosos
  - sus leales
  lexicon: HALOT
  rationale: חסיד se refiere a quienes son marcados por lealtad pactal y devoción. "Fieles" expresa bien esa fidelidad y evita la carga eclesiástica que puede tener "santos" en español. También evita el posible sesgo de "piadosos", que puede sonar más moralista que pactal.
- source_word: רַנֵּן יְרַנֵּנוּ
  english_pob_choice: will shout for joy
  chosen_spanish: darán gritos de júbilo
  alternatives_spanish:
  - cantarán de alegría
  - gritarán de júbilo
  - prorrumpirán en júbilo
  lexicon: HALOT
  rationale: 'La secuencia infinitivo absoluto + verbo finito intensifica la acción: literalmente, algo como "gritando gritarán". En español, "darán gritos de júbilo" preserva el énfasis y la vocalidad de la expresión, con un registro bíblico claro y natural. Se evita reducirlo solo a "alegrarse", porque el hebreo enfatiza la expresión audible.'
theological_decisions:
- issue: Cómo traducir חֲסִידֶיהָ en un contexto de identidad del pueblo santo
  english_pob_reading: her faithful ones
  chosen_spanish_reading: sus fieles
  alternative_spanish_readings:
  - sus santos
  - sus piadosos
  rationale: El punto teológico no es una categoría institucional posterior, sino la descripción de personas caracterizadas por lealtad de pacto y devoción. "Sus fieles" conserva esa fuerza sin introducir resonancias confesionales posteriores que "santos" podría evocar en español. La opción mantiene la tensión entre pertenencia comunitaria y fidelidad ética/pactual.
  doctrine_reference: Translation philosophy §§5–6
- issue: Alcance de יֶשַׁע como don divino en el vestir sacerdotal
  english_pob_reading: with salvation
  chosen_spanish_reading: de salvación
  alternative_spanish_readings:
  - con salvación
  - de liberación
  - de victoria
  rationale: El hebreo permite un campo semántico de salvación/liberación/victoria. "De salvación" preserva la amplitud y la densidad teológica del término, sin estrecharlo a una sola faceta. En un contexto de promesa divina, la frase conserva que Yahvé mismo provee la condición salvadora que cubre a sus sacerdotes.
  doctrine_reference: Translation philosophy §§3–4
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no muestra revisiones textuales relevantes en el expediente. Se ha conservado la personificación femenina de Sion mediante el posesivo implícito en español, sin sobreexplicar el referente.
  spanish_consistency_notes:
  - Se usó "Yahvé" según la convención del proyecto para el nombre divino implícito en la voz de primera persona del versículo.
  - Se prefirió "sus sacerdotes" y "sus fieles" para mantener la referencia femenina de Sion sin duplicar posesivos en español.
  - Se mantuvo un tono bíblico moderno y digno, evitando calcos demasiado mecánicos.
  - Se conservó la intensidad verbal del hebreo mediante una frase española que expresa júbilo audible.
