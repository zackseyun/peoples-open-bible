translation:
  language: es
  text: Mejor es la falta de hijos[a] con virtud, porque la inmortalidad está en su memoria, pues es conocida tanto por Dios como por los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos entienden el pronombre femenino («su», «es conocida») como referido principalmente a «virtud», es decir: «porque la inmortalidad está en la memoria de la virtud». Otros lo toman como referido más bien a la falta de hijos o a la mujer sin hijos.'
    reason: alternative_reading
  - marker: b
    text: El griego dice «por los hombres»; aquí «hombres» significa los seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείσσων
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Más excelente es
  - Superior es
  lexicon: LSJ
  rationale: El comparativo predicativo expresa una evaluación proverbial. «Mejor es» es idiomático en español y conserva el tono sapiencial del griego.
- source_word: ἀτεκνία
  english_pob_choice: childlessness
  chosen_spanish: esterilidad
  alternatives_spanish:
  - carencia de hijos
  - falta de hijos
  lexicon: LSJ
  rationale: El término griego nombra el estado de no tener hijos. En español, «esterilidad» comunica ese estado de forma breve y natural en un registro sapiencial, aunque puede sonar más fuerte que una mera ausencia circunstancial; por eso se preserva la tensión semántica en la nota textual.
- source_word: μετὰ ἀρετῆς
  english_pob_choice: with virtue
  chosen_spanish: con virtud
  alternatives_spanish:
  - con excelencia
  - con rectitud moral
  lexicon: LSJ
  rationale: ἀρετή en este contexto sapiencial apunta a excelencia moral. «Virtud» es la correspondencia más directa y natural en español.
- source_word: ἀθανασία
  english_pob_choice: immortality
  chosen_spanish: la inmortalidad
  alternatives_spanish:
  - la vida inmortal
  - la incorrupción
  lexicon: LSJ
  rationale: «Inmortalidad» mantiene el valor técnico del sustantivo y su fuerza temática en Sabiduría.
- source_word: ἐν μνήμῃ αὐτῆς
  english_pob_choice: in her memory
  chosen_spanish: está en su memoria
  alternatives_spanish:
  - está en su recuerdo
  - está en la memoria de ella
  lexicon: LSJ
  rationale: La revisión inglesa favorece una formulación más natural («in her memory»). En español, «está en su memoria» conserva esa naturalidad y deja abierta la referencia femenina del pronombre, que puede apuntar a ἀρετή.
- source_word: γινώσκεται
  english_pob_choice: is known
  chosen_spanish: es conocida
  alternatives_spanish:
  - es reconocida
  - es conocida y reconocida
  lexicon: LSJ
  rationale: El pasivo indica un estado de conocimiento/reconocimiento. «Es conocida» sigue de cerca el griego y funciona bien con el paralelismo divino-humano.
- source_word: παρὰ θεῷ ... καὶ παρὰ ἀνθρώποις
  english_pob_choice: both by God and by men
  chosen_spanish: tanto junto a Dios como junto a los hombres
  alternatives_spanish:
  - tanto ante Dios como ante los hombres
  - tanto por Dios como por los hombres
  lexicon: LSJ
  rationale: παρά con dativo expresa relación/estimación. «Junto a» conserva la construcción relacional sin introducir una interpretación judicial más fuerte que el griego. «Los hombres» mantiene el valor representativo-genérico de ἀνθρώποις.
theological_decisions:
- issue: Referente de αὐτῆς en «ἐν μνήμῃ αὐτῆς»
  english_pob_reading: The pronoun refers to virtue rather than childlessness.
  chosen_spanish_reading: El pronombre se puede entender principalmente como referido a «virtud», no a la esterilidad.
  alternative_spanish_readings:
  - El pronombre podría referirse a la esterilidad personificada.
  - El pronombre podría aludir a la mujer sin hijos implícita.
  rationale: La lectura más cercana y coherente es ἀρετή, porque el razonamiento del verso exalta la permanencia de la virtud. Sin embargo, el griego deja una tensión real en el femenino; por eso la traducción mantiene una formulación que no la cierra por completo y la nota preserva las alternativas.
  doctrine_reference: Mantener la tensión interpretativa sin resolverla indebidamente; preferir la lectura mejor sustentada por el texto fuente.
- issue: Valor genérico de ἀνθρώποις
  english_pob_reading: '''men'' in the main text as a representative/generic term'
  chosen_spanish_reading: «los hombres» como término representativo-genérico
  alternative_spanish_readings:
  - «las personas»
  - «los seres humanos»
  rationale: El griego usa un término genérico para la humanidad. En español, «los hombres» conserva el registro representativo tradicional sin negar que el sentido incluye a la humanidad en general.
  doctrine_reference: Accurate generic representation of humanity; preserve source semantics over modernization.
translation_notes:
  revision_awareness: La redacción sigue la corrección reciente del audit trail inglés que prefirió «in her memory» frente a una construcción menos natural. En español se adopta «está en su memoria» para reflejar esa revisión, conservar la ambigüedad del antecedente femenino y evitar una paráfrasis más interpretativa de lo necesario.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεῷ y «los hombres» para ἀνθρώποις, siguiendo el valor genérico del griego.
  - Se usa «virtud» para ἀρετή, en línea con la decisión inglesa y con el uso sapiencial del término.
  - La traducción evita resolver completamente el referente del pronombre femenino en el cuerpo del texto; la nota recoge las opciones documentadas.
  - El orden sintáctico busca ser publicable y claro en español sin perder la forma proverbial del original.
