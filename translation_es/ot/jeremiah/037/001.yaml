  - marker: b
    text: La grafía hebrea refleja Nebuchadrezzar; en español bíblico es común Nabucodonosor.
    reason: lexical_alternative
  revision_rationale: Se ajusta el orden de palabras para un español más natural sin alterar la estructura narrativa, y se sustituye «Jehoiaquim» por «Joaquín», la forma española más reconocible y legible para el nombre יְהוֹיָקִים. Se conservan las dos notas existentes porque siguen siendo pertinentes y están bien ancladas en el texto.
