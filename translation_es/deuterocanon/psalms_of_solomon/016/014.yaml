translation:
  language: es
  text: Si un alma es reprendida en la mano de su destrucción[a], tu prueba está en su carne y en la pobreza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si una vida es reprendida en el poder de su ruina». El griego de esta cláusula es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλέγχηται
  english_pob_choice: is rebuked / is reproved
  chosen_spanish: es reprendida
  alternatives_spanish:
  - es reprobada
  - es convicta
  - es expuesta
  lexicon: BDAG
  rationale: Reprender conserva la fuerza correctiva de ἐλέγχω sin volverlo excesivamente judicial. En este contexto poético, “reprendida” mantiene el matiz de corrección y preserva la ambigüedad del texto.
- source_word: ψυχήν
  english_pob_choice: a soul
  chosen_spanish: un alma
  alternatives_spanish:
  - una vida
  - una persona
  lexicon: BDAG
  rationale: “Alma” sigue de cerca ψυχή y encaja con el lenguaje poético de la línea. Se conserva la alternativa semántica “vida” en caso de lectura más antropológica, pero el texto español principal mantiene la correspondencia más directa.
- source_word: ἐν χειρὶ
  english_pob_choice: by the hand of / in the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - por la mano de
  - en el poder de
  - por medio de
  lexicon: BDAG
  rationale: La imagen de “mano” se conserva de forma visible porque el griego tiene una construcción idiomática con valor de agencia o control. Aunque “por medio de” aclara el sentido, “en la mano de” guarda mejor la metáfora del original.
- source_word: ἀπωλίας
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: “Destrucción” es el equivalente más directo de ἀπώλεια y mantiene el tono severo del verso. “Ruina” y “perdición” quedan como alternativas posibles, pero “destrucción” evita introducir una interpretación más teológica que el griego no exige.
- source_word: δοκιμασία
  english_pob_choice: testing
  chosen_spanish: prueba
  alternatives_spanish:
  - testing
  - examen
  - probanza
  lexicon: BDAG
  rationale: “Prueba” comunica en español el sentido de δοκιμασία como proceso de comprobación o evaluación. Es natural y fiel, y conserva el valor de discernimiento que tiene el término griego.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: BDAG
  rationale: Se mantiene “carne” para respetar el valor literal del término en un contexto contrastado con pobreza material. “Cuerpo” suavizaría la imagen y “naturaleza humana” introduciría una abstracción que el texto no pide.
- source_word: πενίᾳς
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - necesidad
  - carencia
  - miseria
  lexicon: LSJ
  rationale: Aunque la forma transmitida es irregular, el sentido es claramente de carencia material. “Pobreza” es la opción más clara y sobria en español.
theological_decisions:
- issue: Cómo reflejar la frase difícil ἐν χειρὶ ἀπωλίας αὐτοῦ
  english_pob_reading: Retained a relatively literal rendering of the awkward phrase to preserve source-level uncertainty.
  chosen_spanish_reading: 'Se conserva una traducción relativamente literal: “en la mano de su destrucción”, sin suavizar del todo la dificultad.'
  alternative_spanish_readings:
  - en el poder de su ruina
  - por medio de su ruina
  - a manos de su destrucción
  rationale: El griego es sintácticamente difícil y no conviene resolver de forma demasiado segura una relación que el testimonio no aclara plenamente. Mantener “en la mano de su destrucción” deja visible la ambigüedad heredada del original y evita imponer una paráfrasis interpretativa.
  doctrine_reference: Principio de fidelidad textual y preservación de incertidumbre exegética
translation_notes:
  revision_awareness: La redacción sigue la última revisión que volvió a acercar ἐλέγχηται a un verbo de reprensión y mantuvo δοκιμασία y πενίᾳς en un registro más formal. Frente a esa pauta, el español conserva la fuerza correctiva de ἐλέγχηται, la imagen de “mano”, y la literalidad básica de las dos cláusulas, sin borrar la dificultad sintáctica documentada en el audit trail.
  spanish_consistency_notes:
  - Se usa “Yahvé” en el corpus general cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se mantiene “carne” para σάρξ conforme al criterio del proyecto.
  - “Pobreza” traduce πενίᾳς de modo claro y sobrio, sin cargarlo con matices de ascetismo.
  - La nota al pie marca la alternativa principal ya documentada por el audit trail y no introduce variantes ajenas al texto fuente.
