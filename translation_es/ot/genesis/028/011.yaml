    text: Hebrew 'the place' on first mention; rendered 'a certain place' for natural English while preserving that the location is narratively significant.
    reason: lexical_alternative
  - marker: b
    text: Or 'He took some of the stones of the place.' The Hebrew expression can be understood as partitive from a plural noun, though the context is commonly taken to refer to a single stone used as a headrest.
    reason: alternative_reading
  - marker: c
    text: '''Under his head'' renders a Hebrew term referring to the place of the head or a headrest.'
    reason: lexical_alternative
