translation:
  language: es
  text: Adquirí esclavos y esclavas, y tuve esclavos nacidos en casa[a]; también tuve grandes manadas de ganado y rebaños[b], más que todos los que fueron antes de mí en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hijos de la casa», refiriéndose a personas nacidas dentro del hogar; en este contexto, probablemente esclavos del hogar nacidos allí.
    reason: cultural_note
  - marker: b
    text: O «ganado… en abundancia»; el hebreo usa términos colectivos para las posesiones animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִיתִי
  english_pob_choice: I acquired
  chosen_spanish: Compré
  alternatives_spanish:
  - adquirí
  - obtuvé
  lexicon: HALOT
  rationale: El hebreo קנה puede significar adquirir o comprar. En este contexto de inventario de posesiones, «compré» es natural en español y comunica la adquisición sin perder el matiz de obtención de bienes.
- source_word: עֲבָדִים
  english_pob_choice: male slaves
  chosen_spanish: esclavos varones
  alternatives_spanish:
  - esclavos
  - siervos varones
  - criados
  lexicon: HALOT
  rationale: La pareja con שְׁפָחוֹת pide conservar el contraste de sexo y de condición social. «Esclavos varones» preserva la fuerza léxica de עבדים y evita suavizarla a «siervos».
- source_word: שְׁפָחוֹת
  english_pob_choice: female slaves
  chosen_spanish: esclavas
  alternatives_spanish:
  - siervas
  - criada(s)
  - esclavas mujeres
  lexicon: HALOT
  rationale: El término designa esclavas o sirvientas esclavizadas; en español «esclavas» es el equivalente más directo y mantiene la pareja con «esclavos varones».
- source_word: וּבְנֵי בַיִת
  english_pob_choice: homeborn slaves
  chosen_spanish: esclavos nacidos en casa
  alternatives_spanish:
  - nacidos en la casa
  - miembros de la casa
  - siervos nacidos en mi casa
  lexicon: HALOT
  rationale: La expresión literal «hijos de la casa» es un modismo para los nacidos dentro del hogar. En este contexto, como en la traducción inglesa auditada, la referencia probable es a esclavos del hogar nacidos allí; por eso «esclavos nacidos en casa» conserva el sentido contextual sin volverlo vago.
- source_word: הָיָה לִי
  english_pob_choice: were mine
  chosen_spanish: tuve
  alternatives_spanish:
  - eran míos
  - me pertenecían
  lexicon: HALOT
  rationale: La fórmula posesiva hebrea se expresa de manera natural en español con «tuve» cuando el pasaje enumera bienes y dependientes. Esto preserva el valor de posesión sin sonar forzado.
- source_word: מִקְנֶה
  english_pob_choice: herds
  chosen_spanish: rebaños
  alternatives_spanish:
  - ganado
  - livestock
  - posesiones de ganado
  lexicon: HALOT
  rationale: מִקְנֶה es un término colectivo para ganado/posesiones animales. «Rebaños» funciona bien en español dentro de la lista y evita un tecnicismo innecesario; el contexto inmediato ya aclara que incluye vacas y ovejas.
- source_word: בָקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - vacas
  - bovinos
  - reses
  lexicon: HALOT
  rationale: En español, dentro de un inventario pastoral, «ganado» capta el colectivo bovino de בָקָר con naturalidad. Se mantiene la distinción del siguiente término con «ovejas».
- source_word: צֹאן
  english_pob_choice: flocks
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaños
  - pequeño ganado
  - ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor, comúnmente ovejas y cabras. Dado que el español ya usa «rebaños» para el término colectivo anterior, aquí se especifica «ovejas» para dar fluidez y evitar una redundancia opaca.
- source_word: הַרְבֵּה
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - muchos
  - abundantes
  - en gran cantidad
  lexicon: HALOT
  rationale: El adjetivo/adverbio hebreo expresa abundancia. «Grandes» en «grandes rebaños» reproduce bien el valor cuantitativo en español idiomático.
- source_word: מִכֹּל שֶׁהָיוּ לְפָנַי
  english_pob_choice: more than all who were before me
  chosen_spanish: más que todos los que me precedieron
  alternatives_spanish:
  - más que cualquiera que me precedió
  - más que todos mis predecesores
  lexicon: HALOT
  rationale: La comparación hebrea habla de superioridad respecto de los antecesores. «Me precedieron» sigue el orden del texto y es plenamente natural en español.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español.
translation_notes:
  revision_awareness: La versión inglesa POB ya había resuelto el pasaje con alta concordancia y sin cambios sustanciales en la revisión más reciente. La principal cuestión para el español era cómo expresar de forma fiel y publicable la fuerza social de עבדים/שְׁפָחוֹת y el modismo וּבְנֵי בַיִת, además de reproducir la serie de posesiones animales con naturalidad sin perder el carácter colectivo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «esclavos» para עבדים y no se suaviza a «siervos», en coherencia con la decisión léxica del POB en inglés.
  - «Nacidos en casa» conserva la tensión entre el sentido literal del modismo («hijos de la casa») y su referencia contextual a dependientes/esclavos del hogar.
  - Se usa «rebaños de ganado y de ovejas» para reflejar la acumulación de bienes animales; la nota permite la alternativa colectiva «ganado ... en abundancia».
  - No se introduce «Cristo», «SEÑOR» ni otras convenciones no pertinentes al versículo.
