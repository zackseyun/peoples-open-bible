translation:
  language: es
  text: Bendito sea Yahvé desde Sion[a], que habita en Jerusalén. ¡Aleluya!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¡Alaben a Yah!». La expresión se transmite tradicionalmente en español como «Aleluya».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Que sea bendito
  lexicon: HALOT
  rationale: La forma participial pasiva en fórmulas de bendición/doxología se expresa de manera natural en español con "Bendito sea", que conserva el valor benedictorio y litúrgico mejor que un adjetivo aislado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton. En español, el nombre revelado se rinde como "Yahvé" para preservar el nombre propio divino en vez de sustituirlo por un título.
- source_word: מִצִּיּוֹן
  english_pob_choice: from Zion
  chosen_spanish: desde Sion
  alternatives_spanish:
  - de Sion
  - desde Jerusalén
  lexicon: HALOT
  rationale: La preposición מִן indica procedencia. "Desde Sion" comunica con naturalidad el punto de origen del acto de bendición/alabanza sin perder la fuerza local del hebreo.
- source_word: שֹׁכֵן
  english_pob_choice: who dwells
  chosen_spanish: que habita
  alternatives_spanish:
  - que mora
  - el que habita
  - que reside
  lexicon: HALOT
  rationale: El participio qal de שכן funciona de modo descriptivo respecto de Yahvé. "Que habita" conserva el sentido básico de residir/dwelling sin introducir la imagen de entronización que no está explicitada por el lexema.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Hallelujah
  chosen_spanish: ¡Aleluya!
  alternatives_spanish:
  - ¡Alaben a Yah!
  - ¡Alaben a Yahvé!
  lexicon: HALOT
  rationale: La exclamación litúrgica tradicional en español es "Aleluya", que preserva la forma hebrea y el tono doxológico. El sentido verbal subyacente se mantiene sin forzar una paráfrasis.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo contiene el Tetragrámaton. La política del proyecto evita la sustitución por un título y mantiene el nombre propio divino en la forma española "Yahvé".
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de הַלְלוּ יָהּ
  english_pob_reading: Hallelujah
  chosen_spanish_reading: ¡Aleluya!
  alternative_spanish_readings:
  - ¡Alaben a Yah!
  - ¡Alaben al Señor!
  rationale: La forma hebrea es una fórmula de alabanza ya asentada en español. Mantener "Aleluya" preserva la cadencia litúrgica y la relación con el hebreo, sin ocultar el nombre abreviado de Dios.
  doctrine_reference: HALOT on הלל + יהּ
translation_notes:
  revision_awareness: 'La redacción sigue la línea revisada del POB en inglés que eliminó el innecesario «he who» y dejó simplemente «who dwells in Jerusalem». Aquí se refleja con una cláusula relativa breve y natural: «que habita en Jerusalén». También se conserva la decisión doctrinal de traducir el Tetragrámaton con el nombre propio «Yahvé», no con una sustitución reverencial.'
  spanish_consistency_notes:
  - Se mantiene la mayúscula reverencial de «Yahvé» como nombre propio divino.
  - «Sion» se escribe sin tilde, conforme al uso bíblico corriente en español.
  - La exclamación final «¡Aleluya!» conserva el tono doxológico del cierre hebreo.
  - La nota al pie en [a] explica el sentido literal de la fórmula sin sustituirla en el texto principal.
