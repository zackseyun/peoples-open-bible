base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/023/029.yaml
  text: They will deal with you in hatred[a], and they will take all your wealth, and leave you naked and bare; and the nakedness of your prostitutions will be uncovered[c][b], your lewdness and your acts of prostitution.
