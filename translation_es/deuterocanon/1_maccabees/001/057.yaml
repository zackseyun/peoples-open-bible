translation:
  language: es
  text: Y dondequiera que se hallaba con alguien un[a] libro del pacto, o si alguien estaba de acuerdo con la ley[b], el decreto del rey lo condenaba a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un documento del pacto» o «un libro de la ley/pacto». El griego dice literalmente «un libro del pacto».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, cualquiera que se alineara con la ley o permaneciera leal a ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: wherever
  chosen_spanish: en dondequiera que
  alternatives_spanish:
  - dondequiera que
  - en cualquier lugar donde
  lexicon: LSJ
  rationale: Expresa el valor distributivo e indefinido del relativo sin perder naturalidad en español.
- source_word: εὑρίσκετο
  english_pob_choice: was found
  chosen_spanish: se hallaba
  alternatives_spanish:
  - era hallado
  - se encontraba
  lexicon: LSJ
  rationale: La forma imperfecta pasiva pide un valor continuo o habitual; 'se hallaba' es idiomático y conserva el matiz pasivo sin sonar rígido.
- source_word: παρὰ τινι
  english_pob_choice: with anyone
  chosen_spanish: con alguien
  alternatives_spanish:
  - en poder de alguien
  - en posesión de alguien
  lexicon: LSJ
  rationale: La preposición con dativo aquí sugiere cercanía o custodia; 'con alguien' preserva la vaguedad inglesa sin fijar un sentido jurídico no explicitado.
- source_word: βιβλίον διαθήκης
  english_pob_choice: a book of the covenant
  chosen_spanish: un libro del pacto
  alternatives_spanish:
  - un libro de la alianza
  - un documento del pacto
  - un libro de la ley/pacto
  lexicon: LSJ
  rationale: '''διαθήκη'' se rinde mejor aquí como ''pacto'' por el uso bíblico y por la resonancia del término; ''libro del pacto'' mantiene la literalidad y el vínculo con el texto sagrado.'
- source_word: συνευδόκει
  english_pob_choice: consented
  chosen_spanish: consentía con
  alternatives_spanish:
  - aprobaba
  - se alineaba con
  - se mostraba favorable a
  lexicon: BDAG
  rationale: El verbo implica aprobación/adhesión activa; 'consentía con' comunica alineación con la ley en un contexto coercitivo, sin volverlo demasiado explicativo.
- source_word: τῷ νόμῳ
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley judía
  lexicon: LSJ
  rationale: Se mantiene el término simple 'la ley', dejando que el contexto de 1 Macabeos precise que se trata de la ley ancestral de Israel, sin añadir un glosa interpretativa.
- source_word: τὸ σύγκριμα τοῦ βασιλέως
  english_pob_choice: the king’s decree
  chosen_spanish: el decreto del rey
  alternatives_spanish:
  - la sentencia del rey
  - la orden del rey
  - la resolución del rey
  lexicon: LSJ
  rationale: '''σύγκριμα'' apunta a una resolución u आदेश oficial con fuerza judicial; ''decreto'' es el equivalente español más natural y formal.'
- source_word: ἐθάνατου αὐτόν
  english_pob_choice: put him to death
  chosen_spanish: lo hacía morir
  alternatives_spanish:
  - lo mataba
  - lo ejecutaba
  - lo hacía morir bajo pena capital
  lexicon: LSJ
  rationale: La construcción verbal refleja muerte impuesta por autoridad. 'Lo hacía morir' preserva el tono formal y evita introducir una especificación legal no presente en el griego.
theological_decisions:
- issue: Sentido de 'la ley' (τῷ νόμῳ)
  english_pob_reading: the Jewish law/Torah is intended
  chosen_spanish_reading: la ley de Israel queda implícita en el contexto
  alternative_spanish_readings:
  - la Ley de Moisés
  - la ley judía
  rationale: En 1 Macabeos 1 el referente es claramente la ley ancestral de Israel, pero el griego no la expande aquí. La traducción conserva 'la ley' para no sobreinterpretar, dejando que el contexto haga la identificación.
  doctrine_reference: Principio de primacía del texto original; evitar glosas doctrinales no formuladas explícitamente.
translation_notes:
  revision_awareness: Se refleja la corrección del inglés auditado que cambió la coordinación a 'or if anyone consented to the law'; en español se reproduce con 'o si alguno consentía con la ley'. También se mantiene la literalidad de 'book of the covenant' sin suavizarla a una expresión más general.
  spanish_consistency_notes:
  - Se preserva 'libro del pacto' para mantener coherencia con el lenguaje bíblico del pacto sin sustituirlo por 'testamento'.
  - '''ley'' se usa en minúscula por consistencia con el audit trail inglés y para evitar una capitalización interpretativa.'
  - '''lo hacía morir'' conserva el matiz judicial del decreto real mejor que ''lo mataba'' en un contexto de persecución estatal.'
