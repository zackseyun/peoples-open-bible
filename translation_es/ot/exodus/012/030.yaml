    text: «Todo Egipto» usa el nombre del país de manera colectiva para sus habitantes.
    reason: cultural_note
  - marker: b
    text: 'O, más literalmente: «no había una casa en que no hubiera una persona muerta».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal casi intacto porque es fiel y natural en español. La revisión corrige el aparato de notas para alinearlo con la evidencia auditada: la nota cultural permanece con «Egipto», y la nota léxica alternativa se traslada a la cláusula final, donde corresponde según el POB inglés.'
