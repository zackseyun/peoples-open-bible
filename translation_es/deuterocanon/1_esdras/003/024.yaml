translation:
  language: es
  text: Y comenzó a hablar el segundo, el que había hablado acerca de la fuerza[a] del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poder»; el griego ἰσχύς puede traducirse como «fuerza», «mientras» o «poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - inició
  lexicon: BDAG
  rationale: El aoristo medio de ἄρχομαι introduce el inicio de la acción; 'comenzó' es natural en español narrativo y mantiene la secuencia temporal.
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - hablar
  - decir
  lexicon: BDAG
  rationale: En este contexto narrativo, λαλέω refiere a la acción de hablar; 'hablar' suena claro y digno en español moderno.
- source_word: ὁ δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo hombre
  - el segundo de ellos
  lexicon: BDAG
  rationale: El ordinal con artículo identifica al siguiente participante en la secuencia de hablantes; 'el segundo' es conciso y transparente.
- source_word: ὁ εἴπας
  english_pob_choice: the one who had spoken
  chosen_spanish: el que había hablado
  alternatives_spanish:
  - el que habló
  - quien había hablado
  lexicon: BDAG
  rationale: El participio aoristo articular remite al hablante ya mencionado y a su intervención previa; el pluscuamperfecto expresa bien esa anterioridad relativa.
- source_word: περὶ
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: BDAG
  rationale: Con genitivo, περί marca el tema tratado; 'acerca de' es natural y conserva el valor topical sin sonar demasiado coloquial.
- source_word: ἰσχύος
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  - fuerza
  lexicon: BDAG
  rationale: ἰσχύς puede rendirse como 'fuerza', 'mando/poder' o 'fortaleza'. Se eligió 'fuerza' porque es un equivalente directo y suficientemente amplio en español; la nota preserva la alternativa 'poder' dada por el audit trail.
- source_word: τοῦ βασιλέως
  english_pob_choice: of the king
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey
  - del monarca
  lexicon: BDAG
  rationale: βασιλεύς se refiere aquí al rey en contexto cortesano; 'rey' es la equivalencia precisa y natural en español.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. No se introdujeron cambios de sentido respecto del audit trail inglés; solo se ajustó la puntuación y la anclaje de la nota.
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo simple del griego: inicio de acción + hablante + relativización del hablante previo.'
  - Se usa 'rey' de forma consistente con βασιλεύς en contexto monárquico/cortesano.
  - La nota lexical conserva la tensión semántica de ἰσχύς sin reemplazarla por una glosa doctrinal.
