translation:
  language: es
  text: 'Él dijo[a]: «Paz. He venido a sacrificar a Yahvé. Conságrense, y vengan conmigo al sacrificio». Y consagró a Isaí y a sus hijos, y los invitó al sacrificio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En paz» / «Todo está bien». El hebreo dice simplemente «Paz», una garantía de que la llegada de Samuel no es hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - En paz
  - Todo está bien
  lexicon: HALOT
  rationale: El sustantivo desnudo funciona aquí como respuesta a la pregunta del v. 4 sobre si su llegada era pacífica. «Paz» conserva la brevedad del hebreo y la fuerza idiomática de una garantía de intención no hostil.
- source_word: לִזְבֹּחַ לַיהוָה
  english_pob_choice: to sacrifice to Yahweh
  chosen_spanish: sacrificar a Yahvé
  alternatives_spanish:
  - ofrecer un sacrificio a Yahvé
  - sacrificar para Yahvé
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. «Sacrificar a Yahvé» es natural en español y mantiene el valor cultual directo del verbo sin expandir innecesariamente la frase.
- source_word: בָּאתִי
  english_pob_choice: I have come
  chosen_spanish: He venido
  alternatives_spanish:
  - Vine
  lexicon: HALOT
  rationale: El perfecto explica la acción presente de Samuel en el diálogo. El pretérito perfecto compuesto suena adecuado en español para esta justificación inmediata.
- source_word: הִתְקַדְּשׁוּ
  english_pob_choice: Consecrate yourselves
  chosen_spanish: Consagraos
  alternatives_spanish:
  - Santificaos
  - Purificaos
  lexicon: HALOT
  rationale: El hitpael de קדשׁ aquí pide preparación ritual para participar en el sacrificio. «Consagraos» conserva el sentido de apartarse para uso santo y evita restringirlo solo a limpieza ceremonial.
- source_word: וּבָאתֶם אִתִּי בַּזָּבַח
  english_pob_choice: and come with me to the sacrifice
  chosen_spanish: y venid conmigo al sacrificio
  alternatives_spanish:
  - y vendréis conmigo al sacrificio
  - y asistid conmigo al sacrificio
  lexicon: HALOT
  rationale: La secuencia funciona como invitación/instrucción tras la preparación ritual. «Venid conmigo al sacrificio» mantiene el movimiento y el carácter inclusivo de la invitación.
- source_word: וַיְקַדֵּשׁ
  english_pob_choice: he consecrated
  chosen_spanish: consagró
  alternatives_spanish:
  - santificó
  - hizo santo
  lexicon: HALOT
  rationale: El piel de קדשׁ indica la acción de apartar ritualmente a Isaí y a sus hijos para la ocasión sacrificial. «Consagró» preserva el matiz cultual con buena idiomaticidad en español.
- source_word: וַיִּקְרָא לָהֶם לַזָּבַח
  english_pob_choice: invited them to the sacrifice
  chosen_spanish: los llamó al sacrificio
  alternatives_spanish:
  - los invitó al sacrificio
  - los convocó al sacrificio
  lexicon: HALOT
  rationale: קרא + ל puede significar llamar, invitar o convocar. Aquí se conserva la relación verbal estrecha del hebreo con «los llamó», sin perder el contexto de inclusión cultual.
- source_word: יִשַׁי
  english_pob_choice: Jesse
  chosen_spanish: Isaí
  alternatives_spanish:
  - Jesse
  lexicon: convención bíblica española
  rationale: Se usa la forma española habitual del nombre propio, manteniendo reconocibilidad para lectores bíblicos en español.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  lexicon: HALOT
  rationale: El hebreo especifica «hijos/varones» por el contexto narrativo de la presentación de los hijos de Isaí. «Hijos» es natural en español y en este pasaje no pierde la referencia contextual.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la política del proyecto, se preserva el nombre propio divino en español como «Yahvé», en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y su revisión más reciente sin cambios; no se detectaron ajustes necesarios respecto del sentido original ni de las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה conforme a la política del proyecto.
  - Se eligió «consagraos/consagró» para קדשׁ, preservando el matiz ritual en un registro natural de español.
  - Se conservó la brevedad idiomática de שָׁלוֹם con «Paz», y se anotó la alternativa interpretativa en nota.
  - 'Los nombres propios se adaptaron a la forma bíblica española estándar cuando corresponde: «Isaí».'
