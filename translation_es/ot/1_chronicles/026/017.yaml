  to: Al oriente, seis levitas; al norte, cuatro por día; al sur, cuatro por día; y en los almacenes[a], de dos en dos.
  rationale: Se reemplaza «hacia» por «al» para reflejar mejor una asignación locativa por lado, no movimiento. Se cambia «dos y dos» por «de dos en dos» para expresar de manera idiomática y clara el distributivo hebreo. La nota se mantiene, pero se ancla correctamente en «almacenes», que es donde surge la alternativa léxica.
