translation:
  language: es
  text: 'Solo[a], no debe multiplicar caballos para sí, ni hacer volver al pueblo a Egipto[b], para multiplicar caballos; porque Yahvé les ha dicho[c]: «No deben volver jamás por este camino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «adquirir muchos caballos para sí». El verbo hebreo también puede expresar «hacer muchos» o «aumentar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «traer de vuelta al pueblo a Egipto». El verbo está en forma causativa: el rey tiene prohibido provocar ese regreso.'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «No añadirán a volver por este camino otra vez», un modismo que significa «no deben volver jamás por este camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  - Solo que
  lexicon: HALOT
  rationale: 'El hebreo introduce una restricción: no se trata de una prohibición aislada sino de una limitación precisa. ''Solo'' conserva ese valor restrictivo de forma natural en español.'
- source_word: יַרְבֶּה לּוֹ סוּסִים
  english_pob_choice: must not multiply horses for himself
  chosen_spanish: no debe multiplicar caballos para sí
  alternatives_spanish:
  - no debe adquirir muchos caballos para sí
  - no debe aumentar caballos para sí
  lexicon: HALOT
  rationale: Se mantiene el verbo de aumento/incremento del hebreo, junto con el matiz reflexivo de לּוֹ. 'Caballos' reproduce el sustantivo de manera directa y clara.
- source_word: וְלֹא יָשִׁיב אֶת הָעָם מִצְרַיְמָה
  english_pob_choice: nor cause the people to return to Egypt
  chosen_spanish: ni hacer volver al pueblo a Egipto
  alternatives_spanish:
  - ni causar que el pueblo vuelva a Egipto
  - ni traer de vuelta al pueblo a Egipto
  lexicon: HALOT
  rationale: El hiphil de שוב es causativo; 'hacer volver' conserva esa causatividad en español. 'El pueblo' mantiene el sujeto colectivo del hebreo sin diluirlo.
- source_word: לְמַעַן הַרְבּוֹת סוּס
  english_pob_choice: in order to multiply horses
  chosen_spanish: para multiplicar caballos
  alternatives_spanish:
  - a fin de multiplicar caballos
  - para aumentar caballos
  lexicon: HALOT
  rationale: La frase expresa propósito y repite el mismo campo léxico de aumentar/multiplicar, lo que preserva la conexión interna del verso.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Aunque el audit trail inglés usa 'the LORD', el proyecto español exige 'Yahvé' para יהוה. Esta decisión preserva el nombre propio del pacto y la transparencia frente al texto hebreo.
- source_word: לֹא תֹסִפוּן לָשׁוּב... עוֹד
  english_pob_choice: You must never return again
  chosen_spanish: No volverán por este camino otra vez
  alternatives_spanish:
  - No añadirán a volver por este camino otra vez
  - No seguirán volviendo por este camino
  lexicon: HALOT
  rationale: Se traduce el idiomático 'no añadir a volver' con un equivalente natural en español que conserva el sentido de prohibición absoluta de retorno repetido. 'Otra vez' reproduce עוֹד.
- source_word: בַּדֶּרֶךְ הַזֶּה
  english_pob_choice: by this way
  chosen_spanish: por este camino
  alternatives_spanish:
  - por esta vía
  - por este camino
  lexicon: HALOT
  rationale: '''Camino'' es el equivalente más natural de דֶּרֶךְ en este contexto; ''por'' refleja el valor preposicional de la expresión y sugiere la ruta tomada.'
theological_decisions:
- issue: Nombre divino יהוה en una frase introducida por 'the LORD has said to you' en inglés
  english_pob_reading: the LORD has said to you
  chosen_spanish_reading: Yahvé ha dicho a ustedes
  alternative_spanish_readings:
  - Yahvé les ha dicho
  - el SEÑOR les ha dicho
  rationale: Aunque el inglés auditado usa 'the LORD', el mandato del proyecto es representar explícitamente יהוה como 'Yahvé'. Se conserva la autoridad del hablante divino y la relación de pacto con el plural de segunda persona.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Fuerza idiomática de לֹא תֹסִפוּן לָשׁוּב
  english_pob_reading: You must never return again
  chosen_spanish_reading: No volverán por este camino otra vez
  alternative_spanish_readings:
  - No deberán volver otra vez por este camino
  - No seguirán regresando por este camino
  rationale: La construcción hebrea no es meramente temporal sino enfática y prohibitiva. En español, la fórmula seleccionada comunica la prohibición total de retorno sin perder la naturalidad.
  doctrine_reference: 'Nota de traducción: preservación del valor idiomático del hebreo'
- issue: Destino de 'the people' / הָעָם
  english_pob_reading: the people
  chosen_spanish_reading: el pueblo
  alternative_spanish_readings:
  - la gente
  - la población
  rationale: '''El pueblo'' reproduce el sustantivo colectivo del hebreo y encaja con el sujeto histórico de Israel en este mandato.'
  doctrine_reference: Uso coherente del sustantivo colectivo bíblico
translation_notes:
  revision_awareness: 'Se siguió el alineamiento general del audit trail inglés, pero se ajustó la terminología teológica al estándar español del proyecto: יהוה se traduce como ''Yahvé''. También se conservó la fuerza causativa del hebreo en ''hacer volver'' y el giro idiomático final en una forma natural para español.'
  spanish_consistency_notes:
  - '''Yahvé'' se usa de forma consistente para יהוה en el texto principal.'
  - Se mantiene el paralelismo léxico entre 'multiplicar caballos' y 'para multiplicar caballos'.
  - '''Pueblo'' conserva el referente colectivo de הָעָם sin generalización.'
  - La frase final evita calco rígido y conserva el sentido prohibitivo absoluto del hebreo.
