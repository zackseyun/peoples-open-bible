  source_alignment_summary: El borrador conserva bien la estructura genealógica, el oficio sacerdotal, el origen desde Jerusalén y el sentido idiomático de ἐκάθισεν ἐν Μωδεείν. Sin embargo, combina de forma problemática «se levantó» para ἀνέστη con «que vino de Jerusalén» para ἀπὸ Ἱερουσαλήμ, creando una sintaxis ambigua en español donde parece que el relativo modifica solo «Joarib» o «sacerdote», y además no refleja con claridad la decisión auditada en inglés de expresar el movimiento principal como «came from Jerusalem».
  spanish_quality_summary: El español es mayormente claro y digno, pero la oración suena algo trabada por la secuencia «sacerdote de los hijos de Joarib, que vino de Jerusalén». En español bíblico-natural conviene integrar mejor el movimiento en la cláusula principal. También el anclaje de la nota debe ir sobre «Modeín» o la frase verbal relevante, no solo al final de toda la oración si se busca precisión editorial.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. Los nombres propios, «sacerdote», y el modismo residencial están bien encaminados. La principal cuestión es lexical/sintáctica: al seguir el auditrail inglés, conviene preferir una formulación como «vino de Jerusalén y se estableció/asentó en Modeín» en vez de mantener simultáneamente «se levantó» como verbo principal.'
  issues:
  - severity: medium
    issue: Sintaxis ambigua con «que vino de Jerusalén»
    rationale: El relativo puede parecer adjunto a «Joarib» o a «sacerdote», no inequívocamente a Matatías. El griego presenta una secuencia narrativa principal, no una relativa ambigua.
  - severity: medium
    issue: Desajuste con la revisión auditada de ἀνέστη + ἀπὸ Ἱερουσαλήμ
    rationale: El auditrail inglés ya resolvió que en este contexto el sentido global se expresa mejor como «came from Jerusalem». Mantener «se levantó» y luego añadir «que vino» duplica funciones y debilita la decisión documentada.
  - severity: low
    issue: Ubicación del marcador de nota poco precisa
    rationale: La nota explica «se asentó/estableció en Modeín» frente al literal «se sentó en Modeín»; conviene anclarla directamente en la frase correspondiente.
  revised_spanish_text: En aquellos días, Matatías, hijo de Juan, hijo de Simeón, sacerdote de los hijos de Joarib, vino de Jerusalén y se asentó en Modeín[a].
  revised_footnotes:
  - marker: a
    text: O «se estableció en Modeín». El griego dice literalmente «se sentó en Modeín», un modismo para residir o establecerse allí.
    reason: lexical_alternative
