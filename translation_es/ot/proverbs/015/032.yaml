revisions:
- from: El que desecha la disciplina desprecia su propia vida[a]; pero el que escucha la reprensión adquiere corazón.
  to: El que ignora la disciplina desprecia a sí mismo; pero el que escucha la reprensión adquiere entendimiento[a].
  rationale: Se corrige נַפְשׁוֹ a «a sí mismo» para reflejar el valor reflexivo del hebreo y del POB inglés; se traslada la metáfora «corazón» a nota y se usa «entendimiento» en el texto principal para expresar el sentido idiomático de לֵּב en español natural; se reubica correctamente el marcador de nota en la palabra comentada; y se ajusta פּוֹרֵעַ a «ignora» por mejor alineación con el audit trail y mayor claridad. No se requiere adjudicación adicional porque la reparación es directa y bien sustentada por la evidencia dada.
