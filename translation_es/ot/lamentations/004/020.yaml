  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría inglés: conserva la imagen idiomática de רוּחַ אַפֵּינוּ, traduce מְשִׁיחַ יְהוָה como título no mesiánico directo, mantiene la captura en las ''fosas'' con nota alternativa, y preserva ''bajo su sombra'' y ''entre las naciones''. La principal desviación está en ''nuestras narices'', que en español suena más físico y menos idiomático que el hebreo/inglés; ''nuestras fosas nasales'' es demasiado técnico, pero ''nuestro aliento vital'' sería una paráfrasis excesiva. La mejor solución es una formulación algo más natural que conserve la imagen: ''El aliento de nuestra vida[a]'' sería demasiado interpretativa; por eso conviene mantener la imagen con una leve reparación estilística usando ''el aliento de nuestras narices'' solo si se acepta su aspereza poética. Aun así, el español actual gana claridad con ''El aliento de nuestras narices'' frente a la decisión léxica documentada actual sin cambiar
    sentido.'
