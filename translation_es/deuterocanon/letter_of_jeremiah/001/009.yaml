revisions:
- from: Y hay ocasiones en que los sacerdotes[a], tomando oro y plata de sus dioses, la gastan en sí mismos.
  to: Y hay ocasiones en que los sacerdotes[a], tomando oro y plata de sus dioses, lo gastan para sí mismos.
  rationale: Se corrige la concordancia pronominal («lo gastan») y se reemplaza la expresión poco natural «en sí mismos» por «para sí mismos», en línea con el griego εἰς ἑαυτοὺς, con la decisión léxica ya documentada y con un español claro y fiel. La nota se conserva con una leve normalización tipográfica.
