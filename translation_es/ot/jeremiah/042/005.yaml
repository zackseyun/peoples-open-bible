  rationale: Se corrige el valor de בָּנוּ para reflejar la fuerza jurídica contextual del juramento («contra nosotros»), en línea con la evidencia fuente y el audit trail inglés. También se reordena la nota alternativa para preservar la lectura más literal «entre nosotros» sin perder el sentido principal, y se corrige la literalidad de la nota [b], que había invertido los participantes del verbo «enviar».
