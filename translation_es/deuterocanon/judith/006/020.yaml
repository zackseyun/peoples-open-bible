translation:
  language: es
  text: Y animaron[a] a Ajior, y lo alabaron mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consolaron», «instaron» o «exhortaron» para «animaron» (παρεκάλεσαν), según cuán ampliamente se entienda el verbo en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλεσαν
  english_pob_choice: encouraged
  chosen_spanish: exhortaron
  alternatives_spanish:
  - animaron
  - confortaron
  - instaron
  lexicon: BDAG
  rationale: 'El verbo παρακαλέω tiene un rango amplio: animar, consolar, exhortar o instar. En español, «exhortaron» conserva bien la fuerza activa y relacional del contexto, sin forzar un matiz de mero consuelo que el griego no exige de manera exclusiva.'
- source_word: Ἀχιὼρ
  english_pob_choice: Achior
  chosen_spanish: Ajior
  alternatives_spanish:
  - Achior
  lexicon: Convención onomástica española
  rationale: Se translitera el nombre propio a una forma natural para el español bíblico. «Ajior» refleja mejor la pronunciación adaptada al español, manteniendo la referencia al mismo personaje sin cambiar el nombre.
- source_word: ἐπήνεσαν
  english_pob_choice: praised
  chosen_spanish: alabaron
  alternatives_spanish:
  - elog iaron
  - aprobaron
  lexicon: BDAG
  rationale: El verbo σημαίνει alabar o encomiar. «Alabaron» es el equivalente más natural y directo en español para expresar una alabanza explícita dirigida a una persona.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - enormemente
  - excesivamente
  lexicon: LSJ
  rationale: El adverbio intensifica la acción anterior. «Mucho» es idiomático y claro en español, y conserva la intensidad sin sobrecargar el registro.
translation_notes:
  revision_awareness: El texto griego y el contexto de auditoría inglesa están en alto acuerdo; no se detectan revisiones sustantivas aplicadas. La redacción española procura conservar la amplitud semántica de παρακαλέω y la intensidad de σφόδρα sin añadir interpretación extra.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, apto para lectura eclesial.
  - Se evita traducir mecánicamente desde el inglés cuando el español puede expresar mejor la fuerza verbal del griego.
