  source_alignment_summary: 'El borrador español sigue bien el sentido básico del griego y del POB inglés: contrasta la capacidad humana de matar con la incapacidad de revertir la muerte, y conserva la distinción entre πνεῦμα y ψυχή. Sin embargo, «cuando un espíritu ha salido» suena poco natural en español para este contexto; el griego ἐξελθὸν ... πνεῦμα expresa la salida/partida del espíritu o aliento vital, y conviene una formulación más idiomática sin perder la amplitud semántica. Además, «ha sido tomada» para ψυχὴν παραλημφθεῖσαν es fiel, pero «ha sido arrebatada» suena más natural en español bíblico contemporáneo y sigue siendo compatible con el campo semántico de ''taken''.'
