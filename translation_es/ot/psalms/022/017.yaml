revisions:
- from: Porque perros me han rodeado[a]; una compañía de malhechores me ha cercado[b]; como un león están mis manos y mis pies.
  to: Porque perros me han rodeado[a]; una banda de malhechores me ha cercado; como un león están mis manos y mis pies.
  rationale: Se elimina la nota b porque estaba mal anclada y no aportaba una alternativa válida al segmento marcado. Se mejora ligeramente «compañía» a «banda» para mayor naturalidad y fuerza contextual, sin alterar el sentido. Se conserva la cláusula final difícil en el texto principal para respetar la primacía del MT y la decisión teológica documentada, dejando la variante antigua importante en una sola nota bien ubicada.
