translation:
  language: es
  text: Ni puse al nivel de ella ninguna piedra preciosa[a], porque todo el oro, a sus ojos, es poca arena[b], y la plata será tenida por barro delante de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedra de precio incalculable». La expresión griega denota una piedra de valor inestimable.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «poca arena»; el sentido es que el oro tiene un valor insignificante comparado con la sabiduría.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ ὡμοίωσα
  english_pob_choice: Nor did I compare
  chosen_spanish: Tampoco comparé
  alternatives_spanish:
  - Tampoco la equiparé
  - Tampoco la asemejé
  lexicon: LSJ
  rationale: ὁμοιόω expresa comparar o hacer semejante. En español, «comparé» comunica con naturalidad la acción de poner algo al nivel de ella, sin perder el sentido comparativo del griego.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: con ella
  alternatives_spanish:
  - a ella
  - ante ella
  lexicon: Greek grammar
  rationale: El dativo con ὡμοίωσα admite un giro natural en español como «con ella» dentro de la comparación. Conserva la referencia personificada a la Sabiduría sin forzar una sintaxis extraña.
- source_word: λίθον ἀτίμητον
  english_pob_choice: any precious stone
  chosen_spanish: ninguna piedra preciosa
  alternatives_spanish:
  - ninguna piedra de precio incalculable
  - ninguna piedra inestimable
  lexicon: LSJ
  rationale: ἀτίμητος aquí significa de valor incalculable, no «sin valor». «Piedra preciosa» transmite bien la idea en español; el matiz de valor extraordinario queda respaldado por la nota.
- source_word: ὁ πᾶς χρυσός
  english_pob_choice: all gold
  chosen_spanish: todo el oro
  alternatives_spanish:
  - todo oro
  - la totalidad del oro
  lexicon: LSJ
  rationale: La construcción totalizadora se vierte naturalmente como «todo el oro», conservando la amplitud del contraste.
- source_word: ἐν ὄψει αὐτῆς
  english_pob_choice: in her sight
  chosen_spanish: a sus ojos
  alternatives_spanish:
  - en su presencia
  - delante de ella
  lexicon: LSJ
  rationale: «A sus ojos» mantiene la imagen de evaluación/perspectiva y suena idiomático en español, sin perder la idea de que el valor se mide ante la Sabiduría personificada.
- source_word: ψάμμος ὀλίγη
  english_pob_choice: a little sand
  chosen_spanish: un poco de arena
  alternatives_spanish:
  - un poco de arena fina
  - mera arena
  lexicon: LSJ
  rationale: El griego dice literalmente «poca arena». En español, «un poco de arena» conserva la imagen de insignificancia sin sonar arcaico o rígido.
- source_word: λογισθήσεται
  english_pob_choice: will be regarded as
  chosen_spanish: será tenida por
  alternatives_spanish:
  - será considerada como
  - será estimada como
  lexicon: LSJ
  rationale: El futuro pasivo de λογίζομαι implica ser contado o estimado. «Será tenida por» reproduce bien el valor evaluativo en español bíblico claro y digno.
- source_word: πηλός
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - lodo
  lexicon: LSJ
  rationale: Aunque «clay» podría ser «arcilla», en esta comparación con plata «barro» comunica mejor la degradación de valor y mantiene un contraste más vivo en español.
- source_word: ἐναντίον αὐτῆς
  english_pob_choice: before her
  chosen_spanish: delante de ella
  alternatives_spanish:
  - ante ella
  - en su presencia
  lexicon: LSJ
  rationale: «Delante de ella» conserva la imagen espacial y la personificación femenina de la Sabiduría, como en el inglés POB.
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: Retain feminine pronouns ('her') throughout
  chosen_spanish_reading: Conservar la referencia femenina («ella»)
  alternative_spanish_readings:
  - Sustituir por «la sabiduría» repetidamente
  - Neutralizar con «ello»
  rationale: El griego usa formas femeninas para la Sabiduría en este contexto. Mantener «ella» preserva la personificación literaria y evita borrar una tensión retórica del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por eso este borrador sigue de cerca el audit trail inglés, manteniendo las equivalencias semánticas y la personificación femenina sin introducir ampliaciones doctrinales.
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» implícita en la personificación femenina del contexto, sin reemplazarla por un término más abstracto.
  - «Piedra preciosa» y «barro» se usan con valor comparativo, no como términos técnicos de mineralogía.
  - La sintaxis busca ser publicable en español moderno, pero conserva el paralelismo y la imagen espacial del griego.
