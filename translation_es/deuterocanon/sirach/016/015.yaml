translation:
  language: es
  text: Yahvé endureció el corazón de Faraón[a], aunque él no lo conocía, porque sus obras están reveladas bajo el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No digas: “Me ocultaré del Señor”». El testimonio griego aquí difiere sustancialmente de la línea hebrea conservada, lo que sugiere una forma textual o una alineación de versículo distinta.'
    reason: textual_variant
lexical_decisions:
- source_word: μὴ εἴπῃς
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No vayas a decir
  - No digas que
  lexicon: NA/Swete Greek parallel
  rationale: El imperativo negativo comunica bien la prohibición directa del griego. «No digas» es natural en español y conserva la forma exhortativa sin añadir contenido.
- source_word: Ἀπὸ Κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - de Dios
  lexicon: Greek κύριος in the source parallel; project YHWH default
  rationale: Aunque el paralelo griego usa κύριος, el contexto del versículo hebreo y la política del proyecto favorecen «Yahvé» para el nombre divino. Esto hace visible la referencia al Nombre y evita la convención de ocultarlo tras «Señor».
- source_word: κρυβήσομαι
  english_pob_choice: I shall be hidden
  chosen_spanish: me ocultaré
  alternatives_spanish:
  - seré escondido
  - estaré oculto
  lexicon: LSJ / standard Spanish reflexive idiom
  rationale: 'El futuro pasivo del griego puede expresarse en español de forma más natural con una construcción reflexiva en primera persona: «me ocultaré». Mantiene la idea de ocultarse/ser inaccesible sin sonar forzado.'
theological_decisions:
- issue: Diferencia textual entre el hebreo preservado y el paralelo griego
  english_pob_reading: 'The Hebrew line is primary; the Greek witness is preserved in a footnote as a substantially different form: ''Do not say, “I shall be hidden from the Lord.”'''
  chosen_spanish_reading: La traducción principal sigue el paralelo griego aquí presentado, con nota de que el hebreo conservado en la tradición fuente de Sirácides difiere notablemente.
  alternative_spanish_readings:
  - «Yahvé endureció el corazón de Faraón... »
  - '«No digas: “Me ocultaré de Yahvé”» sin nota textual'
  rationale: Este registro debe ser auditable y transparente. Dado que el paquete canónico incluye explícitamente el griego y señala una divergencia sustancial con el hebreo, la nota debe preservar esa tensión textual en vez de borrarla. La línea principal se mantiene breve y fiel al griego suministrado.
  doctrine_reference: 'PHILOSOPHY.md: prioridad al hebreo cuando se conserva, pero transparencia total respecto del testimonio griego paralelo y sus divergencias.'
translation_notes:
  revision_awareness: El material de revisión indica que no hubo cambios necesarios en el último pase; esta versión mantiene esa estabilidad y solo adapta la presentación al español, preservando la variante textual documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - Se evita «Señor» en el texto principal para no ocultar la referencia al Nombre.
  - La nota textual conserva la tensión entre el testimonio griego y la tradición hebrea sin armonizarlos artificialmente.
