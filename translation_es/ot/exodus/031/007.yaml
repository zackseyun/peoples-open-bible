translation:
  language: es
  text: la tienda de reunión[a], y el arca del testimonio, y el propiciatorio[b] que está sobre él, y todos los utensilios de la tienda—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tabernáculo de reunión».
    reason: lexical_alternative
  - marker: b
    text: O «la cubierta de expiación».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo del encuentro
  alternatives_spanish:
  - la tienda de reunión
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: En este contexto cultual, "tabernáculo" comunica mejor la estructura sagrada que "tienda" en español, sin perder el sentido del lugar donde Dios se encuentra con su pueblo. "Del encuentro" mantiene la idea relacional de מוֹעֵד de manera natural.
- source_word: הָאָרֹן לָעֵדֻת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca para el testimonio
  - el arca del testimonio
  lexicon: HALOT
  rationale: La construcción hebrea se expresa con naturalidad en español como "del testimonio". Evita introducir "pacto" o "alianza", que no están en el texto, y conserva la relación tradicional y textual con la función del arca.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - la cubierta propiciatoria
  lexicon: HALOT
  rationale: '"Propiciatorio" es un término bíblico-teológico asentado en español y corresponde al objeto del arca. Aunque el inglés POB preserva "mercy seat", en español "propiciatorio" evita una imagen idiomática extraña y mantiene la referencia al elemento del santuario. Se conserva la tensión semántica de expiación/clemencia sin explicarla en el texto.'
- source_word: אֲשֶׁר עָלָיו
  english_pob_choice: that is on it
  chosen_spanish: que está sobre él
  alternatives_spanish:
  - que está encima de él
  - que está sobre ella
  lexicon: HALOT
  rationale: '"Sobre él" es una forma natural y precisa en español, refiriéndose al arca (masculino en español) y manteniendo la relación espacial del hebreo sin sobreexplicar.'
- source_word: כָּל כְּלֵי הָאֹהֶל
  english_pob_choice: all the furnishings of the tent
  chosen_spanish: todos los utensilios del tabernáculo
  alternatives_spanish:
  - todos los muebles del tabernáculo
  - todos los enseres del tabernáculo
  lexicon: HALOT
  rationale: '"Utensilios" refleja el alcance amplio de כְּלֵי sin restringirlo a objetos domésticos menores. En un contexto de santuario, "muebles" puede sonar demasiado moderno o específico; "enseres" es posible pero menos directo.'
theological_decisions:
- issue: Renderización de כַּפֹּרֶת en el contexto del arca
  english_pob_reading: the mercy seat
  chosen_spanish_reading: el propiciatorio
  alternative_spanish_readings:
  - la cubierta de expiación
  - la cubierta propiciatoria
  rationale: El término designa la cubierta del arca con resonancias de expiación/propiciación. "Propiciatorio" conserva la carga cultual tradicional en español sin reducir el sentido a una mera tapa física. La alternativa más transparente se puede expresar en nota si se requiere.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El control textual en inglés revisó "ark for the testimony" a "ark of the testimony" por mayor precisión. La versión española sigue esa corrección con "el arca del testimonio" y conserva sin cambios sustantivos el resto de las decisiones léxicas del audit trail.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el nombre divino.
  - '"Tabernáculo" se emplea aquí como equivalente contextual de אֹהֶל en el ámbito del santuario, coherente con el audit trail inglés que conserva la estructura del lugar santo.'
  - 'Se mantiene una terminología cultual relativamente estable: "arca", "testimonio", "propiciatorio" y "utensilios".'
