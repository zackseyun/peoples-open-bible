base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/019.yaml
  text: Then Ahimaaz the son of Zadok said[a], “Please let me run and bring news to the king[b], for Yahweh has delivered him from the hand of his enemies.”
  footnotes:
  - marker: a
    text: Or, “and announce the good news to the king,” since the Hebrew verb can carry the sense of bringing favorable news.
    reason: lexical_alternative
  - marker: b
    text: Or, “the LORD has judged for him” / “has given him justice,” emphasizing judicial vindication.
    reason: lexical_alternative
