review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la imaginería vegetal del hebreo: עוֹד = «todavía», יְנוּבוּן = «dar fruto», בְּשֵׂיבָה = «en la vejez», דְּשֵׁנִים = «llenos de savia», רַעֲנַנִּים = «verdes». Sin embargo, se aparta innecesariamente de la decisión auditada del POB en el tratamiento de los imperfectos poéticos: el inglés base adoptó lectura presente/gnómica en el texto principal y reservó la lectura futura para nota. El español draft invierte esa relación al poner futuro en el texto principal.'
  spanish_quality_summary: 'El español es natural y claro, pero «estarán» y «darán» hacen la frase más predictiva que proverbial. Para un salmo sapiencial/poético, «dan fruto... están llenos» o mejor «siguen dando fruto» suena más idiomático y refleja mejor la continuidad de עוֹד. También conviene simplificar y alinear las notas: la nota c del inglés no ofrece una lista de sinónimos, sino una alternativa puntual relacionada con el término «green».'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La metáfora botánica está bien preservada con «llenos de savia y verdes». La principal desalineación es metodológica: el borrador no sigue la racionalidad léxica/teológica documentada para los imperfectos, que en el POB se presentan como descripción general en el texto principal con alternativa futura en nota.'
  issues:
  - severity: medium
    issue: Aspecto verbal principal cambiado de presente gnómico a futuro descriptivo
    rationale: El expediente inglés del POB eligió explícitamente presente genérico («bear fruit», «are») y dejó el futuro como alternativa en nota. El español draft pone «darán / estarán» en el texto principal, alterando el énfasis auditado sin necesidad textual suficiente.
  - severity: low
    issue: «Todavía darán fruto» puede mejorarse para expresar continuidad habitual
    rationale: Con עוֹד + imperfecto dentro de esta imagen proverbial, «todavía/siguen dando fruto» refleja mejor la idea de continuidad vital que un simple futuro.
  - severity: low
    issue: La nota c no refleja con precisión la nota inglesa auditada
    rationale: El inglés registra una alternativa puntual vinculada a la historia de revisión («Or 'green,'»), no una expansión libre con «lozanos» y «frescos». En español debe conservarse una nota breve y fiel, o ajustarse a una alternativa realmente necesaria para español.
  revised_spanish_text: Todavía dan fruto en la vejez[a]; están llenos de savia[b] y verdes[c].
  revised_footnotes:
