review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: introduce al subgrupo, conserva los topónimos/nombres, expresa la incapacidad de declarar su pertenencia genealógica y mantiene la duda sobre si eran de Israel. Sin embargo, el aparato de notas está desalineado con el inglés auditado y con las anclas en el texto: la nota [c] está puesta sobre «descendencia», pero su contenido comenta «la casa de sus padres»; además falta una nota para la alternativa de «si eran israelitas» preservada en el POB inglés. También conviene ajustar la puntuación para reflejar mejor la estructura sin separar con punto y coma innecesario.'
  spanish_quality_summary: El español es claro y mayormente natural. «Y estos fueron los que subieron...» suena bien en un registro bíblico moderno. «Declarar» funciona en contexto legal/genealógico. «La casa de sus padres» es fiel aunque algo rígido; sigue siendo aceptable con nota. «Querub», «Addón» e «Imer» son formas hispanizadas razonables. La principal necesidad es reparar las notas y su ubicación.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Se respetan los nombres propios y no aparecen términos teológicos sensibles del glosario. La decisión «declarar» para לְהַגִּיד y «la casa de sus padres» para בֵּית אֲבוֹתָם concuerda con la racionalidad documentada, pero las notas deben reflejar correctamente las alternativas del inglés POB.
  issues:
  - severity: high
    issue: La nota [c] está anclada a «descendencia» pero explica «la casa de sus padres».
    rationale: Esto crea una discordancia formal y semántica entre texto y nota. Cada nota debe corresponder exactamente al término marcado en el texto.
  - severity: high
    issue: Falta una nota para la alternativa de «si eran israelitas».
    rationale: El inglés POB preserva esta alternativa léxica para אִם מִיִּשְׂרָאֵל הֵם; la revisión española debe conservarla, especialmente porque «si eran de Israel» puede sonar geográfico además de genealógico.
  - severity: medium
    issue: La nota [b] introduce «probar» como alternativa principal en vez de reflejar la alternativa auditada de «mostrar»/«decir» o la explicación léxica de ‘hacer saber’.
    rationale: «Probar» fue evitado en el texto inglés por ser más interpretativo; como nota secundaria no es imposible, pero desalineada con la documentación auditada.
  - severity: low
    issue: El punto y coma antes de «pero» es algo pesado e innecesario.
    rationale: Una coma fluye mejor en español y mantiene la unidad de la oración.
  revised_spanish_text: Y estos fueron los que subieron de Tel-melah[a], Tel-harsha, Querub, Addón y Imer, pero no pudieron declarar la casa de sus padres[b] ni su descendencia, si eran de Israel[c].
  revised_footnotes:
  - marker: a
    text: Esdras 2:59 lee «Addan» donde Nehemías aquí tiene «Addon».
    reason: textual_variant
  - marker: b
    text: O «su casa ancestral»; el hebreo dice literalmente «la casa de sus padres».
    reason: lexical_alternative
  - marker: c
    text: O «si eran israelitas».
    reason: lexical_alternative
  revision_rationale: 'Se corrigen las notas para que coincidan con las anclas correctas y con el aparato del POB inglés: [b] ahora comenta «la casa de sus padres» y [c] preserva la alternativa «si eran israelitas». También se suaviza la puntuación con una coma en lugar de punto y coma. El resto del texto se mantiene por ser fiel y natural.'
