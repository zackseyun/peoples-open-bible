translation:
  language: es
  text: Pero Josué mantuvo con vida a Rahab la prostituta[a], junto con la familia de su padre y todo lo que le pertenecía, y ella ha habitado en medio de Israel hasta el día de hoy, porque escondió a los mensajeros[b] que Josué envió a espiar Jericó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ramera».
    reason: lexical_alternative
  - marker: b
    text: Es decir, los hombres que Josué envió a espiar Jericó.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזּוֹנָה
  english_pob_choice: the prostitute
  chosen_spanish: la prostituta
  alternatives_spanish:
  - la ramera
  - la ramera pública
  lexicon: HALOT
  rationale: זּוֹנָה designa a una mujer dedicada a la prostitución. En español, «prostituta» es claro, actual y fiel al valor léxico; «ramera» sería más tradicional pero menos natural hoy.
- source_word: בֵּית אָבִיהָ
  english_pob_choice: her father's household
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - la casa paterna
  - la familia de su padre
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «casa de su padre». En español, esta formulación conserva la imagen del texto y puede abarcar el hogar familiar, no solo el edificio.
- source_word: כָּל אֲשֶׁר לָהּ
  english_pob_choice: all that belonged to her
  chosen_spanish: todo lo que le pertenecía
  alternatives_spanish:
  - todo lo que tenía
  - todo lo que era suyo
  lexicon: HALOT
  rationale: La frase hebrea es amplia e incluye pertenencias y dependientes. «Le pertenecía» preserva esa amplitud sin restringirla solo a posesiones materiales.
- source_word: הֶחֱיָה
  english_pob_choice: kept ... alive
  chosen_spanish: mantuvo con vida
  alternatives_spanish:
  - dejó vivir
  - la preservó con vida
  lexicon: HALOT
  rationale: El hifil de חיה expresa causar que viva o conservar con vida. «Mantuvo con vida» refleja mejor ese matiz causativo que «salvó» o «perdonó».
- source_word: וַתֵּשֶׁב
  english_pob_choice: she has lived
  chosen_spanish: ha habitado
  alternatives_spanish:
  - ha vivido
  - se ha establecido
  lexicon: HALOT
  rationale: Con «hasta el día de hoy», el verbo indica una continuidad desde el pasado hasta el presente narrativo. «Ha habitado» conserva esa continuidad con un registro algo más solemne.
- source_word: בְּקֶרֶב יִשְׂרָאֵל
  english_pob_choice: in the midst of Israel
  chosen_spanish: en medio de Israel
  alternatives_spanish:
  - entre Israel
  - entre los israelitas
  lexicon: HALOT
  rationale: «En medio de Israel» reproduce de cerca el modismo hebreo y sugiere incorporación dentro del pueblo, sin forzar una explicación adicional.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es la equivalencia idiomática usual en español para marcar continuidad hasta el presente del narrador.
- source_word: הֶחְבִּיאָה
  english_pob_choice: hid
  chosen_spanish: escondió
  alternatives_spanish:
  - ocultó
  - guardó en secreto
  lexicon: HALOT
  rationale: El verbo significa ocultar o esconder. «Escondió» es directo, natural y suficientemente preciso en contexto.
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: a los mensajeros
  alternatives_spanish:
  - a los enviados
  - a los espías
  lexicon: HALOT
  rationale: מַלְאָכִים significa normalmente «mensajeros». Aunque funcionaron como espías, el texto usa el término más amplio; por eso se conserva «mensajeros» y se deja que el infinitivo siguiente aclara la misión.
- source_word: לְרַגֵּל
  english_pob_choice: to spy out
  chosen_spanish: a reconocer
  alternatives_spanish:
  - a espiar
  - a reconocer el terreno
  lexicon: HALOT
  rationale: En este contexto, רגל alude a una exploración o reconocimiento encubierto. «Reconocer» suena natural en español bíblico contemporáneo y conserva la idea de inspección del territorio.
theological_decisions:
- issue: Permanencia de Rahab dentro de Israel
  english_pob_reading: she has lived in the midst of Israel
  chosen_spanish_reading: ha habitado en medio de Israel
  alternative_spanish_readings:
  - ha vivido entre Israel
  - se ha establecido entre los israelitas
  rationale: La redacción preserva la afirmación narrativa de residencia continua dentro de Israel sin añadir conclusiones teológicas posteriores sobre integración plena o estatus comunitario; se mantiene la tensión del texto.
  doctrine_reference: Preservar la tensión narrativa sin resolverla interpretativamente.
translation_notes:
  revision_awareness: El original inglés POB optó por «the prostitute», «her father's household», «all that belonged to her», «kept ... alive», «she has lived», «in the midst of Israel», «to this day», «hid the messengers», y «to spy out». La revisión posterior solo estandarizó la puntuación en «father's» sin cambiar el sentido, por lo que la presente versión sigue de cerca esas decisiones con equivalentes naturales en español.
  spanish_consistency_notes:
  - Se mantiene «Rahab» como nombre propio sin adaptación.
  - Se usa «mensajeros» y no «espías» en el cuerpo principal, para respetar el término hebreo; la aclaración queda en la nota.
  - «En medio de Israel» conserva el matiz relacional del hebreo sin suavizarlo a una simple ubicación geográfica.
  - La construcción verbal en perfecto («ha habitado») refleja continuidad hasta el presente narrativo.
