  to: Llena sus rostros de vergüenza[a], para que busquen tu nombre, Yahvé.
  rationale: Se reemplaza «el rostro de ellos» por «sus rostros» para reflejar mejor el plural hebreo פְנֵיהֶם y producir un español más natural y digno, sin cambiar el sentido. Se conserva la nota sobre la alternativa sintáctica de וִיבַקְשׁוּ y el uso de «Yahvé» conforme al glosario del proyecto.
