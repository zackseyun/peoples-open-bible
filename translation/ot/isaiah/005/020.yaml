theological_decisions:
- issue: Nature of the denunciation
  chosen_reading: The verse condemns moral inversion—relabeling evil as good and good as evil—without expanding it into a narrower doctrinal or political application.
  alternative_readings:
  - A more generalized condemnation of confusion
  - A specifically judicial or social critique only
  rationale: The imagery of darkness/light and bitter/sweet broadens the scope beyond one sphere while still centering on objective moral reversal. The translation preserves that breadth and gravity without importing a more specific application than the text states.
  doctrine_reference: Translation philosophy §§1, 3, 6
