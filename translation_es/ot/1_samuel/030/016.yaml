translation:
  language: es
  text: Cuando lo llevó abajo, he aquí, estaban esparcidos[a] por toda la tierra, comiendo, bebiendo y celebrando[b] por todo el gran botín que habían tomado de la tierra de los filisteos y de la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dispersos por toda la tierra». El participio hebreo puede enfatizar ya sea la dispersión o la amplia extensión.
    reason: lexical_alternative
  - marker: b
    text: O «celebrando por todo el gran botín». La preposición puede entenderse como indicando la ocasión o la base de su jolgorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרִדֵהוּ
  english_pob_choice: When he had led him down
  chosen_spanish: Cuando lo había llevado abajo
  alternatives_spanish:
  - Cuando lo condujo
  - Cuando lo bajó
  lexicon: HALOT
  rationale: El hifil de ירד expresa causar el descenso o llevar hacia abajo. «Lo había llevado abajo» conserva el movimiento direccional y el orden narrativo, sin volverlo innecesariamente mecánico.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: Es un marcador discursivo de develación súbita. «He aquí» mantiene esa fuerza narrativa y es natural en español bíblico digno.
- source_word: נְטֻשִׁים עַל פְּנֵי כָל הָאָרֶץ
  english_pob_choice: they were spread out over the face of all the land
  chosen_spanish: estaban esparcidos sobre la superficie de toda la tierra
  alternatives_spanish:
  - estaban dispersos por toda la tierra
  - estaban tendidos por toda la tierra
  lexicon: HALOT
  rationale: El participio pasivo comunica dispersión o extensión amplia. «Esparcidos» preserva esa ambigüedad útil, y «sobre la superficie de toda la tierra» refleja el hebraísmo עַל פְּנֵי sin perder claridad en español.
- source_word: אֹכְלִים וְשֹׁתִים וְחֹגְגִים
  english_pob_choice: eating and drinking and celebrating
  chosen_spanish: comiendo, bebiendo y festejando
  alternatives_spanish:
  - comiendo, bebiendo y celebrando
  - comiendo y bebiendo y haciendo fiesta
  lexicon: HALOT
  rationale: Los tres participios describen actividad continua. «Festejando» conserva el matiz de celebración gozosa sin reducirlo a comida y bebida, que ya están expresadas explícitamente.
- source_word: בְּכֹל הַשָּׁלָל הַגָּדוֹל
  english_pob_choice: over all the great spoil
  chosen_spanish: sobre todo el gran botín
  alternatives_spanish:
  - a causa de todo el gran botín
  - por todo el gran botín
  lexicon: HALOT
  rationale: La preposición ב puede señalar ocasión o base del festejo. «Sobre» sigue de cerca la lectura revisada del POB inglés y evita introducir una causalidad demasiado explícita.
- source_word: אֲשֶׁר לָקְחוּ
  english_pob_choice: that they had taken
  chosen_spanish: que habían tomado
  alternatives_spanish:
  - que tomaron
  - el cual habían tomado
  lexicon: HALOT
  rationale: El pluscuamperfecto español deja claro que la toma del botín precede al festejo, como en el contexto narrativo hebreo.
- source_word: מֵאֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: from the land of the Philistines
  chosen_spanish: de la tierra de los filisteos
  alternatives_spanish:
  - del territorio de los filisteos
  - de la tierra filistea
  lexicon: HALOT
  rationale: אֶרֶץ se conserva como «tierra» para mantener el paralelismo territorial del texto y su sentido geográfico amplio.
- source_word: וּמֵאֶרֶץ יְהוּדָה
  english_pob_choice: and from the land of Judah
  chosen_spanish: y de la tierra de Judá
  alternatives_spanish:
  - y del territorio de Judá
  - y de Judá
  lexicon: HALOT
  rationale: Se mantiene la misma solución que en la frase anterior para conservar el paralelismo y el matiz territorial.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «because of» por «over» en בְּכֹל הַשָּׁלָל הַגָּדוֹל para reflejar más directamente la preposición hebrea y mantener el sentido celebratorio sin añadir una interpretación causal. La redacción española sigue esa decisión con «sobre» y conserva el tono narrativo y la amplitud espacial del hebreo.
  spanish_consistency_notes:
  - Se usa «tierra» para אֶרֶץ de forma consistente en ambas ocurrencias, conservando el paralelismo territorial del hebreo.
  - Se mantiene la secuencia verbal continua con participios en gerundio («comiendo, bebiendo y festejando») para reflejar la acción simultánea.
  - No se normaliza el marcador «he aquí» a una prosa moderna más plana, porque aquí cumple una función de revelación narrativa importante.
