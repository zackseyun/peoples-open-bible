translation:
  language: es
  text: Así subieron a la ciudad. Mientras entraban en la ciudad[a], he aquí Samuel salía a su encuentro, para subir al lugar alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de la ciudad». El hebreo dice literalmente «en medio de la ciudad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: they went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron
  - fueron subiendo
  - ascendieron
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente; en español, «subieron» comunica de manera natural la dirección sin sonar forzado. «Ascendieron» sería más formal, pero menos idiomático.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad
  - el pueblo
  lexicon: HALOT
  rationale: עיר puede ser ciudad o pueblo; «ciudad» sigue bien el audit trail inglés y funciona mejor en español bíblico general sin perder el referente narrativo.
- source_word: הֵמָּה בָּאִים
  english_pob_choice: as they were entering
  chosen_spanish: mientras estaban entrando
  alternatives_spanish:
  - cuando entraban
  - al entrar
  - mientras entraban
  lexicon: HALOT
  rationale: La combinación del pronombre independiente y el participio marca acción en curso. «Mientras estaban entrando» conserva ese aspecto progresivo con claridad en español.
- source_word: בְּתוֹךְ הָעִיר
  english_pob_choice: the middle of the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en medio de la ciudad
  - en el interior de la ciudad
  lexicon: HALOT
  rationale: El hebreo literalmente dice «en medio de/la ciudad», pero el propio audit trail revisado indica que el sentido es idiomático, no necesariamente geográfico puntual. «En la ciudad» reproduce bien el valor contextual y evita sobrerrepresentar el matiz espacial.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - y he aquí
  - vean
  lexicon: HALOT
  rationale: «He aquí» preserva la fuerza de deíxis narrativa de הנה sin volver la frase demasiado coloquial.
- source_word: יֹצֵא
  english_pob_choice: was coming out
  chosen_spanish: salía
  alternatives_spanish:
  - estaba saliendo
  - venía saliendo
  - iba saliendo
  lexicon: HALOT
  rationale: El participio indica acción en progreso. «Salía» es natural en español narrativo y mantiene la imperfectividad.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - a encontrarse con ellos
  - para encontrarlos
  - a recibirlos
  lexicon: HALOT
  rationale: לקראת expresa ir al encuentro de alguien. «A su encuentro» es una equivalencia idiomática precisa y fluida en español.
- source_word: לַעֲלוֹת
  english_pob_choice: to go up
  chosen_spanish: para subir
  alternatives_spanish:
  - para ascender
  - para ir a subir
  lexicon: HALOT
  rationale: El infinitivo de propósito retoma עלה. «Para subir» conserva la direccionalidad y evita una paráfrasis excesiva.
- source_word: הַבָּמָה
  english_pob_choice: the high place
  chosen_spanish: el lugar alto
  alternatives_spanish:
  - el lugar de culto en la altura
  - el alto lugar
  - el santuario de la altura
  lexicon: HALOT
  rationale: במה es un sitio cultual elevado. Aunque «lugar alto» no es la fórmula tradicional más fija, refleja de forma transparente el valor léxico y resulta más natural en español que un calco rígido.
theological_decisions:
- issue: Renderización de במה como sitio cultual pretemplo
  english_pob_reading: the high place
  chosen_spanish_reading: el lugar alto
  alternative_spanish_readings:
  - el lugar de culto en la altura
  - el santuario de la altura
  rationale: Se conserva la categoría histórica de un lugar de culto sin introducir una valoración posterior. «Lugar alto» mantiene la referencia cultual y el matiz de elevación presentes en el hebreo.
  doctrine_reference: Transparencia al texto fuente; historia cultual de Israel pretemplo
- issue: Valor discursivo de וְהִנֵּה
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - miren
  - y he aquí
  rationale: La partícula introduce un giro narrativo repentino. «He aquí» conserva la señal de atención y el tono bíblico sin sobreexplicar.
  doctrine_reference: Retórica narrativa hebrea
translation_notes:
  revision_awareness: El inglés auditado fue revisado desde «the middle of the city» a «the city» por considerar idiomático el sentido de בתוך; la versión española sigue esa revisión y evita fijar un centro espacial más preciso que el que el contexto exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exija explícitamente; este versículo no lo contiene.
  - «Lugar alto» se usa de manera consistente con la lectura cultual de במה, sin reemplazarla por terminología eclesial posterior.
  - La partícula narrativa se traduce con fórmula exclamativa breve para conservar el cambio de escena.
