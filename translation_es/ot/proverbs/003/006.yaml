    issue: La nota al pie está anclada al verbo equivocado y altera la alternativa documentada
    rationale: 'La nota inglesa [a] acompaña «acknowledge him» pero explica una alternativa para la cláusula final: «he will direct your paths», además de la literalidad «he will make your paths straight». La nota española actual dice «O: “lo reconocerás”. El hebreo dice más literalmente: “conócelo”», lo cual no corresponde ni al inglés auditado ni al análisis fuente, e incluso cambia el modo verbal.'
  - severity: medium
    issue: 'La nota actual introduce una alternativa verbal impropia: «lo reconocerás»'
    rationale: El hebreo דָעֵהוּ es imperativo 2ms con sufijo 3ms («reconócelo/conócelo»), no futuro. Esa redacción puede confundir al lector y debe corregirse o eliminarse.
  revised_spanish_text: Reconócelo en todos tus caminos, y él enderezará[a] tus sendas.
  revised_footnotes:
