  rationale: 'La revisión conserva el sentido cultual del hebreo y mejora la precisión léxica y la legibilidad en español. Se ajustan las notas para reflejar fielmente la auditoría inglesa: alternativa para «defecto», nota cultual para «acercarse», rareza y posible especificidad facial/nasal de חָרֻם, y la desproporción corporal de שָׂרוּעַ. También se reemplaza «miembro» por «extremidad» para evitar ambigüedad innecesaria en español contemporáneo.'
