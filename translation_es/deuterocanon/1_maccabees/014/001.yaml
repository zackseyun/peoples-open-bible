translation:
  language: es
  text: Y en el año ciento setenta y dos[a], el rey Demetrio reunió sus fuerzas y fue a Media, para obtener ayuda para sí[b], a fin de hacer guerra contra Trifón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La fórmula cronológica suele entenderse según la era seléucida: literalmente, ''en el segundo y el septuagésimo y el centésimo año''.'
    reason: cultural_note
  - marker: b
    text: 'O: ''para atraer ayuda hacia sí'' / ''para conseguir ayuda para sí''. El verbo griego sugiere obtener o atraer auxilio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἔτει δευτέρῳ καὶ ἑβδομηκοστῷ καὶ ἑκατοστῷ
  english_pob_choice: in the one hundred seventy-second year
  chosen_spanish: en el año ciento setenta y dos
  alternatives_spanish:
  - en el año 172
  - en el año ciento setenta y dos de la era seléucida
  lexicon: LSJ
  rationale: El griego usa numeración aditiva para una fecha de era. En español, la forma natural y fiel es 'año ciento setenta y dos'. Mantiene el valor cronológico sin forzar una construcción calcada.
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  lexicon: LSJ
  rationale: En contexto militar, συνάγω expresa reunir tropas o fuerzas. 'Reunió' conserva la idea de concentrar sus fuerzas sin añadir más especificidad que el griego.
- source_word: τὰς δυνάμεις αὐτοῦ
  english_pob_choice: his forces
  chosen_spanish: sus fuerzas
  alternatives_spanish:
  - su ejército
  - sus tropas
  lexicon: LSJ
  rationale: δυνάμεις en este contexto es un plural militar. 'Sus fuerzas' reproduce bien el plural y evita reducirlo a una sola unidad militar.
- source_word: ἐπορεύθη εἰς Μηδίαν
  english_pob_choice: went into Media
  chosen_spanish: fue a Media
  alternatives_spanish:
  - marchó a Media
  - se dirigió a Media
  lexicon: LSJ
  rationale: El verbo de movimiento no exige en español la idea militar de 'marchó'. 'Fue a Media' es directo y fiel, aunque menos marcado geográficamente que 'entró en Media'.
- source_word: τοῦ ἐπισπάσθαι βοήθειαν ἑαυτῷ
  english_pob_choice: to obtain help for himself
  chosen_spanish: para obtener ayuda para sí
  alternatives_spanish:
  - para conseguir ayuda para sí
  - para atraer ayuda hacia sí
  lexicon: LSJ
  rationale: El infinitivo articular expresa finalidad. βοήθεια es 'ayuda' o 'auxilio', y ἐπισπάσθαι sugiere obtener o atraer esa ayuda. 'Para obtener ayuda para sí' sigue de cerca el sentido y suena natural en español.
- source_word: ὅπως πολεμήσῃ τὸν Τρύφωνα
  english_pob_choice: so that he might make war against Tryphon
  chosen_spanish: a fin de hacer guerra contra Trifón
  alternatives_spanish:
  - para luchar contra Trifón
  - con el fin de guerrear contra Trifón
  lexicon: LSJ
  rationale: πολεμέω indica una acción bélica sostenida. 'Hacer guerra contra' preserva mejor esa fuerza que un simple 'pelear'. 'Trifón' es la transliteración corriente del nombre griego.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y aprovecha el ajuste del audit trail inglés de 'obtain help for himself' para reflejar ἐπισπάσθαι βοήθειαν ἑαυτῷ con una expresión española natural y auditable. No se añadió contenido interpretativo fuera del alcance del versículo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - '''Trifón'' conserva la forma española estable del nombre propio griego.'
  - '''Ayuda'' se eligió para βοήθεια por ser el equivalente más directo y no litúrgico.'
  - La fecha queda en forma moderna y legible, con nota de era seléucida para conservar la precisión histórica.
