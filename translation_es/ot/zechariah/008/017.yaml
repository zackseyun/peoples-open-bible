  text: וְ/אִ֣ישׁ אֶת רָעַ֣ת רֵעֵ֗/הוּ אַֽל תַּחְשְׁבוּ֙ בִּ/לְבַבְ/כֶ֔ם וּ/שְׁבֻ֥עַת שֶׁ֖קֶר אַֽל תֶּאֱהָ֑בוּ כִּ֧י אֶת כָּל אֵ֛לֶּה אֲשֶׁ֥ר שָׂנֵ֖אתִי נְאֻם יְהוָֽה׀־־־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/zechariah/008/017.yaml
