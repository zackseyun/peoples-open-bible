translation:
  language: es
  text: Después de la muerte de Joiadá[a], los oficiales de Judá vinieron y se postraron ante el rey. Entonces el rey los escuchó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los príncipes de Judá» o «los líderes de Judá».
    reason: lexical_alternative
  - marker: b
    text: «Los escuchó» también puede implicar «les hizo caso» o «accedió a lo que pedían».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - Y después de
  - Ahora después de
  lexicon: HALOT
  rationale: La preposición temporal introduce la secuencia narrativa. En español, «Después de» transmite esa relación de manera natural y conserva el valor temporal sin añadir énfasis innecesario.
- source_word: מוֹת יְהוֹיָדָע
  english_pob_choice: the death of Jehoiada
  chosen_spanish: la muerte de Jehoiadá
  alternatives_spanish:
  - el morir de Jehoiadá
  - cuando murió Jehoiadá
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo en construcción con el nombre propio. «La muerte de» es la correspondencia más directa y natural en español.
- source_word: יְהוֹיָדָע
  english_pob_choice: Jehoiada
  chosen_spanish: Jehoiadá
  alternatives_spanish:
  - Jehoyadá
  - Jehoiada
  lexicon: Transliteración propia del proyecto
  rationale: Se mantiene el nombre propio transliterado; «Jehoiadá» conserva la forma bíblica con acento prosódico en español.
- source_word: שָׂרֵי יְהוּדָה
  english_pob_choice: the officials of Judah
  chosen_spanish: los oficiales de Judá
  alternatives_spanish:
  - los príncipes de Judá
  - los jefes de Judá
  - los líderes de Judá
  lexicon: HALOT
  rationale: שָׂרִים puede significar gobernantes, oficiales o príncipes. «Oficiales» mantiene el sentido de rango y función de gobierno sin imponer el matiz aristocrático de «príncipes».
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - entraron
  lexicon: HALOT
  rationale: Verbo de movimiento común. «Vinieron» resulta natural en español y no especifica más de lo que el hebreo dice.
- source_word: וַיִּשְׁתַּחֲוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se postraron
  - hicieron reverencia
  - se inclinaron ante
  lexicon: HALOT
  rationale: El verbo puede abarcar reverencia física o postración. «Se inclinaron» preserva el gesto sin forzar el matiz de adoración; se añade «ante el rey» para explicitar el complemento relacional del hebreo.
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - al rey
  - delante del rey
  lexicon: HALOT
  rationale: Con este verbo, el hebreo puede expresarse de manera idiomática como un acto realizado ante una autoridad. «Ante el rey» comunica bien el acto de homenaje sin sonar rígido.
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la consecuencia narrativa inmediata. «Entonces» es breve, claro y conserva la progresión del relato.
- source_word: שָׁמַע ... אֲלֵיהֶם
  english_pob_choice: listened to them
  chosen_spanish: los escuchó
  alternatives_spanish:
  - les prestó atención
  - los atendió
  - los oyó
  lexicon: HALOT
  rationale: La construcción hebrea שׁמע אל suele implicar escuchar con atención o atender. «Los escuchó» es natural en español y deja abierta la fuerza contextual de obedecer o ceder a lo dicho.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido para dar continuidad narrativa y evitar un término más literario que podría alejarse del registro del texto.
theological_decisions:
- issue: Naturaleza del gesto hacia el rey
  english_pob_reading: Rendered as 'bowed down' rather than a more interpretive expression such as 'paid homage' or 'worshiped.'
  chosen_spanish_reading: «Se inclinaron» en vez de una formulación interpretativa como «le rindieron homenaje» o «lo adoraron».
  alternative_spanish_readings:
  - le rindieron homenaje
  - se postraron
  - lo adoraron
  rationale: El hebreo describe un acto corporal de reverencia/prostración ante un rey humano. «Se inclinaron» conserva la tensión entre respeto formal y posible sumisión política, sin convertir el gesto en adoración religiosa.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
- issue: Valor de שׁמע con complemento preposicional
  english_pob_reading: '''Listened to them'' may also carry the sense ''heeded them'' or ''complied with them.'''
  chosen_spanish_reading: «los escuchó» permite también la lectura contextual de que atendió a lo que dijeron o accedió a ello.
  alternative_spanish_readings:
  - los atendió
  - les hizo caso
  - accedió a ellos
  rationale: La frase española no debe cerrar la ambigüedad del hebreo. «Los escuchó» mantiene abierto si el rey solo oyó sus palabras o si además las aceptó.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: 'Alineado con el último pase revisado, que no requirió cambios. Se conservan las decisiones del audit trail inglés: el rango de שָׂרִים como opción entre oficiales/príncipes/líderes, el gesto de reverencia como algo menos interpretativo que «adorar», y la ambigüedad de שׁמע אֲלֵיהֶם como escuchar/atender/ceder.'
  spanish_consistency_notes:
  - Se usa «Jehoiadá» de manera consistente con la transliteración española del nombre propio.
  - «Judá» se conserva como nombre territorial estándar.
  - El registro es bíblico y claro, evitando arcaísmos innecesarios.
  - Se mantiene la ambigüedad legítima del hebreo en el verbo final sin sobreinterpretarlo.
