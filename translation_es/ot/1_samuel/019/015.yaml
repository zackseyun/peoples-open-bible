  text: Then Saul sent the messengers to see David[a], saying, “Bring him up to me in the bed, so that I may put him to death.”
  footnotes:
  - marker: a
    text: Or “on the bed” or “with the bed.” The Hebrew preposition can be understood in more than one way; Saul's command likely means that David was to be carried as he lay.
