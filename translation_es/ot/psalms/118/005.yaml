review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: clamor desde la angustia, invocación a la forma breve del nombre divino, respuesta divina y contraste con amplitud/alivio. También preserva la nota alternativa sobre la imaginería espacial. Sin embargo, hay dos ajustes importantes: (1) el proyecto en español prefiere «Yahvé» para el nombre divino en el texto principal; aunque aquí el hebreo usa יָהּ, la traducción española más alineada con la política del proyecto y más legible para lectores eclesiales es «Yahvé», explicando en nota o en decisiones léxicas que el original tiene la forma poética abreviada; (2) «en amplitud» suena algo forzado en español, y «con amplitud» reproduce mejor el valor instrumental/modo de ב y la imagen de liberación espaciosa sin perder fidelidad.'
  spanish_quality_summary: «Desde mi angustia invoqué a Yah; Yah me respondió en amplitud» es comprensible, pero «en amplitud» resulta poco idiomático. «Con amplitud» suena más natural y digno. El resto del verso es claro, moderno y sobrio. La nota al pie es útil, aunque conviene pulir ligeramente la puntuación y comillas.
  glossary_alignment: 'Hay desalineación con la preferencia terminológica del proyecto para el nombre divino: el borrador usa «Yah» en el texto principal. Dado que la instrucción del proyecto establece «Yahvé» como forma principal en español y no pide preservar «Yah» en el texto final de manera obligatoria, conviene ajustar a «Yahvé» y explicar en la justificación léxica que el hebreo emplea la forma abreviada poética יָהּ. «Angustia», «invoqué» y «me respondió» están bien alineados; «con amplitud» mejora la naturalidad sin apartarse del análisis léxico.'
  issues:
  - severity: medium
    issue: Uso de «Yah» en lugar de «Yahvé» en el texto principal
    rationale: Aunque el hebreo usa la forma breve יָהּ y el inglés auditado la conserva como «Yah», la guía del proyecto para el español establece «Yahvé» en el texto principal. En esta revisión conviene priorizar la convención española del proyecto y dejar constancia de la forma abreviada en la justificación léxica o nota.
  - severity: medium
    issue: «En amplitud» suena poco idiomático en español
    rationale: La frase es entendible pero rígida. «Con amplitud» preserva mejor el contraste poético entre estrechez y espacio amplio, y suena más natural para lectura bíblica en español.
  revised_spanish_text: Desde mi angustia invoqué a Yahvé[a]; Yahvé me respondió con amplitud.
  revised_footnotes:
