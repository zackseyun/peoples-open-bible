translation:
  language: es
  text: Fueron a la entrada de Gedor[a], hasta el lado oriental del valle[b], para buscar pastos para sus rebaños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la aproximación de Gedor»; el término hebreo puede denotar una entrada, un acceso o un lugar de entrada.
    reason: lexical_alternative
  - marker: b
    text: O «al este del valle» o «hacia el este del valle»; la expresión hebrea es una frase topográfica compacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: They went
  chosen_spanish: Fueron
  alternatives_spanish:
  - Iban
  - Se dirigieron
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción sucesiva; en español bíblico neutral, 'fueron' transmite movimiento narrativo de forma natural y breve.
- source_word: לִמְבּוֹא
  english_pob_choice: to the entrance of
  chosen_spanish: a la entrada de
  alternatives_spanish:
  - al acceso de
  - a la aproximación de
  lexicon: HALOT
  rationale: מָבוֹא puede significar entrada, acceso o lugar de entrada. 'Entrada' conserva el sentido espacial y suena natural en español.
- source_word: גְדֹר
  english_pob_choice: Gedor
  chosen_spanish: Gedor
  lexicon: Nombre propio
  rationale: Topónimo transliterado sin traducción.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como hasta
  - al punto de
  lexicon: HALOT
  rationale: Marca extensión espacial; 'hasta' expresa bien el límite alcanzado en español.
- source_word: לְמִזְרַח
  english_pob_choice: the east side of
  chosen_spanish: el lado oriental de
  alternatives_spanish:
  - al este de
  - hacia el este del
  lexicon: HALOT
  rationale: La frase topográfica compacta admite varias lecturas; 'lado oriental de' conserva la idea de una zona/lado específico, no solo una dirección abstracta.
- source_word: הַגָּיְא
  english_pob_choice: the valley
  chosen_spanish: el valle
  alternatives_spanish:
  - el barranco
  - la hondonada
  lexicon: HALOT
  rationale: גַּיְא puede ser valle o barranco; 'valle' es la opción más general y natural para este contexto geográfico.
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek
  chosen_spanish: para buscar
  alternatives_spanish:
  - para procurar
  - para buscar y hallar
  lexicon: HALOT
  rationale: בקש aquí expresa propósito. En español, 'buscar' comunica de manera clara la finalidad práctica de encontrar pasto.
- source_word: מִרְעֶה
  english_pob_choice: pasture
  chosen_spanish: pasto
  alternatives_spanish:
  - pastura
  - pastoreo
  lexicon: HALOT
  rationale: El término designa el alimento/terreno de pastoreo; 'pasto' es breve y natural en español, aunque 'pastura' también sería posible.
- source_word: לְצֹאנָם
  english_pob_choice: for their flocks
  chosen_spanish: para sus rebaños
  alternatives_spanish:
  - para sus ovejas
  - para su ganado menor
  lexicon: HALOT
  rationale: צֹאן abarca ovejas y cabras como conjunto. 'Rebaños' preserva el sentido colectivo sin especificar una sola especie.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo directo y el criterio óptimo-equivalente ya validado en el audit trail inglés; no se detectaron revisiones aplicadas ni cambios de contenido respecto del inglés base.
  spanish_consistency_notes:
  - Se mantiene la transliteración de Gedor sin traducir el topónimo.
  - Se usa 'entrada' para מָבוֹא y se deja la alternativa topográfica en nota, conservando la tensión lexical documentada.
  - '''Pasto'' traduce מִרְעֶה de forma idiomática; ''rebaños'' traduce צֹאן como colectivo, sin reducirlo a ovejas solamente.'
  - La frase 'lado oriental del valle' refleja la orientación espacial compacta del hebreo sin sobreinterpretarla.
