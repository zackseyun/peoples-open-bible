translation:
  language: es
  text: Porque he aquí[a], yo estoy a favor de ustedes, y me volveré a ustedes, y serán cultivados y sembrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hacia ustedes’. La expresión hebrea comunica la orientación favorable de Yahvé respecto de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En español, ‘Porque’ conserva la fuerza conectiva explicativa/causal que introduce la razón de la promesa anterior.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ya estoy aquí
  lexicon: HALOT
  rationale: ‘He aquí’ mantiene el tono profético y de atención inmediata que el inglés POB preserva con ‘behold’.
- source_word: אֲלֵיכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - hacia ustedes
  - para ustedes
  lexicon: HALOT
  rationale: La expresión apunta a una disposición favorable de Yahvé hacia el destinatario. ‘Por ustedes’ intenta conservar esa orientación benéfica sin convertirla en mera dirección espacial.
- source_word: וּפָנִיתִי אֲלֵיכֶם
  english_pob_choice: I will turn to you
  chosen_spanish: me volveré hacia ustedes
  alternatives_spanish:
  - me volveré a ustedes
  - atenderé a ustedes
  lexicon: HALOT
  rationale: El giro idiomático de ‘volver el rostro/dirigirse’ se expresa de modo natural en español con ‘me volveré hacia ustedes’, conservando la imagen de atención favorable.
- source_word: וְנֶעֱבַדְתֶּם
  english_pob_choice: you will be cultivated
  chosen_spanish: serán cultivados
  alternatives_spanish:
  - serán trabajados
  - serán labrados
  lexicon: HALOT
  rationale: El nifal de עבד aquí es agrícola; ‘cultivados’ comunica que la tierra será trabajada, no que las personas presten servicio.
- source_word: וְנִזְרַעְתֶּם
  english_pob_choice: and sown
  chosen_spanish: y sembrados
  alternatives_spanish:
  - y plantados
  - y sembrados nuevamente
  lexicon: HALOT
  rationale: ‘Sembrados’ reproduce de forma directa el sentido agrícola del nifal de זרע y empareja naturalmente con ‘cultivados’.
theological_decisions:
- issue: Sentido de אֲלֵיכֶם tras הִנְנִי
  english_pob_reading: I am for you
  chosen_spanish_reading: yo estoy por ustedes
  alternative_spanish_readings:
  - yo estoy hacia ustedes
  - estoy de su parte
  rationale: El contexto habla de la favorable reanudación de la acción divina sobre la tierra de Israel. ‘Por ustedes’ mantiene el matiz de favor/beneficio sin añadir formulaciones doctrinales ajenas al hebreo.
  doctrine_reference: 'Translation philosophy: primacía del texto original; preservar el sentido llano y el favor divino implícito.'
translation_notes:
  revision_awareness: El texto inglés auditado mantiene alta concordancia con el hebreo y no registra revisiones aplicadas; esta versión española sigue esa lectura sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino según el estándar del proyecto, aunque en este versículo no aparece explícitamente en el hebreo transmitido.
  - Se conserva el registro profético solemne con ‘he aquí’ y una sintaxis clara para lectura eclesial moderna.
  - Los verbos agrícolas se mantienen en voz pasiva para reflejar el nifal y evitar interpretaciones no agrícolas.
