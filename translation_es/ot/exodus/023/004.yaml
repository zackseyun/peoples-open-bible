translation:
  language: es
  text: Si encuentras el buey de tu enemigo o su asno andando perdido[a], deberás devolvérselo sin falta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando encuentres el buey de tu enemigo o su asno vagando».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En material legal casuístico, כִּי introduce una condición. «Si» reproduce mejor esa estructura en español; «Cuando» también es posible, pero aquí suena menos claramente condicional.
- source_word: תִפְגַּע
  english_pob_choice: you come upon
  chosen_spanish: encuentres
  alternatives_spanish:
  - te encuentres con
  - topes con
  - halles
  lexicon: HALOT
  rationale: El verbo expresa un encuentro incidental. «Encuentres» en esta construcción legal es natural en español y conserva la idea de llegar a dar con algo por camino.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - ox
  - toro
  lexicon: HALOT
  rationale: En español bíblico, «buey» comunica con claridad el animal de labor del contexto agrario. «Ox» sería más técnico o anglicado; «toro» puede sugerir un macho reproductor más que un animal de trabajo.
- source_word: אֹיִבְךָ
  english_pob_choice: your enemy’s
  chosen_spanish: de tu enemigo
  alternatives_spanish:
  - de tu adversario
  - de quien te odia
  lexicon: HALOT
  rationale: El sustantivo אֹיֵב debe conservar su fuerza como «enemigo». En español, la posesión natural se expresa con «de tu enemigo» en vez de un genitivo posesivo inglés.
- source_word: חֲמֹרוֹ
  english_pob_choice: his donkey
  chosen_spanish: su asno
  alternatives_spanish:
  - su burro
  - su mula
  lexicon: HALOT
  rationale: חֲמוֹר designa el asno/donkey. «Asno» mantiene la referencia tradicional y precisa; «burro» es más coloquial, y «mula» sería incorrecta.
- source_word: תֹּעֶה
  english_pob_choice: going astray
  chosen_spanish: extraviándose
  alternatives_spanish:
  - vagando
  - desviándose
  lexicon: HALOT
  rationale: El participio describe al animal en proceso de perder el camino. «Extraviándose» conserva ese matiz progresivo sin añadir la idea de pérdida definitiva.
- source_word: הָשֵׁב תְּשִׁיבֶנּוּ
  english_pob_choice: you must surely return it
  chosen_spanish: sin falta se lo devolverás
  alternatives_spanish:
  - ciertamente se lo devolverás
  - deberás devolverlo sin falta
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica el mandato. «Sin falta se lo devolverás» reproduce la fuerza enfática en español y mantiene el objeto indirecto referencial implícito del pronombre.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: se lo
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El pronombre refiere al dueño/enemigo. En español, el clítico dativo «se lo» expresa naturalmente la restitución «a él» del animal sin forzar la sintaxis.
theological_decisions:
- issue: Mandato de devolver la propiedad de un enemigo
  english_pob_reading: The verse commands restoration of an enemy's wandering animal without softening 'enemy' to a neutral term.
  chosen_spanish_reading: El versículo manda devolver el animal extraviado de un enemigo sin suavizar la palabra «enemigo».
  alternative_spanish_readings:
  - devolver el animal de un adversario
  - devolver el animal de alguien que te odia
  rationale: 'La versión española conserva la tensión ética del hebreo: no se trata de un vecino neutral, sino de un enemigo. La formulación evita resolver la dureza del texto y preserva el llamado a la justicia y la misericordia práctica.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto base del proyecto inglés fue revisado y quedó sin cambios; la presente redacción española sigue esa lectura estable, pero ajusta la sintaxis para un español natural y manteniendo la fuerza legal y ética del hebreo.
  spanish_consistency_notes:
  - Se usa «buey» para שׁוֹר y «asno» para חֲמוֹר, evitando términos más coloquiales o ambiguos.
  - Se conserva «enemigo» para אֹיִבְךָ, en paralelo con la nota doctrinal de mantener la tensión moral.
  - «Sin falta» refleja el énfasis del infinitivo absoluto + verbo finito en hebreo.
  - El clítico «se lo» se usa para expresar la restitución al dueño sin añadir interpretación extra.
