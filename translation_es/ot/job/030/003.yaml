review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB inglés: privación, hambre, deterioro físico, acción desesperada sobre suelo árido, y ambiente nocturno de desolación. Sin embargo, no preserva completamente la huella de notas del audit trail inglés: falta en español una nota para אֶמֶשׁ (''en la noche'') y en cambio se añadió una nota a ''falta'' que no corresponde a una preservación prioritaria del aparato inglés. Además, ''ruina'' para וּמְשֹׁאָה es aceptable pero se aleja un poco del matiz de ''waste''/''yermo''.'
  spanish_quality_summary: La redacción es clara y natural en español eclesial moderno. 'Están consumidos' y 'royendo' son legibles y vigorosos. No obstante, la colocación de notas [a]/[b] está invertida respecto de la evidencia inglesa, y conviene ajustar el segundo sustantivo final para reflejar mejor el cuadro de desolación árida. 'de noche' suena más natural que 'en la noche' en este contexto poético.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son compatibles con el POB, pero conviene alinear mejor la nota sobre אֶמֶשׁ y preferir 'yermo' o 'desierto' frente a 'ruina' para representar mejor וּמְשֹׁאָה como paisaje devastado más que colapso estructural.
  issues:
  - severity: medium
    issue: Falta una nota para 'de noche' que preserve la decisión documentada sobre אֶמֶשׁ.
    rationale: El POB inglés conserva explícitamente que אֶמֶשׁ suele significar 'ayer/anoche' pero aquí se entiende más ampliamente como 'in the night'. Esa decisión significativa debe reflejarse en español.
  - severity: low
    issue: La nota sobre 'falta' no corresponde a una ambigüedad principal del aparato inglés y desplaza una nota más importante.
    rationale: Aunque 'falta' es defendible, el audit trail prioriza notas para la lectura alternativa completa y para אֶמֶשׁ. En una edición con notas limitadas, conviene conservar las documentadas.
  - severity: low
    issue: '''Ruina'' para וּמְשֹׁאָה es menos preciso que una opción de paisaje árido como ''yermo''.'
    rationale: El par שׁוֹאָה וּמְשֹׁאָה intensifica la desolación del paraje. 'Ruina' puede sugerir derrumbe de edificios; 'yermo' mantiene mejor el campo semántico del erial devastado.
  revised_spanish_text: Por falta y hambre están consumidos[a], royendo la tierra seca de noche[b], en desolación y yermo.
