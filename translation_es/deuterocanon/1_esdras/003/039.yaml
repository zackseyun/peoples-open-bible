translation:
  language: es
  text: y de ellas vinieron a existir[a], y estas los nutrieron, a los hombres que plantaron las viñas, de las cuales viene el vino[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nacieron de ellas». El griego dice más literalmente: «vinieron a ser de ellas».'
    reason: lexical_alternative
  - marker: b
    text: El demostrativo griego es femenino plural; por eso «estas» remite a mujeres y no a cosas indefinidas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de ellas
  - de parte de ellos
  - procedentes de ellos
  lexicon: LSJ
  rationale: ἐξ con genitivo expresa origen o procedencia. En español, «de ellos» comunica de manera natural que los hombres proceden de las mujeres mencionadas antes.
- source_word: ἐγένοντο
  english_pob_choice: they came to be
  chosen_spanish: vinieron a ser
  alternatives_spanish:
  - llegaron a ser
  - fueron hechos
  - nacieron
  lexicon: BDAG
  rationale: γίνομαι puede expresar llegar a existir o venir a ser. «Vinieron a ser» conserva el matiz de origen sin fijarlo de modo más estrecho que el griego.
- source_word: αὗται
  english_pob_choice: these women / these
  chosen_spanish: estas
  alternatives_spanish:
  - ellas
  - estas mujeres
  lexicon: LSJ
  rationale: El demostrativo es femenino plural. En español, «estas» preserva esa deixis sin añadir un sustantivo que el texto griego no repite en esta cláusula.
- source_word: ἐξέθρεψαν
  english_pob_choice: nourished
  chosen_spanish: los criaron
  alternatives_spanish:
  - los alimentaron
  - los nutrieron
  - los criaron y alimentaron
  lexicon: BDAG
  rationale: El verbo puede abarcar alimentar y criar. «Los criaron» es una opción idiomática en español que mantiene la idea de sustento y cuidado materno, sin sobretraducir.
- source_word: αὐτοὺς τοὺς φυτεύσαντας
  english_pob_choice: the men who planted / the very men who planted
  chosen_spanish: a los hombres que plantaron
  alternatives_spanish:
  - a los que plantaron
  - a los hombres mismos que plantaron
  lexicon: LSJ
  rationale: La estructura enfatiza a los sujetos con participio. En español, «a los hombres que plantaron» reproduce claramente el referente y la relación verbal; no se fuerza un énfasis adicional que el texto revisado inglés ya moderó.
- source_word: τοὺς ἀμπελῶνας
  english_pob_choice: the vineyards
  chosen_spanish: las viñas
  alternatives_spanish:
  - los viñedos
  - las viñas
  lexicon: LSJ
  rationale: ἀμπελών puede referirse al viñedo como plantación de vides. «Viñas» es más natural en español bíblico contemporáneo y conserva la imagen agrícola del pasaje.
- source_word: ἐξ ὧν ὁ οἶνος γίνεται
  english_pob_choice: from which wine comes
  chosen_spanish: de las cuales viene el vino
  alternatives_spanish:
  - de las cuales se hace el vino
  - de donde viene el vino
  lexicon: BDAG
  rationale: γίνεται expresa origen/resultante. «Viene el vino» es natural en español y mantiene la relación de procedencia sin introducir una pasiva o una formulación más técnica.
theological_decisions:
- issue: Referente femenino de αὗται
  english_pob_reading: The Greek feminine demonstrative means specifically 'these women,' not merely 'these things.'
  chosen_spanish_reading: «Estas» mantiene el femenino plural implícito sin explicitar «mujeres» en la línea principal.
  alternative_spanish_readings:
  - estas mujeres
  - ellas
  rationale: El texto griego señala un referente femenino, y el español puede conservar esa marca con el demostrativo femenino sin añadir sustantivo. Así se preserva la referencia y se evita una ampliación innecesaria.
  doctrine_reference: 'DOCTRINE.md: preservar el sentido del original y la claridad del referente sin introducir glosas en el texto principal.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego Swete 1909 y toma en cuenta el ajuste editorial del audit trail inglés que retiró «women» y «very». En español, se preserva el femenino con «estas» sin sobreexplicarlo en el cuerpo principal, y se mantiene la noción de origen con una construcción natural («vinieron a ser de ellos» / nota alternativa).
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene «vino» y «viñas» como vocabulario agrícola natural y bíblicamente transparente.
  - No se introduce «Cristo», «SEÑOR» ni otros términos no pertinentes al versículo.
  - La puntuación conserva una sola oración coordinada, acorde al paralelismo del griego.
