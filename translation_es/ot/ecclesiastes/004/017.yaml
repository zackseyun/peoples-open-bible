review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo y la línea del POB inglés: la advertencia sobre la conducta al acercarse a la casa de Dios, la prioridad de escuchar sobre el sacrificio irreflexivo, y la idea de que los necios no perciben que su acción es mala. Sin embargo, la construcción comparativa española «antes que para ofrecer» suena poco idiomática y debilita la relación directa entre escuchar y ofrecer.'
  spanish_quality_summary: 'El español es claro y digno en general. «Guarda tus pasos», «la casa de Dios» y «los necios» funcionan bien. La mejora necesaria es estilística y sintáctica: «acércate para escuchar en vez de ofrecer...» o «más que para ofrecer...» comunica mejor el contraste. También conviene ajustar la nota b para que su formulación sea plenamente natural en español.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» corresponde bien a הָאֱלֹהִים en este contexto; no aplica «Yahvé». «Los necios» preserva el valor sapiencial de הַכְּסִילִים. «Escuchar» mantiene bien la fuerza de לִשְׁמֹעַ.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: «antes que para ofrecer»'
    rationale: Aunque intenta reflejar el inglés «rather than to offer», en español suena forzado. El hebreo expresa contraste de preferencia; «en vez de ofrecer» o «más bien que ofrecer» lo comunica con mayor naturalidad y fidelidad.
  - severity: low
    issue: Nota b formulada de manera algo torpe
    rationale: «O «oír» en lugar de «escuchar»» es comprensible, pero «O «para oír» en lugar de «para escuchar»» coincide mejor con el segmento anotado y suena más completo.
  revised_spanish_text: Guarda tus pasos cuando vayas a la casa de Dios[a], y acércate para escuchar[b] en vez de ofrecer el sacrificio de los necios[c], porque no saben que hacen el mal.
  revised_footnotes:
