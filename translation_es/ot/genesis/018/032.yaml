    reason: lexical_alternative
  - marker: b
    text: Hebrew simply says, “I will not destroy for the sake of the ten,” with the object understood from context.
    reason: lexical_alternative
  - marker: c
    text: Or 'Please do not let my lord be angry'.
    reason: previous_rendering
