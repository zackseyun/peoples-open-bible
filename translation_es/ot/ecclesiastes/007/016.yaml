  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto en este versículo. Las decisiones léxicas «justo», «demasiado», «te hagas sabio» y «arruinarte» están bien justificadas y alineadas con el expediente inglés y la evidencia hebrea. Las notas conservan correctamente las alternativas significativas.
