    issue: «mató» sobretraduce וַיַּךְ בָּהּ
    rationale: El hebreo usa נכה, ‘golpear/herir/abatir’, y la auditoría inglesa escogió ‘struck down’ precisamente para comunicar el desenlace letal sin convertir el verbo en ‘kill’. En español, «abatió» conserva esa misma decisión semántica mejor que «mató».
  - severity: low
