translation:
  language: es
  text: Dichosa tú[a], oh tierra, cuando tu rey es hijo de nobles[b], y tus príncipes comen a su debido tiempo[c], para fuerza y no para embriaguez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bienaventurada tú, oh tierra». El hebreo אַשְׁרֵי también puede expresarse como «bienaventurada» o «feliz».
    reason: lexical_alternative
  - marker: b
    text: O «de noble linaje» o, más literalmente, «un hijo de nobles».
    reason: lexical_alternative
  - marker: c
    text: Lit. «para fuerza y no para beber»; el sentido es comer para vigor y no para la intemperancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֵיךְ
  english_pob_choice: Happy are you
  chosen_spanish: ¡Feliz eres tú!
  alternatives_spanish:
  - Bienaventurada eres tú
  - Dichosa eres tú
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa una condición de bienestar o dicha en estilo sapiencial. En español, «Feliz» comunica esa idea de manera natural y digna. Se evita «bienaventurada» como forma más eclesiástica que puede sugerir una bendición explícita más que un estado de dicha.
- source_word: אֶרֶץ
  english_pob_choice: O land
  chosen_spanish: oh tierra
  alternatives_spanish:
  - oh país
  - oh territorio
  lexicon: HALOT
  rationale: El vocativo se conserva con «oh» y «tierra», que mantiene el tono poético y la dirección a una colectividad/polidad. «País» es posible, pero menos cercano al registro bíblico y menos amplio en matiz.
- source_word: שֶׁמַּלְכֵּךְ
  english_pob_choice: when your king
  chosen_spanish: cuando tu rey
  alternatives_spanish:
  - cuyo rey
  - si tu rey
  lexicon: HALOT
  rationale: En español, «cuando tu rey» reproduce bien el sentido descriptivo-condicional del hebreo en esta felicitación, con mayor fluidez que una construcción relativa más pesada. Se mantiene la referencia directa a la tierra.
- source_word: בֶּן חוֹרִים
  english_pob_choice: a son of nobles
  chosen_spanish: hijo de nobles
  alternatives_spanish:
  - de noble linaje
  - hijo de hombres libres
  lexicon: HALOT
  rationale: «Hijo de nobles» sigue de cerca la forma hebrea y preserva la tensión entre nobleza y la imaginería social de los versículos vecinos. «Hombres libres» es lexicamente posible, pero en español suena menos natural en este contexto real/cortesano.
- source_word: וְשָׂרַיִךְ
  english_pob_choice: and your princes
  chosen_spanish: y tus príncipes
  alternatives_spanish:
  - y tus oficiales
  - y tus gobernantes
  lexicon: HALOT
  rationale: «Príncipes» conserva el marco cortesano del pasaje y corresponde bien a שָׂרִים en este contexto. «Oficiales» y «gobernantes» son más genéricos y pierden parte del color real.
- source_word: בָּעֵת
  english_pob_choice: at the proper time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en el momento adecuado
  - en tiempo oportuno
  lexicon: HALOT
  rationale: La expresión española idiomática «a su debido tiempo» comunica la idea de tiempo apropiado u oportuno sin sobrerrepresentar el texto. Mantiene el contraste implícito con el exceso del versículo anterior.
- source_word: יֹאכֵלוּ
  english_pob_choice: eat
  chosen_spanish: comen
  alternatives_spanish:
  - comerán
  - banquetean
  lexicon: HALOT
  rationale: Se conserva el verbo básico «comen», como el inglés POB retuvo «eat». Aunque el contexto es cortesano, no se amplía a «banquetean» para no añadir una intensificación que el hebreo no exige.
- source_word: בִּגְבוּרָה
  english_pob_choice: for strength
  chosen_spanish: para fortaleza
  alternatives_spanish:
  - para vigor
  - con fuerza
  lexicon: HALOT
  rationale: 'גְּבוּרָה puede denotar fuerza, vigor o poder. «Para fortaleza» conserva la fuerza sustantiva del término y funciona bien en español como finalidad del comer: comer para sostenerse y no para indulgencia.'
- source_word: וְלֹא בַשְּׁתִי
  english_pob_choice: and not for drunkenness
  chosen_spanish: y no para embriaguez
  alternatives_spanish:
  - y no para beber en exceso
  - y no para borrachera
  lexicon: HALOT
  rationale: El hebreo contrasta el comer orientado a la fortaleza con el comer/beber como exceso. «Embriaguez» captura ese desenlace vicioso con un registro digno; «borrachera» sería más coloquial. Se evita «beber» a secas porque debilita la oposición moral del versículo.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios; el consenso del control cruzado fue de alta concordancia, con observaciones menores. Esta propuesta sigue de cerca esas decisiones léxicas y conserva la misma estructura semántica, adaptándola a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige explícitamente; este versículo no lo contiene.
  - Se conserva «príncipes» para שָׂרִים por coherencia con el registro cortesano del contexto.
  - Se evita «bienaventurada» en el texto principal para no introducir una tonalidad litúrgica no requerida por אַשְׁרֵי en este contexto sapiencial.
  - «Embriaguez» refleja la oposición moral del final del versículo mejor que una traducción demasiado literal como «beber».
