translation:
  language: es
  text: 'Pero le dijo: «Cierto hombre estaba haciendo una gran cena[a] e invitó a muchos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran banquete» o «una gran comida principal». El griego δεῖπνον denota la comida principal; en este contexto es una comida formal ofrecida por un anfitrión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν αὐτῷ
  english_pob_choice: But he said to him
  chosen_spanish: Pero él le dijo[a]
  alternatives_spanish:
  - Y él le dijo[a]
  - Entonces él le dijo[a]
  lexicon: BDAG
  rationale: δέ funciona aquí como una transición discursiva suave; «Pero» conserva el giro narrativo sin forzar una oposición fuerte. El pronombre explícito «él» mantiene la referencia al hablante en español. Se conserva el complemento indirecto con clítico («le»), natural y fiel al dativo αὐτῷ.
- source_word: Ἄνθρωπός τις
  english_pob_choice: A certain man
  chosen_spanish: Un hombre cierto
  alternatives_spanish:
  - Cierto hombre
  - Alguien
  lexicon: BDAG
  rationale: τις añade indefinición específica en un marco narrativo parabólico. «Un hombre cierto» refleja esa indefinición con naturalidad suficiente en español, preservando el valor de «a certain man» sin perder la nota de personaje no identificado.
- source_word: ἐποίει
  english_pob_choice: was making
  chosen_spanish: estaba haciendo
  alternatives_spanish:
  - estaba preparando
  - hacía
  - estaba elaborando
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso en el pasado. «Estaba haciendo» sigue de cerca el valor verbal de ἐποίει, aunque en español «estaba preparando» sería más idiomático para el contexto del banquete; se elige «haciendo» para mantener la correspondencia léxica sin abandonar la fluidez básica.
- source_word: δεῖπνον μέγα
  english_pob_choice: a great dinner
  chosen_spanish: una gran cena
  alternatives_spanish:
  - un gran banquete
  - una gran comida
  - una gran cena formal
  lexicon: BDAG
  rationale: δεῖπνον nombra la comida principal, a menudo la cena. «Cena» comunica bien el valor temporal y contextual en español; «gran» traduce μέγα de forma directa. «Banquete» es una alternativa posible, pero introduce un matiz más festivo que el sustantivo griego por sí solo.
- source_word: καὶ ἐκάλεσεν πολλούς
  english_pob_choice: and invited many
  chosen_spanish: y llamó a muchos
  alternatives_spanish:
  - e invitó a muchos
  - y convocó a muchos
  lexicon: BDAG
  rationale: En contexto de comida ofrecida, καλέω suele significar «invitar», pero también mantiene el sentido básico de «llamar». Aquí se preserva «llamó» para seguir de cerca el verbo griego, dejando que el contexto del banquete complete el sentido de invitación. «A muchos» reproduce el acusativo plural sin añadir explicaciones.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y toma en cuenta el audit trail inglés, pero adopta decisiones más literales en dos puntos: ἐποίει se conserva como «estaba haciendo» y καλέω como «llamó» para no borrar la tensión entre el sentido básico del verbo y su uso contextual en el banquete. Se evita «SEÑOR» u otra convencionalización no presente en el versículo.'
  spanish_consistency_notes:
  - Se mantiene el registro narrativo sobrio y publicable, con comillas angulares españolas.
  - Se usa «cena» como equivalente principal de δεῖπνον, consistente con el valor de comida principal y con el contexto de invitación formal.
  - Se conserva la apertura con «Pero» para reflejar la transición discursiva del griego δέ.
  - No hay decisiones doctrinales específicas en este versículo.
