translation:
  language: es
  text: Mira[a], los ojos del Señor Yahvé están sobre el reino pecador, y lo destruiré de la faz de la tierra. Sin embargo, no destruiré del todo la casa de Jacob —declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí». La partícula hebrea introduce una proclamación solemne y llama la atención sobre el anuncio.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  - Observa
  lexicon: HALOT
  rationale: La partícula deíctica introduce un anuncio solemne y llama la atención. «¡Mira!» conserva la fuerza exhortativa sin sonar arcaico en español.
- source_word: עֵינֵי
  english_pob_choice: the eyes of
  chosen_spanish: los ojos de
  alternatives_spanish:
  - la mirada de
  - los ojos
  lexicon: HALOT
  rationale: Se mantiene la imagen plural del hebreo para comunicar atención enfocada y vigilante de Dios, aquí con sentido judicial.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor DIOS
  lexicon: HALOT
  rationale: El hebreo combina un título de señorío con el nombre divino. En español se prioriza el nombre de pacto «Yahvé», conforme al criterio del proyecto, evitando la máscara «SEÑOR». La referencia al título se absorbe naturalmente en el contexto como sujeto divino.
- source_word: בַּמַּמְלָכָה הַחַטָּאָה
  english_pob_choice: on the sinful kingdom
  chosen_spanish: sobre el reino pecador
  alternatives_spanish:
  - contra el reino pecador
  - sobre el reino que peca
  - sobre el reino sin ley
  lexicon: HALOT
  rationale: El hebreo describe al reino por su cualidad moral. «Pecador» reproduce la caracterización sin suavizarla ni forzar una abstracción como «pecaminoso».
- source_word: וְהִשְׁמַדְתִּי אֹתָהּ
  english_pob_choice: and I will destroy it
  chosen_spanish: y lo destruiré
  alternatives_spanish:
  - y lo aniquilaré
  - y lo exterminaré
  - y lo borraré
  lexicon: HALOT
  rationale: El verbo intensivo de שׁמד expresa destrucción real y fuerte. «Destruir» comunica el juicio sin añadir matices más violentos o técnicos que el texto no exige.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the earth
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de sobre la superficie de la tierra
  - de la faz de la tierra
  - de sobre la tierra
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo «de sobre la faz de la tierra», que en español suena solemne y fiel al original. Se evita «suelo» o «tierra» a secas para no perder la fórmula establecida.
- source_word: אֶפֶס כִּי
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Pero
  - Con todo
  lexicon: HALOT
  rationale: La locución introduce una fuerte concesión o corrección al juicio anterior. «Sin embargo» expresa bien el giro adversativo en español moderno.
- source_word: לֹא הַשְׁמֵיד אַשְׁמִיד
  english_pob_choice: I will not utterly destroy
  chosen_spanish: no destruiré del todo
  alternatives_spanish:
  - no destruiré completamente
  - no aniquilaré por completo
  - no acabaré del todo con
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto con verbo finito intensifica la negación. «Del todo» reproduce la idea de destrucción total negada, sin perder naturalidad en español.
- source_word: אֶת בֵּית יַעֲקֹב
  english_pob_choice: the house of Jacob
  chosen_spanish: la casa de Jacob
  alternatives_spanish:
  - la casa de Israel
  - el linaje de Jacob
  - el pueblo de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión covenantal y nacional tradicional. «Casa de Jacob» conserva el eco bíblico y la referencia al pueblo descendiente de Jacob.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé
  alternatives_spanish:
  - —dice Yahvé
  - —oráculo de Yahvé
  - —afirma Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se rinde con una cláusula breve y solemne. «Declara Yahvé» preserva el registro profético y el nombre divino del proyecto.
theological_decisions:
- issue: Nombre divino en dos construcciones distintas
  english_pob_reading: Use 'the Lord GOD' for אֲדֹנָי יְהוִה and 'Yahweh' for נְאֻם יְהוָה
  chosen_spanish_reading: Usar «Yahvé» en ambos lugares, con una redacción que evite duplicar títulos artificialmente
  alternative_spanish_readings:
  - el Señor DIOS ... declara Yahvé
  - Yahvé ... declara Yahvé
  - el Señor Yahvé ... declara Yahvé
  rationale: El hebreo distingue una combinación titulativa y luego el nombre divino en fórmula profética. En español, «Yahvé» comunica el nombre del pacto de manera uniforme y evita la máscara devocional «SEÑOR». La posible tensión entre título y nombre se conserva implícitamente en el contexto, sin introducir una construcción extraña.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Juicio total contra el reino, pero no aniquilación total de la casa de Jacob
  english_pob_reading: Translate the verse to affirm destruction of the sinful kingdom but not the total destruction of the house of Jacob
  chosen_spanish_reading: Afirmar destrucción del reino pecador, pero no destrucción total de la casa de Jacob
  alternative_spanish_readings:
  - afirmar solo una destrucción parcial del reino
  - suavizar el juicio sobre el reino
  - leer la segunda cláusula como mera moderación del castigo
  rationale: El hebreo contrapone con fuerza el juicio sobre el reino y la negación de una destrucción exhaustiva de Jacob. La traducción mantiene esa tensión teológica sin resolverla en una sola dirección.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no cambió el texto base; el cotejo final indica alta concordancia con solo observaciones menores. Se mantuvo la decisión de preservar la tensión entre juicio total sobre el reino y preservación no total de la casa de Jacob, así como el uso del nombre divino «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה, en coherencia con el criterio del proyecto.
  - Se conserva «casa de Jacob» para el grupo nacional/covenantal, evitando una glosa interpretativa.
  - La fórmula «de sobre la faz de la tierra» reproduce el giro hebreo y su tono bíblico sin caer en calco rígido en otros contextos.
