revisions:
- from: Pero tú, en tus abundantes misericordias[a], no los abandonaste en el desierto. La columna de nube no se apartó de encima de ellos de día, para guiarlos en el camino; ni la columna de fuego de noche, para darles luz en el camino en que habían de ir.
  to: Pero tú, en tus abundantes misericordias[a], no los abandonaste en el desierto. La columna de nube no se apartó de sobre ellos de día, para guiarlos en el camino, ni la columna de fuego de noche, para darles luz por el camino que debían seguir.
  rationale: 'Se conserva el contenido y las decisiones léxicas principales del borrador, pero se ajusta la redacción para un español más natural y preciso: se suaviza ‘de encima de’ a ‘de sobre’, se elimina el punto y coma innecesario, y se reformula la cláusula final para expresar con mayor claridad que la columna de fuego daba luz respecto al camino que debían recorrer. La nota se mantiene, con comillas tipográficas y anclada a la frase traducida correspondiente.'
  reviewer_model: gpt-5.4
