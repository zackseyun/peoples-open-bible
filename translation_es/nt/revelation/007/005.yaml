translation:
  language: es
  text: de la tribu de Judá[a], doce mil sellados; de la tribu de Rubén, doce mil; de la tribu de Gad, doce mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «de la tribu de Judá, doce mil fueron sellados». El griego usa un participio pasivo («sellados») después del primer conteo tribal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - procedentes de
  - de entre
  lexicon: BDAG
  rationale: En una lista tribal, ἐκ marca origen/procedencia. En español, «de la tribu de» es la forma natural y fiel para repetir la fórmula sin forzar una perífrasis más pesada.
- source_word: φυλῆς
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  lexicon: BDAG
  rationale: En contextos genealógicos de Israel, «tribu» mantiene la estructura histórica y bíblica del listado; «clan» rebajaría indebidamente el nivel colectivo.
- source_word: Ἰούδα
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Juda
  lexicon: transliteration standard
  rationale: Para el nombre tribal se usa la forma bíblica española establecida «Judá», más natural y reconocible que una transliteración menos asentada.
- source_word: δώδεκα χιλιάδες
  english_pob_choice: twelve thousand
  chosen_spanish: doce mil
  alternatives_spanish:
  - doce millares
  lexicon: BDAG
  rationale: La cifra se traduce directamente. «Doce mil» conserva el valor numérico sin añadir unidades interpretativas que el griego no explicita.
- source_word: ἐσφραγισμένοι
  english_pob_choice: were sealed
  chosen_spanish: sellados
  alternatives_spanish:
  - fueron sellados
  - sellados eran
  lexicon: BDAG
  rationale: El participio pasivo funciona como rasgo del grupo contado. En español, «sellados» mantiene la concisión del griego y deja la relación verbal implícita, como permite el orden del texto fuente.
- source_word: Ῥουβὴν
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Ruben
  lexicon: transliteration standard
  rationale: Se adopta la forma bíblica española «Rubén», de uso asentado y fiel al nombre tribal.
- source_word: Γὰδ
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: transliteration standard
  rationale: El nombre coincide con la forma española estándar; no requiere adaptación adicional.
theological_decisions:
- issue: Valor del participio pasivo ἐσφραγισμένοι en la primera cláusula del listado
  english_pob_reading: '''from the tribe of Judah, twelve thousand sealed'' / ''were sealed'' made explicit in English, with the participle understood across the list.'
  chosen_spanish_reading: «doce mil sellados» en la primera cláusula, con el mismo rasgo entendido para la enumeración paralela.
  alternative_spanish_readings:
  - «doce mil fueron sellados»
  - «doce mil, sellados»
  rationale: El griego coloca el participio después del primer número y deja su alcance ligado al grupo enumerado. La opción española conserva esa tensión sin sobreexplicar; al mismo tiempo, evita sonar artificialmente pasiva en cada miembro del listado.
  doctrine_reference: optimal equivalence; preservar la relación gramatical y la tensión textual sin resolverla en exceso
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto base: no se reportaron cambios necesarios en el inglés auditado, y el español sigue la misma decisión de hacer explícita la fuerza pasiva del participio en la primera cláusula sin repetirla mecánicamente en las siguientes.'
  spanish_consistency_notes:
  - Se conserva la fórmula repetida «de la tribu de…» para mantener el paralelismo del griego.
  - «Sellados» se deja en la primera cláusula como participio adjetival; la nota aclara la alternativa más formal con verbo explícito.
  - 'Se usan formas bíblicas españolas estables: Judá, Rubén y Gad.'
  - No se agrega una palabra equivalente a «personas» o «hombres», porque el texto fuente solo expresa la cuenta numérica.
