  text: וּ/צְבִ֤י עֶדְי/וֹ֙ לְ/גָא֣וֹן שָׂמָ֔/הוּ וְ/צַלְמֵ֧י תוֹעֲבֹתָ֛/ם שִׁקּוּצֵי/הֶ֖ם עָ֣שׂוּ ב֑/וֹ עַל כֵּ֛ן נְתַתִּ֥י/ו לָ/הֶ֖ם לְ/נִדָּֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/007/020.yaml
  text: And they made the beauty of his ornament into pride[a], and in it they made the images of their abominations, their detestable things[b]; therefore I have made it an unclean thing to them.
  footnotes:
  - marker: a
    text: Or 'they made with it the images of their abominations, their detestable idols.' The Hebrew phrase 'made in/with it' may indicate either location or material/instrument.
    reason: lexical_alternative
  - marker: b
    text: '''Unclean thing'' translates a Hebrew term associated with ritual impurity; alternatively, ''something to be rejected.'''
    reason: lexical_alternative
