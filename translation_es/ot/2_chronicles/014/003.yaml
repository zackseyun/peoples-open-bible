    text: O «consultar a Yahvé»; el verbo hebreo puede incluir buscarlo en adoración, dependencia o consulta.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus padres»; alternativamente, «sus antepasados».'
    reason: lexical_alternative
  revision_rationale: Se corrige la frase inicial para eliminar la discordancia de «les dijo a Judá» sin expandir innecesariamente el sujeto colectivo. También se ajusta la nota a para que presente una alternativa léxica real al verbo principal, conforme al rastro de auditoría inglés y al valor semántico de דרש.
