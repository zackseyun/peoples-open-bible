translation:
  language: es
  text: Y lo pondrás[a] sobre un cordón[b] azul[c], y estará sobre el turbante; estará en la parte frontal del turbante[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo colocarás» o «lo pondrás».
    reason: lexical_alternative
  - marker: b
    text: El hebreo פְּתִיל puede significar también «hilo» o «cordel».
    reason: lexical_alternative
  - marker: c
    text: O «de azul», «azul púrpura» o «violeta». El término hebreo designa el color distintivo usado en materiales cultuales.
    reason: lexical_alternative
  - marker: d
    text: La frase hebrea indica literalmente una colocación «hacia/enfrente de la parte frontal del turbante», es decir, en su lado delantero.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ אֹתוֹ
  english_pob_choice: And you shall put it
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y lo colocarás
  - Y lo pondrás
  lexicon: HALOT
  rationale: שׂים pide una acción instructiva directa; en español, «poner» comunica con naturalidad la orden sin perder la fuerza imperativa. El objeto directo se sobreentiende por el contexto del verso anterior, por lo que puede omitirse sin alterar el sentido.
- source_word: פְּתִיל
  english_pob_choice: cord
  chosen_spanish: cordón
  alternatives_spanish:
  - cordel
  - hilo
  - cuerda
  lexicon: HALOT
  rationale: פְּתִיל puede abarcar hilo, cuerda o cordón. «Cordón» mantiene la idea de un elemento de sujeción y suena más natural en español para un accesorio del atuendo sacerdotal, sin reducirlo indebidamente a un hilo delgado.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul intenso
  - azul púrpura
  - violeta
  lexicon: HALOT
  rationale: תְּכֵלֶת designa el color azul característico de materiales cultuales. «Azul» es la equivalencia más clara y estable en español; se evita precisar matices cromáticos más allá de lo que el hebreo garantiza.
- source_word: מִצְנֶפֶת
  english_pob_choice: turban
  chosen_spanish: turbante
  alternatives_spanish:
  - turbante sacerdotal
  - mitra
  lexicon: HALOT
  rationale: מִצְנֶפֶת nombra la prenda enrollada para la cabeza del sumo sacerdote. «Turbante» es el equivalente estándar y comprensible en español; «mitra» introduciría una asociación eclesiástica no exigida por el hebreo.
- source_word: אֶל מוּל פְּנֵי
  english_pob_choice: at the front of
  chosen_spanish: en la parte frontal de
  alternatives_spanish:
  - frente a
  - hacia la parte frontal de
  - delante de
  lexicon: HALOT
  rationale: La secuencia expresa orientación hacia la cara/frente del objeto. «En la parte frontal de» conserva la idea espacial sin volverla ambigua en español; evita traducir demasiado literalmente con «frente a», que podría sugerir oposición más que ubicación.
- source_word: יִהְיֶה
  english_pob_choice: it shall be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  - permanecerá
  lexicon: HALOT
  rationale: El imperfecto final reafirma la ubicación requerida. En español, «estará» transmite de manera natural la permanencia posicional que el hebreo reiterativo comunica.
theological_decisions:
- issue: Terminología del tocado sacerdotal
  english_pob_reading: turban
  chosen_spanish_reading: turbante
  alternative_spanish_readings:
  - mitra
  - tocado
  rationale: No hay un problema doctrinal, pero sí terminológico. «Turbante» reproduce con fidelidad la prenda descrita; se evita «mitra» porque desplaza el texto hacia un uso litúrgico posterior y menos transparente para el lector.
  doctrine_reference: Éxodo 28:36-38; vestiduras del sumo sacerdote
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador sigue el pasaje hebreo directo y el juicio de alta concordancia del control cruzado, manteniendo la equivalencia óptima de la POB en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la POB, aunque este versículo no contiene el nombre divino.
  - Se preserva la terminología cultual sin sustituirla por vocabulario eclesiástico posterior.
  - La repetición de la localización («estará... estará») refleja el doble énfasis del hebreo sin sobrerredactar el verso.
