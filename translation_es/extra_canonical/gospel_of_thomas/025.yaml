base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/025.yaml
  text: Jesus said[a], Love your brother as your soul[e][d][c][b]; guard him as the pupil of your eye.
  footnotes:
  - marker: a
    text: ‘Soul’ translates ψυχή (ⲯⲩⲭⲏ), which can also mean ‘life’ or ‘self.’
    reason: lexical_alternative
  - marker: b
    text: The manuscript line shows ⲙ̄ⲙⲟϥ (direct object ‘him’), while the normalized form has ⲛⲛⲧⲟϥ (‘for him’). Either way, the sense is ‘guard/protect him.’
    reason: textual_variant
  - marker: c
    text: ‘Pupil of your eye’ is literal; later idiom ‘apple of your eye’ is traditional in English but not required by the Coptic lexeme ⲡⲉⲗⲟⲩ.
    reason: lexical_alternative
  - marker: d
    text: 'Compare the Hebrew Bible motif: Deut 32:10; Ps 17:8; Prov 7:2 (LXX).'
    reason: cross_reference
  - marker: e
    text: The comparative is written ⲛ̄ⲑⲉ in the manuscript but normalized as ⲛⲡϩⲉ; both mean ‘as/like’ in Sahidic/Lycopolitan usage.
    reason: dialect_note
