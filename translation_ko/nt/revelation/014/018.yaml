  language: ko
  text: '또 다른 천사, 곧 불을 다스리는 권세를 가진 천사가 제단에서 나와, 날카로운 낫을 가진 자에게 큰 음성으로 외쳐 말하였습니다. 「네 날카로운 낫을 보내어 땅의 포도나무에서 그 송이들을 거두어라. 그 포도가 무르익었기 때문이다.」'
