translation:
  language: es
  text: Mis siervos los bajarán desde el Líbano hasta el mar[a], y yo los convertiré en balsas por el mar hasta el lugar que tú me indiques, y allí las desharé; y tú te los llevarás[b]. Y tú harás lo que yo deseo, dando alimento para mi casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «balsas de troncos».
    reason: lexical_alternative
  - marker: b
    text: Lit. «pan para mi casa»; aquí «pan» probablemente significa alimento o provisiones para la casa real de Hiram.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis siervos
  alternatives_spanish:
  - mis servidores
  - mis esclavos
  lexicon: HALOT
  rationale: En este contexto real y administrativo, עֲבָדַי señala a los trabajadores/servidores de Hiram. «Siervos» conserva la relación de servicio sin introducir la dureza de «esclavos», que aquí no es el foco.
- source_word: יֹרִדוּ
  english_pob_choice: will bring down
  chosen_spanish: los bajarán
  alternatives_spanish:
  - los traerán abajo
  - los descenderán
  lexicon: HALOT
  rationale: El hifil expresa causar el descenso; «bajarán» reproduce bien la acción de llevar la madera desde el Líbano hacia la costa.
- source_word: יָמָּה
  english_pob_choice: to the sea
  chosen_spanish: hasta el mar
  alternatives_spanish:
  - al mar
  - mar adentro
  lexicon: HALOT
  rationale: 'Aquí el destino es concreto: desde el Líbano hasta la costa/mar para el transporte marítimo. «Hasta el mar» conserva la dirección sin forzar un matiz adverbial.'
- source_word: אֲשִׂימֵם
  english_pob_choice: I will make them
  chosen_spanish: los convertiré
  alternatives_spanish:
  - los haré
  - los pondré
  lexicon: HALOT
  rationale: Con דֹּבְרוֹת como complemento predicativo, el sentido es transformar la madera en balsas/rafts, no solo colocarla. «Convertiré» expresa bien ese cambio de estado.
- source_word: דֹּבְרוֹת
  english_pob_choice: rafts
  chosen_spanish: balsas
  alternatives_spanish:
  - balsas de troncos
  - jangadas
  lexicon: HALOT
  rationale: El término designa maderos atados para flotar y transportarse. «Balsas» es natural en español y comunica la imagen; se evita «jangadas» por regionalismo.
- source_word: בַּיָּם
  english_pob_choice: on the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - en el mar
  - por el mar
  lexicon: HALOT
  rationale: La preposición puede describir la flotación sobre la superficie. «Sobre el mar» conserva la imagen visual de las balsas flotando.
- source_word: עַד הַמָּקוֹם אֲשֶׁר תִּשְׁלַח אֵלַי
  english_pob_choice: to the place that you direct me
  chosen_spanish: hasta el lugar que tú me indiques
  alternatives_spanish:
  - al lugar que tú me señales
  - al lugar que tú me envíes
  lexicon: HALOT
  rationale: שׁלח aquí tiene el valor práctico de señalar/determinar el destino. «Indiques» comunica bien la dirección logística sin añadir más de lo que el hebreo permite.
- source_word: וְנִפַּצְתִּים
  english_pob_choice: I will break them apart
  chosen_spanish: los desharé
  alternatives_spanish:
  - los romperé allí
  - los desarmaré
  lexicon: HALOT
  rationale: En contexto de balsas, נָפַץ apunta a deshacerlas o desarmarlas al llegar. «Desharé» es idiomático en español y retiene la idea de desmontaje.
- source_word: תִשָּׂא
  english_pob_choice: you will carry them away
  chosen_spanish: los recogerás
  alternatives_spanish:
  - te los llevarás
  - los transportarás
  lexicon: HALOT
  rationale: Tras deshacer las balsas, el verbo puede referirse a retirar/cargar la madera. «Recogerás» expresa de manera natural la toma y retiro del material en español.
- source_word: חֶפְצִי
  english_pob_choice: what I desire
  chosen_spanish: lo que yo deseo
  alternatives_spanish:
  - mi deseo
  - lo que quiero
  lexicon: HALOT
  rationale: El sustantivo denota deseo/voluntad. «Lo que yo deseo» mantiene la personalización del pedido y evita sobreinterpretar.
- source_word: לָתֵת לֶחֶם בֵּיתִי
  english_pob_choice: by giving food for my household
  chosen_spanish: al proveer alimento para mi casa
  alternatives_spanish:
  - dando pan para mi casa
  - al dar provisiones para mi casa
  lexicon: HALOT
  rationale: «Pan» funciona metonímicamente por alimento/provisiones, pero en español puede sonar demasiado literal. «Alimento» explicita el sentido de provisión doméstica sin perder la figura.
theological_decisions:
- issue: bread/food metonymy in לֶחֶם
  english_pob_reading: ‘bread’ likely means food or provisions for Hiram’s royal household.
  chosen_spanish_reading: ‘alimento’ para mi casa, entendido como provisiones domésticas.
  alternative_spanish_readings:
  - pan para mi casa
  - provisiones para mi casa
  rationale: El hebreo usa 'pan' metonímicamente; en español la explicación más clara y fiel al contexto es 'alimento', que preserva la idea de sustento sin inducir una lectura exclusivamente literal.
  doctrine_reference: Ninguna; decisión semántica y contextual.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «as far as the place you direct me» a «to the place that you direct me» por naturalidad; la versión española sigue ese valor de destino con «hasta el lugar que tú me indiques». También se mantuvo el sentido logístico de desarmar las balsas al llegar, no simplemente «dispersarlas».
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del nombre divino solo cuando aparece el Tetragrámaton; aquí no aplica.
  - Se eligió «siervos» para עֲבָדַי por el contexto cortesano y laboral, no «esclavos», porque el pasaje describe transporte de madera y provisiones.
  - «Balsas» traduce דֹּבְרוֹת con una solución clara y de uso amplio; se deja nota alternativa por la posibilidad de «balsas de troncos».
  - «Alimento» se usa para לֶחֶם en función metonímica, siguiendo el sentido de provisiones para la casa/mesa real.
