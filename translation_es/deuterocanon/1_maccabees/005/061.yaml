    rationale: El expediente fuente subraya que el término denota una vuelta a la huida, es decir, una derrota con colapso y fuga. «Derrota» no es falsa, pero sí más genérica y atenúa el matiz central que el POB quiso conservar con «rout».
  - severity: low
    issue: La nota a) explica mejor «desbandada» que «derrota», pero el texto principal no sigue ese análisis
    rationale: Hay una leve incoherencia entre la justificación lexical y la redacción elegida. Conviene alinear texto y nota.
