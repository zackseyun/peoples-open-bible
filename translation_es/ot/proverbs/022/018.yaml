  yaml_path: translation/ot/proverbs/022/018.yaml
  text: For it is pleasant if you keep them within you[b][a], if they are established together on your lips.
  footnotes:
  - marker: a
    text: Literally, 'in your belly,' a Hebrew expression for the inner person.
    reason: cultural_note
  - marker: b
    text: Or 'they will be ready together on your lips.' The verb may emphasize firm establishment or readiness for speech.
    reason: lexical_alternative
