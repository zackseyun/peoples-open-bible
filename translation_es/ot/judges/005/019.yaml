- from: Vinieron reyes; pelearon. Entonces pelearon los reyes de Canaán en Taanac[a], junto a las aguas de Meguido; no tomaron botín de plata.
  to: Vinieron reyes; pelearon. Entonces pelearon los reyes de Canaán en Taanac[a], junto a las aguas de Meguidó; no tomaron botín de plata.
