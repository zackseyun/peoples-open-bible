    text: O «vasos» o «implementos»; el hebreo puede abarcar los objetos sagrados del tabernáculo.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis principal para un español más natural («estará a cargo de»), se alinea mejor «aceite para la luz» con la decisión fuente/inglesa, y se restituyen notas léxicas relevantes preservadas en el expediente inglés. Los cambios son menores y no requieren adjudicación adicional.
