translation:
  language: es
  text: 'Al director del coro: con instrumentos de cuerda. Maskil[a] de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maskil» es un término técnico hebreo en los encabezados de los salmos; probablemente indica un tipo de composición o de ejecución, aunque su sentido preciso no es seguro.
    reason: lexical_alternative
  - marker: b
    text: O «por David» o «para David»; el encabezado hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Al maestro de coro
  - Al jefe de música
  - Al director musical
  lexicon: HALOT
  rationale: En los encabezados de los salmos, el término designa a quien dirige la ejecución musical. «Director del coro» comunica esa función de manera natural en español moderno y mantiene el sentido litúrgico/musical sin forzar un calco más antiguo.
- source_word: בִּנְגִינוֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - sobre instrumentos de cuerda
  - con música de cuerda
  - acompañado de instrumentos de cuerda
  lexicon: HALOT
  rationale: El sustantivo apunta a acompañamiento con instrumentos de cuerda. «Con instrumentos de cuerda» conserva la referencia instrumental explícita y es idiomático en español.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - Un maskil
  - Un canto instructivo
  - Un salmo contemplativo
  lexicon: HALOT
  rationale: Se conserva la transliteración porque se trata de un término técnico de encabezado cuyo sentido preciso es discutido. Traducirlo interpretativamente iría más allá de la evidencia disponible.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - de parte de David
  lexicon: HALOT
  rationale: La preposición permite autoría, dedicación o asociación. «De David» preserva mejor esa ambigüedad que una solución más cerrada como «por David» o «para David».
theological_decisions:
- issue: Ambigüedad del encabezado davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El encabezado puede señalar autoría, dedicación o asociación. La versión española conserva esa tensión sin resolverla, en línea con el tratamiento del texto fuente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el encabezado hebreo de WLC y mantiene las decisiones auditadas del POB en inglés: función musical de לַמְנַצֵּחַ, acompañamiento de cuerda para בִּנְגִינוֹת, transliteración de מַשְׂכִּיל por su valor técnico incierto y ambigüedad preservada en לְדָוִד. No se introdujeron cambios respecto al consenso del pasaje.'
  spanish_consistency_notes:
  - Se prefirió «director del coro» por ser una equivalencia natural y funcional, evitando el arcaísmo «maestro de coro» si no añade claridad.
  - «Instrumentos de cuerda» mantiene el sentido concreto de acompañamiento musical sin ampliar a «música» de forma innecesaria.
  - La transliteración «Maskil» evita una traducción interpretativa no asegurada por la evidencia.
  - «De David» conserva la apertura semántica del encabezado hebreo en español.
  - Se usó puntuación breve y solemne acorde con un encabezado de salmo.
