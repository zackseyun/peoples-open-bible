    issue: ‘Usar’ con ‘viña’ suena poco idiomático en español bíblico/literario.
    rationale: Aunque semánticamente posible, ‘usar una viña’ resulta más mecánico que ‘hacer uso de ella’ o ‘aprovecharla’. El expediente inglés revisó a ‘make use of it’ precisamente para conservar el verbo sin añadir ‘fruit’; en español ‘hacer uso de ella’ reproduce mejor esa decisión.
  - severity: low
    issue: Ligera pérdida de tono jurídico-formal en la repetición final.
    rationale: ‘Otro hombre la use’ es correcto, pero ‘otro hombre haga uso de ella’ mantiene mejor la correspondencia con la primera mención y el registro digno del pasaje legal.
