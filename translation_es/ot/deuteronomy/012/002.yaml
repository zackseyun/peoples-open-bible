review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: mandato enfático de destruir todos los lugares de culto de las naciones desposeídas, con la enumeración de montes, colinas y árboles frondosos. Sin embargo, omite en el texto el adverbio locativo implícito en עָבְדוּ שָׁם que el POB inglés preservó con ''there'', y la nota española actual se desvía del punto léxico principal preservado en el inglés.'
  spanish_quality_summary: El español es claro y natural, pero mezcla tuteo singular ('Debes') con plural ('ustedes están'), lo que afecta la coherencia estilística. También conviene alinear la única nota con la alternativa léxica relevante de 'sirvieron/adoraron allí' en vez de una nota sobre la intensificación, ya que la intensificación ya está bien expresada en el texto principal.
  glossary_alignment: No hay conflicto con la terminología de proyecto. 'sus dioses', 'las naciones', 'desposeyendo' y 'montes altos' están bien alineados. 'Deben' mejora la concordancia con 'ustedes'.
  issues:
  - severity: medium
    issue: Mezcla de segunda persona singular y plural
    rationale: El texto dice 'Debes' pero luego 'ustedes están desposeyendo'. En español bíblico neutral conviene mantener una sola persona gramatical.
  - severity: medium
    issue: La nota al pie no preserva la alternativa léxica documentada en el POB inglés
    rationale: La nota inglesa marca la alternativa 'worshiped their gods there' para עָבְדוּ שָׁם. La nota española actual trata la intensificación de אַבֵּד תְּאַבְּדוּן, algo ya adecuadamente resuelto en el texto principal y no el punto que el audit trail decidió conservar como nota.
  - severity: low
    issue: Falta 'allí' en la cláusula de servicio/culto
    rationale: Aunque no siempre es obligatorio en español, el hebreo incluye שָׁם y el inglés auditado lo conserva. Añadir 'allí' mejora la fidelidad sin volver el español torpe.
  revised_spanish_text: Deben destruir por completo todos los lugares donde las naciones que ustedes están desposeyendo sirvieron a sus dioses[a] allí, en los montes altos, en las colinas y debajo de todo árbol frondoso.
  revised_footnotes:
  - marker: a
    text: O “adoraron a sus dioses allí”. El verbo hebreo puede significar “servir” en el sentido de culto religioso.
    reason: lexical_alternative
