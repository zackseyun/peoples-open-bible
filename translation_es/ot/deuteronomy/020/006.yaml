revisions:
- from: ¿Y quién es el hombre que ha plantado una viña y no la ha usado aún[a]? Que vaya y vuelva a su casa, no sea que muera en la guerra y otro hombre la use.
  to: ¿Y quién es el hombre que ha plantado una viña y todavía no ha hecho uso de ella[a]? Que vaya y vuelva a su casa, no sea que muera en la guerra y otro hombre haga uso de ella.
  rationale: Ajusté ‘usar’ a ‘hacer uso de’ para que el español suene más natural y digno con ‘viña’, mientras sigue de cerca la revisión inglesa ‘make use of it’ y preserva el mismo verbo en ambas apariciones de חִלֵּל. También armonicé la nota para reflejar mejor la nueva redacción.
