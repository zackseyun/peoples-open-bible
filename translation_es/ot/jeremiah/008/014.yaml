    text: Or 'and be silent there' / 'and be destroyed there' for 'and perish there'; the Hebrew verb can carry senses of silence, stillness, or ruin.
    reason: lexical_alternative
  - marker: b
    text: Literally 'water of gall' or 'water of poison.'
    reason: lexical_alternative
