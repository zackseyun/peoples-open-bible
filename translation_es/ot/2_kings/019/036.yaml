translation:
  language: es
  text: Así, Senaquerib, rey de Asiria, se fue, partió y regresó; y habitó[a] en Nínive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «residió en Nínive». El verbo hebreo puede denotar habitar, residir, permanecer o establecerse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  english_pob_choice: departed
  chosen_spanish: se fue / partió
  alternatives_spanish:
  - partió
  - salió de allí
  lexicon: HALOT
  rationale: נסע en contexto de viaje expresa la acción de levantar el campamento o salir; en español, «partió» y «se fue» comunican con naturalidad la sucesión narrativa sin sobredetallar la imagen militar.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: se fue / partió
  alternatives_spanish:
  - fue
  - procedió
  lexicon: HALOT
  rationale: הלך mantiene el avance narrativo. En español conviene no duplicar mecánicamente con otro verbo demasiado idéntico; la secuencia «se fue, partió» conserva el encadenamiento de acciones del hebreo.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - retornó
  lexicon: HALOT
  rationale: שׁוב aquí indica volver a su lugar tras la campaña fallida. «Regresó» es claro y natural, y preserva el valor de retorno sin introducir matices de volver atrás más marcados de lo necesario.
- source_word: סַנְחֵרִיב
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennáquerib
  - Sennacherib
  lexicon: transliteration
  rationale: Se usa la forma española asentada «Senaquerib», que es reconocible y adecuada para lectura eclesial en español.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: La cadena constructa identifica el cargo real de Senaquerib. En español, «rey de Asiria» refleja de manera directa y natural la relación de posesión/oficio del hebreo.
- source_word: וַיֵּשֶׁב
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - moró
  - se estableció
  - vivió
  lexicon: HALOT
  rationale: ישׁב puede significar residir o habitar. Dado que el auditor inglés volvió de «lived» a «dwelt» por mayor cercanía formal al hebreo, «habitó» conserva esa densidad y suena digno en español bíblico contemporáneo.
- source_word: בְּנִינְוֵה
  english_pob_choice: in Nineveh
  chosen_spanish: en Nínive
  alternatives_spanish:
  - en la ciudad de Nínive
  lexicon: toponym
  rationale: La preposición locativa פשוטa se traduce directamente. «Nínive» es la forma española estándar del topónimo.
translation_notes:
  revision_awareness: El testimonio inglés revisado cambió de «lived» a «dwelt» para reflejar con mayor formalidad וַיֵּשֶׁב. El español sigue esa revisión y evita rebajar el verbo a un simple «vivió», optando por «habitó».
  spanish_consistency_notes:
  - Se mantiene «rey de Asiria» sin artículo, en paralelo con el constructo hebreo y con el estilo conciso del registro.
  - Se translitera el nombre propio según uso español común («Senaquerib»), pero se conserva la referencia inequívoca al mismo personaje del texto fuente.
  - La puntuación conserva una pausa narrativa fuerte tras la lista verbal, seguida de la cláusula final locativa.
