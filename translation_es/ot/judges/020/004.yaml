  revision_rationale: Se conserva fielmente el contenido del hebreo y de la auditoría inglesa, pero se corrige una coordinación poco idiomática en español. «Con mi concubina» expresa naturalmente la presencia de la concubina sin cambiar el sentido básico de בָּאתִי אֲנִי וּפִילַגְשִׁי.
