base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/030/005.yaml
  text: So they established a decree to send a proclamation throughout all Israel[a], from Beersheba to Dan, that they should come to keep the Passover to Yahweh, the God of Israel, at Jerusalem; for they had not kept it according to what is written for a long time.
  footnotes:
  - marker: a
    text: Or, 'for not many had kept it according to what is written.' The Hebrew phrase is somewhat compressed and may emphasize either the small number of participants or the failure to observe it in the prescribed manner.
    reason: alternative_reading
