translation:
  language: es
  text: Sus renuevos se extenderán[a], y su esplendor será como el del olivo[b], y su fragancia como la del Líbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ramas se extenderán» o «sus tiernos renuevos se extenderán». El verbo hebreo significa literalmente «ir», usado aquí con el sentido de extenderse hacia afuera.
    reason: lexical_alternative
  - marker: b
    text: O «su belleza» o «su majestad».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵלְכוּ
  english_pob_choice: will spread out
  chosen_spanish: se extenderán
  alternatives_spanish:
  - irán
  - se abrirán
  - crecerán
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «ir/andar», pero con la imagen de renuevos vegetales el sentido idiomático es extensión o crecimiento hacia afuera. «Se extenderán» conserva esa imagen botánica sin sonar rígido.
- source_word: יֹנְקוֹתָיו
  english_pob_choice: its shoots
  chosen_spanish: sus renuevos
  alternatives_spanish:
  - sus brotes
  - sus ramas tiernas
  - sus vástagos
  lexicon: HALOT
  rationale: El sustantivo designa brotes o retoños de una planta. «Renuevos» comunica bien la idea de crecimiento tierno y nuevo en español bíblico actual, con un tono natural y digno.
- source_word: וִיהִי
  english_pob_choice: and ... will be
  chosen_spanish: y ... será
  alternatives_spanish:
  - y ... llegue a ser
  - y ... quede
  lexicon: HALOT
  rationale: La forma verbal continúa la descripción profética del futuro de restauración. En español, el futuro simple expresa con claridad esa secuencia descriptiva.
- source_word: כַזַּיִת
  english_pob_choice: like the olive tree
  chosen_spanish: como el del olivo
  alternatives_spanish:
  - como un olivo
  - como el olivo
  lexicon: HALOT
  rationale: En español, la comparación suena más natural con la elipsis sustantiva «el del olivo» que repitiendo «árbol». Mantiene el referente arbóreo y la imagen positiva del olivo sin sobrecargar la frase.
- source_word: הוֹדוֹ
  english_pob_choice: its splendor
  chosen_spanish: su esplendor
  alternatives_spanish:
  - su belleza
  - su majestad
  - su gloria
  lexicon: HALOT
  rationale: El término puede implicar belleza, majestad o esplendor. «Esplendor» preserva el registro poético y visual del paralelismo con el olivo, sin llevar la frase a un sentido demasiado técnico o litúrgico.
- source_word: וְרֵיחַ לוֹ
  english_pob_choice: and its fragrance
  chosen_spanish: su fragancia
  alternatives_spanish:
  - su aroma
  - su olor
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «y fragancia para él». Dado el sujeto vegetal, el español natural expresa posesión con «su fragancia». «Fragancia» conserva el matiz positivo y poético mejor que «olor».
- source_word: כַלְּבָנוֹן
  english_pob_choice: like Lebanon
  chosen_spanish: como la del Líbano
  alternatives_spanish:
  - como el Líbano
  - como la fragancia del Líbano
  lexicon: HALOT
  rationale: Se mantiene el topónimo «Líbano» porque funciona como imagen tradicional de aroma y vegetación abundantes. La construcción «como la del Líbano» hace explícita la referencia aromática del símil sin añadir contenido ajeno.
theological_decisions:
- issue: Referente de los sufijos de tercera persona singular
  english_pob_reading: Render the suffixes as 'its,' referring to restored Israel/Ephraim under the plant metaphor.
  chosen_spanish_reading: Render los sufijos con «su», refiriéndolos a Israel restaurado bajo la metáfora vegetal.
  alternative_spanish_readings:
  - Renderizar con «suya»/«de él» para reflejar más mecánicamente el masculino singular hebreo
  - Personalizar el referente como una figura masculina individual
  rationale: Aunque el hebreo usa sufijos masculinos singulares, el referente es el pueblo restaurado figurado como planta. En español, «sus / su» evita forzar un masculino personal y conserva la metáfora colectiva-botánica de forma natural.
  doctrine_reference: Philosophy §5-6 (elección documentada y español moderno legible)
- issue: Valor de «זַיִת» en la comparación
  english_pob_reading: like the olive tree
  chosen_spanish_reading: como el del olivo
  alternative_spanish_readings:
  - como un olivo
  - como el olivo
  rationale: No se añade una lectura doctrinal; la decisión es estilística y semántica. La imagen del olivo transmite estabilidad, belleza y fecundidad, y el español debe conservarla sin introducir una interpretación alegórica adicional.
  doctrine_reference: Philosophy §6 (respeto de la imagen poética original)
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail en inglés. No hubo revisiones aplicadas en la fuente inglesa; por eso la redacción española mantiene la misma estructura poética y las mismas ambigüedades controladas, adaptadas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la metáfora vegetal y el paralelismo de tres miembros.
  - «Su» se usa de manera colectiva para el pueblo restaurado, en continuidad con la decisión inglesa de usar «its».
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones no presentes en el texto fuente.
