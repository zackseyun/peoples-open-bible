review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: muchos tratan un préstamo como ganancia gratuita y luego perjudican a quienes los ayudaron. «Muchos», «han considerado», «un préstamo» y «a los que les ayudaron» se alinean correctamente con πολλοὶ, ἐνόμισαν, δάνος y τοῖς βοηθήσασιν αὐτοῖς. La nota sobre ὡς εὕρεμα preserva adecuadamente la alternativa literal «como un hallazgo».'
  spanish_quality_summary: El texto es claro y natural, pero «han causado aflicción» suena algo menos idiomático y menos preciso para παρέσχον πόνον en este contexto sapiencial. Una formulación como «han causado problemas» comunica mejor la idea de trouble/hardship infligido a los prestamistas o ayudadores, sin reducirse a un estado emocional interno.
  glossary_alignment: No hay términos teológicos o glosario de proyecto en juego. La elección «ganancia inesperada» para ὡς εὕρεμα es adecuada en español y está bien respaldada por la nota. El único ajuste recomendado es léxico-estilístico en παρέσχον πόνον.
  issues:
  - severity: medium
    issue: «Han causado aflicción» para παρέσχον πόνον
    rationale: Aunque no es incorrecto, «aflicción» tiende en español a un matiz más emocional o interior. El griego aquí expresa de manera más amplia el causar molestias, problemas o perjuicios a quienes prestaron ayuda. «Han causado problemas» o similar encaja mejor con el contexto de préstamos y devolución.
  - severity: low
    issue: 'Alternativa española errónea en metadatos: «han causado trouble»'
    rationale: En las decisiones léxicas aparece una alternativa mezclada con inglés. No afecta el texto principal, pero conviene corregirlo en edición si se reutilizan estos metadatos.
