    issue: «mi cosecha» es algo más específica que «my produce» / תְּבוּאָתִי
    rationale: El hebreo puede abarcar producto, rendimiento o fruto del trabajo, no solo cosecha agrícola estricta. Sin embargo, dado el contexto de «arrancar de raíz», la imagen agrícola queda bien preservada y no distorsiona el sentido.
