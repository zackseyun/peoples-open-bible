translation:
  language: es
  text: Y quemará la vaca delante de sus ojos; su piel[a], su carne, su sangre, junto con su estiércol, quemará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la novilla». פָּרָה puede referirse a una bovina hembra; «vaca» se usa aquí por claridad moderna, sin excluir esa alternativa en el contexto ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂרַף
  english_pob_choice: And he shall burn
  chosen_spanish: Y quemará
  alternatives_spanish:
  - Y quemará entonces
  - Y deberá quemar
  lexicon: HALOT
  rationale: El imperfecto narrativo/instruccional en contexto legal se expresa de forma natural en español con futuro de mandato. «Quemará» mantiene el valor prescriptivo sin sobrecargar la frase.
- source_word: הַפָּרָה
  english_pob_choice: the cow
  chosen_spanish: la vaca
  alternatives_spanish:
  - la novilla
  - la ternera
  lexicon: HALOT
  rationale: פָּרָה puede denotar una bovina hembra; «vaca» es la opción más clara y natural en español moderno. «Novilla» o «ternera» introducirían una edad no explicitada por el hebreo aquí.
- source_word: לְעֵינָיו
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - en su presencia
  - a la vista de él
  lexicon: HALOT
  rationale: La expresión idiomática conserva la vividez del hebreo, que literalmente dice «para sus ojos». «Delante de sus ojos» es fiel y idiomático en español.
- source_word: עֹרָהּ
  english_pob_choice: its hide
  chosen_spanish: su piel
  alternatives_spanish:
  - su cuero
  - su hide
  lexicon: HALOT
  rationale: En español «piel» comunica bien la capa externa del animal y resulta más natural que «cuero» en este contexto de cadáver sacrificial. La distinción entre piel y carne sigue siendo clara.
- source_word: בְּשָׂרָהּ
  english_pob_choice: its flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su carne animal
  lexicon: HALOT
  rationale: בָּשָׂר se traduce normalmente como «carne». Mantiene la oposición entre la cubierta externa, la carne y la sangre.
- source_word: דָּמָהּ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo con sufijo.
- source_word: עַל פִּרְשָׁהּ
  english_pob_choice: along with its dung
  chosen_spanish: junto con su estiércol
  alternatives_spanish:
  - con su estiércol
  - además de su estiércol
  lexicon: HALOT
  rationale: פֶּרֶשׁ se refiere al excremento/estiércol. «Junto con» reproduce bien el valor aditivo de עַל en esta lista ritual de lo que se quema.
- source_word: יִשְׂרֹף
  english_pob_choice: he shall burn
  chosen_spanish: la quemará
  alternatives_spanish:
  - deberá quemarla
  - la quemará al final
  lexicon: HALOT
  rationale: La repetición final del verbo en hebreo subraya la acción completa sobre todos los componentes. En español, repetir «la quemará» conserva ese cierre enfático sin sonar forzado.
theological_decisions:
- issue: Repetición verbal al final de la lista
  english_pob_reading: The verse repeats 'he shall burn' to close the list forcefully.
  chosen_spanish_reading: Se repite «la quemará» al final para conservar el énfasis y la estructura legal del hebreo.
  alternative_spanish_readings:
  - …junto con su estiércol, la quemará.
  - …junto con su estiércol, deberá quemarla.
  rationale: El hebreo no solo enumera materiales; termina con el verbo para remarcar la totalidad de la quema. Mantener la repetición evita suavizar la estructura prescriptiva.
  doctrine_reference: Números 19:5; lectura legal-ritual del sacrificio de la vaca roja
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés pero ajusta el orden al español para evitar un calco pesado. Se conserva la duplicación del verbo final, y se mantiene la lista de partes del animal con un paralelismo claro. La puntuación con punto y coma reproduce la revisión inglesa que prefirió un corte formal en lugar de un guion largo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando el hebreo/greigo lo requiera; este versículo no contiene el Tetragrámaton.
  - Se prefiere «carne» para בָּשָׂר en coherencia con la terminología POB.
  - «Estiércol» se eligió por claridad; en registros más técnicos podría decirse «excremento», pero aquí el contexto ritual favorece la forma común y precisa.
  - La nota al pie marca la alternativa lexical documentada sin introducir una lectura distinta en el cuerpo del texto.
