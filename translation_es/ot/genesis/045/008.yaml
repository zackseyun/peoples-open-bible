  text: וְ/עַתָּ֗ה לֹֽא אַתֶּ֞ם שְׁלַחְתֶּ֤ם אֹתִ/י֙ הֵ֔נָּה כִּ֖י הָ/אֱלֹהִ֑ים וַ/יְשִׂימֵ֨/נִֽי לְ/אָ֜ב לְ/פַרְעֹ֗ה וּ/לְ/אָדוֹן֙ לְ/כָל בֵּית֔/וֹ וּ/מֹשֵׁ֖ל בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־־־׃
