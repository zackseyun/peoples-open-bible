translation:
  language: es
  text: He hablado estas cosas a ustedes para que no tropiecen[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se escandalicen», «sean hechos tropezar» o «caigan». El verbo griego puede indicar ser derribados en la fe o apartarse por tropiezo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo neutro plural apunta a lo dicho antes; «estas cosas» conserva el plural discursivo y evita reducirlo a un singular menos preciso.
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - les he dicho
  - he dicho
  lexicon: BDAG
  rationale: El perfecto de λαλέω comunica una acción ya realizada con relevancia presente. «He hablado» mantiene ese valor y suena natural en español bíblico actual.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a todos ustedes
  lexicon: BDAG
  rationale: El dativo plural se expresa de forma directa con «a ustedes», claro y neutral para el lector latinoamericano, sin perder la pluralidad del destinatario.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: La cláusula expresa propósito; «para que» es la construcción natural en español y conserva la relación final.
- source_word: σκανδαλισθῆτε
  english_pob_choice: stumble
  chosen_spanish: tropiecen
  alternatives_spanish:
  - se escandalicen
  - caigan
  - se aparten
  lexicon: BDAG
  rationale: El verbo puede abarcar tropezar, ser hecho tropezar o caer en tropiezo espiritual. «Tropiecen» mantiene la imagen verbal y deja abierta la intensidad teológica que el contexto puede cargar, sin resolverla de más.
theological_decisions:
- issue: Alcance de σκανδαλισθῆτε en el contexto del discurso de despedida
  english_pob_reading: stumble
  chosen_spanish_reading: tropiecen
  alternative_spanish_readings:
  - se escandalicen
  - caigan
  - se aparten
  rationale: El contexto inmediato prepara a los discípulos para oposición y expulsión; por eso la imagen no es solo un disgusto emocional, sino un tropiezo real. «Tropiecen» conserva la metáfora y la tensión interpretativa sin imponer una lectura más doctrinal que el griego exige.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El audit trail inglés revisó la última redacción desde «fall away» hacia «stumble» para reflejar con más exactitud σκανδαλισθῆτε. La versión española sigue esa revisión al preferir una imagen de tropiezo antes que una paráfrasis interpretativa de apostasía.
  spanish_consistency_notes:
  - Se conserva el trato plural con «ustedes» para reflejar ὑμῖν.
  - Se usa «he hablado» para mantener el valor de perfecto del griego.
  - «Tropiecen» mantiene la metáfora corporal sin sustituirla por un término eclesiástico más tradicional.
