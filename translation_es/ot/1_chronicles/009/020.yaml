translation:
  language: es
  text: Y Finees, hijo de Eleazar, antes había sido jefe sobre ellos[a]; Yahvé estaba con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había sido jefe sobre ellos antes». El orden hebreo permite unir más de cerca «antes» con «había sido jefe» o con toda la cláusula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִינְחָס
  english_pob_choice: And Phinehas
  chosen_spanish: Y Finees
  alternatives_spanish:
  - Ahora Finees
  - Finees
  lexicon: HALOT
  rationale: El nombre propio se translitera con la forma ya asentada en español bíblico; la conjunción inicial ו se conserva con «Y» para mantener la continuidad narrativa sin añadir matiz temporal no explícito.
- source_word: בֶּן אֶלְעָזָר
  english_pob_choice: son of Eleazar
  chosen_spanish: hijo de Eleazar
  alternatives_spanish:
  - el hijo de Eleazar
  lexicon: HALOT
  rationale: La construcción genealógica se expresa de forma natural en español con «hijo de», que preserva el parentesco sin sobrecargar el texto.
- source_word: נָגִיד
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - gobernante
  - supervisor
  lexicon: HALOT
  rationale: El término indica una posición de autoridad o dirección. «Jefe» comunica bien esa función en español y evita connotaciones monárquicas más fuertes que «gobernante».
- source_word: הָיָה
  english_pob_choice: had been
  chosen_spanish: había sido
  alternatives_spanish:
  - era
  - fue
  lexicon: HALOT
  rationale: El perfecto con el adverbio temporal posterior pide una referencia a una condición anterior ya concluida; «había sido» conserva ese valor de anterioridad.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - a cargo de ellos
  - encima de ellos
  lexicon: HALOT
  rationale: La preposición על con sufijo aquí expresa autoridad o supervisión. «Sobre ellos» reproduce esa relación de autoridad de manera sobria y fiel.
- source_word: לְפָנִים
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - en tiempos pasados
  - antes de entonces
  lexicon: HALOT
  rationale: El adverbio funciona temporalmente para señalar una condición previa. «Antes» es la opción más natural en español y mantiene la ambigüedad ordenada del hebreo respecto de qué elemento modifica exactamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme a la terminología base del proyecto, en lugar de sustituirlo por un título como «Señor».
- source_word: עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estuvo con él
  - estaba a su lado
  lexicon: HALOT
  rationale: La frase expresa presencia y favor divinos sin añadir explicación interpretativa. «Estaba con él» es la equivalencia más directa y natural en español.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - Señor
  rationale: El texto hebreo usa el Tetragrámaton. Se conserva el nombre propio divino en español como «Yahvé», evitando la sustitución por un título y manteniendo la transparencia del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación temporal de לְפָנִים con el predicado
  english_pob_reading: had formerly been chief over them
  chosen_spanish_reading: había sido antes jefe sobre ellos
  alternative_spanish_readings:
  - antes había sido jefe sobre ellos
  - había sido jefe sobre ellos antes
  rationale: El hebreo permite vincular el adverbio temporal tanto con el verbo como con toda la cláusula. La redacción española conserva esa flexibilidad sin resolverla de manera excesiva, tal como refleja la nota de la POB inglesa.
  doctrine_reference: Nota de ambigüedad sintáctica en el texto hebreo; no implica decisión doctrinal
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo muestra alto acuerdo; por eso se mantiene la solución principal con una nota breve para la ambigüedad temporal heredada del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la terminología base del proyecto.
  - Se usó «hijo de» para la genealogía, en lugar de calco más rígido.
  - Se eligió «jefe» para נָגִיד por su valor de autoridad contextual sin sobreinterpretar el cargo.
  - Se conservó la ambigüedad de לְפָנִים mediante la nota al pie, siguiendo la auditoría inglesa.
