translation:
  language: es
  text: Y los censados[a] de los clanes de los hijos de Merari, por sus clanes, por las casas de sus padres.
  philosophy: formal
  footnotes:
  - marker: a
    text: O «los contados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְקוּדֵי
  english_pob_choice: those numbered
  chosen_spanish: los contabilizados
  alternatives_spanish:
  - los contados
  - los registrados
  - los censados
  lexicon: HALOT
  rationale: El hebreo apunta a los resultados de un censo, no a un grupo definido por una cualidad distinta. "Contabilizados" preserva la idea de personas incluidas en el recuento sin añadir "hombres". "Censados" sería posible, pero "contabilizados" deja más visible el valor verbal de פקד en este contexto administrativo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the clans of
  chosen_spanish: los clanes de
  alternatives_spanish:
  - las familias de
  - los linajes de
  lexicon: HALOT
  rationale: En este pasaje genealógico y censal, מִשְׁפָּחָה designa una unidad de parentesco dentro de la tribu. "Clanes" reproduce mejor esa estructura que "familias", que en español puede sonar más estrecho.
- source_word: בְּנֵי מְרָרִי
  english_pob_choice: the sons of Merari
  chosen_spanish: los hijos de Merari
  alternatives_spanish:
  - los descendientes de Merari
  lexicon: HALOT
  rationale: Se conserva el giro semítico directo del hebreo. "Hijos" es más transparente para la fórmula genealógica y mantiene la relación de pertenencia al linaje de Merari.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - conforme a sus clanes
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula organiza la lista por categorías. "Por sus clanes" comunica la distribución censal sin convertir la frase en una paráfrasis más libre.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers' houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - según las casas de sus padres
  - por sus casas paternas
  lexicon: HALOT
  rationale: '"Casa de los padres" es una expresión técnica de la organización familiar en textos censales. "Casas de sus padres" mantiene el paralelismo con el hebreo y evita sustituirlo por un término sociológico más interpretativo.'
theological_decisions:
- issue: Conservar el valor censal sin masculinizarlo innecesariamente
  english_pob_reading: those numbered
  chosen_spanish_reading: los contabilizados
  alternative_spanish_readings:
  - los censados
  - los contados
  rationale: El texto no añade explícitamente "hombres"; por eso se evita una expansión de género. "Los contabilizados" retiene el sentido de un registro de censo y deja intacta la neutralidad del participio sustantivado.
  doctrine_reference: Precisión textual y sobriedad traductológica en pasajes de censo (cf. Números 1–4)
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de "the numbered men" a "those numbered" para evitar añadir "men" sin base explícita. La redacción española sigue esa revisión y evita introducir un sustantivo masculino innecesario; además, toma la nota inglesa de alternativa lexical y la traslada de forma natural a una opción española breve.
  spanish_consistency_notes:
  - Se mantiene "Y" al inicio para reflejar la partícula conjuntiva del hebreo.
  - Se usa "Yahvé" solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - '"Clanes" y "casas de sus padres" quedan como fórmulas censales consistentes con el resto de Números.'
  - No se introduce "hombres" ni otra especificación de género que el hebreo no expresa aquí.
