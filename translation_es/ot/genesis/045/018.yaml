review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y la mayor parte de las decisiones del POB inglés: imperativos iniciales, promesa de dar ''lo mejor de la tierra de Egipto'' y cierre idiomático con ''la grasa de la tierra''. Sin embargo, en dos puntos no preserva adecuadamente la intención documentada: בָּתֵּיכֶם se interpreta mejor como ''sus hogares'' o ''sus familias/households'' que como ''sus casas'', y וּקְחוּ está más cerca de ''Tomen'' que de ''Lleven'', ya que el inglés auditado prefirió ''Take'' sobre ''Bring''.'
  spanish_quality_summary: 'El español es claro y bastante natural, pero ''sus casas'' suena demasiado literal y puede sugerir edificios más que unidades domésticas. ''La grasa de la tierra'' es comprensible como calco bíblico, pero en español moderno necesita nota aclaratoria, lo cual el borrador ya provee. Una leve mejora de naturalidad y fidelidad sería: ''Tomen a su padre y a sus hogares[a]...'''
  glossary_alignment: 'No hay términos de glosario teológico de alto impacto en este versículo. La principal cuestión léxica es בית: el proyecto inglés documenta ''households'', y en español conviene reflejar esa unidad doméstica con ''hogares'' en texto principal, dejando ''casas'' como alternativa si se desea. El modismo חֵלֶב הָאָרֶץ puede mantenerse como ''la grasa de la tierra'' con nota, en línea con la decisión inglesa de conservar la imagen bíblica.'
  issues:
  - severity: medium
    issue: '''sus casas'' para בָּתֵּיכֶם'
    rationale: Aunque literalmente posible, aquí בית se refiere a la unidad doméstica/hogar, no principalmente a las edificaciones. El propio POB inglés eligió 'households'. En español, 'sus casas' reduce la precisión contextual y suena menos natural.
  - severity: medium
    issue: '''Lleven'' para וּקְחוּ'
    rationale: El hebreo básico es 'tomar'. 'Lleven' introduce con más fuerza la idea de traslado desde la perspectiva del destino, acercándose a 'bring'. Dado que la auditoría inglesa justificó explícitamente 'Take' frente a 'Bring', conviene reflejar esa decisión con 'Tomen'.
  - severity: low
    issue: Nota al pie a) no prioriza la mejor alternativa contextual
    rationale: La nota ofrece 'sus hogares', pero esa opción en realidad debería pasar al texto principal, ya que comunica mejor el sentido de 'households'.
  revised_spanish_text: Tomen a su padre y a sus hogares[a], y vengan a mí, y yo les daré lo mejor de la tierra de Egipto, y comerán la grasa[b] de la tierra.
  revised_footnotes:
