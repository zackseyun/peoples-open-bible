translation:
  language: es
  text: 'Entonces Judas y sus hermanos dijeron: «Miren, nuestros enemigos han sido aplastados. Subamos[a] a purificar el santuario y dedicarlo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Subamos» conserva la formulación griega, probablemente aludiendo al ascenso a Jerusalén y al monte del templo.
    reason: cultural_note
  - marker: b
    text: O «inaugurarlo»; el verbo griego puede significar «dedicar» o «inaugurar», pero aquí el contexto es la dedicación renovada del templo profanado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - dijo
  - habló
  lexicon: LSJ
  rationale: El griego presenta un aoristo narrativo de λέγω con sujeto plural coordinado ('Judas y sus hermanos'); por eso el plural 'dijeron' respeta la concordancia natural del español.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judás
  lexicon: LSJ
  rationale: Se conserva el nombre propio histórico tradicionalmente transliterado como Judas en 1 Macabeos.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus hermanos de sangre
  lexicon: LSJ
  rationale: El término familiar directo es 'hermanos'; es fiel, claro y no requiere explicitación adicional.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - He aquí
  lexicon: LSJ
  rationale: La interjección deíctica pide una llamada de atención inmediata. 'Mira' transmite bien la vivacidad del griego sin sonar arcaico.
- source_word: συνετρίβησαν
  english_pob_choice: have been crushed
  chosen_spanish: han sido derrotados
  alternatives_spanish:
  - han sido aplastados
  - han sido triturados
  - han sido quebrantados
  lexicon: LSJ
  rationale: El verbo expresa una derrota decisiva. En español, 'derrotados' comunica el resultado militar con naturalidad; 'aplastados' sería más imagístico pero menos sobrio.
- source_word: οἱ ἐχθροὶ ἡμῶν
  english_pob_choice: our enemies
  chosen_spanish: nuestros enemigos
  alternatives_spanish:
  - los enemigos de nosotros
  lexicon: LSJ
  rationale: Poseído idiomático directo en español.
- source_word: ἀναβῶμεν
  english_pob_choice: Let us go up
  chosen_spanish: Subamos
  alternatives_spanish:
  - Vayamos arriba
  - Subamos al monte
  lexicon: LSJ
  rationale: '''Subamos'' conserva la dirección ascendente del griego hacia Jerusalén y el monte del templo, sin añadir explicaciones que el texto no da.'
- source_word: καθαρίσαι
  english_pob_choice: to cleanse
  chosen_spanish: purificar
  alternatives_spanish:
  - limpiar
  - limpiar ritualmente
  - purificar ritualmente
  lexicon: LSJ
  rationale: En contexto cultual, 'purificar' mantiene mejor el sentido ritual que una limpieza meramente física.
- source_word: τὰ ἅγια
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - las cosas santas
  - el recinto sagrado
  lexicon: LSJ
  rationale: Aquí el referente es el espacio sagrado del templo; 'el santuario' es la forma española más clara y sobria para ese ámbito cultual.
- source_word: ἐγκαινίσαι
  english_pob_choice: dedicate it
  chosen_spanish: dedicarlo
  alternatives_spanish:
  - consagrarlo
  - inaugurarlo
  - volver a dedicarlo
  lexicon: LSJ
  rationale: El verbo puede significar dedicar o inaugurar. En este contexto de restauración del templo, 'dedicarlo' sigue de cerca el griego y evita añadir explícitamente el prefijo 're-' que no está en la forma verbal.
theological_decisions:
- issue: Sentido cultual de καθαρίσαι τὰ ἅγια
  english_pob_reading: cleanse the sanctuary
  chosen_spanish_reading: purificar el santuario
  alternative_spanish_readings:
  - limpiar el santuario
  - purificar el lugar santo
  rationale: La escena trata de la restauración del templo profanado. 'Purificar' conserva el peso ritual y teológico sin limitarse a una limpieza material.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Cómo verter ἐγκαινίσαι sin sobreinterpretar la renovación
  english_pob_reading: dedicate it
  chosen_spanish_reading: dedicarlo
  alternative_spanish_readings:
  - consagrarlo
  - inaugurarlo
  - volver a dedicarlo
  rationale: La forma griega expresa dedicar/inaugurar; en el contexto sí implica una dedicación renovada, pero el español debe evitar añadir 're-' como si estuviera explicitado por la forma verbal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió 'rededicate it' por 'dedicate it' para reflejar más directamente ἐγκαινίσαι. Por eso el español evita 'rededicarlo' y usa 'dedicarlo', manteniendo el matiz cultual en el contexto sin añadir un prefijo no explícito en el griego.
  spanish_consistency_notes:
  - Se conservó 'Judas' como nombre propio histórico, no 'Judás'.
  - '''Santuario'' se usó para τὰ ἅγια en coherencia con el contexto del templo.'
  - '''Purificar'' se prefirió a ''limpiar'' por el sentido ritual del pasaje.'
  - Se evitó el calco 'subamos arriba'; 'Subamos' conserva la dirección ascendente implícita.
  - No se introdujo 'rededicar' porque la revisión del inglés POB lo desaconseja y el griego permite 'dedicar'.
