  to: 'Y dijo[a]: «Todo está bien. Mi amo me ha enviado para decir: “Mira, justo ahora han venido a mí dos jóvenes de la región montañosa de Efraín, de entre los hijos de los profetas[b]. Por favor, dales un talento de plata[c] y dos mudas de ropa”».'
