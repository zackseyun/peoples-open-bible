translation:
  language: es
  text: Puedes cobrar interés[a] al extranjero, pero a tu hermano no le cobrarás interés[b], para que Yahvé tu Dios te bendiga en todo el trabajo de tu mano en la tierra en la cual estás entrando para poseerla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prestar con interés» / «exigir interés»; en español antiguo a veces se traduce «usura».
    reason: lexical_alternative
  - marker: b
    text: «Tu hermano» aquí significa un miembro del pueblo de Israel; el hebreo conserva el término familiar.
    reason: cultural_note
lexical_decisions:
- source_word: לַנָּכְרִי
  english_pob_choice: to a foreigner
  chosen_spanish: al extranjero
  alternatives_spanish:
  - al forastero
  - a una persona extranjera
  - al no israelita
  lexicon: HALOT
  rationale: נָכְרִי designa a alguien de fuera del pueblo del pacto. «Extranjero» comunica bien esa oposición legal frente a «tu hermano» y mantiene un español claro y natural.
- source_word: תַשִּׁיךְ / לֹא תַשִּׁיךְ
  english_pob_choice: charge interest / shall not charge interest
  chosen_spanish: cobrar interés / no le cobrarás interés
  alternatives_spanish:
  - prestar con interés / no prestarás con interés
  - exigir interés / no exigirás interés
  - cobrar usura / no cobrarás usura
  lexicon: HALOT
  rationale: El verbo hifil de נשׁך aquí expresa imponer interés en un préstamo. «Cobrar interés» es idiomático y conserva el contraste legal sin cargar el texto con el matiz moral más fuerte de «usura».
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: a tu hermano
  alternatives_spanish:
  - a tu pariente
  - a tu compatriota
  - a tu fellow israelita
  lexicon: HALOT
  rationale: Se conserva el parentesco literal «hermano», que en este contexto legal se refiere a un miembro del pueblo de Israel. Mantiene la imagen pactal sin sustituirla por una paráfrasis explicativa en el texto principal.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Introduce finalidad o resultado. «Para que» es la opción más natural en español moderno y reproduce bien la fuerza causal-final.
- source_word: יְבָרֶכְךָ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the LORD your God may bless you
  chosen_spanish: Yahvé tu Dios te bendiga
  alternatives_spanish:
  - Yahvé tu Dios pueda bendecirte
  - Yahvé tu Dios te puede bendecir
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יהוה: «Yahvé». Se conserva el valor volitivo/resultativo del verbo hebreo con un subjuntivo natural en español: «te bendiga».'
- source_word: בְּכֹל מִשְׁלַח יָדֶךָ
  english_pob_choice: in all the work of your hand
  chosen_spanish: en todo el trabajo de tu mano
  alternatives_spanish:
  - en todas tus empresas
  - en todo lo que emprendas
  - en toda la obra de tu mano
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para las empresas o labores de una persona. «El trabajo de tu mano» conserva la imagen original y sigue siendo inteligible en español.
- source_word: עַל הָאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el país
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «sobre», el español natural en este contexto es «en la tierra». «Tierra» mantiene el sentido territorial de la promesa sin sonar arcaico.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה לְרִשְׁתָּהּ
  english_pob_choice: that you are entering to possess
  chosen_spanish: que vas a entrar para poseerla
  alternatives_spanish:
  - que estás entrando para poseerla
  - a la cual vas a entrar para tomar posesión de ella
  - que vas a llegar para heredarlа
  lexicon: HALOT
  rationale: El hebreo describe la entrada inminente a la tierra con propósito de posesión. «Vas a entrar para poseerla» mantiene la idea de movimiento hacia la tierra y el objetivo de tomar posesión, sin sobreexplicar.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh your God
  chosen_spanish_reading: Yahvé tu Dios
  alternative_spanish_readings:
  - el SEÑOR tu Dios
  - Jehová tu Dios
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto ha establecido «Yahvé» como forma principal en español. Se evita la sustitución por «SEÑOR», que ocultaría el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene una equivalencia óptima y no muestra cambios aplicados en la última revisión. Para el español se conservan las mismas decisiones semánticas principales: el contraste legal entre extranjero y hermano, el valor idiomático de «cobrar interés», la referencia al nombre divino como Yahvé y la imagen hebrea de «el trabajo de tu mano» sin cargar el verso con glosas innecesarias.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en armonía con la terminología del proyecto para יהוה.
  - Se conservó la imagen hebrea «el trabajo de tu mano» por fidelidad al modismo original.
  - «Extranjero» y «hermano» se usan en contraste legal-pactual, no como categorías meramente afectivas.
  - El verbo en subjuntivo («te bendiga») reproduce adecuadamente el valor final del hebreo.
  - Las notas al pie preservan la alternativa lexical y la aclaración cultural documentadas en el audit trail en inglés.
