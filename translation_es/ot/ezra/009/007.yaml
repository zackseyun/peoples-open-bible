translation:
  language: es
  text: Desde los días de nuestros padres hasta este día, hemos estado en gran culpa. A causa de nuestras iniquidades, nosotros, nuestros reyes y nuestros sacerdotes hemos sido entregados en manos de los reyes de las tierras, a espada, a cautiverio, a saqueo y a vergüenza de rostro[a], como en este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a vergüenza pública» o «a humillación»; literalmente, «a vergüenza de rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִימֵי אֲבֹתֵינוּ
  english_pob_choice: From the days of our fathers
  chosen_spanish: Desde los días de nuestros padres
  alternatives_spanish:
  - Desde el tiempo de nuestros padres
  - Desde los días de nuestros antepasados
  lexicon: HALOT
  rationale: La expresión hebrea marca un punto de partida temporal. «Desde los días de nuestros padres» conserva el valor idiomático y la continuidad histórica del lamento de Esdras sin volverse forzado en español.
- source_word: אֲנַחְנוּ בְּאַשְׁמָה גְדֹלָה
  english_pob_choice: we have been in great guilt
  chosen_spanish: hemos estado en gran culpa
  alternatives_spanish:
  - estamos en gran culpa
  - hemos estado profundamente culpables
  - hemos estado en gran culpa y vergüenza
  lexicon: HALOT
  rationale: אַשְׁמָה expresa culpa/culpabilidad más que solo vergüenza emocional. «Gran culpa» conserva el peso jurídico-moral del hebreo; el perfecto compuesto comunica la duración «desde... hasta este día».
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: HALOT
  rationale: «Hasta este día» reproduce con fidelidad la fuerza de continuidad del hebreo y mantiene el tono formal del pasaje.
- source_word: וּבַעֲוֹנֹתֵינוּ
  english_pob_choice: Because of our iniquities
  chosen_spanish: A causa de nuestras iniquidades
  alternatives_spanish:
  - Por nuestras iniquidades
  - A causa de nuestros pecados
  - Debido a nuestras iniquidades
  lexicon: HALOT
  rationale: El prefijo ב en este contexto es causal/instrumental. «A causa de» expresa mejor la relación entre culpa e ისტორical judgment que una traducción meramente locativa.
- source_word: נִתַּנּוּ
  english_pob_choice: have been given
  chosen_spanish: hemos sido entregados
  alternatives_spanish:
  - hemos sido dados
  - fuimos entregados
  - han sido entregados
  lexicon: HALOT
  rationale: El pasivo de נָתַן aquí comunica entrega a poder ajeno. En español, «hemos sido entregados» suena natural y mantiene la idea de haber caído bajo dominio enemigo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  - en poder de
  lexicon: HALOT
  rationale: El hebreo usa la imagen idiomática de la «mano» como poder/control. «En manos de» es la equivalencia española más clara y conserva la imagen bíblica.
- source_word: מַלְכֵי הָאֲרָצוֹת
  english_pob_choice: the kings of the lands
  chosen_spanish: los reyes de las tierras
  alternatives_spanish:
  - los reyes de los países
  - los reyes de las naciones
  - los reyes de la tierra
  lexicon: HALOT
  rationale: «Tierras» refleja mejor אֲרָצוֹת en este contexto de reinos/territorios vecinos que «tierra» en singular o «naciones», que desplaza el matiz geográfico.
- source_word: בַּחֶרֶב
  english_pob_choice: to the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - a la espada
  - por la espada
  - a la muerte por la espada
  lexicon: HALOT
  rationale: La fórmula hebrea de juicio militar se traduce de forma breve y directa. «A espada» es la construcción española estable y fiel.
- source_word: בַּשְּׁבִי
  english_pob_choice: to captivity
  chosen_spanish: a cautiverio
  alternatives_spanish:
  - a cautividad
  - a cautiverio como prisioneros
  - al cautiverio
  lexicon: HALOT
  rationale: שְׁבִי denota estado de cautiverio. «Cautiverio» es claro en español y evita estrechar innecesariamente el sentido hacia «exilio».
- source_word: וּבַבִּזָּה
  english_pob_choice: to plunder
  chosen_spanish: a saqueo
  alternatives_spanish:
  - al saqueo
  - a despojo
  - a pillaje
  lexicon: HALOT
  rationale: בִּזָּה es botín/saqueo tomado por enemigos. «Saqueo» es natural y comunica bien la pérdida por despojo violento.
- source_word: וּבְבֹשֶׁת פָּנִים
  english_pob_choice: to shame of face
  chosen_spanish: y a vergüenza de rostro[a]
  alternatives_spanish:
  - y a vergüenza pública
  - y a humillación
  - y a oprobio
  lexicon: HALOT
  rationale: Se conserva la imagen concreta «vergüenza de rostro» para no borrar el hebraísmo. En español, la frase denota deshonra pública; por eso se ancla con nota alternativa.
- source_word: כְּהַיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como hasta este día
  alternatives_spanish:
  - como es hoy
  - tal como sucede hoy
  - como hasta hoy
  lexicon: HALOT
  rationale: La comparación final mira el estado presente. «Como hasta este día» preserva la fuerza de actualidad y cierra la confesión con solemnidad.
theological_decisions:
- issue: Distinguir culpa y consecuencias de la culpa
  english_pob_reading: Translate אַשְׁמָה as 'guilt' and עָוֹן as 'iniquities'
  chosen_spanish_reading: Traducir אַשְׁמָה como «culpa» y עָוֹן como «iniquidades»
  alternative_spanish_readings:
  - Traducir ambos como «pecado»
  - Traducir אַשְׁמָה como «vergüenza»
  rationale: El versículo combina confesión moral y juicio histórico. Mantener «culpa» para אַשְׁמָה y «iniquidades» para עָוֹן preserva la distinción semántica y la carga comunitaria del texto sin diluirla en un término genérico.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Solidaridad corporativa en la confesión
  english_pob_reading: Retain 'we, our kings, and our priests' as a collective confession
  chosen_spanish_reading: Mantener «nosotros, nuestros reyes y nuestros sacerdotes» como confesión colectiva
  alternative_spanish_readings:
  - Reestructurar para minimizar la identificación corporativa
  - Individualizar la culpa en solo el pueblo común
  rationale: El hebreo incluye explícitamente al pueblo y a sus líderes bajo la misma confesión. La traducción conserva esa solidaridad histórica y teológica sin suavizarla.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura aprobada del inglés POB y no introduce cambios de sentido respecto del auditable original hebreo. Se conserva la imagen idiomática de «mano», la distinción entre culpa e iniquidad, y la construcción final de deshonra pública con nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantiene «culpa»/«iniquidades» para distinguir אַשְׁמָה y עָוֹן.
  - «A espada, a cautiverio, a saqueo» conserva la serie de juicios en paralelismo breve.
  - «Vergüenza de rostro» se conserva como hebraísmo transparente con nota explicativa.
  - El orden de las cláusulas sigue la progresión temporal y causal del hebreo.
