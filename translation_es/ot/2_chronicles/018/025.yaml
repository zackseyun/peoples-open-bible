    text: O «el comandante de la ciudad». El título hebreo puede referirse a un funcionario cívico o militar.
    reason: lexical_alternative
  - marker: b
    text: Lit. «el hijo del rey».
    reason: lexical_alternative
  revision_rationale: La revisión corrige los anclajes de las notas, ajusta el verbo principal a una opción más fiel al causativo hebreo («devuélvanlo»), normaliza «Amón» para el español, y hace que la nota sobre «hijo del rey» sea una variante real en lugar de repetir el texto principal. El resultado preserva mejor tanto el sentido fuente como la claridad del español.
