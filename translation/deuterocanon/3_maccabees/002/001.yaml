id: 3MA.2.1
reference: 3 Maccabees 2:1
source:
  edition: lxx-swete-1909
  text: Κύριε, Κύριε, βασιλεῦ τῶν οὐρανῶν, καὶ δέσποτα πάσης τῆς κτίσεως, ἅγιε ἐν ἁγίοις, μόναρχε, παντοκράτωρ, πρόσχες ἡμῖν καταπονουμένοις ὑπὸ ἀνοσίου καὶ βεβήλου, θράσει καὶ σθένει πεφρυασμένου.
  language: Greek
  pages:
  - 734
  - 735
  - 736
  - 737
  - 738
  - 739
  - 752
  confidence: high
  validation: no_reference
translation:
  text: Lord[a], Lord, king of the heavens and master of all creation, holy among the holy ones, sole ruler, Almighty[b], pay attention to us who are being oppressed by an unholy and profane man, swollen with arrogance and strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holy in the holy ones.' The Greek phrase is compact and somewhat liturgical; 'among the holy ones' is a natural English rendering.
    reason: lexical_alternative
  - marker: b
    text: The Greek does not explicitly say 'man,' but the singular participial description points to a single hostile person; 'man' is supplied for clear English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: LSJ
  rationale: Vocative of κύριος used as a divine address/title. Per doctrine default, rendered 'Lord' rather than 'Master' in the main text.
- source_word: βασιλεῦ τῶν οὐρανῶν
  chosen: king of the heavens
  alternatives:
  - king of heaven
  lexicon: LSJ
  rationale: The plural τῶν οὐρανῶν is explicit in the Greek, so 'the heavens' preserves the source wording better than the idiomatic singular.
- source_word: δέσποτα πάσης τῆς κτίσεως
  lemma: δέσποτα
  chosen: master of all creation
  alternatives:
  - sovereign of all creation
  - lord of all creation
  lexicon: LSJ
  rationale: δέσποτα carries the sense of absolute ownership/authority. 'Master' preserves that force without collapsing it into the already-used κύριε.
- source_word: ἅγιε ἐν ἁγίοις
  chosen: holy among the holy ones
  alternatives:
  - holy in the holy ones
  - most holy among holy ones
  lexicon: LSJ
  rationale: A literal rendering of the prepositional phrase keeps the elevated liturgical flavor. 'Among the holy ones' is the most natural English expression of ἐν here.
- source_word: μόναρχε
  chosen: sole ruler
  alternatives:
  - only ruler
  - monarch
  lexicon: LSJ
  rationale: The term emphasizes God's unique sole sovereignty. 'Sole ruler' is clear modern English and avoids the potentially misleading political nuance of 'monarch'.
- source_word: παντοκράτωρ
  chosen: Almighty
  alternatives:
  - all-powerful
  - ruler of all
  lexicon: LSJ
  rationale: Traditional and accurate rendering for the divine title, preserving its theological weight in accessible English.
- source_word: πρόσχες ἡμῖν
  chosen: pay attention to us
  alternatives:
  - give heed to us
  - look upon us
  lexicon: LSJ
  rationale: Imperative asking for divine attention. 'Pay attention to us' is natural modern English while retaining the petitionary force.
- source_word: καταπονουμένοις
  chosen: being oppressed
  alternatives:
  - being afflicted
  - being worn down
  - being tormented
  lexicon: LSJ
  rationale: The participle conveys severe suffering under pressure. 'Being oppressed' fits the context of hostile persecution better than a more generic 'afflicted'.
- source_word: ἀνοσίου καὶ βεβήλου
  chosen: unholy and profane
  alternatives:
  - godless and defiled
  - impious and profane
  lexicon: LSJ
  rationale: The pair describes religious/moral defilement. 'Unholy and profane' preserves both terms distinctly in readable English.
- source_word: θράσει καὶ σθένει πεφρυασμένου
  chosen: swollen with arrogance and strength
  alternatives:
  - puffed up with boldness and power
  - insolent in audacity and might
  lexicon: LSJ
  rationale: πεφρυασμένου suggests being puffed up or raging proudly; θράσει is reckless arrogance rather than neutral courage. 'Swollen with arrogance and strength' captures both the metaphor and the hostile tone.
