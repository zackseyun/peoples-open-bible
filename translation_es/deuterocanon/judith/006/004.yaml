    issue: La nota [a] está anclada en la frase equivocada.
    rationale: La nota explica la metáfora de μεθυσθήσεται ἐν τῷ αἵματι αὐτῶν («serán embriagadas con su sangre» / «empapadas con su sangre»), no el locativo ἐν αὐτοῖς («donde están»). Debe marcarse en la frase de la sangre.
  - severity: low
    issue: «Se llenarán con sus muertos» suena menos idiomático que «se llenarán de sus muertos».
    rationale: En español, «llenarse de» es la construcción más natural para πληρωθήσεται νεκρῶν αὐτῶν y preserva mejor el sentido sin cambiar el contenido.
  - severity: low
    issue: La referencia de «Porque dijo» puede explicitarse mejor.
    rationale: Añadir «él» mejora la cohesión referencial hacia Nabucodonosor, aunque el sentido ya se entiende en contexto.
