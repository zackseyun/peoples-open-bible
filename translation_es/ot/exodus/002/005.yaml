  to: Entonces la hija de Faraón bajó a bañarse al Nilo, mientras sus muchachas andaban a lo largo de la orilla del Nilo. Vio la canasta en medio[a] de los juncos[c], y envió a su sirvienta[b] y la tomó.
  rationale: 'Se corrigen los anclajes de notas para que correspondan exactamente a las palabras o expresiones que explican: [a] en ''en medio'', [b] en ''su sirvienta'', y [c] en ''canasta/juncos'' como nota de término relacionado. También se pule la redacción de la nota [a] para un español editorial más natural. No se requieren cambios sustanciales de traducción.'
