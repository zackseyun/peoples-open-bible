translation:
  language: es
  text: 'Yahvé[a] dijo[b] a Moisés: «Faraón no los escuchará[c], para que se multipliquen mis prodigios[d] en la tierra de Egipto.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Yahvéh’; se usa la forma breve y ampliamente reconocible en español para el nombre divino del Tetragrámaton.
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones ponen «Yahvé había dicho a Moisés» para relacionar esta afirmación con el contexto narrativo precedente; la forma verbal hebrea en sí es el pasado narrativo normal.
    reason: alternative_reading
  - marker: c
    text: O ‘no los oirá’ o ‘no les hará caso’. El hebreo שׁמע con אֶל puede significar escuchar, atender o hacer caso.
    reason: lexical_alternative
  - marker: d
    text: O ‘mis señales’ o ‘mis maravillas’. מוֹפֵת puede designar señales, prodigios o maravillas; aquí se eligió ‘prodigios’ por su tono bíblico y su énfasis en lo asombroso.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como transliteración reverente y auditable. «Yahvé» es el equivalente español más directo del criterio de la POB, evitando la sustitución por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - había dicho
  - les dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se refleja mejor con pasado simple en español. «Dijo» mantiene la progresión narrativa sin forzar un pluscuamperfecto no exigido por la forma hebrea.
- source_word: לֹא יִשְׁמַע אֲלֵיכֶם
  english_pob_choice: will not listen to you
  chosen_spanish: no los escuchará
  alternatives_spanish:
  - no les hará caso
  - no los oirá
  - no los obedecerá
  lexicon: HALOT
  rationale: שׁמע con אֶל expresa escuchar/atender/obedecer. «Escuchará» conserva el modismo y permite la negativa de atender sin explicitar más de lo que dice el hebreo. Se usa plural «los» para reflejar el sufijo plural אֲלֵיכֶם dirigido a Moisés y Aarón.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: La conjunción de propósito se expresa naturalmente en español con «para que», conservando la relación teleológica del texto sin volverlo más interpretativo de lo necesario.
- source_word: רְבוֹת
  english_pob_choice: may be multiplied
  chosen_spanish: se multipliquen
  alternatives_spanish:
  - aumenten
  - sean multiplicados
  lexicon: HALOT
  rationale: El infinitivo constructo de רבה tras לְמַעַן indica aumento/propagación. «Se multipliquen» reproduce bien la fuerza resultativa y mantiene la referencia a la abundancia de las obras divinas.
- source_word: מוֹפְתַי
  english_pob_choice: my wonders
  chosen_spanish: mis prodigios
  alternatives_spanish:
  - mis maravillas
  - mis señales
  - mis portentos
  lexicon: HALOT
  rationale: מופת puede ser maravilla, señal o prodigio. «Prodigios» funciona bien en español bíblico contemporáneo para el carácter asombroso y portentoso del término, sin reducirlo a «señales» y sin perder su fuerza extraordinaria.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se preserva la extensión literal de אֶרֶץ con «tierra», que en español bíblico comunica con naturalidad el territorio de Egipto y mantiene más de cerca la formulación hebrea.
theological_decisions:
- issue: Relación entre la negativa de Faraón y el propósito divino
  english_pob_reading: Pharaoh will not listen, so that God's wonders may be multiplied in Egypt.
  chosen_spanish_reading: Faraón no los escuchará, para que se multipliquen mis prodigios en la tierra de Egipto.
  alternative_spanish_readings:
  - Faraón no los escuchará, y así se multiplicarán mis prodigios en la tierra de Egipto.
  - Faraón no los escuchará, con el fin de que mis prodigios se multipliquen en la tierra de Egipto.
  rationale: 'Se conserva la tensión teológica del versículo: la negativa de Faraón y el propósito divino aparecen juntos sin ser suavizados ni explicados más allá de lo que afirma el hebreo. «Para que» refleja bien לְמַעַן como propósito, siguiendo la lectura de la POB.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla artificialmente.'
translation_notes:
  revision_awareness: La POB inglesa revisada mantiene ‘will not listen to you’ y ‘my wonders’; no se aplicaron cambios de cronología ni de léxico que afecten el sentido. La versión española sigue esa lectura base sin introducir un pluperfecto ni una reinterpretación causal más fuerte.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como nombre divino principal, conforme al criterio POB.
  - Se mantiene el plural de referencia con «los» para reflejar el destinatario colectivo del hebreo.
  - «Prodigios» se usa como equivalente contextual de מוֹפְתִים, sin borrar la posibilidad de ‘señales’ indicada en nota.
  - La puntuación respeta el discurso directo y el orden narrativo natural del español bíblico contemporáneo.
