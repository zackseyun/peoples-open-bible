  yaml_path: translation/deuterocanon/judith/011/016.yaml
  text: Therefore I[a], your servant, having learned all these things, fled from before them, and God sent me to do with you things at which the whole earth will be astonished[c][b], whenever they hear of them.
  footnotes:
  - marker: a
    text: Or 'from their presence.' The Greek expression is literally 'from before them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to accomplish things with you.' The Greek phrase is broad and does not specify more precisely how Holofernes is involved.
    reason: lexical_alternative
  - marker: c
    text: Or 'the whole world' or, in a narrower sense, 'all the land.'
    reason: lexical_alternative
