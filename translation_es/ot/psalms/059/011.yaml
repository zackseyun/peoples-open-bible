review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el audit trail inglés: conserva la construcción «El Dios de su…», mantiene la repetición de «Dios», y refleja el hifil de ראה con una forma permisiva/causativa. También preserva adecuadamente la lectura masorética inusual con nota alternativa. Sin embargo, «amor leal» para חֶסֶד es aceptable pero menos alineado con la preferencia POB por una expresión que refleje más claramente la durabilidad/carácter misericordioso; y «me dejará mirar a mis enemigos» suena algo marcado en español, donde «ver» resulta más natural sin perder el sentido.'
  spanish_quality_summary: El texto es claro y digno, pero necesita un ajuste menor de naturalidad y precisión estilística. «irá delante de mí» funciona bien. La frase final mejora claramente con «me dejará ver a mis enemigos», que suena más idiomática en español bíblico moderno y sigue fiel al causativo hebreo sin sobreinterpretar. La nota actual es buena, pero conviene añadir la nota léxica sobre חֶסֶד porque el inglés la preserva y en español ayuda a justificar la elección.
  glossary_alignment: «Dios» está bien alineado con el glosario. No hay términos de Yahvé/Mesías/Espíritu en juego. Para חֶסֶד, «amor constante» alinea mejor con la razón documentada de afecto + durabilidad que «amor leal», aunque ambas son posibles. La repetición de «Dios» debe mantenerse, y se mantiene.
  issues:
  - severity: medium
    issue: Falta la nota léxica correspondiente a «steadfast love / hesed».
    rationale: El audit trail inglés conserva explícitamente una nota sobre חֶסֶד. Dado que la frase hebrea es inusual y la elección española puede variar («amor constante», «amor leal», «misericordia»), conviene preservar esa justificación también en español.
  - severity: low
    issue: «me dejará mirar a mis enemigos» suena menos natural que «me dejará ver a mis enemigos».
    rationale: Ambas opciones son fieles al hifil causativo, pero «ver» es más idiomático en español general y evita una ligera rigidez sin introducir interpretación adicional.
  - severity: low
    issue: «amor leal» podría ajustarse mejor a «amor constante».
    rationale: La decisión inglesa subraya la cualidad perdurable de hesed mediante «steadfast love». «Amor constante» reproduce mejor esa dimensión en español neutral, mientras que «amor leal» inclina algo más hacia la fidelidad relacional. No es un error grave, pero sí una mejora de alineación.
  revised_spanish_text: El Dios de su amor constante[a] irá delante de mí[b]; Dios me dejará ver a mis enemigos.
  revised_footnotes:
  - marker: a
    text: «Amor constante» traduce el hebreo hesed, que a menudo denota amor o misericordia leal y pactual.
    reason: lexical_alternative
  - marker: b
    text: 'O, siguiendo otra tradición de vocalización/traducción: «Mi Dios en su amor constante irá delante de mí» o «Mi Dios de amor constante irá delante de mí».'
    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad del español y la alineación con el audit trail inglés: se cambia «amor leal» por «amor constante», se ajusta «mirar» a «ver», y se añade la nota léxica sobre hesed además de conservar la nota de lectura alternativa.'
