translation:
  language: es
  text: Todo lo hizo hermoso en su tiempo. También puso la eternidad[a] en su corazón, pero de tal modo que el hombre no puede descubrir la obra que Dios ha hecho desde el principio hasta el fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mundo» o «la era» para עוֹלָם; el hebreo aquí es difícil y puede referirse a una conciencia del conjunto del tiempo o del mundo más allá de la experiencia inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo demás
  - todas las cosas
  lexicon: HALOT
  rationale: El hebreo con עָשָׂה tiene alcance total; «todo» conserva la amplitud sin volver la frase pesada en español.
- source_word: יָפֶה
  english_pob_choice: beautiful
  chosen_spanish: hermoso
  alternatives_spanish:
  - bello
  - apropiado
  - conveniente
  lexicon: HALOT
  rationale: «Hermoso» mantiene el valor estético que el POB inglés preserva con «beautiful», y en español sigue permitiendo la posible idea de adecuación sin reducirla a «apropiado».
- source_word: בְעִתּוֹ
  english_pob_choice: in its time
  chosen_spanish: en su tiempo
  alternatives_spanish:
  - a su tiempo
  - en la ocasión debida
  - en el tiempo señalado
  lexicon: HALOT
  rationale: La expresión refleja el tiempo asignado o correspondiente a cada cosa; «en su tiempo» es la forma más directa y natural.
- source_word: הָעֹלָם
  english_pob_choice: eternity
  chosen_spanish: la eternidad
  alternatives_spanish:
  - el mundo
  - la era
  - el siglo
  - la totalidad del tiempo
  lexicon: HALOT
  rationale: Se conserva la decisión del POB de dejar abierta la tensión léxica. «Eternidad» comunica el horizonte más allá de lo inmediato, sin resolver dogmáticamente entre «mundo» o «edad».
- source_word: בְּלִבָּם
  english_pob_choice: in their heart
  chosen_spanish: en el corazón de ellos
  alternatives_spanish:
  - en su corazón
  - en su interior
  - en la mente de ellos
  lexicon: HALOT
  rationale: Aunque «su corazón» sería más idiomático, «el corazón de ellos» deja visible el plural del hebreo y evita singularizar indebidamente el sujeto colectivo humano.
- source_word: מִבְּלִי אֲשֶׁר לֹא
  english_pob_choice: yet so that ... cannot
  chosen_spanish: sin que ... pueda
  alternatives_spanish:
  - de modo que ... no pueda
  - para que ... no pueda
  - sin poder
  lexicon: HALOT
  rationale: La construcción hebrea expresa limitación/resultados; «sin que ... pueda» preserva la restricción sin sobrecargar la oración con una paráfrasis interpretativa.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  - la persona
  lexicon: HALOT
  rationale: Se mantiene el singular genérico del hebreo y del POB inglés. «El hombre» funciona como representante de la humanidad, aunque se reconoce su matiz genérico tradicional.
- source_word: יִמְצָא
  english_pob_choice: find out
  chosen_spanish: descubrir
  alternatives_spanish:
  - hallar
  - comprender
  - trazar plenamente
  lexicon: HALOT
  rationale: En este contexto el verbo no es mero «encontrar», sino llegar a discernir o abarcar la obra divina; «descubrir» recoge esa idea en español actual.
- source_word: הַמַּעֲשֶׂה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la acción
  - lo que Dios ha hecho
  lexicon: HALOT
  rationale: «Obra» corresponde bien al acto/actividad de Dios y suena más natural en español bíblico que «trabajo», que podría sonar demasiado moderno o técnico.
- source_word: מֵרֹאשׁ וְעַד סוֹף
  english_pob_choice: from beginning to end
  chosen_spanish: desde el principio hasta el fin
  alternatives_spanish:
  - de principio a fin
  - desde el comienzo hasta el final
  lexicon: HALOT
  rationale: La merismo hebrea se conserva con una fórmula transparente y solemne; «principio» y «fin» encajan bien con el contraste bíblico.
theological_decisions:
- issue: Sentido de עוֹלָם en relación con el alcance del conocimiento humano
  english_pob_reading: Rendered as 'eternity' in the main text, with a footnote preserving 'world'/'age' alternatives
  chosen_spanish_reading: «la eternidad» en el texto principal, con nota de alternativas
  alternative_spanish_readings:
  - «el mundo»
  - «la era»
  - «el siglo»
  - «la totalidad del tiempo»
  rationale: 'La traducción principal conserva la tensión del hebreo: Dios ha puesto algo en el interior humano que apunta más allá de lo inmediato, pero el texto no obliga a fijar una sola glosa. La nota protege la ambigüedad reconocida por el POB inglés.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto sigue de cerca la decisión final del POB inglés sin depender mecánicamente de él: conserva la ambigüedad de עוֹלָם, la limitación de la comprensión humana y la merisma final «desde el principio hasta el fin». No se introdujeron revisiones adicionales frente al auditorio inglés; el estado de revisión indica sin cambios.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se introduce terminología eclesiástica no respaldada por el hebreo.
  - Se usa «la eternidad» como equivalente principal de עוֹלָם, con nota para preservar la alternativa semántica.
  - «El hombre» conserva el genérico singular del hebreo, en línea con la decisión inglesa.
  - La puntuación y el orden siguen el ritmo de dos cláusulas principales, respetando la estructura poética del versículo.
