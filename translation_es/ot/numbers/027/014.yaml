  text: כַּ/אֲשֶׁר֩ מְרִיתֶ֨ם פִּ֜/י בְּ/מִדְבַּר צִ֗ן בִּ/מְרִיבַת֙ הָֽ/עֵדָ֔ה לְ/הַקְדִּישֵׁ֥/נִי בַ/מַּ֖יִם לְ/עֵינֵי/הֶ֑ם הֵ֛ם מֵֽי מְרִיבַ֥ת קָדֵ֖שׁ מִדְבַּר צִֽן־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/numbers/027/014.yaml
  text: because you rebelled against my command in the wilderness of Zin[a], in the strife of the congregation, by not treating me as holy at the waters before their eyes[b]. These are the waters of Meribath-kadesh in the wilderness of Zin.
  footnotes:
  - marker: a
    text: Or 'to sanctify me' / 'to show me as holy before their eyes.' The Hebrew infinitive is positive in form, but the context makes clear that Moses and Aaron failed to do this.
    reason: lexical_alternative
  - marker: b
    text: Meribath-kadesh may also be rendered 'Meribah of Kadesh' or more literally 'the strife of Kadesh.'
    reason: alternative_reading
