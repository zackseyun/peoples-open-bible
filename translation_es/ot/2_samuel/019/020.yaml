translation:
  language: es
  text: 'Y él dijo al rey: «No me tenga mi señor por culpable[a], ni recuerde lo que hizo mal su siervo el día en que mi señor el rey salió de Jerusalén, ni lo tome a pecho[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no me cuente culpa/iniquidad»; el hebreo tiene una forma forense idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «ponerlo en su corazón»; es un modismo que significa tomar algo en serio o tenerlo contra alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחֲשָׁב לִי עָוֺן
  english_pob_choice: count me guilty
  chosen_spanish: me tenga por culpable
  alternatives_spanish:
  - me cuente por culpable
  - me impute culpa
  - me considere culpable
  lexicon: HALOT
  rationale: 'La expresión hebrea es forense e idiomática: “contar/atribuir iniquidad a alguien”. En español, “tener por culpable” transmite esa valoración judicial sin sonar demasiado técnica, y conserva la petición de no ser tratado según su falta.'
- source_word: עָוֺן
  english_pob_choice: guilty
  chosen_spanish: culpable
  alternatives_spanish:
  - iniquidad
  - culpa
  - maldad
  lexicon: HALOT
  rationale: En este giro, el sustantivo no pide una traducción abstracta como “iniquidad” tanto como el resultado jurídico de la acusación. “Culpable” expresa mejor el valor funcional del término en la oración.
- source_word: תִּזְכֹּר
  english_pob_choice: remember
  chosen_spanish: recuerde
  alternatives_spanish:
  - tenga presente
  - lo tenga en mente
  - no olvide
  lexicon: HALOT
  rationale: Se mantiene el verbo directo “recordar”, pero en español de respeto y súplica queda mejor en subjuntivo (“recuerde”). La frase conserva la posibilidad implícita de recordar con intención de actuar contra él.
- source_word: הֶעֱוָה
  english_pob_choice: did wrong
  chosen_spanish: hizo mal
  alternatives_spanish:
  - cometió maldad
  - obró perversamente
  - faltó
  lexicon: HALOT
  rationale: El hifil comunica acción torcida o incorrecta. “Hizo mal” es natural en español moderno y refleja confesión de falta sin cargar el verso con un registro más severo de lo que el contexto exige.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su servidor
  - su esclavo
  lexicon: HALOT
  rationale: Aquí la auto-designación cortesana ante el rey pide una forma deferente en español. “Siervo” conserva el tono de humillación respetuosa; “esclavo” sería demasiado fuerte en este contexto protocolario.
- source_word: יָצָא ... מִירוּשָׁלָם
  english_pob_choice: went out from Jerusalem
  chosen_spanish: salió de Jerusalén
  alternatives_spanish:
  - partió de Jerusalén
  - se fue de Jerusalén
  lexicon: HALOT
  rationale: La construcción hebrea de “salir de” se puede reflejar de manera directa y natural en español. “Salió de Jerusalén” preserva el movimiento narrativo asociado con la salida del rey.
- source_word: לָשׂוּם ... אֶל לִבּוֹ
  english_pob_choice: take it to heart
  chosen_spanish: lo tenga en cuenta
  alternatives_spanish:
  - lo tome a pecho
  - lo lleve al corazón
  - lo tenga en su corazón
  lexicon: HALOT
  rationale: El hebreo idiomático significa atender algo seriamente o dejar que pese en la decisión. “Tenerlo en cuenta” es un equivalente natural en español que comunica esa atención efectiva; se anota la alternativa más literal en nota por la imagen del “corazón”.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey David
  - el monarca
  lexicon: HALOT
  rationale: El hebreo repite “el rey” y el español debe preservar esa repetición. “Rey” es más directo y menos marcado que “monarca”, y mantiene el estilo cortesano del discurso.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi señor rey
  lexicon: HALOT
  rationale: Es un tratamiento respetuoso hacia el rey, no el nombre divino. “Mi señor” conserva la deferencia y el posesivo que expresan la relación de subordinación.
theological_decisions:
- issue: La ambigüedad forense de “contar culpa/iniquidad” frente a “tener por culpable”
  english_pob_reading: Do not let my lord count me guilty
  chosen_spanish_reading: No me tenga mi señor por culpable
  alternative_spanish_readings:
  - No me cuente culpa
  - No me impute culpa
  - No me considere culpable
  rationale: 'La lectura inglesa subraya el lenguaje judicial. En español, “tener por culpable” conserva ese valor sin perder fluidez. No se neutraliza la tensión: la frase sigue sonando a decisión jurídica sobre la falta del hablante.'
  doctrine_reference: Justicia retributiva / lenguaje forense bíblico
- issue: El idiomа de “ponerlo en el corazón” o “tenerlo en cuenta”
  english_pob_reading: so that the king should take it to heart
  chosen_spanish_reading: para que el rey lo tenga en cuenta
  alternative_spanish_readings:
  - para que el rey lo tome a pecho
  - para que el rey lo lleve en el corazón
  - para que el rey lo tome en serio
  rationale: El inglés POB conservó la fuerza idiomática sin volverlo literalmente extraño. En español, “tener en cuenta” comunica la misma idea de considerar seriamente la ofensa, mientras la nota preserva la imagen hebrea del corazón para el lector que quiera verla.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que pasó de “hold me guilty” a “count me guilty” para acercarse más al idiomа hebreo de “reckon iniquity/guilt to me”. En español se optó por una solución igualmente forense (“tener por culpable”) que mantiene la fuerza de la petición sin sonar arcaica. También se conservó el cierre idiomático, pero con un equivalente español natural (“tener en cuenta”) y nota explicativa.
  spanish_consistency_notes:
  - Se usa “Yahvé” para el nombre divino cuando aparezca; aquí no aparece.
  - Se mantiene “rey” y no se sustituye por un nombre propio, respetando la repetición del texto fuente.
  - “Siervo” se usa como forma cortesana, no como traducción automática de δοῦλος.
  - La puntuación y el trato respetuoso en segunda/tercera persona siguen el registro bíblico-cortesano en español contemporáneo.
