id: HEB.4.2
reference: Hebrews 4:2
source:
  edition: SBLGNT
  text: καὶ γάρ ἐσμεν εὐηγγελισμένοι καθάπερ κἀκεῖνοι, ἀλλ’ οὐκ ὠφέλησεν ὁ λόγος τῆς ἀκοῆς ἐκείνους, μὴ ⸀συγκεκερασμένους τῇ πίστει τοῖς ἀκούσασιν.
translation:
  text: For indeed[a], we also have had good news proclaimed to us, just as they did; but the message they heard did not benefit them[b], because it was not united by faith with those who heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following a textual variant and traditional rendering: ''because it was not mixed with faith in those who heard.'''
    reason: textual_variant
  - marker: b
    text: Greek 'faith'; alternatively 'trust.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐηγγελισμένοι
  chosen: have had good news proclaimed to us
  alternatives:
  - have been evangelized
  - have received the gospel
  lexicon: BDAG
  rationale: 'Perfect passive participle with ἐσμεν forms a periphrastic perfect: a completed proclamation with continuing relevance. ''Good news proclaimed'' preserves the verbal idea without importing later technical ''gospel'' language too strongly into the wilderness-generation comparison.'
- source_word: καθάπερ κἀκεῖνοι
  chosen: just as they did
  alternatives:
  - even as those also
  - just as they also were
  lexicon: BDAG
  rationale: Idiomatic English comparison. The Greek points to parity between the present audience and the wilderness generation in having received a divine message.
- source_word: ὁ λόγος τῆς ἀκοῆς
  chosen: the message they heard
  alternatives:
  - the word of hearing
  - the message of hearing
  - the word they heard
  lexicon: BDAG
  rationale: Genitive construction is awkward if rendered woodenly. 'Message they heard' captures λόγος as proclaimed content and ἀκοή as what was heard/hearing.
- source_word: ὠφέλησεν
  chosen: did not benefit
  alternatives:
  - did not profit
  - was of no advantage to
  lexicon: BDAG
  rationale: Natural modern English that preserves the sense of failing to produce saving/spiritual advantage.
- source_word: συγκεκερασμένους
  chosen: united
  alternatives:
  - mixed
  - combined
  - joined
  lexicon: BDAG
  rationale: The participle literally evokes mixing or combining. In context it refers metaphorically to being joined together, not mere physical mixture. 'United' communicates the relational/resultative sense in readable English.
- source_word: πίστει
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: 'Per doctrine default, πίστις is rendered ''faith'' in the main text. Here the dative likely expresses means or sphere: they were not united ''by faith.'' ''Trust'' is possible but less consistent; ''faithfulness'' is less likely in this context.'
- source_word: τοῖς ἀκούσασιν
  chosen: with those who listened
  alternatives:
  - with those who heard
  - with the hearers
  lexicon: BDAG
  rationale: Aorist participle refers to those who responded appropriately to the message. 'Listened' in English can imply receptive hearing, which fits the contrast, while remaining close to ἀκούω.
- source_word: μὴ συγκεκερασμένους τῇ πίστει τοῖς ἀκούσασιν
  chosen: because they were not united by faith with those who listened
  alternatives:
  - because it was not mixed with faith in those who heard
  - since they were not joined in faith to those who heard
  lexicon: BDAG
  rationale: 'This clause is textually and syntactically difficult. The chosen rendering follows the reading in the provided SBLGNT, where the accusative participle agrees with ἐκείνους (''them''): the people were not united by faith with the ones who heard rightly. This avoids forcing the alternative textual reading into the main text while yielding coherent English.'
