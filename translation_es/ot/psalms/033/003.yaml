translation:
  language: es
  text: Cántenle un cántico nuevo; toquen con destreza con aclamación jubilosa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con un grito de júbilo». El hebreo תְּרוּעָה puede denotar un grito jubiloso, una aclamación sonora o, en algunos contextos, un toque de trompeta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten a él
  - Canten
  lexicon: HALOT
  rationale: Imperativo plural de שׁיר. En español, «canten» comunica de manera natural la exhortación colectiva a cantar y mantiene el tono poético del llamado.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular con ל indica aquí el destinatario de la alabanza. «A él» conserva la dirección del canto sin añadir matices no sustentados por el hebreo.
- source_word: שִׁיר חָדָשׁ
  english_pob_choice: a new song
  chosen_spanish: un cántico nuevo
  alternatives_spanish:
  - un canto nuevo
  - una canción nueva
  lexicon: HALOT
  rationale: «Cántico» es una opción natural y reverente en registro bíblico para שִׁיר, y «nuevo» conserva el sentido básico de חָדָשׁ. Se evita «canción» por ser más coloquial en este contexto litúrgico.
- source_word: הֵיטִיבוּ
  english_pob_choice: play skillfully
  chosen_spanish: toquen con destreza
  alternatives_spanish:
  - toquen bien
  - hagan bien al tocar
  lexicon: HALOT
  rationale: El imperativo hifil de יטב tiene fuerza adverbial en contexto musical. «Con destreza» expresa la idea de ejecutar bien, con excelencia, sin volverla una frase áspera o demasiado literal.
- source_word: נַגֵּן
  english_pob_choice: play
  chosen_spanish: toquen
  alternatives_spanish:
  - hagan música
  - toquen un instrumento
  lexicon: HALOT
  rationale: נגן se refiere a tocar música o instrumentos. Dado que el verbo ya aparece implícito en «toquen con destreza», se conserva el sentido instrumental en español con un verbo breve y natural.
- source_word: בִּתְרוּעָה
  english_pob_choice: with a joyful shout
  chosen_spanish: con un grito de júbilo
  alternatives_spanish:
  - con un clamor de júbilo
  - con un grito alegre
  - con un toque de trompeta
  lexicon: HALOT
  rationale: תְּרוּעָה puede denotar grito jubiloso, aclamación sonora o, en otros contextos, toque de trompeta. En este contexto de alabanza, «grito de júbilo» preserva la intensidad celebrativa sin decidir indebidamente por una lectura instrumental.
theological_decisions:
- issue: Referente del pronombre singular en «a él»
  english_pob_reading: The pronoun refers to God, the LORD, as the addressee of praise in the psalm's immediate context.
  chosen_spanish_reading: El pronombre se entiende como referencia a Yahvé, destinatario del canto en el contexto inmediato del salmo.
  alternative_spanish_readings:
  - a él = al Señor
  - a él = a Dios
  rationale: El hebreo usa un sufijo masculino singular que en el contexto del salmo apunta a Dios. Siguiendo la convención del proyecto, se explicita «Yahvé» en el trasfondo, sin introducir una glosa innecesaria en el texto principal.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
- issue: Valor semántico de תְרוּעָה
  english_pob_reading: The Hebrew תְּרוּעָה can denote a jubilant cry, loud acclamation, or in some contexts a trumpet-like blast.
  chosen_spanish_reading: Se mantiene abierta la lectura de grito jubiloso/aclamación sonora, sin fijarla como trompeta en el texto principal.
  alternative_spanish_readings:
  - toque de trompeta
  - clamor jubiloso
  rationale: El contexto de alabanza favorece una expresión sonora jubilosa. Como el término puede abarcar más de una posibilidad, la traducción principal evita estrechar el sentido y conserva la amplitud lexical documentada.
  doctrine_reference: HALOT lexical range for תְּרוּעָה; Translation philosophy §1
translation_notes:
  revision_awareness: El texto en inglés fue afinado desde «with a shout of joy» a «with a joyful shout» para mayor naturalidad; la versión española conserva esa misma amplitud semántica con «grito de júbilo», evitando una especificación instrumental no obligada por el hebreo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma estándar del proyecto para el nombre divino en notas y decisiones, aunque en este versículo el pronombre está implícito en «a él» y no exige reemplazo explícito en el texto.
  - Se prefiere «cántico» sobre «canción» por registro bíblico, sin cambiar el sentido de שִׁיר.
  - «Con destreza» refleja el valor adverbial de הֵיטִיבוּ sin forzar un calco poco idiomático.
  - «Grito de júbilo» mantiene la tensión entre aclamación y posible toque instrumental que documenta el hebreo תְרוּעָה.
