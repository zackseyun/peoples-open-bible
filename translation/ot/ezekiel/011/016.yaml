theological_decisions:
- issue: Rendering of the divine name יְהוָה within אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of מְעַט in לְמִקְדָּשׁ מְעַט
  chosen_reading: 'qualitative: ''a little sanctuary'''
  alternative_readings:
  - 'temporal: ''a sanctuary for a little while'''
  rationale: 'The main text preserves the most common and contextually fitting sense: God himself would be a limited but genuine sanctuary-presence for the exiles in foreign lands. Because the Hebrew adjective/adverb can also be taken temporally, that alternative is preserved in a footnote rather than resolved silently.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
