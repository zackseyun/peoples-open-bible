translation:
  language: es
  text: Su descendencia[a] permanecerá para siempre, y su trono será como el sol delante de mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su semilla'. 'Descendencia' expresa mejor en español el sentido colectivo del hebreo.
    reason: lexical_alternative
  - marker: b
    text: O 'en mi presencia'. El hebreo dice literalmente 'delante de mí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַרְעוֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su semilla
  - su linaje
  - su posteridad
  lexicon: HALOT
  rationale: זרע puede ser 'semilla' en sentido literal, pero en este contexto real y dinástico el sentido colectivo es posteridad/descendencia. 'Descendencia' comunica el colectivo en español contemporáneo con naturalidad y sin perder el trasfondo genealógico.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para la eternidad
  lexicon: HALOT
  rationale: עוֹלָם expresa duración indefinida y duradera en un contexto de pacto. 'Para siempre' es la opción más clara y natural en español bíblico actual.
- source_word: יִהְיֶה
  english_pob_choice: will endure
  chosen_spanish: permanecerá
  alternatives_spanish:
  - será
  - durará
  - subsistirá
  lexicon: HALOT
  rationale: El verbo hebreo es simplemente 'será', pero en español 'su descendencia será para siempre' resulta poco idiomático. 'Permanecerá' conserva la idea de continuidad existencial sin añadir una imagen ajena al texto.
- source_word: וְכִסְאוֹ
  english_pob_choice: and his throne
  chosen_spanish: y su trono
  alternatives_spanish:
  - y su asiento real
  - y su reino
  - y su trono real
  lexicon: HALOT
  rationale: כִּסֵּא es literalmente 'trono'. Se conserva la imagen concreta de realeza, que en este contexto apunta al ejercicio dinástico del gobierno.
- source_word: כַשֶּׁמֶשׁ
  english_pob_choice: like the sun
  chosen_spanish: como el sol
  alternatives_spanish:
  - cual el sol
  - igual que el sol
  lexicon: HALOT
  rationale: El prefijo comparativo כ pide un símil directo. 'Como el sol' es la forma más natural y fiel en español.
- source_word: נֶגְדִּי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  - frente a mí
  lexicon: HALOT
  rationale: נֶגֶד con sufijo de primera persona significa 'delante de mí / en mi presencia'. 'Delante de mí' conserva la direccionalidad espacial y la solemnidad de la voz divina.
theological_decisions:
- issue: Referencia del pronombre de primera persona en נֶגְדִּי
  english_pob_reading: Retain 'before me' as God's direct speech
  chosen_spanish_reading: Mantener 'delante de mí' como palabra directa de Yahvé
  alternative_spanish_readings:
  - en mi presencia
  - ante mí
  rationale: El contexto del salmo presenta a Yahvé hablando del descendiente davídico. Mantener la primera persona explícita preserva el peso del pacto y evita suavizar la referencia divina.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Imagen de permanencia de la descendencia y el trono
  english_pob_reading: His offspring will endure forever, and his throne will be like the sun before me.
  chosen_spanish_reading: Su descendencia permanecerá para siempre, y su trono será como el sol delante de mí.
  alternative_spanish_readings:
  - Su descendencia existirá para siempre, y su trono será como el sol delante de mí.
  - Su posteridad permanecerá para siempre, y su trono será como el sol en mi presencia.
  rationale: Se conserva la tensión poética entre continuidad dinástica y la comparación solar del trono. No se abstrae 'trono' a 'reino', porque la imagen concreta forma parte del argumento de la promesa davídica.
  doctrine_reference: Pacto davídico; 2 Samuel 7; Salmo 89
translation_notes:
  revision_awareness: El audit trail inglés mantiene 'before me' de manera literal y decidió no abstraer el trono a 'kingdom'. La revisión más reciente ajustó la segunda cláusula para reflejar que el hebreo dice que el trono 'será como el sol', no que 'perdurará como el sol'. La versión española sigue ese ajuste y evita añadir un verbo de duración en la segunda mitad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino según la política del proyecto, aunque en este versículo la referencia aparece por primera persona.
  - Se mantiene 'trono' como imagen concreta de realeza, no 'reino' ni 'gobierno'.
  - '''Descendencia'' se usa en sentido colectivo dinástico, equivalente funcional de ''offspring''.'
  - Las notas conservan alternativas reales de traducción sin sobrecargar el texto principal.
