translation:
  language: es
  text: David tomó también a Ahinoam de Jezreel[a], y las dos llegaron a ser sus esposas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ahinoam la jezreelita».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «y ambas llegaron a ser esposas para él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת / also + object marker
  english_pob_choice: also took
  chosen_spanish: también tomó a
  alternatives_spanish:
  - tomó también a
  - también tomó
  lexicon: HALOT
  rationale: El hebreo añade la partícula de adición גַּם/«también» junto con el verbo de tomar; en español, «también tomó a» comunica con naturalidad la suma de esta esposa a la anterior sin perder el matiz aditivo.
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se casó con
  - recibió
  lexicon: HALOT
  rationale: El verbo significa literalmente «tomó». En este contexto matrimonial, «tomó» conserva la forma verbal del hebreo y deja que la cláusula siguiente explicite el resultado marital.
- source_word: אֲחִינֹעַם
  english_pob_choice: Ahinoam
  chosen_spanish: Ahinoam
  alternatives_spanish:
  - Ahinóam
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio de manera estándar y reconocible en español bíblico.
- source_word: מִיִּזְרְעֶאל
  english_pob_choice: of Jezreel
  chosen_spanish: de Jezreel
  alternatives_spanish:
  - la jezreelita
  - de Yizreel
  lexicon: HALOT
  rationale: La preposición hebrea con el topónimo expresa procedencia o adscripción geográfica. «De Jezreel» es la forma más natural en español y conserva la referencia local sin forzar un gentilicio.
- source_word: וַתִּהְיֶיןָ גַּם שְׁתֵּיהֶן
  english_pob_choice: and both of them became
  chosen_spanish: y ambas llegaron a ser
  alternatives_spanish:
  - y ambas fueron
  - y las dos fueron
  lexicon: HALOT
  rationale: El hebreo usa el verbo «ser/llegar a ser» en plural femenino con la referencia a Abigail y Ahinoam. «Llegaron a ser» preserva el sentido verbal sin volverlo meramente estático.
- source_word: לְנָשִׁים
  english_pob_choice: his wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - esposas para él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para esposas / como esposas para él». En español, «sus esposas» expresa el sentido relacional de forma clara y sobria; se evita «mujeres» por su ambigüedad y «esposas para él» por su rusticidad.
theological_decisions:
- issue: Matrimonio poligínico descrito sin suavizar
  english_pob_reading: 'The verse is rendered descriptively: David had two wives.'
  chosen_spanish_reading: 'El versículo se traduce descriptivamente: David tuvo dos esposas.'
  alternative_spanish_readings:
  - David se casó con dos mujeres
  - David tomó a Ahinoam y también tenía a Abigail
  rationale: El hebreo afirma sin rodeos que ambas llegaron a ser sus esposas. La traducción no debe moralizar ni atenuar el dato textual; debe dejar visible la realidad poligínica que el versículo reporta.
  doctrine_reference: 'Principio de transparencia textual: no introducir una corrección doctrinal que el versículo no formula.'
translation_notes:
  revision_awareness: El registro inglés fue revisado de «from Jezreel» a «of Jezreel» para reflejar mejor la designación geográfica/gentilicia natural. La redacción española adopta directamente «de Jezreel», que mantiene esa misma solución sin introducir una glosa innecesaria. Se conserva además el paralelismo del verbo dinámico «llegaron a ser» para reflejar el hebreo וַתִּהְיֶיןָ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada sólo cuando el texto lo requiera; este versículo no lo contiene.
  - «Esposas» se usa aquí por ser la referencia explícita del hebreo לְנָשִׁים en contexto matrimonial; no se emplea «siervas» ni otra terminología eclesial.
  - 'El orden de los elementos sigue el flujo hebreo y el audit trail inglés: sujeto + verbo de tomar + procedencia + resultado marital.'
