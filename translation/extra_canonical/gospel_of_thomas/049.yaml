translation:
  text: Jesus said[solitary], "Blessed are the solitary and chosen, for you will find
    the kingdom. For you are from it[from it][find the kingdom], and you will go there
    again."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:43:11Z'
  footnotes:
  - marker: solitary
    text: The Greek loanword μοναχός (monachos) in Thomas denotes someone who is 'single'
      or 'undivided' in a spiritual sense, rather than carrying the later institutional
      meaning of a 'monk'.
    reason: lexical_alternative
  - marker: find the kingdom
    text: The Coptic uses the preposition ⲁ (a) instead of the standard Sahidic ⲉ
      (e) after the verb ϩⲉ ('to find'), a regional dialectal feature common in this
      manuscript.
    reason: dialect_note
  - marker: from it
    text: Literally 'ones out of it' (plural indefinite article ϩⲉⲛ- + ⲉⲃⲟⲗ).
    reason: register_note
lexical_decisions:
- source_word: ⲙⲟⲛⲁⲭⲟⲥ
  chosen: solitary
  rationale: A Greek loanword (μοναχός) that in Thomasine literature refers to spiritual
    singleness and undividedness, rather than the later institutional sense of a monk.
  lexicon: BDAG (for Greek loanword); Crum 175a (for general Coptic usage)
  alternatives:
  - monks
  - single ones
- source_word: ⲥⲱⲧⲡ
  chosen: chosen
  rationale: Standard translation for the relative form ⲉⲧⲥⲟⲧⲡ.
  lexicon: Crum 365a
  alternatives:
  - elect
- source_word: ϩⲉ
  chosen: find
  rationale: Standard meaning of ϩⲉ when followed by the preposition ⲉ (or here, the
    dialectal variant ⲁ).
  lexicon: Crum 651a
  alternatives:
  - discover
- source_word: ⲙⲛⲧⲉⲣⲟ
  chosen: kingdom
  rationale: Standard translation for ⲙⲛⲧⲉⲣⲟ.
  lexicon: Crum 298a
  alternatives:
  - reign
  - sovereignty
theological_decisions:
- issue: Translation of ⲙⲟⲛⲁⲭⲟⲥ
  chosen_reading: solitary
  rationale: Translating as 'monk' would introduce anachronistic institutional baggage.
    'Solitary' captures the Thomasine ideal of inner unity and separation from the
    world.
  alternatives_noted:
  - monks
  - single ones
- issue: Nature of the kingdom
  chosen_reading: kingdom
  rationale: Kept as 'kingdom' (ⲙⲛⲧⲉⲣⲟ). In Thomas, the kingdom is presented here
    as a present reality and a state of origin/return ('you are from it, and you will
    go there again'), contrasting with purely future apocalyptic views.
  alternatives_noted: []
drafter_notes: The translation preserves the Thomasine emphasis on the 'solitary'
  (monachos) and the kingdom as a state of origin and return. The dialectal use of
  ⲁ for ⲉ after ϩⲉ is noted. Note that the normalized text provided in the prompt
  incorrectly lemmatizes the plural ϩⲉⲛⲙⲁⲕⲁⲣⲓⲟⲥ ⲛⲉ ⲛⲙⲟⲛⲁⲭⲟⲥ as singular; the translation
  correctly follows the original manuscript's plural forms.
