review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica correctamente la mayoría de los elementos del hebreo: mandato sacrificial, holocausto a Yahvé, dos bovinos, un carnero, siete corderos machos de un año y la exigencia de integridad. Sin embargo, la frase inicial וּבְרָאשֵׁי חָדְשֵׁיכֶם se ha llevado en el texto principal a una equivalencia interpretativa (''En las lunas nuevas de ustedes'') cuando el expediente POB en inglés decidió preservar más de cerca la estructura fuente (''At the beginnings of your months'') y relegar ''new-moon observances'' a nota. En español conviene reflejar esa misma decisión principal y dejar la glosa ritual en nota.'
  spanish_quality_summary: El español es claro y eclesialmente legible. 'Holocausto', 'carnero' y 'sin defecto' funcionan bien. No obstante, 'de ustedes' suena algo pesado aquí; 'de sus meses' o una formulación directa temporal es más natural. Además, 'de la vacada' es comprensible pero menos natural y menos amplio que 'del ganado' o 'de la manada'; 'novillos del ganado' mejora la fluidez sin perder sentido.
  glossary_alignment: 'Se alinea bien con el glosario del proyecto en el uso de ''Yahvé''. No hay conflicto terminológico importante en los demás términos. La principal desalineación es metodológica: el inglés POB documentó una preferencia por una traducción más literal de רָאשֵׁי חָדְשֵׁיכֶם en el texto principal, con la interpretación ''luna nueva'' en nota, y el español debería seguir esa racionalidad auditada.'
  issues:
  - severity: medium
    issue: La frase inicial se volvió demasiado interpretativa en el texto principal.
    rationale: El hebreo dice literalmente 'en los comienzos/cabezas de sus meses'. El expediente POB decidió conservar esa forma en el texto principal y poner 'new-moon observances' en nota. 'En las lunas nuevas de ustedes' adelanta la interpretación y no preserva la misma estrategia de traducción.
  - severity: low
    issue: La nota al pie no preserva la alternativa correcta respecto del texto principal revisado.
    rationale: Si el texto principal vuelve a una formulación como 'Al comienzo de sus meses', la nota debe reflejar que el hebreo literalmente habla de 'cabezas/comienzos' y que se refiere a las observancias de luna nueva.
  - severity: low
    issue: '''de la vacada'' suena menos natural en español general.'
    rationale: Aunque semánticamente posible, 'del ganado' es más idiomático y ampliamente entendible en español bíblico contemporáneo.
  revised_spanish_text: 'Al comienzo de sus meses[a], presentarán un holocausto a Yahvé: dos novillos del ganado, un carnero y siete corderos machos de un año, sin defecto.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «en las cabezas/comienzos de sus meses»; es decir, en las observancias de luna nueva.'
    reason: alternative_reading
  revision_rationale: 'Se ajusta la frase temporal para seguir más fielmente la decisión documentada del POB: mantener en el texto principal una formulación cercana al hebreo y reservar la interpretación ritual ''luna nueva'' para la nota. También se mejora la naturalidad de ''de la vacada'' a ''del ganado'' sin cambiar el sentido. No se requiere adjudicación adicional porque la evidencia y la pauta del proyecto son claras.'
