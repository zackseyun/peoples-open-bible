translation:
  language: es
  text: Ante la sangre de los caídos, ante la grasa de los poderosos[a], el arco de Jonatán no retrocedió[b], y la espada de Saúl no volvió vacía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la parte más rica» o «lo mejor». «Grasa» mantiene la imagen hebrea; el verso usa lenguaje poético para intensificar el éxito en batalla.
    reason: lexical_alternative
  - marker: b
    text: O «no se volvió atrás». El verbo hebreo puede transmitir la idea de retirarse o volverse atrás.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדַּם
  english_pob_choice: From the blood of
  chosen_spanish: Desde la sangre de
  alternatives_spanish:
  - De la sangre de
  - Desde la sangre derramada de
  lexicon: HALOT
  rationale: La preposición מִן aquí expresa fuente/separación en un contexto bélico. «Desde la sangre de» conserva la imagen y la dirección del movimiento, sin explicar de más.
- source_word: חֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los caídos
  alternatives_spanish:
  - los muertos
  - los heridos
  lexicon: HALOT
  rationale: El término designa a los abatidos en combate. «Los caídos» mantiene el tono poético y comunica bien la referencia a muertos en batalla sin perder precisión.
- source_word: מֵחֵלֶב
  english_pob_choice: from the fat of
  chosen_spanish: desde la grasa de
  alternatives_spanish:
  - desde la parte más rica de
  - desde lo mejor de
  lexicon: HALOT
  rationale: חֵלֶב significa literalmente «grasa». En español, «grasa» conserva la imagen corporal y la fuerza poética del verso. Se eligió «desde» para reflejar la misma idea de procedencia/separación del hebreo.
- source_word: גִּבּוֹרִים
  english_pob_choice: the mighty
  chosen_spanish: los valientes
  alternatives_spanish:
  - los poderosos
  - los guerreros
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «the mighty», en español «valientes» comunica mejor la fuerza militar y el registro heroico del paralelismo poético. Sigue dentro del campo semántico de גִּבּוֹרִים como combatientes fuertes o heroicos.
- source_word: קֶשֶׁת יְהוֹנָתָן
  english_pob_choice: Jonathan’s bow
  chosen_spanish: el arco de Jonatán
  alternatives_spanish:
  - el arco de Jonathan
  lexicon: HALOT
  rationale: La relación constructa se vuelve naturalmente posesiva en español. Se usa «Jonatán» como forma castellana habitual del nombre bíblico.
- source_word: לֹא נָשׂוֹג אָחוֹר
  english_pob_choice: did not turn back
  chosen_spanish: no retrocedió
  alternatives_spanish:
  - no se echó atrás
  - no volvió atrás
  - no se retiró
  lexicon: HALOT
  rationale: El verbo puede implicar retirarse o volverse atrás. En español, «no retrocedió» preserva la idea de movimiento inverso sin volver la frase pesada, y mantiene la personificación del arco.
- source_word: וְחֶרֶב שָׁאוּל
  english_pob_choice: and Saul’s sword
  chosen_spanish: y la espada de Saúl
  alternatives_spanish:
  - y la espada de Saul
  lexicon: HALOT
  rationale: Se conserva la construcción posesiva para reflejar el paralelismo con el verso anterior y la concisión poética del hebreo.
- source_word: לֹא תָשׁוּב רֵיקָם
  english_pob_choice: did not return empty
  chosen_spanish: no volvió vacía
  alternatives_spanish:
  - no regresó vacía
  - no volvió sin efecto
  - no volvió sin presa
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de manera breve y natural. «Vacía» permite conservar la personificación de la espada y la idea de eficacia letal sin añadir elementos no presentes en el texto.
translation_notes:
  revision_awareness: El texto español sigue de cerca el WLC y el audit trail inglés. Se conservó la imaginería bélica y la personificación de arco y espada; la decisión más sensible fue traducir חֲלָלִים como «los caídos» y חֵלֶב como «grasa», para mantener el registro poético sin perder precisión semántica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; aquí el versículo no contiene el nombre divino.
  - «Jonatán» y «Saúl» siguen la forma española estándar de los nombres bíblicos.
  - Se conserva el paralelismo sintáctico del hebreo en dos miembros casi simétricos.
  - No se introduce terminología eclesiástica ajena al contexto bélico-poético del pasaje.
