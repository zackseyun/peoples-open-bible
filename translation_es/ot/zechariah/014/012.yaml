review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue las decisiones del POB en puntos clave: «Yahvé», «plaga», «pueblos», «carne», «cuencas» y la imaginería gráfica del juicio. Sin embargo, «que hicieron guerra contra Jerusalén» debilita el matiz de צָבְאוּ עַל, que en el contexto describe pueblos que guerrean/han venido en campaña contra Jerusalén, no meramente que alguna vez hicieron guerra. Además, «mientras está de pie sobre sus pies» suena poco natural en español y replica demasiado literalmente la estructura hebrea.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos problemas de estilo/precisión: «hicieron guerra» suena menos idiomático y además cambia el aspecto/matiz contextual; y «de pie sobre sus pies» es innecesariamente calcado y torpe en español. Una leve revisión mejora la naturalidad sin perder concreción ni fuerza.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; הַמַּגֵּפָה → «plaga» correcto; כָּל־הָעַמִּים → «todos los pueblos» correcto con nota alternativa «naciones»; בְּשָׂרוֹ → «su carne» correcto. La repetición de מקק se preserva bien con «se pudrirá».'
  issues:
  - severity: medium
    issue: «que hicieron guerra contra Jerusalén» para צָבְאוּ עַל
    rationale: Aunque comunica hostilidad militar, «hicieron guerra» suena menos natural en español bíblico actual y no refleja tan bien el valor contextual de campaña/guerra activa contra Jerusalén. «que hacen guerra contra Jerusalén» o «que guerrean contra Jerusalén» preserva mejor el sentido.
  - severity: medium
    issue: «mientras está de pie sobre sus pies» es un calco torpe
    rationale: El hebreo enfatiza que la plaga los alcanza mientras siguen erguidos, pero en español «de pie sobre sus pies» resulta redundante y poco elegante. «mientras aún está de pie» conserva la inmediatez y legibilidad.
  revised_spanish_text: 'Y esta será la plaga con que Yahvé herirá a todos los pueblos[a] que hacen guerra contra Jerusalén: mientras aún está de pie, su carne se pudrirá; sus ojos se pudrirán en sus cuencas, y su lengua se pudrirá en su boca.'
  revised_footnotes:
  - marker: a
    text: O «naciones». El hebreo עַמִּים puede designar pueblos o naciones según el contexto.
    reason: lexical_alternative
