translation:
  language: es
  text: Si se le impone un rescate[a], entonces dará el precio de redención por su vida, conforme a todo lo que se le imponga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si se le impone un pago de rescate... dará el rescate por su vida». El hebreo usa dos términos relacionados pero distintos: כֹּפֶר («rescate») y פִּדְיֹן («precio de redención»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Pero si
  - Cuando
  lexicon: HALOT
  rationale: El hebreo abre una cláusula condicional legal; «Si» reproduce con claridad esa condición en español sin añadir contraste ni temporalidad no presentes en el texto.
- source_word: כֹּפֶר
  english_pob_choice: a ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - ransom
  - compensación
  - pago de rescate
  lexicon: HALOT
  rationale: Para la primera de las dos nociones relacionadas del versículo, «rescate» comunica un pago exigido para liberar de la pena, conservando el matiz legal sin cargar de antemano la frase con lenguaje cultual de expiación.
- source_word: יוּשַׁת עָלָיו
  english_pob_choice: is imposed on him
  chosen_spanish: se le impone
  alternatives_spanish:
  - se le pone
  - se le fija
  - se le carga
  lexicon: HALOT
  rationale: El pasivo de שׁית con עַל expresa algo colocado o establecido sobre alguien como obligación legal; «se le impone» es la forma más natural y precisa en español jurídico.
- source_word: וְנָתַן
  english_pob_choice: then he shall give
  chosen_spanish: entonces dará
  alternatives_spanish:
  - y dará
  - entonces pagará
  - debe dar
  lexicon: HALOT
  rationale: La secuencia verbal en contexto legal marca la consecuencia esperada. «Entonces dará» preserva la continuidad normativa y suena natural en español contemporáneo.
- source_word: פִּדְיֹן נַפְשׁוֹ
  english_pob_choice: the redemption price for his life
  chosen_spanish: el precio de redención por su vida
  alternatives_spanish:
  - el rescate por su vida
  - el precio para redimir su vida
  lexicon: HALOT
  rationale: 'Se mantiene la distinción del hebreo entre כֹּפֶר y פִּדְיֹן: primero «rescate», luego «precio de redención». «Vida» traduce נֶפֶשׁ en este contexto judicial, donde no significa «alma» sino la vida de la persona.'
- source_word: כְּכֹל אֲשֶׁר יוּשַׁת עָלָיו
  english_pob_choice: according to all that is imposed on him
  chosen_spanish: conforme a todo lo que se le imponga
  alternatives_spanish:
  - según todo lo que se le imponga
  - de acuerdo con todo lo que se le fije
  - conforme a cuanto se le imponga
  lexicon: HALOT
  rationale: La expresión legal enfatiza la totalidad de lo tasado. «Conforme a todo lo que se le imponga» conserva el valor de כֹּל y el mismo idioma jurídico del verbo pasivo.
theological_decisions:
- issue: Diferencia entre כֹּפֶר y פִּדְיֹן en un caso de responsabilidad capital
  english_pob_reading: The verse distinguishes a legally imposed 'ransom' from the 'redemption price' paid for the offender's life, without overtranslating into cultic atonement language.
  chosen_spanish_reading: Se distingue un «rescate» impuesto y luego el «precio de redención» por la vida, sin convertir la ley en lenguaje cultual de expiación.
  alternative_spanish_readings:
  - Traducir ambos términos simplemente como «pago»
  - usar un lenguaje más fuerte de expiación o sacrificio
  rationale: La distinción léxica es parte del sentido del versículo y no debe borrarse. En español, mantener dos expresiones distintas ayuda a respetar la tensión entre pago legal y redención de la vida.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el análisis léxico del texto hebreo y coincide con el sentido confirmado por el audit trail en inglés. Se preserva la distinción entre los dos sustantivos emparentados y el registro jurídico del pasivo repetido. No se introdujeron revisiones adicionales respecto del último pase, que marcó el texto como sin cambios.
  spanish_consistency_notes:
  - Se usa «rescate» para כֹּפֶר y «precio de redención» para פִּדְיֹן para no fusionar dos nociones distintas.
  - «Vida» traduce נֶפֶשׁ por tratarse de un contexto legal, no de una referencia al alma inmortal.
  - Se mantiene un estilo jurídico claro y sobrio, apto para lectura congregacional en español neutral.
