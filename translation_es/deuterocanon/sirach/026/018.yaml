translation:
  language: es
  text: Una lámpara que resplandece sobre un candelabro santo, y la belleza del rostro en una edad estable[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una madurez asentada». La expresión griega ἐπὶ ἡλικίᾳ στασίμῃ es algo idiomática y combina la idea de edad con la de estabilidad o asentamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύχνος
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara de aceite
  - luz
  lexicon: LSJ
  rationale: El griego designa un objeto concreto de iluminación; en español, «lámpara» conserva bien esa imagen material sin volverla abstracta como «luz». En un contexto poético, funciona de manera natural y fiel.
- source_word: ἐκλάμπων
  english_pob_choice: shining brightly
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla intensamente
  - irradia
  lexicon: LSJ
  rationale: El participio expresa una salida de luz vívida y enfática. «Resplandece» comunica ese brillo activo con dignidad poética y sin excesiva expansión interpretativa.
- source_word: ἐπὶ λυχνίας ἁγίας
  english_pob_choice: on a holy lampstand
  chosen_spanish: sobre un candelabro santo
  alternatives_spanish:
  - sobre un lampadario santo
  - sobre un soporte santo para la lámpara
  lexicon: LSJ
  rationale: «Candelabro» transmite bien el soporte de la lámpara en español bíblico moderno. «Santo» conserva el matiz cultual/consecrado de ἁγίας, en vez de neutralizarlo.
- source_word: κάλλος προσώπου
  english_pob_choice: the beauty of a face
  chosen_spanish: la belleza del rostro
  alternatives_spanish:
  - la hermosura del rostro
  - la belleza del semblante
  lexicon: LSJ
  rationale: La construcción genitiva se refleja de forma directa y poética. «Rostro» es concreto y natural en español contemporáneo; mantiene el paralelismo con la imagen anterior.
- source_word: ἐπὶ ἡλικίᾳ στασίμῃ
  english_pob_choice: at a steadfast age
  chosen_spanish: en una edad firme
  alternatives_spanish:
  - en una madurez establecida
  - en una edad estable
  - en una edad asentada
  lexicon: LSJ
  rationale: La revisión inglesa subrayó el sentido de στασίμῃ como estabilidad/solidez más que solo madurez. «Edad firme» conserva esa tensión de «edad» + «estabilidad» sin borrar el rasgo idiomático del griego. La nota al pie ofrece la alternativa interpretativa más explicativa.
translation_notes:
  revision_awareness: Seguí la revisión auditada que movió la idea desde una simple madurez hacia una edad más «firme/estable», manteniendo el paralelismo formal del verso y evitando reducir στασίμῃ a mera edad biológica.
  spanish_consistency_notes:
  - Conservo un registro poético y bíblico, pero con sintaxis española natural.
  - Mantuve la metáfora concreta de la lámpara y del rostro sin explicarla de más.
  - Usé «santo» para ἁγίας por su fuerza cultual, coherente con el texto fuente y la tradición POB de no suavizar ese matiz.
