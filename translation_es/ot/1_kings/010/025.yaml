translation:
  language: es
  text: 'Y ellos traían, cada uno su tributo[a]: artículos de plata, artículos de oro, prendas de vestir[b], armas[c], especias, caballos y mulos, año tras año.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cada uno su regalo' o 'cada uno su presente'; el hebreo מִנְחָה puede denotar regalo, ofrenda o tributo. Aquí 'tributo' refleja el contexto real.
    reason: lexical_alternative
  - marker: b
    text: O 'mantos' o 'ropas' para 'prendas de vestir'.
    reason: lexical_alternative
  - marker: c
    text: O 'armamento' para 'armas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְבִאִים
  english_pob_choice: were bringing
  chosen_spanish: estaban trayendo
  alternatives_spanish:
  - traían
  lexicon: HALOT
  rationale: El participio hebreo con הֵמָּה expresa acción continua o habitual; en español, el imperfecto progresivo conserva bien ese matiz de repetición sin sonar forzado. 'Traían' también es posible, pero 'estaban trayendo' hace más visible la duratividad.
- source_word: אִישׁ מִנְחָתוֹ
  english_pob_choice: each man his tribute
  chosen_spanish: cada uno su tributo
  alternatives_spanish:
  - cada hombre su regalo
  - cada uno su presente
  lexicon: HALOT
  rationale: אִישׁ funciona distributivamente como 'cada uno'; מִנְחָה aquí se entiende mejor en contexto real/real como tributo, no como ofrenda de cereal. En español, 'tributo' comunica el contexto político de homenajes a Salomón con mayor precisión que 'regalo' o 'presente'.
- source_word: כְּלֵי כֶסֶף
  english_pob_choice: articles of silver
  chosen_spanish: artículos de plata
  alternatives_spanish:
  - vasos de plata
  - objetos de plata
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto, utensilio o artículo. 'Artículos de plata' conserva esa amplitud y sigue de cerca la decisión inglesa sin restringir innecesariamente el tipo de pieza.
- source_word: וּכְלֵי זָהָב
  english_pob_choice: articles of gold
  chosen_spanish: artículos de oro
  alternatives_spanish:
  - vasos de oro
  - objetos de oro
  lexicon: HALOT
  rationale: Se mantiene la misma estrategia que en 'artículos de plata' para preservar el paralelismo y la amplitud semántica del hebreo.
- source_word: שְׂלָמוֹת
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - mantos
  - ropas
  lexicon: HALOT
  rationale: El término puede referirse a prendas exteriores o mantos; 'vestidos' es suficientemente amplio y natural en una lista de bienes tributarios. 'Mantos' sería más específico, pero podría estrechar demasiado el alcance.
- source_word: וְנֵשֶׁק
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamento
  - armas de guerra
  lexicon: HALOT
  rationale: נֵשֶׁק designa equipo militar; en español, 'armas' es claro y mantiene la amplitud del término. 'Armamento' también sería posible, pero suena más técnico y menos directo en la lista.
- source_word: בְשָׂמִים
  english_pob_choice: spices
  chosen_spanish: especias
  alternatives_spanish:
  - aromáticos
  - bálsamos
  lexicon: HALOT
  rationale: En un contexto de comercio/tributo, 'especias' es la equivalencia española más natural y suficientemente amplia para sustancias aromáticas.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  lexicon: HALOT
  rationale: Valor léxico estándar.
- source_word: וּפְרָדִים
  english_pob_choice: mules
  chosen_spanish: mulos
  alternatives_spanish:
  - mula(s)
  lexicon: HALOT
  rationale: Valor léxico estándar. 'Mulos' mantiene el plural del hebreo y la coordinación con 'caballos'.
- source_word: דְּבַר שָׁנָה בְּשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - anualmente
  lexicon: HALOT
  rationale: El modismo hebreo indica recurrencia regular. 'Año tras año' conserva el sabor idiomático del hebreo mejor que 'anualmente' y es natural en español.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se mantiene la alta concordancia con la decisión inglesa, ajustando solo la formulación española para naturalidad y precisión semántica.
  spanish_consistency_notes:
  - Se conservó el paralelismo de la lista de tributos con dos miembros coordinados de plata/oro y la secuencia de bienes.
  - Se mantuvo el valor habitual del participio hebreo con un imperfecto progresivo español para expresar continuidad.
  - Se evitó traducir מִנְחָה como 'ofrenda' para no borrar el matiz tributario presente en el contexto monárquico.
  - Se prefirió 'año tras año' como equivalente idiomático de la repetición anual.
