lexical_decisions:
- source_word: הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa del pan de la Presencia
  - la mesa de los panes de la Presencia
  lexicon: HALOT
  rationale: El sustantivo designa la mesa cultual misma. Como la función específica se completa con la expresión siguiente, «el pan de la Presencia», en español conviene no añadir aquí una glosa explicativa que sobretraduzca el hebreo.
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus postes
  - sus palos de transporte
  lexicon: HALOT
  rationale: En contexto tabernacular, בַּד se refiere a las varas para transportar el mueble sagrado. «Varas» comunica bien esa función en español bíblico moderno y evita el arcaísmo de «staves».
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus vasos
  - todos sus implementos
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objetos, instrumentos o recipientes. «Utensilios» es natural en español y conserva la amplitud del término sin restringirlo demasiado.
- source_word: לֶחֶם הַפָּנִים
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - el pan de la faz
  - el pan de la presencia divina
  - el pan de la proposición
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «pan de la faz/presencia». «Pan de la Presencia» preserva el valor cultual del giro y evita el tradicional «pan de la proposición», que oscurece el sentido para lectores actuales.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto base fue mantenido por alta concordancia con la fuente hebrea y con la evaluación de revisión cruzada.'
  spanish_consistency_notes:
  - Se mantiene «Presencia» con mayúscula para reflejar el giro cultual fijo de לֶחֶם הַפָּנִים sin convertirlo en paráfrasis.
  - Se usa «varas» para בַּדָּיו como equivalente funcional y legible en español, coherente con lenguaje tabernacular.
  - No se añadió «del SEÑOR» ni otra expansión interpretativa; el hebreo sólo dice «de la Presencia».
