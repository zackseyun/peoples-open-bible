translation:
  language: es
  text: el alimento de su mesa, la disposición de sus siervos, la asistencia de sus ministros, sus vestiduras, sus coperos y su holocausto[a] que ofreció en la casa de Yahvé, no había en ella ya más aliento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su subida a la casa de Yahvé», posiblemente refiriéndose a la escalinata o a la procesión por la cual subía.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַאֲכַל שֻׁלְחָנוֹ
  english_pob_choice: the food of his table
  chosen_spanish: el alimento de su mesa
  alternatives_spanish:
  - la provisión de su mesa
  - la comida de su mesa
  lexicon: HALOT
  rationale: מַאֲכַל se refiere a alimento/comida para comer. "Alimento" conserva el contenido concreto sin sonar forzado en español; "de su mesa" mantiene la imagen cortesana del hebreo.
- source_word: מוֹשַׁב עֲבָדָיו
  english_pob_choice: the seating of his servants
  chosen_spanish: la disposición de sus siervos
  alternatives_spanish:
  - el asiento de sus siervos
  - el lugar de sus siervos
  lexicon: HALOT
  rationale: מוֹשָׁב puede significar asiento, disposición o lugar de colocación. "Disposición" comunica mejor en español el orden observado en la corte, sin perder la idea de ubicación de los siervos.
- source_word: מַעֲמַד מְשָׁרְתָיו
  english_pob_choice: the attendance of his ministers
  chosen_spanish: la asistencia de sus ministros
  alternatives_spanish:
  - la posición de sus servidores
  - el servicio de sus ministros
  lexicon: HALOT
  rationale: מַעֲמָד remite a estar de pie, estar en servicio o en estación; מְשָׁרְתִים son funcionarios/asistentes de corte. "Asistencia" expresa bien su presencia y función oficial sin sonar excesivamente literal.
- source_word: מְשָׁרְתָיו
  english_pob_choice: ministers
  chosen_spanish: ministros
  alternatives_spanish:
  - asistentes
  - servidores
  lexicon: HALOT
  rationale: En este contexto real de corte, el término apunta a funcionarios de servicio. "Ministros" distingue este grupo del más general "siervos" del miembro anterior, como en el audit trail inglés.
- source_word: מַלְבֻּשֵׁיהֶם
  english_pob_choice: their clothing
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - su ropa
  - sus vestidos
  lexicon: HALOT
  rationale: El sustantivo denota ropa/garmentos. "Vestiduras" es solemne y precisa para un inventario cortesano, y en español bíblico mantiene dignidad sin perder claridad.
- source_word: מַשְׁקָיו
  english_pob_choice: his cupbearers
  chosen_spanish: sus coperos
  alternatives_spanish:
  - sus servidores de bebida
  - sus encargados de beber
  lexicon: HALOT
  rationale: En contexto real, el plural señala a quienes sirven bebida, no meramente a las bebidas. "Coperos" es el equivalente natural y tradicional en español para esa función de corte.
- source_word: עֹלָתוֹ אֲשֶׁר יַעֲלֶה בֵּית יְהוָה
  english_pob_choice: his burnt offering that he offered at the house of the LORD
  chosen_spanish: su holocausto que ofrecía en la casa de Yahvé[a]
  alternatives_spanish:
  - su subida a la casa de Yahvé
  - la escalera por la que subía a la casa de Yahvé
  lexicon: HALOT
  rationale: La vocalización masorética apoya "holocausto"; sin embargo, la consonantal permite la lectura alternativa de "subida". Mantengo el sentido principal del texto hebreo transmitido y conservo la ambigüedad documentada en la nota.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of the LORD
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: El hebreo dice literalmente "casa de Yahvé". En esta serie de decisiones el nombre divino se vierte como "Yahvé", y "casa" preserva la expresión hebrea más directamente que "templo".
- source_word: רוּחַ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - espíritu
  - respiración
  lexicon: HALOT
  rationale: En la expresión idiomática final, רוּחַ describe la falta de aliento o el quedar abrumada. "Aliento" conserva la imagen hebrea y suena natural en español.
- source_word: וְלֹא הָיָה בָּהּ עוֹד רוּחַ
  english_pob_choice: there was no more breath in her
  chosen_spanish: no había en ella ya más aliento
  alternatives_spanish:
  - ya no le quedaba aliento
  - su espíritu se fue
  lexicon: HALOT
  rationale: La cláusula es idiomática para asombro extremo. "No había en ella ya más aliento" sigue de cerca el hebreo y mantiene la fuerza de la imagen sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo contiene explícitamente el Tetragrama. Para la edición española de la POB se mantiene el nombre del pacto en forma auditable y no se lo enmascara con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretación de עֹלָתוֹ en la lista final
  english_pob_reading: his burnt offering that he offered at the house of the LORD
  chosen_spanish_reading: su holocausto que ofrecía en la casa de Yahvé
  alternative_spanish_readings:
  - su subida a la casa de Yahvé
  - la escalera por la que subía a la casa de Yahvé
  rationale: La vocalización masorética favorece "holocausto", pero la raíz y la tradición interpretativa admiten una lectura alternativa relacionada con "subida". La traducción principal sigue el texto vocalizado, y la nota preserva la tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Coincide sustancialmente con la última revisión auditada (high_agreement); no se requieren cambios adicionales respecto al pasaje fuente y la ambigüedad de עֹלָתוֹ se conserva en nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se conserva la distinción entre siervos, ministros y coperos para reflejar los distintos términos hebreos.
  - '"Holocausto" se usa para עֹלָה en la lectura principal, con nota para la alternativa de "subida".'
  - '"Aliento" reproduce el valor idiomático de רוּחַ sin normalizarlo a "espíritu".'
