review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: denuncia profética, dos grupos paralelos (Sion/Samaria), y la cláusula final sobre la casa de Israel. Sin embargo, hay dos desajustes importantes con el sentido y con la auditoría inglesa: (1) la nota [a] está anclada en «Sion», pero corresponde a נְקֻבֵי / «distinguidos», no a ציון; y (2) «de lo primero de las naciones» es poco natural y no comunica bien רֵאשִׁית הַגּוֹיִם como «lo principal / lo más destacado / lo primero entre las naciones».'
  spanish_quality_summary: El español es generalmente claro y digno, pero tiene una torpeza notable en «de lo primero de las naciones», y la colocación de la nota [a] confunde al lector. «Están tranquilos» es aceptable, aunque «viven tranquilos» o «están confiados» podría sonar más idiomático; no obstante, no exige cambio. La frase final funciona mejor con una formulación más directa y natural que preserve la compresión hebrea.
  glossary_alignment: No hay conflicto con terminología de proyecto. Los topónimos «Sion» y «Samaria» son adecuados en español eclesial. «Casa de Israel» preserva bien la expresión pactual. No aparecen términos sensibles del glosario principal que requieran ajuste.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «Sion», pero su contenido explica «los distinguidos / los designados / los nombrados».
    rationale: Esto rompe la correspondencia entre texto y nota exigida por el formato y además induce una interpretación errónea del hebreo.
  - severity: medium
    issue: «de lo primero de las naciones» suena antinatural y comunica mal רֵאשִׁית הַגּוֹיִם.
    rationale: La expresión hebrea apunta a preeminencia entre las naciones; en español conviene «de lo principal entre las naciones» o equivalente natural.
  - severity: low
    issue: «a quienes se acerca la casa de Israel» es comprensible, pero menos directo que el sentido de movimiento «viene a ellos».
    rationale: La compresión hebrea puede aclararse sin perder fidelidad con una construcción relativa más natural en español.
