id: 1CO.1.20
reference: '1 Corinthians 1:20'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ποῦ σοφός; ποῦ γραμματεύς; ποῦ συζητητὴς τοῦ αἰῶνος τούτου; οὐχὶ ἐμώρανεν ὁ θεὸς τὴν σοφίαν τοῦ ⸀κόσμου;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/001/020.yaml
  text: Where is the wise man? Where is the scribe? Where is the debater of this age? Has not God made the wisdom of the world foolish?[a][b][c]
  footnotes:
  - marker: a
    text: Or ‘the wise person.’ The Greek is masculine singular and likely representative.
    reason: lexical_alternative
  - marker: b
    text: ‘Of this age’ translates a different Greek term than ‘of the world’ later in the verse.
    reason: cross_reference
  - marker: c
    text: Or ‘shown the wisdom of the world to be foolish.’
    reason: lexical_alternative
translation:
  language: ko
  text: 지혜 있는 자가 어디 있습니까? 학자가 어디 있습니까? 이 세대의 변론가가 어디 있습니까? 하나님께서 이 세상의 지혜를 어리석게 만드시지 않았습니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γραμματεύς
  english_pob_choice: the scribe
  chosen_korean: 학자
  alternatives_korean:
  - 서기관
  - 율법학자
  lexicon: BDAG
  rationale: 바울이 그리스—유대 이중 청중을 대비시키는 맥락에서 「학자」가 자연스럽다. 신약 다른 곳의 율법 전문가와 구분.
- source_word: συζητητὴς
  english_pob_choice: debater
  chosen_korean: 변론가
  alternatives_korean:
  - 논객
  - 토론자
  lexicon: BDAG
  rationale: 그리스 수사·철학적 논쟁가를 가리킨다.
- source_word: τοῦ αἰῶνος τούτου
  english_pob_choice: of this age
  chosen_korean: 이 세대의
  alternatives_korean:
  - 이 시대의
  lexicon: BDAG
  rationale: αἰών를 종말론적 「이 세대」로.
- source_word: ἐμώρανεν
  english_pob_choice: made foolish
  chosen_korean: 어리석게 만드시지
  alternatives_korean:
  - 바보로 만드시지
  lexicon: BDAG
  rationale: μωραίνω 동사형. 18절 μωρία와 어휘 연결 유지.
