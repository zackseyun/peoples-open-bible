translation:
  language: es
  text: ¿Cómo puedes estar quieta, cuando Yahvé la ha mandado? Contra Ascalón y contra la costa del mar, allí la ha destinado[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la ha mandado» y «la ha destinado», con referencia femenina singular a la espada personificada del versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a Ascalón y a la costa del mar»; la preposición puede traducirse más literalmente, aunque aquí implica una comisión hostil contra ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How can
  chosen_spanish: ¿Cómo puedes...
  alternatives_spanish:
  - ¿Cómo puedes estar...
  - ¿Cómo podrías...
  lexicon: HALOT
  rationale: La pregunta hebrea es retórica y expresa la imposibilidad o improcedencia de permanecer en reposo. En español, «¿Cómo puedes...?» conserva ese valor sin volverse artificial.
- source_word: תִּשְׁקֹטִי
  english_pob_choice: you be quiet
  chosen_spanish: estar en silencio
  alternatives_spanish:
  - estar quieta
  - callarte
  - permanecer sin moverte
  lexicon: HALOT
  rationale: El verbo שקט comunica estar quieto, en reposo o en silencio. Aquí se refiere a la espada personificada del contexto previo; «estar en silencio» suena natural en español y conserva la idea de cesar su actividad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». No se sustituye por un título, porque el hebreo nombra directamente al Dios de Israel.'
- source_word: צִוָּה לָהּ
  english_pob_choice: has commanded it
  chosen_spanish: lo ha mandado
  alternatives_spanish:
  - la ha mandado
  - lo ha ordenado
  - le ha dado mandato
  lexicon: HALOT
  rationale: El hebreo tiene sufijo femenino singular, referente a la espada personificada. En español, el antecedente gramatical de «espada» permite «la»; sin embargo, por estilo y porque el castellano usa «mandar» de forma natural aquí, se opta por «lo» al mantener el referente como acción/encargo implícito, aunque la personificación siga presente en el contexto. La alternativa «la ha mandado» conserva más literalmente el femenino del hebreo.
- source_word: אֶל אַשְׁקְלֹון
  english_pob_choice: Against Ashkelon
  chosen_spanish: Contra Ascalón
  alternatives_spanish:
  - A Ascalón
  - Hacia Ascalón
  lexicon: HALOT
  rationale: אֶל puede ser simplemente «a/hacia», pero en el contexto bélico/judicial implica dirección hostil. «Contra» expresa bien esa fuerza sin perder la referencia geográfica.
- source_word: חוֹף הַיָּם
  english_pob_choice: the seacoast
  chosen_spanish: la costa del mar
  alternatives_spanish:
  - la ribera del mar
  - la orilla del mar
  - el litoral
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «el borde/orilla del mar». «La costa del mar» es clara y natural en español, aunque menos idiomática que «seacoast» en inglés.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo remite a los destinos nombrados. «Allí» mantiene la deixis sin añadir información.
- source_word: יְעָדָהּ
  english_pob_choice: he has appointed it
  chosen_spanish: la ha destinado
  alternatives_spanish:
  - la ha asignado
  - la ha señalado
  - la ha designado
  lexicon: HALOT
  rationale: El verbo יעד expresa asignar/nombrar/establecer para una tarea o destino. «Destinar» comunica bien la comisión de la espada en el contexto de juicio. Se conserva el femenino singular del objeto con «la».
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El verso contiene el Tetragrámaton. Siguiendo la política del proyecto, se traduce por el nombre propio divino y no por una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referente de los pronombres femeninos
  english_pob_reading: The feminine singular refers to the sword personified from Jeremiah 47:6, rendered with mixed English personification ('you' / 'it') for readability.
  chosen_spanish_reading: La referencia femenina singular se conserva en el contexto por la espada personificada de 47:6, pero en español se expresa de manera más natural con «la» al hablar de su comisión y destino.
  alternative_spanish_readings:
  - conservar siempre «la»
  - usar siempre un pronombre neutro implícito
  rationale: El hebreo mantiene concordancia femenina singular. En español, la espada es femenina, así que «la» preserva mejor la concordancia que una solución neutra; además, evita oscurecer el vínculo con el versículo anterior.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; maintain lexical/theological tension where source warrants it'
- issue: Fuerza de אֶל en contexto de juicio
  english_pob_reading: Against Ashkelon and against the seacoast
  chosen_spanish_reading: Contra Ascalón y contra la costa del mar
  alternative_spanish_readings:
  - A Ascalón y a la costa del mar
  - Hacia Ascalón y hacia la costa del mar
  rationale: Aunque la preposición básica puede ser direccional, el contexto de la espada enviada por Yahvé le da sentido hostil/judicial. «Contra» hace explícita esa lectura sin añadir contenido ajeno al hebreo.
  doctrine_reference: Contextual semantics in judgment oracles; preserve hostile directional force
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que corrigió la concordancia del objeto femenino singular en el hebreo (espada personificada) y conserva el sentido de comisión/judgment sin volverlo más paraprástico de lo necesario.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva el tono retórico de la pregunta inicial con «¿Cómo puedes estar en silencio...?».
  - «Contra» refleja la dirección hostil implícita de אֶל en este contexto profético.
  - Se mantiene la personificación de la espada en las notas, mientras el texto principal privilegia fluidez natural en español.
  - «Ascalón» sigue la forma hispana usual del topónimo bíblico.
