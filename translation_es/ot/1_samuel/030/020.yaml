base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/030/020.yaml
  text: David took all the flocks and the herds[a]. They drove them ahead of the other livestock, and said[b], “This is David’s spoil.”
  footnotes:
  - marker: a
    text: Or “This is David’s plunder.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew likely means that the animals just taken were driven in front of the previously recovered livestock as a public display, while the people declared them to be David’s spoil.
    reason: cultural_note
