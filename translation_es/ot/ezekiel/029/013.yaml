- from: 'Porque así dice el Señor Yahvé: Al cabo de cuarenta años reuniré a Egipto de entre[a] los pueblos, entre quienes fue dispersado.'
  to: 'Porque así dice el Señor Yahvé: Al cabo de cuarenta años reuniré a Egipto de entre[a] los pueblos entre los que se dispersaron.'
