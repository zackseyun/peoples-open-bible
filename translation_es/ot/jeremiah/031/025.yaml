review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: כִּי como causal, los dos perfectos en paralelismo, נֶפֶשׁ como «alma», y la imaginería de saciar/llenar. Sin embargo, las notas no preservan fielmente las alternativas léxicas documentadas en el expediente inglés. La nota [b] en inglés corresponde a la gama semántica de דָּאֲבָה («afligida / entristecida / lamentándose»), no al distributivo de וְכָל. Además, anclar [b] en «llenado» desvía la atención del término relevante.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico digno. «Porque he saciado el alma cansada, y a toda alma desfallecida he llenado» sería algo más natural si se evita la colocación marcada de «he llenado a». La redacción mejora con «y toda alma desfallecida he llenado» o mejor aún con un complemento de plenitud explícito en nota no necesaria; pero puede mantenerse muy cerca del POB inglés. También conviene reubicar la nota [b] sobre «desfallecida», donde pertenece semánticamente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Alma» para נֶפֶשׁ concuerda con el expediente. «Saciado» para הִרְוֵיתִי y «llenado» para מִלֵּאתִי son adecuados. «Desfallecida» es defendible para דָּאֲבָה dada la revisión inglesa a «faint», pero las alternativas en nota deben reflejar también la posibilidad de «afligida» o «apenada», no una observación sobre el distributivo.
  issues:
  - severity: medium
    issue: La nota [b] no corresponde al término fuente adecuado.
    rationale: El expediente inglés preserva una alternativa léxica para דָּאֲבָה (‘sorrowful/grieving’), pero la nota española habla del valor distributivo de וְכָל y de «cada», lo cual cambia el foco exegético.
  - severity: medium
    issue: El anclaje de [b] en «llenado» es incorrecto.
    rationale: La nota debe ir sobre «desfallecida», porque allí está la ambigüedad léxica relevante. Anclarla en el verbo puede confundir al lector sobre qué palabra se comenta.
  - severity: low
    issue: Orden verbal ligeramente poco natural en español.
    rationale: «He llenado a toda alma desfallecida» suena menos idiomático con «llenar» + persona sin complemento; el orden «y toda alma desfallecida[b] he llenado» conserva cercanía formal y fluye mejor en español bíblico.
  revised_spanish_text: Porque he saciado el alma cansada[a], y toda alma desfallecida[b] he llenado.
  revised_footnotes:
  - marker: a
    text: O «refrescado»; el verbo hebreo literalmente comunica dar de beber en abundancia.
    reason: lexical_alternative
  - marker: b
    text: O «toda alma afligida» o «toda alma apenada».
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción base, pero se corrige la nota [b] para que refleje la alternativa léxica documentada para דָּאֲבָה y se mueve su anclaje a «desfallecida», donde realmente corresponde. También se ajusta levemente el orden para mejorar la naturalidad del español sin apartarse del paralelismo del hebreo ni del POB inglés.
