    text: O «la fe». El griego πίστις puede significar «fe» o «fidelidad»; aquí el texto principal prefiere «fidelidad» por el contexto sapiencial y el contraste con «injusticia».
    reason: alternative_reading
  revision_rationale: 'Se ajusta el versículo para reflejar mejor el griego y el expediente auditado: «fidelidad» alinea πίστις con la revisión inglesa final, «dádiva» eleva el registro sin cambiar el sentido de δῶρον, y la estructura con «toda… y toda… serán borradas» resuelve la naturalidad y la concordancia en español.'
