translation:
  language: es
  text: Sus piernas son columnas de mármol[a], asentadas sobre bases de oro fino. Su apariencia es como el Líbano[b], distinguido entre los cedros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «columnas de alabastro»; el hebreo שֵׁשׁ puede referirse a una piedra blanca fina, no necesariamente a mármol en sentido específico.
    reason: lexical_alternative
  - marker: b
    text: O «Su apariencia es como el Líbano, escogido como los cedros». El hebreo בָּחוּר aquí probablemente expresa excelencia selecta más que la idea de «joven».
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹקָיו
  english_pob_choice: his legs
  chosen_spanish: sus piernas
  alternatives_spanish:
  - sus muslos
  - sus miembros inferiores
  lexicon: HALOT
  rationale: שׁוֹק puede referirse a la zona de la pierna o del muslo. Siguiendo el valor más natural en el contexto poético del cuerpo y la comparación arquitectónica, 'piernas' comunica bien la imagen sin volverla excesivamente técnica.
- source_word: עַמּוּדֵי
  english_pob_choice: pillars of
  chosen_spanish: columnas de
  alternatives_spanish:
  - pilares de
  lexicon: HALOT
  rationale: El sustantivo en constructo designa soportes arquitectónicos. En español, 'columnas' conserva la imagen solemne y fluye con naturalidad en una descripción poética; 'pilares' también sería posible, pero 'columnas' aquí suena más estable y visual.
- source_word: שֵׁשׁ
  english_pob_choice: marble
  chosen_spanish: mármol
  alternatives_spanish:
  - alabastro
  - piedra blanca fina
  lexicon: HALOT
  rationale: La POB inglesa eligió 'marble' por el valor probable de una piedra blanca fina. En español, 'mármol' es el equivalente más natural y digno para esa materia arquitectónica, sin cerrar la posibilidad de una piedra blanca preciosa.
- source_word: מְיֻסָּדִים
  english_pob_choice: set
  chosen_spanish: asentadas
  alternatives_spanish:
  - puestas
  - fundadas
  - establecidas
  lexicon: HALOT
  rationale: El participio pasivo de יסד expresa estar firmemente colocado o fundado. 'Asentadas' comunica con claridad la idea de un soporte firme sobre bases, manteniendo la imagen de estabilidad.
- source_word: אַדְנֵי
  english_pob_choice: bases of
  chosen_spanish: bases de
  alternatives_spanish:
  - zócalos de
  - pedestales de
  - dados de
  lexicon: HALOT
  rationale: אַדֶן alude a una base o soporte arquitectónico. 'Bases' es la opción más clara y menos marcada en español, adecuada para la imagen de columnas apoyadas firmemente.
- source_word: פָז
  english_pob_choice: fine gold
  chosen_spanish: oro fino
  alternatives_spanish:
  - oro puro
  - oro refinado
  lexicon: HALOT
  rationale: פָז denota oro de gran pureza o calidad refinada. 'Oro fino' preserva el registro elevado y reproduce bien la idea de metal precioso de calidad superior.
- source_word: מַרְאֵהוּ
  english_pob_choice: his appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su aspecto
  - su porte
  - su forma
  lexicon: HALOT
  rationale: מַרְאֶה refiere a la apariencia visible. 'Apariencia' es amplio y fiel, y funciona bien para el alcance global de la comparación poética.
- source_word: כַּלְּבָנוֹן
  english_pob_choice: like Lebanon
  chosen_spanish: como el Líbano
  alternatives_spanish:
  - como el monte Líbano
  lexicon: HALOT
  rationale: La referencia geográfica a Líbano funciona como emblema de majestad y belleza. En español, 'como el Líbano' es la forma natural y mantiene el paralelismo con el inglés auditable.
- source_word: בָּחוּר
  english_pob_choice: choice
  chosen_spanish: escogido
  alternatives_spanish:
  - selecto
  - distinguido
  - excelente
  lexicon: HALOT
  rationale: Aquí בָּחוּר no parece significar 'joven', sino excelencia o calidad selecta. 'Escogido' conserva esa idea de selecto/excelente y evita una lectura antropológica inadecuada.
- source_word: כָּאֲרָזִים
  english_pob_choice: like the cedars
  chosen_spanish: como los cedros
  alternatives_spanish:
  - como cedros
  lexicon: HALOT
  rationale: Los cedros de Líbano simbolizan fuerza, altura y nobleza. 'Como los cedros' mantiene la comparación y suena natural en español, en paralelo con la frase anterior.
theological_decisions:
- issue: Sentido de בָּחוּר en una descripción poética del amado
  english_pob_reading: The Hebrew likely conveys select excellence rather than 'young man.'
  chosen_spanish_reading: bajo aquí se entiende como calidad escogida o selecta, no como 'joven'
  alternative_spanish_readings:
  - joven
  - distinguido
  - excelente
  rationale: El contexto inmediato une la frase con una comparación de nobleza y excelencia, no con edad. Por eso la traducción evita 'joven' y preserva el valor de selecto/excelente que la lectura inglesa ya documenta.
  doctrine_reference: Poética bíblica; semántica contextual del adjetivo
- issue: Valor material de שֵׁשׁ
  english_pob_reading: The Hebrew may denote a fine white stone rather than marble specifically.
  chosen_spanish_reading: mármol, con la nota de que puede referirse a una piedra blanca fina
  alternative_spanish_readings:
  - alabastro
  - piedra blanca fina
  rationale: La imagen arquitectónica pide una materia noble y blanca. 'Mármol' es la opción más idiomática, pero la nota mantiene abierta la alternativa semántica sin borrar la tensión lexical que la POB inglesa documenta.
  doctrine_reference: Lexicografía hebrea; imagen poética
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la decisión auditada de la POB inglesa: conserva la imagen arquitectónica de columnas sobre bases de oro fino, mantiene la comparación con el Líbano y refleja que בָּחוּר aquí describe excelencia selecta, no juventud. También se tuvo en cuenta la revisión inglesa que prefería una comparación más natural sin perder el valor de ''choice as the cedars''.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este verso no contiene el nombre divino.
  - Se eligió un registro poético claro y formal, con vocabulario comprensible para lectores eclesiales amplios.
  - Se evitó el calco excesivo al optar por «columnas» y «asentadas», que transmiten la imagen sin rigidez.
  - La nota sobre שֵׁשׁ preserva la alternativa lexical sin alterar el texto principal.
  - 'La comparación final se expresó con simetría: «como el Líbano... como los cedros» para reflejar el paralelismo hebreo.'
