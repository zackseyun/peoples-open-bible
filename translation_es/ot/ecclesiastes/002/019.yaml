revisions:
- from: ¿Y quién sabe si será sabio o necio? Sin embargo, él tendrá dominio sobre todo mi trabajo, por el cual me esforcé y actué con sabiduría bajo el sol[a]. También esto es vanidad.
  to: ¿Y quién sabe si será sabio o necio? Sin embargo, él tendrá dominio sobre toda mi labor, por la cual trabajé y actué con sabiduría bajo el sol. También esto es vanidad[a].
  rationale: Se ajusta «trabajo … me esforcé» a «labor … trabajé» para reflejar mejor la repetición de la raíz עמל en el hebreo y alinearse con la racionalidad léxica auditada. Se mueve la nota al término «vanidad», que es donde pertenece la alternativa de הֶבֶל. También se corrige «futileza» a «futilidad» por naturalidad y precisión en español.
