    rationale: Aunque semánticamente recuperable, la ausencia de artículos y la asimetría de género/categoría vuelve la frase algo tosca. «tanto el joven como la virgen» conserva la precisión léxica y mejora la legibilidad.
  revised_spanish_text: Fuera, la espada dejará sin hijos; y en los aposentos interiores[a], terror—tanto el joven como la virgen[b], niño de pecho junto con hombre canoso.
