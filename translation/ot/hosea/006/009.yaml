id: HOS.6.9
reference: Hosea 6:9
source:
  edition: WLC
  text: וּ/כְ/חַכֵּ֨י אִ֜ישׁ גְּדוּדִ֗ים חֶ֚בֶר כֹּֽהֲנִ֔ים דֶּ֖רֶךְ יְרַצְּחוּ שֶׁ֑כְמָ/ה כִּ֥י זִמָּ֖ה עָשֽׂוּ־׃
translation:
  text: And like men lying in wait[a], a band of priests murders on the way to Shechem; indeed[b], they have committed wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: alternatively, ''as robbers lie in wait for a man, so a band of priests murders on the way to Shechem.'''
    reason: alternative_reading
  - marker: b
    text: Or 'shameful crime,' 'wickedness.' The Hebrew term denotes a heinous or outrageous act.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְחַכֵּי
  chosen: And like men lying in wait
  alternatives:
  - And as those who wait
  - And like ambushers
  lexicon: HALOT
  rationale: The form from חכה with prefixed conjunction and comparative כ conveys a simile of waiting in ambush. 'Lying in wait' captures the predatory sense more naturally than a bare 'waiting.'
- source_word: אִישׁ גְּדוּדִים
  chosen: men
  alternatives:
  - a man of raiders
  - robbers
  - troops
  lexicon: HALOT
  rationale: The phrase is difficult. Literally it may suggest 'a man/band of raiders.' In context, the comparison is to violent ambushers; rendering the whole opening as 'like men lying in wait' communicates the plural predatory image in idiomatic English. The raiding sense is preserved by the ambush language and by the following 'band of priests.'
- source_word: חֶבֶר כֹּהֲנִים
  chosen: a band of priests
  alternatives:
  - a company of priests
  - an association of priests
  lexicon: HALOT
  rationale: חבר denotes a company or band. 'Band' fits the hostile, conspiratorial context better than the more neutral 'company' or 'association.'
- source_word: דֶּרֶךְ
  chosen: on the road to
  alternatives:
  - by the way to
  - along the road to
  lexicon: HALOT
  rationale: The noun means 'way/road.' With the following place name, 'on the road to' is idiomatic and preserves the locative sense.
- source_word: יְרַצְּחוּ
  chosen: murders
  alternatives:
  - they murder
  - they slay
  lexicon: HALOT
  rationale: The verb רצח commonly denotes murder rather than generic killing. Using 'murders' with the singular collective subject 'a band of priests' yields natural English while preserving the criminal force.
- source_word: שֶׁכְמָה
  chosen: Shechem
  alternatives:
  - toward Shechem
  lexicon: HALOT
  rationale: This is the place name Shechem with directional ending. English normally expresses this simply as 'to Shechem.'
- source_word: כִּי
  chosen: indeed
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces an emphatic explanatory conclusion rather than a strict causal clause. 'Indeed' fits the prophetic denunciation and avoids an overly wooden connection.
- source_word: זִמָּה
  chosen: outrage
  alternatives:
  - lewdness
  - wickedness
  - shameful crime
  lexicon: HALOT
  rationale: זִמָּה can denote a heinous, shameless act, often with moral infamy. 'Outrage' captures the gravity without narrowing it to sexual sin, which the context does not require.
- source_word: עָשׂוּ
  chosen: they have committed
  alternatives:
  - they have done
  - they did
  lexicon: HALOT
  rationale: '''Committed'' collocates naturally with ''outrage'' in English and reflects the completed action.'
