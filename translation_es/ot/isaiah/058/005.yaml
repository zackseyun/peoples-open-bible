base_translation:
  language: en
  yaml_path: translation/ot/isaiah/058/005.yaml
  text: 'Is this the fast that I choose: a day for a person to humble himself? Is it to bow down his head like a reed[a], and to spread out sackcloth and ashes? Will you call this a fast[b], and a day acceptable to Yahweh?'
  footnotes:
  - marker: a
    text: Or, 'a day for a man to afflict himself.' The Hebrew idiom literally speaks of self-affliction, especially in fasting contexts.
    reason: lexical_alternative
  - marker: b
    text: '''Like a reed'' may also be rendered ''like a bulrush'' or ''like a rush.'''
    reason: lexical_alternative
