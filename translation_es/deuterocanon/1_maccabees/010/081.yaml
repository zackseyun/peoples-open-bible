translation:
  language: es
  text: Pero el pueblo permanecía firme, como lo había mandado Jonatán[a], y sus caballos se fatigaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice simplemente "sus caballos"; en el contexto, esto probablemente se refiere a los caballos de la caballería enemiga, que se cansaron mientras el pueblo de Jonatán mantenía su posición.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ λαός
  english_pob_choice: But the people
  chosen_spanish: Pero el pueblo
  alternatives_spanish:
  - Y el pueblo
  - Ahora bien, el pueblo
  lexicon: LSJ
  rationale: δέ introduce avance narrativo con contraste leve; en español, "Pero" conserva ese matiz. λαός puede ser "pueblo" o "gente"; aquí "pueblo" funciona de manera natural y solemne para el grupo en cuestión.
- source_word: ἱστήκει
  english_pob_choice: stood
  chosen_spanish: permanecía firme
  alternatives_spanish:
  - estaba de pie
  - se mantenía en pie
  - se mantuvo firme
  lexicon: LSJ
  rationale: La forma expresa una condición de mantenerse en posición. "Permanecía firme" comunica bien la permanencia y la idea de sostener la posición sin sonar forzado en español.
- source_word: καθὼς ἐπέταξεν Ἰωναθάν
  english_pob_choice: as Jonathan had commanded
  chosen_spanish: como lo había mandado Jonatán
  alternatives_spanish:
  - como Jonatán había ordenado
  - tal como Jonatán había mandado
  lexicon: LSJ
  rationale: ἐπιτάσσω significa mandar/ordenar. "Mandado" reproduce el tono directo y claro; el pronombre "lo" evita ambigüedad en español y mantiene la referencia al mandato.
- source_word: ἐκοπίασαν
  english_pob_choice: grew weary
  chosen_spanish: se fatigaron
  alternatives_spanish:
  - se cansaron
  - se agotaron
  - se volvieron cansados
  lexicon: LSJ
  rationale: κοπιάω puede expresar cansarse o fatigarse por esfuerzo. "Se fatigaron" conserva el sentido intransitivo de llegar al cansancio sin intensificarlo innecesariamente a "agotarse".
- source_word: οἱ ἵπποι αὐτῶν
  english_pob_choice: their horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - los caballos de ellos
  - sus caballerías
  lexicon: LSJ
  rationale: El griego dice simplemente "sus caballos". Se mantiene esa literalidad idiomática en español. El referente contextual probable es el de la caballería enemiga, pero el texto griego no lo explicita.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego de Swete 1909 y la solución auditada en inglés, especialmente el valor de δέ como transición narrativa, ἱστήκει como estado de mantenerse en posición, y la observación de que "sus caballos" en griego no explicita el referente, aunque el contexto apunta probablemente al enemigo.
  spanish_consistency_notes:
  - Se mantiene "Jonatán" para el nombre propio, conforme al uso bíblico en español.
  - Se evita "SEÑOR" u otras sustituciones teológicas porque no hay vocabulario divino en este versículo.
  - '"Pueblo" y "caballos" se dejan en un registro bíblico claro y natural, sin añadir interpretaciones no presentes en el griego.'
