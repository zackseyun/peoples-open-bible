translation:
  language: es
  text: y mi corazón fue atraído en secreto[a], y mi mano besó mi boca—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente en contexto: «y lancé un beso con mi mano»; probablemente un gesto de homenaje asociado con la adoración de los cuerpos celestes.'
