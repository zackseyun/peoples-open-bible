translation:
  language: es
  text: 'Hay tres que son imponentes al andar[a], y aun cuatro que son imponentes al caminar:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «de buen andar» o «excelentes al caminar». El hebreo usa un modismo para criaturas cuyo modo de moverse resulta especialmente impresionante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשָׁה
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - tres son
  lexicon: HALOT
  rationale: Número cardinal que abre la fórmula sapiencial; en español se conserva de forma directa y natural.
- source_word: הֵמָּה
  english_pob_choice: there are
  chosen_spanish: hay
  alternatives_spanish:
  - ellos son
  - son
  lexicon: HALOT
  rationale: En esta fórmula numérica, el pronombre independiente funciona idiomáticamente como presentación existencial; 'hay' comunica mejor que una construcción literal con pronombre.
- source_word: מֵיטִיבֵי
  english_pob_choice: stately
  chosen_spanish: majestuosos
  alternatives_spanish:
  - elegantes
  - nobles
  - excelentes
  lexicon: HALOT
  rationale: El participio de יטב aquí no describe bondad moral, sino un porte notable al moverse. 'Majestuosos' transmite dignidad e imponencia en el andar sin volverlo técnico o demasiado moderno.
- source_word: צָעַד
  english_pob_choice: stride
  chosen_spanish: andar
  alternatives_spanish:
  - paso
  - marcha
  - gaita
  lexicon: HALOT
  rationale: El sustantivo se refiere al modo de dar pasos o marchar. 'Andar' mantiene la imagen concreta y suena natural en español; 'andar' también puede abarcar la idea de 'gait' sin perder fluidez.
- source_word: וְאַרְבָּעָה
  english_pob_choice: even four
  chosen_spanish: y aun cuatro
  alternatives_spanish:
  - y cuatro
  - incluso cuatro
  lexicon: HALOT
  rationale: La waw de la fórmula proverbial marca progresión climática. 'Y aun cuatro' conserva ese impulso retórico mejor que un simple 'y cuatro'.
- source_word: לָכֶת
  english_pob_choice: walking
  chosen_spanish: caminar
  alternatives_spanish:
  - ir
  - moverse
  - andar
  lexicon: HALOT
  rationale: El infinitivo de הלך se repite en paralelo con צעד. 'Caminar' es la equivalencia más clara y común en español para el segundo miembro del paralelismo.
translation_notes:
  revision_awareness: La versión inglesa más reciente no requirió cambios y mantiene alta concordancia con el hebreo. El español sigue esa lectura, conservando la fórmula numérica sapiencial y el paralelismo de movimiento, con una elección léxica que prioriza naturalidad sin borrar el matiz de porte digno.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí, ya que el versículo no contiene el Tetragrámaton ni vocabulario divino.
  - Se conservó la repetición paralela 'andar / caminar' para reflejar el hebreo צָעַד / לָכֶת sin colapsar ambos términos en una sola idea.
  - '''Majestuosos'' se eligió como equivalente contextual de ''stately'', evitando una traducción moralizante de מֵיטִיבֵי.'
