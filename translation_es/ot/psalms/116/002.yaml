translation:
  language: es
  text: Porque ha inclinado su oído a mí[a], lo invocaré en mis días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «y en mis días invocaré». La frase expresa que el salmista seguirá invocando a Yahvé durante toda su vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior. «Porque» expresa con claridad la causalidad en español contemporáneo sin añadir matices ajenos al hebreo.
- source_word: הִטָּה אָזְנוֹ
  english_pob_choice: has inclined his ear
  chosen_spanish: ha inclinado su oído
  alternatives_spanish:
  - ha tendido su oído
  - ha vuelto su oído
  - ha inclinado su oreja
  lexicon: HALOT
  rationale: Conserva la metáfora hebrea de inclinar el oído para escuchar atentamente. «Oído» funciona mejor que «oreja» en español bíblico moderno y mantiene la imagen sin endurecer el estilo.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: El hebreo marca dirección hacia el hablante. «Hacia mí» reproduce ese movimiento y resulta natural con la imagen de inclinar el oído.
- source_word: וּבְיָמַי
  english_pob_choice: in my days
  chosen_spanish: en mis días
  alternatives_spanish:
  - durante mis días
  - en mi vida
  lexicon: HALOT
  rationale: La forma más cercana al hebreo es «en mis días». Se mantiene la expresión temporal sin convertirla en una paráfrasis interpretativa como «mientras viva».
- source_word: אֶקְרָא
  english_pob_choice: I will call on him
  chosen_spanish: invocaré
  alternatives_spanish:
  - clamaré
  - llamaré a él
  lexicon: HALOT
  rationale: En contexto de oración, קרא significa llamar/invocar a Dios. En español, «invocaré» comunica con precisión el uso devocional y evita la ambigüedad de «llamaré».
theological_decisions:
- issue: Objeto implícito de la invocación
  english_pob_reading: I will call on him
  chosen_spanish_reading: invocaré
  alternative_spanish_readings:
  - invocaré a Yahvé
  - invocaré a él
  rationale: El objeto no está explícito en el hebreo del medio verso, pero el contexto inmediato identifica a Yahvé. Para no añadir una repetición no requerida en la línea principal, se deja implícito en español como en el original.
  doctrine_reference: Contexto inmediato del Salmo 116; uso oracional de קרא a Dios
translation_notes:
  revision_awareness: La versión inglesa revisó el final desde «as long as I live» a «in my days» para reflejar con mayor cercanía וּבְיָמַי. La línea española sigue esa revisión con «en mis días», evitando expandir el sentido a una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se conservó la imagen corporal de «oído» para mantener el paralelismo con el hebreo.
  - «Invocaré» mantiene el registro de oración y evita la ambigüedad de «llamaré».
  - Se prefirió una construcción breve y formal, acorde con el tono poético del salmo.
