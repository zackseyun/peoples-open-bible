translation:
  language: es
  text: Se espantarán; dolores y dolores de parto los tomarán. Se retorcerán como mujer que da a luz. Cada hombre se quedará mirando a su prójimo; sus rostros serán rostros de llama[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «sus rostros estarán en llamas». El hebreo dice literalmente: «sus rostros [son] rostros de llamas», una imagen vívida que puede sugerir palidez o rubor causados por el terror, o bien un aspecto de fuego visible en el rostro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִבְהָלוּ
  english_pob_choice: they will be dismayed
  chosen_spanish: Se espantarán
  alternatives_spanish:
  - Estarán aterrados
  - Serán presas del pánico
  lexicon: HALOT
  rationale: El nifal de בהל expresa sobresalto, alarma o desmayo de ánimo. «Espantarán» comunica bien la reacción súbita sin cargar más intensidad de la que exige el hebreo.
- source_word: צִירִים
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - convulsiones
  - angustias
  lexicon: HALOT
  rationale: En este contexto se refiere a dolores intensos; «dolores» es natural en español y mantiene la amplitud del término, dejando que el paralelismo con el siguiente miembro afine la imagen.
- source_word: וַחֲבָלִים
  english_pob_choice: labor pangs
  chosen_spanish: angustias de parto
  alternatives_spanish:
  - dolores de parto
  - contracciones de parto
  lexicon: HALOT
  rationale: El término se usa aquí con imagen explícita de parto, y la versión española debe conservar esa fuerza. «Angustias de parto» une la idea de dolor y aprieto sin sonar mecánico.
- source_word: יֹאחֵזוּן
  english_pob_choice: will seize them
  chosen_spanish: los tomarán
  alternatives_spanish:
  - los agarrarán
  - se apoderarán de ellos
  lexicon: HALOT
  rationale: אחז denota tomar o asir con fuerza. «Los tomarán» mantiene la personificación de los dolores como sujetos activos y suena natural en español; el contexto ya comunica la violencia de la acción.
- source_word: כַּיּוֹלֵדָה
  english_pob_choice: like a woman giving birth
  chosen_spanish: como mujer que da a luz
  alternatives_spanish:
  - como mujer en parto
  - como mujer de parto
  lexicon: HALOT
  rationale: La forma participial remite a la mujer en el acto de dar a luz. «Da a luz» es claro, actual y suficientemente cercano al hebreo.
- source_word: יְחִילוּן
  english_pob_choice: they will writhe
  chosen_spanish: Se retorcerán
  alternatives_spanish:
  - estarán con dolores
  - temblarán
  lexicon: HALOT
  rationale: El verbo expresa agitación corporal intensa, especialmente en un cuadro de dolor. «Se retorcerán» conserva la dimensión física mejor que una traducción meramente emocional.
- source_word: אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: Each man ... his neighbor
  chosen_spanish: Cada hombre ... a su prójimo
  alternatives_spanish:
  - Uno a otro
  - Cada uno ... a su vecino
  lexicon: HALOT
  rationale: La construcción es distributiva y masculina. «Cada hombre» conserva el género gramatical del hebreo sin perder naturalidad; «prójimo» es una opción española clara para רֵעַ en este contexto relacional.
- source_word: יִתְמָהוּ
  english_pob_choice: will stare
  chosen_spanish: mirará
  alternatives_spanish:
  - quedará atónito
  - se quedará mirando
  lexicon: HALOT
  rationale: 'El verbo implica mirar con asombro o estupor. Dado que el español puede sobrecargar «mirará», se entiende aquí en el marco del verso completo: una mirada fija y atónita; el contexto ya aporta la perplejidad.'
- source_word: פְּנֵי לְהָבִים פְּנֵיהֶם
  english_pob_choice: their faces will be faces of flame
  chosen_spanish: sus rostros serán rostros de llama
  alternatives_spanish:
  - sus rostros arderán
  - sus caras estarán en llamas
  lexicon: HALOT
  rationale: La metáfora hebrea es literalmente «rostros de llamas». «Rostros de llama» preserva la imagen y evita reducirla prematuramente a una sola interpretación (rubor, palidez o terror visible).
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el encuadre óptimo-equivalente del inglés POB, conservando la progresión de dolor, parto, estupor y la metáfora final de fuego en el rostro sin suavizarla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se prefirió «rostros» para פְּנֵי para conservar el plural imagístico del hebreo.
  - Se evitó neutralizar «אִישׁ»; «Cada hombre» refleja el distributivo masculino del original.
  - Se conservó la tensión semántica de la imagen final con una nota para no cerrar indebidamente su sentido.
