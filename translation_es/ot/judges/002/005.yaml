revisions:
- from: Así que llamaron al nombre de aquel lugar Boquim[a], y allí sacrificaron a Yahvé.
  to: Así que llamaron a aquel lugar Boquim[a], y allí sacrificaron a Yahvé.
  rationale: Se corrige una construcción española no idiomática para expresar con naturalidad el sentido de קרא שֵׁם, manteniendo el topónimo transliterado, el demostrativo, la ubicación «allí» y el nombre divino «Yahvé». No se requieren cambios doctrinales ni de fondo.
