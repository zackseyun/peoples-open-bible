translation:
  language: es
  text: 'Entonces respondió Doeg el edomita[a], que estaba entre los siervos de Saúl, y dijo: «Vi al hijo de Isaí cuando iba a Nob, a Ahimelec hijo de Ahitub».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que estaba puesto sobre los siervos de Saúl». El hebreo puede sugerir tanto la posición de Doeg entre los siervos de Saúl como una función de supervisión sobre ellos.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió diciendo
  lexicon: HALOT
  rationale: En español, «respondió» conserva bien la fórmula narrativa de réplica de וַיַּעַן sin sonar tan repetitivo como una calca. «Contestó» sería posible, pero «respondió» resulta más natural en este contexto.
- source_word: הָאֲדֹמִי
  english_pob_choice: the Edomite
  chosen_spanish: el edomita
  alternatives_spanish:
  - el idumeo
  - un edomita
  lexicon: HALOT
  rationale: El hebreo lleva artículo y funciona como designación étnica adherida al nombre; en español, «el edomita» preserva esa fuerza. «Idumeo» es menos transparente para lectores modernos y «un edomita» debilita el valor identificador del artículo.
- source_word: וְהוּא נִצָּב עַל עַבְדֵי שָׁאוּל
  english_pob_choice: who was standing among Saul’s servants
  chosen_spanish: y él estaba entre los siervos de Saúl
  alternatives_spanish:
  - y estaba sobre los siervos de Saúl
  - y estaba al frente de los siervos de Saúl
  - y estaba junto a los siervos de Saúl
  lexicon: HALOT
  rationale: El hebreo permite tanto presencia entre el grupo como una posible relación de supervisión. En el texto principal se elige «entre» para no sobredeterminar rango, siguiendo la cautela del POB inglés; la redacción mantiene la tensión sin cerrarla.
- source_word: עַבְדֵי שָׁאוּל
  english_pob_choice: Saul’s servants
  chosen_spanish: los siervos de Saúl
  alternatives_spanish:
  - los servidores de Saúl
  - los oficiales de Saúl
  - los criados de Saúl
  lexicon: HALOT
  rationale: עבד puede abarcar siervos, servidores o subordinados cortesanos. «Siervos» preserva la fuerza lexical más directa y evita precisar un cargo que el hebreo no explicita.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y afirmó
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea queda bien reflejada con «y dijo», fórmula natural en español para introducir el discurso directo.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  - yo vi
  lexicon: HALOT
  rationale: En español, el pretérito simple «vi» comunica de manera natural la observación reportada en el relato. El presente perfecto («he visto») resultaría menos ajustado al tono narrativo.
- source_word: בֶּן יִשַׁי
  english_pob_choice: the son of Jesse
  chosen_spanish: el hijo de Isaí
  alternatives_spanish:
  - David
  - el hijo de Jesé
  lexicon: HALOT
  rationale: Se conserva la designación relacional hebrea en vez del nombre propio, porque el texto la usa de forma deliberada. «Isaí» es la forma habitual en español bíblico de Jesse.
- source_word: בָּא
  english_pob_choice: coming
  chosen_spanish: que iba
  alternatives_spanish:
  - que venía
  - yendo
  - al venir
  lexicon: HALOT
  rationale: El participio hebreo expresa movimiento observado; en español, «que iba» reproduce de modo natural la acción en curso. «Que venía» también sería posible, pero «iba» mantiene mejor la dirección hacia Nob.
- source_word: נֹבֶה
  english_pob_choice: to Nob
  chosen_spanish: a Nob
  alternatives_spanish:
  - hacia Nob
  - para Nob
  lexicon: HALOT
  rationale: La terminación direccional del nombre indica movimiento hacia ese lugar. En español, «a Nob» es la forma más simple y fiel.
- source_word: אֶל אֲחִימֶלֶךְ בֶּן אֲחִטוּב
  english_pob_choice: to Ahimelech son of Ahitub
  chosen_spanish: a Ahimelec hijo de Ahitub
  alternatives_spanish:
  - con Ahimelec hijo de Ahitub
  - hasta Ahimelec hijo de Ahitub
  lexicon: HALOT
  rationale: אֶל expresa dirección o acercamiento; «a» lo refleja con naturalidad. Se conserva el nombre «Ahimelec» con ortografía española, y «hijo de Ahitub» mantiene la relación familiar del original.
theological_decisions:
- issue: Sentido relacional de עַל en la cláusula sobre la posición de Doeg
  english_pob_reading: The Hebrew phrase may suggest either Doeg’s position among Saul’s servants or a supervisory role over them.
  chosen_spanish_reading: La frase puede sugerir que Doeg estaba entre los siervos de Saúl o que ejercía alguna función de supervisión sobre ellos.
  alternative_spanish_readings:
  - Doeg estaba sobre los siervos de Saúl
  - Doeg era supervisor de los siervos de Saúl
  rationale: La ambigüedad del hebreo se conserva en la formulación principal y se reconoce explícitamente en la nota. Esto evita convertir una relación sintáctica debatida en un rango jerárquico seguro.
  doctrine_reference: Principio de transparencia textual y cautela exegética
- issue: Mantenimiento de la referencia genealógica «hijo de Isaí» en lugar de sustituirla por el nombre David
  english_pob_reading: The Hebrew deliberately uses the relational designation rather than the personal name.
  chosen_spanish_reading: Se conserva «el hijo de Isaí» en lugar de «David».
  alternative_spanish_readings:
  - David
  - el hijo de Jesé
  rationale: La designación relacional forma parte del reproche o testimonio narrativo y conviene respetarla para no perder el matiz retórico del original.
  doctrine_reference: Fidelidad semántica y retórica al texto fuente
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso alto del audit trail en inglés y conserva la misma ambigüedad documentada en la cláusula de posición de Doeg. No se registraron revisiones posteriores que requirieran ajuste; la lectura aprobada permanece estable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa «siervos» para עבדים conforme al valor lexical más directo del contexto cortesano.
  - Se conserva la designación «el hijo de Isaí» por fidelidad al énfasis del hebreo.
  - La puntuación del discurso directo sigue el uso español moderno con comillas angulares no requeridas aquí; se emplean comillas dobles de estilo editorial simple para claridad de registro.
