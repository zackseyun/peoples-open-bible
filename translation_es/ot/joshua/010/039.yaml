- from: Y la capturaron[a], junto con su rey y todas sus ciudades; y los golpearon a filo de espada, y consagraron al anatema[b] a toda persona que había en ella; no dejaron ningún sobreviviente. Como había hecho con Hebrón, así hizo con Debir y con su rey, y como había hecho con Libna y con su rey.
  to: Y la capturaron, junto con su rey y todas sus ciudades; y los golpearon a filo de espada, y consagraron a destrucción[a] a toda persona que había en ella; no dejaron ningún sobreviviente. Como había hecho con Hebrón, así hizo con Debir y su rey, y como había hecho con Libna y su rey.
  rationale: Se reemplaza «consagraron al anatema» por «consagraron a destrucción[a]» para reflejar mejor la decisión POB sobre חרם y evitar una palabra potencialmente equívoca en español moderno. Se elimina la nota sobre «la capturaron» porque no corresponde a la alternativa preservada por el audit trail inglés para este versículo. Se simplifica «y con su rey» a «y su rey» para una lectura más natural. También debe actualizarse la documentación interna sobre el cambio de número para alinearla con la revisión inglesa aprobada, aunque eso no aparece en el texto principal.
