translation:
  language: es
  text: De esto habrá para el lugar santo[a] un cuadrado de quinientos por quinientos, todo alrededor, y cincuenta codos de terreno libre[b] para él, todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario». El hebreo קֹדֶשׁ aquí puede designar el área sagrada de manera más general, no solo el edificio del santuario.
    reason: lexical_alternative
  - marker: b
    text: O «terreno de pasto» o «terreno común» para el área abierta que rodea el lugar (מִגְרָשׁ).
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזֶּה
  english_pob_choice: From this
  chosen_spanish: De esto
  alternatives_spanish:
  - De ello
  - De esta porción
  lexicon: HALOT
  rationale: La frase retoma la porción ya descrita y marca origen/medida asignada. «De esto» conserva la relación de procedencia sin añadir precisión inexistente en el hebreo.
- source_word: אֶל הַקֹּדֶשׁ
  english_pob_choice: for the holy place
  chosen_spanish: para el lugar santo
  alternatives_spanish:
  - para el santuario
  - para la parte santa
  lexicon: HALOT
  rationale: Aquí la preposición expresa destinación/asignación, por eso «para» es más fiel que «a». «Lugar santo» preserva el campo semántico de קֹדֶשׁ sin restringirlo necesariamente al edificio.
- source_word: חֲמֵשׁ מֵאוֹת בַּחֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred by five hundred
  chosen_spanish: quinientos por quinientos
  alternatives_spanish:
  - quinientos por quinientos codos
  - quinientos sobre quinientos
  lexicon: HALOT
  rationale: Es una fórmula dimensional; en español la construcción natural es «por». Se mantiene implícito «codos» en esta primera medida, como en el inglés POB, porque el hebreo no lo repite hasta la unidad explícita posterior.
- source_word: מְרֻבָּע
  english_pob_choice: a square
  chosen_spanish: un cuadrado
  alternatives_spanish:
  - cuadrado
  - de forma cuadrada
  lexicon: HALOT
  rationale: El participio pasivo describe la forma. «Un cuadrado» comunica con naturalidad el sentido geométrico y mantiene la referencia a una figura delimitada.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - por todos lados
  lexicon: HALOT
  rationale: Expresa la extensión distributiva del borde o perímetro. «Todo alrededor» reproduce bien la cobertura total indicada por el hebreo.
- source_word: וַחֲמִשִּׁים אַמָּה
  english_pob_choice: with fifty cubits
  chosen_spanish: y cincuenta codos
  alternatives_spanish:
  - con cincuenta codos
  - además cincuenta codos
  lexicon: HALOT
  rationale: La conjunción añade una especificación de medida. «Y» conserva la simple adición del hebreo; «codos» traduce אַמָּה de manera concreta y transparente.
- source_word: מִגְרָשׁ
  english_pob_choice: open land
  chosen_spanish: terreno libre
  alternatives_spanish:
  - terreno abierto
  - franja abierta
  lexicon: HALOT
  rationale: מִגְרָשׁ designa un espacio abierto o despejado alrededor del sitio. «Terreno libre» comunica bien la idea de zona no edificada y evita «suburbios», que sería engañoso en español.
- source_word: ל֖וֹ
  english_pob_choice: for it
  chosen_spanish: para él
  alternatives_spanish:
  - para ello
  - para esa área
  lexicon: HALOT
  rationale: El sufijo pronominal remite al área santa o al cuadrado medido. «Para él» mantiene el referente singular y la relación de pertenencia/asignación.
theological_decisions:
- issue: Alcance de קֹדֶשׁ
  english_pob_reading: holy place, with footnote allowing 'sanctuary'
  chosen_spanish_reading: lugar santo, con nota que permite 'santuario'
  alternative_spanish_readings:
  - santuario
  - espacio santo
  rationale: El contexto de medidas territoriales sugiere un área sagrada más amplia, no solo el edificio. «Lugar santo» mantiene esa amplitud; la nota conserva la alternativa «santuario» porque el hebreo puede referirse al recinto sagrado.
  doctrine_reference: Ezequiel 45:2; distinción entre recinto sagrado y edificio del santuario
- issue: Naturaleza del מִגְרָשׁ
  english_pob_reading: open land, with footnote allowing 'pasture land' or 'common land'
  chosen_spanish_reading: terreno libre, con nota que permite 'terreno de pasto' o 'terreno común'
  alternative_spanish_readings:
  - terreno de pasto
  - terreno común
  - zona abierta
  rationale: El hebreo apunta a un espacio de reserva o despeje alrededor de la porción santa. «Terreno libre» es claro en español; la nota conserva alternativas válidas sin imponer una imagen urbana moderna que no pertenece al texto.
  doctrine_reference: Números 35:2-5; Ezequiel 48:15-20, zonas de alrededor y apartamiento del espacio santo
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente hebreo y concuerda con la decisión inglesa ya auditada. No se requieren revisiones sustantivas: se conservan la ambigüedad de קֹדֶשׁ y la amplitud espacial de מִגְרָשׁ, adaptadas a un español natural.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Lugar santo» conserva la amplitud de קֹדֶשׁ sin sobreespecificar el edificio.
  - «Terreno libre» evita calcos opacos y mantiene el sentido de zona abierta alrededor de la porción santa.
  - Se usó «codos» para אַמָּה, en coherencia con la tradición métrica bíblica y con la claridad para lectores de iglesia.
