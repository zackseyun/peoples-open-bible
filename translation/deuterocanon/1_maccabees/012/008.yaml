translation:
  text: And Onias received the man who had been sent with honor[a], and he received the letters[b], in which an alliance and friendship were explained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'welcomed the envoy honorably.' The Greek reads more literally, 'received the man who had been sent with honor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in which alliance and friendship were set forth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεδέξατο
  chosen: received
  alternatives:
  - welcomed
  - accepted
  lexicon: LSJ
  rationale: The verb denotes receiving or welcoming someone. 'Received' fits the narrative sequence and avoids overstating warmth, while the following adverb supplies the manner.
- source_word: ἐνδόξως
  chosen: with honor
  alternatives:
  - honorably
  - gloriously
  lexicon: LSJ
  rationale: The adverb indicates an honorable or distinguished manner of reception. 'With honor' is natural English and conveys the social dignity implied better than the potentially misleading 'gloriously'.
- source_word: τὸν ἄνδρα τὸν ἀπεσταλμένον
  chosen: the man who had been sent
  alternatives:
  - the envoy
  - the messenger who had been sent
  lexicon: LSJ
  rationale: Literally the phrase is 'the man, the one sent.' 'The man who had been sent' stays close to the Greek. 'Envoy' is possible by context, but the Greek expression itself is more descriptive than titular.
- source_word: ἔλαβε τὰς ἐπιστολάς
  chosen: he received the letters
  alternatives:
  - he took the letters
  lexicon: LSJ
  rationale: Although ἔλαβε can mean 'took,' in this context of formal diplomatic exchange 'received the letters' is the idiomatic and contextually appropriate sense.
- source_word: διεσάφειτο
  chosen: were explained
  alternatives:
  - were set forth
  - were made clear
  - were specified
  lexicon: LSJ
  rationale: The imperfect/passive form conveys that the contents of the letters set out or clarified the matter. 'Were explained' is clear modern English and preserves the passive sense.
- source_word: συμμαχίας
  chosen: an alliance
  alternatives:
  - alliance
  - military alliance
  lexicon: LSJ
  rationale: The noun denotes an alliance, often political or military. The singular English with article works naturally after 'in which,' while still reflecting the diplomatic sense.
- source_word: φιλίας
  chosen: friendship
  alternatives:
  - amity
  - friendly relations
  lexicon: LSJ
  rationale: The term denotes friendship in a political-diplomatic context. 'Friendship' is the straightforward rendering and pairs well with 'alliance'.
