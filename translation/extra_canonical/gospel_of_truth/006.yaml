    approximate_i3_alignment: NHC I.3 pp. 35-37 area — Parable of the Jars / Coming
      into Being
    alignment_confidence: approximate
  warnings: []
  consult_excerpt: 'It’s like some who’ve left their home, having jars that weren’t
    any good in places. They broke them, but the master of the house doesn’t suffer
    any loss. Instead he rejoices, because in place of the bad jars are ones that
    are full and complete. For this is 26 the judgment that’s come from above; it’s
    judged everyone. It’s a drawn, two-edged sword which cuts both ways. The Word,
    which is in the hearts of those who speak it, appeared. It isn’t just a sound,
    but it was incarnated (embodied).

    A great disturbance arose among the jars, because some were empty, others filled;
    some provided for, others poured out; some purified, others broken. All the realms
    were shaken and disturbed, because they didn’t have order or stability. Error
    was anxious. It didn’t know what to do; it grieved, mourned, and hurt itself,
    because it knew nothing. The knowledge, which is its (Error’s) destruction, approached
    it (Error) and all that emanated from it. Error is empty, with nothing inside
    it.

    Truth came into their midst, and all that emanated knew it. They welcomed the
    Father in Truth with a complete power that joins them with the Father. Truth is
    the Father’s mouth; the Holy Spirit is his tongue. Everyone who loves the Truth
    and are joined to the 27 Truth are joined to the Father’s mouth. By his tongue
    they’ll receive the Holy Spirit. This is the revelation of the Father and his
    manifestation to his generations. He revealed what was hidden of himself; he explained
    it, because who has anything, if not the Father alone?'
translation:
  text: 'For this is the judgment that came down from above[a]; it judged everyone.
    It is a sword, two‑edged, that cuts on both sides. The Word, which is in the hearts
    of those who speak it, appeared: it is not a mere sound, but it put on a body.
    A great disturbance arose among the jars: some were empty, and others were filled;
    some were provided for, and others poured out; some were purified, and others
    were broken. All the realms were shaken and agitated, for they had neither order
    nor stability.


    Error became anxious within itself; it did not know what it should do. It grieved
    and mourned and struck at itself, for it knew nothing. The Knowledge that is its
    undoing approached it—and all that had come forth from it—for Error is empty and
    has nothing within it.


    Truth came in their midst, and all who are from it knew it. They greeted the Father
    in Truth with a complete Power that joins them to the Father. Truth is the mouth
    of the Father; the Holy Spirit is his tongue. Whoever is joined to the mouth of
    the Father will receive the Holy Spirit by his tongue. This is the revelation
    of the Father and his manifestation to his generations: he revealed what of himself
    was hidden, he explained it—for who has anything[b], if not the Father alone?'
