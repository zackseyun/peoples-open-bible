translation:
  language: es
  text: 'Y si ellos rehúsan tomar la copa de tu mano para beber, entonces les dirás: «Así dice Yahvé de los ejércitos: Ustedes ciertamente beberán[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes seguramente beberán». El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la certeza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y cuando
  - Y acontecerá que si
  lexicon: HALOT
  rationale: La expresión introduce una situación condicional futura; «Y si» comunica con naturalidad ese valor sin añadir madera innecesaria.
- source_word: יְמָאֲנ֛וּ
  english_pob_choice: they refuse
  chosen_spanish: rehúsan
  alternatives_spanish:
  - se niegan
  - rechazan
  lexicon: HALOT
  rationale: «Rehúsan» expresa una negativa activa y deliberada, acorde con el matiz de resistencia del verbo en contexto.
- source_word: לָקַחַת
  english_pob_choice: to take
  chosen_spanish: tomar
  alternatives_spanish:
  - recibir
  lexicon: HALOT
  rationale: «Tomar» reproduce de modo directo el verbo hebreo y funciona bien con la imagen de la copa.
- source_word: הַכּוֹס
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - el cáliz
  lexicon: HALOT
  rationale: «Copa» mantiene la metáfora sin interpretarla; «cáliz» sería más litúrgico y menos neutral.
- source_word: מִיָּדְךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tus manos
  lexicon: HALOT
  rationale: El sufijo singular del hebreo se conserva con «tu mano», que suena natural en español.
- source_word: לִשְׁתּוֹת
  english_pob_choice: to drink
  chosen_spanish: para beber
  alternatives_spanish:
  - a beber
  lexicon: HALOT
  rationale: «Para beber» expresa con claridad la finalidad del infinitivo en español.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: then you shall say to them
  chosen_spanish: entonces les dirás
  alternatives_spanish:
  - y les dirás
  - después les dirás
  lexicon: HALOT
  rationale: 'La forma verbal en secuencia profética se vierte bien con futuro exhortativo: «les dirás».'
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética clásica se conserva con «Así dice», equivalente directo y reconocible.
- source_word: יְהוָה צְבָא֖וֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir יְהוָה por «Yahvé»; «de los ejércitos» refleja צבאות de forma transparente y bíblica.
- source_word: שָׁת֥וֹ תִשְׁתּֽוּ
  english_pob_choice: You shall surely drink
  chosen_spanish: Ciertamente beberán
  alternatives_spanish:
  - Beberán, sí, beberán
  - Seguro beberán
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto y verbo finito expresa énfasis/certidumbre; «Ciertamente» preserva esa fuerza en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la terminología base del proyecto para el Tetragrámaton, manteniendo el nombre propio divino en forma española auditable y no encubierta por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si explicitar el simbolismo de la copa como ira divina
  english_pob_reading: Retain 'the cup' without interpretive expansion
  chosen_spanish_reading: Conservar «la copa» sin expansión interpretativa
  alternative_spanish_readings:
  - la copa de la ira
  - la copa de mi ira
  rationale: El texto de este versículo nombra solo «la copa»; conservar la metáfora evita introducir una glosa que el hebreo aquí no expresa explícitamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que el marcador [a] aparezca exactamente en el texto español donde corresponde. La redacción mantiene la fuerza enfática del hebreo y la fórmula profética con un español publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «la copa» sin añadir «ira», porque el versículo no la explicita.
  - «de los ejércitos» preserva צְבָאוֹת de manera transparente y comprensible en español.
  - El orden discursivo «Entonces les dirás» refleja la secuencia profética sin sobrerreformular el hebreo.
