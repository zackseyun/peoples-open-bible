lexical_decisions:
- source_word: וִ/יהוֹיָדָע
  english_pob_choice: and Jehoiada
  chosen_spanish: y Jehoiada
  alternatives_spanish:
  - Jehoiada
  lexicon: HALOT
  rationale: El ו prefijado se conserva como coordinación en español, porque el hebreo continúa la lista. El nombre propio se translitera como Jehoiada, siguiendo la forma establecida por la POB en inglés.
- source_word: הַ/נָּגִ֣יד
  english_pob_choice: the leader
  chosen_spanish: el líder
  alternatives_spanish:
  - el jefe
  - el príncipe
  - el gobernante
  - el caudillo
  lexicon: HALOT
  rationale: נָגִיד puede expresar líder, jefe, gobernante o príncipe. 'Líder' comunica con claridad el valor de autoridad sin cargar una connotación monárquica excesiva en español.
- source_word: לְ/אַהֲרֹ֑ן
  english_pob_choice: of Aaron
  chosen_spanish: de Aarón
  alternatives_spanish:
  - para Aarón
  - perteneciente a Aarón
  lexicon: HALOT
  rationale: La preposición ל aquí indica relación o afiliación. En español, 'de Aarón' conserva la función genitiva breve y natural, reflejando que Jehoiada está vinculado a la casa sacerdotal aarónica.
- source_word: וְ/עִמּ֕/וֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: La coordinación hebrea se mantiene. 'Con él' reproduce la relación acompañante, y la conjunción inicial ayuda a conservar el ritmo enumerativo del texto.
- source_word: שְׁלֹ֥שֶׁת אֲלָפִ֖ים וּ/שְׁבַ֥ע מֵאֽוֹת
  english_pob_choice: three thousand seven hundred
  chosen_spanish: tres mil setecientos
  alternatives_spanish:
  - '3.700'
  lexicon: HALOT
  rationale: Se expresa el número con palabras, como en la POB inglesa, para mantener la fluidez del texto corrido y la precisión del conteo sin introducir una notación tipográfica innecesaria.
theological_decisions:
- issue: Relación de Jehoiada con Aarón / casa aarónica
  english_pob_reading: 'the leader of Aaron, with footnote: ''Or "Jehoiada, the leader for Aaron," that is, the chief representing the Aaronite priestly house.'''
  chosen_spanish_reading: el líder de Aarón
  alternative_spanish_readings:
  - el líder para Aarón
  - el jefe que representaba la casa sacerdotal aarónica
  rationale: El hebreo ל/אַהֲרֹן admite una relación de pertenencia o representación. Mantengo 'de Aarón' en el texto principal por su concisión y naturalidad, y conservo la posibilidad interpretativa de que Jehoiada actuara como representante de la casa sacerdotal aarónica, sin borrar la tensión semántica.
  doctrine_reference: Función sacerdotal aarónica; lectura relacional de ל
- issue: Alcance de la cifra y estructura de la lista
  english_pob_reading: and with him three thousand seven hundred
  chosen_spanish_reading: y con él tres mil setecientos
  alternative_spanish_readings:
  - con él tres mil setecientos
  - y junto con él tres mil setecientos
  rationale: El texto hebreo presenta una continuidad de enumeración más que una afirmación doctrinal. Se conserva la estructura de lista y el número exacto sin introducir explicaciones adicionales en el cuerpo del versículo.
  doctrine_reference: Precisión numérica y sintaxis enumerativa
translation_notes:
  revision_awareness: 'El pasaje permanece estable según el último repaso: no se reportaron cambios textuales necesarios y el cotejo externo señaló solo observaciones menores. La presente redacción conserva la decisión léxica principal de la POB inglesa y su nota alternativa sobre לְאַהֲרֹן, adaptándola a un español natural sin perder la ambigüedad relacional del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Aarón' para el nombre propio conforme al uso bíblico estándar en español.
  - Se mantiene 'líder' en lugar de 'príncipe' o 'gobernante' para evitar un sesgo regio no exigido por el contexto.
  - La cifra se escribe con palabras para armonizar con el registro del pasaje y con la traducción inglesa auditada.
  - La nota al pie preserva la alternativa interpretativa principal sin duplicar marcadores.
  - La coordinación inicial 'y' refleja el encadenamiento del hebreo en una lista de nombres y cantidades.
