translation:
  language: es
  text: ¡Ay de los que son sabios ante sus propios ojos y entendidos a su propio parecer![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prudentes» o «discernientes» para «entendidos». El término hebreo denota inteligencia perceptiva o discernimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ה֖וֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de los...!
  lexicon: HALOT
  rationale: El hebreo es una interjección profética de denuncia o lamento. En español, «¡Ay de...!» comunica bien el tono de advertencia/jucio sin perder la fuerza exclamativa.
- source_word: חֲכָמִים
  english_pob_choice: wise
  chosen_spanish: sabios
  alternatives_spanish:
  - sabios
  - sabias personas
  lexicon: HALOT
  rationale: 'Se conserva el valor adjetival/nominal del hebreo: personas que se consideran sabias. «Sabios» es natural en español y mantiene la ironía del reproche.'
- source_word: בְּעֵינֵיהֶם
  english_pob_choice: in their own eyes
  chosen_spanish: ante sus propios ojos
  alternatives_spanish:
  - en sus propios ojos
  - a sus propios ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para la autoevaluación. «Ante sus propios ojos» conserva la idea de juicio subjetivo y evita una literalidad extraña en español.
- source_word: וְנֶגֶד פְּנֵיהֶם
  english_pob_choice: in their own sight
  chosen_spanish: delante de sí mismos
  alternatives_spanish:
  - ante su propio rostro
  - en su propia presencia
  lexicon: HALOT
  rationale: La frase hebrea habla de lo que está «frente a sus rostros», en paralelismo con la primera cola. «Delante de sí mismos» conserva el paralelismo semántico y la referencia reflexiva sin sonar forzado.
- source_word: נְבֹנִים
  english_pob_choice: discerning
  chosen_spanish: prudentes
  alternatives_spanish:
  - entendidos
  - discretos
  - discernidores
  lexicon: HALOT
  rationale: El término hebreo denota inteligencia perceptiva o discernimiento. «Prudentes» funciona en español bíblico general, aunque el campo semántico puede abarcar también comprensión; por eso se añade nota textual para la alternativa 'entendidos'.
theological_decisions:
- issue: Auto-sabiduría como objeto de denuncia profética
  english_pob_reading: Woe to those who are wise in their own eyes and discerning in their own sight.
  chosen_spanish_reading: ¡Ay de los que son sabios ante sus propios ojos y prudentes delante de sí mismos!
  alternative_spanish_readings:
  - ¡Ay de los que se tienen por sabios y prudentes!
  - ¡Ay de los que son sabios a su propio parecer!
  rationale: El verso denuncia la autosuficiencia intelectual y moral. La redacción elegida mantiene el reproche profético y conserva el paralelismo hebreo sin suavizarlo en una paráfrasis interpretativa.
  doctrine_reference: Proverbs 3:7; Romans 12:16
translation_notes:
  revision_awareness: Se siguió el pasaje tal como está en el texto hebreo masorético (WLC) y el auditoría inglesa coincide en nivel alto de acuerdo; no se registran revisiones textuales aplicadas.
  spanish_consistency_notes:
  - Se conservó la estructura paralela hebrea con dos miembros coordinados.
  - Se evitó traducir el binomio como una simple repetición de 'sabios' para no perder la intensificación semántica.
  - El estilo es bíblico moderno y solemne, apto para lectura pública en español neutro.
