  (2) The periphrastic clothing phrase ⲉⲟⲩⲛϣⲧⲏⲛ ⲉⲣⲉⲛⲧⲟⲟⲩ ϭⲛⲟⲛ ϩⲓⲛⲧⲟϥ is rendered quite
  literally (“in soft clothing, with garments put on him”); ensure this literalness
  is desirable over a smoother “wearing soft clothes.” (3) Retaining singular “your
  king and your magnate” is intentional; verify this aligns with project style on
  number and does not mislead readers expecting plurals.'
