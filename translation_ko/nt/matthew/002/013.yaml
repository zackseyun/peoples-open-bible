  text: Ἀναχωρησάντων δὲ αὐτῶν ἰδοὺ ἄγγελος κυρίου ⸂φαίνεται κατ’ ὄναρ⸃ τῷ Ἰωσὴφ λέγων· Ἐγερθεὶς παράλαβε τὸ παιδίον καὶ τὴν μητέρα αὐτοῦ καὶ φεῦγε εἰς Αἴγυπτον, καὶ ἴσθι ἐκεῖ ἕως ἂν εἴπω σοι· μέλλει γὰρ Ἡρῴδης ζητεῖν τὸ παιδίον τοῦ ἀπολέσαι αὐτό.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/002/013.yaml
  text: After they had departed[a], behold, an angel of the Lord appeared to Joseph in a dream, saying, “Get up, take the child and his mother, and flee to Egypt, and stay there until I tell you[c][b]; for Herod is about to seek the child in order to destroy him.”
  footnotes:
  - marker: a
    text: Or 'the angel of the Lord.' The Greek lacks the article, but some readers may hear the phrase as a familiar biblical expression.
    reason: alternative_reading
  - marker: b
    text: Greek 'is about to seek,' expressing imminent intent.
    reason: lexical_alternative
  - marker: c
    text: Or 'to kill him.' The Greek says 'to destroy him,' here in the sense of causing his death.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들이 떠난 뒤에, 보십시오, 주의 천사가 꿈에 요셉에게 나타나 말하였습니다. 「일어나 아기와 그분의 어머니를 데리고 이집트로 피하십시오. 그리고 내가 당신에게 말할 때까지 거기 머무르십시오. 헤롯이 아기를 찾아 죽이려 하고 있기 때문입니다.」
  philosophy: optimal-equivalence
