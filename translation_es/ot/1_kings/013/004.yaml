    text: 'O «se marchitó». Hebreo: «se secó».'
    reason: lexical_alternative
  revision_rationale: Se corrige el único error sustancial de sentido («¡Apréndanlo!») por «¡Agárrenlo!», que refleja la orden plural de apresar al hombre de Dios sin introducir matiz legal innecesario. Se reubica la nota al verbo «se secó» y se ajusta su contenido para conservar una alternativa léxica genuina, en línea con el expediente inglés. También se suaviza levemente el inicio a «cuando el rey oyó» por naturalidad, manteniendo el sentido completo del hebreo.
