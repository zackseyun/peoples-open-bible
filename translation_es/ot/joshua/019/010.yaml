review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: la tercera suerte/lote para los hijos de Zabulón, según sus clanes, y el alcance del límite de su heredad hasta Sarid. Mantiene correctamente ''hijos'', ''clanes'' y la idea de frontera de la herencia. La nota sobre וַיַּעַל también preserva la alternativa léxica documentada.'
  spanish_quality_summary: El español es claro y legible, pero conviene un ajuste menor en la nota al pie. En el texto principal, 'la tercera suerte salió' suena natural y fiel; 'límite de su heredad' también funciona bien en registro bíblico. La principal mejora necesaria es evitar en la nota la formulación 'subió/salió', porque el inglés auditado preserva 'came up' frente a 'was drawn', y en español la pareja más exacta y natural sería 'subió/salió' solo si se explica mejor, o mejor aún 'subió' como literal. Además, 'fue echada' no corresponde tan bien al inglés auditado 'was drawn'.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. El uso de 'Zabulón', 'hijos', 'clanes', 'heredad' y 'Sarid' es compatible con el registro bíblico buscado. 'Suerte' para גּוֹרָל está bien justificado en este contexto.
  issues:
  - severity: medium
    issue: La nota al pie usa 'fue echada' como alternativa para 'salió'.
    rationale: El inglés POB documenta la alternativa 'was drawn', no 'was cast/thrown'. En español, 'fue sacada' o 'fue extraída' se alinea mejor con 'was drawn'. 'Fue echada' desplaza el foco al acto de lanzar la suerte, no al resultado que 'salió'/'subió'.
  - severity: low
    issue: La formulación de la literalidad hebrea en la nota puede afinarse.
    rationale: El hebreo literalmente dice que el lote 'subió' o 'salió/came up'. En la nota conviene expresar esto con más precisión y sin mezclar comillas y glosas de manera confusa.
  revised_spanish_text: La tercera suerte[a] salió para los hijos de Zabulón, según sus clanes, y el límite de su heredad fue hasta Sarid.
  revised_footnotes:
  - marker: a
    text: O «fue sacada» para «salió»; el hebreo dice literalmente que la suerte «subió» o «salió».
    reason: lexical_alternative
  revision_rationale: 'El texto principal puede mantenerse. Se corrige únicamente la nota para alinearla mejor con la evidencia hebrea y con la auditoría inglesa: la alternativa adecuada corresponde a ''was drawn'', no a ''fue echada''.'
