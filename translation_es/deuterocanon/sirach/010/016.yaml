translation:
  language: es
  text: Dios borró las huellas de las naciones[a][b], y arrancó su raíz hasta lo más hondo del suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio griego paralelo: «El Señor arrancó las raíces de las naciones, y plantó a los humildes en su lugar». El hebreo, en cambio, habla de Dios borrando las huellas de las naciones y arrancando su raíz hasta lo más hondo del suelo.'
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea final es rara y puede referirse al fondo, a la profundidad más baja o al nivel más hondo del suelo; la idea es un desarraigo total.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִקְבוֹת
  english_pob_choice: traces
  chosen_spanish: huellas
  alternatives_spanish:
  - rastros
  - señales
  - pisadas
  lexicon: HALOT
  rationale: El sustantivo se relaciona con el talón y con marcas dejadas por el paso. 'Huellas' conserva la imagen concreta mejor que una abstracción, y en español suena natural junto al paralelismo con la raíz arrancada.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentes
  - gentiles
  lexicon: HALOT
  rationale: En este contexto sapiencial, 'naciones' transmite bien el colectivo humano sin introducir una carga teológica posterior que 'gentiles' podría sugerir en español cristiano.
- source_word: טִמְטֵם
  english_pob_choice: erased
  chosen_spanish: borró
  alternatives_spanish:
  - borró por completo
  - borró del todo
  - suprimió
  lexicon: HALOT
  rationale: '''Borró'' mantiene la imagen de eliminar marcas o huellas, que es coherente con el primer cola del versículo y evita sobredeterminar la acción como destrucción física total.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Se conserva 'Dios' porque el testimonio hebreo dice אֱלֹהִים. No se armoniza con el paralelo griego que usa κύριος, ya que el proyecto prioriza el hebreo cuando está preservado.
- source_word: וְשָׁרְשָׁם
  english_pob_choice: and their root
  chosen_spanish: y su raíz
  alternatives_spanish:
  - y sus raíces
  - y su tronco
  lexicon: HALOT
  rationale: El hebreo está en singular con sufijo colectivo; 'su raíz' refleja mejor esa forma que un plural español, y mantiene la metáfora de desarraigo total.
- source_word: עַד אֶרֶץ
  english_pob_choice: to the very ground
  chosen_spanish: hasta la misma tierra
  alternatives_spanish:
  - hasta el suelo
  - hasta el polvo de la tierra
  - hasta el mismo suelo
  lexicon: HALOT
  rationale: La frase expresa alcance hasta el límite inferior de la tierra/suelo. 'Hasta la misma tierra' suena natural en español y preserva la idea de descenso/extensión total sin precisar en exceso.
- source_word: קִעֲקָע
  english_pob_choice: bedrock
  chosen_spanish: la misma tierra
  alternatives_spanish:
  - el fundamento
  - el fondo de la tierra
  - la profundidad de la tierra
  lexicon: HALOT
  rationale: El término es raro y puede aludir al nivel más bajo del suelo o al fondo/bedrock. Siguiendo la revisión inglesa, se evita una precisión interpretativa excesiva y se vierte de manera amplia como 'la misma tierra'.
theological_decisions:
- issue: Preferencia entre el hebreo y el paralelo griego en Sirácida
  english_pob_reading: The Hebrew witness speaks of God erasing the nations’ footprints and their root down to the earth’s lowest level; the Greek parallel reads the Lord uprooting nations and planting the humble in their place.
  chosen_spanish_reading: 'Se sigue el hebreo como texto principal: Dios borra las huellas de las naciones y su raíz hasta la misma tierra.'
  alternative_spanish_readings:
  - El Señor arrancó las raíces de las naciones e implantó a los humildes en su lugar.
  rationale: La lectura hebrea preservada es primaria en este versículo y ofrece una imagen propia —huellas borradas y raíz llevada hasta la tierra— que no debe ser reemplazada por la imagen griega sin razón textual suficiente. El paralelo griego se reconoce como testimonio alterno, pero no gobierna la redacción principal.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is primary where it survives; Greek parallel functions as input/consistency check.'
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del inglés: ''traces'' pasó a una imagen más natural en español (''huellas''), y la segunda cola se suavizó para evitar una precisión excesiva, manteniendo el sentido de borramiento total y desarraigo hasta la tierra misma.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' conforme al hebreo אֱלֹהִים, sin armonizar al griego κύριος.
  - '''huellas'' conserva la imagen concreta del hebreo עִקְבוֹת y funciona bien con el verbo ''borrar''.'
  - '''su raíz'' respeta el singular hebreo colectivo y evita una pluralización innecesaria en español.'
  - La estructura breve y paralelística conserva el estilo sapiencial del versículo.
