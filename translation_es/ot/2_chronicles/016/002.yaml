revisions:
- from: 'Entonces Asa sacó plata y oro de los tesoros de la casa de Yahvé[a] y de la casa del rey, y los envió a Ben-adad, rey de Aram, que habitaba en Damasco, diciendo:'
  to: 'Entonces Asa sacó plata y oro de las tesorerías de la casa de Yahvé y de la casa del rey, y los envió a Ben-adad, rey de Aram[a], que habitaba en Damasco, diciendo:'
  rationale: Se corrige «tesoros» a «tesorerías» para reflejar mejor el plural locativo מֵאֹצְרוֹת y la decisión lexical auditada «from the treasuries». Se reubica la nota [a] desde «Yahvé» a «Aram», porque su contenido trata la alternativa tradicional «Siria», no el nombre divino. No se requieren cambios adicionales.
