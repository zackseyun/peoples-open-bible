translation:
  language: es
  text: Pero si tocan solo una, los líderes, los jefes de los millares de Israel[a], se reunirán contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los jefes de los millares de Israel», probablemente refiriéndose a dirigentes sobre las divisiones de mil de Israel; algunas traducciones lo interpretan más libremente como «los jefes de los clanes de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula introduce una condición con matiz de contraste respecto al versículo anterior; «pero» conserva ese valor adversativo de manera natural en español.
- source_word: בְּ/אַחַת
  english_pob_choice: only one
  chosen_spanish: solo una
  alternatives_spanish:
  - con una
  - una
  lexicon: HALOT
  rationale: El hebreo es elíptico y contrasta una sola señal con la de ambos cuernos/trompetas del contexto previo; «solo una» hace explícita esa oposición sin añadir más de lo que el contexto exige.
- source_word: יִתְקָעוּ
  english_pob_choice: they blow
  chosen_spanish: tocan
  alternatives_spanish:
  - soplan
  - hacen sonar
  lexicon: HALOT
  rationale: En el contexto de señales con trompeta, en español «tocar» es la forma natural y fiel para el acto de hacer sonar el instrumento.
- source_word: וְ/נוֹעֲדוּ
  english_pob_choice: shall gather
  chosen_spanish: se reunirán
  alternatives_spanish:
  - se congregarán
  - se juntarán
  lexicon: HALOT
  rationale: El nifal expresa reunirse por convocatoria; «se reunirán» conserva el sentido de convocatoria/ensamble sin introducir una explicación interpretativa excesiva.
- source_word: הַ/נְּשִׂיאִים
  english_pob_choice: the leaders
  chosen_spanish: los líderes
  alternatives_spanish:
  - los jefes
  - los jefes tribales
  lexicon: HALOT
  rationale: נשיאים designa a los dirigentes del pueblo; «líderes» comunica bien la función en español contemporáneo y evita el posible malentendido monárquico de «príncipes».
- source_word: רָאשֵׁי אַלְפֵי יִשְׂרָאֵל
  english_pob_choice: the heads of the thousands of Israel
  chosen_spanish: las cabezas de los millares de Israel
  alternatives_spanish:
  - los jefes de los millares de Israel
  - los cabezas de las milicias de Israel
  lexicon: HALOT
  rationale: Se mantiene la estructura transparente del hebreo y el término técnico «millares», reflejando la unidad administrativa/militar sugerida por el original y por la nota inglesa.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido y la estructura del hebreo, alineado con la decisión inglesa de mantener la referencia a una sola señal y conservar la denominación de los responsables de Israel en términos transparentes. No se requieren ajustes doctrinales ni variantes textuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece.
  - «Millares» conserva la transparencia del hebreo frente a una paráfrasis como «clanes».
  - «Se reunirán contigo» refleja el destino de la convocatoria dirigida a Moisés, sin añadir localizaciones o explicaciones no presentes en el texto.
