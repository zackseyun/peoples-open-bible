translation:
  language: es
  text: Con amor leal y fidelidad se expía la iniquidad[a][b], y con el temor de Yahvé uno se aparta del mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Con amor leal y verdad se expía la iniquidad». El par hebreo חֶסֶד וֶאֱמֶת a menudo lleva el sentido de amor leal y fidelidad, pero «verdad» también es una traducción posible de אֱמֶת.'
    reason: lexical_alternative
  - marker: b
    text: El verbo «se expía» deja sin expresar el agente en hebreo; el proverbio no dice explícitamente si el enfoque está en la acción de Dios, en el papel de las virtudes del pacto, o en ambos.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּחֶסֶד
  english_pob_choice: by steadfast love
  chosen_spanish: con misericordia
  alternatives_spanish:
  - por amor constante
  - con amor leal
  - con misericordia fiel
  lexicon: HALOT
  rationale: חֶסֶד abarca amor leal, bondad duradera y fidelidad relacional. En español, «misericordia» comunica una actitud benévola y activa, pero puede sonar más amplia que el matiz de pacto; por eso se mantiene en equilibrio con «fidelidad» para reflejar el par hebreo sin volverlo demasiado técnico.
- source_word: וֶאֱמֶת
  english_pob_choice: and faithfulness
  chosen_spanish: y fidelidad
  alternatives_spanish:
  - y verdad
  - y confiabilidad
  - y lealtad
  lexicon: HALOT
  rationale: אֱמֶת puede significar verdad, firmeza o fidelidad. En la pareja חֶסֶד וֶאֱמֶת, el sentido más natural en este contexto sapiencial es una combinación ética de lealtad y confiabilidad; «fidelidad» preserva mejor ese valor que «verdad» sola.
- source_word: יְכֻפַּר
  english_pob_choice: is atoned for
  chosen_spanish: se expía
  alternatives_spanish:
  - es expiada
  - se hace expiación por
  - queda expiada
  lexicon: HALOT
  rationale: El Pual de כפר expresa la idea de expiación/atonement. «Se expía» conserva la pasiva impersonal del hebreo y mantiene el vocabulario sacrificial sin agregar un agente explícito que el proverbio no nombra.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la culpa
  - el pecado
  - la maldad
  lexicon: HALOT
  rationale: «Iniquidad» conserva el sentido de torcedura moral y coincide con el registro bíblico tradicional sin perder amplitud semántica. «Culpa» estrecha demasiado el término; «pecado» es posible pero menos preciso aquí.
- source_word: וּבְיִרְאַת יְהוָה
  english_pob_choice: and by the fear of Yahweh
  chosen_spanish: y con el temor de Yahvé
  alternatives_spanish:
  - y en el temor de Yahvé
  - y por el temor de Yahvé
  - y con reverencia hacia Yahvé
  lexicon: HALOT
  rationale: יִרְאָה en sabiduría suele referirse a reverencia temerosa y obediente ante Dios. «Temor de Yahvé» es la fórmula más fiel y reconocible; «con» reproduce de manera natural el valor instrumental del prefijo ב.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la terminología del proyecto para el Tetragrama: «Yahvé» como transliteración del nombre divino. Se evita la sustitución por un título, porque el texto hebreo nombra directamente a Dios.'
- source_word: סוּר
  english_pob_choice: one turns away
  chosen_spanish: uno se aparta
  alternatives_spanish:
  - uno se desvía
  - se aparta uno
  - hay apartamiento
  lexicon: HALOT
  rationale: La forma proverbial tiene valor impersonal/general. «Uno se aparta» es natural en español y preserva la lectura genérica del hebreo, sin volverlo demasiado abstracto.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - de la maldad
  - del mal moral
  lexicon: HALOT
  rationale: Aquí רָע apunta a mal moral, no a mera desgracia. «Del mal» es breve, idiomático y suficientemente amplio en español bíblico; «de lo malo» suena menos solemne.
theological_decisions:
- issue: Agente implícito en la expiación
  english_pob_reading: The proverb does not explicitly say whether the focus is on God's action, the role of covenant virtues, or both.
  chosen_spanish_reading: El proverbio deja implícito el agente de la expiación y no precisa si el énfasis recae en la acción de Dios, en las virtudes del pacto o en ambas.
  alternative_spanish_readings:
  - La misericordia y la fidelidad humanas expían la iniquidad.
  - La acción de Dios es la que expía la iniquidad mediante su misericordia y fidelidad.
  rationale: El participio pasivo hebreo permite una ambigüedad real que conviene conservar. La traducción española mantiene esa apertura al no nombrar agente alguno, evitando resolver la tensión hacia una lectura exclusivamente humana o exclusivamente divina.
  doctrine_reference: Translation philosophy §3
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino en vez de una sustitución por título, conforme a la política terminológica del proyecto. Esto preserva la referencia directa del hebreo y la transparencia textual.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con la auditoría inglesa y no requiere revisión mayor. La única decisión sensible en español es cómo reflejar חֶסֶד וֶאֱמֶת: se optó por una formulación natural («misericordia y fidelidad») sin perder la alternativa semántica del par hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - Se usa «temor de Yahvé» como expresión sapiencial estable, no como miedo servil.
  - La expiación se deja en voz impersonal («se expía») para respetar la pasiva del hebreo.
  - «Uno se aparta» conserva el valor proverbial general sin introducir un sujeto específico.
