translation:
  language: es
  text: Por tanto, su pueblo vuelve aquí[a], y las aguas de plenitud[b] son escurridas por ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su pueblo regresa aquí». El verbo puede entenderse como intransitivo («regresar» / «volver») o de manera más transitiva («hacer volver»).'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «aguas de plenitud». La frase probablemente significa aguas abundantes, aunque la imagen es difícil.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «son escurridas para ellos». El verbo y el pronombre final son difíciles, y algunos entienden la línea como si hablara de una porción abundante que se les provee, más que de aguas escurridas por ellos.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por ello
  lexicon: HALOT
  rationale: Marca consecuencia lógica respecto de lo dicho antes; 'Por tanto' conserva el vínculo discursivo con tono natural y digno en español.
- source_word: ישיב
  english_pob_choice: turn back
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - hace volver
  - vuelve atrás
  lexicon: HALOT
  rationale: El verbo hebreo puede leerse de manera intransitiva o transitiva. 'Vuelve' mantiene la ambigüedad sin forzar un objeto explícito ni resolver interpretativamente el sujeto/acción.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su propio pueblo
  lexicon: HALOT
  rationale: Conserva el sufijo posesivo ambiguo del hebreo sin identificar en español a quién pertenece ese 'su'.
- source_word: הֲלֹם
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - a este lugar
  lexicon: HALOT
  rationale: Adverbio de lugar; 'aquí' comunica de forma natural el sentido espacial.
- source_word: וּמֵי
  english_pob_choice: and waters
  chosen_spanish: y las aguas
  alternatives_spanish:
  - y agua
  - y aguas
  lexicon: HALOT
  rationale: El plural hebreo se refleja con 'las aguas', manteniendo el registro poético y la forma plural del original.
- source_word: מָלֵא
  english_pob_choice: fullness
  chosen_spanish: plenitud
  alternatives_spanish:
  - llenura
  - abundancia
  - pleno
  lexicon: HALOT
  rationale: La construcción hebrea es difícil; 'plenitud' retiene la idea de 'lleno/lleno de' sin simplificarla por completo a 'abundancia', que podría borrar la tensión del texto.
- source_word: יִמָּצוּ
  english_pob_choice: are drained
  chosen_spanish: son exprimidas
  alternatives_spanish:
  - son drenadas
  - son escurridas
  - son estrujadas
  lexicon: HALOT
  rationale: El nifal de מצה expresa ser exprimido/extraído. 'Son exprimidas' conserva la fuerza imagística y la pasividad, mejor que una paráfrasis más suave.
- source_word: לָמוֹ
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - para ellos
  - de ellos
  lexicon: HALOT
  rationale: Con el pasivo, la preposición puede entenderse en sentido agente/beneficiario. 'Por ellos' sigue de cerca la lectura del inglés POB y mantiene la posibilidad de una relación ambigua con el verbo.
theological_decisions:
- issue: Ambigüedad del referente de 'su' en 'su pueblo'
  english_pob_reading: Left ambiguous in the main text
  chosen_spanish_reading: Se deja ambiguo en el texto principal
  alternative_spanish_readings:
  - el pueblo del impío
  - el pueblo de Dios
  rationale: El hebreo no identifica de forma explícita el antecedente del posesivo. Mantener la ambigüedad evita imponer una resolución doctrinal o interpretativa que el verso no exige.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica cuando el texto fuente la deja abierta.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «waters of fullness» frente a «waters in abundance». La versión española conserva esa literalidad relativa con «aguas de plenitud», sin abandonar la ambigüedad sintáctica y semántica señalada en el aparato crítico.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el contexto lo requiera explícitamente; aquí no aparece.
  - Se mantiene 'pueblo' para עַם y no 'gente', por correspondencia más directa con el constructo posesivo.
  - Se evita resolver el sujeto implícito de la acción, preservando la tensión documentada en el audit trail.
  - Se elige una pasiva española ('son exprimidas') para reflejar el nifal hebreo y el posible valor pasivo/medio de la construcción.
  - La puntuación y el orden conservan el paralelismo poético del hebreo sin hacerlo opaco en español.
