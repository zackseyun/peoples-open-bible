translation:
  language: es
  text: 'Entonces Yahvé dijo: «Mi Espíritu no permanecerá[a] en el hombre[b] para siempre, porque él es carne[c]; sus días serán de ciento veinte años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mi Espíritu no permanecerá/se quedará en el hombre para siempre’; el verbo hebreo es difícil y puede implicar permanecer más que contender.
    reason: alternative_reading
  - marker: b
    text: ‘El hombre’ aquí traduce el hebreo adam, un término singular usado genéricamente para la humanidad.
    reason: lexical_alternative
  - marker: c
    text: O ‘porque él también es carne’.
    reason: previous_rendering
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Transliteración del Nombre divino / Tetragrama
  rationale: Se conserva el nombre propio del pacto en lugar de sustituirlo por un título. ‘Yahvé’ sigue la política del proyecto para יְהוָה y evita la máscara tradicional ‘SEÑOR’.
- source_word: יָדוֹן
  english_pob_choice: will not abide
  chosen_spanish: no permanecerá
  alternatives_spanish:
  - no contenderá
  - no se mantendrá
  - no permanecerá en
  lexicon: HALOT, BDB
  rationale: El verbo es difícil y su sentido exacto está debatido. ‘Permanecerá’ refleja la lectura aceptada en el contexto del audit trail inglés y mantiene abierta la tensión semántica entre permanecer y otros matices posibles, sin forzar una interpretación más polémica.
- source_word: רוּחִי
  english_pob_choice: My Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi espíritu
  - mi aliento
  lexicon: HALOT, BDB
  rationale: El posesivo divino y el habla de Yahvé favorecen referirlo al Espíritu de Dios. Se capitaliza ‘Espíritu’ por claridad reverente, sin añadir especificidad doctrinal no exigida por el texto.
- source_word: בָאָדָם
  english_pob_choice: in man
  chosen_spanish: en el hombre
  alternatives_spanish:
  - con el hombre
  - en la humanidad
  - con la humanidad
  lexicon: HALOT, BDB
  rationale: La preposición ב permite ‘en’ o ‘con’ según el verbo. Con ‘permanecerá’ en español, ‘en el hombre’ resulta natural y fiel. ‘El hombre’ conserva el singular genérico de אָדָם, como en el audit trail inglés.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT, BDB
  rationale: Expresión idiomática clara y estándar en español para עוֹלָם en este contexto temporal.
- source_word: בְּשַׁגַּם
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - puesto que
  lexicon: HALOT, BDB
  rationale: La forma rara se entiende mejor como causal. ‘Porque’ comunica la relación causal de manera directa y natural en español.
- source_word: הוּא בָשָׂר
  english_pob_choice: for he is flesh
  chosen_spanish: él es carne
  alternatives_spanish:
  - es carne
  - él también es carne
  - es sólo carne
  lexicon: HALOT, BDB
  rationale: Se conserva ‘carne’ para retener la textura antropológica y teológica del hebreo. Se omite ‘también’ porque el contexto inglés revisado lo dejó fuera por ser ambiguo; ‘él es carne’ mantiene la afirmación sin añadir énfasis no explicitado.
- source_word: וְהָיוּ יָמָיו
  english_pob_choice: his days will be
  chosen_spanish: sus días serán
  alternatives_spanish:
  - y sus días serán
  - sus días serán de
  lexicon: HALOT, BDB
  rationale: Se sigue la consecuencia temporal del cláusula final con español natural y sobrio, evitando introducir un conector inferencial que el texto hebreo no exige explícitamente.
- source_word: מֵאָה וְעֶשְׂרִים שָׁנָה
  english_pob_choice: one hundred and twenty years
  chosen_spanish: ciento veinte años
  alternatives_spanish:
  - 120 años
  - cien y veinte años
  lexicon: HALOT, BDB
  rationale: Se escribe en palabras por el estilo bíblico y la fluidez literaria, manteniendo la cifra exacta del texto.
theological_decisions:
- issue: Sentido de רוּחַ en boca de Yahvé
  english_pob_reading: Rendered as 'My Spirit' referring to God's Spirit in a general OT sense.
  chosen_spanish_reading: ‘mi Espíritu’ como referencia al Espíritu de Dios, sin precisar una formulación trinitaria posterior.
  alternative_spanish_readings:
  - mi aliento
  - mi espíritu
  rationale: El posesivo divino y el discurso de Yahvé favorecen la referencia al Espíritu de Dios. Se conserva la tensión teológica del texto sin resolverla hacia ‘aliento’ ni imponer desarrollos doctrinales ajenos al pasaje.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Alcance de אָדָם
  english_pob_reading: Generic singular 'man' representing humankind.
  chosen_spanish_reading: ‘el hombre’ como singular genérico representando a la humanidad.
  alternative_spanish_readings:
  - la humanidad
  - la gente
  rationale: Se mantiene el singular masculino representativo que el hebreo usa, conforme a la política de exactitud gramatical y al audit trail inglés.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: El audit trail inglés muestra una evolución desde ‘contend’ a ‘abide’ y luego la eliminación de ‘therefore’. La versión española sigue la lectura revisada que favorece ‘permanecerá’ y no introduce un conector inferencial explícito. También conserva el valor causal de בְּשַׁגַּם con ‘porque’, y evita sobrecargar ‘también’ fuera de la nota alternativa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה, conforme al estándar del proyecto.
  - Se capitaliza ‘Espíritu’ por referencia divina, pero se mantiene en minúscula en la nota alternativa cuando corresponde al término común.
  - ‘Carne’ se conserva para mantener la fuerza antropológica del hebreo.
  - Se mantiene el singular genérico ‘el hombre’ para אָדָם, en coherencia con el audit trail.
  - La puntuación y comillas siguen el uso editorial español.
