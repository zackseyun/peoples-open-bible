  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'los hijos de Israel' respeta la decisión teológica auditada. No aparecen términos sensibles como Yahvé, Mesías o esclavo. La revisión propuesta solo ajusta idiomaticidad del español sin alterar las decisiones léxicas principales.
