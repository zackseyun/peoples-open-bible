translation:
  language: es
  text: La hermosura y la gracia[a] deleitan al ojo, y mejor que ambas es la vegetación[b] del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede leerse como «hermosura y apariencia» o «hermosura y forma»; el paralelo griego favorece una pareja de cualidades agradables, por lo que se traduce «gracia».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «crecimientos/brotes del campo»; el griego paralelo habla de vegetación verde de la siembra, apoyando una referencia a vegetación fresca del campo.
    reason: alternative_reading
lexical_decisions:
- source_word: יפי
  english_pob_choice: beauty
  chosen_spanish: hermosura
  alternatives_spanish:
  - belleza
  - beldad
  lexicon: HALOT
  rationale: El hebreo denota belleza o atractivo; «hermosura» mantiene el campo semántico de belleza visible y suena natural en español bíblico actual.
- source_word: ותאר
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - forma
  - apariencia
  - porte
  lexicon: HALOT
  rationale: Aunque תאר puede referirse a forma o apariencia, el paralelo griego χάριν καὶ κάλλος apoya una pareja de cualidades atractivas; «gracia» preserva ese matiz de agrado y elegancia sin reducirlo a mera constitución física.
- source_word: יחמידו עין
  english_pob_choice: delight the eye
  chosen_spanish: deleitan los ojos
  alternatives_spanish:
  - la vista las desea
  - son deseables para la vista
  - cautivan la vista
  lexicon: HALOT
  rationale: El verbo de חמד puede expresar deseo o complacencia. En este dicho sapiencial, «deleitan los ojos» comunica con naturalidad el efecto visual sin forzar una lectura de codicia.
- source_word: ומשניהם
  english_pob_choice: and better than both
  chosen_spanish: y más que ambas
  alternatives_spanish:
  - y por encima de ambas
  - y mejor que ambas
  lexicon: HALOT
  rationale: La comparación se aclara por el paralelo griego ὑπὲρ ἀμφότερα. «Más que ambas» conserva la preferencia comparativa y funciona bien con los sustantivos femeninos del español.
- source_word: צמחי שדה
  english_pob_choice: the vegetation of the field
  chosen_spanish: la vegetación del campo
  alternatives_spanish:
  - los brotes del campo
  - la flora del campo
  - el verdor del campo
  lexicon: HALOT
  rationale: צמחי designa crecimientos, plantas o brotes; el griego χλόην σπόρου apunta a vegetación fresca del campo. «Vegetación del campo» refleja bien la imagen sin sobreespecificar produce o cosecha.
translation_notes:
  revision_awareness: La versión inglesa revisó «green growth of a field» a «vegetation of the field» para mayor naturalidad y precisión formal; la española sigue esa decisión con «vegetación del campo», manteniendo el comparativo y la imagen agrícola.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «gracia» para reflejar el paralelo griego χάριν, pero se anota la alternativa hebrea de «forma/apariencia» para no borrar la tensión lexical.
  - Se evita «señor» o lenguaje eclesiástico no motivado por el texto, y se mantiene un registro sobrio y publicable.
