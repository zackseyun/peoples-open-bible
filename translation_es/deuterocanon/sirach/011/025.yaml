translation:
  language: es
  text: No te asombres de los malvados[a]; corre a Yahvé y espera su luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «En un día de bienes hay olvido de males, y en un día de males no se recordarán bienes». El testigo griego aquí difiere de manera sustancial del hebreo conservado.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּתְמַה
  english_pob_choice: Do not be astonished
  chosen_spanish: No te asombres
  alternatives_spanish:
  - No te maravilles
  - No te perturbes
  - No te sorprendas
  lexicon: HALOT
  rationale: El hebreo expresa quedar atónito o sobrecogido ante algo. «Asombrarse» conserva esa fuerza sin volver el tono demasiado técnico; además encaja bien con el mandato admonitorio.
- source_word: בְּעוֹשֵׂי רָע
  english_pob_choice: evildoers
  chosen_spanish: los malvados
  alternatives_spanish:
  - los que hacen el mal
  - los malhechores
  - los perversos
  lexicon: HALOT
  rationale: La frase participial describe a personas caracterizadas por hacer el mal. «Malvados» es conciso y natural en español bíblico contemporáneo; mantiene el foco en las personas, no solo en el acto.
- source_word: תָּרוּץ
  english_pob_choice: run
  chosen_spanish: corre
  alternatives_spanish:
  - apresúrate
  - huye
  - corre apresuradamente
  lexicon: HALOT
  rationale: El verbo es concreto y urgente. «Corre» reproduce mejor la imagen directa del hebreo que una paráfrasis como «apresúrate».
- source_word: לַיי
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - a Yahvé
  - al Señor Yahvé
  - al Señor Dios
  lexicon: HALOT
  rationale: El hebreo usa la escritura reverencial del nombre divino. En español, «el Señor» funciona de modo natural como destino de la acción de correr, sin perder la referencia al Dios de Israel. Se evita «Yahvé» en la frase principal porque aquí la construcción suena menos natural y el audit trail inglés ya optó por una forma de título.
- source_word: וְקַוֵּה
  english_pob_choice: and wait
  chosen_spanish: y espera
  alternatives_spanish:
  - y aguarda
  - y espera con esperanza
  - y confía esperando
  lexicon: HALOT
  rationale: El verbo puede abarcar esperar con confianza. «Espera» conserva la imperativa simple y permite que el matiz de confianza quede implícito, como en el inglés POB.
- source_word: לְאוֹרוֹ
  english_pob_choice: for his light
  chosen_spanish: su luz
  alternatives_spanish:
  - para su luz
  - para su resplandor
  - a la espera de su luz
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para/con respecto a su luz». En español, «espera su luz» suena más fluido y comunica la espera dirigida hacia esa luz divina sin añadir una interpretación cerrada.
theological_decisions:
- issue: Tratamiento del nombre divino representado por la forma reverencial hebrea לַיי
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La decisión sigue el audit trail inglés, que justificó «the Lord» por fluidez sintáctica en esta construcción preposicional. En español, «al Señor» mantiene esa naturalidad y sigue señalando al Dios de Israel sin forzar una forma más marcada en mayúsculas o el nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Relación entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as primary, while preserving the Greek's substantially different sense in a footnote
  chosen_spanish_reading: Traducir el hebreo como texto principal y conservar en nota el sentido significativamente distinto del griego
  alternative_spanish_readings:
  - Harmonizar hebreo y griego en una sola redacción
  - Traducir solo el griego
  rationale: El testimonio griego ofrece una sentencia distinta, no una simple variación de orden. Por fidelidad al texto hebreo conservado y a la metodología POB, la línea principal sigue el hebreo, y la diferencia griega se documenta en nota textual.
  doctrine_reference: PHILOSOPHY.md — translate from Hebrew where it survives; use Greek parallel as input
translation_notes:
  revision_awareness: El borrador sigue la última revisión aprobada del inglés POB, que prefirió «evildoers» por concisión. En español, la misma decisión se refleja con «los malvados», evitando una paráfrasis más larga como «los que hacen el mal». También se preserva la diferencia textual entre el hebreo y el paralelo griego mediante nota.
  spanish_consistency_notes:
  - Se emplea «Señor» para reflejar el nombre divino reverencial en esta construcción preposicional, coherente con el audit trail inglés.
  - «Su luz» mantiene la imagen hebrea sin decidir de antemano si se trata de guía, favor o liberación.
  - La nota textual marca explícitamente que el griego ofrece una formulación distinta, para no armonizar indebidamente los testigos.
