translation:
  language: es
  text: Yokim, y los hombres de Cozeba, y Joás, y Saraf, que dominaron en Moab[a] y regresaron a Lehem[b]. Estos registros son antiguos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'que poseyeron Moab', 'que llegaron a ser señores en Moab', o posiblemente 'que se casaron con Moab'. La expresión hebrea es breve e incierta.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo incierto: quizá un nombre propio, ''Jashubi-lehem'' (o ''Jashub-lehem''), en lugar de ''regresaron a Lehem''. Algunos también relacionan el lugar con Belén.'
    reason: alternative_reading
  - marker: c
    text: O, 'y los asuntos son antiguos' / 'y estas cosas son de tiempos antiguos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹקִים
  english_pob_choice: Jokim
  chosen_spanish: Yokim
  alternatives_spanish:
  - Jokim
  - Joqim
  lexicon: transliteración de nombre propio
  rationale: Se conserva el nombre propio con transliteración directa al español; se prefiere 'Y' inicial para reflejar mejor la grafía hebrea y la pronunciación aproximada en español.
- source_word: אַנְשֵׁי כֹזֵבָא
  english_pob_choice: the men of Cozeba
  chosen_spanish: los hombres de Cozeba
  alternatives_spanish:
  - la gente de Cozeba
  - los varones de Cozeba
  - los hombres de Chezib
  lexicon: HALOT
  rationale: אַנְשֵׁי es plural constructo masculino, por lo que 'los hombres de' preserva la fuerza del hebreo mejor que 'la gente de'. Se mantiene 'Cozeba' para seguir más de cerca la forma hebrea que la variante tradicional 'Chezib'.
- source_word: יוֹאָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Joash
  lexicon: transliteración de nombre propio
  rationale: Nombre propio bíblico adaptado a la forma española común y reconocible.
- source_word: שָׂרָף
  english_pob_choice: Saraph
  chosen_spanish: Saraf
  alternatives_spanish:
  - Saraf
  - Saráf
  lexicon: transliteración de nombre propio
  rationale: En contexto genealógico funciona como nombre propio; se translitera y se adapta la grafía al español sin convertirlo en el sustantivo común 'ardiente' u otros sentidos.
- source_word: אֲשֶׁר בָּעֲלוּ לְמוֹאָב
  english_pob_choice: who ruled in Moab
  chosen_spanish: que dominaron en Moab
  alternatives_spanish:
  - que poseyeron Moab
  - que fueron señores en Moab
  - que se casaron con Moab
  lexicon: HALOT
  rationale: 'El verbo בעל es semánticamente tenso: puede implicar poseer, ejercer dominio o ser señor. ''Dominaron'' comunica una relación de poder más sobria y natural en español, sin cerrar del todo la ambigüedad del hebreo breve.'
- source_word: יָשֻׁבִי לָחֶם
  english_pob_choice: returned to Lehem
  chosen_spanish: regresaron a Lehem
  alternatives_spanish:
  - Jasubi-lehem
  - Jashubi-lehem
  - y volvieron a Betlehem
  lexicon: HALOT
  rationale: Se conserva la lectura verbal que el POB adoptó en el cuerpo principal, pero con verbo español más natural que 'retornaron'. Se mantiene 'Lehem' como en el texto base, dejando abierta la posibilidad de que sea un nombre propio compuesto o una lectura alternativa.
- source_word: וְהַדְּבָרִים עַתִּיקִים
  english_pob_choice: These records are ancient
  chosen_spanish: Estos registros son antiguos
  alternatives_spanish:
  - y las cosas son antiguas
  - y estos asuntos son antiguos
  - y estos hechos son antiguos
  lexicon: HALOT
  rationale: דְּבָרִים puede significar 'palabras', 'asuntos' o 'cosas', pero en este contexto genealógico la idea es documental/tradicional. 'Registros' comunica bien el valor de fuente antigua sin alejarse del hebreo.
theological_decisions:
- issue: Ambigüedad del verbo בעל en 'que dominaron en Moab'
  english_pob_reading: who ruled in Moab
  chosen_spanish_reading: que dominaron en Moab
  alternative_spanish_readings:
  - que poseyeron Moab
  - que fueron señores en Moab
  - que se casaron con Moab
  rationale: 'No se elimina la tensión lexical del hebreo: בעל puede sugerir posesión, señorío o incluso alianza matrimonial. La redacción española conserva una opción de poder sin resolver artificialmente la oscuridad del texto.'
  doctrine_reference: Lexical ambiguity in Hebrew narrative/genealogical text; no doctrinal claim
- issue: Interpretación de דְּבָרִים עַתִּיקִים como fuente antigua
  english_pob_reading: These records are ancient
  chosen_spanish_reading: Estos registros son antiguos
  alternative_spanish_readings:
  - y las cosas son antiguas
  - y estos asuntos son antiguos
  - y estos hechos son antiguos
  rationale: La línea final funciona como nota de antigüedad textual o tradicional, no como afirmación teológica. 'Registros' hace explícito el carácter documental que el inglés POB ya interpretó a partir del hebreo.
  doctrine_reference: Textual/genealogical note; no doctrinal claim
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del expediente inglés, que marca la traducción como sin cambios necesarios. La versión española conserva las mismas tres zonas de tensión del texto: el verbo בעל en Moab, la forma difícil יָשֻׁבִי לָחֶם, y el cierre sobre la antigüedad de los datos.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero aquí no aparece el tetragrámaton.
  - Se prefieren transliteraciones de nombres propios; 'Joás' se adapta a la ortografía española usual.
  - Se conserva la ambigüedad textual mediante notas, sin armonizar el pasaje con una lectura más tradicional que no está apoyada por el expediente.
  - '''Registros'' se usa en sentido documental, no como traducción mecánica de ''palabras''.'
