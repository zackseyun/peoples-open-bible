translation:
  language: es
  text: Y quemaron con fuego todas sus ciudades en sus moradas[a], y todos sus campamentos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en sus lugares de morada» o «en sus asentamientos».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «sus aldeas» o «sus recintos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵיהֶם
  english_pob_choice: their cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus pueblos
  - sus villas
  lexicon: HALOT
  rationale: עִיר designa una ciudad o población; en español, «ciudades» conserva el alcance general y el tono geográfico del pasaje sin restringir indebidamente el término.
- source_word: בְּמוֹשְׁבֹתָם
  english_pob_choice: in their dwelling places
  chosen_spanish: en sus moradas
  alternatives_spanish:
  - en sus lugares de morada
  - en sus asentamientos
  lexicon: HALOT
  rationale: La construcción locativa expresa el ámbito de habitación. «Moradas» mantiene la referencia a lugares donde residían, con un español natural y suficientemente cercano al hebreo.
- source_word: טִירֹתָם
  english_pob_choice: their encampments
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus campamentos
  - sus campamentos fortificados
  lexicon: HALOT
  rationale: טִירָה puede referirse a un campamento, recinto o asentamiento. Aquí, por contraste con «ciudades», «aldeas» comunica bien una forma de poblamiento más pequeña sin volverla idéntica a la primera categoría; se conserva la alternativa de «campamentos» en la nota.
- source_word: שָׂרְפוּ בָּאֵשׁ
  english_pob_choice: burned with fire
  chosen_spanish: quemaron con fuego
  alternatives_spanish:
  - las incendiaron
  - las quemaron en fuego
  lexicon: HALOT
  rationale: El verbo שׂרף indica quemar; la expresión instrumental con בָּאֵשׁ se reproduce naturalmente como «con fuego», que preserva el sentido y la fuerza idiomática del hebreo.
- source_word: וְאֵת ... וְאֵת
  english_pob_choice: all ... and all
  chosen_spanish: todas ... y todas
  alternatives_spanish:
  - ambas ... y ambas
  - todas ... y asimismo todas
  lexicon: Hebrew discourse structure
  rationale: La duplicación enfatiza totalidad coordinada. «Todas ... y todas» conserva la repetición del hebreo sin suavizarla.
theological_decisions:
- issue: Amplitud de los términos de asentamiento
  english_pob_reading: The Hebrew distinguishes cities and encampments, preserving two kinds of habitation.
  chosen_spanish_reading: El español distingue entre «ciudades» y «aldeas», manteniendo dos categorías de asentamiento.
  alternative_spanish_readings:
  - «ciudades» y «campamentos»
  - «ciudades» y «poblados»
  rationale: No hay carga doctrinal directa, pero sí una decisión de equivalencia léxica importante. Se conserva la distinción del hebreo entre un término urbano y otro de asentamiento distinto, evitando borrar la tensión de dos tipos de habitáculo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la estructura hebrea y la auditoría inglesa: mantiene la repetición de dos totalidades, vierte בְּמוֹשְׁבֹתָם con una expresión locativa natural y conserva la distinción entre dos clases de asentamiento. Se evitó una paráfrasis como «donde vivían» para no perder la forma del original.'
  spanish_consistency_notes:
  - Se prefirió «quemaron con fuego» para reflejar el instrumental hebreo sin sobreinterpretar.
  - «Moradas» funciona como equivalente estilísticamente digno de בְּמוֹשְׁבֹתָם; la nota ofrece alternativas más literales.
  - «Aldeas» se usa aquí como opción de traducción contextual para טִירֹתָם, con nota para «campamentos», que sigue más de cerca la auditoría inglesa.
  - Se mantuvo el paralelismo «todas ... y todas ...» para reproducir la totalidad distributiva del hebreo.
