review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la secuencia y los referentes del hebreo: imposición de la mano, degüello de la víctima ante la tienda de reunión, y acción de los hijos de Aarón con la sangre en torno al altar. Sin embargo, dos decisiones importantes no preservan bien el matiz fuente ni la auditoría POB: וְזָרְקוּ no debe suavizarse como «rociarán», y עַל הַמִּזְבֵּחַ con זרק se expresa mejor como «contra el altar» que «sobre el altar». Además, la nota actual se desvía del punto léxico principal documentado en inglés, que era el verbo de lanzar la sangre, no לִפְנֵי.'
  spanish_quality_summary: El español es claro y culto, pero «la sacrificará» suena menos preciso para שָׁחַט que una opción como «la degollará» o «la inmolará»; aun así, el problema principal es «rociarán su sangre sobre el altar», que transmite una aspersión suave y contradice la justificación léxica auditada. También conviene eliminar la coma antes de «alrededor» para mayor fluidez.
  glossary_alignment: No hay conflictos con términos de proyecto como Yahvé/Mesías. «Tienda de reunión» y «los hijos de Aarón» están bien alineados. La principal desalineación terminológica es traducir זרק por «rociar» en vez de una forma que conserve la fuerza ritual de arrojar/lanzar la sangre contra el altar.
  issues:
  - severity: high
    issue: «rociarán» para וְזָרְקוּ suaviza indebidamente el verbo ritual
    rationale: La auditoría inglesa documenta explícitamente que זרק denota lanzar/arrojar la sangre con fuerza ritual, no una aspersión suave. «Rociar» acerca el sentido a «sprinkle», precisamente rechazado en el expediente.
  - severity: high
    issue: «sobre el altar» no refleja bien עַל הַמִּזְבֵּחַ en combinación con זרק
    rationale: En este contexto sacrificial, la sangre se arroja contra el altar/alrededor de sus lados; «sobre» puede sugerir mera ubicación encima y debilita el gesto físico indicado por el hebreo y la auditoría POB.
  - severity: medium
    issue: La nota [a] está anclada a «tienda de reunión», pero la nota auditada corresponde al verbo de la sangre
    rationale: El inglés preserva alternativas léxicas para זרק (‘shall splash/dash’), no para לִפְנֵי. La nota española actual desplaza indebidamente el foco textual.
  - severity: low
    issue: «la sacrificará» es menos técnico-específico que otras opciones posibles para שָׁחַט
    rationale: Aunque aceptable en contexto cultual, «sacrificar» puede sonar más amplio que el acto concreto de degollar/inmolar la víctima. No es el problema principal, pero una mejora menor aumenta precisión.
  revised_spanish_text: Él pondrá su mano sobre la cabeza de su ofrenda y la degollará delante de la tienda de reunión; y los hijos de Aarón arrojarán[a] su sangre contra el altar alrededor.
