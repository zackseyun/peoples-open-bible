translation:
  language: es
  text: Entonces David habló a Yahvé las palabras de este cántico[a], el día en que Yahvé lo libró de la mano de todos sus enemigos y de la mano de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las palabras de este cántico»; la formulación introduce explícitamente la composición como un cántico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: El verbo hebreo דבר normalmente significa ‘hablar/decir’. Aunque el contenido es un cántico, el texto dice que David ‘habló ... las palabras de este cántico’; por eso ‘habló’ conserva el hecho de la enunciación sin convertirlo en ‘cantó’.
- source_word: לַֽיהוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente usa el nombre divino explícito. En el marco del POB en español, el nombre se vierte como ‘Yahvé’, manteniendo la referencia directa al Tetragrámaton en vez de ocultarla con una sustitución reverencial.
- source_word: אֶת דִּבְרֵי הַשִּׁירָה הַזֹּאת
  english_pob_choice: the words of this song
  chosen_spanish: las palabras de este cántico
  alternatives_spanish:
  - este cántico
  - las palabras de este poema
  lexicon: HALOT
  rationale: Se conserva ‘palabras’ para reflejar דִּבְרֵי y ‘cántico’ para transmitir el carácter poético-cantado del texto. ‘Cántico’ funciona en español bíblico con naturalidad y evita reducir el matiz a una simple ‘canción’.
- source_word: בְּיוֹם
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - cuando
  - en el día que
  lexicon: HALOT
  rationale: La expresión temporal introduce la ocasión del cántico. ‘El día en que’ es natural en español y conserva la especificidad temporal del hebreo.
- source_word: הִצִּיל
  english_pob_choice: delivered
  chosen_spanish: libró
  alternatives_spanish:
  - rescató
  - salvó
  - liberó
  lexicon: HALOT
  rationale: En este contexto militar y de amenaza, נצל expresa liberación de peligro o poder hostil. ‘Libró’ comunica bien esa acción de rescate/liberación sin cargar con un sentido exclusivamente soteriológico.
- source_word: מִכַּף
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - del alcance de
  - de la garra de
  lexicon: HALOT
  rationale: La expresión conserva el hebraísmo de ‘mano’ como metáfora de poder o control. ‘De la mano de’ es idiomático en español bíblico y mantiene la imagen corporal del original.
- source_word: כָּל אֹיְבָיו
  english_pob_choice: all his enemies
  chosen_spanish: todos sus enemigos
  alternatives_spanish:
  - cada uno de sus enemigos
  lexicon: HALOT
  rationale: Es una correspondencia directa y natural del colectivo hebreo, preservando la amplitud de la amenaza.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española habitual y transparente.
theological_decisions:
- issue: Nombre divino en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo presenta el Tetragrámaton directamente. La forma ‘Yahvé’ preserva el nombre del pacto en español y evita la sustitución por un título, en consonancia con la política terminológica del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto coincide con el sentido del hebreo masorético y con el audit trail inglés; se mantiene la diferencia entre ‘habló’ y el contenido poético, y se adopta ‘Yahvé’ conforme a la terminología española del proyecto. No se detectan revisiones textuales que alteren esta línea.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה en toda la serie.
  - ‘Cántico’ preserva el registro bíblico y la nota aclara el matiz de ‘palabras’ presente en hebreo.
  - ‘Libró de la mano de’ conserva la metáfora semítica sin sobreexplicarla.
