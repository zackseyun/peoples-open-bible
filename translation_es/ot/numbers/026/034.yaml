translation:
  language: es
  text: Estos son los clanes de Manasés[a], y los inscritos en el censo de ellos fueron cincuenta y dos mil setecientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus inscritos en el censo» o «sus contados». El hebreo usa una fórmula censal derivada de פקד, que se refiere a los que fueron contados o registrados.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Éstas son
  - Estos son
  lexicon: HALOT
  rationale: La fórmula deíctica introductoria en registros censales y genealógicos se expresa de manera natural en español con «Estas son», manteniendo el valor de presentación del hebreo sin forzar un pasado narrativo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: Aunque la POB inglesa opta por «clans» para el contexto tribal, en español «familias» conserva mejor la referencia a subdivisiones de parentesco y evita un anglicismo semántico poco natural; aquí el contexto inmediato de lista censal permite esa equivalencia.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: nombre propio bíblico
  rationale: Se usa la forma bíblica usual en español para el nombre de la tribu, manteniendo reconocimiento e inteligibilidad eclesial.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those numbered of them
  chosen_spanish: los contados de ellas
  alternatives_spanish:
  - los enumerados de ellas
  - los inscritos de ellas
  - los musterados de ellas
  lexicon: HALOT
  rationale: Se conserva el valor censal de פקד con una construcción española comprensible y suficientemente literal. «Contados» evita añadir «hombres» o «miembros» que el hebreo aquí no explicita, y «de ellas» retoma el antecedente plural de «familias».
- source_word: שְׁנַיִם וַחֲמִשִּׁים אֶלֶף וּשְׁבַע מֵאוֹת
  english_pob_choice: fifty-two thousand seven hundred
  chosen_spanish: cincuenta y dos mil setecientos
  alternatives_spanish:
  - dos y cincuenta mil y siete cientos
  lexicon: HALOT
  rationale: Se vierte el total en español idiomático, conservando exactamente la cifra del hebreo y del texto auditado en inglés.
theological_decisions:
- issue: Tratamiento del término censal derivado de פקד
  english_pob_reading: those numbered of them
  chosen_spanish_reading: los contados de ellas
  alternative_spanish_readings:
  - los enumerados de ellas
  - los musterados de ellas
  rationale: 'No hay tensión doctrinal, pero sí una decisión léxica relevante: el hebreo usa la fórmula de censo de פקד. «Los contados» preserva la idea de personas incluidas en el registro sin introducir una interpretación más técnica de ''mustered'' que suena menos natural en español.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés POB revisó «from them» por «of them» para dar una relación más formal y literal con el hebreo. En español se refleja esa relación con «de ellas», manteniendo la referencia interna al grupo de familias y la frase censal sin sobreexplicar.
  spanish_consistency_notes:
  - 'Se mantiene el nombre bíblico en forma española estándar: Manasés.'
  - La elección de «familias» responde al contexto tribal de Números y evita una traducción demasiado marcial o técnica.
  - El plural femenino en «de ellas» concuerda con «familias», no con el tribu como entidad abstracta.
