translation:
  language: es
  text: Quien se apiada del pobre presta a Yahvé[a], y él le pagará por su acción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y su retribución le pagará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְוֵה
  english_pob_choice: lends
  chosen_spanish: presta
  alternatives_spanish:
  - da prestado
  - hace un préstamo a
  lexicon: HALOT
  rationale: El participio causativo de לוה expresa la acción de prestar o hacer un préstamo. «Presta» conserva la metáfora económica del proverbio sin volverlo más explicativo de lo que el hebreo permite.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton, en línea con la política del proyecto, en vez de sustituirlo por un título.
- source_word: חֹנֵן
  english_pob_choice: is gracious to
  chosen_spanish: es generoso con
  alternatives_spanish:
  - muestra favor a
  - es compasivo con
  lexicon: HALOT
  rationale: El participio de חנן expresa favor/gracia. En español, «es generoso con» comunica bien el gesto benévolo hacia el necesitado y mantiene una resonancia de gracia sin sonar forzado.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el débil
  lexicon: HALOT
  rationale: דָּל suele referirse al pobre o abatido. «El pobre» es la equivalencia más natural y directa en este contexto sapiencial.
- source_word: וּגְמֻלוֹ
  english_pob_choice: his deed
  chosen_spanish: su obra
  alternatives_spanish:
  - su retribución
  - su hecho
  - su recompensa
  lexicon: HALOT
  rationale: גְּמוּל puede abarcar retribución, acto o resultado merecido. Tras «le pagará», «su obra» conserva la referencia singular y la relación con la acción del benefactor, sin imponer una interpretación demasiado explicativa.
- source_word: יְשַׁלֶּם
  english_pob_choice: will repay
  chosen_spanish: le pagará
  alternatives_spanish:
  - le retribuirá
  - le recompensará
  lexicon: HALOT
  rationale: El piel de שלם significa pagar, retribuir o recompensar. «Le pagará» es natural en español y mantiene el campo semántico del préstamo.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere al que actúa con generosidad hacia el pobre. En español, el dativo «le» expresa con claridad la relación verbal sin sobrecargar el verso.
theological_decisions:
- issue: Relación metafórica entre la misericordia hacia el pobre y Yahvé
  english_pob_reading: El proverbio afirma que mostrar gracia al pobre equivale a prestar a Yahvé, y que Yahvé mismo repaga al benefactor.
  chosen_spanish_reading: El proverbio afirma que quien trata con generosidad al pobre queda figuradamente como prestamista de Yahvé, y que Yahvé mismo le pagará.
  alternative_spanish_readings:
  - Dios simplemente bendice la generosidad sin la metáfora del préstamo
  - Yahvé recibe la acción como un servicio al pobre, sin identificación metafórica
  rationale: Se conserva la metáfora del préstamo, porque el hebreo la presenta de forma explícita y ella intensifica el valor teológico del acto de misericordia sin diluirlo en una generalidad moral.
  doctrine_reference: Preservar la imagen original y su tensión teológica; no suavizar la identificación implícita entre la compasión al pobre y el trato con Yahvé.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto principal, en la frase «presta a Yahvé[a]», para que la alternativa léxica quede asociada al punto exacto de decisión. La redacción también mantiene el paralelo préstamo/pago del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la política del proyecto para el tetragrámaton.
  - Se evitó «SEÑOR» como sustituto, por requerir el nombre divino explícito en este verso.
  - «Le pagará» conserva el registro económico del proverbio y funciona bien con «presta».
  - «Su obra» refleja el sustantivo singular de גְּמוּל sin volver el final innecesariamente abstracto.
