translation:
  language: es
  text: Si yo llamara y él me respondiera[a], no creería que estuviera escuchando mi voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si yo gritara y él me respondiera, no creería que hubiera prestado oído a mi voz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aunque
  - Cuando
  lexicon: HALOT
  rationale: Introduce una condición hipotética, igual que el inglés POB; en español, «si» conserva mejor esa apertura condicional que «cuando», que sonaría temporal.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: yo llamara
  alternatives_spanish:
  - yo gritara
  - yo invocara
  lexicon: HALOT
  rationale: «Llamara» mantiene el valor amplio de קרא sin intensificarlo innecesariamente; el subjuntivo encaja con la construcción hipotética introducida por «si».
- source_word: וַיַּעֲנֵנִי
  english_pob_choice: and he answered me
  chosen_spanish: él me respondiera
  alternatives_spanish:
  - él me contestara
  - él me diera respuesta
  lexicon: HALOT
  rationale: ענה en este contexto significa responder a una apelación. «Responder» es más neutral y cercano al inglés POB; el subjuntivo sigue la hipoteticidad del versículo.
- source_word: לֹא אַאֲמִין
  english_pob_choice: I would not believe
  chosen_spanish: no creería
  alternatives_spanish:
  - no podría creer
  - no lo creería
  lexicon: HALOT
  rationale: El imperfecto aquí expresa consecuencia hipotética; «creería» transmite esa modalidad en español sin volverlo una afirmación presente o absoluta.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que Job no creería; «que» refleja la sintaxis completiva, no una causa.
- source_word: יַאֲזִין
  english_pob_choice: was listening
  chosen_spanish: estuviera escuchando
  alternatives_spanish:
  - prestara oído
  - oyera atentamente
  lexicon: HALOT
  rationale: אזן implica escuchar con atención, no solo oír. «Estuviera escuchando» conserva la idea de atención continua y la concordancia con la cláusula subordinada hipotética.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi clamor
  - mi sonido
  lexicon: HALOT
  rationale: «Mi voz» es la correspondencia directa de קוֹל y evita interpretar el término como «clamor», que añadiría intensidad no explícita en la forma léxica.
theological_decisions:
- issue: Tensión teológica sobre oír la oración
  english_pob_reading: Job expresa su propia incredulidad hipotética ante una respuesta divina, sin convertirla en una negación doctrinal de que Dios oiga.
  chosen_spanish_reading: El español preserva la incredulidad subjetiva e hipotética de Job, sin afirmar que Dios no escucha en absoluto.
  alternative_spanish_readings:
  - No creería que Dios me escuchara nunca
  - No creería que me escuchara
  rationale: El hebreo y el inglés POB presentan una situación hipotética de asombro/incredulidad, no una tesis general sobre la imposibilidad de la escucha divina. La traducción mantiene esa tensión sin resolverla.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de cerrarla.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada del POB en inglés y conserva su modalidad hipotética. No se aplicaron revisiones recientes; la redacción española se ajusta directamente al hebreo y al valor sintáctico confirmado por la nota inglesa.
  spanish_consistency_notes:
  - Se mantuvo «voz» para קוֹל, evitando términos interpretativos como «clamor».
  - Se usó «escuchando» para reflejar el matiz de atención de יַאֲזִין.
  - Se prefirió la subordinación con subjuntivo en español para reproducir la hipoteticidad del hebreo y del POB inglés.
  - La nota al pie conserva la alternativa de «gritar/prestar oído» porque el original admite ese rango léxico sin exigirla en el texto principal.
