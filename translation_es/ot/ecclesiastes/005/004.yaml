review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente el sentido general del hebreo: es preferible no hacer un voto que hacerlo y no cumplirlo. Sin embargo, la segunda cláusula cambia innecesariamente de una forma verbal finita paralela a un infinitivo («que hacer voto»), lo que debilita el paralelismo de לֹא תִדֹּר // מִשֶׁתִּדּוֹר. También conviene ajustar la nota al español natural.'
  spanish_quality_summary: «Mejor es que no hagas voto» es comprensible, pero «Es mejor» suena más natural en español contemporáneo. La frase «que hacer voto y no cumplirlo» resulta menos idiomática y menos equilibrada que «que hagas un voto y no lo cumplas». Además, en español normal se prefiere «hacer un voto» o «hacer votos»; sin artículo aquí suena algo duro.
  glossary_alignment: No hay términos del glosario principal en conflicto. «Voto» preserva bien נדר. «Cumplirlo» representa adecuadamente el sentido contextual de תְשַׁלֵּם, con nota que conserva la alternativa literal «pagar».
  issues:
  - severity: medium
    issue: La segunda cláusula usa infinitivo («que hacer voto») en lugar de una forma verbal paralela.
    rationale: El hebreo repite un imperfecto 2ms en ambos miembros comparados. En español, «que hagas un voto» preserva mejor el paralelismo y la claridad proverbial.
  - severity: low
    issue: «Mejor es» y «hagas voto» suenan algo rígidos.
    rationale: No son incorrectos, pero «Es mejor» y «hagas un voto» son más naturales y ampliamente legibles en español eclesial contemporáneo sin perder dignidad.
  - severity: low
    issue: La nota al pie comienza con comilla y dos puntos de forma poco natural en español.
    rationale: 'Conviene pulir la redacción: «O, más literalmente, “y no pagarlo”...».'
  revised_spanish_text: Es mejor que no hagas un voto, que hagas un voto y no lo cumplas[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «y no pagarlo». Aquí «pagar» se refiere a pagar o cumplir un voto.
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para reflejar mejor el paralelismo verbal del hebreo, mejorar la naturalidad del español y conservar la alternativa léxica documentada en la nota.
