translation:
  language: es
  text: Moisés salió a recibir a su suegro, se inclinó y lo besó. Entonces cada uno preguntó al otro por su bienestar[a], y entraron en la tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno preguntó al otro por su paz». El modismo hebreo literalmente habla de preguntar «por paz» y se refiere al bienestar de la persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: a recibir
  alternatives_spanish:
  - a encontrarse con
  - a salir al encuentro de
  lexicon: HALOT
  rationale: En este contexto narrativo de acogida a un pariente que llega, el valor idiomático no es un encuentro casual, sino una salida para recibirlo. «A recibir» comunica bien la acción en español natural.
- source_word: חֹתְנוֹ
  english_pob_choice: his father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su pariente por matrimonio
  lexicon: HALOT
  rationale: El término se refiere específicamente al suegro de Moisés, y el contexto inmediato identifica a Jetró. «Suegro» es el equivalente directo y claro en español.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - rindió homenaje
  lexicon: HALOT
  rationale: El verbo puede implicar postración o acto de honor. Aquí el objeto es humano y va en una secuencia de saludo; «se inclinó» preserva el gesto de respeto sin sugerir adoración.
- source_word: וַיִּשַּׁק לוֹ
  english_pob_choice: and kissed him
  chosen_spanish: y lo besó
  alternatives_spanish:
  - y le dio un beso
  lexicon: HALOT
  rationale: El verbo describe el beso de saludo habitual. «Lo besó» es una traducción directa y natural en español.
- source_word: וַיִּשְׁאֲלוּ אִישׁ לְרֵעֵהוּ לְשָׁלוֹם
  english_pob_choice: Then each asked the other about his welfare
  chosen_spanish: Entonces cada uno preguntó al otro por su bienestar
  alternatives_spanish:
  - Entonces cada uno preguntó al otro por su paz
  - Entonces cada uno inquirió por el bienestar del otro
  lexicon: HALOT
  rationale: La expresión hebrea significa preguntar por la paz o el bienestar de alguien. «Bienestar» conserva el sentido idiomático de שָׁלוֹם; «por su bienestar» mantiene el paralelismo con «cada uno... al otro».
- source_word: הָאֹהֱלָה
  english_pob_choice: the tent
  chosen_spanish: la tienda
  alternatives_spanish:
  - el tienda
  lexicon: HALOT
  rationale: El movimiento direccional indica entrada en la tienda. En español bíblico actual, «tienda» es la forma más natural y precisa para el hebreo אָהֶל.
theological_decisions:
- issue: Sentido de la inclinación de Moisés ante Jetró
  english_pob_reading: gesture of social honor and respect, not worship
  chosen_spanish_reading: gesto de honor y respeto social, no de adoración
  alternative_spanish_readings:
  - adoración
  - postración religiosa
  rationale: El texto presenta a un ser humano como objeto del gesto y lo integra en un saludo familiar. La traducción evita cargar el verbo con un valor cultual que el contexto no exige.
  doctrine_reference: Conservar la tensión semántica del verbo hebreo sin importar una lectura doctrinal no explicitada por el pasaje.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se prefirió una formulación formal y natural para לְשָׁלוֹם, manteniendo el sentido de preguntar por el bienestar.'
  spanish_consistency_notes:
  - Se usó «Moisés» y no una forma abreviada o arcaica, en coherencia con el registro bíblico moderno y claro.
  - «Suegro» preserva la relación de parentesco específica que el contexto identifica.
  - «Tienda» se eligió como equivalente bíblicamente inteligible para הָאֹהֱלָה, sin añadir «su» porque el hebreo no lo explicita.
  - No se introdujeron notas al pie porque la traducción no necesitó marcar una alternativa textual en el cuerpo del versículo.
