translation:
  language: es
  text: 'Y Jesús le respondió[a]: «Está escrito: “Adorarás al Señor tu Dios[b], y servirás solo a él”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Te postrarás ante el Señor tu Dios».'
    reason: lexical_alternative
  - marker: b
    text: La cita evoca Deuteronomio 6:13.
    reason: cross_reference
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: le respondió
  alternatives_spanish:
  - respondió
  - contestó
  lexicon: BDAG
  rationale: El participio aoristo introduce la respuesta de Jesús; en español, «le respondió» conserva de manera natural la relación de respuesta sin forzar una estructura participial.
- source_word: Γέγραπται
  english_pob_choice: It is written
  chosen_spanish: Está escrito
  alternatives_spanish:
  - Se ha escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva funciona como cita bíblica con autoridad vigente. «Está escrito» es la equivalencia natural y establecida en español para esa fórmula.
- source_word: Κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En esta cita deuteronómica, κύριος conserva peso escritural y de pacto. En español, «Señor» comunica ese valor con fidelidad y sin introducir una glosa explicativa que el texto no da.
- source_word: θεόν σου
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  lexicon: BDAG
  rationale: La frase expresa relación posesiva y de pacto; «tu Dios» reproduce de forma directa y reverente el sentido del griego.
- source_word: προσκυνήσεις
  english_pob_choice: you shall worship
  chosen_spanish: adorarás
  alternatives_spanish:
  - te postrarás ante
  - rendirás culto a
  lexicon: BDAG
  rationale: En este contexto de exclusividad devocional, προσκυνέω implica acto de adoración. «Adorarás» comunica mejor la fuerza religiosa central que una versión solo física como «postrarte».
- source_word: λατρεύσεις
  english_pob_choice: you shall serve
  chosen_spanish: servirás
  alternatives_spanish:
  - rendirás servicio sagrado
  - darás culto
  lexicon: BDAG
  rationale: λατρεύω designa servicio prestado a una deidad. «Servirás» es la forma más natural en español y mantiene el sentido cultual en el contexto de adoración exclusiva.
- source_word: μόνῳ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: BDAG
  rationale: El adverbio/adjetivo expresa exclusividad. Colocado junto a «a él», en español natural queda bien como «solo a él», preservando el énfasis sobre la exclusividad del destinatario.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: a él
  alternatives_spanish:
  - a él solo
  - a él únicamente
  lexicon: BDAG
  rationale: El pronombre dativo remite a Dios en la cita y, con μόνῳ, refuerza la exclusividad. «A él» mantiene claridad y fluidez; el adverbio «solo» lleva el peso de la exclusión.
theological_decisions:
- issue: κύριος en una cita de Deuteronomio referida a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  - Yahvé
  rationale: Aunque el trasfondo hebreo del pasaje de Deuteronomio apunta al nombre divino, el texto griego citado usa κύριον. En el cuerpo del NT en español, «Señor» preserva la lectura del griego y la continuidad escritural, sin trasladar directamente el nombre hebreo donde el source packet no lo da.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; YHWH → Yahvé in Hebrew contexts'
- issue: Distinción entre προσκυνέω y λατρεύω en un contexto de exclusividad
  english_pob_reading: worship / serve only him
  chosen_spanish_reading: adorarás / servirás solo a él
  alternative_spanish_readings:
  - te postrarás / servirás solo a él
  - rendirás culto / prestarás servicio solo a él
  rationale: 'La cita conserva dos verbos distintos: uno de adoración y otro de servicio cultual. En español conviene mantener esa distinción sin volverla redundante. «Adorarás» y «servirás solo a él» reproducen bien la doble exigencia de exclusividad.'
  doctrine_reference: Deuteronomio 6:13 como trasfondo citado; distinción semántica entre adoración y servicio cultual
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el orden de palabras para reflejar con mayor precisión que 'only' modifica a 'him'. En español, esto queda bien resuelto con «servirás solo a él», manteniendo la exclusividad en el pronombre sin perder naturalidad.
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος conforme al uso del NT en español del proyecto, evitando importar «Yahvé» en una cita griega salvo evidencia textual directa.
  - Se mantiene la distinción entre «adorar» y «servir» para reflejar los dos verbos griegos προσκυνέω y λατρεύω.
  - El orden «solo a él» preserva el énfasis de exclusividad correspondiente al ajuste de la revisión inglesa.
  - La fórmula bíblica «Está escrito» conserva el tono citacional y la autoridad permanente del perfecto griego.
