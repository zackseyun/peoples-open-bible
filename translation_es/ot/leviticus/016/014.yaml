- from: Tomará un poco de la sangre del toro y la rociará con su dedo sobre la parte frontal de la cubierta de expiación[a], hacia el oriente; y delante de la cubierta de expiación rociará un poco de la sangre con su dedo siete veces.
  to: Tomará un poco de la sangre del toro y la rociará con su dedo sobre el frente de la cubierta de expiación[a], hacia el oriente; y delante de la cubierta de expiación rociará de la sangre con su dedo siete veces.
  rationale: Se corrige la nota al pie para que preserve una alternativa léxica real para כַּפֹּרֶת, en vez de repetir el texto principal. Además, se suaviza 'parte frontal' a 'frente' para mayor naturalidad en español, y se simplifica la segunda mención partitiva de la sangre sin alterar el sentido ritual del hebreo.
