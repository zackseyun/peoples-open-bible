translation:
  language: es
  text: 'Al sexto día, el líder de los hijos de Gad[a] fue Eliasaf, hijo de Deuel[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Gad»; es decir, la tribu o los descendientes de Gad. Algunas versiones españolas lo expresan más idiomáticamente como «gaditas».'
    reason: lexical_alternative
  - marker: b
    text: El nombre está escrito aquí «Deuel» en el texto hebreo; compárese con pasajes donde aparece como «Reuel».
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם
  english_pob_choice: On ... day
  chosen_spanish: Al ... día
  alternatives_spanish:
  - En el ... día
  - En ... día
  lexicon: HALOT
  rationale: La construcción temporal con ב + יוֹם en esta fórmula narrativa se expresa de manera natural en español con «al ... día», manteniendo el valor temporal sin forzar un calco.
- source_word: הַשִּׁשִּׁי
  english_pob_choice: the sixth
  chosen_spanish: sexto
  alternatives_spanish:
  - el sexto
  lexicon: HALOT
  rationale: Es un ordinal que modifica «día»; en español la forma «al sexto día» es idiomática y conserva la referencia ordinal exacta.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En Números 7 el término designa al jefe reconocido de la tribu. «Líder» comunica esa función sin introducir matices monárquicos o eclesiásticos no presentes en el hebreo.
- source_word: לִבְנֵי גָד
  english_pob_choice: of the sons of Gad
  chosen_spanish: de los hijos de Gad
  alternatives_spanish:
  - de los gaditas
  - para los hijos de Gad
  lexicon: HALOT
  rationale: La construcción hebrea preserva el idioma tribal/familiar; «hijos de Gad» refleja con transparencia la relación genitiva y mantiene el paralelo con el texto fuente.
- source_word: אֶלְיָסָף
  english_pob_choice: Eliasaph
  chosen_spanish: Eliasaf
  alternatives_spanish:
  - Eliásaf
  lexicon: Transliteración estándar del nombre propio
  rationale: Se translitera el nombre propio al español de forma regular y legible. «Eliasaf» conserva la forma del hebreo sin añadir vocales o acentos no requeridos por la fuente.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  - descendiente de
  lexicon: HALOT
  rationale: La construcción patronímica hebrea se vierte con la equivalencia directa y natural «hijo de».
- source_word: דְּעוּאֵל
  english_pob_choice: Deuel
  chosen_spanish: Deuel
  alternatives_spanish:
  - Reuel
  lexicon: Transliteración del nombre propio
  rationale: La forma consonántica masorética de este versículo apoya «Deuel». Se conserva la posibilidad de la variante tradicional en la nota correspondiente, como hace el POB en inglés.
translation_notes:
  revision_awareness: Coincide con la lectura hebrea masorética y con la auditoría inglesa de la POB; no se registraron revisiones aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se conserva el orden informativo del hebreo: marco temporal, cargo, grupo tribal y nombre/patronímico.'
  - No se introduce terminología eclesiástica ni explicativa ajena al versículo, aparte de las notas necesarias sobre la expresión tribal y la variante onomástica.
