base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/011/003.yaml
  text: So all the elders of Israel came to the king at Hebron[a], and David made a covenant with them at Hebron before Yahweh. Then they anointed David king over Israel, according to the word of Yahweh by Samuel.
  footnotes:
