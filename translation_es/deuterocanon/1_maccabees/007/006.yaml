  glossary_alignment: 'No hay términos del glosario maestro en disputa aquí. Las decisiones léxicas clave están bien alineadas con el proyecto: «pueblo», «ante el rey», «amigos» con nota alternativa «aliados». La nota preserva adecuadamente el matiz político de φίλοι en contexto cortesano.'
