  yaml_path: translation/ot/judges/014/016.yaml
  text: Then Samson’s wife wept before him and said[a], “You only hate me; you do not love me. You have posed the riddle to the sons of my people, but you have not told me.” And he said to her, “Look, I have not told my father or my mother, so should I tell you?”
  footnotes:
