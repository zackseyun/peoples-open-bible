revisions:
- from: La mujer callada[a] es un regalo de Yahvé, y no hay equivalente para un alma disciplinada.
  to: La esposa callada es un don de Yahvé, y no hay equivalente para un alma disciplinada[a].
  rationale: Se cambia «mujer» por «esposa» para ajustarse al contexto matrimonial de Sirácida 26 y a la decisión contextual ya documentada en el English POB. Se sustituye «regalo» por «don» por mejor registro sapiencial en español. Se elimina la nota sobre γυνή porque en este contexto la ambigüedad no conviene preservarla en el texto principal, y se añade la nota léxica necesaria para πεπαιδευμένης ψυχῆς, conforme al rastro de auditoría en inglés.
