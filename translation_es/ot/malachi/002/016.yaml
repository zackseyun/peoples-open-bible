translation:
  language: es
  text: Porque odia el divorcio[a], dice Yahvé, el Dios de Israel, y también odia al que cubre su vestidura con violencia, dice Yahvé de los ejércitos. Así que guárdense en su espíritu[b], y no obren deslealmente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lectura tradicional: «Porque yo odio el divorcio», dice Yahvé, el Dios de Israel. El hebreo aquí es difícil y puede entenderse de más de una manera.'
    reason: alternative_reading
  - marker: b
    text: 'O: «no actúen deslealmente» / «no sean infieles». El hebreo habla de obrar con falta de fidelidad en una relación de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del reproche anterior; en español, "Porque" mantiene el valor causal/argumentativo sin sonar forzado.
- source_word: שָׂנֵא
  english_pob_choice: he hates
  chosen_spanish: odia
  alternatives_spanish:
  - aborrece
  - detesta
  lexicon: HALOT
  rationale: La forma hebrea es tercera persona masculina singular, no primera persona. "Odia" refleja ese sujeto implícito y evita importar la lectura tradicional "yo odio".
- source_word: שַׁלַּח
  english_pob_choice: divorce
  chosen_spanish: el divorcio
  alternatives_spanish:
  - el repudio
  - la separación
  - el acto de despedir
  lexicon: HALOT
  rationale: En este contexto matrimonial, el verbo refiere al envío de una esposa fuera del hogar; "el divorcio" comunica con claridad la acción sin perder el trasfondo de repudio.
- source_word: יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the LORD, the God of Israel
  chosen_spanish: Yahvé, el Dios de Israel
  alternatives_spanish:
  - Yahvé, Dios de Israel
  - el SEÑOR, el Dios de Israel
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir YHWH como "Yahvé" en el texto principal, manteniendo el título explicativo "el Dios de Israel".
- source_word: וְכִסָּה חָמָס עַל לְבוּשׁוֹ
  english_pob_choice: and the one who covers his garment with violence
  chosen_spanish: y al que cubre su vestidura con violencia
  alternatives_spanish:
  - y al que cubre su manto con violencia
  - y al que cubre su ropa con violencia
  lexicon: HALOT
  rationale: La imagen es compacta y ambigua; se conserva el paralelismo literal y la metáfora de la vestidura, usando "vestidura" para un registro más digno y bíblico en español.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - injusticia
  - agravio
  - daño
  lexicon: HALOT
  rationale: '"Violencia" reproduce el peso moral fuerte del término y conserva la severidad de la acusación.'
- source_word: לְבוּשׁוֹ
  english_pob_choice: his garment
  chosen_spanish: su vestidura
  alternatives_spanish:
  - su ropa
  - su manto
  lexicon: HALOT
  rationale: '"Vestidura" es suficientemente literal y suena más natural y reverente en español bíblico que "prenda" o una construcción demasiado coloquial.'
- source_word: יְהוָה צְבָא֑וֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  - Yahvé de los Armados
  lexicon: HALOT
  rationale: Se conserva el título divino con un equivalente transparente en español. "Ejércitos" refleja el valor tradicional del hebreo צְבָאוֹת y mantiene la solemnidad del apelativo.
- source_word: וְנִשְׁמַרְתֶּם בְּרוּחֲכֶם
  english_pob_choice: So guard yourselves in your spirit
  chosen_spanish: Así que guárdense en su espíritu
  alternatives_spanish:
  - Cuídense en su espíritu
  - Estén atentos a su espíritu
  - Vigílense en su espíritu
  lexicon: HALOT
  rationale: La forma tiene fuerza reflexiva y exhortativa; "guárdense" recoge la idea de vigilancia personal. "En su espíritu" mantiene el foco interior sin convertirlo en una paráfrasis psicológica.
- source_word: רוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - ánimo
  - interior
  - corazón
  lexicon: HALOT
  rationale: El hebreo apunta al ámbito interior de la persona; "espíritu" conserva mejor el término bíblico y su amplitud semántica.
- source_word: וְלֹא תִבְגֹּדוּ
  english_pob_choice: and do not act faithlessly
  chosen_spanish: y no actúen con traición
  alternatives_spanish:
  - y no sean infieles
  - y no obren traidoramente
  - y no sean desleales
  lexicon: HALOT
  rationale: בגד expresa quebranto de fidelidad relacional y de pacto. "Actúen con traición" mantiene la fuerza ética y relacional del verbo, aunque en español no reproduzca por completo la categoría covenantal en una sola palabra.
theological_decisions:
- issue: 'Lectura principal de שָׂנֵא / שַׁלַּח: forma difícil del hebreo frente a la lectura tradicional "Yo odio el divorcio"'
  english_pob_reading: Retain the MT-based sense 'he hates divorce' in the main text, with the traditional first-person reading preserved in a footnote.
  chosen_spanish_reading: Mantener en el texto principal "odia el divorcio" y preservar la lectura tradicional en nota.
  alternative_spanish_readings:
  - Porque yo odio el divorcio, dice Yahvé, el Dios de Israel
  - Porque aborrezco el divorcio, dice Yahvé, el Dios de Israel
  rationale: La forma verbal hebrea es tercera persona singular masculina; por eso el texto principal no debe cambiarla a primera persona. A la vez, la nota preserva la lectura tradicional ampliamente conocida, porque el pasaje es sintácticamente difícil y la tradición de traducción ha seguido otra posibilidad.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: יְהוָה → Yahvé'
- issue: Relación entre el mandato final y el campo semántico de בגד
  english_pob_reading: '''and do not act faithlessly'''
  chosen_spanish_reading: '"y no actúen con traición" como equivalencia principal, con alternativas más explícitas en nota implícita de decisión léxica.'
  alternative_spanish_readings:
  - y no sean infieles
  - y no obren con deslealtad
  - y no se comporten traidoramente
  rationale: El verbo hebreo no se limita a una transgresión genérica; apunta a deslealtad en relación de pacto, especialmente en el marco matrimonial. "Traición" comunica la gravedad moral en español actual, mientras que las alternativas recuerdan el matiz de infidelidad o deslealtad.
  doctrine_reference: Translation philosophy §3
- issue: Tratamiento del título divino יְהוָה צְבָאוֹת
  english_pob_reading: the LORD of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos
  rationale: El proyecto pide no enmascarar YHWH; por eso se usa "Yahvé". "De los Ejércitos" preserva el valor titular de צְבָאוֹת y resulta plenamente inteligible para una lectura eclesial amplia.
  doctrine_reference: Project terminology defaults; Translation philosophy §2
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pase más reciente; el estado final indica que el texto quedó sin cambios respecto del último borrador auditado, aunque la revisión cruzada señaló issues mayores para este versículo. Por ello, la versión española mantiene la ambigüedad difícil del hebreo en el cuerpo principal y conserva la lectura tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יְהוָה, conforme al criterio del proyecto.
  - Se usa "Ejércitos" para צְבָאוֹת, evitando el ocultamiento litúrgico de la identidad divina.
  - '"Espíritu" traduce רוּחַ en sentido interior/moral, no como viento.'
  - El verbo final se vierte con un matiz de deslealtad/traición para preservar בגד sin suavizarlo demasiado.
  - La nota a conserva la lectura tradicional del pasaje sin desplazar el texto principal basado en el hebreo masorético.
