translation:
  language: es
  text: Envíen a uno de ustedes[a], y que él traiga a su hermano; mientras ustedes quedan bajo custodia[b], para que sus palabras sean probadas, [c]a ver si la verdad está con ustedes. Pero si no, por la vida de Faraón[d], ciertamente ustedes son espías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «y que él tome a su hermano». El verbo hebreo suele significar «tomar», pero aquí se refiere a ir a buscar al hermano y traerlo de regreso.'
    reason: lexical_alternative
  - marker: b
    text: O «sean encarcelados» o «permanezcan bajo guardia». El verbo hebreo puede denotar estar atados o retenidos bajo custodia.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «a ver si la verdad está con ustedes», es decir, si están diciendo la verdad.'
    reason: lexical_alternative
  - marker: d
    text: Fórmula de juramento que invoca la vida de Faraón.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁלְחוּ
  english_pob_choice: Send
  chosen_spanish: Envíen
  alternatives_spanish:
  - Manden
  - Despachen
  lexicon: HALOT
  rationale: Es un imperativo plural directo. «Envíen» conserva el carácter de orden y resulta natural en español actual sin perder formalidad.
- source_word: מִכֶּם אֶחָד
  english_pob_choice: one of you
  chosen_spanish: a uno de ustedes
  alternatives_spanish:
  - uno de ustedes
  - uno entre ustedes
  lexicon: HALOT
  rationale: La preposición מן con numeral señala selección dentro del grupo; «a uno de ustedes» comunica bien esa idea en español y se integra con el verbo de envío.
- source_word: וְיִקַּח אֶת אֲחִיכֶם
  english_pob_choice: and let him bring your brother
  chosen_spanish: y que él traiga a su hermano
  alternatives_spanish:
  - y que él lleve a su hermano
  - y que él tome a su hermano
  lexicon: HALOT
  rationale: Aunque לקח significa literalmente «tomar», en este contexto el inglés POB opta por «bring» porque la acción es ir a buscar al hermano y traerlo de vuelta. «Traiga» reproduce mejor esa dirección en español.
- source_word: וְאַתֶּם הֵאָסְרוּ
  english_pob_choice: while you remain confined
  chosen_spanish: ustedes queden bajo custodia
  alternatives_spanish:
  - ustedes permanezcan confinados
  - ustedes sean encarcelados
  - ustedes queden presos
  lexicon: HALOT
  rationale: El pasivo niphal de אסר puede implicar estar atado o retenido. «Bajo custodia» preserva el sentido de detención sin forzar una especificación más dura que el hebreo no exige.
- source_word: וְיִבָּחֲנוּ דִּבְרֵי/כֶם
  english_pob_choice: so that your words may be tested
  chosen_spanish: para que sus palabras sean probadas
  alternatives_spanish:
  - para que sus palabras sean examinadas
  - para que se pruebe lo que dicen
  lexicon: HALOT
  rationale: בחן en niphal expresa ser probado o examinado. «Sus palabras» mantiene la imagen hebrea; «probadas» respeta la fórmula y su posible tono judicial.
- source_word: הַֽ/אֱמֶת אִתְּ/כֶם
  english_pob_choice: whether the truth is with you
  chosen_spanish: a ver si la verdad está con ustedes
  alternatives_spanish:
  - si la verdad está con ustedes
  - si ustedes dicen la verdad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la verdad [está] con ustedes». La traducción conserva esa imagen, y «a ver si» hace natural en español la relación de prueba o verificación. Se mantiene la tensión entre la formulación idiomática y su sentido comunicativo.
- source_word: וְאִם לֹא
  english_pob_choice: But if not
  chosen_spanish: Y si no
  alternatives_spanish:
  - Pero si no
  - De lo contrario
  lexicon: HALOT
  rationale: Introduce el contraste inmediato. «Y si no» es breve y fiel; el contexto y la exclamación siguiente ya aportan la fuerza adversativa.
- source_word: חֵי פַרְעֹה
  english_pob_choice: as Pharaoh lives
  chosen_spanish: ¡por la vida de Faraón!
  alternatives_spanish:
  - ¡vive Faraón!
  - ¡tan cierto como que Faraón vive!
  lexicon: HALOT
  rationale: Es una fórmula de juramento. «Por la vida de Faraón» conserva la estructura idiomática y la solemnidad del juramento mejor que una paráfrasis.
- source_word: כִּי מְרַגְּלִים אַתֶּם
  english_pob_choice: surely you are spies
  chosen_spanish: ¡ciertamente ustedes son espías!
  alternatives_spanish:
  - ¡sin duda ustedes son espías!
  - ¡ustedes son espías!
  lexicon: HALOT
  rationale: כִּי aquí refuerza la acusación con fuerza asseverativa. «Ciertamente» reproduce ese énfasis; «espías» es el equivalente directo de מרגלים.
theological_decisions:
- issue: Formulación del juramento con referencia a Faraón
  english_pob_reading: '"As Pharaoh lives" is an oath formula invoking Pharaoh''s life.'
  chosen_spanish_reading: «¡por la vida de Faraón!» como juramento formulado de manera idiomática.
  alternative_spanish_readings:
  - «¡vive Faraón!»
  - «¡tan cierto como que Faraón vive!»
  rationale: 'No hay una cuestión doctrinal especial, pero sí una decisión cultural y retórica: la expresión funciona como juramento egipcio. En español, «por la vida de Faraón» conserva el valor formal del juramento sin domesticarlo.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente solo añadió una coma para aclarar la sintaxis tras «tested»; no cambió el sentido. La versión española refleja esa misma relación sintáctica con «para que sus palabras sean probadas, a ver si la verdad está con ustedes».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí no ocurre.
  - Se usa «espías» para מרגלים de manera directa y consistente con el valor lexical.
  - Se evita «SEÑOR» como sustituto no aplicable en este versículo.
  - «Bajo custodia» intenta conservar el matiz de detención sin sobrerinterpretar como prisión definitiva.
