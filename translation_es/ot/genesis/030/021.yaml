lexical_decisions:
- source_word: וְ/אַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Después de esto
  - Más tarde
  lexicon: HALOT
  rationale: El adverbio marca continuidad temporal narrativa. «Después» comunica con naturalidad la secuencia sin añadir énfasis innecesario.
- source_word: יָלְדָה
  english_pob_choice: she bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - tuvo
  lexicon: HALOT
  rationale: El qal perfecto femenino expresa el acto de dar a luz; en español «dio a luz» es claro, digno y fiel al hecho narrativo.
- source_word: בַּת
  english_pob_choice: a daughter
  chosen_spanish: una hija
  alternatives_spanish:
  - una niña
  - una hija mujer
  lexicon: HALOT
  rationale: El sustantivo común se refiere a una descendiente femenina. «Hija» es el equivalente más natural y exacto en español.
- source_word: וַ/תִּקְרָא
  english_pob_choice: and called
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - y llamó
  - y nombró
  lexicon: HALOT
  rationale: La secuencia hebrea usa el modismo «llamar nombre a». En español, «le puso por nombre» preserva el sentido idiomático y evita ambigüedad de sujeto u objeto.
- source_word: אֶת שְׁמָהּ
  english_pob_choice: her name
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - su nombre
  - su nombre era
  lexicon: HALOT
  rationale: El hebreo literal «su nombre» forma parte del modismo de nombrar; en español queda mejor integrado dentro de la expresión verbal elegida.
- source_word: דִּינָה
  english_pob_choice: Dinah
  chosen_spanish: Dina
  alternatives_spanish:
  - Diná
  lexicon: HALOT
  rationale: Nombre propio hebreo transcrito al uso español bíblico común. «Dina» conserva la forma breve y reconocible sin introducir una grafía innecesaria.
translation_notes:
  revision_awareness: 'Coincide con el sentido del hebreo y con la línea auditada del inglés POB: una secuencia temporal simple, nacimiento de una hija y acto de nombrarla. No se documentan tensiones léxicas o textuales adicionales en este versículo breve.'
  spanish_consistency_notes:
  - Se mantuvo un español bíblico moderno y transparente, evitando una calca como «después ella dio a luz una hija y llamó su nombre Dina».
  - El modismo hebreo de nombrar se resolvió con una construcción natural en español que preserva el acto de imponer nombre.
  - La transliteración del nombre propio se adaptó al uso corriente en español (Dina).
