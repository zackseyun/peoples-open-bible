    text: 'Hebreo: «de Yahvé»; es decir, intentan ocultar sus planes de él.'
    reason: lexical_alternative
  - marker: b
    text: 'Otra posible lectura: «los que cavan hondo para ocultar un plan de Yahvé».'
    reason: alternative_reading
  revision_rationale: Se corrige una pequeña sobretraducción ('su consejo' > 'consejo'), se reubica la nota alternativa al segmento que realmente comenta, y se ajusta 'se adentran' a 'profundizan' para reflejar mejor la imagen hebrea sin perder naturalidad en español.
