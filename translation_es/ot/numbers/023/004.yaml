base_translation:
  language: en
  yaml_path: translation/ot/numbers/023/004.yaml
  text: And God met Balaam[a], and he said to him, “I have arranged the seven altars and offered a bull and a ram on each altar.”
  footnotes:
  - marker: a
    text: Or 'God encountered Balaam'; the Hebrew verb can denote an encounter and in some contexts carries a nuance of happening upon.
    reason: lexical_alternative
