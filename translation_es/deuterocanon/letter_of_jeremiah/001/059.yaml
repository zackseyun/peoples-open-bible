translation:
  language: es
  text: Porque el sol, la luna y las estrellas, siendo brillantes y enviadas para servir[a], obedecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para servicio» o «para usos necesarios»; la frase griega puede indicar utilidad al satisfacer necesidades o al cumplir funciones asignadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥλιος
  english_pob_choice: sun
  chosen_spanish: sol
  alternatives_spanish:
  - astro solar
  lexicon: LSJ
  rationale: Término normal y directo para el astro, sin necesidad de variación contextual.
- source_word: σελήνη
  english_pob_choice: moon
  chosen_spanish: luna
  alternatives_spanish:
  - satélite lunar
  lexicon: LSJ
  rationale: Equivalente estándar y natural en español para el cuerpo celeste.
- source_word: ἄστρα
  english_pob_choice: stars
  chosen_spanish: estrellas
  alternatives_spanish:
  - astros
  lexicon: LSJ
  rationale: Plural común y claro para los cuerpos celestes del tríada.
- source_word: ὄντα λαμπρά
  english_pob_choice: being bright
  chosen_spanish: que son brillantes
  alternatives_spanish:
  - siendo brillantes
  - resplandecientes
  lexicon: LSJ
  rationale: Mantiene el valor descriptivo del participio con el adjetivo, en un español natural y fiel a la construcción predicativa.
- source_word: ἀποστελλόμενα
  english_pob_choice: sent out
  chosen_spanish: son enviadas
  alternatives_spanish:
  - son mandadas
  - son despachadas
  lexicon: LSJ
  rationale: Conserva la idea de ser enviadas/comisionadas; 'enviadas' funciona bien en español y evita una paraphrasis excesiva.
- source_word: ἐπὶ χρείας
  english_pob_choice: for service
  chosen_spanish: para servicio
  alternatives_spanish:
  - para necesidades
  - para usos necesarios
  - para su función
  lexicon: LSJ
  rationale: La POB inglesa prefirió 'service' sobre 'needs' por la fuerza funcional del giro. En español, 'para servicio' mantiene esa ambigüedad entre utilidad y función asignada sin explicarla de más.
- source_word: εὐήκοά
  english_pob_choice: obedient
  chosen_spanish: obedecen
  alternatives_spanish:
  - son obedientes
  - son dóciles
  lexicon: LSJ
  rationale: El adjetivo expresa obediencia/disposición a oír. En contexto, el verbo español transmite con claridad la cualidad de respuesta a la orden divina implícita.
theological_decisions:
- issue: Autoridad implícita detrás de la obediencia de los cuerpos celestes
  english_pob_reading: The verse presents the sun, moon, and stars as created entities carrying out assigned functions and obeying implicitly divine ordering.
  chosen_spanish_reading: El verso presenta al sol, la luna y las estrellas como criaturas que cumplen una función asignada y obedecen un orden implícitamente divino.
  alternative_spanish_readings:
  - una mera regularidad natural
  - simple funcionamiento cósmico
  rationale: El griego une 'enviadas' y 'obedientes', lo que sugiere más que rutina natural. La traducción conserva esa tensión sin introducir explícitamente 'Dios' donde el texto no lo nombra.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma interpretativa
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'for service' frente a 'for needs'. La versión española sigue esa decisión con 'para servicio', pero mantiene en nota la alternativa semántica de utilidad/necesidad que sigue presente en χρεία.
  spanish_consistency_notes:
  - Se usa 'obedecen' para reflejar la fuerza verbal de εὐήκοα en contexto, en lugar de suavizarlo a una mera cualidad estática.
  - '''Enviadas'' conserva la imagen de comisión/mandato del participio pasivo ἀποστελλόμενα.'
  - No se añade el nombre de Dios, pero la obediencia queda teológicamente orientada a un orden superior implícito.
