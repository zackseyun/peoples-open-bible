translation:
  language: es
  text: Si una persona peca, y oye la voz de un juramento[a], y es testigo, ya sea que haya visto o sepa, si no lo declara, entonces llevará su culpa.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «la voz de una adjuración», es decir, un llamamiento solemne bajo juramento que exige testimonio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «llevará su iniquidad». El modismo hebreo significa que sigue siendo responsable por la culpa de retener su testimonio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - un alma
  - alguien
  lexicon: HALOT
  rationale: En este contexto legal, נֶפֶשׁ designa a un individuo, no al alma en sentido metafísico. "Una persona" conserva el valor jurídico y suena natural en español moderno.
- source_word: תֶחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - comete un pecado
  - se hace culpable
  lexicon: HALOT
  rationale: El verbo expresa una falta culpable; "peca" es breve y mantiene la fuerza moral/legal del hebreo sin sobrejuridizarlo.
- source_word: וְשָׁמְעָה קוֹל אָלָה
  english_pob_choice: he hears the voice of an oath
  chosen_spanish: oye la voz de un juramento
  alternatives_spanish:
  - oye la voz de un voto solemne
  - oye la voz de una adjuración pública
  - oye la voz de una imprecación
  lexicon: HALOT
  rationale: Conservo la literalidad de "voz de un juramento" porque el inglés POB revisado se acercó al hebreo. "Juramento" es comprensible en español y mantiene la relación idiomática con קוֹל אָלָה sin expandirla interpretativamente.
- source_word: וְהוּא עֵד
  english_pob_choice: and he is a witness
  chosen_spanish: y él es testigo
  alternatives_spanish:
  - y es testigo
  - y él mismo es testigo
  lexicon: HALOT
  rationale: '"Testigo" reproduce bien la función legal del término; mantengo el pronombre explícito para reflejar la estructura del hebreo y la referencia singular del POB en inglés.'
- source_word: אוֹ רָאָה אוֹ יָדָע
  english_pob_choice: whether he has seen or known
  chosen_spanish: ya sea que haya visto o sabido
  alternatives_spanish:
  - ya sea que haya visto o conocido
  - si lo vio o lo supo
  lexicon: HALOT
  rationale: La pareja hebrea cubre haber visto o tener conocimiento del hecho. "Haya visto o sabido" sigue de cerca la revisión inglesa y conserva el paralelismo sin añadir interpretación.
- source_word: אִם לֹא יַגִּיד
  english_pob_choice: if he does not report it
  chosen_spanish: si no lo denuncia
  alternatives_spanish:
  - si no lo declara
  - si no lo informa
  - si no lo testifica
  lexicon: HALOT
  rationale: En el marco legal, יגיד es hacer saber o declarar formalmente. "Denuncia" comunica bien la obligación de comunicar el hecho, aunque puede sonar algo más fuerte; lo prefiero por claridad jurídica en español, sin salir del campo semántico de reportar/declarar.
- source_word: וְנָשָׂא עֲוֺנוֹ
  english_pob_choice: then he shall bear his guilt
  chosen_spanish: entonces llevará su culpa
  alternatives_spanish:
  - entonces llevará su iniquidad
  - entonces cargará con su culpa
  - entonces sufrirá las consecuencias de su culpa
  lexicon: HALOT
  rationale: '"Llevará su culpa" preserva el idiomático נָשָׂא עָוֹן y mantiene la responsabilidad legal del sujeto. Es la opción más transparente y fiel al valor covenantal del hebreo.'
theological_decisions:
- issue: Referencia de género en la casuística legal
  english_pob_reading: Use singular 'a person' with subsequent masculine 'he'
  chosen_spanish_reading: Usar singular femenino gramatical inicial "una persona" y continuar con masculino singular de referencia "él"
  alternative_spanish_readings:
  - usar formas impersonales a lo largo de toda la cláusula
  - usar plural genérico "si unas personas pecan..."
  rationale: El hebreo inicia con נֶפֶשׁ, sustantivo común en singular, y continúa con verbos/pronombres singulares masculinos como forma representativa. En español, "una persona" es natural para el inicio; luego se mantiene la referencia singular con "él" para respetar la concordancia de la tradición del texto fuente y la práctica del POB en inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de אָלָה en contexto legal
  english_pob_reading: voice of an oath
  chosen_spanish_reading: voz de un juramento
  alternative_spanish_readings:
  - voz de una adjuración
  - voz de un juramento solemne
  - voz de una imprecación
  rationale: אָלָה puede implicar juramento, adjuración o maldición solemne. Dado el contexto de testimonio legal y la revisión inglesa hacia una forma más literal, "juramento" es la opción española más clara y suficientemente amplia, sin borrar la tensión lexical del hebreo.
  doctrine_reference: HALOT; contexto legal de Levítico 5:1
translation_notes:
  revision_awareness: 'La revisión inglesa reciente volvió de una paráfrasis interpretativa a una forma más literal: de ''because he hears a public adjuration'' a ''and hears the voice of an oath'', y simplificó la cláusula de conocimiento a ''whether he has seen or known''. La redacción española sigue esa mayor literalidad, pero evita un calco duro mediante ''oye la voz de un juramento'' y ''ya sea que haya visto o sabido''.'
  spanish_consistency_notes:
  - 'Se conservó la secuencia condicional y casuística del hebreo: ''Si..., y..., y..., ya sea..., si no..., entonces...'''
  - Se evitó 'SEÑOR' o vocabulario litúrgico no presente; el pasaje no contiene el Tetragrámaton ni un título divino.
  - '''Culpa'' se eligió para reflejar el idiomático ''bear his guilt'' sin convertirlo en mera penalidad abstracta.'
  - El pronombre 'él' sigue la referencia singular masculina del hebreo, aunque el inicio sea 'una persona'.
