revisions:
- from: 'Entonces el hombre, el amo de la casa, salió a ellos y les dijo: «No, hermanos míos, por favor no hagan algo malo. Ya que este hombre ha entrado en mi casa, no hagan esta cosa vergonzosa».'
  to: 'Entonces el hombre, el amo de la casa, salió a su encuentro y les dijo: «No, hermanos míos, por favor no obren mal. Ya que este hombre ha entrado en mi casa, no hagan esta infamia[a]».'
  rationale: 'Se ajustó el texto para reflejar mejor el sentido del hebreo y la auditoría inglesa: «salió a su encuentro» reemplaza un calco poco natural; «no obren mal» conserva mejor la fuerza moral de תָּרֵעוּ; y «esta infamia[a]» comunica con más precisión la carga de הַנְּבָלָה הַזֹּאת, preservando alternativas léxicas en nota como hace el POB inglés.'
