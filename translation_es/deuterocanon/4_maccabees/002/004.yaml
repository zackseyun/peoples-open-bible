    issue: «pasión por el placer» debilita la alineación con ἡδυπάθεια
    rationale: ἡδυπάθεια aquí apunta a amor del placer / búsqueda autoindulgente del placer, no primariamente a «pasión» en sentido emocional. La auditoría inglesa revisada optó por «pleasure-seeking» precisamente para preservar ese matiz.
  - severity: medium
    issue: La imagen de οἰστρηλασία queda parcialmente reducida con «aguijón» unido a una construcción menos precisa
    rationale: «Aguijón» puede funcionar, pero al combinarse con «pasión por el placer» la metáfora resulta menos clara que en una formulación como «la incitación de la búsqueda del placer» o «el aguijón de la búsqueda del placer», donde se conserva mejor la idea de acicate o impulso incitador.
  revised_spanish_text: Y la razón se ve que prevalece no solo sobre la incitación de la búsqueda del placer[a], sino también sobre todo deseo.
  revised_footnotes:
  - marker: a
    text: O «el aguijón de la autoindulgencia» o «la incitación frenética de la búsqueda del placer». La expresión griega es inusualmente comprimida y metafórica.
    reason: lexical_alternative
