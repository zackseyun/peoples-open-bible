translation:
  language: es
  text: 'Y te alegrarás por todo el bien que Yahvé tu Dios te ha dado a ti y a tu hogar: tú, el levita y el residente extranjero[a] que está en medio de ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el extranjero residente». El hebreo גֵּר designa a un no israelita que vive entre Israel bajo su protección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂמַחְתָּ
  english_pob_choice: And you shall rejoice
  chosen_spanish: Y te alegrarás
  alternatives_spanish:
  - Y te regocijarás
  - Y gozarás
  lexicon: HALOT
  rationale: El hebreo expresa una exhortación/instrucción con valor futuro-volitivo; en español, 'te alegrarás' comunica bien el matiz festivo y de gozo covenantal sin sonar artificial. 'Regocijarás' sería más elevado, pero menos natural.
- source_word: בְכָל הַטּוֹב
  english_pob_choice: in all the good
  chosen_spanish: por todo el bien
  alternatives_spanish:
  - en todo el bien
  - a causa de todo el bien
  lexicon: HALOT
  rationale: La construcción hebrea abarca la totalidad de la bendición recibida. 'Por todo el bien' mantiene una relación causal/motivacional natural en español y conserva la amplitud del original sin añadir 'cosas'.
- source_word: אֲשֶׁר נָתַן לְךָ
  english_pob_choice: that ... has given to you
  chosen_spanish: que te ha dado a ti
  alternatives_spanish:
  - que te dio
  - que te ha concedido
  lexicon: HALOT
  rationale: El perfecto español expresa una dádiva ya realizada con efecto presente, como en el contexto litúrgico. Se retiene el complemento 'a ti' para transparencia del dativo hebreo y énfasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé'', preservando el nombre divino revelado y evitando la sustitución por título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios propio
  lexicon: HALOT
  rationale: Es la fórmula de pacto estándar y en español se expresa de forma directa y natural como 'tu Dios'.
- source_word: וּלְבֵיתֶךָ
  english_pob_choice: and to your household
  chosen_spanish: y a tu casa
  alternatives_spanish:
  - y a tu hogar
  - y a tu familia
  lexicon: HALOT
  rationale: En español 'casa' puede abarcar la unidad doméstica/familiar y conserva mejor la concisión del hebreo. 'Familia' explicita más, pero pierde el valor social de la casa como unidad doméstica.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - vos
  lexicon: HALOT
  rationale: 'Se conserva el pronombre explícito para reflejar el énfasis del hebreo y mantener la enumeración: ''tú, y el levita...''.'
- source_word: הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el leví
  - el sacerdote levita
  lexicon: HALOT
  rationale: '''Levita'' es el equivalente preciso y estándar para el miembro de la tribu de Leví en este contexto.'
- source_word: הַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el residente extranjero
  - el extranjero que vive entre ustedes
  lexicon: HALOT
  rationale: El término גֵּר denota un no israelita residente protegido dentro de Israel. 'Forastero' es más natural en español bíblico moderno que 'stranger' y evita la posible ambigüedad de un visitante temporal.
- source_word: אֲשֶׁר בְּקִרְבֶּךָ
  english_pob_choice: who is among you
  chosen_spanish: que está en medio de ti
  alternatives_spanish:
  - que está entre ustedes
  - que está en tu interior
  lexicon: HALOT
  rationale: '''En medio de ti'' reproduce de manera bastante directa el hebreo בקרבך y sugiere inclusión comunitaria. Se prefiere ''en medio de ti'' sobre un giro más genérico como ''entre ustedes'' por la forma singular del texto.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre propio divino en transliteración española estándar del proyecto. No se sustituye por 'el SEÑOR' para mantener la trazabilidad al Tetragrámaton y la distinción con títulos divinos.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de גֵּר
  english_pob_reading: the sojourner / resident foreigner
  chosen_spanish_reading: el forastero
  alternative_spanish_readings:
  - el residente extranjero
  - el extranjero residente
  rationale: No se entiende como un mero visitante ocasional, sino como una persona no israelita incorporada bajo protección dentro del pueblo. 'Forastero' conserva mejor la tensión entre alteridad y permanencia sin convertir el término en una categoría moderna demasiado técnica.
  doctrine_reference: Lexical note in English POB footnote a
translation_notes:
  revision_awareness: 'El inglés POB se mantiene sin cambios en la revisión más reciente, con acuerdo alto entre revisores. Esta versión española sigue ese mismo perfil estable: conserva ''Yahvé'' para el nombre divino, mantiene el valor comunitario de גֵּר, y reproduce la enumeración enfática (''tú, y el levita, y el forastero'').'
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה, conforme al estándar del proyecto.
  - Se usa 'levita' para הַלֵּוִי y no una paráfrasis funcional.
  - Se evita 'SEÑOR' como sustitución del nombre divino.
  - '''Casa'' se emplea como unidad doméstica, no solo como edificio.'
  - La puntuación con punto y coma preserva la enumeración final y la relación entre el total del gozo y sus participantes.
