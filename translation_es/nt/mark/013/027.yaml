base_translation:
  language: en
  yaml_path: translation/nt/mark/013/027.yaml
  text: And then he will send out the angels and gather the chosen ones from the four winds[c][b][a], from the end of the earth to the end of heaven.
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the elect.'
    reason: lexical_alternative
  - marker: b
    text: '''From the four winds'' is an idiom meaning from every direction.'
    reason: cultural_note
  - marker: c
    text: Some translations render the final phrase more interpretively as 'from the farthest end of the earth to the farthest end of heaven' or 'from one end of heaven to the other.'
    reason: alternative_reading
