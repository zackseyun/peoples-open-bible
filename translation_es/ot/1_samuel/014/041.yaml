translation:
  language: es
  text: 'Entonces Saúl dijo a Yahvé[a], el Dios de Israel: «Da una suerte perfecta». Y Jonatán y Saúl fueron tomados, pero el pueblo quedó libre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Da perfecto/íntegro». El sentido probablemente es la petición de una decisión irreprochable por sorteo; compárese la lectura antigua más larga preservada en la Septuaginta: «¿Por qué no has respondido hoy a tu siervo? Si la culpa está en mí o en Jonatán, mi hijo, oh Yahvé, Dios de Israel, da Urim; pero si está en tu pueblo Israel, da Tumim».'
    reason: textual_variant
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrama, siguiendo la decisión auditada del POB en inglés. En español, «Yahvé» mantiene la transparencia del nombre personal de Dios y evita la sustitución por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelit​as
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción genitiva se mantiene de forma directa y natural en español. «Dios» preserva el referente singular, y «de Israel» conserva la identificación pactual e histórica del original.
- source_word: הָבָה תָמִים
  english_pob_choice: Give a perfect lot
  chosen_spanish: Da una suerte perfecta
  alternatives_spanish:
  - Da un resultado perfecto
  - Concede una decisión íntegra
  - Da una suerte íntegra
  lexicon: HALOT
  rationale: El hebreo es terse y difícil; el contexto de echar suertes permite suplir «suerte» para hacer explícita la idea implícita, como hace el POB en inglés con «lot». «Perfecta» conserva la fuerza de תָמִים como completo, íntegro o sin defecto, sin decidir en exceso entre las posibles matizaciones.
- source_word: וַיִּלָּכֵד
  english_pob_choice: were taken
  chosen_spanish: fueron tomados
  alternatives_spanish:
  - fueron capturados
  - fueron seleccionados
  - fueron señalados
  lexicon: HALOT
  rationale: En el contexto de suertes, el pasivo de לכד puede indicar quedar designado o señalado; «fueron tomados» sigue de cerca el valor idiomático sin imponer una interpretación más específica de la que el texto da.
- source_word: יָצָאוּ
  english_pob_choice: escaped
  chosen_spanish: salió
  alternatives_spanish:
  - escapó
  - quedó libre
  - salieron
  lexicon: HALOT
  rationale: El hebreo literalmente dice «salieron», y el sentido contextual es que el pueblo quedó fuera de la selección por sorteo. Dado que el POB en inglés optó por una equivalencia contextual («escaped») que introduce un matiz interpretativo, en español se preserva la literalidad mínima del verbo y se deja la inferencia al contexto.
theological_decisions:
- issue: Forma breve y difícil del dicho de Saúl sobre la suerte
  english_pob_reading: Use the Masoretic Text main line ('Give a perfect lot') in the translation, while preserving the longer reading reflected in the Septuagint and some modern reconstructions in a footnote.
  chosen_spanish_reading: Seguir la línea breve del Texto Masorético («Da una suerte perfecta») y conservar en nota la lectura más larga reflejada en la Septuaginta.
  alternative_spanish_readings:
  - «Oh Yahvé, Dios de Israel, ¿por qué no has respondido hoy a tu siervo? Si la culpa está en mí o en Jonatán, mi hijo, oh Yahvé, Dios de Israel, da Urim; pero si está en tu pueblo Israel, da Tumim»
  - «Da un juicio perfecto»
  rationale: El hebreo provisto es el de la línea breve y difícil; por transparencia textual conviene traducirlo como está, sin incorporar silenciosamente la expansión antigua. La nota permite recuperar la lectura larga y explicar la probable relación con la selección por suertes o con Urim y Tumim.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se siguió la línea breve del hebreo masorético provisto, manteniendo la transparencia frente a la expansión larga antigua; la principal decisión revisada fue no traducir «y el pueblo escapó», sino conservar el cierre literal «el pueblo salió», para no sobreinterpretar el matiz del hebreo más allá del texto base.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama, conforme al estándar del proyecto.
  - Se prefirió «Dios» para אֱלֹהִים en la frase fija «el Dios de Israel».
  - Se mantuvo «tomados» en pasivo para reflejar el valor idiomático de la suerte sin añadir una explicación en el cuerpo del texto.
  - La nota a cubre la tensión textual entre la línea masorética breve y la expansión septuagintal, preservando ambas sin mezclarlas en el texto principal.
