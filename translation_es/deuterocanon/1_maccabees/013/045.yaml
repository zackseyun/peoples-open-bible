translation:
  language: es
  text: Y los que estaban en la ciudad subieron a la muralla con sus mujeres y sus hijos[a], con sus vestidos rasgados, y gritaron con fuerte voz[b], pidiendo a Simón que les diera una prenda de paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «con sus esposas y sus hijos». El griego literalmente dice «con las mujeres y los hijos», pero el contexto sugiere el sentido relacional de familia.
    reason: lexical_alternative
  - marker: b
    text: Rasgarse los vestidos era una señal habitual de dolor, angustia o súplica urgente.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνέβησαν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - fueron hacia arriba
  lexicon: LSJ
  rationale: El verbo expresa movimiento ascendente; «subieron» es natural en español y conserva el sentido espacial sin arcaísmo.
- source_word: οἱ ἐν τῇ πόλει
  english_pob_choice: those in the city
  chosen_spanish: los que estaban en la ciudad
  alternatives_spanish:
  - los de la ciudad
  - la gente que estaba en la ciudad
  lexicon: LSJ
  rationale: La frase griega es sustantiva y colectiva. En español, «los que estaban en la ciudad» mantiene esa referencia sin añadir una palabra como «gente» que no está explícita.
- source_word: σὺν ταῖς γυναιξὶ καὶ τοῖς τέκνοις
  english_pob_choice: with their wives and children
  chosen_spanish: con sus mujeres y sus hijos
  alternatives_spanish:
  - con sus esposas y sus hijos
  - junto con sus mujeres y sus hijos
  lexicon: LSJ
  rationale: En este contexto de asedio, el poseedor implícito se sobreentiende. «Sus mujeres y sus hijos» refleja bien la relación familiar y suena más natural que repetir una construcción pesada.
- source_word: ἐπὶ τὸ τεῖχος
  english_pob_choice: onto the wall
  chosen_spanish: a la muralla
  alternatives_spanish:
  - sobre la muralla
  - encima de la muralla
  lexicon: LSJ
  rationale: Con ἀνέβησαν, la idea es de ascenso hacia la muralla; en español, «a la muralla» comunica el destino del movimiento con fluidez. «Muralla» es la opción más natural en este contexto fortificado.
- source_word: διερρωχότες τὰ ἱμάτια αὐτῶν
  english_pob_choice: having torn their garments
  chosen_spanish: con sus vestidos rasgados
  alternatives_spanish:
  - habiendo rasgado sus vestidos
  - con la ropa rasgada
  lexicon: LSJ
  rationale: El participio perfecto describe un estado resultante. «Con sus vestidos rasgados» preserva el aspecto de estado y comunica el gesto ritual de duelo o súplica sin sonar forzado.
- source_word: ἐβόησαν φωνῇ μεγάλῃ
  english_pob_choice: they cried out with a loud voice
  chosen_spanish: gritaron con fuerte voz
  alternatives_spanish:
  - clamaron con gran voz
  - alzaron la voz
  lexicon: LSJ
  rationale: La fórmula es enfática. «Gritaron con fuerte voz» conserva la intensidad del griego y mantiene un registro bíblico claro; «fuerte» aquí reproduce la idea de gran intensidad vocal.
- source_word: ἀξιοῦντες
  english_pob_choice: asking
  chosen_spanish: pidiendo
  alternatives_spanish:
  - solicitando
  - rogando
  lexicon: LSJ
  rationale: El participio indica una petición urgente. «Pidiendo» refleja la súplica implícita mejor que «solicitando», que sería demasiado administrativo; «rogando» sería posible, pero introduce una intensidad no explicitada por el verbo.
- source_word: δεξιὰς ... δοῦναι
  english_pob_choice: to give them pledges of peace
  chosen_spanish: que les diera una prenda de paz
  alternatives_spanish:
  - que les diera un compromiso de paz
  - que les diera su mano derecha
  lexicon: LSJ
  rationale: La expresión es idiomática y no debe entenderse literalmente como una mano física. «Prenda de paz» conserva la idea de garantía o pacto de buena fe y evita perder la imagen jurídica/relacional del original.
theological_decisions:
- issue: Sentido idiomático de δεξιὰς ... δοῦναι en un contexto de rendición o pacto
  english_pob_reading: The main English text kept the image of 'his right hand' in an earlier pass but the latest revision moved to 'pledges of peace' to reflect the idiom; the footnote explains the literal Greek wording and the covenantal sense.
  chosen_spanish_reading: «Una prenda de paz» en el texto principal, con nota que aclare el literal griego de «dar las derechas» como gesto de garantía o reconciliación.
  alternative_spanish_readings:
  - darles su mano derecha
  - darles garantías de paz
  - concederles términos de paz
  rationale: La frase no es un problema doctrinal, pero sí interpretativo. En español, una traducción literal de «su mano derecha» resultaría oscura; una expresión como «prenda de paz» comunica la función idiomática sin borrar el trasfondo concreto del griego.
  doctrine_reference: 'Principio POB: primacía del original y preservación de la tensión textual/idiomática con apoyo de nota.'
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada del audit trail en lo referente a δεξιὰς ... δοῦναι: en lugar de una calca literal, adopta una equivalencia idiomática transparente («prenda de paz»), manteniendo el resto de la estructura muy cercana al griego y al flujo del texto auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se conserva «Simón» como nombre propio sin helenizarlo ni latinizarlo más allá de la ortografía española.
  - Se prefirió «muralla» frente a «muro» por el contexto militar de una ciudad fortificada.
  - Se mantuvo un registro sobrio y bíblico, pero con sintaxis natural en español contemporáneo.
