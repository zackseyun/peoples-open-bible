base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/023/016.yaml
  text: Then the three mighty men broke through the camp of the Philistines and drew water from the well of Bethlehem that was by the gate[a], and carried it and brought it to David. But he was not willing to drink it; instead[b], he poured it out to Yahweh.
  footnotes:
  - marker: a
    text: Or 'he poured them out'; the Hebrew uses a plural suffix, likely referring to the water idiomatically as 'waters.'
    reason: lexical_alternative
  - marker: b
    text: That is, he poured it out as an offering to the LORD, with libation-like force.
    reason: cultural_note
