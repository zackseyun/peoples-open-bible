translation:
  language: es
  text: Dad gracias al Señor[a], porque es bueno, porque su misericordia perdura para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su amor constante perdura para siempre». El griego dice «su misericordia es/permanece para siempre», pero la fórmula litúrgica puede abarcar un matiz más amplio de fidelidad de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογεῖσθε
  english_pob_choice: Give thanks
  chosen_spanish: Dad gracias
  alternatives_spanish:
  - Confesad
  - Alabad
  - Dad alabanza
  lexicon: BDAG
  rationale: En este refrán litúrgico, ἐξομολογέομαι expresa acción de agradecimiento y alabanza más que confesión de pecados. «Dad gracias» conserva el valor cultual del mandato y funciona de forma natural en español bíblico.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Yahvé
  - al Señor Dios
  lexicon: BDAG
  rationale: El griego dice κύριος; en español bíblico «Señor» es la correspondencia directa y digna. Aquí no se requiere explicitar Yahvé en el texto principal, porque la forma griega del pasaje es κύριος y el contexto deuterocanónico usa esa designación.
- source_word: χρηστός
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - amable
  - benigno
  lexicon: BDAG
  rationale: En esta fórmula doxológica fija, χρηστός se expresa de modo más natural como «bueno», manteniendo el sentido de bondad benevolente sin cargarlo de una glosa más interpretativa.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: endures forever
  chosen_spanish: perdura para siempre
  alternatives_spanish:
  - permanece para siempre
  - dura para siempre
  - es para siempre
  lexicon: BDAG
  rationale: La frase idiomática griega indica duración indefinida. «Perdura para siempre» reproduce bien ese valor en español formal y evita una construcción demasiado rígida o calcada.
- source_word: τὸ ἔλεος αὐτοῦ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor constante
  - su fidelidad amorosa
  - su amor leal
  lexicon: BDAG
  rationale: ἔλεος se traduce de manera directa como «misericordia». Aunque el refrán puede implicar lealtad pactal, el texto griego no obliga a sustituirlo por una perífrasis; por eso se mantiene el término más transparente.
theological_decisions:
- issue: Alcance pactal de ἔλεος en un refrán litúrgico
  english_pob_reading: his mercy endures forever; note allows 'steadfast love' as broader overtones
  chosen_spanish_reading: su misericordia perdura para siempre
  alternative_spanish_readings:
  - su amor constante perdura para siempre
  - su amor leal perdura para siempre
  - su misericordia es para siempre
  rationale: La lectura principal conserva «misericordia» por fidelidad al griego; no obstante, el refrán litúrgico puede implicar matices de fidelidad pactal. Esa tensión se preserva en la nota, sin reemplazar el sentido básico del término.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió una fórmula más natural para εἰς τὸν αἰῶνα («endures forever»). En español se refleja con «perdura para siempre», manteniendo la misma decisión de naturalidad sin alejarse del valor literal del griego. También se preserva la preferencia de la auditoría por «mercy» frente a una paráfrasis amplia, por lo que el texto principal usa «misericordia» y la alternativa más extensa queda en nota.
  spanish_consistency_notes:
  - Se mantiene el registro litúrgico y solemne, con imperativos plurales («Dad gracias») coherentes con la forma exhortativa del refrán.
  - «Señor» se usa de manera consistente con el tratamiento del griego κύριος en este contexto, sin introducir mayúsculas especiales o sustitutos.
  - «Misericordia» conserva la terminología bíblica usual sin borrar la posible resonancia pactal reconocida en el aparato inglés.
  - La construcción «perdura para siempre» expresa duración continua de forma natural en español y corresponde al valor de εἰς τὸν αἰῶνα.
