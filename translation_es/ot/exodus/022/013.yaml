  text: וְ/כִֽי יִשְׁאַ֥ל אִ֛ישׁ מֵ/עִ֥ם רֵעֵ֖/הוּ וְ/נִשְׁבַּ֣ר אוֹ מֵ֑ת בְּעָלָ֥י/ו אֵין עִמּ֖/וֹ שַׁלֵּ֥ם יְשַׁלֵּֽם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/022/013.yaml
  text: And if a man borrows from his neighbor[a], and it is injured or dies, if its owner is not with it[b], he shall surely make restitution.
  footnotes:
