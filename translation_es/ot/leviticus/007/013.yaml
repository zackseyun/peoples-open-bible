revisions:
- from: Junto con tortas de pan leudado[a], presentará su ofrenda con el sacrificio de sus ofrendas de paz de acción de gracias.
  to: Junto con tortas de pan con levadura, presentará su ofrenda con el sacrificio de sus ofrendas de paz[a] de acción de gracias.
  rationale: Se ajusta חָמֵץ a una expresión más clara y ampliamente natural en español general («con levadura») y se reubica la nota al término técnico שְׁלָמִים, siguiendo el rastro de auditoría del POB inglés y aportando la alternativa léxica realmente útil para el lector.
