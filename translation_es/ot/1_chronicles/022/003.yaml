translation:
  language: es
  text: Y David preparó hierro en abundancia para los clavos de las puertas de los portones y para las uniones[a], y bronce en abundancia, imposible de pesar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La palabra hebrea es amplia: puede referirse a piezas de unión o conexión, y en ciertos contextos a «bisagras». Se prefirió «uniones» por ser más general y menos interpretativa.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no había peso» o «sin peso»; el sentido es que había tanto bronce que no se podía pesar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - metal
  lexicon: HALOT
  rationale: El término denota el material hierro de manera directa. En una lista de materiales de construcción, «hierro» es la equivalencia natural y transparente en español.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - abundantemente
  - en gran cantidad
  lexicon: HALOT
  rationale: La frase expresa gran cantidad de material disponible. «En abundancia» conserva el valor de provisión amplia con registro bíblico claro y natural.
- source_word: לַמִּסְמְרִים
  english_pob_choice: nails
  chosen_spanish: clavos
  alternatives_spanish:
  - puntas
  - espigas
  lexicon: HALOT
  rationale: En un contexto de carpintería y puertas, «clavos» es la equivalencia más directa y comprensible. Mantiene el sentido material sin sobreespecificar.
- source_word: לְדַלְתוֹת הַשְּׁעָרִים
  english_pob_choice: the doors of the gates
  chosen_spanish: las puertas de las puertas de entrada
  alternatives_spanish:
  - las puertas de los portones
  - las hojas de las puertas de entrada
  lexicon: HALOT
  rationale: El hebreo usa una construcción literal de «puertas de los portones». En español, «puertas de entrada» evita la repetición demasiado áspera de «puertas de las puertas» y comunica con claridad la función arquitectónica, aunque la estructura original se conserva mediante la referencia explícita a las puertas.
- source_word: וְלַמְחַבְּרוֹת
  english_pob_choice: fastenings
  chosen_spanish: las uniones
  alternatives_spanish:
  - los sujetadores
  - las bisagras
  - los ensamblajes
  lexicon: HALOT
  rationale: El término hebreo es amplio y puede referirse a piezas de conexión o unión. «Las uniones» preserva esa amplitud mejor que «bisagras», que sería demasiado específico. Se evita imponer un hardware concreto donde el hebreo es general.
- source_word: הֵכִין
  english_pob_choice: prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - dispuso
  - dejó listo
  - proveyó
  lexicon: HALOT
  rationale: El verbo significa preparar o dejar listo. «Preparó» sigue de cerca el valor verbal y encaja con el contexto de reunir materiales para la construcción.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En listas de materiales bíblicos, el término suele designar el metal de aleación usado en construcción y objetos cultuales. «Bronce» es la equivalencia contextual más estándar y precisa.
- source_word: אֵין מִשְׁקָל
  english_pob_choice: without weight
  chosen_spanish: sin peso
  alternatives_spanish:
  - sin ser pesado
  - de tan grande cantidad que no se podía pesar
  - sin poderse pesar
  lexicon: HALOT
  rationale: La expresión idiomática comunica cantidad inconmensurable. «Sin peso» sigue de cerca la formulación del texto fuente y conserva la tensión idiomática; en español puede entenderse como «no se pudo pesar» sin necesidad de explicitarlo en el cuerpo del versículo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la expresión final a «without weight» para reflejar más de cerca el hebreo «no había peso», entendido como cantidad demasiado grande para pesarse. Por eso se tradujo con una forma breve y formal («sin peso») y se aclaró el sentido idiomático en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - 'Se conservó el paralelismo material del hebreo: hierro / bronce, ambos con la misma idea de abundancia.'
  - Se evitó traducir «מְחַבְּרוֹת» como «bisagras» en el texto principal para no cerrar indebidamente una ambigüedad léxica documentada.
