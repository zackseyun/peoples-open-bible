  chosen_reading: Render as 'justice' and 'righteousness' respectively
  alternative_readings:
  - '''judgment'' and ''justice'''
  - '''justice'' for both terms'
  rationale: The verse laments the absence of both social-judicial rectitude and moral rightness. Distinguishing the pair preserves the Hebrew poetic parallelism without collapsing the concepts into one English term.
