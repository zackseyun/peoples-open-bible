review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y la línea de la POB inglesa: mantiene el valor explicativo de כִּי, los dos merismos inclusivos, la condena de la ganancia moralmente torcida y la idea de conducta habitual engañosa. Sin embargo, suaviza ligeramente el matiz distributivo de כֻּלּוֹ al usar «todos» en vez de una forma más individualizante, y en la nota b atribuye «ganancia» al hebreo cuando en realidad la nota inglesa aclara que la expresión completa significa literalmente «es codicioso de ganancia» o «es avaro de ganancia».'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para reflejar mejor la fuerza distributiva y la avidez moral del hebreo. «Cada uno de ellos codicia ganancias injustas» suena más preciso que «todos buscan ganancia injusta». Además, la nota a necesita corregirse gramaticalmente para repetir «de ellos» también con «el mayor», y conviene pulir el estilo de las notas para que no parezcan traducciones mecánicas.
  glossary_alignment: 'No hay términos del glosario principal en conflicto. «Profeta», «sacerdote» y «falsedad» son adecuados. La principal cuestión léxica es בּוֹצֵעַ בָּצַע: el proyecto inglés documenta una avidez por ganancia injusta; en español conviene conservar esa fuerza con «codicia ganancias injustas» o similar, en vez de la formulación algo más neutra «buscan ganancia injusta».'
  issues:
  - severity: medium
    issue: «todos» atenúa el matiz distributivo de כֻּלּוֹ
    rationale: 'El hebreo, aunque colectivo, individualiza: «every one of them». «Cada uno de ellos» lo preserva mejor que «todos», especialmente porque la acusación se repite dos veces.'
  - severity: medium
    issue: «buscan ganancia injusta» suaviza la fuerza de בּוֹצֵעַ בָּצַע
    rationale: La construcción cognada expresa avidez/codicia de lucro con fuerte connotación moral. «Codicia ganancias injustas» o «es codicioso de ganancias injustas» conserva mejor la intensidad que un simple «buscan».
  - severity: low
    issue: La nota a omite la repetición plena del posesivo en español
    rationale: La alternativa inglesa dice «from the least of them to the greatest of them». En español debe ser «desde el menor de ellos hasta el mayor de ellos» para corresponder exactamente.
  - severity: low
    issue: La nota b describe de forma imprecisa la literalidad hebrea
    rationale: No es simplemente que el hebreo diga «ganancia», sino que la expresión hebrea es «codicia ganancia / es avaro de ganancia», y de ahí se infiere lo injusto o deshonesto.
  revised_spanish_text: Porque desde el menor de ellos hasta el mayor[a], cada uno de ellos codicia ganancias injustas; y desde el profeta hasta el sacerdote, cada uno de ellos practica la falsedad[c][b].
