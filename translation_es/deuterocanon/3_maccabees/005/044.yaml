  source_alignment_summary: 'El borrador capta bien el sentido general: alegría intensa, los amigos y parientes, el despliegue de las fuerzas, los lugares más adecuados y la finalidad de guardia. Sin embargo, no preserva con suficiente fidelidad la relación entre ἀναλύσαντες y μετὰ πίστεως según la evidencia fuente y el rastro de auditoría: el texto español convierte «μετὰ πίστεως» en «habiendo recobrado la confianza», desplazando la frase preposicional a un participio de estado recuperado que en griego no está explícito. El inglés auditado también es internamente tenso en este punto, pero la nota mantiene la alternativa léxica; en español conviene conservar más transparentemente «con fe/confianza» y dejar la ambigüedad en nota.'
  spanish_quality_summary: El español es claro y digno, pero «habiendo recobrado la confianza» suena algo interpretativo y pesado. «Colocaban las fuerzas» es entendible, aunque «apostaban» o «disponían» refleja mejor un despliegue de guardia. Una leve revisión mejora naturalidad y transparencia frente al griego.
  glossary_alignment: 'Sin problemas con terminología principal del proyecto. El punto relevante es πίστις: el borrador se aparta del valor base «fe» más de lo que conviene. Debe preservarse en el texto o al menos quedar más visible como «con fe», con nota que admita «con confianza» o «fielmente».'
  issues:
  - severity: high
    issue: «habiendo recobrado la confianza» no corresponde de manera suficientemente directa a μετὰ πίστεως
    rationale: El griego tiene una frase preposicional («con fe/confianza»), no una expresión explícita de confianza recuperada. Esa reformulación sobreinterpreta el texto y desplaza la ambigüedad léxica documentada.
  - severity: medium
    issue: La nota al pie ya explica μετὰ πίστεως, pero el texto principal no conserva el anclaje léxico base
    rationale: Dado el criterio POB de mantener πίστις como «fe» por defecto, el texto español debería reflejarlo más claramente y dejar las otras posibilidades en nota.
  - severity: low
    issue: «colocaban las fuerzas» es menos preciso que una formulación de apostamiento o disposición
    rationale: Aunque no es incorrecto, en contexto de guardia urbana «apostaban/disponían las fuerzas» suena más natural y más cercano a διέτασσον con objeto militar.
  revised_spanish_text: Entonces, los amigos y parientes, llenos de alegría, con fe[a], apostaban las fuerzas en los lugares más adecuados de la ciudad para la guardia.
