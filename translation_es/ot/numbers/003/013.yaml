translation:
  language: es
  text: Porque todo primogénito es mío[a]. El día en que herí de muerte a todo primogénito en la tierra de Egipto, consagré para mí todo primogénito en Israel, desde hombre hasta bestia[b]. Serán míos. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me pertenece», para la frase repetida «es mío / para mí / serán míos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde hombre hasta bestia», expresión fija que significa desde seres humanos hasta animales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación previa con valor causal/explicativo. «Porque» conserva bien esa fuerza y suena natural en español bíblico actual.
- source_word: לִי
  english_pob_choice: is mine / to myself / shall be mine
  chosen_spanish: es mío / para mí / míos serán
  alternatives_spanish:
  - me pertenece / para mí mismo / me pertenecerán
  lexicon: HALOT
  rationale: El hebreo repite la idea de posesión o pertenencia divina. En español conviene mantener esa repetición con tres formulaciones cercanas pero no idénticas, sin perder el énfasis del original.
- source_word: כָּל בְּכוֹר
  english_pob_choice: every firstborn
  chosen_spanish: todo primogénito
  alternatives_spanish:
  - cada primogénito
  - todo el primogénito
  lexicon: HALOT
  rationale: «Primogénito» expresa con precisión בְּכוֹר. «Todo» mantiene el alcance distributivo de כָּל sin añadir «varón» o limitar el término.
- source_word: בְּיוֹם
  english_pob_choice: On the day when
  chosen_spanish: El día en que
  alternatives_spanish:
  - El día cuando
  - Cuando
  lexicon: HALOT
  rationale: La expresión temporal introduce el momento histórico de la acción divina. «El día en que» mantiene el enlace formal sin sonar forzado.
- source_word: הַכֹּתִי
  english_pob_choice: I struck down
  chosen_spanish: herí de muerte
  alternatives_spanish:
  - golpeé
  - castigué
  lexicon: HALOT
  rationale: En el contexto de la plaga de Egipto, el verbo implica una acción letal de juicio. «Herí de muerte» comunica esa fuerza con claridad en español, sin suavizar el sentido.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva la expresión plena del hebreo. «Tierra de Egipto» refleja la solemnidad narrativa y la concreción geográfica del texto.
- source_word: הִקְדַּשְׁתִּי
  english_pob_choice: I consecrated
  chosen_spanish: consagré
  alternatives_spanish:
  - santifiqué
  - aparté como santo
  lexicon: HALOT
  rationale: El hiphil de קדשׁ aquí expresa poner aparte para Dios. «Consagré» comunica bien esa dedicación cultual y la relación de propiedad resultante.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre los israelitas
  lexicon: HALOT
  rationale: La frase identifica el ámbito dentro del cual quedan consagrados los primogénitos. «En Israel» reproduce de forma concisa el hebreo.
- source_word: מֵאָדָם עַד בְּהֵמָה
  english_pob_choice: from man to beast
  chosen_spanish: desde hombre hasta bestia
  alternatives_spanish:
  - desde personas hasta animales
  - de hombre a bestia
  lexicon: HALOT
  rationale: Se conserva el merismo humano-animal. «Hombre» mantiene la forma breve y solemne del hebreo אָדָם en esta expresión fija; «bestia» corresponde al alcance amplio de בְּהֵמָה.
- source_word: יִהְיוּ
  english_pob_choice: They shall be
  chosen_spanish: Míos serán
  alternatives_spanish:
  - serán míos
  - me pertenecerán
  lexicon: HALOT
  rationale: El futuro copulativo expresa una permanencia de pertenencia divina. «Míos serán» conserva el énfasis de la posesión y enlaza con la repetición previa de לִי.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo soy Yahweh
  - Yo soy el Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé». La fórmula final afirma identidad y autoridad divinas con una traducción directa y reverente.'
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Nombre divino directamente. Conforme a la directriz del proyecto, se representa como «Yahvé» en el texto principal, no como una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: El alcance de אָדָם en el merismo «de hombre hasta bestia»
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - humanidad
  - personas
  rationale: En esta expresión fija de contraste humano-animal, «hombre» preserva el paralelismo breve del hebreo y la fuerza del merismo sin introducir una abstracción no presente en el texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam → man / humankind (context); Translation philosophy §4'
translation_notes:
  revision_awareness: La versión revisada de referencia no requirió cambios; el resultado coincide con el control de alta concordancia y mantiene las decisiones léxicas y teológicas auditadas, adaptándolas al español con la terminología proyectada.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la norma del proyecto para יְהוָה.
  - Se conserva la repetición de posesión divina de לִי con tres formulaciones afines para evitar aplanar el énfasis hebreo.
  - «Primogénito» traduce בְּכוֹר sin añadir especificaciones de sexo que el hebreo no expresa aquí.
  - «Hombre hasta bestia» mantiene el merismo y evita diluirlo en una paráfrasis más amplia.
  - El tono general es sobrio y publicable, con sintaxis española natural pero suficientemente cercana al original.
