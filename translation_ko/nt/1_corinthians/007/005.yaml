  text: 서로 박탈하지 마십시오. 다만 합의 하에 한동안 기도에 전념하기 위해 그렇게 한 후에 다시 함께 있으십시오. 이는 여러분의 자제력 부족 때문에 사탄이 여러분을 시험하지 못하게 하려는 것입니다.
  philosophy: optimal-equivalence
