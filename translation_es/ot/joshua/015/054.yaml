translation:
  language: es
  text: 'Humta, Quiriat-arba (es decir, Hebrón)[a] y Zior: nueve ciudades con sus asentamientos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente “Quiriat-arba, ella es Hebrón”, una fórmula de identificación que une el nombre antiguo con el nuevo.
    reason: cross_reference
  - marker: b
    text: O “sus aldeas”. El término hebreo puede referirse a asentamientos menores dependientes de las ciudades mencionadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻמְטָה
  english_pob_choice: Humtah
  chosen_spanish: Humta
  alternatives_spanish:
  - Jumta
  - Humtá
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera en forma breve y natural para el lector español, manteniendo la identificación toponímica sin traducir el nombre.
- source_word: קִרְיַת אַרְבַּע
  english_pob_choice: Kiriath-arba
  chosen_spanish: Quiriat-arba
  alternatives_spanish:
  - Kiriat Arba
  - Ciudad de Arba
  lexicon: HALOT
  rationale: Se conserva el valor de topónimo compuesto. 'Quiriat-arba' respeta la forma tradicional de transliteración en español y evita convertirlo en una frase descriptiva que el texto trata como nombre propio.
- source_word: הִיא חֶבְרוֹן
  english_pob_choice: that is, Hebron
  chosen_spanish: es decir, Hebrón
  alternatives_spanish:
  - esto es, Hebrón
  - o sea, Hebrón
  lexicon: HALOT
  rationale: El hebreo usa un pronombre identificador para equiparar Quiriat-arba con Hebrón. 'Es decir' transmite con naturalidad la función explicativa sin perder la identificación histórica del nombre.
- source_word: צִיעֹר
  english_pob_choice: Zior
  chosen_spanish: Zior
  alternatives_spanish:
  - Zi'or
  - Sior
  lexicon: HALOT
  rationale: Nombre propio de lugar; se mantiene transliterado de manera estable y reconocible.
- source_word: עָרִים
  english_pob_choice: nine cities
  chosen_spanish: nueve ciudades
  alternatives_spanish:
  - nueve pueblos
  - nueve villas
  lexicon: HALOT
  rationale: עָרִים es el plural común de 'ciudad'/'población urbana'. 'Ciudades' conserva la fuerza habitual del listado territorial.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their settlements
  chosen_spanish: sus poblados
  alternatives_spanish:
  - sus aldeas
  - sus asentamientos
  - sus dependencias
  lexicon: HALOT
  rationale: El término puede referirse a asentamientos menores asociados a las ciudades principales. 'Poblados' mantiene la referencia a comunidades dependientes sin forzar una especificación más estrecha que la evidencia no exige.
translation_notes:
  revision_awareness: 'La versión española sigue el acuerdo del control de calidad más reciente: no se requirieron cambios sustanciales y se mantiene la lectura toponímica e identificadora del hebreo, con una nota para la posible equivalencia de חַצְרֵיהֶן.'
  spanish_consistency_notes:
  - Se usa 'Hebrón' con tilde por la ortografía española estándar de nombres bíblicos ampliamente asentados.
  - Se mantiene la secuencia enumerativa breve y sobria del original, con dos notas para las decisiones principales de identificación y de léxico territorial.
  - No se emplea 'SEÑOR' ni terminología teológica ajena al versículo, ya que el texto es un listado geográfico.
