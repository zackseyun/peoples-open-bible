translation:
  language: es
  text: 'Pero Naamán se enojó y se fue, y dijo: «Mira, me dije: “Sin duda, él saldrá hacia mí, se pondrá de pie, invocará el nombre de Yahvé su Dios, agitará su mano sobre esa parte y curará al leproso[a]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sanará al leproso». El hebreo puede expresar la idea de quitar o retirar la afección, pero en este contexto la expectativa es la curación del afectado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְצֹף
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se enfureció
  - se irritó
  lexicon: HALOT
  rationale: El verbo expresa enojo; «se enojó» conserva el cambio de estado en una frase natural y digna en español, sin intensificar indebidamente la reacción.
- source_word: וַיֵּלַךְ
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se marchó
  - se alejó
  lexicon: HALOT
  rationale: En contexto, indica retirada después del enojo. «Se fue» es la forma más natural y comunica el alejamiento de manera directa.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  lexicon: HALOT
  rationale: La partícula introduce discurso enfático. «Mira» preserva esa fuerza apelativa con un español claro y no arcaizante.
- source_word: אָמַרְתִּי אֵלַי
  english_pob_choice: I said to myself
  chosen_spanish: yo me decía
  alternatives_spanish:
  - me dije
  - pensé
  lexicon: HALOT
  rationale: La expresión refleja habla interna. «Yo me decía» mantiene el matiz reflexivo e iterativo/mental sin convertirlo en una mera paráfrasis.
- source_word: יֵצֵא יָצוֹא
  english_pob_choice: Surely he will come out
  chosen_spanish: Sin duda, él saldrá
  alternatives_spanish:
  - Ciertamente saldrá
  - Seguro que saldrá
  lexicon: HALOT
  rationale: La intensificación del infinitivo absoluto se refleja con «Sin duda». «Saldrá» conserva la expectativa de salida hacia el exterior.
- source_word: וְעָמַד
  english_pob_choice: stand
  chosen_spanish: se pondrá de pie
  alternatives_spanish:
  - se quedará de pie
  - se detendrá
  lexicon: HALOT
  rationale: En la secuencia esperada, el verbo apunta a ponerse de pie ante Naamán. «Se pondrá de pie» suena natural y conserva la acción visible.
- source_word: וְקָרָא בְּשֵׁם יְהוָה אֱלֹהָיו
  english_pob_choice: call on the name of Yahweh his God
  chosen_spanish: invocará el nombre de Yahvé su Dios
  alternatives_spanish:
  - clamará al nombre de Yahvé su Dios
  - llamará en el nombre de Yahvé su Dios
  lexicon: HALOT
  rationale: קרא בשם suele expresar invocar. «Invocará el nombre de Yahvé su Dios» mantiene el idiomático bíblico y respeta el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el equivalente español del nombre divino adoptado por el proyecto. No se reemplaza por una máscara litúrgica.
- source_word: וְהֵנִיף יָדוֹ
  english_pob_choice: wave his hand
  chosen_spanish: agitará su mano
  alternatives_spanish:
  - moverá su mano
  - hará pasar su mano
  lexicon: HALOT
  rationale: הניף describe un movimiento de agitación o vaivén. «Agitará su mano» reproduce la imaginería del gesto ritual esperado.
- source_word: אֶל הַמָּקוֹם
  english_pob_choice: over the place
  chosen_spanish: sobre el lugar
  alternatives_spanish:
  - hacia el lugar
  - por encima del lugar
  lexicon: HALOT
  rationale: La preposición y el contexto del gesto de sanidad favorecen una relación espacial de cobertura. «Sobre el lugar» conserva la imagen con español natural.
- source_word: וְאָסַף
  english_pob_choice: heal
  chosen_spanish: curará
  alternatives_spanish:
  - sanará
  - quitará
  lexicon: HALOT
  rationale: Aunque el verbo puede sugerir reunir/quitar, el audit trail muestra que la lectura final en inglés tomó el sentido de sanación del afectado. «Curará» expresa ese resultado sin sobrerreflexionar el mecanismo.
- source_word: הַמְּצֹרָע
  english_pob_choice: the leprous person
  chosen_spanish: al leproso
  alternatives_spanish:
  - al enfermo de lepra
  - al hombre leproso
  lexicon: HALOT
  rationale: El participio sustantivado designa a la persona afectada. «Al leproso» es la forma más concisa y fiel al referente personal en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, el proyecto privilegia «Yahvé» para preservar el nombre del pacto y evitar la sustitución por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of צרע language
  english_pob_reading: the leprous person
  chosen_spanish_reading: el leproso
  alternative_spanish_readings:
  - la lepra
  - el enfermo de lepra
  rationale: El hebreo substantiva la condición/la persona afectada. En español, «el leproso» mantiene el referente personal y evita convertir la frase en un objeto abstracto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El audit trail en inglés mostró una revisión importante en la cláusula final: se pasó de una traducción más mecánica de אָסַף como «remove/gather in» a una lectura final de «heal the leprous person». La versión española sigue esa decisión final, pero conserva el matiz personal de הַמְּצֹרָע como «al leproso» y no como una enfermedad abstracta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa voz narrativa directa y natural en español sin perder la secuencia verbal del hebreo.
  - La cláusula con «al leproso» conserva el referente personal del participio sustantivado.
  - Se evita «SEÑOR» para no ocultar el nombre divino del texto fuente.
