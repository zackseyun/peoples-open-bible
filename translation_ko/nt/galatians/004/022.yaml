id: GAL.4.22
reference: Galatians 4:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: γέγραπται γὰρ ὅτι Ἀβραὰμ δύο υἱοὺς ἔσχεν, ἕνα ἐκ τῆς παιδίσκης καὶ ἕνα ἐκ τῆς ἐλευθέρας·
base_translation:
  language: en
  yaml_path: translation/nt/galatians/004/022.yaml
  text: For it is written that Abraham had two sons[a], one by the slave woman and one by the free woman.
  footnotes:
  - marker: a
    text: 'Or ''one from the servant girl.'' The Greek παιδίσκη can denote a female servant, but here ''slave woman'' makes the slavery/freedom contrast in Paul''s argument explicit.'
    reason: lexical_alternative
translation:
  language: ko
  text: 기록되었듯이, 아브라함에게 두 아들이 있었습니다. 하나는 노예 여자[a]에게서, 하나는 자유로운 여자에게서 났습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 παιδίσκη는 「여종」으로도 옮길 수 있으나, 본문이 노예-자유 대조를 신학적으로 전개하므로 「노예 여자」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδίσκης
  english_pob_choice: the slave woman
  chosen_korean: 노예 여자
  alternatives_korean:
  - 여종
  - 계집종
  lexicon: BDAG
  rationale: 갈 4:21-31의 핵심 대조(노예-자유)를 보존하기 위해 「노예 여자」를 택한다. 한국 전통의 「여종」은 매임의 무게가 약하다.
- source_word: ἐλευθέρας
  english_pob_choice: the free woman
  chosen_korean: 자유로운 여자
  alternatives_korean:
  - 자유인 여자
  lexicon: BDAG
  rationale: 노예-자유 대조의 다른 한 축.
theological_decisions:
- issue: παιδίσκη/ἐλευθέρα 대조를 「노예 여자/자유로운 여자」로 옮김
  chosen_reading: 노예 여자 vs 자유로운 여자
  alternative_readings:
  - 여종 vs 자유 여인
  - 계집종 vs 자유의 몸
  rationale: 갈 4:21-31 하갈 알레고리는 신약의 노예-자유 대조의 핵심 단락이다. 「여종」은 한국어 전통이나 매임의 신학적 무게를 약화시킨다. 글로사리 권고와 북극성 원칙에 따라 「노예 여자/자유로운 여자」를 채택한다.
  doctrine_reference: DOCTRINE.md §1; KOREAN_PIPELINE.md glossary
