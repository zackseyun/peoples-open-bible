translation:
  language: es
  text: 'Y se acercaban los días de la muerte de Matatías, y dijo a sus hijos: «Ahora la arrogancia y el oprobio se han afirmado[a], y es tiempo de destrucción y de ardiente ira[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han quedado establecidas»; el verbo griego puede destacar que la arrogancia y el oprobio han quedado firmemente asentados.
    reason: lexical_alternative
  - marker: b
    text: La frase intensifica la idea de ira con dos términos emparentados; el texto no dice de quién es esa ira.
    reason: theological_note
lexical_decisions:
- source_word: ἤγγισαν
  english_pob_choice: drew near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - llegaron
  lexicon: LSJ
  rationale: Para ἤγγισαν, ‘se acercaron’ conserva la imagen temporal de proximidad y suena natural en español bíblico contemporáneo.
- source_word: αἱ ἡμέραι ... ἀποθανεῖν
  english_pob_choice: the days drew near ... to die
  chosen_spanish: los días para que Matatías muriera
  alternatives_spanish:
  - el tiempo de Matatías para morir
  - los días de la muerte de Matatías
  lexicon: LSJ
  rationale: La construcción griega literalmente expresa ‘los días de morir’. En español se vuelve una cláusula final natural sin perder la referencia al fallecimiento inminente.
- source_word: ὑπερηφανία
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - orgullo
  - insolencia
  lexicon: LSJ
  rationale: ‘Arrogancia’ comunica bien el matiz moral de soberbia altiva y encaja con el registro del pasaje.
- source_word: ἔλεγμος
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - afrenta
  - deshonra
  lexicon: LSJ
  rationale: En este contexto de crisis moral y pública, ‘oprobio’ expresa mejor la carga de deshonra o vergüenza colectiva que un simple acto de reprensión.
- source_word: ἐστηρίχθη
  english_pob_choice: have grown strong
  chosen_spanish: se han afirmado
  alternatives_spanish:
  - se han fortalecido
  - se han arraigado
  - se han consolidado
  lexicon: LSJ
  rationale: La aoristo pasivo de στηρίζω puede significar ‘ser establecido/afirmado’. ‘Se han afirmado’ conserva la idea de quedar firmemente asentadas, sin resolver demasiado hacia ‘fortalecerse’.
- source_word: καιρὸς καταστροφῆς
  english_pob_choice: a time of destruction
  chosen_spanish: tiempo de destrucción
  alternatives_spanish:
  - un tiempo de ruina
  - una temporada de destrucción
  lexicon: LSJ
  rationale: ‘Tiempo de destrucción’ sigue de cerca καταστροφή y mantiene la gravedad del momento señalado por καιρός.
- source_word: ὀργὴ θυμοῦ
  english_pob_choice: burning wrath
  chosen_spanish: ardiente ira
  alternatives_spanish:
  - ira encendida
  - ira abrasadora
  - furiosa ira
  lexicon: LSJ
  rationale: La acumulación de términos de ira se refleja mejor con una expresión intensiva natural en español. ‘Ardiente ira’ conserva el valor enfático sin añadir un sujeto que el griego no nombra.
theological_decisions:
- issue: Sujeto implícito de la ira en ὀργὴ θυμοῦ
  english_pob_reading: The text does not specify whose wrath is meant.
  chosen_spanish_reading: El texto no especifica de quién es la ira.
  alternative_spanish_readings:
  - La ira es de Dios.
  - La ira es humana o persecutoria.
  rationale: Se preserva la ambigüedad del griego, evitando introducir una identificación teológica no explícita en el versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla indebidamente.
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que prefiere ‘destrucción’ para καταστροφή y una formulación intensiva para θυμοῦ, manteniendo la ambigüedad sobre el sujeto de la ira. La redacción española evita calco innecesario pero sigue de cerca el griego y las decisiones inglesas auditadas.
  spanish_consistency_notes:
  - Se usa ‘Matatías’ de forma uniforme para Ματταθίου.
  - Se mantiene el paralelismo nominal ‘arrogancia y oprobio’ conforme al griego.
  - Las comillas angulares se emplean para el discurso directo según norma española.
  - Los marcadores [a] y [b] aparecen exactamente en el texto base y no se reutilizan.
