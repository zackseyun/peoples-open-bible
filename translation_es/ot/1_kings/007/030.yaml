  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La terminología material se alinea bien en general: נְחֹשֶׁת -> ''bronce'', כִּיּוֹר -> ''pila'', כְּתֵפֹת -> ''soportes''. La principal excepción es מְכוֹנָה, donde ''soporte'' es posible pero menos preciso/natural aquí que ''plataforma'' o ''base''.'
