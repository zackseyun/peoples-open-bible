- issue: Gendered covenantal designation בני ישראל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The Hebrew is explicitly masculine plural in a standard covenantal/national designation. Per the translation philosophy, gender-accurate wording is preferred unless context clearly calls for a neutral collective. Here 'sons of Israel' preserves the source form and traditional biblical resonance.
