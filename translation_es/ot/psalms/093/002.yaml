translation:
  language: es
  text: Tu trono está establecido desde antiguo[a]; tú eres desde la eternidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Tu trono está establecido desde tiempos antiguos; tú eres desde la eternidad».'
