translation:
  language: es
  text: “Por favor, Yahvé, acuérdate, te ruego, de cómo he andado delante de ti en fidelidad[a] y con un corazón íntegro[b], y he hecho lo que es bueno a tus ojos.” Y Ezequías lloró con gran llanto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en verdad». El hebreo puede denotar verdad o fidelidad; aquí se refiere a la conducta fiel de Ezequías delante de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «con un corazón indiviso».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנָּה
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Ah
  lexicon: HALOT
  rationale: La partícula de súplica se expresa naturalmente en español como una petición cortés e intensa. «Por favor» conserva el tono implorante sin arcaísmo; «te ruego» se mantiene en la misma cláusula para reflejar la insistencia de la oración.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino en vez de sustituirlo por un título. «Yahvé» preserva el nombre personal del Dios del pacto en español.'
- source_word: זְכָר נָא
  english_pob_choice: remember, I pray
  chosen_spanish: acuérdate, te ruego
  alternatives_spanish:
  - recuerda, te ruego
  - acuérdate, por favor
  lexicon: HALOT
  rationale: El imperativo con נָא expresa súplica urgente. «Acuérdate, te ruego» refleja bien esa petición reverente en español y evita repetir de manera pesada la misma partícula de cortesía.
- source_word: הִתְהַלַּכְתִּי לְפָנֶיךָ
  english_pob_choice: I have walked before you
  chosen_spanish: he andado delante de ti
  alternatives_spanish:
  - he caminado delante de ti
  - he vivido delante de ti
  - me he conducido delante de ti
  lexicon: HALOT
  rationale: La imagen idiomática de la vida delante de Dios se conserva con «he andado delante de ti», expresión bíblica natural en español y fiel al hebreo sin explicitar más de lo que el texto dice.
- source_word: בֶּאֱמֶת
  english_pob_choice: in faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - en verdad
  - con verdad
  - fielmente
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar «verdad», aquí la referencia es a la lealtad y confiabilidad de la conducta de Ezequías ante Dios. «En fidelidad» comunica mejor esa fuerza ética/covenantal que «en verdad» en español.
- source_word: וּבְלֵבָב שָׁלֵם
  english_pob_choice: with a whole heart
  chosen_spanish: con un corazón íntegro
  alternatives_spanish:
  - con un corazón entero
  - con un corazón completo
  - con un corazón indiviso
  lexicon: HALOT
  rationale: «Shalém» comunica integridad, plenitud y lealtad no dividida. En español, «corazón íntegro» expresa esa integridad moral de manera clara y digna; conserva la tensión entre totalidad y sinceridad mejor que una simple literalidad rígida.
- source_word: וְהַטּוֹב בְּעֵינֶיךָ עָשִׂיתִי
  english_pob_choice: have done what is good in your eyes
  chosen_spanish: he hecho lo que es bueno a tus ojos
  alternatives_spanish:
  - he hecho lo bueno ante tus ojos
  - he hecho lo que era bueno en tu presencia
  lexicon: HALOT
  rationale: 'La expresión evaluativa hebrea se mantiene casi intacta porque es transparente y teológicamente importante: el estándar del bien es lo que Dios ve como bueno. «A tus ojos» preserva esa perspectiva divina.'
- source_word: וַיֵּבְךְּ ... בְּכִי גָדוֹל
  english_pob_choice: wept bitterly
  chosen_spanish: lloró con gran llanto
  alternatives_spanish:
  - lloró amargamente
  - lloró mucho
  - rompió a llorar con gran llanto
  lexicon: HALOT
  rationale: El cognado hebreo intensifica el llanto. «Con gran llanto» conserva la magnitud del dolor sin añadir la cualidad subjetiva de «amargamente», que no está explícita en גָדוֹל.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española establecida.
theological_decisions:
- issue: Nombre divino YHWH en una oración directa
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La oración se dirige directamente al Dios del pacto; por ello se conserva el nombre divino y no un sustituto titular. Esto sigue la terminología del proyecto y mantiene visible la referencia al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de בֶּאֱמֶת en la autoevaluación de Ezequías
  english_pob_reading: in faithfulness
  chosen_spanish_reading: en fidelidad
  alternative_spanish_readings:
  - en verdad
  - con verdad
  rationale: No se debe reducir aquí a verdad meramente factual; el contexto es la lealtad de vida delante de Dios. «En fidelidad» preserva la dimensión pactual/ética sin borrar la posible resonancia de verdad.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Sentido de שָׁלֵם en el corazón
  english_pob_reading: with a whole heart
  chosen_spanish_reading: con un corazón íntegro
  alternative_spanish_readings:
  - con un corazón entero
  - con un corazón indiviso
  rationale: La frase no afirma perfección sin pecado, sino integridad y lealtad indivisa. «Íntegro» resguarda esa tensión y evita que el lector español entienda una impecabilidad absoluta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue el ajuste del POB inglés que añadió la súplica explícita de נָא («te ruego») y que prefirió un verbo intensificado para el llanto final. Para el español, se optó por «con gran llanto» porque reproduce mejor la intensificación del sustantivo cognado בְּכִי גָדוֹל sin introducir una cualidad emocional no explícita. También se mantuvo la decisión del nombre divino como transliteración.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para YHWH en todo el texto.
  - Se usa «Ezequías» para el nombre propio, conforme al uso bíblico español común.
  - Se conserva la estructura de oración directa y la evaluación divina «a tus ojos» para ser consistente con el registro POB.
  - «Corazón íntegro» se entiende en sentido de totalidad/lealtad, no de perfección sin pecado.
