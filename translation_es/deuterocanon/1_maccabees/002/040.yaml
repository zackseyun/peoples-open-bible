translation:
  language: es
  text: 'Y un hombre dijo a su vecino: «Si todos hacemos como hicieron nuestros hermanos, y no peleamos contra los gentiles[a] por nuestras vidas y nuestros derechos[b], pronto nos destruirán de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones». El término griego suele significar «naciones», pero aquí probablemente se refiere de manera específica a los pueblos no judíos opuestos a los judíos.
    reason: lexical_alternative
  - marker: b
    text: O «nuestros decretos» o «nuestros reclamos legales». El griego puede referirse a derechos establecidos, normas legales o reclamos consuetudinarios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: LSJ
  rationale: El griego señala a un individuo concreto. «Un hombre» conserva la referencia singular y el tono narrativo sin añadir generalizaciones.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: vecino
  alternatives_spanish:
  - prójimo
  - compañero
  lexicon: LSJ
  rationale: Aunque «vecino» puede sonar más espacial que relacional, aquí el contexto describe a otro miembro cercano del grupo; en español moderno es una manera natural de reflejar esa cercanía. Se mantiene el matiz de proximidad del griego.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - compatriotas
  lexicon: LSJ
  rationale: «Hermanos» sigue de cerca el plural masculino del griego y conserva la referencia a los correligionarios/fellow Jews sin suavizar el lenguaje de parentesco.
- source_word: πολεμήσωμεν
  english_pob_choice: fight
  chosen_spanish: peleamos
  alternatives_spanish:
  - combatimos
  - luchamos
  - hacemos guerra
  lexicon: LSJ
  rationale: El verbo griego expresa resistencia armada. «Peleamos» es más natural en español que un calco como «combatamos» dentro de esta construcción condicional, y no pierde la fuerza militar del contexto.
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: LSJ
  rationale: En este contexto judío, el grupo se opone a los no judíos. «Los gentiles» refleja esa lectura contextual; «las naciones» queda como alternativa más literal pero menos precisa aquí.
- source_word: ψυχῆς
  english_pob_choice: lives
  chosen_spanish: vidas
  alternatives_spanish:
  - alma
  - vida
  lexicon: LSJ
  rationale: La expresión ὑπὲρ τῆς ψυχῆς ἡμῶν apunta a preservación de la vida. En español, el plural «vidas» armoniza con «nuestras» y evita una lectura demasiado espiritualizada de «alma».
- source_word: δικαιωμάτων
  english_pob_choice: rights
  chosen_spanish: derechos
  alternatives_spanish:
  - ordenanzas
  - reclamos legales
  - derechos legales
  lexicon: LSJ
  rationale: El término puede abarcar derechos, reclamos o disposiciones legales. «Derechos» es la opción más clara y natural en español contemporáneo; el matiz jurídico queda implícito y puede explicitarse en nota.
- source_word: τάχιον
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - más pronto
  lexicon: LSJ
  rationale: El adverbio intensifica la inmediatez. «Pronto» transmite la urgencia con naturalidad en español y evita una repetición adverbial pesada.
- source_word: ὀλεθρεύσουσιν
  english_pob_choice: destroy
  chosen_spanish: destruirán
  alternatives_spanish:
  - aniquilarán
  - arruinarán
  - exterminarán
  lexicon: LSJ
  rationale: El verbo griego es fuerte, pero «destruirán» comunica adecuadamente la amenaza sin sobrecargarla con una equivalencia más extrema que el contexto inmediato no obliga.
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - fuera de la tierra
  - de la tierra prometida
  lexicon: LSJ
  rationale: γῆ puede significar tierra o territorio. «De la tierra» mantiene la ambigüedad amplia del original y sigue de cerca la formulación griega; no se especifica «territorio» para no cerrar el alcance del sustantivo.
theological_decisions:
- issue: τὰ ἔθνη en un contexto de resistencia judía
  english_pob_reading: the Gentiles
  chosen_spanish_reading: los gentiles
  alternative_spanish_readings:
  - las naciones
  rationale: 'El contraste narrativo no es geopolítico general sino identitario y religioso: el pueblo judío frente a los pueblos no judíos opuestos a él. «Los gentiles» preserva mejor esa distinción que «las naciones», aunque esta última sea una traducción literal posible.'
  doctrine_reference: 'Principio POB: primacía del idioma original con equivalencia óptima y claridad contextual'
- issue: δικαιωμάτων como término jurídico-comunitario
  english_pob_reading: rights
  chosen_spanish_reading: derechos
  alternative_spanish_readings:
  - ordenanzas
  - reclamos legales
  - derechos legales
  rationale: El griego puede referirse a derechos establecidos, normas o reclamos legales. En este versículo la defensa de la comunidad incluye tanto su supervivencia como sus legítimas prerrogativas; «derechos» comunica eso de manera comprensible, mientras la nota preserva la amplitud semántica.
  doctrine_reference: 'Principio POB: consistencia terminológica con nota de alternativa cuando el campo semántico es más amplio que una sola palabra'
- issue: ψυχῆς como vida preservada en amenaza
  english_pob_reading: our lives
  chosen_spanish_reading: nuestras vidas
  alternative_spanish_readings:
  - nuestras almas
  - nuestra vida
  rationale: La amenaza inmediata trata de supervivencia física y comunitaria. Traducir ψυχή por «almas» desviaría el sentido hacia una lectura más religiosa de la que el contexto exige; «vidas» refleja correctamente el valor de preservarlas.
  doctrine_reference: 'Principio POB: no espiritualizar indebidamente términos concretos del contexto'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «now» para evitar una palabra innecesaria; por eso no se introdujo ningún equivalente en español. Se conservó la fuerza condicional y la inmediatez del cierre con «pronto».
  spanish_consistency_notes:
  - Se mantuvo «gentiles» para τὰ ἔθνη conforme al uso contextual documentado.
  - Se mantuvo «derechos» para δικαιωμάτων, con nota que preserva la amplitud jurídica del griego.
  - Se tradujo ψυχή como «vidas» para evitar una lectura excesivamente espiritual en este contexto narrativo.
  - Se prefirió «de la tierra» para ἀπὸ τῆς γῆς, sin especificar más de lo que el griego permite.
