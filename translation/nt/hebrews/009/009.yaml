- issue: Rendering παραβολή in a cultic-typological context
  chosen_reading: parable
  alternative_readings:
  - symbol
  - figure
  rationale: The verse describes the earthly sanctuary arrangement as a figurative correspondence to the present time. 'Parable' preserves the lexical form and the typological tension without collapsing it into a purely abstract 'symbol.' Because 'symbol' is a common and plausible rendering in this context, it is preserved in a footnote.
