translation:
  language: es
  text: Has amado la justicia y has aborrecido la maldad[a]; por eso Dios, tu Dios[b], te ha ungido con el óleo de alegría más que tus compañeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por eso, oh Dios, tu Dios te ha ungido con el óleo de alegría más que tus compañeros». La primera palabra «Dios» puede leerse como vocativo en lugar de sujeto del verbo.'
    reason: alternative_reading
  - marker: b
    text: Citado en Hebreos 1:9.
    reason: cross_reference
lexical_decisions:
- source_word: אָהַבְתָּ
  english_pob_choice: have loved
  chosen_spanish: has amado
  alternatives_spanish:
  - amaste
  lexicon: HALOT
  rationale: El perfecto hebreo describe una disposición ya establecida del rey; en español, el perfecto compuesto comunica bien esa cualidad con relevancia presente sin perder el tono poético directo de la segunda persona.
- source_word: צֶּדֶק
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - lo justo
  lexicon: HALOT
  rationale: Aunque 'justicia' y 'rectitud' son posibles, 'justicia' mantiene el contraste moral-jurídico con 'maldad' y funciona con naturalidad en español bíblico contemporáneo.
- source_word: וַתִּשְׂנָא
  english_pob_choice: and hated
  chosen_spanish: y aborrecido
  alternatives_spanish:
  - y has odiado
  - y odiaste
  lexicon: HALOT
  rationale: La serie verbal coordina dos acciones o actitudes paralelas. 'Aborrecer' da en español una fuerza moral fuerte sin reducirse a un mero sentimiento momentáneo como 'odiar' puede sonar en algunos contextos.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la impiedad
  - la perversidad
  lexicon: HALOT
  rationale: '''Maldad'' preserva el contraste general con ''justicia'' y es una equivalencia clara y amplia para el campo semántico de conducta perversa o inicua.'
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: La expresión introduce consecuencia. 'Por eso' es natural en español y mantiene el nexo inferencial sin elevar innecesariamente el registro.
- source_word: מְשָׁחֲךָ
  english_pob_choice: has anointed you
  chosen_spanish: te ha ungido
  alternatives_spanish:
  - te ungió
  lexicon: HALOT
  rationale: '''Ungir'' conserva el acto real, real/consagratorio, de investidura. El perfecto compuesto refleja bien el resultado vigente de la acción en la línea poética.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡Oh Dios!
  lexicon: HALOT
  rationale: Se mantiene 'Dios' como sujeto de la acción en la lectura principal del POB, preservando la sintaxis más natural del hebreo en esta línea y dejando la alternativa vocativa para nota.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - Dios, tu Dios
  lexicon: HALOT
  rationale: La forma posesiva directa en español es 'tu Dios'. En la cláusula completa, la repetición 'Dios, tu Dios' reproduce la apposición hebrea sin sonar forzada.
- source_word: שֶׁמֶן שָׂשׂוֹן
  english_pob_choice: the oil of gladness
  chosen_spanish: el óleo de alegría
  alternatives_spanish:
  - el aceite de alegría
  - el óleo del gozo
  lexicon: HALOT
  rationale: '''Óleo'' conserva un registro bíblico y litúrgico adecuado para una unción real. ''Alegría'' corresponde bien a שָׂשׂוֹן y mantiene la imagen de gozo/exaltación.'
- source_word: מֵחֲבֵרֶיךָ
  english_pob_choice: beyond your companions
  chosen_spanish: más que a tus compañeros
  alternatives_spanish:
  - por encima de tus compañeros
  - más allá de tus compañeros
  lexicon: HALOT
  rationale: El מן comparativo se vierte naturalmente como 'más que'. 'Compañeros' preserva la relación de asociación/pares del término hebreo sin especificar más de lo que el texto da.
theological_decisions:
- issue: Sintaxis y fuerza teológica de אֱלֹהִים en la cláusula central
  english_pob_reading: 'The first ''God'' is read as the subject: ''therefore God, your God, has anointed you.'' The vocative alternative is preserved in a note.'
  chosen_spanish_reading: 'Dios es el sujeto de ''te ha ungido'': ''por eso Dios, tu Dios, te ha ungido''.'
  alternative_spanish_readings:
  - «Por eso, oh Dios, tu Dios te ha ungido»
  rationale: La sintaxis hebrea permite la lectura principal como sujeto o como vocativo. El texto español conserva la lectura principal del POB y, en nota, la alternativa vocativa para no resolver artificialmente la tensión del original.
  doctrine_reference: Hebreos 1:9 y la ambigüedad sintáctica de Salmo 45:8; primacía del texto fuente y preservación de la tensión interpretativa.
translation_notes:
  revision_awareness: Se siguió la lectura principal del POB sin cambios de revisión posteriores; no se detectaron modificaciones aplicadas en el expediente de revisión más reciente. La nota alternativa se preserva por la ambigüedad sintáctica reconocida en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y 'tu Dios' para אֱלֹהֶיךָ en la lectura principal.
  - Se usa 'unido' no; se usa 'ungido' para el verbo משׁח, consistente con lenguaje bíblico de investidura.
  - '''Justicia''/''maldad'' ofrece un contraste moral claro y legible en español.'
  - La puntuación refleja la progresión causal del versículo y permite la nota de ambigüedad sin recargar el texto principal.
