translation:
  language: es
  text: 'Porque he aquí[a] al que forma los montes y crea el viento, y declara al hombre[b] cuál es su pensamiento[c], que convierte la aurora en oscuridad y pisa las alturas de la tierra: Yahvé, Dios de los ejércitos, es su nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «crea el espíritu»; רוּחַ puede significar «viento», «aliento» o «espíritu».
    reason: lexical_alternative
  - marker: b
    text: O «a la humanidad»; el hebreo usa el singular representativo אָדָם.
    reason: lexical_alternative
  - marker: c
    text: O «qué está pensando» / «cuál es su meditación»; el término hebreo puede referirse al pensamiento interior o a la meditación.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי הִנֵּה
  english_pob_choice: For behold
  chosen_spanish: Porque he aquí
  alternatives_spanish:
  - Pues he aquí
  - Porque mira
  lexicon: HALOT
  rationale: כִּי conserva la fuerza de enlace causal o explicativa, y הִנֵּה añade deixis enfática. «Porque he aquí» mantiene ambas sin volverlo demasiado coloquial.
- source_word: יוֹצֵר
  english_pob_choice: forms
  chosen_spanish: forma
  alternatives_spanish:
  - moldea
  - plasma
  lexicon: HALOT
  rationale: El participio expresa acción creadora con intención artesanal; «forma» es natural en español y conserva ese matiz.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - los montañas
  lexicon: HALOT
  rationale: El hebreo lleva artículo y el plural puede expresarse bien con «montes» en español bíblico contemporáneo, sin perder el carácter majestuoso del paisaje creado.
- source_word: וּבֹרֵא רוּחַ
  english_pob_choice: and creates the wind
  chosen_spanish: y crea el viento
  alternatives_spanish:
  - y crea el espíritu
  - y crea el aliento
  lexicon: HALOT
  rationale: En este contexto de actos cósmicos, «viento» corresponde mejor al cuadro natural. Se conserva la alternativa semántica de רוּחַ en la nota correspondiente.
- source_word: וּמַגִּיד לְאָדָם
  english_pob_choice: and declares to man
  chosen_spanish: y declara al hombre
  alternatives_spanish:
  - y declara a la humanidad
  - y dice al hombre
  lexicon: HALOT
  rationale: מגיד es un verbo solemne de anunciar/declara r. אָדָם está en singular representativo; «al hombre» preserva esa forma sin neutralizarla.
- source_word: מַה שֵּׂחוֹ
  english_pob_choice: what his thought is
  chosen_spanish: cuál es su pensamiento
  alternatives_spanish:
  - qué medita
  - qué piensa
  lexicon: HALOT
  rationale: שֵׂחַ puede abarcar pensamiento, meditación o interioridad mental. «Cuál es su pensamiento» mantiene el sentido interior sin exagerar hacia «meditación» en un español menos directo.
- source_word: עֹשֵׂה שַׁחַר עֵיפָה
  english_pob_choice: who makes the dawn darkness
  chosen_spanish: el que hace de la aurora oscuridad
  alternatives_spanish:
  - el que convierte la aurora en oscuridad
  - el que hace la aurora tinieblas
  lexicon: HALOT
  rationale: 'La construcción hebrea sugiere una reversión: convertir la aurora en oscuridad. «Hace de la aurora oscuridad» es fiel y fluido en español.'
- source_word: וְדֹרֵךְ עַל בָּמֳתֵי אָרֶץ
  english_pob_choice: and treads on the heights of the earth
  chosen_spanish: y camina sobre las alturas de la tierra
  alternatives_spanish:
  - y pisa las alturas de la tierra
  - y pisa sobre los altos de la tierra
  lexicon: HALOT
  rationale: דרך con על puede implicar pisar o hollar, pero el paralelismo con soberanía cósmica permite «camina sobre» como una imagen elevada y natural en español. «Alturas» conserva בָּמֳתֵי sin cargarlo de sentido cultual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino conforme al estándar español del proyecto: «Yahvé».'
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: Dios de los ejércitos
  alternatives_spanish:
  - Dios de los ejércitos celestiales
  - Dios de los ejércitos
  lexicon: HALOT
  rationale: «Ejércitos» expresa con naturalidad el trasfondo de צְבָאוֹת y evita un tecnicismo arcaizante. Aunque «de los ejércitos» es idiomático, se mantiene la amplitud semántica de las huestes.
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre
  lexicon: HALOT
  rationale: El cierre nominal se completa naturalmente en español con «es». Mantiene la fórmula de identificación climática.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. En la norma del proyecto en español, se translitera como «Yahvé», preservando el nombre propio del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de רוּחַ en un marco de creación y soberanía
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: 'El contexto enumera obras cósmicas: montes, aurora, alturas de la tierra. «Viento» encaja mejor con esa secuencia, sin negar la amplitud semántica de רוּחַ.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Valor de אָדָם como singular representativo
  english_pob_reading: to man
  chosen_spanish_reading: al hombre
  alternative_spanish_readings:
  - a la humanidad
  - a la gente
  rationale: El hebreo usa el singular genérico אָדָם. Se conserva el singular representativo para no perder la forma del original.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que afinó la naturalidad de la referencia a la aurora sin alterar el sentido. La versión española conserva esa misma relación semántica, pero adapta el cierre y la imaginería al español bíblico contemporáneo sin introducir parafraseo adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה conforme al estándar del proyecto en español.
  - Se prefirió «viento» en el texto principal, con la alternativa «espíritu» preservada en nota por la amplitud de רוּחַ.
  - Se conservó el singular representativo «al hombre» para אָדָם.
  - Se eligió «Dios de los ejércitos» / «Dios de los ejércitos» como fórmula idiomática y reverente en español, correspondiente a צְבָאוֹת.
  - 'El orden y la puntuación buscan reflejar el crescendo retórico del hebreo: creación, revelación, reversión cósmica e identificación final.'
