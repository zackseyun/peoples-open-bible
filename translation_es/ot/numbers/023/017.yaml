review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en la mayor parte: וַיָּבֹא אֵלָיו = «Vino a él»; נִצָּב = «estaba de pie»; עַל עֹלָתוֹ = «junto a su holocausto»; יְהוָה = «Yahvé». También conserva correctamente la nota alternativa para שָׂרֵי מוֹאָב. Sin embargo, el anclaje de nota [a] está mal colocado: aparece en «Vino a él[a]», pero la nota trata de «los príncipes de Moab». Además, «¿Qué ha hablado Yahvé?» es comprensible y formalmente cercano, pero en español bíblico natural suena más idiomático «¿Qué ha dicho Yahvé?» sin pérdida de sentido, mientras la conexión con דבר puede quedar explicada en decisiones léxicas, no forzada en la superficie.'
  spanish_quality_summary: El español es generalmente claro y digno. «Y he aquí que» y «estaba de pie» funcionan bien. «Con los príncipes de Moab con él» refleja el hebreo, pero resulta algo pesado; puede suavizarse a «y los príncipes de Moab estaban con él» manteniendo el sentido. El problema principal de calidad editorial es la nota mal anclada. También conviene ajustar la pregunta final a un español más natural.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה se vierte como «Yahvé», y עֹלָה como «holocausto» es aceptable en contexto sacrificial. No hay conflictos doctrinales relevantes. La alternativa «oficiales de Moab» en nota está bien documentada.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica la alternativa para «los príncipes de Moab», pero el marcador aparece después de «él». Esto incumple la disciplina de notas y puede confundir al lector.
  - severity: medium
    issue: «¿Qué ha hablado Yahvé?» suena poco idiomático en español.
    rationale: Aunque reproduce de cerca el verbo «hablar», en español la pregunta natural es «¿Qué ha dicho Yahvé?». El sentido de habla divina se preserva sin rigidez innecesaria.
  - severity: low
    issue: «con los príncipes de Moab con él» es redundante en español.
    rationale: 'La repetición refleja el hebreo, pero una leve reestructuración mejora la fluidez sin perder contenido: «y los príncipes de Moab estaban con él».'
  revised_spanish_text: 'Vino a él, y he aquí que estaba de pie junto a su holocausto, y los príncipes[a] de Moab estaban con él. Y Balac le dijo: «¿Qué ha dicho Yahvé?»'
  revised_footnotes:
