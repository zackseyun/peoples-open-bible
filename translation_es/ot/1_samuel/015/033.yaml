revisions:
- from: 'Entonces Samuel dijo[a]: «Así como tu espada dejó a las mujeres sin hijos[b], así tu madre quedará sin hijos entre las mujeres». Y Samuel hizo pedazos a Agag delante de Yahvé en Gilgal.'
  to: 'Entonces Samuel dijo[a]: «Así como tu espada dejó a las mujeres sin hijos, así tu madre quedará sin hijos entre las mujeres». Y Samuel despedazó[b] a Agag delante de Yahvé en Gilgal.'
  rationale: 'Se conserva la traducción principal del paralelismo con «dejó ... sin hijos / quedará sin hijos», que suena natural en español y es fiel al sentido. Se corrigen las notas para alinearlas con el expediente inglés y con el hebreo: la nota [a] ahora ofrece una alternativa léxica real para שׁכל, y la nota [b] se mueve al verbo de ejecución וַיְשַׁסֵּף y preserva alternativas pertinentes. También se mejora el verbo principal a «despedazó» para reflejar mejor la violencia explícita del original.'
