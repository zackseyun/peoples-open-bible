translation:
  language: es
  text: Ya no serán más botín de las naciones[a], y los animales salvajes de la tierra[b] no los devorarán. Habitarán seguros[c], y no habrá quien los haga temblar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presa de las naciones».
    reason: lexical_alternative
  - marker: b
    text: O «las fieras de la tierra».
    reason: lexical_alternative
  - marker: c
    text: O «habitarán en seguridad, y nadie los aterrorizará».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּז
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - presa
  - despojo
  lexicon: HALOT
  rationale: בַּז designa algo arrebatado por fuerza o dejado como presa de guerra. «Botín» conserva bien en español la idea de ser objeto de expolio por parte de otras naciones y encaja naturalmente con la estructura «ser botín de».
- source_word: לַגּוֹיִם
  english_pob_choice: for the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - para las naciones
  - de los pueblos
  lexicon: HALOT
  rationale: El hebreo expresa relación con las naciones como agentes beneficiarios del saqueo. En español, «botín de las naciones» reproduce con naturalidad esa relación y evita una construcción menos idiomática.
- source_word: חַיַּת הָאָרֶץ
  english_pob_choice: the wild animals of the land
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales salvajes de la tierra
  - las fieras de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es literal pero idiomáticamente amenaza con animales salvajes. «Bestias del campo» mantiene la imaginería bíblica concreta sin sonar forzada, y conserva el contraste con el saqueo humano de la primera cláusula.
- source_word: תֹאכְלֵם
  english_pob_choice: will not devour them
  chosen_spanish: no los devorarán
  alternatives_spanish:
  - no los comerán
  - no los consumirán
  lexicon: HALOT
  rationale: Aunque el verbo básico es «comer», en este contexto de amenaza animal «devorar» transmite mejor la fuerza predatoria del hebreo y del inglés POB.
- source_word: וְיָשְׁבוּ
  english_pob_choice: They will dwell
  chosen_spanish: Habitarán
  alternatives_spanish:
  - Vivirán
  - Permanecerán
  lexicon: HALOT
  rationale: יָשַׁב expresa asentarse o morar. «Habitarán» conserva el sentido de residencia estable y el tono de restauración pactal mejor que «vivirán».
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: seguros
  alternatives_spanish:
  - con seguridad
  - en seguridad
  lexicon: HALOT
  rationale: El término indica seguridad, confianza y ausencia de amenaza. «Seguros» es una equivalencia concisa y natural en español, equivalente al adverbio inglés dentro de la construcción verbal.
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: with no one to make them afraid
  chosen_spanish: y no habrá quien los haga temblar
  alternatives_spanish:
  - y no habrá quien los atemorice
  - y nadie los aterrará
  lexicon: HALOT
  rationale: El participio causativo de חרד indica causar temor o sobresalto. «Haga temblar» preserva la fuerza verbal y resulta idiomático en español, sin suavizar la amenaza negada.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: Ya no
  alternatives_spanish:
  - no más
  - ya no más
  lexicon: HALOT
  rationale: Con la negación, עוֹד marca cese de una condición anterior. «Ya no» es la manera más natural y clara de expresar ese cambio de estado.
theological_decisions:
- issue: Alcance de la seguridad prometida
  english_pob_reading: Render the verse as a concrete promise of restoration and safety without specifying whether the threats are purely literal, purely metaphorical, or eschatologically ultimate.
  chosen_spanish_reading: Traducir el versículo como promesa concreta de restauración y seguridad, sin decidir si las amenazas son solo literales, solo figuradas o exclusivamente escatológicas.
  alternative_spanish_readings:
  - Entender las naciones y los animales como símbolos exclusivos de enemigos políticos
  - Leer el versículo solo como una promesa milenial/escatológica
  rationale: El hebreo presenta tanto la opresión de las naciones como la amenaza de animales de manera directa. La traducción debe conservar esa imaginería y no cerrar el texto con una interpretación sistemática que el hebreo no impone.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión coincide con el último pase de revisión: no se registraron cambios posteriores y el cruce de control mostró alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado solo cuando el nombre divino aparece explícitamente; en este versículo no aparece.
  - Se conservó la distinción entre amenazas humanas («botín de las naciones») y animales («bestias del campo») tal como la presenta el hebreo.
  - «Habitarán seguros» conserva el valor de residencia estable y seguridad, sin convertirlo en una mera sensación subjetiva.
