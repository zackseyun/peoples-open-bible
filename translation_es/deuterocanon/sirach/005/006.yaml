translation:
  language: es
  text: 'No digas[a]: «Yahvé es compasivo[b]; borrará[c] todas mis iniquidades».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego continúa: «porque su misericordia es grande; expiará la multitud de mis pecados», y luego añade una advertencia sobre que de él proceden tanto la misericordia como la ira, y que su furor reposa sobre los pecadores.'
    reason: alternative_reading
  - marker: b
    text: O «misericordioso».
    reason: lexical_alternative
  - marker: c
    text: O «borrará por completo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No digas para ti
  - Nunca digas
  lexicon: HALOT
  rationale: La prohibición hebrea es directa; en español, «No digas» reproduce de forma natural el imperativo negativo sin añadir matices reflexivos que no están en el texto.
- source_word: רַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - lleno de compasión
  lexicon: HALOT
  rationale: רַחוּם expresa la cualidad divina de compasión. «Compasivo» suena natural en español moderno y conserva bien esa disposición de piedad, sin depender de un registro más eclesiástico.
- source_word: יהוה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto, el nombre divino se vierte como «Yahvé» en el texto principal, no como un sustituto reverencial.
- source_word: וְכָל עֲוֹנוֹתַי
  english_pob_choice: all my iniquities
  chosen_spanish: todas mis iniquidades
  alternatives_spanish:
  - todos mis pecados
  - toda mi culpa
  lexicon: HALOT
  rationale: עָוֹן puede abarcar iniquidad, culpa o maldad. «Iniquidades» preserva mejor el peso moral y la pluralidad concreta del hebreo, en continuidad con la elección inglesa.
- source_word: יִמְחֶה
  english_pob_choice: he will blot out
  chosen_spanish: borrará
  alternatives_spanish:
  - borrará del todo
  - extinguirá
  - borrará de la memoria
  lexicon: HALOT
  rationale: מחה tiene la imagen de borrar o eliminar. «Borrará» es una solución natural en español y mantiene el paralelo con el inglés revisado «blot out» sin cargar una explicación ajena al versículo.
theological_decisions:
- issue: Relación entre el hebreo conservado en la base y la ampliación griega del mismo versículo
  english_pob_reading: The Hebrew clause is the main text; the Greek continuation is preserved in a footnote as a parallel expansion.
  chosen_spanish_reading: El texto principal sigue la cláusula hebrea; la expansión griega se conserva en nota como paralelo significativo.
  alternative_spanish_readings:
  - Fundir hebreo y griego en una sola redacción larga
  - Omitir la ampliación griega
  rationale: La prioridad recae en el testimonio hebreo disponible para este versículo, pero el griego aporta una continuación interpretativa importante. Mantenerlo en nota conserva la transparencia textual sin mezclar testigos de manera no auditable.
  doctrine_reference: Primacía de la fuente original y transparencia del aparato textual; preservación honesta de variantes y expansiones
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «wipe away» por «blot out» para מחה. La redacción española adopta «borrará» como equivalente natural y suficientemente formal; no se eligió una expresión más perifrástica porque la revisión busca precisamente un registro más estándar y directo. Además, se preserva en nota la expansión griega que el aparato inglés dejó como lectura paralela.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino conforme al estándar del proyecto.
  - Se usa un registro sobrio y publicable, sin calcos excesivos.
  - Las notas [a]-[c] aparecen en el texto exactamente donde corresponde su explicación.
  - «Iniquidades» conserva la fuerza moral plural del hebreo עֲוֹנוֹתַי.
  - La expansión griega se presenta como nota, no como fusión del texto principal.
