    rationale: El inglés auditado y la decisión léxica piden conservar la imagen concreta de «turban». «Tiara» en español introduce asociaciones distintas y menos fieles que «turbante», además de alejarse de la racionalidad documentada.
  - severity: medium
    issue: «y uno no pensado» para וּבַל עָלוּ עַל לֵב
    rationale: Aunque intenta reflejar literalmente el idiom, en español suena antinatural. La auditoría inglesa explica el sentido como «one not thought of», es decir, alguien no considerado o inesperado. Debe expresarse con español legible sin perder el matiz idiomático.
  - severity: low
    issue: 'Nota a: «alto honor»'
    rationale: Es comprensible, pero «gran honor» o «recibió honor» suena más natural en español eclesial general.
