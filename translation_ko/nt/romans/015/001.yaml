source:
  edition: SBLGNT
  text: Ὀφείλομεν δὲ ἡμεῖς οἱ δυνατοὶ τὰ ἀσθενήματα τῶν ἀδυνάτων βαστάζειν, καὶ μὴ ἑαυτοῖς ἀρέσκειν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/001.yaml
  text: Now we who are strong ought to bear the weaknesses of the weak, and not please ourselves.
translation:
  language: ko
  text: 강한 우리는 약한 자들의 약함을 짊어져야 하며, 자기 자신을 기쁘게 하려 하지 말아야 합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οἱ δυνατοὶ ... τῶν ἀδυνάτων
  english_pob_choice: who are strong ... of the weak
  chosen_korean: 강한 (우리) ... 약한 자들의
  alternatives_korean:
  - 능력 있는 자 ... 능력 없는 자
  lexicon: BDAG
  rationale: 14장의 「약한 자(ἀσθενής)」와 어휘적으로 연결되도록 「약한 자들」로 옮긴다. 「강한/약한」 대조 정형 유지.
- source_word: τὰ ἀσθενήματα
  english_pob_choice: the weaknesses
  chosen_korean: 약함
  alternatives_korean:
  - 연약함
  lexicon: BDAG
  rationale: 추상명사 복수. 한국어에서는 단수 「약함」으로 자연스럽다.
- source_word: βαστάζειν
  english_pob_choice: to bear
  chosen_korean: 짊어지다
  alternatives_korean:
  - 감당하다
  - 짐을 지다
  lexicon: BDAG
  rationale: 짐을 짊어지는 구체적 이미지를 살린다.
- source_word: ἑαυτοῖς ἀρέσκειν
  english_pob_choice: please ourselves
  chosen_korean: 자기 자신을 기쁘게 하다
  alternatives_korean:
  - 자기 마음에 들게 하다
  lexicon: BDAG
  rationale: 「자기 자신」을 분명히 하여 15:2의 「이웃을 기쁘게」와 대조를 살린다.
