translation:
  language: es
  text: Mira[a], si el justo es retribuido en la tierra, ¡cuánto más el malvado y el pecador!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «De hecho, el justo es retribuido en la tierra»; el hebreo también puede traducirse de manera más formal: «He aquí, el justo será retribuido en la tierra/el país».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a prestar atención. «Mira» conserva ese valor apelativo en un español natural y menos arcaico que «He aquí».
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - la persona justa
  - los justos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente en singular. «El justo» mantiene la forma representativa singular y el término bíblico usual en español sin perder precisión.
- source_word: בָּאָרֶץ
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra/land
  - en el mundo
  lexicon: HALOT
  rationale: Aquí אָרֶץ puede expresar el ámbito terrenal en contraste implícito con una retribución última. «En la tierra» es idiomático y conserva la amplitud de sentido entre «land» y «earth».
- source_word: יְשֻׁלָּם
  english_pob_choice: is repaid
  chosen_spanish: es recompensado
  alternatives_spanish:
  - es repagado
  - recibe pago
  - es retribuido
  lexicon: HALOT
  rationale: El pual de שלם expresa recibir lo debido, con un alcance que no obliga a leer solo recompensa positiva. «Es recompensado» comunica bien la idea de retribución sin estrechar el sentido más de lo que permite el hebreo.
- source_word: אַף כִּי
  english_pob_choice: how much more
  chosen_spanish: ¡cuánto más!
  alternatives_spanish:
  - mucho más
  - con mayor razón
  - más aún
  lexicon: HALOT
  rationale: La construcción introduce un argumento de menor a mayor. «¡Cuánto más!» reproduce con naturalidad ese valor a fortiori en español.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el malo
  lexicon: HALOT
  rationale: Como sustantivo, refiere al que es culpable o perverso. «El malvado» es claro, bíblico y conserva el matiz moral fuerte del término.
- source_word: וְחוֹטֵא
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el que peca
  - el que hace pecado
  - el transgresor
  lexicon: HALOT
  rationale: El participio sustantivado nombra al que practica el pecado. «El pecador» preserva la pareja semántica con «el malvado» y resulta natural en español.
theological_decisions:
- issue: Alcance de la retribución del justo
  english_pob_reading: The righteous receives due repayment on earth, without specifying whether that repayment is positive reward, disciplinary suffering, or both.
  chosen_spanish_reading: El justo es recompensado en la tierra, sin precisar si esa retribución es premio, corrección o ambas cosas.
  alternative_spanish_readings:
  - El justo es premiado en la tierra
  - El justo es castigado en la tierra
  - El justo recibe su paga en la tierra
  rationale: El verbo hebreo permite una retribución amplia, no reducida a premio o castigo. La formulación española mantiene esa tensión y evita interpretar de más el proverbio.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Sin cambios aplicados en la última revisión; el texto inglés final fue confirmado como estable y con acuerdo alto, con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «tierra» para אָרֶץ, conservando la amplitud semántica de 'earth/land' según el contexto sapiencial.
  - Se prefirió «recompensado» para יְשֻׁלָּם para no cerrar indebidamente el sentido a premio o castigo.
  - «El justo / el malvado / el pecador» conserva la serie de sustantivos sustantivados del hebreo.
  - La exclamación final reproduce el a fortiori de אַף כִּי con fluidez natural en español.
