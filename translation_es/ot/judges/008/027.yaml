translation:
  language: es
  text: Gedeón lo convirtió en un efod[a] y lo colocó en su ciudad, en Ofra. Y todo Israel se prostituyó tras él allí,[b] y llegó a ser una trampa para Gedeón y para su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un 'efod' era un objeto cultual asociado con el uso sacerdotal; aquí el texto no especifica con exactitud su forma o función.
    reason: cultural_note
  - marker: b
    text: O 'se prostituyeron tras él'; el hebreo usa una imagen de infidelidad sexual para la idolatría de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאֵפוֹד
  english_pob_choice: into an ephod
  chosen_spanish: un efod
  alternatives_spanish:
  - como un efod
  - para un efod
  lexicon: HALOT
  rationale: El hebreo nombra el objeto como אֵפוֹד sin aclarar su forma exacta. En español conviene mantener el término técnico 'efod' sin resolver la ambigüedad, y el sentido resultativo de עשה permite decir que lo hizo 'un efod'.
- source_word: וַיַּצֵּג
  english_pob_choice: set it up
  chosen_spanish: lo colocó
  alternatives_spanish:
  - lo puso
  - lo instaló
  lexicon: HALOT
  rationale: יצג/נצב expresa hacer que algo quede puesto o erguido. 'Lo colocó' transmite la acción de situarlo de manera estable sin añadir de más la idea de exhibición o de instalación cultual más específica.
- source_word: בְעִירוֹ
  english_pob_choice: in his city
  chosen_spanish: en su ciudad
  alternatives_spanish:
  - en su pueblo
  - en su población
  lexicon: HALOT
  rationale: עִיר normalmente significa 'ciudad'. 'Su ciudad' conserva la relación posesiva del hebreo y suena natural en español, aunque Ofra pudiera ser un asentamiento menor.
- source_word: בְּעָפְרָה
  english_pob_choice: in Ophrah
  chosen_spanish: en Ofra
  alternatives_spanish:
  - en Efrá
  - en Ofrah
  lexicon: standard transliteration
  rationale: Los nombres propios se transliteran de forma estable. 'Ofra' sigue la forma española más natural y reconocible para el topónimo hebreo.
- source_word: וַיִּזְנוּ ... אַחֲרָיו
  english_pob_choice: prostituted themselves after it
  chosen_spanish: se prostituyó tras él
  alternatives_spanish:
  - se prostituyeron tras él
  - fueron infieles tras él
  - se desviaron tras él
  lexicon: HALOT
  rationale: זנה conserva una metáfora de infidelidad sexual/cultual. En español, 'se prostituyeron tras él' reproduce mejor el peso figurado del hebreo; aquí el sujeto colectivo exige concordancia plural, por eso se usa 'se prostituyeron'.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: HALOT
  rationale: '''Allí'' mantiene la referencia locativa inmediata y natural en español, con el mismo valor de énfasis narrativo que tiene el hebreo.'
- source_word: לְמוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - un lazo de ruina
  - un tropiezo
  lexicon: HALOT
  rationale: מוֹקֵשׁ puede rendirse como 'snare' o 'trap'. En español, 'trampa' comunica bien la metáfora de algo que lleva al daño o a la caída, aunque 'lazo' también sería posible; 'trampa' resulta más idiomático para lectores modernos.
- source_word: וּלְבֵיתוֹ
  english_pob_choice: to his house
  chosen_spanish: para su casa
  alternatives_spanish:
  - para su familia
  - para su casa/casualidad de casa
  lexicon: HALOT
  rationale: בַּיִת aquí probablemente va más allá de la estructura física y abarca la casa/linaje/entorno doméstico de Gedeón. 'Para su casa' conserva esa amplitud bíblica; 'familia' sería más explícito pero menos cercano al hebreo.
theological_decisions:
- issue: Metáfora de infidelidad al hablar de la reacción de Israel ante el efod
  english_pob_reading: 'Use explicit sexual-infidelity imagery: ''prostituted themselves after it'''
  chosen_spanish_reading: se prostituyeron tras él
  alternative_spanish_readings:
  - fueron infieles a él
  - se desviaron tras él
  rationale: El hebreo זנה usa una imagen sexual para la idolatría o la infidelidad de culto. Mantener 'se prostituyeron' preserva la fuerza teológica del texto y evita suavizarlo hacia un mero 'desvío' moral.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Naturaleza del efod de Gedeón
  english_pob_reading: Translate אֵפוֹד straightforwardly as 'ephod' without specifying whether it was a priestly garment, idol, or oracular object
  chosen_spanish_reading: efod
  alternative_spanish_readings:
  - vestidura sacerdotal
  - ídolo
  - imagen sagrada
  rationale: El texto no precisa la forma exacta ni la función completa del objeto. Mantener 'efod' evita resolver una cuestión histórica o teológica debatida y respeta la ambigüedad del hebreo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El inglés POB muestra estabilidad en esta línea, con acuerdo alto y sin revisiones aplicadas; la presente versión sigue de cerca esa lectura, conservando la ambigüedad de 'efod', la metáfora fuerte de זנה y el valor narrativo de 'allí' y 'trampa'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando corresponda, pero este versículo no lo contiene.
  - '''Efod'' se conserva sin sustitución por ''peto'' ni ''vestidura'' para no resolver una ambigüedad no resuelta por el texto.'
  - '''Casa'' traduce בַּיִת con su amplitud de linaje/hogar, consistente con el uso bíblico.'
  - La metáfora sexual de infidelidad se preserva en la nota, mientras el texto principal usa una forma publicable y gramaticalmente natural en español.
