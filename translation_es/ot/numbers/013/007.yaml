- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issachar
  lexicon: transliteración bíblica estándar en español
  rationale: Se conserva el nombre propio en forma usual del español bíblico, «Isacar», que corresponde al nombre tribal y es más natural para la lectura pública que una transliteración más cercana al inglés.
- source_word: יִגְאָל
  english_pob_choice: Igal
  chosen_spanish: Igal
  alternatives_spanish:
  - Yigal
  lexicon: transliteración de nombre propio
  rationale: El nombre אישי se vierte como «Igal», forma bíblica ya reconocible en español y consistente con la práctica de transliterar nombres propios sin añadir glosas.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En la identificación genealógica inmediata, בֶּן significa de manera directa «hijo de». «Descendiente de» sería posible en un sentido más amplio, pero aquí no hace falta ampliar el vínculo filial.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: transliteración bíblica estándar en español
  rationale: Se emplea la forma asentada en español, «José», para el nombre personal יוֹסֵף, manteniendo inteligibilidad y uniformidad bíblica en español.
