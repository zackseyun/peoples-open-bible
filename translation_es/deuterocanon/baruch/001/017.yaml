lexical_decisions:
- source_word: ὧν
  english_pob_choice: in which
  chosen_spanish: en lo cual
  alternatives_spanish:
  - en lo que
  - en donde
  - en lo cual mismo
  lexicon: LSJ
  rationale: El relativo griego en genitivo plural retoma estrechamente lo anterior; «en lo cual» conserva esa referencia compacta sin convertirla en causalidad explícita. En español suena más natural que un literalismo rígido y mantiene la relación con el contexto previo.
- source_word: ἡμάρτομεν
  english_pob_choice: we sinned
  chosen_spanish: pecamos
  alternatives_spanish:
  - hemos pecado
  - hicimos mal
  - hemos faltado
  lexicon: BDAG
  rationale: El aoristo resume una acción pasada de culpa confesada; «pecamos» es directo, bíblico y fiel al valor verbal sin añadir matiz aspectual innecesario.
- source_word: ἔναντι
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - delante de
  - en presencia de
  - ante
  lexicon: LSJ
  rationale: Aunque el valor básico puede ser «delante de» o «en presencia de», el contexto confesional admite bien «contra» porque expresa la ofensa cometida frente a Dios y sigue la decisión inglesa revisada para reflejar el peso relacional y judicial del término.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Yahvé
  - el Señor Dios
  lexicon: LSJ
  rationale: Se conserva «el Señor» para κύριος, conforme al principio del proyecto para griego citado o alusivo al nombre divino cuando la forma española litúrgica es la más establecida y transparente en este contexto de confesión.
theological_decisions:
- issue: Cómo representar κύριος en una confesión de pecado deuterocanónica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: En este verso la forma griega κύριος funciona como designación reverente de Dios en un contexto de confesión. En español, «el Señor» preserva la referencia confesional y la inteligibilidad eclesial; no se introduce «Yahvé» aquí porque el texto fuente es griego y la lectura auditada inglesa mantiene 'the Lord' sin desplazar el registro a una reconstrucción hebraizante.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: La revisión inglesa cambió «before the Lord» por «against the Lord» para reflejar mejor ἔναντι en este contexto; la versión española sigue esa decisión con «contra».
  spanish_consistency_notes:
  - Se mantiene el tono confesional breve y solemne propio de una oración de penitencia.
  - No se usa «Cristo» ni vocabulario cristológico, porque el griego aquí contiene κύριος en fórmula confesional sin indicación contextual para ello.
  - La nota conserva la alternativa semántica relevante («delante de») para no borrar la tensión lexical entre presencia y contra-ofensa.
