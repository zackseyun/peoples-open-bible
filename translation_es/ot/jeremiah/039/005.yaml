translation:
  language: es
  text: Pero el ejército de los caldeos los persiguió y alcanzó a Sedequías en las llanuras de Jericó. Lo capturaron y lo llevaron a Nabucodonosor, rey de Babilonia, en Ribla[a], en la tierra de Hamat, y Nabucodonosor dictó sentencia contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Nabucodrezzar»; en el texto principal se usa la forma más familiar en español, «Nabucodonosor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל כַּשְׂדִּים
  english_pob_choice: the army of the Chaldeans
  chosen_spanish: el ejército de los caldeos
  alternatives_spanish:
  - las fuerzas de los caldeos
  - el ejército de los babilonios
  lexicon: HALOT
  rationale: חֵיל denota una fuerza militar o ejército. כַּשְׂדִּים conserva el etnónimo/político «caldeos», que el audit trail inglés también preserva por correspondencia más directa con el hebreo. «Babilonios» sería posible por el contexto, pero suaviza la forma original.
- source_word: וַיִּרְדְּפוּ ... אַחֲרֵיהֶם
  english_pob_choice: pursued them
  chosen_spanish: los persiguió
  alternatives_spanish:
  - los siguió persiguiendo
  - los fue a perseguir
  lexicon: HALOT
  rationale: רָדַף con אַחֲרֵי expresa persecución activa. «Los persiguió» es natural en español y mantiene el tono narrativo militar.
- source_word: וַיַּשִּׂגוּ
  english_pob_choice: overtook
  chosen_spanish: alcanzó
  alternatives_spanish:
  - dio alcance a
  - los alcanzó
  lexicon: HALOT
  rationale: El verbo transmite la idea de dar alcance a fugitivos. En español, «alcanzó» comunica esa proximidad lograda sin añadir matices no presentes en el hebreo.
- source_word: בְּעַרְבוֹת יְרֵחוֹ
  english_pob_choice: in the plains of Jericho
  chosen_spanish: en las llanuras de Jericó
  alternatives_spanish:
  - en las planicies de Jericó
  - en la llanura de Jericó
  lexicon: HALOT
  rationale: עֲרָבוֹת se refiere a llanuras/estepa; «llanuras» es claro y fiel para el lector en español. Se conserva la ubicación geográfica de Jericó sin ampliar a «desierto» o «estepa» sin necesidad.
- source_word: וַיִּקְחוּ אֹתוֹ
  english_pob_choice: They seized him
  chosen_spanish: Lo capturaron
  alternatives_spanish:
  - Lo tomaron
  - Lo apresaron
  lexicon: HALOT
  rationale: לקח en contexto de arresto o captura militar admite una fuerza más concreta que «tomar». «Capturaron» expresa bien la aprehensión violenta implícita en el relato.
- source_word: וַיַּעֲלֻהוּ אֶל
  english_pob_choice: brought him up to
  chosen_spanish: lo llevaron a
  alternatives_spanish:
  - lo subieron a
  - lo llevaron hasta
  lexicon: HALOT
  rationale: עלה conserva una idea direccional de «subir», pero en español la referencia geográfica no requiere repetirla de forma rígida. «Lo llevaron a» resulta fluido y suficientemente preciso, sin perder el movimiento hacia Nabucodonosor.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodrezzar
  lexicon: HALOT
  rationale: Se usa la forma consolidada y reconocible en español bíblico. La variante hebrea más cercana («Nabucodrezzar») se preserva solo como alternativa auditiva, siguiendo la práctica de claridad de lectura del POB inglés.
- source_word: רִבְלָתָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - en Riblatá
  - en Riblatah
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso común en español. El valor locativo se expresa naturalmente con «en».
- source_word: בְּאֶרֶץ חֲמָת
  english_pob_choice: in the land of Hamath
  chosen_spanish: en la tierra de Hamat
  alternatives_spanish:
  - en la región de Hamat
  - en el territorio de Hamat
  lexicon: HALOT
  rationale: אֶרֶץ es «tierra»; se mantiene esa designación geográfica, y «Hamat» conserva el topónimo. «Región» o «territorio» serían interpretativos adicionales.
- source_word: וַיְדַבֵּר אִתּוֹ מִשְׁפָּטִים
  english_pob_choice: he passed sentence on him
  chosen_spanish: pronunció sentencia sobre él
  alternatives_spanish:
  - pasó sentencia sobre él
  - emitió juicio sobre él
  - le impuso sentencia
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice que «habló con él juicios/sentencias». En contexto judicial, la mejor equivalencia es una fórmula forense en español. «Pronunció sentencia sobre él» conserva el acto jurídico sin diluir el plural de מִשְׁפָּטִים en una paráfrasis demasiado libre.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «passed sentence on him» por ser más natural y preciso para וידבר אתו משפטים. En español, «pronunció sentencia sobre él» conserva esa precisión judicial y evita una calca áspera. También se respetó la decisión inglesa de mantener «Chaldeans» y la nota sobre la forma hebrea del nombre de Nabucodonosor.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se conserva «caldeos» en paralelo con el inglés POB, en lugar de «babilonios», para mantener la correspondencia etnopolítica del hebreo.
  - «Sentencia» se usa en sentido judicial, no como condena doctrinal.
  - El nombre geográfico se normaliza como «Ribla» y «Hamat» para lectura fluida en español.
  - 'La estructura verbal sigue el orden narrativo del hebreo: persecución, captura, traslado y juicio.'
