translation:
  language: es
  text: Pero si el atalaya ve venir la espada y no toca la trompeta, y el pueblo no es advertido[a], y viene la espada y quita una vida de entre ellos, esa persona es tomada en su iniquidad, pero yo exigiré su sangre[b] de la mano del atalaya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no toma advertencia''. El hebreo puede entenderse como que el pueblo no es advertido o como que no atiende la advertencia; el texto principal sigue el énfasis causal creado por la falla del atalaya al no tocar la trompeta.'
    reason: lexical_alternative
  - marker: b
    text: '''Su sangre ... de la mano del atalaya'' es un modismo jurídico de responsabilidad por una muerte.'
    reason: cultural_note
lexical_decisions:
- source_word: הַצֹּפֶה
  english_pob_choice: the watchman
  chosen_spanish: el centinela
  alternatives_spanish:
  - el vigilante
  - el atalaya
  lexicon: HALOT
  rationale: צֹפֶה designa a quien está puesto para vigilar o guardar. En español, ‘centinela’ comunica de manera natural esa función de guardia y mantiene el sentido profético de responsabilidad por advertir.
- source_word: כִּי יִרְאֶה
  english_pob_choice: if ... sees
  chosen_spanish: si ... ve
  alternatives_spanish:
  - cuando ... ve
  - al ver
  lexicon: HALOT
  rationale: Aquí כִּי introduce una situación condicional en una cadena casuística. ‘Si’ conserva mejor la lógica de responsabilidad descrita por el pasaje.
- source_word: הַחֶרֶב בָּאָה
  english_pob_choice: the sword coming
  chosen_spanish: la espada viene / venir la espada
  alternatives_spanish:
  - la espada que se acerca
  - la espada que llega
  lexicon: HALOT
  rationale: ‘Espada’ conserva la imagen concreta de juicio violento. ‘Viene’ refleja בָּאָה de forma directa sin explicitar más de lo que el hebreo dice.
- source_word: תָקַע בַּשּׁוֹפָר
  english_pob_choice: blow the trumpet
  chosen_spanish: toca la trompeta
  alternatives_spanish:
  - hace sonar la trompeta
  - toca el cuerno
  lexicon: HALOT
  rationale: La expresión idiomática en español bíblico y moderno natural para שׁוֹפָר es ‘trompeta’. ‘Toca’ preserva el valor de acción de advertencia del hebreo.
- source_word: וְהָעָם לֹא נִזְהָר
  english_pob_choice: and the people are not warned
  chosen_spanish: y el pueblo no es advertido
  alternatives_spanish:
  - y el pueblo no toma aviso
  - y el pueblo no recibe advertencia
  lexicon: HALOT
  rationale: El nifal de זהר puede entenderse como ‘ser advertido’ o ‘tomar advertencia’. Dado que el foco inmediato está en la falla del centinela al no dar la señal, el pasivo ‘no es advertido’ preserva bien el sentido causal.
- source_word: וַתִּקַּח מֵהֶם נָפֶשׁ
  english_pob_choice: takes a life from among them
  chosen_spanish: quita una vida de entre ellos
  alternatives_spanish:
  - toma una vida de entre ellos
  - quita a uno de ellos
  lexicon: HALOT
  rationale: נָפֶשׁ aquí refiere a una vida/persona individual. ‘Quita una vida’ conserva el valor idiomático y suena natural en español, sin perder la referencia concreta a una persona.
- source_word: הוּא
  english_pob_choice: that one
  chosen_spanish: esa persona
  alternatives_spanish:
  - él
  - ese hombre
  lexicon: HALOT
  rationale: El pronombre retoma al individuo mencionado, no al pueblo como colectivo. ‘Esa persona’ evita ambigüedad y refleja correctamente la singularidad del hebreo.
- source_word: בַּעֲוֺנוֹ
  english_pob_choice: in his iniquity
  chosen_spanish: por su iniquidad
  alternatives_spanish:
  - en su iniquidad
  - por su culpa
  - a causa de su pecado
  lexicon: HALOT
  rationale: עָוֹן puede denotar iniquidad, culpa o la carga de culpa/punición. ‘Por su iniquidad’ mantiene el vínculo moral y causal sin volver opaca la frase en español; además ayuda a conservar la tensión del contexto entre culpa propia y responsabilidad del centinela.
- source_word: נִלְקָח
  english_pob_choice: is taken away
  chosen_spanish: es tomada
  alternatives_spanish:
  - es quitada
  - es llevada
  - es arrebatada
  lexicon: HALOT
  rationale: El nifal de לקח expresa ser tomado por muerte o juicio. ‘Es tomada’ mantiene la pasiva hebrea y deja ver la pasiva de juicio, sin añadir interpretación excesiva.
- source_word: דָּמוֹ
  english_pob_choice: his blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre derramada
  - su sangre como culpa
  lexicon: HALOT
  rationale: En este contexto jurídico-moral, ‘sangre’ conserva el idioma legal del hebreo para la responsabilidad por una muerte. La expresión se deja literal porque el propio contexto explica su sentido.
- source_word: מִיַּד הַצֹּפֶה אֶדְרֹשׁ
  english_pob_choice: I will require ... from the watchman's hand
  chosen_spanish: exigiré ... de la mano del centinela
  alternatives_spanish:
  - pediré cuentas ... de la mano del centinela
  - cobraré ... de la mano del centinela
  lexicon: HALOT
  rationale: דרשׁ con מִיַּד es un modismo jurídico de exigir responsabilidad. ‘Exigiré de la mano del centinela’ conserva la imaginería hebrea y su fuerza legal, que en español puede sonar más natural que una paráfrasis explicativa.
theological_decisions:
- issue: Responsabilidad del centinela y culpa de la víctima
  english_pob_reading: The slain person is taken away in his own iniquity, yet God will require his blood from the watchman's hand because the watchman failed to warn.
  chosen_spanish_reading: La persona muere por su propia iniquidad, pero Dios exigirá su sangre de la mano del centinela por haber omitido la advertencia.
  alternative_spanish_readings:
  - La persona muere únicamente por culpa del centinela
  - La persona muere solo por su propia culpa sin relación con el centinela
  rationale: 'El hebreo conserva ambas afirmaciones a la vez: la persona es tomada en su iniquidad y, al mismo tiempo, hay una rendición de cuentas sobre el centinela. La traducción española preserva esa tensión sin resolverla en favor de una sola causa.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene una lectura condicional de כִּי, conserva la imagen concreta de ‘sword’, y deja intacta la tensión entre la culpa propia de la persona y la responsabilidad legal del centinela. No hubo cambios recientes en la revisión inglesa; esta versión española sigue esa misma línea sin suavizar los términos jurídicos.
  spanish_consistency_notes:
  - Se mantiene ‘centinela’ para הַצֹּפֶה, coherente con el uso profético del pasaje.
  - Se usa ‘trompeta’ para שׁוֹפָר por claridad y naturalidad en español, sin perder el sentido de señal de alarma.
  - ‘Sangre’ y ‘exigiré’ conservan el registro jurídico del texto hebreo.
  - Se evita sustituir la iniquidad por una glosa moral más débil; el texto mantiene el peso legal y teológico del original.
