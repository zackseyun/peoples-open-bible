id: ACT.15.2
reference: Acts 15:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: γενομένης ⸀δὲ στάσεως καὶ ζητήσεως οὐκ ὀλίγης τῷ Παύλῳ καὶ τῷ Βαρναβᾷ πρὸς αὐτοὺς ἔταξαν ἀναβαίνειν Παῦλον καὶ Βαρναβᾶν καί τινας ἄλλους ἐξ αὐτῶν πρὸς τοὺς ἀποστόλους καὶ πρεσβυτέρους εἰς Ἰερουσαλὴμ περὶ τοῦ ζητήματος τούτου.
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/002.yaml
  text: And after no small dissension and debate had arisen between Paul and Barnabas and them[c][b][a], they appointed Paul and Barnabas and some others from among them to go up to the apostles and elders in Jerusalem about this issue.
  footnotes:
  - marker: a
    text: Or 'not a little dissension and debate.' The Greek uses a litotes ('no small') to emphasize the seriousness of the dispute.
    reason: lexical_alternative
  - marker: b
    text: '''Go up'' is the Greek idiom commonly used for travel to Jerusalem.'
    reason: cultural_note
  - marker: c
    text: Or 'about this matter' or 'about this question.'
    reason: lexical_alternative
translation:
  language: ko
  text: 바울과 바나바와 그들 사이에 적지 않은 분쟁과 논쟁이 일어나자, 바울과 바나바와 그들 가운데 다른 몇 사람을 이 문제에 관하여 예루살렘으로 올라가 사도들과 장로들에게 가도록 정하였습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: στάσεως καὶ ζητήσεως
  english_pob_choice: dissension and debate
  chosen_korean: 분쟁과 논쟁
  alternatives_korean:
  - 소요와 토론
  - 다툼과 변론
  lexicon: BDAG
  rationale: 두 단어가 짝을 이루어 격렬한 의견 대립을 묘사한다. 「분쟁」과 「논쟁」은 한국어에서 자연스럽게 짝을 이룬다.
- source_word: πρεσβυτέρους
  english_pob_choice: elders
  chosen_korean: 장로들
  alternatives_korean:
  - 원로들
  lexicon: BDAG
  rationale: 15장 예루살렘 교회 지도자 문맥에서 πρεσβύτεροι는 직제로서의 「장로」를 가리킨다.
