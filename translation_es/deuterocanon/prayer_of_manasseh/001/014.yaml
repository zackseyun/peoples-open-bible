    issue: «al que era indigno» no representa fielmente ἀνάξιον ὄντα
    rationale: 'El griego describe al hablante mismo en participio presente: «siendo indigno» / «aunque soy indigno». La redacción actual introduce tercera persona y pasado («era»), alterando persona, tiempo y fuerza concesiva.'
  - severity: medium
    issue: «bondad» no sigue del todo la decisión auditada de traducir χρηστότης como el equivalente de «kindness»
    rationale: Aunque «bondad» es defendible, la auditoría inglesa cambió deliberadamente de «goodness» a «kindness» para mantener el vínculo temático con el v. 11. En español conviene una opción que preserve mejor ese matiz relacional; «bondad» es aceptable pero menos precisa respecto al rastro documentado.
  - severity: low
    issue: La nota [b] no coincide con la razón preservada en el rastro inglés
    rationale: La nota inglesa documenta «Or 'goodness'» como recuerdo de una traducción previa, no una alternativa de «gran misericordia». La nota española actual introduce una alternativa distinta, no la documentada.
  revised_spanish_text: y en mí mostrarás tu bondad[a]; porque me salvarás, aunque soy indigno, conforme a tu abundante misericordia,
