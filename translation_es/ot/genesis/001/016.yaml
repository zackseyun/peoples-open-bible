translation:
  language: es
  text: 'Y Dios hizo los dos grandes luminares: el luminar mayor para regir el día, y el luminar menor para regir la noche, y las estrellas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - fabricó
  - dispuso
  lexicon: HALOT
  rationale: עשה expresa aquí la acción de realizar/crear. En español, «hizo» es natural y fiel; «dispuso» introduciría demasiado la función y «fabricó» sonaría inadecuado para el registro del pasaje.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: En Génesis 1, אֱלֹהִים con verbo singular refiere al Dios único. «Dios» conserva el sentido y el registro bíblico en español.
- source_word: שְׁנֵי הַמְּאֹרֹת הַגְּדֹלִים
  english_pob_choice: the two great lights
  chosen_spanish: los dos grandes luminarios
  alternatives_spanish:
  - los dos grandes luminares
  - los dos grandes luces
  lexicon: HALOT
  rationale: מְאֹרֹת designa cuerpos que dan luz, es decir, luminarios/luminares. Se evita «sol» y «luna» porque el hebreo usa el término genérico. «Luminarios» mantiene la referencia concreta sin perder la dicción del texto.
- source_word: הַמָּאוֹר הַגָּדֹל
  english_pob_choice: the greater light
  chosen_spanish: el luminario mayor
  alternatives_spanish:
  - la luz mayor
  - el gran luminario
  - el luminario más grande
  lexicon: HALOT
  rationale: El inglés POB eligió «greater light» para reflejar el contraste con «lesser light». En español, «luminario mayor» conserva el paralelismo y evita sustituir el sustantivo concreto por una abstracción excesiva como «luz».
- source_word: לְמֶמְשֶׁלֶת הַיּוֹם
  english_pob_choice: to rule the day
  chosen_spanish: para regir el día
  alternatives_spanish:
  - para gobernar el día
  - para tener dominio sobre el día
  - para regir sobre el día
  lexicon: HALOT
  rationale: מֶמְשֶׁלֶת expresa dominio o gobierno. «Regir» suena digno y natural en español bíblico moderno, preservando la idea de función de gobierno sin sobrecargarla.
- source_word: הַמָּאוֹר הַקָּטֹן
  english_pob_choice: the lesser light
  chosen_spanish: el luminario menor
  alternatives_spanish:
  - la luz menor
  - el luminario pequeño
  - el luminario más pequeño
  lexicon: HALOT
  rationale: קָטֹן es «pequeño/menor». «Menor» mantiene el paralelismo con «mayor» y conserva la comparación implícita que la POB inglesa también retuvo.
- source_word: לְמֶמְשֶׁלֶת הַלַּיְלָה
  english_pob_choice: to rule the night
  chosen_spanish: para regir la noche
  alternatives_spanish:
  - para gobernar la noche
  - para tener dominio sobre la noche
  - para regir sobre la noche
  lexicon: HALOT
  rationale: Se mantiene la misma solución que en «regir el día» para conservar simetría y el sentido de función gubernativa.
- source_word: וְאֵת הַכּוֹכָבִים
  english_pob_choice: and the stars
  chosen_spanish: y las estrellas
  alternatives_spanish:
  - y también las estrellas
  - y además las estrellas
  lexicon: HALOT
  rationale: כּוֹכָבִים se traduce de forma directa como «estrellas». La coordinación simple reproduce el encadenamiento hebreo sin añadir énfasis que el texto no exige.
theological_decisions:
- issue: Nombrar o no nombrar el sol y la luna
  english_pob_reading: Retain 'greater light' and 'lesser light' rather than 'sun' and 'moon.'
  chosen_spanish_reading: Conservar «luminario mayor» y «luminario menor» en vez de «sol» y «luna».
  alternative_spanish_readings:
  - el sol y la luna
  - la luz mayor y la luz menor
  rationale: El hebreo no usa los nombres ordinarios del sol y la luna, sino el término genérico para luminario/luz. La traducción española mantiene esa elección para respetar la dicción original y la decisión auditada de la POB inglesa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de usar una raya antes de «the stars» a una coordinación más natural con coma y «and». En español se adoptó una coordinación simple con «y las estrellas», sin necesidad de marcar una ruptura adicional. No se detectan otros cambios relevantes en el sentido o la lexicografía.
  spanish_consistency_notes:
  - Se preserva el paralelismo mayor/menor para reflejar la oposición de גָּדֹל / קָטֹן.
  - Se evita «sol» y «luna» para mantener la primacía del lexema hebreo מָאוֹר.
  - «Regir» se usa de forma consistente en ambos miembros para traducir לְמֶמְשֶׁלֶת.
  - El registro es bíblico-formal, pero con sintaxis natural en español moderno.
