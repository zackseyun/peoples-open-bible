revisions:
- from: Porque no fue por su espada que tomaron posesión de la tierra[a], ni su brazo los salvó; sino tu mano derecha, tu brazo y la luz de tu rostro[b], porque te complaciste en ellos.
  to: Porque no poseyeron la tierra por su espada, ni su brazo los salvó; sino que tu mano derecha, tu brazo y la luz de tu rostro[a] lo hicieron[b], porque te deleitaste en ellos.
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las frases correctas. Se hizo más directa la primera cláusula con «no poseyeron la tierra por su espada», más cercana al hebreo y más natural en español. Se añadió «lo hicieron» para explicitar la elipsis de la cláusula positiva y mantener claro el contraste entre medios humanos y acción divina. Se ajustó «te complaciste en ellos» a «te deleitaste en ellos» para reflejar mejor la decisión léxica documentada.
