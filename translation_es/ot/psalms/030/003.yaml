translation:
  language: es
  text: Oh, Yahvé, mi Dios[a], clamé a ti[b], y me sanaste[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo «YHWH»; tradicionalmente se traduce «el SEÑOR». Alternativas: «Yahvé» y «Jehová».'
    reason: alternative_reading
  - marker: b
    text: 'O: «clamé a ti por ayuda».'
    reason: lexical_alternative
  - marker: c
    text: «Me sanaste» puede referirse a sanidad física o a restauración/liberación más general según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio divino YHWH. En español del proyecto, la forma base es “Yahvé”, que conserva el nombre del pacto sin sustituirlo por un título genérico.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona singular exige un posesivo explícito en español; “mi Dios” reproduce de modo natural el vocativo del hebreo.
- source_word: שִׁוַּעְתִּי
  english_pob_choice: I cried out
  chosen_spanish: clamé
  alternatives_spanish:
  - grité
  - clame por ayuda
  lexicon: HALOT
  rationale: El verbo שׁוע expresa un clamor intenso de súplica. “Clamé” conserva ese valor elevado y urgente sin añadir de más ni reducirlo a un mero “llamé”.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - a usted
  lexicon: HALOT
  rationale: La preposición con sufijo de segunda persona masculina singular se rinde de forma directa y natural como “a ti”. En español evita el arcaísmo “a ti clamá[r]” y mantiene la dirección personal del ruego.
- source_word: וַתִּרְפָּאֵנִי
  english_pob_choice: and you healed me
  chosen_spanish: y me sanaste
  alternatives_spanish:
  - y me curaste
  - y me restauraste
  lexicon: HALOT
  rationale: De רפא, “sanar/curar”. “Me sanaste” es claro y fiel, y deja abierta la tensión documentada entre sanidad física y restauración más amplia sin resolverla innecesariamente.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo emplea el Tetragrama directamente. En español, “Yahvé” preserva el nombre revelado de Dios y evita el ocultamiento tras un título como “Señor”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de וַתִּרְפָּאֵנִי / רפא
  english_pob_reading: healed me
  chosen_spanish_reading: me sanaste
  alternative_spanish_readings:
  - me restauraste
  - me curaste
  rationale: Como en la auditoría inglesa, el verbo puede aludir a sanidad corporal o a restauración/deliverancia más amplia. “Me sanaste” conserva esa apertura teológica y sigue siendo la equivalencia más directa en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador español sigue de cerca el texto hebreo y la lectura auditada en inglés, sin introducir ajustes no respaldados por la fuente.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como “Yahvé”, coherente con el criterio del proyecto para יְהוָה.
  - Se usa “mi Dios” como vocativo poseído, sin añadir artículos innecesarios.
  - “Clamé” preserva el tono súplice e intenso de שׁוּעַ/שִׁוַּעְתִּי.
  - “Me sanaste” conserva la ambigüedad lexical-teológica de רפא, evitando restringir el sentido a una curación meramente médica.
