translation:
  language: es
  text: Pero si la mancha blanca está en la piel de su carne[a], y no parece más profunda que la piel, y su pelo no se ha vuelto blanco, entonces el sacerdote aislará el área afectada[c] por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'mancha brillante' o 'parche brillante' para la lesión cutánea descrita aquí.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'la lesión' o 'la mancha afectada'; se refiere al área afectada que el sacerdote examina.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּהֶרֶת
  english_pob_choice: bright spot
  chosen_spanish: mancha
  alternatives_spanish:
  - mancha brillante
  - mancha blanca
  - lesión
  lexicon: HALOT
  rationale: En este contexto levítico el término designa una marca/lesión visible en la piel. 'Mancha' es natural en español y evita tanto 'plaga' como un tecnicismo innecesario; el matiz de blancura ya queda expresado por לְבָנָה.
- source_word: לְבָנָה
  english_pob_choice: white
  chosen_spanish: blanca
  alternatives_spanish:
  - blanquecina
  lexicon: HALOT
  rationale: Es el adjetivo directo de color; 'blanca' comunica con claridad el rasgo diagnóstico sin sobreinterpretar.
- source_word: בְּעוֹר בְּשָׂרוֹ
  english_pob_choice: in the skin of his flesh
  chosen_spanish: en la piel de su carne
  alternatives_spanish:
  - en la piel de su cuerpo
  - sobre la piel de su cuerpo
  lexicon: HALOT
  rationale: Conservo la expresión anatómica hebrea de modo bastante literal, porque el texto distingue la piel y la carne/cuerpo. Aunque suena formal, es legible y mantiene la textura del original.
- source_word: וְעָמֹק אֵין מַרְאֶהָ מִן הָעוֹר
  english_pob_choice: its appearance is not deeper than the skin
  chosen_spanish: su apariencia no está más profunda que la piel
  alternatives_spanish:
  - no parece estar más profunda que la piel
  - su aspecto no es más profundo que la piel
  lexicon: HALOT
  rationale: '''Apariencia'' refleja מַרְאֶה y la comparación de profundidad se conserva con una formulación natural en español. Mantiene el criterio visual/diagnóstico del hebreo.'
- source_word: וּשְׂעָרָהּ
  english_pob_choice: its hair
  chosen_spanish: su pelo
  alternatives_spanish:
  - su cabello
  - el pelo que tiene
  lexicon: HALOT
  rationale: '''Pelo'' es más neutral que ''cabello'' para una observación de la piel/lesión. El sufijo posesivo se mantiene con ''su''.'
- source_word: לֹא הָפַךְ לָבָן
  english_pob_choice: has not turned white
  chosen_spanish: no se ha vuelto blanco
  alternatives_spanish:
  - no ha cambiado a blanco
  - no ha blanqueado
  lexicon: HALOT
  rationale: '''Volverse blanco'' expresa bien el cambio de estado del hebreo הָפַךְ en este contexto. Es idiomático y preciso.'
- source_word: וְהִסְגִּיר
  english_pob_choice: shall isolate
  chosen_spanish: aislará
  alternatives_spanish:
  - pondrá en aislamiento
  - retendrá
  lexicon: HALOT
  rationale: Sigo la decisión auditada de comunicar el procedimiento de separación temporal con 'aislar', que es claro en español moderno y evita el arcaísmo de 'encerrar' o 'quarantinar'.
- source_word: אֶת־הַנֶּגַע
  english_pob_choice: the affected area
  chosen_spanish: la lesión
  alternatives_spanish:
  - el área afectada
  - la mancha
  - el padecimiento
  lexicon: HALOT
  rationale: '''Lesión'' reproduce bien el objeto físico examinado por el sacerdote y conserva la neutralidad diagnóstica del inglés POB. Evita ''plaga'' por su carga interpretativa más fuerte.'
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: '''Por siete días'' es una forma natural en español para la duración del aislamiento y mantiene el valor temporal de la expresión.'
translation_notes:
  revision_awareness: Se tomó en cuenta la auditoría inglesa con acuerdo moderado y sin cambios aplicados; no se requirió revisar el sentido base. La principal decisión española fue conservar el registro técnico-legal de Levítico 13 con términos naturales ('mancha', 'lesión', 'aislar') y mantener la comparación anatómica del hebreo ('piel de su carne').
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el nombre divino.
  - Se preserva la distinción entre 'piel', 'carne' y 'lesión' para no nivelar el léxico diagnóstico.
  - '''Aislar'' se usa como equivalente funcional de la separación temporal ritual/procedimental, coherente con el audit trail inglés.'
