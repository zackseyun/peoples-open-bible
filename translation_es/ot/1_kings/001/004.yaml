  - severity: low
    issue: La nota al pie está formulada con puntuación y comillas poco naturales
    rationale: 'La redacción actual (''O: ...'') y el anidamiento de comillas resultan torpes en español. Conviene una formulación directa y clara que explique el eufemismo.'
