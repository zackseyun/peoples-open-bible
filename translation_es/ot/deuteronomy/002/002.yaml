lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Yahvé ... habló
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Entonces» comunica mejor la secuencia que un simple «Y», y «dijo» conserva el verbo de habla básico del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma POB «Yahvé», en lugar de sustituirlo por un título o una forma eclesiástica tradicional.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - hacia mí
  lexicon: HALOT
  rationale: Con «dijo» en español, el dativo de destinatario se expresa naturalmente con «me»; la idea de dirección hacia el hablante queda implícita y fiel al hebreo.
- source_word: לֵאמֹר
  english_pob_choice: ', saying,'
  chosen_spanish: diciendo,
  alternatives_spanish:
  - para decir,
  - —
  lexicon: HALOT
  rationale: Se mantiene la función introductoria de la fórmula infinitiva sin omitirla, tal como el audit trail inglés decidió explicitarla con «saying» para no perder completitud del texto.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El pasaje contiene directamente el Tetragrámaton. La traducción debe preservar el nombre pactal de Dios y no ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión que añadió explícitamente «saying» para reflejar לֵאמֹר; la versión española sigue esa decisión conservando «diciendo» en vez de omitir la fórmula.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evitó «el SEÑOR» para no perder el nombre divino explícito del hebreo.
  - «Entonces» reproduce el progreso narrativo del waw consecutivo sin sonar arcaico.
  - La puntuación con coma tras «diciendo» deja la oración abierta hacia el discurso siguiente, como en el original.
