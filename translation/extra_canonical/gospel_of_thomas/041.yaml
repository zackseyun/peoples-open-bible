translation:
  text: Jesus said[a], “Whoever has something in his hand, they will give to him;
    and whoever does not have[f][e][d][c][b], they will take even the little that
    he has from him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic possessive construction ⲟⲩⲛⲧⲁ- with object pronoun (here ⲧⲟϥ
      ‘it’) can be expletive, effectively meaning ‘to have (something).’ Hence ‘something’
      is supplied for clarity.
    reason: lexical_alternative
  - marker: b
    text: The 3rd plural verbs (‘they will give/take’) function impersonally in Sahidic,
      roughly equivalent to English ‘it will be given/taken.’ The translation keeps
      the impersonal ‘they’ to reflect the Coptic.
    reason: dialect_note
  - marker: c
    text: ⲡⲕⲉϣⲏⲙ literally ‘the little (one/thing),’ a substantivized adjective; it
      can mean a small amount or ‘the few.’ The rendering ‘the little’ preserves the
      deliberate terseness.
    reason: lexical_alternative
  - marker: d
    text: Diplomatic transcription has ⲛ̄ⲧⲟⲟⲧϥ̄ ‘from him’; the normalized line shows
      ⲛⲧⲛⲛⲧⲟϥ. This draft follows the straightforward prepositional phrase ‘from him.’
    reason: textual_variant
  - marker: e
    text: For comparison see Mark 4:25; Matt 13:12; Luke 8:18; 19:26, which share
      the aphorism in passive voice and without ‘in his hand.’
    reason: cross_reference
  - marker: f
    text: Or 'the little that he has will be taken away from him.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - Jesus speaks
  lexicon: Crum; Lambdin
  rationale: Standard narrative verb ⲡⲉϫⲉ “to say/speak”; simple past “said” fits
    Thomas’s terse style.
- source_word: ⲡⲉⲧⲉⲣⲉⲟⲩⲛⲧⲁⲛⲧⲟϥ
  chosen: whoever has [something]
  alternatives:
  - the one who possesses
  - whoever has it
  lexicon: Layton (Coptic Grammar) on relative ⲡⲉⲧⲉ- and possessive construction ⲟⲩⲛⲧⲁ-
  rationale: Relative clause with ⲡⲉⲧⲉ- + ⲟⲩⲛⲧⲁ- expresses possession; the pronominal
    object ⲧⲟϥ functions as an expletive. Rendered with “something” for English clarity.
- source_word: ϩⲛⲡⲉϥϭⲓϫ
  chosen: in his hand
  alternatives:
  - in his palm
  lexicon: Crum s.v. ϭⲓϫ
  rationale: Literal spatial phrase; ϭⲓϫ = ‘hand’.
- source_word: ⲛⲧⲟⲟⲩⲛⲁϯ
  chosen: they will give
  alternatives:
  - it will be given
  lexicon: Lambdin; Layton on impersonal 3pl as generic agent
  rationale: 3rd plural future + ⲛⲁ- indicates impersonal generic agent; retained
    as “they will give” to reflect the Coptic construction.
- source_word: ⲛⲁⲛⲧⲟϥ
  chosen: to him
  alternatives:
  - for him
  lexicon: Lambdin
  rationale: Dative/benefactive ⲛⲁ- + 3ms pronoun.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲛⲧⲁⲛⲧⲟϥ
  chosen: whoever does not have
  alternatives:
  - the one who lacks
  lexicon: Layton on negative relative forms (ⲙⲛⲧ-)
  rationale: Negative relative with ⲙⲛⲧ- negating the possessive construction.
- source_word: ⲡⲕⲉϣⲏⲙ
  chosen: the little
  alternatives:
  - the small (amount)
  - the few
  lexicon: Crum s.v. ϣⲏⲙ ‘small’; cf. use of ⲕⲉ- as determiner
  rationale: Substantivized adjective meaning ‘the little (thing/amount).’ Retained
    as ‘the little’ to preserve terse ambiguity.
- source_word: ⲉⲧⲉⲣⲉⲟⲩⲛⲧⲁⲛⲧⲟϥ
  chosen: that he has
  alternatives:
  - which he possesses
  lexicon: Layton
  rationale: Relative clause specifying the possessed item.
- source_word: ⲛⲧⲟⲟⲩⲛⲁϥⲓϥ
  chosen: they will take it
  alternatives:
  - it will be taken
  - they will carry it off
  lexicon: Crum s.v. ϥⲓ ‘take, carry’
  rationale: 3pl future used impersonally again; object pronominal ⲥ=ϥ indicates ‘it’.
- source_word: ⲛ̄ⲧⲟⲟⲧϥ̄ (norm. given also as ⲛⲧⲛⲛⲧⲟϥ)
  chosen: from him
  alternatives:
  - away from him
  lexicon: Layton on disjunctive preposition ⲛ̄ⲧⲟⲟⲧ-
  rationale: Disjunctive prepositional phrase of separation; translates straightforwardly
    as ‘from him.’
textual_note: No lacunae in NH II,40 for this saying. The line-level transcription
  reads ⲛ̄ⲧⲟⲟⲧϥ̄ ‘from him’ (NHAM02.40 / lb 18), while the normalized line shows ⲛⲧⲛⲛⲧⲟϥ.
  We follow the clear disjunctive preposition ⲛ̄ⲧⲟⲟⲧϥ̄ (‘from him’) as in the diplomatic
  reading; the normalized form likely reflects orthographic assimilation or a normalization
  artifact. Sahidic with Lycopolitan features are present in the possessive relative
  ⲟⲩⲛⲧⲁ- with expletive object pronoun and in the impersonal 3pl futures (ⲛⲧⲟⲟⲩⲛⲁ-).
