translation:
  language: es
  text: Los planes malos[a] son una abominación para Yahvé, pero las palabras agradables[b] son puras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'planes de mal' o 'intrigas malvadas'.
    reason: lexical_alternative
  - marker: b
    text: 'Orden hebreo: ''y/pero puras son palabras agradables''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - algo abominable
  lexicon: HALOT
  rationale: Conserva la fuerza moral y de pacto del término en proverbios. En español, 'abominación' mantiene el peso fuerte del hebreo sin suavizarlo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre divino explícito, por lo que se traslada como 'Yahvé' conforme al criterio del proyecto, no como sustituto reverencial.
- source_word: מַחְשְׁב֣וֹת
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - pensamientos
  - designios
  - esquemas
  lexicon: HALOT
  rationale: En este proverbio el sustantivo contrasta con 'palabras' en el segundo miembro, y 'planes' comunica bien la orientación deliberada de מחשבות sin volverlo demasiado abstracto.
- source_word: רָע
  english_pob_choice: of evil
  chosen_spanish: malos
  alternatives_spanish:
  - de mal
  - malvados
  - malvados en sus planes
  lexicon: HALOT
  rationale: El hebreo califica los 'planes' con רע. En español, el adjetivo pospuesto 'malos' expresa esa cualidad de modo natural y directo sin introducir un complemento innecesario.
- source_word: טְהֹרִים
  english_pob_choice: pure
  chosen_spanish: puras
  alternatives_spanish:
  - limpias
  - puras y limpias
  lexicon: HALOT
  rationale: '''Puras'' conserva el valor moral/ético del adjetivo hebreo. En español, concuerda con ''palabras'' y evita una lectura meramente ritual donde el contexto es sapiencial.'
- source_word: אִמְרֵי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  - frases
  lexicon: HALOT
  rationale: '''Palabras'' es la equivalencia más natural para el plural constructo de אמר y encaja con el paralelismo proverbial.'
- source_word: נֹעַם
  english_pob_choice: pleasant
  chosen_spanish: agradables
  alternatives_spanish:
  - gratas
  - dulces
  - amables
  lexicon: HALOT
  rationale: El sustantivo denota lo agradable, placentero o grato. 'Agradables' refleja bien esa cualidad en español sin cargar el término con matices litúrgicos ajenos al proverbio.
theological_decisions:
- issue: Nombre divino en el primer cola
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: Se preserva el nombre del pacto presente en el hebreo (יְהוָה) y se evita el reemplazo tradicional por un título. La forma 'Yahvé' es la convención del proyecto y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Orden hebreo del segundo cola
  english_pob_reading: but pleasant words are pure
  chosen_spanish_reading: pero las palabras agradables son puras
  alternative_spanish_readings:
  - y puras son palabras agradables
  - pero puras son las palabras agradables
  rationale: El hebreo presenta el adjetivo antes del sintagma nominal. En español se adopta el orden más natural, sin perder el paralelismo antitético ni la observación textual del orden hebreo.
  doctrine_reference: Proverbios 15:26; audit trail lexical note on Hebrew word order
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés auditado, que prefirió 'plans' frente a 'thoughts of evil' para מַחְשְׁבוֹת רָע. En español se reflejó esa decisión con 'planes malos', manteniendo el contraste con 'palabras agradables' y el registro sapiencial breve del proverbio.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con la terminología del proyecto para יְהוָה.
  - Se mantiene 'abominación' para תּוֹעֲבַת por su fuerza ética y covenantal.
  - Se evita 'Cristo' u otro término no pertinente al versículo.
  - '''Puras'' se reserva para טְהֹרִים en sentido moral/ético, no ceremonial.'
  - La puntuación reproduce el paralelismo antitético con coma antes de 'pero'.
