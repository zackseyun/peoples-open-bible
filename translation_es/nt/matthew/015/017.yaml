translation:
  language: es
  text: ¿No entienden que todo lo que entra en la boca pasa al estómago y es expulsado a la letrina?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que entra en la boca ... es expulsado a la alcantarilla/la privada».
    reason: lexical_alternative
lexical_decisions:
- source_word: νοεῖτε
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - perciben
  - comprenden
  lexicon: BDAG
  rationale: En esta pregunta de reprensión, νοέω expresa captación mental del argumento de Jesús. «Entienden» es natural en español y conserva el sentido de comprensión, no de mera percepción sensorial.
- source_word: πᾶν τὸ εἰσπορευόμενον
  english_pob_choice: everything entering
  chosen_spanish: todo lo que entra
  alternatives_spanish:
  - todo cuanto entra
  - todo lo que se introduce
  lexicon: BDAG
  rationale: La construcción articular de participio es genérica y neutra. «Todo lo que entra» mantiene el alcance amplio y suena idiomático en español sin perder la referencia a cualquier cosa que ingresa por la boca.
- source_word: στόμα
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - la boca
  lexicon: BDAG
  rationale: En español «boca» es el término normal y claro para la apertura por donde entra el alimento. No se requiere una opción más técnica.
- source_word: κοιλίαν
  english_pob_choice: stomach
  chosen_spanish: estómago
  alternatives_spanish:
  - vientre
  - abdomen
  lexicon: BDAG
  rationale: En este contexto digestivo, κοιλία se refiere al órgano o interior donde pasa el alimento. «Estómago» es más preciso y natural que «vientre» para el lector actual.
- source_word: χωρεῖ
  english_pob_choice: goes into
  chosen_spanish: pasa
  alternatives_spanish:
  - va
  - entra
  lexicon: BDAG
  rationale: Aquí χωρέω describe el tránsito del alimento hacia el estómago. «Pasa» conserva la idea de desplazamiento de forma fluida y no sobreliteral.
- source_word: ἀφεδρῶνα
  english_pob_choice: latrine
  chosen_spanish: letrina
  alternatives_spanish:
  - privada
  - retrete
  - excusado
  lexicon: BDAG
  rationale: ἀφεδρών designa un lugar de evacuación, una letrina. «Letrina» es fiel, digna y evita tanto el tecnicismo anacrónico como la coloquialidad excesiva.
- source_word: ἐκβάλλεται
  english_pob_choice: is expelled
  chosen_spanish: es expulsado
  alternatives_spanish:
  - es arrojado
  - es eliminado
  - sale
  lexicon: BDAG
  rationale: La pasiva de ἐκβάλλω presenta la salida forzada del desecho. «Es expulsado» preserva la fuerza física del verbo sin crudeza innecesaria.
theological_decisions:
- issue: Alcance del dicho sobre pureza ritual
  english_pob_reading: Translate the physiological statement plainly without importing an explicit abrogation formula into the verse itself.
  chosen_spanish_reading: Traducir la afirmación fisiológica de manera directa, sin añadir en este versículo una formulación explícita sobre la abolición de las leyes alimentarias.
  alternative_spanish_readings:
  - 'Agregar una expansión interpretativa: «y por eso todos los alimentos quedan limpios»'
  - Suavizar el dicho para hacerlo menos polémico
  rationale: El versículo, por sí solo, describe el recorrido del alimento y sostiene el argumento de Jesús, pero no añade la glosa interpretativa que aparece en otros pasajes. Mantenerse cerca del griego evita importar una conclusión doctrinal que el texto aquí no formula explícitamente.
  doctrine_reference: Mateo 15:11, 15:17; Marcos 7:19
translation_notes:
  revision_awareness: Coincide con el contexto de revisión del POB en que no se introdujeron cambios posteriores; la redacción sigue la lectura griega directa y la elección léxica auditada para νοεῖτε, κοιλίαν y ἀφεδρῶνα.
  spanish_consistency_notes:
  - Se mantiene «letrina» para ἀφεδρών, en continuidad con el inglés POB y con el registro digno requerido.
  - Se usa «estómago» para κοιλία en el sentido digestivo, evitando «vientre» por ser menos preciso en este contexto.
  - 'La pregunta se vierte en forma natural de reprensión: «¿No entienden...?» para reflejar el tono discursivo de Jesús.'
