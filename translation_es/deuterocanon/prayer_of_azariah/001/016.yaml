  spanish_consistency_notes:
  - Se preserva la distinción entre 'alma' y 'espíritu' como en el original griego.
  - '''Quebrantada'' reproduce mejor el estado pasivo del participio que una simple cualidad moral.'
  - '''Aceptados'' refleja el valor de recepción favorable implícito en προσδεχθείημεν.'
  - El registro es bíblico pero en español contemporáneo, evitando calcos innecesarios.
