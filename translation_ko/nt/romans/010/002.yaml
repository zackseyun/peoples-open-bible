  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μαρτυρῶ γὰρ αὐτοῖς ὅτι ζῆλον θεοῦ ἔχουσιν· ἀλλ’ οὐ κατ’ ἐπίγνωσιν,
base_translation:
  language: en
  yaml_path: translation/nt/romans/010/002.yaml
  text: For I testify about them that they have zeal for God[a], but not according to knowledge[b],
  footnotes:
  - marker: a
    text: Or 'they have a zeal of God'; the Greek genitive could be rendered more literally, but here likely means zeal directed toward God.
    reason: lexical_alternative
  - marker: b
    text: Or 'not with full knowledge' or 'not based on knowledge.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 그들에 대하여 증언합니다. 그들은 하나님께 대한 열심이 있으나, 지식을 따른 것은 아닙니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζῆλον θεοῦ
  english_pob_choice: zeal for God
  chosen_korean: 하나님께 대한 열심
  alternatives_korean:
  - 하나님에 대한 열정
  lexicon: BDAG
  rationale: 「열심」은 종교적 헌신을 가리키는 정착된 한국어 신학 어휘.
- source_word: ἐπίγνωσιν
  english_pob_choice: knowledge
  chosen_korean: 지식
  alternatives_korean:
  - 바른 깨달음
  - 참된 인식
  lexicon: BDAG
  rationale: ἐπί 강의의 인식적 깊이를 「지식」으로 옮기되 단순한 정보가 아닌 영적 깨달음의 의미를 문맥이 보충한다.
