source:
  edition: SBLGNT
  text: εἰ γὰρ ἀποφυγόντες τὰ μιάσματα τοῦ κόσμου ἐν ἐπιγνώσει τοῦ ⸀κυρίου καὶ σωτῆρος Ἰησοῦ Χριστοῦ τούτοις δὲ πάλιν ἐμπλακέντες ἡττῶνται, γέγονεν αὐτοῖς τὰ ἔσχατα χείρονα τῶν πρώτων.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/020.yaml
  text: For if[a], after escaping the defilements of the world through the knowledge of the Lord and Savior Jesus Messiah, they are again entangled in these things and overcome[b], the last state has become worse for them than the first.
  footnotes:
  - marker: a
    text: Or 'through full knowledge of our Lord and Savior Jesus Christ/Messiah.' The Greek word can suggest fuller or more direct knowledge, though 'knowledge' is retained in the main text for natural English.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; rendered 'Jesus Messiah' here because Χριστός is treated as a title in this context.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들이 주이시며 구주이신 예수 메시아를 참지식으로 앎으로써 세상의 더러움을 피했다가 다시 그것들에 얽혀 지면, 그들의 나중 형편이 처음보다 더 나빠진 것입니다.
  philosophy: optimal-equivalence
