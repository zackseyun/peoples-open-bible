translation:
  language: es
  text: Y le contaron todas las palabras que Yosef les había dicho, y él vio las carretas[a] que Yosef había enviado para llevarlo, y el espíritu de su padre Yaakov revivió[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los carros». El término hebreo designa vehículos de transporte.
    reason: lexical_alternative
  - marker: b
    text: O «el espíritu de su padre Yaakov volvió a la vida», un modismo de vitalidad o ánimo renovado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ אֵלָיו
  english_pob_choice: when they told him
  chosen_spanish: y les contaron
  alternatives_spanish:
  - y le hablaron
  - y le dijeron
  lexicon: HALOT
  rationale: דבר con אֶל indica comunicación dirigida a alguien. En español, «contaron» conserva el valor de comunicar un relato o informe, que aquí encaja con la noticia que los hermanos transmiten a Yaakov. Mantiene el acto verbal sin volverlo demasiado literal o rígido.
- source_word: אֵת כָּל דִּבְרֵי יוֹסֵף
  english_pob_choice: all the words of Yosef
  chosen_spanish: todas las palabras que Yosef les había dicho
  alternatives_spanish:
  - todo lo que Yosef les había dicho
  - todas las palabras de Yosef
  lexicon: HALOT
  rationale: Se conserva la concreción de דִּבְרֵי como «palabras», siguiendo la decisión inglesa de no diluirlo en una paráfrasis total. En español, la estructura relativa evita una traducción forzada del genitivo y mantiene el contenido de la comunicación.
- source_word: אֲשֶׁר דִּבֶּר אֲלֵהֶם
  english_pob_choice: that he had spoken to them
  chosen_spanish: que Yosef les había dicho
  alternatives_spanish:
  - que había hablado a ellos
  - que les había hablado
  lexicon: HALOT
  rationale: El hebreo repite la raíz דבר. En español, «había dicho» es natural y preserva el valor de comunicación verbal; «hablar» sería posible, pero «decir» encaja mejor con el contenido reportado por los hermanos y evita una construcción poco idiomática.
- source_word: וַיַּרְא
  english_pob_choice: and he saw
  chosen_spanish: y él vio
  alternatives_spanish:
  - y vio
  - entonces vio
  lexicon: HALOT
  rationale: Se mantiene la secuencia narrativa simple del wayyiqtol con un pasado directo. Se añadió el pronombre explícito «él» para claridad referencial en español, aunque «vio» por sí solo también sería posible.
- source_word: הָעֲגָלוֹת
  english_pob_choice: the wagons
  chosen_spanish: los carros
  alternatives_spanish:
  - los carros de transporte
  - las carretas
  lexicon: HALOT
  rationale: Aunque «wagons» en inglés es natural, en español «carros» funciona como término amplio y digno para vehículos de transporte. «Carretas» también es posible, pero puede sonar más rural o específico; «carros» mantiene neutralidad y claridad.
- source_word: אֲשֶׁר שָׁלַח יוֹסֵף לָשֵׂאת אֹתוֹ
  english_pob_choice: that Yosef had sent to carry him
  chosen_spanish: que Yosef había enviado para llevarlo
  alternatives_spanish:
  - que Yosef había enviado para transportarlo
  - que Yosef había enviado para cargarlo
  lexicon: HALOT
  rationale: לָשֵׂאת literalmente es «llevar/cargar». «Llevarlo» es la opción más natural en español y conserva la idea de traslado sin introducir un tecnicismo innecesario. «Transportarlo» sería más explícito pero menos sobrio.
- source_word: וַתְּחִי רוּחַ
  english_pob_choice: the spirit ... revived
  chosen_spanish: revivió el espíritu
  alternatives_spanish:
  - volvió a vivir el espíritu
  - se reanimó el espíritu
  lexicon: HALOT
  rationale: 'Se conserva la metáfora de vida con «revivió», siguiendo la decisión inglesa de mantener el lenguaje de vida. El orden verbal en español se ajusta a la sintaxis natural: «revivió el espíritu de...». '
- source_word: יַעֲקֹב אֲבִיהֶם
  english_pob_choice: their father Yaakov
  chosen_spanish: de su padre Yaakov
  alternatives_spanish:
  - de su padre Jacob
  - de su padre Yaakov
  lexicon: HALOT
  rationale: Se mantiene la transliteración «Yaakov» conforme a la política del proyecto para nombres propios hebreos. La posesión se expresa de forma natural en español con «de su padre».
theological_decisions:
- issue: Nombre propio del patriarca יַעֲקֹב
  english_pob_reading: Yaakov
  chosen_spanish_reading: Yaakov
  alternative_spanish_readings:
  - Jacob
  rationale: Se conserva la transliteración del nombre hebreo, en coherencia con la política del proyecto de transliterar nombres propios en lugar de sustituirlos por la forma anglicizada/tradicional. No hay base textual para preferir «Jacob» sobre la forma hebrea aquí.
  doctrine_reference: Translation philosophy §2
- issue: Sentido de רוּחַ en וַתְּחִי רוּחַ
  english_pob_reading: the spirit ... revived
  chosen_spanish_reading: revivió el espíritu
  alternative_spanish_readings:
  - el espíritu volvió a vivir
  - el ánimo se reanimó
  rationale: El contexto permite la metáfora de revitalización interior sin exigir una lectura doctrinal específica. «Espíritu» mantiene la ambigüedad entre fuerza vital y aliento interior, como en el inglés auditado, sin reducirlo a «ánimo» ni a una paráfrasis explicativa.
  doctrine_reference: Lexical theology note on רוּחַ
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail inglés: conserva la conjunción narrativa simple «y» en lugar de introducir una transición temporal o adversativa, y mantiene la progresión directa de los tres movimientos de la frase: informe de las palabras, visión de los carros y revitalización del espíritu.'
  spanish_consistency_notes:
  - Se translitera Yosef y Yaakov de manera consistente con la política del proyecto para nombres hebreos.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se conserva la repetición verbal de comunicación y movimiento sin sobreparafrasear.
  - La puntuación española usa comas para separar las cláusulas coordinadas siguiendo el ritmo narrativo del hebreo.
