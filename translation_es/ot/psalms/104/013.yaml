    rationale: 'La alternativa ''O: «desde el fruto de tus obras»'' explica el valor de la preposición מִן en מִפְּרִי מַעֲשֶׂיךָ. Colocarla sobre ''aposentos altos'' hace que la nota parezca una alternativa para מֵעֲלִיּוֹתָיו, lo cual no corresponde al hebreo ni al audit trail inglés.'
