translation:
  language: es
  text: No serán avergonzados en tiempo de angustia[a][b], y en días de hambruna serán saciados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se avergonzarán»; el verbo hebreo puede referirse tanto a experimentar vergüenza como a quedar expuestos al oprobio.
    reason: lexical_alternative
  - marker: b
    text: O «en un tiempo de calamidad» o «en el tiempo del mal»; aquí «mal» se refiere a adversidad, no a mal moral.
    reason: lexical_alternative
  - marker: c
    text: O «serán llenados» o «tendrán de sobra».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: will not be put to shame
  chosen_spanish: No serán avergonzados
  alternatives_spanish:
  - No serán puestos en vergüenza
  - No quedarán avergonzados
  - No sufrirán vergüenza
  lexicon: HALOT
  rationale: בושׁ puede expresar tanto la experiencia interna de vergüenza como el quedar expuesto públicamente al oprobio. En español, «ser avergonzados» preserva bien ese sentido pasivo/resultativo y evita una lectura demasiado subjetiva.
- source_word: בְּעֵת רָעָה
  english_pob_choice: in a time of trouble
  chosen_spanish: en el tiempo de la angustia
  alternatives_spanish:
  - en un tiempo de calamidad
  - en el tiempo de la aflicción
  - en un tiempo de mal
  lexicon: HALOT
  rationale: עֵת es «tiempo» y רָעָה aquí señala adversidad o desastre, no mal moral. «Angustia» comunica una situación adversa de modo natural en español bíblico moderno, sin cargar el texto con una noción ética ajena al contexto.
- source_word: רָעָה
  english_pob_choice: trouble
  chosen_spanish: angustia
  alternatives_spanish:
  - calamidad
  - aflicción
  - adversidad
  lexicon: HALOT
  rationale: Aunque «trouble» en inglés es amplio, en este verso el término apunta a una situación de adversidad. «Angustia» recoge bien la presión y el aprieto de la circunstancia, manteniendo el valor no moral del hebreo.
- source_word: וּבִימֵי רְעָבוֹן
  english_pob_choice: and in days of famine
  chosen_spanish: y en los días de hambre
  alternatives_spanish:
  - y en días de hambre
  - y en los días de escasez
  - y en días de famine
  lexicon: HALOT
  rationale: רְעָבוֹן designa hambre severa o escasez extrema; en español, «hambre» es claro y suficientemente fuerte para el contexto poético, aunque «famine»/«famine» no sea el uso más natural en todas las regiones.
- source_word: יִשְׂבָּעוּ
  english_pob_choice: they will be satisfied
  chosen_spanish: serán saciados
  alternatives_spanish:
  - quedarán satisfechos
  - serán llenados
  - tendrán su lleno
  lexicon: HALOT
  rationale: שׂבע significa quedar saciado o lleno. «Serán saciados» conserva la imagen de provisión suficiente y el matiz pasivo del hebreo mejor que una formulación meramente psicológica como «estarán satisfechos».
translation_notes:
  revision_awareness: 'El texto inglés POB mantiene una lectura de alta concordancia con el hebreo y no presenta revisiones aplicadas; la redacción española sigue esa misma línea, conservando las tres tensiones léxicas principales: בושׁ, רָעָה y שׂבע.'
  spanish_consistency_notes:
  - Se evitó traducir YHWH o Cristo porque el versículo no los contiene.
  - «Angustia» y «hambre» se usaron como equivalentes naturales en español para adversidad y carestía, sin suavizar el contenido.
  - La nota b se vinculó al sintagma «tiempo de la angustia» para señalar la alternativa semántica de רָעָה.
