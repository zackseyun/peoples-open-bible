revisions:
- from: Y levantará de él un puñado de la flor de harina de la ofrenda vegetal[a] y algo de su aceite, con todo el incienso que está sobre la ofrenda vegetal[b], y quemará su porción memorial sobre el altar, como aroma agradable a Yahvé.
  to: Y tomará de ella[a] un puñado de la flor de harina de la ofrenda vegetal y algo de su aceite, con todo el franquincienso que está sobre la ofrenda vegetal, y quemará su porción memorial[b] sobre el altar, como aroma agradable a Yahvé.
  rationale: Se corrigió «incienso» a «franquincienso» para reflejar con precisión לְבֹנָה; se hizo más natural «levantará de él» a «tomará de ella» mientras se preserva la alternativa más literal en nota; y se ajustaron los marcadores de notas para que aparezcan en el texto y se anclen a las expresiones que realmente explican.
