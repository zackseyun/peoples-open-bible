translation:
  text: 'For you know the holy Scriptures—and know them well[a], beloved—and you have looked intently into the sayings of God. Therefore we write these things for remembrance.


    2. For when Moses had gone up onto the mountain and had spent forty days and forty nights in fasting and humiliation, God said to him, “Moses, Moses, come down quickly from here, because your people, whom you brought out of the land of Egypt, have acted lawlessly. They have quickly turned aside from the way that I commanded them; they have made molten images for themselves.”


    3. And the Lord said to him, “I have spoken to you once and twice, saying, ‘I have seen this people, and behold, it is stiff-necked. Leave me alone to utterly destroy them, and I will blot out their name from under heaven; and I will make you into a nation great and marvelous and far greater than this one.’”


    4. And Moses said, “By no means, Lord. Forgive this people their sin—or else blot me out from the book of the living.”


    5. O great love! O unsurpassable perfection! A servant speaks boldly to his Lord, asks forgiveness for the multitude[b][c][d][e][f][g], or even asks to be blotted out with them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verb rendered 'have bent closely over' pictures stooping or leaning over the divine words in careful attention.
    reason: lexical_alternative
    anchor_ref: '53:1'
  - marker: g
    text: Or 'the book of life'; the Greek more literally says 'the book of the living.'
    reason: lexical_alternative
    anchor_ref: '53:4'
  - marker: f
    text: '''Servant'' renders θεράπων, an honorable term for one in devoted attendance, not the more common δοῦλος.'
    reason: lexical_alternative
    anchor_ref: '53:5'
  - marker: e
    text: Clement is recalling the episode of Israel's sin with the calf and Moses' intercession; compare Exodus 32:7-32 and Deuteronomy 9:9-14.
    reason: cross_reference
    anchor_ref: 53:2-4
  - marker: d
    text: Or 'that I commanded them'.
    reason: previous_rendering
  - marker: c
    text: Or 'Leave me, that I may utterly destroy them'.
    reason: previous_rendering
  - marker: b
    text: Or 'humiliation'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐγκεκύφατε
  chosen: you have bent closely over
  alternatives:
  - you have looked intently into
  - you have stooped over
  lexicon: LSJ
  rationale: The verb conveys leaning or stooping over something attentively. 'Bent closely over' preserves the vivid physical metaphor of careful study better than a flatter 'studied.'
- source_word: λόγια
  chosen: sayings
  alternatives:
  - oracles
  - words
  lexicon: BDAG
  rationale: λόγια often carries the sense of divine utterances. 'Sayings of God' is accessible modern English while retaining sacred weight; 'oracles' is possible but more archaic.
- source_word: πρὸς ἀνάμνησιν
  chosen: for your remembrance
  alternatives:
  - as a reminder
  - to remind you
  lexicon: BDAG
  rationale: This keeps the formal, paraenetic tone and reflects the noun construction rather than recasting it too freely.
- source_word: ταπεινώσει
  chosen: humiliation
  alternatives:
  - humility
  - self-abasement
  lexicon: LSJ
  rationale: In the phrase 'in fasting and humiliation,' the term points to ascetic self-humbling rather than merely an inward virtue. 'Humiliation' preserves the stronger sense, though 'humility' is possible.
- source_word: ἠνόμησεν
  chosen: have acted lawlessly
  alternatives:
  - have sinned
  - have broken the law
  lexicon: BDAG
  rationale: The verb is stronger and more specific than a generic 'sinned,' highlighting transgression against divine order.
- source_word: χωνευτά
  chosen: molten images
  alternatives:
  - molten idols
  - cast images
  lexicon: LSJ
  rationale: The term refers to things made by melting/casting metal. 'Molten images' is idiomatic, scripturally resonant, and avoids adding 'idols' where the Greek says simply the cast objects.
- source_word: σκληροτράχηλος
  chosen: stiff-necked
  alternatives:
  - obstinate
  - hard-necked
  lexicon: BDAG
  rationale: This is a well-established biblical metaphor and best preserves the scriptural cadence Clement is invoking.
- source_word: ἐξολεθρεῦσαι
  chosen: utterly destroy
  alternatives:
  - wipe out
  - destroy completely
  lexicon: LSJ
  rationale: The compound intensifies the destruction. 'Utterly destroy' preserves that force and echoes biblical diction.
- source_word: ἐξαλείψω
  chosen: blot out
  alternatives:
  - wipe away
  - erase
  lexicon: BDAG
  rationale: '''Blot out'' is the standard biblical rendering in contexts of names/books and preserves intertextual resonance.'
- source_word: βίβλου ζώντων
  chosen: the book of the living
  alternatives:
  - the book of life
  - the scroll of the living
  lexicon: LSJ
  rationale: The Greek here is literally 'book of the living,' not the more traditional later phrase 'book of life.' The chosen rendering stays closer to the source while preserving the theological image.
- source_word: τελειότητος ἀνυπερβλήτου
  chosen: unsurpassable perfection
  alternatives:
  - incomparable perfection
  - perfection beyond compare
  lexicon: LSJ
  rationale: This exclamatory phrase praises the supreme quality of Moses' love. 'Unsurpassable perfection' preserves both the rhetorical elevation and the superlative force.
- source_word: παρρησιάζεται
  chosen: speaks boldly
  alternatives:
  - speaks with boldness
  - is bold
  lexicon: BDAG
  rationale: The verb denotes frank, fearless speech before one in authority. 'Speaks boldly' captures the active rhetorical force.
- source_word: θεράπων
  chosen: servant
  alternatives:
  - attendant
  - minister
  lexicon: BDAG
  rationale: θεράπων can denote a devoted attendant in honorable service. 'Servant' is the clearest English equivalent here and fits the Lord-servant contrast without the harsher bonded sense of δοῦλος.
- source_word: τῷ πλήθει
  chosen: the multitude
  alternatives:
  - the people
  - the crowd
  lexicon: LSJ
  rationale: The term emphasizes the mass of the people. 'Multitude' preserves the elevated register and collective sense.
- source_word: ἀξιοῖ
  chosen: pleads
  alternatives:
  - requests
  - deems worthy to ask
  lexicon: BDAG
  rationale: In context the verb expresses earnest petition rather than detached evaluation. 'Pleads' brings out the intercessory intensity of Moses' appeal.
theological_decisions:
- issue: Rendering βίβλου ζώντων
  chosen_reading: the book of the living
  alternative_readings:
  - the book of life
  rationale: The Greek text here reads literally 'book of the living.' Because the phrase evokes but does not exactly match the more familiar biblical expression 'book of life,' the main text preserves the source wording and leaves the traditional echo implicit.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Force of ταπεινώσει in Moses' ascetic preparation
  chosen_reading: humiliation
  alternative_readings:
  - humility
  rationale: The context is Moses' fasting and self-abasing posture before God. 'Humiliation' better preserves the concrete ascetic sense and rhetorical severity of Clement's wording.
  doctrine_reference: Original-language primacy over translation tradition.
