  - severity: low
    issue: '''Rebaño de toros'' suena algo menos idiomático en este contexto'
    rationale: Aunque comprensible, 'rebaño' se asocia más fácilmente con ovejas o ganado manso; 'manada de toros' conserva mejor la fuerza de la imagen sin apartarse del sentido.
  revised_spanish_text: Reprende a la bestia de los juncos[a], a la manada de toros entre los becerros de los pueblos, que pisa sobre piezas de plata[b]. Dispersa a los pueblos que se complacen en las guerras.
