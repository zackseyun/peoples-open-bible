id: HOS.2.21
reference: Hosea 2:21
source:
  edition: WLC
  text: וְ/אֵרַשְׂתִּ֥י/ךְ לִ֖/י לְ/עוֹלָ֑ם וְ/אֵרַשְׂתִּ֥י/ךְ לִ/י֙ בְּ/צֶ֣דֶק וּ/בְ/מִשְׁפָּ֔ט וּ/בְ/חֶ֖סֶד וּֽ/בְ/רַחֲמִֽים׃
translation:
  text: And I will betroth you to myself forever; yes[a], I will betroth you to myself in righteousness and in justice, and in steadfast love and in compassion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steadfast love.' The Hebrew חֶסֶד denotes loyal, covenantal love and mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵרַשְׂתִּיךְ
  chosen: I will betroth you
  alternatives:
  - I will espouse you
  - I will take you as my bride
  lexicon: HALOT
  rationale: The verb ארשׂ refers specifically to betrothal/engagement rather than the full marriage act. 'Betroth' preserves the covenant-marital imagery with appropriate specificity and avoids over-paraphrase.
- source_word: לִי
  chosen: to myself
  alternatives:
  - to me
  lexicon: HALOT
  rationale: Literally 'to me.' 'To myself' is idiomatic in English and brings out the personal, covenantal force of the dative without changing the sense.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  lexicon: HALOT
  rationale: '''Forever'' is the most natural modern English rendering for לעולם here, expressing enduring permanence in the covenant relationship.'
- source_word: בְּצֶדֶק
  chosen: in righteousness
  alternatives:
  - with righteousness
  - in rightness
  lexicon: HALOT
  rationale: צדק commonly denotes righteousness/right order. 'In righteousness' preserves the abstract moral-covenantal quality of the Hebrew and fits the repeated preposition pattern.
- source_word: וּבְמִשְׁפָּט
  chosen: and in justice
  alternatives:
  - and in judgment
  lexicon: HALOT
  rationale: משפט here is best rendered 'justice' rather than 'judgment,' since the context lists covenant virtues/qualities rather than acts of sentencing.
- source_word: וּבְחֶסֶד
  chosen: and in covenant love
  alternatives:
  - and in steadfast love
  - and in lovingkindness
  - and in loyal love
  lexicon: HALOT
  rationale: חסד is a theologically rich covenant term. 'Covenant love' makes the relational loyalty explicit for modern readers, while preserving the covenantal dimension better than the broader 'love.'
- source_word: וּבְרַחֲמִים
  chosen: and in compassion
  alternatives:
  - and in mercies
  - and in tender mercy
  lexicon: HALOT
  rationale: Though morphologically plural, רחמים often functions as an abstract noun. 'Compassion' is natural modern English and conveys the affective mercy intended in this covenant-restoration context.
