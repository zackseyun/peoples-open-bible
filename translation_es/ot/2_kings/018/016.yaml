  to: En aquel tiempo Ezequías cortó las puertas del templo de Yahvé y los postes de las puertas[a] que Ezequías, rey de Judá, había recubierto, y se los entregó al rey de Asiria.
  rationale: Se elimina la nota doctrinal sobre «Yahvé» por ser redundante en este contexto y se conserva únicamente la nota léxica necesaria sobre הָאֹמְנוֹת, que sí refleja una incertidumbre real del hebreo. El texto principal permanece sustancialmente igual porque ya era fiel y natural en español.
