translation:
  language: es
  text: Así mi ira[a] se agotará, y haré reposar mi furor sobre ellos, y me consolaré. Entonces sabrán que yo, Yahvé, he hablado en mis celos[b], cuando agote mi furor sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi furor se agotará»; el hebreo combina el fin de la ira con la idea de que el juicio ha llegado a su consumación.
    reason: lexical_alternative
  - marker: b
    text: O «en mi celo»; el término hebreo puede expresar celos o celo. Aquí «celos» preserva mejor la fuerza relacional y pactual del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָלָה אַפִּי
  english_pob_choice: my anger will be spent
  chosen_spanish: mi ira se agotará
  alternatives_spanish:
  - mi furor se agotará
  - mi enojo se acabará
  - mi ira llegará a su fin
  lexicon: HALOT
  rationale: אַף expresa aquí ira; para español bíblico claro, 'ira' preserva el campo semántico más natural. כָלָה comunica consumación/exhaustión, por eso 'se agotará' refleja que la ira llega a su término.
- source_word: וַהֲנִחוֹתִי חֲמָתִי
  english_pob_choice: I will cause my wrath to rest on them
  chosen_spanish: haré reposar mi furor sobre ellos
  alternatives_spanish:
  - haré descansar mi furor sobre ellos
  - pondré mi furor sobre ellos
  - haré que mi furor repose sobre ellos
  lexicon: HALOT
  rationale: נוח en causativo con חֵמָה/חֲמָה expresa poner o hacer reposar el furor sobre el objeto. 'Haré reposar' conserva la imagen verbal y evita suavizarla a una abstracción.
- source_word: וְהִנֶּחָמְתִּי
  english_pob_choice: I will be comforted
  chosen_spanish: me consolaré
  alternatives_spanish:
  - seré consolado
  - me aliviaré
  - quedaré satisfecho
  lexicon: HALOT
  rationale: El niphal de נחם puede significar ser consolado o encontrar alivio tras completar el juicio. 'Me consolaré' mantiene la forma reflexiva posible en español y conserva la tensión antropopática sin explicarla en el cuerpo del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor del Tetragrámaton con la forma española del nombre divino usada en el proyecto, 'Yahvé', en lugar de sustituirlo por un título.
- source_word: בְּקִנְאָתִי
  english_pob_choice: in my jealousy
  chosen_spanish: en mi celo
  alternatives_spanish:
  - en mi celosía
  - en mi celo celoso
  - en mi celosa protección
  lexicon: HALOT
  rationale: קִנְאָה puede ser 'celos' o 'celo'; en contexto de pacto y juicio divino, 'celo' preserva la fuerza relacional sin sugerir una emoción humana con connotaciones indebidas en español.
- source_word: בְּכַלּוֹתִי
  english_pob_choice: when I spend
  chosen_spanish: cuando agote
  alternatives_spanish:
  - cuando termine
  - cuando acabe
  - al consumir
  lexicon: HALOT
  rationale: El infinitivo constructo de כלה marca la circunstancia temporal de la acción. 'Cuando agote' enlaza con 'se agotará' y mantiene el motivo de consumación del juicio.
- source_word: בָּם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - en ellos
  - a ellos
  lexicon: HALOT
  rationale: En contexto de juicio, ב marca dirección/objeto de la acción. 'Sobre ellos' sigue la imagen del texto y corresponde bien a 'cause my wrath to rest on them'.
theological_decisions:
- issue: Lenguaje afectivo de juicio divino
  english_pob_reading: 'Retain anthropopathic terms straightforwardly: ''anger,'' ''wrath,'' ''jealousy,'' and ''I will be comforted.'''
  chosen_spanish_reading: 'Conservar lenguaje afectivo directo: ''ira'', ''furor'', ''celo'' y ''me consolaré''.'
  alternative_spanish_readings:
  - abstraer como 'indignación' o 'justicia satisfecha'
  - suavizar 'me consolaré' a 'cesará mi juicio'
  rationale: El hebreo presenta el juicio de Yahvé con lenguaje afectivo real. La versión española mantiene esa tensión sin eliminarla ni convertirla en formulación sistemática.
  doctrine_reference: Translation philosophy §3, §6
- issue: Nombre divino יְהוָה
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Eterno
  rationale: El proyecto español sigue el valor del nombre revelado, no la sustitución por un título. Eso conserva la referencia personal y pactual del texto.
  doctrine_reference: 'Contested terms table: יְהוָה / YHWH'
- issue: Valor de קִנְאָה en contexto pactual
  english_pob_reading: in my jealousy
  chosen_spanish_reading: en mi celo
  alternative_spanish_readings:
  - en mis celos
  - en mi pasión
  - en mi zelo
  rationale: '''Celo'' comunica mejor la fuerza pactual y protectora del término en español bíblico contemporáneo, evitando connotaciones domésticas de ''celos''.'
  doctrine_reference: HALOT; Translation philosophy §6
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés al reflejar la imagen de 'poner/reposar' el furor sobre ellos, en vez de una paráfrasis de 'satisfacer' la ira. También conserva la tensión de 'I will be comforted' con una forma verbal española directa, sin reinterpretarla como mera cesación del juicio.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'ira' para אַף y 'furor' para חֲמָה/חֵמָה para respetar la distinción léxica observada en el original.
  - '''Celo'' se reserva para קִנְאָה, evitando mezclarlo con ''ira'' o ''furor''.'
  - '''Sobre ellos'' reproduce la orientación judicial del hebreo בָּם y armoniza con el verbo ''reposar''.'
