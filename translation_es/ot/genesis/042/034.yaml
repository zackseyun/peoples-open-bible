review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia y el sentido global del hebreo: mandato de traer al hermano menor, propósito de verificar que no son espías sino hombres honestos, promesa de devolver al hermano retenido y permiso para comerciar en la tierra. Sin embargo, hay un problema de fidelidad pronominal y de número/persona en español: el hebreo se dirige a varios hermanos en segunda persona plural, pero el texto mezcla singular (''Trae'', ''tu hermano'') con plural (''son'', ''les'', ''podrán''). También la nota al pie en ''hasta mí'' no corresponde a una ambigüedad relevante preservada por el inglés POB, mientras que la alternativa documentada en el audit trail está en ''comerciar / moverse por la tierra''.'
  spanish_quality_summary: El español es claro y natural en general, pero la mezcla de tuteo singular con referencias plurales produce una incongruencia notable. Para español neutral y eclesial amplio, conviene usar formulación plural no marcada ('Traigan a su hermano menor a mí / tráiganme...') evitando alternancia inconsistente. 'Hasta mí' suena menos natural que 'a mí' o una reestructuración como 'tráiganme'. También es preferible anclar la nota en el verbo final, donde sí existe una alternativa léxica real según la documentación inglesa.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales son adecuadas: ''espías'', ''hombres honestos'', ''devolveré'' y ''comerciar''. Se recomienda ''hermano menor'' o ''hermano más joven'' según naturalidad; ambas son aceptables, pero debe concordar con el plural posesivo ''su''.'
  issues:
  - severity: high
    issue: Mezcla inconsistente de singular y plural en el tratamiento
    rationale: El hebreo usa segunda persona plural en todo el discurso a los hermanos. 'Trae a tu hermano menor' contradice 'no son', 'les devolveré' y 'podrán', afectando fidelidad y legibilidad.
  - severity: medium
    issue: '''Hasta mí'' es poco natural en este contexto'
    rationale: אֵלַי significa simplemente 'a mí/hacia mí'. En español bíblico natural, 'a mí' o 'tráiganme' expresa mejor el movimiento direccional sin rigidez extraña.
  - severity: medium
    issue: La nota al pie está puesta en un lugar no sustentado por el audit trail principal
    rationale: La evidencia inglesa documenta la alternativa léxica para תסחרו ('trade' / 'move about'), no para אֵלַי. La nota debería trasladarse al verbo final para reflejar la ambigüedad léxica relevante.
  revised_spanish_text: Traigan a su hermano menor a mí, para que yo sepa que no son espías, sino hombres honestos. Entonces les devolveré a su hermano, y podrán comerciar[a] en la tierra.
  revised_footnotes:
  - marker: a
    text: O, 'moverse por la tierra'. El verbo hebreo también puede entenderse en un sentido más amplio de viajar o desplazarse, aunque aquí su sentido comercial ('comerciar/hacer negocios') encaja mejor con el contexto.
    reason: lexical_alternative
