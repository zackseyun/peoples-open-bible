base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/004/003.yaml
  text: And beneath it were figures of oxen all around[a], encircling it, ten to the cubit, surrounding the Sea all around. The oxen were in two rows[c][b], cast as one piece with it.
  footnotes:
  - marker: a
    text: Or 'likenesses of oxen'; the Hebrew indicates decorative bovine forms rather than living animals.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ten to the cubit,' likely meaning ten figures for each cubit around the circumference.
    reason: cultural_note
  - marker: c
    text: Or 'cast in its casting,' that is, formed as part of the same molten work.
    reason: lexical_alternative
