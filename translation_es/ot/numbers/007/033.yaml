translation:
  language: es
  text: un toro del ganado[a], un carnero, un cordero macho de un año[b], para holocausto;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «un toro, hijo del ganado»; un giro idiomático para un bovino del ganado, a menudo entendido como un toro joven.
    reason: lexical_alternative
  - marker: b
    text: O «un cordero en su primer año».
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: HALOT
  rationale: פַּר designa un macho bovino para sacrificio. En español, "toro" comunica con naturalidad un macho bovino adulto o pleno, y evita la redundancia que produciría "toro joven" junto con בֶּן בָּקָר.
- source_word: בֶּן בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado
  alternatives_spanish:
  - de la manada
  - de las reses
  - un toro joven
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente "hijo del ganado". En español, "del ganado" conserva la procedencia/categoría bovina sin sonar forzado. Como פַּר ya aporta la especie, se evita repetir "toro joven".'
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  lexicon: HALOT
  rationale: אַיִל corresponde al macho adulto de la oveja. "Carnero" es el equivalente español natural y preciso en contexto sacrificial.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  lexicon: HALOT
  rationale: En este contexto sacrificial, el término señala un cordero macho. "Cordero macho" preserva la precisión que el audit trail inglés explicitó.
- source_word: בֶּן שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - en su primer año
  - de primer año
  lexicon: HALOT
  rationale: La expresión hebrea idiomática indica edad de un año / en su primer año. "De un año" es la forma más natural en español y mantiene la referencia temporal.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para una ofrenda quemada
  lexicon: HALOT
  rationale: Se conserva el término sacrificial tradicional "holocausto" para עֹלָה, que en español bíblico comunica la ofrenda totalmente consumida por el fuego. "Para holocausto" sigue el patrón enumerativo del hebreo.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: 'El numeral repetido en el inventario se expresa naturalmente con el artículo indefinido singular en español: "un".'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje fuente en inglés; el testimonio auditado indica alta concordancia y sin cambios en la última pasada.
  spanish_consistency_notes:
  - Se mantuvo la enumeración sacrificial breve y paralela del hebreo.
  - Se conservó "holocausto" como término técnico, en línea con la opción inglesa por "burnt offering".
  - La nota [a] recoge la tensión léxica entre la literalidad de "hijo del ganado" y el valor idiomático ya resuelto en el texto principal.
  - La nota [b] preserva la alternativa temporal equivalente a "a year old" / "in its first year".
