translation:
  language: es
  text: 'decías a los niños[a] en lengua hebrea: «Oh niños, noble es el combate al que, habiendo sido llamados para el testimonio[b] de la nación, esfuércense con empeño»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos». El griego puede referirse a hijos o niños; aquí también puede entenderse como los hijos de la madre.
    reason: lexical_alternative
  - marker: b
    text: O «por el testimonio de la nación». El griego διαμαρτυρία puede significar «testimonio» o «testificación pública».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγες
  english_pob_choice: you were saying
  chosen_spanish: estabas hablando
  alternatives_spanish:
  - decías
  - seguías hablando
  lexicon: LSJ
  rationale: El imperfecto indica una acción de habla en curso o reiterada. «Estabas hablando» preserva ese valor aspectual en español natural sin forzar una frecuencia explícita.
- source_word: τοῖς παισὶν
  english_pob_choice: the children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los muchachos
  lexicon: LSJ
  rationale: En este contexto se trata de la madre que se dirige a sus siete descendientes varones. «Hijos» mantiene la relación filial y permite una referencia masculina sin introducir un término demasiado amplio o infantil.
- source_word: ἐν τῇ Ἑβραΐδι φωνῇ
  english_pob_choice: in the Hebrew language
  chosen_spanish: en lengua hebrea
  alternatives_spanish:
  - en el idioma hebreo
  - en hebreo
  lexicon: LSJ
  rationale: La expresión se refiere a la lengua empleada al hablar. «En lengua hebrea» es claro y conserva la referencia al habla original sin sobreexplicar.
- source_word: γενναῖος
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - valiente
  - magnífico
  lexicon: LSJ
  rationale: Con ἀγών, el adjetivo expresa nobleza de la lucha además de valentía. «Noble» reproduce esa elevación moral y literaria.
- source_word: ὁ ἀγών
  english_pob_choice: the contest
  chosen_spanish: el combate
  alternatives_spanish:
  - la contienda
  - la lucha
  - el certamen
  lexicon: LSJ
  rationale: Aunque ἀγών puede sugerir «contienda» o «certamen», en este pasaje el llamado a la resistencia martirial pide una palabra española que mantenga la intensidad del enfrentamiento. «Combate» comunica bien esa fuerza sin perder el marco de lucha encomiable.
- source_word: ἐφʼ ὃν κληθέντες
  english_pob_choice: to which, having been called
  chosen_spanish: al que, habiendo sido llamados
  alternatives_spanish:
  - para el cual, habiendo sido llamados
  - al que fueron llamados
  lexicon: LSJ
  rationale: La relativa con participio expresa la finalidad o el destino del llamado. «Al que» conserva la relación con el combate y mantiene el participio causal/antecedente de manera natural.
- source_word: ὑπὲρ τῆς διαμαρτυρίας τοῦ ἔθνους
  english_pob_choice: for the testimony of the nation
  chosen_spanish: por el testimonio de la nación
  alternatives_spanish:
  - por el testimonio del pueblo
  - por el testimonio de nuestra nación
  lexicon: LSJ
  rationale: διαμαρτυρία puede significar «testimonio» o «testimonio/witness» en sentido público-jurídico. «Testimonio» es la opción más directa en español. Se conserva «de la nación» porque el griego tiene el artículo y no añade posesivo.
- source_word: ἐναγωνίσασθε
  english_pob_choice: you must struggle earnestly
  chosen_spanish: deben esforzarse con empeño
  alternatives_spanish:
  - deben luchar con ardor
  - deben contender con vigor
  - esfuércense con empeño
  lexicon: LSJ
  rationale: El imperativo exhorta a una participación intensa en el ἀγών. «Esforzarse con empeño» comunica la urgencia y seriedad del mandato en español moderno, sin desplazar el matiz de lucha ya contenido en «combate».
theological_decisions:
- issue: Valor de παισίν / παῖδες en una escena de martirio familiar
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - niños
  rationale: El pasaje se dirige a los hijos varones de la madre. «Hijos» conserva el vínculo familiar y evita la ambigüedad de «niños», que en español puede sonar demasiado infantil para un contexto de martirio y exhortación heroica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de διαμαρτυρία en contexto judío de fidelidad pública
  english_pob_reading: testimony
  chosen_spanish_reading: testimonio
  alternative_spanish_readings:
  - testimonio público
  - testimonio fiel
  - testigo
  rationale: «Testimonio» preserva el sentido público y confesional de διαμαρτυρία sin importar la terminología cristiana posterior de «martirio». En este contexto, la fidelidad visible del pueblo ante la presión tiene primacía.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Mantener el tono exhortativo del imperativo final
  english_pob_reading: you must struggle earnestly
  chosen_spanish_reading: deben esforzarse con empeño
  alternative_spanish_readings:
  - deben luchar con ardor
  - contiendan con vigor
  - esfuércense con fervor
  rationale: El griego manda una respuesta enérgica y perseverante. La formulación española conserva el tono exhortativo y evita una traducción demasiado literal que sonaría rígida o redundante con «combate».
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó παισίν/παῖδες hacia una referencia más amplia («children») y διαμαρτυρίας hacia «testimony», así como la corrección para no añadir posesivo en «the nation». En español se optó por «hijos» como término filial preciso dentro del contexto narrativo, y por «de la nación» sin posesivo añadido. También se preservó el imperfecto de habla con una forma continua («estabas hablando»).
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo no contiene el nombre divino.
  - «Combate» se eligió para sostener la metáfora agonística de ἀγών; el verbo final se traduce con intensidad complementaria, no con un duplicado innecesario.
  - La puntuación conserva la cita directa y el registro solemne propio de la obra.
