translation:
  language: es
  text: Nuestros padres en Egipto no entendieron tus obras maravillosas; no recordaron la abundancia de tu amor fiel, sino que se rebelaron junto al mar, el Mar Rojo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Mar de Juncos”. El nombre hebreo Yam Suf suele traducirse tradicionalmente “Mar Rojo”.
    reason: lexical_alternative
  - marker: b
    text: O “junto al mar, en el Mar Rojo”.
    reason: previous_rendering
lexical_decisions:
- source_word: אֲבוֹתֵינוּ
  english_pob_choice: Our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros ancestros
  lexicon: HALOT
  rationale: Mantiene el valor literal de la expresión hebrea y la referencia corporativa a la generación anterior de Israel, sin neutralizar el término familiar masculino que el texto emplea.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: Es un uso locativo directo y natural en español, fiel al hebreo sin añadir información no presente en el verso.
- source_word: הִשְׂכִּילוּ
  english_pob_choice: did not understand
  chosen_spanish: no entendieron
  alternatives_spanish:
  - no consideraron sabiamente
  - no alcanzaron a comprender
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa falta de entendimiento respecto de las acciones de Dios. 'No entendieron' comunica bien esa falta de percepción sin sobreinterpretar el matiz cognitivo.
- source_word: נִפְלְאוֹתֶיךָ
  english_pob_choice: your wondrous deeds
  chosen_spanish: tus obras maravillosas
  alternatives_spanish:
  - tus maravillas
  - tus obras portentosas
  lexicon: HALOT
  rationale: El sustantivo apunta a actos extraordinarios que producen asombro. 'Obras maravillosas' conserva el carácter de acciones divinas concretas, no de maravillas abstractas.
- source_word: זָכְרוּ
  english_pob_choice: did not remember
  chosen_spanish: no recordaron
  alternatives_spanish:
  - no se acordaron
  - no trajeron a la memoria
  lexicon: HALOT
  rationale: '''Recordaron'' reproduce de manera natural en español la idea de no traer a la memoria lo que Dios había hecho. Mantiene el valor de covenantal recollection sin ampliarlo innecesariamente.'
- source_word: רֹב חֲסָדֶיךָ
  english_pob_choice: the abundance of your steadfast love
  chosen_spanish: la abundancia de tu amor fiel
  alternatives_spanish:
  - la abundancia de tu amor leal
  - la multitud de tus actos de amor fiel
  lexicon: HALOT
  rationale: '''חֶסֶד'' tiene un peso de fidelidad pactal; ''amor fiel'' preserva esa fuerza relacional y de lealtad. ''Abundancia'' refleja רֹב como plenitud o gran cantidad.'
- source_word: וַיַּמְרוּ
  english_pob_choice: but rebelled
  chosen_spanish: sino que se rebelaron
  alternatives_spanish:
  - y se rebelaron
  - pero se rebelaron
  lexicon: HALOT
  rationale: '''Sino que'' conserva con claridad el contraste adversativo del hebreo: pese a no entender y no recordar, actuaron en rebeldía.'
- source_word: עַל יָם
  english_pob_choice: by the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - al lado del mar
  - en el mar
  lexicon: HALOT
  rationale: La preposición hebrea aquí funciona locativamente; 'junto al mar' es una solución idiomática y fluida en español, sin sugerir que la rebelión fuera dirigida contra el mar como objeto.
- source_word: בְּיַם סוּף
  english_pob_choice: at the Red Sea
  chosen_spanish: en el Mar Rojo
  alternatives_spanish:
  - en el Mar de Juncos
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicional ampliamente reconocido en español, mientras que 'Mar de Juncos' queda como posibilidad léxica subordinada. Esto sigue el criterio de legibilidad y, a la vez, respeta el trasfondo del nombre hebreo.
theological_decisions:
- issue: שׂכל / understanding of God's deeds
  english_pob_reading: did not understand your wondrous deeds
  chosen_spanish_reading: no entendieron tus obras maravillosas
  alternative_spanish_readings:
  - no consideraron sabiamente tus obras maravillosas
  - no llegaron a comprender tus obras maravillosas
  rationale: El punto teológico es la incapacidad de reconocer el sentido de los actos salvíficos de Yahvé. 'No entendieron' expresa esa ceguera espiritual e histórica sin convertir el verbo en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: חֶסֶד / covenantal love
  english_pob_reading: the abundance of your steadfast love
  chosen_spanish_reading: la abundancia de tu amor fiel
  alternative_spanish_readings:
  - la abundancia de tu misericordia fiel
  - la abundancia de tu amor constante
  rationale: '''Amor fiel'' conserva la dimensión de lealtad pactal inherente a חֶסֶד, evitando reducirlo a mera benevolencia emocional. Mantiene la tensión teológica entre amor, fidelidad y compromiso de pacto.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Topónimo יַם סוּף
  english_pob_reading: the Red Sea
  chosen_spanish_reading: el Mar Rojo
  alternative_spanish_readings:
  - el Mar de Juncos
  rationale: La forma tradicional española sigue siendo clara y reconocible para la lectura eclesial. Se preserva, sin embargo, la alternativa léxica implícita del hebreo en la nota correspondiente.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition) balanced with §6 (readable modern Spanish)
translation_notes:
  revision_awareness: 'La redacción española sigue el sentido del texto hebreo y del POB inglés revisado: mantiene la apposición locativa del final del verso con una forma natural en español (''junto al mar, en el Mar Rojo'') y conserva el contraste adversativo con ''sino que''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada del nombre divino en este proyecto, pero este verso no lo contiene explícitamente.
  - '''Obras maravillosas'' y ''amor fiel'' preservan la relación entre actos salvíficos y חסד sin sobrecargar el verso con glosas.'
  - La cadencia busca ser publicable y litúrgicamente legible sin perder la estructura hebrea del paralelismo y la oposición final.
