translation:
  language: es
  text: Así que Abraham tomó la leña para el holocausto[a] y la puso sobre Isaac, su hijo, y tomó en su mano el fuego y el cuchillo; y los dos caminaron juntos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la leña del holocausto". El hebreo dice literalmente "la madera/la leña del holocausto".
    reason: lexical_alternative
  - marker: b
    text: O "y los dos fueron juntos".
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצֵי הָעֹלָה
  english_pob_choice: the wood for the burnt offering
  chosen_spanish: la madera del holocausto
  alternatives_spanish:
  - la madera para el holocausto
  - la madera del sacrificio quemado
  lexicon: HALOT
  rationale: 'El hebreo expresa una construcción de relación/posesión: “madera de la ofrenda/holocausto”. En español, “madera del holocausto” conserva ese vínculo más literalmente que “madera para...”, sin perder que se trata de la madera destinada a la ofrenda. Se evita “fuego” o “leña” porque el sustantivo עֲצֵי apunta a madera/leña de forma concreta.'
- source_word: וַיָּשֶׂם עַל
  english_pob_choice: laid ... on
  chosen_spanish: la puso sobre
  alternatives_spanish:
  - la colocó sobre
  - la echó sobre
  lexicon: HALOT
  rationale: שׂים con עַל indica poner o colocar físicamente sobre algo. “La puso sobre” comunica bien la acción y el peso visual de llevar la madera sobre Isaac.
- source_word: יִצְחָק בְּנוֹ
  english_pob_choice: Isaac his son
  chosen_spanish: Isaac, su hijo
  alternatives_spanish:
  - su hijo Isaac
  - Isaac su hijo
  lexicon: HALOT
  rationale: El orden hebreo une el nombre y la relación filial; en español, con pausa vocativa/compositiva, “Isaac, su hijo” suena natural y conserva la identificación sin añadir explicaciones.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - llevó en su mano
  - con la mano
  lexicon: HALOT
  rationale: La expresión es idiomática y concreta. “En su mano” reproduce de manera directa el medio de portar el fuego y el cuchillo, sin añadir un objeto no mencionado por el hebreo.
- source_word: הָאֵשׁ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - la brasa
  - la lumbre
  lexicon: HALOT
  rationale: El hebreo dice simplemente “el fuego”. Aunque en contexto probablemente se trate del medio para encender el sacrificio, el texto no especifica recipiente; por eso se mantiene “el fuego”.
- source_word: הַמַּאֲכֶלֶת
  english_pob_choice: the knife
  chosen_spanish: el cuchillo
  alternatives_spanish:
  - el cuchillo de sacrificio
  - el cuchillo para degollar
  lexicon: HALOT
  rationale: El término puede referirse a un cuchillo de sacrificio. “Cuchillo” es claro y natural en español; el matiz sacrificial lo aporta el contexto narrativo sin sobretraducir el sustantivo.
- source_word: שְׁנֵיהֶם יַחְדָּו
  english_pob_choice: the two of them walked on together
  chosen_spanish: los dos caminaron juntos
  alternatives_spanish:
  - ambos caminaron juntos
  - los dos fueron juntos
  lexicon: HALOT
  rationale: La frase enfatiza la unidad de la pareja. “Los dos caminaron juntos” conserva el dual explícito y la idea de continuación del movimiento de manera natural en español.
- source_word: וַיֵּלְכוּ
  english_pob_choice: walked on
  chosen_spanish: caminaron
  alternatives_spanish:
  - fueron
  - siguieron caminando
  lexicon: HALOT
  rationale: El verbo הלך puede ser “ir” o “caminar”. Aquí, por el contexto narrativo y por la frase final, “caminaron” transmite el desplazamiento sin perder sencillez.
theological_decisions:
- issue: Renderización de עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda ascendente
  rationale: La categoría sacrificial establecida en la tradición bíblica española para עֹלָה es “holocausto”, y comunica con precisión la ofrenda totalmente consumida por fuego. “Ofrenda ascendente” sería más etimológica, pero menos transparente para lectura pública.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió el audio textual disponible en hebreo, con apoyo del rastro auditado en inglés, sin depender mecánicamente de la redacción inglesa. No hubo revisiones aplicadas en el pasaje inglés más allá de mantener sus decisiones léxicas principales en español con equivalentes naturales.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general, pero este versículo no lo contiene.
  - Se usa “holocausto” para עֹלָה en coherencia con el uso sacrificial estándar ya auditado.
  - 'Se conserva la concreción material del relato: madera, mano, fuego y cuchillo.'
  - No se suaviza la imagen narrativa de cargar la madera sobre Isaac.
