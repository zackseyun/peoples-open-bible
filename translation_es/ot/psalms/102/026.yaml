    rationale: La expresión española 'desde hace' suele introducir duración continua hasta el presente, mientras que el hebreo aquí funciona como adverbio temporal 'antiguamente/de antiguo/hace mucho tiempo'. Esto puede introducir un matiz aspectual no presente en el original.
  - severity: low
