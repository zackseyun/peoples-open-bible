translation:
  text: And they drove Israel into hiding[a], into every refuge they had.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in hidden places, in every refuge of theirs.' The Greek is compact and may be rendered more formally, but the main text expresses the sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθεντο
  chosen: they put
  alternatives:
  - they placed
  - they set
  lexicon: LSJ
  rationale: Aorist middle of τίθημι here carries the sense of causing someone/something to be placed. 'They put' is natural English and preserves the agentive force without overinterpreting the middle voice.
- source_word: τὸν Ἰσραήλ
  chosen: Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: LSJ
  rationale: The singular with article can function corporately for the people. 'Israel' preserves the source wording and its collective force better than expanding to 'the Israelites.'
- source_word: ἐν κρυφίοις
  chosen: into hiding
  alternatives:
  - in hidden places
  - in secret places
  lexicon: LSJ
  rationale: The phrase denotes concealment rather than merely location. 'Into hiding' captures the idiomatic sense in readable English while remaining anchored to the Greek idea of hidden places.
- source_word: ἐν παντὶ φυγαδευτηρίῳ
  chosen: in every place of refuge
  alternatives:
  - in every hiding place
  - in every place of flight
  - in every refuge
  lexicon: LSJ
  rationale: The noun denotes a place of escape or refuge for fugitives. 'Place of refuge' communicates the sense clearly; 'hiding place' is possible but would duplicate the concealment already expressed by ἐν κρυφίοις.
- source_word: αὐτῶν
  chosen: they had
  alternatives:
  - their
  - belonging to them
  lexicon: LSJ
  rationale: The pronoun most naturally refers to the places of refuge available to Israel. Rendering it as 'they had' makes the English idiomatic while preserving possession.
