theological_decisions:
- issue: Meaning of Elisha's cry 'My father, my father! The chariot of Israel and its horsemen!'
  chosen_reading: Rendered as a direct exclamation preserving the metaphor without interpretation in the main text.
  alternative_readings:
  - Elijah is being addressed as the true defense of Israel
  - Elisha is referring to the heavenly chariot and horsemen he sees
  rationale: The Hebrew permits the phrase to function as an appositional cry about Elijah's significance or as a reaction to the heavenly vision. To preserve theological and interpretive tension, the main text translates the words directly and leaves fuller interpretation to a footnote rather than resolving the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
