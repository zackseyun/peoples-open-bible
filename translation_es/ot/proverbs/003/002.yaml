translation:
  language: es
  text: porque te añadirán largura de días, años de vida y paz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bienestar' o 'plenitud' para 'paz' (shalom), reflejando un sentido más pleno de florecimiento, no solo la ausencia de conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior. En español, 'porque' comunica de manera natural la relación causal/explanatoria que el inglés 'for' cumple aquí.
- source_word: אֹרֶךְ יָמִים
  english_pob_choice: length of days
  chosen_spanish: longitud de días
  alternatives_spanish:
  - largos días
  - larga vida
  lexicon: HALOT
  rationale: Se conserva el giro hebreo con una traducción bastante literal, paralela a la decisión inglesa de mantener 'length of days' en vez de normalizarlo a 'long life'.
- source_word: וּשְׁנוֹת חַיִּים
  english_pob_choice: and years of life
  chosen_spanish: años de vida
  alternatives_spanish:
  - años de vivir
  - años vitales
  lexicon: HALOT
  rationale: Mantiene el paralelo poético con 'días' y refleja de forma natural el sintagma constructo. Se omite la repetición de 'y' para evitar una acumulación poco idiomática en español, sin perder el sentido acumulativo.
- source_word: וְשָׁלוֹם
  english_pob_choice: and peace
  chosen_spanish: y paz
  alternatives_spanish:
  - y bienestar
  - y plenitud
  - y shalom
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia concisa más directa; el trasfondo más amplio de שָׁלוֹם queda preservado en la nota, como hizo el POB en inglés.'
- source_word: יוֹסִיפוּ
  english_pob_choice: will add
  chosen_spanish: añadirán
  alternatives_spanish:
  - aumentarán
  - sumarán
  lexicon: HALOT
  rationale: Corresponde al Hifil de יסף con el valor de 'añadir/aumentar'. 'Añadirán' conserva la fuerza verbal y la relación con el dativo siguiente.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - a usted
  lexicon: HALOT
  rationale: Reproduce el objeto indirecto. Se opta por 'a ti' para claridad y cercanía al hebreo, sin introducir una formalidad innecesaria.
theological_decisions:
- issue: Amplitud semántica de שָׁלוֹם
  english_pob_reading: peace, with footnote noting well-being/wholeness as fuller sense
  chosen_spanish_reading: paz, con nota que aclara bienestar/plenitud
  alternative_spanish_readings:
  - bienestar
  - plenitud
  - shalom
  rationale: El término bíblico incluye más que ausencia de conflicto; la nota preserva esa amplitud sin reemplazar la traducción principal más natural en español.
  doctrine_reference: Isaías 26:3; Números 6:26; Salmo 29:11
translation_notes:
  revision_awareness: El pasaje inglés fue revisado y quedó sin cambios; la traducción española sigue esa lectura estable, manteniendo la estructura acumulativa y la nota léxica sobre שָׁלוֹם.
  spanish_consistency_notes:
  - Se mantiene 'paz' como traducción principal de שָׁלוֹם, reservando la ampliación semántica para la nota.
  - Se conserva un registro sobrio y bíblico, evitando paraphrases como 'prosperidad' que no están directamente apoyadas por el texto hebreo.
  - La forma 'a ti' refleja el dativo hebreo לָךְ sin convertirlo en una frase explicativa más larga.
