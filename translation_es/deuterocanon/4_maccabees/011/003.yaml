  to: Pero yo me presenté por mi propia iniciativa[a], para que, después de matarme también a mí, incurras en castigo de parte de la justicia celestial[b] por aún más actos de maldad.
  rationale: Se reemplazó «salí» por «me presenté» para reflejar mejor el valor contextual de παρῆλθον como avanzar o presentarse voluntariamente ante el tirano. También se ajustó la frase final a «incurras en castigo de parte de la justicia celestial» para conservar el matiz de procedencia/agencia de τῇ οὐρανίᾳ δίκῃ con un español más natural. Se eliminó el anclaje [b] de «también a mí» porque la nota correspondiente en el expediente inglés explica «heavenly justice», no κἀμέ; así se corrige la colocación de notas para que coincidan con su contenido.
