translation:
  language: es
  text: 'Entonces Yahvé llamó a Samuel[a], y dijo: «Aquí estoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; alternativamente, «Jehová».'
