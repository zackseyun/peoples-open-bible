  text: Then one of his servants answered and said[a], “Please let them take five of the horses that remain, which are left in it. Behold, they are like all the multitude of Israel who are left in it; behold, they are like all the multitude of Israel who have perished[b]. So let us send and see.”
  footnotes:
  - marker: a
    text: The Hebrew likely refers to the city of Samaria by the pronoun 'in it,' but the noun itself is not repeated in this verse.
    reason: lexical_alternative
  - marker: b
    text: 'The verse contains a difficult and repetitive Hebrew comparison: ''they are like all the multitude of Israel who are left in it ... like all the multitude of Israel who have perished.'' The translation preserves the repetition rather than smoothing it out.'
    reason: textual_variant
