base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/024/031.yaml
  text: These also cast lots alongside their brothers[a], the sons of Aaron, before King David, Zadok, Ahimelech[b], and the heads of the fathers’ houses of the priests and of the Levites—the fathers’ houses of the chief equally with those of their younger brothers.
  footnotes:
  - marker: a
    text: Or 'corresponding to their brothers, the sons of Aaron.' The Hebrew expression can denote standing opposite, corresponding to, or alongside.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the chief fathers’ houses corresponding to his younger brother.' The singular forms are likely distributive, expressing that the principal family branches and the lesser/junior branches were treated alike in the casting of lots.
    reason: lexical_alternative
