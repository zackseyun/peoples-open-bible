translation:
  language: es
  text: No desprecies oír a los que han vuelto[a][b], que han oído de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradición griega: «No prestes a un hombre más fuerte que tú, y si prestas, tenlo por perdido». Esta lectura refleja una tradición textual distinta para este versículo.'
    reason: textual_variant
  - marker: b
    text: O «los que se arrepienten» / «retornados». La palabra hebrea puede referirse a personas que vuelven o se vuelven atrás, pero aquí su matiz exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - No has de
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición directa; en español, «No» introduce de manera natural e imperativa la advertencia sin añadir matices modales ajenos al texto.
- source_word: תִּמְאַס
  english_pob_choice: despise
  chosen_spanish: desprecies
  alternatives_spanish:
  - rechaces
  - menosprecies
  lexicon: HALOT
  rationale: El verbo comunica rechazo con desdén o desprecio. «Desprecies» conserva la fuerza valorativa de la prohibición mejor que un simple «rechaces».
- source_word: בִּשְׁמִיעַת
  english_pob_choice: hearing
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  - el oír
  lexicon: HALOT
  rationale: Aquí el sustantivo deriva de שמע y el contexto pide una relación con la transmisión recibida. En español, «oír» en la estructura «los que han oído» mantiene la cercanía al hebreo y suena natural.
- source_word: שָׁבִים
  english_pob_choice: those who return
  chosen_spanish: los que han vuelto
  alternatives_spanish:
  - los que regresan
  - los arrepentidos
  - los que vuelven
  lexicon: HALOT
  rationale: La forma hebrea permite el sentido básico de retorno; el POB inglés retuvo esa ambigüedad. «Los que han vuelto» preserva el valor léxico principal sin cerrar del todo la posibilidad interpretativa de retorno/reconversión.
- source_word: שָׁמְעוּ
  english_pob_choice: have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - oyeron
  - han escuchado
  lexicon: HALOT
  rationale: El perfecto hebreo se puede verter de manera pasada o perfecta; «han oído» refleja bien una tradición recibida que sigue vigente y acompasa el paralelismo con «de sus padres».
- source_word: מֵאֲבֹתָם
  english_pob_choice: from their fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de sus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de sus padres». Aunque el sentido sapiencial puede abarcar tradición ancestral, se mantiene la formulación concreta para no neutralizar el término sin necesidad.
theological_decisions:
- issue: Tensión entre el hebreo conservado y la tradición griega paralela en Sirácides 8:12
  english_pob_reading: Translate the extant Hebrew line as the main text; preserve the Greek tradition as a textual alternative in a footnote.
  chosen_spanish_reading: Traducir como texto principal la línea hebrea conservada y señalar en nota la tradición griega alternativa.
  alternative_spanish_readings:
  - No prestes a un hombre más fuerte que tú, y si prestas, tenlo por perdido.
  rationale: En Sirácides, cuando el hebreo está atestiguado, se prioriza ese testimonio. La tradición griega no armoniza con el hebreo, sino que transmite otra sentencia. Por eso se conserva como variante textual documentada, sin contaminar el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew priority in Sirach where the Hebrew witness survives; Greek parallel documented as alternate textual tradition.'
translation_notes:
  revision_awareness: El borrador sigue la última revisión del audit trail al entender שָׁבִים como «los que han vuelto» y mantiene la prioridad del hebreo conservado frente a la tradición griega divergente, sin fusionar ambas lecturas en una sola línea.
  spanish_consistency_notes:
  - Se mantiene «padres» en lugar de «antepasados» para conservar la literalidad del hebreo, aunque el contexto sapiencial admite una referencia ancestral amplia.
  - Se evita «Cristo», «SEÑOR» y otras convenciones no pertinentes al versículo.
  - La nota textual se ancla solo a la porción afectada por la variante griega y no altera el sentido del texto principal.
