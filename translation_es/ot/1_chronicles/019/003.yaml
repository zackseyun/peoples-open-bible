  revision_rationale: Se corrigió el anclaje de la nota del hebraísmo «a tus ojos», se añadió la nota léxica faltante para «derrocar» en consonancia con el POB inglés, y se normalizó «ammonitas» a «amonitas». También se suavizó levemente la puntuación para mejorar la fluidez sin alterar el sentido.
