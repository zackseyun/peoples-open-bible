revisions:
- from: 'Así dice Yahvé de los ejércitos: serán[a] despojados por completo del resto de Israel como de una vid; pasa otra vez tu mano, como vendimiador, sobre las sarmientos.'
  to: 'Así dice Yahvé de los ejércitos: rebuscarán por completo el remanente de Israel como una vid; vuelve a pasar tu mano, como vendimiador, sobre los sarmientos[a].'
  rationale: La revisión restaura la metáfora agrícola enfática de עוֹלֵל יְעוֹלְלוּ con «rebuscarán por completo», mejora la naturalidad de «como una vid», corrige el error gramatical «los sarmientos», mueve la nota al término realmente debatido, y alinea mejor שְׁאֵרִית con «remanente». No se requiere adjudicación adicional porque los ajustes son claros y de bajo riesgo doctrinal, manteniendo la nota de incertidumbre léxica ya documentada.
