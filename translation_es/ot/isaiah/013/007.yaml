  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: עַל־כֵּן = «Por tanto», כָּל יָדַיִם = «todas las manos», וְכָל לְבַב אֱנוֹשׁ = «todo corazón humano», יִמָּס = «se derretirá». Sin embargo, la nota al pie no preserva la alternativa principal documentada en el inglés para אֱנוֹשׁ («mortal»), y el verbo «desfallecerán» introduce un matiz algo más intenso que el simple aflojamiento/debilitamiento de רפה.'
  spanish_quality_summary: El español es claro y digno. No obstante, «desfallecerán» suena algo menos concreto que la imagen física de manos que se debilitan o se aflojan; «se debilitarán» comunica mejor el hebreo en registro natural. También conviene trasladar la nota al sustantivo «humano» para reflejar la alternativa léxica relevante en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «humano» para אֱנוֹשׁ sigue la decisión del POB. La revisión propuesta mejora la alineación con la nota léxica inglesa al conservar «mortal» como alternativa en español.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «desfallecerán» en lugar de reflejar la alternativa léxica principal de אֱנוֹשׁ.
    rationale: El rastro de auditoría inglés documenta una nota sobre «human» con alternativas «man's» y «mortal». La nota española actual trata solo de רפה, donde el inglés no exigió nota, y omite la alternativa «mortal», que sí es semánticamente relevante.
  - severity: low
    issue: «Desfallecerán» puede sonar más interpretativo que el valor básico de רפה.
    rationale: רפה describe debilidad, flojedad o aflojamiento. «Se debilitarán» preserva mejor la imagen física de las manos sin añadir el matiz de colapso de «desfallecer».
  revised_spanish_text: Por tanto, todas las manos se debilitarán, y todo corazón humano[a] se derretirá.
