translation:
  language: es
  text: hasta que una flecha le atraviese el hígado, como un ave que se precipita a la trampa, y no sabe que le costará la vida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «que es para su vida» o «que pierde la vida»; el hebreo es elíptico y quiere decir que el camino que sigue lo conduce a la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  lexicon: HALOT
  rationale: Marca temporal que mantiene la progresión del dicho hasta su desenlace fatal; en español, 'hasta que' suena natural y conserva la fuerza de límite temporal.
- source_word: יְפַלַּח
  english_pob_choice: pierces
  chosen_spanish: atravesar
  alternatives_spanish:
  - perforar
  - hender
  - transpasar
  lexicon: HALOT
  rationale: El piel expresa una penetración violenta; 'atravesar' comunica bien la entrada del proyectil en el cuerpo sin sonar rígido.
- source_word: חֵץ
  english_pob_choice: arrow
  chosen_spanish: flecha
  alternatives_spanish:
  - saeta
  lexicon: HALOT
  rationale: '''Flecha'' es el equivalente natural y claro en español para el proyectil del texto.'
- source_word: כְּבֵדוֹ
  english_pob_choice: his liver
  chosen_spanish: el hígado
  alternatives_spanish:
  - sus entrañas
  - su hígado
  lexicon: HALOT
  rationale: Se conserva el órgano concreto para mantener la imaginería corporal hebrea; el posesivo queda implícito en el clítico 'le' y en el contexto, evitando una construcción pesada.
- source_word: כְמַהֵר
  english_pob_choice: rushing
  chosen_spanish: se apresura
  alternatives_spanish:
  - corre precipitadamente
  - va de prisa
  lexicon: HALOT
  rationale: El participio/adverbio describe movimiento rápido e imprudente; 'se apresura' es idiomático y transmite la prisa peligrosa de la comparación.
- source_word: צִפּוֹר
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  lexicon: HALOT
  rationale: '''Ave'' mantiene el registro digno del proverbio y conserva el sentido genérico sin especificar especie.'
- source_word: אֶל־פָּח
  english_pob_choice: into a snare
  chosen_spanish: hacia una trampa
  alternatives_spanish:
  - a una trampa
  - en una trampa
  - hacia un lazo
  lexicon: HALOT
  rationale: El hebreo describe el movimiento hacia el dispositivo; 'hacia una trampa' preserva la dirección de la imagen, aunque en español también podría leerse como 'en una trampa'.
- source_word: וְלֹא יָדַע
  english_pob_choice: and he does not know
  chosen_spanish: y no sabe
  alternatives_spanish:
  - y no se da cuenta
  - sin saber
  lexicon: HALOT
  rationale: La cláusula es simple y proverbial; 'no sabe' conserva la literalidad y la sencillez del original.
- source_word: כִּי בְנַפְשׁוֹ הוּא
  english_pob_choice: that it will cost him his life
  chosen_spanish: que le costará la vida
  alternatives_spanish:
  - que está contra su vida
  - que es para su vida
  - que le va en la vida
  lexicon: HALOT
  rationale: El hebreo es elíptico ('para/contra su vida'); en contexto, la fuerza idiomática es que el camino tomado termina en muerte. 'Le costará la vida' expresa ese resultado fatal sin perder la tensión lexical.
translation_notes:
  revision_awareness: 'Alineado con el audito inglés: se mantuvo el órgano concreto (''hígado'') y la imagen de la flecha/ave/trampa; se resolvió la elipsis hebrea final con una equivalencia idiomática española que preserva el sentido fatal. No se detectaron revisiones aplicadas en el paquete de origen.'
  spanish_consistency_notes:
  - Se prefirió 'flecha' sobre 'saeta' por claridad moderna, manteniendo el registro proverbial.
  - Se conservó la concreción anatómica ('hígado') para no diluir la imagen hebrea en 'entrañas' o 'corazón'.
  - La nota al pie recoge la alternativa literal del hebreo para auditar la elipsis final sin sobrecargar el texto principal.
