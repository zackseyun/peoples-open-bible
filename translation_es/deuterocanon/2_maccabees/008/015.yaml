translation:
  language: es
  text: y no por causa de ellos[a], sino por causa de las alianzas con sus padres, y por la invocación sobre ellos de su nombre majestuoso y magnífico[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no por su causa».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la invocación sobre ellos de su nombre majestuoso y magnífico»; es un giro idiomático para el nombre de Dios invocado sobre su pueblo.
    reason: cultural_note
lexical_decisions:
- source_word: εἰ μὴ διʼ αὐτούς
  english_pob_choice: not because of them
  chosen_spanish: no por causa de ellos
  alternatives_spanish:
  - no por ellos
  - no por su causa
  - no a causa de ellos
  lexicon: LSJ
  rationale: La frase expresa una base causal negada. «No por causa de ellos» conserva esa fuerza causal en español y evita sonar demasiado idiomática o interpretativa.
- source_word: διὰ τὰς πρὸς τοὺς πατέρας αὐτῶν διαθήκας
  english_pob_choice: because of the covenants with their fathers
  chosen_spanish: por causa de los pactos con sus padres
  alternatives_spanish:
  - por causa de los convenios con sus padres
  - a causa de los pactos con sus padres
  - por los pactos con sus padres
  lexicon: LSJ
  rationale: διαθήκας en este contexto bíblico debe rendirse como «pactos». «Con sus padres» refleja bien πρὸς τοὺς πατέρας αὐτῶν sin forzar una paráfrasis más amplia.
- source_word: ἕνεκα
  english_pob_choice: because
  chosen_spanish: por causa de
  alternatives_spanish:
  - porque
  - a causa de
  - por
  lexicon: LSJ
  rationale: ἕνεκα introduce otro motivo. «Por causa de» mantiene el paralelismo causal del griego y suena natural en registro bíblico.
- source_word: τῆς ἐπʼ αὐτοὺς ἐπικλήσεως
  english_pob_choice: the invocation of his majestic and magnificent name over them
  chosen_spanish: la invocación sobre ellos del nombre suyo
  alternatives_spanish:
  - la invocación de su nombre sobre ellos
  - el llamamiento de su nombre sobre ellos
  - la imposición de su nombre sobre ellos
  lexicon: LSJ
  rationale: ἐπίκλησις aquí apunta al acto de invocar o llamar el nombre divino sobre el pueblo. «Invocación sobre ellos» conserva el matiz cultual/covenantal sin sobreexplicar el idiomа.
- source_word: τοῦ σεμνοῦ καὶ μεγαλοπρεποῦς ὀνόματος αὐτοῦ
  english_pob_choice: his majestic and magnificent name
  chosen_spanish: del nombre suyo, venerable y grandioso
  alternatives_spanish:
  - de su nombre, majestuoso y magnífico
  - de su nombre, venerable y magnífico
  - de su nombre, augusto y grandioso
  lexicon: LSJ
  rationale: Los dos adjetivos griegos son honoríficos. «Venerable y grandioso» reproduce el tono elevado y evita una redundancia demasiado pesada en español; se conserva la secuencia nominal del griego mediante un giro pospuesto.
theological_decisions:
- issue: Motivación pactual y no meritória
  english_pob_reading: The text grounds God's favorable action not in the people's own merit but in his covenants with their fathers and in his name invoked over them.
  chosen_spanish_reading: El texto fundamenta la acción favorable de Dios no en el mérito de ellos, sino en los pactos con sus padres y en la invocación de su nombre sobre ellos.
  alternative_spanish_readings:
  - El texto podría suavizarse y presentar solo la fidelidad histórica de Dios.
  - El texto podría leerse como una mera referencia a reputación divina, sin el peso pactual.
  rationale: El griego contrapone explícitamente «no por ellos» con dos motivos positivos. La traducción conserva esa tensión teológica sin resolverla ni expandirla más allá de lo que el versículo afirma.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: mantiene la doble causalidad, traduce ἐπίκλησις con «invocación» y evita una formulación pesada o incompleta al final. También ajusta διαθήκας como «pactos» en un contexto bíblico-covenantal.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el pronombre posesivo «suyo» por fidelidad al contexto, sin introducir «SEÑOR».
  - «Pactos» se usa como término bíblico coherente con el contexto deuterocanónico.
  - Se conserva la estructura causal paralela del griego para no borrar la tensión entre negación y fundamento positivo.
