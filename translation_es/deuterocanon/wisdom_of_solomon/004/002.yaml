review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: presencia/ausencia, imitación/deseo, y la imagen triunfal con corona tras vencer un ἀγών. Sin embargo, dos elecciones debilitan la fidelidad: la nota [a] está anclada erróneamente en «presente» aunque corresponde a ἐν τῷ αἰῶνι, y «incorruptibles» para ἀμιάντων desplaza el sentido de pureza/no contaminación hacia no corrupción o imperishabilidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «por el siglo» suena forzado en español eclesial actual, y «competencia de los premios incorruptibles» resulta algo rígido. Una redacción con «a través del siglo[a]» y «certamen de los premios incontaminados» conserva mejor el sentido y mejora la legibilidad.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La personificación femenina se conserva correctamente. La revisión propuesta ajusta ἀμιάντων a «incontaminados» para reflejar mejor «undefiled» según la decisión léxica auditada.
  issues:
  - severity: high
    issue: La nota al pie [a] está colocada en el lugar equivocado.
    rationale: La alternativa «para siempre» explica ἐν τῷ αἰῶνι, no παροῦσάν. En el texto actual, [a] aparece sobre «presente», lo que falsea la relación entre texto y nota.
  - severity: medium
    issue: «Incorruptibles» no refleja con precisión ἀμιάντων.
    rationale: El griego apunta a «no manchados / no contaminados / puros». «Incorruptibles» introduce más bien la idea de imperecedero o no corruptible, distinta de la pureza moral destacada en la auditoría inglesa.
  - severity: low
    issue: «Por el siglo» suena poco natural en español actual.
    rationale: Aunque intenta conservar la literalidad de ἐν τῷ αἰῶνι, en español resulta opaco. «A través del siglo» o «a lo largo del siglo» preserva mejor la imagen temporal con mayor claridad.
  - severity: low
    issue: «Competencia» es aceptable, pero «certamen» encaja mejor con la imaginería atlética solemne.
    rationale: ἀγών aquí se mueve en el campo de contienda pública/victoria/corona. «Certamen» suena más natural y elevado en este contexto literario.
  revised_spanish_text: Cuando está presente, la imitan, y la anhelan cuando se ha ido; y a través del siglo[a] marcha en triunfo, llevando una corona de vencedor, después de haber ganado el certamen de los premios incontaminados.
  revised_footnotes:
  - marker: a
    text: O «para siempre». La frase griega dice literalmente «en el siglo» y puede indicar fama perdurable o duración continua.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] para anclarla correctamente a ἐν τῷ αἰῶνι. Se sustituye «por el siglo» por «a través del siglo» para mayor claridad sin perder la tensión semántica del griego. Se cambia «incorruptibles» por «incontaminados» para reflejar mejor ἀμιάντων («undefiled»), y «competencia» por «certamen» para una imagen atlética más natural y digna en español.
