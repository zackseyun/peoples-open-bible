translation:
  language: es
  text: 'Y él dijo a la mujer: «Tu fe[a] te ha salvado[b]; ve en paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tu confianza»; menos probable aquí, «Tu fidelidad».
    reason: lexical_alternative
  - marker: b
    text: O «te ha sanado». El verbo griego también puede significar «salvar», «rescatar» o «sanar», pero aquí el contexto enfatiza el perdón y la salvación.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - le dijo
  - habló
  lexicon: BDAG
  rationale: El aoristo de λέγω se vierte de manera natural y directa con «dijo». Mantiene la sencillez narrativa del griego y la opción inglesa auditada.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como continuidad narrativa simple. «Y» conserva ese enlace sin cargar contraste que el contexto no exige.
- source_word: πρὸς τὴν γυναῖκα
  english_pob_choice: to the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - para la mujer
  - a la señora
  lexicon: BDAG
  rationale: γυνή en este contexto designa a la mujer presente, no a una esposa. «A la mujer» es la equivalencia más natural y fiel.
- source_word: Ἡ πίστις σου
  english_pob_choice: Your faith
  chosen_spanish: Tu fe
  alternatives_spanish:
  - Tu confianza
  - Tu fidelidad
  lexicon: BDAG
  rationale: πίστις se traduce normalmente como «fe» en la línea doctrinal y lexical del proyecto. «Confianza» expresa una posible matiz, pero «fe» preserva mejor el término recibido; «fidelidad» queda como alternativa menos probable.
- source_word: σέσωκέν σε
  english_pob_choice: has saved you
  chosen_spanish: te ha salvado
  alternatives_spanish:
  - te ha sanado
  - te ha hecho bien
  - te ha rescatado
  lexicon: BDAG
  rationale: El perfecto de σῴζω indica una acción completada con resultado vigente. En este contexto de perdón y salvación, «ha salvado» conserva el peso teológico que la nota inglesa protege, sin cerrar por completo la posible resonancia terapéutica.
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  - ponte en camino
  lexicon: BDAG
  rationale: El imperativo de πορεύομαι se expresa de modo conciso con «ve». Es idiomático en español y suficientemente cercano al mandato del texto.
- source_word: εἰς εἰρήνην
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - hacia la paz
  - con paz
  lexicon: BDAG
  rationale: Aunque εἰς es literalmente «a/entro de», la expresión idiomática «ve en paz» reproduce bien el efecto del griego y la formulación inglesa auditada.
theological_decisions:
- issue: Sentido de σῴζω entre salvación y sanidad
  english_pob_reading: Rendered as 'has saved you' rather than a merely therapeutic sense such as 'has made you well.'
  chosen_spanish_reading: «te ha salvado» mantiene la lectura salvífica principal, sin excluir la posible resonancia de bienestar.
  alternative_spanish_readings:
  - te ha sanado
  - te ha hecho bien
  rationale: El contexto inmediato de Lucas 7:36–50 destaca el perdón y la respuesta de fe de la mujer. Por eso conviene conservar «salvado» en el texto principal y no reducirlo a una idea meramente médica.
  doctrine_reference: Mantener la tensión léxica y teológica de σῴζω; equivalencia óptima; fe como respuesta confiada.
translation_notes:
  revision_awareness: El borrador sigue de cerca el registro, las decisiones léxicas y la tensión teológica del texto auditado en inglés. No se observan revisiones previas aplicadas en el expediente, y la versión inglesa más reciente quedó sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin incidencia en este versículo.
  - Se conserva «fe» como traducción principal de πίστις, conforme al uso coherente del proyecto.
  - «Te ha salvado» reproduce el valor fuerte de σῴζω y evita una reducción a mera curación.
  - La puntuación y el orden siguen un español natural y reverente, sin suavizar el contenido del original.
