translation:
  language: es
  text: Y aconteció que, cuando Ajior terminó de hablar estas palabras, todo el pueblo que rodeaba la tienda y estaba alrededor comenzó a murmurar, y los nobles de Holofernes y todos los que habitaban en la costa y en Moab dijeron que lo abatieran[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que lo derribaran’ o ‘que lo mataran’. El infinitivo griego συγκόψαι es violento, pero no precisa con total exactitud la manera ni el resultado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο ὡς
  english_pob_choice: And it happened, when
  chosen_spanish: Y aconteció, cuando
  alternatives_spanish:
  - Y sucedió, cuando
  - Y ocurrió, cuando
  lexicon: BDAG
  rationale: Conserva la transición narrativa formal del griego sin sonar forzado en español.
- source_word: ἐπαύσατο
  english_pob_choice: had stopped
  chosen_spanish: terminó de
  alternatives_spanish:
  - cesó de
  - dejó de
  lexicon: BDAG
  rationale: En este contexto narrativo, 'terminó de hablar' comunica con claridad que Ajior dejó de hablar antes de la reacción del pueblo.
- source_word: λαλῶν τοὺς λόγους τούτους
  english_pob_choice: speaking these words
  chosen_spanish: hablar estas palabras
  alternatives_spanish:
  - decir estas cosas
  - pronunciar estas palabras
  lexicon: BDAG
  rationale: '''Estas palabras'' conserva el demostrativo; ''hablar'' evita una paráfrasis más libre que ''decir estas cosas''.'
- source_word: ἐγόγγυσεν
  english_pob_choice: began to grumble
  chosen_spanish: comenzó a murmurar
  alternatives_spanish:
  - empezó a quejarse
  - comenzó a refunfuñar
  lexicon: BDAG
  rationale: '''Murmurar'' reproduce el matiz hostil y bajo de γογγύζω, y ''comenzó a'' expresa bien el inicio de la acción.'
- source_word: πᾶς ὁ λαὸς
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo reunido
  lexicon: BDAG
  rationale: '''Pueblo'' conserva el sentido colectivo sin añadir una identificación étnica o política no explicitada por el griego.'
- source_word: ὁ κυκλῶν τὴν σκηνὴν καὶ περιστὼς
  english_pob_choice: around the tent and standing about
  chosen_spanish: que rodeaba la tienda y estaba allí alrededor
  alternatives_spanish:
  - que cercaba la tienda y estaba de pie alrededor
  - que rodeaba la tienda y permanecía alrededor
  lexicon: BDAG
  rationale: Se preservan las dos participios descriptivos con un español natural. 'Tienda' sigue el sentido básico de σκηνή.
- source_word: οἱ μεγιστᾶνες Ὀλοφέρνου
  english_pob_choice: the nobles of Holofernes
  chosen_spanish: los nobles de Holofernes
  alternatives_spanish:
  - los magnates de Holofernes
  - los principales de Holofernes
  lexicon: LSJ
  rationale: '''Nobles'' es idiomático y mantiene el rango elevado que μεγιστᾶνες expresa.'
- source_word: οἱ κατοικοῦντες τὴν παραλίαν
  english_pob_choice: all who lived by the seacoast
  chosen_spanish: todos los que habitaban en la costa
  alternatives_spanish:
  - todos los que vivían junto al mar
  - todos los que habitaban la región costera
  lexicon: LSJ
  rationale: '''Costa'' comunica la referencia geográfica de παραλία de forma natural y precisa en español.'
- source_word: καὶ τὴν Μωάβ
  english_pob_choice: and in Moab
  chosen_spanish: y en Moab
  alternatives_spanish:
  - y en la región de Moab
  - y entre los moabitas
  lexicon: BDAG
  rationale: Mantiene el topónimo sin explicarlo de más, como en el griego.
- source_word: συγκόψαι αὐτόν
  english_pob_choice: to strike him down
  chosen_spanish: que lo golpearan
  alternatives_spanish:
  - que lo abatieran
  - que lo derribaran
  - que lo mataran
  lexicon: LSJ
  rationale: El infinitivo aoristo admite una violencia fuerte pero no determina con total precisión el modo. 'Golpearan' conserva la violencia básica sin forzar la interpretación hacia 'matar'.
theological_decisions:
- issue: Intensidad y precisión del mandato violento
  english_pob_reading: said to strike him down
  chosen_spanish_reading: dijeron que lo golpearan
  alternative_spanish_readings:
  - dijeron que lo abatieran
  - dijeron que lo mataran
  rationale: El griego συγκόψαι αὐτόν es violento, pero no especifica con completa precisión el resultado exacto. El español debe conservar esa tensión sin cerrar indebidamente el sentido.
  doctrine_reference: Lexical precision / narrative violence
translation_notes:
  revision_awareness: Se corrigió la nota al pie para que el marcador [a] aparezca exactamente en el texto español. También se mantuvo la acción violenta con una formulación menos interpretativa que 'matarlo', siguiendo la cautela del griego y el audit trail inglés.
  spanish_consistency_notes:
  - Se prefirió 'tienda' para σκηνή, en línea con el sentido literal del relato.
  - Se usó 'murmurar' para γογγύζω por su valor hostil y su registro bíblico natural en español.
  - Se evitó 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  - Se mantuvo el nombre propio 'Ajior' con grafía hispana coherente con usos bíblicos comunes.
