translation:
  language: es
  text: Las ranas subirán sobre ti[a], sobre tu pueblo y sobre todos tus servidores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre tu pueblo» en la segunda frase; el hebreo usa la misma preposición en todas las expresiones, pero el contexto favorece la idea de que las ranas subirán como una aflicción sobre Faraón y su reino.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְךָ / בְּךָ
  english_pob_choice: on you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - en ti
  - encima de ti
  lexicon: HALOT
  rationale: La preposición בְּ con עָלָה en este contexto de plaga expresa una irrupción hostil que afecta a Faraón personalmente. En español, «sobre ti» conserva bien esa idea de carga o embate sin sonar forzado.
- source_word: וּבְעַמְּךָ / בְּעַמְּךָ
  english_pob_choice: on your people
  chosen_spanish: sobre tu pueblo
  alternatives_spanish:
  - entre tu pueblo
  - contra tu pueblo
  lexicon: HALOT
  rationale: Se mantiene el paralelismo del hebreo con la misma preposición y se conserva el sentido de aflicción que recae sobre el pueblo. «Entre tu pueblo» sería posible, pero debilita el tono de invasión o golpe de plaga.
- source_word: וּבְכָל עֲבָדֶיךָ
  english_pob_choice: on all your servants
  chosen_spanish: sobre todos tus servidores
  alternatives_spanish:
  - sobre todos tus siervos
  - sobre todos tus esclavos
  - sobre todos tus oficiales
  lexicon: HALOT
  rationale: עֲבָדֶיךָ puede abarcar sirvientes, servidores o funcionarios de corte según el contexto. «Servidores» es neutral y digno en español, preserva la amplitud semántica y evita tanto «esclavos» como una restricción interpretativa como «oficiales».
- source_word: יַעֲלוּ
  english_pob_choice: will come up
  chosen_spanish: vendrán
  alternatives_spanish:
  - subirán
  - saldrán
  lexicon: HALOT
  rationale: Aunque el verbo literalmente es «subir/ascender», en español «vendrán» comunica de forma natural la llegada de las ranas como plaga. Mantiene el movimiento hacia el destinatario sin forzar una imagen demasiado mecánica.
- source_word: הַצְפַרְדְּעִים
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - las ranas del pantano
  - las batracias
  lexicon: HALOT
  rationale: El hebreo nombra a los animales de la plaga; en español «ranas» es la forma clara y usual. Se conserva el artículo definido para reflejar la referencia específica a la plaga anunciada.
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa presentan pleno acuerdo: la misma preposición se repite en las tres frases y el verbo indica movimiento ascendente de la plaga. La versión española conserva ese paralelismo, pero usa un verbo natural («vendrán») para una lectura pública fluida. No se introdujeron cambios textuales ni doctrinales.'
  spanish_consistency_notes:
  - Se evitó «Señor» u otras fórmulas de sustitución porque no aparece el Tetragrámaton en este versículo.
  - «Servidores» mantiene la amplitud contextual de עֲבָדֶיךָ sin imponer la idea de esclavitud formal ni de cargos oficiales.
  - La nota al pie recoge la alternativa espacial de la segunda frase, siguiendo la observación auditada sobre la preposición repetida.
