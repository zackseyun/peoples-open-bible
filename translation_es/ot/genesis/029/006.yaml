translation:
  language: es
  text: 'Él les dijo[a]: «¿Está bien?». Y ellos dijeron: «Está bien. Mira, Raquel su hija viene con el rebaño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Le va bien?». El hebreo usa שָׁלוֹם en el sentido de bienestar o buena salud.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲשָׁלוֹם לוֹ
  english_pob_choice: Is he well?
  chosen_spanish: ¿Está bien él?
  alternatives_spanish:
  - ¿Se encuentra bien?
  - ¿Está en paz?
  - ¿Goza de bienestar?
  lexicon: HALOT
  rationale: שָׁלוֹם aquí pregunta por bienestar, no por paz abstracta. En español, «¿Está bien él?» conserva la pregunta sobre su estado y deja visible el pronombre de referencia al varón interrogado, aunque suena algo literal; la alternativa más natural sería «¿Se encuentra bien?».
- source_word: שָׁלוֹם
  english_pob_choice: He is well
  chosen_spanish: Está bien
  alternatives_spanish:
  - Está en paz
  - Goza de bienestar
  - Todo va bien
  lexicon: HALOT
  rationale: La respuesta repite el campo semántico de bienestar de שָׁלוֹם. «Está bien» reproduce esa confirmación de manera natural en español sin introducir una noción religiosa de paz que el contexto no exige.
- source_word: וְהִנֵּה
  english_pob_choice: And look
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y observa
  - 'Y mira: '
  lexicon: HALOT
  rationale: הִנֵּה introduce una llamada de atención inmediata. «Y mira» conserva ese gesto deíctico en español contemporáneo y mantiene la vividez narrativa.
- source_word: רָחֵל
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  alternatives_spanish:
  - Racel
  - Rachel
  lexicon: Nombre propio bíblico
  rationale: En español bíblico estándar, el nombre se expresa como «Raquel». Es la forma más reconocible y lecturable para una audiencia amplia.
- source_word: בִּתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  - su hija Raquel
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere a Labán. «Su hija» mantiene la relación familiar explícita sin añadir el nombre en exceso, aunque el contexto ya identifica a Raquel.
- source_word: בָּאָה
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está llegando
  - venía
  lexicon: HALOT
  rationale: El participio narrativo presente una escena en curso; «viene» comunica la acción inmediata con naturalidad en español. «Está viniendo» sería más analítico, pero menos idiomático aquí.
- source_word: עִם הַצֹּאן
  english_pob_choice: with the flock
  chosen_spanish: con el rebaño
  alternatives_spanish:
  - con el ganado
  - con las ovejas
  - con su rebaño
  lexicon: HALOT
  rationale: צֹאן designa ganado menor en conjunto. «Rebaño» es la equivalencia natural en español para el colectivo animal del contexto, sin restringir innecesariamente a ovejas solamente.
translation_notes:
  revision_awareness: La fuente y el audit trail inglés muestran alta concordancia y no requieren revisión textual adicional; se ha mantenido la escena directa, el valor de bienestar de שָׁלוֹם y la deixis de הִנֵּה sin cambios sustanciales.
  spanish_consistency_notes:
  - Se usa «Raquel» como forma española estable del nombre propio.
  - Se evita «SEÑOR» o «paz» porque el contexto no es litúrgico sino de bienestar personal.
  - «Rebaño» se reserva para el colectivo de animales, coherente con צֹאן.
  - El marcador de nota a aparece en el punto de interrogación inicial para sostener la alternativa lexical sobre שָׁלוֹם.
