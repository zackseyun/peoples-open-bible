translation:
  language: es
  text: 'Pero Moisés le dijo: «¿Sientes celos por mí? ¡Ojalá todo el pueblo de Yahvé fueran profetas, y Yahvé pusiera su Espíritu[a] sobre ellos!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dar su Espíritu sobre ellos»; la expresión indica que Yahvé pondría su Espíritu sobre ellos para capacitarlos proféticamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְקַנֵּא
  english_pob_choice: are you jealous
  chosen_spanish: ¿Sientes celos por mí?
  alternatives_spanish:
  - ¿Estás celoso por mí?
  - ¿Tienes celos por mí?
  lexicon: HALOT
  rationale: El participio expresa aquí una actitud de celo celoso o rivalidad hacia Moisés. «Sientes celos» comunica con naturalidad en español esa tensión personal sin suavizarla como podría hacerlo «celoso» en un registro demasiado afectivo o meramente romántico.
- source_word: לִי
  english_pob_choice: for my sake
  chosen_spanish: por mí
  alternatives_spanish:
  - por mi causa
  - a mi favor
  lexicon: HALOT
  rationale: La preposición con sufijo primera persona indica interés dirigido a la persona de Moisés. «Por mí» es breve y natural en español; conserva el sentido relacional del hebreo.
- source_word: וּמִי יִתֵּן
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá!
  alternatives_spanish:
  - Si tan solo
  - ¡Quién diera!
  lexicon: HALOT
  rationale: La expresión es optativa, no interrogativa literal. «¡Ojalá!» transmite el deseo de Moisés de manera idiomática y fiel en español moderno.
- source_word: כָּל עַם יְהוָה
  english_pob_choice: all Yahweh’s people
  chosen_spanish: todo el pueblo de Yahvé
  alternatives_spanish:
  - todo el pueblo de Yahvé
  - todo el pueblo de Yahvé perteneciente a él
  lexicon: HALOT
  rationale: La construcción posesiva expresa el pueblo perteneciente a Yahvé. «Todo el pueblo de Yahvé» conserva el vínculo de pertenencia y mantiene el nombre divino sin sustitución.
- source_word: נְבִיאִים
  english_pob_choice: prophets
  chosen_spanish: profeta
  alternatives_spanish:
  - profetas
  - personas que profetizan
  lexicon: HALOT
  rationale: Aunque el plural hebreo exige sentido colectivo, en español la frase optativa «fuera profeta» funciona de modo genérico y evita una formulación forzada; el contexto ya marca el plural colectivo de «todo el pueblo». La alternativa plural «profetas» también sería posible, pero la forma singular predicativa fluye mejor con «todo el pueblo».},{
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Según la convención española del proyecto, se traduce con «Yahvé» y no con la sustitución «el SEÑOR», preservando el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: רוּחוֹ en contexto de empoderamiento profético
  english_pob_reading: his Spirit
  chosen_spanish_reading: su Espíritu
  alternative_spanish_readings:
  - su espíritu
  - su aliento
  rationale: En este contexto de profecía, רוּחַ alude al Espíritu de Dios que capacita para hablar proféticamente. La mayúscula en «Espíritu» ayuda a señalar el referente divino sin añadir contenido ajeno al hebreo.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Modalidad del deseo en וּמִי יִתֵּן כִּי
  english_pob_reading: If only ... that Yahweh would put his Spirit on them
  chosen_spanish_reading: ¡Ojalá ... y Yahvé pusiera su Espíritu sobre ellos!
  alternative_spanish_readings:
  - Si tan solo ...
  - ¡Quién diera ...!
  rationale: La secuencia expresa deseo, no una condición hipotética ni una pregunta. La combinación de «¡Ojalá!» con el imperfecto de subjuntivo reproduce adecuadamente la fuerza optativa del hebreo.
  doctrine_reference: HALOT; POB optative rendering conventions
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora los marcadores [a] y [b] aparecen exactamente en el texto español en los puntos correspondientes. También se mantuvo la lectura fuente-centrada del Tetragrama como «Yahvé» y se ajustó la optatividad del hebreo con una construcción natural en español.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustitución del nombre divino, conforme a la norma del proyecto.
  - «Espíritu» se capitaliza por tratarse del Espíritu de Dios en contexto de profecía.
  - La forma «fuera profeta[a]» mantiene la fuerza colectiva del hebreo sin sobrecargar la sintaxis española.
  - No se introducen términos eclesiales tradicionales sin respaldo del fuente; se conserva el léxico directo del texto hebreo.
