translation:
  language: es
  text: Deben tener balanzas justas[a], pesas justas, una efa[b] justa y un hin[c] justo. Yo soy Yahvé su Dios, que los saqué de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «balanzas honestas, pesas honestas»; el hebreo repite צֶדֶק, término que suele significar «justicia» o «rectitud», aquí aplicado a medidas comerciales.'
    reason: lexical_alternative
  - marker: b
    text: Una efa era una antigua medida seca.
    reason: cultural_note
  - marker: c
    text: Un hin era una antigua medida líquida.
    reason: cultural_note
lexical_decisions:
- source_word: מֹאזְנֵי צֶדֶק
  english_pob_choice: just scales / honest scales
  chosen_spanish: balanzas justas
  alternatives_spanish:
  - balanzas honestas
  - balanzas rectas
  - balanzas de justicia
  lexicon: HALOT
  rationale: מֹאזְנֵי se refiere a balanzas o instrumentos de pesaje. Para צֶדֶק, el audit trail inglés oscila entre 'honest' y 'just'; en español, 'justas' conserva mejor la fuerza semántica de צֶדֶק sin sonar idiomáticamente extraño en un contexto comercial.
- source_word: אַבְנֵי צֶדֶק
  english_pob_choice: just weights / honest weights
  chosen_spanish: pesas justas
  alternatives_spanish:
  - pesas honestas
  - pesas rectas
  - piedras justas
  lexicon: HALOT
  rationale: אַבְנֵי literalmente es 'piedras', es decir, pesas de piedra usadas para medir. En español, 'pesas' comunica el referente práctico; 'justas' mantiene el valor ético de צֶדֶק aplicado a medidas comerciales.
- source_word: אֵיפַת צֶדֶק
  english_pob_choice: a just ephah
  chosen_spanish: una efa justa
  alternatives_spanish:
  - una efa de justicia
  - una medida de efa justa
  - un efa justo
  lexicon: HALOT
  rationale: Se retiene 'efa' como unidad antigua, siguiendo la decisión del POB inglés de preservar el término fuente. El adjetivo 'justa' reproduce la repetición de צֶדֶק en español con naturalidad.
- source_word: וְהִין צֶדֶק
  english_pob_choice: and a just hin
  chosen_spanish: un hin justo
  alternatives_spanish:
  - un hin de justicia
  - una medida líquida justa
  - y un hin justo
  lexicon: HALOT
  rationale: 'Se mantiene ''hin'' por la misma razón que ''efa'': es una unidad antigua específica. ''Justo'' refleja el paralelo con las demás medidas y preserva la cadencia del hebreo.'
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: You shall have
  chosen_spanish: Tendrán
  alternatives_spanish:
  - Tendrán ustedes
  - Deberán tener
  - Habrá para ustedes
  lexicon: HALOT
  rationale: El hebreo literalmente expresa 'será para ustedes'. En español, 'Tendrán' da una instrucción natural y directa. Aunque omite la posesión explícita, la idea normativa queda clara en el contexto legal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יְהוָה: ''Yahvé''. Esto preserva el nombre propio divino frente a una sustitución por título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios de ustedes
  - tu Dios
  lexicon: HALOT
  rationale: En español de registro bíblico amplio, 'su Dios' es natural para el plural de respeto/generalización. Aunque el hebreo es plural, el sentido del pacto se comunica sin forzar un posesivo arcaico.
- source_word: הוֹצֵאתִי אֶתְכֶם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: who brought you out of the land of Egypt
  chosen_spanish: que los saqué de la tierra de Egipto
  alternatives_spanish:
  - que los saqué de la tierra de Egipto
  - que los hice salir de la tierra de Egipto
  - que los saqué de Egipto
  lexicon: HALOT
  rationale: '''Sacar de'' es la manera española más natural de reproducir la fórmula del éxodo. ''Los'' funciona aquí como forma de tratamiento general en español; no altera la referencia colectiva del texto.'
theological_decisions:
- issue: Repetición de צֶדֶק en medidas comerciales
  english_pob_reading: just / honest applied to scales, weights, ephah, and hin
  chosen_spanish_reading: justas / justo aplicado a balanzas, pesas y medidas
  alternative_spanish_readings:
  - honestas / honestos
  - rectas / recto
  - de justicia
  rationale: El hebreo repite צֶדֶק cuatro veces para insistir en la integridad comercial. En español, 'justo/a' conserva esa repetición de manera uniforme y más cercana al campo semántico principal que 'honesto', sin perder claridad.
  doctrine_reference: Translation philosophy §§5–6
- issue: Representación de las unidades antiguas
  english_pob_reading: retain 'ephah' and 'hin'
  chosen_spanish_reading: retener 'efa' y 'hin'
  alternative_spanish_readings:
  - medida seca
  - medida líquida
  - equivalentes modernos aproximados
  rationale: La conservación de las unidades respeta la especificidad cultural del texto y evita falsos equivalentes modernos. La instrucción legal depende de la justicia en la medición, no de la conversión exacta.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto exige transliterar el Tetragrámaton como 'Yahvé'. Esto mantiene visible el nombre del pacto y evita la sustitución por un título.
  doctrine_reference: Project terminology default for יהוה / YHWH
translation_notes:
  revision_awareness: El audio/traza inglesa pasó de 'honest' a 'just' para צֶדֶק y luego confirmó la preferencia formal por 'just'. La redacción española sigue esa última decisión, pero adopta 'balanzas justas' y 'pesas justas' como equivalentes naturales en español. También conserva las unidades antiguas 'efa' e 'hin', en coherencia con la estrategia de equivalencia óptima. No se introduce una nota separada para 'hin' porque la nota cultural sobre 'efa' cubre la conservación de unidades antiguas, y el texto español ya mantiene ambas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustitución del nombre divino.
  - Se mantiene el paralelismo repetido de צֶדֶק con 'justas/justo'.
  - '''su Dios'' es un posesivo reverente y natural en español, compatible con el plural hebreo.'
  - La nota sobre 'efa' cubre la estrategia de unidades antiguas; 'hin' se deja sin nota por economía editorial y porque su sentido queda claro por el contexto.
