theological_decisions:
- issue: Rendering of חֶסֶד in a covenantal prophetic context
  chosen_reading: covenant loyalty
  alternative_readings:
  - steadfast love
  - faithfulness
  rationale: The verse rebukes the fleeting quality of Israel and Judah's response to God. 'Covenant loyalty' best preserves the relational and covenantal force of חֶסֶד without reducing it to mere emotion. Because the term is semantically rich and the alternatives are common in English Bible tradition, they are preserved in a footnote rather than flattened into a single narrower gloss.
  doctrine_reference: Translation philosophy §3, §5
