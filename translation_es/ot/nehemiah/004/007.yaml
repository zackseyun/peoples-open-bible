translation:
  language: es
  text: Entonces aposté a los hombres en las partes más bajas del lugar[a], detrás del muro, en los lugares expuestos; y aposté al pueblo por familias, con sus espadas, sus lanzas y sus arcos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los lugares desnudos/abiertos». El término hebreo es raro y puede referirse a secciones expuestas o sin cobertura, vulnerables al ataque.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַעֲמִיד
  english_pob_choice: I stationed
  chosen_spanish: coloqué
  alternatives_spanish:
  - estacioné
  - puse en posición
  - aposté
  lexicon: HALOT
  rationale: El verbo causativo de עמד aquí expresa colocar personas en una disposición defensiva. En español, «coloqué» comunica bien la acción de ubicar estratégicamente, sin sonar forzado; «estacioné» sería posible, pero puede sonar más técnico o militar de un modo que no siempre fluye naturalmente.
- source_word: מִתַּחְתִּיּוֹת
  english_pob_choice: the lowest parts
  chosen_spanish: las partes más bajas
  alternatives_spanish:
  - los lugares más bajos
  - las zonas más bajas
  - las partes inferiores
  lexicon: HALOT
  rationale: El término remite a un lugar bajo o más bajo. «Las partes más bajas» conserva la referencia espacial y permite mantener la ambigüedad del hebreo sin sobreinterpretar si se trata de tramos bajos, hundidos o vulnerables del muro.
- source_word: מֵאַחֲרֵי לַחוֹמָה
  english_pob_choice: behind the wall
  chosen_spanish: detrás del muro
  alternatives_spanish:
  - tras el muro
  - al otro lado del muro
  - a la parte de atrás del muro
  lexicon: HALOT
  rationale: «Detrás del muro» es la forma más natural y clara en español para la relación posicional del hebreo, y conserva el valor defensivo del contexto.
- source_word: בצחחיים
  english_pob_choice: in the exposed areas
  chosen_spanish: en los lugares expuestos
  alternatives_spanish:
  - en los lugares descubiertos
  - en los lugares abiertos
  - en las zonas expuestas
  lexicon: HALOT
  rationale: El término es raro y puede aludir a lugares desnudos, abiertos o vulnerables. «Lugares expuestos» mantiene la idea de vulnerabilidad táctica que subraya el contexto de fortificación, sin fijar indebidamente un matiz secundario.
- source_word: וָאַעֲמִיד אֶת־הָעָם
  english_pob_choice: and I stationed the people
  chosen_spanish: y coloqué al pueblo
  alternatives_spanish:
  - y puse al pueblo
  - y aposté al pueblo
  - y ubiqué al pueblo
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo para reflejar la organización deliberada de la defensa. «Pueblo» traduce el colectivo hebreo de forma directa y natural, manteniendo el paralelismo con la primera cláusula.
- source_word: לְמִשְׁפָּחוֹת
  english_pob_choice: by families
  chosen_spanish: por familias
  alternatives_spanish:
  - según sus familias
  - por clanes
  - por sus familias
  lexicon: HALOT
  rationale: «Por familias» reproduce con naturalidad la organización en grupos familiares. «Clanes» sería posible, pero introduce un tono más técnico que no es necesario aquí.
- source_word: חַרְבֹתֵיהֶם
  english_pob_choice: their swords
  chosen_spanish: sus espadas
  alternatives_spanish:
  - sus espadas de guerra
  - sus espadas
  lexicon: HALOT
  rationale: חרב es el término usual para espada; «espadas» es exacto y transparente en español.
- source_word: רָמְחֵיהֶם
  english_pob_choice: their spears
  chosen_spanish: sus lanzas
  alternatives_spanish:
  - sus picas
  - sus lanzas largas
  - sus dardos
  lexicon: HALOT
  rationale: Rמח puede traducirse por «lanza» o «lanza/arma arrojadiza» según contexto. En un inventario militar junto con espada y arco, «lanzas» es un equivalente natural en español y coherente con el conjunto de armas.
- source_word: וְקַשְּׁתֹתֵיהֶם
  english_pob_choice: and their bows
  chosen_spanish: y sus arcos
  alternatives_spanish:
  - y sus arcos de guerra
  - y sus arcos
  lexicon: HALOT
  rationale: קשת significa «arco»; se mantiene el listado triádico de armas sin añadir explicaciones innecesarias.
theological_decisions:
- issue: Representación del recurso divino implícito en la organización militar
  english_pob_reading: No theological note; the verse is a tactical description.
  chosen_spanish_reading: No se añade formulación devocional; se mantiene como descripción táctica.
  alternative_spanish_readings:
  - Se podría espiritualizar el pasaje.
  - Se podría explicitar protección divina.
  rationale: El hebreo describe una disposición defensiva concreta. La traducción debe conservar ese carácter histórico y táctico sin introducir una lectura devocional que el versículo no expresa de manera explícita.
  doctrine_reference: Principio de sobriedad exegética y respeto al sentido literal-histórico del texto.
translation_notes:
  revision_awareness: El contexto de auditoría en inglés coincide en alto grado y no requiere correcciones textuales. Se siguió la lectura óptima-equivalente con atención al valor militar y espacial del hebreo, preservando la repetición verbal y la lista de armas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiere; este versículo no contiene el tetragrámaton.
  - Se mantuvo «pueblo» para הָעָם por claridad colectiva, y «familias» para לְמִשְׁפָּחוֹת sin sustituirlo por «clanes» salvo como alternativa.
  - Se prefirió «lanzas» a «picas» o «lanzas largas» por naturalidad y correspondencia con el inventario militar.
  - La nota al pie se ancla en «expuestos» para conservar la ambigüedad semántica del término raro sin sobrecargar el texto principal.
