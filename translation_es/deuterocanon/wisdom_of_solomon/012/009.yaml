translation:
  language: es
  text: no porque fueras incapaz, en combate, de poner a los impíos bajo sujeción, o para exterminarlos de una vez[a] por medio de bestias feroces o de una palabra tajante[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de un solo golpe». El idiomatismo griego ὑφʼ ἓν subraya destruirlos a todos en una sola acción.
    reason: lexical_alternative
  - marker: b
    text: O «de una palabra cortante» o «de un mandato severo».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀδυνατῶν
  english_pob_choice: not because you were unable
  chosen_spanish: no porque fueras incapaz
  alternatives_spanish:
  - no por no tener poder
  - no porque no pudieras
  lexicon: LSJ
  rationale: 'El participio expresa una causa negada: la demora del juicio no se debió a falta de poder. En español, «no porque fueras incapaz» conserva la fuerza causal y la referencia directa a Dios sin sonar mecánico.'
- source_word: ἐν παρατάξει
  english_pob_choice: in battle
  chosen_spanish: en combate
  alternatives_spanish:
  - en batalla
  - en formación de batalla
  lexicon: LSJ
  rationale: παράταξις tiene sentido militar. «En combate» es natural en español actual y mantiene el campo semántico bélico sin un giro demasiado técnico.
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los malvados
  lexicon: LSJ
  rationale: En Sabiduría, ἀσεβής suele señalar impiedad frente a Dios. «Impíos» preserva mejor esa dimensión religiosa que «malvados».
- source_word: ὑποχειρίους δοῦναι
  english_pob_choice: to give ... into subjection
  chosen_spanish: poner ... bajo sujeción
  alternatives_spanish:
  - entregar ... a su poder
  - someter ...
  lexicon: LSJ
  rationale: La imagen es de dominación o sometimiento bajo la mano/poder de alguien. «Poner bajo sujeción» conserva el valor verbal de dominio sin perder claridad en español.
- source_word: θηρίοις δεινοῖς
  english_pob_choice: by savage beasts
  chosen_spanish: por medio de bestias feroces
  alternatives_spanish:
  - por medio de bestias salvajes
  - por bestias terribles
  lexicon: LSJ
  rationale: θῆρια son bestias salvajes y δεινοῖς intensifica su carácter temible. «Bestias feroces» comunica ambos matices con naturalidad.
- source_word: λόγῳ ἀποτόμῳ
  english_pob_choice: by a sharp word
  chosen_spanish: de una palabra tajante
  alternatives_spanish:
  - de una palabra cortante
  - de un mandato severo
  lexicon: LSJ
  rationale: ἀπότομος puede ser «cortante», «severo» o «tajante». «Palabra tajante» mantiene la imagen de una palabra decisiva y enérgica, y evita suavizar el golpe retórico.
- source_word: ὑφʼ ἓν
  english_pob_choice: at once
  chosen_spanish: de una vez
  alternatives_spanish:
  - en un solo acto
  - de un solo golpe
  lexicon: LSJ
  rationale: 'El idiom expresa unidad de acción: todo ocurre en una sola vez. «De una vez» es idiomático en español y conserva esa inmediatez.'
- source_word: ἐκτρῖψαι
  english_pob_choice: to wipe them out
  chosen_spanish: exterminarlos
  alternatives_spanish:
  - borrarlos de la faz de la tierra
  - destruirlos
  lexicon: LSJ
  rationale: El verbo sugiere borrar/aniquilar por completo. «Exterminarlos» expresa la totalidad del acto destructivo con fuerza equivalente.
theological_decisions:
- issue: La demora del castigo no se interpreta como incapacidad divina
  english_pob_reading: not because you were unable
  chosen_spanish_reading: no porque fueras incapaz
  alternative_spanish_readings:
  - no porque no pudieras
  - no por falta de poder
  rationale: La frase debe transmitir que la paciencia o gradualidad del juicio no implica limitación en Dios. «Fueras incapaz» hace explícita la negación de incapacidad sin introducir una tesis ajena al griego.
  doctrine_reference: Sabiduría 12:9; filosofía de traducción POB sobre causalidad explícita
- issue: ὑφʼ ἓν como acción única y total
  english_pob_reading: at once / in one stroke
  chosen_spanish_reading: de una vez
  alternative_spanish_readings:
  - en un solo golpe
  - en una sola acción
  rationale: El griego enfatiza que la destrucción podía ocurrir en un solo acto. «De una vez» conserva esa unidad temporal y permite leer la frase como destrucción total sin añadir matices innecesarios.
  doctrine_reference: Sabiduría 12:9; nota lexical de ὑφʼ ἓν
- issue: λόγῳ ἀποτόμῳ como palabra de juicio o mandato severo
  english_pob_reading: by a sharp word / by a cutting word or by a severe command
  chosen_spanish_reading: de una palabra tajante
  alternative_spanish_readings:
  - de una palabra cortante
  - de un mandato severo
  rationale: La expresión puede describir una palabra que corta o una orden severa. «Palabra tajante» mantiene deliberadamente la tensión entre ambos sentidos sin reducirla a un solo giro interpretativo.
  doctrine_reference: Sabiduría 12:9; nota lexical de λόγῳ ἀποτόμῳ
translation_notes:
  revision_awareness: El texto griego coincide con la capa adjudicada de traducción lista para uso, con acuerdo alto y sin revisiones aplicadas en la última pasada. La versión española mantiene la causalidad negativa, el léxico militar, la impiedad religiosa, el valor intensivo de ὑφʼ ἓν y la tensión entre «palabra» y «mandato» en λόγῳ ἀποτόμῳ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino explícito, pero el destinatario implícito es Dios, por lo que se conserva el tratamiento en segunda persona.
  - Se prefiere «impíos» para ἀσεβεῖς por su carga religiosa y no meramente moral.
  - Se mantiene un registro sobrio y bíblico, pero con sintaxis española natural.
  - Las notas a y b reflejan alternativas reales del griego y del audit trail inglés sin duplicar marcadores.
