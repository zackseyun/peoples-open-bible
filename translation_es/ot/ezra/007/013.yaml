  text: מִנִּ/י֮ שִׂ֣ים טְעֵם֒ דִּ֣י כָל מִתְנַדַּ֣ב בְּ/מַלְכוּתִ/י֩ מִן עַמָּ֨/ה יִשְׂרָאֵ֜ל וְ/כָהֲנ֣וֹ/הִי וְ/לֵוָיֵ֗/א לִ/מְהָ֧ךְ לִֽ/ירוּשְׁלֶ֛ם עִמָּ֖/ךְ יְהָֽךְ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezra/007/013.yaml
  text: A decree is issued by me that anyone in my kingdom from the people of Israel[a], and their priests and Levites, who freely offers himself to go to Jerusalem with you[b], may go.
  footnotes:
  - marker: a
    text: Or 'everyone who volunteers.' The Aramaic participle emphasizes willing, voluntary action.
    reason: lexical_alternative
  - marker: b
    text: Or 'and his priests,' if the suffix is taken differently; context favors 'its priests,' referring to Israel.
    reason: alternative_reading
