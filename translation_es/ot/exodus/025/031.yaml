revisions:
- from: Harás un candelabro de oro puro[a]. El candelabro se hará de obra martillada; su base y su tallo, sus copas[b], sus botones y sus flores serán de una sola pieza con él.
  to: Harás un candelero de oro puro[a]. El candelero se hará de obra martillada; su base y su tallo, sus copas[b], sus botones y sus flores serán de una sola pieza con ella.
  rationale: 'Se propone una reparación pequeña pero útil: ''candelero'' refleja mejor מְנֹרָה/lampstand en español bíblico y evita la asociación moderna de ''candelabro'' con velas; además, ''con ella'' expresa mejor que todas las partes proceden de la misma pieza. El resto del borrador es fiel y puede mantenerse.'
