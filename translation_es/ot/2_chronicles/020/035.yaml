translation:
  language: es
  text: Después de esto[a], Josafat, rey de Judá, se alió con Ocozías, rey de Israel[b], quien obró mal al hacerlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Despuésward», «Después de estas cosas».
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula «quien obró mal al hacerlo» sigue la lectura más natural del hebreo, que refiere el juicio a Ocozías; más literalmente: «él obró mal para hacerlo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después
  - Después de estas cosas
  - Luego
  lexicon: HALOT
  rationale: La expresión marca transición temporal al relato siguiente; «Después de esto» conserva la secuencia sin añadir material interpretativo.
- source_word: אֶתְחַבַּר
  english_pob_choice: allied himself with
  chosen_spanish: se alió con
  alternatives_spanish:
  - se unió con
  - entró en alianza con
  - se asoció con
  lexicon: HALOT
  rationale: El hitpael de חבר aquí sugiere una asociación o alianza política. «Se alió con» comunica esa fuerza de forma natural en español y mantiene el matiz relacional del hebreo.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Josaphat
  lexicon: Nombres propios bíblicos
  rationale: Se adopta la forma española bíblica más reconocible y estable en uso eclesial, sin alterar la identidad del nombre.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - rey sobre Judá
  - monarca de Judá
  lexicon: HALOT
  rationale: La construcción nominal se vierte directamente con el título real estándar en español.
- source_word: עִם אֲחַזְיָה מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: with Ahaziah king of Israel
  chosen_spanish: con Ocozías, rey de Israel
  alternatives_spanish:
  - con Ocozías, el rey de Israel
  - junto con Ocozías, rey de Israel
  lexicon: HALOT
  rationale: La preposición עִם y el aposicional regío se expresan de manera directa. Se usa «Ocozías» como forma española habitual del nombre.
- source_word: הוּא
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - él
  - el cual
  lexicon: HALOT
  rationale: El pronombre independiente introduce una cláusula descriptiva; «quien» evita la repetición de nombres y conserva la referencia al antecedente inmediato, siguiendo la lectura contextual de la nota inglesa.
- source_word: הִרְשִׁיעַ
  english_pob_choice: acted wickedly
  chosen_spanish: obró mal
  alternatives_spanish:
  - actuó malvadamente
  - hizo lo malo
  - procedió impíamente
  lexicon: HALOT
  rationale: El hiphil de רשע expresa conducta culpable o malvada. «Obró mal» es conciso y fiel, y mantiene la fuerza moral del verbo sin sobrerretórica.
- source_word: לַ/עֲשׂוֹת
  english_pob_choice: in doing so
  chosen_spanish: al hacerlo
  alternatives_spanish:
  - en hacerlo
  - al actuar así
  - al proceder de ese modo
  lexicon: HALOT
  rationale: La construcción infinitiva con ל queda bien reflejada por «al hacerlo», que suena natural y preserva la relación entre la acción y el juicio moral.
theological_decisions:
- issue: Referente de הוּא y alcance del juicio moral
  english_pob_reading: The pronoun refers to Ahaziah, describing him as the one who acted wickedly.
  chosen_spanish_reading: La cláusula modifica a Ocozías como el que obró mal al hacer esa alianza.
  alternative_spanish_readings:
  - 'La cláusula podría leerse de modo más literal: «él obró mal al hacerlo».'
  - Podría entenderse que el juicio recae sobre la acción de alianza en general.
  rationale: La cercanía del antecedente y la lectura narrativa favorecen que el pronombre se refiera a Ocozías. La formulación española mantiene esa decisión sin eliminar la ligera tensión sintáctica del hebreo, que sigue siendo reflejada por la nota.
  doctrine_reference: Exégesis gramatical y contexto narrativo de 2 Crónicas 20:35
translation_notes:
  revision_awareness: El pasaje muestra acuerdo sustancial con el audit trail inglés; no se requieren revisiones adicionales. Se conserva la tensión del pronombre hebreo al explicarla en nota, sin forzar una paráfrasis más amplia que el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la norma del proyecto, pero este versículo no lo contiene.
  - Se usa «se alió con» para el valor político-relacional de חבר, coherente con el enfoque POB.
  - Se eligen formas españolas bíblicas habituales para los nombres propios («Josafat», «Ocozías») para legibilidad eclesial.
  - Se conserva un registro moderno pero digno, evitando calcos innecesarios.
  - La nota b preserva la alternativa literal del hebreo sin debilitar la lectura principal.
