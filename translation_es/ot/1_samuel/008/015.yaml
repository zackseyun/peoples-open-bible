- from: Él tomará la décima parte de tu semilla y de tus viñas, y la dará a sus oficiales[a] y a sus siervos.
  to: Él tomará la décima parte de la semilla de ustedes y de sus viñas, y la dará a sus oficiales[a] y a sus siervos.
  rationale: Se corrige la segunda persona del singular al plural para reflejar fielmente los sufijos hebreos dirigidos al pueblo. También se ajusta 'tu semilla' a 'la semilla de ustedes' para conservar la literalidad básica de זַרְעֵיכֶם con una expresión española más natural y clara. Se mantiene la nota léxica sobre 'oficiales/eunucos' y la elección 'siervos', que sigue siendo adecuada en este contexto.
