translation:
  language: es
  text: Él era hijo de una viuda, de la tribu de Neftalí[a], y su padre era un hombre de Tiro, un trabajador[b] en bronce. Fue dotado de sabiduría, entendimiento y conocimiento para hacer toda clase de trabajo en bronce[c]. Entonces fue al rey Salomón e hizo todo su trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un tirio», es decir, un hombre de Tiro.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «artesano»; el hebreo subraya la actividad de trabajar el bronce.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo neḥoshet puede denotar cobre o bronce; aquí «bronce» encaja con el contexto de los utensilios del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אִשָּׁה אַלְמָנָה
  english_pob_choice: the son of a widow
  chosen_spanish: hijo de una viuda
  alternatives_spanish:
  - el hijo de una viuda
  - hijo de viuda
  lexicon: HALOT
  rationale: La construcción hebrea destaca el estado de viudez de la madre. En español, 'hijo de una viuda' suena natural y conserva ese énfasis sin agregar información.
- source_word: מִמַּטֵּה נַפְתָּלִי
  english_pob_choice: from the tribe of Naphtali
  chosen_spanish: de la tribu de Neftalí
  alternatives_spanish:
  - de Neftalí
  - de la tribu de Naphtalí
  lexicon: HALOT
  rationale: מַטֶּה en contexto genealógico/étnico significa 'tribu'. 'De la tribu de Neftalí' es claro y corresponde al valor social del hebreo.
- source_word: אִישׁ צֹרִי
  english_pob_choice: a man of Tyre
  chosen_spanish: un hombre de Tiro
  alternatives_spanish:
  - un tirio
  - un hombre tirio
  - un hombre de la ciudad de Tiro
  lexicon: HALOT
  rationale: El gentilicio hebreo remite al origen en Tiro. 'Un hombre de Tiro' preserva la referencia geográfica de manera transparente y evita una forma más técnica si no es necesaria.
- source_word: חֹרֵשׁ נְחֹשֶׁת
  english_pob_choice: a worker in bronze
  chosen_spanish: un trabajador en bronce
  alternatives_spanish:
  - un artesano en bronce
  - un trabajador del bronce
  - un broncista
  lexicon: HALOT
  rationale: El audit trail inglés corrigió hacia 'worker in bronze' para acercarse más al participio hebreo. En español, 'trabajador en bronce' conserva esa cercanía léxica y evita elevar indebidamente el término a 'artesano' si se quiere seguir la decisión auditada.
- source_word: וַיִּמָּלֵא
  english_pob_choice: He was filled
  chosen_spanish: Fue lleno
  alternatives_spanish:
  - Estaba lleno
  - Fue colmado
  lexicon: HALOT
  rationale: La forma pasiva/nifal expresa dotación recibida. 'Fue lleno' reproduce esa pasividad; es menos idiomático que 'estaba lleno', pero más cercano al énfasis del hebreo.
- source_word: הַחָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - destreza
  - habilidad
  lexicon: HALOT
  rationale: Aquí 'sabiduría' incluye capacidad práctica para el oficio, no solo reflexión abstracta. Es la equivalencia estable y más fiel en español.
- source_word: הַתְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - comprensión
  lexicon: HALOT
  rationale: Dentro de la tríada sapiencial-artesanal, 'entendimiento' mantiene el paralelismo con sabiduría y conocimiento, como en la traducción auditada inglesa.
- source_word: הַדַּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - conocimiento práctico
  lexicon: HALOT
  rationale: '''Conocimiento'' completa bien la tríada y no añade un matiz más fuerte de ''saber práctico'' que el texto no exige explícitamente.'
- source_word: לַעֲשׂוֹת כָּל מְלָאכָה בַּנְּחֹשֶׁת
  english_pob_choice: to do every kind of work in bronze
  chosen_spanish: para hacer toda clase de trabajo en bronce
  alternatives_spanish:
  - para hacer todo tipo de obra en bronce
  - para realizar toda obra en bronce
  lexicon: HALOT
  rationale: '''Toda clase de trabajo'' comunica la amplitud de כָּל מְלָאכָה y mantiene la naturalidad del español; ''obra'' sería posible, pero ''trabajo'' refleja mejor el campo general de oficio.'
- source_word: וַיָּבוֹא אֶל הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: So he came to King Solomon
  chosen_spanish: Así vino al rey Salomón
  alternatives_spanish:
  - Entonces vino al rey Salomón
  - Y vino al rey Salomón
  lexicon: HALOT
  rationale: '''Así'' reproduce la progresión narrativa sin forzar una causalidad fuerte. ''Vino'' conserva el movimiento hacia la presencia del rey.'
- source_word: וַיַּעַשׂ אֶת כָּל מְלַאכְתּוֹ
  english_pob_choice: and did all his work
  chosen_spanish: e hizo toda su obra
  alternatives_spanish:
  - e hizo todo su trabajo
  - y cumplió toda su obra
  lexicon: HALOT
  rationale: '''Obra'' es más natural en español para el conjunto de labores encargadas, y mantiene el vínculo con el campo de מְלָאכָה sin perder dignidad estilística.'
translation_notes:
  revision_awareness: 'La redacción sigue el hilo revisado del testimonio inglés: pasó de ''craftsman in bronze'' a ''worker in bronze'' para acercarse al participio hebreo. La versión española mantiene esa cercanía en ''trabajador en bronce'' y conserva la tríada sapiencial (sabiduría, entendimiento, conocimiento) y la secuencia narrativa del versículo.'
  spanish_consistency_notes:
  - Se usó 'Neftalí' para el nombre de la tribu conforme al uso bíblico español común.
  - Se evitó 'SEÑOR' o sustitutos litúrgicos porque el versículo no contiene el nombre divino.
  - '''Bronce'' se mantuvo por coherencia con el contexto del templo y con la nota lexical auditada.'
  - '''Obra'' se reservó para la cláusula final, mientras ''trabajo'' se empleó en la descripción del oficio para no perder el paralelismo con מְלָאכָה.'
