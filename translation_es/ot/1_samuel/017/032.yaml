translation:
  language: es
  text: 'David dijo a Saúl: «No desfallezca el corazón de hombre alguno[b] por causa de él[a]. Tu siervo irá y peleará con este filisteo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «por causa de este filisteo». El hebreo dice «por causa de él», y el referente se infiere por el contexto.
    reason: alternative_reading
  - marker: b
    text: 'O: «No pierda el ánimo hombre alguno». El modismo hebreo dice literalmente: «no caiga el corazón de un hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El waw narrativo en español puede quedar sobrentendido sin perder el avance de la acción. «Dijo» es natural y fiel al movimiento narrativo del hebreo, evitando una repetición artificial de «y» al inicio de la cita.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio conservado por transliteración estándar.
- source_word: אַל יִפֹּל לֵב אָדָם
  english_pob_choice: Let no man's heart fail
  chosen_spanish: No desfallezca el corazón de hombre alguno
  alternatives_spanish:
  - No caiga el corazón de hombre alguno
  - Que no pierda el ánimo ningún hombre
  lexicon: HALOT
  rationale: En español, «desfallecer» comunica bien la imagen de un corazón que pierde ánimo sin sonar forzado. Se conserva «corazón» para reflejar la metáfora hebrea, y «de hombre alguno» mantiene el genérico singular de אָדָם sin neutralizarlo indebidamente.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre alguno
  alternatives_spanish:
  - persona alguna
  - uno
  lexicon: HALOT
  rationale: El hebreo usa אָדָם en sentido genérico singular. «Hombre alguno» reproduce ese valor y preserva el matiz antropológico del texto, coherente con la decisión inglesa de mantener «man».
- source_word: עָלָיו
  english_pob_choice: because of him
  chosen_spanish: por causa de él
  alternatives_spanish:
  - a causa de él
  - por él
  - por causa de este filisteo
  lexicon: HALOT
  rationale: La preposición hebrea permite el sentido causal; «por causa de él» es una equivalencia clara y formal en español. Mantiene el pronombre sin explicitar en el texto principal el antecedente contextual, como hace la auditoría inglesa.
- source_word: עַבְדְּךָ
  english_pob_choice: Your servant
  chosen_spanish: Tu siervo
  alternatives_spanish:
  - Tu esclavo
  - Tu servidor
  lexicon: HALOT
  rationale: En el registro cortesano dirigido al rey, «siervo» transmite la fórmula de deferencia natural en español bíblico y moderno. Se evita «esclavo» porque aquí la autoidentificación funciona como título de sumisión cortesana, no como afirmación primaria de estatus servil.
- source_word: יֵלֵךְ
  english_pob_choice: will go
  chosen_spanish: irá
  alternatives_spanish:
  - va a ir
  - querrá ir
  lexicon: HALOT
  rationale: El imperfecto expresa intención/resolución. «Irá» es la forma más directa y digna en español para el compromiso de David.
- source_word: וְנִלְחַם
  english_pob_choice: and fight
  chosen_spanish: y peleará
  alternatives_spanish:
  - y combatirá
  - y hará guerra
  lexicon: HALOT
  rationale: «Peleará» comunica el acto de enfrentarse en combate con fluidez natural. Se mantiene el paralelo verbal con «irá», reflejando la promesa de acción futura.
- source_word: עִם הַפְּלִשְׁתִּי הַזֶּה
  english_pob_choice: with this Philistine
  chosen_spanish: con este filisteo
  alternatives_spanish:
  - contra este filisteo
  - frente a este filisteo
  lexicon: HALOT
  rationale: Aunque עִם es literalmente «con», en contexto bélico denota oposición/enfrentamiento. «Con este filisteo» es la opción más cercana al hebreo y por eso se conserva en el texto principal, siguiendo la sensibilidad de la POB inglesa.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y conserva la ambigüedad pronominal de עָלָיו en el texto principal, como la auditoría inglesa. Se mantuvo la imagen idiomática del corazón que desfallece, pero se recurrió a un verbo español natural («desfallezca») para evitar un calco duro. No hay revisiones previas aplicadas para este versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Filisteo» se escribe en minúscula como gentilicio sustantivado en español.
  - «Siervo» se usa aquí por el registro cortesano, sin implicar una redefinición de עבד en otros contextos.
  - Se mantiene «con este filisteo» en el texto principal para respetar la forma preposicional del hebreo; la nota aclara la lectura causal implícita.
