translation:
  language: es
  text: Entonces el sacerdote tomará el único cordero macho[a] y lo presentará como ofrenda por la culpa[b], junto con el log[c] de aceite, y los mecerá como ofrenda mecida delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Macho» explicita el rasgo masculino que el inglés POB añadió por contexto sacrificial; el hebreo dice literalmente «el cordero, el uno», distinguiendo este animal de los otros elementos del rito.
    reason: lexical_alternative
  - marker: b
    text: O también «como ofrenda de reparación». El hebreo אָשָׁם es un término técnico sacrificial que puede resaltar tanto la culpa como la reparación.
    reason: lexical_alternative
  - marker: c
    text: Un «log» era una pequeña unidad de medida de líquidos usada en el sistema ritual de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - Y ... tomará
  - Luego ... tomará
  lexicon: HALOT
  rationale: El waw consecutivo continúa la secuencia ritual; "Entonces" expresa bien la progresión procedural en español sin perder el tono prescriptivo de la acción.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: En español bíblico actual, "sacerdote" comunica con claridad el oficio cultual de כֹּהֵן. Se evita una paráfrasis más larga que no añade precisión.
- source_word: הַכֶּבֶשׂ הָאֶחָד
  english_pob_choice: the one male lamb
  chosen_spanish: el cordero macho
  alternatives_spanish:
  - el único cordero macho
  - el cordero
  lexicon: HALOT
  rationale: כֶּבֶשׂ es "cordero" y el contexto sacrificial exige el rasgo masculino; por eso se explicita "macho". El artículo y numeral se condensan de forma natural en español sin perder la referencia a este animal específico.
- source_word: וְהִקְרִיב אֹתוֹ
  english_pob_choice: present it
  chosen_spanish: lo presentará
  alternatives_spanish:
  - lo ofrecerá
  - lo acercará
  lexicon: HALOT
  rationale: הקריב en contexto sacrificial apunta a presentar/ofrecer para rito. "Lo presentará" conserva la relativa neutralidad del inglés POB y evita imponer más de lo que la forma verbal exige.
- source_word: לְאָשָׁם
  english_pob_choice: as a guilt offering
  chosen_spanish: como expiación por la culpa
  alternatives_spanish:
  - como ofrenda por la culpa
  - como ofrenda de culpa
  - como ofrenda por reparación
  lexicon: HALOT
  rationale: אָשָׁם puede entenderse como la ofrenda técnica y también como la noción de reparación ligada a culpa. Se opta por una formulación que preserve ambos matices en español sin borrar la tensión léxica documentada. "Expiación por la culpa" mantiene el valor cultual y la relación con la culpa, mientras deja abierta la lectura alternativa de reparación.
- source_word: לֹג הַשָּׁמֶן
  english_pob_choice: the log of oil
  chosen_spanish: el log de aceite
  alternatives_spanish:
  - un log de aceite
  - la medida de aceite llamada log
  lexicon: HALOT
  rationale: Se conserva "log" como unidad técnica de medida, tal como hace el POB en inglés, y se traduce de forma directa el sustantivo para no perder el término ritual específico.
- source_word: וְהֵנִיף אֹתָם
  english_pob_choice: he shall wave them
  chosen_spanish: los mecerá
  alternatives_spanish:
  - los agitará
  - los levantará y moverá
  lexicon: HALOT
  rationale: El verbo הניף en contexto ritual describe un movimiento cultual de presentación/mecida. "Mecer" es una opción reverente y comprensible en español para este rito, evitando una imagen demasiado física de "agitar" y manteniendo el matiz ceremonial.
- source_word: תְּנוּפָה
  english_pob_choice: as a wave offering
  chosen_spanish: como ofrenda mecida
  alternatives_spanish:
  - como ofrenda mecida ante Yahvé
  - como ofrenda alzada
  - como ofrenda movida
  lexicon: HALOT
  rationale: תְּנוּפָה corresponde al rito relacionado con el movimiento de mecer/presentar. "Ofrenda mecida" conserva el vínculo entre el sustantivo y el verbo elegido, y es suficientemente transparente para lectores bíblicos en español.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יְהוָה como "Yahvé". "Delante de" reproduce bien la fórmula ritual de לִפְנֵי sin sonar artificial en español.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme al estándar español del proyecto, se traduce como "Yahvé" para preservar el nombre pactual y evitar el enmascaramiento devocional con mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: אָשָׁם como categoría sacrificial
  english_pob_reading: guilt offering / possible reparation offering
  chosen_spanish_reading: expiación por la culpa
  alternative_spanish_readings:
  - ofrenda por la culpa
  - ofrenda de reparación
  rationale: La forma española intenta mantener la tensión entre el sentido técnico sacrificial y la idea de culpa/reparación que el POB inglés dejó documentada. No se reduce a una sola equivalencia tradicional si eso oscurece el matiz ritual del término.
  doctrine_reference: 'DOCTRINE.md: Sacrificial terminology — אָשָׁם (technical offering term with guilt/reparation force)'
- issue: תְּנוּפָה y el gesto ritual
  english_pob_reading: wave offering / he shall wave them
  chosen_spanish_reading: ofrenda mecida / los mecerá
  alternative_spanish_readings:
  - ofrenda alzada / los agitará
  - ofrenda de presentación / los presentará con un movimiento
  rationale: Se conserva la relación semántica entre el gesto verbal y la ofrenda nominal. "Mecer" mantiene el carácter ritual sin convertir el acto en una simple acción mecánica o cotidiana.
  doctrine_reference: 'DOCTRINE.md: Ritual actions and sacrificial gestures'
translation_notes:
  revision_awareness: 'Coincide con el paso de revisión más reciente: no se registraron cambios necesarios y la concordancia con el control cruzado fue alta. La redacción española sigue ese acuerdo, preservando el flujo ritual, la terminología sacrificial y el nombre divino conforme al estándar del proyecto.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יְהוָה conforme al español del proyecto.
  - Se conserva "log" como unidad técnica, sin normalizarla a una medida aproximada.
  - '"Ofrenda mecida" se usa de manera consistente para תְּנוּפָה, en paralelo con "mecerá" para el verbo correspondiente.'
  - '"Expiación por la culpa" intenta preservar la tensión léxica de אָשָׁם sin caer en una sola glosa restrictiva.'
