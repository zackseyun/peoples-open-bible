revisions:
- from: 'Y Uzías se acostó con sus padres[a], y lo sepultaron con sus padres en el campo de sepultura que pertenecía a los reyes, porque dijeron: «Es un leproso». Y Jotam, su hijo, reinó en su lugar.'
  to: 'Y Uzías durmió con sus padres[a], y lo sepultaron con sus padres en el campo de sepultura que pertenecía a los reyes, porque dijeron: «Es un leproso». Y Jotam, su hijo, reinó en su lugar.'
  rationale: Se corrige solo la fórmula de muerte para evitar una lectura impropia o ambigua en español. «Durmió con sus padres» sigue siendo formulístico y fiel al hebreo/POB, mientras el resto del versículo y la nota pueden mantenerse tal como están.
