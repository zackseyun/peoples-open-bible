  rationale: Se revisa el texto para mejorar la naturalidad del español sin perder el sentido del hebreo ni el razonamiento auditado del POB inglés. Se cambia 'de sobre la buena tierra' a 'de la buena tierra' en el texto principal y se conserva el matiz espacial exacto en nota. También se ajusta 'mandó' a 'ordenó' y se suaviza la secuencia verbal a 'van a servir' para una lectura más idiomática.
