  text: לָ/כֵ֗ן הִנְ/נִ֨י מֵבִ֤יא רָעָה֙ אֶל בֵּ֣ית יָרָבְעָ֔ם וְ/הִכְרַתִּ֤י לְ/יָֽרָבְעָם֙ מַשְׁתִּ֣ין בְּ/קִ֔יר עָצ֥וּר וְ/עָז֖וּב בְּ/יִשְׂרָאֵ֑ל וּ/בִֽעַרְתִּי֙ אַחֲרֵ֣י בֵית יָרָבְעָ֔ם כַּ/אֲשֶׁ֛ר יְבַעֵ֥ר הַ/גָּלָ֖ל עַד תֻּמּֽ/וֹ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/014/010.yaml
  text: Therefore[a], behold, I am bringing disaster on the house of Jeroboam, and I will cut off from Jeroboam every male, bond and free in Israel, and I will burn away after the house of Jeroboam[b], just as one burns away dung until it is all gone.
  footnotes:
  - marker: a
    text: Hebrew literally, 'one who urinates against a wall,' a crude idiom for a male.
    reason: lexical_alternative
  - marker: b
    text: Or 'slave and free'; the Hebrew expression likely functions as a merism meaning all without exception.
    reason: lexical_alternative
