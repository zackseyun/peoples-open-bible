translation:
  text: Know your neighbor as yourself[a], and in everything you hate[c][b], be considerate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek parallel supplied here differs substantially from the Hebrew, reading approximately, 'Whom does he attend to? and what is his support?' This draft follows the extant Hebrew witness as the primary source for Sirach where Hebrew survives.
    reason: textual_variant
  - marker: b
    text: Or 'Know your neighbor as your own self'; Hebrew נפש can mean 'soul,' 'life,' or 'self.'
    reason: lexical_alternative
  - marker: c
    text: The final clause may also be understood, 'and consider carefully whatever you hate,' expressing an ethical test based on what one would not want done to oneself.
    reason: alternative_reading
lexical_decisions:
- source_word: דעה
  chosen: Understand
  alternatives:
  - Know
  - Be mindful of
  lexicon: HALOT
  rationale: From ידע in imperative form; here it calls for thoughtful regard or recognition rather than mere factual knowledge. 'Understand' fits the ethical exhortation and pairs naturally with the following reflective command.
- source_word: רעך
  chosen: your neighbor
  alternatives:
  - your companion
  - your fellow
  lexicon: HALOT
  rationale: רע commonly denotes a fellow person in one's social sphere. 'Neighbor' preserves the ethical resonance familiar from biblical usage without narrowing it to physical proximity.
- source_word: כנפשך
  chosen: as yourself
  alternatives:
  - as your own soul
  - like your own life
  lexicon: HALOT
  rationale: Literally 'as your soul/self.' In idiomatic English ethical instruction, 'as yourself' best conveys the reflexive comparison while preserving the anthropological force of נפש as the self/person.
- source_word: ובכל
  chosen: and in everything
  alternatives:
  - and in every matter
  - and with respect to everything
  lexicon: HALOT
  rationale: A broad distributive phrase introducing the scope of the second imperative. 'In everything' is concise and natural.
- source_word: ששנאת
  chosen: you hate
  alternatives:
  - you have hated
  - is hateful to you
  lexicon: HALOT
  rationale: The Hebrew points to what is hated by the addressee. Rendering it directly as 'you hate' keeps the personal ethical test clear. An impersonal rendering is possible but less direct.
- source_word: התבונן
  chosen: take thought
  alternatives:
  - consider
  - reflect carefully
  lexicon: HALOT
  rationale: From בין/התבונן, an imperative of reflective consideration. 'Take thought' preserves the deliberative nuance and avoids sounding merely intellectual; it implies moral reflection before action.
- source_word: τίνι ἐπέχει; καὶ τίς ἀντιστήριγμα αὐτοῦ;
  chosen: used as a control witness only, not followed in the main text
  alternatives:
  - Who does he attend to? and what is his support?
  lexicon: LSJ
  rationale: The supplied Greek parallel diverges sharply from the Hebrew and appears to reflect a different textual form or verse alignment. Because the Hebrew witness is the primary surviving original-language source for this verse, the main translation follows the Hebrew while documenting the Greek divergence in a footnote.
