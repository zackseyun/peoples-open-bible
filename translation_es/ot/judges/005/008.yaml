translation:
  language: es
  text: Escogieron dioses nuevos[a]; entonces hubo guerra en las puertas[b]. ¿Se veía un escudo, o una lanza, entre cuarenta mil en Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Escogió dioses nuevos» o «Uno escogió dioses nuevos». El verbo hebreo está en singular, pero el sentido se entiende comúnmente en sentido colectivo, refiriéndose a Israel.'
    reason: alternative_reading
  - marker: b
    text: 'El hebreo de esta línea es difícil; también puede entenderse: «entonces hubo combate en las puertas» o de manera semejante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְחַר
  english_pob_choice: They chose
  chosen_spanish: Escogieron
  alternatives_spanish:
  - Eligieron
  - Escogió
  lexicon: HALOT
  rationale: El verbo hebreo está en 3ms, pero el contexto y la nota auditada del POB inglés lo entienden colectivamente de Israel. En español, el plural impersonal/collectivo 'escogieron' comunica bien esa lectura sin forzar un sujeto singular.
- source_word: אֱלֹהִים חֲדָשִׁים
  english_pob_choice: new gods
  chosen_spanish: dioses nuevos
  alternatives_spanish:
  - nuevos dioses
  - nuevas divinidades
  lexicon: HALOT
  rationale: El plural designa deidades ajenas o ídolos en un contexto polémico. 'Dioses nuevos' conserva la fuerza literal y la inversión adjetival natural en español.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese tiempo
  lexicon: HALOT
  rationale: Marca secuencia temporal entre la apostasía y la crisis. 'Entonces' funciona de forma directa y natural en español.
- source_word: לָחֶם שְׁעָרִים
  english_pob_choice: war was at the gates
  chosen_spanish: hubo guerra en las puertas
  alternatives_spanish:
  - hubo combate en las puertas
  - la guerra llegó a las puertas
  - hubo lucha en las puertas
  lexicon: HALOT
  rationale: La línea hebrea es comprimida y difícil. La lectura 'guerra' para לָחֶם sigue el valor sustantivo de 'guerra/batalla' aceptado en el POB inglés; 'en las puertas' preserva la imagen urbana y defensiva del texto.
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  lexicon: HALOT
  rationale: Término militar estándar. 'Escudo' es la equivalencia más clara y transparente para lectura moderna en español.
- source_word: אִם יֵרָאֶה
  english_pob_choice: Was ... to be seen
  chosen_spanish: ¿Se veía?
  alternatives_spanish:
  - ¿Podía verse?
  - ¿Había de verse?
  lexicon: HALOT
  rationale: La fuerza es interrogativa y retórica, expresando ausencia. '¿Se veía?' reproduce la brevedad del hebreo y mantiene el efecto de pregunta sin añadir más explicaciones de las que exige el texto.
- source_word: וָרֹמַח
  english_pob_choice: or spear
  chosen_spanish: o una lanza
  alternatives_spanish:
  - o una lanza larga
  - o un venablo
  lexicon: HALOT
  rationale: '''Lanza'' es la equivalente natural de ''spear'' en español; evita arcaísmo y conserva el paralelo con ''escudo''.'
- source_word: בְּאַרְבָּעִים אֶלֶף
  english_pob_choice: among forty thousand
  chosen_spanish: entre cuarenta mil
  alternatives_spanish:
  - entre los cuarenta mil
  - dentro de cuarenta mil
  lexicon: HALOT
  rationale: La preposición expresa el ámbito dentro del cual se busca. 'Entre cuarenta mil' preserva el valor distributivo/rastreable del inglés POB.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: Sentido locativo-social natural. 'En Israel' es la forma más idiomática y fiel al referente nacional.
theological_decisions:
- issue: Sujeto del verbo inicial
  english_pob_reading: 'The subject is Israel/the people collectively: ''They chose new gods.'''
  chosen_spanish_reading: 'El sujeto se entiende colectivamente de Israel: ''Escogieron dioses nuevos.'''
  alternative_spanish_readings:
  - Escogió dioses nuevos
  - Escogió nuevas deidades
  rationale: Seguir la nota auditada del POB inglés evita atribuir la acción a Dios y conserva la acusación del cántico contra la infidelidad de Israel. El plural en español hace explícita la lectura colectiva ya defendida en la tradición de traducción del pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El POB inglés reciente mantuvo sin cambios esta lectura y sus notas: sujeto colectivo para el verbo inicial y traducción idiomática de la línea difícil sobre guerra/combate en las puertas. No se documentaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se preservó 'dioses' en plural para reflejar el sentido polémico del hebreo y evitar suavizar la acusación.
  - Se eligió 'escudo' y 'lanza' por claridad contemporánea; ambas mantienen el paralelismo militar del verso.
  - La pregunta retórica se mantuvo breve para no sobreexplicar la ausencia de armas, siguiendo la ambigüedad controlada del original.
