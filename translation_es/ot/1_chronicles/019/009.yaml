  text: וַ/יֵּצְאוּ֙ בְּנֵ֣י עַמּ֔וֹן וַ/יַּֽעַרְכ֥וּ מִלְחָמָ֖ה פֶּ֣תַח הָ/עִ֑יר וְ/הַ/מְּלָכִ֣ים אֲשֶׁר בָּ֔אוּ לְ/בַדָּ֖/ם בַּ/שָּׂדֶֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/019/009.yaml
  text: And the sons of Ammon came out and drew up for battle at the entrance of the city[d][c][b][a], while the kings who had come were by themselves in the field.
  footnotes:
  - marker: a
    text: Or 'the Ammonites came out.' The Hebrew reads more literally, 'the sons of Ammon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'arrayed themselves for battle.' The Hebrew idiom refers to arranging troops in battle formation.
    reason: lexical_alternative
  - marker: c
    text: Or 'at the gate of the city,' though the Hebrew word is more generally 'entrance/opening' than the usual term for 'gate.'
    reason: lexical_alternative
  - marker: d
    text: That is, the allied kings were stationed separately from the Ammonite forces, out in the field.
    reason: cultural_note
