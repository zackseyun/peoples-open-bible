translation:
  language: es
  text: Porque lo que no se destruía por el fuego sencillamente se derretía al ser calentado por un breve rayo del sol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'consumido' en lugar de 'destruido'; el griego puede denotar perecer bajo la acción del fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... μὴ φθειρόμενον
  english_pob_choice: what was not destroyed
  chosen_spanish: lo que no era destruido
  alternatives_spanish:
  - lo que no era consumido
  - aquello que no era destruido
  lexicon: LSJ
  rationale: El participio neutro articular se vierte de forma impersonal en español como una cláusula nominal. 'Destruido' conserva el valor físico del contexto y sigue la decisión inglesa de evitar una lectura moral.
- source_word: ἁπλῶς
  english_pob_choice: simply
  chosen_spanish: simplemente
  alternatives_spanish:
  - del todo
  - sencillamente
  - directamente
  lexicon: LSJ
  rationale: Aquí modifica mejor el verbo principal en español, igual que en la revisión inglesa, indicando que el derretirse ocurría sin más mediación ni complicación.
- source_word: βραχείας
  english_pob_choice: brief
  chosen_spanish: breve
  alternatives_spanish:
  - pequeño
  - leve
  - corto
  lexicon: LSJ
  rationale: Con 'rayo del sol', 'breve' comunica la pequeñez o escasa duración de la incidencia luminosa sin apartarse de la imagen griega.
- source_word: ἀκτῖνος ἡλίου
  english_pob_choice: ray of the sun
  chosen_spanish: rayo del sol
  alternatives_spanish:
  - rayo solar
  - haz de sol
  - rayo solar del sol
  lexicon: LSJ
  rationale: Se mantiene la imagen literal de la construcción genitiva. 'Rayo del sol' es natural en español y conserva la relación posesiva del original.
- source_word: θερμαινόμενον
  english_pob_choice: warmed
  chosen_spanish: al ser calentado
  alternatives_spanish:
  - calentado
  - cuando era calentado
  - al ser calentado por el sol
  lexicon: LSJ
  rationale: La forma pasiva expresa la acción recibida por el objeto; 'al ser calentado' preserva esa pasividad y encaja con el contraste físico del pasaje.
- source_word: ἐτήκετο
  english_pob_choice: melted
  chosen_spanish: se derretía
  alternatives_spanish:
  - se fundía
  - se licuaba
  - se derretía
  lexicon: LSJ
  rationale: El imperfecto describe acción en curso; 'se derretía' es el equivalente español más claro para el fenómeno físico, sin forzar un tecnicismo.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que ajusta ἁπλῶς para que modifique mejor el resultado principal ('melted'); en español, 'simplemente' queda naturalmente unido a 'se derretía'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el Tetragrámaton ni κύριος.
  - '''Dios'' no aparece en el texto; no se introduce terminología teológica ajena al pasaje.'
  - Se conserva un registro bíblico moderno y sobrio, con sintaxis directa y sin arcaísmos innecesarios.
