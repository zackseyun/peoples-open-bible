translation:
  language: es
  text: 'Vuélvanse y pónganse en marcha, y vayan a la región montañosa de los amorreos y a todas sus regiones vecinas: en el Arabá, en la región montañosa, en la llanura baja[a], en el Néguev y en la costa del mar, la tierra de los cananeos y el Líbano, hasta el gran río, el río Éufrates.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la Sefela», nombre de la región occidental de colinas y tierras bajas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּנוּ
  english_pob_choice: Turn
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Tomen otra dirección
  - Cambien de rumbo
  lexicon: HALOT
  rationale: פּנה introduce un cambio de dirección; en español, «vuélvanse» comunica ese giro con naturalidad y conserva la fuerza imperativa sin explicitar más de lo que el hebreo dice.
- source_word: וּסְעוּ לָכֶם
  english_pob_choice: and set out for yourselves
  chosen_spanish: y levántense para ustedes
  alternatives_spanish:
  - y pónganse en marcha para ustedes
  - y emprendan camino para ustedes
  lexicon: HALOT
  rationale: נסע en contexto de viaje expresa partir/ponerse en marcha. «Levántense» mantiene el arranque del movimiento y, junto con «para ustedes», conserva לָכֶם sin convertirlo en un reflexivo ajeno al hebreo.
- source_word: וּבֹאוּ
  english_pob_choice: and go
  chosen_spanish: y entren
  alternatives_spanish:
  - y vayan
  - y lleguen
  lexicon: HALOT
  rationale: בוא puede ser «venir», «ir» o «entrar» según el contexto. Aquí el movimiento es hacia una región concreta, y «entren» conserva bien la idea de ingreso en un territorio.
- source_word: הַר הָאֱמֹרִי
  english_pob_choice: the hill country of the Amorites
  chosen_spanish: la región montañosa del amorreo
  alternatives_spanish:
  - la montaña del amorreo
  - la región montañosa de los amorreos
  lexicon: HALOT
  rationale: הַר funciona como región alta o montañosa, no solo una montaña singular. «Región montañosa» evita una imagen demasiado literal; «amorreo» mantiene el valor territorial del gentilicio en singular colectivo, como en varios usos bíblicos.
- source_word: שְׁכֵנָיו
  english_pob_choice: their neighbors
  chosen_spanish: sus vecinos
  alternatives_spanish:
  - sus vecinos cercanos
  - los que están junto a él
  lexicon: HALOT
  rationale: El hebreo habla de los vecinos de esa zona territorial. «Vecinos» reproduce la relación espacial sin forzar una personificación extraña en español.
- source_word: בָּעֲרָבָה
  english_pob_choice: in the Arabah
  chosen_spanish: en el Arabá
  alternatives_spanish:
  - en el Arabáh
  - en la depresión del Jordán
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico técnico «Arabá» para mantener la referencia regional precisa y alineada con el uso bíblico tradicional en español.
- source_word: בָהָר
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la montaña
  - en los montes
  lexicon: HALOT
  rationale: La repetición de הַר en la lista apunta a una zona alta/accidentada; «región montañosa» es la equivalencia geográfica más clara en español.
- source_word: וּבַשְּׁפֵלָה
  english_pob_choice: in the lowland
  chosen_spanish: en la Sefela
  alternatives_spanish:
  - en la llanura baja
  - en el piedemonte
  lexicon: HALOT
  rationale: La POB inglesa preserva la posibilidad técnica de «Shephelah». En español, «Sefela» mantiene el topónimo bíblico y evita perder el referente geográfico específico; la expresión común queda implícita por nota.
- source_word: וּבַנֶּגֶב
  english_pob_choice: in the Negev
  chosen_spanish: en el Néguev
  alternatives_spanish:
  - en el sur
  - en la región del Néguev
  lexicon: HALOT
  rationale: Como nombre regional, «Néguev» preserva la designación geográfica concreta mejor que «sur».
- source_word: וּבְחוֹף הַיָּם
  english_pob_choice: and on the coast of the sea
  chosen_spanish: y en la costa del mar
  alternatives_spanish:
  - y junto a la orilla del mar
  - y en el litoral
  lexicon: HALOT
  rationale: חוֹף es costa/orilla. «Costa del mar» sigue de cerca la estructura hebrea sin sonar forzado en español.
- source_word: אֶרֶץ הַכְּנַעֲנִי
  english_pob_choice: the land of the Canaanites
  chosen_spanish: la tierra de los cananeos
  alternatives_spanish:
  - la tierra del cananeo
  - la tierra cananea
  lexicon: HALOT
  rationale: 'El gentilicio colectivo en plural es el equivalente natural en español para un territorio étnico: «cananeos».'
- source_word: וְהַלְּבָנוֹן
  english_pob_choice: and Lebanon
  chosen_spanish: y el Líbano
  alternatives_spanish:
  - y el monte Líbano
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español el topónimo se expresa naturalmente como «el Líbano».
- source_word: עַד הַנָּהָר הַגָּדֹל
  english_pob_choice: as far as the great river
  chosen_spanish: hasta el gran río
  alternatives_spanish:
  - hasta el río grande
  lexicon: HALOT
  rationale: עַד marca límite/extensión. «Hasta» conserva el alcance territorial del mandato y «gran río» reproduce el adjetivo sin añadir precisión indebida.
- source_word: נְהַר פְּרָת
  english_pob_choice: the Euphrates River
  chosen_spanish: el río Éufrates
  alternatives_spanish:
  - Éufrates
  - el Éufrates
  lexicon: HALOT
  rationale: La aposición identifica el «gran río». «Río Éufrates» es una forma clara y bíblicamente reconocible en español, equivalente a la identificación explícita del inglés.
theological_decisions:
- issue: Voz imperativa de salida y avance territorial
  english_pob_reading: Turn and set out for yourselves, and go...
  chosen_spanish_reading: Vuélvanse y levántense para ustedes, y entren...
  alternative_spanish_readings:
  - Tomen otra dirección y pónganse en marcha...
  - Cambien de rumbo y emprendan camino...
  rationale: No hay una carga doctrinal especial, pero sí una secuencia de mandato fuerte. Se conserva el tono directivo y el avance territorial sin suavizar la orden.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del hebreo y la decisión inglesa auditada, pero ajusta la sintaxis al español para que suene publicable y natural. Se conservan los topónimos técnicos (Arabá, Sefela, Néguev, Éufrates) y la secuencia espacial del versículo, sin suavizar la lista geográfica ni perder el valor colectivo de los gentilicios.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene la distinción geográfica entre «región montañosa» y topónimos técnicos como «Arabá», «Sefela» y «Néguev».
  - «Amorreo» y «cananeos» reflejan gentilicios territoriales colectivos; no se singularizan artificialmente.
