review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo principal: «Abraham, padre de una multitud de naciones» refleja fielmente אב המון גוים, y la cláusula final preserva la decisión POB de traducir el hebreo como una afirmación de honor sin defecto, mientras mantiene la variante griega en nota. Sin embargo, la ubicación del marcador de nota en «naciones[a]» es incorrecta: la nota trata de la cláusula final griega, no de «naciones».'
  spanish_quality_summary: El español es claro y digno, pero «Abraham» debe ajustarse a la forma española bíblica usual «Abrahán» para mejor legibilidad e idiomaticidad en español eclesial general. Además, el marcador de nota debe anclarse en la cláusula final correspondiente. La frase «no se halló mancha en su honor» es natural y adecuada.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Padre», «multitud», «honor» y «mancha» concuerdan con las decisiones léxicas auditadas. La principal corrección es de estilo español bíblico («Abrahán») y de anclaje de nota.
  issues:
  - severity: medium
    issue: Forma del nombre propio como «Abraham»
    rationale: En español bíblico y eclesial amplio, «Abrahán» es la forma más natural y establecida. «Abraham» no es imposible, pero suena menos idiomático en una traducción bíblica española.
  - severity: medium
    issue: Marcador de nota anclado en «naciones»
    rationale: La nota explica la lectura alternativa griega de la cláusula final («y no se halló igual en gloria/honor»), por lo que debe ir junto a esa cláusula, no junto a «naciones».
  revised_spanish_text: Abrahán, padre de una multitud de naciones—no se halló mancha en su honor[a].
  revised_footnotes:
  - marker: a
    text: 'Griego: «y no se halló igual en gloria» (o «en honor»).'
    reason: alternative_reading
  revision_rationale: Se ajusta el nombre propio a la forma española bíblica más natural («Abrahán») y se corrige el lugar del marcador de nota para que corresponda a la variante griega de la cláusula final. No se cambia la traducción sustantiva del versículo.
