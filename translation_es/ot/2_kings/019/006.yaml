review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: Isaías instruye a los mensajeros, se conserva «Yahvé», la prohibición de temer, la causa del temor («las palabras que has oído») y la gravedad teológica de גִּדְּפוּ contra Dios. También mantiene adecuadamente la nota sobre נַעֲרֵי como posible «jóvenes». Sin embargo, hay pequeños problemas de español y de consistencia textual que requieren corrección.'
  spanish_quality_summary: 'La redacción general es clara y digna, pero necesita ajustes menores para sonar plenamente natural y correcta en español: «Así dirán» debe ser «Así dirán ustedes» o mejor «Así le dirán»/«Así dirán a su señor» dentro del estilo de cita; «han blasfemado me» en las decisiones teológicas es gramaticalmente incorrecto aunque el texto principal sí tiene «me han blasfemado»; y la nota al pie contiene texto corrupto («u কর্মকর্তarios reales»). Conviene también anclar la nota al sintagma relevante («siervos»), no a «les dijo».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; נַעֲרֵי se vierte funcionalmente como «siervos» con alternativa en nota; no hay conflicto doctrinal importante. «Su señor» es aceptable para אֲדֹנֵיכֶם en este contexto humano, aunque «su amo» sería menos natural y «su señor» evita confusión con el nombre divino porque el nombre divino aparece explícitamente como «Yahvé».'
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «les dijo[a]» en vez de en «siervos».
    rationale: La alternativa léxica afecta נַעֲרֵי מֶלֶךְ אַשּׁוּר, no el verbo «dijo». El marcador debe aparecer junto al término traducido que la nota explica.
  - severity: high
    issue: 'La nota al pie contiene texto corrupto: «u কর্মকর্তarios reales».'
    rationale: Esto mezcla español con texto ajeno/no español y no es publicable. Debe corregirse a «u oficiales reales» o expresión equivalente.
  - severity: low
    issue: La formulación del discurso directo puede sonar más natural en español con «Así dice Yahvé» seguido de una cita fluida y con el marcador de nota en el término pertinente.
    rationale: No altera el sentido, pero una leve pulida mejora legibilidad y precisión editorial.
  - severity: low
    issue: 'Inconsistencia gramatical en las decisiones teológicas: «han blasfemado me».'
    rationale: Aunque no afecta directamente el texto bíblico principal, documenta incorrectamente la construcción española. La forma correcta es «me han blasfemado» o mejor «han blasfemado contra mí» según contexto; en este versículo, el texto principal ya usa correctamente «me han blasfemado».
  revised_spanish_text: 'Isaías les dijo: «Así dirán a su señor: “Así dice Yahvé: ‘No tengas miedo por las palabras que has oído, con las cuales los siervos[a] del rey de Asiria me han blasfemado’”».'
  revised_footnotes:
