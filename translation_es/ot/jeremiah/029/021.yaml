translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos, el Dios de Israel, acerca de Ahab hijo de Colaía y de Sedequías hijo de Maaseías, que profetizan mentira para ustedes en mi nombre: «Miren, yo los entrego en manos de Nabucodonosor[a], rey de Babilonia, y él los derribará delante de sus ojos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La escritura hebrea refleja «Nebucadrezzar»; en español se usa la forma más extendida «Nabucodonosor».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural y solemne en español con «Así dice», manteniendo el cadenciamiento oracular sin volverlo arcaizante de más.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según el criterio del proyecto, no una sustitución por título. «Yahvé» es la forma española estable y auditable para el Tetragrámaton.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, «los ejércitos» comunica de forma clara el título divino y sugiere la soberanía guerrera/real presente en el hebreo.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Equivalente directo del sintagma constructo; mantiene la identificación pactal y no requiere matiz adicional en español.
- source_word: אֶל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - a
  lexicon: HALOT
  rationale: Aquí introduce el objeto del oráculo, no un destinatario directo; «acerca de» reproduce bien ese valor discursivo en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Se conserva la identificación genealógica explícita del texto.
- source_word: הַנִּבְּאִים
  english_pob_choice: who are prophesying
  chosen_spanish: que profetizan
  alternatives_spanish:
  - que están profetizando
  lexicon: HALOT
  rationale: El participio presente se traduce con un presente simple natural en español; la acción continua queda suficientemente expresada por el contexto.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático de autoridad/representación profética sin añadir explicación ajena al hebreo.
- source_word: שָׁקֶר
  english_pob_choice: a lie
  chosen_spanish: mentira
  alternatives_spanish:
  - falsedad
  - falsamente
  lexicon: HALOT
  rationale: Como complemento de «profetizan», «mentira» conserva la fuerza sustantiva del hebreo y suena natural en español.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: Miren, yo
  alternatives_spanish:
  - He aquí que yo
  - Yo estoy
  lexicon: HALOT
  rationale: La fórmula enfática se vierte con una invitación solemne y accesible en español; «yo» conserva el énfasis divino sin redundancia excesiva.
- source_word: נֹתֵן אֹתָם בְּיַד
  english_pob_choice: giving them into the hand of
  chosen_spanish: los entrego en manos de
  alternatives_spanish:
  - los pongo en manos de
  - los entrego a
  lexicon: HALOT
  rationale: La imagen hebrea de entrega al poder de otro se conserva con una fórmula española transparente y bíblica.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodreazar
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional más reconocible; la nota textual conserva la variante hebrea más cercana al grafema original.
- source_word: וְהִכָּם
  english_pob_choice: and he will strike them down
  chosen_spanish: y él los golpeará
  alternatives_spanish:
  - y él los herirá
  - y él los derribará
  lexicon: HALOT
  rationale: «Golpeará» mantiene la fuerza del verbo נכה sin cerrar demasiado el resultado; el contexto ya implica juicio severo. Se evita añadir un matiz explícito de muerte que el verbo por sí solo no exige.
- source_word: לְעֵינֵיכֶם
  english_pob_choice: before your eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ustedes
  - ante ustedes
  lexicon: HALOT
  rationale: Se conserva el valor testimonial/público del hebreo con una locución idiomática clara en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue la política terminológica del proyecto para el Tetragrámaton: mantener el nombre propio divino transliterado, no ocultarlo tras un título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza del juicio en וְהִכָּם
  english_pob_reading: and he will strike them down
  chosen_spanish_reading: y él los golpeará
  alternative_spanish_readings:
  - y él los herirá
  - y él los matará
  rationale: El hebreo anuncia un castigo por medio de Babilonia; «golpeará» conserva la literalidad básica sin precisar más allá del verbo. El contexto sugiere severidad, pero no obliga a explicitar la muerte en la traducción.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: El texto se alinea con la revisión más reciente, que no introdujo cambios, y con el chequeo cruzado de alta concordancia. No se detectaron ajustes pendientes en el pasaje base.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene «el Dios de Israel» de forma literal y consistente.
  - Se preserva la diferencia entre la entrega en manos de otro y el acto de golpear, sin fusionarlos.
  - La forma «delante de sus ojos» reproduce la visibilidad pública del juicio de manera natural en español.
