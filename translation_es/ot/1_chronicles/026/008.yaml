translation:
  language: es
  text: 'Todos éstos eran de los hijos de Obed-edom: ellos, sus hijos y sus hermanos[a], hombres capaces y fuertes para el servicio; sesenta y dos pertenecientes a Obed-edom.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes varones» para «sus hermanos», si el término se toma en un sentido más amplio dentro del clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּנֵי
  english_pob_choice: from the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - procedentes de los hijos de
  - de entre los hijos de
  lexicon: HALOT
  rationale: La preposición hebrea מִן con «hijos» expresa procedencia y pertenencia al linaje. «De los hijos de» comunica bien esa relación genealógica en español sin sonar artificial.
- source_word: הֵמָּה וּבְנֵיהֶם וַאֲחֵיהֶם
  english_pob_choice: they and their sons and their brothers
  chosen_spanish: ellos, sus hijos y sus hermanos
  alternatives_spanish:
  - ellos, sus hijos y sus parientes varones
  - ellos y sus hijos y sus hermanos
  lexicon: HALOT
  rationale: Se mantiene la enumeración familiar y masculina del hebreo. «Hermanos» conserva la forma literal de אחים; no se amplía a «parientes» en el texto principal porque el POB inglés retuvo «brothers» y la ambigüedad léxica puede explicarse en nota.
- source_word: אִישׁ חַיִל
  english_pob_choice: men of ability
  chosen_spanish: hombres de capacidad
  alternatives_spanish:
  - hombres valientes
  - hombres de valor
  - hombres competentes
  lexicon: HALOT
  rationale: En este contexto administrativo y de servicio, la expresión destaca aptitud y fortaleza más que heroísmo militar. «Hombres de capacidad» sigue de cerca la decisión inglesa revisada y evita importar de forma exclusiva el sentido bélico de «valientes».
- source_word: בַּכֹּחַ
  english_pob_choice: with strength
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con poder
  - fuertes
  lexicon: HALOT
  rationale: כֹּחַ conserva su sentido concreto de fuerza/capacidad. «Con fuerza» es natural en español y mantiene el matiz físico o funcional del término.
- source_word: לַעֲבֹדָה
  english_pob_choice: for the service
  chosen_spanish: para el servicio
  alternatives_spanish:
  - para la obra
  - para el trabajo
  lexicon: HALOT
  rationale: En Crónicas, עֲבֹדָה suele referirse al servicio asignado, especialmente de carácter cultual. «Para el servicio» es idiomático y suficientemente preciso sin sobreespecificar.
- source_word: שִׁשִּׁים וּשְׁנַיִם
  english_pob_choice: sixty-two
  chosen_spanish: sesenta y dos
  alternatives_spanish:
  - '62'
  lexicon: HALOT
  rationale: Correspondencia numérica directa y estándar en español bíblico.
- source_word: לְעֹבֵד אֱדֹם
  english_pob_choice: belonging to Obed-edom
  chosen_spanish: pertenecientes a Obed-edom
  alternatives_spanish:
  - de Obed-edom
  - para Obed-edom
  lexicon: HALOT
  rationale: El לְ final marca relación/asociación con la casa o grupo de Obed-edom. «Pertenecientes a» expresa esa pertenencia de manera clara y evita repetir «de» de forma ambigua.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo masorético y el audit trail inglés. Se preservó la secuencia familiar («ellos, sus hijos y sus hermanos») y el matiz de capacidad/fuerza para el servicio, reflejando la revisión inglesa que prefirió «men of ability» frente a una formulación más militar.
  spanish_consistency_notes:
  - Se emplea «hijos» para בני y «hermanos» para אחים, manteniendo el paralelismo familiar del hebreo.
  - «Servicio» se usa en sentido cultual/administrativo, consistente con Crónicas.
  - Se mantiene el nombre propio compuesto «Obed-edom» con guion, conforme al uso bíblico común en español.
