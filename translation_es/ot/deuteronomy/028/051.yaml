review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general y la fuerza de juicio del hebreo: el invasor consumirá los recursos y no dejará grano, mosto/vino nuevo ni aceite, ni la descendencia del ganado y del rebaño. Sin embargo, dos decisiones no siguen bien el rastro auditado: פְּרִי בְהֶמְתְּךָ no debe quedar como «fruto de tu ganado», porque en español suena opaco y no comunica claramente «descendencia/crías»; y el inglés POB revisado fijó שְׁגַר אֲלָפֶיךָ como «calves of your herd», por lo que «crías de tu ganado» pierde esa especificidad documentada sin necesidad contextual. El resto está sustancialmente alineado.'
  spanish_quality_summary: El español es claro y de registro bíblico moderno, pero «el fruto de tu ganado» resulta poco natural y potencialmente confuso. También conviene mejorar la coordinación para evitar repetición innecesaria y hacer más idiomática la frase. «Mosto» es defendible, aunque «vino nuevo» conecta más directamente con la decisión inglesa documentada y es ampliamente inteligible en contexto bíblico.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Las decisiones léxicas problemáticas son de fidelidad y naturalidad: «fruto de tu ganado» no comunica bien el sentido idiomático de פְּרִי con animales, y «crías de tu ganado» no sigue la revisión auditada a «calves of your herd».'
  issues:
