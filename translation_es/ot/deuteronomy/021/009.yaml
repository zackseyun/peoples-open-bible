translation:
  language: es
  text: Así purgarás la sangre inocente[a] de en medio de ti, porque harás lo correcto ante los ojos de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sangre del inocente». La expresión hebrea «sangre inocente» puede implicar la responsabilidad de la comunidad por sangre derramada sin expiación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: So you
  chosen_spanish: Así purgarás
  alternatives_spanish:
  - Y tú purgarás
  - Entonces purgarás
  lexicon: HALOT
  rationale: La conjunción con el pronombre enfático introduce una conclusión o consecuencia. En español, «Así» transmite mejor ese enlace discursivo que un simple «y», y permite una frase fluida sin perder la apelación directa en segunda persona singular.
- source_word: תְּבַעֵר
  english_pob_choice: shall purge
  chosen_spanish: purgarás
  alternatives_spanish:
  - removerás
  - quitarás
  - limpiarás
  lexicon: HALOT
  rationale: En este contexto legal deuteronómico, בער en piel expresa la eliminación del culpable/culpa de la comunidad. «Purgar» conserva la fuerza jurídico-covenantal que «remover» o «quitar» debilitan en español.
- source_word: הַ/דָּם הַ/נָּקִי
  english_pob_choice: the innocent blood
  chosen_spanish: la sangre inocente
  alternatives_spanish:
  - la sangre del inocente
  - la sangre inocente de culpa
  lexicon: HALOT
  rationale: El hebreo es literalmente «la sangre inocente». En español, «sangre inocente» mantiene la imagen idiomática y su posible carga de responsabilidad comunitaria, sin añadir explicaciones que el texto no desarrolla explícitamente.
- source_word: מִ/קִּרְבֶּךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu midst
  - de entre ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es comunitaria e idiomática. «De en medio de ti» conserva ese valor colectivo en un español natural y auditivamente cercano al texto fuente.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce fundamento causal para el mandato anterior. «Porque» expresa de manera directa esa relación en español contemporáneo.
- source_word: תַעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - vas a hacer
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza prescriptiva en la instrucción legal. «Harás» conserva el valor modal de mandato sin recargar la frase con perífrasis menos naturales.
- source_word: הַ/יָּשָׁר
  english_pob_choice: what is right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. «Lo recto» preserva la resonancia ética de yāšār y evita reducirlo únicamente a corrección pragmática.
- source_word: בְּ/עֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La locución idiomática se conserva con «ante los ojos de Yahvé», que mantiene la metáfora de evaluación divina y sigue el estándar del proyecto para el nombre divino.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el estándar del proyecto exige reproducirlo como «Yahvé» en el texto principal para no enmascarar el nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el análisis previo; no se requerían cambios sustantivos. Se mantuvo la lectura causal de כִּי, el valor prescriptivo del imperfecto y la metáfora judicial de «purgar» frente a alternativas más débiles.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la política terminológica del proyecto.
  - Se conserva el tono legal y comunitario con «purgar» y «de en medio de ti».
  - La frase «lo recto ante los ojos de Yahvé» sigue de cerca la estructura hebrea sin sonar arcaica en español.
