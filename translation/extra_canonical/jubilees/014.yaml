translation:
  text: '1[a]. And after this matter, in the fourth year of this week, on the new moon of the third month, the word of the LORD came to Abram in a dream, saying, “Do not fear, Abram; I am your protector,

    2. and your reward will be exceedingly great.” And he said, “Lord, Lord, what will you give me? For I go childless, and the son of Maseq, the son of my maidservant, this Eliezer of Damascus,

    3. will inherit me; and to me you have not given seed.” And he said to him, “This one will not inherit you,

    4. but the one who comes out from your own body—he will inherit you.” And he brought him outside and said to him, “Look

    5. toward heaven and count the stars[b], if you are able to count them.” And he looked toward heaven and saw

    6. the stars. And he said to him, “So will your seed be.” And he believed the LORD, and it was reckoned to him as righteousness.

    7. And he said to him, “I am the LORD who brought you out from Ur of the Chaldeans, so that I might give you the land

    8. of the Canaanites as an everlasting possession, and that I might be God to you and to your seed after you.” And he said,

    9. “Lord, Lord, by what shall I know that I will inherit it?” And he said to him, “Bring me a three-year-old heifer,

    10. and a three-year-old goat, and a three-year-old ram, and a turtledove and a pigeon.” And he took all these in the middle of the month, and he was dwelling by

    11. the oak of Mamre, which is near Hebron. And he built an altar there and slaughtered

    12. all these, and poured out their blood upon the altar, and divided them in the middle, and placed them opposite one another, face to face; but the birds he did not divide. And birds came down upon the pieces,

    13. but Abram drove them away and did not allow the birds to touch them. And it happened, when the sun was setting,

    14. that a deep sleep fell upon Abram; and behold, a terror of great darkness fell upon him. And it was said to Abram, “Know with certainty that your seed will be aliens in a land not theirs, and they will enslave them and afflict them four hundred years.

    15. But I will judge the nation to whom they will be enslaved, and after this they will come out from there with much property.

    16. But you will go to your fathers in peace, and you will be buried in a good old age.

    17. And in the fourth generation they will return here, for the sin of the Amorites is not yet complete until now.”

    18. And he awoke from his sleep and arose, and the sun had set, and there was a flame. And behold, a smoking furnace and a flame of fire passed between the pieces.

    19. On that day the LORD made a covenant with Abram, saying, “To your seed I will give this land, from the river of Egypt to the great river, the river Euphrates:

    20. the Kenites, and the Kenizzites, and the Kadmonites, and the Perizzites, and the Rephaim, and the Rakites, and the Avvites, and the Amorites, and the Canaanites, and the Girgashites, and the Jebusites.”

    21. And that day passed, and Abram offered up the pieces and the birds and their grain offerings and their drink offerings, and fire consumed them.

    22. And on this day we made the covenant with Abram, just as we had made it in this month with Noah; and Abram renewed it as a festival and as an ordinance for himself forever.

    23. And Abram rejoiced, and he told this whole matter to Sarai his wife, and he believed that he would have seed, though she was not bearing. And Sarai advised Abram her husband and said to him, “Go in to Hagar, my Egyptian maidservant; perhaps I may build up seed for you from her.” And Abram listened to the voice of Sarai his wife and said to her, “Do so.” And Sarai took

    24. Hagar her maidservant, the Egyptian, and gave her to Abram as a wife. And he went in to her, and she conceived and bore a son, and he called his name Ishmael, in the fifth year of this week[c][d][e]; and that year was the eighty-sixth year in Abram’s life.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez term can mean 'at dawn' or 'at the beginning', but in Jubilees' calendrical system it frequently designates the 'new moon' of the month.
    reason: cultural_note
    anchor_ref: '14:1'
  - marker: b
    text: The phrase rendered 'this Eliezer of Damascus' is textually compressed in the Ge'ez, with 'Maseq' and 'Damascus' appearing in close apposition. The sense is that Eliezer of Damascus is the household heir in view.
    reason: segmentation_note
    anchor_ref: '14:2'
  - marker: e
    text: The clause 'in the middle of the month' is explicit in the Ge'ez and is retained because Jubilees often marks time carefully for liturgical and chronological purposes.
    reason: cultural_note
    anchor_ref: '14:10'
  - marker: d
    text: The ethnonym rendered 'Rakites' reflects the Ge'ez reading here and may correspond to a group otherwise known under a different form in parallel traditions. The translation preserves the transmitted form rather than harmonizing it.
    reason: textual_variant
    anchor_ref: '14:20'
  - marker: c
    text: The first-person plural ('we made the covenant') reflects Jubilees' heavenly mediation framework. It is likely the angelic narrator speaking within the revelation to Moses.
    reason: cross_reference
    anchor_ref: '14:22'
lexical_decisions:
- source_word: በሠርቀ
  chosen: on the new moon
  alternatives:
  - at dawn
  - at the beginning
  rationale: In Jubilees' highly specific calendrical context, this term typically denotes the new moon (the beginning of the month), which aligns with the text's focus on exact dating.
- source_word: ቃውምከ
  chosen: your protector
  alternatives:
  - your shield
  - your support
  rationale: The Ge'ez here reflects the Genesis covenant formula but uses a term that can denote standing support/protection. 'Protector' preserves the sense without importing a purely martial image too narrowly.
- source_word: ዘእንበለ ውሉድ
  chosen: childless
  alternatives:
  - without children
  - having no son
  rationale: Compact modern English that preserves Abram's lack of offspring.
- source_word: ዘርአ
  chosen: seed
  alternatives:
  - offspring
  - descendants
  rationale: Jubilees repeatedly uses seed-language with covenantal force. 'Seed' preserves the theological and intertextual density better than flattening to 'descendants' everywhere.
- source_word: ነድ
  chosen: a flame
  alternatives:
  - thick darkness
  - fire
  rationale: The previous draft incorrectly rendered 'ነድ' (näd) as 'thick darkness'. The term means flame or fire, which aligns with the subsequent mention of the smoking furnace and flame passing between the pieces.
theological_decisions:
- issue: Divine name rendering
  chosen_reading: the LORD
  alternative_readings:
  - God
  - Yahweh
  rationale: Per project doctrine, covenantal divine-name language is rendered 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Verse 22 first-person plural speaker
  chosen_reading: we made the covenant with Abram
  alternative_readings:
  - the covenant was made with Abram
  - he made the covenant with Abram
  rationale: The Ge'ez explicitly has first-person plural, fitting Jubilees' revelatory frame in which the angelic mediator recounts divine acts. The plural is preserved rather than harmonized away to Genesis.
