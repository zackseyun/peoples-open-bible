translation:
  language: es
  text: Ante ti[a], el silencio es alabanza, oh Dios, en Sion, y a ti se te pagará un voto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «La alabanza te espera en silencio, oh Dios, en Sion», o «A ti te pertenece la alabanza en silencio, oh Dios, en Sion». La expresión hebrea es elíptica y puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: דֻמִיָּה
  english_pob_choice: silence
  chosen_spanish: silencio
  alternatives_spanish:
  - quietud
  - espera en silencio
  - silencio confiado
  lexicon: HALOT
  rationale: El sustantivo denota silencio o quietud. En esta cláusula poética condensada, «silencio» conserva el giro llamativo del hebreo sin resolverlo en una paráfrasis interpretativa.
- source_word: תְהִלָּה
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - alabanza cantada
  lexicon: HALOT
  rationale: El sentido básico es alabanza. En español, «alabanza» comunica con claridad el valor cultual del término y mantiene la relación poética con «silencio».
- source_word: לְךָ דֻמִיָּה תְהִלָּה
  english_pob_choice: To you, silence is praise
  chosen_spanish: A ti, silencio es alabanza
  alternatives_spanish:
  - A ti pertenece la alabanza en silencio
  - La alabanza en silencio es para ti
  lexicon: HALOT
  rationale: El hebreo es elíptico y admite varias lecturas. La versión elegida conserva los dos sustantivos principales y la tensión poética, sin añadir un verbo que no está explícito en el texto fuente.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí la forma plural se refiere al Dios singular de Israel, por lo que en español corresponde «Dios».
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: El sentido locativo del prefijo ב se expresa naturalmente con «en». «Sion» es la forma castellana habitual y comprensible.
- source_word: יְשֻׁלַּם
  english_pob_choice: will be paid
  chosen_spanish: se pagará
  alternatives_spanish:
  - se cumplirá
  - se realizará
  lexicon: HALOT
  rationale: Del Pual de שלם, el sentido es que el voto será pagado o cumplido. «Se pagará» preserva la concreción del acto de rendir lo prometido.
- source_word: נֶדֶר
  english_pob_choice: a vow
  chosen_spanish: un voto
  alternatives_spanish:
  - una promesa votiva
  - un voto hecho a Dios
  lexicon: HALOT
  rationale: El término designa un voto hecho a Dios. «Voto» es un equivalente directo y claro en español bíblico contemporáneo.
theological_decisions:
- issue: Interpretación de la frase elíptica לְךָ דֻמִיָּה תְהִלָּה
  english_pob_reading: Silence itself is presented as praise offered to God.
  chosen_spanish_reading: El silencio mismo se presenta como alabanza ofrecida a Dios.
  alternative_spanish_readings:
  - La alabanza espera para ti en silencio, oh Dios, en Sion.
  - Te pertenece la alabanza en silencio, oh Dios, en Sion.
  rationale: El hebreo carece de verbo explícito y permite varias reconstrucciones. La lectura elegida conserva la tensión poética en vez de resolverla con una formulación más idiomática pero más interpretativa.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción española sigue el estado más reciente del expediente, sin revisiones pendientes y en alto acuerdo con la revisión cruzada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de la línea principal porque en este versículo el texto fuente usa אֱלֹהִים, no el tetragrámaton.
  - Se conservó la tensión poética del hebreo elíptico en lugar de convertirla en una construcción explicativa.
  - «Sion» se usa como forma española estándar y no se expande a «Zion» en el texto principal.
