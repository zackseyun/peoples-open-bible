translation:
  language: es
  text: Allí cayeron los que hacen maldad[a]; fueron derribados[b] y no pudieron levantarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «malhechores» para «los que hacen maldad».
