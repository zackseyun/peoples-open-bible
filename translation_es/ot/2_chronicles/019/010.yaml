base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/019/010.yaml
  text: And every dispute that comes before you from your brothers who live in their cities—whether between blood and blood[a], between law and commandment, statutes and judgments—you shall warn them, so that they may not incur guilt before Yahweh; otherwise wrath will come upon you and upon your brothers. Do this, and you will not incur guilt.
  footnotes:
