translation:
  language: es
  text: Ten misericordia del pueblo, oh Yahvé, que es llamado por tu nombre[b], y de Israel[a], a quien hiciste igual a un primogénito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Posible también: «Israel, hazlo igual a un primogénito». La redacción griega al final del versículo es sintácticamente difícil, y el verbo final puede entenderse como una nueva súplica, no solo como descripción de un trato previo de Dios con Israel.'
    reason: alternative_reading
  - marker: b
    text: «Llamado por tu nombre» es un modismo bíblico que significa marcado como perteneciente a Dios.
    reason: cultural_note
lexical_decisions:
- source_word: ἐλέησον
  english_pob_choice: Have mercy
  chosen_spanish: Ten misericordia
  alternatives_spanish:
  - Muéstrate misericordioso con
  - Compadécete de
  lexicon: BDAG
  rationale: El aoristo imperativo expresa una súplica directa por una acción compasiva. «Ten misericordia» es una fórmula natural en español bíblico y conserva el tono de oración sin volverla mecánica.
- source_word: λαόν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - un pueblo
  - tu pueblo
  lexicon: BDAG
  rationale: El sustantivo sin artículo en esta súplica se entiende de manera colectiva como el pueblo del pacto. En español, «el pueblo» reproduce bien esa referencia colectiva sin añadir «tu» más allá de lo explícito.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  lexicon: BDAG
  rationale: Aunque el griego tiene κύριε, el contexto del proyecto distingue el nombre divino subyacente. Aquí el vocativo dirige la oración a Dios de Israel; por eso se usa «Yahvé» según la norma del proyecto, manteniendo el tono de invocación con «oh».
- source_word: κεκλημένον ἐπ᾽ ὀνόματί σου
  english_pob_choice: who are called by your name
  chosen_spanish: que es llamado con tu nombre
  alternatives_spanish:
  - que llevan tu nombre
  - llamado por tu nombre
  lexicon: BDAG
  rationale: La expresión es un modismo bíblico de pertenencia e identificación con Dios. «Es llamado con tu nombre» conserva la metáfora sin explicitarla en exceso; «con» refleja adecuadamente ἐπ᾽ ὀνόματί σου en un español claro y reverente.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: BDAG
  rationale: Nombre propio estándar, sin transliteración adicional.
- source_word: ὃν πρωτογόνῳ
  english_pob_choice: whom you made equal to a firstborn son
  chosen_spanish: a quien hiciste igual a un primogénito
  alternatives_spanish:
  - a quien hiciste como un primogénito
  - a quien hiciste primogénito
  lexicon: BDAG
  rationale: El griego es sintácticamente difícil y la nota inglesa conserva la tensión entre comparación y estatuto de primogénito. En español, «igual a un primogénito» mantiene la relación comparativa sin resolver demasiado el detalle textual; «primogénito» preserva la carga bíblica del término, aunque el género masculino implícito de «hijo» no se añade al texto principal.
- source_word: ὁμοίωσον
  english_pob_choice: you made equal to / you made like
  chosen_spanish: hiciste igual a
  alternatives_spanish:
  - haz igual a
  - haz como
  lexicon: BDAG
  rationale: La forma griega admite una lectura sintácticamente compleja; la tradición POB da peso a la equivalencia/comparación. «Hiciste igual a» sigue la lectura principal adoptada en inglés y evita una paráfrasis más interpretativa.
theological_decisions:
- issue: El nombre divino en un versículo que en griego dice κύριε
  english_pob_reading: O Lord
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Señor
  rationale: Siguiendo la política del proyecto, cuando κύριε funciona como vocativo en una oración dirigida al Dios de Israel, se expresa el nombre divino con «Yahvé» en vez de ocultarlo tras «Señor». Esto conserva la transparencia respecto del trasfondo del texto griego y su base hebrea.
  doctrine_reference: Project terminology default for יהוה / YHWH -> Yahvé
- issue: La cláusula final sobre Israel y el ‘primogénito’
  english_pob_reading: 'The verse refers to Israel as being treated like a firstborn son before God; an alternative reading is an imperative request: ''make Israel like the firstborn.'''
  chosen_spanish_reading: Israel, a quien hiciste igual a un primogénito
  alternative_spanish_readings:
  - Israel, hazlo igual a un primogénito
  - Israel, a quien hiciste como un primogénito
  rationale: 'El griego transmite una dificultad real y la POB inglesa la preserva mediante una lectura principal con nota alternativa. El español mantiene esa tensión sin resolverla de forma excesiva: la redacción principal sigue la lectura descriptiva de la traducción inglesa, mientras que la frase sigue siendo lo bastante abierta para la alternativa imperativa que la nota documenta.'
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés al dar peso a «equal to a firstborn son», pero adapta la última cláusula a un español más natural y a la vez mantiene la tensión sintáctica documentada en el griego. También incorpora la política del proyecto para el nombre divino, explicitando «Yahvé» donde el griego tiene κύριε en invocación directa.
  spanish_consistency_notes:
  - Se conservó el tono de plegaria con imperativo de súplica («Ten misericordia»).
  - Se mantuvo «Israel» sin glosa para respetar el nombre propio bíblico.
  - Se eligió «primogénito» para preservar la resonancia bíblica de firstborn son sin añadir interpretaciones no requeridas por el griego.
  - La nota sobre el modismo de pertenencia evita que «con tu nombre» se lea de manera literalista.
  - La puntuación y el registro son adecuados para publicación en español latinoamericano culto.
