lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Ahora ...
  - Y aconteció que ...
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce un nuevo episodio; en español, una simple conjunción conserva la transición fluida sin cargar el texto con un giro arcaico innecesario.
- source_word: מִקְצֵה
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - al final de
  - después de
  lexicon: HALOT
  rationale: La expresión temporal indica el cierre de un período; 'al cabo de' comunica con naturalidad el valor de límite temporal que el hebreo marca.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: three days
  chosen_spanish: tres días
  lexicon: HALOT
  rationale: La expresión cardinal-temporal es directa y no requiere ampliación.
- source_word: וַיַּעַבְרוּ
  english_pob_choice: went through
  chosen_spanish: pasaron
  alternatives_spanish:
  - pasaron por
  - atravesaron
  lexicon: HALOT
  rationale: En este contexto de movimiento dentro del campamento, 'pasaron por' transmite el desplazamiento a través del espacio sin sugerir cruce de frontera o río.
- source_word: הַשֹּׁטְרִים
  english_pob_choice: the officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los funcionarios
  - los supervisores
  lexicon: HALOT
  rationale: En el contexto administrativo de Josué, שֹׁטְרִים designa enviados con autoridad para comunicar y hacer cumplir instrucciones; 'oficiales' es el equivalente natural y preciso en español.
- source_word: בְּקֶרֶב
  english_pob_choice: through the midst of
  chosen_spanish: por en medio de
  alternatives_spanish:
  - en medio de
  - a través de
  lexicon: HALOT
  rationale: La combinación con el verbo de movimiento pide conservar la imagen espacial interna; 'por en medio de' refleja el valor de 'midst' y la direccionalidad del pasaje.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento de Israel
  - la campamento
  lexicon: HALOT
  rationale: En esta narración, מחנה se refiere al asentamiento/campamento del pueblo; 'campamento' es natural y mantiene la referencia concreta del escenario.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el sentido registrado en la auditoría inglesa, sin cambios de lectura ni necesidad de revisión adicional documentada en este pasaje.
  spanish_consistency_notes:
  - Se mantiene 'oficiales' para שֹׁטְרִים, coherente con el uso administrativo-militar del libro de Josué.
  - '''Al cabo de tres días'' conserva el límite temporal expresado por מִקְצֵה sin volverlo una simple secuencia cronológica.'
  - '''Por en medio de'' preserva la imagen espacial del hebreo y evita reducirla a un mero ''en medio de''.'
