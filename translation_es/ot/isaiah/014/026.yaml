translation:
  language: es
  text: Este es el propósito que ha sido determinado contra toda la tierra[a], y esta es la mano que está extendida contra todas las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo el país', si la referencia se entiende de manera más regional que universal.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Ésta es
  lexicon: HALOT
  rationale: El demostrativo introduce y señala de manera enfática la afirmación siguiente; en español, 'Esta es' reproduce bien la deixis con sintaxis natural.
- source_word: הָעֵצָה
  english_pob_choice: the purpose
  chosen_spanish: la intención
  alternatives_spanish:
  - el plan
  - el propósito
  - el consejo
  lexicon: HALOT
  rationale: עֵצָה puede expresar consejo, plan o propósito. Aquí, por la paralela tensión con el participio siguiente y el carácter deliberado del oráculo, 'intención' comunica una finalidad establecida sin sonar forzado en español.
- source_word: הַיְּעוּצָה
  english_pob_choice: that is purposed
  chosen_spanish: que está intencionada
  alternatives_spanish:
  - que está determinada
  - que está planeada
  - que está dispuesta
  lexicon: HALOT
  rationale: Se conserva el eco verbal de יעץ mediante un participio pasivo/adjetival en español. 'Intencionada' mantiene la relación léxica con 'intención' y preserva el juego de palabras de forma comprensible.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En este contexto de juicio, עַל señala dirección hostil; 'contra' transmite mejor esa fuerza que una simple referencia espacial o temática.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitable
  - toda la tierra / todo el país
  lexicon: HALOT
  rationale: אָרֶץ admite 'tierra' o 'país'. El paralelismo con 'todas las naciones' favorece un alcance amplio; 'toda la tierra' conserva esa amplitud y la estructura hebrea. La nota de alternativa permite una lectura regional si se entiende así el contexto.
- source_word: וְזֹאת
  english_pob_choice: and this is
  chosen_spanish: y esta es
  alternatives_spanish:
  - y esto es
  - y ésta es
  lexicon: HALOT
  rationale: La conjunción introduce la segunda cola paralela. 'Y esta es' mantiene la simetría y requiere una cópula idiomática en español.
- source_word: הַיָּד
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - el poder
  - la fuerza
  lexicon: HALOT
  rationale: Se conserva el antropomorfismo bíblico 'mano' como imagen de acción eficaz en juicio; traducirlo como 'poder' suavizaría la metáfora.
- source_word: הַנְּטוּיָה
  english_pob_choice: that is stretched out
  chosen_spanish: que está extendida
  alternatives_spanish:
  - que está extendida en juicio
  - que está alzada
  - que está tendida
  lexicon: HALOT
  rationale: '''Extendida'' reproduce la imagen de נטה sin añadir más interpretación. ''Estrecha'' o ''alzada'' cambiarían el matiz; ''extendida'' es clara y fiel.'
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentes
  lexicon: HALOT
  rationale: גּוֹיִם se refiere a naciones en sentido amplio; 'naciones' es la correspondencia más directa y usual en español bíblico contemporáneo.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: 'universal scope: ''all the earth'''
  chosen_spanish_reading: 'alcance universal: ''toda la tierra'''
  alternative_spanish_readings:
  - 'alcance regional: ''todo el país'''
  - 'alcance territorial: ''toda la tierra / toda la región'''
  rationale: El paralelismo con 'todas las naciones' favorece una extensión universal. No obstante, el hebreo אָרֶץ también puede referirse a una región o país, por lo que se preserva la ambigüedad en nota.
  doctrine_reference: Isaías 14:26; ámbito del oráculo profético
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'plan that is planned' a 'purpose that is purposed' para reflejar con más precisión el juego entre עֵצָה y יְעוּצָה. En español se buscó conservar esa relación léxica con 'intención / intencionada', manteniendo la paridad sintáctica y el tono formal.
  spanish_consistency_notes:
  - Se mantiene 'tierra' para אָרֶץ en la línea principal, con nota alternativa para lectura regional.
  - Se conserva 'naciones' para גּוֹיִם, sin introducir 'gentiles' ni 'pueblos' como traducción principal.
  - Se preserva la metáfora de la 'mano' como imagen de acción divina en juicio.
  - El marcador [a] aparece en el texto exactamente donde corresponde la nota de alcance de אָרֶץ.
