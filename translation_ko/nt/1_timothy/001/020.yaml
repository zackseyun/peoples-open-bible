id: 1TI.1.20
reference: 1 Timothy 1:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὧν ἐστιν Ὑμέναιος καὶ Ἀλέξανδρος, οὓς παρέδωκα τῷ Σατανᾷ ἵνα παιδευθῶσι μὴ βλασφημεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/020.yaml
  text: among whom are Hymenaeus and Alexander[b][a], whom I have handed over to Satan so that they may be taught not to blaspheme.
  footnotes:
  - marker: a
    text: Or 'delivered over to Satan.' The phrase likely refers to severe corrective discipline rather than final condemnation.
    reason: lexical_alternative
  - marker: b
    text: '''Disciplined'' can also be rendered ''taught,'' ''trained,'' or ''corrected''; the Greek term includes the idea of formative correction.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그 가운데 후메내오와 알렉산더가 있는데, 내가 그들을 사탄에게 넘겨주었으니[a], 이는 그들이 모독하지 않도록 징계받게 하기 위함입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「사탄에게 내어 주었으니」. 이 구절은 최종적 정죄가 아니라 엄중한 교정적 징계를 가리킨다고 보인다.
    reason: lexical_alternative
  - marker: b
    text: 「징계받다」는 「가르침을 받다」 「훈련받다」 「교정받다」로도 옮길 수 있다. 헬라어 παιδεύω는 형성적 교정의 의미를 포함한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμέναιος
  english_pob_choice: Hymenaeus
  chosen_korean: 후메내오
  alternatives_korean:
  - 휘메나이오스
  - 후메내오스
  lexicon: BDAG
  rationale: 본 프로젝트 표기 정책에 따라 「후메내오」 사용(개역개정·새번역 표기).
- source_word: Ἀλέξανδρος
  english_pob_choice: Alexander
  chosen_korean: 알렉산더
  alternatives_korean:
  - 알렉산드로
  lexicon: BDAG
  rationale: 한국 교회 정립 표기 「알렉산더」.
- source_word: παρέδωκα τῷ Σατανᾷ
  english_pob_choice: I have handed over to Satan
  chosen_korean: 사탄에게 넘겨주었으니
  alternatives_korean:
  - 사탄에게 내어 주었으니
  - 사탄에게 인도하였으니
  lexicon: BDAG
  rationale: 「넘겨주다」가 παραδίδωμι의 본의를 직접 담는다.
- source_word: παιδευθῶσι
  english_pob_choice: they may be taught
  chosen_korean: 징계받게
  alternatives_korean:
  - 가르침을 받게
  - 훈련받게
  - 교정받게
  lexicon: BDAG
  rationale: παιδεύω는 형성적 교정의 폭을 가지며, 본문 문맥(사탄에게 넘김 + 모독 중단 목적)에서는 처벌적 교정의 어감이 강하다. 「징계받게」가 한국 신학 어휘에서 그 무게를 가장 잘 담는다.
- source_word: μὴ βλασφημεῖν
  english_pob_choice: not to blaspheme
  chosen_korean: 모독하지 않도록
  alternatives_korean:
  - 신성을 모독하지 않게
  - 비방하지 않도록
  lexicon: BDAG
  rationale: 13절 βλάσφημος와 일관.
