translation:
  language: es
  text: Y el pueblo subió del Jordán el día diez del primer mes[a], y acampó en Gilgal, en el límite oriental de Jericó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «salió del Jordán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acamparon en Gilgal, al este de Jericó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלוּ
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - subieron
  - subieron de
  - ascendió
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba o salida desde un lugar; en español, «subió» conserva esa direccionalidad sin forzar una paráfrasis.
- source_word: מִן הַיַּרְדֵּן
  english_pob_choice: from the Jordan
  chosen_spanish: del Jordán
  alternatives_spanish:
  - desde el Jordán
  - del río Jordán
  lexicon: HALOT
  rationale: La referencia es al río en contexto narrativo; «del Jordán» es breve, natural y mantiene la idea de salir desde allí.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: on the tenth day of the first month
  chosen_spanish: el día diez del primer mes
  alternatives_spanish:
  - el diez del primer mes
  - en el décimo día del primer mes
  lexicon: HALOT
  rationale: La fórmula calendárica hebrea requiere explicitar «día» en español para quedar clara y idiomática.
- source_word: וַיַּחֲנוּ
  english_pob_choice: they camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - establecieron campamento
  lexicon: HALOT
  rationale: חנה significa acampar/encampar; «acamparon» conserva el valor narrativo con español moderno y digno.
- source_word: בַּגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en el Gilgal
  - a Gilgal
  lexicon: HALOT
  rationale: Como topónimo, Gilgal se translitera; «en» es la preposición normal para ubicación de campamento.
- source_word: בִּקְצֵה מִזְרַח יְרִיחוֹ
  english_pob_choice: on the eastern border of Jericho
  chosen_spanish: en la frontera oriental de Jericó
  alternatives_spanish:
  - en el borde oriental de Jericó
  - al este de Jericó
  - en el límite oriental de Jericó
  lexicon: HALOT
  rationale: קצה puede ser borde, extremo o frontera; dado el ajuste de la revisión inglesa hacia «border», «frontera oriental» preserva el matiz geográfico formal sin perder la relación con Jericó.
translation_notes:
  revision_awareness: La redacción inglesa revisó «edge» a «border» para ketsé; por eso se eligió «frontera oriental» en vez de una opción más libre. Se mantuvo la fórmula cronológica completa y el paralelismo narrativo del hebreo.
  spanish_consistency_notes:
  - Se conservó el nombre propio «Jordán» para el río y «Jericó» para la ciudad.
  - Se usó «Gilgal» como transliteración estable, sin artículo, siguiendo el uso del proyecto.
  - La estructura verbal en pretérito simple reproduce la secuencia narrativa del hebreo.
  - Las notas alternativas se anclaron exactamente en el texto para evitar ambigüedad editorial.
