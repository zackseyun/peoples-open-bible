translation:
  language: es
  text: 'Y dirás[a]: «Así dice el Señor Yahvé: Una ciudad que derrama sangre en medio de ella, para que llegue su tiempo[b], y hace ídolos contra sí misma para contaminarse».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que venga su tiempo»; la expresión implica el tiempo señalado de juicio de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea para «ídolos» es despectiva y puede tener el sentido de «ídolos inmundos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor, Yahvé
  - el Señor YHWH
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español se preserva la distinción con «Señor» + «Yahvé», siguiendo la norma del proyecto de no ocultar el nombre divino tras una convención de sustitución.
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - urbe
  - población
  lexicon: HALOT
  rationale: «Ciudad» es la equivalencia directa y natural. El contexto profético apunta a Jerusalén como ciudad personificada.
- source_word: שֹׁפֶכֶת דָּם
  english_pob_choice: that sheds blood / shedding blood
  chosen_spanish: que derrama sangre
  alternatives_spanish:
  - que vierte sangre
  - derramando sangre
  lexicon: HALOT
  rationale: El participio expresa acción continua o caracterizadora. «Derrama sangre» mantiene el valor verbal y la carga de culpa/bloodguilt sin sonar forzado en español.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: «En medio de ella» conserva la imagen de la ciudad personificada. «En medio» es más natural en español que un calco rígido y mantiene la referencia femenina del sufijo.
- source_word: לָבוֹא עִתָּהּ
  english_pob_choice: so that her time may come
  chosen_spanish: para que llegue su tiempo
  alternatives_spanish:
  - para que venga su tiempo
  - a fin de que llegue su tiempo
  - para que venga su hora
  lexicon: HALOT
  rationale: La construcción con ל y el infinitivo puede expresar finalidad o resultado. Se mantiene «su tiempo» sin añadir explícitamente «de juicio» para preservar la tensión interpretativa documentada en el audit trail.
- source_word: וְעָשְׂתָה גִלּוּלִים
  english_pob_choice: and making idols
  chosen_spanish: y que hace ídolos
  alternatives_spanish:
  - y hace ídolos
  - y haciendo ídolos
  - y que fabrica ídolos
  lexicon: HALOT
  rationale: Se conserva el paralelismo participial y la coordinación descriptiva. «Hace ídolos» es fiel y fluido; no se extrema el desprecio léxico del hebreo para no sobreinterpretar en el texto principal.
- source_word: גִלּוּלִים
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - ídolos inmundos
  - ídolos abominables
  - ídolos de estiércol
  lexicon: HALOT
  rationale: El término hebreo es despectivo, pero «ídolos» comunica el referente con claridad. El matiz contemptivo queda registrado en la nota léxica, evitando un calco excesivamente interpretativo.
- source_word: עָלֶיהָ
  english_pob_choice: against herself
  chosen_spanish: contra sí misma
  alternatives_spanish:
  - sobre sí misma
  - contra ella
  - en su contra
  lexicon: HALOT
  rationale: La relación reflexiva indica efecto autolesivo o autodestructivo. «Contra sí misma» reproduce ese sentido mejor que una simple referencia externa.
- source_word: לְטָמְאָה
  english_pob_choice: to defile herself
  chosen_spanish: para contaminarse
  alternatives_spanish:
  - para contaminarse a sí misma
  - para hacerse impura
  - para profanarse
  lexicon: HALOT
  rationale: El infinitivo expresa resultado/propósito. «Contaminarse» suena natural en español y conserva el matiz ritual-moral de volverse impura por la idolatría.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוִה en la combinación אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor, Yahvé
  - el Señor YHWH
  rationale: Se sigue la directriz del proyecto de traducir YHWH como «Yahvé», en lugar de ocultarlo con una sustitución tipográfica. La combinación con אֲדֹנָי se resuelve de forma transparente y reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Si explicitar o no que «su tiempo» es tiempo de juicio
  english_pob_reading: her time may come
  chosen_spanish_reading: para que llegue su tiempo
  alternative_spanish_readings:
  - para que llegue su tiempo de juicio
  - para que llegue su fin
  - para que venga su hora
  rationale: El contexto apunta al juicio, pero el hebreo solo dice «su tiempo». Se preserva la ambigüedad textual para no resolver una tensión que el original deja abierta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que prefirió una estructura apposicional más directa y un paralelismo participial consistente. En español, eso se refleja en «Una ciudad que derrama sangre... y que hace ídolos», evitando una apelación vocativa artificial y manteniendo el flujo descriptivo del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה, conforme al estándar del proyecto.
  - Se mantiene «ídolos» en el texto principal, sin intensificarlo a un equivalente más peyorativo, porque el matiz despectivo ya está documentado en la nota léxica y el contexto.
  - Se conserva la personificación femenina de la ciudad con pronombres y posesivos femeninos implícitos en «ella/su».
  - «Contaminarse» se prefiere aquí por claridad y naturalidad en español, sin perder el trasfondo ritual de טמא.
  - No se añadió una nota al pie porque no hay una alternativa textual que requiera anclaje específico en el versículo español.
