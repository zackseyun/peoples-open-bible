translation:
  language: es
  text: Bendigan al Señor, montes y colinas; cántenle alabanzas y exáltenlo en gran manera para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  - Bendigan
  lexicon: BDAG
  rationale: El imperativo plural exhorta a la creación a hablar bien del Señor o a bendecirlo. «Bendecid» conserva el valor litúrgico del llamado y corresponde al plural exhortativo del griego. Se prefiere sobre «alabad» porque mantiene mejor la tensión semántica de bendecir/pregonar bien.
- source_word: ὄρη καὶ βουνοί
  english_pob_choice: mountains and hills
  chosen_spanish: montes y colinas
  alternatives_spanish:
  - montañas y colinas
  - montes y cerros
  lexicon: LSJ
  rationale: La pareja designa relieves elevados en paralelismo poético. «Montes y colinas» es natural en español bíblico y conserva el paralelismo sin sonar técnico ni moderno en exceso.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor
  lexicon: BDAG
  rationale: El texto griego usa κύριον en un contexto doxológico; por tanto, «el Señor» reproduce fielmente el título sin introducir el nombre divino donde el griego no lo escribe. En este pasaje no hay base textual para reemplazarlo por Yahvé en el cuerpo del versículo.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantadle alabanzas
  alternatives_spanish:
  - cantad
  - entonadle un himno
  lexicon: BDAG
  rationale: El verbo implica cantar o recitar en alabanza. «Cantadle alabanzas» comunica el sentido musical y devocional con naturalidad en español, más plenamente que un simple «alabad».
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo altamente
  alternatives_spanish:
  - exaltadlo en gran manera
  - ensalzádlo sobremanera
  lexicon: LSJ
  rationale: El compuesto intensifica la exaltación. «Exaltadlo altamente» conserva esa intensificación y refleja el tono solemne del griego, aunque suena algo menos idiomático; se prefiere por su cercanía semántica al original y por mantener la repetición retórica del salmo.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre
  lexicon: BDAG
  rationale: La expresión denota permanencia indefinida. «Para siempre» es la forma más clara y ampliamente entendible en español, y preserva el carácter litúrgico del refrán.
theological_decisions:
- issue: Tratamiento de κύριος en un llamado de alabanza
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé
  rationale: El griego tiene κύριον, no el tetragrámaton. En una doxología traducida desde el griego, «el Señor» respeta la forma fuente y evita introducir una equivalencia más específica que el texto no explicita aquí. No hay señal en este versículo de que deba aplicarse el nombre divino en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; esta versión sigue el texto inglés auditado y la lectura griega concordante sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene la secuencia imperativa plural del griego con verbos en plural de trato reverente.
  - Se evita la mayusculización de «Señor» como sustituto del nombre divino, porque el griego aquí escribe κύριον.
  - La fórmula final «para siempre» conserva el valor perpetuo del refrán y su cadencia litúrgica.
