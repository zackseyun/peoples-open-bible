translation:
  language: es
  text: Tú sabes que Abner hijo de Ner[a] vino para engañarte, para averiguar tus salidas y tus entradas[b], y para averiguar todo lo que estás haciendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para seducirte» / «para persuadirte». El verbo hebreo puede expresar seducir, inducir o engañar; aquí el contexto hostil favorece «engañarte».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tus salidas y tus entradas», un modismo para el conjunto de tus movimientos o actividades.'
    reason: cultural_note
lexical_decisions:
- source_word: יָדַעְתָּ
  english_pob_choice: You know
  chosen_spanish: Tú sabes
  alternatives_spanish:
  - Sabes
  - Tú sabes bien
  lexicon: HALOT
  rationale: El perfecto qal puede funcionar como una afirmación de estado presente en discurso directo. En español, «tú sabes» comunica mejor esa apelación actual al conocimiento de David que un pasado literal.
- source_word: אַבְנֵר בֶּן נֵר
  english_pob_choice: Abner son of Ner
  chosen_spanish: Abner hijo de Ner
  alternatives_spanish:
  - Abner, hijo de Ner
  - Abner el hijo de Ner
  lexicon: HALOT
  rationale: Se conserva el nombre propio y la relación filial con una forma natural y digna en español, sin añadir solemnidad innecesaria.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: Introduce en español el contenido de lo que David sabe. «Que» refleja mejor el flujo acusatorio-explicativo que una causalidad explícita.
- source_word: לְפַתֹּתְךָ
  english_pob_choice: to deceive you
  chosen_spanish: para engañarte
  alternatives_spanish:
  - para seducirte
  - para persuadirte
  - para desorientarte
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar seducir, inducir o engañar; en este contexto hostil y político, «engañarte» transmite mejor la manipulación adversa sin suavizar la fuerza del término.
- source_word: בָּא
  english_pob_choice: he came
  chosen_spanish: vino
  alternatives_spanish:
  - ha venido
  - llegó
  lexicon: HALOT
  rationale: El pasado simple es natural en español y conserva la secuencia narrativa del hebreo en el contexto del discurso directo.
- source_word: לָדַעַת
  english_pob_choice: to learn
  chosen_spanish: para conocer
  alternatives_spanish:
  - para saber
  - para averiguar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para conocer» mantiene el paralelismo con «sabes» y evita repetir «saber» de modo monótono, sin perder la idea de obtener información.
- source_word: מוֹצָאֲךָ
  english_pob_choice: your going out
  chosen_spanish: tus salidas
  alternatives_spanish:
  - tu salida
  - tus movimientos al salir
  lexicon: HALOT
  rationale: Se preserva el idiomatismo hebreo dentro de un español idiomático. «Tus salidas» mantiene la idea de movimientos de salida sin volver la frase artificial.
- source_word: מְבוֹאֶךָ
  english_pob_choice: your coming in
  chosen_spanish: tus entradas
  alternatives_spanish:
  - tu entrada
  - tus movimientos al entrar
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «tus salidas» para conservar la figura hebrea de totalidad de movimientos o actividades.
- source_word: כָּל אֲשֶׁר אַתָּה עֹשֶׂה
  english_pob_choice: all that you are doing
  chosen_spanish: todo lo que estás haciendo
  alternatives_spanish:
  - todo lo que haces
  - todo cuanto haces
  lexicon: HALOT
  rationale: El participio hebreo sugiere actividad en curso. «Estás haciendo» refleja mejor esa noción presente que un simple presente gnómico, sin perder naturalidad.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la fuerza hostil de פתה, el valor aspectual del participio final y el modismo hebreo de «salidas y entradas» con una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto cuando el texto no exige el tetragrámaton explícito; aquí no aparece.
  - «Mesías/Cristo» no interviene en este versículo.
  - Se conserva el paralelismo semítico con «tus salidas y tus entradas» en vez de sustituirlo por una paráfrasis amplia.
  - «Conocer» se emplea para el infinitivo de propósito, mientras «sabes» traduce el perfecto con valor de estado presente.
