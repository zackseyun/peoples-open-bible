  rationale: Se hace una reparación menor de estilo para mejorar la naturalidad en español sin apartarse del griego ni de la decisión auditada en inglés de conservar el verbo general «hizo». «Sorteos» comunica claramente κλήρους en español moderno; la nota se mantiene con mejor redacción editorial.
