review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: espada/arco, propósito de derribar al pobre y necesitado, y el grupo final ''los rectos de camino''. Sin embargo, לִטְבֹחַ es más fuerte que ''matar'' y conviene preservar la brutalidad de ''slaughter'' con un equivalente español más preciso.'
  spanish_quality_summary: 'El español es generalmente claro y digno. ''Han desenvainado la espada y tensado su arco'' suena natural. La frase final ''los rectos de camino'' es dura pero defendible por fidelidad formal. El problema principal es léxico: ''para matar'' rebaja innecesariamente la fuerza violenta del hebreo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Impíos', 'espada', 'pobre', 'necesitado' y 'rectos de camino' son compatibles con la línea POB. Se recomienda alinear לִטְבֹחַ con una opción como 'masacrar' o 'degollar'; aquí 'masacrar' preserva mejor la fuerza sin introducir una imagen demasiado específica.
  issues:
  - severity: medium
    issue: לִטְבֹחַ está traducido como 'para matar'
    rationale: El hebreo טבח, y la decisión léxica inglesa 'to slaughter', expresan una violencia más cruda que el verbo general 'matar'. En español, 'matar' diluye ese matiz. 'Masacrar' conserva la fuerza semántica sin imponer la especificidad física de 'degollar/degüellar'.
  - severity: low
    issue: La nota [b] está mal anclada conceptualmente
    rationale: 'La nota [b] dice ''O: los rectos de camino'', pero el ancla en el texto está sobre ''al pobre y al necesitado''. Esto replica el historial inglés, pero en español no aporta una alternativa real para esa frase y puede confundir. Conviene conservarla solo si se entiende como nota de historial de traducción; mejor reformularla para dejar claro que es una traducción anterior de la frase final.'
  revised_spanish_text: Los impíos han desenvainado la espada y tensado su arco[a], para derribar al pobre y al necesitado[b], para masacrar a los rectos de camino.
  revised_footnotes:
  - marker: a
    text: 'O: "los rectos en conducta" / "los rectos en su camino". Hebreo: "los rectos de camino".'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción anterior de la frase final: "los rectos de camino".'
    reason: previous_rendering
  revision_rationale: Se revisa únicamente el verbo לִטְבֹחַ para reflejar mejor la intensidad de 'to slaughter' en el hebreo y en la auditoría inglesa. También se aclara la redacción de la nota [b] para que no parezca una alternativa al sintagma 'al pobre y al necesitado', sino una nota de historial de traducción, tal como indica el contexto inglés. No se requiere adjudicación adicional.
