translation:
  language: es
  text: No te desvíes ni a la derecha ni a la izquierda[a]; aparta tu pie del mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te apartes».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «aparta tu pie del mal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּט
  english_pob_choice: turn
  chosen_spanish: desvíes
  alternatives_spanish:
  - gires
  - te apartes
  - te desvíes
  lexicon: HALOT
  rationale: El hebreo expresa prohibición de apartarse de la dirección correcta. «Desviarse» conserva la idea de apartamiento direccional y funciona de manera natural en español. «Girar» sería más literal pero menos preciso para la exhortación sapiencial.
- source_word: יָמִין
  english_pob_choice: the right
  chosen_spanish: a la derecha
  alternatives_spanish:
  - a la mano derecha
  - al lado derecho
  lexicon: HALOT
  rationale: La expresión direccional se vierte de forma idiomática en español como «a la derecha», manteniendo el paralelismo con «a la izquierda».
- source_word: שְׂמֹאול
  english_pob_choice: the left
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - a la mano izquierda
  - al lado izquierdo
  lexicon: HALOT
  rationale: Corresponde al término direccional opuesto a יָמִין y se traduce con la forma más natural y paralela en español.
- source_word: הָסֵר
  english_pob_choice: remove your foot
  chosen_spanish: aparta
  alternatives_spanish:
  - quita
  - aleja
  - retira
  lexicon: HALOT
  rationale: El imperativo comunica una acción concreta de apartar el pie del mal. «Aparta» conserva la fuerza de הָסֵר ('retirar/apartar') sin sonar torpe en español; además mantiene el paralelo metafórico con el caminar.
- source_word: רַגְלְךָ
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tu paso
  - tu planta
  lexicon: HALOT
  rationale: Se conserva el singular hebreo y la metáfora corporal del caminar moral. «Pie» es más directo que «paso» y respeta mejor la imagen del texto.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de la maldad
  - de lo malo
  - del malvado
  lexicon: HALOT
  rationale: En el contexto sapiencial, רַע se entiende en sentido moral. «Del mal» es conciso, bíblicamente reconocible y no estrecha innecesariamente el alcance del término.
theological_decisions:
- issue: Alcance moral de רַע
  english_pob_reading: evil
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - maldad
  - lo malo
  - perversidad
  rationale: La advertencia sapiencial apunta a la categoría moral general, no solo a actos aislados. «Mal» preserva esa amplitud y evita una especificación excesiva que no exige el hebreo.
  doctrine_reference: Sabiduría ética; contraste entre el camino recto y el mal
- issue: Metáfora del caminar
  english_pob_reading: remove your foot from evil
  chosen_spanish_reading: aparta tu pie del mal
  alternative_spanish_readings:
  - retira tu pie del mal
  - quita tu pie del mal
  rationale: El hebreo usa una imagen corporal de dirección y conducta. «Aparta tu pie» conserva la metáfora sin convertirla en una abstracción moral.
  doctrine_reference: Vida recta / conducta sabia
translation_notes:
  revision_awareness: La traducción sigue la revisión inglesa más reciente, que prefirió «remove your foot from evil» frente a una paráfrasis más suave. En español, «aparta tu pie del mal» refleja esa misma concreción y mantiene la formalidad del imperativo sapiencial.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de la imagen corporal («pie») para no diluir la metáfora del texto.
  - Se usa «mal» como equivalente principal de רַע, en coherencia con el valor moral observado en el contexto sapiencial.
  - 'La primera cláusula conserva un ritmo paralelo claro: «ni a la derecha ni a la izquierda».'
