  - severity: low
    issue: La expresión 'todo alrededor' es algo poco idiomática en español en esta construcción.
    rationale: Aunque comprensible, 'alrededor' o 'por todos lados' suena más natural que 'todo alrededor' después de 'una llama'. No obstante, la frase conserva el sentido y puede repararse mínimamente.
