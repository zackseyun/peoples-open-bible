  yaml_path: translation/deuterocanon/3_maccabees/005/042.yaml
  text: Therefore the king[a], a Phalaris in every way, filled with irrationality and counting as nothing the changes of mind occurring within him regarding the oversight of the Jews, firmly making a most complete oath that he would without delay send these men to Hades, mangled in knees and feet by beasts[c][b],
  footnotes:
  - marker: a
    text: Phalaris was a proverbial tyrant noted for extreme cruelty; the text compares the king to him rather than merely calling him cruel.
    reason: cultural_note
  - marker: b
    text: Or 'the realm of the dead' for 'Hades.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says literally 'changes of soul,' an idiom for inner changes or shifts of heart.
    reason: lexical_alternative
