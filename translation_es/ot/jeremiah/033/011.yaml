translation:
  language: es
  text: 'el sonido del gozo y el sonido de la alegría, el sonido del novio y el sonido de la novia, el sonido de los que dicen: «Den gracias a Yahvé de los ejércitos, porque Yahvé es bueno, porque su amor fiel permanece para siempre[a]», y de los que traen una ofrenda de acción de gracias a la casa de Yahvé. Porque yo restauraré la prosperidad de la tierra[b] como al principio, dice Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su misericordia permanece para siempre» o «su fidelidad de pacto permanece para siempre» para «su amor fiel permanece para siempre».
    reason: lexical_alternative
  - marker: b
    text: O «restauraré el cautiverio de la tierra»; el modismo hebreo puede referirse tanto al regreso de cautivos como, más ampliamente, a la restauración de la tierra.
    reason: alternative_reading
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: the sound of
  chosen_spanish: la voz de / la voz de los que dicen
  alternatives_spanish:
  - el sonido de
  - la voz
  lexicon: HALOT
  rationale: קוֹל puede abarcar voz, sonido o voz audible. En esta serie poética, el español fluye mejor con «la voz de» para los elementos festivos y para la frase introducida por participio, sin perder el efecto de lo escuchado en la ciudad restaurada.
- source_word: שָׂשׂוֹן
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - júbilo
  lexicon: HALOT
  rationale: Se eligió «gozo» para preservar el matiz exultante y ligeramente más solemne del término en un contexto litúrgico-profético, mientras se mantiene la pareja poética con «alegría».
- source_word: שִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: «Alegría» comunica con naturalidad el paralelo poético con שָׂשׂוֹן y evita una repetición semántica excesiva en español.
- source_word: חָתָן
  english_pob_choice: bridegroom
  chosen_spanish: novio
  alternatives_spanish:
  - esposo
  - mancebo
  lexicon: HALOT
  rationale: Aunque «novio» es más moderno que «esposo», aquí describe al hombre en la escena nupcial; «novio» mantiene la pareja natural con «novia» en español y conserva la imagen de celebración.
- source_word: כַּלָּה
  english_pob_choice: bride
  chosen_spanish: novia
  alternatives_spanish:
  - desposada
  - esposa
  lexicon: HALOT
  rationale: «Novia» es el correlato natural de «novio» en español contemporáneo y refleja bien la fórmula hebrea de bodas.
- source_word: הוֹדוּ
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Dad gracias
  - Alaben
  lexicon: HALOT
  rationale: El imperativo de la fórmula litúrgica se expresa de forma natural en español con «Den gracias», que conserva el sentido de agradecimiento explícito del verbo.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» conforme al estándar del proyecto, y «de los ejércitos» conserva el título hebreo צְבָאוֹת de modo directo, sin sustituirlo por un equivalente interpretativo.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: es bueno
  alternatives_spanish:
  - es bondadoso
  - es benigno
  lexicon: HALOT
  rationale: 'La fórmula litúrgica se traduce de forma simple y directa: «Yahvé es bueno». Es la opción más fiel y natural para este contexto.'
- source_word: לְעוֹלָם חַסְדּוֹ
  english_pob_choice: his steadfast love endures forever
  chosen_spanish: para siempre es su amor fiel
  alternatives_spanish:
  - su amor constante es para siempre
  - su misericordia es para siempre
  - su fidelidad de pacto es para siempre
  lexicon: HALOT
  rationale: «חֶסֶד» reúne lealtad de pacto, misericordia y amor constante. «Amor fiel» preserva esa tensión sin imponer un solo matiz demasiado estrecho, y «para siempre» mantiene el carácter litúrgico de la confesión.
- source_word: מְבִאִים
  english_pob_choice: those bringing
  chosen_spanish: los que traen
  alternatives_spanish:
  - trayendo
  - quienes traen
  lexicon: HALOT
  rationale: El participio se vierte como relativa sustantivada en español para sonar natural y conservar el sentido de un grupo caracterizado por traer la ofrenda.
- source_word: תּוֹדָה
  english_pob_choice: a thank offering
  chosen_spanish: una ofrenda de acción de gracias
  alternatives_spanish:
  - un sacrificio de gratitud
  - una ofrenda de gratitud
  lexicon: HALOT
  rationale: Aquí el término tiene sentido cultual y no solo verbal. «Ofrenda de acción de gracias» comunica con claridad la ofrenda sacrificial sin perder la conexión con el agradecimiento.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de Yahvé», que corresponde bien al hebreo y mantiene la terminología del proyecto sin reemplazarla por una formulación más eclesiástica.
- source_word: שְׁבוּת
  english_pob_choice: the fortunes
  chosen_spanish: la suerte
  alternatives_spanish:
  - la cautividad
  - el cautiverio
  lexicon: HALOT
  rationale: El idiomático שׁוּב שְׁבוּת admite una lectura amplia de restauración. En español, «la suerte» expresa de forma breve y natural la condición/restauración del país, sin restringirla a la sola idea de retorno de cautivos.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el terreno
  lexicon: HALOT
  rationale: En Jeremías, el término suele referirse a la tierra del pueblo en su marco histórico-teológico. «La tierra» conserva esa amplitud sin modernizar indebidamente a «país».
- source_word: כְּבָרִאשֹׁנָה
  english_pob_choice: as at first
  chosen_spanish: como al principio
  alternatives_spanish:
  - como antes
  - como al comienzo
  lexicon: HALOT
  rationale: «Como al principio» reproduce bien la idea de retorno a un estado previo y mantiene un tono elevado adecuado al profeta.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre propio divino y evita el ocultamiento litúrgico por mayúsculas o sustituciones tradicionales.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Meaning of חֶסֶד in the liturgical formula
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: para siempre es su amor fiel
  alternative_spanish_readings:
  - para siempre es su misericordia
  - para siempre es su amor constante
  - para siempre es su fidelidad de pacto
  rationale: La fórmula hebrea combina lealtad, misericordia y fidelidad de pacto. «Amor fiel» conserva esa tensión sin reducirla a una sola acepción; «para siempre» mantiene el eco litúrgico repetitivo del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Meaning of שׁוּב שְׁבוּת
  english_pob_reading: I will restore the fortunes of the land
  chosen_spanish_reading: restauraré la suerte de la tierra
  alternative_spanish_readings:
  - restauraré el cautiverio de la tierra
  - haré volver la cautividad de la tierra
  - restauraré la fortuna de la tierra
  rationale: El pasaje reúne gozo, bodas, acción de gracias y culto restaurado; por eso la fórmula debe leerse como restauración integral. «La suerte de la tierra» mantiene el idiomatismo y la amplitud semántica sin limitarse a una sola dimensión política o de exilio.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del texto inglés que añadió la coordinación «and of those bringing» para reflejar mejor el hebreo. En español se reflejó esa coordinación con «y de los que traen», manteniendo el paralelismo del poema y la sucesión de voces/restauración. También se preservó la lectura idiomática amplia de שְׁבוּת conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé en todas las ocurrencias del Tetragrámaton.
  - 'Se usa una pareja léxica estable para el binomio חגoc/alegría: gozo / alegría.'
  - La expresión cultual se conserva como «casa de Yahvé» y «ofrenda de acción de gracias» para coherencia con otros textos similares.
  - No se introdujeron notas a pie porque no fue necesario anclar variantes en el cuerpo del texto.
