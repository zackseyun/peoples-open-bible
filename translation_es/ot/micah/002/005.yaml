translation:
  language: es
  text: Por tanto, no tendrás a nadie que eche la cuerda de medir[a] por sorteo en la asamblea de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘línea’, ‘cordel’ o ‘línea de reparto’. El término hebreo se refiere al cordel usado para medir y asignar la tierra heredada.
    reason: lexical_alternative
  - marker: b
    text: Es decir, en la comunidad reunida del pacto cuando se reparte la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: HALOT
  rationale: Conserva el valor inferencial/consecutivo del hebreo y mantiene el tono profético de conclusión a partir de la acusación previa.
- source_word: לֹא יִהְיֶה לְךָ
  english_pob_choice: you will have no one
  chosen_spanish: no tendrás quien
  alternatives_spanish:
  - no habrá para ti
  - no tendrás a nadie que
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'no habrá para ti'; en español, 'no tendrás quien' comunica de forma natural la privación de una persona disponible para ejecutar la acción, sin perder el juicio directo en segunda persona.
- source_word: מַשְׁלִיךְ
  english_pob_choice: to cast
  chosen_spanish: eche
  alternatives_spanish:
  - arroje
  - tire
  - lance
  lexicon: HALOT
  rationale: El participio funciona sustantivamente como agente de la acción. 'Eche' conserva la imagen de lanzar o echar el cordel/medida y encaja con la construcción española 'quien eche'.
- source_word: חֶבֶל
  english_pob_choice: the measuring line
  chosen_spanish: la cuerda
  alternatives_spanish:
  - la línea de medir
  - el cordel
  - la cuerda de medir
  lexicon: HALOT
  rationale: En contextos de reparto de heredad, חבל puede referirse al cordel usado para medir la parcela. 'La cuerda' es fiel al objeto físico; la nota preserva la alternativa explicativa de 'línea' o 'cordel' y su función de medición.
- source_word: בְּגוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suerte
  - al echar suertes
  - por lotes
  lexicon: HALOT
  rationale: La idea es la distribución de la tierra mediante suertes. 'Por sorteo' es claro en español y conserva el procedimiento de asignación sin agregar interpretación.
- source_word: בִּקְהַל יְהוָה
  english_pob_choice: in the assembly of Yahweh
  chosen_spanish: en la asamblea de Yahvé
  alternatives_spanish:
  - en la congregación de Yahvé
  - en la comunidad reunida de Yahvé
  lexicon: HALOT
  rationale: קהל denota la comunidad reunida; 'asamblea' mantiene el sentido colectivo y formal. Se usa 'Yahvé' conforme a la norma del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, no una sustitución titular, siguiendo la pauta del proyecto y la decisión auditada del inglés POB.
theological_decisions:
- issue: Sentido de exclusión en el reparto de la tierra
  english_pob_reading: A direct sentence that no one will be available for them to cast the measuring line by lot in the covenant assembly.
  chosen_spanish_reading: Una sentencia directa de que no habrá quien participe en el reparto de la heredad por sorteo para ellos.
  alternative_spanish_readings:
  - Una afirmación general de que nadie les asignará tierra
  - Una referencia específica a un grupo dirigente concreto
  rationale: El verso anuncia privación judicial dentro del marco del reparto de la tierra; la traducción mantiene la segunda persona singular y no precisa más allá de lo que el contexto permite.
  doctrine_reference: Contexto de juicio profético y heredad/covenio en la distribución de la tierra de Israel
translation_notes:
  revision_awareness: La revisión en inglés quedó sin cambios tras dos pases de verificación y consenso alto; la versión española sigue de cerca esa solución auditada, manteniendo la imagen de medición, la distribución por sorteo y el nombre divino Yahvé.
  spanish_consistency_notes:
  - Se preservó el nombre divino como 'Yahvé' de forma consistente con la pauta del proyecto.
  - '''Asamblea'' se emplea para קהל por su registro bíblico y comunitario.'
  - '''Por sorteo'' refleja el reparto por suertes sin introducir terminología eclesiástica ajena al contexto.'
  - La nota lexical de חבל recoge la ambigüedad entre cuerda, cordel y línea de medir.
