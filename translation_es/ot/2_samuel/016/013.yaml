translation:
  language: es
  text: Así David y sus hombres siguieron por el camino[a], mientras Simei iba por la ladera del monte frente a él, iba y maldecía[b], y arrojaba piedras frente a él[c] y arrojaba polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el costado del monte frente a él».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite la idea de movimiento continuo: «iba y maldecía».'
    reason: lexical_alternative
  - marker: c
    text: O «lo apedreaba».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went on
  chosen_spanish: siguieron
  alternatives_spanish:
  - fueron
  - continuaron
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo marca avance continuo. "Siguieron" comunica el movimiento sin sonar mecánico y preserva la continuidad de la acción.
- source_word: וַאֲנָשָׁיו
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - los hombres con él
  lexicon: HALOT
  rationale: La expresión hebrea se refiere a los acompañantes varones de David. "Sus hombres" es natural en español y mantiene la relación posesiva del texto.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - sobre el camino
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser camino, ruta o senda. "Por el camino" comunica el desplazamiento a lo largo de una ruta y suena más idiomático que una calca literal.
- source_word: בְּצֵלַע הָהָר
  english_pob_choice: on the hillside
  chosen_spanish: por la ladera del monte
  alternatives_spanish:
  - sobre la ladera del monte
  - en el costado del monte
  lexicon: HALOT
  rationale: צֵלַע es "lado/flanco"; con "el monte" indica la ladera o costado del relieve. "Por la ladera del monte" conserva la imagen topográfica y el contraste con David abajo en el camino.
- source_word: לְעֻמָּתוֹ
  english_pob_choice: opposite him
  chosen_spanish: en dirección opuesta a él
  alternatives_spanish:
  - frente a él
  - enfrente de él
  lexicon: HALOT
  rationale: La frase se repite para marcar la relación espacial frente a David. "En dirección opuesta a él" preserva esa oposición explícita sin convertirla en una mera ubicación estática.
- source_word: הֹלֵךְ ... הָלוֹךְ
  english_pob_choice: went along ... going along
  chosen_spanish: iba y ... iba
  alternatives_spanish:
  - seguía y ... seguía
  - caminaba y ... caminaba
  lexicon: HALOT
  rationale: El hebreo intensifica la acción con una construcción de movimiento continuo. La repetición "iba y ... iba" procura reflejar ese ritmo insistente sin explicarlo excesivamente.
- source_word: וַיְקַלֵּל
  english_pob_choice: cursing
  chosen_spanish: maldecía
  alternatives_spanish:
  - iba maldiciendo
  - profería maldiciones
  lexicon: HALOT
  rationale: קלל en piel significa maldecir. "Maldecía" mantiene el sentido hostil y la continuidad de la acción en español narrativo.
- source_word: וַיְסַקֵּל בָּאֲבָנִים
  english_pob_choice: throwing stones
  chosen_spanish: arrojaba piedras
  alternatives_spanish:
  - pedreaba
  - apedreaba
  lexicon: HALOT
  rationale: Aunque סקל puede relacionarse con apedrear, aquí el contexto es de hostigamiento a distancia, no de ejecución judicial. "Arrojaba piedras" evita sobreactuar el matiz legal y sigue la lectura del POB inglés.
- source_word: וְעִפַּר בֶּעָפָר
  english_pob_choice: flinging dust
  chosen_spanish: esparcía polvo
  alternatives_spanish:
  - arrojaba polvo
  - levantaba polvo
  lexicon: HALOT
  rationale: El verbo expresa lanzar o esparcir tierra/polvo. "Esparcía polvo" transmite el gesto hostil de forma clara y digna en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que restituyó la segunda ocurrencia de לְעֻמָּתוֹ («opposite him») para no omitirla. En español se conserva esa repetición con dos expresiones equivalentes de oposición espacial, evitando reducirla a un solo «contra él».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Simei» como forma española del nombre propio hebreo, sin introducir equivalencias litúrgicas ajenas al texto.
  - Se evita traducir סקל como «apedrear» en el cuerpo principal para no sugerir ejecución formal.
  - La repetición de movimiento en hebreo se refleja con dos verbos coordinados («iba y ... iba») para conservar el valor aspectual.
