translation:
  language: es
  text: 'Y Yahvé te hará volver a Egipto en barcos[a], por el camino del cual te dije: «Nunca más volverás a verlo». Y allí se ofrecerán en venta a sus enemigos como esclavos varones y esclavas, pero no habrá comprador.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán vendidos allí a sus enemigos como esclavos, varones y mujeres»; el verbo hebreo puede entenderse de modo reflexivo («ofrecerse en venta») o en un sentido más general de entrar en esclavitud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהֱשִׁיבְךָ / הִשִׁיב
  english_pob_choice: will bring you back
  chosen_spanish: te hará volver
  alternatives_spanish:
  - te devolverá
  - te hará regresar
  lexicon: HALOT
  rationale: 'El hiphil de שוב tiene sentido causativo: Yahvé es quien provoca el retorno. «Te hará volver» conserva esa causalidad en español sin sonar mecánico.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Topónimo estándar y directo.
- source_word: בָּאֳנִיּוֹת
  english_pob_choice: in ships
  chosen_spanish: en naves
  alternatives_spanish:
  - en barcos
  - en barcos de mar
  lexicon: HALOT
  rationale: «Naves» comunica con naturalidad el medio de transporte marítimo y mantiene un registro digno; «en» refleja bien la preposición ב.
- source_word: בַּדֶּרֶךְ אֲשֶׁר
  english_pob_choice: by the way of which
  chosen_spanish: por el camino del cual
  alternatives_spanish:
  - por el camino que
  - por la ruta de la cual
  lexicon: HALOT
  rationale: La expresión conserva la relación sintáctica entre «camino» y la cláusula relativa sin forzar una paráfrasis excesiva.
- source_word: לֹא תֹסִיף עוֹד לִרְאֹתָהּ
  english_pob_choice: You shall never see it again
  chosen_spanish: Nunca más volverás a verlo
  alternatives_spanish:
  - No volverás a verlo nunca más
  - No lo verás otra vez
  lexicon: HALOT
  rationale: El hebreo expresa no repetir la acción; «nunca más volverás a verlo» transmite el valor idiomático con naturalidad. Se usa «lo» porque el referente es Egipto/la tierra mencionada.
- source_word: וְהִתְמַכַּרְתֶּם
  english_pob_choice: you will offer yourselves for sale
  chosen_spanish: os ofreceréis en venta
  alternatives_spanish:
  - os pondréis en venta
  - os venderéis
  lexicon: HALOT
  rationale: El hitpael sugiere un acto reflexivo/másivo de ponerse a disposición de compra; «os ofreceréis en venta» evita la idea de una venta ya consumada y sigue la revisión auditada del inglés.
- source_word: לְאֹיְבֶיךָ
  english_pob_choice: to your enemies
  chosen_spanish: a vuestros enemigos
  alternatives_spanish:
  - a tus enemigos
  - para vuestros enemigos
  lexicon: HALOT
  rationale: En contexto plural, el destinatario se entiende como el pueblo; se normaliza al plural español para concordancia.
- source_word: לַעֲבָדִים
  english_pob_choice: as male slaves
  chosen_spanish: como esclavos varones
  alternatives_spanish:
  - como esclavos
  - como siervos varones
  lexicon: HALOT
  rationale: Se mantiene la fuerza léxica de δοῦλος/עבד como «esclavos» y se conserva el contraste de género presente en el hebreo.
- source_word: וְלִשְׁפָחוֹת
  english_pob_choice: and female slaves
  chosen_spanish: y esclavas
  alternatives_spanish:
  - y esclavas mujeres
  - y siervas
  lexicon: HALOT
  rationale: La pareja masculina/femenina se preserva con un equivalente claro y natural en español.
- source_word: וְאֵין קֹנֶה
  english_pob_choice: but there will be no buyer
  chosen_spanish: pero no habrá comprador
  alternatives_spanish:
  - y no habrá quien compre
  - pero no habrá quien los compre
  lexicon: HALOT
  rationale: La expresión idiomática «no habrá comprador» reproduce bien el hebreo «no hay comprador» y mantiene el tono económico del texto.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio de Dios como designación del pacto, siguiendo el criterio del proyecto y la lectura auditada del inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Valor de וְהִתְמַכַּרְתֶּם: reflexivo/mid. frente a pasivo'
  english_pob_reading: you will offer yourselves for sale
  chosen_spanish_reading: os ofreceréis en venta
  alternative_spanish_readings:
  - seréis vendidos
  - os venderéis
  rationale: La forma hebrea admite un matiz reflexivo o medio; «os ofreceréis en venta» preserva esa tensión y evita convertirlo sin más en pasivo, respetando también la revisión inglesa.
  doctrine_reference: 'DOCTRINE.md Translation principles: lexical force and documented tension'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que desplazó «sell yourselves» a «offer yourselves for sale» para reflejar mejor el matiz reflexivo/medio de וְהִתְמַכַּרְתֶּם y evitar sugerir una venta consumada antes de la cláusula «no habrá comprador».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrammaton en todo el texto.
  - «Esclavos» se usa para reflejar la fuerza de עֲבָדִים; no se suaviza a «siervos».
  - Se conserva el paralelismo masculino/femenino con «esclavos varones y esclavas».
  - «Nunca más volverás a verlo» expresa el hebreo idiomático de no volver a ver el lugar/país mencionado.
