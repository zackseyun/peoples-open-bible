id: PHP.3.7
reference: Philippians 3:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀλλὰ ἅτινα ἦν μοι κέρδη, ταῦτα ἥγημαι διὰ τὸν Χριστὸν ζημίαν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/007.yaml
  text: But whatever things were gains to me[b][a], these I have considered loss because of Messiah.
  footnotes:
  - marker: a
    text: Or "because of Christ."
    reason: lexical_alternative
  - marker: b
    text: Or "I have counted."
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 무엇이든지 내게 유익이 되던 것들[a], 그것들을 나는 메시아 때문에 손실로 여깁니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내게 이득이었던 것들」. 헬라어 κέρδη는 회계적·이익적 비유로, 자랑할 만한 자산을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「손해로 셈합니다」. 헬라어 ἥγημαι는 완료형으로, 재평가의 결과가 지금도 지속됨을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  english_pob_choice: But
  chosen_korean: 그러나
  alternatives_korean:
  - 그렇지만
  - 그러함에도
  lexicon: BDAG
  rationale: 앞 절의 자랑할 근거들과 강한 대조를 표지한다. 「그러나」가 가장 간결하다.
- source_word: ἅτινα
  english_pob_choice: whatever things
  chosen_korean: 무엇이든지 ~ 것들
  alternatives_korean:
  - 어떤 것들이든지
  - 모든 것들
  lexicon: BDAG
  rationale: 부정관계대명사로, 단순 지시보다 넓게 옛 자랑거리 일체를 가리킨다. 「무엇이든지」가 그 포괄성을 살린다.
- source_word: κέρδη
  english_pob_choice: gains
  chosen_korean: 유익
  alternatives_korean:
  - 이익
  - 이득
  - 자산
  lexicon: BDAG
  rationale: 복수형이지만 한국어에서는 「유익」으로 자연스럽게 처리된다. 「이익」도 가능하나, 「유익」이 한국 성서 전통에서 정착된 어휘이며 회계 비유를 자연스럽게 담는다.
- source_word: ἥγημαι
  english_pob_choice: I have considered
  chosen_korean: 여깁니다
  alternatives_korean:
  - 셈합니다
  - 간주합니다
  lexicon: BDAG
  rationale: 완료형이 정착된 현재의 평가를 가리킨다. 합쇼체 현재형 「여깁니다」가 그 지속적 결과를 자연스럽게 표현한다.
- source_word: διὰ τὸν Χριστόν
  english_pob_choice: because of Messiah
  chosen_korean: 메시아 때문에
  alternatives_korean:
  - 메시아로 인하여
  - 메시아를 위하여
  lexicon: BDAG
  rationale: διά + 대격은 원인·이유. 「메시아 때문에」가 직접적이며, Χριστόν의 칭호성은 「메시아」로 보존한다.
- source_word: ζημίαν
  english_pob_choice: loss
  chosen_korean: 손실
  alternatives_korean:
  - 손해
  - 해
  lexicon: BDAG
  rationale: 「유익」과의 회계적 대조를 살리기 위해 「손실」을 택한다. 「손해」도 가능하나, 「손실」이 자산 평가의 어감을 더 명확히 담는다.
theological_decisions:
- issue: Χριστόν을 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 문맥의 Χριστός는 바울의 관계적·언약적 틀 안에서 칭호로 기능한다. DOCTRINE.md에 따라 칭호로 살아 있는 Χριστός는 「메시아」로 옮긴다.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
