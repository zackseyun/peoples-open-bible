translation:
  language: es
  text: Ahora envíame madera de cedro, ciprés[a] y algum[b] del Líbano, porque yo sé que tus siervos saben cortar madera del Líbano. Y he aquí, mis siervos estarán con tus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo בְּרוֹשִׁים puede referirse a ciprés, enebro o abeto; la especie exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: «Algum» también puede aparecer como «almug»; algunos lo identifican con sándalo, pero la especie es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁלַח
  english_pob_choice: Now send me
  chosen_spanish: Ahora envíame
  alternatives_spanish:
  - Y envíame
  - Entonces envíame
  lexicon: HALOT
  rationale: El imperativo con ו se entiende aquí como avance discursivo. «Ahora» conserva la progresión natural del pedido sin añadir una conjunción repetida que suene más dura o menos idiomática en español.
- source_word: עֲצֵי אֲרָזִים
  english_pob_choice: cedar ... timber
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - cedro
  - madera de cedro
  lexicon: HALOT
  rationale: La construcción apunta a material para construcción, no a árboles vivos. «Madera de cedro» expresa bien el valor del sustantivo en contexto y evita ambigüedad en español.
- source_word: בְּרוֹשִׁים
  english_pob_choice: cypress
  chosen_spanish: ciprés
  alternatives_spanish:
  - enebro
  - abeto
  lexicon: HALOT
  rationale: Sigo la identificación habitual adoptada por la POB en inglés para בְּרוֹשׁ, manteniendo una especie reconocible en español. La identificación exacta sigue incierta, por eso se preserva la nota alternativa.
- source_word: וְאַלְגּוּמִּים
  english_pob_choice: algum
  chosen_spanish: almug
  alternatives_spanish:
  - algum
  - madera de almug
  lexicon: HALOT
  rationale: Aquí conviene preservar la forma tradicional relacionada con el hebreo y con la nota de incertidumbre textual/botánica. «Almug» evita fingir una identificación botánica segura donde el original no la da.
- source_word: מֵהַלְּבָנוֹן
  english_pob_choice: from Lebanon
  chosen_spanish: desde el Líbano
  alternatives_spanish:
  - del Líbano
  lexicon: HALOT
  rationale: «Desde» refleja mejor el origen/procedencia del envío de madera que un simple genitivo posesivo, y funciona con naturalidad en español.
- source_word: כִּי אֲנִי יָדַעְתִּי
  english_pob_choice: for I know
  chosen_spanish: porque yo sé
  alternatives_spanish:
  - pues yo sé
  - porque yo he sabido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa conocimiento vigente; en español, el presente «yo sé» comunica con naturalidad la certeza del hablante. «Porque» conserva el valor causal.
- source_word: אֲשֶׁר עֲבָדֶיךָ יֹדְעִים
  english_pob_choice: that your servants know how
  chosen_spanish: que tus siervos saben
  alternatives_spanish:
  - que tus siervos saben cómo
  - que tus siervos son expertos
  lexicon: HALOT
  rationale: El hebreo presenta el contenido de la pericia sin un equivalente obligatorio de «how» en español. «Saben» conserva la habilidad implícita sin sobreexplicar.
- source_word: לִכְרוֹת
  english_pob_choice: to cut
  chosen_spanish: cortar
  alternatives_spanish:
  - derribar
  - talar
  lexicon: HALOT
  rationale: «Cortar» es el equivalente directo y claro en español moderno. En este contexto incluye la idea de abatir/extraer madera, sin necesidad de un tecnicismo.
- source_word: עֲצֵי לְבָנוֹן
  english_pob_choice: timber in Lebanon
  chosen_spanish: madera del Líbano
  alternatives_spanish:
  - los árboles del Líbano
  - madera de Líbano
  lexicon: HALOT
  rationale: La imagen se centra en la madera procedente del Líbano. En español, «madera del Líbano» fluye mejor que una construcción más literal que suene forzada.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y he aquí que
  lexicon: HALOT
  rationale: «Mira» transmite el gesto deíctico de llamar la atención. Aunque la POB en inglés usa un registro más formal («behold»), en español «Y mira» es más natural y aún solemne en contexto.
- source_word: עֲבָדַי עִם עֲבָדֶיךָ
  english_pob_choice: my servants will be with your servants
  chosen_spanish: mis siervos estarán con tus siervos
  alternatives_spanish:
  - mis siervos estarán junto a tus siervos
  - mis siervos estarán con los tuyos
  lexicon: HALOT
  rationale: El hebreo omite un verbo explícito; en español se requiere uno. «Estarán» expresa adecuadamente la disposición futura propuesta por Salomón.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más formal que sustituyó «look» por «behold»; en español se mantuvo una solución digna y deíctica («Y mira») sin perder el valor exhortativo del hebreo הנה. También se conservó la cautela léxica sobre las especies de madera y el término אַלְגּוּמִּים.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no lo contiene.
  - Se mantiene «siervos» como equivalente de עֲבָדִים según el contexto de subordinación/servicio en la corte, sin necesidad de «esclavos» aquí.
  - «Madera» se usa para el material de construcción, evitando una traducción botánicamente más literal que desfigure el contexto.
  - Se preserva la incertidumbre botánica en notas para בְּרוֹשִׁים y אַלְגּוּמִּים, conforme al auditable trail inglés.
