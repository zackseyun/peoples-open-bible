  text: כִּ֣י נֶ֣פֶשׁ הַ/בָּשָׂר֮ בַּ/דָּ֣ם הִוא֒ וַ/אֲנִ֞י נְתַתִּ֤י/ו לָ/כֶם֙ עַל הַ/מִּזְבֵּ֔חַ לְ/כַפֵּ֖ר עַל נַפְשֹׁתֵי/כֶ֑ם כִּֽי הַ/דָּ֥ם ה֖וּא בַּ/נֶּ֥פֶשׁ יְכַפֵּֽר־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/017/011.yaml
  text: For the life of the flesh is in the blood[a], and I have given it to you on the altar to make atonement for your lives[b], for it is the blood that makes atonement by the life.
  footnotes:
