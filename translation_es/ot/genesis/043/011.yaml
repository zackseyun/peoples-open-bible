translation:
  language: es
  text: 'Entonces Israel, su padre, les dijo: «Si tiene que ser así, hagan esto: tomen de lo mejor[a] de la tierra en sus recipientes y bájenle al hombre un regalo: un poco de bálsamo y un poco de miel[b], goma aromática y mirra[c], pistachos y almendras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los productos escogidos de la tierra». La expresión hebrea se refiere en general a productos selectos de la tierra, no solo a fruta.'
    reason: lexical_alternative
  - marker: b
    text: «Miel» en algunos contextos puede referirse a un jarabe dulce, no necesariamente a miel de abeja.
    reason: lexical_alternative
  - marker: c
    text: La identificación de los términos hebreos aquí vertidos «goma aromática» y «mirra» es incierta; también se han propuesto diversas resinas aromáticas, como goma tragacanto o ládano.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂרָאֵל אֲבִיהֶם
  english_pob_choice: Israel their father
  chosen_spanish: Israel, su padre
  alternatives_spanish:
  - su padre Israel
  - Israel su padre
  lexicon: HALOT
  rationale: Conservo la apposición hebrea y el uso narrativo de «Israel» para Jacob, con puntuación natural en español.
- source_word: אִם כֵּן אֵפוֹא
  english_pob_choice: If it must be so, then
  chosen_spanish: Si tiene que ser así
  alternatives_spanish:
  - Si es así
  - Si así debe ser
  lexicon: HALOT
  rationale: La expresión transmite una concesión renuente; «tiene que ser» preserva ese matiz mejor que un simple «si es así».
- source_word: זֹאת עֲשׂוּ
  english_pob_choice: do this
  chosen_spanish: hagan esto
  alternatives_spanish:
  - haced esto
  - hagan lo siguiente
  lexicon: HALOT
  rationale: Imperativo directo y claro, sin añadir contenido.
- source_word: מִזִּמְרַת הָאָרֶץ
  english_pob_choice: some of the choice products of the land
  chosen_spanish: de lo mejor de la tierra
  alternatives_spanish:
  - de los productos escogidos de la tierra
  - de la mejor producción de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es amplia y no se limita a fruta; «de lo mejor» conserva la idea de productos selectos sin volverlo demasiado técnico.
- source_word: בִּכְלֵיכֶם
  english_pob_choice: in your containers
  chosen_spanish: en sus recipientes
  alternatives_spanish:
  - en sus vasijas
  - en sus envases
  lexicon: HALOT
  rationale: «Recipientes» es amplio y natural; evita especificar indebidamente el tipo de contenedor.
- source_word: וְהוֹרִידוּ
  english_pob_choice: carry down
  chosen_spanish: llévenle
  alternatives_spanish:
  - bájenle
  - lleven abajo
  lexicon: HALOT
  rationale: En español, el dativo con «llevar» expresa bien el movimiento hacia el destinatario sin sonar forzado.
- source_word: לָאִישׁ
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - al varón
  lexicon: HALOT
  rationale: Mantiene la referencia al funcionario egipcio ya conocido en la narración.
- source_word: מִנְחָה
  english_pob_choice: a gift
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - un regalo
  - un presente
  - un tributo
  lexicon: HALOT
  rationale: En este contexto diplomático, «ofrenda» comunica mejor el gesto respetuoso y formal; no la restringe al ámbito cultual en exceso porque aquí funciona como presente de homenaje.
- source_word: צֳרִי
  english_pob_choice: balm
  chosen_spanish: bálsamo
  alternatives_spanish:
  - resina
  - ungüento
  lexicon: HALOT
  rationale: «Bálsamo» es la equivalencia tradicional y clara para este producto aromático de la tierra.
- source_word: דְּבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - jarabe
  - sirope
  lexicon: HALOT
  rationale: Se mantiene el sentido más probable y natural; la posible referencia a jarabe queda reflejada en nota.
- source_word: נְכֹאת
  english_pob_choice: gum
  chosen_spanish: goma aromática
  alternatives_spanish:
  - goma
  - resina aromática
  - goma tragacanto
  lexicon: HALOT
  rationale: El término es incierto; «goma aromática» conserva el sentido general y el carácter resinoso sin fingir precisión botánica.
- source_word: וָלֹט
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - ládano
  - resina
  lexicon: HALOT
  rationale: La identificación exacta es dudosa, pero «mirra» sigue siendo una equivalencia reconocible y tradicional; se conserva la incertidumbre en nota.
- source_word: בָּטְנִים
  english_pob_choice: pistachio nuts
  chosen_spanish: pistachos
  alternatives_spanish:
  - nueces de pistacho
  - pistachios
  lexicon: HALOT
  rationale: «Pistachos» es natural en español y suficiente en una lista de bienes.
- source_word: שְׁקֵדִים
  english_pob_choice: almonds
  chosen_spanish: almendras
  alternatives_spanish:
  - almendros
  - almendra
  lexicon: HALOT
  rationale: Sentido léxico estándar sin ambigüedad relevante.
theological_decisions:
- issue: Valor de מִנְחָה en un contexto no cultual
  english_pob_reading: a gift
  chosen_spanish_reading: una ofrenda
  alternative_spanish_readings:
  - un regalo
  - un presente
  - un tributo
  rationale: Aunque la palabra puede ser «ofrenda» en sentido cultual, aquí el contexto es un presente diplomático para aplacar/favorecer al funcionario. «Ofrenda» conserva la formalidad del gesto sin imponer una lectura sacrificial.
  doctrine_reference: Uso contextual del léxico, no una cuestión doctrinal directa.
- issue: Referencia de דְּבַשׁ
  english_pob_reading: honey (with note that it may be syrup in some contexts)
  chosen_spanish_reading: miel[b]
  alternative_spanish_readings:
  - jarabe
  - sirope
  rationale: Se mantiene la traducción común «miel» y se preserva la posibilidad semántica alternativa en nota, conforme al audit trail.
  doctrine_reference: No aplica; decisión semántica contextual.
- issue: Identificación incierta de נְכֹאת y לֹט
  english_pob_reading: gum and myrrh, with note that identification is uncertain
  chosen_spanish_reading: goma aromática y mirra[c]
  alternative_spanish_readings:
  - goma
  - resina aromática
  - ládano
  rationale: El español debe mostrar la misma incertidumbre léxica que el hebreo y el audito inglés. «Goma aromática» mantiene amplitud; «mirra» es la forma más conocida para לֹט, con nota sobre alternativas.
  doctrine_reference: No aplica; problema de identificación léxica.
translation_notes:
  revision_awareness: El texto base inglés mantiene una solución de equivalencia óptima sin cambios revisionales; la presente redacción sigue fielmente esa lectura y conserva las notas de ambigüedad léxica donde el hebreo lo exige.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «Israel» para Jacob según el uso narrativo hebreo.
  - Se evita «SEÑOR» o «Cristo», que no corresponden aquí.
  - La puntuación y el orden de miembros siguen el flujo natural del español sin perder la estructura hebrea de la lista.
  - Las notas [a], [b] y [c] están ancladas exactamente en el texto donde corresponde.
