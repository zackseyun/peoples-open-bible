translation:
  language: es
  text: 'Entonces David dijo a Gad: «Estoy en gran angustia. Por favor, déjame caer en la mano de Yahvé, porque sus misericordias son muy grandes; pero no me dejes caer en la mano del hombre[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en manos humanas». El hebreo tiene el singular «la mano del hombre», en contraste con la mano de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַר לִי מְאֹד
  english_pob_choice: I am in great distress
  chosen_spanish: Estoy en gran angustia
  alternatives_spanish:
  - Estoy en gran aflicción
  - Me encuentro en una gran angustia
  lexicon: HALOT
  rationale: La expresión hebrea comunica opresión severa o estrechez de circunstancias. «Gran angustia» conserva bien la fuerza idiomática en español y suena natural y digna.
- source_word: אֶפְּלָה נָּא
  english_pob_choice: Please let me fall
  chosen_spanish: déjame caer
  alternatives_spanish:
  - permíteme caer
  - te ruego que me dejes caer
  lexicon: HALOT
  rationale: El cohortativo con נָּא expresa una petición urgente y cortés. «Déjame caer» mantiene la súplica directa; el «por favor» conserva el valor de la partícula de cortesía.
- source_word: בְיַד יְהוָה
  english_pob_choice: into the hand of Yahweh
  chosen_spanish: en la mano de Yahvé
  alternatives_spanish:
  - en la mano de Yahvé
  - en la mano de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «mano» como poder o capacidad de obrar/juzgar. Siguiendo el criterio del proyecto, el nombre divino se rinde como «Yahvé».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'El Tetragrámaton se traduce con la forma española establecida por el proyecto: «Yahvé», en lugar de ocultarlo con una sustitución reverencial.'
- source_word: כִּי רַבִּים רַחֲמָיו מְאֹד
  english_pob_choice: for his mercies are very great
  chosen_spanish: porque sus misericordias son muy grandes
  alternatives_spanish:
  - porque su compasión es muy grande
  - porque sus misericordias son sumamente grandes
  lexicon: HALOT
  rationale: El plural רַחֲמִים se refleja mejor con «misericordias». «Muy grandes» conserva la intensificación de רַבִּים מְאֹד sin sobreexplicar.
- source_word: וּבְיַד אָדָם
  english_pob_choice: into the hand of man
  chosen_spanish: en la mano del hombre
  alternatives_spanish:
  - en manos humanas
  - en la mano humana
  lexicon: HALOT
  rationale: Se mantiene el contraste paralelo con «la mano de Yahvé». «El hombre» respeta el singular hebreo אָדָם y evita diluir la oposición entre juicio divino y humano.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - humanidad
  lexicon: HALOT
  rationale: Aquí אָדָם designa a un agente humano en contraste con Yahvé; «hombre» preserva el singular representativo y el paralelismo retórico.
- source_word: אַל אֶפֹּל
  english_pob_choice: do not let me fall
  chosen_spanish: no me dejes caer
  alternatives_spanish:
  - que no caiga
  - no permitas que caiga
  lexicon: HALOT
  rationale: La negación con verbo de primera persona funciona como ruego de evitar una acción futura. En español, «no me dejes caer» reproduce con naturalidad la petición negativa.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se conserva el nombre pactual en español como «Yahvé», en vez de enmascararlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Contrast between divine and human agency in בְיַד יְהוָה / בְיַד אָדָם
  english_pob_reading: into the hand of Yahweh ... into the hand of man
  chosen_spanish_reading: en la mano de Yahvé ... en la mano del hombre
  alternative_spanish_readings:
  - en manos humanas
  - en la mano humana
  rationale: La construcción conserva el paralelismo y la tensión teológica entre el juicio/poder de Yahvé y el poder limitado de los humanos. El singular de אָדָם se mantiene para no perder el contraste documental.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם → hombre / ser humano (context)'
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando la nota al texto mediante [a] en «del hombre[a]». No se hicieron otros cambios textuales respecto del sentido auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, conforme al estándar del proyecto.
  - «Misericordias» preserva el plural hebreo רַחֲמָיו sin convertirlo en un singular abstracto.
  - Se conserva el paralelismo «la mano de Yahvé / la mano del hombre» para reflejar la oposición del hebreo.
  - La cita suena natural en español moderno, pero sin suavizar la súplica ni la tensión del original.
