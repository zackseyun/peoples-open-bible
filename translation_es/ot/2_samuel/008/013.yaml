revisions:
- from: 'Y David hizo un nombre para sí cuando volvió de derrotar a Aram en el Valle de la Sal[a]: dieciocho mil hombres.'
  to: Y David se ganó renombre cuando volvió después de abatir a dieciocho mil hombres de Aram en el Valle de la Sal[a].
  rationale: Se reemplaza el calco «hizo un nombre para sí» por «se ganó renombre», que comunica fielmente el modismo hebreo en español natural. También se reordena la cláusula final para evitar los dos puntos y para que la cifra quede integrada en la acción bélica. Se mantiene «Aram» en el texto principal y la variante «Edom» en nota, conforme a la evidencia y al criterio de la POB inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:27:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y mantiene correctamente «Aram» en el texto principal con la variante «Edom» en nota. También conserva el valor temporal de בְּשֻׁבוֹ y el topónimo «Valle de la Sal». Sin embargo, «hizo un nombre para sí» no suena natural en español y debilita la fuerza idiomática de עשה שם; además, la puntuación con dos puntos antes de «dieciocho mil hombres» no refleja bien la sintaxis del original, donde la cifra modifica la acción de derrotar/matar.
  spanish_quality_summary: El texto es mayormente claro, pero presenta un hebraísmo poco idiomático («hizo un nombre para sí») y una puntuación torpe. En español bíblico natural y digno, «se ganó renombre» comunica mejor el sentido sin sobreparafrasear. También conviene integrar «dieciocho mil hombres» sin dos puntos.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. «Aram» se preserva correctamente frente a «Siria». La nota textual está bien orientada. El cambio principal es estilístico-lexical: sustituir el calco poco natural del modismo hebreo por una expresión española fiel a su sentido.'
  issues:
  - severity: medium
    issue: «hizo un nombre para sí» es un calco poco natural del modismo עשה שם
    rationale: Aunque reproduce la imagen hebrea, en español moderno suena forzado. «Se ganó renombre» o «se hizo famoso» expresan mejor el sentido de adquirir fama. «Se ganó renombre» mantiene dignidad y cercanía semántica.
  - severity: medium
    issue: La puntuación con dos puntos antes de «dieciocho mil hombres» distorsiona la relación sintáctica
    rationale: En el original, «dieciocho mil» se relaciona con la acción de herir/derrotar en el Valle de la Sal, no como aposición separada por dos puntos. Debe integrarse en la oración principal.
  - severity: low
    issue: «derrotar» es aceptable, pero conviene coordinarlo mejor con la cifra de bajas
    rationale: Dado que se añade «dieciocho mil hombres», la formulación «de derrotar a Aram… dieciocho mil hombres» queda algo abrupta. «Después de derrotar a Aram… a dieciocho mil hombres» no funciona; mejor reestructurar con «después de matar/derribar» o mantener una solución fluida. Para no sobreespecificar, se puede usar «después de derrotar a Aram en el Valle de la Sal, dieciocho mil hombres» solo si la sintaxis es natural, pero no lo es. La opción más clara en español es «después de matar a dieciocho mil hombres de Aram…», aunque añade «de Aram». Para evitar esa adición, es preferible «cuando volvió de derrotar a Aram en el Valle de la Sal, a dieciocho mil hombres» tampoco es idiomático. Por eso conviene una leve reformulación con «después de abatir».
  revised_spanish_text: Y David se ganó renombre cuando volvió después de abatir a dieciocho mil hombres de Aram en el Valle de la Sal[a].
  revised_footnotes:
  - marker: a
    text: Algunos testigos y el paralelo de 1 Crónicas 18:12 apuntan a «Edom» en lugar de «Aram».
    reason: textual_variant
  revision_rationale: Se reemplaza el calco «hizo un nombre para sí» por «se ganó renombre», que comunica fielmente el modismo hebreo en español natural. También se reordena la cláusula final para evitar los dos puntos y para que la cifra quede integrada en la acción bélica. Se mantiene «Aram» en el texto principal y la variante «Edom» en nota, conforme a la evidencia y al criterio de la POB inglesa.
