revisions:
- from: Un solo juicio[a] habrá para ustedes; como para el forastero, así para el nativo, porque yo soy Yahvé, su Dios.
  to: Un solo juicio[a] habrá para ustedes; como para el residente extranjero, así para el nativo, porque yo soy Yahvé, el Dios de ustedes.
  rationale: 'Se hicieron dos reparaciones menores pero importantes: (1) «forastero» se cambió por «residente extranjero» para reflejar mejor el valor de גֵּר en un contexto legal de residencia dentro de la comunidad; (2) «su Dios» se cambió por «el Dios de ustedes» para evitar ambigüedad pronominal en español neutral latinoamericano. Se mantuvo «juicio» con la nota alternativa a «ley», en línea con la especificidad de מִשְׁפָּט frente a תּוֹרָה.'
