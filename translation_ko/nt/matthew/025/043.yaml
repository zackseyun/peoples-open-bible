source:
  edition: SBLGNT
  text: ξένος ἤμην καὶ οὐ συνηγάγετέ με, γυμνὸς καὶ οὐ περιεβάλετέ με, ἀσθενὴς καὶ ἐν φυλακῇ καὶ οὐκ ἐπεσκέψασθέ με.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/025/043.yaml
  text: I was a stranger and you did not welcome me[a], naked and you did not clothe me[b], sick and in prison and you did not visit me.
  footnotes:
  - marker: a
    text: Or 'take me in' / 'receive me'; the Greek verb literally means 'gather' but here refers to welcoming a stranger with hospitality.
    reason: lexical_alternative
  - marker: b
    text: '''Visit me'' can also carry the sense ''care for me'' or ''look after me,'' not merely pay a social call.'
    reason: lexical_alternative
translation:
  language: ko
  text: ʻ내가 나그네 되었을 때에 너희가 나를 영접하지 않았고, 헐벗었을 때에 너희가 나를 입히지 않았으며, 병들었을 때와 옥에 갇혔을 때에 너희가 나를 돌보지 않았다.ʼ
  philosophy: optimal-equivalence
