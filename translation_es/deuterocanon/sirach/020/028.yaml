translation:
  language: es
  text: El que trabaja la tierra levantará su montón de grano[a], y el que agrada a los grandes hará expiación por la injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cubrirá la injusticia'. El griego dice 'hará expiación por la injusticia', lo cual quizá describa el efecto práctico de ganarse el favor de personas influyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐργαζόμενος
  english_pob_choice: the one who works
  chosen_spanish: el que trabaja
  alternatives_spanish:
  - el que labra
  - el trabajador
  lexicon: BDAG
  rationale: El participio sustantivado se vierte naturalmente con una construcción relativa en español. 'El que trabaja' conserva el valor genérico y evita un calco pesado.
- source_word: γῆν
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el campo
  - la tierra cultivable
  lexicon: LSJ
  rationale: En un proverbio agrícola, γῆ puede referirse a tierra/terreno de cultivo. 'La tierra' mantiene amplitud y suena natural en español.
- source_word: ἀνυψώσει
  english_pob_choice: will raise up
  chosen_spanish: levantará
  alternatives_spanish:
  - alzará
  - elevará
  lexicon: BDAG
  rationale: '''Levantará'' preserva la imagen de elevación sin sonar forzado. En este contexto, puede aludir al montículo o montón producido por la cosecha.'
- source_word: θιμωνιὰν
  english_pob_choice: grain heap
  chosen_spanish: su montón de grano
  alternatives_spanish:
  - su montón de grano cosechado
  - su gavilla
  lexicon: LSJ
  rationale: El sustantivo designa un montón de grano o gavillas. 'Montón de grano' es claro para lectores modernos y conserva la imagen agrícola.
- source_word: ἀρέσκων
  english_pob_choice: pleases
  chosen_spanish: agrada
  alternatives_spanish:
  - complace
  - busca agradar
  lexicon: BDAG
  rationale: El participio significa simplemente 'agradar/placer'. 'Agrada' evita añadir una intención negativa que el griego no expresa por sí solo.
- source_word: μεγιστᾶσιν
  english_pob_choice: great men
  chosen_spanish: a los grandes
  alternatives_spanish:
  - a los magnates
  - a los poderosos
  lexicon: LSJ
  rationale: El dativo plural se refiere a personas de alto rango o influencia. 'A los grandes' reproduce el sentido social sin especificar más de lo que el texto dice.
- source_word: ἐξιλάσεται
  english_pob_choice: will atone for
  chosen_spanish: atonará por
  alternatives_spanish:
  - expiará por
  - hará expiación por
  lexicon: BDAG
  rationale: El verbo pertenece al campo de expiación/propiciación. 'Atonar por' conserva esa fuerza cultual y moral, y sigue de cerca la revisión final del inglés POB.
- source_word: ἀδικίαν
  english_pob_choice: injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - el agravio
  - el mal
  lexicon: BDAG
  rationale: '''Injusticia'' expresa bien el valor moral-social de ἀδικία y armoniza con el lenguaje de atonación del verso.'
theological_decisions:
- issue: 'Fuerza de ἐξιλάσεται: si debe suavizarse a un mero efecto social o conservar lenguaje de expiación'
  english_pob_reading: 'Retain the atonement language in the main text: ''will atone for injustice.'''
  chosen_spanish_reading: 'Conservar el lenguaje de expiación: ''atonará por la injusticia''.'
  alternative_spanish_readings:
  - cubrirá la injusticia
  - apaciguará la injusticia
  rationale: El griego usa un verbo de expiación/propiciación. Aunque el proverbio puede describir un resultado práctico o irónico del favor de los poderosos, la traducción debe preservar esa tensión en vez de reducirla a mera sociología.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y lexical sin resolverla prematuramente.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que simplificó 'will make atonement for injustice' a 'will atone for injustice'. Por eso el español usa 'atonará por la injusticia', manteniendo naturalidad sin perder el matiz expiatorio.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general, aunque este versículo no lo contiene.
  - Se usa 'la injusticia' para ἀδικίαν, en línea con el registro moral-social del proverbio.
  - Se evita 'SEÑOR' o lenguaje eclesiástico no presente en el original.
  - La nota al pie conserva la alternativa semántica que el inglés POB documenta para ἐξιλάσεται.
