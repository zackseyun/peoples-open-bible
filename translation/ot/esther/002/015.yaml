id: EST.2.15
reference: Esther 2:15
source:
  edition: WLC
  text: וּ/בְ/הַגִּ֣יעַ תֹּר אֶסְתֵּ֣ר בַּת אֲבִיחַ֣יִל דֹּ֣ד מָרְדֳּכַ֡י אֲשֶׁר֩ לָקַֽח ל֨/וֹ לְ/בַ֜ת לָ/ב֣וֹא אֶל הַ/מֶּ֗לֶךְ לֹ֤א בִקְשָׁה֙ דָּבָ֔ר כִּ֠י אִ֣ם אֶת אֲשֶׁ֥ר יֹאמַ֛ר הֵגַ֥י סְרִיס הַ/מֶּ֖לֶךְ שֹׁמֵ֣ר הַ/נָּשִׁ֑ים וַ/תְּהִ֤י אֶסְתֵּר֙ נֹשֵׂ֣את חֵ֔ן בְּ/עֵינֵ֖י כָּל רֹאֶֽי/הָ־־־־־־־׃
translation:
  text: When Esther’s turn came—the daughter of Abihail[a], the uncle of Mordecai, who had taken her as his own daughter—to go in to the king, she asked for nothing except what Hegai, the king’s eunuch, keeper of the women, advised[b]. And Esther was gaining favor in the eyes of all who saw her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had adopted her as a daughter.' The Hebrew idiom means Mordecai had taken Esther into filial care.
    reason: lexical_alternative
  - marker: b
    text: '''Eunuch'' can in some contexts be rendered more broadly as ''court official,'' but the harem setting here favors the more specific sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַגִּיעַ
  chosen: When ... came
  alternatives:
  - And when ... arrived
  - Now when ... came
  lexicon: HALOT
  rationale: The preposition + infinitive construct introduces a temporal clause. 'When ... came' is natural English and preserves the sequence without over-literal awkwardness.
- source_word: תֹּר
  chosen: turn
  alternatives:
  - appointed turn
  - time
  lexicon: HALOT
  rationale: In this courtly context the noun refers to Esther's allotted turn in the sequence of women presented to the king. 'Turn' is the most idiomatic and contextually precise rendering.
- source_word: דֹּד
  chosen: uncle
  alternatives:
  - beloved one
  - kinsman
  lexicon: HALOT
  rationale: Though the Hebrew term can denote a broader male relative, in context it identifies Abihail as Mordecai's uncle, matching the family relation already established in Esther 2:7.
- source_word: לָקַח לוֹ לְבַת
  chosen: had taken her as his own daughter
  alternatives:
  - had adopted her as a daughter
  - had taken her for a daughter
  lexicon: HALOT
  rationale: The idiom indicates that Mordecai had received Esther into filial care. 'As his own daughter' communicates the adoptive/foster relationship clearly in modern English without implying a formal legal process beyond the text.
- source_word: לָבוֹא אֶל־הַמֶּלֶךְ
  chosen: to go in to the king
  alternatives:
  - to come to the king
  - to enter before the king
  lexicon: HALOT
  rationale: '''Go in to the king'' preserves the courtly idiom and the movement into the king''s presence. It also leaves intact the narrative''s understated sexual/marital context without making it more explicit than the Hebrew does here.'
- source_word: לֹא בִקְשָׁה דָּבָר
  chosen: she asked for nothing
  alternatives:
  - she requested nothing
  - she sought nothing
  lexicon: HALOT
  rationale: This straightforwardly conveys that Esther did not request additional adornments or items. 'Asked for' is idiomatic and readable.
- source_word: כִּי אִם אֵת אֲשֶׁר יֹאמַר
  chosen: except what ... said
  alternatives:
  - except what ... advised
  - but only what ... said
  lexicon: HALOT
  rationale: 'The construction marks an exception: she requested only what Hegai specified. ''Except what ... said'' is concise and faithful; the implied object is supplied by context.'
- source_word: סְרִיס
  chosen: eunuch
  alternatives:
  - official
  - court officer
  lexicon: HALOT
  rationale: The term commonly denotes a eunuch in royal service. Since that is the plain lexical sense and fits the harem context, 'eunuch' is preferred over the broader 'official.'
- source_word: שֹׁמֵר הַנָּשִׁים
  chosen: keeper of the women
  alternatives:
  - guardian of the women
  - custodian of the women
  lexicon: HALOT
  rationale: This participial phrase describes Hegai's role over the women in the royal quarters. 'Keeper' is a clear, conventional rendering in this context.
- source_word: וַתְּהִי ... נֹשֵׂאת חֵן
  chosen: Esther was finding favor
  alternatives:
  - Esther won favor
  - Esther was gaining favor
  lexicon: HALOT
  rationale: The construction literally portrays Esther as 'bearing/carrying favor,' an idiom meaning to enjoy or obtain favor. 'Was finding favor' preserves the ongoing narrative feel and familiar biblical idiom.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - with
  lexicon: HALOT
  rationale: This Hebrew idiom is common and understandable in English. Retaining it preserves the source texture while remaining readable.
- source_word: כָּל רֹאֶיהָ
  chosen: all who saw her
  alternatives:
  - everyone who saw her
  - all her observers
  lexicon: HALOT
  rationale: The participial expression refers to all those seeing Esther. 'All who saw her' is natural and sufficiently formal for the narrative.
