    issue: «príncipe» para נְשִׂיא
    rationale: El expediente inglés eligió «leader» precisamente para evitar la connotación regia de «prince». En español, «príncipe» sugiere con fuerza un miembro de la realeza, lo que distorsiona el cargo de jefe/clan principal.
  - severity: low
    issue: «fue derribado» suena menos idiomático en este contexto
    rationale: Aunque conserva la repetición, «derribado» en español puede evocar una caída o tumbo físico más que la muerte violenta del relato. «Fue muerto» preserva mejor el sentido sin perder la repetición hebrea.
