  - severity: low
    issue: Ligera aspereza elíptica en «contra ella por sorteo»
    rationale: La aspereza es en buena medida intencional y fiel a la concisión hebrea, por lo que no requiere expansión. La nota al pie ya ayuda a aclarar la elipsis.
