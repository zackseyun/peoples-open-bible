translation:
  language: es
  text: Y si un residente extranjero[a] habita con ustedes y celebra la Pascua[b] para Yahvé, la celebrará conforme al estatuto de la Pascua y conforme a su ordenanza; así lo hará. Habrá un solo estatuto para ustedes, para el residente extranjero y para el nativo de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un extranjero habita con ustedes' o 'un forastero vive entre ustedes'. El hebreo ger se refiere a un extranjero residente que vive entre Israel, no simplemente a un viajero.
    reason: lexical_alternative
  - marker: b
    text: O 'guarda la Pascua'. El hebreo dice literalmente 'hace la Pascua', un giro idiomático que significa observar o celebrar la Pascua.
    reason: lexical_alternative
  - marker: c
    text: O 'el nativo de la tierra' puede entenderse como 'el nacido en la tierra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Ahora si
  lexicon: HALOT
  rationale: La construcción introduce un caso condicional unido al contexto previo. 'Y si' conserva la conexión discursiva del hebreo y suena natural en español.
- source_word: יָגוּר ... גֵּר
  english_pob_choice: a sojourner is staying with you
  chosen_spanish: un extranjero habita con ustedes
  alternatives_spanish:
  - un forastero reside con ustedes
  - un extranjero residente vive entre ustedes
  lexicon: HALOT
  rationale: גֵּר designa a un extranjero residente, no a un visitante pasajero. 'Habita con ustedes' comunica la permanencia del caso legal; 'extranjero' mantiene la diferencia respecto al nativo, aunque el término bíblico tiene un matiz técnico de residente foráneo.
- source_word: וְעָשָׂה פֶסַח
  english_pob_choice: would keep the Passover
  chosen_spanish: celebra la Pascua
  alternatives_spanish:
  - hace la Pascua
  - guarda la Pascua
  - celebra el rito de la Pascua
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático para observar la Pascua. 'Celebra la Pascua' es una forma natural en español y mantiene el sentido ritual sin calco excesivo. Se evitó 'hace la Pascua' por sonar poco idiomático.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - en honor de Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino 'Yahvé' según el criterio del proyecto. 'Para' reproduce bien la orientación/dedicación del rito hacia Yahvé.
- source_word: כְּחֻקַּת הַפֶּסַח
  english_pob_choice: according to the statute of the Passover
  chosen_spanish: conforme al estatuto de la Pascua
  alternatives_spanish:
  - según el estatuto de la Pascua
  - de acuerdo con la norma de la Pascua
  lexicon: HALOT
  rationale: '''Estatuto'' conserva el sentido legal-ritual de חֻקָּה. ''Conforme a'' traduce bien la relación normativa establecida por el hebreo.'
- source_word: וּכְמִשְׁפָּטוֹ
  english_pob_choice: and according to its ordinance
  chosen_spanish: conforme a su ordenanza
  alternatives_spanish:
  - según su ordenanza
  - de acuerdo con su regla
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí se refiere al procedimiento o regla debida del rito. 'Ordenanza' diferencia este término de 'estatuto' y mantiene el registro legal-cultual.
- source_word: כֵּן יַעֲשֶׂה
  english_pob_choice: so he shall do it
  chosen_spanish: así la celebrará
  alternatives_spanish:
  - así lo hará
  - de ese modo la hará
  lexicon: HALOT
  rationale: El hebreo enfatiza la conformidad exacta. 'Así la celebrará' evita la repetición pesada y conserva la referencia a la Pascua implícita en el contexto.
- source_word: חֻקָּה אַחַת יִהְיֶה
  english_pob_choice: One statute shall be
  chosen_spanish: Una sola estatuto habrá
  alternatives_spanish:
  - Un solo estatuto habrá
  - Habrá un solo estatuto
  - Una sola norma habrá
  lexicon: HALOT
  rationale: La formulación expresa unidad normativa para todos los grupos mencionados. Se eligió 'estatuto' por coherencia con el versículo y por su valor jurídico-ritual.
- source_word: לָכֶם וְלַגֵּר
  english_pob_choice: for you, for the sojourner
  chosen_spanish: para ustedes, para el extranjero
  alternatives_spanish:
  - para ustedes y para el extranjero
  - para ustedes y para el forastero
  lexicon: HALOT
  rationale: La repetición de la preposición se conserva para resaltar la aplicación igual de la ley. 'Ustedes' evita una segunda persona singular arcaica y encaja con el plural del hebreo.
- source_word: וּלְאֶזְרַח הָאָרֶץ
  english_pob_choice: and for the native of the land
  chosen_spanish: y para el nativo de la tierra
  alternatives_spanish:
  - y para el natural de la tierra
  - y para el nativo de la tierra
  lexicon: HALOT
  rationale: אֶזְרַח contrasta con גֵּר como el nacido en la tierra. 'Nativo de la tierra' mantiene ese contraste sin introducir categorías modernas ajenas al texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo trae el Tetragrámaton directamente. Se usa 'Yahvé' por la convención del proyecto y para preservar el nombre del pacto, en vez de ocultarlo con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH / יהוה → Yahvé'
- issue: Igualdad legal de la ordenanza para Israelita, extranjero y nativo
  english_pob_reading: One statute shall be for you, for the sojourner, and for the native of the land.
  chosen_spanish_reading: Una sola estatuto habrá para ustedes, para el extranjero y para el nativo de la tierra.
  alternative_spanish_readings:
  - Un solo estatuto habrá para ustedes, para el extranjero y para el nativo de la tierra.
  - Habrá una sola norma para ustedes, para el extranjero y para el nativo de la tierra.
  rationale: El texto afirma explícitamente una sola regla aplicable a todos los grupos mencionados. La traducción conserva esa igualdad normativa en el contexto inmediato de la Pascua sin ampliar la conclusión más allá del versículo.
  doctrine_reference: Principio de unidad normativa en la legislación del Pentateuco, conforme al sentido inmediato de Nm 9:14
translation_notes:
  revision_awareness: Se revisó la redacción para evitar un calco poco idiomático en español ('hace la Pascua') y para mantener la distinción legal entre חֻקָּה y מִשְׁפָּט. La formulación final sigue de cerca el hebreo y la auditoría inglesa, con ajuste de estilo al español bíblico contemporáneo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה de manera consistente con el proyecto.
  - Se traduce גֵּר con 'extranjero' en el texto principal, pero la nota reconoce que el término bíblico es un extranjero residente.
  - Se conserva la distinción jurídica entre 'estatuto' y 'ordenanza'.
  - Se emplea 'Pascua' para פֶסַח por ser el término estándar y claro en español.
  - La segunda persona plural 'ustedes' refleja correctamente el plural hebreo.
