translation:
  language: es
  text: ¿Por qué te jactas de la maldad[a], hombre poderoso? El amor fiel de Dios permanece todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «¿Por qué te jactas en la maldad, hombre poderoso? El amor fiel de Dios está todo el día», entendiendo el segundo colon de manera elíptica. Algunos toman la línea de otro modo, vinculándola más directamente con la maldad descrita en el primer colon.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: HALOT
  rationale: En esta construcción interrogativa con el verbo siguiente, el valor es causal/adverbial; en español, «¿Por qué?» expresa con naturalidad la reprensión.
- source_word: תִּתְהַלֵּל
  english_pob_choice: do you boast
  chosen_spanish: te jactas
  alternatives_spanish:
  - te glorías
  - te alabas a ti mismo
  lexicon: HALOT
  rationale: El hitpael de הלל aquí tiene sentido reflexivo de presumir/jactarse; «te jactas» comunica bien la ironía y la reprensión sin forzar un registro arcaico.
- source_word: בְּרָעָה
  english_pob_choice: of evil
  chosen_spanish: de la maldad
  alternatives_spanish:
  - en la maldad
  - de la iniquidad
  - en el mal
  lexicon: HALOT
  rationale: La preposición ב puede expresarse como relación de esfera o base del jactarse. Dado el auditable cambio inglés hacia «of evil», «de la maldad» suena natural en español y conserva la referencia a la maldad como objeto/ámbito de la jactancia.
- source_word: הַגִּבּוֹר
  english_pob_choice: mighty man
  chosen_spanish: hombre poderoso
  alternatives_spanish:
  - valiente
  - guerrero
  - hombre fuerte
  lexicon: HALOT
  rationale: גִּבּוֹר designa a un varón fuerte o poderoso. «Hombre poderoso» mantiene el tono irónico y la dirección masculina singular del reproche.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: fidelidad amorosa
  alternatives_spanish:
  - amor constante
  - amor leal
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד tiene peso de lealtad amorosa/covenantal. «Fidelidad amorosa» conserva la combinación de amor y lealtad sin perder la densidad teológica; «misericordia» sería demasiado estrecho.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - el Fuerte
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título/divino. «Dios» es la equivalencia natural y clara en español.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día largo
  - constantemente
  - todo el tiempo
  lexicon: HALOT
  rationale: El modismo expresa duración continua durante el día; «todo el día» preserva la fuerza temporal de manera idiomática en español.
theological_decisions:
- issue: Relación sintáctica del segundo colon
  english_pob_reading: 'The second colon is rendered as an independent assertion: ''The steadfast love of God endures all day long.'''
  chosen_spanish_reading: 'El segundo colon se traduce como una afirmación independiente: «La fidelidad amorosa de Dios dura todo el día».'
  alternative_spanish_readings:
  - «La fidelidad amorosa de Dios está todo el día»
  - «Contra la fidelidad amorosa de Dios, todo el día»
  - «La fidelidad amorosa de Dios es todo el día»
  rationale: 'El hebreo no explicita verbo en el segundo colon, pero en contexto la cláusula nominal puede leerse como afirmación contrastiva independiente. Esta opción refleja mejor el movimiento del salmo: la jactancia humana frente a la constancia de la חֶסֶד divina, sin añadir contenido ajeno.'
  doctrine_reference: Preservar la tensión interpretativa y la prioridad del original sobre una armonización automática.
translation_notes:
  revision_awareness: El inglés POB revisó 'boast in evil' a 'boast of evil' por naturalidad; el español sigue esa decisión con «de la maldad», manteniendo la tensión del hebreo y la lectura principal del segundo colon como afirmación independiente.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל conforme al criterio POB en este contexto.
  - Se evita «SEÑOR» para no ocultar el nombre/título divino del hebreo.
  - «Fidelidad amorosa» conserva el alcance de חֶסֶד sin reducirlo a un solo matiz.
  - La nota a preserva la alternativa interpretativa que el inglés POB documenta para el colon final.
