review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva correctamente la estructura y el sentido del hebreo: tres nombres propios seguidos por la cláusula resumitiva ''Estos fueron los hijos de Ismael''. Sin embargo, las formas de los nombres se apartan innecesariamente del rastro léxico auditado y de formas bíblicas más reconocibles, especialmente ''Nafis'' por נָפִישׁ, que pierde la consonante final representada en la transliteración auditada.'
  spanish_quality_summary: La frase española es clara y natural. No obstante, para legibilidad e intercomprensión bíblica conviene usar formas más estables en español para los nombres transliterados, evitando una castellanización ad hoc que puede sonar menos reconocible o menos precisa. La sintaxis 'Estos fueron los hijos de Ismael' es buena.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. El punto principal es la transliteración de nombres propios: el borrador se distancia de las decisiones documentadas en inglés sin una necesidad clara del español. ''Jetur'' y ''Nafis/Nafis(h)'' requieren ajuste; ''Qedemá'' como alternativa en nota puede mantenerse, pero la forma principal debe alinearse mejor con ''Kedemah''.'
  issues:
  - severity: medium
    issue: '''Yetur'' para יְטוּר'
    rationale: Aunque es una transliteración posible, el expediente auditado eligió 'Jetur' y no hay razón fuerte de español para cambiarla; 'Jetur' además es una forma más reconocible en tradición bíblica.
  - severity: high
    issue: '''Nafis'' para נָפִישׁ'
    rationale: La forma omite la representación de la consonante final y se aleja más del nombre fuente y de la decisión auditada 'Naphish'. En español, 'Nafis' puede parecer una adaptación excesiva más que una transliteración fiel.
  - severity: medium
    issue: '''Kedemá'' como forma principal'
    rationale: La forma con acento final es comprensible, pero introduce una adaptación no necesaria. Una forma como 'Kedema' preserva mejor el nombre sin imponer una prosodia marcada; la alternativa 'Qedemah' puede mantenerse en nota como en el audit trail.
  revised_spanish_text: Jetur, Nafis[a] y Kedema. Estos fueron los hijos de Ismael.
  revised_footnotes:
  - marker: a
    text: Nafis también puede transliterarse Nafish; Kedema también puede transliterarse Qedemah.
    reason: lexical_alternative
  revision_rationale: Se corrigen las transliteraciones para acercarlas más al texto fuente y al audit trail, manteniendo a la vez un español claro y eclesialmente reconocible. 'Jetur' se restituye por alineación con la decisión auditada; 'Kedema' evita una acentuación innecesaria; y se añade una nota para preservar alternativas significativas de transliteración. No se altera la sintaxis de la cláusula resumitiva, que ya era natural y fiel.
