translation:
  language: es
  text: Así saciaré mi ira contra ti[a], y mis celos se apartarán de ti[b]; entonces estaré tranquilo y no me enojaré más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'haré descansar mi ira en ti'. 'Saciaré mi ira contra ti' expresa la idea de que esa ira queda gastada o llega a su término.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''mi celo se apartará de ti''. El hebreo קִנְאָה puede significar ''celos'' o ''celo''; en este contexto de infidelidad conyugal, ''celos'' encaja mejor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲנִחֹתִי
  english_pob_choice: I will satisfy
  chosen_spanish: saciaré
  alternatives_spanish:
  - haré descansar
  - apaciguaré
  - haré reposar
  lexicon: HALOT
  rationale: El Hiphil de נוח con חֲמָתִי como objeto expresa que la ira llega a estar en reposo o gastada. En español, 'saciaré' comunica bien la idea de una ira plenamente colmada o agotada, con naturalidad y sin perder el matiz de cesación.
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi indignación
  lexicon: HALOT
  rationale: חֵמָה designa ira ardiente o furor. 'Ira' conserva el peso judicial y de pacto del contexto sin volver la frase demasiado coloquial.
- source_word: בָּךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en ti
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente 'en/contra ti', el español exige una dirección hostil clara. 'Contra ti' expresa mejor la hostilidad de la ira en este contexto.
- source_word: וְסָרָה
  english_pob_choice: will turn away
  chosen_spanish: se apartará
  alternatives_spanish:
  - se retirará
  - se irá
  - será removido
  lexicon: HALOT
  rationale: De סור, el verbo indica apartarse o retirarse. 'Se apartará' preserva la imagen de una emoción que deja de dirigirse a la persona.
- source_word: קִנְאָתִי
  english_pob_choice: my jealousy
  chosen_spanish: mi celos
  alternatives_spanish:
  - mi celo
  - mi ardor celoso
  lexicon: HALOT
  rationale: La forma hebrea puede significar 'celos' o 'celo'. En este pasaje matrimonial de infidelidad del capítulo 16, el sentido de 'celos' encaja mejor. Se mantiene el término fuerte sin suavizarlo a 'celo'. La forma se marca en nota para evitar una construcción menos natural en español estándar; en la lectura pública puede entenderse como 'mi celo celoso' implícito por el contexto, pero el sustantivo escogido apunta al sentido relacional del hebreo.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - lejos de ti
  - apartándose de ti
  lexicon: HALOT
  rationale: El hebreo marca separación desde la destinataria. 'De ti' es breve y fiel; el movimiento ya quedó expresado con 'se apartará'.
- source_word: וְשָׁקַטְתִּי
  english_pob_choice: I will be quiet
  chosen_spanish: estaré tranquilo
  alternatives_spanish:
  - estaré en calma
  - estaré en reposo
  - estaré quieto
  lexicon: HALOT
  rationale: שקט expresa quietud, calma o reposo tras la agitación. 'Estaré tranquilo' es natural en español y conserva la idea de la ira que cesa.
- source_word: וְלֹא אֶכְעַס עוֹד
  english_pob_choice: and no longer be angry
  chosen_spanish: y no me enojaré más
  alternatives_spanish:
  - y no seguiré enojado
  - y ya no estaré airado
  - y no me irritaré más
  lexicon: HALOT
  rationale: כעס significa estar enojado o provisto de ira. 'No me enojaré más' comunica de forma clara y digna la cesación definitiva de la reacción divina.
theological_decisions:
- issue: Mantener el lenguaje afectivo-divino de ira y celos en contexto de pacto matrimonial
  english_pob_reading: Use 'wrath' and 'jealousy' as real covenantal terms without softening them into mere displeasure or abstract zeal.
  chosen_spanish_reading: Usar 'ira' y 'celos' como términos reales del juicio de pacto, sin reducirlos a mero desagrado ni convertirlos en un 'celo' abstracto.
  alternative_spanish_readings:
  - usar 'furor' para חֵמָה
  - usar 'celo' para קִנְאָה
  rationale: Ezequiel 16 emplea la metáfora matrimonial para describir infidelidad y respuesta judicial de Yahvé. En español, 'ira' y 'celos' conservan esa tensión relacional y forense. 'Celo' sería más abstracto y perdería parte de la fuerza del cuadro conyugal.
  doctrine_reference: Preservar la tensión teológica documentada; no suavizar el lenguaje judicial y relacional del texto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el auditor inglés. Se conserva la lectura óptima-equivalente de ''satisfy'' para וַהֲנִחֹתִי, se evita suavizar חֵמָה y קִנְאָה, y se mantiene la secuencia aspectual de cesación: ira -> apartamiento de los celos -> quietud -> ausencia de enojo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto la requiera explícitamente; este versículo usa primera persona divina sin el tetragrámaton.
  - '''Ira'' se usa para חֵמָה de manera consistente con el registro judicial.'
  - '''Celos'' se deja en nota como alternativa a fin de preservar la ambigüedad léxica de קִנְאָה.'
  - La puntuación separa los miembros paralelos con punto y coma para reflejar el ritmo del hebreo.
