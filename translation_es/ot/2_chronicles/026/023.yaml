translation:
  language: es
  text: 'Y Uzías durmió con sus padres[a], y lo sepultaron con sus padres en el campo de sepultura que pertenecía a los reyes, porque dijeron: «Es un leproso». Y Jotam, su hijo, reinó en su lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tiene una enfermedad de la piel». El término hebreo se refiere a uno afectado por צָרַעַת, que puede ser más amplio que la lepra moderna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - murió
  lexicon: HALOT
  rationale: En fórmulas regias de muerte, el hebreo usa שׁכב con el sentido convencional de fallecer. En español, «se acostó» conserva mejor la expresión formulística que «murió», pero evita la literalidad extraña de «durmió».
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus ancestros
  lexicon: HALOT
  rationale: La expresión refleja la fórmula dinástica de muerte y sepultura. «Padres» mantiene la correspondencia más directa con el hebreo y con la tradición bíblica, mientras que «antepasados» explicita el sentido pero pierde el eco formal del texto.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El verbo hebreo está en plural activo. «Lo sepultaron» conserva ese sujeto indefinido mejor que la pasiva, y «sepultar» suena un poco más solemne y bíblico que «enterrar».
- source_word: בִּשְׂדֵה הַקְּבוּרָה
  english_pob_choice: in the burial field
  chosen_spanish: en el campo de sepultura
  alternatives_spanish:
  - en el campo de entierro
  - en el terreno de sepultura
  lexicon: HALOT
  rationale: שָׂדֶה es literalmente «campo». «Campo de sepultura» conserva la imagen concreta y el vínculo nominal del hebreo sin volverlo demasiado técnico o genérico.
- source_word: אֲשֶׁר לַמְּלָכִים
  english_pob_choice: that belonged to the kings
  chosen_spanish: que pertenecía a los reyes
  alternatives_spanish:
  - que era para los reyes
  - de los reyes
  lexicon: HALOT
  rationale: El lamed indica pertenencia o relación. «Pertenecía a los reyes» expresa con naturalidad esa relación sin decidir más de lo que el hebreo exige sobre propiedad exacta o uso designado.
- source_word: כִּי אָמְרוּ
  english_pob_choice: for they said
  chosen_spanish: porque dijeron
  alternatives_spanish:
  - pues dijeron
  - ya que dijeron
  lexicon: HALOT
  rationale: La partícula introduce la causa de su sepultura fuera del sepulcro real. «Porque» es la opción más natural en español para ese valor explicativo-causal.
- source_word: מְצוֹרָע
  english_pob_choice: leper
  chosen_spanish: un leproso
  alternatives_spanish:
  - una persona con una enfermedad de la piel
  - afectado por lepra
  lexicon: HALOT
  rationale: «Leproso» sigue la traducción tradicional y la lectura breve del hebreo, pero el término bíblico puede abarcar una afección más amplia que la lepra clínica moderna; por eso se preserva la alternativa en nota.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En las notas de sucesión, מלך se traduce de forma natural por «reinó». Es breve, fiel y mantiene el tono regnal del contexto.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La frase marca sustitución dinástica. «En su lugar» reproduce bien ese valor de reemplazo y es idiomática en español.
theological_decisions:
- issue: Valor del término מְצוֹרָע y su relación con una condición moderna
  english_pob_reading: He is a leper
  chosen_spanish_reading: Es un leproso
  alternative_spanish_readings:
  - Tiene una enfermedad de la piel
  - Está afligido por una enfermedad de la piel
  rationale: La lectura principal conserva la forma tradicional y concisa del texto. La nota evita identificar sin más la afección bíblica con la lepra moderna, manteniendo la tensión léxica documentada en el audit trail.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios; el pasaje quedó confirmado como estable. La redacción española sigue de cerca la decisión auditada: conserva la fórmula regia de muerte, mantiene el plural activo de «lo sepultaron», y retiene «leproso» con nota aclaratoria para no borrar la amplitud posible de צָרַעַת.'
  spanish_consistency_notes:
  - Se mantiene el nombre bíblico «Uzías» y «Jotam» en formas españolas estándar y transparentes.
  - «Padres» conserva la fórmula hebrea, aunque en español pueda sonar más natural «antepasados»; se prefirió la correspondencia textual.
  - Se usa «sepultura»/«sepultaron» para mantener un registro digno y consistente con el contexto real.
  - La nota a pie de página queda anclada solo en «leproso», donde está la tensión léxica relevante.
