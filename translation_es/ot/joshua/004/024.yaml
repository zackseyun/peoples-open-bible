review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura de doble finalidad (לְמַעַן ... לְמַעַן), mantiene correctamente 'Yahvé' para יְהוָה, preserva la imagen de 'la mano de Yahvé' y refleja bien 'todos los pueblos de la tierra' con la alternativa local en nota. Sin embargo, falta una nota para el matiz de ירא, ya que el rastro inglés preserva explícitamente esa alternativa semántica. Además, la nota actual está anclada en 'Yahvé[a]' pero su contenido corresponde a 'de la tierra', lo cual desajusta el lugar semántico del marcador.
  spanish_quality_summary: El español es claro, natural y digno. No obstante, la colocación del marcador de nota es incorrecta y conviene evitar la coma en aposición en 'Yahvé, su Dios', porque el hebreo no exige esa pausa; 'Yahvé su Dios' fluye mejor y se acerca más al original. También es preferible anclar la nota alternativa en 'tierra[a]' y añadir una nota en 'teman[b]' para el matiz reverencial.
  glossary_alignment: 'Alineación sólida con la terminología del proyecto: יְהוָה -> ''Yahvé''; אֱלֹהֵיכֶם -> ''su Dios''; יַד -> ''mano''; חֲזָקָה -> ''fuerte''; ירא -> ''teman''. La única omisión relevante frente al expediente auditado es la nota explicativa sobre ''temor'' como reverencia y asombro, no mero terror.'
  issues:
  - severity: medium
    issue: El marcador [a] está colocado sobre 'Yahvé' pero la nota trata de הָאָרֶץ ('tierra/país').
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase pertinente. La ubicación actual puede inducir a pensar erróneamente que la variante afecta al Nombre divino.
  - severity: medium
    issue: Falta una nota para el matiz de 'teman' correspondiente a la nota inglesa sobre reverencia y asombro.
    rationale: El expediente inglés preserva esta alternativa semántica como información relevante; en español debe mantenerse para no perder la justificación lexical y teológica auditada.
  - severity: low
    issue: La coma en 'Yahvé, su Dios' introduce una aposición no necesaria.
    rationale: '''Yahvé su Dios'' refleja de manera más ajustada אֶת־יְהוָה אֱלֹהֵיכֶם y suena natural en español bíblico moderno.'
  revised_spanish_text: para que todos los pueblos de la tierra[a] sepan que la mano de Yahvé es fuerte, y para que ustedes teman[b] a Yahvé su Dios todos sus días.
