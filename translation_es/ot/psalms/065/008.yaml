translation:
  language: es
  text: sosegando el bramido de los mares[a], el bramido de sus olas[b], y el tumulto de los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aquietando» o «subduciendo» para «sosegando».
    reason: lexical_alternative
  - marker: b
    text: O «el alboroto de los pueblos»; el término hebreo puede denotar conmoción ruidosa y, en algunos contextos, multitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁבִּיחַ
  english_pob_choice: stilling
  chosen_spanish: sosegando
  alternatives_spanish:
  - calmando
  - apaciguando
  - sosegando
  lexicon: HALOT
  rationale: El participio causativo comunica la acción continua de hacer cesar el ruido. «Sosegando» conserva el valor aspectual de participio y suena natural en español bíblico sin perder la idea de aquietar o hacer callar.
- source_word: שְׁאוֹן
  english_pob_choice: roar
  chosen_spanish: bramido
  alternatives_spanish:
  - estruendo
  - rugido
  - bramido
  lexicon: HALOT
  rationale: El término designa un ruido fuerte y tumultuoso. En relación con el mar, «bramido» transmite bien la imagen auditiva y puede repetirse de modo consistente en ambos miembros del paralelismo.
- source_word: יַמִּים
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - los mares
  - el mar
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con «los mares». Aunque poéticamente puede incluir el mar en general, el plural mantiene la forma y el efecto del original.
- source_word: גַּלֵּיהֶם
  english_pob_choice: their waves
  chosen_spanish: sus olas
  alternatives_spanish:
  - sus olas
  - las olas de ellos
  - las olas de los mares
  lexicon: HALOT
  rationale: El sufijo plural retoma «los mares»; en español, «sus olas» preserva esa relación de pertenencia de manera fluida y natural.
- source_word: הֲמוֹן
  english_pob_choice: tumult
  chosen_spanish: tumulto
  alternatives_spanish:
  - alboroto
  - estruendo
  - tumulto
  lexicon: HALOT
  rationale: En paralelo con el ruido del mar, el sentido dominante es el de agitación sonora y social. «Tumulto» conserva ese campo semántico sin reducirlo solo a multitud numérica.
- source_word: לְאֻמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - los pueblos
  - las naciones
  lexicon: HALOT
  rationale: «Los pueblos» responde bien al hebreo y mantiene la amplitud poética del término sin forzarlo hacia una lectura política más específica que la del versículo.
theological_decisions:
- issue: Paralelismo entre caos natural y humano
  english_pob_reading: The verse presents God as the one who stills both the chaotic seas and the tumult of human peoples, without expanding this into a broader doctrinal claim beyond the poetic assertion.
  chosen_spanish_reading: El versículo presenta a Dios como quien sosiega tanto el caos del mar como el tumulto de los pueblos, sin convertirlo en una afirmación doctrinal más amplia que la del paralelo poético.
  alternative_spanish_readings:
  - Una lectura limitada solo a fenómenos naturales.
  - Una lectura más política que enfatice la sujeción de naciones.
  rationale: El paralelismo hebreo une el bramido del mar con el tumulto humano. La traducción conserva esa amplitud y la tensión entre ambos ámbitos, sin cerrar el sentido en una sola aplicación interpretativa.
  doctrine_reference: Conservar la tensión teológica del paralelismo poético.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios aplicados y el control cruzado reporta alto acuerdo.'
  spanish_consistency_notes:
  - 'Se mantuvo la repetición de la idea sonora con un mismo campo léxico: «bramido» / «tumulto».'
  - Se prefirió «los pueblos» en lugar de «las naciones» para respetar la amplitud poética del hebreo.
  - Se evitó introducir «SEÑOR» o una paráfrasis devocional; el versículo no contiene el Nombre divino de forma explícita en este segmento.
