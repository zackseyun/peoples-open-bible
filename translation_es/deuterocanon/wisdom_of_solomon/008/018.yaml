translation:
  language: es
  text: Y en su amistad hay buen deleite, y en los trabajos de sus manos, riqueza inagotable, y en el trato con ella[a], prudencia, y honor[b] en compartir sus palabras[c]. Anduve buscando cómo tomarla para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la formación compartida de su trato, prudencia». El griego comprime ideas de disciplina compartida y asociación estrecha de una manera difícil de reproducir con naturalidad en español.
    reason: lexical_alternative
  - marker: b
    text: O «buena reputación» para el término griego que denota estima pública favorable.
    reason: lexical_alternative
  - marker: c
    text: O «en la comunión de sus palabras» o «en participar de sus palabras»; el griego expresa la idea de compartir o participar en su habla o enseñanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλίᾳ
  english_pob_choice: friendship
  chosen_spanish: amistad
  alternatives_spanish:
  - compañía
  - afecto
  lexicon: LSJ
  rationale: φιλίᾳ expresa una relación personal con Sabiduría; «amistad» conserva ese vínculo relacional sin erotizarlo ni volverlo demasiado abstracto.
- source_word: τέρψις ἀγαθή
  english_pob_choice: good delight
  chosen_spanish: un deleite bueno
  alternatives_spanish:
  - gozo bueno
  - placer bueno
  lexicon: LSJ
  rationale: τέρψις es deleite o disfrute, y ἀγαθή califica moralmente ese deleite. «Un deleite bueno» mantiene la valoración ética explícita.
- source_word: πόνοις χειρῶν αὐτῆς
  english_pob_choice: the labors of her hands
  chosen_spanish: los trabajos de sus manos
  alternatives_spanish:
  - las labores de sus manos
  - su obra manual
  lexicon: LSJ
  rationale: πόνοις puede ser trabajos, fatigas o labores; «los trabajos de sus manos» conserva la imagen concreta y la fuerza productiva del griego sin sonar demasiado técnico.
- source_word: πλοῦτος ἀνεκλιπής
  english_pob_choice: unfailing wealth
  chosen_spanish: riqueza inagotable
  alternatives_spanish:
  - riqueza que no se agota
  - riquezas inagotables
  lexicon: LSJ
  rationale: ἀνεκλιπής significa no fallante, inagotable. «Riqueza inagotable» comunica permanencia y abundancia de modo natural en español.
- source_word: συγγυμνασίᾳ ὁμιλίας αὐτῆς
  english_pob_choice: companionship with her
  chosen_spanish: la compañía con ella
  alternatives_spanish:
  - la convivencia con ella
  - la asociación con ella
  - compañía compartida con ella
  lexicon: LSJ
  rationale: El griego combina ideas de entrenamiento compartido, trato cercano y conversación. La versión española opta por «la compañía con ella» para preservar la relación estrecha sin intensificar innecesariamente la imagen.
- source_word: φρόνησις
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - entendimiento
  - sabiduría práctica
  lexicon: LSJ
  rationale: φρόνησις es prudencia o sabiduría práctica. «Prudencia» es la equivalencia más directa y clara en español.
- source_word: εὔκλεια
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - buena reputación
  - renombre
  - gloria
  lexicon: LSJ
  rationale: εὔκλεια denota buena fama o honor. «Honor» funciona bien en la lista de beneficios asociados con la Sabiduría.
- source_word: κοινωνίᾳ λόγων αὐτῆς
  english_pob_choice: in sharing her words
  chosen_spanish: en compartir sus palabras
  alternatives_spanish:
  - en la comunión de sus palabras
  - en la participación en sus palabras
  - en la comunicación de sus palabras
  lexicon: LSJ
  rationale: κοινωνία implica participación o compartir, y λόγων puede ser palabras, dichos o enseñanza. «En compartir sus palabras» conserva ambos elementos de manera comprensible.
- source_word: περιῆλθον ζητῶν
  english_pob_choice: I went about seeking
  chosen_spanish: Anduve buscando
  alternatives_spanish:
  - Fui por ahí buscando
  - Busqué por todas partes
  lexicon: LSJ
  rationale: El aoristo de περιέρχομαι con participio expresa movimiento activo en búsqueda. «Anduve buscando» es una fórmula idiomática y fiel al sentido.
- source_word: ὅπως λάβω αὐτὴν εἰς ἐμαυτόν
  english_pob_choice: how I might take her to myself
  chosen_spanish: cómo tomarla para mí
  alternatives_spanish:
  - cómo adquirirla para mí
  - cómo recibirla para mí
  - cómo traerla a mí
  lexicon: LSJ
  rationale: λάβω puede ser tomar o recibir, y εἰς ἐμαυτόν expresa apropiación personal. «Tomarla para mí» mantiene esa apropiación sin convertirla en una imagen matrimonial explícita.
theological_decisions:
- issue: Sabiduría personificada en femenino y lenguaje relacional
  english_pob_reading: Retain feminine personification throughout ('her') and render the benefits as those found in relationship with Wisdom rather than abstract qualities alone.
  chosen_spanish_reading: Conservar la personificación femenina de Sabiduría y traducir los beneficios como realidades halladas en relación con ella.
  alternative_spanish_readings:
  - Despersonalizar Sabiduría en un abstracto 'sabiduría'
  - Entender 'tomarla para mí' como una imagen matrimonial explícita
  rationale: El griego mantiene de manera consistente la personificación femenina. La traducción española conserva esa tensión literaria y no fuerza una lectura matrimonial que el texto aquí no explicita.
  doctrine_reference: Preservar la tensión teológica y literaria del texto fuente; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La revisión auditada del inglés cambió 'close companionship' por 'companionship' para reflejar más directamente συγγυμνασίᾳ sin intensificación interpretativa. En español se siguió esa línea con «la compañía con ella», manteniendo además la traducción abierta de ὁμιλίας/συγγυμνασία en nota.
  spanish_consistency_notes:
  - Se usa «Sabiduría» en femenino implícito, coherente con la personificación del pasaje.
  - Se evitó «SEÑOR» o equivalentes porque el texto no contiene el nombre divino ni κύριος.
  - Se prefirió «prudencia» para φρόνησις y «honor» para εὔκλεια, siguiendo el valor ético y social de los términos.
  - Se mantuvo un registro digno y claro, sin calcos innecesarios, pero sin expandir el sentido más allá del griego.
