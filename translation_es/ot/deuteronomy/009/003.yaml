base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/009/003.yaml
  text: So know today that Yahweh your God is the one crossing over before you[a], a consuming fire. He will destroy them, and he will subdue them before you; and you will dispossess them and make them perish quickly[d][c][b], just as Yahweh has spoken to you.
  footnotes:
  - marker: a
    text: Or "going before you" for "crossing over before you." The Hebrew participle literally speaks of the LORD as the one crossing over ahead of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or "a devouring fire."
    reason: lexical_alternative
  - marker: c
    text: Or "you will drive them out" for "you will dispossess them."
    reason: lexical_alternative
  - marker: d
    text: Or "as the LORD spoke to you"; the sense is that this will happen in accordance with the LORD's prior word to Israel.
    reason: lexical_alternative
