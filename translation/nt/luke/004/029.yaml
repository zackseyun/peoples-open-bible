id: LUK.4.29
reference: Luke 4:29
source:
  edition: SBLGNT
  text: καὶ ἀναστάντες ἐξέβαλον αὐτὸν ἔξω τῆς πόλεως, καὶ ἤγαγον αὐτὸν ἕως ὀφρύος τοῦ ὄρους ἐφ’ οὗ ἡ πόλις ⸂ᾠκοδόμητο αὐτῶν, ὥστε⸃ κατακρημνίσαι αὐτόν·
translation:
  text: And rising up[a], they drove him out of the town and led him to the brow of the hill on which their town had been built[b], so as to throw him down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the brow of the hill.' The Greek uses a term for the brow, ridge, or edge of a height.
    reason: lexical_alternative
  - marker: b
    text: Or 'to hurl him down' or 'to throw him down the precipice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάντες
  chosen: rising up
  alternatives:
  - getting up
  - standing up
  lexicon: BDAG
  rationale: Aorist participle indicating the crowd's sudden movement to action. 'Rising up' preserves the physical and narrative force without overinterpreting it as merely 'standing.'
- source_word: ἐξέβαλον
  chosen: drove ... out
  alternatives:
  - cast out
  - threw out
  lexicon: BDAG
  rationale: The verb can mean expel or drive out. Here the hostile mob action is prominent, so 'drove ... out' communicates force better than the more idiomatic but potentially ecclesiastically colored 'cast out.'
- source_word: πόλεως
  chosen: town
  alternatives:
  - city
  lexicon: BDAG
  rationale: Although πόλις often means 'city,' Nazareth in context is better represented in natural English as 'town.' This is an optimal-equivalence choice for readability without changing sense.
- source_word: ἤγαγον
  chosen: led
  alternatives:
  - brought
  - dragged
  lexicon: BDAG
  rationale: '''Led'' is the broad, textually warranted sense of ἄγω. ''Dragged'' would heighten the violence beyond what the verb itself explicitly states, though the context is hostile.'
- source_word: ἕως ὀφρύος τοῦ ὄρους
  chosen: to the edge of the hill
  alternatives:
  - to the brow of the hill
  - to the ridge of the hill
  lexicon: BDAG
  rationale: ὀφρύς literally denotes brow or edge. 'Edge of the hill' is clearer in contemporary English than the traditional 'brow of the hill' while preserving the topographical sense.
- source_word: ἐφ’ οὗ ἡ πόλις ᾠκοδόμητο αὐτῶν
  chosen: on which their town had been built
  alternatives:
  - on which their city was built
  - where their town was built
  lexicon: BDAG
  rationale: The clause identifies the hill as the site on which the town stood. The pluperfect/passive sense is naturally conveyed by 'had been built.' 'Their town' preserves αὐτῶν as possessive, marking local belonging.
- source_word: ὥστε
  chosen: so as to
  alternatives:
  - so that
  - with the result that
  lexicon: BDAG
  rationale: Here ὥστε with the infinitive expresses intended result or purpose. 'So as to' captures that nuance more precisely than a bare 'so that' in English.
- source_word: κατακρημνίσαι
  chosen: throw him down the cliff
  alternatives:
  - hurl him down
  - throw him down the precipice
  lexicon: BDAG
  rationale: The verb means to throw headlong or cast down from a height. 'Throw him down the cliff' makes the intended lethal action explicit in natural English. 'Cliff' is supplied from the context of the hill's edge and is idiomatic for the action described.
