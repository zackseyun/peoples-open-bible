translation:
  language: es
  text: Él quitó los altares extranjeros y los lugares altos, quebró las columnas sagradas y cortó los asherim[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los postes de Aserá». El término hebreo se refiere a objetos cultuales asociados con el culto de Aserá; su forma exacta no es totalmente segura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: He removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - eliminó
  lexicon: HALOT
  rationale: En español, «quitó» expresa con naturalidad la acción concreta de retirar objetos cultuales. Evita la rigidez de «removió» y no exagera a «eliminó», que puede sugerir una supresión más abstracta que la del texto.
- source_word: מִזְבְּחוֹת הַנֵּכָר
  english_pob_choice: the foreign altars
  chosen_spanish: los altares extranjeros
  alternatives_spanish:
  - los altares foráneos
  - los altares de extranjeros
  lexicon: HALOT
  rationale: «Extranjeros» conserva el valor de נֵכָר como lo ajeno/no israelita y mantiene la conexión cultual sin volver la frase demasiado explicativa. «Foráneos» es posible, pero menos directo en registro bíblico español.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos
  - los santuarios de las alturas
  lexicon: HALOT
  rationale: Se conserva el término cultual tradicional «lugares altos», comprensible en español y fiel al uso bíblico. En este contexto no conviene traducirlo de modo más libre porque designa sitios de culto específicos.
- source_word: וַיְשַׁבֵּר
  english_pob_choice: shattered
  chosen_spanish: quebró
  alternatives_spanish:
  - rompió
  - destrozó
  lexicon: HALOT
  rationale: «Quebró» mantiene la idea de acción violenta y concreta sin volverla demasiado coloquial. «Destrozó» intensifica más de lo que exige el hebreo; «rompió» es posible, pero algo más débil.
- source_word: הַמַּצֵּבוֹת
  english_pob_choice: the sacred pillars
  chosen_spanish: las columnas sagradas
  alternatives_spanish:
  - las estelas sagradas
  - las piedras erguidas sagradas
  lexicon: HALOT
  rationale: La expresión «columnas sagradas» comunica el carácter cultual de מַצֵּבוֹת sin cerrar del todo el referente material, siguiendo la decisión inglesa de evitar una reducción exclusiva a «standing stones». «Estelas» sería más arqueológico y menos transparente para lectores generales.
- source_word: וַיְגַדַּע
  english_pob_choice: cut down
  chosen_spanish: derribó
  alternatives_spanish:
  - cortó
  - taló
  lexicon: HALOT
  rationale: Para objetos cultuales probablemente de madera, «derribó» transmite destrucción activa y funciona bien en español bíblico. «Cortó» sería demasiado general; «taló» suena más específico a árboles.
- source_word: הָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: los asherim
  alternatives_spanish:
  - las Aserás
  - los postes de Aserá
  lexicon: HALOT
  rationale: Se preserva el término técnico «asherim» para no perder la ambigüedad cultual del hebreo. La glosa «postes de Aserá» explicaría una posibilidad interpretativa, pero reduciría el alcance del término y borraría la cautela de la versión inglesa.
theological_decisions:
- issue: Alcance de los אֲשֵׁרִים en un relato de reforma cultual
  english_pob_reading: the Asherim
  chosen_spanish_reading: los asherim
  alternative_spanish_readings:
  - las Aserás
  - los postes de Aserá
  rationale: El hebreo puede referirse a objetos cultuales asociados con Asherá, pero el texto no obliga a precisar su forma exacta. Mantener el término técnico deja visible la tensión interpretativa y evita sobredeterminar el objeto destruido.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Expresión del acto de reforma contra cultos ilícitos
  english_pob_reading: He removed ... shattered ... cut down
  chosen_spanish_reading: quitó ... quebró ... derribó
  alternative_spanish_readings:
  - removió ... destrozó ... cortó
  - eliminó ... rompió ... taló
  rationale: La secuencia verbal debe sonar enérgica y concreta en español sin expandirse a una interpretación moralizante adicional. «Quitó / quebró / derribó» conserva el paralelismo de acciones destructivas y el carácter de reforma real.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente señaló acuerdo alto y no introdujo cambios. Esta redacción conserva la decisión del POB inglés de mantener «Asherim» como término técnico, pero en español usa una forma más idiomática para el resto de la línea, sin perder la fuerza del verbo ni la especificidad cultual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada para el tetragrámaton, pero este versículo no lo contiene.
  - Se conserva la mayúscula solo donde el español lo requiere por norma o por término técnico transliterado.
  - Se evitó «altares de extranjeros» porque sugiere posesión personal más que culto no israelita.
  - Se evitó «pilares» a secas, porque el contexto cultual requiere explicitar su función religiosa.
