translation:
  text: I gave my child to seven men[a], and whenever they went in to her, they died during the night. But for now, be cheerful. And Tobiah said[b], “I will taste nothing here until you settle and conclude the matter with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'seven men'; the context indicates these were the men to whom she had been given in marriage, so 'seven husbands' is a possible contextual rendering.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is difficult in the Greek witness here. The translation reflects the apparent sense: Tobiah refuses to eat until the marriage arrangement is formally settled with him.'
    reason: textual_variant
lexical_decisions:
- source_word: τὸ παιδίον μου
  chosen: my child
  alternatives:
  - my daughter
  - the girl of mine
  lexicon: LSJ
  rationale: παιδίον literally means 'child' or 'young one.' In context it refers to Raguel's daughter Sarah, but 'my child' preserves the speaker's familial and affectionate wording without over-specifying beyond the Greek form.
- source_word: ἑπτὰ ἀνδράσιν
  chosen: seven men
  alternatives:
  - seven husbands
  lexicon: LSJ
  rationale: ἀνήρ can mean 'man' or 'husband.' Since the Greek here says simply 'seven men' and the marital sense is supplied by context, the main text keeps the more literal wording while the context makes clear these were prospective or actual husbands.
- source_word: ὁπότε ἐὰν εἰσεπορεύοντο πρὸς αὐτήν
  chosen: whenever they went in to her
  alternatives:
  - whenever they entered to her
  - whenever they came to her
  lexicon: LSJ
  rationale: The idiom 'went in to her' is a natural English equivalent for εἰσπορεύομαι πρὸς in a marital/sexual context and preserves the euphemistic force of the Greek better than a flattened 'approached her.'
- source_word: ἀπέθνησκον ὑπὸ νύκτα
  chosen: they died during the night
  alternatives:
  - they died by night
  - they would die at night
  lexicon: LSJ
  rationale: ὑπὸ νύκτα indicates the time, 'during/by night.' 'During the night' is idiomatic modern English and fits the imperfect ἀπέθνησκον in this repeated circumstance.
- source_word: ἔχων ἡδέως γίνου
  chosen: be cheerful
  alternatives:
  - take heart
  - be glad
  - be of good cheer
  lexicon: LSJ
  rationale: The transmitted wording is somewhat awkward, but the sense is clearly an encouragement to pleasantness or confidence. 'Be cheerful' gives readable modern English without archaic phrasing.
- source_word: Οὐ γεύομαι οὐδὲν ὧδε
  chosen: I will taste nothing here
  alternatives:
  - I will eat nothing here
  - I will partake of nothing here
  lexicon: LSJ
  rationale: γεύομαι literally means 'taste' and can extend to eating generally. 'Taste nothing here' preserves the verbal imagery while naturally implying refusal to eat.
- source_word: ἕως ἂν στήσητε καὶ σταθῆτε πρὸς μέ
  chosen: until you settle and conclude the matter with me
  alternatives:
  - until you establish and agree with me
  - until you set it forth and come to terms with me
  lexicon: LSJ
  rationale: The double verb is textually and semantically difficult in Swete's witness. A literal rendering would be obscure in English. The context is Tobiah's refusal to eat until the marriage arrangement is formally settled, so this rendering communicates the likely sense while acknowledging the awkward Greek in a footnote.
