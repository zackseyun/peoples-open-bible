review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: conserva la conjunción inicial, mantiene la expresión formal ''hijos de Israel'', traduce הַפָּסַח como ''la Pascua'' y expresa בְּמוֹעֲדוֹ con un sentido calendárico. Sin embargo, ''celebren'' se aparta del matiz auditado de ''keep/observe'' para עשה + פסח, que en este contexto cultual se preserva mejor con ''celebren/observen/guarden''; entre esas, ''celebren'' suena natural pero puede enfatizar festividad más que observancia mandatada.'
  spanish_quality_summary: El español es claro, natural y digno. La frase suena bien en registro bíblico contemporáneo. Aun así, 'guarden la Pascua' comunica mejor el sentido de observancia ritual ordenada que 'celebren la Pascua', sin volverse arcaico ni forzado. También conviene añadir nota para preservar la alternativa documentada en inglés sobre 'hijos de Israel'.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''hijos de Israel'' está alineado con la decisión inglesa de mantener ''sons of Israel''. ''la Pascua'' es adecuado. La principal mejora es léxica: preferir ''guarden'' o ''observen'' para reflejar mejor el valor idiomático de עשה con פסaj y la opción inglesa auditada ''keep''.'
  issues:
  - severity: medium
    issue: '''celebren'' debilita el matiz de observancia ritual mandatada'
    rationale: El hebreo עשה con 'la Pascua' es idiomático para observar/guardar la Pascua. La auditoría inglesa eligió 'keep' precisamente para conservar ese sentido cultual y de cumplimiento. 'Celebren' es posible, pero desplaza el foco hacia la festividad.
  - severity: low
    issue: Falta nota léxica para la alternativa 'israelitas'
    rationale: La POB inglesa preserva en nota que el hebreo es literalmente 'sons of Israel' y ofrece alternativas. En español conviene mantener esa transparencia con una nota anclada a 'hijos de Israel'.
  revised_spanish_text: Y que los hijos[a] de Israel guarden la Pascua en su tiempo señalado.
