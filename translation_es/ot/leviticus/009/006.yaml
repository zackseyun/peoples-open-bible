revisions:
- from: 'Y dijo Moisés[a]: «Esta es la cosa que Yahvé ha mandado que hagan, para que la gloria de Yahvé se les aparezca».'
  to: 'Y dijo Moisés[a]: «Esto es lo que Yahvé ha mandado que hagan, para que la gloria de Yahvé se manifieste a ustedes».'
  rationale: Se revisa el texto para mejorar la naturalidad y dignidad del español sin perder el contenido del hebreo ni las decisiones del POB inglés. «Esto es lo que» reemplaza el calco poco idiomático «Esta es la cosa», y «se manifieste a ustedes» expresa mejor la aparición de la gloria divina en español general. La nota alternativa se conserva, ajustada a la misma mejora estilística.
