revisions:
- from: Que tu mano sea levantada sobre tus adversarios[a], y que todos tus enemigos sean cortados.
  to: Que tu mano sea levantada sobre tus adversarios[a], y que todos tus enemigos sean destruidos.
  rationale: 'Se recomienda una reparación menor por legibilidad: cambiar ''sean cortados'' por ''sean destruidos''. Aunque pierde parte de la metáfora de כרת, evita una frase poco idiomática en español y comunica con claridad el resultado anunciado. El resto del versículo está bien resuelto y fiel al hebreo y al audit trail inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:24:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene la imagen concreta de ''tu mano'', la preposición ''sobre'', la distinción entre צָרֶיךָ (''adversarios'') y אֹיְבֶיךָ (''enemigos''), y la fuerza optativa/jusiva con ''Que... y que...''. También conserva correctamente la nota sobre la lectura futura alternativa.'
  spanish_quality_summary: 'La redacción es mayormente clara y natural, pero ''sean cortados'' suena poco idiomático en español bíblico moderno para יִכָּרֵתוּ y puede sugerir un corte físico literal más que la idea de ser eliminados/arrancados de en medio. ''Sean eliminados'' sería más natural, pero perdería demasiada transparencia léxica. ''Sean exterminados'' intensifica de más. La mejor reparación breve y fiel es ''sean destruidos'', aunque algo más interpretativa, o ''sean cortados de raíz'', que añade imagen no explícita. Dado el proyecto, conviene una mejora mínima hacia legibilidad: ''sean destruidos'' sería demasiado alejada del rationale inglés; por eso propongo ''sean eliminados'' no es ideal. La opción más conservadora y legible es ''sean eliminados'' pero tampoco preserva el matiz. Entre fidelidad y español, prefiero ''sean destruidos'' no por idealidad léxica sino por inteligibilidad. Sin embargo, para mínima intervención y manteniendo la metáfora, ''sean cortados'' puede aceptarse
    técnicamente; aun así recomiendo revisión.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La diferenciación 'adversarios' / 'enemigos' está bien alineada con el audit trail. La única tensión es la representación de כרת en español.
  issues:
  - severity: medium
    issue: '''sean cortados'' es poco natural en español para יִכָּרֵתוּ'
    rationale: Aunque calca bien 'be cut off', en español contemporáneo eclesial 'ser cortados' sin complemento suena extraño y ambiguo. Puede leerse como un corte físico en vez de la idea hebrea de ser quitados/destruidos.
  - severity: low
    issue: La nota alternativa repite 'serán cortados', que comparte la misma torpeza estilística
    rationale: Si se mejora el verbo principal, la nota también debe armonizarse para mantener coherencia y claridad.
  revised_spanish_text: Que tu mano sea levantada sobre tus adversarios[a], y que todos tus enemigos sean destruidos.
  revised_footnotes:
  - marker: a
    text: 'O: «Tu mano será levantada sobre tus adversarios, y todos tus enemigos serán destruidos». Los imperfectos hebreos también pueden leerse como enunciados futuros.'
    reason: alternative_reading
  revision_rationale: 'Se recomienda una reparación menor por legibilidad: cambiar ''sean cortados'' por ''sean destruidos''. Aunque pierde parte de la metáfora de כרת, evita una frase poco idiomática en español y comunica con claridad el resultado anunciado. El resto del versículo está bien resuelto y fiel al hebreo y al audit trail inglés.'
