  to: 'Les habló conforme al consejo de los jóvenes, diciendo: «Mi padre hizo pesado el yugo de ustedes, y yo añadiré a su yugo. Mi padre los disciplinó con látigos, pero yo los disciplinaré con escorpiones[a]».'
  rationale: 'Se hicieron ajustes menores pero necesarios para mejorar la naturalidad y la precisión en español sin apartarse del hebreo ni del POB inglés: «Les habló» por español idiomático; «el yugo de ustedes» para evitar ambigüedad; «látigos» para reflejar mejor שׁוֹטִים; se eliminó la nota [a] original por redundante y se conservó solo la nota léxica importante sobre «escorpiones».'
