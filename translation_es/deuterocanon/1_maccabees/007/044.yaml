translation:
  language: es
  text: Y él mismo cayó primero en la batalla. Pero cuando su campamento[a] vio que Nicanor había caído, arrojaron sus armas y huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Campamento» traduce aquí ἡ παρεμβολὴ αὐτοῦ; también puede entenderse como «su fuerza» o «su encampamento».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - fue derribado
  - murió
  lexicon: LSJ
  rationale: «Cayó» conserva la imagen verbal del griego y funciona naturalmente en español para una caída en combate, sin explicitar más de lo que el texto dice.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - personalmente
  lexicon: LSJ
  rationale: El pronombre es enfático; «él mismo» mantiene ese énfasis de manera idiomática en español.
- source_word: πρῶτος
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - el primero
  - antes que los demás
  lexicon: LSJ
  rationale: «Primero» reproduce el valor secuencial del adverbio en una construcción natural en español.
- source_word: ἐν τῷ πολέμῳ
  english_pob_choice: in the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - en la guerra
  - en combate
  lexicon: LSJ
  rationale: Aquí el contexto inmediato es el enfrentamiento armado concreto; «batalla» comunica mejor el escenario que «guerra».
- source_word: ἡ παρεμβολὴ αὐτοῦ
  english_pob_choice: his camp
  chosen_spanish: su campamento
  alternatives_spanish:
  - su campamento militar
  - su fuerza
  - su encampamento
  lexicon: LSJ
  rationale: παρεμβολή puede referirse al campamento o al cuerpo de tropas acampado. En español, «campamento» conserva la imagen y es claro; no se impone «fuerza» porque el texto permite también la referencia espacial.
- source_word: ῥίψαντες τὰ ὅπλα αὐτῶν
  english_pob_choice: they threw down their weapons
  chosen_spanish: arrojaron sus armas
  alternatives_spanish:
  - tiraron sus armas
  - desecharon sus armas
  - arrojaron sus armas al suelo
  lexicon: LSJ
  rationale: «Arrojaron» expresa la acción brusca de abandonar las armas antes de huir. «Armas» traduce ὅπλα de manera natural en contexto militar.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron corriendo
  lexicon: LSJ
  rationale: «Huyeron» es la equivalencia normal y sobria para la fuga en contexto bélico.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y coincide sustancialmente con la solución auditada en inglés: énfasis en «él mismo», secuencia temporal de «primero», y el sentido militar de παρεμβολή como campamento/fuerza. No se registran revisiones aplicadas en el contexto inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque no aparece ningún nombre divino en el texto fuente.
  - «Armas» se usa como término militar general para τὰ ὅπλα, sin forzar una concreción adicional.
  - La nota [a] preserva la tensión lexical entre campamento físico y fuerza militar, equivalente a la del aparato crítico inglés.
