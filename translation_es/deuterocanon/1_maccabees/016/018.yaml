translation:
  language: es
  text: Y Ptolomeo escribió estas cosas y envió un mensaje al rey para que le enviara fuerzas como ayuda y entregara el país de ellos y las ciudades[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envió al rey». El verbo griego solo dice «envió», pero el contexto muestra una comunicación escrita o verbal.
    reason: lexical_alternative
  - marker: b
    text: O «la tierra de ellos». χώρα puede significar «país», «tierra» o «territorio» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió estas cosas
  - redactó
  lexicon: BDAG
  rationale: El aoristo de γράφω expresa la acción simple de escribir; en español, «escribió» reproduce con naturalidad esa relación directa con ταῦτα sin añadir explicación.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas materias
  - esto
  lexicon: BDAG
  rationale: El demostrativo neutro plural se mantiene de forma cercana con «estas cosas», una opción natural y suficientemente literal para el registro narrativo.
- source_word: ἀπέστειλεν τῷ βασιλεῖ
  english_pob_choice: sent word to the king
  chosen_spanish: envió mensaje al rey
  alternatives_spanish:
  - envió palabra al rey
  - se dirigió al rey con un mensaje
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «envió», el contexto indica comunicación. «Envió mensaje al rey» conserva el sentido del acto comunicativo sin introducir más contenido del que el texto ofrece.
- source_word: ὅπως ἀποστείλῃ αὐτῷ δυνάμεις
  english_pob_choice: that he should send him forces
  chosen_spanish: para que le enviara fuerzas
  alternatives_spanish:
  - a fin de que le enviara fuerzas
  - que le enviara tropas
  lexicon: BDAG
  rationale: ὅπως introduce la finalidad o contenido de la petición; «para que» expresa bien esa relación en español. «Fuerzas» mantiene la amplitud militar de δυνάμεις sin reducirla a «tropas».
- source_word: εἰς βοήθειαν
  english_pob_choice: for help
  chosen_spanish: en ayuda
  alternatives_spanish:
  - para ayuda
  - como ayuda
  - en auxilio
  lexicon: BDAG
  rationale: La preposición εἰς con βοήθειαν expresa finalidad/uso. «En ayuda» suena algo más natural que una traducción mecánica y conserva la función complementaria del sintagma.
- source_word: παραδῷ
  english_pob_choice: hand over
  chosen_spanish: entregara
  alternatives_spanish:
  - pusiera en manos
  - sometiera
  lexicon: BDAG
  rationale: παραδίδωμι puede significar «entregar/poner en manos de». En español, «entregara» es claro y suficientemente fiel al acto de ceder una posesión o territorio.
- source_word: τὴν χώραν αὐτῶν
  english_pob_choice: their country
  chosen_spanish: su país
  alternatives_spanish:
  - su tierra
  - su territorio
  - el país de ellos
  lexicon: BDAG
  rationale: χώρα admite «país», «tierra» o «territorio». Aquí «su país» refleja bien el valor geográfico-político del contexto y evita la redundancia de «de ellos» después de la referencia ya establecida.
- source_word: τὰς πόλεις
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las poblaciones
  - las ciudades de ellos
  lexicon: BDAG
  rationale: El griego tiene artículo definido sin posesivo explícito; «las ciudades» conserva esa forma. La pertenencia ya queda implicada por el contexto anterior.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la redacción final del POB en inglés, pero ajusta la sintaxis a un español más natural: «sent word» pasa a «envió mensaje», «for help» se vierte como «en ayuda» y el paralelo final conserva «las ciudades» sin posesivo explícito, como en el griego. Se mantiene la ambigüedad documentada de χώρα mediante nota.'
  spanish_consistency_notes:
  - Se usa «Ptolomeo» siguiendo la transliteración estándar del nombre propio, acorde con el contexto histórico del libro.
  - Se conserva «fuerzas» para δυνάμεις, evitando especificar «tropas» en exceso.
  - No se introduce «reino» ni otras expansiones contextuales que no están en el griego.
  - 'Se mantiene el orden narrativo básico del original: escribir, enviar mensaje, pedir fuerzas, y entregar territorio y ciudades.'
