translation:
  language: es
  text: Partieron de Mitká y acamparon en Hashmoná.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  lexicon: HALOT
  rationale: El verbo de itinerario נסע expresa salida o avance de una etapa a otra. «Partieron» comunica de manera natural ese movimiento, sin añadir matices innecesarios. «Se pusieron en marcha» es posible, pero algo más expansivo; «salieron» es más general y pierde un poco el matiz de desplazamiento en ruta.
- source_word: מִמִּתְקָה
  english_pob_choice: from Mithkah
  chosen_spanish: de Mitca
  alternatives_spanish:
  - de Mithká
  - desde Mitca
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar, por lo que se translitera. En español, «Mitca» mantiene la forma breve y legible; «Mithká» conserva más cerca la transcripción, pero resulta menos natural. El prefijo hebreo מִן se rinde con «de» en este contexto itinerario.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron campamento
  lexicon: HALOT
  rationale: חנה en fórmulas de itinerario significa establecer campamento. «Acamparon» es claro y fiel en español moderno; el enlace «y» puede omitirse por economía estilística sin perder la secuencia narrativa. «Levantaron campamento» es más interpretativo y menos directo.
- source_word: בְּחַשְׁמֹנָה
  english_pob_choice: at Hashmonah
  chosen_spanish: en Jasmoná
  alternatives_spanish:
  - en Hashmoná
  - en Jasmona
  lexicon: HALOT
  rationale: El nombre propio se translitera al español. «Jasmoná» refleja de modo más natural la pronunciación hispana inicial del aspirado hebreo; «Hashmoná» conserva la h etimológica, pero puede sonar menos fluida en español. La preposición בְּ en contexto de campamento se expresa naturalmente con «en».
translation_notes:
  revision_awareness: El texto inglés POB y el aparato auditado muestran una lectura estable y sin notas; por eso no se introducen variantes textuales ni notas al pie. La propuesta española sigue de cerca la lógica del itinerario hebreo y conserva la simpleza narrativa del versículo.
  spanish_consistency_notes:
  - Se mantiene un español sobrio y geográficamente neutro.
  - Los nombres de lugar se transliteran de forma consistente y breve.
  - Se evita añadir conectores o explicaciones que no estén en el hebreo.
  - La elección verbal conserva el carácter de registro de viaje propio del pasaje.
