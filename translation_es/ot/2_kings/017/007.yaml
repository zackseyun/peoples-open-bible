base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/007.yaml
  text: And this happened because the children of Israel had sinned against Yahweh their God[a], who had brought them up from the land of Egypt, from under the hand of Pharaoh king of Egypt[b], and had feared other gods.
  footnotes:
  - marker: a
    text: Or 'from under Pharaoh’s power.' The Hebrew idiom is literally 'from under the hand of Pharaoh.'
    reason: lexical_alternative
  - marker: b
    text: Or 'worshiped other gods.' The Hebrew says 'feared other gods,' using the common verb for fear/reverence that can include worshipful devotion.
    reason: lexical_alternative
