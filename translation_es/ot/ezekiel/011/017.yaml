translation:
  language: es
  text: 'Por tanto, di: «Así dice el Señor Yahvé[a]: Yo los reuniré de entre los pueblos[b] y los congregaré de entre las tierras donde han sido esparcidos, y les daré la tierra de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Señor Yahvé» representa אֲדֹנָי יְהוִה; alternativamente, «Señor Dios».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los pueblos»; alternativamente, «las naciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce la consecuencia del oráculo previo. “Por tanto” conserva la relación lógica y suena natural en español profético.
- source_word: אֱמֹר
  english_pob_choice: say
  chosen_spanish: di
  alternatives_spanish:
  - decir
  - declara
  lexicon: HALOT
  rationale: Es un imperativo dirigido al profeta. “Di” mantiene la orden breve y directa del hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula profética tradicional; “Así dice” conserva el tono solemne sin forzar un calco más rígido.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como Yahvé, conforme al criterio del proyecto. “Señor” traduce אֲדֹנָי y se evita el ocultamiento del Tetragrámaton.
- source_word: וְקִבַּצְתִּי
  english_pob_choice: I will gather
  chosen_spanish: Yo los reuniré
  alternatives_spanish:
  - Yo los juntaré
  - Yo los congregaré
  lexicon: HALOT
  rationale: קבץ expresa reunir dispersos; “reunir” es claro y natural en español para el retorno restaurador.
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: de entre los pueblos
  alternatives_spanish:
  - de entre las naciones
  lexicon: HALOT
  rationale: Se mantiene “pueblos” para reflejar con precisión el plural hebreo y la alternativa lexical documentada frente a “naciones”.
- source_word: וְאָסַפְתִּי
  english_pob_choice: assemble
  chosen_spanish: los juntaré
  alternatives_spanish:
  - los reuniré
  - los congregaré
  lexicon: HALOT
  rationale: אָסַף añade la idea de recoger/traer junto. “Juntar” evita repetir exactamente “reunir” y refleja la acumulación de los dos verbos hebreos.
- source_word: הָאֲרָצוֹת
  english_pob_choice: the lands
  chosen_spanish: de entre las tierras
  alternatives_spanish:
  - de entre los países
  - de entre los territorios
  lexicon: HALOT
  rationale: אֲרָצוֹת aquí designa los lugares de dispersión. “Tierras” es amplio y fiel al marco geográfico del exilio.
- source_word: אֲשֶׁר נְפֹצוֹתֶם בָּהֶם
  english_pob_choice: where you have been scattered
  chosen_spanish: donde han sido esparcidos
  alternatives_spanish:
  - en las cuales han sido dispersados
  - donde ustedes fueron dispersados
  lexicon: HALOT
  rationale: La cláusula relativa describe el estado resultante de la dispersión; “esparcidos” conserva la imagen del verbo hebreo y la pasiva del contexto.
- source_word: וְנָתַתִּי לָכֶם
  english_pob_choice: and I will give you
  chosen_spanish: y les daré
  alternatives_spanish:
  - y les concederé
  - y os daré
  lexicon: HALOT
  rationale: Se mantiene el futuro simple de נתן con objeto indirecto explícito; “daré” es directo y sobrio en español.
- source_word: אַדְמַת יִשְׂרָאֵל
  english_pob_choice: the land of Israel
  chosen_spanish: la tierra de Israel
  alternatives_spanish:
  - el suelo de Israel
  - la tierra de Israel, país de Israel
  lexicon: HALOT
  rationale: אַדְמָה puede ser suelo/tierra; en un oráculo de restauración territorial, “la tierra de Israel” comunica mejor la herencia y la posesión prometida.
theological_decisions:
- issue: Renderización del nombre divino en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La directriz del proyecto pide traducir יְהוָה como Yahvé, no como una convención de ocultamiento. En la fórmula compuesta, “Señor” representa אֲדֹנָי y “Yahvé” preserva el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide con el contexto auditado: la revisión inglesa reciente no introdujo cambios y el consenso de revisión es alto. La traducción española sigue el mismo contenido semántico y conserva las decisiones documentadas sobre la fórmula profética, los dos verbos de reunión y la distinción entre «pueblos» y «naciones».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se evita «SEÑOR» como máscara del nombre divino; «Señor» traduce aquí a אֲדֹנָי dentro de la fórmula compuesta.
  - Se conserva la distinción estilística entre «reuniré» y «juntaré» para reflejar los dos verbos hebreos sin borrar su solapamiento semántico.
  - «Tierra de Israel» mantiene la referencia territorial inherente a אַדְמַת יִשְׂרָאֵל.
