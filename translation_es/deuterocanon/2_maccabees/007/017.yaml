review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y la auditoría inglesa en casi todo: «no pienses», «nuestra nación», «abandonada por Dios», «mira su gran poder» y «te… a tu descendencia» preservan el sentido general. Sin embargo, «resiste» para καρτέρει desplaza el matiz de soportar/aguantar/endurecerse hacia oponerse o resistir activamente, lo que no refleja tan bien la revisión inglesa final («endure») ni el valor básico del verbo en este contexto de desafío.'
  spanish_quality_summary: El español es claro y natural, pero «Pero tú, resiste» suena algo tosco y ligeramente ambiguo en español bíblico moderno, porque puede sugerir resistencia contra alguien. «Pero tú, soporta» o «Pero tú, aguanta» expresarían mejor el reto irónico; «soporta» mantiene un registro más digno. La nota actual también deja de ser necesaria si se adopta una opción más fiel al núcleo semántico.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: «Dios» es correcto; no aparecen términos como Yahvé, Mesías, Espíritu, etc. La elección «descendencia» para σπέρμα es adecuada en español. La tensión sobre el sujeto de βασανιεῖ puede mantenerse sin nota adicional, como en el borrador.'
  issues:
  - severity: medium
    issue: «resiste» para καρτέρει
    rationale: Aunque posible por contexto retórico, en español «resistir» suele implicar oponerse/defenderse. El griego aquí encaja mejor con «soporta», «aguanta» o «mantente firme», y la auditoría inglesa final optó por «endure» en vez de «keep waiting».
  - severity: low
    issue: Nota léxica innecesaria tras la corrección
    rationale: Si se corrige a una opción más fiel como «soporta», la nota alternativa sobre «persevera» ya no aporta una ambigüedad textual o teológica significativa que deba conservarse.
  revised_spanish_text: Pero no pienses que nuestra nación ha sido abandonada por Dios. Pero tú, soporta y mira su gran poder, cómo te torturará a ti y a tu descendencia.
  revision_rationale: Se reemplaza «resiste» por «soporta» para reflejar mejor καρτέρει y la decisión inglesa final «endure», evitando en español la connotación de oposición activa. Se elimina la nota porque ya no preserva una alternativa necesaria para el lector.
