  rationale: 'Se reubicaron y corrigieron las notas para que sigan el rastro POB y el hebreo: [a] ahora documenta la repetición de "apariencia"; [b] se ancla al cordel de lino; [c] se ancla al portal/gateway. También se eliminó el añadido no necesario ''vi'' y se ajustó ''en la puerta'' a ''en el portal'' para reflejar mejor el contexto arquitectónico y la decisión léxica auditada.'
