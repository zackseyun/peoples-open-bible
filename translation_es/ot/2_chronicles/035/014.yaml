  to: Después, prepararon para sí mismos y para los sacerdotes[a], porque los sacerdotes, los hijos de Aarón, estaban ocupados en ofrecer el holocausto y las porciones de grasa hasta la noche. Por eso los levitas prepararon para sí mismos y para los sacerdotes, los hijos de Aarón.
  rationale: Se ajusta עֹלָה a «holocausto», la equivalencia sacrificial más natural y precisa en español bíblico. También se suaviza levemente la redacción con «Después» y «Por eso» para mejorar el flujo sin alterar el sentido ni la estructura del original.
