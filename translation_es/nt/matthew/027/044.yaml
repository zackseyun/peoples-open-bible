translation:
  language: es
  text: De la misma manera[a][b], aun los ladrones que habían sido crucificados con él lo insultaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo mismo»; el giro griego significa aquí que ellos también lo trataban de la misma manera.
    reason: lexical_alternative
  - marker: b
    text: O «lo estaban injuriando».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ δ’ αὐτὸ
  english_pob_choice: In the same way
  chosen_spanish: De la misma manera
  alternatives_spanish:
  - Lo mismo
  - De igual modo
  - Igualmente
  lexicon: BDAG
  rationale: La expresión griega funciona de manera adverbial e idiomática. En español, «De la misma manera» comunica naturalmente la referencia al mismo tipo de burla o desprecio que ya se describió, sin volverla una traducción demasiado literal de «lo mismo».
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - y
  - incluso
  lexicon: BDAG
  rationale: 'Aquí καί añade énfasis: no solo otros se burlaban, sino aun los que estaban crucificados con Jesús. «Aun» conserva ese matiz enfático de inclusión inesperada en español.'
- source_word: λῃσταὶ
  english_pob_choice: robbers
  chosen_spanish: ladrones
  alternatives_spanish:
  - robbers
  - bandidos
  - criminales
  lexicon: BDAG
  rationale: Aunque «robbers» en inglés POB apunta al sentido básico de λῃσταί, en español «ladrones» es el equivalente más natural y claro para un lector general. «Bandidos» podría insinuar un matiz político o insurgente que el texto no exige aquí.
- source_word: συσταυρωθέντες σὺν αὐτῷ
  english_pob_choice: who had been crucified with him
  chosen_spanish: que habían sido crucificados con él
  alternatives_spanish:
  - que fueron crucificados con él
  - habiendo sido crucificados con él
  lexicon: BDAG
  rationale: El participio pasivo se entiende adjetivalmente, identificando a esos ladrones como los que estaban crucificados junto con Jesús. «Habían sido crucificados con él» preserva el sentido de acción anterior y el pasivo de forma natural en español.
- source_word: ὠνείδιζον
  english_pob_choice: were insulting
  chosen_spanish: lo insultaban
  alternatives_spanish:
  - lo injuriaban
  - lo ultrajaban
  - lo vituperaban
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. «Lo insultaban» es claro y conserva ese valor durativo. «Injuriaban» o «vituperaban» son posibles, pero menos naturales para una lectura pública moderna.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre se refiere a Jesús y funciona como objeto directo en español. «Lo» mantiene fluidez y concisión; no hace falta explicitar «a Jesús» en el texto principal.
theological_decisions:
- issue: Tensión narrativa con Lucas, que describe a uno de los crucificados hablando favorablemente más adelante
  english_pob_reading: Translate Matthew's statement as applying to the robbers in this scene without qualification.
  chosen_spanish_reading: 'Traducir el plural de Mateo sin suavizarlo: los ladrones crucificados con Jesús lo insultaban.'
  alternative_spanish_readings:
  - Uno de los ladrones lo insultaba
  - Los ladrones, al principio, lo insultaban
  - También ellos lo insultaban, aunque luego uno cambió
  rationale: El griego de Mateo usa plural y un imperfecto, por lo que la traducción debe conservar la afirmación tal como está, sin armonizarla dentro del texto. Así se respeta la tensión entre relatos evangélicos en lugar de resolverla artificialmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el estado más reciente del archivo fuente, que indica que no hubo cambios necesarios en la revisión más reciente y que la lectura fue confirmada con alto acuerdo por la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no interviene.
  - Se prefirió «ladrones» por claridad y fidelidad contextual, en línea con el valor básico de λῃσταί y con el inglés POB «robbers».
  - Se conservó el imperfecto en español («insultaban») para reflejar la acción continua del griego.
  - No se introdujo ninguna armonización con otros evangelios en el texto principal.
