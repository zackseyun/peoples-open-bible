  spanish_quality_summary: El español es claro, digno y legible, pero el uso de «Buscad» introduce voseo/vosotros peninsular, no el registro neutral latinoamericano solicitado. Conviene usar «Busquen», que sigue siendo natural y eclesialmente amplio. También debe moverse la nota al segmento correcto.
