translation:
  text: Jesus said[images], "On the day you see your likeness, you rejoice. But whenever
    you see your images that came into being before you, which neither die nor become
    manifest—how much will you bear!"
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:59:58Z'
  footnotes:
  - marker: images
    text: The Coptic uses the Greek loanword εἰκών (eikōn). The text contrasts the
      mortal 'likeness' (ⲉⲓⲛⲉ) with the pre-existent, immortal 'images' (ϩⲓⲕⲱⲛ).
    reason: theological_note
  - marker: came into being
    text: The Coptic ⲛ̄ⲧⲁϩϣⲱⲡⲉ uses a regional variant ϩ for the third-person plural
      pronoun ⲩ (ⲛⲧⲁ-ⲩ-ϣⲱⲡⲉ).
    reason: dialect_note
  - marker: neither die nor become manifest
    text: The Coptic ⲙⲁⲩⲙⲟⲩ and ⲙⲁⲩⲟⲩⲱⲛϩ use the prefix ⲙⲁ-, a regional variant of
      the negative habitual ⲙⲉⲣⲉ-.
    reason: dialect_note
lexical_decisions:
- source_word: ⲉⲓⲛⲉ
  chosen: likeness
  rationale: Refers to the physical or mortal appearance, contrasted with the eternal
    'images'.
  lexicon: Crum 78a
  alternatives:
  - appearance
  - form
- source_word: ϩⲓⲕⲱⲛ
  chosen: images
  rationale: Greek loanword εἰκών, used here for the pre-existent, immortal divine
    counterparts.
  lexicon: BDAG 288; Crum 661b
  alternatives:
  - forms
- source_word: ϣⲱⲡⲉ
  chosen: came into being
  rationale: Standard translation for ϣⲱⲡⲉ in the context of origination or creation.
  lexicon: Crum 583b
  alternatives:
  - existed
  - were made
- source_word: ϩⲓⲧⲉⲧⲛⲉϩⲏ
  chosen: before you
  rationale: Compound preposition ϩⲓ-ⲧⲏⲩⲧⲛ-ⲉϩⲏ indicating temporal or spatial precedence.
  lexicon: Crum 648a
  alternatives:
  - ahead of you
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: become manifest
  rationale: Means to be revealed or made visible, contrasting with the hidden nature
    of the pre-existent images.
  lexicon: Crum 485b
  alternatives:
  - are revealed
  - appear
- source_word: ϥⲓ ϩⲁ
  chosen: bear
  rationale: Idiom meaning to bear, endure, or carry a burden.
  lexicon: Crum 621a
  alternatives:
  - endure
  - carry
theological_decisions:
- issue: Translation of ⲉⲓⲛⲉ vs ϩⲓⲕⲱⲛ
  chosen_reading: likeness vs images
  rationale: Preserves the distinct vocabulary used by the author to differentiate
    the mortal reflection from the eternal divine counterpart.
  alternatives_noted:
  - appearance vs forms
drafter_notes: The saying contrasts the ordinary experience of seeing one's mortal
  reflection ('likeness') with the overwhelming future encounter with one's pre-existent,
  immortal divine counterpart ('images'). The translation preserves the sharp Thomasine
  distinction between ⲉⲓⲛⲉ and ϩⲓⲕⲱⲛ, as well as the exclamatory ending.
