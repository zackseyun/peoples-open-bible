translation:
  language: es
  text: Haz que sus nobles sean como Oreb y Zeeb[a], y todos sus príncipes como Zebah y Zalmunna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Oreb y Zeeb fueron jefes madianitas derrotados en Jueces 7:25; Zebah y Zalmunna fueron reyes madianitas derrotados en Jueces 8:5–21.
    reason: cross_reference
lexical_decisions:
- source_word: שִׁיתֵמוֹ
  english_pob_choice: Make their
  chosen_spanish: Haz a sus
  alternatives_spanish:
  - Pon a sus
  - Hazlos
  lexicon: HALOT
  rationale: El imperativo pide una acción dirigida a Dios en el salmo; en español, "haz a sus" conserva la idea causativa de "make their" antes de los objetos comparativos, sin sonar tan rígido como un calco literal.
- source_word: נְדִיבֵמוֹ
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - principales
  - nobles de alto rango
  lexicon: HALOT
  rationale: '"Nobles" mantiene el valor de personas prominentes o de alto rango y distingue este término de נְסִיכֵימוֹ, evitando uniformar ambos miembros del paralelismo.'
- source_word: כְּעֹרֵב
  english_pob_choice: like Oreb
  chosen_spanish: como Oreb
  alternatives_spanish:
  - como Oreb
  - como el de Oreb
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado; "como" reproduce la comparación hebrea de forma natural en español.
- source_word: וְכִזְאֵב
  english_pob_choice: and Zeeb
  chosen_spanish: y Zeeb
  alternatives_spanish:
  - y como Zeeb
  - y Zeb
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y la coordinación simple del inglés POB; el valor comparativo ya queda cubierto por la construcción del verso y por el paralelo con el primer hemistiquio.
- source_word: וּכְזֶבַח
  english_pob_choice: like Zebah
  chosen_spanish: como Zebah
  alternatives_spanish:
  - como Sébah
  - como Zebaj
  lexicon: HALOT
  rationale: Nombre propio histórico del relato de Jueces 8; se translitera siguiendo el audit trail del POB y se conserva la comparación explícita.
- source_word: וּכְצַלְמֻנָּע
  english_pob_choice: and Zalmunna
  chosen_spanish: y Zalmunna
  alternatives_spanish:
  - y como Zalmunna
  - y Salmunna
  lexicon: HALOT
  rationale: Se conserva el nombre propio y la conjunción simple, como en el POB inglés, manteniendo la fluidez española sin perder la referencia histórica.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - todos
  - a cada uno de
  lexicon: HALOT
  rationale: El cuantificador se expresa con claridad en español mediante "a todos", que refleja la totalidad de los dirigentes del segundo hemistiquio.
- source_word: נְסִיכֵמוֹ
  english_pob_choice: their princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus jefes
  - sus gobernantes
  lexicon: HALOT
  rationale: '"Príncipes" preserva el sentido de líderes o gobernantes de alto rango y conserva el paralelismo elevado con "nobles". En español bíblico suena digno y distingue este término de otros más generales.'
theological_decisions:
- issue: Alusión histórica a los derrotados de Madián
  english_pob_reading: The verse invokes God's past defeat of Midianite leaders as the pattern for judgment on current enemies.
  chosen_spanish_reading: El verso invoca la derrota previa de los jefes madianitas como patrón de juicio contra los enemigos actuales.
  alternative_spanish_readings:
  - Los nombres funcionan solo como ejemplos genéricos de enemigos vencidos.
  - La referencia histórica queda implícita sin explicitar su vínculo con Jueces.
  rationale: La mención de Oreb, Zeeb, Zebah y Zalmunna remite a figuras históricas concretas de Jueces 7–8. Conservar los nombres y anotar la referencia mantiene la fuerza alusiva del texto sin expandir el sentido en el cuerpo principal.
  doctrine_reference: Jueces 7:25; 8:5–21
translation_notes:
  revision_awareness: El texto inglés final del POB no requirió cambios tras la última revisión; se conservó la decisión de mantener los nombres propios históricos y la comparación explícita del versículo.
  spanish_consistency_notes:
  - Se mantuvo "nobles" frente a "príncipes" para preservar el paralelismo semántico del hebreo.
  - Se transliteraron los nombres propios históricos para conservar la alusión a Jueces.
  - La preposición comparativa "como" aparece con Oreb y Zebah, y el paralelismo permite omitirla en los nombres coordinados siguientes sin perder el sentido.
  - Se evitó "SEÑOR" y "Cristo" porque no corresponden al léxico de este versículo.
