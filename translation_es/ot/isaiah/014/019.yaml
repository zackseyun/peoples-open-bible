  rationale: Se ajusta el español para reflejar mejor el matiz de muerte violenta en הֲרֻגִים y מְטֹעֲנֵי חָרֶב, y para usar un término funerario más natural en español para בּוֹר. Se mantiene la decisión 'rama' para evitar resonancias mesiánicas indebidas y se conservan las notas del POB con leve adaptación terminológica.
