- from: Entonces sacrificaron el toro y llevaron al muchacho a Eli[a][b].
  to: Entonces sacrificaron el toro y llevaron al niño ante Elí[a][b].
  rationale: Se corrige la ortografía de «Elí», se ajusta נַעַר a «niño» por el contexto inmediato de Samuel pequeño, y se mejora la fluidez natural del español con «ante Elí» sin apartarse del sentido básico de אֶל.
