  - severity: medium
    issue: «seducido» puede sobrecargar el matiz de וַיִּפְתְּ
    rationale: Aunque es defendible, «seducido» en español puede sonar más intenso o sexualizado. «Atraído» comunica mejor la idea de ser llevado interiormente hacia algo, en línea con la decisión inglesa «enticed».
  - severity: low
    issue: La redacción de la nota puede sonar ligeramente menos natural
    rationale: «Lancé un beso con la mano» se entiende, pero «lancé un beso con mi mano» fluye mejor en español y conserva la imagen del gesto corporal.
