translation:
  language: es
  text: 'Han dicho: «Es vano[a] servir a Dios. ¿Y qué provecho[b] hay en que hayamos guardado lo que él requería[c] y en que hayamos andado en duelo[d] delante de Yahvé de los ejércitos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fútil» en vez de «vano».
    reason: lexical_alternative
  - marker: b
    text: O «ganancia» en vez de «provecho».
    reason: lexical_alternative
  - marker: c
    text: «Lo que él requería» también puede entenderse como «su requerimiento» o «su encargo».
    reason: lexical_alternative
  - marker: d
    text: O «con semblante sombrío» o «con luto»; probablemente alude a un comportamiento de duelo o penitencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁוְא
  english_pob_choice: vain
  chosen_spanish: vano
  alternatives_spanish:
  - fútil
  - vacío
  - sin valor
  lexicon: HALOT
  rationale: שָׁוְא expresa vacuidad, inutilidad o carencia de resultado. «Vano» conserva ese juicio evaluativo y reproduce bien la queja del texto sin volverlo una paráfrasis.
- source_word: עֲבֹד
  english_pob_choice: to serve
  chosen_spanish: servir
  alternatives_spanish:
  - adorar
  lexicon: HALOT
  rationale: Aquí עבד se refiere al servicio debido a Dios de manera amplia, no sólo a un acto litúrgico. «Servir» es la correspondencia más directa y fiel al matiz del hebreo y al POB inglés.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: En este contexto, אֱלֹהִים designa claramente al Dios de Israel; «Dios» es la traducción natural en español.
- source_word: בֶּצַע
  english_pob_choice: profit
  chosen_spanish: provecho
  alternatives_spanish:
  - ganancia
  - beneficio
  lexicon: HALOT
  rationale: בֶּצַע comunica la idea de ganancia o ventaja obtenida. «Provecho» preserva el matiz de utilidad/beneficio en una pregunta retórica natural en español.
- source_word: מִשְׁמַרְתּוֹ
  english_pob_choice: his charge
  chosen_spanish: su encargo
  alternatives_spanish:
  - su obligación
  - lo que exigía
  - su mandato
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת puede referirse a obligación, cargo o deber confiado. «Su encargo» mantiene el sentido de algo encomendado o requerido, sin perder la carga de responsabilidad del término.
- source_word: קְדֹרַנִּית
  english_pob_choice: in mourning
  chosen_spanish: en duelo
  alternatives_spanish:
  - con semblante sombrío
  - con luto
  - tristemente
  lexicon: HALOT
  rationale: El adverbio sugiere un andar oscuro/sombrío asociado con duelo o luto. «En duelo» comunica de forma breve y natural el comportamiento penitencial o doliente que el contexto presupone.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: Con una referencia personal divina, מִפְּנֵי indica estar ante Yahvé. «Delante de» es idiomático en español y conserva la idea de presencia.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé Sebaot
  - Yahvé Todopoderoso
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir יְהוָה como «Yahvé». צְבָאוֹת se vierte como «los ejércitos» para preservar la imaginería del título, en vez de suavizarlo con un equivalente interpretativo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh rather than masking it as the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. Siguiendo la política del proyecto, se preserva el nombre divino con una forma reverente y reconocible en español, sin reemplazarlo por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tono de la queja sobre el servicio a Dios
  english_pob_reading: The verse is a cynical complaint that serving God and keeping his requirements has yielded no benefit.
  chosen_spanish_reading: 'La frase se presenta como una queja cínica: servir a Dios y guardar su encargo no habría traído provecho.'
  alternative_spanish_readings:
  - Una queja más limitada sólo sobre prácticas de duelo
  - Una afirmación neutral sobre observancia religiosa
  rationale: El hebreo une servir a Dios, guardar su encargo y andar en duelo como expresiones relacionadas de una misma conducta piadosa que los hablantes consideran inútil. La traducción conserva ese conjunto y su tono negativo sin añadir contenido doctrinal.
  doctrine_reference: 'Translation philosophy: preserve the source text’s plain sense without importing doctrinal claims'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que hay alto acuerdo con el control cruzado; por ello, el borrador español mantiene la misma estructura semántica y las decisiones léxicas clave del POB inglés, adaptándolas al español con el nombre divino «Yahvé».
  spanish_consistency_notes:
  - 'Se mantiene la secuencia retórica: acusación de inutilidad → pregunta por el provecho → mención del encargo divino → andar en duelo delante de Yahvé de los ejércitos.'
  - Se evita traducir 'servir' por 'adorar' para no estrechar indebidamente עבד.
  - «Delante de» conserva la relación espacial/presencial de מִפְּנֵי sin introducir causalidad.
  - El título divino se conserva consistentemente como «Yahvé de los ejércitos», acorde con la política del proyecto.
