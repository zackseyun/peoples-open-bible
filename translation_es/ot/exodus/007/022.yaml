  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יְהוָה se traduce correctamente como ''Yahvé''; no hay conflictos con otras entradas del glosario. La principal desalineación no es terminológica sino de nota exegética: la nota b no preserva la alternativa inglesa (''el corazón de Faraón fue endurecido'') ni su justificación sobre la agencia no explícita.'
