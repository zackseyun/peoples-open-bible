base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/028/021.yaml
  text: The woman came to Saul[a], and when she saw that he was very terrified, she said to him, “Behold, your servant has obeyed your voice[b], and I have put my life in my hand and listened to your words that you spoke to me.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''your maidservant has listened to your voice.'' The expression means she heeded or obeyed Saul''s request.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''I have put my life in my hand,'' that is, ''I have risked my life'' or ''taken my life in my hand.'''
    reason: lexical_alternative
