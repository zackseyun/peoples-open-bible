  rationale: Se conserva la buena estructura del borrador, pero se sustituye «no han abortado» por «no han perdido sus crías[a]» porque suena más natural y más abarcador en español, a la vez que sigue fielmente el campo semántico del hebreo y el propio pie de nota del POB inglés. No se fuerza una especificación más pesada para «ovejas/cabras», porque en español ya suele entenderse como hembras y una expansión adicional haría la frase menos natural.
