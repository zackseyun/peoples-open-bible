  glossary_alignment: 'No hay conflictos con la terminología del proyecto: אֱלֹהִים se traduce correctamente como «Dios»; los nombres Efraín y Manasés están bien; no aparecen términos sensibles como Yahvé/Mesías/esclavo. Se preserva adecuadamente la ambigüedad de «Israel».'
