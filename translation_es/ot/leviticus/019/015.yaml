  text: לֹא תַעֲשׂ֥וּ עָ֨וֶל֙ בַּ/מִּשְׁפָּ֔ט לֹא תִשָּׂ֣א פְנֵי דָ֔ל וְ/לֹ֥א תֶהְדַּ֖ר פְּנֵ֣י גָד֑וֹל בְּ/צֶ֖דֶק תִּשְׁפֹּ֥ט עֲמִיתֶֽ/ךָ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/019/015.yaml
  text: You shall not commit injustice in judgment[a]. You shall not show partiality to the poor, nor defer to the great[b]; with righteousness you shall judge your neighbor.
  footnotes:
  - marker: a
    text: Or 'with justice you shall judge your neighbor.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew idioms literally read 'lift up the face of the poor' and 'honor the face of the great,' meaning to show favoritism or deferential partiality in court.
    reason: cultural_note
