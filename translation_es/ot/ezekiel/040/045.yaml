translation:
  language: es
  text: 'Entonces me habló: «Esta cámara, cuya parte delantera da hacia el sur, es para los sacerdotes que tienen a su cargo el templo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la casa». En este contexto de la visión del templo, el término hebreo suele referirse al templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אֵלַי
  english_pob_choice: Then he spoke to me
  chosen_spanish: Entonces me habló
  alternatives_spanish:
  - Y me dijo
  lexicon: HALOT
  rationale: El wayyiqtol marca continuación narrativa; «entonces» conserva la progresión, y «me habló» reproduce bien el valor introductorio del discurso directo en un español natural y digno.
- source_word: זֹה הַלִּשְׁכָּה
  english_pob_choice: This chamber
  chosen_spanish: Esta cámara
  alternatives_spanish:
  - Este cuarto
  - Esta sala
  lexicon: HALOT
  rationale: לִשְׁכָּה en contexto arquitectónico del templo designa una estancia/chamber. «Cámara» es más preciso y formal que «cuarto» o «sala» para una dependencia del complejo del templo.
- source_word: פָּנֶיהָ דֶּרֶךְ הַדָּרוֹם
  english_pob_choice: whose front faces south
  chosen_spanish: cuya parte delantera da hacia el sur
  alternatives_spanish:
  - que da hacia el sur
  - cuya fachada mira al sur
  lexicon: HALOT
  rationale: פָּנִים con sufijo en descripción espacial alude al frente o lado frontal. «Parte delantera» conserva la concreción arquitectónica sin sonar forzado en español; «da hacia» expresa orientación.
- source_word: דָּרוֹם
  english_pob_choice: south
  chosen_spanish: el sur
  alternatives_spanish:
  - el lado sur
  lexicon: HALOT
  rationale: La dirección cardinal es directa aquí. «El sur» mantiene la referencia espacial simple y clara.
- source_word: לַכֹּהֲנִים
  english_pob_choice: is for the priests
  chosen_spanish: es para los sacerdotes
  alternatives_spanish:
  - pertenece a los sacerdotes
  - está destinado a los sacerdotes
  lexicon: HALOT
  rationale: El ל prefijado expresa destino o asignación. En español, «es para» comunica bien uso designado sin añadir matices de propiedad no necesarios.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת
  english_pob_choice: who keep charge
  chosen_spanish: que guardan el encargo
  alternatives_spanish:
  - que cumplen la función
  - que están a cargo
  lexicon: HALOT
  rationale: La raíz שׁמר con el sustantivo cognado expresa desempeño fiel de una obligación o custodia asignada. «Guardan el encargo» conserva el sentido de responsabilidad encomendada mejor que un giro más genérico.
- source_word: הַבָּיִת
  english_pob_choice: the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - de la casa
  lexicon: HALOT
  rationale: En la visión del templo de Ezequiel, הַבָּיִת se refiere al templo. «Templo» evita la ambigüedad de «casa» y sigue la decisión contextual documentada en el POB inglés.
theological_decisions:
- issue: Referente de הַבָּיִת en la visión del templo
  english_pob_reading: the temple
  chosen_spanish_reading: el templo
  alternative_spanish_readings:
  - la casa
  rationale: No hay disputa doctrinal, pero el contexto arquitectónico de la visión hace explícito que el referente es el templo. Mantener «templo» en español preserva la claridad y la decisión contextual del POB inglés sin introducir interpretaciones ajenas.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Alineado con el pasaje fuente y con la revisión inglesa más reciente, que no introdujo cambios; se conserva la solución contextual para הַבָּיִת y el valor arquitectónico de לִשְׁכָּה.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con español actual.
  - «Cámara» se usó como término arquitectónico más preciso que «cuarto».
  - Se conservó la metáfora espacial concreta de «frente»/«parte delantera» para פָּנֶיהָ.
  - «Encargo» refleja la idea de responsabilidad asignada sin forzar un tecnicismo litúrgico.
