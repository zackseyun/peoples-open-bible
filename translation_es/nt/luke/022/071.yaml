translation:
  language: es
  text: 'Entonces dijeron: «¿Qué más necesidad[a] tenemos de testimonio? Porque nosotros mismos lo hemos oído de su propia boca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué otra necesidad tenemos de testimonio?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: Then they said
  chosen_spanish: Entonces dijeron
  alternatives_spanish:
  - Y dijeron
  - Pero dijeron
  lexicon: BDAG
  rationale: δέ aquí avanza la escena con continuidad narrativa. «Entonces» conserva el flujo sin forzar una oposición fuerte.
- source_word: Τί ἔτι
  english_pob_choice: What further need do we have of testimony?
  chosen_spanish: ¿Qué necesidad tenemos todavía?
  alternatives_spanish:
  - ¿Qué otra necesidad tenemos?
  - ¿Qué más necesidad tenemos todavía?
  lexicon: BDAG
  rationale: La pregunta retórica en español suena más natural como «¿Qué necesidad tenemos todavía?», manteniendo ἔτι como «todavía» y el tono judicial del planteamiento.
- source_word: ἔχομεν μαρτυρίας χρείαν
  english_pob_choice: need of testimony
  chosen_spanish: necesidad de testimonio
  alternatives_spanish:
  - necesidad de testimonio adicional
  - necesidad de testimonio/witness
  lexicon: BDAG
  rationale: χρείαν ἔχειν expresa necesidad; μαρτυρίας en este contexto forense se rinde mejor como «testimonio» en español eclesiástico y jurídico.
- source_word: αὐτοὶ γὰρ
  english_pob_choice: For we ourselves
  chosen_spanish: Porque nosotros mismos
  alternatives_spanish:
  - Pues nosotros mismos
  - Porque nosotros mismos, en persona
  lexicon: BDAG
  rationale: El énfasis de αὐτοὶ se conserva con «nosotros mismos», resaltando que ellos lo oyeron directamente.
- source_word: ἠκούσαμεν
  english_pob_choice: have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  - hemos escuchado
  lexicon: BDAG
  rationale: El perfecto español «hemos oído» refleja bien la relevancia presente de la experiencia, como en la decisión inglesa.
- source_word: ἀπὸ τοῦ στόματος αὐτοῦ
  english_pob_choice: from his own mouth
  chosen_spanish: de su propia boca
  alternatives_spanish:
  - de su propia boca
  - de su boca
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de forma natural en español con «de su propia boca», preservando la fuerza de la declaración directa.
theological_decisions:
- issue: Si explicitar el contenido de lo oído
  english_pob_reading: 'Kept the statement formally general: ''we ourselves have heard it from his own mouth'''
  chosen_spanish_reading: 'Se mantiene la formulación general: «nosotros mismos lo hemos oído de su propia boca»'
  alternative_spanish_readings:
  - nosotros mismos hemos oído su declaración de su propia boca
  - hemos oído su testimonio de su propia boca
  rationale: El griego no añade objeto explícito a «hemos oído»; por eso conviene no interpretar más de lo que dice el texto. La redacción conserva la tensión judicial y la brevedad del original.
  doctrine_reference: Preservar la tensión textual sin resolverla de manera interpretativa.
translation_notes:
  revision_awareness: Se corrigió el problema anterior de validación anclando la nota [a] directamente en el texto y manteniendo una sola nota para la alternativa lexical principal, coherente con el audit trail inglés.
  spanish_consistency_notes:
  - Se prefirió «testimonio» sobre «evidencia» o «testigo» por el marco forense del versículo.
  - Se usó «de su propia boca» para reflejar el modismo del griego y la decisión inglesa de enfatizar la inmediatez y la autorreferencia.
  - Se evitó traducir de manera demasiado calcada «What further need do we have»; el español conserva el sentido retórico con sintaxis natural.
