    text: 'O: «por su culpa»; «iniquidad» conserva mejor el peso moral y judicial del hebreo עָוֺן.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en la mano de sus adversarios», un hebraísmo para quedar bajo su poder.'
    reason: lexical_alternative
  revision_rationale: Se ajusta גָּלוּ a una formulación menos pasiva y más cercana a la decisión auditada (‘fue al exilio’), se mejora la naturalidad de la expresión idiomática divina con ‘escondí mi rostro de ellos’, y se normaliza el hebraísmo en español con ‘en manos de sus adversarios’ mientras la nota conserva el singular literal.
