translation:
  language: es
  text: Mi corazón palpita; mi fuerza me ha dejado, y la luz[a] de mis ojos tampoco está conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la luz en mis ojos»; la expresión hebrea puede referirse a la vista misma o al brillo o vitalidad reflejados en los ojos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  - mi ser interior
  lexicon: HALOT
  rationale: לֵב/לֵבָב suele denotar el corazón como centro de la vida interior, y en un lamento físico como este la imagen corporal conserva mejor el tono poético que 'mente' o una abstracción.
- source_word: סְחַרְחַר
  english_pob_choice: throbs
  chosen_spanish: palpita
  alternatives_spanish:
  - late con fuerza
  - se agita
  - da vueltas
  lexicon: HALOT
  rationale: El término sugiere agitación o movimiento circular; en este contexto de sufrimiento corporal, 'palpita' comunica bien el latido alterado sin perder naturalidad en español.
- source_word: עֲזָבַנִי
  english_pob_choice: has left me
  chosen_spanish: me ha dejado
  alternatives_spanish:
  - me ha abandonado
  - me ha desamparado
  lexicon: HALOT
  rationale: עזב significa 'dejar, abandonar'. Aquí el sujeto es la fuerza, así que 'me ha dejado' expresa el debilitamiento de manera idiomática sin cargar innecesariamente el verbo con matiz covenantal.
- source_word: כֹחִי
  english_pob_choice: my strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - mi fuerza
  - mi vigor
  - mi poder
  lexicon: HALOT
  rationale: 'כֹחַ se refiere a fuerza o vigor vital. En español, para mantener el flujo poético con el verbo anterior, se formula como sujeto implícito recuperable: ''me ha dejado la fuerza''.'
- source_word: וְאוֹר עֵינַי
  english_pob_choice: the light of my eyes
  chosen_spanish: la luz de mis ojos
  alternatives_spanish:
  - el brillo de mis ojos
  - la luz en mis ojos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea con una formulación natural en español. 'La luz de mis ojos' mantiene la ambigüedad entre vista y vivacidad/brillo, tal como en el original.
- source_word: גַּם הֵם
  english_pob_choice: even they
  chosen_spanish: incluso ellos
  alternatives_spanish:
  - también ellos
  - aun ellos
  lexicon: HALOT
  rationale: El pronombre plural concuerda con 'ojos'. 'Incluso ellos' reproduce el énfasis de גַּם y preserva la referencia plural, aunque en español la construcción queda mejor integrada si se coloca entre rayas.
- source_word: אֵין אִתִּי
  english_pob_choice: are not with me
  chosen_spanish: no está conmigo
  alternatives_spanish:
  - no están conmigo
  - me han faltado
  - se han ido de mí
  lexicon: HALOT
  rationale: La expresión literalmente significa 'no están conmigo'. Dado que 'luz' es singular en español, se opta por 'no está conmigo' para respetar la sintaxis española y conservar el sentido poético abierto entre visión y vitalidad.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB sobre el pronombre plural: el hebreo usa הֵם (''ellos'') y por eso el español conserva ''ellos'', aunque la construcción se adapta para que sea natural y gramaticalmente clara en español. También se preservó la ambigüedad poética de ''la luz de mis ojos'' sin forzar una única interpretación.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece el nombre divino en este texto.
  - Se usó un registro reverente pero moderno, evitando arcaísmos innecesarios.
  - Se conservó la tensión entre visión y vitalidad en 'la luz de mis ojos'.
  - El plural hebreo del pronombre se reflejó explícitamente en 'ellos'.
