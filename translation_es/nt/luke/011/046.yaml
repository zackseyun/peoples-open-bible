    text: Or 'experts in the law.' The Greek term refers to specialists in the Jewish law.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not lay a finger on the burdens.' The expression emphasizes that they make no effort to help with what they impose on others.
    reason: lexical_alternative
