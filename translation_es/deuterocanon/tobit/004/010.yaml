review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: ἐλεημοσύνη como acción concreta de dar a los necesitados, ῥύεται como rescata/libra, y la afirmación directa sobre ser librado de la muerte sin suavización doctrinal. Sin embargo, ''no permite entrar en las tinieblas'' queda algo menos natural e impersonal en español que una formulación con objeto explícito, y puede sonar más rígida que el inglés auditado (''does not allow one to enter into darkness'').'
  spanish_quality_summary: 'El español es claro y digno, con buena elección de ''limosna'' y ''rescata''. La principal mejora estilística es hacer explícito el complemento humano implícito en el infinitivo: ''no deja que uno entre'' o equivalente. Además, ''en las tinieblas'' es aceptable, pero ''en la oscuridad'' suena más natural; con todo, dado el registro bíblico y la nota, ''tinieblas'' puede mantenerse. Conviene ajustar la sintaxis para mayor fluidez sin perder literalidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Limosna' está bien justificado para ἐλεημοσύνη. 'Rescata' sigue la decisión inglesa de evitar 'salva'. 'Tinieblas' es una opción española válida para σκότος por registro bíblico, aunque no es la más llana; la nota preserva la apertura semántica.
  issues:
  - severity: medium
    issue: Sintaxis algo rígida en 'no permite entrar en las tinieblas'
    rationale: En español, con 'permitir' suele sonar más natural explicitar el sujeto tácito del infinitivo ('no permite que uno entre...'). La redacción actual es comprensible, pero menos idiomática y menos transparente para lectura pública.
  - severity: low
    issue: Falta de reflejo del referente humano implícito
    rationale: El inglés POB explicita 'one'. El griego lo deja implícito, pero en español conviene expresarlo para claridad. 'No deja que uno entre...' preserva el sentido sin añadir interpretación doctrinal.
  revised_spanish_text: Porque la limosna[a] rescata de la muerte y no deja que uno entre en las tinieblas[b].
  revised_footnotes:
  - marker: a
    text: O 'caridad' o 'actos de misericordia'; el griego se refiere concretamente a dar limosnas a los necesitados.
    reason: lexical_alternative
  - marker: b
    text: '''Tinieblas'' probablemente evoca el ámbito de la muerte o una profunda desdicha; el griego deja la imagen breve y algo abierta.'
    reason: alternative_reading
  revision_rationale: 'Se ajusta la sintaxis a un español más natural y claro al explicitar el referente humano implícito en el infinitivo: ''no deja que uno entre...''. Se conserva ''limosna'', ''rescata'' y ''tinieblas'' por fidelidad al sentido fuente y a las decisiones léxicas documentadas.'
