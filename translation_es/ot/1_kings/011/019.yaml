translation:
  language: es
  text: Hadad halló gran favor ante los ojos de Faraón, y este le dio por esposa a la hermana de la propia esposa del Faraón[a], la hermana de Tahpenes, la reina madre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probablemente, 'la hermana de su esposa' podría entenderse como referencia a la esposa de Hadad, no a la de Faraón.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: ''la gran dama''; el título probablemente se refiere a la reina madre o a la principal dama real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא ... חֵן בְּעֵינֵי
  english_pob_choice: found great favor in ... eyes
  chosen_spanish: halló gran favor[a] ante los ojos de
  alternatives_spanish:
  - encontró gracia ante los ojos de
  - gozó de gran favor ante
  lexicon: HALOT
  rationale: Conservo el modismo hebreo de 'hallar favor/gracia ante los ojos de' con una fórmula natural en español. 'Gran' expresa מְאֹד como intensificador. Mantengo 'ojos' porque el texto lo usa de modo idiomático y no solo como una imagen estética.
- source_word: פַרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Pharaón
  lexicon: HALOT
  rationale: '''Faraón'' es la forma establecida y natural en español bíblico para el título egipcio.'
- source_word: מְאֹד
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - muy
  - en gran manera
  lexicon: HALOT
  rationale: En español, 'gran favor' conserva la intensificación sin volver pesada la frase. Evita una adverbialidad dura como 'favor muy' o una expansión innecesaria.
- source_word: וַיִּתֶּן לוֹ אִשָּׁה
  english_pob_choice: he gave him as a wife
  chosen_spanish: le dio por esposa
  alternatives_spanish:
  - le dio una esposa
  - lo casó con
  lexicon: HALOT
  rationale: La construcción hebrea indica que la mujer fue dada en matrimonio. 'Le dio por esposa' expresa el sentido marital sin añadir más de lo que el hebreo sostiene.
- source_word: אֶת אֲחוֹת אִשְׁתּוֹ
  english_pob_choice: the sister of his own wife
  chosen_spanish: la hermana de su propia mujer
  alternatives_spanish:
  - la hermana de su esposa
  - la hermana de la mujer de él
  lexicon: HALOT
  rationale: Mantengo la ambigüedad referencial que el inglés POB documenta, pero en español la frase más directa es 'su propia mujer'. Así queda claro que el poseedor del sustantivo puede entenderse como Faraón en el contexto, sin resolverlo de forma excesiva en el cuerpo del texto.
- source_word: אֲחוֹת תַּחְפְּנֵיס
  english_pob_choice: the sister of Tahpenes
  chosen_spanish: la hermana de Tahpenes
  alternatives_spanish:
  - la hermana de Tahpenes
  - hermana de Tahpenes
  lexicon: HALOT
  rationale: Sigo el apposicional del hebreo y del inglés POB, identificando a la mujer por su relación con Tahpenes sin añadir títulos o precisiones no explícitas en el texto base.
- source_word: הַגְּבִירָה
  english_pob_choice: the queen mother
  chosen_spanish: la gran dama
  alternatives_spanish:
  - la reina madre
  - la señora principal
  lexicon: HALOT
  rationale: '''הַגְּבִירָה'' significa literalmente ''la gran dama''. Dado que el POB inglés conserva la tensión entre un título literal y una identificación funcional, prefiero en el texto principal la forma más cercana al hebreo. En español, ''reina madre'' sería interpretativo; por eso lo dejo fuera del cuerpo y lo explico en nota.'
theological_decisions:
- issue: Sentido del título הַגְּבִירָה
  english_pob_reading: the queen mother
  chosen_spanish_reading: la gran dama
  alternative_spanish_readings:
  - la reina madre
  - la dama principal
  rationale: El hebreo usa un título cortesano cuya traducción funcional varía según el contexto. La opción del texto principal preserva la literalidad semántica ('gran dama') y deja visible la posible lectura institucional ('reina madre') sin imponerla como única equivalencia.
  doctrine_reference: No aplica doctrina; decisión de título y equivalencia léxica.
- issue: Referente de 'su propia mujer'
  english_pob_reading: The pronoun refers to Pharaoh, so Pharaoh gave Hadad the sister of Pharaoh’s wife.
  chosen_spanish_reading: El pronombre puede entenderse como referido a Faraón; así, Faraón dio a Hadad la hermana de la mujer de Faraón.
  alternative_spanish_readings:
  - El pronombre podría referirse a Hadad, de modo que Faraón le dio la hermana de la mujer de Hadad.
  rationale: El contexto narrativo favorece que el poseedor sea Faraón, tal como lo recoge el audit trail inglés. Sin embargo, el hebreo permite la ambigüedad relativa; por eso no la elimino por completo en el texto principal y la dejo reconocible en la formulación.
  doctrine_reference: No aplica doctrina; cuestión de referencia pronominal y contexto narrativo.
translation_notes:
  revision_awareness: 'He seguido el pasaje hebreo de 1 Reyes 11:19 y el audit trail inglés POB sin depender mecánicamente del inglés. La revisión inglesa más reciente no introdujo cambios, y el control cruzado señaló una concordancia general alta con una cuestión principal: el alcance del título הַגְּבִירָה. En español mantengo la tensión entre el valor literal del hebreo y la lectura funcional conocida, resolviendo el cuerpo del texto con ''la gran dama'' y explicando la alternativa en nota.'
  spanish_consistency_notes:
  - Uso 'Faraón' para el título egipcio y 'Hadad' como nombre propio sin transliteración adicional.
  - Mantengo 'ojos' en la expresión idiomática para reflejar el hebreo y el POB inglés.
  - Evito 'Cristo' o terminología eclesiástica no pertinente; el pasaje es narrativo-cortesano.
  - Conservo una formulación que permite la ambigüedad referencial del posesivo sin forzarla en exceso.
