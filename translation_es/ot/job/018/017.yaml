translation:
  language: es
  text: Su recuerdo perece de la tierra[a], y no tiene nombre en la calle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su recuerdo se desvanece del país, y no tiene nombre en la plaza pública».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוֹ
  english_pob_choice: his memory
  chosen_spanish: su recuerdo
  alternatives_spanish:
  - su memoria
  - el recuerdo de él
  lexicon: HALOT
  rationale: El sustantivo זכר aquí expresa la idea de recuerdo o memoria retenida por otros. «Su recuerdo» mantiene el sentido de la desaparición de lo que queda de él en la memoria pública y suena natural en español.
- source_word: אָבַד
  english_pob_choice: perishes
  chosen_spanish: perece
  alternatives_spanish:
  - se pierde
  - desaparece
  - se desvanece
  lexicon: HALOT
  rationale: אָבַד puede significar perecer, perderse o desaparecer. «Perece» conserva la fuerza sobria y tajante del juicio poético, sin suavizarlo.
- source_word: מִנִּי אָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la tierra
  - del país
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede ser «tierra» o «país», en este contexto la imagen es de borrado total. «De la tierra» reproduce bien el alcance universal y poético del hebreo.
- source_word: וְלֹא שֵׁם לוֹ
  english_pob_choice: and he has no name
  chosen_spanish: y no tiene nombre
  alternatives_spanish:
  - y no le queda nombre
  - y no hay nombre para él
  - y no posee nombre
  lexicon: HALOT
  rationale: שֵׁם puede implicar nombre, reputación o identidad. «No tiene nombre» es idiomático en español y conserva la idea de no quedar ninguna fama ni reconocimiento duradero.
- source_word: עַל־פְּנֵי
  english_pob_choice: on the face of
  chosen_spanish: sobre la faz de
  alternatives_spanish:
  - en la superficie de
  - ante
  lexicon: HALOT
  rationale: La expresión idiomática literalmente dice «sobre la faz de». Mantener «sobre la faz de» preserva la imaginería poética y la estructura del hebreo.
- source_word: חוּץ
  english_pob_choice: the street
  chosen_spanish: la calle
  alternatives_spanish:
  - la plaza pública
  - el lugar público
  - la calle
  lexicon: HALOT
  rationale: חוּץ puede designar el exterior o el espacio público. «La calle» comunica de forma clara la esfera pública donde un nombre sería conocido, sin sobreexplicar el matiz.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, con un ajuste estilístico mínimo en «sobre la faz de la calle» para mantener la imagen poética sin perder claridad en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el sistema general de la obra, aunque este versículo no contiene el nombre divino.
  - Se optó por «recuerdo» frente a «memoria» porque en español actual suena más natural con el verbo «perece» y conserva el matiz de reputación desaparecida.
  - «Calle» traduce el espacio público de חוּץ; la nota alternativa preserva la posibilidad de «plaza pública» para lectores que prefieran un matiz más explícito.
