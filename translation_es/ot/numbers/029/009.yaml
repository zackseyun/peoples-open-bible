translation:
  language: es
  text: 'y su ofrenda de cereal: flor de harina mezclada con aceite[a], tres décimas para el toro, dos décimas para el único carnero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tres décimas» y «dos décimas»; se refieren a medidas de un décimo, tradicionalmente entendidas como décimas de un efa.'
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  english_pob_choice: and their grain offering
  chosen_spanish: y su ofrenda de cereal
  alternatives_spanish:
  - y su ofrenda
  - y su oblación
  - y su ofrenda vegetal
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacrificial se refiere a la ofrenda de cereal/grano que acompaña a los sacrificios. "Ofrenda de cereal" conserva el sentido cultual y evita una expresión demasiado técnica o eclesiástica.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: סֹלֶת designa harina finamente molida y de calidad para ofrendas. "Flor de harina" es la equivalencia bíblica natural en español y comunica bien la idea de harina fina.
- source_word: בְּלוּלָה בַשָּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada con óleo
  - amasada con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica que la harina ha sido combinada con aceite. "Mezclada con aceite" es claro y fiel; "óleo" sería más tradicional pero menos natural hoy.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  english_pob_choice: three-tenths
  chosen_spanish: tres décimas
  alternatives_spanish:
  - tres décimos
  - tres medidas de un décimo
  lexicon: HALOT
  rationale: עִשָּׂרוֹן es una medida de un décimo. "Tres décimas" reproduce la cuantificación breve del inglés POB y mantiene el carácter procedimental del texto.
- source_word: לַפָּר
  english_pob_choice: for the bull
  chosen_spanish: para el toro
  alternatives_spanish:
  - para el buey
  - para el novillo
  lexicon: HALOT
  rationale: פָּר denota un toro o novillo apto para sacrificio. "Toro" es preciso y suficientemente amplio en español bíblico; evita especificaciones no garantizadas por el hebreo.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: two-tenths
  chosen_spanish: dos décimas
  alternatives_spanish:
  - dos décimos
  - dos medidas de un décimo
  lexicon: HALOT
  rationale: Como en la línea anterior, se conserva la medida fraccionaria de forma compacta y clara.
- source_word: לָאַיִל הָאֶחָד
  english_pob_choice: for the one ram
  chosen_spanish: para el carnero uno
  alternatives_spanish:
  - para el único carnero
  - para el carnero único
  lexicon: HALOT
  rationale: אִיל es un carnero. Se eligió "carnero uno" para reflejar la fuerza del hebreo con artículo + "uno" como elemento de enumeración; es menos natural que "el carnero uno" pero conserva la especificidad formal del original sin expandir el sentido.
theological_decisions:
- issue: Medidas sacrificiales abreviadas
  english_pob_reading: Hebrew 'three-tenths' and 'two-tenths' refer to tenth-measures, traditionally understood as tenths of an ephah.
  chosen_spanish_reading: Las expresiones "tres décimas" y "dos décimas" se mantienen como medidas abreviadas, entendidas tradicionalmente como décimas de un efa.
  alternative_spanish_readings:
  - tres décimas de un efa, dos décimas de un efa
  - tres medidas de un décimo, dos medidas de un décimo
  rationale: El texto hebreo usa una abreviación de medida propia del rito. La traducción principal conserva esa brevedad; la nota aclara la unidad implícita sin introducir una paráfrasis innecesaria en el texto.
  doctrine_reference: Torá sacrificial / medidas rituales en Números 28–29
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el auditor English POB: se mantiene la estructura litúrgica, la especificación de la ofrenda de cereal, la combinación con aceite y las medidas fraccionarias abreviadas. No se detectaron revisiones posteriores ni cambios pendientes.'
  spanish_consistency_notes:
  - Se usa "ofrenda de cereal" para מִנְחָה en contexto sacrificial, consistente con el sentido técnico del pasaje.
  - Se mantiene "flor de harina" como equivalente natural de סֹלֶת en español bíblico.
  - Las fracciones se expresan como "décimas" para conservar la brevedad procedural del hebreo y del inglés POB.
  - '"Toro" y "carnero" conservan la identificación sacrificial sin añadir matices no presentes en el hebreo.'
