    rationale: El verbo hebreo en nifal expresa que las profundidades ‘fueron abiertas/partidas’ o ‘se abrieron’. En español, «fueron partidos» aplicado a «abismos» suena forzado y menos idiomático que «fueron abiertos» o «se abrieron», y no preserva bien la vividez de ‘split open’.
  - severity: low
    issue: Ligera tensión entre «abismos» en el texto y «las profundidades» como primera alternativa de nota
    rationale: No es incorrecto, pero conviene que el texto principal y la nota muestren que «abismos» es una elección interpretativamente más fuerte. La nota actual ya lo permite, así que no exige más cambio.
