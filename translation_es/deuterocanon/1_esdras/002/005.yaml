base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/002/005.yaml
  text: Therefore[a], if any of you is from his people, may his Lord be with him[c][b], and let him go up to Jerusalem in Judea and build the house of the Lord of Israel—he is the Lord who dwells in Jerusalem.
  footnotes:
  - marker: a
    text: The Greek shifts from singular ('if any of you ... may his Lord be with him') to plural ('let them build'). The translation preserves this number shift rather than smoothing it out.
    reason: textual_variant
  - marker: b
    text: The Hebrew parallel in Ezra differs notably at this point, speaking instead of support with silver, gold, goods, and animals, along with a freewill offering for the house of God in Jerusalem. 1 Esdras here follows a different Greek form of the tradition.
    reason: alternative_reading
  - marker: c
    text: Or, 'who made his dwelling in Jerusalem.'
    reason: lexical_alternative
