lexical_decisions:
- source_word: שֹׁמְרֵי
  english_pob_choice: those who keep
  chosen_spanish: los que guardan
  alternatives_spanish:
  - los que cumplen
  - los que observan
  - guardianes de
  lexicon: HALOT
  rationale: El participio de שׁמר puede expresar guardar, vigilar u observar. En un contexto de pacto, «guardan» conserva bien la idea de fidelidad activa y resulta natural en español bíblico actual.
- source_word: בְרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  lexicon: HALOT
  rationale: בְּרִית suele referirse al pacto de Dios con su pueblo. «Pacto» mantiene el peso bíblico y teológico del término mejor que alternativas más seculares.
- source_word: וּלְזֹכְרֵי
  english_pob_choice: and to those who remember
  chosen_spanish: y a los que recuerdan
  alternatives_spanish:
  - y a los que tienen presente
  - y a los que hacen memoria de
  lexicon: HALOT
  rationale: זכר en participio aquí no es solo recuerdo mental, sino atención fiel que conduce a obediencia. «Recuerdan» es claro y conserva la relación con la cláusula final.
- source_word: פִקֻּדָיו
  english_pob_choice: his precepts
  chosen_spanish: sus preceptos
  alternatives_spanish:
  - sus instrucciones
  - sus mandatos
  - sus órdenes
  lexicon: HALOT
  rationale: פִּקּוּדִים en los Salmos suele referirse a las instrucciones o mandatos de Yahvé. «Preceptos» es una equivalencia estable y precisa en español bíblico.
- source_word: לַעֲשׂוֹתָם
  english_pob_choice: to do them
  chosen_spanish: para cumplirlos
  alternatives_spanish:
  - para hacerlos
  - a fin de ponerlos por obra
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Para cumplirlos» comunica de modo natural la orientación práctica del recuerdo, sin añadir más de lo que el hebreo dice.
theological_decisions:
- issue: Relación entre recordar y obedecer
  english_pob_reading: remember his precepts, to do them
  chosen_spanish_reading: recuerdan sus preceptos, para cumplirlos
  alternative_spanish_readings:
  - recuerdan sus preceptos, para hacerlos
  - tienen presente sus preceptos, para ponerlos por obra
  rationale: La sintaxis hebrea vincula el recuerdo con la acción. La traducción mantiene esa unión práctica y obediente sin convertirla en una explicación doctrinal ajena al verso.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «so as to do them» a «to do them» para conservar con mayor literalidad el infinitivo final hebreo. La versión española sigue esa economía, usando «para cumplirlos» para expresar finalidad sin ampliar el sentido.
  spanish_consistency_notes:
  - Se mantiene «pacto» para בְרִית y «preceptos» para פִּקּוּדִים, coherentes con el uso bíblico técnico.
  - Se conserva la estructura paralela del versículo con dos grupos descritos por participios y una cláusula final de propósito.
  - No se usa «SEÑOR» como máscara; en este versículo no aparece el Tetragrámaton explícito, pero el posesivo «su» remite al referente divino del contexto salmódico.
