translation:
  language: es
  text: Por tanto, sus hombres jóvenes caerán en sus calles[a], y todos los hombres de guerra serán silenciados[b] en aquel día, declara Yahvé de los Ejércitos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en sus plazas» o «en sus lugares abiertos».
    reason: lexical_alternative
  - marker: b
    text: O «perecerán» o «serán eliminados». El verbo hebreo puede expresar quedar silenciado, inmovilizado o reducido a ruina.
    reason: lexical_alternative
  - marker: c
    text: 'Rendición tradicional: «el SEÑOR de los ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: La partícula inferencial introduce la consecuencia del juicio previo. «Por tanto» mantiene el valor conclusivo con un registro bíblico natural en español.
- source_word: יִפְּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se desplomarán
  - morirán
  lexicon: HALOT
  rationale: El verbo expresa caída en contexto militar, con implicación de muerte sin explicitarla en exceso. «Caerán» conserva la imagen hebrea y el alcance abierto del original.
- source_word: בַחוּרֶיהָ
  english_pob_choice: her young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus hombres jóvenes
  - sus mozos
  lexicon: HALOT
  rationale: בָּחוּר se refiere a varones jóvenes en edad vigorosa, especialmente aptos para la guerra. «Sus jóvenes» es natural en español y mantiene la referencia masculina mediante el contexto inmediato.
- source_word: בִּרְחֹבֹתֶיהָ
  english_pob_choice: in her streets
  chosen_spanish: en sus calles
  alternatives_spanish:
  - en sus plazas
  - en sus lugares abiertos
  lexicon: HALOT
  rationale: רְחוֹב puede significar calle ancha, plaza o espacio abierto. «Calles» es idiomático y comunica bien la escena urbana; la alternativa más amplia queda implícita en la nota.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los guerreros
  - los combatientes
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática hebrea de forma transparente. «Hombres de guerra» mantiene el matiz masculino y bélico sin suavizarlo a un término más general.
- source_word: יִדַּמּוּ
  english_pob_choice: will be silenced
  chosen_spanish: quedarán silenciados
  alternatives_spanish:
  - perecerán
  - serán exterminados
  - quedarán destruidos
  lexicon: HALOT
  rationale: El nifal de דמם/דמה en contextos de juicio puede indicar ser silenciado, quedando inmóvil o reducido a ruina. «Quedarán silenciados» preserva la imagen y deja abierta la tensión semántica documentada por el audito.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se traduce con una expresión natural y solemne. «En aquel día» conserva el valor deíctico y el tono bíblico.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: La fórmula profética de autenticación divina se rinde con un verbo claro y formal en español. «Declara» es fiel y comprensible sin perder solemnidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según la norma del proyecto: transliteración del Tetragrámaton como «Yahvé», evitando la sustitución por un título.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: El título se vierte de manera transparente y directamente militar. «De los Ejércitos» comunica el matiz de poder bélico que el contexto subraya.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la doctrina del proyecto, se preserva el nombre propio divino en español como «Yahvé», no un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título divino YHWH Sabaoth
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  - el SEÑOR de los ejércitos
  rationale: La expresión hebrea tiene fuerza militar en un oráculo de juicio. «De los Ejércitos» conserva esa fuerza de modo transparente y acorde con el registro del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios. La redacción española mantiene las decisiones auditadas del inglés POB y conserva las tensiones léxicas documentadas sin suavizarlas innecesariamente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton, en continuidad con la terminología del proyecto.
  - Se prefirió «los Ejércitos» para el título divino, siguiendo el sentido militar del contexto.
  - «Hombres de guerra» conserva la fórmula idiomática hebrea sin generalizarla a un término menos preciso.
  - La nota sobre «calles» preserva la alternativa semántica de רְחוֹב sin cargarla en el texto principal.
