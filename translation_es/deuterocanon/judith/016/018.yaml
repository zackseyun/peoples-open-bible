translation:
  language: es
  text: Y cuando llegaron a Jerusalén, adoraron a Dios; y cuando el pueblo se había purificado, ofrecieron sus holocaustos, sus ofrendas voluntarias y sus dones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσεκύνησαν
  english_pob_choice: they worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron ante
  - rindieron culto a
  lexicon: LSJ
  rationale: En este contexto cultual con τῷ θεῷ como objeto, el verbo expresa adoración y no solo el gesto físico. «Adoraron» comunica ese sentido de manera natural en español y evita calcar la postura corporal.
- source_word: ἡνίκα
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  - una vez que
  lexicon: LSJ
  rationale: Introduce una acción temporal posterior dentro del relato. «Cuando» reproduce la relación narrativa con claridad y sin sobrerrepresentar la subordinación.
- source_word: ἐκαθαρίσθη
  english_pob_choice: had been purified
  chosen_spanish: hubo sido purificado
  alternatives_spanish:
  - fue purificado
  - había sido purificado
  lexicon: LSJ
  rationale: El pasivo indica una purificación ritual previa a las ofrendas. La construcción con pluscuamperfecto compuesto mantiene la anterioridad cultual señalada por el inglés, aunque en español la forma simple o el pluscuamperfecto también serían posibles según el flujo narrativo.
- source_word: ὁ λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: LSJ
  rationale: Aquí λαός designa al pueblo reunido de Dios en sentido colectivo. «El pueblo» conserva esa referencia comunitaria sin introducir matices sociológicos ajenos.
- source_word: ἀνήνεγκαν
  english_pob_choice: they offered up
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - ofrecieron en sacrificio
  - alzaron
  lexicon: LSJ
  rationale: En español, el contexto sacrificial ya hace claro el acto cultual; «ofrecieron» comunica el verbo sin un calco poco natural. El contenido sacrificial se mantiene por los sustantivos que siguen.
- source_word: ὁλοκαυτώματα
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - sacrificios totalmente quemados
  lexicon: LSJ
  rationale: Dado el uso técnico del término en el corpus bíblico griego y en la tradición de traducción auditable de la POB, «holocaustos» conserva la equivalencia sacrificial precisa y distingue este término de los otros dos.
- source_word: ἑκούσια
  english_pob_choice: freewill offerings
  chosen_spanish: ofrendas voluntarias
  alternatives_spanish:
  - ofrendas libres
  - sacrificios voluntarios
  lexicon: LSJ
  rationale: El adjetivo expresa carácter voluntario en el marco del culto. «Ofrendas voluntarias» transmite la intención sin depender de una fórmula idiomática inglesa.
- source_word: δόματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - ofrendas
  lexicon: LSJ
  rationale: El término es más amplio que las ofrendas sacrificiales previas. «Dones» conserva esa amplitud y evita colapsar el tercer sustantivo en la misma categoría ritual.
- source_word: Ὡς δὲ ἦλθον
  english_pob_choice: And when they came
  chosen_spanish: Y cuando llegaron
  alternatives_spanish:
  - Ahora, cuando llegaron
  - Pero cuando llegaron
  lexicon: LSJ
  rationale: «Y cuando» conserva la progresión narrativa y el valor aditivo del griego sin forzar contraste. «Llegaron» es el equivalente natural de ἦλθον en este marco.
theological_decisions:
- issue: Naturaleza de la purificación antes de las ofrendas
  english_pob_reading: ritual purification of the people before sacrificial offerings
  chosen_spanish_reading: purificación ritual del pueblo antes de presentar ofrendas
  alternative_spanish_readings:
  - purificación moral del pueblo
  - limpieza general del pueblo
  rationale: El contexto inmediato es Jerusalén y la presentación de holocaustos, ofrendas voluntarias y dones; por eso la purificación debe leerse como cultual/ritual, no como una renovación moral abstracta. La redacción española preserva esa secuencia sin resolver indebidamente la tensión interpretativa.
  doctrine_reference: Preservar la primacía del texto original y la tensión cultual sin armonizarla con categorías doctrinales posteriores
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando toda nota a pie de página no anclada en el texto; la versión actual no contiene marcadores de nota y, por tanto, no requiere objetos de footnote. La redacción sigue de cerca el texto griego y el rastro auditado en inglés, sin dependencia mecánica del inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεῷ según la norma del proyecto.
  - Se eligió «holocaustos» como término técnico para ὁλοκαυτώματα, coherente con la terminología sacrificial bíblica y la distinción entre los tres sustantivos finales.
  - Se prefirió «ofrendas voluntarias» para ἑκούσια y «dones» para δόματα para no fusionar categorías distintas.
  - Se evitó «SEÑOR» porque el texto griego aquí dice θεῷ, no κύριος.
