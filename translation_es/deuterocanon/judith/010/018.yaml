  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: hay agitación en el campamento, la noticia de su llegada/presencia se extiende por las tiendas, la gente se reúne alrededor de ella fuera de la tienda de Holofernes, y luego informan a él sobre ella. Sin embargo, dos puntos requieren ajuste para mayor fidelidad: la nota al pie está anclada en «campamento[a]» pero explica παρουσία, por lo que debe anclarse en «llegada»; y «mientras estaba» debilita ὡς ἱστήκει, que describe su postura, mejor expresada como «mientras estaba de pie» o «mientras permanecía de pie».'
  spanish_quality_summary: 'El español es claro y natural, con tono narrativo adecuado. «Alboroto» funciona, aunque es algo más fuerte que «stir»; aun así sigue dentro del campo semántico de συνδρομή. La frase fluye bien. El principal problema de calidad es técnico y de precisión: la nota está colocada en el lugar equivocado, y «mientras estaba» queda algo incompleto en español y menos preciso que el original.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Campamento», «tiendas», «llegada», «la rodearon» e «informaron acerca de ella» se alinean bien con las decisiones léxicas auditadas. La alternativa de παρουσία como «presencia» debe mantenerse en nota, pero anclada a «llegada».
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada en «campamento», pero su contenido explica «su llegada / su presencia» (παρουσία αὐτῆς).
    rationale: Los marcadores deben aparecer exactamente en la palabra o frase relevante. Tal como está, la nota induce confusión exegética y editorial.
  - severity: medium
    issue: «Mientras estaba» no expresa con suficiente precisión ὡς ἱστήκει.
    rationale: El griego describe a Judit en postura erguida/estacionaria fuera de la tienda. «Mientras estaba de pie» preserva mejor la imagen y suena natural en español.
  revised_spanish_text: Y hubo un alboroto en el campamento, porque su llegada[a] se difundió por las tiendas; y vinieron y la rodearon mientras estaba de pie fuera de la tienda de Holofernes, hasta que le informaron acerca de ella.
  revised_footnotes:
  - marker: a
    text: 'O: «su presencia». El griego παρουσία puede significar «presencia», pero aquí también puede entenderse como «llegada» en sentido eventivo.'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al pie para que explique correctamente παρουσία en «llegada», y se ajusta «mientras estaba» a «mientras estaba de pie» para reflejar mejor ὡς ἱστήκει. El resto del texto se conserva por ser fiel, natural y coherente con la auditoría inglesa.
