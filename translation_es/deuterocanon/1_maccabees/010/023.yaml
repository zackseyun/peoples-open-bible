translation:
  language: es
  text: 'Se afligió y dijo[a]: «¿Qué es esto que hemos hecho, que Alejandro se nos ha adelantado para ganar la amistad con los judíos como respaldo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para obtener la amistad con los judíos para apoyo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλυπήθη
  english_pob_choice: He was grieved
  chosen_spanish: Se afligió
  alternatives_spanish:
  - Se entristeció
  - Se vio angustiado
  - Se dolió
  lexicon: BDAG / LSJ
  rationale: El aoristo pasivo expresa dolor o pesar emocional. «Se afligió» conserva la fuerza afectiva sin volverlo demasiado idiomático ni demasiado fuerte.
- source_word: Τί τοῦτο ἐποιήσαμεν
  english_pob_choice: What is this that we have done
  chosen_spanish: ¿Qué es esto que hemos hecho?
  alternatives_spanish:
  - ¿Qué hemos hecho?
  - ¿Por qué hemos hecho esto?
  lexicon: BDAG
  rationale: La pregunta retórica se mantiene bastante de cerca para preservar el tono de reproche y la referencia enfática a «esto».
- source_word: προέφθακεν ἡμᾶς
  english_pob_choice: has gotten ahead of us
  chosen_spanish: se nos ha adelantado
  alternatives_spanish:
  - nos ha precedido
  - nos ha tomado la delantera
  - nos ha forestalecido
  lexicon: BDAG
  rationale: El sentido de preceder o adelantarse se comunica de forma natural en español con «se nos ha adelantado», que conserva la idea de ir delante para obtener ventaja.
- source_word: φιλίαν
  english_pob_choice: friendship
  chosen_spanish: la amistad
  alternatives_spanish:
  - la amistad
  - la alianza
  - relaciones amistosas
  lexicon: LSJ
  rationale: En griego el término es «amistad», aunque en este contexto diplomático sugiera relación política. Se mantiene el valor léxico directo y se deja que el contexto aporte el matiz de alianza.
- source_word: καταλαβέσθαι
  english_pob_choice: in securing
  chosen_spanish: para ganar
  alternatives_spanish:
  - para obtener
  - para conseguir
  - para asegurar
  lexicon: BDAG
  rationale: El infinitivo medio implica obtener o alcanzar para uno mismo. «Para ganar» funciona bien con «amistad» y refleja una adquisición buscada.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: with the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - con los judíos
  - entre los judíos
  lexicon: BDAG
  rationale: El griego puede leerse relacionalmente; en español, «la amistad de los judíos» expresa de modo natural la relación que se busca obtener, sin perder el valor diplomático del contexto.
- source_word: εἰς στήριγμα
  english_pob_choice: for support
  chosen_spanish: como apoyo
  alternatives_spanish:
  - para apoyo
  - como sostén
  - como respaldo
  lexicon: LSJ
  rationale: στήριγμα denota apoyo o sostén. «Como apoyo» conserva la metáfora de algo que sirve de soporte y sigue la revisión inglesa que optó por una formulación natural.
translation_notes:
  revision_awareness: La traducción sigue la lectura revisada del inglés POB, especialmente el giro natural de προέφθακεν ἡμᾶς y la decisión final sobre εἰς στήριγμα como una expresión de apoyo. Se evitó calcar el inglés de manera rígida y se mantuvo la tensión diplomática entre «amistad» y «apoyo» en un español publicable.
  spanish_consistency_notes:
  - Se emplea «Se afligió» para λυπέω en un registro sobrio y bíblico, sin recurrir a «estaba triste» por sonar demasiado suave.
  - «La amistad» conserva el lexema griego φιλία, aun cuando el contexto implique una relación política más amplia.
  - No se usa «Mesías», «Yahvé» ni otros términos de preferencia proyectiva porque el versículo no los contiene.
  - La nota [a] está anclada en el texto y refleja una alternativa real de lectura, no un añadido sin soporte.
