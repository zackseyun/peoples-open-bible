translation:
  language: es
  text: Suficiente es una porción modesta[a] con rectitud[b], y en esto está la bendición del Señor, para saciedad[c] en rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Basta una moderación con rectitud».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «justicia» en ambas ocurrencias del término griego.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «satisfacción» o «plenitud».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκανὸν
  english_pob_choice: Sufficient
  chosen_spanish: Suficiente
  alternatives_spanish:
  - Basta
  - Es suficiente
  - Bastante
  lexicon: BDAG
  rationale: El griego abre la cláusula con una afirmación de suficiencia; «Suficiente» conserva ese valor predicativo de forma natural en español y mantiene el tono sentencioso del proverbio.
- source_word: τὸ μέτριον
  english_pob_choice: a modest portion
  chosen_spanish: una porción modesta
  alternatives_spanish:
  - la moderación
  - lo moderado
  - una medida moderada
  lexicon: LSJ
  rationale: El sustantivo neutro apunta a lo medido o moderado como algo concreto. «Una porción modesta» conserva la referencia a una cantidad suficiente pero no excesiva, evitando volver demasiado abstracta la expresión.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: with righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - en justicia
  - con rectitud
  - en rectitud
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «righteousness», en español «justicia» comunica bien la esfera moral y religiosa de δικαιοσύνη. Se prefirió «con» para dar una lectura fluida en español, sin perder la relación con la porción recibida o vivida en ese marco.
- source_word: εὐλογία
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - favor
  - bendición divina
  - bienaventuranza
  lexicon: BDAG
  rationale: «Bendición» es el equivalente español directo y conserva el sentido relacional y covenantal de la palabra griega.
- source_word: Κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - de Dios
  lexicon: BDAG
  rationale: El audit trail inglés usa «Lord»; en español, la forma idiomática y reverente es «Señor». Aquí no se introduce «Yahvé» porque el texto griego cita κύριος y el flujo del enunciado se mantiene bien con el título tradicional en español.
- source_word: εἰς πλησμονὴν
  english_pob_choice: for abundance
  chosen_spanish: para saciedad
  alternatives_spanish:
  - para abundancia
  - para plenitud
  - para satisfacción
  lexicon: LSJ
  rationale: La revisión del inglés mostró que πλησμονή no debe entenderse como «abundance» sino como saciedad/satisfacción, en contraste con la idea de una porción modesta. «Para saciedad» expresa el resultado de plenitud suficiente sin sobrecargar el sentido.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - con justicia
  - en rectitud
  - con rectitud
  lexicon: BDAG
  rationale: Se mantiene la repetición del término para conservar el énfasis del griego. En esta segunda ocurrencia, «en justicia» refleja mejor la esfera en la que ocurre la saciedad, mientras que la repetición de «justicia» preserva la cohesión léxica.
theological_decisions:
- issue: Renderizado de δικαιοσύνη
  english_pob_reading: righteousness / justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: El texto sapiencial enfatiza una suficiencia vivida dentro del orden moral correcto más que una noción puramente jurídica. «Justicia» es la opción principal en español por su amplitud semántica bíblica y porque puede abarcar tanto rectitud personal como fidelidad al orden de Dios.
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη'
- issue: Sentido de πλησμονή
  english_pob_reading: abundance
  chosen_spanish_reading: saciedad
  alternative_spanish_readings:
  - abundancia
  - plenitud
  - satisfacción
  rationale: La revisión de la tradición inglesa advirtió que «abundance» contradice el contraste del verso con τὸ μέτριον. En español se elige «saciedad» para expresar que la porción modesta, al ser bendecida por el Señor, basta plenamente.
  doctrine_reference: Applied revision / lexical correction on πλησμονή
translation_notes:
  revision_awareness: 'El inglés audit trail pasó por una revisión importante: se corrigió πλησμονή, que había sido traducido como «abundance», pero el revisor señaló que el contraste con τὸ μέτριον exige la idea de saciedad/satisfacción. La versión española sigue esa corrección y mantiene la repetición de δικαιοσύνη para no perder el énfasis del griego.'
  spanish_consistency_notes:
  - Se conserva un registro sobrio y proverbial, adecuado para un dicho sapiencial breve.
  - Se mantiene la repetición de justicia en ambas ocurrencias de δικαιοσύνη, como en el griego.
  - No se usa «Señor» como máscara de YHWH en el texto principal; aquí refleja el genitivo de κύριος en el griego.
  - La puntuación en español busca reproducir la cadencia de dos miembros principales y una clausula final de resultado.
