translation:
  language: es
  text: habiendo colocado a los sacerdotes en sus divisiones[a], ataviados[b], en el templo del Señor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por turnos» o «según sus cursos»; la expresión alude a las divisiones ordenadas de servicio sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O «adornados» o «vistiendo sus vestiduras»; el griego indica que estaban ataviados con dignidad, probablemente con ropa sacerdotal.
    reason: lexical_alternative
  - marker: c
    text: El griego dice «en el templo/recinto sagrado»; el paralelo hebreo tiene «para el servicio de la casa de Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: στήσας
  english_pob_choice: having stationed
  chosen_spanish: habiendo colocado
  alternatives_spanish:
  - habiendo puesto
  - habiendo establecido
  - habiendo designado
  lexicon: LSJ
  rationale: 'El aoristo participial de ἵστημι aquí tiene un valor administrativo/organizativo: situar o disponer a los sacerdotes en funciones asignadas. «Habiendo colocado» conserva el enlace participial y comunica la acción de organización sin forzar un calco poco natural.'
- source_word: τοὺς ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: a los sacerdotes
  alternatives_spanish:
  - a los sacerdotes
  - a los presbíteros
  lexicon: LSJ
  rationale: ἱερεῖς corresponde directamente a «sacerdotes». «Presbíteros» sería anacrónico e impreciso en este contexto del templo.
- source_word: κατʼ ἐφημερίας
  english_pob_choice: in their divisions
  chosen_spanish: en sus divisiones
  alternatives_spanish:
  - por turnos
  - según sus cursos
  - en sus rotaciones
  lexicon: LSJ
  rationale: ἐφημερία designa una división fija de servicio sacerdotal o turno de ministerio. «En sus divisiones» es fiel, claro y evita el arcaísmo de «cursos»; mantiene la idea de orden institucional.
- source_word: ἐστολισμένους
  english_pob_choice: arrayed
  chosen_spanish: vestidos con ornamentos
  alternatives_spanish:
  - arrayados
  - vestidos con vestiduras sagradas
  - adornados
  lexicon: LSJ
  rationale: El participio indica que estaban ataviados de manera digna y ceremonial. En español, «vestidos con ornamentos» transmite el carácter solemne sin afirmar más de lo que el griego dice; «vestiduras sagradas» sería algo más explícito de lo que el término exige.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  - en la casa
  lexicon: LSJ
  rationale: ἱερόν se refiere al recinto o complejo del templo; «templo» es la equivalencia más natural en español y sigue la revisión inglesa más reciente. Mantiene el sentido sagrado sin introducir una paráfrasis.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: LSJ
  rationale: Aunque el trasfondo hebreo apunta al Nombre divino, el griego dice κυρίου. Conforme a la pauta del proyecto para κύριος en este tipo de contexto, «del Señor» respeta la primacía del texto griego y su registro litúrgico.
theological_decisions:
- issue: κύριος griego frente al trasfondo hebreo con YHWH
  english_pob_reading: of the Lord
  chosen_spanish_reading: del Señor
  alternative_spanish_readings:
  - de Yahvé
  - del SEÑOR
  rationale: La base principal es el griego, que usa κυρίου. Dado que el texto de 1 Esdras se traduce desde el griego y no desde una cita directa del hebreo masorético, se conserva «Señor»; esto evita sobrecargar el verso con una reconstrucción no explícita en el original griego.
  doctrine_reference: 'DOCTRINE.md: primacía del original griego; manejo de términos contestados κύριος / יְהוָה'
- issue: Referencia implícita a la vestimenta sacerdotal
  english_pob_reading: arrayed
  chosen_spanish_reading: vestidos con ornamentos
  alternative_spanish_readings:
  - arrayados
  - con vestiduras sacerdotales
  - adornados
  rationale: El griego señala que estaban ‘adornados/ataviados’, pero no nombra explícitamente ‘vestiduras sacerdotales’. La redacción elegida conserva la solemnidad ceremonial sin importar una precisión no dicha de manera directa por el texto.
  doctrine_reference: 'DOCTRINE.md: no paraphrase beyond what the source warrants; equivalencia óptima'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó ‘clothed in splendor’ por ‘arrayed’ y cambió ‘house’ por ‘temple’. En español se adoptó un equivalente sobrio a ‘arrayed’ mediante ‘vestidos con ornamentos’ y se prefirió ‘templo’ para ἱερῷ, manteniendo la orientación de la última revisión sin perder la cautela del audit trail anterior.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κυρίου, en consonancia con la política del proyecto para el griego κύριος cuando el texto base es helenístico.
  - Se evitó «cursos» como término principal porque en español suena arcaico; quedó preservado en nota como alternativa textual.
  - Se optó por un español neutral y eclesialmente legible, sin usar fórmulas de tradición litúrgica que oculten el matiz administrativo del participio inicial.
