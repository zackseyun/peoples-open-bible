base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/013.yaml
  text: 'And to Caleb son of Jephunneh he gave a portion among the sons of Judah[a], according to the command of Yahweh to Joshua: Kiriath-arba (Arba was the father of Anak), that is[b], Hebron.'
  footnotes:
  - marker: a
    text: Or 'according to the word of the LORD.' The Hebrew idiom is literally 'according to the mouth of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Father of Anak'' may also mean ''ancestor'' or ''founder'' of Anak.'
    reason: lexical_alternative
