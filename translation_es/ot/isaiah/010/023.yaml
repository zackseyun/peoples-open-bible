translation:
  language: es
  text: Porque el Señor Yahvé de los ejércitos está realizando una destrucción completa[a], una que ha sido decretada, en medio de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo el país'. El hebreo אֶרֶץ puede significar 'tierra' o 'país', según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o explicación del anuncio anterior; 'Porque' conserva bien la función causal/explanatoria en español sin sonar forzado.
- source_word: כָלָה
  english_pob_choice: complete destruction
  chosen_spanish: una destrucción completa
  alternatives_spanish:
  - un fin completo
  - aniquilación
  - consumación
  lexicon: HALOT
  rationale: '''כָלָה'' en contexto de juicio expresa un final que implica ruina; ''destrucción completa'' mantiene la idea de totalidad y el matiz judicial sin ir más allá de lo que el hebreo requiere.'
- source_word: וְנֶחֱרָצָה
  english_pob_choice: one that has been decreed
  chosen_spanish: una que ha sido decretada
  alternatives_spanish:
  - y decretada
  - una determinada
  - una decidida
  lexicon: HALOT
  rationale: El participio pasivo/estado de נחרץ comunica algo decidido o decretado. En español, la relativa 'una que ha sido decretada' preserva la dependencia respecto de 'destrucción' y el carácter ya fijado de la acción.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord Yahweh
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  - el Señor Yahvé Dios
  lexicon: HALOT
  rationale: Se conserva 'Yahvé' para יְהוִה según el estándar del proyecto, y 'Señor' para אֲדֹנָי. La apposición 'Yahvé, el Señor' evita una repetición poco natural y mantiene la fuerza del doble título sin ocultar el nombre divino.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' comunica de manera clara y digna el título divino tradicional de צְבָאוֹת en español, sin restringirlo demasiado a un solo ámbito militar.'
- source_word: עֹשֶׂה
  english_pob_choice: is carrying out
  chosen_spanish: está realizando
  alternatives_spanish:
  - está ejecutando
  - está haciendo
  - lleva a cabo
  lexicon: HALOT
  rationale: El participio presenta una acción en curso o inminente. 'Está realizando' comunica ejecución activa del juicio de forma natural en español y conserva el aspecto progresivo del hebreo.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - dentro de
  - en el centro de
  lexicon: HALOT
  rationale: '''En medio de'' reproduce bien la idea espacial de ocurrencia dentro del ámbito de la tierra/territorio, sin volverse demasiado literal o rígido.'
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra/país
  - toda la tierra del país
  - toda la tierra
  lexicon: HALOT
  rationale: '''אָרֶץ'' puede significar ''tierra'' o ''país/land''. Se conserva la amplitud con ''toda la tierra'' para reflejar la formulación hebrea y la lectura universal posible, sin excluir la tensión contextual con una esfera territorial concreta.'
theological_decisions:
- issue: Renderizado del nombre divino en יְהוִה dentro del título compuesto
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El texto hebreo nombra directamente a YHWH, y el estándar del proyecto es 'Yahvé'. En español, colocar 'Yahvé' primero permite preservar el nombre propio, mientras que 'el Señor' traduce אֲדֹנָי. La coma evita la sensación de una repetición mecánica y mantiene la dignidad del título compuesto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוִה YHWH → Yahweh'
- issue: Alcance de הָאָרֶץ
  english_pob_reading: all the earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la tierra/país
  - toda la tierra del país
  rationale: Se conserva la posibilidad de lectura amplia del hebreo, mientras que el contexto profético sigue permitiendo una esfera territorial concreta. 'Toda la tierra' mantiene esa tensión sin resolverla de forma prematura.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'GOD' por 'Yahweh' para reflejar con mayor precisión יְהוִה. La presente versión española sigue esa revisión al usar 'Yahvé' como forma del nombre divino, manteniendo además la distinción con אֲדֹנָי mediante 'el Señor'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוִה, conforme a la terminología del proyecto.
  - '''Señor'' se reservó para אֲדֹנָי, evitando ''SEÑOR'' como máscara tipográfica.'
  - '''Toda la tierra'' preserva la tensión tierra/país sin imponer una interpretación única.'
  - '''Destrucción completa'' refleja el campo semántico de כָלָה en contexto de juicio.'
