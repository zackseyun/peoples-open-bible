translation:
  language: es
  text: No injuries a Dios[a], ni maldigas a un gobernante entre tu pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jueces»; אֱלֹהִים puede referirse en algunos contextos a autoridades humanas, aunque aquí «Dios» encaja mejor con el paralelismo.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  - jueces
  lexicon: HALOT, BDB
  rationale: En este contexto legal, el paralelo con la segunda cláusula favorece leer אֱלֹהִים como referencia a Dios. En español, "Dios" conserva esa lectura principal con naturalidad; "jueces" se mantiene como alternativa interpretativa documentada en nota. "dioses" no encaja bien con el paralelismo aquí.
- source_word: תְקַלֵּל
  english_pob_choice: revile
  chosen_spanish: blasfemes
  alternatives_spanish:
  - maldigas
  - injuries con palabras
  lexicon: HALOT, BDB
  rationale: El hebreo admite la idea de maldecir, afrentar o tratar con desprecio. "Blasfemes" reproduce bien la fuerza de hablar contra Dios en español bíblico actual, y diferencia esta cláusula de la siguiente, donde sí aparece "maldigas" como equivalente más directo de אָרַר.
- source_word: נָשִׂיא
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un líder
  - un príncipe
  - un jefe
  lexicon: HALOT, BDB
  rationale: נָשִׂיא designa a una persona elevada a autoridad. "Gobernante" es la opción más clara y digna en español moderno para un contexto legal, sin restringir innecesariamente el rango semántico del término.
- source_word: בְעַמְּךָ
  english_pob_choice: among your people
  chosen_spanish: entre tu pueblo
  alternatives_spanish:
  - de tu pueblo
  lexicon: HALOT, BDB
  rationale: La preposición ב aquí expresa pertenencia al ámbito comunitario. "Entre tu pueblo" suena natural en español y conserva la idea de una autoridad situada dentro de la comunidad pactal.
- source_word: תָאֹר
  english_pob_choice: curse
  chosen_spanish: maldigas
  alternatives_spanish:
  - eches una maldición
  - imprecaciones
  lexicon: HALOT, BDB
  rationale: אָרַר es el verbo estándar para maldecir. En español, "maldigas" comunica de forma directa y clara la prohibición, manteniendo la diferencia verbal con la primera cláusula.
theological_decisions:
- issue: Referente de אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - jueces
  - dioses
  rationale: La sintaxis y el paralelismo favorecen leer aquí una prohibición contra hablar mal de Dios y contra maldecir a un gobernante humano. Se conserva "Dios" en el texto principal por ser la lectura más probable, y se deja "jueces" como alternativa histórica importante sin resolverla en el cuerpo principal.
  doctrine_reference: Translation philosophy §3 (preservar tensiones teológicas y alternativas documentadas en nota)
translation_notes:
  revision_awareness: No se aplicaron revisiones recientes; se mantiene la lectura base con alta concordancia del auditor, preservando la distinción entre las dos cláusulas y la alternativa interpretativa para אֱלֹהִים.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al criterio POB, con nota para la lectura alternativa «jueces».
  - Se usa «maldigas» para ארר y «blasfemes» para קלל para preservar la diferencia verbal del hebreo.
  - «Gobernante» refleja el valor de נָשִׂיא en un registro legal contemporáneo y evita un arcaísmo innecesario.
