translation:
  language: es
  text: A no ser que hubiera creído que vería la bondad de Yahvé en la tierra de los vivos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es elíptico: literalmente, «A no ser que hubiera creído ver la bondad de Yahvé en la tierra de los vivos...». El resultado implícito suele entenderse como «me habría desanimado» o «habría desfallecido».'
    reason: alternative_reading
  - marker: b
    text: 'O: «habría desfallecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵא
  english_pob_choice: unless
  chosen_spanish: Si no hubiera
  alternatives_spanish:
  - a menos que
  - de no haber sido que
  lexicon: HALOT
  rationale: La partícula introduce una condición contrafactual. En español, una apertura condicional con pluscuamperfecto de subjuntivo expresa bien el valor irreal del hebreo sin forzar un completivo artificial.
- source_word: הֶאֱמַנְתִּי
  english_pob_choice: I had believed
  chosen_spanish: hubiera creído
  alternatives_spanish:
  - hubiera confiado
  - habría creído
  lexicon: HALOT
  rationale: El hifil de אמן aquí significa 'creer' o 'confiar'. 'Hubiera creído' conserva el matiz cognitivo del verbo y encaja naturalmente con la construcción contrafactual en español.
- source_word: לִרְאוֹת
  english_pob_choice: that I would see
  chosen_spanish: que vería
  alternatives_spanish:
  - para ver
  - que pudiera ver
  lexicon: HALOT
  rationale: El hebreo tiene un infinitivo constructo dependiente de 'creí'. En español, 'que vería' comunica con claridad el contenido esperado de la creencia y preserva la orientación futura implícita.
- source_word: בְּטוּב
  english_pob_choice: the goodness
  chosen_spanish: la bondad
  alternatives_spanish:
  - la bondad y el bien
  - el bien
  lexicon: HALOT
  rationale: טוּב puede ser 'bondad', 'bien' o 'bienes'. 'La bondad' mantiene el valor abstracto y personal de la benevolencia divina, sin reducirlo a beneficios materiales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en su forma establecida para el POB en español: ''Yahvé''. Esto preserva el Tetragrámaton como nombre propio y evita la sustitución por un título.'
- source_word: בְּאֶרֶץ חַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivos
  alternatives_spanish:
  - en el país de los vivientes
  - en la tierra de la vida
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo para la esfera de la vida frente a la muerte. 'Tierra de los vivos' es natural en español y refleja bien la imagen espacial del original.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene la decisión doctrinal del POB de transliterar el nombre divino en lugar de ocultarlo con un sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Construcción elíptica contrafactual
  english_pob_reading: Implicit apodosis after the conditional particle; English may supply the sense explicitly
  chosen_spanish_reading: Condicional irreal expresado sin añadir una apódosis interpretativa explícita
  alternative_spanish_readings:
  - Si no hubiera creído, habría desfallecido
  - Si no hubiera creído, me habría dado por vencido
  rationale: El hebreo es elíptico; sin embargo, el texto de base no formula la consecuencia. En español se evita añadir una apódosis que exceda lo transmitido, dejando que la frase condicional conserve la tensión del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense without paraphrase beyond what the text warrants'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al no añadir una apódosis explícita como «me habría desesperado». Al mismo tiempo, conserva la fuerza contrafactual y la elipsis del hebreo, que el audit trail identifica como rasgo importante del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar español del proyecto.
  - Se eligió «la bondad» para טוּב por mantener el sentido abstracto y relacional del término.
  - «La tierra de los vivos» conserva el idiomatismo hebreo de ארץ חיים sin explicitar glosas innecesarias en el texto principal.
