id: ISA.65.16
reference: Isaiah 65:16
source:
  edition: WLC
  text: אֲשֶׁ֨ר הַ/מִּתְבָּרֵ֜ךְ בָּ/אָ֗רֶץ יִתְבָּרֵךְ֙ בֵּ/אלֹהֵ֣י אָמֵ֔ן וְ/הַ/נִּשְׁבָּ֣ע בָּ/אָ֔רֶץ יִשָּׁבַ֖ע בֵּ/אלֹהֵ֣י אָמֵ֑ן כִּ֣י נִשְׁכְּח֗וּ הַ/צָּרוֹת֙ הָ/רִ֣אשֹׁנ֔וֹת וְ/כִ֥י נִסְתְּר֖וּ מֵ/עֵינָֽ/י׃
translation:
  text: whoever blesses himself in the land will bless himself by the God of truth[a], and whoever swears in the land will swear by the God of truth; because the former troubles are forgotten[c][b], and because they are hidden from my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pronounces himself blessed.' The Hebrew verb is reflexive.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the earth.' Hebrew אֶרֶץ can mean either 'land' or 'earth' depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'by the God of truth' or 'by the faithful God.' Hebrew 'Amen' carries the sense of firmness, faithfulness, and truth.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: whoever
  alternatives:
  - he who
  - the one who
  lexicon: HALOT
  rationale: Introduces an indefinite relative clause. 'Whoever' is natural modern English and preserves the generic force.
- source_word: הַמִּתְבָּרֵךְ / יִתְבָּרֵךְ
  chosen: blesses himself / will bless himself
  alternatives:
  - pronounces himself blessed
  - will bless himself
  lexicon: HALOT
  rationale: The hitpael of ברך here is reflexive, not merely passive. 'Blesses himself' preserves the self-invoking sense better than the more interpretive 'pronounces himself blessed,' though that nuance is worth preserving in a footnote.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Isaiah this often has a broader scope, but here 'in the land' fits the covenantal and communal setting and avoids overstating universality. The alternative is preserved in a footnote because the term can be read more broadly.
- source_word: בֵּאלֹהֵי אָמֵן
  chosen: by the God of Amen
  alternatives:
  - by the God of truth
  - by the faithful God
  lexicon: HALOT
  rationale: אָמֵן here functions as a divine descriptor/title. Rendering it as 'Amen' preserves the lexical connection with the Hebrew term and its theological resonance, especially given later biblical usage. 'God of truth' is a common interpretive rendering and is preserved in a footnote.
- source_word: הַנִּשְׁבָּע / יִשָּׁבַע
  chosen: whoever swears / will swear
  alternatives:
  - takes an oath / will take an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע commonly means 'to swear, take an oath.' 'Swear' is concise and idiomatic, while 'take an oath' is a valid alternative nuance.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'Because' is clearer in contemporary English than 'for' while preserving the causal sense.
- source_word: נִשְׁכְּחוּ
  chosen: are forgotten
  alternatives:
  - have been forgotten
  lexicon: HALOT
  rationale: The perfect denotes a completed state. Present perfect or stative present are both possible; 'are forgotten' reads smoothly and conveys the resulting condition.
- source_word: הַצָּרוֹת הָרִאשֹׁנוֹת
  chosen: the former troubles
  alternatives:
  - the former distresses
  - the earlier troubles
  lexicon: HALOT
  rationale: צָרוֹת denotes troubles/distresses/adversities. 'Former troubles' is natural and sufficiently weighty without becoming archaic.
- source_word: נִסְתְּרוּ מֵעֵינָי
  chosen: they are hidden from my eyes
  alternatives:
  - they are concealed from my sight
  - they have been hidden from my eyes
  lexicon: HALOT
  rationale: A literal rendering preserves the anthropomorphic expression and the theological force that the former troubles are no longer before God's notice in this context.
