translation:
  language: es
  text: 'Y ahora[a], Dios nuestro, el Dios grande, poderoso y temible, que guarda el pacto y el amor constante, no consideres pequeña delante de ti toda la calamidad que nos ha sobrevenido: a nuestros reyes, a nuestros jefes, a nuestros sacerdotes, a nuestros profetas, a nuestros padres[b] y a todo tu pueblo, desde los días de los reyes de Asiria hasta este día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'imponente'. El hebreo expresa un temor reverente ante la majestad de Dios.
    reason: lexical_alternative
  - marker: b
    text: O 'nuestros antepasados'. El hebreo es masculino y se refiere a los antepasados del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵינוּ / הָאֵל
  english_pob_choice: our God—the great, mighty, and fearsome God
  chosen_spanish: 'Dios nuestro: el Dios...'
  alternatives_spanish:
  - 'nuestro Dios: el gran Dios'
  - Dios nuestro, el gran Dios
  lexicon: HALOT
  rationale: 'Se conserva el vocativo doble del hebreo: primero la invocación ''Dios nuestro'' y luego el título appositivo ''el Dios''. En español, repetir ''Dios'' mantiene la fuerza enfática del original sin sonar tan forzado como un calco más literal.'
- source_word: הַגָּדוֹל הַגִּבּוֹר וְהַנּוֹרָא
  english_pob_choice: the great, mighty, and fearsome
  chosen_spanish: grande, poderoso y temible
  alternatives_spanish:
  - grande, fuerte y terrible
  - grande, valiente y temible
  lexicon: HALOT
  rationale: '''Poderoso'' transmite mejor que ''fuerte'' el rasgo de poder soberano; ''temible'' conserva la idea de reverencia y temor que POB expresó con ''fearsome''. ''Terrible'' en español puede sonar excesivamente negativo o ambiguo, así que se evita.'
- source_word: שׁוֹמֵר הַבְּרִית
  english_pob_choice: who keeps the covenant
  chosen_spanish: que guarda el pacto
  alternatives_spanish:
  - que preserva el pacto
  - que mantiene el pacto
  lexicon: HALOT
  rationale: '''Guardar el pacto'' es el equivalente más natural y fiel en español bíblico actual para שׁוֹמֵר en este contexto relacional y covenantal. ''Preservar'' o ''mantener'' debilitan el matiz de fidelidad activa.'
- source_word: וְהַחֶסֶד
  english_pob_choice: and steadfast love
  chosen_spanish: y la misericordia
  alternatives_spanish:
  - y el amor constante
  - y la lealtad amorosa
  lexicon: HALOT
  rationale: Aunque 'amor constante' puede reflejar bien חֶסֶד, en español de iglesia 'misericordia' sigue siendo una opción legítima y sobria. Aquí se conserva la tensión entre lealtad de pacto y compasión sin introducir una perífrasis demasiado interpretativa.
- source_word: אַל יִמְעַט לְפָנֶיךָ
  english_pob_choice: do not let ... seem small before you
  chosen_spanish: no tenga por pequeña delante de ti
  alternatives_spanish:
  - no consideres pequeña delante de ti
  - no te parezca pequeña
  lexicon: HALOT
  rationale: La construcción española reproduce el sentido idiomático de no minimizar la aflicción ante la presencia de Dios. 'Delante de ti' preserva לְפָנֶיךָ; 'tenga por pequeña' comunica el juicio evaluativo sin forzar una paráfrasis.
- source_word: כָּל הַתְּלָאָה
  english_pob_choice: all the hardship
  chosen_spanish: toda la calamidad
  alternatives_spanish:
  - toda la aflicción
  - toda la penuria
  - todo el sufrimiento
  lexicon: HALOT
  rationale: '''Calamidad'' capta el peso colectivo e histórico de la desgracia descrita en este lamento comunitario. ''Aflicción'' y ''penuria'' son posibles, pero aquí ''calamidad'' comunica mejor la dimensión acumulada del sufrimiento nacional.'
- source_word: אֲשֶׁר מְצָאַתְנוּ
  english_pob_choice: that has come upon us
  chosen_spanish: que nos ha sobrevenido
  alternatives_spanish:
  - que nos ha encontrado
  - que nos ha alcanzado
  lexicon: HALOT
  rationale: '''Sobrevenir'' expresa de forma natural la idea hebrea de algo que ''encuentra'' a alguien en el sentido de le sobrecoge o le acontece. Se evita una traducción demasiado literal como ''nos ha encontrado'' por sonar extraña en español.'
- source_word: לִמְלָכֵינוּ לְשָׂרֵינוּ וּלְכֹהֲנֵינוּ וְלִנְבִיאֵינוּ וְלַאֲבֹתֵינוּ
  english_pob_choice: upon our kings, our officials, our priests, our prophets, our fathers
  chosen_spanish: a nuestros reyes, a nuestros jefes, a nuestros sacerdotes, a nuestros profetas, a nuestros padres
  alternatives_spanish:
  - sobre nuestros reyes, sobre nuestros jefes, sobre nuestros sacerdotes, sobre nuestros profetas, sobre nuestros padres
  - a nuestros reyes, a nuestros gobernantes, a nuestros sacerdotes, a nuestros profetas, a nuestros antepasados
  lexicon: HALOT
  rationale: Se conserva la serie de destinatarios/afectados con repetición de 'a', natural en español y compatible con el valor de ל en este contexto. 'Jefes' refleja שׂרים de modo sobrio; 'padres' mantiene el masculino histórico de אבותינו según la política del proyecto.
- source_word: וּלְכָל עַמֶּךָ
  english_pob_choice: and all your people
  chosen_spanish: y a todo tu pueblo
  alternatives_spanish:
  - y a todo tu pueblo
  - y a todo el pueblo que te pertenece
  lexicon: HALOT
  rationale: La frase extiende el alcance a toda la comunidad del pacto. 'Tu pueblo' conserva la relación posesiva de segunda persona sin añadir explicaciones que no están en el texto.
- source_word: מִימֵי מַלְכֵי אַשּׁוּר
  english_pob_choice: from the days of the kings of Assyria
  chosen_spanish: desde los días de los reyes de Asiria
  alternatives_spanish:
  - desde la época de los reyes de Asiria
  - desde los días de los reyes asirios
  lexicon: HALOT
  rationale: '''Desde los días de...'' reproduce el marcador temporal del hebreo. ''Asiria'' se mantiene como nombre del imperio; ''reyes asirios'' sería posible, pero el genitivo explícito es más cercano al original.'
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy
  lexicon: HALOT
  rationale: Es el equivalente idiomático más natural en español y conserva la idea de una continuidad histórica desde Asiria hasta el presente del orante.
theological_decisions:
- issue: Títulos divinos acumulados en forma de invocación
  english_pob_reading: the great, mighty, and fearsome God
  chosen_spanish_reading: el Dios grande, poderoso y temible
  alternative_spanish_readings:
  - el Dios grande, fuerte y temible
  - el gran Dios, poderoso y temible
  rationale: El hebreo reúne epítetos confesionales que exaltan a Dios en su majestad y poder pactal. 'Temible' retiene el temor reverente de נורא sin volverlo coloquial; 'gran Dios' sería válido, pero 'el Dios grande' mantiene mejor la apposición del original.
  doctrine_reference: Lectura reverente de los atributos divinos en la doxología histórica del pacto
- issue: חסד en contexto de pacto
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor constante
  - misericordia fiel
  - lealtad amorosa
  rationale: La hebrea חסד combina misericordia, lealtad y fidelidad de pacto. En español, 'misericordia' es una opción tradicional y comprensible, aunque algo menos específica que 'amor constante'; se conserva así un término litúrgico sin borrar el trasfondo de pacto.
  doctrine_reference: Teología del pacto y atributos divinos
- issue: אבותינו y referencia a los antepasados
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  - nuestros padres y antepasados
  rationale: Se mantiene el masculino histórico del hebreo como referencia a los patriarcas/antepasados del pueblo. Aunque 'antepasados' aclara el sentido para lectores modernos, 'padres' conserva mejor la correspondencia formal y la resonancia bíblica.
  doctrine_reference: Política de precisión de género y referencia histórica
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés sin traducir mecánicamente. Se preservaron los dos puntos de invocación y la enumeración sintáctica del hebreo, y se mantuvieron las decisiones clave sobre נורא, חסד, לְפָנֶיךָ y אבותינו. No se detectaron revisiones aplicadas en el paquete inglés, así que el borrador español refleja el estado estable más reciente.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֱלֹהִים y no 'SEÑOR', conforme a la política del proyecto.
  - Se eligió 'pacto' para בְּרִית y 'misericordia' para חֶסֶד; en notas se reconoce la amplitud covenantal de חסד.
  - '''Jefes'' traduce שָׂרִים como término neutral y claro en español latinoamericano.'
  - Se mantuvo 'Asiria' para אַשּׁוּר y la construcción temporal 'desde... hasta...'.
  - Las notas al pie están ancladas con [a] y [b] en el texto principal, con marcadores únicos y en orden.
