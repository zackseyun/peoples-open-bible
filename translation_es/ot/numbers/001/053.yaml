  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y la auditoría inglesa en casi todos los puntos: contraste inicial («Pero»), fuerza directiva de «acamparán», terminología cultual («tabernáculo del testimonio»), propósito preventivo de «para que no haya ira», y conservación formal de «hijos de Israel». También mantiene correctamente la repetición de «tabernáculo del testimonio».'
  spanish_quality_summary: El español es claro y digno, pero «guardarán la custodia» suena algo forzado y redundante en español eclesial general. Una formulación más natural y fiel al sentido de מִשְׁמֶרֶת es «estarán a cargo del tabernáculo del testimonio», que conserva la idea de responsabilidad asignada sin perder solemnidad. El resto del versículo lee bien.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Levitas», «tabernáculo», «testimonio», «ira» e «hijos de Israel» están alineados con la evidencia fuente y la racionalidad documentada. La única mejora propuesta afecta la naturalidad de la expresión para מִשְׁמֶרֶת, no el glosario principal.
  issues:
  - severity: medium
    issue: «guardarán la custodia» es una construcción poco natural en español
    rationale: Aunque transmite algo del campo semántico de שׁמר + מִשְׁמֶרֶת, la combinación resulta redundante y algo rígida. El hebreo apunta a ejercer una responsabilidad/guardia asignada; en español más idiomático conviene expresar ese encargo con «estarán a cargo de» o similar.
  revised_spanish_text: Pero los levitas acamparán alrededor del tabernáculo del testimonio[a], para que no haya ira sobre la congregación de los hijos de Israel; y los levitas estarán a cargo del tabernáculo del testimonio.
  revised_footnotes:
  - marker: a
    text: 'O: «contra la congregación de los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción general del borrador por su buena fidelidad al hebreo y a la auditoría inglesa, pero se reemplaza «guardarán la custodia» por «estarán a cargo de» para representar de manera más natural en español el sentido de responsabilidad encomendada de שׁמר + מִשְׁמֶרֶת en contexto cultual.
