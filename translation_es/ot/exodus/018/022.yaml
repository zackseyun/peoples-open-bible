base_translation:
  language: en
  yaml_path: translation/ot/exodus/018/022.yaml
  text: And let them judge the people at all times[a]. Then every great matter they shall bring to you, but every small matter they themselves shall judge. So it will be lighter for you[b], and they will bear the burden with you.
  footnotes:
  - marker: a
    text: Or 'every major case ... every minor case.' The Hebrew uses 'great' and 'small' for matters brought for judgment.
    reason: lexical_alternative
  - marker: b
    text: The final clause implies the burden of judging the people, though 'burden' is not stated explicitly in Hebrew.
    reason: lexical_alternative
