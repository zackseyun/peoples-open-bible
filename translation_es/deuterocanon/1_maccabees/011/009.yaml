translation:
  language: es
  text: 'Y envió embajadores al rey Demetrio, diciendo: «Ven, hagamos un pacto[a] entre nosotros, y te daré a mi hija, a quien Alejandro tiene[b], y reinarás sobre el reino de tu padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'concluyamos un tratado'. El griego usa διαθήκη, un término formal para un pacto, a menudo traducido 'alianza'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'a quien Alejandro tiene', refiriéndose a la hija que actualmente está con Alejandro como esposa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El aoristo de ἀποστέλλω pide un verbo simple de envío. 'Envió' es natural en español y conserva el valor narrativo y diplomático del acto.
- source_word: πρέσβεις
  english_pob_choice: envoys
  chosen_spanish: embajadores
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: LSJ
  rationale: En este contexto político, πρέσβεις señala representantes oficiales. 'Embajadores' comunica bien la función diplomática en español sin perder el carácter formal.
- source_word: συνθώμεθα ... διαθήκην
  english_pob_choice: let us make a covenant
  chosen_spanish: hagamos un pacto
  alternatives_spanish:
  - concluyamos un tratado
  - hagamos un convenio
  lexicon: LSJ
  rationale: La combinación expresa un acuerdo formal. En español, 'pacto' conserva mejor el peso jurídico-político de διαθήκη aquí; 'covenant' no suena idiomático en la línea principal y 'tratado' estrecha demasiado el sentido a la diplomacia estatal.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: with one another
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - unos con otros
  - entre sí
  lexicon: LSJ
  rationale: La reciprocidad del griego se expresa con naturalidad en español con 'entre nosotros', manteniendo la idea de acuerdo mutuo.
- source_word: δώσω σοι τὴν θυγατέρα μου
  english_pob_choice: I will give you my daughter
  chosen_spanish: te daré a mi hija
  alternatives_spanish:
  - te daré mi hija
  - te entregaré a mi hija
  lexicon: LSJ
  rationale: La formulación española debe conservar el matiz de alianza matrimonial y el tono transaccional del original sin añadir explicaciones no dichas en el texto.
- source_word: ἣν ἔχει Ἀλέξανδρος
  english_pob_choice: whom Alexander has
  chosen_spanish: la que tiene Alejandro
  alternatives_spanish:
  - a quien tiene Alejandro
  - la que posee Alejandro
  lexicon: LSJ
  rationale: Se mantiene la literalidad de ἔχει ('tiene') sin forzar una explicación matrimonial explícita que el griego no formula en esta cláusula. 'La que tiene Alejandro' preserva la tensión lexical auditada en el inglés.
- source_word: βασιλεύσεις
  english_pob_choice: you will reign
  chosen_spanish: reinarás
  alternatives_spanish:
  - serás rey
  - gobernarás como rey
  lexicon: LSJ
  rationale: El verbo verbaliza la acción real, no solo el título. 'Reinarás' reproduce de forma directa el futuro de βασιλεύω.
- source_word: τῆς βασιλείας τοῦ πατρός σου
  english_pob_choice: over your father's kingdom
  chosen_spanish: sobre el reino de tu padre
  alternatives_spanish:
  - en el reino de tu padre
  - sobre la realeza de tu padre
  lexicon: LSJ
  rationale: '''βασιλεία'' en este contexto designa el reino/dominio heredado. ''Reino de tu padre'' es la opción más clara y fiel en español; ''realeza'' sería demasiado abstracto.'
theological_decisions:
- issue: 'Naturaleza formal del acuerdo: pacto o tratado'
  english_pob_reading: let us make a covenant; the Greek uses διαθήκη, a formal pact term often rendered 'covenant'.
  chosen_spanish_reading: hagamos un pacto
  alternative_spanish_readings:
  - concluyamos un tratado
  - hagamos un convenio
  rationale: No hay carga doctrinal propiamente dicha en este versículo, pero sí una decisión terminológica importante. 'Pacto' conserva el peso formal de διαθήκη sin convertirlo en una expresión eclesiástica ajena al contexto político.
  doctrine_reference: N/A
- issue: Ambigüedad de la hija 'que Alejandro tiene'
  english_pob_reading: Literally, 'my daughter whom Alexander has,' referring to the daughter presently in Alexander's possession as wife.
  chosen_spanish_reading: la que tiene Alejandro
  alternative_spanish_readings:
  - la esposa que Alejandro tiene
  - la que posee Alejandro
  rationale: Se conserva la ambigüedad literal del griego y del audit trail inglés. Añadir 'esposa' resolvería la referencia, pero iría más allá de la cláusula griega; por eso se deja implícita.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan de manera alta. No se requieren revisiones sustanciales; solo se ajustó la equivalencia al español con 'embajadores', 'pacto' y la formulación literal 'la que tiene Alejandro' para preservar el peso diplomático y la ambigüedad observada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece ningún nombre divino en el texto fuente.
  - Se usa 'reino' para βασιλεία en concordancia con el valor contextual de dominio real heredado.
  - Se evita 'Cristo/Mesías' porque el versículo no contiene lenguaje mesiánico.
  - Se conserva un registro formal y bíblico, pero con sintaxis natural en español contemporáneo.
