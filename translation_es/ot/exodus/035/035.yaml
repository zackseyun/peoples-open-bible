translation:
  language: es
  text: 'Él los ha llenado de sabiduría de corazón[a] para hacer toda clase de trabajo de grabador[b], de diseñador y de bordador en azul, en púrpura, en hilo escarlata y en lino fino, y de tejedor: hacedores de toda obra e ideadores[c] de diseños.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sabiduría de corazón», una expresión hebrea para una pericia, discernimiento y artesanía arraigados en lo interior.
    reason: cultural_note
  - marker: b
    text: O, más ampliamente, «artesano»; el término hebreo puede denotar a un trabajador hábil en general, pero aquí probablemente se refiere a una clase específica de labor del tabernáculo.
    reason: lexical_alternative
  - marker: c
    text: 'O: «ideadores de diseños artísticos». El hebreo repite términos cognados para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלֵּא
  english_pob_choice: has filled
  chosen_spanish: los ha llenado
  alternatives_spanish:
  - los llenó
  - los ha colmado
  lexicon: HALOT
  rationale: El perfecto hebreo se entiende como acción realizada por Dios; el presente perfecto español comunica bien ese estado resultante. "Llenar" conserva la imagen de plenitud dada por Dios.
- source_word: חָכְמַת לֵב
  english_pob_choice: wisdom of heart
  chosen_spanish: sabiduría de corazón
  alternatives_spanish:
  - sabiduría del corazón
  - habilidad de corazón
  - destreza de corazón
  lexicon: HALOT
  rationale: Se conserva el giro hebreo para no perder la idea de una sabiduría interior unida a pericia práctica. "De corazón" es natural en español bíblico contemporáneo y mantiene la tensión entre conocimiento y habilidad.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para hacer
  - para realizar
  - para obrar
  lexicon: HALOT
  rationale: '"Hacer" refleja la amplitud de עשה sin estrecharlo demasiado. En español encaja bien antes de la lista de oficios.'
- source_word: כָּל מְלֶאכֶת
  english_pob_choice: every kind of work
  chosen_spanish: toda obra
  alternatives_spanish:
  - todo tipo de obra
  - toda clase de trabajo
  - toda labor
  lexicon: HALOT
  rationale: '"מלאכה" en este contexto apunta a labor artesanal o técnica. "Obra" funciona en registro digno y amplio; el resto de la frase especifica el tipo de labor.'
- source_word: חָרָשׁ
  english_pob_choice: engraver
  chosen_spanish: artesano
  alternatives_spanish:
  - grabador
  - artífice
  - artesano
  lexicon: HALOT
  rationale: El término puede abarcar a un trabajador hábil de oficio, no solo a quien graba. "Artesano" es más amplio y evita restringir indebidamente el oficio; en esta lista conserva el carácter técnico.
- source_word: וְחֹשֵׁב
  english_pob_choice: designer
  chosen_spanish: diseñador
  alternatives_spanish:
  - diseñador
  - conceptor
  - planificador
  lexicon: HALOT
  rationale: En contextos de arte textil, חשב refiere a idear patrones. "Diseñador" comunica con claridad ese sentido sin perder la función creativa.
- source_word: וְרֹקֵם
  english_pob_choice: embroiderer
  chosen_spanish: bordador
  alternatives_spanish:
  - bordador
  - bordador experto
  - bordista
  lexicon: HALOT
  rationale: El oficio de רקם es bordar o hacer labor de aguja decorativa. "Bordador" es el equivalente natural y preciso en español.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul
  - azul púrpura
  lexicon: HALOT
  rationale: Se traduce por el color básico "azul"; el material tintado ya queda implicado por el contexto de bordado.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - púrpura
  - morado
  lexicon: HALOT
  rationale: '"Púrpura" mantiene el matiz de tintura costosa y es más cercano al uso bíblico que "morado" en este registro.'
- source_word: תּוֹלַעַת הַשָּׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: escarlata
  alternatives_spanish:
  - escarlata
  - hilo escarlata
  - lana escarlata
  lexicon: HALOT
  rationale: La expresión hebrea apunta a material teñido de escarlata. Aquí, por economía y claridad, el color basta en la serie de textiles; el contexto ya comunica que se trata de labor textil.
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino fino
  - lino de calidad
  - lino fino tejido
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, שש designa lino fino o de calidad. "Lino fino" preserva la especificación técnica y el tono reverente.
- source_word: אֹרֵג
  english_pob_choice: weaver
  chosen_spanish: tejedor
  alternatives_spanish:
  - tejedor
  - el que teje
  lexicon: HALOT
  rationale: '"Tejedor" es el sustantivo natural en español para el oficio de tejer.'
- source_word: עֹשֵׂי כָּל מְלָאכָה
  english_pob_choice: doers of every kind of work
  chosen_spanish: hacedores de toda obra
  alternatives_spanish:
  - hacedores de toda obra
  - realizadores de toda obra
  - trabajadores de toda labor
  lexicon: HALOT
  rationale: Se conserva la fuerza participial de עֹשֵׂי con "hacedores", que es formal y transparente. "Toda obra" reproduce la amplitud del hebreo sin volverlo abstracto.
- source_word: חֹשְׁבֵי מַחֲשָׁבֹת
  english_pob_choice: devisers of designs
  chosen_spanish: devisores de diseños
  alternatives_spanish:
  - devisores de diseños
  - ideadores de diseños
  - concepciones de diseños
  lexicon: HALOT
  rationale: Se mantiene la repetición cognada del hebreo con una construcción igualmente marcada. "Devisores" refleja el acto de idear o tramar diseños, conservando la resonancia retórica que la POB inglesa buscó en "devisers of designs".
theological_decisions:
- issue: La expresión idiomática "sabiduría de corazón" en un contexto de artesanía otorgada por Dios
  english_pob_reading: Literally, 'wisdom of heart,' a Hebrew expression for inwardly grounded skill, discernment, and craftsmanship.
  chosen_spanish_reading: Sabiduría de corazón, entendida como pericia, discernimiento y habilidad interior concedidos por Dios.
  alternative_spanish_readings:
  - sabiduría interior
  - habilidad del corazón
  - destreza y discernimiento
  rationale: No se reduce a mera inteligencia ni se neutraliza como simple talento. La formulación conserva la tensión bíblica entre don interior y habilidad técnica aplicada.
  doctrine_reference: Éxodo 35:31-35; sabiduría concedida por Dios para el servicio del tabernáculo
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir equivalentes naturales para עֹשֵׂי y para la clausula cognada final, sin borrar la repetición semítica del original. También se ha evitado mecanizar la lista de oficios, conservando el paralelismo artesanal del hebreo.
  spanish_consistency_notes:
  - Se usa "Yahvé" por defecto cuando el pasaje requiera el nombre divino; aquí el versículo no lo explicita.
  - Se conserva "sabiduría de corazón" como giro bíblico transparente, no como paráfrasis psicológica moderna.
  - Se mantiene un registro formal y bíblicamente legible, con oficios concretos en la serie de artesanos.
  - La nota al pie marca la única alternativa lexical relevante preservada en la POB inglesa para la frase cognada final.
