revisions:
- from: Cuando Moisés vio que el pueblo estaba desenfrenado, porque Aarón lo había desenfrenado, para la burla[a] de sus adversarios[b]—
  to: Cuando Moisés vio que el pueblo estaba sin freno, porque Aarón lo había dejado sin freno[a], para escarnio[b] entre los que se levantaban contra ellos[c]—
  rationale: Se reemplaza la segunda instancia de «desenfrenado» por «había dejado sin freno» para lograr un español natural y fiel al matiz causal del hebreo, manteniendo a la vez la repetición semántica de la misma raíz. Se ajusta «burla» a «escarnio» para reflejar mejor לְשִׁמְצָה, y se hace más explícito el valor participial de בְּקָמֵיהֶם con «los que se levantaban contra ellos», dejando «sus adversarios» como alternativa en nota. También se reparan las notas para que correspondan exactamente a los anclajes y preserven mejor las alternativas del expediente inglés.
