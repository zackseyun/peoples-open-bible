    text: Or 'will rot away' or 'will pine away'; the Hebrew verb conveys wasting or decaying under judgment.
    reason: lexical_alternative
  - marker: b
    text: '''With them'' may mean that the iniquities of their fathers remain with them, or that they waste away along with those ancestral iniquities still affecting them.'
    reason: alternative_reading
