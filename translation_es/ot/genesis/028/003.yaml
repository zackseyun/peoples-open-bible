review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia de bendición del hebreo: jussivos para bendecir, hacer fecundo y multiplicar, y una cláusula final de resultado. Sin embargo, introduce un error grave al añadir «Yahvé», aunque el texto fuente dice אֵל שַׁדַּי, no יהוה. También la cláusula final «llegarás a ser» debilita el matiz desiderativo/resultativo que el inglés auditado preserva con «so that you may become».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Y Yahvé Dios Todopoderoso» es incorrecto y poco natural aquí. Además, conviene ajustar la sintaxis para que toda la bendición mantenga el mismo tono de deseo/oración. «Y que Dios Todopoderoso te bendiga... para que llegues a ser...» suena natural y fiel.
  glossary_alignment: 'Buen alineamiento con «Dios Todopoderoso» para אֵל שַׁדַּי y «asamblea de pueblos» para לִקְהַל עַמִּים. Desalineación mayor con la política de nombres divinos: no debe insertarse «Yahvé» cuando no aparece יהוה en la fuente. La nota sobre «El Shaddai» sí es adecuada.'
  issues:
  - severity: high
    issue: Se añadió «Yahvé» en el texto principal sin respaldo en la fuente.
    rationale: El hebreo dice אֵל שַׁדַּי («Dios Todopoderoso» / «El Shaddai»), no יהוה. Esto altera el contenido fuente y viola la fidelidad lexical.
  - severity: medium
    issue: La decisión teológica sobre יהוה es inaplicable a este versículo.
    rationale: El expediente doctrinal del borrador discute el tratamiento de יהוה, pero el nombre divino no aparece aquí. Esto sugiere un arrastre indebido de plantilla y debe corregirse conceptualmente.
  - severity: medium
    issue: «Llegarás a ser» convierte la última cláusula en afirmación futura más que en resultado/deseo dentro de la bendición.
    rationale: 'El inglés auditado y la sintaxis hebrea en contexto de bendición favorecen una relación de resultado/purpose dentro del mismo marco jussivo: «para que llegues a ser» o similar.'
  revised_spanish_text: Y que Dios Todopoderoso[a] te bendiga, te haga fecundo y te multiplique, para que llegues a ser una asamblea de pueblos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «El Shaddai». Tradicionalmente se vierte «Dios Todopoderoso».'
    reason: lexical_alternative
  revision_rationale: La revisión elimina la adición infundada de «Yahvé», conserva la traducción correcta de אֵל שַׁדַּי como título divino, y ajusta la cláusula final para reflejar mejor el valor de resultado/deseo de la bendición en español idiomático. La nota léxica sobre «El Shaddai» se mantiene porque está respaldada por el rastro de auditoría inglés.
