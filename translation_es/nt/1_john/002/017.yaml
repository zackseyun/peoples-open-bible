translation:
  language: es
  text: Y el mundo va pasando[a], y también su deseo[b]; pero el que hace la voluntad de Dios permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasa» o «está pasando». El griego παράγεται presenta el proceso de desaparecer o irse acabando; «va pasando» intenta conservar ese sentido de transitoriedad continua.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su codicia» o «su ansia». ἐπιθυμία puede abarcar deseo intenso y desordenado; aquí alude de manera amplia al deseo del mundo, no necesariamente a un matiz sexual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el sistema del mundo
  - el mundo presente
  lexicon: BDAG
  rationale: En 1 Juan, κόσμος puede abarcar más que la creación física; aquí el contexto inmediato de 2:15–16 muestra un orden de vida y deseos opuesto a Dios. «El mundo» conserva esa amplitud y es la forma más natural en español sin perder la carga ética del pasaje.
- source_word: παράγεται
  english_pob_choice: is passing away
  chosen_spanish: va pasando
  alternatives_spanish:
  - está pasando
  - pasa
  lexicon: BDAG
  rationale: El presente indica proceso en curso. «Va pasando» expresa bien la transitoriedad continua en español actual y mantiene la idea de que no se trata solo de un hecho puntual, sino de un desvanecimiento progresivo.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - codicia
  - lujuria
  - ansia
  lexicon: BDAG
  rationale: En este contexto, ἐπιθυμία es un deseo desordenado o inclinado al mundo. «Deseo» es suficientemente amplio y permite que el contexto lo precise, sin reducirlo indebidamente a un sentido sexual que «lujuria» sugeriría en español.
- source_word: αὐτοῦ
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de éste
  lexicon: BDAG
  rationale: El pronombre remite a κόσμος. En español, «su» funciona de modo natural con «el mundo» y preserva la relación posesiva sin forzar una repetición innecesaria.
- source_word: ποιῶν
  english_pob_choice: the one who does
  chosen_spanish: el que hace
  alternatives_spanish:
  - el que practica
  - quien hace
  lexicon: BDAG
  rationale: El participio sustantivado describe a la persona caracterizada por obedecer. «El que hace» es fiel al griego y suena natural; «practica» sería posible, pero introduce una matización que el texto no exige.
- source_word: θέλημα
  english_pob_choice: the will
  chosen_spanish: la voluntad
  alternatives_spanish:
  - el querer
  - lo que quiere
  lexicon: BDAG
  rationale: «Voluntad» conserva el peso teológico y obediencial de θέλημα mejor que una reducción a preferencia o deseo. En español bíblico contemporáneo sigue siendo la opción más clara y precisa.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - se queda
  - continúa
  - permanece firme
  lexicon: BDAG
  rationale: μένω es un verbo clave en Juan y 1 Juan. «Permanece» comunica continuidad duradera de forma sobria y adecuada; mantiene mejor la fuerza teológica que «se queda» o una paráfrasis más explicativa.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - hasta la eternidad
  lexicon: BDAG
  rationale: La expresión idiomática apunta a una duración sin fin. «Para siempre» es la equivalencia más idiomática y fiel en español, sin volverla artificial con una traducción demasiado literal.
theological_decisions:
- issue: Sentido de κόσμος en el contraste joánico
  english_pob_reading: the world as the transient rebellious world-order opposed to God
  chosen_spanish_reading: el mundo como orden transitorio de deseos en oposición a Dios
  alternative_spanish_readings:
  - el mundo físico creado
  - la humanidad en general
  rationale: El contexto de 2:15–16 define el término por sus deseos y su oposición a la voluntad de Dios. La traducción mantiene «el mundo» en el texto principal, dejando que el contexto establezca su alcance ético-teológico sin estrecharlo indebidamente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Duración de μένει εἰς τὸν αἰῶνα
  english_pob_reading: enduring permanence of the one who does God's will
  chosen_spanish_reading: permanencia duradera y sin fin del que hace la voluntad de Dios
  alternative_spanish_readings:
  - una referencia explícita a vida eterna
  - una idea de permanencia temporal
  rationale: El griego afirma continuidad indefinida, pero no explica el mecanismo doctrinal. «Permanece para siempre» conserva la fuerza teológica sin añadir más de lo que el versículo dice.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no introdujo cambios respecto del texto base y fue confirmado con alto acuerdo por la revisión cruzada. No se requirieron ajustes adicionales.
  spanish_consistency_notes:
  - Se conservó «el mundo» como término amplio y contextualmente cargado, en línea con el uso joánico.
  - «Permanece» se mantuvo para μένω, respetando el verbo clave de la literatura joánica sin recurrir al más eclesiástico «abide».
  - «Para siempre» expresa el idiomatismo de εἰς τὸν αἰῶνα con español natural y publicación-readable.
  - No se usó «Cristo» ni terminología litúrgica ajena al texto; tampoco se suavizó la tensión entre el mundo que pasa y la permanencia del obediente.
