revisions:
- from: 'Moisés les dijo[a]: «¿Han mantenido con vida a todas las mujeres?»'
  to: 'Moisés les dijo[a]: «¿Han dejado con vida a toda persona de sexo femenino?»'
  rationale: Se revisa נְקֵבָה para evitar el estrechamiento a «mujeres» y conservar el alcance biológico amplio del hebreo en un español natural y digno. «Toda persona de sexo femenino» mantiene el referente humano, evita el uso poco publicable de «hembras» y no restringe por edad. También se ajusta la alternativa para que preserve el mismo alcance semántico. El cambio de principal a «han dejado con vida» y la alternativa «han mantenido con vida» refleja de forma natural las dos opciones léxicas auditadas para הַחִיִּיתֶם.
