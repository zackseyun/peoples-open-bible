translation:
  language: es
  text: Y se sentó en la sala del consejo[a], y la carta fue leída ante ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tribunal», «sala de juicio» o «corte» para el recinto oficial indicado por el término griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάθισεν
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se sentó
  lexicon: BDAG
  rationale: El aoristo narrativo de καθίζω se expresa de forma natural en español como una acción simple y directa. «Se sentó» conserva la naturalidad del relato sin añadir matices no explícitos en el griego.
- source_word: χρηματιστηρίῳ
  english_pob_choice: council chamber
  chosen_spanish: sala del consejo
  alternatives_spanish:
  - tribunal
  - sala de juicio
  - cámara del consejo
  lexicon: LSJ
  rationale: El término designa un recinto oficial de deliberación o procedimiento. «Sala del consejo» comunica un espacio formal de decisión en español actual sin forzar exclusivamente el sentido judicial, y mantiene la amplitud semántica señalada por el audit trail.
- source_word: ἀνεγνώσθη
  english_pob_choice: was read
  chosen_spanish: fue leída
  alternatives_spanish:
  - fue leída en voz alta
  - se leyó
  lexicon: BDAG
  rationale: El pasivo aoristo pide una traducción simple con voz pasiva. En español, el contexto sugiere lectura pública, pero como el griego no lo dice explícitamente, se omite «en voz alta» en el texto principal.
- source_word: γράμμα
  english_pob_choice: letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el documento
  - la misiva
  - el escrito
  lexicon: BDAG
  rationale: Aquí γράμμα se refiere a un mensaje escrito concreto. «Carta» es la opción más natural en español narrativo y coincide con la referencia a una comunicación escrita previa.
- source_word: ἐνώπιον αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - en su presencia
  - ante ellos
  lexicon: BDAG
  rationale: La frase idiomática se vierte con una preposición natural en español. «Delante de ellos» conserva la formalidad narrativa sin cambiar el sentido.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y conserva la misma estructura narrativa que la traducción inglesa auditada, sin cambios de sentido respecto del pass más reciente, que quedó sin modificaciones.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otros sustitutos teológicos porque no aparece el Tetragrámaton ni un título divino en este versículo.
  - «Carta» mantiene la concreción narrativa del sustantivo griego sin introducir una lectura más genérica como «documento» en el texto principal.
  - La nota al pie preserva la ambigüedad institucional de χρηματιστηρίῳ, ya que el español necesita decidir entre matices legales y deliberativos.
