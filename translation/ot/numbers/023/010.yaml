id: NUM.23.10
reference: Numbers 23:10
source:
  edition: WLC
  text: מִ֤י מָנָה֙ עֲפַ֣ר יַעֲקֹ֔ב וּ/מִסְפָּ֖ר אֶת רֹ֣בַע יִשְׂרָאֵ֑ל תָּמֹ֤ת נַפְשִׁ/י֙ מ֣וֹת יְשָׁרִ֔ים וּ/תְהִ֥י אַחֲרִיתִ֖/י כָּמֹֽ/הוּ־׃
translation:
  text: Who can count the dust of Jacob[a], or number the fourth part of Israel? Let my soul die the death of the upright[c][b], and let my end be like his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'number the quarters of Israel,' or more interpretively, 'count even one fourth of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the death of the righteous.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'like his'; the singular may refer to the representative upright person, though 'the upright' is a collective.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who can
  alternatives:
  - Who
  - Who has
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. English supplies 'can' to convey the implied sense of impossibility in context.
- source_word: מָנָה
  chosen: count
  alternatives:
  - number
  - apportion
  lexicon: HALOT
  rationale: In parallel with וּמִסְפָּר, the sense is numerical reckoning. 'Count' is natural modern English and preserves the rhetorical force.
- source_word: עֲפַר יַעֲקֹב
  chosen: the dust of Jacob
  alternatives:
  - Jacob's dust
  lexicon: HALOT
  rationale: Retains the metaphor/allusion to innumerable descendants like dust. 'Jacob' is kept as the covenant name in poetic parallel with 'Israel.'
- source_word: וּמִסְפָּר
  chosen: or number
  alternatives:
  - and count
  - and the number of
  lexicon: HALOT
  rationale: 'Though formally a noun with conjunction, in English the parallelism is best represented verbally: ''or number.'' This preserves the synonymous parallel with מָנָה.'
- source_word: אֶת רֹבַע יִשְׂרָאֵל
  chosen: the fourth part of Israel
  alternatives:
  - the multitude of Israel
  - the quarters of Israel
  - the dust-cloud of Israel
  lexicon: HALOT
  rationale: רֹבַע most naturally denotes a fourth part/quarter. The phrase likely refers hyperbolically even to one quarter of Israel being beyond numbering. This more literal rendering is preferred over interpretive expansions.
- source_word: תָּמֹת נַפְשִׁי
  chosen: Let my soul die
  alternatives:
  - May I die
  - Let me die
  lexicon: HALOT
  rationale: The Hebrew literally has 'my soul' as the subject. Retaining 'my soul' preserves the poetic diction without becoming unnatural.
- source_word: מוֹת יְשָׁרִים
  chosen: the death of the upright
  alternatives:
  - the death of the righteous
  - an upright death
  lexicon: HALOT
  rationale: יְשָׁרִים denotes the upright/straight ones. 'Upright' preserves the lexical nuance better than 'righteous,' which could import more forensic connotations than the Hebrew here requires.
- source_word: וּתְהִי אַחֲרִיתִי
  chosen: and let my end be
  alternatives:
  - and let my latter end be
  - and may my future be
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, latter end, or outcome. 'End' is concise and idiomatic, fitting the parallel with death.
- source_word: כָּמֹהוּ
  chosen: like his
  alternatives:
  - like him
  - like theirs
  lexicon: HALOT
  rationale: The suffix is singular masculine. Since the immediate antecedent is the collective 'upright,' English idiom renders the comparison as 'like his,' preserving the singular form while avoiding awkwardness.
