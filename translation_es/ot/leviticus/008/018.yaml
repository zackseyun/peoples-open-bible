translation:
  language: es
  text: Entonces presentó el carnero del holocausto[a], y Aarón y sus hijos pusieron[b] sus manos sobre la cabeza del carnero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'acercó' o 'trajo delante' para el verbo traducido 'presentó'.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo también puede rendirse 'apoyaron' o 'impusieron' sus manos, refiriéndose al acto ritual realizado sobre el animal sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: Then he brought near
  chosen_spanish: Entonces hizo acercar
  alternatives_spanish:
  - Entonces presentó
  - Entonces trajo adelante
  lexicon: HALOT
  rationale: El verbo hiphil de קרב expresa hacer que algo se acerque o se presente. En español, 'hizo acercar' conserva el movimiento ritual sin forzar una construcción extraña, y mantiene la referencia al acto cultual del contexto inmediato.
- source_word: אֵיל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - macho
  lexicon: HALOT
  rationale: '''Carnero'' es el equivalente natural y preciso en español para el animal sacrificial masculino especificado aquí.'
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: del holocausto
  alternatives_spanish:
  - de la ofrenda quemada
  - de la ofrenda totalmente quemada
  lexicon: HALOT
  rationale: Para עֹלָה, 'holocausto' es el término bíblico tradicional y comprensible en español para esta ofrenda sacrificial. Se evita una paráfrasis larga que debilitaría el término técnico.
- source_word: וַיִּסְמְכוּ
  english_pob_choice: laid
  chosen_spanish: pusieron
  alternatives_spanish:
  - apoyaron
  - impusieron
  lexicon: HALOT
  rationale: En el gesto ritual de סמך, el español 'pusieron las manos' comunica con claridad la acción sacrificial sin añadir una interpretación que el versículo no explicita.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: HALOT
  rationale: Se mantiene el plural explícito del hebreo para conservar la acción conjunta de Aarón y sus hijos.
- source_word: עַל רֹאשׁ הָאָיִל
  english_pob_choice: on the head of the ram
  chosen_spanish: sobre la cabeza del carnero
  alternatives_spanish:
  - encima de la cabeza del carnero
  lexicon: HALOT
  rationale: '''Sobre la cabeza'' reproduce de forma directa la relación espacial del hebreo y suena natural en español litúrgico y narrativo.'
theological_decisions:
- issue: Gesto ritual de imponer/poner las manos
  english_pob_reading: laid their hands on the head of the ram
  chosen_spanish_reading: pusieron sus manos sobre la cabeza del carnero
  alternative_spanish_readings:
  - impusieron sus manos sobre la cabeza del carnero
  - apoyaron sus manos sobre la cabeza del carnero
  rationale: Se conserva la tensión interpretativa del rito sin explicitar en la traducción una transferencia de culpa, identificación u otra explicación que el versículo no formula. La redacción refleja solo el acto ritual descrito por el texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el criterio de la POB en inglés: el carnero se identifica como perteneciente al holocausto, y el gesto de las manos se mantiene como acto ritual sin añadir explicación doctrinal no expresada en el versículo.'
  spanish_consistency_notes:
  - Se usa 'holocausto' como término técnico para עֹלָה, en coherencia con la tradición bíblica española y con la precisión cultual del pasaje.
  - Se evita 'SEÑOR' u otro reemplazo porque no aparece aquí el tetragrámaton ni una referencia al nombre divino.
  - '''Carnero'' mantiene la especificidad sacrificial del hebreo אֵיל.'
  - '''Pusieron sus manos'' conserva el plural y la sobriedad del relato ritual.'
