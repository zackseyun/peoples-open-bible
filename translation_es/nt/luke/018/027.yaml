translation:
  language: es
  text: 'Pero él dijo[a]: «Lo imposible con los hombres es posible con Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo imposible para los hombres es posible para Dios».'
