    rationale: El hebreo repite verbo e instrumento de serrar. «Labradas» introduce una idea más amplia de labrado y no refleja tan claramente el serrado concreto documentado en el POB inglés.
  - severity: medium
    issue: «gran atrio» puede ser menos preciso que «gran patio» para חָצֵר
    rationale: חָצֵר en este contexto arquitectónico se entiende de manera más general como patio/courtyard. «Atrio» en español puede añadir un matiz cultual o eclesiástico no exigido por el texto.
  - severity: low
