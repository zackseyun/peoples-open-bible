translation:
  language: es
  text: 'Entonces Yahvé me dijo: «Toma para ti una tablilla grande y escribe en ella con un estilete ordinario[a]: “Maher-shalal-hash-baz”[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un estilete de hombre», «con un estilete común» o «en escritura ordinaria».
    reason: lexical_alternative
  - marker: b
    text: Hebreo Maher-shalal-hash-baz, probablemente con el sentido de «Pronto al botín, veloz al despojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del texto hebreo sin sustituirlo por un título. En español, el equivalente adoptado por defecto en este proyecto es «Yahvé», que conserva el valor del Tetragrama y evita la máscara litúrgica «SEÑOR».
- source_word: גִּלָּיוֹן גָּדוֹל
  english_pob_choice: a large tablet
  chosen_spanish: una tabla grande
  alternatives_spanish:
  - una gran lámina
  - una gran plancha
  - una gran tablilla
  lexicon: HALOT
  rationale: גִּלָּיוֹן designa una superficie de escritura; en español «tabla» comunica una pieza plana apta para escribir. «Grande» conserva גָּדוֹל de forma directa y natural.
- source_word: וּכְתֹב עָלָיו
  english_pob_choice: and write on it
  chosen_spanish: y escribe en ella
  alternatives_spanish:
  - y escribe sobre ella
  - e inscribe en ella
  lexicon: HALOT
  rationale: El imperativo se vierte de modo directo y claro. «En ella» concuerda con «tabla» y mantiene la referencia al soporte escrito.
- source_word: בְּחֶרֶט אֱנוֹשׁ
  english_pob_choice: with an ordinary stylus
  chosen_spanish: con un punzón ordinario
  alternatives_spanish:
  - con un punzón humano
  - con un instrumento común
  - con letra común
  lexicon: HALOT
  rationale: חֶרֶט es un instrumento de escritura/incisión; «punzón» preserva el sentido material. אֱנוֹשׁ aquí apunta a algo humano/común, no a un énfasis masculino; «ordinario» comunica esa oposición sin forzar «de un hombre».
- source_word: לְמַהֵר שָׁלָל חָשׁ בַּז
  english_pob_choice: Maher-shalal-hash-baz
  chosen_spanish: Maher-salal-has-baz
  alternatives_spanish:
  - Rápido al botín, veloz al despojo
  - Maher-shalal-hash-baz
  lexicon: HALOT
  rationale: La secuencia funciona como nombre simbólico propio en contexto, por lo que se translitera en el cuerpo principal. Se adapta la segmentación a la ortografía española con guiones, manteniendo la forma nominal.
theological_decisions:
- issue: Cómo expresar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de manera explícita. En español, «Yahvé» preserva el nombre del pacto y sigue el principio del proyecto de no enmascararlo como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si traducir o transliterar לְמַהֵר שָׁלָל חָשׁ בַּז
  english_pob_reading: Transliterate as a proper name in the main text
  chosen_spanish_reading: Transliterar como nombre propio en el texto principal
  alternative_spanish_readings:
  - Traducirlo como «Rápido al botín, veloz al despojo»
  rationale: En este contexto la frase pasa a funcionar como nombre simbólico del niño. Por eso se conserva como forma nominal en el cuerpo del versículo y se deja la lectura semántica para nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: ''Translate titles; transliterate names.'''
- issue: Sentido de אֱנוֹשׁ en בְּחֶרֶט אֱנוֹשׁ
  english_pob_reading: ordinary rather than explicitly male
  chosen_spanish_reading: ordinario/común, no marcadamente masculino
  alternative_spanish_readings:
  - de un hombre
  - humano
  rationale: La oposición probable es entre un instrumento o estilo especial y uno común de uso corriente. «Ordinario» conserva esa fuerza sin introducir una precisión de género que no es necesaria en el contexto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Coincide con el pasaje hebreo y con el audit trail inglés de alta concordancia; no se registran revisiones aplicadas en esta pasada.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como nombre divino en línea con el estándar del proyecto.
  - Se usa «tabla» para גִּלָּיוֹן por su naturalidad en español y su compatibilidad con un soporte de escritura visible.
  - «Punzón ordinario» mantiene la ambigüedad de בְּחֶרֶט אֱנוֹשׁ sin caer en un calco rígido.
  - La transliteración del nombre simbólico se adapta a la ortografía española con guiones y sin traducirlo en el texto principal.
  - Las notas a y b reproducen las alternativas semánticas preservadas por el audit trail inglés.
