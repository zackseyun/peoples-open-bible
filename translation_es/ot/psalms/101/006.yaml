review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: atención favorable a los fieles del país/tierra, propósito de estar con el rey, y calificación moral del que le servirá. Sin embargo, en dos puntos se aparta innecesariamente del rastro auditado: (1) la nota [a] cambia el tipo de alternativa preservada en inglés, pues el POB inglés documenta la alternativa verbal ''sentarse'' frente a ''habitar'', no una explicación adicional de ''tierra''; (2) ''Mis ojos están sobre'' suena menos natural en español que una formulación equivalente que preserve la imagen concreta.'
  spanish_quality_summary: El texto es comprensible y digno, pero conviene pulirlo para mayor naturalidad y fidelidad al estilo español bíblico moderno. 'Tengo puestos mis ojos en' suena más idiomático que 'Mis ojos están sobre'. Además, 'de la tierra' puede mantenerse en el texto, pero la nota debe reflejar la alternativa correcta heredada del inglés. 'El que anda en camino de integridad' es aceptable, aunque 'en un camino irreprochable' o 'en camino intachable' acercan mejor el valor de תמים; aun así, 'integridad' está bien sustentado por la nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Fieles', 'integridad' y 'servirá' son compatibles con las decisiones léxicas documentadas. La principal corrección requerida es de aparato crítico/nota, no de glosario teológico.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la alternativa léxica documentada por el POB inglés.
    rationale: El inglés conserva 'Or sit with me' para לָשֶׁבֶת עִמָּדִי. La nota española actual introduce en cambio una explicación sobre 'de la tierra', que no corresponde a la alternativa principal auditada.
  - severity: low
    issue: La expresión 'Mis ojos están sobre' es poco idiomática en español actual.
    rationale: Aunque comprensible, suena calcada. Una formulación como 'Tengo puestos mis ojos en' conserva la imagen hebrea y mejora la fluidez sin perder precisión.
  - severity: low
    issue: La nota [b] cambia levemente el matiz de la alternativa inglesa.
    rationale: El POB inglés ofrece 'in the way of integrity' como alternativa a 'in a blameless way'. En español conviene mantener esa relación más explícitamente, por ejemplo con 'en un camino irreprochable' / 'en el camino de integridad'.
  revised_spanish_text: Tengo puestos mis ojos en los fieles de la tierra, para que habiten conmigo[a]; el que anda en un camino irreprochable[b], ese me servirá.
