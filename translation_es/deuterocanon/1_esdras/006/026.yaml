translation:
  language: es
  text: Y también ordenó a Sisines, gobernador de Siria y Fenicia, y a Sathrabuzanes y a sus asociados, y a los gobernadores designados en Siria y Fenicia, que se mantuvieran alejados del lugar, pero que dejaran en paz[a] a Zorobabel, el siervo del Señor y gobernador de Judea, y a los ancianos de los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permitieran a Zorobabel, el siervo del Señor, gobernador de Judea, y a los ancianos de los judíos, seguir adelante». El griego dice literalmente «dejar» o «permitir», en un contexto de no interferencia oficial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσετάξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes
  lexicon: LSJ
  rationale: El aoristo de προστάσσω expresa una orden autoritativa. «Ordenó» comunica bien la fuerza directiva en español actual sin sonar artificioso.
- source_word: ἐπιμεληθῆναι
  english_pob_choice: ordered
  chosen_spanish: ordenó ... que
  alternatives_spanish:
  - encargó ... que
  - dio instrucciones para que
  lexicon: LSJ
  rationale: En la construcción con infinitivo, la idea es el contenido de la orden. En español, se expresa de forma natural con «ordenó ... que», sin duplicar mecánicamente el verbo griego.
- source_word: ἐπάρχῳ
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - sátrapa
  - prefecto
  lexicon: LSJ
  rationale: Designa un funcionario de autoridad provincial. «Gobernador» es claro y adecuado para un lector moderno.
- source_word: συνεταίροις
  english_pob_choice: associates
  chosen_spanish: asociados
  alternatives_spanish:
  - compañeros
  - colegas
  - funcionarios asociados
  lexicon: LSJ
  rationale: En este marco administrativo, «asociados» conserva el sentido de colaboradores oficiales mejor que una traducción más íntima como «compañeros».
- source_word: ἀποτεταγμένοις ... ἡγεμόσιν
  english_pob_choice: the appointed governors
  chosen_spanish: los gobernadores designados
  alternatives_spanish:
  - los líderes designados
  - los funcionarios asignados
  lexicon: LSJ
  rationale: ἀποτεταγμένοις indica designación o asignación, y ἡγεμόσιν alude a gobernantes o gobernadores. «Gobernadores designados» mantiene ambos elementos con naturalidad.
- source_word: ἀπέχεσθαι τοῦ τόπου
  english_pob_choice: to keep away from the place
  chosen_spanish: se mantuvieran alejados del lugar
  alternatives_spanish:
  - se apartaran del lugar
  - se abstuvieran de intervenir en el lugar
  lexicon: LSJ
  rationale: La expresión es literalmente espacial, pero en contexto implica no interferir con el sitio. «Mantenerse alejados del lugar» preserva la imagen y la función pragmática.
- source_word: ἐᾶσαι
  english_pob_choice: to leave ... alone
  chosen_spanish: dejaran en paz
  alternatives_spanish:
  - permitieran
  - dejaran solo
  lexicon: LSJ
  rationale: El verbo significa dejar, permitir, dejar estar. «Dejar en paz» comunica bien la idea de no interferencia oficial y conserva el matiz relacional del contexto.
- source_word: παῖδα Κυρίου
  english_pob_choice: the servant of the Lord
  chosen_spanish: el siervo del Señor
  alternatives_spanish:
  - el servidor del Señor
  - el hijo del Señor
  lexicon: LSJ
  rationale: Aunque παῖς puede significar «niño» o «siervo», aquí el contexto honorífico-administrativo exige la noción de servidor. «Siervo del Señor» es la equivalencia más fiel y natural en español bíblico.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: 'DOCTRINE.md Contested terms: κύριος → Lord'
  rationale: Se mantiene el equivalente reverencial «Señor», coherente con el tratamiento doctrinal del término en este contexto escritural.
- source_word: ὕπαρχον
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - ruler
  - administrador
  lexicon: LSJ
  rationale: El término señala a una persona con autoridad sobre una región. «Gobernador» evita forzar una distinción artificial en español y encaja con el contexto político.
- source_word: πρεσβυτέρους
  english_pob_choice: elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  lexicon: LSJ
  rationale: En contexto judío, el término alude a dirigentes comunales reconocidos. «Ancianos» es la forma bíblica tradicional y semánticamente adecuada.
theological_decisions:
- issue: Tratamiento de κύριος en la frase παῖδα Κυρίου
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: En este contexto bíblico judío, κύριος conserva un valor reverencial y no debe rebajarse a un sentido más doméstico. «Señor» preserva la carga doctrinal y litúrgica habitual del término.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor de παῖς aplicado a Zorobabel
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - servidor
  - hijo
  rationale: El sentido es honorífico y funcional dentro del lenguaje bíblico de servicio, no biológico. «Siervo» conserva la tensión entre subordinación y dignidad sin añadir implicaciones ajenas al pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto griego base coincide sustancialmente con la auditoría inglesa y no requiere cambios textuales; la principal decisión de traducción es conservar el doble matiz de no interferencia («mantenerse alejados» / «dejar en paz») sin convertirlo en una paráfrasis interpretativa. La variante inglesa en nota se refleja como alternativa española porque el griego permite tanto el alejamiento como la autorización de proceder.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca de forma explícita en otros versículos; aquí el griego tiene κύριος dentro de una expresión reverencial, por lo que se traduce «Señor» siguiendo la auditoría doctrinal para esta fórmula fija.
  - «Zorobabel» se conserva como forma española estándar del nombre propio.
  - Se mantiene la secuencia administrativa de cargos y grupos para reflejar la sintaxis acumulativa del griego.
  - «Ancianos» se prefiere a «líderes» por su correspondencia bíblica y comunitaria en contexto judío.
