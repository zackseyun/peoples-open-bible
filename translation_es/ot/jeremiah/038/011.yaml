  to: Entonces Ebed-melec tomó consigo a los hombres y entró en la casa del rey, a un lugar debajo del almacén[a], y de allí tomó trapos raídos[b] y prendas raídas, y se los envió a Jeremías, a la cisterna[c], por medio de cuerdas.
