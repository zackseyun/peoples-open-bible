revisions:
- from: Y en este monte él tragará[a] el velo que cubre a todos los pueblos[b], y la cubierta que está extendida sobre todas las naciones.
  to: Y en este monte se tragará la cubierta que cubre sobre todos los pueblos[b][a], y el velo que está extendido sobre todas las naciones.
  rationale: 'Se revisa para alinear el español con la secuencia léxica y la lógica del POB auditado: primero ''cubierta'' y luego ''velo''; se restaura mejor la imagen espacial del original con ''sobre''; se sustituyen las notas por las dos notas relevantes del registro inglés. Aunque ''cubre sobre'' es un giro algo pesado, aquí preserva de manera más transparente la repetición cognada y la preposición del hebreo. No requiere adjudicación adicional.'
  reviewer_model: gpt-5.4
