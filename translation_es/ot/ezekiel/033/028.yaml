translation:
  language: es
  text: Y haré de la tierra una desolación y una ruina[a], y cesará el orgullo[b] de su fuerza; los montes de Israel quedarán desolados, sin que nadie pase por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'espanto' o 'asombro' para 'ruina'; el término hebreo puede implicar algo tan arruinado que cause horror o asombro.
    reason: lexical_alternative
  - marker: b
    text: O 'la majestad de su fuerza'. La frase hebrea puede leerse de manera más neutral, pero en este contexto de juicio 'el orgullo de su fuerza' encaja mejor.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will make
  chosen_spanish: haré de
  alternatives_spanish:
  - pondré
  - daré
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente 'dar/poner', pero en esta construcción causativa con 'la tierra' y predicados de ruina, el español natural es 'haré de', que conserva el valor causativo sin sonar forzado.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En Ezequiel se trata de la tierra de Israel en contexto de juicio, y 'tierra' es el equivalente español más natural y preciso.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desierta
  - un horror
  lexicon: HALOT
  rationale: El sustantivo expresa un estado de devastación; conservar el sustantivo en español reproduce el paralelismo nominal del hebreo.
- source_word: וּמְשַׁמָּה
  english_pob_choice: and a waste
  chosen_spanish: un desierto
  alternatives_spanish:
  - una desolación
  - una ruina
  - un espanto
  lexicon: HALOT
  rationale: Para evitar repetir exactamente 'desolación' y mantener el paralelismo con matiz distinto, 'desierto' comunica ruina y abandono. Se ancla con nota porque también puede sugerir 'espanto' o 'horror' en algunos contextos.
- source_word: וְנִשְׁבַּת
  english_pob_choice: will cease
  chosen_spanish: cesará
  alternatives_spanish:
  - será puesto fin
  - será cortado
  lexicon: HALOT
  rationale: El sentido es de cesación. 'Cesará' es idiomático y conserva la fuerza verbal del original.
- source_word: גְּאוֹן
  english_pob_choice: the pride
  chosen_spanish: el orgullo
  alternatives_spanish:
  - la majestad
  - la altivez
  lexicon: HALOT
  rationale: En un oráculo de juicio, el término funciona con carga negativa; 'orgullo' preserva esa tensión sin neutralizarla como 'majestad'.
- source_word: עֻזָּהּ
  english_pob_choice: of its strength
  chosen_spanish: de su fuerza
  alternatives_spanish:
  - de su poder
  - de su fortaleza
  lexicon: HALOT
  rationale: El sufijo retoma a 'la tierra'. 'Fuerza' es claro en español y mantiene la idea de vigor/poder.
- source_word: וְשָׁמְמּוּ
  english_pob_choice: will be desolate
  chosen_spanish: quedarán desolados
  alternatives_spanish:
  - serán asolados
  - quedarán arruinados
  lexicon: HALOT
  rationale: Para las montañas personificadas, 'quedarán desolados' expresa el estado resultante con naturalidad en español.
- source_word: הָרֵי יִשְׂרָאֵל
  english_pob_choice: the mountains of Israel
  chosen_spanish: los montes de Israel
  alternatives_spanish:
  - las montañas de Israel
  lexicon: HALOT
  rationale: '''Montes'' es una forma bíblica natural en español y preserva la expresión recurrente de Ezequiel.'
- source_word: מֵאֵין עוֹבֵר
  english_pob_choice: with no one passing through
  chosen_spanish: sin que nadie pase por ellos
  alternatives_spanish:
  - sin que nadie atraviese
  - con nadie que pase
  lexicon: HALOT
  rationale: La frase expresa abandono y ausencia de tránsito. 'Sin que nadie pase por ellos' mantiene la resultativa de forma idiomática; se usa 'ellos' para concordar con 'los montes'.
theological_decisions:
- issue: Valor de גְּאוֹן en un contexto de juicio
  english_pob_reading: negative 'pride' rather than neutral 'majesty'
  chosen_spanish_reading: '''orgullo'' en vez de ''majestad'''
  alternative_spanish_readings:
  - majestad
  - arrogancia
  rationale: El anuncio es de humillación y ruina; por eso conviene mantener el matiz evaluativo negativo del término sin resolverlo hacia un sentido neutral.
  doctrine_reference: Primacía del valor retórico del hebreo en un oráculo de juicio; no suavizar la tensión semántica.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español, manteniendo la nota léxica y la alternativa de lectura ya documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y publicable en español neutro.
  - Se evitó 'SEÑOR' para el nombre divino porque este versículo no lo contiene.
  - Se conservó el paralelismo hebreo con dos sustantivos de ruina y una clausula final de abandono.
  - '''Montes de Israel'' se preservó como expresión técnica recurrente en Ezequiel.'
