    issue: La nota al pie está anclada en 'miente' en lugar de la frase 'exhala mentiras'.
    rationale: La nota inglesa explica una alternativa léxica para 'breathes out lies', no para 'does not lie'. El anclaje actual induce a error sobre qué expresión comenta la nota.
  - severity: medium
    issue: El texto de la nota al pie mezcla indebidamente dos segmentos y tiene comillas/puntuación defectuosas.
    rationale: La formulación actual ('para ''miente'' y ''exhala mentiras''') no corresponde al contenido de la nota original y reduce la legibilidad. Debe expresar con claridad la alternativa 'pronuncia falsedades' o 'profiera mentiras' respecto de la imagen de exhalar.
  revised_spanish_text: Un testigo fiel no miente, pero un testigo falso exhala mentiras[a].
