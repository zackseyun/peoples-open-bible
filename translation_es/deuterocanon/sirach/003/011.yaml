translation:
  language: es
  text: La honra de un hombre es la honra de su padre[b][a], y quien deshonra a su madre multiplica el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'quien maldice a su madre multiplica el pecado'. El verbo hebreo puede significar específicamente 'maldecir', aunque aquí el paralelismo entre honra y deshonra, junto con el testimonio griego, favorece el sentido más amplio 'deshonra'.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego dice: ''porque la gloria de un hombre proviene de la honra de su padre, y una madre en deshonra es un oprobio para sus hijos'', lo que refleja una segunda línea algo diferente de la del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּבוֹד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - gloria
  lexicon: HALOT
  rationale: En este contexto sapiencial, el término expresa reputación y estima social dentro del marco familiar. "Honra" conserva mejor en español la relación ética y relacional que "gloria", y evita una resonancia demasiado litúrgica o abstracta.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino singular y funciona proverbialmente. "Un hombre" respeta la forma del original y mantiene el paralelismo sin neutralizar el género gramatical de la fuente.
- source_word: כִּבּוּד אָבִיו
  english_pob_choice: the honor of his father
  chosen_spanish: la honra de su padre
  alternatives_spanish:
  - la honra que recibe de su padre
  - la honra derivada del honor de su padre
  lexicon: HALOT
  rationale: La construcción hebrea es breve y cercana a una ecuación proverbial. "La honra de su padre" preserva la formulación compacta del hebreo y comunica la identificación estrecha entre la honra del hijo y la del padre.
- source_word: וּמַרְבֶּה
  english_pob_choice: multiplies
  chosen_spanish: multiplica
  alternatives_spanish:
  - aumenta
  - hace crecer
  lexicon: HALOT
  rationale: El valor causativo del verbo se expresa bien con "multiplica", que es preciso, breve y acorde con el lenguaje sapiencial.
- source_word: חֵטְא
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el pecado moral
  - la culpa
  lexicon: HALOT
  rationale: '"Pecado" es el equivalente directo y más transparente en español bíblico. Mantiene el alcance ético y teológico del término sin introducir matices ajenos.'
- source_word: מְקַלֵּל אִמּוֹ
  english_pob_choice: one who dishonors his mother
  chosen_spanish: quien deshonra a su madre
  alternatives_spanish:
  - quien maldice a su madre
  - quien ultraja a su madre
  lexicon: HALOT
  rationale: El verbo puede significar "maldecir" o, en el marco de honor/vergüenza, tratar con desprecio o deshonra. Dado el paralelismo con la primera cola y el apoyo de la lectura griega, "deshonra" preserva el sentido amplio sin excluir el abuso verbal.
theological_decisions:
- issue: Paralelismo honor/vergüenza en la segunda cola
  english_pob_reading: whoever dishonors his mother multiplies sin
  chosen_spanish_reading: quien deshonra a su madre multiplica el pecado
  alternative_spanish_readings:
  - quien maldice a su madre multiplica el pecado
  - quien afrenta a su madre multiplica el pecado
  rationale: La lectura de la POB en inglés privilegia el sentido amplio de deshonra, no solo el acto verbal de maldecir. En español, "deshonra" conserva el paralelismo con "honra" y respeta la tensión documentada con el hebreo más específico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Forma proverbial masculina singular
  english_pob_reading: A man's honor is the honor of his father
  chosen_spanish_reading: La honra de un hombre es la honra de su padre
  alternative_spanish_readings:
  - La honra de una persona es la honra de su padre
  - La honra de alguien es la honra de su padre
  rationale: El hebreo usa אִישׁ, forma masculina singular con fuerza representativa. Se conserva en español para no diluir la precisión formal de la fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que eliminó el for inicial y cambió "one who" por "whoever"; por eso se usa una cláusula española natural con "quien" sin necesidad de añadir marcadores de nota. También se respetó la tensión documentada entre el hebreo ('maldice') y el apoyo del paralelo griego ('deshonra/disgracia') mediante la elección principal 'deshonra'.
  spanish_consistency_notes:
  - Se mantiene "honra" para כבוד en coherencia con el campo semántico honor/vergüenza.
  - Se evita "Cristo", "SEÑOR" u այլ terminología no pertinente a este versículo.
  - La estructura del versículo es breve y proverbial, por lo que se prefiere una sintaxis directa y pública en español.
  - No se añadieron notas al pie porque la traducción principal ya incorpora la decisión lexical documentada y no requiere marcas de variante en el texto.
