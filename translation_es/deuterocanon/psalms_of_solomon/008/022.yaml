lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conector causal/discursivo
  rationale: El griego introduce la explicación causal; «Porque» conserva la relación lógica con la frase anterior en un español natural y sobrio.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: θεός
  rationale: El sustantivo sin artículo definido en español como nombre divino se traduce de forma directa por «Dios».
- source_word: ἤγαγεν
  english_pob_choice: led
  chosen_spanish: condujo
  alternatives_spanish:
  - llevó
  - guió
  lexicon: ἄγω
  rationale: «Condujo» comunica el sentido de dirigir el curso de alguien sin forzar una imagen demasiado específica; mantiene la acción de guía del aoristo.
- source_word: μετὰ ἀσφαλείας
  english_pob_choice: safely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - con protección
  - en seguridad
  lexicon: ἀσφαλεία
  rationale: La frase adverbial expresa seguridad/protección en el traslado. «Con seguridad» es idiomático en español y conserva la fuerza adverbial del griego.
- source_word: ἐν τῇ πλανήσει
  english_pob_choice: through their wandering
  chosen_spanish: en su extravío
  alternatives_spanish:
  - en su error
  - en su engaño
  - en su desviación
  lexicon: πλάνη
  rationale: El contexto de Psalmos de Salomón 8:22 favorece el sentido de extravío/error moral más que una caminata física. «Extravío» mantiene la ambigüedad entre desviación y delirio sin reducirlo a mera movilidad.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - su propia
  lexicon: pronombre posesivo plural
  rationale: En español, el posesivo singular «su» puede referir al grupo plural mencionado y resulta natural; el contexto mantiene la referencia colectiva.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el vaivén del audit trail inglés entre «in their error» y «through their wandering». Para el español se eligió una solución que no borra la tensión: «extravío» permite leer tanto desviación moral como confusión/delirio, sin imponer un matiz demasiado estrecho.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Dios» conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque aquí no aparece יהוה en el texto fuente.
  - «Con seguridad» preserva el valor adverbial de μετὰ ἀσφαλείας sin añadir interpretación.
  - Las notas a pie de página reflejan las alternativas semánticas documentadas en el audit trail inglés y una variante española natural.
