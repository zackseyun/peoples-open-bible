translation:
  language: es
  text: Entonces Jacob ofreció un sacrificio en el monte y llamó a sus hermanos[a] para comer pan. Comieron pan y pasaron la noche en el monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus parientes» o «sus familiares»; el hebreo «hermanos» puede referirse de manera más amplia a varones emparentados o vinculados con Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  english_pob_choice: offered a sacrifice
  chosen_spanish: ofreció un sacrificio
  alternatives_spanish:
  - sacrificó
  - hizo un sacrificio
  - ofreció un sacrificio sacrificial
  lexicon: HALOT
  rationale: זבח en contexto cultual expresa la acción de ofrecer un sacrificio. En español, «ofreció un sacrificio» conserva el sentido ritual sin sonar mecánico ni introducir una forma menos natural.
- source_word: זֶבַח
  english_pob_choice: a sacrifice
  chosen_spanish: un sacrificio
  alternatives_spanish:
  - sacrificio
  - un acto sacrificial
  lexicon: HALOT
  rationale: El sustantivo repite y refuerza la acción sacrificial. «Un sacrificio» mantiene la construcción cognada sin perder claridad en español.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - en la montaña
  - sobre el monte
  lexicon: HALOT
  rationale: En narración bíblica, הַר puede traducirse como «monte» o «montaña». Aquí «en el monte» suena natural en español bíblico y conserva la referencia topográfica definida.
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - invitó
  - mandó llamar
  lexicon: HALOT
  rationale: קרא significa literalmente «llamar». En este contexto funciona como invitación, pero «llamó» preserva la cercanía al hebreo y permite que el sentido de invitación se entienda por el complemento.
- source_word: לְאֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus parientes
  - a sus parientes varones
  - a sus deudos
  lexicon: HALOT
  rationale: אָח puede abarcar hermanos literales o parientes/aliados masculinos. La forma principal conserva la textura del hebreo; la amplitud semántica queda indicada en nota.
- source_word: לֶאֱכָל לָחֶם
  english_pob_choice: to eat bread
  chosen_spanish: para comer pan
  alternatives_spanish:
  - para comer
  - para compartir una comida
  lexicon: HALOT
  rationale: La expresión es literalmente «comer pan», un modismo para tomar alimento. «Para comer pan» preserva el hebraísmo y el color ritual del banquete de pacto.
- source_word: וַיֹּאכְלוּ לֶחֶם
  english_pob_choice: They ate bread
  chosen_spanish: Comieron pan
  alternatives_spanish:
  - Comieron
  - Compartieron una comida
  lexicon: HALOT
  rationale: Se mantiene la repetición literal de «pan» para reflejar el paralelismo del hebreo y el tono de comida compartida, sin explicitar más de lo que el texto dice.
- source_word: וַיָּלִינוּ
  english_pob_choice: spent the night
  chosen_spanish: pasaron la noche
  alternatives_spanish:
  - se alojaron
  - pernoctaron
  - se quedaron esa noche
  lexicon: HALOT
  rationale: לון significa pernoctar o alojarse. «Pasaron la noche» es natural en español actual y comunica con precisión la acción.
theological_decisions:
- issue: Sentido amplio de «hermanos» en un contexto de pacto
  english_pob_reading: Rendered as 'his brothers' in the main text, with a footnote noting broader kin/associate possibilities.
  chosen_spanish_reading: Se conserva «sus hermanos» en el texto principal, con nota sobre el posible sentido más amplio de parientes o asociados.
  alternative_spanish_readings:
  - sus parientes
  - sus familiares
  - sus deudos
  rationale: El hebreo usa el término familiar sin expansión interpretativa. Mantener «hermanos» preserva la forma fuente y deja constancia de la amplitud semántica sin imponerla al texto principal.
  doctrine_reference: Principios POB sobre fidelidad léxica y preservación de la forma fuente cuando no hay necesidad contextual de neutralizarla.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió «offered a sacrifice» frente a una formulación menos natural, y se reflejó en español con una expresión idiomática equivalente sin perder la redundancia enfática del hebreo. El resto del versículo permanece alineado con el texto hebreo y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «pan» dos veces para reproducir la repetición del hebreo.
  - Se eligió «monte» de forma consistente para בָּהָר.
  - Se preservó «hermanos» como término principal y se explicó su posible valor ampliado en nota.
  - El tono es bíblico pero en español moderno y claro, sin calco rígido.
