translation:
  language: es
  text: 'Entonces se acercaron las hijas de Zelofehad[a], hijo de Hefer, hijo de Galaad, hijo de Maquir, hijo de Manasés, de los clanes de Manasés, hijo de José, y estos eran los nombres de sus hijas: Majlá, Noa[b], Joglá, Milca y Tirsa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se acercaron»; también podría traducirse «se aproximaron» o «se presentaron». La expresión puede sugerir que se adelantaron para una petición formal, como muestran los versículos siguientes.'
    reason: lexical_alternative
  - marker: b
    text: «Noa» aquí es el nombre de una de las hijas de Zelofehad, no el personaje masculino Noé de Génesis.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּקְרַבְנָה
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - se presentaron
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia una autoridad o presencia formal; 'se acercaron' conserva el valor de acercamiento sin añadir de antemano la idea jurídica completa del contexto siguiente.
- source_word: בְּנוֹת
  english_pob_choice: daughters of
  chosen_spanish: las hijas de
  alternatives_spanish:
  - las descendientes femeninas de
  lexicon: HALOT
  rationale: Aquí el sentido es literal y la fórmula genealógica lo confirma. 'Hijas de' es natural en español y precisa.
- source_word: בֶּן ... בֶּן ... בֶּן ... בֶּן
  english_pob_choice: son of ... son of ... son of ... son of
  chosen_spanish: hijo de ... hijo de ... hijo de ... hijo de
  alternatives_spanish:
  - descendiente de ... descendiente de ... descendiente de ... descendiente de
  lexicon: HALOT
  rationale: Se conserva la cadena genealógica completa porque sustenta la reclamación de herencia. 'Hijo de' reproduce la estructura formal del hebreo.
- source_word: לְמִשְׁפְּחֹת
  english_pob_choice: from the clans of
  chosen_spanish: de los clanes de
  alternatives_spanish:
  - pertenecientes a los clanes de
  - según los clanes de
  lexicon: HALOT
  rationale: En contexto tribal, מִשְׁפָּחָה se entiende mejor como 'clan'. La preposición ל marca afiliación; 'de los clanes de' preserva esa relación de pertenencia.
- source_word: מְנַשֶּׁה בֶן יוֹסֵף
  english_pob_choice: Manasseh son of Joseph
  chosen_spanish: de Manasés, hijo de José
  alternatives_spanish:
  - de Manasés, el hijo de José
  lexicon: HALOT
  rationale: Se mantiene la conexión con la línea de José y la referencia tribal de Manasés. El orden español se ajusta para sonar natural sin perder la genealogía.
- source_word: וְאֵלֶּה
  english_pob_choice: And these were
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Y estos eran
  - Ahora estos son
  lexicon: HALOT
  rationale: La fórmula de introducción de nombres en español suena más natural en presente narrativo, manteniendo la fuerza demostrativa del hebreo.
- source_word: שְׁמוֹת
  english_pob_choice: the names of
  chosen_spanish: los nombres de
  alternatives_spanish:
  - los nombres
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal completa para introducir la lista de nombres.
- source_word: בְּנֹתָיו
  english_pob_choice: his daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - las hijas de él
  lexicon: HALOT
  rationale: El sufijo posesivo remite a Zelofehad; 'sus hijas' es idiomático y claro en español.
- source_word: מַחְלָה נֹעָה וְחָגְלָה וּמִלְכָּה וְתִרְצָה
  english_pob_choice: Mahlah, Noah, Hoglah, Milcah, and Tirzah
  chosen_spanish: Majlá, Noa, Joglá, Milca y Tirsa
  alternatives_spanish:
  - Mahlá, Noa, Hogla, Milca y Tirsa
  lexicon: standard transliteration conventions
  rationale: Los nombres propios se transliteran al español con formas legibles y coherentes. 'Noa' se conserva como nombre femenino distinto del personaje masculino Noé.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; la propuesta española sigue esa lectura sin introducir expansiones interpretativas.
  spanish_consistency_notes:
