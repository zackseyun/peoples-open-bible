theological_decisions:
- issue: Rendering רוּחַ יְהוָה
  chosen_reading: the Spirit of Yahweh
  alternative_readings:
  - the wind of the LORD
  rationale: The immediate context concerns Elijah's extraordinary removal and the prophetic community's fear that divine agency relocated him. While רוּחַ can lexically mean 'wind,' the personal divine action in this narrative favors 'Spirit.' The alternative is preserved in a footnote because the Hebrew term can bear either sense in some contexts.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
