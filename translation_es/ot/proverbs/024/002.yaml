translation:
  language: es
  text: Porque su corazón medita en destrucción[a], y sus labios hablan[b] daño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ruina» / «devastación» para שֹׁד, enfatizando el daño arrasador que contemplan.
    reason: lexical_alternative
  - marker: b
    text: O «maldad» / «perjuicio» para עָמָל, destacando la intención dañina de lo que expresan.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el proverbio anterior. «Porque» conserva la fuerza causal/explanatoria de כִּי de manera natural en español.
- source_word: שֹׁד
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - violencia
  - devastación
  - ruina
  lexicon: HALOT
  rationale: El auditorial inglés revisó esta palabra desde «violence» a «destruction» para reflejar mejor שֹׁד. En español, «destrucción» sigue esa decisión y comunica el daño ruinoso contemplado, sin perder la tensión lexical del término.
- source_word: יֶהְגֶּה
  english_pob_choice: meditates on
  chosen_spanish: medita en
  alternatives_spanish:
  - maquina
  - piensa en
  - medita sobre
  lexicon: HALOT
  rationale: El verbo puede expresar rumiar, pensar o murmurar interiormente. Con «corazón» como sujeto, «medita en» conserva la interioridad y el carácter sostenido del pensamiento sin forzar una interpretación demasiado explícita como «maquina».
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  - el corazón de ellos
  lexicon: HALOT
  rationale: En hebreo, «corazón» nombra la sede del pensamiento y la voluntad. El singular colectivo español «su corazón» conserva ese uso antropológico bíblico y suena natural en el proverbio.
- source_word: עָמָל
  english_pob_choice: trouble
  chosen_spanish: maldad
  alternatives_spanish:
  - miseria
  - trabajo
  - aflicción
  - miseria dañina
  lexicon: HALOT
  rationale: Aquí el paralelismo con la primera cola y el hecho de que se trata de lo que «hablan» sus labios favorecen un valor de daño/iniquidad más que de «fatiga» o «trabajo». «Maldad» expresa ese contenido injurioso de modo claro en español, aunque reconoce la tensión semántica del término.
- source_word: שִׂפְתֵיהֶם
  english_pob_choice: their lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su boca
  - sus palabras
  lexicon: HALOT
  rationale: Mantiene la imagen poética concreta del hebreo y el contraste entre el interior del corazón y la exterioridad del habla.
- source_word: תְּדַבֵּרְנָה
  english_pob_choice: speak
  chosen_spanish: hablan
  alternatives_spanish:
  - hablarán
  - dicen
  - expresan
  lexicon: HALOT
  rationale: El imperfecto gnómico hebreo expresa una acción caracterizadora o habitual. En español, el presente «hablan» reproduce bien el valor proverbial y la generalización sentenciosa.
theological_decisions:
- issue: Relación entre el mal interior y el habla exterior
  english_pob_reading: Their heart meditates on destruction, and their lips speak trouble.
  chosen_spanish_reading: Su corazón medita en destrucción, y sus labios hablan maldad.
  alternative_spanish_readings:
  - Su corazón medita en destrucción, y sus labios hablan trouble/daño.
  - Su corazón trama destrucción, y sus labios hablan maldad.
  rationale: El versículo presenta una correspondencia entre intención interna y expresión verbal. Se preserva esa tensión sin intensificarla indebidamente a «trama», aunque esa opción también cabe contextualmente. El español mantiene el paralelismo entre pensamiento y palabra, que es el punto moral del proverbio.
  doctrine_reference: 'Sabiduría bíblica: correlación entre el corazón y la conducta; cf. Prov. 4:23; Mt. 12:34'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés, que prefirió «destruction» sobre «violence» para שֹׁד. La redacción española sigue esa corrección y evita una equivalencia más general como «violencia» salvo que el contexto exigiera destacar el acto violento en sí.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo hebreo entre corazón y labios.
  - Se usó el singular colectivo «su corazón» como reflejo natural del hebreo.
  - Se evitó «Señor» u otro término de sustitución porque el versículo no contiene el nombre divino.
  - Se preservó un registro bíblico contemporáneo y digno, sin arcaísmos innecesarios.
