    changes_summary: 'Revised ''my strength was dried up as by the heat of summer'' to more closely reflect the Hebrew: ''my vitality was turned into the drought of summer.'' This preserves the passive/transformative sense of נֶהְפַּךְ and renders לְשַׁדִּי more precisely as ''my vitality.'''
translation:
  language: es
  text: Porque de día y de noche tu mano pesaba sobre mí; mi vitalidad[a] se volvió la sequía del verano[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi humedad» o «mi vitalidad» se volvió.
    reason: lexical_alternative
  - marker: b
    text: O «como en las sequías del verano».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  - Porque
  lexicon: HALOT
  rationale: Introduce la relación explicativa con la frase anterior; en español, «Porque» conserva bien el enlace causal/explicativo sin endurecer el argumento más allá del hebreo.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - día y noche
  - todo el día y toda la noche
  - de día y por la noche
  lexicon: HALOT
  rationale: Es un merismo de duración continua. «De día y de noche» es natural en español y mantiene la idea de continuidad.
- source_word: תִּכְבַּד ... יָדֶךָ
  english_pob_choice: your hand was heavy
  chosen_spanish: tu mano pesaba
  alternatives_spanish:
  - tu mano era pesada
  - tu mano oprimía
  - tu mano pesaba fuertemente
  lexicon: HALOT
  rationale: «Pesaba» preserva la metáfora concreta de la mano que oprime por su peso. En español suena más idiomático que una calca rígida y mantiene la imagen de presión divina.
- source_word: עָלַי
  english_pob_choice: upon me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - sobre mí
  - contra mí
  - en mí
  lexicon: HALOT
  rationale: «Sobre mí» reproduce la imagen de presión descansando encima del orante, como en el inglés auditado.
- source_word: נֶהְפַּךְ
  english_pob_choice: was turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - fue transformada
  - se cambió
  - se convirtió
  lexicon: HALOT
  rationale: El verbo hebreo conserva fuerza de transformación. «Se volvió» transmite ese giro sin perder naturalidad en español; además permite enlazar con la idea de desecación/vitalidad agotada.
- source_word: לְשַׁדִּי
  english_pob_choice: my vitality
  chosen_spanish: mi vitalidad
  alternatives_spanish:
  - mi humedad
  - mi jugo vital
  - mi fuerza
  lexicon: HALOT
  rationale: El campo léxico apunta a la savia/humedad vital del cuerpo. «Mi vitalidad» preserva el sentido experiencial y evita reducirlo a mera «fuerza» o a una imagen demasiado técnica.
- source_word: בְּחַרְבֹנֵי קַיִץ
  english_pob_choice: the drought of summer
  chosen_spanish: la sequedad del verano
  alternatives_spanish:
  - el ardor del verano
  - la sequía del verano
  - el calor abrasador del verano
  lexicon: HALOT
  rationale: La expresión hebrea combina calor/parquedad estivales. «La sequedad del verano» conserva el efecto de desecación que sigue a la pérdida de vitalidad y es comprensible en español; se evita desplazar el foco solo al calor.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva sin traducir como marcador litúrgico o musical de sentido incierto, siguiendo la transparencia del texto fuente.
theological_decisions:
- issue: Agencia divina en la aflicción
  english_pob_reading: The verse describes God's hand pressing heavily on the psalmist during unconfessed sin, without specifying a more detailed doctrine of punishment beyond the text.
  chosen_spanish_reading: El versículo presenta la mano de Dios como peso opresivo sobre el salmista, sin desarrollar un sistema doctrinal más amplio sobre el castigo.
  alternative_spanish_readings:
  - El texto podría leerse como sufrimiento general sin causalidad divina explícita.
  - El texto podría reforzarse doctrinalmente como juicio punitivo directo.
  rationale: El hebreo afirma «tu mano» y la imagen de presión, pero no define el mecanismo teológico completo. La traducción conserva esa tensión sin suavizar ni ampliar indebidamente la afirmación.
  doctrine_reference: Preservar la tensión teológica del texto en vez de resolverla
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que pasó de «dried up as by the heat of summer» a una formulación más cercana al hebreo: «my vitality was turned into the drought of summer». Por eso el español evita una paráfrasis centrada solo en el calor y conserva la transformación de la vitalidad en sequedad estival.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en la traducción general del proyecto; aquí el poseedor inmediato es de segunda persona («tu mano»), por lo que no aplica un sustituto nominal.
  - Se conserva «Selah» sin adaptar, como en el texto fuente.
  - La imagen corporal de «mano» y la sequedad/vitalidad se dejan en tensión metafórica, sin desmaterializar el pasaje.
