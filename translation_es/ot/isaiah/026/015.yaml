    reason: lexical_alternative
  - marker: b
    text: O «todos los confines de la tierra». El hebreo puede significar «extremos/bordes», pero en este contexto probablemente se refiere a los límites del territorio.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el texto para seguir más de cerca el hebreo y el expediente POB inglés: se hace natural «has aumentado la nación»; se mantiene «Yahvé»; se reemplaza «te has cubierto de gloria» por «has ganado gloria» para reflejar mejor el valor resultativo de נִכְבָּדְתָּ sin añadir una metáfora; y se prioriza la lectura territorial «límites de la tierra» para כָּל קַצְוֵי אָרֶץ, preservando «confines de la tierra» como alternativa en nota. También se reordenan y rehacen las notas para que correspondan exactamente a los anclajes y decisiones documentadas.'
