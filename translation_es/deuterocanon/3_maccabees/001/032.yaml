translation:
  language: es
  text: Pero la mayoría de ellos, fortaleciéndose con ánimo noble, no se apartaron de la piedad[a], sino que, cambiando sus posesiones por sus vidas, buscaron[b] con valentía salvarse del registro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no abandonaron la piedad". El griego εὐσέβεια puede denotar reverencia, devoción o piedad hacia Dios.'
    reason: lexical_alternative
  - marker: b
    text: El griego de este tramo es difícil en el texto transmitido, especialmente por el verbo ἐτιμῶντο; la traducción sigue el sentido probable de un esfuerzo activo por obtener liberación.
    reason: textual_variant
  - marker: c
    text: '"Registro" alude al proceso oficial de enrolamiento o listado impuesto sobre ellos, no necesariamente a un censo en sentido moderno.'
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ πλεῖστοι
  english_pob_choice: But most of them
  chosen_spanish: Pero la mayoría de ellos
  alternatives_spanish:
  - Y la mayoría de ellos
  - Ahora bien, la mayoría de ellos
  lexicon: LSJ
  rationale: La expresión partitiva-superlativa se rinde naturalmente como 'la mayoría de ellos'. 'Pero' conserva el valor contrastivo de δέ en el contexto narrativo.
- source_word: γενναίᾳ ψυχῇ
  english_pob_choice: with a noble spirit
  chosen_spanish: con ánimo noble
  alternatives_spanish:
  - con espíritu noble
  - con valor noble
  lexicon: LSJ
  rationale: El dativo expresa modo. ψυχή aquí señala la disposición interior; 'ánimo' transmite bien esa fuerza anímica sin sugerir un sentido técnico de 'alma'.
- source_word: ἐνίσχυσαν
  english_pob_choice: strengthening themselves
  chosen_spanish: fortaleciéndose
  alternatives_spanish:
  - tomaron fuerzas
  - se hicieron fuertes
  lexicon: LSJ
  rationale: La forma admite la idea de fortalecerse o tomar fuerzas. El participio en español expresa mejor la acción concomitante y mantiene la cercanía al griego revisado.
- source_word: οὐ διέστησαν τῆς εὐσεβείας
  english_pob_choice: did not depart from piety
  chosen_spanish: no se apartó de la piedad
  alternatives_spanish:
  - no abandonó la piedad
  - no se separó de la piedad
  lexicon: LSJ
  rationale: διίστημι con genitivo significa apartarse o separarse. εὐσέβεια en este contexto judío expresa reverencia fiel a Dios; 'piedad' conserva el peso religioso sin desplazarlo a un tecnicismo confesional posterior.
- source_word: τὰ τε χρήματα περὶ τοῦ ζῇν ἀντικαταλλασσόμενοι
  english_pob_choice: by exchanging their possessions for their lives
  chosen_spanish: cambiando sus posesiones por sus vidas
  alternatives_spanish:
  - intercambiando sus bienes por su vida
  - canjeando sus bienes por sus vidas
  lexicon: LSJ
  rationale: χρήματα puede ser bienes, posesiones o dinero; 'posesiones' sigue el sentido más amplio y natural. El giro περὶ τοῦ ζῇν se traduce como 'por sus vidas' para expresar el valor de supervivencia de forma clara.
- source_word: ἀδέως
  english_pob_choice: boldly
  chosen_spanish: con valentía
  alternatives_spanish:
  - sin temor
  - audazmente
  lexicon: LSJ
  rationale: ἀδέως expresa ausencia de miedo o audacia. 'Con valentía' es idiomático en español y mantiene el tono de resolución.
- source_word: ἐτιμῶντο
  english_pob_choice: boldly sought
  chosen_spanish: buscó
  alternatives_spanish:
  - se propuso
  - pretendió
  lexicon: LSJ
  rationale: El texto transmitido es difícil; la audición inglesa opta por un sentido activo de esfuerzo por obtener liberación. En español, 'buscó' reproduce esa orientación sin sobreespecificar el verbo problemático.
- source_word: ἑαυτοὺς ῥύσασθαι
  english_pob_choice: to save themselves
  chosen_spanish: salvarse
  alternatives_spanish:
  - rescatarse
  - librarse
  lexicon: LSJ
  rationale: ῥύομαι significa rescatar, librar, salvar. Aquí el reflexivo encaja de manera natural como 'salvarse'.
- source_word: ἐκ τῶν ἀπογραφῶν
  english_pob_choice: from the registration
  chosen_spanish: de la inscripción
  alternatives_spanish:
  - del registro
  - de la inscripción oficial
  lexicon: LSJ
  rationale: ἀπογραφή es una inscripción o enrolamiento oficial. 'Inscripción' conserva el campo semántico de registro/listado; se evita imponer de entrada una categoría moderna como 'censo'.
theological_decisions:
- issue: Sentido de εὐσέβεια en contexto de presión religiosa
  english_pob_reading: piety
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - reverencia a Dios
  rationale: En este pasaje εὐσέβεια señala fidelidad reverente a Dios y a la práctica religiosa del pueblo. 'Piedad' preserva esa carga ética y cultual sin introducir un matiz confesional ajeno al contexto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tratamiento del tramo difícil con ἐτιμῶντο
  english_pob_reading: boldly sought to save themselves from the registration
  chosen_spanish_reading: buscó con valentía salvarse de la inscripción
  alternative_spanish_readings:
  - se esforzó con valentía por librarse de la inscripción
  - quiso con valentía salvarse de la inscripción
  rationale: La tradición textual transmite aquí una forma difícil. La solución española refleja la idea de un intento decidido de escapar del proceso de enrolamiento, sin fingir una certeza gramatical que el griego no ofrece con claridad.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa más cercana al griego: conserva el contraste con ''pero'', expresa ἐνίσχυσαν como fortalecimiento interno, mantiene ''posesiones'' como valor amplio de χρήματα, usa el singular conceptual ''inscripción'' para ἀπογραφή y refleja la dificultad textual de ἐτιμῶντο con una formulación prudente.'
  spanish_consistency_notes:
  - Se mantiene 'piedad' para εὐσέβεια, conforme al audit trail y al uso POB en contexto judío.
  - Se evita 'Cristo', 'SEÑOR' u այլ terminología no presente en el texto.
  - '''Inscripción'' se usa de forma consistente para ἀπογραφή y queda aclarada en nota como registro/enrolamiento oficial.'
  - La construcción participial se ajusta a un español fluido sin perder la sucesión causal del griego.
