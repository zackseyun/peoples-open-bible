  to: 'Con respecto a Damasco: Hamat y Arpad quedan avergonzadas, porque han oído una mala noticia; se deshacen. Hay ansiedad como el mar[a]; no puede aquietarse.'
  rationale: Se ajusta «se derriten» a «se deshacen» para conservar la metáfora hebrea con mejor naturalidad en español. Se simplifica «como la del mar» a «como el mar» para seguir más de cerca la comparación documentada por el POB inglés y evitar una explicitación innecesaria. Se mantiene la nota de dificultad hebrea, con leve ajuste final para que el referente implícito de «no puede aquietarse» sea el mar/la imagen de inquietud y no la ansiedad misma.
