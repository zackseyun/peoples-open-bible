translation:
  language: es
  text: Como la frescura de la nieve en un día de cosecha, así es un mensajero fiel para los que lo envían[a], porque refresca la vida de sus amos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Como el frío de la nieve en tiempo de cosecha." La imagen hebrea probablemente alude a la frescura refrescante asociada con la nieve, no a una nevada que dañe la cosecha.'
    reason: alternative_reading
  - marker: b
    text: 'O: "porque restaura el alma de sus amos."'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצִנַּת
  english_pob_choice: Like the coolness of
  chosen_spanish: Como la frescura de
  alternatives_spanish:
  - Como el frío de
  - Como el frescor de
  lexicon: HALOT
  rationale: צִנָּה denota frío/coolness. En español, 'frescura' comunica mejor el alivio agradable de la imagen que 'frío', que suena más duro y menos positivo en este proverbio.
- source_word: שֶׁלֶג
  english_pob_choice: snow
  chosen_spanish: la nieve
  alternatives_spanish:
  - la nieve
  lexicon: HALOT
  rationale: שֶׁלֶג se traduce naturalmente como 'nieve'. Mantiene la imagen concreta del símil sin necesidad de ampliar o suavizar el término.
- source_word: בְּיוֹם קָצִיר
  english_pob_choice: on a harvest day
  chosen_spanish: en día de cosecha
  alternatives_spanish:
  - durante la cosecha
  - en tiempo de cosecha
  lexicon: HALOT
  rationale: La expresión hebrea conserva una imagen concreta de jornada de cosecha. 'En día de cosecha' mantiene esa concreción y funciona bien en español bíblico natural.
- source_word: צִיר
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - enviado
  - correo
  lexicon: HALOT
  rationale: En literatura sapiencial, צִיר suele referirse a uno enviado con un mensaje. 'Mensajero' es la equivalencia más clara y natural en español.
- source_word: נֶאֱמָן
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - verdadero
  lexicon: HALOT
  rationale: '''Fiel'' conserva la carga moral y relacional de נֶאֱמָן mejor que un simple ''confiable'', y encaja de forma idiomática en español.'
- source_word: לְשֹׁלְחָיו
  english_pob_choice: to those who send him
  chosen_spanish: para los que lo envían
  alternatives_spanish:
  - a los que lo envían
  - de parte de los que lo envían
  lexicon: HALOT
  rationale: La forma hebrea es plural con sufijo de 3ms; 'los que lo envían' preserva ese plural sin sonar forzado. 'Para' aquí reproduce bien la dirección beneficiosa del verso en español.
- source_word: וְנֶפֶשׁ
  english_pob_choice: and ... the life
  chosen_spanish: la vida
  alternatives_spanish:
  - el alma
  - la vida interior
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o ser. Aquí el contexto apunta a vitalidad/restauración, por lo que 'vida' expresa la idea con naturalidad y evita cargar el texto con una antropología ajena.
- source_word: אֲדֹנָיו
  english_pob_choice: his masters
  chosen_spanish: sus amos
  alternatives_spanish:
  - sus señores
  - sus dueños
  lexicon: HALOT
  rationale: El plural hebreo con sufijo se refleja mejor en 'sus amos'. 'Señores' puede sonar más honorífico; 'dueños' especifica demasiado una relación de propiedad que el proverbio no desarrolla.
- source_word: יָשִׁיב
  english_pob_choice: he refreshes
  chosen_spanish: refresca
  alternatives_spanish:
  - restaura
  - revive
  lexicon: HALOT
  rationale: Aunque la raíz sugiere 'hacer volver/restaurar', el efecto del símil es de alivio y reanimación. 'Refresca' mantiene la imagen de frío/nieve y el sentido dinámico del versículo.
theological_decisions:
- issue: Interpretación de נֶפֶשׁ en un proverbio sapiencial
  english_pob_reading: for he refreshes the life of his masters
  chosen_spanish_reading: porque refresca la vida de sus amos
  alternative_spanish_readings:
  - porque restaura el alma de sus amos
  - porque revivifica la vida de sus amos
  rationale: No hay una doctrina en disputa, pero sí una tensión semántica entre 'alma' y 'vida'. Se eligió 'vida' porque refleja mejor el uso aquí y evita introducir una lectura dualista no exigida por el hebreo.
  doctrine_reference: Antropología bíblica; uso contextual de נֶפֶשׁ
- issue: Relación social implícita en אֲדֹנָיו
  english_pob_reading: his masters
  chosen_spanish_reading: sus amos
  alternative_spanish_readings:
  - sus señores
  - sus dueños
  rationale: '''Amo'' conserva el valor relacional fuerte del hebreo sin suavizarlo a un título meramente cortesano. No se debe ocultar el matiz social del término.'
  doctrine_reference: Semántica social del Antiguo Testamento; léxico de relación de autoridad
translation_notes:
  revision_awareness: 'La versión inglesa revisada sustituyó ''and'' por ''for'' para expresar mejor la fuerza explicativa de la cláusula final. La traducción española refleja esa relación causal con ''porque''. También se tuvo en cuenta la nota inglesa sobre la imagen de la nieve: se optó por ''frescura de la nieve'' para conservar el efecto refrescante sin sugerir una nevada literal dañina.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma predeterminada del proyecto cuando corresponda, pero este versículo no la contiene.
  - Se usó 'mensajero' para צִיר por consistencia con el léxico sapiencial del proyecto.
  - Se prefirió 'frescura' y 'refresca' para sostener la metáfora climática del hebreo en español.
  - Se preservó el plural implícito de 'los que lo envían' y 'sus amos'.
