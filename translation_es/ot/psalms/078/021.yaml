    issue: '''y fuego se encendió'' suena poco natural en español'
    rationale: 'Aunque formalmente posible, en español estándar y eclesial suena mejor introducir el sustantivo con artículo en esta construcción: ''y se encendió un fuego'' o ''y un fuego se encendió''. Esto preserva mejor la imagen del hebreo y la legibilidad.'
  - severity: low
    issue: La nota [c] repite la construcción poco natural
    rationale: Si se corrige el texto principal, la nota de alternativa también debe actualizarse para no conservar la misma torpeza estilística.
  revised_spanish_text: Por tanto, Yahvé oyó y se enfureció[a]; y se encendió un fuego contra Jacob[b][c], y también subió la ira contra Israel.
