translation:
  language: es
  text: Yahvé ha sacado a luz nuestra vindicación[a]. Vengan, y contemos en Sion la obra de Yahvé, nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'nuestras justicias', 'nuestros actos de justicia' o 'nuestra justicia'. El plural hebreo puede expresar actos de justicia o la vindicación pública de una causa.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצִיא
  english_pob_choice: has brought forth
  chosen_spanish: ha sacado a luz
  alternatives_spanish:
  - ha sacado
  - ha puesto de manifiesto
  - ha hecho salir
  lexicon: HALOT
  rationale: El hifil de יצא puede expresar 'hacer salir', 'traer fuera' o 'poner de manifiesto'. En este contexto, donde se proclama públicamente la acción de Yahvé en favor de su pueblo, 'ha sacado a luz' conserva la imagen concreta y comunica bien la idea de manifestación pública en español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio POB de transliterar el nombre divino en lugar de sustituirlo por un título. 'Yahvé' es la forma española estable y transparente para el Tetragrámaton.
- source_word: צִדְקֹתֵינוּ
  english_pob_choice: our vindication
  chosen_spanish: nuestra vindicación
  alternatives_spanish:
  - nuestras justicias
  - nuestros actos de justicia
  - nuestra justicia
  lexicon: HALOT
  rationale: El plural hebreo puede referirse a actos de justicia, a justicia/rectitud o a vindicación pública. Dado el contexto de liberación y declaración pública, 'vindicación' preserva el sentido forense-relacional que la POB documenta, sin convertirlo en méritos morales.
- source_word: בֹּאוּ
  english_pob_choice: Come
  chosen_spanish: Venid
  alternatives_spanish:
  - Ven
  - Venid, pues
  - Acudid
  lexicon: HALOT
  rationale: El imperativo plural convoca a un grupo. 'Venid' mantiene el tono exhortativo y el plural, con registro digno y natural en español bíblico contemporáneo.
- source_word: וּנְסַפְּרָה
  english_pob_choice: and let us recount
  chosen_spanish: y contemos
  alternatives_spanish:
  - y narremos
  - y declaremos
  - y relatemos
  lexicon: HALOT
  rationale: La cohortativa expresa intención compartida. 'Contemos' funciona de manera natural en español y conserva el valor de 'let us recount/tell' sin perder la dimensión de testimonio público.
- source_word: בְצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  - en la Sion
  lexicon: HALOT
  rationale: '''Sion'' es la forma asentada en español bíblico para el nombre propio geográfico-teológico. Se conserva la referencia locativa simple del hebreo.'
- source_word: מַעֲשֵׂה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el hecho
  - la acción
  - la labor
  lexicon: HALOT
  rationale: El sustantivo singular constructo abarca obra/hecho/acción. 'La obra' es la opción más natural y suficientemente amplia para el acto de Yahvé al juzgar a Babilonia y vindicar a su pueblo.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - nuestro Dios
  lexicon: HALOT
  rationale: Traducción posesiva directa. Mantiene la relación de pacto y la cadencia natural del verso en español.
theological_decisions:
- issue: 'Sentido de צִדְקֹתֵינוּ: justicia, actos de justicia o vindicación'
  english_pob_reading: our vindication
  chosen_spanish_reading: nuestra vindicación
  alternative_spanish_readings:
  - nuestras justicias
  - nuestros actos de justicia
  - nuestra justicia
  rationale: La POB entiende que el plural hebreo puede designar actos de justicia o la vindicación pública de una causa. En este contexto, el énfasis no está en logros morales de Israel, sino en la acción de Yahvé que hace evidente su causa y su rectitud frente a Babilonia. 'Vindicación' conserva esa lectura forense y pública.
  doctrine_reference: Translation philosophy §3, §5; tabla de términos debatidos sobre justicia/rectitud y preservación de tensiones léxicas.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo WLC y el rastro de auditoría en inglés sin cambios revisionales posteriores; la traducción española mantiene la tensión léxica documentada en צִדְקֹתֵינוּ y la forma deíctica del llamado comunitario.
  spanish_consistency_notes:
  - Se preservó 'Yahvé' para el nombre divino, conforme al criterio POB.
  - Se usó 'Sion' como topónimo bíblico estándar en español.
  - Se eligió 'vindicación' para evitar leer el plural hebreo como méritos morales.
  - Se mantuvo el plural exhortativo 'Venid' para reflejar el hebreo.
  - Se evitó 'SEÑOR' como sustituto del Tetragrámaton.
