translation:
  language: es
  text: Nuestras obras están dentro de la elección y el poder de nuestra alma[a], de hacer justicia[b] e injusticia, con las obras de nuestras manos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'autoridad' en lugar de 'poder'.
    reason: lexical_alternative
  - marker: b
    text: O 'rectitud' en lugar de 'justicia'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'por las obras de nuestras manos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἔργα ἡμῶν
  english_pob_choice: Our deeds
  chosen_spanish: Nuestros hechos
  alternatives_spanish:
  - Nuestras obras
  - Nuestros actos
  lexicon: BDAG / LSJ
  rationale: ἔργα apunta a acciones concretas y moralmente significativas. 'Hechos' conserva esa concreción en español sin sonar tan técnico como 'obras' en este contexto.
- source_word: ἐκλογῇ
  english_pob_choice: choice
  chosen_spanish: elección
  alternatives_spanish:
  - selección
  - decisión
  lexicon: LSJ
  rationale: Aquí el sentido es la capacidad de escoger o decidir moralmente, no 'elección' en sentido teológico. 'Elección' mantiene la transparencia de la palabra fuente y su fuerza volitiva.
- source_word: ἐξουσίᾳ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - autoridad
  - control
  lexicon: BDAG
  rationale: En español, 'poder' comunica mejor la capacidad efectiva de actuar. 'Autoridad' suena más institucional y puede desviar el énfasis de la agencia moral humana.
- source_word: τῆς ψυχῆς ἡμῶν
  english_pob_choice: of our soul
  chosen_spanish: de nuestra alma
  alternatives_spanish:
  - de nuestro ser
  - de nuestro yo
  lexicon: BDAG
  rationale: El griego dice literalmente 'alma'. 'Alma' preserva esa correspondencia directa y mantiene la referencia al centro interior de la agencia moral.
- source_word: τοῦ ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para obrar
  - a fin de hacer
  lexicon: BDAG
  rationale: 'La construcción española más natural aquí es final: ''para hacer''. Conserva la función de la cláusula sin añadir matices no presentes en el griego.'
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: BDAG
  rationale: Aunque el inglés POB usó 'righteousness', en español 'justicia' puede expresar bien la fuerza moral y covenantal del término, y además mantiene el paralelismo con ἀδικίαν.
- source_word: ἀδικίαν
  english_pob_choice: unrighteousness
  chosen_spanish: maldad
  alternatives_spanish:
  - injusticia
  - injusticia moral
  lexicon: BDAG
  rationale: El término griego contrasta con δικαιοσύνην como lo opuesto moralmente recto. 'Maldad' conserva la contraposición ética en un español natural, sin imponer connotaciones sociales modernas ajenas al contexto.
- source_word: ἔργοις χειρῶν ἡμῶν
  english_pob_choice: with the works of our hands
  chosen_spanish: con las obras de nuestras manos
  alternatives_spanish:
  - por las obras de nuestras manos
  - mediante las obras de nuestras manos
  lexicon: LSJ
  rationale: La preposición con dativo instrumental admite una traducción natural con 'con'. Esta opción mantiene la imagen concreta de la acción humana realizada por las manos.
theological_decisions:
- issue: 'La frase subraya la agencia moral humana: elección y poder de la alma.'
  english_pob_reading: Rendered ἐκλογῇ καὶ ἐξουσίᾳ as 'choice and power' to preserve the text’s claim that human deeds lie within the soul’s capacity for moral action.
  chosen_spanish_reading: Traducido como 'elección y poder' para preservar que los hechos humanos están dentro de la capacidad moral de la alma.
  alternative_spanish_readings:
  - elección y autoridad
  - decisión y control
  rationale: La redacción española mantiene el énfasis del texto en la responsabilidad humana sin suavizar la tensión entre libertad y rendición de cuentas. 'Poder' y 'elección' preservan la agencia interior que el griego atribuye al alma.
  doctrine_reference: Antropología moral / responsabilidad humana
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó 'by' a 'with' para ἔργοις χειρῶν ἡμῶν, y la corrección que evitó 'injustice'/'injusticia' en favor de 'unrighteousness'. En español se evitó añadir un equivalente a 'also' porque no está exigido por καὶ y la coordinación ya queda expresada naturalmente.
  spanish_consistency_notes:
  - Se mantuvo la transparencia de 'alma' para τῆς ψυχῆς ἡμῶν.
  - Se eligió 'justicia' para δικαιοσύνην y 'maldad' para ἀδικίαν, evitando 'injusticia' por la revisión auditada y para conservar el contraste moral general.
  - La construcción 'con las obras de nuestras manos' sigue el valor instrumental del dativo sin volverla forzada en español.
  - El tono es sobrio y publicable, con puntuación y sintaxis naturales en español latinoamericano.
