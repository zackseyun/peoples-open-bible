translation:
  language: es
  text: Y los bueyes y los asnos que trabajan la tierra comerán forraje sazonado[a], que ha sido aventado con pala y con bieldo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salado»; el adjetivo hebreo puede referirse más específicamente a forraje mejorado por sal o por sazón.
    reason: lexical_alternative
  - marker: b
    text: La frase final nombra dos herramientas agrícolas usadas para aventar el grano; también puede entenderse como «pala y bieldo de aventar».
    reason: cultural_note
lexical_decisions:
- source_word: הָאֲלָפִים
  english_pob_choice: the oxen
  chosen_spanish: los bueyes
  alternatives_spanish:
  - los toros
  - el ganado
  lexicon: HALOT
  rationale: En este contexto agrícola, el término apunta a animales de tiro; en español, "bueyes" comunica con naturalidad esa función laboriosa. "Toros" puede sugerir animales reproductivos, y "ganado" sería demasiado general.
- source_word: הָעֲיָרִים
  english_pob_choice: the donkeys
  chosen_spanish: los asnos
  alternatives_spanish:
  - los burros
  - los pollinos
  lexicon: HALOT
  rationale: '"Asnos" mantiene un registro bíblico claro y corresponde al animal de carga/trabajo. "Burros" es más coloquial; "pollinos" sería demasiado específico y menos natural aquí.'
- source_word: עֹבְדֵי הָאֲדָמָה
  english_pob_choice: that work the ground
  chosen_spanish: que trabajan la tierra
  alternatives_spanish:
  - que labran la tierra
  - que trabajan el suelo
  lexicon: HALOT
  rationale: La frase participial define a los animales por su labor agrícola. "Trabajan la tierra" preserva la imagen concreta sin forzar un tecnicismo; "labran" es posible, pero puede sonar más técnico y menos amplio.
- source_word: בְּלִיל
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - pienso
  - alimento mezclado
  - provenda
  lexicon: HALOT
  rationale: '"Forraje" es claro y digno en español para alimento animal. "Pienso" puede sonar más técnico o moderno; "provenda" sería arcaico.'
- source_word: חָמִיץ
  english_pob_choice: seasoned
  chosen_spanish: sazonado
  alternatives_spanish:
  - salado
  - condimentado
  - fermentado
  lexicon: HALOT
  rationale: La POB inglesa evita reducir el término a una sola técnica. "Sazonado" conserva la idea de alimento preparado/mejorado sin cerrar indebidamente el matiz léxico debatido entre salado, condimentado o fermentado.
- source_word: יֹאכֵלוּ
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - se comerán
  - habrán de comer
  lexicon: HALOT
  rationale: Futuro simple natural en español, acorde con la promesa de abundancia.
- source_word: אֲשֶׁר זֹרֶה
  english_pob_choice: which has been winnowed
  chosen_spanish: el cual habrá sido aventado
  alternatives_spanish:
  - que ha sido aventado
  - que se aventará
  - el cual es aventado
  lexicon: HALOT
  rationale: El sentido de procesamiento del grano/fodder se expresa mejor en español con una pasiva perifrástica. "Aventado" comunica el acto de aventar/vivir al viento para separar la paja, sin perder la referencia al winnowing del hebreo.
- source_word: בָרַחַת
  english_pob_choice: with shovel
  chosen_spanish: con pala
  alternatives_spanish:
  - con azadón
  - con pala de aventar
  lexicon: HALOT
  rationale: '"Pala" es el equivalente español más transparente para la herramienta agrícola mencionada; "pala de aventar" sería más explícito pero menos fluido en el verso.'
- source_word: וּבַמִּזְרֶה
  english_pob_choice: and fork
  chosen_spanish: y con bieldo
  alternatives_spanish:
  - y con horquilla
  - y con horca
  - y con aventador
  lexicon: HALOT
  rationale: '"Bieldo" es el término tradicional y preciso para el instrumento de aventar grano, mejor que "fork" literal en español. Se mantiene la distinción de dos herramientas en paralelo.'
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el auditorial inglés, conservando el paralelismo de animales de trabajo, la ambigüedad léxica de חָמִיץ con una solución no cerrada («sazonado»), y el valor agrícola de las herramientas de aventado. Se optó por un español publicación-readable, evitando calcos duros como «forraje condimentado» o «aventado con pala y horquilla» donde resultan menos naturales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se prefirió «bueyes» y «asnos» por claridad y naturalidad en español bíblico contemporáneo, en consonancia con la función de trabajo agrícola del hebreo.
  - Se evitó «SEÑOR» porque no hay un tetragrámaton ni una cita directa de κύριος en este versículo.
  - Se preservó la ambigüedad de חָמִיץ mediante nota, siguiendo el cuidado del POB inglés de no fijar indebidamente el matiz.
