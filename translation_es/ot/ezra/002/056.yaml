lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: En este registro genealógico/lista de retorno, el hebreo constructo plural de בן funciona como designación de clan o familia. En español, «los hijos de» conserva la forma y el paralelismo del hebreo sin sonar excesivamente técnico; «descendientes de» explicaría el sentido, pero sería menos cercano a la estructura repetida del texto.
- source_word: יַעְלָה
  english_pob_choice: Jaalah
  chosen_spanish: Yaalá
  alternatives_spanish:
  - Yaalá
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la vocalización probable en español con acento final para reflejar la forma hebrea y facilitar la lectura en español.
- source_word: דַרְקוֹן
  english_pob_choice: Darkon
  chosen_spanish: Darkón
  alternatives_spanish:
  - Darkon
  lexicon: HALOT
  rationale: Nombre propio transliterado sin traducir. Se ajusta la acentuación gráfica al español para indicar el acento prosódico final, preservando la identidad del nombre.
- source_word: גִדֵּל
  english_pob_choice: Giddel
  chosen_spanish: Gidel
  alternatives_spanish:
  - Giddel
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente. En español se simplifica la doble consonante no necesaria y se marca la vocal tónica final de modo natural para lectura pública.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada coinciden plenamente en que se trata de una lista nominal simple, sin variantes textuales reportadas ni decisiones teológicas o lexically tensas que requieran nota. La versión española mantiene ese mismo nivel de literalidad funcional.
  spanish_consistency_notes:
  - Se preserva la repetición tripartita de la fórmula «los hijos de» para reflejar la estructura del hebreo.
  - Los nombres propios se transliteran con ortografía española legible y sin equivalentes interpretativos.
  - No se añaden corchetes ni notas al pie porque el paquete fuente no documenta variantes ni ambigüedades relevantes.
