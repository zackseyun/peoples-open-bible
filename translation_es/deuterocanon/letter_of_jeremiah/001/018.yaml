translation:
  language: es
  text: Les encienden lámparas, más de las que encienden para sí mismos, pero no pueden ver ni una sola de ellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λύχνους
  english_pob_choice: lamps
  chosen_spanish: lámparas
  alternatives_spanish:
  - lámparas de aceite
  - luces
  lexicon: LSJ
  rationale: λύχνος designa normalmente una lámpara concreta, no la luz en abstracto. En español, «lámparas» comunica bien la imagen material del culto idolátrico sin volver el verso pesado. Se evita «luces» por demasiado general y «lámparas de aceite» por añadir precisión no explícita en el griego.
- source_word: καίουσιν
  english_pob_choice: they light
  chosen_spanish: les encienden
  alternatives_spanish:
  - las queman
  - las prenden
  lexicon: LSJ
  rationale: El verbo puede significar encender o quemar. Con el objeto «lámparas», «les encienden» es natural en español y conserva la acción de prender fuego sin sonar mecánico.
- source_word: πλείους ἢ ἑαυτοῖς
  english_pob_choice: more than for themselves
  chosen_spanish: más que para ellos mismos
  alternatives_spanish:
  - más que para sí mismos
  - más de las que tienen para sí
  lexicon: LSJ
  rationale: La comparación es algo elíptica en griego. «Más que para ellos mismos» mantiene esa elipsis y el contraste entre lo destinado a los ídolos y lo que usan los adoradores, sin sobreexplicar.
- source_word: ὧν
  english_pob_choice: of them
  chosen_spanish: de ellas
  alternatives_spanish:
  - de éstos
  - de las cuales
  lexicon: LSJ
  rationale: El relativo remite a las lámparas. «De ellas» es idiomático en español y conserva el antecedente femenino plural.
- source_word: οὐδένα
  english_pob_choice: a single one
  chosen_spanish: ni una sola
  alternatives_spanish:
  - ninguna
  - ni una
  lexicon: LSJ
  rationale: 'El griego intensifica la incapacidad absoluta: no pueden ver ni una. «Ni una sola» expresa mejor esa fuerza que un simple «ninguna», y encaja con el giro idiomático español.'
- source_word: δύνανται ἰδεῖν
  english_pob_choice: they cannot see
  chosen_spanish: no pueden ver
  alternatives_spanish:
  - no logran ver
  - no son capaces de ver
  lexicon: LSJ
  rationale: '«Ver» es la equivalencia más directa y natural. Mantiene la acusación contra los ídolos: aun rodeados de lámparas, carecen de visión.'
theological_decisions:
- issue: Referente implícito de quien «no puede ver»
  english_pob_reading: the idols cannot see the lamps lit before them
  chosen_spanish_reading: los ídolos no pueden ver las lámparas encendidas delante de ellos
  alternative_spanish_readings:
  - los adoradores no pueden ver ninguna ventaja en ellas
  - no pueden verlas los que las encienden
  rationale: El contexto inmediato de la Letra de Jeremías ridiculiza a los ídolos como objetos sin vida ni sentido. Por eso, aunque el sujeto no se exprese de forma explícita en la última cláusula, la lectura más coherente es que los ídolos son incapaces de ver las lámparas puestas ante ellos. La traducción española mantiene esa tensión sin resolverla artificialmente en el texto principal.
  doctrine_reference: Lectura contextual de la idolatría en Letter of Jeremiah; preservación de la ironía contra los ídolos sin añadir sujeto explícito al texto.
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto con la fuente griega y con la auditoría inglesa. No se introducen glosas interpretativas en el texto principal; solo se mantiene la imagen concreta de lámparas y la ironía final sobre la incapacidad de ver.
  spanish_consistency_notes:
  - Se mantiene «lámparas» para λύχνους, en línea con el valor concreto del término y con la decisión inglesa.
  - Se usa «encienden» para καίουσιν por naturalidad en español, sin perder el matiz de prender fuego.
  - La clausula final conserva ambigüedad sintáctica suficiente para que el contexto identifique a los ídolos como destinatarios de la burla.
