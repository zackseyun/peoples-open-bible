  glossary_alignment: No hay términos teológicos sensibles del glosario global en este versículo. Los nombres propios están bien adaptados al español bíblico. «Jefe de los Tres», «blandió su lanza» y «entre los Tres» concuerdan con las decisiones léxicas documentadas.
