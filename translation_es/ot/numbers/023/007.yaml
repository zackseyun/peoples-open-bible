translation:
  language: es
  text: 'Entonces pronunció su discurso[a] y dijo: «Desde Aram me ha traído Balac, rey de Moab, de los montes del oriente[b]: “Ven, maldice a Jacob para mí; sí, ven, denuncia[c] a Israel”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oráculo»; el modismo hebreo dice literalmente «alzó su mashal», una expresión formal para un pronunciamiento poético.
    reason: lexical_alternative
  - marker: b
    text: O «de los montes orientales»; «los montes del oriente» traduce una expresión hebrea que probablemente se refiere geográficamente a la región al este de Moab.
    reason: lexical_alternative
  - marker: c
    text: Este segundo verbo es distinto de «maldice». También puede traducirse «execrar», pero aquí se usa «denuncia» para un español moderno y legible, preservando la distinción léxica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא מְשָׁלוֹ
  english_pob_choice: he took up his discourse
  chosen_spanish: alzó su dicho
  alternatives_spanish:
  - alzó su oráculo
  - pronunció su proverbio
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo formal de pronunciamiento poético. «Su dicho» conserva la fuerza de un enunciado solemne sin imponer «oráculo» como si fuera el único matiz posible; «proverbio» suena demasiado estrecho en español.
- source_word: מִן אֲרָם
  english_pob_choice: From Aram
  chosen_spanish: Desde Aram
  alternatives_spanish:
  - De Aram
  - Desde Siria
  lexicon: HALOT
  rationale: Se conserva el nombre propio «Aram» por ser un topónimo del texto; «Desde» reproduce bien el valor de procedencia. Se evita «Siria» porque introduce una identificación geopolítica posterior que no está en el hebreo.
- source_word: יַנְחֵנִי
  english_pob_choice: has led me
  chosen_spanish: me ha traído
  alternatives_spanish:
  - me ha conducido
  - me ha guiado
  lexicon: HALOT
  rationale: El verbo en hiphil expresa acción de llevar/dirigir. En este contexto narrativo, «me ha traído» comunica bien que Balac hizo venir a Balaam; «me ha guiado» sería más directivo, pero menos natural aquí.
- source_word: מֵהַרְרֵי קֶדֶם
  english_pob_choice: from the mountains of the east
  chosen_spanish: de los montes del oriente
  alternatives_spanish:
  - de los montes orientales
  - de los montes del este
  lexicon: HALOT
  rationale: Se mantiene el sentido geográfico de קדם como oriente/este. «Montes del oriente» suena natural en español bíblico contemporáneo y conserva la imagen regional; no se opta por una lectura temporal como «de antigua data» porque el contexto favorece la ubicación espacial.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Acércate
  - Anda
  lexicon: HALOT
  rationale: Es una invitación/summons en discurso directo. «Ven» es la forma más idiomática y fiel en español; «Anda» resultaría menos exacta y más coloquial.
- source_word: אָרָה
  english_pob_choice: curse
  chosen_spanish: maldice
  alternatives_spanish:
  - maldice a
  - pronuncia una maldición sobre
  lexicon: HALOT
  rationale: El verbo significa maldecir. Se usa «maldice» en lugar de «maldecir» porque el imperativo del hebreo exige la forma exhortativa; se añade «a» con el objeto personal por claridad española.
- source_word: לִּי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - en mi favor
  - por mí
  lexicon: HALOT
  rationale: El dativo expresa el interés de Balac en la acción pedida. «Para mí» es la equivalencia más directa y natural en español.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - el linaje de Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre propio tal como en el texto fuente, manteniendo el paralelismo con Israel.
- source_word: זֹעֲמָה
  english_pob_choice: denounce
  chosen_spanish: denuncia
  alternatives_spanish:
  - execrra
  - maldice
  lexicon: HALOT
  rationale: Se distingue este segundo verbo de אָרָה. «Denuncia» preserva el tono hostil sin colapsarlo con «maldice»; en español moderno es más claro que «execrar», aunque esa opción sigue siendo posible.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio por ser la designación nacional del texto. No se sustituye por una paráfrasis colectiva para conservar el paralelismo poético con Jacob.
theological_decisions:
- issue: Paralelismo entre «Jacob» e «Israel»
  english_pob_reading: Render both names distinctly as parallel designations for the covenant people without collapsing them into a single paraphrase.
  chosen_spanish_reading: Mantener «Jacob» e «Israel» como designaciones distintas y paralelas del pueblo del pacto.
  alternative_spanish_readings:
  - Reunirlos en «los israelitas»
  - Explicarlos como «el pueblo de Jacob, es decir, Israel»
  rationale: El hebreo conserva ambos nombres de manera deliberada. La traducción debe reflejar ese paralelismo literario y teológico sin fusionarlo ni explicarlo de más.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se siguió el audit trail en concordancia alta, sin cambios sustantivos respecto del análisis inglés; la única cautela fue preservar en español la distinción entre los dos verbos hostiles y la paralelismo Jacob/Israel.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier sustitución reverencial no presente en el hebreo.
  - Se mantuvo un español bíblico moderno, legible y digno, sin arcaísmos innecesarios.
  - Se conservó el nombre propio «Aram» y la referencia geográfica «montes del oriente» conforme al contexto narrativo.
  - No se colapsaron los dos verbos hebreos de maldición/denuncia en una sola idea.
  - Se mantuvo la repetición imperativa «Ven... sí, ven...» como recurso retórico del original.
