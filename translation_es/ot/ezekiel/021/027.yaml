translation:
  language: es
  text: 'En su mano derecha estaba la adivinación para Jerusalén: poner arietes, abrir la boca con matanza[a], levantar la voz con un grito de guerra, poner arietes contra las puertas, echar un terraplén y construir un muro de asedio[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abrir la boca para la matanza», posiblemente en referencia al grito o la orden lanzados al comenzar el ataque.
    reason: lexical_alternative
  - marker: b
    text: O «baluarte» o «torre de asedio»; el término hebreo se refiere de manera general a una obra de sitio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּימִינוֹ
  english_pob_choice: In his right hand
  chosen_spanish: En su mano derecha
  alternatives_spanish:
  - A su derecha
  - En su diestra
  lexicon: HALOT
  rationale: La frase hebrea es concreta y espacial. «En su mano derecha» mantiene la imagen sin forzar una paráfrasis y corresponde bien al uso narrativo de la escena.
- source_word: הַקֶּסֶם
  english_pob_choice: the divination
  chosen_spanish: la adivinación
  alternatives_spanish:
  - el sortilegio
  - el augurio
  lexicon: HALOT
  rationale: «Adivinación» conserva el sustantivo base del hebreo y sigue la decisión del texto inglés de no disolver la referencia a la práctica adivinatoria.
- source_word: לָשׂוּם כָּרִים
  english_pob_choice: to set battering rams
  chosen_spanish: poner carneros
  alternatives_spanish:
  - poner arietes
  - colocar arietes de asedio
  lexicon: HALOT
  rationale: El hebreo usa כָּרִים, término discutido en contexto de sitio. Dado que el inglés POB documenta «battering rams» y reserva una nota sobre la posible amplitud del término, en español se conserva la imagen básica con «carneros» y se anota la alternativa militar para mantener la tensión léxica.
- source_word: לִפְתֹּחַ פֶּה בְּרֶצַח
  english_pob_choice: to open the mouth with slaughter
  chosen_spanish: abrir la boca con matanza
  alternatives_spanish:
  - abrir la boca para la matanza
  - abrir la boca con muerte
  lexicon: HALOT
  rationale: La expresión es idiomática y violenta. «Abrir la boca» preserva la imagen; «con matanza» refleja בְּרֶצַח sin suavizarlo. «Matanza» funciona de modo natural en español y mantiene el tono bélico.
- source_word: רֶצַח
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - muerte violenta
  - asesinato
  lexicon: HALOT
  rationale: En este contexto de asedio, «matanza» comunica el derramamiento violento de sangre mejor que «asesinato», que suena demasiado jurídico, o que un término más vago.
- source_word: לְהָרִים קוֹל בִּתְרוּעָה
  english_pob_choice: to raise the voice with a battle cry
  chosen_spanish: levantar la voz con gritería de guerra
  alternatives_spanish:
  - alzar la voz con un grito de guerra
  - levantar la voz con clamor bélico
  lexicon: HALOT
  rationale: «Levantar la voz» sigue de cerca el hebreo y «gritería de guerra» comunica bien תְּרוּעָה como clamor militar, sin perder el plural/intensivo implícito de un grito colectivo.
- source_word: עַל שְׁעָרִים
  english_pob_choice: against the gates
  chosen_spanish: contra las puertas
  alternatives_spanish:
  - ante las puertas
  - sobre las puertas
  lexicon: HALOT
  rationale: En español, «puertas» puede equivaler naturalmente a las puertas de la ciudad en contexto de sitio. «Contra» expresa la hostilidad del ataque, como en la versión inglesa.
- source_word: לִשְׁפֹּךְ סֹלְלָה
  english_pob_choice: to heap up a siege ramp
  chosen_spanish: echar un terraplén
  alternatives_spanish:
  - levantar un terraplén
  - echar una rampa de asedio
  lexicon: HALOT
  rationale: סֹלְלָה designa una obra de sitio, normalmente un terraplén o rampa. «Echar un terraplén» mantiene el valor constructivo del verbo y resulta natural en español.
- source_word: לִבְנוֹת דָּיֵק
  english_pob_choice: to build a siege wall
  chosen_spanish: construir un muro de asedio
  alternatives_spanish:
  - levantar un baluarte de asedio
  - construir una fortificación de sitio
  lexicon: HALOT
  rationale: דָּיֵק refiere a una obra de asedio/fortificación; «muro de asedio» es transparente y mantiene la secuencia militar del versículo. La alternativa más técnica queda implícitamente abierta sin sobreespecificar el tipo exacto de obra.
theological_decisions:
- issue: Término bélico y adivinatorio sin domesticar el lenguaje del texto
  english_pob_reading: the divination for Jerusalem ... battle cry ... siege works
  chosen_spanish_reading: la adivinación para Jerusalén ... gritería de guerra ... obras de asedio
  alternative_spanish_readings:
  - el augurio para Jerusalén ... grito de guerra ... fortificaciones de sitio
  - la suerte para Jerusalén ... clamor bélico ... obras de sitio
  rationale: El versículo acumula imágenes de adivinación y asedio. Se conserva ese doble campo semántico sin convertirlo en explicación interpretativa, para no borrar la tensión entre el acto de sorteo/augurio y la maquinaria militar que anuncia.
  doctrine_reference: Ninguna; decisión de fidelidad semántica y literaria
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «the divination indicated Jerusalem» por «was the divination for Jerusalem» para alinearse más de cerca con el hebreo y mantener una formulación formal. La traducción española sigue esa revisión al usar «la adivinación para Jerusalén» en lugar de una explicación más interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «adivinación» para הַקֶּסֶם, en línea con el valor técnico del hebreo y con la auditoría inglesa.
  - Se evitó «SEÑOR» o vocabulario teológico no presente en el versículo; el texto es enteramente bélico y adivinatorio.
  - «Puertas» traduce שְׁעָרִים en sentido urbano-sitio, no puertas genéricas domésticas.
  - La frase «abrir la boca» se conserva porque el hebreo la usa de forma imagética; no se redujo a «dar la orden» para no perder la tensión expresiva.
