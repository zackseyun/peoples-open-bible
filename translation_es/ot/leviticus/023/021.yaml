    text: O "una asamblea santa" o "una asamblea sagrada".
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "ningún trabajo de labor/servicio"; es decir, ningún trabajo ordinario o servil.'
    reason: lexical_alternative
  - marker: c
    text: O "un estatuto permanente" o "un estatuto eterno".
    reason: lexical_alternative
  revision_rationale: 'Se revisa principalmente para corregir una expresión española poco natural (''trabajo de labor'') y para alinear mejor la formulación con la intención léxica documentada del POB inglés: prohibición de trabajo ordinario/servil, no de toda actividad. También se pulen las notas y la frase final para mayor claridad y naturalidad en español bíblico contemporáneo, sin apartarse del sentido del hebreo.'
