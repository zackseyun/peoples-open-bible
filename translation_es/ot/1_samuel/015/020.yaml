translation:
  language: es
  text: 'Saúl dijo a Samuel: «Pero yo sí obedecí[a] la voz de Yahvé, y fui por el camino por el cual Yahvé me envió, y traje a Agag, rey de Amalec, y a Amalec dediqué a destrucción[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «escuché la voz de Yahvé». El hebreo שׁמע con בְּקוֹל puede expresar obediencia además de oír.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «destruí por completo a Amalec» o «puse a Amalec bajo anatema». El verbo hebreo lleva la idea de dedicar algo a destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי בְּקוֹל
  english_pob_choice: I did obey the voice of
  chosen_spanish: sí obedecí la voz de
  alternatives_spanish:
  - obedecí
  - escuché la voz de
  lexicon: HALOT
  rationale: שׁמע con בְּקוֹל puede significar ‘obedecer’ o ‘escuchar’. En este contexto polémico, el sentido es obediencia reclamada por Saúl; el énfasis español «sí» conserva el tono defensivo del hebreo y del POB inglés «I did obey».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la convención del proyecto, en vez de sustituirlo por un título. «Yahvé» corresponde al tetragrámaton y mantiene la transparencia del texto fuente.
- source_word: וָאֵלֵךְ בַּדֶּרֶךְ
  english_pob_choice: I went on the way
  chosen_spanish: fui por el camino
  alternatives_spanish:
  - fui en el camino
  - fui por la senda
  lexicon: HALOT
  rationale: La imagen hebrea es la de un camino o curso asignado. «Fui por el camino» suena natural en español y conserva la metáfora sin convertirla en ‘misión’.
- source_word: אֲשֶׁר שְׁלָחַנִי יְהוָה
  english_pob_choice: that Yahweh sent me
  chosen_spanish: por el cual Yahvé me envió
  alternatives_spanish:
  - que Yahvé me envió
  - en el que Yahvé me envió
  lexicon: HALOT
  rationale: El relativo modifica ‘camino’; «por el cual» mantiene esa relación con mayor precisión que un simple «que» y evita una interpretación más libre.
- source_word: וָאָבִיא
  english_pob_choice: I brought
  chosen_spanish: traje
  alternatives_spanish:
  - lo traje
  - lo conduje
  lexicon: HALOT
  rationale: El verbo hiphil expresa hacer venir o traer. «Traje» es la forma directa y natural en español, sin añadir el matiz de ‘traer de vuelta’ que el verbo no exige.
- source_word: אֲגַג מֶלֶךְ עֲמָלֵק
  english_pob_choice: Agag king of Amalek
  chosen_spanish: Agag, rey de Amalec
  alternatives_spanish:
  - Agag, el rey de Amalec
  lexicon: HALOT
  rationale: Se conserva la aposición en forma clara y bíblica. «Amalec» reproduce el nombre propio singular del hebreo, que puede funcionar metonímicamente por el pueblo.
- source_word: הֶחֱרַמְתִּי
  english_pob_choice: I devoted ... to destruction
  chosen_spanish: dediqué a destrucción
  alternatives_spanish:
  - exterminé
  - puse bajo anatema
  lexicon: HALOT
  rationale: חרם en este contexto de guerra santa tiene fuerza cultual y judicial. «Dediqué a destrucción» conserva la idea de consagrar al juicio/destrucción sin borrar la tensión lexical que el POB inglés preserva.
- source_word: וְאֶת עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: a Amalec
  alternatives_spanish:
  - a los amalecitas
  lexicon: HALOT
  rationale: Se mantiene el nombre propio singular del texto hebreo. El sentido colectivo queda claro por el contexto y por la frase verbal siguiente.
theological_decisions:
- issue: Traducción de חרם en contexto de guerra santa
  english_pob_reading: I devoted Amalek to destruction
  chosen_spanish_reading: lo dediqué a destrucción
  alternative_spanish_readings:
  - lo exterminé
  - lo puse bajo anatema
  rationale: La elección evita suavizar o reemplazar la carga judicial/cultual del verbo. «Dediqué a destrucción» permite que el lector perciba la tensión del término hebreo sin interpretarlo solo como violencia general ni como una fórmula tradicional menos transparente.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Tono defensivo de la afirmación de Saúl
  english_pob_reading: But I did obey the voice of Yahweh
  chosen_spanish_reading: Pero yo sí obedecí la voz de Yahvé
  alternative_spanish_readings:
  - Pero obedecí la voz de Yahvé
  - Sin embargo, obedecí la voz de Yahvé
  rationale: El «sí» reproduce la fuerza enfática/contradictoria de la réplica de Saúl, que no solo informa sino que se defiende. Así se conserva el discurso polémico del hebreo y del POB inglés.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el control inglés y no requiere cambios sustantivos respecto del audit trail; se preservan la transparencia del nombre divino, la metáfora del ‘camino’ y la tensión lexical de חרם. La revisión más relevante es el refuerzo del valor enfático de «sí» para reflejar el matiz defensivo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se mantiene «Amalec» como nombre propio singular, sin expandir automáticamente a ‘amalecitas’.
  - «Dedicó a destrucción» evita diluir חרם en una simple destrucción física o en una paráfrasis doctrinal.
  - La puntuación y la cita directa siguen la sintaxis natural del español bíblico contemporáneo.
