  text: But I am Yahweh your God from the land of Egypt[a]; you know no God besides me[b], and there is no savior except me.
  footnotes:
  - marker: a
    text: Or 'since the land of Egypt' or 'out of the land of Egypt.' The Hebrew phrase may emphasize either the LORD's relationship to Israel from the time of the exodus or his saving action in bringing them out.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall know no God besides me.' The Hebrew verb can be understood with covenantal/prohibitive force as well as declarative force.
    reason: alternative_reading
