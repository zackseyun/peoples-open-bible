translation:
  language: es
  text: Por tanto, la ira de Yahvé ardió contra su pueblo, extendió su mano contra ellos y los hirió; los montes temblaron, y sus cadáveres fueron como basura[a] en medio de las calles. Con todo esto, su ira no se ha apartado, y todavía su mano está extendida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como desechos barridos»; el término hebreo se refiere a algo barrido o desechado.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La expresión introduce la consecuencia del juicio previo. «Por tanto» conserva el valor inferencial y suena natural en español bíblico contemporáneo sin debilitar la conexión lógica.
- source_word: חָרָה אַף יְהוָה
  english_pob_choice: the anger of Yahweh burned
  chosen_spanish: la ira de Yahvé ardió
  alternatives_spanish:
  - se encendió la ira de Yahvé
  - la ira de Yahvé se inflamó
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de la ira que arde, en vez de reducirla a un mero estado emocional. «Yahvé» sigue el criterio proyectual para יהוה.
- source_word: בְּעַמּוֹ
  english_pob_choice: against his people
  chosen_spanish: contra su pueblo
  alternatives_spanish:
  - sobre su pueblo
  - con su pueblo
  lexicon: HALOT
  rationale: Aunque la preposición básica es «en/con», el contexto de ira indica dirección hostil. «Contra» comunica la fuerza punitiva del pasaje en español.
- source_word: וַיֵּט יָדוֹ עָלָיו
  english_pob_choice: he stretched out his hand against them
  chosen_spanish: extendió su mano contra ellos
  alternatives_spanish:
  - estiró su mano contra ellos
  - alargó su mano contra ellos
  lexicon: HALOT
  rationale: «Extender la mano» preserva la imagen de acción judicial de forma natural en español. Se mantiene «contra ellos» para reflejar el sentido hostil del hebreo.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: and struck them
  chosen_spanish: y los hirió
  alternatives_spanish:
  - y los golpeó
  - y los castigó con golpes
  lexicon: HALOT
  rationale: «Hirió» conserva el acto de daño/juicio sin volverlo excesivamente coloquial. El objeto singular del hebreo tiene valor colectivo; el español lo expresa naturalmente con plural.
- source_word: וַיִּרְגְּזוּ הֶהָרִים
  english_pob_choice: the mountains quaked
  chosen_spanish: los montes temblaron
  alternatives_spanish:
  - los montes se estremecieron
  - las montañas temblaron
  lexicon: HALOT
  rationale: «Temblaron» traduce bien el verbo de sacudida/convulsión y mantiene el registro profético. «Montes» es un término bíblico natural en español.
- source_word: נִבְלָתָם
  english_pob_choice: their corpses
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus cuerpos muertos
  - sus cuerpos
  lexicon: HALOT
  rationale: «Cadáveres» conserva la crudeza del hebreo sin suavizar la escena. Es un equivalente claro y digno en español.
- source_word: כַּסּוּחָה
  english_pob_choice: like refuse
  chosen_spanish: como basura
  alternatives_spanish:
  - como desechos
  - como barrido
  lexicon: HALOT
  rationale: La palabra hebrea designa algo barrido o desechado. «Basura» comunica bien la idea de desecho despreciable, pero se conserva una alternativa más literal en la nota.
- source_word: בְּקֶרֶב חוּצ֑וֹת
  english_pob_choice: in the midst of the streets
  chosen_spanish: en medio de las calles
  alternatives_spanish:
  - en medio de las vías
  - en las calles
  lexicon: HALOT
  rationale: «En medio de las calles» conserva la ubicación pública y abierta del pasaje con un español natural y solemne.
- source_word: בְּכָל זֹאת
  english_pob_choice: For all this
  chosen_spanish: Con todo esto
  alternatives_spanish:
  - A pesar de todo esto
  - Por todo esto
  lexicon: HALOT
  rationale: La fórmula repetitiva de Isaías introduce que el juicio previo no agota la ira divina. «Con todo esto» preserva el giro discursivo tradicional sin perder claridad.
- source_word: לֹא שָׁב אַפּוֹ
  english_pob_choice: his anger has not turned away
  chosen_spanish: su ira no se ha apartado
  alternatives_spanish:
  - su ira no se ha vuelto atrás
  - su enojo no ha cesado
  lexicon: HALOT
  rationale: «Apartarse» expresa bien la imagen idiomática de una ira que no retrocede ni se retira. Se conserva el matiz verbal del hebreo sin hacer una paráfrasis excesiva.
- source_word: וְעוֹד יָדוֹ נְטוּיָה
  english_pob_choice: and his hand is still stretched out
  chosen_spanish: y todavía su mano está extendida
  alternatives_spanish:
  - y aún su mano sigue extendida
  - y su mano sigue extendida
  lexicon: HALOT
  rationale: Se mantiene el refrán isaiano de la mano extendida como señal de juicio continuado. «Todavía» subraya la persistencia del acto divino.
theological_decisions:
- issue: Renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para יהוה y se evita el enmascaramiento litúrgico. «Yahvé» mantiene transparencia textual y continuidad con la política de traducción.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH -> Yahvé'
- issue: Conservar la imaginería corporal de la ira y la mano extendida
  english_pob_reading: Retain the imagery of burning anger and the outstretched hand
  chosen_spanish_reading: Conservar la imagen de la ira que arde y de la mano extendida
  alternative_spanish_readings:
  - Reducirlo a ‘Dios estaba muy enojado y siguió castigando’
  - Suavizarlo a una formulación abstracta
  rationale: El hebreo usa imágenes corporales y dinámicas para describir juicio real. El español conserva esa fuerza sin explicarla en exceso ni desactivar el paralelo isaiano.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 y #3'
- issue: Valor colectivo de los sufijos singulares
  english_pob_reading: Singular forms refer collectively to the people
  chosen_spanish_reading: 'Plural colectivo natural en español: ‘ellos’, ‘los hirió’, ‘sus cadáveres’'
  alternative_spanish_readings:
  - Mantener singular literal en español
  - Desdoblar con ‘él/ello’
  rationale: El hebreo usa sufijos singulares con referente colectivo. El español requiere concordancia natural para que el texto sea legible y fiel al referente colectivo.
  doctrine_reference: Principios de equivalencia óptima y claridad gramatical
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto de la auditoría inglesa y refleja su última revisión, que afinó la clausula final para mantener ‘were like refuse’ como imagen de estado comparativo. En español se ha mantenido ese mismo sentido con ‘fueron como basura’, sin introducir una transformación causal que el hebreo no exige.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se mantiene ‘ira’ y la imagen de la mano extendida, evitando neutralizaciones teológicas.
  - Se traduce el objeto colectivo con plurales naturales en español para respetar la referencia plural del contexto.
  - Se preserva el refrán isaiano ‘su mano está extendida’ como fórmula repetible y reconocible.
