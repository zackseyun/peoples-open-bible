theological_decisions:
- issue: Rendering of מִלֻּאִים in priestly installation context
  chosen_reading: ordination offerings
  alternative_readings:
  - consecration offerings
  rationale: The term refers to the installation rite of Aaron and his sons. 'Ordination' communicates the specific priestly appointment context in accessible English without importing later ecclesiastical structures. 'Consecration' is also valid and is preserved as an alternative lexical possibility.
  doctrine_reference: Translation philosophy §1, §5
