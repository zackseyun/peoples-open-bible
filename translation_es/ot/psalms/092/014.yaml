translation:
  language: es
  text: Plantados en la casa de Yahvé, florecerán en los atrios[a] de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «patios».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתוּלִים
  english_pob_choice: Planted
  chosen_spanish: Plantados
  alternatives_spanish:
  - Trasplantados
  - Bien plantados
  lexicon: HALOT
  rationale: El participio pasivo expresa la imagen de plantas colocadas y arraigadas; «plantados» conserva la metáfora sin añadir una precisión no explicitada por el hebreo. «Trasplantados» es posible, pero introduce una idea que no está marcada en el texto.
- source_word: בְּבֵית
  english_pob_choice: in the house of
  chosen_spanish: en la casa de
  alternatives_spanish:
  - en el templo de
  - en la morada de
  lexicon: HALOT
  rationale: בַּיִת significa literalmente «casa». En este contexto puede referirse al santuario, pero «casa de» preserva la imagen hebrea y sigue siendo claro en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», según el criterio del proyecto. «El SEÑOR» ocultaría el nombre propio; «Jehová» no refleja la forma preferida del proyecto.
- source_word: בְּחַצְרוֹת
  english_pob_choice: in the courts of
  chosen_spanish: en los atrios de
  alternatives_spanish:
  - en los patios de
  - en las cortes de
  lexicon: HALOT
  rationale: חָצֵר aquí designa los espacios del recinto sagrado; «atrios» es el equivalente más natural y reverente en español bíblico. «Patios» es posible, pero menos solemne; «cortes» es menos idiomático.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona plural se rinde de manera directa y natural como «nuestro Dios».
- source_word: יַפְרִיחוּ
  english_pob_choice: they will flourish
  chosen_spanish: florecerán
  alternatives_spanish:
  - brotarán
  - prosperarán
  lexicon: HALOT
  rationale: El verbo causativo de פרח puede expresar brotar, florecer o florecer/vivir con vigor. «Florecerán» mantiene la metáfora vegetal y comunica bien la idea de prosperidad vital en español.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. En la línea del POB, se evita la sustitución por un título y se translitera el nombre divino como «Yahvé», preservando su valor de nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz del verbo final en poesía agrícola
  english_pob_reading: they will flourish
  chosen_spanish_reading: florecerán
  alternative_spanish_readings:
  - brotarán
  - crecerán con vigor
  rationale: El contexto poético compara a los justos con plantas arraigadas. «Florecerán» conserva el paralelo vegetal y no reduce el sentido a mera prosperidad material.
  doctrine_reference: HALOT פרח, uso poético
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y ninguna revisión aplicada; el texto español sigue esa línea sin introducir cambios de sentido ni suavizar la imagen botánica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se eligió un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se conservó la metáfora agrícola del verso mediante «plantados» y «florecerán».
