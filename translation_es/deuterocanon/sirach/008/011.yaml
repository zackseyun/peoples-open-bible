translation:
  language: es
  text: No desprecies[a] ni siquiera su conversación ordinaria, porque de él aprenderás instrucción para presentarte ante gobernantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No te levantes de delante de un hombre insolente, no sea que se siente como una emboscada contra tu boca». La tradición griega aquí difiere de manera sustancial del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂיחוֹת חוֹל
  english_pob_choice: ordinary conversation
  chosen_spanish: conversación ordinaria
  alternatives_spanish:
  - conversación común
  - habla cotidiana
  - charla ordinaria
  lexicon: HALOT
  rationale: שִׂיחוֹת denota conversación o charla, y חוֹל aquí contrasta con lo elevado o formal; en español, «conversación ordinaria» conserva la idea de habla cotidiana sin sugerir un contenido moralmente malo.
- source_word: תִבְזֶה
  english_pob_choice: do not despise
  chosen_spanish: No desprecies
  alternatives_spanish:
  - No desdeñes
  - No menosprecies
  - No tengas en poco
  lexicon: HALOT
  rationale: El verbo expresa tratar algo con desdén o desprecio. «No desprecies» es natural, conciso y fiel al valor semántico.
- source_word: לְהִתְיַצֵּב לִפְנֵי שָׂרִים
  english_pob_choice: for standing before rulers
  chosen_spanish: para estar delante de gobernantes
  alternatives_spanish:
  - para presentarte delante de príncipes
  - para comparecer ante oficiales
  - para presentarte ante gobernantes
  lexicon: HALOT
  rationale: 'La frase infinitiva expresa finalidad o resultado práctico: aprender a conducirse en presencia de personas de alto rango. «Gobernantes» amplía legitimamente שָׂרִים y suena más idiomático en español que «príncipes».'
- source_word: לֶקַח
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - aprendizaje
  - saber
  lexicon: HALOT
  rationale: לֶקַח suele indicar instrucción recibida o enseñanza práctica. «Instrucción» preserva el tono sapiencial del pasaje.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de ese hombre
  - de esa persona
  - de él mismo
  lexicon: HALOT
  rationale: El pronombre masculino singular remite al hombre sabio o experimentado del contexto. «De él» mantiene esa referencia y la concordancia de género.
theological_decisions:
- issue: Desviación sustancial entre el hebreo conservado y el paralelo griego
  english_pob_reading: Main text follows the extant Hebrew; the Greek alternative is preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado, y la nota preserva la redacción griega divergente.
  alternative_spanish_readings:
  - No te levantes de delante de un insolente, no sea que se siente como una emboscada para tu boca.
  - No abandones la presencia de un hombre insolente, para que no se siente como trampa para tu boca.
  rationale: En Sirácides, el proyecto traduce del hebreo donde está preservado. Aquí la tradición griega difiere mucho del hebreo de Kahana, así que no se armonizan ambos testigos; se deja la variante griega como tradición alternativa significativa.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo cuando sobrevive; conservar el paralelo griego como testimonio real sin desplazar la primacía del original-base'
- issue: Valor de שִׂיחוֹת חוֹל
  english_pob_reading: ordinary conversation
  chosen_spanish_reading: conversación ordinaria
  alternative_spanish_readings:
  - habla común
  - charla cotidiana
  - conversación común
  rationale: La frase no exige una carga peyorativa ni una restricción a 'habla religiosa'. Mantener «ordinaria» preserva el contraste con lo formal o elevado sin añadir connotaciones ajenas.
  doctrine_reference: Principio de no sobrerinterpretar el contraste léxico del hebreo
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios necesarios; se mantiene la estrategia ya aprobada: texto principal según el hebreo de Kahana y nota para la divergencia griega.'
  spanish_consistency_notes:
  - Se conserva el registro sapiencial y sobrio propio de Sirácides.
  - «Gobernantes» evita el arcaísmo de «príncipes» sin perder el rango social alto del término.
  - La nota textual usa una formulación clara y no armoniza artificialmente el hebreo y el griego.
