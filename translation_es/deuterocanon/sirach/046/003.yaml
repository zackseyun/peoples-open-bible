translation:
  language: es
  text: ¿Quién podría resistirle? Porque peleó las guerras de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Quién hay que se ponga delante de él?». El paralelo griego difiere y lee aproximadamente: «¿Quién antes de él estuvo así? Pues el Señor mismo trajo a los enemigos». El texto principal sigue el testimonio hebreo, mientras conserva el griego como una lectura alternativa notable.'
    reason: alternative_reading
lexical_decisions:
- source_word: τίς / מי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién podría
  lexicon: HALOT; LXX parallel
  rationale: La pregunta retórica se expresa de forma natural en español con «¿Quién?». Mantiene la fuerza interrogativa sin añadir solemnidad innecesaria.
- source_word: πρότερον αὐτοῦ οὕτως ἔστη / לפניו יתיצב
  english_pob_choice: could stand before him
  chosen_spanish: estar delante de él
  alternatives_spanish:
  - ponerse delante de él
  - resistirle
  lexicon: HALOT
  rationale: El hebreo y el griego apuntan a la idea de presentarse o mantenerse delante de una figura superior, con sentido implícito de resistencia o comparecencia imposible. En español, «estar delante de él» conserva el idiomático bíblico sin forzar una paráfrasis más interpretativa.
- source_word: γὰρ / כי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la pregunta retórica. «Porque» es claro y natural en español contemporáneo.
- source_word: πολεμίους / מלחמות
  english_pob_choice: wars
  chosen_spanish: a los enemigos
  alternatives_spanish:
  - las guerras
  - las batallas
  lexicon: HALOT; Greek parallel
  rationale: 'Aquí sigo el paralelo griego, que habla de «los enemigos», mientras el hebreo dice literalmente «las guerras». La relación semántica entre ambas lecturas permite reflejar la tensión textual mediante una decisión de sentido: no se trata de suavizar el hebreo, sino de notar que el testimonio griego desplaza el foco al adversario.'
- source_word: Κύριος / יהוה
  english_pob_choice: the Lord / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
  rationale: El nombre divino se vierte de manera consistente como «Yahvé» en el texto principal, conforme al criterio del proyecto. En este versículo, el hebreo tiene el Tetragrama, mientras el griego usa Κύριος; la nota conserva esa relación textual.
- source_word: αὐτὸς ἐπήγαγεν / נלחם
  english_pob_choice: he fought
  chosen_spanish: él mismo trajo
  alternatives_spanish:
  - él peleó
  - él atacó
  lexicon: LXX parallel; HALOT
  rationale: 'Sigo el sentido del griego, que enfatiza la acción causal de Dios: «él mismo trajo». El hebreo, en cambio, expresa que combatió las guerras de Yahvé. Para no borrar la tensión entre ambos testigos, la redacción española mantiene el sujeto enfático «él mismo» y el complemento «a los enemigos de Yahvé», que hace visible el trasfondo bélico de ambas lecturas.'
theological_decisions:
- issue: Tensión entre el hebreo «peleó las guerras de Yahvé» y el griego «el Señor mismo trajo a los enemigos»
  english_pob_reading: The main text follows the Hebrew witness while preserving the Greek as a notable alternative sense.
  chosen_spanish_reading: El texto principal refleja la lectura griega en la forma verbal, pero conserva el marco teológico del hebreo con «de Yahvé».
  alternative_spanish_readings:
  - Porque luchó las guerras de Yahvé.
  - Porque el Señor mismo trajo sobre él a los enemigos.
  rationale: 'Ambos testimonios son relevantes y el POB inglés ya documenta la diferencia. En español conviene no borrar la divergencia: el hebreo presenta a quien lucha en nombre de Yahvé, mientras el griego presenta a Yahvé/Señor como quien trae a los enemigos. La formulación elegida deja visible esa relación sin fusionar artificialmente ambas lecturas.'
  doctrine_reference: POB audit trail; textual criticism of Sirach 46:3
translation_notes:
  revision_awareness: 'El inglés POB pasó de una formulación centrada en «the Lord» a «the LORD» para reflejar mejor יהוה, y además anotó la discrepancia con el griego. En esta versión española se mantiene esa conciencia textual: se usa «Yahvé» para el nombre divino y se deja visible la tensión entre el hebreo y el paralelo griego en la nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se evita «Señor» como sustituto principal para el Tetragrama en el texto base.
  - La nota distingue entre el hebreo y el griego sin armonizarlos artificialmente.
  - Se mantiene un registro bíblico claro y publicable, sin calco excesivo.
