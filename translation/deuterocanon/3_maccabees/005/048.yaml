id: 3MA.5.48
reference: 3 Maccabees 5:48
source:
  edition: lxx-swete-1909
  text: ὡς δὲ τῶν ἐλεφάντων ἐξιόντων ἐπὶ πύλην, καὶ τῆς ἑπομένης ἐνόπλου δυνάμεως τῆς τε τοῦ πλήθους πορείας κονιορτὸν ἰδόντες, καὶ βαρυχῆ θόρυβον ἀκούσαντες οἱ Ἰουδαῖοι,
  language: Greek
  pages:
  - 745
  confidence: high
  validation: agree
translation:
  text: But when the Jews saw the elephants coming out to the gate[a], and the dust from the advancing armed force and from the movement of the crowd, and heard a loud tumult,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a loud uproar' or 'a deep tumult' for 'a heavy noise.' The Greek expression emphasizes the weight or resonance of the sound.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: But when
  alternatives:
  - and when
  - now when
  lexicon: LSJ
  rationale: Marks a transition with temporal force; 'But when' preserves both the connective and the narrative turn.
- source_word: τῶν ἐλεφάντων ἐξιόντων
  chosen: the elephants coming out
  alternatives:
  - the elephants going out
  - the elephants emerging
  lexicon: LSJ
  rationale: Genitive absolute describing the elephants in motion; 'coming out' is natural English and keeps the concrete action.
- source_word: ἐπὶ πύλην
  chosen: toward the gate
  alternatives:
  - to the gate
  - against the gate
  lexicon: LSJ
  rationale: ἐπί with accusative here indicates movement in the direction of the gate; 'toward' avoids overcommitting to arrival or hostile contact.
- source_word: τῆς ἑπομένης ἐνόπλου δυνάμεως
  chosen: the advancing armed force
  alternatives:
  - the following armed force
  - the armed force that followed
  lexicon: LSJ
  rationale: ἑπομένης literally means 'following,' but in context it denotes the force moving behind the elephants; 'advancing armed force' is idiomatic while preserving sequence and military sense.
- source_word: τῆς τε τοῦ πλήθους πορείας
  chosen: the movement of the crowd
  alternatives:
  - the march of the multitude
  - the progress of the crowd
  lexicon: LSJ
  rationale: πορεία denotes movement/march; πλήθος is a mass or crowd. 'Movement of the crowd' is clear modern English and fits the paired genitives governed by 'dust'.
- source_word: κονιορτόν
  chosen: dust
  alternatives:
  - cloud of dust
  lexicon: LSJ
  rationale: The noun itself is 'dust'; English readers naturally infer stirred-up dust from marching forces. 'Cloud of dust' would be interpretive expansion.
- source_word: βαρυχῆ θόρυβον
  chosen: a heavy noise
  alternatives:
  - a loud uproar
  - a deep tumult
  lexicon: LSJ
  rationale: βαρυχής conveys heaviness/deep resonance, and θόρυβος is noise, uproar, or tumult. 'Heavy noise' preserves the unusual weighty quality without overinterpreting it as purely shouting or battle-clamor.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: LSJ
  rationale: In 3 Maccabees this term refers to the Jewish people as an ethnic-religious group in Egypt, not merely inhabitants of Judea. 'The Jews' is the most contextually accurate rendering.
