review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: un deseo imprecatorio de retroceso dirigido contra quienes se burlan. «Que retrocedan» representa adecuadamente יָשׁוּבוּ en contexto jussivo, «por causa de» expresa bien על עקב, y «los que dicen» corresponde al participio sustantivado. Sin embargo, la nota al pie no preserva la alternativa documentada en inglés para toda la cláusula verbal, y la interjección «¡Ja, ja!» puede leerse como risa más que como exclamación de burla triunfal.'
  spanish_quality_summary: 'El español es claro y natural, pero conviene mejorar dos puntos menores: quitar la coma antes de «los que dicen», ya que no es necesaria y corta torpemente la frase; y ajustar la interjección para reflejar mejor la mofa hostil. «¡Ajá, ajá!» en español suele sonar a hallazgo o asentimiento, pero «¡Ja, ja!» suena demasiado a carcajada. Una forma como «¡Aj, aj!» evita ambas lecturas y conserva mejor el matiz de escarnio.'
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales son en general coherentes con el rastro auditado. La única desalineación relevante es la nota: el inglés preserva una alternativa para la cláusula «Let them turn back because of their shame», no meramente para «because of».'
  issues:
  - severity: medium
    issue: La nota al pie no refleja la alternativa documentada en el POB inglés.
    rationale: La nota española «O «a causa de su vergüenza»» solo reformula la preposición, mientras que la nota inglesa conserva la alternativa completa «May they turn back on account of their shame». Debe preservarse esa alternativa de alcance completo en español.
  - severity: medium
    issue: «¡Ja, ja!» puede sonar a risa literal más que a burla triunfal.
    rationale: הֶאָח הֶאָח es una interjección de mofa. En español, «ja, ja» normalmente representa carcajada escrita. Una forma más breve e interjectiva como «¡Aj, aj!» comunica mejor el escarnio sin añadir interpretación.
  - severity: low
    issue: La coma antes de «los que dicen» es innecesaria.
    rationale: «los que dicen» restringe a los destinatarios de la imprecación, por lo que en español fluye mejor sin coma.
  revised_spanish_text: 'Que retrocedan por causa de su vergüenza[a] los que dicen: «¡Aj, aj!»'
