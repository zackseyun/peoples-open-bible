revisions:
- from: Y si no nos vuelves[a], no nos apartaremos[b], sino que vendremos a ti.
  to: Y si no nos haces volver[a], no nos apartaremos[b], sino que vendremos a ti.
  rationale: Se reemplaza «nos vuelves» por «nos haces volver» para lograr un español natural y claro que siga representando ἐπιστρέψῃς como causativo de retorno. Se conservan las alternativas «nos restauras» y «nos vuelves» en nota para reflejar tanto el uso salmódico como la literalidad más estrecha. El resto del verso se mantiene porque es fiel al griego y estilísticamente apropiado.
