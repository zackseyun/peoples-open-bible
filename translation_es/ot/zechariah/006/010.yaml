base_translation:
  language: en
  yaml_path: translation/ot/zechariah/006/010.yaml
  text: Take from the exiles—from Heldai[a], from Tobijah, and from Jedaiah—and you shall go that same day and enter the house of Josiah the son of Zephaniah[d][c][b], where they have come from Babylon.
  footnotes:
  - marker: a
    text: Or 'from the exilic community.' The Hebrew term can denote the body of exiles rather than exile as an abstract condition.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'come' can be rendered 'go' in English according to perspective; the command concerns Zechariah's movement to another location.
    reason: lexical_alternative
  - marker: c
    text: The final clause is plural, 'who have come from Babylon,' most naturally referring to Heldai, Tobijah, and Jedaiah rather than to Josiah alone.
    reason: alternative_reading
  - marker: d
    text: Tobijah is often rendered 'Tobiah' in English versions.
    reason: lexical_alternative
