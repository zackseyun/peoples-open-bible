translation:
  language: es
  text: Y a los hijos de Leví[a], he aquí, he dado todo el diezmo en Israel como herencia, a cambio[b] del servicio que ellos realizan[c], el servicio de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el diezmo de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «en lugar del servicio» o «como compensación por el servicio».
    reason: lexical_alternative
  - marker: c
    text: Es decir, el servicio del tabernáculo, donde los levitas cumplían sus tareas asignadas.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/לִ/בְנֵי לֵוִי
  english_pob_choice: And to the sons of Levi
  chosen_spanish: Y a los hijos de Leví
  alternatives_spanish:
  - Y a los levitas
  - Y a los hijos de Leví
  lexicon: HALOT
  rationale: Se conserva la frase genealógica literal «hijos de Leví», que refleja con transparencia el hebreo. «Levitas» sería natural, pero suaviza la forma de parentesco del original.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira
  - mira bien
  lexicon: HALOT
  rationale: El hebreo introduce una exhortación enfática. «Mira» comunica esa fuerza discursiva en español moderno sin sonar arcaico como «he aquí».
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he dado
  alternatives_spanish:
  - doy
  - di
  - he dado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una dádiva ya establecida; «he dado» transmite esa acción consumada y su efecto vigente.
- source_word: כָּל מַעֲשֵׂר בְּיִשְׂרָאֵל
  english_pob_choice: every tithe in Israel
  chosen_spanish: todo el diezmo en Israel
  alternatives_spanish:
  - cada diezmo en Israel
  - todo el diezmo de Israel
  - todo el diezmo en Israel
  lexicon: HALOT
  rationale: «Diezmo» es el equivalente natural de מַעֲשֵׂר. Se prefirió «todo» para conservar el alcance colectivo que el inglés POB refleja con «every», sin perder la idea de la totalidad del diezmo.
- source_word: לְנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como heredad
  - para herencia
  - como posesión
  lexicon: HALOT
  rationale: «Herencia» comunica bien el sentido jurídico de asignación patrimonial. Se evita «heredad» por ser más literario y menos transparente para lectura pública.
- source_word: חֵלֶף
  english_pob_choice: in return for
  chosen_spanish: en pago
  alternatives_spanish:
  - a cambio de
  - en compensación por
  - en retorno de
  lexicon: HALOT
  rationale: El hebreo implica compensación o intercambio. «En pago» mantiene la relación retributiva del versículo sin introducir un matiz comercial excesivo; se deja abierta la alternativa de «a cambio de» en notas conceptuales si fuera necesario.
- source_word: עֲבֹדָתָם
  english_pob_choice: their service
  chosen_spanish: del servicio
  alternatives_spanish:
  - de su servicio
  - del trabajo
  - de su labor
  lexicon: HALOT
  rationale: La revisión inglesa eliminó el posesivo innecesario para seguir más de cerca el hebreo. En español, «del servicio» conserva esa misma neutralidad y se integra bien con la frase siguiente.
- source_word: אֲשֶׁר הֵם עֹבְדִים
  english_pob_choice: that they perform
  chosen_spanish: que ellos realizan
  alternatives_spanish:
  - que desempeñan
  - que hacen
  - que sirven
  lexicon: HALOT
  rationale: «Realizan» expresa la ejecución efectiva de una tarea cultual sin forzar el verbo «servir», que ya aparece en el sustantivo siguiente. Mantiene la claridad del participio hebreo.
- source_word: אֶת עֲבֹדַת אֹהֶל מוֹעֵד
  english_pob_choice: the service of the tent of meeting
  chosen_spanish: el servicio de la tienda de reunión
  alternatives_spanish:
  - el servicio del tabernáculo de reunión
  - el servicio de la tienda del encuentro
  - la obra de la tienda de reunión
  lexicon: HALOT
  rationale: Se traduce אֹהֶל מוֹעֵד de manera consistente con el término bíblico conocido, pero en español se prefiere «tienda de reunión» para seguir de cerca la forma del hebreo y conservar la designación cultual sin depender de una denominación eclesiástica posterior. «Tabernáculo» se deja como alternativa interpretativa.
theological_decisions:
- issue: Relación entre herencia y compensación levítica
  english_pob_reading: The tithe is presented as an inheritance given in return for Levitical service.
  chosen_spanish_reading: El diezmo es una herencia dada a los levitas y, al mismo tiempo, una compensación por el servicio cultual que realizan.
  alternative_spanish_readings:
  - El diezmo simplemente se les asigna sin énfasis compensatorio
  - El diezmo reemplaza la herencia territorial de manera implícita
  rationale: 'El versículo une explícitamente לְנַחֲלָה y חֵלֶף עֲבֹדָתָם. La traducción conserva ambas ideas: don patrimonial y contraprestación por el servicio, sin diluir ninguna de las dos.'
  doctrine_reference: Números 18:21; cf. el marco levítico de asignación de herencia en la Torá
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «their service» por «the service» para reflejar más directamente el hebreo y evitar un posesivo no explícito. La versión española sigue esa corrección con «del servicio».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponda en la serie, aunque este versículo no lo contiene.
  - Se conserva «tienda de reunión» como equivalente base de אֹהֶל מוֹעֵד para mantener consistencia con el proyecto, con nota explicativa sobre su referente cultual.
  - «Levitas» quedó como alternativa léxica, pero no se eligió en el texto principal para preservar la forma genealógica del hebreo.
