revisions:
- from: 'Y le dijo[a]: «Entra, bendito de Yahvé. ¿Por qué te quedas fuera? Yo ya he preparado la casa y un lugar para los camellos».'
  to: 'Y le dijo[a]: «Entra, bendito de Yahvé. ¿Por qué estás de pie afuera? Yo he preparado la casa y un lugar para los camellos».'
  rationale: Se conserva todo lo acertado del borrador, pero se corrige «te quedas fuera» a «estás de pie afuera» para reflejar mejor עמד y el audit trail inglés «stand outside». También se elimina «ya» por no estar exigido por el hebreo. No se requiere adjudicación adicional.
