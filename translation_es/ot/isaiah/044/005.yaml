translation:
  language: es
  text: 'Uno[a] dirá: “Yo soy de Yahvé”; otro se identificará con el nombre de Jacob; y otro escribirá en su mano[b]: “Perteneciente a Yahvé”, y se pondrá[c] el nombre de Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “Este dirá: ‘A Yahvé, yo’; otro llamará por el nombre de Jacob.” El hebreo es elíptico e idiomático.'
    reason: lexical_alternative
  - marker: b
    text: “Escribirá en su mano” probablemente alude a una inscripción o marca en la mano como señal de pertenencia a Yahvé.
    reason: cultural_note
  - marker: c
    text: O “se apellidará con el nombre de Israel” o “se dará a sí mismo el nombre de Israel”.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה ... וְזֶה ... וְזֶה
  english_pob_choice: This one ... another ... and another
  chosen_spanish: Este ... otro ... y otro
  alternatives_spanish:
  - uno ... otro ... y otro
  - este ... este ... este
  lexicon: WLC / HALOT
  rationale: La repetición del demostrativo marca individuos sucesivos. En español, “este... otro... y otro” conserva el valor distributivo con fluidez natural.
- source_word: יֹאמַר
  english_pob_choice: will say
  chosen_spanish: dirá
  alternatives_spanish:
  - dice
  - dirá diciendo
  lexicon: HALOT
  rationale: El imperfecto profético se vierte naturalmente como futuro en español.
- source_word: לַיהוָה אָנִי
  english_pob_choice: I am Yahweh’s
  chosen_spanish: Yo soy de Yahvé
  alternatives_spanish:
  - Yo pertenezco a Yahvé
  - Soy de Yahvé
  lexicon: HALOT
  rationale: La frase hebrea es elíptica e idiomática. “Soy de Yahvé” comunica pertenencia; se mantiene “Yahvé” según el criterio del proyecto para el Tetragrámaton.
- source_word: יִקְרָא בְשֵׁם יַעֲקֹב
  english_pob_choice: will call himself by the name of Jacob
  chosen_spanish: se llamará por el nombre de Jacob
  alternatives_spanish:
  - se nombrará con el nombre de Jacob
  - se llamará Jacob
  lexicon: HALOT
  rationale: El hebreo קרא בשם puede expresar identificarse con un nombre. “Se llamará por el nombre de Jacob” preserva esa idea sin volverla demasiado libre.
- source_word: יִכְתֹּב יָדוֹ לַיהוָה
  english_pob_choice: will write on his hand, ‘Belonging to the LORD,’
  chosen_spanish: 'escribirá en su mano: “Perteneciente a Yahvé”'
  alternatives_spanish:
  - marcará su mano como de Yahvé
  - 'inscribirá en su mano: “De Yahvé”'
  lexicon: HALOT
  rationale: La construcción literal sugiere una inscripción o marca en la mano como señal de pertenencia. “Perteneciente a Yahvé” expresa el contenido implícito sin perder la imagen concreta.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su brazo
  lexicon: HALOT
  rationale: El sustantivo corporal es directo; “mano” es la traducción literal y clara.
- source_word: וּבְשֵׁם יִשְׂרָאֵל יְכַנֶּה
  english_pob_choice: and will name himself by the name of Israel
  chosen_spanish: y se pondrá el nombre de Israel
  alternatives_spanish:
  - y se llamará Israel
  - y se apellidará Israel
  lexicon: HALOT
  rationale: El piel de כנה tiene aquí el sentido de designarse a sí mismo con un nombre/título. “Ponerse el nombre” conserva la reflexividad y suena natural en español.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: HALOT
  rationale: Nombre propio mantenido en transliteración estándar.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio mantenido en transliteración estándar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el defecto del proyecto: el Tetragrámaton se traduce como “Yahvé”, no como sustitución nominal. Esto preserva el nombre divino personal del texto hebreo.'
theological_decisions:
- issue: Sentido confesional y de pertenencia del versículo
  english_pob_reading: The verse describes individuals openly identifying themselves as belonging to the LORD and to his covenant people.
  chosen_spanish_reading: El versículo describe personas que se declaran pertenecientes a Yahvé y se identifican con su pueblo del pacto.
  alternative_spanish_readings:
  - El versículo sólo describe afiliación social con Israel.
  - El versículo habla de un cambio de nombre sin carga confesional.
  rationale: Las tres cláusulas progresan de confesión verbal a adopción de nombre e inscripción corporal, señalando lealtad deliberada. La redacción española conserva esa fuerza sin introducir categorías posteriores.
  doctrine_reference: Translation philosophy §1, §3; Tetragrámaton → Yahvé
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo de Isaías 44:5 y con el audit trail inglés: se conserva la secuencia distributiva de los tres sujetos, la elipsis de לַיהוָה אָנִי se resuelve como pertenencia, el gesto de escribir en la mano se mantiene concreto y se explicita como marca de pertenencia, y el cierre con כנה se vierte como autoidentificación con el nombre de Israel. No se reportan revisiones aplicadas en el ciclo inglés reciente.'
  spanish_consistency_notes:
  - Se mantiene Yahvé de manera consistente para יהוה.
  - Se conserva Jacob e Israel como nombres propios transliterados.
  - La fórmula “Perteneciente a Yahvé” se usa solo dentro de la cita, para reflejar el contenido implícito de la inscripción.
  - El estilo es moderno y reverente, evitando tanto arcaísmos como paráfrasis excesivas.
