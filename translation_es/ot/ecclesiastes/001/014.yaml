  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Vanidad» para הֶבֶל sigue la línea del POB con alternativas en nota. No hay nombres divinos ni títulos mesiánicos en este versículo. La decisión sobre רְעוּת רוּחַ debe seguir comunicando una búsqueda inútil, y «afanarse» lo hace de modo más natural que «esforzarse».
