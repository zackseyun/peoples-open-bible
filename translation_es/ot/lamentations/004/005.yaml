review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el paralelismo y el contraste social del hebreo: quienes antes comían lujos ahora están arruinados en público; quienes fueron criados en lujo ahora abrazan basureros. Sin embargo, hay dos problemas de fidelidad/forma: la nota al pie [a] está anclada erróneamente en ''manjares'' cuando corresponde a ''montones de ceniza'', y ''se han desolado'' suena poco natural e intransitivo en español para נָשַׁמּוּ. Conviene usar una formulación más idiomática que preserve el estado de ruina.'
  spanish_quality_summary: El texto es generalmente claro y digno. 'Manjares', 'escarlata' y 'abrazan' funcionan bien. No obstante, la ubicación de la nota crea confusión semántica, y 'se han desolado' resulta torpe en español bíblico-natural. 'Están desolados' mejora la legibilidad sin perder fuerza.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son apropiadas: ''manjares'' para לְמַעֲדַנִּים, ''los que fueron criados'' para הָאֱמֻנִים, ''sobre escarlata'' para עֲלֵי תוֹלָע, y ''abrazan'' para חִבְּקוּ. Para אַשְׁפַּתּוֹת, puede mantenerse ''montones de ceniza'' si se preservan las alternativas en nota, pero la nota debe ir en ese sintagma.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'manjares' en vez de en 'montones de ceniza'.
    rationale: La nota inglesa documenta una alternativa léxica para אַשְׁפַּתּוֹת ('ash heaps/refuse heaps/dung heaps'), no para לְמַעֲדַנִּים. Tal como está, el lector español recibe una aclaración en el lugar equivocado.
  - severity: medium
    issue: '''Se han desolado'' es poco idiomático en español para este contexto.'
    rationale: Aunque intenta reflejar el estado resultante de נָשַׁמּוּ, en español suena forzado e incluso reflexivo de manera extraña. 'Están desolados' o 'quedaron desolados' comunica mejor la ruina actual.
  revised_spanish_text: Los que comían manjares están desolados en las calles; los que fueron criados sobre escarlata abrazan montones de ceniza[a].
  revised_footnotes:
  - marker: a
    text: O «montones de desechos», «montones de basura» o «estercoleros»; el término hebreo alude a lugares de desperdicio y expresa humillación extrema.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota para que corresponda al término hebreo אַשְׁפַּתּוֹת, y se mejora la naturalidad española de נָשַׁמּוּ con 'están desolados', que preserva el sentido de ruina sin el giro poco idiomático 'se han desolado'.
