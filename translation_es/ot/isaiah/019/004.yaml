translation:
  language: es
  text: Entregaré a Egipto en manos de un amo severo[a], y un rey feroz gobernará sobre ellos, declara el Señor[b][c], Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entregaré a Egipto en poder de un amo severo».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «un amo severo»; el sustantivo está morfológicamente en plural, pero aquí funciona con sentido singular o intensivo, en paralelo con «un rey» en singular.
    reason: lexical_alternative
  - marker: c
    text: Aquí «Señor» traduce el título הָאָדוֹן, distinto de «Yahvé», que vierte el nombre divino יְהוָה.
    reason: theological_note
lexical_decisions:
- source_word: וְסִכַּרְתִּי
  english_pob_choice: I will give
  chosen_spanish: Yo entregaré
  alternatives_spanish:
  - Yo daré
  - Yo pondré en poder de
  lexicon: HALOT
  rationale: El verbo expresa la entrega de Egipto al poder de otro. «Entregaré» conserva esa acción de transferencia de poder con naturalidad en español y refleja bien el valor causativo del hebreo sin añadir matices ajenos.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - bajo el poder de
  lexicon: HALOT
  rationale: Mantiene la imagen hebrea de «mano» como idiomática de poder o control. En español «en mano de» suena bíblico y claro; la nota cubre la alternativa explicativa «en poder de».
- source_word: אֲדֹנִים קָשֶׁה
  english_pob_choice: a harsh master
  chosen_spanish: un amo severo
  alternatives_spanish:
  - unos señores severos
  - un señor duro
  - un amo cruel
  lexicon: HALOT
  rationale: Aunque אֲדֹנִים es morfológicamente plural, aquí funciona con sentido singular/intensivo en paralelo con «rey» en singular. «Amo» comunica el sentido de autoridad humana sobre otros con menos ambigüedad que «señor»; «severo» recoge קָשֶׁה sin exagerar hacia «cruel».
- source_word: וּמֶלֶךְ עַז
  english_pob_choice: and a fierce king
  chosen_spanish: y un rey feroz
  alternatives_spanish:
  - y un rey fuerte
  - y un rey poderoso
  lexicon: HALOT
  rationale: עַז puede significar fuerte, poderoso o feroz. En un contexto de juicio y opresión, «feroz» expresa mejor la severidad agresiva sugerida por el conjunto de la frase.
- source_word: יִמְשָׁל בָּם
  english_pob_choice: will rule over them
  chosen_spanish: gobernará sobre ellos
  alternatives_spanish:
  - reinará sobre ellos
  - dominará sobre ellos
  lexicon: HALOT
  rationale: «Gobernará sobre ellos» es una forma natural en español para el valor de משל con ב, sin introducir una carga más interpretativa que «dominará». Mantiene el sentido político de gobierno efectivo.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: En fórmulas proféticas, «declara» suena solemne y contemporáneo, y reproduce bien el tono de anuncio autoritativo del hebreo.
- source_word: הָאָדוֹן
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Soberano
  lexicon: HALOT
  rationale: Aquí el título está en aposición al nombre divino. «El Señor» es la mejor forma española para este título reverente, distinta del «amo» humano anterior y adecuada al registro profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto para יְהוָה, evitando la sustitución por un título y manteniendo la transparencia del texto hebreo.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» expresa de manera más transparente el sentido militar de צְבָאוֹת que la tradicional pero más opaca «huestes». En español bíblico actual suena solemne y comprensible.
theological_decisions:
- issue: Representación del Tetragrama en la fórmula divina final
  english_pob_reading: the Lord, Yahweh of Armies
  chosen_spanish_reading: el Señor, Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el Señor Dios de los Ejércitos
  - el Soberano, Yahvé de los Ejércitos
  rationale: El hebreo distingue הָאָדוֹן de יְהוָה. En español se conserva esa distinción con «el Señor» para הָאָדוֹן y «Yahvé» para el nombre divino, evitando colapsarlos en una sola sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Plural morfológico de אֲדֹנִים en un referente singular
  english_pob_reading: a harsh master ... the noun is morphologically plural ('lords') but likely functions here as a singular of majesty or intensity
  chosen_spanish_reading: un amo severo
  alternative_spanish_readings:
  - unos amos severos
  - unos señores severos
  rationale: 'La concordancia del contexto apunta a un solo gobernante: sigue «un rey feroz» y un verbo singular. Por eso se traduce en singular, conservando la tensión morfológica en la nota sin forzar una pluralidad inexistente en la escena.'
  doctrine_reference: HALOT / gramática del contexto inmediato
- issue: Valor semántico de עַז en contexto de juicio
  english_pob_reading: a fierce king
  chosen_spanish_reading: un rey feroz
  alternative_spanish_readings:
  - un rey fuerte
  - un rey poderoso
  rationale: El contexto de castigo sobre Egipto favorece un matiz de dureza agresiva más que mera fortaleza política. «Feroz» transmite mejor ese tono de violencia/opresión.
  doctrine_reference: HALOT
- issue: Tono de la fórmula final נְאֻם הָאָדוֹן יְהוָה צְבָאוֹת
  english_pob_reading: declares the Lord, Yahweh of Armies
  chosen_spanish_reading: declara el Señor, Yahvé de los Ejércitos
  alternative_spanish_readings:
  - declara el Amo, Yahvé de los Ejércitos
  - oráculo del Señor, Yahvé de los Ejércitos
  rationale: Se mantiene la fórmula profética como declaración solemne y se conserva el nombre divino sin máscara. «Declara» reproduce el valor de la expresión oracular de forma clara para el lector moderno.
  doctrine_reference: HALOT / fórmula profética
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó el segundo ‘Lord’ por ‘Yahweh’ para reflejar con mayor precisión el Tetragrama en la fórmula final. Esta decisión se refleja en español con «Yahvé» y con la distinción explícita entre el título «el Señor» y el nombre divino.
  spanish_consistency_notes:
  - 'Se conservó la distinción entre título divino y nombre divino: «el Señor» / «Yahvé».'
  - Se evitó «SEÑOR» como máscara, conforme al criterio del proyecto para יְהוָה.
  - «Ejércitos» se mantuvo para צְבָאוֹת por transparencia semántica.
  - «Amo» se usó para el referente humano para evitar confusión con el título divino «Señor».
