translation:
  language: es
  text: Él destroza a los poderosos sin indagar[a], y pone a otros en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin investigación» / «sin búsqueda». La expresión hebrea dice literalmente «no investigación/búsqueda», y expresa que no hace falta un examen prolongado antes de derribar a los poderosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרֹעַ
  english_pob_choice: shatters
  chosen_spanish: despedaza
  alternatives_spanish:
  - quiebra
  - hace pedazos
  - destroza
  lexicon: HALOT
  rationale: El verbo hebreo expresa una acción fuerte y punitiva sobre los poderosos. «Despedaza» conserva la fuerza de «shatters» y funciona de manera natural en español sin suavizar el juicio.
- source_word: כַּבִּירִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los poderosos
  - los grandes
  - los fuertes
  lexicon: HALOT
  rationale: El sustantivo designa personas de gran poder o rango. «Los poderosos» mantiene el peso social y político del término y es claro en español.
- source_word: לֹא חֵקֶר
  english_pob_choice: without investigation
  chosen_spanish: sin investigación
  alternatives_spanish:
  - sin indagación
  - sin buscar
  - sin examen
  lexicon: HALOT
  rationale: La construcción literalmente niega la idea de buscar o investigar. «Sin investigación» reproduce con buena naturalidad la decisión de la POB inglesa y preserva la tensión de que no hace falta una pesquisa prolongada antes del juicio.
- source_word: וַיַּעֲמֵד
  english_pob_choice: sets
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - establece
  - designa
  lexicon: HALOT
  rationale: El verbo causativo de עמד puede expresar hacer que alguien quede en una posición o cargo. «Pone» encaja bien con la frase siguiente «en su lugar» y conserva la idea de reemplazo.
- source_word: אֲחֵרִים
  english_pob_choice: others
  chosen_spanish: a otros
  alternatives_spanish:
  - otros
  - otros hombres
  - otras personas
  lexicon: HALOT
  rationale: El plural indefinido apunta a personas sustitutas. «A otros» mantiene la indefinición y fluye con el verbo español.
- source_word: תַּחְתָּם
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en vez de ellos
  - en su lugar
  lexicon: HALOT
  rationale: Aunque literalmente significa «debajo de ellos», en contexto de reemplazo el modismo es «en su lugar». Esta opción conserva el sentido idiomático y la referencia de sustitución.
theological_decisions:
- issue: Sujeto implícito de los verbos
  english_pob_reading: 'God is the implied subject: ''He shatters... and sets...'''
  chosen_spanish_reading: Se mantiene el sujeto implícito en la línea por medio de «Él», entendido como Dios en el contexto.
  alternative_spanish_readings:
  - Dios despedaza...
  - Él, Dios, despedaza...
  rationale: En el contexto de la argumentación de Elihú, el referente divino es claro. «Él» conserva la concisión poética de la línea hebrea y refleja la lectura auditada de la POB inglesa sin sobreexplicar.
  doctrine_reference: Job 34:23-25; contexto discursivo de Elihú sobre el juicio divino
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «beyond investigation» a «without investigation» para hacer más directa la lectura de לֹא חֵקֶר. La versión española sigue esa revisión con «sin investigación», evitando una paráfrasis más interpretativa y manteniendo la economía del original.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo verbal: destrucción de los poderosos / reemplazo por אחרים.'
  - Se usa «poderosos» para mantener la fuerza social de כַּבִּירִים sin convertirlo en un término eclesiástico.
  - «En su lugar» refleja el modismo de sustitución y evita la literalidad de «debajo de ellos», que sería poco natural en español.
  - «Él» funciona como sujeto implícito coherente con el contexto inmediato, sin añadir un nombre divino que no aparece en el verso.
