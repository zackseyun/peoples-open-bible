revisions:
- from: 'Y ellos dijeron[a]: “Por favor, mi señor[b], hemos bajado la primera vez para comprar alimento.”'
  to: 'Y dijeron[a]: «Por favor, mi señor[b], bajamos por primera vez para comprar alimento».'
  rationale: Se ajustó el tiempo verbal a un pasado narrativo más natural en español, se mejoró la expresión temporal con 'por primera vez', se eliminó el sujeto explícito innecesario y se corrigió la nota [a] para que refleje de verdad la alternativa enfática documentada en el hebreo.
