translation:
  language: es
  text: 'Entonces Isaías dijo a Ezequías[a]: «Oye la palabra de Yahvé.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Entonces» conserva con naturalidad la secuencia y el valor discursivo sin sonar forzado.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaias
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española estándar del nombre profético, plenamente reconocible en español bíblico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición introduce dirección del habla; «a» es la equivalencia natural en español.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequias
  lexicon: Nombre propio bíblico
  rationale: Se adopta la forma española estándar del nombre del rey, usual en contexto bíblico y clara para el lector.
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Oye
  alternatives_spanish:
  - Escucha
  - Oíd
  lexicon: HALOT
  rationale: El imperativo singular preserva el tono profético directo. «Oye» refleja con precisión la forma breve y solemne del mandato; «Escucha» sería una alternativa posible pero algo más expansiva.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la voz
  lexicon: HALOT
  rationale: En la fórmula profética, דבר remite a la comunicación revelada de Dios. «La palabra» conserva el idiomatismo bíblico y la fuerza de revelación; «mensaje» es más explicativo, pero menos tradicional y menos preciso para la fórmula.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, siguiendo la práctica POB de no sustituirlo por un título. «Yahvé» es la forma española elegida para preservar el nombre propio de Dios en español.
theological_decisions:
- issue: Renderizado del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El hebreo usa explícitamente el nombre divino. La lectura española debe preservar ese nombre en vez de enmascararlo con un título litúrgico. «Yahvé» comunica el nombre propio de Dios de manera transparente y coherente con la línea editorial de la POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado solo en puntuación final de la cita (de dos puntos a punto), sin cambios léxicos. La versión española mantiene una puntuación de cita completa y natural, sin alterar el sentido ni introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé», coherente con la política POB para יְהוָה.
  - Los nombres propios se presentan en sus formas españolas estándar («Isaías», «Ezequías»).
  - «Oye la palabra» conserva el registro profético directo y la fórmula bíblica establecida.
  - La cita usa comillas angulares y puntuación final dentro del cierre, conforme al uso editorial español.
