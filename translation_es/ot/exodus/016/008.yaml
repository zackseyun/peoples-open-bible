translation:
  language: es
  text: 'Y dijo Moisés: «Cuando Yahvé les dé carne para comer en la tarde y pan por la mañana hasta saciarse, porque Yahvé oye sus murmuraciones[a], que ustedes murmuran contra él, ¿qué somos nosotros? Sus murmuraciones no son contra nosotros, sino contra Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite el sustantivo y el verbo cognado: «sus murmuraciones ... ustedes murmuran». La repetición intensifica la acusación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר מֹשֶׁה
  english_pob_choice: And Moses said
  chosen_spanish: Y dijo Moisés
  alternatives_spanish:
  - Entonces dijo Moisés
  - Y Moisés dijo
  lexicon: HALOT
  rationale: El hebreo introduce la respuesta con un verbo narrativo simple; en español, «Y dijo Moisés» conserva la progresión narrativa sin añadir énfasis no requerido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md / término base POB
  rationale: Se sigue el término base español del proyecto para el Tetragrámaton, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: בָּשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne para comer
  - carne
  lexicon: HALOT
  rationale: En este contexto alimentario, «carne» comunica naturalmente el alimento provisto; «flesh» o un calco sería ajeno al español. Se explicita «para comer» para reflejar el infinitivo לֶאֱכֹל.
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - a comer
  - para que coman
  lexicon: HALOT
  rationale: El infinitivo de finalidad se vierte de forma natural con «para comer», manteniendo la relación con «carne» sin sobrecargar la frase.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - pan
  lexicon: HALOT
  rationale: «Pan» conserva la imagen concreta del texto y del contexto del maná, mejor que un término genérico como «alimento».
- source_word: לִשְׂבֹּעַ
  english_pob_choice: to the full
  chosen_spanish: hasta saciarse
  alternatives_spanish:
  - hasta quedar satisfechos
  - en abundancia
  lexicon: HALOT
  rationale: El hebreo expresa saciedad; «hasta saciarse» es una equivalencia natural en español que conserva la idea de plenitud sin sonar arcaica.
- source_word: בִּשְׁמֹעַ יְהוָה
  english_pob_choice: because Yahweh hears
  chosen_spanish: porque Yahvé oye
  alternatives_spanish:
  - cuando Yahvé oye
  - al oír Yahvé
  lexicon: HALOT
  rationale: El infinitivo con ב aquí tiene fuerza causal en el contexto; «porque Yahvé oye» reproduce esa relación de manera clara y directa.
- source_word: תְּלֻנֹּתֵיכֶם / מַלִּינִם
  english_pob_choice: your grumblings ... you are grumbling
  chosen_spanish: murmuraciones ... murmuran
  alternatives_spanish:
  - quejas ... se quejan
  - murmullos ... murmuran
  lexicon: HALOT
  rationale: Se conserva la repetición nominal-verbal del hebreo con una familia léxica equivalente en español. «Murmuraciones/murmuran» es más cercano al tono bíblico que «quejas» y mantiene la acusación reiterativa.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - acerca de él
  lexicon: HALOT
  rationale: El contexto exige dirección hostil, no simple referencia temática; «contra él» preserva el valor polémico de על.
- source_word: וְנַחְנוּ מָה
  english_pob_choice: what are we?
  chosen_spanish: ¿qué somos nosotros?
  alternatives_spanish:
  - ¿quiénes somos nosotros?
  - ¿qué somos?
  lexicon: HALOT
  rationale: «Qué» reproduce mejor el matiz del hebreo, que subraya la insignificancia de Moisés y Aarón frente a la queja del pueblo.
- source_word: לֹא עָלֵינוּ תְלֻנֹּתֵיכֶם כִּי עַל יְהוָה
  english_pob_choice: Your grumblings are not against us, but against Yahweh
  chosen_spanish: Sus murmuraciones no son contra nosotros, sino contra Yahvé
  alternatives_spanish:
  - Sus quejas no son contra nosotros, sino contra Yahvé
  - No murmuran contra nosotros, sino contra Yahvé
  lexicon: HALOT
  rationale: Se conserva la estructura de contraste del hebreo. «Sino» expresa mejor la oposición implícita por כִּי en este contexto que un simple enlace causal.
theological_decisions:
- issue: Render of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el nombre propio divino. La traducción española del proyecto lo mantiene como «Yahvé», evitando la sustitución por un título y preservando la referencia pactual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Intensification through noun-verb repetition in complaints
  english_pob_reading: your grumblings ... you are grumbling
  chosen_spanish_reading: murmuraciones ... murmuran
  alternative_spanish_readings:
  - quejas ... se quejan
  - murmuraciones ... se quejan
  rationale: El hebreo repite la raíz para intensificar la censura. En español se conserva esa relación con «murmuraciones/murmuran», evitando suavizarla a una sola palabra neutral.
  doctrine_reference: POB audit trail; lexical repetition preserved from Hebrew noun + cognate verb
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y el rastro auditado en inglés sin depender mecánicamente de la versión inglesa. Se conserva la repetición nominal-verbal de תְּלֻנֹּתֵיכֶם / מַלִּינִם y la causalidad de בִּשְׁמֹעַ, con el nombre divino traducido consistentemente como Yahvé.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se usa una familia léxica única («murmuraciones/murmuran») para reflejar la repetición hebrea.
  - «Contra él» y «contra Yahvé» conservan el valor polémico de עַל en este contexto.
  - La puntuación española se ajusta a comillas angulares y raya de diálogo implicada por el discurso directo.
