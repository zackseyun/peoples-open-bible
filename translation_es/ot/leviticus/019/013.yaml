revisions:
- from: No oprimirás a tu prójimo[a] ni lo robarás. El salario del jornalero que esté contigo no quedará contigo hasta la mañana.
  to: No oprimirás a tu prójimo[a] ni lo robarás. El salario del jornalero no se quedará en tu poder hasta la mañana.
  rationale: Se corrige la segunda oración para que אִתְּךָ se entienda como posesión/retención del salario por parte del empleador, no como descripción del jornalero. «No se quedará en tu poder» preserva el sentido legal de retener el pago y suena más natural en español que la repetición «contigo ... contigo».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:25Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: prohíbe oprimir y robar al prójimo, y prohíbe retener el pago del trabajador hasta la mañana. Sin embargo, la cláusula final introduce una formulación menos fiel al sujeto gramatical hebreo y añade una idea innecesaria con «que esté contigo». El hebreo dice literalmente que «la paga/salario de un jornalero no pasará la noche contigo hasta la mañana», donde el sujeto es la paga, no el jornalero.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la repetición «contigo ... contigo» suena torpe y poco natural. Además, «el jornalero que esté contigo» puede sugerir presencia física del trabajador, cuando אִתְּךָ modifica la retención del salario en posesión del empleador. Conviene simplificar y hacer más idiomática la cláusula final.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Prójimo», «oprimir», «robar», «salario» y «jornalero» son opciones defendibles. La nota alternativa sobre רֵעֲךָ también es adecuada. El ajuste necesario es sintáctico/semántico en la frase sobre el salario retenido.
  issues:
  - severity: medium
    issue: «que esté contigo» modifica al jornalero en lugar de reflejar que el salario queda retenido por el empleador.
    rationale: אִתְּךָ corresponde a «with you» respecto del salario/paga retenido, no a la ubicación del trabajador contratado.
  - severity: medium
    issue: «no quedará contigo hasta la mañana» es comprensible, pero la repetición con el segmento anterior produce torpeza y debilita la naturalidad.
    rationale: El hebreo tiene como sujeto «la paga/salario»; en español puede expresarse con más claridad como «no se quedará en tu poder hasta la mañana» o equivalente.
  revised_spanish_text: No oprimirás a tu prójimo[a] ni lo robarás. El salario del jornalero no se quedará en tu poder hasta la mañana.
  revised_footnotes:
  - marker: a
    text: 'O: «tu semejante».'
    reason: lexical_alternative
  revision_rationale: Se corrige la segunda oración para que אִתְּךָ se entienda como posesión/retención del salario por parte del empleador, no como descripción del jornalero. «No se quedará en tu poder» preserva el sentido legal de retener el pago y suena más natural en español que la repetición «contigo ... contigo».
