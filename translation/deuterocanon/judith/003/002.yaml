translation:
  text: Look[a], we, the servants of Nebuchodonosor the great king, lie before you[b]; deal with us as is pleasing in your sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'as pleases you.' The Greek literally says 'as is pleasing before your face.'
    reason: lexical_alternative
  - marker: b
    text: '''Nebuchodonosor'' follows the Greek form of the name in the source text; many English Bibles use ''Nebuchadnezzar.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Introduces the speakers' appeal with an attention-getting particle. 'Look' preserves the deictic force in readable modern English better than the more archaic 'Behold'.
- source_word: παῖδες
  chosen: servants
  alternatives:
  - slaves
  - boys
  - subjects
  lexicon: LSJ
  rationale: In this courtly self-description, the term functions as a deferential designation of subordinates to a king. 'Servants' best fits the political and rhetorical context without implying literal youth ('boys'). 'Slaves' is possible but the bonded status is not the main emphasis here; the emphasis is submission and service.
- source_word: Ναβουχοδονοσὸρ
  chosen: Nebuchodonosor
  alternatives:
  - Nebuchadnezzar
  rationale: Personal names are transliterated from the Greek source witness. 'Nebuchodonosor' reflects the form present in Swete's Greek text rather than harmonizing to the more familiar biblical English form 'Nebuchadnezzar'.
- source_word: μεγάλου
  chosen: the great
  alternatives:
  - great
  lexicon: LSJ
  rationale: Used attributively with 'king' as part of royal titulature. Rendering it explicitly as 'the great' preserves the honorific force of the Greek phrase βασιλέως μεγάλου.
- source_word: παρακείμεθα
  chosen: are laid before you
  alternatives:
  - lie before you
  - are at your disposal before you
  - are present before you
  lexicon: LSJ
  rationale: The perfect/middle-passive form literally suggests being placed or lying near/before someone. 'Are laid before you' preserves the vivid posture of submission better than the flatter 'are present before you,' while still making sense idiomatically in context.
- source_word: χρῆσαι
  chosen: use us
  alternatives:
  - deal with us
  - make use of us
  - treat us
  lexicon: BDAG
  rationale: The aorist middle imperative/injunctive sense here asks the addressee to do with them as he wishes. 'Use us' is concise and reflects the broad semantic range of χράομαι in this context of surrender and disposal.
- source_word: καθὼς ἀρεστόν ἐστιν τῷ προσώπῳ σου
  chosen: as is pleasing before you
  alternatives:
  - as is pleasing in your sight
  - as pleases you
  - as is acceptable to you
  lexicon: LSJ
  rationale: The idiom literally refers to what is pleasing to the addressee's face/presence. 'As is pleasing before you' stays close to the Greek while remaining intelligible. A smoother English alternative would be 'as pleases you,' but the chosen wording preserves more of the source idiom.
