    issue: «Junto al límite de Judá» no expresa del todo bien עַל גְּבוּל en contexto de deslinde
    rationale: En un pasaje de reparto territorial, la frase describe una franja que corre a lo largo del borde de Judá, no meramente algo situado cerca de él. «A lo largo del límite de Judá» preserva mejor la relación espacial.
