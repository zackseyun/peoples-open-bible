    reason: cultural_note
  - marker: d
    text: También puede entenderse "de su fruto" o "con su fruto". El sufijo en "su fruto" puede referirse a la viña o, distributivamente, al fruto de cada guardián.
    reason: lexical_alternative
  revision_rationale: 'La traducción base es sustancialmente fiel, pero requiere una reparación menor para seguir el expediente auditado del POB: reubicar y corregir las notas, especialmente la ambigüedad de בְּפִרְיוֹ, y añadir la nota cultural sobre ''mil plata''. El texto principal puede mantenerse sin cambios léxicos mayores.'
