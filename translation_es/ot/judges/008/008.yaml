translation:
  language: es
  text: Desde allí subió a Penuel y les habló de la misma manera[a][b], y los hombres de Penuel le respondieron tal como habían respondido los hombres de Sucot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De la misma manera» refleja el sentido anafórico de כָּזֹאת; literalmente, «así» o «de este modo», con referencia al pedido o discurso del versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: Penuel también aparece escrito «Peniel» en otros pasajes.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: he went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue subiendo
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. En español, «subió» conserva la dirección y resulta natural en una narración histórica.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - desde ese lugar
  - de allí
  lexicon: HALOT
  rationale: Es un deíctico sencillo; «desde allí» mantiene la referencia espacial inmediata sin recargar el estilo.
- source_word: פְּנוּאֵל
  english_pob_choice: Penuel
  chosen_spanish: Penuel
  alternatives_spanish:
  - Peniel
  lexicon: transliteration
  rationale: Se translitera el nombre propio. Se mantiene «Penuel» siguiendo la forma consonántica de este versículo, como en el audit trail inglés.
- source_word: וַיְדַבֵּר אֲלֵיהֶם כָּזֹאת
  english_pob_choice: and spoke to them in the same way
  chosen_spanish: les habló de la misma manera
  alternatives_spanish:
  - les habló así
  - les dijo lo mismo
  lexicon: HALOT
  rationale: כָּזֹאת remite anafóricamente al tipo de petición o discurso del versículo anterior. «De la misma manera» conserva esa referencia sin obligar a repetir el contenido implícito.
- source_word: וַיַּעֲנוּ אוֹתוֹ
  english_pob_choice: answered him
  chosen_spanish: le respondieron
  alternatives_spanish:
  - le contestaron
  - le respondieron a él
  lexicon: HALOT
  rationale: ענה con objeto directo indica responder. «Le respondieron» es idiomático y fiel al valor verbal.
- source_word: אַנְשֵׁי פְנוּאֵל
  english_pob_choice: the men of Penuel
  chosen_spanish: los hombres de Penuel
  alternatives_spanish:
  - la gente de Penuel
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». Se conserva la designación masculina, como en el hebreo, sin neutralizarla.
- source_word: כַּאֲשֶׁר עָנוּ אַנְשֵׁי סֻכּוֹת
  english_pob_choice: just as the men of Succoth had answered
  chosen_spanish: tal como habían respondido los hombres de Sucot
  alternatives_spanish:
  - como habían respondido los hombres de Sucot
  - igual que los hombres de Sucot respondieron
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduce comparación; «tal como» expresa bien la correspondencia. El pluscuamperfecto «habían respondido» aclara la relación temporal en la narración.
- source_word: סֻכּוֹת
  english_pob_choice: Succoth
  chosen_spanish: Sucot
  alternatives_spanish:
  - Sucot
  lexicon: transliteration
  rationale: Se usa la transliteración habitual en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'El texto coincide con el pasaje hebreo y con el audit trail inglés: se preserva el movimiento ascendente, la referencia anafórica de כָּזֹאת y la comparación con la respuesta de Sucot, sin añadir contenido no explicitado por el מקור.'
  spanish_consistency_notes:
  - Se mantiene «Penuel» como forma principal y se registra «Peniel» como variante onomástica.
  - Se conserva la distinción narrativa entre «les habló» y «le respondieron» para reflejar los dos verbos hebreos distintos.
  - «Sucot» sigue la transliteración española usual y evita una castellanización innecesaria.
