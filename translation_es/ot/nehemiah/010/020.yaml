lexical_decisions:
- source_word: חָרִיף
  english_pob_choice: Hariph
  chosen_spanish: Harif
  alternatives_spanish:
  - Hariph
  lexicon: HNp
  rationale: Es un nombre propio en una lista de firmantes del pacto; por eso se translitera en vez de traducirse. En español, «Harif» conserva mejor la forma consonántica breve del hebreo que una adaptación con -ph, y evita una ortografía híbrida innecesaria.
- source_word: עֲנָת֖וֹת
  english_pob_choice: Anathoth
  chosen_spanish: Anatot
  alternatives_spanish:
  - Anathot
  - Anatot
  lexicon: HNp
  rationale: Aunque la forma es conocida en otros contextos como topónimo, aquí funciona como designación propia en la lista. Se conserva el nombre por transliteración; «Anatot» es una adaptación española directa y más natural que mantener la grafía inglesa con -th.
- source_word: נובי
  english_pob_choice: Nobai
  chosen_spanish: Nobai
  alternatives_spanish:
  - Nobi
  lexicon: HNp
  rationale: Es un nombre propio de la lista; se translitera. Se mantiene «Nobai» porque refleja la tradición inglesa del nombre con la vocal final indicada por el yod, y es comprensible en español bíblico.
translation_notes:
  revision_awareness: El texto hebreo y el auditable inglés POB coinciden en tratar los tres elementos como nombres propios no traducidos; no se documentan revisiones textuales ni variantes que obliguen a alterar la lista.
  spanish_consistency_notes:
  - Se mantiene el orden de la lista tal como aparece en el texto fuente.
  - Se usa puntuación breve y uniforme para una enumeración de nombres propios.
  - Se evita la forma inglesa «Anathoth» en favor de una transliteración española coherente.
