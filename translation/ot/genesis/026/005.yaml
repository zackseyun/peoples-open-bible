id: GEN.26.5
reference: Genesis 26:5
source:
  edition: WLC
  text: עֵ֕קֶב אֲשֶׁר שָׁמַ֥ע אַבְרָהָ֖ם בְּ/קֹלִ֑/י וַ/יִּשְׁמֹר֙ מִשְׁמַרְתִּ֔/י מִצְוֺתַ֖/י חֻקּוֹתַ֥/י וְ/תוֹרֹתָֽ/י־׃
translation:
  text: because Abraham obeyed my voice and kept my charge[a], my commandments, my statutes[b], and my laws.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obeyed my voice.' The Hebrew idiom 'listened to my voice' often carries the sense of obedient hearing.
    reason: lexical_alternative
  - marker: b
    text: Or 'and my instructions' for 'and my laws.' Hebrew torah can mean 'law,' 'instruction,' or 'teaching' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵקֶב
  chosen: because
  alternatives:
  - because of
  - as a consequence of
  - on account of
  lexicon: HALOT
  rationale: In this context עֵקֶב introduces the reason for the blessing stated in the surrounding sentence. 'Because' is natural modern English and captures the causal force better than a more wooden 'because that' or 'in consequence of the fact that.'
- source_word: שָׁמַע ... בְּקֹלִי
  chosen: listened to my voice
  alternatives:
  - obeyed my voice
  - heard my voice
  lexicon: HALOT
  rationale: The idiom שׁמע בקול often carries the sense of obedient listening. Here 'listened to my voice' preserves the auditory metaphor of the Hebrew while still implying responsiveness. 'Obeyed my voice' is possible, but the following וַיִּשְׁמֹר already explicitly states Abraham's keeping/guarding, so varying the English avoids redundancy while retaining the Hebrew imagery.
- source_word: וַיִּשְׁמֹר
  chosen: kept
  alternatives:
  - observed
  - guarded
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, guard, observe.' With the following legal/covenantal objects, 'kept' is the most idiomatic and sufficiently broad English rendering.
- source_word: מִשְׁמַרְתִּי
  chosen: my charge
  alternatives:
  - my requirement
  - my commission
  - my observance
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת denotes something entrusted to be kept, often a charge, duty, or obligation. 'My charge' preserves the distinctiveness of the term from the more standard legal terms that follow, rather than collapsing it into 'commandments.'
- source_word: מִצְוֺתַי
  chosen: my commandments
  alternatives:
  - my commands
  lexicon: HALOT
  rationale: This is the standard and transparent rendering for מִצְוָה in covenantal/legal contexts.
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a conventional but still understandable rendering for חֻקִּים and helps preserve distinction from commandments and laws. ''Decrees'' is possible but can sound more unilateral than the covenantal-legal nuance here.'
- source_word: וְתוֹרֹתַי
  chosen: and my laws
  alternatives:
  - and my instructions
  - and my teachings
  lexicon: HALOT
  rationale: תוֹרָה fundamentally means instruction, but in a list with commandments and statutes, 'laws' best communicates the legal-covenantal sense in idiomatic English. 'Instructions' is lexically possible and worth preserving as an alternative because it highlights the broader semantic range of torah.
