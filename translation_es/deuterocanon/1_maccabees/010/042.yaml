translation:
  language: es
  text: Y además de estas cosas, los cinco mil siclos de plata que solían tomar de las rentas, como en los años anteriores, de la cuenta[a] del santuario cada año, estos también son remitidos, porque pertenecen a los sacerdotes que ministran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de la cuenta anual del santuario' o 'del cómputo anual del santuario'. La frase griega con λόγος es administrativa y está comprimida.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεντακισχιλίους σίκλους ἀργυρίου
  english_pob_choice: the five thousand shekels of silver
  chosen_spanish: los cinco mil siclos de plata
  alternatives_spanish:
  - cinco mil siclos de plata
  - los cinco mil siclos de plata de plata
  lexicon: LSJ
  rationale: Conservo la unidad monetaria antigua sin convertirla. En español, 'siclos de plata' es natural y fiel; 'plata' reproduce el material monetario del griego.
- source_word: ἐλάμβανον
  english_pob_choice: they used to take
  chosen_spanish: solían tomar
  alternatives_spanish:
  - tomaban
  - estaban tomando
  lexicon: LSJ
  rationale: El imperfecto expresa acción habitual en el pasado. 'Solían tomar' comunica mejor la costumbre administrativa que un pretérito simple.
- source_word: ἀπὸ τῶν χρειῶν
  english_pob_choice: from the revenues
  chosen_spanish: de las rentas
  alternatives_spanish:
  - de los ingresos
  - de las recaudaciones
  - de las necesidades
  lexicon: LSJ
  rationale: En este contexto fiscal, χρεῖαι se refiere a recursos o ingresos administrativos, no a 'necesidades'. 'Rentas' conserva el sentido financiero y el tono formal.
- source_word: ὡς ἐν τοῖς πρώτοις ἔτεσιν
  english_pob_choice: as in former years
  chosen_spanish: como en los años anteriores
  alternatives_spanish:
  - como en los primeros años
  - como en los años pasados
  lexicon: LSJ
  rationale: La comparación es con una práctica previa y establecida. 'Años anteriores' suena natural en español y mantiene la referencia retrospectiva.
- source_word: τοῦ ἁγίου
  english_pob_choice: from the sanctuary
  chosen_spanish: del fondo del santuario
  alternatives_spanish:
  - del santuario
  - del recinto santo
  - del templo
  lexicon: LSJ
  rationale: El griego alude a una partida vinculada al santuario en un contexto contable. 'Fondo del santuario' expresa con claridad la función fiscal sin perder el matiz cultual; además, evita especificar indebidamente una parte arquitectónica.
- source_word: ἀπὸ τοῦ λόγου
  english_pob_choice: from the sanctuary account
  chosen_spanish: del fondo del santuario
  alternatives_spanish:
  - de la cuenta del santuario
  - del cómputo del santuario
  - del registro del santuario
  lexicon: LSJ
  rationale: λόγος aquí es administrativo y comprimido. En español, la expresión más clara es integrarlo en una formulación contable ('fondo del santuario') para no sonar enrevesado. El sentido de cuenta/reckoning queda indicado en la nota.
- source_word: κατʼ ἐνιαυτόν
  english_pob_choice: each year
  chosen_spanish: cada año
  alternatives_spanish:
  - anualmente
  - año tras año
  lexicon: LSJ
  rationale: Es una expresión distributiva temporal simple. 'Cada año' es directo y plenamente idiomático.
- source_word: ἀφίεται
  english_pob_choice: are remitted
  chosen_spanish: quedan condonados
  alternatives_spanish:
  - quedan remitidos
  - se cancelan
  - se perdonan
  lexicon: LSJ
  rationale: En un contexto de obligación fiscal, el verbo indica cancelación/remisión de la deuda o carga. 'Quedan condonados' conserva el tono administrativo y la idea de absolución de la obligación.
- source_word: διὰ τὸ ἀνήκειν αὐτὰ
  english_pob_choice: because they belong
  chosen_spanish: porque pertenecen
  alternatives_spanish:
  - porque corresponden
  - porque son debidos
  lexicon: LSJ
  rationale: ἀνήκειν expresa pertenencia o derecho legítimo. 'Pertenecen' transmite la idea de que esos fondos corresponden justamente a los sacerdotes.
- source_word: τοῖς ἱερεῦσιν τοῖς λειτουργοῦσιν
  english_pob_choice: to the priests who minister
  chosen_spanish: a los sacerdotes que ministran
  alternatives_spanish:
  - a los sacerdotes que sirven
  - a los sacerdotes oficiantes
  lexicon: LSJ
  rationale: λειτουργέω en contexto cultual apunta al servicio sacerdotal litúrgico. 'Ministran' preserva ese matiz formal mejor que 'sirven'.
translation_notes:
  revision_awareness: 'He seguido el acuerdo alto entre el texto griego y el audit trail inglés, manteniendo la estructura fiscal y el valor imperfectivo de ἐλάμβανον. La principal decisión interpretativa es cómo verter ἀπὸ τοῦ λόγου: en vez de forzar una calca, el español integra la idea en una formulación contable natural y la nota conserva las alternativas explícitas.'
  spanish_consistency_notes:
  - Uso 'siclos' para la unidad monetaria, en continuidad con la terminología patrimonial del texto.
  - Mantengo un registro administrativo-formal ('rentas', 'condonados') porque el verso trata de ingresos del santuario, no de una acción narrativa común.
  - Evito 'SEÑOR' u այլ masking conventions porque no aparece el Tetragrámaton en este versículo.
