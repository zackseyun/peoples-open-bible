base_translation:
  language: en
  yaml_path: translation/ot/numbers/008/021.yaml
  text: And the Levites purified themselves and washed their garments[a], and Aaron presented them as a wave offering before Yahweh, and Aaron made atonement for them to cleanse them.
  footnotes:
