  glossary_alignment: No hay términos de glosario mayor en conflicto. 'Impuro' para טָמֵא es adecuado en este contexto de pureza ritual. 'Objeto' para כְּלִי es aceptable y coincide con la amplitud semántica documentada, con nota que preserva alternativas.
  issues:
