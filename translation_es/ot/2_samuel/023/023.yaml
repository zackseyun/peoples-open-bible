    text: Or 'but he did not come up to the three,' that is, he did not attain the rank of the elite three warriors.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to his mishmaath'; this may mean 'to his command' or 'over his guard.' 'Bodyguard' reflects the likely military sense in context.
    reason: lexical_alternative
