translation:
  language: es
  text: Pero en aquel día apartaré la tierra[a] de Gosén, donde habita mi pueblo, para que no haya allí ningún enjambre[b], a fin de que sepas que yo soy Yahvé en medio de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «región de Gosén». El hebreo אֶרֶץ puede significar tierra, territorio o región.
    reason: lexical_alternative
  - marker: b
    text: O «un enjambre de insectos». El hebreo עָרֹב puede referirse de manera más amplia a una masa de insectos, no solo a moscas.
    reason: lexical_alternative
  - marker: c
    text: O «en medio de la tierra». El hebreo puede entenderse de manera más amplia, aunque en este contexto probablemente se refiere a la tierra de Egipto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִפְלֵיתִי
  english_pob_choice: I will set apart
  chosen_spanish: apartaré
  alternatives_spanish:
  - separaré
  - haré distinción de
  lexicon: HALOT
  rationale: El hiphil de פלא expresa hacer una distinción o tratar separadamente. «Apartaré» comunica la diferenciación protectora de Gosén frente a la plaga con un español natural y fiel.
- source_word: אֶרֶץ גֹּשֶׁן
  english_pob_choice: the land of Goshen
  chosen_spanish: la tierra de Gosén
  alternatives_spanish:
  - la región de Gosén
  - el territorio de Gosén
  lexicon: HALOT
  rationale: אֶרֶץ puede ser tierra, territorio o región. «La tierra de Gosén» conserva el giro geográfico habitual y respeta la amplitud del sustantivo hebreo.
- source_word: עַמִּי עֹמֵד עָלֶיהָ
  english_pob_choice: where my people dwell
  chosen_spanish: donde está mi pueblo
  alternatives_spanish:
  - donde habita mi pueblo
  - donde mi pueblo mora
  lexicon: HALOT
  rationale: El participio con עַל sobre una tierra puede expresar residencia o permanencia. «Donde está mi pueblo» mantiene la idea de presencia estable sin forzar un verbo más interpretativo.
- source_word: לְבִלְתִּי הֱיוֹת שָׁם
  english_pob_choice: so that no ... will be there
  chosen_spanish: para que no haya allí
  alternatives_spanish:
  - a fin de que no haya allí
  - para impedir que haya allí
  lexicon: HALOT
  rationale: La construcción infinitiva expresa propósito/resultado. «Para que no haya allí» suena natural en español y conserva la finalidad preventiva del texto.
- source_word: עָרֹב
  english_pob_choice: swarm
  chosen_spanish: ningún enjambre
  alternatives_spanish:
  - ningún swarm
  - ningún conjunto de insectos
  - ninguna plaga de insectos
  lexicon: HALOT
  rationale: El hebreo es deliberadamente amplio y no nombra una especie concreta en este versículo. «Enjambre» preserva la imagen de masa o reunión de insectos sin añadir «moscas», que el pasaje hebreo no especifica aquí.
- source_word: לְמַעַן תֵּדַע
  english_pob_choice: in order that you may know
  chosen_spanish: a fin de que sepas
  alternatives_spanish:
  - para que sepas
  - con el fin de que sepas
  lexicon: HALOT
  rationale: La cláusula expresa propósito dirigido a Faraón en segunda persona. «A fin de que sepas» mantiene el valor final con un registro digno y claro.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política del proyecto para יְהוָה es usar «Yahvé» en el texto principal. Es la forma española establecida para preservar el nombre divino sin sustituirlo por un título.
- source_word: בְּקֶרֶב הָאָרֶץ
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio del país
  - en medio de la tierra/país
  lexicon: HALOT
  rationale: «בקרב» indica estar en medio de algo. «En medio de la tierra» conserva la ambigüedad del hebreo entre tierra, país o ámbito territorial, sin resolverla de manera excesiva.
theological_decisions:
- issue: Alcance de בְּקֶרֶב הָאָרֶץ
  english_pob_reading: in the midst of the land
  chosen_spanish_reading: en medio de la tierra
  alternative_spanish_readings:
  - en medio del país
  - en medio de la tierra/país
  rationale: El contexto inmediato apunta a Egipto como escenario, pero el hebreo permite una formulación más amplia. Se preserva la tensión textual sin convertirla en una explicación doctrinal más estrecha de lo que el texto exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene el nombre personal de Dios en lugar de una sustitución titulativa. Esto conserva la transparencia del texto y la continuidad con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé (Spanish)'
translation_notes:
  revision_awareness: La base inglesa revisada eliminó «of flies» porque el hebreo dice simplemente עָרֹב («enjambre»). La redacción española sigue esa revisión y evita especificar «moscas». También conserva la lectura amplia de בְּקֶרֶב הָאָרֶץ sin forzarla a «Egipto» en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la terminología predeterminada del proyecto para יְהוָה.
  - Se evita «Señor» como sustituto del nombre divino.
  - «Enjambre» mantiene la amplitud de עָרֹב y no especifica la especie.
  - «En medio de la tierra» conserva la posible referencia territorial amplia del hebreo.
  - La puntuación y el orden siguen un español bíblico moderno, no una calca inglesa.
