translation:
  language: es
  text: Alcé mis ojos y miré, y he aquí, un hombre vestido de lino, con la cintura ceñida con el oro de Ufaz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con oro fino de Ufaz». La expresión hebrea puede enfatizar tanto la calidad del oro como su procedencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשָּׂא אֶת עֵינַי
  english_pob_choice: I lifted up my eyes
  chosen_spanish: Alcé mis ojos
  alternatives_spanish:
  - Levanté mis ojos
  - Alcé la vista
  lexicon: HALOT
  rationale: La expresión hebrea es un giro idiomático de levantar la mirada. «Alcé mis ojos» conserva la imagen corporal del original y su tono solemne, sin volverlo demasiado literal ni reducirlo a un simple «miré».
- source_word: וָאֵרֶא
  english_pob_choice: and looked
  chosen_spanish: y miré
  alternatives_spanish:
  - y vi
  lexicon: HALOT
  rationale: Después de «alcé mis ojos», «miré» mantiene la secuencia perceptiva sin repetir exactamente la misma idea. En español suena natural y conserva la transición narrativa antes de «he aquí».
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he ahí
  lexicon: HALOT
  rationale: «He aquí» preserva la fuerza deíctica y visionaria de la partícula hebrea, con un registro digno y bíblico que sigue siendo claro en español contemporáneo.
- source_word: אִישׁ אֶחָד
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un solo hombre
  - un cierto hombre
  lexicon: HALOT
  rationale: El hebreo presenta simplemente una figura masculina singular. «Un hombre» es la forma más natural en español y evita añadir identificación interpretativa que el texto no da.
- source_word: לָבוּשׁ בַּדִּים
  english_pob_choice: clothed in linen
  chosen_spanish: vestido de lino
  alternatives_spanish:
  - cubierto de lino
  - ataviado de lino
  - vestido con ropa de lino
  lexicon: HALOT
  rationale: «Vestido de lino» es una equivalencia directa y natural para la vestimenta de lino del original. Mantiene el material sin especificar más de lo que el hebreo dice.
- source_word: מָתְנָיו
  english_pob_choice: his waist
  chosen_spanish: su cintura
  alternatives_spanish:
  - sus lomos
  - su cintura/loins
  lexicon: HALOT
  rationale: El hebreo apunta a la zona de la cintura/lomos. «Su cintura» comunica bien la ubicación del cinturón en español moderno; «lomos» sería más literal pero menos transparente para lectores generales.
- source_word: חֲגֻרִים
  english_pob_choice: girded
  chosen_spanish: ceñida
  alternatives_spanish:
  - ceñido
  - ajustada
  - ajustado con un cinturón
  lexicon: HALOT
  rationale: La raíz expresa estar ceñido o provisto de un cinturón. Como «cintura» en español es femenino, la concordancia natural es «ceñida». Así se conserva la imagen formal del atavío.
- source_word: בְּכֶתֶם אוּפָז
  english_pob_choice: with the gold of Uphaz
  chosen_spanish: con el oro de Ufaz
  alternatives_spanish:
  - con oro fino de Ufaz
  - con el oro fino de Ufaz
  lexicon: HALOT
  rationale: La construcción hebrea permite entender el metal como procedente de Ufaz o caracterizado por su calidad. «Oro de Ufaz» sigue de cerca la lectura principal del POB inglés y deja abierta la posibilidad de una cualidad preciosa sin cerrarla en el texto principal.
theological_decisions:
- issue: Identidad de la figura visionaria
  english_pob_reading: Render neutrally as 'a man' without identifying him as an angel, the Messiah, or a theophany.
  chosen_spanish_reading: Traducir neutralmente como «un hombre», sin identificarlo como ángel, Mesías ni teofanía.
  alternative_spanish_readings:
  - un ángel
  - el Mesías
  - una manifestación divina
  rationale: El versículo describe la apariencia y la vestidura, pero no identifica explícitamente a la figura. Mantener la neutralidad conserva la tensión interpretativa documentada por el POB inglés y evita resolver en la traducción una cuestión que el hebreo no decide aquí.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios respecto del pasaje auditado; por eso la propuesta española sigue de cerca la decisión óptima ya establecida y no introduce reajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se conserva «Ufaz» como nombre propio transliterado, en línea con la práctica del proyecto para topónimos.
  - Se mantiene «lino» y no «lienzo», porque el hebreo se refiere al material/ropa de lino, no a un paño específico.
  - Se evita «SEÑOR» u otras sustituciones porque el pasaje no contiene el nombre divino.
  - 'La sintaxis intenta reflejar la progresión verbal del hebreo: levantar la mirada, mirar, introducir la visión.'
  - La nota al pie se ancla en «oro» porque allí está la alternativa léxica documentada en el audit trail.
