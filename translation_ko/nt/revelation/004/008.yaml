id: REV.4.8
reference: 'Revelation 4:8'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ τὰ τέσσαρα ζῷα, ἓν ⸂καθ’ ἓν⸃ ⸀αὐτῶν ⸀ἔχων ἀνὰ πτέρυγας ἕξ, κυκλόθεν καὶ ἔσωθεν γέμουσιν ὀφθαλμῶν· καὶ ἀνάπαυσιν οὐκ ἔχουσιν ἡμέρας καὶ νυκτὸς λέγοντες· Ἅγιος ἅγιος ἅγιος κύριος, ὁ θεός, ὁ παντοκράτωρ, ὁ ἦν καὶ ὁ ὢν καὶ ὁ ἐρχόμενος.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/004/008.yaml
  text: 'And the four living creatures[a], each one of them having six wings, are full of eyes all around and within; and they have no rest day and night, saying: “Holy, holy, holy is the Lord God, the Almighty, who was and who is and who is coming.”'
  footnotes:
  - marker: a
    text: Or, more traditionally, “who was and who is and who is to come.”
    reason: alternative_reading
translation:
  language: ko
  text: '그 네 생물은 각각 여섯 날개를 가졌으며, 그 둘레와 안쪽까지 눈이 가득하였습니다. 그들은 밤낮 쉬지 아니하고 이렇게 말합니다. 「거룩하다, 거룩하다, 거룩하다, 주 하나님, 전능하신 분, 전에도 계셨고 이제도 계시며 장차 오실 분이여.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἅγιος ἅγιος ἅγιος
  english_pob_choice: Holy, holy, holy
  chosen_korean: 거룩하다, 거룩하다, 거룩하다
  alternatives_korean:
  - 거룩, 거룩, 거룩
  lexicon: BDAG
  rationale: '이사야 6:3의 트리사기온의 반향. 한국어 송영의 운율을 살리기 위해 「거룩하다」를 세 번 반복한다.'
- source_word: ὁ ἦν καὶ ὁ ὢν καὶ ὁ ἐρχόμενος
  english_pob_choice: who was and who is and who is coming
  chosen_korean: 전에도 계셨고 이제도 계시며 장차 오실 분
  alternatives_korean:
  - 계셨고 계시고 오실 자
  lexicon: BDAG
  rationale: '1:4, 1:8과 동일한 신적 칭호의 정형 운율을 유지하되, 본 절은 헬라어 어순(ἦν → ὢν → ἐρχόμενος)을 따라 「전에도/이제도/장차」 순서로 옮긴다.'
theological_decisions:
- issue: '트리사기온(이사야 6:3) 반향과 신적 칭호 정형의 보존'
  chosen_reading: '「거룩하다, 거룩하다, 거룩하다」 + 「전에도/이제도/장차 오실 분」 + 「전능하신 분」'
  alternative_readings:
  - 거룩, 거룩, 거룩
  rationale: '트리사기온은 보좌 앞 도덕적 거룩의 최고 표현이며, 한국어 송영의 운율을 살리기 위해 「거룩하다」를 세 번 반복한다. 신적 칭호의 정형은 1:4·1:8과 동일하게 보존하되 헬라어 어순(ἦν→ὢν)을 따라 「전에도/이제도」로 시작한다.'
  doctrine_reference: 'DOCTRINE.md: divine names/titles 보존'
