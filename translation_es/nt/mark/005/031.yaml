translation:
  language: es
  text: 'Y sus discípulos le decían[a]: «Ves a la multitud apretándote, y dices: “¿Quién me tocó?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presionando contra ti». El participio griego transmite que la multitud se comprimía físicamente alrededor de Jesús y contra él.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - le estaban diciendo
  - le iban diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción discursiva en curso o repetida. En español, el imperfecto narrativo «le decían» conserva esa continuidad sin sonar forzado; «le estaban diciendo» es posible, pero más pesado.
- source_word: μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - sus seguidores
  - sus alumnos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente natural y exacto para μαθηταί en este contexto de relación con Jesús. «Seguidores» debilita el matiz de aprendizaje; «alumnos» no encaja bien en el registro bíblico.
- source_word: Βλέπεις
  english_pob_choice: You see
  chosen_spanish: Ves
  alternatives_spanish:
  - Estás viendo
  - Miras
  lexicon: BDAG
  rationale: El presente indicativo retórico se reproduce mejor con «Ves», que conserva la apelación directa a lo obvio en la escena. «Estás viendo» enfatiza el proceso y resulta más pesado.
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - el gentío
  - la gente
  lexicon: BDAG
  rationale: «Multitud» es una opción natural y bíblica para ὄχλος. Frente a «gentío», mantiene mejor la dignidad del registro y frente a «gente» conserva el carácter colectivo.
- source_word: συνθλίβοντά σε
  english_pob_choice: pressing in on you
  chosen_spanish: apretándote
  alternatives_spanish:
  - presionándote
  - apretando contra ti
  - comprimíendote
  lexicon: BDAG
  rationale: El participio describe una compresión física del entorno sobre Jesús. «Apretándote» comunica esa presión corporal de forma natural en español. La alternativa «apretando contra ti» podría explicitar más la dirección, pero es menos fluida.
- source_word: μου ἥψατο
  english_pob_choice: Who touched me?
  chosen_spanish: ¿Quién me tocó?
  alternatives_spanish:
  - ¿Quién me ha tocado?
  - ¿Quién puso su mano en mí?
  lexicon: BDAG
  rationale: ἅπτομαι aquí significa tocar físicamente; «me tocó» es la traducción más directa y natural. «¿Quién me ha tocado?» es posible, pero el aoristo narrativo no exige perfecto compuesto en español. «Puso su mano en mí» añade especificación no presente en el griego.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas. Se conserva el sentido narrativo-imperfectivo de «decían» y la imagen física de la multitud que rodea y aprieta a Jesús, sin intensificarla indebidamente.
  spanish_consistency_notes:
  - Se usa «discípulos» de manera consistente con la terminología bíblica estándar para μαθηταί.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, y no hay nombres divinos en este versículo.
  - La puntuación y las comillas siguen el uso español, manteniendo el diálogo directo del original.
