revisions:
- from: Y he aquí, he puesto con él a Oholiab, hijo de Ahisamac, de la tribu de Dan; y en el corazón de todo sabio de corazón he puesto sabiduría[a], para que hagan todo lo que te he mandado.
  to: Y he aquí, he puesto con él a Oholiab, hijo de Ahisamach, de la tribu de Dan; y en el corazón de todo sabio de corazón he puesto sabiduría[a], para que hagan todo lo que te he mandado.
  rationale: Se corrige la transliteración del nombre propio para alinearla mejor con אֲחִיסָמָךְ y con el audit trail inglés («Ahisamach»), y se limpia la puntuación de la nota al pie. El resto del texto preserva bien el sentido fuente, la decisión léxica de «sabio de corazón / sabiduría» y la claridad del español.
