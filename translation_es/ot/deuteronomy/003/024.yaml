    text: 'Hebreo: ʾadonay YHWH. El texto principal conserva tanto el título de soberanía como el nombre divino: “Señor Yahvé”.'
    reason: source_note
  revision_rationale: Se revisa la invocación para conservar los dos elementos de אֲדֹנָי יְהוִה conforme a la fuente y a la política del proyecto sobre Yahvé. Se cambia 'tu esclavo' por 'tu siervo' porque este contexto de oración de pacto sigue mejor la decisión contextual documentada en la auditoría inglesa y produce un español más natural y ampliamente legible. El resto del verso puede mantenerse por fidelidad suficiente al hebreo.
