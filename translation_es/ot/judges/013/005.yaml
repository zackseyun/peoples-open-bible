revisions:
- from: Porque he aquí[a], concebirás y darás a luz un hijo. No subirá navaja sobre su cabeza, porque el niño será nazareo de Dios desde el vientre, y él comenzará a salvar a Israel de la mano de los filisteos.
  to: Porque he aquí, estás embarazada y darás a luz un hijo. Ninguna navaja de afeitar pasará sobre su cabeza, porque el niño será nazareo de Dios desde el vientre, y él comenzará a salvar[a] a Israel de la mano de los filisteos.
  rationale: Se corrige הָרָה a un estado presente («estás embarazada») para ajustarse al hebreo, se reemplaza «navaja» por «navaja de afeitar» para precisión semántica en español, se mejora la naturalidad de la prohibición con «pasará sobre su cabeza», y se traslada la única nota necesaria al verbo «salvar», siguiendo la alternativa léxica documentada en la POB inglesa. No se requiere adjudicación adicional porque las correcciones son claras desde el hebreo y el estilo español.
