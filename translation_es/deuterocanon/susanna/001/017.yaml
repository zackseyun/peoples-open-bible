  rationale: 'Se ajusta el texto principal a la mejor comprensión contextual ya documentada en la auditoría inglesa y a un español más natural: «un día» por ποτε y «como en los días anteriores» por el giro temporal idiomático. La literalidad más extraña del griego se conserva de forma auditiva en la nota. No se requieren cambios doctrinales ni adjudicación adicional.'
