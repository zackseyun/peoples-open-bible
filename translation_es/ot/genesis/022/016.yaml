  - marker: a
    text: O “y él dijo”. El hebreo continúa el relato con una forma verbal narrativa; en español puede expresarse con o sin el sujeto explícito.
    reason: lexical_alternative
  - marker: b
    text: O “no has escatimado”. El verbo hebreo puede significar “retener”, “guardar para sí” o, en el contexto, “no escatimar”.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es sustancialmente fiel y natural, y se corrige la nota [a] para eliminar una alternativa incorrecta que alteraba la persona gramatical y añadía un complemento no presente en el hebreo.
