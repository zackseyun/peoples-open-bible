    text: Temán era una región o ciudad de Edom; el nombre se relaciona con 'sur'.
    reason: cultural_note
  - marker: c
    text: O 'todo hombre del monte de Esaú sea eliminado en la matanza'. La frase final puede entenderse con un matiz ligeramente distinto.
    reason: alternative_reading
  revision_rationale: 'Se revisa para acercar dos términos clave al sentido y a la lógica del expediente fuente: וְחַתּוּ se expresa mejor con ''quedarán destrozados'' que con ''serán abatidos'', y יִכָּרֶת no debe sobretraducirse como ''sea exterminado''. También se realinea el aparato de notas con el rastro inglés, eliminando la nota innecesaria sobre ''todo hombre'' y restaurando la nota sobre la lectura alternativa de la frase final.'
