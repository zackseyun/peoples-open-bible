  to: 'Escucha[a], mi pueblo, y hablaré; Israel, y testificaré contra ti: yo soy Dios, tu Dios.'
  rationale: 'Se hace una reparación menor de estilo y legibilidad: se elimina «oh», que en español neutral actual suena más calcado que natural, mientras se conserva el vocativo mediante puntuación. El resto del versículo preserva adecuadamente el sentido fuente, la fuerza forense y la fórmula de pacto.'
