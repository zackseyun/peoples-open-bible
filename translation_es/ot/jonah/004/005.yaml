translation:
  language: es
  text: Entonces Jonás salió de la ciudad y se sentó al oriente de la ciudad[a]. Allí se hizo una enramada y se sentó debajo de ella a la sombra, hasta ver qué sucedería en la ciudad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al este de la ciudad». El hebreo puede expresarse como una ubicación oriental; «oriente» mantiene el matiz direccional y el tono bíblico.
    reason: lexical_alternative
  - marker: b
    text: O «qué llegaría a ser de la ciudad». El hebreo pregunta por el resultado o destino de la ciudad, no solo por un evento puntual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - salió fuera
  lexicon: HALOT
  rationale: יצא expresa salida o partida. «Salió» es natural en español y conserva el movimiento narrativo.
- source_word: מִן הָעִיר
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - fuera de la ciudad
  - de dentro de la ciudad
  lexicon: HALOT
  rationale: מן marca separación. En español, «de la ciudad» transmite esa relación de manera directa y fluida.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - se quedó
  - se estableció
  lexicon: HALOT
  rationale: Aquí el verbo describe la acción física inmediata. «Se sentó» conserva la secuencia narrativa y el valor concreto del hebreo.
- source_word: מִקֶּדֶם לָעִיר
  english_pob_choice: east of the city
  chosen_spanish: al oriente de la ciudad
  alternatives_spanish:
  - al este de la ciudad
  - frente a la ciudad
  lexicon: HALOT
  rationale: קדם con מן en contexto espacial indica la posición oriental. «Oriente» es plenamente entendible y algo más acorde al registro bíblico que «este».
- source_word: וַיַּעַשׂ לוֹ
  english_pob_choice: he made himself
  chosen_spanish: se hizo
  alternatives_spanish:
  - se hizo para sí
  - se preparó
  lexicon: HALOT
  rationale: El dativo לו expresa beneficio o posesión. «Se hizo» mantiene el sentido reflexivo sin sonar forzado en español.
- source_word: סֻכָּה
  english_pob_choice: a shelter
  chosen_spanish: una enramada
  alternatives_spanish:
  - una choza
  - un refugio
  - una cabaña
  lexicon: HALOT
  rationale: סוכה denota una estructura temporal, a menudo hecha de ramas. «Enramada» conserva ese matiz material mejor que un término genérico como «refugio».
- source_word: תַּחְתֶּיהָ
  english_pob_choice: under it
  chosen_spanish: debajo de ella
  alternatives_spanish:
  - bajo ella
  - bajo la enramada
  lexicon: HALOT
  rationale: El sufijo femenino remite a la enramada. «Debajo de ella» es claro y preserva la referencia.
- source_word: בַּצֵּל
  english_pob_choice: in the shade
  chosen_spanish: a la sombra
  alternatives_spanish:
  - en la sombra
  - a la sombra del sol
  lexicon: HALOT
  rationale: צֵל aquí se refiere a protección del sol. «A la sombra» suena natural en español y mantiene la imagen.
- source_word: עַד אֲשֶׁר יִרְאֶה
  english_pob_choice: until he would see
  chosen_spanish: hasta ver
  alternatives_spanish:
  - hasta que viera
  - hasta que pudiera ver
  lexicon: HALOT
  rationale: La construcción expresa expectativa o espera orientada a un resultado. «Hasta ver» condensa bien el valor prospectivo sin perder naturalidad.
- source_word: מַה יִּהְיֶה בָּעִיר
  english_pob_choice: what would happen in the city
  chosen_spanish: qué sucedería en la ciudad
  alternatives_spanish:
  - qué pasaría en la ciudad
  - qué llegaría a ser de la ciudad
  lexicon: HALOT
  rationale: La pregunta apunta al desenlace o resultado de la ciudad. «Qué sucedería» conserva el sentido prospectivo y deja abierta la ambigüedad del hebreo sobre su destino.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo y coincide con la solución general del audito en inglés. Se optó por «enramada» para reflejar mejor la materialidad temporal de סֻכָּה, y por «qué sucedería» para mantener el matiz prospectivo de מַה יִּהְיֶה.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en este texto.
  - «Jonás» se usa como forma castellana estable del nombre propio.
  - Se prefirió un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
