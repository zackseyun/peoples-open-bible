translation:
  language: es
  text: un querubín desde un extremo de este lado, y un querubín desde un extremo de aquel lado; desde el propiciatorio[a] hizo los querubines en sus dos extremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cubierta’, o ‘cubierta de expiación’; hebreo kapporet, la cubierta de oro del arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרוּב
  english_pob_choice: cherub
  chosen_spanish: querubín
  alternatives_spanish:
  - querub
  - ser celestial alado
  lexicon: HALOT
  rationale: En español, 'querubín' es el equivalente establecido para el ser del arca. Conserva el referente técnico sin añadir explicación ajena al texto. 'Querub' sería demasiado poco natural en este contexto litúrgico.
- source_word: מִקָּצָה מִזֶּה ... מִקָּצָה מִזֶּה
  english_pob_choice: from one end on this side ... from one end on that side
  chosen_spanish: desde un extremo de este lado ... desde un extremo de aquel lado
  alternatives_spanish:
  - desde este extremo ... desde aquel extremo
  - en un extremo de este lado ... en un extremo del otro lado
  lexicon: HALOT
  rationale: קָצֶה significa 'extremo, punta'. La serie de demostrativos marca dos lados opuestos; 'de este lado / de aquel lado' reproduce bien la distinción espacial sin endurecer el castellano.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta
  - la cubierta de expiación
  lexicon: HALOT
  rationale: '''Propiciatorio'' es el término tradicional y técnico en español para el כַּפֹּרֶת del arca. Mantiene su función cultual y su densidad teológica; ''cubierta'' sería demasiado plana, y ''cubierta de expiación'' explicita más de lo que el verso requiere.'
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - modeló
  lexicon: HALOT
  rationale: El verbo común עָשָׂה se vierte con naturalidad como 'hizo'. 'Fabricó' o 'modeló' añadirían matiz estilístico no exigido por el hebreo.
- source_word: מִשְּׁנֵי קְצֹוֹתָיו
  english_pob_choice: on its two ends
  chosen_spanish: sobre sus dos extremos
  alternatives_spanish:
  - en sus dos extremos
  - a sus dos extremos
  lexicon: HALOT
  rationale: La frase localiza a los querubines en relación con el propiciatorio. 'Sobre sus dos extremos' conserva el valor espacial y se ajusta bien al español bíblico moderno sin copiar mecánicamente el inglés.
theological_decisions:
- issue: Traducción de הַכַּפֹּרֶת en contexto del tabernáculo
  english_pob_reading: mercy seat
  chosen_spanish_reading: el propiciatorio
  alternative_spanish_readings:
  - la cubierta
  - la cubierta de expiación
  rationale: El término tiene carga cultual y teológica. 'Propiciatorio' preserva la designación tradicional del arca y su conexión con expiación/propiciación sin sobreexplicar en el texto principal. Se evita sustituirlo por una forma demasiado genérica.
  doctrine_reference: Terminología cultual del tabernáculo; función del כַּפֹּרֶת como cubierta sagrada del arca
translation_notes:
  revision_awareness: El audit trail inglés revisó la ubicación final de la frase espacial a 'on its two ends' por naturalidad y cercanía al hebreo; por eso el español usa 'sobre sus dos extremos', que conserva el sentido locativo sin forzar una equivalencia literal rígida.
  spanish_consistency_notes:
  - Se mantiene 'propiciatorio' como término técnico consistente con el uso cultual del כַּפֹּרֶת.
  - '''Querubín'' se usa en singular y plural según el español estándar, respetando el referente técnico hebreo.'
  - La preposición 'sobre' en 'sobre sus dos extremos' busca reflejar la relación espacial final del hebreo sin introducir una nota doctrinal adicional.
