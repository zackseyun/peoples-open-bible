translation:
  language: es
  text: desde Aroer[a], que está a la orilla del valle del Arnón, hasta el monte Sion —es decir, Hermón[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el wadi del Arnón» o «el valle del Arnón». El hebreo נַחַל suele referirse a un cauce o barranco, no necesariamente a un río permanente.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Sion»; compárese Deuteronomio 3:9, donde este monte también se llama Sirión por los sidonios. Aquí el texto identifica explícitamente Sion con Hermón.
    reason: cross_reference
lexical_decisions:
- source_word: מֵ/עֲרֹעֵר
  english_pob_choice: from Aroer
  chosen_spanish: desde Aroer
  alternatives_spanish:
  - de Aroer
  - a partir de Aroer
  lexicon: HALOT
  rationale: El prefijo מִן marca el punto de partida del límite territorial; en español, «desde» expresa con naturalidad ese inicio. Aroer es nombre propio y se translitera.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Introduce una relativa sobre un lugar. «Que» es la opción más natural y neutra en español para este antecedente no personal.
- source_word: עַל שְׂפַת
  english_pob_choice: on the bank of
  chosen_spanish: a la orilla de
  alternatives_spanish:
  - en la orilla de
  - sobre la orilla de
  lexicon: HALOT
  rationale: שְׂפַת literalmente es «orilla/borde/labio»; en contexto geográfico, «a la orilla de» comunica bien la relación con un curso o cauce.
- source_word: נַחַל אַרְנֹן
  english_pob_choice: the Arnon Valley
  chosen_spanish: el valle del Arnón
  alternatives_spanish:
  - el wadi de Arnón
  - el cauce del Arnón
  - la vaguada del Arnón
  lexicon: HALOT
  rationale: נַחַל puede referirse a arroyo estacional, cauce o valle asociado. «Valle» conserva la claridad del POB inglés y resulta idiomático; se mantiene Arnón como transliteración del nombre propio.
- source_word: וְ/עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - y hasta
  - así como hasta
  lexicon: HALOT
  rationale: La fórmula marca el límite final del territorio. «Hasta» reproduce la función fronteriza de modo breve y natural.
- source_word: הַר
  english_pob_choice: Mount
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  - monte de
  lexicon: HALOT
  rationale: En nombres geográficos, «monte» es la forma española normal para el equivalente de Mount.
- source_word: שִׂיאֹן
  english_pob_choice: Sion
  chosen_spanish: Sion
  alternatives_spanish:
  - Sirión
  - Shion
  lexicon: HALOT
  rationale: Se conserva la transliteración de la forma hebrea de este versículo, distinta de Sion/Zión bíblico más conocido; así se respeta la distinción textual del nombre.
- source_word: הוּא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - o sea
  lexicon: HALOT
  rationale: El pronombre funciona explicativamente, identificando Sion con Hermón. «Es decir» transmite de forma natural esa función epexegética.
- source_word: חֶרְמֹן
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Hermón
  lexicon: HALOT
  rationale: Nombre propio del monte; en español se usa la forma con acento gráfico para adecuarla a la pronunciación habitual y a la ortografía española.
theological_decisions:
- issue: Identificación explicativa de Sion con Hermón
  english_pob_reading: Mount Sion (that is, Hermon)
  chosen_spanish_reading: monte Sion —es decir, Hermón—
  alternative_spanish_readings:
  - monte Sion (es decir, Hermón)
  - monte Sion, esto es, Hermón
  rationale: El texto hebreo usa הוּא con valor explicativo, no meramente copulativo. La puntuación con inciso mantiene la aclaración sin ocultar la identificación que el POB ya documenta.
  doctrine_reference: Topografía bíblica / armonización interna del texto
translation_notes:
  revision_awareness: Se revisó el pasaje conforme al último pase, que no introdujo cambios y mantuvo alta concordancia. Se preservó la nota geográfica sobre נַחַל y la aclaración identificativa de Sion/Hermón del audit trail inglés, adaptadas a español natural.
  spanish_consistency_notes:
  - Se mantuvo la terminología geográfica con transliteraciones conservadas para los nombres propios.
  - «Valle» se eligió como equivalente funcional de נַחַל siguiendo el contexto territorial, sin borrar la alternativa semítica «wadi» que queda reflejada en nota.
  - Se usó «Hermón» con acento por norma ortográfica del español, mientras «Sion» se conservó como transliteración específica de שִׂיאֹן en este versículo.
  - La construcción final imita la fórmula de frontera del hebreo sin añadir contenido ajeno al texto.
