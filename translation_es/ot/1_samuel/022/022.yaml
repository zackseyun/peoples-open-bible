translation:
  language: es
  text: 'David dijo a Abiatar: «Yo sabía aquel día[a], cuando Doeg el edomita estaba allí, que sin duda le diría a Saúl. Yo soy responsable[c] de todas las vidas de la casa de tu padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que Doeg el edomita estaba allí». El hebreo permite tomar כִּי como contenido de lo que David sabía, no solo con matiz temporal.'
    reason: alternative_reading
  - marker: c
    text: 'O: «he causado la muerte de» o «soy la causa de» todas las vidas de la casa de tu padre. La redacción principal sigue la lectura de responsabilidad asumida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר דָּוִד לְאֶבְיָתָר
  english_pob_choice: David said to Abiathar
  chosen_spanish: David dijo a Abiatar
  alternatives_spanish:
  - David habló a Abiatar
  - David le dijo a Abiatar
  lexicon: WLC/HALOT
  rationale: 'Se conserva la fórmula narrativa simple del hebreo: verbo de decir + destinatario directo. «Dijo a» es natural y fiel; «le dijo a» es igualmente posible pero menos sobrio para este registro.'
- source_word: יָדַעְתִּי
  english_pob_choice: I knew
  chosen_spanish: Yo sabía
  alternatives_spanish:
  - Yo conocía
  - Yo supe
  lexicon: HALOT
  rationale: El perfecto expresa conocimiento previo ya establecido; en español, el imperfecto «sabía» comunica bien el estado de conciencia continuo en ese momento. Se añade «Yo» para reflejar el énfasis de אָנֹכִי más adelante sin forzar la sintaxis.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: «Aquel día» reproduce la referencia definida a un día pasado específico de manera más idiomática que una frase más pesada con preposición.
- source_word: כִּי שָׁם דויג הָאֲדֹמִי
  english_pob_choice: when Doeg the Edomite was there
  chosen_spanish: cuando estaba allí Doeg el edomita
  alternatives_spanish:
  - que Doeg el edomita estaba allí
  - que allí estaba Doeg el edomita
  lexicon: HALOT
  rationale: Se toma la lectura circunstancial/temporal que la POB inglesa marcó como preferible en el flujo principal. «Estaba allí» conserva la presencia localizada; «edomita» sigue el etnónimo con artículo postpuesto natural en español.
- source_word: הַגֵּד יַגִּיד
  english_pob_choice: he would surely tell
  chosen_spanish: sin duda se lo diría
  alternatives_spanish:
  - ciertamente lo contaría
  - seguramente lo informaría
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito expresa énfasis. En español, «sin duda» sostiene esa intensificación sin sonar mecánico. Se usa «lo diría» porque el objeto implícito no está expresado en hebreo; el clítico refleja el contenido ya entendido por el contexto, de acuerdo con la fuerza pragmática del versículo.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - En cuanto a mí
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. «Yo» al inicio de la oración reproduce ese contraste con naturalidad; «Yo mismo» sería más enfático pero más pesado.
- source_word: סַבֹּתִי
  english_pob_choice: I am responsible for
  chosen_spanish: soy responsable
  alternatives_spanish:
  - he causado
  - soy la causa de
  - he provocado
  lexicon: HALOT
  rationale: La POB inglesa opta por una formulación de responsabilidad, no por una causalidad literal rígida. «Soy responsable» mantiene esa carga moral y el sentido de culpa asumida; en español se complementa con el objeto plural siguiente para expresar el daño total.
- source_word: בְּכָל נֶפֶשׁ
  english_pob_choice: all the lives
  chosen_spanish: todas las vidas
  alternatives_spanish:
  - cada vida
  - todas las personas
  - todas las almas
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa vidas individuales, no «alma» en sentido devocional. «Todas las vidas» preserva la gravedad del registro y evita una espiritualización ajena al contexto.
- source_word: בֵּית אָבִיךָ
  english_pob_choice: your father’s house
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - la casa paterna
  - el hogar de tu padre
  lexicon: HALOT
  rationale: Se mantiene el idiomático «casa de tu padre» como equivalente directo de la unidad familiar/linaje. En español, «la casa de tu padre» es claro y conserva la dimensión de casa como familia o casa dinástica.
theological_decisions:
- issue: Responsabilidad moral de David por la matanza de la casa de Ahimelec/Abiatar
  english_pob_reading: I am responsible for all the lives of your father’s house.
  chosen_spanish_reading: Yo soy responsable de todas las vidas de la casa de tu padre.
  alternative_spanish_readings:
  - Yo he causado la muerte de todas las vidas de la casa de tu padre
  - Yo soy la causa de todas las vidas de la casa de tu padre
  rationale: 'Se conserva la tensión del hebreo y de la POB: דוד no dice solamente que fue un efecto indirecto, sino que asume culpa por el desastre ocurrido. La formulación española evita suavizar la imputación moral, pero también evita imponer una causalidad más dura que la redacción principal no exige.'
  doctrine_reference: Responsabilidad personal y culpa moral; cf. 1 Sam 22:21-23
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la cláusula final de «every life» a «all the lives» por naturalidad. Esta nota se refleja en español con «todas las vidas», manteniendo la intensidad distributiva de בְּכָל נֶפֶשׁ. También se tuvo en cuenta la nota inglesa sobre el valor de כִּי en la cláusula de Doeg y la intensificación del infinitivo absoluto con verbo finito.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; aquí no aplica.
  - Se mantiene «Abiatar» como transliteración estándar del nombre.
  - «Edomita» conserva el etnónimo con artículo definido pospuesto, natural en español bíblico contemporáneo.
  - La puntuación con comillas angulares y notas entre corchetes sigue el estilo del proyecto.
