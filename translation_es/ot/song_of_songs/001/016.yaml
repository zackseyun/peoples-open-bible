translation:
  language: es
  text: Mira[a], eres hermosa, mi amado; sí, agradable. Sí, nuestro lecho es lozano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestro lecho es verde/verdoso». El adjetivo hebreo sugiere literalmente frescura o verdor, y probablemente evoca un entorno natural exuberante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְּךָ
  english_pob_choice: Look, you are
  chosen_spanish: Mira, eres
  alternatives_spanish:
  - Mira, tú eres
  - He aquí, eres
  - Mira, estás
  lexicon: HALOT
  rationale: La partícula deíctica/exclamativa introduce con fuerza al destinatario; «Mira» reproduce mejor ese gesto de señalamiento en español contemporáneo que un calco más arcaico como «He aquí».
- source_word: יָפֶה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  - atractiva
  lexicon: HALOT
  rationale: El adjetivo expresa belleza/atractivo. «Hermosa» funciona de manera natural en español literario y conserva el registro poético del verso.
- source_word: דוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado mío
  - mi amor
  - mi querido
  lexicon: HALOT
  rationale: En el Cantar, דוֹד es un término afectuoso para el amado; «mi amado» mantiene la relación poética sin volverse demasiado coloquial.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - además
  - incluso
  - ciertamente
  lexicon: HALOT
  rationale: Aquí אַף intensifica y añade énfasis. «Sí» es breve y natural en español; no introduce un sentido aditivo más fuerte que el hebreo.
- source_word: נָעִים
  english_pob_choice: pleasant
  chosen_spanish: agradable
  alternatives_spanish:
  - placentero
  - amable
  - delicioso
  lexicon: HALOT
  rationale: La POB inglesa revisó la primera elección para acercarse más al valor directo de נָעִים. «Agradable» conserva esa suavidad y funciona bien tras «hermosa» sin forzar matices excesivos.
- source_word: עַרְשֵׂנוּ
  english_pob_choice: our couch
  chosen_spanish: nuestro lecho
  alternatives_spanish:
  - nuestro sofá
  - nuestra cama
  - nuestro diván
  lexicon: HALOT
  rationale: עֶרֶשׂ puede ser lecho/cama/camastro. «Lecho» es una opción digna y poética en español, más amplia que «cama» y menos moderna que «sofá» o «diván».
- source_word: רַעֲנָנָה
  english_pob_choice: luxuriant
  chosen_spanish: frondoso
  alternatives_spanish:
  - verde
  - lozano
  - frondosa
  lexicon: HALOT
  rationale: El adjetivo denota frescura, verdor y lozanía, probablemente evocando un entorno vegetal. «Frondoso» transmite bien esa imagen natural en español y evita el choque de llamar «verde» a un lecho.
theological_decisions:
- issue: Tratamiento del término de afecto דוֹדִי en el Cantar
  english_pob_reading: my beloved
  chosen_spanish_reading: mi amado
  alternative_spanish_readings:
  - mi amor
  - mi querido
  rationale: No hay un problema doctrinal, pero sí una decisión de registro y relación. «Mi amado» preserva el valor de término de cariño del poema sin domesticarlo a un español demasiado coloquial.
  doctrine_reference: Poética bíblica / registro del Cantar de los Cantares
translation_notes:
  revision_awareness: La POB inglesa revisó ‘delightful’ a ‘pleasant’ para acercarse más directamente a נָעִים. En español, se siguió esa revisión con «agradable». También se evitó un calco de ‘couch’ por «sofá» y se optó por «lecho», más natural y poético para עַרְשֵׂנוּ, manteniendo la imagen abierta del hebreo.
  spanish_consistency_notes:
  - Se usa «mi amado» para דוֹדִי, coherente con el registro del Cantar y con la terminología POB.
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Mira» conserva la fuerza deíctica de הִנְּךָ sin arcaizar.
  - La nota al pie conserva la ambigüedad lexical de רַעֲנָנָה sin sobreexplicar el símbolo.
  - Se evita «cama» para no reducir innecesariamente la amplitud poética de עַרְשֵׂנוּ.
