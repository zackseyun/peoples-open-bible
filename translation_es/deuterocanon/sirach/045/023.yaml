translation:
  language: es
  text: Y Finees, hijo de Eleazar, heredó un tercer lugar en valor[a], porque fue celoso por el Dios de todos y se puso en la brecha por su pueblo[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: ''tercero en gloria'', mientras que el hebreo conservado dice ''heredó un tercer lugar en valor''. Se sigue aquí el testimonio hebreo, dejando a la vista la variante griega como matiz alternativo de honor.'
    reason: textual_variant
  - marker: b
    text: '''Ponerse en la brecha'' es un modismo hebreo que expresa interposición en un momento de peligro comunitario, con sentido de protección o mediación.'
    reason: cultural_note
  - marker: c
    text: 'El griego continúa: ''y expió por Israel'', ampliación que no está en el hebreo conservado aquí.'
    reason: textual_variant
lexical_decisions:
- source_word: Φινεὲς υἱὸς Ἐλεαζὰρ / פינחס בן אלעזר
  english_pob_choice: Phinehas son of Eleazar
  chosen_spanish: Finees, hijo de Eleazar
  alternatives_spanish:
  - Finees, hijo de Eleazar
  - Finés, hijo de Eleazar
  lexicon: N/A
  rationale: Se conserva el nombre propio en una forma española legible y reconocible, siguiendo el nombre bíblico tradicional sin forzar una transliteración demasiado técnica.
- source_word: נחל שלישי / τρίτος εἰς δόξαν
  english_pob_choice: inherited a third place
  chosen_spanish: heredó un tercer lugar
  alternatives_spanish:
  - recibió un tercer lugar
  - obtuvo un tercer rango
  - heredó un tercer puesto
  lexicon: HALOT
  rationale: Sigo el valor de rango/honor preservado por la tradición inglesa, pero en español 'heredó un tercer lugar' resulta más natural que un calco rígido. 'Lugar' mantiene la idea de posición de honor; 'heredó' conserva la metáfora de recepción/herencia.
- source_word: בגבורה
  english_pob_choice: in might
  chosen_spanish: en poder
  alternatives_spanish:
  - en might
  - en valor
  - en fortaleza
  - en gloria
  lexicon: HALOT
  rationale: '''גבורה'' expresa fuerza, capacidad heroica o vigor. ''Poder'' comunica bien esa fuerza en español sin perder la brevedad del hebreo. No adopto ''gloria'' como texto principal porque esa es la lectura griega alternativa documentada, no la hebrea principal.'
- source_word: בקנאו
  english_pob_choice: because he was zealous
  chosen_spanish: porque fue celoso
  alternatives_spanish:
  - porque mostró celo
  - cuando fue celoso
  - en su celo
  - porque actuó con celo
  lexicon: HALOT
  rationale: 'Mantengo la causalidad marcada por el contexto: el honor viene como resultado de su celo. ''Celoso'' reproduce el campo semántico de ''zealous'' y evita una paráfrasis excesiva. En español bíblico, ''celoso por'' es entendible y fiel.'
- source_word: לאלוה כל
  english_pob_choice: for the God of all
  chosen_spanish: por el Dios de todos
  alternatives_spanish:
  - para el Dios de todos
  - por el Dios de todo
  - por Dios sobre todos
  lexicon: HALOT
  rationale: La secuencia hebrea se refiere de modo directo al título 'el Dios de todos'. En español, 'por el Dios de todos' suena más natural y conserva la universalidad sin convertirlo en una fórmula litúrgica distinta.
- source_word: ויעמוד בפרץ
  english_pob_choice: stood in the breach
  chosen_spanish: se puso en la brecha
  alternatives_spanish:
  - estuvo en la brecha
  - se mantuvo en la brecha
  - intervino en la brecha
  lexicon: HALOT
  rationale: 'Sigo el idiomatismo hebreo con una expresión ya natural en español bíblico: ''ponerse en la brecha''. Evita el calco duro de ''stood in the breach'' y conserva la imagen de interposición/protección en crisis.'
- source_word: עמו
  english_pob_choice: for his people
  chosen_spanish: por su pueblo
  alternatives_spanish:
  - a favor de su pueblo
  - por su gente
  - por su nación
  lexicon: HALOT
  rationale: '''עמו'' en este contexto remite a Israel como pueblo colectivo. ''Por su pueblo'' expresa bien la acción representativa en favor de los demás y funciona naturalmente con el idiomatismo anterior.'
theological_decisions:
- issue: Relación entre el celo de Finees y su exaltación
  english_pob_reading: His elevated status is presented as resulting from his zeal for God and his intervention on behalf of the people.
  chosen_spanish_reading: Su lugar de honor se presenta como consecuencia de su celo por Dios y de su acción en favor del pueblo.
  alternative_spanish_readings:
  - El versículo solo lo describe elogiosamente, sin énfasis causal fuerte.
  - Su honor queda simplemente asociado a su celo, sin formular una relación de causa tan marcada.
  rationale: El hebreo con ב + infinitivo permite una relación causal u ocasionada por la circunstancia. Conviene dejar esa relación visible en español, porque forma parte del sentido histórico-teológico del pasaje y enlaza con Números 25.
  doctrine_reference: Números 25; Sirácides 45:23
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el expediente auditado en inglés: la versión final sigue el testimonio hebreo base para el orden/posición en honor, conserva el contraste con la lectura griega ''tercero en gloria'', y mantiene la expansión griega sobre la expiación como nota textual separada.'
  spanish_consistency_notes:
  - Se usa 'Dios' para אלוה/θεός y 'pueblo' para עמו, sin introducir 'SEÑOR' o 'Eterno'.
  - Se evita 'Cristo' porque no aparece en el pasaje; no hay terminología mesiánica aquí.
  - '''Brecha'' conserva el idiomatismo bíblico y no se suaviza a una mera explicación abstracta en el cuerpo principal.'
  - '''Finees'' mantiene una forma española clara del nombre propio, adecuada para lectura litúrgica y de estudio.'
