translation:
  language: es
  text: 'Entonces la palabra de Yahvé vino por la mano de Hageo el profeta[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por medio de Hageo el profeta». El hebreo dice literalmente «por la mano de Hageo», un modismo de agencia mediada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció
  - Y fue
  lexicon: HALOT
  rationale: El waw consecutivo introduce la secuencia narrativa. «Entonces ... vino» conserva el avance discursivo y el valor eventivo sin sonar tan mecánico como «y aconteció».
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra
  lexicon: HALOT
  rationale: En fórmulas proféticas, דָּבָר puede referirse a la comunicación revelada de Dios. «La palabra» mantiene el giro profético tradicional y refleja bien el sentido de comunicación divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título como «el SEÑOR». En español, «Yahvé» es la forma más reconocible y litúrgicamente legible para este nombre.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - a través de
  lexicon: HALOT
  rationale: El hebreo usa un modismo de mediación/agencia. En español, «por medio de» comunica la instrumentación profética con claridad natural, sin perder la idea de que Hageo es el mediador humano del mensaje.
- source_word: חַגַּי
  english_pob_choice: Haggai
  chosen_spanish: Hageo
  alternatives_spanish:
  - Haggai
  lexicon: standard transliteration
  rationale: Se adopta la transliteración bíblica habitual en español, «Hageo», por ser la forma establecida y legible para lectores hispanohablantes.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: La expresión appositiva identifica el oficio y la autoridad de Hageo. «El profeta» es la equivalencia directa y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo introduce la cita siguiente; «diciendo» es la equivalencia convencional en español y mantiene la función de transición hacia el discurso directo.
theological_decisions:
- issue: Cómo renderizar el Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el nombre divino explícito, no un sustituto. «Yahvé» preserva esa lectura con una forma española común y clara, coherente con la política del proyecto de no enmascarar el nombre por una mayúscula de título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de mediación en בְּיַד חַגַּי
  english_pob_reading: by the hand of Haggai the prophet
  chosen_spanish_reading: por medio de Hageo el profeta
  alternative_spanish_readings:
  - a través de Hageo el profeta
  - por la mano de Hageo el profeta
  rationale: La POB inglesa preserva el modismo y anota su sentido de agencia mediada. En español, «por medio de» expresa con fidelidad esa mediación sin oscurecer la función profética ni convertir la frase en un calco extrañado.
  doctrine_reference: Principio de mediación profética y transparencia idiomática en traducción bíblica
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés no introdujo cambios; el acuerdo entre revisiones y relectura es alto. La presente redacción sigue esa lectura estable, manteniendo el nombre divino, la fórmula profética y la nota sobre el modismo de mediación.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva «Hageo» como forma española bíblica habitual.
  - Se prefiere «por medio de» para בְּיַד por claridad natural en español, con nota de alternativa literal.
  - La puntuación reproduce la apertura narrativa y la introducción de cita del hebreo y del inglés auditado.
