  text: And all Israel[a], with its elders, officers, and judges, was standing on this side and on that side of the ark, opposite the Levitical priests carrying the ark of the covenant of Yahweh, both the sojourner and the native-born alike. Half of them were in front of Mount Gerizim and half of them in front of Mount Ebal, just as Moses the servant of Yahweh had commanded at the first[b], to bless the people of Israel.
  footnotes:
