translation:
  language: es
  text: Porque Yahvé de los Ejércitos[a] tiene un día contra todo lo orgulloso y elevado, y contra todo lo enaltecido; y será abatido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «Yahvé de las Huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa o de fundamento del oráculo; «Porque» preserva bien el valor conectivo sin forzar una interpretación causal excesiva.
- source_word: יוֹם
  english_pob_choice: has a day
  chosen_spanish: tiene un día
  alternatives_spanish:
  - hay un día
  - le pertenece un día
  lexicon: HALOT
  rationale: La construcción nominal hebrea comunica que el día pertenece a Yahvé como día de juicio. «Tiene un día» conserva esa fuerza de posesión/asignación sin añadir más que el texto.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se rinde como «Yahvé» según el estándar del proyecto, preservando el nombre de pacto en vez de ocultarlo tras un título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos celestiales
  - de las Huestes
  lexicon: HALOT
  rationale: «Ejércitos» comunica el sentido militar y de poder soberano de צְבָאוֹת con claridad moderna. Se evita «Huestes» por ser más tradicional pero menos transparente en español actual.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: HALOT
  rationale: En contexto de juicio, la preposición tiene fuerza adversativa. «Contra» expresa mejor el tono hostil que «sobre».
- source_word: כָּל
  english_pob_choice: all that is
  chosen_spanish: todo lo
  alternatives_spanish:
  - todo aquel que
  - todo lo que
  lexicon: HALOT
  rationale: Con adjetivos o participios, la referencia es distributiva. «Todo lo» permite reproducir esa amplitud en español de forma natural.
- source_word: גֵּאֶה
  english_pob_choice: proud
  chosen_spanish: orgulloso
  alternatives_spanish:
  - arrogante
  - altivo
  lexicon: HALOT
  rationale: El término expresa altivez/haughtiness. «Orgulloso» es directo y comprensible; mantiene el valor moral negativo en este contexto de juicio.
- source_word: וָרָם
  english_pob_choice: and lofty
  chosen_spanish: y elevado
  alternatives_spanish:
  - y alto
  - y exaltado
  lexicon: HALOT
  rationale: Conserva la imaginería de altura y la intensificación del par hebreo. «Elevado» es más sobrio que «alto» y no sugiere necesariamente exaltación legítima.
- source_word: נִשָּׂא
  english_pob_choice: lifted up
  chosen_spanish: lo que está levantado
  alternatives_spanish:
  - lo levantado
  - lo que fue levantado
  lexicon: HALOT
  rationale: El participio pasivo conserva la idea de algo que ha sido alzado. «Lo que está levantado» mantiene la imagen sin convertirlo en un calificativo estático demasiado libre.
- source_word: וְשָׁפֵל
  english_pob_choice: and it shall be brought low
  chosen_spanish: será abatido
  alternatives_spanish:
  - será humillado
  - será rebajado
  lexicon: HALOT
  rationale: El verbo culmina el juicio divino sobre lo encumbrado. «Será abatido» preserva el movimiento hacia abajo y el tono judicial, y evita suavizarlo con un mero estado descriptivo.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre de pacto en forma transliterada estándar del proyecto, en lugar de sustituirlo por un título genérico. Esto mantiene visible la referencia directa al Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering יהוה צבאות
  english_pob_reading: the LORD of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de las Huestes
  - el Señor de los Ejércitos
  rationale: Se traduce צְבָאוֹת por «los Ejércitos» para retener el matiz militar y soberano en español, conforme al criterio de traducir títulos divinos en vez de mantener una forma tradicional menos transparente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles; readable modern English'
translation_notes:
  revision_awareness: El examen de revisión indica acuerdo alto y sin cambios necesarios en la lectura inglesa base; por eso la versión española sigue de cerca la sintaxis y la carga semántica del hebreo, con mínimos ajustes de naturalidad para el español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se traduce צְבָאוֹת como «los Ejércitos» para conservar la imagen militar.
  - 'La secuencia de juicio conserva la progresión del hebreo: contra lo orgulloso/alto, contra lo levantado, y resultado de abatimiento.'
  - No se introducen equivalentes litúrgicos tradicionales como «SEÑOR» o «Huestes» sin necesidad textual.
