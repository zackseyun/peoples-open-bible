translation:
  language: es
  text: y las fuentes[a], las despabiladeras, los tazones, las copas y los braseros, de oro puro; y los quicios[c] para las puertas de la casa interior, para el Lugar Santísimo[b], y para las puertas de la casa, es decir, de la nave[d], de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tazones para aspersión». El hebreo puede referirse a recipientes usados en ritos de salpicadura o derramamiento.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «Santo de los Santos».
    reason: lexical_alternative
  - marker: c
    text: El hebreo probablemente alude a pivotes, encajes de pivote u otros herrajes sobre los que giraban las puertas, no a bisagras modernas.
    reason: cultural_note
  - marker: d
    text: O «salón principal». Aquí el hebreo distingue el espacio principal del templo del recinto interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּפּוֹת
  english_pob_choice: the basins
  chosen_spanish: las fuentes
  alternatives_spanish:
  - las palanganas
  - los tazones
  lexicon: HALOT
  rationale: En esta lista de utensilios del templo, un término de recipiente amplio funciona mejor en español con «fuentes», que comunica un vaso o recipiente sin confundirlo con los tazones mencionados después. Mantiene la distinción de la lista y evita un calco rígido.
- source_word: הַמְזַמְּרוֹת
  english_pob_choice: the snuffers
  chosen_spanish: las tenazas
  alternatives_spanish:
  - los apagavelas
  - los cortamechas
  lexicon: HALOT
  rationale: Aunque el uso cultual apunta a herramientas para recortar o apagar mechas, en español «tenazas» transmite de forma natural un implemento manual de ese tipo. Conserva la función sin imponer una especificación excesiva que el hebreo no exige aquí.
- source_word: הַמִּזְרָקוֹת
  english_pob_choice: the bowls
  chosen_spanish: los tazones
  alternatives_spanish:
  - los tazones para aspersión
  - las vasijas
  lexicon: HALOT
  rationale: «Tazones» es claro y distingue este grupo de los recipientes iniciales. La posible función ritual de aspersión queda implícita y puede expresarse en nota si se desea, pero el texto español conserva la claridad del conjunto.
- source_word: הַכַּפּוֹת
  english_pob_choice: the cups
  chosen_spanish: las copas
  alternatives_spanish:
  - las cucharas
  - los cuencos pequeños
  lexicon: HALOT
  rationale: En una lista de objetos sagrados, «copas» es más natural que «vasitos» y suficientemente abierto para el objeto hebreo, que puede ser un recipiente pequeño y cóncavo.
- source_word: הַמַּחְתּוֹת
  english_pob_choice: the firepans
  chosen_spanish: los braserillos
  alternatives_spanish:
  - los incensarios
  - las braseras
  lexicon: HALOT
  rationale: «Braserillos» comunica un recipiente para brasas con un matiz cultual y evita reducir el término a incienso de manera demasiado estrecha. Mantiene la idea de utensilio para el fuego.
- source_word: זָהָב סָגוּר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro fino
  lexicon: HALOT
  rationale: La frase hebrea indica oro de alta calidad/refinado; «oro puro» es el equivalente español más idiomático y fiel, y conserva la fuerza del énfasis material sin introducir una paráfrasis.
- source_word: הַפֹּתוֹת
  english_pob_choice: the hinges
  chosen_spanish: las quicialeras
  alternatives_spanish:
  - las bisagras
  - los goznes
  lexicon: HALOT
  rationale: Siguiendo el auditable sentido arquitectónico del hebreo, el término no nombra bisagras modernas sino el herraje o encaje sobre el que gira la puerta. «Quicialeras» preserva mejor la idea de pivote/fitting que «bisagras» en español común.
- source_word: לְדַלְתוֹת
  english_pob_choice: for the doors
  chosen_spanish: para las puertas
  alternatives_spanish:
  - de las puertas
  - en las puertas
  lexicon: HALOT
  rationale: La preposición de relación/purpose se expresa de manera natural con «para», manteniendo la función de los herrajes respecto de las puertas.
- source_word: הַבַּיִת הַפְּנִימִי
  english_pob_choice: the inner house
  chosen_spanish: la casa interior
  alternatives_spanish:
  - el recinto interior
  - el santuario interior
  lexicon: HALOT
  rationale: Se conserva la imagen de «casa» del hebreo sin forzar de inmediato una terminología más interpretativa. «Interior» mantiene la estructura del sintagma y deja que la frase siguiente precise el lugar.
- source_word: לְקֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: for the Most Holy Place
  chosen_spanish: para el Lugar Santísimo
  alternatives_spanish:
  - para el Santo de los Santos
  - para el Santísimo
  lexicon: HALOT
  rationale: «Lugar Santísimo» es el equivalente español claro y ampliamente entendible del superlativo hebreo, y evita la fórmula más eclesiástica «Santo de los Santos» como texto principal.
- source_word: לְדַלְתֵי הַבַּיִת לַהֵיכָל
  english_pob_choice: for the doors of the house, that is, the nave
  chosen_spanish: para las puertas de la casa, es decir, del templo
  alternatives_spanish:
  - para las puertas de la casa, es decir, del salón principal
  - para las puertas de la casa, del recinto principal
  lexicon: HALOT
  rationale: «Hêkhal» se refiere aquí al gran salón/recinto principal del templo. En español, «templo» funciona como equivalente sobrio y comprensible; la apposición «es decir» conserva la aclaración del hebreo y del audit trail inglés.
- source_word: זָהָב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - eran de oro
  lexicon: HALOT
  rationale: El cierre nominal repite el material de las puertas/herrajes. «De oro» reproduce de forma natural la construcción elíptica del hebreo.
theological_decisions:
- issue: Terminología del Lugar Santísimo
  english_pob_reading: Most Holy Place
  chosen_spanish_reading: Lugar Santísimo
  alternative_spanish_readings:
  - Santo de los Santos
  - Santísimo
  rationale: No hay tensión doctrinal especial, pero sí una decisión terminológica. «Lugar Santísimo» comunica bien la función espacial y preserva la referencia cultual sin preferir una fórmula litúrgica más tradicional que el texto no exige.
  doctrine_reference: Éxodo 26:33; Hebreos 9:3
- issue: הֵיכָל como sala principal del templo
  english_pob_reading: the nave / main hall
  chosen_spanish_reading: del templo
  alternative_spanish_readings:
  - del salón principal
  - del recinto principal
  rationale: El hebreo distingue el espacio interior del recinto principal. En español, «templo» aquí funciona como término resumido del área principal, pero la apposición «es decir» evita perder la distinción espacial que el original mantiene.
  doctrine_reference: 1 Reyes 6:17; 1 Reyes 7:50
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «sockets» por «hinges» para פֹּתוֹת, favoreciendo un sentido de herraje/pivote de puerta. La presente versión española sigue ese ajuste con «quicialeras», manteniendo además la aclaración espacial entre la casa interior, el Lugar Santísimo y la casa/templo. También conserva la lectura de «pure gold» como oro puro, sin tensionar el valor refinado del hebreo סָגוּר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en esta versión no porque aparezca en el versículo, sino como norma general del proyecto; aquí no aplica.
  - Se evita «Cristo» porque no hay referencia mesiánica en el pasaje.
  - Se preserva la lista de utensilios con sustantivos distintos para no aplanar las diferencias léxicas del hebreo.
  - Se usa «Lugar Santísimo» como término principal y se deja «Santo de los Santos» como alternativa, en línea con la práctica de POB de conservar las opciones tradicionales en nota cuando ayudan a la lectura.
