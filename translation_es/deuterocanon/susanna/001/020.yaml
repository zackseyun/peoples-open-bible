translation:
  language: es
  text: Y ellas hicieron como ella dijo[a], y cerraron las puertas del jardín y salieron por las puertas laterales para traer lo que se les había ordenado, y no vieron a los ancianos, porque estaban escondidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego παράδεισος aquí significa un jardín o recinto ajardinado, no «paraíso» en el sentido teológico posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  english_pob_choice: they did
  chosen_spanish: hicieron
  alternatives_spanish:
  - realizaron
  - lo hicieron
  lexicon: BDAG
  rationale: El verbo simple ποιέω en narración se rinde de forma directa. «Hicieron» conserva la sobriedad del griego y encaja con la cláusula de conformidad «como ella dijo».
- source_word: καθὼς εἶπεν
  english_pob_choice: as she said
  chosen_spanish: como ella dijo
  alternatives_spanish:
  - tal como ella dijo
  - como ella había dicho
  lexicon: BDAG
  rationale: La comparación expresa conformidad con la instrucción de Susana. «Como ella dijo» es natural en español y no añade matiz temporal innecesario.
- source_word: ἀπέκλεισαν
  english_pob_choice: they shut
  chosen_spanish: cerraron
  alternatives_spanish:
  - cerraron con llave
  - bloquearon
  lexicon: BDAG
  rationale: El griego indica cerrar/obstruir, no necesariamente echar llave. «Cerraron» evita sobretraducir una acción de seguro que no está explícita.
- source_word: τὰς θύρας τοῦ παραδείσου
  english_pob_choice: the doors of the garden
  chosen_spanish: las puertas del jardín
  alternatives_spanish:
  - las puertas del parque
  - las puertas del huerto
  lexicon: BDAG
  rationale: παράδεισος aquí es un recinto ajardinado, no el sentido teológico posterior de «paraíso». «Jardín» mantiene ese valor concreto. Se usa «puertas» porque el contexto puede abarcar accesos del recinto y suena natural en español.
- source_word: κατὰ τὰς πλαγίας θύρας
  english_pob_choice: by the side doors
  chosen_spanish: por las puertas laterales
  alternatives_spanish:
  - por las puertas de lado
  - por las entradas laterales
  lexicon: BDAG
  rationale: κατά con acusativo aquí expresa ruta o salida por un lado. «Por las puertas laterales» comunica bien la idea de acceso secundario sin perder el paralelo con las puertas del jardín.
- source_word: ἐνέγκαι
  english_pob_choice: to bring
  chosen_spanish: para llevar
  alternatives_spanish:
  - para traer
  - para ir a buscar
  lexicon: BDAG
  rationale: El infinitivo de finalidad expresa el propósito de salir. En español, «para llevar» funciona de modo natural en la secuencia narrativa y mantiene la función final sin forzar un calco.
- source_word: τὰ προστεταγμένα αὐταῖς
  english_pob_choice: what had been ordered for them
  chosen_spanish: lo que les había sido ordenado
  alternatives_spanish:
  - lo mandado para ellas
  - las cosas que se les había indicado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de προστάσσω señala instrucciones previas dirigidas a las sirvientas. «Lo que les había sido ordenado» conserva el pasivo y la anterioridad sin introducir contenido no especificado.
- source_word: οὐκ εἴδοσαν
  english_pob_choice: they did not see
  chosen_spanish: no vieron
  alternatives_spanish:
  - no notaron
  - no observaron
  lexicon: BDAG
  rationale: La traducción literal del verbo «ver» se mantiene porque el griego dice explícitamente eso. «No vieron» preserva la sencillez narrativa.
- source_word: τοὺς πρεσβυτέρους
  english_pob_choice: the elders
  chosen_spanish: a los ancianos
  alternatives_spanish:
  - a los ancianos del pueblo
  - a los presbíteros
  lexicon: BDAG
  rationale: En esta escena el término designa a los hombres mayores con función reconocida en la narración. «Ancianos» es claro en español y evita la posible ambigüedad técnica de «presbíteros».
- source_word: κεκρυμμένοι
  english_pob_choice: hidden
  chosen_spanish: escondidos
  alternatives_spanish:
  - ocultos
  - en escondite
  lexicon: BDAG
  rationale: El participio perfecto pasivo señala un estado ya establecido. «Escondidos» es idiomático en español y conserva el sentido de estar fuera de la vista.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete/LXX con la nota editorial de que esta extracción usa la capa normalizada de traducción del corpus adjudicado. El inglés POB se tomó como auditoría de decisiones léxicas, no como base mecánica; la versión española mantiene la misma lectura concreta de παράδεισος como «jardín» y de θύραι como accesos del recinto, con ajuste natural a la sintaxis española.
  spanish_consistency_notes:
  - Se mantuvo «jardín» para παράδεισος en coherencia con el valor no teológico del término en esta escena.
  - Se evitó «cerraron con llave» porque el griego no exige esa precisión.
  - «Puertas laterales» conserva la distinción funcional con las puertas principales del jardín.
  - «Ancianos» refleja el rol narrativo del término πρεσβύτεροι sin cargarlo con tecnicismo eclesiástico.
