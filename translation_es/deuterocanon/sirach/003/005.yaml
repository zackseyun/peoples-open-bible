    issue: La expresión «se alegrará en sus hijos» es algo menos idiomática que «se alegrará por sus hijos».
    rationale: No constituye error ni falta de fidelidad; más bien refleja de forma más cercana el giro de la fuente y la línea del POB. Puede mantenerse sin problema.
