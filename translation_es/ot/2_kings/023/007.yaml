revisions:
- from: Él derribó las casas de los prostitutos de culto[a] que estaban en la casa de Yahvé, donde las mujeres tejían mantos[b] para la Asherá[c].
  to: Él derribó las casas de los prostitutos rituales[a] que estaban en la casa de Yahvé, donde las mujeres tejían colgaduras[b] para la Asherá[c].
  rationale: 'Se ajusta la redacción para mejor español eclesial y mayor fidelidad semántica: «prostitutos rituales» suena más natural que «prostitutos de culto»; «colgaduras» refleja mejor el probable sentido textil cultual de בָּתִּים que «mantos»; y la nota c corrige un anglicismo.'
