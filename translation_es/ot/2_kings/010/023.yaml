translation:
  language: es
  text: 'Entonces Jehú y Jonadab hijo de Recab entraron en la casa de Baal[a], y dijo a los siervos de Baal: «Busquen y vean que no haya aquí entre ustedes ningún siervo de Yahvé, sino solo siervos de Baal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “el templo de Baal”. El hebreo dice literalmente: “la casa de Baal”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: entered
  chosen_spanish: entraron
  alternatives_spanish:
  - fueron
  - entraron en
  - se metieron en
  lexicon: HALOT
  rationale: El hebreo בוא puede significar ‘venir’, ‘ir’ o ‘entrar’. Con el complemento ‘la casa de Baal’, el sentido espacial es claramente de ingreso al lugar; ‘entraron’ suena natural en español y conserva el movimiento hacia adentro.
- source_word: בֵּית הַבָּעַל
  english_pob_choice: the house of Baal
  chosen_spanish: la casa de Baal
  alternatives_spanish:
  - el templo de Baal
  - la morada de Baal
  lexicon: HALOT
  rationale: Sigo de cerca la forma hebrea ‘casa de Baal’. Aunque puede referirse a un santuario, ‘casa’ preserva mejor la literalidad fuente y la POB inglesa documenta esa misma opción con nota alternativa.
- source_word: עֹבְדֵי הַבַּעַל
  english_pob_choice: servants of Baal
  chosen_spanish: los servidores de Baal
  alternatives_spanish:
  - los siervos de Baal
  - los adoradores de Baal
  lexicon: HALOT
  rationale: El participio de עבד puede ser ‘siervos/servidores’ o, en contexto cultual, ‘adoradores’. Aquí el texto los identifica como personas al servicio de Baal dentro de su recinto; ‘servidores’ conserva el valor lexical sin introducir una interpretación cultual más específica que la hebrea no exige.
- source_word: חַפְּשׂוּ
  english_pob_choice: Search
  chosen_spanish: Busquen
  alternatives_spanish:
  - Examinen
  - Busquen cuidadosamente
  - Revisen
  lexicon: HALOT
  rationale: El imperativo pide inspección activa. ‘Busquen’ en plural de mandato funciona de forma natural en español; al ir seguido de ‘vean’, mantiene el tono de verificación ordenada del hebreo.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y asegúrense
  - y comprueben
  lexicon: HALOT
  rationale: La segunda orden refuerza la revisión. ‘Y vean’ reproduce la sucesión verbal sin sobreparafrasear; en conjunto con ‘Busquen’ transmite bien la comprobación requerida.
- source_word: פֶּן יֶשׁ פֹּה
  english_pob_choice: that there is no ... here
  chosen_spanish: que no haya aquí
  alternatives_spanish:
  - no vaya a haber aquí
  - para que no haya aquí
  - a fin de que no haya aquí
  lexicon: HALOT
  rationale: El hebreo expresa precaución (‘no sea que haya’). En español, tras los imperativos, ‘que no haya aquí’ comunica naturalmente la advertencia y conserva el matiz preventivo sin volverse torpe.
- source_word: מֵעַבְדֵי יְהוָה
  english_pob_choice: servant of Yahweh
  chosen_spanish: ningún servidor de Yahvé
  alternatives_spanish:
  - ningún siervo de Yahvé
  - ningún servidor de Yahvé aquí
  lexicon: HALOT
  rationale: 'El hebreo partitivo ‘de entre los servidores de Yahvé’ se expresa con una negación singular idiomática en español: ‘ningún servidor de Yahvé’. Se conserva ‘Yahvé’ según la norma del proyecto para יְהוָה.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como ‘Yahvé’ en el texto español, siguiendo el estándar del proyecto para preservar el nombre divino en vez del sustituto tradicional.
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino solo
  alternatives_spanish:
  - sino únicamente
  - excepto solo
  lexicon: HALOT
  rationale: La construcción exclusoria se expresa de forma natural en español con ‘sino solo’, que conserva la oposición entre ausencia de servidores de Yahvé y presencia exclusiva de servidores de Baal.
- source_word: לְבַדָּם
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: HALOT
  rationale: Aquí la fuerza es de exclusión, no de aislamiento físico. ‘Solo’ funciona bien en español contemporáneo y refleja la restricción del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en contraste con Baal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo contrapone con intención cultual a Yahvé con Baal. Mantener ‘Yahvé’ hace visible esa oposición y sigue la directriz del proyecto de no sustituir el nombre divino por un título encubridor.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de עֹבְדֵי הַבַּעַל en contexto cultual
  english_pob_reading: servants of Baal
  chosen_spanish_reading: servidores de Baal
  alternative_spanish_readings:
  - adoradores de Baal
  - siervos de Baal
  rationale: La evidencia hebrea permite una lectura de servicio religioso, pero el texto no usa el término de adoración explícita. ‘Servidores’ mantiene la forma participial de עבד y evita estrechar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md: lexical precision in cultic contexts'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado más reciente del audit trail inglés: la revisión sustituyó ‘worshipers’ por ‘servants’ para mayor ajuste léxico y mantuvo el nombre divino como Yahweh. La versión española refleja esa decisión con ‘servidores’ y ‘Yahvé’, conservando además la alternativa lexical documentada para בית הַבָּעַל.'
  spanish_consistency_notes:
  - 'Se mantuvo un registro uniforme de nombres propios: Jehú, Jonadab, Recab y Yahvé.'
  - Se evitó ‘SEÑOR’ para יְהוָה conforme al criterio del proyecto.
  - 'La estructura sintáctica sigue de cerca el paralelismo de los imperativos hebreos: ‘Busquen y vean’.'
  - El marcador [a] aparece en el texto donde corresponde a la alternativa lexical de ‘la casa de Baal’.
