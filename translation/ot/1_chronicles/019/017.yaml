id: 1CH.19.17
reference: 1 Chronicles 19:17
source:
  edition: WLC
  text: וַ/יֻּגַּ֣ד לְ/דָוִ֗יד וַ/יֶּאֱסֹ֤ף אֶת כָּל יִשְׂרָאֵל֙ וַ/יַּעֲבֹ֣ר הַ/יַּרְדֵּ֔ן וַ/יָּבֹ֣א אֲלֵ/הֶ֔ם וַֽ/יַּעֲרֹ֖ךְ אֲלֵ/הֶ֑ם וַ/יַּעֲרֹ֨ךְ דָּוִ֜יד לִ/קְרַ֤את אֲרָם֙ מִלְחָמָ֔ה וַ/יִּֽלָּחֲמ֖וּ עִמּֽ/וֹ־־׃
translation:
  text: When it was reported to David[a], he gathered all Israel, crossed the Jordan, came against them, and drew up in battle formation against them. Then David drew up for battle to meet Aram, and they fought with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and they fought against him.' The Hebrew expression literally uses 'with him,' but in context it clearly describes battle against David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד לְדָוִיד
  chosen: When it was reported to David
  alternatives:
  - And it was told to David
  - When David was told
  lexicon: HALOT
  rationale: The passive/narrative form naturally yields an impersonal English construction. 'When it was reported' captures the temporal force in context and keeps the focus on the report reaching David without supplying an explicit subject.
- source_word: וַיֶּאֱסֹף אֶת כָּל יִשְׂרָאֵל
  chosen: he gathered all Israel
  alternatives:
  - he assembled all Israel
  lexicon: HALOT
  rationale: אָסַף commonly means gather/assemble. 'Gathered' is straightforward modern English and preserves the likely military mustering sense without over-specifying.
- source_word: וַיַּעֲבֹר הַיַּרְדֵּן
  chosen: crossed the Jordan
  alternatives:
  - crossed over the Jordan
  lexicon: HALOT
  rationale: A concise rendering of עבר with the direct object 'the Jordan.' 'Crossed the Jordan' is idiomatic English and sufficient.
- source_word: וַיָּבֹא אֲלֵיהֶם
  chosen: came against them
  alternatives:
  - came to them
  - advanced toward them
  lexicon: HALOT
  rationale: Although בוא אל can be rendered more neutrally as 'came to,' the military context favors 'came against them' to reflect hostile movement without excessive paraphrase.
- source_word: וַיַּעֲרֹךְ אֲלֵיהֶם
  chosen: drew up in battle formation against them
  alternatives:
  - arrayed himself against them
  - formed ranks against them
  lexicon: HALOT
  rationale: ערך in military contexts refers to arranging troops for battle. 'Drew up in battle formation' makes the military sense explicit in natural English.
- source_word: וַיַּעֲרֹךְ דָּוִיד לִקְרַאת אֲרָם מִלְחָמָה
  chosen: Then David drew up for battle to meet Aram
  alternatives:
  - David arrayed himself to meet Aram in battle
  - David set the battle line against Aram
  lexicon: HALOT
  rationale: The repeated ערך is preserved with 'drew up' for consistency. לִקְרַאת is rendered 'to meet,' and מִלְחָמָה is brought forward as 'for battle' to produce clear English while retaining the military force.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew proper name is singular collective and should be transliterated as 'Aram' rather than replaced with the later geopolitical 'Syria.' 'Arameans' is interpretive; the text names the entity Aram.
- source_word: וַיִּלָּחֲמוּ עִמּוֹ
  chosen: and they fought with him
  alternatives:
  - and they fought against him
  lexicon: HALOT
  rationale: The preposition עם with לחם can denote fighting with/against someone depending on context. Here the subject is Aram, so the sense is adversative. The English idiom 'fought with him' naturally conveys conflict while staying close to the Hebrew construction.
