base_translation:
  language: en
  yaml_path: translation/ot/leviticus/014/048.yaml
  text: But if the priest comes in and looks[a], and behold, the disease has not spread in the house after the house was plastered, then the priest shall pronounce the house clean[b], because the disease is healed.
  footnotes:
  - marker: a
    text: Or, 'declare the house clean.' The Hebrew verb can denote ritual cleansing or a priestly pronouncement of cleanness in context.
    reason: lexical_alternative
  - marker: b
    text: Traditional versions often render נגע here as 'plague.' The term refers to the diseased affliction affecting the house.
    reason: lexical_alternative
