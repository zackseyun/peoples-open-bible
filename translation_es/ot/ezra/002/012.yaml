lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de familia de
  lexicon: HALOT
  rationale: En listas genealógicas y censales, el constructo plural de בֵּן indica linaje o pertenencia a un clan. En español, «los hijos de» conserva esa forma formal y es natural en este género. «Los descendientes de» explicita el sentido, pero introduce más interpretación que el hebreo inmediato.
- source_word: עַזְגָּד
  english_pob_choice: Azgad
  chosen_spanish: Azgad
  alternatives_spanish:
  - Asgad
  lexicon: HALOT
  rationale: Es un nombre propio de familia/persona; se translitera. Se conserva «Azgad» para seguir el uso auditado del POB en inglés y mantener consistencia nominal.
- source_word: אֶלֶף מָאתַיִם עֶשְׂרִים וּשְׁנָיִם
  english_pob_choice: 1,222
  chosen_spanish: '1.222'
  alternatives_spanish:
  - mil doscientos veintidós
  lexicon: HALOT
  rationale: La secuencia numérica hebrea suma 1,222. En una lista censal, el formato con cifras es claro y acorde con el género; en español se adapta a la convención tipográfica con punto como separador de miles.
