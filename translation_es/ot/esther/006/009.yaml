  text: וְ/נָת֨וֹן הַ/לְּב֜וּשׁ וְ/הַ/סּ֗וּס עַל יַד אִ֞ישׁ מִ/שָּׂרֵ֤י הַ/מֶּ֨לֶךְ֙ הַֽ/פַּרְתְּמִ֔ים וְ/הִלְבִּ֨ישׁוּ֙ אֶת הָ/אִ֔ישׁ אֲשֶׁ֥ר הַ/מֶּ֖לֶךְ חָפֵ֣ץ בִּֽ/יקָר֑/וֹ וְ/הִרְכִּיבֻ֤/הוּ עַל הַ/סּוּס֙ בִּ/רְח֣וֹב הָ/עִ֔יר וְ/קָרְא֣וּ לְ/פָנָ֔י/ו כָּ֚כָה יֵעָשֶׂ֣ה לָ/אִ֔ישׁ אֲשֶׁ֥ר הַ/מֶּ֖לֶךְ חָפֵ֥ץ בִּ/יקָרֽ/וֹ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/esther/006/009.yaml
  text: And let the robe and the horse be given into the hand of one of the king’s most noble officials[a], and let them clothe the man whom the king delights to honor, and let them lead him on the horse through the open square of the city, and proclaim before him[b], ‘Thus shall it be done for the man whom the king delights to honor.’
  footnotes:
  - marker: a
    text: Or 'one of the king’s princes' or 'one of the king’s most noble officials'; the Persian loanword פַּרְתְּמִים denotes high-ranking royal dignitaries.
    reason: lexical_alternative
  - marker: b
    text: Hebrew רְחוֹב refers to a broad public square or open place in the city, not necessarily a street in the modern sense.
    reason: cultural_note
