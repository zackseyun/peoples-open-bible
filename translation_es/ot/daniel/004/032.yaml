review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el sentido general del arameo: los habitantes de la tierra son tenidos por nada, el agente soberano hace según su voluntad en el ámbito celestial y terrenal, y nadie puede impedirle ni cuestionarlo. Sin embargo, dos decisiones no reflejan del todo la auditoría ni el mejor español bíblico: «actúa» debilita el verbo directo «hace», y «ejército del cielo» estrecha algo la amplitud de בְּחֵיל שְׁמַיָּא donde la auditoría inglesa final prefirió «host of heaven».'
  spanish_quality_summary: El texto es claro y digno, pero una oración coordinada larga se lee mejor con punto y coma en lugar de punto después de «tierra». «Refrenar su mano» es comprensible, pero «detener su mano» suena más natural en español actual y comunica mejor el valor idiomático de impedir/restringir. También conviene alinear la nota con la alternativa preservada por la auditoría inglesa.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. El pasaje no contiene Yahvé/Mesías/etc. Sí conviene mantener la amplitud semántica de בְּחֵיל שְׁמַיָּא con «hueste del cielo» y no resolverla como un «ejército» demasiado específico. La metáfora de la mano puede expresarse idiomáticamente en español sin forzar el literalismo.
  issues:
  - severity: medium
    issue: «él actúa» para עָבֵד
    rationale: El arameo usa un verbo común de hacer/obrar. «Actúa» no es incorrecto, pero reduce la cercanía al original y a la auditoría inglesa final, que conserva la sencillez de «he does». «Él hace» o «él obra» sería más fiel; «él hace» es el ajuste más directo.
  - severity: medium
    issue: «el ejército del cielo» para בְּחֵיל שְׁמַיָּא
    rationale: Aunque léxicamente posible, «ejército» puede sonar demasiado estrecho o concreto. La decisión inglesa revisada optó por «host of heaven» precisamente para preservar un registro formal y amplitud referencial. En español, «la hueste del cielo» comunica mejor esa amplitud.
  - severity: low
    issue: Puntuación con punto en vez de punto y coma
    rationale: El original encadena las proposiciones. En español formal, el punto y coma mantiene mejor la continuidad argumental antes de «y no hay nadie...».
  - severity: medium
    issue: La nota al pie no preserva la alternativa principal documentada para la frase idiomática de la mano
    rationale: La auditoría inglesa conserva la literalidad «strike his hand» en nota como alternativa explicativa. El borrador solo ofrece nota sobre «como nada» y omite la nota idiomática más relevante del versículo.
