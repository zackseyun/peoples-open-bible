translation:
  language: es
  text: Ahora pues, pónganse de pie, y contenderé[a] con ustedes delante de Yahvé acerca de todos los actos justos[b] de Yahvé, que hizo por ustedes y por sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los juzgaré», «razonaré con ustedes» o «permítanme presentar mi caso contra ustedes». El hebreo tiene un sentido forense de entrar en una causa delante de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: «Actos justos» se refiere a las obras de Yahvé que manifiestan su justicia y su fidelidad al pacto en favor de su pueblo.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now therefore
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Y ahora
  - Ahora entonces
  lexicon: HALOT
  rationale: La partícula introduce transición e inferencia en el discurso de Samuel; «pues» conserva mejor que un simple «ahora» el matiz exhortativo y conclusivo que el inglés POB expresó con «Now therefore».
- source_word: הִתְיַצְּבוּ
  english_pob_choice: stand here
  chosen_spanish: pónganse de pie
  alternatives_spanish:
  - preséntense
  - tomen su lugar
  - permanezcan de pie
  lexicon: HALOT
  rationale: El hitpael imperativo plural pide que el pueblo adopte postura para un acto formal. En español, «pónganse de pie» comunica con naturalidad la idea de presentarse para un procedimiento solemne sin perder el valor imperativo.
- source_word: וְאִשָּׁפְטָה אִתְּכֶם
  english_pob_choice: and I will contend with you
  chosen_spanish: y contenderé con ustedes
  alternatives_spanish:
  - y los juzgaré
  - y razonaré con ustedes
  - y pleitearé con ustedes
  lexicon: HALOT
  rationale: El valor forense de שפט con esta construcción no es solo sentenciar, sino entrar en una causa o disputa. «Contenderé» conserva el matiz de litigio/controversia que el POB inglés quiso preservar con «contend with you».
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La preposición expresa el marco judicial y cultual de la escena. «Delante de Yahvé» mantiene la fórmula bíblica y armoniza con el uso del nombre divino en el proyecto.
- source_word: אֵת כָּל צִדְקוֹת יְהוָה
  english_pob_choice: concerning all the righteous acts of Yahweh
  chosen_spanish: acerca de todas las obras justas de Yahvé
  alternatives_spanish:
  - acerca de todos los actos justos de Yahvé
  - sobre todas las justas obras de Yahvé
  - acerca de todos los hechos de justicia de Yahvé
  lexicon: HALOT
  rationale: צִדְקוֹת alude a actos concretos que manifiestan la fidelidad justa de Yahvé en la historia. «Obras justas» conserva la relación con la justicia sin reducirlo a un término más interpretativo como «salvadoras».
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he did
  chosen_spanish: que hizo
  alternatives_spanish:
  - que ha hecho
  - que realizó
  - que ejecutó
  lexicon: HALOT
  rationale: El verbo simple עשה admite una traducción directa y natural. «Hizo» es suficiente y fiel al relato histórico.
- source_word: אִתְּכֶם
  english_pob_choice: for you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - para ustedes
  - por ustedes
  - a favor de ustedes
  lexicon: HALOT
  rationale: Aunque el inglés POB suaviza al sentido benefactivo, el hebreo dice literalmente «con ustedes». Aquí «con ustedes» conserva la preposición y permite que la idea benefactora se infiera del contexto de las acciones de Yahvé.
- source_word: וְאֶת אֲבוֹתֵיכֶם
  english_pob_choice: and for your fathers
  chosen_spanish: y con sus padres
  alternatives_spanish:
  - y para sus padres
  - y a favor de sus padres
  - y con sus antepasados
  lexicon: HALOT
  rationale: La coordinación con el objeto anterior sugiere continuidad entre la generación presente y la anterior. «Padres» preserva el término ancestral básico; «con» mantiene el paralelismo con אִתְּכֶם.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme al criterio del proyecto en español, se emplea «Yahvé» para preservar el nombre del pacto y evitar el ocultamiento convencional de «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de צִדְקוֹת יְהוָה
  english_pob_reading: righteous acts of Yahweh
  chosen_spanish_reading: obras justas de Yahvé
  alternative_spanish_readings:
  - actos justos de Yahvé
  - hechos justos de Yahvé
  - obras de justicia de Yahvé
  rationale: La frase se refiere a acciones históricas concretas que exhiben la justicia fiel del pacto. «Obras justas» conserva la relación léxica con justicia y su concreción histórica, sin convertirla en una paráfrasis más estrecha.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, documented exception if varied)
- issue: Valor forense de וְאִשָּׁפְטָה אִתְּכֶם
  english_pob_reading: and I will contend with you
  chosen_spanish_reading: y contenderé con ustedes
  alternative_spanish_readings:
  - y los juzgaré
  - y pleitearé con ustedes
  - y presentaré mi caso contra ustedes
  rationale: El contexto es judicial, pero no exige que Samuel esté pronunciando una condena. «Contenderé» mantiene la tensión de litigio que el POB inglés documenta, sin perder la apertura a una controversia formal delante de Yahvé.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve documented lexical/theological tension'
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente sin cambios sustantivos (pass count 3; high_agreement). Se conservó la tensión forense de וְאִשָּׁפְטָה אִתְּכֶם con un verbo español que sugiera litigio, y se mantuvo la traducción directa del nombre divino conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con el criterio del proyecto para יְהוָה.
  - Se mantuvo el paralelismo entre «con ustedes» y «con sus padres» para reflejar la estructura del hebreo.
  - «Obras justas» conserva la conexión léxica con צִדְקוֹת sin introducir una paráfrasis teológica más estrecha.
  - El registro es solemne y apto para lectura pública, evitando calcos innecesarios y también el lenguaje eclesiástico que ocultaría el nombre divino.
