translation:
  language: es
  text: 'Y el pueblo que estaba acampado[a] oyó decir: «Zimri ha conspirado y también ha abatido[b] al rey». Entonces todo Israel hizo rey a Omri, el comandante del ejército[c], sobre Israel, aquel día en el campamento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «las tropas que estaban acampadas». El hebreo dice «el pueblo que estaba acampado», refiriéndose a quienes estaban en el campamento militar.'
    reason: lexical_alternative
  - marker: b
    text: «Ha abatido» traduce un verbo hebreo que literalmente significa «golpear»; en este contexto implica que Zimri mató al rey.
    reason: lexical_alternative
  - marker: c
    text: O «el comandante del ejército de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם הַחֹנִים
  english_pob_choice: the people who were encamped
  chosen_spanish: el pueblo que estaba acampado
  alternatives_spanish:
  - la gente que estaba acampada
  - las tropas acampadas
  lexicon: HALOT
  rationale: הָעָם significa «el pueblo/la gente», y הַחֹנִים es un participio de חנה, «acampar». En este contexto se trata del grupo reunido en el campamento militar. «Estaba acampado» conserva el participio y suena natural en español sin forzar el término técnico «tropas» en el texto principal.
- source_word: לֵאמֹר
  english_pob_choice: heard it said
  chosen_spanish: oyó decir
  alternatives_spanish:
  - oyó que decían
  - oyó el reporte
  lexicon: HALOT
  rationale: La construcción con שמע + infinitivo de אמר introduce discurso referido. «Oyó decir» reproduce de manera breve y natural la función de informe indirecto sin sobretraducirla.
- source_word: קָשַׁר
  english_pob_choice: has conspired
  chosen_spanish: ha conspirado
  alternatives_spanish:
  - ha tramado
  - ha cometido traición
  lexicon: HALOT
  rationale: En narraciones reales, קשר expresa conspiración o traición política. «Ha conspirado» es el equivalente más directo y conserva ese matiz político.
- source_word: וְגַם הִכָּה אֶת־הַמֶּלֶךְ
  english_pob_choice: and has also struck down the king
  chosen_spanish: y también ha derribado al rey
  alternatives_spanish:
  - y también ha golpeado al rey
  - y también ha matado al rey
  lexicon: HALOT
  rationale: נכה significa literalmente «golpear/abatir». Dado que el contexto implica la muerte del rey, «derribado» mantiene la imagen verbal y comunica el resultado sin pasar directamente a una paráfrasis interpretativa de «matar».
- source_word: וַיַּמְלִכוּ
  english_pob_choice: made ... king
  chosen_spanish: hizo rey
  alternatives_spanish:
  - proclamó rey
  - coronó rey
  lexicon: HALOT
  rationale: El hifil de מלך es «hacer reinar», es decir, hacer/proclamar rey. «Hizo rey» respeta la estructura verbal hebrea sin añadir un rito de coronación no mencionado.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todos los israelitas
  lexicon: HALOT
  rationale: La expresión es una designación colectiva estable. «Todo Israel» conserva el giro bíblico y su referencia al conjunto reunido.
- source_word: שַׂר צָבָא עַל יִשְׂרָאֵל
  english_pob_choice: the commander of the army over Israel
  chosen_spanish: el comandante del ejército
  alternatives_spanish:
  - el comandante del ejército de Israel
  - el jefe del ejército sobre Israel
  lexicon: HALOT
  rationale: שַׂר צָבָא es «comandante/jefe del ejército». En español, el complemento «sobre Israel» resulta forzado; el contexto ya aclara que Omri ejerce autoridad militar en Israel. Por eso se opta por «el comandante del ejército» en el texto principal, preservando la claridad sin perder el sentido militar.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: Expresión temporal estándar. «Aquel día» es natural y solemne en español bíblico contemporáneo.
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento militar
  - en la campa
  lexicon: HALOT
  rationale: מַחֲנֶה denota un campamento, aquí claramente militar. «Campamento» es la forma más clara y natural en español; «campamento militar» sería redundante en el texto principal.
theological_decisions:
- issue: La referencia implícita a la muerte del rey por el verbo «golpear/abatir»
  english_pob_reading: has also struck down the king
  chosen_spanish_reading: también ha derribado al rey
  alternative_spanish_readings:
  - también ha matado al rey
  - también ha golpeado al rey
  rationale: 'La POB inglesa mantiene la fuerza léxica de נכה con «struck down» y explica en nota que en contexto implica matar. En español, «derribado» conserva esa fuerza verbal y la ambigüedad responsable: no explicita «matar» en el cuerpo, pero deja claro que se trata de una acción violenta fatal.'
  doctrine_reference: Narrativa histórica; no implica una doctrina específica, pero sí fidelidad al valor semántico del verbo.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más formal («the people who were encamped») y evita la colocación poco natural de un complemento espacial tras «comandante del ejército». También conserva la secuencia narrativa y el matiz de informe indirecto sin sobreinterpretar el acto de violencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del tetragrámaton; este versículo no lo contiene.
  - «Mesías/Cristo» no aparece en el versículo.
  - Se conserva el registro bíblico contemporáneo, evitando arcaísmos innecesarios como «reyó» o «proclamaron», que no añaden precisión.
  - La nota de [a] preserva la alternativa más explícita, equivalente a la nota inglesa sobre «troops who were encamped».
