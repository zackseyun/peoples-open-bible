revisions:
- from: Grande es Yahvé[a], y digno de ser grandemente alabado; y su grandeza es inescrutable.
  to: Grande es Yahvé[a], y muy alabado, y su grandeza es inescrutable.
  rationale: Se reemplaza «digno de ser grandemente alabado» por «muy alabado» para acercarse más al participio pasivo intensificado del hebreo sin expansión interpretativa. Se simplifica la puntuación para una lectura más natural del verso. Se corrige la nota al pie para conservar la alternativa literal de אֵין חֵקֶר con un español más idiomático y fiel.
