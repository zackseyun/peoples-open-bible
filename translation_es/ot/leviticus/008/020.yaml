translation:
  language: es
  text: Entonces cortó el carnero en sus piezas[a], y Moisés hizo subir en humo la cabeza, las piezas y el sebo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las partes'. El hebreo repite el mismo término para las porciones cortadas del carnero.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho de oveja
  - el borrego adulto
  lexicon: HALOT
  rationale: En contexto sacrificial, אַיִל designa un macho adulto de oveja; en español bíblico natural, 'carnero' comunica bien esa clase de animal sin perder precisión.
- source_word: נִתַּח לִנְתָחָיו
  english_pob_choice: cut ... into its pieces
  chosen_spanish: cortó ... en sus partes
  alternatives_spanish:
  - descuartizó ... en sus partes
  - lo partió ... en sus piezas
  lexicon: HALOT
  rationale: La idea es de cortar el animal en porciones según sus miembros o cortes. 'Partes' mantiene la relación con el original y suena natural en español; 'piezas' también es posible, pero 'partes' conserva mejor la neutralidad del registro sacrificial.
- source_word: וַיַּקְטֵר
  english_pob_choice: burned ... in smoke
  chosen_spanish: hizo subir en humo
  alternatives_spanish:
  - quemó en humo
  - ofreció en humo
  lexicon: HALOT
  rationale: El verbo cultual expresa causar que algo suba como humo sobre el altar. 'Hizo subir en humo' preserva la imagen sacrificial y evita reducirlo a un simple 'quemó'.
- source_word: הָרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza
  lexicon: HALOT
  rationale: Término anatómico directo; 'cabeza' es la equivalencia natural y precisa en español.
- source_word: הַנְּתָחִים
  english_pob_choice: the pieces
  chosen_spanish: las partes
  alternatives_spanish:
  - las piezas
  - los trozos
  lexicon: HALOT
  rationale: Repite el sustantivo de la primera cláusula. 'Partes' mantiene la coherencia interna con 'en sus partes' y evita una repetición menos elegante de 'piezas'.
- source_word: הַפָּדֶר
  english_pob_choice: the suet
  chosen_spanish: el sebo
  alternatives_spanish:
  - la grasa
  - la grasa sacrificial
  lexicon: HALOT
  rationale: Aunque la POB inglesa mantuvo 'suet' tras revisar 'fat tail', el hebreo פָּדֶר apunta a la grasa interna/fatty portion del animal sacrificial. 'Sebo' es el término español más preciso y digno para esa grasa específica en contexto ritual.
theological_decisions:
- issue: Naturaleza de la porción sacrificial final
  english_pob_reading: the suet
  chosen_spanish_reading: el sebo
  alternative_spanish_readings:
  - la grasa
  - la grasa sacrificial
  rationale: No hay indicio en el hebreo de 'cola grasa' aquí; la revisión inglesa corrigió hacia una porción grasa genérica. En español, 'sebo' refleja mejor la carne grasa ritual del animal sin introducir una concreción no sustentada por el texto.
  doctrine_reference: Levítico 8:20; léxico sacrificial de פָּדֶר
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'fat tail' a 'suet' por precisión lexical. En español se siguió esa revisión, evitando 'cola grasa' y eligiendo 'sebo' para reflejar la porción grasa del sacrificio sin sobreespecificar.
  spanish_consistency_notes:
  - Se mantuvo 'Moisés' como nombre propio no traducido.
  - Se usó 'carnero' para אַיִל en sentido sacrificial, coherente con el registro bíblico en español.
  - '''Hizo subir en humo'' conserva el valor cultual de וַיַּקְטֵר sin reducirlo a una simple combustión.'
  - '''Se repite ''partes'' tanto para לִנְתָחָיו como para הַנְּתָחִים para reflejar la cognación del hebreo.'
  - Se evitó 'SEÑOR' o sustituciones teológicas no presentes en el versículo.
