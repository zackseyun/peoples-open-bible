translation:
  language: es
  text: Todos los días de su separación[a], es santo para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su voto de nazareo» o «su consagración». El término hebreo se refiere al estado de estar apartado como nazareo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Cada uno de
  lexicon: HALOT
  rationale: El cuantificador abarca la totalidad del período; «Todos» conserva esa amplitud de forma natural en español.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - durante los días de
  lexicon: HALOT
  rationale: El constructo plural introduce un lapso temporal; «los días de» es la traslación directa y idiomática.
- source_word: נִזְרוֹ
  english_pob_choice: his separation
  chosen_spanish: su separación
  alternatives_spanish:
  - su voto de nazareo
  - su consagración
  lexicon: HALOT
  rationale: Aquí el término señala el estado de estar apartado como nazareo. «Su separación» preserva el valor lexical sin convertirlo en una paráfrasis del voto ni fusionarlo con «santo».
- source_word: קָדֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - apartado
  - consagrado
  lexicon: HALOT
  rationale: El adjetivo expresa santidad/estado de apartamiento; «santo» mantiene el peso teológico y bíblico del término.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: él es
  alternatives_spanish:
  - es
  - él permanece
  lexicon: HALOT
  rationale: El hebreo usa pronombre independiente con cópula implícita; el español requiere «él es» para una cláusula completa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - pertenece a Yahvé
  lexicon: HALOT
  rationale: La preposición ל indica dedicación o relación de pertenencia. En esta serie se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo lleva el Tetragrámaton; el proyecto pide traducirlo como «Yahvé» en el texto principal para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נִזְרוֹ en la legislación nazarea
  english_pob_reading: his separation
  chosen_spanish_reading: su separación
  alternative_spanish_readings:
  - su voto de nazareo
  - su consagración
  rationale: La frase subraya la duración del estado de separación del nazareo. «Su separación» mantiene la distinción entre el estado apartado y la santidad resultante.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological weight without paraphrase'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente, que no introdujo cambios y registró acuerdo alto con el control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en este libro.
  - Se conserva «nazareo» solo en la nota como alternativa explicativa; en el texto se prefiere «separación» por fidelidad contextual.
  - «Santo» se usa para reflejar el valor cultual y teológico de קָדֹשׁ sin reemplazarlo por un sinónimo más débil.
