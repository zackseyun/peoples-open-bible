  text: וּ/בַ/חֹ֨דֶשׁ הַ/שְּׁבִיעִ֜י בְּ/אֶחָ֣ד לַ/חֹ֗דֶשׁ מִֽקְרָא קֹ֨דֶשׁ֙ יִהְיֶ֣ה לָ/כֶ֔ם כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֣א תַעֲשׂ֑וּ י֥וֹם תְּרוּעָ֖ה יִהְיֶ֥ה לָ/כֶֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/029/001.yaml
  text: And in the seventh month[a], on the first day of the month, you shall have a holy convocation. You shall do no laborious work. It shall be a day of trumpet blasts for you.
  footnotes:
