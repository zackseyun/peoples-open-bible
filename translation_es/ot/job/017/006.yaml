translation:
  language: es
  text: Él me ha hecho un proverbio[a] entre los pueblos, y he llegado a ser uno ante quien escupen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un dicho proverbial». El hebreo probablemente se refiere a un objeto proverbial de escarnio.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «y he llegado a ser una escupida delante de rostros», es decir, un objeto de desprecio abierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצִּגַנִי
  english_pob_choice: He has made me
  chosen_spanish: me ha hecho
  alternatives_spanish:
  - me ha puesto
  - me ha exhibido
  lexicon: HALOT
  rationale: 'El Hiphil con sufijo de primera persona expresa acción causativa: alguien me coloca o me convierte en algo visible públicamente. «Me ha hecho» conserva esa causalidad y funciona con naturalidad en español.'
- source_word: לִמְשֹׁל עַמִּים
  english_pob_choice: a byword among the peoples
  chosen_spanish: un refrán entre los pueblos
  alternatives_spanish:
  - un proverbio entre los pueblos
  - un dicho entre los pueblos
  - un objeto de burla entre los pueblos
  lexicon: HALOT
  rationale: El término hebreo apunta a una figura proverbial de escarnio público. «Refrán» comunica bien la idea proverbial en español y mantiene el matiz de algo que la gente repite como ejemplo o escarnio; «proverbio» es posible, pero puede sonar más neutro.
- source_word: עַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos
  - para los pueblos
  lexicon: HALOT
  rationale: Se conserva el plural de עמים. «Entre los pueblos» refleja mejor la pluralidad y el ámbito público del desprecio.
- source_word: וְתֹפֶת
  english_pob_choice: one before whom people spit
  chosen_spanish: uno ante quien escupen
  alternatives_spanish:
  - una escupida
  - un objeto de escupida
  - uno a quien escupen
  lexicon: HALOT
  rationale: La imagen hebrea es difícil y probablemente alude a un objeto de escarnio o repulsión asociado con escupir. En español, «uno ante quien escupen» mantiene la humillación pública sin volver la frase opaca.
- source_word: לְפָנִים
  english_pob_choice: before whom
  chosen_spanish: ante quien
  alternatives_spanish:
  - delante de quien
  - en la cara de quien
  - ante sus rostros
  lexicon: HALOT
  rationale: La expresión literalmente dice «delante de rostros». «Ante quien» reproduce la relación frontal y pública del insulto de manera idiomática en español.
- source_word: אֶהְיֶה
  english_pob_choice: I have become
  chosen_spanish: he venido a ser
  alternatives_spanish:
  - soy
  - he llegado a ser
  - llegué a ser
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfectiva, el contexto poético expresa un estado resultante. «He venido a ser» preserva el proceso hacia la condición actual sin forzar un presente simple.
translation_notes:
  revision_awareness: Coincide con el pasaje hebreo y con la lectura auditada en inglés; se mantiene la tensión entre «refrán/proverbio» y la imagen de desprecio público mediante nota, sin suavizar la metáfora.
  spanish_consistency_notes:
  - Se usa «pueblos» para conservar el plural de עמים.
  - Se prefiere «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se mantiene el tono poético y humillante del hebreo sin convertir la imagen en explicación interpretativa dentro del cuerpo principal.
