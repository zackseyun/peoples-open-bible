base_translation:
  language: en
  yaml_path: translation/ot/numbers/010/009.yaml
  text: And when you go to war in your land against the enemy who oppresses you[a], then you shall sound an alarm with the trumpets, and you shall be remembered before Yahweh your God[c][b], and you shall be saved from your enemies.
