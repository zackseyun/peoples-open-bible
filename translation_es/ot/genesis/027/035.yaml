translation:
  language: es
  text: 'Y dijo[a]: «Tu hermano vino con engaño y tomó tu bendición».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por engaño» o «engañosamente». La frase hebrea usa un sustantivo («engaño») con una preposición, que en español puede representarse de varias maneras naturales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la réplica de Isaac; en español, «Y dijo» conserva la secuencia del relato sin añadir una relación temporal o discursiva más fuerte que la del hebreo.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - ha venido
  - llegó
  lexicon: HALOT
  rationale: El perfecto en contexto narrativo se entiende como acción pasada concluida. «Vino» mantiene la simplicidad verbal y la dirección del movimiento implícito en בוא sin sobrecargar el sentido.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - el hermano de ti
  lexicon: HALOT
  rationale: El hebreo usa el término de parentesco con sufijo de segunda persona para marcar la recriminación. «Tu hermano» es la forma natural y fiel en español.
- source_word: בְּמִרְמָה
  english_pob_choice: with deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - mediante engaño
  - con fraude
  - engañosamente
  lexicon: HALOT
  rationale: La preposición ב + sustantivo expresa manera/instrumento. «Con engaño» conserva el sustantivo y su peso moral, y resulta más natural en español que un adverbio como «engañosamente».
- source_word: וַיִּקַּח
  english_pob_choice: and took
  chosen_spanish: se llevó
  alternatives_spanish:
  - tomó
  - quitó
  lexicon: HALOT
  rationale: En este contexto de apropiación de la bendición, «se llevó» comunica el acto consumado con suficiente naturalidad en español, sin perder la idea básica de לקח ni exagerar con un verbo más violento.
- source_word: בִּרְכָתֶךָ
  english_pob_choice: your blessing
  chosen_spanish: tu bendición
  alternatives_spanish:
  - tu bendición paterna
  lexicon: HALOT
  rationale: La expresión es literal y clara. Aunque el contexto apunta a la bendición patriarcal, el texto hebreo dice simplemente «tu bendición»; mantenerlo así preserva la concisión y la referencia narrativa.
theological_decisions:
- issue: Alcance de la «bendición» en el relato
  english_pob_reading: your blessing
  chosen_spanish_reading: tu bendición
  alternative_spanish_readings:
  - tu bendición paterna
  - la bendición que te correspondía
  rationale: No se añade una explicación intratextual que no esté en el hebreo. El contexto familiar ya deja ver que se trata de la bendición de Isaac; la traducción mantiene esa sobriedad.
  doctrine_reference: Génesis 27:27-29; 27:33-36
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo; no hay revisiones aplicadas. La redacción española sigue de cerca la estructura del original, respetando la ambigüedad lexical de בְּמִרְמָה y el valor narrativo de los verbos wayyiqtol.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no lo contiene.
  - Se usa «bendición» de forma simple, sin explicitar «paterna», para no añadir material no presente en el hebreo.
  - Se evita «Cristo»/«Mesías» porque no aparece en el texto.
  - El tono es bíblico y contemporáneo, sin arcaísmos innecesarios.
