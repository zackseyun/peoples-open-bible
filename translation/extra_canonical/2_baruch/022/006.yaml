  source_review: state/reviews/gemini/vertex_full_book_qc_2026_04/extra_canonical/2_baruch/022/006.job-77219.json
  category: lexical
  from: expect to receive
  to: receive
  rationale: The Syriac phrase 'meshkakh d-nesab' translates directly to 'is able
    to take' or 'can receive'. The addition of 'expect to' is an unnecessary expansion
    that slightly weakens the directness of the rhetorical question.
