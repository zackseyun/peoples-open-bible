translation:
  language: es
  text: 'Estos son los nombres de los hombres que les asignarán la tierra como herencia: Eleazar el sacerdote y Josué hijo de Nun.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: WLC/HALOT
  rationale: El deíctico plural introduce una identificación; en español, para una cláusula nominal natural, conviene expresar el verbo copulativo implícito.
- source_word: שְׁמוֹת
  english_pob_choice: the names of
  chosen_spanish: los nombres de
  alternatives_spanish:
  - nombres de
  lexicon: WLC/HALOT
  rationale: El constructo con הָאֲנָשִׁים pide una relación posesiva clara en español.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la gente
  lexicon: WLC/HALOT
  rationale: El sustantivo masculino plural se refiere a varones específicos; ‘hombres’ preserva el rasgo de género del hebreo y la referencia a líderes concretos.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quienes
  lexicon: WLC/HALOT
  rationale: La cláusula relativa definitoria en español fluye mejor con ‘que’ sin perder el sentido personal.
- source_word: יִנְחֲלוּ
  english_pob_choice: shall assign the land to you as an inheritance
  chosen_spanish: les asignarán la tierra como herencia
  alternatives_spanish:
  - les darán la tierra como herencia
  - harán que hereden la tierra
  - les repartirán la tierra como herencia
  lexicon: WLC/HALOT
  rationale: El verbo en piel/causativo expresa la acción de hacer llegar la herencia o adjudicarla. ‘Asignarán’ mantiene la función administrativa destacada en el audit trail inglés, y ‘como herencia’ conserva el matiz de נחל sin convertirlo en una simple distribución civil.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: WLC/HALOT
  rationale: El destinatario plural se integra de manera natural en el español con pronombre átono de objeto indirecto.
- source_word: אֶת הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: WLC/HALOT
  rationale: ‘Tierra’ es la equivalencia habitual y adecuada para el objeto del reparto en este contexto israelita.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote culto
  - el kohén
  lexicon: WLC/HALOT
  rationale: El título sacerdotal se traduce con el término español corriente y bíblicamente inteligible.
- source_word: וִיהוֹשֻׁעַ
  english_pob_choice: and Joshua
  chosen_spanish: y Josué
  alternatives_spanish:
  - e Josué
  lexicon: WLC/HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: בִּן נוּן
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - hijo de Nun
  lexicon: WLC/HALOT
  rationale: La fórmula patronímica se vierte con la construcción española normal, preservando la identificación genealógica.
theological_decisions:
- issue: Sentido causativo del verbo de herencia
  english_pob_reading: who shall assign the land to you as an inheritance
  chosen_spanish_reading: que les asignarán la tierra como herencia
  alternative_spanish_readings:
  - que les darán la tierra como herencia
  - que harán que hereden la tierra
  rationale: El hebreo permite el matiz de ‘causar/heredar/asignar’. Se conserva la tensión semántica con ‘asignarán’ y ‘como herencia’, sin reducirlo a una mera donación ni a una herencia pasiva.
  doctrine_reference: Numerical allotment of the promised land in the Torah; covenant inheritance language.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo el matiz causativo del verbo y la estructura nominal de identificación sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene ‘tierra’ para הארץ en un sentido geográfico-covenantal.
  - Se traduce el título sacerdotal como ‘sacerdote’ por claridad y consistencia con el registro bíblico en español.
  - 'Los nombres propios se conservan en formas españolas estándar: Eleazar, Josué, Nun.'
  - No se añadieron notas al pie porque el matiz del verbo quedó integrado en la traducción principal sin necesidad de variante textual marcada.
