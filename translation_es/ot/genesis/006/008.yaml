lexical_decisions:
- source_word: וְ/נֹחַ
  english_pob_choice: But Noah
  chosen_spanish: Pero Noé
  alternatives_spanish:
  - Y Noé
  - Ahora bien, Noé
  lexicon: HALOT
  rationale: El וְ inicial aquí admite valor adversativo según el contexto inmediato de corrupción y juicio; en español, «Pero Noé» preserva ese contraste de forma natural y breve. El nombre propio se translitera como Noé.
- source_word: מָצָא
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - obtuvo
  lexicon: HALOT
  rationale: El verbo מצא en esta construcción idiomática se rinde bien con «halló», que mantiene la imagen de «encontrar favor» sin volverla más interpretativa con «obtuvo».
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  lexicon: HALOT
  rationale: «Favor» reproduce el valor idiomático de חֵן en «hallar favor» y evita cargar el término con una lectura teológica más específica de la que el verso exige de inmediato.
- source_word: בְּ/עֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: en los ojos de
  alternatives_spanish:
  - a los ojos de
  - a la vista de
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de la percepción/jucio mediante una expresión natural en español. «En los ojos de» es literal y clara; aquí se mantiene porque la frase idiomática es transparente en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Conforme al criterio del proyecto, el Tetragrama se vierte como «Yahvé» para preservar el nombre divino personal y no sustituirlo por un título.
theological_decisions:
- issue: Valor de חֵן aplicado a la relación divina con Noé
  english_pob_reading: favor
  chosen_spanish_reading: favor
  alternative_spanish_readings:
  - gracia
  rationale: «Favor» mantiene la idiomática hebrea y la disposición positiva de Yahvé hacia Noé sin forzar una terminología doctrinal posterior que el contexto no desarrolla.
  doctrine_reference: Translation philosophy §1, §3
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio de Dios revelado en el texto hebreo, siguiendo la convención establecida para el español de este proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la última pasada; no se registraron revisiones aplicadas. La redacción española sigue el mismo entendimiento, con ajuste idiomático natural a «halló favor» y el nombre divino «Yahvé» según la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene el contraste narrativo inicial con «Pero».
  - «Halló favor» conserva el giro hebreo sin expandir el sentido.
  - «Yahvé» sigue el estándar español del proyecto para יְהוָה.
  - La nota al pie preserva la alternativa léxica documentada entre «favor» y «gracia».
