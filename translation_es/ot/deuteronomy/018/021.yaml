translation:
  language: es
  text: 'Y si dices en tu corazón: «¿Cómo sabremos la palabra[a] que Yahvé no ha hablado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el asunto» o «el mensaje»; el hebreo davar puede referirse ampliamente a una palabra, mensaje o asunto. En este contexto profético, «palabra» encaja mejor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Y cuando
  lexicon: HALOT
  rationale: La partícula condicional introduce una situación hipotética ligada al contexto previo. «Y si» conserva la conexión discursiva y el valor condicional sin añadir contraste que el hebreo no exige.
- source_word: תֹאמַר
  english_pob_choice: you say
  chosen_spanish: dices
  alternatives_spanish:
  - dirás
  - decias
  lexicon: HALOT
  rationale: 'En español, el presente en una cláusula condicional es natural y mantiene el sentido directo de la segunda persona singular: «si dices». '
- source_word: בִּלְבָבֶךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - en tu mente
  - para ti
  lexicon: HALOT
  rationale: El hebreo usa el idioma del «corazón» como sede de pensamiento interior. «En tu corazón» preserva la imagen bíblica y su peso idiomático; «en tu mente» suaviza demasiado el lenguaje fuente.
- source_word: אֵיכָה
  english_pob_choice: How shall
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera
  - ¿Cómo podremos
  lexicon: HALOT
  rationale: En español, la pregunta natural conserva la fuerza deliberativa con simplemente «¿Cómo…?», sin forzar un futuro auxiliar que el castellano no necesita.
- source_word: נֵדַע
  english_pob_choice: we know
  chosen_spanish: sabremos
  alternatives_spanish:
  - conoceremos
  - discerniremos
  lexicon: HALOT
  rationale: El plural incluye al hablante comunitario implícito. «Sabremos» transmite el acto de reconocer/identificar de manera idiomática y directa; «conoceremos» sería más pesado y «discerniremos» añade interpretación.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - el mensaje
  - la cosa
  lexicon: HALOT
  rationale: Aunque דָּבָר puede abarcar palabra, asunto o mensaje, el contexto profético de una voz atribuida a Yahvé favorece «la palabra» para referirse al oráculo pronunciado.
- source_word: אֲשֶׁר לֹא דִבְּרוֹ
  english_pob_choice: that ... has not spoken
  chosen_spanish: que ... no ha hablado
  alternatives_spanish:
  - que ... no habló
  - que ... no ha dicho
  lexicon: HALOT
  rationale: El verbo hablar preserva la idea de una declaración divina. El presente perfecto «no ha hablado» refleja bien el hebreo y mantiene la pregunta sobre si Yahvé es la fuente del mensaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el Nombre divino, adaptándolo a la forma española «Yahvé» en lugar de sustituirlo por un título.
theological_decisions:
- issue: Tratamiento del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El versículo pregunta cómo reconocer una palabra que no procede del Dios del pacto. Mantener el Nombre propio en español conserva la decisión doctrinal del proyecto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés y la revisión automática coinciden en alta concordancia; no se registraron cambios necesarios. La redacción española sigue el mismo sentido auditado, preservando el idioma del «corazón», la pregunta deliberativa y el valor profético de דָּבָר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «corazón» como calco idiomático controlado, no como referencia emotiva.
  - «Palabra» se usa en sentido profético para דָּבָר, sin ampliar innecesariamente a «asunto» en el texto principal.
  - La primera persona plural implícita del hebreo se expresa naturalmente con «sabremos».
