translation:
  language: es
  text: Y lo degolló, y Moisés tomó la sangre y la puso sobre los cuernos del altar en todo alrededor con su dedo, y purificó el altar[a], y derramó la sangre en la base del altar, y lo consagró para hacer expiación sobre él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo limpió». En este contexto ritual, el verbo hebreo significa purificar de impureza; no significa hacer pecar al altar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para hacer expiación por él» o «para purgarlo». El verbo hebreo tiene sentido sacrificial de expiación o purificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחָט
  english_pob_choice: he slaughtered it
  chosen_spanish: lo degolló
  alternatives_spanish:
  - lo sacrificó
  - lo mató
  lexicon: HALOT
  rationale: En contexto sacrificial, שָׁחַט indica degollar/degollamiento ritual, no matar en sentido general. "Degolló" conserva la concreción cultual y la acción física del rito mejor que un verbo más genérico.
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  lexicon: HALOT
  rationale: דָּם se traduce de forma directa como "sangre"; el contexto ya implica la sangre sacrificial sin añadir explicaciones.
- source_word: קַרְנוֹת הַמִּזְבֵּחַ
  english_pob_choice: the horns of the altar
  chosen_spanish: los cuernos del altar
  alternatives_spanish:
  - las protuberancias del altar
  lexicon: HALOT
  rationale: El término cultual estable en español es "cuernos del altar"; preserva la imagen técnica y reconocible del objeto ritual.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - por todos lados
  lexicon: HALOT
  rationale: El adverbio marca distribución en todo el contorno. "Alrededor" comunica bien la extensión sin sonar forzado en español.
- source_word: בְּאֶצְבָּעוֹ
  english_pob_choice: with his finger
  chosen_spanish: con su dedo
  alternatives_spanish:
  - con el dedo
  lexicon: HALOT
  rationale: El singular con sufijo posesivo se refleja naturalmente como "su dedo". Mantiene el detalle instrumental del rito.
- source_word: וַיְחַטֵּא אֶת־הַמִּזְבֵּחַ
  english_pob_choice: he purified the altar
  chosen_spanish: purificó el altar
  alternatives_spanish:
  - limpió el altar
  - expiò el altar
  lexicon: HALOT
  rationale: En contexto sacerdotal, חטא en piel tiene sentido de purificar/ritualmente descontaminar, no de "pecar". "Purificó" preserva ese valor cultual de manera clara en español.
- source_word: יָצַק אֶל־יְסוֹד הַמִּזְבֵּחַ
  english_pob_choice: he poured out the blood at the base of the altar
  chosen_spanish: derramó la sangre en la base del altar
  alternatives_spanish:
  - vertió la sangre al fundamento del altar
  lexicon: HALOT
  rationale: יָצַק expresa verter/derramar. Para יְסוֹד, "base" es la equivalencia natural en terminología del altar y evita una literalidad menos idiomática como "fundamento".
- source_word: וַיְקַדְּשֵׁהוּ
  english_pob_choice: and consecrated it
  chosen_spanish: lo consagró
  alternatives_spanish:
  - lo santificó
  - lo hizo santo
  lexicon: HALOT
  rationale: קדשׁ en este rito implica apartar algo para uso sagrado. "Consagró" es una traducción sobria y eclesialmente inteligible que mantiene el sentido de dedicación sagrada.
- source_word: לְכַפֵּר עָלָיו
  english_pob_choice: to make atonement on it
  chosen_spanish: para hacer expiación sobre él
  alternatives_spanish:
  - para hacer expiación por él
  - para hacer propiciación sobre él
  lexicon: HALOT
  rationale: Se conserva la preposición hebrea con "sobre él", como en el ajuste del inglés POB a "on it". "Hacer expiación" retiene el peso sacrificial de כפר sin ocultarlo tras una paráfrasis.
theological_decisions:
- issue: Sentido ritual de חטא en contexto sacerdotal
  english_pob_reading: he purified the altar
  chosen_spanish_reading: purificó el altar
  alternative_spanish_readings:
  - limpió el altar
  rationale: La acción no atribuye pecado al altar; describe su purificación ritual mediante sangre. "Purificó" mantiene la teología cultual del pasaje y evita una lectura moral ajena al contexto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de כפר con objeto inanimado (el altar)
  english_pob_reading: to make atonement on it
  chosen_spanish_reading: para hacer expiación sobre él
  alternative_spanish_readings:
  - para hacer expiación por él
  - para purgarlo
  rationale: El verbo כפר conserva su densidad sacrificial. "Hacer expiación" es suficientemente técnico y bíblico; "sobre él" refleja mejor la preposición hebrea y evita suavizar el rito.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó la frase final de «for it» a «on it» para reflejar con más precisión la preposición hebrea עָלָיו; por eso el español usa «sobre él». También se conservó la distinción ritual de חטא como purificación cultual y no como pecado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto, pero este versículo no contiene el nombre divino.
  - Se usa «expiación» para כפר, coherente con el registro sacrificial del POB y con la nota de valor cultual.
  - «Altar» se conserva sin expandirlo, porque el hebreo no añade especificación adicional en este versículo.
  - La puntuación separa las acciones rituales principales con comas y punto y coma para reflejar la cadencia del hebreo sin sobrecargar la sintaxis española.
