translation:
  text: So he said these things[a]; but they, having been released in a moment, blessed their holy Savior God[b], having just escaped death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a moment' or 'without delay.' The Greek idiom ἐν ἀμερεῖ χρόνῳ denotes a very short interval.
    reason: lexical_alternative
  - marker: b
    text: Or 'their holy God and savior.' The Greek phrase can be understood as a compact string of titles for God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλεξεν
  chosen: spoke
  alternatives:
  - said
  - declared
  - related
  lexicon: LSJ
  rationale: The verb can mean 'set forth' or 'speak out.' In this narrative context, 'spoke' gives natural English while preserving that he uttered the preceding words.
- source_word: ἐν ἀμερεῖ χρόνῳ
  chosen: in no time
  alternatives:
  - in a moment
  - without delay
  - in a very short time
  lexicon: LSJ
  rationale: The idiom denotes an exceedingly brief interval. 'In no time' is a readable modern equivalent that preserves the sense of immediate release.
- source_word: λυθέντες
  chosen: having been released
  alternatives:
  - having been freed
  - having been loosed
  lexicon: LSJ
  rationale: The passive participle indicates being set free from restraint or danger. 'Released' fits the immediate context and reads naturally in English.
- source_word: τὸν ἅγιον σωτῆρα θεὸν αὐτῶν
  chosen: their holy savior God
  alternatives:
  - their holy God and savior
  - their holy saving God
  - their holy deliverer God
  lexicon: LSJ
  rationale: The Greek places all three terms together as a single description of God. 'Their holy savior God' preserves the appositional force without splitting it into two titles not explicit in the text.
- source_word: ηὐλόγουν
  chosen: blessed
  alternatives:
  - praised
  - spoke well of
  lexicon: LSJ
  rationale: The verb is the standard term for blessing. 'Blessed' keeps the biblical register and avoids flattening it to mere praise.
- source_word: ἄρτι
  chosen: just
  alternatives:
  - now
  - only now
  - at that very moment
  lexicon: LSJ
  rationale: Here it marks the immediacy of their deliverance. 'Just' communicates that they had only now escaped death.
- source_word: τὸν θάνατον ἐκπεφυγότες
  chosen: having just escaped death
  alternatives:
  - having fled from death
  - having escaped from death
  lexicon: LSJ
  rationale: The perfect participle conveys completed escape with present result. 'Having just escaped death' captures both the completed action and the immediate context.
