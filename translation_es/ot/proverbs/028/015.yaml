  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura comparativa y el sentido básico del hebreo: un gobernante malvado comparado con un león rugiente y un oso agresivo sobre un pueblo pobre. Sin embargo, en español la construcción «Como león rugiente y como oso que se lanza, así es...» suena algo pesada y menos proverbial que una formulación directa con «es».'
  spanish_quality_summary: La redacción es clara y fiel, pero puede mejorar en naturalidad y fuerza proverbial. «Gobernante impío» es defendible, aunque «gobernante malvado» conecta más directamente con רָשָׁע en un proverbio de opresión social. Además, la nota puede alinearse más estrechamente con la evidencia inglesa al incluir también «voraz/rabioso» como alternativa posible.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones «león», «oso», «gobernante», «pueblo», «pobre» están bien encaminadas. Para רָשָׁע, «malvado» encaja mejor con el valor ético general del hebreo aquí que «impío», que en español puede sonar más específicamente religioso. La nota sobre שׁוֹקֵק debe preservar mejor las alternativas documentadas: movimiento violento o hambre depredadora.'
  issues:
  - severity: medium
    issue: La construcción comparativa española suena algo forzada
    rationale: 'El hebreo presenta una comparación nominal muy compacta. En español proverbial resulta más natural «León rugiente y oso que se lanza: así es...» o «Como... es...». La forma actual duplica «como» y luego añade «así es», lo que recarga el verso.'
  - severity: medium
    issue: «Impío» puede estrechar innecesariamente el sentido de רָשָׁע
    rationale: Aunque no es incorrecto, «impío» en español suele enfatizar irreverencia religiosa. En este contexto sapiencial de opresión y mal gobierno, «malvado» transmite mejor el carácter moral amplio del término.
  - severity: low
    issue: La nota al pie no refleja del todo la alternativa predatoria documentada
    rationale: El audit trail inglés preserva explícitamente «ravenous» además de «rushing/charging». La nota española alude al impulso depredador, pero conviene nombrar una alternativa léxica más directa como «voraz».
  revised_spanish_text: 'León rugiente y oso[a] que se lanza: así es un gobernante malvado sobre un pueblo pobre.'
