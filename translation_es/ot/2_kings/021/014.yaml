review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: abandono judicial del remanente de la heredad de Dios, entrega al poder enemigo y resultado de saqueo general. Sin embargo, hay dos desajustes menores con el expediente POB: el texto español pierde el matiz resultativo de וְהָיוּ al usar solo ''serán'' donde ''llegarán a ser'' o ''vendrán a ser'' lo preserva mejor, y la nota sobre נַחֲלָתִי invierte la alternativa documentada en inglés, que privilegia ''herencia'' y da ''heritage'' como alternativa, no al revés.'
  spanish_quality_summary: El español es claro y digno, pero 'en mano de' suena algo calcado; 'en manos de' es más natural y sigue siendo bíblico. 'Mi heredad' es defendible por registro bíblico, pero en español general eclesial latinoamericano 'mi herencia' resulta más claro sin perder la fuerza pactal, especialmente dado que la nota inglesa justamente preserva 'heritage' como alternativa. La frase completa mejora en naturalidad con 'llegarán a ser botín y despojo'.
  glossary_alignment: 'No hay conflicto con los términos globales del proyecto. El tratamiento de נחלה debe alinearse mejor con la decisión auditada: opción principal española ''herencia'' con nota alternativa ''heredad'' para conservar el matiz pactal/territorial. ''Remanente'' y el doblete ''botín y despojo'' están bien alineados.'
  issues:
  - severity: medium
    issue: La base principal 'mi heredad' no sigue de cerca la decisión auditada 'my inheritance'
    rationale: Aunque 'heredad' es posible, el expediente inglés hace de 'inheritance' la lectura principal y deja 'heritage' como alternativa. En español, 'herencia' corresponde mejor a 'inheritance', mientras 'heredad' puede quedar como alternativa explicativa.
  - severity: low
    issue: La nota al pie invierte la relación principal/alternativa para נַחֲלָתִי
    rationale: La nota actual dice que 'heredad' puede entenderse como 'herencia', pero la documentación POB hace principal 'inheritance' y alternativa 'heritage'. Conviene que la nota española diga que 'herencia' también puede traducirse 'heredad'.
  - severity: low
    issue: '''Serán'' atenúa el matiz resultativo de וְהָיוּ'
    rationale: El hebreo aquí expresa el resultado de haber sido entregados a sus enemigos; 'llegarán a ser' comunica mejor ese desarrollo sin sonar forzado.
  - severity: low
    issue: '''En mano de'' suena poco natural en español actual'
    rationale: '''En manos de'' conserva el modismo bíblico y mejora la fluidez y legibilidad.'
  revised_spanish_text: Y yo abandonaré el remanente de mi herencia[a] y los entregaré en manos de sus enemigos, y llegarán a ser botín y despojo para todos sus enemigos.
  revised_footnotes:
