translation:
  language: es
  text: ¿No hay bálsamo en Galaad? ¿No hay allí médico? ¿Por qué entonces no ha llegado la curación de la hija de mi pueblo?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «resina» o «bálsamo». El término hebreo se refiere a una goma o resina medicinal asociada con Galaad.
    reason: lexical_alternative
  - marker: b
    text: O «recuperación» o «restauración» para «la curación».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֳרִי
  english_pob_choice: balm
  chosen_spanish: bálsamo
  alternatives_spanish:
  - resina
  - ungüento
  - bálsamo medicinal
  lexicon: HALOT
  rationale: צֳרִי designa una resina o bálsamo medicinal asociado con Galaad. «Bálsamo» conserva el sentido curativo y el tono natural del verso en español; «resina» sería más técnico y menos evocador en este contexto.
- source_word: אֵין
  english_pob_choice: there is no / is there no
  chosen_spanish: ¿No hay... ?
  alternatives_spanish:
  - No hay...
  - ¿Acaso no hay...?
  lexicon: HALOT
  rationale: La partícula expresa inexistencia y, en preguntas retóricas, el español natural es «¿No hay...?»; mantiene la fuerza interrogativa sin volver la frase pesada.
- source_word: בְּגִלְעָד
  english_pob_choice: in Gilead
  chosen_spanish: en Galaad
  alternatives_spanish:
  - en Gilead
  lexicon: HALOT
  rationale: 'Se translitera el topónimo según el uso español bíblico más extendido y legible: «Galaad». Mantiene la referencia geográfica directa.'
- source_word: אִם
  english_pob_choice: (interrogative force carried as a second question)
  chosen_spanish: ¿No hay allí... ?
  alternatives_spanish:
  - si
  - acaso
  lexicon: HALOT
  rationale: Aquí אִם introduce una segunda pregunta paralela, no una condición. En español se refleja con una nueva interrogación coordinada, preservando la retórica del hebreo.
- source_word: רֹפֵא
  english_pob_choice: physician
  chosen_spanish: médico
  alternatives_spanish:
  - sanador
  - curandero
  - físico
  lexicon: HALOT
  rationale: El participio indica una persona que cura. «Médico» funciona de modo natural junto con «bálsamo» y conserva el campo médico del paralelismo; «sanador» podría sugerir connotaciones distintas no presentes en el hebreo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio de lugar referido a Galaad. «Allí» es claro y formalmente adecuado en español bíblico contemporáneo.
- source_word: כִּי מַדּוּעַ
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué entonces
  alternatives_spanish:
  - ¿Por qué pues
  - ¿Y por qué entonces
  lexicon: HALOT
  rationale: La combinación introduce la consecuencia o inferencia de las preguntas anteriores. «¿Por qué entonces» reproduce bien el flujo argumentativo sin recurrir a un calco rígido.
- source_word: לֹא עָלְתָה
  english_pob_choice: has ... not come about
  chosen_spanish: no ha sobrevenido
  alternatives_spanish:
  - no ha surgido
  - no ha aparecido
  - no ha llegado
  lexicon: HALOT
  rationale: עלה puede expresar venir/levantarse/manifestarse; con אֲרֻכָה aquí apunta a la aparición o llegada de la curación. «No ha sobrevenido» comunica el sentido resultativo de manera natural y digna en español.
- source_word: אֲרֻכַת
  english_pob_choice: the healing
  chosen_spanish: la curación
  alternatives_spanish:
  - la sanidad
  - la recuperación
  - el remedio
  lexicon: HALOT
  rationale: El sustantivo refiere a curación o restablecimiento de la salud. «Curación» es preciso, breve y apropiado para el paralelismo médico del versículo.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - mi pueblo
  - mi querida gente
  - la hija de mi pueblo Israel
  lexicon: HALOT
  rationale: Se conserva la personificación profética. No se aplanó a «mi pueblo» porque la imagen de «hija» lleva la carga emocional y literaria del hebreo.
theological_decisions:
- issue: Cómo traducir la personificación «daughter of my people» sin perder su fuerza profética
  english_pob_reading: Retain 'the daughter of my people' in the main text
  chosen_spanish_reading: Retener «la hija de mi pueblo» en el texto principal
  alternative_spanish_readings:
  - mi pueblo
  - mi querida gente
  rationale: La expresión no es solo referencial; personifica al pueblo y sostiene el pathos lamentacional del profeta. Mantenerla evita diluir la imagen y no introduce un contenido doctrinal ajeno.
  doctrine_reference: 'Principio POB de equivalencia óptima: preservar el valor literario y teológico del original sin explicitar de más.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no hubo cambios posteriores; el control cruzado indicó alta concordancia y sin problemas sustanciales. La redacción española sigue el audit trail inglés, pero ajusta el registro para un español bíblico natural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «Galaad» como forma española estable del topónimo, manteniendo la referencia geográfica bíblica.
  - Se preservó la imagen «la hija de mi pueblo» porque el hebreo usa una personificación que no conviene neutralizar.
  - Las preguntas retóricas se mantuvieron como tales en español para reflejar la estructura paralela del hebreo.
