translation:
  language: es
  text: 'y algunas mujeres que habían sido sanadas[a] de espíritus malos y de enfermedades: María, llamada Magdalena, de quien habían salido siete demonios[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciertas mujeres».
    reason: lexical_alternative
  - marker: b
    text: O «de quien habían salido de ella siete demonios».
    reason: lexical_alternative
lexical_decisions:
- source_word: γυναῖκές τινες
  english_pob_choice: some women
  chosen_spanish: algunas mujeres
  alternatives_spanish:
  - ciertas mujeres
  lexicon: BDAG
  rationale: τινες con el plural indefinido expresa un subconjunto no especificado. «Algunas mujeres» suena natural en español y conserva esa indefinición sin volverlo más técnico de lo necesario.
- source_word: τεθεραπευμέναι
  english_pob_choice: had been healed
  chosen_spanish: habían sido sanadas
  alternatives_spanish:
  - habían sido curadas
  lexicon: BDAG
  rationale: El participio perfecto pasivo con ἦσαν da idea de una sanación previa con resultado vigente. «Sanadas» es amplio y puede abarcar tanto dolencias como aflicción espiritual en este contexto; «curadas» sería más restringido a lo físico.
- source_word: ἀπὸ πνευμάτων πονηρῶν
  english_pob_choice: from evil spirits
  chosen_spanish: de espíritus malos
  alternatives_spanish:
  - de espíritus malignos
  - de espíritus impuros
  lexicon: BDAG
  rationale: πονηρός significa «malo/evil»; el griego no usa ἀκάθαρτος, así que evito «impuros». «Espíritus malos» reproduce la distinción del texto frente a las enfermedades sin introducir una categoría distinta.
- source_word: καὶ ἀσθενειῶν
  english_pob_choice: and sicknesses
  chosen_spanish: y de enfermedades
  alternatives_spanish:
  - y de dolencias
  - y de infirmidades
  lexicon: BDAG
  rationale: ἀσθένεια aquí apunta a debilidad o enfermedad corporal. «Enfermedades» es claro y natural en español; mantiene el paralelo con la sanación mencionada antes.
- source_word: ἡ καλουμένη Μαγδαληνή
  english_pob_choice: called Magdalene
  chosen_spanish: llamada Magdalena
  alternatives_spanish:
  - conocida como Magdalena
  - a la que llamaban Magdalena
  lexicon: BDAG
  rationale: El participio καλουμένη identifica a María por su designación. «Llamada Magdalena» es breve, fiel y de uso natural en español bíblico moderno.
- source_word: ἀφ’ ἧς
  english_pob_choice: from whom
  chosen_spanish: de quien
  alternatives_spanish:
  - de la cual
  - de donde
  lexicon: BDAG
  rationale: La preposición con relativo marca origen/separación. «De quien» funciona bien en español para una persona y mantiene la relación de procedencia.
- source_word: δαιμόνια ἑπτὰ
  english_pob_choice: seven demons
  chosen_spanish: siete demonios
  alternatives_spanish:
  - siete espíritus malos
  lexicon: BDAG
  rationale: δαιμόνια designa demonios, no simplemente una metáfora de enfermedad. «Demonios» conserva la fuerza personal del término y la distinción con πνεύματα πονηρά.
- source_word: ἐξεληλύθει
  english_pob_choice: had gone out
  chosen_spanish: habían salido
  alternatives_spanish:
  - habían salido de ella
  - habían salido fuera
  lexicon: BDAG
  rationale: El pluscuamperfecto de ἐξέρχομαι indica salida anterior al momento narrado. «Habían salido» es idiomático en español y conserva la idea de partida ya completada.
theological_decisions:
- issue: Distinción entre aflicción espiritual y enfermedad corporal
  english_pob_reading: The verse is translated with personal demonic language ('evil spirits,' 'demons') rather than reduced to metaphor for illness.
  chosen_spanish_reading: Se mantiene el lenguaje personal de espíritus y demonios, sin reducirlo a metáfora de enfermedad.
  alternative_spanish_readings:
  - Interpretar demonios como mera metáfora psicológica o médica
  - Fusionar espíritus y enfermedades en una sola categoría
  rationale: El griego distingue explícitamente πνευμάτων πονηρῶν de ἀσθενειῶν y luego menciona δαιμόνια. La versión española conserva esa separación para no borrar la tensión textual entre lo espiritual y lo físico.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indica que no fueron necesarios cambios y que el consenso de auditoría es alto; por eso la redacción española conserva las decisiones semánticas principales del análisis fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene la distinción entre «espíritus malos» y «demonios», siguiendo el griego.
  - Se emplea «sanadas» para abarcar tanto sanidad física como liberación de aflicción, sin explicar de más.
  - Los pies de nota ofrecen alternativas reales sin duplicar el sentido principal.
