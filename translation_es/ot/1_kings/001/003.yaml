translation:
  language: es
  text: Y buscaron por todo el territorio de Israel una joven hermosa[a], y hallaron a Abisag la sunamita[b], y la llevaron al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «buscaron una joven hermosa por todo el territorio de Israel».'
    reason: lexical_alternative
  - marker: b
    text: «La sunamita» indica que era una mujer de Sunem.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְבַקְשׁוּ
  english_pob_choice: they searched
  chosen_spanish: buscaron
  alternatives_spanish:
  - buscaron con diligencia
  - anduvieron buscando
  lexicon: HALOT
  rationale: בקשׁ expresa buscar/solicitar; en español, "buscaron" comunica de manera natural la acción narrativa de recorrer el país en una búsqueda activa, sin añadir matices no presentes en el hebreo.
- source_word: נַעֲרָה
  english_pob_choice: young woman
  chosen_spanish: joven
  alternatives_spanish:
  - muchacha
  - doncella
  - joven mujer
  lexicon: HALOT
  rationale: נַעֲרָה se refiere a una mujer joven, generalmente en edad casadera. En español, usar solo "joven" como sustantivado evita el tono arcaico de "doncella" y la posible menor edad sugerida por "muchacha".
- source_word: יָפָה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  lexicon: HALOT
  rationale: El adjetivo describe belleza física de forma directa. "Hermosa" es natural en español bíblico moderno y conserva el valor estético sin rebajar el tono.
- source_word: בְּכֹל גְּבוּל יִשְׂרָאֵל
  english_pob_choice: throughout all the territory of Israel
  chosen_spanish: por todo el territorio de Israel
  alternatives_spanish:
  - en todo el territorio de Israel
  - por todos los límites de Israel
  lexicon: HALOT
  rationale: גְּבוּל puede significar borde, frontera o territorio. Aquí la idea es una búsqueda extensa por la tierra de Israel, no solo por una línea fronteriza; por eso "por todo el territorio" conserva bien el alcance.
- source_word: וַיִּמְצְאוּ
  english_pob_choice: they found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - descubrieron
  lexicon: HALOT
  rationale: El hebreo narra el hallazgo como resultado de la búsqueda. "Hallaron" mantiene un registro bíblico sobrio y corresponde al sentido de encontrar algo tras buscarlo.
- source_word: אֶת אֲבִישַׁג הַשּׁוּנַמִּית
  english_pob_choice: Abishag the Shunammite
  chosen_spanish: Abisag la sunamita
  alternatives_spanish:
  - Abisag de Sunem
  - Abisag, la mujer de Sunem
  lexicon: HALOT
  rationale: Se translitera el nombre propio como Abisag y el gentilicio se conserva con el valor tradicional de procedencia. "Sunamita" reproduce bien la forma del hebreo y su identificación geográfica.
- source_word: וַיָּבִאוּ אֹתָהּ לַמֶּלֶךְ
  english_pob_choice: brought her to the king
  chosen_spanish: la llevaron al rey
  alternatives_spanish:
  - la trajeron al rey
  - la introdujeron ante el rey
  lexicon: HALOT
  rationale: ביאר en hifil expresa traer/llevar. "La llevaron al rey" es claro y no añade la idea de entrada formal que no está explícita en el hebreo.
translation_notes:
  revision_awareness: 'Base textual alineada con el WLC y con el audit trail en inglés: se mantuvo el sentido narrativo simple de búsqueda, hallazgo y traslado, sin añadir elementos interpretativos. La revisión más reciente del expediente no introdujo cambios; se conserva el acuerdo alto del cotejo.'
  spanish_consistency_notes:
  - Se prefirió "Yahvé" como terminología general del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se mantuvo el orden narrativo del hebreo: búsqueda > hallazgo > traslado al rey.'
  - Se evitó "reina" o cualquier inferencia de estatus; el texto solo dice "el rey".
  - Las notas a y b replican las alternativas y la aclaración cultural del POB inglés, adaptadas a español natural.
