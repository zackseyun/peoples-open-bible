translation:
  language: es
  text: Un guerrero que falla por necesidad, y hombres de entendimiento si son tratados como desecho[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego es sintácticamente incompleto en sí mismo y parece continuar el pensamiento en la línea siguiente; por eso la traducción conserva la forma fragmentaria sin convertirla en una oración completa.
    reason: textual_variant
  - marker: b
    text: 'O: «si son tratados como estiércol». El verbo y su base léxica pueden intensificar la imagen de algo inmundo y arrojado fuera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ πολεμιστής
  english_pob_choice: a warrior
  chosen_spanish: un guerrero
  alternatives_spanish:
  - un hombre de guerra
  - un hombre guerrero
  - un combatiente
  lexicon: LSJ
  rationale: ἀνὴρ πολεμιστής nombra a un hombre caracterizado por la guerra o la lucha. «Guerrero» es natural en español, conserva el singular masculino y comunica la fuerza militar sin añadir matices ajenos.
- source_word: ὑστερῶν
  english_pob_choice: failing
  chosen_spanish: que falla
  alternatives_spanish:
  - que falta
  - que se queda corto
  - que desfallece
  lexicon: LSJ
  rationale: El participio puede expresar carencia o quedar insuficiente. Dado que el contexto inmediato ya incluye la idea de necesidad/escasez, «que falla» reproduce la noción de disminución o fracaso por falta, en una forma breve y fiel al fragmento.
- source_word: διʼ ἔνδειαν
  english_pob_choice: through want
  chosen_spanish: por necesidad
  alternatives_spanish:
  - por falta
  - por pobreza
  - a causa de la carencia
  lexicon: LSJ
  rationale: ἔνδεια significa necesidad, carencia o pobreza. «Por necesidad» es idiomático en español y mantiene el valor causal de διά con el acusativo sin volverlo más explicativo de lo que el griego permite.
- source_word: ἄνδρες συνετοί
  english_pob_choice: men of understanding
  chosen_spanish: hombres de entendimiento
  alternatives_spanish:
  - hombres prudentes
  - hombres sabios
  - hombres entendidos
  lexicon: LSJ
  rationale: συνετός alude a discernimiento y comprensión práctica. «Hombres de entendimiento» conserva el plural masculino y el matiz de discernimiento, sin reducirlo a mera sabiduría abstracta.
- source_word: ἐὰν σκυβαλωθῶσιν
  english_pob_choice: if they are treated as refuse
  chosen_spanish: si son tratados como desecho
  alternatives_spanish:
  - si son tratados como basura
  - si son arrojados como estiércol
  - si se los considera desecho
  lexicon: LSJ
  rationale: El verbo deriva de σκύβαλον, algo arrojado como basura o excremento. «Desecho» preserva la imagen de algo descartado y despreciable, con un registro publicable en español. Evita suavizar el desprecio del original.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que cambió «growing weak» por «failing» para reflejar con mayor precisión ὑστερῶν. También conserva el carácter fragmentario del griego y la segunda imagen degradante de σκυβαλωθῶσιν sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «guerrero» para ἀνὴρ πολεμιστής, en línea con el inglés POB «warrior».
  - «Hombres de entendimiento» conserva la estructura del inglés POB y la fuerza de συνετοί.
  - «Desecho» traduce la imagen de σκυβαλωθῶσιν de manera fiel y suficientemente digna para lectura pública.
  - La puntuación con coma final refleja el carácter de fragmento del verso en el texto griego.
