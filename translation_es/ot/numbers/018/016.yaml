  - severity: low
    issue: 'Redacción de la nota: ''El pronombre hebreo "es"'''
    rationale: En hebreo, 'es' no es un pronombre. La nota debe decir que el pronombre hebreo 'ello/este' se refiere al siclo del santuario como patrón de peso.
