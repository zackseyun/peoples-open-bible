translation:
  language: es
  text: Ya no se contaminarán más con sus ídolos[a], con sus cosas detestables ni con ninguna de sus rebeliones. Los salvaré de todas sus apostasías[b], por las cuales pecaron, y los purificaré. Entonces serán mi pueblo, y yo seré su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa aquí un término fuertemente despectivo para los ídolos.
    reason: lexical_alternative
  - marker: b
    text: 'O: «de todos sus asentamientos donde pecaron»; algunos entienden la frase más ampliamente como rescate de todos los lugares o circunstancias asociados con su pecado.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִטַמְּאוּ
  english_pob_choice: defile themselves
  chosen_spanish: se contaminarán
  alternatives_spanish:
  - se harán impuros
  - se mancharán ritualmente
  lexicon: HALOT
  rationale: El hitpael expresa auto-contaminación; en español, «contaminarse» comunica bien la acción reflexiva y el peso moral/cultual sin sonar tan técnico como «hacerse impuros». En este contexto de restauración, conserva la fuerza negativa del verbo hebreo.
- source_word: גִּלּוּלֵיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos despreciables
  - sus ídolos inmundos
  lexicon: HALOT
  rationale: El término es despectivo en hebreo. Mantengo «ídolos» como base clara y publicación-readable; el matiz peyorativo se conserva por el contexto y puede anotarse en nota, sin introducir un compuesto demasiado interpretativo en el texto principal.
- source_word: שִׁקּוּצֵיהֶם
  english_pob_choice: their detestable things
  chosen_spanish: sus cosas detestables
  alternatives_spanish:
  - sus abominaciones
  - sus horrores
  lexicon: HALOT
  rationale: «Cosas detestables» reproduce el valor de repulsión del sustantivo y su amplitud referencial mejor que «abominaciones», que en español puede sonar más tradicional pero también más opaca o formulística.
- source_word: פִּשְׁעֵיהֶם
  english_pob_choice: their transgressions
  chosen_spanish: sus rebeliones
  alternatives_spanish:
  - sus transgresiones
  - sus ofensas
  lexicon: HALOT
  rationale: פשע suele llevar fuerza de ruptura/insurrección contra la autoridad debida. Elegí «rebeliones» porque preserva mejor ese peso de quebrantamiento covenantal que un «transgresiones» más general.
- source_word: וְהוֹשַׁעְתִּי
  english_pob_choice: I will save them
  chosen_spanish: Los salvaré
  alternatives_spanish:
  - Los libraré
  - Los rescataré
  lexicon: HALOT
  rationale: «Salvar» corresponde bien al campo semántico de ישׁע y preserva su alcance teológico. En español suena natural y fuerte, sin restringir el acto divino a un mero escape físico.
- source_word: מוֹשְׁבֹתֵיהֶם
  english_pob_choice: their dwelling places
  chosen_spanish: sus apostasías
  alternatives_spanish:
  - sus moradas
  - sus asentamientos
  lexicon: HALOT
  rationale: 'Sigo la revisión inglesa más reciente y la lectura contextual preferida: en este versículo la frase se entiende mejor como una referencia a las situaciones/entornos de infidelidad, no simplemente a lugares geográficos. «Apostasías» recoge la decisión lexical del POB inglés y el trasfondo de alejamiento del pacto.'
- source_word: אֲשֶׁר חָטְאוּ בָהֶם
  english_pob_choice: by which they have sinned
  chosen_spanish: por las cuales pecaron
  alternatives_spanish:
  - en las cuales pecaron
  - con las cuales pecaron
  lexicon: HALOT
  rationale: La relación entre antecedente y relativo es difícil. «Por las cuales pecaron» conserva la conexión causal/instrumental que la revisión inglesa quiso resaltar, sin decidir de forma rígida entre lugar, medio o circunstancia.
- source_word: וְטִהַרְתִּי
  english_pob_choice: I will cleanse them
  chosen_spanish: los purificaré
  alternatives_spanish:
  - los limpiaré
  - los haré puros
  lexicon: HALOT
  rationale: «Purificar» preserva el doble trasfondo ritual y moral del verbo. Aunque «limpiar» es posible, «purificar» comunica mejor en español la restauración cultual que sigue al rescate.
- source_word: וְהָיוּ לִי לְעָם
  english_pob_choice: they will be my people
  chosen_spanish: serán mi pueblo
  alternatives_spanish:
  - llegarán a ser mi pueblo
  - serán un pueblo para mí
  lexicon: HALOT
  rationale: Es la fórmula de pacto estándar. «Serán mi pueblo» suena natural en español y conserva la resonancia bíblica sin sobre-explicar la construcción hebrea.
- source_word: וַאֲנִי אֶהְיֶה לָהֶם לֵאלֹהִים
  english_pob_choice: I will be their God
  chosen_spanish: yo seré su Dios
  alternatives_spanish:
  - seré Dios para ellos
  - yo seré Dios de ellos
  lexicon: HALOT
  rationale: Mantengo la fórmula de pacto correlativa. «Yo seré su Dios» es idiomática y conserva el paralelismo con «serán mi pueblo».
theological_decisions:
- issue: 'Sentido de la salvación: rescate de lugares, de estados de apostasía o de ambos'
  english_pob_reading: The verse speaks of God's restorative rescue from the contexts in which Israel sinned, leading to cleansing and renewed covenant relationship.
  chosen_spanish_reading: El versículo presenta el rescate restaurador de Dios de las apostasías y de las condiciones asociadas al pecado de Israel, seguido de purificación y renovación del pacto.
  alternative_spanish_readings:
  - Dios los rescatará de sus lugares de residencia donde pecaron
  - Dios los rescatará solo de sus apostatías internas
  rationale: La revisión inglesa favorece entender la frase difícil no meramente como topografía, sino como contexto de infidelidad. En español conviene explicitar «apostasías» para no perder ese giro interpretativo, sin cerrar del todo la posibilidad espacial/circunstancial que permanece en el hebreo.
  doctrine_reference: Preservar la tensión interpretativa del texto fuente.
- issue: Valor del término despectivo para ídolos
  english_pob_reading: Hebrew 'idols' here uses a strongly contemptuous term for false gods.
  chosen_spanish_reading: «Ídolos» en el texto principal, con nota sobre el matiz despectivo del hebreo.
  alternative_spanish_readings:
  - ídolos inmundos
  - ídolos repugnantes
  - muñecos/idolillos
  rationale: El español puede perder el desdén específico del hebreo si se exagera en el texto principal. Conservar «ídolos» mantiene claridad y deja el matiz pejorativo para una nota, como hizo el POB inglés.
  doctrine_reference: Respeto del registro polémico profético sin sobretraducción.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que pasó de una lectura más literal («their dwelling places where they sinned») a una interpretación preferente de la frase como «their apostasies by which they have sinned». En español se refleja esa decisión con «sus apostasías, por las cuales pecaron», manteniendo además la posibilidad interpretativa mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la traducción POB general, pero este versículo no contiene el tetragrámaton; por eso no aparece aquí.
  - Se usa «Dios» para לֵאלֹהִים y la fórmula de pacto se conserva en forma natural («serán mi pueblo, y yo seré su Dios»).
  - Se optó por «purificar» para טִהַרְתִּי por su equilibrio entre limpieza ritual y moral.
  - Se evitó «abominaciones» como término principal para שִׁקּוּצֵיהֶם por claridad moderna; la nota sobre el tono despectivo se reserva para גִּלּוּלֵיהֶם, siguiendo el audit trail inglés.
