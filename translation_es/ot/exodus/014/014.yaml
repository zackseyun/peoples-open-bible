review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene «Yahvé», el futuro de acción bélica «peleará», el sentido benefactivo de לָכֶם y la fuerza exhortativa de תַּחֲרִישׁוּן. La estructura contrastiva también se conserva. La única desviación relevante está en la nota alternativa tradicional, que no corresponde al sentido documentado de «hold your peace».'
  spanish_quality_summary: El texto principal es claro, natural y digno en español. «Yahvé peleará por ustedes, y ustedes deben guardar silencio» suena idiomático y fiel. La nota al pie, sin embargo, contiene alternativas poco naturales o inexactas en español, especialmente «callarán en paz», que no representa la alternativa tradicional inglesa ni una formulación bíblica española estándar.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; no hay conflictos con términos doctrinales mayores. La decisión «guardar silencio» para תַּחֲרִישׁוּן es adecuada en contexto. Conviene ajustar la nota para ofrecer alternativas españolas fieles: «callarán», «se quedarán callados» o tradicionalmente «guardarán silencio».'
  issues:
  - severity: medium
    issue: La nota al pie traduce inadecuadamente la alternativa tradicional.
    rationale: El inglés auditado ofrece «traditionally 'you shall hold your peace.'» En español, «ustedes callarán en paz» no es equivalente semántico ni una expresión bíblica natural. Puede confundir al lector al introducir el concepto de «paz», ausente del hebreo y de la nota inglesa.
  - severity: low
    issue: Una alternativa de la nota suena menos natural que otras opciones disponibles.
    rationale: «Ustedes se callarán» es posible, pero en español puede sonar más coloquial o incluso brusco. «Se quedarán callados» o simplemente «guardarán silencio» comunica mejor la alternativa sin rebajar el registro.
  revised_spanish_text: Yahvé peleará por ustedes[a], y ustedes deben guardar silencio.
  revised_footnotes:
  - marker: a
    text: O «ustedes callarán», «ustedes se quedarán callados» o, tradicionalmente, «ustedes guardarán silencio».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo, al audit trail inglés y al estilo español del proyecto. Solo se corrige la nota alternativa para eliminar una formulación inexacta («callarán en paz») y reemplazarla por opciones españolas que sí reflejan las alternativas documentadas y el registro bíblico esperado.
