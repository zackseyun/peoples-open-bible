translation:
  language: es
  text: Pero Dios también te derribará para siempre; te arrebatará[a] y te arrancará de tu tienda[b], y te desarraigará[c] de la tierra de los vivientes. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te tomará» / «te llevará». El verbo hebreo es raro y comunica una remoción violenta.
    reason: lexical_alternative
  - marker: b
    text: O «de tu morada» / «de tu vivienda». Literalmente, «de tu tienda».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «tu raíz de la tierra de los vivientes»; el sentido es «te desarraigará de la tierra de los vivientes».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: But ... also
  chosen_spanish: Pero ... también
  alternatives_spanish:
  - también
  - además
  - ciertamente
  lexicon: HALOT
  rationale: En este contexto, גַּם conserva el valor aditivo, pero el giro discursivo responde al orgullo previo del impío; por eso «Pero ... también» reproduce mejor el contraste sin perder la partícula aditiva.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  - Dios
  lexicon: HALOT
  rationale: Aquí אֵל funciona como el nombre común de Dios en referencia al Dios de Israel. «Dios» es la forma natural y fiel en español.
- source_word: יִתָּצְךָ
  english_pob_choice: will ... tear you down
  chosen_spanish: te derribará
  alternatives_spanish:
  - te demolerá
  - te derrumbará
  - te hará caer
  lexicon: HALOT
  rationale: El verbo נתץ comunica la acción de derribar o demoler con fuerza. «Derribará» conserva la imagen de destrucción violenta y resulta claro en español.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - perpetuamente
  - para siempre
  lexicon: HALOT
  rationale: En este juicio, לָנֶצַח indica permanencia duradera. «Para siempre» comunica bien esa finalidad sin suavizarla.
- source_word: יַחְתְּךָ
  english_pob_choice: he will snatch you up
  chosen_spanish: te arrebatará
  alternatives_spanish:
  - te tomará
  - te llevará
  - te cogerá
  lexicon: HALOT
  rationale: La forma de חתה aquí transmite una extracción brusca o un llevarse con fuerza. «Arrebatará» preserva la violencia y encaja con la secuencia de acciones.
- source_word: וְיִסָּחֲךָ
  english_pob_choice: and pull you
  chosen_spanish: te arrancará
  alternatives_spanish:
  - te apartará
  - te sacará
  - te arrastrará
  lexicon: HALOT
  rationale: נסח expresa retirar, arrancar o desprender. En español, «arrancará» mantiene el movimiento forzado y se coordina con la imagen de ser sacado del lugar.
- source_word: מֵאֹהֶל
  english_pob_choice: from your tent
  chosen_spanish: de tu tienda
  alternatives_spanish:
  - de tu carpa
  - de tu morada
  - de tu vivienda
  lexicon: HALOT
  rationale: אֹהֶל es literalmente «tienda». «Tu tienda» preserva la imagen concreta y coincide con el uso poético del hebreo; no se suaviza a una abstracción doméstica.
- source_word: וְשֵׁרֶשְׁךָ
  english_pob_choice: and uproot you
  chosen_spanish: y te arrancará de raíz
  alternatives_spanish:
  - y te desarraigará
  - y te extirpará
  - y te sacará de raíz
  lexicon: HALOT
  rationale: La construcción remite a la idea de raíz, aunque la forma sea nominal/poética. «Arrancará de raíz» reproduce la metáfora vegetal de forma idiomática y transparente en español.
- source_word: מֵאֶרֶץ חַיִּים
  english_pob_choice: from the land of the living
  chosen_spanish: de la tierra de los vivientes
  alternatives_spanish:
  - de la tierra de los vivos
  - de la tierra de la vida
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene de manera literal y comprensible. «Tierra de los vivientes» conserva el contraste entre vida y muerte.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selah
  lexicon: HALOT
  rationale: El término es oscuro y la práctica del POB es transliterarlo sin especular con su sentido.
theological_decisions:
- issue: Intensidad y permanencia del juicio expresado por לָנֶצַח
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - eternamente
  - de manera definitiva
  - para siempre
  rationale: Se conserva la fuerza de permanencia del juicio sin añadir una precisión doctrinal no explicitada por el texto. La traducción mantiene la tensión teológica de la sentencia divina.
  doctrine_reference: Preservar la tensión textual sin resolverla más allá del hebreo.
translation_notes:
  revision_awareness: La propuesta sigue el estado revisado más reciente del paquete auditado, que indica que no hubo cambios necesarios en la revisión final y que el nivel de acuerdo fue alto con solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל conforme al uso normal de referencia al Dios de Israel.
  - 'Se conserva el paralelismo de acciones violentas: derribar / arrebatar / arrancar de raíz.'
  - «Tierra de los vivientes» preserva el idioma hebreo tradicional sin convertirlo en paráfrasis.
  - «Selah» se translitera siguiendo la práctica del proyecto frente a su sentido incierto.
