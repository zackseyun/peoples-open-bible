translation:
  language: es
  text: Así que ahora[a], manda a poner a resguardo tu ganado y todo lo que tienes en el campo. Toda persona y todo animal que se encuentre en el campo y no sea llevado a la casa[b]—el granizo caerá sobre ellos, y morirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ahora»; el hebreo introduce una transición urgente hacia una acción inmediata.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «no sea recogido hacia la casa / en la casa»; el hebreo conserva la imagen de ser reunido bajo techo como resguardo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: HALOT
  rationale: La partícula conjunta con el adverbio temporal introduce una consecuencia inmediata y un tono de urgencia. «Así que ahora» conserva ese enlace discursivo sin sonar rígido en español.
- source_word: שְׁלַח הָעֵז
  english_pob_choice: send word
  chosen_spanish: manda aviso
  alternatives_spanish:
  - envía aviso
  - manda decir
  - avisa enseguida
  lexicon: HALOT
  rationale: El hebreo combina un imperativo con una marca de urgencia. En español, «manda aviso» expresa la acción de comunicar una orden con inmediatez, sin añadir mecánicamente la forma inglesa ni perder el matiz urgente.
- source_word: מִקְנְךָ
  english_pob_choice: your livestock
  chosen_spanish: tu ganado
  alternatives_spanish:
  - tu ganado menor y mayor
  - tus animales de crianza
  - tu hacienda
  lexicon: HALOT
  rationale: El término abarca animales domésticos poseídos. «Ganado» es la equivalencia natural y clara en español bíblico contemporáneo; evita el tecnicismo de «bienes en animales» y mantiene la referencia al rebaño y la hacienda animal.
- source_word: וְאֵת כָּל אֲשֶׁר לְךָ בַּשָּׂדֶה
  english_pob_choice: and everything you have in the field
  chosen_spanish: y todo lo que tienes en el campo
  alternatives_spanish:
  - y todo lo que es tuyo en el campo
  - y todo lo que posees en el campo
  lexicon: HALOT
  rationale: La frase amplía el alcance a cualquier posesión ubicada afuera. «Todo lo que tienes en el campo» comunica de forma natural y completa esa extensión semántica.
- source_word: כָּל הָאָדָם
  english_pob_choice: Every person
  chosen_spanish: Toda persona
  alternatives_spanish:
  - Todo hombre
  - Cada persona
  lexicon: HALOT
  rationale: אָדָם aquí funciona de modo genérico/representativo para seres humanos. «Toda persona» preserva el alcance inclusivo del contexto sin forzar un masculino genérico en español; además mantiene la pareja «persona y animal» en lenguaje claro.
- source_word: וְהַבְּהֵמָה
  english_pob_choice: and beast
  chosen_spanish: y todo animal
  alternatives_spanish:
  - y toda bestia
  - y todo ganado
  lexicon: HALOT
  rationale: בְּהֵמָה es un término amplio para animales; en español, «todo animal» comunica mejor el alcance que «bestia», que suena más arcaico o peyorativo.
- source_word: אֲשֶׁר יִמָּצֵא בַשָּׂדֶה
  english_pob_choice: that is found in the field
  chosen_spanish: que se encuentre en el campo
  alternatives_spanish:
  - que sea hallado en el campo
  - que esté en el campo
  lexicon: HALOT
  rationale: 'El nifal de מצא expresa pasividad: ser encontrado. «Que se encuentre» conserva el sentido condicional y fluido del hebreo.'
- source_word: וְלֹא יֵאָסֵף הַבַּיְתָה
  english_pob_choice: and is not brought into the house
  chosen_spanish: y no sea recogido en la casa
  alternatives_spanish:
  - y no sea llevado a la casa
  - y no entre en la casa
  lexicon: HALOT
  rationale: אָסף en nifal significa ser reunido/recogido. «Sea recogido» retiene esa imagen de reunir bajo techo, más cerca del hebreo que una simple paráfrasis de «entrar».
- source_word: הַבָּרָד
  english_pob_choice: the hail
  chosen_spanish: el granizo
  alternatives_spanish:
  - la granizada
  - el granizo tempestuoso
  lexicon: HALOT
  rationale: El sustantivo designa la precipitación de hielo. «Granizo» es la forma más natural y precisa en español.
- source_word: וָמֵתוּ
  english_pob_choice: and they will die
  chosen_spanish: y morirán
  alternatives_spanish:
  - y morirán todos
  - y perecerán
  lexicon: HALOT
  rationale: La consecuencia futura del juicio queda bien expresada con el futuro simple español. «Morirán» reproduce de manera directa y sobria el cierre del versículo.
theological_decisions:
- issue: 'Áדם como término genérico: masculino representativo o inclusivo explícito'
  english_pob_reading: Every person
  chosen_spanish_reading: Toda persona
  alternative_spanish_readings:
  - Todo hombre
  - Cada persona
  rationale: El hebreo usa אָדָם en forma genérica para humanos en el contexto de «persona y animal». En español, «toda persona» conserva el alcance universal sin introducir una masculinización innecesaria ni perder la relación semántica con el ganado y los animales.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: 'אָסף en pasivo: reunir/recoger bajo techo'
  english_pob_reading: is not brought into the house
  chosen_spanish_reading: y no sea recogido en la casa
  alternative_spanish_readings:
  - y no sea reunido en la casa
  - y no sea llevado a la casa
  rationale: El foco no está solo en el traslado físico sino en ser incorporado al resguardo del hogar. «Sea recogido» mantiene la pasividad del verbo y la imagen de seguridad doméstica, evitando borrar la tensión textual entre campo expuesto y casa protegida.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; lexical note on אָסף
- issue: 'الحydd: singular subject with plural consequence'
  english_pob_reading: the hail will come down on them, and they will die
  chosen_spanish_reading: el granizo caerá sobre ellos, y morirán
  alternative_spanish_readings:
  - el granizo descenderá sobre ellos, y morirán
  - caerá granizo sobre ellos, y morirán
  rationale: 'El hebreo presenta al granizo como sujeto singular con efecto colectivo. La traducción conserva esa estructura: un solo agente de juicio y un plural de afectados.'
  doctrine_reference: Grammar note on singular collective subject; Exodus 9 context
- issue: Orden urgente con sentido de advertencia preventiva
  english_pob_reading: send word ... to safety
  chosen_spanish_reading: manda aviso ... a resguardo
  alternative_spanish_readings:
  - avisa ... en seguridad
  - da la orden ... a resguardo
  rationale: La frase debe transmitir tanto la comunicación inmediata como la protección preventiva de personas y animales. «Manda aviso» y «a resguardo» mantienen la urgencia y la finalidad protectora sin sobreexplicar el contexto.
  doctrine_reference: Exodus 9:19 within plague narrative
translation_notes:
  revision_awareness: 'Tomé como punto de control la revisión inglesa más reciente, que ajustó «Every man» a «Every person» y «gathered into the house» a «brought into the house». La versión española sigue ese rumbo: evita el masculino genérico en אָדָם y conserva el sentido pasivo de אָסף con una formulación natural en español. También mantuve la urgencia del comando inicial y la escena de protección previa al granizo, sin suavizar la advertencia ni perder la estructura causa-consecuencia del hebreo.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto no lo requiere aquí; en este versículo no aparece el tetragrámaton.
  - Mantuve «granizo» como término normal para הַבָּרָד y no recurrí a «tempestad de granizo», porque el hebreo nombra directamente el fenómeno.
  - Preferí «toda persona» frente a un masculino genérico para אָדָם, en coherencia con la revisión inglesa más reciente y con el español contemporáneo.
  - Conservé la pasiva semántica en «sea recogido», para no borrar el matiz de protección doméstica presente en יֵאָסֵף הַבַּיְתָה.
