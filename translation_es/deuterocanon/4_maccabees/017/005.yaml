base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/017/005.yaml
  text: Not so does the moon stand in majesty in heaven with the stars[a], as you, having guided your seven sons, equal to the stars, toward godliness[b], have come to stand honored before God and have been established in heaven with them.
  footnotes:
  - marker: a
    text: Or 'having enlightened your seven sons, equal to the stars, toward piety.' The participle φωταγωγήσασα can be rendered more explicitly as 'having enlightened' or 'having led to the light.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood more literally as 'have been established in the sky with them,' but in context it likely refers to heavenly honor with her sons.
    reason: alternative_reading
