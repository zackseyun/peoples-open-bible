id: PHM.1.2
reference: Philemon 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ Ἀπφίᾳ τῇ ⸀ἀδελφῇ καὶ Ἀρχίππῳ τῷ συστρατιώτῃ ἡμῶν καὶ τῇ κατ’ οἶκόν σου ἐκκλησίᾳ·
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/002.yaml
  text: 'and to Apphia our sister[a], and to Archippus our fellow soldier, and to the church in your house:'
  footnotes:
  - marker: a
    text: Some manuscripts read 'our sister' instead of 'the sister.'
    reason: textual_variant
translation:
  language: ko
  text: '또한 자매 압비아[a]와 우리의 함께 싸우는 동지 아킵보, 그리고 그대의 집에 있는 회중에게도 함께 편지합니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「자매」 대신 「우리의 자매」(ἡμῶν 포함)로 읽는다. SBLGNT는 ἡμῶν 없이 단순히 「그 자매」(τῇ ἀδελφῇ)로 읽으므로 본문은 그것을 따른다.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀπφίᾳ
  english_pob_choice: Apphia
  chosen_korean: 압비아
  lexicon: BDAG
  rationale: 한국 성서 전통의 정착된 음역.
- source_word: ἀδελφῇ
  english_pob_choice: sister
  chosen_korean: 자매
  alternatives_korean:
  - 우리의 자매
  lexicon: BDAG
  rationale: SBLGNT는 ἡμῶν 없이 단순히 「그 자매」로 읽는다. 영어 POB와 마찬가지로, 본 번역도 사본을 따라 「자매」로만 옮긴다.
- source_word: Ἀρχίππῳ
  english_pob_choice: Archippus
  chosen_korean: 아킵보
  lexicon: BDAG
  rationale: 한국 성서 전통의 정착된 음역.
- source_word: συστρατιώτῃ
  english_pob_choice: fellow soldier
  chosen_korean: 함께 싸우는 동지
  alternatives_korean:
  - 동료 군사
  - 전우
  lexicon: BDAG
  rationale: συστρατιώτης는 함께 군무하는 자를 가리키는 합성어이며, 바울 서신의 군사 비유를 자연스럽게 담아낸다. 「전우」는 현대적이지만 군사적 색채가 다소 좁고, 「함께 싸우는 동지」가 사역의 영적 전투 비유를 그대로 살린다.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_korean: 회중
  alternatives_korean:
  - 교회
  - 모임
  lexicon: BDAG
  rationale: 본문은 빌레몬의 집에 모이는 가정 모임을 가리키므로, 후대 제도적 교회 함의가 강한 「교회」보다 「회중」(모인 무리)이 더 본문에 충실하다. 글로서리 기본값을 따른다.
- source_word: κατ’ οἶκόν σου
  english_pob_choice: in your house
  chosen_korean: 그대의 집에 있는
  alternatives_korean:
  - 네 집에 모이는
  - 당신의 집에 있는
  lexicon: BDAG
  rationale: 헬라어 직역은 「그대의 집에 따라/안에」이며 관용적으로 「그대의 집에서 모이는 회중」을 가리킨다. 「집에 있는」은 본문의 간결성을 유지하면서도 이 회중이 빌레몬의 집에 자리잡고 있음을 분명히 한다. 빌레몬은 본 서신의 주 수신자이며 단수 σου이므로 합쇼체에서 「그대」로 옮긴다.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_korean: 우리의
  lexicon: BDAG
  rationale: 「함께 싸우는 동지」를 수식하는 복수 소유격으로, 바울과 디모데가 아킵보와 공유하는 사역적 동지애를 가리킨다.
theological_decisions:
- issue: ἀδελφῇ에 「우리의」를 보충할지 여부
  chosen_reading: 자매
  alternative_readings:
  - 우리의 자매
  rationale: SBLGNT 본문은 ἡμῶν 없이 τῇ ἀδελφῇ로 읽는다. 전통 번역의 친숙함을 위해 「우리의」를 보충하기보다 본문을 따른다. 이는 교리적 결정은 아니지만, 그리스도인 친족 언어가 본문에 어떻게 표현되었는지를 정직하게 보여 준다.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition'
