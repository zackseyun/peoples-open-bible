  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios», «oído», «oye», «palabras» son adecuados. El vocativo debe preferirse como «oh Dios» o simplemente «Dios»; aquí «oh Dios» es aceptable por el tono de oración. No hay términos teológicos sensibles que requieran adjudicación adicional.
