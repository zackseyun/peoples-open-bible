translation:
  language: es
  text: y Resén, entre Nínive y Calah[a]; esa es la gran ciudad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Kalhu', reflejando la forma asiria del topónimo tradicionalmente vertido 'Calah'.
    reason: lexical_alternative
  - marker: b
    text: La cláusula 'esa es la gran ciudad' puede referirse específicamente a Resén o al conjunto urbano entre Nínive y Calah.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - y también
  lexicon: HALOT
  rationale: En una lista de ciudades y lugares, וְ con el marcador de objeto introduce otro elemento de la secuencia. En español basta con 'y'; 'e' no es necesario antes de Resén porque no sigue sonido /i/ inicial.
- source_word: רֶסֶן
  english_pob_choice: Resen
  chosen_spanish: Resén
  alternatives_spanish:
  - Resen
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se conserva transliterado; se usa acento gráfico para adaptarlo a la ortografía española sin alterar la forma del nombre.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - entre ... e
  - entre ... y también
  lexicon: HALOT
  rationale: La construcción correlative de ubicación se rinde naturalmente como 'entre ... y' en español.
- source_word: נִינְוֵה
  english_pob_choice: Nineveh
  chosen_spanish: Nínive
  alternatives_spanish:
  - Ninive
  lexicon: HALOT
  rationale: Topónimo bíblico establecido en español; se mantiene la transliteración tradicional y se acentúa según las reglas del español.
- source_word: כָּלַח
  english_pob_choice: Calah
  chosen_spanish: Calah
  alternatives_spanish:
  - Kalhu
  lexicon: HALOT
  rationale: Se conserva la forma bíblica tradicional 'Calah', que corresponde al nombre hebreo en traducción española pública; 'Kalhu' queda como alternativa histórica, no como texto principal.
- source_word: הִוא
  english_pob_choice: that is
  chosen_spanish: esta es
  alternatives_spanish:
  - es
  - esto es
  lexicon: HALOT
  rationale: El pronombre independiente funciona como enlace explicativo/copulativo. 'Esta es' preserva la fuerza identificadora y suena natural en español; se evita forzar una reexplicación interpretativa.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - ciudad
  lexicon: HALOT
  rationale: 'Artículo definido conservado: ''la ciudad''.'
- source_word: הַגְּדֹלָה
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grande y prominente
  - grande, importante
  lexicon: HALOT
  rationale: En español, 'ciudad grande' comunica de forma directa el tamaño/ importación del sintagma. Se evita 'grande' con matiz exclusivamente honorífico que podría sonar menos natural; el texto hebreo permite tanto tamaño como prominencia, y la elección no resuelve esa tensión.
theological_decisions:
- issue: Referente de la cláusula final 'esta es la ciudad grande'
  english_pob_reading: The clause is left as written without resolving whether 'the great city' refers specifically to Resen or to the larger urban region between Nineveh and Calah.
  chosen_spanish_reading: 'La cláusula se deja sin resolver: puede referirse específicamente a Resén o al conjunto urbano más amplio entre Nínive y Calah.'
  alternative_spanish_readings:
  - Se refiere específicamente a Resén.
  - Se refiere a la región urbana más amplia entre Nínive y Calah.
  rationale: La sintaxis hebrea permite más de una lectura sobre el referente de la cláusula final. Para no borrar esa tensión documentada, el español mantiene la forma explicativa sin añadir una aclaración interpretativa.
  doctrine_reference: Preservar la tensión interpretativa del texto sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: 'La puntuación sigue la revisión auditada del inglés: se prefiere el punto y coma antes de la cláusula explicativa, en lugar de un guion largo. La redacción española mantiene esa relación formal sin añadir contenido.'
  spanish_consistency_notes:
  - Se conserva el orden sintáctico breve del hebreo con una coordinación inicial simple.
  - Los nombres propios se transliteran de manera consistente con acentuación española cuando corresponde.
  - '''Esta es'' se usa como equivalente natural de הִוא en función copulativa/explanatoria.'
  - No se introduce 'Mesías', 'Yahvé' ni terminología doctrinal ajena al versículo.
