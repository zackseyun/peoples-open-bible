- from: 'Entonces un joven[a] corrió y se lo informó a Moisés, y dijo: «Eldad y Medad están profetizando en el campamento».'
  to: 'Entonces un joven[a] corrió y le informó a Moisés, y dijo: «Eldad y Medad están profetizando en el campamento».'
  rationale: Se sustituye «se lo informó a Moisés» por «le informó a Moisés» para lograr un español más natural y preciso, sin alterar el sentido del hebreo ni la distinción narrativa entre el acto de informar y la cita directa que sigue. La nota al pie se ajusta para reflejar esa mejora estilística.
