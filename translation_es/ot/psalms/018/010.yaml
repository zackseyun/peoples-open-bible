translation:
  language: es
  text: Inclinó los cielos y descendió; densas tinieblas[a] estaban debajo de sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oscura nube» o «densa oscuridad» para «densas tinieblas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: bent
  chosen_spanish: extendió
  alternatives_spanish:
  - inclinó
  - dobló
  - tendió
  lexicon: HALOT
  rationale: נטה puede significar extender o inclinar. En español, «extendió los cielos» comunica con naturalidad la imagen poética de desplegar el firmamento, sin volverla rígida ni perder el movimiento hacia la teofanía.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El plural hebreo se conserva con «los cielos», que mantiene el registro cósmico y poético del texto. «El cielo» reduciría indebidamente la amplitud del original.
- source_word: וַיֵּרַד
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: HALOT
  rationale: ירד expresa movimiento hacia abajo. «Descendió» es natural en español bíblico contemporáneo y conserva la solemnidad del acto divino sin añadir matiz interpretativo.
- source_word: וַעֲרָפֶל
  english_pob_choice: thick darkness
  chosen_spanish: densas tinieblas
  alternatives_spanish:
  - espesa oscuridad
  - oscuro nubarrón
  - oscura neblina
  lexicon: HALOT
  rationale: עֲרָפֶל designa oscuridad espesa o niebla densa asociada con manifestación divina. «Densas tinieblas» preserva esa intensidad y permite una opción idiomática en español, sin fijar innecesariamente si se trata de nube, niebla u oscuridad densa.
- source_word: תַּ֣חַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: La preposición espacial se vierte de forma directa. «Debajo de» es claro y natural para el lector moderno.
- source_word: רַגְלָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus plantas
  - sus pasos
  lexicon: HALOT
  rationale: El sustantivo es literalmente «pies», en plural. Se mantiene la concreción corporal del hebreo y la imagen antropomórfica de la teofanía.
theological_decisions:
- issue: Imaginería antropomórfica teofánica
  english_pob_reading: Retain the concrete imagery of God bending the heavens, coming down, and having darkness under his feet.
  chosen_spanish_reading: Conservar la imagen concreta de Dios descendiendo con tinieblas debajo de sus pies.
  alternative_spanish_readings:
  - Suavizar la imagen como mera intervención divina
  - Parafrasear para evitar el antropomorfismo
  rationale: El verso es poético y teofánico; la traducción debe preservar la tensión imagética en vez de explicarla o neutralizarla. «Densas tinieblas» y «sus pies» mantienen la concreción sin resolver la figura.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica en el texto poético.'
translation_notes:
  revision_awareness: El inglés POB mantuvo «thick darkness» con nota alternativa léxica («dark cloud» / «dense darkness») y no realizó cambios posteriores; el español conserva esa misma tensión semántica con una opción idiomática equivalente en el verso y una nota de alternativa.
  spanish_consistency_notes:
  - Se conserva el plural cósmico «los cielos» para corresponder al hebreo שָׁמַיִם.
  - Se evita sustituir la imaginería corporal por una paráfrasis abstracta, en coherencia con el audit trail inglés.
  - «Densas tinieblas» mantiene abierta la posibilidad semántica entre oscuridad espesa, nube oscura y negrura densa, como en la nota inglesa.
