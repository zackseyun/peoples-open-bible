source:
  edition: WLC
  text: בְּ/יוֹם֙ עֲמָֽדְ/ךָ֣ מִ/נֶּ֔גֶד בְּ/י֛וֹם שְׁב֥וֹת זָרִ֖ים חֵיל֑/וֹ וְ/נָכְרִ֞ים בָּ֣אוּ שער/ו וְ/עַל יְרוּשָׁלִַ֨ם֙ יַדּ֣וּ גוֹרָ֔ל גַּם אַתָּ֖ה כְּ/אַחַ֥ד מֵ/הֶֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/obadiah/001/011.yaml
  text: On the day when you stood aloof[a], on the day strangers carried off his wealth, and foreigners entered his gates and cast lots over Jerusalem[c][b], you too were like one of them.
  footnotes:
  - marker: a
    text: Or 'you stood aloof' or 'you stood at a distance.' The Hebrew idiom literally speaks of standing opposite/from a distance.
    reason: lexical_alternative
  - marker: b
    text: Or 'his army' or 'his strength' for 'his wealth'; the Hebrew חֵיל can denote military force, strength, or resources/wealth.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his gate,' likely referring to Jerusalem or Judah personified; some English translations render idiomatically 'his gates.'
    reason: lexical_alternative
