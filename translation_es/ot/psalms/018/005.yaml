revisions:
- from: Los lazos de la muerte me rodearon[a], y las corrientes[b] de destrucción me aterraron.
  to: Las cuerdas de la muerte me rodearon[a], y los torrentes[b] de destrucción me aterraron.
  rationale: Se reemplaza «lazos» por «cuerdas» para acercarse al valor concreto de חֶבְלֵי y al «cords» auditado; y «corrientes» por «torrentes» para reflejar mejor נַחֲלֵי en un contexto de amenaza violenta. Se conserva «destrucción» por alineación con la revisión inglesa sobre בְלִיַּעַל, y se ajustan las notas para preservar alternativas relevantes sin defender como principal una opción menos fiel.
