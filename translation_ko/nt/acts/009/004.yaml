  lexicon: BDAG
  rationale: '70인역의 신적 부르심 패턴(예: 「아브라함아, 아브라함아」, 「모세야, 모세야」)을 반영하는 이름 반복 호격은 한국어에서도 반복형 「사울아, 사울아」로 직역해야 신현현 운율이 살아난다.'
theological_decisions:
- issue: 신현현 운율 보존
  chosen_reading: 사울아, 사울아, 왜 나를 박해하느냐?
  alternative_readings:
