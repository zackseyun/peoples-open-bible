translation:
  language: es
  text: Y no hubo guerra[a] hasta el año treinta y cinco del reinado de Asa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'hasta año treinta y cinco del reinado de Asa'. Algunos intérpretes entienden este número conforme a un sistema cronológico más amplio, y no estrictamente como el cómputo del reinado de Asa, para armonizarlo con pasajes relacionados.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  english_pob_choice: And there was no war
  chosen_spanish: Y no hubo guerra
  alternatives_spanish:
  - Y no ocurrió guerra
  - Y no hubo combate
  lexicon: HALOT
  rationale: מִלְחָמָה designa 'guerra' en sentido amplio. En español, la construcción existencial negativa natural es 'no hubo guerra', que conserva el valor de ausencia de guerra sin forzar un calco.
- source_word: לֹא
  english_pob_choice: 'no'
  chosen_spanish: 'no'
  alternatives_spanish:
  - ninguna
  lexicon: HALOT
  rationale: La negación se integra directamente en la cláusula existencial española, como en el sentido del hebreo y la solución inglesa auditada.
- source_word: הָיָתָה
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - había
  lexicon: HALOT
  rationale: El perfecto de היה funciona aquí de modo existencial. 'Hubo' expresa con naturalidad el hecho de que no se dio guerra durante ese período.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  lexicon: HALOT
  rationale: La preposición temporal marca el límite final del período sin guerra; 'hasta' es el equivalente más directo y natural en español.
- source_word: שְׁנַת שְׁלֹשִׁים וְחָמֵשׁ
  english_pob_choice: the thirty-fifth year
  chosen_spanish: el año treinta y cinco
  alternatives_spanish:
  - el trigésimo quinto año
  - año treinta y cinco
  lexicon: HALOT
  rationale: El hebreo usa una fórmula de año de reinado. En español bíblico actual, 'el año treinta y cinco' comunica con claridad la referencia cronológica y evita una rigidez innecesaria.
- source_word: לְ/מַלְכ֥וּת
  english_pob_choice: of ... reign
  chosen_spanish: del reinado
  alternatives_spanish:
  - de la realeza
  - del gobierno
  lexicon: HALOT
  rationale: מַלְכּוּת aquí nombra el período de gobierno real; 'reinado' reproduce bien la fuerza regnal de la expresión sin introducir un matiz ajeno.
- source_word: אָסָֽא
  english_pob_choice: Asa
  chosen_spanish: Asa
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español.
theological_decisions:
- issue: Tensión cronológica del versículo con pasajes paralelos
  english_pob_reading: Render the Hebrew regnal formula straightforwardly as 'the thirty-fifth year of Asa’s reign' without harmonizing or emending.
  chosen_spanish_reading: 'Mantener la fórmula cronológica tal como está en el hebreo: ''el año treinta y cinco del reinado de Asa''.'
  alternative_spanish_readings:
  - Interpretar el número según otro sistema cronológico más amplio
  - Emendar el número para armonizarlo con pasajes relacionados
  rationale: El texto fuente presenta la cifra de manera directa. La traducción española debe reflejar esa lectura sin resolver la tensión internamente. La nota conserva la alternativa interpretativa documentada por la POB inglesa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el presente borrador sigue de cerca el texto hebreo y conserva la nota cronológica auditada por la POB inglesa.
  spanish_consistency_notes:
  - Se usa 'Asa' de manera uniforme como nombre propio.
  - Se prefiere 'reinado' para מַלְכוּת por su sentido regnal contextual.
  - La negación existencial se vierte con una estructura natural en español ('no hubo').
