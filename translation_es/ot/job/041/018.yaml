  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las opciones «espada», «lanza», «dardo» y «venablo» son aceptables en este contexto poético. La preferencia por un arma ofensiva para וְשִׁרְיָה está bien justificada, siempre preservando la alternativa «cota de malla/armadura» en nota.
