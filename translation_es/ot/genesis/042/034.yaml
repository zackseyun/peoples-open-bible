translation:
  language: es
  text: Traigan a su hermano menor a mí, para que yo sepa que no son espías, sino hombres honestos. Entonces les devolveré a su hermano, y podrán comerciar[a] en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'moverse por la tierra'. El verbo hebreo también puede entenderse en un sentido más amplio de viajar o desplazarse, aunque aquí su sentido comercial ('comerciar/hacer negocios') encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָבִיאוּ
  english_pob_choice: Bring
  chosen_spanish: Trae
  alternatives_spanish:
  - Y traigan
  - Traed
  lexicon: HALOT / BDB
  rationale: El imperativo causativo dirigido a los hermanos se vierte con un imperativo natural en español. Se omite el 'y' inicial porque en español no siempre es necesario para conservar la fuerza del mandato.
- source_word: אֲחִיכֶם הַקָּטֹן
  english_pob_choice: your youngest brother
  chosen_spanish: tu hermano menor
  alternatives_spanish:
  - tu hermano más joven
  - tu hermano pequeño
  lexicon: HALOT
  rationale: הַקָּטֹן puede expresar 'menor/joven'. En español, 'hermano menor' comunica bien la relación de orden entre hermanos sin sonar excesivamente literal o infantil.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: hasta mí
  alternatives_spanish:
  - a mí
  - a mi presencia
  lexicon: HALOT
  rationale: '''Hasta mí'' conserva el movimiento hacia la persona que habla y suena natural en español narrativo; ''a mí'' también sería válido, pero menos enfático.'
- source_word: וְאֵדְעָה
  english_pob_choice: so that I may know
  chosen_spanish: para que yo sepa
  alternatives_spanish:
  - y sabré
  - entonces sabré
  lexicon: HALOT
  rationale: La forma cohortativa expresa propósito o resultado deseado; 'para que yo sepa' refleja mejor esa relación que una simple coordinación.
- source_word: כִּי לֹא מְרַגְּלִים אַתֶּם
  english_pob_choice: that you are not spies
  chosen_spanish: que no son espías
  alternatives_spanish:
  - que ustedes no son espías
  - que no están espiando
  lexicon: HALOT
  rationale: מְרַגְּלִים se entiende aquí como sustantivo/adjetivo 'espías'. En español, el plural masculino inclusivo 'son' se ajusta al destinatario plural del discurso y mantiene la acusación negada.
- source_word: כִּי כֵנִים אַתֶּם
  english_pob_choice: but honest men
  chosen_spanish: sino hombres honestos
  alternatives_spanish:
  - sino hombres íntegros
  - sino hombres sinceros
  lexicon: HALOT
  rationale: כֵנִים expresa honestidad, confiabilidad o rectitud. 'Hombres honestos' conserva la contraposición con 'espías' y es un equivalente idiomático claro en español. Se opta por 'sino' para reflejar el contraste adversativo del inglés POB y del hebreo.
- source_word: אֶת אֲחִיכֶם אֶתֵּן לָכֶם
  english_pob_choice: Then I will give your brother back to you
  chosen_spanish: Entonces les devolveré a su hermano
  alternatives_spanish:
  - Entonces les daré a su hermano
  - Luego les restituiré a su hermano
  lexicon: HALOT
  rationale: El verbo 'dar' con el contexto del hermano retenido permite explicitar la devolución sin añadir contenido. 'Devolveré' hace patente la restauración implícita en la situación narrativa.
- source_word: וְאֶת הָאָרֶץ תִּסְחָרוּ
  english_pob_choice: and you may trade in the land
  chosen_spanish: y podrán comerciar en la tierra
  alternatives_spanish:
  - y podrán viajar por la tierra
  - y podrán hacer comercio en la tierra
  - y podrán moverse por la tierra
  lexicon: HALOT
  rationale: סחר tiene sentido comercial principal; el contexto de la hambruna y el permiso concedido favorecen 'comerciar'. 'En la tierra' preserva el alcance territorial del hebreo.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB, especialmente al mantener la contraposición más natural 'espías, sino hombres honestos' sin duplicar innecesariamente la cláusula equivalente a 'that'. También se conserva la alternativa lexical del verbo final, optando por el sentido comercial de סחר en armonía con la nota auditada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no porque aparezca explícitamente en este versículo, sino como convención general del proyecto cuando corresponda al Tetragrámaton.
  - Se mantiene 'hermano menor' para הַקָּטֹן como equivalente natural de rango entre hermanos.
  - '''Comerciar'' se prefiere sobre ''moverse'' o ''viajar'' por el sentido contextual más probable del verbo final.'
  - 'La nota al pie marca la única ambigüedad relevante del segmento: dirección física ''hasta mí'' frente a un matiz más simple ''a mi presencia''.'
