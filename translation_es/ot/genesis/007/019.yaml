    reason: alternative_reading
  - marker: b
    text: O «bajo todo el cielo».
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el sentido del hebreo y del POB inglés, pero mejora el registro y la fidelidad sintáctica: «en gran manera» expresa con dignidad la intensificación de מְאֹד מְאֹד; «quedaron cubiertos» suena natural en español y preserva el resultado pasivo; y «todos los montes altos debajo de todos los cielos» refleja mejor la estructura hebrea que la relativa con coma. También se simplifican las notas para conservar solo las alternativas significativas del expediente.'
