review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Josué despide al pueblo, los hijos de Israel van individualmente a su porción asignada con el fin de tomar posesión de la tierra. Sin embargo, en un punto significativo no preserva plenamente la decisión léxica auditada: אִישׁ fue retenido en el inglés POB como ''each man'' por su fuerza distributiva y masculina, mientras que el español usa ''cada uno'', que neutraliza el matiz masculino documentado.'
  spanish_quality_summary: El español es claro y natural. 'Despidió', 'el pueblo' y 'para tomar posesión de la tierra' funcionan bien. 'Heredad' es digno y fiel, aunque algo tradicional; sigue siendo inteligible en contexto bíblico. El ajuste principal necesario es cambiar 'cada uno' por 'cada hombre' para alinearse con la política de género-precisión y la rationale auditada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé ni otros términos del glosario principal. 'Los hijos de Israel' y 'heredad' están bien alineados con la rationale documentada. El único desajuste es la neutralización de אִישׁ.
  issues:
  - severity: medium
    issue: Neutralización de אִישׁ como 'cada uno'
    rationale: La auditoría inglesa justificó explícitamente 'each man' para conservar tanto la distribución individual como la forma masculina del hebreo. 'Cada uno' preserva la distribución, pero pierde el matiz masculino que el proyecto decidió mantener en este caso.
  - severity: low
    issue: Inconsistencia entre decisión léxica auditada y texto principal
    rationale: La ficha léxica reconoce que 'cada hombre' sería la alternativa más cercana, pero el texto principal adoptó una solución más idiomática. Dado el principio del proyecto en este versículo, conviene priorizar la fidelidad auditada sobre la suavización estilística.
  revised_spanish_text: Entonces Josué despidió al pueblo[a], y los hijos de Israel se fueron, cada hombre a su heredad, para tomar posesión de la tierra.
  revised_footnotes:
  - marker: a
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
