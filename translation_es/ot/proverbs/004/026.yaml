  - severity: low
    issue: La nota al pie empieza con comillas y prefijo poco natural
    rationale: La formulación actual incluye comillas externas y 'O:' de manera algo torpe. Puede simplificarse a 'O «Considera...' manteniendo el contenido auditado y mejorando la presentación.
