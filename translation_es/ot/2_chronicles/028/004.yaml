translation:
  language: es
  text: Sacrificó y quemó incienso[a] en los lugares altos, sobre las colinas y debajo de todo árbol verde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ofreció sacrificios y quemó ofrendas en humo en los lugares altos, sobre las colinas y debajo de todo árbol frondoso»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְזַבֵּחַ
  english_pob_choice: He sacrificed
  chosen_spanish: Sacrificó
  alternatives_spanish:
  - Ofreció sacrificios
  lexicon: HALOT
  rationale: El piel de זבח expresa la acción de sacrificar. En español, «sacrificó» reproduce con precisión y naturalidad la acción verbal; «ofreció sacrificios» es válido, pero más explicativo de lo necesario.
- source_word: וַיְקַטֵּר
  english_pob_choice: and burned incense
  chosen_spanish: y quemó incienso
  alternatives_spanish:
  - y hizo humear ofrendas
  - y quemó ofrendas en humo
  lexicon: HALOT
  rationale: En este contexto de culto ilícito, קטר puede referirse a quemar incienso o a hacer ascender humo ritual. En español, «quemó incienso» conserva bien el sentido cultual y resulta idiomático; «hizo humear ofrendas» explicita la imagen, pero suena menos natural como texto bíblico corrido.
- source_word: בַּבָּמוֹת
  english_pob_choice: on the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - sobre los lugares altos
  - en los altos
  lexicon: HALOT
  rationale: «Lugares altos» mantiene el término técnico cultual tradicional, equivalente al inglés POB «high places». Se evita sustituirlo por una paráfrasis como «santuarios paganos», porque el hebreo conserva una designación estable e intertextual.
- source_word: וְעַל הַגְּבָעוֹת
  english_pob_choice: on the hills
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - sobre las colinas
  - en las colinas
  lexicon: HALOT
  rationale: גְּבָעוֹת son elevaciones/colinas. «Montes» es una opción bíblica natural en español y mantiene el paralelismo con «lugares altos» sin borrar la referencia topográfica. «Colinas» sería más literal, pero menos solemne.
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: and under every green tree
  chosen_spanish: debajo de todo árbol frondoso
  alternatives_spanish:
  - debajo de todo árbol verde
  - debajo de todo árbol lozano
  lexicon: HALOT
  rationale: רַעֲנָן denota algo fresco, lozano, frondoso o verde. En español, «frondoso» comunica mejor la imagen de un árbol abundante y apto para culto idolátrico que «verde», que puede sonar demasiado general. Aun así, se conserva la fuerza proverbial del giro.
theological_decisions:
- issue: Conservación del lenguaje cultual asociado a idolatría
  english_pob_reading: Preserve the conventional phrase 'high places' and the stock expression 'under every green tree' without softening or paraphrasing.
  chosen_spanish_reading: Conservar «lugares altos» y una expresión igualmente proverbial («debajo de todo árbol frondoso») sin sustituirlas por un resumen interpretativo.
  alternative_spanish_readings:
  - «en santuarios paganos»
  - «debajo de todo árbol leafy/frondoso» como paráfrasis explicativa
  rationale: El hebreo usa lenguaje cultual establecido, con fuerte resonancia intertextual en Crónicas y libros históricos. La traducción española debe mantener esa terminología para no borrar la acusación de culto no autorizado ni perder la conexión con otros pasajes bíblicos.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto inglés auditado no mostró revisiones sustantivas; el consenso de revisión fue alto y se mantuvo la lectura léxica básica. La versión española sigue esa misma línea, ajustando solo la naturalidad idiomática necesaria para una publicación en español sin perder el valor técnico de «lugares altos» ni la imagen cultual de «debajo de todo árbol frondoso».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio.
  - «Lugares altos» conserva la terminología técnica cultual.
  - «Quemó incienso» traduce de forma natural el valor ritual de קטר en este contexto.
  - «Montes» funciona como equivalente bíblico de גְּבָעוֹת sin excesiva literalidad.
  - «Árbol frondoso» refleja רַעֲנָן con una imagen comprensible en español.
