translation:
  language: es
  text: ¡Cuán glorioso fue cuando extendió su mano[a], cuando blandió una lanza contra una ciudad!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «¡Cuán glorificado fue ... cuando blandió una espada contra ciudades!». El testimonio hebreo lee «blandió una lanza contra una ciudad».'
    reason: alternative_reading
lexical_decisions:
- source_word: מה נהדר
  english_pob_choice: How glorious
  chosen_spanish: ¡Cuán glorioso fue!
  alternatives_spanish:
  - ¡Cuán espléndido fue!
  - ¡Cuán majestuoso fue!
  - ¡Cuán honrado fue!
  lexicon: HALOT
  rationale: La exclamación hebrea expresa admiración por la fama y la grandeza de su acción guerrera. «Glorioso» recoge bien el tono de alabanza y armoniza con el paralelo griego ἐδοξάσθη («fue glorificado / fue honrado»).
- source_word: בנטותו יד
  english_pob_choice: when he stretched out his hand
  chosen_spanish: cuando extendió su mano
  alternatives_spanish:
  - cuando alzó su mano
  - al extender su mano
  - cuando tendió su mano
  lexicon: HALOT
  rationale: El infinitivo con sufijo marca circunstancia temporal; «extendió su mano» conserva el gesto corporal e idiomático sin sonar forzado en español. Mantiene también el matiz de la acción militar previa al ataque.
- source_word: בהניפו כידון
  english_pob_choice: when he brandished a spear
  chosen_spanish: cuando blandió una lanza
  alternatives_spanish:
  - cuando agitó una jabalina
  - cuando levantó una lanza
  - cuando blandió un venablo
  lexicon: HALOT
  rationale: הניף comunica movimiento de blandir o agitar; כידון designa un arma arrojadiza o de asta, aquí mejor expresada en español como «lanza». La elección conserva la imagen bélica del hebreo primario y evita un tecnicismo excesivo.
- source_word: על עיר
  english_pob_choice: against a city
  chosen_spanish: contra una ciudad
  alternatives_spanish:
  - sobre una ciudad
  - hacia una ciudad
  lexicon: HALOT
  rationale: En contexto militar, על señala dirección hostil. «Contra una ciudad» expresa con naturalidad el valor ofensivo del hebreo.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en el arma mencionada
  english_pob_reading: Main text follows the Hebrew 'spear'; Greek parallel is preserved in a footnote as an alternative reading.
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «lanza».'
  alternative_spanish_readings:
  - La paralela griega sugiere «espada».
  - La paralela griega sugiere «acero»/«arma» en sentido general.
  rationale: El proyecto traduce Sirácides desde el hebreo conservado cuando está disponible, usando el griego como control real. Aquí el hebreo es de alta confianza y coherente; por eso se mantiene «lanza» en el texto principal y se señala la variante griega en nota para auditoría.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como insumo y verificación'
- issue: Tono laudatorio de la apertura
  english_pob_reading: Render the opening as admiration ('How glorious he was').
  chosen_spanish_reading: 'La apertura se vierte como admiración: «¡Cuán glorioso fue!»'
  alternative_spanish_readings:
  - ¡Cuán espléndido fue!
  - ¡Cuán honrado fue!
  rationale: La frase no introduce una afirmación doctrinal adicional; simplemente celebra la fama y el valor del personaje. «Glorioso» transmite esa alabanza con naturalidad y mantiene la conexión semántica con el griego ἐδοξάσθη.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; preservar el sentido de fuente sin paráfrasis'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje fuente; se mantiene la lectura hebrea principal con la variante griega documentada en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usó «lanza» para כידון, en continuidad con la preferencia del POB por respetar el testimonio hebreo primario cuando existe.
  - «Glorioso» preserva el registro laudatorio sin volverlo litúrgico o eclesiástico.
