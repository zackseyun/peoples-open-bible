translation:
  language: es
  text: Llora por el muerto[a], porque se ha apagado la luz; y llora por el necio[b], porque se ha apagado el entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la luz se ha apagado». El griego conserva la imagen de la luz más que decir directamente «vida».'
    reason: lexical_alternative
  - marker: b
    text: 'Dicho proverbial: se lamenta al necio porque le ha faltado el entendimiento, no porque el texto afirme aquí su muerte física de manera explícita.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπὶ νεκρῷ κλαῦσον
  english_pob_choice: Weep over the dead
  chosen_spanish: Llora por el muerto
  alternatives_spanish:
  - Llora sobre el muerto
  - Llora por el difunto
  lexicon: BDAG
  rationale: κλαῦσον es un imperativo de lamentación audible, bien reflejado por «llora». Con ἐπὶ + dativo en este contexto, el sentido es lamentar a la persona muerta; «por el muerto» conserva la relación de duelo sin volverlo demasiado abstracto.
- source_word: ἐξέλιπεν γὰρ φῶς
  english_pob_choice: for the light has failed
  chosen_spanish: porque se ha apagado la luz
  alternatives_spanish:
  - porque la luz ha fallado
  - porque la luz se ha extinguido
  lexicon: BDAG
  rationale: El griego conserva la imagen de φῶς, no de «vida». «Se ha apagado la luz» preserva la metáfora y sugiere el cese de la vida sin explicitarlo de más, en línea con el audit trail inglés.
- source_word: μωρῷ
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el tonto
  - el insensato
  lexicon: BDAG
  rationale: En literatura sapiencial, μωρός designa una categoría moral y sapiencial, no solo falta de inteligencia. «Necio» es el equivalente español más natural y bíblicamente reconocible para mantener esa fuerza.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - la comprensión
  - el discernimiento
  lexicon: BDAG
  rationale: σύνεσις expresa entendimiento/discernimiento. «Entendimiento» conserva la relación directa con «necio» y funciona bien en la formulación proverbial del versículo.
theological_decisions:
- issue: Metáfora de la luz en relación con la muerte
  english_pob_reading: Retain the metaphor 'the light has failed' rather than interpret it explicitly as 'life is gone.'
  chosen_spanish_reading: Conservar la metáfora «se ha apagado la luz» en vez de explicitar «la vida se ha ido».
  alternative_spanish_readings:
  - porque ha salido la vida
  - porque la vida se ha apagado
  rationale: El texto griego usa φῶς, no ζωή. La traducción española mantiene la imagen poética y evita introducir una interpretación no verbalizada por el original.
  doctrine_reference: Translation philosophy §1, §3
- issue: Categoría sapiencial de μωρός
  english_pob_reading: Render as 'the fool' rather than a softened expression like 'the unwise person.'
  chosen_spanish_reading: Renderizar μωρός como «el necio» en vez de suavizarlo como «el no sabio».
  alternative_spanish_readings:
  - el insensato
  - el falto de juicio
  rationale: El proverbio contrapone muerte física y pérdida de entendimiento. «Necio» preserva la categoría sapiencial tradicional y la aspereza del dicho.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta redacción sigue el sentido del texto griego y la auditoría inglesa, conservando la metáfora de la luz y el paralelismo proverbial.
  spanish_consistency_notes:
  - Se mantiene «llora» para κλαῦσον en ambos miembros del versículo, preservando el paralelismo.
  - Se usa «se ha apagado» de forma repetida para ἐξέλιπεν, reproduciendo la reiteración retórica del griego.
  - «Neceo»/«entendimiento» conserva la oposición sapiencial sin suavizar μωρός ni σύνεσις.
  - Se evita «SEÑOR» u այլ terminología no pertinente; este versículo no contiene el Nombre divino ni lenguaje cristológico.
