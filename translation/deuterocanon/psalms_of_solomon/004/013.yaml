id: PSS.4.13
reference: Psalms of Solomon 4:13
source:
  edition: lxx-swete-1909
  text: οὐκ ἀπέστη ἕως ἐνίκησεν σκορπίσαι ὡς ἐν ὀρφανίᾳ. καὶ ἠρήμωσεν οἶκον ἕνεκεν ἐπιθυμίας παρανόμου.
  language: Greek
  pages:
  - 793
  validation: swete_direct
translation:
  text: He did not stop until he had succeeded in scattering them as in orphanhood[c][b][a], and he made a house desolate because of lawless desire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as in bereavement' / 'as among the fatherless' for ὡς ἐν ὀρφανίᾳ.
    reason: lexical_alternative
  - marker: b
    text: '''House'' likely carries the broader sense of ''household'' here, given the surrounding context of destroying families.'
    reason: cultural_note
  - marker: c
    text: Or 'scattering the household'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὐκ ἀπέστη
  chosen: He did not stop
  alternatives:
  - he did not depart
  - he did not cease
  - he did not relent
  lexicon: LSJ
  rationale: In context the verb describes persistent predatory action, so 'did not stop' gives the force idiomatically in modern English without implying physical departure.
- source_word: ἐνίκησεν
  chosen: had succeeded
  alternatives:
  - prevailed
  - won
  - conquered
  lexicon: LSJ
  rationale: With the following infinitive σκορπίσαι, the sense is not military conquest but successful accomplishment of his aim.
- source_word: σκορπίσαι
  chosen: in scattering
  alternatives:
  - to scatter
  - to disperse
  lexicon: LSJ
  rationale: The infinitive expresses the result/aim of his persistence. 'Scattering the household' preserves the destructive social sense in context.
- source_word: ὡς ἐν ὀρφανίᾳ
  chosen: as in orphanhood
  alternatives:
  - as in bereavement
  - as among the fatherless
  lexicon: LSJ
  rationale: The phrase is unusual and vivid. 'Orphanhood' keeps the metaphor concrete and preserves the image of a family left shattered and unprotected.
- source_word: ἠρήμωσεν οἶκον
  chosen: he made a house desolate
  alternatives:
  - he laid waste a house
  - he devastated a household
  lexicon: LSJ
  rationale: The verb carries a desolating force. 'Made a house desolate' is close to the Greek while still natural English; 'house' also preserves the concrete wording behind the implied household ruin.
- source_word: ἕνεκεν ἐπιθυμίας παρανόμου
  chosen: because of lawless desire
  alternatives:
  - because of unlawful desire
  - for the sake of illicit lust
  lexicon: LSJ
  rationale: The phrase points to desire characterized by violation of God's law. 'Lawless desire' preserves that moral coloring better than a merely psychological term.
