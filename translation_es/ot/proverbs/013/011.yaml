translation:
  language: es
  text: La riqueza de la vanidad[a] disminuye, pero quien recoge poco a poco[b] la aumenta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la riqueza de lo vano». El hebreo מֵהֶבֶל es literalmente «de vapor/aliento» y sugiere algo vano, efímero, insustancial o sin fundamento.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por mano». El modismo probablemente se refiere a reunir gradualmente o en pequeñas cantidades.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: las riquezas
  alternatives_spanish:
  - la riqueza
  - los bienes
  - el patrimonio
  lexicon: HALOT
  rationale: הוֹן designa riqueza o posesiones materiales. En español, «las riquezas» comunica con naturalidad ese campo semántico y conserva el matiz de bienes acumulados.
- source_word: מֵהֶבֶל
  english_pob_choice: from vanity
  chosen_spanish: obtenidas de la vanidad
  alternatives_spanish:
  - de la vanidad
  - obtenidas de lo vano
  - por vanidad
  lexicon: HALOT
  rationale: הֶבֶל significa literalmente «vapor/aliento» y figuradamente «vanidad, vacuidad, insustancialidad». «Obtenidas de la vanidad» refleja el vínculo causal del hebreo sin reducirlo a un solo matiz; mantiene la tensión entre lo vano, lo fugaz y lo sin fundamento.
- source_word: יִמְעָט
  english_pob_choice: dwindles
  chosen_spanish: disminuyen
  alternatives_spanish:
  - se reducen
  - menguan
  - disminuyen poco a poco
  lexicon: HALOT
  rationale: El verbo expresa hacerse pequeño o disminuir. «Disminuyen» es una forma natural y fiel en español para el paralelismo proverbial.
- source_word: וְקֹבֵץ
  english_pob_choice: whoever gathers
  chosen_spanish: el que recoge
  alternatives_spanish:
  - quien junta
  - quien acumula
  - el que va recogiendo
  lexicon: HALOT
  rationale: El participio funciona de modo sustantivo para una persona genérica. «El que recoge» preserva esa fuerza general sin sonar forzado.
- source_word: עַל יָד
  english_pob_choice: little by little
  chosen_spanish: poco a poco
  alternatives_spanish:
  - gradualmente
  - de mano en mano
  - por pequeñas porciones
  lexicon: HALOT
  rationale: La expresión idiomática sugiere acumulación gradual, probablemente en pequeñas cantidades o con trabajo constante. «Poco a poco» transmite el contraste proverbial de manera clara y natural.
- source_word: יַרְבֶּה
  english_pob_choice: increases it
  chosen_spanish: las aumenta
  alternatives_spanish:
  - las multiplica
  - las hace crecer
  - aumenta esas riquezas
  lexicon: HALOT
  rationale: El causativo de רבה significa hacer mucho o aumentar. Se sobreentiende el objeto «las riquezas»; en español, «las aumenta» conserva la economía del hebreo y la relación con el sustantivo previo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió una paráfrasis más interpretativa por «from vanity» para ajustarse mejor a מֵהֶבֶל. En español, se siguió esa corrección y se evitó una glosa que sugiriera solo rapidez; la nota conserva la amplitud semántica del término hebreo.
  spanish_consistency_notes:
  - Se mantuvo «riquezas» para הוֹן, en línea con el valor material del término.
  - Se tradujo הֶבֶל con «vanidad» por ser el equivalente más natural en español, pero con nota para preservar sus posibles matices de vapor, vacío y fugacidad.
  - «Poco a poco» conserva el carácter idiomático de עַל יָד sin forzar un literalismo opaco como «por mano».
