    rationale: 'El POB inglés preserva una alternativa léxica genuina: ''had died'' frente a ''was dead''. En español, la nota debería reflejar una opción distinta como ''había muerto'' si el texto principal dice ''estaba muerto'', o viceversa.'
  - severity: low
