translation:
  language: es
  text: Considerando que aquel momento era para ellos el punto final de la vida, el fin de su expectativa más miserable[a], se entregaron a la pena y a los lamentos, y seguían besándose unos a otros, abrazando a sus parientes, echándose al cuello[b] —padres sobre hijos y madres sobre hijas jóvenes; y otras, teniendo a sus bebés recién nacidos contra sus pechos, mamaban por última vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el fin de su espera más miserable». El griego προσδοκία puede significar expectativa, espera o suspense ante lo que está por suceder.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «cayendo sobre los cuellos»; es un giro idiomático griego para arrojarse al abrazo en dolor o afecto.'
    reason: cultural_note
lexical_decisions:
- source_word: ὑστάτην
  english_pob_choice: final
  chosen_spanish: último
  alternatives_spanish:
  - final
  - postrero
  lexicon: LSJ
  rationale: En este contexto, ὑστάτην marca el momento definitivo de la vida, no solo una posición temporal. «Último» comunica con naturalidad ese cierre decisivo.
- source_word: βίου ῥοπὴν
  english_pob_choice: turn of life
  chosen_spanish: giro de la vida
  alternatives_spanish:
  - momento de la vida
  - punto crítico de la vida
  - inclinación de la vida
  lexicon: LSJ
  rationale: ῥοπή conserva la imagen de un giro, vuelco o punto de inclinación. «Giro de la vida» mantiene la metáfora y su fuerza dramática en español.
- source_word: δόξαντες εἶναι
  english_pob_choice: considering
  chosen_spanish: considerando que era
  alternatives_spanish:
  - pensando que era
  - suponiendo que era
  lexicon: LSJ
  rationale: El participio expresa su evaluación de la situación. «Considerando que era» suena natural y conserva el matiz deliberado del griego.
- source_word: τὸ τέλος τῆς ἀθλιωτάτης προσδοκίας
  english_pob_choice: the end of their most miserable expectation
  chosen_spanish: el fin de su esperanza más miserable
  alternatives_spanish:
  - el fin de su espera más miserable
  - el desenlace de su expectativa más miserable
  - el término de su espera más desdichada
  lexicon: LSJ
  rationale: προσδοκία puede ser expectativa, espera o suspense. «Esperanza» en español capta el sentido de lo que aguardaban con angustia, aunque no elimina la tensión de la espera; se mantiene «más miserable» para reflejar el superlativo griego.
- source_word: εἰς οἶκτον καὶ γόους τραπέντες
  english_pob_choice: they turned to pity and lamentation
  chosen_spanish: se volvieron al compasión y al llanto
  alternatives_spanish:
  - se volvieron a la compasión y al lamento
  - se entregaron a la piedad y al duelo
  - se volvieron a la compasión y a los lamentos
  lexicon: LSJ
  rationale: τραπέντες indica volverse hacia un estado emocional. «Llanto» da en español una salida natural para γόους; «compasión» se usa aquí como aproximación al οἶκτος del texto, aunque el giro es algo difícil en español y se conserva la tensión semántica.
- source_word: κατεφίλουν
  english_pob_choice: kept kissing
  chosen_spanish: seguían besándose
  alternatives_spanish:
  - seguían besándose con fervor
  - se besaban repetidamente
  lexicon: LSJ
  rationale: El imperfecto sugiere acción repetida y continua. «Seguían besándose» conserva ese valor iterativo sin sonar forzado.
- source_word: περιπλεκόμενοι
  english_pob_choice: embracing
  chosen_spanish: abrazando
  alternatives_spanish:
  - estrechando
  - rodeando con los brazos
  - abrazándose
  lexicon: LSJ
  rationale: El participio describe un abrazo físico de despedida. «Abrazando» es la forma más idiomática y cercana en español.
- source_word: τοῖς συγγενέσιν
  english_pob_choice: their relatives
  chosen_spanish: a sus parientes
  alternatives_spanish:
  - a sus familiares
  - a sus parientes cercanos
  - a sus deudos
  lexicon: LSJ
  rationale: συγγενεῖς abarca la parentela en general. «Parientes» conserva amplitud sin restringir indebidamente el sentido.
- source_word: ἐπὶ τοὺς τραχήλους ἐπιπίπτοντες
  english_pob_choice: falling upon their necks
  chosen_spanish: cayendo sobre sus cuellos
  alternatives_spanish:
  - echándose al cuello
  - abrazándose al cuello
  - arrojándose sobre sus cuellos
  lexicon: LSJ
  rationale: Se conserva el giro corporal del griego. «Cayendo sobre sus cuellos» mantiene la imagen literal y queda comprensible en español, aunque el idioma natural sería una paráfrasis como «echándose al cuello».
- source_word: νεάνισιν
  english_pob_choice: young daughters
  chosen_spanish: jóvenes hijas
  alternatives_spanish:
  - jóvenes muchachas
  - hijas jóvenes
  - doncellas
  lexicon: LSJ
  rationale: En la secuencia familiar del pasaje, el término se refiere a hijas jóvenes dentro del grupo de parentesco. «Jóvenes hijas» deja clara la relación familiar.
- source_word: νεογνὰ ... βρέφη
  english_pob_choice: infant babies
  chosen_spanish: los bebés recién nacidos
  alternatives_spanish:
  - los recién nacidos
  - los infantes
  - los bebés de pecho
  lexicon: LSJ
  rationale: La duplicación de términos en griego intensifica la vulnerabilidad. «Bebés recién nacidos» reproduce esa cercanía semántica con una expresión natural en español.
- source_word: πρὸς μαστοὺς ἔχουσαι
  english_pob_choice: holding ... to their breasts
  chosen_spanish: junto a sus pechos
  alternatives_spanish:
  - contra sus pechos
  - al pecho
  - apretados contra sus pechos
  lexicon: LSJ
  rationale: La imagen es la de la lactancia. «Junto a sus pechos» evita una dureza excesiva y mantiene la escena de amamantamiento.
- source_word: τελευταῖον ἕλκοντα γάλα
  english_pob_choice: were drawing out their last milk
  chosen_spanish: estaban sacando su última leche
  alternatives_spanish:
  - estaban extrayendo su última leche
  - estaban tomando su última leche
  - estaban mamando por última vez
  lexicon: LSJ
  rationale: ἕλκω con γάλα sugiere extraer o sacar leche. «Sacando su última leche» conserva la idea de extracción final y el tono conmovedor del pasaje.
theological_decisions:
- issue: Tratamiento del nombre divino o títulos divinos
  english_pob_reading: No appears in this verse.
  chosen_spanish_reading: No aparece en este versículo.
  rationale: El versículo no contiene θεός, κύριος ni el nombre divino, así que no se aplica ninguna decisión teológica sobre traducción del nombre.
  doctrine_reference: N/A
- issue: Tono emocional del pasaje
  english_pob_reading: The scene emphasizes grief, pity, and familial farewell under mortal threat.
  chosen_spanish_reading: El pasaje destaca duelo, compasión y despedida familiar ante la muerte inminente.
  alternative_spanish_readings:
  - El pasaje destaca pena, lamento y despedida familiar ante la muerte inminente.
  - El pasaje destaca compasión, llanto y despedida familiar ante la muerte inminente.
  rationale: No hay una afirmación doctrinal explícita, pero sí una carga pastoral y narrativa fuerte. Se preserva el tono de duelo sin suavizar la escena.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó el orden para acercarlo al griego («for them the final turn of life») y cambió «were drawing their last milk» por «were drawing out their last milk» para reflejar mejor ἕλκοντα. La redacción española intenta seguir esas correcciones con «para ellos» implícito en el contexto del participio y con «sacando su última leche» para conservar la idea de extracción/dar salida del verbo griego.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio, pero con español actual.
  - Se evita reemplazar mecánicamente imágenes del griego por equivalentes tradicionales si eso borra el matiz corporal o afectivo.
  - 'Se conserva la secuencia familiar del pasaje: parientes, padres, hijos, madres, hijas, bebés.'
  - El verbo «sacar» para la leche intenta reflejar la fuerza de ἕλκω sin introducir una paráfrasis interpretativa excesiva.
