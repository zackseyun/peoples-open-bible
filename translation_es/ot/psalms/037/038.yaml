translation:
  language: es
  text: Pero los transgresores serán destruidos juntamente; el porvenir[a] de los impíos será cortado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el fin de los impíos será cortado». El hebreo אַחֲרִית puede significar «futuro», «desenlace» o «fin».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פֹשְׁעִים
  english_pob_choice: But transgressors
  chosen_spanish: Pero los transgresores
  alternatives_spanish:
  - Y los transgresores
  - rebeldes
  lexicon: HALOT
  rationale: פֹשְׁעִים nombra a quienes se rebelan o transgreden. "Transgresores" conserva el matiz moral-jurídico. El waw inicial se vierte como "Pero" para marcar el contraste con los justos en el contexto inmediato, siguiendo la lógica de la traducción inglesa auditada.
- source_word: נִשְׁמְדוּ
  english_pob_choice: are destroyed
  chosen_spanish: serán destruidos
  alternatives_spanish:
  - serán exterminados
  - perecerán
  lexicon: HALOT
  rationale: El nifal de שׁמד expresa ser destruido o exterminado. "Serán destruidos" es claro en español moderno y preserva la severidad del juicio sin forzar una lectura más absoluta de lo que exige el hebreo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - juntos
  - al mismo tiempo
  lexicon: HALOT
  rationale: El adverbio significa "juntos / juntamente / en conjunto". "Juntamente" suena más natural en registro bíblico en español y conserva la idea de un mismo destino compartido.
- source_word: אַחֲרִית
  english_pob_choice: the future
  chosen_spanish: el porvenir
  alternatives_spanish:
  - el fin
  - el resultado
  lexicon: HALOT
  rationale: אַחֲרִית puede significar fin, desenlace, futuro o posteridad. Aquí el paralelismo habla del destino final de los impíos; "porvenir" comunica ese prospecto en español sin limitar indebidamente el término a "descendencia" o fijarlo solo en "fin".
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los culpables
  lexicon: HALOT
  rationale: En español bíblico, "impíos" es un equivalente asentado para רְשָׁעִים y mantiene la categoría moral general del Salterio. "Malvados" sería posible, pero "impíos" conserva mejor el tono litúrgico y literario del poema.
- source_word: נִכְרָתָה
  english_pob_choice: is cut off
  chosen_spanish: será cortado
  alternatives_spanish:
  - será eliminado
  - será arrancado
  lexicon: HALOT
  rationale: El nifal de כרת conserva el modismo de "ser cortado", que en lenguaje bíblico transmite exclusión, cese o juicio. En español se mantiene el giro para no borrar la fuerza idiomática del hebreo.
theological_decisions:
- issue: Sentido de אַחֲרִית en un contexto de juicio
  english_pob_reading: the future of the wicked is cut off
  chosen_spanish_reading: el porvenir de los impíos será cortado
  alternative_spanish_readings:
  - el fin de los impíos será cortado
  - el desenlace de los impíos será cortado
  rationale: El sustantivo puede abarcar futuro, fin, desenlace o posteridad. En este contexto de contraste entre justos e impíos, "porvenir" comunica el horizonte de destino de los impíos sin reducirlo a sus descendientes. Se conserva así la tensión semántica documentada por la nota inglesa.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Coincide con la última pasada revisada del texto fuente en inglés; no se registran cambios posteriores ni revisiones aplicadas. La versión española sigue de cerca las decisiones auditadas del original, manteniendo el contraste adversativo, el verbo de destrucción, el adverbio de colectividad y la ambigüedad controlada de אַחֲרִית.
  spanish_consistency_notes:
  - Se usa "impíos" para רְשָׁעִים, conforme al registro bíblico del Salterio.
  - '"Ser cortado" preserva el modismo hebreo de כרת y evita una paráfrasis explicativa excesiva.'
  - La nota al pie mantiene la alternativa «fin» para reflejar la tensión lexical documentada en la fuente inglesa.
