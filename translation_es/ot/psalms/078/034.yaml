  rationale: 'La traducción principal puede mantenerse casi intacta, pero las notas deben corregirse para reflejar fielmente el audit trail del POB: la alternativa relevante recae en «volvían» (וְשָׁבוּ), no en «los mataba», y la nota sobre «buscaban con diligencia» debe mantenerse anclada al verbo de שחר. También se mejora ligeramente la naturalidad al omitir «ellos».'
