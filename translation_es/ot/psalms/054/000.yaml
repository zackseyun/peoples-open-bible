translation:
  language: es
  text: Al director del coro, con instrumentos de cuerda. Un Maskil[a] de David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maskil» es un término técnico hebreo en los encabezamientos de salmos; probablemente indica un tipo de composición o de ejecución, aunque su sentido exacto no es seguro.
    reason: lexical_alternative
  - marker: b
    text: O «por David» o «para David»; el encabezamiento hebreo puede indicar autoría, dedicación o asociación.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Al maestro de coro
  - Al director musical
  - Al jefe de músicos
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, el término designa al responsable de la ejecución musical. «Al director del coro» conserva la función litúrgico-musical de manera natural en español y evita un calco arcaico.
- source_word: בִּנְגִינוֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - con cuerda musical
  - con acompañamiento de cuerda
  - sobre instrumentos de cuerda
  lexicon: HALOT
  rationale: La referencia apunta específicamente a acompañamiento con cuerdas. «Con instrumentos de cuerda» es claro, natural y mantiene el sentido instrumental explícito.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo instructivo
  - Una composición reflexiva
  - Un canto de enseñanza
  lexicon: HALOT
  rationale: Es un término técnico hebreo cuyo sentido preciso es discutido. Se conserva la transliteración para no imponer una interpretación que el hebreo no determina con certeza.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición puede indicar autoría, dedicación o asociación. «De David» preserva esa ambigüedad mejor que una opción más específica.
theological_decisions:
- issue: Ambigüedad del encabezamiento davídico
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El encabezamiento de un salmo puede señalar autoría, dedicación o relación. La traducción mantiene la tensión interpretativa en lugar de resolverla sin apoyo suficiente del texto fuente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el hebreo la deja abierta.'
translation_notes:
  revision_awareness: 'La revisión del audit trail corrigió la colocación de las notas: la nota sobre «Maskil» debe ir unida a ese término, y la nota sobre «de David» debe ir unida a esa frase, no a «instrumentos». Esta versión refleja esa corrección.'
  spanish_consistency_notes:
  - Se mantiene «David» sin artículo, como en los encabezamientos poéticos.
  - «Al director del coro» y «con instrumentos de cuerda» conservan el marco musical del superscrito sin sobreinterpretarlo.
  - Se evita «SEÑOR» porque no aparece aquí el nombre divino; el texto es un encabezamiento musical y atributivo.
