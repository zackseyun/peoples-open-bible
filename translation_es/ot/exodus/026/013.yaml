  rationale: La revisión conserva el contenido del borrador, pero corrige la ubicación de las notas para que correspondan al inglés POB y al hebreo, mejora ligeramente la simetría del español y sustituye 'se colgará sobre' por 'colgará sobre' para una formulación más natural sin perder el matiz de sobrecolgar.
