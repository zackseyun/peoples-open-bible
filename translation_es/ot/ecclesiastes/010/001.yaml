translation:
  language: es
  text: Las moscas muertas hacen que el aceite del perfumista huela mal y burbujee[a]; así, un poco de insensatez pesa más[b] que la sabiduría y el honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “fermentar”, “despedir burbujas” o, de modo más general, “echarse a perder”. El verbo hebreo sugiere una emisión activa o un burbujeo del aceite arruinado.
    reason: lexical_alternative
  - marker: b
    text: 'O “es más precioso que”. El hebreo también puede leerse como una comparación de valor: “un poco de insensatez es más pesada/más significativa que la sabiduría y el honor”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְבוּבֵי מָוֶת
  english_pob_choice: Dead flies
  chosen_spanish: moscas muertas
  alternatives_spanish:
  - moscas de muerte
  - moscas mortales
  lexicon: HALOT
  rationale: La imagen hebrea apunta a moscas asociadas con la muerte o descomposición; en español, 'moscas muertas' transmite de modo natural el cuadro de insectos que corrompen el aceite. 'Moscas de muerte' sería demasiado literal y menos idiomático.
- source_word: יַבְאִ֥ישׁ
  english_pob_choice: make ... stink
  chosen_spanish: hacen que ... huela mal
  alternatives_spanish:
  - causan que ... apeste
  - hacen ... apestar
  lexicon: HALOT
  rationale: El verbo causativo expresa que las moscas producen mal olor en el aceite. 'Huelen mal' no conservaría la causalidad; 'hacen que ... huela mal' la mantiene con español natural.
- source_word: יַבִּ֖יעַ
  english_pob_choice: bubble up
  chosen_spanish: burbujee
  alternatives_spanish:
  - fermente
  - despida burbujas
  - brote
  lexicon: HALOT
  rationale: El hebreo puede sugerir burbujeo, fermentación o una emisión activa. 'Burbujee' conserva la imagen física y el movimiento del líquido arruinado sin cerrar indebidamente la ambigüedad.
- source_word: שֶׁ֣מֶן רוֹקֵ֑חַ
  english_pob_choice: a perfumer’s oil
  chosen_spanish: el aceite del perfumista
  alternatives_spanish:
  - el aceite perfumado
  - el ungüento del perfumista
  - el aceite de un perfumista
  lexicon: HALOT
  rationale: La frase hebrea designa aceite perteneciente o preparado por un perfumista. 'Aceite del perfumista' es claro, digno y conserva el oficio implicado por רֹקֵחַ sin recurrir a 'ungüento' como equivalente fijo.
- source_word: יָקָ֛ר
  english_pob_choice: outweighs
  chosen_spanish: pesa más
  alternatives_spanish:
  - vale más
  - es más precioso que
  - es más pesado que
  lexicon: HALOT
  rationale: En el proverbio comparativo, el sentido es de mayor peso o consecuencia, no solo de precio. 'Pesa más' reproduce bien esa fuerza evaluativa en español y mantiene la tensión proverbial.
- source_word: מֵ/חָכְמָ֥ה מִ/כָּב֖וֹד
  english_pob_choice: wisdom and honor
  chosen_spanish: la sabiduría y el honor
  alternatives_spanish:
  - la sabiduría y la gloria
  - la sabiduría y el prestigio
  lexicon: HALOT
  rationale: Las dos cualidades forman el conjunto sobre el que se compara la insensatez. 'Honor' encaja mejor que 'gloria' en este marco social y relacional.
- source_word: סִכְל֥וּת מְעָֽט
  english_pob_choice: a little folly
  chosen_spanish: un poco de insensatez
  alternatives_spanish:
  - una pequeña necedad
  - una mínima falta de juicio
  lexicon: HALOT
  rationale: '''סִכְלוּת'' describe necedad/insensatez. ''Un poco de insensatez'' suena natural en español y conserva la paradoja del proverbio: una cantidad pequeña produce un efecto desproporcionado.'
translation_notes:
  revision_awareness: Se siguió la lectura confirmada por el consenso del audit trail inglés y no se introdujeron cambios de revisión adicionales; se preserva la doble posibilidad del verbo y de la comparación de valor con notas breves.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa 'insensatez' para סִכְלוּת por claridad natural en español, sin perder el matiz de necedad práctica del proverbio.
  - La puntuación reproduce la estructura comparativa del hebreo y del inglés POB, con una pausa fuerte tras el primer hemistiquio.
