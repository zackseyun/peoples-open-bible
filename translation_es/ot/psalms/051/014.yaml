translation:
  language: es
  text: Devuélveme el gozo de tu salvación[c], y que un espíritu dispuesto[a] me sostenga[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu generoso» o «un espíritu noble».
    reason: lexical_alternative
  - marker: b
    text: O «me apoye».
    reason: lexical_alternative
  - marker: c
    text: O «tu liberación».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשִׁיבָה
  english_pob_choice: Restore
  chosen_spanish: Restáurame
  alternatives_spanish:
  - Devuélveme
  - Restaura
  lexicon: HALOT
  rationale: El imperativo causativo de שוב pide que Dios haga volver algo al hablante. En español, «restaurar» expresa bien la acción de devolver a un estado anterior; en forma pronominal, «Restáurame» conserva la petición directa y natural en esta oración.
- source_word: לִּי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica destinatario de la restauración. En español, el dativo clítico «me» resulta más fluido que una perífrasis preposicional y mantiene el valor receptivo del hebreo.
- source_word: שְׂשׂוֹן
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: HALOT
  rationale: El sustantivo denota alegría o júbilo. «Gozo» es un equivalente bíblico claro y digno en español, y funciona bien con el paralelismo poético del versículo.
- source_word: יִשְׁעֶךָ
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu liberación
  - la salvación que das
  lexicon: HALOT
  rationale: ישׁע puede abarcar salvación o liberación. «Tu salvación» conserva el alcance teológico amplio y sigue de cerca la decisión inglesa de no estrechar el sentido a una mera liberación temporal.
- source_word: וְרוּחַ
  english_pob_choice: and ... spirit
  chosen_spanish: y ... espíritu
  alternatives_spanish:
  - y ... soplo
  - y ... aliento
  lexicon: HALOT
  rationale: En este contexto poético y antropológico, רוּחַ se entiende mejor como «espíritu». «Espíritu» mantiene la ambigüedad suficiente entre disposición interior y vigor personal sin forzar un sentido de viento o aliento.
- source_word: נְדִיבָה
  english_pob_choice: willing
  chosen_spanish: dispuesto
  alternatives_spanish:
  - generoso
  - noble
  - voluntarioso
  lexicon: HALOT
  rationale: El adjetivo puede significar noble, generoso o voluntario/dispuesto. Aquí, en una súplica por firmeza interior, «dispuesto» refleja mejor la idea de una disposición libre y pronta para responder.
- source_word: תִסְמְכֵנִי
  english_pob_choice: let ... sustain me
  chosen_spanish: me sostenga
  alternatives_spanish:
  - me apoye
  - me sostenga y me apoye
  lexicon: HALOT
  rationale: De סמך, «sostener, apoyar, sustentar». En español, «sostener» comunica bien la asistencia continua implícita; en el giro jussivo/petitorio, «que ... me sostenga» reproduce naturalmente la súplica del hebreo.
theological_decisions:
- issue: Alcance de «tu salvación»
  english_pob_reading: your salvation
  chosen_spanish_reading: tu salvación
  alternative_spanish_readings:
  - tu liberación
  rationale: El hebreo permite tanto rescate/liberación como salvación. En un salmo penitencial, «tu salvación» preserva el alcance teológico más amplio sin reducirlo a una intervención meramente circunstancial.
  doctrine_reference: Mantener la tensión léxica y teológica cuando el original la permite; no estrechar el término más de lo necesario.
- issue: Sentido de «un espíritu dispuesto»
  english_pob_reading: a willing spirit
  chosen_spanish_reading: un espíritu dispuesto
  alternative_spanish_readings:
  - un espíritu generoso
  - un espíritu noble
  rationale: La frase hebrea deja abierta la posibilidad de entender una disposición interior renovada o un matiz más amplio de nobleza/generosidad. «Dispuesto» conserva esa apertura mejor que una opción más interpretativa.
  doctrine_reference: Preservar la tensión exegética documentada y evitar resolverla dogmáticamente en la traducción principal.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final fue marcado como sin modificaciones necesarias, con alto grado de acuerdo entre revisores y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton explícito; por eso no aparece aquí.
  - Se eligió «tu salvación» en lugar de «tu liberación» en el texto principal para conservar la amplitud semántica del hebreo y la decisión inglesa auditada.
  - «Espíritu dispuesto» evita suavizar el posible rango semántico de נְדִיבָה hacia un sentido exclusivamente ético o exclusivamente carismático.
  - La puntuación reproduce el paralelismo hebreo con una coma antes de la segunda petición.
