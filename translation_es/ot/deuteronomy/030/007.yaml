translation:
  language: es
  text: Yahvé tu Dios pondrá todas estas maldiciones sobre tus enemigos y sobre los que te odian[a], que te persiguieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos estos juramentos'; en Deuteronomio, este término suele referirse a maldiciones o sanciones del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: will put
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - pondrá sobre
  - hará caer
  lexicon: HALOT
  rationale: נתן tiene un rango amplio que incluye 'dar', 'poner' y 'colocar'. En este contexto de sanciones del pacto, 'pondrá' comunica de manera natural y fiel la idea de imponer esas maldiciones sobre los destinatarios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. En español, 'Yahvé' preserva la transliteración del Tetragrámaton según la terminología POB y evita sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona singular se expresa de manera directa como 'tu Dios'. Con Yahvé, mantiene la fórmula de alianza sin añadir matices no presentes en el hebreo.
- source_word: כָּל הָאָלֹת הָאֵלֶּה
  english_pob_choice: all these curses
  chosen_spanish: todas estas maldiciones
  alternatives_spanish:
  - todos estos juramentos
  - todas estas imprecaciones
  lexicon: HALOT
  rationale: En el contexto de Deuteronomio, אָלוֹת se refiere a sanciones de pacto, no meramente a juramentos. 'Maldiciones' refleja ese sentido contextual en español y conserva la fuerza jurídica y teológica del pasaje.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: HALOT
  rationale: El hebreo marca el destino o la imposición de las maldiciones. 'Sobre' reproduce bien la imagen de caída/recargo y suena natural en español bíblico contemporáneo.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  lexicon: HALOT
  rationale: La equivalencia estándar para אויב en plural con sufijo es 'enemigos'. Conserva el sentido hostil y personal del término.
- source_word: וְעַל שֹׂנְאֶיךָ
  english_pob_choice: and on those who hate you
  chosen_spanish: y sobre los que te odian
  alternatives_spanish:
  - y sobre tus odiadores
  - y sobre los que son hostiles contigo
  lexicon: HALOT
  rationale: El participio expresa una acción o actitud continua; en español, 'los que te odian' comunica esa cualidad sin sonar forzado. Mantiene la relación paralela con 'tus enemigos'.
- source_word: אֲשֶׁר רְדָפֽוּךָ
  english_pob_choice: who pursued you
  chosen_spanish: que te persiguieron
  alternatives_spanish:
  - que te han perseguido
  - que te acosaron
  lexicon: HALOT
  rationale: רדף puede significar perseguir, acosar o perseguir violentamente. 'Te persiguieron' conserva el valor básico del verbo y la referencia histórica de hostilidad sin estrecharlo indebidamente.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el nombre personal del pacto; la política POB busca hacerlo visible. 'Yahvé' es la forma establecida en el proyecto para preservar el Tetragrámaton sin ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of אָלוֹת in covenant context
  english_pob_reading: curses
  chosen_spanish_reading: maldiciones
  alternative_spanish_readings:
  - juramentos
  - imprecaciones
  rationale: En Deuteronomio 30 el término remite a sanciones del pacto. 'Maldiciones' comunica ese valor contextual en español y evita reducirlo a un mero juramento verbal.
  doctrine_reference: Lexical context in Deuteronomy 27–30; covenant blessings/curses framework
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés sin revisiones aplicadas; se mantuvo la decisión principal sobre אָלוֹת como 'maldiciones' y el nombre divino como 'Yahvé'.
  spanish_consistency_notes:
  - Se mantuvo el estilo bíblico moderno y digno, evitando la sustitución de Yahvé por un título.
  - La preposición 'sobre' conserva la imagen de imposición de las sanciones.
  - El participio hebreo se vertió con una relativa natural en español para evitar una construcción artificial.
