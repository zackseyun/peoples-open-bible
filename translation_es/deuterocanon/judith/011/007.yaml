translation:
  language: es
  text: Porque vive el rey Nabucodonosor de toda la tierra, y vive su dominio[a], él que te envió para la prosperidad de todo ser viviente[b], porque no solo los hombres servirán a él por medio de ti, sino que también las fieras del campo, el ganado y las aves del cielo vivirán para Nabucodonosor y toda su casa por tu fuerza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su poder». El griego κράτος puede referirse a poder efectivo o a dominio soberano; aquí se opta por «dominio» en este contexto real.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para el cumplimiento/prosperidad de toda alma». La frase griega πάσης ψυχῆς probablemente significa toda vida o todo ser viviente, no «alma» en sentido técnico.'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final está comprimida en griego y también puede entenderse: «vivirán para Nabucodonosor y toda su casa por tu fuerza».'
    reason: alternative_reading
lexical_decisions:
- source_word: ζῇ
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  - vive en
  lexicon: LSJ
  rationale: En la fórmula solemne y repetida ζῇ ... καὶ ζῇ, «vive» conserva el valor declarativo e intensivo del original y suena natural en español bíblico sin perder el matiz de proclamación cortesana.
- source_word: κράτος
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - poder
  - mando
  - señorío
  lexicon: LSJ
  rationale: En este contexto real, κράτος expresa poder efectivo de gobierno; «dominio» refleja mejor la soberanía política que «poder» o «mando» y mantiene la fuerza del paralelo con el rey.
- source_word: κατόρθωσιν
  english_pob_choice: prosperity
  chosen_spanish: prosperidad
  alternatives_spanish:
  - éxito
  - acierto
  - accomplimiento
  lexicon: LSJ
  rationale: El giro εἰς κατόρθωσιν πάσης ψυχῆς apunta a un resultado favorable para toda vida/persona; «prosperidad» recoge bien el sentido de beneficio o realización favorable sin reducirlo solo a «éxito».
- source_word: πάσης ψυχῆς
  english_pob_choice: every living being
  chosen_spanish: toda persona
  alternatives_spanish:
  - toda alma viviente
  - toda vida
  - todo ser viviente
  lexicon: LSJ
  rationale: La POB inglesa preserva el valor amplio de ψυχή como vida/ser viviente, no como alma inmortal. En español, «toda persona» comunica de manera clara y reverente la amplitud de destinatarios, aunque el griego literalmente diga «toda alma».
- source_word: ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: LSJ
  rationale: Se mantiene la distinción humana frente a animales y aves. «Los hombres» reproduce la oposición del pasaje y conserva el tono general sin introducir una paraprástica neutralización.
- source_word: δουλεύσουσιν
  english_pob_choice: serve
  chosen_spanish: servirán
  alternatives_spanish:
  - serán esclavos de
  - estarán sujetos a
  lexicon: LSJ
  rationale: Aunque δουλεύω puede tener fuerza esclava, aquí el contexto es de sumisión/servicio político a un rey; «servirán» sigue la lectura de la POB inglesa y evita cargar el verso con una esclavitud literal que el contexto no exige.
- source_word: θηρία τοῦ ἀγροῦ
  english_pob_choice: the wild animals
  chosen_spanish: las fieras del campo
  alternatives_spanish:
  - los animales salvajes
  - las bestias del campo
  lexicon: LSJ
  rationale: «Fieras del campo» conserva el eco bíblico tradicional y el contraste con los animales domésticos, mientras que «animales salvajes» sería más explicativo pero menos cercano a la imaginería del griego.
- source_word: κτήνη
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales domésticos
  - la ganadería
  lexicon: LSJ
  rationale: κτήνη designa animales domesticados o de rebaño; «el ganado» es natural en español bíblico y mantiene la categoría frente a las fieras y las aves.
- source_word: πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del cielo
  - los pájaros del cielo
  lexicon: LSJ
  rationale: «Aves del cielo» es la expresión bíblica más natural en español y corresponde bien al hebraísmo/idioma del griego, preservando la imagen vertical sin sonar forzado.
- source_word: διὰ σὲ
  english_pob_choice: through you
  chosen_spanish: por medio de ti
  alternatives_spanish:
  - por ti
  - a través de ti
  lexicon: LSJ
  rationale: La revisión inglesa corrigió «because of you» a «through you»; en español, «por medio de ti» expresa con claridad el valor instrumental de διά con acusativo en un marco narrativo y político.
- source_word: διὰ τῆς ἰσχύος σου
  english_pob_choice: through your strength
  chosen_spanish: por tu fuerza
  alternatives_spanish:
  - por tu poder
  - mediante tu fuerza
  lexicon: LSJ
  rationale: «Fuerza» conserva el sentido de ἰσχύς como capacidad efectiva y mantiene la relación causal/instrumental con el verbo «vivirán» sin sobreinterpretar el final comprimido del griego.
- source_word: ζήσονται
  english_pob_choice: will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - subsistirán
  - sobrevivirán
  - prosperarán
  lexicon: LSJ
  rationale: El futuro de ζάω se mantiene directo. «Vivirán» conserva la hipérbole del texto, según la cual incluso los animales dependerán del poder del rey, sin añadir una explicación interpretativa.
- source_word: πάντα τὸν οἶκον αὐτοῦ
  english_pob_choice: all his house
  chosen_spanish: toda su casa
  alternatives_spanish:
  - toda su casa
  - toda su casa real
  - todo su linaje
  lexicon: LSJ
  rationale: «Casa» puede abarcar hogar, corte o dinastía; aquí se preserva esa amplitud con «toda su casa», que coincide con la ambigüedad útil del original y del audit trail inglés.
theological_decisions:
- issue: Aclamación real hiperbólica de Nabucodonosor
  english_pob_reading: Retained the exalted formula 'King Nebuchadnezzar, of all the earth, lives, and his dominion lives' without softening its hyperbole.
  chosen_spanish_reading: Se conserva la fórmula exaltada «vive el rey Nabucodonosor, de toda la tierra, y vive su dominio» sin suavizar su hipérbole.
  alternative_spanish_readings:
  - parafrasear como simple elogio cortesano sin repetir «vive»
  - rebajar «de toda la tierra» a una expresión menos absoluta
  rationale: El pasaje es un discurso estratégico dentro de la narración, no una afirmación doctrinal. La traducción debe retener la hipérbole y la tensión teológica del texto, en vez de armonizarla o explicarla en exceso.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La versión inglesa revisada retiró «ruler of» para acercarse más al griego, cambió «success» por «prosperity» para κατόρθωσιν, ajustó «because of you» a «through you» para διὰ σέ, prefirió «livestock» para κτήνη y reordenó el cierre para seguir mejor la sintaxis griega. La versión española sigue esas decisiones y conserva las tensiones semánticas relevantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «Cristo» porque no hay Χριστός en el pasaje.
  - Se usa «espíritu» solo donde corresponda; aquí no aparece πνεῦμα.
  - Se conserva la distinción entre «fieras», «ganado» y «aves del cielo» para reflejar las tres categorías del griego.
  - Se elige «toda persona» para πάσης ψυχῆς por claridad, pero la nota conserva el matiz de «alma viviente».
