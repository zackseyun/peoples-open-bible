translation:
  language: es
  text: Así el alfarero[a], sentado junto a su trabajo y haciendo girar la rueda con sus pies, está continuamente preocupado por su trabajo, y toda su labor está numerada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ceramista». El griego κεραμεύς designa al artesano que trabaja la arcilla; «alfarero» es la equivalencia más natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κεραμεύς
  english_pob_choice: potter
  chosen_spanish: alfarero
  alternatives_spanish:
  - potero
  - ceramista
  lexicon: LSJ
  rationale: El sentido normal es el artesano que trabaja la arcilla. 'Alfarero' es el equivalente natural y transparente en español; 'ceramista' suena más técnico o moderno.
- source_word: καθήμενος ἐν ἔργῳ αὐτοῦ
  english_pob_choice: sitting at his work
  chosen_spanish: sentado en su trabajo
  alternatives_spanish:
  - sentado en su labor
  - sentado en su tarea
  lexicon: LSJ
  rationale: La expresión describe la postura del artesano mientras trabaja. 'En su trabajo' conserva la imagen concreta sin forzar una construcción poco natural en español.
- source_word: συστρέφων ... τροχόν
  english_pob_choice: turning the wheel
  chosen_spanish: haciendo girar la rueda
  alternatives_spanish:
  - girando la rueda
  - volteando la rueda
  lexicon: LSJ
  rationale: El verbo indica poner en movimiento la rueda del torno. 'Haciendo girar' expresa con claridad la acción continua del alfarero.
- source_word: ἐν ποσὶν αὐτοῦ
  english_pob_choice: with his feet
  chosen_spanish: con sus pies
  alternatives_spanish:
  - por medio de sus pies
  - con los pies
  lexicon: LSJ
  rationale: La frase señala el medio por el cual mueve la rueda. 'Con sus pies' es directo, claro y fiel.
- source_word: ἐν μερίμνῃ κεῖται διὰ παντός
  english_pob_choice: is continually concerned
  chosen_spanish: está continuamente pendiente
  alternatives_spanish:
  - está continuamente preocupado
  - vive en continua preocupación
  lexicon: LSJ
  rationale: Μερίμνῃ expresa cuidado o preocupación constante, pero no necesariamente ansiedad patológica. 'Pendiente' conserva el sentido de atención sostenida y el tono neutral del ajuste revisado en inglés.
- source_word: ἐπὶ τὸ ἔργον αὐτοῦ
  english_pob_choice: over his work
  chosen_spanish: de su labor
  alternatives_spanish:
  - sobre su trabajo
  - acerca de su obra
  lexicon: LSJ
  rationale: En español, con 'pendiente', la relación se expresa naturalmente con 'de'. Mantiene el foco de su preocupación en la labor misma.
- source_word: ἐνάριθμος
  english_pob_choice: numbered
  chosen_spanish: numerada
  alternatives_spanish:
  - contada
  - computada
  - recontada
  lexicon: LSJ
  rationale: El adjetivo significa 'contado' o 'numerado'. 'Numerada' preserva la nota formal y la ambigüedad posible entre contar y registrar por número.
- source_word: πᾶσα ἡ ἐργασία αὐτοῦ
  english_pob_choice: all his labor
  chosen_spanish: toda su obra
  alternatives_spanish:
  - toda su labor
  - todo su trabajo
  - toda su producción
  lexicon: LSJ
  rationale: ἐργασία puede referirse al trabajo o al producto del trabajo. 'Obra' evita repetición excesiva de 'trabajo' y deja abierta la referencia al resultado de su labor.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que suaviza μερίμνῃ hacia un cuidado continuo más neutral y prefiere una formulación natural para ἐνάριθμος (‘numbered’). La traducción española refleja ese ajuste con 'está continuamente pendiente' y 'está numerada'.
  spanish_consistency_notes:
  - Se conservó el campo semántico de trabajo artesanal con 'alfarero', 'rueda' y 'labor/obra'.
  - Se evitó 'ansioso' para no cargar μερίμνῃ con un matiz psicológico más fuerte que el del griego y del POB revisado.
  - '''Numerada'' mantiene la posibilidad de entender ἐνάριθμος como ''contada por número'' sin cerrar la ambigüedad.'
  - El texto es una sola oración fluida y publicable, con puntuación española estándar.
