translation:
  language: es
  text: Pero Yahvé[a], el Dios de Israel, que todo lo ve, lo hirió con un golpe incurable e invisible[b]; y apenas terminó de hablar, se apoderó de él un dolor incurable en sus entrañas, y amargos tormentos en su interior[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene κύριος («Señor») como título divino, en aposición con «el Dios de Israel». Se usa «Yahvé» en el texto principal conforme al estándar del proyecto para la referencia al Dios de Israel.
    reason: theological_terminology
  - marker: b
    text: O «con un azote incurable e invisible» o «con una plaga incurable e invisible». El griego πληγῇ puede denotar golpe, azote, plaga o aflicción.
    reason: lexical_alternative
  - marker: c
    text: Lit. «un dolor incurable de las entrañas, y amargos tormentos de lo de dentro».
    reason: lexical_alternative
lexical_decisions:
- source_word: παντεπόπτης
  english_pob_choice: all-seeing
  chosen_spanish: que todo lo ve
  alternatives_spanish:
  - omnividente
  - que ve todo
  lexicon: LSJ
  rationale: El compuesto expresa la idea de quien ve todo. En español, "que todo lo ve" es natural, solemne y conserva la amplitud de la omnisciencia sin forzar un tecnicismo poco usual.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: LSJ
  rationale: En este contexto λειτουργa como título divino en aposición con "el Dios de Israel". "Señor" comunica bien ese uso reverencial en español bíblico y mantiene la referencia teológica.
- source_word: ἐπάταξεν
  english_pob_choice: struck
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo castigó
  lexicon: LSJ
  rationale: El verbo expresa un acto de golpe o herida divina. "Hirió" conserva la fuerza de juicio y suena natural en español bíblico, sin caer en un calco tosco.
- source_word: ἀνιάτῳ
  english_pob_choice: incurable
  chosen_spanish: incurable
  alternatives_spanish:
  - sin remedio
  - que no se puede sanar
  lexicon: LSJ
  rationale: El adjetivo significa no curable. "Incurable" es la equivalencia más directa y transparente en español.
- source_word: ἀοράτῳ
  english_pob_choice: unseen
  chosen_spanish: invisible
  alternatives_spanish:
  - no visible
  - oculto
  lexicon: LSJ
  rationale: Aquí la idea es que el golpe no se veía a los ojos. "Invisible" comunica de forma clara la ausencia de visibilidad; aunque "no visible" es posible, "invisible" es más idiomático en español formal.
- source_word: πληγῇ
  english_pob_choice: blow
  chosen_spanish: golpe
  alternatives_spanish:
  - plaga
  - azote
  - herida
  lexicon: LSJ
  rationale: πληγή puede significar golpe, azote o plaga. Dado el verbo previo y el paralelismo con el inicio súbito del sufrimiento corporal, "golpe" preserva la imagen de una acción divina que hiere.
- source_word: ἄρτι
  english_pob_choice: just as
  chosen_spanish: apenas
  alternatives_spanish:
  - justo cuando
  - en el momento en que
  lexicon: LSJ
  rationale: La partícula marca cercanía temporal inmediata. "Apenas" expresa bien que el sufrimiento comenzó en el mismo instante en que terminó de hablar.
- source_word: καταλήξαντος τὸν λόγον
  english_pob_choice: he finished speaking
  chosen_spanish: había terminado de hablar
  alternatives_spanish:
  - había concluido su discurso
  - acabó de hablar
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto indica que su discurso acabó antes del evento siguiente. "Había terminado de hablar" es natural y fiel al valor temporal.
- source_word: ἔλαβεν αὐτὸν
  english_pob_choice: seized him
  chosen_spanish: lo alcanzó
  alternatives_spanish:
  - lo asaltó
  - se apoderó de él
  lexicon: LSJ
  rationale: El verbo describe el inicio repentino del dolor que lo toma de golpe. "Lo alcanzó" conserva la idea de irrupción súbita; "se apoderó de él" también sería posible, pero suena menos directo aquí.
- source_word: ἀνήκεστος
  english_pob_choice: incurable
  chosen_spanish: incurable
  alternatives_spanish:
  - sin remedio
  - irreparable
  lexicon: LSJ
  rationale: El adjetivo reaparece en la descripción del dolor. Se mantiene "incurable" para reflejar la repetición léxica del griego y la consistencia con ἀνιάτῳ, según el control editorial inglés.
- source_word: τῶν σπλάγχνων ἀλγηδών
  english_pob_choice: pain in his bowels
  chosen_spanish: un dolor en sus entrañas
  alternatives_spanish:
  - dolor en sus entrañas
  - dolor visceral
  lexicon: LSJ
  rationale: σπλάγχνα remite a las entrañas o vísceras; ἀλγηδών es dolor. "En sus entrañas" conserva el matiz corporal y bíblico del término sin rebajarlo a un registro demasiado coloquial.
- source_word: πικραὶ τῶν ἔνδον βάσανοι
  english_pob_choice: bitter torments in his inner parts
  chosen_spanish: amargos tormentos en sus partes internas
  alternatives_spanish:
  - amargos tormentos internos
  - crueles tormentos en su interior
  lexicon: LSJ
  rationale: βάσανοι son tormentos, y πικραί es "amargos". "Partes internas" reproduce de manera transparente τῶν ἔνδον, manteniendo la concreción física del griego sin suavizarla.
theological_decisions:
- issue: Agencia divina directa en la aflicción de Antíoco
  english_pob_reading: The verse attributes the striking directly to the all-seeing Lord, the God of Israel.
  chosen_spanish_reading: El versículo atribuye directamente a Yahvé, el Dios de Israel, el golpe que hiere a Antíoco.
  alternative_spanish_readings:
  - Dios permitió que fuera afligido
  - el Señor lo dejó caer en enfermedad
  rationale: El griego nombra a Dios como sujeto activo de ἐπάταξεν. La traducción conserva esa atribución directa y evita diluirla en una fórmula permisiva que el texto no dice.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Uso de 'Señor' frente al nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé / el Señor en aposición contextual
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  rationale: El patrón del proyecto pide 'Yahvé' para el nombre divino. Sin embargo, en este versículo el texto griego usa κύριος como título junto a 'el Dios de Israel'; por eso se opta por una forma que no borre la referencia al nombre divino y conserve la lectura reverente en español.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: El texto inglés auditado conserva dos capas léxicas para ἀνιάτῳ/ἀνήκεστος (ambas con 'incurable') y trata πληγῇ como 'blow' con nota alternativa de 'plague/stroke'. La versión española mantiene esa doble insistencia con 'incurable' en ambos lugares, y deja en nota el abanico semántico de πληγῇ. También sigue el ajuste revisado del audit trail que unificó ἀνήκεστος con 'incurable'.
  spanish_consistency_notes:
  - Se mantuvo 'entrañas' para σπλάγχνα, en línea con el registro bíblico y con la concreción corporal del griego.
  - No se sustituyó 'incurable' por 'sin remedio' para conservar la repetición retórica del texto fuente.
  - '''Partes internas'' reproduce τῶν ἔνδον sin imponer una reinterpretación psicológica.'
  - Se prefirió una formulación natural en español que sigue de cerca la sintaxis griega sin calcarla mecánicamente.
