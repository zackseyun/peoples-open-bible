translation:
  language: es
  text: Dios se levanta; sus enemigos quedan dispersados[a], y los que lo odian huyen de delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una traducción optativa tradicional: «Que Dios se levante; que sus enemigos queden dispersados, y que los que lo odian huyan de delante de él».'
    reason: alternative_reading
lexical_decisions:
- source_word: יָקוּם
  english_pob_choice: rises up
  chosen_spanish: se levanta
  alternatives_spanish:
  - se alza
  - se pone en pie
  lexicon: HALOT
  rationale: El hebreo es un imperfecto qal de קום. En este contexto poético-teofánico, el español natural y solemne «se levanta» conserva la imagen de acción vigorosa sin forzar un valor puramente optativo en la línea principal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí el verbo singular confirma que se trata del Dios de Israel; por eso se traduce en singular como «Dios», no en plural ni como un título distinto.
- source_word: יָפוּצוּ
  english_pob_choice: are scattered
  chosen_spanish: son dispersados
  alternatives_spanish:
  - son esparcidos
  - se dispersan
  lexicon: HALOT
  rationale: El hebreo expresa el efecto sobre los enemigos. «Son dispersados» mantiene el resultado pasivo implícito que la POB inglesa captó con «are scattered» y preserva el paralelismo poético.
- source_word: אוֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de él
  lexicon: HALOT
  rationale: 'La forma con sufijo de tercera masculina singular se traduce de manera posesiva directa en español: «sus enemigos».'
- source_word: וְיָנוּסוּ
  english_pob_choice: and ... flee
  chosen_spanish: y ... huyen
  alternatives_spanish:
  - y ... se ponen en fuga
  - y ... escapan
  lexicon: HALOT
  rationale: El verbo נוס en poesía admite una traducción dinámica. «Huyen» es claro, natural y mantiene el paralelismo con la primera cola sin perder solemnidad.
- source_word: מְשַׂנְאָיו
  english_pob_choice: those who hate him
  chosen_spanish: los que lo odian
  alternatives_spanish:
  - los que lo aborrecen
  - sus odiadores
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. «Los que lo odian» conserva la fuerza verbal de la expresión hebrea mejor que un sustantivo más estático como «enemigos» o «aborrecedores».
- source_word: מִפָּנָיו
  english_pob_choice: from before him
  chosen_spanish: de delante de él
  alternatives_spanish:
  - de su presencia
  - ante él
  lexicon: HALOT
  rationale: La locución hebrea literalmente remite a la cara/presencia. «De delante de él» preserva el giro concreto y la idea de retirada en su presencia, en línea con la POB inglesa «from before him».
theological_decisions:
- issue: 'Valor verbal de los imperfectos iniciales: declaración o deseo'
  english_pob_reading: 'Declarative-present style: ''God rises up; his enemies are scattered...'' with a footnoted traditional optative alternative.'
  chosen_spanish_reading: 'Estilo declarativo presente: «Dios se levanta; sus enemigos son dispersados...» con la alternativa optativa preservada en nota.'
  alternative_spanish_readings:
  - «¡Que Dios se levante; que sus enemigos sean dispersados...»
  - «Dios se levante; sus enemigos sean dispersados...»
  rationale: Los imperfectos hebreos permiten oír tanto una proclamación vívida como una petición tradicional. La línea principal opta por el presente declarativo, que funciona de manera natural en español y sigue la decisión auditable de la POB inglesa, mientras la nota conserva la lectura optativa sin resolver la tensión.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje base; la propuesta mantiene el acuerdo alto del control cruzado y preserva la alternativa optativa documentada.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים por concordancia singular.
  - Se conserva «de delante de él» para reflejar la locución concreta מִפָּנָיו y la opción inglesa «from before him».
  - Se evita «Cristo» o terminología eclesiástica no presente en el hebreo.
  - La nota a conserva la tensión entre lectura declarativa y optativa sin mezclar ambas en el cuerpo del texto.
