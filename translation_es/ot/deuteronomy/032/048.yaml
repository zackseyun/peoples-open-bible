translation:
  language: es
  text: Y Yahvé habló a Moisés aquel mismo día[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». La forma tradicional en español es «el SEÑOR»; aquí se conserva el nombre divino como «Yahvé» por coherencia con la política del proyecto.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El valor narrativo del waw consecutivo con דבר introduce la acción de hablar. En español, «habló» mantiene el registro natural y formal, y conserva la apertura de una fórmula de discurso mejor que una traducción demasiado literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrammaton directamente. Siguiendo la decisión POB de preservar el nombre divino, «Yahvé» reproduce el nombre propio sin sustituirlo por un título, y es la forma estándar del proyecto en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» expresa de forma natural el complemento indirecto de habla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on that very day
  chosen_spanish: en ese mismo día
  alternatives_spanish:
  - en este mismo día
  - aquel mismo día
  lexicon: HALOT
  rationale: La expresión idiomática enfatiza el momento exacto. En español, «en ese mismo día» transmite bien la referencia retrospectiva del narrador y evita el calco de «hueso/substancia» del sustantivo עֶצֶם.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introductoria del discurso se conserva con un gerundio natural en español, que prepara la cita directa del versículo siguiente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: 'La lectura POB preserva el nombre propio de Dios en lugar de una sustitución tradicional. En español, «Yahvé» cumple la misma función: mantiene visible el Tetragrama y evita ocultarlo tras un título.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor temporal de בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_reading: on that very day
  chosen_spanish_reading: en ese mismo día
  alternative_spanish_readings:
  - en este mismo día
  - aquel mismo día
  rationale: La frase subraya exactitud temporal, no una referencia litúrgica ni una localización espacial. La traducción elegida conserva esa fuerza enfática sin introducir un matiz ajeno al hebreo.
  doctrine_reference: Principio de equivalencia óptima; énfasis temporal del texto hebreo
translation_notes:
  revision_awareness: 'Alineado con el registro de auditoría en inglés: se mantiene la decisión de traducir el Tetragrammaton como nombre propio y la expresión idiomática temporal como un énfasis de exactitud cronológica. No se aplicaron revisiones adicionales.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la terminología base del proyecto en español.
  - «Moisés» y la estructura de discurso siguen un español bíblico claro y contemporáneo, sin calcos innecesarios.
  - La nota al pie marca la alternativa tradicional para el nombre divino, preservando la tensión documental entre el nombre propio y la sustitución litúrgica.
