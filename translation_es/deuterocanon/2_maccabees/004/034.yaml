translation:
  language: es
  text: Por tanto, Menelao tomó aparte a Andrónico y lo instó a que diera muerte a Onías con engaño[a]. Andrónico fue a Onías, y, después de ganarse su confianza con engaño y saludarlo con juramentos, dándole su mano derecha, aunque estaba bajo sospecha, lo persuadió a salir del lugar de asilo[b]. Luego, de inmediato, lo encerró[c], sin mostrar respeto por la justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego χειρόγραφον es textual y léxicamente difícil; en este contexto, el sentido es que Menelao instó en privado a Andrónico a tramar la muerte de Onías.
    reason: textual_variant
  - marker: b
    text: O «del santuario» o «del refugio». Ἄσυλον se refiere a un lugar protegido de asilo.
    reason: lexical_alternative
  - marker: c
    text: 'El contexto puede implicar con mayor fuerza: «lo asesinó» o «lo mandó matar», aunque el verbo griego aquí es menos explícito.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Expresa con naturalidad la inferencia causal o consecutiva del contexto previo sin introducir matices ajenos.
- source_word: λαβὼν ἰδίᾳ
  english_pob_choice: took ... aside privately
  chosen_spanish: tomó aparte ... en privado
  alternatives_spanish:
  - lo tomó aparte
  - lo llevó aparte en privado
  lexicon: LSJ
  rationale: Mantiene tanto la idea de separación física como la discreción conspirativa de ἰδίᾳ.
- source_word: παρεκάλει
  english_pob_choice: urged
  chosen_spanish: lo instó
  alternatives_spanish:
  - lo exhortó
  - lo apremió
  lexicon: LSJ
  rationale: En este contexto la fuerza es persuasiva e insistente, más fuerte que ‘animó’ o ‘sugirió’.
- source_word: χειρόγραφον
  english_pob_choice: to strike down ... by treachery
  chosen_spanish: que diera muerte a Onías por traición
  alternatives_spanish:
  - que lo matara con engaño
  - para asesinar a Onías
  lexicon: LSJ
  rationale: El griego es difícil y el inglés POB lo entiende como una orden para preparar la muerte de Onías. En español, ‘dar muerte’ conserva la fuerza sin volver demasiado interpretativo el verbo.
- source_word: παραγόμενος ἐπὶ τὸν Ὀνίαν
  english_pob_choice: went to Onias
  chosen_spanish: fue a Onías
  alternatives_spanish:
  - se dirigió a Onías
  - acudió a Onías
  lexicon: LSJ
  rationale: Es una traslación directa y natural del movimiento hacia Onías.
- source_word: πεισθεὶς ἐπὶ δόλῳ
  english_pob_choice: winning his confidence by deceit
  chosen_spanish: después de ganarse su confianza con engaño
  alternatives_spanish:
  - después de engañarlo
  - tras persuadirlo con engaño
  lexicon: LSJ
  rationale: La frase debe conservar el engaño como medio de persuasión. ‘Ganarse su confianza’ refleja el resultado interpersonal implícito.
- source_word: δεξιωθεὶς μεθʼ ὅρκων
  english_pob_choice: greeting him with oaths
  chosen_spanish: saludarlo con juramentos
  alternatives_spanish:
  - recibirlo con juramentos
  - darle seguridades con juramentos
  lexicon: LSJ
  rationale: ‘Saludar’ conserva el gesto cordial de bienvenida; ‘juramentos’ mantiene la solemnidad engañosa de la promesa.
- source_word: δοὺς δεξιάν
  english_pob_choice: giving him his right hand
  chosen_spanish: dándole su mano derecha
  alternatives_spanish:
  - dándole la mano
  - ofreciéndole la mano derecha
  lexicon: LSJ
  rationale: Preserva el gesto de pacto o confianza de manera literal y comprensible en español.
- source_word: καίπερ ἐν ὑποψίᾳ κείμενος
  english_pob_choice: though he was under suspicion
  chosen_spanish: aunque estaba bajo sospecha
  alternatives_spanish:
  - aunque era sospechoso
  - aunque seguía bajo sospecha
  lexicon: LSJ
  rationale: La expresión es idiomática en español y mantiene la concesión sin precisar indebidamente el sujeto de la sospecha.
- source_word: ἔπεισεν ἐκ τοῦ ἀσύλου προελθεῖν
  english_pob_choice: he persuaded him to come out from the place of asylum
  chosen_spanish: lo persuadió a salir del lugar de asilo
  alternatives_spanish:
  - lo persuadió a salir del santuario
  - lo persuadió a abandonar el refugio
  lexicon: LSJ
  rationale: ‘Lugar de asilo’ conserva el sentido de protección jurídica o sagrada sin estrecharlo demasiado a un espacio litúrgico.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - al instante
  lexicon: LSJ
  rationale: Marca prontitud temporal de forma natural y elegante.
- source_word: παρέκλεισεν
  english_pob_choice: shut him away
  chosen_spanish: lo encerró
  alternatives_spanish:
  - lo confinó
  - lo recluyó
  lexicon: LSJ
  rationale: El verbo griego es menos explícito que ‘matar’; ‘lo encerró’ conserva la imagen básica de restringir o cerrar sin añadir más de lo que la forma griega dice.
- source_word: τὸ δίκαιον
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - lo justo
  - el derecho
  lexicon: LSJ
  rationale: Mantiene el sustantivo abstracto y el peso moral/jurídico de la acusación.
theological_decisions:
- issue: Sentido de ἄσυλον
  english_pob_reading: place of asylum
  chosen_spanish_reading: lugar de asilo
  alternative_spanish_readings:
  - santuario
  - refugio
  rationale: ‘Asilo’ conserva la idea de espacio protegido sin adelantar si el énfasis es estrictamente cultual o jurídico. Así se preserva la tensión del término griego y la nota del texto inglés.
  doctrine_reference: Translation philosophy §1, §6
- issue: Grado de explicitación de la muerte en παρέκλεισεν
  english_pob_reading: shut him away
  chosen_spanish_reading: lo encerró
  alternative_spanish_readings:
  - lo asesinó
  - lo mandó matar
  rationale: El contexto sugiere fuertemente la muerte de Onías, pero el verbo griego no la expresa de modo directo. La traducción principal evita sobreinterpretar y deja la implicación contextual intacta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de χειρόγραφον en este pasaje
  english_pob_reading: to strike down ... by treachery
  chosen_spanish_reading: dar muerte ... por traición
  alternative_spanish_readings:
  - asesinar ... con engaño
  - tramitar su muerte mediante traición
  rationale: La forma griega es oscura; el inglés POB entiende una intención homicida. En español se formula de modo sobrio para no perder la fuerza contextual ni fingir una certeza lexical que el griego no ofrece.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el expediente. Esta versión sigue el estado más reciente validado, respetando la nota de control cruzado que pidió revisión, pero sin introducir cambios no respaldados por el texto fuente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el pasaje lo requiera; aquí no aparece.
  - Se mantiene ‘Onías’ y ‘Andrónico’ como nombres propios en forma española estándar.
  - Se conserva ‘lugar de asilo’ para reflejar ἄσυλον sin sustituirlo por una terminología eclesiástica más interpretativa.
  - Se evita ‘justo’ como adjetivo aislado y se traduce τὸ δίκαιον como ‘la justicia’ para conservar el sustantivo abstracto del griego.
