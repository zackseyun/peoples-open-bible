translation:
  language: es
  text: Pero maldito es el engañador, que tiene un macho en su rebaño, y hace voto de él, pero sacrifica a Yahvé una víctima defectuosa. Porque yo soy un gran Rey —dice Yahvé de los Ejércitos[a]—, y mi nombre es temido[b] entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Yahvé de los ejércitos».
    reason: lexical_alternative
  - marker: b
    text: O, «mi nombre es reverenciado entre las naciones». El hebreo también puede expresar temor reverente y asombro.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: cursed
  chosen_spanish: maldito
  alternatives_spanish:
  - maldicho
  - maldito por Dios
  lexicon: HALOT
  rationale: En español, 'maldito' comunica juicio divino de forma natural y digna. 'Maldicho' es más arcaizante y 'maldito por Dios' añade explicitud no presente en la forma hebrea.
- source_word: נוֹכֵל
  english_pob_choice: the deceiver
  chosen_spanish: el engañador
  alternatives_spanish:
  - el tramposo
  - el fraude
  lexicon: HALOT
  rationale: El término apunta a fraude religioso deliberado. 'Engañador' mantiene el sentido moral amplio y funciona bien en registro bíblico; 'tramposo' suena demasiado coloquial.
- source_word: יֵשׁ בְּעֶדְרוֹ זָכָר
  english_pob_choice: who has a male in his flock
  chosen_spanish: que tiene un macho en su rebaño
  alternatives_spanish:
  - que tiene un macho en su ganado
  - cuando hay un macho en su rebaño
  lexicon: HALOT
  rationale: '''Rebaño'' es el equivalente natural para animales de sacrificio en español bíblico. ''Macho'' conserva la referencia al animal apto, y el conjunto refleja la responsabilidad del oferente al disponer de una víctima aceptable.'
- source_word: וְנֹדֵר
  english_pob_choice: and vows it
  chosen_spanish: y lo promete
  alternatives_spanish:
  - y hace voto de él
  - y lo vota
  lexicon: HALOT
  rationale: El participio expresa hacer voto respecto del animal mencionado. 'Lo promete' es idiomático en español, aunque menos técnico que 'hace voto de él'; el pronombre recupera el objeto implícito.
- source_word: וְזֹבֵחַ
  english_pob_choice: but sacrifices
  chosen_spanish: pero sacrifica
  alternatives_spanish:
  - y sacrifica
  - sacrifica
  lexicon: HALOT
  rationale: 'En contexto la coordinación es adversativa: promete una ofrenda apta y ofrece otra distinta. ''Pero'' refleja mejor el contraste retórico que una simple ''y''.'
- source_word: מָשְׁחָת
  english_pob_choice: a blemished animal
  chosen_spanish: una víctima defectuosa
  alternatives_spanish:
  - un animal defectuoso
  - una ofrenda defectuosa
  lexicon: HALOT
  rationale: En el contexto sacrificial, el término señala algo dañado o impropio para el altar. 'Víctima defectuosa' conserva el valor cultual sin sonar demasiado técnico; 'animal defectuoso' sería más literal, pero menos natural en español bíblico.
- source_word: לַאדֹנָי
  english_pob_choice: to the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - al Dueño
  lexicon: HALOT
  rationale: El destinatario del sacrificio es Dios mismo. Dado el texto fuente y la norma del proyecto, se preserva el nombre divino 'Yahvé' en vez de una máscara litúrgica o una traducción más genérica.
- source_word: כִּי מֶלֶךְ גָּדוֹל אָֽנִי
  english_pob_choice: For I am a great King
  chosen_spanish: Porque yo soy un gran Rey
  alternatives_spanish:
  - Pues yo soy un gran Rey
  - Porque soy un gran Rey
  lexicon: HALOT
  rationale: La autoafirmación divina y la causalidad del hebreo quedan claras con 'Porque'. 'Gran Rey' conserva la fórmula breve y solemne del original.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de las Armadas
  - Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' y se traduce צְבָאוֹת de manera transparente. 'Ejércitos' conserva la fuerza marcial y el uso bíblico tradicional, sin ocultar el término con una fórmula litúrgica opaca.
- source_word: וּשְׁמִי
  english_pob_choice: and my name
  chosen_spanish: y mi nombre
  alternatives_spanish:
  - y mi fama
  - y mi reputación
  lexicon: HALOT
  rationale: '''Nombre'' reproduce directamente la construcción hebrea y permite el sentido de identidad revelada y reputación sin explicarlo en exceso.'
- source_word: נוֹרָא
  english_pob_choice: is feared
  chosen_spanish: es temido
  alternatives_spanish:
  - es reverenciado
  - inspira temor
  lexicon: HALOT
  rationale: '''Es temido'' preserva el componente fuerte de temor/awe que el inglés también quiso mantener. ''Reverenciado'' suaviza demasiado el alcance, y ''inspira temor'' explicita más de lo que el hebreo exige.'
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las gentes
  lexicon: HALOT
  rationale: '''Naciones'' es el equivalente habitual en profetas para los pueblos fuera de Israel. ''Entre'' suena natural en español y expresa bien la difusión del reconocimiento divino.'
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según el estándar del proyecto, en español se rinde 'Yahvé', evitando la máscara litúrgica 'SEÑOR' y manteniendo el nombre covenantal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Rendering צְבָאוֹת
  english_pob_reading: Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de los hosts
  rationale: La expresión se traduce de forma transparente en español para conservar la fuerza militar y soberana del título divino. 'Ejércitos' es claro y fiel al valor del término en el contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
- issue: Handling the sacrificial contrast between an acceptable male and a blemished offering
  english_pob_reading: has a male in his flock ... but sacrifices a blemished animal
  chosen_spanish_reading: tiene un macho en su rebaño ... pero sacrifica una víctima defectuosa
  alternative_spanish_readings:
  - tiene un macho en su rebaño ... y sacrifica una víctima defectuosa
  - tiene un macho en su rebaño ... pero sacrifica un animal defectuoso
  rationale: 'El hebreo presenta una tensión moral: existe una víctima válida, pero se ofrece algo inadecuado. ''Pero'' preserva el contraste; ''víctima defectuosa'' mantiene el sentido cultual sin borrar la acusación de fraude sacrificial.'
  doctrine_reference: Mal 1:14; cf. sacrificial terminology in the Torah
translation_notes:
  revision_awareness: La revisión auditada más reciente indica alta concordancia y no introdujo cambios sustantivos; esta propuesta sigue de cerca el consenso inglés POB, ajustando sólo la forma española y la terminología requerida por el proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se traduce צְבָאוֹת como 'de los Ejércitos' para mayor transparencia y coherencia con el español bíblico contemporáneo.
  - '''Temido'' conserva mejor que ''reverenciado'' el peso semántico de נוֹרָא.'
  - '''Víctima defectuosa'' refleja el contexto sacrificial sin suavizar la acusación.'
  - Se evitó 'SEÑOR' como máscara del Tetragrámaton, por fidelidad al texto fuente.
