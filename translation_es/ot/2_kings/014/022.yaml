  glossary_alignment: No hay términos del glosario principal en conflicto. Se respetan bien el nombre propio y el registro. La principal corrección léxica requerida es ajustar לִיהוּדָה a “a Judá” y hacer coherente la nota de alternativa para בָּנָה.
