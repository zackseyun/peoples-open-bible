lexical_decisions:
- source_word: ἡγήσεται
  english_pob_choice: will lead
  chosen_spanish: guiará
  alternatives_spanish:
  - llevará
  - conducirá
  lexicon: BDAG
  rationale: El futuro de ἡγέομαι en este contexto expresa dirección y conducción del pueblo. «Guiará» conserva la imagen de conducción/restauración y suena natural en español bíblico contemporáneo.
- source_word: εὐφροσύνης
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: LSJ
  rationale: El sustantivo denota alegría o regocijo. «Alegría» funciona bien con la preposición «con» y mantiene un tono claro y elevado en español.
- source_word: τῷ φωτὶ
  english_pob_choice: by the light
  chosen_spanish: por la luz
  alternatives_spanish:
  - con la luz
  - en la luz
  lexicon: LSJ
  rationale: El dativo se entiende de manera instrumental o asociativa. «Por la luz» comunica la idea de medio o instrumento de manera natural en español.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: LSJ
  rationale: «Gloria» es el equivalente bíblico más directo para δόξα y preserva el peso teológico habitual en este tipo de contexto.
- source_word: ἐλεημοσύνῃ
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - clemencia
  - limosna
  lexicon: LSJ
  rationale: Aunque ἐλεημοσύνη puede significar «limosna» en otros contextos, aquí está coordinado con δικαιοσύνη y modificado por τῇ παρʼ αὐτοῦ, por lo que funciona como cualidad o acción divina. «Misericordia» conserva ese sentido.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: BDAG
  rationale: Aunque la línea inglesa prefirió «righteousness», en español «justicia» puede abarcar el sentido de rectitud fiel y acción justa, especialmente en paralelismo con «misericordia». Se conserva así la alternativa textual admitida por la POB inglesa en la nota.
- source_word: τῇ παρʼ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de parte de él
  alternatives_spanish:
  - que procede de él
  - de su parte
  lexicon: LSJ
  rationale: La construcción señala procedencia desde Dios para ambas cualidades. «De parte de él» suena natural en español y mantiene la referencia sin añadir especificaciones no exigidas por el griego.
theological_decisions:
- issue: Relación entre ἐλεημοσύνῃ y δικαιοσύνῃ en el cierre de la frase
  english_pob_reading: mercy and righteousness from him
  chosen_spanish_reading: misericordia y justicia de parte de él
  alternative_spanish_readings:
  - misericordia y rectitud de parte de él
  - misericordia y justicia que proceden de él
  rationale: La coordinación presenta dos rasgos divinos vinculados al acto salvador de Dios. «Justicia» mantiene la tensión entre fidelidad recta y juicio justo, mientras la nota preserva la alternativa «rectitud» para lectores que prefieran una resonancia más moral/covenantal.
  doctrine_reference: 'DOCTRINE.md contested term: δικαιοσύνη → righteousness/justice by context; preserve both where warranted'
- issue: Valor de τῷ φωτὶ τῆς δόξης αὐτοῦ
  english_pob_reading: by the light of his glory
  chosen_spanish_reading: por la luz de su gloria
  alternative_spanish_readings:
  - con la luz de su gloria
  - en la luz de su gloria
  rationale: 'Se mantiene el valor instrumental/medio del dativo: Dios conduce a Israel mediante la luz de su gloria. No se diluye en un sentido meramente locativo.'
  doctrine_reference: DOCTRINE.md divine glory as guiding revelation; keep instrumental sense where context supports it
translation_notes:
  revision_awareness: El texto griego y el control auditado en inglés están en alto acuerdo; no se registraron revisiones aplicadas en la última pasada, por lo que la versión española sigue de cerca el sentido adjudicado sin introducir paráfrasis adicional.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque aquí el griego dice θεός y no κύριος.
  - «Gloria» se conserva para δόξα en coherencia con el léxico bíblico.
  - «Justicia» se elige en el texto principal, pero la nota mantiene abierta «gozo» para εὐφροσύνη, tal como la tradición POB preserva alternativas léxicas.
  - La formulación «de parte de él» evita sobredeterminar τῇ παρʼ αὐτοῦ y sigue siendo idiomática en español.
