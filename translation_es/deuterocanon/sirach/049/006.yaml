translation:
  language: es
  text: Prendieron fuego a la ciudad santa, y desolaron sus calles[b] por mano de Jeremías[a]; porque lo afligieron, aunque había sido formado en el vientre como profeta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de Jeremías»; se conserva en el texto principal el giro semítico «por mano de», que puede aludir a su ministerio profético o a su advertencia.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «sus caminos» o «sus sendas»; en contexto urbano, «calles» expresa mejor la idea.
    reason: lexical_alternative
  - marker: c
    text: Alude al llamado de Jeremías desde el vientre; compárese Jeremías 1:5.
    reason: cross_reference
lexical_decisions:
- source_word: ויציתו / ἐνεπύρισεν
  english_pob_choice: they set ... on fire
  chosen_spanish: prendieron fuego
  alternatives_spanish:
  - la quemaron
  - la incendiaron
  lexicon: HALOT; LXX ἐνεπύρισεν
  rationale: El verbo expresa encender o consumir por fuego. En español, «prendieron fuego» comunica con naturalidad la acción destructiva sin perder la imagen de incendio del original.
- source_word: קרית קדש / πόλιν ἁγιάσματος
  english_pob_choice: the holy city
  chosen_spanish: la ciudad escogida del santuario
  alternatives_spanish:
  - la ciudad santa
  - la ciudad del santuario
  lexicon: HALOT; LXX parallel
  rationale: El hebreo puede leerse como «ciudad de santidad» y el griego añade la idea de elección/santuario. Dado el testimonio paralelo y la formulación inglesa auditada, «ciudad escogida del santuario» conserva la tensión entre santidad y elección sin reducirla solo a «ciudad santa».
- source_word: וישמו / ἠρήμωσαν
  english_pob_choice: made ... desolate
  chosen_spanish: desolaron
  alternatives_spanish:
  - dejaron desolada
  - devastaron
  lexicon: HALOT; LXX ἠρήμωσαν
  rationale: «Desolaron» expresa el resultado de ruina y vaciamiento de forma breve y fiel. Mantiene la fuerza del pasivo resultativo sin añadir matices no presentes.
- source_word: ארחתיה / τὰς ὁδοὺς αὐτῆς
  english_pob_choice: its streets
  chosen_spanish: sus calles
  alternatives_spanish:
  - sus caminos
  - sus vías
  lexicon: HALOT; LXX ὁδοὺς
  rationale: Aunque el sustantivo puede significar «caminos» o «sendas», en contexto urbano el sentido natural en español es «calles», como también reconoce la nota inglesa.
- source_word: ביד ירמיהו
  english_pob_choice: by the hand of Yirmeyahu
  chosen_spanish: por mano de Jeremías
  alternatives_spanish:
  - por medio de Jeremías
  - a manos de Jeremías
  lexicon: HALOT; Hebrew idiom
  rationale: Se conserva el modismo semítico «por mano de» para mantener la textura del hebreo. En español es comprensible y deja abierta la lectura de agencia profética que la nota inglesa preserva.
- source_word: כי ענוהו
  english_pob_choice: for they afflicted him
  chosen_spanish: porque lo afligieron
  alternatives_spanish:
  - porque lo humillaron
  - porque lo maltrataron
  lexicon: HALOT
  rationale: «Afligieron» transmite con sobriedad el trato injusto o penoso sin especificar más de lo que el texto exige.
- source_word: מרחם נוצר נביא
  english_pob_choice: had been formed in the womb as a prophet
  chosen_spanish: había sido formado en el vientre como profeta
  alternatives_spanish:
  - había sido formado en el seno materno como profeta
  - había sido modelado desde el vientre para ser profeta
  lexicon: HALOT; Jer 1:5 allusion
  rationale: «Vientre» reproduce la imaginería prenatal del original de manera directa y bíblica. «Como profeta» conserva la designación vocacional antes del nacimiento, aludiendo al llamado de Jeremías sin explicarlo en exceso.
- source_word: ירמיהו
  english_pob_choice: Yirmeyahu
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: Project name policy exception noted in English audit
  rationale: En español bíblico, el nombre tradicional «Jeremías» es plenamente inteligible y no introduce una carga doctrinal distinta. Aquí se usa la forma habitual del nombre propio, ya que el audit trail inglés no documenta una exigencia de transliteración para el español en esta entrada.
theological_decisions:
- issue: Relación entre la destrucción de la ciudad y la frase «por mano de Jeremías»
  english_pob_reading: Retain the idiom 'by the hand of Yirmeyahu' in the main text, with the following clause explaining that the people had afflicted the prophet whom God formed for prophetic service.
  chosen_spanish_reading: Mantener «por mano de Jeremías» en el texto principal, dejando que la cláusula siguiente aclare que el pueblo lo afligió a él, el profeta formado desde el vientre.
  alternative_spanish_readings:
  - «por medio de Jeremías»
  - «a causa de Jeremías»
  - «como Jeremías había anunciado»
  rationale: La sintaxis es comprimida y no conviene resolverla de manera excesiva. La redacción principal conserva el giro hebreo y la nota permite una lectura más llana sin borrar la ambigüedad de agencia y contexto profético.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión más reciente no introdujo cambios y que el control cruzado reporta alta concordancia; por eso se mantuvo la lectura sintética del original hebreo con apoyo del paralelo griego, sin armonizar en exceso la tensión interpretativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se mantuvo la imaginería prenatal con «vientre» para preservar la alusión a Jeremías 1:5.
  - Se eligió un español moderno y digno, evitando calcos innecesarios pero conservando el modismo semítico relevante.
