translation:
  language: es
  text: Así que Elías fue a mostrarse ante Acab[a]. La hambruna era severa en Samaria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a aparecer ante Acab» o «a presentarse ante Acab».
    reason: lexical_alternative
  - marker: b
    text: O «la hambruna era intensa en Samaria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So ... went
  chosen_spanish: Así que ... fue
  alternatives_spanish:
  - Y ... fue
  - Entonces ... fue
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Así que» conserva la secuencia/resultadidad y suena natural en español.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elijah
  lexicon: Convención bíblica española
  rationale: El nombre propio se expresa con la forma usual en español bíblico, plenamente reconocible para el lector hispanohablante.
- source_word: לְהֵרָאוֹת אֶל אַחְאָב
  english_pob_choice: to show himself to Ahab
  chosen_spanish: a presentarse ante Acab
  alternatives_spanish:
  - a aparecer ante Acab
  - a mostrarse ante Acab
  lexicon: HALOT
  rationale: 'El infinitivo nifal de ראה tiene sentido reflexivo: no solo ‘aparecer’, sino ‘presentarse’ ante alguien. «Ante Acab» conserva la dirección personal del hebreo אֶל.'
- source_word: וְהָרָעָב
  english_pob_choice: Now the famine
  chosen_spanish: Ahora el hambre
  alternatives_spanish:
  - Y el hambre
  - Entonces el hambre
  lexicon: HALOT
  rationale: El waw introduce un trasfondo circunstancial. «Ahora» cumple esa función discursiva en español. Para רעב, «hambre» es la traducción más directa; en este contexto puede aludir a una hambruna.
- source_word: חָזָק
  english_pob_choice: was severe
  chosen_spanish: era severa
  alternatives_spanish:
  - era fuerte
  - era intensa
  - era grave
  lexicon: HALOT
  rationale: Con hambre/famine, el adjetivo expresa intensidad, no fuerza física. «Severa» mantiene el valor de severidad con español natural.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en la región de Samaria
  lexicon: HALOT
  rationale: La preposición ב marca localización; «en Samaria» es la opción más directa y natural sin precisar más de lo que el hebreo indica.
theological_decisions:
- issue: No hay una decisión doctrinal explícita en el versículo; sí una decisión de referencia geográfica y narrativa.
  english_pob_reading: The verse reports Elijah’s action and the severity of the famine in Samaria.
  chosen_spanish_reading: El versículo informa del movimiento de Elías y de la severidad de la hambruna en Samaria.
  alternative_spanish_readings:
  - Elías fue a mostrarse a Acab
  - la hambruna era intensa en Samaria
  rationale: La redacción española conserva el mismo contenido factual sin suavizar el impacto de רעב y חזק, y mantiene el tono narrativo del hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alta concordancia y no muestran revisiones aplicadas; la propuesta española sigue de cerca esa lectura estable, manteniendo la ambigüedad controlada de לְהֵרָאוֹת y la fuerza de חָזָק.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Acab» como forma española estándar del nombre propio.
  - «Hambruna» podría ser una paráfrasis útil, pero aquí se prefirió «hambre» en el texto principal para no alejarse del sustantivo hebreo; la nota permite la alternativa interpretativa.
