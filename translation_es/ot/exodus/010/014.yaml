revisions:
- from: Y los saltamontes subieron sobre toda la tierra de Egipto y se posaron dentro de todo el territorio de Egipto, muy pesados[a]; nunca antes había habido saltamontes como ellos, ni después de ellos volverá a haber así.
  to: Y las langostas subieron sobre toda la tierra de Egipto y se posaron por todo el territorio de Egipto, muy grave[a]; nunca antes había habido langostas como ellas, ni después de ellas volverá a haber algo semejante.
  rationale: 'Se cambió ''saltamontes'' por ''langostas'' para reflejar mejor אַרְבֶּה en el contexto bíblico de plaga. Se reemplazó ''muy pesados'' por ''muy grave'' para comunicar en español el sentido idiomático de כָּבֵד מְאֹד, conservando el literal en nota. También se suavizó la última cláusula para que el comparativo temporal sea natural y fiel: no hubo antes una plaga así ni la habrá después. Se mantuvo la doble mención de Egipto por cercanía al hebreo.'
  reviewer_model: gpt-5.4
