translation:
  language: es
  text: 'Entonces los árboles dijeron a la vid[a]: «Ven, reina sobre nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Ve, sé rey sobre nosotros». El hebreo expresa esta invitación con un imperativo que en español puede sonar más natural como «Ven, reina sobre nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» mantiene la secuencia y suena natural en español narrativo.
- source_word: הָעֵצִים
  english_pob_choice: the trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - los maderos
  - la madera
  lexicon: HALOT
  rationale: En el contexto de la fábula de Jotam, עֵץ en plural se refiere a árboles, no a madera como material.
- source_word: לַגָּפֶן
  english_pob_choice: to the vine
  chosen_spanish: a la vid
  alternatives_spanish:
  - a la vid de uva
  - a la parra
  lexicon: HALOT
  rationale: גֶּפֶן designa la vid; «vid» es preciso, natural y conserva la personificación.
- source_word: לְכִי
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ve
  - Anda
  lexicon: HALOT
  rationale: Aunque el verbo base puede significar «ir», en una invitación/summons español «Ven» comunica mejor el llamado a tomar la acción.
- source_word: מְלֹכִי
  english_pob_choice: reign
  chosen_spanish: reina
  alternatives_spanish:
  - sé reina
  - gobierna
  lexicon: HALOT
  rationale: El imperativo femenino singular de מלך pide un verbo de realeza; «reina» conserva la fuerza verbal y la imagen de dominio real.
- source_word: עָלֵינוּ
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - sobre nosotras y nosotros
  - sobre nosotros mismos
  lexicon: HALOT
  rationale: Con מלך, עַל expresa la esfera de gobierno; «sobre nosotros» es la equivalencia natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto con el texto hebreo y refleja la misma alternativa reconocida por la edición inglesa: la tensión entre el sentido literal «Ve» y la invitación idiomática «Ven». En español, se optó por «Ven» para naturalidad, sin perder la fuerza imperativa.'
  spanish_consistency_notes:
  - Se mantuvo «vid» para גפן, coherente con el contexto agrícola de la fábula.
  - Se evitó «señor» o «rey» como sustantivo; el hebreo usa un imperativo verbal («reina»).
  - La personificación femenina del sustantivo hebreo queda implícita en «vid»; el español no requiere marcar género adicional en el verbo.
