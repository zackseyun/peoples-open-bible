  from: 'let it be according to your words: the one with whom it is found will become my slave, and you will be innocent.'
  to: let it be according to your words. The one with whom it is found will become my slave, and you will be innocent.
  rationale: The current rendering makes it sound as if the steward is accepting the brothers' proposal from verse 9 (death for the thief, slavery for the rest). The use of a colon implies that what follows is an explanation or restatement of 'your words.' However, the steward is actually rejecting their harsh terms and substituting his own more lenient (but still severe) ones. He is countering, not agreeing. This misrepresents the rhetorical force of his speech. Changing the colon to a period correctly presents the second clause as the steward's own decree, which the reader can then see is a modification of the brothers' offer. This is supported by the major disjunctive accent (athnah) on הוּא in the Hebrew, which indicates a primary pause in the verse.
