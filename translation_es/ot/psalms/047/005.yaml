review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Dios elige para su pueblo su heredad, especificada como «la gloria/el orgullo de Jacob», y conserva la nota sobre la posible referencia alternativa de la cláusula relativa. Sin embargo, se aparta innecesariamente del audit trail inglés en dos puntos: convierte el imperfecto elegido por POB como presente genérico («He chooses») en futuro («escogerá»), y además su nota alternativa para [a] repite el mismo futuro en lugar de reflejar la alternativa documentada. También «nos escogerá nuestra heredad» suena menos natural y menos fiel al dativo de ventaja que «escoge para nosotros nuestra heredad».'
  spanish_quality_summary: La frase actual es comprensible, pero «Él nos escogerá nuestra heredad» es poco idiomática en español culto bíblico; «escoge para nosotros» o «elige para nosotros» fluye mejor. «Heredad» es aceptable en registro bíblico, y «la gloria de Jacob» es una buena solución española para evitar el matiz negativo de «orgullo». La puntuación y las notas están bien encaminadas.
  glossary_alignment: 'No hay conflicto con los términos de proyecto mayores. «Jacob» se conserva correctamente. «Selah» se mantiene transliterado según la política. La decisión «gloria» para גְּאוֹן es defendible en español y está justificada por claridad y tono bíblico. El ajuste principal es verbal: conviene alinear יבחר con el presente escogido por POB, dejando el futuro solo como alternativa en nota.'
  issues:
  - severity: medium
    issue: Tiempo verbal principal en יִבְחַר
    rationale: El audit trail inglés escogió el presente genérico («He chooses») como lectura principal. El español cambia a futuro («escogerá») sin necesidad, debilitando la alineación con la decisión documentada y cambiando el perfil aspectual del verso.
  - severity: medium
    issue: 'Construcción española poco natural: «nos escogerá nuestra heredad»'
    rationale: Aunque intenta reflejar לָנוּ con pronombre átono, en español resulta menos natural que «escoge para nosotros nuestra heredad» o «nos elige nuestra heredad». La primera preserva mejor el dativo de ventaja y la legibilidad.
  - severity: medium
    issue: La nota [a] no refleja la alternativa inglesa documentada
    rationale: La nota inglesa ofrece como alternativa «He will choose...». La nota española usa también futuro en el cuerpo de la cita, de modo que no registra una verdadera alternativa frente al texto principal actual.
  revised_spanish_text: Él escoge para nosotros nuestra heredad[a], la gloria de Jacob, a quien ama[c][b]. Selah
