  source_alignment_summary: 'El borrador español no sigue la evidencia fuente auditada final. Aunque el expediente inglés contiene material griego y notas para una lectura exhortativa, la revisión aplicada más reciente del POB cambió el texto base operativo a la línea hebrea/imaginativa: «A potter''s vessel is tested in a furnace, and so a man is tested by his reasoning». El español actual traduce la lectura griega anterior («Escucha, hijo...»), por lo que no preserva el contenido del texto inglés POB vigente ni la revisión aplicada.'
  spanish_quality_summary: 'El español del borrador es natural y claro como frase sapiencial, pero traduce el versículo equivocado. Para el texto vigente, conviene un español sobrio y legible: «Una vasija de alfarero se prueba en un horno, y así un hombre por su razonamiento».'
  glossary_alignment: 'No hay términos de glosario mayor involucrados. La cuestión principal es textual, no terminológica. «Consejo/juicio» en el borrador serían aceptables si esa fuera la lectura fuente, pero aquí deben sustituirse por vocabulario de la imagen hebrea: «vasija de alfarero», «horno», «razonamiento».'
  issues:
  - severity: high
    issue: El borrador traduce una lectura griega previa en lugar del texto inglés POB auditado vigente.
    rationale: La sección `applied_revisions` reemplaza explícitamente «Listen, my son...» por «A potter's vessel is tested in a furnace, and so a man is tested by his reasoning.» El español debe seguir ese texto revisado.
  - severity: medium
