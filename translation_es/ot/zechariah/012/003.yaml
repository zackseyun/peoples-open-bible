review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: marcador profético temporal, Jerusalén como piedra pesada/de carga, daño autoinfligido a quienes intenten moverla, y reunión hostil universal contra ella. Sin embargo, omite en el texto principal la intensificación de שָׂרוֹט יִשָּׂרֵטוּ que el rastro inglés preserva con ''surely'' y documenta con una nota literal de ''ser cortados/heridos''.'
  spanish_quality_summary: 'El español es claro y natural, pero puede afinarse. «Y sucederá en aquel día» suena algo calcado; «En aquel día» o «Y en aquel día» sería más idiomático. «Se juntarán» funciona, pero «se reunirán» suena más digno y natural en registro bíblico. La nota c está mal formulada: el texto principal ya dice «de la tierra», de modo que la alternativa debería ser «del país» o similar para el sentido local.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva correctamente la distinción עַמִּים / גּוֹיֵי como «pueblos / naciones». No aparecen términos sensibles como Yahvé/Mesías/esclavo. La principal cuestión es de fidelidad léxica e intensidad verbal, no de glosario.
  issues:
