translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé, cuando yo trate con ustedes[a] por causa de mi nombre[b], no conforme a sus malos caminos ni conforme a sus obras corruptas, casa de Israel, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando yo actúe con ustedes». El hebreo es amplio y no especifica de qué modo actuará Dios aquí.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por causa de mi nombre», es decir, por el honor de su reputación.'
    reason: cultural_note
lexical_decisions:
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: El hebreo introduce una consecuencia/resulto en discurso profético; «Entonces» conserva esa fuerza. «Sabrán» expresa el reconocimiento esperado con naturalidad en español moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto en español, el Tetragrámaton se vierte como «Yahvé» para preservar el nombre propio del pacto, en vez de sustituirlo por un título.
- source_word: בַּעֲשׂוֹתִי אִתְּכֶם
  english_pob_choice: when I deal with you
  chosen_spanish: cuando yo actúe con ustedes
  alternatives_spanish:
  - cuando yo obre con ustedes
  - cuando yo trate con ustedes
  lexicon: HALOT
  rationale: El hebreo es amplio y no especifica si la acción es principalmente de juicio, restauración o ambas. «Actúe con ustedes» conserva esa amplitud sin forzar el sentido.
- source_word: לְמַעַן שְׁמִי
  english_pob_choice: for the sake of my name
  chosen_spanish: por causa de mi nombre
  alternatives_spanish:
  - por amor a mi nombre
  - por el honor de mi nombre
  lexicon: HALOT
  rationale: La frase expresa el propósito de resguardar la reputación/honor del nombre divino. «Por causa de mi nombre» es una formulación bíblica clara y fiel en español.
- source_word: לֹא כְדַרְכֵיכֶם הָרָעִים
  english_pob_choice: not according to your evil ways
  chosen_spanish: no conforme a sus malos caminos
  alternatives_spanish:
  - no según sus malos caminos
  - no como sus malos caminos
  lexicon: HALOT
  rationale: דֶּרֶךְ en contexto moral apunta a conducta o modo de vida; «caminos» es una equivalencia natural en español bíblico. «Conforme a» preserva la comparación normativa del hebreo.
- source_word: וְכַעֲלִילוֹתֵיכֶם הַנִּשְׁחָתוֹת
  english_pob_choice: or according to your corrupt deeds
  chosen_spanish: ni conforme a sus obras corrompidas
  alternatives_spanish:
  - ni conforme a sus actos corrompidos
  - ni conforme a sus prácticas corrompidas
  lexicon: HALOT
  rationale: עֲלִילוֹת significa hechos/obras/prácticas; el participio intensifica su condición de corrupción. «Obras corrompidas» mantiene esa cualidad moral sin suavizarla.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - oh casa de Israel
  - casa de Israel,
  lexicon: HALOT
  rationale: El vocativo se entiende por el contexto y por la puntuación; en español puede omitirse «oh» sin perder el llamado directo, manteniendo un registro más natural.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor, Yahvé
  lexicon: HALOT
  rationale: נְאֻם se traduce de forma profética con «declara». La combinación אֲדֹנָי יְהוִה se expresa de modo transparente como «Señor Yahvé», preservando la referencia al título y al nombre divino.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Nombre propio del pacto. En español, el proyecto usa «Yahvé» para no ocultarlo tras una sustitución reverencial ni castellanizarlo como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Amplitud de בַּעֲשׂוֹתִי אִתְּכֶם
  english_pob_reading: when I deal with you
  chosen_spanish_reading: cuando yo actúe con ustedes
  alternative_spanish_readings:
  - cuando yo haga con ustedes
  - cuando yo obre con ustedes
  rationale: La forma hebrea no especifica el tipo de acción divina. La traducción española conserva esa tensión teológica sin decidir prematuramente entre juicio y restauración.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Concordé con la revisión más reciente sin cambios sustantivos; el griego/hebreo no presenta variantes textuales relevantes en este versículo y el pasaje mantiene alta concordancia entre los pasados de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar español del proyecto.
  - Se conserva un registro profético sobrio y legible, evitando calcos innecesarios.
  - «Casa de Israel» queda en minúsculas iniciales al funcionar como vocativo dentro de la frase española.
  - «Señor Yahvé» reproduce de forma transparente la combinación אֲדֹנָי יְהוִה sin sustituirla por una convención eclesiástica opaca.
