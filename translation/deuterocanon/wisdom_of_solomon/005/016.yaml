theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's default rendering for κύριος is 'Lord.' In this deuterocanonical context it denotes God as sovereign giver and protector; 'Lord' best matches biblical usage and theological register.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Nature of the righteous one's reward imagery
  chosen_reading: Retain regal imagery literally ('kingdom... crown')
  alternative_readings:
  - Interpret metaphorically as 'royal honor' or 'glorious reign'
  rationale: The Greek presents concrete royal symbols bestowed by God. The translation preserves the theological tension between metaphorical vindication and possible participation in royal rule, rather than resolving it into abstraction.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
