base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/044/009.yaml
  text: 'Thus says the Lord GOD: No foreigner[a], uncircumcised in heart and uncircumcised in flesh, shall enter my sanctuary[b], of any foreigner who is among the sons of Israel.'
