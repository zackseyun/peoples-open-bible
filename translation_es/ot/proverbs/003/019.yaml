translation:
  language: es
  text: Yahvé fundó la tierra por sabiduría[a]; estableció los cielos por entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con sabiduría' ... 'con entendimiento'. La preposición hebrea puede expresar medio o acompañamiento; aquí 'por' comunica mejor la idea instrumental en la creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el Tetragrama directamente. La POB en inglés opta por la transliteración del nombre divino; en español, 'Yahvé' preserva ese nombre personal sin sustituirlo por un título.
- source_word: בְּחָכְמָה
  english_pob_choice: by wisdom
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - por sabiduría
  - en sabiduría
  lexicon: HALOT
  rationale: El ב aquí expresa instrumento o medio. En español, 'con sabiduría' mantiene la relación de acompañamiento/instrumentalidad de modo natural y fiel al paralelismo poético.
- source_word: יָסַד
  english_pob_choice: founded
  chosen_spanish: fundó
  alternatives_spanish:
  - estableció
  - echó los cimientos de
  lexicon: HALOT
  rationale: El verbo conserva la metáfora de cimentar o fundar. 'Fundó' es breve, claro y reproduce bien la imagen de inicio y base de la creación.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitable
  - el mundo
  lexicon: HALOT
  rationale: En este contexto cósmico, el término apunta al orden creado. 'La tierra' es la equivalencia más natural en español para el conjunto del mundo terrenal.
- source_word: כּוֹנֵן
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - afirmó
  - fijó
  lexicon: HALOT
  rationale: El verbo expresa poner firmemente en su lugar. 'Estableció' conserva la simetría con 'fundó' y la fuerza de firmeza del hebreo.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo en este contexto cosmológico puede rendirse naturalmente como 'los cielos' en español, manteniendo el paralelismo con 'la tierra'.
- source_word: בִּתְבוּנָה
  english_pob_choice: by understanding
  chosen_spanish: con entendimiento
  alternatives_spanish:
  - por entendimiento
  - con discernimiento
  lexicon: HALOT
  rationale: '''Entendimiento'' corresponde al campo semántico de תבונה y encaja con la terminología sapiencial de Proverbios. ''Con'' conserva el matiz instrumental/acompañante del preposición ב.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La POB preserva el nombre propio divino. 'Yahvé' es la forma española usada para transliterar ese nombre, evitando la sustitución por un título y manteniendo la referencia al Dios de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios; el texto mantiene el acuerdo alto entre los controles y conserva la decisión de traducir el nombre divino con una transliteración en lugar de una sustitución titulativa.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo verbal: ''fundó'' / ''estableció''.'
  - Se conserva el registro sapiencial de Proverbios con 'sabiduría' y 'entendimiento'.
  - Se usa puntuación poética sobria y natural para una lectura pública en español.
  - La nota de pie refleja la alternativa preposicional sin borrar la elección principal de 'con'.
