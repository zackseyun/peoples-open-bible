translation:
  language: es
  text: 'Porque así dice Yahvé: todo el país será una desolación[a], pero no haré una destrucción completa[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la tierra». El hebreo אֶרֶץ puede significar «país/territorio» o «tierra»; aquí se prefiere «país» porque el contexto se centra en Judá bajo juicio, aunque las imágenes circundantes pueden evocar una devastación más amplia.
    reason: alternative_reading
  - marker: b
    text: O «no haré un fin completo» / «no lo destruiré por completo». El hebreo conserva la tensión entre un juicio devastador y la negativa de Yahvé a llevarlo hasta la aniquilación total.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación profética de manera natural en español. «Porque» conserva la relación causal/expositiva del hebreo y funciona bien al inicio de un oráculo.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así ha dicho
  alternatives_spanish:
  - así dice
  - así dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se expresa con un registro solemne y bíblico. «Ha dicho» conserva el valor de proclamación formal y evita un giro demasiado moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración, conforme al criterio del proyecto, en vez de sustituirlo por un título. «Yahvé» es la forma principal establecida para el texto español.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - ruina
  - devastación
  lexicon: HALOT
  rationale: El sustantivo hebreo describe un estado de ruina; en español conviene conservar esa fuerza nominal con «una desolación», sin convertirlo en adjetivo.
- source_word: תִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - quedará
  lexicon: HALOT
  rationale: «Será» reproduce de forma directa la cópula futura del hebreo y encaja con el predicado nominal «una desolación».
- source_word: כָּל הָאָרֶץ
  english_pob_choice: The whole land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra del país
  - toda la región
  - todo el país
  lexicon: HALOT
  rationale: Se conserva la ambigüedad fuente de אֶרֶץ entre «tierra» y «tierra/país». «Tierra» permite una lectura amplia sin decidir de antemano por «país»; el contexto inmediato sigue favoreciendo la referencia a Judá.
- source_word: וְכָלָה
  english_pob_choice: a full end
  chosen_spanish: un fin completo
  alternatives_spanish:
  - un fin total
  - una destrucción completa
  - aniquilación
  lexicon: HALOT
  rationale: La expresión hebrea preserva la tensión entre juicio devastador y limitación divina. «Un fin completo» mantiene el sustantivo «fin» y la idea de totalidad sin endurecer más de lo que exige el texto.
- source_word: לֹא אֶעֱשֶׂה
  english_pob_choice: I will not make
  chosen_spanish: no haré
  alternatives_spanish:
  - no efectuaré
  - no produciré
  - no llevaré a cabo
  lexicon: HALOT
  rationale: «Hacer» en español bíblico puede sonar más pesado de lo necesario; «no haré» sigue fielmente el verbo simple hebreo y resulta natural con el objeto implícito «un fin completo».
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: land
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - todo el país
  - toda la región
  - la tierra
  rationale: El hebreo permite «tierra» o «país/territorio». Aunque el contexto inmediato de Jeremías 4 apunta a Judá, «tierra» deja abierta la amplitud retórica del oráculo y evita estrechar demasiado el efecto del juicio anunciado. Se conserva la tensión entre referencia territorial concreta y resonancia más amplia.
  doctrine_reference: Translation philosophy §1, §3
- issue: Tensión entre juicio total y preservación
  english_pob_reading: yet I will not make a full end
  chosen_spanish_reading: y no haré un fin completo
  alternative_spanish_readings:
  - pero no haré una destrucción completa
  - y no haré un fin total
  - pero no los destruiré por completo
  rationale: La cláusula hebrea afirma devastación real, pero niega el aniquilamiento absoluto. «Fin completo» conserva esa tensión sin suavizarla ni resolverla en paráfrasis explicativa.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que ajustó «will become» a «will be» para alinearse más de cerca con el hebreo. En español se reflejó esa cercanía con la copulativa futura «será», y se mantuvo la estructura negativa final sin añadir explicaciones no presentes en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה, conforme al criterio del proyecto.
  - Se conserva «una desolación» como sustantivo, no como adjetivo, para respetar el valor nominal de שְׁמָמָה.
  - Se usa «tierra» para אֶרֶץ, con nota que recoge la alternativa «la tierra»/«país» y la ambigüedad contextual.
  - Se conserva la tensión del cierre con «no haré un fin completo», evitando suavizarlo a una simple negación de destrucción.
