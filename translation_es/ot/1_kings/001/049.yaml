translation:
  language: es
  text: Entonces todos los invitados de Adonías temblaron y se levantaron, y cada uno se fue por su camino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cada hombre a su camino», un modismo que indica que se dispersaron individualmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֶרְדוּ
  english_pob_choice: trembled
  chosen_spanish: temblaron
  alternatives_spanish:
  - se estremecieron
  - tuvieron temor
  lexicon: HALOT
  rationale: חרד expresa temblor por alarma o miedo. «Temblaron» conserva bien el efecto físico y emocional sin intensificar indebidamente a «tuvieron temor», y es natural en español narrativo.
- source_word: וַיָּקֻמוּ
  english_pob_choice: rose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: HALOT
  rationale: קום aquí describe el acto de incorporarse/levantarse en reacción inmediata. «Se levantaron» es claro, sobrio y fiel al movimiento narrativo.
- source_word: כָּל הַקְּרֻאִים אֲשֶׁר לַאֲדֹנִיָּהוּ
  english_pob_choice: all Adonijah’s invited guests
  chosen_spanish: todos los invitados de Adonías
  alternatives_spanish:
  - todos los llamados de Adonías
  - todos los que habían sido invitados por Adonías
  lexicon: HALOT
  rationale: 'הַקְּרֻאִים es «los invitados / los llamados». En contexto son los asistentes al banquete de Adonías, por lo que «invitados» comunica con naturalidad el grupo referido. El ל con Adonías señala relación o pertenencia, que en español se expresa bien con posesión genitiva: «de Adonías».'
- source_word: וַיֵּלְכוּ
  english_pob_choice: went
  chosen_spanish: se fueron
  alternatives_spanish:
  - fueron
  - partieron
  lexicon: HALOT
  rationale: הלך es el verbo básico de movimiento. «Se fueron» mantiene el carácter narrativo simple y el sentido de salida/despedida del pasaje.
- source_word: אִישׁ לְדַרְכּוֹ
  english_pob_choice: each man went his way
  chosen_spanish: cada hombre se fue por su camino
  alternatives_spanish:
  - cada uno se fue por su camino
  - cada hombre fue a su camino
  lexicon: HALOT
  rationale: 'La expresión es idiomática: literalmente, «un hombre a su camino». «Por su camino» conserva el valor distributivo y la idea de dispersión individual. «Cada hombre» refleja el masculino plural del contexto sin volverlo genérico ambiguo.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que prefirió una formulación más literal para el modismo final («went his way») y mantuvo el orden narrativo breve del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Adonías» como forma del nombre propia del español bíblico estándar y coherente con la transliteración del hebreo.
  - «Temblaron» y «se levantaron» preservan la secuencia rápida de reacción sin añadir explicación psicológica ajena al texto.
  - La frase final conserva la idiomaticidad hebrea mediante una nota, sin sustituirla por una paráfrasis más libre en el texto principal.
