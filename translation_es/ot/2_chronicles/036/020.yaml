translation:
  language: es
  text: Llevó al exilio a Babilonia al remanente que había escapado de la espada[a], y fueron esclavos de él y de sus hijos hasta el reinado de Persia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos». El término hebreo puede denotar tanto siervos como esclavos, pero aquí el contexto de conquista y exilio favorece «esclavos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּגֶל
  english_pob_choice: He carried into exile
  chosen_spanish: Hizo llevar al exilio
  alternatives_spanish:
  - Los llevó al exilio
  - Los deportó
  lexicon: HALOT
  rationale: El hebreo expresa una acción causativa de destierro. En español, «hizo llevar al exilio» conserva la fuerza de traslado forzado sin perder el matiz causal del verbo. «Deportó» es viable, pero aquí «llevar al exilio» mantiene mejor el paralelismo con el sentido bíblico del destierro.
- source_word: הַשְּׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: al remanente
  alternatives_spanish:
  - a los sobrevivientes
  - a los que quedaron
  lexicon: HALOT
  rationale: «Remanente» reproduce el valor lexical de lo que queda tras la destrucción y preserva la resonancia bíblica de «remanente». Es más preciso que una paráfrasis como «los sobrevivientes».
- source_word: מִן הַחֶרֶב
  english_pob_choice: who had escaped the sword
  chosen_spanish: que había escapado de la espada
  alternatives_spanish:
  - que había escapado de la guerra
  - que se había librado de la espada
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «de la espada», pero en español se entiende con naturalidad como escapar de una muerte violenta. «De la espada» conserva la imagen concreta del original y, al mismo tiempo, es idiomático.
- source_word: אֶל בָּבֶל
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - hasta Babilonia
  lexicon: HALOT
  rationale: La preposición de dirección se expresa naturalmente con «a». «Babilonia» es el topónimo estándar en español y refleja fielmente el movimiento de exilio.
- source_word: וַֽיִּהְיוּ ל֤וֹ וּלְבָנָיו֙ לַעֲבָדִ֔ים
  english_pob_choice: and they became slaves to him and to his sons
  chosen_spanish: y fueron esclavos de él y de sus hijos
  alternatives_spanish:
  - y fueron siervos de él y de sus hijos
  - y quedaron sujetos a él y a sus hijos
  lexicon: HALOT
  rationale: El contexto de conquista y deportación favorece el sentido de subordinación servil fuerte. POB ya documenta que el término puede significar «esclavos» o «siervos», y aquí «esclavos» preserva la fuerza lexical y contextual del hebreo.
- source_word: עַד מְלֹךְ מַלְכ֥וּת פָּרָס
  english_pob_choice: until the reign of the kingdom of Persia
  chosen_spanish: hasta el reinado del reino de Persia
  alternatives_spanish:
  - hasta que reinó el reino de Persia
  - hasta el dominio del reino de Persia
  lexicon: HALOT
  rationale: La expresión temporal se reproduce de manera directa. «Reinado» traduce el infinitivo constructo de מלך como periodo de gobierno, y «reino de Persia» mantiene la estructura genitiva del hebreo.
theological_decisions:
- issue: Renderización de לַעֲבָדִים en un contexto de conquista y exilio
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: El contexto inmediato es de deportación y sometimiento político por una potencia conquistadora, por lo que «esclavos» comunica mejor la coerción implicada. Se evita suavizar indebidamente el término hacia «siervos», que disminuiría la tensión histórica del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested servile-terms principle
translation_notes:
  revision_awareness: La auditoría inglesa muestra una oscilación revisada entre «slaves» y «servants», con una corrección posterior que restablece «slaves» por coherencia doctrinal y contextual. La versión española sigue esa lectura restaurada y conserva la tensión lexical en nota.
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo, por lo que no hay decisión de Tetragrámaton.
  - Se mantiene «Babilonia» como topónimo y «Persia» como nombre geopolítico, sin adaptación confesional.
  - «Esclavos» se eligió para reproducir la fuerza contextual del hebreo עֲבָדִים en una situación de conquista, coherente con la última lectura auditada del POB inglés.
  - 'La sintaxis española procura ser fiel sin calco excesivo: «hizo llevar al exilio» refleja causatividad y movimiento forzado, mientras conserva fluidez natural.'
