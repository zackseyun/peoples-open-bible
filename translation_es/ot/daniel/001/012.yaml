translation:
  language: es
  text: Por favor, pon a prueba a tus siervos por diez días, y que se nos dé vegetales[a] para comer y agua para beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alimentos de semillas» o «comida de semilla»; el término hebreo se refiere de manera amplia a alimento vegetal cultivado a partir de semilla.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַס
  english_pob_choice: test
  chosen_spanish: prueben
  alternatives_spanish:
  - pongan a prueba
  - ensayen
  lexicon: HALOT
  rationale: El imperativo pide someter a Daniel y a sus compañeros a una prueba de verificación. «Probar» comunica bien la idea evaluativa en español y mantiene la fuerza del hebreo.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: Por favor
  alternatives_spanish:
  - ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula de cortesía suaviza la petición; «Por favor» reproduce ese tono deferente de manera natural y readable en español.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: Aquí la autoidentificación es cortés y subordinada ante un oficial. «Siervos» mantiene el registro deferencial sin forzar el matiz más duro de «esclavos» en este contexto.
- source_word: יָמִים עֲשָׂרָה
  english_pob_choice: for ten days
  chosen_spanish: por diez días
  alternatives_spanish:
  - durante diez días
  - diez días
  lexicon: HALOT
  rationale: La duración se expresa naturalmente en español con «por» o «durante». «Por diez días» conserva el valor de período de prueba.
- source_word: וְיִתְּנוּ לָנוּ
  english_pob_choice: let us be given
  chosen_spanish: que se nos dé
  alternatives_spanish:
  - y que nos den
  - permítase que se nos dé
  lexicon: HALOT
  rationale: 'El jussivo plural plantea una solicitud: «que se nos dé» conserva el carácter peticionario y evita centrar la frase en agentes no especificados.'
- source_word: מִן הַזֵּרֹעִים
  english_pob_choice: vegetables
  chosen_spanish: legumbres
  alternatives_spanish:
  - alimentos de semillas
  - vegetales
  - comida de semillas
  lexicon: HALOT
  rationale: El término hebreo designa alimentos vegetales, probablemente productos de semilla. «Legumbres» es una opción bíblica y comprensible en español para este tipo de dieta, sin perder el campo semántico vegetal.
- source_word: וְנֹאכְלָה
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - y comamos
  - a comer
  lexicon: HALOT
  rationale: La construcción de propósito en español se expresa con naturalidad mediante «para comer», manteniendo el sentido funcional del pedido.
- source_word: וּמַיִם וְנִשְׁתֶּה
  english_pob_choice: water to drink
  chosen_spanish: agua para beber
  alternatives_spanish:
  - y agua para beber
  - y beber agua
  lexicon: HALOT
  rationale: La coordinación final preserva la simpleza del régimen solicitado. «Agua para beber» refleja de forma clara el paralelismo con la comida pedida.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés. Se evita una traducción mecánica de «vegetables» y se preserva la petición cortés, la duración del período de prueba y el paralelismo comida/agua. La nota a pie de página se ancla ahora correctamente en el texto.
  spanish_consistency_notes:
  - Se prefirió «siervos» por el registro deferencial de la escena, aunque «esclavos» sigue siendo una posibilidad léxica en otros contextos.
  - «Legumbres» funciona como equivalente comprensible; la nota preserva la alternativa más literal basada en semilla.
  - La puntuación usa coma para reflejar el flujo del hebreo y el ajuste revisado del inglés auditado.
