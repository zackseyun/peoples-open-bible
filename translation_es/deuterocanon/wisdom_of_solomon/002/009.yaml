  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La cuestión relevante es lexical: ἀγερωχίας debe reflejar el razonamiento documentado del POB inglés, favoreciendo un sentido de jolgorio/revelería con nota que preserve «arrogancia/jactancia».'
