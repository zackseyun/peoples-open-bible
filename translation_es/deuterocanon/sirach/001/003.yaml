translation:
  language: es
  text: La altura del cielo y la anchura de la tierra[a], y la profundidad del abismo—¿quién las puede sondear?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego añade «y sabiduría», dando: «La altura del cielo y la anchura de la tierra y el abismo y la sabiduría—¿quién las puede sondear?»'
    reason: textual_variant
lexical_decisions:
- source_word: רוּם / ὕψος
  english_pob_choice: height
  chosen_spanish: altura
  alternatives_spanish:
  - elevación
  - lo alto
  lexicon: HALOT; LXX ὕψος
  rationale: En la serie de medidas cósmicas, «altura» reproduce naturalmente la dimensión vertical. Es fiel al valor espacial del hebreo y del griego sin introducir una abstracción excesiva.
- source_word: שָׁמַיִם / οὐρανοῦ
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - los cielos
  - firmamento
  lexicon: HALOT; LXX οὐρανός
  rationale: «Cielo» es el equivalente español más natural para un registro bíblico moderno y conserva el sentido cósmico de «heaven» sin sonar arcaico. «Los cielos» sería posible, pero aquí la forma singular mantiene la concisión del paralelismo.
- source_word: רֹחַב / πλάτος
  english_pob_choice: breadth
  chosen_spanish: anchura
  alternatives_spanish:
  - amplitud
  - ancho
  lexicon: HALOT; LXX πλάτος
  rationale: «Anchura» conserva el valor dimensional y el paralelismo con «altura» y «profundidad». «Amplitud» suaviza la imagen; «ancho» sería menos nominal y menos paralelo.
- source_word: אָרֶץ / γῆς
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT; LXX γῆ
  rationale: «Tierra» es el equivalente natural en español para el ámbito cósmico de la expresión. Mantiene la amplitud global del término sin restringirlo a «terreno» o «país».
- source_word: תְּהוֹם / ἄβυσσον
  english_pob_choice: abyss
  chosen_spanish: abismo
  alternatives_spanish:
  - profundidad
  - océano abisal
  lexicon: HALOT; LXX ἄβυσσος
  rationale: «Abismo» preserva el peso cósmico y la hondura misteriosa del término, y corresponde bien al paralelo griego ἄβυσσον. «Profundidad» es posible, pero atenúa la fuerza del sustantivo.
- source_word: מִי יַחֲקֹר / τίς ἐξιχνιάσει
  english_pob_choice: who can search them out
  chosen_spanish: ¿quién las puede sondear?
  alternatives_spanish:
  - ¿quién puede investigarlas?
  - ¿quién las puede rastrear?
  lexicon: HALOT; LXX ἐξιχνιάσει
  rationale: «Sondear» transmite la idea de investigar hasta el fondo y funciona bien con objetos de medida cósmica. El plural «las» recoge implícitamente los elementos enumerados; «investigarlas» sería más explicativo, pero menos idiomático y menos solemne.
theological_decisions:
- issue: Variante griega con «sabiduría» ausente en el testimonio hebreo base
  english_pob_reading: The main text follows the Hebrew and notes the Greek parallel variant in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo y deja la adición griega «y sabiduría» en nota.
  alternative_spanish_readings:
  - La altura del cielo y la anchura de la tierra, y el abismo y la sabiduría—¿quién los puede sondear?
  - La altura del cielo y la anchura de la tierra, y la profundidad del abismo y la sabiduría—¿quién puede sondearlos?
  rationale: La evidencia hebrea es la base principal del verso, mientras que el griego aporta una variante significativa que amplía el alcance de la pregunta. La nota conserva esa tensión sin fusionar indebidamente ambas formas en el cuerpo del texto.
  doctrine_reference: Primacía del testimonio original cuando es sólido; conservación de variantes textuales con peso interpretativo
- issue: Número y referencia del objeto implícito en la pregunta retórica
  english_pob_reading: who can search them out?
  chosen_spanish_reading: ¿quién las puede sondear?
  alternative_spanish_readings:
  - ¿quién lo puede sondear?
  - ¿quién puede sondearlo?
  rationale: En español, el femenino plural «las» remite con naturalidad a la serie de dimensiones mencionadas. Aunque el hebreo/griego expresan una enumeración colectiva, el español requiere una referencia pronominal fluida; esta opción mantiene la fuerza retórica sin sobreespecificar.
  doctrine_reference: Claridad idiomática sin alterar el alcance semántico del original
translation_notes:
  revision_awareness: Se siguió el texto hebreo como base principal, en acuerdo con el audit trail en inglés, y se conservó la variante griega con «sabiduría» únicamente en nota. La redacción española busca mantener el paralelismo dimensional y la pregunta retórica sin calcado innecesario.
  spanish_consistency_notes:
  - Se prefirió «cielo» en singular para el término hebreo/plural de extensión cósmica, manteniendo un registro bíblico natural en español.
  - 'Se conservó el paralelismo nominal: altura / anchura / profundidad / abismo.'
  - «Sondear» se usa para reflejar una investigación exhaustiva, no una mera búsqueda superficial.
