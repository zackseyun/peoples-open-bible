  language: ko
  text: 그들이 그분께 대답하였습니다. 「나사렛 사람 예수」. 예수께서 그들에게 말씀하셨습니다. 「내가 그 사람이다.」 그분을 넘겨주는 유다도 그들과 함께 서 있었습니다.
