translation:
  language: es
  text: Un residente extranjero[a] o un jornalero no comerá de ello[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forastero residente» o «residente temporal» para תושב.
    reason: lexical_alternative
  - marker: b
    text: Es decir, de la comida pascual; más precisamente, del cordero pascual.
    reason: cross_reference
lexical_decisions:
- source_word: תּוֹשָׁב
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - forastero residente
  - residente extranjero
  - forastero temporal
  lexicon: HALOT
  rationale: El hebreo designa a una persona no israelita que vive entre el pueblo sin plena incorporación pactal. En español, "forastero" comunica bien la condición de alguien de afuera, y en este contexto legal evita un tecnicismo más pesado. Se mantiene la nota para reflejar la alternativa de "sojourner"/"temporary resident" del POB inglés.
- source_word: שָׂכִיר
  english_pob_choice: hired worker
  chosen_spanish: jornalero
  alternatives_spanish:
  - trabajador asalariado
  - obrero contratado
  - sirviente asalariado
  lexicon: HALOT
  rationale: El término se refiere a alguien empleado por salario. "Jornalero" es natural en español y conserva la idea de trabajo remunerado, sin introducir la carga peyorativa de un equivalente como "mercenario" o el matiz servil de "siervo".
- source_word: לֹא יֹאכַל
  english_pob_choice: shall not eat
  chosen_spanish: no comerá
  alternatives_spanish:
  - no debe comer
  - no podrá comer
  lexicon: HALOT
  rationale: En español jurídico, el futuro simple reproduce bien la fuerza prohibitiva del imperfecto con negación. "No comerá" mantiene el registro normativo y la brevedad del hebreo.
- source_word: בּוֹ
  english_pob_choice: of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de eso
  - de la víctima pascual
  lexicon: HALOT
  rationale: El hebreo usa una referencia pronominal breve cuyo antecedente se entiende por el contexto. "De ello" conserva esa amplitud sin fijar prematuramente si se trata del animal, del sacrificio o de la comida pascual, aunque el contexto inmediato apunta al cordero/pascua.
theological_decisions:
- issue: Alcance del referente del pronombre
  english_pob_reading: '''It'' refers to the Passover animal/meal established in the immediate context.'
  chosen_spanish_reading: '"De ello" deja abierto el antecedente inmediato, entendido por el contexto como el cordero o la comida pascual.'
  alternative_spanish_readings:
  - '"de la Pascua"'
  - '"del cordero pascual"'
  rationale: La frase hebrea es breve y presupone el contexto. En español, un pronombre neutro preserva esa economía textual y evita estrechar indebidamente el referente. La nota explica la relación con la comida/animal pascual sin alterar el texto base.
  doctrine_reference: Éxodo 12:3–11; 12:43–49
translation_notes:
  revision_awareness: La última revisión inglesa sustituyó "resident foreigner" por "sojourner" para hacer más conciso תושב; aquí se optó por "forastero" por ser una alternativa igualmente breve y natural en español, manteniendo la nota para transparentar la gama semántica. Se conservó la estructura prohibitiva y el referente implícito del pronombre sin ampliarlo innecesariamente.
  spanish_consistency_notes:
  - Se mantuvo un registro legal y conciso acorde con la legislación pascual.
  - '"De ello" preserva la ambigüedad controlada del hebreo y evita precisar más allá del contexto.'
  - Las notas distinguen entre el término de residencia extranjera y el del trabajador por salario, sin fusionarlos.
