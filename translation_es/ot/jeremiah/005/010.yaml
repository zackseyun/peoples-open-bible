translation:
  language: es
  text: Suban por sus hileras de vid y destruyan[a], pero no la acaben por completo. Quiten sus ramas[b], porque no son de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Suban por sus muros y destruyan». El término hebreo en esta expresión es difícil, y algunos entienden la imagen en sentido arquitectónico más que agrícola.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sus brotes» o «sus sarmientos». El hebreo puede continuar la metáfora de la viña.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלוּ
  english_pob_choice: Go up
  chosen_spanish: Subid
  alternatives_spanish:
  - Subid contra
  - Subid
  lexicon: HALOT
  rationale: El imperativo plural de עלה conserva en español la idea de avanzar o subir hacia el objetivo. «Subid» mantiene la fuerza de movimiento del mandato sin añadir explícitamente «contra», que ya está sugerido por el contexto militar.
- source_word: בְּשָׁרוֹתֶיהָ
  english_pob_choice: through her vine-rows
  chosen_spanish: por sus hileras de vid
  alternatives_spanish:
  - por sus paredes
  - entre sus terrazas
  - por sus hileras de vid
  lexicon: HALOT
  rationale: El término es difícil y admite lectura arquitectónica o agrícola. Dado el paralelismo con «ramas» y el imaginario de viña en Jeremías, «hileras de vid» conserva mejor la metáfora sin forzar una solución demasiado concreta.
- source_word: וְשַׁחֵתוּ
  english_pob_choice: and destroy
  chosen_spanish: y destruid
  alternatives_spanish:
  - y arruinad
  - y asolad
  lexicon: HALOT
  rationale: El verbo expresa destrucción fuerte. «Destruid» es directo y refleja bien el valor imperativo intenso del hebreo.
- source_word: וְכָלָה אַל תַּעֲשׂוּ
  english_pob_choice: but do not make a full end
  chosen_spanish: pero no hagáis un exterminio total
  alternatives_spanish:
  - pero no los acabéis por completo
  - pero no hagáis una destrucción completa
  lexicon: HALOT
  rationale: 'La expresión es idiomática y comunica la idea de llevar a un fin completo. «Exterminio total» conserva la tensión: orden de destruir, pero no de borrar por completo.'
- source_word: הָסִירוּ
  english_pob_choice: Remove
  chosen_spanish: Quitad
  alternatives_spanish:
  - Removed
  - Apartad
  - Quitad
  lexicon: HALOT
  rationale: El imperativo de הסיר en este contexto pide retirar algo. «Quitad» suena natural en español y funciona tanto en imagen agrícola como arquitectónica.
- source_word: נְטִישׁוֹתֶיהָ
  english_pob_choice: her branches
  chosen_spanish: sus ramas
  alternatives_spanish:
  - sus brotes
  - sus sarmientos
  - sus ramas
  lexicon: HALOT
  rationale: La POB inglesa optó por «branches», aunque reconoce la posibilidad de brotes/tentáculos de vid. En español, «ramas» es el equivalente más claro y general, manteniendo la imagen de la planta sin especificarla en exceso.
- source_word: כִּי לֹא לַיהוָה הֵמָּה
  english_pob_choice: for they are not Yahweh’s
  chosen_spanish: porque no son de Yahvé
  alternatives_spanish:
  - porque no pertenecen a Yahvé
  - porque no son para Yahvé
  lexicon: HALOT
  rationale: La preposición ל expresa pertenencia o relación de posesión. «No son de Yahvé» es conciso, idiomático y conserva la fuerza de pertenencia del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. Siguiendo el criterio del proyecto, se preserva el nombre propio divino en español como «Yahvé», en lugar de sustituirlo por una convención de mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Tensión entre destrucción y preservación
  english_pob_reading: but do not make a full end
  chosen_spanish_reading: pero no hagáis un exterminio total
  alternative_spanish_readings:
  - pero no hagáis una destrucción completa
  - pero no los acabéis por completo
  rationale: El hebreo ordena destruir, pero prohíbe un fin completo. La traducción debe conservar esa tensión teológica y literaria, asociada al tema del remanente en Jeremías.
  doctrine_reference: 'Jeremiah thematic context: judgment tempered by remnant preservation'
translation_notes:
  revision_awareness: El texto inglés auditado y la revisión más reciente no introducen cambios pendientes; el consenso de revisión es de alta concordancia. La formulación española sigue la decisión inglesa principal y conserva las alternativas relevantes donde el hebreo es difícil.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - Se conserva el contraste entre «destruid» y «no hagáis un exterminio total» para no borrar la tensión del original.
  - Se prefirió «hileras de vid» como solución de base para la imagen ambigua, dejando nota de la lectura arquitectónica alternativa.
  - «Ramas» funciona como equivalente amplio en español, con nota para las lecturas más específicas de brotes o sarmientos.
