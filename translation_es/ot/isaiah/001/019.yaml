revisions:
- from: Si estáis dispuestos y obedecéis[a], comeréis lo bueno de la tierra.
  to: Si están dispuestos y obedecen[a], comerán lo bueno de la tierra.
  rationale: Se ajusta el verso al español neutro latinoamericano cambiando las formas de 'vosotros' por formas ampliamente comprensibles ('están... comerán'). Se conserva el sentido pactal de שׁמע con 'obedecen' en el texto principal y la alternativa más literal 'escuchan' en nota, mejor redactada y con puntuación correcta. 'Lo bueno de la tierra' preserva adecuadamente el hebreo טוּב הָאָרֶץ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:26:26Z'
