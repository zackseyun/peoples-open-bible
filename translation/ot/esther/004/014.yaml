id: EST.4.14
reference: Esther 4:14
source:
  edition: WLC
  text: כִּ֣י אִם הַחֲרֵ֣שׁ תַּחֲרִישִׁי֮ בָּ/עֵ֣ת הַ/זֹּאת֒ רֶ֣וַח וְ/הַצָּלָ֞ה יַעֲמ֤וֹד לַ/יְּהוּדִים֙ מִ/מָּק֣וֹם אַחֵ֔ר וְ/אַ֥תְּ וּ/בֵית אָבִ֖י/ךְ תֹּאבֵ֑דוּ וּ/מִ֣י יוֹדֵ֔עַ אִם לְ/עֵ֣ת כָּ/זֹ֔את הִגַּ֖עַתְּ לַ/מַּלְכֽוּת־־־׃
translation:
  text: For if you keep silent at this time[a], relief and deliverance will arise for the Jews from another place, but you and your father's house will perish. And who knows whether you have attained royalty for a time like this?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'for such a time as this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - For indeed if
  - But if
  lexicon: HALOT
  rationale: The combination introduces a conditional explanation tied to the previous verse. 'For if' preserves both the explanatory force and the conditional sense in natural English.
- source_word: הַחֲרֵשׁ תַּחֲרִישִׁי
  chosen: you keep silent
  alternatives:
  - you remain completely silent
  - you indeed keep silent
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb חרשׁ. 'Keep silent' is idiomatic English and captures the force without awkward literalism; the intensification is conveyed by the full clause rather than doubled wording.
- source_word: בָּעֵת הַזֹּאת
  chosen: at this time
  alternatives:
  - at this moment
  - in this time
  lexicon: HALOT
  rationale: A temporal phrase referring to the present crisis. 'At this time' is natural and sufficiently formal.
- source_word: רֶוַח
  chosen: relief
  alternatives:
  - breathing room
  - respite
  lexicon: HALOT
  rationale: In context the noun denotes respite or relief from danger. 'Relief' is the most idiomatic pairing with the following noun and fits the deliverance context.
- source_word: וְהַצָּלָה
  chosen: deliverance
  alternatives:
  - escape
  - salvation
  lexicon: HALOT
  rationale: The noun refers to rescue from threatened destruction. 'Deliverance' preserves the gravity of the situation without importing specifically soteriological overtones that 'salvation' might suggest here.
- source_word: יַעֲמֹד
  chosen: will arise
  alternatives:
  - will come
  - will stand forth
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand,' but in this idiom it conveys emergence or coming into effect. 'Will arise' is a standard English rendering that fits the sense of help appearing from elsewhere.
- source_word: לַיְּהוּדִים
  chosen: for the Jews
  alternatives:
  - for the Judeans
  lexicon: HALOT
  rationale: In Esther the term refers to the Jewish people in the Persian diaspora. 'Jews' is the conventional and contextually clear rendering in English.
- source_word: מִמָּקוֹם אַחֵר
  chosen: from another place
  alternatives:
  - from elsewhere
  lexicon: HALOT
  rationale: The phrase is intentionally somewhat indefinite. 'From another place' preserves that wording and leaves open the implied source of help.
- source_word: וְאַתְּ וּבֵית אָבִיךְ
  chosen: but you and your father's house
  alternatives:
  - but you and your family line
  - but you and your ancestral house
  lexicon: HALOT
  rationale: '''Father''s house'' is a standard Hebrew kinship expression. Retaining it preserves the familial and household dimension better than flattening it to ''family,'' while remaining understandable in English.'
- source_word: תֹּאבֵדוּ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will die
  lexicon: HALOT
  rationale: The verb אבד can denote perishing or being destroyed. 'Will perish' is broad enough to include both death and ruin and matches the solemn warning.
- source_word: וּמִי יוֹדֵעַ
  chosen: And who knows
  alternatives:
  - And who can know
  - Who knows
  lexicon: HALOT
  rationale: This idiom introduces a rhetorical possibility without certainty. 'And who knows' is natural and preserves the open-ended force.
- source_word: אִם לְעֵת כָּזֹאת
  chosen: whether for a time like this
  alternatives:
  - whether for such a time as this
  - if for a time like this
  lexicon: HALOT
  rationale: The phrase expresses possible purpose or providential timing. 'For a time like this' is clear modern English; the more traditional 'for such a time as this' is preserved as a lexical alternative because of its familiarity.
- source_word: הִגַּעַתְּ
  chosen: you have attained
  alternatives:
  - you have come
  - you have arrived
  lexicon: HALOT
  rationale: The verb נגע in the Hiphil here conveys reaching or attaining a position. 'Have attained' fits the collocation with royal status better than the more spatially literal 'have come.'
- source_word: לַמַּלְכוּת
  chosen: royalty
  alternatives:
  - the kingdom
  - the royal position
  - queenship
  lexicon: HALOT
  rationale: In context Esther has come into royal office, not merely into a geographic kingdom. 'Royalty' communicates accession to royal status in concise modern English. 'Queenship' is possible but less idiomatic in contemporary Bible translation.
