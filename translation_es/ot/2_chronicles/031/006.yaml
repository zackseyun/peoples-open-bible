    reason: lexical_alternative
  - marker: b
    text: O «en montones, montón tras montón». La repetición hebrea intensifica la imagen de una gran acumulación.
    reason: alternative_reading
  revision_rationale: Se ajusta בני al sentido corporativo documentado por el POB («el pueblo de Israel y de Judá»), se mueve la nota [a] al sintagma que realmente comenta, y se suaviza levemente la redacción para mayor naturalidad en español sin apartarse del hebreo ni de la terminología del proyecto.
