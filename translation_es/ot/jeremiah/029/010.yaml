translation:
  language: es
  text: 'Porque esto es lo que dice Yahvé: Cuando se cumplan setenta años para Babilonia[a], yo me ocuparé de ustedes[b] y cumpliré mi buena palabra a favor de ustedes[c], para hacerlos volver a este lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se completen setenta años en/para Babilonia». La expresión hebrea puede referirse al período fijado en relación con Babilonia sin precisar en el texto principal cuál de las interpretaciones históricas se debe preferir.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los visitaré». El verbo hebreo puede significar dirigir la atención hacia alguien, ya sea para juicio o para cuidado; aquí el contexto es favorable.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y confirmaré/estableceré mi buena palabra a favor de ustedes». El hebreo expresa llevar a cabo la palabra dicha por Yahvé; «cumpliré» comunica ese sentido idiomático.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino, preservando el nombre del pacto sin sustituirlo por un título.
- source_word: כִּי כֹה אָמַר
  english_pob_choice: For this is what ... says
  chosen_spanish: Porque esto es lo que dice
  alternatives_spanish:
  - Porque así dice
  - Pues esto es lo que dice
  lexicon: HALOT
  rationale: La fórmula introduce un dicho divino. En español, 'esto es lo que dice' comunica de forma natural el giro introductorio sin alejarse del hebreo.
- source_word: לְפִי מְלֹאת לְבָבֶל שִׁבְעִים שָׁנָה
  english_pob_choice: When seventy years for Babylon are completed
  chosen_spanish: Cuando se cumplan setenta años para Babilonia
  alternatives_spanish:
  - Cuando se completen setenta años para Babilonia
  - Cuando hayan pasado setenta años para Babilonia
  - Cuando se cumplan los setenta años de Babilonia
  lexicon: HALOT
  rationale: Se conserva la relación con Babilonia sin resolverla en el texto principal como si fuera inequívocamente 'en Babilonia' o 'el dominio de Babilonia'. 'Se cumplan' refleja el sentido de plenitud/completud del período.
- source_word: אֶפְקֹד אֶתְכֶם
  english_pob_choice: I will attend to you
  chosen_spanish: yo me ocuparé de ustedes
  alternatives_spanish:
  - yo los atenderé
  - yo visitaré ustedes
  - yo pondré mi atención en ustedes
  lexicon: HALOT
  rationale: פקד puede implicar volver la atención hacia alguien, para bien o para juicio. En este contexto favorable, 'me ocuparé de ustedes' expresa intervención benévola sin sonar arcaico.
- source_word: וַהֲקִמֹתִי עֲלֵיכֶם אֶת דְּבָרִי הַטּוֹב
  english_pob_choice: and fulfill my good word to you
  chosen_spanish: y cumpliré mi buena palabra para con ustedes
  alternatives_spanish:
  - y confirmaré mi buena palabra para con ustedes
  - y estableceré mi buena palabra sobre ustedes
  - y haré realidad mi buena palabra para con ustedes
  lexicon: HALOT
  rationale: הקים con דבר expresa establecer o llevar a cabo una promesa pronunciada. 'Cumpliré' transmite el valor idiomático; 'buena palabra' conserva el paralelo hebreo con 'word' y no lo reemplaza sin necesidad por 'promesa'.
- source_word: לְהָשִׁיב אֶתְכֶם
  english_pob_choice: to bring you back
  chosen_spanish: para traerlos de vuelta
  alternatives_spanish:
  - para devolverlos
  - para hacerlos volver
  - para restaurarlos
  lexicon: HALOT
  rationale: El causativo de שוב pide un verbo que exprese hacer volver. 'Traerlos de vuelta' es idiomático en español y mantiene la fuerza causativa.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este sitio
  - a este lugar mismo
  - a este lugar de aquí
  lexicon: HALOT
  rationale: מקום es 'lugar' y no necesariamente 'tierra'. 'Este lugar' respeta la amplitud del hebreo sin restringirlo más de lo debido.
theological_decisions:
- issue: Referencia de los setenta años asociados con Babilonia
  english_pob_reading: Rendered neutrally as 'seventy years for Babylon' without specifying whether this means Babylon's period of dominance or the duration of the exile.
  chosen_spanish_reading: Se conserva de forma neutral como 'setenta años para Babilonia'.
  alternative_spanish_readings:
  - setenta años en Babilonia
  - los setenta años de Babilonia
  rationale: La construcción hebrea admite una asociación con Babilonia sin obligar a resolver la interpretación histórica dentro del versículo. La formulación española mantiene esa ambigüedad documentada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó sin modificaciones (high_agreement, 0.95). Se mantuvo la solución de ''seventy years for Babylon'' como una asociación neutral, y la combinación ''attend to you / fulfill my good word to you'' se trasladó al español con equivalentes naturales que preservan la tensión léxica del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según el estándar del proyecto para יְהוָה.
  - Se conserva 'Babilonia' en lugar de 'Babilonia/los babilonios' porque el hebreo usa לְבָבֶל y el contexto no obliga a ampliar el referente.
  - '''Buena palabra'' se conserva de forma deliberada para reflejar דְּבָרִי הַטּוֹב sin sustituirlo por ''promesa'' en el texto principal.'
  - No se usa 'SEÑOR' para el nombre divino, conforme al criterio del proyecto.
