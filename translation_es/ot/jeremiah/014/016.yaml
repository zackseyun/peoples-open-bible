    issue: 'El texto contiene marcas editoriales no resueltas: «será[n] arrojados[a]».'
    rationale: Esto impide publicar el texto y deja indeterminada la concordancia gramatical. Debe resolverse directamente en el texto final.
  - severity: medium
    issue: La nota [a] sobre una lectura alternativa de concordancia no corresponde a una variante textual real del hebreo.
    rationale: El problema no es una lectura alternativa del original sino una decisión de estilo/concordancia en español. Una vez reparada la frase, la nota sobra y añade ruido innecesario.
  - severity: low
    issue: «a quienes ellos profetizan» suena algo menos natural que «a quienes ellos les profetizan» o una reestructuración equivalente.
    rationale: No es infiel, pero el español mejora si se reestructura la oración alrededor de «el pueblo para el que ellos profetizan» o se mantiene «a quienes» con una sintaxis más fluida.
