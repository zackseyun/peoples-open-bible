translation:
  language: es
  text: ¿Quién, entre todos los dioses de las tierras, ha librado a su tierra de mi mano,[a] como para que Yahvé libre a Jerusalén de mi mano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién, entre todos los dioses de los países, ha librado a su tierra de mi mano, para que Yahvé librará a Jerusalén de mi mano?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Cuál
  - ¿Quién de
  lexicon: HALOT
  rationale: La pregunta es retórica y personaliza el desafío de Rabsaqué; en español, «¿Quién» reproduce de manera natural el valor interrogativo y la fuerza polémica del hebreo.
- source_word: בְּכָל אֱלֹהֵי הָאֲרָצוֹת
  english_pob_choice: among all the gods of the lands
  chosen_spanish: entre todos los dioses de las tierras
  alternatives_spanish:
  - de todos los dioses de las tierras
  - entre todos los dioses de los países
  lexicon: HALOT
  rationale: El ב con כָּל funciona de manera partitiva; «entre» refleja mejor ese valor que un simple «de». «Tierras» conserva el matiz de territorios/naciones sin imponer una lectura universalizante.
- source_word: הִצִּילוּ
  english_pob_choice: has delivered
  chosen_spanish: ha librado
  alternatives_spanish:
  - ha salvado
  - ha rescatado
  - han librado
  lexicon: HALOT
  rationale: «Librar» expresa bien la idea militar de rescatar/liberar de un poder enemigo. Se usa singular en español porque la pregunta retórica se centra en «¿Quién...?»; esto sigue la solución inglesa de singularizar el verbo en la pregunta.
- source_word: אַרְצָם
  english_pob_choice: their land
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a su país
  - a su tierra propia
  - a sus tierras
  lexicon: HALOT
  rationale: El sufijo 3mp es distributivo; en español, «su» mantiene esa referencia sin forzar pluralidad explícita. «Tierra» conserva el campo semántico territorial del hebreo.
- source_word: מִיָּדִי
  english_pob_choice: from my hand
  chosen_spanish: de mi mano
  alternatives_spanish:
  - de mi poder
  - de mi mano de poder
  - de mi control
  lexicon: HALOT
  rationale: La expresión idiomática «de mi mano» preserva la metáfora hebrea de poder/control y coincide con la traducción auditada del inglés POB.
- source_word: יַצִּיל
  english_pob_choice: should deliver
  chosen_spanish: libre
  alternatives_spanish:
  - libré
  - salvará
  - podrá librar
  lexicon: HALOT
  rationale: En español, el subjuntivo tras «para que» comunica la expectativa desafiada o irónica. «Libre» conserva mejor el tono de desafío que un futuro simple.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé». Mantiene el nombre divino sin la sustitución litúrgica «SEÑOR».'
- source_word: יְרוּשָׁלַםִ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Topónimo estándar en español bíblico y contemporáneo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Según la convención del POB en español, se traduce como «Yahvé» para preservar el nombre propio del Dios de Israel y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Mood of the final clause (יַצִּיל) in a rhetorical taunt
  english_pob_reading: should deliver
  chosen_spanish_reading: libre
  alternative_spanish_readings:
  - salvará
  - podrá librar
  - librará
  rationale: La forma hebrea expresa acción futura/en disputa dentro de una pregunta retórica. En español, el subjuntivo en «para que Yahvé libre...» comunica con naturalidad la ironía desafiante sin suavizar la afirmación.
  doctrine_reference: Gramática y pragmática del discurso directo en hebreo bíblico
translation_notes:
  revision_awareness: 'Se siguió el apunte del POB inglés sin cambios sustantivos en la revisión más reciente: la puntuación interrogativa, la partícula partitiva y el tratamiento del Tetragrama permanecen consistentes con la decisión óptima-equivalente del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «mano» como metáfora de poder/control, sin sustituirla por una abstracción.
  - «Tierras» y no «países» para dejar abierta la referencia territorial sin modernizar en exceso.
  - El verbo final en subjuntivo preserva el tono de desafío retórico del hebreo.
