translation:
  language: es
  text: Y si una casa se divide contra sí misma[a], esa casa no podrá mantenerse en pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hogar' para οἰκία, aunque aquí se preserva 'casa' porque el paralelo con 'mantenerse en pie' favorece la imagen concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκία
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - familia
  - casas doméstica / casa-hogar
  lexicon: BDAG
  rationale: El griego admite tanto el sentido concreto de 'casa' como el social de 'hogar/familia', pero el paralelo con 'mantenerse en pie' favorece conservar la imagen arquitectónica. 'Casa' es la opción más directa y mantiene la metáfora del texto.
- source_word: ἐφ’ ἑαυτὴν
  english_pob_choice: against itself
  chosen_spanish: contra sí misma
  alternatives_spanish:
  - sobre sí misma
  - en relación consigo misma
  lexicon: BDAG
  rationale: La construcción con ἐπί + reflexivo expresa oposición interna. En español, 'contra sí misma' comunica de modo natural la idea de autocontradicción o división interna sin perder la fuerza del giro griego.
- source_word: μερισθῇ
  english_pob_choice: is divided
  chosen_spanish: se divide
  alternatives_spanish:
  - es dividida
  - se parte
  - se fracciona
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo en una condición general se vierte de forma natural en español con presente gnómico. 'Se divide' mantiene la pasividad/resultatividad implícita y suena idiomático.
- source_word: δυνήσεται
  english_pob_choice: will be able
  chosen_spanish: podrá
  alternatives_spanish:
  - será capaz de
  - puede
  lexicon: BDAG
  rationale: El futuro de δύναμαι expresa capacidad futura. 'Podrá' es la forma más natural en español y conserva la idea de capacidad, sin reducirla a una simple posibilidad.
- source_word: σταθῆναι
  english_pob_choice: to stand
  chosen_spanish: mantenerse en pie
  alternatives_spanish:
  - estar en pie
  - permanecer firme
  - subsistir
  lexicon: BDAG
  rationale: Aunque 'estar en pie' sería más literal, en español 'mantenerse en pie' preserva la metáfora corporal/arquitectónica y comunica mejor la idea de permanecer firme o no colapsar. No se reemplaza por 'subsistir' para no borrar la imagen concreta.
- source_word: ἡ οἰκία ἐκείνη
  english_pob_choice: that house
  chosen_spanish: esa casa
  alternatives_spanish:
  - aquella casa
  - esa familia
  - aquella familia
  lexicon: BDAG
  rationale: El demostrativo ἐκείνη añade énfasis. En español, 'esa casa' reproduce de manera natural el valor deíctico. 'Aquella' sería posible, pero suele intensificar más la distancia que la referencia puntual del griego en este contexto.
- source_word: καὶ ἐὰν
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y cuando
  - Si
  lexicon: BDAG
  rationale: La coordinación inicial se conserva con 'Y'. La condicional ἐὰν se vierte con 'si', manteniendo el encadenamiento argumentativo del dicho.
translation_notes:
  revision_awareness: 'Revisado con el audit trail en inglés: se mantuvo la preferencia por ''house/casa'' frente a ''household/familia'' por la fuerza de la metáfora de ''stand/mantenerse en pie''; no se detectaron cambios posteriores relevantes en la versión inglesa auditada.'
  spanish_consistency_notes:
  - Se conservó un registro moderno y solemne, evitando el calco rígido donde el español pide una solución idiomática.
  - Se mantuvo la metáfora arquitectónica ('casa', 'mantenerse en pie') para no diluir el argumento de Jesús.
  - El demostrativo se ajustó a la deixis natural del español ('esa') sin sobretraducir la distancia de ἐκείνη.
