translation:
  language: es
  text: Tengo puestos mis ojos en los fieles de la tierra, para que habiten conmigo[a]; el que anda en un camino irreprochable[b], ese me servirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para sentarse conmigo». El verbo hebreo puede significar «sentarse» o «habitar»; aquí probablemente implica asociación continua en la presencia del rey.
    reason: lexical_alternative
  - marker: b
    text: O «en el camino de integridad». «Irreprochable» aquí se refiere a rectitud o integridad, no a una perfección sin pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינַי
  english_pob_choice: My eyes are on
  chosen_spanish: Mis ojos están sobre
  alternatives_spanish:
  - Tengo puestos mis ojos en
  - Mis ojos están puestos en
  lexicon: HALOT
  rationale: Conserva la imagen concreta de los ojos dirigidos hacia alguien, como en el inglés POB, pero en español suena natural con la construcción 'están sobre'. Evita una paráfrasis que borre el matiz de atención/favor.
- source_word: בְּנֶאֶמְנֵי אֶרֶץ
  english_pob_choice: the faithful of the land
  chosen_spanish: los fieles de la tierra
  alternatives_spanish:
  - los fieles del país
  - los confiables de la tierra
  lexicon: HALOT
  rationale: נֶאֱמָן comunica fidelidad/fiabilidad. 'Fieles' es el equivalente más transparente y bíblicamente reconocible en español. 'De la tierra' conserva el hebreo אֶרֶץ sin forzar una lectura abstracta; 'del país' sería posible, pero menos literal.
- source_word: לָשֶׁבֶת עִמָּדִי
  english_pob_choice: that they may dwell with me
  chosen_spanish: para que habiten conmigo
  alternatives_spanish:
  - para sentarse conmigo
  - para permanecer conmigo
  lexicon: HALOT
  rationale: El verbo puede significar 'sentarse' o 'habitar/residir'. En este contexto de asociación estable con el rey, 'habiten conmigo' conserva el sentido de permanencia y compañía, sin perder la alternativa semántica documentada por el POB inglés.
- source_word: הֹלֵךְ
  english_pob_choice: he who walks
  chosen_spanish: el que anda
  alternatives_spanish:
  - el que camina
  - quien anda
  lexicon: HALOT
  rationale: El participio hebreo describe una conducta habitual. 'El que anda' refleja bien ese uso proverbial en español y mantiene la imagen moral del caminar.
- source_word: בְּדֶרֶךְ תָּמִים
  english_pob_choice: in a blameless way
  chosen_spanish: en camino de integridad
  alternatives_spanish:
  - en un camino irreprochable
  - en el camino de integridad
  lexicon: HALOT
  rationale: 'El inglés POB eligió ''blameless'' y explicó que se trata de integridad, no de impecabilidad absoluta. ''Camino de integridad'' preserva esa tensión: ''integridad'' comunica rectitud moral sin sugerir sin pecado absoluto. La preposición ''en'' es natural y el sustantivo ''camino'' traduce דֶּרֶךְ con fidelidad.'
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: ese
  alternatives_spanish:
  - él
  - tal persona
  lexicon: HALOT
  rationale: El pronombre hebreo es enfático. 'Ese' en español permite conservar el énfasis demostrativo del original ('ese, precisamente'), sin perder la referencia singular masculina.
- source_word: יְשָׁרְתֵנִי
  english_pob_choice: he shall serve me
  chosen_spanish: me servirá
  alternatives_spanish:
  - me atenderá
  - me ministrará
  lexicon: HALOT
  rationale: שׁרת en contextos cortesanos puede ser servicio personal u oficial. 'Servirá' es amplio, natural y no introduce un registro eclesiástico ajeno. Mantiene la apertura del hebreo entre servicio y función de corte.
theological_decisions:
- issue: Relación entre compañía estable y servicio oficial
  english_pob_reading: The verse describes the psalmist's favorable regard for faithful people in the land and specifies that the one who lives blamelessly is fit to serve him.
  chosen_spanish_reading: El versículo mantiene juntas la idea de convivencia con el rey y la aptitud para servirle, sin reducirlo solo a amistad privada ni solo a cargo formal.
  alternative_spanish_readings:
  - El versículo podría leerse solo como selección de oficiales de corte.
  - El versículo podría entenderse solo como compañía íntima y no como servicio oficial.
  rationale: 'El hebreo permite ambas dimensiones: ''habiten conmigo'' y ''me servirá''. La traducción conserva esa amplitud en vez de resolverla prematuramente, siguiendo el principio POB de no borrar tensiones documentadas.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se cotejó el paquete fuente hebreo con el inglés POB y sus notas. No hubo revisiones posteriores relevantes; el texto inglés más reciente se mantiene sin cambios y el español sigue esa lectura, preservando las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exija expresamente; este versículo no contiene el Tetragrámaton.
  - «Fieles» mantiene la familia léxica de fidelidad/trustworthiness sin introducir terminología eclesiástica.
  - «Servirá» conserva el tono cortesano amplio de שׁרת sin forzar «ministrará».
  - La puntuación separa claramente las dos cláusulas principales como en el hebreo y el inglés POB.
