base_translation:
  language: en
  yaml_path: translation/ot/exodus/035/029.yaml
  text: Every man and woman whose heart moved them to bring something for all the work that Yahweh had commanded to be done through Moses—the children of Israel brought a freewill offering to Yahweh[a][b][c].
  footnotes:
  - marker: a
    text: Or 'whose heart impelled them' or 'whose heart made them willing.' The Hebrew idiom expresses inward willingness or prompting.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the hand of Moses,' an idiom meaning 'through Moses' or 'by Moses as mediator.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Israelites brought.' Literally 'the children of Israel.'
    reason: lexical_alternative
