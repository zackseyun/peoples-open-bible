base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/018/020.yaml
  text: But the prophet who presumptuously speaks a word in my name that I have not commanded him to speak[b][a], or who speaks in the name of other gods—that prophet shall die.
  footnotes:
  - marker: a
    text: Or 'acts presumptuously' / 'speaks arrogantly.' The Hebrew verb conveys willful presumption or arrogant overstepping.
    reason: lexical_alternative
  - marker: b
    text: Or 'must die' or 'is to be put to death.' The Hebrew gives the legal death sentence in a terse form.
    reason: lexical_alternative
