lexical_decisions:
- source_word: וַיֹּסֶף
  english_pob_choice: continued
  chosen_spanish: continuó
  alternatives_spanish:
  - añadió
  - prosiguió
  - siguió
  lexicon: HALOT
  rationale: 'En esta fórmula narrativa, יסף no se traduce de forma mecánica como ''añadir'', sino según su función discursiva: Eliú retoma la palabra. ''Continuó'' conserva esa idea de reanudar o seguir hablando sin sonar forzado en español.'
- source_word: אֱלִיהוּא
  english_pob_choice: Elihu
  chosen_spanish: Eliú
  alternatives_spanish:
  - Elihú
  lexicon: Convención de nombres propios bíblicos en español
  rationale: Se adapta el nombre propio a la forma usual en español bíblico, manteniendo la identificación inequívoca del personaje.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - y habló
  lexicon: HALOT
  rationale: El verbo אמר introduce una continuación de discurso; en español 'dijo' expresa con naturalidad esa fórmula narrativa. El sujeto ya está explícito en el nombre propio, por lo que no hace falta repetirlo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota [a] directamente en el texto traducido y manteniendo la alternativa literal documentada por el audit trail inglés.
  spanish_consistency_notes:
  - Se conserva la fórmula narrativa breve sin sobreinterpretación.
  - No se introduce terminología teológica ajena al hebreo de este versículo.
  - La puntuación con dos puntos antes de la nota refleja la función introductoria del enunciado.
