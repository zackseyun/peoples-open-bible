lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo narrativo de habla introduce una fórmula estándar. En español, 'habló' conserva el valor de comunicación verbal de manera natural y precisa; 'dijo' es posible, pero 'habló' se ajusta mejor al marco solemne y formulaico del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se traslada como el nombre propio divino. 'Yahvé' preserva el nombre personal de Dios y sigue la convención de este proyecto; 'el SEÑOR' ocultaría el nombre, y 'Jehová' no es la forma preferida por la política del proyecto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, 'a' expresa con claridad el complemento indirecto sin añadir matices no presentes en el hebreo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico, equivalente habitual y reconocido para משה.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el contenido del discurso. 'Diciendo' conserva la función formulaica y la relación sintáctica del hebreo sin forzar una perífrasis menos directa.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto contiene el nombre del pacto en forma directa. Se mantiene la transliteración del nombre divino para no sustituirlo por un título y para preservar la misma decisión teológica y textual del POB en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo recibido y con la auditoría inglesa: la única decisión sensible es la representación del Tetragrámaton. No se documentan revisiones textuales ni variantes que alteren la traducción base.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se mantuvo el participio formulaico 'diciendo' para reflejar לֵּאמֹר sin añadir contenido interpretativo.
  - 'El orden sintáctico español sigue la fórmula narrativa natural: sujeto divino + verbo de habla + destinatario + marca discursiva.'
