translation:
  language: es
  text: 'Por el bien de mis hermanos y de mis compañeros[a], diré ahora[b]: «Paz[c] dentro de ti[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «amigos»: רֵעַ puede referirse a amigos, compañeros o asociados; aquí se eligió «compañeros» por el paralelismo con «hermanos».'
    reason: lexical_alternative
  - marker: b
    text: 'O «por favor»: נָא puede añadir ruego o súplica. En esta línea, «ahora» expresa mejor la prontitud del acto de hablar.'
    reason: lexical_alternative
  - marker: c
    text: «Paz» (shalom) también puede incluir los sentidos de bienestar, plenitud o prosperidad.
    reason: lexical_alternative
  - marker: d
    text: 'O «en ti»: el hebreo usa segunda persona femenina singular, dirigiéndose directamente a Jerusalén personificada como ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: For the sake of
  chosen_spanish: Por causa de
  alternatives_spanish:
  - Por el bien de
  - En favor de
  lexicon: HALOT
  rationale: La expresión hebrea marca motivo o consideración; «por causa de» comunica de manera natural en español que la frase se dice movida por la relación con los otros, sin añadir una finalidad no explícita.
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos varones
  - mis parientes
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino con sufijo de primera persona. «Mis hermanos» conserva la forma concreta del término de parentesco y la fuerza comunitaria sin neutralizar indebidamente el género.
- source_word: וְרֵעָי
  english_pob_choice: and my companions
  chosen_spanish: y de mis compañeros
  alternatives_spanish:
  - y de mis amigos
  - y de mis allegados
  lexicon: HALOT
  rationale: רֵעַ puede ser compañero, asociado o amigo. «Compañeros» encaja bien con el paralelismo con «hermanos» y con el marco de peregrinación/comunidad, sin hacer la relación demasiado íntima.
- source_word: אֲדַבְּרָה
  english_pob_choice: I will ... say
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - hablaré diciendo
  lexicon: HALOT
  rationale: La forma cohortativa/imperfectiva expresa intención o resolución. En español, «hablaré» mantiene el impulso volitivo y permite la cita directa siguiente; «diré» sería posible, pero menos fiel al matiz verbal de hablar con declaración.
- source_word: נָּא
  english_pob_choice: now / please
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - te ruego
  lexicon: HALOT
  rationale: Aquí נָא puede aportar inmediatez o súplica. «Ahora» conserva la sensación de urgencia o prontitud de manera sobria; el matiz de súplica queda disponible como alternativa, pero no se impone en el texto principal.
- source_word: שָׁלוֹם
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Bienestar
  - Plenitud
  - Prosperidad
  lexicon: HALOT
  rationale: «Paz» es la equivalencia principal y más reconocible para shalom. Mantiene el peso bíblico de bienestar integral sin forzar una paráfrasis.
- source_word: בָּךְ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en ti
  - entre tus muros
  lexicon: HALOT
  rationale: El sufijo de segunda femenina singular se refiere a Jerusalén personificada. «Dentro de ti» conserva la dirección espacial del hebreo y hace claro que el saludo se dirige a la ciudad.
theological_decisions:
- issue: Jerusalén como destinataria femenina singular
  english_pob_reading: 'The blessing is directly addressed to Jerusalem as a feminine singular city: ''Peace be within you.'''
  chosen_spanish_reading: 'La bendición se dirige directamente a Jerusalén personificada como ciudad femenina singular: «Paz dentro de ti».'
  alternative_spanish_readings:
  - Paz dentro de ella
  - Que haya paz en ti
  rationale: El hebreo usa un sufijo femenino singular de segunda persona. Mantener la segunda persona conserva la fuerza poética y personal de la personificación; no se sustituye por una tercera persona más explicativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Alcance de שָׁלוֹם
  english_pob_reading: '''Peace'' (shalom) can also carry the sense of well-being, wholeness, or prosperity.'
  chosen_spanish_reading: «Paz» se deja como término principal, con su trasfondo de bienestar integral implícito.
  alternative_spanish_readings:
  - bienestar
  - plenitud
  - prosperidad
  rationale: En español, «paz» es la forma breve y fiel que mejor conserva la densidad semántica de shalom. Las otras posibilidades se mantienen como matices posibles, no como sustitutos del término principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del hebreo y toma en cuenta la revisión inglesa que prefirió una formulación más natural para la cohortativa con נָא. En español, «hablaré ahora» conserva esa resolución inmediata sin perder el matiz volitivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la personificación femenina singular de Jerusalén mediante la segunda persona («ti»).
  - «Paz» se usa como equivalente principal de shalom, con sus matices semánticos explicados en nota.
