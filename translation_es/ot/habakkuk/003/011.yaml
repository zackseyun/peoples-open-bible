translation:
  language: es
  text: Sol y luna se detuvieron en su alto lugar[a]; a la luz de tus flechas, iban[b], al brillo del destello[c] de tu lanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en su morada elevada"; זְבֻלָה puede referirse a una morada exaltada o a un lugar alto.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es muy comprimido: "iban" puede referirse a los astros, o más probablemente al vuelo de las flechas y de la lanza de Dios.'
    reason: alternative_reading
  - marker: c
    text: 'O: "el relámpago de tu lanza".'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶשׁ יָרֵחַ
  english_pob_choice: Sun and moon
  chosen_spanish: Sol y luna
  alternatives_spanish:
  - El sol y la luna
  lexicon: HALOT
  rationale: La pareja nominal hebrea designa los dos luminares celestes. En español, sin artículos, se conserva mejor el paralelismo poético y la concisión del hebreo, como en la opción inglesa.
- source_word: עָמַד
  english_pob_choice: stood
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - se pusieron de pie
  - quedaron firmes
  - se pararon
  lexicon: HALOT
  rationale: En este contexto poético, el verbo expresa cese o permanencia fija. "Se detuvieron" comunica bien la imagen de interrupción del movimiento sin forzar una explicación mecanicista.
- source_word: זְבֻלָה
  english_pob_choice: in their lofty place
  chosen_spanish: en su alto lugar
  alternatives_spanish:
  - en su morada elevada
  - en los cielos
  - en su morada
  lexicon: HALOT
  rationale: זְבוּל apunta a una morada elevada o lugar exaltado. "Alto lugar" mantiene la elevación espacial y el tono poético; el singular posesivo en español refleja naturalmente la pareja colectiva "sol y luna".
- source_word: לְאוֹר
  english_pob_choice: at the light of
  chosen_spanish: a la luz de
  alternatives_spanish:
  - por la luz de
  - ante la luz de
  - al resplandor de
  lexicon: HALOT
  rationale: La preposición con אוֹר funciona aquí de modo circunstancial/poético. "A la luz de" es natural en español y conserva la relación sintáctica con el paralelo siguiente.
- source_word: חִצֶּיךָ
  english_pob_choice: your arrows
  chosen_spanish: tus flechas
  alternatives_spanish:
  - tus saetas
  - tus dardos
  lexicon: HALOT
  rationale: Se elige "flechas" como equivalente claro y común en español. "Saetas" sería más literario pero menos transparente; "dardos" debilita el registro bélico tradicional del hebreo.
- source_word: יְהַלֵּכוּ
  english_pob_choice: they went
  chosen_spanish: iban
  alternatives_spanish:
  - marchaban
  - caminaban
  - se movían
  lexicon: HALOT
  rationale: El hebreo es comprimido y deja cierto margen sobre el referente exacto del movimiento. "Iban" conserva esa ambigüedad y la continuidad del movimiento sin precisar indebidamente el sujeto.
- source_word: לְנֹגַהּ
  english_pob_choice: at the brightness of
  chosen_spanish: al brillo de
  alternatives_spanish:
  - a la claridad de
  - al resplandor de
  - ante el brillo de
  lexicon: HALOT
  rationale: נֹגַהּ denota brillo/radiancia. "Al brillo de" mantiene el paralelismo y suena natural; se evita sobrecargar con abstracciones menos idiomáticas.
- source_word: בְּרַק
  english_pob_choice: the flash of
  chosen_spanish: el resplandor de
  alternatives_spanish:
  - el relámpago de
  - el fulgor de
  - el destello de
  lexicon: HALOT
  rationale: Aunque בָּרָק puede ser "relámpago", en este paralelo con la lanza conviene expresar la cualidad visual del arma. "Resplandor" preserva la imagen luminosa sin introducir una lectura meteorológica innecesaria.
- source_word: חֲנִיתֶךָ
  english_pob_choice: your spear
  chosen_spanish: tu lanza
  alternatives_spanish:
  - tu alabarda
  - tu lanza de guerra
  lexicon: HALOT
  rationale: '"Lanza" es el equivalente más natural y fiel para חֲנִית en español. Mantiene el registro bélico y la imagen de arma punzante.'
theological_decisions:
- issue: Referencia de "iban" en el segundo hemistiquio
  english_pob_reading: The motion is left intentionally compressed in English, most naturally referring to the divine arrows/spear imagery rather than explicitly to the sun and moon.
  chosen_spanish_reading: El movimiento queda deliberadamente comprimido; en español, "iban" puede entenderse de modo natural como referido al vuelo de las flechas y al brillo/fulgor de la lanza, sin resolver de manera excesiva el referente.
  alternative_spanish_readings:
  - Los astros iban a la luz de tus flechas
  - Tus flechas iban a la luz de tu resplandor
  rationale: El hebreo permite ambigüedad poética sobre qué exactamente "iba". Se preserva esa tensión en vez de explicitar un sujeto ausente del texto. La formulación española evita añadir interpretación decisiva y conserva la densidad imagética.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene estable tras la última pasada, con acuerdo general alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en el contexto inmediato del libro, conforme a la convención del proyecto.
  - Se conserva un registro poético sobrio y bíblico, pero con español contemporáneo y claro.
  - '"Flechas" y "lanza" conservan la imaginería bélica del hebreo sin reemplazos eclesiásticos o explicativos que atenúen el texto.'
