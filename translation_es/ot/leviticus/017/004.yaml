  rationale: 'Se revisa el borrador para alinear mejor el español con el hebreo y con la auditoría POB: se reemplaza la construcción poco natural ‘sangre se le contará’ por ‘se le imputará sangre’, que conserva el carácter jurídico del modismo; se eliminó la nota sobre ‘morada/tabernáculo’, que no era necesaria ni correspondía al foco documentado; y se reordenaron las notas para explicar el idiomático legal y la ambigüedad de ‘será cortado’.'
