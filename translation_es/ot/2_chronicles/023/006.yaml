review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura principal del hebreo: prohibición de entrada, excepción para sacerdotes y levitas ministrantes, razón de santidad cultual, y mandato final al pueblo. También mantiene correctamente «Yahvé» para יְהוָה y «casa de Yahvé» para בֵית יְהוָה. Sin embargo, «guardará la carga de Yahvé» no representa bien יִשְׁמְרוּ מִשְׁמֶרֶת יְהוָה: además de pasar de plural a singular colectivo, «carga» en español no comunica de forma natural ni fiel el sentido de deber/guardia/observancia asignada.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «guardará la carga de Yahvé» suena poco idiomático y puede inducir a entender peso o fardo, no deber sagrado. Conviene una formulación natural que conserve el matiz cultual, como «cumplirá el encargo de Yahvé» o «guardará el mandato de Yahvé». También es preferible alinear la nota [b] con la nota inglesa auditada sobre la expresión final, ya que la nota actual introduce una explicación teológica nueva sobre «santos» en vez de preservar la alternativa léxica documentada.
  glossary_alignment: 'Alineación buena en «Yahvé», «sacerdotes», y «levitas que ministran». «Santos» es aceptable para קֹדֶשׁ en contexto cultual. La principal desviación está en מִשְׁמֶרֶת: el proyecto inglés justificó «charge» con alternativas como watch/duty/order, y en español «carga» no sigue adecuadamente esa rationale. Debe cambiarse a «encargo», «deber», «mandato» o similar. Además, la nota asociada debe tratar esa expresión final, no «santos».'
  issues:
  - severity: high
    issue: «guardará la carga de Yahvé» traduce deficientemente יִשְׁמְרוּ מִשְׁמֶרֶת יְהוָה
    rationale: «Carga» en español normalmente significa peso, fardo o responsabilidad pesada, no el encargo/deber/guardia cultual expresado por מִשְׁמֶרֶת. Esto distorsiona el sentido y reduce la legibilidad.
  - severity: medium
    issue: El verbo final quedó en singular colectivo («guardará») mientras el hebreo está en plural («guardarán/que guarden»)
    rationale: Aunque «todo el pueblo» puede admitir singular en español, aquí el mandato distributivo se oye mejor y refleja mejor el original con «cumpla» o «guarde» en subjuntivo/jusivo dependiente de la exhortación.
  - severity: medium
    issue: La nota [b] no preserva la nota léxica documentada en el audit trail
    rationale: La evidencia inglesa anota alternativas para «keep the charge of Yahweh», no una explicación sobre «holy». La nota española debería acompañar la expresión final y reflejar esas alternativas relevantes.
