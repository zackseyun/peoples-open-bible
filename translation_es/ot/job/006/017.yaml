revisions:
- from: Cuando ellos se calientan[a], se desvanecen; cuando hace calor[c][b], se secan y desaparecen de su lugar.
  to: Cuando se calientan[a], se desvanecen; cuando hace calor[b], se secan en su lugar[c].
  rationale: Se elimina «y desaparecen» porque añade contenido no sustentado por el hebreo y duplica el sentido del verbo anterior. Se ajusta «de su lugar» a «en su lugar» para que el español suene natural con «se secan», mientras la nota conserva la literalidad hebrea y la posible especificación contextual de cauce/canal. También se pule la redacción de la nota literal.
