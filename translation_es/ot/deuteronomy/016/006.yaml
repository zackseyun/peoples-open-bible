review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: la restricción exclusiva de כִּי אִם, el lugar escogido por Yahvé, el lenguaje del nombre que habita allí, el acto sacrificial de תִּזְבַּח, y las referencias temporales al atardecer y a la salida de Egipto. Sin embargo, hay un error importante de español y de fidelidad terminológica en «el Pascua», que debe ser «la Pascua». Además, el borrador omite dos alternativas léxicas preservadas en la auditoría inglesa: la opción para לְשַׁכֵּן שְׁמוֹ שָׁם y la alternativa de «sacrificarás / degollarás» para תִּזְבַּח, y conviene reflejarlas en notas españolas.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «el Pascua» es gramaticalmente incorrecto e impropio del español bíblico general. «Por la tarde» y «al ponerse el sol» son legibles y naturales; la frase sobre el nombre de Yahvé es aceptable, aunque algo pesada. La puntuación con punto y coma funciona, pero una raya larga o dos puntos también serían posibles. Con la corrección de género y notas mejor alineadas, el verso queda plenamente legible.
  glossary_alignment: Se alinea bien con los estándares del proyecto en «Yahvé», «Dios», y el mantenimiento del idioma teológico del «nombre» que habita. «La Pascua» es la forma correcta y además coincide con la propia justificación léxica del borrador. No hay conflicto doctrinal que requiera adjudicación adicional.
  issues:
  - severity: high
    issue: Uso de «el Pascua» en lugar de «la Pascua».
    rationale: En español estándar y eclesial, «Pascua» es femenino. La forma actual contradice la propia decisión léxica documentada y afecta la calidad y credibilidad del texto.
  - severity: medium
    issue: Falta una nota para la alternativa de לְשַׁכֵּן שְׁמוֹ שָׁם.
    rationale: 'La auditoría inglesa preserva alternativas significativas: «hacer habitar su nombre allí» / «poner su nombre allí». Como el español adopta una de ellas, conviene anotar la otra posibilidad principal para mantener trazabilidad lexical.'
  - severity: medium
    issue: Falta una nota para la alternativa de תִּזְבַּח.
    rationale: El inglés conserva la alternativa «slaughter». En español, una nota como «O “degollarás la Pascua”» ayuda a preservar el matiz sacrificial concreto sin cargar el texto principal.
  revised_spanish_text: sino solamente en el lugar que Yahvé tu Dios escogerá para hacer habitar allí su nombre[a]; allí sacrificarás la Pascua[b] por la tarde, al ponerse el sol, en el tiempo señalado de tu salida de Egipto.
  revised_footnotes:
  - marker: a
    text: O «para que su nombre habite allí» o «para poner allí su nombre».
    reason: lexical_alternative
  - marker: b
    text: O «degollarás la Pascua».
    reason: lexical_alternative
  revision_rationale: Se corrigió el error gramatical «el Pascua» a «la Pascua». También se añadieron notas léxicas que preservan alternativas significativas documentadas en la auditoría inglesa para el idioma del nombre que habita y para el verbo sacrificial, sin recargar el texto principal.
