translation:
  language: es
  text: Y tomaron sus pertrechos,[a] y Judas tomó la espada de Apolonio, y peleó con ella todos sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos los días'; la expresión puede leerse más literalmente, pero en el contexto probablemente significa el resto de la vida de Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεύη
  english_pob_choice: equipment
  chosen_spanish: utensilios
  alternatives_spanish:
  - equipo
  - armamento
  - pertrechos
  lexicon: LSJ
  rationale: En contexto militar, σκεύη puede abarcar el conjunto de objetos o pertrechos tomados. 'Utensilios' es lo bastante amplio para no forzar un tipo específico de arma o botín, y conserva la idea de objetos/implementos sin estrechar el sentido.
- source_word: μάχαιρα
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - daga
  - puñal
  - espada corta
  lexicon: LSJ
  rationale: Aunque μάχαιρα puede designar una hoja más corta, 'espada' funciona de manera natural en español narrativo y no introduce una precisión que el griego aquí no exige.
- source_word: ἦν πολεμῶν
  english_pob_choice: he fought
  chosen_spanish: peleó
  alternatives_spanish:
  - estuvo peleando
  - seguía peleando
  - combatió
  lexicon: LSJ
  rationale: La construcción perifrástica griega expresa acción sostenida o habitual. El inglés POB pasó de 'kept fighting' a 'fought' para una traducción más directa; en español, 'peleó' mantiene la linealidad del relato sin cargar con una perífrasis innecesaria. La duratividad queda sugerida por el contexto y por la frase siguiente.
- source_word: ἐν αὐτῇ
  english_pob_choice: with it
  chosen_spanish: con ella
  alternatives_spanish:
  - por ella
  - en ella
  lexicon: LSJ
  rationale: El pronombre se refiere naturalmente a la espada. 'Con ella' expresa el valor instrumental de manera idiomática en español.
- source_word: πάσας τὰς ἡμέρας
  english_pob_choice: all his days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - todos los días
  - por todos sus días
  - durante toda su vida
  lexicon: LSJ
  rationale: La expresión griega es literalmente 'todos los días', pero en contexto probablemente significa el resto de la vida o carrera de Judas. 'Todos sus días' preserva la literalidad básica y permite la misma ambigüedad idiomática que la nota inglesa documenta.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde 'he kept fighting' a 'he fought' para hacer la frase más directa. En español se siguió ese ajuste con 'peleó', evitando una perífrasis más interpretativa y conservando la referencia instrumental de la espada.
  spanish_consistency_notes:
  - Se usa 'Judas' y 'Apolonio' conforme a los nombres establecidos en español.
  - Se mantuvo una sintaxis coordinada simple para reflejar la secuencia del griego sin sobreexplicar.
  - '''Todos sus días'' conserva la ambigüedad documentada por el texto fuente y la nota inglesa.'
