    reason: lexical_alternative
  - marker: b
    text: Older English often has 'usury' here, but the Hebrew refers more generally to charging interest on a loan.
    reason: lexical_alternative
  - marker: c
    text: Literally 'silver' for 'money.'
    reason: lexical_alternative
