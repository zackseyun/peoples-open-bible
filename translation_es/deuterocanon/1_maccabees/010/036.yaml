  spanish_quality_summary: El texto es claro y bastante natural, pero puede mejorarse en fluidez administrativa y naturalidad léxica. «Sean inscritos» reproduce mejor el tono decretal que «se inscribirán», y «provisiones» suena más idiomático en español general que «provisión» con valor colectivo. El resto del verso está bien resuelto y es legible en español eclesial moderno.
  glossary_alignment: No hay términos teológicos de glosario mayor en juego. Las decisiones militares y administrativas concuerdan con el expediente inglés. Se conserva correctamente «judíos», «fuerzas del rey» y el matiz de límite en «hasta treinta mil». La nota léxica sobre ξενιά sigue siendo pertinente.
