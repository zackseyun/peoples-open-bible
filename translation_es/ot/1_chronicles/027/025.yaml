  rationale: Se corrige «tesoros» a «tesorerías» para reflejar mejor el sentido administrativo de אֹצָרוֹת en contexto. Se elimina la nota mal anclada y la duplicación, dejando una sola nota en «campo» para preservar la alternativa literal y la explicación del singular colectivo. El resto del verso puede mantenerse.
