translation:
  language: es
  text: Y David tomó la corona del rey de ellos de su cabeza, y halló que pesaba un talento[a] de oro, y en ella había una piedra preciosa; y estuvo sobre la cabeza de David. Y se llevó de la ciudad muchísimo botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la corona de Milcom» (o «Malcam»), leyendo מַלְכָּם como el nombre del dios ammonita y no como «el rey de ellos». Un talento era una antigua unidad de peso grande; a menudo se estima en unos 34 kilos o 75 libras, aunque los valores exactos variaban.
    reason: alternative_reading_and_cultural_note
lexical_decisions:
- source_word: עֲטֶרֶת
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - diadema
  lexicon: HALOT
  rationale: '"Corona" es el equivalente natural y fiel en español para la prenda real; mantiene la imagen de realeza sin introducir un matiz no requerido por el contexto.'
- source_word: מַלְכָּם
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - Milcom
  - Malcam
  lexicon: HALOT
  rationale: La sintaxis inmediata con "de sobre su cabeza" favorece una referencia a un rey poseedor de la corona. Se conserva en nota la lectura alternativa del nombre del dios ammonita, porque las consonantes permiten esa ambigüedad.
- source_word: מֵעַל רֹאשׁוֹ
  english_pob_choice: from his head
  chosen_spanish: de sobre su cabeza
  alternatives_spanish:
  - de su cabeza
  - desde su cabeza
  lexicon: HALOT
  rationale: '"De sobre su cabeza" conserva el movimiento espacial concreto del hebreo sin sonar forzado en español; evita suavizar excesivamente la imagen.'
- source_word: וַיִּמְצָאָהּ
  english_pob_choice: found that it weighed
  chosen_spanish: halló que pesaba
  alternatives_spanish:
  - halló que tenía un peso de
  - halló que pesaba
  lexicon: HALOT
  rationale: La forma española expresa de modo claro el resultado del hallazgo sin añadir contenido ajeno; mantiene la relación entre el hallazgo y el peso.
- source_word: מִשְׁקַל כִּכַּר זָהָב
  english_pob_choice: it weighed a talent of gold
  chosen_spanish: pesaba un talento de oro
  alternatives_spanish:
  - su peso era de un talento de oro
  - pesaba un talento de oro
  lexicon: HALOT
  rationale: '"Talento" conserva la unidad antigua de peso, como en el texto inglés auditado. No se convierte a medidas modernas para no introducir precisión no dada por la fuente.'
- source_word: אֶבֶן יְקָרָה
  english_pob_choice: a precious stone
  chosen_spanish: una piedra preciosa
  alternatives_spanish:
  - una gema preciosa
  - una piedra de gran precio
  lexicon: HALOT
  rationale: '"Piedra preciosa" es una equivalencia directa, transparente y suficientemente amplia para no especificar indebidamente el tipo de gema.'
- source_word: וַתְּהִי עַל רֹאשׁ דָּוִיד
  english_pob_choice: it was on David’s head
  chosen_spanish: estaba sobre la cabeza de David
  alternatives_spanish:
  - estuvo sobre la cabeza de David
  - quedó sobre la cabeza de David
  lexicon: HALOT
  rationale: La revisión inglesa reciente evitó un pasivo implícito; en español, "estaba sobre" refleja directamente el estado resultante sin añadir una acción de colocación no expresada.
- source_word: וּשְׁלַל הָעִיר
  english_pob_choice: plunder from the city
  chosen_spanish: botín de la ciudad
  alternatives_spanish:
  - despojo de la ciudad
  - plunder de la ciudad
  lexicon: HALOT
  rationale: '"Botín" comunica bien el sustantivo militar de saqueo y es natural en español bíblico contemporáneo.'
- source_word: הוֹצִיא
  english_pob_choice: he carried off
  chosen_spanish: sacó
  alternatives_spanish:
  - llevó fuera
  - arrancó
  lexicon: HALOT
  rationale: En contexto de botín, "sacó" expresa la acción de retirar bienes de la ciudad; "carrió off" del inglés se vuelve naturalmente en español como extracción/retirada.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very much
  chosen_spanish: muchísimo
  alternatives_spanish:
  - en gran manera
  - mucho, en extremo
  lexicon: HALOT
  rationale: '"Muchísimo" transmite la fuerte intensificación del hebreo de manera idiomática y sin perder el énfasis cuantitativo.'
theological_decisions:
- issue: ¿מַלְכָּם se debe leer como "su rey" o como el nombre del dios ammonita Milcom/Malcam?
  english_pob_reading: their king
  chosen_spanish_reading: su rey
  alternative_spanish_readings:
  - Milcom
  - Malcam
  rationale: Se sigue la lectura sintáctica principal porque el pronombre posesivo en el contexto inmediato encaja de manera natural con un rey cuyo casco/corona fue tomada. La alternativa teonímica se conserva en nota para no borrar la tensión lexical documentada.
  doctrine_reference: Preservar la ambigüedad textual cuando el hebreo permite más de una lectura legítima.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió «it was on David’s head» en lugar de una pasiva implícita. También conserva la nota alternativa para מַלְכָּם y la unidad antigua «talento», conforme al expediente auditado.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no hay términos teológicos adicionales en este versículo.
  - Se usa «corona» por ser el equivalente más natural y fiel en este contexto real.
  - Se conserva «botín» para שָׁלָל, en coherencia con el registro militar del pasaje.
  - La nota del talento explica la unidad sin convertirla a una cifra fija en el texto principal.
