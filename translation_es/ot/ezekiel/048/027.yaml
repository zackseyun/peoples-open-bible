translation:
  language: es
  text: Y junto al límite de Zabulón[a], desde el lado oriental hasta el lado occidental, Gad, una porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Gad, uno». La palabra «porción» se sobreentiende por la fórmula repetida de repartición del capítulo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And along
  chosen_spanish: Y junto a
  alternatives_spanish:
  - Y sobre
  - Y al lado de
  lexicon: HALOT
  rationale: En esta fórmula de repartición territorial, עַל con la conjunción introduce el siguiente tramo del territorio. «Junto a» conserva la relación espacial sin sonar forzada en español.
- source_word: גְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: גְּבוּל denota el límite o línea que delimita una porción. «Límite» resulta natural en español y mantiene el valor geográfico de la fórmula.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulún
  lexicon: propio/nombre tribal
  rationale: Se usa la forma castellana tradicional y reconocible del nombre tribal, sin cambiar la referencia propia.
- source_word: מִפְּאַת קָדִימָה
  english_pob_choice: from the east side
  chosen_spanish: desde el lado oriental
  alternatives_spanish:
  - desde el lado del oriente
  - desde el extremo oriental
  lexicon: HALOT
  rationale: פֵּאָה expresa lado o extremo, y קָדִימָה señala la orientación hacia el este. «Lado oriental» preserva el valor direccional de modo claro y natural.
- source_word: עַד פְּאַת יָמָּה
  english_pob_choice: to the west side
  chosen_spanish: hasta el lado occidental
  alternatives_spanish:
  - hasta el lado del mar
  - hasta el extremo occidental
  lexicon: HALOT
  rationale: La expresión marca la extensión de este a oeste. Aunque יָמָּה puede relacionarse con el mar, aquí la función geográfica es «occidental», que comunica mejor el contraste estructural del versículo.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: propio/nombre tribal
  rationale: Nombre tribal propio transliterado de forma estándar en español.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una
  - una sola porción
  lexicon: HALOT
  rationale: El hebreo dice literalmente «uno», pero en el contexto de las reparticiones del capítulo se sobreentiende «porción». En español conviene explicitarlo para no perder el sentido elíptico del reparto.
theological_decisions:
- issue: Elipsis final en el reparto territorial
  english_pob_reading: Hebrew literally, 'Gad, one.' The word 'portion' is supplied from the chapter's repeated allotment formula.
  chosen_spanish_reading: «Gad, una porción» con porción explícita por el contexto.
  alternative_spanish_readings:
  - «Gad, una»
  - «Gad, una sola»
  rationale: No hay dificultad doctrinal, pero sí una elipsis estructural. Siguiendo el patrón del capítulo, se explicita la unidad de reparto para que el lector español capte el sentido completo sin añadir contenido ajeno.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se reportan cambios y el acuerdo con el control externo es alto. Se mantiene la solución del texto inglés, pero con naturalidad española y con la elipsis final explicitada por el contexto.'
  spanish_consistency_notes:
  - Se conserva la estructura de fórmula territorial repetitiva típica de Ezequiel 48.
  - «Límite» y «lado oriental/occidental» mantienen la terminología geográfica de manera consistente.
  - Se usa «Zabulón» para el nombre tribal y «Gad» se deja sin adaptar por ser ya forma consolidada en español bíblico.
  - No se introduce vocabulario eclesiástico tradicional que altere la precisión del reparto territorial.
