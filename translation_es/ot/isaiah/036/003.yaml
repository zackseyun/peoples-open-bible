  rationale: Se ajusta el título administrativo hebreo a una formulación española natural («encargado de la casa real») sin perder el literal en nota. Se mejora la expresión de אֵלָיו con una construcción más directa en español narrativo. También se corrige la nota alternativa del verbo para que conserve el matiz de «salir».
