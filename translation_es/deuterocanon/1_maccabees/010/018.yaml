lexical_decisions:
- source_word: κατὰ
  english_pob_choice: with these words
  chosen_spanish: con estas palabras
  alternatives_spanish:
  - según estas palabras
  - de conformidad con estas palabras
  lexicon: LSJ
  rationale: En este contexto fragmentario y epistolar, κατά con acusativo se entiende mejor como una fórmula de encabezamiento/transición. En español, «con estas palabras» conserva la naturalidad de la fórmula sin introducir una reconstrucción ajena al griego conservado.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - este mensaje
  lexicon: LSJ
  rationale: λόγοι puede significar palabras, dichos o mensaje. Como el inglés POB mantiene «these words» por cercanía formal, «estas palabras» reproduce esa transparencia y suena natural en español.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: LSJ
  rationale: El participio presente introduce discurso citado. «Diciendo» mantiene la relación sintáctica y la apertura de una cita, sin completar lo que el griego no conserva.
- source_word: Βασιλεὺς Ἀλέξανδρος
  english_pob_choice: King Alexander
  chosen_spanish: Rey Alejandro
  alternatives_spanish:
  - Alejandro, rey
  - el rey Alejandro
  lexicon: LSJ
  rationale: El título real va unido al nombre propio. En español, «Rey Alejandro» refleja directamente la estructura del encabezamiento conservado y evita añadir artículos no presentes en el fragmento.
- source_word: τῷ ἀδελφῷ
  english_pob_choice: to his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - al hermano
  - a su hermano mayor
  lexicon: LSJ
  rationale: En correspondencia helenística, ἀδελφός puede funcionar como forma diplomática de dirección («hermano»). El posesivo «su» hace legible en español la relación epistolar implícita, sin afirmar más de lo que dice el fragmento.
translation_notes:
  revision_awareness: La revisión inglesa cambió una lectura más literal de κατά por una fórmula epistolar más natural («with these words») y añadió comillas de apertura para el encabezado de carta. La versión española sigue ese mismo criterio, pero conserva el carácter fragmentario sin cerrar la cita ni suplir texto ausente.
  spanish_consistency_notes:
  - Se mantuvo el tono epistolar breve y fragmentario del original.
  - Se prefirió «Rey Alejandro» frente a «Alejandro el rey» por naturalidad en español, sin perder la correspondencia formal.
  - «A su hermano» conserva la ambigüedad diplomática posible de ἀδελφῷ en contexto real.
  - No se añadió cierre de comillas porque el fragmento fuente no lo ofrece.
