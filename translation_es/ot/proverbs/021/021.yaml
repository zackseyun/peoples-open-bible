base_translation:
  language: en
  yaml_path: translation/ot/proverbs/021/021.yaml
  text: Whoever pursues righteousness and steadfast love will find life[a], righteousness[c][b], and honor.
  footnotes:
  - marker: a
    text: Or 'justice' for one or both instances of 'righteousness'; the Hebrew term can include both personal righteousness and just conduct.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, a term that can also be rendered ''kindness,'' ''mercy,'' or ''loyal love.'''
    reason: lexical_alternative
  - marker: c
    text: The second 'righteousness' may also be understood as 'vindication' in context.
    reason: lexical_alternative
