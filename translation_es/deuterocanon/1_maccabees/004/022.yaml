translation:
  language: es
  text: Todos huyeron a la tierra de los extranjeros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra de los gentiles». El griego significa «los de otro pueblo» y aquí probablemente se refiere en general a naciones extranjeras, no específicamente a los filisteos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: BDAG
  rationale: El aoristo de φεύγω expresa huida ante peligro. «Huyeron» conserva bien el sentido de retirada apresurada y suena natural en español bíblico actual.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: Todos
  alternatives_spanish:
  - Ellos todos
  - Todos ellos
  lexicon: BDAG
  rationale: El participio/adjetivo sustantivado exige un sujeto explícito en español. «Todos» mantiene la totalidad enfática sin añadir contenido.
- source_word: γῆν
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  lexicon: BDAG
  rationale: En este contexto geográfico-militar, γῆ se entiende de manera amplia como «tierra». Es una opción natural en español y menos interpretativa que «país».
- source_word: ἀλλοφύλων
  english_pob_choice: the foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los gentiles
  - los de otro pueblo
  - los filisteos
  lexicon: BDAG
  rationale: ἀλλόφυλοι significa literalmente «de otro pueblo/tribu». Siguiendo el audit trail inglés, «los extranjeros» conserva el sentido general de pueblos no judeanos y evita identificar indebidamente a los filisteos.
translation_notes:
  revision_awareness: El texto griego es breve y coincide plenamente con el testimonio base. La decisión principal fue mantener el valor general de ἀλλοφύλων como referencia amplia a pueblos extranjeros, tal como refleja la nota auditada en inglés.
  spanish_consistency_notes:
  - Se mantuvo «extranjeros» para ἀλλοφύλων, en coherencia con el registro POB y sin forzar el término técnico «gentiles» en el cuerpo principal.
  - «Huyeron» reproduce el valor de movimiento de emergencia de ἔφυγον y encaja con un relato bélico.
  - La formulación es concisa y evita añadir sujetos o detalles ausentes en el griego.
