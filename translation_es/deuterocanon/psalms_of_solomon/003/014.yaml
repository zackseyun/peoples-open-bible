translation:
  language: es
  text: y ciertamente no será recordado[a] cuando visite a los justos[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ciertamente no será recordado cuando visite a los justos», si se toma como sujeto implícito al pecador y no a su destrucción.'
    reason: alternative_reading
  - marker: b
    text: El verbo puede significar también «atender» o «cuidar de».
    reason: lexical_alternative
  - marker: c
    text: 'O: «y ciertamente no será recordado cuando él visite a los justos».'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ οὐ μὴ
  english_pob_choice: will certainly not
  chosen_spanish: ciertamente no
  alternatives_spanish:
  - no será
  - de ningún modo será
  lexicon: BDAG
  rationale: La doble negación griega expresa énfasis; «ciertamente no» reproduce esa fuerza de manera natural en español sin sonar arcaico.
- source_word: μνησθήσεται
  english_pob_choice: be remembered
  chosen_spanish: será recordado
  alternatives_spanish:
  - será traído a la memoria
  - será mencionado
  lexicon: BDAG
  rationale: El pasivo se rinde de forma directa con «será recordado», conservando la ambigüedad de qué exactamente no será recordado.
- source_word: ἐπισκέπτηται
  english_pob_choice: visits
  chosen_spanish: visite
  alternatives_spanish:
  - atienda a
  - cuidará de
  - visite y cuide de
  lexicon: BDAG
  rationale: «Visitar» mantiene la cercanía formal al griego y puede abarcar la idea bíblica de visita con atención o cuidado; en español la forma subjuntiva encaja con la cláusula temporal.
- source_word: δικαίους
  english_pob_choice: the righteous
  chosen_spanish: a los justos
  alternatives_spanish:
  - a los justos
  - a los rectos
  lexicon: BDAG
  rationale: «Los justos» es la equivalencia más natural y reconocible en español para este campo moral-religioso y preserva el paralelismo bíblico.
theological_decisions:
- issue: Sujeto implícito de μνησθήσεται
  english_pob_reading: The revised English reading takes the implied subject as the sinner, not destruction.
  chosen_spanish_reading: el sujeto implícito se entiende como el pecador; por eso el pasivo impersonal conserva que «no será recordado» él, no «su destrucción».
  alternative_spanish_readings:
  - no será recordada su destrucción
  - no se recordará su ruina
  rationale: La revisión auditada corrige una lectura mecánica del antecedente más cercano. En el flujo del contexto, el sujeto implícito continúa la suerte del impío; el español debe conservar esa decisión sin introducir un sujeto nuevo en el texto principal.
  doctrine_reference: Contexto literario inmediato de Salmos de Salomón 3:13-14
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «and it will certainly not be remembered...» a «and he will certainly not be remembered...», corrigiendo el sujeto implícito de μνησθήσεται. La redacción española sigue la lectura revisada y evita reflejar la antigua opción impersonal en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa «justos» para δικαίους, consistente con el registro bíblico habitual en español.
  - «Visite» conserva el valor de visita con atención/cuidado y evita expandir innecesariamente el verbo.
  - La ambigüedad del sujeto se deja en nota, no en el texto principal, porque la revisión auditada favorece al pecador como antecedente implícito.
