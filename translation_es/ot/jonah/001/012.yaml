  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido hebreo general: Jonás ordena que lo levanten y lo arrojen al mar; el mar se calmará; y él reconoce que la gran tormenta ha venido sobre ellos por causa de él. También preserva adecuadamente la imaginería de עֲלֵיכֶם con «está sobre ustedes». Sin embargo, una nota al pie importante no corresponde al rastro de auditoría inglés ni al hebreo de manera útil, y la nota sobre «Levántenme» introduce una alternativa inadecuada.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial amplio. «Levántenme y arrójenme al mar» y «el mar se calmará para ustedes» funcionan bien. «Por causa mía» es comprensible, pero «por mi causa» suena algo más natural en español general. La principal necesidad de revisión está en las notas: la nota [a] es problemática y [c] debería alinearse mejor con la explicación del modismo hebreo.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en este versículo. Las decisiones léxicas principales concuerdan con el POB inglés: שָׂאוּנִי = «levántenme», וַהֲטִילֻנִי = «arrójenme», הים = «el mar», וישתק = «se calmará», ובשלי = causa/responsabilidad personal. La confesión causal de Jonás se mantiene correctamente.'
  issues:
  - severity: medium
    issue: La nota [a] ofrece «Háganme levantar» como alternativa para שָׂאוּנִי.
    rationale: Esa alternativa no refleja bien el hebreo ni su función en contexto. שָׂאוּנִי significa que ellos deben levantarlo físicamente; «háganme levantar» sugiere causación de otra clase y suena antinatural en español.
  - severity: medium
    issue: La nota [c] introduce «les será calmado el mar», formulación poco natural y no equivalente a la alternativa inglesa documentada.
    rationale: La nota inglesa relevante explica la imagen literal «el mar estará quieto desde sobre ustedes» y la alternativa «esta gran tormenta está sobre ustedes por mi causa». La nota española actual mezcla la explicación del modismo con una paráfrasis pasiva extraña.
  - severity: low
    issue: «Por causa mía» es inteligible pero menos natural que «por mi causa» o «a causa de mí».
    rationale: No es un error de sentido, pero una leve mejora estilística aumenta la fluidez sin alterar la fuerza causal de בשלִי.
