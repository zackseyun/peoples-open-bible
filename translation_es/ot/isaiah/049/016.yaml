translation:
  language: es
  text: Mira, te he inscrito[a] en las palmas de mis manos; tus murallas están continuamente delante de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grabado». El verbo hebreo comunica una marca permanente, como de grabado o tallado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira esto
  - Observa
  lexicon: HALOT
  rationale: Es una interjección de llamado de atención. «Mira» conserva la fuerza deíctica de manera natural en español moderno, sin el tono arcaico de «He aquí».
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: En español, la imagen de inscripción queda más natural con «en las palmas»; «sobre» también es posible, pero «en» mantiene la localización sin forzar la frase.
- source_word: כַּפַּיִם
  english_pob_choice: the palms of my hands
  chosen_spanish: las palmas de mis manos
  alternatives_spanish:
  - mis palmas
  - las palmas
  lexicon: HALOT
  rationale: La forma dual concreta se expresa con la locución completa para preservar la imagen corporal y evitar ambigüedad en español.
- source_word: חַקֹּתִיךְ
  english_pob_choice: I have engraved you
  chosen_spanish: te he grabado
  alternatives_spanish:
  - te he grabado/inscrito
  - te he inscrito
  - te he tallado
  lexicon: HALOT
  rationale: El verbo comunica acción permanente de marcar o grabar. «He grabado» conserva la permanencia y la viveza del hebreo; «inscrito» es una alternativa válida pero algo más formal.
- source_word: חוֹמֹתַיִךְ
  english_pob_choice: your walls
  chosen_spanish: tus murallas
  alternatives_spanish:
  - tus muros
  - tus paredes
  lexicon: HALOT
  rationale: En este contexto urbano y poético, «murallas» comunica mejor las fortificaciones de Jerusalén que el más general «muros».
- source_word: נֶגְדִּי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - frente a mí
  lexicon: HALOT
  rationale: Es una expresión de presencia continua. «Delante de mí» suena natural y preserva la idea de estar en vista/presencia divina.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: HALOT
  rationale: Adverbio de continuidad durativa. «Continuamente» mantiene el matiz formal y sostenido del texto.
theological_decisions:
- issue: Metáfora antropomórfica de las manos divinas y del grabado
  english_pob_reading: 'Retain the anthropomorphic metaphor directly: ''I have engraved you on the palms of my hands.'''
  chosen_spanish_reading: 'Mantener la metáfora directamente: «te he grabado en las palmas de mis manos».'
  alternative_spanish_readings:
  - «siempre me acuerdo de ti»
  - «te tengo presente»
  rationale: El hebreo presenta una imagen corporal vívida de memoria y compromiso. En español conviene conservarla en vez de explicitar su sentido interpretativo, para no debilitar la fuerza del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sufijos femeninos singulares referidos a Sion/Jerusalén
  english_pob_reading: Translate with second-person singular 'you/your,' leaving the addressee as Zion/Jerusalem from context rather than inserting the name into the verse.
  chosen_spanish_reading: 'Usar segunda persona singular: «te», «tus», dejando la identificación de la destinataria al contexto.'
  alternative_spanish_readings:
  - «Jerusalén, te he grabado...»
  - «Sion, tus murallas...»
  rationale: El hebreo habla directamente a una figura femenina singular. Mantener los pronombres conserva la economía del original y evita añadir un nombre que el verso mismo no expresa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto coincide con la última revisión aprobada: no se requirieron cambios adicionales después del control de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo el pronombre de segunda persona singular para respetar el hebreo femenino singular sin introducir «Jerusalén» o «Sion» en el cuerpo del versículo.
  - Se conservó la metáfora corporal de las manos de Dios, en línea con la lectura auditada en inglés.
  - Se prefirió «murallas» por el contexto poético de la ciudad fortificada, sin ampliar el hebreo más allá de lo necesario.
