translation:
  language: es
  text: Y lo envió a él y a Alcimo, el impío, y le establecieron el sacerdocio[a], y le ordenó ejecutar venganza contra los hijos de Israel.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le asignaron el sacerdocio». El griego dice literalmente «establecieron el sacerdocio para él», es decir, lo instalaron en el oficio sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O «entre los hijos de Israel». La preposición griega puede entenderse como el ámbito dentro del cual debía ejecutarse la venganza, aunque el contexto favorece un sentido hostil, es decir, «contra».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: Verbo narrativo normal de envío; «envió» es natural y fiel al valor básico del griego sin añadir matiz excesivo.
- source_word: Ἄλκιμον
  english_pob_choice: Alcimus
  chosen_spanish: Alcimo
  alternatives_spanish:
  - Alcimus
  lexicon: transliteración del nombre propio
  rationale: En español se adapta el nombre como forma natural «Alcimo», manteniendo la identificación del personaje sin forzar la forma latina/inglesa.
- source_word: τὸν ἀσεβῆ
  english_pob_choice: the ungodly
  chosen_spanish: el impío
  alternatives_spanish:
  - el impío
  - el inicuo
  - el malvado
  lexicon: LSJ
  rationale: «Impío» conserva la carga religiosa de ἀσεβής mejor que «malvado»; «el impío» funciona bien como epíteto acusatorio y respetable en español bíblico contemporáneo.
- source_word: ἔστησαν ... τὴν ἱερωσύνην
  english_pob_choice: established the priesthood for him
  chosen_spanish: le establecieron el sacerdocio
  alternatives_spanish:
  - le asignaron el sacerdocio
  - lo instalaron en el sacerdocio
  - le establecieron el sacerdocio para él
  lexicon: LSJ
  rationale: El griego es literalmente de «establecer/poner en pie» el sacerdocio para él. «Le establecieron el sacerdocio» conserva la estructura y deja visible la instalación en el cargo sin explicar de más.
- source_word: ἱερωσύνην
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el oficio sacerdotal
  - el ministerio sacerdotal
  lexicon: LSJ
  rationale: «Sacerdocio» es el equivalente directo y claro; en contexto se entiende como investidura en el cargo.
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: le ordenó
  alternatives_spanish:
  - le mandó
  - le dio la orden
  lexicon: LSJ
  rationale: «Le ordenó» transmite la autoridad del verbo sin cambiar el registro ni la sintaxis del período.
- source_word: ποιῆσαι τὴν ἐκδίκησιν
  english_pob_choice: to carry out vengeance
  chosen_spanish: ejecutar venganza
  alternatives_spanish:
  - llevar a cabo venganza
  - hacer venganza
  - ejercer venganza
  lexicon: LSJ
  rationale: La expresión griega pide una acción de retribución. «Ejecutar venganza» preserva la severidad y la forma verbal fuerte; se evita suavizarla a una mera «punición».
- source_word: ἐν τοῖς υἱοῖς Ἰσραήλ
  english_pob_choice: on the sons of Israel
  chosen_spanish: contra los hijos de Israel
  alternatives_spanish:
  - sobre los hijos de Israel
  - entre los hijos de Israel
  - contra los israelitas
  lexicon: LSJ
  rationale: La revisión inglesa favoreció el sentido hostil. En español, «contra» expresa con claridad la orientación adversativa del contexto y evita la ambigüedad de una lectura meramente locativa.
theological_decisions:
- issue: Epiteto moral ἀσεβῆ aplicado a Alcimo
  english_pob_reading: the ungodly
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el inicuo
  - el malvado
  rationale: Se mantiene la censura religiosa explícita del narrador. «Impío» conserva el juicio teológico de irreverencia hacia Dios sin neutralizarlo con un término genérico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo reflejar ἔστησαν αὐτῷ τὴν ἱερωσύνην
  english_pob_reading: established the priesthood for him
  chosen_spanish_reading: le establecieron el sacerdocio
  alternative_spanish_readings:
  - le asignaron el sacerdocio
  - lo instalaron en el sacerdocio
  rationale: Se conserva la literalidad relativa del giro griego y a la vez la inteligibilidad en español. La frase implica la investidura de Alcimo en cargo sacerdotal sin necesitar una paráfrasis más interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Dirección de la venganza en ἐν τοῖς υἱοῖς Ἰσραήλ
  english_pob_reading: on the sons of Israel
  chosen_spanish_reading: contra los hijos de Israel
  alternative_spanish_readings:
  - entre los hijos de Israel
  - sobre los hijos de Israel
  rationale: Aunque el griego usa ἐν, el contexto narrativo exige un sentido hostil. «Contra» expresa la fuerza de la revisión inglesa y mantiene la referencia a Israel como objeto de la venganza.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La traducción toma en cuenta la revisión inglesa más reciente, especialmente el sentido hostil de la cláusula final («contra los hijos de Israel»), pero evita depender mecánicamente del inglés cuando el griego permite mantener una formulación más cercana al texto. También se conserva la estructura narrativa de envío + instalación + mandato, con un español fluido y apto para publicación.
  spanish_consistency_notes:
  - Se emplea «Dios» de manera estándar cuando corresponda; aquí no aparece el Tetragrámaton.
  - Se mantiene el nombre propio «Alcimo» como adaptación natural al español, consistente con el tratamiento de nombres propios en castellano bíblico.
  - «Impío» se usa como término moral-religioso fuerte, coherente con el valor de ἀσεβής y con el estilo bíblico español contemporáneo.
  - «Sacerdocio» reproduce el sustantivo griego sin añadir explicación doctrinal no presente en el versículo.
  - La cláusula final se traduce con orientación adversativa («contra»), en línea con la lectura contextual de venganza hostil.
