translation:
  language: es
  text: 'Que los presenten y nos declaren lo que va a suceder[a]. Declaren las cosas pasadas: qué son; declárenlas, para que pongamos nuestro corazón[b] en ellas y conozcamos su resultado[c]; o anúnciennos las cosas que están por venir.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que los presenten y nos declaren lo que va a ocurrir».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «poner nuestro corazón»; el modismo significa prestar cuidadosa atención o consideración.'
    reason: cultural_note
  - marker: c
    text: 'O: «su fin».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַגִּ֨ישׁוּ֙
  english_pob_choice: Let them bring them forward
  chosen_spanish: Que los presenten
  alternatives_spanish:
  - Que los traigan adelante
  - Que los acerquen
  lexicon: HALOT / נגשׁ (Hiphil)
  rationale: En este contexto forense, el verbo pide que las cosas/personas sean presentadas ante el tribunal. 'Presenten' comunica bien esa acción en español sin perder el matiz de comparecencia.
- source_word: וְיַגִּ֣ידוּ
  english_pob_choice: and tell us
  chosen_spanish: y nos declaren
  alternatives_spanish:
  - y nos digan
  - y nos anuncien
  lexicon: HALOT / נגד (Hiphil)
  rationale: '''Declarar'' conserva mejor la fuerza pública y solemne del imperativo/encargo que ''decir'', y armoniza con el reto profético del pasaje.'
- source_word: אֵ֖ת אֲשֶׁ֣ר תִּקְרֶ֑ינָה
  english_pob_choice: what will happen
  chosen_spanish: lo que va a suceder
  alternatives_spanish:
  - las cosas que ocurrirán
  - lo que ocurrirá
  lexicon: HALOT / קרה
  rationale: קרה apunta a eventos que suceden. En español, 'lo que va a suceder' suena natural y mantiene el sentido de acontecimientos futuros.
- source_word: הָרִאשֹׁנ֣וֹת
  english_pob_choice: the former things
  chosen_spanish: las cosas pasadas
  alternatives_spanish:
  - las cosas primeras
  - las cosas anteriores
  lexicon: HALOT / ראשׁון
  rationale: Aunque 'former things' es una equivalencia clásica, 'cosas pasadas' comunica de forma clara el contraste temporal en español. Se evita una expresión demasiado arcaica sin perder el referente temporal.
- source_word: מָ֣ה הֵ֗נָּה
  english_pob_choice: what they are
  chosen_spanish: ¿qué son?
  alternatives_spanish:
  - ¿qué eran?
  - ¿qué significan?
  lexicon: HALOT
  rationale: La pregunta hebrea es verbalmente elíptica; '¿qué son?' preserva esa brevedad interrogativa mejor que una expansión interpretativa.
- source_word: וְ/נָשִׂ֤ימָה לִבֵּ֨/נוּ֙
  english_pob_choice: that we may set our heart on them
  chosen_spanish: para que pongamos nuestro corazón en ellas
  alternatives_spanish:
  - para que atendamos a ellas
  - para que fijemos en ellas nuestra atención
  lexicon: HALOT / לבב (idioma hebreo)
  rationale: Se conserva el hebraísmo 'poner el corazón' porque el POB inglés también lo preserva y porque en español es comprensible y suficientemente natural en un registro bíblico digno.
- source_word: וְ/נֵדְעָ֣ה אַחֲרִיתָ֔/ן
  english_pob_choice: and know their outcome
  chosen_spanish: y conozcamos su resultado
  alternatives_spanish:
  - y conozcamos su fin
  - y sepamos cómo terminan
  lexicon: HALOT / אחרית
  rationale: '''Resultado'' expresa bien la idea de desenlace o outcome sin cargar el texto con un tono excesivamente escatológico. ''Fin'' sigue siendo posible, pero en español puede sonar más abrupto.'
- source_word: הַ/בָּא֖וֹת
  english_pob_choice: the things to come
  chosen_spanish: las cosas que están por venir
  alternatives_spanish:
  - las cosas venideras
  - las que vienen
  lexicon: HALOT / בוא
  rationale: La forma participial pide un futuro próximo o venidero. 'Están por venir' es clara y mantiene el contraste con 'las cosas pasadas'.
- source_word: הַשְׁמִיעֻֽ/נוּ
  english_pob_choice: declare to us
  chosen_spanish: o anuncien[nos]
  alternatives_spanish:
  - o háznoslas oír
  - o declárennos
  lexicon: HALOT / שמע (Hiphil)
  rationale: El Hiphil de שׁמע literalmente es 'hacer oír', pero en este contexto funciona como 'anunciar'. Se opta por 'anuncien' para evitar un calco duro y conservar la fuerza retórica.
theological_decisions:
- issue: La frase idiomática hebrea 'poner el corazón'
  english_pob_reading: Hebrew 'set our heart'; the idiom means to apply careful attention or consideration.
  chosen_spanish_reading: '''poner nuestro corazón en ellas'''
  alternative_spanish_readings:
  - '''prestarles atención'''
  - '''fijar nuestra mente en ellas'''
  rationale: Se conserva el hebraísmo porque el valor de la expresión depende de su imaginería corporal, y el español bíblico puede entenderlo sin dificultad. La nota explica el sentido idiomático para evitar una lectura literalista rígida.
  doctrine_reference: Antropología bíblica; uso idiomático del 'corazón' como centro de atención y deliberación.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del control de calidad más reciente, que señaló acuerdo mayoritario con solo observaciones menores. No se requirieron cambios sustanciales; se ajustó la redacción española para mantener claridad, solemnidad y correspondencia con el hebreo y el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo 'corazón' para el hebraísmo central, en coherencia con el POB inglés.
  - Se prefirió 'anuncien'/'declaren' según la función retórica de נגד y שׁמע en el contexto.
  - '''Cosas pasadas'' y ''cosas que están por venir'' conservan el paralelismo temporal del hebreo.'
  - '''Resultado'' se usa como equivalente contextual de אחרית, sin borrar la opción alternativa ''fin''.'
