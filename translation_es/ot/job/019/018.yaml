translation:
  language: es
  text: Aún los niños[a] me desprecian; cuando me levanto, hablan contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «necios», «insolentes» o «muchachos jóvenes». El término hebreo עֲוִילִים suele designar personas necias o moralmente insensatas, pero en este contexto muchos lo entienden como jóvenes inmaduros o de bajo estatus que se burlan de Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Aun
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: גַּם añade énfasis y continuidad; «aun» conserva ese matiz de intensificación sin sonar rígido en español.
- source_word: עֲוִילִים
  english_pob_choice: little children
  chosen_spanish: niños
  alternatives_spanish:
  - fooles
  - insolentes
  - muchachos jóvenes
  - niños pequeños
  lexicon: HALOT
  rationale: El término hebreo es difícil y en este contexto puede aludir a jóvenes inmaduros o de bajo estatus que humillan a Job. «Niños» comunica bien la vergüenza social y la inmadurez sin cerrar indebidamente el rango semántico.
- source_word: מָאֲסוּ בִי
  english_pob_choice: despise me
  chosen_spanish: me desprecian
  alternatives_spanish:
  - me rechazan
  - me desoyen con desprecio
  - me repudian
  lexicon: HALOT
  rationale: מָאַס expresa rechazo despectivo; «desprecian» reproduce ese valor emocional y relacional de modo natural en español.
- source_word: אָקוּמָה
  english_pob_choice: when I rise
  chosen_spanish: cuando me levanto
  alternatives_spanish:
  - si me levanto
  - cuando me pongo de pie
  lexicon: HALOT
  rationale: La forma cohortativa funciona aquí como cláusula temporal; «cuando me levanto» refleja la acción recurrente de Job de manera idiomática.
- source_word: וַיְדַבְּרוּ בִי
  english_pob_choice: they speak against me
  chosen_spanish: hablan contra mí
  alternatives_spanish:
  - hablan de mí
  - se burlan de mí
  - hablan acerca de mí
  lexicon: HALOT
  rationale: El uso hostil de ב con דבר en este contexto pide una traducción adversativa; «hablan contra mí» conserva el sentido sin explicitar más allá de lo que el hebreo exige.
translation_notes:
  revision_awareness: El registro inglés de POB no presentó revisiones aplicadas y el control cruzado reporta alta concordancia; la propuesta española sigue esa lectura sin introducir cambios textuales ni suavizar la tensión léxica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo la fuerza hostil de בִּי־־ como «contra mí», acorde con el contexto y con la decisión inglesa de «speak against me».
  - Se prefirió «niños» sobre un calco más técnico para conservar la humillación social sugerida por el contexto, dejando las alternativas en nota.
  - «Aun» preserva el énfasis inicial de גַּם sin necesidad de añadir una glosa interpretativa en el cuerpo del texto.
