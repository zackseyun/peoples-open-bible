review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: aparecen dos jóvenes adicionales, se describen por fuerza, apariencia y vestidura, y luego lo azotan continuamente desde ambos lados. Sin embargo, hay dos puntos mejorables de fidelidad idiomática: ''aparecieron a él'' es poco natural para ἐφάνησαν αὐτῷ, donde en español bíblico moderno corresponde mejor ''se le aparecieron''; y ''lanzándole muchos golpes'' no expresa tan bien el sentido idiomático de πολλὰς... πληγάς como ''asestándole'' o ''dándole muchos golpes''.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero contiene giros algo rígidos o calcados: ''aparecieron a él'' y ''a ambos lados de él'' suenan menos naturales que ''se le aparecieron'' y ''a ambos lados''. Además, ''su vestidura'' introduce un posesivo no necesario. Con pequeños ajustes, el versículo queda más natural y fluido sin perder formalidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva correctamente 'jóvenes' y no se introduce 'ángeles'. 'Azotaban' es adecuado para μαστιγόω. No se requieren notas nuevas; la alternativa inglesa sobre δόξαν no obliga nota en español porque 'hermosísimos en apariencia' es suficientemente clara.
  issues:
  - severity: medium
    issue: 'Giro no idiomático: ''aparecieron a él'''
    rationale: Aunque conserva αὐτῷ, en español natural y bíblicamente legible corresponde 'se le aparecieron' o 'aparecieron ante él'. El borrador suena calcado del griego/español literal.
  - severity: low
    issue: 'Expresión rígida: ''a ambos lados de él'''
    rationale: Es comprensible, pero 'a ambos lados' o 'a cada lado de él' fluye mejor en español moderno y sigue reflejando ἐξ ἑκατέρου μέρους.
  - severity: medium
    issue: 'Verbo menos preciso: ''lanzándole muchos golpes'''
    rationale: Para πληγάς con ἐπιρριπτοῦντες, 'asestándole muchos golpes' o 'dándole muchos golpes' suena más natural y comunica mejor la acción de infligir repetidos golpes.
  - severity: low
    issue: Posesivo innecesario en 'su vestidura'
    rationale: El griego dice simplemente 'en vestidura/atuendo'; el posesivo no altera gravemente el sentido, pero tampoco hace falta y puede afinarse a 'en su vestimenta' o mejor 'en su atuendo/vestidura' sin posesivo.
  revised_spanish_text: Pero se le aparecieron otros dos jóvenes, sobresalientes en fuerza, hermosísimos en apariencia y espléndidos en vestidura; y, puestos a ambos lados, lo azotaban sin cesar, asestándole muchos golpes.
  revision_rationale: 'Se corrigen varios calcos y se mejora la naturalidad del español manteniendo el sentido exacto del griego y las decisiones del POB en inglés: ''se le aparecieron'' por ἐφάνησαν αὐτῷ, supresión de posesivo innecesario en la descripción del vestido, simplificación de la locución espacial, y ''asestándole muchos golpes'' como mejor equivalente idiomático de πολλὰς ἐπιρριπτοῦντες... πληγάς.'
