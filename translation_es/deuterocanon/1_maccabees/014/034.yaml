    issue: «Joppe» como topónimo principal
    rationale: Aunque defendible como transliteración, «Jope» es la forma más natural y ampliamente reconocible en español bíblico para Ἰόππη/Ἰόππην. «Joppe» suena menos idiomático y puede percibirse como galicismo o transliteración rígida.
  - severity: medium
    issue: «puso en ellos» es poco natural en español
    rationale: El griego ἔθετο ἐν αὐτοῖς es formalmente cercano a «puso en ellos», pero en español el referente locativo queda tosco al hablar de ciudades. «Puso allí» conserva el sentido de ubicación sin crear un giro extraño.
  - severity: low
    issue: «estableció allí a judíos» puede mejorarse
    rationale: Es comprensible, pero «asentó allí a judíos» refleja con más precisión el sentido de repoblar o hacer habitar de κατῴκισεν y suena más natural en contexto histórico-geográfico.
