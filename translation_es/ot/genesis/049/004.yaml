  spanish_quality_summary: 'El español es claro, digno y legible. «Inestable como el agua» y «lecho» funcionan bien. La principal mejora necesaria es sustituir «lo profanaste» por una opción más idiomática en este contexto. Además, conviene pulir la nota al español más natural: quitar comillas sobrantes y usar una formulación menos calcada.'
