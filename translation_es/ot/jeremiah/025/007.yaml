review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general el sentido del hebreo: la falta de escuchar a Yahvé, la fórmula profética, la provocación a ira mediante la obra de sus manos y el daño que recae sobre ellos mismos. Sin embargo, falla en un punto importante de alineación gramatical: el hebreo usa segunda persona plural en toda la frase (שְׁמַעְתֶּם, יְדֵיכֶם, לָכֶם), pero el español mezcla singular y plural y además cambia de ''ustedes'' a ''sus'', lo que debilita la correspondencia.'
  spanish_quality_summary: 'El español es comprensible, pero presenta problemas de concordancia y naturalidad: ''escuchaste'' debe ser plural; ''sus manos'' y ''su propio daño'' rompen la referencia directa a los destinatarios. ''Para provocarme a ira'' es aceptable, aunque algo rígido; ''hasta provocarme a ira'' sonaría más idiomático, pero no es necesario para una reparación mínima. La nota al pie también necesita corregirse para reflejar el posesivo de segunda persona plural.'
  glossary_alignment: Se alinea bien con la terminología del proyecto en 'Yahvé' para יְהוָה y mantiene con acierto 'obra de sus/vuestras manos' sin explicitar ídolos en el texto principal. No hay conflicto teológico serio; el problema principal es morfosintáctico y de legibilidad en español.
  issues:
  - severity: high
    issue: Cambio incorrecto de número/persona en el verbo principal
    rationale: שְׁמַעְתֶּם es segunda persona plural, pero el borrador dice 'escuchaste' (singular). Debe ser 'escucharon' o una forma plural equivalente.
  - severity: high
    issue: Posesivos de tercera persona donde el hebreo tiene segunda plural
    rationale: יְדֵיכֶם y לָכֶם son 'sus manos' y 'para ustedes/vuestro' en referencia a los oyentes. El borrador usa 'sus manos' y 'su propio daño', que en español remiten naturalmente a tercera persona y oscurecen el referente.
  - severity: medium
    issue: La nota al pie reproduce el mismo problema pronominal
    rationale: La nota dice 'sus manos' en vez de mantener la referencia directa a los destinatarios, por lo que debe ajustarse junto con el texto principal.
  revised_spanish_text: Pero no me escucharon[a], declara Yahvé, para provocarme a ira por la obra de sus propias manos, para su propio daño.
  revised_footnotes:
  - marker: a
    text: O 'por las obras de sus manos'; la frase a menudo se refiere a ídolos o a obras idólatras en Jeremías.
    reason: lexical_alternative
  revision_rationale: Se corrige la segunda persona plural del verbo principal y se ajusta la referencia posesiva para que el español refleje adecuadamente que el daño recae en los mismos oyentes. Se conserva 'Yahvé' y la idiomaticidad de 'obra de sus manos', manteniendo la amplitud del hebreo sin explicitar 'ídolos' en el texto principal. La nota al pie se actualiza para concordar con el texto revisado y preservar la alternativa singular/plural documentada en inglés.
