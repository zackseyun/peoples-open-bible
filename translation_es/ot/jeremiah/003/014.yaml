translation:
  language: es
  text: Vuelvan[a], hijos rebeldes, declara Yahvé, porque yo soy su amo[b]; y los tomaré, uno de una ciudad y dos de un clan, y los traeré a Sion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Regresen». El verbo hebreo también puede expresarse como «vuélvanse» o «vuelvan atrás», según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque yo soy su esposo» o «porque me he casado con ustedes». El verbo hebreo puede expresar tanto señorío como relación marital.'
    reason: theological_note
lexical_decisions:
- source_word: שׁוּבוּ
  english_pob_choice: Return
  chosen_spanish: Volved
  alternatives_spanish:
  - Regresad
  - Volved de nuevo
  - Arrepentaos
  lexicon: HALOT
  rationale: El imperativo plural de שוב pide una llamada a volver; «Volved» conserva el movimiento relacional y espacial sin adelantar la interpretación penitencial de «arrepentíos».
- source_word: בָנִים שׁוֹבָבִים
  english_pob_choice: faithless children
  chosen_spanish: hijos rebeldes
  alternatives_spanish:
  - hijos infieles
  - hijos descarriados
  - hijos apóstatas
  lexicon: HALOT
  rationale: בָנִים puede abarcar «hijos» de forma genérica en este contexto; «rebeldes» comunica la idea de apartarse y resistir al pacto sin perder naturalidad en español. Se evita «niños» y también una neutralización innecesaria.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  - dice el SEÑOR
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם admite un equivalente sobrio y directo. Se conserva el nombre divino como «Yahvé» según el criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte de manera uniforme como «Yahvé», manteniendo el nombre propio divino y no un sustituto tradicional.
- source_word: כִּי אָנֹכִי בָּעַלְתִּי בָכֶם
  english_pob_choice: for I am your master
  chosen_spanish: porque yo soy vuestro señor[c]
  alternatives_spanish:
  - porque yo soy vuestro esposo[c]
  - porque yo os he desposado[c]
  - porque yo os domino
  lexicon: HALOT
  rationale: בָּעַל puede expresar dominio/señorío y también relación marital. En español, «señor» preserva el valor de autoridad y permite dejar en nota la alternativa marital sin resolver la tensión del hebreo. Se usa «vuestro» para concordar con el plural masculino del discurso profético.
- source_word: וְלָקַחְתִּי אֶתְכֶם
  english_pob_choice: and I will take you
  chosen_spanish: y os tomaré
  alternatives_spanish:
  - y os recibiré
  - y os recogeré
  lexicon: HALOT
  rationale: לקח se expresa de forma natural con «tomar» en español; aquí conserva la idea de escoger/recoger en contexto de restauración.
- source_word: אֶחָד מֵעִיר וּשְׁנַיִם מִמִּשְׁפָּחָה
  english_pob_choice: one from a city and two from a clan
  chosen_spanish: uno de una ciudad y dos de una familia
  alternatives_spanish:
  - uno de una ciudad y dos de un clan
  - uno de cada ciudad y dos de cada familia
  lexicon: HALOT
  rationale: Se mantiene el distributivo sin añadir «cada». «Familia» es una opción natural en español y suficientemente cercana al grupo de parentesco señalado por מִשְׁפָּחָה; «clan» queda como alternativa posible, pero el texto principal privilegia claridad idiomática.
- source_word: וְהֵבֵאתִי אֶתְכֶם צִיּוֹן
  english_pob_choice: and I will bring you to Zion
  chosen_spanish: y os traeré a Sion
  alternatives_spanish:
  - y os llevaré a Sion
  - y os traeré hasta Sion
  lexicon: HALOT
  rationale: ביא con destino se traduce naturalmente con «traer»; «Sion» conserva el topónimo bíblico en su forma usual en español.
theological_decisions:
- issue: Tensión semántica de בָּעַלְתִּי entre señorío y relación marital
  english_pob_reading: 'I am your master, with footnote: Or, ''for I am your husband,'' or ''for I have married you.'''
  chosen_spanish_reading: 'yo soy vuestro señor, con nota: «o: yo soy vuestro esposo / yo os he desposado»'
  alternative_spanish_readings:
  - yo soy vuestro esposo
  - yo os he desposado
  rationale: El hebreo conserva una ambigüedad intencional. El texto principal prioriza el sentido de autoridad porque es el que fluye mejor con el apelativo «hijos rebeldes»; la nota mantiene la lectura marital para no borrar la tensión teológica y léxica documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Gender-accurate over gender-neutral'
- issue: Alcance de בָנִים en el vocativo
  english_pob_reading: faithless children
  chosen_spanish_reading: hijos rebeldes
  alternative_spanish_readings:
  - hijos infieles
  - hijos descarriados
  rationale: Aunque el inglés revisó a «children» por amplitud semántica, en español «hijos» respeta el vocativo filial sin masculinizar de más, y «rebeldes» preserva la idea de apartamiento. Evita una neutralización que diluiría el eco pactal del texto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Nombre divino en la formulación profética
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: dice Yahvé
  alternative_spanish_readings:
  - declara Yahvé
  - oráculo de Yahvé
  rationale: Se mantiene la política del proyecto de traducir יְהוָה como «Yahvé». La fórmula «dice» reproduce de modo sobrio la introducción profética sin hacerla más arcaica de lo necesario.
  doctrine_reference: 'DOCTRINE.md: Render the divine name distinctly; preserve prophetic formulae'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió «sons» a «children» para ampliar el sentido de בָנִים, pero mantuvo intacta la estructura y la tensión de בָּעַלְתִּי. En español se optó por «hijos rebeldes» como solución equilibrada: conserva el vocativo filial, mantiene el tono profético y evita una neutralización excesiva. También se preservó la nota sobre la ambigüedad marital/señorial del verbo principal, conforme al audit trail.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, de acuerdo con el estándar del proyecto.
  - «Sion» conserva la grafía española usual del topónimo bíblico.
  - El sujeto de la invitación se expresa en plural con «volved», «os tomaré» y «os traeré» para reflejar el hebreo plural.
  - La nota [c] se ancla en «señor» porque ahí se concentra la tensión léxica principal; no se duplica en otro lugar.
