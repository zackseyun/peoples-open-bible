revisions:
- from: Así que todos bendijeron al Juez justo[a], al Señor, que hace manifiestas las cosas ocultas.
  to: Entonces todos bendijeron al Juez justo[a], al Señor, que hace manifiestas las cosas ocultas.
  rationale: Se reemplaza «Así que» por «Entonces» para reflejar mejor οὖν con un español más natural y bíblicamente sobrio. Se conserva el resto, incluida la nota, porque representa fielmente la elipsis griega y el audit trail inglés. «Señor» se mantiene como título divino contextual derivado de κύριος.
