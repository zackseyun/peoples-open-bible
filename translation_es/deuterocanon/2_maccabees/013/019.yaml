translation:
  language: es
  text: Y en Betzura atacó una pequeña guarnición[a] de los judíos, pero fue rechazado, fue repelido[b], y fue debilitado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Bet-zur». El griego translitera el nombre del lugar como Βαθσούρα/Βαθσούροις.
    reason: lexical_alternative
  - marker: b
    text: «Guarnición» también puede entenderse como «fortaleza» o «puesto fortificado»; el griego φρούριον puede referirse tanto a la posición fortificada como a la fuerza militar que la ocupa.
    reason: lexical_alternative
  - marker: c
    text: 'La secuencia verbal es breve y acumulativa: primero avanzó contra el lugar, luego fue rechazado, repelido y finalmente debilitado.'
    reason: spanish_style_note
lexical_decisions:
- source_word: Βαθσούροις
  english_pob_choice: Bethsura
  chosen_spanish: Betzura
  alternatives_spanish:
  - Bethsura
  - Bet-zur
  lexicon: LSJ
  rationale: El griego transmite el topónimo en forma helenizada; en español, «Betzura» mantiene esa transparencia y evita una transliteración demasiado anglicada. «Bet-zur» conserva mejor la forma semítica, pero aquí no es la forma directa del testimonio griego.
- source_word: φρούριον
  english_pob_choice: garrison
  chosen_spanish: guarnición
  alternatives_spanish:
  - fortaleza
  - fortín
  - puesto fortificado
  lexicon: LSJ
  rationale: En el contexto militar, φρούριον puede referirse al puesto defendido o a la fuerza que lo ocupa. «Guarnición» conserva bien la idea de una posición militar ocupada por tropas, como en la elección inglesa.
- source_word: ὀλίγον
  english_pob_choice: small
  chosen_spanish: pequeña
  alternatives_spanish:
  - poca
  - reducida
  - de poco tamaño
  lexicon: LSJ
  rationale: Usado con φρούριον, expresa dimensión o entidad limitada. «Pequeña» suena natural en español y preserva el matiz de algo de escasa magnitud o fuerza.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - perteneciente a los judíos
  - ocupada por los judíos
  lexicon: LSJ
  rationale: El genitivo identifica de forma directa la guarnición. «De los judíos» sigue de cerca el griego y conserva la sencillez del original.
- source_word: προσῆγεν
  english_pob_choice: he attacked
  chosen_spanish: atacó
  alternatives_spanish:
  - avanzó contra
  - se acercó contra
  - asaltó
  lexicon: LSJ
  rationale: Aunque el verbo puede significar literalmente «hacer avanzar hacia» o «llevar contra», en este contexto militar la idea es ofensiva. «Atacó» comunica con claridad natural la acción.
- source_word: ἐτροποῦτο
  english_pob_choice: was turned back
  chosen_spanish: fue rechazado
  alternatives_spanish:
  - fue hecho retroceder
  - fue puesto en fuga
  - volvió atrás
  lexicon: LSJ
  rationale: La voz indica que la ofensiva fue revertida. «Fue rechazado» mantiene el sentido de repulsa o retroceso sin exagerar hasta una derrota total.
- source_word: προσενέκρουσεν
  english_pob_choice: was repulsed
  chosen_spanish: fue repelido
  alternatives_spanish:
  - chocó con resistencia
  - fue contenido
  - fue rechazado
  lexicon: LSJ
  rationale: El verbo expresa topar con un obstáculo o recibir un golpe de oposición; en secuencia militar, «fue repelido» es fiel y natural. Se mantiene la distinción respecto de ἐτροποῦτο, aun cuando ambos verbos se solapan en español.
- source_word: ἡλαττονοῦτο
  english_pob_choice: was weakened
  chosen_spanish: fue debilitado
  alternatives_spanish:
  - fue disminuido
  - se redujo
  - fue mermado
  lexicon: LSJ
  rationale: El verbo indica reducción o pérdida de fuerza. «Fue debilitado» conserva bien la imagen de un avance que termina con menos vigor.
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto con el inglés POB y conserva la secuencia breve y acumulativa del griego. Se toma en cuenta la revisión más reciente que prefirió «was repulsed» para προσενέκρουσεν; por eso se usa «fue repelido» en español, manteniendo además «fue rechazado» para ἐτροποῦτο, como dos matices consecutivos de reversión militar.
  spanish_consistency_notes:
  - Se mantiene el nombre del lugar con transliteración directa del griego, usando «Betzura» como forma principal y dejando la variante semítica en nota.
  - Se conserva el tono militar conciso del original sin expandir la acción más allá de lo que el texto warrants.
  - Se diferencia «fue rechazado» de «fue repelido» para reflejar la serie de verbos griegos, aunque en español los campos semánticos se solapan.
