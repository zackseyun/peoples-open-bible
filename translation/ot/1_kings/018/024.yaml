theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render אֱלֹהֵיכֶם as singular or plural
  chosen_reading: your god
  alternative_readings:
  - your gods
  rationale: Though morphologically plural in form, אֱלֹהִים often functions as a singular for a deity. In this narrative contest the prophets of Baal are being challenged to call on their deity, and the singular framing of the verdict supports singular English.
