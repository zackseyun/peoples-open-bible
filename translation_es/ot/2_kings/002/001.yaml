revisions:
- from: Y sucedió[a] que, cuando Yahvé estaba por hacer subir a Elías al cielo[b] en un torbellino, Elías y Eliseo siguieron su camino desde Gilgal.
  to: Sucedió[a] que, cuando Yahvé estaba por hacer subir a Elías al cielo[b] en un torbellino, Elías y Eliseo fueron desde Gilgal.
  rationale: Se ajusta el arranque narrativo a un español más natural ('Sucedió que') y se corrige la cláusula final para no añadir el matiz interpretativo de 'siguieron su camino'. 'Fueron desde Gilgal' preserva mejor el movimiento básico del hebreo. Se mantienen 'Yahvé', 'torbellino' y la nota sobre 'los cielos', en plena conformidad con las decisiones léxicas y teológicas auditadas.
