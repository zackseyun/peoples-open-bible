translation:
  language: es
  text: Y tomaron a Absalón y lo arrojaron en el gran foso en el bosque, y levantaron sobre él un montón[a] de piedras muy grande. Y todo Israel huyó, cada hombre a su tienda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un túmulo de piedras».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «cada hombre a su tienda», un modismo para dispersarse a la propia vivienda; es decir, «cada uno a su casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se llevaron
  - apresaron
  lexicon: HALOT
  rationale: לקח en esta secuencia narrativa expresa simplemente tomar/recoger. «Tomaron» conserva el valor directo sin añadir una violencia no explícita en el verbo mismo.
- source_word: וַיַּשְׁלִיכוּ אֹתוֹ
  english_pob_choice: threw him
  chosen_spanish: lo echaron
  alternatives_spanish:
  - lo arrojaron
  - lo tiraron
  lexicon: HALOT
  rationale: שלך indica una acción brusca de desecho del cuerpo. «Lo echaron» mantiene la deshonra y es natural en español; «arrojaron» queda como alternativa más enfática.
- source_word: בַיַּעַר
  english_pob_choice: in the forest
  chosen_spanish: en el bosque
  alternatives_spanish:
  - en el monte arbolado
  - en la selva
  lexicon: HALOT
  rationale: El hebreo designa un terreno arbolado. «Bosque» es el equivalente natural y claro en español, sin forzar una precisión botánica ajena al contexto.
- source_word: אֶל הַפַּחַת הַגָּדוֹל
  english_pob_choice: into the great pit
  chosen_spanish: en el gran foso
  alternatives_spanish:
  - en el gran hoyo
  - en la gran zanja
  lexicon: HALOT
  rationale: פחת puede referirse a una depresión o hueco; en este contexto narrativo, «foso» comunica mejor una cavidad grande y abierta. La preposición española «en» refleja el resultado locativo del lanzamiento, sin perder el movimiento de la escena.
- source_word: וַיַּצִּבוּ עָלָיו
  english_pob_choice: they set up over him
  chosen_spanish: levantaron sobre él
  alternatives_spanish:
  - pusieron sobre él
  - alzaron sobre él
  lexicon: HALOT
  rationale: El verbo apunta a establecer/colocar algo encima del cuerpo. «Levantaron sobre él» conserva la acción de erigir un montón sobre el cadáver y se ajusta bien al español narrativo.
- source_word: גַּל אֲבָנִים
  english_pob_choice: a heap of stones
  chosen_spanish: un montón de piedras
  alternatives_spanish:
  - un cúmulo de piedras
  - un túmulo de piedras
  lexicon: HALOT
  rationale: גַּל es un montón o pila, frecuentemente de piedras. «Montón de piedras» es transparente y evita un tecnicismo como «cairn/túmulo» en el texto principal.
- source_word: גָּדוֹל מְאֹד
  english_pob_choice: a very large
  chosen_spanish: muy grande
  alternatives_spanish:
  - grandísimo
  - enorme
  lexicon: HALOT
  rationale: La intensificación con מאד se conserva con «muy grande», que reproduce el énfasis sin exagerar el registro.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: And all Israel
  chosen_spanish: Y todo Israel
  alternatives_spanish:
  - Y todos los israelitas
  lexicon: HALOT
  rationale: La forma colectiva del nombre nacional se respeta con «todo Israel», como en el hebreo y en la tradición de traducción directa.
- source_word: נָסוּ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - corrió
  lexicon: HALOT
  rationale: נוס expresa huida. «Huyó» es conciso, formal y fiel al sentido de retirada apresurada.
- source_word: אִישׁ לְאֹהָלוֹ
  english_pob_choice: each man to his tent
  chosen_spanish: cada hombre a su tienda
  alternatives_spanish:
  - cada uno a su tienda
  - cada hombre a su casa
  lexicon: HALOT
  rationale: Se conserva el distributivo masculino singular con «cada hombre», y «tienda» mantiene la imagen literal del hebreo. Aunque el giro es idiomático para volver al propio hogar, la versión principal preserva la textura del original.
theological_decisions:
- issue: Expresión distributiva masculina אִישׁ לְאֹהָלוֹ
  english_pob_reading: each man to his tent
  chosen_spanish_reading: cada hombre a su tienda
  alternative_spanish_readings:
  - cada uno a su tienda
  - cada hombre a su casa
  rationale: Se mantiene la forma masculina singular distributiva porque el hebreo la usa de manera explícita. En español, «cada hombre» conserva esa huella textual sin oscurecer el sentido colectivo de dispersión.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Imagen literal de לְאֹהָלוֹ como fórmula de dispersión
  english_pob_reading: each man to his tent; idiom for dispersing to one's own dwelling
  chosen_spanish_reading: cada hombre a su tienda
  alternative_spanish_readings:
  - cada hombre a su casa
  - cada uno a su hogar
  rationale: El hebreo literalmente dice «a su tienda», y el POB en inglés preserva la imagen con una nota. En español se retiene la metáfora bíblica, dejando la explicación idiomática para la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que prefirió «set up over him» para el verbo de colocar/establecer el montón de piedras. En español se reflejó con «levantaron sobre él», evitando un calco rígido y manteniendo la imagen de erigir el montón sobre el cadáver.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se conserva «Israel» como nombre colectivo, no como plural analítico.
  - «Bosque», «foso» y «tienda» preservan la imaginería narrativa del hebreo sin modernizarla en exceso.
  - La nota b explica el valor idiomático de «cada hombre a su tienda», siguiendo el audit trail inglés.
