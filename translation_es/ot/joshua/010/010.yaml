translation:
  language: es
  text: Yahvé los hizo entrar en confusión delante de Israel[a], y los golpeó con un gran golpe en Gabaón, y los persiguió por el camino de la subida de Bet-horón, y los golpeó hasta Azeca y Makeda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los puso en pánico» / «los sumió en confusión». El verbo hebreo puede expresar confusión, pánico o desorden en batalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהֻמֵּם
  english_pob_choice: threw them into confusion
  chosen_spanish: los llenó de confusión
  alternatives_spanish:
  - los puso en confusión
  - los desbarató
  - los llenó de pánico
  lexicon: HALOT
  rationale: El verbo המם expresa causar pánico, desconcierto o confusión en combate. «Los llenó de confusión» conserva la acción divina y el efecto psicológico sin reducirlo solo al resultado militar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md / transliteración del Tetragrámaton
  rationale: Se mantiene el nombre divino propio como «Yahvé», siguiendo el principio del POB de no sustituirlo por un título. «Yahvé» es la forma estándar en español para la transliteración del nombre revelado.
- source_word: לִפְנֵי יִשְׂרָאֵל
  english_pob_choice: before Israel
  chosen_spanish: delante de Israel
  alternatives_spanish:
  - ante Israel
  - en presencia de Israel
  - frente a Israel
  lexicon: HALOT
  rationale: La expresión hebrea puede ser espacial o idiomática en contexto bélico. «Delante de Israel» preserva la relación de enfrentamiento/supervisión sin añadir explicación interpretativa.
- source_word: וַיַּכֵּם
  english_pob_choice: struck them
  chosen_spanish: los hirió
  alternatives_spanish:
  - los golpeó
  - los derrotó
  - los apaleó
  lexicon: HALOT
  rationale: נכה en contexto de guerra puede significar golpear, herir o derrotar. «Los hirió» mantiene la literalidad verbal y deja el alcance militar que el contexto ya determina.
- source_word: מַכָּה גְדוֹלָה
  english_pob_choice: a great blow
  chosen_spanish: con un gran golpe
  alternatives_spanish:
  - con un gran azote
  - con una gran derrota
  - con un gran estrago
  lexicon: HALOT
  rationale: El sustantivo מַכָּה aquí apunta a un golpe/azote en sentido bélico. «Gran golpe» sigue de cerca la revisión del POB inglés y evita introducir la idea más interpretativa de «matanza».
- source_word: בְּגִבְעוֹן
  english_pob_choice: at Gibeon
  chosen_spanish: en Gabaón
  alternatives_spanish:
  - en Gibeón
  - junto a Gabaón
  lexicon: topónimo bíblico estándar
  rationale: «Gabaón» es la forma castellana tradicional y clara del topónimo. Se usa la preposición locativa natural en español para un lugar de batalla.
- source_word: וַיִּרְדְּפֵם
  english_pob_choice: pursued them
  chosen_spanish: los persiguió
  alternatives_spanish:
  - los acosó
  - los siguió persiguiendo
  lexicon: HALOT
  rationale: רדף es el verbo estándar para perseguir enemigos. «Los persiguió» es preciso, formal y natural en narrativa bíblica.
- source_word: דֶּרֶךְ מַעֲלֵה בֵית חוֹרֹן
  english_pob_choice: by the way of the ascent of Beth-horon
  chosen_spanish: por el camino de la subida de Bet-horón
  alternatives_spanish:
  - por el camino de la cuesta de Bet-horón
  - por la vía de la subida de Bet-horón
  lexicon: HALOT
  rationale: La frase conserva el detalle topográfico con una estructura española natural. «Subida» traduce מַעֲלֵה de manera directa sin oscurecer que se trata de un ascenso geográfico.
- source_word: עַד עֲזֵקָה וְעַד מַקֵּדָה
  english_pob_choice: as far as Azekah and Makkedah
  chosen_spanish: hasta Azeca y Makeda
  alternatives_spanish:
  - hasta Azeca y hasta Makeda
  - así hasta Azeca y Makeda
  lexicon: HALOT
  rationale: «Hasta» expresa el alcance del ataque/perscución. Se conservan ambos lugares como topónimos transliterados en forma castellana usual.
theological_decisions:
- issue: Nombre divino יהוה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El POB inglés opta por preservar el nombre propio del pacto en vez de ocultarlo con un título. En español, «Yahvé» cumple esa misma función de forma reconocible y auditable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de מַכָּה גְדוֹלָה en contexto bélico
  english_pob_reading: a great blow
  chosen_spanish_reading: un gran golpe
  alternative_spanish_readings:
  - una gran derrota
  - una gran matanza
  - un gran estrago
  rationale: La revisión inglesa evitó «slaughter» por añadir fuerza interpretativa no obligada por el hebreo. En español, «gran golpe» mantiene la sobriedad del original y la misma decisión de no intensificar el sentido más allá del texto.
  doctrine_reference: 'DOCTRINE.md: principio de no añadir fuerza interpretativa no exigida por el hebreo'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que sustituyó «great slaughter» por «great blow» para evitar una intensificación no requerida por el hebreo, y que ajustó la segunda ocurrencia de «struck them down» a un verbo más sobrio. La versión española refleja esa misma cautela semántica con «gran golpe» y «los hirió».
  spanish_consistency_notes:
  - Se preserva «Yahvé» para el Tetragrámaton conforme al criterio del proyecto.
  - 'Los topónimos se presentan en formas castellanas usuales: Gabaón, Bet-horón, Azeca, Makeda.'
  - Se mantiene la repetición verbal del hebreo con «los hirió... y los hirió», sin suavizarla en exceso.
  - La nota textual se vincula únicamente al verbo וַיְהֻמֵּם, donde existe una alternativa léxica real en español.
