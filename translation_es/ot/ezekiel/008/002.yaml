translation:
  language: es
  text: 'Entonces miré, y he aquí, una figura con apariencia de fuego: desde lo que parecía ser su cintura y hacia abajo, fuego; y desde su cintura y hacia arriba, como la apariencia de resplandor, como ámbar resplandeciente[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el aspecto de electrum» o «como metal resplandeciente»; el término hebreo es raro y designa una sustancia brillante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  english_pob_choice: Then I looked
  chosen_spanish: Entonces miré
  alternatives_spanish:
  - Y vi
  - Luego miré
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la visión. «Entonces miré» conserva el movimiento narrativo y el acto visual del profeta en un español natural.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: 'y vi:'
  alternatives_spanish:
  - y he aquí
  - y he aquí que
  lexicon: HALOT
  rationale: En español, la función de sorpresa o deíxis de הנה puede quedar bien marcada con la pausa y la introducción enfática tras la coma; aquí se integra de forma fluida en la escena visionaria sin forzar un giro arcaico.
- source_word: דְמוּת
  english_pob_choice: a form
  chosen_spanish: una figura
  alternatives_spanish:
  - una forma
  - una semejanza
  lexicon: HALOT
  rationale: El término apunta a algo visto por semejanza, no a una identificación simple. «Figura» comunica esa apariencia sin resolverla demasiado ni sonar mecánico.
- source_word: כְּמַרְאֵה אֵשׁ
  english_pob_choice: with the appearance of fire
  chosen_spanish: con apariencia de fuego
  alternatives_spanish:
  - como la apariencia de fuego
  - con aspecto de fuego
  lexicon: HALOT
  rationale: Mantiene la comparación y evita afirmar que la figura era literalmente fuego. «Apariencia» conserva la cautela del hebreo y del POB inglés.
- source_word: מִמַּרְאֵה מָתְנָיו
  english_pob_choice: from what appeared to be his waist
  chosen_spanish: desde lo que parecía ser su cintura
  alternatives_spanish:
  - desde la apariencia de su cintura
  - desde sus lomos
  lexicon: HALOT
  rationale: La frase hebrea es elíptica y repite el lenguaje de apariencia. «Lo que parecía ser su cintura» refleja esa reserva y usa un término anatómico claro en español contemporáneo.
- source_word: וּלְמַטָּה
  english_pob_choice: and downward
  chosen_spanish: y hacia abajo
  alternatives_spanish:
  - y abajo
  - y para abajo
  lexicon: HALOT
  rationale: Expresa la dirección espacial de modo breve y natural, conservando la simetría con la cláusula paralela.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llamas
  - fuego ardiente
  lexicon: HALOT
  rationale: Traducción directa y sobria del sustantivo, manteniendo la fuerza imagética del hebreo.
- source_word: וּמִמָּתְנָיו וּלְמַעְלָה
  english_pob_choice: and from his waist and upward
  chosen_spanish: y desde su cintura y hacia arriba
  alternatives_spanish:
  - y desde sus lomos hacia arriba
  - y sobre su cintura
  lexicon: HALOT
  rationale: Conserva el paralelismo con la primera mitad del versículo y usa el mismo término anatómico para mantener consistencia.
- source_word: כְּמַרְאֵה זֹהַר
  english_pob_choice: like the appearance of brightness
  chosen_spanish: como la apariencia de brillo
  alternatives_spanish:
  - como la apariencia de resplandor
  - como aspecto de luminosidad
  lexicon: HALOT
  rationale: זֹהַר denota resplandor o brillo. «Brillo» es claro y directo en español, y mantiene la comparación sin exagerar el grado de intensidad.
- source_word: כְּעֵין הַחַשְׁמַלָה
  english_pob_choice: like gleaming amber
  chosen_spanish: como ámbar resplandeciente
  alternatives_spanish:
  - como electrum brillante
  - como metal resplandeciente
  lexicon: HALOT
  rationale: El término raro ḥašmal alude a una sustancia brillante. «Ámbar resplandeciente» sigue la tradición interpretativa adoptada en el POB inglés y comunica bien la luminosidad; las alternativas más técnicas quedan disponibles.
theological_decisions:
- issue: Lenguaje de visión y semejanza
  english_pob_reading: Use repeated 'appearance' language rather than direct ontological identification
  chosen_spanish_reading: Repetir lenguaje de «apariencia» y «parecía ser» en vez de identificar ontológicamente la figura
  alternative_spanish_readings:
  - Describirla como fuego o metal resplandeciente sin marcas de cautela
  - Simplificar a una afirmación directa de lo que era la figura
  rationale: Ezequiel encadena expresiones de semejanza y apariencia; la traducción debe preservar esa cautela. Esto evita convertir una visión en una identificación más fuerte de la que el texto reclama.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con el estado revisado más reciente: no se requieren cambios frente al audit trail inglés; la solución mantiene la misma cautela visionaria y la misma decisión léxica para el término raro de la última cláusula.'
  spanish_consistency_notes:
  - Se mantiene «cintura» en ambas apariciones de מָתְנַיִם para consistencia interna.
  - «Apariencia» se repite para reflejar el patrón de comparación del hebreo.
  - La nota sobre חַשְׁמַל conserva la alternativa técnica, como en el POB inglés, para no cerrar indebidamente el sentido lexical.
