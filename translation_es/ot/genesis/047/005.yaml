translation:
  language: es
  text: 'Entonces Faraón dijo a José[a]: «Tu padre y tus hermanos han venido a ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más formal: «Entonces Faraón dijo a José, diciendo: “Tu padre y tus hermanos han venido a ti”».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw-consecutivo avanza la narración; «Entonces» conserva bien esa secuencia con español natural y digno. «Y ... dijo» sería más literal, pero menos fluido aquí.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: El título real se translitera/adapta de forma estable como «Faraón» en español bíblico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del habla; en español, «a José» expresa naturalmente esa relación.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José el hijo de Jacob
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma castellana estándar y reconocible.
- source_word: לֵאמֹר
  english_pob_choice: omitted in English as a speech introducer
  chosen_spanish: omitido como introducción redundante del discurso
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: Como en el POB inglés, לֵאמֹר suele ser una fórmula introductoria redundante tras «dijo». En español también puede omitirse sin pérdida de sentido ni fuerza narrativa.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu padre de parte de ti
  lexicon: HALOT
  rationale: El posesivo de segunda persona se conserva de manera directa y natural.
- source_word: וְאַחֶיךָ
  english_pob_choice: and your brothers
  chosen_spanish: y tus hermanos
  alternatives_spanish:
  - y tus hermanos/familia
  lexicon: HALOT
  rationale: Se mantiene el término masculino específico «hermanos», como en el original y en el POB inglés, sin generalizar a «familia».
- source_word: בָּאוּ
  english_pob_choice: have come
  chosen_spanish: han venido
  alternatives_spanish:
  - vinieron
  - han llegado
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como completa con relevancia actual en el diálogo. «Han venido» conserva bien esa cercanía temporal y la naturalidad del español.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hasta ti
  lexicon: HALOT
  rationale: La dirección hacia José se expresa de forma clara con «a ti»; «hasta ti» añadiría matiz no requerido por el hebreo.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente mantiene sin cambios la solución óptima-equivalente: omitir לֵאמֹר en el texto corriente y conservar el valor secuencial de וַיֹּאמֶר con una transición natural. La presente redacción sigue esa misma línea sin introducir variaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «Faraón» y no «el faraón» como forma estable de nombre/título en continuidad con el uso bíblico en español.
  - Se conserva el paralelismo simple del hebreo sin añadir explicaciones contextuales.
  - La comilla española se usa de modo estándar para el discurso directo, con el marcador de nota anclado en el destinatario de la intervención.
