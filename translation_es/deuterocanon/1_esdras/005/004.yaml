translation:
  language: es
  text: Y estos son los nombres de los hombres que subían según sus casas ancestrales[a], a sus tribus, cada uno para su propia división administrativa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según las casas de sus padres». El griego πατριαί puede referirse a grupos de parentesco trazados por linaje ancestral.'
    reason: lexical_alternative
  - marker: b
    text: La expresión traduce el raro μεριδαρχίαν, que puede referirse a un distrito, una porción territorial o alguna otra división formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Además
  lexicon: LSJ
  rationale: La conjunción simple conserva la continuidad narrativa sin añadir énfasis que el griego no exige.
- source_word: ταῦτα
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - los siguientes
  lexicon: LSJ
  rationale: El demostrativo anticipa la lista de nombres que sigue; «estos» es directo y natural en español.
- source_word: τὰ ὀνόματα
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - la lista de nombres
  lexicon: LSJ
  rationale: La expresión introduce un registro nominal de personas; la traducción literal es clara en español.
- source_word: τῶν ἀνδρῶν
  english_pob_choice: of the men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de los varones
  - de las personas
  lexicon: LSJ
  rationale: ἀνδρῶν señala varones; «hombres» mantiene la referencia masculina y el registro genealógico.
- source_word: τῶν ἀναβαινόντων
  english_pob_choice: who were going up
  chosen_spanish: que subían
  alternatives_spanish:
  - que iban subiendo
  - que ascendían
  lexicon: LSJ
  rationale: En este contexto de retorno y subida a la tierra/ciudad, el participio se expresa naturalmente como acción en curso con «subían».
- source_word: κατὰ πατριὰς αὐτῶν
  english_pob_choice: according to their ancestral houses
  chosen_spanish: según sus casas ancestrales
  alternatives_spanish:
  - conforme a sus casas paternas
  - según sus familias
  lexicon: LSJ
  rationale: πατριά designa un grupo de parentesco o linaje; «casas ancestrales» preserva la estructura genealógica sin caer en un calco demasiado rígido.
- source_word: εἰς τὰς φυλὰς
  english_pob_choice: into the tribes
  chosen_spanish: hacia sus tribus
  alternatives_spanish:
  - entre sus tribus
  - a sus tribus
  lexicon: LSJ
  rationale: El valor direccional de εἰς se mantiene con «hacia»; añadir «sus» refleja el valor distributivo implícito del posesivo en el contexto.
- source_word: ἐπὶ τὴν μεριδαρχίαν αὐτῶν
  english_pob_choice: each to his own administrative division
  chosen_spanish: cada uno para su propia división administrativa
  alternatives_spanish:
  - cada uno para su propio distrito
  - cada uno para su propia asignación territorial
  - cada uno para su propia jurisdicción
  lexicon: LSJ
  rationale: μεριδαρχία es un término raro de organización territorial/administrativa; «división administrativa» comunica el sentido formal sin inventar precisión más allá del dato disponible.
translation_notes:
  revision_awareness: Se siguió de cerca la revisión más reciente del audit trail, que ajustó el orden para alinearlo mejor con el griego y volvió explícita la distribución del posesivo en la frase final. La formulación española conserva ese avance sin forzar un tecnicismo innecesario.
  spanish_consistency_notes:
  - Se mantuvo «Y» al inicio para reflejar la simple conexión narrativa del griego.
  - Se eligió «casas ancestrales» para representar πατριά con un registro claro y bíblicamente inteligible.
  - «División administrativa» preserva la rareza de μεριδαρχία sin sustituirla por terminología eclesiástica o interpretativa.
  - Los marcadores de nota aparecen únicamente donde la frase española admite una alternativa significativa.
