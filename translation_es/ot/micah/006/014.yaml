translation:
  language: es
  text: Comerás[a], pero no quedarás satisfecho, y tu vacío permanecerá dentro de ti; apartarás, pero no salvarás, y lo que salves, yo lo entregaré a la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula hebrea traducida «tu vacío permanecerá dentro de ti» es difícil. También puede entenderse como «tu humillación estará en medio de ti» o «tu hundimiento estará dentro de ti».
    reason: alternative_reading
lexical_decisions:
- source_word: תֹאכַל
  english_pob_choice: you will eat
  chosen_spanish: Tú comerás
  alternatives_spanish:
  - Comerás
  - Tú vas a comer
  lexicon: HALOT
  rationale: El valor verbal es futuro/predictivo en un anuncio de juicio; 'comerás' conserva la simplicidad y el paralelismo del hebreo.
- source_word: תִשְׂבָּע
  english_pob_choice: you will be satisfied
  chosen_spanish: no quedarás satisfecho
  alternatives_spanish:
  - no serás saciado
  - no estarás satisfecho
  lexicon: HALOT
  rationale: '''Quedar satisfecho'' comunica bien la idea de saciedad frustrada en español natural y mantiene el contraste con comer sin llenar.'
- source_word: יֶשְׁחֲךָ
  english_pob_choice: your emptiness will remain within you
  chosen_spanish: tu vacío permanecerá dentro de ti
  alternatives_spanish:
  - tu humillación estará en medio de ti
  - tu hundimiento estará dentro de ti
  - tu vacío estará en tu interior
  lexicon: HALOT
  rationale: La forma hebrea es difícil; siguiendo el criterio del texto inglés de preservar la tensión, 'vacío' mantiene la idea de carencia interna sin resolver la ambigüedad con demasiada especificación.
- source_word: בְּקִרְבֶּךָ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en medio de ti
  - en tu interior
  lexicon: HALOT
  rationale: El contexto es personal e interno, no colectivo; 'dentro de ti' es idiomático en español y preserva la referencia al interior.
- source_word: תַסֵּג
  english_pob_choice: you will remove
  chosen_spanish: quitarás
  alternatives_spanish:
  - retirarás
  - apartarás
  - removerás
  lexicon: HALOT
  rationale: El verbo puede implicar retirar o apartar; 'quitarás' es breve, natural y suficientemente abierto para no fijar indebidamente el objeto o la acción.
- source_word: תַפְלִיט
  english_pob_choice: you will not save
  chosen_spanish: no salvarás
  alternatives_spanish:
  - no librarás
  - no rescatarás
  lexicon: HALOT
  rationale: Se conserva la familia léxica de salvar/deliver con un verbo común y claro en español. Dado el paralelismo, 'no salvarás' corresponde bien al matiz de impedir que algo escape del juicio.
- source_word: תְּפַלֵּט
  english_pob_choice: what you do save
  chosen_spanish: lo que logres salvar
  alternatives_spanish:
  - lo que salves
  - lo que rescates
  lexicon: HALOT
  rationale: La forma repetida del verbo se traduce de manera consistente con 'salvar', y 'logres' ayuda a expresar que se trata de cualquier intento exitoso de preservación.
- source_word: לַחֶרֶב
  english_pob_choice: to the sword
  chosen_spanish: a la espada
  alternatives_spanish:
  - para la espada
  - ante la espada
  lexicon: HALOT
  rationale: La expresión profética idiomática se conserva literalmente; en español, 'a la espada' es natural y mantiene la metonimia de destrucción violenta.
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: yo lo entregaré
  alternatives_spanish:
  - lo daré
  - lo pondré
  lexicon: HALOT
  rationale: '''Entregaré'' expresa con mayor fuerza la acción judicial de poner algo en manos de la espada, manteniendo la agencia divina. El objeto se explicita por el contexto inmediato.'
theological_decisions:
- issue: Interpretación de la cláusula oscura וְיֶשְׁחֲךָ בְּקִרְבֶּךָ
  english_pob_reading: your emptiness will remain within you
  chosen_spanish_reading: tu vacío permanecerá dentro de ti
  alternative_spanish_readings:
  - tu humillación estará en medio de ti
  - tu hundimiento estará dentro de ti
  rationale: Se preserva la dificultad del hebreo sin resolverla dogmáticamente. En el marco de comer sin saciarse, perder lo preservado y terminar bajo la espada, 'vacío' mantiene el sentido de carencia interna y la tensión interpretativa del texto.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se adoptó ''quitarás'' para תַסֵּג y una forma consistente de ''salvar'' para תַפְלִיט / תְּפַלֵּט, evitando una paráfrasis más interpretativa.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal del hebreo con futuros simples en español.
  - Se eligió 'vacío' para conservar la ambigüedad del término oscuro sin introducir un sentido más específico de lo que el contexto exige.
  - '''A la espada'' reproduce la imagen profética convencional sin suavizarla.'
