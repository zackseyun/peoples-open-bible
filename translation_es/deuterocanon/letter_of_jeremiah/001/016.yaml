translation:
  language: es
  text: Así son sus dioses[a], puestos en casas. Sus ojos están llenos de polvo de los pies de los que entran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ídolos». El griego dice «sus dioses», conservando la forma polémica con que el autor se refiere a las imágenes veneradas por las naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιοῦτοι
  english_pob_choice: Such
  chosen_spanish: Tal
  alternatives_spanish:
  - Así
  - De tal clase
  lexicon: LSJ
  rationale: «Tal» conserva el juicio resumidor e introduce el desprecio retórico sin añadir palabras ajenas al griego.
- source_word: οἱ θεοὶ αὐτῶν
  english_pob_choice: their gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - sus ídolos
  lexicon: LSJ
  rationale: Se mantiene la designación polémica explícita del griego («dioses») en el texto principal; «ídolos» sería una aclaración interpretativa.
- source_word: καθιδρυμένων
  english_pob_choice: set up
  chosen_spanish: puestos
  alternatives_spanish:
  - colocados
  - instalados
  lexicon: LSJ
  rationale: El participio expresa que están colocados/instalados en posición; «puestos» es breve y natural en español, sin sobrecargar con lenguaje cultual.
- source_word: ἐν τοῖς οἴκοις
  english_pob_choice: in houses
  chosen_spanish: en casas
  alternatives_spanish:
  - en las casas
  - en templos
  lexicon: LSJ
  rationale: «Casas» sigue el sentido literal del griego y evita importar un ámbito más específico que el texto no dice.
- source_word: ὀφθαλμοὶ
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - vista
  lexicon: LSJ
  rationale: Se conserva el lenguaje corporal literal, central para la burla de ídolos inertes.
- source_word: πλήρεις εἰσὶν κονιορτοῦ
  english_pob_choice: are full of dust
  chosen_spanish: están llenos de polvo
  alternatives_spanish:
  - están llenos de tierra
  - están cubiertos de polvo
  lexicon: LSJ
  rationale: «Polvo» reproduce el sentido directo de κονιορτός; «están llenos de» mantiene la imagen de acumulación y abandono.
- source_word: ἀπὸ τῶν ποδῶν
  english_pob_choice: from the feet
  chosen_spanish: de los pies
  alternatives_spanish:
  - por los pies
  - procedente de los pies
  lexicon: LSJ
  rationale: «De los pies» expresa bien la procedencia del polvo sin forzar una explicación adicional.
- source_word: τῶν εἰσπορευομένων
  english_pob_choice: those who enter
  chosen_spanish: de los que entran
  alternatives_spanish:
  - de quienes entran
  - de los que van entrando
  lexicon: BDAG
  rationale: La participial sustantivada admite un presente general; «los que entran» es claro y conserva el movimiento continuo.
theological_decisions:
- issue: Referencia de «sus dioses»
  english_pob_reading: Retain 'their gods' as the text's polemical designation for idol images.
  chosen_spanish_reading: Mantener «sus dioses» en el texto principal, con la opción de lectura alternativa en nota si se requiere.
  alternative_spanish_readings:
  - sus ídolos
  rationale: El griego dice explícitamente «sus dioses»; conservarlo mantiene la polémica del autor y no suaviza el choque retórico.
  doctrine_reference: Principio de primacía del texto original; no resolver interpretativamente en el cuerpo principal cuando el original conserva la formulación polémica.
translation_notes:
  revision_awareness: 'El texto sigue la revisión final del audit trail inglés: se omitió una paráfrasis tipo «cuando han sido puestos» y se reflejó directamente el participio con «puestos en casas». No se introdujeron expansiones interpretativas adicionales.'
  spanish_consistency_notes:
  - Se mantiene «dioses» para preservar el choque polémico del griego, evitando sustituirlo por «ídolos» en el texto principal.
  - «Polvo» se usa para κονιορτός por ser el equivalente más directo y transparente.
  - «Casas» reproduce ἐν τοῖς οἴκοις sin elevar el escenario a «templos», que sería una especificación no explícita.
