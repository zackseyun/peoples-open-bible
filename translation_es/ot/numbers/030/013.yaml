    rationale: La nota explica la intensidad de הָפֵר יָפֵר, pero el marcador aparece después de 'realmente' y separado de manera extraña por espacio; debe anclarse naturalmente al segmento verbal intensificado.
  - severity: medium
    issue: Adición de objeto en 'el día que lo oye'
    rationale: El hebreo dice literalmente 'en el día de oír él'; el objeto no está expreso. 'El día en que oye' preserva mejor la formulación legal sin añadir referente.
  - severity: medium
    issue: '''Sobre su alma'' es demasiado literal y poco idiomático'
    rationale: Aunque נֶפֶשׁ puede corresponder a 'alma', aquí la fuerza es reflexiva/jurídica ('upon herself'). En español eclesial general, 'sobre su alma' puede sonar antropológicamente cargado y menos claro que 'sobre sí misma'.
  - severity: low
    issue: Construcción poco natural 'sea sus votos'
    rationale: En español suena más idiomático 'ya sean sus votos o ...', manteniendo el valor distributivo de la frase explicativa.
  - severity: low
    issue: Puntuación mejorable alrededor del inciso largo
    rationale: El uso de raya final seguida de punto resulta pesado. Puede mantenerse, pero conviene una puntuación más limpia y natural.
