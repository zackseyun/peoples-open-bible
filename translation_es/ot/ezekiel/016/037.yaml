base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/016/037.yaml
  text: Therefore[a], behold, I am gathering all your lovers with whom you found pleasure, and all whom you loved, along with all whom you hated; and I will gather them against you from every side, and I will uncover your nakedness to them[c][b], and they will see all your nakedness.
  footnotes:
  - marker: a
    text: Or 'in whom you delighted.' The Hebrew verb can denote taking pleasure or delight.
    reason: lexical_alternative
  - marker: b
    text: That is, all categories of her illicit partners and enemies alike are summoned for judgment.
    reason: cultural_note
  - marker: c
    text: '''Uncover your nakedness'' is prophetic shame language for public exposure and humiliation.'
    reason: cultural_note
