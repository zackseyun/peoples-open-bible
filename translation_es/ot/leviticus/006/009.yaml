base_translation:
  language: en
  yaml_path: translation/ot/leviticus/006/009.yaml
  text: What is left of it Aaron and his sons shall eat[a]. It shall be eaten unleavened in a holy place[c][b]; they shall eat it in the court of the tent of meeting.
  footnotes:
  - marker: a
    text: Or 'the remainder' or 'what remains.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in a holy place,' not 'in the holy place'; the next clause specifies that place as the court of the tent of meeting.
    reason: lexical_alternative
  - marker: c
    text: Or 'unleavened cakes.' The Hebrew refers to the offering being eaten in an unleavened form.
    reason: lexical_alternative
