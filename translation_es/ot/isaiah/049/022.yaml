  to: 'Así dice el Señor Yahvé: He aquí, alzaré mi mano a las naciones y levantaré mi estandarte[a] a los pueblos; y traerán a tus hijos en su seno[b], y tus hijas serán llevadas sobre el hombro.'
  rationale: Se corrigió el orden del título divino a 'el Señor Yahvé' para reflejar mejor אֲדֹנָי יְהוִה y sonar más natural en español. Se reubicó la nota [a] al término 'estandarte', que es donde corresponde la alternativa léxica de נֵס. Además, se añadió una nota [b] para 'en su seno' a fin de conservar la justificación léxica documentada para בְּחֹצֶן. El resto del texto se mantiene por ser fiel, claro y de buen registro.
