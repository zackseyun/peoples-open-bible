    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de las notas para que correspondan a las palabras adecuadas del texto fuente y del rastro de auditoría inglés. Se mantiene la mayor parte de la redacción del borrador porque es fiel y legible, pero se ajusta la puntuación de notas y la sintaxis final para que el español suene natural sin perder el valor de los infinitivos hebreos. No hace falta adjudicación adicional.
