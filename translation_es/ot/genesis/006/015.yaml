review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente el sentido básico del hebreo: introducción instructiva, construcción del arca, y las tres dimensiones principales en codos. Sin embargo, la apertura española ''Y así lo harás'' desplaza levemente el sentido de especificación (''Y esto es cómo/de qué manera la harás'') hacia una orden resumida (''así lo harás'') y además usa pronombre masculino/neutro (''lo'') frente al referente femenino explícito del arca. Una formulación más fiel y natural en español puede reflejar mejor la estructura hebrea y la transición a la lista de medidas.'
  spanish_quality_summary: 'El español es claro y legible, con registro bíblico moderno y digno. ''Longitud'', ''anchura'' y ''altura'' funcionan bien. La nota sobre ''codo'' es útil y natural. La mejora principal es estilística y de fidelidad: hacer que la primera cláusula suene menos abreviada y más especificativa, y usar ''la'' para concordar con ''arca''.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Arca' para תֵּבָה y 'codos' para אַמָּה están bien elegidos. No aparecen términos teológicos sensibles del glosario general.
  issues:
  - severity: medium
    issue: La frase inicial 'Y así lo harás' no refleja con suficiente precisión el valor especificativo de וְזֶה אֲשֶׁר תַּעֲשֶׂה אֹתָהּ.
    rationale: El hebreo introduce la manera en que debe hacerse el arca, no solo una orden resumida. 'Y esto es como la harás' o equivalente conserva mejor la estructura demostrativa + relativo + verbo.
  - severity: low
    issue: El pronombre 'lo' en la explicación léxica y en la formulación propuesta no concuerda con 'arca'.
    rationale: 'Aunque el texto principal dice ''del arca'', en español la referencia pronominal natural y más precisa es femenina: ''la harás''.'
  revised_spanish_text: 'Y esto es cómo la harás: la longitud del arca será de trescientos codos[a], su anchura de cincuenta codos y su altura de treinta codos.'
