base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/012/039.yaml
  text: and above the Gate of Ephraim[a], and above the Old Gate, and above the Fish Gate, and the Tower of Hananel, and the Tower of the Hundred, and as far as the Sheep Gate[b]; and they stood at the Gate of the Guard.
