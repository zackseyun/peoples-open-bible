translation:
  language: es
  text: Cuando el faraón se acercó, los hijos de Israel levantaron sus ojos, y he aquí que los egipcios[a] iban marchando detrás de ellos; y tuvieron mucho temor, y los hijos de Israel clamaron a Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Egipto»; el nombre singular representa aquí a la fuerza egipcia que los perseguía.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los israelitas», por «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְרִיב
  english_pob_choice: drew near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: HALOT
  rationale: El hebreo en este contexto expresa la aproximación de Faraón; en español, «se acercó» comunica con naturalidad esa tensión narrativa sin añadir una idea causal que el verbo no exige.
- source_word: וַיִּשְׂאוּ ... אֶת עֵינֵיהֶם
  english_pob_choice: lifted up their eyes
  chosen_spanish: levantaron sus ojos
  alternatives_spanish:
  - alzaron sus ojos
  - miraron hacia arriba
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo de mirar alzando la vista. «Levantaron sus ojos» mantiene la textura fuente y sigue siendo comprensible en español bíblico moderno.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y entonces
  - y mira
  lexicon: HALOT
  rationale: La partícula marca percepción súbita e impacto discursivo. «He aquí» conserva ese efecto con un registro digno y reconocible en español bíblico.
- source_word: מִצְרַיִם
  english_pob_choice: the Egyptians
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  - la fuerza egipcia
  lexicon: HALOT
  rationale: Aunque la forma hebrea es un nombre singular, el contexto designa al conjunto perseguidor. La opción «Egipto» sigue la lectura auditada del POB inglés; se entiende como designación colectiva de la potencia egipcia, sin perder el vínculo con la forma fuente.
- source_word: נֹסֵעַ אַחֲרֵי/הֶם
  english_pob_choice: were marching after them
  chosen_spanish: iba marchando detrás de ellos
  alternatives_spanish:
  - iba avanzando detrás de ellos
  - los seguía marchando
  lexicon: HALOT
  rationale: נסע aquí describe movimiento de avance en un contexto de persecución. «Iba marchando detrás de ellos» conserva la idea de avance militar sin forzar un término más interpretativo como «perseguir».
- source_word: וַיִּירְאוּ מְאֹד
  english_pob_choice: they were very afraid
  chosen_spanish: tuvieron mucho temor
  alternatives_spanish:
  - temieron mucho
  - estuvieron muy asustados
  lexicon: HALOT
  rationale: El hebreo expresa miedo intenso. «Tuvieron mucho temor» es sobrio y fiel; mantiene el sustantivo «temor» para evitar banalizar la fuerza emocional del texto.
- source_word: וַיִּצְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - clamaron en voz alta
  lexicon: HALOT
  rationale: El verbo denota un clamor urgente, a menudo en angustia. «Clamaron» reproduce ese sentido con registro bíblico natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se usa la forma española establecida por el proyecto, «Yahvé», para el nombre divino en lugar de una sustitución por título. Esto preserva la referencia directa al Tetragrámaton.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva el sintagma masculino y corporativo del hebreo. «Los hijos de Israel» reproduce con precisión la forma fuente y evita neutralizarla.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto pide una transliteración del nombre divino en el texto principal; en español, la forma adoptada es «Yahvé», que preserva el nombre propio de pacto sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lectura colectiva de מִצְרַיִם en contexto militar
  english_pob_reading: the Egyptians were marching after them
  chosen_spanish_reading: Egipto iba marchando detrás de ellos
  alternative_spanish_readings:
  - los egipcios iban marchando detrás de ellos
  - la fuerza egipcia iba marchando detrás de ellos
  rationale: Aunque el inglés POB revisó la frase hacia una referencia colectiva al pueblo/ejército, el hebreo usa la forma singular «Egipto». La traducción española mantiene esa huella formal y deja la lectura colectiva implícita en el contexto, sin negar la fuerza perseguida por la potencia egipcia.
  doctrine_reference: 'DOCTRINE.md: source-anchored lexical fidelity'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión auditada del inglés POB que corrigió «Egypt» a «the Egyptians» por precisión léxica. En español, se optó por una solución que conserva la forma singular del hebreo («Egipto») pero la entiende colectivamente en contexto; por eso la nota[a] explica la equivalencia semántica sin borrar la tensión entre forma fuente y referencia colectiva. También se reflejó la decisión consistente del POB de mantener el nombre divino como transliteración y el sintagma masculino corporativo «los hijos de Israel».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conservó «los hijos de Israel» para בְנֵי יִשְׂרָאֵל, siguiendo la política de precisión de género y forma corporativa.
  - «He aquí» se usó para וְהִנֵּה por su valor de sorpresa narrativa y por ser natural en español bíblico.
  - No se suavizó el miedo intenso de וַיִּירְאוּ מְאֹד; se preservó con «tuvieron mucho temor».
