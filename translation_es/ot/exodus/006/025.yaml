base_translation:
  language: en
  yaml_path: translation/ot/exodus/006/025.yaml
  text: And Eleazar son of Aaron took for himself a wife from the daughters of Putiel[a], and she bore him Phinehas[b]. These are the heads of the fathers’ houses of the Levites by their clans.
  footnotes:
  - marker: a
    text: Or 'one of the daughters of Putiel.' The Hebrew expression may denote marriage into Putiel’s family without specifying which daughter.
    reason: lexical_alternative
  - marker: b
    text: Literally 'heads of fathers' houses,' a kinship term for leading ancestral households within the Levite clans.
    reason: cultural_note
