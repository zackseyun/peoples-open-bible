revisions:
- from: Y aconteció[a], cuando el pueblo partía[b] de sus tiendas para cruzar el Jordán, y los sacerdotes que llevaban el arca[c] del pacto estaban delante del pueblo.
  to: Y aconteció, cuando el pueblo salió de sus tiendas para cruzar el Jordán, y los sacerdotes que llevaban el arca del pacto iban delante[a] del pueblo.
  rationale: Se eliminan las notas no sustentadas por la auditoría inglesa y se reubica la única nota relevante en לִפְנֵי הָעָם. Se mejora la naturalidad de בִּנְסֹעַ con 'salió' y la fluidez narrativa de la cláusula final con 'iban delante del pueblo', manteniendo el sentido espacial del hebreo. Se conserva 'Y aconteció' y 'arca del pacto' como opciones fieles y aceptables en español bíblico.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:55:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: salida del pueblo desde sus tiendas para cruzar el Jordán, y los sacerdotes con el arca delante del pueblo. Sin embargo, hay dos desajustes relevantes con la evidencia y el rastro POB: (1) el español añade tres notas donde el inglés solo conserva una alternativa en ''before the people/ahead of the people'', y además la nota [c] no corresponde a una alternativa real sino a una explicación terminológica; (2) ''del pacto'' es posible, pero ''del pacto'' se aleja de la preferencia teológica/terminológica documentada por el inglés ''of the covenant'' y en español bíblico general suena más fiel ''del pacto'' o ''de la alianza''; aquí conviene mantener ''del pacto'' solo si está sólidamente justificado. Más importante, la nota omitida debería ir en ''delante del pueblo'' y no en ''aconteció'' ni ''partía'' ni ''arca''.'
  spanish_quality_summary: El texto es legible y digno, pero 'cuando el pueblo partía' suena algo menos natural que 'cuando el pueblo salió' o 'se puso en marcha'. 'Y aconteció' es aceptable, aunque algo elevado; no requiere cambio. 'Estaban delante del pueblo' es fiel, pero 'iban delante del pueblo' encaja mejor en contexto narrativo de marcha sin perder el valor espacial. En conjunto, el verso necesita una reparación menor para alinear notas y mejorar fluidez.
  glossary_alignment: Cumple en términos generales con la terminología del proyecto. No hay términos divinos sensibles en este verso. 'Arca' está bien. Para הַבְּרִית, el inglés auditado usa 'covenant'; en español, 'pacto' es aceptable, pero 'alianza' también sería muy natural eclesial. No es un error grave, pero la documentación española no debería presentar una nota espuria sobre 'arca' y sí preservar la alternativa de לִפְנֵי como 'delante/por delante'.
  issues:
  - severity: medium
    issue: Las notas al pie no siguen el rastro auditado ni la disciplina de notas.
    rationale: El inglés solo conserva una nota lexical alternativa en 'before the people' = 'ahead of the people'. El borrador español introduce tres notas nuevas no justificadas y omite la nota donde sí corresponde.
  - severity: medium
    issue: La nota [c] sobre 'arca' no es una alternativa léxica sino una explicación editorial innecesaria.
    rationale: Las instrucciones piden preservar alternativas significativas, no añadir comentarios metatraductológicos salvo necesidad real de aclarar ambigüedad.
  - severity: low
    issue: '''Cuando el pueblo partía'' es comprensible pero menos natural en español narrativo actual.'
    rationale: El infinitivo temporal בִּנְסֹעַ puede expresarse con mejor fluidez como 'cuando el pueblo salió' o 'se puso en marcha' sin perder sentido.
  - severity: low
    issue: La ubicación narrativa de los sacerdotes puede sonar más natural con 'iban delante del pueblo'.
    rationale: El hebreo expresa posición frontal en contexto de movimiento; 'estaban delante' es fiel pero ligeramente estático.
  revised_spanish_text: Y aconteció, cuando el pueblo salió de sus tiendas para cruzar el Jordán, y los sacerdotes que llevaban el arca del pacto iban delante[a] del pueblo.
  revised_footnotes:
  - marker: a
    text: O «por delante del pueblo».
    reason: lexical_alternative
  revision_rationale: Se eliminan las notas no sustentadas por la auditoría inglesa y se reubica la única nota relevante en לִפְנֵי הָעָם. Se mejora la naturalidad de בִּנְסֹעַ con 'salió' y la fluidez narrativa de la cláusula final con 'iban delante del pueblo', manteniendo el sentido espacial del hebreo. Se conserva 'Y aconteció' y 'arca del pacto' como opciones fieles y aceptables en español bíblico.
