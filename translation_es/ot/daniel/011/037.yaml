translation:
  language: es
  text: No tendrá en cuenta[a] a los dioses de sus padres, ni al deseo de las mujeres[b], ni a ningún dios, porque se engrandecerá por encima de todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''el Dios de sus padres''. La forma hebrea es plural (''dioses de''), pero algunos entienden aquí el modismo habitual para el Dios de Israel.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: ''el deseo de las mujeres''. Puede significar ''lo que desean las mujeres'' o ''el que es deseado por las mujeres''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי אֲבֹתָיו
  english_pob_choice: the gods of his fathers
  chosen_spanish: los dioses de sus padres
  alternatives_spanish:
  - el Dios de sus padres
  - los dioses de sus antepasados
  lexicon: HALOT
  rationale: El hebreo presenta una forma plural constructa, por lo que el plural español 'los dioses' refleja de modo más directo la morfología y la lectura principal del POB en inglés. 'Sus padres' conserva el valor literal de אֲבֹתָיו; 'antepasados' sería más interpretativo.
- source_word: לֹא יָבִין
  english_pob_choice: he will show no regard for
  chosen_spanish: no tendrá en cuenta
  alternatives_spanish:
  - no comprenderá
  - no prestará atención a
  - no considerará
  lexicon: HALOT
  rationale: Con עַל, בין puede expresar la idea de prestar atención, considerar o tener en cuenta. 'No tendrá en cuenta' comunica ese valor idiomático en español sin reducirlo a un mero 'no entenderá'.
- source_word: חֶמְדַּת נָשִׁים
  english_pob_choice: the desire of women
  chosen_spanish: el deseo de las mujeres
  alternatives_spanish:
  - lo que desean las mujeres
  - el objeto del deseo de las mujeres
  lexicon: HALOT
  rationale: La frase es ambigua y el POB en inglés conserva esa ambigüedad con una traducción literal. En español, 'el deseo de las mujeres' mantiene la misma apertura semántica sin resolverla prematuramente.
- source_word: כָּל אֱלֹוּהַּ
  english_pob_choice: any god
  chosen_spanish: ningún dios
  alternatives_spanish:
  - cualquier dios
  - todo dios
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'any god', el contexto negativo español se expresa de forma natural con 'ningún dios', que conserva el sentido distributivo y totalizador de כָּל + singular.
- source_word: יִתְגַּדָּל
  english_pob_choice: he will magnify himself above all
  chosen_spanish: se engrandecerá por encima de todo
  alternatives_spanish:
  - se exaltará por encima de todo
  - se hará grande sobre todo
  lexicon: HALOT
  rationale: El hitpael de גדל lleva una idea de autoexaltación. 'Se engrandecerá' preserva la raíz léxica y el matiz reflexivo; 'por encima de todo' traduce עַל כֹּל de manera natural en español.
theological_decisions:
- issue: Ambigüedad de חֶמְדַּת נָשִׁים
  english_pob_reading: Retain the ambiguous phrase 'the desire of women' in the main text.
  chosen_spanish_reading: Mantener 'el deseo de las mujeres' en el texto principal.
  alternative_spanish_readings:
  - '''lo que desean las mujeres'' (deseo general de matrimonio, hijos o relaciones sexuales)'
  - '''el que es deseado por las mujeres'' (posible figura específica)'
  rationale: La frase hebrea es genuinamente ambigua y el POB en inglés preserva esa tensión. La traducción española conserva la ambigüedad sin imponer una interpretación doctrinal o histórica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Número de אֱלֹהֵי אֲבֹתָיו
  english_pob_reading: Translate as plural, 'the gods of his fathers.'
  chosen_spanish_reading: 'Traducir en plural: ''los dioses de sus padres''.'
  alternative_spanish_readings:
  - '''el Dios de sus padres'''
  rationale: La forma hebrea es plural y el contexto inmediato menciona otras deidades; por eso la lectura plural se mantiene también en español. La alternativa singular se registra por su peso tradicional e interpretativo.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión (modelo gpt-5.4): no se registraron cambios aplicados y el estado final fue ''unchanged''.'
  spanish_consistency_notes:
  - Se mantiene 'dioses' en plural para reflejar la morfología hebrea, en línea con el texto fuente y el audit trail inglés.
  - Se evita 'SEÑOR' o 'Cristo' porque no corresponden a este verso según el paquete fuente.
  - La negación se expresa con una estructura natural en español ('no tendrá en cuenta') para preservar el valor idiomático de בין con עַל.
  - '''Ningún dios'' funciona como equivalente distributivo de ''any god'' dentro de la cláusula negativa española.'
