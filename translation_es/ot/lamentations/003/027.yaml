translation:
  language: es
  text: Es bueno para un hombre que lleve el yugo[a][b] en su juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para una persona»; el hebreo usa el singular masculino גֶּבֶר con valor genérico.
    reason: lexical_alternative
  - marker: b
    text: O «lleve la carga»; la imagen es la de asumir y soportar un peso o disciplina.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is good
  chosen_spanish: Es bueno
  alternatives_spanish:
  - Es beneficioso
  - Bueno
  lexicon: HALOT
  rationale: טוֹב abre la cláusula con una evaluación; en español, «Es bueno» expresa de manera natural esa valoración sin añadir contenido ajeno.
- source_word: לַגֶּבֶר
  english_pob_choice: for a man
  chosen_spanish: para un hombre
  alternatives_spanish:
  - para una persona
  - para el hombre
  lexicon: HALOT
  rationale: גֶּבֶר se conserva como «hombre» para reflejar el masculino singular del hebreo y la decisión inglesa de mantener el valor genérico sin neutralizarlo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - cuando
  lexicon: HALOT
  rationale: Aquí כִּי introduce el contenido de lo que es bueno; «que» reproduce mejor en español la subordinación completiva que «porque».
- source_word: יִשָּׂא
  english_pob_choice: he bear
  chosen_spanish: lleve
  alternatives_spanish:
  - porte
  - cargue
  - bese
  lexicon: HALOT
  rationale: נשא con עֹל admite la imagen de cargar o soportar; «lleve» funciona bien en español con «yugo» y mantiene la idea de asumirlo y soportarlo.
- source_word: עֹל
  english_pob_choice: the yoke
  chosen_spanish: el yugo
  alternatives_spanish:
  - la carga
  - el peso
  lexicon: HALOT
  rationale: עֹל es literalmente «yugo» y conviene conservar la imagen metafórica de disciplina o carga impuesta, como en el texto inglés auditado.
- source_word: בִּנְעוּרָיו
  english_pob_choice: in his youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - cuando es joven
  - en sus años jóvenes
  lexicon: HALOT
  rationale: La expresión hebrea señala la etapa de la juventud; «en su juventud» es idiomático, claro y fiel al valor temporal del sintagma.
theological_decisions:
- issue: Referencia masculina genérica
  english_pob_reading: for a man ... in his youth
  chosen_spanish_reading: para un hombre ... en su juventud
  alternative_spanish_readings:
  - para una persona ... en su juventud
  rationale: Se mantiene el masculino singular como forma representativa del hebreo גֶּבֶר y de la decisión inglesa de no neutralizar el término sin una razón textual fuerte.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se detectan revisiones aplicadas ni cambios pendientes; la formulación española sigue de cerca el cierre evaluativo del hebreo y preserva las dos ambigüedades documentadas: el masculino genérico y la metáfora del yugo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; en este versículo no interviene.
  - Se mantiene «hombre» como equivalente de גֶּבֶר por fidelidad al género gramatical y al audit trail inglés.
  - «Yugo» se conserva como imagen literal-metafórica y no se sustituye por «carga» en el texto principal.
  - 'La sintaxis española coloca naturalmente el complemento temporal al final: «en su juventud».'
