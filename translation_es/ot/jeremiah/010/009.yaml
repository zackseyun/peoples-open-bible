translation:
  language: es
  text: Plata martillada se trae de Tarsis, y oro de Ufaz[a], obra de artífice y de manos de orfebre. Azul y púrpura son su vestidura; todos ellos son obra de hombres expertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo ‘Ufaz’; algunos lo entienden como una variante de ‘Ofir’.
    reason: alternative_reading
lexical_decisions:
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata metálica
  - plata para revestimiento
  lexicon: HALOT
  rationale: El sustantivo denota el metal plata, no dinero. En este contexto describe material usado en la fabricación de ídolos, por lo que 'plata' comunica con naturalidad el valor material.
- source_word: מְרֻקָּע
  english_pob_choice: beaten
  chosen_spanish: martillada
  alternatives_spanish:
  - golpeada
  - aplanada
  lexicon: HALOT
  rationale: El participio pasivo de רקע alude a metal trabajado por golpes hasta quedar en láminas delgadas. 'Martillada' conserva la imagen de metalurgia y suena natural en español.
- source_word: מִתַּרְשִׁישׁ
  english_pob_choice: from Tarshish
  chosen_spanish: de Tarsis
  alternatives_spanish:
  - desde Tarsis
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera de manera tradicional como 'Tarsis' en español, manteniendo la referencia geográfica del hebreo.
- source_word: יוּבָא
  english_pob_choice: is brought
  chosen_spanish: se trae
  alternatives_spanish:
  - es traída
  - se importa
  lexicon: HALOT
  rationale: La forma hofal expresa pasividad/casualidad de traer. 'Se trae' suena natural en español y conserva el sentido de abastecimiento sin añadir demasiado comercio implícito.
- source_word: וְזָהָב מֵאוּפָז
  english_pob_choice: and gold from Uphaz
  chosen_spanish: y oro de Ufaz
  alternatives_spanish:
  - y oro de Uphaz
  - y oro de Ofir
  lexicon: HALOT
  rationale: El texto consonántico apoya 'Ufaz'. Se conserva como nombre propio, aunque la nota textual reconoce la alternativa tradicional que lo identifica con Ofir.
- source_word: מַעֲשֵׂה חָרָשׁ
  english_pob_choice: the work of a craftsman
  chosen_spanish: obra de artífice
  alternatives_spanish:
  - obra de artesano
  - trabajo de artífice
  lexicon: HALOT
  rationale: מַעֲשֵׂה es 'obra' o 'trabajo manufacturado', y חָרָשׁ señala un trabajador especializado. 'Artífice' conserva el matiz de oficio experto y encaja bien con el paralelismo.
- source_word: וִידֵי צוֹרֵף
  english_pob_choice: and of the hands of a goldsmith
  chosen_spanish: y de manos de orfebre
  alternatives_spanish:
  - y por manos de orfebre
  - y de las manos del orfebre
  lexicon: HALOT
  rationale: El hebreo idiomático enfatiza la manufactura humana. 'Orfebre' es el equivalente natural en español para el trabajo en metales preciosos, especialmente en este contexto de ornamento idolátrico.
- source_word: תְּכֵלֶת וְאַרְגָּמָן
  english_pob_choice: Blue and purple
  chosen_spanish: Azul y púrpura
  alternatives_spanish:
  - Azul violáceo y púrpura
  - Azul y rojo púrpura
  lexicon: HALOT
  rationale: Son colores/telas teñidas de lujo. 'Azul y púrpura' es la forma más clara y estándar en español, sin perder el valor de prestigio textil.
- source_word: לְבוּשָׁם
  english_pob_choice: are their clothing
  chosen_spanish: son su vestidura
  alternatives_spanish:
  - son su ropa
  - constituyen su vestidura
  lexicon: HALOT
  rationale: La forma con sufijo plural funciona colectivamente. En español, el singular colectivo 'su vestidura' resulta más fluido y solemne que una pluralización literal.
- source_word: מַעֲשֵׂה חֲכָמִים כֻּלָּם
  english_pob_choice: all of them are the work of skilled men
  chosen_spanish: todos ellos son obra de hábiles hombres
  alternatives_spanish:
  - todos ellos son obra de hombres expertos
  - todos ellos son obra de artesanos hábiles
  lexicon: HALOT
  rationale: חֲכָמִים aquí describe pericia artesanal, no sabiduría filosófica. 'Hábiles hombres' mantiene el plural masculino del hebreo y la fuerza de oficio experto.
theological_decisions:
- issue: Terminología para el material y la fabricación idolátrica
  english_pob_reading: The verse emphasizes precious materials and skilled human manufacture.
  chosen_spanish_reading: El versículo subraya materiales preciosos y manufactura humana experta.
  alternative_spanish_readings:
  - El versículo destaca materias preciosas y trabajo humano habilidoso.
  - El versículo resalta la fabricación artesanal de objetos valiosos.
  rationale: 'La forma española debe preservar la ironía del contexto: algo aparentemente valioso y elaborado, pero hecho por manos humanas. No se espiritualiza ni se suaviza la crítica implícita del pasaje.'
  doctrine_reference: Jeremías 10:9 en su contexto de crítica a los ídolos; cf. Jeremías 10:3-5, 8-10.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y el audit trail inglés: conserva Tarsis/Ufaz como nombres propios, mantiene la secuencia de materiales y oficios, y refleja la preferencia inglesa por un léxico de manufactura precisa (‘beaten’, ‘craftsman’, ‘goldsmith’, ‘skilled men’) sin introducir una paráfrasis interpretativa nueva.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo el color ‘púrpura’ en sentido textil/lujoso, no como referencia a una tonalidad moderna estricta.
  - ‘Orfebre’ y ‘artífice’ preservan el campo semántico artesanal sin neutralizar la imagen de trabajo especializado.
  - La nota de Ufaz conserva la tensión textual documentada entre Ufaz y la lectura tradicional relacionada con Ofir.
