    rationale: El inglés ofrece una alternativa real («Artisans») y aclara la posibilidad más específica de «smiths». En español, la nota actual dice «O “el Valle de los Artesanos”», que repite prácticamente el texto principal y no añade la alternativa relevante.
  - severity: low
