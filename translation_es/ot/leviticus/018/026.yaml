  glossary_alignment: No hay conflicto con los términos troncales del proyecto. La cuestión principal es mantener una distinción consistente entre «estatutos» para חֻקִּים y «juicios»/«ordenanzas judiciales» para מִשְׁפָּטִים. También conviene conservar la alternativa explicativa para גֵּר en nota, como hace el POB inglés.
