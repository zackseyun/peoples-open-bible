translation:
  language: es
  text: y no conocieron sus justos decretos, ni anduvieron por los caminos de los mandamientos de Dios, ni pisaron las sendas de la disciplina[a] en su rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción» para παιδεία, destacando la enseñanza formativa más que la corrección sola.
    reason: lexical_alternative
  - marker: b
    text: O «en su justicia» para «en su rectitud».
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιώματα
  english_pob_choice: righteous decrees
  chosen_spanish: justos decretos
  alternatives_spanish:
  - estatutos justos
  - decretos de justicia
  - ordenanzas justas
  lexicon: LSJ
  rationale: δικαιώματα puede referirse a decretos u ordenanzas; en español, «decretos» conserva el valor normativo y «justos» reproduce el matiz del stem δικαι-. Se evita «estatutos» por sonar más técnico y menos transparente en este contexto sapiencial.
- source_word: ἔγνωσαν
  english_pob_choice: did not know
  chosen_spanish: no conocieron
  alternatives_spanish:
  - no supieron
  - no llegaron a conocer
  lexicon: LSJ
  rationale: El aoristo de γινώσκω se mantiene de forma directa con «conocer», sin intensificarlo a «entender» o «reconocer». La negación en pasado encaja bien con «no conocieron».
- source_word: ἐπορεύθησαν
  english_pob_choice: did ... walk
  chosen_spanish: anduvieron
  alternatives_spanish:
  - caminaron
  - anduvieron por
  - vivieron
  lexicon: LSJ
  rationale: En el idioma bíblico, πορεύομαι con «caminos» expresa conducta; «anduvieron» preserva ese uso idiomático en español y sigue siendo natural.
- source_word: ὁδοῖς ἐντολῶν θεοῦ
  english_pob_choice: the ways of God's commandments
  chosen_spanish: los caminos de los mandamientos de Dios
  alternatives_spanish:
  - los caminos de los mandamientos de Dios
  - las sendas de los mandamientos de Dios
  - los caminos de las órdenes de Dios
  lexicon: LSJ
  rationale: Se mantiene visible la estructura genitiva y el sentido covenantal de ἐντολαί con «mandamientos». «De Dios» corresponde al genitivo θεοῦ sin eufemizar el nombre divino.
- source_word: τρίβους
  english_pob_choice: paths
  chosen_spanish: sendas
  alternatives_spanish:
  - caminos
  - veredas
  - huellas
  lexicon: LSJ
  rationale: τρίβοι son senderos o caminos hollados; «sendas» distingue esta palabra de ὁδοῖς y funciona con buen registro bíblico en español.
- source_word: παιδίας
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - formación
  - educación
  lexicon: LSJ
  rationale: En contexto sapiencial, παιδεία incluye formación correctiva; «disciplina» conserva esa amplitud entre instrucción y corrección sin forzar una sola acepción.
- source_word: ἐν δικαιοσύνῃ αὐτοῦ
  english_pob_choice: in his righteousness
  chosen_spanish: en su justicia
  alternatives_spanish:
  - en su justicia
  - en su rectitud
  - en su justicia/righteousness
  lexicon: LSJ
  rationale: Aquí se opta por «justicia» para preservar la alternativa documentada por el POB inglés y la densidad jurídico-moral del sintagma. En español, «en su justicia» es plenamente idiomático y mantiene abierta la tensión con «rectitud».
- source_word: ἐπέβησαν
  english_pob_choice: did ... step onto
  chosen_spanish: pisaron
  alternatives_spanish:
  - pusieron el pie en
  - se internaron en
  - anduvieron por
  lexicon: LSJ
  rationale: ἐπιβαίνω literalmente es subir o poner el pie sobre; «pisaron» ofrece una imagen concreta y breve, adecuada al paralelismo poético con «sendas».
theological_decisions:
- issue: δικαιοσύνη en el sintagma final
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/righteousness
  rationale: Aunque el POB inglés traduce «righteousness», el término español «justicia» puede reflejar mejor el valor amplio de δικαιοσύνη en un contexto de mandamientos y formación moral. Se conserva la tensión con la opción «rectitud» sin reducir el campo semántico a una noción puramente forense.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — δικαιοσύνη may be rendered righteousness/justice depending on context; preserve covenantal-moral force'
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés están en alto acuerdo y sin revisiones aplicadas; se conserva la estructura paralela del verso y la distinción entre ὁδοῖς y τρίβους. Se sigue la preferencia del proyecto por «Dios» para θεός y se evita una traducción mecánica que borre el matiz de παιδεία y δικαιοσύνη.
  spanish_consistency_notes:
  - Se mantiene el paralelismo triádico con dos verbos de negación y una imagen final de tránsito sobre sendas.
  - Se traduce θεοῦ como «de Dios» sin sustitución litúrgica por «Señor».
  - «Mandamientos» conserva la fuerza normativa de ἐντολαί.
  - «Disciplina» deja abierta la alternativa formativa de παιδεία, según la nota.
  - La elección de «justicia» en el texto principal mantiene la tensión documentada con «rectitud» en la nota.
