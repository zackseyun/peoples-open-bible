translation:
  language: es
  text: Y un área de veinticinco mil de largo y de diez mil de ancho será para los levitas, los ministros de la casa[b], para su posesión, con veinte aposentos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «como su posesión para veinte aposentos». La frase final es sintácticamente difícil en hebreo.'
    reason: alternative_reading
  - marker: b
    text: «La casa» aquí se refiere al templo.
    reason: cultural_note
lexical_decisions:
- source_word: וַ/חֲמִשָּׁה וְ/עֶשְׂרִים אֶלֶף
  english_pob_choice: twenty-five thousand
  chosen_spanish: veinticinco mil
  alternatives_spanish:
  - cinco y veinte mil
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «cinco y veinte mil», pero en español actual la forma natural y equivalente para la magnitud es «veinticinco mil».
- source_word: אֹרֶךְ
  english_pob_choice: long
  chosen_spanish: de largo
  alternatives_spanish:
  - en longitud
  - largo
  lexicon: HALOT
  rationale: El sustantivo expresa la dimensión de extensión; en español, «de largo» es la formulación idiomática más clara al ir con la medida anterior.
- source_word: וַ/עֲשֶׂרֶת אֲלָפִים
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - diez millares
  lexicon: HALOT
  rationale: La cifra se traduce de manera directa y normal en español como «diez mil».
- source_word: רֹחַב
  english_pob_choice: wide
  chosen_spanish: de ancho
  alternatives_spanish:
  - en anchura
  - ancho
  lexicon: HALOT
  rationale: 'Como con אֹרֶךְ, el sustantivo de dimensión se vuelve una expresión natural en español: «de ancho».'
- source_word: יהיה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - habrá de ser
  - estará
  lexicon: HALOT
  rationale: En esta asignación visionaria, el imperfecto tiene valor prescriptivo. «Será» conserva bien ese tono formal en español.
- source_word: לַ/לְוִיִּם
  english_pob_choice: for the Levites
  chosen_spanish: para los levitas
  alternatives_spanish:
  - de los levitas
  - a los levitas
  lexicon: HALOT
  rationale: El preposición marca asignación de la porción territorial; «para los levitas» expresa con naturalidad esa adjudicación.
- source_word: מְשָׁרְתֵי הַ/בַּיִת
  english_pob_choice: the ministers of the house
  chosen_spanish: los ministros de la casa
  alternatives_spanish:
  - los que ministran en la casa
  - los servidores de la casa
  lexicon: HALOT
  rationale: מְשָׁרְתֵי designa a quienes prestan servicio; «ministros» mantiene el sentido cultual sin imponer un cargo eclesiástico posterior. «La casa» se conserva literalmente como en el hebreo.
- source_word: הַ/בַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se mantiene la imagen literal del hebreo. En Ezequiel, «la casa» remite al templo; por eso no se reemplaza en el texto principal.
- source_word: לָ/הֶם לַ/אֲחֻזָּה
  english_pob_choice: for their possession
  chosen_spanish: para su posesión
  alternatives_spanish:
  - como posesión para ellos
  - como propiedad de ellos
  lexicon: HALOT
  rationale: אֲחֻזָּה expresa una tenencia o heredad. «Para su posesión» es breve, fiel y natural en español.
- source_word: עֶשְׂרִים לְשָׁכֹת
  english_pob_choice: with twenty chambers
  chosen_spanish: con veinte cámaras
  alternatives_spanish:
  - con veinte habitaciones
  - con veinte aposentos
  lexicon: HALOT
  rationale: לְשָׁכֹת se refiere a cámaras o cuartos del complejo del templo. «Cámaras» conserva el término técnico y su registro bíblico en español.
theological_decisions:
- issue: Sentido de "la casa" en contexto templario
  english_pob_reading: The house here refers to the temple.
  chosen_spanish_reading: «La casa» se mantiene en el texto principal como designación literal del templo.
  alternative_spanish_readings:
  - el templo
  - la Casa
  rationale: Ezequiel usa con frecuencia «la casa» para el templo. Mantener la literalidad preserva el enlace intertextual y evita una glosa interpretativa dentro del versículo.
  doctrine_reference: Uso cultual/templario del lenguaje del santuario en Ezequiel
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios aplicados y el estado de acuerdo con el texto fuente es alto. La redacción española sigue la solución óptima ya validada en el audit trail inglés, conservando la dificultad sintáctica del final mediante nota.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma predeterminada solo cuando aparezca el nombre divino; en este versículo no aparece.
  - «Levitas» se usa como plural técnico estable.
  - «Casa» se mantiene literal en el cuerpo del texto y se aclara en nota para no perder la referencia al templo.
  - «Cámaras» traduce el término arquitectónico del complejo sacro sin modernizarlo a un registro demasiado doméstico.
