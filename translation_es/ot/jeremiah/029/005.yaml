translation:
  language: es
  text: Construyan casas y habiten en ellas[a]; planten huertos y coman su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vivan en ellas». El verbo hebreo puede denotar residencia estable.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנ֥וּ
  english_pob_choice: Build
  chosen_spanish: Edifiquen
  alternatives_spanish:
  - Construyan
  - Levanten
  lexicon: HALOT
  rationale: El imperativo plural qal de בנה pide una acción directa de construir. «Edifiquen» conserva el valor exhortativo y funciona bien en español bíblico moderno sin sonar arcaico.
- source_word: בָתִּ֖ים
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - viviendas
  lexicon: HALOT
  rationale: בית es literalmente «casa». «Casas» mantiene la concreción del hebreo; «hogares» añadiría una carga afectiva no explícita en el texto.
- source_word: וְשֵׁבוּ
  english_pob_choice: live in them
  chosen_spanish: habiten en ellas
  alternatives_spanish:
  - dwell in them
  - vivan en ellas
  - estén en ellas
  lexicon: HALOT
  rationale: ישב puede significar habitar, residir o permanecer. En contexto con «casas», «habiten en ellas» transmite residencia estable sin reducirse a una mera presencia temporal. Se mantiene la ambigüedad de vida estable frente a un simple «estar».
- source_word: וְנִטְע֣וּ
  english_pob_choice: plant
  chosen_spanish: planten
  alternatives_spanish:
  - siembren
  - establezcan
  lexicon: HALOT
  rationale: נטע es el verbo usual para plantar. «Planten» conserva el sentido agrícola directo y el paralelismo con la frase siguiente.
- source_word: גַנּ֔וֹת
  english_pob_choice: gardens
  chosen_spanish: huertos
  alternatives_spanish:
  - jardines
  - huertas
  lexicon: HALOT
  rationale: Aunque el inglés POB conserva «gardens» por amplitud semántica, en español «huertos» comunica mejor el espacio cultivado con fruto que el contexto exige. «Jardines» puede sonar demasiado ornamental; «huertas» es posible, pero «huertos» es más neutro y natural.
- source_word: וְאִכְל֖וּ
  english_pob_choice: eat
  chosen_spanish: coman
  alternatives_spanish:
  - coman de
  - ingieran
  lexicon: HALOT
  rationale: אכל se traduce con el verbo simple «comer». «Coman» preserva la imperatividad y la naturalidad del mandato.
- source_word: אֶת פִּרְיָן
  english_pob_choice: their fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - el fruto de ellas
  - su producción
  lexicon: HALOT
  rationale: פְּרִי significa fruto/produce; el sufijo femenino plural remite a los huertos. «Su fruto» es natural en español y conserva la referencia posesiva sin forzar una perífrasis.
translation_notes:
  revision_awareness: El texto base en inglés y la revisión más reciente coinciden; no se registran cambios aplicados. El hebreo simple e imperativo se refleja sin ampliar el contenido.
  spanish_consistency_notes:
  - Se usa «Edifiquen» para el imperativo plural, en paralelo con «planten» y «coman».
  - Se eligió «casas» para mantener la imagen concreta del hebreo בית.
  - «Huertos» se preferió por el contexto de fruto, sin convertir el término en una paráfrasis interpretativa.
  - El pronombre posesivo «su» en «su fruto» retiene la referencia anafórica a los huertos, como en el hebreo con sufijo femenino plural.
