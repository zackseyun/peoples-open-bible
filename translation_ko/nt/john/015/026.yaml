theological_decisions:
- issue: παράκλητος를 「보혜사」로 옮김
  chosen_reading: 보혜사
  alternative_readings:
  - 돕는 자
  - 위로자
  - 변호자
  rationale: '한국 교회의 안정된 전통 어휘이며, 요한복음 14-16장의 παράκλητος를 가리키는 신학적 칭호로 굳어져 있다. 요한일서 2:1의 동일 어휘(예수를 가리킴)는 별도로 「대언자」로 구별한다.'
  doctrine_reference: 'DOCTRINE.md: 어휘 일관성'
