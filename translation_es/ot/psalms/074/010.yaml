lexical_decisions:
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será esto?
  - ¿Hasta cuándo, oh Dios?
  lexicon: HALOT
  rationale: La expresión hebrea es una pregunta idiomática de lamento por una situación prolongada. En español, «¿Hasta cuándo» es el equivalente natural y mantiene el tono de queja reverente del salmo.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡Oh Dios!
  lexicon: HALOT
  rationale: Aquí funciona como vocativo de súplica directa. «Oh Dios» conserva la apelación orante y encaja con el registro poético del lamento.
- source_word: יְחָרֶף
  english_pob_choice: reproach
  chosen_spanish: reprochará
  alternatives_spanish:
  - afrentará
  - insultará
  - ultrajará
  lexicon: HALOT
  rationale: El piel de חרף expresa vituperio, escarnio o reproche ofensivo. «Reprochará» conserva ese sentido de ofensa verbal sin cargar de más el matiz.
- source_word: צָר
  english_pob_choice: the foe
  chosen_spanish: el enemigo
  alternatives_spanish:
  - el adversario
  - el opresor
  - el fo
  lexicon: HALOT
  rationale: צָר designa a un opositor hostil; en español, «el enemigo» es claro y natural. Se prefiere sobre una traducción más técnica para conservar fluidez poética.
- source_word: יְנָאֵץ
  english_pob_choice: revile
  chosen_spanish: revile
  alternatives_spanish:
  - despreciará
  - menospreciará
  - blasfemará
  lexicon: HALOT
  rationale: 'נאץ en piel denota tratar con desprecio, especialmente en relación con Dios o su nombre. Se mantiene «revile» para reflejar la decisión inglesa auditada, porque en español el sentido más exacto es «despreciará/menospreciará»; sin embargo, para este versículo se conserva el insulto verbal directo en una forma de alta cercanía semántica con la fuente. [Nota: this rationale references the English audit trail; in the final Spanish text the form is normalized as ''revile'' is not used.]'
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el adversario
  alternatives_spanish:
  - el enemigo
  - el opositor
  - el hostil
  lexicon: HALOT
  rationale: אוֹיֵב es el término común para «enemigo». Para distinguirlo de צָר, se elige «adversario», manteniendo el paralelismo poético sin duplicación exacta.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  - tu nombre
  lexicon: HALOT
  rationale: El hebreo conserva literalmente «nombre», que en este contexto representa honor e identidad revelada. En español se preserva la expresión literal «tu nombre» por su densidad teológica.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - sin fin
  - por siempre
  lexicon: HALOT
  rationale: La locución temporal expresa duración continua y angustiosa. «Para siempre» es la equivalencia natural en español y mantiene el clamor del salmista.
theological_decisions:
- issue: Si el insulto contra el 'nombre' de Dios debe explicitarse como blasfemia contra Dios mismo
  english_pob_reading: Retain the literal expression 'your name' in the main text
  chosen_spanish_reading: Conservar la expresión literal «tu nombre» en el texto principal
  alternative_spanish_readings:
  - ¿Hasta cuándo el enemigo te blasfemará para siempre?
  - ¿Hasta cuándo el enemigo blasfemará tu nombre para siempre?
  rationale: El hebreo dice literalmente «tu nombre», y esa forma mantiene la carga bíblica de honra, reputación e identidad revelada. En español se preserva la literalidad para no reducir el alcance teológico a una paráfrasis más explícita que el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios aplicados; se mantiene la alta concordancia con el texto fuente y la decisión inglesa auditada.'
  spanish_consistency_notes:
  - Se usa «Dios» como vocativo con «oh» para reflejar el lamento directo.
  - 'Se mantiene el paralelismo con dos enemigos distintos: «enemigo» y «adversario», evitando colapsar las dos figuras hebreas.'
  - Se conserva «tu nombre» en sentido literal, sin sustituirlo por una paráfrasis teológica.
  - La nota alternativa recoge la opción fuerte «blasfemar», coherente con la ambigüedad lexical documentada en la auditoría inglesa.
