translation:
  language: es
  text: 'Ahora bien, el hijo de Saúl tenía dos hombres que eran comandantes de bandas de incursión: el nombre de uno era Baaná, y el nombre del segundo era Recab, hijos de Rimón el beerotita, de los hijos de Benjamín; porque Beerot también se consideraba[a] parte de Benjamín.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «era contada como perteneciente a Benjamín».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁנֵי אֲנָשִׁים
  english_pob_choice: two men
  chosen_spanish: dos hombres
  alternatives_spanish:
  - dos personas
  lexicon: HALOT
  rationale: אֲנָשִׁים señala varones concretos; «hombres» es la equivalencia natural y mantiene el rasgo de género y número sin sobreexplicar.
- source_word: שָׂרֵי גְדוּדִים
  english_pob_choice: commanders of raiding bands
  chosen_spanish: comandantes de bandas de incursión
  alternatives_spanish:
  - capitanes de tropas
  - jefes de bandas
  lexicon: HALOT
  rationale: שָׂרֵי expresa jefatura/mandato, y גְדוּדִים apunta a bandas más que a unidades militares formales; «bandas de incursión» conserva el matiz irregular y agresivo del término.
- source_word: בֶן שָׁאוּל
  english_pob_choice: Saul’s son
  chosen_spanish: el hijo de Saúl
  alternatives_spanish:
  - el hijo de Saúl
  lexicon: HALOT
  rationale: Se mantiene el sentido filial del constructo hebreo con una forma natural en español.
- source_word: שֵׁם הָאֶחָד ... וְשֵׁם הַשֵּׁנִי
  english_pob_choice: the name of the one ... and the name of the second
  chosen_spanish: el nombre de uno ... y el nombre del segundo
  alternatives_spanish:
  - uno se llamaba ... y el segundo se llamaba
  - el nombre del primero ... y el nombre del segundo
  lexicon: HALOT
  rationale: Se conserva la fórmula repetitiva del hebreo para no diluir el patrón nominativo, manteniendo claridad en español.
- source_word: בְּנֵי רִמּוֹן
  english_pob_choice: sons of Rimmon
  chosen_spanish: hijos de Rimón
  alternatives_spanish:
  - hijos de Rimón
  lexicon: HALOT
  rationale: La relación filial se traduce literalmente porque forma parte de la identificación genealógica de los personajes.
- source_word: הַ/בְּאֶרֹתִי
  english_pob_choice: the Beerothite
  chosen_spanish: el beerotita
  alternatives_spanish:
  - el de Beerot
  lexicon: HALOT
  rationale: El gentilicio se vierte con el sufijo español habitual para nombres de procedencia; se conserva el topónimo transliterado para auditar el origen.
- source_word: מִ/בְּנֵ֣י בִנְיָמִ֑ן
  english_pob_choice: from the sons of Benjamin
  chosen_spanish: de los hijos de Benjamín
  alternatives_spanish:
  - de los benjaminitas
  - de la tribu de Benjamín
  lexicon: HALOT
  rationale: La forma «hijos de Benjamín» refleja el idiomático hebreo de filiación tribal con fidelidad y sin sustituirlo por una etiqueta más interpretativa.
- source_word: כִּי גַּם
  english_pob_choice: for ... also
  chosen_spanish: porque también
  alternatives_spanish:
  - pues también
  - ya que también
  lexicon: HALOT
  rationale: Introduce correctamente la cláusula explicativa causal con naturalidad en español.
- source_word: בְּאֵרוֹת
  english_pob_choice: Beeroth
  chosen_spanish: Beerot
  alternatives_spanish:
  - Beerot
  lexicon: HALOT
  rationale: Se translitera el nombre de lugar de forma consistente con el resto del verso.
- source_word: תֵּחָשֵׁב
  english_pob_choice: was considered
  chosen_spanish: era considerada
  alternatives_spanish:
  - era contada
  - era reputada
  lexicon: HALOT
  rationale: El nifal de חשׁב expresa ser tenida por/contada como parte de un conjunto; «era considerada» mantiene esa fuerza de reconocimiento social sin forzar una lectura más técnica.
- source_word: עַל בִּנְיָמִן
  english_pob_choice: part of Benjamin
  chosen_spanish: parte de Benjamín
  alternatives_spanish:
  - como perteneciente a Benjamín
  - para Benjamín
  lexicon: HALOT
  rationale: La preposición עַל en este contexto comunica pertenencia o inclusión; «parte de» es una solución idiomática clara en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que añadió «Now» al inicio para reflejar la ו inicial. En español se representó con «Ahora bien» para conservar el valor discursivo de transición sin sobrecargar el ritmo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «Benjamín», «Saúl», «Beerot» y los nombres propios transliterados de manera uniforme.
  - «Bandas de incursión» preserva el matiz militar irregular de גְדוּדִים sin convertirlo en un término militar moderno demasiado técnico.
  - La nota al pie marca la alternativa semántica de תֵּחָשֵׁב sin duplicar la idea en el cuerpo principal.
