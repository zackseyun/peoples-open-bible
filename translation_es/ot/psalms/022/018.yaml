translation:
  language: es
  text: Puedo contar[a] todos mis huesos; ellos miran[b], se me quedan mirando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuento todos mis huesos». El verbo hebreo puede significar «contar» o «relatar», pero aquí «todos mis huesos» favorece la idea de contarlos uno por uno.'
    reason: lexical_alternative
  - marker: b
    text: 'Los dos verbos hebreos de visión van en paralelo para intensificar la escena: «miran, se me quedan mirando» o «miran, ven».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲסַפֵּר
  english_pob_choice: I can count
  chosen_spanish: Puedo contar
  alternatives_spanish:
  - cuento
  - puedo enumerar
  - puedo recitar
  lexicon: HALOT
  rationale: El piʿel de ספר puede significar 'contar' o 'recontar/relatar'. Aquí, con 'todos mis huesos', el sentido natural es que pueden enumerarse uno por uno; en español, 'puedo contar' conserva esa fuerza idiomática con un matiz de capacidad acorde al contexto poético.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  - cada uno de
  lexicon: HALOT
  rationale: Se mantiene la totalidad expresada por el hebreo sin añadir ni atenuar el alcance.
- source_word: עַצְמוֹתַי
  english_pob_choice: my bones
  chosen_spanish: mis huesos
  alternatives_spanish:
  - mis osamentas
  - mis huesos del cuerpo
  lexicon: HALOT
  rationale: La traducción literal es clara y vívida en español, y preserva la imagen corporal de aflicción o desnutrición sin explicarla más de lo que el texto exige.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - éstos
  - esas personas
  lexicon: HALOT
  rationale: El pronombre independiente se conserva como sujeto explícito. 'Ellos' refleja el valor enfático del hebreo y mantiene el contraste con el hablante.
- source_word: יַבִּיטוּ
  english_pob_choice: look
  chosen_spanish: miran
  alternatives_spanish:
  - observan
  - miran atentamente
  - fijan la vista
  lexicon: HALOT
  rationale: El verbo denota mirar con atención; 'miran' es natural en español y deja espacio para que el segundo verbo intensifique la acción.
- source_word: יִרְאוּ
  english_pob_choice: stare
  chosen_spanish: me observan con fijeza
  alternatives_spanish:
  - me contemplan
  - me miran fijamente
  - me ven
  lexicon: HALOT
  rationale: Como segundo verbo de visión, ראה aquí debe sonar más intenso que 'ver'. 'Me observan con fijeza' comunica la insistencia hostil de la pareja verbal sin recurrir a un coloquialismo demasiado fuerte.
- source_word: בִי
  english_pob_choice: at me
  chosen_spanish: me
  alternatives_spanish:
  - contra mí
  - sobre mí
  - a mí
  lexicon: HALOT
  rationale: Con verbos de ver, el español puede expresar el objeto directo de forma más natural con 'me'. El contexto ya comunica la orientación hostil de la mirada; la preposición implícita no requiere forzarse.
theological_decisions:
- issue: Lectura poética sin añadir lenguaje cruciforme
  english_pob_reading: Translate the verse according to its Hebrew poetic sense without importing crucifixion-specific wording into the main text.
  chosen_spanish_reading: Traducir el versículo según su sentido poético hebreo, sin introducir en el texto principal lenguaje específico de la crucifixión.
  alternative_spanish_readings:
  - Una versión más tipológica podría reforzar la resonancia cristológica.
  - Una formulación tradicional podría insinuar más explícitamente la pasión de Cristo.
  rationale: El salmo tiene gran peso cristológico en la tradición, pero esta línea debe reflejar primero la imagen hebrea de sufrimiento corporal visible y de observadores hostiles. La resonancia mesiánica queda para la lectura canónica, no para una ampliación del texto.
  doctrine_reference: Translation philosophy 1 and 3
translation_notes:
  revision_awareness: La última revisión reportó que no se requerían cambios, y la concordancia con el texto fuente fue calificada como alta; por eso se conserva la estructura breve del versículo y solo se ajusta la naturalidad del español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene 'huesos' para preservar la imagen corporal concreta del hebreo.
  - Se conserva el paralelismo verbal con dos expresiones de visión, evitando suavizar la segunda en un simple 'ven'.
  - La puntuación reproduce la cesura poética con punto y coma entre las dos mitades del versículo.
