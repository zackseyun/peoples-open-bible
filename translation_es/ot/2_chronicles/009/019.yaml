translation:
  language: es
  text: Y doce leones estaban colocados allí, sobre los seis peldaños[a], de este lado y de aquel lado. No se había hecho nada semejante para ningún reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «doce leones estaban allí, sobre los seis peldaños, uno a cada lado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁנֵים עָשָׂר
  english_pob_choice: And twelve
  chosen_spanish: Y doce
  alternatives_spanish:
  - Ahora doce
  - Y eran doce
  lexicon: HALOT
  rationale: El hebreo introduce un nuevo rasgo descriptivo con un cardinal; en español, «Y doce» conserva la adición narrativa sin sobrecargar la frase.
- source_word: אֲרָיוֹת
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - leones de piedra
  - figuras de leones
  lexicon: HALOT
  rationale: El sustantivo básico es «leones»; el contexto del trono permite entender que son figuras, pero el texto hebreo no añade ese calificativo, así que no debe explicitarse en el cuerpo.
- source_word: עֹמְדִים
  english_pob_choice: were standing
  chosen_spanish: estaban allí
  alternatives_spanish:
  - estaban de pie
  - estaban parados
  lexicon: HALOT
  rationale: El participio describe una disposición visual. En español, «estaban allí» junto con la localización siguiente preserva el valor descriptivo sin sonar forzado; «estaban de pie» sería más literal, pero menos natural para objetos/figuras.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» mantiene la referencia espacial del escenario ya descrito.
- source_word: עַל שֵׁשׁ הַמַּעֲלוֹת
  english_pob_choice: on the six steps
  chosen_spanish: sobre los seis peldaños
  alternatives_spanish:
  - sobre los seis escalones
  - en los seis peldaños
  lexicon: HALOT
  rationale: מַעֲלוֹת aquí se refiere a escalones de acceso; «peldaños» es un español digno y claro, y conserva la imagen de la estructura del trono.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on this side and on that side
  chosen_spanish: de este lado y de aquel lado
  alternatives_spanish:
  - de un lado y del otro
  - a ambos lados
  lexicon: HALOT
  rationale: La expresión distributiva hebrea marca simetría; «de este lado y de aquel lado» reproduce la duplicación espacial con buena naturalidad en español.
- source_word: לֹא נַעֲשָׂה כֵן
  english_pob_choice: Nothing like it had been made
  chosen_spanish: No se había hecho nada semejante
  alternatives_spanish:
  - No se había hecho cosa igual
  - No se había hecho algo así
  lexicon: HALOT
  rationale: La pasiva hebrea expresa singularidad/comparación. «Nada semejante» conserva la fuerza comparativa sin endurecer el español.
- source_word: לְכָל מַמְלָכָה
  english_pob_choice: for any kingdom
  chosen_spanish: para ningún reino
  alternatives_spanish:
  - en ningún reino
  - para cualquier reino
  lexicon: HALOT
  rationale: La comparación final es universal negativa; «para ningún reino» expresa con precisión que no existía un paralelo comparable en ningún reino.
theological_decisions:
- issue: La frase final expresa exclusividad comparativa sin implicación doctrinal adicional
  english_pob_reading: Nothing like it had been made for any kingdom.
  chosen_spanish_reading: No se había hecho nada semejante para ningún reino.
  alternative_spanish_readings:
  - No se había hecho algo así para ningún reino
  - No se había hecho nada igual en ningún reino
  rationale: No hay aquí un término teológico especializado; la decisión principal es preservar la fuerza de singularidad absoluta del diseño del trono sin añadir énfasis interpretativo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado del WLC y el auditable English POB. No se detectaron revisiones aplicadas en el contexto inglés; la versión española conserva la misma escena, el mismo orden descriptivo y la misma afirmación de exclusividad comparativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca; en este versículo no ocurre.
  - Se usa «leones» sin glosa porque el hebreo no especifica material ni función en el sintagma nominal.
  - «Peldaños» se eligió por naturalidad y fidelidad al valor arquitectónico de מַעֲלוֹת.
  - La nota al pie conserva la alternativa distributiva del inglés, adaptada al español.
  - No se introducen términos litúrgicos ni eclesiásticos ajenos al pasaje.
