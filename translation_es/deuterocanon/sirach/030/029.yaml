translation:
  language: es
  text: Mientras aún vives y hay aliento en ti[a], no te pongas en manos de ninguna carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te pongas en manos de ninguna persona / de ningún ser humano». El griego «carne» aquí probablemente significa la humanidad mortal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἔτι ζῇς
  english_pob_choice: As long as you still live
  chosen_spanish: Mientras aún vives
  alternatives_spanish:
  - Mientras todavía vivas
  - Mientras sigues viviendo
  lexicon: LSJ
  rationale: La expresión es temporal e idiomática. «Mientras aún vives» conserva la idea de duración y el valor enfático de ἔτι («todavía/aún») con español natural y sobrio.
- source_word: πνοὴ ἐν σοί
  english_pob_choice: breath is in you
  chosen_spanish: hay aliento en ti
  alternatives_spanish:
  - el aliento está en ti
  - tienes aliento
  lexicon: LSJ
  rationale: «Aliento» comunica el sentido vital de πνοή sin perder la imagen corporal. «Hay aliento en ti» resulta natural en español y mantiene la cercanía al giro griego.
- source_word: μὴ ἀλλάξῃς σεαυτὸν
  english_pob_choice: do not give yourself over to
  chosen_spanish: no te entregues
  alternatives_spanish:
  - no te cambies
  - no te rindas
  - no te pongas
  lexicon: LSJ
  rationale: Siguiendo la lectura auditada del inglés, el verbo no debe reducirse a «cambiarse» de manera mecánica. «No te entregues» expresa mejor la idea de cederse o ponerse bajo la influencia/poder de otro, manteniendo la advertencia reflexiva.
- source_word: πάσῃ σαρκί
  english_pob_choice: any flesh
  chosen_spanish: a ninguna carne
  alternatives_spanish:
  - a ninguna persona
  - a ningún ser humano
  - a toda carne
  lexicon: LSJ
  rationale: Se conserva «carne» para reflejar el léxico real del griego y la tensión antropológica documentada. En español, la formulación más clara y fiel es «a ninguna carne», aunque la nota aclara que puede significar «a ninguna persona / a ningún ser humano».
theological_decisions:
- issue: Sentido de σάρξ en un contexto sapiencial no paulino
  english_pob_reading: flesh likely means mortal humanity
  chosen_spanish_reading: carne, con sentido de humanidad mortal
  alternative_spanish_readings:
  - persona
  - ser humano
  - mortalidad humana
  rationale: Se mantiene «carne» en el texto principal para no borrar la elección léxica del griego ni la cautela doctrinal del POB. La nota explica que aquí el término apunta probablemente a la humanidad mortal, no a una doctrina técnica de la «naturaleza pecaminosa».
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ'
- issue: Valor de la frase reflexiva μὴ ἀλλάξῃς σεαυτόν
  english_pob_reading: do not give yourself over to
  chosen_spanish_reading: no te entregues
  alternative_spanish_readings:
  - no te cambies
  - no te sometas
  - no te pongas bajo
  rationale: La advertencia apunta a una autoentrega o auto-subordinación indebida. «No te entregues» preserva esa fuerza y evita trivializar el mandato como simple ‘cambio’ de identidad.
  doctrine_reference: 'DOCTRINE.md: Translation method — preserve source force without over-paraphrase'
translation_notes:
  revision_awareness: El pasaje muestra acuerdo general alto con la revisión más reciente y no requiere cambios sustantivos. La presente redacción ajusta el español para que sea publicable y transparente, conservando la tensión léxica de σάρξ y el matiz reflexivo de ἀλλάξῃς sin desviarse del sentido auditado.
  spanish_consistency_notes:
  - Se usó «aliento» para πνοή, en continuidad con el valor vital del término y sin convertirlo en «espíritu», que sería más ambiguo aquí.
  - Se evitó «SEÑOR» o vocabulario no pertinente; el pasaje no contiene el nombre divino.
  - «Carne» se mantuvo por fidelidad léxica, pero la nota aclara la posible equivalencia idiomática con «persona» o «ser humano».
  - La sintaxis española procura ser natural sin perder la estructura temporal-condicional del griego.
