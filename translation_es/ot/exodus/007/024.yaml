translation:
  language: es
  text: Y todos los egipcios cavaron alrededor del Nilo en busca de agua para beber[a], porque no podían beber del agua del Nilo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el río» (ye''or); en Éxodo este término se refiere específicamente al Nilo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְפְּרוּ
  english_pob_choice: dug
  chosen_spanish: cavaron
  alternatives_spanish:
  - excavaron
  - abrieron pozos
  lexicon: HALOT
  rationale: חפר expresa cavar o excavar. En español, «cavaron» comunica la acción de forma natural y directa. «Abrieron pozos» añade un objeto no explícito en el hebreo, y «excavaron» es posible pero más técnico.
- source_word: כָל מִצְרַיִם
  english_pob_choice: all the Egyptians
  chosen_spanish: todos los egipcios
  alternatives_spanish:
  - todo Egipto
  - los egipcios
  lexicon: HALOT
  rationale: La expresión se refiere a la gente de Egipto respondiendo a la plaga. «Todos los egipcios» conserva el sentido colectivo personal del hebreo mejor que «todo Egipto».
- source_word: סְבִיבֹת הַיְאֹר
  english_pob_choice: around the Nile
  chosen_spanish: alrededor del Nilo
  alternatives_spanish:
  - alrededor del río
  - por los alrededores del Nilo
  lexicon: HALOT
  rationale: סביבת indica el área alrededor de algo. Dado que יְאֹר en Éxodo refiere específicamente al Nilo, «Nilo» es la identificación más fiel y clara.
- source_word: הַיְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  lexicon: HALOT
  rationale: En este contexto narrativo, יְאֹר designa el Nilo; usar el nombre propio evita la ambigüedad del genérico «río».
- source_word: מַיִם לִשְׁתּוֹת
  english_pob_choice: for water to drink
  chosen_spanish: para obtener agua para beber
  alternatives_spanish:
  - para beber agua
  - agua para beber
  lexicon: HALOT
  rationale: 'La secuencia hebrea expresa finalidad: cavaron agua con el fin de beber. «Para obtener agua para beber» preserva la finalidad y resulta idiomático en español, sin convertir el hebreo en un sustantivo más interpretativo como «agua potable».'
- source_word: כִּי לֹא יָכְלוּ
  english_pob_choice: because they could not
  chosen_spanish: porque no podían
  alternatives_spanish:
  - pues no podían
  - ya que no podían
  lexicon: HALOT
  rationale: כִּי introduce la razón de la acción. «Porque no podían» es la forma más clara y natural en español contemporáneo.
- source_word: לִשְׁתֹּת מִמֵּימֵי הַיְאֹר
  english_pob_choice: drink from the water of the Nile
  chosen_spanish: beber del agua del Nilo
  alternatives_spanish:
  - beber de las aguas del Nilo
  - beber del río
  lexicon: HALOT
  rationale: 'מִן marca procedencia: no podían beber del agua del Nilo. «Del agua del Nilo» mantiene la relación posesiva y evita una perífrasis demasiado literal.'
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; por eso la redacción española sigue de cerca la estructura y las decisiones léxicas ya justificadas, sin introducir ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene «Nilo» de forma consistente para יְאֹר, siguiendo el valor contextual documentado en el audit trail.
  - Se conserva la finalidad de «agua para beber» mediante una formulación natural en español, sin añadir la noción de «pozos» que no está explícita en el hebreo.
  - «Todos los egipcios» reproduce el sujeto colectivo humano del texto fuente.
  - La nota al pie marca la equivalencia contextual de יְאֹר con el Nilo sin sustituir el término por una glosa dentro del cuerpo principal.
