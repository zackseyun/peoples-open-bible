translation:
  language: es
  text: Tú nos has hecho escoria y desecho en medio de los pueblos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "entre las naciones". También puede traducirse el primer par como "despojo y desecho" o, de forma más tradicional, "escoria y basura"; los dos sustantivos raros juntos expresan desprecio y degradación extremos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְחִי
  english_pob_choice: scum
  chosen_spanish: desecho
  alternatives_spanish:
  - escoria
  - basura
  - desperdicio
  lexicon: HALOT
  rationale: El hebreo nombra algo arrojado o raspado, con fuerte sentido de desprecio. En español, "desecho" comunica bien la idea de algo descartado y degradado sin sonar tan coloquial como "basura". Se evita una palabra demasiado literal que oscurezca el efecto acumulado con el segundo sustantivo.
- source_word: וּמָאוֹס
  english_pob_choice: and refuse
  chosen_spanish: y basura
  alternatives_spanish:
  - y desecho
  - y cosa abominable
  - y rechazado
  lexicon: HALOT
  rationale: El sustantivo refuerza la idea de algo detestado y desechado. "Basura" reproduce de forma breve y vívida la degradación extrema, y en combinación con "desecho" mantiene la fuerza del par hebreo. Otras opciones son posibles, pero menos naturales en español actual.
- source_word: תְּשִׂימֵנוּ
  english_pob_choice: you have made us
  chosen_spanish: nos has hecho
  alternatives_spanish:
  - nos has puesto
  - nos haces
  - nos has puesto como
  lexicon: HALOT
  rationale: Aunque el verbo básico es "poner/colocar", aquí funciona idiomáticamente como "hacer/render" en esta construcción predicativa. "Nos has hecho" preserva el sentido resultativo del perfecto hebreo en español natural.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en medio de la
  lexicon: HALOT
  rationale: '"En medio de" conserva la imagen espacial y social del hebreo mejor que un simple "entre". Es claro, digno y natural en español bíblico contemporáneo.'
- source_word: הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos de la tierra
  lexicon: HALOT
  rationale: '"Pueblos" reproduce el plural hebreo de manera formal y precisa. "Naciones" es una alternativa contextual válida, pero el hebreo aquí permite el matiz de grupos étnicos/políticos más amplio que el de una fórmula fija.'
translation_notes:
  revision_awareness: El hebreo presenta dos sustantivos raros y despectivos; la versión española conserva el paralelismo y la intensidad del desprecio sin suavizarlo. El verbo שׂים se traduce de forma idiomática por "hacer" según el uso predicativo señalado en el audit trail inglés. No se detectaron revisiones textuales relevantes en el expediente proporcionado.
  spanish_consistency_notes:
  - Se mantiene "pueblos" para הָעַמִּים, coherente con el valor plural básico y con el audit trail, dejando "naciones" como nota alternativa.
  - Se evita "SEÑOR" o cualquier sustitución reverencial porque no hay יהוה en el verso.
  - La puntuación sigue el español actual y conserva el cierre enfático del verso con punto final.
