translation:
  text: Jesus said[a], “Blessed is the one who has come to be before he comes to be.
    If you become my disciples and listen to my words, these stones will minister
    to you. For you have five trees in Paradise; they do not move in summer or in
    winter, and their leaves do not fall[d][c][b]. Whoever comes to know them will
    not taste death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Blessed is the one who has come to be before he comes to be’ renders ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥϣⲱⲡⲉ
      ϩⲁⲡϩⲏ ⲉⲣⲉⲙⲡⲁⲧⲉⲛⲧⲟϥϣⲱⲡⲉ, a deliberate paradox based on ϣⲱⲡⲉ ‘to come into being’
      (Crum).
    reason: lexical_alternative
  - marker: b
    text: The manuscript surface across NHAM02.36 lb 20–21 can be read as ‘my words,
      these stones (ⲁⲛⲁϣⲁϫⲉ ⲛⲉⲉⲓⲱⲛⲉ),’ yielding a plural ‘stones.’ Dilley’s normalized
      reading parses it as sg. ‘my word … this stone (ⲡⲁϣⲁϫⲉ … ⲡⲉⲓⲱⲛⲉ).’ This draft
      follows the normalized reading; the plural is a noted alternative.
    reason: textual_variant
  - marker: c
    text: ‘Will not taste death’ preserves the Coptic idiom ϫⲓϯⲡⲉ ⲛⲙⲟⲩ; cf. the idiom
      in Mark 9:1; Matt 16:28.
    reason: cross_reference
  - marker: d
    text: Or 'listen to my word, this stone will minister to you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  lexicon: Crum; Greek loanword usage in Coptic
  rationale: The Greek loanword regularly bears beatitude nuance; “Blessed” preserves
    Thomas’s aphoristic tone.
- source_word: ϣⲱⲡⲉ (ⲁⲛⲧⲟϥ ϣⲱⲡⲉ / ⲙⲡⲁⲧⲉⲛⲧⲟϥ ϣⲱⲡⲉ)
  chosen: come to be / come into being
  alternatives:
  - become
  - be born
  lexicon: Crum; Layton
  rationale: ϣⲱⲡⲉ commonly ‘to become; come into existence.’ The paradox is preserved
    by repeating “come to be,” not smoothing to ‘born.’
- source_word: ϩⲁⲡϩⲏ
  chosen: before
  alternatives:
  - prior to
  lexicon: Crum
  rationale: Temporal preposition; straightforward rendering retains the terse structure.
- source_word: ⲉⲣϣⲁⲛ ⲛⲧⲱⲧⲛ ϣⲱⲡⲉ
  chosen: If you become
  alternatives:
  - When you become
  - Whenever you become
  lexicon: Layton
  rationale: ⲉⲣϣⲁⲛ + sDm=f expresses a future/conditional-temporal protasis; ‘if’
    captures the conditional nuance in context.
- source_word: ⲙⲁⲑⲏⲧⲏⲥ
  chosen: disciples
  alternatives:
  - students
  - learners
  lexicon: Crum; Greek loanword
  rationale: Standard for the Greek loanword; “disciples” fits Thomas’s idiom.
- source_word: ⲥⲱⲧⲙ ⲉ-
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: Crum; Lambdin
  rationale: ⲥⲱⲧⲙ ϩⲙ/ⲉ- often implies attentive hearing; “listen to” keeps the imperative
    nuance without adding ‘obey.’
- source_word: ⲡⲁϣⲁϫⲉ (vs. ms. surface ⲁⲛⲁϣⲁϫⲉ)
  chosen: my word (sg.)
  alternatives:
  - my words (pl.)
  lexicon: Crum; Layton
  rationale: Dilley’s normalized reading has sg. ⲡⲁϣⲁϫⲉ; the phrase-joined line break
    can suggest pl. ⲁⲛⲁϣⲁϫⲉ. Chosen to follow the normalized text; see textual note/footnote.
- source_word: ⲡⲉⲓⲱⲛⲉ (cf. alt. reading ⲛⲉⲉⲓⲱⲛⲉ)
  chosen: this stone (sg.)
  alternatives:
  - these stones (pl.)
  lexicon: Crum
  rationale: Normalized text reads sg.; the ms. sequence across the line break can
    be parsed as plural. We retain the Coptic strangeness with the singular; variant
    noted.
- source_word: ⲛⲁⲣⲇⲓⲁⲕⲟⲛⲉⲓ
  chosen: will minister to
  alternatives:
  - will serve
  lexicon: Crum; Greek loanword
  rationale: Greek diakonein loan; “minister to” preserves the marked register rather
    than the generic ‘serve.’
- source_word: ⲛϯⲟⲩ ⲛϣⲏⲛ
  chosen: five trees
  alternatives: []
  lexicon: Crum
  rationale: Literal rendering; no idiomatic smoothing.
- source_word: ⲕⲓⲙ
  chosen: move
  alternatives:
  - be shaken
  - change
  lexicon: Crum
  rationale: Intransitive ‘move/be stirred’; context of seasons suggests immovability
    rather than ‘change’ (which could imply species).
- source_word: ⲛϣⲱⲙ / ⲛⲡⲣⲱ
  chosen: summer / winter
  alternatives: []
  lexicon: Crum
  rationale: Standard seasonal terms.
- source_word: ϭⲱⲃⲉ
  chosen: leaves
  alternatives:
  - foliage
  lexicon: Crum
  rationale: Common noun for ‘leaf’; simple English keeps the image sharp.
- source_word: ⲥⲟⲟⲩⲛ
  chosen: come to know
  alternatives:
  - recognize
  - understand
  lexicon: Crum
  rationale: Dynamic-inceptive sense (‘come to know’) fits ⲡⲉⲧⲉⲣⲉ- construction.
- source_word: ϫⲓϯⲡⲉ (with ⲛⲙⲟⲩ)
  chosen: taste (death)
  alternatives:
  - experience (death)
  - suffer death
  lexicon: Crum; Lambdin
  rationale: Idiomatic ‘taste death’ is well-attested; preserved rather than paraphrased.
textual_note: 'Dialect: Sahidic with expected Greek loanwords (ⲙⲁⲑⲏⲧⲏⲥ, ⲇⲓⲁⲕⲟⲛⲉⲓ).
  No lacunae are marked by Dilley in this saying. Orthographic/segmentation issues:
  (1) The phrase-joined transcription spans ⲁⲛⲁϣⲁϫⲉ ⲛⲉⲉⲓⲱⲛⲉ across a line break (NHAM02.36
  lb 20–21), which can be read as ‘my words, these stones’; Dilley’s normalized text
  instead reads sg. ⲡⲁϣⲁϫⲉ followed by sg. ⲡⲉⲓⲱⲛⲉ ‘this stone.’ I follow the normalized
  reading but note the plausible plural alternative. (2) The construction ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛϣⲱⲡⲉ
  is a conditional/temporal protasis (‘if/when you become’). (3) ⲟⲩⲛⲧⲁⲛⲧⲱⲧⲛ ⲙⲙⲁⲩ is
  the idiomatic ‘there is for you/you have there,’ common in Sahidic. No POxy Greek
  overlaps are known for Saying 19; thus no Greek cross-witness issues arise here.'
