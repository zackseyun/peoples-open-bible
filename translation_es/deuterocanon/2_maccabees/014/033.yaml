translation:
  language: es
  text: 'Extendiendo su mano derecha hacia el templo, juró esto: «Si no me entregan a Judas como prisionero, convertiré este santuario de Dios en una llanura[a], derribaré el altar y levantaré aquí un templo espléndido a Dionisio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «haré esta morada de Dios un campo abierto / una llanura».
    reason: lexical_alternative
lexical_decisions:
- source_word: προτείνας
  english_pob_choice: Stretching out
  chosen_spanish: Extendiendo
  alternatives_spanish:
  - Tendiendo
  - Alargando
  lexicon: LSJ
  rationale: El participio describe el gesto físico que acompaña el juramento. «Extendiendo» es natural en español y conserva la acción concreta sin añadir matices no presentes.
- source_word: τὴν δεξιὰν
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - la mano derecha de él
  lexicon: LSJ
  rationale: La expresión idiomática en español exige el posesivo «su» y mantiene el gesto de juramento de forma clara y directa.
- source_word: ἐπὶ τὸν νεών
  english_pob_choice: toward the sanctuary
  chosen_spanish: hacia el templo
  alternatives_spanish:
  - contra el templo
  - sobre el templo
  lexicon: LSJ
  rationale: Con un verbo de gesto, ἐπί es direccional. «Hacia el templo» refleja el movimiento sin sugerir agresión física.
- source_word: ὤμοσεν
  english_pob_choice: he swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  lexicon: LSJ
  rationale: «Juró» es la forma natural y concisa en español para el verbo de juramento.
- source_word: δέσμιον
  english_pob_choice: as a prisoner
  chosen_spanish: como prisionero
  alternatives_spanish:
  - cautivo
  - encadenado
  lexicon: LSJ
  rationale: El adjetivo expresa la condición de cautividad; «como prisionero» transmite bien el valor predicativo sin añadir cadenas que el griego no menciona.
- source_word: παραδῶτε
  english_pob_choice: hand ... over
  chosen_spanish: me entregan
  alternatives_spanish:
  - me lo entregan
  - lo entregan
  lexicon: LSJ
  rationale: «Entregar» es el equivalente más natural para παραδίδωμι en un contexto hostil de transferencia de una persona.
- source_word: σηκόν
  english_pob_choice: house
  chosen_spanish: santuario
  alternatives_spanish:
  - casa
  - templo
  lexicon: LSJ
  rationale: Para preservar la distinción que el audit trail hace entre νεών y σηκός, «santuario» funciona bien en español y evita repetir «templo» para dos términos distintos.
- source_word: εἰς πεδίον ποιήσω
  english_pob_choice: I will make ... a plain
  chosen_spanish: convertiré ... en una llanura
  alternatives_spanish:
  - lo volveré un campo
  - lo dejaré como una llanura
  lexicon: LSJ
  rationale: La expresión idiomática apunta a dejar el lugar como terreno abierto. «Convertiré ... en una llanura» conserva la imagen de desmantelamiento sin excesiva paráfrasis.
- source_word: θυσιαστήριον
  english_pob_choice: altar
  chosen_spanish: altar
  lexicon: LSJ
  rationale: «Altar» es el equivalente normal y exacto para θυσιαστήριον.
- source_word: κατασκάψω
  english_pob_choice: tear down
  chosen_spanish: derribaré
  alternatives_spanish:
  - demoleré
  - destruiré
  lexicon: LSJ
  rationale: El verbo expresa derribo o demolición; «derribaré» es fiel y natural en español.
- source_word: ἱερὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - shrine
  lexicon: LSJ
  rationale: Aquí ἱερόν designa un templo pagano para Dionisio; «templo» es el equivalente claro y directo.
- source_word: ἐπιφανές
  english_pob_choice: splendid
  chosen_spanish: espléndido
  alternatives_spanish:
  - magnífico
  - ilustre
  - llamativo
  lexicon: LSJ
  rationale: «Espléndido» reproduce el tono ostentoso y admirativo de la descripción sin sobrecargarla.
- source_word: ἀναστήσω
  english_pob_choice: raise up
  chosen_spanish: levantaré
  alternatives_spanish:
  - erigiré
  - construiré
  lexicon: LSJ
  rationale: «Levantaré» mantiene la imagen de edificación del verbo y es idiomático en español para la construcción de un edificio.
theological_decisions:
- issue: Distinción terminológica entre los espacios sagrados judíos y el templo pagano propuesto
  english_pob_reading: Different Greek terms are distinguished as 'sanctuary' (νεώς), 'house of God' (σηκός), and 'altar' (θυσιαστήριον), while ἱερόν for Dionysus is rendered 'temple.'
  chosen_spanish_reading: Se distinguen «templo» (νεών), «santuario de Dios» (σηκός) y «altar» (θυσιαστήριον), mientras que ἱερὸν para Dionisio se traduce «templo».
  alternative_spanish_readings:
  - Traducir todos los términos con «templo»
  - usar «casa de Dios» para σηκός
  rationale: El griego emplea vocablos cultuales distintos; mantener la distinción en español preserva la retórica del texto y evita aplanar el contraste entre el santuario judío y el templo pagano anunciado.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor de εἰς πεδίον ποιήσω
  english_pob_reading: I will make ... a plain
  chosen_spanish_reading: convertiré ... en una llanura
  alternative_spanish_readings:
  - lo convertiré en campo abierto
  - lo dejaré como una llanura
  rationale: La frase griega es idiomática y describe dejar la estructura como terreno llano. «Convertiré ... en una llanura» es suficientemente literal y claro para el lector español.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'La redacción incorpora la revisión más reciente del POB inglés: se distingue νεών de σηκός, y εἰς πεδίον ποιήσω se refleja como «convertiré ... en una llanura» para acercarse más al valor idiomático literal del griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero aquí no aparece el tetragrámaton; por eso no se usa ninguna forma de sustitución divina.
  - Se emplea «templo» para νεών y ἱερόν, pero se reserva «santuario de Dios» para σηκός siguiendo la distinción del audit trail.
  - «Dionisio» se conserva como forma española habitual del nombre propio mitológico.
  - La cita se abre y cierra con comillas angulares españolas y se conserva el tono solemne del juramento.
