translation:
  language: es
  text: Entonces[a] murió José a la edad de ciento diez años, y lo embalsamaron[b] y lo colocaron en un ataúd[c] en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y murió José a la edad de ciento diez años». La conjunción hebrea inicial también puede traducirse simplemente como «Y»; «Entonces» refleja mejor el flujo conclusivo de la narración.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo momificaron». El verbo hebreo se refiere al embalsamamiento, especialmente en un contexto egipcio.'
    reason: cultural_note
  - marker: c
    text: La palabra hebrea aquí es la misma que en otros lugares se usa para «arca» o «cofre»; en este contexto funerario significa «ataúd».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - muri ó
  lexicon: HALOT
  rationale: El hebreo מות expresa la muerte de manera directa. En español, 'murió' es la equivalencia más natural y fiel, sin eufemismo excesivo, y conserva el tono narrativo sobrio del texto.
- source_word: בֶּן מֵאָה וָעֶשֶׂר שָׁנִים
  english_pob_choice: at the age of a hundred and ten years
  chosen_spanish: de ciento diez años
  alternatives_spanish:
  - a la edad de ciento diez años
  - siendo de ciento diez años
  lexicon: HALOT
  rationale: El hebreo usa el giro literal 'hijo de' para indicar edad. En español, la formulación natural y fiel es 'de ciento diez años'; evita un calco pesado y preserva el dato numérico completo.
- source_word: וַיַּחַנְטוּ
  english_pob_choice: they embalmed
  chosen_spanish: lo embalsamaron
  alternatives_spanish:
  - lo momificaron
  lexicon: HALOT
  rationale: El verbo חנט se refiere al tratamiento funerario de conservación, especialmente en contexto egipcio. 'Embalsamaron' reproduce bien el sentido general del hebreo y es más preciso y estándar que 'momificaron', que enfatiza más el resultado cultural que el verbo mismo.
- source_word: וַיִּישֶׂם
  english_pob_choice: placed
  chosen_spanish: lo colocaron
  alternatives_spanish:
  - lo pusieron
  - lo depositaron
  lexicon: HALOT
  rationale: שׂים es un verbo común de poner/colocar. 'Lo colocaron' mantiene la solemnidad narrativa mejor que 'lo pusieron' y evita una carga interpretativa adicional.
- source_word: בָּאָרוֹן
  english_pob_choice: in a coffin
  chosen_spanish: en un ataúd
  alternatives_spanish:
  - en un cofre
  - en un féretro
  lexicon: HALOT
  rationale: אָרוֹן puede significar arca, cofre o ataúd según el contexto. Aquí el contexto funerario favorece una pieza de sepultura; 'ataúd' es claro para el español contemporáneo y comunica la función funeraria sin introducir un matiz técnico ajeno al texto.
- source_word: בְּמִצְרָיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: Topónimo estándar sin variación necesaria. 'En Egipto' es la forma natural y fiel en español.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior incorporando los tres marcadores de nota directamente en el texto español, exactamente donde corresponden: edad, embalsamamiento y contenedor funerario. Se mantuvo la lectura final y narrativa de apertura con ''Así'' como reflejo del flujo conclusivo del pasaje.'
  spanish_consistency_notes:
  - Se mantuvo el nombre propio 'José' para יוֹסֵף, conforme al uso bíblico español establecido.
  - Se evitó 'SEÑOR' o equivalentes no pertinentes; el versículo no contiene el nombre divino.
  - Se conservó el tono narrativo sobrio y concluyente del final de Génesis.
  - '''Embalsamaron'' se eligió como equivalente español estándar del verbo hebreo en contexto egipcio, sin borrar la posibilidad cultural alternativa de ''momificaron''.'
