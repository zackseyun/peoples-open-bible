translation:
  language: es
  text: 'Entonces el rey de Israel reunió a los profetas, unos cuatrocientos hombres, y les dijo: «¿Debo ir contra Ramot de Galaad para combatir, o debo abstenerme?». Y ellos dijeron: «Sube, y el Señor[a] entregará en la mano del rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «Mi señor entregará en la mano del rey». El hebreo אֲדֹנָי puede leerse en algunos contextos como «mi señor»; aquí, sin embargo, es más probable que funcione como título divino: «el Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - agrupó
  - juntó
  lexicon: HALOT
  rationale: El verbo קבץ expresa la acción de convocar o juntar personas. «Reunió» es natural en español y conserva la idea de convocación sin añadir matices innecesarios.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los hombres proféticos
  lexicon: HALOT
  rationale: La referencia es al grupo de profetas consultados por el rey; la traducción estándar y clara es «los profetas».
- source_word: כְּאַרְבַּע מֵאוֹת אִישׁ
  english_pob_choice: about four hundred men
  chosen_spanish: unos cuatrocientos hombres
  alternatives_spanish:
  - alrededor de cuatrocientos hombres
  - como cuatrocientos hombres
  lexicon: HALOT
  rationale: El prefijo כ marca aproximación. «Unos cuatrocientos hombres» transmite esa indeterminación con naturalidad en español.
- source_word: הַאֵלֵךְ
  english_pob_choice: Should I go
  chosen_spanish: ¿Debo ir?
  alternatives_spanish:
  - ¿He de ir?
  - ¿Voy?
  lexicon: HALOT
  rationale: Es una pregunta deliberativa en primera persona. «¿Debo ir?» preserva la fuerza consultiva sin sonar arcaica.
- source_word: עַל רָמֹת גִּלְעָד לַמִּלְחָמָה
  english_pob_choice: against Ramoth-gilead for battle
  chosen_spanish: contra Ramot de Galaad para la batalla
  alternatives_spanish:
  - a Ramot de Galaad para la guerra
  - contra Ramot de Galaad para combatir
  lexicon: HALOT
  rationale: El hebreo combina la dirección contra el lugar y la finalidad militar. «Contra Ramot de Galaad para la batalla» mantiene ambas ideas en español claro.
- source_word: אִם אֶחְדָּל
  english_pob_choice: or should I refrain
  chosen_spanish: o debo abstenerme
  alternatives_spanish:
  - o debo desistir
  - o debo detenerme
  lexicon: HALOT
  rationale: חדל significa cesar o abstenerse. «Abstenerme» es una equivalencia formal y comprensible en este contexto deliberativo.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  - Marcha
  lexicon: HALOT
  rationale: Se conserva el idiomatismo militar de עלה con un imperativo breve y natural en español.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - mi señor
  - el Dueño
  lexicon: HALOT
  rationale: El texto consonántico permite la lectura tradicional de título divino, aunque no sea el nombre YHWH. En español, «el Señor» mantiene esa lectura sin confundirla con Yahvé; la alternativa «mi señor» queda documentada por la ambigüedad señalada en el audit trail.
- source_word: בְּיַד הַמֶּלֶךְ
  english_pob_choice: into the hand of the king
  chosen_spanish: en mano del rey
  alternatives_spanish:
  - en la mano del rey
  - en poder del rey
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y expresa entrega/poder. «En mano del rey» conserva la imagen bíblica en español sin perder intelligibilidad.
theological_decisions:
- issue: Lectura de אֲדֹנָי en la respuesta profética
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - mi señor
  rationale: 'Sigo la lectura del POB en inglés: el contexto sugiere una afirmación oracular dirigida a la providencia divina, no una referencia al rey como destinatario. Aun así, la forma puede leerse de manera ambigua; por eso se conserva la alternativa en nota.'
  doctrine_reference: 'Contested terms: divine title vs. vocative; preserve genuine ambiguity'
- issue: Uso de «mano» en la fórmula de entrega
  english_pob_reading: into the hand of the king
  chosen_spanish_reading: en mano del rey
  alternative_spanish_readings:
  - en poder del rey
  - en la mano del rey
  rationale: La metáfora hebrea de la ‘mano’ expresa poder o dominio. Mantenerla en español preserva la imagen bíblica y evita suavizarla excesivamente.
  doctrine_reference: Biblical idiom / metaphor preservation
translation_notes:
  revision_awareness: El inglés POB revisó «go to battle against» a «go against ... for battle» para reflejar con mayor precisión el hebreo. En español se siguió esa línea con «contra Ramot de Galaad para la batalla», evitando una paráfrasis más libre. También se respetó la nota de ambigüedad de אֲדֹנָי.
  spanish_consistency_notes:
  - Se usa «Señor» para אֲדֹנָי en la lectura principal, reservando «Yahvé» solo para יהוה.
  - «Ramot de Galaad» sigue la transliteración bíblica estándar en español; no se amplía ni se moderniza el topónimo.
  - Se conserva la metáfora de la ‘mano’ para mantener el idiomatismo semítico del texto.
