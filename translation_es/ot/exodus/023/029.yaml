translation:
  language: es
  text: No los expulsaré de delante de ti en un solo año[a], no sea que la tierra quede desolada y los animales salvajes del campo[b] se multipliquen contra ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en un año».'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «las fieras del campo» o «las bestias del campo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲגָרְשֶׁנּוּ
  english_pob_choice: I will not drive them out
  chosen_spanish: No los expulsaré
  alternatives_spanish:
  - No los sacaré
  - No los echaré
  lexicon: HALOT / BDB
  rationale: גרש expresa la acción de expulsar o echar fuera. «Expulsaré» conserva con claridad la fuerza de desplazamiento forzado y funciona bien en el contexto de conquista. El sufijo singular del hebreo se entiende colectivamente en español con el plural «los», como hizo la revisión inglesa al pasar de singular a plural por contexto.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - de ante ti
  lexicon: HALOT
  rationale: La locución hebrea es espacial y confrontativa. «De delante de ti» preserva el valor idiomático sin sonar forzado en español.
- source_word: בְּשָׁנָה אֶחָת
  english_pob_choice: in one year
  chosen_spanish: en un solo año
  alternatives_spanish:
  - en un año
  - dentro de un solo año
  lexicon: HALOT
  rationale: La frase temporal es directa. «En un solo año» mantiene la idea de un período único y refleja bien el énfasis de singularidad del hebreo y de la nota inglesa.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de modo que no
  lexicon: HALOT
  rationale: פֶּן introduce una advertencia preventiva. «No sea que» comunica ese matiz de temor a un resultado indeseable de forma natural en español.
- source_word: תִּהְיֶה הָאָרֶץ שְׁמָמָה
  english_pob_choice: the land become desolate
  chosen_spanish: la tierra quede desolada
  alternatives_spanish:
  - la tierra se vuelva desolada
  - la tierra quede en desolación
  lexicon: HALOT
  rationale: שְׁמָמָה denota desolación o devastación. «Quede desolada» suena natural en español y conserva el resultado de quedar sin población suficiente.
- source_word: וְרַבָּה
  english_pob_choice: become too numerous
  chosen_spanish: se multipliquen
  alternatives_spanish:
  - aumenten mucho
  - se vuelvan demasiado numerosos
  lexicon: HALOT
  rationale: רבה significa aumentar o hacerse muchos. «Se multipliquen» mantiene el valor de incremento y, en contexto, deja implícito el exceso peligroso que la traducción inglesa explicitó con «too numerous».
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en tu contra
  lexicon: HALOT
  rationale: En contexto hostil, עַל puede traducirse «contra». Esta opción comunica la amenaza de las fieras con naturalidad en español.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field
  chosen_spanish: las fieras del campo
  alternatives_spanish:
  - los animales salvajes del campo
  - las bestias del campo
  lexicon: HALOT
  rationale: La construcción se refiere a animales salvajes terrestres. «Fieras del campo» es una equivalencia bíblica comprensible y digna; conserva el tono de amenaza del hebreo sin caer en un calco pesado.
translation_notes:
  revision_awareness: 'Se siguió el cierre de la revisión inglesa: el objeto se entiende colectivamente, por lo que el español usa plural («los»). Se mantuvo la estructura de advertencia («no sea que») y el paralelismo entre desolación de la tierra y multiplicación de las fieras.'
  spanish_consistency_notes:
  - Se usó «Yahvé» donde corresponda, pero este versículo no contiene el nombre divino explícito.
  - «Expulsaré» conserva el valor de גרש sin introducir lenguaje eclesiástico ajeno.
  - «Fieras del campo» se eligió para mantener el tono bíblico y la amenaza del contexto, evitando una parafrasis demasiado explicativa.
