translation:
  language: es
  text: Entonces Israel partió con todo lo que le pertenecía y llegó a Beerseba[a], y ofreció sacrificios al Dios de su padre Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y todo lo que tenía». La frase hebrea puede referirse ampliamente a todo lo que le pertenecía, incluidos los de su casa, su familia y sus bienes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  english_pob_choice: set out
  chosen_spanish: partió
  alternatives_spanish:
  - se puso en camino
  - salió de viaje
  - se desplazó
  lexicon: HALOT
  rationale: El verbo narrativo indica iniciar la marcha o levantar el campamento. En español, «partió» comunica bien el comienzo del viaje con naturalidad y dignidad, sin perder el matiz de salida.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre que usa el texto hebreo, en lugar de armonizarlo con Jacob. Esto respeta la elección narrativa del original.
- source_word: וְכָל אֲשֶׁר לוֹ
  english_pob_choice: with all that belonged to him
  chosen_spanish: con todo lo que le pertenecía
  alternatives_spanish:
  - con todo lo que tenía
  - con todas sus posesiones
  lexicon: HALOT
  rationale: 'La frase hebrea puede abarcar más que bienes materiales: personas, casa y pertenencias. «Le pertenecía» conserva ese alcance amplio sin reducirlo solo a posesiones.'
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: Con un destino explícito, «llegó» es una forma natural en español y refleja bien la llegada a Beerseba.
- source_word: בְּאֵרָה שָּׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beer-sheba
  lexicon: HALOT
  rationale: Se usa la forma castellana tradicional del topónimo, adecuada para lectura eclesial y reconocible en español.
- source_word: וַיִּזְבַּח זְבָחִים
  english_pob_choice: he offered sacrifices
  chosen_spanish: ofreció sacrificios
  alternatives_spanish:
  - sacrificó sacrificios
  - hizo sacrificios
  lexicon: HALOT
  rationale: La construcción verbo-sustantivo intensifica el acto sacrificial; en español, «ofreció sacrificios» expresa esa idea de modo idiomático y fiel.
- source_word: לֵאלֹהֵי
  english_pob_choice: to the God of
  chosen_spanish: al Dios de
  alternatives_spanish:
  - para el Dios de
  lexicon: HALOT
  rationale: El lamed introduce aquí el destinatario del acto de culto. «Al Dios de» reproduce de forma natural la relación cultual del hebreo.
- source_word: אָבִיו יִצְחָק
  english_pob_choice: his father Isaac
  chosen_spanish: su padre Isaac
  alternatives_spanish:
  - su padre, Isaac
  lexicon: HALOT
  rationale: La cadena constructa identifica a Isaac como el padre de Israel. En español se evita la coma para mantener la fluidez, sin alterar la referencia.
theological_decisions:
- issue: Preservación del designio patrimonial amplio en וְכָל אֲשֶׁר לוֹ
  english_pob_reading: with all that belonged to him
  chosen_spanish_reading: con todo lo que le pertenecía
  alternative_spanish_readings:
  - con todo lo que tenía
  - con todas sus posesiones
  rationale: La frase puede incluir familia, casa y bienes. La opción elegida mantiene esa amplitud sin limitarla a objetos materiales ni convertirla en una paráfrasis más estrecha.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia específica al Dios de Isaac
  english_pob_reading: the God of his father Isaac
  chosen_spanish_reading: el Dios de su padre Isaac
  alternative_spanish_readings:
  - el Dios de los padres de él
  - Dios, el Dios de su padre Isaac
  rationale: El texto hebreo nombra a Isaac específicamente. Se conserva esa precisión, porque apunta a la continuidad del pacto y a la memoria del lugar donde Isaac tuvo relevancia.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético y se verificó la coherencia con el auditable inglés POB. No se detectaron revisiones textuales relevantes en el pasaje; la redacción española mantiene el paralelismo narrativo y la referencia específica a Isaac sin generalizarla.
  spanish_consistency_notes:
  - Se usa «Beerseba» como forma española estable del topónimo.
  - Se mantiene «Dios» en lugar de «SEÑOR» porque el hebreo dice אֱלֹהֵי, no el tetragrámaton.
  - La nota al pie conserva la alternativa lexical documentada en el inglés POB para וְכָל אֲשֶׁר לוֹ.
  - El estilo busca ser neutral y eclesial, sin arcaísmos innecesarios.
