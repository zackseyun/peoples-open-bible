    reason: lexical_alternative
  - marker: b
    text: 'El hebreo de esta expresión es difícil, y este sustantivo raro puede referirse a pensamiento, intención o consideración. También podría traducirse: «Una lámpara es despreciable en la opinión del que está a gusto; está preparada para los pies vacilantes».'
    reason: source_note
  revision_rationale: Se ajusta שַׁאֲנָן a «del que está a gusto» para reflejar mejor la idea de alguien seguro o complaciente, y se cambia «para los pies que resbalan» por «para aquellos cuyos pies resbalan» para conservar la metáfora corporal sin sacrificar naturalidad ni el sentido personal del hebreo según el audit trail inglés. Se mantienen «antorcha» y la nota sobre la dificultad de לְעַשְׁתּוּת.
