translation:
  language: es
  text: Y partieron los hijos de Israel[a] por etapas desde el desierto de Sinaí, y la nube se detuvo en el desierto de Parán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "los israelitas". Hebreo: "los hijos de Israel".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: set out
  chosen_spanish: partieron
  alternatives_spanish:
  - salieron
  - se pusieron en marcha
  lexicon: HALOT
  rationale: נסע en este contexto narrativo describe el acto concreto de levantar campamento y avanzar. En español, 'partieron' comunica bien ese movimiento histórico sin sonar tan coloquial como 'se pusieron en marcha' ni tan genérico como 'salieron'.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos/los descendientes de Israel
  lexicon: HALOT
  rationale: Se conserva la forma transparente del hebreo 'sons of Israel'. 'Hijos de Israel' mantiene la relación familiar del original y la decisión de no neutralizar el término, mientras que 'israelitas' sería más idiomático pero menos formalmente transparente.
- source_word: לְמַסְעֵיהֶם
  english_pob_choice: by stages
  chosen_spanish: por sus etapas
  alternatives_spanish:
  - según sus etapas
  - en sus jornadas
  - por sus marchas
  lexicon: HALOT
  rationale: El sustantivo plural ligado a נסע expresa sucesión de tramos o etapas de viaje. 'Por sus etapas' conserva la idea distributiva de la frase inglesa 'by stages' y evita suavizarla demasiado con un mero 'jornadas'.
- source_word: מִמִּדְבַּר סִינָי
  english_pob_choice: from the wilderness of Sinai
  chosen_spanish: desde el desierto de Sinaí
  alternatives_spanish:
  - desde el desierto del Sinaí
  - desde el yermo de Sinaí
  lexicon: HALOT
  rationale: '''Desierto'' es una opción natural en español para מִדְבָּר, aunque ''desierto'' puede sugerir arena más de lo que el hebreo implica. Se mantiene el nombre propio ''Sinaí'' y la preposición ''desde'' refleja bien el punto de partida.'
- source_word: וַיִּשְׁכֹּן
  english_pob_choice: settled
  chosen_spanish: se asentó
  alternatives_spanish:
  - se detuvo
  - reposó
  - se estableció
  lexicon: HALOT
  rationale: שכן aquí describe el reposo o establecimiento de la nube sobre un lugar. 'Se asentó' conserva la imagen de asentarse/establecerse y suena natural en español bíblico moderno.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de guía
  - la nube divina
  lexicon: HALOT
  rationale: El referente ya está claro en el relato del éxodo y del desierto; por eso basta 'la nube'. Añadir especificación interpretativa iría más allá del hebreo del versículo.
- source_word: בְּמִדְבַּר פָּארָן
  english_pob_choice: in the wilderness of Paran
  chosen_spanish: en el desierto de Parán
  alternatives_spanish:
  - en el desierto de Paran
  - en el yermo de Parán
  lexicon: HALOT
  rationale: Se mantiene la misma elección léxica para מִדְבָּר en ambas ocurrencias del versículo. 'Parán' se translitera conforme al nombre propio, y 'en' reproduce correctamente el locativo hebreo.
theological_decisions:
- issue: Título colectivo בְנֵי יִשְׂרָאֵל y principio de precisión de género
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: 'No hay disputa doctrinal, pero sí una decisión de transparencia: el hebreo usa una expresión masculina familiar concreta. El español conserva esa forma en el texto principal; ''israelitas'' queda como alternativa más idiomática pero menos literal.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Este borrador corrige la validación anterior asegurando que el marcador de nota [a] aparezca en el texto principal exactamente donde corresponde, junto al sustantivo colectivo correspondiente. No se han introducido notas sin anclaje, y el resto de las decisiones se mantiene alineado con el audit trail inglés y el hebreo fuente.
  spanish_consistency_notes:
  - Se mantiene 'desierto' para מִדְבָּר en ambas apariciones para conservar consistencia léxica.
  - Se preserva el nombre propio 'Sinaí' y 'Parán' sin traducción.
  - 'El verbo principal y el verbo de la nube reflejan movimiento físico concreto: ''partieron'' y ''se asentó''.'
  - La nota [a] está anclada explícitamente al grupo nominal 'los hijos de Israel' para evitar desajustes de marcador.
