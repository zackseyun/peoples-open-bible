  text: וַ/יָּ֤שֶׁב עֲלֵי/הֶ֨ם אֶת אוֹנָ֗/ם וּ/בְ/רָעָתָ֥/ם יַצְמִיתֵ֑/ם יַ֝צְמִיתֵ֗/ם יְהוָ֥ה אֱלֹהֵֽי/נוּ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/094/023.yaml
  text: He will bring back on them their iniquity[a], and in their evil he will wipe them out[c][b]; Yahweh our God will wipe them out.
  footnotes:
  - marker: a
    text: Or, 'He has brought back on them their wickedness.' The Hebrew verb can be understood with a past or future-like force in poetic context, and אוֹן may also be rendered 'wickedness' or 'wrongdoing.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and by their evil he will destroy them.' The preposition may suggest association, instrument, or basis.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''YHWH.'' Following the translation''s stated policy, the divine name is rendered ''the LORD.'''
    reason: alternative_reading
