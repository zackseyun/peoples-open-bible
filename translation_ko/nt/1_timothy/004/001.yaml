id: 1TI.4.1
reference: 1 Timothy 4:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τὸ δὲ πνεῦμα ῥητῶς λέγει ὅτι ἐν ὑστέροις καιροῖς ἀποστήσονταί τινες τῆς πίστεως, προσέχοντες πνεύμασι πλάνοις καὶ διδασκαλίαις δαιμονίων
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/001.yaml
  text: Now the Spirit explicitly says that in later times some will depart from the faith[a], paying attention to deceitful spirits and teachings of demons[c][b],
  footnotes:
  - marker: a
    text: Or "deceiving spirits."
    reason: lexical_alternative
  - marker: b
    text: Or "in latter times."
    reason: lexical_alternative
  - marker: c
    text: Or "will fall away from the faith."
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 성령께서 분명히 말씀하시기를, 후일에 어떤 사람들이 미혹하는 영들[a]과 귀신들의 가르침에 마음을 두어 믿음에서 떠나리라[c] 하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「속이는 영들」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「믿음에서 떨어져 나가리라」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_korean: 성령
  alternatives_korean:
  - 그 영
  - 영이
  lexicon: BDAG
  rationale: 본 절에서 「분명히 말씀하시는」 영은 예언적 발화의 주체이며 본문 문맥상 성령을 가리키는 것이 명확하다. 본 번역의 「πνεῦμα 분별」 원칙에 따라 본 절은 「성령」.
- source_word: ῥητῶς
  english_pob_choice: explicitly
  chosen_korean: 분명히
  alternatives_korean:
  - 명백히
  - 명시적으로
  lexicon: BDAG
  rationale: 「분명히」가 자연스럽다.
- source_word: ἐν ὑστέροις καιροῖς
  english_pob_choice: in later times
  chosen_korean: 후일에
  alternatives_korean:
  - 마지막 때에
  - 후기 시대에
  lexicon: BDAG
  rationale: ὕστερος는 「뒤에 오는·후기의」. 「후일에」가 가장 절제된 표현이며, 「말세」로 좁히지 않는다.
- source_word: ἀποστήσονταί τινες τῆς πίστεως
  english_pob_choice: some will depart from the faith
  chosen_korean: 어떤 사람들이 ~ 믿음에서 떠나리라
  alternatives_korean:
  - 어떤 자들이 그 믿음에서 멀어지리라
  lexicon: BDAG
  rationale: ἀφίστημι의 「분리·이탈」을 「떠나리라」로 자연스럽게 옮긴다.
- source_word: πνεύμασι πλάνοις
  english_pob_choice: deceitful spirits
  chosen_korean: 미혹하는 영들
  alternatives_korean:
  - 속이는 영들
  - 거짓된 영들
  lexicon: BDAG
  rationale: πλάνος의 「미혹·속임」을 한국 신학 어휘 「미혹하는」으로 옮긴다.
- source_word: διδασκαλίαις δαιμονίων
  english_pob_choice: teachings of demons
  chosen_korean: 귀신들의 가르침
  alternatives_korean:
  - 악령들의 교훈
  - 마귀들의 가르침
  lexicon: BDAG
  rationale: δαιμόνια는 한국 교회 정립 어휘 「귀신들」.
