translation:
  language: es
  text: Todos estos, los escogidos para porteros en los umbrales, fueron doscientos doce. Fueron inscritos por genealogía en sus aldeas. David y Samuel el vidente los establecieron en su cargo de confianza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «David y Samuel el vidente los establecieron por su fidelidad», o «los establecieron en su fidelidad».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַבְּרוּרִים
  english_pob_choice: who were chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los seleccionados
  - los nombrados
  lexicon: HALOT
  rationale: El participio pasivo comunica selección para una función concreta. "Escogidos" es natural en español bíblico y mantiene la idea de elección sin añadir matices no presentes.
- source_word: לְשֹׁעֲרִים
  english_pob_choice: as gatekeepers
  chosen_spanish: para porteros
  alternatives_spanish:
  - como porteros
  - como guardianes de la puerta
  lexicon: HALOT
  rationale: En este contexto de servicio del templo, "porteros" reproduce la función de guardia de acceso. "Para porteros" refleja bien el valor funcional del לְ.
- source_word: בַּסִּפִּים
  english_pob_choice: at the thresholds
  chosen_spanish: en los umbrales
  alternatives_spanish:
  - en los dinteles
  - en las entradas
  lexicon: HALOT
  rationale: סַף señala el umbral o punto de acceso. "Umbrales" conserva la precisión léxica y suena natural en español formal.
- source_word: מָאתַיִם וּשְׁנֵים עָשָׂר
  english_pob_choice: two hundred and twelve
  chosen_spanish: doscientos doce
  alternatives_spanish:
  - doscientos y doce
  lexicon: HALOT
  rationale: Número cardinal directo, sin dificultad especial.
- source_word: בְחַצְרֵיהֶם
  english_pob_choice: in their villages
  chosen_spanish: en sus aldeas
  alternatives_spanish:
  - en sus poblados
  - en sus asentamientos
  lexicon: HALOT
  rationale: Aunque חָצֵר puede significar patio o recinto, aquí el contexto genealógico favorece la idea de lugares de residencia/localidades. "Aldeas" comunica ese sentido en español bíblico sin forzar la imagen de un patio templeño.
- source_word: הִתְיַחְשָׂם
  english_pob_choice: were enrolled by genealogy
  chosen_spanish: fueron inscritos por genealogía
  alternatives_spanish:
  - fueron registrados por genealogía
  - fueron contados por genealogía
  lexicon: HALOT
  rationale: El hitpael de יחס alude a quedar asentado en registros genealógicos. "Inscritos por genealogía" mantiene el acto administrativo y la referencia al linaje.
- source_word: יִסַּד
  english_pob_choice: established
  chosen_spanish: establecieron
  alternatives_spanish:
  - fundaron
  - ordenaron
  - instituyeron
  lexicon: HALOT
  rationale: En un marco administrativo, "establecieron" preserva la idea de fijar una disposición sin introducir lenguaje eclesiástico posterior.
- source_word: הָרֹאֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: El hebreo usa el título antiguo "el vidente" para Samuel. Se conserva ese matiz distintivo en lugar de nivelarlo con "profeta".
- source_word: בֶּאֱמוּנָתָם
  english_pob_choice: in their office of trust
  chosen_spanish: en su cargo de confianza
  alternatives_spanish:
  - en su fidelidad
  - por su fidelidad
  - en su encargo confiable
  lexicon: HALOT
  rationale: אֱמוּנָה puede implicar fidelidad, confiabilidad o confianza. Dado el contexto de organización de porteros, "cargo de confianza" refleja el sentido institucional y la cualidad de fiabilidad sin borrar la tensión con "fidelidad".
theological_decisions:
- issue: Sentido final de בֶּאֱמוּנָתָם
  english_pob_reading: David and Samuel established them in their office of trust
  chosen_spanish_reading: David y Samuel los establecieron en su cargo de confianza
  alternative_spanish_readings:
  - David y Samuel los establecieron por su fidelidad
  - David y Samuel los establecieron en su fidelidad
  - David y Samuel los establecieron en un encargo confiable
  rationale: El hebreo permite una relación entre establecimiento y confianza/fidelidad. El contexto de un oficio organizado favorece la lectura administrativa; aun así, se preserva la tensión semántica mediante la nota alternativa sobre fidelidad.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica y lexical cuando el texto la permite'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa, que simplificó "All of these" a "All these"; por eso se traduce naturalmente como "Todos estos". No se introducen cambios de sentido respecto del texto auditado, y se conserva la alternativa semántica final sobre אֱמוּנָה en nota.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando aparezca el nombre divino; aquí no figura en el versículo.
  - '"Vidente" se reserva para הָרֹאֶה, en coherencia con el lexicón del proyecto y con la distinción frente a "profeta".'
  - '"Porteros" conserva el oficio levítico/templeño más que la mera idea doméstica de "doorkeepers".'
  - '"Cargo de confianza" busca evitar una paráfrasis doctrinal; es una solución administrativa que deja abierta la lectura de fidelidad indicada en la nota.'
