base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/012/015.yaml
  text: And after disrobing[a], she adorned herself with her garments and with all her feminine adornment; and her female slave came and spread out for her on the ground opposite Holofernes the fleeces that she had received from Bagoas for her daily use[c][b], so that she might recline on them while eating.
  footnotes:
  - marker: a
    text: Or 'after changing clothes' or, more literally, 'after separating herself.' The Greek participle is somewhat unusual, and the context suggests preparation by removing previous attire before adorning herself.
    reason: lexical_alternative
  - marker: b
    text: '''Female slave'' translates the feminine form of the Greek word related to δοῦλος. ''Maidservant'' is a possible softer rendering.'
    reason: lexical_alternative
  - marker: c
    text: That is, she would recline in the customary posture for eating.
    reason: cultural_note
