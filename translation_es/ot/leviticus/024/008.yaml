translation:
  language: es
  text: Cada día de reposo lo[a] dispondrá[b] delante de Yahvé continuamente, de los hijos de Israel, como pacto perpetuo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La repetición hebrea literal dice: «en el día de reposo, en el día de reposo», un giro idiomático que significa «cada día de reposo» o «día de reposo tras día de reposo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo pondrá en orden»; el pronombre singular se refiere colectivamente a la disposición del pan.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como una alianza perpetua».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּי֨וֹם הַשַּׁבָּת בְּי֣וֹם הַשַּׁבָּת
  english_pob_choice: Every Sabbath day
  chosen_spanish: Cada día de reposo
  alternatives_spanish:
  - Cada sábado
  - Sábado tras sábado
  - En el día de reposo, en el día de reposo
  lexicon: HALOT
  rationale: La repetición hebrea es distributiva e idiomática, equivalente a una acción recurrente cada semana. 'Cada día de reposo' conserva la idea de repetición regular sin sonar forzado en español.
- source_word: יַעַרְכֶנּוּ
  english_pob_choice: he shall arrange it
  chosen_spanish: lo dispondrá
  alternatives_spanish:
  - lo arreglará
  - lo pondrá en orden
  - lo presentará ordenadamente
  lexicon: HALOT
  rationale: ערך en contexto cultual significa ordenar o disponer. 'Dispondrá' comunica la acción ritual de colocar en orden el pan de la proposición sin perder la fuerza cultual del verbo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La expresión cultual estándar se mantiene con 'delante de', que refleja bien la presentación ritual en la presencia divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: ''Yahvé'' reproduce el Tetragrámaton sin ocultarlo tras una sustitución tradicional.'
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - regularmente
  - sin cesar
  lexicon: HALOT
  rationale: En contexto sacerdotal, תמיד indica una observancia continua o regular. 'Continuamente' preserva ese valor sin implicar necesariamente continuidad física ininterrumpida.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: por parte de los hijos de Israel
  alternatives_spanish:
  - de parte de los hijos de Israel
  - de los hijos de Israel
  lexicon: HALOT
  rationale: מֵאֵת señala origen o procedencia. 'Por parte de' expresa adecuadamente esa procedencia/aportación en un castellano natural, manteniendo la referencia corporativa masculina de בְּנֵי יִשְׂרָאֵל.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: as an everlasting covenant
  chosen_spanish: como pacto perpetuo
  alternatives_spanish:
  - como pacto eterno
  - como alianza perpetua
  lexicon: HALOT
  rationale: עוֹלָם en esta fórmula legal-cultual denota duración indefinida o permanente. 'Pacto perpetuo' conserva la idea de continuidad normativa sin introducir una expansión interpretativa adicional.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto cultual
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente y el proyecto español lo rinde por el nombre propio 'Yahvé'. Esto preserva la referencia pactual sin reemplazarla por una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor de בְּרִית עוֹלָם en legislación ritual
  english_pob_reading: as an everlasting covenant
  chosen_spanish_reading: como pacto perpetuo
  alternative_spanish_readings:
  - como alianza perpetua
  - como pacto eterno
  rationale: Aquí la fórmula no solo nombra un pacto, sino una disposición ritual estable y vinculante. 'Pacto perpetuo' conserva el lenguaje de pacto y su carácter duradero sin sobreinterpretar.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Expresión corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - pueblo de Israel
  rationale: Se mantiene la forma masculina-corporativa del hebreo, porque el texto conserva esa formulación y su sentido representativo es claro en el contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que volvió a una formulación más literal en la cláusula final ('as an everlasting covenant') y mantuvo el origen 'from the sons of Israel' para מֵאֵת. La versión española refleja esa literalidad sin perder claridad natural.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con el criterio del proyecto para el Tetragrámaton.
  - '''Pacto perpetuo'' conserva el lenguaje jurídico-cultual y evita una paráfrasis explicativa excesiva.'
  - 'Las notas al pie preservan las ambigüedades documentadas: el valor distributivo de la repetición y la posible alternativa de ''poner en orden''.'
  - '''Hijos de Israel'' mantiene la forma corporativa masculina del hebreo, coherente con la política de traducción del proyecto.'
