lexical_decisions:
- source_word: ⲥⲙⲓⲛⲉ
  chosen: hide yourselves
  alternatives:
  - become small
  - be abased
  - hide
  lexicon: Crum; Layton
  rationale: The immediate antithesis in the clause pairs concealment with visibility;
    rendering ⲥⲙⲓⲛⲉ as reflexive ‘hide yourselves’ preserves that paradox. Some lexica
    allow a semantic range including ‘be small/diminish’; see revision note for that
    possibility.
- source_word: ⲙⲓⲉ
  chosen: be seen
  alternatives:
  - appear
  - be visible
  lexicon: Crum; Layton
  rationale: ⲙⲓⲉ denotes being visible/manifest. ‘Be seen’ maintains the passive/resultant
    sense and sharpens the hide/seen reversal.
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - also
  - and then
  lexicon: Standard Coptic conjunction
  rationale: Simple connective; beginning the line with ‘And’ matches the poem’s additive
    cadence without imposing contrastive force beyond the source.
parallelism_check: 'The couplet preserves the antithetical parallel: second-person
