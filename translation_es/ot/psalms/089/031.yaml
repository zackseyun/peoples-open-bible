translation:
  language: es
  text: Si sus hijos varones abandonan mi ley y no andan en mis juicios[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi instrucción». El hebreo torá puede significar tanto enseñanza como ley; aquí se ha elegido «ley» por el paralelismo con «mis juicios».
    reason: lexical_alternative
  - marker: b
    text: O «no andan conforme a mis ordenanzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición real, no una certeza; «Si» preserva con naturalidad el valor condicional del hebreo.
- source_word: יַעַזְבוּ
  english_pob_choice: abandon
  chosen_spanish: abandonan
  alternatives_spanish:
  - dejan
  - desamparan
  - abandonen
  lexicon: HALOT
  rationale: עזב expresa dejar o abandonar; «abandonan» conserva la fuerza de ruptura de lealtad del contexto de pacto y suena natural en español.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural y la POB inglesa conserva «sons», en español «hijos» comunica de forma natural la referencia filial/descendencial sin perder el marco masculino del original en este contexto dinástico.
- source_word: תּוֹרָתִי
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  - mi enseñanza
  lexicon: HALOT
  rationale: תּוֹרָה puede ser «instrucción» o «ley»; aquí, por el paralelismo con «mis juicios», «mi ley» mantiene el registro jurídico-covenantal que el audit trail privilegia.
- source_word: וּבְמִשְׁפָּטַי
  english_pob_choice: in my judgments
  chosen_spanish: en mis juicios
  alternatives_spanish:
  - según mis decretos
  - en mis ordenanzas
  - conforme a mis juicios
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede denotar juicios, decisiones o normas legales. «En mis juicios» preserva el valor preposicional y el paralelismo con «mi ley».
- source_word: לֹא יֵלֵכוּן
  english_pob_choice: do not walk
  chosen_spanish: no andan
  alternatives_spanish:
  - no caminan
  - no siguen
  - no se conducen
  lexicon: HALOT
  rationale: הלך en contextos de pacto suele expresar conducta o manera de vivir. «Andan» mantiene la metáfora bíblica de caminar y resulta idiomático en español contemporáneo.
theological_decisions:
- issue: Valor de תּוֹרָה en contexto pactual-jurídico
  english_pob_reading: my law
  chosen_spanish_reading: mi ley
  alternative_spanish_readings:
  - mi instrucción
  - mi enseñanza
  rationale: La vecindad semántica con «mis juicios» hace que la línea tenga una textura legal-covenantal; «mi ley» refleja mejor esa textura que una opción más general como «instrucción».
  doctrine_reference: Translation philosophy §1, §5
- issue: Sujeto filial de בָנָיו
  english_pob_reading: his sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus hijos varones
  - sus descendientes
  rationale: El hebreo es masculino plural con sufijo de tercera persona; en español, «hijos» es la forma más natural para expresar esa filiación en un registro bíblico legible, sin neutralizar el referente masculino del linaje.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene dos notas alternativas: una para תּוֹרָה («my law» / «my instruction») y otra para וּבְמִשְׁפָּטַי («in my judgments» / «according to my ordinances»). La versión española conserva ambas tensiones semánticas con notas equivalentes, sin suavizar el registro jurídico del verso.'
  spanish_consistency_notes:
  - Se mantuvo la pareja léxica ley/juicios para reflejar el paralelismo del hebreo.
  - Se prefirió «hijos» por naturalidad idiomática en español, con nota doctrinal sobre el masculino del original.
  - «Andan» preserva la metáfora de conducta asociada a הלך y evita una paráfrasis demasiado abstracta.
