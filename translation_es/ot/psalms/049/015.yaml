translation:
  language: es
  text: Como ovejas, están destinados a Seol[c]; la muerte los pastoreará, y los rectos dominarán sobre ellos por la mañana[b]. Su forma[a] se consumirá en Seol[d], lejos de su morada eminente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su roca/fuerza será consumida»; el hebreo de esta cláusula es difícil, y «su forma» es una traducción basada en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los rectos ejercerán dominio sobre ellos por la mañana».'
    reason: alternative_reading
  - marker: c
    text: Seol es la región de los muertos; es más amplio que «la tumba».
    reason: cultural_note
  - marker: d
    text: 'La frase final es difícil en hebreo; alternativamente: «Seol los consumirá desde su morada eminente» o algo semejante.'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּצֹּאן
  english_pob_choice: Like sheep
  chosen_spanish: Como ovejas
  alternatives_spanish:
  - Como un rebaño
  - Como ovejas del rebaño
  lexicon: HALOT
  rationale: El hebreo usa una comparación colectiva con צֹאן; en español, «ovejas» conserva la imagen de vulnerabilidad y conducción, sin añadir elementos no presentes.
- source_word: לִשְׁאוֹל
  english_pob_choice: for Sheol
  chosen_spanish: para Sheol
  alternatives_spanish:
  - a Sheol
  - hacia Sheol
  - para el sepulcro
  lexicon: HALOT
  rationale: Se conserva «Sheol» para no reducir el término al sepulcro físico. «Para» refleja bien la destinación implícita en la construcción hebrea con ל.
- source_word: שַׁתּוּ
  english_pob_choice: are appointed
  chosen_spanish: están destinados
  alternatives_spanish:
  - están puestos
  - están fijados
  - están asignados
  lexicon: HALOT
  rationale: El verbo expresa ser puestos/establecidos para un destino. «Están destinados» transmite la consigna o asignación sin sobretraducir.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - Muerte
  lexicon: HALOT
  rationale: Se mantiene el sustantivo común y su personificación en el contexto; en español, el artículo ayuda a naturalizar la personificación.
- source_word: יִרְעֵם
  english_pob_choice: will shepherd them
  chosen_spanish: los pastoreará
  alternatives_spanish:
  - los apacentará
  - será su pastor
  lexicon: HALOT
  rationale: «Pastoreará» conserva el verbo de רעה y mantiene la ironía de que la muerte actúa como pastor de las ovejas del símil.
- source_word: וַיִּרְדּוּ בָם
  english_pob_choice: and the upright will rule over them
  chosen_spanish: y los rectos dominarán sobre ellos
  alternatives_spanish:
  - y los rectos reinarán sobre ellos
  - y los rectos tendrán dominio sobre ellos
  lexicon: HALOT
  rationale: יַרְדּוּ/רדה admite la idea de ejercer dominio. «Dominarán sobre ellos» conserva la fuerza del verbo y la relación de poder, evitando una paráfrasis más débil.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: «Rectos» reproduce mejor la idea de enderezado/integro que «justos», que podría importar otro matiz bíblico más técnico.
- source_word: לַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: Se conserva la referencia temporal de manera idiomática en español.
- source_word: וְצוּרָם
  english_pob_choice: Their form
  chosen_spanish: Su forma
  alternatives_spanish:
  - Su roca
  - Su fuerza
  - Su figura
  lexicon: HALOT
  rationale: Siguiendo la lectura contextual adoptada por la POB, se mantiene «forma», que encaja con el verbo de desgaste posterior. Se deja implícita la dificultad textual del término.
- source_word: לְבַלּוֹת
  english_pob_choice: will waste away
  chosen_spanish: se consumirá
  alternatives_spanish:
  - se desgastará
  - se consumirá por completo
  - se marchitará
  lexicon: HALOT
  rationale: El infinitivo de בלה expresa desgaste/consunción. «Se consumirá» es natural y fiel al campo semántico.
- source_word: שְׁאוֹל
  english_pob_choice: in Sheol
  chosen_spanish: en Sheol
  alternatives_spanish:
  - en el sepulcro
  - en la región de los muertos
  lexicon: HALOT
  rationale: Se conserva «Sheol» por la misma razón que antes, manteniendo la categoría hebrea de la morada de los muertos.
- source_word: מִזְּבֻל לוֹ
  english_pob_choice: far from its lofty dwelling
  chosen_spanish: lejos de su morada eminente
  alternatives_spanish:
  - desde su morada eminente
  - lejos de su morada alta
  - desde su palacio
  lexicon: HALOT
  rationale: La frase final es difícil en hebreo. «Morada eminente» preserva el valor de זְבֻל como habitación elevada/noble y mantiene la idea de contraste con el desgaste en Sheol.
theological_decisions:
- issue: Rendering of שְׁאוֹל
  english_pob_reading: Sheol is the realm of the dead; it is broader than 'the grave.'
  chosen_spanish_reading: Sheol es la región de los muertos; es más amplio que «la tumba».
  alternative_spanish_readings:
  - Sheol es el sepulcro
  - Sheol es el mundo de los muertos
  rationale: Se conserva el término transliterado para no reducir su alcance. En una nota en español se puede explicitar que nombra la esfera de los muertos, no solo una sepultura.
  doctrine_reference: Translation philosophy §1, §3
- issue: Personification of death as shepherd
  english_pob_reading: death will shepherd them
  chosen_spanish_reading: la muerte los pastoreará
  alternative_spanish_readings:
  - la muerte los conducirá
  - la muerte será su pastor
  rationale: Se mantiene la personificación del hebreo sin suavizarla. La imagen es deliberadamente irónica y se conserva en español.
  doctrine_reference: Salmos 49:15
- issue: Meaning of the final clause
  english_pob_reading: The final phrase is difficult Hebrew; alternatively, 'Sheol will consume them from their lofty dwelling' or similar.
  chosen_spanish_reading: lejos de su morada eminente
  alternative_spanish_readings:
  - desde su morada eminente
  - Sheol los consumirá desde su morada eminente
  rationale: La ambigüedad textual se conserva sin resolverla dogmáticamente. La redacción elegida sigue la lectura contextual adoptada por la POB y deja espacio para la dificultad del hebreo.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios posteriores; se conserva la lectura óptima ya aprobada y la misma resolución de las dificultades léxicas principales.'
  spanish_consistency_notes:
  - Se mantiene «Sheol» de forma consistente para conservar el término hebreo.
  - Se evita «Cristo» o vocabulario cristológico ajeno al versículo.
  - «Rectos» traduce יְשָרִים con el matiz moral/geométrico de integridad, siguiendo la POB.
  - La clausula final se presenta con la misma cautela interpretativa que el audit trail inglés.
