    reason: alternative_reading
  revision_rationale: La revisión es menor y no cambia el sentido principal. Se ajusta el inicio a un registro legal más natural y cercano al hebreo ('es hallado') y se mejora la precisión y presentación de la nota literal sobre בְעֻלַת בַּעַל para alinearla mejor con el audit trail en inglés.
