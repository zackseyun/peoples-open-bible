base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/016.yaml
  text: For by fire Yahweh will execute judgment[a], and by his sword, against all flesh[b]; and many will be those slain by Yahweh.
  footnotes:
  - marker: a
    text: Or 'the LORD will judge all flesh by fire and by his sword.' The Hebrew verb can be rendered more compactly as 'will judge' or more explicitly as 'will enter into judgment.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all flesh,' a prophetic idiom for all humanity in its creaturely mortality.
    reason: lexical_alternative
