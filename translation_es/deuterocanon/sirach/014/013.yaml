  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo primario y del paralelo griego: una exhortación a hacer bien antes de morir y a dar conforme a los recursos propios. Sin embargo, dos elecciones no preservan de la mejor manera la forma y el sentido documentados: «un ser amado» suena más pasivo y menos fiel a לְאוֹהֵב / ''one you love'' que «a quien amas», y «dale a él» es innecesariamente calcado y poco natural en español frente a «dale».'
  spanish_quality_summary: El texto es comprensible, pero «un ser amado» resulta algo afectado y puede sugerir 'beloved one' como sustantivo fijo más que la relación verbal del hebreo. «Dale a él» suena forzado en español general y no añade claridad real. «Haz bien» y «según lo que alcanza tu mano» son aceptables y legibles, aunque este último depende de la nota para explicitar la idea de medios/capacidad.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones relevantes son estilístico-lexicales: conviene reflejar mejor el valor verbal-relacional de לְאוֹהֵב con «a quien amas» y usar un imperativo idiomático español para תֶּן לוֹ.'
  issues:
  - severity: medium
    issue: «a un ser amado» no refleja tan fielmente el hebreo לְאוֹהֵב como la opción verbal-relacional documentada.
    rationale: El audit trail inglés escogió 'to one you love' precisamente para conservar la amplitud hebrea frente al griego φίλῳ. En español, «a quien amas» preserva mejor ese matiz que «un ser amado», que suena más literario, más estático y menos pegado a la sintaxis relacional del original.
  - severity: medium
    issue: «dale a él» es un calco poco natural del español.
    rationale: Aunque el original hace explícito el destinatario, en español «dale» ya lo expresa con naturalidad. Mantener «a él» no evita ambigüedad aquí y perjudica la legibilidad eclesial general.
  revised_spanish_text: Antes de que mueras[a], haz bien a quien amas, y según lo que alcanza tu mano[b], dale.
