translation:
  language: es
  text: Entonces el profeta levantó el cadáver del hombre de Dios, lo puso sobre el asno y lo llevó de regreso. Y llegó a la ciudad del profeta anciano para hacer duelo[a] y para sepultarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para lamentarlo». El verbo hebreo para el duelo puede denotar específicamente una lamentación funeraria.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  english_pob_choice: lifted up
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - tomó
  lexicon: HALOT
  rationale: נשא aquí expresa la acción concreta de levantar el cuerpo para moverlo. «Levantó» conserva la secuencia física del relato en un español natural.
- source_word: נִבְלַת
  english_pob_choice: the corpse
  chosen_spanish: el cadáver
  alternatives_spanish:
  - el cuerpo
  - el cuerpo muerto
  lexicon: HALOT
  rationale: נבלה designa un cuerpo muerto; «cadáver» es preciso y evita la suavización de «cuerpo», manteniendo la referencia a un muerto humano.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el siervo de Dios
  lexicon: HALOT
  rationale: La expresión es un título bíblico fijo para un mensajero/portavoz divino. «Hombre de Dios» conserva la formulación tradicional y auditable del texto.
- source_word: וַיַּנִּחֵהוּ אֶל הַחֲמוֹר
  english_pob_choice: laid it on the donkey
  chosen_spanish: lo puso sobre el asno
  alternatives_spanish:
  - lo colocó sobre el asno
  - lo echó sobre el asno
  lexicon: HALOT
  rationale: El causativo de נוח indica poner o depositar algo sobre el animal. «Lo puso sobre el asno» refleja el objeto corporal implícito por el contexto y es idiomático en español.
- source_word: הַחֲמוֹר
  english_pob_choice: the donkey
  chosen_spanish: el asno
  alternatives_spanish:
  - el burro
  - el jumento
  lexicon: HALOT
  rationale: «Asno» es el equivalente bíblico más estable y digno en español, además de ser el término tradicional para este animal en contexto narrativo.
- source_word: וַיְשִׁיבֵהוּ
  english_pob_choice: brought it back
  chosen_spanish: lo llevó de regreso
  alternatives_spanish:
  - lo devolvió
  - lo trajo de vuelta
  lexicon: HALOT
  rationale: שוב en causativo significa hacer volver. «Lo llevó de regreso» conserva el sentido de retorno del cuerpo sin forzar una redacción antinatural en español.
- source_word: עִיר הַנָּבִיא הַזָּקֵן
  english_pob_choice: the city of the old prophet
  chosen_spanish: la ciudad del profeta viejo
  alternatives_spanish:
  - la ciudad del profeta anciano
  - la ciudad del viejo profeta
  lexicon: HALOT
  rationale: El hebreo presenta una cadena constructa que puede leerse como la ciudad asociada al profeta. «Profeta viejo» mantiene la proximidad al orden hebreo y al valor descriptivo de edad, no de cargo.
- source_word: לִסְפֹּד
  english_pob_choice: to mourn
  chosen_spanish: para hacer duelo
  alternatives_spanish:
  - para lamentarlo
  - para llorarlo
  lexicon: HALOT
  rationale: ספד puede implicar lamento funerario. «Hacer duelo» conserva esa carga ritual y fúnebre mejor que un simple «morar» o un genérico «lamentar».
- source_word: וּלְקָבְרוֹ
  english_pob_choice: and to bury him
  chosen_spanish: y para sepultarlo
  alternatives_spanish:
  - y para enterrarlo
  - y para darle sepultura
  lexicon: HALOT
  rationale: קבר significa sepultar/enterrar. «Sepultarlo» es elegante y fiel, y mantiene el objeto directo masculino referido al hombre de Dios.
theological_decisions:
- issue: Tratamiento del título אישי/איש האֱלֹהים como designación narrativa
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el siervo de Dios
  - el varón de Dios
  rationale: No hay motivo para teologizar o suavizar el título; se conserva la designación narrativa establecida por el texto y por la POB en inglés.
  doctrine_reference: Uso bíblico de título profético; cf. 1 Reyes 13:1-10
- issue: Diferencia entre duelo y simple tristeza en ספד
  english_pob_reading: 'to mourn; footnote: ''to lament'' is also possible, with funeral lamentation nuance'
  chosen_spanish_reading: para hacer duelo[a]
  alternative_spanish_readings:
  - para lamentarlo
  - para llorarlo
  rationale: El verbo hebreo puede denotar lamento funerario. En español, «hacer duelo» preserva la dimensión ritual y pública, mientras que la nota mantiene la alternativa de lamento.
  doctrine_reference: Prácticas funerarias en el antiguo Israel; cf. Jeremías 16:5-7
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la referencia pronominal de «brought him back» a «brought it back» para concordar con «the corpse». En español se resolvió con «lo llevó de regreso», manteniendo la concordancia con «el cadáver» y el movimiento de retorno sin perder la ambigüedad narrativa del objeto corporal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton cuando aparezca en este proyecto, pero en este versículo no hay forma directa de יהוה.
  - Se evita «SEÑOR» como sustituto de nombre divino, conforme a la política del proyecto.
  - «Asno» se usa de forma consistente por fidelidad bíblica y registro.
  - «Hombre de Dios» se mantiene como título técnico bíblico; no se reemplaza por expresiones devocionales más libres.
