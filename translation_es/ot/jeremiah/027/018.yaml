base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/027/018.yaml
  text: But if they are prophets[a], and if the word of Yahweh is with them, let them now plead with Yahweh of hosts that the vessels remaining in the house of Yahweh, in the house of the king of Judah[c][b], and in Jerusalem may not go to Babylon.
  footnotes:
  - marker: a
    text: Or 'let them intercede with the LORD of hosts.' The Hebrew verb can denote entreating or interceding.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'come to Babylon'; in English this is naturally rendered 'go to Babylon' from the speaker's perspective.
    reason: lexical_alternative
  - marker: c
    text: Or 'the palace of the king of Judah' for 'the house of the king of Judah.'
    reason: lexical_alternative
