translation:
  language: es
  text: Y el sacerdote los presentará[a] delante de Yahvé y ofrecerá su ofrenda por el pecado[b] y su holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los traerá cerca delante de Yahvé». El verbo hebreo puede enfatizar la presentación ante Dios antes del acto de ofrecer propiamente dicho.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «ofrenda de purificación» en el lenguaje sacrificial sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: shall present
  chosen_spanish: lo presentará
  alternatives_spanish:
  - lo traerá cerca
  - lo ofrecerá
  - lo presentará ante
  lexicon: HALOT
  rationale: En este contexto cultual, el verbo tiene el matiz de acercar o presentar la ofrenda ante Dios antes del acto sacrificial propiamente dicho. En español, «presentará» conserva esa fase preparatoria sin confundirla con «ofrecerá», que aquí corresponde mejor a וְעָשָׂה.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el presbítero
  lexicon: HALOT
  rationale: כֹּהֵן en contexto levítico se refiere al funcionario cultual. «Sacerdote» es la equivalencia natural y fiel en español bíblico actual.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa ubicación o comparecencia ante la presencia divina. «Delante de Yahvé» comunica bien esa relación espacial/ritual y mantiene el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio del pacto como «Yahvé», conforme a la directriz del proyecto, en lugar de sustituirlo por una титulación.
- source_word: וְעָשָׂה
  english_pob_choice: and offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - hará
  - realizará
  - presentará
  lexicon: HALOT
  rationale: Aunque el verbo básico es «hacer», en lenguaje sacrificial la acción idiomática es ofrecer una víctima. «Ofrecerá» es la forma más natural y precisa en español para el acto cultual descrito.
- source_word: אֶת חַטָּאתוֹ
  english_pob_choice: his sin offering
  chosen_spanish: su ofrenda por el pecado
  alternatives_spanish:
  - su sacrificio por el pecado
  - su ofrenda de purificación
  lexicon: HALOT
  rationale: חַטָּאת puede referirse al sacrificio expiatorio/purificatorio, no solo al pecado abstracto. Aquí «ofrenda por el pecado» reproduce la traducción tradicional y mantiene la tensión léxica; la alternativa «ofrenda de purificación» también sería posible según el matiz priestly.
- source_word: וְאֶת עֹלָתוֹ
  english_pob_choice: and his burnt offering
  chosen_spanish: y su holocausto
  alternatives_spanish:
  - y su ofrenda quemada
  - y su ofrenda totalmente quemada
  lexicon: HALOT
  rationale: עֹלָה designa el sacrificio completamente quemado. «Holocausto» es el término español tradicional y exacto en este registro; conserva la idea de la ofrenda íntegramente consumida por fuego.
theological_decisions:
- issue: Nombre divino tetragramático
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo tiene יְהוָה de manera explícita. En coherencia con la norma del proyecto, se vierte como «Yahvé» para preservar el nombre personal del Dios del pacto, en vez de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: חַטָּאת como término sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: En el lenguaje levítico, חַטָּאת puede señalar el sacrificio expiatorio/purificatorio. «Ofrenda por el pecado» mantiene la equivalencia más conocida y deja visible la posible amplitud semántica; no se elimina esa tensión, aunque no se formalice en una nota textual aquí.
  doctrine_reference: Sacrificial terminology in Priestly legislation
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se mantiene en alta concordancia con el audit trail y no requiere correcciones adicionales en español.
  spanish_consistency_notes:
  - Se conservó «Yahvé» de forma uniforme para יְהוָה.
  - Se distinguió entre «presentará» para וְהִקְרִיב y «ofrecerá» para וְעָשָׂה, reflejando la secuencia cultual del hebreo.
  - Se usó «holocausto» para עֹלָה por ser un equivalente español asentado y preciso.
  - Se mantuvo la tensión semántica de חַטָּאת con una nota alternativa sobre «ofrenda de purificación».
