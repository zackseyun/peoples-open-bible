    text: 'O: «Es una sola cosa». El hebreo expresa que el resultado es el mismo o que no hace diferencia en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «destruye tanto al íntegro como al impío», tomando el sujeto de manera más impersonal.'
    reason: alternative_reading
  revision_rationale: Se ajusta el modismo inicial a un español más natural y se restituye la nota clave del expediente inglés sobre la posible lectura impersonal de הוּא מְכַלֶּה. Se mantiene «digo» en el texto principal como buena representación contextual de אָמַרְתִּי, pero no se le asigna la nota [b], ya que en este versículo la alternativa más importante documentada por el POB es la del sujeto del verbo final.
