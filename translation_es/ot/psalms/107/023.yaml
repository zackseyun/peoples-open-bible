    rationale: Si el cuerpo del texto ya restringe demasiado a «negocio», la nota compensa solo parcialmente. Conviene un texto principal más amplio y dejar la nota para las alternativas específicas.
  revised_spanish_text: Los que bajan al mar en barcos[a], ocupados en su labor sobre grandes aguas—
