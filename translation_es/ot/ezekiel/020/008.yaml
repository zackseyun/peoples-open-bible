translation:
  language: es
  text: Pero se rebelaron contra mí y no quisieron escucharme. Ningún hombre arrojó las cosas detestables[a] que tenía delante de sus ojos, ni abandonaron los ídolos[b] de Egipto. Entonces dije que derramaría mi furor sobre ellos, para agotar mi ira contra ellos en medio de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “las cosas detestables de sus ojos”, un giro idiomático para los objetos abominables en que cada uno fijaba la mirada o que deseaba.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para “ídolos” aquí es especialmente despectivo; puede sugerir algo sucio o vil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְרוּ בִי
  english_pob_choice: they rebelled against me
  chosen_spanish: se rebelaron contra mí
  alternatives_spanish:
  - se alzaron contra mí
  - fueron rebeldes contra mí
  lexicon: HALOT
  rationale: מרה con ב expresa rebelarse o actuar con rebelión contra alguien. 'Se rebelaron contra mí' es natural en español y conserva el tono pactual de desobediencia deliberada.
- source_word: וְלֹא אָבוּ לִשְׁמֹעַ אֵלַי
  english_pob_choice: and were not willing to listen to me
  chosen_spanish: y no quisieron escucharme
  alternatives_spanish:
  - y no estuvieron dispuestos a escucharme
  - y no quisieron obedecerme
  lexicon: HALOT
  rationale: אָבוּ enfatiza falta de voluntad, no solo incapacidad. 'No quisieron escucharme' reproduce bien esa negativa y permite que el matiz de obediencia quede implícito en 'escucharme'.
- source_word: אִישׁ
  english_pob_choice: No man
  chosen_spanish: Ningún hombre
  alternatives_spanish:
  - Nadie
  - Ninguno
  lexicon: HALOT
  rationale: El singular distributivo אִישׁ tiene fuerza representativa. 'Ningún hombre' mantiene esa forma masculina genérica sin perder claridad en español.
- source_word: שִׁקּוּצֵי עֵינֵיהֶם
  english_pob_choice: the detestable things before his eyes
  chosen_spanish: las cosas detestables que estaban delante de sus ojos
  alternatives_spanish:
  - las cosas abominables ante sus ojos
  - las abominaciones de sus ojos
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: no describe solo ubicación física, sino aquello en lo que fijaban la mirada con deseo o apego. ''Delante de sus ojos'' conserva el sentido del inglés auditado y sugiere la presencia/objeto de contemplación sin forzar un giro más interpretativo.'
- source_word: הִשְׁלִיכוּ
  english_pob_choice: threw away
  chosen_spanish: arrojó
  alternatives_spanish:
  - echó
  - tiró
  lexicon: HALOT
  rationale: השליך significa arrojar/echar fuera. Para una formulación española fluida, 'arrojó' mantiene la acción concreta de desprenderse de los ídolos, aunque aquí el sujeto distributivo es 'Ningún hombre'.
- source_word: גִּלּוּלֵי מִצְרַיִם
  english_pob_choice: the idols of Egypt
  chosen_spanish: los ídolos de Egipto
  alternatives_spanish:
  - los ídolos abominables de Egipto
  - los ídolos inmundos de Egipto
  lexicon: HALOT
  rationale: גִּלּוּלִים es un término despectivo para ídolos. 'Ídolos' es la base más clara en el texto principal; el matiz despreciativo queda insinuado por el contexto y puede explicarse en nota.
- source_word: עָזָבוּ
  english_pob_choice: did not abandon
  chosen_spanish: ni abandonaron
  alternatives_spanish:
  - ni dejaron
  - ni renunciaron a
  lexicon: HALOT
  rationale: עָזַב aquí es dejar, abandonar, renunciar. 'Ni abandonaron' conserva la fuerza de persistencia en la idolatría.
- source_word: וָאֹמַר
  english_pob_choice: Then I said I would
  chosen_spanish: Entonces dije que
  alternatives_spanish:
  - Y dije que
  - Luego dije que
  lexicon: HALOT
  rationale: La forma narrativa del waw consecutivo avanza la secuencia. 'Entonces dije que' comunica la resolución divina en español natural sin añadir una glosa innecesaria.
- source_word: לִשְׁפֹּךְ חֲמָתִי עֲלֵיהֶם
  english_pob_choice: pour out my wrath on them
  chosen_spanish: derramaría mi furor sobre ellos
  alternatives_spanish:
  - derramaría mi ira sobre ellos
  - vertería mi furia sobre ellos
  lexicon: HALOT
  rationale: שפך + חמה es la imagen estándar de derramar furor/ira. 'Furor' conserva la intensidad del lenguaje judicial y encaja bien con el verbo 'derramar'.
- source_word: לְכַלּוֹת אַפִּי בָּהֶם
  english_pob_choice: to exhaust my anger against them
  chosen_spanish: para agotar mi ira contra ellos
  alternatives_spanish:
  - para consumir mi ira contra ellos
  - para completar mi ira contra ellos
  lexicon: HALOT
  rationale: כלה con אף expresa llevar la ira a su término pleno, agotarla en juicio. 'Agotar mi ira' sigue de cerca la solución auditada en inglés y resulta comprensible en español.
- source_word: בְּתוֹךְ אֶרֶץ מִצְרָיִם
  english_pob_choice: in the midst of the land of Egypt
  chosen_spanish: en medio de la tierra de Egipto
  alternatives_spanish:
  - dentro de la tierra de Egipto
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: בְּתוֹךְ añade la idea de estar dentro o en medio. 'En medio de la tierra de Egipto' preserva la expresión formal del hebreo y la localización narrativa.
theological_decisions:
- issue: Lenguaje antropopático de juicio divino
  english_pob_reading: Retain 'wrath' and 'anger' as distinct but related expressions of God's judicial response
  chosen_spanish_reading: Conservar 'furor' e 'ira' como expresiones distintas pero relacionadas de la respuesta judicial de Dios
  alternative_spanish_readings:
  - nivelar ambos términos como 'ira'
  - suavizar a 'castigo' o 'juicio'
  rationale: El hebreo usa חֵמָה y אַף en proximidad para intensificar el juicio. Mantener dos términos evita diluir la fuerza retórica del pasaje y no impone una distinción doctrinal ajena al versículo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Fuerza representativa de אִישׁ
  english_pob_reading: Use 'No man' in the main text
  chosen_spanish_reading: Usar 'Ningún hombre' en el texto principal
  alternative_spanish_readings:
  - '''Nadie'''
  - '''Ninguno'''
  rationale: La forma hebrea es masculina singular con valor distributivo. 'Ningún hombre' conserva esa forma representativa y evita borrar la gramática de origen.
  doctrine_reference: Translation philosophy §4
- issue: Término despectivo para ídolos
  english_pob_reading: The Hebrew term for 'idols' here is especially contemptuous; it can carry the sense of something filthy or vile.
  chosen_spanish_reading: Mantener 'ídolos' en el texto principal y explicar en nota el tono despectivo del hebreo
  alternative_spanish_readings:
  - '''ídolos inmundos'''
  - '''ídolos vilísimos'''
  rationale: En español, añadir un adjetivo fuerte en el cuerpo podría sobreinterpretar; conservar 'ídolos' deja el texto limpio y permite documentar el matiz peyorativo sin perder legibilidad.
  doctrine_reference: Lexical decision on גִּלּוּלִים
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión más reciente del inglés auditado: se mantuvo la solución más literal para שִׁקּוּצֵי עֵינֵיהֶם como ''delante de sus ojos'' y para לְכַלּוֹת אַפִּי como ''agotar mi ira''. También se preservó la secuencia narrativa del waw consecutivo con ''Entonces dije que''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino explícito, por lo que no se introduce.
  - '''Furor'' e ''ira'' se distinguen para reflejar חֲמָתִי y אַפִּי sin forzar una teología técnica ajena al versículo.'
  - Se mantuvo el registro bíblico contemporáneo, evitando calcos rígidos como 'verter mi furia' donde 'derramar mi furor' resulta más natural en español.
  - Las notas a y b se anclan en palabras del texto y explican las dos decisiones léxicas más sensibles.
