translation:
  language: es
  text: Los cielos alabarán tus maravillas, Yahvé; sí, tu fidelidad en la asamblea de los seres santos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los santos»; en este contexto, «los seres santos» probablemente se refiere a seres celestiales.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֹודוּ
  english_pob_choice: will praise
  chosen_spanish: alabarán
  alternatives_spanish:
  - darán gracias
  - confesarán
  lexicon: HALOT
  rationale: El hilo verbal de ידה en este contexto poético expresa alabanza dirigida a Dios. En español, «alabarán» conserva naturalmente ese sentido culto y evita la aspereza de «confesarán»; «darán gracias» sería posible, pero aquí el paralelismo con las maravillas favorece la idea de alabanza.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El plural hebreo se mantiene con el plural español «los cielos», que conserva el registro poético y la amplitud cósmica del término.
- source_word: פִּלְאֲךָ
  english_pob_choice: your wonders
  chosen_spanish: tus maravillas
  alternatives_spanish:
  - tus prodigios
  - tus obras maravillosas
  lexicon: HALOT
  rationale: פּלא refiere a actos o realidades asombrosas. «Maravillas» reproduce bien la carga de lo extraordinario en español bíblico sin perder claridad.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh SEÑOR
  - oh Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la norma del proyecto, en lugar de sustituirlo por un título. La interpelación vocativa se expresa con «oh» para un tono natural en español.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - además
  - incluso
  - de hecho
  lexicon: HALOT
  rationale: אַף añade énfasis y continuidad. «Sí» funciona en español como refuerzo enfático breve y mantiene el ritmo poético de la cláusula.
- source_word: אֱמוּנָתְךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu firmeza
  - tu verdad
  lexicon: HALOT
  rationale: Aquí אֱמוּנָה expresa la confiabilidad leal de Dios. «Fidelidad» es la equivalencia más natural y teológicamente precisa en español.
- source_word: בִּקְהַל
  english_pob_choice: in the assembly of
  chosen_spanish: en la asamblea de
  alternatives_spanish:
  - en la congregación de
  - entre
  lexicon: HALOT
  rationale: קהל designa un grupo reunido. «Asamblea» conserva el carácter concreto y corporativo del término mejor que opciones más difusas.
- source_word: קְדֹשִׁים
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los seres santos
  - los santos/los ángeles
  lexicon: HALOT
  rationale: El texto puede referirse a seres celestiales o a santos en sentido amplio. Siguiendo la tensión preservada por el POB inglés, «los santos» mantiene la ambigüedad en español; la nota de pie aclara la posible referencia celestial.
theological_decisions:
- issue: Referente de קְדֹשִׁים
  english_pob_reading: A likely reference to heavenly beings, rendered neutrally as 'the holy ones' without over-specifying.
  chosen_spanish_reading: Posible referencia a seres celestiales, expresada de manera neutra como «los santos».
  alternative_spanish_readings:
  - los ángeles
  - los seres santos
  - los santos en sentido humano
  rationale: El contexto inmediato habla de los cielos y del consejo/divino ámbito celestial, por lo que la lectura de seres celestiales es plausible. Sin embargo, el hebreo no obliga a precisar esa identificación; por eso se conserva una formulación abierta en el texto principal y se explica la alternativa en nota.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de forma prematura.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el análisis auditado en inglés, sin introducir cambios de sentido. Se conserva la posible ambigüedad de קְדֹשִׁים y el tono poético del paralelismo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton conforme a la terminología del proyecto.
  - Se usa «los cielos» en plural para reflejar שָׁמַיִם.
  - «Maravillas» y «fidelidad» reproducen el campo semántico principal del verso.
  - La nota a pie de página preserva la alternativa interpretativa de קְדֹשִׁים sin sobreespecificar en el cuerpo del texto.
