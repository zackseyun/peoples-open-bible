    text: Or 'facing the wind' / 'against the wind.' The Greek image is of stakes exposed directly to the wind.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses an emphatic negation ('will certainly not endure').
    reason: lexical_alternative
