translation:
  language: es
  text: un macho cabrío para una ofrenda por el pecado;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "para una ofrenda de purificación". El hebreo חַטָּאת puede denotar la ofrenda que trata con el pecado y la impureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabra macho
  - cabro
  - macho de las cabras
  lexicon: HALOT
  rationale: La frase hebrea designa un macho de entre las cabras, es decir, un animal sacrificial masculino. "Macho cabrío" es natural en español bíblico y conserva la especificidad del sexo y del tipo de animal mejor que "cabra macho".
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - una sola
  lexicon: HALOT
  rationale: El numeral se mantiene explícito para reflejar la enumeración cultual del pasaje. En español, en esta posición puede elidirse ante el sustantivo implícito del contexto, pero aquí se conserva como decisión auditable en la serie de ofrendas.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación
  alternatives_spanish:
  - como expiación
  - para una ofrenda por el pecado
  - para sacrificio por el pecado
  lexicon: HALOT
  rationale: En este contexto sacrificial, חַטָּאת puede referirse tanto al pecado como a la ofrenda que trata con el pecado/impureza ritual. Se eligió "expiación" para evitar una lectura demasiado estrecha y para reflejar el valor cultual de la ofrenda en un registro más natural en español.
theological_decisions:
- issue: Traducción de חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering, with note that the Hebrew can denote purification offering
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda de purificación
  rationale: El hebreo admite la tensión entre pecado e impureza ritual. En español, "expiación" preserva esa amplitud cultual sin fijar prematuramente una sola matización. La nota deja constancia de la alternativa semántica equivalente al pie de página inglés.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it where ambiguity is genuine.'
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente; el texto inglés auditado se mantuvo sin alteraciones y la concordancia con el hebreo es alta. La versión española sigue ese mismo estado estable, conservando la tensión semántica de חַטָּאת sin introducir explicaciones ajenas al expediente.
  spanish_consistency_notes:
  - Se mantuvo un registro cultual claro y breve, acorde con la lista de ofrendas de Números 7.
  - Se evitó 'SEÑOR' y otros reemplazos no pertinentes porque no aparece el nombre divino en este versículo.
  - Se preservó la estructura elíptica del hebreo, adecuada para una fórmula enumerativa.
  - La nota al pie en español corresponde directamente a la nota auditada en inglés y mantiene la alternativa 'purificación' como opción reconocida.
