translation:
  language: es
  text: Miren[a], hoy yo pongo ante ustedes una bendición y una maldición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hoy yo estoy poniendo ante ustedes una bendición y una maldición». El hebreo puede entenderse literalmente como «dar/poner»; aquí se prefirió una expresión más idiomática en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - Ve
  lexicon: HALOT
  rationale: El imperativo singular funciona como llamada discursiva para captar la atención. En español, «Mira» transmite esa invitación directa con naturalidad; «Ve» sonaría demasiado abrupto o localista, y «Miren/Vean» introducirían pluralidad no presente en el hebreo.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - —
  lexicon: HALOT
  rationale: El pronombre independiente enfatiza al hablante. En español, «yo» conserva ese énfasis de forma clara y sobria; «yo mismo» lo recargaría sin necesidad.
- source_word: נֹתֵן
  english_pob_choice: am setting
  chosen_spanish: pongo
  alternatives_spanish:
  - estoy poniendo
  - estoy dando
  - coloco
  lexicon: HALOT
  rationale: El verbo נתן puede significar dar, poner o colocar. Con «delante de ustedes», la imagen espacial de poner algo ante los oyentes es la más natural en español. «Pongo» mantiene la idiomaticidad del hebreo sin sonar forzado; «estoy dando» sería posible, pero menos preciso para la construcción.
- source_word: לִפְנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - en frente de ustedes
  lexicon: HALOT
  rationale: La locución hebrea expresa situación espacial y retórica. «Delante de ustedes» refleja bien el matiz idiomático en español. «Ante ustedes» sería también válido, pero algo más formal; «en frente de» es menos elegante.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: Adverbio temporal simple. «Hoy» es la equivalencia natural y fiel; «este día» suena más solemne pero menos directo.
- source_word: בְּרָכָה
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  lexicon: HALOT
  rationale: El sustantivo aparece sin artículo en hebreo y se refiere a una de las dos alternativas presentadas. En español, el artículo indefinido expresa bien la pareja contrastiva «una bendición y una maldición».
- source_word: וּקְלָלָה
  english_pob_choice: and a curse
  chosen_spanish: una maldición
  alternatives_spanish:
  - una maldición y
  - maldición
  lexicon: HALOT
  rationale: «קְלָלָה» puede equivaler a maldición, imprecación o execración; en este contexto de contraste pactual, «maldición» es la opción más clara y tradicionalmente entendible en español. La coordinación con «una bendición» preserva el paralelismo.
theological_decisions:
- issue: Presentación de alternativas pactuales sin explicación doctrinal añadida
  english_pob_reading: Render as covenant alternatives being presented without importing later doctrinal explanation.
  chosen_spanish_reading: Presentar la bendición y la maldición como alternativas pactuales puestas delante del pueblo, sin ampliar el versículo con interpretación adicional.
  alternative_spanish_readings:
  - Interpretarlo como principio moral general de recompensa y castigo
  - Parafrasearlo como advertencia ética amplia
  rationale: El contexto de Deuteronomio presenta una elección formal ante Israel. La traducción debe conservar esa estructura de opciones y no convertirla en una explicación doctrinal más amplia de lo que el texto dice.
  doctrine_reference: 'Principio de transparencia textual: mantener el sentido llano y el marco pactual del pasaje sin sobreinterpretar.'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para eliminar una puntuación final innecesaria y conservar la formulación breve y directa. En español se mantiene esa misma concisión, con una opción idiomática que conserva el paralelismo y la fuerza imperativa del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se tradujo el imperativo singular con un singular natural en español («Mira»), evitando pluralizar el destinatario.
  - 'Se conservó el paralelismo hebreo con dos sustantivos indefinidos: «una bendición y una maldición».'
  - No se añadió puntuación fuerte al final de la cita, siguiendo la revisión del contexto inglés.
