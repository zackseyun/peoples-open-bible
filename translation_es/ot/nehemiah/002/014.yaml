translation:
  language: es
  text: Entonces avancé hasta la Puerta de la Fuente[a] y hasta el Estanque del Rey, pero no había lugar para que el animal[b] que estaba debajo de mí pasara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Puerta del Manantial». El hebreo puede denotar una fuente o manantial.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el animal que estaba debajo de mí», es decir, la montura de Nehemías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱבֹר
  english_pob_choice: Then I went on
  chosen_spanish: Entonces avancé
  alternatives_spanish:
  - Entonces seguí
  - Entonces pasé
  lexicon: HALOT
  rationale: El verbo עבר expresa aquí movimiento continuo de un punto a otro. «Avancé» comunica ese desplazamiento narrativo de manera natural en español sin sugerir necesariamente cruce de una barrera o curso de agua.
- source_word: שַׁעַר הָעַיִן
  english_pob_choice: the Fountain Gate
  chosen_spanish: la Puerta de la Fuente
  alternatives_spanish:
  - la Puerta del Manantial
  - la Puerta del Agua
  lexicon: HALOT
  rationale: עַיִן puede significar «fuente» o «manantial» en este contexto topográfico. «Puerta de la Fuente» conserva bien el valor locativo y suena natural en español bíblico.
- source_word: בְּרֵכַת הַמֶּלֶךְ
  english_pob_choice: the King’s Pool
  chosen_spanish: el Estanque del Rey
  alternatives_spanish:
  - la Piscina del Rey
  - el Reservorio del rey
  lexicon: HALOT
  rationale: בְּרֵכָה designa un estanque o depósito de agua. «Estanque» mantiene la imagen concreta; el genitivo se expresa en español con «del Rey».
- source_word: וְאֵין מָקוֹם
  english_pob_choice: but there was no place
  chosen_spanish: pero no había lugar
  alternatives_spanish:
  - y no había lugar
  - pero no había espacio
  lexicon: HALOT
  rationale: El hebreo marca falta de espacio para continuar. «No había lugar» reproduce la idea básica con fluidez, y «pero» refleja el giro adversativo implícito por el obstáculo.
- source_word: לַבְּהֵמָה
  english_pob_choice: for the animal
  chosen_spanish: para que pasara el animal
  alternatives_spanish:
  - para el animal
  - para que el animal pasara
  lexicon: HALOT
  rationale: בְּהֵמָה es un término general para animal o bestia. Se conserva la generalidad con «animal» y se integra en una subordinada natural en español.
- source_word: תַּחְתָּי
  english_pob_choice: under me
  chosen_spanish: que iba debajo de mí
  alternatives_spanish:
  - debajo de mí
  - bajo mí
  lexicon: HALOT
  rationale: La expresión literal señala la posición del animal respecto de Nehemías, es decir, el que él montaba. «Que iba debajo de mí» mantiene el relieve descriptivo sin sustituirlo por una interpretación demasiado explícita.
theological_decisions:
- issue: Referencia implícita al animal de monta sin nombrarlo explícitamente
  english_pob_reading: Literally, 'for the animal under me to pass,' referring to the animal Nehemiah was riding.
  chosen_spanish_reading: «para que pasara el animal que iba debajo de mí» mantiene la referencia implícita al animal de monta sin identificarlo como caballo o mula.
  alternative_spanish_readings:
  - «para que pasara mi montura»
  - «para que pasara el animal que montaba»
  rationale: El hebreo no especifica la especie; solo indica que era el animal debajo de Nehemías. La redacción española conserva esa indeterminación y evita precisar más de lo que el texto da.
  doctrine_reference: Criterio de sobriedad exegética y fidelidad lexical al texto hebreo
translation_notes:
  revision_awareness: El texto coincide con la última revisión auditada, que no introdujo cambios respecto del pasaje base. Se mantiene la equivalencia óptima del inglés POB, pero la formulación española se ajusta directamente al hebreo para conservar la topografía y la referencia al animal de monta.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se eligió «Puerta de la Fuente» frente a «Puerta del Manantial» porque la forma con «fuente» es más estable en español bíblico sin perder la posibilidad semántica.
  - 'Se conservó la estructura topográfica de dos destinos sucesivos: la Puerta y el Estanque del Rey.'
  - No se explicitó la especie del animal, porque el hebreo tampoco lo hace.
