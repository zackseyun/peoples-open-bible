translation:
  language: es
  text: '¡Regocíjate mucho[a], hija Sion! ¡Grita, hija Jerusalén! Mira, tu rey viene hacia ti: justo y dotado de salvación[c] es él, humilde[b] y montado sobre un asno, sobre un pollino[d], cría de una asna.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Exulta mucho» o «Alégrate mucho». El hebreo expresa un llamado enfático al gozo.
    reason: alternative_reading
  - marker: b
    text: O «bajo», «pobre» o «afligido». El hebreo puede denotar humildad, condición baja o aflicción.
    reason: lexical_alternative
  - marker: c
    text: O «justo y salvado es él» o «justo y con salvación es él». El término hebreo puede describir a uno que ha sido librado por Dios y, por ello, viene caracterizado por salvación.
    reason: alternative_reading
  - marker: d
    text: La expresión «sobre un asno, sobre un pollino, cría de una asna» probablemente funciona como paralelismo poético que describe una sola montura desde dos ángulos.
    reason: cultural_note
lexical_decisions:
- source_word: גִּילִי מְאֹד
  english_pob_choice: Rejoice greatly
  chosen_spanish: ¡Regocíjate mucho!
  alternatives_spanish:
  - ¡Alégrate mucho!
  - ¡Exulta grandemente!
  lexicon: HALOT
  rationale: El imperativo femenino singular pide una exhortación directa y enérgica. «Regocíjate» conserva el matiz jubiloso de גִּילִי y su registro elevado; «mucho» reproduce מְאֹד como intensificador natural en español.
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: hija Sion
  alternatives_spanish:
  - hija de Sion
  - Daughter Zion
  lexicon: HALOT
  rationale: Se preserva la personificación profética de la ciudad/pueblo. «Hija Sion» es una forma breve y bíblica en español; evita explicitar «de» para mantener el paralelo poético y la apelación directa.
- source_word: הָרִיעִי
  english_pob_choice: Shout
  chosen_spanish: ¡Da gritos!
  alternatives_spanish:
  - ¡Grita!
  - ¡Lanza un grito!
  lexicon: HALOT
  rationale: El verbo convoca un clamor fuerte, no un simple hablar en voz alta. «Da gritos» comunica bien el llamado jubiloso y conserva la fuerza imperativa sin sobrecargar con un matiz militar que no está explícito en la revisión inglesa final.
- source_word: בַּת יְרוּשָׁלִַם
  english_pob_choice: daughter Jerusalem
  chosen_spanish: hija Jerusalén
  alternatives_spanish:
  - hija de Jerusalén
  - Daughter Jerusalem
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «hija Sion» y la personificación de la ciudad. «Hija Jerusalén» suena natural en español bíblico contemporáneo y evita una expansión innecesaria.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: «Mira» expresa la partícula deíctica con tono claro y moderno. Evita el arcaísmo de «He aquí» sin perder la función de llamar la atención.
- source_word: מַלְכֵּךְ יָבוֹא לָךְ
  english_pob_choice: your king is coming to you
  chosen_spanish: tu rey viene hacia ti
  alternatives_spanish:
  - tu rey viene a ti
  - tu rey vendrá hacia ti
  lexicon: HALOT
  rationale: El imperfecto hebreo puede sonar presente/progresivo en este anuncio profético. «Viene hacia ti» preserva la inmediatez y la dirección; «hacia ti» conserva la idea de movimiento sin forzar una lectura meramente futura.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo y recto
  lexicon: HALOT
  rationale: «Justo» recoge bien el valor moral y judicial del término. En español, «righteous» suele corresponder a «justo» cuando la referencia es la cualidad del rey en un contexto de fidelidad y rectitud.
- source_word: וְנוֹשָׁע
  english_pob_choice: having salvation
  chosen_spanish: con salvación
  alternatives_spanish:
  - salvado
  - que trae salvación
  - salvado por Dios
  lexicon: HALOT
  rationale: 'Se conserva la tensión semántica del participio pasivo: puede entenderse como «salvado/deliverado» o como uno caracterizado por salvación. «Con salvación» es suficientemente abierto en español para reflejar esa ambigüedad sin resolverla indebidamente.'
- source_word: הוּא
  english_pob_choice: is he
  chosen_spanish: es él
  alternatives_spanish:
  - él es
  lexicon: HALOT
  rationale: Se mantiene el pronombre explícito para dar énfasis, como en la sintaxis hebrea y la solución inglesa auditada.
- source_word: עָנִי
  english_pob_choice: humble
  chosen_spanish: humilde
  alternatives_spanish:
  - afligido
  - pobre
  - bajo
  lexicon: HALOT
  rationale: En el contexto del ingreso real, el rasgo visible es la modestia/no ostentación del rey. «Humilde» comunica bien esa condición o disposición sin cerrar el campo semántico de pobreza o aflicción, que queda reflejado en las alternativas.
- source_word: וְרֹכֵב עַל חֲמוֹר
  english_pob_choice: and riding on a donkey
  chosen_spanish: y montado sobre un asno
  alternatives_spanish:
  - y cabalgando sobre un asno
  - y montado en un asno
  lexicon: HALOT
  rationale: «Montado sobre un asno» es natural y fiel al participio de acción presente. «Asno» conserva el registro bíblico y evita la neutralización excesiva que puede tener «burro» en algunos contextos.
- source_word: וְעַל עַיִר בֶּן אֲתֹנוֹת
  english_pob_choice: on a colt, the foal of a she-donkey
  chosen_spanish: sobre un pollino, cría de una asna
  alternatives_spanish:
  - sobre un potrillo, cría de una asna
  - sobre un pollino, el hijo de asnas
  lexicon: HALOT
  rationale: El hebreo presenta un encadenamiento poético que probablemente reexpresa la misma montura desde dos ángulos. «Pollino» preserva el joven animal; «cría de una asna» refleja con precisión אֲתֹנוֹת como «asnas» y evita una redundancia que ocultaría el paralelismo.
theological_decisions:
- issue: Cómo reflejar וְנוֹשָׁע en un anuncio regio de tono mesiánico
  english_pob_reading: having salvation
  chosen_spanish_reading: con salvación
  alternative_spanish_readings:
  - salvado
  - que trae salvación
  - salvado por Dios
  rationale: La forma hebrea puede leerse como pasiva («salvado/deliverado») o como caracterización resultante de la acción divina. La opción «con salvación» deja visible esa tensión sin imponer una lectura triunfalista ni explicarla de más. Así se conserva la ambigüedad importante para la recepción mesiánica del pasaje.
  doctrine_reference: Preservar la tensión semántica y teológica del texto profético
translation_notes:
  revision_awareness: La versión inglesa final del POB revisó 'Shout in triumph' a 'Shout' y 'victorious is he' a 'having salvation is he'. La redacción española sigue esa revisión al evitar cualquier intensificación triunfalista añadida y al mantener la ambigüedad de וְנוֹשָׁע con una formulación abierta.
  spanish_consistency_notes:
  - Se conserva el paralelismo 'hija Sion / hija Jerusalén' para mantener la personificación poética.
  - '''Asno'' y ''pollino'' se distinguen para reflejar el doble miembro del sintagma hebreo sin resolverlo artificialmente.'
  - '''Justo'' se usa de manera consistente para צַדִּיק, y ''con salvación'' para וְנוֹשָׁע, respetando la tensión del original.'
