    rationale: 'La nota empieza con ''''O: «...».'', calco poco natural en español bíblico moderno. Debe formularse como ''O «...».'', sin dos puntos, y con redacción más limpia.'
  - severity: low
    issue: Matiz léxico mejorable en la nota
    rationale: En la nota, 'frontera' puede sonar más político-territorial; 'límite' refleja mejor la explicación del inglés 'boundary' y el hebreo גְּבוּל en esta glosa alternativa.
  revised_spanish_text: Caerán por la espada; los juzgaré en la frontera de Israel[a], y sabrán que yo soy Yahvé.
  revised_footnotes:
  - marker: a
    text: O «sobre el límite de Israel». La frase hebrea puede denotar ubicación en el borde mismo de Israel o sobre su límite.
    reason: lexical_alternative
  revision_rationale: El texto principal no requiere cambio. Se corrige únicamente la nota para que su español sea más natural y para que la glosa alternativa refleje mejor el matiz de 'boundary/border' documentado en el rastro de auditoría inglés.
