translation:
  language: es
  text: Así David se levantó y cruzó, él y los seiscientos hombres que estaban con él, a Aquís hijo de Maoc, rey de Gat.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en marcha
  lexicon: HALOT
  rationale: El valor narrativo de קום aquí introduce una acción decisiva. En español, «se levantó» conserva bien ese giro idiomático sin volverlo más interpretativo de lo que permite el hebreo.
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed over
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - cruzó al otro lado
  lexicon: HALOT
  rationale: El hebreo עבר puede expresar “cruzar/pasar”. Aquí el movimiento es hacia territorio filisteo; «pasó» es natural en español y mantiene el desplazamiento sin añadir detalle geográfico no explicitado en el verso.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: 'El pronombre independiente da énfasis o aclaración: David fue junto con su gente. En español, el pronombre sujeto «él» conserva esa aclaración con menor peso que «él mismo».'
- source_word: וְשֵׁשׁ מֵאוֹת אִישׁ
  english_pob_choice: the six hundred men
  chosen_spanish: los seiscientos hombres
  alternatives_spanish:
  - seiscientos hombres
  - los 600 hombres
  lexicon: HALOT
  rationale: La expresión es numérica y directa. Se añade «los» porque el grupo ya es conocido en la narración y suena natural en español.
- source_word: אֲשֶׁר עִמּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que iban con él
  - que lo acompañaban
  lexicon: HALOT
  rationale: La cláusula relativa identifica al grupo de David. «Que estaban con él» reproduce la relación sin volverla más dinámica de lo necesario.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia una persona/destino. En español, «a» es la equivalencia más natural con nombres propios de destino.
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Aquís
  alternatives_spanish:
  - Aquis
  lexicon: Transliteración convencional en español
  rationale: Se adopta la forma española usual del nombre propio para mayor legibilidad, manteniendo la identificación del personaje filisteo.
- source_word: בֶּן מָעוֹךְ
  english_pob_choice: son of Maoch
  chosen_spanish: hijo de Maoc
  alternatives_spanish:
  - hijo de Maoch
  lexicon: HALOT
  rationale: La construcción patronímica se conserva literalmente. Se usa «Maoc» como transliteración española natural del nombre propio hebreo.
- source_word: מֶלֶךְ גַּת
  english_pob_choice: king of Gath
  chosen_spanish: rey de Gat
  alternatives_spanish:
  - el rey de Gat
  lexicon: HALOT
  rationale: La relación constructa indica el cargo real de Aquís. «Rey de Gat» mantiene la función y fluye de manera natural en español.
translation_notes:
  revision_awareness: El inglés POB sigue la lectura narrativa simple del hebreo y no introduce notas textuales o teológicas; la versión española conserva esa misma sobriedad, con ajustes naturales de estilo y transliteración hispana de nombres propios.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia verbal narrativa del hebreo con un español fluido: «se levantó y pasó».'
  - No se añadió información histórica o geográfica que el verso no exprese explícitamente.
  - Los nombres propios se adaptaron a una forma española legible sin alterar la referencia.
  - No se usaron términos eclesiásticos tradicionales que oscurecieran el sentido inmediato del texto.
