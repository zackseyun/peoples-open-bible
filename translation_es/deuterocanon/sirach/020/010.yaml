    text: Or 'There is a lessening for the sake of glory.' The Greek noun can denote reduction, abasement, or humiliation; the sense is that some are brought low in a way that leads to honor.
    reason: lexical_alternative
  - marker: b
    text: '''Has lifted up his head'' is an idiom for rising from a low condition to dignity or confidence.'
