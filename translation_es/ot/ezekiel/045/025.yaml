translation:
  language: es
  text: 'En el séptimo mes[a], el día quince del mes, en la fiesta, hará lo mismo[b] por siete días: como la ofrenda por el pecado, así el holocausto, y la ofrenda de cereal, y el aceite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'durante la fiesta' o 'en la festividad'.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ''hará como estas''; es decir, hará según estas mismas prescripciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/שְּׁבִיעִי
  english_pob_choice: In the seventh month
  chosen_spanish: En el séptimo mes
  alternatives_spanish:
  - En el séptimo
  lexicon: HALOT
  rationale: El ordinal con la preposición marca tiempo y, por el contexto calendárico inmediato, se refiere al séptimo mes. En español se necesita 'mes' para evitar ambigüedad y conservar la claridad del dato calendárico.
- source_word: בַּ/חֲמִשָּׁה עָשָׂר יוֹם לַ/חֹדֶשׁ
  english_pob_choice: on the fifteenth day of the month
  chosen_spanish: el día quince del mes
  alternatives_spanish:
  - el día quince de ese mes
  - el quince del mes
  lexicon: HALOT
  rationale: Es la expresión calendárica normal. Se mantiene una formulación natural en español que conserva la precisión de la fecha.
- source_word: בֶּ/חָג
  english_pob_choice: at the feast
  chosen_spanish: en la fiesta
  alternatives_spanish:
  - durante la fiesta
  - en el festival
  lexicon: HALOT
  rationale: חָג designa una festividad/fiesta de peregrinación. 'En la fiesta' es idiomático en español y conserva el sentido festivo sin diluirlo.
- source_word: יַעֲשֶׂה
  english_pob_choice: he shall do
  chosen_spanish: hará lo mismo
  alternatives_spanish:
  - hará
  - hará esto mismo
  - cumplirá lo mismo
  lexicon: HALOT
  rationale: Se conserva la fuerza general de עשה sin convertirlo en 'ofrecer', porque el hebreo aquí repite la acción prescrita más que nombrar un acto técnico distinto. 'Lo mismo' refleja la referencia anafórica de כָאֵלֶּה.
- source_word: כָ/אֵלֶּה
  english_pob_choice: the same
  chosen_spanish: lo mismo
  alternatives_spanish:
  - las mismas cosas
  - los mismos sacrificios
  - las mismas ofrendas
  lexicon: HALOT
  rationale: La expresión apunta a lo ya prescrito. En español, 'lo mismo' reproduce la referencia anafórica sin añadir sustantivos que el hebreo no explicita en este punto.
- source_word: שִׁבְעַת הַ/יָּמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - por los siete días
  lexicon: HALOT
  rationale: La frase expresa duración a lo largo del período festivo. 'Por siete días' es natural y conserva el valor temporal.
- source_word: כַּֽ/חַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por el pecado
  - el sacrificio por el pecado
  - como la ofrenda por el pecado
  lexicon: HALOT
  rationale: Se conserva el término sacrificial tradicional pero en un español claro. En este contexto, el comparativo hebreo se deja visible con 'como' para no borrar la estructura del texto.
- source_word: כָ/עֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: la ofrenda quemada
  alternatives_spanish:
  - el holocausto
  - la ofrenda holocausto
  lexicon: HALOT
  rationale: Se evita 'holocausto' por su posible carga moderna y se usa 'ofrenda quemada', que comunica con claridad el valor del término עֹלָה y conserva el sentido sacrificial.
- source_word: וְ/כַ/מִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda de grano
  - la oblación
  lexicon: HALOT
  rationale: מִנְחָה en este marco cultual se refiere a una ofrenda vegetal/alimentaria. 'Ofrenda de cereal' sigue el sentido básico y evita un término demasiado eclesiástico o ambiguo.
- source_word: וְ/כַ/שָּׁמֶן
  english_pob_choice: and the oil
  chosen_spanish: y el aceite
  alternatives_spanish:
  - y el aceite ritual
  - y el aceite prescrito
  lexicon: HALOT
  rationale: Se mantiene la sustantivación simple del hebreo. 'El aceite' preserva la definitud del artículo y el lugar del elemento dentro de la serie prescrita.
theological_decisions:
- issue: Cómo reflejar la comparación distributiva de los sacrificios finales
  english_pob_reading: '''as the sin offering, so the burnt offering, and the grain offering, and the oil'''
  chosen_spanish_reading: '''como la ofrenda por el pecado, así la ofrenda quemada, y la ofrenda de cereal, y el aceite'''
  alternative_spanish_readings:
  - la ofrenda por el pecado, la ofrenda quemada, la ofrenda de cereal y el aceite
  - como la ofrenda por el pecado, también la ofrenda quemada, la ofrenda de cereal y el aceite
  rationale: El hebreo repite una construcción comparativa que no conviene nivelar por completo. En español se conserva 'como ... así ...' para mantener visible la relación marcada por el מקור, sin añadir interpretación doctrinal ajena.
  doctrine_reference: Faithful preservation of sacrificial formulation; no doctrinal claim beyond the text
- issue: Referente implícito del sujeto de יַעֲשֶׂה
  english_pob_reading: he = the prince described in the immediate context
  chosen_spanish_reading: él = el príncipe del contexto inmediato
  alternative_spanish_readings:
  - él = un oficiante indeterminado
  - él = el pueblo
  rationale: El contexto inmediato asigna estas provisiones al príncipe. Mantener el sujeto implícito con 'hará' respeta el hebreo y, al mismo tiempo, evita introducir un sujeto explícito que altere la economía del pasaje.
  doctrine_reference: Ezekiel 45 context on princely obligations
translation_notes:
  revision_awareness: He seguido la última revisión del texto inglés, que prefirió mantener 'do the same' en lugar de 'provide the same offerings' para no añadir un sustantivo no explicitado por el hebreo, y conservé en español la estructura comparativa visible del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Ofrenda quemada'' se eligió como equivalente claro y consistente de ''burnt offering'' en esta sección.'
  - Se mantuvo la distinción entre 'ofrenda por el pecado' y 'ofrenda de cereal' para preservar el campo sacrificial del hebreo.
  - La puntuación española usa coma antes de 'y' solo donde la serie y la estructura comparativa lo favorecen estilísticamente.
