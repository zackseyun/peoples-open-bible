translation:
  language: es
  text: 'Y les preguntó[a]: «¿Qué están discutiendo entre ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué están debatiendo entre ustedes?» El verbo puede tener el sentido de disputa o debate según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - les preguntó
  - les inquirió
  lexicon: BDAG
  rationale: En un relato narrativo directo, ἐπερωτάω introduce una pregunta sencilla. «Preguntó» comunica con naturalidad la acción sin añadir formalidad o intensidad que el griego no exige.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - los
  - a ellos
  lexicon: BDAG
  rationale: El pronombre es plural y el contexto inmediato no nombra explícitamente al grupo en el versículo. El dativo clítico «les» conserva esa referencia plural sin especificarla de más.
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Por qué?
  lexicon: BDAG
  rationale: En esta construcción, τί pregunta por el contenido del intercambio. «¿Qué?» reproduce mejor esa referencia al tema de la conversación que una traducción causal.
- source_word: συζητεῖτε
  english_pob_choice: are you discussing
  chosen_spanish: están discutiendo
  alternatives_spanish:
  - están conversando
  - están argumentando
  lexicon: BDAG
  rationale: συζητέω puede abarcar discusión, debate o disputa. «Están discutiendo» conserva la amplitud semántica del verbo y, en español, puede referir tanto a conversar como a debatir en tono tenso; por eso se mantiene la posibilidad de la alternativa adversativa en la nota.
- source_word: πρὸς αὑτούς
  english_pob_choice: with one another
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - unos con otros
  - con ustedes mismos
  lexicon: BDAG
  rationale: La expresión recíproca se vierte de manera idiomática como «entre ustedes», que transmite mejor la interacción mutua del grupo que una forma más literal y menos natural en español.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece anclado en el texto español junto a la pregunta directa, de modo que la nota alternativa queda correctamente vinculada.'
  spanish_consistency_notes:
  - Se mantiene la falta de especificación del referente de «les», coherente con el griego y con el audit trail inglés.
  - «Entre ustedes» evita imponer una glosa más estrecha como «discípulos» o «multitud» que el versículo no nombra.
  - Se eligió un español natural y sobrio, sin depender de formulaciones eclesiásticas tradicionales no exigidas por el original.
