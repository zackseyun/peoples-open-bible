  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los nombres «Joiada», «Eliasib», «Sanbalat» y el título «sumo sacerdote» son aceptables. «Yerno» concuerda con la decisión léxica documentada. La revisión necesaria es de anclaje de notas y de idiomaticidad verbal, no de glosario teológico.
