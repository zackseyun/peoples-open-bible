revisions:
- from: Se levantó y atacó a los filisteos hasta que su mano se cansó y su mano se pegó a la espada[a]. Y Yahvé realizó una gran victoria en aquel día[b], y el pueblo volvió tras él solo para despojar a los caídos.
  to: Se levantó y abatió a los filisteos hasta que su mano se cansó y su mano se pegó a la espada[a]. Y Yahvé dio una gran victoria en aquel día, y el pueblo volvió tras él solo para despojar a los caídos[b].
  rationale: Se corrige נכה con ‘abatió’ para reflejar mejor la fuerza letal del combate; se mejora la naturalidad de עשה + תְּשׁוּעָה con ‘Yahvé dio una gran victoria’; y se reubica la nota b para que explique correctamente אַךְ לְפַשֵּׁט, conforme al audit trail inglés. Se conserva la nota a porque sí corresponde a la vividez de דבק.
