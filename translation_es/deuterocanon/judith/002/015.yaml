lexical_decisions:
- source_word: ἠρίθμησεν
  english_pob_choice: counted
  chosen_spanish: contó
  alternatives_spanish:
  - numeró
  - contó por número
  - hizo recuento de
  lexicon: LSJ
  rationale: El verbo expresa un acto de contar o enumerar. «Contó» es natural en español y conserva el sentido concreto de asignar un número sin forzar una idea técnica de alistamiento militar.
- source_word: ἐκλεκτοὺς ἄνδρας
  english_pob_choice: chosen men
  chosen_spanish: hombres escogidos
  alternatives_spanish:
  - hombres elegidos
  - varones escogidos
  - hombres selectos
  lexicon: LSJ
  rationale: El griego destaca que eran personas seleccionadas; «escogidos» reproduce bien esa cualidad. «Hombres» respeta ἄνδρας y mantiene el registro militar.
- source_word: εἰς παράταξιν
  english_pob_choice: for battle formation
  chosen_spanish: para la formación de batalla
  alternatives_spanish:
  - para el despliegue
  - para la línea de batalla
  - para el orden de combate
  lexicon: LSJ
  rationale: παράταξις se refiere al orden o formación militar. «Formación de batalla» comunica esa imagen de modo claro y digno en español moderno.
- source_word: καθότι
  english_pob_choice: just as
  chosen_spanish: según
  alternatives_spanish:
  - tal como
  - como
  - así como
  lexicon: LSJ
  rationale: La conjunción introduce conformidad con una orden previa. «Según» expresa bien la idea de acuerdo con lo mandado, con una sintaxis natural en español.
- source_word: ὁ κύριος αὐτοῦ
  english_pob_choice: his lord
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su señorío
  - su dueño
  lexicon: LSJ
  rationale: Aquí κύριος no es un título divino, sino un superior humano. «Señor» mantiene la relación jerárquica sin introducir un matiz teológico indebido.
- source_word: εἰς μυριάδας δέκα δύο
  english_pob_choice: one hundred twenty thousand
  chosen_spanish: ciento veinte mil
  alternatives_spanish:
  - doce miríadas
  - '120.000'
  lexicon: LSJ
  rationale: La expresión suma doce miríadas, es decir, 120.000. En español, el total normalizado es más claro y exacto para el lector.
- source_word: ἱππεῖς τοξότας
  english_pob_choice: mounted archers
  chosen_spanish: arqueros montados
  alternatives_spanish:
  - caballería de arqueros
  - arqueros a caballo
  - jinetes arqueros
  lexicon: LSJ
  rationale: La frase combina caballería y arco. «Arqueros montados» conserva la imagen militar y es idiomático en español, sin perder la relación entre caballo y arco.
- source_word: μυρίους δισχιλίους
  english_pob_choice: twelve thousand
  chosen_spanish: doce mil
  alternatives_spanish:
  - dos mil y una miríada
  - '12.000'
  lexicon: LSJ
  rationale: La suma da 12.000. Conviene expresar el total directamente, como hace la POB inglesa, para evitar dureza innecesaria en español.
theological_decisions:
- issue: κύριος como autoridad humana y no divina
  english_pob_reading: his lord
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su Señor
  rationale: El contexto militar y narrativo indica un superior humano, no una referencia a Dios. Por eso se usa «señor» en minúscula, evitando una mayúscula que sugeriría lectura divina.
  doctrine_reference: 'DOCTRINE.md: términos polémicos de κύριος; traducir según el contexto'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «counted out chosen men» a «counted chosen men», suprimiendo «out» por naturalidad. La presente redacción española sigue la forma más natural y directa («contó»), manteniendo completos los datos militares y numéricos del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, pero aquí κύριος se refiere al superior humano de Holofernes, por lo que corresponde «señor» en minúscula.
  - Se preserva el registro militar con «formación de batalla» y «arqueros montados», evitando términos eclesiásticos o demasiado interpretativos.
  - Los números se normalizan al total equivalente en español, con nota para conservar la alternativa griega literal.
