translation:
  language: es
  text: 'Entonces Salomón envió a Huram, rey de Tiro[a], diciendo: «Así como trataste con David mi padre y le enviaste cedros para edificarle una casa para habitar en ella, así haz conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Huram» sigue la forma hebrea de Crónicas; en 1 Reyes suele aparecer la variante «Hiram».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; «Entonces» conserva la secuencia de manera natural en español sin perder el valor narrativo.
- source_word: חוּרָם
  english_pob_choice: Huram
  chosen_spanish: Huram
  alternatives_spanish:
  - Hiram
  lexicon: HALOT
  rationale: Se sigue la forma hebrea de Crónicas, Huram, como texto principal. «Hiram» queda como alternativa familiar en otras tradiciones, pero no reemplaza la forma fuente.
- source_word: מֶלֶךְ צֹר
  english_pob_choice: king of Tyre
  chosen_spanish: rey de Tiro
  alternatives_spanish:
  - rey de la ciudad de Tiro
  lexicon: HALOT
  rationale: 'Construcción posesiva normal: título + lugar. «Tiro» es la forma estándar española del topónimo.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» introduce el discurso directo de manera natural y fiel al hebreo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: As
  chosen_spanish: Así como
  alternatives_spanish:
  - Tal como
  - Del modo en que
  lexicon: HALOT
  rationale: La comparación entre la acción pasada hacia David y la petición presente pide una correlación explícita; «Así como» la expresa bien en español.
- source_word: עָשִׂיתָ עִם דָּוִיד אָבִי
  english_pob_choice: you dealt with David my father
  chosen_spanish: actuaste con David mi padre
  alternatives_spanish:
  - te comportaste con David mi padre
  - trataste a David mi padre
  lexicon: HALOT
  rationale: El hebreo עשה עם admite la idea de «tratar/actuar con». Se evita una formulación demasiado idiomática en español como «dealt with», y se conserva la relación interpersonal del verbo.
- source_word: וַתִּשְׁלַח לוֹ אֲרָזִים
  english_pob_choice: and sent him cedars
  chosen_spanish: y le enviaste cedros
  alternatives_spanish:
  - y le enviaste madera de cedro
  - y le mandaste cedros
  lexicon: HALOT
  rationale: «Cedros» reproduce el plural lexical del hebreo sin sobreespecificar el material como troncos o vigas, tal como hizo la POB en inglés.
- source_word: לִבְנוֹת לוֹ בַיִת
  english_pob_choice: to build himself a house
  chosen_spanish: para edificarle una casa
  alternatives_spanish:
  - para construirle una casa
  - para levantarle una casa
  lexicon: HALOT
  rationale: Se conserva el sentido de finalidad y beneficio. En español, «edificarle una casa» refleja mejor el registro bíblico y el objeto arquitectónico solicitado.
- source_word: לָשֶׁבֶת בּוֹ
  english_pob_choice: to dwell in
  chosen_spanish: donde habitar
  alternatives_spanish:
  - para habitar en ella
  - para vivir en ella
  lexicon: HALOT
  rationale: «Habitar» mantiene el tono elevado de «dwell» y evita una banalización de la idea de residencia. El relativo «donde» hace fluida la estructura en español.
- source_word: ellipsis after לָשֶׁבֶת בּוֹ
  english_pob_choice: so do with me
  chosen_spanish: así haz conmigo
  alternatives_spanish:
  - haz lo mismo conmigo
  - de la misma manera haz conmigo
  lexicon: HALOT
  rationale: La cláusula hebrea queda elíptica en esta versificación; se explicita la petición comparativa de manera breve y fiel, como en el audit trail inglés, sin añadir contenido ajeno.
translation_notes:
  revision_awareness: Se ha seguido de cerca el texto hebreo de Crónicas 2:2 y el auditable del inglés POB. La única expansión interpretativa necesaria es la cláusula final elíptica, que en español se resuelve con «así haz conmigo» para preservar el sentido comparativo completo del discurso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, aunque este versículo no lo contiene.
  - Se usa «habitar» para לָשֶׁבֶת, en coherencia con el registro bíblico y con la preferencia de la serie por preservar el matiz de residencia.
  - Se conserva «cedros» como sustantivo simple, sin convertirlo en una especificación técnica de madera o vigas, porque el hebreo no lo exige explícitamente.
