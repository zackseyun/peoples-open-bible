    rationale: El hebreo expresa quedar retenidos/excluidos de participar. «Se nos debe impedir» introduce un matiz de deber normativo menos directo y suena algo rígido en español. «Se nos impida» o «quedemos excluidos» representa mejor la protesta y mejora la naturalidad.
  - severity: medium
