base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/004/024.yaml
  text: For just as the neighbors of Zion have now seen your captivity[b][a], so they will soon see the salvation from your God that will come upon you with great glory and the splendor of the Eternal.
  footnotes:
  - marker: a
    text: Or 'deliverance' for 'salvation.' The Greek σωτηρία can denote rescue or deliverance as well as salvation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the everlasting One' for 'the Eternal.' The Greek has the substantive adjective τοῦ αἰωνίου.
    reason: lexical_alternative
