translation:
  language: es
  text: Isaac sembró en aquella tierra[a], y en aquel año obtuvo cien veces más, y Yahvé lo bendijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obtuvo cien medidas»; el hebreo dice literalmente «halló cien שְׁעָרִים», una expresión idiomática para un rendimiento extraordinariamente abundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְרַע
  english_pob_choice: sowed
  chosen_spanish: sembró
  alternatives_spanish:
  - sazonó
  - plantó
  lexicon: HALOT
  rationale: זרע en contexto agrícola significa sembrar semilla. «Sembró» conserva la imagen del cultivo y es el equivalente natural en español para ese acto.
- source_word: בָּאָרֶץ הַהִוא
  english_pob_choice: in that land
  chosen_spanish: en aquella tierra
  alternatives_spanish:
  - en aquella tierra
  - en aquel país
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «país». Aquí «tierra» sigue de cerca el hebreo y evita cargar el texto con un matiz político innecesario.
- source_word: וַיִּמְצָא
  english_pob_choice: he found
  chosen_spanish: hizo una cosecha
  alternatives_spanish:
  - encontró
  - obtuvo
  - recogió
  lexicon: HALOT
  rationale: El verbo מצא, en este contexto de rendimiento agrícola, expresa el resultado obtenido. En español, «hizo una cosecha» comunica el sentido de rendimiento abundante sin perder el vínculo con la productividad del campo; «encontró» sería demasiado literal e idiomáticamente oscuro.
- source_word: מֵאָה שְׁעָרִים
  english_pob_choice: a hundredfold
  chosen_spanish: centuplicada
  alternatives_spanish:
  - cien veces más
  - cien medidas
  lexicon: HALOT
  rationale: שְׁעָרִים aquí es una expresión de rendimiento agrícola excepcional. «Centuplicada» comunica en español la idea de multiplicación por cien, equivalente funcional de «a hundredfold».
- source_word: וַיְבָרֲכֵהוּ
  english_pob_choice: blessed him
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - lo prosperó
  - le dio su bendición
  lexicon: HALOT
  rationale: ברך es el verbo estándar «bendecir». «Lo bendijo» preserva la atribución explícita de prosperidad a Yahvé sin reducirla a mero éxito material.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El tetragrámaton se rinde con el nombre divino «Yahvé», de acuerdo con el criterio del proyecto, en lugar de sustituirlo por un título como «el SEÑOR».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio del pacto. Mantener «Yahvé» preserva la referencia personal del nombre divino y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expression of the agricultural result
  english_pob_reading: a hundredfold / he found a hundredfold
  chosen_spanish_reading: cosecha centuplicada
  alternative_spanish_readings:
  - cien veces más
  - cien medidas
  rationale: La cifra y el giro idiomático indican un rendimiento extraordinario. «Centuplicada» conserva la fuerza cuantitativa y el sentido agrícola sin introducir una unidad moderna inexistente en el texto.
  doctrine_reference: Optimal equivalence in harvest idioms
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo y el cierre de revisión del inglés POB: se conserva la estructura triádica (siembra, resultado abundante, bendición divina) y el nombre divino «Yahvé». Donde el inglés oscila entre «found» y una equivalencia agrícola más natural, el español opta por una formulación idiomática que exprese el rendimiento sin perder el dato cuantitativo subyacente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Sembró» mantiene la metáfora agrícola directa del hebreo.
  - La nota al pie preserva la alternativa lexical sobre «cien medidas» y explica el hebraísmo subyacente.
  - 'El orden de cláusulas refleja el paralelismo del original: acción, resultado, bendición.'
