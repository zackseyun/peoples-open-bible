  - 공동체
  lexicon: BDAG
  rationale: 1 요한서의 핵심어. 「교제」는 한국 교회 전통에서 굳어진 등가어이며 단순한 사회적 친교를 넘어 신적 생명에 함께 참여한다는 무게를 담는다.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_korean: 예수 메시아
  alternatives_korean:
  - 예수 그리스도
  lexicon: BDAG
  rationale: Χριστός를 칭호로 옮기는 본 번역의 일관된 원칙. 1 요한서의 기독론 논쟁(2:22; 5:1) 문맥에서 칭호성을 살리는 것이 중요하다.
