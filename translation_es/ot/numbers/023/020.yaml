translation:
  language: es
  text: Mira, he recibido para bendecir[a]; él ha bendecido[b], y no puedo revocarla[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «he recibido para bendecir»; el hebreo deja implícito el objeto de «he recibido».'
    reason: lexical_alternative
  - marker: b
    text: El sujeto de «ha bendecido» está implícito en hebreo; el contexto indica a Dios.
    reason: alternative_reading
  - marker: c
    text: 'O: «no puedo hacerla volver atrás» o «no puedo revertirla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce la declaración con fuerza deíctica e interpelativa. «Mira» conserva esa función en español actual con un tono directo y digno; «He aquí» sería más tradicional, pero menos natural en español moderno.
- source_word: בָרֵךְ
  english_pob_choice: to bless
  chosen_spanish: para bendecir
  alternatives_spanish:
  - para bendición
  - para bendecir una bendición
  lexicon: HALOT
  rationale: El hebreo presenta el infinitivo/idea verbal de bendecir como contenido de lo recibido. «Para bendecir» reproduce mejor esa relación que una nominalización excesiva y mantiene el sentido de comisión u oráculo sin añadir palabras no explicitadas.
- source_word: לָקָחְתִּי
  english_pob_choice: I have received
  chosen_spanish: he recibido
  alternatives_spanish:
  - he tomado
  - he recibido para bendecir
  lexicon: HALOT
  rationale: El verbo literalmente es «tomar/recibir», y en el contexto profético se entiende como recibir una carga o mensaje. La redacción española conserva la literalidad básica de «recibir» sin introducir «mandato», que no está explícito en el hebreo.
- source_word: וּבֵרֵךְ
  english_pob_choice: he has blessed
  chosen_spanish: él ha bendecido
  alternatives_spanish:
  - ha bendecido
  - uno ha bendecido
  lexicon: HALOT
  rationale: El sujeto está implícito en hebreo. Dado el contexto inmediato, se entiende como Dios; en español se preserva el sujeto implícito mediante «él» para reflejar la tersura del original, sin nombrarlo de forma interpretativa.
- source_word: וְלֹא אֲשִׁיבֶנָּה
  english_pob_choice: I cannot reverse it
  chosen_spanish: y no puedo revertirlo
  alternatives_spanish:
  - y no puedo revocarlo
  - y no puedo volver atrás eso
  lexicon: HALOT
  rationale: El Hiphil de שוב expresa hacer volver/volver atrás, es decir, deshacer o revertir. «Revertirlo» conserva esa idea de inversión o anulación con un registro claro y formal en español.
theological_decisions:
- issue: Sujeto implícito de «ha bendecido»
  english_pob_reading: The subject is God, left as 'he' in the main text.
  chosen_spanish_reading: Se mantiene «él» sin explicitar «Dios» en el texto principal.
  alternative_spanish_readings:
  - Dios ha bendecido
  - alguien ha bendecido
  rationale: El hebreo deja el sujeto sin expresar; el contexto apunta con fuerza a Dios, pero el texto base no lo nombra. Mantener la referencia pronominal preserva la tensión y la brevedad del original, evitando resolver interpretativamente lo que el hebreo deja implícito.
  doctrine_reference: Primacía del texto original; conservar el sujeto implícito cuando el contexto lo permite.
- issue: Valor de לָקָחְתִּי en contexto profético
  english_pob_reading: I have received
  chosen_spanish_reading: he recibido para bendecir
  alternative_spanish_readings:
  - he recibido
  - he tomado
  rationale: El verbo por sí solo es amplio, pero el contexto de la proclamación de Balaam lo orienta hacia la recepción de una palabra para bendecir. La formulación española deja visible esa relación sin convertirla en una «orden» que no está escrita explícitamente.
  doctrine_reference: Evitar añadir contenido doctrinal o narrativo no explicitado por el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste revisado del audit trail inglés: se evita añadir «mandato» porque el hebreo no lo explicita, y se conserva el valor de «recibir» unido al infinitivo de bendecir. También se mantiene la imposibilidad final como acción de revertir/volver atrás, no como mera negativa general.'
  spanish_consistency_notes:
  - Se usa «Mira» para הִנֵּה en línea con el estilo POB de mantener el forcejeo de atención sin recurrir a un calco arcaizante.
  - «Bendecir» se conserva como verbo, no como sustantivo, para reflejar la construcción hebrea con mayor precisión.
  - «Revertirlo» comunica el valor de volver atrás/deshacer del Hiphil de שוב, evitando un tono demasiado técnico o eclesiástico.
  - No se sustituye el sujeto implícito por «Dios» en el cuerpo principal para preservar la ambigüedad controlada del hebreo.
