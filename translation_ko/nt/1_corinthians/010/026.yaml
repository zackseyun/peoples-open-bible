lexical_decisions:
- source_word: τοῦ κυρίου ἡ γῆ
  english_pob_choice: the earth is the Lord’s
  chosen_korean: 땅과 거기에 충만한 것이 야훼의 것
  alternatives_korean:
  - 땅과 거기에 충만한 것이 주의 것
  lexicon: BDAG
  rationale: 시편 24:1 (LXX 23:1) 직접 인용. 인용된 시편의 「주(κύριος)」는 히브리어 본문의 יהוה를 그대로 옮긴 70인역 정형이다. DOCTRINE.md의 야훼 정책에 따라 인용된 구약 본문은 「야훼」로 옮긴다.
theological_decisions:
- issue: 10:26 시편 24:1 인용에서 κύριος = יהוה
  chosen_reading: 「땅과 거기에 충만한 것이 야훼의 것」 — 인용된 구약의 야훼를 표면화
  alternative_readings:
  - 「주의 것」 — 신약 본문의 표면적 호칭을 유지
  rationale: 본문은 시편을 통째 인용한다. 인용된 시편의 「주」는 70인역이 야훼를 옮긴 정형이므로, 한국어 본문에서 「야훼」로 옮겨 인용 출처를 분명히 한다. 이는 야훼-언약의 무게를 본문에서 살리기 위한 DOCTRINE.md의 일관된 정책이다.
  doctrine_reference: 'DOCTRINE.md: κύριος (= YHWH in OT citation) → 야훼 with footnote'
