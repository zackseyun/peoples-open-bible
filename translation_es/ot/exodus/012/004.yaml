revisions:
- from: Y si la casa es demasiado pequeña para un cordero[a], él y su vecino más cercano tomarán uno, según el número de personas; cada hombre, según lo que pueda comer[b], ustedes lo calcularán para el cordero.
  to: Y si el hogar es demasiado pequeño para un cordero[a], entonces él y su vecino más cercano a su casa tomarán uno, según el número de personas; cada hombre, según lo que pueda comer[b], harán el cálculo para el cordero.
  rationale: Se ajusta 'la casa' a 'el hogar' para reflejar mejor el sentido de unidad doméstica; se explicita de modo natural la cercanía del vecino con 'más cercano a su casa'; y se reemplaza 'ustedes lo calcularán' por 'harán el cálculo', que evita un objeto añadido y suena más idiomático en español mientras conserva el sentido de cómputo del hebreo. También se corrige la redacción de la nota b.
  reviewer_model: gpt-5.4
