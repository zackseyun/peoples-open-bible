base_translation:
  language: en
  yaml_path: translation/ot/isaiah/043/020.yaml
  text: The beasts of the field will honor me[a], jackals and ostriches, because I give water in the wilderness, rivers in the wasteland, to give drink to my people[c][b], my chosen ones.
  footnotes:
  - marker: a
    text: Or 'dragons' for תַּנִּים in older English tradition; the Hebrew here is more likely 'jackals.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'daughters of the ostrich,' an idiom for ostriches; older translations sometimes read 'owls.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my chosen'; the Hebrew is singular, likely a corporate reference to Israel.
    reason: lexical_alternative
