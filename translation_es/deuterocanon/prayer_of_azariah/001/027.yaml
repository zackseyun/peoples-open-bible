translation:
  language: es
  text: Y él hizo el interior del horno como un viento de rocío silbante[a]; y el fuego no los tocó en absoluto, ni los afligió ni los molestó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un viento cargado de rocío» o «como un espíritu de rocío». El griego πνεῦμα puede significar «viento», «aliento» o «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησε
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo que fuera
  - volvió
  - hizo llegar a ser
  lexicon: BDAG
  rationale: 'ποιέω expresa aquí una acción causativa directa: el sujeto produce el estado descrito. «Hizo» conserva esa sencillez y no añade un matiz interpretativo innecesario.'
- source_word: τὸ μέσον τῆς καμίνου
  english_pob_choice: the inside of the furnace
  chosen_spanish: el interior del horno
  alternatives_spanish:
  - el medio del horno
  - el centro del horno
  - la mitad del horno
  lexicon: LSJ
  rationale: μέσον designa el espacio interior o central. En español, «el interior del horno» es natural y mantiene el sentido espacial sin sonar arcaico.
- source_word: ὡς πνεῦμα δρόσου
  english_pob_choice: like a whistling dew-laden wind
  chosen_spanish: como un viento de rocío
  alternatives_spanish:
  - como un viento rociado de rocío
  - como un viento de dew
  - como un espíritu de rocío
  lexicon: LSJ
  rationale: πνεῦμα puede significar viento, aliento o espíritu; aquí el contexto físico favorece «viento». δρόσου aporta la idea de rocío/cool moisture, por eso «de rocío» conserva la imagen refrescante sin convertirla en un sentido teológico.
- source_word: διασυρίζον
  english_pob_choice: whistling
  chosen_spanish: silbante
  alternatives_spanish:
  - silbando
  - que silbaba
  - chillando
  lexicon: LSJ
  rationale: El participio comunica un movimiento o sonido de soplo/viento. «Silbante» es una solución compacta y sobria que conserva el efecto auditivo.
- source_word: οὐχ ἥψατο αὐτῶν τὸ καθόλου τὸ πῦρ
  english_pob_choice: the fire did not touch them at all
  chosen_spanish: el fuego no los tocó en absoluto
  alternatives_spanish:
  - el fuego no los tocó para nada
  - el fuego no tuvo contacto alguno con ellos
  - el fuego no los alcanzó en absoluto
  lexicon: BDAG
  rationale: ἅπτομαι significa «tocar». «No los tocó en absoluto» mantiene el énfasis total del griego; «en absoluto» traduce bien τὸ καθόλου.
- source_word: ἐλύπησεν
  english_pob_choice: distress
  chosen_spanish: afligió
  alternatives_spanish:
  - entristeció
  - dolió
  - causó dolor
  lexicon: BDAG
  rationale: El verbo puede abarcar dolor, pena o aflicción. En este contexto de daño físico, «afligió» comunica sufrimiento o perjuicio sin restringirse solo a dolor corporal.
- source_word: παρηνώχλησεν
  english_pob_choice: trouble
  chosen_spanish: molestó
  alternatives_spanish:
  - perturbó
  - incomodó
  - acosó
  lexicon: LSJ
  rationale: El verbo expresa causar molestia, dificultad o perturbación. «Molestó» es amplio y natural en español; junto con «afligió» preserva la doble negación de daño.
theological_decisions:
- issue: Sujeto implícito de «hizo»
  english_pob_reading: The subject is left as 'he,' following the Greek's implicit reference to God in context.
  chosen_spanish_reading: Se conserva el sujeto implícito y se traduce con «Y él hizo», sin nombrar explícitamente a Dios ni al ángel.
  alternative_spanish_readings:
  - Y Dios hizo
  - Y el ángel hizo
  rationale: El griego no explicita el sujeto; el contexto amplio remite a la acción divina, pero la frase misma no la desarrolla. Mantener «él» respeta esa economía y evita resolver una ambigüedad que el texto no resuelve de forma explícita.
  doctrine_reference: Preservar la tensión contextual sin sobreespecificar el agente.
- issue: Sentido de πνεῦμα en un contexto milagroso
  english_pob_reading: Rendered as 'dew-laden wind' rather than 'spirit.'
  chosen_spanish_reading: Se vierte como «viento de rocío», con valor físico y atmosférico.
  alternative_spanish_readings:
  - espíritu de rocío
  - aliento de rocío
  - viento rociado de rocío
  rationale: Aunque πνεῦμα puede significar «espíritu», aquí el escenario dentro del horno favorece una corriente de aire refrescante. «Viento de rocío» evita introducir una lectura espiritual no exigida por el pasaje.
  doctrine_reference: Primacía del sentido original en contexto sobre una tradición interpretativa fija.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión inglés: la decisión final pasó de «breeze of dew» a «dew-laden wind». Por eso se privilegió en español una imagen de aire físico y refrescante («viento de rocío») y no una paráfrasis espiritualizada. También se conservó la doble negación de daño («no los tocó en absoluto, ni los afligió ni los molestó») para reflejar el énfasis acumulativo del griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se usó «horno» para καμίνου por ser el equivalente natural y claro en español bíblico actual.
  - Se prefirió «afligió» y «molestó» para distinguir las dos cláusulas negativas finales sin introducir sinónimos demasiado interpretativos.
