    rationale: Las notas deben aparecer exactamente en la palabra o frase pertinente. Tal como está, el lector entenderá erróneamente que la nota comenta 'toda su casa' en vez de los 'prodigios... terribles'.
  revised_spanish_text: Yahvé dio señales y prodigios grandes y terribles[b] en Egipto[a], contra Faraón y contra toda su casa, ante nuestros ojos.
