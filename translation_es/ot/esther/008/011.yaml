translation:
  language: es
  text: que el rey concedió a los judíos en cada ciudad reunirse y levantarse en defensa de sus vidas[a], para destruir, matar y aniquilar a toda fuerza armada de cualquier pueblo o provincia que los atacara, niños y mujeres[b], y para saquear sus despojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estar por sus vidas». El hebreo literalmente dice «estar sobre sus vidas», una expresión idiomática de defensa o autoprotección.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «niños y mujeres». La formulación incluye explícitamente a estos dentro del grupo enemigo descrito por el decreto.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר נָתַן
  english_pob_choice: that ... granted
  chosen_spanish: que ... concedió
  alternatives_spanish:
  - que ... dio
  - que ... autorizó
  lexicon: HALOT
  rationale: En un contexto de decreto real, «concedió» comunica mejor la autorización jurídica que un simple «dio», y mantiene el sentido de otorgamiento formal del original.
- source_word: בְּכָל עִיר וָעִיר
  english_pob_choice: in every city
  chosen_spanish: en cada ciudad
  alternatives_spanish:
  - en toda ciudad
  - en cada una de las ciudades
  lexicon: HALOT
  rationale: La repetición hebrea tiene fuerza distributiva; «en cada ciudad» la conserva de manera natural en español sin volverla pesada.
- source_word: לְהִקָּהֵל
  english_pob_choice: to assemble
  chosen_spanish: reunirse
  alternatives_spanish:
  - asamblearse
  - juntarse
  lexicon: HALOT
  rationale: El infinitivo niphal expresa congregarse como cuerpo. «Reunirse» es claro y digno en español contemporáneo.
- source_word: וְלַעֲמֹד עַל נַפְשָׁם
  english_pob_choice: and to stand for their lives
  chosen_spanish: y estar por sus vidas
  alternatives_spanish:
  - y defender sus vidas
  - y ponerse por sus vidas
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «estar por» sin convertirla de inmediato en una interpretación más explícita como «defender». La frase queda algo tensional, como en el hebreo.
- source_word: לְהַשְׁמִיד וְלַהֲרֹג וּלְאַבֵּד
  english_pob_choice: to destroy, to kill, and to annihilate
  chosen_spanish: para destruir, matar y aniquilar
  alternatives_spanish:
  - para destruir, degollar y hacer perecer
  - para exterminar, matar y destruir
  lexicon: HALOT
  rationale: La tríada intensiva debe preservarse sin suavizarse. «Aniquilar» da fuerza distinta a אבד y evita perder la progresión verbal.
- source_word: כָּל חֵיל
  english_pob_choice: every armed force
  chosen_spanish: toda fuerza armada
  alternatives_spanish:
  - todo ejército
  - todo poder militar
  lexicon: HALOT
  rationale: חֵיל aquí apunta a fuerza militar/armada. «Fuerza armada» es más exacto que «ejército» para un término más amplio y colectivo.
- source_word: עַם וּמְדִינָה
  english_pob_choice: of any people or province
  chosen_spanish: de cualquier pueblo o provincia
  alternatives_spanish:
  - de cualquier nación o provincia
  - de cualquier pueblo y provincia
  lexicon: HALOT
  rationale: La pareja lexical es amplia y políticamente indefinida; «pueblo o provincia» refleja esa amplitud sin introducir una equivalencia demasiado moderna.
- source_word: הַצָּרִים אֹתָם
  english_pob_choice: that would attack them
  chosen_spanish: que los atacara
  alternatives_spanish:
  - que les fueran hostiles
  - que se les opusieran
  lexicon: HALOT
  rationale: El participio de צרר en este contexto de defensa se entiende como agresión hostil. «Los atacara» hace explícita la acción sin borrar el matiz de enemistad implícita.
- source_word: טַף וְנָשִׁים
  english_pob_choice: children and women
  chosen_spanish: niños y mujeres
  alternatives_spanish:
  - pequeños y mujeres
  - hijos pequeños y mujeres
  lexicon: HALOT
  rationale: Se conserva la expresión directa del hebreo sin atenuarla ni reinterpretarla. El orden del original se mantiene.
- source_word: וּשְׁלָלָם לָבוֹז
  english_pob_choice: and to plunder their spoil
  chosen_spanish: y para saquear sus despojos
  alternatives_spanish:
  - y para apoderarse de su botín
  - y para tomar como botín sus bienes
  lexicon: HALOT
  rationale: «Despojos» refleja el campo semántico de שָׁלָל y permite reproducir la fórmula legal de saqueo sin diluirla en un término más general como «bienes».
theological_decisions:
- issue: Lenguaje de violencia en el decreto
  english_pob_reading: Render the decree's violent authorization directly without softening it, while preserving its defensive framing in context.
  chosen_spanish_reading: Traducir de manera directa la autorización violenta del decreto, sin suavizarla, y conservar a la vez su marco defensivo en contexto.
  alternative_spanish_readings:
  - usar verbos atenuados como «vencer» o «derrotar»
  - parafrasear como si solo fuera «defenderse de atacantes»
  rationale: El texto hebreo enumera verbos de destrucción y asesinato de forma acumulativa; la traducción no debe rebajar esa fuerza. «Que los atacara» mantiene el marco hostil/defensivo sin borrar la severidad del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de «niños y mujeres»
  english_pob_reading: Treat 'children and women' as part of the hostile group described in the decree and translate transparently without resolving ethical tension.
  chosen_spanish_reading: Presentar «niños y mujeres» de forma transparente, como parte del grupo aludido en el decreto, sin resolver la tensión ética del pasaje.
  alternative_spanish_readings:
  - omitir la frase
  - reformularla para aplicarla solo al botín o al resultado
  rationale: La sintaxis hebrea vincula la expresión con el grupo objetivo. Conservarla evita sanitizar el texto y respeta la tensión moral que el pasaje presenta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Tomé en cuenta la última revisión inglesa, que eliminó «single» y «including» y prefirió «would attack». Por eso no añadí intensificadores como «mismo» o «inclusive», y mantuve una formulación directa de futuro/condicional con «que los atacara», sin expandir el texto más allá de lo que el hebreo requiere.
  spanish_consistency_notes:
  - He usado «Yahvé» solo cuando no aparece el Tetragrámaton en este versículo; aquí no aplica.
  - Conservé «fuerza armada» para חֵיל en coherencia con el criterio PO B de precisión militar.
  - Mantuve la tríada verbal completa para no borrar la gradación del hebreo.
  - Elegí «despojos» en lugar de «botín» por la fórmula más literal de שָׁלָל en este contexto legal.
  - La sintaxis en español busca permanecer cercana al orden y alcance del hebreo sin sonar artificial.
