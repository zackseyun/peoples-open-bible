translation:
  language: es
  text: Porque él ha aflojado su cuerda[a] y me ha afligido, ellos han desechado toda contención[b] ante mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su cuerda de arco». El hebreo puede referirse más específicamente a una cuerda de arco que a una cuerda en general.
    reason: lexical_alternative
  - marker: b
    text: Lit. «han soltado la rienda delante de mí»; es decir, «han desechado toda contención en mi presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal del versículo con naturalidad en español y conserva el valor explicativo del hebreo.
- source_word: יִתְרוֹ
  english_pob_choice: his cord
  chosen_spanish: su cordón
  alternatives_spanish:
  - su cuerda
  - su arco
  lexicon: HALOT
  rationale: La imagen básica de ‘cordón/cuerda’ preserva el metáfora sin decidir de manera innecesaria por ‘arco’ o ‘cuerda de arco’; la alternativa específica se documenta en nota.
- source_word: פִּתַּח
  english_pob_choice: has loosened
  chosen_spanish: ha aflojado
  alternatives_spanish:
  - ha soltado
  - ha desatado
  lexicon: HALOT
  rationale: Con un objeto como ‘cordón’, el verbo expresa mejor la acción de aflojar o soltar que la de ‘abrir’.
- source_word: וַיְעַנֵּנִי
  english_pob_choice: and afflicted me
  chosen_spanish: y me ha afligido
  alternatives_spanish:
  - y me ha humillado
  - y me ha abatido
  lexicon: HALOT
  rationale: Se mantiene el sentido de sufrimiento/aflicción que el contexto exige, evitando tomar el verbo como ‘responder’.
- source_word: וְרֶסֶן
  english_pob_choice: restraint
  chosen_spanish: la rienda
  alternatives_spanish:
  - el freno
  - la contención
  lexicon: HALOT
  rationale: ‘Rienda’ conserva el trasfondo literal de brida/freno y permite que el modismo español siga siendo inteligible; la idea idiomática de falta de contención queda implícita.
- source_word: מִפָּנַי
  english_pob_choice: before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: Mantiene la imagen espacial del hebreo con una formulación natural en español.
- source_word: שִׁלֵּחוּ
  english_pob_choice: they have cast off
  chosen_spanish: han quitado
  alternatives_spanish:
  - han soltado
  - han echado fuera
  lexicon: HALOT
  rationale: Con ‘rienda’ como objeto, el verbo puede expresarse como ‘quitar’ en español sin perder el sentido de liberar o soltar la restricción; se conserva la tensión idiomática mediante la nota.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: conserva el paralelismo causal, mantiene la ambigüedad léxica de יִתְרוֹ con nota, y reproduce la imagen de רֶסֶן/שִׁלֵּחוּ mediante una formulación española natural sin borrar el modismo.'
  spanish_consistency_notes:
  - Se usa ‘Dios/Yahvé’ solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton explícito.
  - Se evita ‘SEÑOR’ por convención de máscara; no aplica aquí.
  - ‘Afligido’ se usa para ענה en su sentido de sufrimiento, en línea con el contexto de Job.
  - ‘Rienda’ conserva el campo semántico de brida/freno y permite la nota explicativa sobre el modismo.
