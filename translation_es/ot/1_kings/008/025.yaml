  to: 'Y ahora, Yahvé, Dios de Israel, guarda para tu siervo David, mi padre, lo que le hablaste, diciendo: «No te faltará un hombre delante de mí[a] que se siente sobre el trono de Israel, con tal de que tus hijos guarden su camino, para andar delante de mí como tú has andado delante de mí».'
