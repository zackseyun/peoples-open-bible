id: T12P.GAD.3.1
reference: Testament of Gad 3:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: III. Καὶ νῦν ἀκούσατε¹ λόγον² ἀληθείας³, *τοῦ ποιεῖν⁴ δικαιοσύνην, καὶ πάντα⁵ νόμον⁶ ὑψίστου, καὶ μὴ⁷ πλανᾶσθε⁸ τέκνα *τῷ πνεύματι⁹ τοῦ μίσους¹⁰, ὅτι κακόν ἐστιν ἐπὶ πάσαις ταῖς¹¹ πράξεσι τῶν¹¹ ἀνθρώπων.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/003/001.yaml
  text: 'And now hear a word of truth: listen in order to practice righteousness and every law of the Most High, and do not be led astray, children, by the spirit of hatred, because it is evil in all the deeds of men.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:48Z'
    unchanged: false
    changes_summary: Adjusted 'so as to' to 'in order to' for slightly more formal natural English, and removed 'my' before 'children' since it is not present in the Greek.
translation:
  language: es
  text: 'Y ahora oíd una palabra de verdad[a]: escuchad para practicar la justicia y toda ley del Altísimo, y no os dejéis extraviar, hijos, por el espíritu de odio[b], porque es maligno en todas las acciones de los hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'oíd la palabra verdadera'; la apertura griega admite tanto una formulación indefinida como una más definida en clave exhortativa.
    reason: lexical_alternative
  - marker: b
    text: 'Griego πνεῦμα τοῦ μίσους: el genitivo permite una lectura personificada (''el espíritu de odio'') o atributiva (''un espíritu odioso''); el contexto del capítulo favorece la primera.'
    reason: theological_note
lexical_decisions:
- source_word: λόγον ἀληθείας
  english_pob_choice: a word of truth
  chosen_spanish: una palabra de verdad
  alternatives_spanish:
  - una palabra verdadera
  - la palabra de verdad
  lexicon: LSJ
  rationale: Conserva la solemnidad introductoria del testamento sin sobreespecificar el artículo.
- source_word: τοῦ ποιεῖν δικαιοσύνην
  english_pob_choice: in order to practice righteousness
  chosen_spanish: para practicar la justicia
  alternatives_spanish:
  - a fin de hacer justicia
  - para obrar la justicia
  lexicon: LSJ
  rationale: El infinitivo expresa propósito; 'para practicar' preserva la fuerza parenética de que oír es para obedecer.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: LSJ
  rationale: Default POB para δικαιοσύνη; en este contexto ético abarca conducta recta ante Dios.
- source_word: νόμον ὑψίστου
  english_pob_choice: every law of the Most High
  chosen_spanish: toda ley del Altísimo
  alternatives_spanish:
  - todo mandamiento del Altísimo
  lexicon: LSJ
  rationale: Mantiene el título divino elevado y el sentido distributivo de πάντα con νόμον.
- source_word: πλανᾶσθε
  english_pob_choice: be led astray
  chosen_spanish: os dejéis extraviar
  alternatives_spanish:
  - os extraviéis
  - seáis engañados
  lexicon: LSJ
  rationale: El matiz medio/pasivo sugiere ser desviado por una influencia externa, aquí el espíritu de odio.
- source_word: πνεύματι τοῦ μίσους
  english_pob_choice: the spirit of hatred
  chosen_spanish: el espíritu de odio
  alternatives_spanish:
  - un espíritu de odio
  - el espíritu odioso
  lexicon: LSJ
  rationale: Conserva la fuerza moral personificada que es central a la advertencia del capítulo.
- source_word: κακόν
  english_pob_choice: evil
  chosen_spanish: maligno
  alternatives_spanish:
  - malo
  - perverso
  lexicon: BDAG
  rationale: '''Maligno'' refleja el matiz moral-espiritual del adjetivo en este contexto eticista.'
theological_decisions:
- issue: Personificación del odio como fuerza espiritual
  chosen_reading: Traducir πνεύματι τοῦ μίσους como 'el espíritu de odio' en el texto principal
  alternative_readings:
  - por un espíritu de odio
  - por intención odiosa
  rationale: El griego permite naturalmente una fuerza moral personificada o cuasipersonificada. Conservar 'espíritu' mantiene la textura moral-psicológica del Testamento sin forzar una lectura plenamente demonológica.
  doctrine_reference: DOCTRINE.md §Preservar la tensión teológica
translation_notes:
  revision_awareness: El revision_pass inglés cambió 'so as to' por 'in order to' y eliminó 'my' antes de 'children' por no estar en el griego; en español usamos 'hijos' en vocativo sin posesivo y 'para' como conjunción final natural, alineándonos con la revisión.
  spanish_consistency_notes:
  - '''hijos'' sin posesivo cuando el griego no lo lleva, en línea con la revisión inglesa.'
  - '''el Altísimo'' para ὑψίστου como título divino consistente.'
  - '''espíritu'' (con minúscula) para πνεῦμα cuando refiere a fuerza moral no divina.'
