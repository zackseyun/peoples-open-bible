translation:
  language: es
  text: Entonces ella se fue de él, y cerró la puerta detrás de ella y detrás de sus hijos; ellos se los traían[a], y ella iba vertiendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo simplemente dice: «ellos traían a ella» o «le traían»; el objeto queda implícito por el contexto inmediato de los recipientes vacíos en los versículos anteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּ֨לֶךְ֙ מֵֽ/אִתּ֔/וֹ
  english_pob_choice: So she went from him
  chosen_spanish: Entonces ella se fue de él
  alternatives_spanish:
  - Y se fue de él
  - Entonces salió de junto a él
  lexicon: HALOT
  rationale: El hebreo expresa alejamiento de alguien mediante מֵאִתּוֹ, literalmente 'de con él'. En español, 'se fue de él' comunica el alejamiento narrativo sin calcar una estructura extraña.
- source_word: וַ/תִּסְגֹּ֣ר הַ/דֶּ֔לֶת
  english_pob_choice: and shut the door
  chosen_spanish: y cerró la puerta
  alternatives_spanish:
  - y cerró la puerta con llave
  - y la trabó
  lexicon: HALOT
  rationale: סגר significa 'cerrar / cerrar de golpe / cerrar'. 'Cerró la puerta' es natural y fiel; 'cerró' mantiene el acto concreto sin añadir un matiz no explícito.
- source_word: בַּעֲדָ֖/הּ וּ/בְעַ֣ד בָּנֶ֑י/הָ
  english_pob_choice: behind her and behind her sons
  chosen_spanish: detrás de ella y detrás de sus hijos
  alternatives_spanish:
  - tras ella y tras sus hijos
  - por detrás de ella y por detrás de sus hijos
  lexicon: HALOT
  rationale: El complemento בְּעַד con cerrar la puerta indica quedar encerrados al otro lado de la puerta. 'Detrás de ella' preserva el paralelismo y evita una traducción demasiado interpretativa.
- source_word: הֵ֛ם מַגִּשִׁ֥ים אֵלֶ֖י/הָ
  english_pob_choice: they were bringing them to her
  chosen_spanish: ellos se lo traían
  alternatives_spanish:
  - ellos le traían eso
  - ellos se los traían
  lexicon: HALOT
  rationale: El objeto no está expresado en el hebreo de esta cláusula, pero el contexto inmediato lo aporta. En español, 'se lo traían' mantiene la acción continua y la referencia implícita sin añadir un sustantivo no escrito.
- source_word: וְ/הִ֥יא מיצקת
  english_pob_choice: and she was pouring
  chosen_spanish: y ella iba vertiendo
  alternatives_spanish:
  - y ella estaba vertiendo
  - y ella vertía
  lexicon: HALOT
  rationale: El participio indica acción en progreso. 'Iba vertiendo' suena más natural en español narrativo que un calco como 'estaba vertiendo', y conserva la continuidad de la escena.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que eliminó la adición explícita ''the vessels'' y prefirió ''behind her'' por naturalidad. En español se siguió ese mismo criterio: no se añadió un sustantivo explícito para el objeto implícito, y se mantuvo la relación espacial de manera natural y no recargada.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - '''Ellos se lo traían'' conserva la implícita referencia al objeto del contexto, sin introducir ''vasijas'' en el cuerpo del versículo.'
  - '''Iba vertiendo'' refleja el aspecto progresivo del participio hebreo sin volver la frase artificial en español.'
  - Se mantuvo un español neutral y readable para uso eclesial, evitando arcaísmos innecesarios.
