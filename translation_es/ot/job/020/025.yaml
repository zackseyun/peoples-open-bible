translation:
  language: es
  text: Él lo saca[a], y sale de su cuerpo; una punta reluciente[b] sale de su hiel; terrores vienen sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la hoja reluciente sale de su hiel»; el hebreo usa imaginería corporal vívida y puede referirse a la punta brillante del arma mientras emerge.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de su amargura»; el hebreo puede usar «hiel» con resonancia figurada, pero aquí parece primario el sentido corporal.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁלַף
  english_pob_choice: He pulls it out
  chosen_spanish: Él lo saca
  alternatives_spanish:
  - Él lo extrae
  - Él lo tira hacia afuera
  lexicon: HALOT
  rationale: שָׁלַף expresa sacar o extraer, a menudo un arma. «Lo saca» conserva la acción directa y funciona de manera natural en español sin perder la fuerza del verbo.
- source_word: וַיֵּצֵא
  english_pob_choice: and it comes
  chosen_spanish: y sale
  alternatives_spanish:
  - y sale afuera
  - y se sale
  lexicon: HALOT
  rationale: El verbo indica salir; en español, «sale» reproduce bien el movimiento de salida y armoniza con el primer hemistiquio.
- source_word: מִגֵּוָה
  english_pob_choice: from his body
  chosen_spanish: de su cuerpo
  alternatives_spanish:
  - de su torso
  - de su cuerpo entero
  lexicon: HALOT
  rationale: גֵּוָה se refiere al cuerpo o torso. «Cuerpo» es la opción más clara y natural en español, sin especificar de más la anatomía.
- source_word: וּבָרָק
  english_pob_choice: a flashing point
  chosen_spanish: una punta relampagueante
  alternatives_spanish:
  - un destello
  - una hoja reluciente
  - una punta brillante
  lexicon: HALOT
  rationale: בָרָק puede denotar relámpago o brillo fulgurante. En este contexto corporal y bélico, la imagen probable es la punta/hoja que brilla al salir; «punta relampagueante» conserva la viveza y la referencia al arma sin imponer «espada» que el hebreo no explicita.
- source_word: מִמְּרֹרָתוֹ
  english_pob_choice: from his gall
  chosen_spanish: de su hiel
  alternatives_spanish:
  - de su amargura
  - de su vesícula biliar
  lexicon: HALOT
  rationale: מְרֹרָה puede significar hiel/bilis y, por extensión, amargura. Aquí predomina el sentido corporal; «hiel» mantiene la fuerza visceral y deja abierta la posible resonancia metafórica.
- source_word: יַהֲלֹךְ עָלָיו
  english_pob_choice: come upon him
  chosen_spanish: se abalanzan sobre él
  alternatives_spanish:
  - caen sobre él
  - lo invaden
  - vienen sobre él
  lexicon: HALOT
  rationale: הלך con על puede expresar el venir o ir sobre alguien. «Se abalanzan sobre él» comunica bien en español la irrupción amenazante y el golpe repentino de los terrores.
- source_word: אֵמִים
  english_pob_choice: terrors
  chosen_spanish: terrores
  alternatives_spanish:
  - espantos
  - horrores
  - miedos
  lexicon: HALOT
  rationale: אֵמִים es plural y designa terrores o cosas terribles. «Terrores» preserva la pluralidad e intensidad del término.
translation_notes:
  revision_awareness: He seguido el sentido principal del hebreo y la lectura auditada en inglés, pero he evitado depender mecánicamente del inglés cuando el español pedía una imagen más natural. En particular, he conservado la ambigüedad entre arma y filo reluciente, y entre «hiel» como término corporal y su posible eco figurado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el tetragrama ni un equivalente directo.
  - «Hiel» se eligió por su densidad bíblica y corporal; se indicó en nota la alternativa metafórica «amargura».
  - Se tradujo el plural intensivo אֵמִים como «terrores», no como un singular abstracto.
  - La puntuación separa claramente los tres miembros poéticos del verso, siguiendo el paralelismo hebreo.
