translation:
  language: es
  text: 'Pero ustedes hicieron beber vino a los nazireos[a], y ordenaron a los profetas: «No profeticen»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los consagrados». El hebreo «nazireos» se refiere a personas bajo un voto especial de consagración, que incluía abstenerse del vino.
    reason: lexical_alternative
  - marker: b
    text: O «No profetizarán». El hebreo expresa una prohibición dirigida a los profetas.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּשְׁקוּ
  english_pob_choice: you made ... drink
  chosen_spanish: hicieron beber
  alternatives_spanish:
  - les dieron de beber
  - los hicieron beber
  - causaron que bebieran
  lexicon: HALOT
  rationale: El Hiphil es causativo; en español, «hicieron beber» comunica con naturalidad la acción inducida sin perder la fuerza de causación.
- source_word: הַנְּזִרִים
  english_pob_choice: the Nazirites
  chosen_spanish: los nazareos
  alternatives_spanish:
  - los naziritas
  - los consagrados
  - los hombres del voto nazareo
  lexicon: HALOT
  rationale: «Nazareos» conserva la categoría técnica del voto de consagración. Evita diluir el término en una paráfrasis y mantiene la especificidad cultural y religiosa del hebreo.
- source_word: יָיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: «Vino» es la equivalencia directa y clara; el contexto de la prohibición nazarea hace evidente su relevancia.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - a los profetas
  lexicon: HALOT
  rationale: Se conserva el sustantivo común y su referencia a los portavoces de Yahvé en contexto.
- source_word: צִוִּיתֶם
  english_pob_choice: you commanded
  chosen_spanish: les ordenaron
  alternatives_spanish:
  - les mandaron
  - les dieron la orden
  lexicon: HALOT
  rationale: «Ordenaron» expresa con fuerza la imposición de la prohibición y funciona bien con el complemento dativo implícito en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - al decir
  lexicon: HALOT
  rationale: «Diciendo» reproduce la función introductoria del infinitivo sin añadir contenido extra.
- source_word: לֹא תִּנָּבְאֽוּ
  english_pob_choice: Do not prophesy
  chosen_spanish: No profeticen
  alternatives_spanish:
  - No profeticéis
  - No deben profetizar
  lexicon: HALOT
  rationale: El plural imperativo negativo en español natural es «No profeticen». Conserva el carácter de prohibición directa sin volverla demasiado interpretativa.
theological_decisions:
- issue: Cómo traducir הַנְּזִרִים sin perder la tensión teológica del voto de consagración
  english_pob_reading: Nazirites
  chosen_spanish_reading: nazareos
  alternative_spanish_readings:
  - naziritas
  - consagrados
  rationale: La ofensa radica en corromper a personas apartadas para Dios. «Nazareos» mantiene la categoría técnica y deja visible la tensión religiosa del pasaje; «consagrados» suavizaría demasiado el término.
  doctrine_reference: Números 6; traducción con primacía del texto original y preservación del peso cultual del voto nazareo.
- issue: Forma de la prohibición profética final
  english_pob_reading: Do not prophesy
  chosen_spanish_reading: No profeticen
  alternative_spanish_readings:
  - No profeticéis
  - No deben profetizar
  rationale: La prohibición es directa y breve; el imperativo negativo en español refleja mejor la orden comunicada a los profetas que una perífrasis modal.
  doctrine_reference: Amós 2:12; conservación del mandato prohibitivo como discurso citado.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se preservó la causación de שׁקה con una estructura natural en español, se mantuvo el término técnico para הַנְּזִרִים, y se reflejó la revisión final del inglés al optar por una prohibición directa («No profeticen») en lugar de una paráfrasis modal.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto cuando corresponda; en este versículo no aparece el tetragrámaton.
  - Se prefirió «nazareos» como transliteración española funcional del término técnico, coherente con la preservación de categorías cultuales específicas.
  - La puntuación y las comillas angulares siguen el uso tipográfico español.
  - El plural verbal «hicieron» mantiene el sujeto implícito de segunda persona plural del hebreo.
  - La frase final se redactó como discurso citado directo para conservar el tono imperativo del original.
