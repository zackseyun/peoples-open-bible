review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: «distinguir entre» corresponde a διαστεῖλαι ἀνὰ μέσον; «el justo y el pecador» preserva adecuadamente los singulares genéricos; «retribuir a los pecadores... según sus obras» comunica correctamente ἀποδοῦναι ἁμαρτωλοῖς ... κατὰ τὰ ἔργα αὐτῶν. La nota sobre εἰς τὸν αἰῶνα también preserva la alternativa literal.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema de naturalidad y precisión idiomática en la nota a: «separar entre» suena poco natural en español. En el texto principal, «retribuir» es correcto, pero «dar a los pecadores su merecido» sería más interpretativo; por eso conviene conservar «retribuir». Solo se requiere ajuste menor de la nota lexical alternativa.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Justo», «pecador», «obras» y «para siempre» están bien alineados con las decisiones auditadas. No aparecen términos sensibles del glosario mayor (Yahvé, Mesías, esclavo, etc.).
  issues:
  - severity: medium
    issue: La nota al pie a usa «separar entre», que no es español natural.
    rationale: Aunque calca de cerca la alternativa inglesa «separate between», en español la formulación idiomática sería «separar al justo del pecador» o «hacer separación entre...». La nota debe presentar una alternativa fiel y legible.
  revised_spanish_text: para distinguir entre el justo y el pecador[a], para retribuir a los pecadores para siempre[b] según sus obras.
  revised_footnotes:
  - marker: a
    text: O «separar al justo del pecador».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «para el siglo»; aquí probablemente significa de manera duradera o para siempre.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse porque es fiel, claro y natural. Se corrige únicamente la nota alternativa de διαστεῖλαι / ἀνὰ μέσον para evitar un giro no idiomático en español.
