translation:
  text: But if our way of life in the place of our exile has been caught up in ungodliness[a], then, after rescuing us from the hand of our enemies, destroy us by whatever death you choose[b], Master.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in our colony/settlement'; the Greek term can denote a colony or settlement, but here likely refers to the community's life in exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'Lord' or 'Sovereign' for 'Master'; the Greek address is δέσποτα, not κύριος.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσεβείας
  chosen: ungodliness
  alternatives:
  - impiety
  - wickedness
  lexicon: LSJ
  rationale: ἀσέβεια denotes irreverence or impiety toward God; 'ungodliness' is clear modern English and preserves the religious-moral force better than the broader 'wickedness'.
- source_word: κατὰ τὴν ἀποικίαν
  chosen: in the place of our exile
  alternatives:
  - during our sojourn
  - throughout our colony/settlement
  - in our dispersion
  lexicon: LSJ
  rationale: ἀποικία can denote a settlement/colony, but in this prayer context it refers to the Jews' life away from their homeland. 'In the place of our exile' communicates the diasporic setting more naturally than the potentially misleading 'colony.'
- source_word: ὁ βίος ἡμῶν
  chosen: our way of life
  alternatives:
  - our life
  - our conduct
  lexicon: LSJ
  rationale: βίος here points not merely to existence but to manner of living. 'Way of life' captures that ethical nuance in idiomatic English.
- source_word: ἐνέσχηκται
  chosen: has been caught up
  alternatives:
  - has been involved
  - has been entangled
  - has persisted
  lexicon: LSJ
  rationale: The perfect form suggests a state of having become involved or entangled. 'Has been caught up' conveys implication in ungodliness without over-specifying the mechanism.
- source_word: ῥυσάμενος
  chosen: after rescuing
  alternatives:
  - having delivered
  - after saving
  lexicon: LSJ
  rationale: The aorist participle is prior to the main imperative ἀπόλεσον. 'After rescuing' makes the sequence explicit in natural English.
- source_word: ἀπὸ ἐχθρῶν χειρός
  chosen: from the hand of our enemies
  alternatives:
  - from our enemies' hand
  - from hostile power
  lexicon: LSJ
  rationale: This is a standard idiom for deliverance from another's power. 'From the hand of our enemies' preserves the biblical idiom and remains understandable.
- source_word: ᾧ προαιρῇ
  chosen: by whatever death you choose
  alternatives:
  - as you prefer
  - in whatever way you decide
  lexicon: LSJ
  rationale: The dative relative with προαιρέω expresses divine choice or preference regarding the manner of death. Because it modifies μόρῳ, the English brings the sense together as 'by whatever death you choose.'
- source_word: δέσποτα
  chosen: Master
  alternatives:
  - Lord
  - Sovereign
  lexicon: LSJ
  rationale: δέσποτα is not κύριος here. 'Master' more directly reflects the Greek address of absolute authority, while avoiding conflation with the contested default rendering for κύριος.
- source_word: ἀπόλεσον ἡμᾶς μόρῳ
  chosen: destroy us by whatever death you choose
  alternatives:
  - put us to death in the manner you choose
  - bring us to ruin by a death of your choosing
  lexicon: LSJ
  rationale: ἀπόλλυμι in the imperative here is a plea for God to end their lives rather than leave them to enemies; μόρῳ specifies death/fate as the means. The combined rendering is forceful and coherent in English.
