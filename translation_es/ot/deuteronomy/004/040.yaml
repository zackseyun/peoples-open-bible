    reason: lexical_alternative
  - marker: d
    text: 'O: «en la tierra». La preposición hebrea es literalmente «sobre», pero en español también puede decirse idiomáticamente «en la tierra».'
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula central para reflejar con fidelidad que el bienestar alcanza tanto al destinatario como a su posteridad, no que le vaya bien 'con' sus hijos. También se reordenan y completan las notas al pie para alinearlas con las alternativas léxicas documentadas en el expediente inglés y con los anclajes correctos en el texto español.
