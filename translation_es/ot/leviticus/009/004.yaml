translation:
  language: es
  text: y un buey y un carnero para ofrendas de paz[a], para sacrificar delante de Yahvé[b], y una ofrenda de grano mezclada con aceite; porque hoy Yahvé se les aparecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ofrendas de comunión» u «ofrendas de bienestar».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Yahvé»; el nombre divino es יְהוָה (YHWH), no un título como «SEÑOR».
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - novillo
  lexicon: HALOT
  rationale: שׁוֹר designa un bovino para sacrificio. En español, «buey» conserva el valor general de animal bovino sacrificial sin precisar indebidamente edad o sexo, y resulta natural en un contexto cultual.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - ram
  lexicon: HALOT
  rationale: אַיִל nombra específicamente un macho de oveja. «Carnero» es el equivalente bíblico-culto más claro en español y mantiene la precisión sacrificial.
- source_word: שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - ofrendas de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: El término plural sacrificial שְׁלָמִים admite matices de paz, comunión o bienestar. «Ofrendas de paz» mantiene la forma cultual tradicional y sigue siendo transparente en español, sin borrar las alternativas semánticas.
- source_word: לִזְבֹּחַ
  english_pob_choice: to sacrifice
  chosen_spanish: sacrificarlos
  alternatives_spanish:
  - ofrecerlos en sacrificio
  - degollarlos
  lexicon: HALOT
  rationale: En este contexto ritual, זבח expresa la acción de ofrecer en sacrificio. «Sacrificarlos» conserva el sentido cultual y evita reducirlo a una mera matanza física.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La preposición לִפְנֵי significa «delante de / en presencia de». Se conserva «Yahvé» según la norma del proyecto para יְהוָה, sin ocultar el nombre divino.
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de grano
  - ofrenda de cereal
  lexicon: HALOT
  rationale: מִנְחָה en la legislación levítica es la ofrenda cereal/vegetal. «Ofrenda vegetal» es una solución bíblica clara y ampliamente comprensible en español; la alternativa «de grano» también sería viable, pero puede sonar menos natural en registro litúrgico.
- source_word: בְּלוּלָה בַשָּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - amasada con aceite
  - mezclada con el aceite
  lexicon: HALOT
  rationale: El participio describe una preparación por mezcla con aceite. «Mezclada con aceite» comunica el proceso de manera natural y fiel, sin introducir una especificación no presente en el hebreo.
- source_word: כִּי הַיּוֹם
  english_pob_choice: for today
  chosen_spanish: porque hoy
  alternatives_spanish:
  - pues hoy
  - ya que hoy
  lexicon: HALOT
  rationale: כִּי introduce la razón de la instrucción. «Porque hoy» reproduce bien el valor causal y mantiene la urgencia temporal del hebreo.
- source_word: נִרְאָה אֲלֵיכֶם
  english_pob_choice: will appear to you
  chosen_spanish: se les aparecerá
  alternatives_spanish:
  - se os aparecerá
  - aparecerá ante ustedes
  lexicon: HALOT
  rationale: 'Aunque el hebreo está en forma perfecta niphal, aquí tiene fuerza futura/inminente. En español se traduce con futuro: «se les aparecerá», preservando la referencia a la manifestación divina prevista para ese día.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrama. Conforme a la terminología del proyecto, se mantiene el nombre divino como «Yahvé» y no se sustituye por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la manifestación divina
  english_pob_reading: the LORD will appear to you
  chosen_spanish_reading: Yahvé se les aparecerá
  alternative_spanish_readings:
  - la gloria de Yahvé se les aparecerá
  - Yahvé ha aparecido a ustedes
  rationale: El hebreo nombra a Yahvé directamente y no menciona todavía «la gloria de Yahvé», expresión que aparece en el versículo siguiente. Se conserva la sencillez del enunciado y su valor prospectivo sin importar la formulación vecina.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés auditado quedó con alta concordancia y sin observaciones pendientes. La propuesta española sigue ese estado estable, manteniendo la distinción entre שְׁלָמִים, מִנְחָה y la mención explícita de יְהוָה sin importar contenido de contextos vecinos.
  spanish_consistency_notes:
  - Se preserva «Yahvé» de forma consistente con la norma del proyecto para יְהוָה.
  - «Ofrenda vegetal» mantiene el campo semántico cultual de מִנְחָה sin calcar «grain» de manera rígida.
  - «Se les aparecerá» refleja el futuro inminente del perfecto niphal en contexto.
  - Las notas al pie conservan alternativas relevantes sin duplicar marcadores.
