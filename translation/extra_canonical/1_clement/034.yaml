  text: Ὁ ἀγαθὸς ἐργάτης μετὰ παρρησίας λαμβάνει τὸν ἄρτον τοῦ ἔργου αὐτοῦ, ὁ νωθρὸς καὶ παρειμένος οὐκ ἀντοφθαλμεῖ τῷ ἐργοδότῃ αὐτοῦ. 2. δεῖν οὖν ἐστὶ προθύμους ἡμᾶς εἶναι εἰς ἀγαθοποιΐαν· ἐξ αὐτοῦ γάρ ἐστιν τὰ πάντα. 3. προλέγει γὰρ ἡμῖν· Ἰδοὺ ὁ κύριος, καὶ ὁ μισθὸς αὐτοῦ πρὸ προσώπου αὐτοῦ, ἀποδοῦναι ἑκάστῳ κατὰ τὸ ἔργον αὐτοῦ. 4. προτρέπεται οὖν ἡμᾶς πιστεύοντας ἐξ ὅλης τῆς καρδίας ἐπ᾽ αὐτῷ, μὴ ἀργοὺς μηδὲ παρειμένους εἶναι ἐπὶ πᾶν ἔργον ἀγαθόν. 5. τὸ καύχημα ἡμῶν καὶ ἡ παρρησία ἔστω ἐν αὐτῷ· ὑποτασσώμεθα τῷ θελήματι αὐτοῦ· κατανοήσωμεν τὸ πᾶν πλῆθος τῶν ἀγγέλων αὐτοῦ, πῶς τῷ θελήματι αὐτοῦ λειτουργοῦσιν παρεστῶτες. 6. λέγει γὰρ ἡ γραφή· Μύριαι μυριάδες παρειστήκεισαν αὐτῷ, καὶ χίλιαι χιλιάδες ἐλειτούργουν αὐτῷ, καὶ ἐκέκραγον· Ἅγιος, ἅγιος, ἅγιος κύριος σαβαώθ, πλήρης πᾶσα ἡ κτίσις τῆς δόξης αὐτοῦ. . καὶ ἡμεῖς οὖν ἐν ὁμονοίᾳ ἐπὶ τὸ αὐτὸ συναχθέντες τῇ συνειδήσει, ὡς ἐξ ἑνὸς στόματος βοήσωμεν πρὸς αὐτὸν ἐκτενῶς εἰς τὸ μετόχους ἡμᾶς γενέσθαι τῶν μεγάλων καὶ ἐνδόξων ἐπαγγελιῶν αὐτοῦ. 8. λέγει γάρ· Ὀφθαλμὸς οὐκ εἶδεν καὶ οὖς οὐκ ἤκουσεν καὶ ἐπὶ καρδίαν ἀνθρώπου οὐκ ἀνέβη, ὅσα ἡτοίμασεν τοῖς ὑπομένουσιν αὐτόν.
