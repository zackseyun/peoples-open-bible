translation:
  language: es
  text: Y tu vida se alzará más brillante que el mediodía[a]; aunque haya oscuridad[c][b], será como la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Y tu vida será más brillante que el mediodía; la oscuridad será como la mañana». El hebreo concentra varias expresiones poéticas breves, especialmente en la segunda línea.'
    reason: alternative_reading
  - marker: b
    text: El término hebreo traducido aquí «vida» también puede significar «tiempo de vida» o, en sentido más amplio, la vida terrenal de uno.
    reason: lexical_alternative
  - marker: c
    text: El término hebreo raro traducido «oscuridad» es incierto; también puede entenderse como «tinieblas», «penumbra» u «obscuridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִצָּהֳרַיִם
  english_pob_choice: brighter than noon
  chosen_spanish: más brillante que el mediodía
  alternatives_spanish:
  - desde el mediodía
  - como el mediodía
  - más brillante que el noon
  lexicon: HALOT
  rationale: El hebreo usa מִן con valor comparativo; por eso en español se expresa con «más brillante que», no con un origen espacial. «Mediodía» es la equivalencia natural de צָהֳרַיִם y mantiene la imagen de luz plena.
- source_word: יָקוּם
  english_pob_choice: will rise
  chosen_spanish: se alzará
  alternatives_spanish:
  - resurgirá
  - se levantará
  - aparecerá
  lexicon: HALOT
  rationale: קום conserva una imagen de elevación o surgimiento. «Se alzará» preserva el movimiento metafórico sin sonar demasiado literal en español.
- source_word: חָלֶד
  english_pob_choice: your lifetime
  chosen_spanish: tu existencia
  alternatives_spanish:
  - tu vida
  - tu tiempo de vida
  - tu duración de vida
  lexicon: HALOT
  rationale: חָלֶד puede referirse a la vida terrenal o al curso de la existencia. «Tu existencia» comunica ese alcance amplio y funciona bien en el paralelo poético, aunque en nota se mantiene la alternativa de «vida».
- source_word: תָּעֻפָה
  english_pob_choice: though there is darkness
  chosen_spanish: aunque haya oscuridad
  alternatives_spanish:
  - aunque haya tinieblas
  - aunque haya penumbra
  - aunque haya obscuridad
  lexicon: HALOT
  rationale: El término es raro y el inglés POB conserva la incertidumbre semántica con «darkness». En español, «oscuridad» es claro y neutral, y la concesiva «aunque haya» refleja bien el valor de contraste poético.
- source_word: כַּבֹּקֶר
  english_pob_choice: like the morning
  chosen_spanish: como la mañana
  alternatives_spanish:
  - como el amanecer
  - como el alba
  - como la aurora
  lexicon: HALOT
  rationale: בֹּקֶר significa «mañana». «Como la mañana» mantiene la comparación explícita del hebreo; «amanecer/alba/aurora» serían más interpretativos.
- source_word: תִּהְיֶה
  english_pob_choice: it will become
  chosen_spanish: será
  alternatives_spanish:
  - se volverá
  - llegará a ser
  lexicon: HALOT
  rationale: En español, «será como la mañana» comunica de forma natural la transformación implícita sin forzar un verbo de cambio. Mantiene la simetría poética del verso.
translation_notes:
  revision_awareness: La versión se mantiene alineada con la última pasada revisada, que no introdujo cambios. Se conservó la tensión del hebreo entre la comparación con el mediodía y la imagen concesiva de la oscuridad que se vuelve como la mañana.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el Tetragrámaton; este verso no lo contiene.
  - Se usó un español poético directo, evitando calcos rígidos como «de mediodía» o «será hecho».
  - Se mantuvo la incertidumbre semántica del término raro de la segunda línea en la nota, sin resolverlo de manera excesiva.
  - «Existencia» se eligió por claridad contextual, pero se deja constancia de la alternativa más literal «vida».
