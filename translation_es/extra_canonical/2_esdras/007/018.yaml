review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del latín y conserva la antítesis espacial entre angusta/angustiam y spatiosa. Sin embargo, omite en español el énfasis correlativo de et... et... que el rastro de auditoría inglés consideró significativo: los impíos ''han both sufrido estrechez and not seen...'' En español conviene explicitar ese doble infortunio con ''tanto... como...'' o ''no solo... sino que tampoco...'' para preservar mejor la fuerza retórica del original.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero ''cosas estrechas / cosas amplias'' suena algo rígido en español. Aun así, dado que el proyecto prioriza la metáfora espacial, puede mantenerse. El problema principal está en la nota [a]: ''endurarán'' no es forma estándar adecuada aquí; además la nota no aporta una alternativa preferible. La nota [b] sí es posible, pero tampoco es necesaria si se mantiene ''amplias''.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. 'Los justos', 'han obrado impíamente' y la preservación de la metáfora espacial están alineados con la racionalidad documentada. La revisión propuesta solo fortalece la correspondencia retórica del latín.
  issues:
  - severity: medium
    issue: Falta el énfasis correlativo de 'et... et...' en la segunda cláusula
    rationale: El latín subraya una doble desgracia para los impíos. 'Han padecido estrechez y no han visto...' comunica el contenido, pero no la correlación enfática que la auditoría inglesa restauró como 'both... and'.
  - severity: medium
    issue: 'La nota [a] ofrece una alternativa defectuosa: ''endurarán'''
    rationale: '''Endurarán'' no es una forma natural ni recomendable en español bíblico actual; la nota introduce ruido en vez de clarificar. Debe eliminarse o sustituirse por una alternativa legítima.'
  - severity: low
    issue: Las notas léxicas no son necesarias en este versículo
    rationale: Las alternativas consignadas no preservan mejor el sentido que el texto principal. Dado que no hay una ambigüedad fuente que el español necesite resolver con nota, es preferible no incluir notas.
  revised_spanish_text: Pero los justos soportarán cosas estrechas, esperando cosas amplias; porque los que han obrado impíamente tanto han padecido estrechez como no han visto las cosas amplias.
  revised_footnotes: []
  revision_rationale: Se conserva la metáfora espacial deliberada del latín ('estrechas / amplias' y 'estrechez / cosas amplias'), pero se corrige la segunda cláusula para reflejar el valor correlativo enfático de 'et... et...' mediante 'tanto... como...'. También se eliminan las notas, porque no resuelven una ambigüedad real del original y una de ellas contiene una alternativa española inadecuada.
