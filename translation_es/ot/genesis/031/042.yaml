base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/042.yaml
  text: If the God of my father[a], the God of Abraham, and the Fear of Isaac, had not been with me, surely by now you would have sent me away empty-handed. God saw my affliction and the labor of my hands, and he judged last night.
  footnotes:
  - marker: a
    text: Or, 'the One whom Isaac fears.' The Hebrew literally reads 'the Fear of Isaac,' a distinctive title for God.
    reason: lexical_alternative
