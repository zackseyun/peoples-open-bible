translation:
  language: es
  text: Pero Absalón lo presionó[a], de modo que envió a Amnón y a todos los hijos del rey con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lo presionó» refleja un verbo hebreo más fuerte que una simple petición. También podría entenderse como «lo instó» o «prevaleció sobre él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְרָץ בּוֹ
  english_pob_choice: pressed him
  chosen_spanish: lo presionó
  alternatives_spanish:
  - lo instó
  - insistió con él
  - prevaleció sobre él
  lexicon: HALOT
  rationale: El hebreo expresa una presión insistente, no una ruptura literal. «Lo presionó» conserva la fuerza idiomática y resulta natural en español sin suavizar el matiz de insistencia.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: Nombre propio bíblico estándar
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre propio.
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo שׁלח en este contexto narra que se hace partir o se deja ir a los invitados; «envió» es la equivalencia más directa y natural en español.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: El pronombre mantiene el referente explícito a Absalón y refleja la forma pronominal del hebreo.
- source_word: אֶת אַמְנוֹן
  english_pob_choice: Amnon
  chosen_spanish: a Amnón
  alternatives_spanish:
  - a Amnon
  lexicon: Nombre propio bíblico estándar
  rationale: Se preserva la marca de objeto directo en español y se usa la forma española habitual del nombre propio.
- source_word: וְאֵת כָּל בְּנֵי הַמֶּלֶךְ
  english_pob_choice: and all the king’s sons
  chosen_spanish: y a todos los hijos del rey
  alternatives_spanish:
  - y a todos los hijos del rey David
  - y a todos los príncipes
  lexicon: HALOT
  rationale: «Hijos del rey» reproduce con fidelidad el constructo hebreo y evita añadir especificaciones no presentes en el verso. «Hijos» comunica bien la referencia familiar y real en español.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el hebreo y el juicio auditado en inglés: el verbo inicial se entiende como presión insistente, no como un sentido literal de “romper”; la cláusula final mantiene la referencia directa a los hijos del rey sin expandirla.'
  spanish_consistency_notes:
  - Se mantiene «Absalón» como forma española del nombre propio.
  - Se usa «Amnón» con tilde conforme al uso bíblico español.
  - La puntuación reproduce el contraste narrativo del hebreo con «Pero».
