translation:
  language: es
  text: y en las ciudades de Manasés y de Efraín y de Simeón, incluso hasta Neftalí, en sus ruinas circundantes[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase final en hebreo es difícil; literalmente dice algo como «en/con sus ... alrededor». Varias traducciones entienden el sentido como «en sus ruinas circundantes» o «en sus lugares devastados de alrededor».
    reason: textual_variant
  - marker: b
    text: 'O: «en sus lugares devastados circundantes». El texto consonántico puede leerse más literalmente como «sus casas», pero el contexto favorece una referencia a ruinas o lugares devastados.'
    reason: lexical_alternative
