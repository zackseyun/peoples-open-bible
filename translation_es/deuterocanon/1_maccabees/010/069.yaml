review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del griego: Demetrio nombró a Apolonio, identificado por su cargo sobre Celesiria; luego reunió una gran fuerza militar y acampó en Jamnia. Sin embargo, la nota al pie está mal anclada: la alternativa léxica corresponde a «una gran fuerza», no a «nombró».'
  spanish_quality_summary: El español es generalmente claro y natural, pero «que estaba sobre Celesiria» suena calcado y poco idiomático en español eclesial moderno. «Que estaba a cargo de Celesiria» preserva mejor el sentido administrativo de ἐπὶ sin perder fidelidad. El resto fluye bien.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Nombró», «reunió», «una gran fuerza», «acampó» y «Jamnia»/«Celesiria» están alineados con las decisiones del POB. Se requiere ajustar solo la expresión de autoridad regional y la ubicación de la nota léxica.
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre «nombró» en vez de sobre «una gran fuerza».
    rationale: La nota explica la amplitud semántica de δύναμις y la alternativa «ejército», por lo que debe anclarse en la frase que traduce δύναμιν μεγάλην, no en κατέστησεν.
  - severity: medium
    issue: «Que estaba sobre Celesiria» es un calco poco natural.
    rationale: Aunque «sobre» refleja formalmente ἐπί, en español suena extraño para autoridad administrativa. «Que estaba a cargo de Celesiria» o «que gobernaba Celesiria» comunica mejor el sentido de oficio/gobierno.
  revised_spanish_text: Y Demetrio nombró a Apolonio, que estaba a cargo de Celesiria, y reunió una gran fuerza[a], y acampó en Jamnia.
  revised_footnotes:
  - marker: a
    text: O «un gran ejército». El griego δύναμις puede designar una fuerza militar en sentido amplio, no solo un ejército formal.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a δύναμιν μεγάλην y se mejora «que estaba sobre Celesiria» a una formulación española más natural que conserva el sentido administrativo del griego.
