translation:
  language: es
  text: Distribuyó a todo el pueblo, a toda la multitud de Israel, desde el hombre hasta la mujer; a cada uno, un pan, una porción de carne[a] y una torta de pasas. Entonces todo el pueblo se fue[b], cada uno a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una medida/porción»; la palabra hebrea אֶשְׁפָּר es rara. Muchos la entienden aquí como una porción de carne, especialmente a la luz del pasaje paralelo en 1 Crónicas 16:3.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde el hombre hasta la mujer»; es un modismo que significa todo el pueblo reunido, tanto hombres como mujeres.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְחַלֵּק
  english_pob_choice: He distributed
  chosen_spanish: Distribuyó
  alternatives_spanish:
  - Repartió
  - Distribuyó entre
  lexicon: HALOT
  rationale: El piel de חלק expresa aquí la acción concreta de repartir porciones a una multitud. «Distribuyó» conserva el acto de dar porciones y suena natural en español contemporáneo sin perder la concreción.
- source_word: לְכָל הָעָם / לְכָל הֲמוֹן יִשְׂרָאֵל
  english_pob_choice: to all the people, to the whole multitude of Israel
  chosen_spanish: a todo el pueblo, a toda la multitud de Israel
  alternatives_spanish:
  - a todo el pueblo, a toda la asamblea de Israel
  - a todo el pueblo, a toda la muchedumbre de Israel
  lexicon: HALOT
  rationale: Las dos frases hebreas son enfáticas y en parte appositivas. Conviene conservar ambas en español para no aplanar la plenitud del original.
- source_word: לְמֵאִישׁ וְעַד אִשָּׁה
  english_pob_choice: from man to woman
  chosen_spanish: desde el hombre hasta la mujer
  alternatives_spanish:
  - de hombre a mujer
  - desde los hombres hasta las mujeres
  lexicon: HALOT
  rationale: La expresión idiomática señala a todo el conjunto reunido, varones y mujeres. «Desde el hombre hasta la mujer» conserva el alcance total y el valor idiomático sin volverlo artificial.
- source_word: לְאִישׁ
  english_pob_choice: to each person
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada hombre
  - a cada persona
  lexicon: HALOT
  rationale: Aunque el hebreo usa איש en singular masculino, el contexto ya incluyó explícitamente a mujeres. «A cada uno» expresa la distribución individual sin restringir el sentido a varones.
- source_word: חַלַּת לֶחֶם אַחַת
  english_pob_choice: one loaf of bread
  chosen_spanish: una torta de pan
  alternatives_spanish:
  - un pan
  - una torta de pan
  lexicon: HALOT
  rationale: חלה designa una torta o pan redondo/acomodado para ofrenda o reparto. «Torta de pan» preserva mejor el matiz concreto que un simple «pan».
- source_word: אֶשְׁפָּר אֶחָד
  english_pob_choice: one portion of meat
  chosen_spanish: una porción de carne
  alternatives_spanish:
  - una porción
  - una medida de carne
  lexicon: HALOT
  rationale: El término es raro y discutido. En este contexto, y en paralelo con 1 Crónicas 16:3, la lectura más probable es una porción de comida, probablemente carne; por eso se traduce así sin afirmar más de lo que el hebreo permite.
- source_word: וַאֲשִׁישָׁה אֶחָת
  english_pob_choice: one raisin cake
  chosen_spanish: una torta de pasas
  alternatives_spanish:
  - una torta de uvas pasas
  - una torta prensada
  lexicon: HALOT
  rationale: אֲשִׁישָׁה suele entenderse como un pastel o torta prensada, frecuentemente de pasas. «Torta de pasas» es claro y coherente con el uso bíblico habitual.
- source_word: וַיֵּלֶךְ כָּל הָעָם אִישׁ לְבֵיתוֹ
  english_pob_choice: Then all the people went away, each to his house
  chosen_spanish: Entonces todo el pueblo se fue, cada uno a su casa
  alternatives_spanish:
  - Y todo el pueblo fue, cada uno a su casa
  - Entonces todo el pueblo partió, cada uno a su casa
  lexicon: HALOT
  rationale: «Se fue» comunica naturalmente la dispersión final tras el reparto. «Cada uno a su casa» conserva el singular distributivo del hebreo.
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente indicado como sin cambios y con alta concordancia. Se mantiene la solución POB para el término raro אֶשְׁפָּר y la lectura idiomática de לְמֵאִישׁ וְעַד אִשָּׁה, sin introducir ampliaciones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera del versículo porque no aparecen en el texto.
  - Se conserva el singular distributivo («cada uno») para reflejar el hebreo.
  - Se usa «torta de pan» y «torta de pasas» para sostener consistencia léxica con los alimentos concretos del reparto.
  - No se reemplaza el valor idiomático de «desde el hombre hasta la mujer» por una paráfrasis más explicativa dentro del texto principal.
