revisions:
- from: Sin embargo[a], un manantial o una cisterna, una reunión de aguas, será limpio; pero el que toque su cadáver[b] será impuro.
  to: Sin embargo, un manantial o una cisterna, una acumulación de agua[a], estará limpio; pero el que toque el cadáver de esos animales[b] quedará impuro.
  rationale: Se revisó ‘reunión de aguas’ a ‘acumulación de agua’ para un español más natural sin perder el sentido de מִקְוֵה מַיִם. Se aclaró ‘su cadáver’ como ‘el cadáver de esos animales’ para evitar ambigüedad y reflejar mejor el singular colectivo hebreo en español. También se suavizó la formulación verbal a ‘estará limpio / quedará impuro’, más idiomática en español ritual y coherente con el sentido resultativo del versículo.
