translation:
  language: es
  text: Un testigo veraz rescata vidas[a], pero el que exhala mentiras[b] es engañoso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un testigo verdadero rescata personas». Aquí «vidas» refleja el sentido hebreo de נְפָשׁוֹת como vidas o personas preservadas, no como almas inmortales.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «exhala mentiras». El hebreo usa una imagen vívida de respiración para el acto de pronunciar falsedad.
    reason: lexical_alternative
  - marker: c
    text: 'La frase final también puede traducirse más literalmente: «y el que exhala mentiras es engaño», o entenderse adverbialmente: «exhala mentiras engañosamente».'
    reason: alternative_reading
lexical_decisions:
- source_word: מַצִּיל
  english_pob_choice: rescues
  chosen_spanish: rescata
  alternatives_spanish:
  - libra
  - salva
  lexicon: HALOT
  rationale: El participio hifil de נצל expresa causar liberación o rescate. «Rescata» es natural en español actual y conserva el matiz práctico del proverbio sin cargarlo con un sentido soteriológico más fuerte que el del contexto.
- source_word: נְפָשׁוֹת
  english_pob_choice: lives
  chosen_spanish: vidas
  alternatives_spanish:
  - almas
  - personas
  lexicon: HALOT
  rationale: En la literatura sapiencial, נֶפֶשׁ suele referirse a la vida o a la persona, no a un alma inmaterial. «Vidas» conserva bien esa idea de vidas preservadas y evita una lectura dualista ajena al contexto.
- source_word: עֵד אֱמֶת
  english_pob_choice: a truthful witness
  chosen_spanish: una testigo veraz
  alternatives_spanish:
  - un testigo veraz
  - una testigo verdadera
  - un testigo verdadero
  lexicon: HALOT
  rationale: La construcción describe a un testigo caracterizado por la verdad. «Veraz» conserva la cualidad moral de fiabilidad y, en español, funciona bien como atributo personal. Se optó por femenino en armonía con la forma «testigo», que es común en ambos géneros; el artículo y el predicado se ajustan al referente indeterminado del proverbio.
- source_word: וְיָפִחַ
  english_pob_choice: but one who breathes out
  chosen_spanish: pero el que exhala
  alternatives_spanish:
  - pero el que sopla
  - pero el que habla
  lexicon: HALOT
  rationale: El verbo פוח evoca literalmente respirar o exhalar y se usa figuradamente para emitir palabras. «Exhala» preserva la imagen vívida del hebreo mejor que una mera paráfrasis como «habla».
- source_word: כְּזָבִים
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedades
  - engaños
  lexicon: HALOT
  rationale: El sustantivo plural denota declaraciones falsas. «Mentiras» es la opción más clara y natural en español contemporáneo.
- source_word: מִרְמָה
  english_pob_choice: is deceitful
  chosen_spanish: es engañoso
  alternatives_spanish:
  - es engaño
  - es deceitivo
  lexicon: HALOT
  rationale: La palabra final aparece de forma nominal y muy breve como complemento o predicado. «Es engañoso» da un español idiomático y mantiene la caracterización del que miente como marcado por la engañosidad; «es engaño» sería más literal pero menos natural.
theological_decisions:
- issue: Sentido de נְפָשׁוֹת en proverbio sapiencial
  english_pob_reading: lives, not immaterial souls
  chosen_spanish_reading: vidas, no almas inmortales
  alternative_spanish_readings:
  - almas
  - personas
  rationale: Se conserva el valor contextual de vida/persona y se evita importar una antropología ajena al dicho sapiencial. El español «vidas» reproduce mejor el efecto práctico del proverbio.
  doctrine_reference: Antropología bíblica en literatura sapiencial; no proyección platónica del término alma
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en la revisión más reciente y no requiere cambios sustantivos; se mantiene la solución óptima ya validada, con ajuste español para naturalidad y fidelidad léxica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el hebreo lo exige explícitamente; aquí no aplica.
  - Se evitó «salva» para no cargar el proverbio con un matiz soteriológico más fuerte que el del hebreo.
  - Se conservó la imagen verbal de «exhalar» para פוח, en línea con el audit trail inglés.
  - Se eligió una formulación idiomática de la segunda cola que no borra la tensión textual entre predicado nominal y adverbio.
