review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la ropa no se desgastó y el pie no se hinchó durante cuarenta años. Mantiene correctamente el singular «tu pie» y preserva el demostrativo temporal con «estos cuarenta años». Sin embargo, «sobre ti» suena poco idiomático en español para ropa llevada puesta, y la nota b repite innecesariamente la lectura principal en vez de destacar solo la alternativa preservada por el inglés.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Tu ropa no se gastó sobre ti» resulta algo calcado y extraño. «La ropa que llevabas puesta no se gastó» o una formulación equivalente comunica mejor el mismo sentido. La coordinación con coma antes de «estos cuarenta años» es aceptable, aunque una formulación más fluida integra mejor el complemento temporal.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales están bien alineadas: שׂמלה -> «ropa», בלה -> «no se gastó», רגל -> «pie», בצקה -> «se hinchó». La excepción necesaria es ajustar מֵעָלֶיךָ a un español idiomático («la ropa que llevabas puesta») en lugar del calco «sobre ti».'
  issues:
  - severity: medium
    issue: «sobre ti» es un calco poco natural de מֵעָלֶיךָ en este contexto.
    rationale: Aunque el hebreo es literalmente «de sobre ti», en español con ropa la expresión natural es «la ropa que llevabas puesta» o similar. «Sobre ti» suena forzado y reduce la legibilidad sin ganar fidelidad real.
  - severity: low
    issue: La nota b repite la lectura principal en lugar de centrarse en la alternativa léxica.
    rationale: La nota inglesa preserva como alternativa «did not become swollen» y añade que algunos entienden «blister». En español, como el texto principal ya dice «no se hinchó», la nota debe aportar la alternativa no principal, por ejemplo «no se ampolló».
  revised_spanish_text: La ropa que llevabas puesta[a] no se gastó, ni tu pie se hinchó[b], estos cuarenta años.
  revised_footnotes:
  - marker: a
    text: 'O: «tu prenda de vestir no se gastó».'
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden el verbo de manera más específica como «no se ampolló».
    reason: lexical_alternative
