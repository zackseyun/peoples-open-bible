review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y conserva correctamente Yahvé, Betel, el sentido de שֵׁב נָא פֹה como petición de quedarse, y וַיֵּרְדוּ como descenso. También mantiene la nota sobre עַד בֵּית אֵל. Sin embargo, la fórmula de juramento וְחֵי נַפְשְׁךָ no está bien resuelta en español con «y vive tu vida», que suena antinatural y no refleja bien la equivalencia documentada en el POB inglés («as you live»).
  spanish_quality_summary: El español es en general claro y digno, pero «Vive Yahvé, y vive tu vida» resulta poco idiomático, especialmente «vive tu vida», que en español moderno puede sonar coloquial o incluso semánticamente desviado. También «que no te dejaré» es comprensible, pero «no te dejaré» es más natural y suficiente en esta fórmula.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», בֵּית אֵל → «Betel». La principal desviación es estilístico-lexical en la fórmula juratoria: וְחֵי נַפְשְׁךָ debe expresarse en español de manera idiomática como «y por tu vida» o «y como tú vives», no «y vive tu vida».'
  issues:
  - severity: high
    issue: La fórmula «y vive tu vida» es antinatural y no representa bien וְחֵי נַפְשְׁךָ.
    rationale: Aunque el hebreo menciona literalmente la vida/nefesh del interlocutor, en español una fórmula juratoria equivalente debe sonar natural. «Y vive tu vida» no es una formulación idiomática de juramento; «y por tu vida» o «y como tú vives» preservan mejor el sentido.
  - severity: medium
    issue: La nota [b] repite la formulación poco natural «Vive Yahvé, y vive tu vida».
    rationale: La nota debe explicar la fórmula hebrea sin introducir un español defectuoso. Conviene reflejar el hebreo literal de manera aclaratoria y dar la equivalencia natural en español.
  - severity: low
    issue: «que no te dejaré» puede simplificarse a «no te dejaré».
    rationale: La partícula «que» no es necesaria aquí; la negación explícita ya comunica adecuadamente el valor elíptico de אִם tras el juramento.
  revised_spanish_text: 'Y Elías dijo a Eliseo[a]: «Por favor, quédate aquí, porque Yahvé me ha enviado a Betel». Pero Eliseo dijo: «Vive Yahvé[b], y por tu vida, no te dejaré». Y descendieron a Betel.'
