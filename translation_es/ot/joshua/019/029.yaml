translation:
  language: es
  text: Entonces el límite giró hacia Ramá, y hasta la ciudad fortificada de Tiro; entonces el límite giró hacia Hosa, y sus puntos terminales estaban en el mar[a], desde el territorio de Aczib[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el mar»; el hebreo literalmente dice «hacia el mar», una expresión geográfica común que también puede indicar la dirección occidental, pero aquí se conserva «en el mar» para seguir de cerca la revisión inglesa y la imagen concreta del texto.
    reason: lexical_alternative
  - marker: b
    text: O «desde la región de Aczib»; חֶבֶל puede significar región, distrito o territorio en un contexto de límites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁב / הַגְּבוּל
  english_pob_choice: the border turned
  chosen_spanish: el límite se volvió
  alternatives_spanish:
  - el borde dio vuelta
  - la frontera cambió de dirección
  lexicon: HALOT
  rationale: En descripciones territoriales, שוב marca un giro o cambio de dirección de la línea fronteriza. «Se volvió» conserva esa imagen en español sin sonar mecánico. «Límite» es natural para un reparto de tierra y mantiene el valor de frontera territorial.
- source_word: הָרָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Ramah
  lexicon: Nombre propio
  rationale: Se translitera al español con acento gráfico para lectura natural. No se traduce porque es un topónimo.
- source_word: עִיר מִבְצַר צֹר
  english_pob_choice: the fortified city of Tyre
  chosen_spanish: la ciudad fortificada de Tiro
  alternatives_spanish:
  - la ciudad-fortaleza de Tiro
  - la fortaleza de Tiro
  lexicon: HALOT
  rationale: El hebreo presenta a Tiro como «ciudad fortificada». «Ciudad fortificada» preserva el valor descriptivo sin forzar una construcción más técnica. Se mantiene «Tiro» como topónimo establecido en español.
- source_word: חֹסָה
  english_pob_choice: Hosah
  chosen_spanish: Josa
  alternatives_spanish:
  - Hosa
  lexicon: Nombre propio
  rationale: Se adapta la transliteración al uso hispano bíblico más natural. No se añade explicación porque es un nombre geográfico.
- source_word: תֹצְאֹתָיו
  english_pob_choice: its boundary points were
  chosen_spanish: sus puntos terminales estaban
  alternatives_spanish:
  - sus salidas estaban
  - sus extremos estaban
  lexicon: HALOT
  rationale: תֹצָאוֹת en fórmulas de límites designa los puntos extremos o terminales del perímetro. «Puntos terminales» conserva la precisión geométrica y evita suavizar el término hacia una mera paráfrasis.
- source_word: הַיָּמָּה
  english_pob_choice: at the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - hacia el mar
  - al mar
  lexicon: HALOT
  rationale: 'Aunque la expresión hebrea puede funcionar direccionalmente, el ajuste final del POB inglés la llevó a una localización más cercana al hebreo: «at the sea». En español, «en el mar» transmite mejor esa ubicación concreta que un simple valor direccional, sin perder la imagen geográfica.'
- source_word: מֵחֶבֶל אַכְזִיבָה
  english_pob_choice: from the region of Achzib
  chosen_spanish: desde el territorio de Aczib
  alternatives_spanish:
  - desde la región de Aczib
  - desde el distrito de Aczib
  lexicon: HALOT
  rationale: חֶבֶל puede referirse a una zona medida, distrito o región. «Territorio» conserva el sentido espacial en un contexto de reparto de fronteras. Se mantiene la referencia a Aczib como topónimo.
theological_decisions:
- issue: Dirección territorial expresada por 'toward the sea' / 'at the sea'
  english_pob_reading: The English POB revised the phrase from 'toward the sea' to 'at the sea' to stay closer to the Hebrew while retaining the geographic image.
  chosen_spanish_reading: «en el mar»
  alternative_spanish_readings:
  - «hacia el mar»
  - «al mar»
  rationale: No hay un problema doctrinal, sino una decisión de precisión geográfica. La versión española sigue la revisión inglesa y evita convertir la frase en una mera indicación abstracta de oeste; conserva el punto de llegada del límite.
  doctrine_reference: N/A
- issue: Terminología territorial en un texto de reparto tribal
  english_pob_reading: Boundary language is rendered with concrete geographic terms rather than ecclesiastical or modern administrative language.
  chosen_spanish_reading: «límite», «ciudad fortificada», «territorio»
  alternative_spanish_readings:
  - «frontera»
  - «distrito»
  - «tierra»
  rationale: El pasaje describe lindes de heredad, no una división eclesiástica ni moderna. Se eligen equivalentes geográficos directos para mantener la textura del texto hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó 'toward the sea' a 'at the sea' para acercarse más al hebreo y conservar la imagen geográfica. También se mantuvo la decisión auditada de 'boundary points' para תֹצְאֹתָיו y de 'region of Achzib' / 'territorio de Aczib' para מֵחֶבֶל אַכְזִיב.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en la serie, pero este versículo no contiene el nombre divino.
  - 'Se conservaron topónimos bíblicos con transliteración natural al español: Ramá, Tiro, Josa, Aczib.'
  - Se evitó 'frontera' porque 'límite' sigue mejor el estilo de descripción territorial del hebreo.
  - «Puntos terminales» preserva el plural hebreo de תֹצְאֹתָיו sin perder claridad en español.
