translation:
  language: es
  text: Así, aplasta este campamento ante nosotros hoy[a]; y que los demás sepan que ha hablado perversamente contra tus cosas santas; júzgalo conforme a su maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra tu santuario». El griego dice literalmente «contra tus cosas santas» (plural), lo cual puede referirse en sentido amplio a lo que es sagrado para Dios, incluido el santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντριψον
  english_pob_choice: crush
  chosen_spanish: aplasta
  alternatives_spanish:
  - destruye
  - destroza
  - quiebra
  lexicon: LSJ
  rationale: El imperativo aoristo pide una acción decisiva y violenta. «Aplasta» comunica fuerza punitiva en español natural sin debilitar el sentido militar/judicial del ruego.
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - acampamento
  - hueste
  lexicon: LSJ
  rationale: «Campamento» conserva el sentido básico de una fuerza militar instalada y es claro para el lector español. «Hueste» sería más arcaico y «acampamiento» menos idiomático.
- source_word: ἐνώπιον ἡμῶν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - en nuestra presencia
  lexicon: LSJ
  rationale: «Delante de nosotros» expresa bien la imagen espacial y suena natural en español contemporáneo. Mantiene la proximidad semántica de «before us» sin exceso de literalismo.
- source_word: οἱ ἐπίλοιποι
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - los restantes
  - los que quedan
  - los sobrevivientes
  lexicon: LSJ
  rationale: «Los demás» conserva la amplitud del griego sin especificar más de lo que dice el texto. Evita imponer el matiz de «sobrevivientes», que el griego no exige explícitamente.
- source_word: κακῶς ἐλάλησεν
  english_pob_choice: has spoken wickedly
  chosen_spanish: habló malvadamente
  alternatives_spanish:
  - habló perversamente
  - habló con maldad
  - habló impíamente
  lexicon: LSJ
  rationale: La combinación griega implica una carga moral, no solo un hablar deficiente. «Malvadamente» mantiene el juicio ético y la intensidad del reproche.
- source_word: ἐπὶ τὰ ἅγιά σου
  english_pob_choice: against your holy things
  chosen_spanish: contra tus cosas santas
  alternatives_spanish:
  - contra tu santuario
  - contra tus cosas sagradas
  - contra tus objetos santos
  lexicon: LSJ
  rationale: Se conserva el plural griego τὰ ἅγια como una referencia amplia a lo santo de Dios. «Cosas santas» evita restringir indebidamente el sentido a un solo edificio; «sagradas» es posible, pero «santas» refleja mejor el registro bíblico.
- source_word: κρῖνον αὐτὸν
  english_pob_choice: judge him
  chosen_spanish: júzgalo
  alternatives_spanish:
  - juzga a él
  - condénalo
  - hazle justicia
  lexicon: LSJ
  rationale: «Júzgalo» reproduce con concisión la petición judicial del verbo κρίνω y deja el resultado punitivo al contexto siguiente.
- source_word: κατὰ τὴν κακίαν αὐτοῦ
  english_pob_choice: according to his wickedness
  chosen_spanish: conforme a su maldad
  alternatives_spanish:
  - según su maldad
  - de acuerdo con su maldad
  - según su perversidad
  lexicon: LSJ
  rationale: «Conforme a su maldad» es formalmente cercano y idiomático para una petición imprecatoria. «Maldad» mantiene la fuerza moral de κακία sin sobreinterpretar.
theological_decisions:
- issue: Referente singular de αὐτόν tras el plural colectivo «este campamento»
  english_pob_reading: Retain singular 'he/him' rather than pluralizing to the camp or army.
  chosen_spanish_reading: Mantener el singular implícito en «habló... contra tus cosas santas; júzgalo», sin convertirlo en plural.
  alternative_spanish_readings:
  - 'pluralizar: «juzgarlos»'
  - reinterpretar como el campamento entero
  rationale: El griego conserva un cambio desde el campamento colectivo a un ofensivo singular. En español se preserva la tensión dejando el pronombre objeto singular («lo») y no resolviéndolo en plural, para no borrar la sintaxis del original.
  doctrine_reference: Primacía del texto original y preservación de la tensión textual sin armonización interpretativa.
translation_notes:
  revision_awareness: Se mantuvo la lectura del griego que usa un plural amplio («tus cosas santas») y se evitó reducirlo a «santuario» en el texto principal. También se conservó el singular del ofensivo final, como en el audit trail inglés, para no resolver una tensión gramatical del original.
  spanish_consistency_notes:
  - Se prefirió un español bíblico claro y contemporáneo, evitando el calco rígido cuando sonaba antinatural.
  - «Yahvé» no aparece aquí porque el pasaje usa segunda persona posesiva sin el tetragrama explícito.
  - Se mantuvo el tono imprecatorio y judicial del contexto sin añadir explicaciones no presentes en el verso.
