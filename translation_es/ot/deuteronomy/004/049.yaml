translation:
  language: es
  text: y toda la Arabá al otro lado del Jordán, hacia el oriente, hasta el mar de la Arabá[a], debajo de las laderas de Pisgá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el cuerpo de agua comúnmente identificado como el Mar Muerto.
    reason: cross_reference
lexical_decisions:
- source_word: הָעֲרָבָה
  english_pob_choice: the Arabah
  chosen_spanish: la Arabá
  alternatives_spanish:
  - el Arabá
  - la llanura árida
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico propio, como en el texto inglés auditado. En español, 'Arabá' funciona como transliteración natural y evita reducir el término a un nombre común genérico como 'llanura', que perdería la identificación territorial específica.
- source_word: עֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: La expresión describe una localización relativa respecto del Jordán. 'Al otro lado del Jordán' reproduce bien el sentido geográfico y es idiomático en español sin forzar una dirección interpretativa adicional.
- source_word: מִזְרָחָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - oriente
  - al este
  lexicon: HALOT
  rationale: Se opta por una dirección adverbial natural en español. 'Hacia el oriente' mantiene un registro digno y corresponde al matiz direccional de la forma hebrea, equivalente al 'eastward' revisado en el inglés POB.
- source_word: יָם הָעֲרָבָה
  english_pob_choice: the Sea of the Arabah
  chosen_spanish: el mar de la Arabá
  alternatives_spanish:
  - el mar del Arabá
  - el mar de la llanura
  lexicon: HALOT
  rationale: Se conserva la estructura literal del hebreo, siguiendo la preferencia del POB inglés por no sustituir el nombre con la identificación tradicional 'Mar Muerto'. 'Mar de la Arabá' preserva la referencia del texto fuente y su posible identificación geográfica.
- source_word: תַּחַת
  english_pob_choice: below
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - por debajo de
  lexicon: HALOT
  rationale: En un contexto topográfico, 'debajo de' expresa con claridad la relación espacial y suena natural en español. Mantiene el valor locativo de la preposición sin cargarla de connotaciones figuradas.
- source_word: אַשְׁדֹּת
  english_pob_choice: the slopes of
  chosen_spanish: las laderas de
  alternatives_spanish:
  - las pendientes de
  - los declives de
  lexicon: HALOT
  rationale: La imagen geográfica apunta a laderas o declives montañosos. 'Laderas' es una equivalencia clara y sobria en español, cercana a la noción de 'slopes' del inglés auditado.
- source_word: הַפִּסְגָּה
  english_pob_choice: Pisgah
  chosen_spanish: Pisgá
  alternatives_spanish:
  - Pisga
  lexicon: HALOT
  rationale: Se translitera el topónimo con adaptación ortográfica al español. 'Pisgá' conserva la identificación propia del lugar y evita una traducción innecesaria.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y toda
  alternatives_spanish:
  - y todo
  - y toda la totalidad de
  lexicon: HALOT
  rationale: Se mantiene el valor inclusivo y la fuerza de totalidad del hebreo. 'Toda' concuerda naturalmente con 'Arabá' y reproduce el alcance integral del sintagma.
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió 'eastward' sobre 'to the east'; por eso se eligió 'hacia el oriente' en lugar de una forma más perifrástica. También se preservó el nombre geográfico 'Arabá' y la identificación literal 'mar de la Arabá', conforme al principio auditado de no sustituir el original por el nombre convencional posterior.
  spanish_consistency_notes:
  - Se mantuvo 'Arabá' como nombre geográfico constante y no como 'llanura', para conservar el referente territorial específico.
  - Se evitó 'SEÑOR' o sustituciones cultuales porque el versículo no contiene el Tetragrámaton ni un título divino.
  - La dirección quedó expresada en forma adverbial ('hacia el oriente') para sostener el tono formal sin sonar arcaico.
  - '''Pisgá'' se adaptó con tilde para lectura española, manteniendo el topónimo reconocible.'
