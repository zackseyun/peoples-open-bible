  glossary_alignment: Se respeta correctamente el uso de «Yahvé» para יהוה y «el Adversario» para הַשָּׂטָן, con nota alternativa para «Satanás». «Los hijos de Dios» también concuerda con la decisión formal del proyecto. La única desviación de política es la nota innecesaria sobre el nombre divino, que no aporta una decisión léxica contextual del verso.
