translation:
  language: es
  text: Quita la escoria de la plata, y sale una vasija para el refinador[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el platero». El término hebreo también puede referirse más ampliamente a un trabajador del metal, pero «refinador» encaja mejor con el contexto inmediato de quitar la escoria de la plata.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָגוֹ
  english_pob_choice: Remove
  chosen_spanish: Quita
  alternatives_spanish:
  - Remueve
  - Aparta
  lexicon: HALOT
  rationale: El imperativo plural en este proverbio pide una acción breve y directa. «Quita» comunica con naturalidad la idea de retirar la impureza sin sonar mecánico.
- source_word: סִיגִים
  english_pob_choice: the dross
  chosen_spanish: la escoria
  alternatives_spanish:
  - las impurezas
  - la ganga
  lexicon: HALOT
  rationale: El término designa el residuo separado del metal al refinarlo. «Escoria» es el equivalente español más preciso y mantiene la imagen metalúrgica del texto.
- source_word: מִכָּסֶף
  english_pob_choice: from the silver
  chosen_spanish: de la plata
  alternatives_spanish:
  - de la plata refinada
  - de la plata misma
  lexicon: HALOT
  rationale: La preposición expresa separación; en español, «de la plata» comunica con claridad el material del que se retira la escoria y conserva la concreción del hebreo.
- source_word: וַיֵּצֵא
  english_pob_choice: comes out
  chosen_spanish: saldrá
  alternatives_spanish:
  - sale
  - resulta
  lexicon: HALOT
  rationale: En el proverbio, la forma verbal expresa resultado general. «Saldrá» conserva el valor proverbial de consecuencia y suena natural en español bíblico contemporáneo.
- source_word: לַצֹּרֵף
  english_pob_choice: for the refiner
  chosen_spanish: para el refinador
  alternatives_spanish:
  - para el orfebre
  - para el platero
  lexicon: HALOT
  rationale: '«Refinador» reproduce la función inmediata del contexto: alguien que purifica el metal. Se evita «orfebre» o «platero» porque desplazan el énfasis desde el refinado hacia el oficio artesanal.'
- source_word: כֶּלִי
  english_pob_choice: a vessel
  chosen_spanish: un vaso
  alternatives_spanish:
  - un utensilio
  - un recipiente
  lexicon: HALOT
  rationale: El hebreo es amplio y puede referirse a un objeto o recipiente. En español, «vaso» conserva la idea de un recipiente utilizable y mantiene la concisión proverbial, aunque es más específico que el término hebreo.
translation_notes:
  revision_awareness: El texto hebreo y el análisis morfológico coinciden con una lectura proverbial de instrucción general. La versión inglesa POB también entiende la segunda cola como un resultado general («a vessel comes out») y no como un evento pasado; se preserva ese valor resultativo con «saldrá».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Refinador» se usa de manera funcional, coherente con la decisión inglesa de privilegiar la función de refinado sobre un oficio más específico.
  - Se conserva un paralelismo breve y proverbial, evitando ampliar el hemistiquio más allá de lo que el hebreo exige.
