revisions:
- from: No les tengan miedo[a], porque Yahvé su Dios es el que pelea por ustedes.
  to: No les teman[a], porque Yahvé, el Dios de ustedes, es el que combate por ustedes.
  rationale: Se ajusta la prohibición a una forma más natural y directa («No les teman»), se aclara la posesión plural con «el Dios de ustedes», y se eleva ligeramente el registro bélico con «combate», manteniendo fielmente el sentido del hebreo y la filosofía del POB. La nota alternativa se conserva con marcador correctamente anclado.
