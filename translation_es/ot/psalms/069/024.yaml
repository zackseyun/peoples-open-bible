    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּחְשַׁכְנָה
  english_pob_choice: Let their eyes be darkened
  chosen_spanish: Sean oscurecidos
  alternatives_spanish:
  - Que se oscurezcan
  - Queden oscurecidos
  lexicon: HALOT
  rationale: El hebreo expresa una petición/imprecación con valor jussivo; en español, una pasiva perifrástica conserva el resultado deseado sin añadir agente y mantiene el tono de súplica judicial.
- source_word: עֵינֵיהֶם
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - sus ojos
  lexicon: HALOT
  rationale: La imagen corporal es directa y debe preservarse literalmente. 'Ojos' es el equivalente natural y preciso en español.
- source_word: מֵרְאוֹת
  english_pob_choice: from seeing
  chosen_spanish: para no ver
  alternatives_spanish:
  - de ver
  - sin ver
  lexicon: HALOT
  rationale: Aunque la construcción hebrea es literalmente 'de ver', en español 'para no ver' comunica con claridad el efecto de la oscuridad sobre la vista sin perder la relación semántica.
- source_word: וּמָתְנֵיהֶם
  english_pob_choice: and their loins
  chosen_spanish: sus lomos
  alternatives_spanish:
  - sus lomos
  - sus caderas
  - su cintura
  lexicon: HALOT
  rationale: '''Lomos'' es el término bíblico español más exacto para מָתְנַיִם en poesía, y mantiene el registro corporal fuerte del texto.'
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  lexicon: HALOT
  rationale: Adverbio de duración continua; 'continuamente' suena natural en español y conserva el sentido de persistencia incesante.
- source_word: הַמְעַד
  english_pob_choice: make their loins shake
  chosen_spanish: haz que sus lomos tiemblen
  alternatives_spanish:
  - haz que sus lomos vacilen
  - haz que sus lomos se tambaleen
  lexicon: HALOT
  rationale: El valor causativo del verbo se refleja con 'haz que... tiemblen'. 'Tiemblen' conserva la sacudida física y es más transparente en español que una forma más idiomática pero menos literal.
theological_decisions:
- issue: Fuerza imprecatoria del versículo
  english_pob_reading: Render as a prayer/wish for judgment ('Let... and make...')
  chosen_spanish_reading: 'Traducirlo como súplica imprecatoria: ''Sean oscurecidos... y haz que...'''
  alternative_spanish_readings:
  - Serán oscurecidos... y sus lomos temblarán...
  - Que sus ojos se oscurezcan...
  rationale: La morfología y el contexto del salmo favorecen una petición dirigida a Dios, no una simple predicción. El español mantiene esa fuerza de imprecación sin suavizarla.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se incorporó el ajuste de la revisión inglesa que prefirió una lectura más literal de מֵרְאוֹת ('from seeing') y conservó el matiz de acción causativa en הַמְעַד; en español se resolvió con 'para no ver' y 'haz que sus lomos tiemblen' para mantener naturalidad y precisión.
  spanish_consistency_notes:
  - Se mantuvo 'lomos' para מָתְנַיִם, siguiendo el valor bíblico tradicional y el audit trail inglés.
  - No se introdujo 'Cristo' ni terminología eclesiástica ajena; el versículo no lo requiere.
  - La estructura imperativa/suplicatoria se preservó para reflejar el carácter imprecatorio del texto.
