- from: Me deleito en hacer tu voluntad[a], mi Dios, y tu instrucción está dentro de mi ser interior.
  to: Me deleito en hacer tu voluntad, mi Dios, y tu ley[a] está en mi interior.
  rationale: Se corrige el término clave תּוֹרָה para alinearlo con la decisión principal auditada del POB ('ley') y se conserva 'instrucción' como alternativa en nota, tal como pide la evidencia inglesa. También se mueve la marca [a] al lugar correcto y se simplifica la frase final a 'está en mi interior', que suena más natural en español sin perder la fuerza de interioridad del hebreo.
