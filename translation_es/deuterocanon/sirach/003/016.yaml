translation:
  language: es
  text: Porque el que desprecia a su padre es insolente[a], y el que maldice a su madre provoca a su Creador[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'actúa con presunción'; el paralelo griego lo intensifica como 'es un blasfemo'.
    reason: lexical_alternative
  - marker: b
    text: 'Paralelo griego: ''es maldito por el Señor''. El hebreo dice: ''provoca a su Creador''.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵזִיד
  english_pob_choice: is insolent
  chosen_spanish: es insolente
  alternatives_spanish:
  - actúa con presunción
  - es presumido
  - es blasfemo
  lexicon: HALOT
  rationale: El hebreo מֵזִיד expresa arrogancia y presunción culpable. En español, 'es insolente' comunica esa actitud de desafío sin volverla más técnica o teológica de lo que permite el hebreo. Conserva la fuerza moral del paralelismo y deja visible la tensión con el griego βλάσφημος, que intensifica el reproche.
- source_word: בּוֹזֶה
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - menosprecia
  - desprecia con desprecio
  - mira con desprecio
  lexicon: HALOT
  rationale: בזה denota tratar con desprecio o despreciar. 'Desprecia' es natural en español y reproduce el valor ético directo del término en el contexto del honor filial.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - a su padre
  - el padre de él
  lexicon: HALOT
  rationale: El sufijo pronominal debe mantenerse. 'Su padre' es la forma más fluida y clara en español, sin perder la referencia personal explícita.
- source_word: וּמַכְעִיס
  english_pob_choice: one who provokes
  chosen_spanish: provoca
  alternatives_spanish:
  - irrita
  - enfurece
  - hace enojar
  lexicon: HALOT
  rationale: El hifil participial de כעס expresa causar enojo o provocar. 'Provoca' mantiene el sentido causativo y funciona bien con el objeto directo 'a su Creador'.
- source_word: בּוֹרְאוֹ
  english_pob_choice: his Creator
  chosen_spanish: su Creador
  alternatives_spanish:
  - su hacedor
  - el que lo creó
  lexicon: HALOT
  rationale: Se conserva 'Creador' porque el hebreo nombra explícitamente a Dios como creador. Esta elección preserva la carga teológica del texto hebreo y evita diluirla en una formulación más genérica.
- source_word: מְקַלֵּל
  english_pob_choice: is cursed
  chosen_spanish: maldice
  alternatives_spanish:
  - queda bajo maldición
  - es maldito
  - lanza maldición
  lexicon: HALOT
  rationale: 'Aquí sigo la revisión del hebreo: el verbo es activo en la cláusula hebrea (''el que maldice a su madre''). En español, ''maldice'' refleja con precisión la acción del sujeto y evita confundirla con una pasiva que pertenece más bien al paralelo griego. El resultado de juicio divino queda expresado por ''provoca a su Creador''.'
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - a su madre
  - la madre de él
  lexicon: HALOT
  rationale: El sufijo pronominal se conserva con 'su madre', que es la forma idiomática y transparente en español.
theological_decisions:
- issue: Si el segundo hemistiquio debe reflejar el hebreo 'su Creador' o el paralelo griego 'el Señor'
  english_pob_reading: his Creator
  chosen_spanish_reading: su Creador
  alternative_spanish_readings:
  - el Señor
  - su Hacedor
  rationale: El proyecto da primacía al hebreo cuando está disponible y con alta confianza. El griego sirve como control y confirma la idea de juicio divino, pero la forma más específica y auditable del testimonio base es 'su Creador'.
  doctrine_reference: Translation philosophy §1; primacía de la fuente original sobre la tradición de traducción
- issue: Cómo reflejar la tensión entre el hebreo 'maldice' y el griego 'es maldito' en el segundo colon
  english_pob_reading: The Hebrew reads 'one who curses his mother'; the Greek parallel supports a passive/resultative sense of curse in the broader judgment idea
  chosen_spanish_reading: el que maldice a su madre provoca a su Creador
  alternative_spanish_readings:
  - el que maldice a su madre queda maldito por su Creador
  - el que maldice a su madre está bajo maldición
  rationale: 'La revisión más reciente del expediente corrigió el segundo colon para respetar el hebreo: el sujeto maldice activamente a su madre. Para no borrar la tensión con el griego, la nota conserva que el paralelo griego intensifica el juicio con una construcción pasiva. En el texto principal, la acción verbal hebrea queda clara y el juicio divino se expresa en el verbo siguiente.'
  doctrine_reference: Translation philosophy §3; preservar tensiones textuales sin resolverlas artificialmente
translation_notes:
  revision_awareness: 'Se integró la corrección más reciente del expediente: el hebreo distingue dos acciones en el segundo hemistiquio, ''maldice a su madre'' y ''provoca a su Creador''. Por eso el texto español evita una pasiva en ese lugar. También se preservó la tensión con el paralelo griego, que presenta una intensificación más fuerte en el juicio divino.'
  spanish_consistency_notes:
  - Se mantiene 'Creador' para בּוֹרְאוֹ, coherente con la prioridad del hebreo en Sirácides.
  - Se usa 'insolente' para מֵזִיד, siguiendo el valor de presunción/arrogancia sin imponer 'blasfemo' en el texto principal.
  - '''Maldice'' traduce el participio hebreo activo מְקַלֵּל; no se traslada al español la pasiva del griego en el cuerpo principal.'
  - Se conserva un registro bíblico claro y natural en español, evitando fórmulas eclesiásticas que oculten el testimonio lexical del original.
