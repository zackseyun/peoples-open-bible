translation:
  language: es
  text: Todo lo que les sucede es falso[a]; ¿cómo, entonces, se les puede considerar o llamar dioses?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que se dice de ellos es falso».'
