translation:
  language: es
  text: ¿Por qué han de decir las naciones, «¿Dónde está su Dios?» Que se dé a conocer entre las naciones, ante nuestros ojos, la venganza por la sangre derramada de tus siervos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que se dé a conocer entre las naciones ante nuestros ojos: la venganza por la sangre derramada de tus siervos».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué han de…?
  alternatives_spanish:
  - ¿Por qué deben…?
  - ¿Por qué…?
  lexicon: HALOT
  rationale: El hebreo introduce una protesta retórica con fuerza volitiva/implorativa; en español, «han de» conserva mejor ese matiz que un simple presente interrogativo.
- source_word: יֹאמְרוּ
  english_pob_choice: say
  chosen_spanish: decir
  alternatives_spanish:
  - hablar
  - declarar
  lexicon: HALOT
  rationale: Verbo de habla común y directo; «decir» mantiene naturalidad y precisión.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: HALOT
  rationale: En Salmos, גוים suele referirse a pueblos/naciones extranjeras; «naciones» evita el matiz eclesiástico de «gentiles» y sigue el valor contextual del hebreo.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está…?
  alternatives_spanish:
  - ¿Dónde queda…?
  - ¿Dónde se encuentra…?
  lexicon: HALOT
  rationale: Es una burla locativa directa; «¿Dónde está…?» reproduce con naturalidad el reto de los enemigos.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su dios
  lexicon: HALOT
  rationale: El referente es el Dios verdadero de Israel, aunque esté expresado desde la perspectiva burlona de las naciones. En español, la mayúscula en «Dios» es la forma más clara y fiel.
- source_word: יִוָּדַע
  english_pob_choice: be made known
  chosen_spanish: se dé a conocer
  alternatives_spanish:
  - sea conocido
  - sea hecho saber
  lexicon: HALOT
  rationale: El nifal de ידע pide una pasiva/reflexiva; «se dé a conocer» suena natural en español y conserva la idea de manifestación pública.
- source_word: בגוים
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - en medio de las naciones
  - entre los pueblos
  lexicon: HALOT
  rationale: La preposición ב con este sustantivo expresa la esfera donde ocurre la revelación; «entre» comunica bien esa distribución pública.
- source_word: לְעֵינֵינוּ
  english_pob_choice: before our eyes
  chosen_spanish: ante nuestros ojos
  alternatives_spanish:
  - a la vista de nosotros
  - en nuestra presencia
  lexicon: HALOT
  rationale: Expresión idiomática de visibilidad pública; «ante nuestros ojos» es idiomática y mantiene la vivacidad del hebreo.
- source_word: נִקְמַת
  english_pob_choice: the vengeance
  chosen_spanish: la venganza
  alternatives_spanish:
  - el castigo vindicador
  - la vindicación vengadora
  lexicon: HALOT
  rationale: Se conserva el término fuerte del hebreo sin suavizarlo. «Venganza» refleja la carga imprecatoria que el texto exige.
- source_word: דַּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: HALOT
  rationale: En español, el sintagma natural es «sangre derramada»; el hebreo remite a muerte violenta y culpable, no solo a líquido físico.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  lexicon: HALOT
  rationale: POB suele preservar el valor léxico fuerte de עבד como «esclavo» cuando el contexto no exige atenuación. Aquí la súplica dirigida a Dios no elimina el matiz de pertenencia y sujeción; por eso se mantiene la fuerza semántica.
- source_word: הַשָּׁפוּךְ
  english_pob_choice: the shed
  chosen_spanish: derramada
  alternatives_spanish:
  - vertida
  - que ha sido derramada
  lexicon: HALOT
  rationale: Participio pasivo aplicado a la sangre; «derramada» es la equivalencia más natural y fiel en español.
theological_decisions:
- issue: Imprecación y vindicación divina
  english_pob_reading: Retain the prayer for God's public vengeance without softening it into generic justice.
  chosen_spanish_reading: Mantener «venganza» sin reemplazarla por «justicia» o «vindicación».
  alternative_spanish_readings:
  - Que se haga justicia por la sangre de tus esclavos
  - Que se manifieste la vindicación de tus esclavos
  rationale: El hebreo usa נִקְמָה, no un término más neutro. Traducirlo como «justicia» diluiría la fuerza del ruego y ocultaría la dimensión imprecatoria del salmo.
  doctrine_reference: Principios de traducción POB §§1, 3, 6
- issue: Relación sintáctica de «ante nuestros ojos»
  english_pob_reading: Attach 'before our eyes' to the making-known of vengeance among the nations.
  chosen_spanish_reading: Vincular «ante nuestros ojos» con el hacerse público de la venganza entre las naciones.
  alternative_spanish_readings:
  - ante nuestros ojos, la venganza por la sangre derramada de tus esclavos
  - la venganza... ante nuestros ojos
  rationale: El hebreo permite más de una segmentación, pero el sentido más claro es que la acción vengadora de Dios sea visible públicamente y presenciada por el orante.
  doctrine_reference: Principios de traducción POB §5
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa, que ajustó la estructura a «the vengeance of your servants'' shed blood». Para español se optó por una construcción equivalente más natural: «la venganza por la sangre derramada de tus esclavos», conservando el orden sintáctico y la relación causal/objetiva del hebreo sin sobrecargar la frase.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida en el proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se preserva «venganza» por la carga semántica del hebreo; no se suaviza a «justicia».
  - Se usa «esclavos» para עבד según la preferencia léxica POB cuando el contexto no exige atenuación.
  - La mayúscula en «Dios» refleja el referente teológico verdadero, aunque sea citado en boca de las naciones.
