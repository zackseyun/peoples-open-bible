revisions:
- from: Tú has examinado mi corazón; me has visitado de noche; me has probado y no hallaste nada[a]. He resuelto que mi boca no se extravíe.
  to: Tú has examinado mi corazón; me has visitado de noche; me has probado y no encuentras nada[a]. He resuelto que mi boca no transgreda.
  rationale: Se corrige el tiempo verbal a 'no encuentras nada' para reflejar mejor el sentido del hebreo y la traducción auditada, y se sustituye 'no se extravíe' por 'no transgreda' para mantener la fuerza de עבר aplicada al habla. La nota conserva la alternativa más literal ya documentada.
