    text: '''Bringing his way upon his own head'' is a Hebrew idiom meaning to repay a person according to his conduct.'
    reason: cultural_note
  - marker: c
    text: Or 'declaring the righteous innocent' / 'vindicating the righteous.'
    reason: alternative_reading
