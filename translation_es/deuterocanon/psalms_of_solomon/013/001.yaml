translation:
  language: es
  text: La diestra de Yahvé me cubrió[a]; la diestra de Yahvé nos perdonó la vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'me protegió' para 'me cubrió'.
    reason: lexical_alternative
  - marker: b
    text: O 'tuvo misericordia de nosotros' para 'nos perdonó la vida'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δεξιὰ
  english_pob_choice: right hand
  chosen_spanish: diestra
  alternatives_spanish:
  - mano derecha
  - mano diestra
  lexicon: LSJ
  rationale: El sustantivo funciona de modo substantivo y metafórico para denotar el lado/mano de poder y protección. 'Diestra' es una forma bíblica y natural en español para conservar la imagen sin volverla pesada.
- source_word: Κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: LSJ
  rationale: 'El genitivo exige posesión: la mano/diestra pertenece a Yahvé. Se aplica el criterio del proyecto de usar ''Yahvé'' para el nombre divino, ya que el griego aquí refleja lenguaje bíblico sobre la mano de Dios.'
- source_word: ἐσκέπασέν
  english_pob_choice: sheltered
  chosen_spanish: me cubrió
  alternatives_spanish:
  - me resguardó
  - me protegió
  - me cubrió con su sombra
  lexicon: LSJ
  rationale: El verbo expresa la idea de cubrir con efecto protector. 'Cubrió' mantiene el vínculo lexical con el griego y en español bíblico comunica bien la protección; se evita imponer una paráfrasis más interpretativa.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: LSJ
  rationale: Pronombre objeto directo de primera persona singular; no presenta dificultad.
- source_word: ἐφείσατο
  english_pob_choice: spared
  chosen_spanish: perdonó
  alternatives_spanish:
  - me libró
  - se compadeció de nosotros
  - nos perdonó
  lexicon: LSJ
  rationale: El verbo puede significar 'ahorrar/mostrar clemencia' y en contexto divino admite el matiz de no destruir. En español, 'perdonó' conserva esa clemencia, pero se anota la alternativa 'perdonó' frente a lecturas de 'ahorró' o 'se compadeció' para no borrar la tensión entre perdón y preservación.
- source_word: ἡμῶν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - de nosotros
  lexicon: LSJ
  rationale: Aunque formalmente genitivo, con φείδομαι el complemento se entiende como el beneficiario/objeto de la acción. El clítico 'nos' suena natural en español y preserva la referencia colectiva.
theological_decisions:
- issue: Nombre divino en κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El texto fuente alude al nombre divino en un contexto de salvación/protección. Conforme al criterio del proyecto, se traduce con 'Yahvé' para no ocultar el nombre y mantener transparencia textual.
  doctrine_reference: DOCTRINE.md Contested terms
- issue: Sentido de ἐφείσατο aplicado a acción divina
  english_pob_reading: spared us
  chosen_spanish_reading: nos perdonó
  alternative_spanish_readings:
  - nos ahorró
  - tuvo misericordia de nosotros
  - nos libró
  rationale: El griego puede expresar tanto abstención de daño como clemencia. 'Nos perdonó' conserva la idea de misericordia sin borrar la noción de que Yahvé se abstuvo de destruir; la alternativa 'ahorró' es posible pero menos natural en español moderno.
  doctrine_reference: LSJ; uso bíblico de φείδομαι
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la traducción inglesa auditada. Se mantiene la estructura paralela del griego: dos cláusulas con ''la diestra de Yahvé'', diferenciando cuidadosamente ἐσκέπασέν con un verbo de cobertura protectora y ἐφείσατο con un verbo de clemencia/preservación.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para Κυρίου en el texto principal, conforme al criterio del proyecto.
  - '''Diestra'' preserva la imagen bíblica de poder protector mejor que una paráfrasis explicativa.'
  - La primera cláusula se traduce con 'cubrió' para mantener proximidad lexical; la nota ofrece 'protegió' como alternativa semántica.
  - La segunda cláusula opta por 'perdonó' para reflejar la clemencia del verbo griego sin neutralizar la posibilidad de preservación activa.
  - Se evita 'Señor' en el cuerpo del texto porque el proyecto distingue la representación del nombre divino de la convención eclesiástica de ocultarlo.
