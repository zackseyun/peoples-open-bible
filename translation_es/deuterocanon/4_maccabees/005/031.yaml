review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: niega que su edad y condición varonil impliquen que su razón deje de ser juvenil por causa de la εὐσέβεια. Conserva adecuadamente γέρων, ἀνδρῶδης y λογισμός. Sin embargo, la construcción española «como para que» con la nota anclada resulta poco natural, y «juvenil» aplicado a «razón» suena algo forzado en este contexto; «joven» comunica mejor el contraste metafórico de νεάζειν. Además, la nota alternativa debe corresponder mejor al English POB, que ofrece “piety” como alternativa a “godliness”; en español conviene mantener «devoción» como alternativa, pero la redacción principal puede mejorar con «piedad» o «devoción a Dios».'
  spanish_quality_summary: La frase es comprensible, pero «No soy tan viejo ni tan varonil, como para que...» introduce una pausa innecesaria y una sintaxis menos fluida que el español natural. «Mi razón no sea juvenil» es inteligible, pero suena rígido; «mi razón no siga siendo joven» o «no sea joven» es más idiomático. El registro general es digno y legible.
  glossary_alignment: No hay conflicto con los términos obligatorios del proyecto. «Razón» para λογισμός y «varonil» para ἀνδρῶδης están bien alineados. Para εὐσέβεια, «piedad» es aceptable y tradicional, con nota de alternativa «devoción», siempre explicando la orientación a Dios.
  issues:
  - severity: medium
    issue: Sintaxis española poco natural en «como para que[a]»
    rationale: La construcción transmite el resultado, pero con la coma y el anclaje de nota queda trabada. «como para que, por causa de la piedad, mi razón no siga siendo joven» o una estructura con «que» simple fluye mejor.
  - severity: medium
    issue: «juvenil» aplicado a «razón» suena forzado
    rationale: Aunque refleja de cerca νεάζειν, en español bíblico legible «joven» o «se mantenga joven» expresa mejor la metáfora sin perder sentido filosófico.
  - severity: low
    issue: Puntuación mejorable
    rationale: La coma antes de «como para que» no ayuda y puede quitarse para una lectura más natural.
