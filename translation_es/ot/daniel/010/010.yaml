  rationale: 'Se ajusta la cláusula verbal central para que el español suene natural y conserve mejor el valor causativo del hebreo: la mano no solo lo «pone» de manera estática, sino que lo hace pasar a la postura descrita. Se mantiene la imagen literal de rodillas y palmas, sin añadir el matiz de temblor que la revisión inglesa ya había descartado.'
