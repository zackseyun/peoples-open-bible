translation:
  language: es
  text: Pone su mano al pedernal[a]; vuelca los montes desde sus raíces[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «contra el pedernal» o «sobre la roca pedernosa»; el hebreo puede describir la acción de poner o apoyar la mano sobre la roca dura en el trabajo de minería.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «desde la raíz de los montes»; el plural español «sus raíces» expresa el sentido colectivo del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחַלָּמִישׁ
  english_pob_choice: to the flint
  chosen_spanish: sobre el pedernal
  alternatives_spanish:
  - al pedernal
  - contra el pedernal
  - sobre la roca pedernosa
  lexicon: HALOT
  rationale: חַלָּמִישׁ designa una roca muy dura, pedernal o piedra flint. En español, «pedernal» mantiene bien la dureza del objeto y sugiere el contexto de trabajo minero o de talla. La preposición ב con שׁלח יד admite una lectura de contacto o aplicación a la superficie trabajada; por eso «sobre» conserva la imagen sin volverla áspera en español.
- source_word: שָׁלַח יָדוֹ
  english_pob_choice: He puts his hand
  chosen_spanish: Pone su mano
  alternatives_spanish:
  - Extiende su mano
  - Lleva su mano
  - Aplica su mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no significa necesariamente «enviar» la mano, sino ponerla o aplicarla a algo. «Pone su mano» reproduce ese valor activo y concreto en un español natural, especialmente en el marco de la imagen de cantera o minería.
- source_word: הָפַךְ
  english_pob_choice: he overturns
  chosen_spanish: vuelca
  alternatives_spanish:
  - derriba
  - revuelca
  - trastorna
  lexicon: HALOT
  rationale: הָפַךְ expresa dar vuelta, volcar u overturn. «Vuelca» conserva la fuerza física del verbo y funciona bien con la imagen hiperbólica de mover montes desde su base. Evita suavizar el impacto poético del hebreo.
- source_word: מִשֹּׁרֶשׁ
  english_pob_choice: from their roots
  chosen_spanish: desde su raíz
  alternatives_spanish:
  - desde sus raíces
  - desde el fondo
  - desde la base
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma singular, el contexto colectivo de «montes» permite una expresión singular genérica en español. «Desde su raíz» mantiene la imagen de procedencia desde lo más hondo o basal, sin forzar un plural que el hebreo no exige explícitamente.
- source_word: הָרִים
  english_pob_choice: mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: הָרִים significa montes o montañas. «Montes» es más sobrio y poético en español bíblico, y encaja mejor con el paralelismo del verso que «montañas».
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide sustancialmente con la línea de auditoría inglesa. Se preserva la imagen de intervención manual sobre roca dura y el movimiento hiperbólico de los montes desde su base; no fue necesaria una revisión sustantiva respecto del alineamiento fuente-auditoría.
  spanish_consistency_notes:
  - Se mantuvo «pedernal» para חַלָּמִישׁ por ser el término bíblico más claro y digno en español.
  - Se prefirió «montes» a «montañas» por registro poético y correspondencia con traducciones bíblicas formales sin depender de formulismos eclesiásticos.
  - La relación entre la mano y la roca queda expresada con una preposición de contacto («sobre») que evita un calco duro y conserva la tensión semántica documentada en la auditoría.
