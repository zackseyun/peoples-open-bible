translation:
  language: es
  text: Porque tanto el profeta como el sacerdote son impíos[a]; aun en mi casa he hallado su maldad[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “son profanos”, “están contaminados” o “son hipócritas”. El verbo hebreo expresa corrupción moral-religiosa, no solo fingimiento.'
    reason: lexical_alternative
  - marker: b
    text: “Mi casa” se refiere al templo.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o motivo del juicio anterior; en español, 'Porque' conserva bien ese valor explicativo sin sonar forzado.
- source_word: גַם ... גַם
  english_pob_choice: both ... and
  chosen_spanish: tanto ... como
  alternatives_spanish:
  - así ... como
  - ambos ... y
  lexicon: HALOT
  rationale: La correlación repetida subraya que ambos grupos están implicados; 'tanto ... como' reproduce esa suma enfática de manera natural en español.
- source_word: נָבִיא
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  lexicon: HALOT
  rationale: Es el equivalente estándar y fiel al término hebreo en este contexto.
- source_word: כֹּהֵן
  english_pob_choice: priest
  chosen_spanish: sacerdote
  alternatives_spanish:
  - levita
  lexicon: HALOT
  rationale: '''Sacerdote'' es el término usual y preciso para el rol cultual del hebreo כֹּהֵן.'
- source_word: חָנֵפוּ
  english_pob_choice: are ungodly
  chosen_spanish: son impíos
  alternatives_spanish:
  - son profanos
  - están corrompidos
  - son hipócritas
  lexicon: HALOT
  rationale: El verbo expresa corrupción moral y religiosa, no solo fingimiento. 'Impíos' comunica bien esa falta de reverencia y rectitud ante Dios, mientras mantiene la tensión semántica del original.
- source_word: בְּבֵיתִי
  english_pob_choice: in my house
  chosen_spanish: en mi casa
  alternatives_spanish:
  - en mi templo
  - en mi morada
  lexicon: HALOT
  rationale: Conserva la expresión literal de la fuente hebrea. En este contexto, 'mi casa' alude al templo sin necesidad de explicitarlo en el texto principal.
- source_word: מָצָאתִי
  english_pob_choice: I have found
  chosen_spanish: he hallado
  alternatives_spanish:
  - he encontrado
  - hallé
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa naturalmente con pretérito perfecto en español, manteniendo la actualidad de la constatación divina.
- source_word: רָעָתָם
  english_pob_choice: their evil
  chosen_spanish: su mal
  alternatives_spanish:
  - su maldad
  - su perversidad
  - su maldad/iniquidad
  lexicon: HALOT
  rationale: '''Mal'' reproduce la amplitud semántica de רָעָה y evita estrechar el término solo a una categoría moral particular. El posesivo singular en español refleja el plural hebreo (''de ellos'') de forma idiomática.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de manera sobria y natural. Se mantiene el nombre divino 'Yahvé' según el criterio del proyecto, en lugar de sustituirlo por una designación genérica.
theological_decisions:
- issue: Valor moral-religioso de חָנֵף / חָנַף
  english_pob_reading: are ungodly; 'profane,' 'polluted,' or 'hypocritical' are possible alternatives
  chosen_spanish_reading: son impíos
  alternative_spanish_readings:
  - son profanos
  - están contaminados
  - son hipócritas
  rationale: La evidencia léxica apunta a corrupción religiosa y moral, no meramente a incoherencia externa. 'Impíos' conserva la fuerza teológica del juicio sin reducirlo a simple hipocresía.
  doctrine_reference: HALOT; POB lexical note on moral-religious corruption
- issue: Referencia de 'mi casa'
  english_pob_reading: '''My house'' refers to the temple.'
  chosen_spanish_reading: en mi casa
  alternative_spanish_readings:
  - en mi templo
  - en mi morada
  rationale: Se preserva la expresión hebrea literal, que en contexto señala el templo. La referencia cultual queda accesible para el lector sin sobreexplicar el texto bíblico.
  doctrine_reference: POB cultural note; Jeremías 23:11 temple context
- issue: Fórmula profética y nombre divino
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: dice Yahvé
  alternative_spanish_readings:
  - declara Yahvé
  - oráculo de Yahvé
  rationale: La fórmula mantiene el cierre profético y el uso transparente del nombre divino. 'Yahvé' sigue el principio del proyecto de no enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se ha mantenido la lectura de alta concordancia del audit trail: estructura correlativa con tanto... como, valor moral-religioso de חָנֵף como ''impíos'', preservación de ''mi casa'' para el templo, y cierre profético con el nombre divino Yahvé/Yahvé. No se incorporaron cambios de revisión porque el pass más reciente indicó ''unchanged''.'
  spanish_consistency_notes:
  - Se conserva el nombre divino 'Yahvé' conforme al estándar del proyecto.
  - '''Impíos'' se usa con sentido teológico fuerte, no como simple insulto moral.'
  - '''Mi casa'' mantiene la literalidad hebrea y la referencia cultual implícita.'
  - La fórmula final 'dice Yahvé' es idiomática y coherente con el registro profético español.
