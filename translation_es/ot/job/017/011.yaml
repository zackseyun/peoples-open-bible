translation:
  language: es
  text: Mis días han pasado; mis planes se han quebrado, los anhelos[a] de mi corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las posesiones de mi corazón», «las cosas queridas de mi corazón» o «las herencias de mi corazón». La expresión hebrea es rara y difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמַי
  english_pob_choice: my days
  chosen_spanish: mis días
  alternatives_spanish:
  - los días de mi vida
  lexicon: HALOT
  rationale: El constructo con sufijo de primera persona se refleja de forma directa y natural en español con "mis días". Conserva la imagen poética del tiempo de vida que se agota.
- source_word: עָבְרוּ
  english_pob_choice: have passed by
  chosen_spanish: han pasado
  alternatives_spanish:
  - han pasado por aquí
  - se han ido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa acción completada; "han pasado" mantiene ese valor sin añadir matices innecesarios. En español, el complemento "by" no necesita reproducirse literalmente para que la imagen sea clara.
- source_word: זִמֹּתַי
  english_pob_choice: my plans
  chosen_spanish: mis planes
  alternatives_spanish:
  - mis propósitos
  - mis pensamientos
  - mis proyectos
  lexicon: HALOT
  rationale: El término hebreo es raro y admite varias posibilidades semánticas. "Planes" conserva el sentido de intención/proyecto y evita la carga moral negativa que a veces trae "maquinaciones" o "tramas".
- source_word: נִתְּקוּ
  english_pob_choice: are broken off
  chosen_spanish: se han quebrado
  alternatives_spanish:
  - se han roto
  - han sido cortados
  - se han desprendido
  lexicon: HALOT
  rationale: La raíz comunica la idea de algo cortado o separado. "Se han quebrado" mantiene la fuerza imagística de ruptura y funciona de manera poética en español, sin endurecerlo a una metáfora técnica.
- source_word: מ֖וֹרָשֵׁי
  english_pob_choice: the desires of
  chosen_spanish: los anhelos de
  alternatives_spanish:
  - las posesiones de
  - las herencias de
  - las cosas queridas de
  lexicon: HALOT
  rationale: El hebreo es difícil y el audit trail inglés preserva la tensión con una nota de alternativas. En español, "anhelos" expresa de manera plausible aquello que el corazón posee o desea intensamente, manteniendo la ambigüedad sin resolverla de forma excesiva.
- source_word: לְבָבִי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser interior
  lexicon: HALOT
  rationale: '"Corazón" es la correspondencia natural y fiel de לְבָבִי, preservando el centro antropológico hebreo de pensamiento, deseo y voluntad.'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: se prefirió una imagen de ruptura/corte para נִתְּקוּ, pero en español se optó por "se han quebrado" por ser más idiomático y poético, sin perder la idea de separación o ruptura. También se mantuvo la frase final como complemento apposicional intacto, reflejando la dificultad léxica de מוֹרָשֵׁי.'
  spanish_consistency_notes:
  - Se mantiene el tiempo perfecto compuesto para reflejar la acción completada de los verbos hebreos.
  - '"Corazón" se usa en sentido antropológico bíblico, no meramente emocional.'
  - No se traduce YHWH ni hay términos cristológicos en este versículo.
  - La nota [a] se ancla en la frase final porque allí recae la ambigüedad léxica principal.
