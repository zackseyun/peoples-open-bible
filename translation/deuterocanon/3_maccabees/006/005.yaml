id: 3MA.6.5
reference: 3 Maccabees 6:5
source:
  edition: lxx-swete-1909
  text: σὺ τὸν ἀναριθμήτοις δυνάμεσιν γαυρωθέντα Σενναχηρεὶμ βαρὺν Ἀσσυρίων βασιλέα, δόρατι τὴν πᾶσαν ὑποχείριον ἤδη λαβόντα γῆν καὶ μετεωρισθέντα ἐπὶ τὴν ἁγίαν σου πόλιν, βαρέα λαλοῦντα κόμπῳ καὶ θράσει, σύ, δέσποτα, ἔθραυσας, ἔκδηλον δεικνὺς ἔθνεσιν πολλοῖς τὸ σὸν κράτος.
  language: Greek
  pages:
