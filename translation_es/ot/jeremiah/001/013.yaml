review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la fórmula profética, «Yahvé», «por segunda vez», la visión de la olla y la ambigüedad de פָּנָיו. Sin embargo, «su rostro está hacia el norte» cambia el valor de מִפְּנֵי צָפוֹנָה / English POB «from the north» hacia una orientación direccional más resuelta de lo que permite el hebreo auditado. Conviene conservar mejor la asociación con procedencia/referencia norteña sin fijar una geometría distinta.
  spanish_quality_summary: El español es claro y digno. «Olla hirviente» suena natural. «Y aconteció que» es aceptable pero algo pesado; no obstante, no es erróneo. El principal problema de legibilidad/fidelidad está en «hacia el norte», que suena natural pero interpreta demasiado. También la nota a dice «soplante», opción poco idiomática; es mejor documentar «una olla soplada/avivada por el fuego» como alternativa explicativa.
  glossary_alignment: 'Buen alineamiento con el glosario del proyecto: יְהוָה → «Yahvé» correctamente; דְבַר יְהוָה → «la palabra de Yahvé» bien preservado. No hay conflicto con otros términos doctrinales. La excepción necesaria es ajustar la frase direccional para seguir la decisión inglesa auditada y la tensión teológica/imagística del hebreo.'
  issues:
  - severity: medium
    issue: «su rostro está hacia el norte» sobreinterpreta la orientación
    rationale: El hebreo literal es «su rostro [está] desde la cara del norte»; el English POB final escogió «its face is from the north», no «toward the north». «Hacia» convierte la referencia en un apuntar direccional más definido.
  - severity: low
    issue: La nota [a] usa «soplante», poco natural en español
    rationale: Aunque intenta reflejar נָפוּחַ, «soplante» no es una alternativa léxica española clara para una olla. Mejor explicar la idea con «soplada» o «avivada por el fuego» en la nota, sin forzar esa forma al texto principal.
  revised_spanish_text: 'Y aconteció que la palabra de Yahvé vino a mí por segunda vez, diciendo: «¿Qué ves?». Y yo dije: «Veo una olla hirviente[a], y su rostro viene del norte[b]».'
  revised_footnotes:
  - marker: a
    text: O «una olla soplada»; el participio hebreo puede sugerir una olla avivada por el fuego o soplada hasta hervir.
    reason: lexical_alternative
  - marker: b
    text: Lit. «su rostro [está] desde la cara del norte». La expresión probablemente alude a la parte expuesta o a la abertura de la olla orientada con referencia al norte.
    reason: alternative_reading
  revision_rationale: Se ajusta la frase final para evitar que «hacia el norte» resuelva la imagen como mera orientación hacia un punto cardinal. «Viene del norte» conserva mejor la asociación con «from the north» del audit trail y con la amenaza que procede del norte en el contexto siguiente, manteniendo la extrañeza imagística del hebreo. También se mejora la nota [a] para que la alternativa sea idiomática en español.
