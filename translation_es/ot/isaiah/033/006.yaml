translation:
  language: es
  text: Y él será la estabilidad de tus tiempos[a], una riqueza de salvación[b], sabiduría y conocimiento; el temor de Yahvé es su tesoro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Habrá estabilidad en tus tiempos»; el verbo hebreo puede leerse de forma impersonal en lugar de tener a «él» como sujeto.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «salvaciones»; probablemente un plural intensivo que significa abundante salvación o muchas liberaciones.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el temor de Yahvé es tu tesoro» o «es su tesoro» referido a otro antecedente; el referente del sufijo final es debatido.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And he will be
  chosen_spanish: Y él será
  alternatives_spanish:
  - Y habrá
  - Y será
  lexicon: HALOT
  rationale: El verbo hebreo está en singular masculino y permite un sujeto personal. Siguiendo la lectura auditada del POB, el español conserva el sujeto implícito con «él» para no perder la referencia personal a Yahvé.
- source_word: אֱמוּנַת
  english_pob_choice: the stability of
  chosen_spanish: la estabilidad de
  alternatives_spanish:
  - la fidelidad de
  - la firmeza de
  lexicon: HALOT
  rationale: En este contexto, el sustantivo expresa solidez, confiabilidad o firmeza objetiva más que fe subjetiva. «Estabilidad» comunica bien ese sentido en español y mantiene la tensión semántica sin volverlo interpretativo de más.
- source_word: עִתֶּיךָ
  english_pob_choice: your times
  chosen_spanish: tus tiempos
  alternatives_spanish:
  - tus épocas
  - tus días
  lexicon: HALOT
  rationale: El plural hebreo abarca el curso de los tiempos; «tus tiempos» preserva amplitud temporal y suena natural en español bíblico actual.
- source_word: חֹסֶן
  english_pob_choice: a wealth of
  chosen_spanish: una riqueza de
  alternatives_spanish:
  - una abundancia de
  - un tesoro de
  - unas riquezas de
  lexicon: HALOT
  rationale: El término puede implicar riqueza, abundancia o tesoro. «Una riqueza de» sigue de cerca la decisión inglesa revisada y conserva el valor sustantivo acumulativo del hebreo sin forzar una paráfrasis.
- source_word: יְשׁוּעֹת
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - salvaciones
  - liberaciones
  - victorias
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, el plural puede funcionar de modo intensivo o abstracto. En español, «salvación» es la forma más natural y fiel para una lista de bienes divinos.
- source_word: חָכְמַת
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sustantivo en la serie paralela de dones.
- source_word: וָדָעַת
  english_pob_choice: and knowledge
  chosen_spanish: y conocimiento
  alternatives_spanish:
  - y saber
  - y entendimiento
  lexicon: HALOT
  rationale: «Conocimiento» refleja el valor léxico básico y mantiene el paralelismo con «sabiduría» sin desplazar el matiz cognitivo.
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor de Yahveh
  - el temor del SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: YHWH se vierte «Yahvé» y la expresión fija se traduce con «temor» para conservar su valor reverente/covenantal, no meramente emocional.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino transliterado según la norma del proyecto, en vez de sustituirlo por un título como «Señor».
- source_word: הִיא אוֹצָרוֹ
  english_pob_choice: is his treasure
  chosen_spanish: es su tesoro
  alternatives_spanish:
  - es su riqueza
  - es su almacén
  - es su tesoro
  lexicon: HALOT
  rationale: La referencia del sufijo final es debatida. En español, «su tesoro» conserva la ambigüedad entre el sujeto previo y el poseedor implícito, y respeta el valor de אוֹצָר como tesoro/depósito valioso.
theological_decisions:
- issue: Identidad del sujeto de וְהָיָה
  english_pob_reading: 'The verse speaks personally of the LORD: ''he will be the stability of your times...''.'
  chosen_spanish_reading: 'El versículo mantiene un sujeto personal implícito: «él será la estabilidad de tus tiempos...».'
  alternative_spanish_readings:
  - «Habrá estabilidad en tus tiempos...»
  - «Y será la estabilidad de tus tiempos...»
  rationale: La gramática permite una lectura impersonal, pero el contexto favorece un sujeto personal. El español conserva esa tensión sin cerrarla del todo, siguiendo la cautela del POB.
  doctrine_reference: Preservar la ambigüedad real del texto cuando la sintaxis lo permite, sin resolver más de lo que la evidencia sostiene.
- issue: Plurales de salvación y el alcance de los dones
  english_pob_reading: Hebrew 'salvations,' likely an intensive plural meaning abundant salvation or many deliverances.
  chosen_spanish_reading: «salvación» en singular para el valor intensivo del plural hebreo.
  alternative_spanish_readings:
  - «salvaciones»
  - «liberaciones»
  rationale: El plural hebreo tiene fuerza intensiva o abstracta. El singular español comunica mejor la idea global sin perder el trasfondo de múltiples actos de liberación.
  doctrine_reference: Respetar la fuerza semántica del plural hebreo sin imponer una forma española artificial.
- issue: Referente final de «su tesoro»
  english_pob_reading: the referent of the final suffix is debated.
  chosen_spanish_reading: «su tesoro» deja abierta la referencia del posesivo.
  alternative_spanish_readings:
  - «su tesoro» referido a Yahvé
  - «su tesoro» referido a Judá/Sion
  rationale: La ambigüedad del sufijo final está documentada y no debe eliminarse. «Su tesoro» permite que el lector perciba la discusión sin que la traducción resuelva indebidamente el referente.
  doctrine_reference: Conservar tensiones teológicas y pronominales documentadas por el texto base.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB al preferir una expresión sustantiva para חֹסֶן más cercana a «wealth»/«treasure» que a una simple abstracción. También mantiene el enfoque de alto acuerdo del expediente: sujeto personal posible, plural intensivo en יְשׁוּעוֹת y ambigüedad final del posesivo, sin sobre-resolverlos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «temor de Yahvé» como expresión reverente estable, no como miedo.
  - «Salvación» en singular refleja el plural intensivo hebreo sin añadir glosas al texto principal.
  - La puntuación separa los miembros poéticos según el paralelismo hebreo y la lectura auditada en inglés.
  - La nota [c] se ancla en «su tesoro» para señalar la ambigüedad del posesivo final.
