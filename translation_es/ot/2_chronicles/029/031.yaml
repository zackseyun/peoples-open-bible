translation:
  language: es
  text: 'Entonces Ezequías respondió y dijo: «Ahora han llenado su mano para Yahvé[a]. Acérquense y traigan sacrificios y ofrendas de gratitud a la casa de Yahvé». Y la asamblea trajo sacrificios y ofrendas de gratitud, y todos los de corazón dispuesto trajeron holocaustos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «han llenado su mano para Yahvé», un modismo para ser instalado o consagrado al servicio sagrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: El hebreo usa un verbo narrativo común de respuesta; en español, «respondió» conserva el valor idiomático y la secuencia con «y dijo» sin forzar calco.
- source_word: מִלֵּאתֶם יֶדְכֶם
  english_pob_choice: you have filled your hand for Yahweh
  chosen_spanish: han llenado su mano para Yahvé
  alternatives_spanish:
  - han consagrado sus manos para Yahvé
  - han sido instalados para Yahvé
  lexicon: HALOT
  rationale: Se conserva el giro hebreo literalmente porque el audit trail documenta la metáfora de instalación/consecración, y el texto fuente no la explicita con otra palabra.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el nombre divino: «Yahvé» en el texto principal. Aquí la preposición expresa dirección/dedicación del acto.'
- source_word: גֹּשׁוּ
  english_pob_choice: Come near
  chosen_spanish: Acerquémonos
  alternatives_spanish:
  - Acérquense
  - Vengan cerca
  lexicon: HALOT
  rationale: El verbo denota acercarse para el acto de culto. En este contexto, la forma inclusiva «Acerquémonos» comunica la invitación cultual con naturalidad en español, aunque el hebreo sea plural imperativo.
- source_word: וְהָבִיאוּ
  english_pob_choice: bring
  chosen_spanish: traigan
  alternatives_spanish:
  - presenten
  - lleven
  lexicon: HALOT
  rationale: «Traigan» reproduce el mandato de aportar ofrendas de manera clara y natural, sin perder el valor de llevar/presentar ante el santuario.
- source_word: זְבָחִים
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas sacrificadas
  - víctimas
  lexicon: HALOT
  rationale: El término general de sacrificios se mantiene con la forma más estándar y transparente en español.
- source_word: תוֹדוֹת
  english_pob_choice: thank offerings
  chosen_spanish: ofrendas de gratitud
  alternatives_spanish:
  - ofrendas de acción de gracias
  - ofrendas de alabanza
  lexicon: HALOT
  rationale: «Ofrendas de gratitud» comunica el sentido cultual de thanksgiving offerings y evita el giro más anglosajón de «thank offerings».
- source_word: לְבֵית יְהוָה
  english_pob_choice: to the house of Yahweh
  chosen_spanish: a la casa de Yahvé
  alternatives_spanish:
  - al templo de Yahvé
  - a la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva «casa de Yahvé», que refleja la expresión hebrea y evita sustituirla por un término más interpretativo como «templo».
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - el pueblo reunido
  lexicon: HALOT
  rationale: «Asamblea» mantiene el sentido de comunidad reunida para el culto y coincide con el uso del POB en inglés.
- source_word: כָל נְדִיב לֵב
  english_pob_choice: all who were willing of heart
  chosen_spanish: todos los de corazón dispuesto
  alternatives_spanish:
  - todos los voluntariosos de corazón
  - todos los que tenían el corazón dispuesto
  lexicon: HALOT
  rationale: La frase hebrea expresa disposición voluntaria del corazón; «de corazón dispuesto» es natural en español y conserva la antropología semítica del original.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - holocausto
  lexicon: HALOT
  rationale: «Holocaustos» es el término cultual tradicional para ofrendas totalmente consumidas, y en español bíblico sigue siendo claro y preciso en este contexto.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide rendir יהוה como «Yahvé» en el texto principal. Esto mantiene la distinción del nombre pactual sin enmascararlo con un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Giro idiomático de מִלֵּאתֶם יֶדְכֶם
  english_pob_reading: you have filled your hand for Yahweh
  chosen_spanish_reading: han llenado su mano para Yahvé
  alternative_spanish_readings:
  - han sido consagrados para Yahvé
  - han sido instalados para Yahvé
  rationale: Se conserva la metáfora hebrea porque el aparato inglés la retiene con nota explicativa. En español, mantenerla evita borrar la tensión entre literalidad e interpretación.
  doctrine_reference: Lexical idiom in priestly/temple service language
- issue: תוֹדוֹת
  english_pob_reading: thank offerings
  chosen_spanish_reading: ofrendas de gratitud
  alternative_spanish_readings:
  - ofrendas de acción de gracias
  - ofrendas de agradecimiento
  rationale: La ofrenda es cultual, no solo un sentimiento. «Gratitud» preserva el valor devocional y sonoridad bíblica sin perder inteligibilidad.
  doctrine_reference: Sacrificial terminology in OT worship
- issue: עֹלוֹת
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  rationale: Aunque «holocaustos» puede sonar más tradicional, aquí comunica con precisión la categoría sacrificial de ofrendas enteramente quemadas, sin confundirla con usos modernos del término.
  doctrine_reference: Levitical sacrificial categories
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés POB: se mantiene la literalidad de מִלֵּאתֶם יֶדְכֶם como modismo («han llenado su mano») en vez de reinterpretarlo como «consagrarse». También se conserva la secuencia narrativa simple «respondió y dijo»/«respondió» y la terminología cultual básica («sacrificios», «ofrendas de gratitud», «holocaustos») sin ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se preserva el paralelismo cultual de «sacrificios y ofrendas de gratitud» en ambas cláusulas.
  - «Asamblea» traduce הַקָּהָל con el mismo registro que el POB en inglés.
  - La nota de pie de página marca la tensión entre el modismo hebreo y su valor funcional de consagración/instalación.
