    rationale: Aunque intenta distinguir los dos términos hebreos, en español suena forzado. «ardor de su ira» o «ira ardiente» transmite mejor la metáfora de calor y la intensificación.
  - severity: low
    issue: La nota alternativa usa «dismayerá»
    rationale: Es un calco poco natural del inglés «dismay». En español bíblico legible conviene «los llenará de espanto» o «los alarmará».
