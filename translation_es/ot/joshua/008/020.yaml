base_translation:
  language: en
  yaml_path: translation/ot/joshua/008/020.yaml
  text: Then the men of Ai turned behind them and looked[a], and behold, the smoke of the city was going up to the sky, and there was no power in them to flee this way or that[c][b]. And the people who had fled to the wilderness turned back against the pursuer.
  footnotes:
  - marker: a
    text: Or 'rose to heaven.' The Hebrew expression is literally 'heavenward/skyward.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''there was no hands in them,'' meaning they had no power or ability to escape.'
    reason: cultural_note
  - marker: c
    text: The Hebrew has singular 'the pursuer,' likely used collectively for the pursuing force.
    reason: lexical_alternative
