review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: adversativo inicial, anuncio de revelación, referencia a lo registrado en un documento veraz, y la cláusula exceptiva sobre Miguel. También conserva correctamente la alternativa de הָרָשׁוּם y la ambigüedad contextual de עַל אֵלֶּה / מִתְחַזֵּק en nota. Sin embargo, hay un ajuste importante de estilo objetivo: ''vuestro príncipe'' no corresponde al español neutral latinoamericano solicitado; debe ser ''su príncipe''. Además, ''estas cosas'' suena menos natural aquí que ''estos'' o ''estas realidades'', dado que el hebreo deja el referente más abierto.'
  spanish_quality_summary: La redacción es clara y digna, pero requiere una pequeña corrección para adecuarse al registro panhispánico eclesial pedido. 'La escritura de la verdad' es formalmente fiel, aunque algo tiesa; puede mantenerse. 'Consignado' es válido y preciso. El principal problema de legibilidad/estilo es 'vuestro', ajeno al estándar latinoamericano neutral. También conviene evitar 'estas cosas', que en español suena algo coloquial e impreciso en un contexto angelológico; 'estos' preserva mejor la apertura del hebreo y armoniza con la nota.
  glossary_alignment: No hay conflictos con los términos teológicos del proyecto. 'Miguel' y 'príncipe' están bien. No aparecen los términos sensibles principales del glosario (Yahvé, Mesías, esclavo, etc.). La decisión de no introducir 'arcángel' está correctamente alineada con la evidencia fuente.
  issues:
  - severity: medium
    issue: Uso de 'vuestro príncipe'
    rationale: El encargo pide español neutral latinoamericano / ampliamente legible en iglesia. 'Vuestro' es marcadamente peninsular y rompe el objetivo estilístico. 'Su príncipe' comunica fielmente el 2mp hebreo sin localismo.
  - severity: low
    issue: '''contra estas cosas'' suena poco natural'
    rationale: Aunque es defendible como explicitación, el hebreo אֵלֶּה deja el referente abierto y la nota ya explica las posibilidades. 'Contra estos' es más sobrio y conserva mejor la indeterminación del original.
  revised_spanish_text: Pero yo te diré lo que está consignado en la escritura de la verdad[a]. Y no hay nadie que se mantenga firme conmigo contra estos, sino Miguel[b], su príncipe.
  revised_footnotes:
  - marker: a
    text: O 'lo que está escrito en la escritura de la verdad.'
    reason: lexical_alternative
  - marker: b
    text: O 'que me apoya en estos asuntos'. La expresión hebrea puede significar ponerse firmemente al lado de alguien, y 'estos' puede referirse tanto a potencias hostiles como a los asuntos en discusión.
    reason: alternative_reading
  revision_rationale: 'Se hicieron dos ajustes menores: (1) ''vuestro príncipe'' se cambió a ''su príncipe'' para cumplir con el español neutral latinoamericano solicitado, sin perder el valor de segunda persona plural del hebreo; (2) ''contra estas cosas'' se simplificó a ''contra estos'' para conservar mejor la apertura del referente hebreo y sonar más natural en español, ajustando la nota en consecuencia.'
