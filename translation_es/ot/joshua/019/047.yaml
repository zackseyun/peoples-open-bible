base_translation:
  language: en
  yaml_path: translation/ot/joshua/019/047.yaml
  text: But the territory of the sons of Dan went out beyond them[a], so the sons of Dan went up and fought against Leshem, and they captured it and struck it with the edge of the sword, and they took possession of it and lived in it, and they called Leshem Dan[b], after the name of Dan their father.
  footnotes:
  - marker: a
    text: Or 'the border of the sons of Dan extended beyond them.' Some translations render the clause interpretively as 'the territory of the sons of Dan was too small for them,' drawing on the broader context, but the Hebrew wording is more literally spatial.
    reason: alternative_reading
  - marker: b
    text: Leshem is associated with Laish in Judges 18:7, 14, 27, 29.
    reason: cross_reference
