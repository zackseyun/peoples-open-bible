translation:
  language: es
  text: He aquí, te he refinado, pero no como la plata[a]; te he escogido[b] en el horno de la aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «no con/como plata»; el hebreo es difícil y probablemente significa que este refinamiento no fue como el refinamiento de la plata.
    reason: lexical_alternative
  - marker: b
    text: 'O: «te he probado». El verbo hebreo también puede entenderse en ese sentido dentro de la imagen del refinamiento, aunque su sentido más usual es «escoger».'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: La partícula introduce la afirmación con fuerza exhortativa y de atención inmediata. En español, "Mira" transmite ese tono profético de llamada al oyente sin sonar tan arcaico como "He aquí".
- source_word: צְרַפְתִּיךָ
  english_pob_choice: I have refined you
  chosen_spanish: te he refinado
  alternatives_spanish:
  - te he fundido
  - te he probado
  lexicon: HALOT
  rationale: El verbo alude al refinamiento/metales. "Refinado" conserva la metáfora metalúrgica y funciona de manera natural en español bíblico contemporáneo.
- source_word: וְלֹא בְכָסֶף
  english_pob_choice: but not as silver
  chosen_spanish: pero no como la plata
  alternatives_spanish:
  - pero no con plata
  - pero no por plata
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. "Como la plata" refleja mejor el valor comparativo probable que la simple instrumentalidad, manteniendo la tensión señalada por la auditoría inglesa.
- source_word: בְּחַרְתִּיךָ
  english_pob_choice: I have chosen you
  chosen_spanish: te he escogido
  alternatives_spanish:
  - te he elegido
  - te he probado
  lexicon: HALOT
  rationale: Se preserva la lectura revisada del POB inglés, que favorece "chosen" como traducción más directa del verbo. "Escogido" suena bíblico y claro en español, sin borrar la posibilidad alternativa del matiz de prueba.
- source_word: בְּכוּר
  english_pob_choice: in the furnace
  chosen_spanish: en el horno
  alternatives_spanish:
  - en el crisol
  - en el horno de fundición
  lexicon: HALOT
  rationale: '"Horno" expresa con naturalidad el lugar de refinamiento metalúrgico. Aunque "crisol" es posible, "horno" mantiene el paralelismo con el lenguaje de aflicción y resulta más transparente para la lectura pública.'
- source_word: עֹנִי
  english_pob_choice: affliction
  chosen_spanish: de la aflicción
  alternatives_spanish:
  - de la miseria
  - del sufrimiento
  lexicon: HALOT
  rationale: El sustantivo puede abarcar aflicción, miseria o pobreza. Aquí conviene la amplitud de "aflicción", porque el contexto destaca la prueba dolorosa por la que pasa el pueblo.
theological_decisions:
- issue: Valor de בְּחַרְתִּיךָ en el marco de refinamiento
  english_pob_reading: The revised English POB settles on 'I have chosen you,' while preserving the metallurgical context.
  chosen_spanish_reading: te he escogido
  alternative_spanish_readings:
  - te he probado
  - te he elegido
  rationale: La traducción sigue la revisión final del POB inglés y no oculta el eco de elección presente en el verbo. A la vez, el contexto de refinamiento y aflicción queda visible por el resto del verso, evitando resolver en exceso la tensión entre elección y prueba.
  doctrine_reference: 'Translation philosophy: preserve lexical and theological tension rather than flatten it into a single doctrinal line.'
- issue: Sentido de וְלֹא בְכָסֶף
  english_pob_reading: Literally, 'not with/as silver'; likely meaning the refining was not like silver refining.
  chosen_spanish_reading: pero no como la plata
  alternative_spanish_readings:
  - pero no con plata
  - pero no en plata
  rationale: La formulación española mantiene la comparación implícita y evita simplificar el hebreo a una instrumentalidad que la nota inglesa considera incierta. Así se conserva la dificultad del texto fuente.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity where the source is ambiguous.
translation_notes:
  revision_awareness: La auditoría inglesa pasó de 'I have tested you' a 'I have chosen you' para בְּחַרְתִּיךָ. La versión española sigue la lectura revisada y mantiene la imagen metalúrgica mediante 'refinado', 'plata' y 'horno'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto solo cuando el texto lo requiere; aquí no aparece el Tetragrámaton.
  - Se preserva el tono profético con un imperativo breve ('Mira') en lugar de una paráfrasis explicativa.
  - '''Escogido'' mantiene el carácter bíblico sin recurrir a terminología eclesiástica más cargada.'
  - Se evita 'SEÑOR' y se conserva la comparación literal señalada por la nota textual.
  - La puntuación sigue el español moderno y mantiene la cadencia del versículo único.
