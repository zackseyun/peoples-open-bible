    rationale: Preserva la metáfora, pero en español suena menos fluida. Una leve mejora estilística puede mantener «alma» y la idea de origen interior sin perder fidelidad.
  revised_spanish_text: 'Así que, cuando el tirano dejó de instarlos a comer comida que los profanara[a], todos juntos, con una sola voz, como si hablaran desde una misma alma[b], dijeron:'
