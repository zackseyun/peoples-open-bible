translation:
  language: es
  text: 'diciendo[a]: «Muramos todos en nuestra inocencia; el cielo y la tierra dan testimonio contra ustedes acerca de nosotros, que ustedes nos destruyen injustamente[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en nuestra simplicidad» o «en nuestra sinceridad»; el griego puede denotar simplicidad o sencillez de intención, pero aquí probablemente significa inocencia sin culpa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sin juicio» o «sin examen», expresando que los están matando sin la debida averiguación o justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: LSJ
  rationale: El participio introductorio funciona como marco de la cita. «Diciendo» conserva la relación sintáctica con el discurso directo sin añadir una nueva oración principal.
- source_word: Ἀποθάνωμεν
  english_pob_choice: Let us ... die
  chosen_spanish: Muramos
  alternatives_spanish:
  - Que muramos
  - Dejémonos morir
  lexicon: LSJ
  rationale: El aoristo subjuntivo exhortativo en primera persona plural expresa una resolución o arenga. «Muramos» reproduce de forma natural esa fuerza volitiva en español.
- source_word: οἱ πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos nosotros
  - nosotros todos
  lexicon: LSJ
  rationale: La inclusividad enfática se conserva con «todos» dentro de la exhortación, sin sobrecargar la frase.
- source_word: ἐν τῇ ἁπλότητι ἡμῶν
  english_pob_choice: in our innocence
  chosen_spanish: en nuestra inocencia
  alternatives_spanish:
  - en nuestra simplicidad
  - en nuestra sinceridad
  - en nuestra rectitud
  lexicon: LSJ
  rationale: Aunque ἁπλότης puede significar simplicidad o sinceridad, el contexto martirial apunta a blamelessness, no a ingenuidad. «Inocencia» transmite mejor la idea de no culpabilidad que el español puede entender aquí.
- source_word: μαρτυρεῖ ἐφʼ ἡμᾶς
  english_pob_choice: testify against you concerning us
  chosen_spanish: testifican contra ustedes respecto de nosotros
  alternatives_spanish:
  - dan testimonio contra ustedes acerca de nosotros
  - testifican sobre nosotros contra ustedes
  lexicon: LSJ
  rationale: El POB inglés revisado refleja que el testimonio se dirige contra los agresores en relación con las víctimas. En español, «contra ustedes respecto de nosotros» preserva esa relación judicial sin forzar una paráfrasis.
- source_word: ὁ οὐρανὸς καὶ ἡ γῆ
  english_pob_choice: heaven and earth
  chosen_spanish: el cielo y la tierra
  alternatives_spanish:
  - los cielos y la tierra
  - el cielo y la tierra
  lexicon: LSJ
  rationale: La fórmula bíblica se expresa de manera idiomática y reverente con «el cielo y la tierra», estándar y transparente para el español.
- source_word: ἀκρίτως
  english_pob_choice: unjustly
  chosen_spanish: injustamente
  alternatives_spanish:
  - sin juicio
  - sin examen
  - sin debido proceso
  - arbitrariamente
  lexicon: LSJ
  rationale: El adverbio implica ausencia de juicio o examen debido, con carga moral. «Injustamente» comunica la fuerza general, mientras la nota conserva la alternativa más literal.
- source_word: ἀπόλλυτε
  english_pob_choice: are destroying
  chosen_spanish: destruyen
  alternatives_spanish:
  - matan
  - aniquilan
  - hacen perecer
  lexicon: LSJ
  rationale: El verbo griego puede abarcar destruir o matar; el contexto apunta a una muerte violenta. «Destruyen» mantiene el alcance verbal amplio, como en el texto inglés auditado.
theological_decisions:
- issue: Sentido de ἁπλότης en un contexto de martirio
  english_pob_reading: moral innocence/blamelessness
  chosen_spanish_reading: inocencia moral / ausencia de culpa
  alternative_spanish_readings:
  - simplicidad
  - sinceridad
  - rectitud
  rationale: No se trata de una virtud psicológica abstracta, sino de una apelación a que su muerte es injustificada. «Inocencia» expresa de forma clara la inocencia moral que el contexto exige.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de ἀκρίτως
  english_pob_reading: unjustly, with a footnoted procedural nuance
  chosen_spanish_reading: injustamente, con matiz de falta de juicio o examen
  alternative_spanish_readings:
  - sin juicio
  - sin juicio debido
  - sin debido proceso
  - arbitrariamente
  rationale: El texto principal usa una palabra comprensible y fiel al sentido amplio. La nota preserva la tensión entre la injusticia moral y la falta de procedimiento judicial.
  doctrine_reference: Translation philosophy §6; transparency principle on preserving alternatives in footnotes
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó la relación de ἐφʼ ἡμᾶς a una formulación más precisa de testimonio «contra ustedes respecto de nosotros». La redacción española intenta conservar ese valor relacional y judicial sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «Mesías/Cristo» no pertinente aquí, por lo que no se aplica terminología cristológica.
  - Se usó «inocencia» para ἁπλότης siguiendo el criterio del POB de preservar la fuerza moral del martirio.
  - Se evitó «siervo» o «esclavo» porque no hay δοῦλος en el pasaje.
  - Se conservó un tono bíblico formal pero no arcaizante, acorde con el español general de la POB.
