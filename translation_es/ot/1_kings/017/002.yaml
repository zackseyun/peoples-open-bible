translation:
  language: es
  text: 'Y la palabra de Yahvé vino a él[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''YHWH''. Tradicionalmente se vierte ''el SEÑOR'' en traducciones españolas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... llegó
  - Entonces ... vino
  - Y sucedió
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce el avance narrativo. En español, 'Y ... vino' reproduce de manera natural la llegada de la palabra sin caer en un calco como 'y aconteció', y mantiene el valor formular del hebreo.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la voz
  - el dicho
  lexicon: HALOT
  rationale: En la fórmula profética, 'la palabra' conserva tanto el carácter revelatorio como la expresión estable del texto hebreo. 'Mensaje' explicita demasiado y debilita la resonancia bíblica de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre divino en forma española 'Yahvé', conforme al criterio del proyecto de no enmascararlo con un título. 'Jehová' no se adopta por su forma tradicional y menos probable como vocalización histórica.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo indica dirección hacia una persona. En español, 'a él' es la equivalencia más directa y natural en esta fórmula de revelación.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo; 'diciendo' conserva la función formular en español bíblico sin introducir una ruptura sintáctica innecesaria.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto en lugar de sustituirlo por un título. 'Yahvé' es la forma española estándar del transliterado que mejor adapta la decisión del POB inglés al español culto y eclesial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El contexto auditado no requiere cambios textuales respecto del sentido base: la fórmula narrativa y profética se mantiene estable. La única decisión teológica relevante es la representación del nombre divino, trasladada coherentemente al español como ''Yahvé''.'
  spanish_consistency_notes:
  - 'Se mantiene la fórmula profética breve y solemne: ''la palabra de Yahvé vino a él, diciendo''.'
  - Se evita 'el SEÑOR' para no ocultar el nombre divino, en consonancia con el criterio del proyecto.
  - '''Diciendo'' se conserva como introducción formular, no como contenido independiente.'
  - La puntuación con dos puntos refleja la apertura de discurso directo en español bíblico moderno.
