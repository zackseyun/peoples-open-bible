translation:
  language: es
  text: Te adorné con joyas[a], puse brazaletes en tus manos[b] y un collar[c] en tu cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "con ornamentos" o "con galas".
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "en tus manos"; los brazaletes normalmente se usan en las muñecas o en los brazos.'
    reason: lexical_alternative
  - marker: c
    text: O "una cadena" en tu cuello.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעְדֵּךְ / עֶדִי
  english_pob_choice: I adorned you with jewelry
  chosen_spanish: Te adorné con joyas
  alternatives_spanish:
  - Te engalané con adornos
  - Te vestí de ornamentos
  - Te adorné con finura
  lexicon: HALOT
  rationale: עדה expresa adornar o engalanar con adornos. En este contexto, dado que siguen objetos concretos, “joyas” comunica bien el sentido concreto y natural en español sin perder la idea de adorno.
- source_word: צְמִידִים
  english_pob_choice: bracelets
  chosen_spanish: brazaletes
  alternatives_spanish:
  - pulseras
  - armillas
  - brazaletes
  lexicon: HALOT
  rationale: El término designa aros ornamentales para los brazos o las muñecas. “Brazaletes” preserva mejor el valor de adorno de mayor tamaño que “pulseras”, y funciona bien en español bíblico moderno.
- source_word: עַל יָדַיִךְ
  english_pob_choice: on your hands
  chosen_spanish: en tus manos
  alternatives_spanish:
  - en tus muñecas
  - en tus brazos
  - sobre tus manos
  lexicon: HALOT
  rationale: El hebreo dice literalmente “sobre tus manos”. En español, “en tus manos” conserva la forma del original y sigue siendo inteligible; la alternativa idiomática “en tus muñecas” queda indicada como posibilidad de sentido.
- source_word: רָבִיד
  english_pob_choice: a necklace
  chosen_spanish: un collar
  alternatives_spanish:
  - una cadena
  - un collar ornamental
  - un colgante
  lexicon: HALOT
  rationale: רָבִיד es un adorno para el cuello, frecuentemente cadena o collar. “Collar” es el equivalente natural y claro en español; “cadena” queda como alternativa más cercana a la imagen de metal.
- source_word: עַל גְּרוֹנֵךְ
  english_pob_choice: on your neck
  chosen_spanish: en tu cuello
  alternatives_spanish:
  - alrededor de tu cuello
  - sobre tu cuello
  - en tu garganta
  lexicon: HALOT
  rationale: גָּרוֹן significa garganta/cuello. En español, para una joya la expresión normal es “en tu cuello” o “alrededor de tu cuello”; elegí la primera por fluidez y cercanía al hebreo.
theological_decisions:
- issue: Imagen metafórica de Jerusalén adornada por Yahvé
  english_pob_reading: Retain the literal imagery of adornment without allegorical expansion in the translation.
  chosen_spanish_reading: Conservar la imagen concreta del adorno sin convertirla en explicación interpretativa dentro del versículo.
  alternative_spanish_readings:
  - Explicar en el texto que se trata de preparación nupcial o bendición de pacto
  - Añadir una glosa interpretativa sobre el sentido espiritual del adorno
  rationale: El contexto es alegórico, pero la traducción debe preservar la imaginería concreta del texto hebreo y no ampliar el significado más allá de lo que el versículo dice.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; se mantiene la solución previa con equivalente óptimo y las tres notas léxicas menores conservadas para reflejar la tensión entre literalidad y naturalidad.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma preferida del proyecto cuando el nombre divino está explícito; en este versículo no aparece directamente.
  - ‘Joyas’ y ‘brazaletes’ respetan el campo de ornamento concreto que exige la secuencia del verso.
  - La preposición ‘en’ permite una lectura natural en español sin borrar que el hebreo dice literalmente ‘sobre’.
