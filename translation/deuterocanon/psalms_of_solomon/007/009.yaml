id: PSS.7.9
reference: Psalms of Solomon 7:9
source:
  edition: lxx-swete-1909
  text: κατευθυνεῖς ἡμᾶς ἐν καιρῷ ἀντιλήψεως σου, τοῦ ἐλεῆσαι τὸν οἶκον Ἰακὼβ εἰς ἡμέραν ἐν ᾗ ἐπηγγείλω αὐτοῖς.
  language: Greek
  pages:
  - 797
  validation: swete_direct
translation:
  text: You will guide us at the time of your help[b][a], to show mercy to the house of Jacob for the day that you promised them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You will direct us.' The Greek verb can carry the sense of making one's path straight or directing one's course.
    reason: lexical_alternative
  - marker: b
    text: The final verb form is textually difficult; it is understood here in context as 'you promised them.' A more literal but less fitting possibility would be 'I promised them.'
    reason: textual_variant
lexical_decisions:
- source_word: κατευθυνεῖς
  chosen: you will guide
  alternatives:
  - you will direct
  - you will make straight
  lexicon: BDAG
  rationale: In this prayer context, the verb is best rendered as future and with a relational sense of divine leading. 'Guide' is clearer in modern English than 'direct' while still preserving the idea of setting one's way straight.
- source_word: ἐν καιρῷ
  chosen: at the time of
  alternatives:
  - in the time of
  - in a time of
  lexicon: BDAG
  rationale: The phrase marks a specific season or occasion rather than abstract duration. 'At the time of' gives natural English while preserving the temporal force.
- source_word: ἀντιλήψεως
  chosen: help
  alternatives:
  - aid
  - support
  - deliverance
  lexicon: BDAG
  rationale: The noun denotes help or assistance. 'Help' is the most transparent and least interpretively loaded option here; 'deliverance' would narrow the sense beyond what the Greek itself requires.
- source_word: τοῦ ἐλεῆσαι
  chosen: to show mercy
  alternatives:
  - to have mercy
  - so as to pity
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'To show mercy' is idiomatic English and preserves the compassionate action of the Greek without softening it.
- source_word: τὸν οἶκον Ἰακώβ
  chosen: the house of Jacob
  alternatives:
  - the household of Jacob
  - Jacob's house
  lexicon: BDAG
  rationale: This covenantal collective expression should be preserved rather than expanded to 'Israel.' 'House of Jacob' keeps the biblical resonance and communal scope.
- source_word: εἰς ἡμέραν
  chosen: for the day
  alternatives:
  - unto the day
  - toward the day
  - on the day
  lexicon: BDAG
  rationale: The preposition likely points forward to an appointed day in view. 'For the day' preserves that forward-looking sense better than the more specific 'on the day,' which could overdefine the construction.
- source_word: ἐπηγγείλω αὐτοῖς
  chosen: you promised them
  alternatives:
  - you made a promise to them
  - I promised them
  lexicon: BDAG
  rationale: The transmitted form is unusual, but in context the line is a direct address to God, so the sense is best taken as referring to what God promised them. This yields coherent English while honestly recognizing the form's difficulty.
