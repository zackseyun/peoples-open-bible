  text: θέλω δὲ ὑμᾶς εἰδέναι ὅτι παντὸς ἀνδρὸς ἡ κεφαλὴ ὁ Χριστός ἐστιν, κεφαλὴ δὲ γυναικὸς ὁ ἀνήρ, κεφαλὴ δὲ ⸀τοῦ Χριστοῦ ὁ θεός.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/011/003.yaml
  text: But I want you to know that the head of every man is Messiah[a], and the head of a woman is the man[b], and the head of Messiah is God.
  footnotes:
  - marker: a
    text: Or, 'head' may be understood as 'source' or 'authority over'; the Greek metaphor itself is retained in the main text.
    reason: lexical_alternative
  - marker: b
    text: '''Woman'' and ''man'' here can also be read as ''wife'' and ''husband.'''
    reason: alternative_reading
translation:
  language: ko
  text: 나는 여러분이 알기를 원합니다. 모든 남자의 머리는 메시아이시고, 여자의 머리는 남자이며, 메시아의 머리는 하나님이십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「머리」(κεφαλή)는 권위로도 근원으로도 읽혀 온 다층적 비유다. 본문은 그 비유를 그대로 보존하고 해석을 단정하지 않는다.
    reason: lexical_alternative
  - marker: b
    text: 「여자」와 「남자」(γυνή / ἀνήρ)는 문맥에 따라 「아내」와 「남편」으로도 읽힐 수 있다.
    reason: alternative_reading
