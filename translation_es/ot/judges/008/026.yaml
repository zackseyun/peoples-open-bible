translation:
  language: es
  text: Y el peso de los anillos de oro que él pidió fue de 1.700 siclos de oro[a], aparte de los adornos de media luna, de los colgantes y de las vestiduras púrpuras que llevaban los reyes de Madián, y aparte de los collares que estaban en los cuellos de sus camellos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: "1.700 de oro"; "siclos" es la unidad de peso sobreentendida por el contexto.'
    reason: lexical_alternative
  - marker: b
    text: O "pendientes" para "anillos"; el término hebreo puede referirse a una pieza ornamental llevada en la oreja o en la nariz.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁקַ֞ל
  english_pob_choice: weight
  chosen_spanish: peso
  alternatives_spanish:
  - peso medido
  - cantidad por peso
  lexicon: HALOT
  rationale: El hebreo se refiere a una medida de peso, no solo a una cantidad. En español, 'peso' comunica de forma natural la idea de una evaluación ponderal en una lista de botín.
- source_word: נִזְמֵי הַזָּהָב
  english_pob_choice: the gold rings
  chosen_spanish: los anillos de oro
  alternatives_spanish:
  - los aros de oro
  - los pendientes de oro
  lexicon: HALOT
  rationale: נזם puede designar un aro o anillo ornamental, a veces para oreja o nariz. 'Anillos' mantiene la amplitud semántica sin especificar una parte del cuerpo que el hebreo no menciona aquí.
- source_word: אֲשֶׁר שָׁאָל
  english_pob_choice: that he requested
  chosen_spanish: que él pidió
  alternatives_spanish:
  - que él solicitó
  - que él pidió en préstamo
  lexicon: HALOT
  rationale: El verbo expresa la acción de pedir el botín. 'Pidió' es natural en español y conserva el tono narrativo sin añadir matices que el contexto no exige.
- source_word: אֶלֶף וּשְׁבַע מֵאוֹת זָהָב
  english_pob_choice: 1,700 shekels of gold
  chosen_spanish: 1.700 siclos de oro
  alternatives_spanish:
  - 1.700 de oro
  - 1.700 piezas de oro
  lexicon: HALOT
  rationale: Como en la nota inglesa, el hebreo literalmente dice '1.700 de oro', pero el contexto de peso exige suplir la unidad entendida. 'Siclos' es la unidad de peso implícita y la forma más clara en español.
- source_word: לְבַד מִן
  english_pob_choice: besides
  chosen_spanish: aparte de
  alternatives_spanish:
  - además de
  - fuera de
  lexicon: HALOT
  rationale: La expresión marca exclusión respecto de la suma principal. 'Aparte de' es idiomático en español y conserva esa separación.
- source_word: הַשַּׂהֲרֹנִים
  english_pob_choice: the crescent ornaments
  chosen_spanish: los adornos de media luna
  alternatives_spanish:
  - los adornos crescentes
  - las medias lunas
  lexicon: HALOT
  rationale: El término alude a ornamentos en forma de creciente. 'Adornos de media luna' comunica la forma de manera clara y comprensible en español.
- source_word: הַנְּטִפוֹת
  english_pob_choice: the pendants
  chosen_spanish: los colgantes
  alternatives_spanish:
  - los pendientes
  - las gotas
  lexicon: HALOT
  rationale: El sustantivo probablemente designa adornos colgantes. 'Colgantes' es suficientemente general y evita precisar una pieza concreta que el término hebreo no fija con total seguridad.
- source_word: בִגְדֵי הָאַרְגָּמָן
  english_pob_choice: the purple garments
  chosen_spanish: las vestiduras púrpuras
  alternatives_spanish:
  - las ropas púrpuras
  - las prendas de púrpura
  lexicon: HALOT
  rationale: El hebreo indica vestiduras caracterizadas por la púrpura, signo de dignidad real. 'Vestiduras púrpuras' suena más solemne que 'ropa' y sigue siendo fiel al sentido.
- source_word: שֶׁעַל מַלְכֵי מִדְיָן
  english_pob_choice: that were on the kings of Midian
  chosen_spanish: que llevaban los reyes de Madián
  alternatives_spanish:
  - que estaban sobre los reyes de Madián
  - que pertenecían a los reyes de Madián
  lexicon: HALOT
  rationale: La preposición sobre/על en este contexto indica lo que vestían. 'Llevaban' refleja bien la imagen concreta de prendas puestas sobre ellos.
- source_word: הָעֲנָקוֹת
  english_pob_choice: the necklaces
  chosen_spanish: los collares
  alternatives_spanish:
  - los collares de cuello
  - las gargantillas
  lexicon: HALOT
  rationale: El término designa ornamentos del cuello. 'Collares' es la opción española más clara y natural, sin perder la referencia a adorno cervical.
- source_word: בְּצַוְּארֵי גְמַלֵּיהֶם
  english_pob_choice: that were on the necks of their camels
  chosen_spanish: que estaban en los cuellos de sus camellos
  alternatives_spanish:
  - que colgaban del cuello de sus camellos
  - que estaban alrededor del cuello de sus camellos
  lexicon: HALOT
  rationale: La frase especifica la localización de los adornos. 'En los cuellos' sigue de cerca el hebreo y conserva la imagen corporal/collar sin introducir interpretación adicional.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y refleja el mismo ajuste de la edición inglesa: suplir la unidad de peso implícita (''siclos'') y conservar la ambigüedad de נזם mediante una nota alternativa. No hay revisiones textuales indicadas en el paquete.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando corresponde; este versículo no contiene el nombre divino.
  - '''Madián'' sigue la forma bíblica española habitual para Midian.'
  - Se mantiene la enumeración coordinada de objetos con una cadencia sobria y publicable.
  - Las notas preservan la tensión lexical de נזם sin sobreespecificar oreja o nariz en el texto principal.
