  text: ἀλλ’ ἵνα πληρωθῇ ὁ λόγος ὁ ⸂ἐν τῷ νόμῳ αὐτῶν γεγραμμένος⸃ ὅτι Ἐμίσησάν με δωρεάν.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/025.yaml
  text: 'But this happened so that the word written in their Law might be fulfilled: ‘They hated me without cause.’[a][b][c]'
  footnotes:
  - marker: a
    text: Or, more formally, 'But so that the word written in their Law might be fulfilled.' The Greek leaves the main clause elliptical, and English often supplies 'this happened' from the context.
    reason: lexical_alternative
  - marker: b
    text: '''Their Law'' uses ''Law'' in the broader Jewish sense of the Scriptures; the quotation is from the Psalms (cf. Ps 35:19; 69:4).'
    reason: cross_reference
  - marker: c
    text: Or 'for no reason.'
    reason: lexical_alternative
