  revision_rationale: Se ajustó 'tormentos' a 'torturas' para reflejar mejor βάσανοι en un contexto de martirio y alinearse con la decisión léxica del POB inglés. Se cambió 'para la ley' por 'por la ley' para representar con fidelidad διὰ τὸν νόμον como motivo o causa. Se refinó 'por la razón' a 'por medio de la razón' para expresar más naturalmente en español el valor de τῷ λογισμῷ como principio o facultad instrumental. Se mantuvo la nota léxica sobre el verbo raro ἐναντεθάνει.
