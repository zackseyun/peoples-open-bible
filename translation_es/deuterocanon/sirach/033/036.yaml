    rationale: Aunque formalmente posible, el español natural pide normalmente «consultar con». La construcción actual suena forzada y reduce la legibilidad.
  - severity: medium
    issue: «entre mil» no refleja con suficiente precisión «ἕνα ἐκ χιλίων»
    rationale: El griego enfatiza «uno de entre mil». Añadir «un solo» o «uno» ayuda a preservar la selectividad extrema del original.
