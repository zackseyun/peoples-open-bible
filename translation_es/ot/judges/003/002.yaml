translation:
  language: es
  text: solo para que las generaciones de los hijos de Israel[a] conozcan, para enseñarles la guerra, solo a los que antes no la habían conocido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'. Literalmente, 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: O 'no la habían experimentado antes'.
