    issue: La nota c usa mayúscula griega inicial «Οἰκέτῃ» en lugar de minúscula.
    rationale: Es un detalle tipográfico menor y no afecta fidelidad ni legibilidad.
  - severity: low
    issue: «Un palo» tiene un registro algo más llano que «vara».
    rationale: Aun así, coincide con la decisión inglesa «a stick» y evita sobreinterpretar ῥάβδος; no requiere corrección obligatoria.
