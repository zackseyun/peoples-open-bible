base_translation:
  language: en
  yaml_path: translation/ot/genesis/038/009.yaml
  text: But Onan knew that the offspring would not be his[a]; so whenever he went in to his brother’s wife, he spilled it on the ground[b], so as not to give offspring to his brother.
  footnotes:
  - marker: a
    text: Hebrew 'seed' in both clauses; here it refers to offspring or an heir in the levirate-marriage context.
    reason: lexical_alternative
  - marker: b
    text: Or 'he spilled it on the ground.' The Hebrew says literally 'he ruined/destroyed [it] to the ground,' describing Onan's act of preventing conception.
    reason: lexical_alternative
