id: NUM.5.27
reference: Numbers 5:27
source:
  edition: WLC
  text: וְ/הִשְׁקָ֣/הּ אֶת הַ/מַּ֗יִם וְ/הָיְתָ֣ה אִֽם נִטְמְאָה֮ וַ/תִּמְעֹ֣ל מַ֣עַל בְּ/אִישָׁ/הּ֒ וּ/בָ֨אוּ בָ֜/הּ הַ/מַּ֤יִם הַ/מְאָֽרֲרִים֙ לְ/מָרִ֔ים וְ/צָבְתָ֣ה בִטְנָ֔/הּ וְ/נָפְלָ֖ה יְרֵכָ֑/הּ וְ/הָיְתָ֧ה הָ/אִשָּׁ֛ה לְ/אָלָ֖ה בְּ/קֶ֥רֶב עַמָּֽ/הּ־־׃
translation:
  text: When he makes her drink the water[a], then if she has defiled herself and has acted unfaithfully against her husband, the water that brings the curse will enter her for bitterness, and her belly will swell and her thigh will waste away[b], and the woman will become a curse among her people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the curse-bringing water will enter her as bitter water.' The Hebrew phrase 'for bitterness' is difficult and may describe the water's effect or quality.
    reason: lexical_alternative
  - marker: b
    text: Literally 'her thigh will fall.' The expression is likely a euphemism for a severe bodily affliction affecting her reproductive organs, but the exact sense is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁקָהּ אֶת־הַמַּיִם
  chosen: When he makes her drink the water
  alternatives:
  - And he shall make her drink the water
  - After he has made her drink the water
  lexicon: HALOT
  rationale: The Hifil of שׁקה means 'cause to drink, give to drink.' The prefixed conjunction here is best carried forward into English as a temporal clause introducing the result sequence. 'Makes her drink' preserves the causative force more clearly than simply 'gives her the water.'
- source_word: וְהָיְתָה אִם
  chosen: then if
  alternatives:
  - and if it shall be
  - and it will be, if
  lexicon: HALOT
  rationale: This construction introduces the conditional outcome of the ordeal. Smooth English requires recasting the Hebrew sequence into 'then if' rather than a wooden 'and it shall be if.'
- source_word: נִטְמְאָה
  chosen: she has defiled herself
  alternatives:
  - she has become unclean
  - she is defiled
  lexicon: HALOT
  rationale: The Niphal of טמא can denote becoming unclean/defiled. In this adultery-ordeal context, 'defiled herself' communicates moral and ritual contamination together and matches the reflexive sense implied by context.
- source_word: וַתִּמְעֹל מַעַל
  chosen: has acted unfaithfully
  alternatives:
  - has committed a trespass
  - has broken faith
  - has been unfaithful
  lexicon: HALOT
  rationale: The cognate construction with מעל intensifies the idea of breach of faith or treachery. 'Acted unfaithfully' is idiomatic modern English and preserves the covenantal/relational betrayal sense.
- source_word: בְּאִישָׁהּ
  chosen: against her husband
  alternatives:
  - against her man
  - toward her husband
  lexicon: HALOT
  rationale: אִישׁ with 3fs suffix in this context clearly refers to her husband. 'Against' fits the hostile/breaching sense of מעל with בְּ.
- source_word: וּבָאוּ בָהּ
  chosen: will enter her
  alternatives:
  - will come into her
  - shall go into her
  lexicon: HALOT
  rationale: בוא with ב marks entry into her body. 'Will enter her' is natural English and preserves the physical effect described by the ordeal.
- source_word: הַמַּיִם הַמְאָרֲרִים
  chosen: the water that brings the curse
  alternatives:
  - the curse-bringing water
  - the accursing water
  - the water of cursing
  lexicon: HALOT
  rationale: The participle from ארר describes the water as effecting or carrying a curse. 'That brings the curse' is readable modern English while retaining the causal force.
- source_word: לְמָרִים
  chosen: for bitterness
  alternatives:
  - to become bitter
  - as bitter water
  - for bitter suffering
  lexicon: HALOT
  rationale: 'The phrase is difficult, but the preposition plus plural adjective/noun is commonly understood adverbially/resultatively: the water enters ''for bitterness,'' i.e., with bitter effect. This preserves the Hebrew image without overinterpreting it.'
- source_word: וְצָבְתָה בִטְנָהּ
  chosen: her belly will swell
  alternatives:
  - her abdomen will swell
  - her womb will swell
  lexicon: HALOT
  rationale: בטן is literally 'belly/abdomen.' 'Belly' is the most direct and natural rendering. 'Womb' would over-specify the anatomy beyond the Hebrew term.
- source_word: וְנָפְלָה יְרֵכָהּ
  chosen: her thigh will waste away
  alternatives:
  - her thigh will fall
  - her loins will collapse
  - her genitals will shrivel
  lexicon: HALOT
  rationale: The idiom is notoriously difficult. יָרֵךְ literally means 'thigh,' but in reproductive contexts may function euphemistically. 'Will waste away' captures the likely bodily affliction better than a literal but opaque 'fall,' while retaining 'thigh' in the main text to avoid overinterpretation.
- source_word: וְהָיְתָה הָאִשָּׁה לְאָלָה
  chosen: the woman will become a curse
  alternatives:
  - the woman will become an oath-curse
  - the woman will be for a curse
  lexicon: HALOT
  rationale: אָלָה denotes a curse, often in oath context. 'Become a curse' is idiomatic and reflects that she becomes an object lesson or formula of cursing.
- source_word: בְּקֶרֶב עַמָּהּ
  chosen: among her people
  alternatives:
  - in the midst of her people
  - within her people
  lexicon: HALOT
  rationale: This phrase denotes location within the community. 'Among her people' is natural English and preserves the communal/public dimension of the judgment.
