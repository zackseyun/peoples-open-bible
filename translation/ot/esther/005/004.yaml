id: EST.5.4
reference: Esther 5:4
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֶסְתֵּ֔ר אִם עַל הַ/מֶּ֖לֶךְ ט֑וֹב יָב֨וֹא הַ/מֶּ֤לֶךְ וְ/הָמָן֙ הַ/יּ֔וֹם אֶל הַ/מִּשְׁתֶּ֖ה אֲשֶׁר עָשִׂ֥יתִי לֽ/וֹ־־־־׃
translation:
  text: Esther said[a], “If it pleases the king[b], let the king and Haman come today to the banquet that I have prepared for him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If it pleases the king.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “for him,” apparently referring specifically to the king, though Haman is also invited.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם עַל הַמֶּלֶךְ טוֹב
  chosen: If it seems good to the king
  alternatives:
  - If it pleases the king
  - If it is good to the king
  lexicon: HALOT
  rationale: This idiom introduces a deferential request. 'If it seems good to the king' preserves the courtly tone and the sense of favorable royal approval without sounding overly archaic. 'If it pleases the king' is also possible, but 'seems good' stays closer to the Hebrew adjective טוֹב ('good').
- source_word: יָבֹוא
  chosen: let ... come
  alternatives:
  - may ... come
  - should ... come
  lexicon: HALOT
  rationale: 'Although morphologically an imperfect 3ms (''he will/shall come''), in this request context it functions jussively: Esther is inviting/requesting the king''s attendance. English ''let ... come'' best captures the polite volitional force.'
- source_word: הַמֶּלֶךְ וְהָמָן
  chosen: the king and Haman
  alternatives:
  - King Ahasuerus and Haman
  lexicon: HALOT
  rationale: The Hebrew repeats 'the king' rather than using a pronoun or personal name, fitting court style. The translation preserves the title as in the source rather than supplying the king's personal name, which is not present in this verse.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent and preserves the temporal immediacy of the invitation.'
- source_word: הַמִּשְׁתֶּה
  chosen: the banquet
  alternatives:
  - the feast
  - the drinking feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה often denotes a banquet/feast, frequently with drinking implied. 'Banquet' fits the royal setting and is idiomatic English. 'Drinking feast' is more wooden and unnecessarily foregrounds an element not explicit in English context.
- source_word: אֲשֶׁר עָשִׂיתִי לוֹ
  chosen: that I have prepared for him
  alternatives:
  - that I have made for him
  - that I prepared for him
  lexicon: HALOT
  rationale: עָשָׂה literally means 'make/do,' but with a banquet object English idiom prefers 'prepare.' The pronoun לוֹ is singular ('for him'), most naturally referring to the king, even though Haman is also invited. This singular should be preserved rather than smoothed to 'for them'.
