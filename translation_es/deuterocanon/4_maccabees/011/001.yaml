translation:
  language: es
  text: 'Y cuando este también había muerto bajo tortura[a], el quinto se adelantó, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el quinto hizo una señal», con el objeto del gesto implícito en el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Entonces cuando
  lexicon: LSJ
  rationale: La construcción introduce una nueva acción dentro de la secuencia narrativa. «Y cuando» conserva el valor temporal de ὡς y el matiz continuativo de δέ sin forzar un giro más pesado.
- source_word: καὶ οὗτος
  english_pob_choice: this one also
  chosen_spanish: éste también
  alternatives_spanish:
  - este hombre también
  - él también
  lexicon: LSJ
  rationale: El demostrativo señala al hermano ya mencionado; «éste también» mantiene la referencia enfática y la progresión de la narración martirial.
- source_word: ταῖς βασάνοις
  english_pob_choice: under torture
  chosen_spanish: bajo tortura
  alternatives_spanish:
  - bajo tormento
  - por las torturas
  lexicon: LSJ
  rationale: El dativo expresa la circunstancia de sufrir tortura. «Bajo tortura» es idiomático en español y conserva la fuerza judicial y física del término sin suavizarlo.
- source_word: καταικισθεὶς
  english_pob_choice: had died
  chosen_spanish: hubo muerto
  alternatives_spanish:
  - habiendo sido maltratado
  - después de haber sido abatido
  lexicon: LSJ
  rationale: El participio comunica que fue severamente maltratado antes de morir. En español, el matiz de abuso queda ya captado por «bajo tortura», mientras que «hubo muerto» refleja con precisión la secuencia previa a la acción del quinto.
- source_word: ἐναπέθανεν
  english_pob_choice: had died
  chosen_spanish: hubo muerto
  alternatives_spanish:
  - murió
  - había muerto
  lexicon: LSJ
  rationale: El aoristo narrativo marca el cierre de la muerte antes del siguiente acto. El pretérito anterior («hubo muerto») reproduce bien esa anterioridad narrativa en español formal.
- source_word: ὁ πέμπτος
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - el quinto hermano
  lexicon: LSJ
  rationale: El ordinal funciona sustantivamente y se refiere al quinto hermano. «El quinto» sigue de cerca el griego y resulta claro en el contexto.
- source_word: παρεσήμαινεν
  english_pob_choice: came forward
  chosen_spanish: se adelantó
  alternatives_spanish:
  - hizo una señal
  - dio la señal
  lexicon: LSJ
  rationale: El verbo puede significar dar una señal o indicar. En este contexto, la revisión inglesa optó por «came forward»; en español, «se adelantó» comunica naturalmente el gesto de ponerse al frente sin añadir una interpretación no explicitada en el griego.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: LSJ
  rationale: Participio introductorio estándar de discurso directo; «diciendo» mantiene la estructura griega y enlaza con la cita siguiente.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «signaled that he was ready» por «came forward» para evitar una expansión interpretativa de παρεσήμαινεν. La redacción española sigue esa revisión y opta por «se adelantó», que conserva la idea de presentarse o ponerse al frente sin introducir un contenido ajeno al texto.
  spanish_consistency_notes:
  - Se mantuvo «tortura» para βασάνοις, conforme al uso terminológico proyectado por POB.
  - «El quinto» conserva el ordinal sustantivado, evitando agregar «hermano» donde el griego no lo expresa explícitamente.
  - Se prefirió un pretérito anterior («hubo muerto») para reflejar la anterioridad narrativa del aoristo antes de la acción del quinto.
