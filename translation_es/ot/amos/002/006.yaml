translation:
  language: es
  text: 'Así dice Yahvé: «Por tres transgresiones de Israel[a], y por cuatro, no revocaré el castigo, porque venden al justo por plata, y al necesitado por un par de sandalias».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo revocaré», es decir, no invertiré el juicio anunciado.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética estándar en español se expresa de modo natural con «Así dice». Se conserva «Yahvé» según el criterio del proyecto para el nombre divino, sin sustituirlo por una máscara litúrgica.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי ... וְעַל אַרְבָּעָה
  english_pob_choice: For three transgressions ... and for four
  chosen_spanish: Por tres transgresiones ... y por cuatro
  alternatives_spanish:
  - A causa de tres transgresiones ... y por cuatro
  - Por tres pecados ... y por cuatro
  lexicon: HALOT
  rationale: Se conserva la escalada numérica idiomática de Amós. «Transgresiones» mantiene la fuerza moral y de ruptura de pacto de פִּשְׁעֵי mejor que un término más genérico.
- source_word: לֹא אֲשִׁיבֶנּוּ
  english_pob_choice: I will not revoke the punishment
  chosen_spanish: no revocaré el castigo
  alternatives_spanish:
  - no lo revocaré
  - no me retractaré de ello
  - no lo revertiré
  lexicon: HALOT
  rationale: El hebreo es elíptico y el contexto exige el sentido de la sentencia anunciada. «Revocaré el castigo» preserva la idea de una acción judicial ya decretada, como en la revisión inglesa, sin perder la tensión del original.
- source_word: מִכְרָם
  english_pob_choice: because they sell
  chosen_spanish: porque venden
  alternatives_spanish:
  - porque han vendido
  - por vender
  lexicon: HALOT
  rationale: El constructo con sufijo expresa la base causal del juicio. En español, el presente plural fluye de forma natural y conserva la acusación directa.
- source_word: בַּכֶּסֶף
  english_pob_choice: for silver
  chosen_spanish: por plata
  alternatives_spanish:
  - por dinero
  - a cambio de plata
  lexicon: HALOT
  rationale: «Plata» conserva el valor literal del hebreo y evita abstraerlo a «dinero», manteniendo el matiz de pago material.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al inocente
  lexicon: HALOT
  rationale: En este contexto social y judicial, «justo» transmite tanto rectitud como condición de quien está en lo correcto. «Al» adapta el objeto directo en español.
- source_word: וְאֶבְיֹון
  english_pob_choice: the needy
  chosen_spanish: al necesitado
  alternatives_spanish:
  - al pobre
  - al indigente
  lexicon: HALOT
  rationale: «Necesitado» recoge el matiz de desamparo y pobreza extrema de אֶבְיוֹן con un término natural y comprensible en español.
- source_word: בַּעֲבוּר נַעֲלָיִם
  english_pob_choice: for a pair of sandals
  chosen_spanish: por un par de sandalias
  alternatives_spanish:
  - a cambio de sandalias
  - por sandalias
  lexicon: HALOT
  rationale: La imagen de trueque por un objeto trivial se conserva con «un par de sandalias», que refleja la dualidad hebrea y el desprecio implícito.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el estándar del proyecto para el nombre divino. No se usa «SEÑOR» porque aquí la política española pide transparencia del nombre propio y el texto profético original lo presenta explícitamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לֹא אֲשִׁיבֶנּוּ
  english_pob_reading: I will not revoke the punishment
  chosen_spanish_reading: no revocaré el castigo
  alternative_spanish_readings:
  - no lo revocaré
  - no retiraré la sentencia
  - no me retractaré
  rationale: La frase hebrea es elíptica; la versión española sigue la interpretación contextual más natural, como lo hace la revisión inglesa, sin convertirla en una paráfrasis excesiva. Se mantiene la idea de juicio irrevocable.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que prefería «revoke the punishment» frente a una versión más literal e idiomáticamente opaca. En español se adopta esa clarificación contextual, pero se conserva la posibilidad de una lectura más literal en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente con el estándar del proyecto.
  - «Transgresiones» reproduce el valor covenantal de פִּשְׁעֵי sin caer en un moralismo genérico.
  - «Justo» y «necesitado» siguen el registro social/judicial del versículo.
  - La nota a preserva la tensión entre traducción literal e interpretación contextual del verbo elíptico.
