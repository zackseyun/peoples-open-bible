id: PHP.4.3
reference: Philippians 4:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ναὶ ἐρωτῶ καὶ σέ, ⸂γνήσιε σύζυγε⸃, συλλαμβάνου αὐταῖς, αἵτινες ἐν τῷ εὐαγγελίῳ συνήθλησάν μοι μετὰ καὶ Κλήμεντος καὶ τῶν λοιπῶν συνεργῶν μου, ὧν τὰ ὀνόματα ἐν βίβλῳ ζωῆς.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/003.yaml
  text: Yes, I ask you also, true companion, help these women, who contended alongside me in the gospel, together with Clement and the rest of my fellow workers, whose names are in the book of life.
translation:
  language: ko
  text: 그렇습니다. 진실한 동역자[a]여, 그대에게도 부탁합니다. 이 여인들을 도와주십시오. 그들은 글레멘스와 그 밖의 나의 동역자들과 더불어 복음 안에서 나와 함께 싸운[b] 자들이며, 그들의 이름은 생명책에 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「진실한 멍에의 동무」(직역). 헬라어 σύζυγος는 「같은 멍에를 지고 함께 일하는 자」를 뜻하며, 일부는 이를 고유명사 「수쥐고스」로 보기도 한다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 συναθλέω는 운동 경기에서 「함께 겨루다」를 뜻하므로 「함께 분투했다」 「힘써 같이 일했다」로도 옮길 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_korean: 그렇습니다
  alternatives_korean:
  - 참으로
  - 진실로
  lexicon: BDAG
  rationale: 합쇼체 격식에서 강한 긍정·확언의 어감을 「그렇습니다」가 가장 자연스럽게 담는다.
- source_word: ἐρωτῶ
  english_pob_choice: I ask
  chosen_korean: 부탁합니다
  alternatives_korean:
  - 청합니다
  - 요청합니다
  lexicon: BDAG
  rationale: ἐρωτάω는 인격적 청을 가리키며, 합쇼체에서 「부탁합니다」가 호소의 친밀함과 격식을 함께 살린다. 2절의 「권면합니다」(παρακαλῶ)와 어조를 구분한다.
- source_word: γνήσιε σύζυγε
  english_pob_choice: true companion
  chosen_korean: 진실한 동역자
  alternatives_korean:
  - 진실한 멍에의 동무
  - 신실한 동료
  - 수쥐고스
  lexicon: BDAG
  rationale: σύζυγος를 고유명사로 보지 않고 묘사적 호격으로 해석하는 영어 POB와 동일한 결정을 따른다. 「동역자」는 한국 교회에서 동등한 사역적 동반자의 의미로 굳어진 어휘로, 현대 합쇼체에서 자연스럽게 들린다. 직역 「멍에의 동무」는 각주에 보존한다.
- source_word: συλλαμβάνου
  english_pob_choice: help
  chosen_korean: 도와주십시오
  alternatives_korean:
  - 함께 붙들어 주십시오
  - 거들어 주십시오
  lexicon: BDAG
  rationale: 현재 중간태 명령형. 「도와주다」는 능동적·실제적 지원을 자연스럽게 표현하며, 합쇼체 「-십시오」로 권면의 무게를 살린다.
- source_word: αὐταῖς
  english_pob_choice: these women
  chosen_korean: 이 여인들
  alternatives_korean:
  - 그들
  - 이 자매들
  lexicon: BDAG
  rationale: 헬라어 여성 복수 대명사. 2절의 유오디아와 순두게를 지시하므로 「이 여인들」로 명시한다.
- source_word: συνήθλησάν μοι
  english_pob_choice: contended alongside me
  chosen_korean: 나와 함께 싸운
  alternatives_korean:
  - 나와 함께 분투한
  - 나와 함께 힘쓴
  lexicon: BDAG
  rationale: συναθλέω의 경기·전투 이미지를 「싸우다」로 살려 복음 사역의 치열함을 보존한다. 평이한 「일했다」는 운동·전투 함의가 사라진다.
- source_word: ἐν τῷ εὐαγγελίῳ
  english_pob_choice: in the gospel
  chosen_korean: 복음 안에서
  alternatives_korean:
  - 복음을 위하여
  - 복음의 일에서
  lexicon: BDAG
  rationale: 헬라어의 압축된 처소·도구적 어법을 그대로 「복음 안에서」로 유지하며, 정확한 뉘앙스 결정은 독자에게 맡긴다.
- source_word: Κλήμεντος
  english_pob_choice: Clement
  chosen_korean: 글레멘스
  alternatives_korean:
  - 클레멘스
  - 글레멘트
  lexicon: BDAG
  rationale: 개역개정 등 한국 교회 전통은 「글레멘드/글레멘스」를 채택해 왔다. 외래어 표기법상 「클레멘스」도 가능하나 회중 가독성을 위해 정착된 형태를 따른다.
- source_word: συνεργῶν
  english_pob_choice: fellow workers
  chosen_korean: 동역자들
  alternatives_korean:
  - 함께 일하는 자들
  - 동료들
  lexicon: BDAG
  rationale: 바울 서신의 정형어. 한국 교회에서 「동역자」로 굳어져 있으며 사역적 동반의 의미를 분명히 전한다.
- source_word: βίβλῳ ζωῆς
  english_pob_choice: book of life
  chosen_korean: 생명책
  alternatives_korean:
  - 생명의 책
  - 생명의 두루마리
  lexicon: BDAG
  rationale: 신구약을 관통하는 표준 어구이며 한국 교회에서 「생명책」으로 정착되어 있다.
theological_decisions:
- issue: γνήσιε σύζυγε를 묘사적 호격(고유명사 아님)으로 해석
  chosen_reading: '익명의 남성 동역자에 대한 묘사적 호격: 「진실한 동역자」'
  alternative_readings:
  - 고유명사 「수쥐고스」
  - 더 직역적 비유 「진실한 멍에의 동무」
  rationale: γνήσιε라는 형용사가 묘사적 호격에 자연스럽게 어울리고, σύζυγος를 보통명사로 보는 해석이 문맥상 가장 무리가 없다. 비유적·논쟁적이므로 대안은 각주로 보존한다.
