translation:
  language: es
  text: 'Pero un hombre tensó su arco y disparó al azar[a], e hirió al rey de Israel entre las articulaciones de la armadura[b] y la coraza. Entonces dijo a su auriga: «Vuelve tu mano[c] y sácame del campamento, porque estoy herido[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin apuntar», «con inocencia» o «al azar» para el hebreo לְתֻמּוֹ; aquí probablemente significa que el arquero disparó sin un blanco específico en mente.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entre los debaqim y el shiryan», probablemente una referencia a una abertura entre piezas de armadura; los términos técnicos exactos son inciertos.'
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «Vuelve tu mano», un modismo para maniobrar el carro.'
    reason: lexical_alternative
  - marker: d
    text: El verbo hebreo puede significar «enfermar» o «ser herido»; aquí se refiere a estar herido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: But a man
  chosen_spanish: Pero un hombre
  alternatives_spanish:
  - Y un hombre
  - Ahora bien, un hombre
  lexicon: HALOT
  rationale: Se conserva la introducción de un individuo no identificado y el giro narrativo marcado por la conjunción; 'Pero' refleja mejor el contraste contextual del relato que un simple 'y'.
- source_word: מָשַׁךְ בַּקֶּשֶׁת
  english_pob_choice: drew his bow
  chosen_spanish: tensó su arco
  alternatives_spanish:
  - drew his bow
  - tiró de su arco
  lexicon: HALOT
  rationale: En español, 'tensó su arco' comunica con naturalidad la acción de preparar el tiro, sin perder el valor concreto del verbo hebreo.
- source_word: לְתֻמּוֹ
  english_pob_choice: at random
  chosen_spanish: al azar
  alternatives_spanish:
  - sin apuntar
  - sin intención precisa
  - con inocencia
  lexicon: HALOT
  rationale: El contexto bélico favorece la idea de disparar sin blanco específico; 'al azar' refleja la falta de objetivo intencional sin cargar la frase con moralidad ajena al pasaje.
- source_word: וַיַּכֶּה
  english_pob_choice: and struck
  chosen_spanish: e hirió
  alternatives_spanish:
  - e golpeó
  - y abatió
  lexicon: HALOT
  rationale: Aunque el verbo puede ser 'golpear', en este contexto el impacto del flechazo produce una herida inmediata; 'hirió' anticipa correctamente el resultado narrativo sin exceder el sentido.
- source_word: בֵּין הַדְּבָקִים
  english_pob_choice: between the joints of the armor
  chosen_spanish: entre las articulaciones de la armadura
  alternatives_spanish:
  - entre las junturas de la armadura
  - entre las uniones de la armadura
  - entre los puntos de unión de la armadura
  lexicon: HALOT
  rationale: La expresión es técnicamente incierta; 'articulaciones de la armadura' conserva la idea de un punto de unión o flexión vulnerable, alineado con la cautela del texto fuente.
- source_word: וּבֵין הַשִּׁרְיָן
  english_pob_choice: and the breastplate
  chosen_spanish: y la coraza
  alternatives_spanish:
  - y la armadura
  - y la cota de malla
  - y el peto
  lexicon: HALOT
  rationale: '''שִׁרְיָן'' designa una pieza de protección corporal; ''coraza'' es un equivalente claro y digno en español, evitando especificar más de lo que el hebreo permite.'
- source_word: לְרַכָּבוֹ
  english_pob_choice: to his charioteer
  chosen_spanish: a su carretero
  alternatives_spanish:
  - a su auriga
  - al conductor de su carro
  lexicon: HALOT
  rationale: El término refiere al que conduce el carro. 'Carretero' es comprensible en español y mantiene la referencia funcional; 'auriga' sería más clásico, pero menos transparente para lectores generales.
- source_word: הֲפֹךְ יָדְךָ
  english_pob_choice: Turn your hand
  chosen_spanish: Vuelve tu mano
  alternatives_spanish:
  - Gira tu mano
  - Da vuelta con tu mano
  - Mueve tu mano
  lexicon: HALOT
  rationale: Se conserva el idioma corporal del hebreo, que probablemente alude a maniobrar el carro; 'Vuelve tu mano' mantiene la imagen sin resolverla demasiado interpretativamente.
- source_word: וְהוֹצִיאֵנִי מִן הַמַּחֲנֶה
  english_pob_choice: and take me out of the camp
  chosen_spanish: y sácame del campamento
  alternatives_spanish:
  - y llévame fuera del campamento
  - y sacame del ejército
  - y retírame del campamento
  lexicon: HALOT
  rationale: '''Campamento'' traduce literalmente מַחֲנֶה y preserva el marco militar; en español, la forma imperativa encaja con la súplica urgente del rey.'
- source_word: כִּי הָחֳלֵיתִי
  english_pob_choice: for I am wounded
  chosen_spanish: porque estoy herido
  alternatives_spanish:
  - porque estoy enfermo
  - porque he sido herido
  - porque estoy lastimado
  lexicon: HALOT
  rationale: Aunque el verbo puede significar enfermar, el contexto inmediato de la flecha exige 'herido'; 'estoy herido' es natural y fiel, sin añadir intensidad que el hebreo no explicita.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del POB inglés: se mantiene ''between the joints of the armor'' como equivalente más cercano a los términos técnicos hebreos, y se evita intensificar el final con ''gravemente'', ya que el texto fuente solo dice ''estoy herido''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino solo cuando aparezca explícitamente en otros pasajes; este versículo no lo contiene.
  - '''Campamento'' preserva el literal de מַחֲנֶה, aunque el contexto implica el ejército en combate.'
  - Se ha preferido 'herido' sobre 'enfermo' por la determinación contextual del relato.
  - '''Coraza'' evita sobreespecificar el tipo de armadura porque el hebreo es técnico pero incierto.'
