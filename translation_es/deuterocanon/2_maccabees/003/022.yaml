translation:
  language: es
  text: Así pues, invocaban al Señor todopoderoso para que guardara a salvo y con toda seguridad lo que había sido confiado a quienes lo habían confiado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a quienes lo habían depositado»; el griego se refiere a las personas que habían puesto sus bienes en custodia para resguardo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεκαλοῦντο
  english_pob_choice: were calling on
  chosen_spanish: invocaban
  alternatives_spanish:
  - estaban invocando
  - apelaban a
  lexicon: BDAG
  rationale: El imperfecto medio sugiere una acción continua o reiterada en oración. «Invocaban» conserva el carácter religioso y el aspecto durativo sin sonar forzado en español.
- source_word: παγκρατῆ
  english_pob_choice: almighty
  chosen_spanish: todopoderoso
  alternatives_spanish:
  - omnipotente
  - almighty
  lexicon: LSJ
  rationale: El adjetivo indica poder sobre todo. «Todopoderoso» expresa bien ese alcance en español bíblico contemporáneo y evita una dureza innecesaria.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος se usa como título reverente para Dios; «Señor» sigue la convención doctrinal del proyecto y es natural en español cristiano.
- source_word: τὰ πεπιστευμένα
  english_pob_choice: what had been entrusted
  chosen_spanish: lo que había sido confiado
  alternatives_spanish:
  - las cosas confiadas
  - el depósito confiado
  lexicon: BDAG
  rationale: El participio perfecto pasivo sustantivado alude a bienes puestos en custodia. «Lo que había sido confiado» mantiene el sentido pasivo y resulta idiomático.
- source_word: τοῖς πεπιστευκόσιν
  english_pob_choice: to those who had entrusted it
  chosen_spanish: a quienes lo habían encomendado
  alternatives_spanish:
  - a quienes lo habían confiado
  - a los depositantes
  lexicon: LSJ
  rationale: El participio activo perfecto se refiere a las personas que entregaron sus bienes para resguardo. «Encomendado» comunica la relación de confianza sin introducir tecnicismos innecesarios.
- source_word: σῶα
  english_pob_choice: safe
  chosen_spanish: intacto
  alternatives_spanish:
  - a salvo
  - sin daño
  lexicon: BDAG
  rationale: Como predicativo de preservación, «intacto» transmite la idea de conservar en buen estado; en este contexto de custodia de bienes, evita ambigüedad.
- source_word: διαφυλάσσειν
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - preservar
  - proteger
  lexicon: BDAG
  rationale: El verbo implica custodiar con cuidado. «Guardar» es natural en español y encaja con el matiz de custodia segura.
- source_word: μετὰ πάσης ἀσφαλείας
  english_pob_choice: with all security
  chosen_spanish: con toda seguridad
  alternatives_spanish:
  - con plena seguridad
  - con toda protección
  lexicon: LSJ
  rationale: La expresión intensifica el modo de preservar. «Con toda seguridad» reproduce la fuerza enfática de la frase griega y es comprensible en español.
theological_decisions:
- issue: Título divino κύριον
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: El contexto es una súplica dirigida a Dios; por eso se mantiene el título reverente tradicional «Señor». No hay razón contextual para rebajarlo a un sentido meramente señorial.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Relación entre «lo que había sido confiado» y «quienes lo habían encomendado»
  english_pob_reading: what had been entrusted to those who had entrusted it
  chosen_spanish_reading: lo que había sido confiado a quienes lo habían encomendado
  alternative_spanish_readings:
  - lo que había sido confiado a quienes lo habían confiado
  - los bienes que habían depositado
  rationale: El griego permite que el objeto de confianza y las personas que confían se expresen de manera estrecha. La formulación española conserva esa tensión sin simplificarla demasiado.
  doctrine_reference: BDAG/LSJ participios perfectos sustantivados y activos en contexto de depósito/custodia
- issue: Sentido de σῶα
  english_pob_reading: safe
  chosen_spanish_reading: intacto
  alternative_spanish_readings:
  - a salvo
  - sin daño
  rationale: En español, «seguro» podría referirse al estado subjetivo de la custodia, no al estado del objeto. «Intacto» preserva mejor la idea de conservación sin deterioro.
  doctrine_reference: 'BDAG: σῶος / σῶα como preservación en buen estado'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó παγκρατῆ a «almighty» y aclaró la relación entre los participios sobre el depósito confiado. La versión española refleja esa corrección al usar una estructura que hace explícito quién confía y qué se confía, sin perder el aspecto de custodia segura.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al estándar del proyecto para títulos divinos.
  - Se evita «Cristo» porque no aparece en el versículo y no corresponde introducirlo.
  - «Todopoderoso» sigue el valor de παγκρατῆ sin sobrerrepresentar una fórmula litúrgica fija.
  - La nota [a] se ancla en «intacto», donde el griego admite la alternativa de preservación sin daño.
