translation:
  language: es
  text: Los nobles[a] vendrán de Egipto; Cus[b] se apresurará a extender sus manos hacia Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «emisarios» o «príncipes» para «nobles». El raro término hebreo probablemente se refiere a personas prominentes de Egipto.
    reason: lexical_alternative
  - marker: b
    text: O «Cus se apresurará a extender su mano a Dios». El hebreo usa un sufijo singular con la nación personificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶאֱתָיוּ
  english_pob_choice: shall come
  chosen_spanish: vendrán
  alternatives_spanish:
  - llegarán
  - vendrán a
  lexicon: HALOT
  rationale: El verbo qal imperfecto 3mp expresa venir/llegar. «Vendrán» conserva el movimiento sin añadir la idea de tributo, que no está en el verbo mismo.
- source_word: חַשְׁמַנִּים
  english_pob_choice: nobles
  chosen_spanish: Nobles
  alternatives_spanish:
  - enviados
  - príncipes
  lexicon: HALOT
  rationale: El término es raro y en el contexto designa personas de alto rango provenientes de Egipto. «Nobles» mantiene esa dignidad sin especificar demasiado la función.
- source_word: מִנִּי מִצְרָיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - procedentes de Egipto
  lexicon: HALOT
  rationale: La preposición indica origen; «de Egipto» es la forma natural y fiel en español.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  lexicon: HALOT
  rationale: Se mantiene el topónimo bíblico como nombre propio transliterado al uso español, evitando reemplazarlo por un equivalente geográfico posterior.
- source_word: תָּרִיץ
  english_pob_choice: shall quickly stretch out
  chosen_spanish: se apresurará a extender
  alternatives_spanish:
  - se apresurará a alargar
  - se dará prisa en extender
  lexicon: HALOT
  rationale: El hiphil de רוץ implica apresuramiento/impulso. En español, «se apresurará a extender» conserva la rapidez y el gesto hacia Dios.
- source_word: יָדָיו
  english_pob_choice: its hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus manos de él
  - sus manos de la nación
  lexicon: HALOT
  rationale: El sufijo es singular masculino, pero en español el sujeto colectivo «Cus» puede recibir pronombre posesivo «sus» sin perder el sentido personificado de la nación.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - a Dios
  - para Dios
  lexicon: HALOT
  rationale: El verso describe un gesto de extensión dirigido a Dios; «hacia Dios» expresa mejor la dirección del movimiento que un simple «a Dios».
theological_decisions:
- issue: Gestro de Cus al extender las manos a Dios
  english_pob_reading: A gesture of submission, prayer, or worship directed to God without specifying conversion or political subjugation.
  chosen_spanish_reading: Un gesto de sumisión, oración o adoración dirigido a Dios, sin precisar conversión ni sometimiento político.
  alternative_spanish_readings:
  - Un acto diplomático de tributo
  - Una profecía de inclusión pactual en sentido más estrecho
  rationale: El hebreo permite varias lecturas del gesto de extender las manos. La traducción conserva esa amplitud y no cierra el sentido hacia una sola interpretación teológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Sin cambios respecto al pase más reciente; la lectura auditada sigue mostrando alto acuerdo entre revisores y no requiere ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se usa «Cus» como transliteración española del topónimo כּוּשׁ, en lugar de «Etiopía».
  - Se evita suavizar el participio raro de חַשְׁמַנִּים; la nota recoge las alternativas documentadas.
  - La nota sobre el sufijo de «sus manos» preserva la tensión entre la gramática hebrea singular y el español colectivo.
