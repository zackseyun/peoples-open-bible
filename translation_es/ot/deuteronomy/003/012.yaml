base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/003/012.yaml
  text: And we took possession of this land at that time[a], from Aroer, which is on the Valley of the Arnon, and half the hill country of Gilead with its cities[b]; I gave it to the Reubenites and the Gadites.
  footnotes:
  - marker: a
    text: Or 'from Aroer, which is by the Wadi Arnon.' The Hebrew נחל can refer to a wadi, ravine, or valley.
    reason: lexical_alternative
  - marker: b
    text: Or 'half of Mount Gilead.' Here 'hill country of Gilead' is preferred because the Hebrew הַר often refers to a mountainous region in territorial descriptions.
    reason: lexical_alternative
