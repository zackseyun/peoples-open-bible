translation:
  language: es
  text: Al tercer día, desciende rápidamente y llega al lugar donde te escondiste en el día del hecho[a], y quédate junto a la piedra Ezel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en el día del hecho»; también puede entenderse «en el día del asunto» o «en el día del negocio». La expresión probablemente alude a la ocasión previamente concertada.'
    reason: lexical_alternative
  - marker: b
    text: «Ezel» parece ser un nombre propio o una designación fija para la piedra. El sentido exacto del término hebreo es incierto; podría relacionarse con «irse» o «partida».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּשְׁתָּ
  english_pob_choice: On the third day
  chosen_spanish: Al tercer día
  alternatives_spanish:
  - Cuando lo hagas por tercera vez
  - Durante tres días
  lexicon: HALOT
  rationale: El valor del piel de שלשׁ aquí es idiomático y se integra mejor como referencia temporal a la señal acordada. En español, «Al tercer día» transmite con naturalidad la instrucción y evita una calca innecesaria de la forma verbal.
- source_word: תֵּרֵד מְאֹד
  english_pob_choice: go down quickly
  chosen_spanish: desciende rápidamente
  alternatives_spanish:
  - desciende mucho
  - ve hacia abajo con urgencia
  lexicon: HALOT
  rationale: ירד conserva el sentido básico de «descender». מְאֹד intensifica la acción; en español, «rápidamente» expresa mejor la urgencia del movimiento que una traducción literal como «mucho».
- source_word: וּבָאתָ אֶל הַמָּקוֹם
  english_pob_choice: and come to the place
  chosen_spanish: y llega al lugar
  alternatives_spanish:
  - y ve al lugar
  - y ven al lugar
  lexicon: HALOT
  rationale: בוא aquí funciona como llegar o venir a un sitio concreto. «Llega al lugar» suena natural en la instrucción narrativa y mantiene la dirección del movimiento.
- source_word: אֲשֶׁר נִסְתַּרְתָּ שָּׁם
  english_pob_choice: where you hid yourself
  chosen_spanish: donde te habías escondido allí
  alternatives_spanish:
  - donde te escondiste allí
  - donde estuviste oculto allí
  lexicon: HALOT
  rationale: El nifal tiene sentido reflexivo o pasivo; aquí el contexto muestra una acción deliberada de ocultarse. He mantenido el matiz con «te habías escondido», y conservado «allí» porque está explícito en el hebreo, aunque suena redundante en español.
- source_word: בְּיוֹם הַמַּעֲשֶׂה
  english_pob_choice: on the day of the deed
  chosen_spanish: en el día del hecho
  alternatives_spanish:
  - en el día del asunto
  - en el día del negocio
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede significar «hecho», «acto», «asunto» o «negocio». «Hecho» preserva la concreción del hebreo y, a la vez, deja abierta la referencia a la ocasión previamente acordada, como indica el audit trail inglés.
- source_word: וְיָשַׁבְתָּ
  english_pob_choice: and remain
  chosen_spanish: y quédate
  alternatives_spanish:
  - y permanece
  - y siéntate
  lexicon: HALOT
  rationale: ישׁב puede significar «sentarse» o «permanecer». En este contexto de espera e instrucción práctica, «quédate» comunica la idea de permanecer en el lugar sin imponer una imagen corporal específica.
- source_word: אֵצֶל הָאֶבֶן הָאָזֶל
  english_pob_choice: beside the stone Ezel
  chosen_spanish: junto a la piedra Ezel
  alternatives_spanish:
  - al lado de la piedra Ezel
  - junto a la piedra de Ezel
  lexicon: HALOT
  rationale: 'אֵצֶל indica proximidad: «junto a» es la opción más directa en español. He conservado «Ezel» como transliteración del nombre fijo o designación del lugar, siguiendo la cautela del texto fuente ante su sentido exacto.'
translation_notes:
  revision_awareness: He seguido el texto hebreo masorético y el audit trail inglés sin cambios sustantivos en la comprensión. La única tensión léxica relevante permanece en מַעֲשֶׂה y en הָאָזֶל/Ezel, por lo que se conserva la ambigüedad con nota en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» o un calco litúrgico innecesario; el verso es puramente narrativo/instructivo.
  - «Junto a» y «desciende rápidamente» conservan un registro claro, sobrio y publicable en español latinoamericano.
  - La duplicación espacial de «allí» reproduce el hebreo; no se elimina para no perder el matiz textual.
