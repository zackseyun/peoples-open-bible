translation:
  language: es
  text: 'Y Abraham llamó el nombre de aquel lugar «Yahvé verá[a]», como se dice hasta hoy[b]: «En el monte de Yahvé será visto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé verá» o «Yahvé verá a ello»; el verbo también puede tener el sentido de «proveer».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «En el monte de Yahvé se verá» / «él será visto». El hebreo probablemente conserva un juego deliberado de palabras con «Yahvé proveerá».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - llamó al
  lexicon: HALOT
  rationale: קרא con שֵׁם expresa la acción de dar nombre o llamar; en español, «llamó» reproduce el giro idiomático sin volverlo mecánico.
- source_word: שֵׁם הַמָּקוֹם הַהוּא
  english_pob_choice: the name of that place
  chosen_spanish: el nombre de aquel lugar
  alternatives_spanish:
  - aquel lugar
  - el lugar
  lexicon: HALOT
  rationale: Conservar «el nombre de» refleja la construcción hebrea explícita. «Aquel» mantiene la referencia demostrativa del hebreo הַהוּא.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio divino según la terminología POB en español: «Yahvé», no una sustitución titular como «SEÑOR».'
- source_word: יִרְאֶה
  english_pob_choice: will see / will provide
  chosen_spanish: ve
  alternatives_spanish:
  - verá
  - proveerá
  - verá a ello
  lexicon: HALOT
  rationale: El hebreo usa el verbo ראה, cuyo sentido básico es «ver». En español, «ve» preserva la base semántica y deja visible el juego de palabras con el dicho posterior, sin resolverlo demasiado hacia «proveerá».
- source_word: אֲשֶׁר יֵאָמֵר הַיּוֹם
  english_pob_choice: as it is said to this day
  chosen_spanish: como se dice hasta hoy
  alternatives_spanish:
  - como se ha dicho hasta hoy
  - como se dice el día de hoy
  lexicon: HALOT
  rationale: La cláusula introduce una fórmula proverbial o de tradición vigente; «como se dice hasta hoy» es natural en español y conserva su valor de dicho transmitido.
- source_word: בְּהַר יְהוָה
  english_pob_choice: On the mountain of Yahweh
  chosen_spanish: En el monte de Yahvé
  alternatives_spanish:
  - Sobre el monte de Yahvé
  - En la montaña de Yahvé
  lexicon: HALOT
  rationale: «Monte» reproduce el uso bíblico de הַר; «de Yahvé» mantiene el nombre divino sin sustituirlo por un título.
- source_word: יֵרָאֶה
  english_pob_choice: it will be seen
  chosen_spanish: será visto
  alternatives_spanish:
  - será visto/manifestado
  - se verá
  lexicon: HALOT
  rationale: El niphal de ראה significa «ser visto/manifestarse». «Será visto» conserva la voz y la ambigüedad del hebreo, evitando cerrar el sentido solo en «será provisto».
theological_decisions:
- issue: Nombre divino YHWH en la frase nominal y en el dicho proverbial
  english_pob_reading: Yahweh / Yahweh
  chosen_spanish_reading: Yahvé / Yahvé
  alternative_spanish_readings:
  - SEÑOR / SEÑOR
  - Jehová / Jehová
  rationale: La lectura fuente usa el Tetragrámaton de manera directa. En la tradición POB se translitera como «Yahvé» para preservar el nombre personal del pacto y evitar el reemplazo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Juego de palabras entre יִרְאֶה y יֵרָאֶה
  english_pob_reading: will see / will be seen, with a footnoted provision sense
  chosen_spanish_reading: ve / será visto, con nota sobre la alternativa de sentido de «proveer»
  alternative_spanish_readings:
  - proveerá / será provisto
  - verá / se verá
  rationale: El hebreo mantiene una tensión deliberada entre ver y proveer. En español se preserva la literalidad básica de ראה en el texto principal, mientras la nota recoge la alternativa contextual de «proveer» para no borrar el trasfondo narrativo de Gn 22:8, 13.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del texto inglés: la última revisión prefirió reflejar más directamente el verbo hebreo de «ver» y preservar el juego de palabras, en lugar de resolverlo como «proveer». Por eso la redacción española principal sigue la literalidad semántica de ראה, pero la nota mantiene la alternativa contextual de provisión.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma uniforme para el Tetragrámaton.
  - Se conserva el paralelismo entre el nombre del lugar y el proverbio citado.
  - «Será visto» mantiene la pasiva/impersonal del niphal sin introducir sujeto no presente en el hebreo.
  - La puntuación separa correctamente la cita directa del marco narrativo.
