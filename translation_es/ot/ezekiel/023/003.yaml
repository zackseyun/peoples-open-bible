translation:
  language: es
  text: Se prostituyeron en Egipto[a]; en su juventud cometieron prostitución allí. Allí les manosearon[c][b] los pechos, y allí les tocaron sus senos virginales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Se hicieron prostitutas en Egipto; en su juventud cometieron prostitución allí».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa imágenes sexuales explícitas para describir la infidelidad temprana y la profanación.
    reason: cultural_note
  - marker: c
    text: 'O: «allí les apretaron los pechos, y allí manipularon los senos de su virginidad». Las expresiones hebreas son gráficas y difíciles; la traducción busca conservar el sentido en español natural.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּזְנֶינָה
  english_pob_choice: they prostituted themselves
  chosen_spanish: se prostituyeron
  alternatives_spanish:
  - cometieron prostitución
  - se entregaron a la prostitución
  lexicon: HALOT
  rationale: זנה tiene fuerza sexual y metafórica de infidelidad. «Se prostituyeron» conserva el sentido reflexivo y la carga fuerte del hebreo, como el inglés POB.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  lexicon: HALOT
  rationale: La referencia locativa es directa y no requiere paráfrasis.
- source_word: בִּנְעוּרֵיהֶן
  english_pob_choice: in their youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - cuando eran jóvenes
  lexicon: HALOT
  rationale: נְעוּרִים señala la etapa de juventud; «en su juventud» mantiene la referencia temporal de forma natural en español.
- source_word: זָנוּ
  english_pob_choice: they committed prostitution
  chosen_spanish: cometieron prostitución
  alternatives_spanish:
  - se prostituyeron
  - cometieron fornicación
  lexicon: HALOT
  rationale: La segunda ocurrencia de זנה repite y refuerza la acusación. «Cometieron prostitución» evita borrar la reiteración que el hebreo enfatiza.
- source_word: שָׁ֚מָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio de lugar repetido por énfasis; «allí» mantiene la reiteración.
- source_word: מֹעֲכ֣וּ
  english_pob_choice: were fondled
  chosen_spanish: les fueron manoseados
  alternatives_spanish:
  - fueron apretados
  - fueron acariciados
  lexicon: HALOT
  rationale: מעך implica presión/aplastamiento, pero el contexto sexual pide una expresión que conserve el carácter violento e íntimo. «Manoseados» traduce el toque sexual impropio sin suavizarlo en exceso.
- source_word: שְׁדֵי/הֶן
  english_pob_choice: their breasts
  chosen_spanish: sus pechos
  alternatives_spanish:
  - sus senos
  - sus pechos/chiches
  lexicon: HALOT
  rationale: שדֵי es el término anatómico directo. «Pechos» es claro, natural y concordante con el registro sobrio pero explícito del pasaje.
- source_word: עִשּׂ֔וּ
  english_pob_choice: were handled
  chosen_spanish: fueron tocados
  alternatives_spanish:
  - fueron tratados
  - fueron manipulados
  lexicon: HALOT
  rationale: עשה aquí funciona con objeto corporal en contexto sexual. «Fueron tocados» conserva la pasiva y evita precisar más de lo que el hebreo exige.
- source_word: דַּדֵּ֖י
  english_pob_choice: bosoms
  chosen_spanish: sus senos
  alternatives_spanish:
  - sus pechos
  - sus pechos de doncella
  lexicon: HALOT
  rationale: דַּדֵּי puede aludir al seno/pecho. En español, «senos» permite diferenciar esta segunda referencia de שדֵי sin perder la carga corporal.
- source_word: בְּתוּלֵי/הֶן
  english_pob_choice: their virgin bosoms
  chosen_spanish: de doncellez
  alternatives_spanish:
  - virginales
  - de su virginidad
  - de doncella
  lexicon: HALOT
  rationale: בְּתוּלִים expresa virginidad/maidenhood. «De doncellez» preserva el matiz de virginidad en un giro breve y dignificado; unido a «senos» evita una traducción torpe o redundante.
theological_decisions:
- issue: Imágenes sexuales explícitas en la acusación profética
  english_pob_reading: Retain explicit sexual imagery in the main text as part of the prophetic accusation, without euphemistic softening.
  chosen_spanish_reading: Mantener la imaginería sexual explícita en el texto principal, sin suavizarla a eufemismos morales.
  alternative_spanish_readings:
  - Sustituirla por lenguaje más general como «se contaminaron allí»
  - Reducirla a una alusión menos directa
  rationale: El hebreo es deliberadamente gráfico para denunciar la infidelidad. La traducción española debe preservar esa fuerza y no desactivar la vergüenza y violencia implícitas.
  doctrine_reference: Principio de primacía del texto original; equivalencia óptima con transparencia léxica
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés POB. Conservar dos verbos de prostitución, dos adverbios de lugar y dos referencias corporales distintas respeta la repetición enfática del hebreo y su intensidad retórica.
  spanish_consistency_notes:
  - Se mantiene «Egipto» como topónimo sin glosa.
  - Se usa «prostituyeron»/«prostitución» para conservar la fuerza léxica de זנה.
  - Se preserva la distinción entre שְׁדֵי y דַּדֵי mediante «pechos» y «senos».
  - Se evita rebajar el pasaje a lenguaje meramente figurado o moralizante.
