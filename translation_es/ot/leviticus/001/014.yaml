revisions:
- from: Y si su ofrenda para Yahvé es holocausto de aves, presentará su ofrenda de entre los tórtolos o de entre los pichones.
  to: Y si su ofrenda a Yahvé es un holocausto de aves, presentará su ofrenda de las tórtolas o de los pichones de paloma.
