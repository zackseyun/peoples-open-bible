base_translation:
  language: en
  yaml_path: translation/ot/proverbs/010/015.yaml
  text: A rich man's wealth is his fortified city[b][a]; the ruin of the poor is their poverty.
  footnotes:
  - marker: a
    text: Or 'A rich man's wealth is his strong city'; the Hebrew literally reads 'city of his strength.'
    reason: lexical_alternative
  - marker: b
    text: '''Ruin'' may also be rendered ''destruction'' or, less likely here, ''terror/dismay.'''
    reason: lexical_alternative
