translation:
  language: es
  text: Por tanto[a], oponiendo la razón al deseo, derramó la bebida como libación a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «derramó la bebida a Dios». El verbo griego implica una libación u ofrenda de bebida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: LSJ
  rationale: Introduce una conclusión lógica a partir del contexto inmediato; «Por tanto» conserva bien el valor inferencial sin sonar rebuscado.
- source_word: ἀντιθεὶς τῇ ἐπιθυμίᾳ τὸν λογισμόν
  english_pob_choice: setting reason against desire
  chosen_spanish: oponiendo la razón al deseo
  alternatives_spanish:
  - poniendo la razón frente al deseo
  - colocando la razón contra el deseo
  - contrastando la razón con el deseo
  lexicon: LSJ
  rationale: El participio expresa una acción deliberada de contraposición. «Oponiendo... al...» suena natural en español y preserva la confrontación conceptual entre ἐπιθυμία y λογισμός.
- source_word: τῇ ἐπιθυμίᾳ
  english_pob_choice: desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - la pasión
  - el apetito
  - la codicia
  lexicon: LSJ
  rationale: «Deseo» es la equivalencia más amplia y fiel aquí. «Pasión» o «apetito» estrecharían o desviarían el campo semántico del término griego.
- source_word: τὸν λογισμόν
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - el juicio racional
  - la facultad racional
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός funciona como la facultad racional que gobierna los impulsos. «La razón» reproduce esa función de manera clara y sobria.
- source_word: ἔσπεισεν
  english_pob_choice: poured out ... as a libation
  chosen_spanish: derramó ... como libación
  alternatives_spanish:
  - ofreció ... como libación
  - hizo una libación de
  - derramó como ofrenda de bebida
  lexicon: LSJ
  rationale: El verbo σπένδω indica una acción cultual de libación. «Derramó... como libación» hace explícito el sentido sacrificial sin añadir más de lo que el griego permite.
- source_word: τὸ πόμα
  english_pob_choice: the drink
  chosen_spanish: la bebida
  alternatives_spanish:
  - la bebida ofrecida
  - la copa
  - la libación
  lexicon: LSJ
  rationale: El sustantivo significa literalmente «bebida». En español, «la bebida» comunica el referente concreto, dejando que el verbo aporte la connotación de ofrenda.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - ante Dios
  lexicon: LSJ
  rationale: El dativo de destinatario se expresa con naturalidad como «a Dios», manteniendo la orientación cultual del acto.
theological_decisions:
- issue: Nuance cultual de σπένδω en relación con τὸ πόμα
  english_pob_reading: Rendered the clause as a libation act offered to God.
  chosen_spanish_reading: Se conservó la acción cultual al traducir «como libación» en vez de una mera bebida derramada.
  alternative_spanish_readings:
  - derramó la bebida a Dios
  - ofreció la bebida a Dios
  rationale: El texto griego no describe solo un derramamiento cualquiera; el verbo implica libación. La formulación española mantiene esa tensión sin reemplazarla por lenguaje eclesiástico más tardío.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserving cultic lexical force without doctrinal expansion.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios; el texto quedó estable. La versión española sigue de cerca la decisión auditada de la POB: conservar el contraste razón/deseo y explicitar el valor cultual de σπένδω mediante «como libación».'
  spanish_consistency_notes:
  - Se mantiene «Dios» como traducción de τῷ θεῷ.
  - Se usa «razón» para λογισμός en coherencia con el uso filosófico del pasaje.
  - Se evita «SEÑOR» porque el griego aquí dice explícitamente θεῷ.
  - La nota añade una alternativa más literal sin duplicar el sentido principal del texto.
