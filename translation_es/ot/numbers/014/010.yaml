review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: toda la congregación quiere apedrear a Josué y Caleb, y la gloria de Yahvé se manifiesta en el lugar sagrado delante/direccionada a todo Israel. Sin embargo, hay dos desajustes frente al rastro POB y al hebreo: 1) la nota al pie [a] quedó anclada en «con piedras», pero el alternante documentado corresponde a «hijos de Israel / israelitas», no al medio de apedreamiento; 2) «ante todos los hijos de Israel» es posible por contexto epifánico, pero el hebreo אֶל se alinea mejor con «a todos los hijos de Israel», especialmente dado que el POB inglés preserva esa direccionalidad y deja «before» solo como alternativa.'
  spanish_quality_summary: El español es claro y digno. «Toda la congregación», «los apedrearan» y «la gloria de Yahvé apareció» funcionan bien. «Tabernáculo de reunión» es comprensible y tradicional, aunque menos literal que «tienda de reunión»; no exige cambio. El problema principal de calidad editorial es la ubicación errónea de la nota al pie, que puede confundir al lector.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; בְּנֵי יִשְׂרָאֵל → «hijos de Israel» preserva la forma masculina convencional, con alternativa idiomática adecuada en nota. No hay conflicto doctrinal significativo. Se recomienda ajustar «ante» a «a» para seguir más de cerca אֶל y el POB auditado.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en la frase equivocada.
    rationale: La nota explica la alternativa idiomática para «hijos de Israel» → «israelitas», pero en el borrador aparece tras «con piedras[a]», donde no tiene relación semántica.
  - severity: medium
    issue: «Ante todos los hijos de Israel» suaviza la preposición אֶל.
    rationale: Aunque el contexto permite una idea de manifestación pública, el hebreo usa אֶל y el POB inglés escogió «to all the sons of Israel». En español conviene «a todos los hijos de Israel» para preservar mejor la direccionalidad/alcance.
  revised_spanish_text: Pero toda la congregación dijo que los apedrearan con piedras, y la gloria de Yahvé apareció en el tabernáculo de reunión, a todos los hijos de Israel[a].
  revised_footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «a todos los israelitas».'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al pie para que corresponda a la alternativa documentada de «hijos de Israel / israelitas», y se ajusta «ante» a «a» para reflejar con mayor fidelidad la preposición hebrea אֶל y el rastro léxico del POB inglés. El resto del texto puede mantenerse.
