    text: 'Hebreo: «la hija de Judá», personificación poética de Judá.'
    reason: cultural_note
  - marker: c
    text: O «ha mancillado el reino y a sus príncipes». El verbo también puede traducirse «ha profanado».
    reason: lexical_alternative
  revision_rationale: Se corrige la frase problemática «las hizo llegar hasta la tierra» por «las ha abatido hasta el suelo», que transmite con naturalidad la idea de derribar fortificaciones hasta el suelo. También se uniforma la serie verbal en perfecto compuesto para mejorar cohesión estilística. La nota [c] se ajusta para ofrecer una alternativa real y no repetir el mismo término del texto principal.
