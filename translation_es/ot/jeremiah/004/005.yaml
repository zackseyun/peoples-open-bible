    changes_summary: Removed repeated 'it' for closer adherence to the Hebrew, and replaced the interpretive phrase 'fill the air' with omission, since מַלְאוּ here is difficult and not naturally represented that way in English without expansion. Smoothed punctuation while preserving the sequence of imperatives.
translation:
  language: es
  text: 'Declaren en Judá[a], y proclamen en Jerusalén, y digan: Toquen el cuerno[b] en la tierra. Clamen[c] y digan: Reúnanse[d], y vayamos a las ciudades fortificadas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «háganlo oír en Jerusalén».
    reason: lexical_alternative
  - marker: b
    text: O «toquen el shofar»; se trata de un cuerno de carnero usado como señal de alarma.
    reason: cultural_note
  - marker: c
    text: La frase hebrea de base es breve e idiomática; puede comunicar un clamor de alarma pública. La revisión inglesa optó por no expandirla en el texto principal.
    reason: lexical_alternative
  - marker: d
    text: O «júntense». También puede traducirse «y vayamos dentro de las ciudades fortificadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  english_pob_choice: Declare
  chosen_spanish: Declaren
  alternatives_spanish:
  - Anuncien
  - Digan públicamente
  lexicon: HALOT
  rationale: El imperativo hifil de נגד pide una declaración pública y urgente. «Declaren» conserva el valor proclamativo sin sonar conversacional.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - por Judá
  - a lo largo de Judá
  lexicon: HALOT
  rationale: La preposición ב expresa ubicación/esfera; «en Judá» es la correspondencia más directa y natural.
- source_word: וּבִירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - y en Jerusalén
  - proclamen en Jerusalén
  lexicon: HALOT
  rationale: Se conserva el paralelismo con Judá y la ubicación de la proclamación.
- source_word: הַשְׁמִיעוּ
  english_pob_choice: proclaim
  chosen_spanish: proclamen
  alternatives_spanish:
  - háganlo oír
  - hagan que se oiga
  lexicon: HALOT
  rationale: 'El hifil de שמע tiene fuerza causativa: hacer oír. En este contexto, «proclamen» comunica bien la función pública del anuncio.'
- source_word: וְאִמְרוּ
  english_pob_choice: and say
  chosen_spanish: y digan
  alternatives_spanish:
  - y anuncien
  - y hablen
  lexicon: HALOT
  rationale: Imperativo simple que introduce la serie de órdenes citadas; «digan» es el equivalente más directo y repetible.
- source_word: וְתִקְעוּ שׁוֹפָר
  english_pob_choice: Blow the trumpet
  chosen_spanish: Toquen el cuerno
  alternatives_spanish:
  - Toquen el shofar
  - Suenen el cuerno
  lexicon: HALOT
  rationale: שׁוֹפָר es un cuerno de alarma, no exactamente una trompeta moderna. «Cuerno» evita imponer un instrumento posterior; el verbo «toquen» mantiene la acción idiomática.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - por la tierra
  lexicon: HALOT
  rationale: אָרֶץ puede referirse a la tierra/territorio. «En la tierra» preserva el alcance amplio y el tono solemne del hebreo.
- source_word: קִרְאוּ
  english_pob_choice: Cry aloud
  chosen_spanish: Clamen en voz alta
  alternatives_spanish:
  - Griten
  - Proclamen
  lexicon: HALOT
  rationale: La raíz קרא en este contexto tiene sentido de gritar o alzar la voz para una alarma pública. «Clamen en voz alta» mantiene la urgencia sin perder dignidad.
- source_word: מַלְאוּ
  english_pob_choice: fill the air
  chosen_spanish: en voz alta
  alternatives_spanish:
  - con fuerza
  - llenando el aire
  lexicon: HALOT
  rationale: El hebreo es elíptico y difícil; la revisión inglesa optó por omitir una expansión interpretativa. En español se evita sobretraducir, integrando la idea de intensidad en la frase previa «clamen en voz alta».
- source_word: הֵאָסְפוּ
  english_pob_choice: Gather yourselves
  chosen_spanish: Júntense
  alternatives_spanish:
  - Reúnanse
  - Agrúpense
  lexicon: HALOT
  rationale: El niphal imperativo funciona como convocatoria a reunirse. «Júntense» conserva el matiz reflexivo sin sonar forzado.
- source_word: וְנָבוֹאָה
  english_pob_choice: let us go
  chosen_spanish: y vayamos
  alternatives_spanish:
  - y vamos
  - y entremos
  lexicon: HALOT
  rationale: El cohortativo 1cp expresa exhortación compartida. «Vayamos» reproduce bien el sentido de invitación colectiva.
- source_word: אֶל עָרֵי הַמִּבְצָר
  english_pob_choice: into the fortified cities
  chosen_spanish: a las ciudades fortificadas
  alternatives_spanish:
  - hacia las ciudades fortificadas
  - a las ciudades de refugio fortificadas
  lexicon: HALOT
  rationale: «Ciudades fortificadas» traduce el sustantivo compuesto con fidelidad. Se usa «a» en lugar de «en» para no imponer la imagen espacial de entrar, aunque el contexto la sugiere.
theological_decisions:
- issue: יַהֲוֶה / nombre divino no presente en el versículo, pero el marco profético de Judá y Jerusalén implica lenguaje de pacto y juicio.
  english_pob_reading: No explicit divine-name issue in the verse; the line is an urgent public alarm in prophetic speech.
  chosen_spanish_reading: No se introduce ningún equivalente divino en el verso; se conserva como un anuncio profético dirigido al pueblo de Judá y Jerusalén.
  alternative_spanish_readings:
  - añadir una referencia implícita a Yahvé
  - explicitar un sujeto divino en la cita
  rationale: El texto hebreo no nombra a Dios aquí. Introducirlo en español alteraría la cadena de imperativos y la forma de la amonestación.
  doctrine_reference: Fidelidad al texto fuente y a la distinción entre el discurso profético y glosas interpretativas.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que eliminó el repetido ‘it’ y omitió la expansión interpretativa de מַלְאוּ. Por eso el español evita añadir un objeto inexistente y resuelve la intensidad del llamado con una formulación breve y natural, sin introducir ‘llenen el aire’.
  spanish_consistency_notes:
  - Mantuve 'Judá' y 'Jerusalén' como topónimos directos, sin añadir perífrasis explicativas.
  - '''Cuerno'' se usa para שׁוֹפָר por fidelidad al instrumento de alarma, con nota explicativa para lectores no familiarizados.'
  - 'Conservo el encadenamiento imperativo del hebreo: declaren / proclamen / digan / toquen / clamen / júntense / vayamos.'
  - Evité 'SEÑOR' o 'Yahvé' porque el versículo no contiene el nombre divino.
  - '''Ciudades fortificadas'' mantiene la imagen militar sin suavizarla a un lenguaje devocional más genérico.'
