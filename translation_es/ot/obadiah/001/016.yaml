revisions:
- from: Porque, así como ustedes bebieron sobre mi monte santo[a], todas las naciones beberán continuamente; beberán y tragarán[b], y serán como si no hubieran sido.
  to: Porque, así como ustedes bebieron en mi monte santo, todas las naciones beberán continuamente; beberán y tragarán[a], y serán como si no hubieran sido.
  rationale: Se eliminó la nota innecesaria en «monte santo», se cambió «sobre» por «en» para un español más natural sin pérdida de sentido, y se concentró la nota textual en «tragarán», que es donde el expediente inglés documenta la principal alternativa léxica y el matiz de la imagen.
