  to: y has hecho más maldad que todos los que fueron antes de ti. Fuiste e hiciste para ti otros dioses e imágenes fundidas[a], para provocarme a ira, y a mí me has arrojado detrás de tus espaldas.
  rationale: La revisión corrige un falso reflejo en 'te hiciste', mejora la naturalidad de la secuencia verbal, alinea אֱלֹהִים אֲחֵרִים con 'otros dioses', y usa 'imágenes fundidas' para reflejar mejor מַסֵּכוֹת y el razonamiento léxico auditado. También ajusta la imagen final a un español más idiomático sin perder la fuerza del rechazo metafórico.
