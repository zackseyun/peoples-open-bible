base_translation:
  language: en
  yaml_path: translation/ot/isaiah/007/017.yaml
  text: Yahweh will bring upon you[a], upon your people[b], and upon your father's house days unlike any that have come since the day Ephraim turned away from Judah—the king of Assyria.
