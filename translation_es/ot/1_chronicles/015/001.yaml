translation:
  language: es
  text: Y él hizo casas para sí en la ciudad de David, y preparó un lugar para el arca de Dios, y levantó una tienda para ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'y levantó una tienda para sí'. El sufijo hebreo puede leerse como referido al arca o a David, aunque el contexto inmediato favorece el arca.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - construyó
  lexicon: HALOT
  rationale: עשה es un verbo amplio ('hacer'); en español 'hizo' conserva mejor la correspondencia directa que una paráfrasis más interpretativa. 'Construyó' es posible por el contexto, pero ya interpreta más específicamente la acción.
- source_word: בָתִּים
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - viviendas
  - edificios
  - palacios
  lexicon: HALOT
  rationale: בית en plural normalmente significa 'casas'. 'Casas' es la forma más sobria y cercana al hebreo. 'Palacios' sería demasiado específico sin apoyo explícito del texto.
- source_word: בְּעִיר דָּוִיד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  lexicon: HALOT
  rationale: La frase locativa es directa y el nombre propio se conserva de manera transparente en español.
- source_word: וַיָּכֶן
  english_pob_choice: prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - dispuso
  - estableció
  lexicon: HALOT
  rationale: כון en este contexto expresa preparar o disponer algo para su uso; 'preparó' comunica bien la preparación concreta de un lugar.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  lexicon: HALOT
  rationale: מקום es el término común para 'lugar'; 'un lugar' suena natural en español y sigue de cerca el hebreo.
- source_word: לַאֲרוֹן הָאֱלֹהִים
  english_pob_choice: for the ark of God
  chosen_spanish: para el arca de Dios
  alternatives_spanish:
  - para el arca del Dios
  lexicon: HALOT
  rationale: Arca de Dios reproduce la construcción hebrea sin añadir glosa innecesaria. En español es la expresión más natural y fiel.
- source_word: וַיֶּט
  english_pob_choice: pitched
  chosen_spanish: levantó
  alternatives_spanish:
  - plantó
  - tendió
  - extendió
  lexicon: HALOT
  rationale: נטה con אֹהֶל puede significar 'levantar' una tienda; en español 'levantó una tienda' es idiomático y conserva la imagen de erigirla.
- source_word: אֹהֶל
  english_pob_choice: a tent
  chosen_spanish: una tienda
  alternatives_spanish:
  - un toldo
  - una carpa
  lexicon: HALOT
  rationale: אֹהֶל se refiere a una tienda; 'tienda' es la equivalencia bíblica más natural en español y evita una palabra demasiado moderna como 'carpa'.
- source_word: לּוֹ
  english_pob_choice: for it
  chosen_spanish: para ella
  alternatives_spanish:
  - para ello
  - para él
  - para sí
  lexicon: HALOT
  rationale: El sufijo pronominal se entiende mejor como referido al arca, que es femenina en español. Esto sigue la lectura contextual del POB inglés ('for it') y evita forzar 'para sí', lectura alternativa menos probable en el contexto inmediato.
theological_decisions:
- issue: Referente del sufijo pronominal en וַיֶּט לוֹ אֹהֶל
  english_pob_reading: the suffix refers to the ark, yielding 'pitched a tent for it'
  chosen_spanish_reading: el sufijo se refiere al arca, produciendo 'levantó una tienda para ella'
  alternative_spanish_readings:
  - levantó una tienda para sí
  - levantó una tienda para él
  rationale: El contexto inmediato se centra en la preparación para el arca de Dios, y el paralelismo con 'preparó un lugar para el arca' favorece mantener el mismo referente. En español, usar 'para ella' hace explícita la referencia al arca sin alterar la decisión exegética.
  doctrine_reference: Exégesis contextual del pronombre; coherencia referencial dentro de la unidad narrativa.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando explícitamente la nota [a] en el texto español mediante el marcador correspondiente junto a 'ciudad de David'.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' en lugar de una glosa ampliada, siguiendo el término hebreo sin sobreinterpretación.
  - Se prefirió 'tienda' para אֹהֶל por ser el equivalente bíblico natural en español.
  - Se conservó la referencia al arca en femenino ('ella') por la concordancia española, sin cambiar el referente exegético.
  - La nota [a] está anclada exactamente en el lugar donde aparece la ambigüedad contextual del versículo.
