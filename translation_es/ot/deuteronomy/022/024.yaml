  to: 'entonces sacarás a ambos a la puerta de aquella ciudad[c], y los apedrearás con piedras, y morirán: la joven[a], porque no clamó en la ciudad, y el hombre, porque violó a la esposa de su prójimo[b]. Así purgarás el mal de en medio de ti.'
  rationale: Se corrige el término principal para עִנָּה a 'violó' a fin de preservar la claridad sexual-jurídica documentada en el POB inglés, dejando en nota las alternativas más amplias. Se precisa la relación marital con 'esposa'. Se refuerza la fórmula deuteronómica con 'purgarás'. También se restituye la nota cultural sobre la puerta de la ciudad, ya presente en el expediente inglés.
