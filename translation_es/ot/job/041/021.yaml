    issue: תוֹתָח fue reducido a ‘el arma’.
    rationale: El audit trail inglés optó por ‘club’ precisamente para no perder la concreción de un arma específica aunque incierta. ‘Arma’ borra ese matiz y debilita el paralelismo con כידון.
  - severity: medium
    issue: ‘la jabalina’ suena deportiva en español contemporáneo.
    rationale: Aunque etimológicamente posible, en lectura eclesial general se asocia antes al deporte. ‘Venablo’ o ‘lanza arrojadiza’ comunica mejor el arma antigua.
  - severity: low
    issue: ‘se le considera’ es menos natural con este sujeto.
    rationale: Con ‘la maza’, ‘se considera como paja’ o ‘es considerada como paja’ fluye mejor en español.
