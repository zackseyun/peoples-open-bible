translation:
  language: es
  text: Todas las palabras de mi boca son justas[a]; no hay en ellas nada torcido ni desviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hay en ellas nada perverso ni tortuoso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֶדֶק
  english_pob_choice: are righteous
  chosen_spanish: son rectas
  alternatives_spanish:
  - son justas
  - están en justicia
  - son rectas en justicia
  lexicon: HALOT
  rationale: El hebreo expresa la cualidad moral de las palabras con בְּ + צֶדֶק. En español, «rectas» comunica bien la idea de integridad y corrección moral sin sonar forzado, y mantiene la conexión natural con los pares «torcido» y «perverso».
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Cada una de
  - Todas y cada una de
  lexicon: HALOT
  rationale: «Todas» concuerda con «palabras» y conserva el alcance inclusivo del hebreo.
- source_word: אִמְרֵי פִי
  english_pob_choice: the words of my mouth
  chosen_spanish: las palabras de mi boca
  alternatives_spanish:
  - mis dichos
  - las expresiones de mi boca
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y concreta. «Las palabras de mi boca» conserva la imagen de habla articulada y la solemnidad del original sin volverla artificial en español.
- source_word: אֵין בָּהֶם
  english_pob_choice: there is nothing ... in them
  chosen_spanish: no hay en ellas nada
  alternatives_spanish:
  - no hay nada en ellas
  - nada hay en ellas
  lexicon: HALOT
  rationale: La negación existencial del hebreo se expresa de manera natural en español con «no hay en ellas nada», que mantiene el sentido de ausencia total.
- source_word: נִפְתָּל
  english_pob_choice: twisted
  chosen_spanish: torcido
  alternatives_spanish:
  - enredado
  - retorcido
  - perverso
  lexicon: HALOT
  rationale: «Torcido» traduce bien la imagen moral y física de lo desviado o retorcido. Además, forma pareja natural con «perverso» en la segunda cola.
- source_word: עִקֵּשׁ
  english_pob_choice: crooked
  chosen_spanish: perverso
  alternatives_spanish:
  - torcido
  - desviado
  - corrupto
  lexicon: HALOT
  rationale: Aunque «torcido» también es posible, aquí se reserva para נִפְתָּל para reflejar la distinción retórica entre los dos adjetivos hebreos. «Perverso» transmite bien la fuerza moral de עִקֵּשׁ y preserva la tensión léxica documentada en la nota inglesa alternativa.
theological_decisions:
- issue: Cómo rendir צֶדֶק en un dicho sapiencial sobre palabras rectas
  english_pob_reading: All the words of my mouth are righteous
  chosen_spanish_reading: Todas las palabras de mi boca son rectas
  alternative_spanish_readings:
  - Todas las palabras de mi boca son justas
  - Todas las palabras de mi boca son correctas
  rationale: No se trata de una afirmación técnica sobre justicia judicial, sino de integridad moral en el habla sapiencial. «Rectas» conserva esa cualidad ética y además reproduce la imaginería del contraste con lo torcido.
  doctrine_reference: Sabiduría bíblica; integridad del hablar (cf. Prov. 8:8)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió «are righteous» frente a «are in righteousness». Por eso el español no calca una construcción preposicional; usa una predicación adjetival natural («son rectas») y conserva el paralelo de la doble negación con términos concretos de desvío moral.
  spanish_consistency_notes:
  - Se mantiene «boca» para פי, en coherencia con el registro solemne de la colección sapiencial.
  - Se evita «SEÑOR» o cualquier sustitución teológica no presente en el verso.
  - 'La nota alternativa conserva la tensión entre pares semánticos cercanos: «torcido/perverso» frente a «deforme/desviado», sin neutralizarla.'
