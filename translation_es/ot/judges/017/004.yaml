  text: So he returned the silver to his mother[a], and his mother took two hundred pieces of silver and gave it to the silversmith, and he made it into a carved image and a cast image[c][b], and it was in the house of Micah.
  footnotes:
  - marker: a
    text: Or 'two hundred silver shekels'; the Hebrew says simply 'two hundred silver' without stating the unit explicitly in this verse.
    reason: lexical_alternative
