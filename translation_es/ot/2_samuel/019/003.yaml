translation:
  language: es
  text: 'Así, la victoria[a] de aquel día se convirtió en luto para todo el pueblo, porque aquel día el pueblo oyó decir[b]: «El rey está afligido por su hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la liberación de aquel día se convirtió en luto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el pueblo oyó, diciendo»; un giro idiomático para indicar que oyó un informe o que se dijo así.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּשֻׁעָה
  english_pob_choice: the victory
  chosen_spanish: la victoria
  alternatives_spanish:
  - la salvación
  - la liberación
  lexicon: HALOT
  rationale: En este contexto bélico, el sustantivo designa el resultado favorable de la batalla. «Victoria» comunica en español el sentido militar y el giro resultativo sin cargar innecesariamente el término con un matiz teológico.
- source_word: וַתְּהִי ... לְאֵבֶל
  english_pob_choice: was turned into mourning
  chosen_spanish: se convirtió en luto
  alternatives_spanish:
  - se volvió luto
  - fue cambiado en luto
  lexicon: HALOT
  rationale: La construcción hebrea expresa una inversión de estado. En español, «se convirtió en luto» reproduce bien ese cambio y evita una literalidad torpe.
- source_word: אֵבֶל
  english_pob_choice: mourning
  chosen_spanish: luto
  alternatives_spanish:
  - duelo
  - lamentación
  lexicon: HALOT
  rationale: «Luto» es un equivalente natural y público en español para el duelo comunitario del pasaje. Mantiene el tono social del contexto mejor que una palabra más interior como «tristeza».
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el ejército
  lexicon: HALOT
  rationale: Aunque el referente es el grupo armado y sus partidarios, el hebreo dice literalmente «el pueblo». «El pueblo» conserva mejor la forma del texto que «el ejército».
- source_word: כִּי שָׁמַע ... לֵאמֹר
  english_pob_choice: because ... the people heard it said
  chosen_spanish: porque ... el pueblo oyó decir
  alternatives_spanish:
  - porque ... el pueblo oyó que se decía
  - porque ... el pueblo oyó decirlo
  lexicon: HALOT
  rationale: La expresión hebrea oye un reporte introducido por לֵאמֹר. «Oyó decir» conserva en español esa fuerza reportiva sin añadir un sujeto explícito que el hebreo no requiere.
- source_word: נֶעֱצַב
  english_pob_choice: is grieved
  chosen_spanish: está afligido
  alternatives_spanish:
  - está entristecido
  - está apenado
  - está dolido
  lexicon: HALOT
  rationale: El nifal de עצב expresa estar dolido, apenado o afligido. «Afligido» mantiene la gravedad del estado emocional del rey y suena natural en español bíblico contemporáneo.
- source_word: עַל בְּנוֹ
  english_pob_choice: over his son
  chosen_spanish: por su hijo
  alternatives_spanish:
  - a causa de su hijo
  - sobre su hijo
  lexicon: HALOT
  rationale: Con verbos de aflicción, עַל introduce la causa u ocasión del dolor. En español, «por su hijo» es la forma más clara y idiomática de expresar esa relación.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto base mantiene un acuerdo alto con la evaluación de revisión cruzada. Se conservó la equivalencia óptima del inglés POB y se ajustó el registro al español bíblico natural sin perder el matiz de reversión del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preservó «el pueblo» para reflejar הָעָם, aunque el referente contextual sea militar.
  - Se eligió «afligido» en lugar de «Cristo/Mesías» u այլ terminología, ya que el pasaje no contiene lenguaje titular relevante.
