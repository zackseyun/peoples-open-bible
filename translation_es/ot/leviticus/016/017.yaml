translation:
  language: es
  text: Y ninguna persona[a] estará en la tienda de reunión cuando entre para hacer expiación en el lugar santo, hasta que salga. Y hará expiación por sí mismo, por su familia y por toda la asamblea de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “ningún hombre estará en la tienda de reunión”. El hebreo dice “ningún hombre”, con una forma masculina singular de fuerza genérica.
    reason: alternative_reading
lexical_decisions:
- source_word: כָל אָדָם
  english_pob_choice: no person
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - nadie
  - ninguna persona
  lexicon: HALOT
  rationale: אָמָד / אָדָם aquí funciona con fuerza genérica singular en una prohibición. Conservé la forma masculina singular como en el hebreo, siguiendo la preferencia del POB por no neutralizar cuando el género gramatical forma parte del enunciado, pero en español elegí 'ningún hombre' para mantener la naturalidad de la construcción negativa y el paralelismo con el original. La nota preserva la alternativa inclusiva posible.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: '''Tienda de reunión'' sigue de cerca la composición hebrea אֹהֶל + מוֹעֵד y mantiene la transparencia semántica. Evité ''tabernáculo'' por ser menos analítico respecto del hebreo, y ''encuentro'' es una posibilidad estilística pero menos literal en este contexto ritual.'
- source_word: בְּבֹאוֹ
  english_pob_choice: when he enters
  chosen_spanish: cuando entre
  alternatives_spanish:
  - al entrar
  - cuando entra
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa aquí tiempo. En español, 'cuando entre' reproduce bien la relación temporal y conserva un tono jurídico-ritual.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer propiciación
  - para expiar
  lexicon: HALOT
  rationale: En contexto sacerdotal, כפר requiere un término que conserve la fuerza cultual. 'Hacer expiación' es el equivalente tradicional y preciso en español bíblico; 'propiciación' sería posible, pero puede desplazar el énfasis. 'Expiar' es más breve, pero menos transparente para el acto ritual.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en el santo lugar
  - en el santuario
  lexicon: HALOT
  rationale: En este pasaje, קֹדֶשׁ señala el ámbito sagrado de la acción. 'Lugar santo' es claro en español y mantiene la referencia al espacio consagrado sin decidir de más sobre una cámara técnica específica.
- source_word: עַד צֵאתוֹ
  english_pob_choice: until he comes out
  chosen_spanish: hasta que salga
  alternatives_spanish:
  - hasta salir
  - hasta que él salga
  lexicon: HALOT
  rationale: 'La idea es durativa: la exclusión del espacio sagrado continúa hasta el final de la acción. ''Hasta que salga'' es idiomático y fiel.'
- source_word: וְכִפֶּר
  english_pob_choice: And he shall make atonement
  chosen_spanish: Y hará expiación
  alternatives_spanish:
  - Y hará propiciación
  - Y expiará
  lexicon: HALOT
  rationale: El waw consecutivo en secuencia ritual lleva valor injuntivo/futuro. En español, el futuro simple conserva bien la prescripción. Repetí 'expiación' para mantener consistencia con לְכַפֵּר.
- source_word: בַּעֲדוֹ
  english_pob_choice: for himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - por él mismo
  - a favor de sí mismo
  lexicon: HALOT
  rationale: בעד puede expresar beneficio o representación. Aquí el sentido natural es que el sacerdote hace expiación en su propio favor; 'por sí mismo' expresa la referencia reflexiva sin perder la función cultual.
- source_word: בֵּיתוֹ
  english_pob_choice: his household
  chosen_spanish: su casa
  alternatives_spanish:
  - su familia
  - su casa y su gente
  lexicon: HALOT
  rationale: La expresión hebrea puede referirse al núcleo doméstico del sacerdote. Opté por 'su casa' porque sigue más de cerca el lexema בַּיִת y conserva la amplitud familiar sin interpretar demasiado.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  english_pob_choice: all the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el pueblo de Israel reunido
  lexicon: HALOT
  rationale: קהל designa al cuerpo reunido del pueblo. 'Asamblea' mantiene ese sentido corporativo y cultual; 'congregación' es posible, pero suena más eclesiástico en español contemporáneo.
theological_decisions:
- issue: Alcance genérico de אָדָם en la prohibición
  english_pob_reading: no person / no man with generic force
  chosen_spanish_reading: ningún hombre
  alternative_spanish_readings:
  - nadie
  - ninguna persona
  rationale: El hebreo usa singular masculino con fuerza genérica. La traducción principal conserva esa forma para no diluir el rasgo gramatical del original, pero la nota a pie de página preserva la lectura inclusiva que ya estaba documentada en el auditoría inglesa.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; contested term אָדָם
- issue: Función cultual de כפר en Levítico
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - hacer propiciación
  - expiar
  rationale: En el marco levítico, כפר no es un simple 'perdonar' sino un acto ritual expiatorio. 'Hacer expiación' conserva la tensión teológica y el carácter ceremonial del pasaje sin forzar una teoría única de la expiación.
  doctrine_reference: Terminología cultual de Levítico; DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'La auditoría inglesa revisó la redacción de ''no man'' a ''no person'' por mayor precisión para כָל אָדָם, pero mantuvo sin cambios el resto del versículo. Esta versión española refleja esa misma revisión en la nota, mientras conserva en el cuerpo una construcción natural y suficientemente cercana al masculino genérico del hebreo. También mantengo la secuencia ritual: entrada, permanencia excluida, salida, y luego la expiación por sí mismo, por su casa y por toda la asamblea de Israel.'
  spanish_consistency_notes:
  - He usado 'expiación' de manera uniforme para לְכַפֵּר y וְכִפֶּר.
  - '''Asamblea'' se mantiene para קהל en línea con el valor corporativo del término.'
  - '''Lugar santo'' evita decidir innecesariamente entre recinto técnico y referencia general al espacio sagrado.'
  - La nota a pie de página da la alternativa inclusiva sin reemplazar el masculino genérico del texto principal.
