review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa básica y las decisiones principales del audit trail: preparar el animal, hablar al ayudante, urgir el avance y prohibir frenar por causa de ella salvo indicación. Sin embargo, hay dos ajustes preferibles para mayor fidelidad y naturalidad: «servidor» suena poco idiomático aquí frente a «sirviente» o «criado», y «sino hasta que yo te lo diga» expresa un matiz temporal menos directo que el hebreo/inglés «a menos que yo te diga».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «enalbardó» y «servidor» juntos cargan el registro hacia lo poco natural. «Enalbardó la asna» es defendible léxicamente, pero «su servidor» resulta rígido en narrativa bíblica. Además, «Apresura el paso» puede sonar como si el sirviente caminara, no como si condujera el animal. Conviene una redacción más natural y precisa para un lector amplio.
  glossary_alignment: No hay términos teológicos de proyecto en juego. Las decisiones léxicas importantes están razonadas, especialmente la conservación de la hembra del animal con «asna». La excepción introducida por כִּי אִם se expresa mejor en español con «a menos que» que con «sino hasta que».
  issues:
  - severity: medium
    issue: «su servidor» es poco natural en este contexto narrativo
    rationale: Aunque semánticamente posible, en español bíblico general «sirviente», «criado» o «ayudante» leen con más naturalidad para un asistente doméstico o personal. «Servidor» tiende a sonar formulaico o moderno-institucional.
  - severity: medium
    issue: «Apresura el paso» debilita la idea de conducir el animal
    rationale: נְהַג se refiere a conducir/arrear, no meramente a caminar más rápido. La frase puede entenderse como que el muchacho apure su propio paso, en vez de hacer avanzar la asna.
  - severity: low
    issue: «sino hasta que yo te lo diga» no es la mejor equivalencia de la excepción
    rationale: Después de una prohibición, כִּי אִם introduce una excepción tipo «a menos que». «Sino hasta que» introduce un matiz temporal más marcado que no es necesario.
  revised_spanish_text: 'Entonces ella ensilló la asna y dijo a su sirviente[a]: «Guía y sigue adelante; no te detengas por mí[b] a menos que yo te lo diga».'
