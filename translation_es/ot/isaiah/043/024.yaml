  to: No me compraste con plata caña aromática[a], ni me saciaste con la grasa de tus sacrificios; sino que me cargaste con tus pecados[b]; me fatigaste con tus iniquidades.
  rationale: Se cambia únicamente 'maldades' por 'iniquidades' para ajustarse mejor al hebreo עָוֹן y al razonamiento léxico documentado en el POB inglés, que busca distinguir 'pecados' de 'iniquidades'. También se corrige 'calamo' a 'cálamo' en la nota. El resto del texto puede mantenerse por ser fiel, claro y teológicamente adecuado.
