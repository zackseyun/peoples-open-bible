translation:
  language: es
  text: El corazón de un hombre revela sus pensamientos[a][b], más que siete vigías en una atalaya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo שעיותיו es incierto; puede referirse a los pensamientos, preocupaciones, angustias o inquietudes interiores de una persona. El paralelo griego de este versículo difiere considerablemente y, en cambio, habla de alguien que es hábil en palabras, pero odiado y privado de alimento.
    reason: textual_variant
  - marker: b
    text: 'O: «sus preocupaciones» o «sus angustias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT
  rationale: לב en la sabiduría bíblica puede abarcar centro de pensamiento, voluntad y afecto. «Corazón» conserva esa imagen antropológica en español y suena natural en un proverbio.
- source_word: אנוש
  english_pob_choice: a man
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de un ser humano
  lexicon: HALOT
  rationale: El singular genérico se expresa bien con «un hombre» en español proverbial, manteniendo el valor humano genérico del hebreo sin volverlo abstracto.
- source_word: יגיד
  english_pob_choice: tells of
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - da a conocer
  - revela
  lexicon: HALOT
  rationale: נגד en hifil tiene el sentido de comunicar o hacer saber. «Dice» preserva la concisión proverbial y permite conectar naturalmente con el complemento.
- source_word: שעיותיו
  english_pob_choice: his thoughts
  chosen_spanish: lo que piensa
  alternatives_spanish:
  - sus pensamientos
  - sus preocupaciones
  - sus angustias
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el contexto auditado muestra incertidumbre textual. Dado que la revisión inglesa cambió de «troubles» a «thoughts» por precisión léxica, «lo que piensa» evita fijar indebidamente una interpretación más específica y sigue la amplitud del término.
- source_word: משבעה
  english_pob_choice: more than seven
  chosen_spanish: más que siete
  alternatives_spanish:
  - más que siete veces
  - por encima de siete
  lexicon: HALOT
  rationale: La comparación numérica se vierte literalmente para conservar la fuerza proverbial del hebreo.
- source_word: צופים
  english_pob_choice: watchmen
  chosen_spanish: vigías
  alternatives_spanish:
  - guardianes
  - centinelas
  - atentos
  lexicon: HALOT
  rationale: צופים son personas que velan o observan. «Vigías» mantiene la imagen de vigilancia y resulta idiomático en español.
- source_word: על מצפה
  english_pob_choice: on a lookout
  chosen_spanish: en una atalaya
  alternatives_spanish:
  - en un puesto de observación
  - en un mirador
  - en una garita
  lexicon: HALOT
  rationale: מצפה designa un puesto elevado de observación. «Atalaya» expresa bien la función de vigía sin sobrecargar la frase.
theological_decisions:
- issue: Texto hebreo frente al paralelo griego
  english_pob_reading: The Hebrew line is retained, with a note that the Greek parallel differs substantially.
  chosen_spanish_reading: Se traduce la línea hebrea, sin armonizarla con el griego, y se señala la discrepancia textual.
  alternative_spanish_readings:
  - 'Seguir el griego: «Hay quien es sabio en palabras, pero es odiado; éste padecerá escasez de alimento.»'
  - Intentar una traducción mixta o armonizada entre hebreo y griego.
  rationale: El paquete fuente prioriza el hebreo Kahana como texto principal, mientras que el griego sirve como control paralelo. Para una edición auditable, la traducción debe reflejar el hebreo base y no fusionarse con la lectura griega, aunque se reconozca la tensión textual.
  doctrine_reference: Crítica textual / prioridad del testimonio base del pasaje
- issue: Sentido de שעיותיו
  english_pob_reading: Possible senses include troubles, anxieties, inward concerns, or thoughts; the revision preferred thoughts.
  chosen_spanish_reading: «lo que piensa» mantiene la amplitud semántica sin exagerar hacia «preocupaciones» o «angustias».
  alternative_spanish_readings:
  - «sus pensamientos»
  - «sus preocupaciones»
  - «sus angustias»
  rationale: La revisión inglesa corrigió el término hacia 'thoughts' por mayor ajuste léxico. En español, una expresión neutra como «lo que piensa» respeta esa decisión y conserva la incertidumbre del hebreo, evitando cerrar el campo semántico demasiado pronto.
  doctrine_reference: Semántica léxica / prudencia en pasajes difíciles
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la versión desde «troubles» a «thoughts» por mayor precisión respecto de שעיותיו. La redacción española sigue esa actualización y evita fijar una interpretación más fuerte que la evidencia permita, manteniendo además la advertencia textual sobre la divergencia del paralelo griego.
  spanish_consistency_notes:
  - Se usa «corazón» para לב, en continuidad con la antropología bíblica y con el estándar POB.
  - Se evita «SEÑOR» u otras sustituciones porque no hay aquí el Tetragrámaton ni κύριος divino.
  - Se mantiene el plural numérico «siete» de forma literal para conservar el tono proverbial.
  - «Vigías» y «atalaya» sostienen la imagen militar/observacional sin introducir un edificio específico más allá de lo que מצפה exige.
