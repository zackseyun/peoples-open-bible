translation:
  language: es
  text: Pero ellos no escucharon, y Manasés los desvió para hacer más maldad que las naciones[a] que Yahvé había destruido delante de los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para hacer el mal más que las naciones». El hebreo expresa la comparación con «de/que las naciones» mediante מִן.
    reason: lexical_alternative
  - marker: b
    text: 'O «los israelitas». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמֵעוּ
  english_pob_choice: did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no oyeron
  - no obedecieron
  lexicon: HALOT
  rationale: שמַע puede abarcar oír con respuesta obediente. En este contexto de rechazo a la advertencia divina, «no escucharon» conserva tanto la dimensión auditiva como la actitud de resistencia, sin forzar «obedecieron» en el texto principal.
- source_word: וַיַּתְעֵם
  english_pob_choice: led them astray
  chosen_spanish: los desvió
  alternatives_spanish:
  - los hizo errar
  - los extravió
  lexicon: HALOT
  rationale: El causativo de תעה expresa que Manasés hizo que el pueblo se desviara moralmente. «Los desvió» es natural en español moderno y conserva la idea de dirección equivocada causada por otro.
- source_word: לַעֲשׂוֹת אֶת הָרָע
  english_pob_choice: to do more evil
  chosen_spanish: para hacer más mal
  alternatives_spanish:
  - para hacer el mal
  - para actuar perversamente
  lexicon: HALOT
  rationale: La frase base es «hacer el mal», pero la construcción comparativa con מִן exige que el sentido de comparación quede explícito en español. «Más mal» reproduce esa relación sin añadir una explicación ajena al verso.
- source_word: מִן הַגּוֹיִם
  english_pob_choice: than the nations
  chosen_spanish: que las naciones
  alternatives_spanish:
  - más que las naciones
  - que los pueblos
  lexicon: HALOT
  rationale: Aquí מִן funciona comparativamente. En español, «que las naciones» expresa la comparación de manera natural; «más que» también es posible, pero el giro del texto ya queda claro por el contexto de «más mal».
- source_word: הִשְׁמִיד
  english_pob_choice: had destroyed
  chosen_spanish: había destruido
  alternatives_spanish:
  - había exterminado
  - había arrasado
  lexicon: HALOT
  rationale: El verbo señala destrucción real y fuerte. «Había destruido» preserva esa fuerza sin sonar excesivamente coloquial; el pluscuamperfecto refleja que la acción antecede al tiempo narrado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se mantiene la convención del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En este contexto de expulsión/conquista, la expresión idiomática indica ubicación delante de ellos. «Delante de» es idiomático, claro y fiel al valor espacial del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Israel». Se conserva esa forma por fidelidad morfológica y por coherencia con el principio de exactitud de género del proyecto; «israelitas» sería más idiomático, pero menos transparente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El versículo usa directamente el Tetragrámaton. La política del proyecto para el español es transliterarlo como «Yahvé», no ocultarlo detrás de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Construcción comparativa con מִן הַגּוֹיִם
  english_pob_reading: more evil than the nations
  chosen_spanish_reading: más mal que las naciones
  alternative_spanish_readings:
  - hacer el mal más que las naciones
  - hacer más mal que los pueblos
  rationale: El hebreo no solo dice que hicieron mal, sino que lo hicieron en grado comparativo respecto de las naciones. La traducción principal mantiene ese juicio comparativo sin suavizarlo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve lexical/theological tensions rather than flattening them'
- issue: בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la formulación masculina y genealógica del hebreo en el texto principal, en línea con la exactitud morfológica del proyecto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El paquete auditado muestra alta concordancia con la revisión más reciente y no presenta cambios aplicados; la redacción española sigue la lectura estable del inglés POB, pero vuelve al hebreo para fijar la comparación y la forma genealógica «hijos de Israel».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva la comparación explícita con «más mal que las naciones», evitando neutralizar la fuerza del hebreo.
  - «Hijos de Israel» mantiene la forma del original y la coherencia terminológica del corpus.
