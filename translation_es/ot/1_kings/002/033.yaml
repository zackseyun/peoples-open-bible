translation:
  language: es
  text: Así su sangre[a] recaerá sobre la cabeza de Joab y sobre la cabeza de su descendencia para siempre; pero para David, para su descendencia, para su casa y para su trono, habrá paz para siempre proveniente de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su sangre», un giro idiomático que alude a la responsabilidad por la sangre derramada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבוּ
  english_pob_choice: shall return
  chosen_spanish: recaerá
  alternatives_spanish:
  - volverá
  - retornará
  lexicon: HALOT
  rationale: El verbo expresa aquí el regreso de la culpa/sangre sobre el culpable; en español, «recaerá» comunica con naturalidad ese retorno judicial sin perder la imagen de retribución.
- source_word: דְמֵי/הֶם
  english_pob_choice: their blood
  chosen_spanish: la sangre de ellos
  alternatives_spanish:
  - su sangre
  - la sangre de ellos mismos
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de conservar el giro literal «their blood», pero en español «la sangre de ellos» suena más claro y mantiene la referencia idiomática a la sangre derramada y a la responsabilidad por ella.
- source_word: בְּ/רֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - en la cabeza de
  - contra la cabeza de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para culpa o consecuencia que cae sobre alguien. «Sobre la cabeza de» preserva la imagen legal y retributiva documentada por la POB inglesa.
- source_word: זַרְע֖/וֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - sus hijos
  - su linaje
  lexicon: HALOT
  rationale: «Descendencia» conserva el valor colectivo de זֶרַע sin sonar arcaico; mantiene la referencia dinástica y no restringe el término a hijos inmediatos.
- source_word: לְ/עֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: «Para siempre» es la forma natural en español para expresar duración indefinida y permanente en un contexto judicial y dinástico.
- source_word: לְ/דָוִד וּ/לְ/זַרְע/וֹ וּ/לְ/בֵית֨/וֹ וּ/לְ/כִסְא֜/וֹ
  english_pob_choice: for David and for his offspring and for his house and for his throne
  chosen_spanish: para David, para su descendencia, para su casa y para su trono
  alternatives_spanish:
  - a David, a su descendencia, a su casa y a su trono
  - para David y para su descendencia y para su casa y para su trono
  lexicon: HALOT
  rationale: Conservo la repetición de לְ con «para» porque expresa relación/beneficio y respeta el paralelismo del hebreo. «Casa» y «trono» se mantienen literalmente por su fuerza dinástica.
- source_word: יִהְיֶ֥ה שָׁל֛וֹם
  english_pob_choice: there shall be peace
  chosen_spanish: habrá paz
  alternatives_spanish:
  - existirá paz
  - será paz
  lexicon: HALOT
  rationale: «Habrá paz» suena idiomático en español y mantiene la afirmación existencial del texto. Conserva «paz» para no reducir שָׁלוֹם a prosperidad solamente.
- source_word: מֵ/עִ֥ם יְהוָֽה
  english_pob_choice: from Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - proveniente de Yahvé
  lexicon: HALOT
  rationale: 'La preposición expresa origen/fuente: la paz viene de Yahvé. «De parte de Yahvé» comunica bien ese origen personal y mantiene la terminología del nombre divino exigida por el proyecto.'
theological_decisions:
- issue: Contraste entre juicio para Joab y bendición para David
  english_pob_reading: Use 'but for David...' to make explicit the adversative sense between bloodguilt on Joab and peace for David.
  chosen_spanish_reading: Usar «pero para David...» para hacer explícito el contraste entre el juicio sobre Joab y la paz concedida a David.
  alternative_spanish_readings:
  - y para David...
  - mas para David...
  rationale: Aunque el hebreo conecta con una conjunción simple, el sentido del versículo contrasta claramente retribución y bendición. «Pero» reproduce ese valor adversativo de manera natural y fiel.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservar el sentido relacional del texto sin añadir doctrina nueva.'
- issue: Sentido de שָׁלוֹם en contexto dinástico
  english_pob_reading: Render as 'peace' and leave its fuller covenantal/dynastic implications implicit.
  chosen_spanish_reading: Traducir como «paz» y dejar implícitas sus resonancias de estabilidad, bienestar y favor pactal.
  alternative_spanish_readings:
  - bienestar
  - prosperidad
  rationale: «Paz» es el equivalente más amplio y teológicamente cargado; evita reducir el término a prosperidad material y conserva la amplitud del hebreo.
  doctrine_reference: 'Translation philosophy: equivalencia óptima con sensibilidad al peso teológico de שָׁלוֹם.'
translation_notes:
  revision_awareness: El texto inglés más reciente se mantuvo sin cambios; esta versión española sigue de cerca la decisión final aprobada y traduce directamente desde el hebreo con el auditorio inglés como control de sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se conserva la repetición de «para» para reflejar el paralelismo hebreo de לְ.
  - Se mantiene «paz» para שָׁלוֹם y «descendencia» para זֶרַע por claridad y continuidad terminológica.
  - La nota[a] se ancla en «la sangre de ellos» y preserva el valor idiomático reconocido por la POB inglesa.
