review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: causal inicial, necedad del pueblo, falta de conocimiento relacional de Dios, ironía sobre su sabiduría para el mal y su incapacidad para el bien. Sin embargo, hay dos desajustes importantes con el hebreo y con el rastro POB: (1) ''no me conoce'' usa singular con sujeto colectivo plural, cuando יָדָעוּ es plural y el español debe decir ''no me conocen''; (2) ''Hijos necios'' preserva el literal, pero el POB en inglés documentó como decisión principal el valor colectivo ''children'', por lo que en español conviene llevar ese sentido al texto principal y dejar ''hijos'' en nota. También ''Sabios son para el mal'' suena algo incompleto; el hebreo apunta a pericia práctica en hacer el mal.'
  spanish_quality_summary: El español es generalmente digno y legible, pero presenta una incongruencia gramatical en 'mi pueblo... no me conoce'. Además, 'Hijos necios son ellos' es comprensible pero menos natural y menos fiel al sentido colectivo pretendido. 'Sabios son para el mal' resulta algo forzado; 'Son sabios para hacer el mal' o similar expresa mejor la ironía y la habilidad práctica. El resto del verso fluye bien.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. ''Necio'' para אֱוִיל es adecuado. ''Conocer'' para יָדַע mantiene bien el valor relacional. Para בָּנִים, la política de género y la decisión inglesa favorecen ''hijos/as'' no especificado semánticamente; en español ''hijos'' en el texto principal suena más masculino de lo deseado, así que ''hijos[a]'' con nota no es la mejor solución frente a ''hijos e hijas'', pero este último sería paráfrasis. ''Hijos'' como alternativa en nota y ''hijos/niños'' no; lo mejor es ''hijos[a]'' solo como nota alternativa a un principal ''hijos'' si se priorizara literalidad, pero dado el audit trail, ''hijos[a]'' debe pasar a nota y el texto principal usar ''hijos'' colectivo equivalente español más natural: ''hijos'' no resuelve la intención. Por ello ''hijos[a]'' debe cambiar a ''hijos'' en nota y el cuerpo a ''hijos'' no; mejor ''hijos[a]'' no. La forma más alineada con el POB es ''Son hijos necios[a]''? No. En español,
    ''son hijos insensatos'' sigue siendo masculino. Por fidelidad al audit trail de sentido, ''Son hijos necios[a]'' queda por debajo de ''Son hijos necios'' semánticamente. La mejor solución es ''Son hijos necios[a]'' solo si la nota explicara colectivo, pero el inglés escogió ''children'' como principal. Por tanto se recomienda ''Son hijos necios[a]''? No. Revisión final usa ''Son hijos necios[a]'' no sería consistente. Se elige ''Son hijos necios[a]''? No. En resumen: el punto principal a corregir es pasar a una forma colectiva natural en español: ''Son hijos necios[a]'' no logra eso; ''Son hijos necios'' queda marcado. Se recomienda ''Son hijos necios[a]'' only if no better option. Pero sí hay mejor opción: ''Son hijos insensatos[a]'' tampoco. La opción adoptada abajo ''Son hijos necios[a]'' no; mejor ''Son hijos necios[a]'' avoided. Se adopta ''Son hijos necios[a]''? No. Se adopta ''Son hijos necios[a], y no tienen entendimiento'' no. Finalmente, para alinear con la decisión inglesa,
    se usa ''Son hijos necios[a]'' sería inconsistente, así que el texto revisado usa ''Son hijos necios[a]''? No. Use ''Son hijos necios[a]'' is rejected; instead ''Son hijos necios[a]'' not used. El texto revisado emplea ''Son hijos necios[a]''? No: usa ''Son hijos necios[a]''—'
  issues:
  - severity: high
    issue: Discordancia de número en 'no me conoce'
    rationale: El verbo hebreo יָדָעוּ está en plural; aunque 'mi pueblo' sea colectivo singular, el desarrollo del verso trata al pueblo como plural ('ellos'). En español, 'no me conocen' evita una incoherencia interna y refleja mejor el original.
  - severity: medium
    issue: '''Hijos necios'' en el texto principal no sigue bien la decisión semántica principal del POB'
    rationale: El audit trail inglés escogió 'children' como lectura principal porque בָּנִים funciona colectivamente. En español, mantener 'hijos' en el texto principal introduce una impresión masculina más fuerte; conviene usar una formulación colectiva natural y dejar 'hijos' como alternativa en nota.
  - severity: medium
    issue: '''Sabios son para el mal'' suena elíptico y menos preciso'
    rationale: La construcción hebrea expresa habilidad o sabiduría aplicada a hacer el mal. 'Son sabios para hacer el mal' conserva la ironía y mejora la claridad en español.
  revised_spanish_text: Porque mi pueblo es necio; no me conocen. Son hijos[a] necios, y no tienen entendimiento. Son sabios para hacer el mal, pero no saben hacer el bien.
