base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/040/004.yaml
  text: And now[a], behold, I have freed you today from the chains that were on your hands. If it is good in your eyes to come with me to Babylon, come, and I will look after you. But if it is bad in your eyes to come with me to Babylon, refrain. See[b], the whole land is before you[c]; go wherever it seems good and right in your eyes to go.
  footnotes:
  - marker: a
    text: Literally, 'I will set my eye on you,' an idiom here expressing favorable care or protection.
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'If it is good in your eyes ... if it is bad in your eyes.' This Hebrew idiom means 'if it seems good/right to you ... if it seems bad/wrong to you.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'go there, go' at the end of the verse, a Hebrew way of giving emphatic permission.
    reason: lexical_alternative
