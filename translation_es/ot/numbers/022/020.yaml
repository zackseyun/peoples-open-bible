  to: 'Dios vino a Balaam de noche y le dijo: «Si los hombres han venido a llamarte[a], levántate, ve con ellos; pero solo la palabra que yo te diga[b], eso harás».'
  rationale: Se movió la nota [a] al lugar correcto, sobre «llamarte». Se ajustó «la palabra que yo te hable» a «la palabra que yo te diga» para lograr un español más natural y claramente inteligible, manteniendo la función de habla divina y la restricción profética. Se conservó «la palabra» como elección principal para דָּבָר, en línea con la rationale auditada, y se mantuvo la alternativa «el asunto» en nota.
