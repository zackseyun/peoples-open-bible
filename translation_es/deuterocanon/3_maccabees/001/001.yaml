revisions:
- from: Entonces Filopátor[a], habiendo sabido por los que habían regresado de la desposesión[b] que Antíoco estaba haciendo de las regiones que estaban bajo su dominio, dio órdenes a todas sus fuerzas de infantería y caballería, tomó consigo a su hermana Arsinoe y avanzó hasta la región de Rafía, donde los que estaban con Antíoco habían acampado.
  to: Entonces Filopátor, habiendo sabido por los que habían regresado de la incautación de las regiones bajo su dominio por parte de Antíoco, dio órdenes a todas sus fuerzas de infantería y caballería, tomó consigo a su hermana Arsinoe y partió hasta la región de Rafía, donde los que estaban con Antíoco[a] habían acampado.
  rationale: Se corrigió el anclaje de la nota para que corresponda a οἱ περὶ Ἀντίοχον. Se rehízo la frase central para reflejar mejor el sustantivo griego ἀφαίρεσις con agente expreso ('la incautación ... por parte de Antíoco') en vez de verbalizarla como una acción progresiva. Se sustituyó 'desposesión' por 'incautación' por mayor claridad y naturalidad en español, y 'avanzó' por 'partió' para ajustarse mejor a ἐξώρμησεν.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:47:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia principal del griego: Filopátor recibe noticia, ordena a sus fuerzas, lleva consigo a Arsinoe y sale hacia la región de Rafía. Sin embargo, no preserva con suficiente fidelidad la construcción nominal τὴν γινομένην ... ἀφαίρεσιν ὑπὸ Ἀντιόχου, porque la rehace como ''que Antíoco estaba haciendo'', volviendo al verbo y alejándose de la revisión inglesa auditada (''the seizure by Antiochus''). También el anclaje de la nota [a] está mal colocado: la nota explica οἱ περὶ Ἀντίοχον, no ''Filopátor''.'
  spanish_quality_summary: El español es generalmente claro, pero 'habiendo sabido' suena algo forzado; 'habiendo sabido por los que habían regresado de la desposesión...' además produce una cadena pesada y poco natural. 'Desposesión' es posible, pero en este contexto territorial resulta menos idiático que 'incautación' o 'apoderamiento'. 'Avanzó' introduce un matiz militar más fuerte que el griego ἐξώρμησεν y que el inglés auditado; 'partió' o 'salió' es más fiel y natural.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La transliteración de nombres propios es aceptable. La nota lexical sobre οἱ περὶ Ἀντίοχον debe conservarse, pero con el marcador en la frase correcta dentro del texto.
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'Filopátor' en vez de en la frase correspondiente a οἱ περὶ Ἀντίοχον.
    rationale: El contenido de la nota explica 'los que estaban con Antíoco'; por disciplina editorial, el marcador debe aparecer exactamente en el lugar relevante del texto.
  - severity: medium
    issue: '''que Antíoco estaba haciendo'' no reproduce bien la construcción nominal ''la ... ἀφαίρεσις por Antiochus''.'
    rationale: El griego usa un sustantivo de acción con agente explícito; la revisión inglesa auditada lo fijó como 'the seizure by Antiochus'. En español conviene mantener también una forma nominal, p. ej. 'la incautación ... por parte de Antíoco'.
  - severity: medium
    issue: '''Desposesión'' resulta poco natural en español actual para territorios.'
    rationale: Aunque semánticamente defendible, suena abstracto y menos legible; 'incautación' o 'apoderamiento' comunica mejor el acto de quitar territorios sin perder fuerza.
  - severity: low
    issue: '''Avanzó'' sobreinterpreta ἐξώρμησεν.'
    rationale: El verbo significa salir, partir, ponerse en marcha; 'avanzó' añade matiz táctico no exigido por el texto.
  revised_spanish_text: Entonces Filopátor, habiendo sabido por los que habían regresado de la incautación de las regiones bajo su dominio por parte de Antíoco, dio órdenes a todas sus fuerzas de infantería y caballería, tomó consigo a su hermana Arsinoe y partió hasta la región de Rafía, donde los que estaban con Antíoco[a] habían acampado.
  revised_footnotes:
  - marker: a
    text: El griego «los que estaban con Antíoco» es un giro idiomático para su partido o fuerzas; puede incluir al propio Antíoco.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a οἱ περὶ Ἀντίοχον. Se rehízo la frase central para reflejar mejor el sustantivo griego ἀφαίρεσις con agente expreso ('la incautación ... por parte de Antíoco') en vez de verbalizarla como una acción progresiva. Se sustituyó 'desposesión' por 'incautación' por mayor claridad y naturalidad en español, y 'avanzó' por 'partió' para ajustarse mejor a ἐξώρμησεν.
