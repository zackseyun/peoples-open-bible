translation:
  language: es
  text: 'Y le dije al ángel que hablaba conmigo[a]: «¿Qué son estos?» Y me respondió: «Estos son los cuernos que dispersaron a Judá, Israel y Jerusalén.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los poderes» o «los reinos»; el hebreo dice «cuernos», una imagen profética común de fuerza o poder gobernante.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En el contexto de una visión profética, el referente es un ser celestial intérprete; en español, «ángel» comunica mejor ese referente que «mensajero», sin perder la posibilidad léxica del hebreo.
- source_word: הַדֹּבֵר בִּי
  english_pob_choice: who was speaking with me
  chosen_spanish: que hablaba conmigo
  alternatives_spanish:
  - que estaba hablando conmigo
  - que me hablaba
  lexicon: HALOT
  rationale: La construcción participial con בְּ + sufijo señala conversación dirigida al profeta. «Hablaba conmigo» reproduce de forma natural la relación comunicativa sin añadir la idea de interioridad que no exige el contexto.
- source_word: מָה אֵלֶּה
  english_pob_choice: What are these?
  chosen_spanish: ¿Qué son estas?
  alternatives_spanish:
  - ¿Qué son estas cosas?
  lexicon: HALOT
  rationale: El interrogativo con demostrativo plural se expresa de manera directa en español. Se evita añadir «cosas» porque el hebreo no lo explicita.
- source_word: הַקְּרָנוֹת
  english_pob_choice: the horns
  chosen_spanish: los cuernos
  alternatives_spanish:
  - los cuernos simbólicos
  - los poderes
  lexicon: HALOT
  rationale: Se conserva la imagen literal del texto profético. En español, «cuernos» mantiene la figura de fuerza o poder sin sustituirla por su interpretación.
- source_word: זֵרוּ
  english_pob_choice: scattered
  chosen_spanish: dispersaron
  alternatives_spanish:
  - esparcieron
  - desperdigaron
  lexicon: HALOT
  rationale: El verbo hebreo admite la idea de dispersar o esparcir. «Dispersaron» es claro y natural en español, y conserva el sentido de desmembrar o repartir por la fuerza a los pueblos mencionados.
- source_word: יְהוּדָה ... יִשְׂרָאֵל ... וִירוּשָׁלָם
  english_pob_choice: Judah, Israel, and Jerusalem
  chosen_spanish: Judá, Israel y Jerusalén
  lexicon: HALOT
  rationale: Se mantienen los nombres propios en su forma usual en español bíblico, sin traducirlos, conforme al valor onomástico del hebreo.
theological_decisions:
- issue: Imagen simbólica de los cuernos
  english_pob_reading: Retain the literal image 'horns' in the main text without explicating the symbolism.
  chosen_spanish_reading: Mantener «cuernos» en el texto principal sin explicarlos como «poderes» o «reinos».
  alternative_spanish_readings:
  - poderes
  - reinos
  rationale: El texto hebreo nombra el símbolo directamente y la traducción no debe reemplazar la imagen por su interpretación. Se conserva así la tensión profética entre el objeto visto y su significado.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: El texto base y el control cruzado presentan alta concordancia y no requieren revisiones sustantivas; se mantiene la decisión inglesa de conservar la imagen literal de «horns/cuernos» y la equivalencia idiomática de la pregunta y del verbo de dispersión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el registro bíblico sobrio y natural, evitando calcos como «hablando en mí» o glosas interpretativas dentro del cuerpo del versículo.
  - Se emplea «Judá» y «Jerusalén» como nombres propios estandarizados en español bíblico.
  - La nota al pie marca la alternativa semántica documentada sin desplazar la imagen principal del texto.
