  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los nombres «Caleb», «Hebrón» y «Anac» están bien. La elección «expulsó» para וַיּוֹרֶשׁ concuerda con la decisión auditada en inglés. La nota sobre «hijos de Anac» preserva correctamente la alternativa «descendientes»/«anakitas».
