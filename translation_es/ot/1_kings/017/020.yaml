    text: 'O también: «has hecho mal a la viuda»; el verbo hebreo puede significar causar daño, traer calamidad o tratar mal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con quien estoy de paso»; el hebreo sugiere residir como huésped o dependiente.'
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan a los términos que explican, se mejoró la naturalidad de מִתְגּוֹרֵר con «me estoy hospedando», y se ajustó la puntuación del vocativo para un español correcto y fluido sin perder el tono solemne.
