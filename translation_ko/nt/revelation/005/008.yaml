translation:
  language: ko
  text: '그분께서 두루마리를 받으시자, 네 생물과 스물네 장로가 어린 양 앞에 엎드렸습니다. 그들은 각각 수금을 잡고 향이 가득한 금 대접[a]을 들고 있었으니, 그것은 성도들의 기도입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「수금」 대신 「리라」. 또 「성도들」 대신 「거룩한 자들」.'
