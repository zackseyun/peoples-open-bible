theological_decisions:
- issue: Reference to Beliar as personal evil power
  chosen_reading: Translate as 'one of the spirits of Beliar' and retain the proper name.
  alternative_readings:
  - one of the evil spirits
  - one of Belial's spirits
  rationale: The Greek explicitly names Beliar/Belial. The translation preserves the testament's demonological framework rather than reducing it to an impersonal evil impulse.
  doctrine_reference: Preserve source-text theological tension and specificity rather than smoothing.
- issue: Divine restraint in Dan's failed intent against Joseph
  chosen_reading: Render God's action as not giving Joseph into Dan's hands.
  alternative_readings:
  - did not allow him to fall into my hands
  - did not cast him into my hands
  rationale: This keeps both divine sovereignty and Dan's culpability in view, matching the Greek's moral logic.
  doctrine_reference: Preserve theological tension rather than resolve it.
