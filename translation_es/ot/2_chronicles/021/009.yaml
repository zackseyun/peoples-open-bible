    reason: lexical_alternative
  revision_rationale: Se ajusta 'pasó' a 'cruzó' para reflejar mejor וַיַּעֲבֹר / 'crossed over'; se cambia 'atacó' por 'hirió' para seguir de cerca נכה / 'struck' sin sobreinterpretar el resultado; y se reemplaza la nota al pie para alinearla con la alternativa léxica realmente documentada en el audit trail para שָׂרֵי הָרָכֶב. También se suaviza 'que tenía con él' a 'que estaban con él', más natural para 'todos los carros con él'.
