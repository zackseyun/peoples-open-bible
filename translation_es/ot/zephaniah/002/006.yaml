translation:
  language: es
  text: Y la costa se convertirá en pastos[a], con refugios para los pastores y cercados para los rebaños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la región costera será praderas, con cisternas para los pastores y rediles para los rebaños».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: shall become
  chosen_spanish: se convertirá
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: HALOT
  rationale: En contexto profético, la forma verbal expresa un cambio de estado futuro; «se convertirá» conserva ese valor dinámico mejor que un simple «será».
- source_word: חֶבֶל הַיָּם
  english_pob_choice: the seacoast
  chosen_spanish: el litoral del mar
  alternatives_spanish:
  - la costa del mar
  - la franja del mar
  - la región del mar
  lexicon: HALOT
  rationale: חֶבֶל designa una franja o región; unido a הַיָּם, el sentido geográfico es una zona costera. «Litoral del mar» conserva la referencia territorial sin sonar mecánico.
- source_word: נְוֺת
  english_pob_choice: pastures
  chosen_spanish: pastizales
  alternatives_spanish:
  - pastos
  - praderas
  - lugares de pasto
  lexicon: HALOT
  rationale: El término puede abarcar lugares de pastoreo o de habitación, y en este contexto pastoral la imagen principal es de terreno apto para el pasto. «Pastizales» mantiene la fuerza rural sin excluir del todo la idea de espacio habitado, que aparece en la nota alternativa.
- source_word: רֹעִים
  english_pob_choice: shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los pastores de ovejas
  - los ganaderos
  lexicon: HALOT
  rationale: El participio/nombre denota a quienes apacientan rebaños. «Pastores» es el equivalente natural en español y conserva la imagen pastoral.
- source_word: וְגִדְרֹת
  english_pob_choice: and enclosures
  chosen_spanish: cercados
  alternatives_spanish:
  - corrales
  - rediles
  - recintos
  lexicon: HALOT
  rationale: גִדְרֹת alude a espacios cercados o delimitados para animales. «Cercados» es amplio y fiel, y encaja con la imagen de rebaños.
- source_word: צֹאן
  english_pob_choice: for flocks
  chosen_spanish: para los rebaños
  alternatives_spanish:
  - para las ovejas
  - para el ganado menor
  lexicon: HALOT
  rationale: צֹאן denota ovejas y cabras en conjunto. «Rebaños» preserva el valor colectivo sin especificar una sola especie.
- source_word: כְרֹת
  english_pob_choice: shelters
  chosen_spanish: refugios
  alternatives_spanish:
  - cabañas
  - albergues
  - moradas
  lexicon: HALOT
  rationale: La tradición textual y la revisión inglesa muestran que la lectura pastoral preferida no es «pozos» sino una idea de resguardo o habitación. «Refugios» permite mantener esa solución sin fijar indebidamente el tipo de construcción.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la solución previa de «wells»/«pozos» para reflejar mejor נְוֺת como idea de lugares de estancia o resguardo; por eso la versión española sigue la línea revisada con «refugios» y mantiene la imagen pastoral coherente con pastizales y rebaños.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o fórmulas de tradición litúrgica porque el versículo no contiene el tetragrámaton.
  - 'Se prefirió un léxico pastoral uniforme: litoral / pastizales / pastores / cercados / rebaños.'
  - La nota conserva la alternativa geográfica y léxica principal sin introducir un término no sustentado por el hebreo.
