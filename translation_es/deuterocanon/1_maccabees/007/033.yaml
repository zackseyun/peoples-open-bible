    text: Or 'from the holy place.' The Greek phrase can denote the sanctuary or holy precinct more specifically.
    reason: lexical_alternative
  - marker: b
    text: 'The repeated ''from'' likely has a partitive sense: representatives came out from among the priests and elders, not necessarily every priest and elder.'
    reason: lexical_alternative
