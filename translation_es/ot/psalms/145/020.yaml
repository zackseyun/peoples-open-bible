translation:
  language: es
  text: Yahvé preserva a todos los que lo aman[a], pero a todos los perversos los destruirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y a todos los perversos»; la conjunción hebrea es simplemente «y», pero aquí funciona de manera contrastiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹמֵר
  english_pob_choice: preserves
  chosen_spanish: preserva
  alternatives_spanish:
  - guarda
  - cuida
  - vigila
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción continua de guardar/proteger. «Preserva» comunica bien la idea de conservación y protección activa en español, con un tono natural y acorde con el paralelismo del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino como «Yahvé», en línea con la decisión doctrinal del proyecto de no sustituir el Tetragrámaton por un título. «Jehová» y «el SEÑOR» se evitan por no corresponder al criterio fuente-deliberado del POB.
- source_word: אֶת כָּל אֹהֲבָיו
  english_pob_choice: all who love him
  chosen_spanish: a todos los que lo aman
  alternatives_spanish:
  - a todos sus amantes
  - a todos sus amados
  lexicon: HALOT
  rationale: El participio con sufijo indica «los que lo aman / los que aman a Yahvé». En español, la construcción relativa es la forma más natural y fiel; «sus amantes» puede sonar ambiguo o inadecuado, y «sus amados» cambia el sentido.
- source_word: וְאֵת כָּל הָרְשָׁעִים
  english_pob_choice: but all the wicked
  chosen_spanish: pero a todos los perversos
  alternatives_spanish:
  - y a todos los malvados
  - y a todos los perversos
  lexicon: HALOT
  rationale: La conjunción hebrea es formalmente «y», pero el contexto es claramente antitético; por eso «pero» refleja mejor la relación entre preservación y destrucción. «Perversos» comunica bien el término hebreo רְשָׁעִים, manteniendo el contraste moral sin suavizarlo.
- source_word: יַשְׁמִיד
  english_pob_choice: he will destroy
  chosen_spanish: los destruirá
  alternatives_spanish:
  - los exterminará
  - los arrasará
  lexicon: HALOT
  rationale: El hiphil de שׁמד expresa causar destrucción. «Destruirá» conserva la fuerza del verbo sin añadir una intensidad o modalidad más específica que la que exige el hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva como nombre propio «Yahvé», evitando la sustitución por un título y manteniendo la decisión teológica y traductológica del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor adversativo de la conjunción antes de la segunda cláusula
  english_pob_reading: but all the wicked
  chosen_spanish_reading: pero a todos los perversos
  alternative_spanish_readings:
  - y a todos los perversos
  rationale: Aunque la conjunción hebrea es literalmente «y», la relación semántica entre ambas mitades del verso es de contraste. «Pero» preserva la antítesis poética sin introducir contenido doctrinal nuevo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios en el último pase y el control cruzado informó acuerdo alto, por lo que no se requieren ajustes adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se mantiene el contraste poético con «pero» para reflejar la relación semántica del hebreo.
  - «Preserva» y «destruirá» conservan el paralelismo verbal del versículo sin exagerar ni debilitar la fuerza del original.
  - La nota textual marca la alternativa literal de la conjunción hebrea para dejar auditable la decisión adversativa.
