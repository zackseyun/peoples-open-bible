revisions:
- from: Así distinguirán entre el animal limpio y el impuro, y entre el ave impura y la limpia; y no se volverán detestables[a] por el animal, ni por el ave, ni por todo lo que se arrastra sobre la tierra[b], que yo he apartado para ustedes como impuro.
  to: Así distinguirán entre el animal limpio y el impuro, y entre el ave impura y la limpia; y no se hagan detestables ustedes mismos[a] por el animal, ni por el ave, ni por todo lo que se arrastra sobre la tierra, que yo he apartado para ustedes como impuro[b].
  rationale: Se corrigió el anclaje de la nota sobre נַפְשֹׁתֵיכֶם colocándola junto a 'ustedes mismos', que representa explícitamente el modismo hebreo. También se ajustó 'no se volverán detestables' a 'no se hagan detestables' para una sintaxis española más natural y una mejor correspondencia con el valor reflexivo factitivo de שׁקץ. Se mantuvo 'impuro' para טמא y el resto de la terminología levítica establecida.
