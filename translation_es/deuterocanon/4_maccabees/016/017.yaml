translation:
  language: es
  text: de buena voluntad por la ley ancestral. Porque es vergonzoso que este anciano soporte los dolores que vienen por la devoción a Dios[a], pero ustedes—[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la piedad». El griego εὐσέβεια puede denotar reverencia o devoción fiel hacia Dios.
    reason: lexical_alternative
  - marker: b
    text: La oración se interrumpe en este versículo y continúa en el siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: προθύμως
  english_pob_choice: willingly
  chosen_spanish: de buena voluntad
  alternatives_spanish:
  - voluntariamente
  - con disposición
  - con gusto
  lexicon: LSJ
  rationale: El adverbio expresa prontitud y disposición interior. «De buena voluntad» comunica esa entrega libre y natural en español, sin añadir una intensidad emocional que el griego no exige.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - en favor de
  - por causa de
  lexicon: BDAG
  rationale: Con genitivo, aquí puede expresar causa o propósito. «Por» conserva brevedad y permite leer el valor causal/purpose sin forzar una paráfrasis.
- source_word: τοῦ πατρίου νόμου
  english_pob_choice: the ancestral law
  chosen_spanish: la ley ancestral
  alternatives_spanish:
  - la ley de nuestros padres
  - la ley heredada de los antepasados
  - la ley patrimonial
  lexicon: LSJ
  rationale: πατρίος remite a lo heredado de los padres/antepasados. «Ley ancestral» mantiene el sentido tradicional-covenantal y suena natural en español bíblico contemporáneo.
- source_word: αἰσχρόν
  english_pob_choice: shameful
  chosen_spanish: vergonzoso
  alternatives_spanish:
  - deshonroso
  - despreciable
  - afrentoso
  lexicon: LSJ
  rationale: El término señala vergüenza moral o deshonra. «Vergonzoso» reproduce bien el juicio ético directo del pasaje.
- source_word: γέροντα
  english_pob_choice: old man
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - hombre mayor
  - decrépito
  lexicon: LSJ
  rationale: El contexto retórico contrasta la edad del hombre con los oyentes más jóvenes. «Anciano» es digno y claro en español, sin perder la referencia a la vejez.
- source_word: ὑπομεῖναι
  english_pob_choice: should endure
  chosen_spanish: soporte
  alternatives_spanish:
  - endurezca
  - tolere
  - aguante
  lexicon: BDAG
  rationale: La construcción expresa que ese anciano permanezca bajo el sufrimiento. «Soporte» encaja bien en la subordinada de juicio y transmite la idea de resistir bajo presión.
- source_word: ἀλγηδόνας
  english_pob_choice: the pains
  chosen_spanish: los dolores
  alternatives_spanish:
  - los sufrimientos
  - las agonías
  - las penas
  lexicon: LSJ
  rationale: El sustantivo denota dolores o sufrimientos concretos. «Dolores» es directo y suficientemente cercano al griego sin exagerar con «tormentos».
- source_word: διὰ τὴν εὐσέβειαν
  english_pob_choice: because of godliness
  chosen_spanish: por la piedad
  alternatives_spanish:
  - por la devoción
  - a causa de la piedad
  - por la reverencia a Dios
  lexicon: BDAG
  rationale: En esta literatura, εὐσέβεια indica reverencia fiel hacia Dios. Aunque «piedad» puede sonar más tradicional, aquí conserva mejor el matiz lexical que «godliness» y permite sostener la tensión devocional del contexto martirial.
theological_decisions:
- issue: εὐσέβεια en contexto de martirio y fidelidad a Dios
  english_pob_reading: because of godliness
  chosen_spanish_reading: por la piedad
  alternative_spanish_readings:
  - por la devoción
  - por la reverencia a Dios
  - por la fidelidad a Dios
  rationale: La palabra apunta a devoción reverente expresada en obediencia al Dios de Israel. «Piedad» preserva el campo semántico clásico de εὐσέβεια y deja abierta la referencia a la fidelidad concreta a Dios y a su ley.
  doctrine_reference: Translation philosophy §6; consistencia terminológica del léxico devocional
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan de manera alta; la redacción española sigue de cerca la sintaxis exhortativa, conserva la tensión léxica de πατρίος y εὐσέβεια, y mantiene la frase final incompleta para reflejar la continuidad al versículo siguiente.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo exigiera; este versículo no contiene el nombre divino explícito.
  - «Ley ancestral» se usa aquí para πατρίος νόμος, en continuidad con el valor de tradición heredada documentado en el audit trail.
  - «Piedad» se conserva para εὐσέβεια por su amplitud semántica en literatura judeo-helenística, sin cerrar el sentido a mero formalismo religioso.
