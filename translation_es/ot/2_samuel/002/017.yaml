  glossary_alignment: No hay conflictos relevantes con la terminología del proyecto. 'Siervos de David' es una excepción contextual razonable frente al valor por defecto de עבד como 'esclavo', porque aquí se trata de un séquito/fuerza al servicio de David en un contexto político-militar y así lo documenta el audit trail. 'Delante de' es aceptable, aunque 'ante' sería algo más idiomático; no exige adjudicación.
