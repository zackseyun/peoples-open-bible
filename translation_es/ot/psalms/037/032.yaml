translation:
  language: es
  text: El malvado vigila al justo y busca darle muerte[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «está al acecho del justo». El verbo hebreo puede tener en este contexto el matiz hostil de vigilar con intención dañina.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «matarlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: צוֹפֶה
  english_pob_choice: watches
  chosen_spanish: vigila
  alternatives_spanish:
  - observa
  - acecha
  - está al acecho de
  lexicon: HALOT
  rationale: El participio expresa vigilancia, pero en este contexto hostil el español 'vigila' comunica observación intencional con matiz adversario sin endurecerse tanto como 'acecha'. Mantiene el valor básico del verbo y deja que el contexto aporte la amenaza.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el malo
  - el perverso
  lexicon: HALOT
  rationale: '''El malvado'' conserva el uso sustantivado del singular hebreo y funciona con naturalidad en español. ''El impío'' es posible, pero suena más marcado teológicamente; ''el malo'' es menos preciso.'
- source_word: לַצַּדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al justo hombre
  - a la persona justa
  lexicon: HALOT
  rationale: '''Justo'' es el equivalente más natural y fiel para צַדִּיק en este paralelismo ético. En español, la forma sustantivada ''al justo'' preserva la categoría moral sin añadir palabras innecesarias.'
- source_word: וּמְבַקֵּשׁ
  english_pob_choice: and seeks
  chosen_spanish: y busca
  alternatives_spanish:
  - y procura
  - y pretende
  - y trata de
  lexicon: HALOT
  rationale: '''Busca'' reproduce con concisión la idea de buscar o intentar algo. En combinación con el infinitivo siguiente, comunica intención hostil sin sobreinterpretar el verbo.'
- source_word: לַהֲמִיתוֹ
  english_pob_choice: to put him to death
  chosen_spanish: darle muerte
  alternatives_spanish:
  - matarlo
  - quitarle la vida
  - hacerlo morir
  lexicon: HALOT
  rationale: '''Darle muerte'' conserva con dignidad el valor causativo del hebreo (''hacer morir'') y evita aplanarlo demasiado. ''Matarlo'' sería más directo, pero pierde algo de la gravedad formal del original.'
translation_notes:
  revision_awareness: 'Coincide plenamente con el audit trail inglés: el verbo principal se mantiene en un rango semántico de vigilancia hostil, el sustantivo ético singular se preserva, y la segunda cláusula conserva el sentido causativo de ‘poner a muerte’ con una alternativa más directa en nota.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo breve y directo propio de la poesía hebrea.
  - Se evitó usar 'SEÑOR' u otro sustituto porque no aparece el Tetragrámaton en este versículo.
  - '''El justo'' y ''el malvado'' conservan el contraste moral del texto sin añadir determinaciones interpretativas.'
