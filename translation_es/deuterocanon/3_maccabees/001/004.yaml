  to: Y cuando la batalla se había vuelto encarnizada y los asuntos se inclinaban aún más en favor de Antíoco, Arsinoe iba entre las tropas y las exhortaba insistentemente, con compasión y lágrimas, con el cabello suelto, a ayudarse ellos mismos y a sus hijos y a sus mujeres valerosamente, prometiendo dar a cada uno dos minas[a] de oro si vencían.
