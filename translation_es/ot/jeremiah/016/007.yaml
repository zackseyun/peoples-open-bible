review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: ausencia de comida ritual de duelo y de la copa de consuelo para los enlutados. Sin embargo, dos puntos requieren ajuste: (1) el anclaje de la nota [b] está puesto en «el muerto», pero en el rastro inglés la nota cultural corresponde a «la copa de consolación»; (2) «en luto» suena menos natural que «en duelo» en español eclesial general, aunque ambos son posibles.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «partirá pan» resulta algo poco idiomático sin artículo; «partirá el pan con ellos» o «compartirá alimento con ellos» suena más natural. También conviene evitar una nota [b] que explique «el muerto» cuando la nota auditada trata de la costumbre de la copa de consolación.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Consolación» es aceptable y coherente con el hebreo תַּנְחוּמִים. La mejoría propuesta es estilística y de fidelidad al aparato de notas del POB, no de glosario teológico.
  issues:
  - severity: medium
    issue: La nota [b] está anclada al segmento equivocado.
    rationale: La nota inglesa documenta el trasfondo cultural de «the cup of consolation», no una alternativa léxica para «the dead». En español debe conservarse ese mismo foco o eliminarse.
  - severity: medium
    issue: «En luto» es menos natural que «en duelo».
    rationale: Aunque comprensible, «en duelo» es la expresión más idiomática y ampliamente legible para el contexto funerario en español neutral.
  - severity: low
    issue: «Les partirá pan» suena algo rígido en español.
    rationale: La imagen hebrea de ‘partir’ puede conservarse mejor con «partirá el pan con ellos», que además refleja la idea de comida compartida indicada por el contexto y la nota del POB.
  revised_spanish_text: Nadie partirá el pan con ellos en duelo[a], para consolarlos por el muerto, ni nadie les dará a beber la copa de consolación[b] por su padre o por su madre.
  revised_footnotes:
  - marker: a
    text: O «compartirá alimento con ellos en duelo». El verbo hebreo significa literalmente «partir/dividir» y probablemente se refiere a la comida acostumbrada de duelo.
    reason: lexical_alternative
  - marker: b
    text: «La copa de consolación» probablemente se refiere a una bebida acostumbrada que se ofrecía para consolar a los enlutados después de una muerte.
    reason: cultural_note
