lexical_decisions:
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Farón
  lexicon: HALOT
  rationale: En español, el nombre/título regnal se conserva como nombre propio tradicional y reconocido, equivalente funcional de la transliteración inglesa 'Pharaoh'.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: king of Egypt
  chosen_spanish: rey de Egipto
  alternatives_spanish:
  - el rey de Egipto
  lexicon: HALOT
  rationale: La cadena constructa identifica el oficio real de Faraón; 'rey de Egipto' es la equivalencia natural y precisa en español en una lista appositiva.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede abarcar 'siervo', 'esclavo' o 'servidor', aquí el contexto es una lista cortesana y administrativa. 'Siervos' conserva la relación de subordinación sin forzar la imagen de esclavitud chattel, como en la opción inglesa.
- source_word: שָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus jefes
  - sus gobernantes
  lexicon: HALOT
  rationale: שַׂר designa gobernantes, jefes, oficiales o príncipes. 'Oficiales' comunica bien la función político-administrativa en español moderno sin restringir indebidamente el rango.
- source_word: כָּל עַמּוֹ
  english_pob_choice: all his people
  chosen_spanish: todo su pueblo
  alternatives_spanish:
  - todo su gente
  - toda su nación
  lexicon: HALOT
  rationale: עַם expresa el colectivo nacional. 'Todo su pueblo' reproduce la totalidad marcada por כָּל y mantiene el tono bíblico natural en español.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  english_pob_choice: simple English coordination in a list
  chosen_spanish: coordinación simple de la lista
  alternatives_spanish:
  - repetición más mecánica de 'y' antes de cada elemento
  lexicon: gramática del español
  rationale: El marcador de objeto directo no se traduce; en español la lista se expresa con sintaxis coordinada fluida, sin perder el carácter enumerativo del hebreo.
translation_notes:
  revision_awareness: El texto base inglés y la revisión más reciente muestran acuerdo alto y no registran cambios. El español sigue ese mismo contenido sin introducir variantes textuales ni tensiones adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Faraón' como nombre/título tradicional reconocible en español.
  - Se evita 'SEÑOR' u otra máscara, pues el versículo no contiene el nombre divino.
  - '''Siervos'' se usa en sentido cortesano/administrativo, coherente con la lista de corte del contexto inmediato.'
  - La puntuación final con punto y coma refleja la clausura de una enumeración que continúa en el versículo siguiente.
