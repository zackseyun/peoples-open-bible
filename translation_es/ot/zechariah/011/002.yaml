    reason: lexical_alternative
  - marker: b
    text: O «los poderosos» o «los nobles».
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea final también puede entenderse como «el bosque inaccesible» o «el bosque fortificado».
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota léxica para que quede anclada en «ciprés[a]», que es donde corresponde la alternativa «abeto». Se mejora la naturalidad del español con «Lamenten» en la segunda exhortación y con «ha venido abajo» para reflejar יָרַד de forma idiomática sin perder la imagen de colapso. Se recomienda «robles de Basán» por mayor alcance panhispánico y reconocimiento bíblico, manteniendo intacta la metáfora y las alternativas documentadas.
