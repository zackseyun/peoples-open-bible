    changes_summary: Changed 'the cattle' to 'the ox' for closer lexical accuracy to singular בָּקָר in this comparison, and revised the final clause from 'will not do evil or destroy on all my holy mountain' to 'will do no evil or destruction in all my holy mountain' to better reflect the paired verbs and the preposition.
translation:
  language: es
  text: El lobo y el cordero[a] pastarán juntos, y el león comerá paja como el buey; y el polvo será el alimento de la serpiente[c]. No harán mal[d] ni causarán destrucción en todo mi santo monte, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cabrito'; el hebreo טָלֶה puede referirse más ampliamente a una cría de ganado menor.
    reason: lexical_alternative
  - marker: c
    text: La imagen del polvo como alimento de la serpiente probablemente evoca Génesis 3:14, pero el texto aquí no lo explicita.
    reason: cross_reference
  - marker: d
    text: O 'no dañarán'; el primer verbo hebreo también puede enfatizar la acción de causar daño, además de hacer mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְאֵב
  english_pob_choice: wolf
  chosen_spanish: lobo
  alternatives_spanish:
  - lobo gris
  lexicon: HALOT
  rationale: Es el nombre normal del animal y conserva la imagen de depredador frente al cordero.
- source_word: טָלֶה
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - cabrito joven
  - oveja joven
  lexicon: HALOT
  rationale: Aunque el hebreo puede referirse de modo más amplio a una cría de ganado menor, en esta antítesis con el lobo y en un oráculo de paz, 'cordero' es la equivalencia más natural y comprensible en español.
- source_word: יִרְעוּ כְאֶחָד
  english_pob_choice: will graze together
  chosen_spanish: pastarán juntos
  alternatives_spanish:
  - pacerán juntos
  - apacentarán juntos
  lexicon: HALOT
  rationale: '''Pastorear/graze'' expresa el verbo רעה en sentido animal. ''Juntos'' reproduce כְאֶחָד con naturalidad en español.'
- source_word: אַרְיֵה
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - leona
  lexicon: HALOT
  rationale: Término animal estándar, sin presión contextual para variar.
- source_word: כַּבָּקָר
  english_pob_choice: like the ox
  chosen_spanish: como el buey
  alternatives_spanish:
  - como el ganado
  - como un buey
  lexicon: HALOT
  rationale: בָּקָר es un término colectivo para ganado vacuno, pero en esta comparación singular funciona bien 'buey' en español y refleja la elección revisada del audit trail inglés. 'Ganado' suena más genérico y pierde la concreción de la imagen.
- source_word: יֹאכַל תֶּבֶן
  english_pob_choice: will eat straw
  chosen_spanish: comerá paja
  alternatives_spanish:
  - comerá heno
  - comerá forraje
  lexicon: HALOT
  rationale: תבן es 'paja' de manera directa y mantiene la inversión del comportamiento predatorio.
- source_word: וְנָחָשׁ עָפָר לַחְמוֹ
  english_pob_choice: dust will be the serpent’s food
  chosen_spanish: el polvo será el alimento de la serpiente
  alternatives_spanish:
  - el polvo será su comida
  - la serpiente comerá polvo
  lexicon: HALOT
  rationale: '''Serpiente'' preserva el registro literario y la posible resonancia con Génesis 3. ''Alimento'' traduce לַחְמוֹ con un sustantivo natural en español sin forzar ''pan'' en un contexto figurado.'
- source_word: לֹא יָרֵעוּ
  english_pob_choice: will do no evil
  chosen_spanish: no harán mal
  alternatives_spanish:
  - no dañarán
  - no cometerán mal
  lexicon: HALOT
  rationale: El verbo puede expresar causar mal o daño. 'No harán mal' preserva el campo semántico moral y relacional sin cerrar la tensión entre 'hacer mal' y 'dañar'.
- source_word: וְלֹא יַשְׁחִיתוּ
  english_pob_choice: or destroy
  chosen_spanish: ni destruirán
  alternatives_spanish:
  - ni dañarán
  - ni arruinarán
  lexicon: HALOT
  rationale: שׁחת expresa destrucción/ruina; 'destruirán' es directo y mantiene el paralelo con el verbo anterior.
- source_word: בְּכָל הַר קָדְשִׁי
  english_pob_choice: in all my holy mountain
  chosen_spanish: en todo mi santo monte
  alternatives_spanish:
  - sobre todo mi santo monte
  - en mi santo monte
  lexicon: HALOT
  rationale: '''Santo monte'' conserva el lenguaje profético y bíblico. ''En todo'' reproduce la extensión total del hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el tetragrámaton, usando la forma española 'Yahvé' en vez de la sustitución tradicional 'SEÑOR'.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - ha dicho Yahvé
  - dijo Yahvé
  lexicon: HALOT
  rationale: 'La fórmula profética en español suena natural en presente: ''dice Yahvé''. Mantiene el valor de declaración autorizada.'
theological_decisions:
- issue: Posible eco de Génesis 3 en la frase sobre la serpiente
  english_pob_reading: Retain 'serpent' and 'dust will be the serpent’s food' to preserve the likely Edenic echo without making the allusion explicit in the main text.
  chosen_spanish_reading: Conservar 'serpiente' y 'el polvo será el alimento de la serpiente' para mantener el eco probable de Génesis 3 sin explicitarlo en el cuerpo del texto.
  alternative_spanish_readings:
  - la culebra
  - el polvo será su comida
  rationale: La imagen bíblica parece remitir a Génesis 3:14, pero el versículo solo afirma que el polvo será su alimento. La traducción conserva esa tensión intertextual sin convertirla en comentario.
  doctrine_reference: Preservar la tensión teológica e intertextual sin resolverla en paráfrasis.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión del audit trail inglés, que corrigió la comparación animal final hacia 'ox/buey' y ajustó la cláusula final para reflejar mejor la doble negación hebrea y la preposición. La redacción española adopta ese estado revisado, manteniendo el tono poético-profético y la tensión intertextual de la serpiente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustitución tipográfica del tetragrámaton.
  - '''Serpiente'' se mantiene por registro literario y por posible eco de Génesis.'
  - '''No harán mal ni destruirán'' preserva el paralelismo verbal del hebreo.'
  - '''Santo monte'' conserva el idiomático profético sin endurecerlo a una glosa interpretativa.'
