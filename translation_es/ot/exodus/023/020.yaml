  to: He aquí,[a] yo envío un ángel delante de ti, para guardarte en el camino y para llevarte al lugar que he preparado.
  rationale: Se reemplaza «¡Mira!» por «He aquí» para reflejar mejor la fuerza deíctica y la solemnidad de הִנֵּה en este contexto. Se mantiene el resto del texto porque es fiel al hebreo, natural en español y coherente con las decisiones léxicas y teológicas auditadas. La nota [a] permanece anclada tras la fórmula introductoria, como en el inglés POB, ya que documenta la alternativa léxica principal del versículo.
