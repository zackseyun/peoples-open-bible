translation:
  language: es
  text: No entregues tu alma a una mujer[a][b], para dejarla pisar tus alturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «No entregues tu alma a una mujer, para que ella pise tu fuerza». Este testimonio aclara la metáfora como una advertencia contra ceder la propia fortaleza o posición.'
    reason: alternative_reading
  - marker: b
    text: «Tus alturas» puede ser una expresión figurada para la posición, dignidad o fuerza de una persona; el hebreo conserva esa imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תַּקְנֶא / μὴ δῷς
  english_pob_choice: Do not give
  chosen_spanish: No entregues
  alternatives_spanish:
  - No des
  - No te entregues
  - No entregues tu vida
  lexicon: HALOT; LXX μὴ δῷς
  rationale: El testimonio griego respalda el sentido de no ceder o entregar; en español, 'entregues' comunica esa acción con naturalidad y mantiene el tono proverbial sin volverlo interpretativo en exceso.
- source_word: נַפְשְׁךָ / ψυχήν σου
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu ser
  - tu vida
  - ti mismo
  lexicon: HALOT; ψυχή
  rationale: '''Alma'' preserva la correspondencia literal con el griego ψυχή y con el valor hebreo de נֶפֶשׁ como vida / ser interior. En este dicho sapiencial, la expresión puede abarcar a la persona completa.'
- source_word: לְאִשָּׁה / γυναικί
  english_pob_choice: to a woman
  chosen_spanish: a una mujer
  alternatives_spanish:
  - a una esposa
  - a una mujer casada
  lexicon: HALOT; γυναικί
  rationale: El hebreo y el griego usan el término común sin marcar 'esposa'; por eso se conserva el sentido amplio con 'mujer'.
- source_word: לְהַדְרִיכָהּ / ἐπιβῆναι αὐτὴν
  english_pob_choice: to let her tread
  chosen_spanish: para que ella no pise
  alternatives_spanish:
  - para dejarla pisar
  - para que ella no pase sobre
  - para que ella no se imponga sobre
  lexicon: HALOT; ἐπιβῆναι
  rationale: La imagen concreta de 'pisar' sigue la metáfora del griego y evita abstraerla a 'dominar' o 'gobernar', algo que el texto no dice de forma explícita.
- source_word: עַל בָּמוֹתֶיךָ / ἐπὶ τὴν ἰσχύν σου
  english_pob_choice: on your heights
  chosen_spanish: tus alturas
  alternatives_spanish:
  - tus altos lugares
  - tu fortaleza
  - tu poder
  lexicon: HALOT; ἰσχύς
  rationale: '''Alturas'' conserva la imagen hebrea de בָּמוֹתֶיךָ. En español, ''alturas'' puede sugerir posición, dignidad o fuerza; esa ambigüedad coincide con la tensión documentada entre hebreo y griego.'
theological_decisions:
- issue: Si el proverbio debe interpretarse como una afirmación doctrinal sobre la mujer o como una advertencia sapiencial figurada
  english_pob_reading: Preserve the concrete imagery ('give your soul,' 'tread on your heights') in readable English
  chosen_spanish_reading: Conservar la advertencia figurada y la imagen concreta sin convertirla en una tesis doctrinal
  alternative_spanish_readings:
  - No te sometas a una mujer, para que no domine tu vida
  - No confíes tu ser a una mujer, para que no te humille
  rationale: El pasaje es instrucción sapiencial. La traducción debe reflejar la metáfora transmitida por hebreo y griego sin ampliar el alcance hacia una generalización doctrinal sobre el sexo o el matrimonio.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés al omitir cualquier giro interpretativo equivalente a ''so as'' y mantener la infinitiva de propósito de manera directa: «para que ella no pise tus alturas».'
  spanish_consistency_notes:
  - Se mantiene 'alma' para preservar la correspondencia con ψυχή / נֶפֶשׁ, aunque el sentido pueda abarcar 'ser' o 'vida'.
  - Se conserva 'mujer' y no 'esposa', porque el source packet no marca posesión ni restricción contextual.
  - '''Alturas'' reproduce la imagen hebrea; la nota recoge la aclaración interpretativa que el griego expresa con ''fuerza''.'
  - La negación y el modo exhortativo se expresan con español bíblico moderno, evitando calcos excesivamente duros.
