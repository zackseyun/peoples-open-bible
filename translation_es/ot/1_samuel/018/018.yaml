review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB inglés en la estructura general: David responde con una pregunta retórica doble sobre su insignificancia y la modestia de su familia, culminando con «ser yerno del rey». Sin embargo, «cuál es mi vida» suena poco idiomático en español en este contexto, y «para que llegue a ser» expresa finalidad más que resultado/consecuencia. El sentido fuente se preserva mejor con una formulación española más natural que mantenga la tensión del hebreo.'
  spanish_quality_summary: 'El español es claro, pero hay dos puntos mejorables: 1) «¿cuál es mi vida?» resulta extraño y algo calcado; «¿qué es mi vida?» conserva mejor el giro literal y la idea de insignificancia en español bíblico moderno. 2) «para que llegue a ser» suena menos natural aquí que «para llegar a ser», que encaja mejor tras la pregunta retórica. El resto del verso es legible y digno.'
  glossary_alignment: No hay términos del glosario de proyecto en juego salvo nombres propios, correctamente vertidos como «David» y «Saúl». «Yerno del rey» corresponde bien a חָתָן לַמֶּלֶךְ. La nota léxica debe conservarse porque el hebreo permite la alternativa más literal y la frase puede denotar insignificancia.
  issues:
  - severity: medium
    issue: «¿cuál es mi vida?» suena poco idiomático en español
    rationale: Aunque intenta reflejar el inglés revisado «what is my life», en español la formulación más natural y fiel al giro literal es «¿qué es mi vida?». «Cuál» normalmente presupone selección o identificación entre opciones, algo que el hebreo no exige.
  - severity: medium
    issue: «para que llegue a ser» introduce un matiz de finalidad
    rationale: Tras «¿Quién soy yo...?» el hebreo כִּי אֶהְיֶה expresa el resultado o la idea prospectiva de «para llegar a ser / que yo llegue a ser», no una finalidad fuerte. «Para llegar a ser» suena más natural y ajustado.
  - severity: low
    issue: La nota al pie puede afinarse para no presentar la literalidad como alternativa separada cuando ya aparece en el texto principal revisado
    rationale: Si el texto principal usa «¿qué es mi vida?», la nota debe explicar que es una formulación más literal y que puede subrayar la insignificancia de David, en vez de parecer que contrasta con otra redacción principal distinta.
  revised_spanish_text: 'Y David dijo a Saúl[a]: «¿Quién soy yo, y qué es mi vida, o la familia de mi padre en Israel, para llegar a ser yerno del rey?»'
