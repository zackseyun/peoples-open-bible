  text: מַלְכֵ֬י תַרְשִׁ֣ישׁ וְ֭/אִיִּים מִנְחָ֣ה יָשִׁ֑יבוּ מַלְכֵ֥י שְׁבָ֥א וּ֝/סְבָ֗א אֶשְׁכָּ֥ר יַקְרִֽיבוּ׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/072/010.yaml
  text: May the kings of Tarshish and of the coastlands bring tribute[b][a]; may the kings of Sheba and Seba offer gifts.
  footnotes:
