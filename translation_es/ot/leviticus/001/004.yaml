  to: Y pondrá su mano sobre la cabeza del holocausto[a], y será aceptado a su favor, para hacer expiación por él.
  rationale: Se hizo una reparación menor para mejorar la naturalidad y precisión del español sin alterar la decisión exegética del POB. «Pondrá su mano» representa mejor el gesto ritual de סמך, y «será aceptado a su favor» expresa de modo idiomático el beneficio marcado por לוֹ mientras preserva la voz pasiva y la ambigüedad referencial documentada en la nota. La nota se retocó solo estilísticamente.
