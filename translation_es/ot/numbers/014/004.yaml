  rationale: Se corrige el verbo principal para reflejar mejor el valor narrativo puntual de וַיֹּאמְרוּ y se ajusta 'jefe' a 'líder' para una expresión más neutral y más alineada con la decisión funcional documentada para רֹאשׁ. Se mantienen las notas léxicas porque preservan las alternativas literales relevantes del hebreo.
