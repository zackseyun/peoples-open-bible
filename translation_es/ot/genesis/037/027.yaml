revisions:
- from: «Venid, vendámoslo a los ismaelitas, y no esté nuestra mano sobre él, porque es nuestro hermano, nuestra propia carne». Y sus hermanos lo escucharon[c].
  to: «Vamos, vendámoslo a los ismaelitas, y no esté nuestra mano sobre él[a], porque es nuestro hermano, nuestra propia carne[b]». Y sus hermanos escucharon[c].
  rationale: Se ajusta el español hacia un registro más neutral («Vamos»), se preservan todas las alternativas significativas documentadas en la auditoría inglesa, y se reduce una pequeña sobreinterpretación en el cierre narrativo al eliminar «lo». Se mantiene la imagen hebrea de la mano y la expresión concreta «nuestra propia carne».
