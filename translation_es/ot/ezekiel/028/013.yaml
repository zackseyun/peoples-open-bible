base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/028/013.yaml
  text: 'You were in Eden[a], the garden of God; every precious stone was your covering: ruby, topaz, and diamond; beryl, onyx, and jasper; sapphire, turquoise, and emerald; and gold. The workmanship of your tambourines and your sockets was in you; on the day you were created[b], they were prepared.'
  footnotes:
  - marker: a
    text: The precise identification of several stones in this verse is uncertain; ancient gemstone names do not always correspond exactly to modern terms. Possible alternatives include carnelian for 'ruby,' chrysolite for 'topaz' or 'beryl,' lapis lazuli for 'sapphire,' and carbuncle for 'turquoise' or 'emerald.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'The workmanship of your settings and your mountings was in you,' taking the difficult Hebrew terms as referring to jewelry craftsmanship rather than musical instruments.
    reason: alternative_reading
