translation:
  language: es
  text: En el octavo año de su reinado[a], mientras aún era joven, comenzó a buscar al Dios de David su padre; y en el duodécimo año comenzó a limpiar Judá y Jerusalén de los lugares altos, los aserim[b], las imágenes talladas y las imágenes de metal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios de David su antepasado»; «su padre» aquí refleja el lenguaje normal de ascendencia real.
    reason: lexical_alternative
  - marker: b
    text: O «los postes de Asera». El término hebreo puede referirse a símbolos cultuales asociados con Asera, a menudo postes o árboles.
    reason: lexical_alternative
  - marker: c
    text: O «imágenes fundidas» o «imágenes moldeadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׁמוֹנֶה שָׁנִים לְמָלְכוֹ
  english_pob_choice: In the eighth year of his reign
  chosen_spanish: En el octavo año de su reinado
  alternatives_spanish:
  - Cuando había reinado ocho años
  - En el octavo año de su realeza
  lexicon: HALOT
  rationale: La expresión hebrea es temporal y regnal; en español, «en el octavo año de su reinado» conserva con naturalidad ese marco cronológico sin forzar una paráfrasis.
- source_word: וְהוּא עוֹדֶנּוּ נַעַר
  english_pob_choice: while he was still a youth
  chosen_spanish: mientras aún era joven
  alternatives_spanish:
  - mientras todavía era un muchacho
  - mientras aún era un joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar «muchacho», «joven» o «jovencito»; aquí «joven» preserva la idea de edad temprana sin reducirlo a un niño pequeño. «Aún» mantiene el valor de עוֹדֶנּוּ.
- source_word: הֵחֵל לִדְרֹשׁ
  english_pob_choice: he began to seek
  chosen_spanish: comenzó a buscar
  alternatives_spanish:
  - comenzó a inquirir de
  - comenzó a buscar al
  lexicon: HALOT
  rationale: En este contexto cultual, דָּרַשׁ implica buscar devotamente a Dios. «Buscar» comunica bien esa relación religiosa en español; se completa con el complemento «al Dios de David su padre».
- source_word: לֵאלֹהֵי דָּוִיד אָבִיו
  english_pob_choice: the God of David his father
  chosen_spanish: al Dios de David su padre
  alternatives_spanish:
  - al Dios de David su antepasado
  lexicon: HALOT
  rationale: Se conserva la fórmula dinástica literal «su padre», porque el hebreo usa lenguaje de ascendencia real. La alternativa «antepasado» explicaría el sentido, pero suaviza el eco bíblico y la conexión davídica.
- source_word: וּבִשְׁתֵּים עֶשְׂרֵה שָׁנָה
  english_pob_choice: and in the twelfth year
  chosen_spanish: y en el duodécimo año
  alternatives_spanish:
  - y en su duodécimo año
  lexicon: HALOT
  rationale: La referencia temporal sigue el mismo marco de reinado establecido antes; «el duodécimo año» es la forma más natural y clara en español.
- source_word: הֵחֵל לְטַהֵר
  english_pob_choice: he began to cleanse
  chosen_spanish: comenzó a limpiar
  alternatives_spanish:
  - comenzó a purificar
  - comenzó a depurar
  lexicon: HALOT
  rationale: טהר aquí describe la remoción de contaminación cultual. «Limpiar» funciona bien en español por su concreción y por mantener la imagen de retirar impureza, sin sobrecargar el texto con un tecnicismo.
- source_word: אֶת יְהוּדָה וִירוּשָׁלַם
  english_pob_choice: Judah and Jerusalem
  chosen_spanish: Judá y Jerusalén
  lexicon: HALOT
  rationale: Se conservan los nombres propios sin mediación, como en el hebreo.
- source_word: מִן הַבָּמוֹת
  english_pob_choice: from the high places
  chosen_spanish: de los lugares altos
  alternatives_spanish:
  - de los altos lugares
  - de los sitios altos de culto
  lexicon: HALOT
  rationale: «Lugares altos» es la equivalencia establecida en español bíblico para בָּמוֹת y mantiene la referencia cultual sin explicitar más de lo que el texto dice.
- source_word: וְהָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: los aserim
  alternatives_spanish:
  - los postes de Asera
  - los objetos de Asera
  lexicon: HALOT
  rationale: Se preserva el término hebreo adaptado al español como «aserim» para no decidir prematuramente si se trata de postes, árboles o símbolos cultuales. Esto mantiene la tensión léxica documentada por el original.
- source_word: וְהַפְּסִלִים
  english_pob_choice: the carved images
  chosen_spanish: las imágenes talladas
  alternatives_spanish:
  - los ídolos tallados
  - las imágenes esculpidas
  lexicon: HALOT
  rationale: פְּסִלִים remite a imágenes labradas o talladas. «Imágenes talladas» es claro y conserva la especificidad material mejor que «ídolos».
- source_word: וְהַמַּסֵּכֹת
  english_pob_choice: the metal images
  chosen_spanish: las imágenes de metal
  alternatives_spanish:
  - las imágenes fundidas
  - las imágenes moldeadas
  lexicon: HALOT
  rationale: מַסֵּכֹת son imágenes hechas por fundición. «Imágenes de metal» es fiel y legible; deja abierta la forma precisa de fabricación, tal como el hebreo.
theological_decisions:
- issue: Lenguaje de ascendencia en «David su padre»
  english_pob_reading: Retain 'father' in the main text
  chosen_spanish_reading: Mantener «su padre» en el texto principal
  alternative_spanish_readings:
  - su antepasado
  - su ancestro
  rationale: El hebreo usa lenguaje dinástico normal. En español, «su padre» conserva el eco bíblico y la conexión con la línea davídica; una nota puede aclarar que se trata de un antepasado real, no de padre inmediato.
  doctrine_reference: POB translation philosophy §4 y §5
- issue: Terminología de los objetos cultuales
  english_pob_reading: the Asherim / carved images / metal images
  chosen_spanish_reading: Conservar la distinción entre aserim, imágenes talladas e imágenes de metal
  alternative_spanish_readings:
  - postes de Asera / ídolos / imágenes fundidas
  rationale: El texto enumera categorías distintas y el español debe mantener esa diferenciación. «Aserim» preserva la ambigüedad del hebreo; «imágenes talladas» e «imágenes de metal» siguen con fidelidad la forma material de los términos.
  doctrine_reference: POB translation philosophy §5
translation_notes:
  revision_awareness: Se siguió el último estado revisado del texto fuente y del audit trail en inglés, que no reporta cambios adicionales; la decisión española se alinea con esa lectura estable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando aparezca el nombre divino explícito; aquí el texto hebreo usa אֱלֹהֵי, por lo que corresponde «Dios».
  - 'Se conservó la secuencia temporal del versículo con dos marcadores regnales distintos: octavo año y duodécimo año.'
  - Se evitó traducir mecánicamente «Asherim» como una sola forma explicativa, porque el audit trail en inglés documenta una alternativa léxica y el hebreo deja abierta la naturaleza exacta del objeto cultual.
