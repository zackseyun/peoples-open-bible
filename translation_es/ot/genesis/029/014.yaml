translation:
  language: es
  text: 'Entonces Labán le dijo: «Ciertamente eres mi hueso y mi carne[a]». Y se quedó con él por un mes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Expresión hebrea de parentesco: «mi hueso y mi carne», es decir, de la misma sangre o un pariente cercano.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... le dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutivo avanza la acción; «entonces» conserva esa secuencia en español con naturalidad. Se usa «le dijo» para expresar el dativo pronominal del hebreo y evitar una construcción más pesada.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - De veras
  - En verdad
  lexicon: HALOT
  rationale: Aquí אַךְ es una partícula enfática, no restrictiva. «Ciertamente» transmite afirmación solemne y encaja mejor en español bíblico contemporáneo que una traducción más coloquial.
- source_word: עַצְמִי וּבְשָׂרִי
  english_pob_choice: my bone and my flesh
  chosen_spanish: mi hueso y mi carne
  alternatives_spanish:
  - mi propio hueso y mi carne
  - mi pariente
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática literal para conservar la fuerza de parentesco y la resonancia intertextual del hebreo. No se reduce a «pariente» en el texto principal porque eso aplanaría la metáfora corporal del original.
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: eres
  alternatives_spanish:
  - tú eres
  lexicon: HALOT
  rationale: El pronombre independiente en español no es necesario para la predicación y, al omitirlo, se obtiene una frase más natural sin perder el énfasis contextual que ya aporta la estructura hebrea y la partícula inicial.
- source_word: וַיֵּשֶׁב
  english_pob_choice: And he stayed
  chosen_spanish: Y se quedó
  alternatives_spanish:
  - Y permaneció
  - Y vivió
  - Y habitó
  lexicon: HALOT
  rationale: En este contexto temporal, «se quedó» comunica bien la permanencia junto a Labán durante un periodo determinado. «Permaneció» sería más formal, pero menos idiomático; «habitó» y «vivió» sugieren asentamiento más duradero.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  lexicon: HALOT
  rationale: Equivalencia directa y natural en español para la relación de compañía indicada por la preposición hebrea.
- source_word: חֹדֶשׁ יָמִים
  english_pob_choice: for a month
  chosen_spanish: por un mes
  alternatives_spanish:
  - durante un mes
  - por el espacio de un mes
  lexicon: HALOT
  rationale: La revisión inglesa optó por una forma idiomática («for a month») frente a un literalismo como «un mes de días». En español, «por un mes» conserva el valor temporal con naturalidad y fidelidad semántica.
theological_decisions:
- issue: 'Expresión idiomática de parentesco: «mi hueso y mi carne»'
  english_pob_reading: The POB preserves the Hebrew idiom in the main text and notes that it means close blood relation or kin.
  chosen_spanish_reading: Se conserva «mi hueso y mi carne» como expresión literal de parentesco cercano.
  alternative_spanish_readings:
  - «mi pariente cercano»
  - «mi familia»
  rationale: 'No hay una carga doctrinal especial, pero sí una tensión lexical importante: la imagen corporal hebrea debe permanecer visible para que el lector perciba el modo de hablar del texto. La nota explica el sentido sin borrar la metáfora.'
  doctrine_reference: Genesis 29:14; idiomática de parentesco en el hebreo bíblico
- issue: Valor temporal de חֹדֶשׁ יָמִים
  english_pob_reading: The English revision moved from a literal 'a month of days' to idiomatic 'for a month.'
  chosen_spanish_reading: Se traduce idiomáticamente «por un mes».
  alternative_spanish_readings:
  - «durante un mes»
  - «un mes de días»
  rationale: La evidencia revisada indica que la intención es temporal, no una fórmula técnica. «Por un mes» respeta el sentido y evita una construcción extraña para el lector hispanohablante.
  doctrine_reference: Genesis 29:14; revisión auditada del POB en inglés
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada desde un literalismo más pesado (''a month of days'') a una formulación idiomática (''for a month'') sin cambiar el sentido. La propuesta española sigue esa decisión: conserva la imaginería hebrea en el núcleo de parentesco y emplea una expresión temporal natural en la clausura.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» por no ser pertinente al versículo.
  - «Hueso y carne» se conserva en forma literal para preservar el hebraísmo, con nota explicativa.
  - La cláusula final se normalizó a una expresión española idiomática equivalente al ajuste del POB en inglés.
