revisions:
- from: Así pasó la ofrenda[a] delante de él, pero él mismo pasó aquella noche en el campamento.
  to: Entonces pasó el presente[a] por delante de él, pero él mismo pasó aquella noche en el campamento.
  rationale: Se reemplaza «ofrenda» por «presente» para reflejar el sentido contextual no cultual de מִנְחָה, en línea con la evidencia fuente y la auditoría inglesa. También se suaviza la apertura con «Entonces» y se usa «por delante de él» para expresar con naturalidad la idea de que iba en avance. Se conserva «pasó aquella noche en el campamento» como una formulación española idiomática y fiel para לָן בַּלַּיְלָה הַהוּא בַּמַּחֲנֶה.
