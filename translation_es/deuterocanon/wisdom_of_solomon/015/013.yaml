translation:
  language: es
  text: Pues este hombre sabe mejor que todos que está pecando[a], al hacer vasijas frágiles e imágenes talladas de materia terrosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sabe mejor que todos que peca». El griego permite variar el orden de las palabras para expresar la comparación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - él
  lexicon: LSJ
  rationale: El demostrativo se refiere al artesano/idolatra en singular. «Este hombre» hace explícito el referente y conserva el tono personal del argumento, de forma natural en español.
- source_word: παρὰ πάντας
  english_pob_choice: better than all others
  chosen_spanish: mejor que todos
  alternatives_spanish:
  - más que todos
  - por encima de todos
  lexicon: LSJ
  rationale: La construcción es comparativa; en español, «mejor que todos» comunica la idea de grado superior de conocimiento sin forzar una perífrasis poco natural.
- source_word: οἶδεν
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - está consciente
  lexicon: LSJ
  rationale: «Sabe» expresa conocimiento consciente de manera simple y directa. Mantiene la fuerza moral del pasaje.
- source_word: ὅτι ἁμαρτάνει
  english_pob_choice: that he is sinning
  chosen_spanish: que está pecando
  alternatives_spanish:
  - que peca
  - que hace mal
  lexicon: LSJ
  rationale: El presente griego expresa acción en curso; «está pecando» preserva ese aspecto progresivo y la carga ética del verbo ἁμαρτάνει.
- source_word: ὕλης γεώδους
  english_pob_choice: out of earthy material
  chosen_spanish: de materia terrosa
  alternatives_spanish:
  - de material terroso
  - de materia de la tierra
  - de barro
  lexicon: LSJ
  rationale: «Materia terrosa» conserva el sentido de sustancia física baja o terrenal sin especificar «barro», que sería más concreto de lo que permite el griego.
- source_word: εὔθραυστα σκεύη
  english_pob_choice: fragile vessels
  chosen_spanish: vasijas frágiles
  alternatives_spanish:
  - recipientes frágiles
  - vasos frágiles
  - vasijas quebradizas
  lexicon: LSJ
  rationale: «Vasijas frágiles» reproduce bien la idea de objetos de alfarería o recipientes vulnerables, con un español claro y sobrio.
- source_word: γλυπτὰ
  english_pob_choice: carved images
  chosen_spanish: figuras talladas
  alternatives_spanish:
  - imágenes talladas
  - imágenes esculpidas
  - ídolos tallados
  lexicon: LSJ
  rationale: «Figuras talladas» conserva el valor básico de algo trabajado con herramientas. Evita imponer de entrada la interpretación cultual de «ídolos», aunque el contexto la sugiera.
- source_word: δημιουργῶν
  english_pob_choice: making
  chosen_spanish: al hacer
  alternatives_spanish:
  - mientras hace
  - fabricando
  - haciendo
  lexicon: LSJ
  rationale: El participio expresa el modo de la acción; «al hacer» permite unir la fabricación de vasijas e imágenes dentro de la misma actividad culpable.
theological_decisions:
- issue: Culpabilidad consciente del fabricante de ídolos
  english_pob_reading: The verse states that the craftsman knowingly sins in manufacturing both ordinary fragile vessels and carved images.
  chosen_spanish_reading: El versículo afirma que el artesano sabe que peca mientras fabrica tanto vasijas comunes como figuras talladas.
  alternative_spanish_readings:
  - El versículo dice simplemente que sabe que peca.
  - El versículo puede leerse como que peca sin enfatizar tanto su conciencia.
  rationale: La sintaxis griega y la lectura auditada subrayan conocimiento consciente de la culpa. La versión española conserva esa tensión moral sin añadir comentario doctrinal externo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La base inglesa auditada fue revisada y no presentó cambios sustanciales en el pass más reciente; la traducción española sigue de cerca la decisión óptima-equivalente ya validada, con ajuste natural al español.
  spanish_consistency_notes:
  - Se usa «pecando» para conservar el aspecto progresivo del presente griego.
  - Se evita «graven images»/«ídolos» como opción principal para no cargar el término más allá de la evidencia lexical inmediata.
  - «Yahvé» no aplica en este versículo.
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
