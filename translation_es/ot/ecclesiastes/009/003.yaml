translation:
  language: es
  text: 'Esto es el mal en todo lo que se hace debajo del sol: que una misma suerte[a] les toca a todos. También el corazón de los hijos del hombre[b] está lleno de maldad, y la locura está en sus corazones durante sus vidas, y después[c], van a los muertos[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que el mismo acontecimiento les sucede a todos». El hebreo מִקְרֶה puede significar lo que le sobreviene a una persona, un acontecimiento, o una suerte común.
    reason: lexical_alternative
  - marker: b
    text: O «el corazón de la humanidad» / «el corazón humano». La expresión hebrea «los hijos del hombre» usa lenguaje masculino representativo para la humanidad en general.
    reason: lexical_alternative
  - marker: c
    text: El hebreo es abrupto; literalmente, «y después de ello, a los muertos». Probablemente significa que después de la vida, las personas van a los muertos.
    reason: lexical_alternative
  - marker: d
    text: 'La expresión hebrea es muy concisa: literalmente, «a los muertos». El español hace explícito de manera natural el movimiento implícito con «van».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה רָע
  english_pob_choice: This is the evil
  chosen_spanish: Esto es el mal
  alternatives_spanish:
  - Esto es una maldad
  - Esto es el mal que hay
  lexicon: HALOT
  rationale: El demostrativo con el adjetivo funciona de manera idiomática para introducir el asunto. «El mal» conserva el valor definido y evaluativo del hebreo sin sonar forzado en español.
- source_word: בְּכֹל אֲשֶׁר נַעֲשָׂה תַּחַת הַשֶּׁמֶשׁ
  english_pob_choice: in all that is done under the sun
  chosen_spanish: en todo lo que se hace debajo del sol
  alternatives_spanish:
  - entre todo lo que se hace debajo del sol
  - en todo cuanto sucede debajo del sol
  lexicon: HALOT
  rationale: Mantiene la fórmula característica de Eclesiastés «debajo del sol» y el sentido impersonal/pasivo de נַעֲשָׂה con una construcción natural en español.
- source_word: כִּי מִקְרֶה אֶחָד לַכֹּל
  english_pob_choice: that one fate comes to all
  chosen_spanish: que una misma suerte les toca a todos
  alternatives_spanish:
  - que un mismo acontecimiento les sucede a todos
  - que una misma fatalidad les sobreviene a todos
  lexicon: HALOT
  rationale: «מִקְרֶה» en Eclesiastés puede denotar lo que le sucede a alguien, con matiz de suerte o destino común. «Suerte» comunica bien ese alcance sin cargar la frase con una doctrina que el texto no explicita.
- source_word: וְגַם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Y también
  lexicon: HALOT
  rationale: Introduce otra observación de manera clara y natural en español.
- source_word: לֵב בְּנֵי הָאָדָם
  english_pob_choice: the heart of the sons of man
  chosen_spanish: el corazón de los hijos del hombre
  alternatives_spanish:
  - el corazón de la humanidad
  - el corazón humano
  lexicon: HALOT
  rationale: La forma hebrea usa lenguaje representativo masculino para la humanidad en general. «Hijos del hombre» preserva la forma fuente y el paralelismo antropológico de Eclesiastés; se evita aplanar de entrada el rasgo formal del original.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  lexicon: HALOT
  rationale: Aquí אָדָם es genérico. En la frase fija «hijos del hombre», «el hombre» conserva la expresión tradicional y el vínculo con el hebreo.
- source_word: מָלֵא רָע
  english_pob_choice: is full of evil
  chosen_spanish: está lleno de maldad
  alternatives_spanish:
  - está lleno de mal
  - está colmado de maldad
  lexicon: HALOT
  rationale: La construcción predicativa se rinde de forma directa. «Maldad» aclara el contenido moral del sustantivo sin apartarse del alcance amplio de רָע.
- source_word: וְהוֹלֵל֤וֹת
  english_pob_choice: and madness
  chosen_spanish: y la locura
  alternatives_spanish:
  - y la insensatez
  - y la necedad
  lexicon: HALOT
  rationale: El plural abstracto señala comportamiento irracional o desenfrenado. «Locura» conserva la fuerza del contraste sapiencial en Eclesiastés y funciona bien en español actual.
- source_word: בִּלְבָבָם
  english_pob_choice: in their hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en su corazón
  - dentro de ellos
  lexicon: HALOT
  rationale: Se mantiene la imagen antropológica del corazón, que en hebreo incluye vida interior, pensamiento y voluntad.
- source_word: בְּחַיֵּיהֶם
  english_pob_choice: during their lives
  chosen_spanish: durante su vida
  alternatives_spanish:
  - mientras viven
  - en su tiempo de vida
  lexicon: HALOT
  rationale: Expresa con naturalidad el marco temporal del hebreo sin perder el tono formal.
- source_word: וְאַחֲרָיו
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y más tarde
  lexicon: HALOT
  rationale: El hebreo es abrupto; «y después» conserva esa brevedad sin añadir más de lo que el texto exige.
- source_word: אֶל הַמֵּתִים
  english_pob_choice: to the dead
  chosen_spanish: a los muertos
  alternatives_spanish:
  - hacia los muertos
  - con los muertos
  lexicon: HALOT
  rationale: La expresión es elíptica. En español, «a los muertos» mantiene la concisión del hebreo y sugiere el movimiento implícito sin sobreexplicarlo.
theological_decisions:
- issue: Lenguaje representativo masculino en בְּנֵי הָאָדָם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos del hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: El hebreo usa lenguaje masculino representativo para referirse a la humanidad en general. La redacción principal conserva esa forma fuente; las alternativas más inclusivas serían una normalización interpretativa, no una exigencia del texto.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם / adam'
- issue: Mִקְרֶה como suerte común o evento común
  english_pob_reading: one fate comes to all
  chosen_spanish_reading: una misma suerte les toca a todos
  alternative_spanish_readings:
  - un mismo acontecimiento les sucede a todos
  - una misma fatalidad les sobreviene a todos
  rationale: En Eclesiastés, מִקְרֶה puede apuntar a aquello que le sucede a uno, con fuerte matiz de destino común. «Suerte» conserva esa amplitud sin convertir el texto en una afirmación doctrinal más precisa de lo que permite el hebreo.
  doctrine_reference: Ecclesiastes 9:3 lexical context; HALOT on מִקְרֶה
translation_notes:
  revision_awareness: 'La revisión del audit trail aclaró el cierre abrupto del hebreo, pasando de una construcción demasiado literal a una formulación completa y natural («and afterward, they go to the dead»). En español se siguió esa misma mejora: se mantuvo la brevedad del original, pero se expresó con un verbo implícito y un movimiento natural («van a los muertos»).'
  spanish_consistency_notes:
  - Se conserva «debajo del sol» como fórmula técnica de Eclesiastés.
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Locura» se mantiene para וְהוֹלֵלוֹת por coherencia sapiencial, sin sustituirlo por una paráfrasis moralizante.
  - Se preserva la tensión entre concisión hebrea y fluidez española en el cierre final.
