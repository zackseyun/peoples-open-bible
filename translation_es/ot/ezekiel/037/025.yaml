translation:
  language: es
  text: Habitarán en la tierra que di a mi siervo Jacob, donde habitaron vuestros padres[a]; y habitarán en ella, ellos, sus hijos y los hijos de sus hijos, para siempre. Y David[b] mi siervo será príncipe[c] sobre ellos para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “vuestros antepasados”. El hebreo dice “vuestros padres”.
    reason: lexical_alternative
  - marker: b
    text: El nombre “David” puede referirse al gobernante davídico prometido; el texto no especifica si se trata del David histórico restaurado o de una figura davídica futura.
    reason: theological_note
  - marker: c
    text: O “líder” o “gobernante”. El hebreo usa “príncipe”, no “rey”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבוּ
  english_pob_choice: they will dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - morarán
  - vivirán
  - se establecerán
  lexicon: HALOT
  rationale: יׁשב expresa habitar o establecerse en un lugar. "Habitarán" conserva bien el sentido de residencia estable y el tono de promesa de tierra sin sonar arcaico en español.
- source_word: עַל הָאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el país
  lexicon: HALOT
  rationale: Aunque עַל es literalmente "sobre/en", en contextos de promesa territorial el español natural es "en la tierra". Mantiene la referencia geográfica y la fuerza de la promesa.
- source_word: אֲשֶׁר נָתַתִּי
  english_pob_choice: that I gave
  chosen_spanish: que di
  alternatives_spanish:
  - que he dado
  - que había dado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con pasado simple para reflejar con naturalidad la concesión ancestral de la tierra.
- source_word: לְעַבְדִּי לְיַעֲקֹב
  english_pob_choice: to my servant Jacob
  chosen_spanish: a mi siervo Jacob
  alternatives_spanish:
  - para mi siervo Jacob
  - a mi esclavo Jacob
  lexicon: HALOT
  rationale: El hebreo presenta a Jacob como receptor de la concesión divina. "Siervo" sigue la elección del POB inglés para עבד y conserva el matiz de relación de pacto; "esclavo" sería demasiado fuerte en español para este título aquí.
- source_word: אֲשֶׁר יָשְׁבוּ בָהּ אֲבוֹתֵיכֶם
  english_pob_choice: where your fathers dwelt
  chosen_spanish: donde habitaron sus padres
  alternatives_spanish:
  - donde vivieron sus padres
  - donde habitaron sus antepasados
  lexicon: HALOT
  rationale: '"Padres" conserva la forma masculina plural del hebreo y la referencia generacional representativa; "habitaron" mantiene la misma raíz conceptual de residencia estable.'
- source_word: וְיָשְׁבוּ עָלֶיהָ
  english_pob_choice: and they will dwell in it
  chosen_spanish: y habitarán en ella
  alternatives_spanish:
  - y habitarán sobre ella
  - y vivirán en ella
  lexicon: HALOT
  rationale: La repetición del verbo se conserva, y el pronombre femenino singular español concuerda con "tierra". "En ella" expresa naturalmente la relación espacial con el territorio.
- source_word: הֵמָּה וּבְנֵיהֶם וּבְנֵי בְנֵיהֶם
  english_pob_choice: they and their sons and their sons' sons
  chosen_spanish: ellos, sus hijos y los hijos de sus hijos
  alternatives_spanish:
  - ellos, sus hijos y sus nietos
  - ellos y su descendencia
  lexicon: HALOT
  rationale: Se mantiene la progresión genealógica explícita del hebreo. "Hijos de sus hijos" reproduce con transparencia el paralelismo original y evita suavizar el lenguaje a una forma más interpretativa.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: '"Para siempre" comunica bien la permanencia duradera del hebreo en español contemporáneo y preserva la fuerza temporal sin sobreinterpretar el matiz filosófico de עוֹלָם.'
- source_word: וְדָוִד עַבְדִּי
  english_pob_choice: And David my servant
  chosen_spanish: Y David mi siervo
  alternatives_spanish:
  - Y mi siervo David
  - Y David, mi siervo
  lexicon: HALOT
  rationale: Se conserva el orden y la designación pactal del nombre con el título. "Mi siervo" refleja la relación de servicio/elección sin añadir identificación mesiánica al texto principal.
- source_word: נָשִׂיא
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - líder
  - gobernante
  lexicon: HALOT
  rationale: '"Príncipe" es el equivalente más directo y formal en español para נָשִׂיא, y evita sustituir el término por "rey" o por una paráfrasis menos precisa.'
- source_word: לָהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - para ellos
  - encima de ellos
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa más reciente, "sobre ellos" expresa la relación de autoridad inherente al cargo y resulta idiomático en español para el gobierno de un príncipe.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: Se mantiene la misma traducción que para עַד עוֹלָם, reforzando la permanencia mediante consistencia terminológica.
theological_decisions:
- issue: Identidad de David
  english_pob_reading: Retain 'David' in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener "David" en el texto principal sin expansión interpretativa.
  alternative_spanish_readings:
  - el David resucitado
  - un gobernante davídico
  - el Mesías
  rationale: El hebreo nombra a David explícitamente; la traducción no debe resolver en el cuerpo del texto si se trata del David histórico restaurado o de una figura davídica futura. La tensión se preserva para lectura responsable.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
- issue: Alcance de אֲבוֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  - sus ancestros
  rationale: Se conserva la forma masculina plural del hebreo. En español, "padres" sigue siendo suficientemente claro y mantiene la correspondencia formal que el POB documenta.
  doctrine_reference: Precisión formal y sensibilidad al género gramatical.
- issue: Valor de נָשִׂיא
  english_pob_reading: prince, not king
  chosen_spanish_reading: príncipe, no rey
  alternative_spanish_readings:
  - líder
  - gobernante
  - rey
  rationale: Ezequiel usa נָשִׂיא, no מֶלֶךְ. Traducir "príncipe" preserva la distinción política y teológica; "rey" introduciría una equivalencia no sustentada por el texto.
  doctrine_reference: Distinción léxica en la realeza/autoridad de Ezequiel.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'in it' para la segunda cláusula y 'over them' para la relación del príncipe. En español se reflejó esa evolución con 'en ella' y 'sobre ellos', manteniendo la progresión repetitiva y la idea de autoridad. También se conservaron las dos expresiones de permanencia ('para siempre') para עַד עוֹלָם y לְעוֹלָם.
  spanish_consistency_notes:
  - Se mantuvo 'siervo' para עבד, coherente con la POB inglesa y con el uso pactal del término en este contexto.
  - Se tradujo עַל הָאָרֶץ como 'en la tierra' y עָלֶיהָ como 'en ella' para conservar naturalidad sin perder la repetición del hebreo.
  - '''Padres'' se conservó por fidelidad formal al hebreo masculino plural, aunque la nota permite ''antepasados''.'
  - '''Príncipe'' se mantuvo como equivalente de נָשִׂיא para no importar el título ''rey''.'
  - '''Para siempre'' se usó de manera consistente para ambos marcadores de duración, preservando el énfasis de permanencia.'
