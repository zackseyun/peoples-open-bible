translation:
  language: es
  text: Y Mattatías y sus amigos se enteraron de ello, y lloraron por ellos[b] sobremanera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «por ellos» reproduce el sentido relacional de ἐπʼ αὐτούς en un contexto de duelo; también puede entenderse «sobre ellos», pero en español suena menos natural aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: learned of it
  chosen_spanish: se enteraron de ello
  alternatives_spanish:
  - llegaron a saberlo
  - supieron de ello
  - se dieron cuenta de ello
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí expresa el momento en que reciben noticia del hecho. «Se enteraron de ello» comunica bien ese valor ingresivo en español sin sonar mecánico.
- source_word: οἱ φίλοι αὐτοῦ
  english_pob_choice: his friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - sus compañeros
  - los que estaban con él
  lexicon: LSJ
  rationale: «Amigos» sigue de cerca la opción inglesa y conserva la idea de círculo cercano y leal alrededor de Mattatías.
- source_word: ἐπένθησαν
  english_pob_choice: they mourned
  chosen_spanish: lloraron
  alternatives_spanish:
  - guardaron duelo
  - lamentaron
  - se dolieron
  lexicon: BDAG
  rationale: El verbo denota duelo por una muerte o pérdida grave. En español, «lloraron» transmite de forma natural el acto de duelo en un contexto narrativo breve, sin perder la carga de lamento.
- source_word: ἐπʼ αὐτούς
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - sobre ellos
  - a causa de ellos
  lexicon: LSJ
  rationale: Con verbos de duelo, la construcción griega indica el objeto del lamento. «Por ellos» es la equivalencia española más idiomática y conserva la relación afectiva.
- source_word: ἕως σφόδρα
  english_pob_choice: exceedingly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - en gran manera
  - excesivamente
  - muy grandemente
  lexicon: LSJ
  rationale: La secuencia intensifica fuertemente el verbo. «Sobremanera» es un equivalente formal y natural en español bíblico para esa intensidad, sin sonar tan moderno como «excesivamente».
translation_notes:
  revision_awareness: El inglés POB pasó de «very greatly» a «exceedingly» para reflejar con mayor naturalidad ἕως σφόδρα. La versión española responde a esa misma intensificación con «sobremanera», manteniendo el énfasis fuerte del griego sin calcar el inglés.
  spanish_consistency_notes:
  - Se mantiene «Mattatías» con la grafía habitual en español para el nombre propio.
  - No se introduce vocabulario doctrinal ajeno al breve relato; la versión conserva un tono narrativo sobrio y acorde al griego.
  - La partícula inicial καὶ se refleja con «Y» para conservar la continuidad narrativa.
