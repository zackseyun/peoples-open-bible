    issue: «te hará trabajar» para יַעֲבֹד בָּךְ
    rationale: El hebreo y la auditoría inglesa apuntan a 'hacer uso de ti' en sentido amplio e instrumental. «Te hará trabajar» introduce una imagen laboral más concreta que puede perder el matiz de explotación/utilización personal.
