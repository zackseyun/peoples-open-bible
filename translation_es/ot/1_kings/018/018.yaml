translation:
  language: es
  text: 'Y él dijo: «Yo no he causado problemas a Israel,[a] sino tú y la casa de tu padre, porque han abandonado los mandamientos de Yahvé y has ido tras los Baales».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo no he traído desgracia sobre Israel». El verbo hebreo también puede expresar causar trastorno o calamidad sobre una comunidad.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo está en plural: «los Baales», es decir, las diversas formas o manifestaciones locales del culto a Baal.'
    reason: cultural_note
lexical_decisions:
- source_word: עָכַרְתִּי
  english_pob_choice: have not troubled
  chosen_spanish: no he perturbado
  alternatives_spanish:
  - no he causado trouble en
  - no he traído aflicción a
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa causar trastorno o calamidad a la comunidad. «Perturbado» conserva la idea de trastornar sin volverlo demasiado explicativo y mantiene la conexión con la acusación previa.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: Nombre propio bíblico
  rationale: Se conserva el nombre propio de forma directa; el contexto ya deja claro que se trata del pueblo/nación.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: 'Aquí la pareja adversativa introduce corrección y contraste: no fue Elías quien perturbó, sino Acab y su casa. «Sino» expresa bien ese giro en español.'
- source_word: וּבֵית אָבִיךָ
  english_pob_choice: and your father's house
  chosen_spanish: la casa de tu padre
  alternatives_spanish:
  - tu familia
  - la casa paterna
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a la casa/familia dinástica. «La casa de tu padre» conserva mejor la formulación original que una simplificación a «tu familia».
- source_word: בַּעֲזָבְכֶם
  english_pob_choice: because you have forsaken
  chosen_spanish: porque habéis abandonado
  alternatives_spanish:
  - porque habéis dejado
  - al haber abandonado
  lexicon: HALOT
  rationale: El valor causal se expresa de forma natural con «porque». «Abandonado» comunica bien la ruptura de lealtad/cumplimiento implícita en el hebreo.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los mandatos
  - las órdenes
  lexicon: HALOT
  rationale: «Mandamientos» es la equivalencia más estable y conserva el peso pactal/legal del término en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se sigue la terminología española establecida del proyecto para el nombre divino, manteniendo el nombre propio en lugar de sustituirlo por un título.
- source_word: וַתֵּלֶךְ אַחֲרֵי
  english_pob_choice: have gone after
  chosen_spanish: habéis ido tras
  alternatives_spanish:
  - habéis seguido a
  - habéis andado tras
  lexicon: HALOT
  rationale: La locución hebrea indica seguir en lealtad o adoración. «Ir tras» preserva el matiz idiomático y evita una lectura demasiado literal o demasiado libre.
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los baales
  alternatives_spanish:
  - los Baales
  - los ídolos de Baal
  lexicon: HALOT
  rationale: Se conserva el plural del hebreo y su referencia a las manifestaciones o formas locales del culto a Baal, sin reducirlo a un singular.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En español, el proyecto adopta «Yahvé» como forma del nombre divino, para mantener el nombre propio revelado en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Pluralidad de הַבְּעָלִים
  english_pob_reading: the Baals
  chosen_spanish_reading: los baales
  alternative_spanish_readings:
  - Baal
  - los Baales
  rationale: El hebreo está en plural; mantenerlo evita aplanar el dato textual y preserva la referencia a múltiples expresiones o manifestaciones del culto a Baal.
  doctrine_reference: HALOT / lectura plural del texto hebreo
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con la lectura auditada en inglés; no se detectaron revisiones aplicadas en el paquete fuente. Se mantuvo la estructura adversativa y el plural hebreo de «los baales», y se adaptó el nombre divino al estándar español del proyecto («Yahvé»).
  spanish_consistency_notes:
  - Se emplea «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el plural «baales» para reflejar הַבְּעָלִים.
  - Se traduce el giro causal con «porque» y la corrección adversativa con «sino», ambos naturales en español.
  - Se mantiene «la casa de tu padre» para reflejar el idiomatismo hebreo sin perder claridad.
