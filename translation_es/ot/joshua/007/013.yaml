review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: mandato a Josué de levantarse, consagrar al pueblo, ordenar su preparación para el día siguiente, anuncio de Yahvé sobre el חֵרֶם en medio de Israel, incapacidad de prevalecer ante los enemigos hasta removerlo. También preserva adecuadamente Yahvé y la idea de חֵרֶם como algo dedicado para destrucción.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero necesita ajustes pequeños para mejor español general y mejor coherencia pronominal. «Consagraos» suena peninsular; para un español neutral latinoamericano conviene «Conságrense». Además, hay mezcla de singular y plural en el discurso directo («en medio de ti… No podrás… hasta que quitéis… de vosotros»). El hebreo sí cambia de singular corporativo a plural colectivo al final, pero en español conviene reflejarlo con una formulación más natural y clara. También la nota al pie está mal anclada: el marcador [a] aparece sobre «Levántate», aunque la nota explica חֵרֶם.'
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> «Yahvé» correctamente; אֱלֹהֵי יִשְׂרָאֵל -> «el Dios de Israel» correcto; קַדֵּשׁ / הִתְקַדְּשׁוּ -> «consagra / conságrense» preserva la conexión léxica; חֵרֶם debe mantenerse con una formulación como «algo dedicado a la destrucción / lo dedicado a la destrucción», más natural que «cosa dedicada a destrucción».'
  issues:
  - severity: medium
    issue: Marcador de nota al pie mal ubicado
    rationale: La nota [a] explica חֵרֶם, pero en el borrador está colocada en «Levántate[a]». Debe anclarse en la primera aparición de «algo dedicado a la destrucción» o equivalente.
  - severity: medium
    issue: Registro no neutral latinoamericano en «Consagraos»
    rationale: Aunque fiel al sentido, «Consagraos» marca voseo/plural peninsular. Para el objetivo editorial conviene «Conságrense», que es ampliamente comprensible en español eclesial latinoamericano.
  - severity: low
    issue: 'Expresión poco natural: «cosa dedicada a destrucción»'
    rationale: Preserva el sentido, pero en español suena áspera. «Algo dedicado a la destrucción» y «lo dedicado a la destrucción» mantienen la carga semántica de חֵרֶם con mejor fluidez.
  - severity: low
    issue: Mejorable la coherencia del cambio singular/plural
    rationale: 'El hebreo pasa de singular corporativo («en tu medio, Israel», «no podrás») a plural colectivo al final («hasta que quiten de en medio de ustedes»). El borrador lo refleja, pero con mezcla peninsular («quitéis… vosotros»). Debe conservarse el cambio con español neutral: «hasta que quiten de en medio de ustedes».'
