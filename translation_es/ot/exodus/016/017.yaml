  to: Y los hijos de Israel hicieron así[a], y unos recogieron más y otros menos.
  rationale: Se mantiene la fidelidad al hebreo y a la auditoría inglesa, pero se repara la elipsis final para que el contraste distributivo suene natural y claro en español. También se normaliza la presentación de la nota al pie.
