translation:
  language: es
  text: 'Mira, yo estoy contra ti, habitante del valle, roca de la llanura, dice Yahvé, ustedes que dicen: «¿Quién descenderá contra nosotros[a]? ¿Y quién entrará en nuestras moradas[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién vendrá abajo contra nosotros?» o «¿Quién descenderá contra nosotros?». El verbo hebreo de esta cláusula es difícil; el sentido es que la ciudad se considera segura frente al ataque.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «moradas»; posiblemente con el matiz de viviendas seguras o fortalezas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, aquí estoy
  lexicon: HALOT
  rationale: La fórmula profética introduce una proclamación solemne. «Mira» conserva el énfasis de llamada de atención sin sonar tan arcaico como «He aquí» en español moderno.
- source_word: אֵלַיִךְ
  english_pob_choice: against you
  chosen_spanish: estoy contra ti
  alternatives_spanish:
  - estoy frente a ti
  - estoy hacia ti
  lexicon: HALOT
  rationale: En contexto de juicio, la preposición expresa oposición hostil. «Contra ti» mantiene ese valor adversativo de manera natural en español.
- source_word: יֹשֶׁבֶת
  english_pob_choice: inhabitant
  chosen_spanish: habitante
  alternatives_spanish:
  - moradora
  - la que habitas
  lexicon: HALOT
  rationale: El participio femenino singular personifica la ciudad como una habitante. «Habitante» conserva la función vocativa y la imagen personificada sin añadir interpretación.
- source_word: הָעֵמֶק
  english_pob_choice: the valley
  chosen_spanish: el valle
  alternatives_spanish:
  - el cañón
  - la hondonada
  lexicon: HALOT
  rationale: Es el equivalente topográfico directo y claro.
- source_word: צוּר
  english_pob_choice: rock
  chosen_spanish: roca
  alternatives_spanish:
  - peña
  - fortaleza
  lexicon: HALOT
  rationale: La palabra designa literalmente una roca. «Roca» preserva la imagen; «fortaleza» sería más interpretativo.
- source_word: הַמִּישֹׁר
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - la planicie
  - el terreno llano
  lexicon: HALOT
  rationale: «Llanura» es natural en español y mantiene la imagen geográfica de terreno abierto y nivelado.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma editorial del proyecto, y el verbo simple reproduce la fórmula profética sin rigidizarla.
- source_word: הָאֹמְרִים
  english_pob_choice: you who say
  chosen_spanish: ustedes que dicen
  alternatives_spanish:
  - los que dicen
  - quienes dicen
  lexicon: HALOT
  rationale: Aunque el participio es plural, está integrado al discurso directo de la ciudad personificada. «Ustedes» hace explícita la pluralidad de los hablantes sin romper el vocativo singular.
- source_word: מִי יֵחַת עָלֵינוּ
  english_pob_choice: Who will come down against us
  chosen_spanish: ¿Quién descenderá contra nosotros?
  alternatives_spanish:
  - ¿Quién vendrá contra nosotros?
  - ¿Quién caerá sobre nosotros?
  lexicon: HALOT
  rationale: El verbo es difícil; aquí se conserva el sentido probable de descenso/ataque desde una posición alta o segura. «Descenderá contra nosotros» retiene la imagen y la dificultad lexical documentada.
- source_word: יָבֹוא
  english_pob_choice: will enter
  chosen_spanish: entrará
  alternatives_spanish:
  - vendrá
  - pasará a
  lexicon: HALOT
  rationale: Con בְּ y «moradas», «entrará» es el equivalente más natural en español.
- source_word: בִּמְעוֹנוֹתֵינוּ
  english_pob_choice: into our dwellings
  chosen_spanish: en nuestros lugares de morada
  alternatives_spanish:
  - en nuestras moradas
  - en nuestras viviendas
  - en nuestros refugios
  lexicon: HALOT
  rationale: מָעוֹן puede significar lugar de morada o habitación. «Lugares de morada» conserva la amplitud del término y deja abierta la posible matización defensiva sin sobretraducir.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el default terminológico del proyecto para el Tetragrámaton, evitando el reemplazo por una máscara litúrgica. «Yahvé» preserva la referencia explícita del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Tensión entre el singular personificado y el plural de los hablantes
  english_pob_reading: Maintain singular city address ('you') while rendering the boast as spoken by its inhabitants
  chosen_spanish_reading: Mantener el singular en la interpelación («ti») y hacer explícito el plural en el discurso («ustedes que dicen»).
  alternative_spanish_readings:
  - 'Aplanar todo al plural: «ustedes habitantes... que dicen»'
  - Conservar todo en singular sin marcar la pluralidad de la voz
  rationale: El hebreo combina dirección a una ciudad personificada con una pluralidad de voces. La traducción conserva esa tensión sin resolverla artificialmente, siguiendo la filosofía de preservar el dato retórico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension rather than resolve it'
translation_notes:
  revision_awareness: No se requirieron cambios en la pasada más reciente; la concordancia con el texto fuente y la auditoría inglesa se mantuvo estable y de alta coincidencia.
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene la imagen geográfica literal «valle / roca / llanura» sin convertirla en interpretación militar en el texto principal.
  - La combinación de singular en la interpelación y plural en la voz hablante reproduce la tensión del hebreo.
  - «Lugares de morada» evita estrechar indebidamente מְעוֹנוֹתֵינוּ a «refugios» o «fortalezas» en el cuerpo principal.
