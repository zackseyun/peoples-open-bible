translation:
  language: es
  text: Da testimonio a tus criaturas desde el principio[a], y levanta las profecías pronunciadas en tu nombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tus creaciones que estaban desde el principio». La frase griega es comprimida y puede referirse de manera amplia a lo creado por Dios al comienzo, no solo a seres vivos.
    reason: lexical_alternative
  - marker: b
    text: O «cumple las profecías en tu nombre». El griego dice literalmente «levanta las profecías», lo cual puede implicar ponerlas en efecto.
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Concede
  - Otorga
  lexicon: LSJ
  rationale: Imperativo aoristo de δίδωμι. En español, «Da» conserva la orden directa y breve del griego, con tono natural y digno.
- source_word: μαρτύριον
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - evidencia
  lexicon: LSJ
  rationale: μαρτύριον expresa aquí el sentido de testimonio o declaración pública. «Testimonio» mantiene el matiz jurídico y revelatorio sin forzar el sentido.
- source_word: τοῖς ... κτίσμασίν σου
  english_pob_choice: to your creatures
  chosen_spanish: a tus criaturas
  alternatives_spanish:
  - a tus creaciones
  - para tus criaturas
  lexicon: LSJ
  rationale: κτίσμα puede referirse a lo creado o a las criaturas. «Criaturas» es la opción más natural en español y preserva la amplitud semántica. El dativo se expresa con «a» para conservar la dirección del acto verbal.
- source_word: τοῖς ἐν ἀρχῇ
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - en el principio
  - que estaban desde el principio
  lexicon: LSJ
  rationale: La construcción es comprimida y algo ambigua. «Desde el principio» refleja bien la idea de existencia originaria y suena natural en español, sin cerrar indebidamente la referencia.
- source_word: ἔγειρον
  english_pob_choice: raise up
  chosen_spanish: levanta
  alternatives_spanish:
  - alza
  - despierta
  - haz surgir
  lexicon: LSJ
  rationale: ἐγείρω significa literalmente «levantar» o «alzar». «Levanta» conserva la metáfora básica y evita introducir una interpretación demasiado específica.
- source_word: προφητείας
  english_pob_choice: the prophecies
  chosen_spanish: las profecías
  alternatives_spanish:
  - las palabras proféticas
  - las predicciones
  lexicon: LSJ
  rationale: προφητεία se traduce de manera directa por «profecías». El plural se mantiene para respetar la forma del griego.
- source_word: τὰς ἐπʼ ὀνόματί σου
  english_pob_choice: spoken in your name
  chosen_spanish: pronunciadas en tu nombre
  alternatives_spanish:
  - en tu nombre
  - que llevan tu nombre
  - bajo tu nombre
  lexicon: LSJ
  rationale: La expresión griega es idiomática y puede implicar autoridad o adscripción a Dios. «Pronunciadas en tu nombre» hace explícita la fuerza verbal de las profecías sin perder el vínculo con el nombre divino.
theological_decisions:
- issue: Alcance de «tus criaturas desde el principio»
  english_pob_reading: A reference to God's created beings/things that have existed from the beginning
  chosen_spanish_reading: Una referencia amplia a las criaturas o cosas creadas por Dios desde el origen
  alternative_spanish_readings:
  - Una referencia al pueblo de Dios formado antiguamente
  - Una referencia a las obras primordiales de Dios en general
  rationale: El griego κτίσμασιν permite una referencia amplia a lo creado. La traducción evita restringirla a Israel o a seres vivos únicamente, porque el texto no lo especifica.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Sentido de «levanta las profecías»
  english_pob_reading: A plea for God to bring prophetic words into active effect or renewed standing
  chosen_spanish_reading: Una súplica para que Dios haga surgir o active nuevamente los oráculos proféticos
  alternative_spanish_readings:
  - Una súplica para que cumpla las profecías
  - Una súplica para que despierte a los profetas mismos
  rationale: El objeto directo son las profecías, no los profetas. «Levanta» conserva la imagen verbal y deja abierta la posibilidad de cumplimiento, renovación o puesta en vigor.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete. La solución mantiene la ambigüedad documentada en torno a κτίσμασιν/τοῖς ἐν ἀρχῇ y a ἔγειρον προφητείας, sin neutralizarla con una paráfrasis interpretativa. No se detectaron revisiones aplicadas en el expediente inglés; por tanto, la redacción española conserva la lectura principal auditada con notas alternativas donde el inglés POB también las preservó.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda en este registro; aquí no aparece el Tetragrámaton explícito, por lo que se mantiene «tu nombre».
  - Se prefirió «criaturas» por coherencia con el valor amplio de κτίσμα y con el inglés auditado «creatures».
  - «Profecías» conserva el plural del griego y evita singularizar indebidamente el objeto de ἔγειρον.
  - La preposición española «a» en «Da testimonio a» refleja el dativo destinatario del griego.
