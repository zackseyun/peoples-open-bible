revisions:
- from: Levanta tus ojos alrededor y mira[a]; todos se han reunido; vienen a ti. Tus hijos vendrán de lejos[b], y tus hijas serán llevadas al costado.
  to: Alza tus ojos alrededor y mira; todos se han reunido; vienen a ti. Tus hijos varones vendrán de lejos, y tus hijas serán llevadas en la cadera[a].[b]
  rationale: Se corrige la colocación de las notas al pie para que correspondan a las expresiones realmente comentadas; se refuerza la precisión semántica de la pareja «hijos varones / hijas» para reflejar el hebreo; y se adopta «en la cadera» como traducción principal de עַל צַד, con «al costado» en nota como alternativa, en línea con la decisión léxica auditada. También se mejora levemente la naturalidad de la apertura con «Alza».
  reviewer_model: gpt-5.4
