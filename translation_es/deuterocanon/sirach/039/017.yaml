translation:
  language: es
  text: A su palabra, las aguas se amontonan como un montón[a], y al salir la palabra de su boca, hay depósitos de aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es más breve: «y al salir de su boca, su depósito»; el testimonio griego dice «depósitos de aguas», que aclara el sentido y se sigue aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: בדברו
  english_pob_choice: At his word
  chosen_spanish: Con su palabra
  alternatives_spanish:
  - Por su palabra
  - Al pronunciar él su palabra
  lexicon: HALOT
  rationale: La construcción hebrea permite un valor instrumental y también temporal; el inglés POB eligió una forma concisa que conserva ambas posibilidades. En español, «Con su palabra» mantiene la fuerza instrumental natural y la referencia al acto de hablar sin forzar una paráfrasis.
- source_word: יעריך
  english_pob_choice: pile up
  chosen_spanish: se amontonan
  alternatives_spanish:
  - se apilan
  - se agrupan
  - se ponen en orden
  lexicon: HALOT
  rationale: El verbo hebreo expresa ordenar, disponer o formar un montón; junto con la imagen de las aguas y el paralelo griego, el sentido concreto es que las aguas se reúnen en masa. «Se amontonan» comunica bien ese resultado visible en español.
- source_word: כנד מים
  english_pob_choice: like a heap
  chosen_spanish: las aguas
  alternatives_spanish:
  - como un montón
  - como un montón de agua
  - como un terraplén de agua
  lexicon: HALOT
  rationale: La imagen de «heap»/נד está implícita en el contexto de las aguas reunidas; el español puede expresarla en el verbo «amontonarse» sin añadir una comparación pesada que volvería torpe la línea. Por eso no se repite una comparación explícita en el texto principal.
- source_word: ובמוצא פיו
  english_pob_choice: and at the utterance of his mouth
  chosen_spanish: y con la expresión de su boca
  alternatives_spanish:
  - y con la salida de su boca
  - y al decir de su boca
  - y con la palabra que sale de su boca
  lexicon: HALOT
  rationale: מוצא tiene el matiz de «lo que sale» o «expresión/utterancia». «La expresión de su boca» preserva la concreción del hebreo y su paralelismo con «su palabra» sin sonar artificial en español.
- source_word: אוצרו
  english_pob_choice: are storehouses of water
  chosen_spanish: son depósitos de aguas
  alternatives_spanish:
  - son almacenes de aguas
  - son reservorios de aguas
  - son tesoros de aguas
  lexicon: HALOT
  rationale: El hebreo transmitido es breve y el paralelo griego explicita «depósitos/almacenes de aguas». «Depósitos de aguas» sigue esa clarificación sin imponerse con terminología demasiado técnica; «aguas» en plural respeta la imaginería bíblica y la huella del griego.
theological_decisions:
- issue: Referente implícito de los sufijos posesivos («su palabra», «su boca», «sus depósitos» implícitos)
  english_pob_reading: God is the implied referent throughout.
  chosen_spanish_reading: Dios queda como referente implícito en todo el versículo.
  alternative_spanish_readings:
  - Una descripción impersonal del poder creador sin nombrar a Dios
  - Un referente humano sabio o profético
  rationale: El contexto inmediato de Sirácida 39 es un himno a la obra del Creador; por eso los sufijos se entienden naturalmente de Dios. La traducción conserva la referencia implícita sin expandir innecesariamente el texto con «Dios» en el versículo.
  doctrine_reference: Sabiduría creadora de Dios; lectura contextual de Sirácida 39 dentro del himno al Creador
translation_notes:
  revision_awareness: Se siguió el sentido conjunto del hebreo transmitido y del paralelo griego, atendiendo a la aclaración griega sobre «depósitos de aguas» y a la imagen poética de aguas reunidas en masa. No se adoptó una calca del inglés; se ajustó el español para que el paralelismo resulte natural y fiel al valor verbal del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Dios» solo en la nota teológica implícita, no en el texto, para respetar la economía poética.
  - «Aguas» se conserva en plural por la fuerza imaginativa del hebreo y del griego.
  - «Con su palabra» y «con la expresión de su boca» preservan el paralelismo sin introducir términos litúrgicos no sustentados por la fuente.
