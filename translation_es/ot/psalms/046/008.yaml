translation:
  language: es
  text: Yahvé de los ejércitos está con nosotros; el Dios de Jacob es un baluarte para nosotros[a]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, tradicionalmente: «El SEÑOR de los ejércitos está con nosotros».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma española establecida en este proyecto, en vez de sustituirlo por un título. 'Yahvé' preserva la referencia personal y pactal del nombre revelado.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' comunica de manera transparente el sentido militar y de poder del término hebreo. ''Huestes'' es tradicional, pero menos claro para el español actual.'
- source_word: עִמָּנוּ
  english_pob_choice: is with us
  chosen_spanish: está con nosotros
  alternatives_spanish:
  - está entre nosotros
  - está a nuestro lado
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona plural expresa presencia solidaria y protectora. 'Está con nosotros' es la opción natural y fiel en español.
- source_word: מִשְׂגָּב
  english_pob_choice: stronghold
  chosen_spanish: baluarte
  alternatives_spanish:
  - fortaleza
  - refugio
  - fortín
  lexicon: HALOT
  rationale: '''Baluarte'' conserva la imagen de una defensa segura y fortificada sin sonar demasiado técnica. Evita estrechar indebidamente el matiz de lugar alto/refugio defensivo.'
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: nuestro
  alternatives_spanish:
  - para nosotros
  - a favor nuestro
  lexicon: HALOT
  rationale: 'Aunque el hebreo expresa relación/beneficio, el español fluye mejor con un predicado nominal posesivo: ''es nuestro baluarte''. Esto conserva la idea de protección en beneficio de los hablantes sin añadir más de lo que el verso dice.'
- source_word: אֱלֹהֵי יַעֲקֹב
  english_pob_choice: the God of Jacob
  chosen_spanish: el Dios de Jacob
  alternatives_spanish:
  - el Dios de Yaacob
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene la cadena constructa de forma directa y se conserva el nombre patriarcal Jacob, que ancla el verso en la historia pactal de Israel.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - pausa musical
  - interludio
  lexicon: HALOT
  rationale: El valor preciso del término es incierto; por eso se translitera en lugar de interpretar su función. Mantenerlo evita decidir sin base suficiente.
theological_decisions:
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de las huestes
  rationale: La versión española preserva el nombre divino como 'Yahvé' y traduce צְבָאוֹת con el término más transparente y fiel al original. 'Ejércitos' comunica la fuerza del título sin recurrir a una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para יְהוָה / YHWH; filosofía de traducción §§1, 6'
- issue: Sentido de מִשְׂגָּב en una declaración de confianza
  english_pob_reading: a stronghold for us
  chosen_spanish_reading: es nuestro baluarte
  alternative_spanish_readings:
  - es un refugio para nosotros
  - es una fortaleza para nosotros
  rationale: '''Baluarte'' expresa defensa segura y apoyo protector, sosteniendo el valor metafórico del sustantivo hebreo. La formulación posesiva en español transmite el beneficio para el hablante sin perder el contenido de refugio/fortificación.'
  doctrine_reference: HALOT; uso contextual del campo semántico de protección
- issue: Preservación de Selah
  english_pob_reading: Selah
  chosen_spanish_reading: Selah
  alternative_spanish_readings:
  - pausa
  - interludio
  rationale: Como el término es semánticamente incierto, se conserva transliterado. Así se respeta la tensión documental y no se impone una interpretación no segura.
  doctrine_reference: HALOT; nota textual sobre סֶלָה
translation_notes:
  revision_awareness: Se revisó el expediente inglés y no se detectaron cambios posteriores que obligaran a modificar la lectura base; el pasaje quedó en estado de alta concordancia, con una sola nota alternativa tradicional conservada en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se evita 'huestes' en el cuerpo principal por claridad, aunque se reconoce como alternativa tradicional.
  - '''Selah'' se conserva sin traducir para no cerrar una ambigüedad textual/documental.'
  - La puntuación sigue el paralelismo hebreo con un punto y coma antes de la segunda cola.
