revisions:
- from: Y cuando todos ya esperaban la decisión que iba a venir[a], y los enemigos ya habían entablado combate, y el ejército había sido desplegado, y las bestias habían sido colocadas oportunamente en una parte, y la caballería dispuesta en las alas[b],
  to: Y cuando todos ya esperaban la decisión venidera[a], y los enemigos ya habían entablado combate, y el ejército había sido desplegado, y las bestias habían sido colocadas adecuadamente en una parte, y la caballería dispuesta en las alas[b],
  rationale: Se ajusta «la decisión que iba a venir» a «la decisión venidera» para lograr un español más natural manteniendo el matiz de inminencia, y «colocadas oportunamente» a «colocadas adecuadamente» para reflejar mejor la colocación táctica apropiada de εὐκαίρως ἀποκατασταθέντων. Se conserva la nota cultural sobre las bestias y se amplía levemente la nota alternativa de κρίσις para preservar las opciones documentadas, incluida la resonancia de «juicio».
