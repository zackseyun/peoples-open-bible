translation:
  language: es
  text: ¿Puedes hacer que salte como la langosta? La majestad de su resoplido es aterradora[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Puedes hacerlo retumbar como la langosta?». El verbo hebreo puede sugerir causar sacudida, temblor o movimiento violento; algunos intérpretes también subrayan el efecto sonoro además del movimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתַרְעִישֶׁנּוּ
  english_pob_choice: Can you make him leap
  chosen_spanish: ¿Puedes hacer que salte
  alternatives_spanish:
  - ¿Puedes hacerlo retumbar
  - ¿Puedes hacerlo temblar
  - ¿Puedes hacerlo brincar
  lexicon: HALOT
  rationale: El verbo hiphil de רעשׁ puede expresar causar sacudida, agitación o movimiento violento. En este contexto del caballo de guerra y la comparación con la langosta, "hacer que salte" comunica el impulso repentino y enérgico que la nota inglesa auditada entiende como "leap", sin perder la idea de movimiento vigoroso.
- source_word: כָּאַרְבֶּה
  english_pob_choice: like the locust
  chosen_spanish: como la langosta
  alternatives_spanish:
  - como una langosta
  - como la langosta común
  lexicon: HALOT
  rationale: La comparación puede tener valor genérico/colectivo; en español, "como la langosta" es natural y conserva la imagen de un movimiento súbito y vivo. Se evita forzar un artículo indefinido que debilitaría el efecto proverbial de la figura.
- source_word: הוֹד
  english_pob_choice: The majesty
  chosen_spanish: La majestad
  alternatives_spanish:
  - El esplendor
  - La gloria
  lexicon: HALOT
  rationale: הוֹד denota majestad, esplendor o magnificencia. "Majestad" mantiene el registro elevado del verso y corresponde bien al porte imponente del caballo.
- source_word: נַחְרוֹ
  english_pob_choice: of his snorting
  chosen_spanish: de su resoplido
  alternatives_spanish:
  - de su bufido
  - de su resuello
  - de sus narices
  lexicon: HALOT
  rationale: El sustantivo se refiere al resoplar por la nariz, el soplo ruidoso del caballo. "Resoplido" es idiomático en español y conserva mejor la fuerza sonora que opciones más generales como "neighing" o más anatómicas como "narices".
- source_word: אֵימָה
  english_pob_choice: is terrifying
  chosen_spanish: es aterradora
  alternatives_spanish:
  - es terror
  - es terrible
  - causa terror
  lexicon: HALOT
  rationale: אֵימָה significa terror, pavor o espanto. En español, traducirlo predicativamente como "es aterradora" reproduce con naturalidad el valor nominal del hebreo y mantiene el impacto poético sin suavizarlo.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una equivalencia óptima y una nota de alternativa léxica para el verbo principal. La versión española conserva esa tensión semántica: prioriza la imagen de movimiento vigoroso con «salte», pero deja registrada la posibilidad de un matiz sonoro o de sacudida en la nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «langosta» para כָּאַרְבֶּה por correspondencia zoológica y poética en español.
  - «Resoplido» preserva el campo semántico del sonido nasal del caballo sin introducir una lectura de «relincho», que sería menos precisa aquí.
