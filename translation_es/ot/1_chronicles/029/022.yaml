translation:
  language: es
  text: Y comieron y bebieron delante de Yahvé aquel día con gran alegría[a], e hicieron rey por segunda vez[b] a Salomón hijo de David, y lo ungieron para Yahvé como gobernante[c][d], y a Sadoc como sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la presencia de Yahvé'.
    reason: lexical_alternative
  - marker: b
    text: O 'de nuevo' para 'por segunda vez'.
    reason: lexical_alternative
  - marker: c
    text: O 'lo ungieron delante de Yahvé como gobernante'; el hebreo puede expresar dedicación a Yahvé o una acción hecha en su presencia.
    reason: alternative_reading
  - marker: d
    text: '''Gobernante'' traduce el hebreo nagid, también rendido como ''príncipe'' o ''líder'' en algunos contextos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh / in the presence of Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en la presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La expresión señala estar en presencia de YHWH. En español, 'delante de Yahvé' conserva esa relación espacial/cultual de manera natural y fiel al hebreo, sin sustituir el nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el nombre divino con una forma legible en español. 'Yahvé' es la forma principal usada aquí para el tetragrama.
- source_word: בְּשִׂמְחָה גְדוֹלָה
  english_pob_choice: with great joy
  chosen_spanish: con gran alegría
  alternatives_spanish:
  - con mucha alegría
  - en gran alegría
  lexicon: HALOT
  rationale: '''Con gran alegría'' reproduce de forma idiomática el valor de manera del hebreo y mantiene el tono celebrativo sin añadir interpretación.'
- source_word: וַיַּמְלִיכוּ
  english_pob_choice: they made ... king
  chosen_spanish: hicieron rey
  alternatives_spanish:
  - proclamaron rey
  - coronaron
  lexicon: HALOT
  rationale: 'El hifil de מלך es causativo: ''hacer rey''. ''Hicieron rey'' sigue de cerca la fuerza verbal sin introducir la ceremonia específica que ''coronaron'' sugeriría.'
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: '''Por segunda vez'' conserva con precisión la repetición explícita del adverbio hebreo, mejor que un simple ''de nuevo''.'
- source_word: בֶן דָּוִיד
  english_pob_choice: son of David
  chosen_spanish: hijo de David
  alternatives_spanish:
  - descendiente de David
  lexicon: HALOT
  rationale: La relación filial se mantiene de modo formal y claro; además, identifica a Salomón dentro de la línea davídica.
- source_word: וַיִּמְשְׁחוּ
  english_pob_choice: they anointed
  chosen_spanish: ungieron
  alternatives_spanish:
  - consagraron con aceite
  - ungieron ritualmente
  lexicon: HALOT
  rationale: '''Ungieron'' es el equivalente directo en español para משׁח en contextos de investidura real y sacerdotal. ''Consagraron con aceite'' explicaría más de lo que el verbo dice.'
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - ante Yahvé
  - a Yahvé
  lexicon: HALOT
  rationale: El lamed puede expresar relación, dedicación o referencia. 'Para Yahvé' preserva esa orientación sin fijarla indebidamente como simple ubicación ceremonial.
- source_word: לְנָגִיד
  english_pob_choice: as ruler
  chosen_spanish: como gobernante
  alternatives_spanish:
  - como príncipe
  - como líder
  lexicon: HALOT
  rationale: נָגִיד designa a un dirigente con autoridad; 'gobernante' comunica esa función en español moderno con claridad, evitando 'príncipe', que puede sonar demasiado dinástico o nobiliario.
- source_word: לְכֹהֵן
  english_pob_choice: as priest
  chosen_spanish: como sacerdote
  alternatives_spanish:
  - como sacerdote oficial
  lexicon: HALOT
  rationale: '''Sacerdote'' es el equivalente directo y natural del término hebreo, conservando el paralelismo con ''como gobernante''.'
theological_decisions:
- issue: Modo de rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el tetragrama. La forma 'Yahvé' mantiene el nombre propio divino en español y evita la sustitución por un título, siguiendo la decisión doctrinal del proyecto de preservar el nombre covenantal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לַיהוָה en la unción de Salomón
  english_pob_reading: they anointed him for Yahweh as ruler
  chosen_spanish_reading: lo ungieron para Yahvé como gobernante
  alternative_spanish_readings:
  - lo ungieron delante de Yahvé como gobernante
  - lo ungieron a Yahvé como gobernante
  rationale: El hebreo permite una relación de dedicación, referencia o sometimiento a la autoridad de Yahvé. 'Para Yahvé' conserva esa tensión sin cerrarla a una sola explicación ceremonial.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el acuerdo con el control cruzado fue alto. Este borrador mantiene esa lectura estable, preservando las decisiones léxicas clave del audit trail en español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el tetragrama, conforme al criterio del proyecto.
  - '''Ungieron'' conserva el valor ritual del verbo hebreo sin ampliar el texto.'
  - '''Por segunda vez'' refleja con precisión שֵׁנִית.'
  - '''Gobernante'' evita cargar ''nagid'' con un matiz nobiliario no requerido por el contexto.'
  - La estructura coordinada del versículo se conservó para reflejar la secuencia del hebreo.
