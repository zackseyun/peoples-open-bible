review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido general del hebreo: montañas que se derriten, valles que se abren, y dos comparaciones poéticas. Conserva bien el pronombre de תַּחְתָּיו con referencia contextual a Yahvé. Sin embargo, «se partirán» suaviza un poco יִתְבַּקָּעוּ («se abrirán en grietas / se hendirán / se abrirán»), y «derramadas cuesta abajo» no refleja tan claramente la fuerza direccional de מֻגָּרִים בְּמוֹרָד como «vertidas por una pendiente» o «que corren por una pendiente».'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno. La única mejora importante es estilístico-semántica: «debajo de él» suena algo físico y puede mantenerse, pero «bajo él» es más terso; aun así, no es necesario cambiarlo. En cambio, «aguas derramadas cuesta abajo» resulta un poco coloquial y menos preciso que «aguas vertidas por una pendiente», que suena más digno y se ajusta mejor a la imagen poética.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparece el nombre divino en este versículo, y el pronombre mantiene la cohesión con Yahvé en el contexto. No se observan problemas teológicos ni de glosario mayores.
  issues:
  - severity: medium
    issue: «se partirán» debilita la imagen de יִתְבַּקָּעוּ
    rationale: El verbo hebreo expresa abrirse o hendirse violentamente, no solo partirse en sentido general. «Se abrirán» o «se abrirán en grietas» conserva mejor la imagen física y el paralelismo poético.
  - severity: medium
    issue: «aguas derramadas cuesta abajo» no refleja con suficiente precisión מֻגָּרִים בְּמוֹרָד
    rationale: La frase hebrea describe aguas hechas correr o vertidas por una pendiente. «Cuesta abajo» es natural, pero en esta construcción suena más coloquial; «vertidas por una pendiente» representa mejor la forma pasiva y el complemento locativo.
  revised_spanish_text: Las montañas se derretirán debajo de él, y los valles se abrirán, como cera delante del fuego, como aguas vertidas por una pendiente.
  revision_rationale: Se ajusta «se partirán» a «se abrirán» para reflejar mejor יִתְבַּקָּעוּ, y se cambia «aguas derramadas cuesta abajo» por «aguas vertidas por una pendiente» para representar con mayor fidelidad y dignidad literaria מֻגָּרִים בְּמוֹרָד. No hacen falta notas al pie.
